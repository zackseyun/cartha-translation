id: LEV.10.9
reference: Leviticus 10:9
source:
  edition: WLC
  text: יַ֣יִן וְ/שֵׁכָ֞ר אַל תֵּ֣שְׁתְּ אַתָּ֣ה וּ/בָנֶ֣י/ךָ אִתָּ֗/ךְ בְּ/בֹאֲ/כֶ֛ם
    אֶל אֹ֥הֶל מוֹעֵ֖ד וְ/לֹ֣א תָמֻ֑תוּ חֻקַּ֥ת עוֹלָ֖ם לְ/דֹרֹתֵי/כֶֽם־׀׀־׃
translation:
  text: You and your sons with you shall not drink wine or strong drink when you enter
    the tent of meeting, so that you may not die. It is a permanent statute throughout
    your generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'intoxicating drink.' The Hebrew term refers broadly to alcoholic drink
      other than wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you die.'
    reason: alternative_reading
  - marker: c
    text: Or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard Hebrew term for wine from fermented grapes. No contextual reason
    to broaden or narrow the sense.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - intoxicating drink
  - beer
  lexicon: HALOT
  rationale: Refers broadly to intoxicating beverage other than wine. 'Strong drink'
    is the most established and sufficiently broad English rendering; 'beer' would
    be too narrow, while 'intoxicating drink' is possible but less idiomatic in this
    legal formulation.
- source_word: אַל תֵּשְׁתְּ
  chosen: shall not drink
  alternatives:
  - must not drink
  - do not drink
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive gives a prohibition. 'Shall not drink'
    fits English legal/instructional style and preserves the force of the command.
- source_word: אַתָּה וּבָנֶיךָ אִתָּךְ
  chosen: You and your sons with you
  alternatives:
  - You, and your sons with you
  - You and your sons
  lexicon: HALOT
  rationale: Retains the explicit addressees and preserves אִתָּךְ ('with you'), which
    emphasizes that both Aaron and his sons are included in the prohibition.
- source_word: בְּבֹאֲכֶם
  chosen: when you enter
  alternatives:
  - upon your entering
  - as you go in
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב marks the circumstance/time of entry.
    'When you enter' is natural English and preserves the temporal sense.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: Established rendering of the tabernacle designation. Lowercase was chosen
    for running-text readability, though capitalization is also defensible as a quasi-title.
- source_word: וְלֹא תָמֻתוּ
  chosen: so that you may not die
  alternatives:
  - lest you die
  - and you shall not die
  lexicon: HALOT
  rationale: The clause gives the consequence to be avoided if the command is violated.
    'So that you may not die' communicates the preventative force clearly in modern
    English; 'lest you die' is more formal but less natural.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting statute
  lexicon: HALOT
  rationale: Legal formula for an enduring ordinance. 'Permanent statute' is clear
    modern English and avoids archaic tone while preserving durative force.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: Conventional covenantal/legal phrase indicating ongoing applicability
    across successive generations. 'Throughout your generations' is idiomatic and
    precise.
