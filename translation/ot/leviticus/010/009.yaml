theological_decisions:
- issue: Force of the death clause
  chosen_reading: 'The prohibition is rendered with a purpose/preventative nuance:
    ''so that you may not die.'''
  alternative_readings:
  - '''lest you die'''
  - '''and you shall not die'''
  rationale: The Hebrew sequence after the prohibition naturally expresses the deadly
    consequence associated with violating the command. The chosen wording preserves
    the warning without overstating a mechanistic causal formula.
- issue: Scope of the prohibition
  chosen_reading: The command applies specifically to entering the tent of meeting,
    not to all drinking at all times.
  alternative_readings:
  - A total abstinence command for priests in every circumstance
  rationale: The temporal phrase 'when you enter the tent of meeting' limits the prohibition
    contextually. The translation preserves that limitation and does not import a
    broader doctrinal claim about universal abstinence.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
