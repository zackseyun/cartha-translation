id: LEV.10.14
reference: Leviticus 10:14
source:
  edition: WLC
  text: וְ/אֵת֩ חֲזֵ֨ה הַ/תְּנוּפָ֜ה וְ/אֵ֣ת שׁ֣וֹק הַ/תְּרוּמָ֗ה תֹּֽאכְלוּ֙ בְּ/מָק֣וֹם
    טָה֔וֹר אַתָּ֕ה וּ/בָנֶ֥י/ךָ וּ/בְנֹתֶ֖י/ךָ אִתָּ֑/ךְ כִּֽי חָקְ/ךָ֤ וְ/חָק בָּנֶ֨י/ךָ֙
    נִתְּנ֔וּ מִ/זִּבְחֵ֥י שַׁלְמֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל׀־־׃
translation:
  text: But you, and your sons and your daughters with you, shall eat the breast of
    the wave offering and the thigh of the contribution in a clean place, because
    they have been given as your portion and your sons’ portion from the sacrifices
    of the peace offerings of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breast of the presentation offering.' The Hebrew term refers to
      the portion ritually waved before the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'the thigh of the raised offering.' The Hebrew term for 'contribution'
      is literally something lifted up or set apart as a priestly due.
    reason: lexical_alternative
  - marker: c
    text: '''Peace offerings'' may also be rendered ''fellowship offerings,'' though
      the Hebrew term can suggest a wider sense of peace, wholeness, or well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזֵה הַתְּנוּפָה
  chosen: the breast of the wave offering
  alternatives:
  - the breast of the presentation offering
  - the breast that was waved
  lexicon: HALOT
  rationale: חֲזֶה is the animal's breast/chest portion. תְּנוּפָה refers to the ritual
    waving/presentation before Yahweh. 'Wave offering' is the established sacrificial
    term and remains transparent enough in English; the more explanatory alternatives
    are preserved as possible glosses.
- source_word: שׁוֹק הַתְּרוּמָה
  chosen: the thigh of the contribution
  alternatives:
  - the thigh of the raised offering
  - the leg of the contribution
  lexicon: HALOT
  rationale: שׁוֹק denotes the leg/thigh portion; 'thigh' is more idiomatic in sacrificial
    English. תְּרוּמָה is literally something lifted up/contributed. Here it is a
    priestly due from sacrifices, so 'contribution' best balances literal sense and
    readability; 'raised offering' is more formal but less natural.
- source_word: תֹּאכְלוּ
  chosen: shall eat
  alternatives:
  - may eat
  - are to eat
  lexicon: HALOT
  rationale: The imperfect here functions instructionally. 'Shall eat' preserves the
    directive force in legal material without sounding overly paraphrastic.
- source_word: בְּמָקוֹם טָהוֹר
  chosen: in a clean place
  alternatives:
  - in a pure place
  - in a ceremonially clean place
  lexicon: HALOT
  rationale: טָהוֹר in Levitical context concerns ritual cleanness. 'Clean place'
    is concise and natural; the ritual nuance is contextually evident. A more explicit
    'ceremonially clean place' would over-specify in the main text.
- source_word: אַתָּה וּבָנֶיךָ וּבְנֹתֶיךָ אִתָּךְ
  chosen: you, and your sons and your daughters with you
  alternatives:
  - you along with your sons and daughters
  - you and your sons and daughters with you
  lexicon: HALOT
  rationale: The Hebrew explicitly names sons and daughters, so the translation preserves
    that gendered wording rather than neutralizing it. 'With you' is retained because
    it is present in the source and clarifies household participation.
- source_word: חָקְךָ וְחָק בָּנֶיךָ
  chosen: your portion and your sons’ portion
  alternatives:
  - your due and your sons’ due
  - your statute and your sons’ statute
  lexicon: HALOT
  rationale: חֹק can mean statute, prescribed due, or allotted portion. In this sacrificial
    context it refers to the assigned priestly share, not a legal rule itself. 'Portion'
    communicates the sense clearly in English.
- source_word: נִתְּנוּ
  chosen: have been given
  alternatives:
  - are given
  - were given
  lexicon: HALOT
  rationale: The passive perfect indicates an established grant. 'Have been given'
    conveys the present standing result of that assignment.
- source_word: מִזִּבְחֵי שַׁלְמֵי
  chosen: from the sacrifices of the peace offerings
  alternatives:
  - from the sacrifices of the fellowship offerings
  - from the peace-offering sacrifices
  lexicon: HALOT
  rationale: זִבְחֵי שַׁלְמֵי is a construct chain referring to sacrifices belonging
    to the category of peace offerings. 'Peace offerings' preserves the traditional
    and likely broad covenantal sense of שְׁלָמִים better than the more interpretive
    'fellowship offerings'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the formal expression 'sons
    of Israel' is retained rather than flattened to 'Israelites' or 'people of Israel,'
    since the Hebrew idiom is explicit and conventional.
