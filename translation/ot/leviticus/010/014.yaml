theological_decisions:
- issue: Rendering of covenantal ethnic designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The source uses the standard masculine plural filial expression. Following
    the project's gender-accurate principle, the translation preserves the form rather
    than neutralizing it, while recognizing that it refers corporately to Israel as
    a people.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Rendering of שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The Hebrew term is traditionally rendered 'peace offerings' and carries
    a broader semantic field tied to wholeness/well-being. 'Fellowship offerings'
    is interpretive and narrows the sense, so it is not preferred in the main text.
  doctrine_reference: Translation philosophy §1, §5
