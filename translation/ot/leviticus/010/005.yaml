id: LEV.10.5
reference: Leviticus 10:5
source:
  edition: WLC
  text: וַֽ/יִּקְרְב֗וּ וַ/יִּשָּׂאֻ/ם֙ בְּ/כֻתֳּנֹתָ֔/ם אֶל מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה
    כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר מֹשֶֽׁה־׃
translation:
  text: So they came near and carried them in their tunics to outside the camp, just
    as Moses had said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their tunics.' The Hebrew preposition can indicate means, so the
      phrase may mean they carried the bodies while grasping or using the tunics.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  chosen: they came near
  alternatives:
  - they approached
  - they drew near
  lexicon: HALOT
  rationale: From קרב in the qal/wayyiqtol, indicating movement toward the bodies
    as Moses had commanded in the previous verse. 'Came near' is natural English and
    preserves the directional sense without overinterpreting ritual nuance.
- source_word: וַיִּשָּׂאֻם
  chosen: carried them
  alternatives:
  - lifted them
  - bore them
  lexicon: HALOT
  rationale: From נשׂא with 3mp object suffix, referring to Nadab and Abihu. 'Carried
    them' best fits the context of removing corpses from the sanctuary area; 'lifted'
    is too momentary and 'bore' is less natural in contemporary English.
- source_word: בְּכֻתֳּנֹתָם
  chosen: in their tunics
  alternatives:
  - by their tunics
  - in their coats
  - in their garments
  lexicon: HALOT
  rationale: כֻּתֹּנֶת denotes a tunic/undergarment-like robe. The preposition ב can
    indicate means or circumstance here. 'In their tunics' closely follows the Hebrew
    and suggests they were carried while wrapped in or by means of their tunics. 'Tunics'
    is more precise than the archaic 'coats.'
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: to outside the camp
  alternatives:
  - outside the camp
  - to the outside of the camp
  lexicon: HALOT
  rationale: The phrase literally includes movement toward a location outside the
    camp. 'To outside the camp' preserves the directional force of אֶל plus מִחוּץ
    better than a simple stative 'outside the camp,' while remaining understandable
    English.
- source_word: כַּאֲשֶׁר דִּבֶּר מֹשֶׁה
  chosen: just as Moses had said
  alternatives:
  - as Moses had spoken
  - as Moses said
  lexicon: HALOT
  rationale: This clause refers back to Moses' prior command. The English past perfect
    'had said' makes the sequence clear in context. 'Just as' captures the comparative
    force of כַּאֲשֶׁר.
