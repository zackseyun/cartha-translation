theological_decisions:
- issue: How to render God's declaration of holiness in relation to those who approach him
  chosen_reading: Among those who come near me I will show myself holy
  alternative_readings:
  - By those who come near me I will be treated as holy
  - In those near me I will be sanctified
  rationale: The Hebrew allows nuances of manifestation, recognition, and treatment of God's holiness. The chosen rendering preserves the divine initiative implied by the Niphal while keeping the priestly context of approach. It avoids narrowing the line to merely human obligation, while still allowing that implication to be heard.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: How to render אֶכָּבֵד in relation to public honor
  chosen_reading: I will be glorified
  alternative_readings:
  - I will be honored
  rationale: Both 'glorified' and 'honored' are viable. 'Glorified' better preserves the theological resonance of כבד in reference to God, while remaining understandable in modern English.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
