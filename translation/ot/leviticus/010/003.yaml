id: LEV.10.3
reference: Leviticus 10:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶֽל אַהֲרֹ֗ן הוּא֩ אֲשֶׁר דִּבֶּ֨ר יְהוָ֤ה לֵ/אמֹר֙ בִּ/קְרֹבַ֣/י
    אֶקָּדֵ֔שׁ וְ/עַל פְּנֵ֥י כָל הָ/עָ֖ם אֶכָּבֵ֑ד וַ/יִּדֹּ֖ם אַהֲרֹֽן־־׀־־׃
translation:
  text: 'Then Moses said to Aaron, “This is what the LORD spoke, saying: ‘Among those
    who come near me I will show myself holy, and before all the people I will be
    glorified.’” And Aaron was silent.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “By those who come near me I will be treated as holy.” The Hebrew can
      express either God's holiness being manifested or his being regarded as holy
      by those who approach him.
    reason: alternative_reading
  - marker: b
    text: Or, “I will be honored.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and common English Bible convention.
- source_word: הוּא אֲשֶׁר דִּבֶּר יְהוָה
  chosen: This is what the LORD spoke
  alternatives:
  - This is what the LORD said
  - This is what the LORD meant when he said
  lexicon: HALOT
  rationale: A natural but still close rendering of the identificational clause. 'Spoke'
    preserves the Hebrew verb דבר without adding interpretive expansion.
- source_word: בִּקְרֹבַי
  chosen: Among those who come near me
  alternatives:
  - By those who are near me
  - In those near me
  lexicon: HALOT
  rationale: The form literally means 'in/among my near ones' or 'those near me.'
    In priestly context it refers to those who approach God in worship/service. 'Among
    those who come near me' makes the relational and cultic sense clear in idiomatic
    English without over-specifying 'priests'.
- source_word: אֶקָּדֵשׁ
  chosen: I will show myself holy
  alternatives:
  - I will be sanctified
  - I will be shown holy
  - I will be treated as holy
  lexicon: HALOT
  rationale: Niphal of קדש here expresses God's holiness being manifested or acknowledged
    in those who approach him. 'Show myself holy' communicates the passive/reflexive
    nuance in clear English. More formal alternatives are possible, but this best
    balances accuracy and readability.
- source_word: וְעַל פְּנֵי כָל הָעָם
  chosen: before all the people
  alternatives:
  - in the sight of all the people
  - before the face of all the people
  lexicon: HALOT
  rationale: '''Before all the people'' is idiomatic English for the Hebrew expression
    ''upon the face of / before'' and preserves the public dimension of the statement.'
- source_word: אֶכָּבֵד
  chosen: I will be glorified
  alternatives:
  - I will be honored
  - I will show myself glorious
  lexicon: HALOT
  rationale: Niphal of כבד here denotes receiving honor/glory publicly. 'Be glorified'
    preserves the theological weight and links naturally with divine holiness in the
    parallel line.
- source_word: וַיִּדֹּם
  chosen: was silent
  alternatives:
  - kept silent
  - held his peace
  - became silent
  lexicon: HALOT
  rationale: The verb denotes silence or stillness in response. 'Was silent' is concise,
    natural, and preserves the solemn force of Aaron's reaction.
