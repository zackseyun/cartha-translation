id: LEV.8.34
reference: Leviticus 8:34
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֥ר עָשָׂ֖ה בַּ/יּ֣וֹם הַ/זֶּ֑ה צִוָּ֧ה יְהוָ֛ה לַ/עֲשֹׂ֖ת לְ/כַפֵּ֥ר
    עֲלֵי/כֶֽם׃
translation:
  text: Just as has been done on this day, the LORD has commanded to be done, to make
    atonement for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As was done today, so the LORD commanded it to be done, to make atonement
      for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces comparison with the preceding ritual actions. 'Just as' is
    natural modern English and preserves the comparative force.
- source_word: עָשָׂה
  chosen: has been done
  alternatives:
  - was done
  - he did
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb here functions idiomatically with
    unspecified agent in reference to the ritual just performed. English passive best
    conveys the sense without forcing an explicit subject.
- source_word: בַּיּוֹם הַזֶּה
  chosen: on this day
  alternatives:
  - today
  - in this day
  lexicon: HALOT
  rationale: A clear temporal phrase referring to the present ritual day. 'On this
    day' is slightly more formal than 'today' and fits the ceremonial context.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: Perfect verb rendered with present relevance in English; the command
    stands behind the current ritual action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: לַעֲשֹׂת
  chosen: to be done
  alternatives:
  - to do
  - to perform
  lexicon: HALOT
  rationale: 'Infinitive of עשה echoes the earlier verb. English passive infinitive
    avoids an awkward unspecified subject and matches the ritual sense: these actions
    are commanded to be carried out.'
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: Standard rendering of כפר in priestly sacrificial contexts. 'Make atonement'
    is both accurate and idiomatic, preserving the cultic-theological sense without
    over-specifying mechanism.
- source_word: עֲלֵיכֶם
  chosen: for you
  alternatives:
  - upon you
  - on your behalf
  lexicon: HALOT
  rationale: With כפר, על commonly yields the sense 'for/on behalf of.' 'For you'
    is concise and idiomatic in English.
