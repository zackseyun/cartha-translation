theological_decisions:
- issue: Rendering of כפר in sacrificial context
  chosen_reading: to make atonement for you
  alternative_readings:
  - to atone for you
  - to make expiation for you
  rationale: The verse states the purpose of the commanded ritual in priestly language.
    'Make atonement' preserves the established cultic meaning while remaining accessible.
    More technical alternatives like 'expiation' are possible but less readable; 'propitiation'
    would import a narrower theological category not explicit in the Hebrew here.
  doctrine_reference: Translation philosophy §6; preserve theological tension rather
    than resolve it
