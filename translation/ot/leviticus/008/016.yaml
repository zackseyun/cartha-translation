id: LEV.8.16
reference: Leviticus 8:16
source:
  edition: WLC
  text: וַ/יִּקַּ֗ח אֶֽת כָּל הַ/חֵלֶב֮ אֲשֶׁ֣ר עַל הַ/קֶּרֶב֒ וְ/אֵת֙ יֹתֶ֣רֶת הַ/כָּבֵ֔ד
    וְ/אֶת שְׁתֵּ֥י הַ/כְּלָיֹ֖ת וְ/אֶֽת חֶלְבְּ/הֶ֑ן וַ/יַּקְטֵ֥ר מֹשֶׁ֖ה הַ/מִּזְבֵּֽחָ/ה־־־־־׃
translation:
  text: He took all the fat that was on the entrails, the lobe of the liver, the two
    kidneys and their fat, and Moses burned them on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appendage of the liver'; the Hebrew term refers to a specific part
      of the liver removed in sacrificial preparation.
    reason: lexical_alternative
  - marker: b
    text: The verb can more specifically mean 'turned into smoke' or 'offered up in
      smoke' in sacrificial contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: He took
  alternatives:
  - And he took
  lexicon: HALOT
  rationale: Wayyiqtol of לקח, standard narrative preterite. English omits the initial
    conjunction for smoother modern narrative while preserving sequence.
- source_word: כָּל הַחֵלֶב
  chosen: all the fat
  lexicon: HALOT
  rationale: חֵלֶב in sacrificial contexts refers specifically to the fatty portions
    designated for offering, but 'fat' is the plain lexical equivalent and fits the
    immediate list of anatomical parts.
- source_word: אֲשֶׁר עַל הַקֶּרֶב
  chosen: that was on the entrails
  alternatives:
  - that was on the inward parts
  - that was on the inner organs
  lexicon: HALOT
  rationale: קֶרֶב here denotes the inner parts/viscera of the animal. 'Entrails'
    is concrete, natural English for sacrificial anatomy, without becoming overly
    technical.
- source_word: יֹתֶרֶת הַכָּבֵד
  chosen: the lobe of the liver
  alternatives:
  - the appendage of the liver
  - the long lobe of the liver
  lexicon: HALOT
  rationale: This expression in sacrificial legislation conventionally refers to the
    liver lobe/appendage removed with the fat. 'Lobe of the liver' is the clearest
    idiomatic rendering in modern English.
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  lexicon: HALOT
  rationale: Straightforward anatomical reference; dual number is naturally rendered
    'the two kidneys.'
- source_word: חֶלְבְּהֶן
  chosen: their fat
  lexicon: HALOT
  rationale: Pronominal suffix refers back to the kidneys; 'their fat' preserves the
    Hebrew structure clearly.
- source_word: וַיַּקְטֵר
  chosen: burned them
  alternatives:
  - turned into smoke
  - offered up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts קטר means to burn as an offering, often with
    the sense of producing smoke on the altar. 'Burned them' is concise and natural;
    the object 'them' is supplied in English from the preceding list.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Directional/locative ending with altar indicates the place of burning.
    'On the altar' is standard contemporary English.
