id: LEV.8.9
reference: Leviticus 8:9
source:
  edition: WLC
  text: וַ/יָּ֥שֶׂם אֶת הַ/מִּצְנֶ֖פֶת עַל רֹאשׁ֑/וֹ וַ/יָּ֨שֶׂם עַֽל הַ/מִּצְנֶ֜פֶת
    אֶל מ֣וּל פָּנָ֗י/ו אֵ֣ת צִ֤יץ הַ/זָּהָב֙ נֵ֣זֶר הַ/קֹּ֔דֶשׁ כַּ/אֲשֶׁ֛ר צִוָּ֥ה
    יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־׃
translation:
  text: And he put the turban on his head, and on the front of the turban he placed
    the gold plate, the holy crown, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred diadem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִּצְנֶפֶת
  chosen: turban
  alternatives:
  - headpiece
  - turban-like headdress
  lexicon: HALOT
  rationale: Refers to the distinctive priestly head covering. 'Turban' is the standard
    clear English equivalent and fits the cultic garment context better than the vaguer
    'headpiece'.
- source_word: אֶל מוּל פָּנָיו
  chosen: on the front of
  alternatives:
  - in front of
  - opposite his face
  - toward the front of his face
  lexicon: HALOT
  rationale: The idiom indicates placement at the front-facing part of the turban,
    not merely spatially 'in front of' Aaron. 'On the front of' communicates the attachment
    location in natural English.
- source_word: צִיץ
  chosen: plate
  alternatives:
  - rosette
  - blossom
  - ornament
  lexicon: HALOT
  rationale: In priestly attire contexts this denotes the gold ornament fastened to
    the turban (cf. Exod 28:36). Although the noun can elsewhere mean 'flower/blossom,'
    here the material and function favor 'plate' as the clearest contextual rendering.
- source_word: נֵזֶר הַקֹּדֶשׁ
  chosen: the holy crown
  alternatives:
  - the sacred diadem
  - the consecrated crown
  lexicon: HALOT
  rationale: This appositional phrase further identifies the gold plate as the consecrated
    emblem of priestly holiness. 'Holy crown' is transparent and close to the Hebrew;
    'diadem' is possible but less accessible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: וַיָּשֶׂם ... וַיָּשֶׂם
  chosen: put ... placed
  alternatives:
  - put ... put
  - set ... set
  lexicon: HALOT
  rationale: 'The same Hebrew verb occurs twice. Slight English variation avoids awkward
    repetition while preserving the same basic action in context: first clothing Aaron
    with the turban, then affixing the gold plate to it.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: The clause marks conformity to divine instruction. 'Just as' brings out
    the correspondence emphasis of כַּאֲשֶׁר in idiomatic English.
