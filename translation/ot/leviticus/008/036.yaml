id: LEV.8.36
reference: Leviticus 8:36
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אַהֲרֹ֖ן וּ/בָנָ֑י/ו אֵ֚ת כָּל הַ/דְּבָרִ֔ים אֲשֶׁר צִוָּ֥ה יְהוָ֖ה
    בְּ/יַד מֹשֶֽׁה־־־׃ס
translation:
  text: And Aaron and his sons did all the things that the LORD had commanded through
    Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning ''through Moses'' or
      ''by Moses as mediator.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - performed
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here summarizes obedient action in a straightforward narrative
    way. 'Did' is the most natural modern English equivalent and fits the object 'all
    the things.' 'Carried out' is possible but slightly more interpretive.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בנים with 3ms suffix specifically refers to Aaron's male offspring in
    this priestly context, not children generally. 'Sons' is gender-accurate and contextually
    precise.
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the things
  alternatives:
  - all the words
  - everything
  lexicon: HALOT
  rationale: דברים can mean 'words,' 'matters,' or 'things.' In this context of ritual
    instructions being obeyed, 'all the things' best conveys enacted commands without
    sounding wooden. 'Everything' is possible but less transparent to the Hebrew structure.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  rationale: Standard relative pronoun introducing the clause; 'that' is idiomatic
    modern English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The command precedes the obedience just narrated, so English past perfect
    smoothly reflects the sequence, though simple past would also be acceptable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' commonly denotes agency or mediation. 'Through
    Moses' communicates the mediating role clearly in natural English while preserving
    the sense of divine command delivered by Moses.
