id: LEV.8.20
reference: Leviticus 8:20
source:
  edition: WLC
  text: וְ/אֶת הָ/אַ֔יִל נִתַּ֖ח לִ/נְתָחָ֑י/ו וַ/יַּקְטֵ֤ר מֹשֶׁה֙ אֶת הָ/רֹ֔אשׁ
    וְ/אֶת הַ/נְּתָחִ֖ים וְ/אֶת הַ/פָּֽדֶר־־־־׃
translation:
  text: Then he cut the ram into its pieces, and Moses burned the head, the pieces,
    and the fat tail in smoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the suet' or 'the fat.' The Hebrew term refers to a fatty portion of
      the sacrificial animal; here it is rendered 'fat tail' in light of the ram offering
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: אַיִל in sacrificial contexts refers specifically to a ram, the standard
    English term for an adult male sheep used in offerings.
- source_word: נִתַּח לִנְתָחָיו
  chosen: cut ... into its pieces
  alternatives:
  - divided ... into its sections
  - cut up ... according to its pieces
  lexicon: HALOT
  rationale: The passive/perfect with the cognate noun from נתּח/נתח conveys dismembering
    or cutting into pieces. English idiom is best represented by 'cut ... into its
    pieces.'
- source_word: וַיַּקְטֵר
  chosen: burned ... in smoke
  alternatives:
  - offered up in smoke
  - turned into smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts denotes causing something to
    go up in smoke on the altar. 'Burned ... in smoke' preserves the cultic sense
    better than a bare 'burned' while remaining natural English.
- source_word: הָרֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: Straightforward anatomical term; no contextual reason to vary from the
    standard gloss.
- source_word: הַנְּתָחִים
  chosen: the pieces
  alternatives:
  - the parts
  - the sections
  lexicon: HALOT
  rationale: This repeats the cognate noun from the earlier clause and refers to the
    cut-up portions of the animal. 'Pieces' is the most natural and consistent rendering.
- source_word: הַפָּדֶר
  chosen: the fat tail
  alternatives:
  - the suet
  - the fat
  lexicon: HALOT
  rationale: In sacrificial-animal terminology, פָּדֶר refers to the fatty portion
    associated with the animal, and in the case of a ram is commonly understood as
    the fat tail. Rendering it specifically as 'fat tail' gives concrete sense in
    context and matches the sacrificial procedure.
