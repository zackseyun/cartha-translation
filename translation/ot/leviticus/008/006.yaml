id: LEV.8.6
reference: Leviticus 8:6
source:
  edition: WLC
  text: וַ/יַּקְרֵ֣ב מֹשֶׁ֔ה אֶֽת אַהֲרֹ֖ן וְ/אֶת בָּנָ֑י/ו וַ/יִּרְחַ֥ץ אֹתָ֖/ם בַּ/מָּֽיִם־־׃
translation:
  text: Then Moses brought Aaron and his sons near and washed them with water.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: brought ... near
  alternatives:
  - presented
  - brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near or present. In this ordination
    context, 'brought ... near' preserves the concrete movement toward the ritual
    setting without overformalizing it as 'presented.'
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here specifically refers to Aaron's male offspring who are being
    ordained as priests, so 'his sons' is both lexically precise and gender-accurate.
- source_word: וַיִּרְחַץ
  chosen: washed
  alternatives:
  - bathed
  lexicon: HALOT
  rationale: רחץ means to wash/bathe. 'Washed' is the more natural English choice
    here and does not imply a partial washing beyond what the text states; the object
    'them' and phrase 'with water' sufficiently convey the ritual act.
- source_word: אֹתָם
  chosen: them
  rationale: Direct object pronoun referring to Aaron and his sons together.
- source_word: בַּמָּיִם
  chosen: with water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: The beth preposition can be rendered 'with' or 'in' depending on idiom.
    In English, 'washed them with water' is the most natural expression for the means
    used in the washing.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The waw-consecutive advances the narrative. 'Then' gives readable modern
    English while preserving the sequential force better than a mechanically repeated
    'And.'
