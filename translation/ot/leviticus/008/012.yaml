theological_decisions:
- issue: Rendering קדשׁ in a priestly ordination context
  chosen_reading: to consecrate him
  alternative_readings:
  - to sanctify him
  - to make him holy
  rationale: The verse describes Aaron's ritual setting apart for priestly service.
    'Consecrate' preserves the cultic and vocational force of the Hebrew without importing
    later doctrinal nuances beyond the text.
  doctrine_reference: Translation philosophy §6; Affirmations (non-sectarian, text-grounded
    rendering)
