id: LEV.8.12
reference: Leviticus 8:12
source:
  edition: WLC
  text: וַ/יִּצֹק֙ מִ/שֶּׁ֣מֶן הַ/מִּשְׁחָ֔ה עַ֖ל רֹ֣אשׁ אַהֲרֹ֑ן וַ/יִּמְשַׁ֥ח אֹת֖/וֹ
    לְ/קַדְּשֽׁ/וֹ׃
translation:
  text: Then he poured some of the anointing oil on Aaron’s head and anointed him
    to consecrate him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּצֹק
  chosen: poured
  alternatives:
  - poured out
  lexicon: HALOT
  rationale: The verb יצק commonly denotes pouring a liquid. 'Poured' is the most
    natural modern English rendering here; 'poured out' is possible but slightly more
    expansive than the Hebrew requires.
- source_word: מִשֶּׁמֶן הַמִּשְׁחָה
  chosen: some of the anointing oil
  alternatives:
  - from the anointing oil
  - of the oil of anointing
  lexicon: HALOT
  rationale: The preposition מִן with 'oil' naturally indicates that a portion was
    taken from the anointing oil. 'Anointing oil' is idiomatic English for שֶׁמֶן
    הַמִּשְׁחָה, while 'some of' makes explicit the partitive sense without overtranslating.
- source_word: עַל רֹאשׁ אַהֲרֹן
  chosen: on Aaron’s head
  alternatives:
  - upon Aaron’s head
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'On' is preferred over the more archaic
    'upon' for readable modern English.
- source_word: וַיִּמְשַׁח
  chosen: anointed
  lexicon: HALOT
  rationale: This is the standard rendering of משׁח in priestly consecration contexts
    and preserves the ritual/theological significance of the act.
- source_word: לְקַדְּשׁוֹ
  chosen: to consecrate him
  alternatives:
  - to sanctify him
  - to make him holy
  lexicon: HALOT
  rationale: קדשׁ in priestly installation contexts refers to setting apart for sacred
    service. 'Consecrate' best captures this cultic sense in clear English; 'sanctify'
    is possible but more ecclesiastical and less immediately transparent to modern
    readers.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: Hebrew grammar
  rationale: The waw-consecutive advances the narrative. 'Then' conveys sequence naturally
    in English, while preserving the flow of the ritual actions.
