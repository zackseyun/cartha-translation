theological_decisions:
- issue: Meaning of hand-laying in sacrificial ritual
  chosen_reading: Render the action descriptively without importing a specific theological
    explanation such as transfer of guilt, identification, or consecration into the
    translation itself.
  alternative_readings:
  - The gesture may signify identification with the offering
  - The gesture may signify transfer of guilt or liability
  - The gesture may signify designation/consecration of the animal for sacrifice
  rationale: The verse narrates the ritual act but does not explicitly explain its
    theological mechanism. In keeping with the doctrine of preserving theological
    tension rather than resolving it, the translation states only what the Hebrew
    says.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
