id: LEV.8.14
reference: Leviticus 8:14
source:
  edition: WLC
  text: וַ/יַּגֵּ֕שׁ אֵ֖ת פַּ֣ר הַֽ/חַטָּ֑את וַ/יִּסְמֹ֨ךְ אַהֲרֹ֤ן וּ/בָנָי/ו֙ אֶת
    יְדֵי/הֶ֔ם עַל רֹ֖אשׁ פַּ֥ר הַֽ/חַטָּֽאת־־׃
translation:
  text: Then he brought near the bull of the sin offering, and Aaron and his sons
    laid their hands on the head of the bull of the sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented' or 'brought forward' for 'brought near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּשׁ
  chosen: brought near
  alternatives:
  - presented
  - brought forward
  lexicon: HALOT
  rationale: The verb נגשׁ in the Hiphil commonly means to bring near or present.
    'Brought near' preserves the ritual sense of approaching/presenting before the
    LORD while remaining natural English.
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - bull calf
  lexicon: HALOT
  rationale: פַּר denotes a bull in sacrificial contexts. 'Bull' is the clearest and
    most idiomatic rendering here; 'young bull' is possible in some contexts but not
    required by this verse alone.
- source_word: הַחַטָּאת
  chosen: sin offering
  alternatives:
  - sin sacrifice
  - offering for sin
  lexicon: HALOT
  rationale: חַטָּאת can denote either sin or the sin offering; in sacrificial legislation
    the offering sense is clearly intended. 'Sin offering' is the standard and accurate
    cultic rendering.
- source_word: וַיִּסְמֹךְ
  chosen: laid
  alternatives:
  - leaned
  - placed
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts refers to the ritual act of laying
    or pressing the hand on the animal. 'Laid' is idiomatic in English and matches
    established sacrificial terminology without over-specifying the pressure implied.
- source_word: יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their hand
  lexicon: HALOT
  rationale: The Hebrew uses the plural 'hands,' and English naturally does the same
    here. This preserves the physicality of the ordination/sacrificial gesture.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: This is a straightforward spatial expression in ritual context. 'On the
    head of' is clear modern English and sufficiently formal for the scene.
