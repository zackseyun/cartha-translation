id: LEV.8.10
reference: Leviticus 8:10
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח מֹשֶׁה֙ אֶת שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה וַ/יִּמְשַׁ֥ח אֶת הַ/מִּשְׁכָּ֖ן
    וְ/אֶת כָּל אֲשֶׁר בּ֑/וֹ וַ/יְקַדֵּ֖שׁ אֹתָֽ/ם־־־־־׃
translation:
  text: Then Moses took the anointing oil and anointed the tabernacle and all that
    was in it, and he consecrated them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctified them' or 'made them holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then Moses took
  alternatives:
  - And Moses took
  - Moses took
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative sequence. 'Then' captures the consecutive
    force in natural English, while retaining the simple verbal sense 'took'.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  - the sacred anointing oil
  lexicon: HALOT
  rationale: Construct phrase meaning oil used for anointing. 'The anointing oil'
    is idiomatic and sufficiently formal; 'sacred' is not explicit in this verse and
    so is not added.
- source_word: וַיִּמְשַׁח
  chosen: anointed
  alternatives:
  - smeared
  - applied
  lexicon: HALOT
  rationale: Standard cultic verb for applying oil in order to set apart. 'Anointed'
    preserves the ritual and theological sense better than more physical alternatives.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the tent dwelling
  - the dwelling place
  lexicon: HALOT
  rationale: Established and accurate rendering for the sanctuary structure in Exodus-Leviticus
    contexts. It preserves the technical cultic reference better than a more generic
    phrase.
- source_word: כָּל אֲשֶׁר בּוֹ
  chosen: all that was in it
  alternatives:
  - everything in it
  - all that was within it
  lexicon: HALOT
  rationale: Refers comprehensively to the contents/furnishings of the tabernacle.
    'All that was in it' is clear, natural, and close to the Hebrew.
- source_word: וַיְקַדֵּשׁ אֹתָם
  chosen: and he consecrated them
  alternatives:
  - and he sanctified them
  - and he made them holy
  lexicon: HALOT
  rationale: קדשׁ in priestly/cultic context commonly means to set apart as holy.
    'Consecrated' communicates this ritual setting-apart in accessible modern English.
    The plural 'them' refers to the tabernacle and all its contents together.
