theological_decisions:
- issue: Rendering קדשׁ in a priestly ritual context
  chosen_reading: consecrated
  alternative_readings:
  - sanctified
  - made holy
  rationale: The verse describes ritual setting apart of the tabernacle and its contents.
    'Consecrated' best preserves the cultic force without importing later doctrinal
    nuance or sounding overly archaic.
  doctrine_reference: Translation philosophy §6; §5 consistency of key terms
