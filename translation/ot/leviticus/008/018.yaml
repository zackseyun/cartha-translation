id: LEV.8.18
reference: Leviticus 8:18
source:
  edition: WLC
  text: וַ/יַּקְרֵ֕ב אֵ֖ת אֵ֣יל הָ/עֹלָ֑ה וַֽ/יִּסְמְכ֞וּ אַהֲרֹ֧ן וּ/בָנָ֛י/ו אֶת
    יְדֵי/הֶ֖ם עַל רֹ֥אשׁ הָ/אָֽיִל־־׃
translation:
  text: Then he brought near the ram for the burnt offering, and Aaron and his sons
    laid their hands on the head of the ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented' or 'brought forward' for 'brought near.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be rendered 'leaned' or 'placed' their hands, referring
      to the ritual act performed over a sacrificial animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: Then he brought near
  alternatives:
  - Then he presented
  - Then he brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present. 'Brought near' preserves
    the ritual sense and stays close to the Hebrew; 'he' refers to Moses from the
    immediate context.
- source_word: אֵיל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the male sheep specified here; context is sacrificial
    animal terminology.
- source_word: הָעֹלָה
  chosen: for the burnt offering
  alternatives:
  - of burnt offering
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term 'burnt offering.' Rendering with
    'for' makes natural English while preserving that this ram is designated for that
    offering.
- source_word: וַיִּסְמְכוּ
  chosen: laid
  alternatives:
  - leaned
  - placed
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts refers to the ritual act of laying/pressing
    hands on the animal. 'Laid' is idiomatic in English for this established ritual
    action.
- source_word: יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: Plural is explicit in Hebrew and should be retained.
- source_word: עַל רֹאשׁ הָאָיִל
  chosen: on the head of the ram
  alternatives:
  - upon the ram's head
  lexicon: HALOT
  rationale: A straightforward formal rendering of the prepositional phrase; clear
    and natural in English.
