theological_decisions:
- issue: Ritual hand-laying in sacrificial context
  chosen_reading: laid their hands on the head of the ram
  alternative_readings:
  - leaned their hands on the head of the ram
  - placed their hands on the head of the ram
  rationale: The text describes the formal sacrificial gesture without importing a
    fuller theological explanation such as transfer of guilt or identification, since
    this verse itself does not explicitly state that meaning. The translation preserves
    the ritual action and leaves interpretation to context.
  doctrine_reference: Preserve theological tension rather than resolve it.
