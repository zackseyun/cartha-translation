theological_decisions:
- issue: Ritual application of sacrificial blood to Aaron's extremities
  chosen_reading: Render descriptively without importing symbolic interpretation
  alternative_readings:
  - Imply consecration symbolism in the main text
  - Expand to explain priestly ordination significance
  rationale: The verse narrates the ritual act itself; while the action has theological
    significance in context, the translation should not embed interpretive symbolism
    beyond the Hebrew wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
