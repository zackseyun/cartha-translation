id: LEV.8.23
reference: Leviticus 8:23
source:
  edition: WLC
  text: וַ/יִּשְׁחָ֓ט וַ/יִּקַּ֤ח מֹשֶׁה֙ מִ/דָּמ֔/וֹ וַ/יִּתֵּ֛ן עַל תְּנ֥וּךְ אֹֽזֶן
    אַהֲרֹ֖ן הַ/יְמָנִ֑ית וְ/עַל בֹּ֤הֶן יָד/וֹ֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן רַגְל֖/וֹ
    הַ/יְמָנִֽית׀־־־־׃
translation:
  text: And he slaughtered it, and Moses took some of its blood and put it on the
    lobe of Aaron’s right ear, and on the thumb of his right hand, and on the big
    toe of his right foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tip of Aaron’s right ear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחָט
  chosen: he slaughtered it
  alternatives:
  - he killed it
  - he slaughtered
  lexicon: HALOT
  rationale: The verb denotes ritual slaughter in sacrificial context, so 'slaughtered'
    is more precise than the generic 'killed.' The object 'it' is supplied naturally
    in English from the immediate context.
- source_word: מִדָּמוֹ
  chosen: some of its blood
  alternatives:
  - from its blood
  - of its blood
  lexicon: HALOT
  rationale: The preposition מִן with 'blood' is idiomatically rendered 'some of its
    blood' in English, expressing that Moses took a portion rather than the totality.
- source_word: תְּנוּךְ אֹזֶן
  chosen: the lobe of ... ear
  alternatives:
  - the tip of ... ear
  - the cartilage of ... ear
  lexicon: HALOT
  rationale: This expression refers to the outer extremity/lobe of the ear in priestly
    ritual texts. 'Lobe' is the clearest natural English rendering in this context.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - right side
  lexicon: HALOT
  rationale: The adjective specifies the right-side member. English idiom uses 'right
    ear/hand/foot' rather than 'right-side ear/hand/foot.'
- source_word: בֹּהֶן יָדוֹ
  chosen: the thumb of his ... hand
  alternatives:
  - the big thumb of his hand
  lexicon: HALOT
  rationale: בֹּהֶן denotes the thumb for the hand (and big toe for the foot). 'Thumb'
    is the standard and contextually exact rendering.
- source_word: בֹּהֶן רַגְלוֹ
  chosen: the big toe of his ... foot
  alternatives:
  - the toe of his foot
  lexicon: HALOT
  rationale: In reference to the foot, בֹּהֶן specifically denotes the great toe.
    'Big toe' preserves the anatomical specificity of the Hebrew.
- source_word: וַיִּתֵּן עַל
  chosen: put it on
  alternatives:
  - placed it on
  - applied it to
  lexicon: HALOT
  rationale: The combination is straightforwardly rendered 'put ... on' in readable
    modern English. 'Applied' is possible in ritual context but slightly more interpretive.
