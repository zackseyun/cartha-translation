id: LEV.8.2
reference: Leviticus 8:2
source:
  edition: WLC
  text: קַ֤ח אֶֽת אַהֲרֹן֙ וְ/אֶת בָּנָ֣י/ו אִתּ֔/וֹ וְ/אֵת֙ הַ/בְּגָדִ֔ים וְ/אֵ֖ת
    שֶׁ֣מֶן הַ/מִּשְׁחָ֑ה וְ/אֵ֣ת פַּ֣ר הַֽ/חַטָּ֗את וְ/אֵת֙ שְׁנֵ֣י הָֽ/אֵילִ֔ים
    וְ/אֵ֖ת סַ֥ל הַ/מַּצּֽוֹת־־׀׃
translation:
  text: Take Aaron and his sons with him, and the garments, and the anointing oil,
    and the bull for the sin offering, and the two rams, and the basket of unleavened
    bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the bull for the purification offering.' The Hebrew term can refer
      to the offering associated with sin and ritual purification.
    reason: alternative_reading
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Bring
  - Fetch
  lexicon: HALOT
  rationale: Imperative 2ms of לקח. In this procedural cultic context, 'Take' is the
    most direct and natural English equivalent, preserving the command form without
    overinterpreting movement as 'bring' unless context requires it.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: בָּנָיו אִתּוֹ
  chosen: his sons with him
  alternatives:
  - his sons
  - his sons with Aaron
  lexicon: HALOT
  rationale: The phrase explicitly includes both 'his sons' and 'with him.' The pronoun
    most naturally refers back to Aaron, so 'his sons with him' preserves the Hebrew
    structure and avoids omitting אִתּוֹ as redundant.
- source_word: הַבְּגָדִים
  chosen: the garments
  alternatives:
  - the clothes
  - the vestments
  lexicon: HALOT
  rationale: בגדים is the ordinary term for garments/clothing. In this priestly context
    the items are sacred vestments, but 'garments' preserves the lexical value without
    importing a more technical term not present in the Hebrew.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'oil of anointing.' 'The anointing
    oil' is idiomatic modern English and preserves the ritual significance.
- source_word: פַּר הַחַטָּאת
  chosen: the bull for the sin offering
  alternatives:
  - the bull of the sin offering
  - the bull for the purification offering
  lexicon: HALOT
  rationale: פַּר is 'bull.' חטאת in sacrificial contexts can denote either 'sin'
    or the 'sin offering.' English requires the sacrificial sense here. 'For the sin
    offering' is clear and natural. 'Purification offering' is a defensible contextual
    alternative, but 'sin offering' remains the more established and broadly recognizable
    rendering unless a stronger contextual reason demands otherwise.
- source_word: שְׁנֵי הָאֵילִים
  chosen: the two rams
  lexicon: HALOT
  rationale: Straightforward numeral + noun phrase. 'Rams' is the standard rendering
    of אילים in sacrificial contexts.
- source_word: סַל הַמַּצּוֹת
  chosen: the basket of unleavened bread
  alternatives:
  - the basket of unleavened cakes
  - the basket of unleavened loaves
  lexicon: HALOT
  rationale: מַצּוֹת refers to unleavened bread/things made without leaven. 'Basket
    of unleavened bread' is a natural collective rendering in English and fits the
    ritual context. More specific forms such as 'cakes' are possible but not demanded
    by this verse alone.
