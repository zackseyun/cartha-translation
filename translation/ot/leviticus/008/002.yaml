theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote both sin and the offering associated with
    sin/purification. In Levitical sacrificial legislation, both renderings are discussed
    in scholarship. Here the immediate referent is the sacrificial animal, so an offering
    sense is required. 'Sin offering' is retained in the main text for clarity and
    continuity, while the alternative is preserved because it may better highlight
    the ritual purification dimension without changing the basic referent.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
