id: LEV.8.17
reference: Leviticus 8:17
source:
  edition: WLC
  text: וְ/אֶת הַ/פָּ֤ר וְ/אֶת עֹר/וֹ֙ וְ/אֶת בְּשָׂר֣/וֹ וְ/אֶת פִּרְשׁ֔/וֹ שָׂרַ֣ף בָּ/אֵ֔שׁ מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־׃
translation:
  text: But the bull, along with its hide, its flesh, and its dung, he burned with fire outside the camp, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its skin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its excrement'; Hebrew פֶּרֶשׁ refers specifically to dung, not merely general refuse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  - the bull of the sin offering
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is the plain lexical sense here. 'Bull of the sin offering' is contextually true from the surrounding passage but is not explicitly stated in this verse, so it is not imported into the main text.
- source_word: עֹרוֹ
  chosen: its hide
  alternatives:
  - its skin
  lexicon: HALOT
  rationale: עוֹר commonly means skin/hide. 'Hide' fits the animal-sacrifice context more naturally in English and distinguishes the animal's outer covering as a removed carcass part.
- source_word: בְּשָׂרוֹ
  chosen: its flesh
  alternatives:
  - its meat
  - its body
  lexicon: HALOT
  rationale: בָּשָׂר is regularly 'flesh.' 'Meat' is possible in some contexts, but 'flesh' preserves the sacrificial register and remains clear in modern English.
- source_word: פִּרְשׁוֹ
  chosen: its dung
  alternatives:
  - its refuse
  - its offal
  lexicon: HALOT
  rationale: פֶּרֶשׁ refers specifically to excrement/dung. 'Dung' is the most direct and transparent rendering. 'Offal' would be less precise and could blur the concrete sense of the Hebrew.
- source_word: שָׂרַף בָּאֵשׁ
  chosen: he burned with fire
  alternatives:
  - he burned in the fire
  - he incinerated
  lexicon: HALOT
  rationale: The verb שׂרף means 'burn,' and the phrase with בָאֵשׁ is idiomatically 'burn with fire.' This preserves the Hebrew emphasis without becoming wooden. 'Incinerated' is too technical.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: This is the standard and natural rendering of the phrase. 'Camp' is both accurate and idiomatic in Pentateuchal sacrificial contexts.
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... had commanded
  alternatives:
  - as ... commanded
  - according as ... commanded
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר introduces correspondence: Moses acted in conformity with the command. ''Just as'' expresses this naturally in English.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֶת ... וְאֶת ... וְאֶת ... וְאֶת
  chosen: along with its hide, its flesh, and its dung
  alternatives:
  - and its hide and its flesh and its dung
  lexicon: Hebrew grammar
  rationale: The repeated direct-object markers and conjunctions list the parts of the bull. 'Along with' smooths the English while preserving the cumulative force of the Hebrew list under optimal equivalence.
