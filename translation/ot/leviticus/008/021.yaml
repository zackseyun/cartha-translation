theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    of the Tetragrammaton. This verse contains no contextual factor requiring deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic phrase לְרֵיחַ נִיחֹחַ
  chosen_reading: for a pleasing aroma
  alternative_readings:
  - for a soothing aroma
  - for a sweet aroma
  rationale: The phrase should communicate divine acceptance of the sacrifice without
    implying literal divine olfaction in a crude sense or importing later theological
    categories. 'Pleasing aroma' preserves the metaphor and readability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English;
    preserve theological tension rather than resolve it'
