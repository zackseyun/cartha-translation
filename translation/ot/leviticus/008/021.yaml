id: LEV.8.21
reference: Leviticus 8:21
source:
  edition: WLC
  text: וְ/אֶת הַ/קֶּ֥רֶב וְ/אֶת הַ/כְּרָעַ֖יִם רָחַ֣ץ בַּ/מָּ֑יִם וַ/יַּקְטֵר֩ מֹשֶׁ֨ה
    אֶת כָּל הָ/אַ֜יִל הַ/מִּזְבֵּ֗חָ/ה עֹלָ֨ה ה֤וּא לְ/רֵֽיחַ נִיחֹ֨חַ֙ אִשֶּׁ֥ה
    הוּא֙ לַ/יהוָ֔ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־־׃
translation:
  text: He washed the entrails and the legs with water, and Moses turned the whole
    ram into smoke on the altar. It was a burnt offering for a pleasing aroma, a food
    offering to the LORD, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an offering by fire to the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶּרֶב
  chosen: entrails
  alternatives:
  - inner parts
  - inward parts
  lexicon: HALOT
  rationale: Refers to the internal organs/inner parts of the sacrificial animal.
    'Entrails' is concrete and natural in English for sacrificial context, without
    being euphemistic.
- source_word: כְּרָעַיִם
  chosen: legs
  alternatives:
  - shanks
  - lower legs
  lexicon: HALOT
  rationale: In sacrificial instructions this term denotes the legs of the animal,
    especially the lower limbs. 'Legs' is the clearest modern English rendering.
- source_word: רָחַץ בַּמָּיִם
  chosen: washed ... with water
  alternatives:
  - rinsed ... with water
  lexicon: HALOT
  rationale: The verb means to wash. Retaining 'with water' reflects the explicit
    Hebrew phrase and preserves ritual concreteness.
- source_word: וַיַּקְטֵר
  chosen: turned ... into smoke
  alternatives:
  - burned
  - offered up in smoke
  lexicon: HALOT
  rationale: In priestly sacrificial contexts this verb specifically refers to causing
    an offering to go up in smoke on the altar, not merely generic burning. 'Turned
    ... into smoke' preserves that cultic nuance better than plain 'burned'.
- source_word: כָּל הָאַיִל
  chosen: the whole ram
  alternatives:
  - all of the ram
  lexicon: HALOT
  rationale: כָּל marks the entirety of the animal being offered. 'The whole ram'
    is idiomatic and precise.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard locative sense with directional ending in sacrificial context;
    'on the altar' is natural modern English.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: Established and accurate rendering for the sacrificial category denoting
    an offering that ascends in smoke. 'Whole burnt offering' is possible, but 'whole'
    is already conveyed earlier by כָּל.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: for a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet aroma
  lexicon: HALOT
  rationale: This stock sacrificial phrase denotes acceptability/pleasingness before
    God. 'Pleasing aroma' is clear modern English and avoids archaic 'sweet savor'
    while preserving the sensory metaphor.
- source_word: אִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Food offering' is a common
    contextual rendering in Leviticus because the offering is presented as God's altar-food,
    while remaining accessible. The alternative 'offering by fire' is preserved in
    a footnote because it is a viable more formal rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine. 'To the LORD'
    fits the dative/benefactive sense in sacrificial presentation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD,'
    preserving Jewish reverence tradition and the long-standing English convention.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This closing formula marks conformity to divine instruction. 'Just as'
    brings out the correspondence emphasized by כַּאֲשֶׁר, and the past perfect reads
    naturally in narrative English.
