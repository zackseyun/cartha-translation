id: LEV.8.29
reference: Leviticus 8:29
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח מֹשֶׁה֙ אֶת הֶ֣/חָזֶ֔ה וַ/יְנִיפֵ֥/הוּ תְנוּפָ֖ה לִ/פְנֵ֣י יְהוָ֑ה מֵ/אֵ֣יל הַ/מִּלֻּאִ֗ים לְ/מֹשֶׁ֤ה הָיָה֙ לְ/מָנָ֔ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־׃
translation:
  text: Then Moses took the breast and waved it as a wave offering before Yahweh. It was Moses' portion from the ram of ordination, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the ram of consecration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then Moses took
  alternatives:
  - And Moses took
  - So Moses took
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'Then' gives natural English sequence while preserving the simple verbal sense 'took.'
- source_word: הֶחָזֶה
  chosen: the breast
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: In sacrificial contexts חָזֶה refers specifically to the breast portion of the animal; 'breast' is the standard and most precise cultic rendering.
- source_word: וַיְנִיפֵהוּ תְנוּפָה
  chosen: waved it as a wave offering
  alternatives:
  - presented it as a wave offering
  - waved it as an elevation offering
  lexicon: HALOT
  rationale: The verb נוּף with the cognate noun תְּנוּפָה denotes the ritual waving/presentation motion. Rendering both elements preserves the Hebrew emphasis and the technical sacrificial term.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/cultic phrase indicating presentation in Yahweh's presence. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵאֵיל הַמִּלֻּאִים
  chosen: from the ram of ordination
  alternatives:
  - from the ram of consecration
  - from the ram of filling
  lexicon: HALOT
  rationale: אֵיל is 'ram.' מִלֻּאִים in this priestly context refers to ordination/consecration rites. 'Ordination' is concise and idiomatic in English for the priestly installation context.
- source_word: לְמֹשֶׁה הָיָה לְמָנָה
  chosen: It was Moses’ portion
  alternatives:
  - it belonged to Moses as a share
  - it became Moses' allotment
  lexicon: HALOT
  rationale: מָנָה denotes an assigned share or portion. The clause states that this sacrificial part belonged to Moses; 'portion' is natural and accurate.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: Formulaic compliance statement. English past perfect fits the sense that Moses' action accorded with a prior divine command.
