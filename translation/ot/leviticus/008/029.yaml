theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic term מִלֻּאִים in priestly installation context
  chosen_reading: ordination
  alternative_readings:
  - consecration
  rationale: Both are possible in English, but 'ordination' best matches the priestly installation setting of Leviticus 8 and keeps the phrase concise. This is a lexical-contextual choice, not a doctrinally loaded one.
