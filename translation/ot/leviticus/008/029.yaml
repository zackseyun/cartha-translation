theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse contains no contextual pressure to depart from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term מִלֻּאִים in priestly installation context
  chosen_reading: ordination
  alternative_readings:
  - consecration
  rationale: Both are possible in English, but 'ordination' best matches the priestly
    installation setting of Leviticus 8 and keeps the phrase concise. This is a lexical-contextual
    choice, not a doctrinally loaded one.
