id: LEV.8.32
reference: Leviticus 8:32
source:
  edition: WLC
  text: וְ/הַ/נּוֹתָ֥ר בַּ/בָּשָׂ֖ר וּ/בַ/לָּ֑חֶם בָּ/אֵ֖שׁ תִּשְׂרֹֽפוּ׃
translation:
  text: And what remains of the meat and of the bread you shall burn in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flesh' instead of 'meat.' The Hebrew word is literally 'flesh,' but
      here refers to sacrificial animal food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  chosen: And what remains
  alternatives:
  - And the remainder
  - And what is left over
  lexicon: HALOT
  rationale: The Niphal participle from יתר/נותר denotes that which is left over or
    remains. 'What remains' is natural modern English and preserves the substantival
    force of the participle.
- source_word: בַּבָּשָׂר
  chosen: of the meat
  alternatives:
  - of the flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in sacrificial-food context 'meat'
    communicates edible animal flesh more idiomatically in English without losing
    meaning.
- source_word: וּבַלָּחֶם
  chosen: and of the bread
  alternatives:
  - and of the loaf
  lexicon: HALOT
  rationale: לֶחֶם is the ordinary word for bread. The preposition with conjunction
    is best represented by 'and of the bread' to match the parallel construction with
    'of the meat.'
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  lexicon: HALOT
  rationale: The Hebrew preposition ב here marks the means or sphere of burning. 'In
    the fire' is the most direct and conventional rendering in sacrificial instructions.
- source_word: תִּשְׂרֹפוּ
  chosen: you shall burn
  alternatives:
  - you must burn
  lexicon: HALOT
  rationale: The imperfect second masculine plural in legal/instructional context
    carries directive force. 'You shall burn' preserves the formal instructional tone
    typical of Torah legislation.
