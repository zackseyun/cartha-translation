id: LEV.8.13
reference: Leviticus 8:13
source:
  edition: WLC
  text: וַ/יַּקְרֵ֨ב מֹשֶׁ֜ה אֶת בְּנֵ֣י אַהֲרֹ֗ן וַ/יַּלְבִּשֵׁ֤/ם כֻּתֳּנֹת֙ וַ/יַּחְגֹּ֤ר
    אֹתָ/ם֙ אַבְנֵ֔ט וַ/יַּחֲבֹ֥שׁ לָ/הֶ֖ם מִגְבָּע֑וֹת כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה
    אֶת מֹשֶֽׁה־־׃
translation:
  text: Then Moses brought Aaron’s sons near, and clothed them with tunics, and wrapped
    sashes around them, and bound caps on them, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented Aaron’s sons.' The Hebrew verb can mean 'bring near' or 'present'
      in a ritual setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'girded them with a sash'—that is, each son with his priestly sash.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew divine name is YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: brought ... near
  alternatives:
  - presented
  - brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near or present. 'Brought near'
    preserves the ritual sense of approaching for consecration without over-specifying
    a technical presentation formula.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Aaron’s sons' is natural modern
    English and preserves the male familial reference required by the Hebrew.
- source_word: וַיַּלְבִּשֵׁם
  chosen: clothed them
  alternatives:
  - dressed them
  - put garments on them
  lexicon: HALOT
  rationale: The verb לבשׁ in Hiphil means to clothe someone. 'Clothed them' is concise
    and suitably formal for priestly investiture.
- source_word: כֻּתֳּנֹת
  chosen: tunics
  alternatives:
  - coats
  - robes
  lexicon: HALOT
  rationale: כֻּתֹּנֶת refers to a basic long shirt-like garment. 'Tunics' is the
    most standard and accurate English rendering in priestly contexts.
- source_word: וַיַּחְגֹּר אֹתָם אַבְנֵט
  chosen: wrapped sashes around them
  alternatives:
  - girded them with a sash
  - fastened a sash on them
  - belted them with sashes
  lexicon: HALOT
  rationale: חגר means to gird or wrap on, and אַבְנֵט is the priestly sash. Although
    the noun appears singular, it is distributive with a plural object ('each with
    a sash'). 'Wrapped sashes around them' communicates the action clearly in modern
    English.
- source_word: אַבְנֵט
  chosen: sashes
  alternatives:
  - sash
  - waistbands
  - belts
  lexicon: HALOT
  rationale: The priestly garment is better rendered 'sash' than 'belt' because it
    is a cloth vestment, not a leather belt. English plural reflects distributive
    sense with multiple sons.
- source_word: וַיַּחֲבֹשׁ לָהֶם
  chosen: bound ... on them
  alternatives:
  - tied ... on them
  - put ... on them
  lexicon: HALOT
  rationale: חבשׁ here refers to binding or wrapping a headdress onto someone. 'Bound
    ... on them' preserves the more specific action better than the generic 'put'.
- source_word: מִגְבָּעוֹת
  chosen: caps
  alternatives:
  - headgear
  - turbans
  - headdresses
  lexicon: HALOT
  rationale: This term denotes the special head coverings of ordinary priests, distinct
    from Aaron’s turban. 'Caps' is conventional and distinguishes them from the high
    priest's headpiece.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This recurring compliance formula marks exact obedience. 'Just as' slightly
    highlights conformity, and 'the LORD' follows the project's default rendering
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
