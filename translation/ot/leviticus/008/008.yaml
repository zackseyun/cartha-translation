theological_decisions:
- issue: Rendering of the priestly objects אוּרִים וְתֻּמִּים
  chosen_reading: Transliterate as 'the Urim and the Thummim'
  alternative_readings:
  - the lights and the perfections
  - the sacred lots
  rationale: The exact nature of these objects is uncertain, though they are associated
    with priestly discernment. Transliteration preserves the text's specificity without
    importing a disputed explanation. This follows the translation philosophy of not
    resolving ambiguity beyond what the Hebrew warrants.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
