id: LEV.8.8
reference: Leviticus 8:8
source:
  edition: WLC
  text: וַ/יָּ֥שֶׂם עָלָ֖י/ו אֶת הַ/חֹ֑שֶׁן וַ/יִּתֵּן֙ אֶל הַ/חֹ֔שֶׁן אֶת הָ/אוּרִ֖ים
    וְ/אֶת הַ/תֻּמִּֽים־־־־׃
translation:
  text: And he placed the breastpiece on him, and he put the Urim and the Thummim
    into the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breastplate.' Hebrew חֹשֶׁן refers to the high priest's chest-piece;
      'breastpiece' avoids suggesting armor.
    reason: lexical_alternative
  - marker: b
    text: '''Urim'' and ''Thummim'' are Hebrew ritual terms traditionally transliterated;
      their exact form and method of use are uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: placed
  alternatives:
  - set
  - put
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, place, set.' 'Placed' fits the ceremonial
    dressing context smoothly in English and distinguishes this action slightly from
    the following נָתַן without overstating a semantic difference.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix is spatial here, referring
    to Aaron as the one being vested. 'On him' is natural modern English and preserves
    the physical sense.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  lexicon: HALOT
  rationale: חֹשֶׁן refers to the priestly chest ornament/pouch associated with judgment.
    'Breastpiece' is clearer and more precise in modern English than 'breastplate,'
    which can suggest armor. The same gloss is kept for both occurrences for consistency.
- source_word: וַיִּתֵּן
  chosen: put
  alternatives:
  - gave
  - placed
  lexicon: HALOT
  rationale: נָתַן is broadly 'give, put, set.' Because the object is inserted into
    the breastpiece, 'put' best matches the local sense and reads naturally with the
    following prepositional phrase.
- source_word: אֶל הַחֹשֶׁן
  chosen: into the breastpiece
  alternatives:
  - in the breastpiece
  - to the breastpiece
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this context of depositing the Urim
    and Thummim within the breastpiece, idiomatic English is 'into the breastpiece.'
    This reflects the functional sense without unnecessary literalism.
- source_word: הָאוּרִים
  chosen: the Urim
  alternatives:
  - lights
  lexicon: HALOT
  rationale: אוּרִים is a technical cultic term referring to the sacred lot/device
    used for divine decision. It is best transliterated rather than translated, since
    the exact form and function are uncertain and 'lights' would imply more certainty
    than the text provides.
- source_word: הַתֻּמִּים
  chosen: the Thummim
  alternatives:
  - perfections
  - completions
  lexicon: HALOT
  rationale: תֻּמִּים is likewise a technical cultic term paired with Urim. Transliteration
    preserves the Hebrew designation and avoids speculative interpretation. The article
    is retained in English because the Hebrew has it and the pair functions as a known
    sacred object/set.
