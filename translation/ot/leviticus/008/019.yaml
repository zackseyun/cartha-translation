id: LEV.8.19
reference: Leviticus 8:19
source:
  edition: WLC
  text: וַ/יִּשְׁחָ֑ט וַ/יִּזְרֹ֨ק מֹשֶׁ֧ה אֶת הַ/דָּ֛ם עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־׃
translation:
  text: And he slaughtered it, and Moses threw the blood against the altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dashed the blood against the altar on all sides.' The Hebrew verb denotes
      a forceful application of sacrificial blood, not a light sprinkling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחָט
  chosen: he slaughtered it
  alternatives:
  - he killed it
  - he slew it
  lexicon: HALOT
  rationale: The verb שָׁחַט in sacrificial contexts specifically denotes slaughtering
    an animal. English requires an object, supplied from the immediate context of
    the sacrificial animal in the preceding verse.
- source_word: וַיִּזְרֹק
  chosen: threw
  alternatives:
  - splashed
  - dashed
  - sprinkled
  lexicon: HALOT
  rationale: זָרַק commonly refers to throwing/tossing sacrificial blood onto the
    altar. 'Threw' is the most direct rendering; 'sprinkled' is less precise here
    and can suggest a different ritual action. The fuller English phrase 'threw the
    blood against the altar' conveys the cultic sense naturally.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Straightforward definite noun with the article; retained as 'the blood'.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in sacrificial contexts.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on all sides
  lexicon: HALOT
  rationale: In altar-blood ritual contexts, סָבִיב indicates application around the
    altar's sides/perimeter. 'All around' is idiomatic and preserves the distributive
    force.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
