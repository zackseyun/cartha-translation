id: LEV.8.11
reference: Leviticus 8:11
source:
  edition: WLC
  text: וַ/יַּ֥ז מִמֶּ֛/נּוּ עַל הַ/מִּזְבֵּ֖חַ שֶׁ֣בַע פְּעָמִ֑ים וַ/יִּמְשַׁ֨ח אֶת
    הַ/מִּזְבֵּ֜חַ וְ/אֶת כָּל כֵּלָ֗י/ו וְ/אֶת הַ/כִּיֹּ֛ר וְ/אֶת כַּנּ֖/וֹ לְ/קַדְּשָֽׁ/ם־־־־־־׃
translation:
  text: He sprinkled some of it on the altar seven times, and he anointed the altar
    and all its utensils, and the basin and its stand, to consecrate them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from it'; the Hebrew literally says 'from it,' referring to the anointing
      oil mentioned in the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the laver and its base.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּז
  chosen: He sprinkled
  alternatives:
  - He spattered
  - He dashed
  lexicon: HALOT
  rationale: From נזה in the Hiphil, the verb denotes sprinkling a liquid in a ritual
    context. 'Sprinkled' is the standard clear English equivalent and fits consecration
    imagery better than less common options.
- source_word: מִמֶּנּוּ
  chosen: some of it
  alternatives:
  - from it
  - with some of it
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix means 'from it.' In idiomatic
    English after 'sprinkled,' 'some of it' makes the sense explicit without adding
    content beyond the Hebrew.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in sacrificial contexts.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Straightforward numerical-adverbial expression indicating repeated ritual
    action.
- source_word: וַיִּמְשַׁח
  chosen: and he anointed
  alternatives:
  - and he smeared with oil
  lexicon: HALOT
  rationale: משׁח in cultic contexts is the standard verb for anointing, especially
    in consecration rites. 'Anointed' preserves the ritual and theological register.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles/implements. 'Utensils' is natural
    modern English for sanctuary equipment and avoids overly technical or archaic
    wording.
- source_word: הַכִּיֹּר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: כִּיּוֹר refers to the wash basin in the tabernacle precincts. 'Basin'
    is clearer modern English; 'laver' is traditional but archaic.
- source_word: כַּנּוֹ
  chosen: its stand
  alternatives:
  - its base
  lexicon: HALOT
  rationale: כֵּן here denotes the supporting structure for the basin. 'Stand' is
    the most accessible modern rendering; 'base' is possible but slightly less specific.
- source_word: לְקַדְּשָׁם
  chosen: to consecrate them
  alternatives:
  - to sanctify them
  - to make them holy
  lexicon: HALOT
  rationale: קדשׁ in the Piel/infinitive with object suffix indicates setting these
    objects apart as holy for sacred use. 'Consecrate' best captures the cultic sense
    in readable English.
