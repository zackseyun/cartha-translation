theological_decisions:
- issue: Cultic terminology for sacred objects and actions
  chosen_reading: Use established but readable ritual language ('anointed,' 'consecrate')
    without importing later doctrinal meaning.
  alternative_readings:
  - Use more literal but less idiomatic terms such as 'sanctify' or more traditional
    terms such as 'laver'
  rationale: The verse describes priestly/tabernacle consecration rites. Readable
    modern English should preserve the holiness-setting context without flattening
    the ritual significance or relying on archaic ecclesiastical vocabulary.
  doctrine_reference: Translation philosophy §§5–6
