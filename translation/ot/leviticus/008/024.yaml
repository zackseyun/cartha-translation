id: LEV.8.24
reference: Leviticus 8:24
source:
  edition: WLC
  text: וַ/יַּקְרֵ֞ב אֶת בְּנֵ֣י אַהֲרֹ֗ן וַ/יִּתֵּ֨ן מֹשֶׁ֤ה מִן הַ/דָּם֙ עַל תְּנ֤וּךְ
    אָזְנָ/ם֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֤הֶן יָדָ/ם֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן רַגְלָ֖/ם
    הַ/יְמָנִ֑ית וַ/יִּזְרֹ֨ק מֹשֶׁ֧ה אֶת הַ/דָּ֛ם עַל הַֽ/מִּזְבֵּ֖חַ סָבִֽיב־־־־־־־׃
translation:
  text: Then he brought Aaron’s sons near, and Moses put some of the blood on the
    lobe of their right ear, on the thumb of their right hand, and on the big toe
    of their right foot. Then Moses threw the blood against the altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tip of their right ear.' The Hebrew term refers to the outer extremity
      of the ear; 'lobe' is the most natural rendering here.
    reason: lexical_alternative
  - marker: b
    text: Or 'dashed' or 'splashed.' The Hebrew verb denotes throwing the blood in
      a sacrificial action, stronger than a light 'sprinkling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: brought ... near
  alternatives:
  - presented
  - brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near or present. 'Brought ...
    near' preserves the concrete ritual movement without sounding overly technical.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: A direct, natural rendering of the construct phrase. 'Aaron’s sons' is
    concise and preserves the familial reference.
- source_word: מִן הַדָּם
  chosen: some of the blood
  alternatives:
  - from the blood
  lexicon: HALOT
  rationale: The partitive sense of מִן is best represented in idiomatic English as
    'some of the blood,' indicating that only a portion was applied to the body parts.
- source_word: תְּנוּךְ
  chosen: lobe
  alternatives:
  - tip
  - cartilage
  lexicon: HALOT
  rationale: In this ritual context the term refers to the outer extremity/fleshy
    part of the ear. 'Lobe' is the clearest natural English equivalent and matches
    the traditional understanding in priestly texts.
- source_word: אָזְנָם הַיְמָנִית
  chosen: their right ear
  alternatives:
  - the lobe of their right ear
  lexicon: HALOT
  rationale: The full phrase in English is expressed together with תְּנוּךְ as 'the
    lobe of their right ear.' 'Right' should be retained because the ritual specifies
    the right-side extremities.
- source_word: בֹּהֶן יָדָם
  chosen: the thumb of their right hand
  alternatives:
  - the big thumb of their right hand
  lexicon: HALOT
  rationale: בֹּהֶן denotes the thumb or great toe depending on context. With 'hand'
    it clearly means 'thumb.'
- source_word: בֹּהֶן רַגְלָם
  chosen: the big toe of their right foot
  alternatives:
  - the great toe of their right foot
  lexicon: HALOT
  rationale: With 'foot' the noun denotes the great/big toe. 'Big toe' is more natural
    contemporary English than 'great toe.'
- source_word: וַיִּזְרֹק
  chosen: threw
  alternatives:
  - splashed
  - dashed
  - sprinkled
  lexicon: HALOT
  rationale: זרק in sacrificial contexts refers to tossing or throwing blood against
    the altar, not the lighter action often implied by 'sprinkled.' 'Threw' is vivid
    and closer to the ritual action, while 'against the altar' clarifies the direction.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  chosen: against the altar all around
  alternatives:
  - on the altar all around
  - around the altar
  lexicon: HALOT
  rationale: The phrase describes blood being applied/thrown onto the altar on every
    side. 'Against the altar all around' best captures both the contact and the circumferential
    sense of סָבִיב.
