theological_decisions:
- issue: Ritual specificity of right-side body parts
  chosen_reading: Retain the repeated 'right' for ear, hand, and foot in the main
    text.
  alternative_readings:
  - Condense the repetition for smoother English
  rationale: The repetition is semantically significant in the consecration ritual
    and should not be flattened for style. Preserving it respects the ceremonial detail
    of the Hebrew text.
