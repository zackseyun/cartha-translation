theological_decisions:
- issue: Rendering the priestly technical term מִלֻּאִים
  chosen_reading: ordination offering
  alternative_readings:
  - consecration offering
  rationale: The verse belongs to the priestly installation rite, and the term denotes
    the offering associated with ordaining/filling the hands of Aaron and his sons.
    'Ordination' best communicates the specific ritual setting without importing later
    ecclesial structures.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering אִשֶּׁה in accessible modern English
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The Hebrew term is a technical sacrificial label. 'Food offering' is
    readable modern English and common in contemporary translations, while the more
    formal 'offering by fire' is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
