id: LEV.8.28
reference: Leviticus 8:28
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מֹשֶׁ֤ה אֹתָ/ם֙ מֵ/עַ֣ל כַּפֵּי/הֶ֔ם וַ/יַּקְטֵ֥ר הַ/מִּזְבֵּ֖חָ/ה
    עַל הָ/עֹלָ֑ה מִלֻּאִ֥ים הֵם֙ לְ/רֵ֣יחַ נִיחֹ֔חַ אִשֶּׁ֥ה ה֖וּא לַ/יהוָֽה־׃
translation:
  text: Then Moses took them from their hands and burned them on the altar, on top
    of the burnt offering. They were an ordination offering for a pleasing aroma,
    a food offering to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consecration offering.' Hebrew מִלֻּאִים is a technical term for the
      offering used in the priests' installation rite.
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form is the ordinary verb
    'take.' 'Took' fits the ritual action plainly and keeps the sequence concrete.
- source_word: אֹתָם
  chosen: them
  rationale: Refers back to the portions placed in Aaron's and his sons' hands in
    the preceding verse; the pronoun is carried straightforwardly as 'them.'
- source_word: מֵעַל כַּפֵּיהֶם
  chosen: from their hands
  alternatives:
  - from upon their palms
  lexicon: HALOT
  rationale: Literally 'from upon their palms/hands.' English idiom prefers 'from
    their hands.' 'Palms' is more anatomically precise but less natural here.
- source_word: וַיַּקְטֵר
  chosen: burned
  alternatives:
  - turned into smoke
  - offered up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts means to make a sacrifice go
    up in smoke on the altar. 'Burned' is concise and natural; the altar phrase supplies
    the cultic setting. Alternatives are more explicit but less smooth.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with the verb of burning indicates the altar as
    the place of offering. In English, 'on the altar' best conveys the ritual location.
- source_word: עַל הָעֹלָה
  chosen: on top of the burnt offering
  alternatives:
  - upon the burnt offering
  - beside the burnt offering
  lexicon: HALOT
  rationale: עַל most naturally means 'on/upon.' In this ritual context the portions
    are burned atop the already designated burnt offering, not merely alongside it.
- source_word: מִלֻּאִים
  chosen: ordination offering
  alternatives:
  - consecration offering
  - filling offering
  lexicon: HALOT
  rationale: The noun refers to the installation/ordination rite ('fillings' in the
    technical priestly sense of filling the hand). 'Ordination offering' communicates
    the ritual function clearly in modern English. 'Consecration offering' is possible,
    but 'ordination' better matches the immediate priestly installation context.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: for a pleasing aroma
  alternatives:
  - for a soothing aroma
  - as a pleasing aroma
  lexicon: HALOT
  rationale: This is the standard sacrificial idiom. 'Pleasing aroma' is established,
    readable English and avoids implying divine olfactory literalism while preserving
    the acceptance motif.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: In priestly sacrificial language, אִשֶּׁה denotes an offering made by
    fire, but in idiomatic modern English 'food offering' is widely used for the altar
    gift presented to God. This avoids awkwardness while preserving sacrificial meaning.
    Because 'offering by fire' remains a viable formal alternative, it is preserved
    in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD' rather than transliterated.
