id: LEV.8.30
reference: Leviticus 8:30
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מֹשֶׁ֜ה מִ/שֶּׁ֣מֶן הַ/מִּשְׁחָ֗ה וּ/מִן הַ/דָּם֮ אֲשֶׁ֣ר עַל
    הַ/מִּזְבֵּחַ֒ וַ/יַּ֤ז עַֽל אַהֲרֹן֙ עַל בְּגָדָ֔י/ו וְ/עַל בָּנָ֛י/ו וְ/עַל
    בִּגְדֵ֥י בָנָ֖י/ו אִתּ֑/וֹ וַ/יְקַדֵּ֤שׁ אֶֽת אַהֲרֹן֙ אֶת בְּגָדָ֔י/ו וְ/אֶת
    בָּנָ֛י/ו וְ/אֶת בִּגְדֵ֥י בָנָ֖י/ו אִתּֽ/וֹ־־־־־־־־־־׃
translation:
  text: Then Moses took some of the anointing oil and some of the blood that was on
    the altar, and sprinkled it on Aaron, on his garments, on his sons, and on the
    garments of his sons with him; so he consecrated Aaron, his garments, his sons,
    and the garments of his sons with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and sanctified Aaron, his garments, his sons, and the garments of his
      sons with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took some of
  alternatives:
  - took
  - took from
  lexicon: HALOT
  rationale: The verb means 'took.' Because it governs two substances introduced by
    מִן ('from/some of'), English idiom is best expressed as 'took some of' to reflect
    that Moses took a portion, not the entirety.
- source_word: מִשֶּׁמֶן הַמִּשְׁחָה
  chosen: some of the anointing oil
  alternatives:
  - from the anointing oil
  - the oil of anointing
  lexicon: HALOT
  rationale: שֶׁמֶן is 'oil' and מִשְׁחָה denotes anointing. 'Anointing oil' is the
    most natural modern English equivalent while preserving the cultic sense.
- source_word: וּמִן הַדָּם אֲשֶׁר עַל הַמִּזְבֵּחַ
  chosen: and some of the blood that was on the altar
  alternatives:
  - and from the blood that was on the altar
  - and some of the blood which was on the altar
  lexicon: HALOT
  rationale: The repeated מִן again suggests taking a portion. אֲשֶׁר is rendered
    with the natural relative clause 'that was on the altar.'
- source_word: וַיַּז
  chosen: sprinkled it
  alternatives:
  - spattered it
  - dashed it
  lexicon: HALOT
  rationale: The Hiphil of נזה in priestly ritual contexts commonly refers to sprinkling
    a liquid. 'Sprinkled' is the standard and clearest ritual term in English. 'It'
    is supplied because the object is implicit from the preceding oil-and-blood mixture/substances.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Repeated עַל is straightforwardly locative here. 'On' is natural modern
    English; 'upon' would be more formal without adding meaning.
- source_word: בְּגָדָיו
  chosen: his garments
  alternatives:
  - his clothes
  - his vestments
  lexicon: HALOT
  rationale: בֶּגֶד means garment/clothing. 'Garments' preserves the formal ritual
    setting better than 'clothes,' while avoiding the more interpretive 'vestments.'
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural and refers to Aaron's priestly
    sons, so 'sons' is required by the gender-accurate policy.
- source_word: בִּגְדֵי בָנָיו אִתּוֹ
  chosen: the garments of his sons with him
  alternatives:
  - his sons' garments with him
  - the garments of his sons who were with him
  lexicon: HALOT
  rationale: The construct chain means 'the garments of his sons.' אִתּוֹ most naturally
    modifies 'his sons' rather than 'garments,' indicating the sons were there with
    Aaron/Moses in the rite. The literal phrasing is retained because the Hebrew repeats
    it in both clauses.
- source_word: וַיְקַדֵּשׁ
  chosen: so he consecrated
  alternatives:
  - and he sanctified
  - and he made holy
  lexicon: HALOT
  rationale: קדשׁ in this priestly installation context means to set apart as holy
    for sacred service. 'Consecrated' best captures the ritual-ordination sense in
    readable English.
- source_word: אֶת אַהֲרֹן ... וְאֶת בִּגְדֵי בָנָיו אִתּוֹ
  chosen: Aaron, his garments, his sons, and the garments of his sons with him
  alternatives:
  - Aaron and his garments and his sons and the garments of his sons with him
  lexicon: HALOT
  rationale: The direct-object marker אֶת is not translated but signals the full list
    of those consecrated. The English list is smoothed with commas while preserving
    each item named in Hebrew.
