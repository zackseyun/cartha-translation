theological_decisions:
- issue: Rendering קדשׁ in a priestly ordination context
  chosen_reading: consecrated
  alternative_readings:
  - sanctified
  - made holy
  rationale: The verse describes ritual setting apart of Aaron, his sons, and their
    garments for priestly service. 'Consecrated' communicates holiness and official
    cultic appointment without importing later doctrinal categories beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gendered reference to Aaron's offspring
  chosen_reading: his sons
  alternative_readings:
  - his children
  rationale: The Hebrew explicitly uses the masculine plural בָּנָיו and refers to
    the male priestly descendants participating in ordination. Following the gender-accurate
    policy, the translation preserves 'sons.'
  doctrine_reference: Translation philosophy §4
