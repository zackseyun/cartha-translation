id: LEV.8.15
reference: Leviticus 8:15
source:
  edition: WLC
  text: וַ/יִּשְׁחָ֗ט וַ/יִּקַּ֨ח מֹשֶׁ֤ה אֶת הַ/דָּם֙ וַ֠/יִּתֵּן עַל קַרְנ֨וֹת הַ/מִּזְבֵּ֤חַ
    סָבִיב֙ בְּ/אֶצְבָּע֔/וֹ וַ/יְחַטֵּ֖א אֶת הַ/מִּזְבֵּ֑חַ וְ/אֶת הַ/דָּ֗ם יָצַק֙
    אֶל יְס֣וֹד הַ/מִּזְבֵּ֔חַ וַֽ/יְקַדְּשֵׁ֖/הוּ לְ/כַפֵּ֥ר עָלָֽי/ו־־־־־׃
translation:
  text: And he slaughtered it, and Moses took the blood and put it on the horns of
    the altar all around with his finger, and he purified the altar, and he poured
    out the blood at the base of the altar and consecrated it to make atonement for
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he cleansed the altar.' The Hebrew verb in this ritual context means
      to purify from impurity, not to cause to sin.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make expiation for it' or 'to purge it.' The Hebrew verb carries
      sacrificial purification/atonement sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחָט
  chosen: he slaughtered it
  alternatives:
  - he killed it
  - he slaughtered
  lexicon: HALOT
  rationale: In sacrificial context, שָׁחַט refers specifically to ritual slaughter
    rather than generic killing. English 'slaughtered it' best reflects the cultic
    action; 'it' is supplied naturally from context.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Straightforward rendering of דָּם; repeated consistently in the verse.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  chosen: the horns of the altar
  lexicon: HALOT
  rationale: Formal cultic term for the altar's horn-like projections; standard and
    precise English rendering.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  lexicon: HALOT
  rationale: Adverb indicates application on every side; 'all around' makes the distributive
    force clear in natural English.
- source_word: בְּאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - with his finger(s)
  lexicon: HALOT
  rationale: Singular with 3ms suffix; instrumental sense is best conveyed by 'with
    his finger.'
- source_word: וַיְחַטֵּא אֶת־הַמִּזְבֵּחַ
  chosen: he purified the altar
  alternatives:
  - he cleansed the altar
  - he de-sinned the altar
  lexicon: HALOT
  rationale: The piel of חטא in priestly ritual contexts means to purify/decontaminate
    from impurity rather than 'to sin.' 'Purified' is clear modern English and preserves
    the ritual sense better than the less transparent literalism.
- source_word: יָצַק אֶל־יְסוֹד הַמִּזְבֵּחַ
  chosen: he poured out the blood at the base of the altar
  alternatives:
  - he poured the blood out at the foundation of the altar
  lexicon: HALOT
  rationale: יָצַק is 'pour out/pour'; יְסוֹד literally 'foundation,' but in altar
    terminology 'base' is the natural and contextually accurate English equivalent.
- source_word: וַיְקַדְּשֵׁהוּ
  chosen: and consecrated it
  alternatives:
  - and sanctified it
  - and made it holy
  lexicon: HALOT
  rationale: קדשׁ in this context denotes setting the altar apart as holy for sacred
    use. 'Consecrated' is both accurate and readable in ritual context.
- source_word: לְכַפֵּר עָלָיו
  chosen: to make atonement for it
  alternatives:
  - to purge it
  - to make expiation for it
  lexicon: HALOT
  rationale: כפר is a central cultic term. 'Make atonement' is the most established
    and understandable rendering in English. The preposition עַל with altar as object
    is naturally rendered 'for it' here, indicating the altar as the object of the
    rite.
