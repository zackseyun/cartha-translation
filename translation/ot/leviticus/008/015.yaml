theological_decisions:
- issue: Rendering of חטא in priestly purification context
  chosen_reading: he purified the altar
  alternative_readings:
  - he cleansed the altar
  rationale: The verb does not mean that the altar 'sinned' but that it was ritually
    purified by the blood rite. This preserves priestly sacrificial theology without
    importing later doctrinal categories.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of כפר in sacrificial context
  chosen_reading: to make atonement for it
  alternative_readings:
  - to make expiation for it
  - to purge it
  rationale: '''Make atonement'' preserves the theological weight of the Hebrew cultic
    term while remaining accessible. More technical alternatives are worth preserving
    but are less natural in the main text.'
  doctrine_reference: Translation philosophy §6
