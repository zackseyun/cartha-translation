id: LEV.8.5
reference: Leviticus 8:5
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה אֶל הָ/עֵדָ֑ה זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁר צִוָּ֥ה יְהוָ֖ה לַ/עֲשֽׂוֹת־־׃
translation:
  text: And Moses said to the congregation, “This is the thing that Yahweh has commanded to be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This is what the LORD has commanded to do,” with the infinitive rendered more literally; the Hebrew can be expressed either way in English, but “to be done” better fits the impersonal sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural, sufficiently formal rendering in English narrative style.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is the natural modern English equivalent.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled Israelite community. 'Congregation' preserves the formal communal sense in cultic context better than the broader 'community,' while remaining idiomatic.
- source_word: זֶה הַדָּבָר
  chosen: This is the thing
  alternatives:
  - This is what
  - This is the matter
  lexicon: HALOT
  rationale: A relatively formal rendering that preserves the demonstrative-plus-noun structure. 'This is what' is smoother but slightly less explicit lexically.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative marker in English.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The perfect verb refers to a prior command with present relevance to the action now being undertaken. English present perfect communicates this naturally.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַעֲשׂוֹת
  chosen: to be done
  alternatives:
  - to do
  - to perform
  lexicon: HALOT
  rationale: 'Although the infinitive is formally active (''to do''), in this context English idiom prefers an impersonal passive sense: the commanded matter is what is to be carried out. ''To be done'' best reflects the intended action without awkwardness.'
