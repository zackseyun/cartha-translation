id: LEV.8.35
reference: Leviticus 8:35
source:
  edition: WLC
  text: וּ/פֶתַח֩ אֹ֨הֶל מוֹעֵ֜ד תֵּשְׁב֨וּ יוֹמָ֤ם וָ/לַ֨יְלָה֙ שִׁבְעַ֣ת יָמִ֔ים וּ/שְׁמַרְתֶּ֛ם אֶת מִשְׁמֶ֥רֶת יְהוָ֖ה וְ/לֹ֣א תָמ֑וּתוּ כִּי כֵ֖ן צֻוֵּֽיתִי־־׃
translation:
  text: And you shall stay at the entrance of the tent of meeting day and night for seven days, and keep the charge of Yahweh, so that you may not die; for so I have been commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you shall not die'; alternatively, 'lest you die.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פֶתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  - at the opening of the tent of meeting
  lexicon: HALOT
  rationale: פֶתַח denotes an entrance/opening. 'Entrance' is natural modern English and preserves the locative sense with the prefixed conjunction/preposition. אֹהֶל מוֹעֵד is the standard sanctuary designation, best rendered 'tent of meeting' rather than a more interpretive phrase.
- source_word: תֵּשְׁבוּ
  chosen: you shall stay
  alternatives:
  - you shall sit
  - you shall remain
  - you shall dwell
  lexicon: HALOT
  rationale: ישב literally means 'sit/dwell/remain.' In this ritual context the command is to remain stationed there continuously, so 'stay' best captures the practical force in idiomatic English without over-literal awkwardness.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: HALOT
  rationale: This is a standard merism for continual duration. 'Day and night' is the most natural and sufficiently formal rendering.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration phrase after 'stay.' The numeral construction is preserved straightforwardly.
- source_word: וּ/שְׁמַרְתֶּם אֶת מִשְׁמֶרֶת יְהוָה
  chosen: and keep the charge of the LORD
  alternatives:
  - and keep the obligation of the LORD
  - and observe the duty of the LORD
  - and guard the LORD's charge
  lexicon: HALOT
  rationale: The collocation שמר + משמרת commonly conveys keeping/observing a prescribed duty or charge. 'Keep the charge' preserves the ritual-covenantal register better than the flatter 'do your duty.' יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא תָמֻתוּ
  chosen: so that you may not die
  alternatives:
  - and you shall not die
  - lest you die
  lexicon: HALOT
  rationale: The clause gives the purpose/result of obeying the command. 'So that you may not die' makes the connection clear in contemporary English while preserving the warning. 'Lest you die' is possible but more archaic.
- source_word: כִּי כֵן צֻוֵּיתִי
  chosen: for so I have been commanded
  alternatives:
  - for thus I was commanded
  - because this is what I was commanded
  lexicon: HALOT
  rationale: The passive indicates Moses is reporting a command received from God. The perfect can be rendered idiomatically in English as 'have been commanded,' preserving present relevance. 'For' naturally introduces the explanation.
