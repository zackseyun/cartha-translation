theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the death warning
  chosen_reading: 'The command is rendered as a purpose/result warning: ''so that
    you may not die.'''
  alternative_readings:
  - 'A coordinate prediction: ''and you shall not die'''
  - 'A warning nuance: ''lest you die'''
  rationale: The Hebrew sequence after the imperative can be understood as expressing
    the consequence avoided by obedience. This preserves the gravity of the priestly
    holiness context without overstating a promise independent of obedience.
