id: LEV.8.26
reference: Leviticus 8:26
source:
  edition: WLC
  text: וּ/מִ/סַּ֨ל הַ/מַּצּ֜וֹת אֲשֶׁ֣ר לִ/פְנֵ֣י יְהוָ֗ה לָ֠קַח חַלַּ֨ת מַצָּ֤ה
    אַחַת֙ וְֽ/חַלַּ֨ת לֶ֥חֶם שֶׁ֛מֶן אַחַ֖ת וְ/רָקִ֣יק אֶחָ֑ד וַ/יָּ֨שֶׂם֙ עַל הַ֣/חֲלָבִ֔ים
    וְ/עַ֖ל שׁ֥וֹק הַ/יָּמִֽין׀־׃
translation:
  text: And from the basket of unleavened bread that was before the LORD, he took
    one unleavened cake, one cake of bread with oil, and one wafer, and put them on
    the fat portions and on the right thigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one cake mixed with oil.' The Hebrew phrase may describe bread prepared
      with oil, but the exact method is not explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסַּל
  chosen: from the basket
  alternatives:
  - out of the basket
  lexicon: HALOT
  rationale: The preposition מִן with סַל indicates source or origin. 'From the basket'
    is natural modern English and preserves the concrete ritual detail.
- source_word: הַמַּצּוֹת
  chosen: of unleavened bread
  alternatives:
  - of unleavened cakes
  - of the unleavened things
  lexicon: HALOT
  rationale: מַצּוֹת refers here to unleavened bread items in the ritual basket. 'Unleavened
    bread' is idiomatic in English and fits the following specification of individual
    items.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This standard cultic phrase denotes presentation in Yahweh's presence.
    Per doctrine, יְהוָה is rendered 'the LORD.' 'Before the LORD' is both accurate
    and conventional without being archaic.
- source_word: חַלַּת מַצָּה אַחַת
  chosen: one unleavened cake
  alternatives:
  - one cake of unleavened bread
  lexicon: HALOT
  rationale: חַלָּה is a cake/loaf-like bread item; with מַצָּה it specifies an unleavened
    cake. 'One unleavened cake' is concise and clear.
- source_word: חַלַּת לֶחֶם שֶׁמֶן אַחַת
  chosen: one cake of bread with oil
  alternatives:
  - one oil bread cake
  - one cake mixed with oil
  - one loaf of oiled bread
  lexicon: HALOT
  rationale: The phrase denotes a bread cake associated with oil, likely oil-mixed
    or oil-anointed. 'Cake of bread with oil' stays close to the Hebrew without over-specifying
    the exact preparation method.
- source_word: רָקִיק אֶחָד
  chosen: one wafer
  alternatives:
  - one thin cake
  lexicon: HALOT
  rationale: רָקִיק is a thin flatbread or wafer used in offerings. 'Wafer' is the
    most concise established rendering in sacrificial contexts.
- source_word: וַיָּשֶׂם
  chosen: and put them
  alternatives:
  - and placed them
  lexicon: HALOT
  rationale: Although the verb is singular, the direct objects are the three bread
    items just named, so English naturally uses the plural pronoun 'them.' 'Put' is
    straightforward modern English.
- source_word: הַחֲלָבִים
  chosen: the fat portions
  alternatives:
  - the fats
  - the choice fat pieces
  lexicon: HALOT
  rationale: In sacrificial context, חֲלָבִים refers to the designated fatty pieces
    of the offering, not generic grease. 'Fat portions' communicates the ritual sense
    clearly.
- source_word: שׁוֹק הַיָּמִין
  chosen: the right thigh
  alternatives:
  - the right leg
  - the right shank
  lexicon: HALOT
  rationale: שׁוֹק denotes the leg/thigh portion in sacrificial butchery. 'Right thigh'
    is the standard and most precise rendering in this context.
