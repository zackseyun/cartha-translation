id: LEV.8.25
reference: Leviticus 8:25
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח אֶת הַ/חֵ֣לֶב וְ/אֶת הָֽ/אַלְיָ֗ה וְ/אֶֽת כָּל הַ/חֵלֶב֮ אֲשֶׁ֣ר
    עַל הַ/קֶּרֶב֒ וְ/אֵת֙ יֹתֶ֣רֶת הַ/כָּבֵ֔ד וְ/אֶת שְׁתֵּ֥י הַ/כְּלָיֹ֖ת וְ/אֶֽת
    חֶלְבְּ/הֶ֑ן וְ/אֵ֖ת שׁ֥וֹק הַ/יָּמִֽין־־־־־־־׃
translation:
  text: Then he took the fat, and the fat tail, and all the fat that was on the entrails,
    and the lobe of the liver, and the two kidneys with their fat, and the right thigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appendage of the liver' for 'the lobe of the liver.' The Hebrew
      term refers to a specific part removed in sacrificial procedure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then he took
  alternatives:
  - And he took
  - He took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he took' gives natural
    English narrative flow while preserving the sequential sense.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: Standard sacrificial term for the fatty portions reserved in the offering
    context; 'fat' is the plain lexical equivalent.
- source_word: הָאַלְיָה
  chosen: the fat tail
  alternatives:
  - the tail
  - the broad tail
  lexicon: HALOT
  rationale: Refers specifically to the fatty tail of a sheep in sacrificial legislation,
    not merely any tail. 'Fat tail' makes the cultic-anatomical reference explicit.
- source_word: כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  chosen: all the fat that was on the entrails
  alternatives:
  - all the fat that was on the inner parts
  - all the fat that was on the inward parts
  lexicon: HALOT
  rationale: קֶרֶב here refers to the inner organs/viscera in sacrificial anatomy.
    'Entrails' is concrete and readable, avoiding archaic 'inward parts' while staying
    anatomically accurate.
- source_word: יֹתֶרֶת הַכָּבֵד
  chosen: the lobe of the liver
  alternatives:
  - the appendage of the liver
  - the long lobe of the liver
  lexicon: HALOT
  rationale: This expression in sacrificial contexts denotes the liver lobe/appendage
    removed with the fat. 'Lobe of the liver' is the clearest idiomatic English rendering.
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  lexicon: HALOT
  rationale: Direct anatomical equivalent; the dual-number idea is naturally conveyed
    by 'the two kidneys.'
- source_word: חֶלְבְּהֶן
  chosen: with their fat
  alternatives:
  - and their fat
  lexicon: HALOT
  rationale: English idiom links the kidneys and associated fat smoothly with 'with
    their fat,' while preserving the possessive relation.
- source_word: שׁוֹק הַיָּמִין
  chosen: the right thigh
  alternatives:
  - the right leg
  - the right hind leg
  lexicon: HALOT
  rationale: שׁוֹק denotes the upper leg/thigh portion in sacrificial butchery. 'Thigh'
    is more anatomically precise than 'leg' and fits offering terminology.
