theological_decisions:
- issue: Rendering the priestly technical term מִלֻּאִים in a sacrificial context
  chosen_reading: the ram of ordination
  alternative_readings:
  - the ram of consecration
  rationale: Both 'ordination' and 'consecration' are defensible in priestly texts.
    'Ordination' better fits the installation of Aaron and his sons into priestly
    office in Leviticus 8, while avoiding unnecessary jargon or overly literal renderings
    that would obscure meaning.
  doctrine_reference: Translation philosophy §§1, 5, 6
