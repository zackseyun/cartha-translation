id: LEV.8.22
reference: Leviticus 8:22
source:
  edition: WLC
  text: וַ/יַּקְרֵב֙ אֶת הָ/אַ֣יִל הַ/שֵּׁנִ֔י אֵ֖יל הַ/מִּלֻּאִ֑ים וַֽ/יִּסְמְכ֞וּ
    אַהֲרֹ֧ן וּ/בָנָ֛י/ו אֶת יְדֵי/הֶ֖ם עַל רֹ֥אשׁ הָ/אָֽיִל־־־׃
translation:
  text: Then he brought near the second ram, the ram of ordination, and Aaron and
    his sons laid their hands on the head of the ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ram of consecration.' The Hebrew expression is a technical priestly
      term for the installation rite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: Then he brought near
  alternatives:
  - Then he presented
  - Then he brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present. 'Brought near' preserves
    the ritual sense and the repeated sacrificial formula in this context, while remaining
    natural English. 'Then' reflects the narrative waw-consecutive.
- source_word: הָאַיִל הַשֵּׁנִי
  chosen: the second ram
  alternatives:
  - the other ram
  lexicon: HALOT
  rationale: אַיִל is 'ram'; הַשֵּׁנִי is ordinal 'second.' The phrase straightforwardly
    identifies this as the second ram in the ordination sequence.
- source_word: אֵיל הַמִּלֻּאִים
  chosen: the ram of ordination
  alternatives:
  - the ram of consecration
  - the ordination ram
  - the ram of filling
  lexicon: HALOT
  rationale: מִלֻּאִים literally relates to 'fillings,' but in priestly context it
    denotes ordination/consecration rites. 'Ram of ordination' is the clearest idiomatic
    rendering in modern English and matches the cultic setting without obscuring the
    technical sense.
- source_word: וַיִּסְמְכוּ
  chosen: and ... laid
  alternatives:
  - and ... leaned
  - and ... pressed
  lexicon: HALOT
  rationale: סמך in sacrificial contexts means to lay/press the hand(s) on the offering.
    'Laid' is the standard and clear ritual rendering in English.
- source_word: אֶת יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their hand
  lexicon: HALOT
  rationale: The Hebrew uses the plural 'their hands,' and English naturally does
    the same here.
- source_word: עַל רֹאשׁ הָאָיִל
  chosen: on the head of the ram
  alternatives:
  - upon the ram's head
  lexicon: HALOT
  rationale: A direct, formal rendering of the prepositional phrase that preserves
    the sacrificial gesture clearly.
- source_word: אַהֲרֹן וּבָנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his children
  lexicon: HALOT
  rationale: בָּנִים here specifically refers to Aaron's male offspring serving in
    the priestly ordination rite. 'Sons' is gender-accurate and contextually precise
    per translation philosophy.
