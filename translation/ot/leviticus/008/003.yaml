id: LEV.8.3
reference: Leviticus 8:3
source:
  edition: WLC
  text: וְ/אֵ֥ת כָּל הָ/עֵדָ֖ה הַקְהֵ֑ל אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: And assemble all the congregation at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assemble the whole assembly.' The Hebrew עֵדָה can be rendered 'congregation,'
      'assembly,' or 'community' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵת
  chosen: And
  alternatives:
  - and
  - and [as object marker, untranslated]
  lexicon: HALOT
  rationale: Here וְ introduces the next command in sequence, while אֵת marks the
    definite direct object. English does not normally represent the object marker,
    so the natural rendering is simply the connective 'And' before the imperative
    clause.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - all of
  lexicon: HALOT
  rationale: 'כָּל with the following definite noun emphasizes totality: the entirety
    of the assembly is to be gathered.'
- source_word: הָ/עֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community of Israel. 'Congregation'
    preserves the corporate and quasi-liturgical sense well in this priestly context,
    though 'assembly' is also possible.
- source_word: הַקְהֵל
  chosen: assemble
  alternatives:
  - gather together
  - convene
  lexicon: HALOT
  rationale: Hiphil imperative of קהל means to cause to gather or assemble. 'Assemble'
    is concise and suitably formal for a command directed to Moses.
- source_word: אֶל
  chosen: at
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with פֶּתַח ('entrance/opening') idiomatic
    English is better served by 'at the entrance' rather than the less natural 'to
    the entrance,' while preserving the locative sense.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - opening
  - door
  lexicon: HALOT
  rationale: פֶּתַח denotes the opening or entryway. 'Entrance' is clear modern English
    and fits the spatial sense of the phrase.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the appointed tent
  lexicon: HALOT
  rationale: This is the standard designation for the tabernacle structure as the
    place of appointed meeting. 'Tent of meeting' is the established and accurate
    rendering of the construct phrase.
