id: LEV.8.33
reference: Leviticus 8:33
source:
  edition: WLC
  text: וּ/מִ/פֶּתַח֩ אֹ֨הֶל מוֹעֵ֜ד לֹ֤א תֵֽצְאוּ֙ שִׁבְעַ֣ת יָמִ֔ים עַ֚ד י֣וֹם מְלֹ֔את
    יְמֵ֖י מִלֻּאֵי/כֶ֑ם כִּ֚י שִׁבְעַ֣ת יָמִ֔ים יְמַלֵּ֖א אֶת יֶדְ/כֶֽם־׃
translation:
  text: And you shall not go out from the entrance of the tent of meeting for seven
    days, until the day the days of your ordination are completed, for he will fill
    your hand for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'fill your hand,' a Hebrew idiom for ordaining or installing
      someone into priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/פֶּתַח
  chosen: And ... from the entrance
  alternatives:
  - And ... from the doorway
  - Now ... from the entrance
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is carried naturally as 'And
    ... from.' פֶּתַח denotes an opening/entrance; 'entrance' is more natural modern
    English than 'doorway' here while preserving the spatial sense.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary designation.
    'Tabernacle' is traditional but less transparent to modern readers and less directly
    tied to the Hebrew wording.
- source_word: לֹא תֵצְאוּ
  chosen: you shall not go out
  alternatives:
  - you must not go out
  - do not go out
  lexicon: HALOT
  rationale: The imperfect with negation in legal/instructional context is well rendered
    by 'shall not,' preserving the directive force without sounding overly colloquial.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom prefers 'for seven days' after a prohibition of departure
    over a duration.
- source_word: עַד יוֹם מְלֹאת
  chosen: until the day ... are completed
  alternatives:
  - until the day of the completion of
  - until the day of fulfilling
  lexicon: HALOT
  rationale: The infinitive construct of מלא here expresses completion/fullness. A
    smoother English clause is preferable to a wooden nominal chain, while retaining
    the temporal endpoint.
- source_word: יְמֵי מִלֻּאֵיכֶם
  chosen: the days of your ordination
  alternatives:
  - the days of your consecration
  - the days of your installation
  lexicon: HALOT
  rationale: מִלֻּאִים in priestly context refers to ordination/consecration rites,
    literally 'fillings.' 'Ordination' best captures the formal priestly installation
    context in accessible English. The plural construct with 'days' is represented
    as 'the days of your ordination.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the seven-day restriction. 'For' is concise
    and fits the elevated instructional style.
- source_word: יְמַלֵּא אֶת יֶדְכֶם
  chosen: he will fill your hand
  alternatives:
  - he will ordain you
  - he will install you
  lexicon: HALOT
  rationale: Literally the idiom is 'fill the hand,' a technical expression for ordaining/installing
    priests. Because the Hebrew idiom is theologically and ritually significant, it
    is preserved in the main text rather than flattened, with the idiomatic sense
    clarified in a footnote.
