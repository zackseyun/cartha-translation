theological_decisions:
- issue: Rendering the priestly ordination idiom מלא את־יד
  chosen_reading: Preserve the idiom as 'fill your hand' in the main text, while clarifying
    its ordination sense in a footnote.
  alternative_readings:
  - ordain you
  - install you
  - consecrate you
  rationale: The Hebrew intentionally echoes the technical priestly expression behind
    'ordination.' Preserving the idiom maintains lexical transparency and allows readers
    to see the connection with מִלֻּאִים ('ordination'). A footnote supplies the idiomatic
    meaning so readability is not lost.
  doctrine_reference: Translation philosophy §§1, 5
