id: LEV.8.4
reference: Leviticus 8:4
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ מֹשֶׁ֔ה כַּֽ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֹת֑/וֹ וַ/תִּקָּהֵל֙ הָֽ/עֵדָ֔ה
    אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: And Moses did as the LORD commanded him, and the congregation assembled at
    the entrance to the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the assembly gathered' or 'the congregation was assembled.' The Hebrew
      verb can be represented with slightly different English idioms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this context of obedience to a
    command, 'did' is the most natural and direct English rendering.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: Introduces comparison/conformity with the divine command. 'As' is concise
    and idiomatic in English here.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: צוה commonly denotes authoritative command. 'Commanded' preserves the
    force of divine instruction better than the softer 'instructed.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct object pronoun referring to Moses; straightforwardly rendered
    'him.'
- source_word: וַתִּקָּהֵל
  chosen: assembled
  alternatives:
  - gathered
  - was assembled
  lexicon: HALOT
  rationale: From קהל in the Niphal, the sense is that the assembly came together.
    'Assembled' captures the collective gathering well. The form could be understood
    as passive ('was assembled'), but the English active intransitive is more natural
    while preserving the event.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה often denotes the gathered covenant community of Israel. 'Congregation'
    is a standard and fitting rendering in Pentateuchal context, though 'assembly'
    is also possible.
- source_word: אֶל
  chosen: at
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Though אֶל normally means 'to,' with 'entrance' in English the idiomatic
    expression is 'assembled at the entrance,' conveying destination/result naturally.
- source_word: פֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance' fits the spatial sense
    and standard English usage for the tabernacle setting.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the established literal rendering of the tabernacle designation,
    preserving both the physical structure ('tent') and its function ('meeting').
