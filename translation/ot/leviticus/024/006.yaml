id: LEV.24.6
reference: Leviticus 24:6
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֥ אוֹתָ֛/ם שְׁתַּ֥יִם מַֽעֲרָכ֖וֹת שֵׁ֣שׁ הַֽ/מַּעֲרָ֑כֶת עַ֛ל הַ/שֻּׁלְחָ֥ן הַ/טָּהֹ֖ר לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: And you shall place them in two rows, six in each row, on the pure table before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in two arrangements' or 'in two piles'; the Hebrew term refers to an ordered arrangement of the loaves.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the pure table'; 'clean table' is another possible rendering, with a ritual sense rather than merely physical cleanliness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  chosen: And you shall place
  alternatives:
  - And you shall set
  - And you shall put
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put, set, place.' 'Place' is natural modern English in an instruction about arranging the bread, while preserving the imperative/future force of the Hebrew second masculine singular.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the twelve loaves in the previous verse; explicit in English as 'them.'
- source_word: שְׁתַּיִם מַעֲרָכוֹת
  chosen: in two rows
  alternatives:
  - in two arrangements
  - in two piles
  lexicon: HALOT
  rationale: מַעֲרָכָה denotes an arranged set or arrangement. In the context of bread set out on the table, 'rows' is the most idiomatic and traditional sense, while still reflecting ordered placement. 'Piles' is possible but less precise and can suggest disorder; 'arrangements' is too abstract for smooth English.
- source_word: שֵׁשׁ הַמַּעֲרָכֶת
  chosen: six in each row
  alternatives:
  - six per row
  - six in the row
  lexicon: HALOT
  rationale: 'Literally ''six the arrangement/row.'' The singular with the numeral is distributive: each arrangement consists of six loaves. English requires this to be made explicit for clarity.'
- source_word: עַל הַשֻּׁלְחָן
  chosen: on the ... table
  alternatives:
  - upon the ... table
  lexicon: HALOT
  rationale: עַל is the normal preposition 'on/upon.' 'On' is the natural modern rendering.
- source_word: הַטָּהֹר
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: טָהוֹר in cultic contexts often means ritually clean/pure. 'Pure' better preserves the ceremonial sense here than the more everyday 'clean.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי means 'before, in the presence of.' 'Before the LORD' is concise and standard for cultic placement language. Per doctrine, יְהוָה is rendered 'the LORD.'
