theological_decisions:
- issue: Meaning of the recompense formula in an animal-law context
  chosen_reading: The verse requires equivalent restitution for killing an animal,
    rendered 'life for life,' without specifying the exact mechanism beyond compensation.
  alternative_readings:
  - The phrase could be taken more woodenly as requiring another animal in exchange.
  - The formula may echo the broader lex talionis pattern while functioning here as
    monetary or material restitution.
  rationale: The immediate verb 'shall make restitution' governs the interpretation
    of 'life for life.' The translation preserves the Hebrew formula while not importing
    a more specific legal mechanism than the text states.
  doctrine_reference: Translation philosophy §1, §3, §5
