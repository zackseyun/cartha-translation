id: LEV.24.18
reference: Leviticus 24:18
source:
  edition: WLC
  text: וּ/מַכֵּ֥ה נֶֽפֶשׁ בְּהֵמָ֖ה יְשַׁלְּמֶ֑/נָּה נֶ֖פֶשׁ תַּ֥חַת נָֽפֶשׁ־׃
translation:
  text: 'And whoever strikes down the life of an animal shall make restitution for
    it: life for life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''life for life.'' In this context of restitution for an animal,
      the phrase expresses equivalent compensation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַכֵּה
  chosen: And whoever strikes down
  alternatives:
  - And he who strikes
  - And one who kills
  lexicon: HALOT
  rationale: The Hiphil participle of נכה introduces a general case law subject, best
    rendered idiomatically as 'whoever.' 'Strikes down' preserves the causative sense
    and fits the legal context without over-paraphrasing. Because the object is 'the
    life of an animal,' the phrase conveys lethal action.
- source_word: נֶפֶשׁ
  chosen: the life of
  alternatives:
  - a living being of
  - the soul of
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to the life of the animal, not an immaterial 'soul'
    in a later theological sense. Rendering it as 'the life of' makes the legal sense
    clear and avoids misleading anthropological implications.
- source_word: בְּהֵמָה
  chosen: an animal
  alternatives:
  - livestock
  - a beast
  lexicon: HALOT
  rationale: בְּהֵמָה is a general term for an animal/beast. 'Animal' is clear modern
    English and fits the broad legal formulation better than the narrower 'livestock,'
    though the context concerns owned animals.
- source_word: יְשַׁלְּמֶנָּה
  chosen: shall make restitution for it
  alternatives:
  - shall repay it
  - shall compensate for it
  lexicon: HALOT
  rationale: From שלם in the Piel, the verb denotes making compensation or restitution.
    The 3fs suffix refers back to בְּהֵמָה ('animal'), so 'for it' is supplied naturally
    in English.
- source_word: נֶפֶשׁ תַּחַת נָפֶשׁ
  chosen: life for life
  alternatives:
  - a life for a life
  - life in place of life
  lexicon: HALOT
  rationale: This formula expresses equivalent recompense. 'Life for life' is concise,
    idiomatic, and preserves the legal parallelism with the preceding clause. In this
    verse, applied to an animal, it most naturally denotes equivalent restitution
    rather than necessarily literal execution of another animal.
