theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of נקב with the divine name
  chosen_reading: blasphemes
  alternative_readings:
  - pronounces
  - curses
  rationale: The verse legislates capital punishment for a profaning use of the divine name. Rendering the verb as 'blasphemes' communicates the offense without implying that mere utterance of the name is itself the crime. Because the lexical sense is debated, alternatives are preserved in a footnote rather than silently excluded.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
