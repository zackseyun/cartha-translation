id: LEV.24.16
reference: Leviticus 24:16
source:
  edition: WLC
  text: וְ/נֹקֵ֤ב שֵׁם יְהוָה֙ מ֣וֹת יוּמָ֔ת רָג֥וֹם יִרְגְּמוּ ב֖/וֹ כָּל הָ/עֵדָ֑ה כַּ/גֵּר֙ כָּֽ/אֶזְרָ֔ח בְּ/נָקְב/וֹ שֵׁ֖ם יוּמָֽת־־־־׃
translation:
  text: Whoever blasphemes the name of Yahweh shall surely be put to death; all the congregation shall certainly stone him. The sojourner as well as the native-born—when he blasphemes the Name—shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pronounces the name of the LORD' or 'curses the name of the LORD.' The Hebrew verb can carry the sense of uttering distinctly or of reviling in this context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Name' in the second clause, functioning as a reverential substitute for the divine name.
    reason: cultural_note
lexical_decisions:
- source_word: וְנֹקֵב
  chosen: whoever blasphemes
  alternatives:
  - the one who pronounces
  - the one who curses
  - the one who pierces/utters distinctly
  lexicon: HALOT, BDB
  rationale: The verb נקב literally has senses related to piercing or specifying/uttering, but in this legal context with 'the name of YHWH' and the death penalty, the idiomatic force is profanation of the divine name. 'Blasphemes' best captures the offense in natural English without reducing it merely to pronunciation. Alternatives are preserved because the Hebrew root is debated in this construction.
- source_word: שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the Name of the LORD
  - the name Yahweh
  lexicon: HALOT, BDB
  rationale: שֵׁם is straightforwardly 'name.' יְהוָה follows the project default 'the LORD' rather than 'Yahweh.' Lowercase 'name' is retained in the first clause as the construct phrase is not yet functioning as a reverential substitute title in English style.
- source_word: מֹות יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must certainly be put to death
  - shall certainly die
  lexicon: HALOT, BDB
  rationale: 'Infinitive absolute + finite verb intensifies the passive causative: a formal legal formula indicating certainty/obligation of capital punishment. ''Shall surely be put to death'' preserves both the passive and the legal register.'
- source_word: רָגוֹם יִרְגְּמוּ
  chosen: shall certainly stone him
  alternatives:
  - shall surely stone him
  - must stone him
  lexicon: HALOT, BDB
  rationale: Again an infinitive absolute + finite verb for emphasis. 'Stone him' is the plain sense; 'certainly' mirrors the intensification. The object suffix in בו is incorporated into the English verb phrase.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole community
  - all the assembly
  lexicon: HALOT, BDB
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation' preserves the formal communal/legal sense better than the more generic 'community,' while remaining readable.
- source_word: כַּגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the alien
  - the stranger
  lexicon: HALOT, BDB
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' is a readable and biblically resonant rendering that avoids the modern political connotations of 'alien' and the possible over-transience of 'stranger.'
- source_word: כָּאֶזְרָח
  chosen: the native-born
  alternatives:
  - the native
  - the citizen
  lexicon: HALOT, BDB
  rationale: אֶזְרָח contrasts with גֵּר as one native to the land/community. 'Native-born' makes the contrast explicit and natural in English.
- source_word: בְּנָקְבוֹ שֵׁם
  chosen: when he blasphemes the Name
  alternatives:
  - when he pronounces the name
  - in his blaspheming the name
  lexicon: HALOT, BDB
  rationale: 'The preposition ב plus infinitive construct is temporal/circumstantial here: ''when/in the act of.'' Repeating the same English gloss for נקב maintains consistency in context. ''The Name'' is capitalized here because the phrase stands absolutely and functions as a reverential substitute for the divine name in English.'
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be put to death
  lexicon: HALOT, BDB
  rationale: Passive legal formula repeated for emphasis and closure. 'Shall be put to death' keeps the judicial/passive nuance clearer than simply 'shall die.'
