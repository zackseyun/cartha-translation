id: LEV.24.5
reference: Leviticus 24:5
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֣ סֹ֔לֶת וְ/אָפִיתָ֣ אֹתָ֔/הּ שְׁתֵּ֥ים עֶשְׂרֵ֖ה חַלּ֑וֹת שְׁנֵי֙
    עֶשְׂרֹנִ֔ים יִהְיֶ֖ה הַֽ/חַלָּ֥ה הָ/אֶחָֽת׃
translation:
  text: And you shall take fine flour and bake it into twelve loaves; each loaf shall
    be of two-tenths of an ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'two tenths.' In priestly measurement language this means two-tenths
      of an ephah for each loaf.
    reason: cultural_note
  - marker: b
    text: Or 'twelve cakes.' The Hebrew term can denote baked bread units used in
      ritual settings; 'loaves' is chosen for clear modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: And you shall take
  alternatives:
  - And you are to take
  - Then you shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command sequence. 'And you shall take' preserves the procedural
    force and the Hebrew chaining.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine wheat flour
  lexicon: HALOT
  rationale: Standard cultic term for refined flour used in offerings and sacred bread
    contexts. 'Fine flour' is the most natural and established English equivalent
    without over-specifying the grain beyond what the Hebrew states.
- source_word: וְאָפִיתָ אֹתָהּ
  chosen: and bake it into
  alternatives:
  - and bake it
  - and you shall bake from it
  lexicon: HALOT
  rationale: The verb means 'bake,' with the feminine object referring back to the
    flour. English idiom requires expressing the result with 'into' before the product
    named next ('twelve loaves').
- source_word: שְׁתֵּים עֶשְׂרֵה חַלּוֹת
  chosen: twelve loaves
  alternatives:
  - twelve cakes
  - twelve bread loaves
  lexicon: HALOT
  rationale: חַלּוֹת refers to baked bread units/loaves, especially in ritual contexts.
    'Loaves' is clearer and more idiomatic than 'cakes' in modern English, while still
    fitting the cultic bread setting.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: two-tenths of an ephah
  alternatives:
  - two tenth-parts
  - two omers
  lexicon: HALOT
  rationale: עִשָּׂרוֹן denotes a tenth-part measure, conventionally understood as
    a tenth of an ephah in priestly material. Rendering the implied standard explicitly
    in English communicates the measurement accurately for modern readers.
- source_word: יִהְיֶה הַחַלָּה הָאֶחָת
  chosen: each loaf shall be
  alternatives:
  - the one loaf shall be
  - one loaf shall be
  lexicon: HALOT
  rationale: Literally 'the one loaf shall be,' but idiomatic English in distributive
    measurement contexts is 'each loaf shall be.' This preserves the sense that the
    stated quantity applies per loaf.
