id: LEV.24.13
reference: Leviticus 24:13
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the LORD spoke to Moses, saying.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative, commonly rendered
    'and/then ... spoke.' 'Then' gives natural English narrative flow while preserving
    sequence. 'Spoke' is preferred over 'said' because the following לֵאמֹר introduces
    the content formula explicitly.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following longstanding English convention and the reverential pattern reflected
    in the LXX's κύριος.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the standard speech-introduction
    formula after דבר. 'Saying' preserves the Hebrew structure and signals that the
    content follows in the next verse.
