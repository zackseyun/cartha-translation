id: LEV.24.3
reference: Leviticus 24:3
source:
  edition: WLC
  text: מִ/חוּץ֩ לְ/פָרֹ֨כֶת הָ/עֵדֻ֜ת בְּ/אֹ֣הֶל מוֹעֵ֗ד יַעֲרֹךְ֩ אֹת֨/וֹ אַהֲרֹ֜ן מֵ/עֶ֧רֶב עַד בֹּ֛קֶר לִ/פְנֵ֥י יְהוָ֖ה תָּמִ֑יד חֻקַּ֥ת עוֹלָ֖ם לְ/דֹרֹֽתֵי/כֶֽם־׃
translation:
  text: Outside the veil of the testimony, in the tent of meeting, Aaron shall arrange it from evening until morning before Yahweh continually. It is a permanent statute throughout your generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curtain of the testimony.'
    reason: lexical_alternative
  - marker: b
    text: '''Continually'' here refers to the regular ongoing observance of the rite, specified as ''from evening until morning.'''
    reason: cultural_note
  - marker: c
    text: Or 'an everlasting statute' or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִחוּץ
  chosen: Outside
  alternatives:
  - From outside
  lexicon: HALOT
  rationale: The preposition-noun compound denotes location outside or beyond. In English, 'Outside' is the most natural locative rendering here.
- source_word: לְפָרֹכֶת
  chosen: the veil
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner sanctuary curtain/veil. 'Veil' is traditional and clear in tabernacle context; 'curtain' is possible but slightly less specific in cultic usage.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the witness
  lexicon: HALOT
  rationale: In tabernacle usage this refers to the testimony associated with the covenant, especially the tablets in the ark. 'The testimony' preserves the established cultic term without over-interpreting.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the meeting tent
  lexicon: HALOT
  rationale: This is the standard designation for the tabernacle sanctuary. 'Tent of meeting' is the conventional and accurate rendering.
- source_word: יַעֲרֹךְ אֹתוֹ
  chosen: shall arrange it
  alternatives:
  - shall set it in order
  - shall tend it
  lexicon: HALOT
  rationale: ערך in priestly contexts means to arrange or set in order. The object pronoun likely refers to the lamp/lampstand setup from the previous verse. 'Arrange it' is broad enough to preserve the Hebrew while fitting the ritual context.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention per project philosophy.
- source_word: מֵעֶרֶב עַד בֹּקֶר
  chosen: from evening until morning
  alternatives:
  - from evening to morning
  lexicon: HALOT
  rationale: This temporal span is straightforward. 'Until' reads naturally in modern English while preserving the duration.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי often means 'before' in cultic settings, indicating presence before God. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually as a regular rite
  lexicon: HALOT
  rationale: תמיד in priestly legislation often denotes regular continual observance rather than unbroken every-second action. 'Continually' is the standard concise rendering and fits the evening-to-morning pattern.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: The phrase denotes an enduring prescribed ordinance. 'Permanent statute' communicates lasting covenantal force in accessible modern English; 'everlasting/perpetual statute' are possible more formal alternatives.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  lexicon: HALOT
  rationale: This idiom expresses ongoing applicability across successive generations. 'Throughout your generations' is idiomatic and precise.
