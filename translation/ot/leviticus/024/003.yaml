theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of תָּמִיד in relation to the lamp ritual
  chosen_reading: continually
  alternative_readings:
  - regularly
  - continually through each night
  rationale: The Hebrew term can denote regular continual observance in priestly texts. Because the verse itself specifies 'from evening until morning,' the translation preserves both the temporal span and the ongoing ritual obligation without forcing a stricter interpretation than the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
