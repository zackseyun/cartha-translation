id: LEV.24.8
reference: Leviticus 24:8
source:
  edition: WLC
  text: בְּ/י֨וֹם הַ/שַּׁבָּ֜ת בְּ/י֣וֹם הַ/שַּׁבָּ֗ת יַֽעַרְכֶ֛/נּוּ לִ/פְנֵ֥י יְהוָ֖ה
    תָּמִ֑יד מֵ/אֵ֥ת בְּנֵֽי יִשְׂרָאֵ֖ל בְּרִ֥ית עוֹלָֽם־׃
translation:
  text: Every Sabbath day he shall arrange it before the LORD continually, as a perpetual
    covenant obligation from the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''On the Sabbath day, on the Sabbath day,'' an idiom meaning every
      Sabbath or Sabbath by Sabbath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall set it in order'; the singular 'it' refers collectively to
      the bread arrangement.
    reason: lexical_alternative
  - marker: c
    text: Or 'an everlasting covenant.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּי֨וֹם הַשַּׁבָּת בְּי֣וֹם הַשַּׁבָּת
  chosen: Every Sabbath day
  alternatives:
  - On the Sabbath day, on the Sabbath day
  - Sabbath by Sabbath
  lexicon: HALOT
  rationale: The repetition is distributive/emphatic, indicating regular recurrence
    each Sabbath rather than two separate temporal references. 'Every Sabbath day'
    communicates the idiomatic force in natural English while preserving the weekly
    cadence.
- source_word: יַעַרְכֶנּוּ
  chosen: he shall arrange it
  alternatives:
  - he shall set it in order
  - he shall lay it out
  lexicon: HALOT
  rationale: From ערך, commonly used for arranging or setting in order, especially
    cultic items. Singular suffix likely refers collectively to the bread/display
    as a unit. 'Arrange it' is clear modern English and fits the ritual context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic expression for presentation in Yahweh's presence. Per
    doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms table.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually/regularly
  lexicon: HALOT
  rationale: In priestly contexts תמיד often denotes ongoing regular observance rather
    than unbroken physical action. 'Continually' preserves the traditional and lexical
    sense, with the weekly repetition already specified by the context.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the people of Israel
  - on behalf of the sons of Israel
  lexicon: HALOT
  rationale: מֵאֵת marks source/origin. The Hebrew is literally 'sons of Israel';
    per gender-accurate policy, this is retained rather than flattened to 'people,'
    though the corporate sense is clear from context.
- source_word: בְּרִית עוֹלָם
  chosen: as a perpetual covenant obligation
  alternatives:
  - an everlasting covenant
  - a permanent covenant
  lexicon: HALOT
  rationale: Literally 'a covenant of perpetuity/forever.' In this ritual context
    the phrase denotes an enduring covenantal ordinance incumbent on Israel. 'Perpetual
    covenant obligation' makes explicit the functional force without denying the covenantal
    wording.
