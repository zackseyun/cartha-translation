theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Hebrew is grammatically masculine and corporate. Per gender-accurate
    policy, the masculine form is preserved rather than neutralized, while the context
    makes the representative sense evident.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of בְּרִית עוֹלָם in cultic legislation
  chosen_reading: perpetual covenant obligation
  alternative_readings:
  - everlasting covenant
  - permanent covenant
  rationale: The phrase is covenantal, but in this legal-ritual setting it functions
    as an enduring ordinance binding Israel. The chosen rendering aims to preserve
    both covenant language and legal force.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
