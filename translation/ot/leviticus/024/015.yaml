id: LEV.24.15
reference: Leviticus 24:15
source:
  edition: WLC
  text: וְ/אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל תְּדַבֵּ֣ר לֵ/אמֹ֑ר אִ֥ישׁ אִ֛ישׁ כִּֽי יְקַלֵּ֥ל
    אֱלֹהָ֖י/ו וְ/נָשָׂ֥א חֶטְאֽ/וֹ־־׃
translation:
  text: And you shall speak to the sons of Israel, saying, ‘If any man curses his
    God, then he shall bear his sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel.' The phrase refers to the people of Israel collectively.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''whoever.'' Hebrew repeats ''man'' for distributive emphasis: ''man,
      man.'''
    reason: lexical_alternative
  - marker: c
    text: '''Bear his sin'' is a Hebrew idiom meaning to bear guilt or liability for
      the offense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: And ... to
  alternatives:
  - and to
  - now to
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a new directive addressed
    to Israel. In English, the sense is best carried by beginning the sentence with
    'And' and then rendering the prepositional force with 'to' in 'speak to.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per the gender-accurate policy, the masculine
    familial expression is preserved rather than flattened to 'Israelites,' though
    the referent is the covenant people generally.
- source_word: תְּדַבֵּר
  chosen: you shall speak
  alternatives:
  - you are to speak
  - you must speak
  lexicon: HALOT
  rationale: Imperfect 2ms in legal instruction is naturally rendered as directive
    future 'you shall speak,' preserving the formal legislative tone addressed to
    Moses.
- source_word: לֵ/אמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the speech.
- source_word: אִישׁ אִישׁ
  chosen: any man
  alternatives:
  - man, man
  - whoever
  - each man
  lexicon: HALOT
  rationale: The repetition is an idiomatic distributive intensifier meaning 'any
    man' or 'whoever.' 'Any man' preserves the singular masculine form while communicating
    the distributive force in natural English.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: In this legal conditional setting, כִּי introduces the case condition,
    best rendered 'if.'
- source_word: יְקַלֵּל
  chosen: curses
  alternatives:
  - blasphemes
  - reviles
  lexicon: HALOT
  rationale: From קלל in the piel, 'to curse' or 'treat with contempt.' 'Curses' is
    the plain lexical sense and fits the immediate legal context. 'Blasphemes' is
    more interpretive and is reserved for the divine-name offense in the following
    verse.
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - his gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural, with the 3ms suffix
    here it is best taken as singular in sense, 'his God.' In context the law is framed
    broadly enough to include even one who curses his own deity; the wording should
    not be narrowed to 'the LORD' since the Hebrew does not do so in this verse.
- source_word: וְ/נָשָׂא
  chosen: then he shall bear
  alternatives:
  - and he shall bear
  - he will bear
  lexicon: HALOT
  rationale: The conjunction links consequence to the condition. 'Then he shall bear'
    makes the legal result explicit in idiomatic English while preserving the verb's
    sense of bearing liability.
- source_word: חֶטְאוֹ
  chosen: his sin
  alternatives:
  - his guilt
  - the penalty for his sin
  lexicon: HALOT
  rationale: '''Bear his sin'' is a standard Hebrew idiom for bearing culpability
    or guilt. The main text keeps the idiom transparent; the penal nuance can be clarified
    in a footnote rather than expanded in translation.'
