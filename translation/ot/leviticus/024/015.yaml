theological_decisions:
- issue: Scope of אֱלֹהָיו in relation to Israel's God
  chosen_reading: Rendered 'his God' rather than 'the LORD' or 'God' without possessive.
  alternative_readings:
  - the LORD
  - God
  rationale: The verse distinguishes this offense from the more specific naming/blaspheming
    offense in the next verse. Retaining 'his God' follows the Hebrew wording and
    avoids importing a narrower doctrinal specification than the text itself states.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Gendered legal subject
  chosen_reading: Rendered אִישׁ אִישׁ as 'any man.'
  alternative_readings:
  - whoever
  - anyone
  rationale: The Hebrew is grammatically masculine singular used distributively in
    legal style. Per the gender-accurate policy, the masculine form is preserved in
    the main text rather than neutralized.
  doctrine_reference: 'Translation philosophy #4'
