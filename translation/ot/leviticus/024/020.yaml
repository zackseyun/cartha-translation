id: LEV.24.20
reference: Leviticus 24:20
source:
  edition: WLC
  text: שֶׁ֚בֶר תַּ֣חַת שֶׁ֔בֶר עַ֚יִן תַּ֣חַת עַ֔יִן שֵׁ֖ן תַּ֣חַת שֵׁ֑ן כַּ/אֲשֶׁ֨ר
    יִתֵּ֥ן מוּם֙ בָּֽ/אָדָ֔ם כֵּ֖ן יִנָּ֥תֶן בּֽ/וֹ׃
translation:
  text: fracture for fracture, eye for eye, tooth for tooth; as he inflicts an injury
    on a man, so it shall be inflicted on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as he causes a blemish/disfigurement in a person, so it shall be done
      to him.' The Hebrew uses 'give' with 'blemish/injury,' an idiom rendered here
      as 'inflicts an injury.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in a man.' Here 'man' functions as a representative singular for
      a human being in case law.
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁבֶר
  chosen: fracture
  alternatives:
  - break
  - broken bone
  lexicon: HALOT
  rationale: The noun denotes a breaking or fracture, especially bodily injury in
    this legal context. 'Fracture' is precise modern English and matches the injury
    list better than the broader 'break'.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in place of
  - under
  lexicon: HALOT
  rationale: In talionic legal formulae, תַּחַת expresses equivalence or recompense.
    English 'for' is the idiomatic legal rendering in the repeated pattern 'eye for
    eye' while preserving the reciprocal sense.
- source_word: עַיִן
  chosen: eye
  lexicon: HALOT
  rationale: Straightforward anatomical term; retained literally in the legal formula.
- source_word: שֵׁן
  chosen: tooth
  lexicon: HALOT
  rationale: Straightforward anatomical term; retained literally in the legal formula.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces the comparative clause grounding the legal principle. 'As'
    is concise and natural.
- source_word: יִתֵּן
  chosen: inflicts
  alternatives:
  - gives
  - causes
  lexicon: HALOT
  rationale: Although the verb is literally 'give/put,' in the collocation 'give a
    blemish/injury' idiomatic English requires 'inflict' or 'cause.' 'Inflicts' best
    conveys direct causation in legal context.
- source_word: מוּם
  chosen: injury
  alternatives:
  - blemish
  - defect
  - disfigurement
  lexicon: HALOT
  rationale: מוּם often means a physical defect or blemish. Here, because it is something
    one person causes to another in an assault law, 'injury' best captures the sense
    in readable modern English. 'Blemish' would sound unnatural and potentially cosmetic
    in English.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered 'man' or 'humankind' by context. Here the
    singular refers to an individual human victim in case law, so 'man' preserves
    the source's gender-accurate representative singular better than the more generic
    'person'.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: Marks the corresponding consequence. 'So' is natural and preserves the
    legal symmetry.
- source_word: יִנָּתֶן בּוֹ
  chosen: it shall be inflicted on him
  alternatives:
  - it shall be done to him
  - it shall be given to him
  lexicon: HALOT
  rationale: The Niphal of נתן is passive ('be given/done'). Because the object is
    the previously mentioned injury, English requires an explicit predicate such as
    'inflicted' to avoid awkwardness. 'On him' reflects בּוֹ in context.
