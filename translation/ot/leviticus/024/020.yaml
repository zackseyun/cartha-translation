theological_decisions:
- issue: Nature of the talion formula in English
  chosen_reading: Render the legal formula literally ('fracture for fracture, eye
    for eye, tooth for tooth') without softening it into abstract compensation language.
  alternative_readings:
  - injury equivalent to injury
  - compensation matching the injury
  rationale: The Hebrew presents a concrete reciprocal formula. The translation should
    preserve that textual force rather than importing a later interpretive limitation
    or expansion. Any broader jurisprudential application belongs to interpretation,
    not the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - person
  rationale: The doctrine table specifies 'man / humankind (context).' In this singular
    case-law setting, 'man' best reflects the representative singular without flattening
    the Hebrew to a modern neutral abstraction.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Translation philosophy
    §4'
