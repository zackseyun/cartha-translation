id: LEV.24.7
reference: Leviticus 24:7
source:
  edition: WLC
  text: וְ/נָתַתָּ֥ עַל הַֽ/מַּעֲרֶ֖כֶת לְבֹנָ֣ה זַכָּ֑ה וְ/הָיְתָ֤ה לַ/לֶּ֨חֶם֙ לְ/אַזְכָּרָ֔ה אִשֶּׁ֖ה לַֽ/יהוָֽה־׃
translation:
  text: And you shall put pure frankincense on each row, and it shall be for the bread as a memorial portion, a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrangement'; in context this refers to the ordered rows of the bread.
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  chosen: And you shall put
  alternatives:
  - and you shall place
  - and you shall set
  lexicon: HALOT
  rationale: Qal perfect with vav in instructional context functions as an imperative/future-like command. 'Put' is natural modern English and fits ritual instructions.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates placement on/upon the arrangement.
- source_word: הַמַּעֲרֶכֶת
  chosen: each row
  alternatives:
  - the arrangement
  - the pile
  lexicon: HALOT
  rationale: In the context of the bread of the Presence arranged in two ordered sets/rows (cf. previous verse), 'each row' best conveys the cultic arrangement in idiomatic English. Singular collective Hebrew is distributive here.
- source_word: לְבֹנָה זַכָּה
  chosen: pure frankincense
  alternatives:
  - clean frankincense
  lexicon: HALOT
  rationale: Standard rendering for the incense resin; זַכָּה denotes purity/cleanness in a ritual sense, naturally rendered 'pure'.
- source_word: וְהָיְתָה
  chosen: and it shall be
  alternatives:
  - and it will become
  lexicon: HALOT
  rationale: Simple copular/resultative sense introducing the function of the frankincense relative to the bread.
- source_word: לַלֶּחֶם
  chosen: for the bread
  alternatives:
  - for the loaf
  - for the bread set
  lexicon: HALOT
  rationale: Although singular, לֶחֶם here refers collectively to the showbread. 'For the bread' preserves the Hebrew while remaining understandable.
- source_word: לְאַזְכָּרָה
  chosen: as a memorial portion
  alternatives:
  - for a memorial
  - as a reminder portion
  lexicon: HALOT
  rationale: Cultic term for the representative portion that brings the offering into remembrance before God. 'Memorial portion' communicates sacrificial function better than bare 'memorial' in English.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: In priestly sacrificial language, the term denotes an offering made by fire. 'Food offering' is readable modern English and commonly used in Levitical contexts, while avoiding an overly wooden phrase. The more literal alternative is preserved in a footnote because it is a significant lexical option.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows project doctrine for יְהוָה as 'the LORD.' 'To the LORD' fits the offering language naturally.
