theological_decisions:
- issue: Lex talionis formulation in legal context
  chosen_reading: Rendered the verse as a judicial principle of proportionate recompense
    without expanding it into personal vengeance.
  alternative_readings:
  - A more literal but less idiomatic rendering emphasizing 'blemish/defect'
  - A paraphrastic rendering suggesting retaliatory violence by individuals
  rationale: The Hebrew states a legal norm of measured reciprocity. The translation
    avoids importing later interpretive debates or framing the verse as a command
    for private revenge. 'It shall be done to him' preserves the impersonal judicial
    sense.
