id: LEV.24.19
reference: Leviticus 24:19
source:
  edition: WLC
  text: וְ/אִ֕ישׁ כִּֽי יִתֵּ֥ן מ֖וּם בַּ/עֲמִית֑/וֹ כַּ/אֲשֶׁ֣ר עָשָׂ֔ה כֵּ֖ן יֵעָ֥שֶׂה
    לּֽ/וֹ־׃
translation:
  text: And if a man inflicts an injury on his fellow, just as he has done, so it
    shall be done to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'gives a blemish/defect to his fellow.'
    reason: lexical_alternative
  - marker: b
    text: Or 'neighbor' for 'fellow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: And if a man
  alternatives:
  - And a man
  - If a man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In this legal formulation, English
    idiom is best served by 'if a man' rather than a bare 'and a man,' while preserving
    the gender-accurate singular called for by the translation philosophy.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In casuistic law, כִּי commonly introduces a conditional case, naturally
    rendered 'if.' 'When' is possible but slightly weakens the conditional force.
- source_word: יִתֵּן מוּם
  chosen: inflicts an injury
  alternatives:
  - causes a blemish
  - gives a defect
  - injures
  lexicon: HALOT
  rationale: Literally 'gives a blemish/defect.' In context of bodily harm legislation,
    idiomatic English 'inflicts an injury' communicates the legal sense without flattening
    the concrete notion of bodily damage.
- source_word: מוּם
  chosen: injury
  alternatives:
  - blemish
  - defect
  lexicon: HALOT
  rationale: מוּם often denotes a physical defect or blemish. Here, because the verse
    concerns interpersonal bodily harm and reciprocal penalty, 'injury' best captures
    the contextual sense in natural English.
- source_word: בַּעֲמִיתוֹ
  chosen: on his fellow
  alternatives:
  - on his neighbor
  - on his companion
  lexicon: HALOT
  rationale: עָמִית denotes an associate, fellow, or neighbor within the community.
    'His fellow' preserves the interpersonal and covenant-community nuance and fits
    the legal register well.
- source_word: כַּאֲשֶׁר עָשָׂה
  chosen: just as he has done
  alternatives:
  - as he did
  - according to what he did
  lexicon: HALOT
  rationale: This comparative clause introduces the measure of retribution. 'Just
    as he has done' is clear, natural, and preserves the correspondence emphasized
    by the Hebrew.
- source_word: כֵּן יֵעָשֶׂה לּוֹ
  chosen: so it shall be done to him
  alternatives:
  - thus it shall be done to him
  - so shall it be done to him
  lexicon: HALOT
  rationale: The Niphal expresses passive/reciprocal legal action. 'So it shall be
    done to him' is a standard, clear legal English rendering that preserves the judicial
    force without archaic excess.
