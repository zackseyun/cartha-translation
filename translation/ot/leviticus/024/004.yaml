id: LEV.24.4
reference: Leviticus 24:4
source:
  edition: WLC
  text: עַ֚ל הַ/מְּנֹרָ֣ה הַ/טְּהֹרָ֔ה יַעֲרֹ֖ךְ אֶת הַ/נֵּר֑וֹת לִ/פְנֵ֥י יְהוָ֖ה
    תָּמִֽיד־׃פ
translation:
  text: On the pure lampstand he shall arrange the lamps before the LORD continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before Yahweh.' The Hebrew has the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: עַל
  chosen: 'On'
  alternatives:
  - Upon
  - At
  lexicon: HALOT
  rationale: The preposition most naturally indicates position with respect to the
    lampstand. 'On' is idiomatic and sufficiently formal here.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  - the lamp
  lexicon: HALOT
  rationale: מְנוֹרָה refers specifically to the cultic lampstand, not merely a generic
    lamp. 'Lampstand' translates the meaning rather than transliterating the object
    name.
- source_word: הַטְּהֹרָה
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: טָהוֹר in priestly/tabernacle context commonly denotes ritual purity.
    'Pure' is the standard concise English equivalent for the lampstand's qualified
    status.
- source_word: יַעֲרֹךְ
  chosen: he shall arrange
  alternatives:
  - he shall set in order
  - he shall tend
  lexicon: HALOT
  rationale: ערך in this context means to set out or arrange in order. 'Arrange' is
    clear modern English and preserves the ordered cultic action without overinterpreting
    it as broader maintenance.
- source_word: הַנֵּרוֹת
  chosen: the lamps
  alternatives:
  - the lamps' lights
  lexicon: HALOT
  rationale: נֵרוֹת refers to the individual lamps on the lampstand. 'Lamps' is the
    direct and natural rendering.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is a standard cultic expression meaning before/in the presence
    of. The divine name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text, with alternatives preserved if needed.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually as a regular rite
  lexicon: HALOT
  rationale: תָּמִיד in priestly contexts often denotes regular ongoing continuity.
    'Continually' preserves the traditional and contextual sense without requiring
    an explanatory expansion in the main text.
