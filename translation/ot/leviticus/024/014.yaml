id: LEV.24.14
reference: Leviticus 24:14
source:
  edition: WLC
  text: הוֹצֵ֣א אֶת הַֽ/מְקַלֵּ֗ל אֶל מִ/חוּץ֙ לַֽ/מַּחֲנֶ֔ה וְ/סָמְכ֧וּ כָֽל הַ/שֹּׁמְעִ֛ים
    אֶת יְדֵי/הֶ֖ם עַל רֹאשׁ֑/וֹ וְ/רָגְמ֥וּ אֹת֖/וֹ כָּל הָ/עֵדָֽה־־־־־־׃
translation:
  text: Bring the one who cursed outside the camp, and let all who heard him lay their
    hands on his head, and let all the congregation stone him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the blasphemer' / 'the one who blasphemed.' The Hebrew literally refers
      to 'the one who cursed.'
    reason: alternative_reading
  - marker: b
    text: The laying on of hands here likely marks the witnesses' formal identification
      of the offender, though some understand it as carrying symbolic significance
      as well.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹצֵא
  chosen: Bring
  alternatives:
  - Take out
  - Bring out
  lexicon: HALOT
  rationale: Imperative of יצא in the causative stem means to cause someone to go
    out. 'Bring' is natural English here and fits the following destination phrase
    'outside the camp.'
- source_word: הַמְקַלֵּל
  chosen: the one who cursed
  alternatives:
  - the blasphemer
  - the curser
  - the one who blasphemed
  lexicon: HALOT
  rationale: From קלל in the participial form, referring to the specific offender
    in context. 'The one who cursed' stays close to the Hebrew and avoids importing
    the more interpretive 'blasphemer' into the main text, though the context is cursing
    the divine Name.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - outside the encampment
  lexicon: HALOT
  rationale: Standard spatial expression. 'Outside the camp' is idiomatic and preserves
    the ritual/judicial setting of removal from the community space.
- source_word: וְסָמְכוּ
  chosen: let ... lay
  alternatives:
  - and they shall lay
  - and let them place
  - and they shall lean
  lexicon: HALOT
  rationale: סמך with hands on a head is the established idiom for laying hands. Because
    the verse continues the force of the initial command, English 'let ... lay' conveys
    the jussive/imperatival sequence naturally.
- source_word: כָל הַשֹּׁמְעִים
  chosen: all who heard him
  alternatives:
  - all the hearers
  - all who heard
  lexicon: HALOT
  rationale: The participle denotes those who heard the offense/witnesses. Adding
    'him' clarifies the object in English from the context without overtranslating.
- source_word: יְדֵיהֶם עַל רֹאשׁוֹ
  chosen: their hands on his head
  alternatives:
  - their hand on his head
  lexicon: HALOT
  rationale: Hebrew uses plural 'hands'; English should preserve the plural. The singular
    'head' is literal and idiomatic.
- source_word: וְרָגְמוּ אֹתוֹ
  chosen: stone him
  alternatives:
  - pelt him with stones
  lexicon: HALOT
  rationale: רגם is the standard verb for execution by stoning. 'Stone him' is the
    conventional and precise English equivalent.
- source_word: כָל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  - the whole community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves the formal communal sense better than the flatter 'community,' while
    remaining readable.
