theological_decisions:
- issue: Whether to render the offender as 'the one who cursed' or 'the blasphemer'
  chosen_reading: the one who cursed
  alternative_readings:
  - the blasphemer
  - the one who blasphemed
  rationale: The immediate Hebrew term is the participle of קלל, 'to curse,' and optimal
    equivalence favors preserving that lexical sense in the main text. Because the
    broader context concerns cursing the divine Name, 'blasphemer' is a legitimate
    interpretive alternative and is preserved in a footnote rather than elevated into
    the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Meaning of the hand-laying action
  chosen_reading: retain the literal action without explaining its significance in
    the main text
  alternative_readings:
  - interpret as formal witness identification
  - interpret as symbolic transfer of guilt
  rationale: The text states the action but does not explicitly explain its symbolism
    here. To avoid importing a specific theological interpretation, the translation
    keeps the literal wording and leaves interpretive possibilities unstated in the
    main text.
  doctrine_reference: 'Translation philosophy: never import doctrinal claims the text
    does not make; preserve tension rather than resolve it.'
