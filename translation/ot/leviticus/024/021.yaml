id: LEV.24.21
reference: Leviticus 24:21
source:
  edition: WLC
  text: וּ/מַכֵּ֥ה בְהֵמָ֖ה יְשַׁלְּמֶ֑/נָּה וּ/מַכֵּ֥ה אָדָ֖ם יוּמָֽת׃
translation:
  text: And whoever strikes down an animal shall make restitution for it, but whoever
    strikes down a man shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whoever strikes down a human being shall be put to death.' The Hebrew
      אָדָם can denote a human person more broadly, though 'man' is retained here
      to match the source's masculine singular legal formulation.
    reason: alternative_reading
lexical_decisions:
- source_word: מַכֵּה
  chosen: whoever strikes down
  alternatives:
  - the one who strikes
  - whoever kills
  lexicon: HALOT
  rationale: 'The Hifil participle of נכה here denotes a person who fatally strikes,
    as shown by the parallel outcomes: restitution for the animal and death penalty
    for the human. ''Whoever strikes down'' preserves the participial, case-law force
    while making the lethal sense clear without overcommitting to a narrower English
    legal term.'
- source_word: בְהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: A broad term for a domesticated animal or beast. 'Animal' is clear modern
    English and fits the legal context; 'livestock' may be too narrow, and 'beast'
    is archaic in this register.
- source_word: יְשַׁלְּמֶנָּה
  chosen: shall make restitution for it
  alternatives:
  - shall repay it
  - shall make it good
  lexicon: HALOT
  rationale: From שלם in the Piel, meaning to make compensation or restitution. The
    3fs suffix refers back to בְהֵמָה. 'Make restitution for it' best conveys legal
    compensation in contemporary English.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a human being
  - humankind
  lexicon: HALOT
  rationale: In this legal contrast with בְהֵמָה, אָדָם refers to an individual human
    person, not humanity in the abstract. Per doctrine guidance on אָדָם, 'man' is
    retained where context supports it; the indefinite article makes the case-law
    sense natural in English.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: 'The Hophal form is passive/causative-passive: the offender is caused
    to die, i.e., judicially put to death. ''Shall be put to death'' reflects the
    legal passive more precisely than the bare ''shall die'' and is less interpretively
    loaded than ''must be executed''.'
