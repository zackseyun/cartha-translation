theological_decisions:
- issue: Rendering of אָדָם in a legal context
  chosen_reading: a man
  alternative_readings:
  - a human being
  rationale: The Hebrew is grammatically masculine singular and functions here as
    a representative individual in case law. Following the doctrine's gender-accurate
    principle and its default for אָדָם ('man / humankind' by context), 'a man' best
    matches the source form and legal style, while the broader sense is preserved
    as an alternative.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
