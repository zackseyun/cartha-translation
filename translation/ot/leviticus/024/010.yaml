theological_decisions:
- issue: Gendered ethnic designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: Following the project's gender-accurate policy, the translation preserves
    the formal covenantal expression rather than neutralizing it. Here the phrase
    functions as the standard national designation, and retaining 'sons of Israel'
    keeps closer contact with the Hebrew wording while remaining understandable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
