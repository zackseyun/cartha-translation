id: LEV.24.10
reference: Leviticus 24:10
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ בֶּן אִשָּׁ֣ה יִשְׂרְאֵלִ֔ית וְ/הוּא֙ בֶּן אִ֣ישׁ מִצְרִ֔י בְּ/ת֖וֹךְ
    בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יִּנָּצוּ֙ בַּֽ/מַּחֲנֶ֔ה בֶּ֚ן הַ/יִּשְׂרְאֵלִ֔ית וְ/אִ֖ישׁ
    הַ/יִּשְׂרְאֵלִֽי־־׃
translation:
  text: Now the son of an Israelite woman, and he was the son of an Egyptian man,
    went out among the sons of Israel; and in the camp the son of the Israelite woman
    and an Israelite man fought.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'quarreled.' The verb can denote a dispute or a fight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form is most naturally
    rendered 'went out.' This preserves the narrative movement without over-interpreting
    from where he went out.
- source_word: בֶּן אִשָּׁה יִשְׂרְאֵלִית
  chosen: the son of an Israelite woman
  alternatives:
  - a son of an Israelite woman
  lexicon: HALOT
  rationale: This construct chain identifies the man by maternal lineage. 'The son
    of an Israelite woman' fits the subsequent repetition in the verse and the narrative's
    way of marking him out.
- source_word: וְהוּא בֶּן אִישׁ מִצְרִי
  chosen: and he was the son of an Egyptian man
  alternatives:
  - and he was the son of an Egyptian
  - and his father was an Egyptian man
  lexicon: HALOT
  rationale: The clause gives paternal identity. 'An Egyptian man' is explicit and
    natural English; 'his father was an Egyptian' is interpretive but possible. The
    chosen rendering stays closer to the Hebrew syntax.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - in the midst of the sons of Israel
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' Per the project's gender-accurate
    policy, 'sons of Israel' is retained because the Hebrew phrase is the standard
    covenantal ethnonym and not merely a generic plural. 'Israelites' is possible
    but smooths over the source expression.
- source_word: וַיִּנָּצוּ
  chosen: fought
  alternatives:
  - quarreled
  - struggled
  lexicon: HALOT
  rationale: The Niphal of נצה here denotes engaging in a dispute or fight. 'Fought'
    best fits the immediate context in the camp and the escalation that follows in
    the narrative, while remaining idiomatic.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - within the camp
  lexicon: HALOT
  rationale: מַחֲנֶה refers to the Israelite camp setting. 'In the camp' is the straightforward
    locative rendering.
- source_word: בֶּן הַיִּשְׂרְאֵלִית
  chosen: the son of the Israelite woman
  alternatives:
  - the son of the Israelite
  lexicon: HALOT
  rationale: The repeated designation is preserved for literary emphasis and identification.
    Expanding 'the Israelite' to 'the Israelite woman' avoids ambiguity in English
    while reflecting the feminine form.
- source_word: וְאִישׁ הַיִּשְׂרְאֵלִי
  chosen: and an Israelite man
  alternatives:
  - and a man of Israel
  - and the Israelite man
  lexicon: HALOT
  rationale: אִישׁ הַיִּשְׂרְאֵלִי contrasts the mixed-heritage man with another man
    identified as Israelite. The Hebrew lacks the article on אִישׁ but has it on the
    gentilic; 'an Israelite man' is the most natural English rendering of the contrast.
