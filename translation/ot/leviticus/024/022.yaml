id: LEV.24.22
reference: Leviticus 24:22
source:
  edition: WLC
  text: מִשְׁפַּ֤ט אֶחָד֙ יִהְיֶ֣ה לָ/כֶ֔ם כַּ/גֵּ֥ר כָּ/אֶזְרָ֖ח יִהְיֶ֑ה כִּ֛י אֲנִ֥י
    יְהוָ֖ה אֱלֹהֵי/כֶֽם׃
translation:
  text: There shall be one standard of judgment for you, for the sojourner as for
    the native, for I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one law for you; as for the sojourner, so for the native.' The Hebrew
      word מִשְׁפָּט can denote a legal judgment, rule, or judicial standard.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּט
  chosen: standard of judgment
  alternatives:
  - judgment
  - law
  - rule
  - justice
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the legal standard or judicial rule to be applied
    equally, not merely a single court verdict. 'Standard of judgment' captures the
    juridical sense in context while remaining natural English.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - single
  - same
  lexicon: HALOT
  rationale: The adjective emphasizes unity/equality of the legal standard. 'One'
    is the most direct rendering and works idiomatically with the clause.
- source_word: יִהְיֶה
  chosen: There shall be
  alternatives:
  - shall be
  - will be
  lexicon: HALOT
  rationale: The imperfect expresses a prescriptive legal statement. 'There shall
    be' is idiomatic English for legislation and avoids awkward repetition of 'be'
    with the fronted noun phrase.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  - among you
  lexicon: HALOT
  rationale: The preposition marks those to whom the legal requirement applies. 'For
    you' fits the legal formulation in English.
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - foreigner
  - alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel under its protection,
    not a mere passerby. 'Sojourner' preserves the covenantal/legal nuance better
    than 'foreigner,' while avoiding the dated or politically loaded 'alien'.
- source_word: אֶזְרָח
  chosen: native
  alternatives:
  - native-born
  - citizen
  lexicon: HALOT
  rationale: The term contrasts with גֵּר and denotes the native member of the land/community.
    'Native' is concise and clear in the paired comparison.
- source_word: כַּגֵּר כָּאֶזְרָח
  chosen: for the sojourner as for the native
  alternatives:
  - as for the sojourner, so for the native
  - for the resident foreigner and for the native-born alike
  lexicon: HALOT
  rationale: The paired כ comparatives express equal application of the same legal
    standard. This rendering makes the equality explicit in natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי grounds the command in Yahweh's covenant identity. 'For' is
    a natural connective in English legal/theological discourse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH and the covenant formula, the plural form functions as the
    singular title 'God.' 'Your God' preserves the covenantal grounding of the command.
