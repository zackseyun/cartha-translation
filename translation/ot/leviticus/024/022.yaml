theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of legal equality between sojourner and native
  chosen_reading: one standard of judgment for both groups
  alternative_readings:
  - one law for both groups
  rationale: The verse specifically uses מִשְׁפָּט rather than תּוֹרָה, so the translation should emphasize equal judicial standard/application rather than broaden to the whole concept of law. This avoids importing a wider claim than the Hebrew explicitly states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; never import doctrinal claims the text does not make'
