theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also fits the covenant-formula style of the verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of legal equality between sojourner and native
  chosen_reading: one standard of judgment for both groups
  alternative_readings:
  - one law for both groups
  rationale: The verse specifically uses מִשְׁפָּט rather than תּוֹרָה, so the translation
    should emphasize equal judicial standard/application rather than broaden to the
    whole concept of law. This avoids importing a wider claim than the Hebrew explicitly
    states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; never import doctrinal claims the text does not make'
