id: LEV.24.12
reference: Leviticus 24:12
source:
  edition: WLC
  text: וַ/יַּנִּיחֻ֖/הוּ בַּ/מִּשְׁמָ֑ר לִ/פְרֹ֥שׁ לָ/הֶ֖ם עַל פִּ֥י יְהוָֽה־׃פ
translation:
  text: So they put him in custody, to make the decision clear to them according to
    the word of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to clarify for them' or 'to declare distinctly to them.' The Hebrew
      verb can denote making a matter explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנִּיחֻהוּ
  chosen: So they put him
  alternatives:
  - And they placed him
  - And they set him
  lexicon: HALOT
  rationale: From נוח/הניח in the causative sense 'to place, set, put.' The waw-consecutive
    advances the narrative; 'So they put him' gives natural English while preserving
    sequence.
- source_word: בַּמִּשְׁמָר
  chosen: in custody
  alternatives:
  - under guard
  - in detention
  lexicon: HALOT
  rationale: מִשְׁמָר here denotes guarded keeping or confinement, not merely 'watch.'
    'In custody' is clear modern English and fits the legal setting.
- source_word: לִפְרֹשׁ
  chosen: to make the decision clear
  alternatives:
  - to clarify
  - to declare distinctly
  - to explain
  lexicon: HALOT
  rationale: From פרשׁ, 'to make clear, explain, declare distinctly.' In this judicial
    context the sense is not generic explanation but clarification of the ruling to
    be given. 'Make the decision clear' captures the implied legal outcome without
    overparaphrasing.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The pronominal object refers to the community/authorities awaiting clarification.
    'To them' is the most natural English complement with 'make clear.'
- source_word: עַל־פִּי
  chosen: according to the word of
  alternatives:
  - by the command of
  - according to the mouth of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the mouth of' and commonly signifies
    accordance with an authoritative utterance or command. 'According to the word
    of' preserves the verbal-authoritative nuance better than the more interpretive
    'by the command of.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
