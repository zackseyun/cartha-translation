theological_decisions:
- issue: Rendering of אָדָם in a legal context
  chosen_reading: human life
  alternative_readings:
  - man
  - person
  - human being
  rationale: The term is generic here, not male-specific. Following the doctrine's
    guidance on אָדָם ('man / humankind' by context), the translation avoids implying
    only male victims while still preserving the human referent.
  doctrine_reference: 'DOCTRINE.md: Contested terms — אָדָם adam'
- issue: Retention of masculine אִישׁ
  chosen_reading: a man
  alternative_readings:
  - whoever
  - a person
  rationale: The source uses the masculine singular אִישׁ. In keeping with the gender-accurate-over-gender-neutral
    principle, the masculine form is retained in the main text even though the law
    has representative force.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
