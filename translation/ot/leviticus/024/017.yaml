id: LEV.24.17
reference: Leviticus 24:17
source:
  edition: WLC
  text: וְ/אִ֕ישׁ כִּ֥י יַכֶּ֖ה כָּל נֶ֣פֶשׁ אָדָ֑ם מ֖וֹת יוּמָֽת־׃
translation:
  text: And if a man strikes down any human life, he shall surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'any life of a human/man.' The phrase refers to a human person or
      human life, not specifically to an immaterial 'soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kills any person.' The Hebrew verb is literally 'strikes,' but here
      it refers to a lethal blow.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ
  chosen: And if a man
  alternatives:
  - And a man
  - Whoever
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In legal material it can function
    generically, but per the gender-accurate guideline the masculine form is retained
    rather than neutralizing to 'whoever.' The prefixed וְ is carried as 'And,' linking
    this law to the preceding context, while כִּי supplies the conditional sense 'if.'
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: In this casuistic legal setting כִּי introduces a conditional clause
    best rendered 'if.'
- source_word: יַכֶּה
  chosen: strikes down
  alternatives:
  - strikes
  - kills
  - fatally strikes
  lexicon: HALOT
  rationale: The Hiphil of נכה is literally 'strike/smite,' but here with the object
    'any human life' and followed by the death penalty formula, it denotes a lethal
    blow. 'Strikes down' preserves the concrete verbal imagery better than the more
    interpretive 'kills' while still communicating the fatal result.
- source_word: כָּל נֶפֶשׁ אָדָם
  chosen: any human life
  alternatives:
  - any person
  - the life of any man
  - any human being
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to a living person/life, not an immaterial 'soul'
    in the modern English sense. אָדָם in this context is generic humanity, so 'human'
    is appropriate per the doctrine note on אָדָם. 'Any human life' reflects the Hebrew
    construction closely and preserves the gravity of taking a human life.
- source_word: מוֹת יוּמָת
  chosen: he shall surely be put to death
  alternatives:
  - he must be put to death
  - he shall certainly be executed
  lexicon: HALOT
  rationale: 'This infinitive absolute + passive/imperfect construction intensifies
    the penalty: ''surely be put to death.'' The passive preserves the Hebrew legal
    formula better than the more modern but slightly more interpretive ''executed.'''
