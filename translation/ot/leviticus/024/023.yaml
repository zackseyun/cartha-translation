id: LEV.24.23
reference: Leviticus 24:23
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁה֮ אֶל בְּנֵ֣י יִשְׂרָאֵל֒ וַ/יּוֹצִ֣יאוּ אֶת הַֽ/מְקַלֵּ֗ל
    אֶל מִ/חוּץ֙ לַֽ/מַּחֲנֶ֔ה וַ/יִּרְגְּמ֥וּ אֹת֖/וֹ אָ֑בֶן וּ/בְנֵֽי יִשְׂרָאֵ֣ל
    עָשׂ֔וּ כַּֽ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־׃פ
translation:
  text: So Moses spoke to the sons of Israel, and they brought the one who had cursed
    out of the camp and stoned him with stones. Thus the sons of Israel did as the
    LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the blasphemer.' The Hebrew participle literally means 'the one who
      cursed,' referring to the man who cursed the divine Name in the preceding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'Spoke' is the natural
    English rendering here for Moses addressing the people.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the idiom and the masculine
    plural form, in keeping with the gender-accurate policy. 'Israelites' is possible
    but less directly reflects the Hebrew expression.
- source_word: וַיּוֹצִיאוּ
  chosen: they brought ... out
  alternatives:
  - they took ... out
  - they led ... out
  lexicon: HALOT
  rationale: The hiphil of יצא means 'cause to go out, bring out.' 'Brought ... out'
    is idiomatic in English and fits the judicial action described.
- source_word: הַמְקַלֵּל
  chosen: the one who had cursed
  alternatives:
  - the blasphemer
  - the curser
  - the one cursing
  lexicon: HALOT
  rationale: The participle from קלל refers back to the man who cursed in the preceding
    context. 'The one who had cursed' is clear and avoids importing the more interpretive
    term 'blasphemer' into the main text, though that sense is contextually related.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: out of the camp
  alternatives:
  - outside the camp
  lexicon: HALOT
  rationale: The phrase literally means 'to/outside the outside of the camp.' English
    idiom favors either 'outside the camp' or 'out of the camp.' Because the motion
    verb already implies movement, 'out of the camp' reads smoothly.
- source_word: וַיִּרְגְּמוּ אֹתוֹ אָבֶן
  chosen: stoned him with stones
  alternatives:
  - stoned him
  - pelted him with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'stone' after the verb 'stone,' an idiomatic
    intensification. Retaining 'with stones' preserves the lexical fullness of the
    source better than simply 'stoned him,' while remaining natural enough in English.
- source_word: עָשׂוּ כַּאֲשֶׁר צִוָּה
  chosen: did as ... had commanded
  alternatives:
  - did just as ... commanded
  lexicon: HALOT
  rationale: This formula summarizes obedience to a prior command. The pluperfect-like
    'had commanded' fits the sequence in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated translation
    policy.
