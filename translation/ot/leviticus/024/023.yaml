theological_decisions:
- issue: Whether to render הַמְקַלֵּל with the more theologically loaded 'blasphemer'
  chosen_reading: the one who had cursed
  alternative_readings:
  - the blasphemer
  rationale: Although the broader context concerns blasphemy against the divine Name,
    the lexical form here is the participle of קלל ('to curse'). The main text therefore
    keeps the more direct lexical sense and avoids importing a stronger interpretive
    label than the Hebrew itself uses in this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
