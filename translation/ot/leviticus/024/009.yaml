theological_decisions:
- issue: Referent of singular לֹו in a context mentioning Aaron and his sons
  chosen_reading: Rendered singularly as 'to him,' referring to Aaron as the representative
    head of the priestly line.
  alternative_readings:
  - Rendered collectively as 'to them' to match the broader priestly recipients
  rationale: The Hebrew is singular, and preserving that singular respects the source
    text while allowing the context to show that Aaron stands representatively for
    the priesthood. This avoids silently smoothing the grammar.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
