id: LEV.24.9
reference: Leviticus 24:9
source:
  edition: WLC
  text: וְ/הָֽיְתָה֙ לְ/אַהֲרֹ֣ן וּ/לְ/בָנָ֔י/ו וַ/אֲכָלֻ֖/הוּ בְּ/מָק֣וֹם קָדֹ֑שׁ
    כִּ֡י קֹדֶשׁ֩ קָֽדָשִׁ֨ים ה֥וּא ל֛/וֹ מֵ/אִשֵּׁ֥י יְהוָ֖ה חָק עוֹלָֽם־׃ס
translation:
  text: It shall belong to Aaron and to his sons, and they shall eat it in a holy
    place, because it is most holy to him from the food offerings of the LORD, a permanent
    statute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the fire offerings of the LORD.' The Hebrew term traditionally
      refers to offerings presented by fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: It shall belong
  alternatives:
  - It shall be
  - It shall become
  lexicon: HALOT
  rationale: The verb היה with לְ plus recipient ('to Aaron') expresses possession/allotment
    here, not mere existence. 'It shall belong' makes the legal sense clear in natural
    English.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - for Aaron and for his sons
  lexicon: HALOT
  rationale: The preposition ל marks possession/allotment. 'Sons' is retained as gender-accurate
    and contextually specific, referring to the male priestly descendants.
- source_word: וַאֲכָלֻהוּ
  chosen: and they shall eat it
  alternatives:
  - and they must eat it
  - and they are to eat it
  lexicon: HALOT
  rationale: The form continues the legal instruction with future/result force. 'Shall
    eat' preserves the prescriptive sense without over-interpreting modality.
- source_word: בְּמָקוֹם קָדֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The Hebrew lacks the article on both words, so 'a holy place' is the
    most direct rendering. 'The holy place' could imply the specific sanctuary room,
    which is more specific than the Hebrew here requires.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the rationale for the restriction. 'Because' is clearer in
    contemporary English than the more formal 'for.'
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a most holy thing
  lexicon: HALOT
  rationale: This superlative idiom denotes the highest degree of holiness. 'Most
    holy' communicates the sense idiomatically in English; 'holy of holies' is more
    wooden and can be confused with the sanctuary space.
- source_word: הוּא לוֹ
  chosen: it is most holy to him
  alternatives:
  - it is his as most holy
  - it is most holy for him
  lexicon: HALOT
  rationale: The pronoun plus לֹו refers back to Aaron as representative of the priestly
    line receiving this portion. 'To him' preserves the singular Hebrew while remaining
    understandable in context.
- source_word: מֵאִשֵּׁי יְהוָה
  chosen: from the food offerings of the LORD
  alternatives:
  - from the offerings by fire of the LORD
  - from the fire offerings of the LORD
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally refers to offerings presented by fire, but in English
    'food offerings' is a clear, established rendering that reflects sacrificial presentation
    without implying God literally eats. The divine name follows project policy as
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: חָק עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting statute
  lexicon: HALOT
  rationale: The phrase denotes an enduring legal ordinance. 'Permanent statute' is
    readable modern English and preserves the force without archaic tone.
