id: LEV.24.11
reference: Leviticus 24:11
source:
  edition: WLC
  text: וַ֠/יִּקֹּב בֶּן הָֽ/אִשָּׁ֨ה הַ/יִּשְׂרְאֵלִ֤ית אֶת הַ/שֵּׁם֙ וַ/יְקַלֵּ֔ל
    וַ/יָּבִ֥יאוּ אֹת֖/וֹ אֶל מֹשֶׁ֑ה וְ/שֵׁ֥ם אִמּ֛/וֹ שְׁלֹמִ֥ית בַּת דִּבְרִ֖י
    לְ/מַטֵּה דָֽן־־־־־׃
translation:
  text: The son of the Israelite woman pronounced the Name and cursed, and they brought
    him to Moses. Now his mother's name was Shelomith daughter of Dibri, of the tribe
    of Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'blasphemed the Name.' The Hebrew verb can be understood as 'pronounced
      distinctly' or, in this context, as part of the act of blasphemy.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקֹּב
  chosen: pronounced
  alternatives:
  - blasphemed
  - pierced
  - pronounced distinctly
  lexicon: HALOT
  rationale: 'The verb נקב literally has the sense of piercing or specifying/uttering
    distinctly. In this context, with אֶת־הַשֵּׁם followed by וַיְקַלֵּל (''and cursed''),
    it most naturally refers to explicitly uttering the divine Name rather than itself
    meaning ''blasphemed.'' Rendering it as ''pronounced'' preserves the sequence:
    he uttered the Name and then cursed.'
- source_word: בֶּן הָאִשָּׁה הַיִּשְׂרְאֵלִית
  chosen: the son of the Israelite woman
  alternatives:
  - the Israelite woman's son
  lexicon: HALOT
  rationale: A straightforward, natural rendering of the construct chain that preserves
    the narrative identification established in the context.
- source_word: אֶת הַשֵּׁם
  chosen: the Name
  alternatives:
  - the name
  - the divine Name
  lexicon: HALOT
  rationale: With the article, this expression is widely understood as a reverential
    reference to the divine name in context. Capitalizing 'Name' signals that this
    is not merely any name but the specific divine Name, while avoiding importing
    the tetragrammaton into the text.
- source_word: וַיְקַלֵּל
  chosen: and cursed
  alternatives:
  - and reviled
  - and blasphemed
  lexicon: HALOT
  rationale: קלל in the piel commonly means 'to curse.' 'Cursed' is the most direct
    and contextually appropriate rendering; 'blasphemed' would over-interpret because
    the prior clause already identifies the object as the divine Name.
- source_word: וַיָּבִיאוּ אֹתוֹ אֶל מֹשֶׁה
  chosen: and they brought him to Moses
  alternatives:
  - and he was brought to Moses
  lexicon: HALOT
  rationale: The Hebrew has an active third person plural with unspecified subject.
    English naturally mirrors this with 'they brought him,' preserving the Hebrew's
    indefinite plural.
- source_word: וְשֵׁם אִמּוֹ
  chosen: Now his mother's name was
  alternatives:
  - and his mother's name was
  lexicon: HALOT
  rationale: The conjunction here introduces parenthetical background information.
    'Now' is a natural English discourse marker for this explanatory aside.
- source_word: שְׁלֹמִית בַּת דִּבְרִי
  chosen: Shelomith daughter of Dibri
  alternatives:
  - Shelomith, the daughter of Dibri
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The appositional
    relationship is preserved in concise English.
- source_word: לְמַטֵּה דָן
  chosen: of the tribe of Dan
  alternatives:
  - belonging to the tribe of Dan
  - for the tribe of Dan
  lexicon: HALOT
  rationale: This idiom identifies tribal affiliation. 'Of the tribe of Dan' is the
    standard clear English equivalent.
