theological_decisions:
- issue: Meaning of נקב with 'the Name' in a blasphemy context
  chosen_reading: The verb refers to explicitly uttering/pronouncing the divine Name,
    followed by a separate act of cursing.
  alternative_readings:
  - The verb itself means 'blasphemed,' yielding 'blasphemed the Name and cursed.'
  rationale: 'The verse uses two verbs: נקב and קלל. Preserving both avoids collapsing
    them into a single idea. This keeps the narrative tension and legal significance:
    the offender uttered the divine Name and cursed. The translation does not specify
    the exact form of the curse beyond what the Hebrew states.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
