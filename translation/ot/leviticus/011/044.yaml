theological_decisions:
- issue: Holiness language in relation to God's character and Israel's obligation
  chosen_reading: Retain 'holy' consistently for both God and the people
  alternative_readings:
  - Use 'set apart' for one or both occurrences
  rationale: The verse grounds Israel's required holiness in the LORD's own holiness. Using 'holy' in both places preserves the theological linkage and covenantal force of the repeated קדשׁ word-group.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Rendering נַפְשֹׁתֵיכֶם
  chosen_reading: Translate idiomatically as 'yourselves' rather than 'your souls'
  alternative_readings:
  - your souls
  - your lives
  rationale: The Hebrew term can denote soul, life, self, or person. Here the command concerns personal defilement through prohibited creatures, not a technical anthropology. 'Yourselves' avoids importing doctrinal claims about body-soul distinction that the text does not make.
  doctrine_reference: Affirmations / Never import doctrinal claims the text does not make
