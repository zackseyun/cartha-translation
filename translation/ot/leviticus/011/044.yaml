id: LEV.11.44
reference: Leviticus 11:44
source:
  edition: WLC
  text: כִּ֣י אֲנִ֣י יְהוָה֮ אֱלֹֽהֵי/כֶם֒ וְ/הִתְקַדִּשְׁתֶּם֙ וִ/הְיִיתֶ֣ם קְדֹשִׁ֔ים כִּ֥י קָד֖וֹשׁ אָ֑נִי וְ/לֹ֤א תְטַמְּאוּ֙ אֶת נַפְשֹׁ֣תֵי/כֶ֔ם בְּ/כָל הַ/שֶּׁ֖רֶץ הָ/רֹמֵ֥שׂ עַל הָ/אָֽרֶץ־־־׃
translation:
  text: For I am Yahweh your God. Consecrate yourselves therefore, and be holy, for I am holy. And you shall not defile yourselves with any swarming thing that moves on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sanctify yourselves.' The Hebrew verb is reflexive, meaning to set yourselves apart as holy.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not make yourselves unclean with any creeping thing that moves on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: In covenant formula context with YHWH as subject, the plural form functions as the singular 'God'; 'your God' is the natural and theologically correct English rendering.
- source_word: וְהִתְקַדִּשְׁתֶּם
  chosen: Consecrate yourselves
  alternatives:
  - Sanctify yourselves
  - Show yourselves holy
  lexicon: HALOT
  rationale: 'The hitpael of קדשׁ here is reflexive: the people are commanded to set themselves apart in response to God''s holiness. ''Consecrate yourselves'' preserves the cultic and moral force better than the more archaic ''sanctify yourselves.'''
- source_word: וִהְיִיתֶם קְדֹשִׁים
  chosen: and be holy
  alternatives:
  - and you shall be holy
  - and become holy
  lexicon: HALOT
  rationale: This clause expresses the required state/result corresponding to consecration. 'Be holy' is idiomatic modern English and preserves the imperative force in context.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: '''Holy'' is the standard and contextually appropriate rendering for קדושׁ in this theological formula. ''Set apart'' captures part of the meaning but is too reductive in this covenantal context.'
- source_word: תְטַמְּאוּ
  chosen: defile
  alternatives:
  - make unclean
  - render impure
  lexicon: HALOT
  rationale: The piel of טמא denotes causing impurity/defilement. 'Defile' communicates both ritual and moral contamination in readable English, fitting the holiness context.
- source_word: נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  - your lives
  - your persons
  lexicon: HALOT
  rationale: Although נֶפֶשׁ is literally 'soul/life/self,' in this reflexive construction English idiom is best served by 'yourselves.' This avoids an overly dualistic reading of 'souls' while preserving the sense that the persons themselves are defiled.
- source_word: שֶּׁרֶץ
  chosen: swarming thing
  alternatives:
  - creeping thing
  - teeming thing
  lexicon: HALOT
  rationale: In Leviticus 11 this term refers to small creatures that swarm or teem. 'Swarming thing' is more precise to the Hebrew than the traditional but potentially misleading 'creeping thing.'
- source_word: הָרֹמֵשׂ
  chosen: that moves
  alternatives:
  - that creeps
  - that crawls
  lexicon: HALOT
  rationale: The participle from רמשׂ denotes moving about close to the ground. 'That moves' is broad enough to match the Hebrew without over-specifying locomotion; 'creeps' is possible but overlaps too heavily with older renderings of שׁרץ.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - on the ground
  - upon the land
  lexicon: HALOT
  rationale: The phrase denotes terrestrial movement. 'On the earth' is a straightforward rendering, though 'on the ground' is also possible in context.
