theological_decisions:
- issue: Covenantal basis for holiness
  chosen_reading: The verse grounds Israel's required holiness in the LORD's identity, his redemptive act in the exodus, and his covenant relation as their God.
  alternative_readings:
  - The verse is only a ritual-purity instruction without broader covenantal significance.
  rationale: The immediate context is dietary holiness, but the wording explicitly ties the command to the exodus formula and God's own holiness. The translation preserves that theological grounding without expanding beyond the text.
