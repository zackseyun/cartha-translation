id: LEV.11.45
reference: Leviticus 11:45
source:
  edition: WLC
  text: כִּ֣י אֲנִ֣י יְהוָ֗ה הַֽ/מַּעֲלֶ֤ה אֶתְ/כֶם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם לִ/הְיֹ֥ת לָ/כֶ֖ם לֵ/אלֹהִ֑ים וִ/הְיִיתֶ֣ם קְדֹשִׁ֔ים כִּ֥י קָד֖וֹשׁ אָֽנִי׀׃
translation:
  text: For I am Yahweh, who brings you up from the land of Egypt to be your God. And you shall be holy, for I am holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who brings you up from the land of Egypt.' The Hebrew uses a participle, which can be rendered more literally as a present-like expression, though the exodus event is past.
    reason: lexical_alternative
  - marker: b
    text: Or 'for I am holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name, preserving the traditional small-caps covenantal form in English rather than transliteration.
- source_word: הַמַּעֲלֶה
  chosen: who brought you up
  alternatives:
  - who brings you up
  - who led you up
  lexicon: HALOT
  rationale: The participle of עלה literally means 'the one bringing up.' In this exodus context, idiomatic English prefers past reference, 'who brought you up,' while retaining the Hebrew image of ascent from Egypt rather than flattening to simply 'rescued.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Keeps the explicit noun 'land' present in the Hebrew and preserves the covenantal-exodus formula.
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  chosen: to be your God
  alternatives:
  - to become your God
  - to be God to you
  lexicon: HALOT
  rationale: This is a standard covenant expression. 'To be your God' is natural English and preserves the relational force without unnecessary awkwardness.
- source_word: וִהְיִיתֶם
  chosen: you shall be
  alternatives:
  - and you must be
  - and be
  lexicon: HALOT
  rationale: The form carries injunctive force in context following the grounding statement about God's holiness. 'You shall be' preserves the covenant-command tone without over-paraphrasing.
- source_word: קְדֹשִׁים
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: '''Holy'' is the established and most theologically precise rendering here. ''Set apart'' captures part of the sense but is too reductive in this context.'
- source_word: כִּי קָדוֹשׁ אָנִי
  chosen: because I am holy
  alternatives:
  - for I am holy
  lexicon: HALOT
  rationale: The second כִּי gives the ground for Israel's holiness. 'Because' makes the causal relation explicit in contemporary English, while 'for' would also be possible in a more formal style.
