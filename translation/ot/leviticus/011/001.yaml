id: LEV.11.1
reference: Leviticus 11:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹ֥ר אֲלֵ/הֶֽם־־׃
translation:
  text: And Yahweh spoke to Moses and to Aaron, saying to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces a new narrative event. 'Spoke' is the standard and slightly more formal rendering for divine address, fitting the formulaic style better than 'said.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech. 'To' is natural modern English and sufficiently formal.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and unto
  lexicon: HALOT
  rationale: The conjunction plus preposition coordinates Aaron with Moses as a co-addressee; retaining the repeated preposition reflects the Hebrew structure without sounding unnatural.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct commonly introduces the content of speech. 'Saying' preserves the formal Hebrew discourse marker in readable English.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: The pronominal object makes explicit that the following speech is directed to both Moses and Aaron. Retaining it avoids smoothing away a meaningful element of the Hebrew, even though English could omit it.
