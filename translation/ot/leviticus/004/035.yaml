theological_decisions:
- issue: Rendering of sacrificial atonement language
  chosen_reading: shall make atonement for him
  alternative_readings:
  - shall make expiation for him
  rationale: The verse describes priestly sacrificial procedure and its effect without specifying a later systematic theory of atonement. 'Make atonement' preserves the biblical cultic category and theological breadth better than a narrower interpretive gloss.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
