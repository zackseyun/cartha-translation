id: LEV.4.35
reference: Leviticus 4:35
source:
  edition: WLC
  text: וְ/אֶת כָּל חֶלְבָּ֣/ה יָסִ֗יר כַּ/אֲשֶׁ֨ר יוּסַ֥ר חֵֽלֶב הַ/כֶּשֶׂב֮ מִ/זֶּ֣בַח הַ/שְּׁלָמִים֒ וְ/הִקְטִ֨יר הַ/כֹּהֵ֤ן אֹתָ/ם֙ הַ/מִּזְבֵּ֔חָ/ה עַ֖ל אִשֵּׁ֣י יְהוָ֑ה וְ/כִפֶּ֨ר עָלָ֧י/ו הַ/כֹּהֵ֛ן עַל חַטָּאת֥/וֹ אֲשֶׁר חָטָ֖א וְ/נִסְלַ֥ח לֽ/וֹ־־־־־׃פ
translation:
  text: And he shall remove all its fat, just as the fat of the lamb is removed from the sacrifice of peace offerings, and the priest shall burn it on the altar, on the food offerings of Yahweh. Thus the priest shall make atonement for him concerning the sin that he committed, and he shall be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offerings by fire to the LORD.' The Hebrew expression is a technical sacrificial term.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְבָּהּ / חֵלֶב
  chosen: fat
  alternatives:
  - fat portions
  lexicon: HALOT
  rationale: The term denotes the animal fat designated for removal and offering. 'Fat' is the plain lexical sense; 'fat portions' is interpretive and can be preserved as an alternative nuance but is not necessary in the main text.
- source_word: יָסִיר / יוּסַר
  chosen: shall remove / is removed
  alternatives:
  - take away / is taken away
  lexicon: HALOT
  rationale: The Hiphil of סור here refers to removing the specified fat from the animal in sacrificial procedure. 'Remove' is natural modern English and preserves the ritual action.
- source_word: הַכֶּשֶׂב
  chosen: the lamb
  alternatives:
  - the sheep
  lexicon: HALOT
  rationale: כֶּשֶׂב commonly refers to a lamb in sacrificial contexts. 'Lamb' fits the immediate cultic setting and matches the likely referent more precisely than the broader 'sheep'.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the peace offering sacrifice
  lexicon: HALOT
  rationale: זֶבַח is 'sacrifice,' and שְׁלָמִים is the technical term traditionally rendered 'peace offerings.' 'Fellowship offerings' is possible, but 'peace offerings' better preserves the established sacrificial category while remaining understandable.
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts this verb refers specifically to burning on the altar, often with the sense of producing smoke. 'Shall burn' is concise and idiomatic; the more technical nuance is not lost in context.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - it
  lexicon: Hebrew grammar
  rationale: The pronoun is masculine plural, referring collectively to the several pieces of fat to be burned. English 'them' reflects the plural form.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending can suggest motion toward, but in English sacrificial idiom 'burn on the altar' best conveys the intended action and location.
- source_word: עַל אִשֵּׁי יְהוָה
  chosen: on top of the food offerings of the LORD
  alternatives:
  - upon the offerings by fire to the LORD
  - in addition to the LORD's food offerings
  lexicon: HALOT
  rationale: אִשֵּׁי יְהוָה is the technical expression for offerings made by fire to YHWH. To avoid opaque jargon, 'food offerings of the LORD' communicates the cultic category in readable English. 'On top of' reflects עַל in this procedural context, likely indicating placement atop the altar fire/offerings.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: Hebrew Bible convention
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְכִפֶּר עָלָיו
  chosen: shall make atonement for him
  alternatives:
  - shall purge him
  - shall make expiation for him
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately rendered 'make atonement.' This preserves the cultic-theological force without importing a narrower theory of atonement.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for the sin that he committed
  alternatives:
  - concerning his sin that he sinned
  - because of his sin which he committed
  lexicon: HALOT
  rationale: The phrase specifies the offense for which atonement is made. 'The sin that he committed' is idiomatic English that preserves the Hebrew emphasis without awkward repetition.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  lexicon: HALOT
  rationale: 'The Niphal of סלח here expresses the result of the ritual: forgiveness granted to the offender. ''He shall be forgiven'' is clear modern English. The alternative more closely mirrors Hebrew syntax but is less natural.'
