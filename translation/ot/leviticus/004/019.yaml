id: LEV.4.19
reference: Leviticus 4:19
source:
  edition: WLC
  text: וְ/אֵ֥ת כָּל חֶלְבּ֖/וֹ יָרִ֣ים מִמֶּ֑/נּוּ וְ/הִקְטִ֖יר הַ/מִּזְבֵּֽחָ/ה־׃
translation:
  text: And he shall remove all its fat from it and turn it into smoke on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and burn it on the altar.' The Hebrew verb specifically
      denotes making an offering go up in smoke in a sacrificial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: And
  alternatives:
  - and
  - now
  lexicon: HALOT
  rationale: The conjunction links this action to the preceding ritual sequence. The
    object marker itself is not separately represented in English, since the direct
    object is naturally conveyed by word order.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - every part of
  lexicon: HALOT
  rationale: 'The term indicates totality: all of the designated fat is to be removed,
    not merely a portion.'
- source_word: חֶלְבּוֹ
  chosen: its fat
  alternatives:
  - his fat
  lexicon: HALOT
  rationale: Though the suffix is grammatically masculine singular, the referent is
    the sacrificial animal, so English idiom appropriately uses 'its' rather than
    'his.' 'Fat' is the standard sacrificial term in Leviticus for the portions reserved
    for burning.
- source_word: יָרִים
  chosen: shall remove
  alternatives:
  - shall lift up
  - shall take away
  lexicon: HALOT
  rationale: The Hiphil of רום literally involves lifting/removing. In this sacrificial
    context, the sense is removing the fat from the animal for offering. 'Remove'
    communicates the ritual action more clearly than the more wooden 'lift up.'
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  - out of it
  lexicon: HALOT
  rationale: The preposition marks separation from the sacrificial animal. English
    'from it' is the natural rendering for a non-personal referent.
- source_word: וְהִקְטִיר
  chosen: and turn it into smoke
  alternatives:
  - and burn
  - and make it smoke
  lexicon: HALOT
  rationale: In priestly sacrificial language, הקטיר refers specifically to causing
    an offering portion to go up in smoke on the altar, not merely generic burning.
    'Turn it into smoke' preserves that cultic nuance in accessible English.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  - at the altar
  lexicon: HALOT
  rationale: The directional ending can suggest movement toward the altar, but with
    הקטיר the idiomatic English expression is 'on the altar,' indicating the place
    where the fat is offered up in smoke.
