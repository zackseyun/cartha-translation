id: LEV.4.14
reference: Leviticus 4:14
source:
  edition: WLC
  text: וְ/נֽוֹדְעָה֙ הַֽ/חַטָּ֔את אֲשֶׁ֥ר חָטְא֖וּ עָלֶ֑י/הָ וְ/הִקְרִ֨יבוּ הַ/קָּהָ֜ל
    פַּ֤ר בֶּן בָּקָר֙ לְ/חַטָּ֔את וְ/הֵבִ֣יאוּ אֹת֔/וֹ לִ/פְנֵ֖י אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: and the sin that they committed becomes known, then the assembly shall present
    a bull from the herd as a sin offering and bring it before the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew חַטָּאת (ḥaṭṭa''t) is used twice in this verse: first meaning ''sin,''
      then meaning ''sin offering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֽוֹדְעָה
  chosen: becomes known
  alternatives:
  - is made known
  - is discovered
  - comes to light
  lexicon: HALOT
  rationale: 'Niphal of ידע here is passive/inchoative: the offense is brought to
    awareness. ''Becomes known'' is natural English and preserves the sense without
    over-specifying the agent.'
- source_word: הַחַטָּאת
  chosen: the sin
  alternatives:
  - the sin offering
  - the offense
  lexicon: HALOT
  rationale: Although חטאת can mean either 'sin' or 'sin offering,' the following
    relative clause 'which they committed' requires the sense 'sin' here; the later
    לְחַטָּאת carries the sacrificial sense.
- source_word: אֲשֶׁר חָטְאוּ עָלֶיהָ
  chosen: that they committed
  alternatives:
  - in which they sinned
  - which they incurred
  lexicon: HALOT
  rationale: This clause identifies the specific offense. English idiom prefers 'committed'
    with 'sin,' while the Hebrew preposition על in this construction is not naturally
    carried over woodenly.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the community
  lexicon: HALOT
  rationale: '''Assembly'' is a clear rendering of קהל in cultic/legal context and
    avoids overly church-coded language while preserving the corporate sense.'
- source_word: וְהִקְרִיבוּ
  chosen: shall present
  alternatives:
  - shall offer
  - shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts often means to present/offer. 'Present'
    fits well here because a second verb, 'bring,' follows later; this avoids awkward
    repetition while retaining sacrificial nuance.
- source_word: פַּר בֶּן בָּקָר
  chosen: a bull from the herd
  alternatives:
  - a young bull
  - a bull, a son of cattle
  lexicon: HALOT
  rationale: The phrase denotes a bull of the cattle herd. 'A bull from the herd'
    is idiomatic and sufficiently precise; 'young bull' is possible in some contexts
    but is less explicit here than the herd-animal designation.
- source_word: לְחַטָּאת
  chosen: as a sin offering
  alternatives:
  - for a sin offering
  - for sin
  lexicon: HALOT
  rationale: Here חטאת clearly refers to the sacrificial category. 'As a sin offering'
    communicates function in natural English.
- source_word: וְהֵבִיאוּ אֹתוֹ
  chosen: and bring it
  alternatives:
  - and they shall bring it
  - and bring the bull
  lexicon: HALOT
  rationale: Hiphil of בוא means to bring. The object pronoun refers to the bull.
    English can omit the repeated subject after 'the assembly shall present' without
    loss.
- source_word: לִפְנֵי אֹהֶל מוֹעֵד
  chosen: before the tent of meeting
  alternatives:
  - to the front of the tent of meeting
  - before the tabernacle of meeting
  lexicon: HALOT
  rationale: This is the standard cultic location phrase. 'Before the tent of meeting'
    is both accurate and readable; 'tabernacle' is more interpretive/traditional than
    the Hebrew wording.
