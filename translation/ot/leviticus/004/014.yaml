theological_decisions:
- issue: Rendering of sacrificial terminology חטאת in two senses within one verse
  chosen_reading: Translate first occurrence as 'sin' and second as 'sin offering'
  alternative_readings:
  - Translate both occurrences uniformly as 'sin offering'
  - Translate both more abstractly as 'offense'/'purification offering'
  rationale: 'The verse intentionally uses the same Hebrew noun with different contextual
    senses: first for the offense discovered, then for the prescribed sacrifice. Preserving
    the contextual distinction is necessary for intelligibility and reflects normal
    Hebrew sacrificial usage without importing later doctrinal categories.'
  doctrine_reference: Translation philosophy §§1, 5
