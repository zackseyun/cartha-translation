id: LEV.4.18
reference: Leviticus 4:18
source:
  edition: WLC
  text: וּ/מִן הַ/דָּ֞ם יִתֵּ֣ן עַל קַרְנֹ֣ת הַ/מִּזְבֵּ֗חַ אֲשֶׁר֙ לִ/פְנֵ֣י יְהוָ֔ה אֲשֶׁ֖ר בְּ/אֹ֣הֶל מוֹעֵ֑ד וְ/אֵ֣ת כָּל הַ/דָּ֗ם יִשְׁפֹּךְ֙ אֶל יְסוֹד֙ מִזְבַּ֣ח הָ/עֹלָ֔ה אֲשֶׁר פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׀־־־־׃
translation:
  text: And from the blood he shall put some on the horns of the altar that is before Yahweh, which is in the tent of meeting, and all the blood he shall pour out at the base of the altar of burnt offering, which is at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the blood he shall put''; the English ''some'' makes the partitive sense explicit in contrast to ''all the blood'' later in the verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַדָּם
  chosen: And from the blood ... some
  alternatives:
  - And some of the blood
  - And from the blood
  lexicon: HALOT
  rationale: The Hebrew literally begins 'and/from the blood he shall put.' English requires the implied partitive sense to be made explicit; 'some' is supplied because only part of the blood is applied to the horns, in contrast to 'all the blood' later in the verse.
- source_word: יִתֵּן
  chosen: he shall put
  alternatives:
  - he shall apply
  - he shall place
  lexicon: HALOT
  rationale: נתן is the common verb 'give/put.' In sacrificial procedure, 'put' is the most direct and sufficiently natural rendering; 'apply' is interpretive and slightly more technical.
- source_word: קַרְנֹת הַמִּזְבֵּחַ
  chosen: the horns of the altar
  alternatives:
  - the projections of the altar
  lexicon: HALOT
  rationale: קרנות is literally 'horns.' This is standard sacrificial/tabernacle terminology and should be preserved rather than flattened.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  chosen: that is before the LORD
  alternatives:
  - which is before the LORD
  - that is in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי often means 'before/in the presence of.' Here the spatial cultic sense is primary, so 'before the LORD' best preserves both location and covenantal significance. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר בְּאֹהֶל מוֹעֵד
  chosen: which is in the tent of meeting
  alternatives:
  - which is in the meeting tent
  - which is in the tabernacle of meeting
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד is the standard designation for the sanctuary structure. 'Tent of meeting' is the established, transparent rendering and avoids the more interpretive 'tabernacle.'
- source_word: וְאֵת כָּל הַדָּם
  chosen: and all the blood
  alternatives:
  - and the rest of the blood
  - and all of the blood
  lexicon: HALOT
  rationale: The Hebrew says 'all the blood.' In context this means the remaining blood after some has been applied, but the text itself uses 'all,' so that wording is preserved.
- source_word: יִשְׁפֹּךְ
  chosen: he shall pour out
  alternatives:
  - he shall pour
  - he shall spill out
  lexicon: HALOT
  rationale: שׁפך commonly means 'pour out,' especially in ritual contexts. This is both accurate and idiomatic.
- source_word: אֶל יְסוֹד
  chosen: at the base
  alternatives:
  - to the foundation
  - at the foundation
  lexicon: HALOT
  rationale: יְסוֹד literally means 'foundation/base.' For an altar, 'base' is the natural English equivalent.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar of the burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering. 'Altar of burnt offering' is clear modern English and preserves the sacrificial term.
- source_word: אֲשֶׁר פֶּתַח אֹהֶל מוֹעֵד
  chosen: which is at the entrance of the tent of meeting
  alternatives:
  - which is at the doorway of the tent of meeting
  - which is at the opening of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance' is the most natural modern rendering here and fits the spatial description.
