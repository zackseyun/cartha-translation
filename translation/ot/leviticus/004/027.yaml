theological_decisions:
- issue: Rendering of מֵעַם הָאָרֶץ in sacrificial legislation
  chosen_reading: from the common people
  alternative_readings:
  - from the people of the land
  rationale: Here the phrase functions as a social/legal category contrasting ordinary Israelites with anointed priest, whole congregation, or leader in the surrounding context. The chosen rendering avoids anachronistic associations of 'people of the land' while preserving the distinction intended by the law.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of וְאָשֵׁם
  chosen_reading: and becomes guilty
  alternative_readings:
  - and incurs guilt
  - and is guilty
  rationale: The verse describes the legal state resulting from the prohibited act. 'Becomes guilty' preserves the text's movement from action to culpability without importing later theological categories beyond the immediate sacrificial context.
  doctrine_reference: Translation philosophy §3
