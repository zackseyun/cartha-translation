id: LEV.4.27
reference: Leviticus 4:27
source:
  edition: WLC
  text: וְ/אִם נֶ֧פֶשׁ אַחַ֛ת תֶּחֱטָ֥א בִ/שְׁגָגָ֖ה מֵ/עַ֣ם הָ/אָ֑רֶץ בַּ֠/עֲשֹׂתָ/הּ אַחַ֨ת מִ/מִּצְוֺ֧ת יְהוָ֛ה אֲשֶׁ֥ר לֹא תֵעָשֶׂ֖ינָה וְ/אָשֵֽׁם־־׃
translation:
  text: And if one person from the people of the land sins unintentionally by doing one of Yahweh’s commandments that must not be done, and becomes guilty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the people of the land.' Here the phrase refers to an ordinary member of the community, in contrast to a priest or leader in the surrounding laws.
    reason: lexical_alternative
  - marker: b
    text: Or 'and incurs guilt' / 'and is guilty.' The Hebrew verb can express entering a state of guilt or bearing guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ אַחַת
  chosen: one person
  alternatives:
  - one soul
  - anyone
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul/self/person' here in an idiomatic legal sense for an individual. 'One person' is natural modern English and preserves the singular legal subject better than the overly literal 'one soul.'
- source_word: תֶּחֱטָא
  chosen: sins
  alternatives:
  - commits a sin
  lexicon: HALOT
  rationale: The verb חטא is the standard verb 'to sin.' The simple verbal rendering is both accurate and readable.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - in error
  lexicon: HALOT
  rationale: This term denotes inadvertence or unintentional wrongdoing in sacrificial law contexts. 'Unintentionally' best captures the legal-sacrificial nuance without sounding casual.
- source_word: מֵעַם הָאָרֶץ
  chosen: from the common people
  alternatives:
  - from the people of the land
  - from the people of the הארץ
  lexicon: HALOT
  rationale: In this context the phrase distinguishes an ordinary Israelite from priest or leader. 'From the common people' communicates the social/legal contrast more clearly than the more literal but potentially misleading 'people of the land.'
- source_word: בַּעֲשֹׂתָהּ
  chosen: by doing
  alternatives:
  - when he does
  - in doing
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys circumstance or means. 'By doing' fits the syntax and leads naturally into the object clause.
- source_word: אַחַת מִמִּצְוֺת יְהוָה
  chosen: one of the LORD’s commandments
  alternatives:
  - any one of the LORD’s commands
  - one thing from the LORD’s commandments
  lexicon: HALOT
  rationale: This is a partitive expression referring to any individual commandment within the LORD's commands. 'Commandments' is the most standard and transparent rendering of מִצְוֺת.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  chosen: that must not be done
  alternatives:
  - which should not be done
  - which are not to be done
  lexicon: HALOT
  rationale: The relative clause identifies prohibited acts. 'That must not be done' expresses the normative force clearly in idiomatic English while preserving the passive sense.
- source_word: וְאָשֵׁם
  chosen: and becomes guilty
  alternatives:
  - and is guilty
  - and incurs guilt
  lexicon: HALOT
  rationale: The verb אשם can denote becoming guilty or bearing guilt. 'Becomes guilty' reflects the consequential force after the offense is committed and fits the legal flow of the verse.
