id: LEV.4.9
reference: Leviticus 4:9
source:
  edition: WLC
  text: וְ/אֵת֙ שְׁתֵּ֣י הַ/כְּלָיֹ֔ת וְ/אֶת הַ/חֵ֨לֶב֙ אֲשֶׁ֣ר עֲלֵי/הֶ֔ן אֲשֶׁ֖ר
    עַל הַ/כְּסָלִ֑ים וְ/אֶת הַ/יֹּתֶ֨רֶת֙ עַל הַ/כָּבֵ֔ד עַל הַ/כְּלָי֖וֹת יְסִירֶֽ/נָּה־־־־־׃
translation:
  text: and the two kidneys, and the fat that is on them, which is on the loins, and
    the appendage of the liver, along with the kidneys, he shall remove it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lobe of the liver.' The Hebrew term for this anatomical feature
      is uncertain; 'appendage' is a cautious rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  alternatives:
  - the pair of kidneys
  lexicon: HALOT
  rationale: A straightforward anatomical reference in sacrificial instructions. 'The
    two kidneys' is natural English and preserves the concrete specificity of the
    Hebrew dual/count construction.
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the suet
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חֵלֶב refers to the fatty portions
    reserved for offering. 'The fat' is the standard clear rendering; 'suet' is more
    technical but less accessible for modern readers.
- source_word: אֲשֶׁר עֲלֵיהֶן
  chosen: that is on them
  alternatives:
  - that is upon them
  lexicon: HALOT
  rationale: This relative clause modifies 'the fat' and refers back to the kidneys.
    'On them' is idiomatic modern English while remaining formally close.
- source_word: הַכְּסָלִים
  chosen: the loins
  alternatives:
  - the flanks
  lexicon: HALOT
  rationale: כְּסָלִים in this anatomical/sacrificial context refers to the region
    around the loins/flanks. 'Loins' preserves the traditional anatomical sense and
    fits the ritual description.
- source_word: הַיֹּתֶרֶת עַל הַכָּבֵד
  chosen: the appendage of the liver
  alternatives:
  - the lobe of the liver
  - the long lobe of the liver
  lexicon: HALOT
  rationale: יוֹתֶרֶת is a difficult anatomical term in sacrificial texts, commonly
    understood as an appendage/lobe attached to the liver. 'Appendage of the liver'
    is cautious and transparent, avoiding overprecision where the exact anatomy is
    debated.
- source_word: עַל הַכְּלָיוֹת
  chosen: along with the kidneys
  alternatives:
  - beside the kidneys
  - over the kidneys
  lexicon: HALOT
  rationale: Although literally 'upon the kidneys,' in this repeated sacrificial formula
    the sense is that this liver appendage is removed together with the kidneys. 'Along
    with' communicates the ritual action clearly in English while respecting the construction.
- source_word: יְסִירֶנָּה
  chosen: he shall remove it
  alternatives:
  - he is to remove it
  - he shall take it away
  lexicon: HALOT
  rationale: Hiphil of סור here denotes removing the specified fatty parts from the
    animal. Singular suffix likely gathers the listed portions as a unit. 'He shall
    remove it' preserves the procedural legal style.
