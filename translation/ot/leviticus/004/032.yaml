theological_decisions:
- issue: Rendering חַטָּאת in sacrificial law
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: While many scholars note that חַטָּאת in Leviticus can emphasize purification
    from impurity, 'sin offering' remains the clearest and most established rendering
    in English for this sacrificial category. The alternative is worth preserving
    because it reflects a real interpretive nuance in Levitical studies, but the verse
    itself does not require replacing the traditional category label in the main text.
  doctrine_reference: Translation philosophy §3, §5
