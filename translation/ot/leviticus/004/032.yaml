id: LEV.4.32
reference: Leviticus 4:32
source:
  edition: WLC
  text: וְ/אִם כֶּ֛בֶשׂ יָבִ֥יא קָרְבָּנ֖/וֹ לְ/חַטָּ֑את נְקֵבָ֥ה תְמִימָ֖ה יְבִיאֶֽ/נָּה־׃
translation:
  text: And if he brings a lamb as his offering for a sin offering, he shall bring
    a female without blemish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew term חַטָּאת can denote the sacrifice
      that deals with sin and ritual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - Now if
  lexicon: HALOT
  rationale: Standard conditional conjunction introducing an alternative case within
    the sacrificial instructions. 'And if' preserves the connective flow from the
    preceding context.
- source_word: כֶּבֶשׂ
  chosen: a lamb
  alternatives:
  - a sheep
  lexicon: HALOT
  rationale: Refers here to a sheep from the flock; 'lamb' is the conventional and
    contextually fitting rendering in sacrificial legislation, especially since the
    following feminine specification narrows the animal offered.
- source_word: יָבִיא
  chosen: he brings
  alternatives:
  - he presents
  - he offers
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring' in sacrificial contexts. 'Brings'
    keeps the concrete action explicit and matches the repeated verb later in the
    verse.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his قربן
  - his gift offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering brought near to God. 'His offering' is clear
    modern English and fits the possessive suffix.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts, חַטָּאת commonly denotes the purification/sin
    offering. 'For a sin offering' is the most transparent English here without over-resolving
    the debated nuance between 'sin offering' and 'purification offering' in this
    verse.
- source_word: נְקֵבָה
  chosen: a female
  alternatives:
  - female
  lexicon: HALOT
  rationale: 'Specifies the sex of the animal. Rendering with the article in English
    produces natural syntax: ''a female without blemish.'''
- source_word: תְמִימָה
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמים describes an animal free from defect.
    'Without blemish' is idiomatic, precise, and widely understood.
- source_word: יְבִיאֶנָּה
  chosen: he shall bring
  alternatives:
  - he must bring
  - he is to bring
  lexicon: HALOT
  rationale: The repeated Hiphil verb with 3fs suffix refers back to the female animal.
    'He shall bring' preserves the instructional force and avoids awkward repetition
    of the object in English, which is already supplied by the predicate complement.
