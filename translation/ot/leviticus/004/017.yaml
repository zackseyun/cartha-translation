id: LEV.4.17
reference: Leviticus 4:17
source:
  edition: WLC
  text: וְ/טָבַ֧ל הַ/כֹּהֵ֛ן אֶצְבָּע֖/וֹ מִן הַ/דָּ֑ם וְ/הִזָּ֞ה שֶׁ֤בַע פְּעָמִים֙ לִ/פְנֵ֣י יְהוָ֔ה אֵ֖ת פְּנֵ֥י הַ/פָּרֹֽכֶת־׃
translation:
  text: Then the priest shall dip his finger in the blood and sprinkle some of the blood seven times before Yahweh, in front of the curtain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'veil.' The Hebrew term refers to the sanctuary curtain separating sacred space.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטָבַל
  chosen: Then ... shall dip
  alternatives:
  - and ... dipped
  - and ... shall dip
  lexicon: HALOT
  rationale: טבל means 'dip, immerse.' In ritual instruction English commonly uses 'shall dip' for the procedural imperfective force in context, though the Hebrew form is a wayyiqtol sequence. 'Then' brings out the sequential ritual action signaled by waw-consecutive.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כהן in sacrificial legislation; definite article preserved.
- source_word: אֶצְבָּעוֹ
  chosen: his finger
  lexicon: HALOT
  rationale: Literal rendering of 'his finger'; singular retained.
- source_word: מִן הַדָּם
  chosen: in some of the blood
  alternatives:
  - from the blood
  - in the blood
  lexicon: HALOT
  rationale: The preposition מן after 'dip' is idiomatically rendered in English as 'in some of the blood' or 'into the blood.' 'In some of the blood' best conveys that the finger is dipped into a portion of the blood without implying total immersion of the hand.
- source_word: וְהִזָּה
  chosen: and sprinkle it
  alternatives:
  - and spatter it
  - and dash it
  lexicon: HALOT
  rationale: הזה in priestly ritual contexts denotes sprinkling a liquid, especially blood. The object is implicit from context (the blood on the finger), so English naturally supplies 'it.'
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Direct and literal rendering of the numeral plus plural noun.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is commonly 'before/in the presence of.' 'Before the LORD' is concise and idiomatic in cultic contexts. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵת פְּנֵי הַפָּרֹכֶת
  chosen: in front of the curtain
  alternatives:
  - toward the front of the veil
  - before the curtain
  lexicon: HALOT
  rationale: The phrase literally involves 'the face/front of the curtain.' English idiom prefers 'in front of the curtain.' פָּרֹכֶת is the sanctuary curtain/veil; 'curtain' is more accessible modern English, while the cultic referent remains clear.
