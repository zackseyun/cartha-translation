theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of פָּרֹכֶת
  chosen_reading: curtain
  alternative_readings:
  - veil
  rationale: The Hebrew denotes the inner sanctuary curtain. 'Curtain' communicates the architectural object in readable modern English without importing later ecclesiastical diction. 'Veil' is preserved as an alternative because of its familiarity in translation tradition and intertextual resonance.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern English) and §1 (original-language primacy)
