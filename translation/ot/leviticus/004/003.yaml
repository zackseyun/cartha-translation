theological_decisions:
- issue: Whether הַכֹּהֵן הַמָּשִׁיחַ should be rendered 'anointed priest' or interpreted as 'high priest'
  chosen_reading: the anointed priest
  alternative_readings:
  - the anointed high priest
  rationale: The Hebrew expression literally says 'the anointed priest.' Although the office in view is functionally the high priest, the translation philosophy prioritizes the source wording over inherited translation tradition unless the text itself demands the fuller title.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to express the communal consequence in לְאַשְׁמַת הָעָם
  chosen_reading: bringing guilt on the people
  alternative_readings:
  - to the guilt of the people
  - resulting in the people's guilt
  rationale: The verse teaches that the priest's sin has corporate implications, but the translation should not overdefine the mechanism beyond the Hebrew. The chosen wording preserves that theological tension and consequence without importing later doctrinal explanation.
  doctrine_reference: Translation philosophy §3
