id: LEV.4.3
reference: Leviticus 4:3
source:
  edition: WLC
  text: אִ֣ם הַ/כֹּהֵ֧ן הַ/מָּשִׁ֛יחַ יֶחֱטָ֖א לְ/אַשְׁמַ֣ת הָ/עָ֑ם וְ/הִקְרִ֡יב עַ֣ל חַטָּאת/וֹ֩ אֲשֶׁ֨ר חָטָ֜א פַּ֣ר בֶּן בָּקָ֥ר תָּמִ֛ים לַ/יהוָ֖ה לְ/חַטָּֽאת־׃
translation:
  text: If the anointed priest sins, bringing guilt on the people, then he shall present for the sin that he has committed a bull, a son of the herd, without blemish, to Yahweh as a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the anointed high priest.' The Hebrew reads literally 'the anointed priest.'
    reason: alternative_reading
  - marker: b
    text: Or, 'to the guilt of the people.' The Hebrew phrase is compact and may emphasize that the priest's sin results in guilt affecting the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן הַמָּשִׁיחַ
  chosen: the anointed priest
  alternatives:
  - the anointed high priest
  - the priest who is anointed
  lexicon: HALOT
  rationale: Literally 'the priest, the anointed one.' 'Anointed priest' is the most direct rendering. 'High priest' is interpretive; while the phrase refers to the chief priest in context, the Hebrew here does not use a separate word for 'high.'
- source_word: יֶחֱטָא
  chosen: sins
  alternatives:
  - should sin
  - commits a sin
  lexicon: HALOT
  rationale: Simple conditional imperfect after אִם is naturally rendered 'if ... sins.' This preserves the legal conditional without adding unnecessary modality.
- source_word: לְאַשְׁמַת הָעָם
  chosen: bringing guilt on the people
  alternatives:
  - to the guilt of the people
  - so as to incur guilt for the people
  - resulting in the people's guilt
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. The preposition ל plus אַשְׁמָה conveys resulting liability/guilt. 'Bringing guilt on the people' captures the consequence of the priest's sin for the community more idiomatically than the wooden 'to the guilt of the people.'
- source_word: וְהִקְרִיב
  chosen: he shall present
  alternatives:
  - he shall bring near
  - he shall offer
  lexicon: HALOT
  rationale: In sacrificial contexts הקריב means to bring/present an offering. 'Present' is natural English and preserves the ritual sense without over-specifying the act.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for the sin that he has committed
  alternatives:
  - because of his sin which he sinned
  - on account of the sin he committed
  lexicon: HALOT
  rationale: The construction specifies the offense for which the offering is made. 'For the sin that he has committed' is clear, idiomatic, and sufficiently close to the Hebrew repetition.
- source_word: פַּר בֶּן בָּקָר
  chosen: a bull from the herd
  alternatives:
  - a young bull
  - a bull, a son of the herd
  - a bull calf
  lexicon: HALOT
  rationale: The phrase denotes a bull of the cattle. 'Bull from the herd' preserves the bovine classification without implying youth too strongly; 'young bull' is common but slightly more interpretive.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Standard sacrificial idiom for an acceptable animal. 'Without blemish' is clear modern English and preserves cultic precision.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: לְחַטָּאת
  chosen: as a sin offering
  alternatives:
  - for a sin offering
  - as an offering for sin
  lexicon: HALOT
  rationale: In sacrificial legislation חַטָּאת can denote the offering itself, not only the sin. 'As a sin offering' makes the cultic function explicit in natural English.
