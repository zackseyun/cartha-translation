id: LEV.4.24
reference: Leviticus 4:24
source:
  edition: WLC
  text: וְ/סָמַ֤ךְ יָד/וֹ֙ עַל רֹ֣אשׁ הַ/שָּׂעִ֔יר וְ/שָׁחַ֣ט אֹת֔/וֹ בִּ/מְק֛וֹם אֲשֶׁר יִשְׁחַ֥ט אֶת הָ/עֹלָ֖ה לִ/פְנֵ֣י יְהוָ֑ה חַטָּ֖את הֽוּא־־־׃
translation:
  text: And he shall lay his hand on the head of the goat and slaughter it in the place where they slaughter the burnt offering before Yahweh. It is a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It is a purification offering.' The Hebrew term חַטָּאת can denote both 'sin' and the offering associated with removing impurity/sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: In sacrificial contexts סמך יד means to lay one's hand upon the animal as part of the ritual act. 'Lay' is idiomatic and clear in English; 'lean' is too physical, and 'place' is less conventional for this cultic gesture.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Straightforward possessive singular; singular should be preserved because the Hebrew is singular.
- source_word: עַל רֹאשׁ הַשָּׂעִיר
  chosen: on the head of the goat
  alternatives:
  - upon the head of the goat
  - on the goat's head
  lexicon: HALOT
  rationale: This preserves the formal structure while remaining natural English. שָׂעִיר here is the male goat used in the sin offering ritual, best rendered simply 'goat' in context.
- source_word: וְשָׁחַט אֹתוֹ
  chosen: and slaughter it
  alternatives:
  - and kill it
  - and butcher it
  lexicon: HALOT
  rationale: שׁחט is the standard verb for ritual slaughter, so 'slaughter' preserves the sacrificial setting better than the more generic 'kill'.
- source_word: בִּמְקוֹם אֲשֶׁר יִשְׁחַט
  chosen: in the place where ... is slaughtered
  alternatives:
  - at the place where ... is slaughtered
  - in the place where ... they slaughter
  lexicon: HALOT
  rationale: The clause specifies the designated sacrificial location. English passive in the subordinate clause is natural and avoids an awkward indefinite subject while preserving the procedural sense.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascending offering
  lexicon: HALOT
  rationale: '''Burnt offering'' is the standard and clearest English rendering for עולה in sacrificial legislation. ''Ascending offering'' is more etymological but less idiomatic.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is the standard covenantal phrase. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin sacrifice
  - purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חטאת can denote either sin or the offering for sin. Here the predicate 'It is a חטאת' identifies the animal/rite as the offering. 'Sin offering' is the most established and contextually precise rendering. 'Purification offering' reflects an important scholarly proposal but is not required by the immediate syntax, so it is preserved in a footnote.
- source_word: הוּא
  chosen: It is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: 'The pronoun functions predicatively to identify the sacrifice: ''It is a sin offering.'' This is natural English and preserves the emphatic classification.'
