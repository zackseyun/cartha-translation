theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cultic sense of חַטָּאת
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either sin or the sacrifice associated with sin/purification. In this sacrificial law, the immediate predicate identifies the animal as a specific offering type. 'Sin offering' remains the clearest main-text rendering, while the scholarly alternative 'purification offering' is preserved in a footnote to maintain auditability without over-resolving the term.
