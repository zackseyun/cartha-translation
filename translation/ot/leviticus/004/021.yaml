theological_decisions:
- issue: Rendering חַטַּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either sin or the offering associated with
    sin, and some modern scholarship emphasizes purification. In this verse the cultic
    object is plainly the sacrificial animal, so 'sin offering' best communicates
    the referent in accessible English while preserving traditional recognizability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
