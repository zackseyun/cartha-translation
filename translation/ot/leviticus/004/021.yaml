id: LEV.4.21
reference: Leviticus 4:21
source:
  edition: WLC
  text: וְ/הוֹצִ֣יא אֶת הַ/פָּ֗ר אֶל מִ/חוּץ֙ לַֽ/מַּחֲנֶ֔ה וְ/שָׂרַ֣ף אֹת֔/וֹ כַּ/אֲשֶׁ֣ר
    שָׂרַ֔ף אֵ֖ת הַ/פָּ֣ר הָ/רִאשׁ֑וֹן חַטַּ֥את הַ/קָּהָ֖ל הֽוּא־־׃פ
translation:
  text: He shall bring the bull outside the camp and burn it, just as he burned the
    first bull. It is the sin offering for the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew term can emphasize the offering's
      role in removing impurity as well as addressing sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצִיא
  chosen: He shall bring ... out
  alternatives:
  - and he shall carry out
  - and he shall take out
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means to bring out or take out. 'Bring ... out'
    is natural in English and fits the movement of the carcass to a place outside
    the camp.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is sufficiently precise and matches
    the repeated sacrificial referent in context.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to a place outside the camp
  lexicon: HALOT
  rationale: The prepositional sequence expresses movement to a location beyond the
    camp perimeter. Idiomatic English compresses this to 'outside the camp.'
- source_word: וְשָׂרַף אֹתוֹ
  chosen: and burn it
  alternatives:
  - and shall burn it
  - and incinerate it
  lexicon: HALOT
  rationale: שׂרף is the ordinary verb 'burn.' 'Burn it' preserves the sacrificial
    action without overtechnical wording.
- source_word: כַּאֲשֶׁר שָׂרַף
  chosen: just as he burned
  alternatives:
  - as he burned
  - in the same way that he burned
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks comparison. 'Just as' clearly signals correspondence
    with the prior procedure.
- source_word: הַפָּר הָרִאשׁוֹן
  chosen: the first bull
  alternatives:
  - the former bull
  - the earlier bull
  lexicon: HALOT
  rationale: רִאשׁוֹן here points back to the previously described bull in the earlier
    case. 'First bull' is the most direct rendering.
- source_word: חַטַּאת
  chosen: sin offering
  alternatives:
  - sin sacrifice
  - purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חַטָּאת conventionally denotes the
    offering for sin, not merely 'sin' abstractly. 'Sin offering' is the clearest
    established English rendering. 'Purification offering' is possible in some scholarly
    traditions, but 'sin offering' better matches common usage and the immediate cultic
    context.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the community
  lexicon: HALOT
  rationale: קָהָל refers to the gathered covenant community. 'Assembly' is clear
    modern English and preserves the corporate sense without sounding overly ecclesiastical.
- source_word: הוּא
  chosen: It is
  alternatives:
  - this is
  - it
  lexicon: HALOT
  rationale: The pronoun functions predicatively, identifying the bull as the assembly's
    sin offering. 'It is' makes the Hebrew identification explicit in natural English.
