id: LEV.4.29
reference: Leviticus 4:29
source:
  edition: WLC
  text: וְ/סָמַךְ֙ אֶת יָד֔/וֹ עַ֖ל רֹ֣אשׁ הַֽ/חַטָּ֑את וְ/שָׁחַט֙ אֶת הַ֣/חַטָּ֔את
    בִּ/מְק֖וֹם הָ/עֹלָֽה־־׃
translation:
  text: And he shall lay his hand on the head of the sin offering and slaughter the
    sin offering in the place of the burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purification offering.' The Hebrew term חטאת can refer to the offering
      associated with sin and purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: And he shall lay
  alternatives:
  - and he laid
  - and he shall lean
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts denotes placing or pressing the
    hand upon the offering. 'Lay' is idiomatic and clear in English. Although the
    Hebrew wayyiqtol can be rendered with past narrative force ('and he laid'), English
    ritual legislation is commonly and naturally expressed with modal future 'shall'
    to reflect procedural instruction.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his hands
  lexicon: HALOT
  rationale: The Hebrew is singular with 3ms suffix, so 'his hand' should be preserved
    rather than generalized to plural.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: A straightforward formal rendering of the prepositional phrase; 'on'
    is natural modern English while retaining the ritual action's specificity.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the sin sacrifice
  - the purification offering
  lexicon: HALOT
  rationale: חטאת can denote either 'sin' or the sacrifice associated with sin; in
    Levitical sacrificial procedure it clearly refers to the offering. 'Sin offering'
    is the standard and most recognizable rendering. 'Purification offering' is argued
    by some scholars to capture the rite's effect, but here the traditional rendering
    remains accurate and more accessible.
- source_word: וְשָׁחַט
  chosen: and slaughter
  alternatives:
  - and kill
  - and butcher
  lexicon: HALOT
  rationale: The verb שחט is the technical term for slaughtering sacrificial animals.
    'Slaughter' preserves the ritual-sacrificial sense better than the more generic
    'kill'.
- source_word: בִּמְקוֹם
  chosen: in the place of
  alternatives:
  - at the place of
  - in the المكان where
  lexicon: HALOT
  rationale: The phrase indicates the designated location for the act. 'In the place
    of' is a literal and natural rendering in English.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascending offering
  lexicon: HALOT
  rationale: עלה as a sacrificial term is conventionally and accurately rendered 'burnt
    offering.' While 'ascending offering' reflects the root imagery, 'burnt offering'
    is the established cultic equivalent in English.
