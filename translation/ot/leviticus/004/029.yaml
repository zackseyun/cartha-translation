theological_decisions:
- issue: Rendering of חטאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The noun in Leviticus often carries sacrificial-technical force. Although
    'purification offering' highlights the rite's cleansing function, the immediate
    context is the presentation and slaughter of a specific sacrificial animal, for
    which 'sin offering' remains the clearest and most familiar English rendering
    without importing extra interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: English verbal form for Hebrew wayyiqtol in legal-ritual context
  chosen_reading: shall lay ... and slaughter
  alternative_readings:
  - laid ... and slaughtered
  rationale: Though the Hebrew form is morphologically narrative, in this procedural
    context English uses prescriptive/future style to communicate ritual instruction
    clearly. This is an optimal-equivalence choice for readability while preserving
    the legal force of the passage.
  doctrine_reference: Translation philosophy §6
