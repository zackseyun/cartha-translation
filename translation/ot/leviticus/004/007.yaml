id: LEV.4.7
reference: Leviticus 4:7
source:
  edition: WLC
  text: וְ/נָתַן֩ הַ/כֹּהֵ֨ן מִן הַ/דָּ֜ם עַל קַ֠רְנוֹת מִזְבַּ֨ח קְטֹ֤רֶת הַ/סַּמִּים֙ לִ/פְנֵ֣י יְהוָ֔ה אֲשֶׁ֖ר בְּ/אֹ֣הֶל מוֹעֵ֑ד וְ/אֵ֣ת כָּל דַּ֣ם הַ/פָּ֗ר יִשְׁפֹּךְ֙ אֶל יְסוֹד֙ מִזְבַּ֣ח הָ/עֹלָ֔ה אֲשֶׁר פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־׀־־־׃
translation:
  text: And the priest shall put some of the blood on the horns of the altar of fragrant incense before Yahweh, which is in the tent of meeting, and he shall pour out all the bull’s blood at the base of the altar of burnt offering, which is at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the blood of the bull'; the sense in context is the remainder after some blood has been applied to the altar horns.
    reason: lexical_alternative
  - marker: b
    text: Or simply, 'the incense altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: shall put
  alternatives:
  - shall place
  - must put
  lexicon: HALOT
  rationale: נתן is a broad verb meaning 'give/put/place.' In this ritual instruction context, 'shall put' is natural modern English and preserves the concrete action without over-specifying.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; singular is retained as in the Hebrew ritual prescription.
- source_word: מִן הַדָּם
  chosen: some of the blood
  alternatives:
  - part of the blood
  - from the blood
  lexicon: HALOT
  rationale: The preposition מן is partitive here, indicating a portion rather than source alone. 'Some of the blood' communicates the ritual sense clearly.
- source_word: קַרְנוֹת
  chosen: horns
  lexicon: HALOT
  rationale: The altar's projecting corners are conventionally and accurately called 'horns'; this is standard cultic terminology and should be preserved.
- source_word: מִזְבַּח קְטֹרֶת הַסַּמִּים
  chosen: the altar of fragrant incense
  alternatives:
  - the incense altar
  - the altar of sweet incense
  - the altar of spiced incense
  lexicon: HALOT
  rationale: The construct chain refers to the incense altar, with הַסַּמִּים denoting aromatic spices. 'Fragrant incense' is readable and preserves the descriptive force better than the bare traditional 'incense altar.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal phrase. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the spatial-liturgical sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר בְּאֹהֶל מוֹעֵד
  chosen: which is in the tent of meeting
  alternatives:
  - that is in the tent of meeting
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the incense altar. 'Tent of meeting' is the established and accurate rendering of אֹהֶל מוֹעֵד.
- source_word: וְאֵת כָּל דַּם הַפָּר
  chosen: all the rest of the bull’s blood
  alternatives:
  - all the bull's blood
  - the rest of all the bull's blood
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'all the blood of the bull,' the preceding application of some blood to the altar horns implies the remainder is now poured out. Adding 'the rest of' makes the sequence explicit in idiomatic English without changing the sense.
- source_word: יִשְׁפֹּךְ
  chosen: he shall pour out
  alternatives:
  - he shall spill out
  - he shall drain out
  lexicon: HALOT
  rationale: שׁפך in sacrificial contexts is well rendered 'pour out,' preserving both the physical action and ritual solemnity.
- source_word: אֶל יְסוֹד
  chosen: at the base
  alternatives:
  - to the base
  - at the foundation
  lexicon: HALOT
  rationale: יְסוֹד denotes the foundation/base. With altar ritual English, 'at the base' is the most natural idiom for where the blood is deposited.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar of the burnt offering
  lexicon: HALOT
  rationale: This is the standard designation for the outer altar used for whole burnt offerings. The rendering is both accurate and idiomatic.
- source_word: אֲשֶׁר פֶּתַח אֹהֶל מוֹעֵד
  chosen: which is at the entrance of the tent of meeting
  alternatives:
  - which is by the entrance to the tent of meeting
  lexicon: HALOT
  rationale: The clause locates the altar of burnt offering. 'At the entrance' best captures the spatial relation in natural English.
