theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Explicating כָּל דַּם הַפָּר after prior use of some blood
  chosen_reading: all the rest of the bull’s blood
  alternative_readings:
  - all the bull's blood
  rationale: The Hebrew is literally 'all the blood of the bull,' but the ritual sequence already used some blood on the incense altar. English can sound contradictory if rendered woodenly. 'All the rest' makes explicit what is contextually entailed, an optimal-equivalence choice rather than a doctrinal one.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
