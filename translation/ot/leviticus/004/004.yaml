id: LEV.4.4
reference: Leviticus 4:4
source:
  edition: WLC
  text: וְ/הֵבִ֣יא אֶת הַ/פָּ֗ר אֶל פֶּ֛תַח אֹ֥הֶל מוֹעֵ֖ד לִ/פְנֵ֣י יְהוָ֑ה וְ/סָמַ֤ךְ
    אֶת יָד/וֹ֙ עַל רֹ֣אשׁ הַ/פָּ֔ר וְ/שָׁחַ֥ט אֶת הַ/פָּ֖ר לִ/פְנֵ֥י יְהוָֽה־־־־־׃
translation:
  text: He shall bring the bull to the entrance of the tent of meeting before the
    LORD, and he shall lay his hand on the head of the bull and slaughter the bull
    before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the doorway of the tent of meeting.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'before the LORD,' a cultic expression meaning in the LORD's
      presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: He shall bring
  alternatives:
  - and he shall bring
  - then he shall bring
  lexicon: HALOT
  rationale: Hiphil of בוא here gives the instruction that the offerer is to bring
    the animal. English 'shall bring' fits the prescriptive ritual context better
    than a simple past, while keeping the formal force of the Hebrew sequence.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull, often a young bull in sacrificial contexts. 'Bull'
    is the clearest natural English rendering here; 'young' is not explicit in this
    verse and so is not added.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: the entrance of the tent of meeting
  alternatives:
  - the doorway of the tent of meeting
  - the entrance to the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'opening/entrance.' 'Entrance of the tent of meeting' is idiomatic
    and sufficiently formal. אֹהֶל מוֹעֵד is the standard sanctuary designation, best
    rendered consistently as 'tent of meeting.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of/in the presence of.' 'Before
    the LORD' is the standard concise rendering in cultic contexts. Per doctrine,
    יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'The divine name follows the project''s default contested-term policy:
    ''the LORD'' rather than a transliteration.'
- source_word: וְסָמַךְ אֶת יָדוֹ עַל רֹאשׁ הַפָּר
  chosen: he shall lay his hand on the head of the bull
  alternatives:
  - he shall lean his hand on the head of the bull
  - he shall place his hand on the head of the bull
  lexicon: HALOT
  rationale: סמך in sacrificial contexts refers to the ritual act of placing/pressing
    the hand on the animal. 'Lay his hand on' is the most natural and established
    English equivalent without overinterpreting the gesture's symbolism.
- source_word: וְשָׁחַט
  chosen: and slaughter
  alternatives:
  - and kill
  - and butcher
  lexicon: HALOT
  rationale: שׁחט is the technical verb for slaughtering sacrificial animals. 'Slaughter'
    preserves the ritual-sacrificial sense better than the more generic 'kill.'
