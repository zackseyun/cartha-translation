- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of hand-laying in the sin offering ritual
  chosen_reading: Translate the physical action without importing a specific doctrinal explanation
  alternative_readings:
  - explicitly signal identification
  - explicitly signal transfer of guilt
  rationale: The Hebrew states the ritual act itself but does not in this verse explain its full theological significance. To preserve theological tension and avoid importing later interpretive conclusions, the translation renders the action plainly.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
