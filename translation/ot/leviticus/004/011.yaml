id: LEV.4.11
reference: Leviticus 4:11
source:
  edition: WLC
  text: וְ/אֶת ע֤וֹר הַ/פָּר֙ וְ/אֶת כָּל בְּשָׂר֔/וֹ עַל רֹאשׁ֖/וֹ וְ/עַל כְּרָעָ֑י/ו
    וְ/קִרְבּ֖/וֹ וּ/פִרְשֽׁ/וֹ־־־־־׃
translation:
  text: But the hide of the bull, and all its flesh, with its head and with its legs
    and its entrails and its dung—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'skin' for 'hide.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the young bull.'
    reason: lexical_alternative
  - marker: c
    text: '''Entrails'' may also be rendered ''inward parts'' or ''inner parts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹר
  chosen: hide
  alternatives:
  - skin
  lexicon: HALOT
  rationale: Rendered 'hide' for the skin of a slaughtered animal in sacrificial context;
    this is slightly more idiomatic and specific than 'skin' while remaining faithful
    to the Hebrew.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull/young bull. 'Bull' is sufficient here; English
    does not require repeating 'young' unless context emphasizes age.
- source_word: כָּל בְּשָׂרוֹ
  chosen: all its flesh
  alternatives:
  - all its meat
  - all its body
  lexicon: HALOT
  rationale: בָּשָׂר is literally 'flesh.' 'Flesh' preserves the concrete sacrificial
    language better than 'meat' or the broader 'body'.
- source_word: עַל רֹאשׁוֹ
  chosen: with its head
  alternatives:
  - including its head
  - upon its head
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' in this listing construction English
    idiom is better served by 'with,' indicating inclusion among the parts to be removed/burned.
- source_word: וְעַל כְּרָעָיו
  chosen: with its legs
  alternatives:
  - including its legs
  lexicon: HALOT
  rationale: כְּרָעַיִם refers to the legs/shanks of the animal. 'With its legs' matches
    the coordinate list and reads naturally in English.
- source_word: וְקִרְבּוֹ
  chosen: its entrails
  alternatives:
  - its inward parts
  - its inner parts
  lexicon: HALOT
  rationale: קֶרֶב can mean inward/inner part. In sacrificial anatomy, 'entrails'
    gives the concrete sense clearly for modern readers.
- source_word: וּפִרְשׁוֹ
  chosen: its dung
  alternatives:
  - its refuse
  - its offal
  lexicon: HALOT
  rationale: פֶּרֶשׁ refers specifically to excrement/dung in sacrificial disposal
    contexts. 'Dung' is direct and accurate; 'offal' would blur the distinction from
    entrails.
