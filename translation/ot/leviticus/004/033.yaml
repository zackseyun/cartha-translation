theological_decisions:
- issue: Rendering חטאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can denote both sin and the rite that removes impurity. In this
    legal context, the established sacrificial sense 'sin offering' communicates the
    function clearly without denying the purification nuance. Because the alternative
    is meaningful for interpretation, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §5; preserve significant lexical decisions
    and document variance.
