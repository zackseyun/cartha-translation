id: LEV.4.33
reference: Leviticus 4:33
source:
  edition: WLC
  text: וְ/סָמַךְ֙ אֶת יָד֔/וֹ עַ֖ל רֹ֣אשׁ הַֽ/חַטָּ֑את וְ/שָׁחַ֤ט אֹתָ/הּ֙ לְ/חַטָּ֔את
    בִּ/מְק֕וֹם אֲשֶׁ֥ר יִשְׁחַ֖ט אֶת הָ/עֹלָֽה־־׃
translation:
  text: And he shall lay his hand on the head of the sin offering and slaughter it
    for a sin offering in the place where the burnt offering is slaughtered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for both occurrences of 'sin offering'; the Hebrew
      term can denote the offering that deals with sin and ritual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: and he shall lay
  alternatives:
  - and he shall lean
  - and he shall place
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts refers to placing or pressing the
    hand upon the animal. 'Lay' is standard, natural English and preserves the ritual
    action without overinterpreting its symbolism.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his hands
  lexicon: HALOT
  rationale: The Hebrew is singular with 3ms suffix, so 'his hand' should be retained
    rather than harmonized to plural.
- source_word: עַל רֹאשׁ
  chosen: on the head
  alternatives:
  - upon the head
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition and noun phrase; 'on'
    is idiomatic modern English.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the sin sacrifice
  - the purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial legislation, חטאת commonly denotes the offering
    associated with sin/purification. 'Sin offering' is the most recognizable and
    contextually appropriate rendering. 'Purification offering' is a viable scholarly
    alternative but is not required by the immediate context.
- source_word: וְשָׁחַט
  chosen: and slaughter
  alternatives:
  - and kill
  - and butcher
  lexicon: HALOT
  rationale: שׁחט is the technical verb for slaughtering sacrificial animals. 'Slaughter'
    preserves the cultic and concrete sense better than the more generic 'kill'.
- source_word: אֹתָהּ
  chosen: it
  lexicon: HALOT
  rationale: The pronoun refers back to the feminine noun for the offering/animal;
    English naturally uses 'it'.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  lexicon: HALOT
  rationale: The lamed here marks purpose/designation. 'For a sin offering' is clear
    and idiomatic; 'as a sin offering' is possible but slightly less direct in this
    procedural context.
- source_word: בִּמְקוֹם
  chosen: in the place
  alternatives:
  - at the place
  - in the المكان where
  lexicon: HALOT
  rationale: The phrase introduces the designated slaughter location. 'In the place
    where' is a natural rendering of the Hebrew construction.
- source_word: אֲשֶׁר יִשְׁחַט
  chosen: where ... is slaughtered
  alternatives:
  - where one slaughters
  - where they slaughter
  lexicon: HALOT
  rationale: Although the Hebrew verb is 3ms imperfect, English procedural style often
    uses a passive to express customary ritual practice. This preserves the legal-instruction
    sense without implying a specific unnamed male subject.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascending offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering in sacrificial law.
    'Ascending offering' is more etymologically transparent but less idiomatic in
    English Bible usage.
