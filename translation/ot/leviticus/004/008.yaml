id: LEV.4.8
reference: Leviticus 4:8
source:
  edition: WLC
  text: וְ/אֶת כָּל חֵ֛לֶב פַּ֥ר הַֽ/חַטָּ֖את יָרִ֣ים מִמֶּ֑/נּוּ אֶת הַ/חֵ֨לֶב֙ הַֽ/מְכַסֶּ֣ה
    עַל הַ/קֶּ֔רֶב וְ/אֵת֙ כָּל הַ/חֵ֔לֶב אֲשֶׁ֖ר עַל הַ/קֶּֽרֶב־־־־־־׃
translation:
  text: 'And he shall remove from it all the fat of the sin offering bull: the fat
    that covers the entrails and all the fat that is on the entrails,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bull of the purification offering.' The Hebrew term חַטָּאת can
      denote both 'sin' and the offering associated with removing impurity/sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew, emphasizing that the entire
    designated fat portion is to be removed.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - fatty portions
  lexicon: HALOT
  rationale: The term refers specifically to the sacrificial fat portions. 'Fat' is
    the most direct rendering; 'fatty portions' is possible but less natural here.
    The cultic specificity is clarified by the following anatomical phrases.
- source_word: פַּר הַחַטָּאת
  chosen: the sin offering bull
  alternatives:
  - the bull of the sin offering
  - the bull for the sin offering
  lexicon: HALOT
  rationale: Construct relationship is best represented in natural English as 'the
    sin offering bull.' This preserves that the bull is the animal designated for
    the sin offering, not that the bull itself is metaphorically 'sin.'
- source_word: יָרִים
  chosen: he shall remove
  alternatives:
  - he shall lift up
  - he shall take away
  lexicon: HALOT
  rationale: Although the verb literally means 'lift up/raise,' in sacrificial procedure
    the sense is removal/separation of the specified portions from the animal. 'Remove'
    communicates the ritual action clearly in English.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The pronoun refers to the bull as a sacrificial animal; English idiom
    uses 'it' for the animal carcass in this procedural context.
- source_word: הַמְכַסֶּה
  chosen: that covers
  alternatives:
  - covering
  lexicon: HALOT
  rationale: The participle functions attributively, describing the fat by its location/function.
    A relative clause is the clearest English equivalent.
- source_word: קֶּרֶב
  chosen: entrails
  alternatives:
  - inner parts
  - inward parts
  - viscera
  lexicon: HALOT
  rationale: In sacrificial-anatomical context, 'entrails' is concrete and readable
    modern English. 'Inner parts' is broader and less anatomically specific; 'viscera'
    is too technical.
- source_word: אֲשֶׁר עַל הַקֶּרֶב
  chosen: that is on the entrails
  alternatives:
  - that is over the entrails
  - that is upon the inner parts
  lexicon: HALOT
  rationale: Keeps the spatial sense of עַל while using natural English. This distinguishes
    the fat covering the entrails from the fat attached to or situated on them.
