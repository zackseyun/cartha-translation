theological_decisions:
- issue: Rendering חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: While some argue that חַטָּאת in Leviticus can emphasize purification,
    'sin offering' remains the most widely recognized and contextually acceptable
    rendering in English. No doctrinal issue requires replacing it here, and the verse
    itself focuses on ritual procedure rather than explicating the offering's theological
    nuance.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
