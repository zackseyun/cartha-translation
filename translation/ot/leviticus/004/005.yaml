theological_decisions:
- issue: Rendering of הַכֹּהֵן הַמָּשִׁיחַ in a Christian translation
  chosen_reading: the anointed priest
  alternative_readings:
  - the consecrated priest
  - the high priest
  rationale: Because מָשִׁיחַ means 'anointed,' the translation preserves the lexical
    sense rather than replacing it with the interpretive title 'high priest.' This
    avoids obscuring the Hebrew wording while also not importing messianic christological
    significance into a Levitical office title.
  doctrine_reference: Translation philosophy §§1, 2, 5
