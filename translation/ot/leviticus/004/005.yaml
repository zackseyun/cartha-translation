id: LEV.4.5
reference: Leviticus 4:5
source:
  edition: WLC
  text: וְ/לָקַ֛ח הַ/כֹּהֵ֥ן הַ/מָּשִׁ֖יחַ מִ/דַּ֣ם הַ/פָּ֑ר וְ/הֵבִ֥יא אֹת֖/וֹ אֶל
    אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: And the anointed priest shall take some of the bull's blood and bring it into
    the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''from the blood of the bull.'' The Hebrew likely has
      a partitive sense: the priest takes a portion of the blood.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the tent of meeting'; 'into' reflects the ritual context, since
      the subsequent actions occur inside the sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: And ... shall take
  alternatives:
  - and he took
  - then ... shall take
  lexicon: HALOT
  rationale: The waw + qatal in sacrificial procedure functions instructionally/sequentially
    in context, best rendered with English future/modal force ('shall take') rather
    than simple past. 'And' preserves the narrative-procedural linkage.
- source_word: הַכֹּהֵן הַמָּשִׁיחַ
  chosen: the anointed priest
  alternatives:
  - the anointed one, the priest
  - the consecrated priest
  lexicon: HALOT
  rationale: The phrase is the standard Levitical designation for the high priest
    in his anointed status. 'Anointed priest' is a close, natural rendering of the
    Hebrew title without importing later christological overtones into the main text.
- source_word: מִדַּם
  chosen: some of ... blood
  alternatives:
  - from the blood
  - part of the blood
  lexicon: HALOT
  rationale: 'The preposition מִן here is partitive: the priest takes a portion of
    the bull''s blood, not the entirety. English idiom is best served by ''some of
    ... blood.'''
- source_word: הַפָּר
  chosen: the bull's
  alternatives:
  - of the bull
  lexicon: HALOT
  rationale: פַּר denotes a bull. The possessive construction 'the bull's blood' is
    natural English for the Hebrew genitive relationship.
- source_word: וְהֵבִיא אֹתוֹ
  chosen: and bring it
  alternatives:
  - and he shall bring it
  - and bring that
  lexicon: HALOT
  rationale: 'The object suffix refers back to the blood just mentioned. English uses
    singular mass-noun reference naturally: ''bring it.'' The modal ''shall'' continues
    the procedural instruction.'
- source_word: אֶל אֹהֶל מוֹעֵד
  chosen: into the tent of meeting
  alternatives:
  - to the tent of meeting
  - into the meeting tent
  lexicon: HALOT
  rationale: Though אֶל often means 'to,' the ritual context implies entry into the
    sanctuary space, and the following verses describe actions performed inside. 'Tent
    of meeting' is the established and accurate rendering of אֹהֶל מוֹעֵד.
