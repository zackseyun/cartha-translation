id: LEV.4.23
reference: Leviticus 4:23
source:
  edition: WLC
  text: אֽוֹ הוֹדַ֤ע אֵלָי/ו֙ חַטָּאת֔/וֹ אֲשֶׁ֥ר חָטָ֖א בָּ֑/הּ וְ/הֵבִ֧יא אֶת קָרְבָּנ֛/וֹ
    שְׂעִ֥יר עִזִּ֖ים זָכָ֥ר תָּמִֽים־־׃
translation:
  text: or if the sin that he has committed is made known to him, then he shall bring
    as his offering a male goat without blemish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'if his sin which he has committed is made known to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction continuing the case law from the previous
    verse.
- source_word: הוֹדַע אֵלָיו
  chosen: is made known to him
  alternatives:
  - is shown to him
  - he is informed of
  lexicon: HALOT
  rationale: 'The Hophal of ידע is passive/causative-passive: the sense is that knowledge
    of the offense comes to him, not that he independently realizes it. English passive
    best preserves this.'
- source_word: חַטָּאתוֹ
  chosen: the sin
  alternatives:
  - his sin
  - his sin offering
  lexicon: HALOT
  rationale: Here חטאת refers to the offense, not the offering, as shown by the following
    relative clause 'that he has committed in it.' English 'the sin' avoids awkward
    repetition with 'his' after 'to him' while still referring to his own sin from
    context.
- source_word: אֲשֶׁר חָטָא בָּהּ
  chosen: that he has committed
  alternatives:
  - in which he has sinned
  - which he committed
  lexicon: HALOT
  rationale: The clause specifies the sin in question. The preposition in בָּהּ is
    idiomatic with חטא ('sin in/by it'); in natural English it is usually not carried
    over explicitly. 'Has committed' is clear and idiomatic.
- source_word: וְהֵבִיא
  chosen: then he shall bring
  alternatives:
  - and he shall bring
  - he must bring
  lexicon: HALOT
  rationale: The waw plus perfect in legal material carries consequential force. 'Then
    he shall bring' communicates the prescribed response in English.
- source_word: קָרְבָּנוֹ
  chosen: as his offering
  alternatives:
  - his offering
  - his قربan/corban
  lexicon: HALOT
  rationale: קרבן is a presentation/offering brought near to God. 'As his offering'
    fits the syntax after 'bring' and uses accessible sacrificial terminology.
- source_word: שְׂעִיר עִזִּים
  chosen: a male goat
  alternatives:
  - a buck goat
  - a goat from the goats
  lexicon: HALOT
  rationale: The phrase denotes a he-goat. Since זָכָר follows explicitly, English
    can render the species naturally as 'goat' and preserve the sex with 'male.'
- source_word: זָכָר
  chosen: male
  lexicon: HALOT
  rationale: The source explicitly specifies the animal's sex; this should be preserved
    per gender-accurate translation principles.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Standard sacrificial idiom for an animal free from defect. 'Without blemish'
    is both clear and traditional without being archaic.
