theological_decisions:
- issue: Meaning of חַטָּאת in this verse
  chosen_reading: sin/offense, not sin offering
  alternative_readings:
  - sin offering
  rationale: Although חטאת can denote either 'sin' or 'sin offering' in Levitical
    contexts, the relative clause 'which he has committed' identifies the referent
    as the offense itself. The offering is separately named by קרבנו later in the
    verse.
