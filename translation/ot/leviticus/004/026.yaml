theological_decisions:
- issue: Rendering of sacrificial term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The Hebrew term can emphasize wholeness, well-being, or peaceful communion.
    'Peace offerings' is retained as the main text rendering because it is widely
    recognized, sufficiently transparent, and fits the comparative ritual context
    here. Alternatives are worth preserving because they can illuminate the semantic
    range without changing doctrine.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Meaning of חַטָּאת in מֵחַטָּאתוֹ
  chosen_reading: his sin
  alternative_readings:
  - his sin offering
  rationale: Leviticus often uses חטאת for both the offense and the offering. In this
    clause, however, the priest makes atonement 'for him' with respect to his offense,
    followed by 'and he shall be forgiven,' which strongly favors 'his sin' rather
    than 'his sin offering.' The translation preserves the ritual-theological logic
    without over-specifying a theory of atonement.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
