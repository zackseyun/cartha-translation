id: LEV.4.26
reference: Leviticus 4:26
source:
  edition: WLC
  text: וְ/אֶת כָּל חֶלְבּ/וֹ֙ יַקְטִ֣יר הַ/מִּזְבֵּ֔חָ/ה כְּ/חֵ֖לֶב זֶ֣בַח הַ/שְּׁלָמִ֑ים
    וְ/כִפֶּ֨ר עָלָ֧י/ו הַ/כֹּהֵ֛ן מֵ/חַטָּאת֖/וֹ וְ/נִסְלַ֥ח לֽ/וֹ־־׃פ
translation:
  text: And he shall burn all its fat on the altar, like the fat of the sacrifice
    of peace offerings. Thus the priest shall make atonement for him for his sin,
    and he shall be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace offerings' may be rendered 'fellowship offerings' or 'offerings
      of well-being.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew חַטָּאת can mean either 'sin' or 'sin offering'; here it most likely
      refers to the man's sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְבּוֹ
  chosen: its fat
  alternatives:
  - all its fat
  - the fat belonging to it
  lexicon: HALOT
  rationale: חֵלֶב refers to the animal fat portions designated for burning in sacrificial
    procedure. The suffix is best represented by 'its.' 'Fat' is the standard cultic
    term in Leviticus and should be kept consistent.
- source_word: יַקְטִיר
  chosen: he shall burn
  alternatives:
  - he shall turn into smoke
  - he shall offer up in smoke
  lexicon: HALOT
  rationale: In Hiphil, קטר in sacrificial contexts refers specifically to burning
    on the altar, often with the nuance of producing smoke. 'Burn' is clear modern
    English; the altar context supplies the ritual sense without awkwardness.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with the article indicates movement toward the
    altar, but idiomatic English in sacrificial contexts is 'burn on the altar.' This
    preserves the ritual action naturally.
- source_word: כְּחֵלֶב זֶבַח הַשְּׁלָמִים
  chosen: like the fat of the sacrifice of peace offerings
  alternatives:
  - as the fat of the peace offering sacrifice
  - like the fat of the fellowship offering sacrifice
  lexicon: HALOT
  rationale: The phrase compares this procedure to the standard handling of fat in
    the well-being/peace offering. 'Peace offerings' preserves the established sacrificial
    category and matches common English usage for שְׁלָמִים.
- source_word: וְכִפֶּר עָלָיו
  chosen: the priest shall make atonement for him
  alternatives:
  - the priest shall purge him
  - the priest shall make expiation on his behalf
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' This avoids importing a narrower theological theory
    while preserving the cultic sense of ritual reconciliation/removal of offense.
- source_word: מֵחַטָּאתוֹ
  chosen: for his sin
  alternatives:
  - because of his sin
  - from his sin
  - for his sin offering
  lexicon: HALOT
  rationale: Although חטאת can mean either 'sin' or 'sin offering' in Leviticus, here
    the preposition מִן after כפר most naturally indicates the offense from which
    atonement is made, not the animal itself. 'For his sin' best fits the syntax and
    sense.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  lexicon: HALOT
  rationale: The Niphal of סלח with ל marks the person receiving forgiveness. English
    idiom prefers 'he shall be forgiven' rather than the impersonal passive 'it shall
    be forgiven him,' while preserving the divine passive sense.
