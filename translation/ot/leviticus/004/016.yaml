theological_decisions:
- issue: Rendering הַמָּשִׁיחַ in a priestly context
  chosen_reading: anointed
  alternative_readings:
  - consecrated
  - Messiah
  rationale: The term is not functioning as a christological title here but as a descriptor
    of the priest installed by anointing. Following the translation philosophy, titles
    are translated for meaning, and context rules out a messianic reading.
  doctrine_reference: Translation philosophy §2; Contested terms table on Χριστός/Messiah
    by analogy of title translation
