id: LEV.4.16
reference: Leviticus 4:16
source:
  edition: WLC
  text: וְ/הֵבִ֛יא הַ/כֹּהֵ֥ן הַ/מָּשִׁ֖יחַ מִ/דַּ֣ם הַ/פָּ֑ר אֶל אֹ֖הֶל מוֹעֵֽד־׃
translation:
  text: Then the anointed priest shall bring some of the bull's blood into the tent
    of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''from the blood of the bull.'' The Hebrew likely has
      a partitive sense: only some of the blood is brought in.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'tabernacle' for 'tent of meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הֵבִיא
  chosen: Then ... shall bring
  alternatives:
  - and ... shall bring
  - and ... must bring
  lexicon: HALOT
  rationale: The Hiphil perfect with prefixed conjunction continues the procedural
    sequence in legal instruction. English 'Then ... shall bring' conveys the sequential
    force naturally in modern legal/narrative style without over-literal awkwardness.
- source_word: הַ/כֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context.
- source_word: הַ/מָּשִׁיחַ
  chosen: anointed
  alternatives:
  - consecrated
  - Messiah
  lexicon: HALOT
  rationale: Here the adjective/noun identifies the high priest as the one anointed
    for office, not a messianic title. 'Anointed' preserves the Hebrew sense directly;
    'consecrated' is interpretive, and 'Messiah' would be misleading in this Levitical
    ritual context.
- source_word: מִ/דַּם
  chosen: some of ... blood
  alternatives:
  - from the blood
  - part of the blood
  lexicon: HALOT
  rationale: The preposition מִן with 'blood' is naturally partitive here, since only
    a portion of the bull's blood is brought inside. 'Some of' expresses the ritual
    sense clearly in idiomatic English.
- source_word: הַ/פָּר
  chosen: the bull's
  alternatives:
  - of the bull
  - the young bull's
  lexicon: HALOT
  rationale: פַּר denotes a bull in sacrificial context. The possessive construction
    'the bull's blood' is smoother English than a more wooden 'the blood of the bull.'
    'Young bull' is possible in some contexts but not required by this verse alone.
- source_word: אֶל
  chosen: into
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this ritual movement context with 'bring
    blood' and destination 'tent of meeting,' English 'into' better conveys entry
    into the sacred space implied by the action.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary designation.
    'Tabernacle' is traditional but less transparent to modern readers and less directly
    tied to the Hebrew wording.
