id: LEV.4.10
reference: Leviticus 4:10
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר יוּרַ֔ם מִ/שּׁ֖וֹר זֶ֣בַח הַ/שְּׁלָמִ֑ים וְ/הִקְטִירָ/ם֙ הַ/כֹּהֵ֔ן
    עַ֖ל מִזְבַּ֥ח הָ/עֹלָֽה׃
translation:
  text: just as it is removed from the ox of the peace offering, and the priest shall
    burn them on the altar of burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'it is lifted up from the ox of the sacrifice of peace
      offerings.' The Hebrew verb evokes the removal/elevation of the portions to
      be offered.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the procedure for the peace offering in the
    preceding legislation. 'Just as' clearly signals the procedural analogy in natural
    English.
- source_word: יוּרַם
  chosen: it is removed
  alternatives:
  - it is lifted up
  - it is taken away
  lexicon: HALOT
  rationale: The Hophal of רום literally involves being raised/lifted, but in sacrificial
    context it refers to the fatty portions being taken off from the animal for offering.
    'Removed' best communicates the ritual action in idiomatic English without obscuring
    the connection to the source.
- source_word: מִשּׁוֹר
  chosen: from the ox
  alternatives:
  - from the bull
  lexicon: HALOT
  rationale: שׁוֹר denotes bovine cattle, often an ox or bull. 'Ox' is a straightforward
    rendering of the lexical form here and matches the immediate Hebrew wording, while
    the broader context already identifies the sacrificial animal.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the peace offering
  alternatives:
  - the sacrifice of peace offerings
  - the fellowship offering
  lexicon: HALOT
  rationale: This phrase is the standard sacrificial term. 'Peace offering' preserves
    the traditional and lexical connection to שְׁלָמִים without importing a more interpretive
    gloss like 'fellowship offering.' Singular English is natural for the specific
    ritual instance.
- source_word: וְהִקְטִירָם
  chosen: and ... shall burn them
  alternatives:
  - and ... shall turn them into smoke
  - and ... shall offer them up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to burning on the altar
    as an offering. 'Burn them' is clear modern English; the sacrificial nuance is
    supplied by the altar context. The object suffix '-them' refers to the fatty portions
    listed in the previous verse.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the officiating cultic role.
- source_word: עַל מִזְבַּח הָעֹלָה
  chosen: on the altar of burnt offering
  alternatives:
  - on the altar of the burnt offering
  - upon the altar for burnt offering
  lexicon: HALOT
  rationale: This is the established cultic expression for the altar associated with
    burnt offerings. 'Altar of burnt offering' is concise and natural in English while
    preserving the sacrificial reference.
