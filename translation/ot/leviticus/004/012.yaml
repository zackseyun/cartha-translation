id: LEV.4.12
reference: Leviticus 4:12
source:
  edition: WLC
  text: וְ/הוֹצִ֣יא אֶת כָּל הַ֠/פָּר אֶל מִ/ח֨וּץ לַֽ/מַּחֲנֶ֜ה אֶל מָק֤וֹם טָהוֹר֙
    אֶל שֶׁ֣פֶךְ הַ/דֶּ֔שֶׁן וְ/שָׂרַ֥ף אֹת֛/וֹ עַל עֵצִ֖ים בָּ/אֵ֑שׁ עַל שֶׁ֥פֶךְ
    הַ/דֶּ֖שֶׁן יִשָּׂרֵֽף־־־־־־־׃פ
translation:
  text: He shall bring out the whole bull to a clean place outside the camp, to the
    ash dump, and burn it on wood in the fire; it shall be burned at the ash dump.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'a ceremonially clean place.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the place where the ashes are poured out'; that is, a designated
      place for disposing of the altar ashes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצִיא
  chosen: He shall bring out
  alternatives:
  - and he shall bring out
  - then he shall take out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'bring/take out.' English 'bring out' is
    natural here in procedural instruction and preserves the action without over-paraphrase.
- source_word: כָּל הַפָּר
  chosen: the whole bull
  alternatives:
  - all the bull
  - the entire bull
  lexicon: HALOT
  rationale: כָּל with the definite noun emphasizes the entirety of the animal carcass/remains.
    'The whole bull' is idiomatic and precise.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - beyond the camp
  lexicon: HALOT
  rationale: The phrase denotes a location beyond the camp perimeter. 'Outside the
    camp' is the standard and clear locative rendering.
- source_word: מָקוֹם טָהוֹר
  chosen: a clean place
  alternatives:
  - a pure place
  - a ceremonially clean place
  lexicon: HALOT
  rationale: טָהוֹר in Levitical context often carries ritual purity, but 'clean'
    is the most readable main-text rendering. The cultic nuance is important enough
    to preserve in a footnote.
- source_word: שֶׁפֶךְ הַדֶּשֶׁן
  chosen: the ash dump
  alternatives:
  - the place where the ashes are poured out
  - the ash heap
  - the ash pit
  lexicon: HALOT
  rationale: שֶׁפֶךְ denotes a pouring-out place/disposal site, and דֶּשֶׁן here refers
    to ashes from the altar context. 'Ash dump' is concise, concrete, and reflects
    a designated disposal place better than the vaguer 'ash heap.'
- source_word: וְשָׂרַף אֹתוֹ
  chosen: and burn it
  alternatives:
  - and he shall burn it
  - and he shall incinerate it
  lexicon: HALOT
  rationale: The verb שׂרף is the ordinary term 'burn.' English imperative-like future
    'shall' fits the legal instruction style.
- source_word: עַל עֵצִים בָּאֵשׁ
  chosen: on wood in the fire
  alternatives:
  - on logs with fire
  - on wood with fire
  lexicon: HALOT
  rationale: The Hebrew distinguishes the fuel ('on wood') and the means/location
    ('in the fire'). Retaining both avoids flattening the image.
- source_word: עַל שֶׁפֶךְ הַדֶּשֶׁן יִשָּׂרֵף
  chosen: it shall be burned at the ash dump
  alternatives:
  - it shall be burned on the ash dump
  - it shall be burned at the place where the ashes are poured out
  lexicon: HALOT
  rationale: The final clause restates and emphasizes the designated location. Rendering
    עַל here as 'at' is idiomatic English for place, while preserving the repetition
    for legal emphasis.
