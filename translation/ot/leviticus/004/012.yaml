theological_decisions:
- issue: Ritual purity nuance of טָהוֹר
  chosen_reading: a clean place
  alternative_readings:
  - a ceremonially clean place
  - a pure place
  rationale: The verse concerns sacrificial disposal in a cultic setting, so ritual
    purity is likely in view. However, 'clean place' best balances readability and
    fidelity; the more explicit ritual nuance is preserved in a footnote rather than
    imported into the main text.
  doctrine_reference: Translation philosophy §6; §5
- issue: Rendering of sacrificial disposal site שֶׁפֶךְ הַדֶּשֶׁן
  chosen_reading: ash dump
  alternative_readings:
  - ash heap
  - place where the ashes are poured out
  rationale: The phrase refers to an established place for depositing altar ashes,
    not merely any heap of ash. 'Ash dump' communicates a designated disposal site
    in modern English without excessive technicality.
  doctrine_reference: Translation philosophy §1; §6
