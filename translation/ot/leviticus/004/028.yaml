id: LEV.4.28
reference: Leviticus 4:28
source:
  edition: WLC
  text: א֚וֹ הוֹדַ֣ע אֵלָ֔י/ו חַטָּאת֖/וֹ אֲשֶׁ֣ר חָטָ֑א וְ/הֵבִ֨יא קָרְבָּנ֜/וֹ שְׂעִירַ֤ת עִזִּים֙ תְּמִימָ֣ה נְקֵבָ֔ה עַל חַטָּאת֖/וֹ אֲשֶׁ֥ר חָטָֽא־׃
translation:
  text: Or if his sin that he has committed is made known to him, then he shall bring a female goat without blemish as his offering for his sin that he has committed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it becomes known to him' or 'he is informed of his sin.' The Hebrew passive can describe either personal realization or the sin being reported to him.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall bring as his offering a female goat without blemish'.
    reason: previous_rendering
lexical_decisions:
- source_word: א֚וֹ
  chosen: Or
  alternatives:
  - Or if
  lexicon: HALOT
  rationale: Introduces an alternative case within the legal sequence. 'Or' preserves the coordination with the preceding scenario; the following clause supplies the conditional sense.
- source_word: הוֹדַע אֵלָיו
  chosen: is made known to him
  alternatives:
  - he is informed of
  - it becomes known to him
  lexicon: HALOT
  rationale: 'Hophal of ידע is passive/causative-passive: the sin is brought to his knowledge. ''Is made known to him'' preserves the passive force better than the more interpretive ''he realizes.'''
- source_word: חַטָּאתוֹ
  chosen: his sin
  alternatives:
  - his offense
  lexicon: HALOT
  rationale: Here חטאת refers to the sinful act, not the purification offering. 'Sin' is the plain contextual sense in the clause 'his sin that he has committed.'
- source_word: אֲשֶׁר חָטָא
  chosen: that he has committed
  alternatives:
  - which he sinned
  - that he committed
  lexicon: HALOT
  rationale: Idiomatic English requires an object such as 'committed' with 'sin.' The perfect is naturally rendered with present relevance in English.
- source_word: וְהֵבִיא
  chosen: then he shall bring
  alternatives:
  - and he shall bring
  - he must bring
  lexicon: HALOT
  rationale: In legal instruction, the waw + perfect continues the prescribed action. 'Then he shall bring' makes the sequence clear in English while retaining the prescriptive force.
- source_word: קָרְבָּנוֹ
  chosen: as his offering
  alternatives:
  - his offering
  - his gift offering
  lexicon: HALOT
  rationale: קרבן is a brought offering/presentation. 'As his offering' reads naturally after 'bring' and avoids awkward repetition while preserving sacrificial terminology.
- source_word: שְׂעִירַת עִזִּים
  chosen: a female goat
  alternatives:
  - a she-goat
  - a goat from the goats
  lexicon: HALOT
  rationale: This construct phrase denotes a female goat. 'Female goat' is clear modern English; 'she-goat' is possible but slightly less natural.
- source_word: תְּמִימָה
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Standard sacrificial idiom for an animal free from defect. 'Without blemish' is both accurate and familiar in English Bible style without being archaic.
- source_word: נְקֵבָה
  chosen: female
  alternatives:
  - a female one
  lexicon: HALOT
  rationale: The text explicitly states the sex of the animal after the species phrase. Retaining 'female' preserves the source's specificity, even though English could infer it from 'female goat.'
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for his sin that he has committed
  alternatives:
  - because of his sin that he committed
  - on account of his sin that he committed
  lexicon: HALOT
  rationale: עַל here marks the relation/purpose of the offering with respect to the sin. 'For his sin' is idiomatic in sacrificial context and avoids overinterpreting the preposition.
