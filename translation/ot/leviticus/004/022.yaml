id: LEV.4.22
reference: Leviticus 4:22
source:
  edition: WLC
  text: אֲשֶׁ֥ר נָשִׂ֖יא יֶֽחֱטָ֑א וְ/עָשָׂ֡ה אַחַ֣ת מִ/כָּל מִצְוֺת֩ יְהוָ֨ה אֱלֹהָ֜י/ו
    אֲשֶׁ֧ר לֹא תֵעָשֶׂ֛ינָה בִּ/שְׁגָגָ֖ה וְ/אָשֵֽׁם־־׃
translation:
  text: When a leader sins and unintentionally does one of any of the things that
    the LORD his God has commanded not to be done, and so becomes guilty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prince' or 'ruler'; Hebrew נָשִׂיא denotes a recognized leader or chief.
    reason: lexical_alternative
  - marker: b
    text: Or 'in error' or 'by mistake'; the Hebrew refers to an unintentional offense.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - prince
  - ruler
  - chief
  lexicon: HALOT
  rationale: נָשִׂיא denotes a tribal or civic leader, not necessarily a monarchic
    'prince' in modern English. 'Leader' is clear, natural, and fits the sacrificial
    legislation context.
- source_word: יֶחֱטָא
  chosen: sins
  alternatives:
  - commits a sin
  lexicon: HALOT
  rationale: The verb חטא is the standard term for sinning. The simple English verb
    'sins' preserves the directness of the Hebrew.
- source_word: וְעָשָׂה אַחַת מִכָּל
  chosen: does one of any of the things
  alternatives:
  - does any one of
  - does one thing from among all
  lexicon: HALOT
  rationale: This construction is idiomatic in Leviticus for committing one prohibited
    act from among the commandments. The rendering preserves the partitive sense without
    becoming wooden.
- source_word: מִצְוֺת יְהוָה אֱלֹהָיו
  chosen: the things that the LORD his God has commanded
  alternatives:
  - the commandments of the LORD his God
  - the commands of the LORD his God
  lexicon: HALOT
  rationale: Literally 'from all the commandments of the LORD his God.' Because the
    following relative clause specifies things 'not to be done,' the translation unpacks
    the sense as prohibited matters within God's commandments. 'The LORD' follows
    the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following the project's default and longstanding reverential convention.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'The pronominal suffix is significant and should be preserved: the leader
    is accountable to ''his God,'' that is, the LORD in covenant relation.'
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  chosen: has commanded not to be done
  alternatives:
  - which should not be done
  - which are not to be done
  lexicon: HALOT
  rationale: 'The Niphal imperfect expresses passive/prohibitive sense: things not
    to be done. Including ''has commanded'' carries forward the force of מִצְוֺת and
    yields natural English.'
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - in error
  lexicon: HALOT
  rationale: In Levitical sacrificial law, שְׁגָגָה refers to inadvertence or unintentional
    wrongdoing. 'Unintentionally' is precise and readable.
- source_word: וְאָשֵׁם
  chosen: and so becomes guilty
  alternatives:
  - and is guilty
  - and incurs guilt
  lexicon: HALOT
  rationale: The verb אשם here marks the resulting state of guilt after the offense.
    'Becomes guilty' captures the consequential nuance in context; 'so' makes the
    result relation explicit in English.
