id: LEV.4.31
reference: Leviticus 4:31
source:
  edition: WLC
  text: וְ/אֶת כָּל חֶלְבָּ֣/הּ יָסִ֗יר כַּ/אֲשֶׁ֨ר הוּסַ֣ר חֵלֶב֮ מֵ/עַ֣ל זֶ֣בַח
    הַ/שְּׁלָמִים֒ וְ/הִקְטִ֤יר הַ/כֹּהֵן֙ הַ/מִּזְבֵּ֔חָ/ה לְ/רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָ֑ה
    וְ/כִפֶּ֥ר עָלָ֛י/ו הַ/כֹּהֵ֖ן וְ/נִסְלַ֥ח לֽ/וֹ־־׃פ
translation:
  text: And he shall remove all its fat, just as the fat is removed from the sacrifice
    of peace offerings, and the priest shall burn it on the altar as a pleasing aroma
    to the LORD. Thus the priest shall make atonement for him, and he will be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacrifice of fellowship offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a pleasing aroma,' a stock sacrificial expression for an offering
      accepted by the LORD.
    reason: cultural_note
lexical_decisions:
- source_word: חֶלְבָּהּ / חֵלֶב
  chosen: fat
  alternatives:
  - fat portions
  lexicon: HALOT
  rationale: The term refers to the sacrificial fat to be removed and offered. 'Fat'
    is the plain lexical equivalent; 'fat portions' is possible but adds interpretive
    specificity not explicit in the Hebrew here.
- source_word: יָסִיר
  chosen: shall remove
  alternatives:
  - must remove
  - take away
  lexicon: HALOT
  rationale: Hiphil of סור here denotes causing removal. 'Shall remove' preserves
    the procedural, legal-register force without over-paraphrasing.
- source_word: כַּאֲשֶׁר הוּסַר
  chosen: just as ... is removed
  alternatives:
  - as ... was removed
  - in the same way that ... is removed
  lexicon: HALOT
  rationale: The comparison points to the established sacrificial procedure for peace
    offerings. Present passive English fits the instructional style of the law.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the peace offering sacrifice
  lexicon: HALOT
  rationale: '''Peace offerings'' is the conventional and still transparent rendering
    of שְׁלָמִים in Leviticus. ''Fellowship offerings'' is interpretive and less directly
    tied to the Hebrew sacrificial category.'
- source_word: וְהִקְטִיר
  chosen: shall burn it
  alternatives:
  - shall turn it into smoke
  - shall offer it up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts this verb refers specifically to burning on the
    altar. 'Burn it' is natural English; the altar context already implies sacrificial
    burning.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard rendering for sacrificial context; 'on' is idiomatic modern
    English.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - as a sweet aroma
  lexicon: HALOT
  rationale: This stock sacrificial phrase denotes acceptability before God. 'Pleasing
    aroma' is clear modern English and avoids archaic 'sweet savor' while preserving
    the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the directional
    sense of the offering phrase.
- source_word: וְכִפֶּר עָלָיו
  chosen: the priest shall make atonement for him
  alternatives:
  - the priest shall purge him
  - the priest shall make expiation on his behalf
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered with the established
    phrase 'make atonement.' Alternatives such as 'expiation' are more technical and
    less readable; 'purge' is too narrow here.
- source_word: וְנִסְלַח לוֹ
  chosen: and he will be forgiven
  alternatives:
  - and it will be forgiven him
  - and forgiveness will be granted to him
  lexicon: HALOT
  rationale: The Niphal of סלח expresses the result that the offender receives forgiveness.
    'He will be forgiven' is idiomatic and preserves the passive sense.
