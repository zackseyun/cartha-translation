theological_decisions:
- issue: Rendering of sacrificial formula וְכִפֶּר עָלָיו ... וְנִסְלַח לוֹ
  chosen_reading: Thus the priest shall make atonement for him, and he will be forgiven.
  alternative_readings:
  - and the priest shall make atonement on his behalf, and it shall be forgiven him
  rationale: The Hebrew presents priestly atonement resulting in divine forgiveness
    without specifying a later doctrinal mechanism. The translation preserves the
    cultic and covenantal language without importing theological explanation beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
