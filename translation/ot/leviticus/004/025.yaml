theological_decisions:
- issue: Rendering חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either sin or the offering for sin/purification.
    In this ritual context it clearly refers to the sacrificial animal/rite. 'Sin
    offering' preserves the traditional cultic category without importing a narrower
    theory of atonement. The alternative is preserved because some modern scholarship
    emphasizes purification as the ritual effect.
