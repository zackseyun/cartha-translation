id: LEV.4.25
reference: Leviticus 4:25
source:
  edition: WLC
  text: וְ/לָקַ֨ח הַ/כֹּהֵ֜ן מִ/דַּ֤ם הַֽ/חַטָּאת֙ בְּ/אֶצְבָּע֔/וֹ וְ/נָתַ֕ן עַל
    קַרְנֹ֖ת מִזְבַּ֣ח הָ/עֹלָ֑ה וְ/אֶת דָּמ֣/וֹ יִשְׁפֹּ֔ךְ אֶל יְס֖וֹד מִזְבַּ֥ח
    הָ/עֹלָֽה־־־׃
translation:
  text: Then the priest shall take some of the blood of the sin offering with his
    finger and put it on the horns of the altar of burnt offering, and he shall pour
    out the rest of its blood at the base of the altar of burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew term can denote the offering associated
      with removing impurity as well as sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and took
  lexicon: HALOT
  rationale: The waw + qatal continues the procedural sequence in sacrificial instruction.
    In English legal/ritual style, 'Then ... shall take' communicates the stepwise
    force more naturally than a simple 'and.'
- source_word: מִדַּם
  chosen: some of the blood
  alternatives:
  - from the blood
  - part of the blood
  lexicon: HALOT
  rationale: The preposition מִן here is partitive, indicating that only a portion
    of the blood is applied with the finger, not the entirety.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the sin sacrifice
  - the purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חַטָּאת commonly denotes the offering
    associated with sin rather than the abstract concept 'sin.' 'Sin offering' is
    the most transparent and established rendering here. 'Purification offering' is
    possible in some scholarly traditions, but the immediate cultic context and broad
    English comprehensibility favor 'sin offering.'
- source_word: בְּאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - on his finger
  - by his finger
  lexicon: HALOT
  rationale: 'The preposition ב marks instrumentality here: the priest uses his finger
    to apply the blood.'
- source_word: וְנָתַן עַל
  chosen: and put it on
  alternatives:
  - and apply to
  - and place on
  lexicon: HALOT
  rationale: '''Put ... on'' is natural modern English for the ritual action while
    remaining close to the Hebrew. ''Apply'' is interpretive but possible; ''put''
    preserves the concrete action.'
- source_word: קַרְנוֹת
  chosen: the horns
  alternatives:
  - the projections
  - the horn-like corners
  lexicon: HALOT
  rationale: The altar's horn-like protrusions are a standard cultic feature. 'Horns'
    is the conventional and accurate rendering.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar of the burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: This construct phrase identifies the outer altar associated with burnt
    offerings. 'Altar of burnt offering' is clear and idiomatic in English.
- source_word: וְאֶת־דָּמוֹ יִשְׁפֹּךְ
  chosen: and he shall pour out the rest of its blood
  alternatives:
  - and he shall pour out its blood
  - and he shall drain out its blood
  lexicon: HALOT
  rationale: The object suffix refers to the offering/animal's blood. Since some blood
    has already been taken and applied, English idiom benefits from 'the rest of its
    blood' to make the sequence explicit. This is an implicature from the partitive
    מִדַּם, not an addition of new ritual content.
- source_word: אֶל יְסוֹד
  chosen: at the base
  alternatives:
  - to the foundation
  - onto the base
  lexicon: HALOT
  rationale: יְסוֹד refers to the altar's base/foundation area. 'At the base' is the
    most natural rendering for the location where the blood is poured.
