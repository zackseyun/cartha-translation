id: LEV.4.13
reference: Leviticus 4:13
source:
  edition: WLC
  text: וְ/אִ֨ם כָּל עֲדַ֤ת יִשְׂרָאֵל֙ יִשְׁגּ֔וּ וְ/נֶעְלַ֣ם דָּבָ֔ר מֵ/עֵינֵ֖י
    הַ/קָּהָ֑ל וְ֠/עָשׂוּ אַחַ֨ת מִ/כָּל מִצְוֺ֧ת יְהוָ֛ה אֲשֶׁ֥ר לֹא תֵעָשֶׂ֖ינָה
    וְ/אָשֵֽׁמוּ־־־׃
translation:
  text: And if the whole congregation of Israel sins unintentionally, and the matter
    is hidden from the eyes of the assembly, and they do one thing against any of
    the commandments of the LORD that should not be done, and they become guilty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the whole community of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here refers to sin committed unintentionally or by error,
      not deliberate defiance.
    reason: cultural_note
  - marker: c
    text: Hebrew, 'is hidden from the eyes of the assembly,' an idiom meaning that
      the matter escaped the community's notice.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדַת יִשְׂרָאֵל
  chosen: the congregation of Israel
  alternatives:
  - the community of Israel
  - the assembly of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community/congregation. 'Congregation'
    fits the cultic-legal setting well. Because הַקָּהָל later in the verse is also
    present, varying with 'assembly' there helps preserve the distinction without
    overtranslating.
- source_word: יִשְׁגּוּ
  chosen: sins unintentionally
  alternatives:
  - goes astray
  - errs unintentionally
  lexicon: HALOT
  rationale: From שׁגה, in sacrificial legislation this verb refers to inadvertent
    or unintentional sin rather than deliberate rebellion. English needs the adverbial
    sense made explicit for clarity in this legal context.
- source_word: וְנֶעְלַם דָּבָר
  chosen: the matter is hidden
  alternatives:
  - a thing is hidden
  - the matter escapes notice
  lexicon: HALOT
  rationale: The idiom indicates that the relevant offense or fact is not recognized
    by the community. 'The matter is hidden' is a natural, fairly formal rendering
    that preserves the passive sense.
- source_word: מֵעֵינֵי הַקָּהָל
  chosen: from the eyes of the assembly
  alternatives:
  - from the notice of the assembly
  - from the assembly
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'eyes' for perception/awareness. Retaining
    'from the eyes of' preserves the imagery while remaining intelligible. 'Assembly'
    is used here to distinguish קהל from earlier עדה.
- source_word: וְעָשׂוּ אַחַת מִכָּל מִצְוֺת
  chosen: they do one thing against any of the commandments
  alternatives:
  - they do any one of the things forbidden by the commandments
  - they commit one of all the commandments
  lexicon: HALOT
  rationale: The construction means committing one prohibited act in relation to the
    LORD's commandments. 'One thing against any of the commandments' is slightly interpretive
    but reflects the legal sense better than a wooden rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  chosen: that should not be done
  alternatives:
  - which must not be done
  - which are not to be done
  lexicon: HALOT
  rationale: The Niphal/imperfect here expresses prohibited actions. 'Should not be
    done' is idiomatic modern English and preserves the passive-prohibitive force.
- source_word: וְאָשֵׁמוּ
  chosen: they become guilty
  alternatives:
  - they incur guilt
  - they are guilty
  lexicon: HALOT
  rationale: The verb conveys becoming liable/guilty as a result of the offense. 'Become
    guilty' captures the resultant state without importing later atonement terminology.
