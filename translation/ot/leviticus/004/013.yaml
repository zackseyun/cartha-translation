theological_decisions:
- issue: Nature of the sin described by שׁגה in sacrificial law
  chosen_reading: unintentional sin
  alternative_readings:
  - error
  - go astray
  rationale: In Leviticus 4 the offering concerns inadvertent offenses, not high-handed
    rebellion. Rendering with 'unintentionally' preserves the legal-theological category
    recognized in the chapter.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, while alternatives may be noted but not used in the main text absent compelling
    contextual reason.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
