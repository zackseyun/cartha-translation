id: LEV.4.15
reference: Leviticus 4:15
source:
  edition: WLC
  text: וְ֠/סָמְכוּ זִקְנֵ֨י הָ/עֵדָ֧ה אֶת יְדֵי/הֶ֛ם עַל רֹ֥אשׁ הַ/פָּ֖ר לִ/פְנֵ֣י
    יְהוָ֑ה וְ/שָׁחַ֥ט אֶת הַ/פָּ֖ר לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: And the elders of the congregation shall lay their hands on the head of the
    bull before the LORD, and he shall slaughter the bull before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and one shall slaughter the bull before the LORD.' The Hebrew shifts
      from the plural 'elders' to a singular verb here.
    reason: alternative_reading
lexical_decisions:
- source_word: וְסָמְכוּ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts refers to the ritual act of laying/pressing
    hands on the offering. 'Lay' is standard, clear modern English and fits the cultic
    action without over-paraphrasing.
- source_word: זִקְנֵי הָעֵדָה
  chosen: the elders of the congregation
  alternatives:
  - the elders of the assembly
  - the elders of the community
  lexicon: HALOT
  rationale: זִקְנֵי is 'elders of,' and עֵדָה commonly denotes the assembled covenant
    community. 'Congregation' preserves the formal communal sense used in Leviticus
    better than the broader 'community.'
- source_word: אֶת יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun with 3mp suffix; plural
    'hands' should be preserved because the ritual involves both hands or at least
    a collective plural action.
- source_word: עַל רֹאשׁ הַפָּר
  chosen: on the head of the bull
  alternatives:
  - upon the head of the bull
  lexicon: HALOT
  rationale: This is a direct spatial expression in a sacrificial rite. 'Bull' is
    the plain sense of פַּר here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD'
    is both accurate and idiomatic in sacrificial legislation. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for the divine name, following Jewish reverence tradition and the Septuagintal
    pattern.
- source_word: וְשָׁחַט
  chosen: and he shall slaughter
  alternatives:
  - and one shall slaughter
  - and it shall be slaughtered
  - and shall slaughter
  lexicon: HALOT
  rationale: The Hebrew form is 3ms singular, shifting from the preceding plural subject.
    English should preserve the singular rather than smoothing it into a plural. 'Slaughter'
    is more precise than 'kill' in sacrificial context.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is sufficiently precise and avoids
    adding age nuance not demanded by this verse alone.
