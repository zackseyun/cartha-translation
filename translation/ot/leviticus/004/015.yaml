theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves established reverential convention without obscuring
    that the Hebrew uses the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to smooth the singular verb וְשָׁחַט into a plural subject
  chosen_reading: retain singular with 'he shall slaughter'
  alternative_readings:
  - '''they shall slaughter'' to match the elders'
  - impersonal 'the bull shall be slaughtered'
  rationale: The Hebrew text uses a singular verb after the plural subject 'elders
    of the congregation.' Retaining the singular preserves the source-text form and
    leaves open whether a representative individual performs the slaughter. Smoothing
    the number would resolve an ambiguity the Hebrew does not resolve.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
