theological_decisions:
- issue: Ritual instruction verbal aspect
  chosen_reading: Rendered the sequence as prescriptive ('shall take ... shall pour
    out')
  alternative_readings:
  - Rendered as simple past narrative ('took ... put ... poured out')
  rationale: Though the Hebrew forms can look past-like in isolation, the verse belongs
    to a legal-ritual procedure and is best translated as instruction in English.
    This preserves genre and avoids implying a one-time historical act.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cultic terminology for altar appendages
  chosen_reading: Preserved 'horns' literally
  alternative_readings:
  - Rendered functionally as 'corners' or 'projections'
  rationale: The Hebrew cultic image is specific and traditional enough to retain
    without obscuring meaning. Preserving the literal term avoids flattening sacrificial
    symbolism.
  doctrine_reference: Translation philosophy §1, §5
