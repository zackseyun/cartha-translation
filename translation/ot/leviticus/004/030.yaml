id: LEV.4.30
reference: Leviticus 4:30
source:
  edition: WLC
  text: וְ/לָקַ֨ח הַ/כֹּהֵ֤ן מִ/דָּמָ/הּ֙ בְּ/אֶצְבָּע֔/וֹ וְ/נָתַ֕ן עַל קַרְנֹ֖ת
    מִזְבַּ֣ח הָ/עֹלָ֑ה וְ/אֶת כָּל דָּמָ֣/הּ יִשְׁפֹּ֔ךְ אֶל יְס֖וֹד הַ/מִּזְבֵּֽחַ־־־־׃
translation:
  text: And the priest shall take some of its blood with his finger and put it on
    the horns of the altar of burnt offering, and he shall pour out all its blood
    at the base of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from its blood.'' The Hebrew expression is literally ''from its blood''
      and here likely has a partitive sense: the priest takes a portion for application
      to the altar.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the horns of the altar of burnt offering'—the horn-like projections
      at the altar's corners.
    reason: cultural_note
  - marker: c
    text: Although the text says 'all its blood,' the sequence implies that the remaining
      blood is poured out after some has been applied with the finger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: And ... shall take
  alternatives:
  - and he took
  - then he shall take
  lexicon: HALOT
  rationale: Qatal with vav in procedural sacrificial instruction is best rendered
    with future/modal force in English ('shall take') rather than simple past, reflecting
    legal/ritual prescription.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward identification of the officiant; definite article preserved.
- source_word: מִדָּמָהּ
  chosen: some of its blood
  alternatives:
  - from its blood
  lexicon: HALOT
  rationale: 'The preposition מִן with ''blood'' here is naturally partitive: the
    priest takes a portion of the animal''s blood, not the entirety at this stage.'
- source_word: בְּאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - on his finger
  - by his finger
  lexicon: HALOT
  rationale: Instrumental beth is best rendered 'with'; this describes the means by
    which the blood is applied.
- source_word: וְנָתַן
  chosen: and put
  alternatives:
  - and apply
  - and place
  lexicon: HALOT
  rationale: נתן is broadly 'give/put.' 'Put' is natural modern English here; 'apply'
    is possible but slightly more interpretive.
- source_word: עַל קַרְנֹת מִזְבַּח הָעֹלָה
  chosen: on the horns of the altar of burnt offering
  alternatives:
  - on the horns of the burnt-offering altar
  - upon the horns of the altar for burnt offering
  lexicon: HALOT
  rationale: '''Horns'' is the literal cultic term and should be preserved. The construct
    chain identifies the specific altar associated with burnt offering.'
- source_word: וְאֶת כָּל דָּמָהּ
  chosen: and ... all its blood
  alternatives:
  - and the rest of its blood
  - and all of its blood
  lexicon: HALOT
  rationale: כָּל is comprehensive. Although context implies the remainder after some
    has been used, the Hebrew says 'all its blood'; English can preserve this without
    adding 'rest' to the main text.
- source_word: יִשְׁפֹּךְ
  chosen: he shall pour out
  alternatives:
  - he shall drain out
  - he shall spill
  lexicon: HALOT
  rationale: שׁפך in sacrificial contexts commonly means 'pour out.' This is the standard
    and clearest ritual rendering.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  chosen: at the base of the altar
  alternatives:
  - to the foundation of the altar
  - against the base of the altar
  lexicon: HALOT
  rationale: יְסוֹד literally means 'foundation/base.' In altar context, 'base' is
    the most idiomatic English rendering.
