theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic term פָּרֹכֶת הַקֹּדֶשׁ
  chosen_reading: the curtain of the sanctuary
  alternative_readings:
  - the veil of the holy place
  - the curtain of the Holy Place
  rationale: The Hebrew phrase identifies the sacred curtain associated with the holy area. 'Curtain' is more accessible than 'veil' while retaining the cultic object; 'sanctuary' communicates the sacred space without forcing a more technical architectural distinction than the English reader can readily track in this verse alone.
