id: LEV.4.6
reference: Leviticus 4:6
source:
  edition: WLC
  text: וְ/טָבַ֧ל הַ/כֹּהֵ֛ן אֶת אֶצְבָּע֖/וֹ בַּ/דָּ֑ם וְ/הִזָּ֨ה מִן הַ/דָּ֜ם שֶׁ֤בַע פְּעָמִים֙ לִ/פְנֵ֣י יְהוָ֔ה אֶת פְּנֵ֖י פָּרֹ֥כֶת הַ/קֹּֽדֶשׁ־־־׃
translation:
  text: The priest shall dip his finger in the blood and sprinkle some of the blood seven times before Yahweh, in front of the curtain of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'before the curtain of the Holy Place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטָבַל
  chosen: shall dip
  alternatives:
  - and dip
  - dipped
  lexicon: HALOT
  rationale: The waw + qatal continues the ritual instruction sequence with future-like force in English legal/ritual style. 'Dip' is the plain sense of טבל here.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite singular noun referring to the officiating priest in this ritual context.
- source_word: אֶצְבָּעוֹ
  chosen: his finger
  lexicon: HALOT
  rationale: Singular with 3ms suffix; straightforward anatomical reference.
- source_word: בַּדָּם
  chosen: in the blood
  alternatives:
  - into the blood
  lexicon: HALOT
  rationale: The preposition ב marks the substance into which the finger is dipped; 'in the blood' is idiomatic English.
- source_word: וְהִזָּה
  chosen: sprinkle
  alternatives:
  - spatter
  - dash
  lexicon: HALOT
  rationale: In priestly sacrificial contexts נזה in Hiphil denotes ritual sprinkling. 'Sprinkle' is the standard and clearest cultic rendering.
- source_word: מִן־הַדָּם
  chosen: some of the blood
  alternatives:
  - from the blood
  lexicon: HALOT
  rationale: 'מן is naturally partitive here: the priest sprinkles a portion taken from the blood. ''Some of the blood'' is more natural English while preserving the sense.'
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Standard numerical adverbial expression.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי expresses spatial/cultic orientation before YHWH. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine's contested-terms table for the divine name.
- source_word: אֶת־פְּנֵי פָּרֹכֶת הַקֹּדֶשׁ
  chosen: in front of the curtain of the sanctuary
  alternatives:
  - toward the front of the veil of the holy place
  - before the curtain of the holiness
  lexicon: HALOT
  rationale: The idiom פני + object indicates the front/face of something, hence 'in front of.' פָּרֹכֶת is the inner curtain/veil. הַקֹּדֶשׁ here most naturally denotes the sanctuary/holy place associated with that curtain; 'curtain of the sanctuary' is clear modern English without over-technicality.
