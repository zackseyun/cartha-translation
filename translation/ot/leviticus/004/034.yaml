theological_decisions:
- issue: Rendering חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can denote either 'sin' or the sacrifice associated with sin/purification.
    In this cultic procedural context, the offering sense is certain. 'Sin offering'
    remains the most established and understandable English rendering, while 'purification
    offering' is preserved as a lexical alternative because some scholars emphasize
    the rite's cleansing function.
  doctrine_reference: Translation philosophy §1, §5
