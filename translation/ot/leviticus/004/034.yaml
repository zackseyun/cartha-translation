id: LEV.4.34
reference: Leviticus 4:34
source:
  edition: WLC
  text: וְ/לָקַ֨ח הַ/כֹּהֵ֜ן מִ/דַּ֤ם הַֽ/חַטָּאת֙ בְּ/אֶצְבָּע֔/וֹ וְ/נָתַ֕ן עַל
    קַרְנֹ֖ת מִזְבַּ֣ח הָ/עֹלָ֑ה וְ/אֶת כָּל דָּמָ֣/הּ יִשְׁפֹּ֔ךְ אֶל יְס֖וֹד הַ/מִּזְבֵּֽחַ־־־־׃
translation:
  text: Then the priest shall take some of the blood of the sin offering with his
    finger and put it on the horns of the altar of burnt offering, and he shall pour
    out all its blood at the base of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "purification offering." The Hebrew term can denote the sacrifice offered
      in relation to sin and ritual purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and took
  lexicon: HALOT
  rationale: The waw + qatal continues the ritual procedure in instructional sequence.
    English 'Then ... shall take' conveys the stepwise action naturally while preserving
    the procedural force better than a simple past.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun designating the officiating
    priest.
- source_word: מִדַּם
  chosen: some of the blood
  alternatives:
  - from the blood of
  lexicon: HALOT
  rationale: 'The preposition מִן with ''blood'' here is naturally partitive in context:
    the priest applies only a portion of the blood with his finger before the remainder
    is poured out.'
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the sin sacrifice
  - the purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial context חַטָּאת commonly denotes the offering
    rather than abstract 'sin.' 'Sin offering' is the most recognizable and sufficiently
    precise. 'Purification offering' is a defensible contextual alternative but is
    not required by the immediate wording.
- source_word: בְּאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - on his finger
  - by his finger
  lexicon: HALOT
  rationale: 'The beth marks instrumentality: the priest uses his finger to apply
    the blood.'
- source_word: וְנָתַן
  chosen: and put it
  alternatives:
  - and apply it
  - and place it
  lexicon: HALOT
  rationale: נתן is broadly 'give/put.' 'Put it' is idiomatic and accurate in this
    ritual context; the object 'it' is supplied from the blood just mentioned.
- source_word: עַל קַרְנֹת מִזְבַּח הָעֹלָה
  chosen: on the horns of the altar of burnt offering
  alternatives:
  - on the horns of the altar for burnt offering
  - on the horns of the burnt-offering altar
  lexicon: HALOT
  rationale: A formally close rendering that preserves the cultic image of the altar's
    projections ('horns') and identifies this altar by its association with burnt
    offering.
- source_word: וְאֶת כָּל דָּמָהּ
  chosen: and all its blood
  alternatives:
  - and the rest of its blood
  - and all her blood
  lexicon: HALOT
  rationale: The direct-object marker plus כָּל indicates totality. English uses neuter
    'its' for the sacrificial animal/offering. Although context implies the remaining
    blood after the finger application, the Hebrew says 'all its blood'; the procedural
    implication need not be made explicit in the main text.
- source_word: יִשְׁפֹּךְ
  chosen: he shall pour out
  alternatives:
  - he shall drain out
  - he shall spill
  lexicon: HALOT
  rationale: Standard rendering for שפך in sacrificial contexts, conveying deliberate
    ritual disposal rather than accidental spilling.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  chosen: at the base of the altar
  alternatives:
  - to the foundation of the altar
  - at the foot of the altar
  lexicon: HALOT
  rationale: יְסוֹד literally means foundation/base. 'At the base of the altar' is
    clear modern English and fits the ritual setting.
