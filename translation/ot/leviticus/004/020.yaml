id: LEV.4.20
reference: Leviticus 4:20
source:
  edition: WLC
  text: וְ/עָשָׂ֣ה לַ/פָּ֔ר כַּ/אֲשֶׁ֤ר עָשָׂה֙ לְ/פַ֣ר הַֽ/חַטָּ֔את כֵּ֖ן יַעֲשֶׂה
    לּ֑/וֹ וְ/כִפֶּ֧ר עֲלֵ/הֶ֛ם הַ/כֹּהֵ֖ן וְ/נִסְלַ֥ח לָ/הֶֽם־׃
translation:
  text: He shall do with the bull just as he did with the bull of the sin offering;
    so he shall do with it. And the priest shall make atonement for them, and they
    shall be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the bull of the purification offering." The Hebrew term can denote the
      offering that deals with sin by effecting purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: He shall do
  alternatives:
  - And he shall do
  - He must do
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' In this procedural sacrificial context,
    simple future/modal English ('shall do') best reflects the instructional force
    without over-paraphrasing.
- source_word: לַפָּר
  chosen: with the bull
  alternatives:
  - to the bull
  - for the bull
  lexicon: HALOT
  rationale: The preposition ל with עשה here is idiomatic for treatment performed
    upon the animal; English 'do with the bull' communicates the ritual handling more
    naturally than 'do to/for the bull.'
- source_word: כַּאֲשֶׁר עָשָׂה
  chosen: just as he did
  alternatives:
  - as he did
  - according to what he did
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison. 'Just as' preserves the explicit analogy
    to the prior ritual procedure.
- source_word: לְפַר הַחַטָּאת
  chosen: with the bull of the sin offering
  alternatives:
  - for the bull of the sin offering
  - with the sin-offering bull
  lexicon: HALOT
  rationale: The phrase identifies the previously described sacrificial animal. 'Bull
    of the sin offering' is transparent and fairly formal. The compressed English
    compound 'sin-offering bull' is possible but slightly less direct.
- source_word: הַחַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: חטאת in sacrificial contexts can denote either 'sin' or the offering
    dealing with sin/purification. Traditional 'sin offering' remains the clearest
    and most recognizable here, while 'purification offering' is a defensible lexical
    alternative preserved in a footnote because the rite effects cleansing as well
    as expiation.
- source_word: כֵּן יַעֲשֶׂה לּוֹ
  chosen: so he shall do with it
  alternatives:
  - thus he shall do to it
  - in the same way he shall do for it
  lexicon: HALOT
  rationale: כֵּן marks correspondence ('so/thus/in the same way'). The pronoun refers
    back to the bull. 'Do with it' is idiomatic English for ritual treatment.
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall atone
  - shall purge
  lexicon: HALOT
  rationale: כפר is a key cultic term. 'Make atonement' is the standard, transparent
    rendering in Leviticus and preserves the sacrificial-theological sense better
    than the less explicit 'atone.'
- source_word: עֲלֵהֶם
  chosen: for them
  alternatives:
  - on their behalf
  - over them
  lexicon: HALOT
  rationale: With כפר, על commonly indicates the persons for whom atonement is made.
    'For them' is natural English and captures representative benefit.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the officiant title.
- source_word: וְנִסְלַח לָהֶם
  chosen: and they shall be forgiven
  alternatives:
  - and it shall be forgiven them
  lexicon: HALOT
  rationale: The Niphal of סלח expresses passive/resultative forgiveness granted to
    the people. English personal passive ('they shall be forgiven') is clearer than
    the impersonal idiom while preserving the sense.
