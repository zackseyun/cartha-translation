theological_decisions:
- issue: Rendering of חטאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can emphasize either the offense addressed or the purification
    effected. In Leviticus 4, the offering addresses sin and restores cultic standing;
    'sin offering' remains the most established and immediately understandable English
    rendering. Because 'purification offering' has lexical merit and is discussed
    in scholarship, it is preserved in a footnote rather than elevated to the main
    text.
  doctrine_reference: Translation philosophy §3, §5
