id: LEV.16.19
reference: Leviticus 16:19
source:
  edition: WLC
  text: וְ/הִזָּ֨ה עָלָ֧י/ו מִן הַ/דָּ֛ם בְּ/אֶצְבָּע֖/וֹ שֶׁ֣בַע פְּעָמִ֑ים וְ/טִהֲר֣/וֹ
    וְ/קִדְּשׁ֔/וֹ מִ/טֻּמְאֹ֖ת בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: He shall sprinkle some of the blood on it with his finger seven times, and
    cleanse it and consecrate it from the uncleannesses of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purify it'; the Hebrew verb is a standard priestly term for making something
      ritually clean.
    reason: lexical_alternative
  - marker: b
    text: Or 'sanctify it' or 'make it holy.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Israel'; many English versions render this more idiomatically
      as 'the Israelites' or 'the people of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  chosen: He shall sprinkle
  alternatives:
  - and he shall spatter
  - and he shall sprinkle
  lexicon: HALOT
  rationale: Hiphil of נזה in ritual contexts commonly denotes sprinkling blood. English
    'sprinkle' is the standard clear ritual term and fits the imperfect/sequential
    instruction.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - on top of it
  lexicon: HALOT
  rationale: Refers back to the altar named in the preceding verse. 'On it' is natural
    modern English; 'upon it' is more formal but not necessary.
- source_word: מִן־הַדָּם
  chosen: some of the blood
  alternatives:
  - from the blood
  - of the blood
  lexicon: HALOT
  rationale: The partitive sense of מִן is best conveyed in idiomatic English as 'some
    of the blood,' indicating blood taken from the supply for sprinkling.
- source_word: בְּאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - by his finger
  - using his finger
  lexicon: HALOT
  rationale: Instrumental beth indicates means. 'With his finger' is the most natural
    rendering.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Straightforward numerical-adverbial phrase; 'seven times' preserves the
    ritual specificity.
- source_word: וְטִהֲרוֹ
  chosen: and cleanse it
  alternatives:
  - and purify it
  - thus cleanse it
  lexicon: HALOT
  rationale: טהר in priestly ritual often means to make clean/pure. 'Cleanse' is accessible
    modern English and preserves ritual force without overtechnicality.
- source_word: וְקִדְּשׁוֹ
  chosen: and consecrate it
  alternatives:
  - and sanctify it
  - and make it holy
  lexicon: HALOT
  rationale: קדש in this context means to set apart as holy. 'Consecrate' is precise
    and readable; 'sanctify' is possible but slightly more ecclesiastical.
- source_word: מִטֻּמְאֹת
  chosen: from the uncleannesses
  alternatives:
  - from the impurities
  - from the defilements
  lexicon: HALOT
  rationale: Plural טֻמְאוֹת is retained with a plural English form to reflect the
    Hebrew and the priestly category of ritual impurity. 'Uncleannesses' is somewhat
    formal but preserves the cultic sense better than the broader 'impurities'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is explicitly masculine. 'Sons of Israel' closely reflects the
    Hebrew while remaining understandable. More idiomatic collective alternatives
    are possible but less formally transparent.
