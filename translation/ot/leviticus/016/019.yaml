theological_decisions:
- issue: Ritual purification language for the altar
  chosen_reading: The altar is said to be cleansed and consecrated from Israel's ritual
    uncleannesses.
  alternative_readings:
  - The verbs could be rendered more dynamically as 'purify' and 'make holy.'
  rationale: The verse describes priestly atonement ritual affecting the sanctuary
    object, not moral conversion or inner spiritual renewal. The chosen wording preserves
    the cultic, ceremonial sense without importing later theological categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a representative covenantal
    expression. Following the gender-accurate policy, the translation keeps the masculine
    form rather than neutralizing it, while preserving readability.
  doctrine_reference: Translation philosophy §4
