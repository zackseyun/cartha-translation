id: LEV.16.31
reference: Leviticus 16:31
source:
  edition: WLC
  text: שַׁבַּ֨ת שַׁבָּת֥וֹן הִיא֙ לָ/כֶ֔ם וְ/עִנִּיתֶ֖ם אֶת נַפְשֹׁתֵי/כֶ֑ם חֻקַּ֖ת
    עוֹלָֽם־׃
translation:
  text: It is a Sabbath of complete rest for you, and you shall humble yourselves;
    it is a permanent statute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall afflict yourselves'; traditionally understood to include fasting
      and self-denial.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבַּת
  chosen: Sabbath
  alternatives:
  - rest day
  lexicon: HALOT
  rationale: Retained as 'Sabbath' because the term is a fixed cultic/theological
    designation in Torah, not merely a generic day of rest.
- source_word: שַׁבָּתוֹן
  chosen: complete rest
  alternatives:
  - solemn rest
  - sabbath observance
  - rest
  lexicon: HALOT
  rationale: Used 'complete rest' to bring out the intensive/appositional force of
    the doubled expression שַׁבַּת שַׁבָּתוֹן without sounding archaic. This preserves
    the superlative sense better than a flat repetition in English.
- source_word: הִיא לָכֶם
  chosen: It is ... for you
  alternatives:
  - it shall be for you
  - this is for you
  lexicon: HALOT
  rationale: Rendered with a natural English copular clause while preserving the predicative
    statement addressed to the community.
- source_word: וְעִנִּיתֶם
  chosen: you shall humble yourselves
  alternatives:
  - you shall afflict yourselves
  - you shall deny yourselves
  lexicon: HALOT
  rationale: The piel of ענה in this ritual context refers to self-denial/humbling
    associated with the Day of Atonement. 'Humble yourselves' is clearer in modern
    English and avoids implying physical abuse, while still preserving the penitential
    force. A more formal alternative is preserved in a footnote.
- source_word: נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  - your lives
  lexicon: HALOT
  rationale: Here נֶפֶשׁ functions idiomatically in the reflexive expression 'humble
    your נפשות.' English 'yourselves' best conveys the idiom naturally; 'your souls'
    would sound overly literal and potentially misleading in modern English.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a statute forever
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: Rendered as 'a permanent statute' to communicate enduring legal force
    in clear modern English. 'Forever/everlasting' is possible, but 'permanent' better
    reflects the idiomatic legislative formula in accessible English.
