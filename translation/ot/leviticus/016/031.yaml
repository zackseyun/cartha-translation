theological_decisions:
- issue: Meaning of the self-denial command on the Day of Atonement
  chosen_reading: Rendered the command in general terms as 'you shall humble yourselves'
    rather than specifying fasting in the main text.
  alternative_readings:
  - you shall afflict yourselves
  - you shall fast
  rationale: The Hebrew text itself uses the broader idiom ענה + נפשׁ, which historically
    includes fasting but is not lexically identical to a direct verb for fasting.
    Preserving the broader wording avoids importing a narrower ritual specification
    into the main text while allowing the traditional understanding to remain available
    by footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
