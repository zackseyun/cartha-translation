id: LEV.16.9
reference: Leviticus 16:9
source:
  edition: WLC
  text: וְ/הִקְרִ֤יב אַהֲרֹן֙ אֶת הַ/שָּׂעִ֔יר אֲשֶׁ֨ר עָלָ֥ה עָלָ֛י/ו הַ/גּוֹרָ֖ל
    לַ/יהוָ֑ה וְ/עָשָׂ֖/הוּ חַטָּֽאת־׃
translation:
  text: Then Aaron shall present the goat on which the lot for the LORD fell, and
    make it a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the goat for which the lot for Yahweh came up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: הקריב in sacrificial contexts often means to bring near/present for ritual
    action. 'Present' is natural English and preserves the cultic sense without prematurely
    specifying the exact sacrificial act as 'offer' before the clause completes.
- source_word: הַשָּׂעִיר
  chosen: the goat
  alternatives:
  - the male goat
  lexicon: HALOT
  rationale: שׂעיר denotes a goat, often specifically a male goat. English 'goat'
    is sufficient here because the ritual context already identifies the animal type,
    while 'male goat' would be more explicit but slightly heavier.
- source_word: אֲשֶׁר עָלָה עָלָיו הַגּוֹרָל
  chosen: on which the lot ... fell
  alternatives:
  - for which the lot came up
  - upon which the lot went up
  lexicon: HALOT
  rationale: The idiom 'the lot fell on' is standard and accurately conveys עלה ...
    הגורל in context. It is more idiomatic than a wooden 'came up' while preserving
    the sense of lot assignment.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יהוה is rendered ''the LORD.'' The prefixed ל marks designation:
    the lot assigned ''for the LORD,'' distinguishing this goat from the other lot
    in the ritual.'
- source_word: וְעָשָׂהוּ חַטָּאת
  chosen: and make it a sin offering
  alternatives:
  - and offer it as a sin offering
  - and make it sin
  lexicon: HALOT
  rationale: חטאת in sacrificial legislation commonly means 'sin offering,' not merely
    'sin.' The verb עשה with the object suffix and חטאת means to deal with the goat
    as a sin offering. 'Make it a sin offering' is close to the Hebrew while remaining
    clear.
