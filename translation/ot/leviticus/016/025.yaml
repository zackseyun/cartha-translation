id: LEV.16.25
reference: Leviticus 16:25
source:
  edition: WLC
  text: וְ/אֵ֛ת חֵ֥לֶב הַֽ/חַטָּ֖את יַקְטִ֥יר הַ/מִּזְבֵּֽחָ/ה׃
translation:
  text: And he shall burn the fat of the sin offering on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the purification offering.” The Hebrew term can denote the offering
      used for purification from sin or impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: And
  alternatives:
  - And the
  - Now the
  lexicon: HALOT
  rationale: The conjunction links this action to the preceding ritual sequence. The
    object marker אֵת is not separately represented in English, so the conjunction
    alone is carried over naturally.
- source_word: חֵלֶב
  chosen: the fat
  alternatives:
  - fat portions
  lexicon: HALOT
  rationale: חֵלֶב refers to the sacrificial fat designated for offering. 'The fat'
    is the most direct rendering; 'fat portions' is possible but adds specificity
    not explicit in the Hebrew of this verse.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the sin sacrifice
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת in sacrificial contexts commonly denotes the 'sin offering.'
    'Purification offering' is argued by some to reflect ritual function more precisely,
    but 'sin offering' remains the clearest and most widely recognized rendering here
    without obscuring the cultic sense.
- source_word: יַקְטִיר
  chosen: he shall burn
  alternatives:
  - he shall turn into smoke
  - he shall offer up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts means to burn on the altar
    as an offering, often with the sense of producing smoke. 'He shall burn' is idiomatic
    and sufficiently precise in English; more wooden alternatives are less natural.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with מזבח can be rendered 'to the altar,' but
    in context with sacrificial burning the idiomatic English expression is 'on the
    altar,' expressing the location of the burning action.
