theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote both sin and the offering associated with
    purification from impurity/sin. In Levitical sacrificial context, 'sin offering'
    is the established cultic rendering and remains understandable to modern readers.
    The alternative is preserved in a footnote because it reflects a significant scholarly
    discussion about ritual function.
  doctrine_reference: Translation philosophy §3, §6
