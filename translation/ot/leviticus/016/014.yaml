theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  rationale: This verse concerns the ark's cultic cover in the Day of Atonement ritual.
    'Mercy seat' preserves the established theological-cultic referent in English,
    while 'atonement cover' is a viable more concrete alternative. Because the term
    is theologically weighty and potentially opaque, the alternative is preserved
    in a footnote rather than replacing the traditional rendering in the main text.
  doctrine_reference: Translation philosophy §§1, 5, 6
