id: LEV.16.14
reference: Leviticus 16:14
source:
  edition: WLC
  text: וְ/לָקַח֙ מִ/דַּ֣ם הַ/פָּ֔ר וְ/הִזָּ֧ה בְ/אֶצְבָּע֛/וֹ עַל פְּנֵ֥י הַ/כַּפֹּ֖רֶת
    קֵ֑דְמָ/ה וְ/לִ/פְנֵ֣י הַ/כַּפֹּ֗רֶת יַזֶּ֧ה שֶֽׁבַע פְּעָמִ֛ים מִן הַ/דָּ֖ם בְּ/אֶצְבָּעֽ/וֹ־־־׃
translation:
  text: And he shall take some of the bull's blood and sprinkle it with his finger
    on the front of the mercy seat, eastward; and before the mercy seat he shall sprinkle
    some of the blood with his finger seven times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover.' The Hebrew kapporet refers to the cover of the ark,
      the place associated with atonement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: And he shall take
  alternatives:
  - And he took
  - Then he shall take
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in ritual instruction is naturally
    rendered with future/modal force in English ('shall') to reflect procedural prescription
    rather than simple past narrative.
- source_word: מִדַּם הַפָּר
  chosen: some of the bull's blood
  alternatives:
  - from the blood of the bull
  - some blood from the bull
  lexicon: HALOT
  rationale: The preposition מִן here is partitive, indicating a portion of the blood
    rather than source alone. 'Bull's blood' is idiomatic English while preserving
    the genitival sense.
- source_word: וְהִזָּה
  chosen: sprinkle
  alternatives:
  - spatter
  - dash
  lexicon: HALOT
  rationale: נזה in priestly ritual contexts refers to the application of blood by
    sprinkling. 'Sprinkle' is the standard clear English equivalent in sacrificial
    legislation.
- source_word: בְאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - by his finger
  - using his finger
  lexicon: HALOT
  rationale: The beth marks instrument; 'with his finger' is the most natural English
    rendering and preserves the ritual means.
- source_word: עַל פְּנֵי הַכַּפֹּרֶת
  chosen: on the front of the mercy seat
  alternatives:
  - on the face of the mercy seat
  - on the surface of the atonement cover
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/surface,' but in this spatial context 'front'
    fits well with the following directional term 'eastward.' For כַּפֹּרֶת, 'mercy
    seat' is the established cultic term; 'atonement cover' is possible but less idiomatic
    here.
- source_word: הַכַּפֹּרֶת
  chosen: mercy seat
  alternatives:
  - atonement cover
  lexicon: HALOT
  rationale: Although the Hebrew denotes the cover of the ark, 'mercy seat' remains
    the most recognizable English rendering for this specific cultic object. The alternative
    is preserved in a footnote because it reflects the object's physical sense more
    directly.
- source_word: קֵדְמָה
  chosen: eastward
  alternatives:
  - on the east side
  - toward the east
  lexicon: HALOT
  rationale: The directional adverb indicates orientation toward the east. 'Eastward'
    is concise and works naturally with 'front' in English.
- source_word: וְלִפְנֵי הַכַּפֹּרֶת
  chosen: and before the mercy seat
  alternatives:
  - and in front of the mercy seat
  lexicon: HALOT
  rationale: לִפְנֵי denotes position before/in front of. 'Before' is idiomatic in
    ritual description and distinguishes this action from the prior sprinkling on
    the mercy seat itself.
- source_word: יַזֶּה שֶׁבַע פְּעָמִים
  chosen: he shall sprinkle ... seven times
  alternatives:
  - he shall spatter ... seven times
  lexicon: HALOT
  rationale: The imperfect continues the procedural instruction. 'Seven times' should
    remain explicit because the number is ritually significant.
- source_word: מִן הַדָּם
  chosen: some of the blood
  alternatives:
  - from the blood
  lexicon: HALOT
  rationale: 'Again, מִן is best taken partitively: a portion of the blood is used
    in the repeated sprinkling.'
