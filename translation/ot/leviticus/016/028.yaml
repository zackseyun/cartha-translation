id: LEV.16.28
reference: Leviticus 16:28
source:
  edition: WLC
  text: וְ/הַ/שֹּׂרֵ֣ף אֹתָ֔/ם יְכַבֵּ֣ס בְּגָדָ֔י/ו וְ/רָחַ֥ץ אֶת בְּשָׂר֖/וֹ בַּ/מָּ֑יִם
    וְ/אַחֲרֵי כֵ֖ן יָב֥וֹא אֶל הַֽ/מַּחֲנֶֽה־־־׃
translation:
  text: The one who burns them shall wash his clothes and bathe his body in water,
    and afterward he may come into the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall come into the camp.' The Hebrew verb can be read as a simple
      future, but here it likely expresses permitted reentry after purification.
    reason: alternative_reading
  - marker: b
    text: Literally 'his flesh.' In this washing idiom, the sense is 'his body.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשֹּׂרֵף
  chosen: The one who burns
  alternatives:
  - the one burning
  - whoever burns
  - the burner
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to the
    person assigned to burn the remains mentioned in the previous verse. 'The one
    who burns' is natural English and preserves the ongoing/role sense better than
    a simple finite verb.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - those things
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the bull and goat (or their remains)
    from the immediate context. 'Them' is the plain and sufficient rendering.
- source_word: יְכַבֵּס
  chosen: shall wash
  alternatives:
  - must wash
  - is to wash
  lexicon: HALOT
  rationale: The imperfect here carries prescriptive force in ritual legislation.
    'Shall wash' preserves the legal/instructional tone without over-paraphrasing.
- source_word: בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: בגד can be rendered 'garment(s),' but 'clothes' is more readable modern
    English and still accurate in a ritual-purity context.
- source_word: וְרָחַץ
  chosen: and bathe
  alternatives:
  - and wash
  - and wash himself
  lexicon: HALOT
  rationale: רחץ with 'his body' indicates bodily washing rather than laundering.
    'Bathe' distinguishes this action from washing clothes and reads naturally in
    English.
- source_word: אֶת־בְּשָׂרוֹ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: HALOT
  rationale: Though בשר is literally 'flesh,' in this idiom of ritual washing it refers
    to the person's body. 'His body' communicates the sense clearly in modern English;
    'his flesh' would sound wooden and potentially misleading.
- source_word: בַּמָּיִם
  chosen: in water
  alternatives:
  - with water
  lexicon: HALOT
  rationale: The preposition ב here is naturally rendered 'in' with bathing/washing
    idiomatically. 'In water' is a standard and transparent rendering.
- source_word: וְאַחֲרֵי כֵן
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: This temporal phrase marks sequence following the purification actions.
    'Afterward' is concise and natural.
- source_word: יָבֹא
  chosen: he may come
  alternatives:
  - he shall come
  - he can come
  - he may enter
  lexicon: HALOT
  rationale: In context this indicates permission/restoration after purification rather
    than a mere future event. 'He may come' best captures that he is allowed to reenter
    once cleansed.
- source_word: אֶל־הַמַּחֲנֶה
  chosen: into the camp
  alternatives:
  - to the camp
  lexicon: HALOT
  rationale: With בוא plus אֶל, English idiom favors 'come into the camp' to express
    reentry. This makes the movement and restoration to the community explicit without
    adding content.
