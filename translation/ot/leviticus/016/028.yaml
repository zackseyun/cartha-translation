theological_decisions:
- issue: Ritual-purity force of the final clause
  chosen_reading: The clause is rendered as permission/restoration ('he may come into
    the camp') after required washing.
  alternative_readings:
  - simple future ('he shall come into the camp')
  rationale: The verse describes impurity incurred by handling the sin-offering remains
    outside the camp and the cleansing required before reentry. Rendering יָבֹא as
    permissive in English best reflects the ritual logic of the passage without importing
    extra theology.
