id: LEV.16.15
reference: Leviticus 16:15
source:
  edition: WLC
  text: וְ/שָׁחַ֞ט אֶת שְׂעִ֤יר הַֽ/חַטָּאת֙ אֲשֶׁ֣ר לָ/עָ֔ם וְ/הֵבִיא֙ אֶת דָּמ֔/וֹ
    אֶל מִ/בֵּ֖ית לַ/פָּרֹ֑כֶת וְ/עָשָׂ֣ה אֶת דָּמ֗/וֹ כַּ/אֲשֶׁ֤ר עָשָׂה֙ לְ/דַ֣ם
    הַ/פָּ֔ר וְ/הִזָּ֥ה אֹת֛/וֹ עַל הַ/כַּפֹּ֖רֶת וְ/לִ/פְנֵ֥י הַ/כַּפֹּֽרֶת־־־־־׃
translation:
  text: Then he shall slaughter the goat of the sin offering that is for the people,
    and bring its blood inside the veil, and do with its blood as he did with the
    blood of the bull, and sprinkle it on the atonement cover and before the atonement
    cover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, "mercy seat."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  chosen: Then he shall slaughter
  alternatives:
  - and he shall slaughter
  - and he slaughtered
  lexicon: HALOT
  rationale: The verb denotes ritual killing/slaughter. In this procedural legal context,
    English future-like 'shall' fits the instruction sequence. 'Then' brings out the
    waw-linked progression without over-paraphrasing.
- source_word: שְׂעִיר הַחַטָּאת
  chosen: the goat of the sin offering
  alternatives:
  - the goat for the sin offering
  - the sin-offering goat
  lexicon: HALOT
  rationale: Construct relationship is best represented as 'goat of the sin offering.'
    This preserves that the goat is the sacrificial animal associated with the sin
    offering, not merely any goat.
- source_word: אֲשֶׁר לָעָם
  chosen: that is for the people
  alternatives:
  - which belongs to the people
  - for the people
  lexicon: HALOT
  rationale: The phrase distinguishes this goat from the bull offered for Aaron. 'For
    the people' is the plain contextual sense.
- source_word: וְהֵבִיא אֶת־דָּמוֹ
  chosen: and bring its blood
  alternatives:
  - and he shall bring its blood
  - and bring its blood in
  lexicon: HALOT
  rationale: The hiphil of בוא here means to bring/carry the blood into the inner
    sanctuary. 'Its' clearly refers to the goat.
- source_word: אֶל מִבֵּית לַפָּרֹכֶת
  chosen: inside the veil
  alternatives:
  - into the area inside the veil
  - to the inside of the curtain
  lexicon: HALOT
  rationale: Literally 'to/from inside the veil' is an idiom for the space within
    the curtain, i.e., behind the veil. 'Inside the veil' is idiomatic modern English
    and preserves the cultic spatial reference.
- source_word: וְעָשָׂה אֶת־דָּמוֹ כַּאֲשֶׁר עָשָׂה לְדַם הַפָּר
  chosen: and do with its blood as he did with the blood of the bull
  alternatives:
  - and treat its blood as he treated the blood of the bull
  - and do to its blood as he did to the bull's blood
  lexicon: HALOT
  rationale: The Hebrew is somewhat elliptical; the sense is to perform the same ritual
    action with this blood as with the bull's blood. 'Do with its blood' is close
    to the Hebrew while remaining natural.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull. 'The bull' matches the immediately preceding
    ritual context in Leviticus 16.
- source_word: וְהִזָּה אֹתוֹ
  chosen: and sprinkle it
  alternatives:
  - and spatter it
  lexicon: HALOT
  rationale: The hiphil of נזה in sacrificial contexts is conventionally 'sprinkle.'
    The object pronoun refers to the blood. This is standard cultic terminology and
    sufficiently clear in English.
- source_word: עַל הַכַּפֹּרֶת
  chosen: on the atonement cover
  alternatives:
  - on the mercy seat
  - on the cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת refers to the gold cover of the ark. Following source-language
    primacy and accessibility, 'atonement cover' communicates function better than
    the traditional but less transparent 'mercy seat.' The traditional rendering is
    preserved in a footnote.
- source_word: וְלִפְנֵי הַכַּפֹּרֶת
  chosen: and before the atonement cover
  alternatives:
  - and in front of the atonement cover
  lexicon: HALOT
  rationale: לִפְנֵי indicates position before/in front of. 'Before' is concise and
    preserves the ritual spatial distinction from 'on'.
