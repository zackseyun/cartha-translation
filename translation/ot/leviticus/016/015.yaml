theological_decisions:
- issue: Rendering of כַּפֹּרֶת
  chosen_reading: atonement cover
  alternative_readings:
  - mercy seat
  rationale: The Hebrew term denotes the ark's cover in the Day of Atonement ritual.
    'Atonement cover' is more transparent to modern readers and avoids importing later
    theological associations as the main text. The traditional 'mercy seat' is important
    historically and is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
