id: LEV.16.12
reference: Leviticus 16:12
source:
  edition: WLC
  text: וְ/לָקַ֣ח מְלֹֽא הַ֠/מַּחְתָּה גַּֽחֲלֵי אֵ֞שׁ מֵ/עַ֤ל הַ/מִּזְבֵּ֨חַ֙ מִ/לִּ/פְנֵ֣י יְהוָ֔ה וּ/מְלֹ֣א חָפְנָ֔י/ו קְטֹ֥רֶת סַמִּ֖ים דַּקָּ֑ה וְ/הֵבִ֖יא מִ/בֵּ֥ית לַ/פָּרֹֽכֶת־־׃
translation:
  text: And he shall take a censer full of coals of fire from upon the altar before Yahweh, and both his hands full of finely ground fragrant incense, and bring it inside the veil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within the veil.' The Hebrew expression refers to bringing the censer and incense into the space behind the curtain, that is, the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: And he shall take
  alternatives:
  - And he must take
  - Then he shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural legal narrative commonly carries an instructional future/modal force in English. 'Shall take' fits ritual prescription style without over-paraphrasing.
- source_word: מְלֹא הַמַּחְתָּה
  chosen: a full censer
  alternatives:
  - the censer full
  - a censerful
  lexicon: HALOT
  rationale: Construct phrase literally 'fullness of the censer,' idiomatically meaning the censer filled to capacity. 'A full censer' is natural English and preserves the object and quantity.
- source_word: גַּחֲלֵי אֵשׁ
  chosen: coals of fire
  alternatives:
  - fire coals
  - burning coals
  lexicon: HALOT
  rationale: Formal rendering preserves the Hebrew genitive. 'Burning coals' is possible but slightly interpretive; 'coals of fire' stays closer to the source.
- source_word: מֵעַל הַמִּזְבֵּחַ
  chosen: from upon the altar
  alternatives:
  - from the altar
  - off the altar
  lexicon: HALOT
  rationale: The preposition מֵעַל is more specifically 'from upon' rather than simply 'from.' Retaining 'upon' preserves the spatial detail while remaining readable.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - from before the LORD
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase modifies the altar's location relative to YHWH. English idiom favors 'the altar before the LORD.' Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: וּמְלֹא חָפְנָיו
  chosen: and his hands full of
  alternatives:
  - and a double handful of
  - and the fullness of his hands of
  lexicon: HALOT
  rationale: Literally 'and the fullness of his palms/hands.' The dual form indicates both hands; 'his hands full of' is idiomatic and accurately conveys the quantity without awkwardness.
- source_word: קְטֹרֶת סַמִּים
  chosen: fragrant incense
  alternatives:
  - incense of spices
  - spiced incense
  - sweet incense
  lexicon: HALOT
  rationale: The phrase denotes incense made from aromatic substances. 'Fragrant incense' communicates the sense in clear modern English; 'sweet incense' is traditional but potentially misleading in contemporary usage.
- source_word: דַּקָּה
  chosen: finely ground
  alternatives:
  - fine
  - powdered
  - beaten small
  lexicon: HALOT
  rationale: The adjective indicates something crushed fine. 'Finely ground' is precise and natural for incense preparation, preserving the ritual detail better than the bare 'fine.'
- source_word: וְהֵבִיא
  chosen: and bring
  alternatives:
  - and he shall bring
  - and carry
  lexicon: HALOT
  rationale: Continuation of procedural instruction. 'Bring' is the standard rendering of בוא in Hiphil here and fits the ritual movement.
- source_word: מִבֵּית לַפָּרֹכֶת
  chosen: inside the veil
  alternatives:
  - within the veil
  - into the house of the veil
  - from inside the veil
  lexicon: HALOT
  rationale: In context this idiom refers to the space within/behind the curtain separating the holy place from the most holy place. Although the form is compressed, the sense is directional into the inner sanctuary. 'Inside the veil' is clear modern English; 'within the veil' is a viable traditional alternative.
