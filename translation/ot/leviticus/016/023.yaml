id: LEV.16.23
reference: Leviticus 16:23
source:
  edition: WLC
  text: וּ/בָ֤א אַהֲרֹן֙ אֶל אֹ֣הֶל מוֹעֵ֔ד וּ/פָשַׁט֙ אֶת בִּגְדֵ֣י הַ/בָּ֔ד אֲשֶׁ֥ר
    לָבַ֖שׁ בְּ/בֹא֣/וֹ אֶל הַ/קֹּ֑דֶשׁ וְ/הִנִּיחָ֖/ם שָֽׁם־־־׃
translation:
  text: Then Aaron shall come into the tent of meeting and take off the linen garments
    that he put on when he went into the holy place, and he shall leave them there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary'; some understand this more specifically as 'the Most
      Holy Place' from the broader Day of Atonement context.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָא
  chosen: Then ... shall come
  alternatives:
  - and ... came
  - and ... shall enter
  lexicon: HALOT
  rationale: The waw + qatal in ritual instruction commonly carries sequential/future
    force in English. 'Then ... shall come' reflects procedural sequence more naturally
    than a simple past, while 'come' is retained over 'enter' as a close equivalent
    of בוא.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard designation for the sanctuary structure. Lowercase
    is used here for readable modern English without changing the referent.
- source_word: וּפָשַׁט
  chosen: take off
  alternatives:
  - strip off
  - remove
  lexicon: HALOT
  rationale: '''Take off'' is idiomatic modern English for removing clothing and fits
    the optimal-equivalence aim better than the more abrupt ''strip off'' or the more
    formal ''remove''.'
- source_word: בִּגְדֵי הַבָּד
  chosen: the linen garments
  alternatives:
  - the linen clothes
  - the garments of linen
  lexicon: HALOT
  rationale: בגד is 'garment/clothing' and בד denotes linen. 'The linen garments'
    is natural English and preserves the material specification important to the ritual
    context.
- source_word: אֲשֶׁר לָבַשׁ
  chosen: that he put on
  alternatives:
  - which he wore
  - that he had worn
  lexicon: HALOT
  rationale: לבש means 'to put on/wear.' In this relative clause referring back to
    the garments, 'that he put on' best matches the action connected with his entry
    into the sanctuary.
- source_word: בְּבֹאוֹ
  chosen: when he went
  alternatives:
  - in his going
  - when he came
  lexicon: HALOT
  rationale: The infinitive construct with preposition expresses temporal circumstance.
    'When he went' is idiomatic in English and suits movement into the sanctuary from
    outside.
- source_word: הַקֹּדֶשׁ
  chosen: the holy place
  alternatives:
  - the sanctuary
  - the holy place/holy sanctuary
  lexicon: HALOT
  rationale: In Levitical cultic context, הקֹדשׁ here refers to the sacred area entered
    for the rite. 'The holy place' is a transparent rendering; 'sanctuary' is possible
    but less specific in this immediate context.
- source_word: וְהִנִּיחָם שָׁם
  chosen: and he shall leave them there
  alternatives:
  - and set them down there
  - and deposit them there
  lexicon: HALOT
  rationale: הניח with object pronoun means to place/leave. 'Leave them there' is
    clear, natural, and adequately reflects the instruction without over-specifying
    the manner of placement.
