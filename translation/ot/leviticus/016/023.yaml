theological_decisions:
- issue: Referent of 'the holy place' (הקֹּדֶשׁ)
  chosen_reading: Render generically as 'the holy place' rather than interpretively
    as 'the Most Holy Place.'
  alternative_readings:
  - the sanctuary
  - the Most Holy Place
  rationale: The Hebrew term here is simply 'the holy [place].' Because the verse
    itself does not use the fuller expression for the innermost sanctuary, the translation
    preserves the source wording and avoids importing a more specific architectural
    interpretation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
