  from: and they shall burn in the fire their hides, their flesh, and their dung.
  to: and they shall burn their hides, their flesh, and their dung in the fire.
  rationale: The current word order (Verb-Adverbial Phrase-Object) directly mirrors the Hebrew syntax. While this is a valid formal choice, it creates a slightly stiff and less natural cadence in English. Reversing the object and the adverbial phrase to the more common Verb-Object-Adverbial pattern improves the flow and readability of the sentence without any loss of meaning or nuance.
