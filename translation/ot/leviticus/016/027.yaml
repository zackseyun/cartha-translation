theological_decisions:
- issue: Rendering of sacrificial terminology related to כפר and חטאת
  chosen_reading: 'Use established but accessible cultic language: ''sin offering'' and ''make atonement.'''
  alternative_readings:
  - purification offering
  - to purge
  rationale: The verse is embedded in Day of Atonement ritual legislation. 'Sin offering' remains the most recognizable rendering for חטאת in this context, while 'make atonement' preserves the theological function of כפר without importing a narrower doctrinal explanation.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referent of singular יוֹצִיא followed by plural וְשָׂרְפוּ
  chosen_reading: 'Retain the shift: ''he shall bring out ... and they shall burn.'''
  alternative_readings:
  - he shall bring out ... and burn
  - one shall bring out ... and burn
  rationale: The Hebrew shifts from singular to plural, likely from the officiant to assisting persons. Preserving the number shift maintains transparency to the source rather than smoothing it away.
  doctrine_reference: Translation philosophy §§1, 5
