id: LEV.16.27
reference: Leviticus 16:27
source:
  edition: WLC
  text: וְ/אֵת֩ פַּ֨ר הַֽ/חַטָּ֜את וְ/אֵ֣ת שְׂעִ֣יר הַֽ/חַטָּ֗את אֲשֶׁ֨ר הוּבָ֤א אֶת דָּמָ/ם֙ לְ/כַפֵּ֣ר בַּ/קֹּ֔דֶשׁ יוֹצִ֖יא אֶל מִ/ח֣וּץ לַֽ/מַּחֲנֶ֑ה וְ/שָׂרְפ֣וּ בָ/אֵ֔שׁ אֶת עֹרֹתָ֥/ם וְ/אֶת בְּשָׂרָ֖/ם וְ/אֶת פִּרְשָֽׁ/ם׀־־־־־׃
translation:
  text: And the bull for the sin offering and the goat for the sin offering, whose blood was brought in to make atonement in the sanctuary, he shall bring out to outside the camp, and they shall burn their hides, their flesh, and their dung in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'he shall bring them outside the camp.' The Hebrew more literally has 'he shall bring out to outside the camp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their skins' for 'their hides.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from singular ('he shall bring out') to plural ('they shall burn'), likely distinguishing the officiant from those assisting.
    reason: cultural_note
  - marker: d
    text: Or 'and they shall burn in the fire their hides, their flesh, and their dung.'.
    reason: previous_rendering
lexical_decisions:
- source_word: פַּר הַחַטָּאת
  chosen: the bull for the sin offering
  alternatives:
  - the sin-offering bull
  - the bull of the sin offering
  lexicon: HALOT
  rationale: Construct-like relationship expressed naturally in English as 'bull for the sin offering.' This preserves the sacrificial function without awkward literalism.
- source_word: שְׂעִיר הַחַטָּאת
  chosen: the goat for the sin offering
  alternatives:
  - the sin-offering goat
  - the goat of the sin offering
  lexicon: HALOT
  rationale: Parallel to the preceding phrase; 'goat for the sin offering' is clear modern English and preserves the ritual category.
- source_word: הוּבָא אֶת־דָּמָם
  chosen: whose blood was brought in
  alternatives:
  - whose blood was brought
  - whose blood was taken in
  lexicon: HALOT
  rationale: Passive of בוא with 'blood' as object indicates the blood was brought into the sacred space. 'Brought in' is idiomatic and reflects the directional sense.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: Standard rendering of כפר in sacrificial contexts. 'Make atonement' is both accurate and widely understandable; 'purge' is too narrow here.
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy sanctuary
  lexicon: HALOT
  rationale: In this cultic context, הַקֹּדֶשׁ refers to the sacred precinct rather than abstract holiness. 'Sanctuary' communicates the location clearly in modern English.
- source_word: יוֹצִיא
  chosen: he shall bring out
  alternatives:
  - he shall carry out
  - he shall take out
  lexicon: HALOT
  rationale: 'Hiphil of יצא here is causative: the carcasses are caused to go out from the camp area. ''Bring out'' is natural and suitably formal.'
- source_word: אֶל־מִחוּץ לַמַּחֲנֶה
  chosen: to outside the camp
  alternatives:
  - outside the camp
  - to a place outside the camp
  lexicon: HALOT
  rationale: The Hebrew has both the preposition אֶל and the expression 'outside the camp.' A more idiomatic English rendering would simply be 'outside the camp,' but 'to outside the camp' preserves the directional force more explicitly, though somewhat stiffly.
- source_word: וְשָׂרְפוּ בָאֵשׁ
  chosen: and they shall burn in the fire
  alternatives:
  - and they shall burn with fire
  - and they shall burn them with fire
  lexicon: HALOT
  rationale: Plural verb likely has an indefinite/impersonal subject ('they'). 'Burn in the fire' is a close rendering of the Hebrew phrase, though English could also use 'with fire.'
- source_word: עֹרֹתָם
  chosen: their hides
  alternatives:
  - their skins
  lexicon: HALOT
  rationale: For animal carcasses in sacrificial context, 'hides' is more precise than 'skins' and fits the ritual register.
- source_word: בְּשָׂרָם
  chosen: their flesh
  alternatives:
  - their meat
  - their body
  lexicon: HALOT
  rationale: '''Flesh'' is the standard and contextually appropriate rendering for sacrificial animal tissue.'
- source_word: פִּרְשָׁם
  chosen: their dung
  alternatives:
  - their refuse
  - their entrails
  lexicon: HALOT
  rationale: The term refers specifically to excrement/offal contents, not merely entrails. 'Dung' is blunt but accurate and matches the ritual disposal context.
