  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Collective ethnic phrase בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The project prefers gender-accurate renderings matching the source where the masculine form is present. Here the phrase is a standard covenantal ethnonym; retaining 'sons of Israel' preserves the Hebrew form, while a more idiomatic inclusive equivalent is footnoted.
