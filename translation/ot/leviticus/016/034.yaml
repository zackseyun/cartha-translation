id: LEV.16.34
reference: Leviticus 16:34
source:
  edition: WLC
  text: וְ/הָֽיְתָה זֹּ֨את לָ/כֶ֜ם לְ/חֻקַּ֣ת עוֹלָ֗ם לְ/כַפֵּ֞ר עַל בְּנֵ֤י יִשְׂרָאֵל֙ מִ/כָּל חַטֹּאתָ֔/ם אַחַ֖ת בַּ/שָּׁנָ֑ה וַ/יַּ֕עַשׂ כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־׃פ
translation:
  text: This shall be for you a permanent statute, to make atonement for the sons of Israel for all their sins once a year. And he did as Yahweh commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for the Israelites” or “for the people of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “from all their sins,” highlighting the cleansing nuance of the Hebrew expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה זֹּאת
  chosen: This shall be
  alternatives:
  - And this shall be
  - This will be
  lexicon: HALOT
  rationale: Introduces the ordinance in straightforward future-style legal language. Retaining 'This shall be' preserves the formal legislative tone without sounding archaic beyond normal Bible English.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition with pronoun marks the statute as applying to Israel; 'for you' is idiomatic and clear in English legal/instructional style.
- source_word: לְחֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a statute forever
  - an everlasting statute
  lexicon: HALOT
  rationale: חֻקָּה is a fixed statute or ordinance. עוֹלָם in legal contexts often denotes enduring/perpetual duration within the covenantal frame. 'Permanent statute' is readable modern English and preserves the force without unnecessary archaism.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: כפר in priestly sacrificial context is conventionally and accurately rendered 'make atonement.' This preserves the cultic-theological sense central to Leviticus 16.
- source_word: עַל בְּנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: The phrase is literally 'for/on behalf of the sons of Israel.' Because the source is explicitly masculine plural in a collective ethnonym, 'sons of Israel' best reflects the Hebrew form and the project's gender-accurate principle. A more idiomatic alternative is preserved in a footnote.
- source_word: מִכָּל חַטֹּאתָם
  chosen: because of all their sins
  alternatives:
  - from all their sins
  - for all their sins
  lexicon: HALOT
  rationale: The preposition מִן with כפר can indicate the sins from which cleansing/atonement is made. In English, 'because of all their sins' communicates the causal basis for atonement naturally, while avoiding an overly wooden rendering. 'From all their sins' remains a viable lexical alternative and is preserved in a footnote because it highlights the cleansing nuance.
- source_word: אַחַת בַּשָּׁנָה
  chosen: once in the year
  alternatives:
  - once a year
  - one time in the year
  lexicon: HALOT
  rationale: This idiom denotes annual repetition. 'Once in the year' stays close to the Hebrew while remaining natural English.
- source_word: וַיַּעַשׂ
  chosen: And he did
  alternatives:
  - And he made
  - And it was done
  lexicon: HALOT
  rationale: The singular verb most naturally refers back to Aaron in context, though Moses is the explicit object of the following clause. The Hebrew leaves the subject implicit; 'he did' preserves that ambiguity better than specifying a name not present in the verse.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: as the LORD commanded Moses
  alternatives:
  - just as the LORD had commanded Moses
  lexicon: HALOT
  rationale: Follows standard Hebrew narrative idiom. Per doctrine, יְהוָה is rendered 'the LORD.' The clause states conformity to divine command given to Moses without adding interpretive detail.
