id: LEV.16.21
reference: Leviticus 16:21
source:
  edition: WLC
  text: וְ/סָמַ֨ךְ אַהֲרֹ֜ן אֶת שְׁתֵּ֣י יד/ו עַ֨ל רֹ֣אשׁ הַ/שָּׂעִיר֮ הַ/חַי֒ וְ/הִתְוַדָּ֣ה
    עָלָ֗י/ו אֶת כָּל עֲוֺנֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אֶת כָּל פִּשְׁעֵי/הֶ֖ם לְ/כָל
    חַטֹּאתָ֑/ם וְ/נָתַ֤ן אֹתָ/ם֙ עַל רֹ֣אשׁ הַ/שָּׂעִ֔יר וְ/שִׁלַּ֛ח בְּ/יַד אִ֥ישׁ
    עִתִּ֖י הַ/מִּדְבָּֽרָ/ה־־־־־־־־׃
translation:
  text: And Aaron shall lay both his hands on the head of the live goat, and confess
    over it all the iniquities of the sons of Israel, and all their transgressions,
    for all their sins, and put them on the head of the goat, and send it away into
    the wilderness by the hand of a man appointed for the task.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew reads literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the hand of a man ready/designated for it.' The Hebrew expression
      for this man's role is difficult and may emphasize readiness, appointment, or
      suitability for the occasion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: סמך in sacrificial contexts commonly denotes the ritual act of laying/pressing
    hands upon an offering. 'Lay' is standard, clear English and preserves the cultic
    action without over-specifying pressure.
- source_word: שְׁתֵּי יָדוֹ
  chosen: both his hands
  alternatives:
  - his two hands
  lexicon: HALOT
  rationale: The dual-number expression is naturally rendered 'both his hands' in
    modern English.
- source_word: הַשָּׂעִיר הַחַי
  chosen: the live goat
  alternatives:
  - the living goat
  lexicon: HALOT
  rationale: This identifies the goat that remains alive in the Day of Atonement ritual.
    'Live goat' is idiomatic and concise.
- source_word: וְהִתְוַדָּה עָלָיו
  chosen: confess over it
  alternatives:
  - confess over him
  - confess upon it
  lexicon: HALOT
  rationale: The verb means 'confess,' and עַל with the pronoun indicates confession
    made over the animal in the ritual act. 'It' is used for the animal in contemporary
    English, though 'him' would be possible.
- source_word: עֲוֺנֹת
  chosen: iniquities
  alternatives:
  - guilt
  - wrongdoings
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of crookedness/guilt/iniquity. 'Iniquities'
    preserves the moral and cultic weight and distinguishes it from the other sin
    terms in the verse.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the formally masculine filial expression
    is preserved. It refers corporately to Israel, but the source wording is literally
    'sons of Israel.'
- source_word: פִּשְׁעֵיהֶם
  chosen: their transgressions
  alternatives:
  - their rebellions
  lexicon: HALOT
  rationale: פֶּשַׁע denotes breach/rebellion/transgression. 'Transgressions' is the
    most broadly intelligible and fits the triad with 'iniquities' and 'sins.'
- source_word: לְכָל חַטֹּאתָם
  chosen: for all their sins
  alternatives:
  - even all their sins
  - according to all their sins
  lexicon: HALOT
  rationale: The ל here links the preceding categories comprehensively to the totality
    of Israel's sins. 'For all their sins' is a natural rendering that preserves the
    summative force without awkward literalism.
- source_word: וְנָתַן אֹתָם
  chosen: put them
  alternatives:
  - place them
  - set them
  lexicon: HALOT
  rationale: Refers to ritually placing the confessed sins on the goat's head. 'Put'
    is natural modern English and adequately concrete.
- source_word: וְשִׁלַּח
  chosen: send it away
  alternatives:
  - send it off
  - release it
  lexicon: HALOT
  rationale: The verb means to send away. 'Send it away' preserves the expulsion motif
    central to the ritual better than the softer 'release.'
- source_word: בְּיַד אִישׁ עִתִּי
  chosen: by the hand of a man appointed for the task
  alternatives:
  - by the hand of a ready man
  - by the hand of a timely man
  - in the charge of a designated man
  lexicon: HALOT
  rationale: The idiom בְּיַד means agency/instrumentality, 'by the hand of.' עִתִּי
    is difficult; in context it denotes a man designated/ready for this occasion.
    'Appointed for the task' communicates the functional sense in clear English while
    retaining the agency idiom.
- source_word: הַמִּדְבָּרָה
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - into the desert
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the wilderness. 'Wilderness'
    better matches biblical usage than 'desert' and avoids over-narrowing the terrain.
