theological_decisions:
- issue: Rendering the threefold sin terminology distinctly
  chosen_reading: iniquities / transgressions / sins
  alternative_readings:
  - sins / transgressions / offenses
  - guilt / rebellions / sins
  rationale: The Hebrew intentionally piles up near-synonyms (עֲוֺנֹת, פִּשְׁעִים,
    חַטֹּאות) to stress the totality of Israel's guilt. Distinct English renderings
    preserve that rhetorical and theological fullness rather than flattening all three
    into 'sins.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
- issue: Whether to preserve the literal filial expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The source text is grammatically masculine and formally filial. Following
    the gender-accurate principle, the translation keeps 'sons of Israel' rather than
    neutralizing it, while recognizing the phrase refers corporately to the covenant
    people.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
