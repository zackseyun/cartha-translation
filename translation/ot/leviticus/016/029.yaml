theological_decisions:
- issue: Meaning of the self-denial command in Day of Atonement legislation
  chosen_reading: Render broadly as 'you shall humble yourselves' rather than specifying
    fasting in the main text.
  alternative_readings:
  - you shall afflict yourselves
  - you shall fast
  rationale: The Hebrew idiom is broader than a single ritual act, though fasting
    is a common traditional implication. The translation preserves the text's semantic
    range and avoids importing a narrower doctrinal or ritual conclusion into the
    main text.
  doctrine_reference: Translation philosophy §1, §3, §6
