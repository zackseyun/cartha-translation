id: LEV.16.29
reference: Leviticus 16:29
source:
  edition: WLC
  text: וְ/הָיְתָ֥ה לָ/כֶ֖ם לְ/חֻקַּ֣ת עוֹלָ֑ם בַּ/חֹ֣דֶשׁ הַ֠/שְּׁבִיעִי בֶּֽ/עָשׂ֨וֹר
    לַ/חֹ֜דֶשׁ תְּעַנּ֣וּ אֶת נַפְשֹֽׁתֵי/כֶ֗ם וְ/כָל מְלָאכָה֙ לֹ֣א תַעֲשׂ֔וּ הָֽ/אֶזְרָ֔ח
    וְ/הַ/גֵּ֖ר הַ/גָּ֥ר בְּ/תוֹכְ/כֶֽם־־׃
translation:
  text: 'And this shall be for you a permanent statute: in the seventh month, on the
    tenth day of the month, you shall humble yourselves, and you shall do no work,
    whether the native-born or the sojourner who sojourns among you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you shall afflict yourselves.' The expression is traditionally
      understood to include fasting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And this shall be
  alternatives:
  - And it shall be
  - And it shall become
  lexicon: HALOT
  rationale: The verb היה in this legal formula introduces an enduring ordinance.
    Supplying 'this' makes the English idiomatic and points back to the preceding
    legislation without adding new content.
- source_word: לְחֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a statute forever
  - an everlasting statute
  lexicon: HALOT
  rationale: חֻקָּה is a prescribed statute or ordinance. עוֹלָם in legal contexts
    often denotes enduring/perpetual duration within the covenantal framework. 'Permanent
    statute' is readable modern English while preserving the force of ongoing obligation.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  alternatives:
  - in the seventh new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily means 'month' in calendrical dating. 'Seventh month'
    is the natural English rendering.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: The idiom literally means 'on the tenth of the month'; expanding to 'tenth
    day of the month' is standard, clear English.
- source_word: תְּעַנּוּ אֶת־נַפְשֹׁתֵיכֶם
  chosen: you shall humble yourselves
  alternatives:
  - you shall afflict yourselves
  - you shall deny yourselves
  lexicon: HALOT
  rationale: The piel of ענה with נֶפֶשׁ in Day of Atonement legislation refers to
    self-denial/humbling, traditionally associated with fasting. 'Humble yourselves'
    preserves the broader semantic force without narrowing it only to fasting; the
    more literal 'afflict yourselves' is preserved in a footnote.
- source_word: וְכָל־מְלָאכָה לֹא תַעֲשׂוּ
  chosen: and you shall do no work
  alternatives:
  - and you shall not do any work
  - and no occupation shall you perform
  lexicon: HALOT
  rationale: מְלָאכָה is ordinary work/labor. 'Do no work' is idiomatic and sufficiently
    formal.
- source_word: הָאֶזְרָח
  chosen: the native-born
  alternatives:
  - the native
  - the citizen
  lexicon: HALOT
  rationale: אֶזְרָח denotes an indigenous/native member of the community. 'Native-born'
    best captures the contrast with the resident foreigner.
- source_word: הַגֵּר הַגָּר בְּתוֹכְכֶם
  chosen: the sojourner who sojourns among you
  alternatives:
  - the resident foreigner who resides among you
  - the alien who lives among you
  lexicon: HALOT
  rationale: גֵּר refers to a resident outsider living within Israelite society. 'Sojourner'
    preserves the covenantal/legal nuance and avoids the modern political connotations
    of 'alien.' Repeating the cognate verb reflects the Hebrew emphasis.
