id: LEV.16.20
reference: Leviticus 16:20
source:
  edition: WLC
  text: וְ/כִלָּה֙ מִ/כַּפֵּ֣ר אֶת הַ/קֹּ֔דֶשׁ וְ/אֶת אֹ֥הֶל מוֹעֵ֖ד וְ/אֶת הַ/מִּזְבֵּ֑חַ
    וְ/הִקְרִ֖יב אֶת הַ/שָּׂעִ֥יר הֶ/חָֽי־־־־׃
translation:
  text: When he has finished making atonement for the sanctuary, the tent of meeting,
    and the altar, he shall present the live goat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy place.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bring near'; that is, present for the next ritual action.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'making atonement' may also be understood in this context as
      carrying out ritual cleansing or purgation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלָּה
  chosen: When he has finished
  alternatives:
  - And he shall finish
  - And when he finishes
  lexicon: HALOT
  rationale: The verb כלה in the piel/qal context conveys bringing an action to completion.
    Given the following infinitive phrase, an English temporal clause ('When he has
    finished') best captures the sequence naturally.
- source_word: מִכַּפֵּר
  chosen: making atonement
  alternatives:
  - atoning
  - purging
  lexicon: HALOT
  rationale: כפר in Leviticus is a key cultic term. 'Making atonement' is the standard,
    transparent rendering that preserves the sacrificial-theological sense without
    over-specifying mechanism. 'Purging' reflects some contextual interpretations
    in Leviticus but is too narrow for the main text here.
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy sanctuary
  lexicon: HALOT
  rationale: In this Day of Atonement context, הַקֹּדֶשׁ refers to the holy sanctuary
    area rather than abstract holiness. 'The sanctuary' is clear modern English and
    fits the sequence with the tent of meeting and altar.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the conventional and accurate rendering of the Hebrew phrase.
    'Tabernacle' is possible contextually but is less directly lexical than 'tent
    of meeting.'
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward cultic term; 'altar' is the natural equivalent.
- source_word: וְהִקְרִיב
  chosen: he shall present
  alternatives:
  - he shall bring near
  - he shall bring forward
  lexicon: HALOT
  rationale: הקריב literally means 'bring near,' often in sacrificial presentation
    contexts. 'Present' communicates the ritual action idiomatically in English without
    losing the formal sense.
- source_word: הַשָּׂעִיר הֶחָי
  chosen: the live goat
  alternatives:
  - the living goat
  - the goat that is alive
  lexicon: HALOT
  rationale: The adjective חי distinguishes this goat from the one already slaughtered.
    'The live goat' is concise and idiomatic, preserving the contrast.
