theological_decisions:
- issue: Rendering of כפר in a sacrificial context
  chosen_reading: making atonement
  alternative_readings:
  - purging
  - ransom-making
  rationale: Leviticus uses כפר with a range of ritual effects, including cleansing/purging,
    but the broader cultic sense in English Bible tradition and reader comprehension
    is best preserved by 'making atonement.' This avoids importing a narrower theory
    of atonement while retaining the text's sacrificial gravity.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Identification of הַקֹּדֶשׁ
  chosen_reading: the sanctuary
  alternative_readings:
  - the holy place
  rationale: The term can be rendered more formally as 'the holy place,' but 'the
    sanctuary' better communicates the referent in contemporary English while preserving
    the sacred-space meaning. No doctrinal issue is resolved beyond lexical clarity.
  doctrine_reference: Translation philosophy §§1, 6
