id: LEV.16.30
reference: Leviticus 16:30
source:
  edition: WLC
  text: כִּֽי בַ/יּ֥וֹם הַ/זֶּ֛ה יְכַפֵּ֥ר עֲלֵי/כֶ֖ם לְ/טַהֵ֣ר אֶתְ/כֶ֑ם מִ/כֹּל֙
    חַטֹּ֣אתֵי/כֶ֔ם לִ/פְנֵ֥י יְהוָ֖ה תִּטְהָֽרוּ־׃
translation:
  text: For on this day atonement will be made for you, to cleanse you; from all your
    sins, before the LORD, you shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will make atonement for you.' The Hebrew verb is singular and does
      not state the subject explicitly in this clause.
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding command about
    afflicting oneself on the Day of Atonement. 'For' fits the explanatory force in
    context and reads naturally in English.
- source_word: בַיּוֹם הַזֶּה
  chosen: on this day
  alternatives:
  - on that day
  - today
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'This day' preserves the immediacy
    of the Hebrew demonstrative in the ritual context.
- source_word: יְכַפֵּר
  chosen: atonement will be made
  alternatives:
  - he will make atonement
  - it will make atonement
  lexicon: HALOT
  rationale: The piel of כפר here is the standard cultic term for making atonement.
    English often requires an impersonal passive to avoid supplying an explicit subject
    not stated in this clause. 'Atonement will be made' preserves the ritual sense
    without over-specifying the agent.
- source_word: עֲלֵיכֶם
  chosen: for you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With כפר, על commonly marks the persons for whom atonement is made. 'For
    you' is idiomatic and conveys beneficiary force better than a wooden 'upon you.'
- source_word: לְטַהֵר אֶתְכֶם
  chosen: to cleanse you
  alternatives:
  - to purify you
  - to make you clean
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result of the atonement. 'Cleanse' captures
    ritual purification in accessible English while retaining theological weight.
    'Purify' is possible but slightly less natural here.
- source_word: מִכֹּל חַטֹּאתֵיכֶם
  chosen: from all your sins
  alternatives:
  - from all your sin offerings
  - from all your offenses
  lexicon: HALOT
  rationale: חטאת can mean 'sin' or 'sin offering' depending on context. Here, with
    the cleansing of the people, the sense is their sins, not sacrificial offerings.
    'From all your sins' best fits the purification formula.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי denotes being before or in the presence of. 'Before the LORD'
    is concise and traditional without being archaic. Per doctrine, יְהוָה is rendered
    'the LORD,' with 'Yahweh' preserved as an alternative only in documentation, not
    main text.
- source_word: תִּטְהָרוּ
  chosen: you shall be clean
  alternatives:
  - you shall be cleansed
  - you will be clean
  - you shall be purified
  lexicon: HALOT
  rationale: 'The qal imperfect here states the resulting state after atonement and
    cleansing. Rendering it ''you shall be clean'' preserves the distinction from
    the earlier piel infinitive ''to cleanse you'': the first is the act of cleansing,
    the second the resulting condition of cleanness.'
