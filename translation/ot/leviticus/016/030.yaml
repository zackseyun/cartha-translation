theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern. This is not
    a place to vary from that default.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term כפר
  chosen_reading: atonement will be made
  alternative_readings:
  - he will make atonement
  rationale: The verse speaks in sacrificial-cultic categories without explicating
    later theological models of atonement. The translation preserves the ritual term
    'atonement' and does not import a narrower doctrinal explanation such as expiation
    or propitiation into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s
    plain sense without importing doctrinal claims'
