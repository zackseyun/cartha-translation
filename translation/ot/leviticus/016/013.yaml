  chosen_reading: atonement cover
  alternative_readings:
  - mercy seat
  rationale: The Hebrew term is tied to כפר and denotes the cover associated with atonement rites. 'Atonement cover' preserves lexical transparency and avoids importing later ecclesiastical jargon. Because 'mercy seat' is historically familiar and theologically significant in English tradition, it is preserved in a footnote rather than used in the main text.
  doctrine_reference: Translation philosophy §1, §6
