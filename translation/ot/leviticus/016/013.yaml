id: LEV.16.13
reference: Leviticus 16:13
source:
  edition: WLC
  text: וְ/נָתַ֧ן אֶֽת הַ/קְּטֹ֛רֶת עַל הָ/אֵ֖שׁ לִ/פְנֵ֣י יְהוָ֑ה וְ/כִסָּ֣ה עֲנַ֣ן הַ/קְּטֹ֗רֶת אֶת הַ/כַּפֹּ֛רֶת אֲשֶׁ֥ר עַל הָ/עֵד֖וּת וְ/לֹ֥א יָמֽוּת־־׀־־׃
translation:
  text: And he shall put the incense on the fire before Yahweh, so that the cloud of the incense may cover the mercy seat that is over the testimony, so that he may not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercy seat.' The Hebrew term refers to the cover of the ark, especially in its role in atonement rites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: he shall put
  alternatives:
  - he must place
  - he is to put
  lexicon: HALOT
  rationale: Though morphologically a qatal form with prefixed conjunction, in this procedural legal context it carries instructional/future force. 'He shall put' fits English ritual legislation and preserves the directive sense without over-paraphrase.
- source_word: הַקְּטֹרֶת
  chosen: the incense
  alternatives:
  - the incense mixture
  lexicon: HALOT
  rationale: The noun refers to the incense used in the sanctuary rite. 'Incense' is the natural English equivalent; 'mixture' is possible contextually but too interpretive for the main text.
- source_word: עַל הָאֵשׁ
  chosen: on the fire
  alternatives:
  - upon the fire
  - over the fire
  lexicon: HALOT
  rationale: The phrase describes placing incense onto the live fire/coals. 'On the fire' is idiomatic and sufficiently literal.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The prepositional phrase denotes cultic proximity in YHWH's presence. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before the LORD' is the standard and accurate cultic expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְכִסָּה
  chosen: so that ... may cover
  alternatives:
  - and ... will cover
  - and ... covers
  lexicon: HALOT
  rationale: Syntactically the clause expresses the intended result of placing the incense on the fire. Rendering with 'so that ... may cover' makes the purpose/result relation clear in English while preserving the Hebrew sequence.
- source_word: עֲנַן הַקְּטֹרֶת
  chosen: the cloud of the incense
  alternatives:
  - the cloud from the incense
  - the incense cloud
  lexicon: HALOT
  rationale: The construct phrase is most directly represented by 'the cloud of the incense.' This preserves the imagery and avoids over-interpreting the exact relation.
- source_word: הַכַּפֹּרֶת
  chosen: the atonement cover
  alternatives:
  - the mercy seat
  lexicon: HALOT
  rationale: The Hebrew term denotes the cover of the ark associated with atonement. 'Atonement cover' is more transparent to modern readers and closer to the Hebrew sense than the traditional but opaque 'mercy seat.' The traditional rendering is preserved in a footnote as a lexical alternative.
- source_word: אֲשֶׁר עַל הָעֵדוּת
  chosen: that is over the testimony
  alternatives:
  - which is over the testimony tablets
  - that is over the covenant document
  lexicon: HALOT
  rationale: '''The testimony'' is a standard rendering for עֵדוּת in tabernacle contexts, referring to the covenant witness housed in the ark. More explicit expansions are interpretive and unnecessary in the main text.'
- source_word: וְלֹא יָמוּת
  chosen: so that he may not die
  alternatives:
  - and he will not die
  - lest he die
  lexicon: HALOT
  rationale: The clause gives the purpose or consequence of the incense cloud covering the atonement cover. 'So that he may not die' communicates the protective function clearly in modern English; 'lest he die' is accurate but more archaic.
