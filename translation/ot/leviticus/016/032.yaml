theological_decisions:
- issue: Whether to render הַכֹּהֵן as 'the priest' or interpretively as 'the high
    priest'
  chosen_reading: the priest
  alternative_readings:
  - the high priest
  rationale: The office in context is indeed the high priestly successor, but the
    Hebrew text itself uses 'the priest' and then defines him by anointing, ordination,
    and succession. Following optimal equivalence and original-language primacy, the
    translation preserves the source expression rather than importing the title.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to render the ordination idiom 'fill his hand'
  chosen_reading: ordained
  alternative_readings:
  - installed
  - consecrated
  - whose hand is filled
  rationale: A literal rendering would be opaque to modern readers. 'Ordained' communicates
    the institutional sense while a footnote preserves the underlying Hebrew idiom
    for auditability.
  doctrine_reference: Translation philosophy §6
