id: LEV.16.32
reference: Leviticus 16:32
source:
  edition: WLC
  text: וְ/כִפֶּ֨ר הַ/כֹּהֵ֜ן אֲשֶׁר יִמְשַׁ֣ח אֹת֗/וֹ וַ/אֲשֶׁ֤ר יְמַלֵּא֙ אֶת יָד֔/וֹ
    לְ/כַהֵ֖ן תַּ֣חַת אָבִ֑י/ו וְ/לָבַ֛שׁ אֶת בִּגְדֵ֥י הַ/בָּ֖ד בִּגְדֵ֥י הַ/קֹּֽדֶשׁ־־־׃
translation:
  text: And the priest who is anointed and ordained to serve as priest in place of
    his father shall make atonement, and he shall put on the linen garments, the holy
    garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'whose hand is filled,' an idiom for being ordained or
      installed into priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall atone
  - shall perform the atonement rite
  lexicon: HALOT
  rationale: כפר in priestly ritual contexts denotes effecting atonement/purification
    through the prescribed rite. 'Make atonement' is standard, clear English that
    preserves the cultic sense without over-specifying mechanism.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the high priest
  lexicon: HALOT
  rationale: The noun itself is simply 'the priest.' Although the context is specifically
    the high priest's role on the Day of Atonement, the Hebrew identifies him descriptively
    by anointing and ordination rather than by the title 'high priest,' so the translation
    keeps the source wording.
- source_word: אֲשֶׁר יִמְשַׁח אֹתוֹ
  chosen: who is anointed
  alternatives:
  - whom he anoints
  - who will be anointed
  lexicon: HALOT
  rationale: The relative clause identifies the priest by his consecration. English
    idiom prefers a passive rendering here. The Hebrew imperfect can be rendered generically/future-relative,
    but in context it describes the duly anointed successor.
- source_word: וַאֲשֶׁר יְמַלֵּא אֶת יָדוֹ
  chosen: and ordained
  alternatives:
  - and whose hand is filled
  - and installed
  - and consecrated
  lexicon: HALOT
  rationale: The idiom 'fill the hand' refers to ordination/installation into priestly
    office. 'Ordained' communicates the idiomatic sense in natural English. A more
    literal alternative is preserved in a footnote because the Hebrew idiom is significant.
- source_word: לְכַהֵן
  chosen: to serve as priest
  alternatives:
  - to minister as priest
  - to act as priest
  lexicon: HALOT
  rationale: The infinitive expresses priestly service/function. 'Serve as priest'
    is natural modern English and preserves the official role.
- source_word: תַּחַת אָבִיו
  chosen: in place of his father
  alternatives:
  - instead of his father
  - after his father
  lexicon: HALOT
  rationale: תחת here marks succession/substitution in office. 'In place of his father'
    best captures hereditary succession to the priestly role.
- source_word: וְלָבַשׁ
  chosen: and he shall put on
  alternatives:
  - and he shall wear
  - and he shall be clothed with
  lexicon: HALOT
  rationale: The verb denotes clothing oneself. 'Put on' fits the ritual action and
    keeps the sequence of duties clear.
- source_word: בִּגְדֵי הַבָּד
  chosen: the linen garments
  alternatives:
  - the garments of linen
  - the linen vestments
  lexicon: HALOT
  rationale: בד denotes linen in priestly clothing contexts. 'Linen garments' is clear
    and idiomatic.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  lexicon: HALOT
  rationale: The appositional repetition further identifies the linen garments as
    those set apart for sacred use. 'Holy garments' preserves the lexical link to
    קדשׁ.
