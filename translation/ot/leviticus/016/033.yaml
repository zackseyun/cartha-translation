theological_decisions:
- issue: Scope of atonement language applied to both sacred objects and persons
  chosen_reading: Use the same English expression 'make atonement for' across sanctuary,
    tent, altar, priests, and people.
  alternative_readings:
  - Vary with 'purify' for sacred spaces and 'make atonement for' persons
  rationale: The Hebrew intentionally repeats כפר across all objects. Preserving that
    repetition reflects the ritual unity of the verse and avoids over-interpreting
    by splitting the action into different English verbs, even though purification
    is one aspect of the rite.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
