id: LEV.16.33
reference: Leviticus 16:33
source:
  edition: WLC
  text: וְ/כִפֶּר֙ אֶת מִקְדַּ֣שׁ הַ/קֹּ֔דֶשׁ וְ/אֶת אֹ֧הֶל מוֹעֵ֛ד וְ/אֶת הַ/מִּזְבֵּ֖חַ
    יְכַפֵּ֑ר וְ/עַ֧ל הַ/כֹּהֲנִ֛ים וְ/עַל כָּל עַ֥ם הַ/קָּהָ֖ל יְכַפֵּֽר־־־־־׃
translation:
  text: Thus he shall make atonement for the Holy Sanctuary, and for the Tent of Meeting,
    and for the altar; and he shall make atonement for the priests and for all the
    people of the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make expiation for'; in this cultic context the Hebrew verb כפר can
      emphasize the removal of impurity as well as atonement.
    reason: lexical_alternative
  - marker: b
    text: '''People of the assembly'' may also be rendered ''people of the congregation.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר / יְכַפֵּר / יְכַפֵּר
  chosen: make atonement
  alternatives:
  - purge
  - effect atonement
  - make expiation
  lexicon: HALOT
  rationale: The repeated verb כפר in Leviticus has a technical cultic sense. 'Make
    atonement' is the most established and accurate English rendering in this sacrificial
    context, preserving the ritual-theological force without importing a narrower
    theory of atonement. Alternatives like 'purge' capture part of the effect in some
    contexts but are too narrow here because the objects include both sancta and persons.
- source_word: מִקְדַּשׁ הַקֹּדֶשׁ
  chosen: the Holy Sanctuary
  alternatives:
  - the sanctuary of holiness
  - the holy place
  - the most holy sanctuary
  lexicon: HALOT
  rationale: The phrase literally combines 'sanctuary' with 'the holiness/holy [thing/place].'
    In this context it refers to the sacred sanctuary space requiring purification
    on the Day of Atonement. 'Holy Sanctuary' preserves the elevated cultic sense
    without over-specifying 'Most Holy Place,' which the Hebrew here does not explicitly
    require.
- source_word: אֹהֶל מוֹעֵד
  chosen: the Tent of Meeting
  alternatives:
  - the tabernacle of meeting
  - the meeting tent
  lexicon: HALOT
  rationale: '''Tent of Meeting'' is the standard and transparent rendering of the
    tabernacle designation, preserving the Hebrew imagery and function.'
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward cultic term; 'altar' is the natural and consistent rendering.
- source_word: עַל
  chosen: for
  alternatives:
  - upon
  - concerning
  lexicon: HALOT
  rationale: With כפר, the preposition עַל is idiomatically rendered 'for' in English
    ('make atonement for'). This communicates the relationship naturally in modern
    English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the plural noun; no contextual reason to vary.
- source_word: כָּל עַם הַקָּהָל
  chosen: all the people of the assembly
  alternatives:
  - all the assembly's people
  - all the people of the congregation
  - all the people assembled
  lexicon: HALOT
  rationale: 'The Hebrew is more explicit than simply ''all the people'': it identifies
    them as the people belonging to the assembled community. ''Assembly'' is more
    transparent in modern English than ''congregation'' while preserving the corporate
    covenantal sense.'
