id: LEV.16.2
reference: Leviticus 16:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה דַּבֵּר֮ אֶל אַהֲרֹ֣ן אָחִי/ךָ֒ וְ/אַל יָבֹ֤א
    בְ/כָל עֵת֙ אֶל הַ/קֹּ֔דֶשׁ מִ/בֵּ֖ית לַ/פָּרֹ֑כֶת אֶל פְּנֵ֨י הַ/כַּפֹּ֜רֶת אֲשֶׁ֤ר
    עַל הָ/אָרֹן֙ וְ/לֹ֣א יָמ֔וּת כִּ֚י בֶּֽ/עָנָ֔ן אֵרָאֶ֖ה עַל הַ/כַּפֹּֽרֶת־־־־־־־־׃
translation:
  text: And the LORD said to Moses, “Tell Aaron your brother that he must not come
    at just any time into the Holy Place, inside the veil, before the atonement cover
    that is on the ark, so that he may not die. For I will appear in the cloud over
    the atonement cover.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercy seat,' the traditional rendering of 'atonement cover.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: דַּבֵּר
  chosen: Tell
  alternatives:
  - Speak to
  - Say to
  lexicon: HALOT
  rationale: Imperative of דבר here introduces Moses' communication to Aaron. 'Tell'
    is natural modern English and preserves the directive force without unnecessary
    stiffness.
- source_word: אַהֲרֹן אָחִיךָ
  chosen: Aaron your brother
  alternatives:
  - your brother Aaron
  lexicon: HALOT
  rationale: Both are possible in English; 'Aaron your brother' follows the Hebrew
    order more closely while remaining idiomatic.
- source_word: וְאַל יָבֹא
  chosen: he must not come
  alternatives:
  - let him not come
  - he is not to come
  lexicon: HALOT
  rationale: The negative jussive expresses prohibition. 'He must not come' communicates
    the force clearly in contemporary English.
- source_word: בְּכָל עֵת
  chosen: at just any time
  alternatives:
  - at all times
  - whenever he wants
  - at any time
  lexicon: HALOT
  rationale: The phrase does not mean 'continually' here but unrestricted access.
    'At just any time' captures the sense that entry is forbidden except at appointed
    times.
- source_word: הַקֹּדֶשׁ
  chosen: the Holy Place
  alternatives:
  - the sanctuary
  - the holy place
  lexicon: HALOT
  rationale: In this context the term refers to the sacred inner sanctuary area. 'Holy
    Place' is a familiar and sufficiently precise rendering in tabernacle context.
- source_word: מִבֵּית לַפָּרֹכֶת
  chosen: inside the veil
  alternatives:
  - within the veil
  - from inside the curtain
  - behind the veil
  lexicon: HALOT
  rationale: The phrase locates the destination as the space on the inner side of
    the veil. 'Inside the veil' is concise and clear; 'behind the veil' is possible
    but slightly more interpretive from the reader's spatial perspective.
- source_word: אֶל פְּנֵי הַכַּפֹּרֶת
  chosen: before the atonement cover
  alternatives:
  - before the mercy seat
  - to the front of the atonement cover
  lexicon: HALOT
  rationale: פני here means 'before/in front of.' For כפרת, 'atonement cover' conveys
    the function of the ark's cover in accessible English. 'Mercy seat' is traditional
    but less transparent to modern readers.
- source_word: הַכַּפֹּרֶת
  chosen: atonement cover
  alternatives:
  - mercy seat
  lexicon: HALOT
  rationale: This cultic term denotes the cover of the ark associated with atonement
    rites. 'Atonement cover' preserves the concrete object and its ritual significance
    better for modern readers, while the traditional 'mercy seat' is preserved in
    a footnote as a lexical alternative.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew here has simply 'the ark,' not the fuller title. The shorter
    rendering respects the source text.
- source_word: וְלֹא יָמוּת
  chosen: so that he may not die
  alternatives:
  - or he will die
  - lest he die
  lexicon: HALOT
  rationale: The clause gives the consequence to be avoided. 'So that he may not die'
    expresses the purpose/result relationship in clear modern English; 'lest he die'
    is accurate but archaic.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and suitably
    formal without being archaic in this context.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in a cloud
  - by means of the cloud
  lexicon: HALOT
  rationale: The prefixed article is present in Hebrew. 'In the cloud' best reflects
    the definite expression and the known manifestation of divine presence.
- source_word: אֵרָאֶה
  chosen: I will appear
  alternatives:
  - I appear
  - I am seen
  lexicon: HALOT
  rationale: Niphal of ראה here is best taken as divine self-manifestation in future
    or modal sense relative to the prohibition. 'I will appear' is the most natural
    English rendering.
- source_word: עַל הַכַּפֹּרֶת
  chosen: over the atonement cover
  alternatives:
  - above the atonement cover
  - upon the atonement cover
  lexicon: HALOT
  rationale: עַל here indicates position relative to the cover. 'Over' fits the imagery
    of the divine appearance in the cloud above the ark's cover.
