theological_decisions:
- issue: Rendering of כַּפֹּרֶת in tabernacle theology
  chosen_reading: atonement cover
  alternative_readings:
  - mercy seat
  rationale: The Hebrew term refers concretely to the ark's cover and is associated
    with atonement rites. Following the project's accessibility principle, 'atonement
    cover' communicates function without relying on traditional ecclesiastical terminology.
    The traditional 'mercy seat' is preserved in a footnote because it is historically
    significant and widely recognized.
  doctrine_reference: Translation philosophy §6; preserve theological weight without
    requiring jargon
- issue: Sense of בְּכָל עֵת
  chosen_reading: restriction against unrestricted entry rather than a statement about
    constant entry
  alternative_readings:
  - at all times
  rationale: In context, the warning concerns unauthorized access to the inner sanctuary
    except on prescribed occasions. Rendering it as 'at just any time' preserves that
    force and avoids the misleading sense that Aaron had been entering continuously.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
