id: LEV.16.1
reference: Leviticus 16:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר יְהוָה֙ אֶל מֹשֶׁ֔ה אַחֲרֵ֣י מ֔וֹת שְׁנֵ֖י בְּנֵ֣י אַהֲרֹ֑ן בְּ/קָרְבָתָ֥/ם לִ/פְנֵי יְהוָ֖ה וַ/יָּמֻֽתוּ־־׃
translation:
  text: And Yahweh spoke to Moses after the death of Aaron’s two sons, when they came near before Yahweh and died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they approached before the LORD.' The Hebrew expression can be rendered more formally as 'in their drawing near before the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: דבר in this narrative formula is most naturally rendered 'spoke,' preserving the standard divine-speech introduction without unnecessary expansion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַחֲרֵי מוֹת
  chosen: after the death
  alternatives:
  - after the dying
  - after the deaths
  lexicon: HALOT
  rationale: The construct phrase idiomatically means 'after the death of.' Singular 'death' fits the collective reference to the event in which both sons died.
- source_word: שְׁנֵי בְּנֵי אַהֲרֹן
  chosen: Aaron’s two sons
  alternatives:
  - the two sons of Aaron
  lexicon: HALOT
  rationale: This is a natural English rendering of the construct chain, preserving both the familial relation and the numeral.
- source_word: בְּקָרְבָתָם
  chosen: when they came near
  alternatives:
  - in their drawing near
  - when they approached
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive construct of קרב with 3mp suffix is temporal here: ''when/in their coming near.'' ''Came near'' preserves the verbal idea and echoes the cultic context without over-paraphrase.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard and transparent rendering of the prepositional phrase, suitable for both spatial and cultic presence.
- source_word: וַיָּמֻתוּ
  chosen: and died
  alternatives:
  - so they died
  lexicon: HALOT
  rationale: The wayyiqtol continues the narrative sequence. 'And died' is the most direct rendering and preserves the terse force of the Hebrew.
