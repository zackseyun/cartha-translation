theological_decisions:
- issue: Meaning of כפר in Day of Atonement context
  chosen_reading: Render with 'make atonement' rather than a narrower purification-only
    gloss
  alternative_readings:
  - purge
  - cleanse
  rationale: The verse concerns ritual action that addresses impurity and sin in relation
    to the sanctuary. 'Make atonement' best preserves the full cultic-theological
    force without collapsing it into only one aspect of the rite.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine and refers corporately to Israel.
    Following the gender-accurate principle, the translation preserves the source
    form rather than neutralizing it, while remaining understandable in context.
  doctrine_reference: Translation philosophy §4
