id: LEV.16.16
reference: Leviticus 16:16
source:
  edition: WLC
  text: וְ/כִפֶּ֣ר עַל הַ/קֹּ֗דֶשׁ מִ/טֻּמְאֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וּ/מִ/פִּשְׁעֵי/הֶ֖ם
    לְ/כָל חַטֹּאתָ֑/ם וְ/כֵ֤ן יַעֲשֶׂה֙ לְ/אֹ֣הֶל מוֹעֵ֔ד הַ/שֹּׁכֵ֣ן אִתָּ֔/ם בְּ/ת֖וֹךְ
    טֻמְאֹתָֽ/ם־־׃
translation:
  text: Thus he shall make atonement for the sanctuary because of the uncleannesses
    of the sons of Israel and because of their transgressions, for all their sins;
    and so he shall do for the tent of meeting that dwells with them in the midst
    of their uncleannesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy place.' Hebrew הַקֹּדֶשׁ can denote the sanctuary or holy place
      in this ritual context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: '''Make atonement'' may also be expressed as ''purge'' or ''cleanse'' in
      this Day of Atonement context, since the rite addresses both impurity and sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: he shall make atonement
  alternatives:
  - he shall purge
  - he shall cleanse
  lexicon: HALOT
  rationale: כפר in Levitical ritual contexts commonly denotes effecting atonement/purification
    by ritual action. 'Make atonement' is the most established and theologically transparent
    English rendering here, while alternatives like 'purge' or 'cleanse' capture aspects
    of the result but underrepresent the cultic-ritual term.
- source_word: עַל הַקֹּדֶשׁ
  chosen: for the sanctuary
  alternatives:
  - for the holy place
  - upon the holy place
  lexicon: HALOT
  rationale: הַקֹּדֶשׁ here refers to the sacred shrine area rather than abstract
    holiness. 'Sanctuary' is natural modern English and fits the cultic setting. 'Holy
    place' is possible but can sound narrower or overly technical in English.
- source_word: מִטֻּמְאֹת
  chosen: because of the uncleannesses
  alternatives:
  - from the impurities
  - because of the impurities
  lexicon: HALOT
  rationale: The preposition מִן with כפר here expresses the source/cause prompting
    the atoning action. 'Because of' communicates the sense clearly in English. The
    plural 'uncleannesses' preserves the Hebrew plural and the ritual-cultic category
    better than a flattened singular.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    where it refers to the covenant people corporately. 'The sons of Israel' is formally
    closer to the Hebrew than 'Israelites,' though the latter is idiomatic. Here the
    formal expression remains readable enough.
- source_word: וּמִפִּשְׁעֵיהֶם
  chosen: and because of their transgressions
  alternatives:
  - and from their rebellions
  - and because of their offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or transgression. 'Transgressions'
    is a clear, established rendering that preserves moral seriousness without overinterpreting
    every instance as overt rebellion.
- source_word: לְכָל חַטֹּאתָם
  chosen: for all their sins
  alternatives:
  - with respect to all their sins
  - for all their sin offerings
  lexicon: HALOT
  rationale: חטאות here most naturally means 'sins,' not 'sin offerings,' given the
    parallelism with uncleannesses and transgressions. לְכָל is rendered idiomatically
    as 'for all.'
- source_word: וְכֵן יַעֲשֶׂה
  chosen: and so he shall do
  alternatives:
  - thus he shall do likewise
  - and in the same way he shall do
  lexicon: HALOT
  rationale: This clause indicates corresponding ritual action for the next object.
    'And so he shall do' is concise and natural while preserving the procedural force.
- source_word: לְאֹהֶל מוֹעֵד
  chosen: for the tent of meeting
  alternatives:
  - for the meeting tent
  - for the tabernacle
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד is the standard designation 'tent of meeting.' 'Tabernacle'
    is traditional but less transparent and can import later English Bible convention
    rather than the Hebrew phrase itself.
- source_word: הַשֹּׁכֵן אִתָּם
  chosen: that dwells with them
  alternatives:
  - which remains with them
  - that resides among them
  lexicon: HALOT
  rationale: שׁכן means to dwell/reside. The participle modifies the tent of meeting
    in apposition as the sanctuary located among Israel. 'Dwells with them' preserves
    the relational and locative sense.
- source_word: בְּתוֹךְ טֻמְאֹתָם
  chosen: in the midst of their uncleannesses
  alternatives:
  - among their impurities
  - in the middle of their uncleanness
  lexicon: HALOT
  rationale: The phrase emphasizes the sanctuary's presence among a ritually impure
    people. 'In the midst of' preserves the spatial metaphor, and the plural 'uncleannesses'
    reflects the Hebrew plural and ritual register.
