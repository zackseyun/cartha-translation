id: LEV.16.17
reference: Leviticus 16:17
source:
  edition: WLC
  text: וְ/כָל אָדָ֞ם לֹא יִהְיֶ֣ה בְּ/אֹ֣הֶל מוֹעֵ֗ד בְּ/בֹא֛/וֹ לְ/כַפֵּ֥ר בַּ/קֹּ֖דֶשׁ
    עַד צֵאת֑/וֹ וְ/כִפֶּ֤ר בַּעֲד/וֹ֙ וּ/בְעַ֣ד בֵּית֔/וֹ וּ/בְעַ֖ד כָּל קְהַ֥ל יִשְׂרָאֵֽל־־׀־־׃
translation:
  text: And no man shall be in the tent of meeting when he enters to make atonement
    in the holy place, until he comes out. And he shall make atonement for himself,
    and for his household, and for all the assembly of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “no one shall be in the tent of meeting.” The Hebrew says “no man,”
      using a masculine singular form with generic force.
    reason: alternative_reading
lexical_decisions:
- source_word: כָל אָדָם
  chosen: no man
  alternatives:
  - no one
  - no person
  lexicon: HALOT
  rationale: אָדָם here is singular with generic force. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral when it matches the source intent.
    The phrase with negation naturally yields 'no man shall be.'
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary designation.
    'Tabernacle' is traditional but less transparent to the Hebrew components אֹהֶל
    + מוֹעֵד.
- source_word: בְּבֹאוֹ
  chosen: when he enters
  alternatives:
  - at his entering
  - when he goes in
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal sense here.
    'When he enters' is natural English while preserving the timing relation.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: כפר in priestly sacrificial context is best rendered 'make atonement.'
    This preserves the cultic and theological force without importing a narrower theory
    of atonement.
- source_word: בַּקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in the sanctuary
  - in the Holy Place
  lexicon: HALOT
  rationale: In Levitical cultic context, קֹדֶשׁ here refers to the sacred area into
    which the high priest enters for atonement rites. 'Holy place' is a clear and
    sufficiently literal rendering; capitalization was avoided because the Hebrew
    form itself does not require distinguishing a technical chamber name here.
- source_word: עַד צֵאתוֹ
  chosen: until he comes out
  alternatives:
  - until his coming out
  - until he goes out
  lexicon: HALOT
  rationale: The phrase marks the duration of exclusion from the tent of meeting.
    'Comes out' fits the deictic movement from the sanctuary in idiomatic English.
- source_word: וְכִפֶּר
  chosen: And he shall make atonement
  alternatives:
  - thus he shall make atonement
  - and he will make atonement
  lexicon: HALOT
  rationale: The perfect with vav in this legal-ritual sequence carries future/injunctive
    force. 'Shall' matches the prescriptive context.
- source_word: בַּעֲדוֹ
  chosen: for himself
  alternatives:
  - on behalf of himself
  lexicon: HALOT
  rationale: בעד in this context denotes benefit/on behalf of. 'For himself' is concise
    and idiomatic.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  - his family
  lexicon: HALOT
  rationale: In priestly and familial contexts, 'household' best captures the social
    unit intended, more precisely than the literal but potentially misleading 'house.'
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - all the congregation of Israel
  - the whole assembly of Israel
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is clear modern English
    and preserves the corporate sense better than the more ecclesiastically colored
    'congregation' in this context.
