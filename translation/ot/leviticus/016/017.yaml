theological_decisions:
- issue: Rendering of אָדָם in a generic prohibition
  chosen_reading: no man
  alternative_readings:
  - no one
  - no person
  rationale: The Hebrew uses masculine singular generic language. Following the doctrine's
    gender-accurate principle, the main text preserves that form rather than neutralizing
    it. Because English readers may understand the scope generically, an inclusive
    alternative is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
