theological_decisions:
- issue: Rendering of sacrificial כפר language
  chosen_reading: make atonement
  alternative_readings:
  - purge
  - effect atonement
  rationale: This preserves the established priestly sacrificial sense without importing
    a narrower theory of atonement. The verse states the ritual action and beneficiaries,
    not a later doctrinal mechanism.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it.
