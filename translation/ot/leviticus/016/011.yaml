id: LEV.16.11
reference: Leviticus 16:11
source:
  edition: WLC
  text: וְ/הִקְרִ֨יב אַהֲרֹ֜ן אֶת פַּ֤ר הַֽ/חַטָּאת֙ אֲשֶׁר ל֔/וֹ וְ/כִפֶּ֥ר בַּֽעֲד֖/וֹ
    וּ/בְעַ֣ד בֵּית֑/וֹ וְ/שָׁחַ֛ט אֶת פַּ֥ר הַֽ/חַטָּ֖את אֲשֶׁר לֽ/וֹ־־־־׃
translation:
  text: Aaron shall present the bull of the sin offering that is for himself, and
    he shall make atonement for himself and for his household; then he shall slaughter
    the bull of the sin offering that is for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bull for the sin offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for himself and for his house'; 'household' here means those of
      his house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near/present in sacrificial contexts.
    'Present' fits the ritual setting and avoids prematurely specifying the act as
    the full offering, since the verse proceeds to slaughter afterward.
- source_word: פַּר הַחַטָּאת
  chosen: the bull of the sin offering
  alternatives:
  - the bull for the sin offering
  - the sin-offering bull
  lexicon: HALOT
  rationale: Construct relationship indicates a bull associated with the sin offering.
    'Bull of the sin offering' is clear and fairly formal while preserving sacrificial
    terminology.
- source_word: אֲשֶׁר לוֹ
  chosen: that is for himself
  alternatives:
  - that belongs to him
  - that is his
  lexicon: HALOT
  rationale: In this ritual context the phrase marks the animal as designated for
    Aaron's own use/benefit, not merely his possession. 'For himself' best captures
    the function in context.
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall purge
  - shall effect atonement
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' Alternatives such as 'purge' capture part of the semantic
    range but are too narrow here.
- source_word: בַּעֲדוֹ וּבְעַד בֵּיתוֹ
  chosen: for himself and for his household
  alternatives:
  - on behalf of himself and on behalf of his house
  - for himself and for his house
  lexicon: HALOT
  rationale: בעד expresses benefit/on behalf of. 'Household' communicates the familial/domestic
    sense of ביתו in idiomatic modern English better than the more literal 'house'.
- source_word: וְשָׁחַט
  chosen: then he shall slaughter
  alternatives:
  - and he shall slaughter
  - and he shall kill
  lexicon: HALOT
  rationale: The verb is the standard sacrificial term 'slaughter.' Rendering the
    conjunction as 'then' clarifies the sequence in natural English without adding
    meaning beyond the narrative progression.
- source_word: פַּר הַחַטָּאת אֲשֶׁר לוֹ
  chosen: the bull of the sin offering that is for himself
  alternatives:
  - the sin-offering bull that is his
  - the bull for the sin offering that belongs to him
  lexicon: HALOT
  rationale: The repeated phrase is retained with near consistency to reflect the
    Hebrew repetition and ritual emphasis.
