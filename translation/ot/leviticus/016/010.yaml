theological_decisions:
- issue: Meaning of עֲזָאזֵל
  chosen_reading: Azazel (transliterated)
  alternative_readings:
  - the scapegoat
  - complete removal/destruction
  rationale: 'The term''s meaning is debated: it may denote a wilderness being/place, or function idiomatically for removal. Transliteration avoids prematurely resolving the debate in the main text while preserving the ritual distinction in the verse. Because ''scapegoat'' is a historically important interpretive rendering, it is preserved in a footnote.'
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve theological tension rather than resolve it)
- issue: Force of לְכַפֵּר עָלָיו
  chosen_reading: to make atonement over it
  alternative_readings:
  - to make atonement for it
  rationale: The Hebrew preposition עַל is retained with 'over' to avoid specifying more than the text states about whether the goat is the object benefited by atonement or the ritual instrument associated with it. This preserves the cultic ambiguity rather than resolving it.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
