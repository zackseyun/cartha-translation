id: LEV.16.10
reference: Leviticus 16:10
source:
  edition: WLC
  text: וְ/הַ/שָּׂעִ֗יר אֲשֶׁר֩ עָלָ֨ה עָלָ֤י/ו הַ/גּוֹרָל֙ לַ/עֲזָאזֵ֔ל יָֽעֳמַד חַ֛י לִ/פְנֵ֥י יְהוָ֖ה לְ/כַפֵּ֣ר עָלָ֑י/ו לְ/שַׁלַּ֥ח אֹת֛/וֹ לַ/עֲזָאזֵ֖ל הַ/מִּדְבָּֽרָ/ה־׃
translation:
  text: But the goat on which the lot for Azazel fell shall be presented alive before Yahweh, to make atonement over it, to send it away into the wilderness to Azazel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the scapegoat.' The Hebrew term 'Azazel' is debated; it may be a proper name or a term associated with removal.
    reason: alternative_reading
  - marker: b
    text: Or 'to make atonement for it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשָּׂעִיר
  chosen: But the goat
  alternatives:
  - And the goat
  - the male goat
  lexicon: HALOT
  rationale: שָׂעִיר denotes a goat, often specifically a male goat. In English, 'goat' is natural here and sufficient in the ritual context. The prefixed conjunction is rendered 'But' to mark the contrast with the other goat in the preceding context.
- source_word: אֲשֶׁר עָלָה עָלָיו הַגּוֹרָל
  chosen: on which the lot ... fell
  alternatives:
  - for which the lot came up
  - upon which the lot went up
  lexicon: HALOT
  rationale: The idiom עָלָה ... הַגּוֹרָל means that the lot came up or fell upon someone/something. 'On which the lot ... fell' is idiomatic English and preserves the selection-by-lot sense.
- source_word: לַעֲזָאזֵל
  chosen: for Azazel
  alternatives:
  - for the scapegoat
  - for complete removal
  lexicon: HALOT
  rationale: The Hebrew term עֲזָאזֵל is contested. Following original-language primacy and preserving ambiguity, the main text transliterates it as a proper name/form, rather than importing the interpretive rendering 'scapegoat.' An alternative is preserved in a footnote.
- source_word: יָעֳמַד
  chosen: shall be made to stand
  alternatives:
  - shall stand
  - shall be presented
  lexicon: HALOT
  rationale: 'The Hophal form is causative/passive: the goat is caused to stand or be set/presented. ''Shall be made to stand'' preserves the verbal force more closely than the smoother but less explicit ''shall stand.'''
- source_word: חַי
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: חַי here emphasizes that the goat remains alive in contrast to the goat sacrificed. 'Alive' is concise and natural.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' is the standard and sufficiently transparent rendering of לִפְנֵי in cultic presentation contexts.
- source_word: לְכַפֵּר עָלָיו
  chosen: to make atonement over it
  alternatives:
  - to make atonement for it
  - to purge it
  lexicon: HALOT
  rationale: כפר in sacrificial contexts is best rendered with 'make atonement.' The preposition עַל is literally 'over/upon'; 'over it' preserves the Hebrew wording without over-interpreting the exact mechanism. 'For it' is possible but slightly more interpretive.
- source_word: לְשַׁלַּח אֹתוֹ
  chosen: to send it away
  alternatives:
  - to send it off
  - to release it
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'Send it away' captures the removal motif and anticipates the destination phrase.
- source_word: הַמִּדְבָּרָה
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - into the desert
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the wilderness. 'Into the wilderness' is idiomatic and preserves the directional sense better than a simple locative.
