theological_decisions:
- issue: Cultic term חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The verse lists required sacrifices for Aaron's entrance on the Day of
    Atonement. 'Sin offering' is the established and broadly accurate rendering, but
    because the offering also effects ritual purification, 'purification offering'
    is preserved in a footnote rather than elevated to the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
