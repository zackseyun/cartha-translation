id: LEV.16.3
reference: Leviticus 16:3
source:
  edition: WLC
  text: בְּ/זֹ֛את יָבֹ֥א אַהֲרֹ֖ן אֶל הַ/קֹּ֑דֶשׁ בְּ/פַ֧ר בֶּן בָּקָ֛ר לְ/חַטָּ֖את
    וְ/אַ֥יִל לְ/עֹלָֽה־־׃
translation:
  text: 'With this Aaron shall enter the Holy Place: with a bull, the son of the herd,
    for a sin offering, and a ram for a burnt offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a bull from the herd.' The Hebrew literally says 'a bull, son of
      the herd,' an idiom for a bull from the cattle.
    reason: lexical_alternative
  - marker: b
    text: Or 'for a purification offering.' The Hebrew term can emphasize ritual purification
      as well as relation to sin.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/זֹאת
  chosen: With this
  alternatives:
  - By this
  - In this way
  lexicon: HALOT
  rationale: The preposition ב with זֹאת can indicate means or manner. 'With this'
    preserves the immediate sense that what follows specifies the required sacrificial
    provisions by which Aaron may enter, while remaining natural English.
- source_word: יָבֹא
  chosen: shall enter
  alternatives:
  - may enter
  - comes
  lexicon: HALOT
  rationale: The imperfect here is instructional/prescriptive in legal material. 'Shall
    enter' conveys the directive force in English better than a simple future 'will
    enter' or present 'comes.'
- source_word: אֶל הַ/קֹּדֶשׁ
  chosen: the Holy Place
  alternatives:
  - the sanctuary
  - the holy place
  - the holy sanctuary
  lexicon: HALOT
  rationale: In the Day of Atonement context, הַקֹּדֶשׁ refers to the sacred inner
    sanctuary area Aaron is permitted to enter. 'The Holy Place' is a conventional
    and sufficiently precise rendering; 'sanctuary' is broader. Capitalization marks
    it as a cultic space rather than a generic adjective-noun phrase.
- source_word: בְּ/פַר בֶּן בָּקָר
  chosen: with a bull, the son of the herd
  alternatives:
  - with a young bull
  - with a bull from the herd
  lexicon: HALOT
  rationale: פַר is 'bull' and בֶּן בָּקָר is the idiomatic specification 'son of
    the herd,' denoting a bovine animal from the cattle. The chosen rendering keeps
    the Hebrew expression visible for auditability, though somewhat formal. A smoother
    alternative is preserved in a footnote.
- source_word: לְ/חַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for purification offering
  lexicon: HALOT
  rationale: חַטָּאת in sacrificial contexts commonly denotes the sin offering. Although
    some argue for 'purification offering' to stress ritual cleansing, 'sin offering'
    remains the most recognizable and contextually adequate rendering; the alternative
    is worth preserving in a footnote because of scholarly discussion.
- source_word: וְ/אַיִל
  chosen: and a ram
  lexicon: HALOT
  rationale: אַיִל straightforwardly means 'ram.'
- source_word: לְ/עֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' matches the sacrificial listing structure of the verse.
