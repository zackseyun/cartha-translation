id: LEV.16.26
reference: Leviticus 16:26
source:
  edition: WLC
  text: וְ/הַֽ/מְשַׁלֵּ֤חַ אֶת הַ/שָּׂעִיר֙ לַֽ/עֲזָאזֵ֔ל יְכַבֵּ֣ס בְּגָדָ֔י/ו וְ/רָחַ֥ץ
    אֶת בְּשָׂר֖/וֹ בַּ/מָּ֑יִם וְ/אַחֲרֵי כֵ֖ן יָב֥וֹא אֶל הַֽ/מַּחֲנֶֽה־־־־׃
translation:
  text: The one who sends the goat away to Azazel shall wash his clothes and bathe
    his body in water, and afterward he may come into the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Azazel'; the Hebrew term is disputed. It may be understood as a
      proper name/designation, or interpreted more functionally as referring to removal
      or the so-called 'scapegoat.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַמְשַׁלֵּחַ
  chosen: The one who sends ... away
  alternatives:
  - the man who sends
  - the one sending
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to the
    person assigned to send the goat away. 'The one who sends ... away' is natural
    English and preserves the ongoing/role-based force better than a simple finite
    verb.
- source_word: הַשָּׂעִיר
  chosen: the goat
  alternatives:
  - the male goat
  lexicon: HALOT
  rationale: The noun denotes a goat, specifically a male goat in sacrificial context,
    but 'the goat' is sufficient and idiomatic here since the ritual referent is already
    established in context.
- source_word: לַעֲזָאזֵל
  chosen: to Azazel
  alternatives:
  - for Azazel
  - for removal
  lexicon: HALOT
  rationale: The Hebrew is contested, but the form is most naturally treated here
    as a proper name/designation, and transliteration preserves the ambiguity without
    over-interpreting it. 'For removal' is an interpretive rendering that resolves
    the debate too strongly.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  - shall launder his garments
  lexicon: HALOT
  rationale: This is a standard ritual washing expression. 'Shall wash his clothes'
    is clear, contemporary, and suitably formal for legal material.
- source_word: וְרָחַץ אֶת־בְּשָׂרוֹ בַּמָּיִם
  chosen: and bathe his body in water
  alternatives:
  - and wash his flesh in water
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in ritual purity contexts 'body'
    communicates the sense naturally in English without loss. 'In water' is retained
    formally from the Hebrew.
- source_word: וְאַחֲרֵי כֵן
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: A straightforward temporal sequence marker; 'afterward' is concise and
    natural.
- source_word: יָבֹא אֶל־הַמַּחֲנֶה
  chosen: he may come into the camp
  alternatives:
  - he shall come into the camp
  - he may enter the camp
  lexicon: HALOT
  rationale: 'The imperfect here states what is permitted/allowed after the washing
    rather than a fresh command. ''May come into the camp'' captures the ritual logic:
    only after washing is reentry allowed.'
