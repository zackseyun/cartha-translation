theological_decisions:
- issue: Meaning of לַעֲזָאזֵל in the Day of Atonement ritual
  chosen_reading: 'Treat as a proper designation and transliterate: ''to Azazel'''
  alternative_readings:
  - for removal
  - to the scapegoat
  - to a wilderness/demonic figure
  rationale: The term is lexically and historically disputed. Transliteration best
    preserves the Hebrew's ambiguity and avoids importing a specific theological interpretation
    into the main text. Because the verse itself does not explain the term, a non-interpretive
    rendering is preferable.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
