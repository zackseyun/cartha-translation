id: LEV.16.7
reference: Leviticus 16:7
source:
  edition: WLC
  text: וְ/לָקַ֖ח אֶת שְׁנֵ֣י הַ/שְּׂעִירִ֑ם וְ/הֶעֱמִ֤יד אֹתָ/ם֙ לִ/פְנֵ֣י יְהוָ֔ה פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: And he shall take the two goats and set them before Yahweh at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in keeping with the project''s stated convention.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַח
  chosen: And he shall take
  alternatives:
  - And he is to take
  - Then he shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural legal narrative commonly carries sequential/jussive-future force in English. 'Shall take' fits the ritual instruction context better than a simple past.
- source_word: שְׁנֵי הַשְּׂעִירִם
  chosen: the two goats
  alternatives:
  - the two male goats
  - the two goat-bucks
  lexicon: HALOT
  rationale: שָׂעִיר denotes a goat, often specifically a male goat. In this immediate context the pair is already defined by the Day of Atonement ritual, and plain 'goats' is natural English without losing the referent. More specific renderings are possible but not necessary here.
- source_word: וְהֶעֱמִיד אֹתָם
  chosen: and set them
  alternatives:
  - and present them
  - and make them stand
  lexicon: HALOT
  rationale: Hiphil of עמד means to cause to stand, set, or present. 'Set them' is concise modern English that preserves the physical-placement sense. 'Present' is possible, but could sound more interpretive than the concrete ritual action.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational 'before, in the presence of.' Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: פֶּתַח
  chosen: at the entrance of
  alternatives:
  - at the doorway of
  - at the opening of
  lexicon: HALOT
  rationale: פֶּתַח refers to an opening/entrance. 'At the entrance of' is idiomatic and suits the ritual location.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard literal rendering of the tabernacle designation, preserving the Hebrew sense without importing later architectural terminology such as 'tabernacle' where the source says 'tent of meeting.'
