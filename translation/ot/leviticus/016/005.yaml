theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The translation follows the project's gender-accurate policy by preserving
    the masculine representative expression where it refers to the covenant people
    corporately. A more idiomatic alternative is possible, but the literal form better
    reflects the Hebrew wording in this legal context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: While some scholarship emphasizes the purificatory function of חַטָּאת
    in Leviticus, 'sin offering' remains the clearest and most widely recognized English
    rendering. The alternative is preserved in a footnote because it can illuminate
    the ritual function without displacing the main-text tradition where the Hebrew
    permits both understandings.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
