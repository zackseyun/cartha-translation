id: LEV.16.5
reference: Leviticus 16:5
source:
  edition: WLC
  text: וּ/מֵ/אֵ֗ת עֲדַת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל יִקַּ֛ח שְׁנֵֽי שְׂעִירֵ֥י עִזִּ֖ים
    לְ/חַטָּ֑את וְ/אַ֥יִל אֶחָ֖ד לְ/עֹלָֽה־׃
translation:
  text: And from the congregation of the sons of Israel he shall take two male goats
    for a sin offering and one ram for a burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' / ''the people of Israel.'' Hebrew: ''the sons of
      Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'for a purification offering.' The Hebrew term חַטָּאת in Leviticus can
      denote the offering that deals with sin and ritual impurity.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמֵאֵת
  chosen: And from
  alternatives:
  - And out of
  - Now from
  lexicon: HALOT
  rationale: The conjunction plus preposition marks continuation and source/origin.
    'And from' preserves the simple connective force and the sense that the animals
    are to be taken from the people.
- source_word: עֲדַת
  chosen: congregation
  alternatives:
  - community
  - assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    fits Levitical cultic context well, while remaining understandable in modern English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the construct phrase is rendered
    literally as 'the sons of Israel.' Although idiomatically it refers to Israel
    as a whole, the source expression is explicitly preserved.
- source_word: יִקַּח
  chosen: he shall take
  alternatives:
  - he is to take
  - he must take
  lexicon: HALOT
  rationale: The imperfect here functions instructionally within ritual legislation.
    'He shall take' preserves the prescriptive force in standard legal English without
    over-paraphrasing.
- source_word: שְׁנֵי
  chosen: two
  lexicon: HALOT
  rationale: Straightforward cardinal numeral in construct with the following noun.
- source_word: שְׂעִירֵי עִזִּים
  chosen: male goats
  alternatives:
  - goats
  - bucks of the goats
  lexicon: HALOT
  rationale: The phrase literally denotes hairy he-goats/goats. 'Male goats' is clear
    modern English and preserves the sex distinction relevant to sacrificial specification.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the purification/sin
    offering rather than abstract 'sin.' 'For a sin offering' is the most transparent
    conventional rendering here.
- source_word: וְאַיִל אֶחָד
  chosen: and one ram
  alternatives:
  - and a single ram
  lexicon: HALOT
  rationale: אַיִל is specifically 'ram.' 'One ram' preserves the numeral emphasis
    without sounding unnatural.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  - for an ascending offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering. 'Burnt offering' is the established
    and accurate English equivalent; 'ascending offering' is more etymological than
    idiomatic.
