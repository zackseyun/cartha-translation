id: LEV.16.22
reference: Leviticus 16:22
source:
  edition: WLC
  text: וְ/נָשָׂ֨א הַ/שָּׂעִ֥יר עָלָ֛י/ו אֶת כָּל עֲוֺנֹתָ֖/ם אֶל אֶ֣רֶץ גְּזֵרָ֑ה
    וְ/שִׁלַּ֥ח אֶת הַ/שָּׂעִ֖יר בַּ/מִּדְבָּֽר־־־־׃
translation:
  text: The goat shall carry on itself all their iniquities to a cut-off land, and
    he shall send the goat away into the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a solitary land,' 'to an inaccessible land,' or 'to a desolate land.'
      The Hebrew likely conveys a place cut off or isolated from habitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂא
  chosen: shall carry
  alternatives:
  - shall bear
  lexicon: HALOT
  rationale: נשא commonly means 'carry, bear.' 'Carry' is slightly more natural in
    modern English while preserving the image of the goat taking the sins upon itself.
    'Bear' is a viable formal alternative with sacrificial resonance.
- source_word: הַשָּׂעִיר
  chosen: the goat
  alternatives:
  - the male goat
  lexicon: HALOT
  rationale: שָׂעִיר denotes a goat, often specifically a he-goat. English 'goat'
    is sufficient and natural here; the masculine sense is not crucial to the verse's
    meaning in English.
- source_word: עָלָיו
  chosen: on itself
  alternatives:
  - on him
  - upon itself
  lexicon: HALOT
  rationale: The preposition plus pronoun indicates the sins are borne 'on/upon' the
    goat. 'On itself' communicates the reflexive sense clearly in English for an animal;
    'on him' is possible but less idiomatic here.
- source_word: כָּל עֲוֺנֹתָם
  chosen: all their iniquities
  alternatives:
  - all their sins
  - all their guilt
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity/guilt rather than the broadest
    term for sin. 'Iniquities' preserves the moral and cultic weight of the Hebrew
    better than the flatter 'sins.'
- source_word: אֶל אֶרֶץ גְּזֵרָה
  chosen: to a cut-off land
  alternatives:
  - to a solitary land
  - to an inaccessible land
  - to a desolate land
  lexicon: HALOT
  rationale: גְּזֵרָה is difficult; the core idea is something cut off, separated,
    or isolated. 'Cut-off land' stays close to the Hebrew image and preserves the
    sense of removal from the community. More interpretive alternatives are possible
    and worth preserving in a footnote.
- source_word: וְשִׁלַּח
  chosen: he shall send away
  alternatives:
  - he shall release
  - he shall let go
  lexicon: HALOT
  rationale: שׁלח here refers to dispatching the goat away into the wilderness. 'Send
    away' is the most straightforward rendering and fits the ritual context.
- source_word: בַּמִּדְבָּר
  chosen: into the wilderness
  alternatives:
  - into the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness, steppe, or desert region. 'Wilderness'
    is the standard and contextually appropriate rendering in ritual and narrative
    texts.
