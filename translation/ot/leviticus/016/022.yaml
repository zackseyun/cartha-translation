theological_decisions:
- issue: Rendering the sin-bearing imagery of the scapegoat ritual
  chosen_reading: Retain the concrete language that the goat carries the people's
    iniquities on itself.
  alternative_readings:
  - Use a more interpretive paraphrase such as 'takes away their sins'
  rationale: The Hebrew presents a vivid ritual image of transfer and removal. Preserving
    'carry on itself' maintains the text's sacrificial symbolism without importing
    later doctrinal conclusions beyond what the verse states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Translation of אֶרֶץ גְּזֵרָה
  chosen_reading: Render as 'a cut-off land' in the main text.
  alternative_readings:
  - a solitary land
  - an inaccessible land
  - a desolate land
  rationale: The phrase is lexically uncertain enough to warrant preserving alternatives,
    but the main text should stay close to the Hebrew's separation imagery rather
    than resolve it into a single interpretive gloss.
  doctrine_reference: Translation philosophy §§1, 3, 5
