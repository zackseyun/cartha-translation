theological_decisions:
- issue: Meaning of עֲזָאזֵל in the Day of Atonement ritual
  chosen_reading: Azazel as a transliterated proper name left untranslated in the
    main text
  alternative_readings:
  - the scapegoat
  - complete removal
  - a wilderness/demonic figure associated with the goat
  rationale: The term is notoriously disputed, and the verse itself does not unambiguously
    settle whether it refers to the goat's function, the destination, or a personal
    being. Transliteration best preserves the Hebrew's ambiguity and avoids doctrinal
    overreach. Because 'scapegoat' is a historically influential rendering, it is
    preserved in a footnote as an alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; §2: Translate titles; transliterate names'
