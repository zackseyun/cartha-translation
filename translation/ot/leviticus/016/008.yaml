id: LEV.16.8
reference: Leviticus 16:8
source:
  edition: WLC
  text: וְ/נָתַ֧ן אַהֲרֹ֛ן עַל שְׁנֵ֥י הַ/שְּׂעִירִ֖ם גּוֹרָל֑וֹת גּוֹרָ֤ל אֶחָד֙
    לַ/יהוָ֔ה וְ/גוֹרָ֥ל אֶחָ֖ד לַ/עֲזָאזֵֽל־׃
translation:
  text: 'And Aaron shall cast lots over the two goats: one lot for the LORD and one
    lot for Azazel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one lot for the scapegoat.' The Hebrew term 'Azazel' is disputed; it
      may be understood as a proper name, the goat's function, or a term related to
      removal.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַן
  chosen: shall cast
  alternatives:
  - shall place
  - shall put
  - shall give
  lexicon: HALOT
  rationale: Literally the verb is 'give/put,' but with גּוֹרָלוֹת ('lots') and עַל
    ('upon/over') the idiom refers to assigning or casting lots. 'Shall cast' is the
    most natural English expression for the action intended, without obscuring the
    ritual act.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: The preposition is literally 'upon/over.' In English, 'cast lots over
    the two goats' preserves the ritual imagery better than a more interpretive 'for
    the two goats.'
- source_word: שְׁנֵי הַשְּׂעִירִם
  chosen: the two goats
  alternatives:
  - the two male goats
  lexicon: HALOT
  rationale: The noun denotes goats, specifically he-goats in many contexts, but 'goats'
    is sufficient and idiomatic here since the pair is already specified in the ritual
    context. 'Male' is not necessary in the English line.
- source_word: גּוֹרָלוֹת
  chosen: lots
  alternatives:
  - lot tokens
  lexicon: HALOT
  rationale: Standard rendering for the plural noun referring to the objects or outcomes
    used in sacred lot-casting.
- source_word: גּוֹרָל אֶחָד
  chosen: one lot
  alternatives:
  - one portion by lot
  - one fate
  lexicon: HALOT
  rationale: The singular repeated phrase is best rendered straightforwardly as 'one
    lot,' matching the ritual distribution.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    'For' fits the dative sense in the lot assignment.
- source_word: לַעֲזָאזֵל
  chosen: for Azazel
  alternatives:
  - for the scapegoat
  - for complete removal
  lexicon: HALOT
  rationale: עֲזָאזֵל is a contested term. The Hebrew form is best preserved as the
    proper name 'Azazel' in the main text rather than resolving the debate interpretively
    as 'scapegoat' or an abstract removal term. This preserves the textual ambiguity
    and avoids importing a specific theory into the translation.
