theological_decisions:
- issue: Rendering of חטאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The immediate context is sacrificial procedure, so the noun denotes the
    offering rather than abstract sin. 'Sin offering' remains the most transparent
    and familiar English rendering, while 'purification offering' is preserved in
    a footnote because some scholars emphasize the rite's cleansing function.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Scope of בֵּיתוֹ
  chosen_reading: his household
  alternative_readings:
  - his house
  rationale: The Hebrew likely refers to Aaron's family/household rather than a building.
    This avoids flattening the representative priestly dimension while not importing
    later doctrinal conclusions.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
