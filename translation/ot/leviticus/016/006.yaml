id: LEV.16.6
reference: Leviticus 16:6
source:
  edition: WLC
  text: וְ/הִקְרִ֧יב אַהֲרֹ֛ן אֶת פַּ֥ר הַ/חַטָּ֖את אֲשֶׁר ל֑/וֹ וְ/כִפֶּ֥ר בַּעֲד֖/וֹ
    וּ/בְעַ֥ד בֵּיתֽ/וֹ־־׃
translation:
  text: Aaron shall present the bull of the sin offering that is for himself, and
    he shall make atonement for himself and for his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the bull of the purification offering.' The Hebrew term חַטָּאת can
      denote the sin offering, with an emphasis in some contexts on ritual purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: הקריב in sacrificial contexts commonly means to bring/present an offering
    before Yahweh. 'Present' is natural English and preserves the ritual sense without
    prematurely specifying the whole act as completed sacrifice. Future-like 'shall'
    fits the procedural instruction context.
- source_word: פַּר
  chosen: the bull
  alternatives:
  - the young bull
  - the bull calf
  lexicon: HALOT
  rationale: פַּר denotes a bull/bullock. 'Bull' is the clearest modern rendering.
    The article is retained in English because the animal is a specific ritual victim
    in the procedure.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  - the offering for sin
  lexicon: HALOT
  rationale: חטאת can denote either 'sin' or the 'sin offering.' In sacrificial legislation
    here it clearly refers to the offering. 'Sin offering' is the standard and most
    recognizable rendering, though some argue for 'purification offering' to stress
    ritual cleansing; that nuance is preserved in a footnote.
- source_word: אֲשֶׁר לוֹ
  chosen: that is for himself
  alternatives:
  - that belongs to him
  - that is his
  lexicon: HALOT
  rationale: The phrase identifies the bull as Aaron's own designated offering, in
    contrast to the people's offerings in the surrounding context. 'For himself' makes
    the function explicit in idiomatic English and prepares for the following clause
    about atonement for himself.
- source_word: וְכִפֶּר
  chosen: and he shall make atonement
  alternatives:
  - and he shall atone
  - and he shall purge
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.'
    This preserves the cultic-theological force without narrowing the mechanism beyond
    the Hebrew. 'Atone' alone is possible but less idiomatic with the following prepositional
    phrases.
- source_word: בַּעֲדוֹ
  chosen: for himself
  alternatives:
  - on behalf of himself
  lexicon: HALOT
  rationale: בעד with pronominal suffix indicates benefit/on behalf of. 'For himself'
    is concise and natural.
- source_word: וּבְעַד בֵּיתוֹ
  chosen: and for his household
  alternatives:
  - and for his house
  - and on behalf of his household
  lexicon: HALOT
  rationale: בַּיִת often means household/family, not merely the physical structure.
    'Household' best conveys the representative family unit in this priestly context.
