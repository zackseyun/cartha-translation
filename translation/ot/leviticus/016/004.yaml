theological_decisions:
- issue: Nature of the garments' holiness
  chosen_reading: These garments are described as holy in a cultic/ritual sense without
    importing later theological symbolism into the translation.
  alternative_readings:
  - These are sacred garments
  rationale: The verse itself identifies the garments as holy because they are set
    apart for priestly service. The translation preserves that claim without expanding
    it into doctrinal interpretation not explicit in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of בשרו in ritual context
  chosen_reading: Translated as 'body' rather than the more literal 'flesh' in the
    main text.
  alternative_readings:
  - flesh
  rationale: This is a lexical-stylistic choice, not a theological reinterpretation.
    In English, 'wash his body' and 'on his body' communicate the concrete ritual
    requirement clearly while avoiding misleading theological overtones that 'flesh'
    may carry in later biblical usage.
  doctrine_reference: Translation philosophy §§1, 6
