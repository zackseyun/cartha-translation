id: LEV.16.4
reference: Leviticus 16:4
source:
  edition: WLC
  text: כְּתֹֽנֶת בַּ֨ד קֹ֜דֶשׁ יִלְבָּ֗שׁ וּ/מִֽכְנְסֵי בַד֮ יִהְי֣וּ עַל בְּשָׂר/וֹ֒
    וּ/בְ/אַבְנֵ֥ט בַּד֙ יַחְגֹּ֔ר וּ/בְ/מִצְנֶ֥פֶת בַּ֖ד יִצְנֹ֑ף בִּגְדֵי קֹ֣דֶשׁ
    הֵ֔ם וְ/רָחַ֥ץ בַּ/מַּ֛יִם אֶת בְּשָׂר֖/וֹ וּ/לְבֵשָֽׁ/ם־־־־־׃
translation:
  text: He shall put on the holy linen tunic, and the linen undergarments shall be
    on his body; he shall tie on the linen sash and wrap the linen turban. These are
    holy garments. He shall wash his body with water and then put them on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacred garments.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'on his flesh' and 'wash his flesh with water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֹנֶת
  chosen: tunic
  alternatives:
  - coat
  - long shirt
  lexicon: HALOT
  rationale: Refers to the priestly inner garment worn next to the body. 'Tunic' is
    the standard clear modern equivalent and fits priestly clothing context better
    than the less specific 'coat'.
- source_word: בַּד
  chosen: linen
  alternatives:
  - fine linen
  - linen cloth
  lexicon: HALOT
  rationale: In priestly garment contexts this term denotes linen material. 'Linen'
    is concise and idiomatic in English; 'fine linen' may over-specify quality not
    explicit in this verse.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: Rendered 'holy' for consistency with the common biblical register of
    קדש in cultic contexts. 'Sacred' is possible but less consistent with broader
    translation usage.
- source_word: יִלְבָּשׁ
  chosen: shall put on
  alternatives:
  - shall wear
  - shall clothe himself with
  lexicon: HALOT
  rationale: A natural English rendering of לבש in an instruction about garments.
    'Put on' preserves the action without sounding wooden.
- source_word: מִכְנְסֵי בַד
  chosen: linen undergarments
  alternatives:
  - linen shorts
  - linen breeches
  lexicon: HALOT
  rationale: Refers to the priestly lower-body garment worn next to the skin. 'Undergarments'
    is accurate and readable modern English; 'breeches' is archaic, while 'shorts'
    sounds too informal.
- source_word: עַל בְּשָׂרוֹ
  chosen: on his body
  alternatives:
  - on his flesh
  - against his bare flesh
  lexicon: HALOT
  rationale: בשר literally means 'flesh,' but here idiomatic English prefers 'body'
    for clothing worn directly on the person. This preserves the sense without awkwardness.
- source_word: אַבְנֵט
  chosen: sash
  alternatives:
  - belt
  - waistband
  lexicon: HALOT
  rationale: The priestly אבנט is a wrapped cloth belt/sash. 'Sash' better reflects
    ceremonial dress than the more generic 'belt'.
- source_word: יַחְגֹּר
  chosen: shall tie on
  alternatives:
  - shall gird himself with
  - shall fasten
  lexicon: HALOT
  rationale: The verb means to gird or bind around oneself. 'Tie on' communicates
    the action in contemporary English while retaining the concrete sense.
- source_word: מִצְנֶפֶת
  chosen: turban
  alternatives:
  - headwrap
  - headdress
  lexicon: HALOT
  rationale: Standard rendering for the priestly head covering. 'Turban' is specific
    and widely recognized.
- source_word: יִצְנֹף
  chosen: wrap
  alternatives:
  - wind on
  - put on
  lexicon: HALOT
  rationale: The verb specifically suggests wrapping or winding the head covering.
    'Wrap' preserves that nuance better than the generic 'put on'.
- source_word: בִּגְדֵי קֹדֶשׁ
  chosen: holy garments
  alternatives:
  - sacred garments
  lexicon: HALOT
  rationale: A straightforward rendering of the phrase, maintaining consistency with
    'holy' for קדש in cultic contexts.
- source_word: וְרָחַץ בַּמַּיִם אֶת בְּשָׂרוֹ
  chosen: He shall wash his body with water
  alternatives:
  - He shall bathe his flesh in water
  - He shall wash himself with water
  lexicon: HALOT
  rationale: The Hebrew is literally 'wash his flesh in/with water.' 'Wash his body
    with water' is natural English and preserves the ritual washing sense without
    unnecessary awkwardness.
- source_word: וּלְבֵשָׁם
  chosen: and then put them on
  alternatives:
  - and put them on
  - and wear them
  lexicon: HALOT
  rationale: 'Refers back to the holy garments just listed. ''Then'' clarifies the
    sequence implied by the Hebrew narrative/consecutive structure: washing precedes
    vesting.'
