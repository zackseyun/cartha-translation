id: LEV.16.18
reference: Leviticus 16:18
source:
  edition: WLC
  text: וְ/יָצָ֗א אֶל הַ/מִּזְבֵּ֛חַ אֲשֶׁ֥ר לִ/פְנֵֽי יְהוָ֖ה וְ/כִפֶּ֣ר עָלָ֑י/ו וְ/לָקַ֞ח מִ/דַּ֤ם הַ/פָּר֙ וּ/מִ/דַּ֣ם הַ/שָּׂעִ֔יר וְ/נָתַ֛ן עַל קַרְנ֥וֹת הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־׃
translation:
  text: Then he shall go out to the altar that is before Yahweh and make atonement for it, and he shall take some of the bull's blood and some of the goat's blood and put it on the horns of the altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purge it'; the Hebrew verb can carry a purification sense in priestly ritual contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then he shall go out
  alternatives:
  - And he shall go out
  - Then he went out
  lexicon: HALOT
  rationale: The waw with qatal in ritual instruction continues the sequence of prescribed actions. 'Then he shall go out' preserves the procedural flow in clear English better than a simple past, while retaining the movement outward from the inner sanctuary.
- source_word: הַמִּזְבֵּחַ אֲשֶׁר לִפְנֵי יְהוָה
  chosen: the altar that is before the LORD
  alternatives:
  - the altar before the LORD
  - the altar in the presence of the LORD
  lexicon: HALOT
  rationale: מִזְבֵּחַ is straightforwardly 'altar.' לִפְנֵי is most naturally 'before/in front of.' The phrase likely identifies the altar located before YHWH in the sanctuary context; 'that is before the LORD' is both natural and close to the Hebrew. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְכִפֶּר עָלָיו
  chosen: and make atonement for it
  alternatives:
  - and purge it
  - and make reconciliation for it
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts commonly denotes making atonement/purification. 'Make atonement for it' is the standard accessible rendering and fits the object suffix referring to the altar. 'Purge it' captures a purification nuance but is narrower and less idiomatic in English main text.
- source_word: וְלָקַח מִדַּם הַפָּר וּמִדַּם הַשָּׂעִיר
  chosen: and he shall take some of the bull's blood and some of the goat's blood
  alternatives:
  - and take from the blood of the bull and from the blood of the goat
  - and take some blood from the bull and from the goat
  lexicon: HALOT
  rationale: 'The repeated מִן with דָּם is naturally partitive: taking some of each blood. Rendering with possessive English (''bull''s blood,'' ''goat''s blood'') is idiomatic and precise.'
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull. 'Young bull' can be contextually possible, but 'bull' is sufficient and standard here.
- source_word: הַשָּׂעִיר
  chosen: the goat
  alternatives:
  - the male goat
  - the goat for the sin offering
  lexicon: HALOT
  rationale: שָׂעִיר commonly denotes a male goat. Since the immediate context has already identified the sacrificial animal, 'the goat' is adequate English without over-specifying beyond the verse itself.
- source_word: וְנָתַן עַל קַרְנוֹת הַמִּזְבֵּחַ סָבִיב
  chosen: and put it on the horns of the altar all around
  alternatives:
  - and apply it to the horns of the altar all around
  - and put it on the altar's horns on every side
  lexicon: HALOT
  rationale: נָתַן is the ordinary verb 'put/place.' Although 'apply' is ritually idiomatic, 'put' stays closer to the Hebrew while remaining natural. The singular object after two blood sources implies the mixed or combined sacrificial blood as used in the rite; English singular 'it' reflects the Hebrew grammar. סָבִיב is best rendered 'all around/on every side.'
