theological_decisions:
- issue: Rendering of כפר in priestly sacrificial context
  chosen_reading: make atonement for it
  alternative_readings:
  - purge it
  - make reconciliation for it
  rationale: The verse describes a Day of Atonement ritual act directed toward the altar. 'Make atonement' preserves the established sacrificial-theological sense without importing a narrower theory of atonement. The purification aspect is real, but the broader cultic term is preferable in the main text.
  doctrine_reference: Translation philosophy §6; preserve theological weight without unnecessary jargon
