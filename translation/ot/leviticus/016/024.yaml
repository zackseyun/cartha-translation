id: LEV.16.24
reference: Leviticus 16:24
source:
  edition: WLC
  text: וְ/רָחַ֨ץ אֶת בְּשָׂר֤/וֹ בַ/מַּ֨יִם֙ בְּ/מָק֣וֹם קָד֔וֹשׁ וְ/לָבַ֖שׁ אֶת
    בְּגָדָ֑י/ו וְ/יָצָ֗א וְ/עָשָׂ֤ה אֶת עֹֽלָת/וֹ֙ וְ/אֶת עֹלַ֣ת הָ/עָ֔ם וְ/כִפֶּ֥ר
    בַּעֲד֖/וֹ וּ/בְעַ֥ד הָ/עָֽם־־־־׃
translation:
  text: He shall wash his body with water in a holy place, put on his garments, come
    out, and offer his burnt offering and the burnt offering of the people, and make
    atonement for himself and for the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his flesh' instead of 'his body.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in a holy place,' not necessarily 'in the Holy Place' (the inner
      sanctuary chamber).
    reason: lexical_alternative
  - marker: c
    text: Or 'make expiation' or, in some ritual contexts, 'purge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחַץ
  chosen: He shall wash
  alternatives:
  - and he washed
  - then he shall wash
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional sequence
    is best rendered with future/modal force in English ('shall wash') rather than
    simple past, reflecting procedural prescription.
- source_word: בְּשָׂרוֹ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: HALOT
  rationale: Though the Hebrew literally says 'his flesh,' in this ritual washing
    context 'body' communicates the physical sense naturally in modern English without
    importing later theological overtones of 'flesh.'
- source_word: בַּמַּיִם
  chosen: with water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: The preposition with רחץ commonly yields idiomatic English 'wash with
    water.' 'In water' is possible but less natural here.
- source_word: בְּמָקוֹם קָדוֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article on מקום, so 'in a holy place' better reflects
    the Hebrew than the more technical 'in the Holy Place,' which could be mistaken
    for the sanctuary chamber.
- source_word: וְלָבַשׁ אֶת בְּגָדָיו
  chosen: put on his garments
  alternatives:
  - clothe himself with his garments
  - put on his clothes
  lexicon: HALOT
  rationale: '''Garments'' preserves the ritual/formal register better than ''clothes,''
    while remaining readable.'
- source_word: וְיָצָא
  chosen: come out
  alternatives:
  - go out
  lexicon: HALOT
  rationale: Given the movement from the holy place to outside, 'come out' is idiomatic
    and contextually clear in English.
- source_word: וְעָשָׂה
  chosen: offer
  alternatives:
  - make
  - perform
  lexicon: HALOT
  rationale: With burnt offerings as the object, English sacrificial idiom prefers
    'offer' over the more literal but awkward 'make' or 'perform.'
- source_word: עֹלָתוֹ
  chosen: his burnt offering
  alternatives:
  - his ascending offering
  lexicon: HALOT
  rationale: '''Burnt offering'' is the established and accurate rendering for עלה
    in sacrificial contexts; ''ascending offering'' is more etymologically transparent
    but less idiomatic in English Bible usage.'
- source_word: עֹלַת הָעָם
  chosen: the burnt offering of the people
  alternatives:
  - the people's burnt offering
  lexicon: HALOT
  rationale: This phrasing is slightly more formal and keeps the parallel structure
    with 'his burnt offering.'
- source_word: וְכִפֶּר
  chosen: make atonement
  alternatives:
  - atone
  - purge
  lexicon: HALOT
  rationale: For כפר in priestly sacrificial context, 'make atonement' is the clearest
    standard rendering. 'Purge' can capture some ritual nuance in certain contexts,
    but here the broader atoning sense is primary.
- source_word: בַּעֲדוֹ וּבְעַד הָעָם
  chosen: for himself and for the people
  alternatives:
  - on behalf of himself and on behalf of the people
  lexicon: HALOT
  rationale: '''For'' is concise and natural while preserving the representative sense
    of בעד in this sacrificial context.'
