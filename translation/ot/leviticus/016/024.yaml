theological_decisions:
- issue: Rendering of כפר in Levitical sacrificial legislation
  chosen_reading: make atonement
  alternative_readings:
  - make expiation
  - purge
  rationale: The verse concerns priestly sacrificial action on the Day of Atonement.
    'Make atonement' preserves the established theological sense without narrowing
    the term to one debated theory of atonement. Alternatives are noted as lexical
    possibilities but not required in the main text here.
  doctrine_reference: Translation philosophy §3, §6
