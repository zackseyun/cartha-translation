id: LEV.3.17
reference: Leviticus 3:17
source:
  edition: WLC
  text: חֻקַּ֤ת עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם בְּ/כֹ֖ל מֽוֹשְׁבֹתֵי/כֶ֑ם כָּל חֵ֥לֶב וְ/כָל
    דָּ֖ם לֹ֥א תֹאכֵֽלוּ־־׃פ
translation:
  text: 'It shall be a permanent statute throughout your generations, in all your
    dwellings: you shall eat neither any fat nor any blood.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an everlasting statute' or 'a perpetual statute.' The Hebrew עוֹלָם
      in legal contexts often denotes enduring, ongoing validity.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקַּת
  chosen: statute
  alternatives:
  - decree
  - ordinance
  - prescription
  lexicon: HALOT
  rationale: חֻקָּה commonly denotes a fixed prescribed rule or statute. 'Statute'
    preserves the legal-covenantal force without sounding overly technical.
- source_word: עוֹלָם
  chosen: permanent
  alternatives:
  - everlasting
  - perpetual
  - forever
  lexicon: HALOT
  rationale: In legal formulae, עוֹלָם often indicates enduring or perpetual duration
    within the covenantal frame. 'Permanent' communicates ongoing force in natural
    English better than the more archaic 'perpetual,' while avoiding overreading metaphysical
    endlessness.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - for all your generations
  lexicon: HALOT
  rationale: This is a standard covenantal expression indicating continuity across
    successive generations. 'Throughout your generations' is idiomatic and preserves
    the distributive sense.
- source_word: בְּכֹל מוֹשְׁבֹתֵיכֶם
  chosen: in all your dwellings
  alternatives:
  - in all your settlements
  - wherever you live
  - in all your places of residence
  lexicon: HALOT
  rationale: מוֹשָׁב refers to dwelling places or places of residence. 'In all your
    dwellings' is a conventional and clear rendering that preserves the scope of applicability
    in every place they live.
- source_word: כָּל חֵלֶב
  chosen: any fat
  alternatives:
  - all fat
  - the fat
  lexicon: HALOT
  rationale: With the following prohibition, English idiom is best served by 'any
    fat,' yielding the natural construction 'eat neither any fat nor any blood.' This
    still reflects the comprehensive force of כָּל.
- source_word: וְכָל דָּם
  chosen: any blood
  alternatives:
  - all blood
  lexicon: HALOT
  rationale: Parallel to 'any fat,' this gives a natural English expression for the
    total prohibition while preserving the comprehensive sense of כָּל.
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall eat neither...nor
  alternatives:
  - you shall not eat
  - do not eat
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material functions as prohibition. 'You
    shall' fits statutory style, and 'neither...nor' accurately expresses the negation
    over both coordinated objects in idiomatic English.
