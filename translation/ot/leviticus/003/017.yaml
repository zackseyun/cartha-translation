theological_decisions:
- issue: Duration of the command expressed by עוֹלָם
  chosen_reading: Rendered as 'permanent statute' rather than 'everlasting statute.'
  alternative_readings:
  - everlasting statute
  - perpetual statute
  rationale: The Hebrew legal formula emphasizes enduring covenantal validity across
    generations and dwellings. 'Permanent' preserves that force in contemporary English
    without importing a stronger philosophical claim about absolute endlessness beyond
    the idiom's normal legal usage.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
