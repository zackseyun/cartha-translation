id: LEV.3.3
reference: Leviticus 3:3
source:
  edition: WLC
  text: וְ/הִקְרִיב֙ מִ/זֶּ֣בַח הַ/שְּׁלָמִ֔ים אִשֶּׁ֖ה לַ/יהוָ֑ה אֶת הַ/חֵ֨לֶב֙ הַֽ/מְכַסֶּ֣ה
    אֶת הַ/קֶּ֔רֶב וְ/אֵת֙ כָּל הַ/חֵ֔לֶב אֲשֶׁ֖ר עַל הַ/קֶּֽרֶב־־־־׃
translation:
  text: And from the sacrifice of peace offerings he shall present as a food offering
    to the LORD the fat that covers the entrails, and all the fat that is on the entrails,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: he shall present
  alternatives:
  - he shall offer
  - he shall bring near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present or
    offer. 'Present' preserves the ritual sense without sounding overly wooden, while
    still reflecting the formal act of bringing an offering before God.
- source_word: מִזֶּבַח הַשְּׁלָמִים
  chosen: from the sacrifice of peace offerings
  alternatives:
  - from the sacrifice of fellowship offerings
  - from the sacrifice of well-being offerings
  lexicon: HALOT
  rationale: זֶבַח is specifically a sacrificial slaughter/offer­ing, and שְׁלָמִים
    is the established category often rendered 'peace offerings.' 'Peace offerings'
    is retained for continuity and because it reflects the traditional sacrificial
    category, though 'fellowship' or 'well-being' capture aspects of the term's semantic
    range.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering made by fire,' the term denotes
    an offering turned into smoke by fire and in priestly texts can carry the sense
    of a food gift to God. 'Food offering' is clear modern English and fits the immediate
    sacrificial context; the more literal fire-focused alternatives are preserved
    in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: חֵלֶב in sacrificial legislation refers to the fatty portions reserved
    for offering, not fat in a metaphorical sense.
- source_word: הַמְכַסֶּה
  chosen: that covers
  alternatives:
  - covering
  lexicon: HALOT
  rationale: The participle functions attributively, describing the fat as the portion
    'that covers' the entrails.
- source_word: הַקֶּרֶב
  chosen: the entrails
  alternatives:
  - the inward parts
  - the inner organs
  lexicon: HALOT
  rationale: In animal-sacrifice context, קֶרֶב refers concretely to the inner parts/viscera.
    'Entrails' is specific and natural in English for butchery/sacrificial description.
- source_word: כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  chosen: all the fat that is on the entrails
  alternatives:
  - all the fat that is on the inward parts
  lexicon: HALOT
  rationale: The phrase distinguishes the fat covering the entrails from the rest
    of the fat attached to them. 'On the entrails' is a straightforward rendering
    of עַל in this anatomical context.
