theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per project doctrine, the default
    rendering is 'the LORD,' following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אִשֶּׁה in sacrificial legislation
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The term is not a major doctrinally contested term in the excerpt, but
    it bears theological significance in sacrificial texts. 'Food offering' communicates
    the cultic category in readable English while avoiding the misleading impression
    that fire itself is the substance of the offering. A footnote preserves the more
    traditional literal alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
