id: LEV.3.15
reference: Leviticus 3:15
source:
  edition: WLC
  text: וְ/אֵת֙ שְׁתֵּ֣י הַ/כְּלָיֹ֔ת וְ/אֶת הַ/חֵ֨לֶב֙ אֲשֶׁ֣ר עֲלֵ/הֶ֔ן אֲשֶׁ֖ר
    עַל הַ/כְּסָלִ֑ים וְ/אֶת הַ/יֹּתֶ֨רֶת֙ עַל הַ/כָּבֵ֔ד עַל הַ/כְּלָיֹ֖ת יְסִירֶֽ/נָּה־־־־־׃
translation:
  text: and the two kidneys, and the fat that is on them, which is on the loins, and
    the appendage on the liver, along with the kidneys, he shall remove.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lobe on the liver.' The Hebrew term for this anatomical part (יֹתֶרֶת)
      is uncertain, so 'appendage' is used in the main text to avoid overstating precision.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on the kidneys.' Here it likely means that this part is removed
      together with the kidneys.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  alternatives:
  - the two kidneys
  lexicon: HALOT
  rationale: כְּלָיָה plainly denotes the kidneys in sacrificial anatomy. The dual-number
    expression is naturally rendered 'the two kidneys.'
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the suet
  - the fatty fat
  lexicon: HALOT
  rationale: חֵלֶב in Levitical sacrificial contexts refers to the choice fat portions
    to be removed and offered. 'The fat' is standard, clear English without adding
    technical jargon.
- source_word: אֲשֶׁר עֲלֵהֶן
  chosen: that is on them
  alternatives:
  - which is upon them
  lexicon: HALOT
  rationale: A straightforward relative clause referring back to the kidneys and their
    attached fat. 'On them' is idiomatic modern English.
- source_word: הַכְּסָלִים
  chosen: the loins
  alternatives:
  - the flanks
  lexicon: HALOT
  rationale: כְּסָלִים in animal anatomy here refers to the region around the loins.
    'Loins' preserves the anatomical sense used in sacrificial legislation; 'flanks'
    is possible but less precise to the traditional cultic description.
- source_word: הַיֹּתֶרֶת
  chosen: the appendage
  alternatives:
  - the lobe
  - the long lobe
  lexicon: HALOT
  rationale: יוֹתֶרֶת is a difficult anatomical term in sacrificial texts, traditionally
    understood as a protruding part associated with the liver. 'Appendage' preserves
    the basic sense without overcommitting to a disputed modern anatomical identification.
- source_word: עַל הַכָּבֵד
  chosen: on the liver
  alternatives:
  - over the liver
  - attached to the liver
  lexicon: HALOT
  rationale: The preposition עַל most directly means 'on/over.' 'On the liver' is
    the most literal and sufficiently clear in context.
- source_word: עַל הַכְּלָיֹת
  chosen: along with the kidneys
  alternatives:
  - beside the kidneys
  - by the kidneys
  - with the kidneys
  lexicon: HALOT
  rationale: In this sacrificial formula, the phrase indicates that the liver appendage
    is removed together with the kidneys. Rendering it 'along with the kidneys' communicates
    the procedural sense more clearly than a strictly spatial 'on the kidneys,' which
    would be anatomically awkward in English.
- source_word: יְסִירֶנָּה
  chosen: he shall remove
  alternatives:
  - he is to remove
  - he shall take it away
  lexicon: HALOT
  rationale: Hiphil of סור here has the causative-removal sense in ritual instruction.
    'He shall remove' fits the legal style and matches the singular priestly action
    in context.
