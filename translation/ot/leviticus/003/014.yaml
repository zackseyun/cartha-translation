id: LEV.3.14
reference: Leviticus 3:14
source:
  edition: WLC
  text: וְ/הִקְרִ֤יב מִמֶּ֨/נּוּ֙ קָרְבָּנ֔/וֹ אִשֶּׁ֖ה לַֽ/יהוָ֑ה אֶת הַ/חֵ֨לֶב֙ הַֽ/מְכַסֶּ֣ה אֶת הַ/קֶּ֔רֶב וְ/אֵת֙ כָּל הַ/חֵ֔לֶב אֲשֶׁ֖ר עַל הַ/קֶּֽרֶב־־־־׃
translation:
  text: 'And from it he shall present his offering, a food offering to Yahweh: the fat that covers the entrails, and all the fat that is on the entrails,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire.' The Hebrew term אִשֶּׁה is traditionally rendered this way in sacrificial contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: he shall present
  alternatives:
  - he shall offer
  - he shall bring near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present or offer. 'Present' preserves the ritual sense without sounding overly wooden, while still matching the formal action of bringing an offering before God.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from this
  - from him
  lexicon: HALOT
  rationale: The suffix refers back to the sacrificial animal/peace offering, not a person. 'From it' is the most natural English rendering in context.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربן / offering
  lexicon: HALOT
  rationale: קָרְבָּן is a technical sacrificial term. 'Offering' is the standard clear English equivalent and fits the cultic context.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering by fire,' the term denotes an offering made by fire and in many contexts functions as a food offering terminology in priestly texts. 'Food offering' is clearer in modern English and fits the immediate context of portions burned to the LORD.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here is naturally expressed as 'to' in English with sacrificial presentation language.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: חֵלֶב in sacrificial legislation refers specifically to the choicest fat portions reserved for burning. 'The fat' is the direct and standard rendering.
- source_word: הַמְכַסֶּה
  chosen: that covers
  alternatives:
  - covering
  - which covers
  lexicon: HALOT
  rationale: 'The participle modifies ''the fat'' and is best rendered as a relative clause in natural English: ''that covers.'''
- source_word: הַקֶּרֶב
  chosen: the entrails
  alternatives:
  - the inward parts
  - the inner organs
  - the inner parts
  lexicon: HALOT
  rationale: קֶרֶב here refers anatomically to the inner abdominal parts/organs of the animal. 'Entrails' is concrete and natural in sacrificial context, though somewhat vivid; it best matches the physical reference.
- source_word: וְאֵת כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  chosen: and all the fat that is on the entrails
  alternatives:
  - and all the fat that is upon the inner parts
  - and all the fat that is on the inward parts
  lexicon: HALOT
  rationale: This clause expands the specific sacrificial portions to include all fat attached to the entrails. 'On the entrails' is idiomatic enough while preserving the spatial sense of עַל.
