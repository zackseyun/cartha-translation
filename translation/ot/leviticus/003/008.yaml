theological_decisions:
- issue: Ritual hand-placement in sacrificial context
  chosen_reading: Rendered as 'lay his hand' without importing symbolic interpretation.
  alternative_readings:
  - '''lean his hand'' to emphasize pressure'
  - interpretive renderings implying transfer of guilt or identification
  rationale: The verse describes the ritual action itself, not its theological explanation.
    To preserve theological tension and avoid importing later doctrinal interpretation,
    the translation states the act plainly.
  doctrine_reference: Translation philosophy §3
- issue: Gendered familial term בְּנֵי אַהֲרֹן
  chosen_reading: Aaron’s sons
  alternative_readings:
  - Aaron’s descendants
  - Aaron’s priests
  rationale: The Hebrew specifically names 'sons,' and the doctrine requires gender-accurate
    rendering rather than neutralization. Broader paraphrases would obscure the source
    wording.
  doctrine_reference: Translation philosophy §4
