id: LEV.3.8
reference: Leviticus 3:8
source:
  edition: WLC
  text: וְ/סָמַ֤ךְ אֶת יָד/וֹ֙ עַל רֹ֣אשׁ קָרְבָּנ֔/וֹ וְ/שָׁחַ֣ט אֹת֔/וֹ לִ/פְנֵ֖י
    אֹ֣הֶל מוֹעֵ֑ד וְ֠/זָרְקוּ בְּנֵ֨י אַהֲרֹ֧ן אֶת דָּמ֛/וֹ עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־־׃
translation:
  text: He shall lay his hand on the head of his offering and slaughter it before
    the tent of meeting, and Aaron’s sons shall throw its blood against the altar
    all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall splash' or 'shall dash'; the Hebrew verb denotes casting the blood
      in a forceful ritual action, not a gentle sprinkling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: In sacrificial contexts סמך with 'hand on the head' denotes the ritual
    act of placing/pressing the hand on the animal. 'Lay' is natural English and sufficiently
    formal without over-specifying the pressure implied by the verb.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his palm
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is straightforwardly 'his hand.' English
    keeps the singular as in the Hebrew.
- source_word: רֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: Standard anatomical sense in sacrificial instructions.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his قربan/corban
  - his sacrifice
  lexicon: HALOT
  rationale: קָרְבָּן is a presentation/offering brought near to God. 'Offering' is
    the broad, context-appropriate term; 'sacrifice' would be possible but slightly
    narrower and less directly tied to the Hebrew noun.
- source_word: וְשָׁחַט
  chosen: slaughter
  alternatives:
  - kill
  - slay
  lexicon: HALOT
  rationale: The verb is the technical term for slaughtering sacrificial animals.
    'Slaughter' preserves the ritual-sacrificial sense better than the more generic
    'kill' and is more natural in modern English than 'slay.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: Standard cultic-spatial expression meaning in the presence of/before.
    'Before' is concise and idiomatic in this register.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: Established and accurate rendering of the tabernacle designation, preserving
    the Hebrew sense without paraphrase.
- source_word: וְזָרְקוּ
  chosen: shall throw
  alternatives:
  - shall splash
  - shall dash
  - shall sprinkle
  lexicon: HALOT
  rationale: זרק commonly denotes throwing/tossing sacrificial blood against the altar.
    'Throw' best matches the Hebrew verb. 'Sprinkle' is too gentle and can suggest
    a different ritual action.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: Both are accurate; 'Aaron’s sons' is slightly more natural modern English
    while preserving the male familial reference required by the Hebrew.
- source_word: דָּמוֹ
  chosen: its blood
  alternatives:
  - his blood
  lexicon: HALOT
  rationale: The suffix refers to the sacrificial animal. English normally uses 'its'
    for an animal in procedural instruction.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With זרק in sacrificial contexts, English 'against the altar' better
    conveys blood being cast onto the sides/surface of the altar rather than merely
    located on top of it.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on all sides
  lexicon: HALOT
  rationale: This adverb modifies the blood rite at the altar, indicating application
    around the altar's sides. 'All around' is clear, natural, and preserves the distributive
    force.
