id: LEV.3.7
reference: Leviticus 3:7
source:
  edition: WLC
  text: אִם כֶּ֥שֶׂב הֽוּא מַקְרִ֖יב אֶת קָרְבָּנ֑/וֹ וְ/הִקְרִ֥יב אֹת֖/וֹ לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: If he is presenting a sheep as his offering, then he shall present it before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lamb' as his offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional case within the sacrificial instructions. 'If' is the most straightforward English conditional here, though 'when' is possible in legal/instructional contexts.
- source_word: כֶּשֶׂב
  chosen: sheep
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּשֶׂב can denote a sheep, often a young sheep/lamb depending on context. Here the instruction contrasts acceptable animal types, and 'sheep' is broad and natural English without over-specifying age. The alternative 'lamb' is worth preserving because some translations use it.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis or clarity in Hebrew. English naturally renders it with 'he' in the clause 'if he is presenting...'.
- source_word: מַקְרִיב
  chosen: is presenting
  alternatives:
  - brings
  - offers
  lexicon: HALOT
  rationale: The participle of קרב in the Hiphil denotes bringing near/presenting as an offering. 'Is presenting' captures the ongoing or case-setting force of the participle better than a simple present, while remaining readable.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his قربan/corban
  - his sacrifice
  lexicon: HALOT
  rationale: קָרְבָּן is the general term for an offering brought near to God. 'Offering' is the clearest modern English equivalent; 'sacrifice' is possible but somewhat narrower and more loaded.
- source_word: וְהִקְרִיב
  chosen: then he shall present
  alternatives:
  - and he shall bring near
  - and he shall offer
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in this legal context carries instructional force. 'Then he shall present' reflects the sequence and obligation in idiomatic English.
- source_word: אֹתוֹ
  chosen: it
  lexicon: HALOT
  rationale: Refers back to the animal offering; English appropriately uses the inanimate pronoun 'it' for the sacrificial animal in this context.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering for spatial/cultic presentation language. 'Before' is concise and idiomatic in sacrificial contexts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
