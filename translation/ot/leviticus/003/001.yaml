id: LEV.3.1
reference: Leviticus 3:1
source:
  edition: WLC
  text: וְ/אִם זֶ֥בַח שְׁלָמִ֖ים קָרְבָּנ֑/וֹ אִ֤ם מִן הַ/בָּקָר֙ ה֣וּא מַקְרִ֔יב אִם זָכָר֙ אִם נְקֵבָ֔ה תָּמִ֥ים יַקְרִיבֶ֖/נּוּ לִ/פְנֵ֥י יְהוָֽה־־־־׃
translation:
  text: If his offering is a sacrifice of peace offerings, if he offers it from the herd, whether male or female, he shall offer it without blemish before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a peace offering' or 'a sacrifice of fellowship offerings.' The Hebrew says 'a sacrifice of peace offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before Yahweh'; rendered 'before the LORD' following the project's standard treatment of the divine name.
    reason: alternative_reading
lexical_decisions:
- source_word: זֶבַח שְׁלָמִים
  chosen: a sacrifice of peace offerings
  alternatives:
  - a peace offering
  - a sacrifice of fellowship offerings
  lexicon: HALOT
  rationale: זֶבַח is explicitly 'sacrifice,' and שְׁלָמִים names the offering type. Rendering both preserves the Hebrew construction rather than collapsing it too quickly. 'Peace offerings' is the traditional and lexically grounded rendering; 'fellowship offerings' is interpretive and therefore kept as an alternative rather than the main text.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربan/offering
  lexicon: HALOT
  rationale: קָרְבָּן is the general term for an offering/presentation brought near. 'Offering' is clear modern English and fits sacrificial context better than the broader 'gift.'
- source_word: מִן הַבָּקָר
  chosen: from the herd
  alternatives:
  - from the cattle
  - from the bovines
  lexicon: HALOT
  rationale: בָּקָר refers to herd animals of the bovine kind. 'From the herd' is natural English and contextually clear in sacrificial legislation.
- source_word: מַקְרִיב
  chosen: offers
  alternatives:
  - brings near
  - presents
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer. 'Offers' is idiomatic and preserves the cultic sense without awkward literalism.
- source_word: אִם זָכָר אִם נְקֵבָה
  chosen: whether male or female
  alternatives:
  - if male or if female
  lexicon: HALOT
  rationale: The paired אִם ... אִם construction is naturally rendered 'whether ... or ...' in English. This preserves the allowance that either sex is acceptable for this offering.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - whole
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תָּמִים denotes an animal free from defect. 'Without blemish' is standard, precise, and readily understood.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' The divine name יְהוָה follows the project's default rendering 'the LORD' per doctrine guidelines.
