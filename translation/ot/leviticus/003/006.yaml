id: LEV.3.6
reference: Leviticus 3:6
source:
  edition: WLC
  text: וְ/אִם מִן הַ/צֹּ֧אן קָרְבָּנ֛/וֹ לְ/זֶ֥בַח שְׁלָמִ֖ים לַ/יהוָ֑ה זָכָר֙ א֣וֹ
    נְקֵבָ֔ה תָּמִ֖ים יַקְרִיבֶֽ/נּוּ־־׃
translation:
  text: And if his offering for a sacrifice of peace offerings to the LORD is from
    the flock, he shall offer it, male or female, without blemish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a sacrifice of fellowship offerings.' The Hebrew term שְׁלָמִים
      is traditionally rendered 'peace offerings' but can also emphasize shared well-being
      or fellowship within the sacrificial meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Retains the conjunction plus conditional particle, linking this case
    to the preceding sacrificial instructions while preserving the conditional sense.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep/goats
  - from the small livestock
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep and goats.
    'From the flock' is idiomatic English and fits sacrificial context without over-specifying
    species beyond the Hebrew collective.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربan/offering
  lexicon: HALOT
  rationale: קָרְבָּן is the standard sacrificial term for an offering brought near.
    'Offering' is the clearest natural English equivalent in Levitical context.
- source_word: לְזֶבַח שְׁלָמִים
  chosen: for a sacrifice of peace offerings
  alternatives:
  - for a sacrifice of fellowship offerings
  - for a peace offering sacrifice
  lexicon: HALOT
  rationale: זֶבַח denotes a sacrifice, and שְׁלָמִים is the technical term traditionally
    rendered 'peace offerings.' This preserves the formal sacrificial terminology
    while remaining readable. 'Fellowship offerings' is possible but less directly
    tied to the Hebrew term.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's mandated rendering of YHWH as 'the LORD.' 'To the
    LORD' reflects the lamed here as indicating dedication/presentation.
- source_word: זָכָר אוֹ נְקֵבָה
  chosen: male or female
  lexicon: HALOT
  rationale: A straightforward biological sex distinction in sacrificial qualification.
    Gender-accurate rendering is required and no neutralization is warranted.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  - whole
  lexicon: HALOT
  rationale: In sacrificial contexts תמים denotes an animal free from defect. 'Without
    blemish' is the established and precise English sacrificial idiom.
- source_word: יַקְרִיבֶנּוּ
  chosen: he shall offer it
  alternatives:
  - he shall present it
  - he shall bring it near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer. 'He
    shall offer it' is natural English and preserves the ritual action.
