id: LEV.3.12
reference: Leviticus 3:12
source:
  edition: WLC
  text: וְ/אִ֥ם עֵ֖ז קָרְבָּנ֑/וֹ וְ/הִקְרִיב֖/וֹ לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: But if his offering is a goat, then he shall present it before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD'';
      alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction plus conditional introduces the next case in a sequence
    of sacrificial instructions. 'But if' gives natural English progression and mild
    contrast with the prior animal options without overstating opposition.
- source_word: עֵז
  chosen: a goat
  alternatives:
  - goat
  lexicon: HALOT
  rationale: The noun denotes a goat. The indefinite article is supplied in English
    for natural syntax. Singular matches the Hebrew singular.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his قربan/offering
  - his sacrifice
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near/presented. 'Offering'
    is the broadest and most contextually appropriate rendering here; 'sacrifice'
    would be slightly narrower and more interpretive.
- source_word: וְהִקְרִיבוֹ
  chosen: then he shall present it
  alternatives:
  - and he shall offer it
  - and he shall bring it near
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present as an offering. 'Present
    it' is clear modern English and fits sacrificial context. 'Shall' reflects the
    instructional/legal force of the imperfect in this context.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering for spatial/cultic presentation language; concise
    and idiomatic in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention aligned
    with the LXX pattern.
