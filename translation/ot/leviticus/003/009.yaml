id: LEV.3.9
reference: Leviticus 3:9
source:
  edition: WLC
  text: וְ/הִקְרִ֨יב מִ/זֶּ֣בַח הַ/שְּׁלָמִים֮ אִשֶּׁ֣ה לַ/יהוָה֒ חֶלְבּ/וֹ֙ הָ/אַלְיָ֣ה
    תְמִימָ֔ה לְ/עֻמַּ֥ת הֶ/עָצֶ֖ה יְסִירֶ֑/נָּה וְ/אֶת הַ/חֵ֨לֶב֙ הַֽ/מְכַסֶּ֣ה אֶת
    הַ/קֶּ֔רֶב וְ/אֵת֙ כָּל הַ/חֵ֔לֶב אֲשֶׁ֖ר עַל הַ/קֶּֽרֶב־־־־׃
translation:
  text: 'And from the sacrifice of peace offerings he shall present an offering made
    by fire to the LORD: its fat, the whole fat tail, which he shall remove close
    to the backbone, and the fat that covers the entrails, and all the fat that is
    on the entrails,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrifice of fellowship offerings' or 'sacrifice of well-being offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the whole fat tail'; this refers to the fatty tail of a sheep offered
      in sacrifice.
    reason: cultural_note
  - marker: c
    text: Or 'opposite the backbone' or 'at the base of the spine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: sacrifice of peace offerings
  alternatives:
  - sacrifice of fellowship offerings
  - sacrifice of well-being offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' While 'fellowship offerings' or 'well-being offerings' capture aspects
    of the semantic range, 'peace offerings' preserves continuity with the sacrificial
    system and remains understandable in modern English.
- source_word: אִשֶּׁה
  chosen: an offering made by fire
  alternatives:
  - food offering
  - fire offering
  lexicon: HALOT
  rationale: The term denotes an offering presented on the altar by fire. 'Offering
    made by fire' is a clear, established rendering that avoids implying ordinary
    human food while preserving the ritual sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following
    Jewish reverence tradition and common English Bible convention.
- source_word: חֶלְבּוֹ
  chosen: its fat
  lexicon: HALOT
  rationale: Refers to the animal's fat portions designated for sacrifice. 'Its fat'
    is the natural possessive rendering.
- source_word: הָאַלְיָה תְמִימָה
  chosen: the whole fat tail
  alternatives:
  - the entire fat tail
  - the fat tail whole
  lexicon: HALOT
  rationale: אַלְיָה refers specifically to the broad fatty tail of a sheep. תְמִימָה
    here describes it as whole/intact. 'The whole fat tail' is idiomatic and preserves
    the sacrificial detail.
- source_word: לְעֻמַּת הֶעָצֶה
  chosen: close to the backbone
  alternatives:
  - opposite the backbone
  - at the base of the spine
  lexicon: HALOT
  rationale: The phrase indicates the point of removal in relation to the backbone/tailbone
    area. 'Close to the backbone' communicates the practical anatomical sense in readable
    English.
- source_word: יְסִירֶנָּה
  chosen: which he shall remove
  alternatives:
  - he shall remove it
  lexicon: HALOT
  rationale: Hiphil of סור here means to remove/take away. Relative-clause style in
    English links naturally with the preceding noun phrase.
- source_word: הַחֵלֶב הַמְכַסֶּה אֶת הַקֶּרֶב
  chosen: the fat that covers the entrails
  alternatives:
  - the fat covering the inner parts
  - the fat that covers the inward parts
  lexicon: HALOT
  rationale: קֶרֶב in this sacrificial-anatomical context refers to the inner organs/entrails.
    'Entrails' is concrete and natural without being overly technical.
- source_word: כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  chosen: all the fat that is on the entrails
  alternatives:
  - all the fat that is on the inner parts
  lexicon: HALOT
  rationale: Maintains the distinction between the fat covering the entrails and the
    fat attached to them. Repeating 'entrails' preserves lexical consistency with
    קֶרֶב in the immediate context.
