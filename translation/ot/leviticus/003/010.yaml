id: LEV.3.10
reference: Leviticus 3:10
source:
  edition: WLC
  text: וְ/אֵת֙ שְׁתֵּ֣י הַ/כְּלָיֹ֔ת וְ/אֶת הַ/חֵ֨לֶב֙ אֲשֶׁ֣ר עֲלֵ/הֶ֔ן אֲשֶׁ֖ר
    עַל הַ/כְּסָלִ֑ים וְ/אֶת הַ/יֹּתֶ֨רֶת֙ עַל הַ/כָּבֵ֔ד עַל הַ/כְּלָיֹ֖ת יְסִירֶֽ/נָּה־־־־־׃
translation:
  text: and the two kidneys, and the fat that is on them, which is on the loins, and
    the appendage on the liver, along with the kidneys, he shall remove.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lobe on the liver.' The Hebrew term for this anatomical part (יֹתֶרֶת)
      is uncertain; 'appendage' is used in the main text to avoid overstating precision.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  alternatives:
  - the two kidneys
  lexicon: HALOT
  rationale: כְּלָיֹת straightforwardly denotes the kidneys in sacrificial anatomy.
    Retaining the concrete anatomical term fits both the Hebrew and the ritual context.
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the suet
  - the fatty fat
  lexicon: HALOT
  rationale: חֵלֶב in Levitical sacrificial contexts refers to the choice internal
    fat portions reserved for offering. 'The fat' is the standard, clear English rendering;
    'suet' is possible but less accessible.
- source_word: אֲשֶׁר עֲלֵהֶן
  chosen: that is on them
  alternatives:
  - which is upon them
  lexicon: HALOT
  rationale: This relative clause modifies 'the fat' and specifies its location relative
    to the kidneys. 'That is on them' is natural modern English while preserving the
    spatial sense.
- source_word: הַכְּסָלִים
  chosen: the loins
  alternatives:
  - the flanks
  lexicon: HALOT
  rationale: כְּסָלִים denotes the region of the loins/flanks. 'Loins' is the more
    traditional anatomical term and matches the sacrificial description well; 'flanks'
    is a viable alternative but slightly less precise to the Hebrew idiom.
- source_word: הַיֹּתֶרֶת
  chosen: the appendage
  alternatives:
  - the lobe
  - the long lobe
  lexicon: HALOT
  rationale: יֹתֶרֶת is a difficult anatomical term in sacrificial texts, commonly
    understood as an appendage or lobe associated with the liver. 'Appendage' preserves
    the Hebrew's uncertainty better than over-specifying 'lobe' in the main text.
- source_word: עַל הַכָּבֵד
  chosen: on the liver
  alternatives:
  - over the liver
  - attached to the liver
  lexicon: HALOT
  rationale: The preposition עַל here marks location/attachment. 'On the liver' is
    a simple, direct rendering that leaves the anatomical relation appropriately broad.
- source_word: עַל הַכְּלָיֹת
  chosen: along with the kidneys
  alternatives:
  - beside the kidneys
  - by the kidneys
  - with the kidneys
  lexicon: HALOT
  rationale: In this sacrificial formula, the phrase indicates that the liver appendage
    is removed in connection with the kidneys. 'Along with the kidneys' communicates
    the procedural sense more idiomatically than a rigidly spatial 'on the kidneys,'
    which would be anatomically awkward in English.
- source_word: יְסִירֶנָּה
  chosen: he shall remove
  alternatives:
  - he is to remove
  - he shall take it away
  lexicon: HALOT
  rationale: Hiphil of סור here means to remove/take away in ritual procedure. 'He
    shall remove' fits the prescriptive sacrificial style of the passage.
