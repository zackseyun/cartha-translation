theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of אִשֵּׁה in sacrificial formula
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The Hebrew term is a technical sacrificial expression. 'Food offering' communicates the cultic category in readable English and aligns with the immediate context of altar consumption, while avoiding archaic phrasing. Because 'offering by fire' remains a viable traditional rendering, it is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
