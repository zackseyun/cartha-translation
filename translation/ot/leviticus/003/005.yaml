id: LEV.3.5
reference: Leviticus 3:5
source:
  edition: WLC
  text: וְ/הִקְטִ֨ירוּ אֹת֤/וֹ בְנֵֽי אַהֲרֹן֙ הַ/מִּזְבֵּ֔חָ/ה עַל הָ֣/עֹלָ֔ה אֲשֶׁ֥ר עַל הָ/עֵצִ֖ים אֲשֶׁ֣ר עַל הָ/אֵ֑שׁ אִשֵּׁ֛ה רֵ֥יחַ נִיחֹ֖חַ לַֽ/יהוָֽה־־־־׃פ
translation:
  text: And Aaron’s sons shall burn it on the altar, on top of the burnt offering that is on the wood that is on the fire. It is a food offering, a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “an offering by fire.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִירוּ
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to burning an offering on the altar so that it goes up in smoke. 'Shall burn' is clear modern English; 'offer up in smoke' is more formal but less natural. The future-like force fits the procedural instruction.
- source_word: אֹתוֹ
  chosen: it
  rationale: Direct-object pronoun referring back to the portion of the peace offering specified in the preceding verse.
- source_word: בְנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct phrase. 'Aaron’s sons' is idiomatic modern English while preserving the familial and priestly designation.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Refers to the sacrificial altar. The directional ending does not require a distinct English rendering here; the sense is location/destination in the ritual act.
- source_word: עַל הָעֹלָה
  chosen: on top of the burnt offering
  alternatives:
  - upon the burnt offering
  - beside the burnt offering
  lexicon: HALOT
  rationale: The repeated עַל most naturally indicates placement on top of the already-burning burnt offering, not merely beside it. 'Burnt offering' is the standard rendering of עֹלָה in Leviticus.
- source_word: אֲשֶׁר עַל הָעֵצִים אֲשֶׁר עַל הָאֵשׁ
  chosen: that is on the wood that is on the fire
  alternatives:
  - which is on the wood over the fire
  - that is on the logs over the fire
  lexicon: HALOT
  rationale: The clause carefully describes the arrangement of the altar fire. 'Wood' is the straightforward rendering of עֵצִים here; 'logs' is possible but more specific than the Hebrew requires.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering by fire,' the term denotes an offering made by fire and in Levitical usage is closely associated with Yahweh's food portion. 'Food offering' is clearer in modern English and reflects the cultic sense without implying literal divine consumption in a crude way.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression indicates acceptability to God. 'Pleasing aroma' is idiomatic and accessible; 'soothing aroma' is possible but can suggest emotional calming more than accepted worship.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD.' The preposition ל marks relation/dedication; 'to the LORD' is natural here.
