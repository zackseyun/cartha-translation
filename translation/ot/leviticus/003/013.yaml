id: LEV.3.13
reference: Leviticus 3:13
source:
  edition: WLC
  text: וְ/סָמַ֤ךְ אֶת יָד/וֹ֙ עַל רֹאשׁ֔/וֹ וְ/שָׁחַ֣ט אֹת֔/וֹ לִ/פְנֵ֖י אֹ֣הֶל מוֹעֵ֑ד
    וְ֠/זָרְקוּ בְּנֵ֨י אַהֲרֹ֧ן אֶת דָּמ֛/וֹ עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־־׃
translation:
  text: And he shall lay his hand on its head and slaughter it before the tent of
    meeting, and the sons of Aaron shall throw its blood against the altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dash its blood on the altar all around.' The Hebrew verb can be rendered
      with several English verbs in sacrificial contexts; 'throw' is chosen here as
      the most direct rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: In sacrificial contexts סמך יד על commonly denotes the worshiper placing/pressing
    the hand on the animal. 'Lay' is idiomatic and sufficiently formal in English;
    'lean' is too physical here, while 'place' is slightly flatter.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Singular is explicit in the Hebrew and should be preserved.
- source_word: עַל רֹאשׁוֹ
  chosen: on its head
  alternatives:
  - upon its head
  lexicon: HALOT
  rationale: The suffix refers to the sacrificial animal. 'Its head' is natural modern
    English; 'upon' would be more formal but less readable.
- source_word: וְשָׁחַט
  chosen: slaughter
  alternatives:
  - kill
  - slay
  lexicon: HALOT
  rationale: שׁחט is the standard verb for ritual slaughter. 'Slaughter' preserves
    the sacrificial/ritual sense better than the generic 'kill' and is less archaic
    than 'slay'.
- source_word: לִפְנֵי אֹהֶל מוֹעֵד
  chosen: before the tent of meeting
  alternatives:
  - in front of the tent of meeting
  lexicon: HALOT
  rationale: This is the standard cultic designation. 'Before' preserves the formal
    spatial sense and fits established English usage without becoming archaic.
- source_word: וְזָרְקוּ
  chosen: shall throw
  alternatives:
  - shall splash
  - shall sprinkle
  - shall dash
  lexicon: HALOT
  rationale: זרק in priestly sacrificial procedure refers to tossing/applying blood
    to the altar. 'Throw' is the most direct lexical equivalent. 'Sprinkle' can suggest
    a different Hebrew verb and a lighter action; 'dash' is possible but somewhat
    interpretive. The prepositional phrase 'against the altar' clarifies the action.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: A literal rendering preserves the formal priestly designation and the
    Hebrew construct relationship.
- source_word: דָּמוֹ
  chosen: its blood
  alternatives:
  - the blood of it
  lexicon: HALOT
  rationale: The suffix refers to the animal; idiomatic English uses 'its blood.'
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With זרק, English 'against the altar' better conveys blood being thrown
    onto/at the altar's sides than a static 'on the altar.' This reflects the ritual
    action more precisely.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  lexicon: HALOT
  rationale: This adverb emphasizes the blood application around the altar on every
    side. 'All around' preserves that distributive force more clearly than simply
    'around'.
