id: LEV.3.16
reference: Leviticus 3:16
source:
  edition: WLC
  text: וְ/הִקְטִירָ֥/ם הַ/כֹּהֵ֖ן הַ/מִּזְבֵּ֑חָ/ה לֶ֤חֶם אִשֶּׁה֙ לְ/רֵ֣יחַ נִיחֹ֔חַ כָּל חֵ֖לֶב לַ/יהוָֽה־׃
translation:
  text: And the priest shall burn them on the altar as food, an offering made by fire for a pleasing aroma. All the fat belongs to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'food offering'; literally 'bread/food of a fire offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a soothing aroma' or 'for a sweet aroma.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''All the fat is for the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִירָם
  chosen: And the priest shall burn them
  alternatives:
  - and he shall turn them into smoke
  - and the priest shall offer them up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to burning on the altar so that the offering goes up in smoke. 'Burn them' is clear modern English; 'them' is retained from the 3mp suffix, referring back to the sacrificial portions specified in context.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - at the altar
  lexicon: HALOT
  rationale: Directional/locative ending here idiomatically indicates the altar as the place of burning. 'On the altar' is the standard and most natural rendering in this sacrificial context.
- source_word: לֶחֶם אִשֶּׁה
  chosen: as food, an offering made by fire
  alternatives:
  - food offering
  - bread of a fire offering
  - food of the offering by fire
  lexicon: HALOT
  rationale: Literally 'bread/food of an offering by fire.' Since English 'bread' would mislead here, לֶחֶם is rendered more broadly as 'food.' אִשֶּׁה is expressed as 'an offering made by fire' to preserve the sacrificial idiom without archaic phrasing.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: for a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet aroma
  lexicon: HALOT
  rationale: This fixed sacrificial formula denotes acceptability to God, not divine olfactory pleasure in a crude sense. 'Pleasing aroma' is idiomatic, readable, and preserves the metaphor without overinterpreting it.
- source_word: כָּל חֵלֶב
  chosen: All the fat
  alternatives:
  - all fat
  - the whole fat portion
  lexicon: HALOT
  rationale: The phrase is comprehensive and emphatic in context, referring to the sacrificial fat portions reserved for God. 'All the fat' preserves the totalizing force of כָּל.
- source_word: לַיהוָה
  chosen: belongs to the LORD
  alternatives:
  - is for the LORD
  - is the LORD's
  lexicon: HALOT
  rationale: The preposition ל marks dedication/possession here. 'Belongs to the LORD' makes explicit in natural English that the fat is reserved for YHWH. Per doctrine, יהוה is rendered 'the LORD.'
