id: LEV.3.4
reference: Leviticus 3:4
source:
  edition: WLC
  text: וְ/אֵת֙ שְׁתֵּ֣י הַ/כְּלָיֹ֔ת וְ/אֶת הַ/חֵ֨לֶב֙ אֲשֶׁ֣ר עֲלֵ/הֶ֔ן אֲשֶׁ֖ר
    עַל הַ/כְּסָלִ֑ים וְ/אֶת הַ/יֹּתֶ֨רֶת֙ עַל הַ/כָּבֵ֔ד עַל הַ/כְּלָי֖וֹת יְסִירֶֽ/נָּה־־־־־׃
translation:
  text: and the two kidneys, and the fat that is on them, which is on the loins, and
    the appendage on the liver, along with the kidneys, he shall remove.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lobe on the liver.' The Hebrew term for this anatomical part is
      uncertain; 'appendage' is used in the main text to avoid overstating precision.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  alternatives:
  - the pair of kidneys
  lexicon: HALOT
  rationale: כְּלָיֹת plainly denotes the kidneys as anatomical organs in sacrificial
    instructions. 'The two kidneys' is direct and natural English.
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the suet
  lexicon: HALOT
  rationale: חֵלֶב in Levitical sacrificial contexts refers to the fatty portions
    reserved for offering. 'The fat' is the standard clear rendering; 'suet' is more
    technical and less readable.
- source_word: אֲשֶׁר עֲלֵהֶן
  chosen: that is on them
  alternatives:
  - which is upon them
  lexicon: HALOT
  rationale: The relative clause modifies 'the fat' and specifies its location with
    respect to the kidneys. 'That is on them' is idiomatic modern English while preserving
    the spatial sense.
- source_word: הַכְּסָלִים
  chosen: the loins
  alternatives:
  - the flanks
  lexicon: HALOT
  rationale: כְּסָלִים refers to the region of the loins/flanks. 'Loins' fits the
    anatomical-sacrificial register and matches traditional usage without becoming
    archaic in this context.
- source_word: הַיֹּתֶרֶת
  chosen: the appendage
  alternatives:
  - the lobe
  - the long lobe
  lexicon: HALOT
  rationale: יוֹתֶרֶת is a difficult anatomical term in sacrificial texts, traditionally
    understood as a protruding part associated with the liver. 'Appendage' preserves
    the uncertainty better than the more interpretive 'lobe,' while remaining intelligible.
- source_word: עַל הַכָּבֵד
  chosen: on the liver
  alternatives:
  - over the liver
  - attached to the liver
  lexicon: HALOT
  rationale: The preposition עַל here marks anatomical position. 'On the liver' is
    the most straightforward rendering; 'attached to' is interpretive.
- source_word: עַל הַכְּלָיוֹת
  chosen: along with the kidneys
  alternatives:
  - beside the kidneys
  - by the kidneys
  lexicon: HALOT
  rationale: In this sacrificial formula, the phrase indicates that the liver appendage
    is removed together with the kidneys. Rendering it 'along with the kidneys' communicates
    the procedural sense in natural English better than a strictly spatial 'upon the
    kidneys,' which would be anatomically awkward.
- source_word: יְסִירֶנָּה
  chosen: he shall remove
  alternatives:
  - he is to remove
  - he shall take it away
  lexicon: HALOT
  rationale: The Hiphil of סור here gives the ritual instruction to remove these portions.
    'He shall remove' preserves the prescriptive force and matches the legal style
    of the passage.
