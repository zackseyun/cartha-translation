theological_decisions:
- issue: Rendering the sacrificial idiom לֶחֶם אִשֶּׁה
  chosen_reading: as food, an offering made by fire
  alternative_readings:
  - as the food of the fire offering
  - as bread, a fire offering
  rationale: The Hebrew combines two cultic terms. Rendering it idiomatically as 'food,
    an offering made by fire' preserves the sacrificial sense without misleading the
    reader into thinking literal bread is in view. This is a lexical-theological decision
    because the phrase speaks analogically of God's altar portion, not divine physical
    nourishment.
  doctrine_reference: 'Translation philosophy: optimal equivalence; YHWH -> the LORD'
