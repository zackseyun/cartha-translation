id: LEV.3.11
reference: Leviticus 3:11
source:
  edition: WLC
  text: וְ/הִקְטִיר֥/וֹ הַ/כֹּהֵ֖ן הַ/מִּזְבֵּ֑חָ/ה לֶ֥חֶם אִשֶּׁ֖ה לַ/יהוָֽה׃פ
translation:
  text: The priest shall burn it on the altar as food, an offering made by fire to
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread of a fire offering to the LORD'; here 'bread' functions idiomatically
      for food in the sacrificial system.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִירוֹ
  chosen: shall burn it
  alternatives:
  - shall turn it into smoke
  - shall offer it up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to burning on the altar
    so that the offering goes up in smoke. 'Shall burn it' is clear modern English;
    the alternatives preserve the more explicit smoke nuance but are less natural
    in the main text.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - at the altar
  lexicon: HALOT
  rationale: Directional ending with the altar in sacrificial procedure is naturally
    rendered 'on the altar,' matching the act of burning the portion there.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  - food offering
  lexicon: HALOT
  rationale: Although לֶחֶם often literally means 'bread,' in sacrificial idiom here
    it denotes food associated with God's altar portion. 'Food' best fits the idiom
    in English without implying literal baked bread. 'Bread' is preserved as an alternative
    because of the Hebrew wording.
- source_word: אִשֶּׁה
  chosen: an offering made by fire
  alternatives:
  - fire offering
  - food gift by fire
  lexicon: HALOT
  rationale: This technical sacrificial term refers to an offering presented by fire.
    'An offering made by fire' is a familiar and transparent English rendering that
    avoids awkwardness while preserving the ritual sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל is well
    represented by 'to' in this dedicatory context.
