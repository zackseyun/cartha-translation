theological_decisions:
- issue: Ritual action of blood application
  chosen_reading: shall throw the blood against the altar on all sides
  alternative_readings:
  - shall sprinkle the blood on the altar all around
  - shall dash the blood against the altar all around
  rationale: The Hebrew verb זרק most naturally denotes throwing/tossing rather than
    the more specialized English 'sprinkle.' This avoids importing a different ritual
    nuance while preserving the sacrificial procedure described.
