id: LEV.3.2
reference: Leviticus 3:2
source:
  edition: WLC
  text: וְ/סָמַ֤ךְ יָד/וֹ֙ עַל רֹ֣אשׁ קָרְבָּנ֔/וֹ וּ/שְׁחָט֕/וֹ פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד
    וְ/זָרְק֡וּ בְּנֵי֩ אַהֲרֹ֨ן הַ/כֹּהֲנִ֧ים אֶת הַ/דָּ֛ם עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־׃
translation:
  text: He shall lay his hand on the head of his offering and slaughter it at the
    entrance of the tent of meeting, and Aaron’s sons, the priests, shall throw the
    blood against the altar on all sides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the doorway of the tent of meeting.”
    reason: lexical_alternative
  - marker: b
    text: Or “shall dash the blood against the altar all around.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall press
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts denotes placing or pressing the
    hand upon the animal. 'Lay' is standard, natural English and sufficiently broad,
    while the ritual force can include pressure without requiring an over-specific
    rendering here.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Singular noun with 3ms suffix; rendered straightforwardly as the offerer's
    single hand, matching the Hebrew form.
- source_word: רֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: Concrete anatomical reference; no reason to paraphrase.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his قربan/corban
  - his sacrifice
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'Offering'
    is the broadest accurate English equivalent here; 'sacrifice' would be somewhat
    narrower, though contextually related.
- source_word: וּשְׁחָטוֹ
  chosen: and slaughter it
  alternatives:
  - and kill it
  - and butcher it
  lexicon: HALOT
  rationale: שׁחט is the standard verb for slaughtering sacrificial animals. 'Slaughter'
    preserves the ritual-sacrificial sense better than the more generic 'kill'.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח denotes opening/entrance. 'Entrance' is idiomatic and precise.
    אֹהֶל מוֹעֵד is the established designation for the sanctuary structure; 'tent
    of meeting' preserves the Hebrew sense without importing later temple language.
- source_word: וְזָרְקוּ
  chosen: shall throw
  alternatives:
  - shall splash
  - shall dash
  - shall sprinkle
  lexicon: HALOT
  rationale: זרק commonly refers to tossing or throwing sacrificial blood against
    the altar. 'Throw' is the most direct lexical equivalent. 'Sprinkle' would suggest
    a different ritual action and is less precise here.
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: Aaron’s sons, the priests
  alternatives:
  - the sons of Aaron, the priests
  lexicon: HALOT
  rationale: The appositional phrase identifies Aaron's sons specifically as the priests.
    The chosen rendering is natural English while preserving the familial and priestly
    identification.
- source_word: אֶת־הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Direct object marker omitted in English; noun rendered literally.
- source_word: עַל־הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With זרק of blood, English 'against the altar' best conveys blood being
    cast onto the altar's sides/surface rather than merely located on top of it.
- source_word: סָבִיב
  chosen: on all sides
  alternatives:
  - all around
  - around it
  lexicon: HALOT
  rationale: סביב indicates surrounding circumference. 'On all sides' is clear modern
    English and communicates the blood application around the altar.
