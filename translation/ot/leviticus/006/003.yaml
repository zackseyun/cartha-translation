id: LEV.6.3
reference: Leviticus 6:3
source:
  edition: WLC
  text: וְ/לָבַ֨שׁ הַ/כֹּהֵ֜ן מִדּ֣/וֹ בַ֗ד וּ/מִֽכְנְסֵי בַד֮ יִלְבַּ֣שׁ עַל בְּשָׂר/וֹ֒
    וְ/הֵרִ֣ים אֶת הַ/דֶּ֗שֶׁן אֲשֶׁ֨ר תֹּאכַ֥ל הָ/אֵ֛שׁ אֶת הָ/עֹלָ֖ה עַל הַ/מִּזְבֵּ֑חַ
    וְ/שָׂמ֕/וֹ אֵ֖צֶל הַ/מִּזְבֵּֽחַ־־־־־׃
translation:
  text: And the priest shall put on his linen garment, and he shall put linen undergarments
    on his body, and he shall remove the ashes to which the fire has reduced the burnt
    offering on the altar, and he shall place them beside the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the ashes which the fire consumed from the burnt offering.'
      The Hebrew expression is compact and may be rendered in several close ways.
    reason: lexical_alternative
  - marker: b
    text: '''On his body'' is literally ''on his flesh.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדּוֹ
  chosen: his linen garment
  alternatives:
  - his robe
  - his tunic
  - his measure/attire
  lexicon: HALOT
  rationale: מִדּוֹ in priestly clothing context refers to an official garment; with
    בַד immediately following, the material is specified as linen. 'Garment' is broad
    enough to avoid over-specifying the exact cut while preserving the ritual-clothing
    sense.
- source_word: בַד
  chosen: linen
  alternatives:
  - cloth
  - fine linen
  lexicon: HALOT
  rationale: In priestly legislation בַד denotes linen material. 'Linen' is the standard
    and clearest rendering here.
- source_word: מִכְנְסֵי בַד
  chosen: linen undergarments
  alternatives:
  - linen trousers
  - linen breeches
  - linen shorts
  lexicon: HALOT
  rationale: The term refers to the priestly lower-body garment worn next to the skin.
    'Undergarments' communicates function in natural modern English better than archaic
    'breeches,' while remaining faithful to the source.
- source_word: עַל בְּשָׂרוֹ
  chosen: on his body
  alternatives:
  - on his flesh
  - next to his bare flesh
  lexicon: HALOT
  rationale: Literally 'on his flesh.' 'On his body' is a readable modern rendering
    that preserves the sense of direct bodily wearing without awkwardness.
- source_word: וְהֵרִים
  chosen: he shall remove
  alternatives:
  - he shall lift up
  - he shall take up
  lexicon: HALOT
  rationale: The verb literally means 'lift up/raise,' but in this ritual context
    the action is the removal of ashes from the altar. 'Remove' captures the procedural
    sense in idiomatic English.
- source_word: הַדֶּשֶׁן
  chosen: the ashes
  alternatives:
  - the fatty ashes
  - the ash residue
  lexicon: HALOT
  rationale: In sacrificial context דֶּשֶׁן refers to the ash residue from what the
    fire has consumed on the altar. 'Ashes' is the standard contextual sense.
- source_word: אֲשֶׁר תֹּאכַל הָאֵשׁ אֶת הָעֹלָה
  chosen: to which the fire has reduced the burnt offering
  alternatives:
  - which the fire consumed from the burnt offering
  - that the fire ate from the burnt offering
  lexicon: HALOT
  rationale: The Hebrew literally says 'which the fire shall eat/consume, the burnt
    offering.' The clause identifies the ashes as what remains after the fire consumes
    the burnt offering. 'Has reduced ... to' makes the relation clear in English without
    wooden literalism.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: '''Burnt offering'' is the established and accurate cultic rendering
    for עֹלָה in English; ''ascent offering'' is more etymological but less transparent
    for readers.'
- source_word: אֵצֶל הַמִּזְבֵּחַ
  chosen: beside the altar
  alternatives:
  - next to the altar
  - at the side of the altar
  lexicon: HALOT
  rationale: אֵצֶל denotes proximity at the side of something. 'Beside the altar'
    is concise and natural.
