id: LEV.6.13
reference: Leviticus 6:13
source:
  edition: WLC
  text: זֶ֡ה קָרְבַּן֩ אַהֲרֹ֨ן וּ/בָנָ֜י/ו אֲשֶׁר יַקְרִ֣יבוּ לַֽ/יהוָ֗ה בְּ/יוֹם֙
    הִמָּשַׁ֣ח אֹת֔/וֹ עֲשִׂירִ֨ת הָ/אֵפָ֥ה סֹ֛לֶת מִנְחָ֖ה תָּמִ֑יד מַחֲצִיתָ֣/הּ
    בַּ/בֹּ֔קֶר וּ/מַחֲצִיתָ֖/הּ בָּ/עָֽרֶב־׃
translation:
  text: 'This is the offering of Aaron and his sons, which they shall present to the
    LORD on the day he is anointed: a tenth of an ephah of fine flour as a regular
    grain offering, half of it in the morning and half of it in the evening.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the day of his anointing.' The Hebrew has a singular pronoun ('him'),
      though the verse names 'Aaron and his sons.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרְבַּן
  chosen: offering
  alternatives:
  - gift offering
  - oblation
  lexicon: HALOT
  rationale: A broad sacrificial term; 'offering' is the most natural modern English
    equivalent and fits the cultic context without unnecessary archaism.
- source_word: יַקְרִיבוּ
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present/offer.
    'Shall present' preserves the formal act of bringing before the LORD while reading
    naturally in English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: בְּיוֹם הִמָּשַׁח אֹתוֹ
  chosen: on the day he is anointed
  alternatives:
  - on the day of his anointing
  - when he is anointed
  lexicon: HALOT
  rationale: The infinitive construct with object pronoun denotes the time of anointing.
    'On the day he is anointed' is clear and preserves the temporal force. The singular
    pronoun is retained as in the Hebrew, likely referring to the high priestly office
    represented by Aaron.
- source_word: עֲשִׂירִת הָאֵפָה
  chosen: a tenth of an ephah
  alternatives:
  - one-tenth of an ephah
  lexicon: HALOT
  rationale: A standard measure expression; 'a tenth of an ephah' is idiomatic and
    precise.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in grain offerings.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In Levitical sacrificial legislation this term specifically denotes the
    cereal/grain offering. 'Grain offering' is the clearest contextual rendering.
- source_word: תָּמִיד
  chosen: regular
  alternatives:
  - continual
  - perpetual
  lexicon: HALOT
  rationale: The term indicates ongoing regularity. 'Regular' communicates the sense
    in accessible modern English without implying uninterrupted physical continuity.
- source_word: מַחֲצִיתָהּ ... וּמַחֲצִיתָהּ
  chosen: half of it ... and half of it
  alternatives:
  - one half ... and one half
  lexicon: HALOT
  rationale: Directly reflects the division of the offering into two equal portions.
- source_word: בַּבֹּקֶר ... בָּעָרֶב
  chosen: in the morning ... in the evening
  alternatives:
  - at morning ... at evening
  lexicon: HALOT
  rationale: Natural temporal English corresponding to the Hebrew prepositional phrases.
