theological_decisions:
- issue: Reference of the singular pronoun in 'on the day he is anointed' within 'Aaron
    and his sons'
  chosen_reading: Retain the singular as referring representatively to the anointed
    priestly office, beginning with Aaron.
  alternative_readings:
  - 'Understand it distributively: ''on the day they are anointed'''
  - Emend by sense to a plural reference to Aaron and his sons collectively
  rationale: The Masoretic text has a singular object pronoun. Rather than smoothing
    it to the plural, the translation preserves the source wording. In context, Aaron
    stands as the primary referent and representative head of the priesthood, while
    the law extends to his sons.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
