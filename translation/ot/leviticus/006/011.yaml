id: LEV.6.11
reference: Leviticus 6:11
source:
  edition: WLC
  text: כָּל זָכָ֞ר בִּ/בְנֵ֤י אַהֲרֹן֙ יֹֽאכֲלֶ֔/נָּה חָק עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם מֵ/אִשֵּׁ֖י יְהוָ֑ה כֹּ֛ל אֲשֶׁר יִגַּ֥ע בָּ/הֶ֖ם יִקְדָּֽשׁ־־־׃פ
translation:
  text: Every male among the sons of Aaron may eat of it. It is a permanent statute throughout your generations from the food offerings of Yahweh. Whatever touches them shall become holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whatever touches them shall be consecrated.' The Hebrew may denote becoming holy through contact; some understand it more restrictively as implying that only what is holy may touch them.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל זָכָר
  chosen: Every male
  alternatives:
  - Every man
  - Any male
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine singular used distributively. 'Male' is more precise than 'man' in a priestly eligibility context.
- source_word: בִּבְנֵי אַהֲרֹן
  chosen: among the sons of Aaron
  alternatives:
  - of Aaron's sons
  - among Aaron's descendants
  lexicon: HALOT
  rationale: Retains the familial/priestly designation literally. 'Sons of Aaron' is the standard priestly expression and should not be broadened to all descendants without warrant.
- source_word: יֹאכֲלֶנָּה
  chosen: may eat of it
  alternatives:
  - shall eat it
  - is to eat it
  lexicon: HALOT
  rationale: The verb refers back to the offering portion in the preceding context. 'May eat of it' communicates authorized priestly permission/entitlement in legal style, and 'of it' is natural English for partaking of a sacrificial portion.
- source_word: חָק עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: Conveys enduring legal force in idiomatic modern English. 'Permanent' is clearer for contemporary readers than 'perpetual/everlasting' while preserving the legal sense.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the covenantal formula indicating ongoing applicability across successive generations.
- source_word: מֵאִשֵּׁי יְהוָה
  chosen: from the food offerings of the LORD
  alternatives:
  - from the offerings made by fire to the LORD
  - from the LORD's fire offerings
  lexicon: HALOT
  rationale: '''Food offerings'' is a clear contextual rendering of אִשֵּׁי in Leviticus for sacrificial portions presented by fire. It avoids the misleadingly mechanical English ''offerings made by fire'' while preserving sacrificial meaning.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: כֹּל אֲשֶׁר יִגַּע בָּהֶם
  chosen: Whatever touches them
  alternatives:
  - Anyone who touches them
  - Anything that touches them
  lexicon: HALOT
  rationale: The Hebrew construction is broad and does not specify person versus object. 'Whatever' preserves that breadth better than narrowing to 'anyone' or 'anything'.
- source_word: יִקְדָּשׁ
  chosen: shall become holy
  alternatives:
  - shall be holy
  - shall be consecrated
  lexicon: HALOT
  rationale: The verb here indicates acquisition of holiness through contact with holy sacrificial matter. 'Become holy' makes the resulting change of state explicit in English.
