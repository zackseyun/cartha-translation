theological_decisions:
- issue: Meaning of holiness transfer in the final clause
  chosen_reading: The clause states that contact with these holy offerings imparts holiness to the thing/person touching them.
  alternative_readings:
  - 'The clause could be taken restrictively: only what is already holy may touch them.'
  - The clause could be read as a warning that contact places the toucher under holy status/consecration obligations.
  rationale: The plain sense of the Hebrew verb יִקְדָּשׁ after 'whatever touches them' most naturally expresses resultant sanctification rather than mere permission of contact. This matches the sacrificial holiness logic in Leviticus, while leaving the practical implications to context.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
