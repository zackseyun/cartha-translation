id: LEV.6.18
reference: Leviticus 6:18
source:
  edition: WLC
  text: דַּבֵּ֤ר אֶֽל אַהֲרֹן֙ וְ/אֶל בָּנָ֣י/ו לֵ/אמֹ֔ר זֹ֥את תּוֹרַ֖ת הַֽ/חַטָּ֑את
    בִּ/מְק֡וֹם אֲשֶׁר֩ תִּשָּׁחֵ֨ט הָ/עֹלָ֜ה תִּשָּׁחֵ֤ט הַֽ/חַטָּאת֙ לִ/פְנֵ֣י יְהוָ֔ה
    קֹ֥דֶשׁ קָֽדָשִׁ֖ים הִֽוא־־׃
translation:
  text: 'Speak to Aaron and to his sons, saying, ‘This is the law of the sin offering:
    in the place where the burnt offering is slaughtered, the sin offering shall be
    slaughtered before the LORD. It is most holy.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering'; the Hebrew term חַטָּאת can
      denote both sin and the offering associated with purification from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר, a standard directive formula introducing divine
    instruction. 'Speak' preserves the formal legislative tone better than the slightly
    looser 'tell.'
- source_word: אֶל אַהֲרֹן וְאֶל בָּנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - to Aaron and his sons
  lexicon: HALOT
  rationale: Retains both prepositions as in the Hebrew for clarity and formality.
    'His sons' is the natural rendering of בָּנָיו in priestly context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive construct introducing quoted speech;
    keeps the legal formula compact and idiomatic.
- source_word: זֹאת תּוֹרַת
  chosen: This is the law of
  alternatives:
  - This is the instruction for
  - This is the regulation for
  lexicon: HALOT
  rationale: תּוֹרָה in sacrificial legislation often means instruction/regulation,
    but 'law' remains clear, traditional, and suitably weighty here. The construct
    phrase is preserved straightforwardly.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חַטָּאת commonly denotes the offering
    rather than abstract 'sin.' 'Sin offering' is the most recognizable and contextually
    accurate rendering, though 'purification offering' is a defensible alternative
    emphasizing ritual cleansing.
- source_word: בִּמְקוֹם
  chosen: in the place
  alternatives:
  - at the place
  - in the المكان where
  lexicon: HALOT
  rationale: A literal and natural rendering of the locative phrase introducing the
    slaughter location.
- source_word: אֲשֶׁר תִּשָּׁחֵט הָעֹלָה
  chosen: where the burnt offering is slaughtered
  alternatives:
  - where the burnt offering is killed
  lexicon: HALOT
  rationale: The Niphal of שׁחט in sacrificial contexts is best rendered 'is slaughtered,'
    which is precise and appropriately cultic without being obscure. עֹלָה is the
    technical term 'burnt offering.'
- source_word: תִּשָּׁחֵט הַחַטָּאת
  chosen: the sin offering shall be slaughtered
  alternatives:
  - the sin offering is to be slaughtered
  - the sin offering must be slaughtered
  lexicon: HALOT
  rationale: The imperfect here functions prescriptively in legal material. 'Shall
    be slaughtered' preserves the legislative force and parallelism with the preceding
    clause.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Follows the doctrinal default for יְהוָה as 'the LORD.' 'Before the LORD'
    is the standard covenantal/cultic idiom and fits sacrificial legislation well.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - supremely holy
  lexicon: HALOT
  rationale: The Hebrew superlative construction denotes the highest degree of holiness.
    For the offering itself, 'most holy' is idiomatic English; 'holy of holies' would
    sound like the sanctuary term rather than the classification of the sacrifice.
- source_word: הִוא
  chosen: It is
  alternatives:
  - This is
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the feminine noun חַטָּאת ('sin offering').
    'It is' makes the predication natural in English.
