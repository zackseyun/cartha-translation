id: LEV.6.22
reference: Leviticus 6:22
source:
  edition: WLC
  text: כָּל זָכָ֥ר בַּ/כֹּהֲנִ֖ים יֹאכַ֣ל אֹתָ֑/הּ קֹ֥דֶשׁ קָֽדָשִׁ֖ים הִֽוא־׃
translation:
  text: Every male among the priests may eat it; it is most holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a holiness of holinesses,' an idiom meaning 'most holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the construction with the singular noun זָכָר:
    ''every male'' rather than the more collective ''all males.'''
- source_word: זָכָר
  chosen: male
  alternatives:
  - man
  lexicon: HALOT
  rationale: The Hebrew denotes maleness specifically, not adult status or humanity
    in general. 'Male' is the most precise and gender-accurate rendering in this cultic
    eligibility context.
- source_word: בַּכֹּהֲנִים
  chosen: among the priests
  alternatives:
  - of the priests
  lexicon: HALOT
  rationale: The preposition ב with the definite noun here marks membership within
    the priestly group. 'Among the priests' is natural English and preserves the sense
    that any qualified male within the priestly class may eat.
- source_word: יֹאכַל
  chosen: may eat
  alternatives:
  - shall eat
  - is to eat
  lexicon: HALOT
  rationale: The imperfect here expresses permitted/regulated action in legal material.
    'May eat' communicates authorized access better than a simple future and avoids
    implying a command to every individual priest.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this offering
  - it (feminine)
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the offering portion under discussion.
    English requires only 'it'; supplying 'offering' would be interpretive expansion
    beyond the immediate wording.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a most holy thing
  lexicon: HALOT
  rationale: This superlative idiom regularly denotes the highest degree of holiness
    for sacrificial items. 'Most holy' is idiomatic modern English and avoids the
    spatial connotation that 'holy of holies' can suggest.
- source_word: הִוא
  chosen: it is
  alternatives:
  - she is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with the antecedent in Hebrew, but English
    uses the neuter for an offering. Rendering it explicitly as 'it is' makes the
    verbless clause natural in English.
