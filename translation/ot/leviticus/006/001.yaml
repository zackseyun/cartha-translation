id: LEV.6.1
reference: Leviticus 6:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר introduces the next narrative step. 'And ... spoke' preserves the standard Hebrew narrative flow and the distinction from אמר ('say'). 'Then' is possible stylistically, but 'And' better reflects the source without over-interpreting sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct formula after a speech-introduction is idiomatically rendered 'saying' in English. This preserves the formal introduction to the direct discourse that follows in the next verse.
