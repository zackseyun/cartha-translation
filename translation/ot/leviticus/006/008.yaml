theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    Jewish reverence tradition and longstanding English convention while signaling
    the underlying divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic phrase רֵיחַ נִיחֹחַ
  chosen_reading: a pleasing aroma
  alternative_readings:
  - a soothing aroma
  - a sweet aroma
  rationale: The phrase is rendered in accessible modern English without importing
    a mechanistic theology of sacrifice. 'Pleasing aroma' preserves the idea of divine
    acceptance while remaining readable.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
