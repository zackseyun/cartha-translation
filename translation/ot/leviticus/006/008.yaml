id: LEV.6.8
reference: Leviticus 6:8
source:
  edition: WLC
  text: וְ/הֵרִ֨ים מִמֶּ֜/נּוּ בְּ/קֻמְצ֗/וֹ מִ/סֹּ֤לֶת הַ/מִּנְחָה֙ וּ/מִ/שַּׁמְנָ֔/הּ
    וְ/אֵת֙ כָּל הַ/לְּבֹנָ֔ה אֲשֶׁ֖ר עַל הַ/מִּנְחָ֑ה וְ/הִקְטִ֣יר הַ/מִּזְבֵּ֗חַ
    רֵ֧יחַ נִיחֹ֛חַ אַזְכָּרָתָ֖/הּ לַ/יהוָֽה־־׃
translation:
  text: And he shall take up from it a handful of the fine flour of the grain offering
    and some of its oil, with all the frankincense that is on the grain offering,
    and he shall burn its memorial portion on the altar as a pleasing aroma to the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall lift up from it with his handful.' The Hebrew verb and noun
      together emphasize taking up the designated handful from the offering.
    reason: lexical_alternative
  - marker: b
    text: '''Memorial portion'' translates a technical sacrificial term for the representative
      part of the grain offering burned on the altar.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵרִים
  chosen: he shall take up
  alternatives:
  - he shall lift up
  - he shall remove
  lexicon: HALOT
  rationale: The Hiphil of רום here refers to taking out the designated portion from
    the offering. 'Take up' is natural English while still reflecting the upward/removal
    sense better than a flat 'take.' Future-like 'shall' fits the instructional legal
    style.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from this
  - from the offering
  lexicon: HALOT
  rationale: The pronoun refers back to the grain offering under discussion. 'From
    it' preserves the Hebrew pronominal reference without over-specifying.
- source_word: בְּקֻמְצוֹ
  chosen: a handful
  alternatives:
  - with his fistful
  - in his handful
  lexicon: HALOT
  rationale: The noun denotes the quantity grasped in the hand. English idiom favors
    'a handful.' The possessive 'his' is implicit in the Hebrew suffix but unnecessary
    in English here.
- source_word: מִסֹּלֶת
  chosen: of the fine flour
  alternatives:
  - from the choice flour
  - from the flour
  lexicon: HALOT
  rationale: סֹלֶת is specifically fine flour, a technical sacrificial ingredient.
    Retaining 'fine flour' preserves cultic precision.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus is the established cereal/grain offering. 'Grain
    offering' is the clearest standard rendering in this cultic context.
- source_word: וּמִשַּׁמְנָהּ
  chosen: and some of its oil
  alternatives:
  - and from its oil
  - with its oil
  lexicon: HALOT
  rationale: 'The preposition repeats the partitive idea: a portion is taken from
    the oil associated with the offering, not necessarily all of it. ''Some of its
    oil'' communicates this naturally.'
- source_word: וְאֵת כָּל הַלְּבֹנָה אֲשֶׁר עַל הַמִּנְחָה
  chosen: with all the frankincense that is on the grain offering
  alternatives:
  - and all the frankincense that is on the grain offering
  - together with all the incense on the grain offering
  lexicon: HALOT
  rationale: לְבֹנָה is frankincense specifically, not generic incense. 'With all'
    captures that all the frankincense, unlike only part of the flour and oil, is
    included in the memorial portion.
- source_word: וְהִקְטִיר
  chosen: he shall burn
  alternatives:
  - he shall turn into smoke
  - he shall offer up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts this verb means to burn on the altar as an offering.
    'Burn' is readable modern English; the altar context supplies the sacrificial
    nuance.
- source_word: הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard cultic rendering. 'On' is modern and clear.
- source_word: רֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial phrase indicates acceptability before God, not
    divine olfactory pleasure in a crude sense. 'Pleasing aroma' is idiomatic and
    widely understood.
- source_word: אַזְכָּרָתָהּ
  chosen: its memorial portion
  alternatives:
  - its reminder portion
  - its memorial offering
  lexicon: HALOT
  rationale: This technical term refers to the representative portion burned as the
    memorial part of the grain offering. 'Memorial portion' preserves the cultic sense
    better than a generic 'memorial.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the direction
    of the offering in this clause.
