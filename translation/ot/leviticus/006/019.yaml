id: LEV.6.19
reference: Leviticus 6:19
source:
  edition: WLC
  text: הַ/כֹּהֵ֛ן הַֽ/מְחַטֵּ֥א אֹתָ֖/הּ יֹאכֲלֶ֑/נָּה בְּ/מָק֤וֹם קָדֹשׁ֙ תֵּֽאָכֵ֔ל
    בַּ/חֲצַ֖ר אֹ֥הֶל מוֹעֵֽד׃
translation:
  text: The priest who offers it for sin shall eat it. It shall be eaten in a holy
    place, in the court of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The priest who presents it as a sin offering shall eat it.' The Hebrew
      participle can denote officiating the sin-offering rite more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  chosen: The priest
  alternatives:
  - the priestly one
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן as 'priest.' The definite article is preserved
    with 'the.'
- source_word: הַמְחַטֵּא אֹתָהּ
  chosen: who offers it for sin
  alternatives:
  - who makes atonement with it
  - who purifies by it
  - who presents it as a sin offering
  lexicon: HALOT
  rationale: The participle from חטא in the piel can mean to de-sin/purify or to perform
    the sin-offering rite. In sacrificial context, the sense is the priest officiating
    with this offering. 'Offers it for sin' is clear modern English and avoids the
    misleadingly wooden 'sins it.'
- source_word: יֹאכֲלֶנָּה
  chosen: shall eat it
  alternatives:
  - is to eat it
  - may eat it
  lexicon: HALOT
  rationale: Imperfect here expresses prescription within cultic law; 'shall eat it'
    best conveys the legal instruction.
- source_word: בְּמָקוֹם קָדֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article on 'place,' so 'a holy place' is more formally
    accurate than 'the holy place.' 'Holy' is preferred over 'sacred' for consistency
    with cultic terminology.
- source_word: תֵּאָכֵל
  chosen: It shall be eaten
  alternatives:
  - it is to be eaten
  lexicon: HALOT
  rationale: Niphal imperfect gives a passive prescription. English passive preserves
    the Hebrew focus on the offering rather than the eater.
- source_word: בַּחֲצַר אֹהֶל מוֹעֵד
  chosen: in the court of the tent of meeting
  alternatives:
  - in the courtyard of the tent of meeting
  - in the court of the meeting tent
  lexicon: HALOT
  rationale: Traditional and accurate rendering of the sanctuary precinct. 'Court'
    is concise and natural; 'tent of meeting' is the standard translation of אֹהֶל
    מוֹעֵד.
