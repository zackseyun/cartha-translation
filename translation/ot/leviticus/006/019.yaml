theological_decisions:
- issue: Cultic sense of חטא in priestly sacrificial legislation
  chosen_reading: Rendered functionally as the priest who officiates this offering
    'for sin' rather than a more literal but opaque expression.
  alternative_readings:
  - who makes atonement with it
  - who purifies it
  - who presents it as a sin offering
  rationale: The Hebrew verb carries specialized sacrificial force in Leviticus. The
    chosen wording preserves the sin-offering context without over-specifying atonement
    language not explicit in this clause. It also avoids importing later doctrinal
    categories while remaining intelligible.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Reference of the feminine pronouns
  chosen_reading: The pronouns refer to the sacrificial animal/offering and are rendered
    as 'it.'
  alternative_readings:
  - her
  rationale: Although grammatically feminine in Hebrew, English idiom for an animal/offering
    in legal-sacrificial instruction is 'it.' This follows gender-accurate translation
    by matching source intent rather than grammatical form alone.
  doctrine_reference: Translation philosophy §4
