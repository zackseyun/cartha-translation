id: LEV.6.20
reference: Leviticus 6:20
source:
  edition: WLC
  text: כֹּ֛ל אֲשֶׁר יִגַּ֥ע בִּ/בְשָׂרָ֖/הּ יִקְדָּ֑שׁ וַ/אֲשֶׁ֨ר יִזֶּ֤ה מִ/דָּמָ/הּ֙
    עַל הַ/בֶּ֔גֶד אֲשֶׁר֙ יִזֶּ֣ה עָלֶ֔י/הָ תְּכַבֵּ֖ס בְּ/מָק֥וֹם קָדֹֽשׁ־־׃
translation:
  text: Anything that touches its flesh shall become holy, and if any of its blood
    is spattered on a garment, you shall wash what was spattered on it in a holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is sprinkled.' The Hebrew verb can denote ritual sprinkling, but here
      'spattered' was chosen because the blood lands on a garment and the context
      concerns washing it afterward.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  chosen: Anything that
  alternatives:
  - Whoever
  - Everything that
  lexicon: HALOT
  rationale: The construction is an indefinite comprehensive expression. 'Anything
    that' is natural English and fits the impersonal scope of objects or persons coming
    into contact with the sacrifice.
- source_word: יִגַּע בִּבְשָׂרָהּ
  chosen: touches its flesh
  alternatives:
  - touches its meat
  - touches its body
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In sacrificial context it refers to
    the flesh of the offering. 'Flesh' preserves the concrete cultic wording better
    than 'meat,' while 'its' reflects the feminine suffix referring to the sin offering.
- source_word: יִקְדָּשׁ
  chosen: shall become holy
  alternatives:
  - shall be holy
  - shall be consecrated
  lexicon: HALOT
  rationale: The verb קדשׁ in the Qal here indicates entering a holy status through
    contact with the holy offering. 'Shall become holy' best captures the resulting
    change of status; 'be consecrated' could imply a formal ritual not stated in the
    text.
- source_word: וַאֲשֶׁר יִזֶּה מִדָּמָהּ
  chosen: and if any of its blood is spattered
  alternatives:
  - and when some of its blood is sprinkled
  - and whatever of its blood spatters
  lexicon: HALOT
  rationale: The verb נזה in this context concerns blood being projected onto something.
    Because the object is a garment, 'spattered' communicates accidental or incidental
    blood application better than the more technical 'sprinkled,' which in English
    often suggests intentional ritual action.
- source_word: עַל הַבֶּגֶד
  chosen: on a garment
  alternatives:
  - on the garment
  - on clothing
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English often uses an indefinite
    expression generically in case-law style. 'Garment' is more precise than the collective
    'clothing.'
- source_word: אֲשֶׁר יִזֶּה עָלֶיהָ
  chosen: what was spattered on it
  alternatives:
  - that on which it was spattered
  - the part on which it was sprinkled
  lexicon: HALOT
  rationale: This relative clause refers back to the garment and specifies the blood-spattered
    item/area to be washed. 'What was spattered on it' yields clear modern English
    while preserving the sense of the clause.
- source_word: תְּכַבֵּס
  chosen: you shall wash
  alternatives:
  - you shall launder
  - it shall be washed
  lexicon: HALOT
  rationale: The Piel of כבס means to wash garments. 'You shall wash' preserves the
    direct legal instruction in second masculine singular, addressed to the responsible
    priest or officiant.
- source_word: בְּמָקוֹם קָדֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article on 'holy place' here and likely means within
    a sanctified area rather than specifically the inner sanctuary. 'In a holy place'
    preserves that nuance without over-specifying.
