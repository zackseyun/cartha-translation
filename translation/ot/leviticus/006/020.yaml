theological_decisions:
- issue: Meaning of holiness imparted by contact with the sin offering
  chosen_reading: Contact with the offering's flesh conveys sanctity/holy status to
    the thing or person touching it.
  alternative_readings:
  - Contact makes the object restricted to sacred use without implying moral holiness
  rationale: The cultic context concerns ritual holiness rather than inward moral
    transformation. The translation 'shall become holy' preserves the text's wording
    while allowing readers to understand this as ceremonial sanctity in context.
