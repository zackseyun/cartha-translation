id: LEV.6.2
reference: Leviticus 6:2
source:
  edition: WLC
  text: צַ֤ו אֶֽת אַהֲרֹן֙ וְ/אֶת בָּנָ֣י/ו לֵ/אמֹ֔ר זֹ֥את תּוֹרַ֖ת הָ/עֹלָ֑ה הִ֣וא
    הָ/עֹלָ֡ה עַל֩ מוֹקְדָ֨ה עַל הַ/מִּזְבֵּ֤חַ כָּל הַ/לַּ֨יְלָה֙ עַד הַ/בֹּ֔קֶר
    וְ/אֵ֥שׁ הַ/מִּזְבֵּ֖חַ תּ֥וּקַד בּֽ/וֹ־־־־־׃
translation:
  text: 'Command Aaron and his sons, saying, This is the law of the burnt offering:
    the burnt offering itself shall remain on its hearth on the altar all night until
    the morning, and the fire of the altar shall be kept burning on it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This is the instruction for the burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the burnt offering shall be on the place of burning on the altar.'
      The Hebrew term refers to the burning place or hearth of the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  chosen: Command
  alternatives:
  - Give orders to
  - Instruct
  lexicon: HALOT
  rationale: Imperative of צוה, a direct command. 'Command' preserves the force better
    than the softer 'instruct.'
- source_word: אַהֲרֹן וְאֶת־בָּנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his children
  lexicon: HALOT
  rationale: Standard rendering of the proper name plus בנים with 3ms suffix. 'Sons'
    is gender-accurate and contextually specific to the priestly males.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Conventional rendering of the infinitive introducing direct speech; natural
    in English after a command formula.
- source_word: זֹאת תּוֹרַת
  chosen: This is the law of
  alternatives:
  - This is the instruction for
  - This is the regulation for
  lexicon: HALOT
  rationale: תורה here introduces the prescribed rule governing the offering. 'Law'
    is concise and traditional, while still fitting the legal-sacrificial context.
    Alternatives are viable, but 'law' best matches the formulaic register.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: Established and accurate rendering for the sacrificial term עֹלָה. 'Ascent
    offering' is more etymologically transparent but less idiomatic in English.
- source_word: הִוא הָעֹלָה
  chosen: the burnt offering itself
  alternatives:
  - it is the burnt offering
  - this is the burnt offering
  lexicon: HALOT
  rationale: The pronoun plus repeated noun is emphatic. 'The burnt offering itself'
    captures the emphasis without awkward literalism.
- source_word: עַל מוֹקְדָה
  chosen: shall remain on its hearth
  alternatives:
  - shall be on its burning place
  - shall be on the place of burning
  lexicon: HALOT
  rationale: מוֹקְדָה refers to the burning place/hearth where the offering burns.
    'Hearth' is concise, natural English for the altar's fire-bed, while preserving
    the concrete image.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  lexicon: HALOT
  rationale: Straightforward rendering of the sacrificial location.
- source_word: כָּל הַלַּיְלָה עַד הַבֹּקֶר
  chosen: all night until the morning
  alternatives:
  - throughout the night until morning
  lexicon: HALOT
  rationale: Keeps the temporal sequence explicit and close to the Hebrew wording.
- source_word: וְאֵשׁ הַמִּזְבֵּחַ תּוּקַד בּוֹ
  chosen: and the fire of the altar shall be kept burning on it
  alternatives:
  - and the altar fire shall burn on it
  - and the fire on the altar shall be kept burning by it
  lexicon: HALOT
  rationale: 'The Hophal form of יקד is passive/causative-passive: the fire is to
    be maintained. ''Shall be kept burning'' conveys the required ongoing maintenance
    better than the simple ''shall burn.'' The suffix in בוֹ most naturally refers
    back to the altar/hearth context; ''on it'' preserves the Hebrew compactness.'
