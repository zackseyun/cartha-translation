theological_decisions:
- issue: Rendering of תּוֹרָה in sacrificial legislation
  chosen_reading: law
  alternative_readings:
  - instruction
  - regulation
  rationale: No major doctrinal dispute is at stake, but the term can be rendered
    in several ways. In this cultic formula, 'law' preserves the formal legal tone
    while remaining understandable. This does not imply the broader Mosaic Torah as
    a canon title here.
  doctrine_reference: Translation philosophy §5
- issue: Nature of the command regarding the altar fire
  chosen_reading: shall be kept burning
  alternative_readings:
  - shall burn
  rationale: The Hebrew verb form indicates that the fire is to be maintained, not
    merely described as burning. This avoids flattening a prescriptive cultic instruction
    into a simple statement of fact.
  doctrine_reference: Translation philosophy §1
