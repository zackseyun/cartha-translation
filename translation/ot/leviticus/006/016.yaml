id: LEV.6.16
reference: Leviticus 6:16
source:
  edition: WLC
  text: וְ/כָל מִנְחַ֥ת כֹּהֵ֛ן כָּלִ֥יל תִּהְיֶ֖ה לֹ֥א תֵאָכֵֽל־׃פ
translation:
  text: And every grain offering of a priest shall be a whole offering; it shall not
    be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be wholly burned.' The Hebrew adjective can denote that the offering
      is entire or complete, with the practical sense here that it is not eaten but
      wholly given over on the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And every
  alternatives:
  - And all
  - Now every
  lexicon: HALOT
  rationale: 'וְ here naturally continues the legal instructions, and כָּל with the
    singular construct noun is distributive: ''every.'' ''And every'' preserves the
    connective and the distributive force in readable English.'
- source_word: מִנְחַת
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  - tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus is the established technical term for the cereal/grain
    offering rather than a generic gift. 'Grain offering' is the clearest cultic rendering
    in modern English and maintains consistency in Levitical sacrificial terminology.
- source_word: כֹּהֵן
  chosen: of a priest
  alternatives:
  - priest's
  lexicon: HALOT
  rationale: The construct chain מִנְחַת כֹּהֵן means 'the grain offering of a priest.'
    The fuller phrasing is slightly more explicit in English than the possessive form
    and avoids ambiguity.
- source_word: כָּלִיל
  chosen: a whole offering
  alternatives:
  - entirely burned
  - wholly burned
  - whole
  lexicon: HALOT
  rationale: כָּלִיל denotes something whole/entire, especially an offering wholly
    turned over in burning. Because the verse does not repeat a verb of burning, 'a
    whole offering' preserves the predicate form while conveying that none is reserved
    for eating. The alternatives make the implied burning more explicit but go slightly
    beyond the immediate wording.
- source_word: תִּהְיֶה
  chosen: shall be
  alternatives:
  - must be
  - is to be
  lexicon: HALOT
  rationale: The imperfect of היה in legal material commonly carries prescriptive
    force. 'Shall be' preserves the formal legal tone without over-paraphrasing.
- source_word: לֹא תֵאָכֵל
  chosen: it shall not be eaten
  alternatives:
  - it must not be eaten
  - none of it shall be eaten
  lexicon: HALOT
  rationale: 'The Niphal imperfect is passive: ''be eaten.'' ''It shall not be eaten''
    closely reflects the Hebrew syntax and legal prohibition. ''None of it'' is interpretively
    accurate but adds an explicit partitive not stated in the text.'
