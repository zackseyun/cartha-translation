id: LEV.6.7
reference: Leviticus 6:7
source:
  edition: WLC
  text: וְ/זֹ֥את תּוֹרַ֖ת הַ/מִּנְחָ֑ה הַקְרֵ֨ב אֹתָ֤/הּ בְּנֵֽי אַהֲרֹן֙ לִ/פְנֵ֣י יְהוָ֔ה אֶל פְּנֵ֖י הַ/מִּזְבֵּֽחַ־־׃
translation:
  text: 'And this is the law of the grain offering: the sons of Aaron shall present it before Yahweh, in front of the altar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction for' or 'regulation of' the grain offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  chosen: And this is
  alternatives:
  - Now this is
  - And this
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new instruction section. 'And this is' preserves the connective force and reads naturally in English.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the regulation of
  lexicon: HALOT
  rationale: תּוֹרָה here introduces the prescribed procedure for an offering. 'Law' is a standard and sufficiently clear rendering in sacrificial legislation, while still allowing the sense of instruction/regulation.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the tribute offering
  - the offering
  lexicon: HALOT
  rationale: מִנְחָה in Levitical sacrificial contexts refers specifically to the cereal/grain offering, not a generic gift. 'Grain offering' is the clearest established English equivalent.
- source_word: הַקְרֵב אֹתָהּ
  chosen: shall present it
  alternatives:
  - shall bring it near
  - is to offer it
  lexicon: HALOT
  rationale: The Hiphil imperative/infinitive-like procedural form from קרב directs the priests to bring the offering forward for ritual presentation. 'Shall present it' captures the cultic action in idiomatic English without over-paraphrasing.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: A literal rendering preserves the familial-priestly designation central to Leviticus. 'The sons of Aaron' is clear and formally close to the Hebrew.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes presentation in the divine presence. 'Before the LORD' is the standard concise rendering. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: אֶל פְּנֵי הַמִּזְבֵּחַ
  chosen: in front of the altar
  alternatives:
  - before the altar
  - toward the front of the altar
  lexicon: HALOT
  rationale: The phrase specifies the spatial locus of presentation relative to the altar. Rendering it distinctly from the earlier לִפְנֵי יְהוָה avoids flattening the two prepositional phrases into one and preserves the concrete ritual setting.
