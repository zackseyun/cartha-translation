theological_decisions:
- issue: Rendering of sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - trespass offering
  rationale: The verse classifies the grain-offering portion alongside other high-holiness
    sacrifices. 'Guilt offering' is the clearest standard English rendering and does
    not import a narrower doctrinal theory beyond the sacrificial category.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Rendering of אִשֶּׁה
  chosen_reading: food offerings
  alternative_readings:
  - offerings made by fire
  - fire offerings
  rationale: The Hebrew term is a technical sacrificial designation. 'Food offerings'
    is more accessible modern English while still reflecting offerings presented to
    God; the traditional fire-language is preserved as an alternative because some
    readers may see combustion as foregrounded.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy over translation tradition)
