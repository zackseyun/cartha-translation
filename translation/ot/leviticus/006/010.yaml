id: LEV.6.10
reference: Leviticus 6:10
source:
  edition: WLC
  text: לֹ֤א תֵאָפֶה֙ חָמֵ֔ץ חֶלְקָ֛/ם נָתַ֥תִּי אֹתָ֖/הּ מֵ/אִשָּׁ֑/י קֹ֤דֶשׁ קָֽדָשִׁים֙
    הִ֔וא כַּ/חַטָּ֖את וְ/כָ/אָשָֽׁם׃
translation:
  text: It shall not be baked with leaven. I have given it as their portion from my
    food offerings. It is most holy, like the sin offering and the guilt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from my offerings made by fire.”
    reason: lexical_alternative
  - marker: b
    text: Or “and the reparation offering” or traditional “and the trespass offering.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵאָפֶה
  chosen: shall not be baked
  alternatives:
  - must not be baked
  - is not to be baked
  lexicon: HALOT
  rationale: Nifal imperfect 3fs of אפה expresses passive/resultative sense referring
    to the grain offering portion; English passive best matches the Hebrew form and
    legal style.
- source_word: חָמֵץ
  chosen: with leaven
  alternatives:
  - as leavened bread
  - leavened
  lexicon: HALOT
  rationale: The noun denotes leaven/leavened matter. In context with baking, 'with
    leaven' is the most natural English expression and avoids over-specifying bread.
- source_word: חֶלְקָם
  chosen: their portion
  alternatives:
  - their share
  lexicon: HALOT
  rationale: חלק commonly means allotted portion/share. 'Their portion' fits priestly
    allotment language and preserves the possessive suffix.
- source_word: נָתַתִּי אֹתָהּ
  chosen: I have given it
  alternatives:
  - I give it
  - I have assigned it
  lexicon: HALOT
  rationale: The perfect first person states Yahweh's established grant. Present perfect
    in English conveys a completed act with ongoing force in legal instruction.
- source_word: מֵאִשַּׁי
  chosen: from my food offerings
  alternatives:
  - from my offerings made by fire
  - from my fire offerings
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally refers to offerings by fire. 'Food offerings' is
    clear modern English and reflects the sacrificial category without archaic phrasing;
    the possessive 'my' is retained.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a most holy thing
  lexicon: HALOT
  rationale: The superlative construction denotes highest sanctity. 'Most holy' is
    idiomatic English and fits sacrificial classification better than the more location-associated
    'holy of holies.'
- source_word: כַּחַטָּאת
  chosen: like the sin offering
  alternatives:
  - as the sin offering
  lexicon: HALOT
  rationale: The prefixed כ marks comparison/classification. 'Like the sin offering'
    communicates that this portion shares the same holiness status.
- source_word: וְכָאָשָׁם
  chosen: and the guilt offering
  alternatives:
  - and the reparation offering
  - and the trespass offering
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial contexts is well rendered 'guilt offering' in contemporary
    English. 'Trespass offering' is traditional but less transparent; 'reparation
    offering' is possible but less established.
