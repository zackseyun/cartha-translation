- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of רֵיחַ נִיחֹחַ in sacrificial language
  chosen_reading: a pleasing aroma
  alternative_readings:
  - a soothing aroma
  - a sweet-smelling aroma
  rationale: This preserves the sacrificial acceptance formula without importing a mechanistic or overly literal notion. It maintains the cultic-theological sense of acceptability before the LORD.
