id: LEV.6.14
reference: Leviticus 6:14
source:
  edition: WLC
  text: עַֽל מַחֲבַ֗ת בַּ/שֶּׁ֛מֶן תֵּעָשֶׂ֖ה מֻרְבֶּ֣כֶת תְּבִיאֶ֑/נָּה תֻּפִינֵי֙ מִנְחַ֣ת פִּתִּ֔ים תַּקְרִ֥יב רֵֽיחַ נִיחֹ֖חַ לַ/יהוָֽה־־׃
translation:
  text: On a griddle with oil it shall be made, well mixed; you shall bring it in baked pieces, a grain offering broken into pieces, and present it as a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in oil.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'baked pieces' is rare and may denote baked portions prepared on the griddle.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a pleasing aroma,' a standard sacrificial expression for an offering acceptable to the LORD.
    reason: cultural_note
lexical_decisions:
- source_word: מַחֲבַת
  chosen: griddle
  alternatives:
  - pan
  - flat pan
  lexicon: HALOT
  rationale: Refers to a flat cooking surface used for preparing grain offerings. 'Griddle' is natural modern English and more specific than the generic 'pan.'
- source_word: בַּשֶּׁמֶן
  chosen: with oil
  alternatives:
  - in oil
  lexicon: HALOT
  rationale: The preposition can be rendered 'in' or 'with'; 'with oil' reads more naturally in English for preparation instructions while preserving the instrumental sense.
- source_word: תֵּעָשֶׂה
  chosen: it shall be made
  alternatives:
  - it shall be prepared
  lexicon: HALOT
  rationale: Niphal of עשה here is a straightforward passive describing preparation of the offering. 'Made' is slightly more formal and closer to the Hebrew wording.
- source_word: מֻרְבֶּכֶת
  chosen: well mixed
  alternatives:
  - mixed
  - soaked
  - stirred
  lexicon: HALOT
  rationale: Describes the dough or offering as mixed/blended with oil. 'Well mixed' communicates the participial adjectival force without over-specifying a technical culinary process.
- source_word: תְּבִיאֶנָּה
  chosen: you shall bring it in
  alternatives:
  - you shall bring it
  - you shall present it
  lexicon: HALOT
  rationale: The verb means 'bring,' with the feminine suffix referring to the offering. 'Bring it in' reflects the directional nuance in cultic presentation.
- source_word: תֻּפִינֵי
  chosen: baked pieces
  alternatives:
  - baked portions
  - things baked
  lexicon: HALOT
  rationale: A rare culinary term likely referring to baked preparation. 'Baked pieces' is clear English and fits the following phrase about pieces.
- source_word: מִנְחַת
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  lexicon: HALOT
  rationale: Standard rendering for the cereal/flour offering in Leviticus; preserves cultic specificity better than the generic 'offering.'
- source_word: פִּתִּים
  chosen: broken into pieces
  alternatives:
  - in pieces
  - pieces
  lexicon: HALOT
  rationale: Conveys the sense of divided or broken portions. Expanded slightly for idiomatic English and to make the relation to the offering explicit.
- source_word: תַּקְרִיב
  chosen: present
  alternatives:
  - offer
  - bring near
  lexicon: HALOT
  rationale: In sacrificial contexts קרב in Hiphil means to present/offer. 'Present' avoids repetition with 'bring' while retaining sacrificial formality.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: Traditional sacrificial idiom indicating acceptability before God, not divine olfactory pleasure in a crude sense. 'Pleasing aroma' is clear, established, and accessible modern English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following Jewish reverence tradition and common English Bible practice.
