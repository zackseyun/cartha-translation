theological_decisions:
- issue: Ritual purity nuance of טָהוֹר
  chosen_reading: clean place
  alternative_readings:
  - pure place
  - ceremonially clean place
  rationale: The verse concerns priestly procedure and ritual space. Rendering טָהוֹר
    as 'clean' preserves the cultic category without importing extra explanatory wording
    into the main text. The context of Leviticus supplies the ceremonial sense.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
