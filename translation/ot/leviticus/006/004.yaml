id: LEV.6.4
reference: Leviticus 6:4
source:
  edition: WLC
  text: וּ/פָשַׁט֙ אֶת בְּגָדָ֔י/ו וְ/לָבַ֖שׁ בְּגָדִ֣ים אֲחֵרִ֑ים וְ/הוֹצִ֤יא אֶת
    הַ/דֶּ֨שֶׁן֙ אֶל מִ/ח֣וּץ לַֽ/מַּחֲנֶ֔ה אֶל מָק֖וֹם טָהֽוֹר־־־־׃
translation:
  text: Then he shall take off his garments and put on other garments, and carry the
    ashes outside the camp to a clean place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring out' or 'take out' the ashes.
    reason: lexical_alternative
  - marker: b
    text: '''Clean'' here refers to ritual cleanness in the Levitical sense.'
    reason: cultural_note
lexical_decisions:
- source_word: וּפָשַׁט
  chosen: Then he shall take off
  alternatives:
  - and he shall strip off
  - and he shall remove
  lexicon: HALOT
  rationale: פשט in this clothing context means to remove or take off garments. 'Take
    off' is natural modern English and accurately reflects the action. 'Then' captures
    the sequential force of the waw in procedural instruction.
- source_word: בְּגָדָיו
  chosen: his garments
  alternatives:
  - his clothes
  - his clothing
  lexicon: HALOT
  rationale: בגד is the ordinary term for garments/clothing. 'Garments' fits the ritual-priestly
    context better than the more casual 'clothes'.
- source_word: וְלָבַשׁ
  chosen: and put on
  alternatives:
  - and wear
  - and clothe himself with
  lexicon: HALOT
  rationale: לבש commonly means to put on clothing. 'Put on' is the most idiomatic
    English rendering in this sequence.
- source_word: בְּגָדִים אֲחֵרִים
  chosen: other garments
  alternatives:
  - different garments
  - another set of garments
  lexicon: HALOT
  rationale: אחרים indicates a different set from the first garments. 'Other garments'
    is concise and sufficiently formal for the ritual context.
- source_word: וְהוֹצִיא
  chosen: and carry
  alternatives:
  - and bring out
  - and take out
  lexicon: HALOT
  rationale: יצא in the Hiphil means to bring out or carry out. Because the object
    is physical ash being moved to another location, 'carry' communicates the concrete
    action clearly in English.
- source_word: הַדֶּשֶׁן
  chosen: the ashes
  alternatives:
  - the fatty ashes
  - the ash
  lexicon: HALOT
  rationale: דשן here refers to the ash/remains from the burnt offering on the altar.
    English idiom prefers the plural 'ashes' for such remains. A more wooden rendering
    like 'fatty ashes' reflects etymological background more than the contextual sense
    here.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to a place outside the camp
  lexicon: HALOT
  rationale: The phrase denotes movement to a location beyond the camp perimeter.
    'Outside the camp' is the standard and natural English rendering.
- source_word: אֶל מָקוֹם טָהוֹר
  chosen: to a clean place
  alternatives:
  - to a pure place
  - to a ceremonially clean place
  lexicon: HALOT
  rationale: טָהוֹר in Levitical ritual contexts often carries ceremonial cleanness,
    but 'clean' is the most direct and readable rendering. The ritual nuance is inherent
    in context; 'ceremonially clean' would over-specify in the main text.
