id: LEV.6.6
reference: Leviticus 6:6
source:
  edition: WLC
  text: אֵ֗שׁ תָּמִ֛יד תּוּקַ֥ד עַל הַ/מִּזְבֵּ֖חַ לֹ֥א תִכְבֶֽה־׃ס
translation:
  text: A continual fire shall be kept burning on the altar; it shall not go out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A perpetual fire shall burn on the altar; it shall not be quenched.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשׁ
  chosen: fire
  alternatives:
  - flame
  lexicon: HALOT
  rationale: The basic sense is literal 'fire.' 'Flame' is possible in English but
    is less direct and less standard for sacrificial/fire-maintenance contexts.
- source_word: תָּמִיד
  chosen: continual
  alternatives:
  - continually
  - regularly
  - perpetual
  lexicon: HALOT
  rationale: The term denotes ongoing continuity. 'Continual' fits naturally with
    'fire' as an attributive description in English. 'Perpetual' is possible but sounds
    more formal; 'regularly' is too weak.
- source_word: תּוּקַד
  chosen: shall be kept burning
  alternatives:
  - shall burn
  - shall be burning
  - shall be kindled
  lexicon: HALOT
  rationale: The Hophal form is passive/causative-passive from יקד, indicating that
    the fire is to be caused to remain burning, not merely that it burns. 'Shall be
    kept burning' best captures the prescribed maintenance implied by the form and
    context. 'Shall be kindled' is too punctual for the ongoing sense here.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard spatial preposition. 'On' is idiomatic modern English; 'upon'
    is more formal without adding meaning.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: The definite article is preserved. In cultic context, 'altar' is the
    straightforward and established equivalent.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation preserved directly.
- source_word: תִכְבֶּה
  chosen: shall not go out
  alternatives:
  - shall not be extinguished
  - shall not be quenched
  lexicon: HALOT
  rationale: The verb means to go out/be extinguished. 'Shall not go out' is clear,
    idiomatic, and preserves the intransitive sense. 'Be quenched' is possible but
    more interpretive and elevated.
