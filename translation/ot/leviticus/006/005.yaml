theological_decisions:
- issue: Rendering of sacrificial terminology
  chosen_reading: Use established English sacrificial terms ('burnt offering,' 'peace
    offerings') while keeping the ritual actions explicit.
  alternative_readings:
  - Use more etymological renderings such as 'ascent offering' and 'offerings of well-being'
  rationale: The verse is legal/cultic instruction, so clarity and continuity of sacrificial
    categories matter. Established terms best preserve recognizability without importing
    extra doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §5, §6
