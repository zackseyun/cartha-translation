id: LEV.6.5
reference: Leviticus 6:5
source:
  edition: WLC
  text: וְ/הָ/אֵ֨שׁ עַל הַ/מִּזְבֵּ֤חַ תּֽוּקַד בּ/וֹ֙ לֹ֣א תִכְבֶּ֔ה וּ/בִעֵ֨ר עָלֶ֧י/הָ
    הַ/כֹּהֵ֛ן עֵצִ֖ים בַּ/בֹּ֣קֶר בַּ/בֹּ֑קֶר וְ/עָרַ֤ךְ עָלֶ֨י/הָ֙ הָֽ/עֹלָ֔ה וְ/הִקְטִ֥יר
    עָלֶ֖י/הָ חֶלְבֵ֥י הַ/שְּׁלָמִֽים־־׃
translation:
  text: And the fire on the altar shall be kept burning on it; it shall not go out.
    The priest shall burn wood on it every morning, and he shall arrange the burnt
    offering on it and burn up on it the fat portions of the peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'morning by morning.' The Hebrew repeats 'morning' for a distributive
      sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the offerings of well-being' or 'the fellowship offerings' for 'peace
      offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוּקַד
  chosen: shall be kept burning
  alternatives:
  - shall burn
  - shall be kindled
  lexicon: HALOT
  rationale: The Hophal form of יקד is passive/causative-passive, indicating the fire
    is to be maintained in a burning state rather than merely stating that it burns.
    'Shall be kept burning' captures the ongoing cultic requirement better than the
    flatter 'shall burn.'
- source_word: בּוֹ
  chosen: on it
  alternatives:
  - in it
  lexicon: HALOT
  rationale: With reference to the altar, English idiom prefers 'on it' for the surface/fire
    location, even though the preposition can be rendered more literally as 'in it.'
    This matches the sacrificial context and the repeated עָלֶיהָ phrases.
- source_word: לֹא תִכְבֶּה
  chosen: it shall not go out
  alternatives:
  - it shall not be extinguished
  lexicon: HALOT
  rationale: The clause states the required continuity of the altar fire. 'Go out'
    is natural modern English; 'be extinguished' is more formal but less readable.
- source_word: וּבִעֵר
  chosen: shall burn
  alternatives:
  - shall kindle
  - shall consume with fire
  lexicon: HALOT
  rationale: In context the priest's action is adding wood to maintain the fire. 'Shall
    burn wood' is idiomatic English for tending the fire; 'kindle' could imply starting
    a new fire, which is not the point here.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: every morning
  alternatives:
  - morning by morning
  lexicon: HALOT
  rationale: The distributive repetition means a daily, repeated action. 'Every morning'
    communicates the sense clearly in modern English, while 'morning by morning' is
    a more formal alternative.
- source_word: וְעָרַךְ
  chosen: shall arrange
  alternatives:
  - shall lay in order
  - shall set out
  lexicon: HALOT
  rationale: ערך in sacrificial contexts refers to placing the offering in proper
    order on the altar. 'Arrange' preserves that ordered, ritual sense without sounding
    archaic.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: The established sacrificial term for עולה is 'burnt offering.' Although
    the root relates to ascending, 'ascent offering' is not standard English and would
    obscure the cultic category.
- source_word: וְהִקְטִיר
  chosen: burn up
  alternatives:
  - turn into smoke
  - offer by fire
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to causing the offering
    to go up in smoke on the altar. 'Burn up' is concise and natural; the smoke/offering
    nuance is implicit in context.
- source_word: חֶלְבֵי
  chosen: the fat portions
  alternatives:
  - the fat pieces
  - the choicest parts
  lexicon: HALOT
  rationale: In sacrificial law, חלב refers specifically to the fat designated for
    burning, not metaphorically to 'best parts' in general. 'Fat portions' is precise
    and readable.
- source_word: הַשְּׁלָמִים
  chosen: the peace offerings
  alternatives:
  - the fellowship offerings
  - the offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally rendered 'peace offerings.' Alternatives like
    'fellowship offerings' or 'offerings of well-being' capture aspects of the term,
    but 'peace offerings' remains the most recognizable cultic label and fits optimal
    equivalence.
