theological_decisions:
- issue: Meaning of חַטָּאת in priestly sacrificial legislation
  chosen_reading: Rendered as 'sin offering'
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either sin or the offering associated with
    sin. In Levitical sacrificial instructions, the referent is clearly the sacrifice.
    While 'purification offering' highlights the ritual-cleansing aspect and is argued
    by some scholars, 'sin offering' remains the clearest and most widely understood
    English equivalent in this context, without denying the purification dimension.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Scope of blood brought into the sanctuary
  chosen_reading: Expressed partitive sense as 'from whose blood some is brought'
  alternative_readings:
  - whose blood is brought
  rationale: The prefixed מִן on 'its blood' suggests that some of the blood is brought
    in, not necessarily all of it. Making the partitive sense explicit helps the English
    reader follow the ritual detail and avoids flattening the Hebrew idiom.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
