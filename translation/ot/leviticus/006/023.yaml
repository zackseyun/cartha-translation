id: LEV.6.23
reference: Leviticus 6:23
source:
  edition: WLC
  text: וְ/כָל חַטָּ֡את אֲשֶׁר֩ יוּבָ֨א מִ/דָּמָ֜/הּ אֶל אֹ֧הֶל מוֹעֵ֛ד לְ/כַפֵּ֥ר
    בַּ/קֹּ֖דֶשׁ לֹ֣א תֵאָכֵ֑ל בָּ/אֵ֖שׁ תִּשָּׂרֵֽף־־׃פ
translation:
  text: And every sin offering from whose blood some is brought into the tent of meeting
    to make atonement in the holy place shall not be eaten; it shall be burned with
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering'; the Hebrew term חַטָּאת in
      Leviticus can denote the sacrifice that deals with impurity and sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: And every
  alternatives:
  - Now every
  - But every
  lexicon: HALOT
  rationale: וְ links this rule to the preceding instructions, and כָל gives a comprehensive
    scope. 'And every' preserves the connective and universality without overinterpreting
    discourse force.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin sacrifice
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the offering associated
    with sin rather than abstract 'sin.' 'Sin offering' is the most recognizable and
    contextually precise rendering. 'Purification offering' is a defensible scholarly
    alternative, but here the traditional cultic term remains clearer for general
    readers.
- source_word: אֲשֶׁר יוּבָא מִדָּמָהּ
  chosen: from whose blood some is brought
  alternatives:
  - whose blood is brought
  - from which its blood is brought
  lexicon: HALOT
  rationale: The Hebrew literally says 'from its blood is brought,' an idiom indicating
    that some of the blood of the offering is taken in. Rendering 'from whose blood
    some is brought' makes explicit the partitive sense of מִן while remaining close
    to the Hebrew.
- source_word: אֶל אֹהֶל מוֹעֵד
  chosen: into the tent of meeting
  alternatives:
  - into the meeting tent
  - to the tent of meeting
  lexicon: HALOT
  rationale: This is the standard designation for the sanctuary structure. 'Into'
    fits the context of blood being carried inside for ritual use.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to purge
  - to effect atonement
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered with the established
    cultic phrase 'make atonement.' This preserves the theological and ritual force
    without importing a narrower theory of atonement.
- source_word: בַּקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in the sanctuary
  - in the holy place/holy area
  lexicon: HALOT
  rationale: The phrase refers to the sacred area of the sanctuary rather than holiness
    in the abstract. 'In the holy place' is a natural English rendering and fits the
    immediate cultic setting. 'In the sanctuary' is possible, but 'holy place' better
    reflects the concrete Hebrew expression.
- source_word: לֹא תֵאָכֵל
  chosen: shall not be eaten
  alternatives:
  - must not be eaten
  lexicon: HALOT
  rationale: 'The Niphal gives a passive sense: the offering is not to be eaten. ''Shall
    not be eaten'' preserves the legal register and passive construction.'
- source_word: בָּאֵשׁ תִּשָּׂרֵף
  chosen: it shall be burned with fire
  alternatives:
  - it shall be burned up in the fire
  - it must be burned with fire
  lexicon: HALOT
  rationale: The Hebrew uses the common idiom 'burn with fire.' Retaining 'with fire'
    preserves the formal emphasis of the source better than smoothing to simply 'burned.'
