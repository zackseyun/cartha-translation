id: LEV.6.21
reference: Leviticus 6:21
source:
  edition: WLC
  text: וּ/כְלִי חֶ֛רֶשׂ אֲשֶׁ֥ר תְּבֻשַּׁל בּ֖/וֹ יִשָּׁבֵ֑ר וְ/אִם בִּ/כְלִ֤י נְחֹ֨שֶׁת֙
    בֻּשָּׁ֔לָה וּ/מֹרַ֥ק וְ/שֻׁטַּ֖ף בַּ/מָּֽיִם־־־׃
translation:
  text: And an earthenware vessel in which it is boiled must be broken; but if it
    is boiled in a bronze vessel, it must be scoured and rinsed with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper vessel.' The Hebrew נְחֹשֶׁת can refer to copper or bronze depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלִי חֶרֶשׂ
  chosen: earthenware vessel
  alternatives:
  - clay vessel
  - pottery vessel
  lexicon: HALOT
  rationale: כְלִי is a general term for a container or vessel, and חֶרֶשׂ specifies
    earthenware/clay pottery. 'Earthenware vessel' is natural modern English and preserves
    the material distinction that grounds the differing ritual treatment.
- source_word: תְּבֻשַּׁל / בֻּשָּׁלָה
  chosen: is boiled
  alternatives:
  - is cooked
  - is boiled in it
  lexicon: HALOT
  rationale: The verb בשׁל in this sacrificial context refers specifically to boiling/cooking.
    'Boiled' is more precise than the broader 'cooked' and fits the ritual instruction.
    The passive sense is retained.
- source_word: בּוֹ
  chosen: in which
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix refers back to the vessel. 'In
    which' gives idiomatic English while preserving the locative relation.
- source_word: יִשָּׁבֵר
  chosen: must be broken
  alternatives:
  - shall be broken
  - is to be broken
  lexicon: HALOT
  rationale: The Niphal imperfect here functions as an instruction within legal material.
    'Must be broken' communicates obligation clearly in contemporary English without
    archaic tone.
- source_word: כְלִי נְחֹשֶׁת
  chosen: bronze vessel
  alternatives:
  - copper vessel
  - brass vessel
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. 'Bronze' is
    the standard rendering for ancient metal vessels in many biblical contexts and
    avoids the anachronistic 'brass.' 'Copper' remains a plausible lexical alternative.
- source_word: וּמֹרַק
  chosen: it must be scoured
  alternatives:
  - it shall be polished
  - it shall be scrubbed
  lexicon: HALOT
  rationale: The verb מרק conveys rubbing/cleaning thoroughly. In this ritual-cleaning
    context, 'scoured' best captures vigorous cleansing of a metal vessel.
- source_word: וְשֻׁטַּף בַּמָּיִם
  chosen: and rinsed with water
  alternatives:
  - and washed with water
  - and flushed with water
  lexicon: HALOT
  rationale: שטף denotes washing/rinsing by flowing water. 'Rinsed with water' pairs
    naturally with 'scoured' and reflects a second cleansing action rather than a
    mere repetition.
