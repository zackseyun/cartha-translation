id: LEV.6.15
reference: Leviticus 6:15
source:
  edition: WLC
  text: וְ/הַ/כֹּהֵ֨ן הַ/מָּשִׁ֧יחַ תַּחְתָּ֛י/ו מִ/בָּנָ֖י/ו יַעֲשֶׂ֣ה אֹתָ֑/הּ חָק עוֹלָ֕ם לַ/יהוָ֖ה כָּלִ֥יל תָּקְטָֽר־׃
translation:
  text: 'And the anointed priest from among his sons, who succeeds him, shall prepare it. It is a permanent statute for Yahweh: it shall be completely turned into smoke.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his place'; literally 'under him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a perpetual statute' or 'an everlasting ordinance.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'it shall be made to smoke wholly'; that is, the offering is entirely consumed on the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priestly one
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן as 'priest' in cultic context.
- source_word: הַמָּשִׁיחַ
  chosen: anointed
  alternatives:
  - consecrated
  - messianic/anointed one
  lexicon: HALOT
  rationale: Here the adjective identifies the high priest as the one anointed for office, not a messianic title. 'Anointed priest' is the natural cultic sense.
- source_word: תַּחְתָּיו
  chosen: who succeeds him
  alternatives:
  - in his place
  - under him
  lexicon: HALOT
  rationale: The preposition literally means 'under/in place of him'; in context of priestly succession, 'who succeeds him' expresses the sense clearly in modern English.
- source_word: מִבָּנָיו
  chosen: from among his sons
  alternatives:
  - of his sons
  - from his sons
  lexicon: HALOT
  rationale: Preserves the masculine familial language of the Hebrew and indicates selection from his male descendants.
- source_word: יַעֲשֶׂה אֹתָהּ
  chosen: shall prepare it
  alternatives:
  - shall make it
  - shall offer it
  lexicon: HALOT
  rationale: עָשָׂה is broad ('do/make'). In sacrificial procedure, 'prepare it' best fits the offering being handled ritually without over-specifying beyond the Hebrew.
- source_word: חָק עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting ordinance
  lexicon: HALOT
  rationale: Combines formal accuracy with readable modern English. 'Permanent statute' conveys enduring legal force without archaic tone.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' 'For' fits the sense of dedication of the statute/offering to YHWH.
- source_word: כָּלִיל
  chosen: completely
  alternatives:
  - wholly
  - entirely
  lexicon: HALOT
  rationale: 'The adverb/adjectival term indicates totality: the offering is wholly consumed. ''Completely'' is clear modern English.'
- source_word: תָּקְטָר
  chosen: shall be turned into smoke
  alternatives:
  - shall be burned up
  - shall be offered in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר refers specifically to making an offering go up in smoke on the altar. 'Turned into smoke' preserves the sacrificial nuance better than the flatter 'burned.'
