theological_decisions:
- issue: Identity of 'the anointed priest'
  chosen_reading: the priest anointed for office, i.e., the succeeding high priest
  alternative_readings:
  - a broader reference to any anointed priest
  rationale: In Levitical cultic context, 'the anointed priest' is a technical designation for the high priestly office. The succession phrase 'from among his sons, who succeeds him' confirms an office passed down, not a messianic figure.
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for יְהוָה, following Jewish reverence tradition and LXX pattern.
