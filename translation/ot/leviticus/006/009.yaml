id: LEV.6.9
reference: Leviticus 6:9
source:
  edition: WLC
  text: וְ/הַ/נּוֹתֶ֣רֶת מִמֶּ֔/נָּה יֹאכְל֖וּ אַהֲרֹ֣ן וּ/בָנָ֑י/ו מַצּ֤וֹת תֵּֽאָכֵל֙
    בְּ/מָק֣וֹם קָדֹ֔שׁ בַּ/חֲצַ֥ר אֹֽהֶל מוֹעֵ֖ד יֹאכְלֽוּ/הָ־׃
translation:
  text: What is left of it Aaron and his sons shall eat. It shall be eaten as unleavened
    bread in a holy place; they shall eat it in the court of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remainder' or 'what remains.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in a holy place,' not 'in the holy place'; the next clause specifies
      that place as the court of the tent of meeting.
    reason: lexical_alternative
  - marker: c
    text: Or 'unleavened cakes.' The Hebrew refers to the offering being eaten in
      an unleavened form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתֶרֶת
  chosen: What is left
  alternatives:
  - the remainder
  - what remains
  lexicon: HALOT
  rationale: The feminine singular participle with article functions substantivally,
    referring to the remaining portion of the grain offering. 'What is left' is natural
    English while preserving the sense of remainder.
- source_word: מִמֶּנָּה
  chosen: of it
  alternatives:
  - from it
  lexicon: HALOT
  rationale: The preposition מן with 3fs suffix refers back to the offering portion.
    'Of it' is idiomatic in English after 'what is left,' though 'from it' is more
    formally literal.
- source_word: יֹאכְלוּ
  chosen: shall eat
  alternatives:
  - may eat
  - are to eat
  lexicon: HALOT
  rationale: The imperfect here expresses instruction/prescription in legal material.
    'Shall eat' preserves the directive force in concise legal English.
- source_word: אַהֲרֹן וּבָנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his children
  lexicon: HALOT
  rationale: בנים here specifically refers to Aaron's male priestly descendants in
    cultic service, so 'sons' is more precise than the broader 'children.'
- source_word: מַצּוֹת
  chosen: as unleavened bread
  alternatives:
  - unleavened cakes
  - unleavened loaves
  - unleavened
  lexicon: HALOT
  rationale: The plural noun denotes unleavened baked items. English often needs a
    supplied category word; 'as unleavened bread' communicates the required unleavened
    state without over-specifying shape or form.
- source_word: תֵּאָכֵל
  chosen: It shall be eaten
  alternatives:
  - it is to be eaten
  - it must be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect is passive and prescriptive. 'It shall be eaten'
    preserves both the passive form and legal force.
- source_word: בְּמָקוֹם קָדֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article on מקום, so 'in a holy place' better reflects
    the Hebrew than the traditional 'in the holy place.' The following clause specifies
    the location more exactly.
- source_word: בַּחֲצַר
  chosen: in the court
  alternatives:
  - in the courtyard
  lexicon: HALOT
  rationale: חצר refers to the enclosed court area of the tabernacle precincts. 'Court'
    is concise and standard in sanctuary contexts.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard rendering of the sanctuary designation and preserves
    the Hebrew imagery more directly than 'tabernacle.'
- source_word: יֹאכְלוּהָ
  chosen: they shall eat it
  alternatives:
  - they are to eat it
  lexicon: HALOT
  rationale: The final verb repeats and reinforces the instruction with an object
    suffix. The English retains the repetition rather than collapsing it, since the
    Hebrew restates the command for emphasis and specificity.
