theological_decisions:
- issue: Rendering of sacrificial forgiveness formula
  chosen_reading: and he shall be forgiven
  alternative_readings:
  - and it shall be forgiven him
  rationale: The Hebrew uses a passive formulation that emphasizes the result of the
    priestly rite without naming the forgiver explicitly. The chosen wording preserves
    that theological restraint while remaining idiomatic in English.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
