id: LEV.5.13
reference: Leviticus 5:13
source:
  edition: WLC
  text: וְ/כִפֶּר֩ עָלָ֨י/ו הַ/כֹּהֵ֜ן עַל חַטָּאת֧/וֹ אֲשֶׁר חָטָ֛א מֵֽ/אַחַ֥ת מֵ/אֵ֖לֶּה
    וְ/נִסְלַ֣ח ל֑/וֹ וְ/הָיְתָ֥ה לַ/כֹּהֵ֖ן כַּ/מִּנְחָֽה־־׃ס
translation:
  text: Thus the priest shall make atonement for him for his sin that he committed
    in any one of these matters, and he shall be forgiven. And it shall belong to
    the priest, like the grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and it shall be forgiven him.' The Hebrew is passive and does not explicitly
      name the forgiver.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall purge
  - shall make expiation
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts commonly denotes effecting atonement/expiation
    through ritual action. 'Make atonement' is the most established and clear English
    rendering here, preserving the cultic-theological sense without importing a narrower
    theory of atonement.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - on his behalf
  - over him
  lexicon: HALOT
  rationale: With כפר and עַל, the phrase indicates atonement made on behalf of the
    offender. 'For him' is idiomatic and accurate in English.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Levitical ritual legislation.
- source_word: עַל חַטָּאתוֹ
  chosen: for his sin
  alternatives:
  - concerning his sin
  - for his sin offering
  lexicon: HALOT
  rationale: Although חטאת can mean either 'sin' or 'sin offering' in sacrificial
    contexts, here the following clause 'which he committed' points to the offense
    itself, not the offering. Therefore 'for his sin' best fits the syntax.
- source_word: אֲשֶׁר חָטָא
  chosen: that he committed
  alternatives:
  - which he sinned
  - in which he sinned
  lexicon: HALOT
  rationale: Idiomatic English requires an object such as 'committed' with 'sin.'
    This preserves the relative clause's function while remaining natural.
- source_word: מֵאַחַת מֵאֵלֶּה
  chosen: in any one of these matters
  alternatives:
  - from one of these
  - in one of these things
  lexicon: HALOT
  rationale: This phrase refers back to the previously listed cases. 'Any one of these
    matters' is clear modern English and preserves the partitive sense.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  lexicon: HALOT
  rationale: The Niphal of סלח expresses forgiveness granted to the offender. 'He
    shall be forgiven' is natural English and keeps the passive sense without explicitly
    supplying God as subject where the Hebrew leaves it implicit.
- source_word: וְהָיְתָה לַכֹּהֵן
  chosen: And it shall belong to the priest
  alternatives:
  - and it shall be for the priest
  - and it shall become the priest's
  lexicon: HALOT
  rationale: The feminine verb refers to the offering portion. 'Shall belong to the
    priest' clearly expresses priestly possession/right.
- source_word: כַּמִּנְחָה
  chosen: like the grain offering
  alternatives:
  - as the grain offering
  - like the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus often denotes the grain offering specifically. 'Grain
    offering' is the clearest contextual rendering in English; 'tribute offering'
    is lexically possible but less fitting in this cultic legislation.
