theological_decisions:
- issue: Rendering priestly atonement language without importing later doctrinal precision
  chosen_reading: make atonement for him
  alternative_readings:
  - purify him
  - obtain forgiveness for him
  rationale: The verse uses standard priestly sacrificial language (כפר) tied to ritual
    atonement and resulting forgiveness. 'Make atonement' preserves the cultic-theological
    category without narrowing it to one later doctrinal model or flattening it into
    mere ritual cleansing.
  doctrine_reference: Translation philosophy §3, §6
- issue: Preserving the passive forgiveness formula
  chosen_reading: he shall be forgiven
  alternative_readings:
  - the LORD will forgive him
  - it shall be forgiven him
  rationale: The Hebrew employs a passive formula that reverently leaves the divine
    agent implicit. The translation preserves that tension rather than making the
    subject explicit in the main text.
  doctrine_reference: Translation philosophy §3
