id: LEV.5.10
reference: Leviticus 5:10
source:
  edition: WLC
  text: וְ/אֶת הַ/שֵּׁנִ֛י יַעֲשֶׂ֥ה עֹלָ֖ה כַּ/מִּשְׁפָּ֑ט וְ/כִפֶּ֨ר עָלָ֧י/ו הַ/כֹּהֵ֛ן
    מֵ/חַטָּאת֥/וֹ אֲשֶׁר חָטָ֖א וְ/נִסְלַ֥ח לֽ/וֹ־־׃ס
translation:
  text: And he shall prepare the second as a burnt offering according to the ordinance,
    and the priest shall make atonement for him for the sin that he committed, and
    he shall be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed procedure.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and it shall be forgiven him,' a passive formula that leaves the
      divine forgiver implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: Ordinal adjective referring back to the second bird in the preceding
    context; 'the second' is the most direct and contextually clear rendering.
- source_word: יַעֲשֶׂה
  chosen: shall prepare
  alternatives:
  - shall make
  - shall offer
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In sacrificial procedure, English idiom often
    requires a more specific verb. 'Prepare' fits the ritual action without over-specifying
    beyond the Hebrew.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: Standard and accurate rendering for the sacrificial term עֹלָה in Leviticus;
    'ascending offering' is more etymologically transparent but less idiomatic in
    English.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed procedure
  - as prescribed
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes the established legal/procedural norm for the
    offering. 'According to the ordinance' preserves the formal cultic sense while
    remaining readable.
- source_word: וְכִפֶּר עָלָיו
  chosen: shall make atonement for him
  alternatives:
  - shall purge him
  - shall effect atonement on his behalf
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' 'For him' reflects עָלָיו idiomatically in English.
- source_word: מֵחַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for the sin that he committed
  alternatives:
  - from his sin which he sinned
  - because of the sin that he committed
  lexicon: HALOT
  rationale: The Hebrew construction expresses the offense in view as the basis for
    atonement. English idiom prefers 'for the sin that he committed' rather than a
    more wooden 'from his sin which he sinned.'
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  lexicon: HALOT
  rationale: Passive/impersonal divine-forgiveness formula common in Leviticus. 'He
    shall be forgiven' is natural modern English and preserves the theological restraint
    of the Hebrew, which does not explicitly name God as subject.
