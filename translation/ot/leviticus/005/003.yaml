id: LEV.5.3
reference: Leviticus 5:3
source:
  edition: WLC
  text: א֣וֹ כִ֤י יִגַּע֙ בְּ/טֻמְאַ֣ת אָדָ֔ם לְ/כֹל֙ טֻמְאָת֔/וֹ אֲשֶׁ֥ר יִטְמָ֖א
    בָּ֑/הּ וְ/נֶעְלַ֣ם מִמֶּ֔/נּוּ וְ/ה֥וּא יָדַ֖ע וְ/אָשֵֽׁם׃
translation:
  text: Or if he touches human uncleanness—any uncleanness by which one becomes unclean—and
    it is hidden from him, and then he comes to know it, he is guilty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human impurity.' The Hebrew term refers to ritual uncleanness in this
      legal context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it is hidden from him'; that is, he was unaware of it at
      the time.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגַּע בְּ
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: נגע with ב marks physical contact. 'Touches' is the most direct and natural
    rendering in English.
- source_word: טֻמְאַת אָדָם
  chosen: human uncleanness
  alternatives:
  - human impurity
  - the uncleanness of man
  lexicon: HALOT
  rationale: טֻמְאָה denotes ritual impurity/uncleanness in Levitical contexts. אָדָם
    here is generic, referring to a human source of impurity, so 'human' is more idiomatic
    than 'man' while preserving the source sense.
- source_word: לְכֹל טֻמְאָתוֹ
  chosen: any uncleanness
  alternatives:
  - any of his uncleanness
  - any impurity
  lexicon: HALOT
  rationale: 'The phrase broadens the category: any kind of uncleanness associated
    with the human source. English smooths the pronominal suffix into the generalizing
    phrase ''any uncleanness'' to avoid awkwardness while preserving scope.'
- source_word: אֲשֶׁר יִטְמָא בָּהּ
  chosen: by which one becomes unclean
  alternatives:
  - with which he becomes unclean
  - through which he is made unclean
  lexicon: HALOT
  rationale: The relative clause explains the effect of the uncleanness. An impersonal
    English expression ('one becomes unclean') best captures the generic force without
    overloading the repeated 'he' in the verse.
- source_word: וְנֶעְלַם מִמֶּנּוּ
  chosen: and it is hidden from him
  alternatives:
  - and it escapes his notice
  - and he is unaware of it
  lexicon: HALOT
  rationale: The Niphal of עלם here indicates that the matter was concealed from his
    awareness. 'It is hidden from him' preserves the passive nuance and the legal
    style of the passage.
- source_word: וְהוּא יָדַע
  chosen: and then he comes to know it
  alternatives:
  - and he knows it
  - and he realizes it
  lexicon: HALOT
  rationale: In context, this marks subsequent realization after prior unawareness.
    'Comes to know it' makes the temporal sense clear in idiomatic English.
- source_word: וְאָשֵׁם
  chosen: he is guilty
  alternatives:
  - he bears guilt
  - he becomes guilty
  lexicon: HALOT
  rationale: אשם in this legal-sacrificial context denotes incurred guilt/liability.
    'He is guilty' is concise and standard, fitting the verse's judicial force.
