theological_decisions:
- issue: Nature of טֻמְאָה in Levitical law
  chosen_reading: Render as 'uncleanness' rather than a moralized term like 'sinfulness.'
  alternative_readings:
  - impurity
  rationale: The verse concerns ritual impurity resulting from contact, not necessarily
    a moral evil in itself. 'Uncleanness' preserves the cultic/legal category without
    importing later theological categories the text does not state.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
- issue: Rendering אָדָם
  chosen_reading: Translate generically as 'human' in the phrase 'human uncleanness.'
  alternative_readings:
  - man
  - humankind
  rationale: The Hebrew term is generic here, not specifically male. This follows
    the doctrine's gender-accurate principle while keeping the singular legal style
    of the verse.
  doctrine_reference: 'Contested terms table: אָדָם = man / humankind (context); Translation
    philosophy §4 gender-accurate over gender-neutral.'
