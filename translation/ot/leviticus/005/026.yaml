id: LEV.5.26
reference: Leviticus 5:26
source:
  edition: WLC
  text: וְ/כִפֶּ֨ר עָלָ֧י/ו הַ/כֹּהֵ֛ן לִ/פְנֵ֥י יְהוָ֖ה וְ/נִסְלַ֣ח ל֑/וֹ עַל אַחַ֛ת מִ/כֹּ֥ל אֲשֶֽׁר יַעֲשֶׂ֖ה לְ/אַשְׁמָ֥ה בָֽ/הּ־־׃פ
translation:
  text: And the priest shall make atonement for him before Yahweh, and he shall be forgiven for any one of all the things by which one may incur guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for one of all that he may do to incur guilt by it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall atone
  - shall make expiation
  lexicon: HALOT
  rationale: Piel of כפר in sacrificial context regularly denotes effecting atonement/expiation. 'Make atonement' is standard, clear English that preserves the cultic sense without importing a narrower theory.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - on his behalf
  - for him
  lexicon: HALOT
  rationale: With כפר, על commonly marks the person for whom atonement is made. 'For him' is idiomatic and accurate.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Direct rendering of the definite noun in cultic context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי indicates presence before YHWH in sanctuary/cultic setting. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: וְנִסְלַח לוֹ
  chosen: and he will be forgiven
  alternatives:
  - and it will be forgiven him
  lexicon: HALOT
  rationale: Nifal of סלח expresses passive/resultative forgiveness granted to the offender. 'He will be forgiven' is natural modern English and keeps God as the implied forgiver without over-specifying.
- source_word: עַל אַחַת מִכֹּל
  chosen: for any one of all the things
  alternatives:
  - for one of all the things
  - concerning any of the things
  lexicon: HALOT
  rationale: The phrase emphasizes any individual instance within the whole class of offenses. 'Any one of all the things' preserves the distributive force.
- source_word: אֲשֶׁר יַעֲשֶׂה
  chosen: by which a person may incur
  alternatives:
  - that he does
  - which he may do
  lexicon: HALOT
  rationale: Literally 'which he may do,' but in English the clause needs to connect clearly to the resulting guilt. The chosen rendering makes explicit the functional relation already present in context without adding new content.
- source_word: לְאַשְׁמָה בָהּ
  chosen: guilt
  alternatives:
  - become guilty by it
  - incur guilt through it
  - for guilt in it
  lexicon: HALOT
  rationale: The construction expresses becoming guilty through the act. Rendering the whole clause as 'incur guilt' communicates the idiomatic Hebrew sense clearly. 'Guilt' rather than 'guilt offering' is required here by the syntax and context.
