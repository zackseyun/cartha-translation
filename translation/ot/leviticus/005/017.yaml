theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Generic masculine reference after נֶפֶשׁ
  chosen_reading: though he did not know it
  alternative_readings:
  - though the person did not know it
  - though they did not know it
  rationale: The Hebrew shifts to masculine singular verbs after the grammatically
    feminine נֶפֶשׁ. Per the gender-accurate policy, a masculine singular English
    pronoun is acceptable for representative force in legal discourse.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
