id: LEV.5.17
reference: Leviticus 5:17
source:
  edition: WLC
  text: וְ/אִם נֶ֨פֶשׁ֙ כִּ֣י תֶֽחֱטָ֔א וְ/עָֽשְׂתָ֗ה אַחַת֙ מִ/כָּל מִצְוֺ֣ת יְהוָ֔ה
    אֲשֶׁ֖ר לֹ֣א תֵעָשֶׂ֑ינָה וְ/לֹֽא יָדַ֥ע וְ/אָשֵׁ֖ם וְ/נָשָׂ֥א עֲוֺנֽ/וֹ־־־׃
translation:
  text: And if a person sins and does one of any of the things that by the LORD’s
    commandments must not be done, though he did not know it, then he is guilty and
    shall bear his iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is guilty' / 'incurs guilt'; the Hebrew term can denote becoming liable
      for guilt as a result of the offense.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall bear his guilt.' The Hebrew idiom 'bear his iniquity' can refer
      to carrying the liability or consequence of wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - a soul
  - someone
  lexicon: HALOT
  rationale: Here נֶפֶשׁ functions idiomatically for an individual person rather than
    emphasizing the immaterial soul. 'A person' is natural English and fits legal
    material.
- source_word: תֶחֱטָא
  chosen: sins
  alternatives:
  - commits a sin
  - misses the mark
  lexicon: HALOT
  rationale: The verb חטא in priestly legal context is best rendered straightforwardly
    as 'sins.'
- source_word: וְעָשְׂתָה אַחַת מִכָּל
  chosen: and does one of any of the things
  alternatives:
  - and does any one thing
  - and commits one thing out of all
  lexicon: HALOT
  rationale: 'This preserves the distributive sense: one act from among the prohibited
    matters. ''Does one of any of the things'' is slightly expanded for intelligibility
    while staying close to the Hebrew structure.'
- source_word: מִצְוֺת יְהוָה
  chosen: the LORD’s commandments
  alternatives:
  - the commandments of the LORD
  - the LORD’s commands
  lexicon: HALOT
  rationale: מִצְוֺת is naturally 'commandments' in covenantal/legal context. YHWH
    is rendered 'the LORD' per doctrine guidelines.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  chosen: that ... must not be done
  alternatives:
  - that should not be done
  - which are not to be done
  lexicon: HALOT
  rationale: The Niphal/imperfect construction expresses prohibited actions. 'Must
    not be done' communicates legal force clearly in modern English.
- source_word: וְלֹא יָדַע
  chosen: though he did not know it
  alternatives:
  - and he did not know
  - without knowing it
  lexicon: HALOT
  rationale: The clause indicates ignorance of the offense. Adding 'it' makes the
    object explicit in English without altering sense.
- source_word: וְאָשֵׁם
  chosen: then he is guilty
  alternatives:
  - he becomes guilty
  - he incurs guilt
  lexicon: HALOT
  rationale: אָשֵׁם here denotes liability/guilt resulting from the act, even if done
    unknowingly. 'Is guilty' is concise and idiomatic.
- source_word: וְנָשָׂא עֲוֺנוֹ
  chosen: shall bear his iniquity
  alternatives:
  - shall bear his guilt
  - shall bear the consequence of his wrongdoing
  lexicon: HALOT
  rationale: The idiom נשׂא עון is weighty covenantal/legal language. 'Bear his iniquity'
    preserves that gravity better than a flattened paraphrase, though 'bear his guilt'
    is a viable alternative.
