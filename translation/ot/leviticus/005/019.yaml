theological_decisions:
- issue: Sense of the closing phrase לַיהוָה in relation to אשם
  chosen_reading: The offender's guilt is stated as liability before the LORD rather
    than merely that the offering belongs to the LORD.
  alternative_readings:
  - the offering is a guilt offering to the LORD
  - he is certainly guilty against the LORD
  rationale: 'The verse appears to summarize the case and its theological significance:
    the person has incurred real guilt in relation to YHWH, which grounds the need
    for the guilt offering. Rendering the phrase with the verbal clause best preserves
    that force in English while avoiding over-interpretation.'
