id: LEV.5.19
reference: Leviticus 5:19
source:
  edition: WLC
  text: אָשָׁ֖ם ה֑וּא אָשֹׁ֥ם אָשַׁ֖ם לַ/יהוָֽה׃פ
translation:
  text: It is a guilt offering; he has indeed incurred guilt before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It is a guilt offering; he is certainly guilty against the LORD.' The
      Hebrew repeats the root אשם ('guilt'/'be guilty') for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשָׁם
  chosen: guilt offering
  alternatives:
  - reparation offering
  - compensation offering
  - guilt
  lexicon: HALOT
  rationale: As a noun in sacrificial context, אָשָׁם commonly denotes the specific
    offering prescribed for guilt/reparation. 'Guilt offering' is the most established
    and transparent English rendering here, while alternatives such as 'reparation
    offering' highlight the compensatory aspect but are less standard.
- source_word: הוּא
  chosen: It is
  alternatives:
  - This is
  lexicon: HALOT
  rationale: 'The pronoun functions predicatively to identify the sacrifice: ''It
    is a guilt offering.'' English requires the copular expression for natural sense.'
- source_word: אָשֹׁם אָשַׁם
  chosen: has indeed incurred guilt
  alternatives:
  - is certainly guilty
  - has surely become guilty
  - has committed a trespass
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb of the same root intensifies
    the verbal idea. Because the root אשם here is cognate with the noun ''guilt offering,''
    the clause explains why this sacrifice applies: the offender has truly incurred
    guilt. ''Has indeed incurred guilt'' preserves the emphatic force without awkward
    literalism.'
- source_word: לַיהוָה
  chosen: before the LORD
  alternatives:
  - against the LORD
  - to the LORD
  lexicon: HALOT
  rationale: The preposition ל with אשם can indicate liability with reference to YHWH.
    'Before the LORD' communicates accountability in relation to him and fits the
    legal-sacrificial context. 'Against the LORD' is possible, but this verse summarizes
    liability more than direct hostility.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the LXX pattern.
