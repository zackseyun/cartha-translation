id: LEV.5.22
reference: Leviticus 5:22
source:
  edition: WLC
  text: אֽוֹ מָצָ֧א אֲבֵדָ֛ה וְ/כִ֥חֶשׁ בָּ֖/הּ וְ/נִשְׁבַּ֣ע עַל שָׁ֑קֶר עַל אַחַ֗ת
    מִ/כֹּ֛ל אֲשֶׁר יַעֲשֶׂ֥ה הָ/אָדָ֖ם לַ/חֲטֹ֥א בָ/הֵֽנָּה־־־־׃
translation:
  text: or he finds lost property and lies about it and swears falsely—about any one
    of all the things that a man may do to sin by them—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and denies it.' The Hebrew verb can carry the sense of false denial
      in a legal dispute.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man,' used here in a generic legal sense for any person.
    reason: cultural_note
lexical_decisions:
- source_word: אֽוֹ
  chosen: or
  lexicon: HALOT
  rationale: Disjunctive particle continuing the list of possible offenses from the
    surrounding context.
- source_word: מָצָא
  chosen: finds
  alternatives:
  - has found
  lexicon: HALOT
  rationale: 'Qal perfect in casuistic law is naturally rendered in English as a present
    in a conditional/listing sense: ''finds''.'
- source_word: אֲבֵדָה
  chosen: lost property
  alternatives:
  - a lost thing
  - something lost
  lexicon: HALOT
  rationale: Refers to an item that has been lost; 'lost property' is idiomatic modern
    English and preserves the legal sense better than the more wooden 'lost thing'.
- source_word: וְכִחֶשׁ בָּהּ
  chosen: and lies about it
  alternatives:
  - and denies it
  - and acts falsely concerning it
  lexicon: HALOT
  rationale: The verb can mean deny/deal falsely. In this legal context with a found
    item, the sense is false denial regarding the property. 'Lies about it' is clear
    modern English; the alternative 'denies it' is viable and preserved in a footnote
    because it is a notable lexical option.
- source_word: וְנִשְׁבַּע עַל שָׁקֶר
  chosen: and swears falsely
  alternatives:
  - and swears to a lie
  - and swears deceitfully
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew expression for taking a false oath.
- source_word: עַל אַחַת מִכֹּל
  chosen: about any one of all the things
  alternatives:
  - in any one of all the things
  - concerning any of all the things
  lexicon: HALOT
  rationale: This phrase sums up the listed offenses. 'About any one of all the things'
    preserves the distributive force of אַחַת and the comprehensiveness of מִכֹּל.
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: Following the project's gender-accurate policy, אָדָם here is singular
    generic in a legal formulation. 'A man' matches the source form and representative
    force; inclusivity can be noted in a footnote.
- source_word: לַחֲטֹא בָהֵנָּה
  chosen: to sin by them
  alternatives:
  - to incur guilt by them
  - to sin in them
  lexicon: HALOT
  rationale: Infinitive construct with preposition expresses result/purpose within
    the legal formula. 'To sin by them' is a close, readable rendering of committing
    sin through such acts.
