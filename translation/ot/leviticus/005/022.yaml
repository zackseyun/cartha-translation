theological_decisions:
- issue: Rendering of הָאָדָם in a generic legal statement
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  - humankind
  rationale: The Hebrew uses singular הָאָדָם generically. Per doctrine, gender-accurate
    renderings are preferred where the source is grammatically masculine with representative
    force. A footnote can clarify that the legal principle applies generally.
