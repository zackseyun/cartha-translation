id: LEV.5.21
reference: Leviticus 5:21
source:
  edition: WLC
  text: נֶ֚פֶשׁ כִּ֣י תֶחֱטָ֔א וּ/מָעֲלָ֥ה מַ֖עַל בַּ/יהוָ֑ה וְ/כִחֵ֨שׁ בַּ/עֲמִית֜/וֹ בְּ/פִקָּד֗וֹן אֽוֹ בִ/תְשׂ֤וּמֶת יָד֙ א֣וֹ בְ/גָזֵ֔ל א֖וֹ עָשַׁ֥ק אֶת עֲמִיתֽ/וֹ־־׃
translation:
  text: If a person sins and commits a breach of faith against Yahweh by deceiving his neighbor about a deposit, or a pledge, or by robbery, or if he has oppressed his neighbor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pledge' or 'something placed in his hand' for 'a security entrusted to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - someone
  - a soul
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ often refers to an individual person rather than the inner 'soul.' 'A person' is natural modern English and preserves the singular legal subject.
- source_word: כִּי תֶחֱטָא
  chosen: If ... sins
  alternatives:
  - When ... sins
  lexicon: HALOT
  rationale: כִּי with the imperfect here introduces a conditional/casuistic clause. 'If ... sins' fits English legal style and the casuistic context.
- source_word: וּמָעֲלָה מַעַל
  chosen: and commits a breach of faith
  alternatives:
  - and acts unfaithfully
  - and commits a trespass
  lexicon: HALOT
  rationale: The cognate construction intensifies the idea of unfaithfulness or treachery. 'Breach of faith' captures the covenantal and relational force better than the older technical 'trespass,' while remaining concise.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - with respect to the LORD
  lexicon: HALOT
  rationale: Following the doctrinal default, יהוה is rendered 'the LORD.' Although the wrong is committed against a neighbor, the text explicitly frames it as faithlessness against the LORD, so 'against the LORD' preserves that theological-legal force.
- source_word: וְכִחֵשׁ
  chosen: by deceiving
  alternatives:
  - and lies
  - and deals falsely
  lexicon: HALOT
  rationale: The verb can denote denial, false dealing, or deception. In this legal list, 'by deceiving' communicates the practical sense in readable English without flattening it to mere verbal lying.
- source_word: בַּעֲמִיתוֹ
  chosen: his neighbor
  alternatives:
  - his fellow
  - his associate
  lexicon: HALOT
  rationale: עָמִית denotes a fellow member of the community. 'Neighbor' is idiomatic and familiar in English Bible style, while still fitting the social-legal context.
- source_word: בְּפִקָּדוֹן
  chosen: about a deposit
  alternatives:
  - regarding a deposit
  - in the matter of a deposit
  lexicon: HALOT
  rationale: The noun refers to property entrusted for safekeeping. 'Deposit' is the clearest concise legal equivalent.
- source_word: בִתְשׂוּמֶת יָד
  chosen: a security entrusted to him
  alternatives:
  - a pledge
  - something placed in his hand
  lexicon: HALOT
  rationale: Literally 'a placing of the hand,' likely referring to something handed over, entrusted, or pledged. 'A security entrusted to him' captures the transactional/legal nuance while remaining intelligible. Because the phrase is somewhat debated, alternatives are preserved in a footnote.
- source_word: בְגָזֵל
  chosen: through robbery
  alternatives:
  - by robbery
  - in a matter of stolen goods
  lexicon: HALOT
  rationale: The noun denotes robbery or something taken by force. 'Through robbery' fits the series governed by the preposition and reads naturally in English.
- source_word: עָשַׁק אֶת עֲמִיתוֹ
  chosen: if he has oppressed his neighbor
  alternatives:
  - or has extorted his neighbor
  - or has defrauded his neighbor
  lexicon: HALOT
  rationale: The verb covers oppression by withholding, exploiting, or extorting. 'Oppressed' is broad enough to preserve the Hebrew's moral weight; alternatives are possible in more specific economic contexts.
