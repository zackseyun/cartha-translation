theological_decisions:
- issue: How to express that a social/economic wrong is simultaneously a sin against God
  chosen_reading: against the LORD
  alternative_readings:
  - with respect to the LORD
  rationale: The Hebrew explicitly states that deceit against one's neighbor constitutes a breach of faith against YHWH. The translation preserves this vertical dimension without adding doctrinal explanation beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the doctrinal default for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
