theological_decisions:
- issue: Meaning of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - sin
  rationale: The term can denote either the offense or the offering, but in this verse
    the syntax and cultic instructions concern the sacrificial item being brought.
    Rendering it 'sin offering' preserves the ritual sense without importing later
    doctrinal categories.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the poverty idiom without obscuring legal force
  chosen_reading: his means are not sufficient
  alternative_readings:
  - he cannot afford
  rationale: The verse legislates a concession for the poor. The chosen wording preserves
    the legal-economic condition in readable English while avoiding colloquial flattening.
  doctrine_reference: Translation philosophy §6
