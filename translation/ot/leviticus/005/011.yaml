id: LEV.5.11
reference: Leviticus 5:11
source:
  edition: WLC
  text: וְ/אִם לֹא֩ תַשִּׂ֨יג יָד֜/וֹ לִ/שְׁתֵּ֣י תֹרִ֗ים אוֹ֮ לִ/שְׁנֵ֣י בְנֵי יוֹנָה֒
    וְ/הֵבִ֨יא אֶת קָרְבָּנ֜/וֹ אֲשֶׁ֣ר חָטָ֗א עֲשִׂירִ֧ת הָ/אֵפָ֛ה סֹ֖לֶת לְ/חַטָּ֑את
    לֹא יָשִׂ֨ים עָלֶ֜י/הָ שֶׁ֗מֶן וְ/לֹא יִתֵּ֤ן עָלֶ֨י/הָ֙ לְבֹנָ֔ה כִּ֥י חַטָּ֖את
    הִֽיא־־־־־׃
translation:
  text: But if his means are not sufficient for two turtledoves or two young pigeons,
    then he shall bring as his offering for the sin that he has committed a tenth
    of an ephah of fine flour for a sin offering. He shall put no oil on it and place
    no frankincense on it, because it is a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'if his hand does not reach'—a Hebrew idiom meaning he lacks
      sufficient means.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשִּׂיג יָדוֹ
  chosen: his means are not sufficient
  alternatives:
  - his hand cannot reach
  - he cannot afford
  lexicon: HALOT
  rationale: The idiom literally speaks of one's hand not reaching, but in sacrificial
    legislation it denotes insufficient financial means. 'His means are not sufficient'
    preserves the economic sense in clear modern English without over-paraphrasing.
- source_word: תֹרִים
  chosen: turtledoves
  alternatives:
  - doves
  lexicon: HALOT
  rationale: The species term specifically refers to turtledoves in sacrificial contexts;
    this is more precise than the broader 'doves'.
- source_word: בְנֵי יוֹנָה
  chosen: young pigeons
  alternatives:
  - pigeons
  - young doves
  lexicon: HALOT
  rationale: Literally 'sons of a dove/pigeon,' an idiom for young pigeons. This is
    the standard zoological sense in Leviticus.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his قربان
  - his sacrifice
  lexicon: HALOT
  rationale: A general sacrificial term meaning what one brings near as an offering.
    'Offering' is natural English and broad enough for the grain substitute described
    here.
- source_word: אֲשֶׁר חָטָא
  chosen: for the sin that he has committed
  alternatives:
  - which he sinned
  - for what he sinned
  lexicon: HALOT
  rationale: The clause identifies the offense in relation to the offering. English
    requires expansion for idiomatic clarity.
- source_word: עֲשִׂירִת הָאֵפָה
  chosen: a tenth of an ephah
  alternatives:
  - one-tenth ephah
  lexicon: HALOT
  rationale: This is a fixed dry measure. Retaining 'ephah' preserves the ancient
    unit rather than approximating it.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for finely milled flour used in offerings.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial legislation חַטָּאת can denote either sin or the sin offering.
    Here the cultic sense is explicit.
- source_word: לֹא יָשִׂים עָלֶיהָ שֶׁמֶן
  chosen: He shall put no oil on it
  alternatives:
  - He shall not put oil on it
  lexicon: HALOT
  rationale: Direct prohibition concerning the grain offering's preparation; 'put
    no oil on it' is concise and natural.
- source_word: וְלֹא יִתֵּן עָלֶיהָ לְבֹנָה
  chosen: and place no frankincense on it
  alternatives:
  - and put no frankincense on it
  lexicon: HALOT
  rationale: לְבֹנָה is frankincense, the aromatic resin used in offerings. 'Place'
    avoids awkward repetition after 'put' while preserving the action.
- source_word: כִּי חַטָּאת הִיא
  chosen: because it is a sin offering
  alternatives:
  - for it is a sin offering
  lexicon: HALOT
  rationale: 'The clause gives the reason oil and frankincense are excluded: this
    offering belongs to the category of sin offering, not a celebratory grain offering.'
