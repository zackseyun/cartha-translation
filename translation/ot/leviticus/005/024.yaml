theological_decisions:
- issue: Rendering of אַשְׁמָתוֹ in sacrificial context
  chosen_reading: his guilt offering
  alternative_readings:
  - his guilt
  - the day of his reparation
  rationale: The term can denote either the state of guilt or the offering associated
    with guilt. In Leviticus 5, the immediate context concerns restitution together
    with the required sacrificial act, so rendering it as 'guilt offering' preserves
    the cultic-legal linkage rather than reducing it to an abstract state.
  doctrine_reference: Translation philosophy §1, §3, §6
