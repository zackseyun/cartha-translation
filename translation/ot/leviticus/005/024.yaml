id: LEV.5.24
reference: Leviticus 5:24
source:
  edition: WLC
  text: א֠וֹ מִ/כֹּ֞ל אֲשֶׁר יִשָּׁבַ֣ע עָלָי/ו֮ לַ/שֶּׁקֶר֒ וְ/שִׁלַּ֤ם אֹת/וֹ֙ בְּ/רֹאשׁ֔/וֹ
    וַ/חֲמִשִׁתָ֖י/ו יֹסֵ֣ף עָלָ֑י/ו לַ/אֲשֶׁ֨ר ה֥וּא ל֛/וֹ יִתְּנֶ֖/נּוּ בְּ/י֥וֹם
    אַשְׁמָתֽ/וֹ־׃
translation:
  text: or anything about which he swore falsely—he shall repay it in full, and shall
    add a fifth to it. He shall give it to the one to whom it belongs on the day of
    his guilt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the day of his guilt.' The Hebrew term can refer either to guilt
      itself or to the guilt offering; here the main text follows the sacrificial
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: א֠וֹ
  chosen: or
  alternatives:
  - or if
  lexicon: HALOT
  rationale: Continues the list from the previous verse with a disjunctive 'or.' English
    can omit an added 'if' because the conditional force is already carried by the
    legal context.
- source_word: מִכֹּל אֲשֶׁר
  chosen: anything about which
  alternatives:
  - from anything that
  - concerning anything that
  lexicon: HALOT
  rationale: The phrase introduces the category of property or matter involved. 'Anything
    about which' is idiomatic and preserves the broad scope of כֹּל + אֲשֶׁר.
- source_word: יִשָּׁבַע עָלָיו לַשֶּׁקֶר
  chosen: he swore falsely
  alternatives:
  - he swore about falsely
  - he took a false oath concerning
  lexicon: HALOT
  rationale: The Niphal of שׁבע with עַל plus לַשֶּׁקֶר refers to swearing falsely
    concerning a matter. 'He swore falsely' is concise and natural; the object is
    already supplied by 'anything about which.'
- source_word: וְשִׁלַּם אֹתוֹ בְּרֹאשׁוֹ
  chosen: he shall repay it in full
  alternatives:
  - he shall restore it in full
  - he shall make restitution for it in its principal amount
  lexicon: HALOT
  rationale: The legal idiom 'in/with its head' means the principal amount, i.e.,
    full restitution of the original value. 'Repay it in full' communicates the sense
    clearly in modern English.
- source_word: וַחֲמִשִׁתָיו יֹסֵף עָלָיו
  chosen: and shall add a fifth to it
  alternatives:
  - and add one-fifth to it
  - and add its fifth part to it
  lexicon: HALOT
  rationale: This standard restitution formula requires an added twenty percent. 'A
    fifth' is a clear, direct rendering; 'one-fifth' would be equally possible.
- source_word: לַאֲשֶׁר הוּא לוֹ
  chosen: to the one to whom it belongs
  alternatives:
  - to him whose it is
  - to its owner
  lexicon: HALOT
  rationale: The Hebrew is literally 'to whom it is his,' an idiom for rightful ownership.
    'To the one to whom it belongs' preserves the legal force without sounding archaic.
- source_word: יִתְּנֶנּוּ
  chosen: He shall give it
  alternatives:
  - he shall pay it
  - he shall hand it over
  lexicon: HALOT
  rationale: נתן is the ordinary verb 'give'; here it refers to delivering the restitution
    payment to the rightful owner.
- source_word: בְּיוֹם אַשְׁמָתוֹ
  chosen: on the day of his guilt offering
  alternatives:
  - on the day of his guilt
  - on the day he incurs guilt
  lexicon: HALOT
  rationale: In Levitical sacrificial context, אַשְׁמָה/אָשָׁם can denote both guilt
    and the associated guilt offering. Here, because the surrounding context immediately
    proceeds to sacrificial prescription, 'guilt offering' best fits the legal-ritual
    setting while remaining faithful to the term's cultic sense.
