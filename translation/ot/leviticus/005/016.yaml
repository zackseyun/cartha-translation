id: LEV.5.16
reference: Leviticus 5:16
source:
  edition: WLC
  text: וְ/אֵ֣ת אֲשֶׁר֩ חָטָ֨א מִן הַ/קֹּ֜דֶשׁ יְשַׁלֵּ֗ם וְ/אֶת חֲמִֽישִׁת/וֹ֙ יוֹסֵ֣ף
    עָלָ֔י/ו וְ/נָתַ֥ן אֹת֖/וֹ לַ/כֹּהֵ֑ן וְ/הַ/כֹּהֵ֗ן יְכַפֵּ֥ר עָלָ֛י/ו בְּ/אֵ֥יל
    הָ/אָשָׁ֖ם וְ/נִסְלַ֥ח לֽ/וֹ־־׃פ
translation:
  text: He shall make restitution for what he sinned against from the holy thing,
    and he shall add a fifth of it to it and give it to the priest. Then the priest
    shall make atonement for him with the ram of the guilt offering, and he shall
    be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for what he wrongfully withheld from the holy thing.' The Hebrew refers
      to restitution for an offense involving something holy or sacred.
    reason: lexical_alternative
  - marker: b
    text: Or, 'with the ram for a guilt offering'; alternatively, 'for a reparation
      offering.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָטָא מִן הַקֹּדֶשׁ
  chosen: sinned against from the holy thing
  alternatives:
  - wrongly withheld from the holy thing
  - defrauded the sanctuary
  lexicon: HALOT
  rationale: The construction refers to offense involving sacred property or holy
    dues. A more idiomatic English rendering is needed, but the source does not explicitly
    say 'sanctuary' here. 'Sinned against from the holy thing' is too wooden in English;
    the intended sense is restitution for what was taken or withheld from what is
    holy.
- source_word: יְשַׁלֵּם
  chosen: make restitution
  alternatives:
  - repay
  - restore
  lexicon: HALOT
  rationale: In this legal-sacrificial context, the Piel of שלם denotes repayment/restoration
    with compensation, not merely generic payment. 'Make restitution' best captures
    the legal force.
- source_word: חֲמִישִׁתוֹ
  chosen: a fifth of it
  alternatives:
  - one-fifth of it
  - twenty percent of it
  lexicon: HALOT
  rationale: The noun means 'its fifth part.' 'A fifth of it' is natural and sufficiently
    precise.
- source_word: יוֹסֵף עָלָיו
  chosen: add ... to it
  alternatives:
  - add it on top of it
  - add it thereto
  lexicon: HALOT
  rationale: The idiom means adding the surcharge in addition to the principal amount.
    'Add ... to it' is clear modern English.
- source_word: לַכֹּהֵן
  chosen: to the priest
  lexicon: HALOT
  rationale: Direct and standard rendering of the recipient of the restitution payment.
- source_word: יְכַפֵּר עָלָיו
  chosen: make atonement for him
  alternatives:
  - make expiation for him
  lexicon: HALOT
  rationale: '''Make atonement'' is the standard and accessible rendering for כפר
    in sacrificial contexts. ''Expiation'' is possible but less readable.'
- source_word: בְּאֵיל הָאָשָׁם
  chosen: with the ram of the guilt offering
  alternatives:
  - with the ram for a guilt offering
  - with the ram of reparation offering
  lexicon: HALOT
  rationale: אָשָׁם here denotes the specific reparation/guilt offering. 'Guilt offering'
    is the established and understandable sacrificial term; 'with the ram of the guilt
    offering' reflects the construct relation.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  lexicon: HALOT
  rationale: The Niphal of סלח is naturally rendered as divine forgiveness granted
    to the offender. English idiom prefers 'he shall be forgiven.'
