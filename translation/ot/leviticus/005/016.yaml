theological_decisions:
- issue: Rendering of sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - compensation offering
  rationale: The term can emphasize both guilt and restitution. 'Guilt offering' is
    the most recognizable English rendering and fits the sacrificial system context,
    while the restitution aspect is already expressed by 'make restitution' and the
    added fifth.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
