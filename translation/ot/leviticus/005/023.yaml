id: LEV.5.23
reference: Leviticus 5:23
source:
  edition: WLC
  text: וְ/הָיָה֮ כִּֽי יֶחֱטָ֣א וְ/אָשֵׁם֒ וְ/הֵשִׁ֨יב אֶת הַ/גְּזֵלָ֜ה אֲשֶׁ֣ר גָּזָ֗ל
    א֤וֹ אֶת הָ/עֹ֨שֶׁק֙ אֲשֶׁ֣ר עָשָׁ֔ק א֚וֹ אֶת הַ/פִּקָּד֔וֹן אֲשֶׁ֥ר הָפְקַ֖ד
    אִתּ֑/וֹ א֥וֹ אֶת הָ/אֲבֵדָ֖ה אֲשֶׁ֥ר מָצָֽא־־־־־׃
translation:
  text: And it shall be, when he sins and becomes guilty, that he shall restore what
    he took by robbery, or the thing he extorted, or the deposit that was entrusted
    to him, or the lost thing that he found,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if he sins and incurs guilt.' The Hebrew legal formula can be rendered
      either 'when' or 'if,' and וְאָשֵׁם may be expressed as 'becomes guilty' or
      'incurs guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what he obtained by oppression' or 'what he defrauded.' The Hebrew term
      can denote oppressive or fraudulent seizure of another's property.
    reason: lexical_alternative
  - marker: c
    text: Or 'the lost property he found.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - Then it shall be
  lexicon: HALOT
  rationale: A conventional legal-formula opening in Hebrew. 'And it shall be' preserves
    the formal casuistic style without becoming unnatural.
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this legal context introducing a case, 'when' better reflects the
    expected occurrence in casuistic law than a more hypothetical 'if'.
- source_word: יֶחֱטָא
  chosen: he sins
  alternatives:
  - he commits a sin
  - he does wrong
  lexicon: HALOT
  rationale: The verb חטא is straightforwardly 'sin.' This keeps the moral and covenantal
    force explicit.
- source_word: וְאָשֵׁם
  chosen: becomes guilty
  alternatives:
  - incurs guilt
  - realizes his guilt
  lexicon: HALOT
  rationale: The verb conveys becoming liable/guilty. 'Becomes guilty' is clear modern
    English and avoids importing the narrower sense of subjective realization, though
    awareness is involved in the larger context.
- source_word: וְהֵשִׁיב
  chosen: he shall restore
  alternatives:
  - he shall return
  - he must restore
  lexicon: HALOT
  rationale: In legal restitution context, 'restore' better captures making restitution
    than the more neutral 'return.' 'Shall' preserves the legal force.
- source_word: הַגְּזֵלָה אֲשֶׁר גָּזָל
  chosen: what he took by robbery
  alternatives:
  - the stolen thing that he stole
  - the robbery he committed
  lexicon: HALOT
  rationale: The Hebrew uses cognate noun + verb for violent or wrongful taking. 'What
    he took by robbery' is idiomatic English that preserves the force without awkward
    repetition.
- source_word: הָעֹשֶׁק אֲשֶׁר עָשָׁק
  chosen: the thing he extorted
  alternatives:
  - the oppression he committed
  - what he obtained by oppression
  - what he defrauded
  lexicon: HALOT
  rationale: The noun/verb pair centers on oppressive withholding or exploitation.
    In this property-law context, 'the thing he extorted' best conveys wrongful acquisition
    of another's property.
- source_word: הַפִּקָּדוֹן אֲשֶׁר הָפְקַד אִתּוֹ
  chosen: the deposit that was entrusted to him
  alternatives:
  - the entrusted property left with him
  - the pledge deposited with him
  lexicon: HALOT
  rationale: This refers to property placed in someone's custody. 'Deposit' is concise
    and legally apt; 'entrusted to him' makes the relationship explicit and natural
    in English.
- source_word: הָאֲבֵדָה אֲשֶׁר מָצָא
  chosen: the lost thing that he found
  alternatives:
  - the lost property he found
  - the lost item that he found
  lexicon: HALOT
  rationale: The phrase refers to lost property found by the offender. 'Lost thing'
    is slightly formal but matches the legal list structure; 'property' is possible
    but somewhat interpretive.
