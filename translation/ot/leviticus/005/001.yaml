theological_decisions:
- issue: Gender representation in legal case law
  chosen_reading: Use singular 'a person' with subsequent masculine 'he'
  alternative_readings:
  - Use fully gender-neutral phrasing throughout ('they')
  rationale: The Hebrew begins with the common legal formula נֶפֶשׁ ('a person'),
    but the subsequent verbs/pronouns are grammatically singular and include masculine
    forms. Per the translation philosophy's gender-accurate principle, the English
    keeps singular reference and representative 'he' rather than pluralizing to 'they.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
