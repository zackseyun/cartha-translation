id: LEV.5.1
reference: Leviticus 5:1
source:
  edition: WLC
  text: וְ/נֶ֣פֶשׁ כִּֽי תֶחֱטָ֗א וְ/שָֽׁמְעָה֙ ק֣וֹל אָלָ֔ה וְ/ה֣וּא עֵ֔ד א֥וֹ רָאָ֖ה
    א֣וֹ יָדָ֑ע אִם ל֥וֹא יַגִּ֖יד וְ/נָשָׂ֥א עֲוֺנֽ/וֹ־־׃
translation:
  text: If a person sins because he hears a public adjuration and he is a witness—whether
    he has seen or otherwise knows—and he does not report it, then he shall bear his
    guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he hears the voice of an oath,' that is, a solemn sworn adjuration calling
      for testimony.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall bear his iniquity.' The Hebrew idiom means he remains liable
      for the guilt of withholding testimony.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - a soul
  - someone
  lexicon: HALOT
  rationale: Though literally 'soul/self,' in legal material נֶפֶשׁ commonly refers
    to a person. 'A person' is natural modern English and fits the case-law style
    without importing a more metaphysical sense.
- source_word: תֶחֱטָא
  chosen: sins
  alternatives:
  - commits a sin
  - becomes guilty
  lexicon: HALOT
  rationale: The verb חטא here introduces a culpable offense in casuistic law. 'Sins'
    is concise and preserves the moral/legal force better than a purely juridical
    'becomes guilty.'
- source_word: וְשָׁמְעָה קוֹל אָלָה
  chosen: he hears a public adjuration
  alternatives:
  - he hears the voice of an oath
  - he hears a sworn charge
  - he hears an imprecation
  lexicon: HALOT
  rationale: קוֹל אָלָה is an idiom in legal context for hearing a solemn oath/adjuration
    calling for testimony. 'Public adjuration' communicates the courtroom-like summons
    more clearly than the overly literal 'voice of an oath,' while staying close to
    the source.
- source_word: וְהוּא עֵד
  chosen: and he is a witness
  alternatives:
  - while he is a witness
  - and he himself is a witness
  lexicon: HALOT
  rationale: This states the person's status in relation to the matter. 'He is a witness'
    is straightforward and preserves the legal force.
- source_word: אוֹ רָאָה אוֹ יָדָע
  chosen: whether he has seen or otherwise knows
  alternatives:
  - whether he saw or knew
  - whether he has seen or has come to know
  lexicon: HALOT
  rationale: The pair covers direct sight or other knowledge of the matter. 'Otherwise
    knows' helps English readers see that the second term broadens beyond visual witness.
- source_word: אִם לֹא יַגִּיד
  chosen: and he does not report it
  alternatives:
  - if he does not tell
  - if he does not declare it
  - if he does not testify
  lexicon: HALOT
  rationale: The Hiphil of נגד means to make known, declare, report. In this legal
    setting 'report it' is natural and broad enough to include formal testimony without
    over-specifying courtroom procedure.
- source_word: וְנָשָׂא עֲוֺנוֹ
  chosen: then he shall bear his guilt
  alternatives:
  - then he shall bear his iniquity
  - then he shall bear the punishment for his guilt
  lexicon: HALOT
  rationale: This idiom expresses liability for wrongdoing and its consequences. 'Bear
    his guilt' is a standard, readable rendering that preserves the covenantal-legal
    weight better than flattening it to mere punishment.
