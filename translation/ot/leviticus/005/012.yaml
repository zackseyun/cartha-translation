id: LEV.5.12
reference: Leviticus 5:12
source:
  edition: WLC
  text: וֶ/הֱבִיאָ/הּ֮ אֶל הַ/כֹּהֵן֒ וְ/קָמַ֣ץ הַ/כֹּהֵ֣ן מִ֠מֶּ/נָּה מְל֨וֹא קֻמְצ֜/וֹ
    אֶת אַזְכָּרָתָ/ה֙ וְ/הִקְטִ֣יר הַ/מִּזְבֵּ֔חָ/ה עַ֖ל אִשֵּׁ֣י יְהוָ֑ה חַטָּ֖את
    הִֽוא־׀־׃
translation:
  text: Then he shall bring it to the priest, and the priest shall take from it a
    handful as its memorial portion and burn it on the altar, on top of the food offerings
    of the LORD. It is a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It is a purification offering.' The Hebrew term can denote the offering
      that deals with sin by purification.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'offerings by fire of the LORD'; rendered 'food offerings of the
      LORD' for clear modern English in this sacrificial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱבִיאָהּ
  chosen: Then he shall bring it
  alternatives:
  - and he shall bring it
  lexicon: HALOT
  rationale: Hiphil of בוא with 3fs suffix refers to bringing the offering (the flour
    from the previous context) to the priest. English 'bring it' is natural; 'Then'
    reflects the sequential waw without over-literal repetition of 'and'.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כהן in sacrificial legislation.
- source_word: וְקָמַץ
  chosen: shall take ... a handful
  alternatives:
  - shall grasp
  - shall scoop a handful
  lexicon: HALOT
  rationale: Qal of קמץ here is the technical cultic action of taking a handful from
    the grain offering. 'Take ... a handful' communicates the ritual act clearly in
    modern English.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - from her
  lexicon: HALOT
  rationale: The feminine suffix refers to the offering/substance, not a person; English
    idiom requires 'it'.
- source_word: מְלֹא קֻמְצוֹ
  chosen: a handful
  alternatives:
  - the fullness of his fist
  - as much as his hand can hold
  lexicon: HALOT
  rationale: Literally 'the fullness of his handful/fist.' 'A handful' is the established
    and accurate idiomatic equivalent for the measured priestly portion.
- source_word: אֶת אַזְכָּרָתָהּ
  chosen: as its memorial portion
  alternatives:
  - its memorial offering
  - its reminder portion
  lexicon: HALOT
  rationale: אַזכרה is the technical term for the token portion of a grain offering
    burned on the altar as a memorial before God. 'Memorial portion' preserves the
    cultic nuance better than a bare 'memorial'.
- source_word: וְהִקְטִיר
  chosen: and burn it
  alternatives:
  - and turn it into smoke
  - and offer it up in smoke
  lexicon: HALOT
  rationale: Hiphil of קטר in sacrificial contexts means to burn on the altar as an
    offering. 'Burn it' is clear and sufficient in context.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: Directional ending with the verb of burning yields the sense of offering
    on the altar.
- source_word: עַל אִשֵּׁי יְהוָה
  chosen: on top of the food offerings of the LORD
  alternatives:
  - beside the offerings made by fire to the LORD
  - upon the fire offerings of the LORD
  lexicon: HALOT
  rationale: אִשֵּׁי יְהוָה is a technical phrase for offerings by fire. To avoid
    archaic jargon while preserving the sacrificial sense, 'food offerings of the
    LORD' is used, with 'on top of' reflecting על in this ritual setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: חַטָּאת הִוא
  chosen: It is a sin offering
  alternatives:
  - It is a sin offering for sin
  - It is purification offering
  lexicon: HALOT
  rationale: חטאת in Leviticus can denote either 'sin' or the offering dealing with
    sin. In sacrificial formulae, 'sin offering' is the most transparent conventional
    rendering. 'Purification offering' is a defensible alternative but is not required
    by the doctrine excerpt and is less immediately recognizable for readers.
