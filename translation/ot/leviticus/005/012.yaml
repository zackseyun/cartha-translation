theological_decisions:
- issue: Rendering of חַטָּאת in priestly sacrificial law
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can emphasize either the offense or the rite's purgative
    function. In this verse the immediate cultic classification favors 'sin offering.'
    The alternative 'purification offering' is preserved in a footnote because it
    is a significant scholarly option and affects theological interpretation of Levitical
    sacrifice.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
