id: LEV.5.7
reference: Leviticus 5:7
source:
  edition: WLC
  text: וְ/אִם לֹ֨א תַגִּ֣יע יָד/וֹ֮ דֵּ֣י שֶׂה֒ וְ/הֵבִ֨יא אֶת אֲשָׁמ֜/וֹ אֲשֶׁ֣ר חָטָ֗א שְׁתֵּ֥י תֹרִ֛ים אֽוֹ שְׁנֵ֥י בְנֵֽי יוֹנָ֖ה לַֽ/יהוָ֑ה אֶחָ֥ד לְ/חַטָּ֖את וְ/אֶחָ֥ד לְ/עֹלָֽה־־־־׃
translation:
  text: But if his means do not suffice for a sheep, then he shall bring as his guilt offering for the sin that he committed two turtledoves or two young pigeons to Yahweh, one for a sin offering and one for a burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew חַטָּאת can denote either 'sin' or the offering associated with removing impurity/sin in sacrificial contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַגִּיע יָדוֹ דֵּי שֶׂה
  chosen: his means do not suffice for a sheep
  alternatives:
  - his hand does not reach enough for a sheep
  - he cannot afford a sheep
  lexicon: HALOT
  rationale: The idiom literally speaks of one's hand 'reaching' enough for a sheep, meaning financial ability. 'His means do not suffice' preserves the economic sense without over-paraphrasing; 'cannot afford' is possible but slightly more dynamic.
- source_word: אֲשָׁמוֹ
  chosen: his guilt offering
  alternatives:
  - his compensation offering
  - his reparation offering
  lexicon: HALOT
  rationale: Although אָשָׁם can denote both guilt and the offering associated with guilt/reparation, in sacrificial context here it refers to what he brings. 'Guilt offering' is the most established and clear cultic rendering in English.
- source_word: אֲשֶׁר חָטָא
  chosen: for the sin that he committed
  alternatives:
  - which he sinned
  - for what he sinned
  lexicon: HALOT
  rationale: The clause identifies the offense connected with the offering. Smooth English requires an explicit object such as 'the sin' while preserving the causal relation to the offering.
- source_word: שְׁתֵּי תֹרִים
  chosen: two turtledoves
  alternatives:
  - two turtle doves
  lexicon: HALOT
  rationale: Standard zoological rendering for תֹרִים in sacrificial legislation; the closed compound is normal modern English.
- source_word: שְׁנֵי בְנֵי יוֹנָה
  chosen: two young pigeons
  alternatives:
  - two sons of a dove
  - two fledgling pigeons
  lexicon: HALOT
  rationale: The Hebrew literally means 'two sons of a dove,' an idiom for young pigeons. 'Young pigeons' conveys the species and age naturally in English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - for sin
  - for a purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חַטָּאת often denotes the offering rather than merely the abstract sin. 'Sin offering' is the clearest conventional rendering; 'purification offering' is a defensible scholarly alternative but is not the default here.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - for an ascent offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole-burnt sacrifice. 'Burnt offering' is the established and intelligible English rendering; 'ascent offering' is more etymological but less transparent to general readers.
