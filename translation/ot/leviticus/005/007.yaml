theological_decisions:
- issue: Rendering of the sacrificial term חַטָּאת
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can be understood as either the offering associated with sin or, in some contexts, more specifically a purification offering. In this verse, the cultic pairing with עֹלָה and the legal-sacrificial setting favor the traditional 'sin offering' in the main text, while preserving 'purification offering' as a lexical alternative because it reflects an important scholarly understanding of the sacrificial function.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
