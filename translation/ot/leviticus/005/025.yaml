id: LEV.5.25
reference: Leviticus 5:25
source:
  edition: WLC
  text: וְ/אֶת אֲשָׁמ֥/וֹ יָבִ֖יא לַ/יהוָ֑ה אַ֣יִל תָּמִ֧ים מִן הַ/צֹּ֛אן בְּ/עֶרְכְּ/ךָ֥
    לְ/אָשָׁ֖ם אֶל הַ/כֹּהֵֽן־־־׃
translation:
  text: 'And he shall bring his compensation offering to the LORD: a flawless ram
    from the flock, according to your valuation, as a guilt offering, to the priest.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his guilt offering.' The Hebrew term אָשָׁם can refer both to guilt/reparation
      and to the specific guilt offering.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'without blemish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשָׁמוֹ
  chosen: his compensation offering
  alternatives:
  - his guilt offering
  - his reparation
  lexicon: HALOT
  rationale: אָשָׁם can denote both the state of guilt and the offering/reparation
    associated with it. Here, because a ram is then specified 'as a guilt offering'
    (לְאָשָׁם), rendering the first occurrence as 'compensation offering' helps reflect
    the broader reparative sense in this legal context without collapsing both occurrences
    into identical English. 'Guilt offering' remains a viable traditional alternative.
- source_word: יָבִיא
  chosen: he shall bring
  alternatives:
  - he must bring
  lexicon: HALOT
  rationale: Hiphil imperfect in legal instruction is well represented by English
    'shall bring,' preserving the prescriptive force of the law in readable modern
    English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard and precise rendering for a male sheep suitable for sacrifice.
- source_word: תָּמִים
  chosen: flawless
  alternatives:
  - without blemish
  - unblemished
  lexicon: HALOT
  rationale: Conveys sacrificial acceptability in clear modern English. 'Without blemish'
    is traditional, but 'flawless' is more natural while preserving the sense.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep or goats
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep/goats.
    Since אַיִל already narrows the animal to a ram, 'from the flock' is idiomatic
    and sufficient.
- source_word: בְּעֶרְכְּךָ
  chosen: according to your valuation
  alternatives:
  - by your valuation
  - at your assessed value
  lexicon: HALOT
  rationale: Refers to valuation/assessment made by the priest addressed in the law.
    'According to your valuation' preserves the second-person suffix and legal nuance.
- source_word: לְאָשָׁם
  chosen: as a guilt offering
  alternatives:
  - for guilt
  - for a compensation offering
  lexicon: HALOT
  rationale: In this sacrificial formula, the term most naturally denotes the specific
    offering category. 'As a guilt offering' clearly marks function/purpose of the
    ram.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  lexicon: HALOT
  rationale: Straightforward directional phrase indicating presentation to the officiating
    priest.
