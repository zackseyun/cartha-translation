theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and longstanding English Bible practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: How to render אָשָׁם in a verse where it appears twice with overlapping but
    distinct nuance
  chosen_reading: 'First occurrence: ''compensation offering''; second occurrence:
    ''guilt offering'''
  alternative_readings:
  - Render both occurrences 'guilt offering'
  - Render both occurrences 'reparation offering'
  rationale: The verse first speaks of what the offender brings in the context of
    making amends, then specifies the sacrificial category of the ram. Differentiating
    the two English renderings preserves the legal-reparative nuance of the first
    and the cultic category of the second without adding content beyond the Hebrew.
