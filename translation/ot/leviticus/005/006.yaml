theological_decisions:
- issue: Rendering of sacrificial terminology in a verse that uses both אשם and חטאת
  chosen_reading: Retain 'guilt offering' for אֲשָׁמוֹ and 'sin offering' for לְחַטָּאת in the same verse
  alternative_readings:
  - Render אֲשָׁמוֹ more generically as 'offering for his guilt' to reduce apparent tension
  - Render חטאת as 'purification offering'
  rationale: The Hebrew text itself juxtaposes these terms. Smoothing one into the other would hide a significant feature of the source. The translation preserves the lexical distinction while allowing the verse's sacrificial logic to stand as written.
  doctrine_reference: Translation philosophy items 1, 3, and 5
- issue: Divine name rendering
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the doctrine table for יְהוָה.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
