id: LEV.5.6
reference: Leviticus 5:6
source:
  edition: WLC
  text: וְ/הֵבִ֣יא אֶת אֲשָׁמ֣/וֹ לַ/יהוָ֡ה עַ֣ל חַטָּאת/וֹ֩ אֲשֶׁ֨ר חָטָ֜א נְקֵבָ֨ה מִן הַ/צֹּ֥אן כִּשְׂבָּ֛ה אֽוֹ שְׂעִירַ֥ת עִזִּ֖ים לְ/חַטָּ֑את וְ/כִפֶּ֥ר עָלָ֛י/ו הַ/כֹּהֵ֖ן מֵ/חַטָּאתֽ/וֹ־־־׃
translation:
  text: 'and he shall bring his guilt offering to Yahweh for his sin that he has committed: a female from the flock, a lamb or a female goat, for a sin offering; and the priest shall make atonement for him for his sin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his offering for guilt' or 'his reparation offering.' The Hebrew uses a term associated with guilt/reparation (אשם), while later in the verse the animal is specified 'for a sin offering.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from his sin'; the phrase can emphasize removal from the sin as the result of atonement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: and he shall bring
  alternatives:
  - and he must bring
  - then he shall bring
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in legal material carries injunctive/future force. 'Shall bring' fits English legal style and preserves the prescriptive sense.
- source_word: אֲשָׁמוֹ
  chosen: his guilt offering
  alternatives:
  - his compensation offering
  - his reparation offering
  lexicon: HALOT
  rationale: Although אשם can denote guilt or reparation, in sacrificial context it commonly refers to an offering associated with guilt. Here the object brought is then specified as an animal 'for a sin offering,' creating a known Levitical overlap in terminology. 'Guilt offering' preserves the Hebrew term rather than smoothing the tension away.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for his sin that he has committed
  alternatives:
  - because of his sin which he sinned
  - concerning the sin he committed
  lexicon: HALOT
  rationale: עַל here marks the basis/occasion for the offering. The cognate construction with חטא is idiomatically rendered in natural English as 'the sin that he has committed' while retaining the explicit reference to sin.
- source_word: נְקֵבָה
  chosen: a female
  alternatives:
  - a female animal
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies sex. 'A female' is concise and is clarified by the following flock-animal terms.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep and goats
  lexicon: HALOT
  rationale: צאן denotes small livestock, especially sheep/goats. 'From the flock' is the standard concise rendering and is immediately specified by the following alternatives.
- source_word: כִּשְׂבָּה
  chosen: a lamb
  alternatives:
  - a ewe-lamb
  lexicon: HALOT
  rationale: The term denotes a female sheep. Since נְקֵבָה already marks the animal as female, 'a lamb' is readable English without losing the sex specification already present in the clause.
- source_word: אוֹ שְׂעִירַת עִזִּים
  chosen: or a female goat
  alternatives:
  - or a she-goat
  - or a goat
  lexicon: HALOT
  rationale: The construct phrase explicitly indicates a female goat. 'Female goat' is clear modern English and preserves the sex distinction.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial context חטאת often denotes the purification/sin offering. 'Sin offering' is the conventional and sufficiently transparent rendering here. 'For a sin offering' reflects the prefixed ל.
- source_word: וְכִפֶּר עָלָיו
  chosen: and the priest shall make atonement for him
  alternatives:
  - and the priest shall purge him
  - and the priest shall effect atonement on his behalf
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.' This preserves the cultic-theological sense without importing a narrower later theory of atonement.
- source_word: מֵחַטָּאתוֹ
  chosen: for his sin
  alternatives:
  - from his sin
  - because of his sin
  lexicon: HALOT
  rationale: The preposition מן after כפר can indicate removal or relation to the offense. In idiomatic English after 'make atonement for him,' 'for his sin' communicates the sense clearly. The more literal 'from his sin' is preserved as an alternative because it highlights the removal nuance.
