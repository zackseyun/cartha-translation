id: LEV.5.20
reference: Leviticus 5:20
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s standard rendering
      ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר introduces a new speech unit in narrative.
    'Spoke' is the standard and slightly more formal rendering for דבר in divine speech
    formulas, while 'said' is possible but less distinct from the following לֵאמֹר
    formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the Septuagintal pattern, while
    preserving the covenant name's significance.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural
    modern English equivalent; 'unto' is unnecessarily archaic.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech-introduction
    formula following 'spoke to Moses.' 'Saying' preserves the Hebrew structure naturally
    in English and signals that the divine speech continues in the next verse.
