id: LEV.5.2
reference: Leviticus 5:2
source:
  edition: WLC
  text: א֣וֹ נֶ֗פֶשׁ אֲשֶׁ֣ר תִּגַּע֮ בְּ/כָל דָּבָ֣ר טָמֵא֒ אוֹ֩ בְ/נִבְלַ֨ת חַיָּ֜ה
    טְמֵאָ֗ה א֤וֹ בְּ/נִבְלַת֙ בְּהֵמָ֣ה טְמֵאָ֔ה א֕וֹ בְּ/נִבְלַ֖ת שֶׁ֣רֶץ טָמֵ֑א
    וְ/נֶעְלַ֣ם מִמֶּ֔/נּוּ וְ/ה֥וּא טָמֵ֖א וְ/אָשֵֽׁם־׃
translation:
  text: Or if a person touches any unclean thing—whether the carcass of an unclean
    wild animal, or the carcass of unclean livestock, or the carcass of an unclean
    swarming creature—and it is hidden from him, and he is unclean and becomes guilty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he is unaware of it'; literally, 'it is hidden from him.'
    reason: lexical_alternative
  - marker: b
    text: That is, he incurs guilt for the impurity once the matter applies to him,
      not that touching a carcass is itself necessarily a moral evil in the same sense
      as intentional sin.
    reason: cultural_note
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - someone
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ commonly refers to a person/individual rather
    than the immaterial 'soul.' 'Person' is natural modern English and preserves the
    legal scope.
- source_word: תִּגַּע בְּ
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: The verb נגע with ב marks physical contact. 'Touches' is the plain and
    sufficiently formal rendering here.
- source_word: כָל דָּבָר טָמֵא
  chosen: any unclean thing
  alternatives:
  - anything unclean
  - any impure thing
  lexicon: HALOT
  rationale: דָּבָר is broad ('thing, matter'). Here it introduces the category elaborated
    by the following examples, so 'any unclean thing' is suitably general.
- source_word: נִבְלַת
  chosen: the carcass of
  alternatives:
  - the dead body of
  - the corpse of
  lexicon: HALOT
  rationale: נְבֵלָה in Levitical purity law refers to an animal carcass/carrion.
    'Carcass' is the most precise and idiomatic English term in this context.
- source_word: חַיָּה טְמֵאָה
  chosen: an unclean wild animal
  alternatives:
  - an unclean beast
  - an unclean animal of the field
  lexicon: HALOT
  rationale: חַיָּה here contrasts with בְּהֵמָה and denotes wild land animals rather
    than animals generally. 'Wild animal' makes the distinction clear in modern English.
- source_word: בְּהֵמָה טְמֵאָה
  chosen: unclean livestock
  alternatives:
  - unclean cattle
  - unclean domestic animal
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to domesticated quadrupeds. 'Livestock' is concise,
    natural, and preserves the contrast with wild animals.
- source_word: שֶׁרֶץ טָמֵא
  chosen: an unclean swarming creature
  alternatives:
  - an unclean creeping thing
  - an unclean swarming thing
  lexicon: HALOT
  rationale: שֶׁרֶץ denotes small creatures that swarm or teem. 'Swarming creature'
    is more accessible than the traditional 'creeping thing' while remaining close
    to the Hebrew category.
- source_word: וְנֶעְלַם מִמֶּנּוּ
  chosen: it is hidden from him
  alternatives:
  - he is unaware of it
  - it escapes his notice
  lexicon: HALOT
  rationale: The Niphal of עלם means the matter is concealed from the person, i.e.,
    he does not realize it. A relatively formal rendering preserves the Hebrew perspective;
    the idiom implies unawareness.
- source_word: וְהוּא טָמֵא
  chosen: and he is unclean
  alternatives:
  - though he is unclean
  - so that he is unclean
  lexicon: HALOT
  rationale: This clause states the resulting ritual status. 'And he is unclean' keeps
    the Hebrew coordination and avoids over-interpreting the logical relation.
- source_word: וְאָשֵׁם
  chosen: and becomes guilty
  alternatives:
  - and is guilty
  - and incurs guilt
  lexicon: HALOT
  rationale: אָשֵׁם in this legal context indicates liability/guilt incurred. 'Becomes
    guilty' reflects the progression after contracting impurity and then recognizing
    or bearing culpability.
