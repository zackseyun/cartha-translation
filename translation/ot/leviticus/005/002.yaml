theological_decisions:
- issue: Nature of impurity
  chosen_reading: Render טָמֵא/טְמֵאָה as 'unclean' rather than 'defiled' or 'sinful.'
  alternative_readings:
  - impure
  - defiled
  rationale: The verse concerns ritual impurity from contact with carcasses, not moral
    evil in itself. 'Unclean' is the established and clearest term for Levitical purity
    categories and avoids importing a stronger moral sense than the text requires.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gender representation
  chosen_reading: Use 'person' for נֶפֶשׁ but retain 'him/he' in the subsequent clauses.
  alternative_readings:
  - use singular 'they' throughout
  - use 'man' and masculine pronouns throughout
  rationale: The subject is a generic individual, so 'person' communicates the representative
    force naturally in English. The Hebrew subsequent pronouns are masculine singular;
    retaining 'him/he' preserves gender-accurate alignment with the source as directed
    by the doctrine statement.
  doctrine_reference: Translation philosophy §4
