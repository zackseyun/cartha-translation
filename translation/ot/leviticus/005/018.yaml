theological_decisions:
- issue: Rendering of sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  rationale: The verse belongs to the priestly sacrificial system, where אָשָׁם names
    a specific offering category. 'Guilt offering' best balances recognizability and
    lexical precision without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of כפר
  chosen_reading: make atonement
  alternative_readings:
  - make expiation
  - purge
  rationale: The text states the priestly sacrificial action and its result in forgiveness.
    'Make atonement' preserves the theological weight while remaining accessible,
    in line with optimal equivalence.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
