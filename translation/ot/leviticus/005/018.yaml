id: LEV.5.18
reference: Leviticus 5:18
source:
  edition: WLC
  text: וְ֠/הֵבִיא אַ֣יִל תָּמִ֧ים מִן הַ/צֹּ֛אן בְּ/עֶרְכְּ/ךָ֥ לְ/אָשָׁ֖ם אֶל הַ/כֹּהֵ֑ן
    וְ/כִפֶּר֩ עָלָ֨י/ו הַ/כֹּהֵ֜ן עַ֣ל שִׁגְגָת֧/וֹ אֲשֶׁר שָׁגָ֛ג וְ/ה֥וּא לֹֽא
    יָדַ֖ע וְ/נִסְלַ֥ח לֽ/וֹ־־־־׃
translation:
  text: He shall bring to the priest a ram without blemish from the flock, according
    to your valuation, for a guilt offering; and the priest shall make atonement for
    him concerning the error that he committed unintentionally, though he did not
    know it, and he shall be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a guilt offering'; alternatively, 'for a reparation offering.' The
      Hebrew אָשָׁם names a specific sacrificial category.
    reason: lexical_alternative
  - marker: b
    text: Or 'for his unintentional sin.' The Hebrew emphasizes an error committed
      inadvertently.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: He shall bring
  alternatives:
  - and he shall bring
  - then he shall bring
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in legal instruction functions
    with future/modal force in English. 'He shall bring' fits the prescriptive style
    of Leviticus.
- source_word: אַיִל
  chosen: a ram
  alternatives:
  - a male sheep
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the natural
    and precise English equivalent.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts this denotes an animal free from defect. 'Without
    blemish' is clear, idiomatic, and preserves cultic force.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep/goats
  - from the small livestock
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep and goats.
    With אַיִל already specifying a ram, 'from the flock' is concise and natural.
- source_word: בְּעֶרְכְּךָ
  chosen: according to your valuation
  alternatives:
  - by your valuation
  - at your assessed value
  lexicon: HALOT
  rationale: The phrase refers to valuation/assessment in the legal-sacrificial procedure.
    'According to your valuation' preserves the formal relation without overexplaining
    who performs the valuation.
- source_word: לְאָשָׁם
  chosen: for a guilt offering
  alternatives:
  - as a guilt offering
  - for reparation
  lexicon: HALOT
  rationale: אָשָׁם in Leviticus is the established sacrificial category. 'Guilt offering'
    is the most recognizable and sufficiently precise rendering; 'reparation offering'
    is possible but less standard here.
- source_word: וְכִפֶּר עָלָיו
  chosen: the priest shall make atonement for him
  alternatives:
  - the priest shall make atonement on his behalf
  - the priest shall purge him
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' 'For him' captures עָלָיו naturally in English.
- source_word: עַל שִׁגְגָתוֹ
  chosen: concerning the error
  alternatives:
  - for his unintentional sin
  - regarding his mistake
  lexicon: HALOT
  rationale: שׁגגה denotes an inadvertent error/offense. 'Concerning the error' keeps
    the semantic link with the following verb שָׁגַג and avoids importing a stronger
    term than the Hebrew explicitly uses at this point.
- source_word: אֲשֶׁר שָׁגָג
  chosen: that he committed unintentionally
  alternatives:
  - in which he erred unintentionally
  - that he did in error
  lexicon: HALOT
  rationale: The cognate verb clarifies the nature of the offense as inadvertent.
    'Committed unintentionally' is idiomatic and communicates the legal nuance.
- source_word: וְהוּא לֹא יָדַע
  chosen: though he did not know it
  alternatives:
  - and he did not know
  - while he was unaware
  lexicon: HALOT
  rationale: This clause explains the inadvertent nature of the offense. 'Though he
    did not know it' reads smoothly in English while preserving the explanatory force.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  - and forgiveness shall be granted to him
  lexicon: HALOT
  rationale: Passive/Niphal of סלח expresses the result of the atonement. 'He shall
    be forgiven' is clear modern English and preserves the divine passive sense without
    awkwardness.
