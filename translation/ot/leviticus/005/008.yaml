id: LEV.5.8
reference: Leviticus 5:8
source:
  edition: WLC
  text: וְ/הֵבִ֤יא אֹתָ/ם֙ אֶל הַ/כֹּהֵ֔ן וְ/הִקְרִ֛יב אֶת אֲשֶׁ֥ר לַ/חַטָּ֖את רִאשׁוֹנָ֑ה
    וּ/מָלַ֧ק אֶת רֹאשׁ֛/וֹ מִ/מּ֥וּל עָרְפּ֖/וֹ וְ/לֹ֥א יַבְדִּֽיל־־־׃
translation:
  text: And he shall bring them to the priest, and he shall present first the one
    for the sin offering, and he shall pinch off its head at the front of its neck,
    but he shall not sever it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'sin offering'; the Hebrew term חַטָּאת can also be understood more
      specifically as a 'purification offering' in Levitical sacrificial contexts.
    reason: lexical_alternative
  - marker: b
    text: The verb describes the priest's ritual handling of a bird sacrifice; traditional
      English versions often render it 'wring off' the head.
    reason: lexical_alternative
  - marker: c
    text: That is, the head was not to be fully detached from the body.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: he shall bring
  alternatives:
  - he must bring
  - and he brought
  lexicon: HALOT
  rationale: Hiphil of בוא in legal instruction commonly has modal/future force in
    English; 'he shall bring' fits sacrificial legislation style.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the two birds in the preceding context; plural must be
    preserved.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to the officiating priest
  lexicon: HALOT
  rationale: Direct and natural rendering of the prepositional phrase; no need to
    add 'officiating' since the Hebrew does not specify it.
- source_word: וְהִקְרִיב
  chosen: he shall present
  alternatives:
  - he shall offer
  - he shall bring near
  lexicon: HALOT
  rationale: קרב in Hiphil in sacrificial contexts means to present/offer. 'Present'
    avoids flattening the distinction between bringing the birds to the priest and
    the priest's ritual act with the first bird.
- source_word: אֶת אֲשֶׁר לַחַטָּאת רִאשׁוֹנָה
  chosen: first the one for the sin offering
  alternatives:
  - the one for a sin offering first
  - first the one as the sin offering
  lexicon: HALOT
  rationale: Captures the ordinal רִאשׁוֹנָה and the selection of one bird for the
    חטאת. 'Sin offering' is the standard cultic sense here.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial law חטאת can denote either sin or the offering
    for sin/purification. 'Sin offering' is the most recognizable and contextually
    appropriate English rendering, while 'purification offering' is a viable scholarly
    alternative worth preserving.
- source_word: וּמָלַק
  chosen: he shall pinch off
  alternatives:
  - he shall wring off
  - he shall nip off
  lexicon: HALOT
  rationale: מלק is the technical verb for the priest's handling of a bird's neck/head
    in sacrifice. 'Pinch off' reflects the specific manual action better than the
    more traditional but less transparent 'wring off.'
- source_word: אֶת רֹאשׁוֹ
  chosen: its head
  lexicon: HALOT
  rationale: Straightforward object with 3ms suffix referring to the bird.
- source_word: מִמּוּל עָרְפּוֹ
  chosen: at the front of its neck
  alternatives:
  - opposite its neck
  - by the nape of its neck
  lexicon: HALOT
  rationale: The phrase is difficult. מול indicates the area facing/opposite, and
    ערף is the neck/back of neck. In the ritual context the sense is the point at
    the neck where the head is pinched, not a full decapitation. 'At the front of
    its neck' gives a clear, workable English sense while avoiding the misleading
    'nape' if taken as the back only.
- source_word: וְלֹא יַבְדִּיל
  chosen: but he shall not sever it
  alternatives:
  - but he shall not divide it
  - but he shall not separate it completely
  lexicon: HALOT
  rationale: בדל means separate/divide. In this ritual context it specifies that the
    head is not fully detached from the body. 'Sever it' communicates the practical
    force in natural English.
