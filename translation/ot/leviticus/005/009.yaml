id: LEV.5.9
reference: Leviticus 5:9
source:
  edition: WLC
  text: וְ/הִזָּ֞ה מִ/דַּ֤ם הַ/חַטָּאת֙ עַל קִ֣יר הַ/מִּזְבֵּ֔חַ וְ/הַ/נִּשְׁאָ֣ר
    בַּ/דָּ֔ם יִמָּצֵ֖ה אֶל יְס֣וֹד הַ/מִּזְבֵּ֑חַ חַטָּ֖את הֽוּא־־׃
translation:
  text: And he shall sprinkle some of the blood of the sin offering on the side of
    the altar, and what remains of the blood shall be drained out at the base of the
    altar; it is a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' in both occurrences of 'sin offering.' The Hebrew
      term חַטָּאת can denote the offering for sin with emphasis on its purifying
      function.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  chosen: he shall sprinkle
  alternatives:
  - he shall spatter
  - he shall splash
  lexicon: HALOT
  rationale: Hiphil of נזה in sacrificial contexts refers to the ritual application
    of blood by sprinkling/spattering. 'Sprinkle' is the most natural and established
    English rendering here without becoming overly technical.
- source_word: מִדַּם
  chosen: some of the blood
  alternatives:
  - from the blood
  lexicon: HALOT
  rationale: 'The preposition מִן with ''blood'' here is naturally partitive: the
    priest applies a portion of the blood, not necessarily the entirety at this stage.
    ''Some of the blood'' makes the ritual sense clear in idiomatic English.'
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  - the sin sacrifice
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the sacrifice associated with sin.
    In Levitical sacrificial procedure the referent is clearly the offering. 'Sin
    offering' remains the most recognizable and contextually accurate rendering, though
    'purification offering' is a defensible alternative emphasizing ritual cleansing.
- source_word: עַל קִיר הַמִּזְבֵּחַ
  chosen: on the side of the altar
  alternatives:
  - against the wall of the altar
  - on the wall of the altar
  lexicon: HALOT
  rationale: קִיר literally means 'wall,' but for an altar in English 'side' is more
    natural while still reflecting the physical surface intended. This avoids an awkwardly
    architectural sense while preserving the concrete action.
- source_word: וְהַנִּשְׁאָר בַּדָּם
  chosen: and what remains of the blood
  alternatives:
  - and the rest of the blood
  - and what is left of the blood
  lexicon: HALOT
  rationale: The Niphal participle of שׁאר means 'what remains' or 'what is left.'
    The chosen rendering is clear, natural, and preserves the substantival force of
    the Hebrew.
- source_word: יִמָּצֶה
  chosen: shall be drained out
  alternatives:
  - shall be squeezed out
  - shall be poured out
  lexicon: HALOT
  rationale: The Niphal of מצה in this ritual context conveys pressing or draining
    out the remaining blood. 'Drained out' best captures the specific action without
    implying a simple free pouring.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  chosen: at the base of the altar
  alternatives:
  - to the foundation of the altar
  lexicon: HALOT
  rationale: יְסוֹד literally means 'foundation/base.' In altar terminology, 'base
    of the altar' is the idiomatic and precise English equivalent.
- source_word: חַטָּאת הוּא
  chosen: it is a sin offering
  alternatives:
  - it is a purification offering
  lexicon: HALOT
  rationale: The clause identifies the sacrifice by category. 'Sin offering' is retained
    for consistency with the earlier occurrence in the verse and with common Levitical
    sacrificial terminology, while acknowledging the alternative nuance of purification.
