theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term in Leviticus can emphasize either the relation to sin
    or the rite's purificatory effect. For this draft, 'sin offering' is chosen because
    it is contextually accurate, widely recognized, and fits the immediate sacrificial
    classification. The alternative is preserved in a footnote because it reflects
    a significant scholarly and theological nuance that should remain visible.
  doctrine_reference: Translation philosophy §§1, 3, 5
