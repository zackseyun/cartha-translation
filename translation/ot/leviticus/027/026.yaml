theological_decisions:
- issue: Reason the firstborn animal cannot be consecrated by vow
  chosen_reading: It cannot be newly consecrated because it already belongs to the LORD by prior divine claim as firstborn.
  alternative_readings:
  - It cannot be consecrated because firstborn status itself is a kind of consecration without emphasis on legal ownership.
  rationale: The verse's logic is that a person may not dedicate as a special offering what is already the LORD's by law. The final clause, 'it belongs to the LORD,' supports the ownership emphasis.
