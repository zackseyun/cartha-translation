id: LEV.27.26
reference: Leviticus 27:26
source:
  edition: WLC
  text: אַךְ בְּכ֞וֹר אֲשֶׁר יְבֻכַּ֤ר לַֽ/יהוָה֙ בִּ/בְהֵמָ֔ה לֹֽא יַקְדִּ֥ישׁ אִ֖ישׁ אֹת֑/וֹ אִם שׁ֣וֹר אִם שֶׂ֔ה לַֽ/יהוָ֖ה הֽוּא־־־־־׃
translation:
  text: However, a firstborn among the livestock, which as a firstborn belongs to Yahweh, no man may consecrate; whether an ox or a sheep, it belongs to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a man shall not dedicate it' or 'no one may consecrate it.' The Hebrew uses 'man' generically.
    reason: lexical_alternative
  - marker: b
    text: Hebrew שֶׂה can refer more broadly to a sheep or a goat from the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - But
  - Only
  lexicon: HALOT
  rationale: Introduces an exception or limitation to the preceding regulations. 'However' captures the restrictive/adversative force naturally in English.
- source_word: בְּכוֹר
  chosen: a firstborn
  alternatives:
  - the firstborn
  - firstling
  lexicon: HALOT
  rationale: Refers to the firstborn animal. 'A firstborn' is idiomatic here in English and avoids archaic 'firstling'.
- source_word: אֲשֶׁר יְבֻכַּר לַיהוָה בִּבְהֵמָה
  chosen: which as a firstborn belongs to the LORD
  alternatives:
  - which is made firstborn for the LORD among the livestock
  - which is firstborn to the LORD among the cattle
  lexicon: HALOT
  rationale: The passive of בכר here denotes status as firstborn, not an action performed by a human. The phrase indicates that such an animal already belongs to the LORD by virtue of being firstborn. 'Among the livestock' reflects בבהמה as the animal category.
- source_word: בִּבְהֵמָה
  chosen: among the livestock
  alternatives:
  - among the animals
  - from the herd animals
  lexicon: HALOT
  rationale: בהמה here is a collective term for domesticated animals suitable to the context of sacrificial/vowed livestock. 'Livestock' is the clearest modern equivalent.
- source_word: לֹא יַקְדִּישׁ אִישׁ אֹתוֹ
  chosen: no man may consecrate
  alternatives:
  - a man shall not dedicate it
  - no one may set it apart as holy
  lexicon: HALOT
  rationale: Hiphil of קדש means to consecrate/dedicate. 'Consecrate' preserves the cultic sense. 'No man' reflects the masculine singular אִישׁ in line with the gender-accurate policy, while still functioning generically.
- source_word: אִם שׁוֹר אִם שֶׂה
  chosen: whether an ox or a sheep
  alternatives:
  - whether an ox or a flock animal
  - whether cattle or sheep/goat
  lexicon: HALOT
  rationale: The construction means 'whether ... or ...'. שׁוֹר is specifically 'ox' or bovine; שֶׂה is a small livestock animal, often sheep or goat. Since English commonly pairs 'ox or sheep' in this kind of summary statement and the immediate contrast is broad livestock classes, 'sheep' is acceptable though somewhat narrower than the Hebrew.
- source_word: לַיהוָה הוּא
  chosen: it belongs to the LORD
  alternatives:
  - it is the LORD's
  - it is for the LORD
  lexicon: HALOT
  rationale: This clause states possession or entitlement. 'It belongs to the LORD' makes the legal force explicit in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default rendering for the divine name.
