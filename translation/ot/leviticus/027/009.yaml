id: LEV.27.9
reference: Leviticus 27:9
source:
  edition: WLC
  text: וְ/אִם בְּהֵמָ֔ה אֲשֶׁ֨ר יַקְרִ֧יבוּ מִמֶּ֛/נָּה קָרְבָּ֖ן לַֽ/יהוָ֑ה כֹּל֩
    אֲשֶׁ֨ר יִתֵּ֥ן מִמֶּ֛/נּוּ לַ/יהוָ֖ה יִֽהְיֶה קֹּֽדֶשׁ־־׃
translation:
  text: And if it is an animal from which they present an offering to the LORD, everything
    that one gives from it to the LORD shall be holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of which they bring an offering to the LORD.' The Hebrew wording can
      be understood either as describing an animal suitable for presentation as an
      offering or an animal from which an offering is actually presented.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation within the legal material. 'And
    if' preserves the connective force of ו while remaining natural in English.
- source_word: בְּהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: Generic term for an animal, here in sacrificial context. 'Animal' is
    clear modern English and broad enough for the category in view.
- source_word: אֲשֶׁר יַקְרִיבוּ מִמֶּנָּה קָרְבָּן לַיהוָה
  chosen: from which they present an offering to the LORD
  alternatives:
  - of which they bring an offering to the LORD
  - from which one may offer an offering to the LORD
  lexicon: HALOT
  rationale: יַקְרִיבוּ in Hiphil commonly means 'bring near/present' in sacrificial
    usage. The phrase מִמֶּנָּה indicates the offering comes from this animal category.
    'Present an offering' is idiomatic and preserves cultic sense without over-paraphrase.
- source_word: קָרְבָּן
  chosen: offering
  alternatives:
  - gift offering
  - oblation
  lexicon: HALOT
  rationale: Standard sacrificial term. 'Offering' is the clearest natural equivalent
    in modern English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: כֹּל אֲשֶׁר יִתֵּן
  chosen: everything that one gives
  alternatives:
  - whatever he gives
  - all that is given
  lexicon: HALOT
  rationale: The singular verb after a plural earlier subject is naturally generic/indefinite.
    'One gives' avoids importing a specifically male referent while preserving the
    Hebrew's generic singular force.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from them
  - from such an animal
  lexicon: HALOT
  rationale: Refers back to the singular collective noun 'animal' as a category. 'From
    it' is the most direct rendering.
- source_word: יִהְיֶה קֹדֶשׁ
  chosen: shall be holy
  alternatives:
  - shall be sacred
  - shall become holy
  lexicon: HALOT
  rationale: קֹדֶשׁ denotes consecrated holiness in sacrificial law. 'Holy' preserves
    the theological register better than 'sacred' here.
