id: LEV.27.28
reference: Leviticus 27:28
source:
  edition: WLC
  text: אַךְ כָּל חֵ֡רֶם אֲשֶׁ֣ר יַחֲרִם֩ אִ֨ישׁ לַֽ/יהוָ֜ה מִ/כָּל אֲשֶׁר ל֗/וֹ מֵ/אָדָ֤ם
    וּ/בְהֵמָה֙ וּ/מִ/שְּׂדֵ֣ה אֲחֻזָּת֔/וֹ לֹ֥א יִמָּכֵ֖ר וְ/לֹ֣א יִגָּאֵ֑ל כָּל
    חֵ֕רֶם קֹֽדֶשׁ קָֽדָשִׁ֥ים ה֖וּא לַ/יהוָֽה־־־־־־׃
translation:
  text: However, every devoted thing that a man devotes to the LORD from all that
    belongs to him—whether man or animal, or from the field of his inherited property—shall
    not be sold or redeemed. Every devoted thing is most holy to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew devoted thing (ḥerem), a technical term for something irrevocably
      set apart to the LORD; in some contexts it can carry the sense of being placed
      under a ban or devoted to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - But
  - Only
  lexicon: HALOT
  rationale: Marks a restrictive or contrastive transition from the preceding regulations
    about vowed things that may be redeemed; 'However' captures the exception-like
    force in natural English.
- source_word: חֵרֶם / יַחֲרִם
  chosen: devoted thing / devotes
  alternatives:
  - something devoted to destruction
  - ban / puts under ban
  - dedicated thing
  lexicon: HALOT
  rationale: The noun and cognate verb denote something irrevocably set apart to the
    LORD, often under a ban. In this legal context, 'devoted thing' and 'devotes'
    preserve the technical sense without importing 'destruction' into the main text
    where the verse itself emphasizes inalienability and holiness rather than the
    mode of disposal.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically
    in legal style. Per the gender-accurate policy, 'a man' is retained rather than
    neutralizing to 'someone'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering of the divine name YHWH as 'the
    LORD'.
- source_word: מִכָּל אֲשֶׁר לוֹ
  chosen: from all that belongs to him
  alternatives:
  - from anything that is his
  - out of all that he has
  lexicon: HALOT
  rationale: Expresses the source domain of the devoted item in clear modern English
    while preserving the possessive scope.
- source_word: מֵאָדָם
  chosen: man
  alternatives:
  - person
  - human
  lexicon: HALOT
  rationale: 'Here the phrase sets categories of property or persons included in what
    may be devoted: ''from man and animal and from the field...'' Because אָדָם here
    contrasts with animal, ''man'' is the most natural singular category term in English
    and aligns with the project''s default for אָדָם where context supports it.'
- source_word: וּבְהֵמָה
  chosen: animal
  alternatives:
  - livestock
  - beast
  lexicon: HALOT
  rationale: A broad term for animals; 'animal' is sufficiently general and readable.
- source_word: וּמִשְּׂדֵה אֲחֻזָּתוֹ
  chosen: or from the field of his inherited property
  alternatives:
  - or from the field of his possession
  - or from his hereditary field
  lexicon: HALOT
  rationale: אֲחֻזָּה in Leviticus commonly refers to hereditary landed property within
    Israel's clan allotment. 'Inherited property' makes that legal nuance clearer
    than the vaguer 'possession'.
- source_word: לֹא יִמָּכֵר
  chosen: shall not be sold
  alternatives:
  - may not be sold
  lexicon: HALOT
  rationale: A legal prohibition/result in straightforward English.
- source_word: וְלֹא יִגָּאֵל
  chosen: or redeemed
  alternatives:
  - or bought back
  - or reclaimed
  lexicon: HALOT
  rationale: גאל in this chapter is the technical term for redemption of vowed property.
    'Redeemed' preserves the legal-theological vocabulary and links with the surrounding
    context.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - supremely holy
  lexicon: HALOT
  rationale: The superlative construction denotes the highest degree of holiness.
    'Most holy' is idiomatic English in sacrificial/legal contexts.
- source_word: הוּא לַיהוָה
  chosen: to the LORD
  alternatives:
  - belongs to the LORD
  - it is for the LORD
  lexicon: HALOT
  rationale: Rendered in a way that preserves the consecratory relation without overexpanding
    the terse Hebrew. The full clause 'is most holy to the LORD' communicates the
    sense naturally.
