theological_decisions:
- issue: Meaning of חֵרֶם in this legal context
  chosen_reading: Rendered as an irrevocably 'devoted thing' rather than explicitly
    'devoted to destruction' in the main text.
  alternative_readings:
  - something devoted to destruction
  - something under the ban
  rationale: The חרם word-group can in some contexts include destruction, but this
    verse's immediate emphasis is that such a thing cannot be sold or redeemed and
    is 'most holy to the LORD.' The main text therefore foregrounds irrevocable consecration.
    Because the term is theologically and lexically weighty, the destructive/ban nuance
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Generic masculine legal language
  chosen_reading: Retained 'a man' for אִישׁ.
  alternative_readings:
  - someone
  - a person
  rationale: The source uses masculine singular legal diction with representative
    force. Per the project's gender-accurate policy, the translation keeps the masculine
    form rather than flattening it to gender-neutral English.
  doctrine_reference: Translation philosophy §4
