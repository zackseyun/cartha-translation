id: LEV.27.34
reference: Leviticus 27:34
source:
  edition: WLC
  text: אֵ֣לֶּה הַ/מִּצְוֺ֗ת אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֶת מֹשֶׁ֖ה אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל בְּ/הַ֖ר סִינָֽי־־׃
translation:
  text: These are the commandments that Yahweh commanded Moses for the sons of Israel at Mount Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the sons of Israel' or 'for the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Introduces a concluding summary formula. English supplies 'are' naturally.
- source_word: הַמִּצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the statutes
  lexicon: HALOT
  rationale: מִצְוָה denotes commands/commandments. 'Commandments' fits the formal summary style at the close of the book section and preserves the legal force.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun; 'that' is natural modern English.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave
  - ordered
  lexicon: HALOT
  rationale: Directly reflects the verbal idea of issuing commands; maintains lexical connection with מִצְוֺת.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: אֶת marks Moses as the direct object of 'commanded.' In idiomatic English, 'commanded Moses' is acceptable and preserves the syntax better than recasting.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - to the sons of Israel
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: The preposition אֶל can be rendered 'to,' but in this construction the sense is that Moses was commanded with reference to what he was to communicate to Israel. 'For' reads naturally while preserving the representative masculine phrase 'sons of Israel' per the gender-accurate policy.
- source_word: בְּהַר סִינָי
  chosen: at Mount Sinai
  alternatives:
  - on Mount Sinai
  - in Mount Sinai
  lexicon: HALOT
  rationale: Standard English idiom for location with a mountain in this formula is 'at Mount Sinai.'
