theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and longstanding English Bible convention without
    making a doctrinal claim beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Hebrew is grammatically masculine plural construct and is rendered
    in a gender-accurate way rather than neutralized, in keeping with the project's
    policy. The phrase is ethnically representative, not a claim about males only.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
