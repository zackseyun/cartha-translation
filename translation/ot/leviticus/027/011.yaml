id: LEV.27.11
reference: Leviticus 27:11
source:
  edition: WLC
  text: וְ/אִם֙ כָּל בְּהֵמָ֣ה טְמֵאָ֔ה אֲ֠שֶׁר לֹא יַקְרִ֧יבוּ מִמֶּ֛/נָּה קָרְבָּ֖ן לַֽ/יהוָ֑ה וְ/הֶֽעֱמִ֥יד אֶת הַ/בְּהֵמָ֖ה לִ/פְנֵ֥י הַ/כֹּהֵֽן־־־׃
translation:
  text: But if it is any unclean animal from which they may not present an offering to Yahweh, then he shall set the animal before the priest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from which one may not bring an offering to the LORD.' The Hebrew uses a general plural verb ('they may not present') with impersonal force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case continuing the prior legislation. 'But if' captures the contrastive progression in English better than a bare 'and if' while preserving the conditional force.
- source_word: כָּל בְּהֵמָה טְמֵאָה
  chosen: any unclean animal
  alternatives:
  - any impure animal
  - any unclean beast
  lexicon: HALOT
  rationale: כָּל with a singular noun in this construction has an indefinite sense, hence 'any.' בְּהֵמָה is well rendered 'animal' in contemporary English. טְמֵאָה is 'unclean' in cultic context, not merely physically dirty.
- source_word: אֲשֶׁר לֹא יַקְרִיבוּ מִמֶּנָּה קָרְבָּן
  chosen: from which they may not present an offering
  alternatives:
  - which they do not present as an offering
  - from which one may not bring an offering
  - which cannot be offered
  lexicon: HALOT
  rationale: 'The relative clause explains the kind of unclean animal in view: one not suitable for sacrificial presentation. The 3mp יַקְרִיבוּ is an impersonal/general plural (''they may present'' / ''one may present''), and מִמֶּנָּה is best represented by ''from which.'' ''Present an offering'' preserves the sacrificial nuance of הקריב better than the flatter ''offer'' alone.'
- source_word: קָרְבָּן
  chosen: an offering
  alternatives:
  - a gift offering
  - an oblation
  lexicon: HALOT
  rationale: Standard cultic term for an offering brought near to God. 'Offering' is clear modern English and fits the sacrificial context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: וְהֶעֱמִיד
  chosen: then he shall set
  alternatives:
  - then he shall place
  - then he shall present
  - then he shall cause to stand
  lexicon: HALOT
  rationale: Hiphil of עמד means to cause to stand or set in position. 'Set' is natural English here and fits the legal instruction. 'Then' makes the apodosis explicit in English.
- source_word: אֶת הַבְּהֵמָה לִפְנֵי הַכֹּהֵן
  chosen: the animal before the priest
  alternatives:
  - the animal in the presence of the priest
  - the beast before the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the object and prepositional phrase. 'Before the priest' is idiomatic and preserves the formal setting of priestly valuation in the following verse.
