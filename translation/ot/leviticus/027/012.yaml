id: LEV.27.12
reference: Leviticus 27:12
source:
  edition: WLC
  text: וְ/הֶעֱרִ֤יךְ הַ/כֹּהֵן֙ אֹתָ֔/הּ בֵּ֥ין ט֖וֹב וּ/בֵ֣ין רָ֑ע כְּ/עֶרְכְּ/ךָ֥
    הַ/כֹּהֵ֖ן כֵּ֥ן יִהְיֶֽה׃
translation:
  text: and the priest shall assess it, whether good or bad; as the priest assesses
    it, so it shall be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'according to your valuation, the priest, so it shall
      be.' The sense is that the priest's valuation is the binding one.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱרִיךְ
  chosen: shall assess
  alternatives:
  - shall value
  - shall appraise
  - shall estimate
  lexicon: HALOT
  rationale: The Hiphil of ערך here refers to setting a valuation for a vowed animal.
    'Assess' is clear modern English and fits the priestly act of determining value
    without sounding overly technical. Future-like 'shall' reflects the legal/instructional
    context.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Levitical legal material; definite article
    preserved.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring to the animal. English idiom
    normally uses 'it' for an animal in legal valuation context.
- source_word: בֵּין טוֹב וּבֵין רָע
  chosen: whether good or bad
  alternatives:
  - between good and bad
  lexicon: HALOT
  rationale: Idiomatic English for a merism expressing quality assessment. 'Whether
    good or bad' communicates the evaluative sense more naturally than the more literal
    'between good and bad.'
- source_word: כְּעֶרְכְּךָ
  chosen: as the priest assesses it
  alternatives:
  - according to your valuation
  - according to the priest's valuation
  lexicon: HALOT
  rationale: Although the form literally includes a 2ms suffix ('your valuation'),
    in context the following apposition 'the priest' clarifies that the valuation
    in view is the priest's official assessment. Rendering the sense avoids awkwardness
    and reflects the legal function of the clause.
- source_word: כֵּן יִהְיֶה
  chosen: so it shall be
  alternatives:
  - so shall it stand
  - thus it shall be
  lexicon: HALOT
  rationale: This formula confirms the binding validity of the priest's valuation.
    'So it shall be' is natural and sufficiently formal for legal material.
