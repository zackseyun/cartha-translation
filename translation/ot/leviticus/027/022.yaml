id: LEV.27.22
reference: Leviticus 27:22
source:
  edition: WLC
  text: וְ/אִם֙ אֶת שְׂדֵ֣ה מִקְנָת֔/וֹ אֲשֶׁ֕ר לֹ֖א מִ/שְּׂדֵ֣ה אֲחֻזָּת֑/וֹ יַקְדִּ֖ישׁ
    לַֽ/יהוָֽה־׃
translation:
  text: But if he consecrates to the LORD a field of his purchase, which is not from
    the field of his inherited property,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a field he has bought,' in contrast to land belonging to his ancestral
      inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case in continuity with the preceding legislation.
    'But if' captures both the conditional force and the slight contrastive progression
    from the previous scenario.
- source_word: שְׂדֵה מִקְנָתוֹ
  chosen: a field of his purchase
  alternatives:
  - a field he has bought
  - purchased land
  lexicon: HALOT
  rationale: The construct phrase literally denotes a field acquired by purchase.
    'Field of his purchase' stays close to the Hebrew while remaining understandable;
    it also preserves the legal nuance of acquired rather than inherited land.
- source_word: אֲשֶׁר לֹא מִשְּׂדֵה אֲחֻזָּתוֹ
  chosen: which is not from the field of his inherited property
  alternatives:
  - which is not part of the field of his possession
  - which is not from the land of his inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה in Leviticus commonly refers to hereditary landed property/holding.
    'Inherited property' communicates that this land belongs to his ancestral allotment,
    distinguishing it from purchased land. 'From the field of' reflects the Hebrew
    preposition and construct relation.
- source_word: יַקְדִּישׁ
  chosen: he consecrates
  alternatives:
  - he dedicates
  - he sanctifies
  lexicon: HALOT
  rationale: In Leviticus 27 the verb refers to setting something apart as holy to
    the LORD in a votive/legal sense. 'Consecrates' preserves that cultic-legal force
    better than the more general 'dedicates'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition
    ל is naturally rendered 'to' in this context of consecration.
