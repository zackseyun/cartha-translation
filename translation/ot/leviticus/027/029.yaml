theological_decisions:
- issue: Meaning of חֵרֶם in a legal-sacral context involving a human being
  chosen_reading: Render with the technical language of devotion rather than immediately
    interpret as a judicial death sentence alone.
  alternative_readings:
  - No one devoted to destruction from among mankind may be redeemed; he shall surely
    be put to death.
  - No person set apart under the ban may be ransomed; he must be put to death.
  rationale: The verse combines cultic-legal terminology (חרם / פדה) with a death
    penalty formula. To preserve the source's theological and legal tension, the main
    text keeps the technical 'devoted' language, while alternatives that make the
    human referent explicit are preserved in footnotes.
  doctrine_reference: Translation philosophy §3; §5
- issue: Rendering אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - mankind
  rationale: The doctrine specifies 'man / humankind (context)' for אָדָם and prefers
    gender-accurate renderings. Here the singular form in a legal formula is retained
    as 'man,' with a footnote clarifying the representative human sense.
  doctrine_reference: 'Contested terms table: אָדָם; Translation philosophy §4'
