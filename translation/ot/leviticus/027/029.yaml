id: LEV.27.29
reference: Leviticus 27:29
source:
  edition: WLC
  text: כָּל חֵ֗רֶם אֲשֶׁ֧ר יָחֳרַ֛ם מִן הָ/אָדָ֖ם לֹ֣א יִפָּדֶ֑ה מ֖וֹת יוּמָֽת־־׃
translation:
  text: No devoted thing that is devoted from man may be redeemed; it must surely
    be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'No one devoted to destruction from among mankind may be redeemed; he
      shall surely be put to death.'
    reason: alternative_reading
  - marker: b
    text: '''From man'' here refers to a human being, that is, from among humankind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵרֶם
  chosen: devoted thing
  alternatives:
  - something under the ban
  - devoted person
  - thing devoted to destruction
  lexicon: HALOT
  rationale: חֵרֶם denotes something devoted or banned, often irrevocably set apart
    to God and in some contexts destined for destruction. 'Devoted thing' preserves
    the technical cultic sense without importing a full interpretive expansion into
    the main text. Because the following phrase specifies 'from man,' the object here
    concerns a human being, but the noun itself is rendered more literally and the
    human reference is carried by the next phrase.
- source_word: יָחֳרַם
  chosen: is devoted
  alternatives:
  - is put under the ban
  - is devoted to destruction
  lexicon: HALOT
  rationale: The Hophal/Hiphil-related חרם verb here indicates being placed under
    ḥerem. 'Is devoted' keeps the lexical link with חֵרֶם and avoids over-paraphrasing,
    while the death clause clarifies the severity.
- source_word: מִן הָאָדָם
  chosen: from man
  alternatives:
  - from mankind
  - from among men
  - of man
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle, אָדָם is rendered
    'man' where the Hebrew is singular and representative. In context it indicates
    a human being as the source/category from which the devoted object comes, i.e.,
    a person. 'From man' is formally close, with the footnote preserving the more
    explicit sense 'from among mankind'.
- source_word: יִפָּדֶה
  chosen: may be redeemed
  alternatives:
  - shall be ransomed
  - shall be bought back
  lexicon: HALOT
  rationale: פדה commonly means redeem, ransom, or buy back. 'Redeemed' is the standard
    biblical term and fits the legal-sacral context of Leviticus 27, where valuation
    and redemption are central themes.
- source_word: מוֹת יוּמָת
  chosen: it must surely be put to death
  alternatives:
  - he shall surely be put to death
  - he must certainly die
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the certainty:
    ''surely.'' English idiom is best served by ''must surely be put to death.'' Because
    the Hebrew subject is grammatically singular and the referent is a human under
    ḥerem, ''he'' would be possible, but ''it'' maintains concord with the earlier
    literal rendering ''devoted thing.'''
