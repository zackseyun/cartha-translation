id: LEV.27.19
reference: Leviticus 27:19
source:
  edition: WLC
  text: וְ/אִם גָּאֹ֤ל יִגְאַל֙ אֶת הַ/שָּׂדֶ֔ה הַ/מַּקְדִּ֖ישׁ אֹת֑/וֹ וְ֠/יָסַף
    חֲמִשִׁ֧ית כֶּֽסֶף עֶרְכְּ/ךָ֛ עָלָ֖י/ו וְ/קָ֥ם לֽ/וֹ־־־׃
translation:
  text: But if the one who consecrated it indeed redeems the field, then he shall
    add a fifth of your valuation money to it, and it shall remain his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who dedicated it' or 'the one who sanctified it.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'a fifth of the silver of your valuation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'it shall belong to him'; literally, 'it shall stand for him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the preceding legislation.
    'But if' captures the adversative/continuative force in context better than a
    bare 'if.'
- source_word: גָּאֹל יִגְאַל
  chosen: indeed redeems
  alternatives:
  - surely redeems
  - wants to redeem
  - redeems
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'Indeed
    redeems' preserves the emphasis without sounding overly wooden.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the land
  lexicon: HALOT
  rationale: The noun refers to the specific field previously dedicated. 'Field' is
    the ordinary and contextually precise rendering in this valuation law.
- source_word: הַמַּקְדִּישׁ אֹתוֹ
  chosen: the one who consecrated it
  alternatives:
  - the one who sanctified it
  - the one who dedicated it
  lexicon: HALOT
  rationale: The participle identifies the person who set the field apart to the LORD.
    'Consecrated' preserves the cultic sense of making something holy/set apart; 'it'
    refers to the field.
- source_word: וְיָסַף
  chosen: he shall add
  alternatives:
  - then he must add
  - and he added
  lexicon: HALOT
  rationale: In legal material the qatal with prefixed conjunction commonly carries
    modal/future force in sequence. 'He shall add' fits the prescriptive context.
- source_word: חֲמִשִׁית
  chosen: a fifth
  alternatives:
  - one-fifth
  - twenty percent
  lexicon: HALOT
  rationale: Standard legal/economic expression. 'A fifth' is idiomatic and sufficiently
    precise.
- source_word: כֶּסֶף עֶרְכְּךָ
  chosen: your valuation money
  alternatives:
  - the silver of your valuation
  - the money of your valuation
  - the assessed value in silver
  lexicon: HALOT
  rationale: Literally 'silver of your valuation,' addressed to Moses/the officiating
    authority in the legal formulation. 'Your valuation money' communicates the assessed
    monetary amount while retaining the second-person possessive.
- source_word: עָלָיו
  chosen: to it
  alternatives:
  - upon it
  - in addition to it
  lexicon: HALOT
  rationale: Refers to adding the fifth onto the valuation amount for the field. English
    idiom prefers 'add ... to it.'
- source_word: וְקָם לוֹ
  chosen: it shall remain his
  alternatives:
  - it shall belong to him
  - it shall stand for him
  lexicon: HALOT
  rationale: In this legal context the idiom means the property is established/confirmed
    as belonging to him after payment. 'It shall remain his' is natural English and
    reflects the resulting ownership status.
