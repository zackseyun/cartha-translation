theological_decisions:
- issue: Cultic verb for הקדישׁ
  chosen_reading: consecrated
  alternative_readings:
  - dedicated
  - sanctified
  rationale: The verse concerns property set apart in a sacred/legal context. 'Consecrated'
    preserves the religious dimension without archaic stiffness. No doctrinal controversy
    is involved, but the cultic nuance should not be flattened to a merely secular
    'donated.'
  doctrine_reference: Translation philosophy §§1, 6
- issue: Legal force of the clause sequence
  chosen_reading: prescriptive future ('shall add ... shall remain')
  alternative_readings:
  - simple future
  - past narrative
  rationale: Leviticus 27 is legal instruction, so English 'shall' best conveys obligation/result
    in this context. This avoids misreading the forms as past narrative.
  doctrine_reference: Translation philosophy §1
