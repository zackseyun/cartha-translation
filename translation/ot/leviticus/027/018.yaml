id: LEV.27.18
reference: Leviticus 27:18
source:
  edition: WLC
  text: וְ/אִם אַחַ֣ר הַ/יֹּבֵל֮ יַקְדִּ֣ישׁ שָׂדֵ/הוּ֒ וְ/חִשַּׁב ל֨/וֹ הַ/כֹּהֵ֜ן
    אֶת הַ/כֶּ֗סֶף עַל פִּ֤י הַ/שָּׁנִים֙ הַ/נּ֣וֹתָרֹ֔ת עַ֖ד שְׁנַ֣ת הַ/יֹּבֵ֑ל וְ/נִגְרַ֖ע
    מֵֽ/עֶרְכֶּֽ/ךָ־־־־׃
translation:
  text: But if he consecrates his field after the Jubilee, then the priest shall calculate
    the money for him according to the years remaining until the year of Jubilee,
    and it shall be deducted from your valuation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after the jubilee year.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the priest shall assess the price for him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and it shall be reduced from your assessed value.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַיֹּבֵל
  chosen: after the Jubilee
  alternatives:
  - after the jubilee year
  lexicon: HALOT
  rationale: אַחַר marks temporal sequence, and הַיֹּבֵל refers to the Jubilee institution/year.
    Capitalizing 'Jubilee' treats it as the named institution in Leviticus.
- source_word: יַקְדִּישׁ
  chosen: consecrates
  alternatives:
  - sanctifies
  - dedicates
  lexicon: HALOT
  rationale: In Leviticus 27 the verb קדשׁ refers to setting something apart as holy
    to the LORD. 'Consecrates' preserves the cultic sense better than the more generic
    'dedicates'.
- source_word: שָׂדֵהוּ
  chosen: his field
  lexicon: HALOT
  rationale: 'Straightforward possessive construction: the man consecrates his own
    field.'
- source_word: וְחִשַּׁב לוֹ הַכֹּהֵן אֶת הַכֶּסֶף
  chosen: then the priest shall calculate the money for him
  alternatives:
  - then the priest shall assess the price for him
  - then the priest shall reckon the silver for him
  lexicon: HALOT
  rationale: חשב in this legal context means to calculate or reckon. הַכֶּסֶף is literally
    'the silver/money,' referring to the monetary amount of valuation. 'Calculate
    the money for him' keeps the concrete legal-economic sense.
- source_word: עַל פִּי הַשָּׁנִים הַנּוֹתָרֹת
  chosen: according to the years remaining
  alternatives:
  - in proportion to the years left
  - based on the remaining years
  lexicon: HALOT
  rationale: The idiom עַל־פִּי means 'according to' or 'on the basis of.' הַנּוֹתָרֹת
    specifies the years left until Jubilee, so the valuation is prorated.
- source_word: עַד שְׁנַת הַיֹּבֵל
  chosen: until the year of Jubilee
  alternatives:
  - until the Jubilee year
  lexicon: HALOT
  rationale: This phrase defines the endpoint for the remaining years used in the
    calculation.
- source_word: וְנִגְרַע
  chosen: and it shall be deducted
  alternatives:
  - and it shall be reduced
  - and it shall be subtracted
  lexicon: HALOT
  rationale: גרע in the Niphal here expresses reduction/deduction from the standard
    valuation. 'Deducted' fits the monetary/legal context.
- source_word: מֵעֶרְכֶּךָ
  chosen: from your valuation
  alternatives:
  - from your assessed value
  - from your valuation amount
  lexicon: HALOT
  rationale: ערכך refers back to the valuation scale previously addressed in the law.
    The 2ms suffix is retained as singular 'your,' matching the Hebrew legal address
    rather than smoothing to plural or impersonal English.
