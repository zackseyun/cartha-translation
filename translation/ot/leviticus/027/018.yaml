theological_decisions:
- issue: Retention of second-person singular suffix in מֵעֶרְכֶּךָ
  chosen_reading: from your valuation
  alternative_readings:
  - from the valuation
  - from its valuation
  rationale: The Hebrew directly addresses the individual with a second-person singular
    suffix. Preserving 'your' maintains the legal style of the passage and avoids
    obscuring the connection to the valuation previously specified.
  doctrine_reference: Translation philosophy §4, §5
- issue: Cultic terminology for הקדישׁ
  chosen_reading: consecrates
  alternative_readings:
  - dedicates
  rationale: Because the verse concerns property set apart within a holiness/legal
    framework, 'consecrates' better preserves the sacred dimension without importing
    extra doctrine.
  doctrine_reference: Translation philosophy §1, §6
