theological_decisions:
- issue: Cultic/legal force of consecration language
  chosen_reading: Render קדש as 'holy' and גאל as 'redeemed' in their sacrally charged
    legal sense.
  alternative_readings:
  - Render more generically as 'sacred' and 'bought back'
  rationale: The verse concerns animals dedicated within Israel's worship law. Using
    'holy' and 'redeemed' preserves the theological and cultic register without importing
    later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5, 6
