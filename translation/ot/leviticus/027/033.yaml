id: LEV.27.33
reference: Leviticus 27:33
source:
  edition: WLC
  text: לֹ֧א יְבַקֵּ֛ר בֵּֽין ט֥וֹב לָ/רַ֖ע וְ/לֹ֣א יְמִירֶ֑/נּוּ וְ/אִם הָמֵ֣ר יְמִירֶ֔/נּוּ
    וְ/הָֽיָה ה֧וּא וּ/תְמוּרָת֛/וֹ יִֽהְיֶה קֹ֖דֶשׁ לֹ֥א יִגָּאֵֽל־־־־׃
translation:
  text: He shall not inspect whether it is good or bad, nor shall he exchange it;
    and if he does in fact exchange it, then both it and its substitute shall be holy;
    it shall not be redeemed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'examine between good and bad.' The Hebrew idiom refers to making a qualitative
      distinction when selecting the animal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew intensifies the verb: ''if he surely exchanges it'' or ''if he does
      indeed exchange it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַקֵּר
  chosen: inspect
  alternatives:
  - examine
  - inquire into
  - distinguish
  lexicon: HALOT
  rationale: The piel of בקר here refers to examining/selecting among animals in the
    tithe context, not merely casual looking. 'Inspect' fits the legal-sacral setting
    and the following phrase 'between good and bad.'
- source_word: בֵּין טוֹב לָרַע
  chosen: whether it is good or bad
  alternatives:
  - between good and bad
  - as to good or bad
  lexicon: HALOT
  rationale: This idiom expresses making a qualitative distinction. English smooths
    it as 'whether it is good or bad' while preserving the sense of evaluation.
- source_word: יְמִירֶנּוּ / הָמֵר יְמִירֶנּוּ
  chosen: exchange it / does in fact exchange it
  alternatives:
  - substitute it
  - replace it
  lexicon: HALOT
  rationale: The root מור in this context is the technical term for substituting one
    vowed/tithed animal for another. 'Exchange' is natural English and preserves the
    legal force; the infinitive absolute + finite verb is represented by 'does in
    fact exchange it' for emphasis.
- source_word: תְמוּרָתוֹ
  chosen: its substitute
  alternatives:
  - that which is exchanged for it
  - its replacement
  lexicon: HALOT
  rationale: Refers to the animal put in place of the original. 'Its substitute' is
    concise and matches the legal terminology of the passage.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  - set apart
  lexicon: HALOT
  rationale: In Leviticus, קדש marks something consecrated to God. 'Holy' preserves
    the covenantal-sacral register better than the flatter 'sacred.'
- source_word: לֹא יִגָּאֵל
  chosen: it shall not be redeemed
  alternatives:
  - it may not be redeemed
  - it shall not be bought back
  lexicon: HALOT
  rationale: The niphal of גאל here denotes being redeemed/bought back from consecrated
    status. 'Redeemed' is the standard legal-cultic term and preserves intertextual
    consistency in Leviticus.
- source_word: הוּא וּתְמוּרָתוֹ
  chosen: both it and its substitute
  alternatives:
  - it and its substitute
  - both the original and its substitute
  lexicon: HALOT
  rationale: The pronoun plus noun indicates both animals are included in the sanctified
    status. 'Both' makes the distributive force explicit in idiomatic English.
