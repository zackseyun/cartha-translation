id: LEV.27.5
reference: Leviticus 27:5
source:
  edition: WLC
  text: וְ/אִ֨ם מִ/בֶּן חָמֵ֜שׁ שָׁנִ֗ים וְ/עַד֙ בֶּן עֶשְׂרִ֣ים שָׁנָ֔ה וְ/הָיָ֧ה
    עֶרְכְּ/ךָ֛ הַ/זָּכָ֖ר עֶשְׂרִ֣ים שְׁקָלִ֑ים וְ/לַ/נְּקֵבָ֖ה עֲשֶׂ֥רֶת שְׁקָלִֽים־־׃
translation:
  text: And if it is from five years old up to twenty years old, your valuation shall
    be twenty shekels for the male and ten shekels for the female.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Retains the conjunction plus conditional particle. 'And if' reflects
    the Hebrew linkage to the preceding valuation cases while remaining natural in
    English legal style.
- source_word: מִבֶּן חָמֵשׁ שָׁנִים וְעַד בֶּן עֶשְׂרִים שָׁנָה
  chosen: from five years old up to twenty years old
  alternatives:
  - from five years to twenty years old
  - from five years of age to twenty years of age
  lexicon: HALOT
  rationale: This idiom marks an age range. 'Years old' is idiomatic English and accurately
    conveys the Hebrew construction with בֶּן plus number.
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - will be
  - then it shall be
  lexicon: HALOT
  rationale: In this legal/instructional context, the qatal with prefixed conjunction
    functions prescriptively. 'Shall be' fits English legislative style and matches
    the verse's regulatory force.
- source_word: עֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation amount
  lexicon: HALOT
  rationale: The noun עֵרֶךְ in Leviticus 27 refers to the assigned valuation in vows.
    'Your valuation' preserves the formal link to the addressee and the cultic/legal
    terminology better than a looser paraphrase.
- source_word: הַזָּכָר
  chosen: the male
  alternatives:
  - a male
  lexicon: HALOT
  rationale: The article is present in Hebrew, and 'the male' pairs naturally with
    'the female' in this valuation schedule. It is gender-accurate and reflects the
    source categories.
- source_word: עֶשְׂרִים שְׁקָלִים
  chosen: twenty shekels
  lexicon: HALOT
  rationale: Direct rendering of the numeral plus weight/currency unit. 'Shekels'
    is retained rather than converted into modern currency because it is a historical
    unit.
- source_word: וְלַנְּקֵבָה
  chosen: for the female
  alternatives:
  - and for the female
  lexicon: HALOT
  rationale: The prefixed ל marks the corresponding valuation category. 'For the female'
    is concise and parallels 'for the male' in English.
- source_word: עֲשֶׂרֶת שְׁקָלִים
  chosen: ten shekels
  lexicon: HALOT
  rationale: Straightforward rendering of the numeral plus unit, preserving the contrast
    with the male valuation.
