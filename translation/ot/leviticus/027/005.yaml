theological_decisions:
- issue: Rendering sex-based valuation categories in a legal/cultic text
  chosen_reading: the male ... the female
  alternative_readings:
  - men ... women
  - a male ... a female
  rationale: The Hebrew uses gendered singular categories for valuation classes rather
    than plural social groups. Rendering them as 'the male' and 'the female' preserves
    the legal classification and follows the project's gender-accurate principle without
    importing broader social claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
