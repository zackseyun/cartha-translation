id: LEV.27.30
reference: Leviticus 27:30
source:
  edition: WLC
  text: וְ/כָל מַעְשַׂ֨ר הָ/אָ֜רֶץ מִ/זֶּ֤רַע הָ/אָ֨רֶץ֙ מִ/פְּרִ֣י הָ/עֵ֔ץ לַ/יהוָ֖ה
    ה֑וּא קֹ֖דֶשׁ לַֽ/יהוָֽה־׃
translation:
  text: Every tithe of the land, from the seed of the land and from the fruit of the
    tree, belongs to the LORD; it is holy to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Every tithe of the land, from the seed of the land and
      from the fruit of the tree, is the LORD's.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: Every
  alternatives:
  - And every
  - All
  lexicon: HALOT
  rationale: כָּל with a singular construct noun here has a distributive sense, best
    rendered 'Every' in natural English. The conjunction is not separately represented
    because English does not require 'and' at the start of this standalone verse.
- source_word: מַעְשַׂר
  chosen: tithe
  alternatives:
  - tenth part
  lexicon: HALOT
  rationale: The standard cultic term for a tenth given from produce. 'Tithe' is the
    clearest and most established English equivalent without loss of meaning.
- source_word: הָאָרֶץ
  chosen: of the land
  alternatives:
  - of the earth
  - of the ground
  lexicon: HALOT
  rationale: In this agricultural context אֶרֶץ refers to the land/soil of Israelite
    produce rather than the whole earth. 'Of the land' fits the immediate references
    to seed and fruit.
- source_word: מִזֶּרַע הָאָרֶץ
  chosen: from the seed of the land
  alternatives:
  - from the produce of the land
  - from the grain of the land
  - from the seed sown in the land
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the concrete Hebrew expression
    'seed of the land.' Although it refers broadly to agricultural produce grown from
    sowing, 'seed' keeps the source imagery and pairs well with the following phrase
    about tree fruit.
- source_word: מִפְּרִי הָעֵץ
  chosen: from the fruit of the tree
  alternatives:
  - from the fruit of the trees
  lexicon: HALOT
  rationale: The singular 'tree' can function collectively in Hebrew. Retaining the
    singular gives a close rendering while remaining intelligible in English.
- source_word: לַיהוָה
  chosen: belongs to the LORD
  alternatives:
  - is the LORD's
  - is for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks possession/dedication here. 'Belongs to the LORD'
    makes the sense explicit and readable in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: הוּא
  chosen: it is
  alternatives:
  - it
  - this is
  lexicon: HALOT
  rationale: The pronoun resumes the subject מַעְשַׂר and forms a nominal clause.
    English idiom requires 'it is' before the predicate.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - a holy thing
  - sacred
  lexicon: HALOT
  rationale: In predicate position with לַיהוָה, the sense is that the tithe is set
    apart as holy to the LORD. 'Holy' is concise and preserves the cultic-theological
    force better than the more generic 'sacred'.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: holy to the LORD
  alternatives:
  - holy for the LORD
  - most holy to the LORD
  lexicon: HALOT
  rationale: This standard consecration formula indicates something set apart for
    YHWH. 'Holy to the LORD' is the most direct and recognizable rendering; 'most
    holy' would overtranslate because the Hebrew lacks the superlative construction.
