theological_decisions:
- issue: Status of the original and substituted animals after an attempted exchange
  chosen_reading: Both the original animal and the substituted animal become holy.
  alternative_readings:
  - Only the substitute becomes holy
  - The text merely states ritual invalidity without extending holiness to both
  rationale: The clause 'he and his substitute shall be holy' plainly assigns sacred
    status to both animals. The translation makes the dual result explicit with 'both
    it and its substitute shall be holy.'
