id: LEV.27.10
reference: Leviticus 27:10
source:
  edition: WLC
  text: לֹ֣א יַחֲלִיפֶ֗/נּוּ וְ/לֹֽא יָמִ֥יר אֹת֛/וֹ ט֥וֹב בְּ/רָ֖ע אוֹ רַ֣ע בְּ/ט֑וֹב
    וְ/אִם הָמֵ֨ר יָמִ֤יר בְּהֵמָה֙ בִּ/בְהֵמָ֔ה וְ/הָֽיָה ה֥וּא וּ/תְמוּרָת֖/וֹ יִֽהְיֶה
    קֹּֽדֶשׁ־־־־־׃
translation:
  text: He shall not replace it or exchange it, good for bad or bad for good; and
    if he does in fact exchange one animal for another, then both it and its substitute
    shall be holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'substitute it'; the Hebrew uses two related but distinct verbs for replacing/exchanging.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew intensifies the verb: ''if he indeed exchanges'' or ''if he
      surely exchanges.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֲלִיפֶנּוּ
  chosen: replace it
  alternatives:
  - substitute it
  - change it
  lexicon: HALOT
  rationale: Hiphil of חלף here denotes replacing one vowed animal with another. 'Replace'
    is natural English and distinguishes this verb from the following מוּר, which
    is rendered 'exchange' to preserve the two-verb pattern.
- source_word: יָמִיר אֹתוֹ
  chosen: exchange it
  alternatives:
  - substitute it
  - swap it
  lexicon: HALOT
  rationale: מוּר in this context refers to exchanging one animal for another. 'Exchange'
    fits the legal setting and preserves a distinction from חלף while remaining readable.
- source_word: טוֹב בְּרָע אוֹ רַע בְּטוֹב
  chosen: good for bad or bad for good
  alternatives:
  - a good one for a bad one or a bad one for a good one
  lexicon: HALOT
  rationale: The adjectives function substantivally with the preposition ב marking
    the thing given in exchange. The concise English phrase preserves the legal contrast
    without over-expanding.
- source_word: וְאִם הָמֵר יָמִיר
  chosen: if he does in fact exchange
  alternatives:
  - if he surely exchanges
  - but if he at all exchanges
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Does
    in fact exchange' conveys emphasis in idiomatic modern English without sounding
    wooden.
- source_word: בְּהֵמָה בִּבְהֵמָה
  chosen: one animal for another
  alternatives:
  - an animal for an animal
  lexicon: HALOT
  rationale: English idiom prefers 'one animal for another' to express reciprocal
    substitution clearly.
- source_word: וְהָיָה הוּא וּתְמוּרָתוֹ
  chosen: then both it and its substitute
  alternatives:
  - then it and its replacement
  - then both the original and its substitute
  lexicon: HALOT
  rationale: The pronoun refers to the original animal, and תְּמוּרָה denotes the
    exchanged substitute. 'Both it and its substitute' makes explicit that both animals
    are in view.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - consecrated
  - set apart as holy
  lexicon: HALOT
  rationale: In sacrificial/votive law, קֹדֶשׁ denotes sacred status belonging to
    God. 'Holy' is the most direct rendering; the legal implication is that both animals
    become consecrated.
