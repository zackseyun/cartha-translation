theological_decisions:
- issue: Gendered valuation category
  chosen_reading: the male
  alternative_readings:
  - the man
  - a male
  rationale: The verse distinguishes valuation categories by sex and age. Following
    the translation philosophy's gender-accurate principle, the masculine term is
    preserved rather than neutralized. This is a legal classification in the text,
    not a generic reference to humanity.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nature of עֵרֶךְ in Leviticus 27
  chosen_reading: valuation
  alternative_readings:
  - value
  - assessment
  rationale: The text concerns vowed persons being assigned a sanctuary valuation,
    not a statement of personal dignity or market price. 'Valuation' preserves the
    cultic-legal category without importing broader theological claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
