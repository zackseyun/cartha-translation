id: LEV.27.3
reference: Leviticus 27:3
source:
  edition: WLC
  text: וְ/הָיָ֤ה עֶרְכְּ/ךָ֙ הַ/זָּכָ֔ר מִ/בֶּן֙ עֶשְׂרִ֣ים שָׁנָ֔ה וְ/עַ֖ד בֶּן
    שִׁשִּׁ֣ים שָׁנָ֑ה וְ/הָיָ֣ה עֶרְכְּ/ךָ֗ חֲמִשִּׁ֛ים שֶׁ֥קֶל כֶּ֖סֶף בְּ/שֶׁ֥קֶל
    הַ/קֹּֽדֶשׁ־׃
translation:
  text: And your valuation for the male from twenty years old up to sixty years old
    shall be fifty shekels of silver, by the sanctuary shekel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the sanctuary shekel.' The Hebrew phrase specifies the
      sacred standard by which the shekel is measured.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation amount
  lexicon: HALOT
  rationale: The noun עֵרֶךְ in Leviticus 27 refers to the assigned valuation in vows,
    not intrinsic worth. 'Your valuation' preserves the legal/ritual sense and reflects
    the second-person suffix, referring to the valuation you are to set.
- source_word: הַזָּכָר
  chosen: the male
  alternatives:
  - a male
  - the man
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular with the article. 'The male'
    is gender-accurate and fits the valuation category being specified; 'the man'
    would overpersonalize, while 'a male' weakens the class-defining article.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וְעַד בֶּן שִׁשִּׁים שָׁנָה
  chosen: from twenty years old up to sixty years old
  alternatives:
  - from twenty years to sixty years
  - from the age of twenty to the age of sixty
  lexicon: HALOT
  rationale: This idiom marks an age range. 'From twenty years old up to sixty years
    old' is natural English while staying close to the Hebrew structure.
- source_word: חֲמִשִּׁים שֶׁקֶל כֶּסֶף
  chosen: fifty shekels of silver
  alternatives:
  - fifty silver shekels
  lexicon: HALOT
  rationale: This is a straightforward weight-and-metal expression. 'Fifty shekels
    of silver' is clear modern English and preserves the monetary/weight terminology.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: The phrase specifies the standard of measurement. 'By the sanctuary shekel'
    is concise and idiomatic; 'sanctuary' best captures הַקֹּדֶשׁ here as the sacred
    standard associated with the tabernacle/holy place, not merely 'holy' as an abstract
    adjective.
- source_word: וְהָיָה ... וְהָיָה
  chosen: shall be
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The repeated וְהָיָה introduces legal prescription in this context. 'Shall
    be' appropriately conveys stipulative force in English legal-style discourse better
    than the more merely predictive 'will be'.
