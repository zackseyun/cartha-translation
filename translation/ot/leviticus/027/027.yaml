id: LEV.27.27
reference: Leviticus 27:27
source:
  edition: WLC
  text: וְ/אִ֨ם בַּ/בְּהֵמָ֤ה הַ/טְּמֵאָה֙ וּ/פָדָ֣ה בְ/עֶרְכֶּ֔/ךָ וְ/יָסַ֥ף חֲמִשִׁת֖/וֹ
    עָלָ֑י/ו וְ/אִם לֹ֥א יִגָּאֵ֖ל וְ/נִמְכַּ֥ר בְּ/עֶרְכֶּֽ/ךָ־׃
translation:
  text: But if it is among the unclean animals, then he may redeem it at your valuation
    and add a fifth of it to it; and if it is not redeemed, then it shall be sold
    at your valuation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the unclean livestock.' The Hebrew phrase refers to an animal belonging
      to the class of ritually unclean animals.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'add its fifth upon it,' that is, add twenty percent to the assessed
      value.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבְּהֵמָה הַטְּמֵאָה
  chosen: among the unclean animals
  alternatives:
  - from the unclean livestock
  - of the unclean animal
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal/livestock; in Leviticus sacrificial
    and valuation contexts, 'animals' is clear modern English. The prefixed ב plus
    article here is best taken partitively/classificatorily ('among/from the unclean
    animals'), referring back to a vowed item that belongs to the category of ritually
    unclean animals.
- source_word: וּפָדָה
  chosen: he may redeem it
  alternatives:
  - he shall redeem it
  - he redeems it
  lexicon: HALOT
  rationale: 'פדה means redeem/ransom/buy back. The qatal after אִם in legal style
    expresses the case condition/result. English ''may redeem'' fits the permissive
    legal sense in context: redemption is an available option, not an absolute command
    in every case.'
- source_word: בְעֶרְכֶּךָ
  chosen: at your valuation
  alternatives:
  - according to your valuation
  - by your valuation
  lexicon: HALOT
  rationale: עֵרֶךְ in Leviticus 27 is the assessed valuation set by the priest. 'At
    your valuation' is idiomatic and preserves the second masculine singular address
    to the priest established in context.
- source_word: וְיָסַף חֲמִשִׁתוֹ עָלָיו
  chosen: and add a fifth of it to it
  alternatives:
  - and add one-fifth to it
  - and add its fifth upon it
  lexicon: HALOT
  rationale: The idiom means adding twenty percent to the assessed value. 'A fifth
    of it to it' stays close to the Hebrew pronominal structure, though slightly wooden;
    it preserves that an additional fifth is added on top of the valuation.
- source_word: וְאִם לֹא יִגָּאֵל
  chosen: and if it is not redeemed
  alternatives:
  - and if he does not redeem it
  - but if it is not bought back
  lexicon: HALOT
  rationale: The Niphal of גאל is passive/reflexive in form. Because the Hebrew leaves
    the agent unstated, 'if it is not redeemed' best preserves the syntax without
    over-specifying the subject.
- source_word: וְנִמְכַּר
  chosen: then it shall be sold
  alternatives:
  - then it is to be sold
  - then it will be sold
  lexicon: HALOT
  rationale: The Niphal here functions as a legal passive. 'Shall be sold' is natural
    legal English and matches the prescriptive force of the case law.
