id: LEV.27.6
reference: Leviticus 27:6
source:
  edition: WLC
  text: וְ/אִ֣ם מִ/בֶּן חֹ֗דֶשׁ וְ/עַד֙ בֶּן חָמֵ֣שׁ שָׁנִ֔ים וְ/הָיָ֤ה עֶרְכְּ/ךָ֙
    הַ/זָּכָ֔ר חֲמִשָּׁ֥ה שְׁקָלִ֖ים כָּ֑סֶף וְ/לַ/נְּקֵבָ֣ה עֶרְכְּ/ךָ֔ שְׁלֹ֥שֶׁת
    שְׁקָלִ֖ים כָּֽסֶף־־׃
translation:
  text: If it is from a month old up to five years old, your valuation for the male
    shall be five shekels of silver, and for the female your valuation shall be three
    shekels of silver.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִבֶּן־חֹדֶשׁ
  chosen: from a month old
  alternatives:
  - from one month old
  - from the age of one month
  lexicon: HALOT
  rationale: The idiom literally means 'from a son of a month,' a standard Hebrew
    age expression. 'From a month old' is natural English while preserving the age
    threshold.
- source_word: וְעַד בֶּן־חָמֵשׁ שָׁנִים
  chosen: up to five years old
  alternatives:
  - and up to five years
  - to the age of five years
  lexicon: HALOT
  rationale: This continues the age-range idiom. 'Up to five years old' is idiomatic
    English and keeps the legal precision of the valuation bracket.
- source_word: עֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation amount
  lexicon: HALOT
  rationale: In Leviticus 27 this noun refers to the fixed valuation assigned in vows.
    'Your valuation' preserves the formal legal terminology and reflects the second
    masculine singular suffix addressed to Moses/the officiating authority in the
    legislation.
- source_word: הַזָּכָר
  chosen: the male
  alternatives:
  - a male
  - the boy
  lexicon: HALOT
  rationale: The Hebrew specifies sex, not social role or age-specific term like 'boy.'
    'The male' best matches the legal classification in the valuation schedule.
- source_word: חֲמִשָּׁה שְׁקָלִים כָּסֶף
  chosen: five shekels of silver
  alternatives:
  - five silver shekels
  lexicon: HALOT
  rationale: This is the straightforward monetary amount. 'Shekels of silver' is clear
    modern English and preserves the material specified by כָּסֶף.
- source_word: וְלַנְּקֵבָה
  chosen: for the female
  alternatives:
  - and for the female
  - for a female
  lexicon: HALOT
  rationale: Parallel to הַזָּכָר, this marks the female valuation category. 'For
    the female' fits the legal comparison structure of the verse.
- source_word: שְׁלֹשֶׁת שְׁקָלִים כָּסֶף
  chosen: three shekels of silver
  alternatives:
  - three silver shekels
  lexicon: HALOT
  rationale: Direct rendering of the stated amount, maintaining consistency with the
    male valuation phrase.
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: In legal material, the qatal with vav often carries prescriptive force
    in context. 'Shall be' appropriately conveys the legislative register without
    over-paraphrase.
