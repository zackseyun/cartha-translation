id: LEV.27.7
reference: Leviticus 27:7
source:
  edition: WLC
  text: וְ֠/אִם מִ/בֶּן שִׁשִּׁ֨ים שָׁנָ֤ה וָ/מַ֨עְלָ/ה֙ אִם זָכָ֔ר וְ/הָיָ֣ה עֶרְכְּ/ךָ֔
    חֲמִשָּׁ֥ה עָשָׂ֖ר שָׁ֑קֶל וְ/לַ/נְּקֵבָ֖ה עֲשָׂרָ֥ה שְׁקָלִֽים־־׃
translation:
  text: And if it is from sixty years old and upward, if male, then your valuation
    shall be fifteen shekels, and for the female ten shekels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'aged sixty years or more.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן שִׁשִּׁים שָׁנָה וָמַעְלָה
  chosen: from sixty years old and upward
  alternatives:
  - from sixty years and above
  - aged sixty years or more
  lexicon: HALOT
  rationale: This idiom marks the age threshold beginning at sixty and extending higher.
    'Years old and upward' preserves the formal structure while remaining natural
    English.
- source_word: זָכָר
  chosen: male
  alternatives:
  - man
  lexicon: HALOT
  rationale: The Hebrew denotes biological sex in this valuation context, not specifically
    adult social status. 'Male' is therefore more precise than 'man'.
- source_word: עֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation amount
  lexicon: HALOT
  rationale: In Leviticus 27 this term refers to the priestly valuation assigned in
    vow legislation. 'Your valuation' follows the Hebrew form closely and matches
    the chapter's technical usage.
- source_word: חֲמִשָּׁה עָשָׂר שָׁקֶל
  chosen: fifteen shekels
  lexicon: HALOT
  rationale: Straightforward cardinal number plus weight/currency unit. Singular שָׁקֶל
    after the number is idiomatic Hebrew; English requires the plural 'shekels'.
- source_word: לַנְּקֵבָה
  chosen: for the female
  alternatives:
  - and for a female
  - for the woman
  lexicon: HALOT
  rationale: The preposition marks the corresponding valuation for the female case.
    'Female' matches the biological-sex terminology of זָכָר/נְקֵבָה and keeps the
    pair consistent.
- source_word: עֲשָׂרָה שְׁקָלִים
  chosen: ten shekels
  lexicon: HALOT
  rationale: Direct rendering of the number and unit.
