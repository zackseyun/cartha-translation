theological_decisions:
- issue: Implicit subject of וְנָתַן
  chosen_reading: 'the dedicator/man is the understood subject: ''he shall give'''
  alternative_readings:
  - the priest shall give
  rationale: The immediate context in Leviticus 27:19 and 27:23 concerns the person
    redeeming or dedicating the field paying the assessed amount, while the priest
    performs the calculation. Hebrew leaves the subject implicit, but context favors
    the dedicator rather than the priest as the one who gives the valuation amount.
- issue: Rendering קֹדֶשׁ לַיהוָה
  chosen_reading: cultic consecration expressed as 'a holy offering to the LORD'
  alternative_readings:
  - '''holy to the LORD'' more formally'
  rationale: The phrase denotes consecration to YHWH. Because English can sound abrupt
    if rendered woodenly after 'he shall give your valuation,' adding 'offering' makes
    the cultic sense clear while remaining within optimal equivalence. The more formal
    alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; YHWH -> the LORD'
