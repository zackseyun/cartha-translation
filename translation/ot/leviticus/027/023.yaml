id: LEV.27.23
reference: Leviticus 27:23
source:
  edition: WLC
  text: וְ/חִשַּׁב ל֣/וֹ הַ/כֹּהֵ֗ן אֵ֚ת מִכְסַ֣ת הָֽ/עֶרְכְּ/ךָ֔ עַ֖ד שְׁנַ֣ת הַ/יֹּבֵ֑ל
    וְ/נָתַ֤ן אֶת הָ/עֶרְכְּ/ךָ֙ בַּ/יּ֣וֹם הַ/ה֔וּא קֹ֖דֶשׁ לַ/יהוָֽה־־׃
translation:
  text: then the priest shall calculate for him the proportion of your valuation up
    to the Year of Jubilee, and on that day he shall give your valuation as a holy
    offering to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'holy to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִשַּׁב
  chosen: then ... shall calculate
  alternatives:
  - and ... shall calculate
  - and ... shall assess
  lexicon: HALOT
  rationale: Piel of חשׁב here denotes calculating or reckoning an amount. 'Then'
    gives natural English sequence from the prior law while preserving the waw-consecutive
    sense.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The dative pronoun most naturally indicates the priest calculates the
    amount on behalf of the man in view.
- source_word: מִכְסַת
  chosen: the proportion
  alternatives:
  - the amount
  - the corresponding portion
  lexicon: HALOT
  rationale: מִכְסָה denotes a fixed amount or proportion. In this context, where
    the valuation is prorated to the Jubilee, 'proportion' best captures the idea
    of a calculated portion of the full valuation.
- source_word: הָעֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation amount
  lexicon: HALOT
  rationale: עֵרֶךְ in Leviticus 27 is a technical term for a vowed valuation set
    by priestly assessment. 'Your valuation' preserves the technical sense and the
    2ms suffix.
- source_word: עַד שְׁנַת הַיֹּבֵל
  chosen: up to the Year of Jubilee
  alternatives:
  - until the year of Jubilee
  lexicon: HALOT
  rationale: This phrase marks the terminus for the prorated calculation. Capitalizing
    'Year of Jubilee' reflects the festal/institutional title in readable English.
- source_word: וְנָתַן
  chosen: he shall give
  alternatives:
  - he shall pay
  - he shall present
  lexicon: HALOT
  rationale: נתן is broadly 'give.' In context the subject is the man who dedicated
    the field, continuing from the previous verse, though Hebrew leaves the subject
    implicit. 'Give' is broad enough to cover payment to the sanctuary without over-specifying.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - on the same day
  - that day
  lexicon: HALOT
  rationale: Standard temporal expression; 'on that day' is the most direct rendering.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: as a holy offering to the LORD
  alternatives:
  - holy to the LORD
  - something holy to the LORD
  lexicon: HALOT
  rationale: Literally 'holy to the LORD.' Because the clause follows the giving of
    the valuation amount, English benefits from making explicit that what is given
    is consecrated to the LORD. 'Offering' clarifies the cultic force without changing
    the sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
