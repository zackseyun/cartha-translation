theological_decisions:
- issue: Nature of אֲחֻזַּת הָאָרֶץ in jubilee legislation
  chosen_reading: Rendered as 'the possession of the land' rather than making hereditary
    status explicit in the main text.
  alternative_readings:
  - the hereditary possession of the land
  - the ancestral property in the land
  rationale: The broader Levitical context concerns ancestral land tenure, but this
    verse itself uses אֲחֻזָּה ('possession, holding'). To avoid importing more than
    the wording states, the main text keeps the legal-possession language while allowing
    the covenantal inheritance nuance to remain contextual rather than explicit.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
