id: LEV.27.24
reference: Leviticus 27:24
source:
  edition: WLC
  text: בִּ/שְׁנַ֤ת הַ/יּוֹבֵל֙ יָשׁ֣וּב הַ/שָּׂדֶ֔ה לַ/אֲשֶׁ֥ר קָנָ֖/הוּ מֵ/אִתּ֑/וֹ
    לַ/אֲשֶׁר ל֖/וֹ אֲחֻזַּ֥ת הָ/אָֽרֶץ־׃
translation:
  text: In the year of jubilee the field shall return to the one from whom he bought
    it, to the one to whom the possession of the land belongs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to the one whose hereditary possession the land is.' The Hebrew אֲחֻזַּת
      הָאָרֶץ refers to a landed holding, and in this context it is the original family
      allotment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  chosen: In the year of
  alternatives:
  - In the year
  lexicon: HALOT
  rationale: The preposition ב plus construct שְׁנַת is naturally rendered temporally
    as 'in the year of.' This is idiomatic and preserves the temporal setting.
- source_word: הַיּוֹבֵל
  chosen: jubilee
  alternatives:
  - the Jubilee
  lexicon: HALOT
  rationale: Refers to the specific jubilee year legislation in Leviticus. Lowercase
    'jubilee' works as a common noun in readable modern English; the article is absorbed
    into the English phrase 'the year of jubilee.'
- source_word: יָשׁוּב
  chosen: shall return
  alternatives:
  - will return
  - returns
  lexicon: HALOT
  rationale: The imperfect here expresses the legal consequence in this case law.
    'Shall return' fits legal-register English and reflects the prescriptive force
    better than a simple predictive 'will return.'
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the land parcel
  lexicon: HALOT
  rationale: שָׂדֶה ordinarily means 'field.' Although the context is land tenure,
    'field' is the direct and natural rendering.
- source_word: לַאֲשֶׁר קָנָהוּ מֵאִתּוֹ
  chosen: to the one from whom he bought it
  alternatives:
  - to the one who bought it from him
  - to him from whom it was bought
  lexicon: HALOT
  rationale: The clause identifies the prior owner from whom the current holder purchased
    the field. English must make the pronominal relationships explicit; 'to the one
    from whom he bought it' best captures the Hebrew sequence without excessive awkwardness.
- source_word: לַאֲשֶׁר לוֹ אֲחֻזַּת הָאָרֶץ
  chosen: to the one to whom the possession of the land belongs
  alternatives:
  - to the one whose hereditary property the land is
  - to the one who has the land as a possession
  - to the one whose landholding it is
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed possession/holding, often hereditary in Israel's
    tribal allotment system. 'The possession of the land belongs' preserves the legal
    sense without over-paraphrasing. 'Hereditary property' is contextually true but
    not explicit in the noun itself, so it is left implicit.
