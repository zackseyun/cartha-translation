theological_decisions:
- issue: Rendering of חֵרֶם in a holiness-law context
  chosen_reading: field devoted to destruction
  alternative_readings:
  - field under the ban
  - devoted field
  rationale: The term carries the idea of irrevocable devotion to God, often involving
    destruction or removal from ordinary human use. In this legal comparison, the
    point is that the field becomes permanently holy and no longer redeemable by the
    original owner. 'Devoted to destruction' best preserves the gravity of חֵרֶם,
    while a footnote retains the more traditional idiom 'under the ban.'
  doctrine_reference: Translation philosophy §1, §5
