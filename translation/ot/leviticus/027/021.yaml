id: LEV.27.21
reference: Leviticus 27:21
source:
  edition: WLC
  text: וְ/הָיָ֨ה הַ/שָּׂדֶ֜ה בְּ/צֵאת֣/וֹ בַ/יֹּבֵ֗ל קֹ֛דֶשׁ לַֽ/יהוָ֖ה כִּ/שְׂדֵ֣ה
    הַ/חֵ֑רֶם לַ/כֹּהֵ֖ן תִּהְיֶ֥ה אֲחֻזָּתֽ/וֹ׃
translation:
  text: But the field, when it is released in the Jubilee, shall be holy to the LORD,
    like a field devoted to destruction; it shall become the priest’s possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a field under the ban.' The Hebrew term refers to something irrevocably
      devoted to the LORD and removed from ordinary human use.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: But ... shall be
  alternatives:
  - And ... shall be
  - Then ... shall be
  lexicon: HALOT
  rationale: The waw + qatal here continues the legal case with a consequential sense.
    'But' fits the contrast with the preceding verse's redemption scenario while preserving
    the future/resultative force with 'shall be'.
- source_word: הַשָּׂדֶה
  chosen: the field
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun referring to the previously
    discussed field.
- source_word: בְּצֵאתוֹ
  chosen: when it is released
  alternatives:
  - when it goes out
  - at its going out
  lexicon: HALOT
  rationale: Literally 'in its going out.' In Jubilee legislation this idiom refers
    to property reverting/releasing at the Jubilee. 'When it is released' communicates
    the legal sense in natural English better than the more wooden 'goes out.'
- source_word: בַיֹּבֵל
  chosen: in the Jubilee
  alternatives:
  - at the Jubilee
  - in the year of Jubilee
  lexicon: HALOT
  rationale: Refers to the Jubilee occasion/year. 'In the Jubilee' is concise and
    idiomatic alongside the release idiom.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: holy to the LORD
  alternatives:
  - holy for the LORD
  - a holy thing to the LORD
  lexicon: HALOT
  rationale: Standard covenantal formula indicating consecration to YHWH. Per doctrine,
    יהוה is rendered 'the LORD'.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for יהוה.
- source_word: כִּשְׂדֵה הַחֵרֶם
  chosen: like a field devoted to destruction
  alternatives:
  - like a devoted field
  - like a field under the ban
  lexicon: HALOT
  rationale: חֵרֶם denotes something devoted irrevocably to God, often by destruction
    or ban. To avoid flattening the term into mere dedication, 'devoted to destruction'
    preserves its severity, while a footnote preserves the traditional alternative
    'under the ban.'
- source_word: לַכֹּהֵן
  chosen: the priest’s
  alternatives:
  - to the priest
  - for the priest
  lexicon: HALOT
  rationale: The lamed marks possession/assignment in the resulting clause. Rendering
    it possessively in English is natural before 'possession.'
- source_word: תִּהְיֶה אֲחֻזָּתוֹ
  chosen: it shall become the priest’s possession
  alternatives:
  - it shall be his possession
  - it shall belong to him as a possession
  lexicon: HALOT
  rationale: אֲחֻזָּה is a landed holding/possession. 'Become' makes explicit the
    resulting transfer at Jubilee; 'possession' preserves the property-law nuance.
