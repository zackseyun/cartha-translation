id: LEV.27.2
reference: Leviticus 27:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם אִ֕ישׁ כִּ֥י יַפְלִ֖א נֶ֑דֶר בְּ/עֶרְכְּ/ךָ֥ נְפָשֹׁ֖ת לַֽ/יהוָֽה־׃
translation:
  text: 'Speak to the sons of Israel and say to them: When a man makes a special vow according to your valuation of persons to Yahweh,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When anyone makes an extraordinary vow, according to your valuation of persons for the LORD.' The Hebrew phrase involving 'your valuation' is difficult; the sense is a vow concerning persons assigned a set valuation in the following verses.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'sons of Israel,' a standard covenantal expression for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר, the standard commissioning formula. 'Speak' preserves the formal divine instruction style better than the more colloquial 'tell'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the masculine familial expression is retained where it refers to the covenant people corporately. More idiomatic alternatives are possible, but this preserves source texture.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. In legal material it often has representative force, but the translation philosophy prefers gender-accurate rendering over flattening to gender-neutral language unless context clearly demands it.
- source_word: יַפְלִא
  chosen: makes a special vow
  alternatives:
  - makes an extraordinary vow
  - utters a difficult vow
  lexicon: HALOT
  rationale: Hiphil of פלא here conveys doing something exceptional or special in the making of a vow, not merely 'vowing.' 'Makes a special vow' is idiomatic and reflects the marked nature of the vow.
- source_word: נֶדֶר
  chosen: vow
  lexicon: HALOT
  rationale: Standard rendering for נדר in sacrificial/legal contexts.
- source_word: בְּעֶרְכְּךָ
  chosen: involving the valuation
  alternatives:
  - according to your valuation
  - by your valuation
  - with your valuation
  lexicon: HALOT
  rationale: The phrase is syntactically difficult. In context for Leviticus 27, ערך refers to an assessed valuation set by the priestly legislation. 'Involving the valuation' gives clear English while leaving room for the following verses to specify the assessment scale. The 2ms suffix is addressed to Moses as the recipient of the legislation, not as the one personally performing every valuation.
- source_word: נְפָשֹׁת
  chosen: persons
  alternatives:
  - lives
  - souls
  lexicon: HALOT
  rationale: In this legal context נפשות refers to human persons dedicated by vow, not immaterial 'souls.' 'Persons' best conveys the referent in natural English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of the divine name as 'the LORD.' 'To the LORD' fits the direction of dedication in vow language.
