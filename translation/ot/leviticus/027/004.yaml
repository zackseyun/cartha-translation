id: LEV.27.4
reference: Leviticus 27:4
source:
  edition: WLC
  text: וְ/אִם נְקֵבָ֖ה הִ֑וא וְ/הָיָ֥ה עֶרְכְּ/ךָ֖ שְׁלֹשִׁ֥ים שָֽׁקֶל־׃
translation:
  text: But if it is a female, then your valuation shall be thirty shekels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And if she is female, then your valuation shall be thirty shekels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces the contrasting
    case to the previous verse. 'But if' captures the adversative/contrastive force
    in context better than a bare 'if,' while remaining natural English.
- source_word: נְקֵבָה
  chosen: a female
  alternatives:
  - female
  - a woman
  lexicon: HALOT
  rationale: The Hebrew denotes the female sex generally, not specifically 'woman.'
    'A female' is the most direct and gender-accurate rendering in this valuation
    context.
- source_word: הִוא
  chosen: it is
  alternatives:
  - she is
  lexicon: HALOT
  rationale: Although the pronoun is grammatically feminine singular and could be
    rendered 'she,' English idiom after a classificatory condition ('if it is a female')
    is smoother and still faithful to the referent in this legal formulation.
- source_word: וְהָיָה
  chosen: then ... shall be
  alternatives:
  - and it shall be
  - shall become
  lexicon: HALOT
  rationale: In legal/instructional style היה often introduces the resulting state
    or requirement. Rendering with 'then ... shall be' communicates the apodosis naturally
    in English.
- source_word: עֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation amount
  lexicon: HALOT
  rationale: The noun ערך in Leviticus 27 refers to the assigned valuation for vows.
    'Your valuation' preserves the formal legal sense and the 2ms suffix addressed
    to Moses/the one setting the valuation.
- source_word: שְׁלֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: שָׁקֶל
  chosen: shekels
  alternatives:
  - silver shekels
  lexicon: HALOT
  rationale: The singular noun after a number is idiomatic Hebrew; English requires
    the plural 'shekels.' 'Silver' is not explicit in this verse and should not be
    added.
