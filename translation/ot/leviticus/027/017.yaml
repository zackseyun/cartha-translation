theological_decisions:
- issue: Cultic verb for dedicating property to the LORD
  chosen_reading: consecrates
  alternative_readings:
  - dedicates
  rationale: The verse concerns property being set apart within Israel's holiness
    legislation. 'Consecrates' better preserves the sacred/cultic dimension without
    adding doctrinal content beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
