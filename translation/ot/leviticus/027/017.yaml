id: LEV.27.17
reference: Leviticus 27:17
source:
  edition: WLC
  text: אִם מִ/שְּׁנַ֥ת הַ/יֹּבֵ֖ל יַקְדִּ֣ישׁ שָׂדֵ֑/הוּ כְּ/עֶרְכְּ/ךָ֖ יָקֽוּם־׃
translation:
  text: If he consecrates his field from the year of jubilee, your valuation shall
    stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dedicates his field.' The Hebrew verb carries the sense of setting something
      apart as holy.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing the case law condition.
- source_word: מִשְּׁנַת הַיֹּבֵל
  chosen: from the year of jubilee
  alternatives:
  - from the year of the Jubilee
  - at the year of jubilee
  lexicon: HALOT
  rationale: The preposition מִן with שְׁנַת indicates starting point ('from/since
    the year of jubilee'), fitting the valuation rules tied to time remaining until
    the next jubilee. Lowercase 'jubilee' is natural English here, though the phrase
    refers to the specific institution.
- source_word: יַקְדִּישׁ
  chosen: he consecrates
  alternatives:
  - he dedicates
  - he sanctifies
  lexicon: HALOT
  rationale: Hiphil of קדשׁ here means to set apart as holy/dedicated to the LORD.
    'Consecrates' preserves the cultic sense better than the more general 'dedicates'.
- source_word: שָׂדֵהוּ
  chosen: his field
  lexicon: HALOT
  rationale: Straightforward possessive noun phrase.
- source_word: כְּעֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - according to your valuation
  - at your valuation
  lexicon: HALOT
  rationale: Refers to the valuation set by the addressee, namely the priest in this
    legal context. The simple noun phrase works idiomatically in English when paired
    with 'shall stand.'
- source_word: יָקוּם
  chosen: shall stand
  alternatives:
  - shall remain in force
  - shall be established
  lexicon: HALOT
  rationale: קום in this legal/administrative context conveys validity or continuance.
    'Shall stand' is both literal and idiomatic, preserving the formal legal tone.
