id: LEV.27.16
reference: Leviticus 27:16
source:
  edition: WLC
  text: וְ/אִ֣ם מִ/שְּׂדֵ֣ה אֲחֻזָּת֗/וֹ יַקְדִּ֥ישׁ אִישׁ֙ לַֽ/יהוָ֔ה וְ/הָיָ֥ה עֶרְכְּ/ךָ֖
    לְ/פִ֣י זַרְע֑/וֹ זֶ֚רַע חֹ֣מֶר שְׂעֹרִ֔ים בַּ/חֲמִשִּׁ֖ים שֶׁ֥קֶל כָּֽסֶף׀׃
translation:
  text: 'If a man consecrates to the LORD part of the field of his possession, then
    your valuation shall be according to its seed requirement: fifty shekels of silver
    for the seed of a homer of barley.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'some of the field of his inheritance.' The Hebrew expression refers
      to land held as a hereditary possession, and the prefixed 'from' suggests only
      part of the field is being consecrated.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְּׂדֵה אֲחֻזָּתוֹ
  chosen: part of the field of his possession
  alternatives:
  - some of the field of his property
  - from the field of his inheritance
  lexicon: HALOT
  rationale: The prefixed מִן on 'field' indicates 'from/part of' rather than the
    whole field. אֲחֻזָּה denotes landed property/holding, often inherited possession.
    'Possession' is concise and natural, while preserving the legal-landholding sense.
- source_word: יַקְדִּישׁ
  chosen: consecrates
  alternatives:
  - sanctifies
  - dedicates
  lexicon: HALOT
  rationale: In Leviticus 27 the verb refers to setting something apart as holy to
    the LORD in a valuation context. 'Consecrates' preserves the cultic sense better
    than the more generic 'dedicates'.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically
    in legal material. Per translation philosophy, gender-accurate rendering is preferred
    over neutralizing.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered by the project's default 'the LORD'
    per doctrine guidelines.
- source_word: עֶרְכְּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation price
  lexicon: HALOT
  rationale: This term in Leviticus 27 refers to the priestly valuation/assessment.
    'Your valuation' is the conventional and sufficiently precise rendering, addressing
    Moses/the officiating authority in the singular as in the Hebrew.
- source_word: לְפִי זַרְעוֹ
  chosen: according to its seed requirement
  alternatives:
  - according to its seed
  - in proportion to the seed needed for it
  lexicon: HALOT
  rationale: The suffix refers back to the field. The phrase means valuation based
    on the amount of seed needed to sow the field, not according to offspring or produce.
    'Seed requirement' makes the agrarian measure explicit in natural English.
- source_word: זֶרַע חֹמֶר שְׂעֹרִים
  chosen: the seed of a homer of barley
  alternatives:
  - a homer-seeding of barley
  - seed for a homer of barley
  lexicon: HALOT
  rationale: 'This is a technical agricultural measure: the amount of barley seed
    equal to one homer, used as the basis of valuation. ''The seed of a homer of barley''
    stays close to the Hebrew while remaining readable.'
- source_word: בַּחֲמִשִּׁים שֶׁקֶל כָּסֶף
  chosen: fifty shekels of silver
  alternatives:
  - at fifty shekels of silver
  lexicon: HALOT
  rationale: This gives the assessed amount. English idiom works well with 'fifty
    shekels of silver' following the explanatory phrase about seed requirement.
