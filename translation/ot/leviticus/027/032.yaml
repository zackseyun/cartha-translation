theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Explicating the implied noun with 'every tenth animal'
  chosen_reading: Explicitly supplies 'animal' in English
  alternative_readings:
  - the tenth shall be holy to the LORD
  rationale: The Hebrew adjective 'the tenth' clearly refers to each animal counted under the rod. Supplying the noun in English preserves the legal sense and avoids ambiguity for modern readers without adding new content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
