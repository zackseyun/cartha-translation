id: LEV.27.32
reference: Leviticus 27:32
source:
  edition: WLC
  text: וְ/כָל מַעְשַׂ֤ר בָּקָר֙ וָ/צֹ֔אן כֹּ֥ל אֲשֶׁר יַעֲבֹ֖ר תַּ֣חַת הַ/שָּׁ֑בֶט הָֽ/עֲשִׂירִ֕י יִֽהְיֶה קֹּ֖דֶשׁ לַֽ/יהוָֽה־־־׃
translation:
  text: And every tithe of the herd and the flock, every tenth animal that passes under the rod, shall be holy to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the tenth.' The Hebrew implies each tenth animal as the animals pass under the rod for counting.
    reason: lexical_alternative
  - marker: b
    text: Or 'staff' for 'rod.' The phrase refers to counting livestock one by one as they pass beneath the shepherd's rod.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כָל
  chosen: And every
  alternatives:
  - And all
  lexicon: HALOT
  rationale: Introduces the clause and quantifies comprehensively. 'Every' is more idiomatic in English here than 'all' while preserving total scope.
- source_word: מַעְשַׂר
  chosen: tithe
  alternatives:
  - tenth part
  lexicon: HALOT
  rationale: Standard rendering for the technical term denoting a tenth given/set apart. 'Tithe' is concise and accurate in this legal context.
- source_word: בָּקָר
  chosen: the herd
  alternatives:
  - cattle
  - oxen
  lexicon: HALOT
  rationale: Refers collectively to bovine livestock. 'The herd' fits the paired collective expression with 'the flock' and reads naturally in English.
- source_word: וָ/צֹאן
  chosen: the flock
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep/goats. 'The flock' is the conventional and sufficiently broad collective counterpart to 'the herd'.
- source_word: כֹּל אֲשֶׁר
  chosen: every
  alternatives:
  - all that
  - everything that
  lexicon: HALOT
  rationale: Used distributively with the following verb to specify each qualifying animal. Rendering as 'every' avoids awkward repetition while preserving the distributive force.
- source_word: יַעֲבֹר תַּחַת הַ/שָּׁבֶט
  chosen: that passes under the rod
  alternatives:
  - that passes under the staff
  lexicon: HALOT
  rationale: A technical pastoral image for counting/inspecting animals one by one. 'Rod' is the more established rendering for שֵׁבֶט here and fits the counting context.
- source_word: הָֽ/עֲשִׂירִי
  chosen: every tenth animal
  alternatives:
  - the tenth one
  - the tenth
  lexicon: HALOT
  rationale: The adjective means 'the tenth.' In English, making the implied noun explicit clarifies that each tenth animal in the count is meant. This is an explicitation warranted by context, not paraphrase.
- source_word: יִֽהְיֶה קֹּדֶשׁ
  chosen: shall be holy
  alternatives:
  - shall be consecrated
  - shall be sacred
  lexicon: HALOT
  rationale: Preserves the predicate adjective/noun construction and the covenantal category of holiness. 'Holy' is the most direct and theologically transparent rendering.
- source_word: לַֽ/יהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' 'To the LORD' reflects dedication/belonging in this consecration formula.
