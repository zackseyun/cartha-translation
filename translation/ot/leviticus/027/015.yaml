theological_decisions:
- issue: Cultic terminology for property set apart to God
  chosen_reading: consecrated
  alternative_readings:
  - dedicated
  - sanctified
  rationale: The verse concerns a house made holy by vow within Leviticus 27's sanctuary
    valuation system. 'Consecrated' preserves the sacred/legal force without importing
    later doctrinal nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
