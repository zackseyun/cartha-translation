id: LEV.27.15
reference: Leviticus 27:15
source:
  edition: WLC
  text: וְ/אִ֨ם הַ/מַּקְדִּ֔ישׁ יִגְאַ֖ל אֶת בֵּית֑/וֹ וְ֠/יָסַף חֲמִישִׁ֧ית כֶּֽסֶף
    עֶרְכְּ/ךָ֛ עָלָ֖י/ו וְ/הָ֥יָה לֽ/וֹ־־־׃
translation:
  text: And if the one who consecrated it redeems his house, then he shall add a fifth
    of the silver of your valuation to it, and it shall be his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who dedicated it' or 'the one who sanctified it.'
    reason: lexical_alternative
  - marker: b
    text: That is, he adds one-fifth to the assessed silver value set by the priest.
    reason: cultural_note
lexical_decisions:
- source_word: הַמַּקְדִּישׁ
  chosen: the one who consecrated it
  alternatives:
  - the one who sanctified it
  - the one who dedicated it
  lexicon: HALOT
  rationale: The participle from קדשׁ here refers to a person setting a house apart
    as holy to the LORD in the valuation laws. 'Consecrated' best preserves the cultic
    sense without sounding overly technical. 'Dedicated' is possible but slightly
    weaker in sacred nuance.
- source_word: יִגְאַל
  chosen: redeems
  alternatives:
  - buys back
  - reclaims
  lexicon: HALOT
  rationale: גאל in this legal-sacral context refers to regaining possession by payment.
    'Redeems' is the standard and appropriately formal rendering, while also fitting
    the valuation framework of Leviticus 27.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: The term is literally 'his house.' 'Home' would be more idiomatic but
    less precise in a legal text concerning property valuation.
- source_word: וְיָסַף
  chosen: he shall add
  alternatives:
  - he must add
  lexicon: HALOT
  rationale: In this legal instruction, the waw-consecutive with perfect carries the
    force of the required action following the condition. 'He shall add' preserves
    the legal-register obligation in natural English.
- source_word: חֲמִישִׁית
  chosen: a fifth
  alternatives:
  - one-fifth
  - twenty percent
  lexicon: HALOT
  rationale: The noun denotes one-fifth. 'A fifth' is concise and idiomatic; 'twenty
    percent' is accurate but too modern in tone for the register.
- source_word: כֶּסֶף עֶרְכְּךָ
  chosen: the silver of your valuation
  alternatives:
  - the money of your valuation
  - the silver according to your valuation
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver,' the normal medium of payment, and עֶרְכְּךָ
    refers to the priestly valuation addressed in the singular 'your.' Retaining 'silver'
    preserves the concrete wording of the Hebrew rather than flattening it to 'money.'
- source_word: עָלָיו
  chosen: to it
  alternatives:
  - upon it
  - in addition to it
  lexicon: HALOT
  rationale: Here עַל with the suffix expresses addition to the assessed amount. 'To
    it' is natural English and conveys the additive sense in context.
- source_word: וְהָיָה לוֹ
  chosen: it shall be his
  alternatives:
  - it shall belong to him
  - it will be his again
  lexicon: HALOT
  rationale: This clause states the resulting ownership after redemption payment.
    'It shall be his' is direct and formally close to the Hebrew.
