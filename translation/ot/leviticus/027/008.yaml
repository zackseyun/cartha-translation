id: LEV.27.8
reference: Leviticus 27:8
source:
  edition: WLC
  text: וְ/אִם מָ֥ךְ הוּא֙ מֵֽ/עֶרְכֶּ֔/ךָ וְ/הֶֽעֱמִיד/וֹ֙ לִ/פְנֵ֣י הַ/כֹּהֵ֔ן וְ/הֶעֱרִ֥יךְ
    אֹת֖/וֹ הַ/כֹּהֵ֑ן עַל פִּ֗י אֲשֶׁ֤ר תַּשִּׂיג֙ יַ֣ד הַ/נֹּדֵ֔ר יַעֲרִיכֶ֖/נּוּ
    הַ/כֹּהֵֽן־־׃ס
translation:
  text: But if he is too poor for your valuation, then he shall be made to stand before
    the priest, and the priest shall assess him; the priest shall assess him according
    to what the hand of the one making the vow can afford.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than your valuation.' The Hebrew construction may be rendered more literally
      this way, but 'too poor for your valuation' expresses the sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to what the hand of the one making the vow reaches.'
      This is a Hebrew idiom for financial ability.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָךְ
  chosen: too poor
  alternatives:
  - poor
  - impoverished
  lexicon: HALOT
  rationale: 'The adjective denotes being in low economic condition. ''Too poor''
    captures the comparative force with מֵעֶרְכֶּךָ in context: unable to meet the
    set valuation amount.'
- source_word: מֵעֶרְכֶּךָ
  chosen: for your valuation
  alternatives:
  - for your assessed value
  - than your valuation
  lexicon: HALOT
  rationale: עֵרֶךְ in Leviticus 27 refers to the fixed valuation assigned in vow
    legislation. 'Your valuation' preserves the 2ms suffix addressed to Moses/the
    legislator as the one stating the valuation schedule, while idiomatic English
    uses 'for' with 'too poor'.
- source_word: וְהֶעֱמִידוֹ
  chosen: he shall be made to stand
  alternatives:
  - he shall present him
  - he shall set him
  lexicon: HALOT
  rationale: The Hiphil of עמד literally means 'cause to stand.' A passive-like English
    rendering preserves the formal legal procedure without over-specifying the unnamed
    subject.
- source_word: לִפְנֵי הַכֹּהֵן
  chosen: before the priest
  alternatives:
  - in the presence of the priest
  lexicon: HALOT
  rationale: Standard legal/cultic expression meaning appearance before priestly authority.
- source_word: וְהֶעֱרִיךְ אֹתוֹ
  chosen: the priest shall assess him
  alternatives:
  - the priest shall value him
  - the priest shall appraise him
  lexicon: HALOT
  rationale: The verb ערך in this chapter concerns setting a monetary valuation for
    vowed persons. 'Assess' is clear modern English and fits the legal-financial context
    better than the more ambiguous 'value'.
- source_word: עַל פִּי
  chosen: according to
  alternatives:
  - on the basis of
  - in accordance with
  lexicon: HALOT
  rationale: This idiom means 'according to' or 'on the basis of,' introducing the
    standard by which the priest determines the amount.
- source_word: אֲשֶׁר תַּשִּׂיג יַד
  chosen: what the hand ... can afford
  alternatives:
  - what ... can reach
  - what means ... can attain
  lexicon: HALOT
  rationale: The idiom 'the hand reaches' refers to financial ability or means. 'Can
    afford' communicates the economic sense naturally in English while retaining 'hand'
    once for transparency.
- source_word: הַנֹּדֵר
  chosen: the one making the vow
  alternatives:
  - the vower
  - the one who vowed
  lexicon: HALOT
  rationale: From נדר, referring to the person who makes the vow. 'The one making
    the vow' is readable modern English and avoids awkward jargon.
- source_word: יַעֲרִיכֶנּוּ
  chosen: shall assess him
  alternatives:
  - shall value him
  - shall appraise him
  lexicon: HALOT
  rationale: Repeats the chapter's technical valuation verb; rendering it consistently
    as 'assess' preserves the legal procedure and internal coherence.
