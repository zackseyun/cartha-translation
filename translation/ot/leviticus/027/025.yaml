id: LEV.27.25
reference: Leviticus 27:25
source:
  edition: WLC
  text: וְ/כָל עֶרְכְּ/ךָ֔ יִהְיֶ֖ה בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ עֶשְׂרִ֥ים גֵּרָ֖ה יִהְיֶ֥ה
    הַ/שָּֽׁקֶל־׃ס
translation:
  text: And every valuation of yours shall be by the sanctuary shekel; the shekel
    shall be twenty gerahs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to the holy shekel.' The Hebrew refers to the standard shekel
      used for sanctuary-related valuations.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְכְּךָ
  chosen: valuation of yours
  alternatives:
  - assessment of yours
  - your valuation
  - your assessed value
  lexicon: HALOT
  rationale: The noun ערך in Leviticus 27 refers to the assigned value set for vows
    and dedicated persons/things. 'Valuation' preserves the technical sense better
    than a looser 'price' while remaining readable. The 2ms suffix is retained with
    'of yours' rather than generalized away.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the holy shekel
  - in sanctuary shekels
  lexicon: HALOT
  rationale: This phrase denotes the standard sacred weight/monetary measure used
    for cultic valuations. 'Sanctuary shekel' is idiomatic English and conveys that
    this is the official sacred standard, not merely a morally 'holy' shekel.
- source_word: גֵּרָה
  chosen: gerahs
  alternatives:
  - geras
  lexicon: HALOT
  rationale: Gerah is a small unit of weight/currency. Transliteration is preferable
    because there is no natural English equivalent. The plural 'gerahs' matches English
    usage for counted transliterated units.
- source_word: עֶשְׂרִים גֵּרָה יִהְיֶה הַשָּׁקֶל
  chosen: the shekel shall be twenty gerahs
  alternatives:
  - twenty gerahs shall make the shekel
  lexicon: HALOT
  rationale: This clause defines the shekel's value. The chosen wording follows the
    Hebrew word order closely while remaining natural English.
- source_word: וְכָל
  chosen: And every
  alternatives:
  - And all
  - Every
  lexicon: HALOT
  rationale: 'The conjunction plus quantifier is preserved. ''Every'' fits the distributive
    sense in context: each valuation is to be reckoned by this standard.'
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - is to be
  - must be
  lexicon: HALOT
  rationale: The imperfect here functions prescriptively in legal material. 'Shall
    be' preserves the legal-register force without over-paraphrasing.
