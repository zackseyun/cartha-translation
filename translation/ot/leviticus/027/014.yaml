id: LEV.27.14
reference: Leviticus 27:14
source:
  edition: WLC
  text: וְ/אִ֗ישׁ כִּֽי יַקְדִּ֨שׁ אֶת בֵּית֥/וֹ קֹ֨דֶשׁ֙ לַֽ/יהוָ֔ה וְ/הֶעֱרִיכ/וֹ֙
    הַ/כֹּהֵ֔ן בֵּ֥ין ט֖וֹב וּ/בֵ֣ין רָ֑ע כַּ/אֲשֶׁ֨ר יַעֲרִ֥יךְ אֹת֛/וֹ הַ/כֹּהֵ֖ן
    כֵּ֥ן יָקֽוּם־־׃
translation:
  text: And if a man consecrates his house as holy to the LORD, then the priest shall
    assess it, whether good or bad; as the priest assesses it, so it shall stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''whether good or bad,'' that is, whatever the condition or quality
      of the house may be in the priest''s valuation.'
    reason: cultural_note
  - marker: b
    text: Or 'value it' / 'appraise it' for the repeated Hebrew verb referring to
      priestly valuation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: And if a man
  alternatives:
  - And when a man
  - If anyone
  lexicon: HALOT
  rationale: אִישׁ is singular masculine, here introducing a case law scenario. 'A
    man' preserves the gender-accurate singular form per translation philosophy. כִּי
    with the prefixed conjunction is rendered idiomatically as 'And if' to introduce
    the conditional.
- source_word: יַקְדִּשׁ
  chosen: consecrates
  alternatives:
  - sanctifies
  - dedicates
  lexicon: HALOT
  rationale: Hiphil of קדשׁ here means to set apart something as holy for sacred use.
    'Consecrates' best captures formal dedication to sacred status without sounding
    archaic like 'sanctifies.'
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: The term denotes a house/building in this valuation context. 'House'
    is more precise than 'home' because the verse concerns property assessment.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: as holy to the LORD
  alternatives:
  - holy to the LORD
  - as a holy thing to the LORD
  - to be holy to the LORD
  lexicon: HALOT
  rationale: The phrase marks the house as set apart for YHWH. 'As holy to the LORD'
    reads naturally in English while preserving the consecratory sense. YHWH is rendered
    'the LORD' per doctrine guidelines.
- source_word: וְהֶעֱרִיכוֹ
  chosen: then the priest shall assess it
  alternatives:
  - and the priest shall value it
  - and the priest shall appraise it
  lexicon: HALOT
  rationale: The Hiphil of ערך in Leviticus 27 refers to priestly valuation for redemption/dedication
    purposes. 'Assess' communicates official valuation in clear modern English; 'value'
    or 'appraise' are possible but 'assess' fits the legal-priestly context well.
- source_word: בֵּין טוֹב וּבֵין רָע
  chosen: whether good or bad
  alternatives:
  - between good and bad
  - whether it is good or whether it is bad
  lexicon: HALOT
  rationale: This idiom expresses evaluation across quality categories. 'Whether good
    or bad' is natural English and preserves the full range of assessment.
- source_word: כַּאֲשֶׁר יַעֲרִיךְ אֹתוֹ הַכֹּהֵן
  chosen: as the priest assesses it
  alternatives:
  - according to the priest's assessment of it
  - just as the priest values it
  lexicon: HALOT
  rationale: This clause restates the priest's valuation as determinative. Repeating
    'assesses' maintains lexical consistency with ערך in the same verse.
- source_word: כֵּן יָקוּם
  chosen: so it shall stand
  alternatives:
  - so it shall remain
  - so it shall be established
  - so it shall be fixed
  lexicon: HALOT
  rationale: קום here means the valuation remains in force or stands as valid. 'So
    it shall stand' is a clear, fairly formal legal expression that preserves the
    idiom's force.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in the main text, following the project's default.
