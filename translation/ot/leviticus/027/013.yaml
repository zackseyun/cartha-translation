id: LEV.27.13
reference: Leviticus 27:13
source:
  edition: WLC
  text: וְ/אִם גָּאֹ֖ל יִגְאָלֶ֑/נָּה וְ/יָסַ֥ף חֲמִישִׁת֖/וֹ עַל עֶרְכֶּֽ/ךָ־־׃
translation:
  text: But if he does redeem it, then he shall add a fifth of it to your valuation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he redeems it' / 'he surely redeems it'; the Hebrew uses an infinitive
      absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional introduces a contrastive conditional
    within the legal material. 'But if' captures the adversative flow from the previous
    verse better than a bare 'if' while remaining natural English.
- source_word: גָּאֹל יִגְאָלֶנָּה
  chosen: he does redeem it
  alternatives:
  - he redeems it
  - he surely redeems it
  - he wishes to redeem it
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of גאל intensifies the verbal
    idea. 'Does redeem' preserves the emphasis without sounding overly wooden. The
    3fs suffix refers back to the previously mentioned unclean animal, so English
    'it' is appropriate.
- source_word: וְיָסַף
  chosen: then he shall add
  alternatives:
  - and he shall add
  - he must add
  lexicon: HALOT
  rationale: In this legal context the waw + perfect carries consequential force.
    'Then he shall add' expresses the required result in idiomatic legal English.
- source_word: חֲמִישִׁתוֹ
  chosen: a fifth of it
  alternatives:
  - its fifth part
  - one-fifth
  lexicon: HALOT
  rationale: The noun means 'a fifth' with the 3ms suffix referring to the amount
    added. 'A fifth of it' is clear modern English and reflects the Hebrew proportion.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - on top of
  - in addition to
  lexicon: HALOT
  rationale: With יָסַף and a valuation amount, עַל indicates addition over and above.
    English 'to' after 'add' is the most natural equivalent.
- source_word: עֶרְכֶּךָ
  chosen: your valuation
  alternatives:
  - your assessed value
  - your valuation price
  lexicon: HALOT
  rationale: The noun עֵרֶךְ in Leviticus 27 refers to the priestly valuation/assessment.
    Because the suffix is second masculine singular, 'your valuation' addresses the
    priest directly, matching the Hebrew form and the legal setting.
