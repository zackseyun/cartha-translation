theological_decisions:
- issue: Generic masculine in legal formulation
  chosen_reading: another man
  alternative_readings:
  - another person
  - someone else
  rationale: The Hebrew uses איש, a masculine singular noun. Following the project's
    gender-accurate policy, the draft retains 'man' rather than neutralizing the term,
    while recognizing that the legal force may be generic.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Legal-sacral force of גאל
  chosen_reading: redeem
  alternative_readings:
  - buy back
  - reclaim
  rationale: Although the context concerns property law, 'redeem' best preserves the
    technical covenantal/legal nuance of גאל without importing extra theological claims.
    Simpler alternatives flatten the term's established legal resonance in Leviticus
    27.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
