id: LEV.27.20
reference: Leviticus 27:20
source:
  edition: WLC
  text: וְ/אִם לֹ֤א יִגְאַל֙ אֶת הַ/שָּׂדֶ֔ה וְ/אִם מָכַ֥ר אֶת הַ/שָּׂדֶ֖ה לְ/אִ֣ישׁ
    אַחֵ֑ר לֹ֥א יִגָּאֵ֖ל עֽוֹד־־־־׃
translation:
  text: But if he does not redeem the field, or if he has sold the field to another
    man, it may not be redeemed again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''to another person.'' Hebrew: ''to another man.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction introduces a conditional continuation from the prior
    verse. 'But if' captures the adversative/continuing force in context better than
    a bare 'if'.
- source_word: יִגְאַל / יִגָּאֵל
  chosen: redeem / be redeemed
  alternatives:
  - buy back
  - reclaim
  lexicon: HALOT
  rationale: גאל in this legal-sacral context refers to redemption or buyback of dedicated
    property. 'Redeem' preserves the established legal sense and links active and
    passive forms naturally in English.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the land
  lexicon: HALOT
  rationale: שׂדה here refers to the specific field under discussion in the valuation
    laws, not land in a broad territorial sense.
- source_word: מָכַר
  chosen: has sold
  alternatives:
  - sold
  lexicon: HALOT
  rationale: The perfect verb in this conditional clause is well represented by English
    present perfect, indicating a completed sale with present legal consequence.
- source_word: לְאִישׁ אַחֵר
  chosen: to another man
  alternatives:
  - to another person
  - to someone else
  lexicon: HALOT
  rationale: איש is grammatically and lexically 'man.' In legal contexts it can function
    generically, but the translation philosophy prefers gender-accurate renderings
    matching the source form unless context clearly demands otherwise.
- source_word: עוֹד
  chosen: again
  alternatives:
  - any longer
  - any more
  lexicon: HALOT
  rationale: In this legal statement, עוד marks that further redemption is no longer
    possible after the sale; 'again' expresses the prohibition succinctly in idiomatic
    English.
