id: LEV.23.19
reference: Leviticus 23:19
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶ֛ם שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּ֑את וּ/שְׁנֵ֧י כְבָשִׂ֛ים בְּנֵ֥י
    שָׁנָ֖ה לְ/זֶ֥בַח שְׁלָמִֽים־׃
translation:
  text: And you shall offer one male goat for a sin offering, and two male lambs a
    year old for a sacrifice of peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial context with
    specified animals and offering types, idiomatic English is 'offer.' This preserves
    the cultic sense without woodenly saying 'make.'
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase denotes a goat of the male kind. 'Male goat' is
    clear modern English and preserves the sex specification relevant to sacrificial
    law.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Simple numeral retained directly.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In Levitical sacrificial language, חטאת commonly denotes the purification/sin
    offering. 'Sin offering' is the standard concise rendering and best fits the immediate
    cultic context.
- source_word: וּשְׁנֵי כְבָשִׂים
  chosen: and two male lambs
  alternatives:
  - and two lambs
  lexicon: HALOT
  rationale: כְבָשִׂים refers to lambs, typically male in sacrificial usage; rendering
    'male lambs' makes explicit what the Hebrew term commonly implies in this context
    and matches the sacrificial specification.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - one year old
  - in their first year
  lexicon: HALOT
  rationale: This idiom denotes animals one year old. 'A year old' is natural English
    and sufficiently precise.
- source_word: לְזֶבַח שְׁלָמִים
  chosen: for a sacrifice of peace offerings
  alternatives:
  - for a sacrifice of fellowship offerings
  - for a peace offering sacrifice
  lexicon: HALOT
  rationale: זֶבַח marks the slaughtered sacrifice, and שְׁלָמִים is the established
    category often rendered 'peace offerings.' The plural is retained because the
    Hebrew is plural, even though English can also idiomatically use the singular
    category term.
