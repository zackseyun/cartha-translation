theological_decisions:
- issue: Rendering of חטאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: While some modern scholarship emphasizes the purificatory function of
    חטאת, the traditional rendering 'sin offering' remains widely intelligible and
    contextually appropriate here. The verse itself does not require resolving broader
    debates about sacrificial theology, so the conventional rendering is kept and
    the alternative preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Rendering of שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: '''Peace offerings'' is more directly tied to the Hebrew term and long-standing
    sacrificial category, while ''fellowship offerings'' is interpretive. To avoid
    importing a narrower theological explanation, the more source-near term is used,
    with the alternative noted.'
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
