theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names the sacred times as belonging to Israel's covenant God.
    The translation follows the project's stated default for YHWH without importing
    a denominational preference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether מוֹעֲדֵי should be narrowed to 'feasts/festivals'
  chosen_reading: appointed times
  alternative_readings:
  - appointed feasts
  - festivals
  rationale: The chapter includes the Sabbath among these observances, so a broader
    temporal term better preserves the scope of the Hebrew and avoids implying only
    festal celebrations.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Whether to preserve the masculine form in בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine plural in a conventional covenantal
    expression. Per the gender-accurate principle, the masculine form is retained
    rather than neutralized, while the phrase still refers corporately to the people
    of Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
