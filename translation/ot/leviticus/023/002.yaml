id: LEV.23.2
reference: Leviticus 23:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם מוֹעֲדֵ֣י יְהוָ֔ה
    אֲשֶׁר תִּקְרְא֥וּ אֹתָ֖/ם מִקְרָאֵ֣י קֹ֑דֶשׁ אֵ֥לֶּה הֵ֖ם מוֹעֲדָֽ/י־־׃
translation:
  text: 'Speak to the sons of Israel and say to them: These are the appointed times
    of the LORD, which you shall proclaim as holy convocations; they are my appointed
    times.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed feasts' or 'festivals'; the Hebrew term can refer to fixed
      sacred occasions generally, not only feast meals.
    reason: lexical_alternative
  - marker: b
    text: Or 'sacred assemblies.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of Israel,' a standard covenantal expression for the people
      of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר, a direct command to address the people. 'Speak'
    is the standard and suitably formal rendering in legal/instructional contexts.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle,
    the masculine form is preserved rather than flattened to 'Israelites,' while still
    functioning corporately for the covenant people.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: A common command sequence after 'speak to.' 'Say to them' preserves the
    formal cadence and directness of the Hebrew.
- source_word: מוֹעֲדֵי
  chosen: appointed times
  alternatives:
  - appointed feasts
  - set times
  - festivals
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time/meeting. In Leviticus 23 the term includes
    sacred times broadly, not only feast meals, and v.3 will include the Sabbath,
    so 'appointed times' is broader and more source-accurate than 'feasts' or 'festivals'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֲשֶׁר תִּקְרְאוּ אֹתָם
  chosen: which you shall proclaim
  alternatives:
  - which you shall call
  - which you shall announce
  lexicon: HALOT
  rationale: קרא here means to proclaim/designate publicly. 'Proclaim' best fits the
    cultic-public setting and the object that follows.
- source_word: מִקְרָאֵי קֹדֶשׁ
  chosen: holy convocations
  alternatives:
  - sacred assemblies
  - holy assemblies
  lexicon: HALOT
  rationale: A fixed cultic expression for formally summoned sacred gatherings. 'Holy
    convocations' preserves both the summons nuance of מקרא and the consecrated nature
    of קדש.
- source_word: אֵלֶּה הֵם
  chosen: These are
  alternatives:
  - These—they are
  lexicon: HALOT
  rationale: The Hebrew uses an emphatic demonstrative-plus-pronoun construction.
    Smooth English normally renders this simply as 'These are' while retaining the
    identificational force.
- source_word: מוֹעֲדָי
  chosen: my appointed times
  alternatives:
  - my appointed feasts
  - my set times
  lexicon: HALOT
  rationale: 'The 1cs suffix must be represented: these times belong to and are designated
    by God. ''Appointed times'' maintains consistency with the earlier מוֹעֲדֵי.'
