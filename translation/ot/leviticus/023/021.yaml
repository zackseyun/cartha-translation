theological_decisions:
- issue: Scope of work prohibition in festival law
  chosen_reading: Render כָּל מְלֶאכֶת עֲבֹדָה as 'no laborious work' rather than
    the broader 'no work.'
  alternative_readings:
  - no regular work
  - no occupational work
  - no work
  rationale: The Hebrew legal phrase commonly refers to ordinary labor/service work,
    not necessarily every conceivable action. This avoids importing a stricter sabbath-like
    prohibition than the wording itself states.
  doctrine_reference: Translation philosophy §§1, 3, 5
