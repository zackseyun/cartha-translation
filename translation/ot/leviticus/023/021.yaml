id: LEV.23.21
reference: Leviticus 23:21
source:
  edition: WLC
  text: וּ/קְרָאתֶ֞ם בְּ/עֶ֣צֶם הַ/יּ֣וֹם הַ/זֶּ֗ה מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה לָ/כֶ֔ם
    כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֣א תַעֲשׂ֑וּ חֻקַּ֥ת עוֹלָ֛ם בְּ/כָל מוֹשְׁבֹ֥תֵי/כֶ֖ם
    לְ/דֹרֹֽתֵי/כֶֽם׀־־־׃
translation:
  text: And on that very day you shall proclaim a holy convocation; you shall do no
    laborious work. It is a permanent statute throughout your dwellings for your generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly' or 'a holy assembly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no work of labor/service'; that is, no ordinary laborious work.
    reason: lexical_alternative
  - marker: c
    text: Or 'an everlasting statute' or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/קְרָאתֶם
  chosen: you shall proclaim
  alternatives:
  - you shall call
  - you shall announce
  lexicon: HALOT
  rationale: קרא in this cultic context refers to formally declaring or summoning
    an assembly/day, not merely speaking. 'Proclaim' captures the public, official
    sense in idiomatic English.
- source_word: בְּ/עֶצֶם הַ/יּוֹם הַ/זֶּה
  chosen: on that very day
  alternatives:
  - on the same day
  - on that selfsame day
  lexicon: HALOT
  rationale: The phrase intensifies the temporal reference, emphasizing the exact
    day itself. 'On that very day' preserves the emphasis in natural modern English.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This fixed cultic phrase in Leviticus denotes a formally summoned sacred
    gathering. 'Holy convocation' preserves the technical and liturgical force better
    than the more generic 'assembly,' while remaining understandable.
- source_word: יִהְיֶה לָכֶם
  chosen: shall be
  alternatives:
  - shall be for you
  - is to be for you
  lexicon: HALOT
  rationale: The clause states what the day is to constitute for Israel. In English,
    the force is adequately conveyed within 'you shall proclaim a holy convocation';
    the predication is preserved without awkward repetition.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: no laborious work
  alternatives:
  - no regular work
  - no occupational work
  - no work of service
  lexicon: HALOT
  rationale: The phrase distinguishes ordinary labor from all activity whatsoever.
    'Laborious work' preserves the sense of customary/servile labor better than an
    absolute 'no work,' which could overstate the prohibition.
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you shall not do
  - do not do
  lexicon: HALOT
  rationale: A straightforward prohibition in legal style; 'you shall do no' fits
    the formal register of the verse and works smoothly with the chosen object phrase.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: עוֹלָם in legal formulas often denotes enduring permanence within covenantal
    generations. 'Permanent statute' is clear modern English; 'everlasting' may suggest
    an absolute metaphysical claim beyond the idiom's normal legal force.
- source_word: בְּ/כָל מוֹשְׁבֹתֵיכֶם
  chosen: throughout your dwellings
  alternatives:
  - in all your dwelling places
  - wherever you live
  lexicon: HALOT
  rationale: The phrase extends the statute to all places of Israelite settlement.
    'Throughout your dwellings' is concise and preserves the distributive sense.
- source_word: לְ/דֹרֹתֵיכֶם
  chosen: for your generations
  alternatives:
  - throughout your generations
  - for all your generations
  lexicon: HALOT
  rationale: This legal formula marks ongoing applicability across successive generations.
    'For your generations' is accurate and idiomatic, especially following 'throughout
    your dwellings.'
