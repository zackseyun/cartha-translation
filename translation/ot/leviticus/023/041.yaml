theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of עוֹלָם in cultic legislation
  chosen_reading: permanent statute
  alternative_readings:
  - everlasting statute
  - perpetual statute
  rationale: The term can denote enduring permanence, but in legal and covenantal
    contexts it need not make a philosophical claim about absolute timelessness. 'Permanent'
    preserves the binding, ongoing force without over-specifying beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source''s
    plain sense without importing doctrinal claims'
