id: LEV.23.41
reference: Leviticus 23:41
source:
  edition: WLC
  text: וְ/חַגֹּתֶ֤ם אֹת/וֹ֙ חַ֣ג לַֽ/יהוָ֔ה שִׁבְעַ֥ת יָמִ֖ים בַּ/שָּׁנָ֑ה חֻקַּ֤ת
    עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם בַּ/חֹ֥דֶשׁ הַ/שְּׁבִיעִ֖י תָּחֹ֥גּוּ אֹתֽ/וֹ׃
translation:
  text: You shall celebrate it as a feast to the LORD for seven days in the year.
    It is a permanent statute throughout your generations; in the seventh month you
    shall celebrate it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD' instead of 'to the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an everlasting statute' or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַגֹּתֶם / תָּחֹגּוּ
  chosen: you shall celebrate
  alternatives:
  - you shall keep the feast
  - you shall observe as a festival
  lexicon: HALOT
  rationale: The verb חָגַג refers to celebrating or keeping a pilgrimage festival.
    'Celebrate' is natural modern English and preserves the festal action without
    unnecessary archaism. The repetition of the verb in the verse is retained with
    the same English gloss for consistency.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - this feast
  lexicon: HALOT
  rationale: The pronoun refers back to the feast being discussed in context. 'It'
    is sufficient in English and avoids adding words not present in the Hebrew.
- source_word: חַג
  chosen: a feast
  alternatives:
  - a festival
  lexicon: HALOT
  rationale: חַג denotes a festival/feast, often with pilgrimage associations. 'Feast'
    is a standard and clear rendering in Levitical festival contexts; 'festival' is
    possible but slightly less connected to the established cultic terminology.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here marks
    dedication/direction; 'to the LORD' communicates that the feast is observed in
    honor of him. 'For the LORD' is also viable and idiomatic.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: This is the duration of the feast. 'For seven days' expresses the temporal
    force idiomatically in English.
- source_word: בַּשָּׁנָה
  chosen: in the year
  alternatives:
  - each year
  - yearly
  lexicon: HALOT
  rationale: Formally, the Hebrew reads 'in the year.' In context it indicates the
    annual occurrence of the feast. The translation keeps the wording close to the
    source while remaining intelligible.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: חֻקָּה is a prescribed statute. עוֹלָם in legal/covenantal contexts often
    denotes enduring or perpetual duration within the covenantal frame. 'Permanent
    statute' is clear modern English; more traditional 'perpetual/everlasting statute'
    remains possible.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  lexicon: HALOT
  rationale: This idiom indicates continuing applicability across successive generations.
    'Throughout your generations' is the standard natural rendering.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  lexicon: HALOT
  rationale: A straightforward temporal phrase specifying when the feast is to be
    observed.
