theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identification of פְּרִי עֵץ הָדָר
  chosen_reading: generic 'the fruit of splendid trees'
  alternative_readings:
  - citron fruit
  - fruit of the citron tree
  rationale: Later Jewish tradition often identifies this with the etrog/citron used in Sukkot observance, but the Hebrew wording itself is more general. To avoid importing later interpretive specificity into the main text, the translation keeps the broader lexical sense and preserves the traditional identification in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
