id: LEV.23.40
reference: Leviticus 23:40
source:
  edition: WLC
  text: וּ/לְקַחְתֶּ֨ם לָ/כֶ֜ם בַּ/יּ֣וֹם הָ/רִאשׁ֗וֹן פְּרִ֨י עֵ֤ץ הָדָר֙ כַּפֹּ֣ת תְּמָרִ֔ים וַ/עֲנַ֥ף עֵץ עָבֹ֖ת וְ/עַרְבֵי נָ֑חַל וּ/שְׂמַחְתֶּ֗ם לִ/פְנֵ֛י יְהוָ֥ה אֱלֹהֵי/כֶ֖ם שִׁבְעַ֥ת יָמִֽים־־׃
translation:
  text: And on the first day you shall take for yourselves the fruit of majestic trees, branches of palm trees, boughs of leafy trees, and willows of the brook, and you shall rejoice before Yahweh your God for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, according to later Jewish tradition, 'citron fruit' (etrog). The Hebrew literally speaks of 'the fruit of splendid/beautiful trees.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְקַחְתֶּם לָכֶם
  chosen: you shall take for yourselves
  alternatives:
  - you are to take for yourselves
  - you must take for yourselves
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in legal/instructional context carries directive force. 'Shall take' preserves the prescriptive sense without over-paraphrase; 'for yourselves' reflects לָכֶם rather than omitting it.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: on the first day
  alternatives:
  - on the first day of the festival
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'Of the festival' is contextually true from the surrounding passage but not explicit in this verse, so it is not added to the main text.
- source_word: פְּרִי עֵץ הָדָר
  chosen: the fruit of splendid trees
  alternatives:
  - fruit of beautiful trees
  - fruit of majestic trees
  - citron fruit
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat debated. הָדָר denotes beauty, splendor, or majesty. A generic rendering best reflects the plain lexical sense without importing later ritual identification such as citron/etrog into the main text. 'Splendid' captures the elevated tone.
- source_word: כַּפֹּת תְּמָרִים
  chosen: branches of palm trees
  alternatives:
  - palm fronds
  - palm branches
  lexicon: HALOT
  rationale: This phrase refers to palm foliage. 'Branches of palm trees' is clear modern English and remains close to the Hebrew; 'fronds' is possible but slightly more interpretive and botanical.
- source_word: וַעֲנַף עֵץ עָבֹת
  chosen: boughs of leafy trees
  alternatives:
  - branches of thick trees
  - boughs of dense-foliaged trees
  lexicon: HALOT
  rationale: עָבֹת conveys thickness/density, likely of foliage. 'Leafy trees' communicates the practical sense in natural English better than the wooden 'thick trees,' while staying within optimal equivalence.
- source_word: וְעַרְבֵי נָחַל
  chosen: willows of the brook
  alternatives:
  - willows of the stream
  - brookside willows
  lexicon: HALOT
  rationale: עַרְבֵי refers to willows/poplar-like trees, and נָחַל here denotes a wadi/streamcourse. 'Willows of the brook' is a familiar, sufficiently literal rendering.
- source_word: וּשְׂמַחְתֶּם
  chosen: you shall rejoice
  alternatives:
  - you shall celebrate with joy
  - you are to rejoice
  lexicon: HALOT
  rationale: The verb means to rejoice/be glad. 'Rejoice' preserves the direct verbal force and avoids expanding it into a paraphrase.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: לִפְנֵי is idiomatically 'before/in the presence of.' The covenant name יְהוָה follows the project's default rendering 'the LORD' per doctrine guidelines.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom naturally supplies 'for' with duration, making the instruction readable while preserving the temporal extent.
