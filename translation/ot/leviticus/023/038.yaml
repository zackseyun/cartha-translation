id: LEV.23.38
reference: Leviticus 23:38
source:
  edition: WLC
  text: מִ/לְּ/בַ֖ד שַׁבְּתֹ֣ת יְּהוָ֑ה וּ/מִ/לְּ/בַ֣ד מַתְּנֽוֹתֵי/כֶ֗ם וּ/מִ/לְּ/בַ֤ד כָּל נִדְרֵי/כֶם֙ וּ/מִ/לְּ/בַד֙ כָּל נִדְב֣וֹתֵי/כֶ֔ם אֲשֶׁ֥ר תִּתְּנ֖וּ לַ/יהוָֽה־־׃
translation:
  text: besides the Sabbaths of Yahweh, and besides your gifts, and besides all your vows, and besides all your freewill offerings, which you give to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apart from' or 'in addition to' at each repetition of 'besides.'
    reason: lexical_alternative
  - marker: b
    text: '''The Sabbaths of the LORD'' may also be rendered ''the LORD''s Sabbaths.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The prepositional expression marks exclusion/addition relative to the festival offerings just described. 'Besides' is concise, idiomatic, and preserves the repeated structure of the Hebrew.
- source_word: שַׁבְּתֹת יְהוָה
  chosen: the Sabbaths of the LORD
  alternatives:
  - the LORD's Sabbaths
  - the sabbaths of the LORD
  lexicon: HALOT
  rationale: Plural 'Sabbaths' reflects the Hebrew plural. The construct with the divine name is rendered literally. Per doctrine, יְהוָה is translated 'the LORD.' Capitalizing 'Sabbaths' treats the term as the named sacred days in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with the doctrine table.
- source_word: מַתְּנוֹתֵיכֶם
  chosen: your gifts
  alternatives:
  - your gift offerings
  - your presents
  lexicon: HALOT
  rationale: The noun denotes gifts given to God. 'Your gifts' is natural English and broad enough to cover the category without over-specifying beyond the Hebrew.
- source_word: כָּל נִדְרֵיכֶם
  chosen: all your vows
  alternatives:
  - all your vow offerings
  - all your vowed gifts
  lexicon: HALOT
  rationale: נֶדֶר commonly denotes a vow or what is vowed. Here, in a list of offerings given to the LORD, 'vows' is a sufficiently literal rendering and matches the Hebrew wording without adding 'offerings,' which is implied by context.
- source_word: כָּל נִדְבֹתֵיכֶם
  chosen: all your freewill offerings
  alternatives:
  - all your voluntary offerings
  - all your freewill gifts
  lexicon: HALOT
  rationale: נְדָבָה in sacrificial contexts commonly refers to a freewill offering. Because the cultic context is explicit, 'freewill offerings' is clearer and more precise than the broader 'freewill gifts.'
- source_word: אֲשֶׁר תִּתְּנוּ לַיהוָה
  chosen: which you give to the LORD
  alternatives:
  - that you give to the LORD
  - which you present to the LORD
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the final coordinated items collectively in context. 'Give' is the plain sense of נתן and keeps the wording simple and direct.
