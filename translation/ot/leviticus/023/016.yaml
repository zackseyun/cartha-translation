theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to smooth 'the seventh Sabbath' into an interpretive calendrical expression such as 'the seventh week'
  chosen_reading: the seventh Sabbath
  alternative_readings:
  - the seventh week
  rationale: The Hebrew text explicitly uses שַׁבָּת, not the ordinary word for 'week.' Retaining 'Sabbath' preserves the source wording and avoids resolving calendrical debates beyond what the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
