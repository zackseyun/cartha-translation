id: LEV.23.16
reference: Leviticus 23:16
source:
  edition: WLC
  text: עַ֣ד מִֽ/מָּחֳרַ֤ת הַ/שַּׁבָּת֙ הַ/שְּׁבִיעִ֔ת תִּסְפְּר֖וּ חֲמִשִּׁ֣ים י֑וֹם וְ/הִקְרַבְתֶּ֛ם מִנְחָ֥ה חֲדָשָׁ֖ה לַ/יהוָֽה׃
translation:
  text: You shall count fifty days, up to the day after the seventh Sabbath; then you shall present a new grain offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the day after the seventh week.' The Hebrew reads 'the day after the seventh Sabbath,' and interpreters differ on how the festival count is expressed in calendrical terms.
    reason: alternative_reading
lexical_decisions:
- source_word: עַד
  chosen: up to
  alternatives:
  - until
  lexicon: HALOT
  rationale: Marks the extent of the counting period. 'Up to' fits naturally with the following temporal phrase and the counting instruction.
- source_word: מִמָּחֳרַת
  chosen: the day after
  alternatives:
  - on the morrow after
  - from the day after
  lexicon: HALOT
  rationale: The noun means 'the next day' or 'the morrow.' In idiomatic modern English, 'the day after' is the clearest rendering.
- source_word: הַשַּׁבָּת הַשְּׁבִיעִת
  chosen: the seventh Sabbath
  alternatives:
  - the seventh week
  - the seventh rest day
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the Sabbath, the seventh.' In this festival-counting context, 'the seventh Sabbath' preserves the wording and the structure of the ritual calendar better than smoothing it to 'week,' though the counting of seven sabbaths/weeks is conceptually related.
- source_word: תִּסְפְּרוּ
  chosen: you shall count
  alternatives:
  - you are to count
  lexicon: HALOT
  rationale: Imperfect second masculine plural in legal instruction is well represented by English 'you shall count.'
- source_word: חֲמִשִּׁים יוֹם
  chosen: fifty days
  alternatives:
  - fifty day(s)
  lexicon: HALOT
  rationale: Standard English rendering of the numeral plus singular collective noun construction.
- source_word: וְהִקְרַבְתֶּם
  chosen: then you shall present
  alternatives:
  - and you shall bring near
  - and you shall offer
  lexicon: HALOT
  rationale: In sacrificial context the verb means to bring/present an offering. 'Present' is natural English and preserves the cultic sense without overtechnical wording. 'Then' makes the sequence explicit in English.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In Levitical sacrificial terminology, מִנְחָה commonly denotes a grain offering. This is more precise than the generic 'offering.'
- source_word: חֲדָשָׁה
  chosen: new
  alternatives:
  - fresh
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'new' and modifies the grain offering, likely indicating the offering from the new produce.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition ל is naturally rendered 'to' in this offering context.
