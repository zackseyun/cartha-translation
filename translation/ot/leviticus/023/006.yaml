id: LEV.23.6
reference: Leviticus 23:6
source:
  edition: WLC
  text: וּ/בַ/חֲמִשָּׁ֨ה עָשָׂ֥ר יוֹם֙ לַ/חֹ֣דֶשׁ הַ/זֶּ֔ה חַ֥ג הַ/מַּצּ֖וֹת לַ/יהוָ֑ה שִׁבְעַ֥ת יָמִ֖ים מַצּ֥וֹת תֹּאכֵֽלוּ׃
translation:
  text: And on the fifteenth day of this month is the Feast of Unleavened Bread to Yahweh; for seven days you shall eat unleavened bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD.' The Hebrew preposition can express dedication or belonging.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֲמִשָּׁה עָשָׂר יוֹם
  chosen: And on the fifteenth day
  alternatives:
  - And on the fifteenth
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'and on the fifteen day,' standardly meaning 'on the fifteenth day.' Including 'day' makes the temporal expression natural and explicit in English.
- source_word: לַ/חֹדֶשׁ הַ/זֶּה
  chosen: of this month
  alternatives:
  - in this month
  lexicon: HALOT
  rationale: With יוֹם, the phrase marks the date within the current month. 'Of this month' is the most idiomatic English rendering for the calendrical construction.
- source_word: חַג
  chosen: Feast
  alternatives:
  - festival
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage festival/feast. 'Feast' preserves the formal cultic sense and matches common biblical usage without sounding archaic.
- source_word: הַ/מַּצּוֹת
  chosen: Unleavened Bread
  alternatives:
  - unleavened bread
  lexicon: HALOT
  rationale: As the genitival name of the festival, the established and accurate title is 'the Feast of Unleavened Bread.' Capitalization reflects a named sacred festival, not an interpretive expansion.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל here marks dedication/belonging of the feast to YHWH; 'to the LORD' preserves that relation closely, though 'for the LORD' is also possible.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: 'The accusative of duration is naturally rendered in English with ''for'': the eating lasts throughout a seven-day period.'
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened loaves
  lexicon: HALOT
  rationale: The plural noun refers to unleavened bread/matzot. English commonly uses the mass expression 'unleavened bread' for the food category, which reads naturally here while preserving the substance of the command.
- source_word: תֹּאכֵלוּ
  chosen: you shall eat
  alternatives:
  - you are to eat
  - you must eat
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction/command within legal material. 'You shall eat' preserves the prescriptive force in standard biblical legal English without over-intensifying it.
