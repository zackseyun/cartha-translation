id: LEV.23.34
reference: Leviticus 23:34
source:
  edition: WLC
  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר בַּ/חֲמִשָּׁ֨ה עָשָׂ֜ר י֗וֹם לַ/חֹ֤דֶשׁ
    הַ/שְּׁבִיעִי֙ הַ/זֶּ֔ה חַ֧ג הַ/סֻּכּ֛וֹת שִׁבְעַ֥ת יָמִ֖ים לַ/יהֹוָֽה־׃
translation:
  text: 'Speak to the sons of Israel, saying: On the fifteenth day of this seventh
    month is the Feast of Booths for seven days to the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'the Feast of Tabernacles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative of דבר introducing divine instruction to Moses. 'Speak' preserves
    the formal command style used throughout Leviticus better than the more interpretive
    'tell'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the masculine
    form is retained rather than neutralized. In context it denotes the covenant people
    collectively, but the source expression is formulaic and worth preserving.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Standard quotative infinitive construction after 'Speak to ...' rendered
    compactly as 'saying' in English.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  chosen: On the fifteenth day
  alternatives:
  - On day fifteen
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew date formula while preserving
    the calendrical specificity.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי הַזֶּה
  chosen: of this seventh month
  alternatives:
  - of the seventh month, this one
  - of this, the seventh month
  lexicon: HALOT
  rationale: Natural English order for the Hebrew demonstrative phrase. 'This' is
    retained because it is present in the source and situates the instruction in the
    liturgical calendar.
- source_word: חַג
  chosen: Feast
  alternatives:
  - festival
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage/festival feast. 'Feast' preserves the festal
    and sacred character and matches traditional cultic usage without being archaic.
- source_word: הַסֻּכּוֹת
  chosen: Booths
  alternatives:
  - Tabernacles
  - Shelters
  lexicon: HALOT
  rationale: סֻכּוֹת refers to temporary shelters/booths. 'Booths' is the most direct
    lexical rendering; 'Tabernacles' is traditional but less transparent to modern
    readers. Because 'Feast of Tabernacles' is a familiar traditional name, it is
    preserved in a footnote.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom prefers 'for seven days' after naming the feast; this preserves
    duration clearly.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here marks
    dedication/direction of the feast; 'to the LORD' is a natural and sufficiently
    formal rendering.
