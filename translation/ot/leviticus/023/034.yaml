theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Naming the festival סֻכּוֹת
  chosen_reading: Feast of Booths
  alternative_readings:
  - Feast of Tabernacles
  rationale: The Hebrew term denotes booths/shelters; the main text favors transparent
    source-based meaning over translation tradition. The traditional festival name
    is preserved in a footnote for reader recognition.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy
    over translation tradition
