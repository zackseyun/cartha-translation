id: LEV.23.22
reference: Leviticus 23:22
source:
  edition: WLC
  text: וּֽ/בְ/קֻצְרְ/כֶ֞ם אֶת קְצִ֣יר אַרְצְ/כֶ֗ם לֹֽא תְכַלֶּ֞ה פְּאַ֤ת שָֽׂדְ/ךָ֙
    בְּ/קֻצְרֶ֔/ךָ וְ/לֶ֥קֶט קְצִירְ/ךָ֖ לֹ֣א תְלַקֵּ֑ט לֶֽ/עָנִ֤י וְ/לַ/גֵּר֙ תַּעֲזֹ֣ב
    אֹתָ֔/ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־־׃ס
translation:
  text: And when you reap the harvest of your land, you shall not completely reap
    the edge of your field when you reap, and you shall not gather the gleanings of
    your harvest; you shall leave them for the poor and for the sojourner. I am the
    LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corner of your field.' The Hebrew term can denote an edge, side, or
      corner.
    reason: lexical_alternative
  - marker: b
    text: Or 'resident foreigner.' The Hebrew word refers to a non-Israelite living
      among Israel under its social protections.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקֻצְרְכֶם
  chosen: And when you reap
  alternatives:
  - And in your reaping
  - When you harvest
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with the infinitive construct
    of קצר introduces a temporal circumstance. 'And when you reap' is natural English
    and preserves the legal-sequential force better than a more wooden 'and in your
    reaping.'
- source_word: קְצִיר אַרְצְכֶם
  chosen: the harvest of your land
  alternatives:
  - your land's harvest
  - the crop of your land
  lexicon: HALOT
  rationale: קציר denotes harvested produce or harvest; 'harvest of your land' is
    idiomatic and keeps the agricultural setting explicit.
- source_word: לֹא תְכַלֶּה
  chosen: you shall not completely reap
  alternatives:
  - you shall not finish reaping
  - you shall not make a full end of
  lexicon: HALOT
  rationale: כלה in the Piel here means to complete or finish. Because the object
    is the field's edge, 'completely reap' communicates the prohibition against harvesting
    to the very limit.
- source_word: פְּאַת שָׂדְךָ
  chosen: the edge of your field
  alternatives:
  - the corner of your field
  - the border of your field
  lexicon: HALOT
  rationale: פאה can mean edge, side, or corner. In this agricultural law it refers
    to the extremity left unharvested. 'Edge' is slightly broader and more natural
    in modern English, while preserving the traditional sense.
- source_word: בְּקֻצְרֶךָ
  chosen: when you reap
  alternatives:
  - in your reaping
  lexicon: HALOT
  rationale: The repeated infinitive construct reinforces the circumstance of harvesting.
    Rendering it again as 'when you reap' preserves the Hebrew repetition without
    awkwardness.
- source_word: וְלֶקֶט קְצִירְךָ
  chosen: the gleanings of your harvest
  alternatives:
  - what falls from your harvest
  - the leftover stalks of your harvest
  lexicon: HALOT
  rationale: לקט refers to what is picked up or gathered after the main harvest, especially
    scattered remnants. 'Gleanings' is the standard and precise legal-agricultural
    term in English.
- source_word: לֹא תְלַקֵּט
  chosen: you shall not gather
  alternatives:
  - you shall not glean
  - you shall not pick up
  lexicon: HALOT
  rationale: The verb לקט means gather/pick up gleanings. 'You shall not gather' avoids
    the potentially confusing English in which 'glean' can sound positive, while the
    object 'gleanings' clarifies the sense.
- source_word: לֶעָנִי
  chosen: for the poor
  alternatives:
  - for the needy
  lexicon: HALOT
  rationale: עני denotes one who is poor, afflicted, or economically vulnerable. 'The
    poor' is the most direct fit in this social-law context.
- source_word: וְלַגֵּר
  chosen: for the sojourner
  alternatives:
  - for the resident foreigner
  - for the stranger
  lexicon: HALOT
  rationale: גר refers to a resident alien/sojourner living among Israel. 'Sojourner'
    preserves the covenantal-legal nuance better than the vaguer 'stranger,' while
    remaining readable.
- source_word: תַּעֲזֹב אֹתָם
  chosen: you shall leave them
  alternatives:
  - you shall abandon them
  - you shall leave them behind
  lexicon: HALOT
  rationale: עזב here means leave behind for others rather than forsake in an emotional
    sense. 'You shall leave them' is concise and contextually clear.
- source_word: אֲנִי יְהוָה אֱלֹהֵיכֶם
  chosen: I am the LORD your God
  alternatives:
  - I am Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The covenant formula is
    standard and should remain recognizable and weighty.
