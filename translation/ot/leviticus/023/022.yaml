theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering גֵּר in Israel's covenant law
  chosen_reading: sojourner
  alternative_readings:
  - resident foreigner
  - stranger
  rationale: The term denotes a non-native person residing within the land and protected
    by Israel's law. 'Sojourner' preserves the social and covenantal nuance without
    importing modern immigration categories.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
