id: LEV.23.20
reference: Leviticus 23:20
source:
  edition: WLC
  text: וְ/הֵנִ֣יף הַ/כֹּהֵ֣ן אֹתָ֡/ם עַל֩ לֶ֨חֶם הַ/בִּכּוּרִ֤ים תְּנוּפָה֙ לִ/פְנֵ֣י יְהוָ֔ה עַל שְׁנֵ֖י כְּבָשִׂ֑ים קֹ֛דֶשׁ יִהְי֥וּ לַ/יהוָ֖ה לַ/כֹּהֵֽן׀־׃
translation:
  text: The priest shall wave them with the bread of the firstfruits as a wave offering before Yahweh, with the two lambs. They shall be holy to Yahweh for the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the bread of the firstfruits' and 'over the two lambs'; the Hebrew preposition can be rendered more literally, but here likely indicates associated ritual presentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנִיף
  chosen: shall wave
  alternatives:
  - shall present as a wave offering
  - shall elevate
  lexicon: HALOT
  rationale: Hiphil of נוּף in sacrificial context refers to the ritual act of waving/presenting before God. 'Shall wave' is the standard and clearest English rendering in Levitical cultic instructions.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Direct object pronoun refers back to the items just prescribed in the preceding context, especially the bread and accompanying lambs. 'Them' preserves the Hebrew anaphoric reference without over-specifying in the verse itself.
- source_word: עַל לֶחֶם הַבִּכּוּרִים
  chosen: with the bread of the firstfruits
  alternatives:
  - over the bread of the firstfruits
  - upon the bread of the firstfruits
  lexicon: HALOT
  rationale: The preposition עַל can be spatially 'upon/over,' but in this ritual context English 'with' best communicates joint presentation of the items without implying physical placement that may be too specific.
- source_word: לֶחֶם הַבִּכּוּרִים
  chosen: the bread of the firstfruits
  alternatives:
  - the firstfruits bread
  - the bread of firstfruits
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the genitival relationship and links the bread to the firstfruits offering of the feast.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - for a wave offering
  - a presentation offering
  lexicon: HALOT
  rationale: Technical sacrificial term for an offering ritually waved before YHWH. 'Wave offering' is established and accurate cultic English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for cultic action performed in God's presence. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: עַל שְׁנֵי כְּבָשִׂים
  chosen: with the two lambs
  alternatives:
  - over the two lambs
  - upon the two lambs
  lexicon: HALOT
  rationale: As with the earlier עַל, 'with' best expresses associated ritual presentation in idiomatic English. 'Lambs' fits כְּבָשִׂים in sacrificial context.
- source_word: קֹדֶשׁ יִהְיוּ
  chosen: They shall be holy
  alternatives:
  - They shall be holy things
  - They shall be consecrated
  lexicon: HALOT
  rationale: 'Predicate noun plus היה expresses status: the offerings belong in a holy category. ''They shall be holy'' is concise and faithful.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: Marks dedication/belonging to YHWH. 'To the LORD' preserves the concise Hebrew formulation.
- source_word: לַכֹּהֵן
  chosen: for the priest
  alternatives:
  - belonging to the priest
  - for the use of the priest
  lexicon: HALOT
  rationale: Indicates priestly entitlement to the holy portions after dedication to YHWH. 'For the priest' is idiomatic and preserves the legal force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine excerpt's default rendering for the divine name.
