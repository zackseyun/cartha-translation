theological_decisions:
- issue: Meaning of the Day of Atonement command to 'afflict/humble' oneself
  chosen_reading: Render the idiom as 'humble himself' in the main text.
  alternative_readings:
  - afflict himself
  - deny himself
  rationale: The Hebrew idiom in Leviticus 16:29; 23:27, 29, 32 refers to self-affliction
    associated with penitence and fasting. 'Humble himself' communicates the covenantal
    and penitential force in clear modern English while avoiding a misleadingly physical-only
    sense. Because 'afflict himself' is a significant formal alternative, it is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nature of the penalty 'cut off'
  chosen_reading: Retain the traditional legal formula 'shall be cut off' without
    defining whether the sanction is death, expulsion, or divine judgment.
  alternative_readings:
  - shall be excluded
  - shall be removed
  rationale: The Hebrew does not specify the exact mechanism here, and interpreters
    differ on whether 'cut off' denotes human execution, childlessness, expulsion,
    or direct divine judgment. Preserving the formula maintains the text's theological
    tension rather than resolving it beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §3
