id: LEV.23.29
reference: Leviticus 23:29
source:
  edition: WLC
  text: כִּ֤י כָל הַ/נֶּ֨פֶשׁ֙ אֲשֶׁ֣ר לֹֽא תְעֻנֶּ֔ה בְּ/עֶ֖צֶם הַ/יּ֣וֹם הַ/זֶּ֑ה
    וְ/נִכְרְתָ֖ה מֵֽ/עַמֶּֽי/הָ־־׃
translation:
  text: For every person who does not humble himself on this very day shall be cut
    off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not afflict himself.' The Hebrew idiom refers to self-denial or
      self-humbling, traditionally associated with fasting.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding command; 'For'
    fits the legal-explanatory flow in English.
- source_word: כָל הַנֶּפֶשׁ
  chosen: every person
  alternatives:
  - every soul
  - every individual
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to a person/life rather than the immaterial 'soul'
    as a technical term. 'Every person' is natural English and avoids importing later
    anthropological distinctions.
- source_word: אֲשֶׁר לֹא תְעֻנֶּה
  chosen: who does not humble himself
  alternatives:
  - who does not afflict himself
  - who does not practice self-denial
  lexicon: HALOT
  rationale: The passive/reflexive sense of ענה in this Day of Atonement context refers
    to self-affliction, traditionally expressed through fasting and self-denial. 'Humble
    himself' is idiomatic, readable, and captures the covenantal posture without over-specifying
    the practice. The more formal alternative 'afflict himself' is preserved in a
    footnote.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on this very day
  alternatives:
  - on this same day
  - on that very day
  lexicon: HALOT
  rationale: עֶצֶם in this idiom intensifies the temporal expression. 'This very day'
    preserves the emphasis and immediacy.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be removed
  - shall be excluded
  lexicon: HALOT
  rationale: The Niphal of כרת in covenant-law contexts is conventionally and accurately
    rendered 'be cut off.' This preserves the legal and theological weight of the
    sanction without prematurely specifying its mechanism.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from her people
  - from among his people
  lexicon: HALOT
  rationale: The suffix is grammatically feminine because it agrees with נֶפֶשׁ, a
    feminine noun, but the referent is generic. Per the gender-accurate policy, English
    should reflect the representative/generic sense rather than the grammatical gender
    alone. 'His people' is the most natural singular-generic rendering in this legal
    context.
