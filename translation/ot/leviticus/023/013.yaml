id: LEV.23.13
reference: Leviticus 23:13
source:
  edition: WLC
  text: וּ/מִנְחָת/וֹ֩ שְׁנֵ֨י עֶשְׂרֹנִ֜ים סֹ֣לֶת בְּלוּלָ֥ה בַ/שֶּׁ֛מֶן אִשֶּׁ֥ה לַ/יהוָ֖ה רֵ֣יחַ נִיחֹ֑חַ וְ/נִסְכֹּ֥/ה יַ֖יִן רְבִיעִ֥ת הַ/הִֽין׃
translation:
  text: Its grain offering shall be two-tenths of an ephah of fine flour mixed with oil, a food offering to Yahweh, a pleasing aroma; and its drink offering shall be wine, a fourth of a hin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנְחָתוֹ
  chosen: Its grain offering
  alternatives:
  - and its offering
  - and its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes a grain offering rather than a generic gift. The 3ms suffix refers back to the previously mentioned lamb, hence 'its.'
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: two-tenths of an ephah
  alternatives:
  - two tenth-parts
  - two omers
  lexicon: HALOT
  rationale: The expression literally means 'two tenths,' with עִשָּׂרוֹן functioning as a tenth-measure, conventionally understood as a tenth of an ephah in priestly legislation. Rendering the implied measure clarifies the idiom for English readers without over-paraphrasing.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard cultic term for refined flour used in offerings; 'fine flour' is the clearest established English equivalent.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates the flour is combined with oil. 'Mixed' is natural modern English while preserving the ritual sense.
- source_word: אִשֶּׁה לַיהוָה
  chosen: a food offering to the LORD
  alternatives:
  - an offering by fire to the LORD
  - a fire offering to the LORD
  lexicon: HALOT
  rationale: אִשֶּׁה is the technical term for an offering presented by fire. 'Food offering' is a common and understandable rendering in Leviticus, though 'offering by fire' is more formal. Because the term can be rendered either way, the alternative is preserved in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial phrase denotes acceptability before God. 'Pleasing aroma' is idiomatic modern English that preserves the cultic metaphor without archaic wording.
- source_word: וְנִסְכֹּה
  chosen: and its drink offering shall be
  alternatives:
  - and its libation shall be
  - and its poured offering shall be
  lexicon: HALOT
  rationale: נֶסֶךְ refers to the accompanying liquid offering. 'Drink offering' is the standard transparent English equivalent; the suffix again refers back to the sacrificial animal.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: רְבִיעִת הַהִין
  chosen: a fourth of a hin
  alternatives:
  - a quarter hin
  lexicon: HALOT
  rationale: The Hebrew gives a fractional quantity of the standard liquid measure hin. Retaining 'hin' preserves the ancient unit while translating the fraction naturally.
