id: LEV.23.30
reference: Leviticus 23:30
source:
  edition: WLC
  text: וְ/כָל הַ/נֶּ֗פֶשׁ אֲשֶׁ֤ר תַּעֲשֶׂה֙ כָּל מְלָאכָ֔ה בְּ/עֶ֖צֶם הַ/יּ֣וֹם
    הַ/זֶּ֑ה וְ/הַֽאֲבַדְתִּ֛י אֶת הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מִ/קֶּ֥רֶב עַמָּֽ/הּ־־־׃
translation:
  text: And every person who does any work on this very day—I will destroy that person
    from among his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will cut off that person from among his people.' The Hebrew verb
      here is 'destroy/cause to perish,' not the usual verb for 'cut off,' though
      the sense of removal in judgment is closely related.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  lexicon: HALOT
  rationale: In legal/covenantal prose נֶפֶשׁ commonly refers to an individual person
    rather than the immaterial soul. 'Person' is natural English and fits both occurrences
    in the verse.
- source_word: תַּעֲשֶׂה
  chosen: does
  alternatives:
  - makes
  - performs
  lexicon: HALOT
  rationale: עשה is a broad verb meaning 'do/make.' With מְלָאכָה ('work'), 'does'
    is the most idiomatic English collocation.
- source_word: כָּל מְלָאכָה
  chosen: any work
  alternatives:
  - any labor
  - any occupation
  lexicon: HALOT
  rationale: The phrase denotes prohibited labor/work. 'Any work' preserves the comprehensive
    force of כָּל in idiomatic English.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on this very day
  alternatives:
  - on this same day
  - on the very day
  lexicon: HALOT
  rationale: The idiom עֶצֶם הַיּוֹם intensifies the temporal reference. 'This very
    day' captures the emphatic force better than a flat 'this day.'
- source_word: וְהַאֲבַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will cut off
  - I will cause to perish
  lexicon: HALOT
  rationale: The Hiphil of אבד means to cause to perish/destroy. 'Destroy' reflects
    the verb's force directly. 'Cut off' is a possible contextual rendering in covenantal
    judgment contexts, but here the source verb is not כרת, so a more literal gloss
    is preferable.
- source_word: מִקֶּרֶב עַמָּהּ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  - from among her people
  lexicon: HALOT
  rationale: The phrase is a standard exclusion/judgment formula meaning removal from
    the community. Although the pronominal suffix is grammatically feminine to agree
    with נֶפֶשׁ, English naturally uses common-gender 'his people' in this idiom;
    this is gender-accurate to sense rather than mechanically reproducing grammatical
    gender.
