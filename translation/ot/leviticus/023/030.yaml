theological_decisions:
- issue: Nature of the penalty expressed by וְהַאֲבַדְתִּי ... מִקֶּרֶב עַמָּהּ
  chosen_reading: I will destroy that person from among his people
  alternative_readings:
  - I will cut off that person from among his people
  rationale: The Hebrew uses אבד in the Hiphil ('destroy/cause to perish'), not the
    more stereotypical covenant formula with כרת ('cut off'). To avoid importing a
    technical penalty term not present in the text, the main rendering keeps 'destroy,'
    while preserving 'cut off' as a contextual alternative in a footnote because readers
    may expect the idiom of communal excision.
  doctrine_reference: Translation philosophy §1, §3, §5
