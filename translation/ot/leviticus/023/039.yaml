id: LEV.23.39
reference: Leviticus 23:39
source:
  edition: WLC
  text: אַ֡ךְ בַּ/חֲמִשָּׁה֩ עָשָׂ֨ר י֜וֹם לַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֗י בְּ/אָסְפְּ/כֶם֙ אֶת תְּבוּאַ֣ת הָ/אָ֔רֶץ תָּחֹ֥גּוּ אֶת חַג יְהוָ֖ה שִׁבְעַ֣ת יָמִ֑ים בַּ/יּ֤וֹם הָֽ/רִאשׁוֹן֙ שַׁבָּת֔וֹן וּ/בַ/יּ֥וֹם הַ/שְּׁמִינִ֖י שַׁבָּתֽוֹן־־־׃
translation:
  text: However, on the fifteenth day of the seventh month, when you have gathered in the produce of the land, you shall celebrate the feast of Yahweh for seven days. On the first day there shall be a solemn rest, and on the eighth day a solemn rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'festival of the LORD.' The Hebrew word can denote a festal celebration, often a pilgrimage feast.
    reason: lexical_alternative
  - marker: b
    text: Or 'a sabbath-rest.' The Hebrew term denotes a special day of rest associated with sacred observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - Surely
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: אַךְ here marks a transition or qualification from the preceding instructions, not simple emphasis alone. 'However' captures the discourse shift into the specific timing and observance of this feast.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  chosen: on the fifteenth day
  alternatives:
  - on day fifteen
  - on the fifteenth
  lexicon: HALOT
  rationale: Standard idiomatic English for the Hebrew date expression; 'on the fifteenth day' preserves the calendrical specificity.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: of the seventh month
  alternatives:
  - in the seventh month
  lexicon: HALOT
  rationale: Attached to the date phrase, 'of the seventh month' is the most natural English equivalent while preserving the Hebrew construct sense.
- source_word: בְּאָסְפְּכֶם
  chosen: when you have gathered in
  alternatives:
  - when you gather in
  - at your gathering in
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance. 'When you have gathered in' conveys the temporal sense and the completed harvest ingathering context.
- source_word: תְּבוּאַת הָאָרֶץ
  chosen: the produce of the land
  alternatives:
  - the yield of the land
  - the harvest of the land
  lexicon: HALOT
  rationale: תְּבוּאָה refers broadly to produce/yield. 'Produce of the land' is accurate and broad enough not to over-specify as grain alone, while fitting the harvest context.
- source_word: תָּחֹגּוּ
  chosen: you shall celebrate
  alternatives:
  - you shall keep a feast
  - you shall hold a festival
  lexicon: HALOT
  rationale: From חגג, the verb denotes celebrating/keeping a pilgrimage feast. 'Celebrate' is readable modern English; the feast object immediately following preserves the festival sense.
- source_word: חַג יְהוָה
  chosen: the feast of the LORD
  alternatives:
  - the festival of the LORD
  - the pilgrimage feast of the LORD
  lexicon: HALOT
  rationale: חַג is a festal observance, often pilgrimage-related. 'Feast' is traditional yet still clear. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom prefers 'for seven days' with the verb 'celebrate,' making the duration explicit.
- source_word: שַׁבָּתוֹן
  chosen: a solemn rest
  alternatives:
  - a sabbath-rest
  - a complete rest
  - a day of rest
  lexicon: HALOT
  rationale: שַׁבָּתוֹן denotes a special sabbath-like cessation from ordinary work. 'A solemn rest' preserves both the rest aspect and the sacred/festal character without implying the weekly Sabbath specifically.
- source_word: וּבַיּוֹם הַשְּׁמִינִי
  chosen: and on the eighth day
  alternatives:
  - and on day eight
  lexicon: HALOT
  rationale: Straightforward temporal phrase. Retained explicitly because the verse distinguishes the first and eighth days as rest days around a seven-day feast.
