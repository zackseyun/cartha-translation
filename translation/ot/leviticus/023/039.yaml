theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of שַׁבָּתוֹן in festal legislation
  chosen_reading: a solemn rest
  alternative_readings:
  - a sabbath-rest
  - a complete rest
  rationale: The term indicates a sacred cessation associated with the feast, but translating it simply as 'Sabbath' could suggest the weekly Sabbath rather than a festival rest day. 'Solemn rest' preserves the cultic significance without over-identifying it.
