theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God in a festal command. Following
    the project's doctrine, the Tetragrammaton is rendered 'the LORD' in continuity
    with Jewish reverence practice and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of שַׁבָּתוֹן in festal legislation
  chosen_reading: a solemn rest
  alternative_readings:
  - a sabbath-rest
  - a complete rest
  rationale: The term indicates a sacred cessation associated with the feast, but
    translating it simply as 'Sabbath' could suggest the weekly Sabbath rather than
    a festival rest day. 'Solemn rest' preserves the cultic significance without over-identifying
    it.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern English,
    not archaic or academic)
