id: LEV.23.25
reference: Leviticus 23:25
source:
  edition: WLC
  text: כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֣א תַעֲשׂ֑וּ וְ/הִקְרַבְתֶּ֥ם אִשֶּׁ֖ה לַ/יהוָֽה־׃ס
translation:
  text: You shall do no laborious work, and you shall present a food offering to the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: 'no'
  alternatives:
  - any
  - all
  lexicon: HALOT
  rationale: In the prohibition כָּל ... לֹא תַעֲשׂוּ, English idiom is best expressed
    as 'no ...' rather than a wooden 'all ... not.' This preserves the totalizing
    force of כָּל in natural English.
- source_word: מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - occupational work
  - servile work
  - regular work
  lexicon: HALOT
  rationale: The construct phrase denotes work of ordinary labor/service, not absolutely
    every action. 'Laborious work' captures the sense of prohibited ordinary labor
    on a sacred day without using the archaic 'servile work.' 'Regular work' is possible
    but slightly more interpretive; 'occupational work' is narrower than the Hebrew.
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall do no
  alternatives:
  - You shall not do
  - Do not do
  lexicon: HALOT
  rationale: A future-style prohibition with second person plural is well represented
    by 'You shall do no...' in legal/covenantal English. This preserves the directive
    force and number.
- source_word: וְהִקְרַבְתֶּם
  chosen: and you shall present
  alternatives:
  - and you shall bring near
  - and you shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to bring/present as an
    offering. 'Present' is clear modern English and avoids redundancy with the following
    sacrificial noun, while still reflecting cultic action.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering made by fire,' the term in
    priestly usage refers to an offering presented by fire and is commonly rendered
    in modern translations as 'food offering.' This is more natural English and fits
    optimal equivalence. Because 'offering by fire' remains a viable traditional rendering,
    it is preserved in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated,
    following established covenant-name convention.
