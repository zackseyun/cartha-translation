theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default rendering
    for YHWH, preserving Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term אִשֶּׁה
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: This is a lexical/cultic decision rather than a doctrinal dispute, but
    it affects how readers understand sacrificial language. 'Food offering' communicates
    the priestly sacrificial category in accessible English while preserving the cultic
    sense; the traditional alternative is retained in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; readable
    modern English'
