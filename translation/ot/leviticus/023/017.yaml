theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term תְּנוּפָה
  chosen_reading: wave offering
  alternative_readings:
  - offering presented by elevation/waving
  rationale: The verse concerns a specific ritual action in Israel's sacrificial system.
    'Wave offering' preserves the technical cultic category without importing further
    theological interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: consistency of key terms,
    or documented exception'
