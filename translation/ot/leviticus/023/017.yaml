id: LEV.23.17
reference: Leviticus 23:17
source:
  edition: WLC
  text: מִ/מּוֹשְׁבֹ֨תֵי/כֶ֜ם תָּבִ֣יאּוּ לֶ֣חֶם תְּנוּפָ֗ה שְׁ֚תַּיִם שְׁנֵ֣י עֶשְׂרֹנִ֔ים
    סֹ֣לֶת תִּהְיֶ֔ינָה חָמֵ֖ץ תֵּאָפֶ֑ינָה בִּכּוּרִ֖ים לַֽ/יהוָֽה׀׃
translation:
  text: From your dwellings you shall bring two loaves of bread for a wave offering;
    they shall be of two-tenths of an ephah of fine flour, baked with leaven, as firstfruits
    to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'two-tenths'; in priestly measurement this means two-tenths of an
      ephah.
    reason: cultural_note
  - marker: b
    text: Or 'baked as leavened bread.' The Hebrew explicitly notes that these firstfruits
      loaves are made with leaven.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמּוֹשְׁבֹתֵיכֶם
  chosen: From your dwellings
  alternatives:
  - From your settlements
  - From where you live
  lexicon: HALOT
  rationale: מוֹשָׁב commonly denotes dwelling place or place of settlement. 'From
    your dwellings' is a natural, fairly formal rendering that preserves the source
    image and likely indicates the offering is brought from the people's inhabited
    places.
- source_word: תָּבִיאוּ
  chosen: you shall bring
  alternatives:
  - you are to bring
  - you must bring
  lexicon: HALOT
  rationale: 'Hiphil of בוא here is directive/cultic: the people are commanded to
    bring the offering. ''You shall bring'' fits legal-instruction style in Leviticus
    without overstating modality.'
- source_word: לֶחֶם תְּנוּפָה
  chosen: loaves of bread for a wave offering
  alternatives:
  - bread of waving
  - bread as a wave offering
  lexicon: HALOT
  rationale: לֶחֶם is singular in form but here specified by שְׁתַּיִם ('two'), so
    English idiom requires plural 'loaves of bread.' תְּנוּפָה is the standard cultic
    term for an offering presented by waving; 'wave offering' preserves established
    sacrificial terminology and the ritual sense.
- source_word: שְׁתַּיִם
  chosen: two
  lexicon: HALOT
  rationale: Direct numeral modifying the bread/loaves; rendered straightforwardly.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: of two-tenths of an ephah
  alternatives:
  - of two tenth-measures
  - of two omers' worth
  lexicon: HALOT
  rationale: עִשָּׂרוֹן is a tenth-part dry measure, conventionally understood as
    a tenth of an ephah in priestly texts. Supplying 'of an ephah' makes the measure
    intelligible in English while reflecting the standard Hebrew metrological sense.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in grain offerings; 'fine
    flour' is both accurate and conventional.
- source_word: תִּהְיֶינָה
  chosen: they shall be
  alternatives:
  - let them be
  lexicon: HALOT
  rationale: The verb links the loaves to their specified composition. 'They shall
    be' fits the prescriptive style.
- source_word: חָמֵץ תֵּאָפֶינָה
  chosen: baked with leaven
  alternatives:
  - they shall be baked leavened
  - baked as leavened bread
  lexicon: HALOT
  rationale: חָמֵץ indicates leavened/fermented status, and Niphal of אפה indicates
    being baked. 'Baked with leaven' is clear modern English and preserves the notable
    fact that these loaves are leavened.
- source_word: בִּכּוּרִים
  chosen: as firstfruits
  alternatives:
  - firstfruits
  - as an offering of firstfruits
  lexicon: HALOT
  rationale: The term denotes first produce offered to God. 'As firstfruits' expresses
    the function/predicate relation of the loaves in context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל marks dedication/direction
    of the offering; 'to the LORD' is a natural rendering.
