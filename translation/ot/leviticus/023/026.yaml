id: LEV.23.26
reference: Leviticus 23:26
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive verb from דבר introduces a new narrative speech event.
    'Spoke' is the standard and slightly more formal rendering in this formulaic introduction,
    while 'said' is possible but less precise given the following לֵאמֹר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to reflect established reverential practice and the Septuagintal pattern, rather
    than transliterating the name in the main text.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of divine speech. 'To' is the
    natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name משה, in keeping
    with the policy to transliterate names rather than translate them.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech introducer
    following 'spoke.' 'Saying' preserves the Hebrew structure naturally in English
    and signals that the following verse contains the content of the speech.
