theological_decisions:
- issue: Interpretation of שַׁבָּת / שַׁבָּתוֹת in calendrical instruction
  chosen_reading: Retain 'Sabbath' / 'Sabbaths' in the main text rather than resolving
    to 'week(s).'
  alternative_readings:
  - Render as 'week' or 'weeks' to reflect the counted seven-day periods
  rationale: The Hebrew wording explicitly uses the Sabbath term, and the translation
    philosophy prefers preserving textual tension rather than resolving interpretive
    debates in the main text. Since this verse has long-standing calendrical disputes
    about what day begins the count and whether 'Sabbaths' functions idiomatically
    for 'weeks,' the main text stays close to the source while a footnote preserves
    the common alternative.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it; §5, Consistency of key terms, or documented exception.
