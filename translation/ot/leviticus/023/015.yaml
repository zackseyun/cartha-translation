id: LEV.23.15
reference: Leviticus 23:15
source:
  edition: WLC
  text: וּ/סְפַרְתֶּ֤ם לָ/כֶם֙ מִ/מָּחֳרַ֣ת הַ/שַּׁבָּ֔ת מִ/יּוֹם֙ הֲבִ֣יאֲ/כֶ֔ם אֶת
    עֹ֖מֶר הַ/תְּנוּפָ֑ה שֶׁ֥בַע שַׁבָּת֖וֹת תְּמִימֹ֥ת תִּהְיֶֽינָה־׃
translation:
  text: 'And you shall count for yourselves from the day after the Sabbath, from the
    day you bring the sheaf of the wave offering: seven complete Sabbaths shall there
    be.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven complete weeks.' The Hebrew literally says 'seven complete Sabbaths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּסְפַרְתֶּם
  chosen: And you shall count
  alternatives:
  - And you must count
  - And count
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions as an injunctive/future command. 'You shall count' is natural legal
    English and preserves the directive force without over-paraphrase.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun adds reflexive/personal force to the counting. 'For
    yourselves' preserves that nuance better than the flatter 'for you.'
- source_word: מִמָּחֳרַת הַשַּׁבָּת
  chosen: from the day after the Sabbath
  alternatives:
  - from the morrow after the Sabbath
  - from the day after the rest day
  lexicon: HALOT
  rationale: מָחֳרַת means 'the next day' or 'the morrow after.' 'The day after the
    Sabbath' is clear modern English and keeps the temporal relation explicit. 'Sabbath'
    is retained rather than generalized to 'rest day' because the Hebrew term is the
    standard cultic term.
- source_word: מִיּוֹם הֲבִיאֲכֶם
  chosen: from the day you bring
  alternatives:
  - from the day of your bringing
  - from the day when you bring
  lexicon: HALOT
  rationale: The preposition plus יוֹם with infinitive/verb phrase marks the starting
    point. 'From the day you bring' is idiomatic and sufficiently formal.
- source_word: עֹמֶר
  chosen: the sheaf
  alternatives:
  - the omer
  - the measure
  lexicon: HALOT
  rationale: In this context עֹמֶר refers concretely to the sheaf presented, not merely
    a dry measure. 'Sheaf' communicates the ritual object to modern readers. The transliteration
    'omer' would be less transparent here.
- source_word: הַתְּנוּפָה
  chosen: of the wave offering
  alternatives:
  - of the presentation offering
  lexicon: HALOT
  rationale: תְּנוּפָה is the standard term for an offering ritually waved/presented
    before YHWH. 'Wave offering' is the established and sufficiently transparent rendering;
    it preserves the cultic specificity better than a generalized 'presentation offering.'
- source_word: שֶׁבַע שַׁבָּתוֹת
  chosen: seven complete Sabbaths
  alternatives:
  - seven full weeks
  - seven Sabbaths
  lexicon: HALOT
  rationale: The Hebrew literally says 'seven Sabbaths.' Because the verse itself
    uses שַׁבָּתוֹת rather than an ordinary word for weeks, the main text preserves
    'Sabbaths.' 'Complete' from תְּמִימֹת clarifies that full cycles are intended.
    'Weeks' is a common interpretive rendering but is less formally aligned to the
    source, so it is preserved in a footnote.
- source_word: תְּמִימֹת
  chosen: complete
  alternatives:
  - full
  - whole
  - without defect
  lexicon: HALOT
  rationale: In temporal counting language, תָּמִים conveys completeness or wholeness
    rather than moral perfection. 'Complete' is concise and idiomatic in English.
- source_word: תִּהְיֶינָה
  chosen: shall there be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: The clause is existential/predicative. 'Shall there be' slightly better
    reflects the Hebrew verbal ending and clause structure, though in English it remains
    natural.
