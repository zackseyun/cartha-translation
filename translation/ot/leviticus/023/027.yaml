theological_decisions:
- issue: Traditional festival title in English versus Hebrew plural form
  chosen_reading: the Day of Atonements
  alternative_readings:
  - the Day of Atonement
  rationale: The Hebrew text has the plural כִּפֻּרִים. To prioritize the source text over translation tradition, the main text preserves the plural, while the familiar singular title is retained in a footnote for reader orientation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Meaning of self-affliction on this day
  chosen_reading: you shall afflict yourselves
  alternative_readings:
  - you shall humble yourselves
  - you shall deny yourselves
  rationale: The Hebrew idiom should not be narrowed to fasting alone or softened to a purely inward attitude. 'Afflict yourselves' preserves the ritual and penitential breadth of the command.
  doctrine_reference: Translation philosophy §1, §3
