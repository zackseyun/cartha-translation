id: LEV.23.27
reference: Leviticus 23:27
source:
  edition: WLC
  text: אַ֡ךְ בֶּ/עָשׂ֣וֹר לַ/חֹדֶשׁ֩ הַ/שְּׁבִיעִ֨י הַ/זֶּ֜ה י֧וֹם הַ/כִּפֻּרִ֣ים ה֗וּא מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה לָ/כֶ֔ם וְ/עִנִּיתֶ֖ם אֶת נַפְשֹׁתֵי/כֶ֑ם וְ/הִקְרַבְתֶּ֥ם אִשֶּׁ֖ה לַ/יהוָֽה־־׃
translation:
  text: But on the tenth day of this seventh month, it is the Day of Atonement. It shall be a holy convocation for you, and you shall afflict yourselves and present a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'the Day of Atonement.' The Hebrew reads literally 'the Day of Atonements.'
    reason: alternative_reading
  - marker: b
    text: Or 'you shall humble yourselves' or 'you shall deny yourselves.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Nevertheless
  - Only
  lexicon: HALOT
  rationale: Introduces a restrictive/emphatic transition from the preceding festival instructions. 'But' captures the discourse shift naturally in English without overtranslating the particle.
- source_word: בֶּעָשׂוֹר
  chosen: on the tenth day
  alternatives:
  - on the tenth
  - on the tenth of
  lexicon: HALOT
  rationale: The idiom with the preposition and ordinal/numeral refers to the tenth day of the month. Supplying 'day' makes the Hebrew temporal expression clear in English.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי הַזֶּה
  chosen: of this seventh month
  alternatives:
  - of the seventh month, this one
  - in this seventh month
  lexicon: HALOT
  rationale: Rendered as a natural English genitival time expression while preserving the demonstrative 'this.'
- source_word: יוֹם הַכִּפֻּרִים
  chosen: the Day of Atonements
  alternatives:
  - the Day of Atonement
  - the day of atonement
  lexicon: HALOT
  rationale: The Hebrew noun is morphologically plural ('atonements'). Retaining the plural better reflects the source text, even though English tradition commonly uses the singular title 'Day of Atonement.' The capitalization reflects its festal title function.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: A standard cultic expression for an officially summoned sacred gathering. 'Holy convocation' preserves the formal register and likely technical sense better than the more generic 'assembly.'
- source_word: וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  chosen: you shall afflict yourselves
  alternatives:
  - you shall humble yourselves
  - you shall deny yourselves
  lexicon: HALOT
  rationale: The piel of ענה with 'souls/lives/persons' is the established idiom for self-denial associated with this day. 'Afflict yourselves' is the most textually transparent rendering; alternatives are interpretive and can be preserved in a footnote.
- source_word: נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  - your lives
  lexicon: HALOT
  rationale: In this idiom, נֶפֶשׁ refers to the persons themselves, not an abstract immaterial component. 'Yourselves' communicates the reflexive force in idiomatic English.
- source_word: וְהִקְרַבְתֶּם
  chosen: present
  alternatives:
  - bring near
  - offer
  lexicon: HALOT
  rationale: The hiphil of קרב in sacrificial contexts means to present/bring as an offering. 'Present' is clear and suitably formal.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: While traditionally rendered 'offering made by fire,' the term denotes an offering turned into smoke by fire, often functioning as a food offering to God in priestly idiom. 'Food offering' is more accessible modern English, while the traditional alternative is worth preserving in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יהוה is 'the LORD,' following established reverential convention and the pattern reflected in the Septuagint.
