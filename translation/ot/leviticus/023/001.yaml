id: LEV.23.1
reference: Leviticus 23:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive prefixed verb from דבר introduces narrative sequence
    and direct divine speech. 'Spoke' is the standard and slightly more formal rendering
    in this formulaic introduction, while 'said' is possible but less distinct from
    the following infinitive 'saying.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated forms, following established reverential convention
    and the stated default for this contested term.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural
    modern English equivalent; 'unto' is unnecessarily archaic.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech-introduction
    formula after 'spoke.' 'Saying' preserves the Hebrew structure cleanly in English
    and signals that the content follows in the next verse.
