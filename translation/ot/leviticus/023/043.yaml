theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural in a representative/corporate
    sense. Following the gender-accurate policy, the masculine form is preserved rather
    than neutralized, while more idiomatic alternatives are acknowledged.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
