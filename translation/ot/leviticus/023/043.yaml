id: LEV.23.43
reference: Leviticus 23:43
source:
  edition: WLC
  text: לְמַעַן֮ יֵדְע֣וּ דֹרֹֽתֵי/כֶם֒ כִּ֣י בַ/סֻּכּ֗וֹת הוֹשַׁ֨בְתִּי֙ אֶת בְּנֵ֣י
    יִשְׂרָאֵ֔ל בְּ/הוֹצִיאִ֥/י אוֹתָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: so that your generations may know that I made the sons of Israel dwell in
    booths when I brought them out from the land of Egypt. I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in shelters.' The Hebrew sukkot refers to temporary booths or shelters;
      traditional English also uses 'tabernacles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' or 'the people of Israel.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: יֵדְעוּ
  chosen: may know
  alternatives:
  - will know
  - might know
  lexicon: HALOT
  rationale: Imperfect after לְמַעַן expresses intended result/purpose; 'may know'
    best captures this in English.
- source_word: דֹרֹתֵיכֶם
  chosen: your generations
  alternatives:
  - your descendants
  lexicon: HALOT
  rationale: A formally close rendering that preserves the covenantal, multi-generational
    sense better than the more interpretive 'descendants'.
- source_word: כִּי
  chosen: that
  alternatives:
  - for that
  - because
  lexicon: HALOT
  rationale: Here it introduces the content of what the generations are to know, so
    'that' is the most straightforward English equivalent.
- source_word: בַסֻּכּוֹת
  chosen: in booths
  alternatives:
  - in shelters
  - in tabernacles
  lexicon: HALOT
  rationale: סֻכּוֹת refers to temporary shelters/booths used in the festival context.
    'Booths' preserves the lexical link to the Feast of Booths and is standard, while
    'tabernacles' is traditional but less transparent in modern English.
- source_word: הוֹשַׁבְתִּי
  chosen: I made ... dwell
  alternatives:
  - I settled
  - I caused ... to live
  lexicon: HALOT
  rationale: Hiphil of ישׁב is causative. 'I made ... dwell' preserves the causative
    nuance more clearly than the flatter 'I settled'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: This is literally 'sons of Israel.' Per the gender-accurate philosophy,
    the masculine form is retained where it represents the covenant people corporately.
    Alternatives are possible but less formally precise.
- source_word: בְּהוֹצִיאִי
  chosen: when I brought ... out
  alternatives:
  - in my bringing ... out
  - as I brought ... out
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance
    here. 'When I brought ... out' is idiomatic and accurate.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Retains the explicit noun 'land,' which is present in the Hebrew and
    carries exodus-covenant resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenant formula; no expansion needed.
