id: LEV.23.24
reference: Leviticus 23:24
source:
  edition: WLC
  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר בַּ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י בְּ/אֶחָ֣ד
    לַ/חֹ֗דֶשׁ יִהְיֶ֤ה לָ/כֶם֙ שַׁבָּת֔וֹן זִכְר֥וֹן תְּרוּעָ֖ה מִקְרָא קֹֽדֶשׁ־־׃
translation:
  text: 'Speak to the sons of Israel, saying: In the seventh month, on the first day
    of the month, there shall be for you a solemn rest, a memorial proclaimed with
    trumpet blasts, a holy convocation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a memorial of loud blasts'; the Hebrew term can refer more broadly to
      a raised signal sound, including shouting or horn/trumpet blasts.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate policy, the masculine
    familial expression is retained rather than flattened to 'people,' while still
    functioning corporately for the covenant community.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: In the seventh month
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in' fits the Hebrew preposition ב in
    calendrical usage.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Hebrew idiom literally 'on one of the month,' conventionally meaning
    the first day of the month. Expanded slightly for natural English clarity.
- source_word: יִהְיֶה לָכֶם
  chosen: there shall be for you
  alternatives:
  - it shall be for you
  - you shall have
  lexicon: HALOT
  rationale: Preserves the existential/future sense of the Hebrew without over-paraphrasing.
    'There shall be for you' is slightly formal but reflects the source structure
    well.
- source_word: שַׁבָּתוֹן
  chosen: a solemn rest
  alternatives:
  - a sabbath-rest
  - a complete rest
  lexicon: HALOT
  rationale: Distinguished from שַׁבָּת while preserving the idea of a specially observed
    cessation from ordinary work. 'Solemn rest' is idiomatic and fits festival context.
- source_word: זִכְרוֹן
  chosen: a memorial
  alternatives:
  - a remembrance
  - a commemorative observance
  lexicon: HALOT
  rationale: The noun denotes something serving as a memorial/remembrance. 'Memorial'
    is concise and natural in cultic/calendar language.
- source_word: תְּרוּעָה
  chosen: proclaimed with trumpet blasts
  alternatives:
  - of trumpet blasts
  - of shouting
  - of loud blasts
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud raised sound, including battle cry, shout,
    or trumpet blast. In this festal calendrical setting, the traditional and contextually
    likely sense is signal-blasts, commonly associated with trumpets/horns. 'Proclaimed
    with trumpet blasts' makes the relation to memorial clear in English while avoiding
    an overly wooden construct chain.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  lexicon: HALOT
  rationale: Standard cultic phrase for an assembly summoned as holy. 'Holy convocation'
    preserves the formal liturgical register and likely consistency across Torah festival
    texts.
