theological_decisions:
- issue: Nature of תְּרוּעָה in the festival designation
  chosen_reading: rendered as trumpet blasts rather than a more generic shouting/alarm
  alternative_readings:
  - shouting
  - loud acclamation
  - blast of horns
  rationale: The Hebrew term itself is broader than trumpet sound alone, but in Leviticus
    23:24's liturgical-calendar context the traditional understanding of signal blasts
    is strong and likely. To preserve transparency, the broader lexical range is noted
    in a footnote rather than collapsed without comment.
  doctrine_reference: Translation philosophy §3, §5
