id: LEV.23.37
reference: Leviticus 23:37
source:
  edition: WLC
  text: אֵ֚לֶּה מוֹעֲדֵ֣י יְהוָ֔ה אֲשֶׁר תִּקְרְא֥וּ אֹתָ֖/ם מִקְרָאֵ֣י קֹ֑דֶשׁ לְ/הַקְרִ֨יב אִשֶּׁ֜ה לַ/יהוָ֗ה עֹלָ֧ה וּ/מִנְחָ֛ה זֶ֥בַח וּ/נְסָכִ֖ים דְּבַר י֥וֹם בְּ/יוֹמֽ/וֹ־־׃
translation:
  text: 'These are the appointed times of Yahweh, which you shall proclaim as holy convocations, to present an offering by fire to Yahweh: a burnt offering and a grain offering, a sacrifice and drink offerings, each day''s matter on its day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offering by fire.' The Hebrew term refers to an offering made by fire to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'what is required for each day on that day.' The Hebrew idiom means the prescribed requirement appropriate to each specific day.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹעֲדֵי
  chosen: appointed times
  alternatives:
  - appointed feasts
  - set times
  - festivals
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time/meeting, not merely a feast. In Leviticus 23 the term covers the sacred calendar broadly, including days not centered on feasting. 'Appointed times' preserves the temporal sense while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תִּקְרְאוּ אֹתָם
  chosen: you shall proclaim
  alternatives:
  - you shall call them
  - you shall announce them
  lexicon: HALOT
  rationale: קרא with object here refers to publicly declaring/designating these days. 'Proclaim' captures the formal cultic announcement better than the more wooden 'call them.'
- source_word: מִקְרָאֵי קֹדֶשׁ
  chosen: holy convocations
  alternatives:
  - sacred assemblies
  - holy assemblies
  lexicon: HALOT
  rationale: This is a fixed cultic expression in Leviticus 23. 'Holy convocations' preserves the formal, summoned-assembly nuance of מִקְרָא while remaining recognizable in English. 'Sacred assemblies' is possible but slightly flattens the summons aspect.
- source_word: לְהַקְרִיב
  chosen: to present
  alternatives:
  - to offer
  - to bring near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer. 'Present' avoids redundancy with the following list of offerings while retaining the formal cultic sense.
- source_word: אִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: The term refers to an offering made by fire, but in contemporary English 'food offering' communicates the sacrificial category more naturally and reflects common Levitical usage. The more literal 'offering by fire' is preserved as an alternative because it highlights the means of presentation.
- source_word: עֹלָה
  chosen: burnt offering
  lexicon: HALOT
  rationale: Standard and precise rendering for the whole-burnt sacrifice.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - gift offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts מִנְחָה conventionally denotes the cereal/grain offering. 'Gift offering' is broader but less specific than the cultic usage here.
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - slaughter offering
  lexicon: HALOT
  rationale: A broad sacrificial term here paired with other offerings. 'Sacrifice' is idiomatic and sufficiently general; 'slaughter offering' is more literal but awkward in English.
- source_word: נְסָכִים
  chosen: drink offerings
  alternatives:
  - libations
  lexicon: HALOT
  rationale: '''Drink offerings'' is the clearest modern English equivalent; ''libations'' is accurate but less accessible.'
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: each day's matter on its day
  alternatives:
  - the matter of a day in its day
  - what is required for each day on that day
  - the daily portion for its day
  lexicon: HALOT
  rationale: The idiom indicates the prescribed requirement appropriate to each specific day. The chosen rendering stays relatively close to the Hebrew structure while remaining intelligible. A smoother dynamic option would be 'what is required for each day on that day,' but the present choice better preserves the compact idiom.
