id: LEV.23.10
reference: Leviticus 23:10
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם כִּֽי תָבֹ֣אוּ אֶל
    הָ/אָ֗רֶץ אֲשֶׁ֤ר אֲנִי֙ נֹתֵ֣ן לָ/כֶ֔ם וּ/קְצַרְתֶּ֖ם אֶת קְצִירָ֑/הּ וַ/הֲבֵאתֶ֥ם
    אֶת עֹ֛מֶר רֵאשִׁ֥ית קְצִירְ/כֶ֖ם אֶל הַ/כֹּהֵֽן־־־־־־׃
translation:
  text: 'Speak to the sons of Israel and say to them: When you come into the land
    that I am giving to you, and you reap its harvest, then you shall bring the sheaf
    of the firstfruits of your harvest to the priest.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Israelites.' Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the omer of the firstfruits of your harvest.' The Hebrew term can denote
      a sheaf here and is also used as a technical term 'omer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew idiom
    and the masculine plural form, in keeping with the gender-accurate policy. 'The
    Israelites' is idiomatic English but less transparent to the source wording.
- source_word: כִּי
  chosen: When
  alternatives:
  - For when
  - If/when
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance in which the command applies; 'When'
    gives the plain sense in smooth English without adding causal force.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: '''The land'' is the standard covenantal/geographical sense in this context,
    referring to the land Israel is entering. ''Country'' is possible but less biblically
    resonant.'
- source_word: נֹתֵן
  chosen: I am giving
  alternatives:
  - I give
  - I will give
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent divine action. 'I am giving'
    preserves that aspect better than a simple future, while remaining natural English.
- source_word: וּקְצַרְתֶּם אֶת־קְצִירָהּ
  chosen: and you reap its harvest
  alternatives:
  - and you harvest its crop
  - and you cut down its harvest
  lexicon: HALOT
  rationale: Uses the verbal idea 'reap' with the cognate noun 'harvest' to reflect
    the Hebrew closely. The suffix on 'its harvest' refers back to the land.
- source_word: וַהֲבֵאתֶם
  chosen: then you shall bring
  alternatives:
  - and you shall bring
  - you must bring
  lexicon: HALOT
  rationale: The prefixed conjunction advances the sequence after the prior condition;
    'then you shall bring' makes the procedural flow explicit in English.
- source_word: עֹמֶר
  chosen: the sheaf
  alternatives:
  - the omer
  - a measure
  lexicon: HALOT
  rationale: In this ritual context עֹמֶר refers to a sheaf brought before the priest,
    not merely the later technical dry measure. 'The sheaf' is the clearest contextual
    rendering; the transliteration 'omer' is preserved in a footnote-worthy alternative.
- source_word: רֵאשִׁית
  chosen: the firstfruits
  alternatives:
  - the first part
  - the beginning
  lexicon: HALOT
  rationale: In harvest and offering contexts, רֵאשִׁית commonly denotes the first
    portion offered to God. 'Firstfruits' captures both temporal priority and cultic
    significance.
- source_word: קְצִירְכֶם
  chosen: your harvest
  alternatives:
  - your crop
  lexicon: HALOT
  rationale: Maintains lexical consistency with the earlier קָצִיר language and fits
    the agricultural setting.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן in cultic legislation.
