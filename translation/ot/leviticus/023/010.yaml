theological_decisions:
- issue: Gendered covenant address
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is explicitly masculine plural in a standard covenantal address.
    Following the translation philosophy's gender-accurate principle, the main text
    preserves the form rather than neutralizing it, while alternatives remain possible
    for idiomatic English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cultic term עֹמֶר
  chosen_reading: the sheaf
  alternative_readings:
  - the omer
  rationale: The verse describes a harvested item brought to the priest, so the concrete
    agricultural sense is preferred in the main text. Because 'omer' can function
    as a technical term in this ritual context and in later tradition, the alternative
    is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
