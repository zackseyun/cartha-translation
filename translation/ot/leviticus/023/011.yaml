id: LEV.23.11
reference: Leviticus 23:11
source:
  edition: WLC
  text: וְ/הֵנִ֧יף אֶת הָ/עֹ֛מֶר לִ/פְנֵ֥י יְהוָ֖ה לִֽ/רְצֹנְ/כֶ֑ם מִֽ/מָּחֳרַת֙ הַ/שַּׁבָּ֔ת יְנִיפֶ֖/נּוּ הַ/כֹּהֵֽן־׃
translation:
  text: And he shall wave the sheaf before Yahweh for your acceptance; on the day after the Sabbath the priest shall wave it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that you may be accepted.' The Hebrew phrase can express the worshipers' acceptance before the LORD through the offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנִיף
  chosen: And he shall wave
  alternatives:
  - And he must present as a wave offering
  - And he shall lift up
  lexicon: HALOT
  rationale: Hiphil of נוּף commonly denotes the ritual act of waving/presenting an offering. 'Wave' preserves the cultic action without over-paraphrasing.
- source_word: הָעֹמֶר
  chosen: the sheaf
  alternatives:
  - the omer
  - the measure of grain
  lexicon: HALOT
  rationale: In this context עֹמֶר refers to the sheaf brought as firstfruits, not merely the dry measure. 'Sheaf' best fits the ritual scene in readable English; 'omer' is possible but less transparent.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for cultic presentation in God's presence. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִרְצֹנְכֶם
  chosen: for your acceptance
  alternatives:
  - so that you may be accepted
  - for your favor
  - for your pleasure
  lexicon: HALOT
  rationale: The phrase indicates the offering's acceptability on behalf of the people. 'For your acceptance' is concise and idiomatic, preserving the relational/cultic sense better than the more subjective 'for your pleasure.'
- source_word: מִמָּחֳרַת הַשַּׁבָּת
  chosen: on the day after the Sabbath
  alternatives:
  - on the morrow after the Sabbath
  - from the day after the Sabbath
  lexicon: HALOT
  rationale: This temporal phrase points to the specific day following the Sabbath. 'On the day after the Sabbath' is clear modern English and reflects the temporal force naturally.
- source_word: יְנִיפֶנּוּ
  chosen: the priest shall wave it
  alternatives:
  - the priest shall present it as a wave offering
  lexicon: HALOT
  rationale: Repeats the same ritual verb with 3ms object suffix referring back to the sheaf. Rendering the suffix as 'it' makes the referent explicit in English.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic legislation.
