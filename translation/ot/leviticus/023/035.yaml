id: LEV.23.35
reference: Leviticus 23:35
source:
  edition: WLC
  text: בַּ/יּ֥וֹם הָ/רִאשׁ֖וֹן מִקְרָא קֹ֑דֶשׁ כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֥א תַעֲשֽׂוּ־־׃
translation:
  text: On the first day there shall be a holy convocation; you shall do no laborious
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly.' The Hebrew phrase מִקְרָא קֹדֶשׁ is a formal term
      for a summoned holy gathering.
    reason: lexical_alternative
  - marker: b
    text: Or 'regular work' or, more literally in older English, 'servile work.' The
      phrase refers to ordinary labor associated with service or occupation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: On the first day
  alternatives:
  - On the first day of it
  - On the first day
  lexicon: HALOT
  rationale: The preposition ב plus יוֹם gives a temporal phrase, naturally rendered
    'on the day,' and with the ordinal 'the first' becomes 'On the first day.' English
    does not require a more literal 'in/on the day.'
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This fixed cultic phrase in Leviticus denotes an officially summoned
    sacred gathering. 'Holy convocation' preserves the formal, liturgical sense of
    מִקְרָא while remaining standard English Bible diction; 'assembly' is possible
    but slightly less precise to the summons nuance.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - occupational work
  - servile work
  - regular work
  lexicon: HALOT
  rationale: The phrase refers not to absolutely every action, but to ordinary labor/service
    work prohibited on festival days. 'Laborious work' captures the sense of work-labor
    without the archaic connotations of 'servile work.' 'Regular work' is possible
    but somewhat interpretive; 'laborious work' stays closer to the lexical components
    מְלָאכָה + עֲבֹדָה.
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you shall not do any
  - do not do any
  lexicon: HALOT
  rationale: 'The imperfect second person plural in legal instruction is well rendered
    with English ''you shall.'' Fronting the negated object phrase yields idiomatic
    legal English: ''you shall do no laborious work.'''
