theological_decisions:
- issue: Duration language in cultic law
  chosen_reading: a permanent statute
  alternative_readings:
  - a statute forever
  - an everlasting statute
  - a perpetual statute
  rationale: The Hebrew עוֹלָם often signals enduring, ongoing obligation within the
    covenantal frame. Rendering it as 'permanent' preserves the text's legal seriousness
    without forcing a philosophical claim about absolute timelessness beyond what
    the Hebrew itself requires.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than over-resolve'
