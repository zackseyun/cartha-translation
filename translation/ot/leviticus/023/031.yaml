id: LEV.23.31
reference: Leviticus 23:31
source:
  edition: WLC
  text: כָּל מְלָאכָ֖ה לֹ֣א תַעֲשׂ֑וּ חֻקַּ֤ת עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם בְּ/כֹ֖ל מֹֽשְׁבֹֽתֵי/כֶֽם־׃
translation:
  text: You shall do no work at all. It is a permanent statute throughout your generations
    in all your dwelling places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a statute forever' / 'an everlasting statute.' The Hebrew phrase חֻקַּת
      עוֹלָם uses עוֹלָם, which can denote enduring or perpetual duration.
    reason: lexical_alternative
  - marker: b
    text: Or 'in all your settlements' or 'wherever you live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מְלָאכָה
  chosen: no work at all
  alternatives:
  - no occupation
  - no labor
  - no manner of work
  lexicon: HALOT
  rationale: 'מְלָאכָה commonly denotes work, labor, or occupational activity. With
    כָּל and the negation, the sense is comprehensive: absolutely no work. ''No work
    at all'' preserves the totalizing force in natural English.'
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you must not do
  - do not do
  lexicon: HALOT
  rationale: The imperfect second masculine plural in legal material carries prohibitive/injunctive
    force. 'You shall do no' fits the formal legal register of the verse and pairs
    naturally with 'work at all.'
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a statute forever
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: חֻקָּה is a fixed statute or ordinance. עוֹלָם can denote enduring or
    perpetual duration; 'permanent' communicates lasting validity in accessible modern
    English without unnecessary archaism. 'Statute' preserves the legal sense better
    than 'rule' or 'custom.'
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: The phrase marks ongoing applicability across successive generations.
    'Throughout your generations' is a standard, clear rendering that preserves the
    durative force.
- source_word: בְּכֹל מֹשְׁבֹתֵיכֶם
  chosen: in all your dwelling places
  alternatives:
  - in all your settlements
  - wherever you live
  - in all your habitations
  lexicon: HALOT
  rationale: מוֹשָׁב refers to places of dwelling or settlement. 'Dwelling places'
    is understandable modern English and preserves the locative scope. 'Settlements'
    is possible but slightly narrower; 'habitations' is more archaic.
