theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves covenantal reverence and aligns with the project's stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of שַׁבַּת שַׁבָּתוֹן
  chosen_reading: a Sabbath of complete rest
  alternative_readings:
  - a sabbath-rest
  - a sabbath of solemn rest
  rationale: The phrase emphasizes full cessation from ordinary labor. 'Complete rest'
    preserves the legal and theological force of the Sabbath without importing later
    doctrinal elaboration.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source meaning without paraphrase'
