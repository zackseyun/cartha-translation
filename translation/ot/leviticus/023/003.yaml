id: LEV.23.3
reference: Leviticus 23:3
source:
  edition: WLC
  text: שֵׁ֣שֶׁת יָמִים֮ תֵּעָשֶׂ֣ה מְלָאכָה֒ וּ/בַ/יּ֣וֹם הַ/שְּׁבִיעִ֗י שַׁבַּ֤ת
    שַׁבָּתוֹן֙ מִקְרָא קֹ֔דֶשׁ כָּל מְלָאכָ֖ה לֹ֣א תַעֲשׂ֑וּ שַׁבָּ֥ת הִוא֙ לַֽ/יהוָ֔ה
    בְּ/כֹ֖ל מֽוֹשְׁבֹתֵי/כֶֽם־־׃פ
translation:
  text: For six days work may be done, but on the seventh day is a Sabbath of complete
    rest, a holy convocation. You shall do no work; it is a Sabbath to the LORD in
    all your dwellings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sabbath-rest' or 'a sabbath of solemn rest.' The Hebrew phrase intensifies
      the idea of Sabbath rest.
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout all your settlements.' The Hebrew can refer to dwelling places
      or settled communities.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּעָשֶׂה
  chosen: may be done
  alternatives:
  - shall be done
  - is to be done
  lexicon: HALOT
  rationale: Nifal imperfect of עשה is passive/reflexive in form. 'May be done' preserves
    the passive sense and the permissive/gnomic force in context better than a hard
    imperative.
- source_word: מְלָאכָה
  chosen: work
  alternatives:
  - occupation
  - labor
  lexicon: HALOT
  rationale: Standard term for work/labor in Sabbath legislation. 'Work' is the most
    natural and consistent English rendering here.
- source_word: שַׁבַּת שַׁבָּתוֹן
  chosen: a Sabbath of complete rest
  alternatives:
  - a sabbath-rest
  - a complete sabbath
  - a sabbath of solemn rest
  lexicon: HALOT
  rationale: The collocation intensifies the idea of cessation/rest. 'A Sabbath of
    complete rest' communicates both the noun and the intensifying second term in
    readable modern English.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: Established cultic phrase for an officially summoned sacred gathering.
    'Holy convocation' is slightly more formal but accurately preserves the summons
    nuance of מִקְרָא.
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall do no work
  alternatives:
  - you must not do any work
  - you shall not do any work
  lexicon: HALOT
  rationale: Direct prohibition in second person plural. 'You shall do no work' is
    idiomatic, clear, and close to the Hebrew syntax.
- source_word: שַׁבָּת הִוא לַיהוָה
  chosen: it is a Sabbath to the LORD
  alternatives:
  - it is a Sabbath for the LORD
  - it is the LORD's Sabbath
  lexicon: HALOT
  rationale: The phrase marks the day as belonging to and oriented toward YHWH. 'To
    the LORD' preserves the Hebrew preposition and common covenantal idiom without
    overinterpreting possession.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: בְּכֹל מוֹשְׁבֹתֵיכֶם
  chosen: in all your dwellings
  alternatives:
  - throughout all your settlements
  - in all the places where you live
  lexicon: HALOT
  rationale: מוֹשָׁב can denote dwelling places/settlements. 'In all your dwellings'
    is concise, traditional, and fits the legal scope of the command.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: but on the seventh day
  alternatives:
  - and on the seventh day
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but in English the
    contrast between six working days and the seventh day of rest is better expressed
    with 'but' without adding content not present in the Hebrew.
