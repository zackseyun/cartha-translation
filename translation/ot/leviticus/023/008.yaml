id: LEV.23.8
reference: Leviticus 23:8
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֥ם אִשֶּׁ֛ה לַ/יהוָ֖ה שִׁבְעַ֣ת יָמִ֑ים בַּ/יּ֤וֹם הַ/שְּׁבִיעִי֙
    מִקְרָא קֹ֔דֶשׁ כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֥א תַעֲשֽׂוּ־־׃פ
translation:
  text: And you shall present a food offering to the LORD for seven days. On the seventh
    day there shall be a holy convocation; you shall do no laborious work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context commonly means to bring/present
    an offering. 'Present' is natural English while preserving the cultic action without
    over-paraphrase.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: In priestly sacrificial language אִשֶּׁה denotes an offering made by
    fire, often rendered more idiomatically as 'food offering' in modern English.
    This avoids awkwardness while retaining the sacrificial sense. Because 'offering
    by fire' is a viable more formal alternative, it is preserved in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication of the offering. English
    idiom allows either 'to' or 'for'; 'to the LORD' keeps the direct dedicatory sense.
    'the LORD' follows the project's default for YHWH.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: This phrase indicates the duration over which the offerings are presented.
    'For seven days' makes the temporal force explicit in smooth English.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: On the seventh day
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'on' is the natural English preposition.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  lexicon: HALOT
  rationale: This fixed festival expression denotes an officially summoned sacred
    gathering. 'Holy convocation' preserves the formal cultic register and is a standard,
    accurate rendering; 'sacred assembly' is a readable alternative.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - occupational work
  - servile work
  - regular work
  lexicon: HALOT
  rationale: The construct phrase refers not to every conceivable activity, but to
    ordinary labor/service work prohibited on festival days. 'Laborious work' captures
    the sense better than the archaic 'servile work' while avoiding the over-broad
    'any work.'
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you shall not do
  lexicon: HALOT
  rationale: Combined with the following object in English, 'you shall do no laborious
    work' is idiomatic and preserves the prohibition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the divine name is rendered 'the LORD' rather than
    transliterated.
