id: LEV.23.44
reference: Leviticus 23:44
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁ֔ה אֶת מֹעֲדֵ֖י יְהוָ֑ה אֶל בְּנֵ֖י יִשְׂרָאֵֽל־־׃פ
translation:
  text: So Moses declared the appointed times of Yahweh to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: declared
  alternatives:
  - spoke
  - announced
  - proclaimed
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak,' but in this summary statement at the close of the festival calendar, 'declared' captures the communicative force of making these observances known without over-paraphrasing. 'Spoke' is possible but less natural in English with the direct object that follows.
- source_word: מֹעֲדֵי
  chosen: appointed times
  alternatives:
  - appointed feasts
  - set times
  - festivals
  lexicon: HALOT
  rationale: מוֹעֵד refers to appointed times/meetings. In Leviticus 23 the term covers the sacred calendar broadly, not only feast meals, so 'appointed times' best preserves the scope. 'Festivals' is too narrow for items like the Sabbath.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'The preposition straightforwardly marks the audience addressed by Moses: he declared these matters ''to'' the Israelites.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the gender-accurate principle, the translation preserves the masculine representative expression rather than neutralizing it. 'The Israelites' is idiomatic but less formally transparent; 'children of Israel' is traditional but less natural in modern English.
