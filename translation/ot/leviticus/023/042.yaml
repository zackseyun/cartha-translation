id: LEV.23.42
reference: Leviticus 23:42
source:
  edition: WLC
  text: בַּ/סֻּכֹּ֥ת תֵּשְׁב֖וּ שִׁבְעַ֣ת יָמִ֑ים כָּל הָֽ/אֶזְרָח֙ בְּ/יִשְׂרָאֵ֔ל
    יֵשְׁב֖וּ בַּ/סֻּכֹּֽת־׃
translation:
  text: You shall live in booths for seven days; every native-born person in Israel
    shall live in booths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in shelters' or 'in temporary shelters'; Hebrew 'booths' refers to temporary
      festival shelters.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּסֻּכֹּת
  chosen: in booths
  alternatives:
  - in shelters
  - in temporary shelters
  - in tabernacles
  lexicon: HALOT
  rationale: סֻכּוֹת refers to temporary shelters/booths made for the festival. 'Booths'
    is the standard clear English rendering and preserves the concrete image better
    than the more archaic 'tabernacles.'
- source_word: תֵּשְׁבוּ
  chosen: you shall live
  alternatives:
  - you shall dwell
  - you shall sit
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit,' but in habitation contexts it means
    'dwell/live.' Here the command concerns residing in booths during the feast, so
    'live' communicates the sense naturally in modern English.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with duration expressions. This
    is a straightforward temporal accusative.
- source_word: כָּל הָאֶזְרָח
  chosen: every native-born person
  alternatives:
  - every native
  - every citizen
  - every one born in the land
  lexicon: HALOT
  rationale: אֶזְרָח denotes a native-born member of the community, in contrast to
    a sojourner/foreigner. 'Native-born person' is precise and natural. 'Citizen'
    risks importing later political categories.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The phrase identifies the covenant community to whom the requirement
    applies. 'In Israel' is the most direct rendering.
- source_word: יֵשְׁבוּ
  chosen: shall live
  alternatives:
  - shall dwell
  - shall sit
  lexicon: HALOT
  rationale: Repeats ישׁב in the same habitation sense as earlier in the verse; consistency
    favors 'shall live' here as well.
