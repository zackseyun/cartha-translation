theological_decisions:
- issue: Rendering of הָאֶזְרָח with gender-accurate English
  chosen_reading: every native-born person
  alternative_readings:
  - every native-born man
  - every native
  rationale: The Hebrew noun is grammatically masculine singular with representative
    force. Per the translation philosophy, gender-accurate English should reflect
    the source intent rather than impose unnecessary male restriction. 'Person' preserves
    the generic scope of the command.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
