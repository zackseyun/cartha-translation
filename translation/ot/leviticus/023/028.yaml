theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This also aligns with the verse's covenantal-liturgical setting.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term כפר / כִּפֻּרִים
  chosen_reading: atonement / Day of Atonement
  alternative_readings:
  - cover
  - purge
  - Day of Atonements
  rationale: The verse is embedded in priestly sacrificial legislation. 'Atonement'
    best communicates the cultic-reconciliatory function in accessible modern English
    without over-specifying a later doctrinal model. The more literal plural nuance
    in כִּפֻּרִים is not carried into the main text because English idiom and established
    festival designation favor the singular expression, but the literal form is worth
    preserving in a footnote.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve theological weight without importing doctrinal claims'
