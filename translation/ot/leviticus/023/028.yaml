id: LEV.23.28
reference: Leviticus 23:28
source:
  edition: WLC
  text: וְ/כָל מְלָאכָה֙ לֹ֣א תַעֲשׂ֔וּ בְּ/עֶ֖צֶם הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֣י י֤וֹם
    כִּפֻּרִים֙ ה֔וּא לְ/כַפֵּ֣ר עֲלֵי/כֶ֔ם לִ/פְנֵ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: You shall do no work on this very day, for it is a Day of Atonement, to make
    atonement for you before the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a day of atonements.'' English commonly renders the festival
      name as ''Day of Atonement.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל מְלָאכָה
  chosen: no work
  alternatives:
  - no occupation
  - no labor
  - no kind of work
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work or occupational labor, especially in Sabbath/festival
    prohibitions. Rendering the phrase with the negation as 'no work' is idiomatic
    and preserves the legal force of the prohibition.
- source_word: תַעֲשׂוּ
  chosen: you shall do
  alternatives:
  - you are not to do
  - you must not do
  lexicon: HALOT
  rationale: Qal imperfect 2mp of עשה in legal instruction is well represented by
    English future/modal 'shall do' with the preceding negation. This keeps the covenant-law
    register without becoming archaic.
- source_word: בְּ/עֶצֶם הַ/יּוֹם הַ/זֶּה
  chosen: on this very day
  alternatives:
  - on this same day
  - on that very day
  - on the very day
  lexicon: HALOT
  rationale: The idiom בְּעֶצֶם הַיּוֹם הַזֶּה intensifies the temporal reference,
    stressing the exact day itself. 'On this very day' captures the emphatic force
    naturally in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the prohibition. 'For' is concise
    and fits the explanatory connection in English.
- source_word: יּוֹם כִּפֻּרִים
  chosen: a Day of Atonement
  alternatives:
  - the Day of Atonement
  - a day of atonements
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'day of atonements,' but in English
    the established and semantically accurate rendering is 'Day of Atonement.' The
    anarthrous Hebrew predicate after הוּא is naturally rendered with English 'a'
    in this clause ('it is a Day of Atonement'), while still identifying the festival.
- source_word: לְ/כַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: The piel infinitive of כפר in cultic contexts refers to making atonement.
    This rendering preserves the sacrificial/cultic sense without importing a narrower
    theological theory.
- source_word: עֲלֵי/כֶם
  chosen: for you
  alternatives:
  - on your behalf
  - for yourselves
  lexicon: HALOT
  rationale: With כפר, על commonly marks the persons for whom atonement is made. 'For
    you' is natural English and accurately conveys beneficiary/reference.
- source_word: לִ/פְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: The preposition indicates presence before YHWH in a cultic setting. 'Before'
    is the standard concise rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵי/כֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'In covenant formula with YHWH, אֱלֹהִים with 2mp suffix is singular
    in sense: ''your God.'' This preserves the relational covenant language.'
