id: LEV.23.4
reference: Leviticus 23:4
source:
  edition: WLC
  text: אֵ֚לֶּה מוֹעֲדֵ֣י יְהוָ֔ה מִקְרָאֵ֖י קֹ֑דֶשׁ אֲשֶׁר תִּקְרְא֥וּ אֹתָ֖/ם בְּ/מוֹעֲדָֽ/ם־׃
translation:
  text: These are the appointed times of Yahweh, holy convocations, which you shall proclaim at their appointed times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed feasts' or 'set times.' The Hebrew מוֹעֲדֵי is broader than festival meals alone and refers to times appointed by the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'sacred assemblies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing the list that follows; English idiom naturally supplies the copula.
- source_word: מוֹעֲדֵי
  chosen: appointed times
  alternatives:
  - appointed feasts
  - set times
  - appointed seasons
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time/meeting. In Leviticus 23 the term includes festivals but is broader than 'feasts,' since it also covers sacred times like the Sabbath. 'Appointed times' preserves the temporal emphasis and fits the repeated בְּמוֹעֲדָם later in the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִקְרָאֵי קֹדֶשׁ
  chosen: holy convocations
  alternatives:
  - sacred assemblies
  - holy assemblies
  lexicon: HALOT
  rationale: Construct phrase meaning convocations/assemblies marked by holiness. 'Holy convocations' is slightly more formal but accurately reflects the summons/proclamation nuance of מִקְרָא while remaining understandable.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause describing the appointed times/holy convocations.
- source_word: תִּקְרְאוּ
  chosen: you shall proclaim
  alternatives:
  - you shall call
  - you shall announce
  lexicon: HALOT
  rationale: קרא in this context is not merely naming but publicly calling/proclaiming these sacred observances. 'Proclaim' best captures the formal declarative sense in context.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the appointed times/holy convocations; in English it is implicit after 'proclaim' but conceptually retained in the clause.
- source_word: בְּמוֹעֲדָם
  chosen: at their appointed times
  alternatives:
  - in their appointed times
  - at their set times
  lexicon: HALOT
  rationale: The preposition plus noun with plural suffix indicates the proper occasions belonging to each observance. 'At their appointed times' is idiomatic and preserves the repetition of מוֹעֵד from earlier in the verse.
