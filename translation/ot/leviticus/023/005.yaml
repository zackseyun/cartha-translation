id: LEV.23.5
reference: Leviticus 23:5
source:
  edition: WLC
  text: בַּ/חֹ֣דֶשׁ הָ/רִאשׁ֗וֹן בְּ/אַרְבָּעָ֥ה עָשָׂ֛ר לַ/חֹ֖דֶשׁ בֵּ֣ין הָ/עַרְבָּ֑יִם
    פֶּ֖סַח לַ/יהוָֽה׃
translation:
  text: In the first month, on the fourteenth day of the month, at twilight, is the
    Passover to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'between the evenings,' a Hebrew idiom for the twilight period
      around sunset.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Passover offering' / 'the Passover sacrifice.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: In the first month
  alternatives:
  - In the first new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily denotes 'month' in calendrical contexts. With the ordinal
    הָרִאשׁוֹן, the phrase marks the first month of the cultic year.
- source_word: בְּאַרְבָּעָה עָשָׂר לַחֹדֶשׁ
  chosen: on the fourteenth day of the month
  alternatives:
  - on the fourteenth of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew way of dating within a month. Supplying 'day'
    makes idiomatic English while preserving the calendrical precision.
- source_word: בֵּין הָעַרְבַּיִם
  chosen: at twilight
  alternatives:
  - between the evenings
  - at dusk
  lexicon: HALOT
  rationale: The idiom literally reads 'between the evenings' and refers to the twilight
    period around sunset. 'At twilight' gives clear modern English while a more literal
    alternative is preserved in a footnote because the phrase has interpretive significance
    in Passover timing discussions.
- source_word: פֶּסַח
  chosen: the Passover
  alternatives:
  - Passover offering
  - Passover sacrifice
  lexicon: HALOT
  rationale: פֶּסַח can denote the Passover observance or the sacrificial victim/rite.
    In this festival-calendar context, 'the Passover' best captures the feast/observance
    without over-specifying; sacrificial nuance is preserved as an alternative in
    a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל here marks
    dedication/belonging; 'to the LORD' is a natural rendering, with 'for the LORD'
    as a viable alternative.
