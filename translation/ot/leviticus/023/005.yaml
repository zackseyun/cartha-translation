theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of פֶּסַח in cultic context
  chosen_reading: the Passover
  alternative_readings:
  - Passover offering
  - Passover sacrifice
  rationale: The Hebrew term can refer either to the festival or to the sacrificial
    rite/victim. The broader context is a calendar of appointed times, so the main
    text keeps the broader festival term while preserving the sacrificial nuance in
    a footnote rather than resolving the ambiguity too narrowly.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
