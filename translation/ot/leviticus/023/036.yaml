id: LEV.23.36
reference: Leviticus 23:36
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֔ים תַּקְרִ֥יבוּ אִשֶּׁ֖ה לַ/יהוָ֑ה בַּ/יּ֣וֹם הַ/שְּׁמִינִ֡י
    מִקְרָא קֹדֶשׁ֩ יִהְיֶ֨ה לָ/כֶ֜ם וְ/הִקְרַבְתֶּ֨ם אִשֶּׁ֤ה לַֽ/יהוָה֙ עֲצֶ֣רֶת
    הִ֔וא כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֥א תַעֲשֽׂוּ־־׃
translation:
  text: For seven days you shall present a food offering to the LORD. On the eighth
    day you shall have a holy convocation, and you shall present a food offering to
    the LORD. It is a solemn assembly; you shall do no ordinary work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offering by fire.' The Hebrew אִשֶּׁה is the standard sacrificial term
      for an offering presented by fire; 'food offering' is used here as a clear modern
      rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּקְרִיבוּ / וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: From קרב in the Hiphil, the cultic sense is to present/offer an offering.
    'Present' preserves the sacrificial nuance while reading naturally in English;
    'bring near' is too literal here, and 'offer' is possible but slightly less transparent
    when paired with the object 'food offering.'
- source_word: אִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: In priestly sacrificial contexts this term denotes an offering made by
    fire, but in idiomatic modern English 'food offering' communicates the sacrificial
    category without implying the fire itself is the main point. This follows optimal
    equivalence while preserving the cultic sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication. 'To the LORD' is a natural
    rendering in sacrificial contexts. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This fixed festival expression denotes an officially summoned sacred
    gathering. 'Holy convocation' preserves the formal cultic register and is a standard,
    accurate rendering.
- source_word: עֲצֶרֶת
  chosen: a solemn assembly
  alternatives:
  - an assembly
  - a closing festival assembly
  lexicon: HALOT
  rationale: The noun refers to a special concluding assembly marked by restraint/solemn
    observance. 'Solemn assembly' best captures the established cultic sense in concise
    English.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: no ordinary work
  alternatives:
  - no laborious work
  - no occupational work
  - no work of service
  lexicon: HALOT
  rationale: This phrase in festival legislation distinguishes prohibited regular
    labor from all activity whatsoever. 'No ordinary work' communicates that nuance
    clearly in modern English better than the more wooden 'laborious work.'
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: On the eighth day
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'on' is the natural English preposition.
- source_word: יִהְיֶה לָכֶם
  chosen: you shall have
  alternatives:
  - it shall be for you
  - there shall be for you
  lexicon: HALOT
  rationale: Idiomatic English for existential היה + ל construction, while preserving
    the directive force of the festival instruction.
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  lexicon: HALOT
  rationale: The phrase introduces the duration of the required offerings. 'For seven
    days' makes the temporal force explicit in natural English.
