id: LEV.23.18
reference: Leviticus 23:18
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֣ם עַל הַ/לֶּ֗חֶם שִׁבְעַ֨ת כְּבָשִׂ֤ים תְּמִימִם֙ בְּנֵ֣י שָׁנָ֔ה
    וּ/פַ֧ר בֶּן בָּקָ֛ר אֶחָ֖ד וְ/אֵילִ֣ם שְׁנָ֑יִם יִהְי֤וּ עֹלָה֙ לַֽ/יהוָ֔ה וּ/מִנְחָתָ/ם֙
    וְ/נִסְכֵּי/הֶ֔ם אִשֵּׁ֥ה רֵֽיחַ נִיחֹ֖חַ לַ/יהוָֽה־־־׃
translation:
  text: And with the bread you shall present seven male lambs a year old, without
    blemish, and one bull from the herd, and two rams. They shall be a burnt offering
    to the LORD, with their grain offering and their drink offerings, a food offering,
    a pleasing aroma to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beside the bread' or 'in addition to the bread'; the Hebrew preposition
      can express accompaniment rather than physical placement.
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering by fire'; the Hebrew term refers to an offering made by
      fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context means to bring/present an offering.
    'Present' is natural English and preserves the cultic action without over-specifying
    beyond the Hebrew.
- source_word: עַל הַלֶּחֶם
  chosen: with the bread
  alternatives:
  - beside the bread
  - upon the bread
  - in addition to the bread
  lexicon: HALOT
  rationale: עַל can mean 'on/upon' or more broadly 'with/in addition to' in offering
    formulas. Here the sense is accompaniment of these animal offerings with the previously
    mentioned bread offering, not physical placement on top of the bread.
- source_word: שִׁבְעַת כְּבָשִׂים
  chosen: seven male lambs
  alternatives:
  - seven lambs
  - seven sheep
  lexicon: HALOT
  rationale: כֶּבֶשׂ refers to a lamb, and the masculine plural supports 'male lambs.'
    Including 'male' reflects the source more precisely in a sacrificial inventory.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Standard sacrificial term for animals free from defect. 'Without blemish'
    is clear modern English and preserves ritual precision.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - sons of a year
  - one year old
  lexicon: HALOT
  rationale: Idiomatic age expression for animals in Hebrew; 'a year old' is the natural
    English equivalent.
- source_word: וּפַר בֶּן בָּקָר אֶחָד
  chosen: one bull from the herd
  alternatives:
  - one young bull
  - one bull calf
  lexicon: HALOT
  rationale: פַר בֶּן־בָּקָר denotes a bull of the cattle/herd. 'Bull from the herd'
    is a transparent rendering that avoids overcommitting to age nuance not explicit
    in English.
- source_word: וְאֵילִם שְׁנָיִם
  chosen: and two rams
  alternatives:
  - and two male sheep
  lexicon: HALOT
  rationale: אַיִל is specifically a ram; 'rams' is the standard and precise rendering.
- source_word: יִהְיוּ עֹלָה לַיהוָה
  chosen: They shall be a burnt offering to the LORD
  alternatives:
  - They shall be for a burnt offering to the LORD
  - They shall become a burnt offering to the LORD
  lexicon: HALOT
  rationale: עֹלָה is the technical term for the whole burnt offering. Singular עֹלָה
    can function collectively for the listed animals.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the offering
    formula naturally in English.
- source_word: וּמִנְחָתָם
  chosen: with their grain offering
  alternatives:
  - and their grain offering
  - with their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Levitical sacrificial context refers to the grain offering
    accompanying the burnt offering. 'With' reflects the syntactic coordination as
    accompaniment.
- source_word: וְנִסְכֵּיהֶם
  chosen: and their drink offerings
  alternatives:
  - and their libations
  lexicon: HALOT
  rationale: נֶסֶךְ denotes a poured drink offering. 'Drink offerings' is accessible
    modern English; 'libations' is a valid but less common alternative.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Food offering' is used in
    many modern translations to communicate the sacrificial category in readable English,
    though the fire element remains conceptually present in the ritual context.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: Conventional sacrificial idiom indicating divine acceptance. 'Pleasing
    aroma' is clear and avoids archaic phrasing while preserving the metaphor.
