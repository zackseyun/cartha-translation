id: LEV.23.12
reference: Leviticus 23:12
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶ֕ם בְּ/י֥וֹם הֲנִֽיפְ/כֶ֖ם אֶת הָ/עֹ֑מֶר כֶּ֣בֶשׂ תָּמִ֧ים בֶּן
    שְׁנָת֛/וֹ לְ/עֹלָ֖ה לַ/יהוָֽה־־׃
translation:
  text: On the day you wave the sheaf, you shall offer a male lamb without blemish,
    a year old, as a burnt offering to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the omer'; here the term likely refers to the sheaf presented in the
      offering ritual rather than merely a dry measure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: you shall offer
  alternatives:
  - you shall do
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: The verb עשה is broadly 'do/make,' but in sacrificial contexts it commonly
    functions idiomatically for performing or offering a sacrifice. 'Offer' gives
    the cultic sense in natural English without over-paraphrasing.
- source_word: בְּיוֹם
  chosen: On the day
  alternatives:
  - In the day
  - On the same day
  lexicon: HALOT
  rationale: Temporal preposition plus 'day' is most naturally rendered 'On the day,'
    introducing the time of the required offering.
- source_word: הֲנִיפְכֶם
  chosen: you wave
  alternatives:
  - you present as a wave offering
  - your waving
  lexicon: HALOT
  rationale: From נוף in the Hiphil, the standard cultic action of waving before YHWH.
    'Wave' is concise and preserves the ritual terminology.
- source_word: הָעֹמֶר
  chosen: the sheaf
  alternatives:
  - the omer
  - the measure
  lexicon: HALOT
  rationale: In this harvest context עֹמֶר refers to the sheaf presented, not merely
    a dry measure. 'Sheaf' communicates the concrete ritual object more clearly in
    English. The transliteration 'omer' is possible but less immediately clear.
- source_word: כֶּבֶשׂ
  chosen: a male lamb
  alternatives:
  - a lamb
  - a young ram
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb; 'male lamb' makes explicit the sex implied by
    the Hebrew noun in sacrificial usage and fits the following age specification.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  - whole
  lexicon: HALOT
  rationale: In sacrificial legislation תמים regularly means free from defect. 'Without
    blemish' is standard, clear, and contextually precise.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom specifies the animal's age. 'A year old' is idiomatic modern
    English; 'in its first year' is possible but slightly less direct here.
- source_word: לְעֹלָה
  chosen: as a burnt offering
  alternatives:
  - for a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the technical term for the whole burnt offering. 'As a burnt
    offering' reads naturally in English while preserving the sacrificial category.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' The preposition marks the
    offering as directed to YHWH; 'to the LORD' is a natural rendering in this context.
