theological_decisions:
- issue: Meaning of self-affliction in cultic context
  chosen_reading: Retain the broader command 'afflict yourselves' in the main text
    rather than specifying fasting.
  alternative_readings:
  - you shall fast
  - you shall humble yourselves
  rationale: The Hebrew does not explicitly say 'fast' in this verse, though fasting
    is likely included in the practice. Preserving the broader wording avoids importing
    a narrower ritual specification than the text states.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
