id: LEV.23.32
reference: Leviticus 23:32
source:
  edition: WLC
  text: שַׁבַּ֨ת שַׁבָּת֥וֹן הוּא֙ לָ/כֶ֔ם וְ/עִנִּיתֶ֖ם אֶת נַפְשֹׁתֵי/כֶ֑ם בְּ/תִשְׁעָ֤ה
    לַ/חֹ֨דֶשׁ֙ בָּ/עֶ֔רֶב מֵ/עֶ֣רֶב עַד עֶ֔רֶב תִּשְׁבְּת֖וּ שַׁבַּתְּ/כֶֽם־־׃פ
translation:
  text: It is a Sabbath of complete rest for you, and you shall afflict yourselves.
    On the ninth day of the month, in the evening, from evening to evening, you shall
    keep your Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall humble yourselves' or 'you shall deny yourselves.' The Hebrew
      idiom refers to self-affliction in penitential observance, traditionally associated
      with fasting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from evening to evening,' marking the observance by Israelite
      day-reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁבַּת שַׁבָּתוֹן
  chosen: a Sabbath of complete rest
  alternatives:
  - a sabbath rest
  - a complete sabbath
  - a sabbath of solemn rest
  lexicon: HALOT
  rationale: The paired nouns intensify the idea of cessation/rest. 'A Sabbath of
    complete rest' preserves the superlative force without sounding archaic. 'Solemn
    rest' is traditional, but the Hebrew here emphasizes rest/cessation more directly
    than solemnity.
- source_word: וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  chosen: you shall afflict yourselves
  alternatives:
  - you shall humble yourselves
  - you shall deny yourselves
  lexicon: HALOT
  rationale: ענה in this ritual context commonly refers to self-affliction associated
    with fasting/humbling on the Day of Atonement. 'Afflict yourselves' is the most
    textually direct rendering; alternatives are interpretive and worth preserving.
- source_word: נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  lexicon: HALOT
  rationale: In this idiom, נֶפֶשׁ functions reflexively rather than denoting an immaterial
    'soul' in a narrow sense. 'Yourselves' communicates the Hebrew sense in natural
    English while avoiding misleading anthropological overtones.
- source_word: בְּתִשְׁעָה לַחֹדֶשׁ בָּעֶרֶב
  chosen: On the ninth day of the month, in the evening
  alternatives:
  - On the ninth of the month at evening
  - On the ninth day of the month at evening
  lexicon: HALOT
  rationale: This phrase marks the beginning of the observance at evening on the ninth
    day, leading into the tenth by Israelite reckoning. The chosen wording is clear
    modern English while staying close to the Hebrew sequence.
- source_word: מֵעֶרֶב עַד עֶרֶב
  chosen: from evening to evening
  alternatives:
  - from sunset to sunset
  lexicon: HALOT
  rationale: The Hebrew literally says 'from evening to evening.' 'Sunset to sunset'
    is a possible explanatory rendering, but 'evening to evening' is more formally
    accurate and sufficiently clear.
- source_word: תִּשְׁבְּתוּ שַׁבַּתְּכֶם
  chosen: you shall keep your Sabbath
  alternatives:
  - you shall observe your Sabbath
  - you shall rest your rest
  lexicon: HALOT
  rationale: The verb שבת means cease/rest, and with 'your Sabbath' the idiomatic
    sense is to observe/keep the sabbath-rest. 'Keep your Sabbath' balances literalness
    and readability better than the overly wooden 'rest your rest.'
