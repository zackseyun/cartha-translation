id: LEV.23.7
reference: Leviticus 23:7
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הָֽ/רִאשׁ֔וֹן מִקְרָא קֹ֖דֶשׁ יִהְיֶ֣ה לָ/כֶ֑ם כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה
    לֹ֥א תַעֲשֽׂוּ־־׃
translation:
  text: On the first day there shall be a holy convocation for you; you shall do no
    laborious work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly' or 'a holy assembly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'work of labor/service'; that is, ordinary labor. Traditionally rendered
      'servile work.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: On the first day
  alternatives:
  - On the first day of it
  - On day one
  lexicon: HALOT
  rationale: The preposition ב plus יוֹם with the article and ordinal is most naturally
    temporal, introducing the time of the command. 'On the first day' is idiomatic
    and sufficiently formal.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: מִקְרָא in cultic contexts denotes an assembly or summons, and קֹדֶשׁ
    marks it as holy/sacred. 'Holy convocation' preserves the formal cultic register
    familiar in Leviticus while remaining understandable; 'assembly' is a viable alternative
    but slightly flattens the summons nuance.
- source_word: יִהְיֶה לָכֶם
  chosen: there shall be ... for you
  alternatives:
  - it shall be ... to you
  - you shall have
  lexicon: HALOT
  rationale: The clause states what the day is to be for the people. 'There shall
    be ... for you' preserves the Hebrew structure better than the more idiomatic
    but interpretive 'you shall have.'
- source_word: כָּל
  chosen: 'no'
  alternatives:
  - any
  lexicon: HALOT
  rationale: In the construction with negation ('all/any ... you shall not do'), idiomatic
    English expresses the prohibition as 'no ...' rather than a wooden 'any ... not.'
    This preserves the totalizing force of כָּל.
- source_word: מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - occupational work
  - servile work
  - regular work
  lexicon: HALOT
  rationale: This collocation in festival legislation refers to ordinary labor associated
    with work/service, not absolutely every possible activity. 'Laborious work' captures
    the sense of customary labor without importing the archaic and potentially misleading
    'servile work.' 'Regular work' is possible but less precise to the Hebrew wording.
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you shall not do any
  - do not do
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material is appropriately rendered as
    a prohibition with future-modal force, 'you shall.' This matches the legislative
    style of the passage.
