theological_decisions:
- issue: Nature of the festival prohibition in מְלֶאכֶת עֲבֹדָה
  chosen_reading: The text prohibits ordinary labor associated with work/service,
    not every conceivable action.
  alternative_readings:
  - The text forbids all work without qualification.
  rationale: The specific phrase מְלֶאכֶת עֲבֹדָה is narrower than a bare prohibition
    of all work and is used in festival contexts to distinguish ordinary labor from
    permitted cultic or necessary acts. The translation should preserve that nuance
    rather than overstate the restriction.
