theological_decisions:
- issue: Force of חֻקַּת עוֹלָם in Mosaic law
  chosen_reading: Rendered as 'a permanent statute' without importing later theological
    conclusions about its application beyond the covenantal/legal context.
  alternative_readings:
  - an everlasting statute
  - a perpetual statute
  rationale: The Hebrew phrase signals enduring covenantal obligation within the legal
    framework of Leviticus. The translation should preserve that force but not resolve
    broader theological debates about continuity/discontinuity of Mosaic ceremonial
    law.
  doctrine_reference: Preserve theological tension rather than resolve it.
