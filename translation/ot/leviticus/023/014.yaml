id: LEV.23.14
reference: Leviticus 23:14
source:
  edition: WLC
  text: וְ/לֶחֶם֩ וְ/קָלִ֨י וְ/כַרְמֶ֜ל לֹ֣א תֹֽאכְל֗וּ עַד עֶ֨צֶם֙ הַ/יּ֣וֹם הַ/זֶּ֔ה
    עַ֚ד הֲבִ֣יאֲ/כֶ֔ם אֶת קָרְבַּ֖ן אֱלֹהֵי/כֶ֑ם חֻקַּ֤ת עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם
    בְּ/כֹ֖ל מֹשְׁבֹֽתֵי/כֶֽם־־׃ס
translation:
  text: And you shall not eat bread or roasted grain or fresh grain until this very
    day, until you have brought the offering of your God. It is a permanent statute
    throughout your generations in all your dwelling places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parched grain' for 'roasted grain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'new grain' for 'fresh grain.'
    reason: lexical_alternative
  - marker: c
    text: Or 'an everlasting statute' / 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The basic sense is 'bread' or baked bread product. In this harvest-law
    context, the triad lists grain products in increasing/varied forms, so the concrete
    'bread' is preferable to the broader 'food'.
- source_word: קָלִי
  chosen: roasted grain
  alternatives:
  - parched grain
  lexicon: HALOT
  rationale: Refers to grain prepared by roasting/parching. 'Roasted grain' is more
    immediately understandable in modern English, while preserving the agricultural
    specificity.
- source_word: כַּרְמֶל
  chosen: fresh grain
  alternatives:
  - new grain
  - garden produce
  lexicon: HALOT
  rationale: In this context alongside bread and roasted grain, the word denotes fresh
    ears or newly ripened grain, not the place-name Carmel. 'Fresh grain' communicates
    the sense clearly; 'new grain' is a viable alternative but slightly less concrete
    in English.
- source_word: לֹא תֹאכְלוּ
  chosen: you shall not eat
  alternatives:
  - you must not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material functions as prohibition.
    'You shall not eat' preserves the legal-register force common in Torah legislation.
- source_word: עַד עֶצֶם הַיּוֹם הַזֶּה
  chosen: until this very day
  alternatives:
  - until the very same day
  - until that exact day
  lexicon: HALOT
  rationale: עֶצֶם intensifies the temporal expression. 'This very day' captures the
    emphatic force naturally in English.
- source_word: עַד הֲבִיאֲכֶם
  chosen: until you have brought
  alternatives:
  - until your bringing
  - until you bring
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix after עַד marks the terminating
    action. 'Until you have brought' expresses the completed prerequisite most clearly
    in English.
- source_word: קָרְבַּן אֱלֹהֵיכֶם
  chosen: the offering of your God
  alternatives:
  - your God's offering
  - the gift offering of your God
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'The
    offering of your God' is a natural rendering that preserves the possessive relationship
    without over-specifying the type of sacrifice.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: The phrase denotes an enduring legal ordinance. 'Permanent statute' is
    readable modern English while retaining the law's ongoing force. 'Everlasting/perpetual
    statute' are more traditional but can sound archaic.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  lexicon: HALOT
  rationale: This idiom marks continuity across successive generations. 'Throughout
    your generations' is standard and clear.
- source_word: בְּכֹל מֹשְׁבֹתֵיכֶם
  chosen: in all your dwelling places
  alternatives:
  - in all your settlements
  - wherever you live
  lexicon: HALOT
  rationale: The phrase refers to all places where the Israelites reside. 'Dwelling
    places' is a fairly formal but understandable rendering that fits legal style;
    'wherever you live' is clearer but more dynamic.
