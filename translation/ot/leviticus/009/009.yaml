theological_decisions:
- issue: Referent of the pronoun in אֵלָיו
  chosen_reading: The blood was brought to Aaron.
  alternative_readings:
  - The blood was brought to the altar or another implied referent.
  rationale: The immediate narrative context centers on Aaron performing the rite
    while his sons assist him, so the most natural antecedent is Aaron. This is a
    contextual grammatical decision, not a doctrinally loaded one.
