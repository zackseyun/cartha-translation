id: LEV.9.9
reference: Leviticus 9:9
source:
  edition: WLC
  text: וַ֠/יַּקְרִבוּ בְּנֵ֨י אַהֲרֹ֣ן אֶת הַ/דָּם֮ אֵלָי/ו֒ וַ/יִּטְבֹּ֤ל אֶצְבָּע/וֹ֙
    בַּ/דָּ֔ם וַ/יִּתֵּ֖ן עַל קַרְנ֣וֹת הַ/מִּזְבֵּ֑חַ וְ/אֶת הַ/דָּ֣ם יָצַ֔ק אֶל
    יְס֖וֹד הַ/מִּזְבֵּֽחַ־־־־׃
translation:
  text: And Aaron’s sons brought the blood to him, and he dipped his finger in the
    blood and put it on the horns of the altar, and he poured out the blood at the
    base of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented the blood to him'; the Hebrew verb can mean 'brought near'
      in a ritual setting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the horns of the altar,' referring to the altar’s projecting
      corners.
    reason: cultural_note
  - marker: c
    text: Or 'to the foundation of the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִבוּ
  chosen: brought
  alternatives:
  - presented
  - brought near
  lexicon: HALOT
  rationale: The verb קרב in Hiphil means to bring near/present. In this ritual context,
    'brought' is natural modern English while still preserving the movement of the
    blood to Aaron.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Aaron’s sons' is idiomatic English
    and preserves the familial and priestly identification.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Definite article retained. The blood is the specific sacrificial blood
    already in view.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Aaron
  lexicon: HALOT
  rationale: The pronominal object naturally refers to Aaron from the preceding context.
    The translation keeps the pronoun as in the Hebrew rather than replacing it with
    the name.
- source_word: וַיִּטְבֹּל
  chosen: dipped
  alternatives:
  - immersed
  lexicon: HALOT
  rationale: טבל commonly means dip/immerse. 'Dipped' best fits the finger-in-blood
    action in clear English.
- source_word: אֶצְבָּעוֹ
  chosen: his finger
  lexicon: HALOT
  rationale: Simple possessive noun; singular retained.
- source_word: וַיִּתֵּן עַל
  chosen: put it on
  alternatives:
  - applied to
  - placed on
  lexicon: HALOT
  rationale: נתן with על here describes ritual application of blood. 'Put it on' is
    direct and readable; the object 'it' is supplied naturally in English from the
    blood just mentioned.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  chosen: the horns of the altar
  lexicon: HALOT
  rationale: A standard cultic expression referring to the altar's horn-like projections.
    The literal rendering should be preserved.
- source_word: יָצַק
  chosen: poured out
  alternatives:
  - poured
  lexicon: HALOT
  rationale: The verb means pour/cast. 'Poured out' fits sacrificial-liquid usage
    in English and conveys deliberate emptying.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  chosen: at the base of the altar
  alternatives:
  - to the foundation of the altar
  lexicon: HALOT
  rationale: יְסוֹד literally means foundation/base. In altar context, 'base' is the
    clearest natural rendering; 'at' reflects the practical sense of pouring the blood
    down to the altar's base.
