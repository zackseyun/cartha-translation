id: LEV.9.8
reference: Leviticus 9:8
source:
  edition: WLC
  text: וַ/יִּקְרַ֥ב אַהֲרֹ֖ן אֶל הַ/מִּזְבֵּ֑חַ וַ/יִּשְׁחַ֛ט אֶת עֵ֥גֶל הַ/חַטָּ֖את
    אֲשֶׁר לֽ/וֹ־־־׃
translation:
  text: Then Aaron came near to the altar and slaughtered the calf of the sin offering
    that was for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the calf of the purification offering.' The Hebrew term can refer to
      the offering associated with sin and impurity removal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרַב
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb קרב in the wayyiqtol form denotes approaching or coming near.
    'Came near' preserves the concrete movement toward the altar and fits the cultic
    setting without sounding overly wooden.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח in sacrificial contexts.
- source_word: וַיִּשְׁחַט
  chosen: slaughtered
  alternatives:
  - killed
  - slew
  lexicon: HALOT
  rationale: In sacrificial contexts שחט refers specifically to ritual slaughter.
    'Slaughtered' is more precise than the generic 'killed' and more natural in modern
    English than 'slew.'
- source_word: עֵגֶל
  chosen: the calf
  alternatives:
  - young bull
  - bull calf
  lexicon: HALOT
  rationale: עגל commonly denotes a calf or young bovine. 'Calf' is the most direct
    rendering here and matches the sacrificial animal specified earlier in context.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  - the sin sacrifice
  lexicon: HALOT
  rationale: חטאת can denote either sin or the sin offering. In sacrificial legislation
    it commonly refers to the offering itself. 'Sin offering' is the established and
    clear rendering, though 'purification offering' is a possible contextual nuance
    in priestly texts.
- source_word: אֲשֶׁר לוֹ
  chosen: that was for himself
  alternatives:
  - which belonged to him
  - that was his
  lexicon: HALOT
  rationale: The phrase identifies this offering as Aaron's own, in contrast to offerings
    for the people in the surrounding context. 'For himself' makes the sacrificial
    function explicit in idiomatic English and reflects the contextual force better
    than the more ambiguous 'that was his.'
