theological_decisions:
- issue: Rendering חטאת in priestly sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: While some modern scholarship emphasizes the purificatory function of
    חטאת in Leviticus, the Hebrew term here straightforwardly denotes the sacrificial
    category. 'Sin offering' remains the clearest main-text rendering in English,
    while the alternative is preserved in a footnote because it can illuminate the
    ritual nuance without overstating a debated interpretive conclusion.
  doctrine_reference: Translation philosophy §3, §5
