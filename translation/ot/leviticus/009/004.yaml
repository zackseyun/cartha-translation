id: LEV.9.4
reference: Leviticus 9:4
source:
  edition: WLC
  text: וְ/שׁ֨וֹר וָ/אַ֜יִל לִ/שְׁלָמִ֗ים לִ/זְבֹּ֨חַ֙ לִ/פְנֵ֣י יְהוָ֔ה וּ/מִנְחָ֖ה בְּלוּלָ֣ה בַ/שָּׁ֑מֶן כִּ֣י הַ/יּ֔וֹם יְהוָ֖ה נִרְאָ֥ה אֲלֵי/כֶֽם׃
translation:
  text: and an ox and a ram for peace offerings, to sacrifice before Yahweh, and a grain offering mixed with oil; for today Yahweh will appear to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD'; the divine name is יְהוָה (YHWH).
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  lexicon: HALOT
  rationale: שׁוֹר is a bovine animal term. 'Ox' is a broad, natural English rendering that fits a sacrificial animal without over-specifying sex; 'bull' is possible in some contexts but is not demanded by this form alone.
- source_word: אַיִל
  chosen: ram
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: אַיִל specifically denotes a ram. 'Ram' is the standard precise rendering in sacrificial contexts.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: The plural sacrificial term traditionally rendered 'peace offerings' refers to the well-being/fellowship sacrifice. 'Peace offerings' is retained as a familiar and sufficiently accurate cultic term; alternatives are viable but less established in English Bible usage.
- source_word: לִזְבֹּחַ
  chosen: to sacrifice
  alternatives:
  - to slaughter
  lexicon: HALOT
  rationale: The infinitive of זבח in sacrificial context means to offer by sacrifice. 'To sacrifice' communicates the cultic action clearly; 'to slaughter' is more literal at the physical level but underplays the ritual sense in context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD' is concise, idiomatic, and preserves the covenantal setting. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In Levitical sacrificial legislation, מִנְחָה is the established cereal/grain offering. 'Grain offering' is clearer for modern readers than the broader 'offering' and more contextually specific than 'tribute offering' here.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participle plus prepositional phrase describes the grain offering as prepared by mixing with oil. 'Mixed with oil' is natural modern English; 'mingled' is accurate but archaic.
- source_word: כִּי הַיּוֹם
  chosen: for today
  alternatives:
  - because today
  - for on this day
  lexicon: HALOT
  rationale: כִּי introduces the reason for bringing these offerings. 'For today' gives a smooth causal connection in English while preserving the temporal emphasis of הַיּוֹם.
- source_word: נִרְאָה אֲלֵיכֶם
  chosen: will appear to you
  alternatives:
  - is appearing to you
  - has appeared to you
  lexicon: HALOT
  rationale: 'Though morphologically a Niphal perfect, in this context it has imminent/future force: the LORD is about to manifest himself in response to the ritual. English future best captures the sense in context.'
