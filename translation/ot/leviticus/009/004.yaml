theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the divine manifestation statement
  chosen_reading: the LORD will appear to you
  alternative_readings:
  - the glory of the LORD will appear to you
  - the LORD has appeared to you
  rationale: The Hebrew text here names יְהוָה directly, not 'the glory of the LORD' as in the following verse. The translation preserves the wording of this verse without importing the fuller expression from nearby context. The verb is rendered with future force because the appearance is anticipated.
  doctrine_reference: Translation philosophy §1, §3
