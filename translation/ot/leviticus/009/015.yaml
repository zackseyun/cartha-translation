theological_decisions:
- issue: Meaning of חַטָּאת in sacrificial context
  chosen_reading: Rendered as 'sin offering' rather than 'sin.'
  alternative_readings:
  - sin
  rationale: In Leviticus 9 the context is explicitly sacrificial, and חַטָּאת regularly
    denotes the offering itself. This avoids flattening the cultic terminology into
    an abstract concept.
- issue: Sense of וַיְחַטְּאֵהוּ
  chosen_reading: Rendered functionally as performing the sin-offering rite with the
    goat.
  alternative_readings:
  - purified it
  - made atonement with it
  rationale: The Hebrew verb is semantically difficult in English. A wooden rendering
    like 'purified it' is possible but less clear with an animal as object; 'made
    atonement with it' imports a more specific theological term not directly expressed
    by this verb here. The chosen wording preserves the priestly ritual sense with
    minimal interpretive overreach.
