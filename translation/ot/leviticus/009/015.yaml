id: LEV.9.15
reference: Leviticus 9:15
source:
  edition: WLC
  text: וַ/יַּקְרֵ֕ב אֵ֖ת קָרְבַּ֣ן הָ/עָ֑ם וַ/יִּקַּ֞ח אֶת שְׂעִ֤יר הַֽ/חַטָּאת֙
    אֲשֶׁ֣ר לָ/עָ֔ם וַ/יִּשְׁחָטֵ֥/הוּ וַֽ/יְחַטְּאֵ֖/הוּ כָּ/רִאשֽׁוֹן־׃
translation:
  text: Then he presented the people's offering, and he took the goat of the sin offering
    that was for the people, and slaughtered it and made a sin offering with it, as
    with the first one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'offered it as a sin offering.' The Hebrew verb can also carry the sense
      of purifying/purging in priestly ritual contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: presented
  alternatives:
  - brought near
  - offered
  lexicon: HALOT
  rationale: In sacrificial context קרב in the Hiphil commonly means to present or
    bring forward an offering. 'Presented' is natural English and preserves the ritual
    sense without over-specifying the exact action as the whole offering process.
- source_word: קָרְבַּן הָעָם
  chosen: the people's offering
  alternatives:
  - the offering of the people
  - the people's قربן/oblation
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near. 'The people's
    offering' is clear modern English and reflects the construct phrase.
- source_word: שְׂעִיר הַחַטָּאת
  chosen: the goat of the sin offering
  alternatives:
  - the goat for the sin offering
  - the sin-offering goat
  lexicon: HALOT
  rationale: שְׂעִיר is a male goat. חַטָּאת in sacrificial contexts can denote the
    sin offering rather than abstract sin. The construct is best represented as 'the
    goat of the sin offering.'
- source_word: אֲשֶׁר לָעָם
  chosen: that was for the people
  alternatives:
  - which belonged to the people
  - which was for the people
  lexicon: HALOT
  rationale: 'ל marks relation or purpose here: this sacrificial animal is designated
    on behalf of the people, not merely possessed by them.'
- source_word: וַיִּשְׁחָטֵהוּ
  chosen: slaughtered it
  alternatives:
  - killed it
  - slew it
  lexicon: HALOT
  rationale: שָׁחַט is the standard verb for slaughtering sacrificial animals. 'Slaughtered'
    preserves the cultic nuance better than the generic 'killed.'
- source_word: וַיְחַטְּאֵהוּ
  chosen: made a sin offering with it
  alternatives:
  - purified it
  - de-sinned it
  - offered it as a sin offering
  lexicon: HALOT
  rationale: The Piel of חטא in priestly sacrificial contexts can mean to perform
    the sin-offering rite / purge. Since the object is the goat, English 'made a sin
    offering with it' best captures the ritual action without the awkwardness of 'purified
    it,' which could misleadingly suggest the goat itself was cleansed.
- source_word: כָּרִאשׁוֹן
  chosen: as with the first one
  alternatives:
  - as at first
  - like the first
  - according to the first procedure
  lexicon: HALOT
  rationale: The phrase points back to the previously offered sin offering in the
    chapter and indicates that the same procedure was followed. 'As with the first
    one' is idiomatic and contextually clear.
