id: LEV.9.13
reference: Leviticus 9:13
source:
  edition: WLC
  text: וְ/אֶת הָ/עֹלָ֗ה הִמְצִ֧יאוּ אֵלָ֛י/ו לִ/נְתָחֶ֖י/הָ וְ/אֶת הָ/רֹ֑אשׁ וַ/יַּקְטֵ֖ר
    עַל הַ/מִּזְבֵּֽחַ־־־׃
translation:
  text: And they brought the burnt offering to him, piece by piece, and the head;
    and he burned them on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in its pieces.' The Hebrew refers to the animal's cut sections being
      brought to Aaron in parts.
    reason: lexical_alternative
  - marker: b
    text: The verb can more specifically mean 'offered up in smoke' in sacrificial
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  - the ascent offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for the offering wholly turned
    into smoke; 'burnt offering' is the established and accurate English equivalent
    in Levitical context. 'Ascent offering' is more etymologically transparent but
    less natural in English.
- source_word: הִמְצִיאוּ אֵלָיו
  chosen: they brought ... to him
  alternatives:
  - they presented ... to him
  lexicon: HALOT
  rationale: The Hiphil of מצא here carries the sense of causing to come/bringing
    near in ritual handling. 'Brought to him' is natural English and fits the sequence
    of priests handing portions to Aaron.
- source_word: לִנְתָחֶיהָ
  chosen: piece by piece
  alternatives:
  - according to its pieces
  - in its pieces
  lexicon: HALOT
  rationale: נֶתַח refers to cut pieces or sections of a slaughtered animal. The prefixed
    ל here marks distribution or arrangement. 'Piece by piece' communicates the idiomatic
    sense in readable English while preserving the segmented presentation.
- source_word: הָרֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: A straightforward anatomical term; retained literally because the verse
    distinguishes the head from the other cut pieces.
- source_word: וַיַּקְטֵר
  chosen: he burned them
  alternatives:
  - he turned them into smoke
  - he offered them up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts קטר denotes burning on the altar so as to produce
    smoke as an offering. 'Burned them' is concise and natural; the object is understood
    collectively from the pieces and the head. The more explicit 'turned them into
    smoke' is possible but less idiomatic in English main text.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard cultic expression. 'On the altar' is clear modern English without
    loss of meaning.
