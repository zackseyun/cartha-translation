id: LEV.9.18
reference: Leviticus 9:18
source:
  edition: WLC
  text: וַ/יִּשְׁחַ֤ט אֶת הַ/שּׁוֹר֙ וְ/אֶת הָ/אַ֔יִל זֶ֥בַח הַ/שְּׁלָמִ֖ים אֲשֶׁ֣ר
    לָ/עָ֑ם וַ֠/יַּמְצִאוּ בְּנֵ֨י אַהֲרֹ֤ן אֶת הַ/דָּם֙ אֵלָ֔י/ו וַ/יִּזְרְקֵ֥/הוּ
    עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־־׃
translation:
  text: Then he slaughtered the ox and the ram, the sacrifice of peace offerings that
    was for the people. Aaron’s sons brought the blood to him, and he splashed it
    against the altar on all sides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacrifice of fellowship offerings' or 'the sacrifice of well-being
      offerings.' The Hebrew שְׁלָמִים carries associations of peace, wholeness, and
      communion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט
  chosen: Then he slaughtered
  alternatives:
  - And he slaughtered
  - Then he killed
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then' captures the sequence
    naturally in English. 'Slaughtered' is the standard sacrificial term and is more
    precise than the generic 'killed.'
- source_word: הַשּׁוֹר
  chosen: the ox
  alternatives:
  - the bull
  lexicon: HALOT
  rationale: שׁוֹר can denote an ox/bovine. 'Ox' is a natural rendering here and avoids
    over-specifying sex where the immediate lexical item itself does not require emphasis
    beyond the sacrificial animal.
- source_word: הָאַיִל
  chosen: the ram
  lexicon: HALOT
  rationale: אַיִל specifically denotes a ram; 'ram' is the straightforward and precise
    rendering.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the sacrifice of well-being offerings
  lexicon: HALOT
  rationale: Formally, the phrase is 'sacrifice of peace offerings.' While some modern
    versions prefer 'fellowship offerings' or 'offerings of well-being' to bring out
    the relational/resultative sense of שְׁלָמִים, 'peace offerings' preserves the
    traditional lexical link to שׁלום and remains understandable in English.
- source_word: אֲשֶׁר לָעָם
  chosen: that was for the people
  alternatives:
  - which belonged to the people
  - for the people
  lexicon: HALOT
  rationale: The relative clause identifies these offerings as those presented on
    behalf of the people. 'That was for the people' is clear and idiomatic.
- source_word: וַיַּמְצִאוּ
  chosen: brought
  alternatives:
  - presented
  - handed
  lexicon: HALOT
  rationale: In sacrificial procedure this verb conveys bringing/presenting something
    to the officiant. 'Brought' is simple, accurate, and idiomatic.
- source_word: אֶת הַדָּם אֵלָיו
  chosen: the blood to him
  alternatives:
  - the blood to Aaron
  lexicon: HALOT
  rationale: The pronoun refers back to Aaron in context. The main text keeps the
    pronoun as in Hebrew, while the syntax makes the referent clear enough in English.
- source_word: וַיִּזְרְקֵהוּ
  chosen: he splashed it
  alternatives:
  - he threw it
  - he dashed it
  - he sprinkled it
  lexicon: HALOT
  rationale: For sacrificial blood application, זָרַק commonly denotes tossing/splashing
    against the altar rather than the lighter 'sprinkling.' 'Splashed it' communicates
    the ritual action vividly and accurately.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  chosen: against the altar on all sides
  alternatives:
  - on the altar all around
  - against the altar all around
  lexicon: HALOT
  rationale: The phrase describes blood application around the altar's sides. 'Against
    the altar on all sides' reflects both the directional force of עַל in this ritual
    context and the distributive sense of סָבִיב.
