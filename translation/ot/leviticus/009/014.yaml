id: LEV.9.14
reference: Leviticus 9:14
source:
  edition: WLC
  text: וַ/יִּרְחַ֥ץ אֶת הַ/קֶּ֖רֶב וְ/אֶת הַ/כְּרָעָ֑יִם וַ/יַּקְטֵ֥ר עַל הָ/עֹלָ֖ה
    הַ/מִּזְבֵּֽחָ/ה־־־׃
translation:
  text: He washed the entrails and the lower legs, and he turned them into smoke on
    the altar, on top of the burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he offered them up in smoke on the altar over the burnt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְחַץ
  chosen: he washed
  alternatives:
  - he rinsed
  lexicon: HALOT
  rationale: The verb רחץ in sacrificial contexts refers to washing with water. 'Washed'
    is the standard clear English equivalent and fits the ritual action.
- source_word: הַקֶּרֶב
  chosen: the entrails
  alternatives:
  - the inner parts
  - the inward parts
  lexicon: HALOT
  rationale: קֶרֶב can mean the inner part or midst generally, but in sacrificial
    instructions it refers concretely to the internal organs/innards. 'Entrails' is
    specific and natural in this cultic context.
- source_word: הַכְּרָעָיִם
  chosen: the lower legs
  alternatives:
  - the legs
  lexicon: HALOT
  rationale: כְּרָעַיִם denotes the legs/shanks of an animal, especially the lower
    legs. 'Lower legs' preserves the likely anatomical specificity better than the
    broader 'legs'.
- source_word: וַיַּקְטֵר
  chosen: he turned them into smoke
  alternatives:
  - he burned
  - he offered up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in priestly sacrificial contexts commonly means to
    make a sacrifice go up in smoke on the altar, not merely to burn in a generic
    sense. 'Turned them into smoke' preserves the ritual nuance of altar offering.
- source_word: עַל
  chosen: on top of
  alternatives:
  - 'on'
  - upon
  - over
  lexicon: HALOT
  rationale: Here עַל marks placement upon something already on the altar. Because
    the phrase is עַל הָעֹלָה הַמִּזְבֵּחָה, 'on top of the burnt offering' best conveys
    that these parts were placed over the burnt offering already on the altar.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for the whole burnt offering.
    'Burnt offering' is the conventional and readily understood English rendering.
- source_word: הַמִּזְבֵּחָה
  chosen: the altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ is straightforwardly 'altar.' The directional ending does not
    require a distinct English rendering here beyond the prepositional phrase.
