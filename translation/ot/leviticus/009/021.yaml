id: LEV.9.21
reference: Leviticus 9:21
source:
  edition: WLC
  text: וְ/אֵ֣ת הֶ/חָז֗וֹת וְ/אֵת֙ שׁ֣וֹק הַ/יָּמִ֔ין הֵנִ֧יף אַהֲרֹ֛ן תְּנוּפָ֖ה
    לִ/פְנֵ֣י יְהוָ֑ה כַּ/אֲשֶׁ֖ר צִוָּ֥ה מֹשֶֽׁה׃
translation:
  text: And Aaron waved the breasts and the right thigh as a wave offering before
    the LORD, just as Moses had commanded.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הֶחָזוֹת
  chosen: the breasts
  alternatives:
  - the breasts/pieces of breast meat
  - the chests
  lexicon: HALOT
  rationale: חָזֶה in sacrificial contexts refers to the breast portion of the animal.
    The plural here is naturally rendered 'the breasts,' matching the ritual portions
    described elsewhere in Leviticus.
- source_word: שׁוֹק הַיָּמִין
  chosen: the right thigh
  alternatives:
  - the right leg
  - the right shank
  lexicon: HALOT
  rationale: שׁוֹק denotes the leg/thigh portion. In sacrificial legislation, 'thigh'
    is the standard and sufficiently precise English rendering; 'right' translates
    הַיָּמִין directly.
- source_word: הֵנִיף
  chosen: waved
  alternatives:
  - presented by waving
  - elevated
  lexicon: HALOT
  rationale: The Hiphil of נוּף in priestly sacrificial contexts denotes the ritual
    act of waving a portion before YHWH. 'Waved' is concise, idiomatic, and preserves
    the cultic action without paraphrase.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - a wave offering
  - for a wave offering
  lexicon: HALOT
  rationale: תְּנוּפָה is the technical noun for the wave offering/ritual wave presentation.
    Rendering it with the established cultic phrase 'wave offering' preserves the
    formal sacrificial terminology.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is the standard
    concise rendering in sacrificial contexts. Per doctrine, יְהוָה is rendered 'the
    LORD' rather than transliterated.
- source_word: כַּאֲשֶׁר צִוָּה מֹשֶׁה
  chosen: just as Moses had commanded
  alternatives:
  - as Moses commanded
  - according to what Moses commanded
  lexicon: HALOT
  rationale: The clause marks conformity to prior instruction. English past perfect
    ('had commanded') fits the sequence naturally, since Moses' command precedes Aaron's
    action.
- source_word: וְאֵת ... וְאֵת
  chosen: the breasts and the right thigh
  alternatives:
  - both the breasts and the right thigh
  lexicon: HALOT
  rationale: The repeated object marker simply coordinates the two direct objects.
    English does not require repeating 'the' structure beyond natural coordination.
