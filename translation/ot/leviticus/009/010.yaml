theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote both sin and the offering associated with
    removing impurity/sin. In this verse, the traditional cultic category 'sin offering'
    is retained in the main text for clarity and continuity, while the functional
    nuance 'purification offering' is preserved in a footnote.
  doctrine_reference: Translation philosophy §3; §5
