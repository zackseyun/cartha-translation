id: LEV.9.10
reference: Leviticus 9:10
source:
  edition: WLC
  text: וְ/אֶת הַ/חֵ֨לֶב וְ/אֶת הַ/כְּלָיֹ֜ת וְ/אֶת הַ/יֹּתֶ֤רֶת מִן הַ/כָּבֵד֙ מִן
    הַ֣/חַטָּ֔את הִקְטִ֖יר הַ/מִּזְבֵּ֑חָ/ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־־׃
translation:
  text: And the fat, the kidneys, and the lobe from the liver from the sin offering
    he turned into smoke on the altar, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew term can emphasize the offering's
      role in removing impurity as well as dealing with sin.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - fat portions
  lexicon: HALOT
  rationale: In sacrificial contexts חֵלֶב refers to the fatty portions reserved for
    offering. 'Fat' is the most direct rendering; 'fat portions' is possible but slightly
    more interpretive.
- source_word: כְּלָיֹת
  chosen: kidneys
  lexicon: HALOT
  rationale: The anatomical reference is straightforward. 'Kidneys' preserves the
    concrete sacrificial detail of the Hebrew.
- source_word: יֹּתֶרֶת מִן־הַכָּבֵד
  chosen: the lobe from the liver
  alternatives:
  - the appendage of the liver
  - the long lobe of the liver
  lexicon: HALOT
  rationale: This phrase denotes the extra lobe/appendage associated with the liver
    removed in sacrifice. 'Lobe from the liver' is readable modern English while staying
    close to the Hebrew construction.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: While some argue that חַטָּאת in priestly sacrificial contexts can be
    rendered 'purification offering,' 'sin offering' remains the clearest and most
    widely recognized rendering here. The alternative is worth preserving because
    it reflects a legitimate scholarly nuance about the offering's function.
- source_word: הִקְטִיר
  chosen: turned into smoke
  alternatives:
  - burned
  - offered up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers specifically to causing
    an offering to go up in smoke on the altar, not merely generic burning. 'Turned
    into smoke' preserves that cultic nuance better than simply 'burned.'
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: With the directional ending, the form can indicate motion toward the
    altar, but in English the idiomatic sacrificial expression is 'on the altar,'
    especially with הִקְטִיר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the translation's
    stated policy.
