id: LEV.9.12
reference: Leviticus 9:12
source:
  edition: WLC
  text: וַ/יִּשְׁחַ֖ט אֶת הָ/עֹלָ֑ה וַ֠/יַּמְצִאוּ בְּנֵ֨י אַהֲרֹ֤ן אֵלָי/ו֙ אֶת הַ/דָּ֔ם
    וַ/יִּזְרְקֵ֥/הוּ עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־׃
translation:
  text: Then he slaughtered the burnt offering, and Aaron’s sons brought the blood
    to him, and he splashed it against the altar on all sides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dashed it against the altar all around.' The Hebrew verb for applying
      the blood suggests a forceful casting, not a light sprinkling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט
  chosen: Then he slaughtered
  alternatives:
  - And he slaughtered
  - Then he killed
  lexicon: HALOT
  rationale: The verb שָׁחַט in sacrificial context specifically denotes ritual slaughter,
    not merely generic killing. 'Then' reflects the narrative waw in smooth English
    sequence.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascending offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for the whole burnt offering.
    'Burnt offering' is the established and accurate cultic equivalent in English.
- source_word: וַיַּמְצִאוּ
  chosen: brought
  alternatives:
  - presented
  - handed
  lexicon: HALOT
  rationale: In this ritual context the sons of Aaron bring or present the blood to
    Aaron for priestly application. 'Brought' is natural English and fits the procedural
    sense.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: Both are accurate; 'Aaron’s sons' is slightly more natural in contemporary
    English while preserving the familial and priestly identification.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: Simple directional phrase referring to Aaron; 'to him' is clear modern
    English.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Definite object in the sacrificial procedure; no expansion is needed.
- source_word: וַיִּזְרְקֵהוּ
  chosen: he splashed it
  alternatives:
  - he threw it
  - he dashed it
  - he sprinkled it
  lexicon: HALOT
  rationale: זָרַק in sacrificial contexts commonly refers to tossing or dashing blood
    against the altar, stronger than fine 'sprinkling.' 'Splashed it' communicates
    the ritual action in accessible modern English without understating the force.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With blood manipulation, English 'against the altar' better conveys the
    physical action of casting blood onto the altar's sides than the more static 'on
    the altar.'
- source_word: סָבִיב
  chosen: on all sides
  alternatives:
  - all around
  - around it
  lexicon: HALOT
  rationale: This adverb indicates application around the altar. 'On all sides' is
    clear and idiomatic, preserving the distributive sense.
