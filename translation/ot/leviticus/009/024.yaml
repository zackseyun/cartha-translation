id: LEV.9.24
reference: Leviticus 9:24
source:
  edition: WLC
  text: וַ/תֵּ֤צֵא אֵשׁ֙ מִ/לִּ/פְנֵ֣י יְהוָ֔ה וַ/תֹּ֨אכַל֙ עַל הַ/מִּזְבֵּ֔חַ אֶת
    הָ/עֹלָ֖ה וְ/אֶת הַ/חֲלָבִ֑ים וַ/יַּ֤רְא כָּל הָ/עָם֙ וַ/יָּרֹ֔נּוּ וַֽ/יִּפְּל֖וּ
    עַל פְּנֵי/הֶֽם־־־־־׃
translation:
  text: And fire came out from before the LORD and consumed on the altar the burnt
    offering and the fat portions. And all the people saw, and they shouted for joy
    and fell on their faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of the LORD'; Hebrew literally 'from before the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they gave a jubilant shout.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא אֵשׁ
  chosen: fire came out
  alternatives:
  - fire went out
  - a fire came out
  lexicon: HALOT
  rationale: 'The verb יצא with אֵשׁ is straightforwardly motion outward: ''came out''
    is natural modern English and preserves the vivid narrative sequence. The anarthrous
    אֵשׁ does not require the indefinite article in English here.'
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from before the LORD
  alternatives:
  - from the presence of the LORD
  - from before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' 'From before the LORD'
    preserves the Hebrew idiom and the sense that the fire proceeds from Yahweh's
    presence. Per doctrine, יְהוָה is rendered 'the LORD,' while 'Yahweh' is preserved
    as an alternative.
- source_word: וַתֹּאכַל
  chosen: consumed
  alternatives:
  - ate up
  - devoured
  lexicon: HALOT
  rationale: Although the verb is literally 'ate,' English idiom for fire taking up
    a sacrifice is 'consumed.' This is an optimal-equivalence rendering that preserves
    the sacrificial context without awkwardness.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard and accurate rendering of the prepositional phrase; 'on' is
    idiomatic modern English.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the established sacrificial term for the offering wholly turned
    into smoke. 'Burnt offering' is the clearest standard English equivalent.
- source_word: הַחֲלָבִים
  chosen: the fat portions
  alternatives:
  - the fat
  - the choice fat pieces
  lexicon: HALOT
  rationale: In sacrificial contexts, חֲלָבִים refers not merely to generic fat but
    to the designated fatty pieces offered to God. 'Fat portions' communicates this
    cultic specificity better than bare 'fat.'
- source_word: וַיַּרְא כָּל הָעָם
  chosen: all the people saw
  alternatives:
  - the whole people saw
  - all the people looked on
  lexicon: HALOT
  rationale: Simple narrative statement; 'all the people saw' is direct and natural.
- source_word: וַיָּרֹנּוּ
  chosen: they shouted for joy
  alternatives:
  - they gave a shout
  - they sang out
  - they rejoiced with a shout
  lexicon: HALOT
  rationale: The root רנן can denote a ringing cry of joy, jubilation, or exultant
    shout. In this immediate reaction to divine fire, 'shouted for joy' best captures
    the spontaneous jubilant outcry without implying a formal song.
- source_word: וַיִּפְּלוּ עַל פְּנֵיהֶם
  chosen: fell on their faces
  alternatives:
  - fell facedown
  - prostrated themselves
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for bodily prostration in awe or worship.
    'Fell on their faces' preserves the concrete imagery and remains readable.
