id: LEV.9.1
reference: Leviticus 9:1
source:
  edition: WLC
  text: וַ/יְהִי֙ בַּ/יּ֣וֹם הַ/שְּׁמִינִ֔י קָרָ֣א מֹשֶׁ֔ה לְ/אַהֲרֹ֖ן וּ/לְ/בָנָ֑י/ו
    וּ/לְ/זִקְנֵ֖י יִשְׂרָאֵֽל׃
translation:
  text: And it happened on the eighth day that Moses called Aaron and his sons and
    the elders of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned' for 'called'; the Hebrew verb can carry either sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces a new narrative moment. 'And
    it happened' preserves the Hebrew narrative transition in readable modern English
    without the archaic feel of 'came to pass.'
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: on the eighth day
  alternatives:
  - on the eighth day after that
  - on the eighth day
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On the eighth day' is the plain sense
    and avoids adding explanatory material not explicit in the Hebrew, though the
    context is the day following the seven-day ordination period.
- source_word: קָרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb commonly means 'call' or 'summon.' 'Called' is the most direct
    rendering; 'summoned' is possible but slightly more interpretive and formal than
    the context requires.
- source_word: לְאַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: וּלְבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בנים here refers specifically to Aaron's male offspring serving in the
    priestly context, so 'sons' is both lexically precise and contextually necessary.
- source_word: וּלְזִקְנֵי יִשְׂרָאֵל
  chosen: and the elders of Israel
  alternatives:
  - and Israel's elders
  lexicon: HALOT
  rationale: A standard construct phrase meaning the recognized leaders or senior
    representatives of Israel. 'The elders of Israel' is the natural and established
    English equivalent.
