theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can emphasize either the offense or the rite's purificatory
    effect. In Levitical sacrificial instructions, both senses are discussed in scholarship.
    The main text keeps the familiar and contextually valid 'sin offering,' while
    preserving 'purification offering' in a footnote to avoid collapsing the lexical
    range.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Rendering of כפר
  chosen_reading: make atonement
  alternative_readings:
  - make expiation
  - purge
  rationale: The Hebrew verb carries sacrificial reconciliation/purification force.
    'Make atonement' is broad enough to preserve the text's theological weight without
    importing a narrower doctrinal model.
  doctrine_reference: Do not import doctrinal claims the text does not make; readable
    modern English without flattening theological weight.
