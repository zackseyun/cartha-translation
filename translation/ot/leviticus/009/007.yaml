id: LEV.9.7
reference: Leviticus 9:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶֽל אַהֲרֹ֗ן קְרַ֤ב אֶל הַ/מִּזְבֵּ֨חַ֙ וַ/עֲשֵׂ֞ה אֶת
    חַטָּֽאתְ/ךָ֙ וְ/אֶת עֹ֣לָתֶ֔/ךָ וְ/כַפֵּ֥ר בַּֽעַדְ/ךָ֖ וּ/בְעַ֣ד הָ/עָ֑ם וַ/עֲשֵׂ֞ה
    אֶת קָרְבַּ֤ן הָ/עָם֙ וְ/כַפֵּ֣ר בַּֽעֲדָ֔/ם כַּ/אֲשֶׁ֖ר צִוָּ֥ה יְהוָֽה־־־־־׃
translation:
  text: And Moses said to Aaron, “Come near to the altar, and offer your sin offering
    and your burnt offering, and make atonement for yourself and for the people. Then
    offer the people's offering, and make atonement for them, just as the LORD commanded.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your purification offering.' The Hebrew term חַטָּאת can refer to the
      sin offering, with emphasis in some contexts on purification from impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרַב
  chosen: Come near
  alternatives:
  - Approach
  - Draw near
  lexicon: HALOT
  rationale: Imperative of קרב in cultic context means to approach/draw near. 'Come
    near' is natural modern English and preserves the direct summons to Aaron.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard cultic referent; definite article preserved.
- source_word: וַעֲשֵׂה
  chosen: offer
  alternatives:
  - perform
  - make
  lexicon: HALOT
  rationale: Although עשה is literally 'do/make,' with sacrificial objects in context
    it idiomatically means to perform or offer the sacrifice. 'Offer' best conveys
    the cultic action in clear English.
- source_word: חַטָּאתְךָ
  chosen: your sin offering
  alternatives:
  - your purification offering
  lexicon: HALOT
  rationale: חטאת can denote either 'sin' or the sacrifice addressing sin/impurity.
    In sacrificial legislation it commonly refers to the offering itself. 'Sin offering'
    is the established and still accurate rendering; 'purification offering' is a
    viable alternative emphasizing ritual cleansing, preserved in a footnote.
- source_word: עֹלָתֶךָ
  chosen: your burnt offering
  lexicon: HALOT
  rationale: עלה in sacrificial usage refers to the whole burnt offering. Traditional
    rendering is precise here.
- source_word: וְכַפֵּר
  chosen: make atonement
  alternatives:
  - purge
  - ransom
  lexicon: HALOT
  rationale: כפר in priestly sacrificial context is best rendered 'make atonement.'
    This preserves the theological and ritual sense without over-specifying a theory
    of atonement.
- source_word: בַּעַדְךָ וּבְעַד הָעָם
  chosen: for yourself and for the people
  alternatives:
  - on behalf of yourself and on behalf of the people
  lexicon: HALOT
  rationale: בעד marks representation/benefit. 'For' is idiomatic and sufficient in
    English; the representative sense is inherent in the sacrificial context.
- source_word: קָרְבַּן הָעָם
  chosen: the people's offering
  alternatives:
  - the offering of the people
  - the people's قربן
  lexicon: HALOT
  rationale: קרבן is a general term for an offering/presentation brought near. 'The
    people's offering' is concise, natural, and preserves the construct relationship.
- source_word: בַּעֲדָם
  chosen: for them
  alternatives:
  - on their behalf
  lexicon: HALOT
  rationale: Same preposition בעד as earlier; concise English keeps the representative
    force in context.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה
  chosen: just as the LORD commanded
  alternatives:
  - as the LORD commanded
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces conformity to divine command. 'Just as' slightly
    highlights exact obedience. יְהוָה follows project default 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Project doctrine specifies the default rendering 'the LORD' for the divine
    name, preserving reverential convention and alignment with longstanding English
    Bible practice.
