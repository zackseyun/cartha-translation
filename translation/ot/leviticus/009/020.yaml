id: LEV.9.20
reference: Leviticus 9:20
source:
  edition: WLC
  text: וַ/יָּשִׂ֥ימוּ אֶת הַ/חֲלָבִ֖ים עַל הֶ/חָז֑וֹת וַ/יַּקְטֵ֥ר הַ/חֲלָבִ֖ים הַ/מִּזְבֵּֽחָ/ה־־׃
translation:
  text: They placed the fat pieces on the breasts, and he burned the fat pieces on
    the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he turned the fat pieces into smoke on the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: They placed
  alternatives:
  - they put
  - they set
  lexicon: HALOT
  rationale: From שׂים, a common verb meaning to put/place/set. 'Placed' is natural
    modern English and fits the ritual action without overinterpreting.
- source_word: הַחֲלָבִים
  chosen: the fat pieces
  alternatives:
  - the fat
  - the choicest parts
  lexicon: HALOT
  rationale: Plural of חֵלֶב in sacrificial context refers to the portions of fat
    removed for offering. 'Fat pieces' makes the plural concrete in English and avoids
    sounding like an abstract substance only.
- source_word: עַל הֶחָזוֹת
  chosen: on the breasts
  alternatives:
  - upon the breasts
  - on the chests
  lexicon: HALOT
  rationale: חָזֶה in sacrificial legislation denotes the breast portion of the animal.
    'Breasts' is the standard cultic-anatomical rendering here; 'chests' would be
    less precise.
- source_word: וַיַּקְטֵר
  chosen: he burned
  alternatives:
  - he turned into smoke
  - he offered up in smoke
  lexicon: HALOT
  rationale: In priestly sacrificial contexts, קטר refers specifically to burning
    an offering on the altar, often with the nuance of producing smoke. 'He burned'
    is concise and clear; the altar phrase preserves the sacrificial setting.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with מזבח after קטר is idiomatically rendered
    'on the altar' in English sacrificial language, expressing the location of the
    burning rather than mere motion toward it.
