id: LEV.9.5
reference: Leviticus 9:5
source:
  edition: WLC
  text: וַ/יִּקְח֗וּ אֵ֚ת אֲשֶׁ֣ר צִוָּ֣ה מֹשֶׁ֔ה אֶל פְּנֵ֖י אֹ֣הֶל מוֹעֵ֑ד וַֽ/יִּקְרְבוּ֙ כָּל הָ֣/עֵדָ֔ה וַ/יַּֽעַמְד֖וּ לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: So they brought what Moses had commanded to the front of the tent of meeting, and all the congregation came near and stood before Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they brought
  alternatives:
  - they took
  - they fetched
  lexicon: HALOT
  rationale: Although the verb לקח commonly means 'take,' in this context with movement toward a destination ('to the front of the tent of meeting') idiomatic English prefers 'brought.' This preserves the action's directional sense without woodenly saying 'took.'
- source_word: אֵת אֲשֶׁר צִוָּה מֹשֶׁה
  chosen: what Moses had commanded
  alternatives:
  - that which Moses commanded
  lexicon: HALOT
  rationale: The object marker plus relative clause refers to the items/instructions previously specified. 'What Moses had commanded' is natural English and accurately captures the referential force.
- source_word: אֶל־פְּנֵי
  chosen: to the front of
  alternatives:
  - before
  - to the presence of
  lexicon: HALOT
  rationale: The idiom literally involves 'to the face/front of.' Here it is spatial, referring to location in front of the tent, not yet directly to divine presence. 'To the front of' best distinguishes it from the later לִפְנֵי יְהוָה, 'before the LORD.'
- source_word: אֹהֶל מוֹעֵד
  chosen: tent of meeting
  alternatives:
  - tabernacle
  - meeting tent
  lexicon: HALOT
  rationale: This is the standard transparent rendering of the Hebrew phrase. 'Tabernacle' is traditional but less literal and more ecclesiastical.
- source_word: וַיִּקְרְבוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb קרב denotes approaching. 'Came near' is clear modern English and avoids overly formal diction while preserving the movement toward a sacred setting.
- source_word: כָּל־הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה in priestly/narrative contexts commonly refers to the assembled community of Israel. 'Congregation' fits the communal-cultic setting better than the more generic 'assembly.'
- source_word: וַיַּעַמְדוּ
  chosen: stood
  alternatives:
  - took their stand
  - remained standing
  lexicon: HALOT
  rationale: The verb עמד straightforwardly means 'stand.' The simple English verb is sufficient here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is a standard covenantal/spatial-theological expression. 'Before the LORD' preserves both the physical and worshipful sense. Per doctrine, יְהוָה is rendered 'the LORD.'
