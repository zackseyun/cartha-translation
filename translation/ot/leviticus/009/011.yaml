id: LEV.9.11
reference: Leviticus 9:11
source:
  edition: WLC
  text: וְ/אֶת הַ/בָּשָׂ֖ר וְ/אֶת הָ/ע֑וֹר שָׂרַ֣ף בָּ/אֵ֔שׁ מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה־־׃
translation:
  text: But the flesh and the hide he burned with fire outside the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And the flesh and the skin he burned in the fire outside the camp.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction with the object marker continues the sequence from the
    previous verse, but in English 'But' appropriately marks the contrast between
    what was offered on the altar (v. 10) and what was disposed of outside the camp
    here. This is a discourse-level choice rather than a direct lexical equivalent
    of אֵת, which is untranslated as an object marker.
- source_word: הַ/בָּשָׂר
  chosen: the flesh
  alternatives:
  - the meat
  lexicon: HALOT
  rationale: בָּשָׂר literally denotes flesh/meat. 'Flesh' is retained because it
    is the more formal and sacrificially precise term in cultic context, matching
    the physical remains of the offering rather than food prepared for eating.
- source_word: הָ/ע֑וֹר
  chosen: the hide
  alternatives:
  - the skin
  lexicon: HALOT
  rationale: עוֹר refers to the animal's skin/hide. 'Hide' fits sacrificial-animal
    context more naturally than 'skin' in English, while remaining clear and concrete.
- source_word: שָׂרַף
  chosen: he burned
  alternatives:
  - he burned up
  lexicon: HALOT
  rationale: The verb means to burn. 'He burned' is sufficient and avoids adding the
    completive nuance 'up' unless context requires it; the disposal action is already
    clear from the phrase 'outside the camp.'
- source_word: בָּ/אֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: The preposition plus 'fire' is idiomatically rendered 'with fire' in
    English for the means by which the flesh and hide were burned. 'By fire' is possible
    but slightly more wooden.
- source_word: מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: This phrase denotes location beyond the Israelite camp. 'Outside the
    camp' is the standard, natural rendering and preserves the ritual-geographical
    significance of removal from the sacred center.
