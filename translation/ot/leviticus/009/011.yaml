theological_decisions:
- issue: Ritual disposal language in sacrificial context
  chosen_reading: Translate concretely as the burning of the flesh and hide outside
    the camp without importing later theological symbolism.
  alternative_readings:
  - A typological rendering that foregrounds later biblical associations
  rationale: The verse describes priestly procedure in the sacrificial system. The
    translation should preserve the cultic action plainly and not build in theological
    interpretation beyond the Hebrew text itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
