theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and common biblical English usage while preserving
    covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temporal/sequential force between the clauses
  chosen_reading: Then the glory of the LORD appeared to all the people
  alternative_readings:
  - and the glory of the LORD appeared to all the people
  rationale: The Hebrew wayyiqtol sequence marks narrative progression. 'Then' makes
    the sequence clear in modern English without implying a stronger causal link than
    the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English,
    not archaic or academic'
