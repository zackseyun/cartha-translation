id: LEV.9.23
reference: Leviticus 9:23
source:
  edition: WLC
  text: וַ/יָּבֹ֨א מֹשֶׁ֤ה וְ/אַהֲרֹן֙ אֶל אֹ֣הֶל מוֹעֵ֔ד וַ/יֵּ֣צְא֔וּ וַֽ/יְבָרֲכ֖וּ
    אֶת הָ/עָ֑ם וַ/יֵּרָ֥א כְבוֹד יְהוָ֖ה אֶל כָּל הָ/עָֽם־־־־־׃
translation:
  text: Moses and Aaron went into the tent of meeting, and when they came out, they
    blessed the people. Then the glory of the LORD appeared to all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the glory of Yahweh appeared to all the people.' The main text follows
      the project's standard rendering of the divine name יְהוָה as 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  - the meeting tent
  lexicon: HALOT
  rationale: Standard rendering of the tabernacle-related phrase; kept in lowercase
    for readable modern English while preserving the technical cultic sense.
- source_word: וַיָּבֹא ... וַיֵּצְאוּ
  chosen: went into ... came out
  alternatives:
  - entered ... went out
  lexicon: HALOT
  rationale: Rendered with natural English movement verbs that preserve the sequence
    of actions. Although וַיָּבֹא is morphologically singular in the provided table,
    the coordinated subject 'Moses and Aaron' and following plural verbs support the
    sense 'went into' with both as subject.
- source_word: וַיְבָרֲכוּ
  chosen: they blessed
  alternatives:
  - they pronounced a blessing on
  - they blessed
  lexicon: HALOT
  rationale: Simple verbal rendering best matches the Hebrew and avoids over-specifying
    the form of the blessing.
- source_word: הָעָם / כָּל הָעָם
  chosen: the people / all the people
  alternatives:
  - the assembly / all the assembly
  lexicon: HALOT
  rationale: עָם here refers to the gathered covenant community; 'people' is the most
    natural and sufficiently broad English equivalent.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  - the glory of Yahweh
  lexicon: HALOT
  rationale: Preserves the weight of כָּבוֹד as manifest divine glory. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: HALOT
  rationale: The Niphal conveys visible manifestation; 'appeared' is idiomatic and
    appropriately theophanic in context.
- source_word: אֶל כָּל הָעָם
  chosen: to all the people
  alternatives:
  - before all the people
  - to the sight of all the people
  lexicon: HALOT
  rationale: אֶל after 'appeared' is naturally rendered 'to'; this keeps the directness
    of the manifestation without adding interpretive detail.
