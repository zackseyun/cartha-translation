theological_decisions:
- issue: Rendering of sacrificial terminology
  chosen_reading: Use established cultic terms 'sin offering,' 'burnt offering,' and
    'peace offerings' in the main text
  alternative_readings:
  - purification offering
  - whole burnt offering
  - fellowship offerings
  - offerings of well-being
  rationale: These terms are technical categories in Leviticus. Retaining the established
    English sacrificial labels preserves recognizability and intertextual consistency,
    while alternatives are preserved for auditability because they can foreground
    function or nuance differently.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
