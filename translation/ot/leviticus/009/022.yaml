id: LEV.9.22
reference: Leviticus 9:22
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א אַהֲרֹ֧ן אֶת יד/ו אֶל הָ/עָ֖ם וַֽ/יְבָרְכֵ֑/ם וַ/יֵּ֗רֶד מֵ/עֲשֹׂ֧ת
    הַֽ/חַטָּ֛את וְ/הָ/עֹלָ֖ה וְ/הַ/שְּׁלָמִֽים־־׃
translation:
  text: Then Aaron lifted up his hands toward the people and blessed them, and he
    came down from offering the sin offering, the burnt offering, and the peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his hand'; the Hebrew form is singular, but the gesture is commonly
      understood collectively as lifting the hands in blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'purification offering' for 'sin offering.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: lifted up
  alternatives:
  - raised
  lexicon: HALOT
  rationale: The verb נשׂא with 'hand(s)' commonly means to lift or raise. 'Lifted
    up' is idiomatic and preserves the physical gesture preceding the blessing.
- source_word: יָדוֹ
  chosen: his hands
  alternatives:
  - his hand
  lexicon: HALOT
  rationale: The consonantal form is singular with 3ms suffix ('his hand'), but in
    this idiom the sense is distributive/collective, and ancient versions and English
    usage commonly understand the priestly gesture as involving both hands. 'His hands'
    best conveys the natural English sense of the blessing gesture without changing
    the action.
- source_word: אֶל הָעָם
  chosen: toward the people
  alternatives:
  - to the people
  - over the people
  lexicon: HALOT
  rationale: אֶל marks direction. 'Toward the people' preserves the spatial orientation
    of Aaron's lifted hands; 'to the people' would also be possible but is slightly
    less vivid.
- source_word: וַיְבָרְכֵם
  chosen: and blessed them
  alternatives:
  - and pronounced a blessing on them
  lexicon: HALOT
  rationale: ברך in the piel straightforwardly means to bless. The simple English
    verb is clear and sufficiently formal.
- source_word: וַיֵּרֶד
  chosen: and he came down
  alternatives:
  - and he descended
  - and he stepped down
  lexicon: HALOT
  rationale: ירד means to go down/descend. 'Came down' is natural modern English and
    likely reflects descending from the altar area after completing the offerings.
- source_word: מֵעֲשֹׂת
  chosen: from offering
  alternatives:
  - after making
  - from performing
  lexicon: HALOT
  rationale: The infinitive construct of עשה after מן indicates movement or transition
    from the act just completed. In sacrificial context, 'from offering' communicates
    the cultic action more idiomatically than the more wooden 'from making'.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חטאת in Levitical sacrificial contexts is traditionally and accurately
    rendered 'sin offering.' 'Purification offering' highlights function, but 'sin
    offering' remains the more recognizable and contextually appropriate gloss.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עלה is the standard term for the burnt offering. The shorter traditional
    rendering is clear and sufficient here.
- source_word: הַשְּׁלָמִים
  chosen: the peace offerings
  alternatives:
  - the fellowship offerings
  - the offerings of well-being
  lexicon: HALOT
  rationale: שׁלמים is a technical sacrificial term. 'Peace offerings' preserves continuity
    with traditional English Bible usage; alternatives emphasize communal or well-being
    aspects but are less standard.
