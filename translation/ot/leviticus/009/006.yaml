id: LEV.9.6
reference: Leviticus 9:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה זֶ֧ה הַ/דָּבָ֛ר אֲשֶׁר צִוָּ֥ה יְהוָ֖ה תַּעֲשׂ֑וּ וְ/יֵרָ֥א אֲלֵי/כֶ֖ם כְּב֥וֹד יְהוָֽה־׃
translation:
  text: And Moses said, “This is the thing that Yahweh has commanded you to do, that the glory of Yahweh may appear to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the glory of the LORD will appear to you.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves the straightforward narrative flow without overinterpreting sequence.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: זֶה הַדָּבָר
  chosen: This is the thing
  alternatives:
  - This is what
  - This is the matter
  lexicon: HALOT
  rationale: 'The Hebrew is singular and concrete: literally ''this the thing/word.'' ''This is the thing'' keeps the formal force while remaining natural enough in English. ''This is what'' is smoother but slightly less explicit.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Simple relative marker introducing the clause modifying 'the thing.'
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: צוה commonly denotes authoritative command. 'Commanded' best preserves covenantal and cultic authority in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תַּעֲשׂוּ
  chosen: you to do
  alternatives:
  - do
  - you shall do
  lexicon: HALOT
  rationale: Second masculine plural imperfect functioning here as the content of the command. 'Commanded you to do' expresses the syntax naturally in English while preserving the plural addressees.
- source_word: וְיֵרָא
  chosen: so that ... may appear
  alternatives:
  - and ... will appear
  - then ... will appear
  lexicon: HALOT
  rationale: The form is a Niphal imperfect/jussive-like construction following an imperative context, expressing result or purpose. 'So that ... may appear' best captures the sense that obedience is followed by the manifestation of divine glory, without making the clause sound like a separate command.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: The preposition אֶל with appearance language is naturally rendered 'to you' here, indicating the recipients of the manifestation.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD’s glory
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. 'The glory of the LORD' preserves the weight and familiar biblical idiom of visible divine majesty.
