theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the final clause וְיֵרָא אֲלֵיכֶם כְּבוֹד יְהוָה
  chosen_reading: 'result/purpose: ''so that the glory of Yahweh may appear to you'''
  alternative_readings:
  - 'coordinate future: ''and the glory of the LORD will appear to you'''
  rationale: The Hebrew can be taken as a consequential promise following the commanded action. Rendering it with 'so that ... may appear' preserves the linkage between obedience and divine manifestation without overstating mechanistic causation. The alternative future reading is viable and worth preserving.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
