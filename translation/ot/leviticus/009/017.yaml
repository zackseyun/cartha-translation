id: LEV.9.17
reference: Leviticus 9:17
source:
  edition: WLC
  text: וַ/יַּקְרֵב֮ אֶת הַ/מִּנְחָה֒ וַ/יְמַלֵּ֤א כַפּ/וֹ֙ מִמֶּ֔/נָּה וַ/יַּקְטֵ֖ר
    עַל הַ/מִּזְבֵּ֑חַ מִ/לְּ/בַ֖ד עֹלַ֥ת הַ/בֹּֽקֶר־־׃
translation:
  text: Then he presented the grain offering, filled his hand from it, and burned
    it on the altar, besides the morning burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'filled his hand from it,' an idiom for taking a portion of the
      grain offering in his hand for burning on the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: presented
  alternatives:
  - brought near
  - offered
  lexicon: HALOT
  rationale: The verb קרב in the Hiphil commonly means to bring near/present in sacrificial
    contexts. 'Presented' is natural English and preserves the ritual sense without
    over-specifying beyond the Hebrew.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Levitical sacrificial legislation refers specifically to the
    grain offering. This is the established cultic sense here, not a generic gift.
- source_word: וַיְמַלֵּא כַפּוֹ מִמֶּנָּה
  chosen: filled his hand from it
  alternatives:
  - took a handful from it
  - filled his palm with some of it
  lexicon: HALOT
  rationale: Literally, 'filled his hand from it.' This idiom refers to taking a portion
    in the hand for offering. The translation keeps the concrete imagery of the Hebrew
    while remaining readable.
- source_word: וַיַּקְטֵר
  chosen: burned
  alternatives:
  - turned into smoke
  - offered up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts means to burn as an offering,
    often with the nuance of producing smoke before God. 'Burned' is concise and idiomatic;
    the altar context supplies the sacrificial sense.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard locative rendering in sacrificial contexts.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - in addition to
  - apart from
  lexicon: HALOT
  rationale: The preposition marks addition/exclusion. Here it indicates that this
    act was performed in addition to the regular morning offering.
- source_word: עֹלַת הַבֹּקֶר
  chosen: the morning burnt offering
  alternatives:
  - the burnt offering of the morning
  - the morning whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard burnt offering in Leviticus. 'Morning burnt offering'
    is clear modern English and reflects the regular daily sacrifice.
