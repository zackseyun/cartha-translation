theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: Following the project's gender-accurate policy, the masculine plural
    construct is preserved rather than neutralized. This is a corporate covenant designation,
    but the translation keeps the source form transparent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can emphasize purification in priestly texts, but the
    immediate cultic instruction clearly refers to a sacrificial category. The traditional
    'sin offering' remains the most accessible and recognizable main-text rendering,
    while preserving the lexical alternative in a footnote for auditability.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
