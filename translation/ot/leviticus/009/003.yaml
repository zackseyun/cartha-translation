id: LEV.9.3
reference: Leviticus 9:3
source:
  edition: WLC
  text: וְ/אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל תְּדַבֵּ֣ר לֵ/אמֹ֑ר קְח֤וּ שְׂעִיר עִזִּים֙ לְ/חַטָּ֔את
    וְ/עֵ֨גֶל וָ/כֶ֧בֶשׂ בְּנֵי שָׁנָ֛ה תְּמִימִ֖ם לְ/עֹלָֽה־־־׃
translation:
  text: And to the sons of Israel you shall speak, saying, ‘Take a male goat for a
    sin offering, and a calf and a lamb, each a year old, without blemish, for a burnt
    offering.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for the Hebrew חַטָּאת in priestly sacrificial
      contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: And to
  alternatives:
  - Then to
  - And toward
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a new instruction directed
    toward a group. 'And to' preserves the connective flow and the directional sense
    without overinterpreting sequence.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Rendered gender-accurately as 'sons of Israel' in keeping with the stated
    philosophy. 'Israelites' is idiomatic but less formally transparent; 'children
    of Israel' is traditional but less precise to the masculine plural construct.
- source_word: תְּדַבֵּר
  chosen: you shall speak
  alternatives:
  - you are to speak
  - speak
  lexicon: HALOT
  rationale: Imperfect 2ms in instructional context is well represented by 'you shall
    speak,' preserving the directive force addressed to Moses.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus
  - as follows
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive construct, introducing
    the direct speech that follows.
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Bring
  - Fetch
  lexicon: HALOT
  rationale: A direct plural imperative to the people. 'Take' is the plain sense of
    לקח here; 'bring' would add destination nuance not explicit in the verb itself.
- source_word: שְׂעִיר עִזִּים
  chosen: a male goat
  alternatives:
  - a goat
  - a buck goat
  - a goat of the goats
  lexicon: HALOT
  rationale: The construct phrase denotes a he-goat. 'Male goat' is clear modern English
    and preserves the sex distinction relevant to sacrificial specification.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - for sin
  - as a purification offering
  lexicon: HALOT
  rationale: In sacrificial contexts חטאת commonly denotes the offering, not merely
    the abstract concept of sin. 'Sin offering' is the most recognizable and sufficiently
    precise rendering; 'purification offering' is a defensible alternative but less
    established in English Bible usage.
- source_word: וְעֵגֶל
  chosen: and a calf
  alternatives:
  - and a young bull
  lexicon: HALOT
  rationale: עגל ordinarily means 'calf.' 'Young bull' is possible in sacrificial
    contexts but is more interpretive than the lexical base.
- source_word: וָכֶבֶשׂ
  chosen: and a lamb
  alternatives:
  - and a sheep
  lexicon: HALOT
  rationale: כֶּבֶשׂ is specifically a lamb rather than the broader 'sheep,' and the
    age specification that follows fits 'lamb' naturally.
- source_word: בְּנֵי שָׁנָה
  chosen: each a year old
  alternatives:
  - one year old
  - sons of a year
  lexicon: HALOT
  rationale: The plural adjective phrase modifies both the calf and the lamb. 'Each
    a year old' makes the distributive sense explicit in natural English.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמימים denotes freedom from defect. 'Without
    blemish' is standard, clear, and contextually exact; 'perfect' would sound overly
    absolute in English.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  - for an ascension offering
  lexicon: HALOT
  rationale: עלה in cultic usage refers to the whole burnt offering. 'Burnt offering'
    is the conventional and accurate rendering; 'ascension offering' reflects etymology
    but is not standard English.
