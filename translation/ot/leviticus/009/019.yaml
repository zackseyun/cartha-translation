id: LEV.9.19
reference: Leviticus 9:19
source:
  edition: WLC
  text: וְ/אֶת הַ/חֲלָבִ֖ים מִן הַ/שּׁ֑וֹר וּ/מִן הָ/אַ֔יִל הָֽ/אַלְיָ֤ה וְ/הַֽ/מְכַסֶּה֙
    וְ/הַ/כְּלָיֹ֔ת וְ/יֹתֶ֖רֶת הַ/כָּבֵֽד־־־׃
translation:
  text: 'and the fat pieces from the ox and from the ram: the fat tail, the covering
    fat, the kidneys, and the lobe of the liver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the bull.' The Hebrew שׁוֹר can refer broadly to cattle, and in
      sacrificial contexts may be rendered 'ox' or 'bull' depending on how specifically
      the translator wishes to mark the animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and also
  - now the
  lexicon: HALOT
  rationale: The conjunction with object marker continues the list from the previous
    verse. In English the object marker is not represented directly, so the sense
    is carried by simple 'and'.
- source_word: הַחֲלָבִים
  chosen: the fat pieces
  alternatives:
  - the fats
  - the fatty portions
  lexicon: HALOT
  rationale: Plural of חֵלֶב in sacrificial context refers to the designated fatty
    portions removed for offering, not merely generic fat. 'Fat pieces' is natural
    English while preserving the cultic specificity.
- source_word: מִן הַשּׁוֹר
  chosen: from the ox
  alternatives:
  - from the bull
  lexicon: HALOT
  rationale: שׁוֹר can denote ox/bull. 'Ox' is a broad and natural rendering here,
    matching the animal named without over-specifying sex beyond what the immediate
    English context requires.
- source_word: וּמִן הָאַיִל
  chosen: and from the ram
  lexicon: HALOT
  rationale: אַיִל is straightforwardly 'ram' in sacrificial contexts.
- source_word: הָאַלְיָה
  chosen: the fat tail
  alternatives:
  - the tail fat
  - the whole fat tail
  lexicon: HALOT
  rationale: In sacrificial terminology this refers to the fatty tail, especially
    of a sheep. 'Fat tail' is the standard clear rendering.
- source_word: הַמְכַסֶּה
  chosen: the covering fat
  alternatives:
  - the fat covering
  - that which covers
  lexicon: HALOT
  rationale: From כסה, 'to cover'; in this anatomical list it denotes the fat covering
    the entrails. 'Covering fat' is concise and fits the sequence of sacrificial portions.
- source_word: הַכְּלָיֹת
  chosen: the kidneys
  lexicon: HALOT
  rationale: Standard anatomical term in sacrificial lists.
- source_word: יֹתֶרֶת הַכָּבֵד
  chosen: the lobe of the liver
  alternatives:
  - the appendage of the liver
  - the long lobe of the liver
  lexicon: HALOT
  rationale: This idiom refers to a specific part attached to the liver, traditionally
    rendered 'lobe.' 'Lobe of the liver' is the clearest idiomatic English for modern
    readers.
