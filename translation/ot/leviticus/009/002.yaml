id: LEV.9.2
reference: Leviticus 9:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶֽל אַהֲרֹ֗ן קַח לְ֠/ךָ עֵ֣גֶל בֶּן בָּקָ֧ר לְ/חַטָּ֛את וְ/אַ֥יִל
    לְ/עֹלָ֖ה תְּמִימִ֑ם וְ/הַקְרֵ֖ב לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: And he said to Aaron, “Take for yourself a calf, a son of the herd, for a
    sin offering, and a ram for a burnt offering, both without blemish, and present
    them before the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a calf, a son of the herd'—that is, a young bovine animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing the next action. 'And he said'
    preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: אֶל אַהֲרֹן
  chosen: to Aaron
  lexicon: HALOT
  rationale: Direct addressee marking with אֶל; straightforwardly rendered 'to Aaron.'
- source_word: קַח לְךָ
  chosen: Take for yourself
  alternatives:
  - Take
  - Get for yourself
  lexicon: HALOT
  rationale: The imperative לקח with dative לְךָ includes a reflexive/personal-benefit
    nuance. 'Take for yourself' preserves that nuance better than simply 'Take,' while
    remaining natural English.
- source_word: עֵגֶל בֶּן בָּקָר
  chosen: a calf, a son of the herd
  alternatives:
  - a calf of the cattle
  - a young bull calf
  lexicon: HALOT
  rationale: Literally 'a calf, son of cattle/herd.' The phrase denotes a young bovine
    animal. 'A calf, a son of the herd' keeps the Hebrew appositional flavor while
    still being intelligible; alternatives smooth the idiom more dynamically.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial context חטאת refers to the offering, not merely abstract
    sin. 'For a sin offering' is clear and idiomatic.
- source_word: וְאַיִל
  chosen: and a ram
  lexicon: HALOT
  rationale: אַיִל is the standard term for a ram in sacrificial contexts.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the technical sacrificial term 'burnt offering.' The preposition
    לְ is naturally rendered 'for' here.
- source_word: תְּמִימִם
  chosen: both without blemish
  alternatives:
  - without blemish
  - unblemished
  lexicon: HALOT
  rationale: Plural adjective modifying both sacrificial animals. 'Both without blemish'
    makes the plural reference explicit in English.
- source_word: וְהַקְרֵב
  chosen: and present them
  alternatives:
  - and bring them near
  - and offer them
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present in cultic context. Because
    two animals are in view, English supplies 'them.' 'Present' is preferable here
    to 'offer' because the actual sacrificial procedures follow and the verb can denote
    bringing before God.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic phrase meaning in Yahweh's presence. Per doctrine, יְהוָה
    is rendered 'the LORD.'
