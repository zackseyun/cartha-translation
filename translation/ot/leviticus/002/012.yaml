id: LEV.2.12
reference: Leviticus 2:12
source:
  edition: WLC
  text: קָרְבַּ֥ן רֵאשִׁ֛ית תַּקְרִ֥יבוּ אֹתָ֖/ם לַ/יהוָ֑ה וְ/אֶל הַ/מִּזְבֵּ֥חַ לֹא
    יַעֲל֖וּ לְ/רֵ֥יחַ נִיחֹֽחַ־־׃
translation:
  text: You may present them to the LORD as an offering of firstfruits, but they must
    not be offered up on the altar as a pleasing aroma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a firstfruits offering.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'they shall not go up to the altar for a pleasing aroma,' an idiom
      for being offered on the altar as an acceptable burnt offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבַּן
  chosen: offering
  alternatives:
  - gift
  - oblation
  lexicon: HALOT
  rationale: The noun broadly denotes an offering brought near to God. 'Offering'
    is the most natural modern English equivalent and fits sacrificial context without
    unnecessary archaism.
- source_word: רֵאשִׁית
  chosen: firstfruits
  alternatives:
  - first part
  - first produce
  lexicon: HALOT
  rationale: In cultic context this refers to the first yield presented to God. 'Firstfruits'
    is the established and accurate English rendering.
- source_word: קָרְבַּן רֵאשִׁית
  chosen: an offering of firstfruits
  alternatives:
  - a firstfruits offering
  lexicon: HALOT
  rationale: The construct chain is best represented as 'offering of firstfruits.'
    This preserves the Hebrew relationship while remaining idiomatic.
- source_word: תַּקְרִיבוּ
  chosen: you may present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: 'The Hiphil of קרב in sacrificial contexts means to bring/present as
    an offering. ''Present'' avoids awkward repetition with the later verb about being
    offered up on the altar, while still reflecting cultic action. ''May'' reflects
    the permissive sense in context: such items can be presented to the LORD, though
    not burned on the altar.'
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The pronoun is masculine plural and refers back to the leaven/honey items
    in the previous verse. 'Them' is the straightforward English equivalent.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: 'Per doctrine, יהוה is rendered ''the LORD.'' The preposition ל here
    is naturally expressed as direction/dedication: ''to the LORD.'''
- source_word: וְאֶל־הַמִּזְבֵּחַ
  chosen: but on the altar
  alternatives:
  - and to the altar
  - but to the altar
  lexicon: HALOT
  rationale: 'The conjunction plus prepositional phrase marks contrast with the prior
    clause: these may be presented to the LORD, but not on the altar. English idiom
    prefers ''on the altar'' with the following verb of ascent/offering.'
- source_word: לֹא יַעֲלוּ
  chosen: they must not be offered up
  alternatives:
  - they shall not go up
  - they shall not ascend
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend,' but in sacrificial context
    it refers to being brought up onto the altar, often for burning. 'Be offered up'
    captures the cultic sense in clear English.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet-smelling aroma
  lexicon: HALOT
  rationale: This stock sacrificial phrase denotes an offering acceptable to God.
    'Pleasing aroma' is clear modern English and preserves the metaphor without archaic
    wording.
