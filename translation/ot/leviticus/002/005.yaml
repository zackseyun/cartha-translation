id: LEV.2.5
reference: Leviticus 2:5
source:
  edition: WLC
  text: וְ/אִם מִנְחָ֥ה עַל הַֽ/מַּחֲבַ֖ת קָרְבָּנֶ֑/ךָ סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן
    מַצָּ֥ה תִהְיֶֽה־־׃
translation:
  text: And if your offering is a grain offering on the griddle, it shall be of fine
    flour mixed with oil, unleavened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a flat pan.' The Hebrew term refers to a cooking surface used for
      preparing this grain offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  lexicon: HALOT
  rationale: In Leviticus 2 the term specifically denotes the cereal/flour-based tribute
    offering, not a generic gift. 'Grain offering' is the clearest established English
    rendering in this cultic context.
- source_word: עַל הַמַּחֲבַת
  chosen: on the griddle
  alternatives:
  - on a flat pan
  - on the pan
  lexicon: HALOT
  rationale: The phrase refers to preparation on a flat cooking surface. 'Griddle'
    is natural modern English and fits the likely utensil better than the vaguer 'pan.'
- source_word: קָרְבָּנְךָ
  chosen: your offering
  alternatives:
  - your gift
  - your presentation
  lexicon: HALOT
  rationale: Though קָרְבָּן can be rendered 'offering' broadly, here it functions
    appositionally with מִנְחָה and is best rendered simply as 'your offering' to
    preserve the direct address without awkward redundancy.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine wheat flour
  lexicon: HALOT
  rationale: This is the standard cultic ingredient term for high-quality finely milled
    flour. 'Fine flour' is both accurate and idiomatic.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - kneaded with oil
  - mingled with oil
  lexicon: HALOT
  rationale: The participle indicates flour combined with oil. 'Mixed with oil' is
    clear modern English and preserves the preparation sense without over-specifying
    the method.
- source_word: מַצָּה
  chosen: unleavened
  alternatives:
  - without yeast
  - unleavened bread
  lexicon: HALOT
  rationale: Here the adjective describes the offering's required state, not a separate
    noun meaning 'unleavened bread.' 'Unleavened' is concise and contextually precise.
- source_word: תִהְיֶה
  chosen: it shall be
  alternatives:
  - it must be
  - let it be
  lexicon: HALOT
  rationale: The imperfect here states the required condition of the offering. 'It
    shall be' preserves the prescriptive force in standard legal English without adding
    interpretive emphasis.
