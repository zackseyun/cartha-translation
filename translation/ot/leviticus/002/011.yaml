id: LEV.2.11
reference: Leviticus 2:11
source:
  edition: WLC
  text: כָּל הַ/מִּנְחָ֗ה אֲשֶׁ֤ר תַּקְרִ֨יבוּ֙ לַ/יהוָ֔ה לֹ֥א תֵעָשֶׂ֖ה חָמֵ֑ץ כִּ֤י כָל שְׂאֹר֙ וְ/כָל דְּבַ֔שׁ לֹֽא תַקְטִ֧ירוּ מִמֶּ֛/נּוּ אִשֶּׁ֖ה לַֽ/יהוָֽה־־־־׃
translation:
  text: Every grain offering that you present to Yahweh shall not be made with leaven, for you shall not burn any leaven or any honey from it as a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offering by fire.' The Hebrew term refers to an offering presented on the altar by burning.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may in ancient usage also include fruit syrup, not only bee honey.'
    reason: cultural_note
lexical_decisions:
- source_word: הַמִּנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  - tribute offering
  lexicon: HALOT
  rationale: In Leviticus 2, מִנְחָה refers specifically to the cereal/flour-based offering, not offering in general. 'Grain offering' is the clearest established English rendering in this cultic context.
- source_word: תַּקְרִיבוּ
  chosen: you present
  alternatives:
  - you bring near
  - you offer
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to present or offer in sacrificial contexts. 'Present' preserves the act of bringing before God without overloading the clause with repeated 'offer' language.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' 'To the LORD' fits the directional sense of the preposition in sacrificial presentation.
- source_word: תֵעָשֶׂה חָמֵץ
  chosen: shall not be made with leaven
  alternatives:
  - shall not be made leavened
  - must not be prepared with yeast
  lexicon: HALOT
  rationale: The Niphal of עשה with חָמֵץ indicates the offering is not to be prepared in a leavened state. 'Made with leaven' is natural English and preserves the prohibition.
- source_word: חָמֵץ
  chosen: leaven
  alternatives:
  - yeast
  - leavened bread
  lexicon: HALOT
  rationale: '''Leaven'' is the broader and more precise cultic term here, since the verse concerns any leavening agent, not merely modern commercial yeast or bread specifically.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding prohibition.
- source_word: שְׂאֹר
  chosen: leaven
  alternatives:
  - sourdough
  - yeast
  lexicon: HALOT
  rationale: שְׂאֹר denotes leavening agent. Rendering it also as 'leaven' keeps the cultic terminology consistent and avoids anachronistic narrowing to commercial yeast.
- source_word: דְּבַשׁ
  chosen: honey
  alternatives:
  - date syrup
  - sweet syrup
  lexicon: HALOT
  rationale: The ordinary lexical sense is 'honey.' In ancient Israel it could include fruit syrup, but 'honey' remains the most transparent main-text rendering; the broader ancient usage is worth preserving in a footnote.
- source_word: לֹא תַקְטִירוּ
  chosen: you shall not turn ... into a food offering
  alternatives:
  - you shall not burn
  - you shall not make smoke of
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts means to cause to go up in smoke on the altar. 'Turn ... into a food offering' communicates the cultic action in idiomatic English while retaining the sacrificial sense.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from these
  - of it
  lexicon: HALOT
  rationale: 'The singular pronominal form most naturally refers back to the grain offering as a whole: none of it is to be offered as an altar gift if it consists of leaven or honey.'
- source_word: אִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: In Levitical sacrificial language, אִשֶּׁה denotes an offering made by fire. 'Food offering' is readable modern English and reflects the technical cultic category, while 'offering by fire' is preserved as an alternative in a footnote.
