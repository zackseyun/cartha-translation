id: LEV.2.14
reference: Leviticus 2:14
source:
  edition: WLC
  text: וְ/אִם תַּקְרִ֛יב מִנְחַ֥ת בִּכּוּרִ֖ים לַ/יהוָ֑ה אָבִ֞יב קָל֤וּי בָּ/אֵשׁ֙
    גֶּ֣רֶשׂ כַּרְמֶ֔ל תַּקְרִ֕יב אֵ֖ת מִנְחַ֥ת בִּכּוּרֶֽי/ךָ־׃
translation:
  text: And if you present to the LORD an offering of firstfruits, you shall present
    your offering of firstfruits as fresh heads of grain roasted in the fire, crushed
    kernels from the fresh grain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'green ears roasted in the fire, crushed grain of the new crop.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחַת
  chosen: offering
  alternatives:
  - grain offering
  - gift offering
  lexicon: HALOT
  rationale: מִנְחָה is the technical term for an offering, often specifically a grain
    offering in Leviticus 2. Here 'offering' is retained in English, while the material
    is specified by the following terms. 'Grain offering' would also be defensible,
    but the Hebrew phrase is modified by 'firstfruits' and then further defined by
    the grain descriptors later in the verse.
- source_word: בִּכּוּרִים / בִּכּוּרֶיךָ
  chosen: firstfruits
  alternatives:
  - first ripe produce
  - first produce
  lexicon: HALOT
  rationale: The standard cultic sense is the earliest produce offered to God. 'Firstfruits'
    is the established and accurate English equivalent and preserves the sacrificial
    context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אָבִיב
  chosen: fresh heads of grain
  alternatives:
  - green ears
  - young grain
  - ripened ears
  lexicon: HALOT
  rationale: אָבִיב refers to grain in the ear at a fresh/early stage, not yet fully
    dried. 'Fresh heads of grain' communicates the agricultural image in natural modern
    English better than the archaic 'green ears,' while avoiding overprecision.
- source_word: קָלוּי בָּאֵשׁ
  chosen: roasted in the fire
  alternatives:
  - parched in the fire
  - fire-roasted
  lexicon: HALOT
  rationale: The participle plus prepositional phrase describes the grain as roasted/parched
    by fire. 'Roasted in the fire' is clear modern English and preserves the preparation
    method.
- source_word: גֶּרֶשׂ
  chosen: crushed kernels
  alternatives:
  - grits
  - coarsely crushed grain
  - bruised grain
  lexicon: HALOT
  rationale: The noun denotes grain that has been crushed or broken into pieces. 'Crushed
    kernels' is concrete and readable, avoiding the regional or potentially misleading
    'grits.'
- source_word: כַּרְמֶל
  chosen: from the fresh grain
  alternatives:
  - from the garden land
  - from the orchard
  - of the new crop
  lexicon: HALOT
  rationale: In this context כַּרְמֶל refers to fresh produce/grain rather than a
    place name. Combined with גֶּרֶשׂ, it describes crushed grain from fresh ears.
    'From the fresh grain' best fits the immediate agricultural and sacrificial context.
- source_word: תַּקְרִיב ... תַּקְרִיב
  chosen: present ... you shall present
  alternatives:
  - bring ... you shall bring
  - offer ... you shall offer
  lexicon: HALOT
  rationale: The repeated Hiphil of קרב marks the act of bringing/presenting an offering
    near to God. 'Present' preserves the ritual sense and allows smooth English with
    the repetition retained.
