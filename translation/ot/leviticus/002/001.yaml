id: LEV.2.1
reference: Leviticus 2:1
source:
  edition: WLC
  text: וְ/נֶ֗פֶשׁ כִּֽי תַקְרִ֞יב קָרְבַּ֤ן מִנְחָה֙ לַֽ/יהוָ֔ה סֹ֖לֶת יִהְיֶ֣ה קָרְבָּנ֑/וֹ וְ/יָצַ֤ק עָלֶ֨י/הָ֙ שֶׁ֔מֶן וְ/נָתַ֥ן עָלֶ֖י/הָ לְבֹנָֽה־׃
translation:
  text: When a person presents a grain offering to Yahweh, his offering shall be of fine flour, and he shall pour oil on it and put frankincense on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When anyone brings a grain offering to the LORD.' Hebrew נֶפֶשׁ literally means 'soul,' but here refers to an individual person.
    reason: lexical_alternative
  - marker: b
    text: '''Grain offering'' translates Hebrew מִנְחָה, a cereal offering made here of fine flour.'
    reason: cultural_note
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - anyone
  - a soul
  lexicon: HALOT
  rationale: Although literally 'soul,' in legal/cultic prose נֶפֶשׁ often refers to an individual person. 'A person' is natural English and fits the representative singular without importing a more metaphysical sense.
- source_word: תַקְרִיב
  chosen: presents
  alternatives:
  - brings
  - offers
  lexicon: HALOT
  rationale: Hiphil of קרב means to bring near/present as an offering. 'Presents' captures the cultic act smoothly in English while retaining the formal sense of bringing an offering before God.
- source_word: קָרְבַּן
  chosen: offering
  alternatives:
  - gift offering
  - oblation
  lexicon: HALOT
  rationale: A general sacrificial term meaning that which is brought near. 'Offering' is the clearest standard English equivalent in this context.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - tribute offering
  - gift offering
  lexicon: HALOT
  rationale: In Levitical sacrificial context מִנְחָה refers specifically to the cereal/grain offering rather than a generic gift or tribute. 'Grain offering' is the established and contextually precise rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated. The preposition ל is preserved with 'to.'
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Refers to finely milled flour used in offerings. 'Fine flour' is idiomatic and specific.
- source_word: יִהְיֶה קָרְבָּנוֹ
  chosen: his offering shall be
  alternatives:
  - the offering he brings shall be
  - his gift shall be
  lexicon: HALOT
  rationale: This clause specifies the composition of the offering. The 3ms suffix is retained with 'his,' matching the Hebrew grammar and the representative singular style of the law.
- source_word: וְיָצַק עָלֶיהָ שֶׁמֶן
  chosen: and he shall pour oil on it
  alternatives:
  - and pour oil over it
  lexicon: HALOT
  rationale: The waw + qatal here carries instructional force in context, naturally rendered with English modal future 'shall.' 'On it' reflects עַל with the feminine suffix referring to the grain offering.
- source_word: וְנָתַן עָלֶיהָ לְבֹנָה
  chosen: and put frankincense on it
  alternatives:
  - and place frankincense on it
  lexicon: HALOT
  rationale: לְבֹנָה is frankincense, the aromatic resin used in worship. 'Put' is simple modern English; 'on it' again reflects the Hebrew prepositional phrase.
