theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered singular pronouns in legal instruction
  chosen_reading: his offering ... he shall pour ... he shall put
  alternative_readings:
  - their offering ... they shall pour ... they shall put
  rationale: The Hebrew uses singular forms and a 3ms suffix in representative legal style. Per the translation philosophy, gender-accurate rendering is preferred over flattening to gender-neutral English when the source uses masculine representative grammar.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
