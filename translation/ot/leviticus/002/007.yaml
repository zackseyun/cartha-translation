id: LEV.2.7
reference: Leviticus 2:7
source:
  edition: WLC
  text: וְ/אִם מִנְחַ֥ת מַרְחֶ֖שֶׁת קָרְבָּנֶ֑/ךָ סֹ֥לֶת בַּ/שֶּׁ֖מֶן תֵּעָשֶֽׂה־׃
translation:
  text: And if your offering is a grain offering from a pan, it shall be made of fine
    flour with oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'griddle,' 'deep pan,' or 'cooking pan'; the exact type of vessel denoted
      by the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces another case within
    the sacrificial instructions. 'And if' preserves the sequential, casuistic flow
    better than a bare 'If.'
- source_word: מִנְחַת
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  lexicon: HALOT
  rationale: In Leviticus 2, מִנְחָה refers specifically to the cereal/grain tribute
    offering, not a generic gift. 'Grain offering' is the clearest established English
    equivalent in this cultic context.
- source_word: מַרְחֶשֶׁת
  chosen: pan
  alternatives:
  - griddle
  - deep pan
  - cooking pan
  lexicon: HALOT
  rationale: The term denotes a cooking vessel used in preparing this type of offering.
    'Pan' is readable modern English and broad enough to avoid over-specifying the
    vessel where the exact shape is uncertain.
- source_word: קָרְבָּנְךָ
  chosen: your offering
  alternatives:
  - your gift
  - your presentation offering
  lexicon: HALOT
  rationale: קָרְבָּן is the general term for an offering brought near to God. 'Your
    offering' is natural English and fits the possessive suffix.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - finely milled flour
  lexicon: HALOT
  rationale: This is the standard cultic ingredient in grain offerings. 'Fine flour'
    is both accurate and idiomatic.
- source_word: בַּשֶּׁמֶן
  chosen: with oil
  alternatives:
  - in oil
  - mixed with oil
  lexicon: HALOT
  rationale: The beth preposition here indicates accompaniment/material in preparation.
    'With oil' is concise and natural; 'mixed with oil' is interpretive and more specific
    than the Hebrew states.
- source_word: תֵּעָשֶׂה
  chosen: it shall be made
  alternatives:
  - it is to be made
  - it shall be prepared
  lexicon: HALOT
  rationale: The Niphal imperfect expresses how the offering is to be prepared. 'It
    shall be made' preserves the passive sense and instructional tone.
