id: LEV.2.3
reference: Leviticus 2:3
source:
  edition: WLC
  text: וְ/הַ/נּוֹתֶ֨רֶת֙ מִן הַ/מִּנְחָ֔ה לְ/אַהֲרֹ֖ן וּ/לְ/בָנָ֑י/ו קֹ֥דֶשׁ קָֽדָשִׁ֖ים
    מֵ/אִשֵּׁ֥י יְהוָֽה־׃ס
translation:
  text: And what is left of the grain offering shall be for Aaron and for his sons,
    a most holy portion from the food offerings of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the offerings by fire to the LORD' or 'from the fire offerings
      of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתֶרֶת
  chosen: what is left
  alternatives:
  - the remainder
  - what remains
  lexicon: HALOT
  rationale: The participial form with article functions substantivally, referring
    to the remaining part of the offering. 'What is left' is natural modern English
    while preserving the sense of remainder.
- source_word: מִן הַמִּנְחָה
  chosen: of the grain offering
  alternatives:
  - from the grain offering
  - of the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus 2 denotes the cereal/grain offering specifically,
    not a generic gift. 'Of the grain offering' reads smoothly with 'what is left.'
    'Tribute offering' is possible lexically but less contextually precise here.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: for Aaron and for his sons
  alternatives:
  - belongs to Aaron and to his sons
  lexicon: HALOT
  rationale: The lamed marks possession/allocation. 'For Aaron and for his sons' is
    a clear and sufficiently formal rendering of priestly entitlement.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: a most holy portion
  alternatives:
  - most holy
  - holy of holies
  lexicon: HALOT
  rationale: This superlative construction denotes the highest degree of holiness
    within the sacrificial system. Because the phrase describes the remaining part
    of the offering, 'a most holy portion' makes the referent explicit in idiomatic
    English. 'Holy of holies' would sound overly literal and potentially misleading
    as a place-term.
- source_word: מֵאִשֵּׁי יְהוָה
  chosen: from the food offerings of the LORD
  alternatives:
  - from the offerings by fire to the LORD
  - from the fire offerings of the LORD
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally refers to offerings made by fire, but in many contexts
    functions as a technical term for food offerings presented to God. 'Food offerings'
    is clear modern English and fits the sacrificial context, while preserving the
    cultic category. The preposition מִן indicates that this most holy portion belongs
    to the class of the LORD's offerings.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
