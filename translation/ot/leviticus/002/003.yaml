theological_decisions:
- issue: Rendering the cultic classification קֹדֶשׁ קָדָשִׁים
  chosen_reading: a most holy portion
  alternative_readings:
  - most holy
  - holy of holies
  rationale: The phrase identifies the remainder of the offering as belonging to the
    highest holiness category reserved for priestly consumption. The translation preserves
    the cultic distinction without importing later theological associations tied to
    'Holy of Holies' as a sanctuary location.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source meaning without importing doctrinal claims.'
- issue: Rendering אִשֵּׁי יְהוָה
  chosen_reading: the food offerings of the LORD
  alternative_readings:
  - the offerings by fire to the LORD
  - the fire offerings of the LORD
  rationale: The Hebrew term is a technical sacrificial expression. 'Food offerings'
    communicates the cultic category in accessible English; the fire-related nuance
    is preserved in a footnote because it remains a viable lexical alternative.
  doctrine_reference: 'Translation philosophy: optimal equivalence; document significant
    lexical variance.'
