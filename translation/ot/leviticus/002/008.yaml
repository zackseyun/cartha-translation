id: LEV.2.8
reference: Leviticus 2:8
source:
  edition: WLC
  text: וְ/הֵבֵאתָ֣ אֶת הַ/מִּנְחָ֗ה אֲשֶׁ֧ר יֵעָשֶׂ֛ה מֵ/אֵ֖לֶּה לַ/יהוָ֑ה וְ/הִקְרִיבָ/הּ֙
    אֶל הַ/כֹּהֵ֔ן וְ/הִגִּישָׁ֖/הּ אֶל הַ/מִּזְבֵּֽחַ־־־׃
translation:
  text: And you shall bring the grain offering that is made from these things to the
    LORD, and he shall present it to the priest, and he shall bring it near to the
    altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD.' The Hebrew preposition can express dedication as well
      as direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתָ
  chosen: And you shall bring
  alternatives:
  - And you must bring
  - Then you shall bring
  lexicon: HALOT
  rationale: 'Hiphil perfect 2ms of בוא with prefixed conjunction in instructional
    legal style functions as an injunction/future: ''you shall bring.'' ''And'' preserves
    the clause linkage.'
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the gift offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus 2 specifically denotes the cereal/grain offering,
    not a generic gift. 'Grain offering' is the clearest established English equivalent
    in this cultic context.
- source_word: אֲשֶׁר יֵעָשֶׂה מֵאֵלֶּה
  chosen: that is made from these things
  alternatives:
  - which is prepared from these
  - that is made of these
  lexicon: HALOT
  rationale: 'The Niphal/imperfect of עשה here is passive in sense: the offering is
    ''made'' or ''prepared'' from the ingredients or forms just described. ''These
    things'' preserves the demonstrative without over-specifying.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל can be 'to/for';
    'to the LORD' fits the movement language of bringing the offering while preserving
    dedication to YHWH.
- source_word: וְהִקְרִיבָהּ
  chosen: and he shall present it
  alternatives:
  - and he shall bring it
  - and he shall offer it
  lexicon: HALOT
  rationale: Hiphil of קרב means to bring near/present. Here the subject shifts naturally
    to the priestly handling of the offering after the worshiper brings it. 'Present'
    distinguishes this verb from the later נגשׁ and avoids flattening the sequence.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - before the priest
  lexicon: HALOT
  rationale: אֶל normally indicates direction toward. The offering is presented to
    the priest as the next stage in the ritual.
- source_word: וְהִגִּישָׁהּ
  chosen: and he shall bring it near
  alternatives:
  - and he shall present it
  - and he shall take it
  lexicon: HALOT
  rationale: 'Hiphil of נגשׁ means to bring near. Rendering it distinctly from קרב
    preserves the verbal sequence: the priest first receives/presents it, then brings
    it near to the altar.'
- source_word: אֶל הַמִּזְבֵּחַ
  chosen: to the altar
  alternatives:
  - up to the altar
  lexicon: HALOT
  rationale: Standard cultic term for the sacrificial altar. 'To the altar' preserves
    the directional preposition simply and clearly.
