id: LEV.2.9
reference: Leviticus 2:9
source:
  edition: WLC
  text: וְ/הֵרִ֨ים הַ/כֹּהֵ֤ן מִן הַ/מִּנְחָה֙ אֶת אַזְכָּ֣רָתָ֔/הּ וְ/הִקְטִ֖יר הַ/מִּזְבֵּ֑חָ/ה אִשֵּׁ֛ה רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָֽה־־׃
translation:
  text: Then the priest shall lift up from the grain offering its memorial portion and burn it on the altar, a food offering, a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire, a pleasing aroma to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵרִים
  chosen: shall lift up
  alternatives:
  - shall take up
  - shall remove
  lexicon: HALOT
  rationale: The Hiphil of רום here denotes the priest's act of taking up or removing a portion from the offering for presentation. 'Lift up' preserves the concrete ritual action more closely than the flatter 'take.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context.
- source_word: מִן הַמִּנְחָה
  chosen: from the grain offering
  alternatives:
  - from the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus 2 refers specifically to the cereal/grain offering. 'Grain offering' is the clearest modern cultic equivalent; 'tribute offering' is broader and less contextually precise here.
- source_word: אַזְכָּרָתָהּ
  chosen: its memorial portion
  alternatives:
  - its memorial
  - the reminder portion of it
  lexicon: HALOT
  rationale: אַזְכָּרָה in sacrificial contexts denotes the representative portion burned as a memorial before God. 'Memorial portion' makes explicit that a part of the offering, not the whole, is in view.
- source_word: וְהִקְטִיר
  chosen: and burn it
  alternatives:
  - and turn it into smoke
  - and offer it up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to burning on the altar, often with the nuance of producing smoke. 'Burn it' is natural English and sufficiently precise in context.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with altar in this idiom is best rendered idiomatically in English as action performed 'on the altar.'
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Though traditionally rendered 'offering by fire,' the term denotes an offering made by fire and is commonly understood as a food offering to God in priestly texts. 'Food offering' is readable modern English while preserving sacrificial sense.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial phrase communicates divine acceptance, not merely scent. 'Pleasing aroma' is idiomatic and avoids archaic wording while preserving the anthropomorphic imagery.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
