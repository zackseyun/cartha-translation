- issue: Rendering of the sacrificial formula אִשֵּׁה רֵיחַ נִיחֹחַ
  chosen_reading: a food offering, a pleasing aroma to the LORD
  alternative_readings:
  - an offering by fire, a pleasing aroma to the LORD
  - a fire offering of a soothing aroma to the LORD
  rationale: The translation preserves the cultic categories without importing later theological interpretation. 'Food offering' communicates the priestly sacrificial idiom in accessible English, while 'pleasing aroma' retains the acceptance motif. Alternatives are preserved because English tradition often uses 'offering by fire.'
