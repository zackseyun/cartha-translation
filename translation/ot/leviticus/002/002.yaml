id: LEV.2.2
reference: Leviticus 2:2
source:
  edition: WLC
  text: וֶֽ/הֱבִיאָ֗/הּ אֶל בְּנֵ֣י אַהֲרֹן֮ הַ/כֹּהֲנִים֒ וְ/קָמַ֨ץ מִ/שָּׁ֜ם מְלֹ֣א
    קֻמְצ֗/וֹ מִ/סָּלְתָּ/הּ֙ וּ/מִ/שַּׁמְנָ֔/הּ עַ֖ל כָּל לְבֹנָתָ֑/הּ וְ/הִקְטִ֨יר
    הַ/כֹּהֵ֜ן אֶת אַזְכָּרָתָ/הּ֙ הַ/מִּזְבֵּ֔חָ/ה אִשֵּׁ֛ה רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָֽה־־־׃
translation:
  text: He shall bring it to Aaron’s sons, the priests, and he shall take from it
    a handful of its fine flour and some of its oil, with all of its frankincense.
    Then the priest shall burn its memorial portion on the altar, a food offering,
    a pleasing aroma to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering' for 'a food offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱבִיאָהּ
  chosen: He shall bring it
  alternatives:
  - and he has brought it
  - and he shall present it
  lexicon: HALOT
  rationale: Hiphil of בוא with 3fs object refers to bringing the grain offering to
    the priests. English future/modal 'shall' fits the procedural legal style of Leviticus.
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: Aaron’s sons, the priests
  alternatives:
  - the sons of Aaron the priests
  - Aaron’s priestly sons
  lexicon: HALOT
  rationale: Keeps the familial and priestly identification explicit. The appositional
    'the priests' clarifies that Aaron’s sons are the officiants.
- source_word: וְקָמַץ
  chosen: he shall take ... a handful
  alternatives:
  - he shall grasp
  - he shall scoop a handful
  lexicon: HALOT
  rationale: The verb denotes taking a handful by closing the hand. 'Take ... a handful'
    is idiomatic and precise in sacrificial context.
- source_word: מְלֹא קֻמְצוֹ
  chosen: a handful
  alternatives:
  - the fullness of his fist
  - his full handful
  lexicon: HALOT
  rationale: The phrase literally means 'the fullness of his handful/fist.' 'A handful'
    is the natural English equivalent; the possessive is implicit in the action.
- source_word: מִסָּלְתָּהּ
  chosen: of its fine flour
  alternatives:
  - from its choice flour
  - from its flour
  lexicon: HALOT
  rationale: סֹלֶת is specifically fine flour used in offerings, so 'fine flour' preserves
    the cultic specificity.
- source_word: וּמִשַּׁמְנָהּ
  chosen: and some of its oil
  alternatives:
  - and from its oil
  - together with its oil
  lexicon: HALOT
  rationale: The preposition מִן after the handful phrase indicates a portion taken
    from the oil as well. 'Some of its oil' communicates that a representative amount
    is taken, not necessarily all.
- source_word: עַל כָּל לְבֹנָתָהּ
  chosen: with all of its frankincense
  alternatives:
  - along with all its frankincense
  - in addition to all of its frankincense
  lexicon: HALOT
  rationale: In context the priest takes the handful from the flour and oil together
    with all the frankincense. 'With all of' conveys the inclusion of the entire frankincense
    portion.
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: Hiphil of קטר in sacrificial contexts means to burn on the altar as an
    offering. 'Burn' is clear modern English; the altar context supplies the ritual
    nuance.
- source_word: אַזְכָּרָתָהּ
  chosen: its memorial portion
  alternatives:
  - its reminder portion
  - its memorial offering
  lexicon: HALOT
  rationale: Technical sacrificial term for the representative portion burned before
    God. 'Memorial portion' is established and sufficiently transparent without over-paraphrase.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending here idiomatically indicates the altar as the
    place of burning. English 'on the altar' best matches the ritual action.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering by fire,' the term in priestly
    usage denotes an offering made by fire and is closely associated with food imagery.
    'Food offering' is clearer modern English while remaining faithful to cultic sense.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: Standard sacrificial idiom indicating divine acceptance. 'Pleasing aroma'
    is natural English and avoids archaic phrasing while preserving the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the offering
    formula and preserves the direction of the act toward God.
