theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving
    Jewish reverence tradition and common English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אִשֵּׁה
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: This priestly technical term can be rendered more formally as 'offering
    by fire,' but 'food offering' better communicates the sacrificial category in
    readable modern English without denying the burning element already expressed
    by the verb 'burn.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
