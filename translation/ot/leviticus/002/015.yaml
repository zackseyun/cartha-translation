id: LEV.2.15
reference: Leviticus 2:15
source:
  edition: WLC
  text: וְ/נָתַתָּ֤ עָלֶ֨י/הָ֙ שֶׁ֔מֶן וְ/שַׂמְתָּ֥ עָלֶ֖י/הָ לְבֹנָ֑ה מִנְחָ֖ה הִֽוא׃
translation:
  text: And you shall put oil on it, and place frankincense on it; it is a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and you shall give oil on it ... and set frankincense on it.' The Hebrew
      verbs are common terms for placing or applying the elements to the offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  chosen: And you shall put
  alternatives:
  - and you shall give
  - and you shall set
  lexicon: HALOT
  rationale: נתן is broad ('give, put, set'). In this ritual instruction, 'put' is
    the most natural English for applying oil onto the offering while preserving the
    imperative-like force of the Hebrew wayyiqtol sequence in legal/ritual context.
- source_word: עָלֶיהָ
  chosen: on it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: The preposition על with 3fs suffix indicates placement onto the offering.
    'On it' is idiomatic modern English; 'upon it' is more formal but unnecessary.
- source_word: שֶׁמֶן
  chosen: oil
  lexicon: HALOT
  rationale: The plain sense is 'oil,' here specifically olive oil in sacrificial
    context, but the Hebrew does not state 'olive,' so the translation keeps the broader
    term.
- source_word: וְשַׂמְתָּ
  chosen: and place
  alternatives:
  - and put
  - and set
  lexicon: HALOT
  rationale: שׂים commonly means 'put, place, set.' 'Place' provides slight variation
    from the previous נתן while accurately reflecting deliberate ritual placement.
- source_word: לְבֹנָה
  chosen: frankincense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: לבנה specifically denotes frankincense, not incense in general. The more
    precise term best reflects the source text.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  - tribute offering
  lexicon: HALOT
  rationale: In Leviticus sacrificial legislation, מנחה refers to the cereal/grain
    offering rather than a generic gift. 'Grain offering' is the clearest established
    English rendering in this cultic context.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: 'The pronoun identifies the item just described: ''it is a grain offering.''
    This preserves the Hebrew''s simple predication without overemphasis.'
