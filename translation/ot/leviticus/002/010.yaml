id: LEV.2.10
reference: Leviticus 2:10
source:
  edition: WLC
  text: וְ/הַ/נּוֹתֶ֨רֶת֙ מִן הַ/מִּנְחָ֔ה לְ/אַהֲרֹ֖ן וּ/לְ/בָנָ֑י/ו קֹ֥דֶשׁ קָֽדָשִׁ֖ים
    מֵ/אִשֵּׁ֥י יְהוָֽה־׃
translation:
  text: And what remains of the grain offering shall be for Aaron and for his sons,
    a most holy portion from the food offerings of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “from the offerings made by fire to the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתֶרֶת
  chosen: And what remains
  alternatives:
  - And the remainder
  - And the rest
  lexicon: HALOT
  rationale: The participial form with article functions substantivally, referring
    to the portion left over. 'What remains' is natural English while preserving the
    sense of the remnant portion.
- source_word: מִן הַמִּנְחָה
  chosen: of the grain offering
  alternatives:
  - from the grain offering
  - of the offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus 2 specifically denotes the cereal/grain offering,
    not a generic gift. 'Of the grain offering' reads smoothly with 'what remains'
    in English while retaining the source sense.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: shall be for Aaron and for his sons
  alternatives:
  - belongs to Aaron and his sons
  - shall belong to Aaron and his sons
  lexicon: HALOT
  rationale: The lamed marks possession/allocation. Supplying 'shall be' is required
    in English and reflects the legal-prescriptive sense without overtranslating.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: a most holy portion
  alternatives:
  - most holy
  - holy of holies
  lexicon: HALOT
  rationale: The Hebrew superlative idiom denotes the highest degree of holiness.
    'A most holy portion' makes explicit that the phrase describes the remaining share
    of the offering, avoiding the potentially misleading literalism 'holy of holies'
    in this context.
- source_word: מֵאִשֵּׁי
  chosen: from the food offerings
  alternatives:
  - from the offerings made by fire
  - from the fire offerings
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally is rendered 'offering made by fire,' but in priestly
    sacrificial contexts it can denote offerings presented to God by fire, often idiomatically
    'food offerings.' This rendering is clear modern English and fits Levitical usage,
    while preserving the cultic sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
