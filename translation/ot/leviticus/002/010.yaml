theological_decisions:
- issue: Rendering of sacrificial term אִשֵּׁי יְהוָה
  chosen_reading: from the food offerings of the LORD
  alternative_readings:
  - from the offerings made by fire to the LORD
  - from the fire offerings of the LORD
  rationale: The phrase refers to offerings presented to the LORD in the sacrificial
    system. 'Food offerings' communicates the established priestly idiom in accessible
    English; the more traditional 'offerings made by fire' is preserved in a footnote
    because it remains a viable and familiar alternative.
  doctrine_reference: Translation philosophy §§1, 6
