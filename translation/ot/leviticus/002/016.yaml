id: LEV.2.16
reference: Leviticus 2:16
source:
  edition: WLC
  text: וְ/הִקְטִ֨יר הַ/כֹּהֵ֜ן אֶת אַזְכָּרָתָ֗/הּ מִ/גִּרְשָׂ/הּ֙ וּ/מִ/שַּׁמְנָ֔/הּ
    עַ֖ל כָּל לְבֹנָתָ֑/הּ אִשֶּׁ֖ה לַ/יהוָֽה־־׃פ
translation:
  text: And the priest shall burn its memorial portion from its crushed grain and
    from its oil, with all its frankincense—an offering made by fire to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from its groats' or 'from its coarsely ground grain'; the Hebrew refers
      to crushed kernels prepared for the grain offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall burn up
  lexicon: HALOT
  rationale: In sacrificial contexts, the Hiphil of קטר refers to burning an offering
    on the altar so that it goes up in smoke. 'Shall burn' is natural English and
    sufficiently precise; 'turn into smoke' is more literal to the ritual imagery
    but less idiomatic.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כהן in cultic legislation.
- source_word: אַזְכָּרָתָהּ
  chosen: its memorial portion
  alternatives:
  - its memorial offering
  - the reminder portion of it
  lexicon: HALOT
  rationale: אַזכרה is the technical term for the representative portion of the grain
    offering burned on the altar as a memorial before God. 'Memorial portion' preserves
    the cultic sense better than the vaguer 'memorial offering' in this context.
- source_word: מִגִּרְשָׂהּ
  chosen: from its crushed grain
  alternatives:
  - from its groats
  - from its grits
  - from its coarsely ground grain
  lexicon: HALOT
  rationale: גרש refers to crushed or coarsely ground kernels. 'Crushed grain' is
    understandable modern English and fits the preparation of firstfruits grain offerings.
    'Groats' is more technical but less accessible.
- source_word: וּמִשַּׁמְנָהּ
  chosen: from its oil
  alternatives:
  - and some of its oil
  lexicon: HALOT
  rationale: The preposition מן with the memorial portion indicates that the burned
    portion is taken from the grain and from the oil. 'From its oil' mirrors the Hebrew
    structure.
- source_word: עַל כָּל לְבֹנָתָהּ
  chosen: with all its frankincense
  alternatives:
  - together with all its frankincense
  - upon all its frankincense
  lexicon: HALOT
  rationale: 'In this sacrificial instruction, על is best rendered idiomatically as
    accompaniment: the memorial portion is burned along with all the frankincense.
    ''With all its frankincense'' is clear and natural.'
- source_word: אִשֶּׁה
  chosen: an offering made by fire
  alternatives:
  - a food offering
  - a fire offering
  lexicon: HALOT
  rationale: אשה is the standard sacrificial term for an offering presented by fire.
    'Offering made by fire' is traditional but still understandable; 'food offering'
    can be misleading if taken too literally.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The lamed here marks dedication/direction
    of the offering; 'to the LORD' is a straightforward rendering.
