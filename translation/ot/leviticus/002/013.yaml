theological_decisions:
- issue: Whether to preserve the covenantal expression literally or paraphrase its
    symbolic meaning
  chosen_reading: Retain 'the salt of the covenant of your God' in the main text
  alternative_readings:
  - the salt that signifies the covenant of your God
  - the covenant salt required by your God
  rationale: The verse itself states the phrase without explaining its symbolism.
    Per translation philosophy, the draft preserves the theological tension and cultic
    imagery rather than resolving it by paraphrase.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
