id: LEV.2.13
reference: Leviticus 2:13
source:
  edition: WLC
  text: וְ/כָל קָרְבַּ֣ן מִנְחָתְ/ךָ֮ בַּ/מֶּ֣לַח תִּמְלָח֒ וְ/לֹ֣א תַשְׁבִּ֗ית מֶ֚לַח
    בְּרִ֣ית אֱלֹהֶ֔י/ךָ מֵ/עַ֖ל מִנְחָתֶ֑/ךָ עַ֥ל כָּל קָרְבָּנְ/ךָ֖ תַּקְרִ֥יב מֶֽלַח־־׃ס
translation:
  text: And every offering of your grain offering you shall season with salt. You
    shall not let the salt of the covenant of your God be missing from your grain
    offering; with all your offerings you shall present salt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall salt.' The Hebrew is more literally, 'with salt you shall
      salt.'
    reason: lexical_alternative
  - marker: b
    text: '''The salt of the covenant of your God'' is a literal rendering of a covenantal
      expression associated with sacrificial faithfulness and permanence.'
    reason: cultural_note
  - marker: c
    text: Or 'on all your offerings you shall offer salt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבַּן
  chosen: offering
  alternatives:
  - gift
  - oblation
  lexicon: HALOT
  rationale: A broad sacrificial term; 'offering' is the most natural modern English
    equivalent and fits both occurrences in the verse. 'Oblation' is too archaic for
    the stated philosophy.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In Leviticus 2 the term specifically denotes the cereal/grain offering,
    so the fuller rendering preserves cultic specificity better than the generic 'offering.'
    'Tribute offering' reflects the term's wider semantic range but is less fitting
    in this immediate sacrificial context.
- source_word: בַּמֶּלַח תִּמְלָח
  chosen: you shall season with salt
  alternatives:
  - you shall salt
  - you shall season with salt thoroughly
  lexicon: HALOT
  rationale: The Hebrew uses the noun 'salt' with the verb 'to salt.' 'Season with
    salt' is idiomatic modern English while preserving the ritual requirement. A more
    wooden 'you shall salt' is possible but less natural.
- source_word: תַשְׁבִּית
  chosen: let ... be missing
  alternatives:
  - omit
  - cause to cease
  - withhold
  lexicon: HALOT
  rationale: The Hiphil of שבת here means to make lacking/stop/remove. 'Let ... be
    missing' captures the prohibition in clear English and fits the construction 'from
    your grain offering.'
- source_word: מֶלַח בְּרִית אֱלֹהֶיךָ
  chosen: the salt of the covenant of your God
  alternatives:
  - the covenant salt of your God
  - the salt of your God's covenant
  lexicon: HALOT
  rationale: This preserves the Hebrew genitive chain and the covenantal phrase without
    over-interpreting its symbolism. It is a recognized biblical expression and should
    remain transparent in the main text.
- source_word: מֵעַל
  chosen: from
  alternatives:
  - from upon
  - off of
  lexicon: HALOT
  rationale: Although literally 'from upon,' English idiom prefers 'from' after 'be
    missing,' and the sense is fully preserved.
- source_word: עַל כָּל קָרְבָּנְךָ
  chosen: with all your offerings
  alternatives:
  - on all your offerings
  - upon every offering of yours
  lexicon: HALOT
  rationale: The preposition can be rendered more literally as 'on,' but in English
    sacrificial presentation language 'with all your offerings' communicates the required
    accompaniment of salt more naturally while preserving the sense.
- source_word: תַּקְרִיב
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present/offer.
    'Present' avoids repetition with 'offering' while retaining the cultic action.
