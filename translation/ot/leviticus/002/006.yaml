id: LEV.2.6
reference: Leviticus 2:6
source:
  edition: WLC
  text: פָּת֤וֹת אֹתָ/הּ֙ פִּתִּ֔ים וְ/יָצַקְתָּ֥ עָלֶ֖י/הָ שָׁ֑מֶן מִנְחָ֖ה הִֽוא׃ס
translation:
  text: Break it into pieces and pour oil on it; it is a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divide it into morsels' or 'fragments.' The Hebrew emphasizes breaking
      the offering into smaller pieces before oil is poured on it.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּת֤וֹת
  chosen: Break
  alternatives:
  - Divide
  - Crumble
  lexicon: HALOT
  rationale: The infinitive absolute from פתת functions imperativally here in sacrificial
    instructions. 'Break' is natural modern English and fits the action performed
    on the baked offering.
- source_word: אֹתָ/הּ
  chosen: it
  alternatives:
  - her/it
  rationale: The 3fs suffix refers back to the feminine noun for the offering/cake.
    English uses the inanimate pronoun 'it' for the sacrificial item.
- source_word: פִּתִּים
  chosen: into pieces
  alternatives:
  - into morsels
  - into fragments
  lexicon: HALOT
  rationale: The plural noun denotes broken pieces. 'Into pieces' is idiomatic and
    clearly expresses the result of the breaking.
- source_word: וְ/יָצַקְתָּ
  chosen: and pour
  alternatives:
  - then pour
  - and you shall pour
  lexicon: HALOT
  rationale: Qal perfect 2ms with vav in instructional sequence carries directive
    force. 'And pour' preserves the procedural flow without over-formalizing.
- source_word: עָלֶ֖י/הָ
  chosen: on it
  alternatives:
  - upon it
  - over it
  rationale: The preposition על with suffix indicates application onto the offering.
    'On it' is the clearest contemporary rendering.
- source_word: שָׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew says simply 'oil.' While olive oil is culturally likely, specifying
    'olive' would add information not explicit in the text.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  - tribute offering
  lexicon: HALOT
  rationale: In Leviticus 2 the cultic term refers specifically to the cereal/grain
    offering. 'Grain offering' is the standard contextually precise rendering in English.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  rationale: 'The independent pronoun identifies the item just described: ''it is
    a grain offering.'' This preserves the Hebrew predication straightforwardly.'
