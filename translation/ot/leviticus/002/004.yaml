theological_decisions:
- issue: Rendering of מִנְחָה in cultic context
  chosen_reading: grain offering
  alternative_readings:
  - tribute offering
  - gift offering
  rationale: Although מִנְחָה can denote tribute or gift in broader Hebrew usage,
    Leviticus 2 specifies a sacrificial category composed of flour/oil preparations.
    'Grain offering' preserves the cultic specificity without importing extra theology.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
