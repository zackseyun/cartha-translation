id: LEV.2.4
reference: Leviticus 2:4
source:
  edition: WLC
  text: וְ/כִ֥י תַקְרִ֛ב קָרְבַּ֥ן מִנְחָ֖ה מַאֲפֵ֣ה תַנּ֑וּר סֹ֣לֶת חַלּ֤וֹת מַצֹּת֙
    בְּלוּלֹ֣ת בַּ/שֶּׁ֔מֶן וּ/רְקִיקֵ֥י מַצּ֖וֹת מְשֻׁחִ֥ים בַּ/שָּֽׁמֶן׃ס
translation:
  text: 'And if you bring as an offering a grain offering baked in an oven, it shall
    be of fine flour: unleavened cakes mixed with oil, or unleavened wafers anointed
    with oil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and unleavened wafers.' The Hebrew conjunction is 'and,' but here it
      likely lists an alternative form of the oven-baked grain offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case within the sacrificial instructions. 'And
    if' preserves the connective force of ו plus conditional כִּי in legal/procedural
    discourse.
- source_word: תַקְרִב
  chosen: you bring
  alternatives:
  - you present
  - you offer
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near/present an offering. 'Bring'
    is natural English and fits the collocation with קָרְבַּן, while still reflecting
    the underlying motion toward presentation.
- source_word: קָרְבַּן
  chosen: offering
  alternatives:
  - gift offering
  - oblation
  lexicon: HALOT
  rationale: Generic sacrificial term meaning something brought near/presented. 'Offering'
    is the clearest modern equivalent; 'gift offering' is possible but less idiomatic
    here.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - tribute offering
  - gift offering
  lexicon: HALOT
  rationale: In Levitical sacrificial context, מִנְחָה refers specifically to the
    cereal/grain offering rather than a general gift or tribute. 'Grain offering'
    is the standard contextual sense and best communicates the ritual category.
- source_word: מַאֲפֵה תַנּוּר
  chosen: baked in an oven
  alternatives:
  - oven-baked
  - a baking of an oven
  lexicon: HALOT
  rationale: Construct phrase describing the preparation method of the grain offering.
    'Baked in an oven' is idiomatic English that preserves the sense without wooden
    literalism.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - finely milled flour
  lexicon: HALOT
  rationale: Refers to high-quality fine flour used in offerings. 'Fine flour' is
    the conventional and accurate rendering.
- source_word: חַלּוֹת מַצּוֹת
  chosen: unleavened cakes
  alternatives:
  - unleavened loaves
  - flat cakes without yeast
  lexicon: HALOT
  rationale: Denotes cake-like bread portions made without leaven. 'Unleavened cakes'
    is concise and standard in sacrificial contexts.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - blended with oil
  lexicon: HALOT
  rationale: Passive participle from בלל indicates the flour/cakes are mixed or kneaded
    with oil. 'Mixed with oil' is clear modern English.
- source_word: וּרְקִיקֵי מַצּוֹת
  chosen: or unleavened wafers
  alternatives:
  - and unleavened wafers
  - thin unleavened cakes
  lexicon: HALOT
  rationale: רְקִיקִים are thin cakes/wafers. The conjunction here introduces a second
    permitted form of the oven-baked grain offering; 'or' communicates the alternative
    relationship more clearly in English than a bare 'and'.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  chosen: anointed with oil
  alternatives:
  - smeared with oil
  - spread with oil
  lexicon: HALOT
  rationale: Passive participle from משׁח means smeared/anointed. 'Anointed with oil'
    is the most direct lexical equivalent, though in this ritual-food context it refers
    to application of oil rather than consecration language alone.
