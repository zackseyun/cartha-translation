id: LEV.12.7
reference: Leviticus 12:7
source:
  edition: WLC
  text: וְ/הִקְרִיב֞/וֹ לִ/פְנֵ֤י יְהוָה֙ וְ/כִפֶּ֣ר עָלֶ֔י/הָ וְ/טָהֲרָ֖ה מִ/מְּקֹ֣ר דָּמֶ֑י/הָ זֹ֤את תּוֹרַת֙ הַ/יֹּלֶ֔דֶת לַ/זָּכָ֖ר א֥וֹ לַ/נְּקֵבָֽה׃
translation:
  text: And he shall present it before Yahweh and make atonement for her, and she shall be cleansed from the source of her blood. This is the law for the woman who gives birth, whether to a male or to a female.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from her flow of blood.' The Hebrew literally says 'from the source of her blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיבוֹ
  chosen: he shall present it
  alternatives:
  - he shall offer it
  - he shall bring it near
  lexicon: HALOT
  rationale: Hiphil of קרב with 3ms object suffix refers to the priest bringing/presenting the offering mentioned in the previous verse before YHWH. 'Present it' is natural English and preserves the cultic sense without over-specifying beyond the object implied by context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic phrase meaning before/in the presence of YHWH. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: וְכִפֶּר עָלֶיהָ
  chosen: and make atonement for her
  alternatives:
  - and purge her
  - and effect expiation for her
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.' This is the standard accessible English equivalent and fits the ritual-cleansing context without importing a narrower theological theory.
- source_word: וְטָהֲרָה
  chosen: and she shall be clean
  alternatives:
  - and she shall be purified
  - and she shall be clean/pure
  lexicon: HALOT
  rationale: 'Qal perfect with vav in sequence gives the result of the priestly action: the woman becomes ritually clean. ''Clean'' is straightforward modern English and matches Levitical purity language.'
- source_word: מִמְּקֹר דָּמֶיהָ
  chosen: from the source of her blood
  alternatives:
  - from her flow of blood
  - from the fountain of her blood
  lexicon: HALOT
  rationale: מָקוֹר literally means 'source, spring, fountain.' In this purity context it refers to the bodily source/flow associated with postpartum bleeding. 'Source of her blood' preserves the Hebrew image more closely than the more interpretive 'flow of blood.'
- source_word: זֹאת תּוֹרַת
  chosen: This is the law for
  alternatives:
  - This is the instruction for
  - This is the regulation for
  lexicon: HALOT
  rationale: תּוֹרָה here denotes the prescribed ritual law/instruction. 'Law' is idiomatic in this formulaic Levitical context, though 'instruction' is a possible broader gloss.
- source_word: הַיֹּלֶדֶת
  chosen: the woman who gives birth
  alternatives:
  - the woman giving birth
  - the mother
  lexicon: HALOT
  rationale: The participle specifically denotes a woman in relation to childbirth. 'The woman who gives birth' is explicit and natural; 'mother' would be slightly more interpretive.
- source_word: לַזָּכָר אֹו לַנְּקֵבָה
  chosen: whether to a male or to a female
  alternatives:
  - for a son or for a daughter
  - to a boy or to a girl
  lexicon: HALOT
  rationale: The Hebrew uses the sex terms 'male' and 'female.' Rendering them as such preserves the formal distinction in the source better than the more idiomatic but less literal 'son/daughter' or 'boy/girl.'
