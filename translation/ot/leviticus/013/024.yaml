id: LEV.13.24
reference: Leviticus 13:24
source:
  edition: WLC
  text: א֣וֹ בָשָׂ֔ר כִּֽי יִהְיֶ֥ה בְ/עֹר֖/וֹ מִכְוַת אֵ֑שׁ וְֽ/הָיְתָ֞ה מִֽחְיַ֣ת
    הַ/מִּכְוָ֗ה בַּהֶ֛רֶת לְבָנָ֥ה אֲדַמְדֶּ֖מֶת א֥וֹ לְבָנָֽה־־׃
translation:
  text: Or if the body has on its skin a burn from fire, and the raw flesh of the
    burn becomes a bright spot, reddish-white or white,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flesh' instead of 'the body'; the Hebrew בָשָׂר commonly means 'flesh,'
      but here it refers to bodily tissue in a skin-disease law.
    reason: lexical_alternative
  - marker: b
    text: '''Raw flesh'' translates a Hebrew expression meaning living tissue appearing
      in the burn area.'
    reason: cultural_note
lexical_decisions:
- source_word: אוֹ
  chosen: Or if
  alternatives:
  - Or
  lexicon: HALOT
  rationale: Introduces an alternative case in the legal instruction. Rendering with
    'Or if' makes the conditional force natural in English while preserving the disjunctive
    sense.
- source_word: בָשָׂר
  chosen: the body
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: Here the term refers to a person's bodily tissue in a diagnostic law.
    'The body' is more natural modern English than 'flesh' in this medical context,
    without changing the referent.
- source_word: בְּעֹרוֹ
  chosen: on its skin
  alternatives:
  - in his skin
  - on his skin
  lexicon: HALOT
  rationale: The phrase literally refers to the skin of the affected person/body.
    Because the clause begins impersonally with 'the body,' 'its skin' keeps agreement
    in English and avoids an unnecessary shift to masculine pronouns.
- source_word: מִכְוַת אֵשׁ
  chosen: a burn from fire
  alternatives:
  - a burning of fire
  - a fire burn
  - a burn caused by fire
  lexicon: HALOT
  rationale: This construct phrase denotes a burn injury caused by fire. 'A burn from
    fire' is clear, accurate, and idiomatic.
- source_word: וְהָיְתָה
  chosen: becomes
  alternatives:
  - and it is
  - and it has become
  lexicon: HALOT
  rationale: The perfect with vav in this procedural context advances the case description.
    English present 'becomes' fits the legal-diagnostic style better than a wooden
    past.
- source_word: מִחְיַת הַמִּכְוָה
  chosen: the raw flesh of the burn
  alternatives:
  - the living tissue of the burn
  - the quick flesh of the burn
  lexicon: HALOT
  rationale: מִחְיָה in skin-disease contexts refers to live/raw tissue appearing
    in an affected area. 'Raw flesh' is the clearest idiomatic medical description
    in English.
- source_word: בַּהֶרֶת
  chosen: a bright spot
  alternatives:
  - a bright swelling
  - a shining patch
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a conspicuous bright patch/spot on
    the skin. 'Bright spot' is concise and consistent with the diagnostic terminology.
- source_word: לְבָנָה אֲדַמְדֶּמֶת
  chosen: reddish-white
  alternatives:
  - white and reddish
  - whitish-red
  lexicon: HALOT
  rationale: The paired adjectives describe a mixed coloration. 'Reddish-white' captures
    the combined hue naturally in English.
- source_word: אוֹ לְבָנָה
  chosen: or white
  lexicon: HALOT
  rationale: Preserves the alternative color description exactly and simply.
