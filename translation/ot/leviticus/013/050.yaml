id: LEV.13.50
reference: Leviticus 13:50
source:
  edition: WLC
  text: וְ/רָאָ֥ה הַ/כֹּהֵ֖ן אֶת הַ/נָּ֑גַע וְ/הִסְגִּ֥יר אֶת הַ/נֶּ֖גַע שִׁבְעַ֥ת
    יָמִֽים־־׃
translation:
  text: And the priest shall examine the diseased area, and he shall quarantine the
    diseased area for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the infection,' 'the spot,' or more traditionally 'the plague.' The
      Hebrew term refers to the affected mark or area under priestly examination,
      not necessarily a specific modern disease category.
    reason: lexical_alternative
  - marker: b
    text: Or 'isolate' or more literally 'shut up.' The sense is temporary confinement
      for observation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - shall inspect
  - shall look at
  lexicon: HALOT
  rationale: Though the verb literally means 'see,' in priestly diagnostic context
    it denotes official examination/inspection rather than mere visual perception.
    'Examine' best conveys the procedural sense in natural English.
- source_word: הַ/כֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Leviticus; the definite article is preserved.
- source_word: הַ/נָּגַע / הַ/נֶּגַע
  chosen: the diseased area
  alternatives:
  - the infection
  - the spot
  - the plague
  - the affliction
  lexicon: HALOT
  rationale: נגע in Leviticus 13 refers to the affected area/mark under priestly examination,
    not necessarily a modern medical diagnosis. 'Diseased area' is clear, avoids archaic
    'plague,' and fits the inspection context. The same English gloss is kept for
    both occurrences for consistency.
- source_word: וְ/הִסְגִּיר
  chosen: shall quarantine
  alternatives:
  - shall isolate
  - shall shut up
  - shall confine
  lexicon: HALOT
  rationale: The hiphil of סגר here means to shut up or isolate for observation. 'Quarantine'
    communicates the temporary, diagnostic isolation in contemporary English more
    precisely than the archaic 'shut up.'
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Idiomatic English requires 'for' with the duration after the verb 'quarantine.'
    The Hebrew construct phrase is straightforwardly temporal.
