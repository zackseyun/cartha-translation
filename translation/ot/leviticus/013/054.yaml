id: LEV.13.54
reference: Leviticus 13:54
source:
  edition: WLC
  text: וְ/צִוָּה֙ הַ/כֹּהֵ֔ן וְ/כִ֨בְּס֔וּ אֵ֥ת אֲשֶׁר בּ֖/וֹ הַ/נָּ֑גַע וְ/הִסְגִּיר֥/וֹ
    שִׁבְעַת יָמִ֖ים שֵׁנִֽית־־׃
translation:
  text: Then the priest shall command them to wash the thing in which the infection
    is, and he shall quarantine it for seven days a second time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the article in which the infection is.' The Hebrew expression is intentionally
      broad and refers to the affected item under examination.
    reason: lexical_alternative
  - marker: b
    text: Or 'isolate it' or more formally 'shut it up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  chosen: Then ... shall command
  alternatives:
  - and ... shall command
  - and ... commanded
  lexicon: HALOT
  rationale: The waw + perfect in legal/instructional sequence is best rendered as
    a future/modal continuation in English ('shall command'). 'Then' brings out the
    procedural sequence naturally.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the officiating cultic authority in Leviticus.
- source_word: וְכִבְּסוּ
  chosen: them to wash
  alternatives:
  - and they shall wash
  - have it washed
  lexicon: HALOT
  rationale: The 3cp verb after 'the priest shall command' implies unnamed people
    carrying out the washing. English expresses this naturally as an infinitive complement,
    'command them to wash,' without specifying the agents beyond the Hebrew.
- source_word: אֵת אֲשֶׁר בּוֹ הַנָּגַע
  chosen: the thing in which the infection is
  alternatives:
  - that in which the infection is
  - the article in which the disease is
  - the item with the spot
  lexicon: HALOT
  rationale: The relative construction refers back to the affected object under inspection
    (garment/leather/woven item in context). 'Thing' is broad enough to preserve the
    Hebrew's nonspecific reference. 'In which the infection is' closely follows the
    Hebrew wording.
- source_word: הַנָּגַע
  chosen: the infection
  alternatives:
  - the disease
  - the affliction
  - the mark
  - the plague
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes an afflicting contamination/eruption
    affecting persons or objects. For an inanimate object, 'infection' is more natural
    in modern English than 'plague' while still conveying a serious contaminating
    condition.
- source_word: וְהִסְגִּירוֹ
  chosen: and he shall quarantine it
  alternatives:
  - and he shall isolate it
  - and he shall shut it up
  lexicon: HALOT
  rationale: The verb means to shut up/confine for inspection. 'Quarantine' communicates
    the procedural isolation in contemporary English and fits the impurity-inspection
    context better than the more wooden 'shut it up.'
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  lexicon: HALOT
  rationale: Direct and standard rendering of the time period.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: HALOT
  rationale: This adverb marks repetition of the seven-day confinement. 'A second
    time' is explicit and idiomatic in English.
