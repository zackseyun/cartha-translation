theological_decisions:
- issue: Nature of טָמֵא in Levitical purity law
  chosen_reading: unclean
  alternative_readings:
  - defiled
  - impure
  rationale: In Leviticus 13 the term denotes ritual impurity status within priestly
    law, not necessarily moral guilt. 'Unclean' is the established and clearest English
    equivalent.
