id: LEV.13.36
reference: Leviticus 13:36
source:
  edition: WLC
  text: וְ/רָאָ֨/הוּ֙ הַ/כֹּהֵ֔ן וְ/הִנֵּ֛ה פָּשָׂ֥ה הַ/נֶּ֖תֶק בָּ/ע֑וֹר לֹֽא יְבַקֵּ֧ר
    הַ/כֹּהֵ֛ן לַ/שֵּׂעָ֥ר הַ/צָּהֹ֖ב טָמֵ֥א הֽוּא־׃
translation:
  text: and the priest examines him, and behold, the scaly infection has spread in
    the skin, the priest need not look for the yellow hair; he is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the itch' for the Hebrew term referring to a scaly skin condition, especially
      on the head or beard.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  chosen: and the priest examines him
  alternatives:
  - and the priest sees him
  - and the priest looks at him
  lexicon: HALOT
  rationale: Though the verb is formally 'has seen him,' in priestly inspection contexts
    ראה functions as an evaluative examination. Present-tense English ('examines')
    gives the procedural force naturally in context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and if indeed
  lexicon: HALOT
  rationale: Retains the deictic force marking the observed condition. 'Behold' is
    slightly formal but still readable and fits inspection formula language.
- source_word: פָּשָׂה
  chosen: has spread
  alternatives:
  - has extended
  - has broken out further
  lexicon: HALOT
  rationale: Standard rendering in skin-disease legislation for the lesion's expansion.
- source_word: הַנֶּתֶק
  chosen: the scaly infection
  alternatives:
  - the itch
  - the diseased patch
  - the eruption
  lexicon: HALOT
  rationale: נתק in Leviticus 13 refers to a specific scalp/beard affliction characterized
    by scaling and hair changes. 'Scaly infection' is more precise and accessible
    than the traditional but misleading 'itch.'
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  lexicon: HALOT
  rationale: Either preposition is possible idiomatically in English; 'in the skin'
    reflects the Hebrew more closely while remaining natural enough in this diagnostic
    context.
- source_word: לֹא יְבַקֵּר
  chosen: need not look for
  alternatives:
  - shall not examine for
  - does not need to inspect for
  lexicon: HALOT
  rationale: בקר here means to inspect or investigate. With the negation, the sense
    is that no further check for this diagnostic sign is required once spread is established.
- source_word: לַשֵּׂעָר הַצָּהֹב
  chosen: the yellow hair
  alternatives:
  - yellowish hair
  - golden hair
  lexicon: HALOT
  rationale: This is the diagnostic sign mentioned earlier in the chapter. 'Yellow
    hair' is the most direct and clear rendering.
- source_word: טָמֵא הוּא
  chosen: he is unclean
  alternatives:
  - it is unclean
  lexicon: HALOT
  rationale: The predicate refers to the affected person as ceremonially unclean,
    not merely the lesion. English rightly supplies 'he' for the examined individual.
