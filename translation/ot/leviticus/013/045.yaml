theological_decisions:
- issue: Nature of impurity language in Leviticus 13
  chosen_reading: Render טָמֵא as 'unclean' in its ritual/public-status sense without
    importing moral guilt or modern medical categories.
  alternative_readings:
  - impure
  - defiled
  rationale: In Levitical law, טָמֵא often denotes ritual impurity and social exclusion
    rather than necessarily personal sinfulness. 'Unclean' is the established and
    clearest English equivalent here.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
