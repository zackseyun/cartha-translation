id: LEV.13.45
reference: Leviticus 13:45
source:
  edition: WLC
  text: וְ/הַ/צָּר֜וּעַ אֲשֶׁר בּ֣/וֹ הַ/נֶּ֗גַע בְּגָדָ֞י/ו יִהְי֤וּ פְרֻמִים֙ וְ/רֹאשׁ/וֹ֙
    יִהְיֶ֣ה פָר֔וּעַ וְ/עַל שָׂפָ֖ם יַעְטֶ֑ה וְ/טָמֵ֥א טָמֵ֖א יִקְרָֽא־־׀׃
translation:
  text: As for the man with the skin disease, in whom the infection is, his clothes
    shall be torn, his head shall be left unkempt, he shall cover his mustache, and
    he shall cry out, ‘Unclean, unclean!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall cover his upper lip.' The Hebrew expression refers to covering
      the area of the lip/mustache as a sign of mourning and public warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצָּרוּעַ
  chosen: the man with the skin disease
  alternatives:
  - the leprous man
  - the diseased person
  - the one afflicted with a skin disease
  lexicon: HALOT
  rationale: The traditional English 'leper' or 'leprous' can misleadingly suggest
    Hansen's disease specifically, whereas the Levitical context concerns a broader
    category of serious skin disease. 'Man' reflects the masculine singular form and
    aligns with the gender-accurate policy.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the disease
  - the affliction
  - the plague
  lexicon: HALOT
  rationale: נגע in this context refers to the afflicting condition or outbreak associated
    with ritual impurity. 'Infection' is natural modern English and fits the immediate
    context, though not necessarily implying modern germ theory.
- source_word: בְּגָדָיו יִהְיוּ פְרֻמִים
  chosen: his clothes shall be torn
  alternatives:
  - his garments shall be torn
  - his clothes shall be ripped
  lexicon: HALOT
  rationale: פְרֻמִים denotes torn or rent garments, a sign of mourning or public
    distress. 'Clothes' is more readable modern English than 'garments' while preserving
    the sense.
- source_word: וְרֹאשׁוֹ יִהְיֶה פָרוּעַ
  chosen: his head shall be left unkempt
  alternatives:
  - his hair shall hang loose
  - his head shall be bare
  - his hair shall be disheveled
  lexicon: HALOT
  rationale: פָרוּעַ conveys loosened, neglected, or unbound hair rather than literal
    bareness. 'Left unkempt' communicates the public sign of disorder without over-specifying
    hairstyle.
- source_word: וְעַל שָׂפָם יַעְטֶה
  chosen: he shall cover his mustache
  alternatives:
  - he shall cover his upper lip
  - he shall cover over his lip
  lexicon: HALOT
  rationale: שָׂפָם can denote the upper lip or mustache area. 'Mustache' is a conventional
    rendering, but the phrase refers to covering the lower part of the face around
    the upper lip. A footnote preserves the more literal alternative.
- source_word: וְטָמֵא טָמֵא יִקְרָא
  chosen: he shall cry out, ‘Unclean, unclean!’
  alternatives:
  - he shall call out, ‘Unclean, unclean!’
  - he shall proclaim, ‘Unclean, unclean!’
  lexicon: HALOT
  rationale: The doubled adjective marks emphatic public declaration of ritual impurity.
    'Cry out' fits the public warning function better than the more neutral 'call'.
