id: LEV.13.43
reference: Leviticus 13:43
source:
  edition: WLC
  text: וְ/רָאָ֨ה אֹת֜/וֹ הַ/כֹּהֵ֗ן וְ/הִנֵּ֤ה שְׂאֵת הַ/נֶּ֨גַע֙ לְבָנָ֣ה אֲדַמְדֶּ֔מֶת
    בְּ/קָרַחְתּ֖/וֹ א֣וֹ בְ/גַבַּחְתּ֑/וֹ כְּ/מַרְאֵ֥ה צָרַ֖עַת ע֥וֹר בָּשָֽׂר־׃
translation:
  text: and the priest examines him, and behold, the swelling of the disease is whitish-red
    on his bald head or on his bald forehead, like the appearance of a skin disease
    on the flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת is traditionally rendered 'leprosy,' but in Leviticus it
      refers more broadly to a range of serious skin conditions rather than specifically
      Hansen's disease.
    reason: lexical_alternative
  - marker: b
    text: The two terms for baldness likely distinguish the back of the head and the
      front of the head; rendered here as 'bald head' and 'bald forehead' to preserve
      the contrast.
    reason: cultural_note
lexical_decisions:
- source_word: וְרָאָה
  chosen: and ... examines
  alternatives:
  - and ... sees
  - and ... looks at
  lexicon: HALOT
  rationale: Though formally 'and he saw/saw,' in priestly inspection contexts ראה
    commonly carries the sense of examining or inspecting. Present-tense English gives
    natural procedural force in this legal text.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the officiating priest in Levitical diagnostic
    procedures.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it is
  lexicon: HALOT
  rationale: Preserves the deictic force marking the priest's observed finding.
- source_word: שְׂאֵת
  chosen: swelling
  alternatives:
  - raised spot
  - elevation
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a raised lesion or swelling; 'swelling'
    is clear modern English and fits the diagnostic context.
- source_word: הַנֶּגַע
  chosen: the disease
  alternatives:
  - the affliction
  - the lesion
  - the plague
  lexicon: HALOT
  rationale: נגע in Leviticus 13 refers to the afflicting skin condition under examination.
    'Disease' is accessible and avoids archaic 'plague,' while still conveying pathology.
- source_word: לְבָנָה אֲדַמְדֶּמֶת
  chosen: whitish-red
  alternatives:
  - white-reddish
  - white and reddish
  - reddish-white
  lexicon: HALOT
  rationale: The paired adjectives describe a mixed pale/reddish coloration. 'Whitish-red'
    is concise and idiomatic while preserving both color elements.
- source_word: בְּקָרַחְתּוֹ
  chosen: on his bald head
  alternatives:
  - in his baldness
  - on the back-bald part of his head
  lexicon: HALOT
  rationale: קָרַחַת refers to baldness, often the back part of the head in contrast
    with גַּבַּחַת. 'On his bald head' is readable; the more technical distinction
    is preserved by pairing with the next term.
- source_word: בְגַבַּחְתּוֹ
  chosen: on his bald forehead
  alternatives:
  - in his front baldness
  - on the front-bald part of his head
  lexicon: HALOT
  rationale: גַּבַּחַת commonly denotes baldness at the front of the head. 'Bald forehead'
    communicates the contrast with קָרַחַת in natural English.
- source_word: כְּמַרְאֵה
  chosen: like the appearance of
  alternatives:
  - like
  - as the appearance of
  lexicon: HALOT
  rationale: Retains the comparative diagnostic language without overcompressing the
    phrase.
- source_word: צָרַעַת
  chosen: a skin disease
  alternatives:
  - leprosy
  - a defiling skin disease
  lexicon: HALOT
  rationale: Traditional 'leprosy' is misleading for the broader biblical category
    צָרַעַת. 'Skin disease' better reflects the Hebrew term's range in Leviticus.
- source_word: עוֹר בָּשָׂר
  chosen: on the flesh
  alternatives:
  - of the skin of the flesh
  - of bodily skin
  lexicon: HALOT
  rationale: The phrase literally involves skin/flesh, but in English 'on the flesh'
    is sufficiently natural while preserving the bodily reference. The preceding 'skin
    disease' already carries the skin component.
