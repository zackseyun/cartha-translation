id: LEV.13.52
reference: Leviticus 13:52
source:
  edition: WLC
  text: וְ/שָׂרַ֨ף אֶת הַ/בֶּ֜גֶד א֥וֹ אֶֽת הַ/שְּׁתִ֣י א֣וֹ אֶת הָ/עֵ֗רֶב בַּ/צֶּ֨מֶר֙
    א֣וֹ בַ/פִּשְׁתִּ֔ים א֚וֹ אֶת כָּל כְּלִ֣י הָ/ע֔וֹר אֲשֶׁר יִהְיֶ֥ה ב֖/וֹ הַ/נָּ֑גַע
    כִּֽי צָרַ֤עַת מַמְאֶ֨רֶת֙ הִ֔וא בָּ/אֵ֖שׁ תִּשָּׂרֵֽף־־׀־־־־־׃
translation:
  text: He shall burn the garment, or the warp or the woof in wool or in linen, or
    any article of leather in which the infection is, for it is a destructive skin
    disease; it shall be burned in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the weft'' for ''the woof.'' The Hebrew pairs two technical weaving
      terms: ''warp'' and ''woof/weft.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew צָרַעַת (traditionally 'leprosy') refers to a broader ritual impurity
      condition than modern leprosy and can also describe contamination in garments
      and houses.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׂרַף
  chosen: He shall burn
  alternatives:
  - and he shall burn
  - then he shall burn
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/procedural context functions
    as an instruction continuing the case law sequence; English future/modal 'shall'
    fits the prescriptive force.
- source_word: הַבֶּגֶד
  chosen: the garment
  alternatives:
  - the clothing
  - the cloth
  lexicon: HALOT
  rationale: בגד is the general term for a garment or article of clothing. 'Garment'
    is suitably formal and broad in this purity-law context.
- source_word: הַשְּׁתִי
  chosen: the warp
  alternatives:
  - the warp threads
  lexicon: HALOT
  rationale: Technical textile term for the longitudinal threads in weaving. 'Warp'
    is the standard concise English equivalent.
- source_word: הָעֵרֶב
  chosen: the woof
  alternatives:
  - the weft
  - the cross-threading
  lexicon: HALOT
  rationale: Paired with 'warp' as the transverse threads. 'Woof' is a traditional
    English textile term matching the pairing; 'weft' is a viable modern alternative.
- source_word: בַּצֶּמֶר
  chosen: in wool
  alternatives:
  - of wool
  - made of wool
  lexicon: HALOT
  rationale: The preposition marks the material sphere/category of the woven item.
    'In wool' preserves the Hebrew construction while remaining intelligible in context.
- source_word: בַפִּשְׁתִּים
  chosen: in linen
  alternatives:
  - of linen
  - made of flax
  lexicon: HALOT
  rationale: Though the noun is related to flax, in garment context the resulting
    textile 'linen' is the natural English rendering.
- source_word: כָּל כְּלִי הָעוֹר
  chosen: any article of leather
  alternatives:
  - any leather item
  - any vessel of skin
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement, object, or article. 'Article
    of leather' is broad enough to cover non-vessel objects and fits modern English
    better than 'vessel of skin.'
- source_word: אֲשֶׁר יִהְיֶה בוֹ הַנָּגַע
  chosen: in which the infection is
  alternatives:
  - that has the spot
  - in which the plague is
  - in which the diseased mark is
  lexicon: HALOT
  rationale: נגע in Leviticus 13 denotes the affected mark/affliction. 'Infection'
    communicates an observable contaminating condition without over-specifying modern
    medical categories.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprous disease
  - defiling disease
  - tzaraath
  lexicon: HALOT
  rationale: The term does not correspond neatly to modern Hansen's disease and in
    Leviticus extends beyond human skin to garments and houses. 'Skin disease' avoids
    misleading medical specificity while signaling the broader Levitical category.
- source_word: מַמְאֶרֶת
  chosen: destructive
  alternatives:
  - corrosive
  - spreading
  - malignant
  lexicon: HALOT
  rationale: The adjective denotes something persistent, consuming, or malignant in
    effect. 'Destructive' captures the practical sense in a garment context without
    importing modern oncological nuance.
- source_word: בָּאֵשׁ תִּשָּׂרֵף
  chosen: it shall be burned in the fire
  alternatives:
  - it must be burned with fire
  - it shall be burned up in fire
  lexicon: HALOT
  rationale: Niphal imperfect gives the required result/passive outcome. 'In the fire'
    is a natural rendering of the prepositional phrase and preserves the legal prescription.
