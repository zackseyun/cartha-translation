theological_decisions:
- issue: Rendering of צָרַעַת in Levitical impurity legislation
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  - tzaraath
  rationale: The Hebrew term covers a ritual-impurity category broader than modern
    leprosy and is even applied to fabrics and houses in this chapter. 'Skin disease'
    avoids anachronistic medical identification while remaining readable. Because
    the present verse applies the term to cloth/leather, the translation keeps the
    lexical link but does not imply a modern diagnosis.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
