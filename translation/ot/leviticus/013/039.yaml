id: LEV.13.39
reference: Leviticus 13:39
source:
  edition: WLC
  text: וְ/רָאָ֣ה הַ/כֹּהֵ֗ן וְ/הִנֵּ֧ה בְ/עוֹר בְּשָׂרָ֛/ם בֶּהָרֹ֖ת כֵּה֣וֹת לְבָנֹ֑ת
    בֹּ֥הַק ה֛וּא פָּרַ֥ח בָּ/ע֖וֹר טָה֥וֹר הֽוּא־׃ס
translation:
  text: and the priest examines, and behold, on the skin of their flesh there are
    dull white spots, it is a harmless rash that has broken out on the skin; he is
    clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a skin eruption' or 'freckled spot.' The Hebrew term refers to a non-defiling
      skin condition distinct from the more serious disease discussed in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: examines
  alternatives:
  - sees
  - looks
  lexicon: HALOT
  rationale: In priestly inspection contexts, ראה often carries the sense of examining/inspecting
    rather than mere visual perception. Present-tense English fits procedural legislation
    style.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the diagnosing officiant in Leviticus 13.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and if indeed
  lexicon: HALOT
  rationale: Retains the deictic force that introduces the inspection result. Slightly
    formal but still readable.
- source_word: בְעוֹר בשרם
  chosen: on the skin of their flesh
  alternatives:
  - on the skin of their body
  - in the skin of their flesh
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew wording. 'Their' reflects the 3mp suffix; singular
    'flesh' is idiomatic collective.
- source_word: בֶּהָרֹת
  chosen: spots
  alternatives:
  - bright spots
  - patches
  lexicon: HALOT
  rationale: In this dermatological context the noun refers to visible skin marks
    or patches. 'Spots' is natural English; the modifying adjectives carry the color/brightness
    nuance.
- source_word: כֵּהוֹת לְבָנֹת
  chosen: dull white
  alternatives:
  - faint white
  - dim white
  - pale white
  lexicon: HALOT
  rationale: כֵּהוֹת contrasts with brighter lesions and indicates a subdued/faint
    appearance; paired with לְבָנֹת it describes the spots as whitish but not vivid.
- source_word: בֹּהַק
  chosen: a harmless rash
  alternatives:
  - an eruption
  - freckled spot
  - a skin rash
  lexicon: HALOT
  rationale: This rare term denotes a non-defiling skin condition distinct from serious
    scale disease. 'Harmless rash' makes explicit the diagnostic force of the term
    in context without overstating medical precision.
- source_word: פָּרַח
  chosen: has broken out
  alternatives:
  - has spread
  - has blossomed forth
  - has erupted
  lexicon: HALOT
  rationale: For skin conditions, פרח idiomatically describes erupting or breaking
    out on the skin.
- source_word: טָהוֹר הוּא
  chosen: he is clean
  alternatives:
  - he is ceremonially clean
  - he is pure
  lexicon: HALOT
  rationale: In Leviticus 13 the priestly verdict concerns ritual cleanness. 'Clean'
    is the standard concise rendering; 'ceremonially' is interpretive and can be left
    implicit.
