theological_decisions:
- issue: Nature of the priestly verdict
  chosen_reading: Render טָהוֹר as 'clean' in ritual/legal sense, not as a statement
    of moral purity or medical cure.
  alternative_readings:
  - he is pure
  - he is ceremonially clean
  rationale: The context is Levitical diagnosis of impurity status. 'Clean' preserves
    the cultic category while remaining readable modern English.
  doctrine_reference: Translation philosophy §6; preserve source-text sense without
    importing extra doctrinal claims.
