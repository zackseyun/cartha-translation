id: LEV.13.58
reference: Leviticus 13:58
source:
  edition: WLC
  text: וְ/הַ/בֶּ֡גֶד אֽוֹ הַ/שְּׁתִ֨י אוֹ הָ/עֵ֜רֶב אֽוֹ כָל כְּלִ֤י הָ/עוֹר֙ אֲשֶׁ֣ר
    תְּכַבֵּ֔ס וְ/סָ֥ר מֵ/הֶ֖ם הַ/נָּ֑גַע וְ/כֻבַּ֥ס שֵׁנִ֖ית וְ/טָהֵֽר־־־־׃
translation:
  text: But the garment, or the warp, or the woof, or any article of leather that
    you wash, if the infection departs from them, shall be washed a second time and
    be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the weft' for 'the woof.' The Hebrew term refers to the crosswise threads
      in woven material.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֶּגֶד
  chosen: the garment
  alternatives:
  - the clothing
  - the cloth
  lexicon: HALOT
  rationale: בגד is the general term for a garment or piece of clothing. 'Garment'
    is natural English and fits the ritual context.
- source_word: הַשְּׁתִי
  chosen: the warp
  alternatives:
  - the longitudinal threads
  lexicon: HALOT
  rationale: Technical textile term for the threads set lengthwise in weaving. 'Warp'
    is the standard concise English equivalent.
- source_word: הָעֵרֶב
  chosen: the woof
  alternatives:
  - the weft
  - the crosswise threads
  lexicon: HALOT
  rationale: Paired with שׁתי in weaving terminology. 'Woof' is a traditional English
    equivalent; 'weft' is a modern alternative. 'Woof' preserves the established pairing
    'warp and woof,' though the alternative is worth preserving.
- source_word: כָל כְּלִי הָעוֹר
  chosen: any article of leather
  alternatives:
  - any leather item
  - any vessel of leather
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement, object, or article. In this
    context 'article' avoids the overly narrow 'vessel' while keeping the concrete
    sense.
- source_word: תְּכַבֵּס
  chosen: you wash
  alternatives:
  - you wash it
  - you launder
  lexicon: HALOT
  rationale: Piel of כבס means to wash garments/textiles. The 2ms form is retained
    as 'you wash,' matching the instructional style addressed to the priest/reader.
- source_word: הַנָּגַע
  chosen: the infection
  alternatives:
  - the plague
  - the diseased spot
  - the affliction
  lexicon: HALOT
  rationale: In Leviticus 13 the term refers to the visible contaminating skin/mildew-like
    outbreak affecting materials. 'Infection' communicates the practical sense in
    readable modern English without importing a precise modern medical diagnosis.
- source_word: וְסָר מֵהֶם
  chosen: if the infection departs from them
  alternatives:
  - and the infection has gone from them
  - and it disappears from them
  lexicon: HALOT
  rationale: 'The qatal after אֲשֶׁר-clause is best rendered conditionally in context:
    after washing, if the mark has gone away. ''Departs'' is slightly more formal
    but still natural.'
- source_word: וְכֻבַּס שֵׁנִית
  chosen: shall be washed a second time
  alternatives:
  - must be washed again
  - is to be washed a second time
  lexicon: HALOT
  rationale: Passive of כבס with שׁנית indicates a repeated washing. 'Shall be washed
    a second time' preserves the procedural force.
- source_word: וְטָהֵר
  chosen: and be clean
  alternatives:
  - and it shall be clean
  - and it is clean
  lexicon: HALOT
  rationale: טהר in this ritual context denotes ceremonial cleanness. 'Be clean' is
    concise and idiomatic after the passive instruction; the subject is the item just
    mentioned.
