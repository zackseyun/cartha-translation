id: LEV.13.33
reference: Leviticus 13:33
source:
  edition: WLC
  text: וְ/הִ֨תְגַּלָּ֔ח וְ/אֶת הַ/נֶּ֖תֶק לֹ֣א יְגַלֵּ֑חַ וְ/הִסְגִּ֨יר הַ/כֹּהֵ֧ן
    אֶת הַ/נֶּ֛תֶק שִׁבְעַ֥ת יָמִ֖ים שֵׁנִֽית־־׃
translation:
  text: then he shall shave himself, but he shall not shave the scaly spot; and the
    priest shall isolate the scaly spot for seven days a second time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the itch.” The Hebrew term refers to a particular skin condition of
      the head or beard, likely involving scaling and hair loss.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says “he shall not shave the scaly spot,” likely meaning the
      affected patch itself is left unshaved so the priest can inspect it clearly
      after the surrounding hair is removed.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְגַּלָּח
  chosen: then he shall shave himself
  alternatives:
  - then he shall be shaved
  - then he shall shave
  lexicon: HALOT
  rationale: Hitpael of גלח is reflexive, indicating the affected person shaves himself
    or has himself shaved. English reflexive wording best preserves the sense. 'Then'
    reflects the sequential waw in procedural law.
- source_word: הַנֶּתֶק
  chosen: the scaly spot
  alternatives:
  - the itch
  - the diseased area
  - the eruption
  lexicon: HALOT
  rationale: נֶתֶק in Leviticus 13 refers to a specific scalp/beard affliction marked
    by hair loss, not ordinary itching. 'Scaly spot' is clear modern English that
    fits the diagnostic context better than the traditional but potentially misleading
    'dry scall' or the too-symptomatic 'itch'.
- source_word: לֹא יְגַלֵּחַ
  chosen: he shall not shave
  alternatives:
  - he must not shave
  lexicon: HALOT
  rationale: Imperfect with negation in legal instruction is naturally rendered as
    prohibition. 'Shall not' matches the procedural legal register.
- source_word: וְאֶת הַנֶּתֶק לֹא יְגַלֵּחַ
  chosen: but he shall not shave the scaly spot
  alternatives:
  - but he shall not shave around the scaly spot
  - but he shall not shave the affected area
  lexicon: HALOT
  rationale: The direct object marker indicates the affected area itself is not to
    be shaved. Some interpreters understand the instruction as leaving hair on the
    lesion while shaving surrounding hair for inspection; the Hebrew most directly
    says the lesion is not shaved, so the main text preserves that wording without
    over-explaining.
- source_word: וְהִסְגִּיר
  chosen: and ... shall isolate
  alternatives:
  - and ... shall quarantine
  - and ... shall confine
  lexicon: HALOT
  rationale: In Leviticus 13 the priest temporarily separates the person/affected
    case for observation. 'Isolate' is clear, modern, and less anachronistically medical
    than 'quarantine,' while still conveying ritual-procedural separation.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כהן in Levitical legal material.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  lexicon: HALOT
  rationale: Straightforward duration phrase.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: HALOT
  rationale: This adverb marks a repeated seven-day isolation period. 'A second time'
    is explicit and natural in English.
