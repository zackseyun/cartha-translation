id: LEV.13.37
reference: Leviticus 13:37
source:
  edition: WLC
  text: וְ/אִם בְּ/עֵינָי/ו֩ עָמַ֨ד הַ/נֶּ֜תֶק וְ/שֵׂעָ֨ר שָׁחֹ֧ר צָֽמַח בּ֛/וֹ נִרְפָּ֥א
    הַ/נֶּ֖תֶק טָה֣וֹר ה֑וּא וְ/טִהֲר֖/וֹ הַ/כֹּהֵֽן־־׃ס
translation:
  text: But if in his sight the scaly eruption has remained unchanged, and black hair
    has grown in it, the scaly eruption is healed; he is clean, and the priest shall
    pronounce him clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the priest shall declare him clean.' The Hebrew verb can be rendered
      'cleanse,' but here it refers to the priest's formal ruling after the condition
      has healed.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵינָיו
  chosen: in his sight
  alternatives:
  - in his eyes
  - to him
  - in his opinion
  lexicon: HALOT
  rationale: Idiomatic Hebrew for assessment from the examiner's perspective. Rendered
    literally enough to preserve the inspection setting, rather than flattening to
    merely 'to him.'
- source_word: עָמַד
  chosen: has remained unchanged
  alternatives:
  - has stood
  - has remained
  - has stayed
  lexicon: HALOT
  rationale: In this diagnostic context the verb means the condition has stayed as
    it was rather than spread or altered. 'Remained unchanged' makes the medical-inspection
    sense clear in natural English.
- source_word: הַנֶּתֶק
  chosen: the scaly eruption
  alternatives:
  - the itch
  - the scall
  - the diseased patch
  lexicon: HALOT
  rationale: The term denotes a specific scalp/beard skin affliction discussed in
    this chapter. 'Scaly eruption' is clearer for modern readers than archaic 'scall'
    and less misleading than 'itch,' which sounds merely symptomatic.
- source_word: שֵׂעָר שָׁחֹר
  chosen: black hair
  alternatives:
  - dark hair
  lexicon: HALOT
  rationale: A straightforward rendering of the phrase. 'Black' matches the Hebrew
    adjective directly and fits the diagnostic contrast in the passage.
- source_word: צָמַח בּוֹ
  chosen: has grown in it
  alternatives:
  - has sprung up in it
  - has grown on it
  lexicon: HALOT
  rationale: The preposition indicates growth within the affected spot. 'In it' preserves
    the Hebrew image of hair emerging in the lesion area.
- source_word: נִרְפָּא
  chosen: is healed
  alternatives:
  - has healed
  - is cured
  lexicon: HALOT
  rationale: 'Passive/reflexive sense: the condition has been healed. Present English
    ''is healed'' fits the priestly declaration context.'
- source_word: טָהוֹר הוּא
  chosen: he is clean
  alternatives:
  - he is pure
  - it is clean
  lexicon: HALOT
  rationale: The predicate refers to the person under examination, not merely the
    lesion. In Leviticus impurity language, 'clean' is the standard and contextually
    appropriate rendering.
- source_word: וְטִהֲרוֹ הַכֹּהֵן
  chosen: and the priest shall pronounce him clean
  alternatives:
  - and the priest shall cleanse him
  - and the priest shall declare him clean
  lexicon: HALOT
  rationale: In priestly legal contexts this verb often means a formal declaration
    of cleanness rather than effecting a physical cure. 'Pronounce him clean' communicates
    the juridical/ritual function clearly.
