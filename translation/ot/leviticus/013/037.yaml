theological_decisions:
- issue: Nature of priestly action in ritual purity declaration
  chosen_reading: the priest shall pronounce him clean
  alternative_readings:
  - the priest shall cleanse him
  rationale: The verse distinguishes the healing of the condition from the priest's
    subsequent official verdict. Rendering the final clause as a declaration avoids
    implying that the priest physically or sacramentally heals the disease.
  doctrine_reference: Translation philosophy §1, §3, §6
