id: LEV.13.18
reference: Leviticus 13:18
source:
  edition: WLC
  text: וּ/בָשָׂ֕ר כִּֽי יִהְיֶ֥ה בֽ/וֹ בְ/עֹר֖/וֹ שְׁחִ֑ין וְ/נִרְפָּֽא־־׃
translation:
  text: And when the body has a boil in its skin, and it heals,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flesh' instead of 'the body.'
    reason: lexical_alternative
  - marker: b
    text: Or 'if the body has a boil in its skin.'
    reason: alternative_reading
  - marker: c
    text: Or 'and it is healed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָשָׂר
  chosen: the body
  alternatives:
  - the flesh
  lexicon: HALOT
  rationale: בָשָׂר literally means 'flesh,' but in this diagnostic/legal context
    English 'the body' communicates the referent more naturally without suggesting
    only muscle tissue. 'Flesh' remains a viable formal alternative.
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  lexicon: HALOT
  rationale: Here כִּי introduces a case law condition. 'When' fits the procedural
    style of Leviticus slightly better than 'if,' though both are possible.
- source_word: יִהְיֶה
  chosen: has
  alternatives:
  - there is
  - comes to be
  lexicon: HALOT
  rationale: The Hebrew verb is 'be,' but idiomatic English in this construction is
    'has' ('the body has a boil in its skin'). This preserves the sense without woodenness.
- source_word: בּוֹ
  chosen: in
  alternatives:
  - 'on'
  - within
  lexicon: HALOT
  rationale: Together with the following phrase 'in its skin,' this preposition marks
    location. English smooths the double prepositional structure into a natural expression.
- source_word: בְעֹרוֹ
  chosen: in its skin
  alternatives:
  - on its skin
  - in the skin of it
  lexicon: HALOT
  rationale: עֹור means 'skin.' The suffix refers back to the body/flesh. 'In its
    skin' is a close and natural rendering, matching the lesion-inspection context.
- source_word: שְׁחִין
  chosen: a boil
  alternatives:
  - an inflamed sore
  - an ulcer
  lexicon: HALOT
  rationale: שְׁחִין commonly denotes a boil or inflamed eruption. 'Boil' is the standard
    concise medical-style rendering in English.
- source_word: וְנִרְפָּא
  chosen: and it heals
  alternatives:
  - and it is healed
  - and it has healed
  lexicon: HALOT
  rationale: The Niphal of רפא can be rendered either statively/passively ('is healed')
    or intransitively ('heals'). Here 'it heals' gives clear modern English while
    preserving the sense that the boil has healed.
