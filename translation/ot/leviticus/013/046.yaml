id: LEV.13.46
reference: Leviticus 13:46
source:
  edition: WLC
  text: כָּל יְמֵ֞י אֲשֶׁ֨ר הַ/נֶּ֥גַע בּ֛/וֹ יִטְמָ֖א טָמֵ֣א ה֑וּא בָּדָ֣ד יֵשֵׁ֔ב
    מִ/ח֥וּץ לַֽ/מַּחֲנֶ֖ה מוֹשָׁבֽ/וֹ־׃ס
translation:
  text: All the days that the disease is in him, he shall be unclean. He is unclean.
    He shall live alone; his dwelling shall be outside the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the affliction' or 'the plague' for 'the disease.' The Hebrew term is
      broad and refers here to the diagnosed condition described in this chapter.
    reason: lexical_alternative
  - marker: b
    text: '''Unclean'' here refers to Levitical impurity status in the context of
      the law, not necessarily to moral guilt.'
    reason: cultural_note
lexical_decisions:
- source_word: הַנֶּגַע
  chosen: the disease
  alternatives:
  - the affliction
  - the plague
  - the infection
  lexicon: HALOT
  rationale: נֶגַע is a broad term for a striking, affliction, or diseased condition.
    In Leviticus 13, the context is a diagnosed skin condition with ritual consequences,
    so 'disease' is clearer in modern English than the traditional but potentially
    misleading 'plague' or overly vague 'affliction.'
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - on him
  lexicon: HALOT
  rationale: The preposition is literally 'in/on him.' English idiom with 'disease'
    more naturally takes 'in him,' though the underlying Hebrew can cover the condition
    being upon his person. This keeps the clause readable without changing the sense.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - is unclean
  - shall remain unclean
  lexicon: HALOT
  rationale: From טמא in the Qal, here denoting ritual uncleanness. 'Shall be unclean'
    preserves the legal force of the imperfect in this regulation. 'Remain unclean'
    is interpretive, though contextually close.
- source_word: טָמֵא הוּא
  chosen: He is unclean
  alternatives:
  - unclean is he
  - he is ritually unclean
  lexicon: HALOT
  rationale: The verbless clause emphatically restates the person's status. 'He is
    unclean' is natural English and preserves the emphasis by retaining the separate
    sentence. 'Ritually unclean' is explanatory but adds a qualifier not explicit
    in the Hebrew.
- source_word: בָּדָד
  chosen: alone
  alternatives:
  - in isolation
  - solitary
  lexicon: HALOT
  rationale: בָּדָד denotes being separated or alone. 'Alone' is the most direct and
    readable rendering. 'In isolation' is possible but sounds more clinical and interpretive.
- source_word: יֵשֵׁב
  chosen: shall live
  alternatives:
  - shall sit
  - shall dwell
  - shall stay
  lexicon: HALOT
  rationale: ישב often means sit, dwell, or remain. In this legal context about residence
    and exclusion, 'shall live' communicates ongoing habitation more idiomatically
    in English than the overly literal 'shall sit.'
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: This phrase indicates exclusion from the community's settled area. 'Outside
    the camp' is the standard and clearest rendering in the wilderness setting.
- source_word: מוֹשָׁבוֹ
  chosen: his dwelling
  alternatives:
  - his place of dwelling
  - his habitation
  lexicon: HALOT
  rationale: מוֹשָׁב refers to a dwelling place or place of residence. 'His dwelling'
    is concise and natural while preserving the concrete sense of where he resides.
