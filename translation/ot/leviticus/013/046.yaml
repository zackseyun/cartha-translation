theological_decisions:
- issue: Nature of uncleanness in Leviticus 13
  chosen_reading: Render טמא as 'unclean' without adding 'ceremonially' or 'morally'
    in the main text.
  alternative_readings:
  - ritually unclean
  - ceremonially unclean
  rationale: The verse concerns Levitical impurity status, not necessarily personal
    moral guilt. The main text should preserve the biblical category 'unclean' without
    narrowing it by interpretive labels. Explanatory alternatives are possible in
    notes, but the Hebrew itself simply states uncleanness.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without importing doctrinal claims the text does not make.
