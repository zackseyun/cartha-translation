theological_decisions:
- issue: Rendering of צָרַעַת in ritual-purity legislation
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  rationale: The term traditionally rendered 'leprosy' covers a broader set of conditions
    in Leviticus than modern leprosy/Hansen's disease. To avoid importing anachronistic
    medical claims, the main text uses 'skin disease,' while preserving the traditional
    rendering in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition); §6 (readable modern English)
