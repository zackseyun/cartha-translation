id: LEV.13.27
reference: Leviticus 13:27
source:
  edition: WLC
  text: וְ/רָאָ֥/הוּ הַ/כֹּהֵ֖ן בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֑י אִם פָּשֹׂ֤ה תִפְשֶׂה֙ בָּ/ע֔וֹר
    וְ/טִמֵּ֤א הַ/כֹּהֵן֙ אֹת֔/וֹ נֶ֥גַע צָרַ֖עַת הִֽוא־׃
translation:
  text: And the priest shall examine him on the seventh day. If it has indeed spread
    in the skin, the priest shall pronounce him unclean; it is an infection of skin
    disease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally rendered 'leprosy.' The Hebrew term refers more broadly to
      a serious skin condition in Israel's purity laws, not necessarily modern leprosy
      (Hansen's disease).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  chosen: shall examine him
  alternatives:
  - shall see him
  - shall inspect him
  lexicon: HALOT
  rationale: Though the verb is literally 'see,' in priestly diagnostic context it
    denotes examination/inspection rather than mere sight. 'Examine' is natural English
    and fits the procedural setting.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Leviticus' ritual context.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: Straightforward temporal phrase; idiomatic modern English is 'on the
    seventh day.'
- source_word: אִם פָּשֹׂה תִפְשֶׂה
  chosen: if it has indeed spread
  alternatives:
  - if it surely spreads
  - if it has spread further
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Has
    indeed spread' preserves the emphatic force in idiomatic English.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  - in the flesh
  lexicon: HALOT
  rationale: עוֹר is 'skin/hide.' In this diagnostic context 'in the skin' best reflects
    the Hebrew and the lesion's spread within the skin.
- source_word: וְטִמֵּא ... אֹתוֹ
  chosen: the priest shall pronounce him unclean
  alternatives:
  - the priest shall make him unclean
  - the priest shall declare him unclean
  lexicon: HALOT
  rationale: In purity legislation the priest does not causatively make the person
    unclean but renders an official verdict. 'Pronounce' captures the juridical/ritual
    function.
- source_word: נֶגַע
  chosen: infection
  alternatives:
  - affliction
  - plague
  - mark
  lexicon: HALOT
  rationale: נֶגַע in Leviticus 13 refers to a visible diseased spot or affliction.
    'Infection' communicates a pathological lesion in accessible modern English, though
    not with modern medical precision.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term does not map neatly onto modern Hansen's disease. 'Skin
    disease' avoids misleading medical specificity while fitting the context. 'Leprosy'
    is preserved as an alternative because of translation tradition.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The pronoun identifies the condition described by the preceding noun
    phrase; 'it is' is the natural English equivalent.
