id: LEV.13.35
reference: Leviticus 13:35
source:
  edition: WLC
  text: וְ/אִם פָּשֹׂ֥ה יִפְשֶׂ֛ה הַ/נֶּ֖תֶק בָּ/ע֑וֹר אַחֲרֵ֖י טָהֳרָתֽ/וֹ־׃
translation:
  text: But if the scaly eruption does spread in the skin after his cleansing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the itch' or, in older English, 'the scall.' The Hebrew term refers
      to a particular skin condition described in this chapter, likely involving scaling
      and hair loss.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional introduces a contrasting case within
    the inspection procedure. 'But if' captures the procedural contrast more naturally
    in English than bare 'and if,' while preserving the conditional force.
- source_word: פָּשֹׂה יִפְשֶׂה
  chosen: does spread
  alternatives:
  - spreads extensively
  - surely spreads
  - keeps spreading
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verbal idea.
    'Does spread' preserves the emphatic force in idiomatic English without over-paraphrasing.
- source_word: הַנֶּתֶק
  chosen: the scaly eruption
  alternatives:
  - the itch
  - the diseased patch
  - the scall
  lexicon: HALOT
  rationale: נֶתֶק in Leviticus 13 refers to a specific scalp/beard skin affliction
    characterized by affected hair and scaling. 'Scaly eruption' is clearer for modern
    readers than archaic 'scall' and more specific than 'itch,' which can mislead
    toward mere sensation rather than a visible lesion.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  - in the flesh
  lexicon: HALOT
  rationale: עוֹר is 'skin/hide.' 'In the skin' reflects the Hebrew preposition and
    fits the lesion context; 'flesh' would be less precise here.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal sense in this procedural law.
- source_word: טָהֳרָתוֹ
  chosen: his cleansing
  alternatives:
  - his purification
  - his being pronounced clean
  lexicon: HALOT
  rationale: The noun derives from the state/process of cleanness in ritual inspection
    context. 'His cleansing' is concise and readable; it can denote the prior declaration/process
    without implying moral purification.
