id: LEV.13.30
reference: Leviticus 13:30
source:
  edition: WLC
  text: וְ/רָאָ֨ה הַ/כֹּהֵ֜ן אֶת הַ/נֶּ֗גַע וְ/הִנֵּ֤ה מַרְאֵ֨/הוּ֙ עָמֹ֣ק מִן הָ/ע֔וֹר
    וּ/ב֛/וֹ שֵׂעָ֥ר צָהֹ֖ב דָּ֑ק וְ/טִמֵּ֨א אֹת֤/וֹ הַ/כֹּהֵן֙ נֶ֣תֶק ה֔וּא צָרַ֧עַת
    הָ/רֹ֛אשׁ א֥וֹ הַ/זָּקָ֖ן הֽוּא־־׃
translation:
  text: And the priest shall examine the diseased area, and if its appearance is deeper
    than the skin, and there is in it thin yellow hair, the priest shall pronounce
    him unclean; it is an itch, a skin disease of the head or of the beard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scall,' a traditional rendering for נֶתֶק; the exact medical condition
      is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew צָרַעַת is a broad term for a serious skin disease and does not necessarily
      refer to modern leprosy (Hansen's disease).
    reason: cultural_note
lexical_decisions:
- source_word: נֶגַע
  chosen: diseased area
  alternatives:
  - affliction
  - spot
  - plague
  - infection
  lexicon: HALOT
  rationale: In Leviticus 13 the term refers to a visible affected area examined by
    the priest, not necessarily a wound in the modern sense. 'Diseased area' is readable
    modern English and avoids the misleading connotations of 'plague' or the vagueness
    of 'spot'.
- source_word: מַרְאֵהוּ עָמֹק מִן־הָעוֹר
  chosen: its appearance is deeper than the skin
  alternatives:
  - it appears deeper than the skin
  - its appearance is sunken below the skin
  lexicon: HALOT
  rationale: This preserves the diagnostic language of Leviticus. 'Deeper than the
    skin' is the conventional sense of the Hebrew and likely describes a lesion appearing
    depressed or penetrating below skin level. The wording stays close to the source
    without overexplaining.
- source_word: שֵׂעָר צָהֹב דַּק
  chosen: thin yellow hair
  alternatives:
  - fine yellow hair
  - yellowish thin hair
  lexicon: HALOT
  rationale: צָהֹב denotes a yellow/golden color and דַּק means thin/fine. 'Thin yellow
    hair' is natural English and preserves both descriptors used in the priestly diagnostic
    criteria.
- source_word: וְטִמֵּא אֹתוֹ
  chosen: shall pronounce him unclean
  alternatives:
  - shall declare him unclean
  - shall make him unclean
  lexicon: HALOT
  rationale: In priestly legislation the priest renders a judicial/ritual verdict
    rather than causing impurity. 'Pronounce him unclean' best reflects the forensic
    function of the priest.
- source_word: נֶתֶק
  chosen: itch
  alternatives:
  - scall
  - eruption
  lexicon: HALOT
  rationale: The term denotes a specific scalp/beard affliction in this chapter. Traditional
    'scall' is archaic; 'itch' is more accessible modern English, though specialized.
    Because the exact medical referent is uncertain, a lexical alternative is preserved
    in a footnote.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term in Leviticus covers a broader category than modern Hansen's
    disease. 'Skin disease' avoids anachronism and misleading medical specificity.
    This is a significant lexical choice in Leviticus and should be documented.
- source_word: הָרֹאשׁ אוֹ הַזָּקָן
  chosen: of the head or of the beard
  alternatives:
  - on the head or the beard
  - of the scalp or of the beard
  lexicon: HALOT
  rationale: The genitival construction identifies the location/type of the condition.
    'Head or beard' is a close rendering; 'scalp' would be interpretive, so 'head'
    is retained.
