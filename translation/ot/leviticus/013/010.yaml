id: LEV.13.10
reference: Leviticus 13:10
source:
  edition: WLC
  text: וְ/רָאָ֣ה הַ/כֹּהֵ֗ן וְ/הִנֵּ֤ה שְׂאֵת לְבָנָה֙ בָּ/ע֔וֹר וְ/הִ֕יא הָפְכָ֖ה
    שֵׂעָ֣ר לָבָ֑ן וּ/מִֽחְיַ֛ת בָּשָׂ֥ר חַ֖י בַּ/שְׂאֵֽת־׃
translation:
  text: and the priest examines him, and behold, there is a white swelling in the
    skin, and it has turned the hair white, and there is raw living flesh in the swelling,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a raised spot' for 'swelling' (Hebrew שְׂאֵת), a technical term in this
      chapter for an elevated skin lesion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'living flesh'; the phrase refers to raw, live tissue appearing
      within the lesion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: examines
  alternatives:
  - sees
  - looks
  lexicon: HALOT
  rationale: In this diagnostic legal context, ראה refers not merely to seeing but
    to inspecting/examining the skin condition. Present tense English gives the procedural
    force naturally in case-law style.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Levitical purity legislation; the priest
    is the authorized examiner.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there is
  lexicon: HALOT
  rationale: Retains the deictic force marking the observed condition. Though somewhat
    elevated, it remains readable and reflects the Hebrew's attention-directing function.
- source_word: שְׂאֵת
  chosen: swelling
  alternatives:
  - raised spot
  - elevation
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a raised lesion or swelling on the
    skin. 'Swelling' is clear modern English and fits the diagnostic context.
- source_word: לְבָנָה
  chosen: white
  lexicon: HALOT
  rationale: Straightforward adjectival color term modifying the swelling.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  - in the flesh
  lexicon: HALOT
  rationale: עוֹר is 'skin/hide.' 'In the skin' reflects the Hebrew preposition and
    the idiom of a condition appearing within the skin tissue.
- source_word: וְהִיא הָפְכָה שֵׂעָר לָבָן
  chosen: it has turned the hair white
  alternatives:
  - the hair in it has turned white
  - it has changed hair to white
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the swelling. English idiom requires
    expressing the effect on the hair as 'turned the hair white.'
- source_word: וּמִחְיַת בָּשָׂר חַי
  chosen: and there is raw living flesh
  alternatives:
  - and an area of live flesh
  - and quick raw flesh
  lexicon: HALOT
  rationale: The phrase denotes revived/exposed living tissue within the lesion, a
    technical sign in the diagnosis. 'Raw living flesh' preserves both the concrete
    and diagnostic sense in accessible English.
- source_word: בַּשְׂאֵת
  chosen: in the swelling
  alternatives:
  - within the swelling
  - in the raised spot
  lexicon: HALOT
  rationale: Repeats שְׂאֵת with the article and preposition, locating the raw flesh
    within the lesion. Repeating 'swelling' preserves lexical consistency.
