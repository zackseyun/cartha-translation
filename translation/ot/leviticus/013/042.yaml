id: LEV.13.42
reference: Leviticus 13:42
source:
  edition: WLC
  text: וְ/כִֽי יִהְיֶ֤ה בַ/קָּרַ֨חַת֙ א֣וֹ בַ/גַּבַּ֔חַת נֶ֖גַע לָבָ֣ן אֲדַמְדָּ֑ם
    צָרַ֤עַת פֹּרַ֨חַת֙ הִ֔וא בְּ/קָרַחְתּ֖/וֹ א֥וֹ בְ/גַבַּחְתּֽ/וֹ־׃
translation:
  text: But if there is on the bald head or on the bald forehead a white-reddish diseased
    spot, it is a spreading skin disease on his bald head or on his bald forehead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'leprosy.' The Hebrew term refers more broadly to a range
      of skin diseases or conditions and should not be equated strictly with modern
      Hansen's disease.
    reason: lexical_alternative
  - marker: b
    text: The two Hebrew terms distinguish baldness at the back of the head and baldness
      at the front of the head.
    reason: cultural_note
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case within the legal material. 'But if' fits
    the contrastive flow from the preceding discussion while preserving the conditional
    force.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - there appears
  - it happens
  lexicon: HALOT
  rationale: 'The verb היה here functions existentially with the following location
    phrase and noun: ''if there is ... a spot.'' English existential ''there is''
    is the most natural equivalent.'
- source_word: בַקָּרַחַת
  chosen: on the bald head
  alternatives:
  - in the baldness at the back of the head
  - on the back baldness
  lexicon: HALOT
  rationale: קָרַחַת refers to baldness, commonly the back part of the head in distinction
    from גַּבַּחַת. 'On the bald head' is readable English; the more technical distinction
    is preserved by contrasting it with 'bald forehead' for the paired term.
- source_word: בַגַּבַּחַת
  chosen: on the bald forehead
  alternatives:
  - in the baldness at the front of the head
  - on the front baldness
  lexicon: HALOT
  rationale: גַּבַּחַת is the complementary term to קָרַחַת, usually understood as
    baldness at the front of the head. 'Bald forehead' communicates the distinction
    in natural English.
- source_word: נֶגַע
  chosen: diseased spot
  alternatives:
  - affliction
  - mark
  - plague spot
  - lesion
  lexicon: HALOT
  rationale: In Leviticus 13, נֶגַע denotes a visible skin-related mark examined for
    ritual impurity. 'Diseased spot' is specific enough for context without importing
    later medical precision.
- source_word: לָבָן אֲדַמְדָּם
  chosen: white-reddish
  alternatives:
  - white and reddish
  - whitish-red
  - white tinged with red
  lexicon: HALOT
  rationale: The paired adjectives describe the coloration of the spot. 'White-reddish'
    preserves the compact Hebrew description and avoids overinterpreting the exact
    shade.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term does not correspond precisely to Hansen's disease. 'Skin
    disease' avoids the misleading traditional term 'leprosy' while remaining accessible.
    Because the term is broader and ritually significant, an alternative is worth
    preserving in a footnote.
- source_word: פֹּרַחַת
  chosen: spreading
  alternatives:
  - breaking out
  - flourishing
  - erupting
  lexicon: HALOT
  rationale: The participle from פרח in this context describes the condition as spreading
    or breaking out over the skin. 'Spreading' is idiomatic and medically neutral.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: 'The pronoun refers back to the described spot/condition and identifies
    it: ''it is a spreading skin disease.'''
- source_word: בְּקָרַחְתּוֹ
  chosen: on his bald head
  alternatives:
  - in his baldness at the back of the head
  lexicon: HALOT
  rationale: The suffix marks possession ('his'). Repeating the earlier rendering
    maintains the distinction and keeps the diagnosis tied to the affected person's
    bald area.
- source_word: בְגַבַּחְתּוֹ
  chosen: on his bald forehead
  alternatives:
  - in his baldness at the front of the head
  lexicon: HALOT
  rationale: As with the previous term, the possessive suffix is retained and the
    front/back distinction is preserved in natural English.
