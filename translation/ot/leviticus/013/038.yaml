id: LEV.13.38
reference: Leviticus 13:38
source:
  edition: WLC
  text: וְ/אִישׁ֙ אֽוֹ אִשָּׁ֔ה כִּֽי יִהְיֶ֥ה בְ/עוֹר בְּשָׂרָ֖/ם בֶּהָרֹ֑ת בֶּהָרֹ֖ת
    לְבָנֹֽת־־־׃
translation:
  text: And if a man or a woman has bright spots on the skin of their body, white
    bright spots,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bright white spots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ ... אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - a man or woman
  - any man or woman
  lexicon: HALOT
  rationale: The pair explicitly names both sexes; English preserves this directly.
    The indefinite singular fits the case-law style of Leviticus.
- source_word: כִּי יִהְיֶה
  chosen: if ... has
  alternatives:
  - when ... has
  - if ... there is
  lexicon: HALOT
  rationale: In legal/diagnostic material, כִּי introducing a circumstance is naturally
    rendered 'if.' Although יִהְיֶה is literally 'there is/will be,' idiomatic English
    with the following body-location phrase is 'has.'
- source_word: בְּעוֹר בְּשָׂרָם
  chosen: on the skin of their body
  alternatives:
  - in the skin of their flesh
  - on the skin of their flesh
  lexicon: HALOT
  rationale: עוֹר is 'skin' and בָּשָׂר here refers to the person's body/flesh. 'On
    the skin of their body' is natural modern English while preserving the concrete
    bodily reference. The 3mp suffix is distributive/generic in this legal context,
    not exclusively male.
- source_word: בֶּהָרֹת
  chosen: bright spots
  alternatives:
  - bright patches
  - shining spots
  lexicon: HALOT
  rationale: The noun denotes light-colored or bright marks on the skin in this diagnostic
    context. 'Bright spots' is a standard, clear rendering and fits the repeated use
    in the verse.
- source_word: בֶּהָרֹת לְבָנֹת
  chosen: white bright spots
  alternatives:
  - bright white spots
  - whitish bright spots
  lexicon: HALOT
  rationale: לְבָנוֹת specifies the color of the spots as white. Rendering the repeated
    noun plus adjective as 'white bright spots' preserves the Hebrew repetition and
    diagnostic precision.
