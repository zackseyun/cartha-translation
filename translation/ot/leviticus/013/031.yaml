id: LEV.13.31
reference: Leviticus 13:31
source:
  edition: WLC
  text: וְ/כִֽי יִרְאֶ֨ה הַ/כֹּהֵ֜ן אֶת נֶ֣גַע הַ/נֶּ֗תֶק וְ/הִנֵּ֤ה אֵין מַרְאֵ֨/הוּ֙
    עָמֹ֣ק מִן הָ/ע֔וֹר וְ/שֵׂעָ֥ר שָׁחֹ֖ר אֵ֣ין בּ֑/וֹ וְ/הִסְגִּ֧יר הַ/כֹּהֵ֛ן אֶת
    נֶ֥גַע הַ/נֶּ֖תֶק שִׁבְעַ֥ת יָמִֽים־־־־־׃
translation:
  text: And if the priest examines the diseased area of the scaly outbreak, and indeed
    its appearance is not deeper than the skin and there is no black hair in it, then
    the priest shall isolate the diseased area of the scaly outbreak for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'itch' or the traditional 'scall' for 'scaly outbreak' (נֶתֶק), a specific
      skin or scalp condition in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  chosen: diseased area
  alternatives:
  - affliction
  - plague
  - mark
  - infection
  lexicon: HALOT
  rationale: In Leviticus 13, נֶגַע refers broadly to an observable pathological spot
    or affected area rather than necessarily a 'plague' in modern English. 'Diseased
    area' is medically neutral and readable, fitting the inspection context.
- source_word: נֶתֶק
  chosen: scaly outbreak
  alternatives:
  - itch
  - scall
  - eruption
  lexicon: HALOT
  rationale: This term denotes a specific skin/scalp condition in Leviticus 13, often
    associated with hair loss. 'Scaly outbreak' communicates a visible dermatological
    condition better than archaic 'scall' and more specifically than 'itch.'
- source_word: מַרְאֵהוּ
  chosen: its appearance
  alternatives:
  - its sight
  - its look
  lexicon: HALOT
  rationale: A straightforward rendering of the noun with pronominal suffix; 'appearance'
    is idiomatic in English and suits priestly visual examination language.
- source_word: עָמֹק מִן־הָעוֹר
  chosen: deeper than the skin
  alternatives:
  - deeper than the flesh
  - sunken below the skin
  lexicon: HALOT
  rationale: The phrase describes whether the lesion appears depressed relative to
    the skin surface. 'Deeper than the skin' preserves the comparative and remains
    natural English.
- source_word: שֵׂעָר שָׁחֹר
  chosen: black hair
  alternatives:
  - dark hair
  lexicon: HALOT
  rationale: The Hebrew specifically says 'black hair.' This should be retained rather
    than generalized to 'dark hair,' since hair color is part of the diagnostic criterion.
- source_word: וְהִסְגִּיר
  chosen: shall isolate
  alternatives:
  - shall quarantine
  - shall shut up
  - shall confine
  lexicon: HALOT
  rationale: In priestly purity legislation this verb means to place under temporary
    isolation for observation. 'Isolate' is clear modern English and avoids the potentially
    over-specific public-health connotations of 'quarantine,' while improving on archaic
    'shut up.'
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Standard temporal expression; 'for seven days' is idiomatic with the
    verb 'isolate.'
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: The conjunction links this case law to the preceding regulations. 'And
    if' preserves the connective while remaining natural.
- source_word: יִרְאֶה
  chosen: examines
  alternatives:
  - sees
  - looks at
  lexicon: HALOT
  rationale: Although literally 'sees,' in this legal-diagnostic context the priest
    is performing an inspection. 'Examines' captures the procedural sense without
    undue paraphrase.
