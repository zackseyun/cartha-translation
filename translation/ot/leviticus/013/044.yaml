id: LEV.13.44
reference: Leviticus 13:44
source:
  edition: WLC
  text: אִישׁ צָר֥וּעַ ה֖וּא טָמֵ֣א ה֑וּא טַמֵּ֧א יְטַמְּאֶ֛/נּוּ הַ/כֹּהֵ֖ן בְּ/רֹאשׁ֥/וֹ
    נִגְעֽ/וֹ־׃
translation:
  text: He is a man with a skin disease; he is unclean. The priest shall surely pronounce
    him unclean; his disease is on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'a leprous man.' The Hebrew term refers to the skin condition
      treated in this chapter and is not necessarily identical with modern leprosy
      (Hansen's disease).
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The noun is singular masculine and refers to an individual male case
    in the legal scenario. Per the project's gender-accurate policy, 'man' is preferred
    over a neutral substitute.
- source_word: צָרוּעַ
  chosen: with a skin disease
  alternatives:
  - leprous
  - afflicted with a diseased skin condition
  lexicon: HALOT
  rationale: The adjective from צרע denotes one affected by the condition discussed
    throughout the chapter, traditionally rendered 'leprous.' Because the chapter
    concerns a range of skin afflictions rather than modern Hansen's disease specifically,
    'with a skin disease' avoids misleading medical specificity while preserving the
    ritual-diagnostic sense.
- source_word: טָמֵא הוּא
  chosen: he is unclean
  alternatives:
  - he is impure
  lexicon: HALOT
  rationale: In Leviticus this term regularly marks ritual impurity. 'Unclean' is
    the established and clearest English equivalent in this cultic context.
- source_word: טַמֵּא יְטַמְּאֶנּוּ
  chosen: shall surely pronounce him unclean
  alternatives:
  - shall certainly declare him unclean
  - shall make him unclean
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. In
    priestly diagnostic contexts, the priest does not causatively make the person
    unclean but officially declares/pronounces that status. 'Shall surely pronounce
    him unclean' captures both the intensification and the juridical function.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the cultic official who performs the examination
    and declaration.
- source_word: בְּרֹאשׁוֹ
  chosen: on his head
  alternatives:
  - in his head
  - on the scalp of his head
  lexicon: HALOT
  rationale: The preposition and noun most naturally indicate location on the head.
    The immediate context concerns scalp/beard afflictions, but the Hebrew here simply
    says 'on his head,' so the translation remains close to the wording.
- source_word: נִגְעוֹ
  chosen: his disease
  alternatives:
  - his affliction
  - his plague
  - his mark
  lexicon: HALOT
  rationale: In Leviticus 13 נגע refers to the diagnosed affliction or lesion. 'Disease'
    is natural modern English here, while 'plague' would sound misleadingly epidemic
    and 'mark' too weak.
