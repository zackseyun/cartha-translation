id: LEV.13.2
reference: Leviticus 13:2
source:
  edition: WLC
  text: אָדָ֗ם כִּֽי יִהְיֶ֤ה בְ/עוֹר בְּשָׂר/וֹ֙ שְׂאֵ֤ת אֽוֹ סַפַּ֨חַת֙ א֣וֹ בַהֶ֔רֶת
    וְ/הָיָ֥ה בְ/עוֹר בְּשָׂר֖/וֹ לְ/נֶ֣גַע צָרָ֑עַת וְ/הוּבָא֙ אֶל אַהֲרֹ֣ן הַ/כֹּהֵ֔ן
    א֛וֹ אֶל אַחַ֥ד מִ/בָּנָ֖י/ו הַ/כֹּהֲנִֽים־־־־־־׃
translation:
  text: When a man has on the skin of his body a swelling, or a scab, or a bright
    spot, and it becomes on the skin of his body an infection of skin disease, then
    he shall be brought to Aaron the priest, or to one of his sons the priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'an infection of leprosy' or 'a leprous disease.' The Hebrew
      צָרָעַת refers more broadly to a category of skin affliction and should not
      be equated automatically with modern Hansen's disease.
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: The singular generic introduces a case law scenario about an individual.
    Per doctrine, gender-accurate language is preferred; here 'a man' matches the
    Hebrew singular form and legal style better than the more abstract 'a person,'
    while still functioning generically.
- source_word: בְּעוֹר בְּשָׂרוֹ
  chosen: on the skin of his body
  alternatives:
  - in the skin of his flesh
  - on his skin
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the repeated anatomical phrasing
    of the Hebrew. 'Body' is more natural modern English than 'flesh' here, while
    retaining the concrete physical sense.
- source_word: שְׂאֵת
  chosen: a swelling
  alternatives:
  - an elevation
  - a raised patch
  lexicon: HALOT
  rationale: The term denotes a raised area on the skin. 'Swelling' is clear, medically
    plausible, and readable in modern English.
- source_word: סַפַּחַת
  chosen: a scab
  alternatives:
  - a rash
  - an eruption
  lexicon: HALOT
  rationale: The exact dermatological referent is uncertain, but it denotes a secondary
    skin lesion. 'Scab' is a traditional and concise rendering; alternatives are possible,
    but 'scab' best preserves the concrete lesion-like sense without overinterpreting.
- source_word: בַּהֶרֶת
  chosen: a bright spot
  alternatives:
  - a shiny spot
  - a white patch
  lexicon: HALOT
  rationale: The noun refers to a bright or pale mark on the skin. 'Bright spot' is
    broad enough to preserve the Hebrew without forcing a narrower medical diagnosis
    such as 'white patch.'
- source_word: לְנֶגַע צָרָעַת
  chosen: an infection of skin disease
  alternatives:
  - a case of leprosy
  - a diseased spot of skin disease
  - an affliction of tsaraath
  lexicon: HALOT
  rationale: נֶגַע is a struck spot, lesion, or infection-like affliction; צָרָעַת
    is the broader biblical skin disease category, not necessarily Hansen's disease.
    'Skin disease' avoids the misleading traditional 'leprosy.' 'Infection' renders
    נֶגַע idiomatically in context as a harmful lesion.
- source_word: וְהוּבָא
  chosen: he shall be brought
  alternatives:
  - he must be brought
  - he is to be brought
  lexicon: HALOT
  rationale: The passive form in legal instruction is well represented by 'shall be
    brought,' which preserves the procedural force of the Hebrew.
- source_word: אַהֲרֹן הַכֹּהֵן
  chosen: Aaron the priest
  alternatives:
  - Aaron, the priest
  lexicon: HALOT
  rationale: Straightforward title-plus-name construction; no reason to depart from
    the standard rendering.
- source_word: אַחַד מִבָּנָיו הַכֹּהֲנִים
  chosen: one of his sons the priests
  alternatives:
  - one of his priestly sons
  - one of his sons, the priests
  lexicon: HALOT
  rationale: This preserves the familial and priestly identification in the Hebrew.
    The appositional structure is retained in readable English.
