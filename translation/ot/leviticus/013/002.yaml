theological_decisions:
- issue: Rendering of צָרָעַת
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  - tzaraath
  rationale: The Hebrew term refers to a broader category of ritual/diagnostic skin
    affliction than modern leprosy. To avoid importing a specific modern medical diagnosis
    the text does not require, the main text uses 'skin disease.' A traditional alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source sense over inherited English tradition.'
