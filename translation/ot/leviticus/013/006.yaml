theological_decisions:
- issue: Ritual purity verdict versus physical healing
  chosen_reading: Render priestly action as 'pronounce him clean' and final state
    as ritual cleanness, without implying medical cure.
  alternative_readings:
  - the priest shall cleanse him
  - he is healed
  rationale: The verse concerns priestly assessment of ritual impurity in a skin condition,
    not necessarily a claim of complete physical healing. The translation preserves
    the cultic/legal force without importing later doctrinal or medical assumptions.
  doctrine_reference: Translation philosophy §§1, 3, 6
