id: LEV.13.6
reference: Leviticus 13:6
source:
  edition: WLC
  text: וְ/רָאָה֩ הַ/כֹּהֵ֨ן אֹת֜/וֹ בַּ/יּ֣וֹם הַ/שְּׁבִיעִי֮ שֵׁנִית֒ וְ/הִנֵּה֙
    כֵּהָ֣ה הַ/נֶּ֔גַע וְ/לֹא פָשָׂ֥ה הַ/נֶּ֖גַע בָּ/ע֑וֹר וְ/טִהֲר֤/וֹ הַ/כֹּהֵן֙
    מִסְפַּ֣חַת הִ֔יא וְ/כִבֶּ֥ס בְּגָדָ֖י/ו וְ/טָהֵֽר־׃
translation:
  text: Then the priest shall examine him again on the seventh day, and if the infection
    has faded and the infection has not spread in the skin, the priest shall pronounce
    him clean; it is a scaly eruption. He shall wash his clothes and be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rash.' The Hebrew term refers to a relatively minor skin eruption, in
      contrast to a more serious spreading condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - shall inspect
  lexicon: HALOT
  rationale: In priestly diagnostic context, ראה with the priest as subject means
    more than mere seeing; 'examine' best conveys an official inspection while remaining
    close to the Hebrew sense.
- source_word: שֵׁנִית
  chosen: again
  alternatives:
  - a second time
  - for the second time
  lexicon: HALOT
  rationale: Adverbial use indicates repetition of the examination. 'Again' is natural
    modern English; 'a second time' is possible but slightly heavier.
- source_word: כֵּהָה
  chosen: has faded
  alternatives:
  - is dim
  - has grown faint
  - has become dull
  lexicon: HALOT
  rationale: The verb describes the lesion becoming less intense or less visible.
    'Has faded' communicates the medical-observational sense clearly in English.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the spot
  - the affliction
  - the plague
  - the lesion
  lexicon: HALOT
  rationale: In Leviticus 13, נגע refers to an observable skin affliction under priestly
    examination. 'Infection' is accessible and suitably serious, though not strictly
    modern-medical; 'lesion' is more technical, and 'plague' is misleading in contemporary
    English.
- source_word: פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not expanded
  lexicon: HALOT
  rationale: The standard contextual sense in skin-disease legislation is spreading
    across the skin. 'Spread' is the clearest idiomatic rendering.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  - in the flesh
  lexicon: HALOT
  rationale: עור is 'skin.' The preposition ב can be rendered 'in' or 'on'; 'in the
    skin' reflects the Hebrew closely and fits the diagnostic idiom of the passage.
- source_word: וְטִהֲרוֹ הַכֹּהֵן
  chosen: the priest shall pronounce him clean
  alternatives:
  - the priest shall declare him clean
  - the priest shall cleanse him
  lexicon: HALOT
  rationale: In purity legislation, the priest does not physically cleanse but renders
    an authoritative purity verdict. 'Pronounce him clean' captures the forensic/ritual
    function.
- source_word: מִסְפַּחַת
  chosen: a scaly eruption
  alternatives:
  - a rash
  - a scab
  - an eruption
  lexicon: HALOT
  rationale: The term denotes a relatively minor skin condition rather than the more
    serious defiling disease under investigation. 'Scaly eruption' preserves specificity
    better than the overly broad 'rash,' while avoiding archaic 'scab'.
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: He shall wash his clothes
  alternatives:
  - He shall wash his garments
  lexicon: HALOT
  rationale: בגדיו means his clothing/garments. 'Clothes' is more natural modern English
    and fully accurate.
- source_word: וְטָהֵר
  chosen: and be clean
  alternatives:
  - and he shall be clean
  - and he will be clean
  lexicon: HALOT
  rationale: This final verb states the resulting ritual status after washing. 'Be
    clean' is concise and idiomatic following the preceding instruction.
