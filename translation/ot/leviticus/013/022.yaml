theological_decisions:
- issue: Nature of priestly declaration of uncleanness
  chosen_reading: The priest formally pronounces the person unclean rather than causing
    uncleanness by the act itself.
  alternative_readings:
  - The priest makes him unclean
  rationale: The legal-priestly context indicates an authoritative diagnosis and declaration
    of ritual status. The translation avoids suggesting magical or causal production
    of impurity by the priest's speech.
  doctrine_reference: Translation philosophy §1, §6
