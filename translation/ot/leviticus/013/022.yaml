id: LEV.13.22
reference: Leviticus 13:22
source:
  edition: WLC
  text: וְ/אִם פָּשֹׂ֥ה תִפְשֶׂ֖ה בָּ/ע֑וֹר וְ/טִמֵּ֧א הַ/כֹּהֵ֛ן אֹת֖/וֹ נֶ֥גַע הִֽוא־׃
translation:
  text: But if it does spread in the skin, the priest shall pronounce him unclean;
    it is an affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declare him unclean.' The Hebrew verb can be rendered either way in
      priestly legal contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'a disease,' 'a plague,' or 'an infected spot.' The Hebrew term is broad
      and does not map neatly onto a modern medical category.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the prior case. 'But if' captures
    the adversative force of waw plus conditional אִם in context better than a bare
    'if.'
- source_word: פָּשֹׂה תִפְשֶׂה
  chosen: it does spread
  alternatives:
  - it spreads
  - it has spread extensively
  - it keeps spreading
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of פשה intensifies the verbal
    idea. 'Does spread' preserves the emphatic sense in natural English without overparaphrasing.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  - in the flesh
  lexicon: HALOT
  rationale: עוֹר normally means 'skin/hide.' 'In the skin' follows the Hebrew preposition
    and fits the diagnostic context of skin disease legislation better than 'flesh.'
- source_word: וְטִמֵּא
  chosen: shall pronounce him unclean
  alternatives:
  - shall declare him unclean
  - shall make him unclean
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, טמא in the Piel with the priest as subject
    denotes a formal pronouncement of ritual uncleanness, not causation. 'Pronounce
    him unclean' makes that juridical sense explicit.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Levitical legal material.
- source_word: אֹתוֹ
  chosen: him
  alternatives:
  - it
  lexicon: HALOT
  rationale: The direct object refers to the person being examined, not merely the
    lesion. English idiom in this context naturally uses 'him,' matching the masculine
    singular legal subject.
- source_word: נֶגַע
  chosen: an affliction
  alternatives:
  - a disease
  - a plague
  - a mark
  - an infection
  lexicon: HALOT
  rationale: נֶגַע in Leviticus 13 refers broadly to an afflicted spot or plague-like
    condition. 'Affliction' is sufficiently broad and avoids implying modern medical
    precision that the Hebrew does not specify.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The pronoun identifies the condition just described. 'It is' is the most
    natural English equivalent in this verbless clause.
