id: LEV.13.15
reference: Leviticus 13:15
source:
  edition: WLC
  text: וְ/רָאָ֧ה הַ/כֹּהֵ֛ן אֶת הַ/בָּשָׂ֥ר הַ/חַ֖י וְ/טִמְּא֑/וֹ הַ/בָּשָׂ֥ר הַ/חַ֛י
    טָמֵ֥א ה֖וּא צָרַ֥עַת הֽוּא־׃
translation:
  text: When the priest sees the raw flesh, he shall pronounce him unclean. The raw
    flesh is unclean; it is a skin disease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'living flesh'; traditionally rendered 'raw flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'declare him unclean.' The priest is making an official purity ruling.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'leprosy,' but the Hebrew term refers more broadly to a skin
      disease or condition, not specifically modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: When the priest sees
  alternatives:
  - And the priest sees
  - If the priest sees
  lexicon: HALOT
  rationale: The waw + qatal continues the procedural sequence in legal material and
    is best rendered in idiomatic English as a temporal clause, 'When the priest sees,'
    rather than a simple past narrative. This preserves the law-code style.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן in Leviticus; the officiating examiner
    is specifically the priest.
- source_word: הַבָּשָׂר הַחַי
  chosen: the raw flesh
  alternatives:
  - the living flesh
  - the healthy flesh
  lexicon: HALOT
  rationale: Literally 'the living flesh.' In the context of skin-disease inspection,
    English 'raw flesh' best conveys exposed, live tissue and matches the procedural
    sense more naturally than the overly literal 'living flesh.'
- source_word: וְטִמְּאוֹ
  chosen: he shall pronounce him unclean
  alternatives:
  - and make him unclean
  - and declare him unclean
  lexicon: HALOT
  rationale: In priestly purity legislation, טמא in the piel with a person as object
    commonly denotes a priestly declaration of impurity, not the causation of impurity
    itself. 'Pronounce him unclean' makes the forensic/priestly function explicit
    in clear English.
- source_word: טָמֵא הוּא
  chosen: is unclean
  alternatives:
  - it is impure
  lexicon: HALOT
  rationale: טָמֵא is the standard purity term. 'Unclean' preserves the ritual category
    used throughout Leviticus better than the broader 'impure.'
- source_word: צָרַעַת
  chosen: a skin disease
  alternatives:
  - leprosy
  - a defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term does not correspond precisely to modern Hansen's disease.
    'Skin disease' avoids misleading medical specificity while fitting contemporary
    readable English. The predicate here identifies the condition under priestly examination.
