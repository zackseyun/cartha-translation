theological_decisions:
- issue: Rendering of צָרַעַת in Levitical purity law
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  rationale: To avoid importing later or modern medical assumptions into the text,
    the translation uses 'skin disease' rather than 'leprosy.' This preserves the
    ritual-legal category without overstating diagnostic precision.
