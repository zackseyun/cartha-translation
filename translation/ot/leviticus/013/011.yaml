theological_decisions:
- issue: Rendering of ritual impurity terminology
  chosen_reading: unclean
  alternative_readings:
  - impure
  rationale: Leviticus uses טמא in a ritual-legal sense. 'Unclean' preserves established
    biblical terminology and communicates ceremonial status without implying personal
    moral guilt in this context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
