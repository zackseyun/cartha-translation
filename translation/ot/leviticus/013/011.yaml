id: LEV.13.11
reference: Leviticus 13:11
source:
  edition: WLC
  text: צָרַ֨עַת נוֹשֶׁ֤נֶת הִוא֙ בְּ/ע֣וֹר בְּשָׂר֔/וֹ וְ/טִמְּא֖/וֹ הַ/כֹּהֵ֑ן לֹ֣א
    יַסְגִּרֶ֔/נּוּ כִּ֥י טָמֵ֖א הֽוּא׃
translation:
  text: it is a chronic skin disease in the skin of his body, and the priest shall
    pronounce him unclean; he shall not isolate him, for he is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a long-standing skin disease.' Traditional versions often render צָרַעַת
      as 'leprosy,' but the Hebrew term in Leviticus covers a broader range of conditions
      than modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprous disease
  - defiling skin disease
  - leprosy
  lexicon: HALOT
  rationale: The Hebrew term refers to a range of serious skin afflictions in Leviticus,
    not specifically Hansen's disease. 'Skin disease' avoids the misleading medical
    specificity of traditional 'leprosy' while remaining natural English.
- source_word: נוֹשֶׁנֶת
  chosen: chronic
  alternatives:
  - old
  - long-standing
  lexicon: HALOT
  rationale: The participial form conveys something old or longstanding. 'Chronic'
    communicates an established, persistent condition in clear modern English.
- source_word: בְּעוֹר בְּשָׂרוֹ
  chosen: in the skin of his body
  alternatives:
  - in the skin of his flesh
  - on the skin of his body
  lexicon: HALOT
  rationale: This phrase is rendered fairly literally. 'Body' is more natural than
    'flesh' in contemporary English here, since the context is physical skin rather
    than theological anthropology.
- source_word: וְטִמְּאוֹ
  chosen: shall pronounce him unclean
  alternatives:
  - shall make him unclean
  - shall declare him unclean
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, the priest does not causatively make
    the person unclean but officially identifies and announces the status. 'Pronounce'
    captures the juridical-priestly function well.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard and direct rendering of the cultic office.
- source_word: לֹא יַסְגִּרֶנּוּ
  chosen: he shall not isolate him
  alternatives:
  - he shall not shut him up
  - he shall not quarantine him
  - he shall not confine him
  lexicon: HALOT
  rationale: The verb refers to placing the person in isolation for observation. 'Isolate'
    is clear modern English and fits the ritual-inspection procedure better than the
    archaic 'shut up.' 'Quarantine' is possible but can sound overly medicalized.
- source_word: כִּי טָמֵא הוּא
  chosen: for he is unclean
  alternatives:
  - because he is unclean
  lexicon: HALOT
  rationale: 'A straightforward causal clause explaining why no further isolation
    is needed: the diagnosis is already clear.'
