id: LEV.13.57
reference: Leviticus 13:57
source:
  edition: WLC
  text: וְ/אִם תֵּרָאֶ֨ה ע֜וֹד בַּ֠/בֶּגֶד אֽוֹ בַ/שְּׁתִ֤י אֽוֹ בָ/עֵ֨רֶב֙ א֣וֹ בְ/כָל
    כְּלִי ע֔וֹר פֹּרַ֖חַת הִ֑וא בָּ/אֵ֣שׁ תִּשְׂרְפֶ֔/נּוּ אֵ֥ת אֲשֶׁר בּ֖/וֹ הַ/נָּֽגַע־־־־־־׃
translation:
  text: But if it appears again in the garment, or in the warp, or in the woof, or
    in any article of leather, it is a spreading outbreak; you shall burn in the fire
    whatever has the infection in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weft' for 'woof,' the crosswise threads in woven fabric.
    reason: lexical_alternative
  - marker: b
    text: Hebrew negaʿ, a technical term in Leviticus for an afflicted or contaminated
      spot; traditionally 'plague' or 'diseased mark.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּרָאֶה
  chosen: it appears
  alternatives:
  - it is seen
  - it shows itself
  lexicon: HALOT
  rationale: Niphal of ראה here is impersonal/passive-reflexive in sense, referring
    to the affected mark becoming visible again. 'Appears' is natural English and
    preserves the observational force of the inspection context.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - further
  lexicon: HALOT
  rationale: In this procedural context the point is recurrence after washing/quarantine,
    so 'again' best captures the temporal force.
- source_word: בֶּגֶד
  chosen: garment
  alternatives:
  - cloth
  - clothing
  lexicon: HALOT
  rationale: Standard term in Leviticus 13 for an item of clothing or fabric. 'Garment'
    is precise and consistent with the chapter's terminology.
- source_word: שְׁתִי
  chosen: warp
  alternatives:
  - warp threads
  lexicon: HALOT
  rationale: Technical textile term referring to the longitudinal threads in weaving.
    'Warp' is the standard concise rendering in English translations and fits the
    paired term with עֵרֶב.
- source_word: עֵרֶב
  chosen: woof
  alternatives:
  - weft
  - woven part
  lexicon: HALOT
  rationale: Paired with שְׁתִי in textile terminology. 'Woof' is traditional and
    understandable in context; 'weft' is a viable modern technical alternative. A
    footnote preserves the lexical alternative.
- source_word: כְּלִי עוֹר
  chosen: article of leather
  alternatives:
  - leather item
  - leather object
  - vessel of skin
  lexicon: HALOT
  rationale: Broad phrase for an implement or object made of leather/skin. 'Article
    of leather' is natural modern English and broad enough for the Hebrew.
- source_word: פֹּרַחַת
  chosen: a spreading outbreak
  alternatives:
  - it is spreading
  - a breakout
  - a flourishing/spreading spot
  lexicon: HALOT
  rationale: From פרח, literally 'sprouting/budding,' used here metaphorically for
    the lesion reappearing/spreading. 'Spreading outbreak' communicates the active
    extension of the contamination better than a wooden 'sprouting' in English.
- source_word: הִוא
  chosen: it is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with the feminine participle and refers to
    the condition/mark. English requires an explicit copular rendering.
- source_word: בָּאֵשׁ תִּשְׂרְפֶנּוּ
  chosen: you shall burn in the fire
  alternatives:
  - you shall burn it with fire
  - it must be burned in fire
  lexicon: HALOT
  rationale: Direct legal instruction in second masculine singular, addressed to the
    inspecting priest/Israelite procedure. 'You shall burn in the fire' preserves
    the imperative-legal tone without over-specifying the object before the following
    clause.
- source_word: אֵת אֲשֶׁר בּוֹ
  chosen: whatever has ... in it
  alternatives:
  - that in which is
  - the thing in which
  lexicon: HALOT
  rationale: This relative construction points to the item containing the affected
    area. 'Whatever has ... in it' is idiomatic English and preserves the broad reference.
- source_word: הַנָּגַע
  chosen: the infection
  alternatives:
  - the diseased spot
  - the plague
  - the mark
  lexicon: HALOT
  rationale: In Leviticus 13 the term denotes the afflicted spot/condition, not necessarily
    a modern medical diagnosis. 'Infection' communicates an impure contaminating condition
    in accessible English, while avoiding the archaic broadness of 'plague.'
