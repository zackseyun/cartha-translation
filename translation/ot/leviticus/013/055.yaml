id: LEV.13.55
reference: Leviticus 13:55
source:
  edition: WLC
  text: וְ/רָאָ֨ה הַ/כֹּהֵ֜ן אַחֲרֵ֣י הֻכַּבֵּ֣ס אֶת הַ/נֶּ֗גַע וְ֠/הִנֵּה לֹֽא הָפַ֨ךְ
    הַ/נֶּ֤גַע אֶת עֵינ/וֹ֙ וְ/הַ/נֶּ֣גַע לֹֽא פָשָׂ֔ה טָמֵ֣א ה֔וּא בָּ/אֵ֖שׁ תִּשְׂרְפֶ֑/נּוּ
    פְּחֶ֣תֶת הִ֔וא בְּ/קָרַחְתּ֖/וֹ א֥וֹ בְ/גַבַּחְתּֽ/וֹ׀־־־־׃
translation:
  text: Then the priest shall examine it after the diseased area has been washed,
    and if the diseased area has not changed its appearance and the diseased area
    has not spread, it is unclean. You shall burn it in the fire; it is a corrosive
    spot, whether on its worn side or on its new side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has not changed its color.' The Hebrew idiom literally says 'has not
      changed its eye,' referring to visible appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'a corroding infection' or traditional 'a fret.' The Hebrew term refers
      to a destructive deterioration in the material.
    reason: lexical_alternative
  - marker: c
    text: The final phrase is difficult. Literally, 'in its baldness or in its forehead/bare
      front.' In context this likely refers to one side or surface of the affected
      material versus the other.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: Then ... shall examine
  alternatives:
  - and the priest shall see
  - and the priest shall inspect
  lexicon: HALOT
  rationale: In priestly diagnostic contexts ראה commonly carries the sense of inspection/examination
    rather than mere visual perception. 'Then' reflects the narrative-sequential waw
    in natural English.
- source_word: אַחֲרֵי הֻכַּבֵּס
  chosen: after ... has been washed
  alternatives:
  - after it has been washed
  - after washing
  lexicon: HALOT
  rationale: The passive form of כבס indicates the item/affected material has undergone
    washing. English supplies 'has been' for clear passive sense.
- source_word: הַנֶּגַע
  chosen: the diseased area
  alternatives:
  - the plague
  - the infection
  - the mark
  - the afflicted spot
  lexicon: HALOT
  rationale: נגע in Leviticus 13 refers broadly to the affected area/affliction, not
    necessarily a modern medical 'plague.' 'Diseased area' is clear modern English
    and fits the inspection context.
- source_word: לֹא הָפַךְ ... אֶת עֵינוֹ
  chosen: has not changed its appearance
  alternatives:
  - has not changed its color
  - has not turned its eye
  - has not altered in appearance
  lexicon: HALOT
  rationale: The idiom involving עַיִן ('eye') refers to visible appearance, often
    specifically color. 'Changed its appearance' preserves the idiomatic sense without
    awkward literalism; 'color' is possible but narrower than the Hebrew idiom may
    require.
- source_word: לֹא פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not spread further
  lexicon: HALOT
  rationale: פשה in skin/garment disease contexts means to spread or extend. 'Has
    not spread' is the standard clear rendering.
- source_word: טָמֵא הוּא
  chosen: it is unclean
  alternatives:
  - it is impure
  lexicon: HALOT
  rationale: In Levitical purity legislation, 'unclean' is the established and clearest
    English equivalent for ritual impurity.
- source_word: בָּאֵשׁ תִּשְׂרְפֶנּוּ
  chosen: You shall burn it in the fire
  alternatives:
  - it shall be burned in the fire
  - you must burn it with fire
  lexicon: HALOT
  rationale: The 2ms verb addresses the responsible party in legal instruction. 'In
    the fire' is a natural rendering of the prepositional phrase.
- source_word: פְּחֶתֶת
  chosen: a corrosive spot
  alternatives:
  - a deep-seated mildew
  - a corroding infection
  - a fret
  lexicon: HALOT
  rationale: The noun denotes a consuming/corrosive deterioration in cloth or leather.
    'Corrosive spot' communicates destructive damage without importing a precise modern
    diagnosis. Traditional 'fret' is archaic.
- source_word: בְּקָרַחְתּוֹ
  chosen: on its worn side
  alternatives:
  - in its baldness
  - on its back side
  - on the bare patch
  lexicon: HALOT
  rationale: In garment/leather context, the term refers metaphorically to a worn
    or bare side/surface, not literal scalp baldness. 'Worn side' gives intelligible
    English for the material's rubbed/bare surface.
- source_word: בְגַבַּחְתּוֹ
  chosen: on its new side
  alternatives:
  - in its front side
  - on its shiny side
  - on the opposite side
  lexicon: HALOT
  rationale: Paired with קָרַחַת in this context, the term likely denotes the opposite
    surface/condition of the material. 'New side' follows a common contextual understanding
    contrasting worn/bare and intact/newer surface, while remaining readable.
