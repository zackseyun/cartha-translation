id: LEV.13.14
reference: Leviticus 13:14
source:
  edition: WLC
  text: וּ/בְ/י֨וֹם הֵרָא֥וֹת בּ֛/וֹ בָּשָׂ֥ר חַ֖י יִטְמָֽא׃
translation:
  text: But on the day living flesh appears in it, he shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raw flesh.' The Hebrew phrase 'living flesh' refers to exposed live
      tissue in the affected area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/י֨וֹם
  chosen: But on the day
  alternatives:
  - And on the day
  - when
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition with יוֹם is most naturally
    temporal, 'and/on the day.' English idiom is improved with 'But on the day' because
    the verse marks a contrast with the prior condition in the surrounding law. 'When'
    is possible as a smoother temporal rendering, but 'on the day' better preserves
    the Hebrew form.
- source_word: הֵרָא֥וֹת
  chosen: appears
  alternatives:
  - is seen
  - shows itself
  lexicon: HALOT
  rationale: Niphal infinitive construct of ראה conveys passive/reflexive sense, 'being
    seen/appearing.' 'Appears' is natural modern English while retaining the event
    of visible manifestation.
- source_word: בּ֛/וֹ
  chosen: in it
  alternatives:
  - on it
  - in him
  lexicon: HALOT
  rationale: The preposition with 3ms suffix refers back to the affected person/body
    in the skin-disease legislation. 'In it' works idiomatically with 'living flesh
    appears' and avoids over-specifying anatomy. 'In him' is possible because the
    referent is a person, but the immediate concern is the condition in the affected
    area.
- source_word: בָּשָׂ֥ר
  chosen: flesh
  alternatives:
  - skin tissue
  - body
  lexicon: HALOT
  rationale: בשר is literally 'flesh.' In this diagnostic context it refers to raw/living
    flesh visible in the diseased area. 'Flesh' preserves the concrete imagery better
    than interpretive expansions.
- source_word: חַ֖י
  chosen: living
  alternatives:
  - raw
  - healthy
  lexicon: HALOT
  rationale: The adjective means 'living, alive.' In Leviticus 13 the phrase בשר חי
    refers to live/raw flesh appearing in the lesion. 'Living' is the most direct
    rendering; 'raw' is contextual interpretation and worth preserving in a footnote.
- source_word: יִטְמָֽא
  chosen: he shall be unclean
  alternatives:
  - he is unclean
  - he shall become unclean
  lexicon: HALOT
  rationale: The imperfect here gives the legal result/status in the priestly regulation.
    'He shall be unclean' communicates the ruling outcome in standard English. 'Become
    unclean' overstates a process not explicit in the form.
