- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the stated doctrine
    for contested terms, the main text uses 'the LORD' rather than a transliteration
    of the Tetragrammaton.
