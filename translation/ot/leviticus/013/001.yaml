id: LEV.13.1
reference: Leviticus 13:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: And the LORD spoke to Moses and to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + דבר introduces a new narrative speech event. 'Spoke'
    is the standard and slightly more formal rendering for דבר in divine address formulas,
    while 'said' is possible but less precise for this recurring formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the Tetragrammaton.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech. 'To' is the natural modern
    English equivalent; 'unto' is archaic.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - to
  lexicon: HALOT
  rationale: 'The conjunction plus preposition explicitly coordinates a second addressee.
    Rendering both elements preserves the Hebrew structure: the LORD spoke to Moses
    and to Aaron.'
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name אַהֲרֹן.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: This infinitive construct introduces the content of the forthcoming speech
    in a common Hebrew formula. 'Saying,' preserves the formal linkage to the next
    verse without paraphrasing.
