id: LEV.13.56
reference: Leviticus 13:56
source:
  edition: WLC
  text: וְ/אִם֮ רָאָ֣ה הַ/כֹּהֵן֒ וְ/הִנֵּה֙ כֵּהָ֣ה הַ/נֶּ֔גַע אַחֲרֵ֖י הֻכַּבֵּ֣ס
    אֹת֑/וֹ וְ/קָרַ֣ע אֹת֗/וֹ מִן הַ/בֶּ֨גֶד֙ א֣וֹ מִן הָ/ע֔וֹר א֥וֹ מִן הַ/שְּׁתִ֖י
    א֥וֹ מִן הָ/עֵֽרֶב־־־־׃
translation:
  text: But if the priest examines it, and behold, the spot has faded after it was
    washed, then he shall tear it out of the garment, or out of the leather, or out
    of the warp, or out of the woof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weft' for 'woof,' the crosswise threads in woven material.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the prior procedure. 'But
    if' captures both the connective and the slight contrastive development in English
    discourse.
- source_word: רָאָה הַכֹּהֵן
  chosen: the priest examines it
  alternatives:
  - the priest sees
  - the priest looks
  lexicon: HALOT
  rationale: Although the verb is literally 'sees,' in procedural inspection context
    'examines' best conveys the priest's evaluative act without over-paraphrasing.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - and indeed
  lexicon: HALOT
  rationale: Retains the demonstrative attention-marker common in Hebrew narrative/legal
    prose. 'Behold' is slightly formal but still clear and preserves the source emphasis.
- source_word: כֵּהָה
  chosen: has faded
  alternatives:
  - is dim
  - has grown faint
  - is dull
  lexicon: HALOT
  rationale: In the context of a skin-disease-like mark in fabric/leather, the sense
    is that the affected appearance has become less intense. 'Has faded' is idiomatic
    and contextually precise.
- source_word: הַנֶּגַע
  chosen: the spot
  alternatives:
  - the plague
  - the mark
  - the afflicted area
  lexicon: HALOT
  rationale: Here נגע refers to the affected patch or diseased-looking area in material,
    not necessarily a 'plague' in modern English. 'Spot' is natural and fits the object
    under inspection.
- source_word: אַחֲרֵי הֻכַּבֵּס אֹתוֹ
  chosen: after it was washed
  alternatives:
  - after it was laundered
  - after washing it
  lexicon: HALOT
  rationale: Passive rendering matches the Hebrew passive form. 'Washed' is straightforward
    and appropriate for garment/leather treatment.
- source_word: וְקָרַע אֹתוֹ
  chosen: then he shall tear it out
  alternatives:
  - then he shall tear it away
  - then he shall rip it out
  lexicon: HALOT
  rationale: The object is the affected portion of the item. 'Tear it out' clearly
    expresses removal of the contaminated section rather than destruction of the whole
    item.
- source_word: מִן הַבֶּגֶד
  chosen: out of the garment
  alternatives:
  - from the garment
  - out of the clothing
  lexicon: HALOT
  rationale: '''Garment'' is the standard and suitably broad rendering for בגד in
    this legal context.'
- source_word: מִן הָעוֹר
  chosen: out of the leather
  alternatives:
  - from the skin
  - out of the hide
  lexicon: HALOT
  rationale: In material context, עור refers to leather/hide as an object, not human
    skin. 'Leather' is the clearest modern English choice.
- source_word: מִן הַשְּׁתִי
  chosen: out of the warp
  alternatives:
  - from the warp threads
  lexicon: HALOT
  rationale: Technical textile term for the longitudinal threads. Preserving the specific
    term maintains the legal/material precision of the Hebrew.
- source_word: מִן הָעֵרֶב
  chosen: out of the woof
  alternatives:
  - from the weft
  - from the woven threads
  lexicon: HALOT
  rationale: Pairs with 'warp' as the transverse threads. 'Woof' is the traditional
    English textile counterpart; 'weft' is a viable modern alternative, but 'warp
    and woof' is an established pair that aids recognition.
