id: LEV.13.16
reference: Leviticus 13:16
source:
  edition: WLC
  text: א֣וֹ כִ֥י יָשׁ֛וּב הַ/בָּשָׂ֥ר הַ/חַ֖י וְ/נֶהְפַּ֣ךְ לְ/לָבָ֑ן וּ/בָ֖א אֶל
    הַ/כֹּהֵֽן־׃
translation:
  text: Or if the raw flesh turns back and becomes white, then he shall come to the
    priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the living flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  chosen: Or
  alternatives:
  - But if
  - Or if
  lexicon: HALOT
  rationale: Introduces an alternative case within the priestly diagnostic procedure.
    'Or' best reflects the disjunctive force, while the following כִּי supplies the
    conditional sense.
- source_word: כִ֥י
  chosen: if
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: In this context כִּי introduces a conditional clause after אוֹ, yielding
    'Or if' naturally in English.
- source_word: יָשׁ֛וּב
  chosen: turns back
  alternatives:
  - returns
  - changes back
  lexicon: HALOT
  rationale: The verb שוב denotes returning. 'Turns back' preserves the sense that
    the condition reverses from the prior state described in the surrounding context.
- source_word: הַ/בָּשָׂ֥ר הַ/חַ֖י
  chosen: the raw flesh
  alternatives:
  - the living flesh
  - the healthy flesh
  lexicon: HALOT
  rationale: Literally 'the living flesh.' In Leviticus 13 this phrase refers to exposed,
    raw-looking live tissue within the skin disease. 'Raw flesh' is idiomatic and
    medically descriptive in context, while 'living flesh' is preserved as an alternative.
- source_word: וְ/נֶהְפַּ֣ךְ
  chosen: becomes
  alternatives:
  - is changed
  - is turned
  lexicon: HALOT
  rationale: The Niphal of הפך here indicates a change of state. 'Becomes' is natural
    English and captures the passive/resultative sense in context.
- source_word: לְ/לָבָ֑ן
  chosen: white
  lexicon: HALOT
  rationale: Straightforward color term; in context it marks the visible change relevant
    to priestly examination.
- source_word: וּ/בָ֖א
  chosen: then he shall come
  alternatives:
  - and he shall come
  - he must come
  lexicon: HALOT
  rationale: The qatal with conjunction continues the procedural sequence. 'Then he
    shall come' makes the resultative step explicit in English without overstating
    obligation beyond the legal-procedural context.
- source_word: אֶל הַ/כֹּהֵֽן
  chosen: to the priest
  alternatives:
  - before the priest
  lexicon: HALOT
  rationale: Direct movement toward the examining priest is intended. 'To the priest'
    is the most natural rendering.
