id: LEV.13.41
reference: Leviticus 13:41
source:
  edition: WLC
  text: וְ/אִם֙ מִ/פְּאַ֣ת פָּנָ֔י/ו יִמָּרֵ֖ט רֹאשׁ֑/וֹ גִּבֵּ֥חַ ה֖וּא טָה֥וֹר הֽוּא׃
translation:
  text: And if the front of his head becomes bald, he is bald on the forehead; he
    is clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frontal bald' or 'having baldness at the front of the head.' The Hebrew
      term distinguishes this from baldness at the back of the head in the previous
      verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּאַת פָּנָיו
  chosen: the front of his head
  alternatives:
  - from the side of his face
  - from the front part of his face
  lexicon: HALOT
  rationale: The phrase literally combines 'edge/side' with 'his face,' but in context
    of scalp conditions it refers to the frontal region of the head rather than the
    face proper. 'The front of his head' gives the anatomical sense in natural English.
- source_word: יִמָּרֵט
  chosen: becomes bald
  alternatives:
  - is made bare
  - has his hair pulled out
  lexicon: HALOT
  rationale: The Niphal form denotes the hair being made bare or falling out. In this
    diagnostic context, 'becomes bald' is the clearest idiomatic rendering.
- source_word: רֹאשׁוֹ
  chosen: his head
  lexicon: HALOT
  rationale: Standard rendering of the noun in this anatomical context.
- source_word: גִּבֵּחַ
  chosen: bald on the forehead
  alternatives:
  - front-bald
  - having frontal baldness
  lexicon: HALOT
  rationale: This term is distinct from the previous verse's term for baldness at
    the back/crown of the head and specifically denotes frontal baldness. Rendering
    it explicitly preserves the distinction important to the passage.
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: In Leviticus 13 the concern is ritual status in relation to skin disease,
    so 'clean' is the standard and contextually appropriate rendering rather than
    the broader 'pure'.
