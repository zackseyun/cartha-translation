theological_decisions:
- issue: Ritual status terminology in purity legislation
  chosen_reading: clean
  alternative_readings:
  - pure
  rationale: The verse concerns priestly diagnosis of bodily conditions and their
    ritual implications, not moral purity. 'Clean' best preserves the Levitical category
    without importing ethical connotations.
