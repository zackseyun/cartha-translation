id: LEV.13.32
reference: Leviticus 13:32
source:
  edition: WLC
  text: וְ/רָאָ֨ה הַ/כֹּהֵ֣ן אֶת הַ/נֶּגַע֮ בַּ/יּ֣וֹם הַ/שְּׁבִיעִי֒ וְ/הִנֵּה֙ לֹא
    פָשָׂ֣ה הַ/נֶּ֔תֶק וְ/לֹא הָ֥יָה ב֖/וֹ שֵׂעָ֣ר צָהֹ֑ב וּ/מַרְאֵ֣ה הַ/נֶּ֔תֶק אֵ֥ין
    עָמֹ֖ק מִן הָ/עֽוֹר־־־־׃
translation:
  text: And the priest shall examine the diseased area on the seventh day, and behold,
    if the scaly infection has not spread, and there is no yellow hair in it, and
    the appearance of the scaly infection is not deeper than the skin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the itch' or, archaically, 'the scall' for the Hebrew נֶתֶק, a specific
      scaly affliction of the scalp or beard discussed in this section.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - shall inspect
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, ראה commonly carries the sense of examining/inspecting
    rather than mere visual perception. 'Shall examine' communicates the procedural
    force in modern English.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Leviticus; the priest is the authorized
    examiner in purity legislation.
- source_word: הַנֶּגַע
  chosen: the diseased area
  alternatives:
  - the infection
  - the affliction
  - the spot
  lexicon: HALOT
  rationale: נֶגַע is a broad term for an afflicted or stricken area, not necessarily
    a modern medical 'plague.' 'Diseased area' is clear and suitably non-technical
    in this diagnostic context.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  lexicon: HALOT
  rationale: Straightforward temporal phrase marking the scheduled reexamination.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and if indeed
  lexicon: HALOT
  rationale: Retains the discourse marker that introduces the priest's observed findings.
    'Behold' is slightly formal but still readable and preserves the inspection formula.
- source_word: לֹא פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not grown
  lexicon: HALOT
  rationale: פשה in skin-disease contexts refers to spreading over the skin. 'Has
    not spread' is the natural English equivalent.
- source_word: הַנֶּתֶק
  chosen: the scaly infection
  alternatives:
  - the itch
  - the scall
  - the diseased patch
  lexicon: HALOT
  rationale: נֶתֶק in Leviticus 13 refers to a specific scalp/beard affliction characterized
    by scaling and hair changes. 'Scaly infection' avoids archaic 'scall' and misleadingly
    narrow 'itch,' while signaling a distinct lesion type.
- source_word: וְלֹא הָיָה בוֹ שֵׂעָר צָהֹב
  chosen: and there is no yellow hair in it
  alternatives:
  - and no yellow hair has appeared in it
  - and it has no yellow hair
  lexicon: HALOT
  rationale: This clause states the absence of the diagnostic sign. 'In it' preserves
    the locative sense of בו, referring to the affected area.
- source_word: שֵׂעָר צָהֹב
  chosen: yellow hair
  alternatives:
  - golden hair
  lexicon: HALOT
  rationale: The adjective צָהֹב denotes a yellowish color. 'Yellow hair' is the plain
    diagnostic description.
- source_word: וּמַרְאֵה הַנֶּתֶק
  chosen: and the appearance of the scaly infection
  alternatives:
  - and the look of the scaly infection
  lexicon: HALOT
  rationale: מַרְאֶה refers to visible appearance. 'Appearance' fits the priestly
    inspection register.
- source_word: אֵין עָמֹק מִן הָעוֹר
  chosen: is not deeper than the skin
  alternatives:
  - does not appear deeper than the skin
  - is not sunken below the skin
  lexicon: HALOT
  rationale: This phrase describes whether the lesion appears depressed/deeper relative
    to the surrounding skin, a key diagnostic criterion. 'Not deeper than the skin'
    is concise and faithful.
