id: LEV.13.53
reference: Leviticus 13:53
source:
  edition: WLC
  text: וְ/אִם֮ יִרְאֶ֣ה הַ/כֹּהֵן֒ וְ/הִנֵּה֙ לֹא פָשָׂ֣ה הַ/נֶּ֔גַע בַּ/בֶּ֕גֶד
    א֥וֹ בַ/שְּׁתִ֖י א֣וֹ בָ/עֵ֑רֶב א֖וֹ בְּ/כָל כְּלִי עֽוֹר־־־׃
translation:
  text: But if the priest examines it, and behold, the infection has not spread in
    the garment, or in the warp, or in the woof, or in any article of leather,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the weft' for 'in the woof'; both refer to the crosswise threads
      in woven fabric.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the prior procedure. 'But
    if' captures both the conjunction and the slight contrast with the previous case;
    'and if' would also be possible more formally.
- source_word: יִרְאֶה
  chosen: examines
  alternatives:
  - sees
  - looks
  lexicon: HALOT
  rationale: Although the verb is literally 'sees,' in priestly inspection contexts
    English 'examines' better conveys the official evaluative act without over-paraphrasing.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the inspecting ritual official in Leviticus.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - and if indeed
  lexicon: HALOT
  rationale: Retains the discourse marker that draws attention to the inspection result.
    'Behold' is slightly elevated but still transparent and common in Bible translation.
- source_word: לֹא פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not increased
  lexicon: HALOT
  rationale: פשה in skin/garment disease contexts refers to spreading or extending.
    Present perfect English fits the result of the reinspection.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the plague
  - the diseased spot
  - the affliction
  lexicon: HALOT
  rationale: In Leviticus 13, נגע denotes the affected/infected area or condition.
    'Infection' is accessible modern English and avoids the archaic broadness of 'plague,'
    while not over-specifying a modern medical diagnosis.
- source_word: בַּבֶּגֶד
  chosen: in the garment
  alternatives:
  - on the garment
  - in the clothing
  lexicon: HALOT
  rationale: '''Garment'' is the standard term in this passage. The preposition can
    be rendered ''in/on,'' but ''in'' works naturally with the idea of infestation
    within the material.'
- source_word: בַשְּׁתִי
  chosen: in the warp
  lexicon: HALOT
  rationale: Technical textile term for the longitudinal threads. Preserved for accuracy
    in the inspection instructions.
- source_word: בָעֵרֶב
  chosen: in the woof
  alternatives:
  - in the weft
  lexicon: HALOT
  rationale: Refers to the crosswise woven threads. 'Woof' is traditional and pairs
    naturally with 'warp'; 'weft' is a viable modern textile alternative.
- source_word: בְּכָל כְּלִי עוֹר
  chosen: in any article of leather
  alternatives:
  - in any leather item
  - in any vessel of skin
  lexicon: HALOT
  rationale: כְּלִי is a general implement/article/object term; here 'article' is
    broad and natural. 'Leather' is preferable to the more literal 'skin' in modern
    English for manufactured goods.
