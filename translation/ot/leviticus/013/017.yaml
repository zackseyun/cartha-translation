id: LEV.13.17
reference: Leviticus 13:17
source:
  edition: WLC
  text: וְ/רָאָ֨/הוּ֙ הַ/כֹּהֵ֔ן וְ/הִנֵּ֛ה נֶהְפַּ֥ךְ הַ/נֶּ֖גַע לְ/לָבָ֑ן וְ/טִהַ֧ר
    הַ/כֹּהֵ֛ן אֶת הַ/נֶּ֖גַע טָה֥וֹר הֽוּא־׃פ
translation:
  text: and the priest examines it, and behold, the diseased spot has turned white,
    then the priest shall pronounce the spot clean; it is clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the infection,' 'the lesion,' or 'the affliction.' Hebrew negaʿ refers
      to the visible afflicted area under priestly inspection, without specifying
      a modern medical diagnosis.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall declare the spot clean.' The priest's role here is to render a
      ritual verdict after examination, not to heal the condition.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''clean is it/he.'' The pronoun is masculine singular; English
      renders the verdict with reference to the spot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  chosen: examines it
  alternatives:
  - sees it
  - looks at it
  lexicon: HALOT
  rationale: Though the verb is literally 'sees him/it,' in priestly inspection contexts
    it denotes examination or inspection rather than mere sight. 'Examines it' communicates
    the procedural sense in readable English.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Leviticus; the priest is the authorized
    examiner and declarer in purity legislation.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - indeed
  - and look
  lexicon: HALOT
  rationale: Retains the discourse marker that draws attention to the inspection result.
    'Behold' is slightly formal but still clear and preserves the observational force.
- source_word: נֶהְפַּךְ
  chosen: has turned
  alternatives:
  - has changed
  - has been changed
  lexicon: HALOT
  rationale: The Niphal here indicates a change of state. 'Has turned' is idiomatic
    with color change in English and fits the result of the inspection.
- source_word: הַנֶּגַע
  chosen: the diseased spot
  alternatives:
  - the infection
  - the affliction
  - the lesion
  - the plague spot
  lexicon: HALOT
  rationale: נֶגַע in Leviticus 13 refers to an observable skin affliction/mark under
    priestly examination, not necessarily a modern medical diagnosis. 'Diseased spot'
    is concrete and accessible while avoiding misleading technical certainty.
- source_word: לְלָבָן
  chosen: white
  lexicon: HALOT
  rationale: Straightforward color term; in context it describes the visible change
    indicating cleanness.
- source_word: וְטִהַר
  chosen: shall pronounce ... clean
  alternatives:
  - shall cleanse
  - shall declare ... clean
  lexicon: HALOT
  rationale: In priestly purity contexts, the priest does not medically heal but renders
    an authoritative purity verdict. 'Pronounce ... clean' makes the declarative function
    explicit in natural English.
- source_word: טָהוֹר הוּא
  chosen: it is clean
  alternatives:
  - he is clean
  lexicon: HALOT
  rationale: Although the Hebrew pronoun is masculine singular and could formally
    refer to the spot, the clause gives the purity verdict resulting from the examination.
    Rendering 'it is clean' keeps agreement with the immediately preceding 'spot'
    and avoids implying ritual agency by the lesion itself; the broader context makes
    clear this means the case is ritually clean.
