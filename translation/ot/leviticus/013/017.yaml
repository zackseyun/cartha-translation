theological_decisions:
- issue: Nature of priestly action in purity law
  chosen_reading: The priest pronounces the spot clean rather than personally cleansing
    it.
  alternative_readings:
  - the priest cleanses the spot
  rationale: The Hebrew verb טהר can mean 'cleanse' or 'declare clean' depending on
    context. In Leviticus 13 the priest functions as examiner and authoritative declarer
    of ritual status, not as healer. This avoids importing sacramental or medical
    action not stated by the text.
  doctrine_reference: Translation philosophy §1, §3
