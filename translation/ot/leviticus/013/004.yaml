id: LEV.13.4
reference: Leviticus 13:4
source:
  edition: WLC
  text: וְ/אִם בַּהֶרֶת֩ לְבָנָ֨ה הִ֜וא בְּ/ע֣וֹר בְּשָׂר֗/וֹ וְ/עָמֹק֙ אֵין מַרְאֶ֣/הָ
    מִן הָ/ע֔וֹר וּ/שְׂעָרָ֖/ה לֹא הָפַ֣ךְ לָבָ֑ן וְ/הִסְגִּ֧יר הַ/כֹּהֵ֛ן אֶת הַ/נֶּ֖גַע
    שִׁבְעַ֥ת יָמִֽים־־־־־׃
translation:
  text: But if the bright spot is white in the skin of his flesh, and its appearance
    is not deeper than the skin, and its hair has not turned white, then the priest
    shall isolate the affected area for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bright patch' or 'shining spot' for the skin lesion described here.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall quarantine'; the Hebrew refers to placing the case under temporary
      isolation for observation.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the affliction/lesion'; the term refers to the affected spot being
      examined by the priest.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהֶרֶת
  chosen: bright spot
  alternatives:
  - swelling
  - shining spot
  - bright patch
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a visible skin lesion/mark characterized
    by brightness or whiteness. 'Bright spot' is natural modern English and distinguishes
    it from the prior verse's 'swelling' terminology.
- source_word: לְבָנָה
  chosen: white
  alternatives:
  - whitish
  lexicon: HALOT
  rationale: The adjective straightforwardly denotes the lesion's color. 'White' is
    the plain sense.
- source_word: בְּעוֹר בְּשָׂרוֹ
  chosen: in the skin of his flesh
  alternatives:
  - on the skin of his body
  - in the skin of his body
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew expression and its
    anatomical specificity. 'His flesh' here refers to his body, not meat; retaining
    'flesh' matches the source while remaining intelligible.
- source_word: וְעָמֹק אֵין מַרְאֶהָ מִן הָעוֹר
  chosen: its appearance is not deeper than the skin
  alternatives:
  - it does not appear deeper than the skin
  - its sight is not deeper than the skin
  lexicon: HALOT
  rationale: The clause describes visual depth relative to the surrounding skin, an
    important diagnostic criterion in this chapter. 'Appearance' for מַרְאֶה is idiomatic
    and preserves the observational focus.
- source_word: וּשְׂעָרָהּ
  chosen: its hair
  alternatives:
  - the hair in it
  - hair on it
  lexicon: HALOT
  rationale: The feminine singular with suffix refers to the hair associated with
    the lesion. 'Its hair' is concise and clear in English.
- source_word: לֹא הָפַךְ לָבָן
  chosen: has not turned white
  alternatives:
  - has not changed to white
  - has not become white
  lexicon: HALOT
  rationale: הפך in this context indicates change of state. 'Turned white' is idiomatic
    modern English for hair changing color.
- source_word: וְהִסְגִּיר
  chosen: shall isolate
  alternatives:
  - shall quarantine
  - shall shut up
  - shall confine
  lexicon: HALOT
  rationale: The priest is to place the person/affected case under temporary separation
    for observation. 'Isolate' communicates the procedural sense in readable modern
    English without archaic 'shut up.'
- source_word: אֶת־הַנֶּגַע
  chosen: the affected area
  alternatives:
  - the disease
  - the lesion
  - the spot
  - the plague
  lexicon: HALOT
  rationale: נגע in Leviticus 13 refers to the afflicted spot/condition under examination.
    Since English 'plague' is misleading and 'disease' may overstate the diagnosis,
    'affected area' captures the concrete object of priestly inspection in accessible
    language.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Standard temporal expression indicating the duration of isolation.
