id: LEV.13.5
reference: Leviticus 13:5
source:
  edition: WLC
  text: וְ/רָאָ֣/הוּ הַ/כֹּהֵן֮ בַּ/יּ֣וֹם הַ/שְּׁבִיעִי֒ וְ/הִנֵּ֤ה הַ/נֶּ֨גַע֙ עָמַ֣ד
    בְּ/עֵינָ֔י/ו לֹֽא פָשָׂ֥ה הַ/נֶּ֖גַע בָּ/ע֑וֹר וְ/הִסְגִּיר֧/וֹ הַ/כֹּהֵ֛ן שִׁבְעַ֥ת
    יָמִ֖ים שֵׁנִֽית־׃
translation:
  text: And the priest shall examine him on the seventh day, and behold, if the spot
    has remained unchanged in his sight and the spot has not spread in the skin, then
    the priest shall isolate him for seven days a second time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the affliction' or 'the mark' for Hebrew negaʿ; the term refers to the
      visible lesion under priestly examination, not necessarily a medically defined
      disease.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the spot has stood in his eyes,' an idiom meaning it appeared
      unchanged to the priest.
    reason: lexical_alternative
  - marker: c
    text: Or 'shall confine him' or more literally 'shall shut him up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  chosen: shall examine him
  alternatives:
  - shall see him
  - shall look at him
  lexicon: HALOT
  rationale: Though the verb ראה is literally 'see,' in priestly inspection contexts
    it carries the sense of examining or inspecting a person for ritual diagnosis.
    'Examine him' best reflects the procedural force in clear English.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: Standard temporal rendering; preserves the definite, sequential timing
    of the inspection.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and if indeed
  - and look
  lexicon: HALOT
  rationale: '''Behold'' preserves the discourse marker that draws attention to the
    inspection result. It is slightly formal but still natural in this legal-ritual
    context.'
- source_word: הַנֶּגַע
  chosen: the spot
  alternatives:
  - the disease
  - the affliction
  - the mark
  - the plague
  lexicon: HALOT
  rationale: In Leviticus 13, נגע refers to the visible skin affliction/mark under
    examination, not necessarily a disease in modern medical terms. 'Spot' is concrete
    and avoids overmedicalizing the text.
- source_word: עָמַד בְּעֵינָיו
  chosen: has remained unchanged in his sight
  alternatives:
  - has stayed the same in appearance to him
  - has stood in his eyes
  lexicon: HALOT
  rationale: The idiom literally means 'has stood in his eyes,' i.e., appears unchanged
    to the priest upon inspection. 'Has remained unchanged in his sight' preserves
    both the idiomatic sense and the priest's evaluative perspective.
- source_word: לֹא פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not expanded
  lexicon: HALOT
  rationale: פשׂה in this diagnostic context refers to the lesion spreading. 'Has
    not spread' is the clearest natural equivalent.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  - in the flesh
  lexicon: HALOT
  rationale: עור is 'skin.' 'In the skin' follows the Hebrew preposition and fits
    the diagnostic context of spread within the skin area.
- source_word: וְהִסְגִּירוֹ
  chosen: shall isolate him
  alternatives:
  - shall shut him up
  - shall quarantine him
  - shall confine him
  lexicon: HALOT
  rationale: The verb means to shut up/confine. 'Isolate him' communicates the ritual-procedural
    separation in readable modern English without importing anachronistic medical
    precision as strongly as 'quarantine' might.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Straightforward duration phrase.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: HALOT
  rationale: This adverb marks repetition of the seven-day isolation. 'A second time'
    is explicit and natural in English.
