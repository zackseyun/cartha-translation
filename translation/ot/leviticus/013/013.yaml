theological_decisions:
- issue: Rendering of צָרַעַת in Levitical purity law
  chosen_reading: the skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  - tzaraath
  rationale: To avoid importing the modern clinical concept of leprosy/Hansen's disease
    into a broader Hebrew category of skin affliction, the main text uses 'skin disease.'
    This preserves the ritual-legal context without false medical precision.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: Sense of priestly declaration in וְטִהַר
  chosen_reading: then he shall pronounce the affected person clean
  alternative_readings:
  - then he shall pronounce him clean
  - then he shall declare the disease clean
  rationale: The priest is issuing a purity verdict, not effecting cleansing. English
    must reflect declarative/judicial force. The object is rendered personally for
    clarity in natural English while preserving the legal sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without wooden awkwardness.'
