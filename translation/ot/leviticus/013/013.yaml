id: LEV.13.13
reference: Leviticus 13:13
source:
  edition: WLC
  text: וְ/רָאָ֣ה הַ/כֹּהֵ֗ן וְ/הִנֵּ֨ה כִסְּתָ֤ה הַ/צָּרַ֨עַת֙ אֶת כָּל בְּשָׂר֔/וֹ
    וְ/טִהַ֖ר אֶת הַ/נָּ֑גַע כֻּלּ֛/וֹ הָפַ֥ךְ לָבָ֖ן טָה֥וֹר הֽוּא־־־׃
translation:
  text: and the priest examines him, and behold, the skin disease has covered all
    his flesh, then he shall pronounce the affected person clean; all of it has turned
    white; he is clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת (traditionally 'leprosy') refers more broadly to a range
      of skin afflictions in Leviticus, not necessarily modern leprosy.
    reason: lexical_alternative
  - marker: b
    text: Or 'then he shall pronounce him clean.' The Hebrew object is literally 'the
      affliction/mark,' but the ruling applies to the person bearing it.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָאָה
  chosen: examines
  alternatives:
  - sees
  - looks
  lexicon: HALOT
  rationale: Though literally 'sees,' in priestly inspection contexts the verb denotes
    examination/inspection by the priest rather than mere sight. Present-tense English
    fits the procedural case-law style after the preceding conditional context.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the cultic official who performs the diagnosis.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - indeed
  - if
  lexicon: HALOT
  rationale: Preserves the deictic force marking the observed condition. 'Behold'
    is still readable here and signals the inspection result.
- source_word: כִסְּתָה
  chosen: has covered
  alternatives:
  - covered
  lexicon: HALOT
  rationale: The perfect verb describes the resulting state observed by the priest;
    English present perfect communicates that the covering is now complete.
- source_word: הַצָּרַעַת
  chosen: the skin disease
  alternatives:
  - the leprous disease
  - the defiling skin disease
  - tzaraath
  lexicon: HALOT
  rationale: Hebrew צָרַעַת does not map neatly onto modern Hansen's disease ('leprosy').
    'Skin disease' is accurate and accessible, avoiding misleading medical specificity.
- source_word: אֶת כָּל בְּשָׂרוֹ
  chosen: all his flesh
  alternatives:
  - his whole body
  - all his skin
  lexicon: HALOT
  rationale: '''Flesh'' is the formal equivalent of בָּשָׂר and works naturally here.
    It refers to the person''s bodily surface in context, not merely muscle tissue.'
- source_word: וְטִהַר
  chosen: then he shall pronounce the affected person clean
  alternatives:
  - then he shall declare the disease clean
  - then he shall pronounce him clean
  lexicon: HALOT
  rationale: In priestly purity legislation, טהר in the piel means to declare/pronounce
    clean, not to cleanse by treatment. The direct object is 'the affected one/the
    plague,' but idiomatic English makes the priest's verdict explicit. 'Affected
    person' clarifies the referent without overparaphrasing.
- source_word: אֶת הַנָּגַע
  chosen: the affected person
  alternatives:
  - the sore
  - the infection
  - the plague
  - the diseased area
  lexicon: HALOT
  rationale: נֶגַע literally means 'affliction/mark/plague/spot.' In this legal context
    the priest's ruling concerns the person as identified by the affliction. Rendering
    the object personally yields clearer English than 'pronounce the affliction clean,'
    which is awkward and potentially misleading.
- source_word: כֻּלּוֹ
  chosen: all of it
  alternatives:
  - entirely
  - the whole of it
  lexicon: HALOT
  rationale: Refers back to the affected area/disease condition as a whole. 'All of
    it' preserves the totalizing emphasis.
- source_word: הָפַךְ לָבָן
  chosen: has turned white
  alternatives:
  - turned white
  - become white
  lexicon: HALOT
  rationale: Straightforward rendering of the color change that determines the priestly
    verdict.
- source_word: טָהוֹר הוּא
  chosen: he is clean
  alternatives:
  - he is ceremonially clean
  - he is pure
  lexicon: HALOT
  rationale: '''Clean'' is the standard purity-term rendering in Leviticus. Adding
    ''ceremonially'' would interpret rather than translate; the cultic sense is clear
    from context.'
