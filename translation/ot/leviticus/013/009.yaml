theological_decisions:
- issue: Rendering of אָדָם in legal singular context
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  rationale: The doctrine excerpt specifies 'man / humankind (context)' and prefers
    gender-accurate renderings over gender-neutral ones where the source has masculine/generic
    force. In this casuistic singular, 'man' preserves the Hebrew form and representative
    sense.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
