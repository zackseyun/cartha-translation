theological_decisions:
- issue: Ritual purity versus medical healing
  chosen_reading: Render טהר in declarative ritual terms ('pronounce him clean') rather
    than implying physical healing.
  alternative_readings:
  - the priest shall cleanse him
  - the priest shall heal him
  rationale: The verse concerns priestly examination and status within Israel's purity
    system, not the priest medically curing the person. The translation should preserve
    that cultic-legal distinction.
  doctrine_reference: Translation philosophy §1, §3
