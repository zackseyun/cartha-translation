id: LEV.13.23
reference: Leviticus 13:23
source:
  edition: WLC
  text: וְ/אִם תַּחְתֶּ֜י/הָ תַּעֲמֹ֤ד הַ/בַּהֶ֨רֶת֙ לֹ֣א פָשָׂ֔תָה צָרֶ֥בֶת הַ/שְּׁחִ֖ין
    הִ֑וא וְ/טִהֲר֖/וֹ הַ/כֹּהֵֽן־׃ס
translation:
  text: But if the bright spot remains in its place and has not spread, it is the
    scar of the boil, and the priest shall pronounce him clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under it'; the Hebrew idiom means the bright spot stays where it is
      rather than spreading.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous case; 'But if' captures
    the adversative flow in English better than a simple 'And if.'
- source_word: תַּחְתֶּיהָ
  chosen: in its place
  alternatives:
  - under it
  - beneath it
  lexicon: HALOT
  rationale: Literally 'under it,' but in this diagnostic context the idiom means
    the bright spot stays where it is rather than spreading. 'In its place' communicates
    the sense naturally in English without over-paraphrasing.
- source_word: תַּעֲמֹד
  chosen: remains
  alternatives:
  - stands
  - stays
  lexicon: HALOT
  rationale: The verb literally means 'stand,' but here refers to persistence in the
    same location. 'Remains' fits the medical-inspection context and pairs well with
    'in its place.'
- source_word: הַבַּהֶרֶת
  chosen: the bright spot
  alternatives:
  - the swelling
  - the white patch
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a visible bright/white mark on the
    skin. 'Bright spot' is a clear, established rendering that preserves the observable
    feature without importing a more specific diagnosis.
- source_word: לֹא פָשָׂתָה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not expanded
  lexicon: HALOT
  rationale: The verb is used repeatedly in this chapter for a skin condition spreading
    over the skin. 'Has not spread' is the most natural and contextually precise English
    rendering.
- source_word: צָרֶבֶת
  chosen: the scar
  alternatives:
  - an inflammation mark
  - the scar tissue
  lexicon: HALOT
  rationale: Refers to the mark left by inflammation or burning. In relation to a
    boil, 'scar' is the clearest concise rendering in modern English.
- source_word: הַשְּׁחִין
  chosen: the boil
  alternatives:
  - the ulcer
  - the inflamed sore
  lexicon: HALOT
  rationale: Standard rendering in Leviticus for a skin eruption/boil. 'Boil' is concise
    and widely understood.
- source_word: וְטִהֲרוֹ
  chosen: the priest shall pronounce him clean
  alternatives:
  - the priest shall declare him clean
  - the priest shall cleanse him
  lexicon: HALOT
  rationale: In priestly purity contexts, the verb means to declare or pronounce a
    person ritually clean, not to cleanse by direct action. 'Pronounce him clean'
    preserves the forensic/ritual sense.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the officiating cultic authority in Leviticus.
