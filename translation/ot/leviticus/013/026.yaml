id: LEV.13.26
reference: Leviticus 13:26
source:
  edition: WLC
  text: וְ/אִ֣ם יִרְאֶ֣/נָּה הַ/כֹּהֵ֗ן וְ/הִנֵּ֤ה אֵֽין בַּ/בֶּהֶ֨רֶת֙ שֵׂעָ֣ר לָבָ֔ן
    וּ/שְׁפָלָ֥ה אֵינֶ֛/נָּה מִן הָ/ע֖וֹר וְ/הִ֣וא כֵהָ֑ה וְ/הִסְגִּיר֥/וֹ הַ/כֹּהֵ֖ן
    שִׁבְעַ֥ת יָמִֽים׀־־׃
translation:
  text: But if the priest examines it, and behold, there is no white hair in the bright
    spot, and it is not deeper than the skin, but it is faded, then the priest shall
    isolate him seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it is not lower than the skin,' that is, it does not appear sunken below
      the surrounding skin.
    reason: lexical_alternative
  - marker: b
    text: Or 'the priest shall quarantine him' or 'confine him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֶּהֶרֶת
  chosen: in the bright spot
  alternatives:
  - in the swelling
  - in the patch
  - in the spot
  lexicon: HALOT
  rationale: בַּהֶרֶת in Leviticus 13 denotes a bright or whitish skin lesion/mark.
    'Bright spot' preserves the visual sense without over-specifying a medical diagnosis.
    'Spot' alone is possible but loses the brightness nuance.
- source_word: שֵׂעָר לָבָן
  chosen: white hair
  alternatives:
  - a white hair
  - white hairs
  lexicon: HALOT
  rationale: The singular collective expression is naturally rendered 'white hair'
    in English. This keeps the diagnostic sign concise and idiomatic.
- source_word: וּשְׁפָלָה אֵינֶנָּה מִן הָעוֹר
  chosen: it is not deeper than the skin
  alternatives:
  - it is not lower than the skin
  - it is not sunken below the skin
  lexicon: HALOT
  rationale: The adjective literally relates to being low/depressed. In this diagnostic
    context, English 'deeper than the skin' best communicates the visible criterion
    already used elsewhere in the chapter, while remaining faithful to the sense of
    not appearing depressed below skin level.
- source_word: כֵהָה
  chosen: faded
  alternatives:
  - dim
  - dull
  - pale
  lexicon: HALOT
  rationale: The term indicates that the lesion's appearance is weak or dull rather
    than vivid. 'Faded' is clear modern English and fits a skin-mark context better
    than the more wooden 'dim'.
- source_word: וְהִסְגִּירוֹ
  chosen: the priest shall isolate him
  alternatives:
  - the priest shall quarantine him
  - the priest shall shut him up
  - the priest shall confine him
  lexicon: HALOT
  rationale: The verb means to shut up/confine for observation. 'Isolate' communicates
    the ritual-medical procedure in readable modern English without importing modern
    public-health terminology too strongly, though 'quarantine' is a plausible contextual
    alternative.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Standard literal rendering.
- source_word: יִרְאֶנָּה
  chosen: examines it
  alternatives:
  - sees it
  - looks at it
  lexicon: HALOT
  rationale: Although the verb is literally 'see,' in priestly inspection contexts
    'examines' accurately conveys the formal diagnostic action.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and if indeed
  - and look
  lexicon: HALOT
  rationale: Retains the discourse marker that draws attention to the inspection result.
    'Behold' is slightly elevated but still understandable and preserves the Hebrew's
    observational force.
