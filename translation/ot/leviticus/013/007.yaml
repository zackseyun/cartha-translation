id: LEV.13.7
reference: Leviticus 13:7
source:
  edition: WLC
  text: וְ/אִם פָּשֹׂ֨ה תִפְשֶׂ֤ה הַ/מִּסְפַּ֨חַת֙ בָּ/ע֔וֹר אַחֲרֵ֧י הֵרָאֹת֛/וֹ
    אֶל הַ/כֹּהֵ֖ן לְ/טָהֳרָת֑/וֹ וְ/נִרְאָ֥ה שֵׁנִ֖ית אֶל הַ/כֹּהֵֽן־־־׃
translation:
  text: But if the scaly eruption does indeed spread on the skin after he has shown
    himself to the priest for his cleansing, then he shall appear before the priest
    a second time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the eruption,' 'the rash,' or traditionally 'the scab.' The Hebrew term
      refers to a superficial skin condition under examination.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew intensifies the verb: ''if the eruption surely/indeed spreads.'''
    reason: lexical_alternative
  - marker: c
    text: '''For his cleansing'' refers to the process or purpose of being examined
      with a view to being declared clean.'
    reason: cultural_note
lexical_decisions:
- source_word: פָּשֹׂה תִפְשֶׂה
  chosen: does indeed spread
  alternatives:
  - spreads further
  - keeps spreading
  - surely spreads
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb פשה, indicating
    emphatic or certain spreading. 'Does indeed spread' preserves the emphasis without
    sounding wooden.
- source_word: הַמִּסְפַּחַת
  chosen: the scaly eruption
  alternatives:
  - the scab
  - the eruption
  - the rash
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a superficial skin condition under
    priestly examination. 'Scaly eruption' is more precise and less misleading than
    'scab,' which in modern English suggests a healing wound.
- source_word: בָּעוֹר
  chosen: on the skin
  alternatives:
  - in the skin
  - on his skin
  lexicon: HALOT
  rationale: The phrase refers to the location of the condition. 'On the skin' is
    idiomatic English and fits the diagnostic context. The Hebrew lacks an explicit
    possessive here, so 'the skin' is preferable to 'his skin.'
- source_word: אַחֲרֵי הֵרָאֹתוֹ
  chosen: after he has shown himself
  alternatives:
  - after he has appeared
  - after he has been seen
  lexicon: HALOT
  rationale: The Niphal infinitive construct of ראה here is reflexive/passive in sense
    within a priestly inspection context. 'Shown himself' communicates the procedural
    act of presenting oneself for examination.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest / before the priest
  alternatives:
  - unto the priest
  lexicon: HALOT
  rationale: The preposition marks movement/presentation to the examining priest.
    Rendering once as 'to the priest' and later as 'before the priest' avoids awkward
    repetition while preserving the sense.
- source_word: לְטָהֳרָתוֹ
  chosen: for his cleansing
  alternatives:
  - for his purification
  - for his being pronounced clean
  lexicon: HALOT
  rationale: In Leviticus 13 the issue is ritual cleanness as determined by priestly
    inspection. 'For his cleansing' is readable modern English and can include the
    declarative/priestly aspect without over-specifying.
- source_word: וְנִרְאָה שֵׁנִית
  chosen: then he shall appear ... a second time
  alternatives:
  - and he shall be seen again
  - and he shall present himself again
  lexicon: HALOT
  rationale: The Niphal perfect with vav in this legal context carries an instruction/result
    sense. 'He shall appear ... a second time' expresses the required renewed examination
    clearly in English.
