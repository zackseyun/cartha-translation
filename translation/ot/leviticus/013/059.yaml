id: LEV.13.59
reference: Leviticus 13:59
source:
  edition: WLC
  text: זֹ֠את תּוֹרַ֨ת נֶֽגַע צָרַ֜עַת בֶּ֥גֶד הַ/צֶּ֣מֶר א֣וֹ הַ/פִּשְׁתִּ֗ים א֤וֹ
    הַ/שְּׁתִי֙ א֣וֹ הָ/עֵ֔רֶב א֖וֹ כָּל כְּלִי ע֑וֹר לְ/טַהֲר֖/וֹ א֥וֹ לְ/טַמְּאֽ/וֹ־׀־־׃פ
translation:
  text: This is the law for an outbreak of skin disease in a wool garment or a linen
    garment, or in the warp or the woof, or in any leather article, for pronouncing
    it clean or pronouncing it unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the weft' for 'the woof'; both refer to the crosswise threads in woven
      fabric, paired with 'warp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  chosen: the law for
  alternatives:
  - the instruction for
  - the regulation for
  lexicon: HALOT
  rationale: תּוֹרָה here introduces the governing rule/procedure for the preceding
    case law. 'Law' is concise and traditional, while 'for' reflects the construct
    relationship with what follows.
- source_word: נֶגַע
  chosen: outbreak
  alternatives:
  - affliction
  - plague
  - mark
  lexicon: HALOT
  rationale: In Leviticus 13, נֶגַע denotes a visible affected spot or case of contamination.
    'Outbreak' fits the material-object context better than 'plague' in modern English
    and avoids overstating epidemic sense.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprous disease
  - defiling disease
  - leprosy
  lexicon: HALOT
  rationale: The term does not correspond neatly to modern Hansen's disease and in
    this chapter extends even to garments and leather. 'Skin disease' avoids misleading
    medical specificity while preserving the broader ritual-impurity category. Because
    the phrase modifies garments here, the English keeps the conventional label from
    the chapter's subject rather than importing a modern diagnosis.
- source_word: בֶּגֶד הַצֶּמֶר
  chosen: a wool garment
  alternatives:
  - the woolen garment
  - a garment of wool
  lexicon: HALOT
  rationale: The construct phrase refers to a garment made of wool. Indefinite English
    reads naturally in this summary statement.
- source_word: הַפִּשְׁתִּים
  chosen: a linen garment
  alternatives:
  - the linen garment
  - a garment of flax
  lexicon: HALOT
  rationale: Though the noun is literally 'flax/linen,' in parallel with 'wool garment'
    the sense is a garment made of linen. Supplying 'garment' is warranted by the
    parallel structure and by the preceding context.
- source_word: הַשְּׁתִי
  chosen: the warp
  alternatives:
  - warp threads
  lexicon: HALOT
  rationale: Technical textile term for the longitudinal threads in weaving. 'Warp'
    is the standard concise English equivalent.
- source_word: הָעֵרֶב
  chosen: the woof
  alternatives:
  - the weft
  - cross-threading
  lexicon: HALOT
  rationale: Technical textile term paired with 'warp.' 'Woof' is a traditional rendering;
    'weft' is a modern alternative. 'Woof' preserves the established pairing 'warp
    and woof,' though the alternative is worth preserving in a footnote for readability.
- source_word: כָּל כְּלִי עוֹר
  chosen: any leather article
  alternatives:
  - any leather item
  - any vessel of skin
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement, article, or object. 'Leather
    article' is natural modern English and broad enough for the ritual context.
- source_word: לְטַהֲרוֹ
  chosen: for pronouncing it clean
  alternatives:
  - for declaring it clean
  - to cleanse it
  lexicon: HALOT
  rationale: In priestly legal context, the infinitive with suffix refers to the priestly
    determination of status, not necessarily the act of physically cleaning. 'Pronouncing
    it clean' makes the juridical/ritual force explicit.
- source_word: לְטַמְּאוֹ
  chosen: or pronouncing it unclean
  alternatives:
  - or declaring it unclean
  - or making it unclean
  lexicon: HALOT
  rationale: As with לְטַהֲרוֹ, the context is priestly adjudication of ritual status.
    'Pronouncing it unclean' best captures that function.
