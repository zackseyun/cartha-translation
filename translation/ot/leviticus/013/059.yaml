theological_decisions:
- issue: Rendering צָרַעַת in a context involving garments and leather
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling disease
  - leprous disease
  rationale: The Hebrew term in Leviticus covers a broader ritual phenomenon than
    modern clinical leprosy and can apply to objects as well as persons. Using 'skin
    disease' avoids anachronistic medical precision while maintaining continuity with
    the chapter's broader discussion. No doctrinally contested term from DOCTRINE.md
    is involved, but the choice preserves textual accuracy over tradition-driven wording.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
