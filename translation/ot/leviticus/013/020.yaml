theological_decisions:
- issue: Rendering of צָרַעַת in Levitical purity law
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  rationale: The Hebrew term covers a broader set of conditions than modern leprosy/Hansen's
    disease. Using 'skin disease' avoids importing anachronistic medical assumptions
    while preserving the ritual-diagnostic context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
