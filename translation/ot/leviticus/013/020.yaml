id: LEV.13.20
reference: Leviticus 13:20
source:
  edition: WLC
  text: וְ/רָאָ֣ה הַ/כֹּהֵ֗ן וְ/הִנֵּ֤ה מַרְאֶ֨/הָ֙ שָׁפָ֣ל מִן הָ/ע֔וֹר וּ/שְׂעָרָ֖/הּ
    הָפַ֣ךְ לָבָ֑ן וְ/טִמְּא֧/וֹ הַ/כֹּהֵ֛ן נֶֽגַע צָרַ֥עַת הִ֖וא בַּ/שְּׁחִ֥ין פָּרָֽחָה־־׃
translation:
  text: And the priest shall examine it, and behold, its appearance is deeper than
    the skin, and its hair has turned white; then the priest shall pronounce him unclean.
    It is an outbreak of a skin disease; it has broken out in the boil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת, traditionally 'leprosy'; in Leviticus this term likely refers
      more broadly to a range of serious skin conditions rather than specifically
      modern Hansen's disease.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - looks
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, ראה commonly carries the sense of inspecting/examining
    rather than mere visual perception. 'Shall examine' fits the procedural setting.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and if indeed
  lexicon: HALOT
  rationale: Retains the discourse marker that draws attention to the diagnostic signs.
    'Behold' is slightly formal but still readable and preserves the observational
    force.
- source_word: מַרְאֶהָ שָׁפָל מִן הָעוֹר
  chosen: its appearance is deeper than the skin
  alternatives:
  - its appearance is lower than the skin
  - it appears sunken below the skin
  lexicon: HALOT
  rationale: The idiom describes a lesion appearing depressed beneath the surrounding
    skin. 'Deeper than the skin' is the conventional and clear English rendering,
    balancing literal form and intelligibility.
- source_word: וּשְׂעָרָהּ הָפַךְ לָבָן
  chosen: its hair has turned white
  alternatives:
  - the hair in it has turned white
  - its hair turned white
  lexicon: HALOT
  rationale: Refers to hair associated with the affected spot. 'Its hair' is a natural
    rendering of the feminine suffix referring to the lesion/affected area.
- source_word: וְטִמְּאוֹ
  chosen: shall pronounce him unclean
  alternatives:
  - shall make him unclean
  - shall declare him unclean
  lexicon: HALOT
  rationale: In Levitical purity legislation, the priest does not causatively make
    the person unclean but renders an authoritative diagnosis. 'Pronounce him unclean'
    best captures the juridical-ritual function.
- source_word: נֶגַע צָרַעַת
  chosen: an outbreak of a skin disease
  alternatives:
  - a plague of leprosy
  - a diseased infection
  lexicon: HALOT
  rationale: צָרַעַת in Leviticus does not map neatly onto modern Hansen's disease.
    To avoid misleading medical specificity, 'skin disease' is used, with 'outbreak'
    for נגע in this diagnostic context.
- source_word: בַּשְּׁחִין
  chosen: in the boil
  alternatives:
  - in the inflammation
  - in the sore
  lexicon: HALOT
  rationale: שְׁחִין denotes a boil or inflamed sore. 'Boil' is concise and standard
    in this context.
- source_word: פָּרָחָה
  chosen: it has broken out
  alternatives:
  - it has spread
  - it has erupted
  lexicon: HALOT
  rationale: The verb literally denotes breaking out/sprouting forth. Here it refers
    to the disease manifesting in the boil, not necessarily broad spreading across
    the body.
