id: LEV.13.48
reference: Leviticus 13:48
source:
  edition: WLC
  text: א֤וֹ בִֽ/שְׁתִי֙ א֣וֹ בְ/עֵ֔רֶב לַ/פִּשְׁתִּ֖ים וְ/לַ/צָּ֑מֶר א֣וֹ בְ/ע֔וֹר
    א֖וֹ בְּ/כָל מְלֶ֥אכֶת עֽוֹר־׃
translation:
  text: or in the warp or in the woof of the linen or of the wool, or in leather,
    or in any article made of leather—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weft' instead of 'woof.' The Hebrew term refers to the crosswise threads
      in woven fabric.
    reason: lexical_alternative
  - marker: b
    text: '''Linen'' renders a term that can more literally denote ''flax''; here
      it likely refers to linen material made from flax.'
    reason: lexical_alternative
  - marker: c
    text: Or 'any leather item' or more formally 'any work of leather.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתִי
  chosen: warp
  alternatives:
  - warp threads
  lexicon: HALOT
  rationale: In textile terminology, שְׁתִי refers to the longitudinal threads in
    weaving. 'Warp' is the standard concise English equivalent and pairs naturally
    with עֵרֶב.
- source_word: עֵרֶב
  chosen: woof
  alternatives:
  - weft
  lexicon: HALOT
  rationale: This term denotes the crosswise threads woven through the warp. 'Woof'
    is a traditional but still intelligible counterpart to 'warp'; 'weft' is also
    possible. Chosen for the familiar fixed pair 'warp and woof.'
- source_word: לַפִּשְׁתִּים
  chosen: of the linen
  alternatives:
  - of flax
  lexicon: HALOT
  rationale: Though the noun can denote flax, in this context of woven materials under
    inspection it most naturally refers to linen fabric made from flax. 'Linen' communicates
    the material in idiomatic English.
- source_word: וְלַצָּמֶר
  chosen: or of the wool
  alternatives:
  - or of wool
  lexicon: HALOT
  rationale: צֶמֶר means wool. Including the article yields natural coordination with
    'the linen' and reflects the Hebrew specification of material classes.
- source_word: עוֹר
  chosen: leather
  alternatives:
  - skin
  - hide
  lexicon: HALOT
  rationale: In impurity legislation, עוֹר commonly refers to processed animal skin
    as a usable material. 'Leather' best fits the context of objects and manufactured
    goods; 'skin' or 'hide' could suggest an unprocessed carcass.
- source_word: בְּכָל מְלֶאכֶת עוֹר
  chosen: in any article made of leather
  alternatives:
  - in any work of leather
  - in any leather item
  lexicon: HALOT
  rationale: מְלָאכָה here denotes a made object or crafted product rather than abstract
    labor. The phrase refers to any manufactured leather item. 'Article made of leather'
    is clear modern English while staying close to the Hebrew sense.
- source_word: אוֹ ... אוֹ
  chosen: or ... or
  lexicon: HALOT
  rationale: The repeated אוֹ marks a list of alternative material locations or media
    in which the infection may appear. Preserving the repetition reflects the Hebrew
    structure.
