theological_decisions:
- issue: Rendering צָרַעַת in Levitical purity legislation
  chosen_reading: a skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  - tzaraath
  rationale: The term traditionally rendered 'leprosy' refers more broadly in Leviticus
    to a range of conditions and should not be equated directly with modern leprosy.
    The chosen rendering avoids medical anachronism while preserving the ritual-diagnostic
    setting. No doctrinal controversy is at stake, but the translation should not
    import a false specificity the Hebrew does not require.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Readable modern English, not archaic or academic.'
