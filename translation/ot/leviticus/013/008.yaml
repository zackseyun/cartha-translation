id: LEV.13.8
reference: Leviticus 13:8
source:
  edition: WLC
  text: וְ/רָאָה֙ הַ/כֹּהֵ֔ן וְ/הִנֵּ֛ה פָּשְׂתָ֥ה הַ/מִּסְפַּ֖חַת בָּ/ע֑וֹר וְ/טִמְּא֥/וֹ
    הַ/כֹּהֵ֖ן צָרַ֥עַת הִֽוא׃פ
translation:
  text: And the priest shall examine him, and if the scaly eruption has spread on
    the skin, the priest shall pronounce him unclean; it is a skin disease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tsaraʿat, traditionally rendered 'leprosy'; the term in Leviticus
      likely covers a broader range of serious skin conditions than modern leprosy
      alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - looks
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, ראה often carries the sense of inspecting
    or examining rather than merely seeing. 'Shall examine' communicates the formal
    evaluative action of the priest.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כהן in Levitical legal material; the priest is
    the authorized examiner and declarer of status.
- source_word: וְהִנֵּה
  chosen: if
  alternatives:
  - and behold
  - behold
  lexicon: HALOT
  rationale: Although literally 'and behold,' in this procedural context it introduces
    the condition discovered on examination. 'If' gives natural English while preserving
    the conditional force implied by the inspection formula.
- source_word: פָּשְׂתָה
  chosen: has spread
  alternatives:
  - has extended
  - has broken out further
  lexicon: HALOT
  rationale: The verb denotes spreading or extending, a key diagnostic criterion in
    this chapter. 'Has spread' is clear and idiomatic.
- source_word: הַמִּסְפַּחַת
  chosen: the scaly eruption
  alternatives:
  - the scab
  - the eruption
  - the rash
  lexicon: HALOT
  rationale: The noun refers to a superficial skin affliction under priestly examination.
    'Scaly eruption' is more precise and less misleading than 'scab,' which can sound
    too narrow in modern English.
- source_word: בָּעוֹר
  chosen: on the skin
  alternatives:
  - in the skin
  - on the flesh
  lexicon: HALOT
  rationale: עור is 'skin/hide.' 'On the skin' is the most natural English expression
    for the location of the spreading condition.
- source_word: וְטִמְּאוֹ
  chosen: shall pronounce him unclean
  alternatives:
  - shall make him unclean
  - shall declare him unclean
  lexicon: HALOT
  rationale: In Levitical purity law, the priest does not causally make the person
    unclean but authoritatively declares or pronounces the status. 'Pronounce him
    unclean' best captures the juridical function.
- source_word: צָרַעַת
  chosen: a skin disease
  alternatives:
  - leprosy
  - a defiling skin disease
  - tzaraath
  lexicon: HALOT
  rationale: The Hebrew term does not map neatly onto modern Hansen's disease ('leprosy').
    'A skin disease' avoids anachronism while fitting the immediate context of visible
    skin affliction. The predicate construction with הִוא is represented as 'it is
    a skin disease.'
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: 'The feminine pronoun refers back to the condition and forms a simple
    identifying clause: ''it is a skin disease.'''
