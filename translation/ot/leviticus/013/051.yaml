theological_decisions:
- issue: Rendering of צָרַעַת in Levitical purity law
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling disease
  rationale: The Hebrew term does not map neatly onto modern Hansen's disease and
    in this chapter applies even to garments and leather. Therefore a non-medically
    specific rendering is preferable. 'Skin disease' is retained in the main text
    for accessibility, while the broader ritual-impurity sense is noted here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
