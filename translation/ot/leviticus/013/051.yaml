id: LEV.13.51
reference: Leviticus 13:51
source:
  edition: WLC
  text: וְ/רָאָ֨ה אֶת הַ/נֶּ֜גַע בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י כִּֽי פָשָׂ֤ה הַ/נֶּ֨גַע֙
    בַּ֠/בֶּגֶד אֽוֹ בַ/שְּׁתִ֤י אֽוֹ בָ/עֵ֨רֶב֙ א֣וֹ בָ/ע֔וֹר לְ/כֹ֛ל אֲשֶׁר יֵעָשֶׂ֥ה
    הָ/ע֖וֹר לִ/מְלָאכָ֑ה צָרַ֧עַת מַמְאֶ֛רֶת הַ/נֶּ֖גַע טָמֵ֥א הֽוּא־־־־־׃
translation:
  text: On the seventh day he shall examine the infection, and if the infection has
    spread in the garment, or in the warp, or in the woof, or in the leather, in anything
    for which leather is used as workmanship, the infection is a destructive skin
    disease; it is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tsaraʿat, traditionally rendered 'leprosy,' but the term in Leviticus
      covers a broader range of impurity conditions and can apply even to garments
      and leather.
    reason: lexical_alternative
  - marker: b
    text: Or 'weft' for 'woof.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in any article made of leather.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: he shall examine
  alternatives:
  - he shall see
  - he shall inspect
  lexicon: HALOT
  rationale: In priestly inspection contexts, ראה often carries the sense of examining/inspecting
    rather than mere visual perception. 'Examine' gives the procedural force in clear
    English.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the plague
  - the diseased spot
  - the affliction
  lexicon: HALOT
  rationale: נגע in Leviticus 13 refers to an affected spot or outbreak associated
    with ritual impurity. 'Infection' is readable modern English and avoids the misleadingly
    broad or archaic feel of 'plague,' while still indicating a spreading condition.
- source_word: פָשָׂה
  chosen: has spread
  alternatives:
  - has extended
  - has spread further
  lexicon: HALOT
  rationale: The verb denotes spreading or extending. 'Has spread' is the most natural
    English rendering in this inspection context.
- source_word: בֶּגֶד
  chosen: garment
  alternatives:
  - cloth
  - clothing
  lexicon: HALOT
  rationale: בגד commonly means garment or article of clothing. 'Garment' fits the
    legal-register context and remains natural.
- source_word: שְׁתִי
  chosen: warp
  alternatives:
  - warp threads
  lexicon: HALOT
  rationale: This technical textile term refers to the longitudinal threads in weaving.
    'Warp' is the standard concise rendering.
- source_word: עֵרֶב
  chosen: woof
  alternatives:
  - weft
  - cross-thread
  lexicon: HALOT
  rationale: The term denotes the transverse woven threads. 'Woof' is traditional
    and pairs clearly with 'warp'; 'weft' is also possible, but 'warp and woof' is
    an established English collocation.
- source_word: עוֹר
  chosen: leather
  alternatives:
  - skin
  - hide
  lexicon: HALOT
  rationale: In this context of processed material used for making items, 'leather'
    better reflects the practical sense than 'skin' or 'hide'.
- source_word: לְכֹל אֲשֶׁר יֵעָשֶׂה הָעוֹר לִמְלָאכָה
  chosen: in anything for which leather is used as workmanship
  alternatives:
  - in any article made of leather
  - for any use for which leather is made
  lexicon: HALOT
  rationale: The phrase broadens the scope beyond raw leather to any worked leather
    item. The chosen rendering stays close to the Hebrew structure, though somewhat
    formal, and preserves the legal comprehensiveness of the clause.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprous disease
  - defiling disease
  lexicon: HALOT
  rationale: Though the object here is cloth/leather, the Hebrew term is the same
    technical impurity term used throughout the chapter. 'Skin disease' avoids importing
    the later medical category 'leprosy' while preserving continuity with the chapter's
    terminology.
- source_word: מַמְאֶרֶת
  chosen: destructive
  alternatives:
  - corrosive
  - malignant
  - persistent
  lexicon: HALOT
  rationale: The adjective describes a harmful, consuming, or malignant kind of outbreak.
    'Destructive' communicates the active damaging sense without overmedicalizing.
- source_word: טָמֵא הוּא
  chosen: it is unclean
  alternatives:
  - it is ritually unclean
  - it is impure
  lexicon: HALOT
  rationale: The phrase states ritual impurity status. 'Unclean' is the standard concise
    rendering; the ritual sense is clear from Levitical context.
