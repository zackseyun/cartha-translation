id: LEV.13.28
reference: Leviticus 13:28
source:
  edition: WLC
  text: וְ/אִם תַּחְתֶּי/הָ֩ תַעֲמֹ֨ד הַ/בַּהֶ֜רֶת לֹא פָשְׂתָ֤ה בָ/עוֹר֙ וְ/הִ֣וא
    כֵהָ֔ה שְׂאֵ֥ת הַ/מִּכְוָ֖ה הִ֑וא וְ/טִֽהֲר/וֹ֙ הַ/כֹּהֵ֔ן כִּֽי צָרֶ֥בֶת הַ/מִּכְוָ֖ה
    הִֽוא־־־׃פ
translation:
  text: But if the bright spot remains in its place and has not spread in the skin,
    and it is faded, it is the swelling from the burn, and the priest shall pronounce
    him clean, for it is the scar of the burn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under it' for 'in its place'; the Hebrew idiom literally says the bright
      spot 'stands beneath it,' but the sense in context is that it remains stationary
      rather than spreading.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְתֶּיהָ
  chosen: in its place
  alternatives:
  - under it
  - beneath it
  lexicon: HALOT
  rationale: The idiom with עמד ('stand/remain') is best rendered naturally as 'remain
    in its place' rather than the more literal 'stand under it,' which would be obscure
    in English. The suffix refers back to the prior lesion/burn context.
- source_word: תַעֲמֹד
  chosen: remains
  alternatives:
  - stands
  - stays
  lexicon: HALOT
  rationale: Although literally 'stands,' in this diagnostic context the sense is
    that the bright spot has stayed stationary. 'Remains' communicates the medical-observational
    force in clear English.
- source_word: הַבַּהֶרֶת
  chosen: the bright spot
  alternatives:
  - the bright patch
  - the shiny spot
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a visible bright discoloration associated
    with skin examination. 'Bright spot' is concise and consistent with the context.
- source_word: פָשְׂתָה
  chosen: has spread
  alternatives:
  - has extended
  - has expanded
  lexicon: HALOT
  rationale: The verb is the standard diagnostic term for spreading in the skin disease
    laws. 'Has spread' is the clearest idiomatic rendering.
- source_word: בָעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  lexicon: HALOT
  rationale: The preposition can be rendered 'in' or 'on'; 'in the skin' matches the
    Hebrew closely and suits the diagnostic language used throughout the chapter.
- source_word: כֵהָה
  chosen: faded
  alternatives:
  - dim
  - dull
  lexicon: HALOT
  rationale: The adjective indicates loss of brightness/intensity. 'Faded' is natural
    in English for a skin mark losing prominence.
- source_word: שְׂאֵת
  chosen: the swelling
  alternatives:
  - a swelling
  - raised spot
  - elevation
  lexicon: HALOT
  rationale: This term in Leviticus 13 refers to a raised swelling or elevation on
    the skin. With the following genitive, 'the swelling from the burn' is the most
    straightforward rendering.
- source_word: הַמִּכְוָה
  chosen: the burn
  alternatives:
  - the burn wound
  - the inflammation from burning
  lexicon: HALOT
  rationale: The noun denotes a burn/burn wound. 'Burn' is sufficiently clear and
    avoids overtranslation.
- source_word: וְטִהֲרוֹ
  chosen: the priest shall pronounce him clean
  alternatives:
  - the priest shall declare him clean
  - the priest shall cleanse him
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, the verb means to declare a person ceremonially
    clean, not to cleanse by direct action. 'Pronounce him clean' makes the judicial/priestly
    function explicit.
- source_word: צָרֶבֶת
  chosen: the scar
  alternatives:
  - scar tissue
  - mark
  lexicon: HALOT
  rationale: The term refers to the scar/resulting mark from the burn. 'Scar' is concise
    and natural, while preserving the diagnostic sense.
