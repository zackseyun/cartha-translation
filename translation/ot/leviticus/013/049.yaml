theological_decisions:
- issue: Rendering צָרַעַת in priestly legislation
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  rationale: In Leviticus 13 the condition labeled צָרַעַת can affect textiles and
    leather as well as human skin, so the traditional English 'leprosy' is too narrow
    and medically misleading. A broader rendering preserves the ritual-diagnostic
    category without importing later clinical assumptions.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source plain sense over inherited English inertia.'
