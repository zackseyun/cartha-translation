id: LEV.13.49
reference: Leviticus 13:49
source:
  edition: WLC
  text: וְ/הָיָ֨ה הַ/נֶּ֜גַע יְרַקְרַ֣ק א֣וֹ אֲדַמְדָּ֗ם בַּ/בֶּגֶד֩ א֨וֹ בָ/ע֜וֹר
    אֽוֹ בַ/שְּׁתִ֤י אוֹ בָ/עֵ֨רֶב֙ א֣וֹ בְ/כָל כְּלִי ע֔וֹר נֶ֥גַע צָרַ֖עַת ה֑וּא
    וְ/הָרְאָ֖ה אֶת הַ/כֹּהֵֽן׀־־־־־׃
translation:
  text: And if the spot is greenish or reddish in the garment, or in the leather,
    or in the warp or in the woof, or in any article of leather, it is a diseased
    spot of skin disease, and it shall be shown to the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weft' for 'woof,' the crosswise threads in woven fabric.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'a spot of leprosy.' The Hebrew term refers more broadly to
      a ritual-physical disease category in Leviticus, not specifically to modern
      leprosy.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶּגַע
  chosen: spot
  alternatives:
  - mark
  - plague
  - affliction
  lexicon: HALOT
  rationale: In Leviticus 13 the term refers to a visible affected area on skin, cloth,
    or leather. 'Spot' is natural modern English and fits non-human materials better
    than 'plague' or 'affliction,' while still allowing the technical priestly context
    to stand.
- source_word: יְרַקְרַק
  chosen: greenish
  alternatives:
  - yellowish-green
  - pale green
  lexicon: HALOT
  rationale: The reduplicated adjective indicates a green hue, likely somewhat muted.
    'Greenish' is concise and idiomatic, preserving the approximate color sense without
    over-specifying shade.
- source_word: אֲדַמְדָּם
  chosen: reddish
  alternatives:
  - red
  - pinkish
  lexicon: HALOT
  rationale: The reduplicated form suggests a reddish coloration rather than a pure,
    vivid red. 'Reddish' best reflects the morphology and observational nature of
    the priestly diagnosis.
- source_word: בֶּגֶד
  chosen: garment
  alternatives:
  - cloth
  - clothing
  lexicon: HALOT
  rationale: '''Garment'' is the standard contextual rendering in Leviticus for wearable
    fabric items and matches the surrounding categories of textile and leather objects.'
- source_word: עוֹר
  chosen: leather
  alternatives:
  - skin
  - hide
  lexicon: HALOT
  rationale: Here the reference is to processed material used in objects, not living
    skin. 'Leather' is therefore clearer than 'skin' or 'hide' in this inventory list.
- source_word: שְׁתִי
  chosen: warp
  alternatives:
  - lengthwise threads
  lexicon: HALOT
  rationale: This is the standard textile term for the longitudinal threads in woven
    fabric. 'Warp' preserves the technical distinction present in the Hebrew.
- source_word: עֵרֶב
  chosen: woof
  alternatives:
  - weft
  - crosswise threads
  lexicon: HALOT
  rationale: This term denotes the transverse threads in weaving. 'Woof' is traditional
    and pairs neatly with 'warp'; 'weft' is a viable modern alternative. A footnote
    preserves the alternative for readability.
- source_word: כְּלִי עוֹר
  chosen: article of leather
  alternatives:
  - leather item
  - vessel of leather
  lexicon: HALOT
  rationale: A broad term for an implement or object made of leather. 'Article of
    leather' is natural English and suitably general.
- source_word: נֶגַע צָרַעַת
  chosen: a diseased spot of skin disease
  alternatives:
  - a leprous spot
  - an afflicted spot of leprosy
  lexicon: HALOT
  rationale: צָרַעַת in Leviticus covers a broader ritual-physical condition than
    modern Hansen's disease, and it can affect garments and leather. Therefore 'leprosy'
    is misleading in the main text. 'Skin disease' is accessible and avoids importing
    a modern medical diagnosis, while 'diseased spot' renders the construct naturally.
- source_word: וְהָרְאָה אֶת־הַכֹּהֵן
  chosen: it shall be shown to the priest
  alternatives:
  - he shall show it to the priest
  lexicon: HALOT
  rationale: The Hebrew uses a Hoph'al form ('be shown'), leaving the agent implicit.
    English passive best matches the form and keeps focus on the object under inspection.
