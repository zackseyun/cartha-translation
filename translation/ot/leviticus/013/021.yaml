id: LEV.13.21
reference: Leviticus 13:21
source:
  edition: WLC
  text: וְ/אִ֣ם יִרְאֶ֣/נָּה הַ/כֹּהֵ֗ן וְ/הִנֵּ֤ה אֵֽין בָּ/הּ֙ שֵׂעָ֣ר לָבָ֔ן וּ/שְׁפָלָ֥ה
    אֵינֶ֛/נָּה מִן הָ/ע֖וֹר וְ/הִ֣יא כֵהָ֑ה וְ/הִסְגִּיר֥/וֹ הַ/כֹּהֵ֖ן שִׁבְעַ֥ת
    יָמִֽים׀־־׃
translation:
  text: But if the priest examines it, and behold, there is no white hair in it, and
    it is not deeper than the skin, but it is faded, then the priest shall isolate
    him for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quarantine him for seven days.' The Hebrew verb refers to placing the
      person in isolation for observation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case in contrast with the previous diagnostic
    scenario. 'But if' captures the adversative progression in context while remaining
    natural English.
- source_word: יִרְאֶנָּה
  chosen: examines it
  alternatives:
  - sees it
  - looks at it
  lexicon: HALOT
  rationale: Although the verb is literally 'see,' in priestly inspection contexts
    it denotes examination for diagnosis. 'Examines it' conveys the procedural sense
    without over-paraphrasing.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the officiating examiner in Leviticus 13.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: Preserves the inspection formula and draws attention to the observed
    condition.
- source_word: אֵין בָּהּ שֵׂעָר לָבָן
  chosen: there is no white hair in it
  alternatives:
  - there is no white hair on it
  lexicon: HALOT
  rationale: Directly reflects the Hebrew diagnostic criterion. 'In it' follows the
    feminine referent to the affected spot/eruption.
- source_word: וּשְׁפָלָה אֵינֶנָּה מִן הָעוֹר
  chosen: it is not deeper than the skin
  alternatives:
  - it is not lower than the skin
  - it does not appear deeper than the skin
  lexicon: HALOT
  rationale: The adjective literally means 'low/sunken.' In this dermatological context,
    English idiom is best expressed as 'deeper than the skin,' matching the visual
    criterion of a depressed lesion.
- source_word: וְהִיא כֵהָה
  chosen: but it is faded
  alternatives:
  - and it is dim
  - and it is faint
  - and it is dull
  lexicon: HALOT
  rationale: The term indicates a less vivid or diminished appearance of the mark.
    'Faded' is clear modern English and fits the visual diagnostic context.
- source_word: וְהִסְגִּירוֹ
  chosen: then the priest shall isolate him
  alternatives:
  - shall quarantine him
  - shall shut him up
  lexicon: HALOT
  rationale: The verb denotes placing the person under confinement/observation. 'Isolate'
    is accurate and readable; 'quarantine' is possible but more medically specific
    than the Hebrew requires. The pronominal suffix is masculine singular, referring
    to the person, not the lesion.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  lexicon: HALOT
  rationale: Standard duration phrase.
