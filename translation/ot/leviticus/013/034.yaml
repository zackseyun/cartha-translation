theological_decisions:
- issue: Nature of priestly action in purity law
  chosen_reading: The priest officially declares the person clean rather than effecting
    cleansing by sacramental action.
  alternative_readings:
  - the priest cleanses him
  rationale: The Hebrew טהר in this legal context concerns ritual status adjudication.
    Rendering it as 'pronounce him clean' preserves the text's cultic-judicial function
    and avoids implying that the priest personally heals or mystically purifies the
    condition.
  doctrine_reference: Translation philosophy §1, §3
