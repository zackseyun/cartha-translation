id: LEV.13.34
reference: Leviticus 13:34
source:
  edition: WLC
  text: וְ/רָאָה֩ הַ/כֹּהֵ֨ן אֶת הַ/נֶּ֜תֶק בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י וְ֠/הִנֵּה לֹא
    פָשָׂ֤ה הַ/נֶּ֨תֶק֙ בָּ/ע֔וֹר וּ/מַרְאֵ֕/הוּ אֵינֶ֥/נּוּ עָמֹ֖ק מִן הָ/ע֑וֹר וְ/טִהַ֤ר
    אֹת/וֹ֙ הַ/כֹּהֵ֔ן וְ/כִבֶּ֥ס בְּגָדָ֖י/ו וְ/טָהֵֽר־־־׃
translation:
  text: Then the priest shall examine the scaly infection on the seventh day, and
    if the scaly infection has not spread in the skin and its appearance is not deeper
    than the skin, the priest shall pronounce him clean. He shall wash his clothes
    and be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'itch' or the traditional 'scall' for the specific skin condition denoted
      by Hebrew neṭeq.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not deeper than the skin,' a standard priestly criterion indicating
      the affected area does not appear sunken below the surrounding skin.
    reason: cultural_note
  - marker: c
    text: Hebrew 'the priest shall make him clean' here means an official declaration
      of clean status, not that the priest medically cures the condition.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶתֶק
  chosen: scaly infection
  alternatives:
  - itch
  - scall
  - skin disease
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a specific scalp/beard skin condition
    under priestly inspection, not a generic wound. 'Scaly infection' communicates
    a visible dermatological condition in readable modern English without importing
    a precise modern diagnosis. 'Scall' is traditional but archaic; 'itch' is too
    subjective; 'skin disease' is broader than the term's likely reference.
- source_word: פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not broken out further
  lexicon: HALOT
  rationale: The verb in this diagnostic context refers to the condition spreading
    over the skin. 'Has not spread' is idiomatic and precise.
- source_word: בָּעוֹר
  chosen: in the skin
  alternatives:
  - on the skin
  lexicon: HALOT
  rationale: The preposition with עור in this chapter commonly describes spread within/through
    the skin area. 'In the skin' follows the Hebrew closely and matches the diagnostic
    idiom used throughout the passage.
- source_word: מַרְאֵהוּ
  chosen: its appearance
  alternatives:
  - its look
  - its sight
  lexicon: HALOT
  rationale: Refers to the visible appearance of the affected area. 'Its appearance'
    is natural and suitably formal.
- source_word: עָמֹק מִן הָעוֹר
  chosen: deeper than the skin
  alternatives:
  - lower than the skin
  - deeper than the surface of the skin
  lexicon: HALOT
  rationale: This recurring priestly criterion describes whether the lesion appears
    depressed below the surrounding skin level. 'Deeper than the skin' is the standard
    clear English rendering.
- source_word: וְטִהַר אֹתוֹ הַכֹּהֵן
  chosen: the priest shall pronounce him clean
  alternatives:
  - the priest shall cleanse him
  - the priest shall declare him clean
  lexicon: HALOT
  rationale: In priestly purity legislation, the priest does not medically cure but
    renders an official purity verdict. 'Pronounce him clean' captures the declarative/judicial
    force better than 'cleanse him.'
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: He shall wash his clothes
  alternatives:
  - He shall wash his garments
  lexicon: HALOT
  rationale: בגדיו means his clothing/garments. 'Clothes' is more readable modern
    English while preserving the ritual action.
- source_word: וְטָהֵר
  chosen: and be clean
  alternatives:
  - and he shall be clean
  - and he will be clean
  lexicon: HALOT
  rationale: The final verb states the resulting clean status after washing. 'Be clean'
    reads smoothly in English after the preceding modal construction while preserving
    the legal-ritual result.
- source_word: וְהִנֵּה
  chosen: and if
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: Although literally 'behold,' in this inspection formula it introduces
    the observed condition. Rendering it as 'and if' makes the conditional sense explicit
    in natural English without loss of meaning.
- source_word: וְרָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - shall inspect
  lexicon: HALOT
  rationale: In context the priest is performing an official inspection, not merely
    seeing. 'Examine' conveys the procedural sense.
