theological_decisions:
- issue: Ritual status terminology in Levitical impurity legislation
  chosen_reading: clean
  alternative_readings:
  - pure
  rationale: The verse addresses diagnostic impurity/cleanness, not moral innocence.
    'Clean' preserves the cultic category without importing ethical overtones.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
