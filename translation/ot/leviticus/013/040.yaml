id: LEV.13.40
reference: Leviticus 13:40
source:
  edition: WLC
  text: וְ/אִ֕ישׁ כִּ֥י יִמָּרֵ֖ט רֹאשׁ֑/וֹ קֵרֵ֥חַ ה֖וּא טָה֥וֹר הֽוּא׃
translation:
  text: If a man loses the hair of his head, he is bald; he is clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If a man becomes bald on his head.' The Hebrew verb can denote becoming
      bare or being stripped of hair; the main text preserves the verbal distinction
      before 'he is bald.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine singular and here introduces
    a case law example. Per the translation philosophy's gender-accurate principle,
    'a man' best matches the source form and likely referent in this bodily description
    law, rather than neutralizing to 'a person'.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this legal/diagnostic context, כִּי introduces a conditional case.
    'If' is the most natural English rendering for the protasis.
- source_word: יִמָּרֵט
  chosen: loses the hair
  alternatives:
  - becomes bald
  - has his hair pulled out
  lexicon: HALOT
  rationale: The Niphal of מרט denotes being made bare/plucked, here idiomatically
    referring to loss of hair from the head. 'Loses the hair' preserves the verbal
    idea without over-specifying cause. 'Becomes bald' is possible but would collapse
    the following predicate קֵרֵחַ ('bald') into the verb.
- source_word: רֹאשׁוֹ
  chosen: of his head
  alternatives:
  - his head
  lexicon: HALOT
  rationale: Rendered explicitly as 'of his head' to reflect the construct relationship
    and to keep the focus on hair loss from the head.
- source_word: קֵרֵחַ
  chosen: bald
  alternatives:
  - bald-headed
  lexicon: HALOT
  rationale: This adjective states the resulting condition. 'Bald' is clear, natural
    modern English.
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: In Leviticus 13 the concern is ritual status in relation to skin disease
    examination, so 'clean' is the standard and contextually precise rendering, rather
    than the broader 'pure'.
- source_word: הוּא ... הוּא
  chosen: he is ... he is
  alternatives:
  - he is ...
  lexicon: HALOT
  rationale: 'The repeated pronoun gives emphatic predication in Hebrew. English reflects
    this naturally by retaining both clauses: ''he is bald; he is clean.'''
