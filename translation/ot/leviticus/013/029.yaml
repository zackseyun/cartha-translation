id: LEV.13.29
reference: Leviticus 13:29
source:
  edition: WLC
  text: וְ/אִישׁ֙ א֣וֹ אִשָּׁ֔ה כִּֽי יִהְיֶ֥ה ב֖/וֹ נָ֑גַע בְּ/רֹ֖אשׁ א֥וֹ בְ/זָקָֽן־׃
translation:
  text: When a man or a woman has an infection on the head or on the beard,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'affliction,' 'disease,' or 'mark'; Hebrew negaʿ is a broad term in Leviticus
      for a visible lesion or outbreak examined by the priest.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'head'; possibly more specifically the scalp in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ ... אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - a man or woman
  - someone, whether man or woman
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes individually. Following the gender-accurate
    principle, the translation preserves both rather than collapsing to a generic
    'person.'
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: In this legal/procedural context, כִּי introduces a case condition. 'When'
    reads naturally in English case law style while preserving the conditional sense.
- source_word: יִהְיֶה בּוֹ
  chosen: has
  alternatives:
  - there is in him/her
  - there is on him/her
  lexicon: HALOT
  rationale: Literally 'there is in/for him,' but idiomatic English in this diagnostic
    context is 'has.' This is a standard optimal-equivalence adjustment without loss
    of meaning.
- source_word: נָגַע
  chosen: infection
  alternatives:
  - affliction
  - disease
  - plague
  - mark
  lexicon: HALOT
  rationale: In Leviticus 13, נגע refers broadly to a visible skin-related affliction
    under priestly examination, not necessarily a specific modern medical diagnosis.
    'Infection' is accessible modern English and fits the immediate context of scalp/facial
    lesions, while avoiding the archaic or overly broad 'plague.'
- source_word: בְּ/רֹאשׁ
  chosen: on the head
  alternatives:
  - on the scalp
  lexicon: HALOT
  rationale: The Hebrew says 'on the head.' 'Scalp' is more specific and contextually
    plausible, but the source term is broader, so 'head' is retained in the main text.
- source_word: בְ/זָקָן
  chosen: on the beard
  alternatives:
  - in the beard
  lexicon: HALOT
  rationale: זָקָן means 'beard.' Although only males ordinarily have beards, the
    law's opening formula covers either sex and then specifies the affected area.
    'On the beard' is the most natural English rendering of the prepositional phrase.
