id: LEV.13.12
reference: Leviticus 13:12
source:
  edition: WLC
  text: וְ/אִם פָּר֨וֹחַ תִּפְרַ֤ח הַ/צָּרַ֨עַת֙ בָּ/ע֔וֹר וְ/כִסְּתָ֣ה הַ/צָּרַ֗עַת
    אֵ֚ת כָּל ע֣וֹר הַ/נֶּ֔גַע מֵ/רֹאשׁ֖/וֹ וְ/עַד רַגְלָ֑י/ו לְ/כָל מַרְאֵ֖ה עֵינֵ֥י
    הַ/כֹּהֵֽן־־־־׃
translation:
  text: And if the skin disease breaks out all over the skin, and the skin disease
    covers all the skin of the affected person from his head to his feet, as far as
    the priest can see,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת (tzaraath) refers to a range of ritual skin afflictions in
      Leviticus and should not be equated too narrowly with modern leprosy (Hansen's
      disease).
    reason: cultural_note
  - marker: b
    text: Or, more literally, 'all the skin of the lesion.' The Hebrew expression
      refers to the person's skin as affected by the outbreak.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּר֨וֹחַ תִּפְרַ֤ח
  chosen: breaks out all over
  alternatives:
  - surely spreads
  - breaks out extensively
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea
    of פרח. In context of a skin condition, English idiom is best captured by 'breaks
    out all over,' which preserves the sense of extensive eruption without awkward
    literalism.
- source_word: הַצָּרַעַת
  chosen: the skin disease
  alternatives:
  - the leprous disease
  - the defiling skin disease
  - tzaraath
  lexicon: HALOT
  rationale: צָרַעַת in Leviticus does not map neatly onto modern Hansen's disease
    ('leprosy'). 'Skin disease' is the clearest accessible rendering and avoids misleading
    medical specificity. The article is represented by 'the.'
- source_word: בָּעוֹר
  chosen: over the skin
  alternatives:
  - in the skin
  - on the skin
  lexicon: HALOT
  rationale: The preposition ב with עור here describes the bodily surface affected
    by the condition. 'Over the skin' fits the spreading imagery in English better
    than the more wooden 'in the skin.'
- source_word: וְכִסְּתָה
  chosen: covers
  alternatives:
  - has covered
  - conceals
  lexicon: HALOT
  rationale: 'The perfect with vav in this conditional description is naturally rendered
    with present sense in English sequence: ''and ... covers.'' ''Covers'' expresses
    the extent of spread.'
- source_word: אֵת כָּל עוֹר הַנֶּגַע
  chosen: all the skin of the affected person
  alternatives:
  - all the skin of the infection
  - all the skin of the diseased area
  lexicon: HALOT
  rationale: 'Literally, ''all the skin of the lesion/affliction.'' In English, ''skin
    of the affected person'' communicates the intended referent: the person''s skin
    as affected by the condition. A more literal ''skin of the lesion'' would be obscure
    or misleading.'
- source_word: מֵרֹאשׁוֹ וְעַד רַגְלָיו
  chosen: from his head to his feet
  alternatives:
  - from the top of his head to the soles of his feet
  lexicon: HALOT
  rationale: This is a standard merism for total bodily extent. 'From his head to
    his feet' is natural, sufficiently literal, and preserves the masculine singular
    reference in the source.
- source_word: לְכָל מַרְאֵה עֵינֵי הַכֹּהֵן
  chosen: as far as the priest can see
  alternatives:
  - to all that appears to the priest's eyes
  - everywhere visible to the priest
  lexicon: HALOT
  rationale: Literally, 'for all the sight of the eyes of the priest,' an idiom referring
    to the full extent visible to the priest on examination. 'As far as the priest
    can see' is idiomatic modern English that preserves the observational scope.
