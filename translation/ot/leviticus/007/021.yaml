theological_decisions:
- issue: Meaning of the sanction וְנִכְרְתָה ... מֵעַמֶּיהָ
  chosen_reading: retain the formal expression 'shall be cut off from his people' without specifying whether this is death, excommunication, or divine judgment
  alternative_readings:
  - shall be excluded from his people
  - shall be put to death
  rationale: The Hebrew covenant formula is intentionally preserved rather than interpreted beyond the text. Leviticus uses 'cut off' in ways that may involve different mechanisms of judgment; translating more specifically would resolve an ambiguity the source leaves open.
  doctrine_reference: Preserve theological tension rather than resolve it.
