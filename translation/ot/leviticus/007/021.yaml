id: LEV.7.21
reference: Leviticus 7:21
source:
  edition: WLC
  text: וְ/נֶ֜פֶשׁ כִּֽי תִגַּ֣ע בְּ/כָל טָמֵ֗א בְּ/טֻמְאַ֤ת אָדָם֙ א֣וֹ בִּ/בְהֵמָ֣ה טְמֵאָ֗ה א֚וֹ בְּ/כָל שֶׁ֣קֶץ טָמֵ֔א וְ/אָכַ֛ל מִ/בְּשַׂר זֶ֥בַח הַ/שְּׁלָמִ֖ים אֲשֶׁ֣ר לַ/יהוָ֑ה וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מֵ/עַמֶּֽי/הָ־־׀־־׃פ
translation:
  text: And if a person touches anything unclean—whether human uncleanness, or an unclean animal, or any unclean detestable thing—and eats some of the flesh of the sacrifice of peace offerings that belongs to Yahweh, that person shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among his people.' The Hebrew has 'from her people' because 'person' (nephesh) is grammatically feminine, not because the law applies only to a woman.
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' is a covenant-sanction formula. It may imply exclusion or divine judgment; the Hebrew does not specify the exact mode here.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ often refers to an individual person rather than the immaterial 'soul.' 'Person' is natural English and fits the sanction formula.
- source_word: תִגַּע
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: The verb נגע commonly means 'touch' or 'come into contact with.' 'Touches' is sufficiently clear and preserves the ritual-contact sense.
- source_word: בְּכָל טָמֵא
  chosen: anything unclean
  alternatives:
  - any unclean thing
  - anything impure
  lexicon: HALOT
  rationale: The phrase is broad and indefinite. 'Anything unclean' captures the comprehensive scope in idiomatic English.
- source_word: טֻמְאַת אָדָם
  chosen: human uncleanness
  alternatives:
  - the uncleanness of man
  - human impurity
  lexicon: HALOT
  rationale: This denotes uncleanness associated with a human being. 'Human uncleanness' is concise and readable while preserving the ritual category. 'Human impurity' is possible, but 'uncleanness' better matches the repeated טמא/טמאה language in the verse.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - person
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered according to context. Here it is generic rather than male-specific, so 'human' best reflects the sense.
- source_word: בִּבְהֵמָה טְמֵאָה
  chosen: an unclean animal
  alternatives:
  - unclean livestock
  - an impure beast
  lexicon: HALOT
  rationale: בְּהֵמָה is a broad animal term here. 'Animal' is the clearest modern English equivalent in this ritual context.
- source_word: שֶׁקֶץ
  chosen: detestable thing
  alternatives:
  - abomination
  - swarming thing
  lexicon: HALOT
  rationale: שׁקץ in purity contexts refers to something ritually abhorrent or detestable. 'Detestable thing' preserves the revulsion and ritual category without importing later technical jargon. 'Swarming thing' is too narrow here.
- source_word: וְאָכַל מִבְּשַׂר
  chosen: and eats some of the flesh
  alternatives:
  - and eats from the meat
  - and eats any of the flesh
  lexicon: HALOT
  rationale: The partitive מִן is naturally represented by 'some of.' 'Flesh' is retained because it is the standard sacrificial term and keeps continuity with Levitical diction.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the peace-offering sacrifice
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings.' While 'fellowship offerings' is interpretive and sometimes helpful, 'peace offerings' stays closer to the Hebrew term and sacrificial nomenclature.
- source_word: אֲשֶׁר לַיהוָה
  chosen: that belongs to the LORD
  alternatives:
  - that is for the LORD
  - which is the LORD's
  lexicon: HALOT
  rationale: The phrase marks the offering as belonging to or designated for YHWH. 'That belongs to the LORD' communicates consecrated ownership clearly in English.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be excluded
  - shall be removed
  lexicon: HALOT
  rationale: The covenant-sanction formula כרת is best preserved as 'cut off,' a standard and intentionally weighty rendering that leaves the exact mode of judgment open, as in the Hebrew.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from her people
  - from among his people
  lexicon: HALOT
  rationale: The suffix is formally feminine because it agrees with נֶפֶשׁ, a grammatically feminine noun, not because the offender is specifically female. English must reflect the generic legal sense. 'From his people' is a conventional generic rendering; 'from among his people' is also possible but slightly more expansive than necessary.
