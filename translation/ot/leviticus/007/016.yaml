id: LEV.7.16
reference: Leviticus 7:16
source:
  edition: WLC
  text: וְ/אִם נֶ֣דֶר א֣וֹ נְדָבָ֗ה זֶ֚בַח קָרְבָּנ֔/וֹ בְּ/י֛וֹם הַקְרִיב֥/וֹ אֶת
    זִבְח֖/וֹ יֵאָכֵ֑ל וּ/מִֽ/מָּחֳרָ֔ת וְ/הַ/נּוֹתָ֥ר מִמֶּ֖/נּוּ יֵאָכֵֽל־׀־׃
translation:
  text: But if the sacrifice of his offering is a vow or a freewill offering, it shall
    be eaten on the day he presents his sacrifice, and on the next day what remains
    of it may be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a votive offering' for 'a vow.' The Hebrew distinguishes a sacrifice
      connected to a vow from a voluntary freewill offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶדֶר
  chosen: a vow
  alternatives:
  - votive offering
  - vow offering
  lexicon: HALOT
  rationale: נֶדֶר denotes a vow or something given in fulfillment of a vow. Here,
    paired with נְדָבָה, it distinguishes a category of sacrifice by motive. 'A vow'
    is concise and natural in English while preserving the underlying concept.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - voluntary offering
  - freewill gift
  lexicon: HALOT
  rationale: נְדָבָה refers to a voluntary offering given freely rather than by obligation.
    'Freewill offering' is the established and accurate cultic rendering in this context.
- source_word: זֶבַח קָרְבָּנוֹ
  chosen: the sacrifice of his offering
  alternatives:
  - his sacrificial offering
  - the sacrifice of his gift
  lexicon: HALOT
  rationale: The construct chain combines זֶבַח ('sacrifice') with קָרְבָּן ('offering,
    gift brought near'). Rendering both terms preserves the Hebrew's specificity rather
    than collapsing them into a single English noun.
- source_word: בְּיוֹם הַקְרִיבוֹ
  chosen: on the day he presents
  alternatives:
  - on the day he offers
  - in the day of his bringing near
  lexicon: HALOT
  rationale: The Hiphil of קרב here means to present or offer sacrificially. 'Presents'
    is slightly more literal to the causative sense of bringing near, while remaining
    idiomatic.
- source_word: יֵאָכֵל
  chosen: it shall be eaten
  alternatives:
  - it may be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect here functions as an instruction/permitted procedure
    in sacrificial law. 'It shall be eaten' preserves the legal-prescriptive tone
    in the first clause.
- source_word: וּמִמָּחֳרָת
  chosen: and on the next day
  alternatives:
  - and from the next day
  - and on the morrow
  lexicon: HALOT
  rationale: מָחֳרָת refers to the following day. 'On the next day' is clear modern
    English and fits the procedural sequence.
- source_word: וְהַנּוֹתָר מִמֶּנּוּ
  chosen: what remains of it
  alternatives:
  - the remainder of it
  - what is left of it
  lexicon: HALOT
  rationale: The participle נוֹתָר means 'that which remains/is left over.' 'What
    remains of it' is natural English and preserves the sense of leftover sacrificial
    meat.
- source_word: יֵאָכֵל
  chosen: may be eaten
  alternatives:
  - shall be eaten
  lexicon: HALOT
  rationale: 'Though the same Hebrew form appears again, English style benefits from
    expressing the permissive force in context: the remainder is allowed to be eaten
    on the second day. This contextual variation is documented as an intentional exception
    to strict gloss consistency.'
