theological_decisions:
- issue: Sense of מִשְׁחַת in priestly legislation
  chosen_reading: cultic portion/allotment rather than literal anointing
  alternative_readings:
  - anointing portion
  - anointing
  rationale: Although the noun is etymologically related to anointing, in this context the verse summarizes the priestly due assigned in connection with consecration from the LORD's offerings. Rendering it as 'portion' avoids implying that the verse is directly about the oil rite rather than the assigned share.
