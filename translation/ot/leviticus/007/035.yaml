id: LEV.7.35
reference: Leviticus 7:35
source:
  edition: WLC
  text: זֹ֣את מִשְׁחַ֤ת אַהֲרֹן֙ וּ/מִשְׁחַ֣ת בָּנָ֔י/ו מֵ/אִשֵּׁ֖י יְהוָ֑ה בְּ/יוֹם֙ הִקְרִ֣יב אֹתָ֔/ם לְ/כַהֵ֖ן לַ/יהוָֽה׃
translation:
  text: This is the anointed portion of Aaron and the anointed portion of his sons from the food offerings of Yahweh, on the day when he presented them to serve as priests to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “anointing portion.” The Hebrew term is related to anointing, but here likely refers to the allotted priestly share associated with consecration.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, “offerings by fire of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁחַת
  chosen: portion
  alternatives:
  - anointing portion
  - share
  - due allotment
  lexicon: HALOT
  rationale: In this sacrificial context, מִשְׁחָה/מִשְׁחַת refers not to the act of anointing itself but to the allotted share associated with consecration/priestly entitlement. 'Portion' best fits the immediate context of priestly dues from offerings and reads naturally in English.
- source_word: מִשְׁחַת אַהֲרֹן וּמִשְׁחַת בָּנָיו
  chosen: Aaron’s portion and his sons’ portion
  alternatives:
  - the anointing portion of Aaron and the anointing portion of his sons
  - Aaron’s allotment and his sons’ allotment
  lexicon: HALOT
  rationale: The repeated construct phrase is preserved explicitly rather than compressed, since the Hebrew repeats the noun. 'His sons' refers to Aaron's sons.
- source_word: מֵאִשֵּׁי יְהוָה
  chosen: from the food offerings of the LORD
  alternatives:
  - from the offerings by fire of the LORD
  - from the LORD’s fire offerings
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally denotes offerings made by fire. 'Food offerings' is a clear, modern rendering commonly used in Levitical contexts and avoids the misleading impression that the offerings belong to fire itself. The source relation 'from' is retained.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיוֹם
  chosen: on the day when
  alternatives:
  - in the day that
  - when
  lexicon: HALOT
  rationale: This temporal phrase introduces the occasion of appointment/consecration. 'On the day when' preserves the Hebrew structure while remaining idiomatic.
- source_word: הִקְרִיב אֹתָם
  chosen: he presented them
  alternatives:
  - he brought them near
  - he offered them
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present. Here the object is Aaron and his sons, so 'offered them' would sound misleadingly sacrificial in English. 'Presented them' captures formal installation before the LORD.
- source_word: לְכַהֵן
  chosen: to serve as priests
  alternatives:
  - to minister as priests
  - to act as priests
  lexicon: HALOT
  rationale: The infinitive of כהן denotes priestly service. 'Serve as priests' is clear, natural English and preserves the vocational sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - before the LORD
  lexicon: HALOT
  rationale: The lamed here marks the one in whose service they minister. 'To the LORD' is a straightforward rendering and matches the Hebrew preposition.
