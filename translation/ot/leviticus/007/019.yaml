theological_decisions:
- issue: Nature of טָמֵא / טָהוֹר in sacrificial law
  chosen_reading: Render as 'unclean' / 'clean' in ritual terms without importing
    moral categories.
  alternative_readings:
  - defiled / pure
  - impure / pure
  rationale: In Levitical sacrificial regulations, these terms primarily denote ritual
    status, not necessarily personal sinfulness or ethical purity. The translation
    preserves the cultic distinction without theological over-interpretation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
