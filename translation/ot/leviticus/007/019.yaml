id: LEV.7.19
reference: Leviticus 7:19
source:
  edition: WLC
  text: וְ/הַ/בָּשָׂ֞ר אֲשֶׁר יִגַּ֤ע בְּ/כָל טָמֵא֙ לֹ֣א יֵֽאָכֵ֔ל בָּ/אֵ֖שׁ יִשָּׂרֵ֑ף
    וְ/הַ֨/בָּשָׂ֔ר כָּל טָה֖וֹר יֹאכַ֥ל בָּשָֽׂר־־־׃
translation:
  text: But the meat that touches anything unclean must not be eaten; it must be burned
    in the fire. And as for the meat, anyone who is clean may eat meat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that comes into contact with any unclean thing.' The Hebrew is broad
      and refers to ritual uncleanness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבָּשָׂר
  chosen: But the meat
  alternatives:
  - And the meat
  - Now the meat
  - flesh
  lexicon: HALOT
  rationale: בָּשָׂר here refers to sacrificial flesh/meat, not 'flesh' in an abstract
    or anthropological sense. 'Meat' is the most natural modern English rendering
    in this food-law context. The initial conjunction is rendered 'But' to mark the
    contrast with permitted consumption in the surrounding context.
- source_word: אֲשֶׁר יִגַּע בְּכָל טָמֵא
  chosen: that touches anything unclean
  alternatives:
  - that comes into contact with any unclean thing
  - that touches any uncleanness
  lexicon: HALOT
  rationale: The relative clause modifies the meat. יִגַּע denotes physical contact.
    כָּל טָמֵא is rendered idiomatically as 'anything unclean,' capturing the broad
    category of ritually unclean matter or object without over-specifying.
- source_word: לֹא יֵאָכֵל
  chosen: must not be eaten
  alternatives:
  - shall not be eaten
  - is not to be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect expresses prohibition/passive result. 'Must not
    be eaten' gives clear contemporary English while preserving the legal force.
- source_word: בָּאֵשׁ יִשָּׂרֵף
  chosen: it must be burned in the fire
  alternatives:
  - it shall be burned with fire
  - it is to be burned in fire
  lexicon: HALOT
  rationale: The phrase states the required disposal of contaminated sacrificial meat.
    'In the fire' is a natural rendering of the prepositional phrase and preserves
    the concrete imagery.
- source_word: וְהַבָּשָׂר
  chosen: And as for the meat
  alternatives:
  - And the meat
  - But the meat
  lexicon: HALOT
  rationale: The repeated noun marks a shift from contaminated meat to meat fit for
    consumption. 'As for the meat' helps signal the topical contrast in English.
- source_word: כָּל טָהוֹר
  chosen: anyone who is clean
  alternatives:
  - everyone who is clean
  - every clean person
  - all who are clean
  lexicon: HALOT
  rationale: The adjective functions substantivally for persons in a ritual state
    of cleanness. 'Anyone who is clean' is idiomatic and preserves the legal inclusiveness
    of the Hebrew.
- source_word: יֹאכַל בָּשָׂר
  chosen: may eat meat
  alternatives:
  - shall eat meat
  - may eat the meat
  - may eat flesh
  lexicon: HALOT
  rationale: The clause grants permission rather than issuing a command. Because the
    object lacks the article in the final occurrence, 'eat meat' is acceptable English
    and avoids overloading the sentence with repeated 'the.'
