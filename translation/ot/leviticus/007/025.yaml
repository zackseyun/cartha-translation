id: LEV.7.25
reference: Leviticus 7:25
source:
  edition: WLC
  text: כִּ֚י כָּל אֹכֵ֣ל חֵ֔לֶב מִן הַ֨/בְּהֵמָ֔ה אֲשֶׁ֨ר יַקְרִ֥יב מִמֶּ֛/נָּה אִשֶּׁ֖ה לַ/יהוָ֑ה וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הָ/אֹכֶ֖לֶת מֵֽ/עַמֶּֽי/הָ־־׃
translation:
  text: For anyone who eats fat from an animal from which an offering made by fire is presented to Yahweh, the person who eats it shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a food offering' for 'an offering made by fire.' The Hebrew term refers to an offering consumed by fire on the altar.
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' preserves the Hebrew legal formula. The precise penalty is debated; it may imply expulsion, death, or divine judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding prohibition, so 'For' best fits the discourse connection in English.
- source_word: כָּל אֹכֵל
  chosen: anyone who eats
  alternatives:
  - whoever eats
  - every eater of
  lexicon: HALOT
  rationale: The combination expresses an indefinite general case. 'Anyone who eats' is natural modern English while preserving the universal force.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - suet
  - choice fat
  lexicon: HALOT
  rationale: The term denotes animal fat, especially the fat portions reserved in sacrificial law. 'Fat' is the plain and consistent rendering here.
- source_word: מִן הַבְּהֵמָה
  chosen: from an animal
  alternatives:
  - from the livestock
  - from a beast
  lexicon: HALOT
  rationale: בְּהֵמָה here refers broadly to an animal in the sacrificial context. 'Animal' is clear modern English and avoids the archaic feel of 'beast.'
- source_word: אֲשֶׁר יַקְרִיב מִמֶּנָּה
  chosen: from which ... is presented
  alternatives:
  - of which ... one presents
  - from which ... may be offered
  lexicon: HALOT
  rationale: The Hebrew is active singular ('he presents/offers') with an indefinite subject. English idiom is smoother with a passive construction while preserving the sense that this animal is of a kind from which offerings are made.
- source_word: אִשֶּׁה
  chosen: an offering made by fire
  alternatives:
  - a food offering
  - a fire offering
  lexicon: HALOT
  rationale: Traditional sacrificial term for an offering turned into smoke by fire. 'Offering made by fire' is transparent and avoids narrowing the term to food alone.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition marks dedication/presentation to YHWH.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be excluded
  - shall be removed
  lexicon: HALOT
  rationale: This is the standard covenantal penalty formula in the Torah. 'Cut off' preserves the idiom and its theological/legal weight better than interpretive paraphrases.
- source_word: הַנֶּפֶשׁ הָאֹכֶלֶת
  chosen: the person who eats it
  alternatives:
  - the soul that eats
  - the one eating
  lexicon: HALOT
  rationale: נֶפֶשׁ in legal contexts often refers to the individual person. 'The person who eats it' communicates the legal subject naturally in English; 'it' is supplied from context referring to the fat.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from his kin
  - from his community
  lexicon: HALOT
  rationale: The suffix is grammatically feminine agreeing with נֶפֶשׁ, but the referent is generic. Per gender-accurate policy, English should reflect the representative generic sense rather than force a feminine reading. 'His people' is the conventional legal idiom in English for this Hebrew expression.
