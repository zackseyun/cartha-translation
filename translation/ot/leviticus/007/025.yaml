theological_decisions:
- issue: Rendering the covenant penalty formula וְנִכְרְתָה ... מֵעַמֶּיהָ
  chosen_reading: shall be cut off from his people
  alternative_readings:
  - shall be excluded from his people
  - shall be put to death
  rationale: The exact mechanism of 'cut off' is debated in Torah interpretation; it may imply divine judgment, communal expulsion, premature death, or some combination depending on context. The translation preserves the Hebrew idiom rather than resolving the interpretive question beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender of the offender in generic legal language
  chosen_reading: his people
  alternative_readings:
  - their people
  - her people
  rationale: Although the Hebrew suffix is feminine because it agrees with נֶפֶשׁ, the construction refers generically to any offender. Following the project's gender-accurate policy, the English uses a representative singular rather than flattening the grammar into modern plural or incorrectly specifying a female offender.
  doctrine_reference: Gender-accurate over gender-neutral.
