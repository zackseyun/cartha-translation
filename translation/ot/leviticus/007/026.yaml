theological_decisions:
- issue: Scope of the blood prohibition
  chosen_reading: The verse prohibits consuming any blood from either birds or animals
    in all places where Israel dwells.
  alternative_readings:
  - The final phrase could be rendered more literally as 'for bird and for animal'
    without making the source relation explicit.
  rationale: The Hebrew syntax most naturally lists the animal categories whose blood
    is forbidden. The translation avoids importing later theological explanation and
    simply states the legal prohibition with clear English syntax.
