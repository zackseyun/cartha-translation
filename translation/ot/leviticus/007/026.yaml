id: LEV.7.26
reference: Leviticus 7:26
source:
  edition: WLC
  text: וְ/כָל דָּם֙ לֹ֣א תֹאכְל֔וּ בְּ/כֹ֖ל מוֹשְׁבֹתֵי/כֶ֑ם לָ/ע֖וֹף וְ/לַ/בְּהֵמָֽה־׃
translation:
  text: And you shall not eat any blood in any of your dwellings, whether from bird
    or from animal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in all your dwellings' or 'throughout all your settlements.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''for bird and for animal''; the sense is blood belonging to or
      coming from birds and animals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And ... any
  alternatives:
  - and all
  - and any
  lexicon: HALOT
  rationale: The conjunction links this prohibition to the preceding instructions,
    and כָּל with a negated verb is idiomatically rendered 'any' in English ('not
    eat any blood') rather than the wooden 'all blood.'
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: Standard and direct rendering of דָּם; no contextual reason to expand
    or paraphrase.
- source_word: לֹא תֹאכְלוּ
  chosen: you shall not eat
  alternatives:
  - you must not eat
  - do not eat
  lexicon: HALOT
  rationale: Imperfect 2mp under legal instruction is well represented by English
    legal-style prohibition 'you shall not eat.' This preserves the prescriptive force
    without sounding archaic in context.
- source_word: בְּ/כֹל מוֹשְׁבֹתֵיכֶם
  chosen: in any of your dwellings
  alternatives:
  - throughout all your dwellings
  - wherever you live
  - in all your settlements
  lexicon: HALOT
  rationale: 'מוֹשָׁב can denote dwelling place/settlement. ''In any of your dwellings''
    captures the distributive force of בְּכֹל and keeps the legal scope clear: the
    prohibition applies wherever they reside.'
- source_word: לָ/עוֹף
  chosen: from bird
  alternatives:
  - of birds
  - from fowl
  lexicon: HALOT
  rationale: The prefixed ל here specifies the category to which the blood belongs.
    In idiomatic English, 'from bird' expresses source more naturally than a literal
    'for bird' or the slightly less clear bare genitive.
- source_word: וְ/לַ/בְּהֵמָה
  chosen: or from animal
  alternatives:
  - and from livestock
  - and from beast
  lexicon: HALOT
  rationale: בְּהֵמָה here denotes an animal category in dietary/sacrificial context.
    'Animal' is clear modern English; 'livestock' is possible but narrower, while
    'beast' is archaic or misleading. 'Or' rather than a strictly additive 'and' fits
    English categorization after 'whether from ... or from ...'.
