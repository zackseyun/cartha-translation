id: LEV.7.6
reference: Leviticus 7:6
source:
  edition: WLC
  text: כָּל זָכָ֥ר בַּ/כֹּהֲנִ֖ים יֹאכְלֶ֑/נּוּ בְּ/מָק֤וֹם קָדוֹשׁ֙ יֵאָכֵ֔ל קֹ֥דֶשׁ
    קָֽדָשִׁ֖ים הֽוּא־׃
translation:
  text: Every male among the priests may eat it; it shall be eaten in a holy place.
    It is most holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Every male of the priests shall eat it.' The Hebrew can be rendered
      more formally, but the sense is that any male member of the priestly group is
      permitted to eat it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'holy of holies,' an idiom meaning 'most holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the legal instruction: each qualifying individual
    is included.'
- source_word: זָכָר
  chosen: male
  alternatives:
  - man
  lexicon: HALOT
  rationale: The Hebrew specifies sex rather than adult status; 'male' is more precise
    than 'man' and follows the gender-accurate principle.
- source_word: בַּכֹּהֲנִים
  chosen: among the priests
  alternatives:
  - of the priests
  - among the priesthood
  lexicon: HALOT
  rationale: The preposition with the article marks membership within the priestly
    group. 'Among the priests' is natural English and preserves the restriction to
    priestly males.
- source_word: יֹאכְלֶנּוּ
  chosen: may eat it
  alternatives:
  - shall eat it
  - is to eat it
  lexicon: HALOT
  rationale: The imperfect here expresses permitted entitlement within sacrificial
    law. 'May eat it' communicates authorized access better than a simple future.
- source_word: בְּמָקוֹם קָדוֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article on 'place,' so 'a holy place' is preferable
    to the more specific 'the holy place,' which could imply the sanctuary proper.
- source_word: יֵאָכֵל
  chosen: it shall be eaten
  alternatives:
  - it may be eaten
  lexicon: HALOT
  rationale: The Niphal gives a passive instruction. 'Shall be eaten' conveys the
    legal requirement regarding location more strongly than mere permission.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a most holy thing
  lexicon: HALOT
  rationale: This idiom denotes the highest degree of holiness for sacrificial portions.
    'Most holy' is standard, clear English; 'holy of holies' in English more often
    suggests the inner sanctuary rather than the classification of the offering.
- source_word: הוּא
  chosen: It is
  alternatives:
  - This is
  lexicon: HALOT
  rationale: The pronoun refers back to the sacrificial portion under discussion and
    forms a simple predication in English.
