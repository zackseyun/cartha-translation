theological_decisions:
- issue: Restriction of consumption to males within the priesthood
  chosen_reading: Every male among the priests may eat it
  alternative_readings:
  - Every priest may eat it
  rationale: The Hebrew explicitly includes both 'every' and 'male' and should not
    be generalized to all priests irrespective of sex. This preserves the cultic regulation
    as stated without softening its gendered restriction.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
