id: LEV.7.15
reference: Leviticus 7:15
source:
  edition: WLC
  text: וּ/בְשַׂ֗ר זֶ֚בַח תּוֹדַ֣ת שְׁלָמָ֔י/ו בְּ/י֥וֹם קָרְבָּנ֖/וֹ יֵאָכֵ֑ל לֹֽא
    יַנִּ֥יחַ מִמֶּ֖/נּוּ עַד בֹּֽקֶר־־׃
translation:
  text: And the flesh of the sacrifice of his peace offerings for thanksgiving shall
    be eaten on the day of his offering; he shall not leave any of it until morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his fellowship offerings for thanksgiving.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשַׂר
  chosen: And the flesh
  alternatives:
  - And the meat
  lexicon: HALOT
  rationale: בשר literally denotes 'flesh' or 'meat.' 'Flesh' preserves the sacrificial
    register and stays closer to the Hebrew, while remaining natural in English in
    this cultic context.
- source_word: זֶבַח
  chosen: the sacrifice
  alternatives:
  - the offering
  - the slaughtered sacrifice
  lexicon: HALOT
  rationale: זבח refers to a sacrificial slaughter/animal sacrifice. 'Sacrifice' is
    the most natural and sufficiently precise rendering here.
- source_word: תּוֹדַת
  chosen: for thanksgiving
  alternatives:
  - of thanksgiving
  - thank offering
  lexicon: HALOT
  rationale: תודה denotes thanksgiving or thank offering. Because it modifies the
    peace offering construction, 'for thanksgiving' clearly expresses the function
    of this subtype of peace offering.
- source_word: שְׁלָמָיו
  chosen: his peace offerings
  alternatives:
  - his fellowship offerings
  lexicon: HALOT
  rationale: שלמים is the standard sacrificial category often rendered 'peace offerings.'
    'Fellowship offerings' is interpretive; 'peace offerings' better preserves the
    established cultic term while remaining understandable.
- source_word: בְּיוֹם קָרְבָּנוֹ
  chosen: on the day of his offering
  alternatives:
  - on the day he presents it
  - on the day of its presentation
  lexicon: HALOT
  rationale: The phrase is literally 'on the day of his offering/presentation.' Retaining
    'offering' keeps the nominal form and links naturally to the sacrificial context.
    The 3ms suffix is best represented idiomatically as 'his,' referring to the offerer.
- source_word: יֵאָכֵל
  chosen: shall be eaten
  alternatives:
  - must be eaten
  lexicon: HALOT
  rationale: 'The Niphal imperfect is naturally rendered as a passive: ''shall be
    eaten.'' This preserves the formal force of the instruction without over-paraphrasing.'
- source_word: לֹא יַנִּיחַ
  chosen: he shall not leave
  alternatives:
  - he must not leave
  - none shall be left
  lexicon: HALOT
  rationale: The Hiphil of נוח here means 'leave, set aside.' The subject is singular
    in Hebrew, so 'he shall not leave' is the most direct rendering.
- source_word: מִמֶּנּוּ
  chosen: any of it
  alternatives:
  - from it
  - of it
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'from it,' but idiomatic
    English in this prohibition is 'any of it,' making explicit that no portion is
    to remain.
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  lexicon: HALOT
  rationale: This temporal phrase is straightforward. 'Until morning' is idiomatic
    modern English and preserves the sense exactly.
