theological_decisions:
- issue: Rendering of שְׁלָמִים sacrificial category
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The Hebrew term names a specific sacrificial category. 'Peace offerings'
    is less interpretive than 'fellowship offerings' and better preserves lexical
    continuity across Leviticus, while not importing a specific theological explanation
    of the rite beyond the text itself.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
