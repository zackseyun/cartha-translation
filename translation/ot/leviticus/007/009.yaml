id: LEV.7.9
reference: Leviticus 7:9
source:
  edition: WLC
  text: וְ/כָל מִנְחָ֗ה אֲשֶׁ֤ר תֵּֽאָפֶה֙ בַּ/תַּנּ֔וּר וְ/כָל נַעֲשָׂ֥ה בַ/מַּרְחֶ֖שֶׁת
    וְ/עַֽל מַחֲבַ֑ת לַ/כֹּהֵ֛ן הַ/מַּקְרִ֥יב אֹתָ֖/הּ ל֥/וֹ תִֽהְיֶֽה־־־׃
translation:
  text: And every grain offering that is baked in the oven, and everything prepared
    in a pan or on a griddle, shall belong to the priest who presents it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made in a deep pan or on a flat pan.' The two Hebrew vessel terms likely
      refer to different kinds of cooking implements.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  - meal offering
  lexicon: HALOT
  rationale: In Levitical sacrificial context, מִנְחָה refers specifically to the
    cereal/grain tribute offering rather than a generic gift. 'Grain offering' is
    clear modern English and standard in this cultic context.
- source_word: תֵּאָפֶה בַּתַּנּוּר
  chosen: is baked in the oven
  alternatives:
  - is baked in an oven
  lexicon: HALOT
  rationale: The Niphal verb from אפה is naturally rendered as passive/reflexive 'is
    baked.' With the article on תַּנּוּר, 'the oven' is a formally closer rendering,
    though in English it functions generically.
- source_word: נַעֲשָׂה
  chosen: prepared
  alternatives:
  - made
  - cooked
  lexicon: HALOT
  rationale: עשה is broad ('made/done'), but in the food-preparation context of grain
    offerings, 'prepared' is idiomatic English without over-specifying the method.
- source_word: מַרְחֶשֶׁת
  chosen: pan
  alternatives:
  - deep pan
  - cooking pan
  lexicon: HALOT
  rationale: This vessel denotes a cooking implement, often understood as a deeper
    pan than the מַחֲבַת. 'Pan' is concise and natural; the distinction from the following
    term is maintained by rendering that one differently.
- source_word: מַחֲבַת
  chosen: griddle
  alternatives:
  - flat pan
  - baking plate
  lexicon: HALOT
  rationale: This term is commonly distinguished from מַרְחֶשֶׁת as a flatter cooking
    surface. 'Griddle' preserves that likely distinction better than repeating 'pan.'
- source_word: לַכֹּהֵן
  chosen: to the priest / shall belong to the priest
  alternatives:
  - for the priest
  lexicon: HALOT
  rationale: The lamed marks possession/assignment here. In idiomatic English, this
    is best expressed with the predicate 'shall belong to the priest' rather than
    a more wooden 'to the priest it shall be.'
- source_word: הַמַּקְרִיב
  chosen: who presents
  alternatives:
  - who offers
  - who brings near
  lexicon: HALOT
  rationale: The Hiphil participle of קרב in sacrificial contexts means to present/offer
    an offering. 'Presents' is clear and slightly more formal, fitting the ritual
    setting without archaic phrasing.
- source_word: לוֹ תִהְיֶה
  chosen: shall belong to
  alternatives:
  - shall be his
  - shall be for him
  lexicon: HALOT
  rationale: This construction indicates legal possession. 'Shall belong to' communicates
    the force clearly in modern English while preserving the distributive legal sense.
