id: LEV.7.30
reference: Leviticus 7:30
source:
  edition: WLC
  text: יָדָ֣י/ו תְּבִיאֶ֔ינָה אֵ֖ת אִשֵּׁ֣י יְהוָ֑ה אֶת הַ/חֵ֤לֶב עַל הֶֽ/חָזֶה֙ יְבִיאֶ֔/נּוּ אֵ֣ת הֶ/חָזֶ֗ה לְ/הָנִ֥יף אֹת֛/וֹ תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: His own hands shall bring the food offerings of Yahweh; he shall bring the fat with the breast, that the breast may be waved as a wave offering before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the offerings by fire of the LORD' or 'the fire offerings of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדָיו
  chosen: his own hands
  alternatives:
  - his hands
  lexicon: HALOT
  rationale: The plural noun with 3ms suffix is rendered explicitly and idiomatically. 'His own hands' brings out the emphasis that the offerer personally brings the offering.
- source_word: תְּבִיאֶינָה
  chosen: shall bring
  alternatives:
  - must bring
  - are to bring
  lexicon: HALOT
  rationale: Hiphil of בוא here denotes causing to come/bringing. English singular agreement is used with the collective subject sense from 'his hands.' 'Shall' fits legal/instructional style without sounding archaic in this context.
- source_word: אִשֵּׁי יְהוָה
  chosen: the food offerings of the LORD
  alternatives:
  - the offerings by fire of the LORD
  - the fire offerings of the LORD
  lexicon: HALOT
  rationale: Although the term is traditionally rendered 'offerings made by fire,' in Leviticus it often functions as a technical term for offerings presented to the LORD by fire. 'Food offerings' is a clear modern rendering used in many contexts for אִשֶּׁה, while preserving sacrificial specificity. The more literal 'offerings by fire' is preserved in a footnote as a lexical alternative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: In sacrificial context חֵלֶב refers to the fat portions reserved for offering. 'The fat' is the standard and sufficiently precise rendering.
- source_word: עַל הֶחָזֶה
  chosen: with the breast
  alternatives:
  - upon the breast
  - on the breast
  lexicon: HALOT
  rationale: While עַל commonly means 'on/upon,' in this procedural context the sense is accompaniment/placement together with the breast. 'With the breast' reads naturally in English and fits the ritual action described.
- source_word: יְבִיאֶנּוּ
  chosen: he shall bring
  alternatives:
  - he must bring
  - he is to bring it
  lexicon: HALOT
  rationale: The singular verb resumes the individual offerer. The object is contextually the sacrificial portions just named; English expresses this smoothly without overloading the sentence with pronouns.
- source_word: הֶחָזֶה
  chosen: the breast
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: In sacrificial terminology חָזֶה is conventionally and accurately rendered 'breast.'
- source_word: לְהָנִיף
  chosen: to wave
  alternatives:
  - to present by waving
  lexicon: HALOT
  rationale: The Hiphil infinitive of נוף in sacrificial contexts denotes the ritual act of waving/presenting. 'To wave' is concise and standard.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - for a wave offering
  - as a presentation offering
  lexicon: HALOT
  rationale: The noun names the ritual category/result of the waving action. 'Wave offering' is the established and transparent rendering in Levitical contexts.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This standard cultic phrase indicates presentation in the LORD's presence at the sanctuary. 'Before the LORD' preserves the formal ritual sense.
