id: LEV.7.32
reference: Leviticus 7:32
source:
  edition: WLC
  text: וְ/אֵת֙ שׁ֣וֹק הַ/יָּמִ֔ין תִּתְּנ֥וּ תְרוּמָ֖ה לַ/כֹּהֵ֑ן מִ/זִּבְחֵ֖י שַׁלְמֵי/כֶֽם׃
translation:
  text: And you shall give the right thigh as a contribution to the priest from your
    sacrifices of peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the right leg.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as an offering'; traditionally, 'as a heave offering.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sacrifices of fellowship offerings' or 'sacrifices of well-being offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹק
  chosen: thigh
  alternatives:
  - leg
  lexicon: HALOT
  rationale: Refers to the upper part of the animal's leg. 'Thigh' is the more precise
    sacrificial-anatomical term in English, while 'leg' is broader and less exact.
- source_word: הַיָּמִין
  chosen: right
  lexicon: HALOT
  rationale: The adjective/noun denotes the right side. In sacrificial instructions
    this specifies the designated portion, so 'right' should be retained explicitly.
- source_word: תִּתְּנוּ
  chosen: you shall give
  alternatives:
  - you are to give
  - give
  lexicon: HALOT
  rationale: Imperfect second masculine plural in legal instruction is well represented
    by English 'you shall give,' preserving the directive force without sounding overly
    archaic in this context.
- source_word: תְרוּמָה
  chosen: contribution
  alternatives:
  - offering
  - heave offering
  - gift contribution
  lexicon: HALOT
  rationale: The noun denotes a portion set apart and presented. 'Contribution' communicates
    something given over as a designated due. 'Heave offering' is traditional but
    opaque to modern readers and imports ritual terminology not explicit in the English
    text.
- source_word: לַכֹּהֵן
  chosen: to the priest
  lexicon: HALOT
  rationale: Straightforward dative of recipient; singular is retained because the
    Hebrew is singular.
- source_word: מִזִּבְחֵי
  chosen: from your sacrifices
  alternatives:
  - from the sacrifices
  - out of your sacrificial offerings
  lexicon: HALOT
  rationale: 'The preposition marks source: this priestly portion comes from among
    the sacrifices. The 2mp suffix is carried forward in English by ''your.'''
- source_word: שַׁלְמֵיכֶם
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: The established sacrificial term שְׁלָמִים is best rendered 'peace offerings'
    here for recognizability and consistency. Alternatives such as 'fellowship offerings'
    or 'offerings of well-being' capture aspects of the term but are less direct in
    this legal context.
- source_word: וְאֵת
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction links this instruction to the preceding context, and
    the object marker has no direct English equivalent. 'And' preserves the discourse
    flow naturally.
