id: LEV.7.24
reference: Leviticus 7:24
source:
  edition: WLC
  text: וְ/חֵ֤לֶב נְבֵלָה֙ וְ/חֵ֣לֶב טְרֵפָ֔ה יֵעָשֶׂ֖ה לְ/כָל מְלָאכָ֑ה וְ/אָכֹ֖ל
    לֹ֥א תֹאכְלֻֽ/הוּ־׃
translation:
  text: But the fat of an animal that dies naturally, and the fat of one torn by beasts,
    may be used for any work; but you must certainly not eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'nevelah' refers to an animal that died without proper slaughter;
      'found dead' is a possible alternative rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'one torn by wild animals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - suet
  lexicon: HALOT
  rationale: Standard rendering for the animal fat in sacrificial/food-law contexts.
    'Suet' is more technical and less natural in modern English.
- source_word: נְבֵלָה
  chosen: an animal that dies naturally
  alternatives:
  - carcass
  - an animal found dead
  lexicon: HALOT
  rationale: In Torah legal contexts this refers to an animal that dies without proper
    slaughter. 'An animal that dies naturally' communicates the sense clearly in modern
    English; 'carcass' is too object-focused and 'found dead' is possible but less
    direct.
- source_word: טְרֵפָה
  chosen: one torn by beasts
  alternatives:
  - a torn animal
  - one torn by wild animals
  lexicon: HALOT
  rationale: The term denotes an animal torn by predators. 'Torn by beasts' is concise
    and idiomatic, preserving the likely agent better than the bare 'torn animal'.
- source_word: יֵעָשֶׂה
  chosen: may be used
  alternatives:
  - shall be made
  - may be made into
  - may serve
  lexicon: HALOT
  rationale: The Niphal here expresses permitted use rather than manufacture in a
    narrow sense. 'May be used' best fits the legal allowance in context.
- source_word: לְכָל מְלָאכָה
  chosen: for any work
  alternatives:
  - for any other use
  - for any kind of labor
  lexicon: HALOT
  rationale: A broad phrase allowing non-food use. 'For any work' stays close to the
    Hebrew while remaining natural; the context implies practical use of the fat for
    purposes other than eating.
- source_word: וְאָכֹל לֹא תֹאכְלֻהוּ
  chosen: but you must certainly not eat it
  alternatives:
  - but by no means shall you eat it
  - but you shall not eat it at all
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the prohibition.
    'Must certainly not eat it' conveys the emphatic force in clear modern English.
