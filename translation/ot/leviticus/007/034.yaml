theological_decisions:
- issue: Rendering of covenantal ethnonym בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is formally masculine plural and functions as the standard
    covenantal designation. Per doctrine, gender-accurate renderings are preferred
    over flattening to a neutral collective unless context requires otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The text names a specific sacrificial category. 'Peace offerings' better
    preserves lexical continuity with the Hebrew root and longstanding cultic usage
    without importing a narrower interpretive gloss such as table fellowship.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
