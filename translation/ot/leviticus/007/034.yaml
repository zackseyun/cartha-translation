id: LEV.7.34
reference: Leviticus 7:34
source:
  edition: WLC
  text: כִּי֩ אֶת חֲזֵ֨ה הַ/תְּנוּפָ֜ה וְ/אֵ֣ת שׁ֣וֹק הַ/תְּרוּמָ֗ה לָקַ֨חְתִּי֙ מֵ/אֵ֣ת
    בְּנֵֽי יִשְׂרָאֵ֔ל מִ/זִּבְחֵ֖י שַׁלְמֵי/הֶ֑ם וָ/אֶתֵּ֣ן אֹ֠תָ/ם לְ/אַהֲרֹ֨ן
    הַ/כֹּהֵ֤ן וּ/לְ/בָנָי/ו֙ לְ/חָק עוֹלָ֔ם מֵ/אֵ֖ת בְּנֵ֥י יִשְׂרָאֵֽל־׀־־׃
translation:
  text: For I have taken the breast of the wave offering and the thigh of the contribution
    from the sons of Israel, from their sacrifices of peace offerings, and I have
    given them to Aaron the priest and to his sons as a permanent statute from the
    sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew is literally 'sons
      of Israel,' a standard covenantal designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'heave offering' for 'contribution.' The Hebrew term refers to a portion
      set apart and lifted up as an offering.
    reason: lexical_alternative
  - marker: c
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזֵה
  chosen: breast
  alternatives:
  - chest
  lexicon: HALOT
  rationale: The noun denotes the breast/chest portion of the animal. 'Breast' is
    the established sacrificial-anatomical term in English and fits the cultic context
    precisely.
- source_word: תְּנוּפָה
  chosen: wave offering
  alternatives:
  - presentation offering
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for the specific ritual
    action/offering category. It preserves the distinction from other offering terms
    in Leviticus.
- source_word: שׁוֹק
  chosen: thigh
  alternatives:
  - leg
  lexicon: HALOT
  rationale: Refers to the upper leg portion assigned to the priest. 'Thigh' is more
    anatomically precise than 'leg' and matches sacrificial usage.
- source_word: תְּרוּמָה
  chosen: contribution
  alternatives:
  - heave offering
  - raised offering
  lexicon: HALOT
  rationale: The term broadly denotes something lifted up/set apart as a contribution.
    'Contribution' is clearer in modern English than the archaic 'heave offering,'
    while preserving the idea of a designated portion.
- source_word: לָקַחְתִּי
  chosen: I have taken
  alternatives:
  - I took
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English in
    this legal declaration. 'I have taken' fits the explanatory force introduced by
    כִּי.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Gender-accurate rendering of the Hebrew construct, in line with project
    policy. It preserves the formal covenantal designation; a more idiomatic alternative
    is possible but less formally transparent.
- source_word: זִבְחֵי שַׁלְמֵיהֶם
  chosen: their sacrifices of peace offerings
  alternatives:
  - their peace offering sacrifices
  - their fellowship sacrifices
  lexicon: HALOT
  rationale: Keeps both sacrificial noun and offering category visible. 'Peace offerings'
    is preferred over 'fellowship offerings' because it more directly reflects שְׁלָמִים
    and preserves traditional cultic terminology.
- source_word: וָאֶתֵּן אֹתָם
  chosen: I have given them
  alternatives:
  - and I gave them
  lexicon: HALOT
  rationale: Rendered with English perfect for consistency with the preceding perfect
    and to convey an established divine ordinance.
- source_word: לְחָק עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting due
  lexicon: HALOT
  rationale: Conveys an enduring legal prescription in accessible modern English.
    'Permanent statute' avoids archaic diction while preserving the force of the phrase.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - on the part of the sons of Israel
  - from the Israelites
  lexicon: HALOT
  rationale: The repeated phrase marks the source from whom these priestly portions
    come. Repeating 'from the sons of Israel' preserves the Hebrew emphasis and legal
    framing.
