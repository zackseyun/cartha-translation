theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of עוֹלָם in priestly legislation
  chosen_reading: everlasting statute
  alternative_readings:
  - perpetual statute
  - permanent statute
  rationale: The phrase should preserve the covenantal-legal weight of enduring obligation within Israel's generations without importing later theological claims beyond the text. 'Everlasting statute' is a conventional but still transparent rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
