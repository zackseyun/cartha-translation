id: LEV.7.36
reference: Leviticus 7:36
source:
  edition: WLC
  text: אֲשֶׁר֩ צִוָּ֨ה יְהוָ֜ה לָ/תֵ֣ת לָ/הֶ֗ם בְּ/יוֹם֙ מָשְׁח֣/וֹ אֹתָ֔/ם מֵ/אֵ֖ת בְּנֵ֣י יִשְׂרָאֵ֑ל חֻקַּ֥ת עוֹלָ֖ם לְ/דֹרֹתָֽ/ם׃
translation:
  text: which Yahweh commanded to be given to them from the sons of Israel on the day he anointed them—an everlasting statute throughout their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Israelites.' The Hebrew reads literally 'from the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the priests' allotted portions in the previous context. 'Which' is natural and sufficiently formal here.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - appointed
  lexicon: HALOT
  rationale: The verb denotes authoritative divine command. 'Commanded' preserves the covenantal/legal force better than softer alternatives.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָתֵת
  chosen: to be given
  alternatives:
  - to give
  lexicon: HALOT
  rationale: 'Although formally ''to give,'' English idiom in this construction is clearer with a passive infinitive: the LORD commanded these portions ''to be given'' to the priests.'
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Refers to Aaron and his sons, i.e., the priests, as established by the immediate context.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: HALOT
  rationale: Temporal expression best rendered idiomatically as 'on the day,' preserving the concrete Hebrew phrasing.
- source_word: מָשְׁחוֹ אֹתָם
  chosen: he anointed them
  alternatives:
  - their being anointed
  - he consecrated them
  lexicon: HALOT
  rationale: 'The verb is specifically ''anoint,'' not the broader ''consecrate,'' though anointing functions as consecration in context. The 3ms suffix naturally refers to the LORD as subject: ''he anointed them.'''
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the people of Israel
  lexicon: HALOT
  rationale: Literally 'from the sons of Israel.' This identifies the source from whom these priestly dues come. 'Sons of Israel' preserves the formal covenantal expression; a more idiomatic alternative is noted.
- source_word: חֻקַּת עוֹלָם
  chosen: an everlasting statute
  alternatives:
  - a permanent statute
  - a perpetual statute
  lexicon: HALOT
  rationale: A standard legal formula in Torah. 'Statute' fits cultic/legal context better than 'rule.' 'Everlasting' preserves the force of עוֹלָם in covenantal legislation without overinterpreting philosophical eternity.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom expresses continuing applicability across successive generations. 'Throughout their generations' is both natural and close to the Hebrew.
