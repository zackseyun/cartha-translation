theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per project doctrine, the
    default rendering is 'the LORD' rather than a transliteration, unless a special
    contextual reason requires otherwise. No such reason is present here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of עוֹלָם in priestly legislation
  chosen_reading: everlasting statute
  alternative_readings:
  - perpetual statute
  - permanent statute
  rationale: The phrase should preserve the covenantal-legal weight of enduring obligation
    within Israel's generations without importing later theological claims beyond
    the text. 'Everlasting statute' is a conventional but still transparent rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
