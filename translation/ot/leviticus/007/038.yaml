id: LEV.7.38
reference: Leviticus 7:38
source:
  edition: WLC
  text: אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֶת מֹשֶׁ֖ה בְּ/הַ֣ר סִינָ֑י בְּ/י֨וֹם צַוֺּת֜/וֹ אֶת בְּנֵ֣י יִשְׂרָאֵ֗ל לְ/הַקְרִ֧יב אֶת קָרְבְּנֵי/הֶ֛ם לַ/יהוָ֖ה בְּ/מִדְבַּ֥ר סִינָֽי־־־׃פ
translation:
  text: which Yahweh commanded Moses on Mount Sinai, on the day when he commanded the sons of Israel to present their offerings to Yahweh in the wilderness of Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Israelites' or 'the people of Israel.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the preceding regulations/statute summary. 'Which' fits smooth modern English while preserving the relative connection.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave instructions to
  lexicon: HALOT
  rationale: Standard rendering of צוה in legal/cultic contexts. 'Commanded' preserves the authoritative force of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּהַר סִינָי
  chosen: on Mount Sinai
  alternatives:
  - at Mount Sinai
  lexicon: HALOT
  rationale: English idiom prefers 'on Mount Sinai' for בהר. This preserves the geographic reference naturally.
- source_word: בְּיוֹם
  chosen: on the day when
  alternatives:
  - in the day when
  - when
  lexicon: HALOT
  rationale: The temporal phrase is rendered idiomatically in English while retaining the Hebrew's explicit time reference.
- source_word: צַוֹּתוֹ
  chosen: he commanded
  alternatives:
  - his commanding
  lexicon: HALOT
  rationale: 'The infinitive construct with pronominal suffix is best expressed as a finite verbal clause in English for readability: ''when he commanded.'''
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Chosen to preserve the gendered and familial form of the Hebrew, in line with the doctrine's gender-accurate principle. 'Israelites' is possible but less formally transparent.
- source_word: לְהַקְרִיב
  chosen: to present
  alternatives:
  - to bring near
  - to offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to bring/present an offering. 'Present' is natural English and avoids redundancy with 'offerings' while preserving cultic sense.
- source_word: קָרְבְּנֵיהֶם
  chosen: their offerings
  alternatives:
  - their sacrifices
  - their gifts
  lexicon: HALOT
  rationale: קרבן is a broad sacrificial term. 'Offerings' is the most contextually inclusive rendering here, since the verse summarizes multiple kinds of sacrifices.
- source_word: בְּמִדְבַּר סִינָי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the Sinai wilderness
  - in the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert region. 'Wilderness of Sinai' is a clear and familiar geographic rendering.
