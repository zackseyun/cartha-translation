theological_decisions:
- issue: Rendering of sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - compensation offering
  rationale: The verse classifies a specific Levitical sacrifice. 'Guilt offering'
    best preserves the established cultic category in readable English without importing
    a narrower doctrinal interpretation. Because alternative renderings can highlight
    restitution/reparation aspects of the offering, they are preserved in a footnote
    rather than replacing the main text.
  doctrine_reference: Translation philosophy §§1, 5, 6
