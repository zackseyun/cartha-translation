id: LEV.7.1
reference: Leviticus 7:1
source:
  edition: WLC
  text: וְ/זֹ֥את תּוֹרַ֖ת הָ/אָשָׁ֑ם קֹ֥דֶשׁ קָֽדָשִׁ֖ים הֽוּא׃
translation:
  text: 'Now this is the law of the guilt offering: it is most holy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reparation offering' or 'compensation offering.' The Hebrew asham names
      a sacrifice associated with guilt and restitution.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  chosen: Now this
  alternatives:
  - And this
  - This
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative זֹאת introduces a new section or
    instruction. 'Now this' gives natural modern English while preserving the discourse-marking
    force better than a bare 'This'; 'And this' is more formally literal but less
    idiomatic in English section openings.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the ritual law of
  lexicon: HALOT
  rationale: תּוֹרָה here refers to the prescribed regulation/procedure for a sacrifice.
    'The law of' is the conventional and sufficiently clear rendering in sacrificial
    contexts, while remaining close to the Hebrew construct form.
- source_word: הָ/אָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  - the compensation offering
  lexicon: HALOT
  rationale: אָשָׁם in Leviticus denotes the specific sacrificial category commonly
    called the 'guilt offering.' This rendering is widely understood and preserves
    the moral/cultic dimension better than more specialized alternatives like 'reparation
    offering,' though that nuance is worth preserving in a footnote.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a holy thing of holy things
  lexicon: HALOT
  rationale: The superlative construction literally means 'holiness of holinesses'
    and idiomatically denotes the highest degree of holiness. 'Most holy' is clear,
    natural English and standard for sacrificial classifications. 'Holy of holies'
    is more literal but in English can be confused with the sanctuary space rather
    than a holiness classification.
- source_word: הוּא
  chosen: it is
  alternatives:
  - it
  - this is
  lexicon: HALOT
  rationale: The pronoun functions predicatively to identify the guilt offering as
    belonging to the category just named. English requires the copular expression
    'it is' for natural sense.
