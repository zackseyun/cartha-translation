id: LEV.7.22
reference: Leviticus 7:22
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + דבר introduces a new speech unit in narrative/legal discourse. 'Spoke' is the standard and slightly more formal rendering for דבר, while 'said' is possible but less precise here given the following לֵאמֹר formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent; 'unto' is archaic.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech-introduction formula after 'spoke.' 'Saying' preserves the Hebrew structure in readable English and signals that the content follows in the next verse.
