id: LEV.7.17
reference: Leviticus 7:17
source:
  edition: WLC
  text: וְ/הַ/נּוֹתָ֖ר מִ/בְּשַׂ֣ר הַ/זָּ֑בַח בַּ/יּוֹם֙ הַ/שְּׁלִישִׁ֔י בָּ/אֵ֖שׁ
    יִשָּׂרֵֽף׃
translation:
  text: But what remains of the meat of the sacrifice on the third day shall be burned
    in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flesh of the sacrifice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  chosen: But what remains
  alternatives:
  - And what is left
  - And the remainder
  lexicon: HALOT
  rationale: The conjunction plus passive participle introduces a continuation with
    contrastive/sequential force from the previous verse. 'What remains' renders the
    substantival participle naturally in English while preserving the sense of leftover
    portions.
- source_word: מִבְּשַׂר
  chosen: of the meat
  alternatives:
  - of the flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in sacrificial-food context 'meat'
    is clearer, more idiomatic modern English and does not lose the concrete sense.
- source_word: הַזָּבַח
  chosen: of the sacrifice
  alternatives:
  - of the offering
  - of the slaughtered sacrifice
  lexicon: HALOT
  rationale: זֶבַח refers to the sacrificial animal/rite. 'Sacrifice' is the most
    direct and natural rendering here in cultic context.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - by the third day
  - on day three
  lexicon: HALOT
  rationale: Standard temporal expression; 'on the third day' is the plain sense and
    idiomatic English.
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  lexicon: HALOT
  rationale: The preposition ב plus 'fire' is most straightforwardly rendered 'in
    the fire' here, matching the Hebrew expression for disposal by burning.
- source_word: יִשָּׂרֵף
  chosen: shall be burned
  alternatives:
  - must be burned
  - is to be burned
  lexicon: HALOT
  rationale: The Niphal imperfect here functions as an instruction/prescription. 'Shall
    be burned' preserves the passive form and legal tone without over-paraphrasing.
