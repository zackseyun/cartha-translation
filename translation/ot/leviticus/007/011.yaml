theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the technical sacrificial term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: No doctrinal dispute is at stake, but the term is semantically rich.
    'Peace offerings' preserves continuity with traditional English Bible usage while
    a footnote preserves a meaning-oriented alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
