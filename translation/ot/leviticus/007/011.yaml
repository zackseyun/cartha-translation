id: LEV.7.11
reference: Leviticus 7:11
source:
  edition: WLC
  text: וְ/זֹ֥את תּוֹרַ֖ת זֶ֣בַח הַ/שְּׁלָמִ֑ים אֲשֶׁ֥ר יַקְרִ֖יב לַ/יהוָֽה׃
translation:
  text: 'Now this is the law of the sacrifice of peace offerings that one may present
    to the LORD:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offerings of well-being'; traditionally 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  chosen: Now this
  alternatives:
  - And this
  - This
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative זֹאת introduces a new subsection.
    'Now this' is natural modern English that still marks discourse progression; 'And
    this' is more formally literal but less idiomatic here.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the regulation for
  lexicon: HALOT
  rationale: תּוֹרָה in priestly material often denotes prescribed ritual law/instruction.
    'The law of' preserves the formal, legal sense and matches the construct relationship
    with what follows.
- source_word: זֶבַח
  chosen: the sacrifice of
  alternatives:
  - the offering of
  - the slaughter-offering of
  lexicon: HALOT
  rationale: זֶבַח refers specifically to a sacrificial offering, often one involving
    slaughter. 'Sacrifice' is the clearest and most natural English rendering in this
    cultic context.
- source_word: הַ/שְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is a technical sacrificial term. 'Peace offerings' is the traditional
    and still intelligible rendering; alternatives such as 'fellowship offerings'
    or 'offerings of well-being' capture aspects of the term but are more interpretive.
    Because the semantic range includes wholeness/well-being as well as peace, an
    alternative is preserved in a footnote.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Simple relative marker introducing the clause modifying the sacrifice/offering.
    'That' is idiomatic modern English.
- source_word: יַקְרִיב
  chosen: one may present
  alternatives:
  - he presents
  - he brings near
  - he offers
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer. Although
    the Hebrew form is 3ms, it functions generically in legal material; 'one may present'
    avoids an unnecessarily male-specific English subject while preserving the representative
    force of the singular. 'Present' is chosen over 'offer' to avoid repeating 'offering'
    and to reflect the technical sense of bringing near to God.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition ל marks direction/dedication of the offering to YHWH.
