id: LEV.7.31
reference: Leviticus 7:31
source:
  edition: WLC
  text: וְ/הִקְטִ֧יר הַ/כֹּהֵ֛ן אֶת הַ/חֵ֖לֶב הַ/מִּזְבֵּ֑חָ/ה וְ/הָיָה֙ הֶֽ/חָזֶ֔ה
    לְ/אַהֲרֹ֖ן וּ/לְ/בָנָֽי/ו־׃
translation:
  text: The priest shall burn the fat on the altar, and the breast shall belong to
    Aaron and to his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall offer up the fat in smoke on the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to burning an offering
    on the altar, often with the sense of causing it to go up in smoke. 'Shall burn'
    is clear modern English and fits optimal equivalence; the more explicit smoke
    nuance is preserved as an alternative.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן in cultic contexts; singular matches the
    Hebrew.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: חֵלֶב in Levitical sacrificial law refers to the fat portions reserved
    for altar burning, not a generalized figurative sense.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending on מִזְבֵּחַ can be rendered 'to the altar,' but
    in English sacrificial idiom with הִקְטִיר the natural sense is that the fat is
    burned on the altar. This best communicates the ritual action.
- source_word: וְהָיָה
  chosen: shall belong
  alternatives:
  - shall be
  - shall become
  lexicon: HALOT
  rationale: Although literally 'and it shall be,' the idiom here indicates assignment
    or possession of the priestly portion. 'Shall belong' makes the legal sense explicit
    in natural English without adding content beyond the context.
- source_word: הֶחָזֶה
  chosen: the breast
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: In sacrificial legislation חָזֶה denotes the breast portion of the animal
    given to the priests. 'Breast' is the established and precise English term.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - for Aaron and for his sons
  lexicon: HALOT
  rationale: The lamed marks possession/allocation. 'To Aaron and to his sons' preserves
    the formal structure and indicates priestly entitlement.
