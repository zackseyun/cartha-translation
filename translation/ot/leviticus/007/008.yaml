theological_decisions:
- issue: Gender rendering of אִישׁ
  chosen_reading: a man's burnt offering
  alternative_readings:
  - someone's burnt offering
  - a person's burnt offering
  rationale: The Hebrew uses the singular masculine noun אִישׁ. Following the stated
    gender-accurate policy, the translation preserves 'man' rather than neutralizing
    the expression, since the verse does not require an inclusive recasting to make
    sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Cultic terminology for עֹלָה
  chosen_reading: burnt offering
  alternative_readings:
  - ascent offering
  rationale: While the root idea of עֹלָה relates to ascending, 'burnt offering' is
    the clearest and most contextually established English rendering in sacrificial
    law. This is a lexical-theological choice because it shapes how readers understand
    the ritual category.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
