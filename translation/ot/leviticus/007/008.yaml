id: LEV.7.8
reference: Leviticus 7:8
source:
  edition: WLC
  text: וְ/הַ֨/כֹּהֵ֔ן הַ/מַּקְרִ֖יב אֶת עֹ֣לַת אִ֑ישׁ ע֤וֹר הָֽ/עֹלָה֙ אֲשֶׁ֣ר הִקְרִ֔יב
    לַ/כֹּהֵ֖ן ל֥/וֹ יִהְיֶֽה־׃
translation:
  text: And the priest who presents a man's burnt offering—the skin of the burnt offering
    that he has presented—shall have it for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hide.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man's burnt offering'; the singular masculine is preserved rather
      than generalized.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priestly officiant
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in sacrificial legislation; definite article
    preserved.
- source_word: הַמַּקְרִיב / הִקְרִיב
  chosen: presents / has presented
  alternatives:
  - offers / has offered
  - brings near / has brought near
  lexicon: HALOT
  rationale: From קרב in the Hiphil, the cultic sense is to present or offer. 'Presents'
    keeps the ritual nuance without sounding overly technical; the perfect later in
    the verse is rendered 'has presented' to reflect completed action.
- source_word: עֹלַת אִישׁ
  chosen: a man's burnt offering
  alternatives:
  - the burnt offering of a man
  - someone's burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering. אִישׁ is singular masculine
    and is rendered gender-accurately as 'a man' per translation philosophy, rather
    than neutralizing to 'someone'.
- source_word: עֹור
  chosen: the skin
  alternatives:
  - the hide
  lexicon: HALOT
  rationale: Refers to the animal's skin/hide. 'Skin' is more natural modern English;
    'hide' is a viable lexical alternative but slightly more specialized.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: Consistent rendering of עֹלָה in Leviticus as 'burnt offering.' 'Ascent
    offering' is more etymologically transparent but less established and less clear
    in English.
- source_word: אֲשֶׁר הִקְרִיב
  chosen: that he has presented
  alternatives:
  - which he has offered
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'the burnt offering,' identifying
    the specific offering presented by the priest.
- source_word: לַכֹּהֵן לוֹ יִהְיֶה
  chosen: shall have it for himself
  alternatives:
  - shall belong to the priest
  - shall be his
  lexicon: HALOT
  rationale: The Hebrew states literally 'it shall be to the priest, to him.' English
    idiom requires supplying the object sense from context; 'shall have it for himself'
    makes explicit that the skin becomes the officiating priest's portion.
