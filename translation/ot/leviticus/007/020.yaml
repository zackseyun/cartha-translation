id: LEV.7.20
reference: Leviticus 7:20
source:
  edition: WLC
  text: וְ/הַ/נֶּ֜פֶשׁ אֲשֶׁר תֹּאכַ֣ל בָּשָׂ֗ר מִ/זֶּ֤בַח הַ/שְּׁלָמִים֙ אֲשֶׁ֣ר
    לַ/יהוָ֔ה וְ/טֻמְאָת֖/וֹ עָלָ֑י/ו וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מֵ/עַמֶּֽי/הָ־׃
translation:
  text: But the person who eats meat from the sacrifice of peace offerings that belongs
    to the LORD while his uncleanness is on him—that person shall be cut off from
    his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be excluded from his people'; the phrase 'shall be cut off' may
      refer to expulsion or to death, but the Hebrew does not specify the exact means
      here.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  chosen: the person
  alternatives:
  - the soul
  - the life
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ often refers to an individual person rather
    than the immaterial soul. 'Person' is natural English and fits the judicial context.
- source_word: תֹּאכַל
  chosen: eats
  alternatives:
  - shall eat
  - eats of
  lexicon: HALOT
  rationale: The imperfect here expresses a general case in casuistic law. Present-tense
    English ('who eats') best conveys the conditional legal sense.
- source_word: בָּשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: Though literally 'flesh,' in this sacrificial-food context 'meat' is
    clearer modern English without loss of meaning.
- source_word: מִזֶּבַח הַשְּׁלָמִים
  chosen: from the sacrifice of peace offerings
  alternatives:
  - from the sacrifice of fellowship offerings
  - from the peace offering sacrifice
  lexicon: HALOT
  rationale: זֶבַח plus שְׁלָמִים denotes the specific sacrificial category traditionally
    called 'peace offerings.' This preserves recognizable cultic terminology while
    remaining understandable.
- source_word: אֲשֶׁר לַיהוָה
  chosen: that belongs to the LORD
  alternatives:
  - that is for the LORD
  - which is the LORD's
  lexicon: HALOT
  rationale: The phrase marks the offering as consecrated to YHWH. 'Belongs to the
    LORD' clearly communicates sacred ownership in idiomatic English.
- source_word: טֻמְאָתוֹ עָלָיו
  chosen: while his uncleanness is on him
  alternatives:
  - while he is unclean
  - with his impurity upon him
  lexicon: HALOT
  rationale: The Hebrew idiom literally says the person's uncleanness is 'upon him.'
    This rendering preserves the imagery and legal force while remaining readable.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be excluded
  - shall be removed
  lexicon: HALOT
  rationale: The Niphal of כרת in covenantal/legal contexts is the standard formula
    for severe covenantal/judicial removal. 'Cut off' preserves the traditional and
    textually precise expression without over-interpreting the exact mode of punishment.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from her people
  - from among his kin
  lexicon: HALOT
  rationale: Although the governing noun נֶפֶשׁ is grammatically feminine, the suffix
    agrees grammatically rather than indicating biological sex. Since the following
    suffix in טֻמְאָתוֹ is masculine and the law is generic, 'his people' is the most
    natural gender-accurate English for the representative individual.
