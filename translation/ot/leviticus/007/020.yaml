theological_decisions:
- issue: Meaning of the penalty formula וְנִכְרְתָה ... מֵעַמֶּיהָ
  chosen_reading: shall be cut off from his people
  alternative_readings:
  - shall be excommunicated from his people
  - shall die/be put to death
  rationale: The Hebrew formula indicates severe removal from the covenant community,
    but the text itself does not specify the mechanism here. To preserve theological
    and legal ambiguity rather than resolve it, the main text keeps the formal expression
    'cut off,' with more interpretive alternatives reserved to a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
