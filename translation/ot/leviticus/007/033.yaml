theological_decisions:
- issue: Rendering of בְּנֵי אַהֲרֹן in priestly legislation
  chosen_reading: sons of Aaron
  alternative_readings:
  - descendants of Aaron
  - Aaron's family
  rationale: The Hebrew is explicitly masculine plural and refers concretely to the
    priestly males serving in the sacrificial system. Per the translation philosophy,
    gender-accurate wording is retained rather than neutralized.
