id: LEV.7.29
reference: Leviticus 7:29
source:
  edition: WLC
  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר הַ/מַּקְרִ֞יב אֶת זֶ֤בַח שְׁלָמָי/ו֙ לַ/יהוָ֔ה יָבִ֧יא אֶת קָרְבָּנ֛/וֹ לַ/יהוָ֖ה מִ/זֶּ֥בַח שְׁלָמָֽי/ו־־־׃
translation:
  text: 'Speak to the sons of Israel, saying: He who offers his sacrifice of peace offerings to Yahweh shall bring his offering to Yahweh from his sacrifice of peace offerings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his sacrifice of peace offerings'; traditionally 'peace offering,' and in some versions 'fellowship offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative of דבר introducing direct divine instruction to Moses; 'Speak' is the standard and sufficiently direct rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle, the masculine plural is preserved in the main text rather than flattened to 'Israelites,' while still carrying the collective covenantal sense.
- source_word: הַמַּקְרִיב
  chosen: The one who presents
  alternatives:
  - Whoever brings near
  - The one who offers
  lexicon: HALOT
  rationale: From קרב in the Hiphil, commonly used in sacrificial contexts for bringing/presenting an offering. 'Presents' is natural English and preserves the cultic sense without over-paraphrase.
- source_word: זֶבַח שְׁלָמָיו
  chosen: his peace sacrifice
  alternatives:
  - his sacrifice of peace offerings
  - his fellowship offering
  lexicon: HALOT
  rationale: זֶבַח is 'sacrifice,' and שְׁלָמִים refers to the well-being/peace offering category. 'Peace sacrifice' keeps the lexical connection to שׁלם more transparently than the traditional but interpretive 'fellowship offering.' Singular English is idiomatic here though the Hebrew form is plural in the technical term.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: יָבִיא
  chosen: shall bring
  alternatives:
  - must bring
  - is to bring
  lexicon: HALOT
  rationale: Hiphil imperfect here carries instruction/obligation within legal material. 'Shall bring' preserves the prescriptive force in a formal legal register.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his oblation
  lexicon: HALOT
  rationale: קרבן is the general term for an offering brought near to God. 'Offering' is the clearest modern equivalent.
- source_word: מִזֶּבַח שְׁלָמָיו
  chosen: from his peace sacrifice
  alternatives:
  - out of his peace offerings
  - from the sacrifice of his peace offerings
  lexicon: HALOT
  rationale: The preposition מִן indicates that the offering to be brought comes from, or out of, the peace sacrifice itself. 'From his peace sacrifice' is concise and preserves the relation between the general offering and the specific sacrificial animal/rite.
