theological_decisions:
- issue: Rendering of יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The covenant name is rendered according to the project's stated default, following Jewish reverence tradition and longstanding English convention while signaling the divine name distinctly.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of שְׁלָמִים terminology
  chosen_reading: peace sacrifice
  alternative_readings:
  - peace offering
  - fellowship offering
  rationale: The Hebrew term denotes the sacrificial category traditionally called 'peace offerings.' 'Peace sacrifice' preserves the lexical sense of שׁלם and the explicit sacrificial nature of זֶבַח, avoiding the more interpretive 'fellowship offering.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Gendered covenantal address
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural construct. Per the project's gender-accurate principle, the masculine form is retained in the main text rather than neutralized, while still understood corporately.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
