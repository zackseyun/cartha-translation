- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Technical sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - trespass offering
  rationale: The verse labels the sacrifice by its formal cultic category. 'Guilt offering' preserves the established Levitical category in accessible English without importing extra doctrinal nuance.
