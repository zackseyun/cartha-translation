id: LEV.7.5
reference: Leviticus 7:5
source:
  edition: WLC
  text: וְ/הִקְטִ֨יר אֹתָ֤/ם הַ/כֹּהֵן֙ הַ/מִּזְבֵּ֔חָ/ה אִשֶּׁ֖ה לַ/יהוָ֑ה אָשָׁ֖ם הֽוּא׃
translation:
  text: The priest shall burn them on the altar as a food offering to Yahweh; it is a guilt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire to the LORD.' The Hebrew term refers to an offering made by fire.
    reason: lexical_alternative
  - marker: b
    text: Or 'reparation offering' or traditionally 'trespass offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: Hiphil of קטר in sacrificial contexts denotes causing the offering to go up in smoke on the altar. 'Shall burn' is clear modern English; the altar context already implies sacrificial burning.
- source_word: אֹתָם
  chosen: them
  rationale: Direct-object pronoun referring back to the sacrificial portions specified in the immediate context.
- source_word: הַכֹּהֵן
  chosen: The priest
  lexicon: HALOT
  rationale: Definite singular noun; standard rendering in cultic legislation.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with מזבח can be rendered literally 'to the altar,' but in English sacrificial idiom 'on the altar' best conveys the action of burning the portions there.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: In Levitical sacrificial language this term refers to an offering made by fire. 'Food offering' is idiomatic modern English and reflects the technical cultic sense without archaic phrasing; the fire element remains implicit in the immediately preceding verb 'burn.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  rationale: The preposition marks dedication to YHWH. Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the offering formula naturally.
- source_word: אָשָׁם
  chosen: guilt offering
  alternatives:
  - reparation offering
  - trespass offering
  lexicon: HALOT
  rationale: In Leviticus this noun is the technical term for the asham sacrifice. 'Guilt offering' is the most established and transparent modern rendering; 'trespass offering' is traditional but less current, and 'reparation offering' highlights one aspect but is narrower.
- source_word: הוּא
  chosen: it is
  alternatives:
  - this is
  rationale: 'The pronoun identifies the sacrifice categorically: ''it is a guilt offering.'' This is the natural English equivalent of the Hebrew nominal clause.'
