id: LEV.7.23
reference: Leviticus 7:23
source:
  edition: WLC
  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר כָּל חֵ֜לֶב שׁ֥וֹר וְ/כֶ֛שֶׂב וָ/עֵ֖ז
    לֹ֥א תֹאכֵֽלוּ־־׃
translation:
  text: 'Speak to the sons of Israel, saying: You shall not eat any fat of an ox,
    a sheep, or a goat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites.' The Hebrew reads 'the sons of
      Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Piel imperative 2ms of דבר, a direct command to Moses. 'Speak' preserves
    the formal force and matches the common legal formula in Leviticus.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per translation philosophy, gender-accurate
    renderings are preferred where the source is masculine with representative force.
    Here it denotes the covenant people collectively, so the literal form is retained
    rather than the more idiomatic 'Israelites.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction infinitive. 'Saying' preserves the
    formal structure of the command formula.
- source_word: כָּל
  chosen: any
  alternatives:
  - all
  lexicon: HALOT
  rationale: In prohibition with a mass noun, English idiom prefers 'any fat' rather
    than 'all fat,' while preserving the comprehensive scope.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - suet
  lexicon: HALOT
  rationale: The plain sense is animal fat, especially the fat portions treated in
    sacrificial law. 'Fat' is the clearest modern English equivalent; 'suet' is too
    narrow and less accessible.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שור is a bovine animal; 'ox' is a standard singular rendering in legal
    lists. 'Bull' is more sex-specific than the Hebrew requires here, and 'cattle'
    would be collective rather than matching the singular sequence.
- source_word: כֶשֶׂב
  chosen: sheep
  alternatives:
  - lamb
  - ram
  lexicon: HALOT
  rationale: כֶשֶׂב can denote a sheep from the flock more generally. 'Sheep' best
    fits the generic legal category here; 'lamb' or 'ram' would over-specify.
- source_word: עֵז
  chosen: goat
  alternatives:
  - female goat
  lexicon: HALOT
  rationale: Though grammatically feminine, עֵז functions as the standard term for
    goat in such livestock lists. 'Goat' is the natural generic English rendering.
- source_word: לֹא תֹאכֵלוּ
  chosen: You shall not eat
  alternatives:
  - Do not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is well rendered as 'you
    shall not,' which communicates covenantal prohibition more naturally in English
    legal style than a bare imperative.
