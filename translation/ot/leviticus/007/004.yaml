id: LEV.7.4
reference: Leviticus 7:4
source:
  edition: WLC
  text: וְ/אֵת֙ שְׁתֵּ֣י הַ/כְּלָיֹ֔ת וְ/אֶת הַ/חֵ֨לֶב֙ אֲשֶׁ֣ר עֲלֵי/הֶ֔ן אֲשֶׁ֖ר
    עַל הַ/כְּסָלִ֑ים וְ/אֶת הַ/יֹּתֶ֨רֶת֙ עַל הַ/כָּבֵ֔ד עַל הַ/כְּלָיֹ֖ת יְסִירֶֽ/נָּה־־־־־׃
translation:
  text: and the two kidneys, and the fat that is on them, which is on the loins, and
    the appendage on the liver, along with the kidneys, he shall remove.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lobe on the liver'; the Hebrew term for this anatomical part is
      technical and its precise referent is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  alternatives:
  - the two reins
  lexicon: HALOT
  rationale: כְּלָיֹת plainly denotes the kidneys in sacrificial anatomy. 'Reins'
    is traditional/archaic English and less clear for modern readers.
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the suet
  lexicon: HALOT
  rationale: חֵלֶב in Levitical sacrificial contexts refers to the fatty portions
    reserved for offering. 'Fat' is the clearest modern rendering; 'suet' is possible
    but narrower and less natural.
- source_word: אֲשֶׁר עֲלֵיהֶן
  chosen: that is on them
  alternatives:
  - that covers them
  lexicon: HALOT
  rationale: The preposition עַל with the relative clause most directly means 'on/upon
    them.' 'Covers them' is interpretive and not required by the Hebrew.
- source_word: הַכְּסָלִים
  chosen: the loins
  alternatives:
  - the flanks
  lexicon: HALOT
  rationale: כְּסָלִים refers to the region of the loins/flanks near the kidneys.
    'Loins' preserves the anatomical sense common in sacrificial descriptions; 'flanks'
    is possible but less specific.
- source_word: הַיֹּתֶרֶת
  chosen: the appendage
  alternatives:
  - the lobe
  - the long lobe
  lexicon: HALOT
  rationale: יוֹתֶרֶת is a technical anatomical term in sacrificial legislation, traditionally
    understood as a protruding appendage of the liver. 'Appendage' avoids overprecision
    where the exact anatomy is debated, while remaining concrete.
- source_word: עַל הַכָּבֵד
  chosen: on the liver
  alternatives:
  - over the liver
  - attached to the liver
  lexicon: HALOT
  rationale: עַל most simply means 'on/upon.' 'Attached to' is explanatory; 'over'
    is possible but less direct in English here.
- source_word: עַל הַכְּלָיֹת
  chosen: along with the kidneys
  alternatives:
  - beside the kidneys
  - by the kidneys
  lexicon: HALOT
  rationale: In this sacrificial formula, the phrase indicates that the liver appendage
    is removed together with/at the kidneys. 'Along with the kidneys' communicates
    the procedural relation more naturally than a strictly spatial gloss.
- source_word: יְסִירֶנָּה
  chosen: he shall remove
  alternatives:
  - he is to remove
  - he shall take it away
  lexicon: HALOT
  rationale: 'Hiphil of סור here is a procedural instruction in sacrificial law: the
    officiant removes these portions. Singular English ''remove'' works idiomatically
    even though the suffix refers collectively to the listed parts.'
