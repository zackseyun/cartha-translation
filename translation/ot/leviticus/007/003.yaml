id: LEV.7.3
reference: Leviticus 7:3
source:
  edition: WLC
  text: וְ/אֵ֥ת כָּל חֶלְבּ֖/וֹ יַקְרִ֣יב מִמֶּ֑/נּוּ אֵ֚ת הָֽ/אַלְיָ֔ה וְ/אֶת הַ/חֵ֖לֶב
    הַֽ/מְכַסֶּ֥ה אֶת הַ/קֶּֽרֶב־־־׃
translation:
  text: 'And from it he shall present all its fat: the fat tail and the fat that covers
    the entrails.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall offer.' The Hebrew verb can denote presenting or offering a sacrificial
      portion.
    reason: lexical_alternative
  - marker: b
    text: That is, the sheep's fatty tail, a specific sacrificial fat portion.
    reason: cultural_note
lexical_decisions:
- source_word: חֶלְבּוֹ / הַחֵלֶב
  chosen: its fat / the fat
  alternatives:
  - fatty parts
  lexicon: HALOT
  rationale: חֵלֶב in sacrificial contexts refers specifically to the fat portions
    designated for offering. 'Fat' is the standard and sufficiently precise rendering
    here; 'fatty parts' is possible but less direct.
- source_word: יַקְרִיב
  chosen: shall present
  alternatives:
  - shall offer
  - shall bring near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial legislation commonly means to present
    or offer an item to God. 'Shall present' preserves the ritual sense without over-specifying
    the stage of the rite; 'offer' is also viable.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The suffix most naturally refers to the sacrificial animal in context,
    not the worshiper. English 'from it' makes the referent clear and fits the immediate
    listing of animal parts.
- source_word: הָאַלְיָה
  chosen: the fat tail
  alternatives:
  - the whole tail
  - the broad tail
  lexicon: HALOT
  rationale: אַלְיָה denotes the fatty tail of a sheep, a specific prized fat portion
    in sacrificial texts. 'Fat tail' is more precise than simply 'tail' and reflects
    the anatomical-sacrificial focus.
- source_word: הַמְכַסֶּה אֶת־הַקֶּרֶב
  chosen: that covers the entrails
  alternatives:
  - that covers the inner parts
  - that covers the inward parts
  lexicon: HALOT
  rationale: קֶרֶב here refers to the inner organs/viscera of the animal. 'Entrails'
    is natural modern English and suitably concrete for the sacrificial anatomy; 'inner
    parts' is possible but less vivid and slightly less specific.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כָּל emphasizes the entirety of the designated fat portions. 'All' is
    the straightforward rendering.
