id: LEV.7.13
reference: Leviticus 7:13
source:
  edition: WLC
  text: עַל חַלֹּת֙ לֶ֣חֶם חָמֵ֔ץ יַקְרִ֖יב קָרְבָּנ֑/וֹ עַל זֶ֖בַח תּוֹדַ֥ת שְׁלָמָֽי/ו־־׃
translation:
  text: Along with cakes of leavened bread, he shall present his offering with the
    sacrifice of his peace offerings for thanksgiving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his fellowship offerings' or 'his offerings of well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: along with
  alternatives:
  - with
  - upon
  lexicon: HALOT
  rationale: Here עַל introduces accompaniment rather than physical position. 'Along
    with' best conveys that the offering is presented in addition to the previously
    mentioned cakes.
- source_word: חַלֹּת לֶחֶם
  chosen: cakes of bread
  alternatives:
  - loaves of bread
  - bread cakes
  lexicon: HALOT
  rationale: חַלּוֹת commonly refers to cakes/loaves. 'Cakes of bread' fits the sacrificial-food
    context and pairs naturally with the following modifier 'leavened.'
- source_word: חָמֵץ
  chosen: leavened
  alternatives:
  - with yeast
  - fermented
  lexicon: HALOT
  rationale: The standard cultic term for bread made with leaven. 'Leavened' is concise
    and preserves the ritual contrast with unleavened items in the surrounding verses.
- source_word: יַקְרִיב
  chosen: he shall present
  alternatives:
  - he shall bring near
  - he shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts means to present/offer. 'Present'
    avoids overusing 'offer' when קָרְבָּן follows and keeps the action distinct from
    the noun.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his oblation
  lexicon: HALOT
  rationale: קָרְבָּן is the general term for an offering brought near to God. 'Offering'
    is the clearest modern English equivalent.
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - slaughtered offering
  lexicon: HALOT
  rationale: In sacrificial legislation זֶבַח is well rendered 'sacrifice.' The more
    literal 'slaughtered offering' is awkward in English here.
- source_word: תּוֹדַת
  chosen: for thanksgiving
  alternatives:
  - of thanksgiving
  - thank offering
  lexicon: HALOT
  rationale: The construct with זֶבַח and the following phrase is naturally expressed
    as a sacrifice characterized by thanksgiving. 'For thanksgiving' reads smoothly
    while preserving the sense of תודה.
- source_word: שְׁלָמָיו
  chosen: his peace offerings
  alternatives:
  - his fellowship offerings
  - his offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is a technical sacrificial term. 'Peace offerings' preserves
    traditional continuity and the lexical connection to peace/wholeness; alternatives
    are viable but less established.
