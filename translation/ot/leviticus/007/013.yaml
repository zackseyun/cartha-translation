theological_decisions:
- issue: Rendering of שְׁלָמִים sacrificial term
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The Hebrew term denotes a class of sacrifices associated with peace,
    wholeness, and shared communion. 'Peace offerings' is retained as the main text
    rendering for recognizability and lexical continuity, while preserving common
    alternatives in a footnote-worthy record.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
