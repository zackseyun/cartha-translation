theological_decisions:
- issue: Meaning of the covenant sanction 'cut off'
  chosen_reading: Retain the formal expression 'shall be cut off' without specifying
    death, excommunication, or divine judgment.
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  - shall be destroyed by God
  rationale: The Hebrew formula is intentionally terse and has been interpreted in
    multiple ways. The translation should preserve the text's own ambiguity rather
    than resolve a debated legal/theological question beyond what the wording states.
  doctrine_reference: Preserve theological tension rather than resolve it.
