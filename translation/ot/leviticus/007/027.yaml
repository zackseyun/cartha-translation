id: LEV.7.27
reference: Leviticus 7:27
source:
  edition: WLC
  text: כָּל נֶ֖פֶשׁ אֲשֶׁר תֹּאכַ֣ל כָּל דָּ֑ם וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא
    מֵֽ/עַמֶּֽי/הָ־־־׃פ
translation:
  text: Every person who eats any blood—that person shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul.' Hebrew nephesh here refers to the individual person.
    reason: lexical_alternative
  - marker: b
    text: The expression 'shall be cut off' is a standard covenant penalty formula;
      it may imply removal from the community or divine judgment, and the Hebrew does
      not specify the exact mode here.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  - creature
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ commonly refers to an individual person rather
    than the immaterial 'soul.' 'Person' is natural English and fits the sanction
    formula.
- source_word: תֹּאכַל
  chosen: eats
  alternatives:
  - shall eat
  - consumes
  lexicon: HALOT
  rationale: 'The imperfect in this relative clause expresses a general case: ''who
    eats.'' Present-tense English communicates the legal/general force idiomatically.'
- source_word: כָּל דָּם
  chosen: any blood
  alternatives:
  - all blood
  - blood of any kind
  lexicon: HALOT
  rationale: The combination of כָּל with an uncountable noun here is best rendered
    distributively as 'any blood,' meaning blood in whatever form, not 'all blood'
    in a totalizing sense.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be cut down
  - shall be excluded
  - shall be removed
  lexicon: HALOT
  rationale: This is the standard covenantal/judicial formula for כרת in the Niphal.
    'Cut off' preserves the established idiom and its deliberate ambiguity regarding
    the exact mode of judgment.
- source_word: הַנֶּפֶשׁ הַהִוא
  chosen: that person
  alternatives:
  - that soul
  - that life
  lexicon: HALOT
  rationale: The repeated noun plus demonstrative adds emphasis and resumes the offender
    identified in the first clause. 'That person' preserves the emphatic legal reference
    in idiomatic English.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from her people
  - from its people
  - from among his kin
  lexicon: HALOT
  rationale: The Hebrew suffix is grammatically feminine because נֶפֶשׁ is feminine,
    not because the law applies only to women. English should reflect the generic
    individual sense. 'His people' is a conventional gender-accurate generic in legal
    style; the sanction means removal from one's covenant community.
