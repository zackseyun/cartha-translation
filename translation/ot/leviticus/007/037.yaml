id: LEV.7.37
reference: Leviticus 7:37
source:
  edition: WLC
  text: זֹ֣את הַ/תּוֹרָ֗ה לָֽ/עֹלָה֙ לַ/מִּנְחָ֔ה וְ/לַֽ/חַטָּ֖את וְ/לָ/אָשָׁ֑ם וְ/לַ֨/מִּלּוּאִ֔ים
    וּ/לְ/זֶ֖בַח הַ/שְּׁלָמִֽים׃
translation:
  text: This is the law for the burnt offering, the grain offering, the sin offering,
    the guilt offering, the ordination offering, and the sacrifice of peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering.' The Hebrew term can emphasize
      removal of impurity as well as dealing with sin.
    reason: lexical_alternative
  - marker: b
    text: Or 'reparation offering' for 'guilt offering.' The Hebrew term can stress
      liability and required restitution.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'ordination rites' or 'consecration offering'; the term is plural
      and refers to priestly installation procedures.
    reason: lexical_alternative
  - marker: d
    text: Or 'the sacrifice of fellowship offerings' or 'the sacrifice of well-being
      offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing a summary statement; English
    supplies 'is' naturally.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  lexicon: HALOT
  rationale: In sacrificial/legal context, תּוֹרָה refers to the prescribed law/instruction
    governing these offerings. 'Law' is concise and idiomatic here, while 'instruction'
    remains a viable alternative.
- source_word: לָעֹלָה
  chosen: for the burnt offering
  alternatives:
  - concerning the burnt offering
  lexicon: HALOT
  rationale: 'The prefixed ל marks reference/scope: this law pertains to the burnt
    offering. ''Burnt offering'' is the standard and accurate rendering of עֹלָה.'
- source_word: לַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the tribute offering
  - the gift offering
  lexicon: HALOT
  rationale: מִנְחָה in Leviticus denotes the cereal/grain offering. 'Grain offering'
    is the clearest modern rendering in cultic context.
- source_word: וְלַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either sin or the offering dealing with sin/impurity.
    Traditional 'sin offering' is retained in the main text for recognizability, while
    'purification offering' is a strong lexical alternative worth preserving.
- source_word: וְלָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial context refers to the offering associated with
    guilt/liability. 'Guilt offering' is standard; 'reparation offering' highlights
    compensatory nuance.
- source_word: וְלַמִּלּוּאִים
  chosen: the ordination offering
  alternatives:
  - the ordination rites
  - the filling rites
  - the consecration offering
  lexicon: HALOT
  rationale: מִלּוּאִים literally relates to 'fillings' and in priestly context refers
    to ordination/consecration rites, especially the installation offering/ritual.
    Singular 'ordination offering' fits the English list structure, though the Hebrew
    form is plural and may encompass rites more broadly.
- source_word: וּלְזֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the sacrifice of well-being offerings
  lexicon: HALOT
  rationale: זֶבַח is specifically 'sacrifice,' with הַשְּׁלָמִים naming the category
    often rendered 'peace offerings.' 'Peace offerings' preserves traditional terminology;
    'fellowship' or 'well-being' capture aspects of the semantic range but are less
    literal.
