id: LEV.7.12
reference: Leviticus 7:12
source:
  edition: WLC
  text: אִ֣ם עַל תּוֹדָה֮ יַקְרִיבֶ/נּוּ֒ וְ/הִקְרִ֣יב עַל זֶ֣בַח הַ/תּוֹדָ֗ה חַלּ֤וֹת
    מַצּוֹת֙ בְּלוּלֹ֣ת בַּ/שֶּׁ֔מֶן וּ/רְקִיקֵ֥י מַצּ֖וֹת מְשֻׁחִ֣ים בַּ/שָּׁ֑מֶן
    וְ/סֹ֣לֶת מֻרְבֶּ֔כֶת חַלֹּ֖ת בְּלוּלֹ֥ת בַּ/שָּֽׁמֶן־׀־׃
translation:
  text: If he offers it as a thanksgiving offering, then with the sacrifice of thanksgiving
    he shall offer unleavened loaves mixed with oil, unleavened wafers spread with
    oil, and cakes of fine flour well mixed with oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thank offering.' The Hebrew תּוֹדָה refers to an offering brought in
      thanksgiving.
    reason: lexical_alternative
  - marker: b
    text: Or 'anointed with oil.' Here the phrase refers to oil applied to the unleavened
      wafers in food preparation, not a ritual anointing of persons or objects.
    reason: lexical_alternative
  - marker: c
    text: The exact preparation implied by the Hebrew term rendered 'well mixed' is
      uncertain; it may refer to cakes made from fine flour thoroughly worked or mixed
      with oil.
    reason: cultural_note
lexical_decisions:
- source_word: תּוֹדָה
  chosen: thanksgiving offering
  alternatives:
  - thank offering
  - praise offering
  lexicon: HALOT
  rationale: תּוֹדָה denotes thanksgiving or confession; in this sacrificial context
    it specifies a subtype of the peace offering characterized by thanksgiving. 'Thanksgiving
    offering' is clear modern English and preserves the semantic force better than
    the more traditional but less transparent 'thank offering.'
- source_word: יַקְרִיבֶנּוּ
  chosen: he offers it
  alternatives:
  - he presents it
  - he brings it near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present or
    offer a sacrifice. 'Offers it' is the most natural English in context and keeps
    the sacrificial sense explicit.
- source_word: זֶבַח הַתּוֹדָה
  chosen: the sacrifice of thanksgiving
  alternatives:
  - the thanksgiving sacrifice
  lexicon: HALOT
  rationale: זֶבַח is the sacrificial act/offering, with הַתּוֹדָה specifying its
    type. 'The sacrifice of thanksgiving' is slightly more formal and mirrors the
    Hebrew construct relation clearly.
- source_word: חַלּוֹת מַצּוֹת
  chosen: unleavened loaves
  alternatives:
  - cakes of unleavened bread
  - unleavened cakes
  lexicon: HALOT
  rationale: חַלּוֹת are bread-cakes/loaves; מַצּוֹת marks them as unleavened. 'Unleavened
    loaves' is concise and natural while preserving both elements.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participle from בלל indicates mixing or mingling ingredients. 'Mixed
    with oil' is idiomatic modern English; 'mingled' is accurate but archaic in tone.
- source_word: רְקִיקֵי מַצּוֹת
  chosen: unleavened wafers
  alternatives:
  - wafers of unleavened bread
  - thin unleavened cakes
  lexicon: HALOT
  rationale: רְקִיקִים are thin cakes or wafers. 'Unleavened wafers' captures both
    the thinness implied by the noun and the unleavened character from מַצּוֹת.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  chosen: spread with oil
  alternatives:
  - anointed with oil
  - smeared with oil
  lexicon: HALOT
  rationale: The passive participle from משׁח literally means anointed/smeared. In
    a food-preparation context, 'spread with oil' communicates the culinary action
    without importing ceremonial overtones that 'anointed' might suggest.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is fine flour, a standard sacrificial ingredient. 'Fine flour'
    is the conventional and accurate rendering.
- source_word: מֻרְבֶּכֶת
  chosen: well mixed
  alternatives:
  - soaked
  - kneaded
  - mixed
  lexicon: HALOT
  rationale: The form likely denotes flour prepared by mixing, often with oil, into
    a richer dough. Because the exact culinary nuance is uncertain, 'well mixed' is
    a cautious rendering that fits the immediate context and avoids overprecision.
- source_word: חַלֹּת
  chosen: cakes
  alternatives:
  - loaves
  lexicon: HALOT
  rationale: The second occurrence of חַלֹּת refers to prepared bread items made from
    fine flour. 'Cakes' helps distinguish this third item from the earlier 'loaves'
    and reflects the smaller prepared units often intended in sacrificial legislation.
