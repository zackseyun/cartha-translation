theological_decisions:
- issue: Rendering of sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - compensation offering
  rationale: The verse is procedural rather than doctrinal, so the translation should
    preserve the established sacrificial category without importing a narrower theological
    interpretation. 'Guilt offering' is conventional and understandable, while the
    restitution nuance is acknowledged in alternatives.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
