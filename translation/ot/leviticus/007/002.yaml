id: LEV.7.2
reference: Leviticus 7:2
source:
  edition: WLC
  text: בִּ/מְק֗וֹם אֲשֶׁ֤ר יִשְׁחֲטוּ֙ אֶת הָ֣/עֹלָ֔ה יִשְׁחֲט֖וּ אֶת הָ/אָשָׁ֑ם
    וְ/אֶת דָּמ֛/וֹ יִזְרֹ֥ק עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־־׃
translation:
  text: In the place where they slaughter the burnt offering, they shall slaughter
    the guilt offering, and he shall splash its blood against the altar on all sides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reparation offering' or 'compensation offering.' The Hebrew term emphasizes
      both guilt and the making of restitution.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְקוֹם
  chosen: In the place
  alternatives:
  - At the place
  - In the المكان
  lexicon: HALOT
  rationale: מָקוֹם denotes a place/location. 'In the place' preserves the Hebrew
    preposition and the procedural specificity of sacrificial instructions.
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - that
  - in which
  lexicon: HALOT
  rationale: Relative particle introducing the location clause; 'where' is the most
    natural English equivalent with a locative antecedent.
- source_word: יִשְׁחֲטוּ
  chosen: they slaughter
  alternatives:
  - they kill
  - they butcher
  lexicon: HALOT
  rationale: שָׁחַט in sacrificial contexts refers specifically to ritual slaughter.
    'Slaughter' is precise and appropriately cultic without being overly technical.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascending offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard term for the whole burnt offering. 'Burnt offering'
    is the established and accurate rendering in Levitical sacrificial legislation.
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  - the compensation offering
  lexicon: HALOT
  rationale: אָשָׁם can denote both guilt and the offering associated with reparation.
    'Guilt offering' is the most recognizable English rendering, while alternatives
    capture the restitution nuance; these are preserved as lexical alternatives.
- source_word: דָּמוֹ
  chosen: its blood
  alternatives:
  - the blood of it
  lexicon: HALOT
  rationale: The suffix refers to the guilt offering animal. English idiom prefers
    'its blood' over a more wooden possessive construction.
- source_word: יִזְרֹק
  chosen: he shall splash
  alternatives:
  - he shall throw
  - he shall sprinkle
  lexicon: HALOT
  rationale: זָרַק in priestly sacrificial procedure commonly refers to tossing/splashing
    blood against the altar rather than the lighter motion often implied by 'sprinkle.'
    'Splash' best captures the ritual action in contemporary English.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With blood manipulation, עַל can indicate application onto/against the
    altar's surface. 'Against the altar' fits the action of זָרַק more naturally in
    English.
- source_word: סָבִיב
  chosen: on all sides
  alternatives:
  - all around
  - around it
  lexicon: HALOT
  rationale: סָבִיב indicates surrounding circumference. 'On all sides' clearly communicates
    that the blood is applied around the altar.
