theological_decisions:
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the divine name as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: This is not a doctrinally contested term in the provided table, but it
    carries interpretive nuance. 'Peace offerings' preserves the established sacrificial
    category without narrowing it to only communal fellowship or broadening it to
    an abstract state of well-being.
