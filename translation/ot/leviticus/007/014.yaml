id: LEV.7.14
reference: Leviticus 7:14
source:
  edition: WLC
  text: וְ/הִקְרִ֨יב מִמֶּ֤/נּוּ אֶחָד֙ מִ/כָּל קָרְבָּ֔ן תְּרוּמָ֖ה לַ/יהוָ֑ה לַ/כֹּהֵ֗ן
    הַ/זֹּרֵ֛ק אֶת דַּ֥ם הַ/שְּׁלָמִ֖ים ל֥/וֹ יִהְיֶֽה־־׃
translation:
  text: And from it he shall present one from each offering as a contribution to the
    LORD; it shall belong to the priest who throws the blood of the peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a heave offering to the LORD.' The Hebrew term refers to a portion
      set apart for God and assigned to the priest.
    reason: lexical_alternative
  - marker: b
    text: Or 'who dashes' or 'who sprinkles' the blood of the peace offerings.
    reason: lexical_alternative
  - marker: c
    text: '''Peace offerings'' may also be rendered ''fellowship offerings'' or ''offerings
      of well-being.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: he shall present
  alternatives:
  - he shall offer
  - he shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near/present as an offering. 'Present'
    fits sacrificial context in clear modern English without over-specifying a technical
    ritual nuance beyond the Hebrew.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from them
  - from this
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the thanksgiving sacrifice components
    just mentioned collectively. Singular 'it' reflects the Hebrew form while still
    naturally referring to the offering complex as a unit.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one portion
  - a single item
  lexicon: HALOT
  rationale: The Hebrew simply says 'one'; English leaves the object implicit, supplied
    by context as one item/portion from the offerings.
- source_word: מִכָּל קָרְבָּן
  chosen: from each offering
  alternatives:
  - out of every offering
  - from all the offering
  lexicon: HALOT
  rationale: Literally 'from every offering.' In context, the worshiper selects one
    piece from each kind of bread mentioned in the previous verse. 'From each offering'
    communicates distributive force naturally.
- source_word: תְּרוּמָה
  chosen: as a contribution
  alternatives:
  - as a heave offering
  - as an offering set apart
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution lifted off/set apart for Yahweh and
    given to the priest. 'Contribution' is accessible modern English; the more traditional
    'heave offering' is historically familiar but obscure to many readers and too
    technical for the main text.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' 'To' reflects
    the lamed naturally in this dedicatory context.
- source_word: לַכֹּהֵן
  chosen: to the priest
  alternatives:
  - for the priest
  lexicon: HALOT
  rationale: Marks the recipient of the dedicated portion. 'To the priest' is straightforward
    and preserves the dative sense.
- source_word: הַזֹּרֵק
  chosen: who throws
  alternatives:
  - who sprinkles
  - who dashes
  lexicon: HALOT
  rationale: The participle from זרק refers to tossing/dashing sacrificial blood against
    the altar. 'Throws' is the most direct lexical equivalent, though in sacrificial
    English 'dashes' is also possible. Chosen to stay close to the Hebrew while remaining
    readable.
- source_word: אֶת דַּם הַשְּׁלָמִים
  chosen: the blood of the peace offerings
  alternatives:
  - the blood of the fellowship offerings
  - the blood of the offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings'; alternatives stress fellowship
    or well-being. 'Peace offerings' is retained for continuity and because it remains
    a recognizable technical term in English Bible usage.
- source_word: לוֹ יִהְיֶה
  chosen: it shall belong to
  alternatives:
  - it shall be his
  - it shall be for him
  lexicon: HALOT
  rationale: This idiom indicates possession/allotment. 'It shall belong to' expresses
    the legal entitlement clearly in modern English.
