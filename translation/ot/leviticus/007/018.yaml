id: LEV.7.18
reference: Leviticus 7:18
source:
  edition: WLC
  text: וְ/אִ֣ם הֵאָכֹ֣ל יֵ֠אָכֵל מִ/בְּשַׂר זֶ֨בַח שְׁלָמָ֜י/ו בַּ/יּ֣וֹם הַ/שְּׁלִישִׁי֮
    לֹ֣א יֵרָצֶה֒ הַ/מַּקְרִ֣יב אֹת֗/וֹ לֹ֧א יֵחָשֵׁ֛ב ל֖/וֹ פִּגּ֣וּל יִהְיֶ֑ה וְ/הַ/נֶּ֛פֶשׁ
    הָ/אֹכֶ֥לֶת מִמֶּ֖/נּוּ עֲוֺנָ֥/הּ תִּשָּֽׂא־׃
translation:
  text: But if any of the flesh of his peace offering is eaten on the third day, it
    will not be accepted; it will not be credited to the one who offers it. It will
    be an offensive thing, and the person who eats from it will bear his guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tainted meat' / 'foul thing.' The Hebrew term is a technical sacrificial
      word for an offering rendered unacceptable and loathsome.
    reason: lexical_alternative
  - marker: b
    text: '''Peace offering'' may also be rendered ''fellowship offering'' or ''offering
      of well-being.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding regulation. 'But
    if' captures both the conjunction and the adversative force in context better
    than a bare 'if'.
- source_word: הֵאָכֹל יֵאָכֵל
  chosen: is eaten
  alternatives:
  - is indeed eaten
  - should be eaten
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. In
    English, a simple passive 'is eaten' is the most natural optimal-equivalence rendering;
    the emphasis is carried by context rather than awkward duplication.
- source_word: מִבְּשַׂר
  chosen: any of the flesh
  alternatives:
  - from the flesh
  - any of the meat
  lexicon: HALOT
  rationale: The partitive preposition מִן is reflected by 'any of.' 'Flesh' is more
    formally aligned with בשר in sacrificial contexts, though 'meat' is possible in
    contemporary English.
- source_word: זֶבַח שְׁלָמָיו
  chosen: his peace offering
  alternatives:
  - his fellowship offering
  - his offering of well-being
  lexicon: HALOT
  rationale: זבח שלמים denotes the specific sacrifice traditionally called the 'peace
    offering.' 'Fellowship offering' and 'offering of well-being' are viable, but
    'peace offering' preserves continuity and the semantic field of שלם without over-paraphrase.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on day three
  lexicon: HALOT
  rationale: Straightforward temporal phrase; standard idiomatic English is 'on the
    third day.'
- source_word: לֹא יֵרָצֶה
  chosen: it will not be accepted
  alternatives:
  - it will not be pleasing
  - it will not find favor
  lexicon: HALOT
  rationale: The Niphal of רצה in sacrificial contexts commonly refers to acceptability
    before God. 'Accepted' is concise and contextually precise.
- source_word: הַמַּקְרִיב אֹתוֹ
  chosen: the one who offers it
  alternatives:
  - the offerer of it
  - the one presenting it
  lexicon: HALOT
  rationale: Refers to the worshiper who brings/presents the sacrifice. 'The one who
    offers it' is natural modern English while preserving the participial sense.
- source_word: לֹא יֵחָשֵׁב לוֹ
  chosen: it will not be credited to
  alternatives:
  - it will not be counted for
  - it will not be reckoned to
  lexicon: HALOT
  rationale: חשב with ל conveys accounting/imputation language. 'Credited to' is clear
    modern English and preserves the forensic/accounting nuance.
- source_word: פִּגּוּל
  chosen: an offensive thing
  alternatives:
  - tainted meat
  - foul thing
  - abomination
  lexicon: HALOT
  rationale: This technical sacrificial term denotes something rendered unacceptable,
    defiled, or loathsome in the cultic sense. 'Offensive thing' preserves the evaluative
    force without importing a narrower technical term unfamiliar to modern readers.
    Because the term is difficult and specialized, an alternative is preserved in
    a footnote.
- source_word: וְהַנֶּפֶשׁ
  chosen: and the person
  alternatives:
  - and the soul
  - and the one
  lexicon: HALOT
  rationale: נפש here refers to the individual person rather than the immaterial soul
    as distinct from body. 'Person' best matches the idiomatic legal sense in English.
- source_word: הָאֹכֶלֶת מִמֶּנּוּ
  chosen: who eats from it
  alternatives:
  - who eats any of it
  - who eats of it
  lexicon: HALOT
  rationale: A relative participial clause describing the violator. 'From it' reflects
    the preposition and is natural English.
- source_word: עֲוֺנָהּ תִּשָּׂא
  chosen: will bear his guilt
  alternatives:
  - will bear her guilt
  - will bear his iniquity
  - will bear the punishment for his guilt
  lexicon: HALOT
  rationale: The idiom נשא עון means to bear guilt/iniquity and often implies liability
    for punishment. Because נפש is grammatically feminine in Hebrew but refers generically
    to a person, English uses the representative generic 'his' in keeping with the
    project's gender-accurate policy.
