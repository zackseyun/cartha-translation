theological_decisions:
- issue: Rendering of זֶבַח שְׁלָמָיו
  chosen_reading: his peace offering
  alternative_readings:
  - his fellowship offering
  - his offering of well-being
  rationale: The term refers to a specific sacrificial category. 'Peace offering'
    is retained as the main text because it is concise, historically recognizable,
    and close to the Hebrew semantic field of wholeness/peace, while alternatives
    are acknowledged as interpretive possibilities emphasizing communal or well-being
    aspects.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gendered reference in וְהַנֶּפֶשׁ ... עֲוֺנָהּ תִּשָּׂא
  chosen_reading: the person ... will bear his guilt
  alternative_readings:
  - the person ... will bear their guilt
  - the one ... will bear his or her guilt
  rationale: The Hebrew noun נפש is grammatically feminine, but the referent is generic.
    Per the project's gender-accurate policy, the English rendering uses a representative
    singular rather than flattening the source into plural or fully gender-neutral
    language.
  doctrine_reference: Translation philosophy §4
