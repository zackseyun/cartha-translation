id: LEV.7.7
reference: Leviticus 7:7
source:
  edition: WLC
  text: כַּֽ/חַטָּאת֙ כָּֽ/אָשָׁ֔ם תּוֹרָ֥ה אַחַ֖ת לָ/הֶ֑ם הַ/כֹּהֵ֛ן אֲשֶׁ֥ר יְכַפֶּר
    בּ֖/וֹ ל֥/וֹ יִהְיֶֽה־׃
translation:
  text: 'Like the sin offering, so the guilt offering: there is one law for them.
    The priest who makes atonement with it shall have it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As the sin offering, so the guilt offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew torah; also 'instruction.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'The priest who makes atonement by it shall have it,' that is, it belongs
      to the officiating priest.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּ/חַטָּאת
  chosen: Like the sin offering
  alternatives:
  - As the sin offering
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, yielding 'like/as.' חַטָּאת in sacrificial
    context refers specifically to the 'sin offering,' not merely 'sin.' 'Like the
    sin offering' gives clear modern English while preserving the comparison.
- source_word: כָּ/אָשָׁם
  chosen: so the guilt offering
  alternatives:
  - so is the guilt offering
  - as the guilt offering
  lexicon: HALOT
  rationale: אָשָׁם in Leviticus regularly denotes the reparation/guilt offering.
    'Guilt offering' is the standard transparent rendering. The paired comparative
    structure is idiomatically represented by 'Like..., so...'.
- source_word: תּוֹרָה אַחַת
  chosen: there is one law
  alternatives:
  - one instruction
  - one statute
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction/law. In cultic legal material, 'law' best
    fits the procedural sense here. 'One law' preserves the formal legal force and
    the emphasis on identical regulation.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for both of them
  lexicon: HALOT
  rationale: The plural pronoun refers back to the two offerings collectively. 'For
    them' is literal and sufficient; English does not require 'both,' though that
    sense is implicit.
- source_word: הַכֹּהֵן
  chosen: The priest
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun in sacrificial context.
- source_word: אֲשֶׁר יְכַפֶּר בּוֹ
  chosen: who makes atonement with it
  alternatives:
  - who makes atonement by it
  - who makes atonement with it for him
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.'
    The preposition ב with the pronoun most naturally refers to the offering as the
    means/instrument, hence 'with it.' This avoids importing an explicit object ('for
    him') not stated in the Hebrew of this clause.
- source_word: לוֹ יִהְיֶה
  chosen: shall have it
  alternatives:
  - shall be his
  - it shall belong to him
  lexicon: HALOT
  rationale: The idiom indicates possession/allotment to the officiating priest. 'Shall
    have it' is natural modern English while preserving the legal sense of entitlement.
