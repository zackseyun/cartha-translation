theological_decisions:
- issue: Rendering of כפר in sacrificial legislation
  chosen_reading: makes atonement
  alternative_readings:
  - effects expiation
  - makes purification
  rationale: The priestly verb כפר carries sacrificial-theological weight and should
    not be flattened into a merely procedural term. 'Makes atonement' is the broad,
    established English rendering that preserves the text's cultic and theological
    force without over-specifying a narrower theory of atonement.
  doctrine_reference: Translation philosophy §3, §6
