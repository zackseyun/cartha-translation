theological_decisions:
- issue: Gendered priestly language
  chosen_reading: sons of Aaron ... each alike with his brother
  alternative_readings:
  - children of Aaron ... each alike
  - descendants of Aaron equally
  rationale: The Hebrew explicitly uses male kinship terms in a priestly legal context.
    Following the stated gender-accurate philosophy, the translation preserves the
    masculine wording rather than neutralizing it.
