id: LEV.7.10
reference: Leviticus 7:10
source:
  edition: WLC
  text: וְ/כָל מִנְחָ֥ה בְלוּלָֽה בַ/שֶּׁ֖מֶן וַ/חֲרֵבָ֑ה לְ/כָל בְּנֵ֧י אַהֲרֹ֛ן
    תִּהְיֶ֖ה אִ֥ישׁ כְּ/אָחִֽי/ו־־־׃פ
translation:
  text: And every grain offering mixed with oil, or dry, shall belong to all the sons
    of Aaron, each alike with his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each equally with his brother.' The Hebrew idiom emphasizes equal distribution
      among Aaron's sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  - meal offering
  lexicon: HALOT
  rationale: In Levitical sacrificial context, מִנְחָה refers specifically to the
    cereal/grain tribute offering rather than a generic gift. 'Grain offering' is
    clear modern English and standard in this cultic context.
- source_word: בְלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle with the prepositional phrase describes the preparation
    of the offering. 'Mixed with oil' is natural modern English; 'mingled' is more
    traditional but less current.
- source_word: חֲרֵבָה
  chosen: dry
  alternatives:
  - without oil
  - unmixed
  - dry offering
  lexicon: HALOT
  rationale: The adjective contrasts with an offering mixed with oil. 'Dry' preserves
    the lexical contrast succinctly; the sense 'without oil' is interpretive and therefore
    better left implicit.
- source_word: לְכָל בְּנֵי אַהֲרֹן
  chosen: shall belong to all the sons of Aaron
  alternatives:
  - shall be for all the sons of Aaron
  - shall belong to all Aaron's sons
  lexicon: HALOT
  rationale: The lamed phrase with היה expresses possession/allotment. 'Shall belong
    to' makes the distributive legal sense explicit in idiomatic English while preserving
    the referent 'sons of Aaron.'
- source_word: בְּנֵי אַהֲרֹן
  chosen: sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: This is a literal kinship expression for the male priestly descendants.
    Per translation philosophy, gender-accurate language is preferred over neutralizing.
- source_word: אִישׁ כְּאָחִיו
  chosen: each alike with his brother
  alternatives:
  - each as his brother
  - one like his brother
  - each equally with his brother
  lexicon: HALOT
  rationale: The idiom expresses equal distribution among the priests. 'Each alike
    with his brother' preserves the masculine singular distributive force and the
    comparison, while reading naturally in English.
