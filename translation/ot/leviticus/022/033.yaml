id: LEV.22.33
reference: Leviticus 22:33
source:
  edition: WLC
  text: הַ/מּוֹצִ֤יא אֶתְ/כֶם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם לִ/הְי֥וֹת לָ/כֶ֖ם לֵ/אלֹהִ֑ים אֲנִ֖י יְהוָֽה׃פ
translation:
  text: who brought you out of the land of Egypt to be your God. I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''; alternatively transliterated ''Yahweh'').'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמּוֹצִיא
  chosen: who brought ... out
  alternatives:
  - the one bringing ... out
  - who brought forth
  lexicon: HALOT
  rationale: 'The Hiphil participle of יצא functions here as a relative-like description of YHWH, continuing the preceding context: ''the one/who brought you out.'' English idiom favors the finite relative clause ''who brought ... out'' over a more wooden participial form.'
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker plus 2mp suffix; straightforwardly rendered 'you.' Number is plural in Hebrew, but standard English 'you' adequately carries this without awkward expansion.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: Retains the covenantal exodus formula with 'land of Egypt,' which is more formally complete than simply 'Egypt' and matches common Pentateuchal phrasing.
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  chosen: to be your God
  alternatives:
  - to become God to you
  - to be God for you
  lexicon: HALOT
  rationale: This is a standard covenant formula. 'To be your God' is natural English and preserves the relational force of היה + ל + אלהים without over-literal awkwardness.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The verbless Hebrew identification formula is naturally expressed in English as 'I am the LORD.'
