id: LEV.22.12
reference: Leviticus 22:12
source:
  edition: WLC
  text: וּ/בַת כֹּהֵ֔ן כִּ֥י תִהְיֶ֖ה לְ/אִ֣ישׁ זָ֑ר הִ֕וא בִּ/תְרוּמַ֥ת הַ/קֳּדָשִׁ֖ים
    לֹ֥א תֹאכֵֽל־׃
translation:
  text: But if a priest’s daughter becomes the wife of an outsider, she shall not
    eat from the contribution of the holy things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'married to a non-priest'; literally 'to a strange/foreign man.' The
      term here refers to someone outside the priestly household.
    reason: lexical_alternative
  - marker: b
    text: Or 'holy offerings' or 'sacred gifts' for 'the contribution of the holy
      things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת
  chosen: But ... a daughter
  alternatives:
  - And ... a daughter
  - Now a daughter
  lexicon: HALOT
  rationale: The conjunction waw here is rendered adversatively as 'But' because the
    verse contrasts with the preceding provision about who may eat holy food. 'Daughter'
    is retained explicitly from בַת.
- source_word: כֹּהֵן
  chosen: of a priest
  alternatives:
  - priest's
  lexicon: HALOT
  rationale: Construct relationship indicates 'daughter of a priest.' English idiom
    is expressed as 'a priest’s daughter' in the full translation.
- source_word: כִּי תִהְיֶה
  chosen: if ... becomes
  alternatives:
  - when ... is
  - if ... belongs to
  lexicon: HALOT
  rationale: כִּי with היה here introduces a conditional situation. 'Becomes' fits
    the transition into marriage status better than a static 'is.'
- source_word: לְ/אִישׁ זָר
  chosen: the wife of an outsider
  alternatives:
  - married to a non-priest
  - for a strange man
  - to an outsider
  lexicon: HALOT
  rationale: אִישׁ זָר literally means 'a strange/foreign man,' but in this priestly
    context the point is not ethnicity but someone outside the priestly household.
    'Outsider' preserves the exclusionary sense without misleading toward ethnic foreignness.
    'The wife of' makes explicit the marital sense conveyed by 'becomes to a man'
    in idiomatic English.
- source_word: הִוא
  chosen: she
  alternatives:
  - she herself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis but is naturally represented by
    explicit English subject 'she' without overtranslation.
- source_word: בִּ/תְרוּמַת
  chosen: from the contribution
  alternatives:
  - of the contribution
  - from the offering
  - from the heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/offering set apart and given. 'Contribution'
    is a clear modern rendering; 'from' is supplied idiomatically with 'eat' in English.
- source_word: הַ/קֳּדָשִׁים
  chosen: of the holy things
  alternatives:
  - of the sacred gifts
  - of the holy offerings
  lexicon: HALOT
  rationale: The plural 'holy things' reflects the consecrated portions in view. This
    keeps the cultic category broad and close to the Hebrew.
- source_word: לֹא תֹאכֵל
  chosen: shall not eat
  alternatives:
  - may not eat
  - must not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is well represented by
    English legal-style 'shall not eat,' preserving the prescriptive force.
