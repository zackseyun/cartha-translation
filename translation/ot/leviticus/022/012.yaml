theological_decisions:
- issue: Meaning of זָר in priestly legislation
  chosen_reading: outsider, meaning someone outside the priestly family/eligibility
    circle rather than necessarily ethnically foreign
  alternative_readings:
  - stranger
  - foreigner
  - layman
  - non-priest
  rationale: In Leviticus 22 the concern is access to holy food restricted to the
    priestly household. Rendering זָר as 'outsider' best captures exclusion from priestly
    status without importing an ethnic distinction the context does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source sense over traditional inertia.'
