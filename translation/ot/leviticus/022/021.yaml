id: LEV.22.21
reference: Leviticus 22:21
source:
  edition: WLC
  text: וְ/אִ֗ישׁ כִּֽי יַקְרִ֤יב זֶֽבַח שְׁלָמִים֙ לַ/יהוָ֔ה לְ/פַלֵּא נֶ֨דֶר֙ א֣וֹ לִ/נְדָבָ֔ה בַּ/בָּקָ֖ר א֣וֹ בַ/צֹּ֑אן תָּמִ֤ים יִֽהְיֶה֙ לְ/רָצ֔וֹן כָּל מ֖וּם לֹ֥א יִהְיֶה בּֽ/וֹ־־־־־׃
translation:
  text: And if a man presents a sacrifice of peace offerings to Yahweh, to fulfill a vow or as a freewill offering, from the herd or from the flock, it shall be without blemish to be accepted; there shall be no defect in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to perform a vow.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'peace offerings'; some translations render this more interpretively as 'fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: And if a man
  alternatives:
  - And when a man
  - And anyone
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In legal material it can function generically, but per the gender-accurate policy the masculine form is preserved rather than neutralized to 'anyone.' כִּי with the imperfect here introduces a conditional case, hence 'if.'
- source_word: יַקְרִיב
  chosen: presents
  alternatives:
  - offers
  - brings near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer an offering. 'Presents' is natural modern English while retaining the cultic sense without over-paraphrase.
- source_word: זֶבַח שְׁלָמִים
  chosen: a sacrifice of peace offerings
  alternatives:
  - a peace offering sacrifice
  - a sacrifice of fellowship offerings
  lexicon: HALOT
  rationale: זֶבַח is the sacrificial act/victim and שְׁלָמִים names the offering type. 'Peace offerings' preserves the traditional and lexical connection to שׁלם better than the more interpretive 'fellowship offerings.' The plural שְׁלָמִים is retained in English as 'peace offerings.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לְפַלֵּא נֶדֶר
  chosen: to fulfill a vow
  alternatives:
  - to perform a vow
  - to make good a vow
  lexicon: HALOT
  rationale: The infinitive of פלא here in sacrificial legal context refers to carrying out or discharging a vowed offering. 'Fulfill a vow' is idiomatic and captures the sense of completing what was vowed.
- source_word: אוֹ לִנְדָבָה
  chosen: or as a freewill offering
  alternatives:
  - or for a voluntary offering
  lexicon: HALOT
  rationale: נְדָבָה denotes a voluntary/freewill offering distinct from a vowed offering. 'As a freewill offering' clearly marks the alternative category.
- source_word: בַּבָּקָר אוֹ בַצֹּאן
  chosen: from the herd or from the flock
  alternatives:
  - of the cattle or of the sheep and goats
  - from the cattle or from the flock
  lexicon: HALOT
  rationale: These terms denote the two broad classes of sacrificial livestock. 'Herd' and 'flock' are concise, natural, and accurate.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - whole
  lexicon: HALOT
  rationale: In sacrificial legislation תָּמִים refers to an animal free from physical defect. 'Without blemish' is the established and precise cultic rendering.
- source_word: לְרָצוֹן
  chosen: to be accepted
  alternatives:
  - for acceptance
  - for favor
  lexicon: HALOT
  rationale: The phrase indicates acceptability before God. 'To be accepted' expresses the result in clear English and fits the sacrificial context.
- source_word: כָּל מוּם לֹא יִהְיֶה בּוֹ
  chosen: there shall be no defect in it
  alternatives:
  - no blemish shall be in it
  - it shall have no defect
  lexicon: HALOT
  rationale: מוּם is a physical defect/disqualifying blemish. 'Defect' avoids awkward repetition after 'without blemish' while preserving the legal meaning; the clause is rendered as a prohibition/requirement of condition.
