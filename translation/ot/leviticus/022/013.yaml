id: LEV.22.13
reference: Leviticus 22:13
source:
  edition: WLC
  text: וּ/בַת כֹּהֵן֩ כִּ֨י תִהְיֶ֜ה אַלְמָנָ֣ה וּ/גְרוּשָׁ֗ה וְ/זֶרַע֮ אֵ֣ין לָ/הּ֒
    וְ/שָׁבָ֞ה אֶל בֵּ֤ית אָבִ֨י/הָ֙ כִּ/נְעוּרֶ֔י/הָ מִ/לֶּ֥חֶם אָבִ֖י/הָ תֹּאכֵ֑ל
    וְ/כָל זָ֖ר לֹא יֹ֥אכַל בּֽ/וֹ־־־־׃ס
translation:
  text: But if a priest’s daughter becomes a widow or divorced, and has no child,
    and returns to her father’s house as in her youth, she may eat from her father’s
    food; but no outsider may eat of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'her father’s bread.' Here 'bread' likely refers more broadly
      to the food provisions of the priestly household.
    reason: lexical_alternative
  - marker: b
    text: Or 'no unauthorized person.' The Hebrew term refers to someone outside the
      permitted priestly circle, not necessarily a foreigner by ethnicity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת כֹּהֵן
  chosen: But if a priest’s daughter
  alternatives:
  - And a priest’s daughter
  lexicon: HALOT
  rationale: The phrase literally means 'and a daughter of a priest.' Given the contrast
    with the previous verse and the conditional clause introduced by כִּי, 'But if
    a priest’s daughter' reads naturally in English while preserving the familial
    and priestly relationship.
- source_word: כִּי תִהְיֶה
  chosen: becomes
  alternatives:
  - is
  - comes to be
  lexicon: HALOT
  rationale: 'With היה following כִּי in this legal context, the sense is conditional
    circumstance: ''if she becomes/is found to be.'' ''Becomes'' fits the transition
    into widowhood or divorce.'
- source_word: אַלְמָנָה וּ/גְרוּשָׁה
  chosen: a widow or divorced
  alternatives:
  - widowed or divorced
  - a widow and divorced
  lexicon: HALOT
  rationale: The Hebrew lists two possible statuses. English idiom prefers 'a widow
    or divorced' (or 'widowed or divorced') to express alternative conditions under
    which the law applies. 'And' would misleadingly suggest both conditions must simultaneously
    apply.
- source_word: וְ/זֶרַע אֵין לָהּ
  chosen: and has no child
  alternatives:
  - and has no offspring
  - and has no seed
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed,' but in legal/familial context it refers
    to offspring. 'Child' is natural modern English and captures the practical sense;
    'offspring' is possible but less idiomatic here.
- source_word: וְ/שָׁבָה אֶל בֵּית אָבִיהָ
  chosen: and returns to her father’s house
  alternatives:
  - and goes back to her father’s house
  lexicon: HALOT
  rationale: שׁוּב denotes returning. 'Returns' preserves the legal-social idea of
    reentering her natal household.
- source_word: כִּ/נְעוּרֶיהָ
  chosen: as in her youth
  alternatives:
  - as when she was young
  - as in her girlhood
  lexicon: HALOT
  rationale: The phrase compares her restored status to her earlier unmarried state
    in her father's house. 'As in her youth' is concise and faithful without sounding
    archaic.
- source_word: מִ/לֶּחֶם אָבִיהָ תֹּאכֵל
  chosen: she may eat from her father’s food
  alternatives:
  - she shall eat of her father’s bread
  - she may eat of her father’s bread
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in priestly legal contexts it often
    stands metonymically for food provisions, especially sacred food. 'Food' communicates
    the sense clearly in modern English. 'May eat' reflects legal permission more
    naturally than a simple future 'shall eat.'
- source_word: וְ/כָל זָר
  chosen: but no outsider
  alternatives:
  - and no stranger
  - but no unauthorized person
  lexicon: HALOT
  rationale: זָר in priestly law refers to someone outside the authorized circle,
    not merely a foreigner ethnically. 'Outsider' best conveys non-eligibility in
    accessible English.
- source_word: לֹא יֹאכַל בּוֹ
  chosen: may eat of it
  alternatives:
  - shall eat of it
  - may eat from it
  lexicon: HALOT
  rationale: 'The prohibition is legal: an outsider is not permitted to eat of the
    priestly food. ''It'' refers back to the father''s food/bread as a collective
    provision.'
