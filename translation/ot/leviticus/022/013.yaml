theological_decisions:
- issue: Referent of 'her father’s food' in priestly legislation
  chosen_reading: Render לֶחֶם as 'food' rather than narrowly 'bread,' implying the
    priestly provisions available to the household.
  alternative_readings:
  - Render literally as 'bread'
  rationale: In Leviticus 22 the concern is eligibility to eat holy things/provisions
    associated with the priestly household. Translating 'food' preserves the legal
    sense for modern readers without over-specifying beyond the text.
