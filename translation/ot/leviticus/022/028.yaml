id: LEV.22.28
reference: Leviticus 22:28
source:
  edition: WLC
  text: וְ/שׁ֖וֹר אוֹ שֶׂ֑ה אֹת֣/וֹ וְ/אֶת בְּנ֔/וֹ לֹ֥א תִשְׁחֲט֖וּ בְּ/י֥וֹם אֶחָֽד־־׃
translation:
  text: Whether an ox or a sheep, you shall not slaughter it and its young on one
    day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'You shall not slaughter it and its young on the
      same day.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'it and its son.' The expression refers to an animal together
      with its offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר denotes bovine livestock. 'Ox' is a natural singular rendering
    in legal style and pairs well with 'sheep.' 'Bull' is too sex-specific, and 'cattle'
    is too collective.
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - lamb
  - small livestock
  lexicon: HALOT
  rationale: שֶׂה can denote a member of the flock, sheep or goat depending on context.
    Here, in contrast with שׁוֹר and in common sacrificial/legal English, 'sheep'
    is a clear representative rendering. 'Lamb' is too age-specific, and 'small livestock'
    is too broad and awkward.
- source_word: אֹתוֹ וְאֶת־בְּנוֹ
  chosen: it and its young
  alternatives:
  - it and its son
  - the mother and its offspring
  lexicon: HALOT
  rationale: The Hebrew literally says 'it and its son/young.' Because the animal
    terms are not marked for sex here and English idiom for animals commonly uses
    'young' rather than 'son,' 'it and its young' best conveys the legal prohibition
    naturally. This also avoids over-specifying maternal language not explicit in
    the Hebrew of this verse.
- source_word: תִשְׁחֲטוּ
  chosen: shall not slaughter
  alternatives:
  - shall not kill
  - shall not butcher
  lexicon: HALOT
  rationale: שׁחט is the standard verb for slaughtering animals, especially in sacrificial/legal
    contexts. 'Slaughter' preserves the technical sense better than the broader 'kill'
    or the more culinary 'butcher.'
- source_word: בְּיוֹם אֶחָד
  chosen: on one day
  alternatives:
  - in one day
  - on the same day
  lexicon: HALOT
  rationale: The phrase literally means 'in/on one day.' In this legal context, the
    idiomatic force is prohibition within a single day. 'On one day' is close to the
    Hebrew while remaining clear; 'on the same day' is a possible interpretive gloss.
- source_word: וְ
  chosen: Whether
  alternatives:
  - And
  - As for
  lexicon: HALOT
  rationale: 'The initial conjunction introduces a new case in a legal sequence. Rendering
    it as ''Whether'' brings out the disjunctive legal force with the following אוֹ
    (''or''): ''Whether an ox or a sheep...'' This is more natural in English law-style
    phrasing than a bare ''And.'''
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Standard disjunctive conjunction; straightforwardly rendered 'or'.
