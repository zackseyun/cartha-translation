theological_decisions:
- issue: Referent of 'them' in the final clause
  chosen_reading: the LORD sanctifies the priests/Israelites in view, not the holy
    things themselves
  alternative_readings:
  - the LORD sanctifies the holy things
  rationale: The pronominal suffix most naturally refers to the people under discussion
    in the immediate context, and the warning concerns their liability in relation
    to holy food. Rendering 'who sanctifies them' preserves the Hebrew syntax without
    forcing a narrower interpretive gloss into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
