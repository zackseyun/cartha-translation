id: LEV.22.16
reference: Leviticus 22:16
source:
  edition: WLC
  text: וְ/הִשִּׂ֤יאוּ אוֹתָ/ם֙ עֲוֺ֣ן אַשְׁמָ֔ה בְּ/אָכְלָ֖/ם אֶת קָדְשֵׁי/הֶ֑ם כִּ֛י
    אֲנִ֥י יְהוָ֖ה מְקַדְּשָֽׁ/ם־׃פ
translation:
  text: and so cause them to bear guilt requiring restitution by eating their holy
    things, for I am the LORD who sanctifies them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and bring upon them guilt'; the Hebrew expression is difficult and may
      emphasize liability for a guilt-offense.
    reason: lexical_alternative
  - marker: b
    text: '''Their holy things'' refers to consecrated portions or offerings.'
    reason: cultural_note
  - marker: c
    text: Or 'who makes them holy' or 'who consecrates them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשִּׂיאוּ
  chosen: and so cause
  alternatives:
  - and make
  - and bring upon
  lexicon: HALOT
  rationale: 'Hiphil of נשׂא here is causative: ''cause/bring'' someone into bearing
    something. The prefixed conjunction links with the previous prohibition/result,
    so ''and so cause'' captures the consequential force without over-paraphrasing.'
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring back to the priests/people in context;
    retained as 'them'.
- source_word: עֲוֺן אַשְׁמָה
  chosen: guilt requiring restitution
  alternatives:
  - iniquity of guilt
  - guilt
  - punishment for trespass
  lexicon: HALOT
  rationale: The collocation combines עון ('guilt/iniquity') with אשמה ('guilt, guilt-offense,
    liability'). In cultic context it denotes culpability that incurs reparation or
    guilt-offering liability. 'Guilt requiring restitution' communicates the legal-cultic
    force more clearly than the wooden 'iniquity of guilt'.
- source_word: בְּאָכְלָם
  chosen: by eating
  alternatives:
  - when they eat
  - in their eating
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct marks circumstance/means.
    'By eating' best fits the causal-instrumental sense in context.
- source_word: קָדְשֵׁיהֶם
  chosen: their holy things
  alternatives:
  - their sacred gifts
  - their holy offerings
  lexicon: HALOT
  rationale: Literally 'their holy things.' In Levitical context this refers to consecrated
    portions/offerings belonging to them. The more literal rendering preserves the
    Hebrew wording while remaining understandable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: מְקַדְּשָׁם
  chosen: who sanctifies them
  alternatives:
  - who makes them holy
  - who consecrates them
  lexicon: HALOT
  rationale: 'Piel participle of קדשׁ: ''sanctify, make holy, consecrate.'' ''Sanctifies''
    preserves the cultic-theological register and links naturally with the holiness
    context of Leviticus.'
