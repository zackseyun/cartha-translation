theological_decisions:
- issue: Nature of purity language
  chosen_reading: ritual cleanness rather than moral purity
  alternative_readings:
  - moral or spiritual purity
  rationale: In Leviticus 22 the concern is priestly access to sacred food after a
    state of impurity. The translation uses 'clean' in its ordinary form and lets
    the cultic context define it, rather than importing moral categories the verse
    itself does not state.
