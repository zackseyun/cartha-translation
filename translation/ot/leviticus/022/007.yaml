id: LEV.22.7
reference: Leviticus 22:7
source:
  edition: WLC
  text: וּ/בָ֥א הַ/שֶּׁ֖מֶשׁ וְ/טָהֵ֑ר וְ/אַחַר֙ יֹאכַ֣ל מִן הַ/קֳּדָשִׁ֔ים כִּ֥י
    לַחְמ֖/וֹ הֽוּא־׃
translation:
  text: When the sun has set, he will be clean; and afterward he may eat from the
    holy things, because they are his food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for it is his bread.' Here 'bread' means his allotted food from
      the sacred portions.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the sacred offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא הַשֶּׁמֶשׁ
  chosen: When the sun has set
  alternatives:
  - and the sun comes in
  - and the sun sets
  - when the sun goes down
  lexicon: HALOT
  rationale: The idiom literally reads 'and the sun comes,' but in context it denotes
    sunset. Rendering it as 'When the sun has set' expresses the temporal force naturally
    in English while preserving the ritual timing.
- source_word: וְטָהֵר
  chosen: he will be clean
  alternatives:
  - and he is clean
  - then he shall be clean
  - and he becomes clean
  lexicon: HALOT
  rationale: The verb טהר here marks restoration to ritual cleanness after sunset.
    'He will be clean' fits the sequential legal sense in English without overinterpreting
    beyond the text.
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: This adverb marks the next step in sequence. 'And afterward' preserves
    the procedural flow of the priestly regulation.
- source_word: יֹאכַל
  chosen: he may eat
  alternatives:
  - he shall eat
  - he can eat
  lexicon: HALOT
  rationale: In legal context, the imperfect here expresses permitted action following
    restored cleanness. 'May eat' communicates authorization more clearly than a simple
    future.
- source_word: מִן הַקֳּדָשִׁים
  chosen: from the holy things
  alternatives:
  - from the sacred offerings
  - of the holy things
  - from the consecrated things
  lexicon: HALOT
  rationale: The plural קדשים refers to sacred portions/holy offerings. 'Holy things'
    is a transparent and sufficiently formal rendering; 'offerings' is interpretive,
    though contextually plausible.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the permission. 'Because' is clearer in
    modern English than 'for' while preserving the causal sense.
- source_word: לַחְמוֹ הוּא
  chosen: because they are his food
  alternatives:
  - for it is his bread
  - because it is his bread
  - for they are his food
  lexicon: HALOT
  rationale: Though לֶחֶם is literally 'bread,' in this priestly context it broadly
    denotes food/provision. The plural referent in context ('the holy things') is
    best reflected by 'they are his food,' avoiding awkward singular English while
    preserving the idea that these sacred portions are his allotted sustenance.
