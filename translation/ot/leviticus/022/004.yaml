theological_decisions:
- issue: Rendering ritual impurity terminology without importing later medical assumptions
  chosen_reading: Use 'afflicted with a skin disease' for צָרוּעַ and 'becomes clean'
    for ritual restoration
  alternative_readings:
  - leprous
  - healed/purified
  rationale: The verse concerns priestly eligibility and ritual cleanness, not a modern
    medical diagnosis or a moral category. The chosen wording preserves the ceremonial
    framework and avoids anachronistic specificity.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered legal subject
  chosen_reading: Retain 'man' in 'Any man from the offspring of Aaron'
  alternative_readings:
  - person
  - anyone
  rationale: The Hebrew is grammatically masculine and contextually refers to male
    Aaronic descendants serving as priests. Gender-neutral language would blur the
    source-text reference.
  doctrine_reference: Translation philosophy §4
