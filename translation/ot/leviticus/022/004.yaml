id: LEV.22.4
reference: Leviticus 22:4
source:
  edition: WLC
  text: אִ֣ישׁ אִ֞ישׁ מִ/זֶּ֣רַע אַהֲרֹ֗ן וְ/ה֤וּא צָר֨וּעַ֙ א֣וֹ זָ֔ב בַּ/קֳּדָשִׁים֙
    לֹ֣א יֹאכַ֔ל עַ֖ד אֲשֶׁ֣ר יִטְהָ֑ר וְ/הַ/נֹּגֵ֨עַ֙ בְּ/כָל טְמֵא נֶ֔פֶשׁ א֣וֹ
    אִ֔ישׁ אֲשֶׁר תֵּצֵ֥א מִמֶּ֖/נּוּ שִׁכְבַת זָֽרַע־־־־׃
translation:
  text: Any man from the offspring of Aaron, if he is afflicted with a skin disease
    or has a discharge, shall not eat from the holy things until he becomes clean.
    And whoever touches anything unclean by a dead person, or a man from whom an emission
    of semen comes out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'leprous.' The Hebrew term refers broadly to a ritually defiling
      skin condition, not necessarily to modern leprosy (Hansen's disease).
    reason: lexical_alternative
  - marker: b
    text: Or 'any person made unclean by a dead body.' The Hebrew expression is idiomatic
      for corpse-related impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  chosen: Any man
  alternatives:
  - Any man whatsoever
  - Any one
  lexicon: HALOT
  rationale: The doubled אִישׁ is an idiomatic distributive expression meaning 'any
    man' or 'each man.' 'Any man' preserves the masculine singular and representative
    force in line with the gender-accurate policy.
- source_word: מִזֶּרַע אַהֲרֹן
  chosen: from the offspring of Aaron
  alternatives:
  - from Aaron's descendants
  - of the seed of Aaron
  lexicon: HALOT
  rationale: זֶרַע here denotes lineage/descendants rather than literal seed. 'Offspring'
    is natural English while retaining the genealogical sense.
- source_word: צָרוּעַ
  chosen: afflicted with a skin disease
  alternatives:
  - leprous
  - having a defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term refers to the ritual condition traditionally rendered
    'leprous,' but it does not map neatly onto modern Hansen's disease. 'Afflicted
    with a skin disease' avoids misleading medical specificity while preserving the
    impurity context.
- source_word: זָב
  chosen: has a discharge
  alternatives:
  - has a bodily discharge
  - is discharging
  lexicon: HALOT
  rationale: זָב denotes one with a genital or bodily discharge causing ritual impurity.
    'Has a discharge' is concise and clear in context.
- source_word: בַּקֳּדָשִׁים
  chosen: from the holy things
  alternatives:
  - of the holy things
  - from the sacred offerings
  lexicon: HALOT
  rationale: The phrase refers to consecrated food portions available to priests.
    'From the holy things' is fairly literal and fits the eating context with the
    supplied preposition in English.
- source_word: לֹא יֹאכַל
  chosen: shall not eat
  alternatives:
  - may not eat
  - must not eat
  lexicon: HALOT
  rationale: This is legal prohibition. 'Shall not eat' matches the legislative register
    of Leviticus without sounding archaic in context.
- source_word: עַד אֲשֶׁר יִטְהָר
  chosen: until he becomes clean
  alternatives:
  - until he is clean
  - until he is purified
  lexicon: HALOT
  rationale: The verb marks transition into a state of ritual cleanness. 'Becomes
    clean' captures the process/result better than the stative 'is clean.'
- source_word: וְהַנֹּגֵעַ
  chosen: And whoever touches
  alternatives:
  - And the one who touches
  - or whoever touches
  lexicon: HALOT
  rationale: The participle functions substantivally, introducing another disqualifying
    case. 'Whoever touches' is idiomatic English for the legal style.
- source_word: בְּכָל טְמֵא נֶפֶשׁ
  chosen: anything unclean by a dead person
  alternatives:
  - any person made unclean by a corpse
  - any corpse-uncleanness
  lexicon: HALOT
  rationale: The phrase is difficult and idiomatic, referring to impurity associated
    with a dead human being. The chosen rendering keeps the contact-with-death sense
    without overtechnical wording.
- source_word: שִׁכְבַת זָרַע
  chosen: an emission of semen
  alternatives:
  - seed emission
  - seminal emission
  lexicon: HALOT
  rationale: This idiom refers to seminal emission. 'Emission of semen' is clear modern
    English and avoids euphemism while remaining dignified.
- source_word: תֵּצֵא מִמֶּנּוּ
  chosen: comes out from him
  alternatives:
  - issues from him
  - has gone out from him
  lexicon: HALOT
  rationale: The verb is literally 'goes out/comes out.' 'Comes out from him' preserves
    the concrete imagery in understandable English.
