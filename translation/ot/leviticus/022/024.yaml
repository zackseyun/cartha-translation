id: LEV.22.24
reference: Leviticus 22:24
source:
  edition: WLC
  text: וּ/מָע֤וּךְ וְ/כָתוּת֙ וְ/נָת֣וּק וְ/כָר֔וּת לֹ֥א תַקְרִ֖יבוּ לַֽ/יהוָ֑ה וּֽ/בְ/אַרְצְ/כֶ֖ם
    לֹ֥א תַעֲשֽׂוּ׃
translation:
  text: You shall not present to the LORD anything with bruised, crushed, torn, or
    cut testicles, and in your land you shall not do this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'bruised, crushed, torn, or cut'; the Hebrew lists four forms
      of damage and implies the male sexual organs of the animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעוּךְ
  chosen: bruised
  alternatives:
  - crushed
  - pressed
  lexicon: HALOT
  rationale: The passive participial form denotes something injured by pressure or
    bruising. Since the next term more naturally covers 'crushed,' 'bruised' helps
    distinguish the sequence of defects while preserving the sense of damage to the
    sexual organs implied by context.
- source_word: כָתוּת
  chosen: crushed
  alternatives:
  - bruised
  - pounded
  lexicon: HALOT
  rationale: This term denotes something beaten or crushed. Rendering it 'crushed'
    preserves the concrete physical defect and differentiates it from the preceding
    term.
- source_word: נָתוּק
  chosen: torn
  alternatives:
  - pulled off
  - detached
  lexicon: HALOT
  rationale: The word refers to something torn away or severed by pulling. 'Torn'
    is concise, natural English that communicates traumatic damage without over-specifying
    the mechanism.
- source_word: כָרוּת
  chosen: cut
  alternatives:
  - severed
  - cut off
  lexicon: HALOT
  rationale: From the common verb 'to cut off/cut down.' Here it describes a mutilated
    condition. 'Cut' is direct and readable; the fuller implication is supplied by
    the object understood from context.
- source_word: תַקְרִיבוּ
  chosen: present
  alternatives:
  - offer
  - bring near
  lexicon: HALOT
  rationale: In sacrificial contexts this Hiphil commonly means to present or offer.
    'Present' fits the direct object here and avoids implying only altar-burning rather
    than the broader act of bringing an animal for offering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: בארצכם
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: The phrase refers to the land of Israel generally. 'In your land' is
    the most natural and contextually appropriate rendering.
- source_word: תעשו
  chosen: you shall not do this
  alternatives:
  - you shall not do so
  - you shall not make
  lexicon: HALOT
  rationale: The verb 'do/make' here is elliptical, referring back to the prohibited
    action involving such mutilation. Supplying 'this' in English makes the prohibition
    intelligible without adding new content.
- source_word: implicit object of the four participles
  chosen: testicles
  alternatives:
  - stones (archaic euphemism)
  - male organs
  lexicon: HALOT
  rationale: The four passive participles stand absolutely but in context clearly
    describe damaged male sexual organs of sacrificial animals. English requires the
    implied referent to be made explicit for clarity. 'Testicles' is anatomically
    precise and avoids archaic euphemism.
