theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton, preserving
    reverential convention and consistency with the doctrine guidelines.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of the final prohibition וּבְאַרְצְכֶם לֹא תַעֲשׂוּ
  chosen_reading: a general prohibition against performing such mutilation in the
    land
  alternative_readings:
  - a prohibition against offering such animals within the land
  - a prohibition against preparing such animals for sacrifice
  rationale: The Hebrew verb 'do' is broad and elliptical. In context, it most naturally
    refers to the preceding acts of genital mutilation rather than merely the act
    of offering. The English 'do this' preserves that breadth without over-interpreting.
