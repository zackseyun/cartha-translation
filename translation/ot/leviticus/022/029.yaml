id: LEV.22.29
reference: Leviticus 22:29
source:
  edition: WLC
  text: וְ/כִֽי תִזְבְּח֥וּ זֶֽבַח תּוֹדָ֖ה לַ/יהוָ֑ה לִֽ/רְצֹנְ/כֶ֖ם תִּזְבָּֽחוּ־־׃
translation:
  text: And when you sacrifice a thank offering to Yahweh, you shall sacrifice it for your acceptance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacrifice of thanksgiving' or 'a thanksgiving sacrifice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: And when
  alternatives:
  - And if
  - When
  lexicon: HALOT
  rationale: The conjunction introduces a conditional/temporal instruction within legal material. 'And when' fits the flow from the preceding regulations and avoids making the act merely hypothetical in English, while preserving the Hebrew's casuistic sense.
- source_word: תִזְבְּחוּ
  chosen: you sacrifice
  alternatives:
  - you slaughter
  - you offer as a sacrifice
  lexicon: HALOT
  rationale: From זבח, the standard sacrificial verb. 'Sacrifice' is the most natural and sufficiently formal English rendering in this cultic context; 'slaughter' is too narrow, and 'offer as a sacrifice' is more cumbersome.
- source_word: זֶבַח תּוֹדָה
  chosen: a thank offering
  alternatives:
  - a sacrifice of thanksgiving
  - a thanksgiving sacrifice
  lexicon: HALOT
  rationale: The construct phrase denotes a specific kind of sacrifice characterized by thanksgiving. 'Thank offering' is concise, idiomatic, and preserves the sacrificial category without archaic heaviness. The fuller alternatives are viable and preserved in a footnote as lexical alternatives.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'To' reflects the lamed of direction/dedication in sacrificial language.
- source_word: לִֽ/רְצֹנְ/כֶם
  chosen: so that it may be accepted for you
  alternatives:
  - for your acceptance
  - for your favor
  - according to your will
  lexicon: HALOT
  rationale: 'רָצוֹן in sacrificial contexts commonly carries the sense of acceptability/acceptance before God rather than the worshipers'' subjective willingness. The idiomatic English expansion makes explicit the implied result: the offering is to be made in a manner acceptable on the offerers'' behalf. ''According to your will'' would misdirect the sense toward human preference.'
- source_word: תִּזְבָּחוּ
  chosen: you shall sacrifice it
  alternatives:
  - you shall offer it
  - you shall slaughter it
  lexicon: HALOT
  rationale: The repeated verb is retained in English to reflect the Hebrew emphasis and instruction. Adding 'it' is required for natural English and refers back to the thank offering.
