theological_decisions:
- issue: Cultic expression for sacrificial gift
  chosen_reading: the food of your God
  alternative_readings:
  - the bread of your God
  rationale: The verse concerns sacrificial animals and their acceptability. Rendering
    לֶחֶם as 'food' communicates the priestly idiom without implying literal bread
    only. This is a lexical-cultural decision, not a doctrinal expansion.
