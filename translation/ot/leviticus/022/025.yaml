id: LEV.22.25
reference: Leviticus 22:25
source:
  edition: WLC
  text: וּ/מִ/יַּ֣ד בֶּן נֵכָ֗ר לֹ֥א תַקְרִ֛יבוּ אֶת לֶ֥חֶם אֱלֹהֵי/כֶ֖ם מִ/כָּל אֵ֑לֶּה
    כִּ֣י מָשְׁחָתָ֤/ם בָּ/הֶם֙ מ֣וּם בָּ֔/ם לֹ֥א יֵרָצ֖וּ לָ/כֶֽם־־־׃פ
translation:
  text: And from the hand of a foreigner you shall not present any of these as the
    food of your God, because their corruption is in them; a defect is in them. They
    shall not be accepted for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread of your God.' Here 'bread' is a Hebrew sacrificial idiom for
      food presented to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'blemish.' The Hebrew term refers to a disqualifying defect in a sacrificial
      animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִיַּד
  chosen: And from the hand of
  alternatives:
  - And from
  - Nor from the hand of
  lexicon: HALOT
  rationale: The idiom מִיַּד literally means 'from the hand of' and commonly denotes
    source or agency. Retaining 'hand' preserves the Hebrew idiom while remaining
    understandable in English.
- source_word: בֶּן נֵכָר
  chosen: a foreigner
  alternatives:
  - a foreign son
  - an alien
  - a foreign national
  lexicon: HALOT
  rationale: The phrase literally means 'son of a foreigner,' an idiom for a foreign
    person/non-Israelite. 'A foreigner' is natural English and conveys the social-legal
    sense without wooden literalism.
- source_word: תַקְרִיבוּ
  chosen: you shall not present
  alternatives:
  - you shall not offer
  - you shall not bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts often means 'present/offer.' 'Present'
    fits the cultic setting and avoids overusing 'offer' where the object is specified
    as sacrificial food.
- source_word: לֶחֶם אֱלֹהֵיכֶם
  chosen: the food of your God
  alternatives:
  - the bread of your God
  - the offering-food of your God
  lexicon: HALOT
  rationale: Though לֶחֶם literally means 'bread,' in priestly sacrificial contexts
    it broadly denotes food offered to God. 'Food of your God' best reflects the idiomatic
    cultic sense in modern English.
- source_word: מִכָּל אֵלֶּה
  chosen: any of these
  alternatives:
  - from any of these
  - from all these
  lexicon: HALOT
  rationale: The phrase refers back to the blemished animals under discussion. 'Any
    of these' is idiomatic English and preserves the partitive force of מִן with כָּל.
- source_word: מָשְׁחָתָם
  chosen: their corruption
  alternatives:
  - their disfigurement
  - their ruin
  - their damage
  lexicon: HALOT
  rationale: The noun denotes spoilage/corruption or disfigurement. In context of
    defective sacrificial animals, 'corruption' captures the state that renders them
    unfit, while allowing the following explicit mention of defect to sharpen the
    meaning.
- source_word: מוּם
  chosen: a defect
  alternatives:
  - a blemish
  - a physical defect
  lexicon: HALOT
  rationale: מוּם is the standard term in Leviticus 21–22 for a disqualifying bodily
    flaw. 'Defect' is clear modern English; 'blemish' is possible but can sound less
    concrete to contemporary readers.
- source_word: לֹא יֵרָצוּ לָכֶם
  chosen: They shall not be accepted for you
  alternatives:
  - they shall not be acceptable on your behalf
  - they shall not find favor for you
  lexicon: HALOT
  rationale: The Niphal of רצה in sacrificial contexts means to be accepted/favorably
    received. 'For you' preserves לָכֶם, indicating acceptance in relation to the
    offerers rather than merely intrinsic acceptability.
