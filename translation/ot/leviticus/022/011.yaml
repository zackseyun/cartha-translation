id: LEV.22.11
reference: Leviticus 22:11
source:
  edition: WLC
  text: וְ/כֹהֵ֗ן כִּֽי יִקְנֶ֥ה נֶ֨פֶשׁ֙ קִנְיַ֣ן כַּסְפּ֔/וֹ ה֖וּא יֹ֣אכַל בּ֑/וֹ
    וִ/ילִ֣יד בֵּית֔/וֹ הֵ֖ם יֹאכְל֥וּ בְ/לַחְמֽ/וֹ־׃
translation:
  text: But if a priest buys a person as his property with his money, that person
    may eat of it, and those born in his house may eat of his food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a person, an acquisition of his money'—that is, someone purchased
      with his money.
    reason: lexical_alternative
  - marker: b
    text: Or 'of his bread'; here 'bread' likely refers more broadly to the priestly
      food allotted to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹהֵן
  chosen: But if a priest
  alternatives:
  - And a priest
  - When a priest
  lexicon: HALOT
  rationale: The conjunction with כֹּהֵן continues the legal case structure from the
    preceding verse. 'But if a priest' fits the contrastive flow in English and the
    conditional clause introduced by כִּי.
- source_word: כִּֽי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this casuistic legal context, כִּי introduces a conditional scenario.
    'If' is the clearest English rendering, though 'when' is possible in law-style
    formulations.
- source_word: יִקְנֶה
  chosen: buys
  alternatives:
  - acquires
  - purchases
  lexicon: HALOT
  rationale: The verb קנה denotes acquisition by purchase here, reinforced by the
    following phrase 'property with his money.' 'Buys' is direct, natural English.
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - a soul
  - someone
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to a human being, not the immaterial soul. 'A person'
    best conveys the legal-human referent in contemporary English.
- source_word: קִנְיַן כַּסְפּוֹ
  chosen: as his property with his money
  alternatives:
  - with his money as a possession
  - purchased with his money
  - his money-acquisition
  lexicon: HALOT
  rationale: The construct phrase denotes something acquired as property by means
    of money. To preserve the bonded/property dimension of the Hebrew rather than
    soften it, 'as his property with his money' makes the legal status explicit.
- source_word: הוּא יֹאכַל בּוֹ
  chosen: that person may eat of it
  alternatives:
  - he may eat of it
  - he may eat from it
  lexicon: HALOT
  rationale: The pronoun הוּא refers back to the purchased person. 'That person' avoids
    ambiguity in English. The preposition בּוֹ refers to the holy food under discussion
    in context; 'eat of it' is idiomatic and sufficiently literal.
- source_word: וִילִיד בֵּיתוֹ
  chosen: those born in his house
  alternatives:
  - the children of his household
  - homeborn slaves
  - one born in his house
  lexicon: HALOT
  rationale: יְלִיד בַּיִת denotes one born in the household, often in a servile/dependent
    status. Because the Hebrew form here functions collectively with the following
    plural pronoun and verb, 'those born in his house' captures the group sense without
    over-specifying beyond the text.
- source_word: הֵם יֹאכְלוּ
  chosen: may eat
  alternatives:
  - shall eat
  - they may eat
  lexicon: HALOT
  rationale: The imperfect in legal material expresses permitted participation. 'May
    eat' communicates authorization more naturally than a simple future.
- source_word: בְלַחְמוֹ
  chosen: of his food
  alternatives:
  - of his bread
  - his food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in priestly/legal contexts it can
    stand for food, especially sacred food allotted to the priest. 'Food' communicates
    the broader referent in clear English while preserving the possessive relation.
