theological_decisions:
- issue: Rendering a slavery/property-related legal term
  chosen_reading: as his property with his money
  alternative_readings:
  - purchased with his money
  - bought with his money
  rationale: Following the translation philosophy's original-language primacy, the
    rendering preserves the ownership/property dimension of קִנְיַן כַּסְפּוֹ rather
    than softening it into generic service language. This is a lexical-ethical transparency
    decision, not an endorsement beyond the text.
  doctrine_reference: Translation philosophy §1
