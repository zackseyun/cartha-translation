id: LEV.22.32
reference: Leviticus 22:32
source:
  edition: WLC
  text: וְ/לֹ֤א תְחַלְּלוּ֙ אֶת שֵׁ֣ם קָדְשִׁ֔/י וְ/נִ֨קְדַּשְׁתִּ֔י בְּ/ת֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל אֲנִ֥י יְהוָ֖ה מְקַדִּשְׁ/כֶֽם־׃
translation:
  text: And you shall not profane my holy name, and I will be sanctified among the sons of Israel. I am Yahweh, who sanctifies you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will be shown holy' or 'I will be treated as holy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a standard expression for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְחַלְּלוּ
  chosen: profane
  alternatives:
  - treat as common
  - defile
  - dishonor
  lexicon: HALOT
  rationale: Piel of חלל here means to desecrate or treat as common what is holy. 'Profane' best preserves the cultic/theological force in concise English.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  - my sacred name
  lexicon: HALOT
  rationale: A natural English rendering of the construct phrase that preserves both 'name' and the holiness attribute. 'Holy' is more biblically conventional and transparent than 'sacred' here.
- source_word: וְנִקְדַּשְׁתִּי
  chosen: I will be sanctified
  alternatives:
  - I will be shown holy
  - I will be treated as holy
  - I will be hallowed
  lexicon: HALOT
  rationale: 'The Niphal of קדשׁ here is passive/reflexive in sense: God is to be regarded/displayed as holy. ''I will be sanctified'' preserves the verbal link with the final participle מְקַדִּשְׁכֶם and keeps the holiness vocabulary consistent.'
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: In context, 'among' is idiomatic modern English for God's sanctification in relation to the covenant community, while preserving the locative sense.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is preserved as 'sons of Israel.' Although it refers to the covenant people broadly, this rendering most closely matches the Hebrew form; more idiomatic alternatives are possible but less formally transparent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדִּשְׁכֶם
  chosen: who sanctifies you
  alternatives:
  - who makes you holy
  - who consecrates you
  lexicon: HALOT
  rationale: The participle denotes ongoing divine action. 'Sanctifies' preserves the lexical connection with קדשׁ in the verse and retains theological precision, though 'makes you holy' is a viable dynamic alternative.
