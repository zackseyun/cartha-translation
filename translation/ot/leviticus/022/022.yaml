id: LEV.22.22
reference: Leviticus 22:22
source:
  edition: WLC
  text: עַוֶּרֶת֩ א֨וֹ שָׁב֜וּר אוֹ חָר֣וּץ אֽוֹ יַבֶּ֗לֶת א֤וֹ גָרָב֙ א֣וֹ יַלֶּ֔פֶת
    לֹא תַקְרִ֥יבוּ אֵ֖לֶּה לַ/יהוָ֑ה וְ/אִשֶּׁ֗ה לֹא תִתְּנ֥וּ מֵ/הֶ֛ם עַל הַ/מִּזְבֵּ֖חַ
    לַ/יהוָֽה־־־־־׃
translation:
  text: 'You shall not present these to the LORD: anything blind, broken, mutilated,
    or with a wart, scab, or skin disease. You shall not place any of them on the
    altar as a food offering to the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַוֶּרֶת
  chosen: blind
  alternatives:
  - blind animal
  - blindness
  lexicon: HALOT
  rationale: The feminine singular adjective/noun here functions in a list of defects
    describing an animal unfit for sacrifice. 'Blind' is the natural English predicate
    adjective in this catalog.
- source_word: שָׁבוּר
  chosen: broken
  alternatives:
  - injured
  - fractured
  lexicon: HALOT
  rationale: The passive participial form denotes an animal with a broken limb or
    bodily break. 'Broken' is concise and standard in sacrificial-defect lists.
- source_word: חָרוּץ
  chosen: mutilated
  alternatives:
  - cut
  - maimed
  lexicon: HALOT
  rationale: The term refers to something cut or slit, likely a bodily mutilation.
    'Mutilated' best conveys a serious physical defect in idiomatic modern English,
    stronger and clearer than the overly literal 'cut.'
- source_word: יַבֶּלֶת
  chosen: wart
  alternatives:
  - wen
  - growth
  lexicon: HALOT
  rationale: The noun denotes an abnormal skin growth. 'Wart' is the clearest accessible
    modern equivalent; older 'wen' is less transparent.
- source_word: גָרָב
  chosen: scab
  alternatives:
  - mange
  - itch
  lexicon: HALOT
  rationale: This term denotes a skin affliction. 'Scab' fits the concrete list of
    visible defects better than broader or more interpretive renderings like 'mange'
    or 'itch.'
- source_word: יַלֶּפֶת
  chosen: skin disease
  alternatives:
  - eczema
  - rash
  - scaly eruption
  lexicon: HALOT
  rationale: The exact dermatological referent is uncertain. 'Skin disease' communicates
    the general sense without false precision; more specific options are better preserved
    as alternatives.
- source_word: תַקְרִיבוּ
  chosen: present
  alternatives:
  - bring near
  - offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present or offer.
    'Present' avoids redundancy with the later altar clause and preserves the cultic
    sense of bringing an offering before God.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - such things
  - such animals
  lexicon: HALOT
  rationale: The demonstrative refers back to the listed defective animals. 'These'
    is formally close to the Hebrew; the object is clarified by the preceding list.
- source_word: וְאִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering made by fire,' the term in
    priestly usage often denotes a food offering presented by fire. 'Food offering'
    is clearer modern English while still fitting the sacrificial context; the traditional
    alternative is worth preserving in a footnote.
- source_word: תִתְּנוּ מֵהֶם עַל הַמִּזְבֵּחַ
  chosen: place any of them on the altar
  alternatives:
  - put any of them on the altar
  - give from them upon the altar
  lexicon: HALOT
  rationale: This clause specifies the prohibited cultic action more concretely than
    the first clause. 'Place any of them on the altar' is natural English and preserves
    the distributive sense of מֵהֶם.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל is naturally
    rendered 'to' in this sacrificial context.
