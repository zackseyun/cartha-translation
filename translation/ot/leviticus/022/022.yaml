theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יהוה is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אִשֶּׁה in sacrificial terminology
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The Hebrew term is associated with offerings consumed by fire, but 'food
    offering' is a recognized and accessible rendering in Levitical contexts. Because
    'offering by fire' remains a significant traditional alternative, it is preserved
    in a footnote to maintain auditability and theological transparency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
