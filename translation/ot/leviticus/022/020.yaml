theological_decisions:
- issue: Cultic acceptability language
  chosen_reading: accepted for you
  alternative_readings:
  - acceptable for you
  - accepted on your behalf
  rationale: The verse concerns whether a sacrificial gift is received favorably before
    God, not merely whether it meets an abstract standard. 'Accepted for you' preserves
    the covenantal-sacrificial sense without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 5, 6
