id: LEV.22.20
reference: Leviticus 22:20
source:
  edition: WLC
  text: כֹּ֛ל אֲשֶׁר בּ֥/וֹ מ֖וּם לֹ֣א תַקְרִ֑יבוּ כִּי לֹ֥א לְ/רָצ֖וֹן יִהְיֶ֥ה לָ/כֶֽם־־׃
translation:
  text: You shall not present anything that has a blemish, for it will not be accepted
    for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything that has a defect.' The Hebrew sacrificial term often denotes
      a physical flaw that disqualifies an offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'it will not be acceptable on your behalf.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּל אֲשֶׁר בּוֹ מוּם
  chosen: anything that has a blemish
  alternatives:
  - whatever has a defect
  - anything in which there is a blemish
  - any animal with a blemish
  lexicon: HALOT
  rationale: כֹּל אֲשֶׁר with בּוֹ מוּם is an indefinite comprehensive expression,
    literally 'everything/anything in which is a blemish.' 'Anything that has a blemish'
    is natural English and preserves the total prohibition. 'Blemish' is retained
    as the standard sacrificial term, rather than the more generic 'defect,' to preserve
    cultic nuance.
- source_word: מוּם
  chosen: blemish
  alternatives:
  - defect
  - imperfection
  lexicon: HALOT
  rationale: מוּם commonly denotes a physical defect or blemish, especially in priestly/sacrificial
    contexts. 'Blemish' best matches established cultic usage in English while remaining
    understandable.
- source_word: לֹא תַקְרִיבוּ
  chosen: You shall not present
  alternatives:
  - you shall not offer
  - you shall not bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts means to bring near/present as
    an offering. 'Present' captures the act of bringing an offering before God without
    over-specifying the ritual stage. 'Offer' is possible, but 'present' slightly
    better reflects the causative nuance and avoids redundancy with sacrificial terminology
    elsewhere.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the prohibition. 'For' is concise
    and fits the legal style of the verse.
- source_word: לֹא לְרָצוֹן יִהְיֶה לָכֶם
  chosen: it will not be accepted for you
  alternatives:
  - it will not be for acceptance for you
  - it will not be favorable for you
  - it will not be acceptable on your behalf
  lexicon: HALOT
  rationale: לְרָצוֹן in sacrificial law refers to acceptability/acceptance before
    God. 'It will not be accepted for you' communicates the result idiomatically in
    English and preserves the relational sense of לָכֶם ('for you,' i.e., on your
    behalf).
