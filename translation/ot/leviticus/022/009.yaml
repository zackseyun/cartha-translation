id: LEV.22.9
reference: Leviticus 22:9
source:
  edition: WLC
  text: וְ/שָׁמְר֣וּ אֶת מִשְׁמַרְתִּ֗/י וְ/לֹֽא יִשְׂא֤וּ עָלָי/ו֙ חֵ֔טְא וּ/מֵ֥תוּ ב֖/וֹ כִּ֣י יְחַלְּלֻ֑/הוּ אֲנִ֥י יְהוָ֖ה מְקַדְּשָֽׁ/ם־־׃
translation:
  text: They shall keep my charge, so that they do not bear sin because of it and die by it when they profane it. I am Yahweh who sanctifies them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incur guilt because of it.' The Hebrew idiom 'bear sin' can express becoming liable for guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'die because of it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'defile it' or 'treat it as common.'
    reason: lexical_alternative
  - marker: d
    text: Or 'who makes them holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרוּ
  chosen: shall keep
  alternatives:
  - must keep
  - are to keep
  - shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, observe. In legal/cultic instruction, 'keep' is idiomatic and concise in English, preserving the covenantal-obligational sense without over-paraphrase.
- source_word: מִשְׁמַרְתִּי
  chosen: my charge
  alternatives:
  - my obligation
  - my requirement
  - my ordinance
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת in priestly contexts often denotes a duty, charge, or obligation entrusted for observance. 'My charge' preserves the entrusted-duty nuance better than the more generic 'my requirement.'
- source_word: יִשְׂאוּ עָלָיו חֵטְא
  chosen: bear sin because of it
  alternatives:
  - incur guilt because of it
  - bear guilt for it
  lexicon: HALOT
  rationale: The idiom נשׂא + חטא can mean bear sin/guilt or incur guilt. 'Bear sin because of it' stays closer to the Hebrew while remaining intelligible. 'Because of it' reflects עָלָיו without forcing a more interpretive gloss.
- source_word: וּמֵתוּ בוֹ
  chosen: and die by it
  alternatives:
  - and die because of it
  - and die for it
  lexicon: HALOT
  rationale: The preposition ב with the pronoun points to death resulting in connection with the profanation/offense. 'By it' is compact and preserves the Hebrew linkage; English readers can understand causation from context.
- source_word: יְחַלְּלֻהוּ
  chosen: they profane it
  alternatives:
  - they defile it
  - they treat it as common
  lexicon: HALOT
  rationale: חלל in priestly holiness contexts means to profane, desecrate, or treat as common. 'Profane' best matches the holiness/holy-common contrast in Leviticus. The object pronoun most naturally refers back to the sacred charge/holy thing under discussion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדְּשָׁם
  chosen: who sanctifies them
  alternatives:
  - who makes them holy
  - who consecrates them
  lexicon: HALOT
  rationale: קדשׁ in the participial form describes YHWH as the one setting them apart as holy. 'Sanctifies' preserves the theological-holiness register; 'makes them holy' is possible but slightly more expansive.
