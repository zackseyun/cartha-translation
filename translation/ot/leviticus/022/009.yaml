theological_decisions:
- issue: Referent of the pronouns in 'because of it / by it / profane it'
  chosen_reading: The pronouns are rendered generically as 'it,' referring to the sacred obligation/holy matter just mentioned rather than being over-specified.
  alternative_readings:
  - The pronouns refer specifically to the holy food discussed in the immediate context
  - The pronouns refer to YHWH's charge itself
  rationale: The Hebrew uses singular pronouns without an explicit repeated noun. Because the immediate context concerns priestly handling of holy things and the verse names 'my charge,' the English keeps the pronoun unspecific rather than resolving the ambiguity too narrowly. This preserves the textual tension and avoids importing a more definite object than the verse states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
