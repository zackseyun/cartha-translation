id: LEV.22.27
reference: Leviticus 22:27
source:
  edition: WLC
  text: שׁ֣וֹר אוֹ כֶ֤שֶׂב אוֹ עֵז֙ כִּ֣י יִוָּלֵ֔ד וְ/הָיָ֛ה שִׁבְעַ֥ת יָמִ֖ים תַּ֣חַת
    אִמּ֑/וֹ וּ/מִ/יּ֤וֹם הַ/שְּׁמִינִי֙ וָ/הָ֔לְאָה יֵרָצֶ֕ה לְ/קָרְבַּ֥ן אִשֶּׁ֖ה
    לַ/יהוָֽה־־׃
translation:
  text: When an ox or a sheep or a goat is born, it shall remain seven days under
    its mother, and from the eighth day onward it shall be accepted as an offering
    by fire to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a fire offering to the LORD." The Hebrew term refers to an offering
      presented by fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר denotes bovine livestock, often an ox/bull. 'Ox' works well as
    a generic singular in legal material and avoids implying only a male breeding
    animal ('bull').
- source_word: כֶשֶׂב
  chosen: sheep
  alternatives:
  - lamb
  - ram
  lexicon: HALOT
  rationale: כֶשֶׂב can refer to a sheep from the flock more generally, not necessarily
    a young lamb in this context. Since the verse lists species categories for sacrificial
    eligibility, 'sheep' is broader and fits the legal scope.
- source_word: עֵז
  chosen: goat
  alternatives:
  - she-goat
  lexicon: HALOT
  rationale: Though grammatically feminine, the noun here functions as a species term
    in a triad of sacrificial animals. 'Goat' best reflects the category without over-specifying
    sex.
- source_word: כִּי יִוָּלֵד
  chosen: when ... is born
  alternatives:
  - if ... is born
  - when it is brought forth
  lexicon: HALOT
  rationale: In this legal setting כִּי introduces a case law condition naturally
    rendered 'when.' The Niphal of ילד is passive/reflexive, 'is born.'
- source_word: וְהָיָה
  chosen: it shall remain
  alternatives:
  - it shall be
  - it shall stay
  lexicon: HALOT
  rationale: A wooden 'it shall be' is awkward in English. In context, with 'seven
    days under its mother,' the sense is continuance or remaining in that state, so
    'shall remain' is an optimal-equivalence rendering.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward temporal expression.
- source_word: תַּחַת אִמּוֹ
  chosen: under its mother
  alternatives:
  - with its mother
  lexicon: HALOT
  rationale: תַּחַת is literally 'under.' In animal-birth context it idiomatically
    refers to remaining with/nursing from the mother. The more literal 'under its
    mother' is retained because it is intelligible in English and preserves the Hebrew
    imagery.
- source_word: וּמִיּוֹם הַשְּׁמִינִי וָהָלְאָה
  chosen: and from the eighth day onward
  alternatives:
  - and from the eighth day and beyond
  - but from the eighth day on
  lexicon: HALOT
  rationale: This idiom marks the starting point of acceptability. 'From the eighth
    day onward' is natural modern English and preserves the temporal force.
- source_word: יֵרָצֶה
  chosen: it shall be accepted
  alternatives:
  - it shall be acceptable
  - it shall find acceptance
  lexicon: HALOT
  rationale: The Niphal of רצה here concerns acceptability for sacrificial use. 'Be
    accepted' communicates the cultic approval more clearly than the slightly abstract
    'be acceptable.'
- source_word: לְקָרְבַּן
  chosen: as an offering
  alternatives:
  - for an offering
  - as a gift offering
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'As an
    offering' fits the syntax with יֵרָצֶה and reads naturally.
- source_word: אִשֶּׁה
  chosen: by fire
  alternatives:
  - fire offering
  - food offering
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally denotes an offering made by fire. 'By fire' preserves
    the sacrificial mode without importing the debated paraphrase 'food offering.'
    A lexical alternative is worth preserving in a footnote because English tradition
    varies here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'To the LORD' matches the
    directionality of the preposition and sacrificial presentation.
