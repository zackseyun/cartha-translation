id: LEV.22.14
reference: Leviticus 22:14
source:
  edition: WLC
  text: וְ/אִ֕ישׁ כִּֽי יֹאכַ֥ל קֹ֖דֶשׁ בִּ/שְׁגָגָ֑ה וְ/יָסַ֤ף חֲמִֽשִׁית/וֹ֙ עָלָ֔י/ו וְ/נָתַ֥ן לַ/כֹּהֵ֖ן אֶת הַ/קֹּֽדֶשׁ־־׃
translation:
  text: And if a man eats a holy thing unintentionally, then he shall add a fifth to it and give the holy thing to the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anyone' / 'a person'; Hebrew 'a man' (אִישׁ), a masculine singular legal formulation that may function generically.
    reason: lexical_alternative
  - marker: b
    text: '''A holy thing'' refers to consecrated holy food or property reserved for priestly use.'
    reason: cultural_note
  - marker: c
    text: Or 'by mistake' / 'in error.'
    reason: lexical_alternative
  - marker: d
    text: Or 'add a fifth of it to it'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אִישׁ
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew noun אִישׁ is grammatically masculine singular. Per the translation philosophy's gender-accurate principle, 'a man' preserves the source form. In legal material it can function generically, but the main text keeps the masculine form rather than neutralizing it.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this casuistic legal setting, כִּי introduces a conditional case. 'If' is the most natural English rendering for the protasis.
- source_word: יֹאכַל
  chosen: eats
  alternatives:
  - shall eat
  - consumes
  lexicon: HALOT
  rationale: The imperfect here expresses the case in a legal condition. Present-tense English 'eats' works idiomatically in a law formula without unnecessary archaism.
- source_word: קֹדֶשׁ
  chosen: a holy thing
  alternatives:
  - holy food
  - sacred thing
  - sanctified offering
  lexicon: HALOT
  rationale: קֹדֶשׁ here refers to consecrated holy property/food that may be eaten only by authorized persons. 'A holy thing' is sufficiently literal and broad, matching the Hebrew better than the narrower 'holy food,' while remaining understandable.
- source_word: בִּ/שְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - in error
  lexicon: HALOT
  rationale: The term denotes inadvertence rather than defiant action. 'Unintentionally' is clear modern English and preserves the legal distinction.
- source_word: וְ/יָסַף
  chosen: he shall add
  alternatives:
  - then he shall add
  - he must add
  lexicon: HALOT
  rationale: In the apodosis of the legal case, the verb gives the required restitution. 'He shall add' preserves the prescriptive force in standard legal English.
- source_word: חֲמִשִׁיתוֹ
  chosen: a fifth of it
  alternatives:
  - its fifth part
  - twenty percent of it
  lexicon: HALOT
  rationale: The noun means 'a fifth' with the pronominal suffix referring back to the holy thing consumed. 'A fifth of it' is both accurate and natural.
- source_word: עָלָיו
  chosen: to it
  alternatives:
  - onto it
  - in addition to it
  lexicon: HALOT
  rationale: With יסף, עַל marks addition to the principal amount. English idiom requires an additive expression; 'to it' is concise and reflects the sense of adding the fifth to the original value.
- source_word: וְ/נָתַן
  chosen: and give
  alternatives:
  - and he shall give
  - and pay
  lexicon: HALOT
  rationale: The verb means 'give.' Although the context is restitution, 'give' stays closer to the Hebrew than the more interpretive 'pay.'
- source_word: לַ/כֹּהֵן
  chosen: to the priest
  alternatives:
  - to a priest
  lexicon: HALOT
  rationale: 'The prefixed article indicates a definite class reference in context: the restitution is to be given to the officiating/appropriate priestly recipient. ''To the priest'' is the most straightforward rendering.'
- source_word: אֶת הַ/קֹּדֶשׁ
  chosen: the holy thing
  alternatives:
  - the holy portion
  - the sacred thing
  lexicon: HALOT
  rationale: The direct object repeats קֹדֶשׁ with the article, referring to the consecrated item/value restored. Repeating 'the holy thing' preserves the lexical link in Hebrew. Some English versions paraphrase toward 'the holy portion,' but the Hebrew itself remains broader.
