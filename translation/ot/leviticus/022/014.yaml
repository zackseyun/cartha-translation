theological_decisions:
- issue: Generic masculine in legal formulation
  chosen_reading: Retain 'a man' in the main text
  alternative_readings:
  - anyone
  - a person
  rationale: The source uses masculine singular אִישׁ in a legal case statement. Following the doctrine's gender-accurate principle, the translation preserves the masculine form rather than flattening it to a gender-neutral expression, while recognizing that the law may function generically.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nature of the restitution object
  chosen_reading: Render קֹדֶשׁ as 'holy thing' in both occurrences
  alternative_readings:
  - holy food
  - holy portion
  rationale: The verse concerns unauthorized consumption of consecrated material and its restitution. A broader rendering preserves the Hebrew term without over-specifying beyond what the verse itself states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
