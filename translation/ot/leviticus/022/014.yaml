  source_review: state/reviews/gemini/ot/leviticus/022/014.json
  category: awkward_english
  tier: 1
  from: add a fifth of it to it
  to: add a fifth to it
  rationale: The current rendering is a very literal translation of the Hebrew `חֲמִשִׁיתוֹ עָלָיו`. However, the repetition of 'it' in the phrase 'add a fifth of it to it' is stylistically awkward in English. The suggested rewrite, 'add a fifth to it,' is more idiomatic and improves readability without losing any meaning, as the object of 'a fifth' is clear from the context. This phrasing is common in other modern English translations for clarity.
