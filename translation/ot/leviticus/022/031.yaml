id: LEV.22.31
reference: Leviticus 22:31
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּם֙ מִצְוֺתַ֔/י וַ/עֲשִׂיתֶ֖ם אֹתָ֑/ם אֲנִ֖י יְהוָֽה׃
translation:
  text: So you shall keep my commandments and do them; I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''; alternatively transliterated ''Yahweh'').'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - You must keep
  - You shall observe
  lexicon: HALOT
  rationale: שׁמר in covenantal/legal contexts commonly means to keep, observe, or guard commandments. 'Keep' is idiomatic and concise in English. The prefixed conjunction is rendered 'So' to reflect the discourse connection from the preceding context rather than a bare additive 'and'.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: מִצְוָה denotes a commandment/command. 'Commandments' preserves the formal covenantal tone and matches common legal-religious usage in Torah.
- source_word: וַעֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and obey them
  lexicon: HALOT
  rationale: עשה with commandments literally means 'do' them. Retaining 'do them' preserves the Hebrew's concrete formulation and avoids collapsing this clause into the previous verb, since the text intentionally pairs keeping and doing.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: This covenant formula is frequent in Leviticus. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated. Including 'I am' preserves the emphatic self-identification formula.
