theological_decisions:
- issue: Nature of impurity language in Levitical law
  chosen_reading: Render טמא / טֻמְאָה as ritual 'unclean / uncleanness' rather than
    moralized language.
  alternative_readings:
  - impure / impurity
  rationale: The context is priestly purity legislation, not necessarily moral guilt.
    'Unclean / uncleanness' is the established and contextually precise rendering,
    while still readable in modern English.
