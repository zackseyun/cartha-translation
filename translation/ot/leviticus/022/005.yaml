id: LEV.22.5
reference: Leviticus 22:5
source:
  edition: WLC
  text: אוֹ אִישׁ֙ אֲשֶׁ֣ר יִגַּ֔ע בְּ/כָל שֶׁ֖רֶץ אֲשֶׁ֣ר יִטְמָא ל֑/וֹ א֤וֹ בְ/אָדָם֙
    אֲשֶׁ֣ר יִטְמָא ל֔/וֹ לְ/כֹ֖ל טֻמְאָתֽ/וֹ־־־־׃
translation:
  text: or a man who touches any swarming thing by which he becomes unclean, or a
    man by whom he becomes unclean, whatever his uncleanness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any creeping thing.' The Hebrew term refers to small creatures that
      swarm or move close to the ground.
    reason: lexical_alternative
  - marker: b
    text: Or 'a person ... whatever his impurity.' The Hebrew uses masculine singular
      terms in a generic legal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction continuing the list from the previous
    verse.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: Rendered 'a man' to reflect the masculine singular form and align with
    the project's gender-accurate policy. In this legal context it functions generically,
    but the source wording is masculine singular.
- source_word: יִגַּע
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: Standard rendering of נגע in purity legislation; 'touches' is both accurate
    and natural.
- source_word: בְּכָל שֶׁרֶץ
  chosen: any swarming thing
  alternatives:
  - any creeping thing
  - any swarming creature
  lexicon: HALOT
  rationale: שֶׁרֶץ in Levitical purity contexts refers broadly to swarming/teeming
    small creatures. 'Swarming thing' preserves the category without over-specifying
    zoologically.
- source_word: אֲשֶׁר יִטְמָא לוֹ
  chosen: by which he becomes unclean
  alternatives:
  - that makes him unclean
  - from which he becomes unclean
  lexicon: HALOT
  rationale: The clause expresses instrument or source of impurity. 'By which he becomes
    unclean' preserves the Hebrew construction and keeps the focus on resulting ritual
    impurity.
- source_word: בְאָדָם
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: HALOT
  rationale: אָדָם can mean humankind or a human/person. Here, after the preposition
    ב, it refers to contact with a human source of impurity. 'A man' keeps the gender-accurate
    singular style of the verse, though the sense is generic human.
- source_word: אֲשֶׁר יִטְמָא לוֹ לְכֹל טֻמְאָתוֹ
  chosen: by whom he becomes unclean, whatever his uncleanness
  alternatives:
  - who makes him unclean in any of his uncleanness
  - from whom he becomes unclean by any uncleanness he has
  lexicon: HALOT
  rationale: The Hebrew is compact and somewhat awkward in English. The rendering
    preserves the sense that contact with a human can transmit impurity of whatever
    kind that person's impurity may be. 'Whatever his uncleanness' captures לְכֹל
    טֻמְאָתוֹ without over-paraphrase.
- source_word: טֻמְאָה
  chosen: uncleanness
  alternatives:
  - impurity
  lexicon: HALOT
  rationale: Both are possible in ritual contexts. 'Uncleanness' matches the repeated
    verbal root טמא in the verse and preserves the lexical connection in English.
