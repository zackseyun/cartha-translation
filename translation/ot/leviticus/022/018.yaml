- issue: Rendering of masculine representative language in legal instruction
  chosen_reading: Any man
  alternative_readings:
  - Any person
  - Whoever
  rationale: The Hebrew uses the distributive masculine אִישׁ אִישׁ. Following the translation philosophy's gender-accurate principle, the masculine form is retained rather than neutralized, since the legal style uses representative masculine language.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
