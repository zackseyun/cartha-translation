id: LEV.22.18
reference: Leviticus 22:18
source:
  edition: WLC
  text: דַּבֵּ֨ר אֶֽל אַהֲרֹ֜ן וְ/אֶל בָּנָ֗י/ו וְ/אֶל֙ כָּל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם אִ֣ישׁ אִישׁ֩ מִ/בֵּ֨ית יִשְׂרָאֵ֜ל וּ/מִן הַ/גֵּ֣ר בְּ/יִשְׂרָאֵ֗ל אֲשֶׁ֨ר יַקְרִ֤יב קָרְבָּנ/וֹ֙ לְ/כָל נִדְרֵי/הֶם֙ וּ/לְ/כָל נִדְבוֹתָ֔/ם אֲשֶׁר יַקְרִ֥יבוּ לַ/יהוָ֖ה לְ/עֹלָֽה־־־־־־־׃
translation:
  text: 'Speak to Aaron and to his sons and to all the sons of Israel, and say to them: Any man from the house of Israel, or from the sojourners in Israel, who presents his offering for any of their vows or any of their freewill offerings, which they present to Yahweh as a burnt offering—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigner in Israel.' The Hebrew גֵּר refers to a non-Israelite living among Israel under its communal order.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the sons of Israel'; many English versions render this idiomatically as 'all the Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for all their vow offerings and all their freewill offerings.' The Hebrew may be understood as referring more specifically to offerings associated with vows.
    reason: alternative_reading
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak
  lexicon: HALOT
  rationale: Piel imperative of דבר introducing direct divine instruction. 'Speak' preserves the formal command tone and matches the common legal-register usage in Leviticus.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' not a gender-neutral term. This follows the gender-accurate policy and the priestly context refers to Aaron's male priestly descendants.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the Israelites
  - all the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew phrase. 'Sons of Israel' preserves the source wording and kinship language better than the more idiomatic 'Israelites.'
- source_word: אִישׁ אִישׁ
  chosen: Any man
  alternatives:
  - Any person
  - Whoever
  lexicon: HALOT
  rationale: The distributive repetition means 'any man' or 'each man.' Because the source is grammatically masculine with representative force, 'Any man' best reflects the Hebrew while remaining natural English.
- source_word: מִבֵּית יִשְׂרָאֵל
  chosen: from the house of Israel
  alternatives:
  - from Israel
  - from the people of Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is a significant covenantal expression and should be preserved rather than flattened to a generic ethnic label.'
- source_word: הַגֵּר בְּיִשְׂרָאֵל
  chosen: the sojourner in Israel
  alternatives:
  - the resident foreigner in Israel
  - the alien in Israel
  - the stranger in Israel
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' is a readable and established rendering that preserves the covenant-legal nuance better than the now-misleading 'alien' or the overly broad 'stranger.'
- source_word: יַקְרִיב
  chosen: presents
  alternatives:
  - brings near
  - offers
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to bring/present an offering. 'Presents' is natural English and avoids repeating 'offer' too heavily while still conveying cultic presentation.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift offering
  - his sacrifice
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'Offering' is the broadest and most contextually appropriate rendering here.
- source_word: לְכָל נִדְרֵיהֶם
  chosen: for any of their vows
  alternatives:
  - for all their vow offerings
  - for any vow they make
  lexicon: HALOT
  rationale: The phrase refers to offerings associated with vows. 'For any of their vows' keeps the Hebrew structure without over-specifying beyond the text.
- source_word: נִדְבוֹתָם
  chosen: their freewill offerings
  alternatives:
  - their voluntary offerings
  lexicon: HALOT
  rationale: This is a standard sacrificial category in Leviticus. 'Freewill offerings' is the conventional and accurate rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: לְעֹלָה
  chosen: as a burnt offering
  alternatives:
  - for a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the technical term for the whole burnt offering. 'As a burnt offering' reads smoothly in English while preserving the sacrificial category.
