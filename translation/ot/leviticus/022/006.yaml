theological_decisions:
- issue: Nature of impurity language
  chosen_reading: ritual uncleanness
  alternative_readings:
  - moral impurity
  rationale: The verse concerns cultic eligibility to eat holy things after contact
    impurity and washing. The translation uses 'unclean' in its ritual sense and avoids
    importing moral guilt language not stated in the text.
