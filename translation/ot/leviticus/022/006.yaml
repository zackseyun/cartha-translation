id: LEV.22.6
reference: Leviticus 22:6
source:
  edition: WLC
  text: נֶ֚פֶשׁ אֲשֶׁ֣ר תִּגַּע בּ֔/וֹ וְ/טָמְאָ֖ה עַד הָ/עָ֑רֶב וְ/לֹ֤א יֹאכַל֙ מִן
    הַ/קֳּדָשִׁ֔ים כִּ֛י אִם רָחַ֥ץ בְּשָׂר֖/וֹ בַּ/מָּֽיִם־־־־׃
translation:
  text: The person who touches it shall be unclean until the evening, and shall not
    eat any of the holy things unless he has washed his body with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred offerings' / 'the consecrated things' for 'the holy things.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'washed his flesh in water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - anyone
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ commonly refers to an individual person rather
    than the immaterial 'soul.' 'Person' is natural English and preserves the singular
    legal force.
- source_word: אֲשֶׁר תִּגַּע בּוֹ
  chosen: who touches it
  alternatives:
  - that touches him
  - who touches him
  lexicon: HALOT
  rationale: The feminine verb agrees with נֶפֶשׁ as a grammatically feminine noun,
    not with biological sex. The pronominal suffix 'it/him' refers back to the source
    of impurity in the previous context; 'it' avoids implying a male human referent
    where the antecedent may be non-personal.
- source_word: וְטָמְאָה
  chosen: shall be unclean
  alternatives:
  - becomes unclean
  - is unclean
  lexicon: HALOT
  rationale: The clause states the resulting ritual status. 'Shall be unclean' fits
    the legal register and English sequence with the following time phrase.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The article is naturally represented in English as 'the evening,' a common
    idiom in ritual legislation marking the duration of impurity.
- source_word: וְלֹא יֹאכַל
  chosen: and shall not eat
  alternatives:
  - and he may not eat
  - and must not eat
  lexicon: HALOT
  rationale: Imperfect in legal context expresses prohibition/consequence. 'Shall
    not eat' preserves the formal legal tone.
- source_word: מִן הַקֳּדָשִׁים
  chosen: any of the holy things
  alternatives:
  - from the holy things
  - of the sacred offerings
  - of the consecrated things
  lexicon: HALOT
  rationale: The plural refers to consecrated food/items reserved as holy. 'Holy things'
    is a standard and sufficiently transparent rendering; 'any of' conveys the partitive
    force of מִן.
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - but only if
  lexicon: HALOT
  rationale: The idiom introduces the condition that must be met before eating may
    occur. 'Unless' is the most natural concise English equivalent.
- source_word: רָחַץ בְּשָׂרוֹ בַּמָּיִם
  chosen: he has washed his body with water
  alternatives:
  - he bathes his flesh in water
  - he has bathed himself in water
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in this ritual context it idiomatically
    refers to the body. 'Washed his body with water' is clear modern English without
    losing the concrete physical action.
