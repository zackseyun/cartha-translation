id: LEV.22.30
reference: Leviticus 22:30
source:
  edition: WLC
  text: בַּ/יּ֤וֹם הַ/הוּא֙ יֵאָכֵ֔ל לֹֽא תוֹתִ֥ירוּ מִמֶּ֖/נּוּ עַד בֹּ֑קֶר אֲנִ֖י
    יְהוָֽה־־׃
translation:
  text: It shall be eaten on that same day; you shall leave none of it until morning.
    I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on that day.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''I am Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: on that same day
  alternatives:
  - on that day
  - in that day
  lexicon: HALOT
  rationale: The phrase literally means 'on that day.' 'That same day' brings out
    the immediate temporal force in natural English and fits the sacrificial regulation
    context, where consumption is restricted to the very day of offering.
- source_word: יֵאָכֵל
  chosen: It shall be eaten
  alternatives:
  - it must be eaten
  - it is to be eaten
  lexicon: HALOT
  rationale: Niphal imperfect of אכל functions here as an impersonal/passive prescription.
    'It shall be eaten' preserves the formal passive and legal tone without over-paraphrasing.
- source_word: לֹא תוֹתִירוּ
  chosen: you shall leave none
  alternatives:
  - you shall not leave any
  - do not leave any
  lexicon: HALOT
  rationale: Hiphil of יתר means to leave over, leave remaining. 'You shall leave
    none' is concise, idiomatic, and preserves the prohibition's force in covenantal/legal
    style.
- source_word: מִמֶּנּוּ
  chosen: of it
  alternatives:
  - from it
  - any of it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers to the sacrificial meat.
    In English, 'of it' after 'leave none' is the most natural equivalent; 'any of
    it' is semantically similar but slightly more expansive than the Hebrew wording.
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - before morning
  lexicon: HALOT
  rationale: Standard temporal expression meaning the remainder must not be kept overnight.
    'Until morning' is the most natural modern English rendering.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: This covenantal self-identification formula is common in Leviticus. Per
    doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
    Including 'am' reflects the verbless Hebrew formula in standard English.
