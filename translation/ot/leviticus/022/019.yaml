theological_decisions:
- issue: Sacrificial acceptability phrasing
  chosen_reading: for your acceptance
  alternative_readings:
  - that you may be accepted
  rationale: The Hebrew can be understood either as describing the offering's acceptability
    or the worshipers' acceptance through it. The nominal phrase most directly supports
    'for your acceptance,' which preserves the cultic logic without over-interpreting
    the mechanism.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
