id: LEV.22.19
reference: Leviticus 22:19
source:
  edition: WLC
  text: לִֽ/רְצֹנְ/כֶ֑ם תָּמִ֣ים זָכָ֔ר בַּ/בָּקָ֕ר בַּ/כְּשָׂבִ֖ים וּ/בָֽ/עִזִּֽים׃
translation:
  text: for your acceptance, it must be a sound male from the cattle, the sheep, or
    the goats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without blemish.' The Hebrew term denotes an animal free from defect
      and suitable for sacrifice.
    reason: lexical_alternative
  - marker: b
    text: Or 'that you may be accepted.' The Hebrew phrase 'for your acceptance' can
      be understood with the offerers' acceptance in view.
    reason: alternative_reading
lexical_decisions:
- source_word: לִרְצֹנְכֶם
  chosen: for your acceptance
  alternatives:
  - for your favor
  - that you may be accepted
  - for your pleasure
  lexicon: HALOT
  rationale: The phrase with ל plus רָצוֹן and 2mp suffix expresses the condition
    under which the offering is acceptable on behalf of the offerers. 'For your acceptance'
    is concise and idiomatic in context, preserving the sacrificial acceptability
    sense better than the more subjective 'for your pleasure.' 'That you may be accepted'
    is possible contextually, but the Hebrew is nominal rather than verbal here.
- source_word: תָּמִים
  chosen: sound
  alternatives:
  - without blemish
  - blameless
  - whole
  lexicon: HALOT
  rationale: In sacrificial contexts תמים denotes an animal free from defect. 'Sound'
    is readable modern English and avoids importing later ecclesiastical phrasing,
    while still conveying physical wholeness. 'Without blemish' is a strong traditional
    alternative and is preserved in a footnote because it is common and contextually
    precise.
- source_word: זָכָר
  chosen: male
  alternatives:
  - a male
  lexicon: HALOT
  rationale: The adjective/noun specifies the sex of the sacrificial animal. 'Male'
    is the direct and natural rendering.
- source_word: בַּבָּקָר
  chosen: from the cattle
  alternatives:
  - from the herd
  - of the cattle
  lexicon: HALOT
  rationale: בקר here denotes bovine livestock as a source category for the offering.
    'From the cattle' fits the partitive sense in English and matches the list structure.
- source_word: בַּכְּשָׂבִים
  chosen: the sheep
  alternatives:
  - the lambs
  - the flock
  lexicon: HALOT
  rationale: כשבים refers to sheep, often specifically lambs in some contexts, but
    here as one category in a triad of animal classes. 'The sheep' is the broadest
    and safest rendering.
- source_word: וּבָעִזִּים
  chosen: the goats
  alternatives:
  - or goats
  lexicon: HALOT
  rationale: עזים denotes goats as the third permitted category. In English the final
    item in the series is naturally rendered 'or the goats' within the disjunctive
    list sense.
