theological_decisions:
- issue: Nature of the defect terms שָׂרוּעַ and קָלוּט
  chosen_reading: Render the pair specifically as disproportioned limbs ('too long
    or too short') rather than a broad 'deformed or dwarfed.'
  alternative_readings:
  - deformed or stunted
  - one part too large or too small
  rationale: The immediate context concerns bodily defects that affect sacrificial
    acceptability. The paired terms appear to describe opposite forms of disproportion.
    A specific rendering best reflects the Hebrew imagery while remaining readable.
    Because the exact anatomical nuance is somewhat uncertain, an alternative is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §1, §5
