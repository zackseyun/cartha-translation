id: LEV.22.23
reference: Leviticus 22:23
source:
  edition: WLC
  text: וְ/שׁ֥וֹר וָ/שֶׂ֖ה שָׂר֣וּעַ וְ/קָל֑וּט נְדָבָה֙ תַּעֲשֶׂ֣ה אֹת֔/וֹ וּ/לְ/נֵ֖דֶר
    לֹ֥א יֵרָצֶֽה׃
translation:
  text: But an ox or a sheep that has a limb too long or too short—you may present
    it as a freewill offering, but for a vow it will not be accepted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more generally, 'deformed or stunted.' The Hebrew terms likely describe
      opposite kinds of bodily disproportion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשׁוֹר
  chosen: an ox
  alternatives:
  - a bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר denotes an ox/bovine animal. 'Ox' is a natural singular rendering
    in sacrificial legislation and pairs well with 'sheep' here.
- source_word: וָשֶׂה
  chosen: or a sheep
  alternatives:
  - or a lamb
  - or a head of small livestock
  lexicon: HALOT
  rationale: שֶׂה can denote a sheep or goat from the flock, but 'sheep' is a conventional
    and contextually suitable rendering here, especially in contrast with שׁוֹר. The
    verse speaks generically of sacrificial animals rather than specifying age.
- source_word: שָׂרוּעַ
  chosen: that has a limb too long
  alternatives:
  - deformed
  - having an overgrown limb
  - extended
  lexicon: HALOT
  rationale: שָׂרוּעַ refers to something stretched out, extended, or disproportionate.
    In the context of physical defects in sacrificial animals, 'has a limb too long'
    makes the defect concrete in readable English without overgeneralizing to any
    deformity.
- source_word: וְקָלוּט
  chosen: or too short
  alternatives:
  - stunted
  - contracted
  - maimed
  lexicon: HALOT
  rationale: קָלוּט in this defect list is commonly understood as the opposite kind
    of disproportioned limb—contracted, undersized, or too short. Rendering it as
    'too short' preserves the contrast with שָׂרוּעַ and communicates the likely sense
    clearly.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - a voluntary offering
  lexicon: HALOT
  rationale: נְדָבָה denotes a voluntary/freewill offering given apart from a binding
    obligation. 'Freewill offering' is the standard and precise cultic term in English.
- source_word: תַּעֲשֶׂה אֹתוֹ
  chosen: you may present it
  alternatives:
  - you may make it
  - you may offer it
  lexicon: HALOT
  rationale: Literally 'you may make/do it,' but in sacrificial context the idiomatic
    sense is to present or offer the animal as an offering. 'Present it' is natural
    English and fits the cultic setting.
- source_word: וּלְנֵדֶר
  chosen: but for a vow
  alternatives:
  - but as a vow offering
  - but for a votive offering
  lexicon: HALOT
  rationale: נֵדֶר is a vow or votive obligation. 'For a vow' preserves the concise
    Hebrew construction and the contrast with a freewill offering.
- source_word: לֹא יֵרָצֶה
  chosen: it will not be accepted
  alternatives:
  - it will not be favorable
  - it will not be acceptable
  lexicon: HALOT
  rationale: The Niphal of רצה in sacrificial contexts means to be accepted favorably.
    'It will not be accepted' is idiomatic and accurately conveys cultic acceptability
    before God.
