id: LEV.22.1
reference: Leviticus 22:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + דבר introduces a new narrative/speech unit with
    the standard formula 'and ... spoke.' 'Spoke' preserves the formal speech-introduction
    force better than the simpler 'said,' especially before the following infinitive
    'saying.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential substitution pattern
    reflected in Jewish tradition and the Septuagint.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of divine speech. 'To' is the
    natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name משה.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces the content of speech.
    'Saying' is the conventional and clear English rendering, preserving the formal
    cadence of the Hebrew speech formula.
