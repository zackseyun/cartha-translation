theological_decisions:
- issue: Meaning of the penalty formula 'shall be cut off'
  chosen_reading: Retained as 'shall be cut off' without specifying death, excommunication, or childlessness.
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  - shall be removed from covenant standing
  rationale: The Hebrew formula is theologically and legally debated, and the verse itself does not define the mechanism. Preserving the formula maintains the text's tension rather than resolving it beyond the source.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
