id: LEV.22.3
reference: Leviticus 22:3
source:
  edition: WLC
  text: אֱמֹ֣ר אֲלֵ/הֶ֗ם לְ/דֹרֹ֨תֵי/כֶ֜ם כָּל אִ֣ישׁ אֲשֶׁר יִקְרַ֣ב מִ/כָּל זַרְעֲ/כֶ֗ם אֶל הַ/קֳּדָשִׁים֙ אֲשֶׁ֨ר יַקְדִּ֤ישׁוּ בְנֵֽי יִשְׂרָאֵל֙ לַֽ/יהוָ֔ה וְ/טֻמְאָת֖/וֹ עָלָ֑י/ו וְ/נִכְרְתָ֞ה הַ/נֶּ֧פֶשׁ הַ/הִ֛וא מִ/לְּ/פָנַ֖/י אֲנִ֥י יְהוָֽה־׀־־־־׃
translation:
  text: 'Say to them, throughout your generations: Any man from any of your offspring who comes near the holy things that the sons of Israel consecrate to Yahweh while his uncleanness is on him—that person shall be cut off from before me. I am Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from my presence.'
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' is a standard covenantal penalty formula; the precise mode of removal is debated.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative singular of אמר addressed to Moses. 'Say' is natural modern English and sufficiently direct.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - in your generations
  lexicon: HALOT
  rationale: Idiomatic covenantal/legal formula indicating ongoing applicability across successive generations.
- source_word: כָּל אִישׁ
  chosen: Any man
  alternatives:
  - Anyone
  - Any person
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining the masculine singular where Hebrew uses איש generically/representatively. Here it introduces a legal case applying to any male member of Aaronic offspring in context; 'any man' preserves the source form.
- source_word: יִקְרַב
  chosen: comes near
  alternatives:
  - approaches
  - draws near
  lexicon: HALOT
  rationale: קרב in priestly contexts often denotes approaching sacred things. 'Comes near' is clear modern English and preserves the spatial/ritual sense.
- source_word: מִכָּל זַרְעֲכֶם
  chosen: from any of your offspring
  alternatives:
  - from all your descendants
  - from any of your seed
  lexicon: HALOT
  rationale: Refers to descendants/lineage. 'Offspring' is natural English and avoids overly literal 'seed' while preserving genealogical force.
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the sacred offerings
  - the holy gifts
  lexicon: HALOT
  rationale: Plural of קדשׁ in cultic context refers to consecrated things/offerings. 'Holy things' is broad enough to match the Hebrew without over-specifying.
- source_word: יַקְדִּישׁוּ
  chosen: consecrate
  alternatives:
  - set apart as holy
  - dedicate
  lexicon: HALOT
  rationale: Hiphil of קדשׁ means to consecrate or set apart. 'Consecrate' preserves the cultic register appropriately.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Formal ethnic designation. 'Sons of Israel' preserves the Hebrew expression; although 'Israelites' is possible, the more literal rendering fits the legal style here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' in the main text.
- source_word: וְטֻמְאָתוֹ עָלָיו
  chosen: while his uncleanness is on him
  alternatives:
  - with his uncleanness upon him
  - while he is unclean
  lexicon: HALOT
  rationale: The Hebrew states literally that his impurity remains upon him. This wording preserves the ritual-state imagery better than the flatter 'while he is unclean.'
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be excluded
  - shall be removed
  lexicon: HALOT
  rationale: Standard covenantal/judicial formula for כרת in Niphal. 'Cut off' preserves the traditional and lexical force without prematurely specifying the exact mode of punishment.
- source_word: הַנֶּפֶשׁ הַהִוא
  chosen: that person
  alternatives:
  - that soul
  - that life
  lexicon: HALOT
  rationale: Although נפש literally means 'soul/life,' in legal formulas it commonly refers to the individual person. 'That person' is idiomatic and accurate.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from my presence
  - away from before me
  lexicon: HALOT
  rationale: Literal relational phrase indicating exclusion from Yahweh's presence. 'From before me' preserves the Hebrew image and solemnity.
