id: LEV.22.10
reference: Leviticus 22:10
source:
  edition: WLC
  text: וְ/כָל זָ֖ר לֹא יֹ֣אכַל קֹ֑דֶשׁ תּוֹשַׁ֥ב כֹּהֵ֛ן וְ/שָׂכִ֖יר לֹא יֹ֥אכַל
    קֹֽדֶשׁ־־־׃
translation:
  text: No outsider may eat the holy thing; a resident with a priest or a hired worker
    may not eat the holy thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy food' or 'sacred portion.' The Hebrew singular 'holy thing' refers
      here to food from sacred offerings reserved for priestly consumption.
    reason: lexical_alternative
  - marker: b
    text: '''A resident with a priest'' renders a term for a non-family dependent
      or sojourning resident attached to a priest''s household; alternatively, ''a
      priest''s sojourner'' or ''a resident alien of a priest.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: זָר
  chosen: outsider
  alternatives:
  - stranger
  - layperson
  - unauthorized person
  lexicon: HALOT
  rationale: In priestly/holy-food context, זָר refers not primarily to an ethnic
    foreigner but to someone outside the authorized priestly household. 'Outsider'
    communicates exclusion from sacred privilege better than 'stranger.'
- source_word: קֹדֶשׁ
  chosen: the holy thing
  alternatives:
  - holy food
  - sacred offering
  - holy portion
  lexicon: HALOT
  rationale: The noun is singular 'holy thing,' here referring concretely to sacred
    food portions. 'The holy thing' stays close to the Hebrew while remaining intelligible;
    more interpretive options are preserved as alternatives.
- source_word: תּוֹשַׁב כֹּהֵן
  chosen: a resident with a priest
  alternatives:
  - a priest's sojourner
  - a resident alien of a priest
  - a temporary resident belonging to a priest
  lexicon: HALOT
  rationale: The construct-like relationship indicates a resident dependent or attached
    to a priest's household, not the priest himself as resident. 'Resident with a
    priest' is readable modern English that preserves the household-association sense
    without overcommitting to alien-status terminology.
- source_word: שָׂכִיר
  chosen: hired worker
  alternatives:
  - hired servant
  - wage laborer
  lexicon: HALOT
  rationale: The term denotes a wage-earning hired person. 'Hired worker' is clear,
    modern, and socially accurate.
- source_word: לֹא יֹאכַל
  chosen: may not eat
  alternatives:
  - shall not eat
  - must not eat
  lexicon: HALOT
  rationale: The imperfect with negation expresses prohibition. 'May not' conveys
    legal permission/prohibition naturally in English, fitting the holiness legislation.
- source_word: וְכָל
  chosen: 'No'
  alternatives:
  - And every
  - any
  lexicon: HALOT
  rationale: The combination with the following singular noun and prohibition is idiomatically
    rendered 'No outsider...' in English rather than the more wooden 'And every outsider
    shall not...'
