id: LEV.22.8
reference: Leviticus 22:8
source:
  edition: WLC
  text: נְבֵלָ֧ה וּ/טְרֵפָ֛ה לֹ֥א יֹאכַ֖ל לְ/טָמְאָה בָ֑/הּ אֲנִ֖י יְהוָֽה־׃
translation:
  text: He shall not eat an animal found dead or torn by beasts, making himself unclean by it. I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He shall not eat what dies naturally or is torn by beasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבֵלָה
  chosen: an animal found dead
  alternatives:
  - carcass
  - that which dies of itself
  lexicon: HALOT
  rationale: נְבֵלָה refers to an animal carcass, especially one that died naturally rather than by proper slaughter. 'An animal found dead' communicates the sense clearly in modern English and fits the food-law context better than the bare 'carcass,' while avoiding archaic phrasing like 'that which dies of itself.'
- source_word: וּטְרֵפָה
  chosen: or torn by beasts
  alternatives:
  - or torn
  - or a torn animal
  lexicon: HALOT
  rationale: טְרֵפָה denotes an animal torn by predators. 'Torn by beasts' makes the implied agent explicit in idiomatic English and reflects the established sense of the term in Torah food-law contexts.
- source_word: לֹא יֹאכַל
  chosen: He shall not eat
  alternatives:
  - he must not eat
  - he is not to eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material expresses prohibition. 'He shall not eat' preserves the legal-register force without sounding overly archaic.
- source_word: לְטָמְאָה בָהּ
  chosen: and so make himself unclean by it
  alternatives:
  - to become unclean by it
  - thereby defiling himself with it
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses result/purpose: eating such meat would render the priest unclean. ''And so make himself unclean by it'' brings out the consequential force in natural English. ''Defile himself'' is possible, but ''make himself unclean'' more directly reflects the ritual-purity terminology of טמא.'
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: This covenantal formula is standard in Leviticus. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
