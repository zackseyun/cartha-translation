theological_decisions:
- issue: Rendering the legal idiom דָּם יֵחָשֵׁב
  chosen_reading: bloodguilt shall be counted to that man
  alternative_readings:
  - blood shall be imputed to that man
  - blood shall be counted to that man
  rationale: The verse pronounces legal culpability for unauthorized slaughter. Translating
    with 'bloodguilt' clarifies the judicial sense without adding a new doctrine;
    the following clause 'he has shed blood' confirms that liability for bloodshed
    is intended.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of 'cut off' penalty
  chosen_reading: shall be cut off
  alternative_readings:
  - shall be executed
  - shall be excommunicated
  rationale: The Hebrew formula does not specify the mechanism of the penalty in this
    verse. To preserve theological and legal ambiguity rather than resolve it, the
    main text keeps the formal expression 'cut off.'
  doctrine_reference: Translation philosophy §3
