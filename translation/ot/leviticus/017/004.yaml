id: LEV.17.4
reference: Leviticus 17:4
source:
  edition: WLC
  text: וְ/אֶל פֶּ֜תַח אֹ֣הֶל מוֹעֵד֮ לֹ֣א הֱבִיא/וֹ֒ לְ/הַקְרִ֤יב קָרְבָּן֙ לַֽ/יהוָ֔ה
    לִ/פְנֵ֖י מִשְׁכַּ֣ן יְהוָ֑ה דָּ֣ם יֵחָשֵׁ֞ב לָ/אִ֤ישׁ הַ/הוּא֙ דָּ֣ם שָׁפָ֔ךְ
    וְ/נִכְרַ֛ת הָ/אִ֥ישׁ הַ/ה֖וּא מִ/קֶּ֥רֶב עַמּֽ/וֹ־׃
translation:
  text: 'and has not brought it to the entrance of the tent of meeting to present
    it as an offering to the LORD before the tabernacle of the LORD, bloodguilt shall
    be counted to that man: he has shed blood, and that man shall be cut off from
    among his people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'blood shall be counted to that man.' The phrase means
      liability for bloodshed, hence 'bloodguilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'blood shall be imputed to that man.'
    reason: alternative_reading
  - marker: c
    text: '''Shall be cut off'' does not specify here whether the penalty is death,
      expulsion, or another form of covenantal removal.'
    reason: cultural_note
lexical_decisions:
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: the entrance of the tent of meeting
  alternatives:
  - the doorway of the tent of meeting
  - the entrance of the meeting tent
  lexicon: HALOT
  rationale: פֶּתַח is most naturally 'entrance' or 'opening.' אֹהֶל מוֹעֵד is the
    standard sanctuary designation 'tent of meeting.' 'Entrance' is idiomatic modern
    English while remaining close to the Hebrew.
- source_word: הֱבִיאוֹ
  chosen: has not brought it
  alternatives:
  - did not bring it
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring.' The object suffix refers back to
    the slaughtered animal in the previous verse. Present perfect English fits the
    legal-case style in context.
- source_word: לְהַקְרִיב קָרְבָּן
  chosen: to present it as an offering
  alternatives:
  - to offer an offering
  - to bring near an offering
  lexicon: HALOT
  rationale: הקריב literally involves bringing near/presenting in sacrificial context.
    Because קָרְבָּן already means 'offering,' rendering the phrase woodenly as 'offer
    an offering' is possible but clumsy. 'Present it as an offering' preserves the
    sacrificial sense without awkward repetition.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לִפְנֵי מִשְׁכַּן יְהוָה
  chosen: before the tabernacle of the LORD
  alternatives:
  - before the dwelling place of the LORD
  lexicon: HALOT
  rationale: מִשְׁכָּן is the sanctuary dwelling/tabernacle. 'Tabernacle' is the established
    and accurate cultic term in English. לִפְנֵי is spatially 'before/in front of.'
- source_word: דָּם יֵחָשֵׁב
  chosen: bloodguilt shall be counted
  alternatives:
  - blood shall be imputed
  - blood shall be reckoned
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'blood shall be counted,' the legal
    sense is not mere physical blood but liability for bloodshed. 'Bloodguilt' makes
    the judicial force clear in natural English while staying close to the idiom.
- source_word: לָאִישׁ הַהוּא
  chosen: to that man
  alternatives:
  - against that man
  - to that person
  lexicon: HALOT
  rationale: The Hebrew is masculine singular and refers to the offender. Per gender-accurate
    policy, 'that man' is retained rather than neutralizing to 'person.' 'To' reflects
    the dative construction with חשב.
- source_word: דָּם שָׁפָךְ
  chosen: he has shed blood
  alternatives:
  - he has spilled blood
  lexicon: HALOT
  rationale: This is the standard idiom for bloodshed. 'Shed blood' preserves both
    the literal wording and the legal-moral force.
- source_word: וְנִכְרַת
  chosen: shall be cut off
  alternatives:
  - shall be removed
  - shall be excluded
  lexicon: HALOT
  rationale: כרת in Niphal in covenant/legal contexts is conventionally and accurately
    rendered 'be cut off.' The exact mode of excision is not specified here, so the
    traditional but still transparent wording is best.
- source_word: מִקֶּרֶב עַמּוֹ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  lexicon: HALOT
  rationale: This is a standard exclusion formula. 'From among his people' is idiomatic
    and faithful.
