theological_decisions:
- issue: Gendered covenant designation in לִבְנֵי יִשְׂרָאֵל
  chosen_reading: to the sons of Israel
  alternative_readings:
  - to the children of Israel
  - to the Israelites
  rationale: The project specifies gender-accurate over gender-neutral renderings
    where the source uses a masculine representative form. Here 'sons of Israel' preserves
    the Hebrew expression without importing a narrower theological claim.
