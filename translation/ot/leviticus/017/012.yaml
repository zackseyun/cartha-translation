id: LEV.17.12
reference: Leviticus 17:12
source:
  edition: WLC
  text: עַל כֵּ֤ן אָמַ֨רְתִּי֙ לִ/בְנֵ֣י יִשְׂרָאֵ֔ל כָּל נֶ֥פֶשׁ מִ/כֶּ֖ם לֹא תֹ֣אכַל
    דָּ֑ם וְ/הַ/גֵּ֛ר הַ/גָּ֥ר בְּ/תוֹכְ/כֶ֖ם לֹא יֹ֥אכַל דָּֽם־־־־׃ס
translation:
  text: Therefore I said to the sons of Israel, ‘No person among you shall eat blood,
    and the sojourner who sojourns among you shall not eat blood.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the children of Israel” or “to the Israelites.” The Hebrew reads
      “to the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: “Sojourner” refers to a non-Israelite residing among Israel under its communal
      laws; alternatively, “resident alien” or “foreigner.”
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: The phrase marks a conclusion drawn from the preceding rationale about
    life being in the blood. 'Therefore' is concise, natural English and preserves
    the inferential force.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I have said
  - I told
  lexicon: HALOT
  rationale: Simple past best fits the narrative/legal discourse context. 'Told' would
    be more interpretive than the basic verb 'say'.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the project's gender-accurate
    principle, this is retained rather than neutralizing to 'Israelites,' while still
    being understandable in English.
- source_word: כָּל נֶפֶשׁ מִכֶּם
  chosen: No person among you
  alternatives:
  - No soul from among you
  - None of you
  lexicon: HALOT
  rationale: נֶפֶשׁ here functions idiomatically for an individual person/living being.
    'No person among you' communicates the distributive legal force clearly without
    the misleadingly wooden 'soul.'
- source_word: לֹא תֹאכַל דָּם
  chosen: shall eat blood
  alternatives:
  - may eat blood
  - is to eat blood
  lexicon: HALOT
  rationale: With the preceding negation, the clause is rendered 'shall [not] eat
    blood' to reflect legal prohibition in natural English. 'Eat blood' is the standard
    literal expression and should not be paraphrased away.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' preserves
    the covenantal/legal nuance better than 'foreigner,' which can imply a mere outsider,
    and is less bureaucratic than 'resident alien.'
- source_word: הַגָּר בְּתוֹכְכֶם
  chosen: who sojourns among you
  alternatives:
  - who resides among you
  - dwelling in your midst
  lexicon: HALOT
  rationale: The participial phrase echoes גֵּר and is well represented by 'who sojourns
    among you,' preserving the verbal connection and legal setting.
- source_word: לֹא יֹאכַל דָּם
  chosen: shall not eat blood
  alternatives:
  - must not eat blood
  - is not to eat blood
  lexicon: HALOT
  rationale: This repeats the prohibition for the resident outsider. 'Shall not' maintains
    the formal legal tone and mirrors the Hebrew prohibition closely.
