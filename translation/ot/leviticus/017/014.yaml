id: LEV.17.14
reference: Leviticus 17:14
source:
  edition: WLC
  text: כִּֽי נֶ֣פֶשׁ כָּל בָּשָׂ֗ר דָּמ֣/וֹ בְ/נַפְשׁ/וֹ֮ הוּא֒ וָֽ/אֹמַר֙ לִ/בְנֵ֣י
    יִשְׂרָאֵ֔ל דַּ֥ם כָּל בָּשָׂ֖ר לֹ֣א תֹאכֵ֑לוּ כִּ֣י נֶ֤פֶשׁ כָּל בָּשָׂר֙ דָּמ֣/וֹ
    הִ֔וא כָּל אֹכְלָ֖י/ו יִכָּרֵֽת־־־־־׃
translation:
  text: For the life of all flesh is its blood, in its life. So I said to the sons
    of Israel, ‘You shall not eat the blood of any flesh, for the life of all flesh
    is its blood.’ Everyone who eats it shall be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its blood is in its life,' or more interpretively, 'its blood is its
      life.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  - living being
  lexicon: HALOT
  rationale: In this dietary-sacrificial context, נֶפֶשׁ refers to the animating life
    of the creature rather than an immaterial 'soul.' 'Life' best fits both clauses
    and preserves the logic of the blood prohibition.
- source_word: בָּשָׂר
  chosen: flesh
  alternatives:
  - creature
  - body
  lexicon: HALOT
  rationale: A formal rendering is appropriate here, and 'all flesh' is a well-established
    biblical expression for all living creatures/humanity in embodied form. It also
    preserves the repeated Hebrew phrasing.
- source_word: דָּם / דָּמוֹ
  chosen: blood / its blood
  lexicon: HALOT
  rationale: Literal rendering is required; blood is the central term in the verse's
    rationale and prohibition.
- source_word: בְנַפְשׁוֹ
  chosen: in its life
  alternatives:
  - with its life
  - as its life
  - by its life
  lexicon: HALOT
  rationale: The preposition ב plus נֶפֶשׁ is somewhat compressed. 'In its life' preserves
    the Hebrew structure while communicating that the blood is bound up with the creature's
    life. A smoother but more interpretive option like 'as its life' is preserved
    in a footnote.
- source_word: וָאֹמַר
  chosen: So I said
  alternatives:
  - therefore I said
  - and I said
  lexicon: HALOT
  rationale: The waw-consecutive with first person singular advances the argument
    from principle to command. 'So I said' captures the inferential force without
    overformal stiffness.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the people of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is preserved.
    'Sons of Israel' is literal and traditional to the Hebrew expression, though a
    more idiomatic alternative is noted in a footnote.
- source_word: לֹא תֹאכֵלוּ
  chosen: You shall not eat
  alternatives:
  - you must not eat
  lexicon: HALOT
  rationale: This is a direct prohibition in covenantal legal style; 'shall not' fits
    the register well.
- source_word: הִוא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with דם as a grammatical feature in this
    clause's construction; idiomatic English does not need to reproduce the pronoun
    explicitly beyond the copula.
- source_word: אֹכְלָיו
  chosen: who eats it
  alternatives:
  - its eaters
  - whoever eats it
  lexicon: HALOT
  rationale: The participial form with pronominal suffix denotes anyone eating the
    blood/flesh-blood in view. 'Who eats it' is natural English and preserves the
    singular distributive sense when paired with the following singular verb.
- source_word: יִכָּרֵת
  chosen: shall be cut off
  alternatives:
  - shall be removed
  - shall be excluded
  lexicon: HALOT
  rationale: This is the standard covenantal sanction formula. 'Cut off' preserves
    the Hebrew idiom and its theological/legal weight without prematurely specifying
    whether the penalty is death, excommunication, or divine judgment.
