theological_decisions:
- issue: Meaning of נֶפֶשׁ in relation to blood
  chosen_reading: נֶפֶשׁ is rendered 'life,' expressing that the blood represents
    or carries the creature's life.
  alternative_readings:
  - '''soul'' in a more metaphysical sense'
  rationale: The verse grounds the blood prohibition in the life-blood connection,
    not in a developed anthropology of the soul. Rendering 'life' avoids importing
    later doctrinal assumptions while preserving the sacrificial logic of Leviticus
    17.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of 'cut off' penalty
  chosen_reading: The sanction is left as 'shall be cut off' without interpretive
    expansion.
  alternative_readings:
  - executed
  - excommunicated
  - removed from the community
  rationale: The Hebrew idiom can encompass multiple modes of covenant judgment across
    contexts. The translation should not resolve the debated mechanism here beyond
    what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
