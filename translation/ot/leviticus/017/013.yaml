id: LEV.17.13
reference: Leviticus 17:13
source:
  edition: WLC
  text: וְ/אִ֨ישׁ אִ֜ישׁ מִ/בְּנֵ֣י יִשְׂרָאֵ֗ל וּ/מִן הַ/גֵּר֙ הַ/גָּ֣ר בְּ/תוֹכָ֔/ם
    אֲשֶׁ֨ר יָצ֜וּד צֵ֥יד חַיָּ֛ה אוֹ ע֖וֹף אֲשֶׁ֣ר יֵאָכֵ֑ל וְ/שָׁפַךְ֙ אֶת דָּמ֔/וֹ
    וְ/כִסָּ֖/הוּ בֶּ/עָפָֽר־־־׃
translation:
  text: And any man from the sons of Israel, or from the sojourner who sojourns among
    them, who hunts game—whether wild animal or bird—that may be eaten, shall pour
    out its blood and cover it with dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the resident foreigner living among them.' The Hebrew גר denotes a
      non-Israelite residing within the community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'cover it with dust/earth'; the pronoun most naturally refers
      to the blood.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  chosen: any man
  alternatives:
  - anyone
  - any person
  lexicon: HALOT
  rationale: The doubled איש expresses distributive force ('any man' / 'each man').
    Following the gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person,' while 'any' captures the distributive sense idiomatically in English.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the children of Israel
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the familial/covenantal wording
    בני ישראל. 'Sons of Israel' is more source-transparent than 'Israelites,' while
    still readable.
- source_word: הַגֵּר הַגָּר בְּתוֹכָם
  chosen: the sojourner who sojourns among them
  alternatives:
  - the stranger residing among them
  - the resident foreigner living among them
  lexicon: HALOT
  rationale: גר denotes a resident alien/sojourner. 'Sojourner' preserves the covenantal-legal
    category without importing modern immigration terminology. Repeating the cognate
    verb ('who sojourns') reflects the Hebrew construction.
- source_word: יָצוּד צֵיד
  chosen: hunts game
  alternatives:
  - catches prey
  - hunts a catch
  lexicon: HALOT
  rationale: The verb-noun cognate construction is idiomatically rendered in English
    as 'hunts game.' This preserves the hunting context without awkward literalism.
- source_word: חַיָּה אוֹ עוֹף
  chosen: whether wild animal or bird
  alternatives:
  - animal or bird
  - beast or bird
  lexicon: HALOT
  rationale: חיה here refers to wild game rather than animals generally; 'wild animal'
    best fits the hunting context. 'Bird' is the natural rendering of עוף here.
- source_word: אֲשֶׁר יֵאָכֵל
  chosen: that may be eaten
  alternatives:
  - that is eaten
  - that can be eaten
  lexicon: HALOT
  rationale: 'The Niphal is best taken as permissive/passive in context: animals or
    birds suitable/permitted for food. ''May be eaten'' communicates that sense clearly.'
- source_word: וְשָׁפַךְ אֶת־דָּמוֹ
  chosen: shall pour out its blood
  alternatives:
  - must pour out its blood
  - shall shed its blood
  lexicon: HALOT
  rationale: In legal instruction, the perfect with vav has injunctive force; English
    'shall' fits the prescriptive context. The suffix refers to the hunted animal/bird,
    so 'its blood' is required.
- source_word: וְכִסָּהוּ בֶּעָפָר
  chosen: and cover it with dust
  alternatives:
  - and cover it with earth
  - and bury it in the soil
  lexicon: HALOT
  rationale: The object suffix most naturally refers to the blood just mentioned.
    עפר is 'dust/loose earth'; 'dust' is a close and vivid rendering, while 'cover
    it' preserves the concrete ritual action.
