theological_decisions:
- issue: Referent of the suffix in וְכִסָּהוּ
  chosen_reading: the blood is to be covered
  alternative_readings:
  - the animal is to be covered/buried
  rationale: The nearest and most natural antecedent is 'its blood,' and this matches
    the broader sacrificial theology of blood in Leviticus 17. Rendering the command
    as covering the blood preserves the ritual emphasis without overinterpreting beyond
    the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it
