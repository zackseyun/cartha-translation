id: LEV.17.5
reference: Leviticus 17:5
source:
  edition: WLC
  text: לְמַעַן֩ אֲשֶׁ֨ר יָבִ֜יאוּ בְּנֵ֣י יִשְׂרָאֵ֗ל אֶֽת זִבְחֵי/הֶם֮ אֲשֶׁ֣ר הֵ֣ם זֹבְחִים֮ עַל פְּנֵ֣י הַ/שָּׂדֶה֒ וֶֽ/הֱבִיאֻ֣/ם לַֽ/יהוָ֗ה אֶל פֶּ֛תַח אֹ֥הֶל מוֹעֵ֖ד אֶל הַ/כֹּהֵ֑ן וְ/זָ֨בְח֜וּ זִבְחֵ֧י שְׁלָמִ֛ים לַֽ/יהוָ֖ה אוֹתָֽ/ם־־־־׃
translation:
  text: so that the sons of Israel may bring their sacrifices that they are sacrificing in the open field, and bring them to Yahweh at the entrance of the tent of meeting, to the priest, and sacrifice them as peace offerings to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן אֲשֶׁר
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: Introduces purpose/result from the previous command. 'So that' is natural modern English while preserving the purposive force.
- source_word: יָבִיאוּ
  chosen: may bring
  alternatives:
  - shall bring
  - bring
  lexicon: HALOT
  rationale: Hiphil of בוא here expresses intended action within the purpose clause. 'May bring' fits English idiom after 'so that' without overstating as an independent imperative.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Retains the Hebrew familial expression with gender-accurate wording per translation philosophy. 'Israelites' is possible but less formally transparent to the source.
- source_word: זִבְחֵיהֶם
  chosen: their sacrifices
  alternatives:
  - their slaughtered offerings
  - their sacrificial offerings
  lexicon: HALOT
  rationale: From זבח as a sacrificial noun. 'Sacrifices' is the clearest natural rendering in context.
- source_word: אֲשֶׁר הֵם זֹבְחִים
  chosen: that they are sacrificing
  alternatives:
  - which they sacrifice
  - that they slaughter as sacrifices
  lexicon: HALOT
  rationale: The participial construction conveys ongoing/customary action. 'Are sacrificing' preserves that aspect better than a simple present.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: in the open field
  alternatives:
  - on the face of the field
  - in the field
  lexicon: HALOT
  rationale: Idiomatic Hebrew for out in the open countryside. 'In the open field' preserves the sense that these sacrifices were being made outside the sanctuary area.
- source_word: וְהֱבִיאֻם
  chosen: and bring them
  alternatives:
  - and they shall bring them
  lexicon: HALOT
  rationale: Continues the purpose sequence. The object suffix is explicit in English as 'them,' referring back to the sacrifices/animals.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD'.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: the entrance of the tent of meeting
  alternatives:
  - the doorway of the tent of meeting
  - the entrance to the tent of meeting
  lexicon: HALOT
  rationale: Standard and clear rendering of the sanctuary location. 'Entrance of' is slightly more formal and fits the construct chain.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to a priest
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. In context it indicates the officiating priest at the sanctuary rather than any priest generically.
- source_word: וְזָבְחוּ
  chosen: and sacrifice
  alternatives:
  - and they shall sacrifice
  - and offer
  lexicon: HALOT
  rationale: Coordinates with the preceding purpose verbs. 'Sacrifice' keeps the lexical link with זבח and avoids flattening to the broader 'offer'.
- source_word: זִבְחֵי שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: Traditional but still understandable rendering for the specific sacrificial category שְׁלָמִים. Alternatives are viable, but 'peace offerings' preserves continuity and the lexical association with wholeness/peace.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Explicitly resumes the sacrificial animals/offerings and is best retained in English for clarity.
