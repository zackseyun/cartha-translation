id: LEV.17.11
reference: Leviticus 17:11
source:
  edition: WLC
  text: כִּ֣י נֶ֣פֶשׁ הַ/בָּשָׂר֮ בַּ/דָּ֣ם הִוא֒ וַ/אֲנִ֞י נְתַתִּ֤י/ו לָ/כֶם֙ עַל
    הַ/מִּזְבֵּ֔חַ לְ/כַפֵּ֖ר עַל נַפְשֹׁתֵי/כֶ֑ם כִּֽי הַ/דָּ֥ם ה֖וּא בַּ/נֶּ֥פֶשׁ
    יְכַפֵּֽר־־־׃
translation:
  text: For the life of the flesh is in the blood, and I have given it to you on the
    altar to make atonement for your lives, because it is the blood, by the life,
    that makes atonement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the blood makes atonement by means of the life in it.'
    reason: alternative_reading
  - marker: b
    text: Hebrew nephesh, often 'life,' 'self,' or 'soul' depending on context; in
      this verse the sense is life.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  - person
  lexicon: HALOT
  rationale: In this sacrificial context, נֶפֶשׁ refers to animating life rather than
    an immaterial 'soul.' Rendering it as 'life' fits both occurrences tied to blood
    and preserves the logic of the verse.
- source_word: הַבָּשָׂר
  chosen: the flesh
  alternatives:
  - the body
  - the meat
  lexicon: HALOT
  rationale: '''Flesh'' is the direct and standard rendering of בָּשָׂר. Here it refers
    to living creaturely flesh, not merely ''body'' in an abstract sense.'
- source_word: בַּדָּם
  chosen: in the blood
  alternatives:
  - in blood
  lexicon: HALOT
  rationale: 'The preposition ב plus article is most naturally rendered ''in the blood,''
    expressing location/sphere: the life of the flesh is in the blood.'
- source_word: נְתַתִּיו לָכֶם
  chosen: I have given it to you
  alternatives:
  - I gave it to you
  lexicon: HALOT
  rationale: English present perfect communicates the present relevance of the divine
    provision while remaining faithful to the Hebrew perfect.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Natural modern English while preserving the cultic setting.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to cover
  lexicon: HALOT
  rationale: The default cultic sense of כפר in Leviticus is expiatory/atoning action.
    'Make atonement' is idiomatic and precise without importing a narrower theory
    of atonement.
- source_word: עַל נַפְשֹׁתֵיכֶם
  chosen: for your lives
  alternatives:
  - for your souls
  - for yourselves
  lexicon: HALOT
  rationale: Because נֶפֶשׁ in this verse consistently carries the sense of life/person,
    'for your lives' preserves lexical coherence and avoids suggesting a body-soul
    dualism not explicit in the Hebrew.
- source_word: כִּי הַדָּם הוּא
  chosen: because it is the blood
  alternatives:
  - for the blood itself
  - because the blood itself
  lexicon: HALOT
  rationale: This keeps the emphatic clause readable in English while preserving the
    explanatory force of כִּי.
- source_word: בַּנֶּפֶשׁ
  chosen: by the life
  alternatives:
  - in the life
  - by means of the life
  - for the life
  lexicon: HALOT
  rationale: 'The phrase is syntactically difficult. Here ב is taken instrumentally
    or associatively: the blood makes atonement by virtue of the life in it. ''By
    the life'' preserves the Hebrew wording and the sacrificial logic better than
    smoothing it away.'
- source_word: יְכַפֵּר
  chosen: makes atonement
  alternatives:
  - atones
  lexicon: HALOT
  rationale: Maintains consistency with the earlier infinitive לְכַפֵּר and preserves
    the cultic terminology central to the verse.
