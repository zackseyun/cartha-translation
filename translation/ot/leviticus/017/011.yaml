theological_decisions:
- issue: Meaning of נֶפֶשׁ in a sacrificial law context
  chosen_reading: Rendered as 'life' throughout the verse rather than 'soul.'
  alternative_readings:
  - soul
  - self/person
  rationale: The verse grounds the sacrificial efficacy of blood in the life associated
    with it. Translating נֶפֶשׁ as 'soul' here could imply a later anthropological
    distinction not required by the Hebrew. 'Life' best preserves the immediate sacrificial
    logic and the repeated lexical link between blood and life.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of בַּנֶּפֶשׁ in the final clause
  chosen_reading: Rendered 'by the life' and retained in the main text as a somewhat
    marked phrase.
  alternative_readings:
  - because of the life
  - in the life
  - by means of the life in it
  rationale: 'The Hebrew is compact and somewhat debated. Rather than over-resolving
    the syntax, the translation preserves the theological tension: blood atones in
    relation to the life bound up with it. A footnote preserves a fuller interpretive
    alternative.'
  doctrine_reference: Translation philosophy §3
