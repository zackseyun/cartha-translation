theological_decisions:
- issue: Nature of impurity in Levitical purity law
  chosen_reading: Render טָמֵא/טָהֵר as 'unclean/clean' in a ritual sense, without
    importing moral guilt language.
  alternative_readings:
  - defiled/purified
  rationale: The verse concerns ceremonial status after eating prohibited carrion,
    not necessarily a statement of personal moral depravity. 'Unclean/clean' preserves
    the cultic category and avoids over-theologizing the text.
  doctrine_reference: Translation philosophy §1, §3
