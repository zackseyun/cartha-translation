id: LEV.17.15
reference: Leviticus 17:15
source:
  edition: WLC
  text: וְ/כָל נֶ֗פֶשׁ אֲשֶׁ֨ר תֹּאכַ֤ל נְבֵלָה֙ וּ/טְרֵפָ֔ה בָּ/אֶזְרָ֖ח וּ/בַ/גֵּ֑ר
    וְ/כִבֶּ֨ס בְּגָדָ֜י/ו וְ/רָחַ֥ץ בַּ/מַּ֛יִם וְ/טָמֵ֥א עַד הָ/עֶ֖רֶב וְ/טָהֵֽר־־׃
translation:
  text: And every person who eats an animal found dead or one torn by beasts, whether
    native or sojourner, shall wash his clothes and bathe in water, and he shall be
    unclean until the evening; then he shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carcass' for 'an animal found dead'; the Hebrew term refers to an animal
      that died without proper slaughter.
    reason: lexical_alternative
  - marker: b
    text: Or 'resident foreigner' for 'sojourner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ commonly refers to an individual person rather
    than the immaterial soul. 'Person' is natural English and fits the case-law style.
- source_word: תֹּאכַל
  chosen: eats
  alternatives:
  - shall eat
  - eats of
  lexicon: HALOT
  rationale: Although the form is 3fs agreeing with נֶפֶשׁ, English idiom renders
    the legal condition smoothly as 'who eats.'
- source_word: נְבֵלָה
  chosen: an animal found dead
  alternatives:
  - carcass
  - a dead animal
  lexicon: HALOT
  rationale: The term denotes an animal carcass, especially one that died of itself
    rather than by proper slaughter. 'Animal found dead' communicates the ritual category
    more clearly than the more technical 'carcass.'
- source_word: טְרֵפָה
  chosen: one torn by beasts
  alternatives:
  - that which was torn
  - a torn animal
  lexicon: HALOT
  rationale: The word refers to an animal torn by predators. 'Torn by beasts' is a
    traditional but still clear rendering that preserves the cause implied by the
    Hebrew term.
- source_word: בָּאֶזְרָח
  chosen: native
  alternatives:
  - native-born
  - citizen
  lexicon: HALOT
  rationale: Refers to the native member of Israelite society. 'Native' is concise
    and pairs well with 'sojourner.'
- source_word: בַגֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - alien
  - stranger
  lexicon: HALOT
  rationale: גֵּר is the resident outsider living among Israel, not merely a passing
    stranger. 'Sojourner' preserves the covenantal-legal nuance better than 'foreigner'
    or 'stranger.'
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  lexicon: HALOT
  rationale: The sequence gives the required ritual response. 'Clothes' is more readable
    modern English than 'garments' without loss of meaning.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: bathe in water
  alternatives:
  - wash himself in water
  - bathe himself in water
  lexicon: HALOT
  rationale: The verb here refers to bodily washing. 'Bathe in water' is idiomatic
    and preserves the ritual washing sense.
- source_word: וְטָמֵא עַד הָעֶרֶב
  chosen: he shall be unclean until the evening
  alternatives:
  - and be unclean until evening
  lexicon: HALOT
  rationale: טָמֵא here denotes ritual impurity, not moral defilement. Retaining 'unclean'
    is the established and clearest English equivalent in Levitical purity law.
- source_word: וְטָהֵר
  chosen: then he shall be clean
  alternatives:
  - and he shall be clean
  - then he will be clean
  lexicon: HALOT
  rationale: Marks the end of the temporary impurity after the stated washing and
    time period. 'Then' makes the sequence explicit in English.
