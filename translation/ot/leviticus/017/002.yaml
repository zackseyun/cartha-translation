id: LEV.17.2
reference: Leviticus 17:2
source:
  edition: WLC
  text: דַּבֵּ֨ר אֶֽל אַהֲרֹ֜ן וְ/אֶל בָּנָ֗י/ו וְ/אֶל֙ כָּל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖
    אֲלֵי/הֶ֑ם זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁר צִוָּ֥ה יְהוָ֖ה לֵ/אמֹֽר־־־־׃
translation:
  text: Speak to Aaron and to his sons and to all the sons of Israel, and say to them,
    ‘This is the word that the LORD has commanded, saying,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the Israelites” or traditionally “all the children of Israel.”
    reason: lexical_alternative
  - marker: b
    text: “This is the word” may also be rendered “This is the matter” or “This is
      the thing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak
  lexicon: HALOT
  rationale: Piel imperative 2ms of דבר, a direct command to Moses. 'Speak' preserves
    the formal imperative force and matches the discourse-introduction formula.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition. 'To' is natural modern English and
    sufficiently formal.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural with 3ms suffix, referring
    to Aaron's male priestly descendants. Per gender-accurate policy, 'sons' is preferred
    over the broader 'children'.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the Israelites
  - all the children of Israel
  lexicon: HALOT
  rationale: Literally 'all the sons of Israel.' Because the source uses the conventional
    ethnic designation בני ישראל, the translation keeps the familial form 'sons of
    Israel' rather than flattening to 'Israelites.' This also aligns with the project's
    gender-accurate principle, while remaining intelligible in context.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and you shall say to them
  - and tell them
  lexicon: HALOT
  rationale: Sequential command following the imperative. 'And say to them' preserves
    the Hebrew coordination and directness without overloading English with auxiliary
    forms.
- source_word: זֶה הַדָּבָר
  chosen: This is the word
  alternatives:
  - This is the matter
  - This is the thing
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it introduces a divine
    command formula. 'Word' preserves the solemnity of the pronouncement and reflects
    the speech-act context better than the more generic 'matter' or 'thing'.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: Perfect verb of צוה. English present perfect works well in this formulaic
    introduction to a command that remains in force in the following speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Infinitive introducing the content of the command. 'Saying' is the standard
    idiomatic rendering in this formula and signals continuation into the next verse.
