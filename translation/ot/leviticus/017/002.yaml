theological_decisions:
- issue: Rendering of the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the divine name, which the doctrine excerpt explicitly
    assigns the default English rendering 'the LORD.' No contextual factor here warrants
    deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to retain the familial expression בני ישראל literally
  chosen_reading: all the sons of Israel
  alternative_readings:
  - all the Israelites
  - all the children of Israel
  rationale: The Hebrew expression is formally masculine plural and functions as Israel's
    covenantal ethnonym. Following the gender-accurate principle, the translation
    preserves 'sons' rather than neutralizing the phrase, while keeping the wording
    readable.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
