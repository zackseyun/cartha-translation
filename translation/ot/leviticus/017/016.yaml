theological_decisions:
- issue: Meaning of the legal formula 'bear his עון'
  chosen_reading: The phrase is rendered 'bear his guilt' without specifying the exact
    punishment.
  alternative_readings:
  - bear his iniquity
  - bear the punishment for his iniquity
  rationale: The Hebrew legal idiom can encompass both culpability and its consequence.
    The translation preserves that tension rather than resolving it into either moral
    fault alone or explicit penal consequence alone.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
