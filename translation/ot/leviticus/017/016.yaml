id: LEV.17.16
reference: Leviticus 17:16
source:
  edition: WLC
  text: וְ/אִם֙ לֹ֣א יְכַבֵּ֔ס וּ/בְשָׂר֖/וֹ לֹ֣א יִרְחָ֑ץ וְ/נָשָׂ֖א עֲוֺנֽ/וֹ׃פ
translation:
  text: But if he does not wash his clothes and does not bathe his body, then he shall
    bear his guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his flesh.' Here it refers to washing his body.
    reason: lexical_alternative
  - marker: b
    text: Or 'bear his iniquity' or 'bear the penalty for his iniquity.' The Hebrew
      legal expression can include both guilt and its consequence.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction introduces the contrasting negative case after the prior
    verse's purification procedure. 'But if' brings out the adversative force in context
    while remaining faithful to the Hebrew conditional.
- source_word: יְכַבֵּס
  chosen: wash
  alternatives:
  - launder
  lexicon: HALOT
  rationale: The piel of כבס commonly refers to washing garments. 'Wash' is natural
    modern English; the object 'his clothes' is supplied from the previous verse because
    it is ellipsed here but clearly implied by the context and the verb's normal usage
    in this legal formula.
- source_word: וּבְשָׂרוֹ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: HALOT
  rationale: Though בשר is literally 'flesh,' in ritual washing contexts it idiomatically
    refers to the person's body. 'His body' is clearer in contemporary English while
    preserving the concrete sense.
- source_word: יִרְחָץ
  chosen: bathe
  alternatives:
  - wash
  lexicon: HALOT
  rationale: רחץ in this context refers to washing the body. 'Bathe' helps distinguish
    the body-washing from the prior washing of clothes and reflects the ritual action
    clearly.
- source_word: וְנָשָׂא
  chosen: then he shall bear
  alternatives:
  - and he shall bear
  - he will bear
  lexicon: HALOT
  rationale: The waw + qatal here gives the consequence of failing to perform the
    required washings. 'Then he shall bear' communicates the resultative force in
    legal style.
- source_word: עֲוֹנוֹ
  chosen: his guilt
  alternatives:
  - his iniquity
  - his punishment for iniquity
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the liability/consequence of sin.
    In this ritual-legal context, 'bear his guilt' is the most idiomatic English expression
    and preserves the covenantal-legal sense without overinterpreting the exact penalty.
