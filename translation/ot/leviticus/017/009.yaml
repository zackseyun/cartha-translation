theological_decisions:
- issue: Meaning of the penalty 'cut off'
  chosen_reading: Retain the formal expression 'shall be cut off' without specifying
    whether this means death, excommunication, childlessness, or divine judgment.
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  - shall be destroyed
  rationale: The Hebrew legal formula does not itself define the mechanism of the
    penalty here. Preserving the idiom maintains the text's theological and legal
    tension rather than importing a narrower doctrinal or juridical interpretation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §6 (Readable modern English without flattening theological weight)
- issue: Gender rendering of הָאִישׁ
  chosen_reading: Render as 'that man' rather than a gender-neutral substitute.
  alternative_readings:
  - that person
  - whoever
  rationale: The source text uses a grammatically masculine singular legal expression.
    Per doctrine guidelines, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context clearly demands otherwise.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
