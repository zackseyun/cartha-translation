id: LEV.17.9
reference: Leviticus 17:9
source:
  edition: WLC
  text: וְ/אֶל פֶּ֜תַח אֹ֤הֶל מוֹעֵד֙ לֹ֣א יְבִיאֶ֔/נּוּ לַ/עֲשׂ֥וֹת אֹת֖/וֹ לַ/יהוָ֑ה
    וְ/נִכְרַ֛ת הָ/אִ֥ישׁ הַ/ה֖וּא מֵ/עַמָּֽי/ו־׃
translation:
  text: and does not bring it to the entrance of the tent of meeting to offer it to
    the LORD, that man shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to do/make it for the LORD'; here the Hebrew idiom
      refers to presenting the sacrifice.
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' is a legal formula whose exact penalty is not specified
      here; it may imply removal from the covenant community or direct divine judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - opening
  lexicon: HALOT
  rationale: פֶּתַח denotes the opening or entryway. 'Entrance' is natural modern
    English and fits the sanctuary context better than the more architectural 'doorway.'
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard designation for the tabernacle sanctuary in the
    wilderness period. 'Tent of meeting' is both established and textually transparent.
- source_word: יְבִיאֶנּוּ
  chosen: bring it
  alternatives:
  - bring him
  - present it
  lexicon: HALOT
  rationale: The suffix refers back to the sacrificial animal from the previous verse/context.
    English 'bring it' preserves the concrete action without overinterpreting the
    ritual nuance.
- source_word: לַעֲשׂוֹת אֹתוֹ לַיהוָה
  chosen: to offer it to the LORD
  alternatives:
  - to make it for the LORD
  - to prepare it for the LORD
  lexicon: HALOT
  rationale: Literally 'to do/make it for the LORD,' but in sacrificial context עשה
    can function idiomatically for performing or offering a sacrifice. 'Offer it to
    the LORD' best conveys the cultic sense in clear English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' to reflect
    established reverential convention and the pattern of many English translations.
- source_word: וְנִכְרַת
  chosen: shall be cut off
  alternatives:
  - shall be removed
  - shall be excluded
  lexicon: HALOT
  rationale: כרת in the Niphal in legal contexts commonly denotes being 'cut off.'
    The phrase is intentionally preserved because the exact mode of judgment/excision
    is not specified and should not be over-resolved.
- source_word: הָאִישׁ הַהוּא
  chosen: that man
  alternatives:
  - that האיש/person
  - that one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and points to the individual
    offender. 'That man' is gender-accurate and matches the source's legal style.
- source_word: מֵעַמָּיו
  chosen: from his people
  alternatives:
  - from among his people
  - from his kin
  lexicon: HALOT
  rationale: The phrase indicates separation from the offender's covenant community.
    'From his people' is concise and faithful; 'from among' is possible but not necessary
    in English.
