id: LEV.17.6
reference: Leviticus 17:6
source:
  edition: WLC
  text: וְ/זָרַ֨ק הַ/כֹּהֵ֤ן אֶת הַ/דָּם֙ עַל מִזְבַּ֣ח יְהוָ֔ה פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד
    וְ/הִקְטִ֣יר הַ/חֵ֔לֶב לְ/רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָֽה־־׃
translation:
  text: And the priest shall throw the blood against the altar of the LORD at the
    entrance of the tent of meeting, and shall burn the fat as a pleasing aroma to
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sprinkle' or 'dash' the blood against/on the altar; the Hebrew verb
      refers to the priest's ritual application of blood.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a pleasing aroma'; traditionally also rendered 'a soothing aroma'
      or 'a sweet-smelling aroma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרַק
  chosen: shall throw
  alternatives:
  - shall sprinkle
  - shall dash
  lexicon: HALOT
  rationale: זָרַק in sacrificial contexts denotes the priest's ritual application
    of blood to the altar by tossing/dashing it, stronger than a light 'sprinkle.'
    'Shall throw' preserves the concrete action in accessible English; 'dash' is possible
    but less natural here.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן; the definite article is preserved.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Direct object marked by אֶת; straightforward sacrificial reference to
    the animal's blood.
- source_word: עַל מִזְבַּח יְהוָה
  chosen: against the altar of the LORD
  alternatives:
  - on the altar of the LORD
  - upon the altar of the LORD
  lexicon: HALOT
  rationale: With זָרַק, עַל can describe blood being thrown onto/against the altar.
    'Against' better conveys the physical motion of blood application in sacrificial
    ritual than the flatter 'on.' YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' 'Tent of meeting' is the established and
    accurate rendering of אֹהֶל מוֹעֵד. 'At the entrance' reads naturally and preserves
    the locative sense.
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall turn into smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: In priestly sacrificial language, הִקְטִיר refers specifically to burning
    an offering on the altar so that it goes up in smoke. 'Shall burn' is concise
    and natural; the more technical nuance is contextually clear.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: חֵלֶב in Leviticus refers to the sacrificial fat portions reserved for
    altar burning; 'the fat' is the standard literal rendering.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - as a sweet-smelling aroma
  lexicon: HALOT
  rationale: This stock sacrificial phrase denotes an aroma acceptable to God. 'Pleasing
    aroma' is idiomatic modern English and avoids archaic phrasing while preserving
    the acceptance motif.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks the offering as directed to YHWH; 'to the LORD'
    is the most straightforward rendering in English.
