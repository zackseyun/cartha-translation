theological_decisions:
- issue: Gendered distributive expression אִישׁ אִישׁ
  chosen_reading: Any man
  alternative_readings:
  - Any person
  - Whoever
  rationale: The Hebrew is grammatically masculine singular used distributively in
    legal style. Per the project's gender-accurate policy, the masculine form is retained
    where it matches the source's representative force rather than being neutralized
    in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of גֵּר
  chosen_reading: sojourner
  alternative_readings:
  - resident foreigner
  - stranger
  rationale: The term refers to a non-Israelite living within Israel's community and
    subject to its cultic regulations. 'Sojourner' preserves the covenantal-legal
    category without importing modern immigration terminology.
