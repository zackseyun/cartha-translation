id: LEV.17.8
reference: Leviticus 17:8
source:
  edition: WLC
  text: וַ/אֲלֵ/הֶ֣ם תֹּאמַ֔ר אִ֥ישׁ אִישׁ֙ מִ/בֵּ֣ית יִשְׂרָאֵ֔ל וּ/מִן הַ/גֵּ֖ר
    אֲשֶׁר יָג֣וּר בְּ/תוֹכָ֑/ם אֲשֶׁר יַעֲלֶ֥ה עֹלָ֖ה אוֹ זָֽבַח־־־־׃
translation:
  text: 'And you shall say to them: Any man from the house of Israel, or from the
    sojourner who sojourns among them, who offers up a burnt offering or a sacrifice—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Any man' uses a masculine distributive expression ('man, man'),
      a legal idiom meaning each individual case.
    reason: lexical_alternative
  - marker: b
    text: Or 'resident foreigner' for 'sojourner'; the Hebrew refers to a non-Israelite
      residing among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲלֵהֶם
  chosen: And ... to them
  alternatives:
  - Then to them
  - And to them
  lexicon: HALOT
  rationale: The conjunction plus preposition/pronominal suffix introduces the next
    instruction. In English, the sense is best carried by 'And you shall say to them,'
    preserving the connective force without awkward word order.
- source_word: תֹּאמַר
  chosen: you shall say
  alternatives:
  - you must say
  - say
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction to Moses. 'You shall say'
    is a natural legal-register rendering in English and preserves the directive force.
- source_word: אִישׁ אִישׁ
  chosen: Any man
  alternatives:
  - Any person
  - Whoever
  - Man, man
  lexicon: HALOT
  rationale: The doubled איש is an idiomatic distributive expression meaning 'any
    man' or 'each man.' Following the project's gender-accurate policy, 'man' is retained
    rather than neutralizing to 'person,' while 'any' captures the distributive force.
- source_word: מִבֵּית יִשְׂרָאֵל
  chosen: from the house of Israel
  alternatives:
  - of the house of Israel
  - from Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is a standard covenantal expression and should be
    preserved rather than flattened to merely ''Israel.'' ''From'' reflects the prefixed
    preposition.'
- source_word: וּמִן הַגֵּר
  chosen: or from the sojourner
  alternatives:
  - or from the resident foreigner
  - or from the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel under its social-religious
    order. 'Sojourner' preserves the legal-covenantal nuance better than the potentially
    misleading 'stranger.'
- source_word: אֲשֶׁר יָגוּר בְּתוֹכָם
  chosen: who sojourns among them
  alternatives:
  - who resides among them
  - who lives as a foreigner among them
  lexicon: HALOT
  rationale: The relative clause repeats the גּוּר idea from גֵּר, and 'who sojourns'
    preserves that lexical connection. 'Among them' accurately renders בְּתוֹכָם.
- source_word: אֲשֶׁר יַעֲלֶה
  chosen: who offers up
  alternatives:
  - who brings up
  - who presents
  lexicon: HALOT
  rationale: The Hiphil of עלה with sacrificial objects commonly means to offer up
    sacrificially. 'Offers up' preserves both the causative nuance and sacrificial
    idiom.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascending offering
  lexicon: HALOT
  rationale: This is the standard sacrificial term for the offering wholly turned
    into smoke. 'Burnt offering' is the clearest established English equivalent.
- source_word: אוֹ זָבַח
  chosen: or a sacrifice
  alternatives:
  - or a slaughter offering
  - or a sacrificial offering
  lexicon: HALOT
  rationale: זֶבַח/זָבַח in this nominal use refers broadly to a sacrifice, often
    a slaughtered sacrificial animal distinct from the burnt offering. 'Sacrifice'
    is the most natural concise rendering here, especially in contrast with 'burnt
    offering.'
