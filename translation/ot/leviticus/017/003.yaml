id: LEV.17.3
reference: Leviticus 17:3
source:
  edition: WLC
  text: אִ֥ישׁ אִישׁ֙ מִ/בֵּ֣ית יִשְׂרָאֵ֔ל אֲשֶׁ֨ר יִשְׁחַ֜ט שׁ֥וֹר אוֹ כֶ֛שֶׂב אוֹ
    עֵ֖ז בַּֽ/מַּחֲנֶ֑ה א֚וֹ אֲשֶׁ֣ר יִשְׁחַ֔ט מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה־־׃
translation:
  text: Any man from the house of Israel who slaughters an ox or a sheep or a goat
    in the camp, or who slaughters it outside the camp—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Any man'; the expression is distributive ('man, man') and functions
      generically for any member of Israelite society.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  chosen: Any man
  alternatives:
  - Any person
  - Whoever
  lexicon: HALOT
  rationale: The doubled noun is an idiomatic distributive expression meaning 'any
    man' or 'each man.' Because the Hebrew is grammatically masculine yet representative,
    'Any man' preserves the source form and distributive force in keeping with the
    gender-accurate policy.
- source_word: מִבֵּית יִשְׂרָאֵל
  chosen: from the house of Israel
  alternatives:
  - from Israel
  - of the Israelites
  lexicon: HALOT
  rationale: Literally 'from the house of Israel.' Retaining 'house of Israel' preserves
    the covenantal-national idiom rather than flattening it to a mere ethnic label.
- source_word: יִשְׁחַט
  chosen: slaughters
  alternatives:
  - kills
  - butchers
  - slays
  lexicon: HALOT
  rationale: The verb שָׁחַט commonly denotes slaughtering an animal, often in sacrificial
    contexts. 'Slaughters' is natural English and preserves the ritual/animal-killing
    sense better than the broader 'kills.'
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is a standard singular rendering for שׁוֹר and fits the list
    of sacrificial livestock. ''Bull'' is more specific than the Hebrew requires;
    ''cattle'' would be too collective.'
- source_word: כֶשֶׂב
  chosen: sheep
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: The term can refer broadly to a sheep from the flock, not necessarily
    a young lamb. 'Sheep' best matches the generic category in this legal list.
- source_word: עֵז
  chosen: goat
  lexicon: HALOT
  rationale: Standard rendering for the animal term in sacrificial and dietary contexts.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - within the camp
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In the camp' is idiomatic and sufficiently
    precise.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the camp area
  - beyond the camp
  lexicon: HALOT
  rationale: The phrase literally means 'from outside the camp,' but in English the
    sense is location of slaughter outside the camp. 'Outside the camp' is the clearest
    idiomatic rendering.
- source_word: אֲשֶׁר ... אֲשֶׁר
  chosen: who ... or who
  alternatives:
  - that ... or that
  lexicon: HALOT
  rationale: Rendering the repeated relative particle with 'who ... or who' preserves
    the parallel legal structure of the Hebrew.
- source_word: '[implicit object after second יִשְׁחַט]'
  chosen: slaughters it
  alternatives:
  - slaughters
  lexicon: English ellipsis handling
  rationale: The second clause repeats the verb without restating the animal object.
    Supplying 'it' in English clarifies the sense and avoids awkwardness while not
    adding new content.
