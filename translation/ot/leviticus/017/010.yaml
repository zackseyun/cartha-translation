theological_decisions:
- issue: Meaning of the penalty formula 'cut off'
  chosen_reading: Retain the idiom 'cut off' without specifying the exact mode of
    judgment.
  alternative_readings:
  - executed
  - excommunicated
  - removed by divine judgment
  rationale: The Hebrew legal formula is theologically and interpretively debated.
    The text clearly announces severe covenantal judgment, but does not here define
    the mechanism. Preserving the idiom maintains the text's tension rather than resolving
    it beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
