id: LEV.17.10
reference: Leviticus 17:10
source:
  edition: WLC
  text: וְ/אִ֨ישׁ אִ֜ישׁ מִ/בֵּ֣ית יִשְׂרָאֵ֗ל וּ/מִן הַ/גֵּר֙ הַ/גָּ֣ר בְּ/תוֹכָ֔/ם
    אֲשֶׁ֥ר יֹאכַ֖ל כָּל דָּ֑ם וְ/נָתַתִּ֣י פָנַ֗/י בַּ/נֶּ֨פֶשׁ֙ הָ/אֹכֶ֣לֶת אֶת
    הַ/דָּ֔ם וְ/הִכְרַתִּ֥י אֹתָ֖/הּ מִ/קֶּ֥רֶב עַמָּֽ/הּ־־־׃
translation:
  text: And any man from the house of Israel, or from the sojourner who sojourns among
    them, who eats any blood—I will set my face against the person who eats the blood,
    and I will cut him off from among his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resident alien' or 'foreigner residing among them' for 'the sojourner
      who sojourns among them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the soul/person who eats'; here 'person' is used in the sense of
      the individual offender.
    reason: lexical_alternative
  - marker: c
    text: '''Cut off'' is a covenantal penalty formula; the text does not specify
      here whether this means death, expulsion, or another form of divine judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִישׁ אִישׁ
  chosen: And any man
  alternatives:
  - And any person
  - And any man whatsoever
  lexicon: HALOT
  rationale: The doubled אִישׁ is an idiomatic distributive/intensive expression meaning
    'any man' or 'whoever.' Following the gender-accurate principle, 'man' is retained
    rather than neutralizing to 'person' in the opening legal formula, while the distributive
    force is conveyed by 'any.'
- source_word: מִבֵּית יִשְׂרָאֵל
  chosen: from the house of Israel
  alternatives:
  - of the house of Israel
  - from Israel
  lexicon: HALOT
  rationale: A formal covenantal/legal expression; 'house of Israel' preserves the
    Hebrew idiom better than flattening to simply 'Israel.'
- source_word: וּמִן הַגֵּר הַגָּר בְּתוֹכָם
  chosen: or from the sojourner who sojourns among them
  alternatives:
  - or from the foreigner residing among them
  - or from the resident alien dwelling among them
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living within Israelite society, not
    merely a passing foreigner. 'Sojourner' preserves the covenantal-legal nuance
    and allows the cognate participle הַגָּר to be echoed with 'who sojourns.'
- source_word: אֲשֶׁר יֹאכַל כָּל דָּם
  chosen: who eats any blood
  alternatives:
  - who eats blood of any kind
  - who consumes any blood
  lexicon: HALOT
  rationale: יֹאכַל is the ordinary verb 'eat'; 'eats' is more literal than 'consumes.'
    כָּל with דָּם is best rendered 'any blood,' emphasizing total prohibition.
- source_word: וְנָתַתִּי פָנַי
  chosen: I will set my face against
  alternatives:
  - I will turn my face against
  - I will oppose
  lexicon: HALOT
  rationale: This is a fixed idiom for divine opposition/judgment. 'Set my face against'
    is a standard, transparent English equivalent that preserves the anthropomorphic
    force without paraphrase.
- source_word: בַּנֶּפֶשׁ הָאֹכֶלֶת
  chosen: against the person who eats
  alternatives:
  - against the soul that eats
  - against the life that eats
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or person depending on context. Here
    it refers to the individual offender in legal judgment; 'person' communicates
    the referent naturally in English while avoiding misleading metaphysical overtones
    of 'soul.'
- source_word: אֶת הַדָּם
  chosen: the blood
  alternatives:
  - blood
  lexicon: HALOT
  rationale: The article is retained in English because the clause refers back to
    the prohibited substance just mentioned; 'the blood' gives slightly stronger specificity.
- source_word: וְהִכְרַתִּי אֹתָהּ
  chosen: and I will cut him off
  alternatives:
  - and I will cut that person off
  - and I will destroy him
  lexicon: HALOT
  rationale: הִכְרִית in covenant/legal contexts commonly means 'cut off.' This preserves
    the traditional and lexical force without over-specifying whether the penalty
    is death, expulsion, or divine excision. Because English pronoun agreement with
    'person' is awkward in singular generic usage, 'him' follows the gender-accurate
    policy tied to the masculine legal formula.
- source_word: מִקֶּרֶב עַמָּהּ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  - from among his kin
  lexicon: HALOT
  rationale: מִקֶּרֶב means 'from the midst/among.' Although the Hebrew suffix on
    עַם is grammatically feminine agreeing with נֶפֶשׁ, English naturally refers back
    to the male-generic offender introduced by אִישׁ; thus 'his people' best reflects
    the legal sense.
