id: LEV.17.7
reference: Leviticus 17:7
source:
  edition: WLC
  text: וְ/לֹא יִזְבְּח֥וּ עוֹד֙ אֶת זִבְחֵי/הֶ֔ם לַ/שְּׂעִירִ֕ם אֲשֶׁ֛ר הֵ֥ם זֹנִ֖ים
    אַחֲרֵי/הֶ֑ם חֻקַּ֥ת עוֹלָ֛ם תִּֽהְיֶה זֹּ֥את לָ/הֶ֖ם לְ/דֹרֹתָֽ/ם־־־׃
translation:
  text: They shall no longer sacrifice their sacrifices to the goat-demons, after
    which they prostitute themselves. This shall be a permanent statute for them throughout
    their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the goat idols' or 'to the satyrs'; the Hebrew term refers to goat-like
      beings associated with illicit worship.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'after which they prostitute themselves,' a metaphor for religious
      unfaithfulness or idolatry.
    reason: cultural_note
  - marker: c
    text: Or 'an everlasting statute' or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְבְּחוּ
  chosen: shall ... sacrifice
  alternatives:
  - may ... sacrifice
  - offer sacrifices
  lexicon: HALOT
  rationale: 'Imperfect with negation in legal material is well rendered as a prohibitive
    future/modal in English: ''shall no longer sacrifice.'' ''Offer sacrifices'' is
    possible, but retaining ''sacrifice'' preserves the lexical link with the following
    noun.'
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - any more
  lexicon: HALOT
  rationale: In context of prohibition against a prior or ongoing practice, עוֹד with
    negation is best rendered 'no longer' rather than the more wooden 'again' or 'any
    more.'
- source_word: זִבְחֵיהֶם
  chosen: their sacrifices
  alternatives:
  - their sacrificial offerings
  lexicon: HALOT
  rationale: Straightforward rendering of the cognate noun from זבח. 'Their sacrifices'
    preserves the Hebrew repetition with the verb and keeps the cultic sense clear
    without overtechnical wording.
- source_word: לַשְּׂעִירִם
  chosen: to the goat-demons
  alternatives:
  - to the goat idols
  - to the satyrs
  - to the goats
  lexicon: HALOT
  rationale: Though שׂעירים literally denotes 'hairy ones/goats,' in this cultic context
    it refers to demonic beings associated with goat imagery rather than ordinary
    animals. 'Goat-demons' communicates the likely referent clearly in modern English
    without importing Greco-Roman mythology as 'satyrs' would.
- source_word: זֹנִים אַחֲרֵיהֶם
  chosen: after which they prostitute themselves
  alternatives:
  - with which they play the whore
  - after which they whore
  lexicon: HALOT
  rationale: The participle זֹנִים is metaphorical covenantal/cultic infidelity language.
    'Prostitute themselves' preserves the sexualized metaphor and the reflexive sense
    of degrading unfaithfulness while remaining readable modern English.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: עוֹלָם in legal formulas often denotes enduring/permanent duration within
    the covenantal frame. 'Permanent statute' is clear modern English; 'everlasting'
    may overstate the idiom in English, while 'perpetual' is accurate but less natural.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom marks ongoing applicability across successive generations.
    'Throughout their generations' is the most natural and sufficiently formal rendering.
