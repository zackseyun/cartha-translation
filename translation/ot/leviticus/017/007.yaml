theological_decisions:
- issue: Referent of שְּׂעִירִם in Israel's illicit worship
  chosen_reading: demonic beings represented with goat imagery ('goat-demons')
  alternative_readings:
  - literal goats
  - goat idols
  - satyrs
  rationale: The verse condemns illicit sacrificial worship, and the following clause
    of cultic prostitution supports a supernatural/idolatrous referent rather than
    ordinary animals. 'Goat-demons' preserves the likely Hebrew sense without adopting
    mythologically loaded English like 'satyrs.'
- issue: Force of covenant-infidelity metaphor in זֹנִים
  chosen_reading: retain the metaphor explicitly as 'prostitute themselves'
  alternative_readings:
  - are unfaithful
  - commit idolatry
  rationale: The Hebrew uses sexual-infidelity language for idolatrous worship. Per
    translation philosophy, theological tension and metaphor should be preserved rather
    than flattened into an interpretive abstraction like 'commit idolatry.'
  doctrine_reference: Translation philosophy §3
