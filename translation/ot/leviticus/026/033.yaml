id: LEV.26.33
reference: Leviticus 26:33
source:
  edition: WLC
  text: וְ/אֶתְ/כֶם֙ אֱזָרֶ֣ה בַ/גּוֹיִ֔ם וַ/הֲרִיקֹתִ֥י אַחֲרֵי/כֶ֖ם חָ֑רֶב וְ/הָיְתָ֤ה
    אַרְצְ/כֶם֙ שְׁמָמָ֔ה וְ/עָרֵי/כֶ֖ם יִהְי֥וּ חָרְבָּֽה׃
translation:
  text: And I will scatter you among the nations, and I will draw out the sword after
    you; and your land will become a desolation, and your cities will become ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will unsheathe the sword after you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱזָרֶה
  chosen: I will scatter
  alternatives:
  - I will disperse
  - I will winnow
  lexicon: HALOT
  rationale: The verb זרה in the Hiphil commonly conveys scattering or dispersing.
    'Scatter' is the most natural English equivalent here and preserves the covenant-judgment
    imagery without overinterpreting the metaphor.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם means 'nations/peoples.' In Leviticus, 'nations' best fits the
    geopolitical sense of exile among foreign peoples. 'Gentiles' would import later
    Jewish/Christian connotations not required by the Hebrew.
- source_word: וַהֲרִיקֹתִי ... חָרֶב
  chosen: I will draw out the sword
  alternatives:
  - I will unsheathe the sword
  - I will empty out the sword
  lexicon: HALOT
  rationale: The idiom with ריק plus חֶרֶב refers to drawing or unsheathing a sword
    in pursuit. 'Draw out the sword' is a clear, fairly formal rendering that preserves
    the concrete martial image.
- source_word: אַחֲרֵיכֶם
  chosen: after you
  alternatives:
  - behind you
  - in pursuit of you
  lexicon: HALOT
  rationale: Literally 'after you.' In context it indicates hostile pursuit. 'After
    you' keeps the Hebrew wording, while the pursuit sense is already conveyed by
    the sword idiom.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  lexicon: HALOT
  rationale: The noun denotes devastation or desolation. Rendering it as 'a desolation'
    preserves the nominal force of the Hebrew and the solemn covenant-curse tone.
- source_word: חָרְבָּה
  chosen: ruins
  alternatives:
  - waste places
  - desolate
  lexicon: HALOT
  rationale: The noun denotes a ruined or devastated state. With 'your cities,' English
    reads most naturally as 'will become ruins,' preserving the resultative sense.
- source_word: וְהָיְתָה ... יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Although היה can be rendered simply 'be,' in this judgment context it
    often carries an ingressive/resultative sense. 'Will become' communicates the
    transition into desolation and ruin more clearly in modern English.
