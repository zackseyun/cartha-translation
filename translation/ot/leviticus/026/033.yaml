theological_decisions:
- issue: Covenant-judgment language describing exile and military pursuit
  chosen_reading: Retain the direct first-person divine agency ('I will scatter...
    I will draw out the sword')
  alternative_readings:
  - Use passive or impersonal phrasing to soften divine agency
  rationale: The Hebrew explicitly attributes these covenant curses to God's action.
    The translation should preserve that theological force without mitigation.
  doctrine_reference: Translation philosophy §1, §3
