id: LEV.26.26
reference: Leviticus 26:26
source:
  edition: WLC
  text: בְּ/שִׁבְרִ֣/י לָ/כֶם֮ מַטֵּה לֶחֶם֒ וְ֠/אָפוּ עֶ֣שֶׂר נָשִׁ֤ים לַחְמְ/כֶם֙
    בְּ/תַנּ֣וּר אֶחָ֔ד וְ/הֵשִׁ֥יבוּ לַחְמְ/כֶ֖ם בַּ/מִּשְׁקָ֑ל וַ/אֲכַלְתֶּ֖ם וְ/לֹ֥א
    תִשְׂבָּֽעוּ־׃ס
translation:
  text: When I break your supply of bread, ten women will bake your bread in a single
    oven and return your bread by weight; and you will eat, but you will not be satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the staff of bread,' an idiom for the sustaining supply of bread.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשִׁבְרִי
  chosen: When I break
  alternatives:
  - When I shatter
  - When I destroy
  lexicon: HALOT
  rationale: The infinitive construct of שׁבר with prefixed ב marks a temporal clause,
    'when I break.' The verb is metaphorical here for breaking the means of sustenance,
    not literal smashing. 'When I break' preserves the vivid covenant-judgment imagery
    without over-paraphrasing.
- source_word: מַטֵּה לֶחֶם
  chosen: your supply of bread
  alternatives:
  - the staff of bread
  - the support of bread
  lexicon: HALOT
  rationale: This idiom literally means 'staff of bread' and refers to the sustaining
    support provided by bread, hence food supply. 'Supply of bread' communicates the
    idiom's sense in natural English while preserving the bread-specific imagery better
    than a broader 'food supply.' The more formal literal rendering is preserved in
    a footnote.
- source_word: וְאָפוּ
  chosen: will bake
  alternatives:
  - and they will bake
  lexicon: HALOT
  rationale: The qatal here continues the future consequence in the judgment sequence.
    English smooths the unspecified plural subject with 'ten women' immediately following,
    so 'will bake' is sufficient.
- source_word: עֶשֶׂר נָשִׁים
  chosen: ten women
  lexicon: HALOT
  rationale: A straightforward numerical phrase. 'Women' should be retained rather
    than generalized, since the Hebrew explicitly specifies women in the domestic
    bread-making scene.
- source_word: לַחְמְכֶם
  chosen: your bread
  alternatives:
  - bread for you
  lexicon: HALOT
  rationale: The suffix marks possession or provision for the addressees. 'Your bread'
    is the most natural and direct rendering in both occurrences.
- source_word: בְּתַנּוּר אֶחָד
  chosen: in a single oven
  alternatives:
  - in one oven
  lexicon: HALOT
  rationale: 'The phrase emphasizes scarcity: what normally would require many ovens
    can be handled in one. ''Single oven'' brings out the force naturally in English.'
- source_word: וְהֵשִׁיבוּ
  chosen: and return
  alternatives:
  - and bring back
  - and deliver
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'cause to return/bring back.' In context,
    after baking, the bread is handed back in rationed portions. 'Return' is concise
    and fits the sequence.
- source_word: בַּמִּשְׁקָל
  chosen: by weight
  alternatives:
  - by measure of weight
  - in weighed portions
  lexicon: HALOT
  rationale: The phrase indicates rationing by weighed amounts because of scarcity.
    'By weight' is idiomatic and clear.
- source_word: וַאֲכַלְתֶּם
  chosen: and you will eat
  alternatives:
  - then you will eat
  lexicon: HALOT
  rationale: This continues the result sequence. Future sense is appropriate in context.
- source_word: וְלֹא תִשְׂבָּעוּ
  chosen: but you will not be satisfied
  alternatives:
  - but you will not be full
  - but you will not be sated
  lexicon: HALOT
  rationale: The verb שׂבע means to be sated or satisfied with food. 'Satisfied' is
    natural modern English and conveys the failure of hunger to be relieved; 'full'
    is possible but slightly flatter.
