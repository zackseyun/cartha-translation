theological_decisions:
- issue: Referent of הָאָרֶץ in covenant-judgment context
  chosen_reading: the land (the land of Israel/Canaan in context)
  alternative_readings:
  - the earth
  rationale: The immediate context concerns covenant curses on Israel's land. Rendering
    as 'the land' avoids universalizing the judgment beyond what the Hebrew context
    warrants.
  doctrine_reference: Translation philosophy §1, §5
