id: LEV.26.32
reference: Leviticus 26:32
source:
  edition: WLC
  text: וַ/הֲשִׁמֹּתִ֥י אֲנִ֖י אֶת הָ/אָ֑רֶץ וְ/שָֽׁמְמ֤וּ עָלֶ֨י/הָ֙ אֹֽיְבֵי/כֶ֔ם
    הַ/יֹּשְׁבִ֖ים בָּֽ/הּ־׃
translation:
  text: And I myself will lay the land waste, so that your enemies who dwell in it
    will be appalled at it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be astonished at it' or 'will be horrified at it.' The Hebrew verb
      can express appalled astonishment in response to devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁמֹּתִי
  chosen: will lay ... waste
  alternatives:
  - will make desolate
  - will devastate
  lexicon: HALOT
  rationale: From שׁמם in the causative stem, meaning to make desolate or lay waste.
    'Lay ... waste' is natural modern English and preserves the causative force without
    sounding archaic.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The independent pronoun is emphatic alongside the verbal form. 'I myself'
    brings out the emphasis that the LORD personally declares this action.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the earth
  lexicon: HALOT
  rationale: In Leviticus, הָאָרֶץ commonly refers to the covenant land rather than
    the whole earth. 'The land' best fits the immediate covenant-judgment context.
- source_word: וְשָׁמְמוּ
  chosen: will be appalled
  alternatives:
  - will be desolated
  - will be astonished
  - will be horrified
  lexicon: HALOT
  rationale: The same root שׁמם here in the simple stem can denote being desolated
    or being appalled/astonished. Because the subject is 'your enemies who dwell in
    it,' the sense is their shocked reaction at the land's devastation, not that they
    themselves become desolate. 'Will be appalled' captures that response idiomatically.
- source_word: עָלֶיהָ
  chosen: at it
  alternatives:
  - over it
  - because of it
  lexicon: HALOT
  rationale: With שׁמם, עַל can mark the object or occasion of astonishment. 'At it'
    is concise and idiomatic in English for being appalled at the sight of the land.
- source_word: אֹיְבֵיכֶם
  chosen: your enemies
  lexicon: HALOT
  rationale: Straightforward possessive construction; no contextual pressure for variation.
- source_word: הַיֹּשְׁבִים בָּהּ
  chosen: who dwell in it
  alternatives:
  - who live in it
  - who settle in it
  lexicon: HALOT
  rationale: Participle of ישׁב denotes residing or dwelling. 'Who dwell in it' is
    slightly more formal and fits the covenant-land setting while remaining readable.
