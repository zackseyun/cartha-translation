id: LEV.26.7
reference: Leviticus 26:7
source:
  edition: WLC
  text: וּ/רְדַפְתֶּ֖ם אֶת אֹיְבֵי/כֶ֑ם וְ/נָפְל֥וּ לִ/פְנֵי/כֶ֖ם לֶ/חָֽרֶב־
translation:
  text: You will pursue your enemies, and they will fall before you by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will fall before you to the sword.' The Hebrew expression can be
      rendered in more than one idiomatic way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְדַפְתֶּם
  chosen: you will pursue
  alternatives:
  - you shall chase
  - you will chase down
  lexicon: HALOT
  rationale: רדף commonly means 'pursue, chase.' 'Pursue' is natural modern English
    and preserves the military sense without over-paraphrasing.
- source_word: אֹיְבֵיכֶם
  chosen: your enemies
  alternatives:
  - those who hate you
  lexicon: HALOT
  rationale: The noun אויב is the standard term for 'enemy.' The possessive suffix
    is directly represented by 'your.'
- source_word: וְנָפְלוּ
  chosen: and they will fall
  alternatives:
  - and they will be defeated
  - and they will fall down
  lexicon: HALOT
  rationale: נפל literally means 'fall.' In battle contexts it can imply defeat or
    death, but the literal 'fall' best preserves the Hebrew imagery while allowing
    the following phrase to specify the manner.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: לפני with suffix idiomatically means 'before' or 'in front of' someone.
    'Before you' is the standard and clear rendering in this military context.
- source_word: לֶחָרֶב
  chosen: by the sword
  alternatives:
  - to the sword
  - before the sword
  lexicon: HALOT
  rationale: The preposition ל with חרב in this context expresses result or instrument
    in battle. English idiom is best captured by 'by the sword,' indicating death/defeat
    through armed combat.
