theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Aspect/tense of the qatal verbs in context
  chosen_reading: future-oriented English ('I will not reject... I will not abhor')
  alternative_readings:
  - present-perfect ('I have not rejected...')
  - simple present ('I do not reject...')
  rationale: Though the Hebrew uses qatal forms, the discourse concerns Israel's condition
    in exile and God's continuing covenant commitment under those circumstances. Future-oriented
    English best communicates the promissory force in context without overstating
    a technical tense value.
