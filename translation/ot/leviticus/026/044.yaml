id: LEV.26.44
reference: Leviticus 26:44
source:
  edition: WLC
  text: וְ/אַף גַּם זֹ֠את בִּֽ/הְיוֹתָ֞/ם בְּ/אֶ֣רֶץ אֹֽיְבֵי/הֶ֗ם לֹֽא מְאַסְתִּ֤י/ם
    וְ/לֹֽא גְעַלְתִּי/ם֙ לְ/כַלֹּתָ֔/ם לְ/הָפֵ֥ר בְּרִיתִ֖/י אִתָּ֑/ם כִּ֛י אֲנִ֥י
    יְהוָ֖ה אֱלֹהֵי/הֶֽם־־־־׃
translation:
  text: Yet even then, when they are in the land of their enemies, I will not reject
    them, and I will not abhor them so as to destroy them, to break my covenant with
    them; for I am the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not loathe them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to make an end of them' or 'to consume them completely.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַף גַּם זֹאת
  chosen: Yet even then
  alternatives:
  - But even this
  - And even so
  lexicon: HALOT
  rationale: 'The cluster intensifies concession/adversative force. ''Yet even then''
    captures the sense idiomatically in modern English: despite the preceding judgments,
    what follows still holds.'
- source_word: בִּהְיוֹתָם
  chosen: when they are
  alternatives:
  - while they are
  - in their being
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance.
    'When they are' is natural English and preserves the temporal force.
- source_word: בְּאֶרֶץ אֹיְבֵיהֶם
  chosen: in the land of their enemies
  alternatives:
  - in their enemies' land
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Land of their enemies' is clearer
    and more idiomatic than the possessive alternative.
- source_word: לֹא מְאַסְתִּים
  chosen: I will not reject them
  alternatives:
  - I have not rejected them
  - I will not despise them
  - I will not spurn them
  lexicon: HALOT
  rationale: מָאַס commonly conveys rejecting/spurning. In this covenantal context,
    'reject' best expresses relational repudiation. English future is used because
    the verse states God's enduring resolve in the context of coming exile/judgment.
- source_word: וְלֹא גְעַלְתִּים
  chosen: I will not abhor them
  alternatives:
  - I will not loathe them
  - I will not detest them
  lexicon: HALOT
  rationale: גָּעַל carries the sense of abhorring or loathing. 'Abhor' preserves
    the strong emotional and covenantal revulsion language without becoming colloquially
    harsh.
- source_word: לְכַלֹּתָם
  chosen: so as to destroy them
  alternatives:
  - to make an end of them
  - to consume them completely
  lexicon: HALOT
  rationale: 'The ל infinitive expresses result/purpose linked to the preceding verbs:
    God has not rejected/abhorred them to the point of total destruction. ''So as
    to destroy them'' is clear modern English.'
- source_word: לְהָפֵר בְּרִיתִי אִתָּם
  chosen: to break my covenant with them
  alternatives:
  - to annul my covenant with them
  - to violate my covenant with them
  lexicon: HALOT
  rationale: הֵפֵר with covenant language means break, annul, or invalidate. 'Break
    my covenant' is the most transparent and idiomatic rendering in English, while
    preserving covenantal seriousness.
- source_word: כִּי אֲנִי יְהוָה אֱלֹהֵיהֶם
  chosen: for I am the LORD their God
  alternatives:
  - because I am the LORD their God
  lexicon: HALOT
  rationale: כִּי gives the grounding reason. Per doctrine, יְהוָה is rendered 'the
    LORD.' The clause states covenant identity as the basis for God's refusal to utterly
    cast them off.
