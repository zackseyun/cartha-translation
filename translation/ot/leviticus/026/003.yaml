theological_decisions:
- issue: Covenant-obedience idiom
  chosen_reading: Retain the metaphor 'walk in my statutes' rather than flattening
    it to 'live by' or 'obey.'
  alternative_readings:
  - live by my statutes
  - follow my statutes
  rationale: The Hebrew idiom combines covenantal metaphor and ethical conduct. Preserving
    'walk' maintains biblical texture while the rest of the clause clarifies the practical
    sense through 'keep' and 'do them.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without unnecessary paraphrase.'
