id: LEV.26.3
reference: Leviticus 26:3
source:
  edition: WLC
  text: אִם בְּ/חֻקֹּתַ֖/י תֵּלֵ֑כוּ וְ/אֶת מִצְוֺתַ֣/י תִּשְׁמְר֔וּ וַ/עֲשִׂיתֶ֖ם
    אֹתָֽ/ם־־׃
translation:
  text: If you walk in my statutes and keep my commandments and do them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'follow my statutes.' The Hebrew literally says 'walk in my statutes,'
      a covenantal idiom for ordering one's life according to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the most natural English equivalent
    here; 'when' would weaken the explicit conditional force of the covenant formulation.
- source_word: בְּחֻקֹּתַי
  chosen: in my statutes
  alternatives:
  - by my statutes
  - according to my statutes
  - in my decrees
  lexicon: HALOT
  rationale: חֻקּוֹת commonly refers to prescribed statutes/decrees. The preposition
    ב with הלך yields the idiom 'walk in,' expressing conduct in accordance with God's
    statutes. 'Statutes' preserves the legal-covenantal nuance better than the broader
    'decrees' here.
- source_word: תֵּלֵכוּ
  chosen: you walk
  alternatives:
  - you live
  - you conduct yourselves
  lexicon: HALOT
  rationale: הלך literally means 'walk,' and in covenantal contexts idiomatically
    denotes one's manner of life. 'Walk' preserves the biblical metaphor while remaining
    clear in English.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: מִצְוָה denotes commandment/command. 'Commandments' fits the legal register
    of the verse and pairs naturally with 'statutes.'
- source_word: תִּשְׁמְרוּ
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: שׁמר in legal contexts commonly means to keep/observe commandments. 'Keep'
    is concise, idiomatic, and standard without being archaic.
- source_word: וַעֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: עשה with the object pronoun refers to actually performing the commandments.
    'Do them' is direct and preserves the Hebrew emphasis on obedience in action;
    'carry them out' is possible but slightly more interpretive.
