id: LEV.26.22
reference: Leviticus 26:22
source:
  edition: WLC
  text: וְ/הִשְׁלַחְתִּ֨י בָ/כֶ֜ם אֶת חַיַּ֤ת הַ/שָּׂדֶה֙ וְ/שִׁכְּלָ֣ה אֶתְ/כֶ֔ם
    וְ/הִכְרִ֨יתָה֙ אֶת בְּהֶמְתְּ/כֶ֔ם וְ/הִמְעִ֖יטָה אֶתְ/כֶ֑ם וְ/נָשַׁ֖מּוּ דַּרְכֵי/כֶֽם־־׃
translation:
  text: And I will send against you the wild animals of the field, and they will bereave
    you of children, cut off your livestock, reduce your number, and your roads will
    become desolate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beasts of the field.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''bereave you,'' that is, deprive you of children.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your ways will be desolate,' though here the sense is likely your roads
      or travel routes becoming deserted.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁלַחְתִּי
  chosen: And I will send
  alternatives:
  - And I will let loose
  - And I will release
  lexicon: HALOT
  rationale: Hiphil of שלח with first-person subject naturally means 'send.' 'Let
    loose' is possible in context of hostile agents, but 'send' is the plain sense
    and preserves divine agency without embellishment.
- source_word: בָכֶם
  chosen: against you
  alternatives:
  - among you
  - upon you
  lexicon: HALOT
  rationale: The preposition ב with hostile action here is best rendered idiomatically
    as 'against you.' 'Among you' is too spatial and weakens the punitive force; 'upon
    you' is possible but less natural in modern English.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - wild beasts
  lexicon: HALOT
  rationale: The construct phrase denotes wild land animals. 'Wild animals of the
    field' is clear modern English; 'beasts of the field' is traditional but slightly
    archaic. The article is retained conceptually as a class reference.
- source_word: וְשִׁכְּלָה אֶתְכֶם
  chosen: and they will bereave you of children
  alternatives:
  - and they will make you childless
  - and they will bereave you
  lexicon: HALOT
  rationale: The verb שׁכל in the Piel commonly means to bereave, especially of children.
    Because the direct object is 'you,' English needs the implied object supplied
    for clarity. 'Bereave you of children' best captures the idiom without over-paraphrase.
- source_word: וְהִכְרִיתָה אֶת בְּהֶמְתְּכֶם
  chosen: cut off your livestock
  alternatives:
  - destroy your livestock
  - wipe out your cattle
  lexicon: HALOT
  rationale: הכרית often means 'cut off,' including exterminatory judgment. 'Cut off
    your livestock' preserves the covenant-judgment diction while remaining intelligible.
    'Destroy' is possible but less texturally connected to the Hebrew idiom.
- source_word: בְּהֶמְתְּכֶם
  chosen: your livestock
  alternatives:
  - your cattle
  - your animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to domesticated animals owned by the people. 'Livestock'
    is broader and more accurate than 'cattle,' which in modern English can be too
    narrow.
- source_word: וְהִמְעִיטָה אֶתְכֶם
  chosen: reduce your number
  alternatives:
  - make you few
  - diminish you
  lexicon: HALOT
  rationale: The Hiphil of מעט means to make few or diminish. 'Reduce your number'
    expresses the likely sense of depopulation clearly in contemporary English.
- source_word: וְנָשַׁמּוּ דַּרְכֵיכֶם
  chosen: and your roads will become desolate
  alternatives:
  - and your ways will be desolate
  - and your highways will lie deserted
  lexicon: HALOT
  rationale: נשׁם conveys becoming desolate or devastated. דֶּרֶךְ in the plural here
    most naturally refers to literal roads/routes in the context of societal devastation,
    not metaphorical conduct. 'Roads' is the clearest modern rendering.
