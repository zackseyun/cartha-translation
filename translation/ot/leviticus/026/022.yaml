theological_decisions:
- issue: Implied object in the bereavement clause
  chosen_reading: Explicitly supplied 'of children' in English
  alternative_readings:
  - Leave the phrase as 'bereave you' without specifying children
  rationale: The Hebrew idiom of שׁכל commonly implies loss of children. Supplying
    the implied object is warranted for intelligibility in English and does not add
    a new theological claim; it makes explicit what the idiom conventionally communicates
    in context of covenant curses.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
