theological_decisions:
- issue: Rendering of נָפֶשׁ in a curse context
  chosen_reading: life
  alternative_readings:
  - soul
  - self
  rationale: To avoid importing later anthropological assumptions, נֶפֶשׁ is rendered
    here as 'life,' fitting the context of physical wasting and covenant judgment.
    This preserves the Hebrew sense of living vitality rather than making a doctrinal
    statement about the immaterial soul.
  doctrine_reference: Translation philosophy §1, §3
