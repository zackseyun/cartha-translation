id: LEV.26.16
reference: Leviticus 26:16
source:
  edition: WLC
  text: אַף אֲנִ֞י אֶֽעֱשֶׂה זֹּ֣את לָ/כֶ֗ם וְ/הִפְקַדְתִּ֨י עֲלֵי/כֶ֤ם בֶּֽהָלָה֙
    אֶת הַ/שַּׁחֶ֣פֶת וְ/אֶת הַ/קַּדַּ֔חַת מְכַלּ֥וֹת עֵינַ֖יִם וּ/מְדִיבֹ֣ת נָ֑פֶשׁ
    וּ/זְרַעְתֶּ֤ם לָ/רִיק֙ זַרְעֲ/כֶ֔ם וַ/אֲכָלֻ֖/הוּ אֹיְבֵי/כֶֽם־־־־׃
translation:
  text: 'I also will do this to you: I will appoint over you sudden terror, wasting
    disease and fever, consuming the eyes and draining the life; and you will sow
    your seed in vain, for your enemies will eat it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will bring upon you sudden terror.' The Hebrew verb can carry the
      sense of imposing or bringing a judgment upon someone.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''consumption.'' The exact disease term is uncertain;
      the Hebrew likely refers more generally to a wasting illness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'causing the eyes to fail and the life to waste away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף אֲנִי
  chosen: I also
  alternatives:
  - even I
  - I in turn
  lexicon: HALOT
  rationale: 'אַף with the independent pronoun adds emphasis and continuation: ''also
    / even I.'' ''I also'' is natural English and preserves the retaliatory force
    in context.'
- source_word: אֶעֱשֶׂה זֹּאת לָכֶם
  chosen: will do this to you
  alternatives:
  - will do this for you
  - will do such a thing to you
  lexicon: HALOT
  rationale: עשה + זאת + ל conveys action directed toward the hearers; in this judgment
    context, English idiom requires 'to you,' not 'for you.'
- source_word: וְהִפְקַדְתִּי עֲלֵיכֶם
  chosen: I will appoint over you
  alternatives:
  - I will bring upon you
  - I will visit upon you
  lexicon: HALOT
  rationale: Hiphil of פקד can mean appoint, muster, visit, or impose. Here it introduces
    covenant curses placed upon Israel. 'Appoint over you' preserves the governing/assigned
    sense while remaining intelligible. A more idiomatic alternative 'bring upon you'
    is preserved in a footnote.
- source_word: בֶּהָלָה
  chosen: sudden terror
  alternatives:
  - terror
  - panic
  - dismay
  lexicon: HALOT
  rationale: The noun denotes terror or panic, likely with the sense of sudden alarm.
    'Sudden terror' captures both the emotional shock and the abruptness implied by
    the term and context.
- source_word: הַשַּׁחֶפֶת
  chosen: wasting disease
  alternatives:
  - consumption
  - tuberculosis
  lexicon: HALOT
  rationale: The exact ancient disease is uncertain. 'Consumption' is traditional
    but archaic and potentially misleading as a technical diagnosis; 'tuberculosis'
    is too specific. 'Wasting disease' conveys the symptom profile without overprecision.
- source_word: הַקַּדַּחַת
  chosen: fever
  alternatives:
  - burning fever
  - inflammation
  lexicon: HALOT
  rationale: The noun refers to feverish burning. 'Fever' is the clearest modern equivalent;
    'burning fever' is possible but somewhat redundant in English.
- source_word: מְכַלּוֹת עֵינַיִם
  chosen: consuming the eyes
  alternatives:
  - causing the eyes to fail
  - wearing out the eyes
  lexicon: HALOT
  rationale: כלה in participial form means finishing, consuming, wasting away. The
    idiom refers to eyes failing from sickness or grief. 'Consuming the eyes' keeps
    the vivid Hebrew imagery while remaining understandable.
- source_word: וּמְדִיבֹת נָפֶשׁ
  chosen: draining the life
  alternatives:
  - causing the soul to pine away
  - making the life waste away
  - sapping the spirit
  lexicon: HALOT
  rationale: The phrase is difficult; נפש here refers to life/self rather than an
    abstract immaterial soul. 'Draining the life' communicates debilitating loss of
    vitality in idiomatic English while avoiding overly dualistic language.
- source_word: וּזְרַעְתֶּם לָרִיק זַרְעֲכֶם
  chosen: you will sow your seed in vain
  alternatives:
  - you will sow your seed to no purpose
  - you will plant your seed for nothing
  lexicon: HALOT
  rationale: לריק means emptily, vainly, to no effect. 'Sow your seed in vain' is
    both faithful and natural in English.
- source_word: וַאֲכָלֻהוּ אֹיְבֵיכֶם
  chosen: for your enemies will eat it
  alternatives:
  - and your enemies will eat it
  - and it will be eaten by your enemies
  lexicon: HALOT
  rationale: The waw here is rendered causally in English because the enemies' consumption
    explains why the sowing is in vain. The suffix on the verb refers back to the
    seed/crop. 'Eat it' is the plain agricultural image.
