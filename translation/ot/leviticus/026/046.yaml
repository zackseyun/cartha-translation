theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is explicitly masculine plural in a standard ethnocovenantal
    expression. Per the project's gender-accurate principle, the translation preserves
    the source form rather than neutralizing it, while an idiomatic alternative is
    worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
