id: LEV.26.46
reference: Leviticus 26:46
source:
  edition: WLC
  text: אֵ֠לֶּה הַֽ/חֻקִּ֣ים וְ/הַ/מִּשְׁפָּטִים֮ וְ/הַ/תּוֹרֹת֒ אֲשֶׁר֙ נָתַ֣ן יְהוָ֔ה
    בֵּינ֕/וֹ וּ/בֵ֖ין בְּנֵ֣י יִשְׂרָאֵ֑ל בְּ/הַ֥ר סִינַ֖י בְּ/יַד מֹשֶֽׁה־׃פ
translation:
  text: These are the statutes and the judgments and the laws that the LORD established
    between himself and the sons of Israel at Mount Sinai by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “by the hand of Moses,” an idiom meaning “through Moses.”
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Standard deictic opening introducing the summary statement of the covenantal
    material.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the prescribed statutes
  lexicon: HALOT
  rationale: חֹק/חֻקָּה commonly denotes fixed prescriptions or statutes. 'Statutes'
    preserves the legal-covenantal register and pairs naturally with the following
    legal terms.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט often refers to judgments, legal decisions, or ordinances.
    'Judgments' keeps the formal legal sense and reflects the Hebrew more directly
    than the broader 'rules.'
- source_word: הַתּוֹרֹת
  chosen: the laws
  alternatives:
  - the instructions
  - the teachings
  lexicon: HALOT
  rationale: Plural תּוֹרוֹת can mean bodies of instruction or laws. Here, in a triad
    with statutes and judgments, 'laws' best fits the legal summary context in idiomatic
    English while still reflecting torah as authoritative instruction.
- source_word: אֲשֶׁר נָתַן
  chosen: that ... established
  alternatives:
  - that ... gave
  - that ... set
  lexicon: HALOT
  rationale: נָתַן literally means 'gave,' but in covenant-legal context with 'between
    ... and ...' it idiomatically conveys instituting or establishing terms. 'Established'
    communicates the relational-covenantal force more clearly in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בֵּינוֹ וּבֵין בְּנֵי יִשְׂרָאֵל
  chosen: between himself and the sons of Israel
  alternatives:
  - between him and the people of Israel
  - between himself and the Israelites
  lexicon: HALOT
  rationale: The phrase marks a covenant relationship between YHWH and Israel. 'Himself'
    is natural English for the pronominal suffix after 'the LORD.' 'Sons of Israel'
    preserves the Hebrew expression and follows the project's gender-accurate principle.
- source_word: בְּהַר סִינַי
  chosen: at Mount Sinai
  alternatives:
  - on Mount Sinai
  lexicon: HALOT
  rationale: Standard English rendering for the location; 'at' is idiomatic for the
    setting of covenant giving.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: The Hebrew idiom literally means mediation through Moses. 'By the hand
    of Moses' preserves the idiom in understandable English and maintains the formal
    texture of the verse.
