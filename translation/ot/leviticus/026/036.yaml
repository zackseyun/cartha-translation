id: LEV.26.36
reference: Leviticus 26:36
source:
  edition: WLC
  text: וְ/הַ/נִּשְׁאָרִ֣ים בָּ/כֶ֔ם וְ/הֵבֵ֤אתִי מֹ֨רֶךְ֙ בִּ/לְבָבָ֔/ם בְּ/אַרְצֹ֖ת
    אֹיְבֵי/הֶ֑ם וְ/רָדַ֣ף אֹתָ֗/ם ק֚וֹל עָלֶ֣ה נִדָּ֔ף וְ/נָס֧וּ מְנֻֽסַת חֶ֛רֶב
    וְ/נָפְל֖וּ וְ/אֵ֥ין רֹדֵֽף־׃
translation:
  text: As for those of you who remain, I will bring faintness into their hearts in
    the lands of their enemies, and the sound of a driven leaf will pursue them; they
    will flee as one flees from the sword, and they will fall when no one is pursuing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of a windblown leaf.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָרִים
  chosen: those of you who remain
  alternatives:
  - the survivors among you
  - those left among you
  lexicon: HALOT
  rationale: The participle from שׁאר denotes those left over or remaining after judgment.
    'Those of you who remain' is natural English and preserves the direct address
    to Israel signaled by בכם.
- source_word: בָּכֶם
  chosen: of you
  alternatives:
  - among you
  - from you
  lexicon: HALOT
  rationale: Attached to 'the remaining ones,' this prepositional phrase identifies
    the group from within Israel. In English, 'those of you who remain' best captures
    the construction idiomatically.
- source_word: וְהֵבֵאתִי
  chosen: I will bring
  alternatives:
  - I will send
  - I will put
  lexicon: HALOT
  rationale: The Hiphil of בוא here has a causative sense, 'bring upon/into.' 'I will
    bring' is the most direct and idiomatic rendering with the following object and
    destination phrase.
- source_word: מֹרֶךְ
  chosen: faintness
  alternatives:
  - fearfulness
  - despair
  - timidity
  lexicon: HALOT
  rationale: The noun denotes a state of weakness or collapse of courage rather than
    simple fear alone. 'Faintness' preserves the sense of inner collapse and matches
    the context of panic.
- source_word: בִּלְבָבָם
  chosen: into their hearts
  alternatives:
  - in their hearts
  lexicon: HALOT
  rationale: With the verb 'bring,' English naturally takes 'into their hearts.' The
    Hebrew locative sense is preserved while keeping the phrase readable.
- source_word: בְּאַרְצֹת אֹיְבֵיהֶם
  chosen: in the lands of their enemies
  alternatives:
  - in their enemies' lands
  - in the countries of their enemies
  lexicon: HALOT
  rationale: The plural 'lands' reflects the Hebrew plural and suggests dispersion
    among multiple territories. 'Enemies' is retained rather than softened.
- source_word: וְרָדַף אֹתָם
  chosen: will pursue them
  alternatives:
  - will chase them
  lexicon: HALOT
  rationale: רדף commonly means pursue/chase. 'Pursue' fits the fearful irony of an
    insubstantial threat acting as pursuer.
- source_word: קוֹל עָלֶה נִדָּף
  chosen: the sound of a driven leaf
  alternatives:
  - the sound of a windblown leaf
  - the sound of a scattered leaf
  lexicon: HALOT
  rationale: קול is 'sound'; עלה is 'leaf'; נדף conveys being driven/blown away. 'Driven
    leaf' is slightly more formal but preserves the passive nuance without overinterpreting
    the agent as wind, though wind is implied.
- source_word: וְנָסוּ
  chosen: they will flee
  alternatives:
  - they will run away
  lexicon: HALOT
  rationale: Standard rendering of נוס. 'Flee' matches the elevated but readable tone
    of the judgment context.
- source_word: מְנֻסַת חֶרֶב
  chosen: as one flees from the sword
  alternatives:
  - with the flight from a sword
  - as if fleeing a sword
  lexicon: HALOT
  rationale: 'The construct phrase expresses manner: fleeing as in flight before a
    sword. ''As one flees from the sword'' makes the idiom clear in contemporary English
    while preserving the comparison.'
- source_word: וְנָפְלוּ
  chosen: they will fall
  alternatives:
  - they will collapse
  - they will stumble and fall
  lexicon: HALOT
  rationale: נפל is broad enough for falling in panic or collapse. 'Fall' keeps the
    Hebrew's terseness and ambiguity.
- source_word: וְאֵין רֹדֵף
  chosen: when no one is pursuing
  alternatives:
  - though no one pursues
  - with no pursuer
  lexicon: HALOT
  rationale: 'The clause states the irony explicitly: there is no actual pursuer.
    ''When no one is pursuing'' reads naturally after ''they will fall'' and preserves
    the sense.'
