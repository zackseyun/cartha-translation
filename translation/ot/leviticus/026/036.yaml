theological_decisions:
- issue: Nature of the judgment described
  chosen_reading: psychological terror and panic sent by God in exile
  alternative_readings:
  - mere external military pursuit
  - only metaphorical unease
  rationale: The verse explicitly attributes the inner faintness to God's action and
    then describes irrational flight at trivial sounds. The translation preserves
    both divine agency and the experiential psychological dimension without importing
    later doctrinal categories.
  doctrine_reference: Translation philosophy §1, §3
