id: LEV.26.10
reference: Leviticus 26:10
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּ֥ם יָשָׁ֖ן נוֹשָׁ֑ן וְ/יָשָׁ֕ן מִ/פְּנֵ֥י חָדָ֖שׁ תּוֹצִֽיאוּ׃
translation:
  text: You will eat old stores long kept, and you will clear out the old because
    of the new.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'You will eat old store long kept, and you will bring
      out the old because of the new.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  chosen: You will eat
  alternatives:
  - and you shall eat
  - then you will eat
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in this promise context functions futurally
    within the covenant blessings sequence. English future best reflects the sense.
- source_word: יָשָׁן
  chosen: old stores
  alternatives:
  - old grain
  - old produce
  - old food
  lexicon: HALOT
  rationale: Adjective 'old' is used substantivally here for stored produce from previous
    harvests. 'Stores' makes the implied object natural in English without over-specifying
    grain.
- source_word: נוֹשָׁן
  chosen: long kept
  alternatives:
  - aged
  - very old
  - stale
  lexicon: HALOT
  rationale: This participial/adjectival form intensifies the age of the stored food.
    'Long kept' conveys prolonged storage without the misleading negative connotation
    of 'stale.'
- source_word: וְיָשָׁן
  chosen: the old
  alternatives:
  - old stores
  - what is old
  lexicon: HALOT
  rationale: 'Second occurrence is likewise substantival, now as the object to be
    removed. The article is implicit in English by context: previously stored produce.'
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - to make room for
  - from the presence of
  lexicon: HALOT
  rationale: 'The idiom here expresses cause or displacement: the old is removed on
    account of the arrival of the new harvest. ''Because of'' is the most direct rendering;
    the practical implication is made clear by the verb ''clear out.'''
- source_word: חָדָשׁ
  chosen: the new
  alternatives:
  - new produce
  - new harvest
  lexicon: HALOT
  rationale: Adjective used substantivally for newly harvested produce. 'The new'
    preserves the compact Hebrew style while remaining intelligible in context.
- source_word: תּוֹצִיאוּ
  chosen: you will clear out
  alternatives:
  - you will bring out
  - you will remove
  - you will take out
  lexicon: HALOT
  rationale: Hiphil of יצא means 'cause to go out, bring out.' In context of old stores
    displaced by incoming new produce, 'clear out' captures the practical force idiomatically
    in modern English.
