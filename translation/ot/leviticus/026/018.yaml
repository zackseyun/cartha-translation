id: LEV.26.18
reference: Leviticus 26:18
source:
  edition: WLC
  text: וְ/אִ֨ם עַד אֵ֔לֶּה לֹ֥א תִשְׁמְע֖וּ לִ֑/י וְ/יָסַפְתִּי֙ לְ/יַסְּרָ֣ה אֶתְ/כֶ֔ם
    שֶׁ֖בַע עַל חַטֹּאתֵי/כֶֽם־־־׃
translation:
  text: And if, despite these things, you do not listen to me, then I will continue
    to discipline you sevenfold for your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all this' or 'after all this'; the Hebrew idiom means in spite of
      the preceding judgments.
    reason: lexical_alternative
  - marker: b
    text: Or 'seven times.' The Hebrew may denote intensified punishment rather than
      a strictly numerical count.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation in the covenant warning sequence.
    'And if' preserves the connective force of ו while remaining natural in English.
- source_word: עַד אֵלֶּה
  chosen: despite these things
  alternatives:
  - until these things
  - up to these things
  - for all this
  lexicon: HALOT
  rationale: In this idiom, עַד with demonstrative אֵלֶּה conveys persistence in disobedience
    in spite of prior judgments, not a temporal 'until.' 'Despite these things' best
    captures the adversative sense in context.
- source_word: לֹא תִשְׁמְעוּ לִי
  chosen: you do not listen to me
  alternatives:
  - you do not obey me
  - you do not hear me
  lexicon: HALOT
  rationale: שׁמע with ל often carries the sense of listening with responsive obedience.
    'Listen to me' keeps the auditory metaphor of the Hebrew while allowing the covenantal
    implication of obedience to remain implicit in context.
- source_word: וְיָסַפְתִּי
  chosen: I will continue
  alternatives:
  - I will add
  - I will again
  - I will proceed
  lexicon: HALOT
  rationale: יסף here marks escalation or continuation of punishment. 'I will continue'
    expresses the iterative force more idiomatically than the wooden 'I will add.'
- source_word: לְיַסְּרָה אֶתְכֶם
  chosen: to discipline you
  alternatives:
  - to chastise you
  - to correct you
  - to punish you
  lexicon: HALOT
  rationale: יסר can denote disciplinary correction with punitive force. 'Discipline'
    preserves both correction and punishment better than the narrower 'punish' or
    the more archaic 'chastise.'
- source_word: שֶׁבַע
  chosen: sevenfold
  alternatives:
  - seven times
  lexicon: HALOT
  rationale: In judgment formulas, שׁבע functions adverbially to indicate intensified
    measure. 'Sevenfold' is concise and idiomatic, while 'seven times' is a viable
    alternative preserved in a footnote because some readers may take it quantitatively.
- source_word: עַל חַטֹּאתֵיכֶם
  chosen: for your sins
  alternatives:
  - because of your sins
  - on account of your sins
  lexicon: HALOT
  rationale: עַל here gives the ground or basis for the discipline. 'For your sins'
    is natural English and preserves the causal sense without overexpansion.
