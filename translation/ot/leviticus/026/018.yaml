theological_decisions:
- issue: Nature of יָסַר in covenant-curse context
  chosen_reading: discipline
  alternative_readings:
  - punish
  - chastise
  rationale: The verse presents covenant sanctions that are punitive yet also corrective
    within the covenant relationship. Rendering יסר as 'discipline' preserves that
    tension rather than reducing it to mere retribution or softening it into non-punitive
    correction.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
