theological_decisions:
- issue: Whether to render the final clause as literal sensory language or as the
    interpretive sense of sacrificial rejection
  chosen_reading: Retain the anthropomorphic language 'I will not smell the pleasing
    aroma of your offerings'
  alternative_readings:
  - I will not accept your pleasing aromas
  - I will take no delight in your sacrifices
  rationale: The Hebrew explicitly uses the verb 'smell' and the stock sacrificial
    phrase 'pleasing aroma.' Preserving the image maintains the text's cultic and
    theological texture while still clarifying the referent with 'of your offerings.'
    This avoids importing a paraphrase beyond what the source text warrants.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
