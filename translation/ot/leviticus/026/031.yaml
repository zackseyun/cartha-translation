id: LEV.26.31
reference: Leviticus 26:31
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י אֶת עָֽרֵי/כֶם֙ חָרְבָּ֔ה וַ/הֲשִׁמּוֹתִ֖י אֶת מִקְדְּשֵׁי/כֶ֑ם
    וְ/לֹ֣א אָרִ֔יחַ בְּ/רֵ֖יחַ נִיחֹֽחֲ/כֶֽם־־׃
translation:
  text: And I will make your cities a ruin, and I will lay waste your sanctuaries,
    and I will not smell the pleasing aroma of your offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I will not smell your pleasing aroma.' The phrase is
      a standard sacrificial idiom referring to God’s acceptance of offerings; 'of
      your offerings' is supplied for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will make
  alternatives:
  - And I will give
  - And I will set
  lexicon: HALOT
  rationale: 'The verb נתן literally means ''give/put/set,'' but with the object ''your
    cities'' and predicate ''a ruin'' the idiomatic sense is causative: ''make ...
    a ruin.'' This is more natural English while preserving the Hebrew construction''s
    force.'
- source_word: עָרֵיכֶם
  chosen: your cities
  alternatives:
  - your towns
  lexicon: HALOT
  rationale: עיר commonly denotes a city or town. 'Cities' is the standard and sufficiently
    broad rendering here.
- source_word: חָרְבָּה
  chosen: a ruin
  alternatives:
  - ruin
  - desolation
  - waste
  lexicon: HALOT
  rationale: The noun denotes a devastated state. 'A ruin' fits the predicate use
    after נתן and gives clear modern English. 'Desolation' is possible but slightly
    more abstract.
- source_word: וַהֲשִׁמּוֹתִי
  chosen: and I will lay waste
  alternatives:
  - and I will devastate
  - and I will make desolate
  lexicon: HALOT
  rationale: The Hiphil of שמם is causative, expressing making something desolate.
    'Lay waste' is idiomatic, vivid, and close in force to the Hebrew.
- source_word: מִקְדְּשֵׁיכֶם
  chosen: your sanctuaries
  alternatives:
  - your holy places
  - your sacred places
  lexicon: HALOT
  rationale: The plural of מקדש refers to holy/sanctuary places. 'Sanctuaries' preserves
    the cultic sense better than the broader 'holy places.' The plural should be retained.
- source_word: וְלֹא אָרִיחַ
  chosen: and I will not smell
  alternatives:
  - and I will not accept
  - and I will take no delight in the smell of
  lexicon: HALOT
  rationale: ריח in the Hiphil here literally means 'smell.' Although the idiom implies
    non-acceptance of sacrifice, the Hebrew image should be preserved rather than
    replaced with an interpretive gloss like 'accept.'
- source_word: בְּרֵיחַ נִיחֹחֲכֶם
  chosen: the pleasing aroma of your offerings
  alternatives:
  - your pleasing aroma
  - the soothing aroma from you
  - the pleasing fragrance of your sacrifices
  lexicon: HALOT
  rationale: The phrase ריח ניחח is a standard sacrificial idiom often rendered 'pleasing
    aroma' or 'soothing aroma.' Because English 'your pleasing aroma' could sound
    as though the people themselves smell pleasant, 'of your offerings' is supplied
    to make explicit the cultic referent already inherent in the idiom and context.
    'Pleasing aroma' is more natural modern English than 'sweet savor.'
