id: LEV.26.41
reference: Leviticus 26:41
source:
  edition: WLC
  text: אַף אֲנִ֗י אֵלֵ֤ךְ עִמָּ/ם֙ בְּ/קֶ֔רִי וְ/הֵבֵאתִ֣י אֹתָ֔/ם בְּ/אֶ֖רֶץ אֹיְבֵי/הֶ֑ם
    אוֹ אָ֣ז יִכָּנַ֗ע לְבָבָ/ם֙ הֶֽ/עָרֵ֔ל וְ/אָ֖ז יִרְצ֥וּ אֶת עֲוֺנָֽ/ם־־־׃
translation:
  text: I too will walk contrary to them and bring them into the land of their enemies;
    or then their uncircumcised heart will be humbled, and then they will accept the
    punishment for their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even I.' The Hebrew adds emphasis to God's reciprocal action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'walk with them in hostility' or 'walk contrary to them'; this repeats
      the covenant-curse language of this chapter.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'or then'; the phrase is difficult and may introduce the point at
      which their heart is humbled.
    reason: alternative_reading
  - marker: d
    text: Literally 'their uncircumcised heart,' a covenantal metaphor for inner stubbornness
      and uncleanness.
    reason: cultural_note
  - marker: e
    text: Or 'they will make amends for their iniquity' / 'their iniquity will be
      paid for.' The Hebrew idiom refers to accepting or bearing the due consequence
      of guilt.
    reason: alternative_reading
lexical_decisions:
- source_word: אַף אֲנִי
  chosen: I too
  alternatives:
  - I also
  - even I
  lexicon: HALOT
  rationale: 'אַף with the independent pronoun adds emphasis and correspondence: as
    they acted, so God also will act. ''I too'' preserves the emphatic reciprocity
    succinctly.'
- source_word: אֵלֵךְ עִמָּם בְּקֶרִי
  chosen: will walk contrary to them
  alternatives:
  - will walk in hostility toward them
  - will walk against them
  lexicon: HALOT
  rationale: הלך עם + בקרי echoes the repeated covenant-curse formula in this chapter.
    קֶרִי here conveys opposition/hostility rather than mere chance; 'walk contrary
    to' preserves the idiomatic and thematic wording used in Leviticus 26.
- source_word: וְהֵבֵאתִי אֹתָם בְּאֶרֶץ אֹיְבֵיהֶם
  chosen: and bring them into the land of their enemies
  alternatives:
  - and bring them into their enemies' land
  lexicon: HALOT
  rationale: The Hiphil of בוא means 'bring.' 'Into the land of their enemies' is
    the most natural English rendering and preserves the exile setting.
- source_word: אוֹ אָז
  chosen: or then
  alternatives:
  - or perhaps then
  - or else then
  lexicon: HALOT
  rationale: 'The phrase is syntactically difficult and commonly taken as introducing
    the next possible development: ''or then/if then.'' I preserve the Hebrew''s disjunctive
    force with ''or then'' rather than smoothing it away entirely.'
- source_word: יִכָּנַע
  chosen: will be humbled
  alternatives:
  - will be subdued
  - will humble itself
  lexicon: HALOT
  rationale: The Niphal of כנע commonly means 'be humbled' or 'be subdued.' With 'heart'
    as subject, 'be humbled' best conveys inward contrition rather than external defeat.
- source_word: לְבָבָם הֶעָרֵל
  chosen: their uncircumcised heart
  alternatives:
  - their stubborn heart
  lexicon: HALOT
  rationale: The Hebrew is literally 'their uncircumcised heart.' This covenantal
    metaphor should be retained rather than paraphrased, since it carries theological
    weight in Torah and later Scripture.
- source_word: וְאָז יִרְצוּ אֶת עֲוֺנָם
  chosen: and then they will accept the punishment for their iniquity
  alternatives:
  - and then they will make amends for their iniquity
  - and then they will accept their guilt
  lexicon: HALOT
  rationale: רצה with עון in this context means to accept or pay off the consequences
    of guilt, as in satisfying the penalty due. 'Accept the punishment for their iniquity'
    makes the idiom intelligible in modern English while preserving the judicial sense.
