theological_decisions:
- issue: Metaphorical expression הֶעָרֵל applied to the heart
  chosen_reading: Retain the covenantal metaphor as 'uncircumcised heart'
  alternative_readings:
  - stubborn heart
  - unrepentant heart
  rationale: The text uses a loaded covenant metaphor, not merely a generic description
    of stubbornness. Preserving it maintains intertextual links with Deuteronomy and
    prophetic usage and avoids interpretive flattening.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Meaning of יִרְצוּ אֶת עֲוֺנָם
  chosen_reading: They accept the punishment/consequences of their iniquity
  alternative_readings:
  - they make amends for their iniquity
  - their iniquity is paid off
  rationale: The phrase concerns acknowledgment and bearing of covenant penalty, not
    meritorious self-atonement. The chosen rendering preserves the judicial sense
    without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3
