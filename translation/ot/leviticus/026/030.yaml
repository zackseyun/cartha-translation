theological_decisions:
- issue: Anthropopathic expression for divine revulsion
  chosen_reading: my soul will abhor you
  alternative_readings:
  - I will abhor you
  - I will reject you
  rationale: The verse uses נַפְשִׁי ('my soul') with געלה to express intense divine
    rejection. Preserving the anthropopathic wording maintains the text's theological
    tension and rhetorical force rather than smoothing it into a less vivid abstraction.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
