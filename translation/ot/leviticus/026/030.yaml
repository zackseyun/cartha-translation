id: LEV.26.30
reference: Leviticus 26:30
source:
  edition: WLC
  text: וְ/הִשְׁמַדְתִּ֞י אֶת בָּמֹֽתֵי/כֶ֗ם וְ/הִכְרַתִּי֙ אֶת חַמָּ֣נֵי/כֶ֔ם וְ/נָֽתַתִּי֙
    אֶת פִּגְרֵי/כֶ֔ם עַל פִּגְרֵ֖י גִּלּוּלֵי/כֶ֑ם וְ/גָעֲלָ֥ה נַפְשִׁ֖/י אֶתְ/כֶֽם־־־־׃
translation:
  text: And I will destroy your high places, and cut down your incense altars, and
    place your corpses on the corpses of your idols, and my soul will abhor you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sun pillars.' The Hebrew term refers to cultic objects associated
      with illicit worship; the exact form is debated.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew repeats 'corpses' for both the people and their idols, emphasizing
      the lifelessness and disgrace of the idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁמַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will annihilate
  - I will wipe out
  lexicon: HALOT
  rationale: Hiphil of שׁמד conveys causing destruction or extermination. 'Destroy'
    is strong and idiomatic in English without overstating beyond the immediate objects
    named.
- source_word: בָּמֹתֵיכֶם
  chosen: your high places
  alternatives:
  - your cultic heights
  - your shrines on the heights
  lexicon: HALOT
  rationale: בָּמוֹת commonly refers to elevated cult sites. 'High places' is the
    standard and sufficiently transparent rendering in this context.
- source_word: הִכְרַתִּי
  chosen: cut down
  alternatives:
  - cut off
  - destroy
  lexicon: HALOT
  rationale: כרת literally means 'cut off/down.' With cultic objects as the direct
    object, 'cut down' fits the likely physical action and preserves the concrete
    imagery better than the more abstract 'destroy'.
- source_word: חַמָּנֵיכֶם
  chosen: your incense altars
  alternatives:
  - your sun pillars
  - your incense stands
  lexicon: HALOT
  rationale: חַמָּנִים denotes cultic objects often associated with sun worship or
    incense-burning installations. Because the exact referent is debated, 'incense
    altars' gives a readable functional rendering in the main text while preserving
    a more specific alternative in a footnote.
- source_word: נָתַתִּי
  chosen: place
  alternatives:
  - put
  - lay
  lexicon: HALOT
  rationale: נתן is broad ('give/put/place'). 'Place' is natural in English with the
    following preposition 'on/upon' and the grim judicial image.
- source_word: פִּגְרֵיכֶם
  chosen: your corpses
  alternatives:
  - your dead bodies
  - your carcasses
  lexicon: HALOT
  rationale: פגר refers to a corpse/carcass. 'Corpses' is direct, human-appropriate,
    and preserves the severity of the judgment.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition marks physical placement. 'On' is the most natural modern
    English equivalent.
- source_word: פִּגְרֵי גִּלּוּלֵיכֶם
  chosen: the corpses of your idols
  alternatives:
  - the carcasses of your idols
  - your idol-images
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols, often carrying a
    sense of something detestable. Rendering with 'idols' keeps the meaning clear;
    repeating 'corpses' reflects the Hebrew wordplay and depicts the idols as lifeless
    objects.
- source_word: גִּלּוּלֵיכֶם
  chosen: your idols
  alternatives:
  - your dung-idols
  - your detestable idols
  lexicon: HALOT
  rationale: Though the term is contemptuous, 'idols' is the clearest base rendering
    in English. The pejorative force is partly conveyed by the surrounding judgment
    context; more interpretive expansions are better reserved for notes.
- source_word: גָעֲלָה נַפְשִׁי אֶתְכֶם
  chosen: my soul will abhor you
  alternatives:
  - I will abhor you
  - my being will loathe you
  lexicon: HALOT
  rationale: The Hebrew literally says 'my soul will abhor you.' Retaining 'my soul'
    preserves the anthropopathic force and covenantal revulsion expressed in the source,
    rather than flattening it to simply 'I will abhor you.'
