id: LEV.26.39
reference: Leviticus 26:39
source:
  edition: WLC
  text: וְ/הַ/נִּשְׁאָרִ֣ים בָּ/כֶ֗ם יִמַּ֨קּוּ֙ בַּֽ/עֲוֺנָ֔/ם בְּ/אַרְצֹ֖ת אֹיְבֵי/כֶ֑ם
    וְ/אַ֛ף בַּ/עֲוֺנֹ֥ת אֲבֹתָ֖/ם אִתָּ֥/ם יִמָּֽקּוּ׃
translation:
  text: And those of you who remain will waste away in the lands of your enemies because
    of their iniquity; and also because of the iniquities of their fathers with them
    they will waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will rot away' or 'will pine away'; the Hebrew verb conveys wasting
      or decaying under judgment.
    reason: lexical_alternative
  - marker: b
    text: '''With them'' may mean that the iniquities of their fathers remain with
      them, or that they waste away along with those ancestral iniquities still affecting
      them.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַנִּשְׁאָרִים
  chosen: those of you who remain
  alternatives:
  - the survivors among you
  - those left among you
  lexicon: HALOT
  rationale: The participle from שׁאר denotes those left over or remaining after judgment.
    'Those of you who remain' is natural English and preserves the direct address
    implied by בכם.
- source_word: בָּכֶם
  chosen: of you
  alternatives:
  - among you
  - from among you
  lexicon: HALOT
  rationale: Attached to the participle, this specifies the remnant as drawn from
    the addressed people. In English, 'those of you who remain' expresses the sense
    smoothly.
- source_word: יִמַּקּוּ
  chosen: will waste away
  alternatives:
  - will rot away
  - will pine away
  - will melt away
  lexicon: HALOT
  rationale: The Niphal of מקק in covenant-curse contexts conveys wasting away or
    decaying under judgment. 'Waste away' is idiomatic, serious, and fits both occurrences
    in the verse.
- source_word: בַּעֲוֺנָם
  chosen: because of their iniquity
  alternatives:
  - in their iniquity
  - for their guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity/guilt and sometimes its consequence. Here the
    beth is best taken causally or in relation to the sphere of guilt. 'Because of
    their iniquity' communicates the judicial cause clearly in English.
- source_word: בְּאַרְצֹת אֹיְבֵיכֶם
  chosen: in the lands of your enemies
  alternatives:
  - in your enemies' lands
  - in the countries of your enemies
  lexicon: HALOT
  rationale: The plural 'lands' reflects the Hebrew plural construct and suits the
    exile setting among foreign territories.
- source_word: וְאַף
  chosen: and also
  alternatives:
  - and even
  - moreover
  lexicon: HALOT
  rationale: This adds an intensifying continuation. 'And also' preserves the additive
    force without sounding overly formal.
- source_word: בַּעֲוֺנֹת אֲבֹתָם
  chosen: because of the iniquities of their fathers
  alternatives:
  - for the iniquities of their fathers
  - in the iniquities of their fathers
  lexicon: HALOT
  rationale: The plural 'iniquities' should be retained. 'Fathers' is the natural
    rendering of אבותם and should not be flattened to 'ancestors' without necessity.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - along with them
  lexicon: HALOT
  rationale: The phrase is terse and somewhat ambiguous, but most naturally indicates
    that the fathers' iniquities are 'with them,' i.e., accompanying or continuing
    upon them. The literal rendering preserves the Hebrew's compactness and interpretive
    openness.
