theological_decisions:
- issue: Intergenerational guilt/judgment language
  chosen_reading: Retain the text's statement that the remnant wastes away because
    of their own iniquity and also because of the iniquities of their fathers, without
    softening or resolving how inherited consequences relate to personal culpability.
  alternative_readings:
  - Interpret as only the consequences of ancestral sin
  - Interpret as participation in the same sins as their fathers
  rationale: The verse explicitly mentions both 'their iniquity' and 'the iniquities
    of their fathers.' The translation should preserve this tension rather than harmonize
    it by paraphrase. Rendering אִתָּם as 'with them' keeps the ambiguity present
    in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
