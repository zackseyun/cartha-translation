theological_decisions:
- issue: Referent of 'the covenant with the first/former ones'
  chosen_reading: The phrase refers to the covenant made with Israel's forefathers/ancestors, specifically the exodus generation or ancestral covenant line remembered on behalf of the present people.
  alternative_readings:
  - the first covenant as an abstract covenantal arrangement
  - the covenant of the former generations without specifying forefathers
  rationale: The Hebrew construction is somewhat compressed, but the following relative clause 'whom I brought out from the land of Egypt' points to people rather than to an abstract covenant. Rendering 'with their forefathers' makes the syntax intelligible in English while preserving the covenantal-historical reference.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence with documented rationale.
- issue: Gender rendering of רִאשֹׁנִים
  chosen_reading: forefathers
  alternative_readings:
  - ancestors
  rationale: The source is grammatically masculine plural. Per the doctrine's gender-accurate principle, a masculine rendering is acceptable where it matches the source's intent. 'Forefathers' also fits the covenantal lineage context, though 'ancestors' remains a viable lexical alternative.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate over gender-neutral).
