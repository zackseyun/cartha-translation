id: LEV.26.4
reference: Leviticus 26:4
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י גִשְׁמֵי/כֶ֖ם בְּ/עִתָּ֑/ם וְ/נָתְנָ֤ה הָ/אָ֨רֶץ֙ יְבוּלָ֔/הּ
    וְ/עֵ֥ץ הַ/שָּׂדֶ֖ה יִתֵּ֥ן פִּרְיֽ/וֹ׃
translation:
  text: then I will give you your rains in their season, and the land will yield its
    produce, and the tree of the field will give its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at their proper time' or 'in due season.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the tree of the field' uses a singular form with collective force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will give
  alternatives:
  - I will grant
  - I will provide
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' 'I will give' is the most direct and natural
    rendering, preserving the covenantal promise without adding interpretive nuance.
- source_word: גִשְׁמֵיכֶם
  chosen: your rains
  alternatives:
  - your rain
  - the rain for you
  lexicon: HALOT
  rationale: The plural form is best preserved as 'rains,' a common Hebrew idiom for
    seasonal rainfall. The 2mp suffix is retained with 'your,' indicating rain granted
    for Israel's benefit.
- source_word: בְּעִתָּם
  chosen: in their season
  alternatives:
  - at their proper time
  - in due season
  lexicon: HALOT
  rationale: The phrase denotes appropriate timing. 'In their season' is idiomatic
    English and preserves the plural agreement with 'rains' while reflecting the agricultural
    context.
- source_word: וְנָתְנָה הָאָרֶץ
  chosen: and the land will yield
  alternatives:
  - and the land will give
  - and the earth will yield
  lexicon: HALOT
  rationale: Although literally 'and the land will give,' English idiom prefers 'yield'
    for land producing crops. 'Land' fits the covenant-agricultural setting better
    than 'earth.'
- source_word: יְבוּלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its crops
  lexicon: HALOT
  rationale: יבול refers to produce/yield of the land. 'Produce' is clear modern English
    and broad enough to cover agricultural output without over-specifying.
- source_word: וְעֵץ הַשָּׂדֶה
  chosen: and the tree of the field
  alternatives:
  - and the trees of the field
  - and the field tree
  lexicon: HALOT
  rationale: The Hebrew is singular collective. 'The tree of the field' preserves
    the singular form while functioning generically in English for orchard/field trees.
- source_word: יִתֵּן פִּרְיוֹ
  chosen: will give its fruit
  alternatives:
  - will bear its fruit
  - will produce its fruit
  lexicon: HALOT
  rationale: The Hebrew again uses נתן, 'give.' Retaining 'give its fruit' preserves
    the verbal repetition in the verse, even though 'bear fruit' would be smoother
    English.
