theological_decisions:
- issue: Covenant-formula rendering
  chosen_reading: Render the reciprocal covenant relationship as 'I will be your God,
    and you will be my people.'
  alternative_readings:
  - I will be God to you, and you will be a people to me
  rationale: The Hebrew uses established covenant language. The chosen rendering preserves
    the theological reciprocity and relational force without importing additional
    doctrinal content. It also reflects readable modern English while staying close
    to the source.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Preserve theological
    tension rather than resolve it.'
