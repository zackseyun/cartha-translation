id: LEV.26.12
reference: Leviticus 26:12
source:
  edition: WLC
  text: וְ/הִתְהַלַּכְתִּי֙ בְּ/ת֣וֹכְ/כֶ֔ם וְ/הָיִ֥יתִי לָ/כֶ֖ם לֵֽ/אלֹהִ֑ים וְ/אַתֶּ֖ם
    תִּהְיוּ לִ֥/י לְ/עָֽם־׃
translation:
  text: I will walk among you and will be your God, and you will be my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I will walk in your midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְהַלַּכְתִּי
  chosen: I will walk
  alternatives:
  - I will move about
  - I will walk about
  - I will dwell
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys movement/presence in the midst of the
    people. 'Walk' preserves the concrete covenantal imagery and echoes similar divine-presence
    language elsewhere, while 'dwell' would over-interpret beyond the verb's plain
    sense.
- source_word: בְּתוֹכְכֶם
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: The phrase means 'in the midst of you.' 'Among you' is natural modern
    English and accurately conveys communal presence. 'Within you' would suggest interior
    indwelling, which is not the plain sense in this context.
- source_word: וְהָיִיתִי לָכֶם לֵאלֹהִים
  chosen: and will be your God
  alternatives:
  - and I will be God to you
  lexicon: HALOT
  rationale: This is a standard covenant formula. 'Will be your God' is idiomatic
    English and preserves the relational force of היה + ל plus אֱלֹהִים without awkwardness.
- source_word: לֵאלֹהִים
  chosen: God
  alternatives:
  - a god
  lexicon: HALOT
  rationale: In Israel's covenant context, אֱלֹהִים here clearly refers to the one
    true God in covenant relation, not an indefinite 'a god.' English convention appropriately
    capitalizes 'God' for this referent.
- source_word: וְאַתֶּם תִּהְיוּ לִי לְעָם
  chosen: and you will be my people
  alternatives:
  - and you will be a people to me
  lexicon: HALOT
  rationale: Another standard covenant formula. 'My people' is the natural and faithful
    English rendering of the relational construction, whereas 'a people to me' is
    more wooden and less idiomatic.
