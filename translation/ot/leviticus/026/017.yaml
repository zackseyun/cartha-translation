theological_decisions:
- issue: Anthropomorphic divine language in judgment
  chosen_reading: Retain the idiom 'I will set my face against you'
  alternative_readings:
  - I will oppose you
  rationale: The Hebrew uses anthropomorphic language for God's covenantal stance
    toward Israel. Preserving the idiom maintains the theological and literary force
    of divine personal opposition rather than reducing it to an abstract statement.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nature of enemy control in the curse
  chosen_reading: Render רדה as 'rule over' rather than a stronger interpretive gloss
  alternative_readings:
  - dominate
  - tyrannize
  rationale: The text states subjugation by those who hate Israel, but does not explicitly
    specify the full degree of cruelty in this clause. 'Rule over' preserves the judgment
    without importing more than the Hebrew warrants.
  doctrine_reference: Translation philosophy §1, §3
