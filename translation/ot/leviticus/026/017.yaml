id: LEV.26.17
reference: Leviticus 26:17
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י פָנַ/י֙ בָּ/כֶ֔ם וְ/נִגַּפְתֶּ֖ם לִ/פְנֵ֣י אֹיְבֵי/כֶ֑ם וְ/רָד֤וּ
    בָ/כֶם֙ שֹֽׂנְאֵי/כֶ֔ם וְ/נַסְתֶּ֖ם וְ/אֵין רֹדֵ֥ף אֶתְ/כֶֽם־׃ס
translation:
  text: And I will set my face against you, and you will be struck down before your
    enemies; those who hate you will rule over you, and you will flee when no one
    is pursuing you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be defeated' for 'you will be struck down.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'set my face against you,' an idiom expressing determined opposition
      in judgment.
    reason: cultural_note
  - marker: c
    text: Or 'though no one is pursuing you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי פָנַי בָכֶם
  chosen: I will set my face against you
  alternatives:
  - I will turn my face against you
  - I will direct my face against you
  lexicon: HALOT
  rationale: The idiom 'set my face against' is a well-established Hebrew expression
    of determined opposition or judgment. Retaining 'face' preserves the covenantal
    and relational force of the Hebrew rather than flattening it to a mere statement
    of hostility.
- source_word: וְנִגַּפְתֶּם
  chosen: you will be struck down
  alternatives:
  - you will be defeated
  - you will be smitten
  lexicon: HALOT
  rationale: The Niphal of נגב/נגף here conveys being beaten down or defeated in battle.
    'Struck down' preserves the vividness of the judgment context while remaining
    natural English. 'Defeated' is possible but slightly less forceful.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  chosen: before your enemies
  alternatives:
  - in the presence of your enemies
  lexicon: HALOT
  rationale: 'A straightforward spatial and military expression: they will fall or
    be defeated in front of their enemies. ''Before your enemies'' is idiomatic and
    sufficiently precise.'
- source_word: וְרָדוּ בָכֶם
  chosen: will rule over you
  alternatives:
  - will dominate you
  - will have dominion over you
  lexicon: HALOT
  rationale: רדה commonly denotes ruling or exercising dominion. In this curse context
    it implies oppressive mastery, but 'rule over you' is the most direct and broadly
    accurate rendering without over-interpreting the degree of harshness.
- source_word: שֹׂנְאֵיכֶם
  chosen: those who hate you
  alternatives:
  - your haters
  - your enemies
  lexicon: HALOT
  rationale: The participial form specifically denotes those hating them, not merely
    enemies in a general sense. Rendering it explicitly preserves the lexical distinction
    from the earlier אֹיְבֵיכֶם ('your enemies').
- source_word: וְנַסְתֶּם
  chosen: you will flee
  alternatives:
  - you will run away
  lexicon: HALOT
  rationale: נוס is the standard verb for fleeing. 'Flee' is concise, idiomatic, and
    fits the military-terror context.
- source_word: וְאֵין רֹדֵף אֶתְכֶם
  chosen: when no one is pursuing you
  alternatives:
  - though no one pursues you
  - with no one chasing you
  lexicon: HALOT
  rationale: The clause expresses panic so severe that Israel flees absent any actual
    pursuer. 'When no one is pursuing you' reads naturally in English and preserves
    the sense. 'Though no one pursues you' is also possible, but 'when' better matches
    the Hebrew verbless construction in context.
