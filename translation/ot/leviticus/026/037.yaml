id: LEV.26.37
reference: Leviticus 26:37
source:
  edition: WLC
  text: וְ/כָשְׁל֧וּ אִישׁ בְּ/אָחִ֛י/ו כְּ/מִ/פְּנֵי חֶ֖רֶב וְ/רֹדֵ֣ף אָ֑יִן וְ/לֹא
    תִֽהְיֶ֤ה לָ/כֶם֙ תְּקוּמָ֔ה לִ/פְנֵ֖י אֹֽיְבֵי/כֶֽם־־־׃
translation:
  text: They will stumble over one another as if fleeing before a sword, though no
    one is pursuing; and you will have no power to stand before your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a man in/against his brother,' an idiom here meaning they will
      collide with one another in panic.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will have no standing before your enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָשְׁלוּ
  chosen: they will stumble
  alternatives:
  - they will fall
  - they will stagger
  lexicon: HALOT
  rationale: The verb כשל commonly denotes stumbling or tottering. 'Stumble' preserves
    the concrete image while fitting the context of panic and collapse.
- source_word: אִישׁ בְּאָחִיו
  chosen: over one another
  alternatives:
  - a man over his brother
  - each over his brother
  lexicon: HALOT
  rationale: Literally 'a man in/against his brother.' In idiomatic English here,
    the sense is mutual collision in panic. 'Over one another' communicates the reciprocal
    action naturally, while the masculine singular distributive force is represented
    collectively.
- source_word: כְּמִפְּנֵי חֶרֶב
  chosen: as if fleeing before a sword
  alternatives:
  - as before a sword
  - as from before a sword
  lexicon: HALOT
  rationale: The comparative כ plus מפני gives the sense 'as from before' or 'as if
    before.' In context of panic, English needs the implied motion of fleeing to make
    the image clear; this is contextually warranted rather than paraphrastic.
- source_word: וְרֹדֵף אָיִן
  chosen: though no one is pursuing
  alternatives:
  - and there is no pursuer
  - when no one pursues
  lexicon: HALOT
  rationale: 'The clause states that no pursuer exists. ''Though no one is pursuing''
    captures the concessive force in context: they act as if chased despite there
    being no pursuer.'
- source_word: וְלֹא תִהְיֶה לָכֶם תְּקוּמָה
  chosen: you will have no power to stand
  alternatives:
  - you will have no standing
  - there will be no rising for you
  - you will not be able to stand up
  lexicon: HALOT
  rationale: תְּקוּמָה is 'rising, standing, ability to stand/withstand.' In this
    military context it refers not merely to physical standing up but to capacity
    to hold one's ground. 'No power to stand' conveys inability to resist before enemies.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  chosen: before your enemies
  alternatives:
  - in the presence of your enemies
  lexicon: HALOT
  rationale: Standard rendering of לפני in hostile context; 'before your enemies'
    idiomatically expresses confrontation.
