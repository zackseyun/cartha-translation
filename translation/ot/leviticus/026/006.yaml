theological_decisions:
- issue: Scope of promised peace
  chosen_reading: The verse promises covenantal security in Israel's land, including
    freedom from fear, dangerous animals, and military invasion.
  alternative_readings:
  - A purely inward or spiritual peace
  - An exclusively political peace
  rationale: The concrete references to lying down safely, harmful beasts, and the
    sword indicate a holistic but materially grounded covenant blessing. The translation
    avoids narrowing the promise to either merely internal tranquility or merely political
    stability.
  doctrine_reference: Translation philosophy §3
