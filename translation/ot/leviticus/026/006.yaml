id: LEV.26.6
reference: Leviticus 26:6
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י שָׁלוֹם֙ בָּ/אָ֔רֶץ וּ/שְׁכַבְתֶּ֖ם וְ/אֵ֣ין מַחֲרִ֑יד וְ/הִשְׁבַּתִּ֞י
    חַיָּ֤ה רָעָה֙ מִן הָ/אָ֔רֶץ וְ/חֶ֖רֶב לֹא תַעֲבֹ֥ר בְּ/אַרְצְ/כֶֽם־־׃
translation:
  text: And I will give peace in the land, and you will lie down with no one to make
    you afraid. And I will remove harmful beasts from the land, and the sword will
    not pass through your land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild beasts.' The Hebrew phrase refers to dangerous animals in the land;
      'harmful beasts' makes explicit the threatening sense of the adjective.
    reason: lexical_alternative
  - marker: b
    text: '''The sword'' is a Hebrew figure for war or armed invasion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I will grant
  - And I will place
  lexicon: HALOT
  rationale: נתן commonly means 'give.' 'Give' is the most direct and natural rendering
    here for Yahweh's bestowal of covenant blessing.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם can denote peace, welfare, or wholeness. In this covenant-blessing
    context, 'peace' best captures social and national security while still allowing
    broader well-being by implication.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the covenant land. 'In the land' preserves the concrete
    territorial sense better than the more generic 'country.'
- source_word: וּשְׁכַבְתֶּם
  chosen: and you will lie down
  alternatives:
  - and you will sleep
  - and you will lie down to rest
  lexicon: HALOT
  rationale: The verb שׁכב literally means 'lie down.' This preserves the imagery
    of secure rest without over-interpreting it as merely sleep.
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to make you afraid
  alternatives:
  - and none will make you tremble
  - and there will be nothing to terrify you
  lexicon: HALOT
  rationale: The participle מַחֲרִיד denotes one causing fear or terror. 'With no
    one to make you afraid' is idiomatic English that preserves the causative force
    and fits the context of secure rest.
- source_word: וְהִשְׁבַּתִּי
  chosen: And I will remove
  alternatives:
  - And I will cause to cease
  - And I will put an end to
  lexicon: HALOT
  rationale: 'The Hiphil of שׁבת means to cause to cease. In English, ''remove'' communicates
    the result clearly in context: dangerous animals will no longer be present in
    the land.'
- source_word: חַיָּה רָעָה
  chosen: harmful beasts
  alternatives:
  - wild beasts
  - evil beasts
  - dangerous animals
  lexicon: HALOT
  rationale: חַיָּה refers to animals/beasts, and רָעָה here describes them as harmful
    or dangerous, not morally evil. 'Harmful beasts' preserves the threat without
    implying moral agency.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - out of the land
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase, matching the
    territorial focus of the verse.
- source_word: וְחֶרֶב
  chosen: and the sword
  alternatives:
  - and warfare
  - and a sword
  lexicon: HALOT
  rationale: חֶרֶב literally means 'sword' and often metonymically refers to war or
    violent invasion. Retaining 'the sword' preserves the Hebrew imagery while allowing
    the metonymic sense to be understood.
- source_word: לֹא תַעֲבֹר
  chosen: will not pass through
  alternatives:
  - will not go through
  - will not sweep through
  lexicon: HALOT
  rationale: עבר means 'pass through.' This is the most direct rendering and suits
    the image of hostile incursion not entering the land.
- source_word: בְּאַרְצְכֶם
  chosen: your land
  alternatives:
  - your country
  lexicon: HALOT
  rationale: The suffix marks possession by Israel; 'your land' keeps the covenant-land
    emphasis and reads naturally in English.
