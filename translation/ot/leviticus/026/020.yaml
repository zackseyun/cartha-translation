id: LEV.26.20
reference: Leviticus 26:20
source:
  edition: WLC
  text: וְ/תַ֥ם לָ/רִ֖יק כֹּחֲ/כֶ֑ם וְ/לֹֽא תִתֵּ֤ן אַרְצְ/כֶם֙ אֶת יְבוּלָ֔/הּ וְ/עֵ֣ץ
    הָ/אָ֔רֶץ לֹ֥א יִתֵּ֖ן פִּרְיֽ/וֹ־־׃
translation:
  text: Your strength will be spent in vain, and your land will not yield its produce,
    and the trees of the land will not yield their fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'your strength will be exhausted for emptiness' and 'the
      tree of the land will not give its fruit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַם
  chosen: will be spent
  alternatives:
  - will be exhausted
  - will be consumed
  - will come to an end
  lexicon: HALOT
  rationale: The verb תמם here describes strength being used up or exhausted. 'Will
    be spent' is natural English and preserves the image of strength being consumed.
- source_word: לָרִיק
  chosen: in vain
  alternatives:
  - for emptiness
  - to no purpose
  lexicon: HALOT
  rationale: The phrase indicates futility or uselessness. 'In vain' is the standard
    idiomatic English equivalent and fits the covenant-curse context.
- source_word: כֹּחֲכֶם
  chosen: your strength
  alternatives:
  - your power
  - your vigor
  lexicon: HALOT
  rationale: 'כח commonly denotes strength or power. ''Your strength'' best fits the
    agricultural-labor context: their effort will be exhausted without result.'
- source_word: תִתֵּן
  chosen: will yield
  alternatives:
  - will give
  - will produce
  lexicon: HALOT
  rationale: Although the verb is literally 'give,' English idiom for land and trees
    is 'yield.' This is an optimal-equivalence rendering that preserves the agricultural
    sense.
- source_word: אַרְצְכֶם
  chosen: your land
  alternatives:
  - your earth
  - your country
  lexicon: HALOT
  rationale: In this context ארץ refers to the Israelites' land as cultivated territory.
    'Your land' is the most natural and contextually precise rendering.
- source_word: יְבוּלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its crops
  lexicon: HALOT
  rationale: יבול denotes produce or yield of the land. 'Its produce' is clear, natural,
    and broad enough to cover agricultural output generally.
- source_word: וְעֵץ הָאָרֶץ
  chosen: the trees of the land
  alternatives:
  - the tree of the land
  - the trees of the earth
  lexicon: HALOT
  rationale: Though עץ is singular in form, it functions collectively here. English
    naturally expresses this as 'the trees of the land.'
- source_word: פִּרְיוֹ
  chosen: their fruit
  alternatives:
  - its fruit
  lexicon: HALOT
  rationale: The Hebrew suffix is singular ('its fruit') agreeing with the collective
    singular עץ, but because English renders the collective as plural ('trees'), the
    pronoun is adjusted to 'their' for grammatical naturalness while preserving the
    sense.
