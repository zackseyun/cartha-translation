theological_decisions:
- issue: Rendering of Israel's status in Egypt
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: The verse emphasizes liberation from oppressive bondage in Egypt. In
    keeping with the translation philosophy, bonded-status language should be explicit
    where salient rather than softened.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy of bonded-status rendering
- issue: Rendering of the final liberation image
  chosen_reading: made you walk upright
  alternative_readings:
  - led you upright
  - made you walk with heads held high
  rationale: The Hebrew combines causative movement with an adverbial noun describing
    erect posture. The chosen rendering preserves the concrete image of restored dignity
    without over-paraphrasing into an interpretive idiom.
  doctrine_reference: Translation philosophy §1 and §6
