id: LEV.26.13
reference: Leviticus 26:13
source:
  edition: WLC
  text: אֲנִ֞י יְהוָ֣ה אֱלֹֽהֵי/כֶ֗ם אֲשֶׁ֨ר הוֹצֵ֤אתִי אֶתְ/כֶם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם
    מִֽ/הְיֹ֥ת לָ/הֶ֖ם עֲבָדִ֑ים וָ/אֶשְׁבֹּר֙ מֹטֹ֣ת עֻלְּ/כֶ֔ם וָ/אוֹלֵ֥ךְ אֶתְ/כֶ֖ם
    קֽוֹמְמִיּֽוּת׃פ
translation:
  text: I am the LORD your God, who brought you out of the land of Egypt, from being
    their slaves; I broke the bars of your yoke and made you walk upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from being slaves to them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the poles of your yoke.'
    reason: lexical_alternative
  - marker: c
    text: Or 'made you walk with heads held high.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: In covenant formula context with singular reference to YHWH, the plural
    form functions as the singular 'God.'
- source_word: הוֹצֵאתִי
  chosen: brought ... out
  alternatives:
  - led ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא commonly means 'bring out' or 'cause to go out.' 'Brought
    out' is idiomatic and preserves the exodus motif.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  lexicon: HALOT
  rationale: '''Land of Egypt'' is the standard geographic-covenantal expression;
    ''out of'' fits the exodus movement already implied by the verb.'
- source_word: מִהְיוֹת לָהֶם עֲבָדִים
  chosen: from being their slaves
  alternatives:
  - so that you would no longer be their slaves
  - from being slaves to them
  - from being their servants
  lexicon: HALOT
  rationale: The infinitive construction expresses deliverance from the condition
    of slavery. 'Slaves' is preferred over 'servants' because עֲבָדִים here denotes
    bonded status under Egyptian oppression, matching the translation philosophy's
    preference to preserve the bonded nature where salient.
- source_word: וָאֶשְׁבֹּר
  chosen: I broke
  alternatives:
  - I shattered
  lexicon: HALOT
  rationale: A straightforward rendering of שבר that preserves the first-person divine
    action.
- source_word: מֹטֹת עֻלְּכֶם
  chosen: the bars of your yoke
  alternatives:
  - the poles of your yoke
  - the bands of your yoke
  - the yoke-bars on you
  lexicon: HALOT
  rationale: מוֹטוֹת refers to bars/poles of a yoke. 'Bars of your yoke' is natural
    English and preserves the concrete image of bondage being broken.
- source_word: וָאוֹלֵךְ אֶתְכֶם
  chosen: and made you walk
  alternatives:
  - and led you
  - and caused you to go
  lexicon: HALOT
  rationale: The Hiphil of הלך here is causative. 'Made you walk' preserves the causative
    nuance better than the flatter 'led you,' especially with the following adverbial
    term.
- source_word: קוֹמְמִיּוּת
  chosen: upright
  alternatives:
  - erect
  - with heads held high
  - in uprightness
  lexicon: HALOT
  rationale: The term denotes an upright, erect posture, metaphorically the opposite
    of subjugation. 'Upright' is concise, natural, and preserves both the physical
    and dignity-restoring sense.
