- issue: Covenant-blessing military hyperbole or literal promise
  chosen_reading: Retain the direct military promise without softening or paraphrasing.
  alternative_readings:
  - Interpret as generalized encouragement rather than specific covenant blessing
  rationale: The verse is part of Leviticus 26's covenant blessings and curses. The
    translation should preserve the concrete promise of disproportionate victory rather
    than dilute it into abstraction.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
