id: LEV.26.8
reference: Leviticus 26:8
source:
  edition: WLC
  text: וְ/רָדְפ֨וּ מִ/כֶּ֤ם חֲמִשָּׁה֙ מֵאָ֔ה וּ/מֵאָ֥ה מִ/כֶּ֖ם רְבָבָ֣ה יִרְדֹּ֑פוּ
    וְ/נָפְל֧וּ אֹיְבֵי/כֶ֛ם לִ/פְנֵי/כֶ֖ם לֶ/חָֽרֶב׃
translation:
  text: Five of you will chase a hundred, and a hundred of you will chase ten thousand,
    and your enemies will fall before you by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pursue' for 'chase' in both clauses.
    reason: lexical_alternative
  - marker: b
    text: Hebrew רְבָבָה can mean 'ten thousand' or 'a myriad'; here 'ten thousand'
      fits the numerical parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָדְפוּ
  chosen: will chase
  alternatives:
  - will pursue
  lexicon: HALOT
  rationale: רדף commonly means to pursue/chase. In this military context, 'chase'
    is natural modern English and fits the parallel with enemies falling in battle.
- source_word: מִכֶּם
  chosen: of you
  alternatives:
  - from you
  - among you
  lexicon: HALOT
  rationale: 'The preposition מן with the pronominal suffix here expresses a partitive
    sense: ''five of you'' / ''a hundred of you,'' not spatial separation.'
- source_word: חֲמִשָּׁה מֵאָה
  chosen: Five of you will chase a hundred
  alternatives:
  - Five from among you will chase a hundred
  lexicon: HALOT
  rationale: The Hebrew numbers are straightforward. English idiom supplies the object
    relationship clearly as 'five of you ... a hundred.'
- source_word: וּמֵאָה מִכֶּם רְבָבָה יִרְדֹּפוּ
  chosen: and a hundred of you will chase ten thousand
  alternatives:
  - and a hundred from among you will pursue a myriad
  lexicon: HALOT
  rationale: רְבָבָה denotes ten thousand/myriad. 'Ten thousand' is preferred because
    the verse presents escalating numerical odds, and explicit numerals communicate
    that force best in English.
- source_word: רְבָבָה
  chosen: ten thousand
  alternatives:
  - a myriad
  lexicon: HALOT
  rationale: Although the noun can mean 'myriad,' the context of numerical comparison
    favors the concrete 'ten thousand' over the more literary 'myriad.'
- source_word: וְנָפְלוּ
  chosen: will fall
  alternatives:
  - will be struck down
  lexicon: HALOT
  rationale: נפל literally means 'fall.' In battle contexts it can imply being struck
    down, but 'will fall' preserves the Hebrew image while remaining idiomatic.
- source_word: אֹיְבֵיכֶם
  chosen: your enemies
  lexicon: HALOT
  rationale: Standard rendering of אויב in this military covenant-blessing context.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: The idiom 'fall before you' is standard English for military defeat and
    closely matches the Hebrew expression.
- source_word: לֶחָרֶב
  chosen: by the sword
  alternatives:
  - before the sword
  - to the sword
  lexicon: HALOT
  rationale: The phrase indicates death/defeat in battle by weaponry. 'By the sword'
    is the most idiomatic English equivalent and preserves the martial imagery.
