theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic object terminology
  chosen_reading: Different Hebrew terms are distinguished as 'idols,' 'carved image,' 'standing stone,' and 'figured stone' rather than collapsed into one term.
  alternative_readings:
  - Render all as 'idols' or 'images'
  rationale: The verse stacks several prohibited cultic objects. Preserving the distinctions respects the source text's specificity and avoids flattening the legal force of the prohibition.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: Consistency of key terms, or documented exception'
