id: LEV.26.1
reference: Leviticus 26:1
source:
  edition: WLC
  text: לֹֽא תַעֲשׂ֨וּ לָ/כֶ֜ם אֱלִילִ֗ם וּ/פֶ֤סֶל וּ/מַצֵּבָה֙ לֹֽא תָקִ֣ימוּ לָ/כֶ֔ם וְ/אֶ֣בֶן מַשְׂכִּ֗ית לֹ֤א תִתְּנוּ֙ בְּ/אַרְצְ/כֶ֔ם לְ/הִֽשְׁתַּחֲוֺ֖ת עָלֶ֑י/הָ כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹהֵי/כֶֽם־־׃
translation:
  text: You shall not make idols for yourselves, and you shall not set up for yourselves a carved image or a standing stone, and you shall not place a figured stone in your land to bow down to it, for I am Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''carved stone'' or ''stone image'' for ''figured stone'' (Hebrew: אֶבֶן מַשְׂכִּית). The exact nuance is debated, but it refers to a stone object associated with forbidden worship.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלִילִם
  chosen: idols
  alternatives:
  - worthless idols
  - false gods
  lexicon: HALOT
  rationale: אֱלִילִים refers to idols, often with a pejorative nuance of worthlessness. 'Idols' is the clearest modern English rendering and fits the legal prohibition without overloading the line with interpretive expansion. The pejorative nuance is real but secondary here, so preserved in alternatives rather than the main text.
- source_word: פֶסֶל
  chosen: carved image
  alternatives:
  - idol
  - graven image
  lexicon: HALOT
  rationale: פֶסֶל denotes an image fashioned by carving. 'Carved image' preserves the concrete sense better than the broader 'idol.' 'Graven image' is traditional but archaic for the stated translation philosophy.
- source_word: מַצֵּבָה
  chosen: standing stone
  alternatives:
  - pillar
  - sacred pillar
  lexicon: HALOT
  rationale: מַצֵּבָה is a stone monument or pillar set upright. 'Standing stone' is both concrete and accessible. 'Sacred pillar' adds cultic interpretation that is likely correct in context but is more explicit than the noun itself.
- source_word: אֶבֶן מַשְׂכִּית
  chosen: figured stone
  alternatives:
  - carved stone
  - stone image
  lexicon: HALOT
  rationale: The phrase likely refers to a stone bearing figured or carved representation, especially in a cultic setting. 'Figured stone' preserves the lexical distinction from פֶסֶל while remaining intelligible. Because the exact nuance is debated, alternatives are preserved in a footnote.
- source_word: תַעֲשׂוּ לָכֶם
  chosen: make idols for yourselves
  alternatives:
  - make for yourselves idols
  lexicon: HALOT
  rationale: The idiom combines the verb 'make' with the reflexive-benefactive 'for yourselves.' English idiom places the object before the prepositional phrase naturally. The reflexive-benefactive force is retained with 'for yourselves.'
- source_word: תָקִימוּ לָכֶם
  chosen: set up for yourselves
  alternatives:
  - raise up for yourselves
  - erect for yourselves
  lexicon: HALOT
  rationale: The Hiphil of קום here means to erect or set up cultic objects. 'Set up' is natural modern English and suits the legal style.
- source_word: תִתְּנוּ בְּאַרְצְכֶם
  chosen: place in your land
  alternatives:
  - put in your land
  - set in your land
  lexicon: HALOT
  rationale: נתן with ב plus location is naturally rendered 'place' here. 'In your land' preserves the covenant-land setting and avoids narrowing the scope to a house or shrine.
- source_word: לְהִשְׁתַּחֲוֺת עָלֶיהָ
  chosen: to bow down to it
  alternatives:
  - to prostrate yourselves before it
  - to worship on it
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the stone is not to be placed for the purpose of bowing down to it. ''Bow down to it'' is the most direct rendering. ''Prostrate yourselves'' is more formal; ''worship on it'' is possible for the preposition but less likely here than reference to the object of reverence.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי אֲנִי יְהוָה אֱלֹהֵיכֶם
  chosen: for I am the LORD your God
  alternatives:
  - because I am the LORD your God
  lexicon: HALOT
  rationale: כִּי here grounds the prohibition. 'For' is concise and natural in legal discourse, preserving the covenantal rationale formula.
