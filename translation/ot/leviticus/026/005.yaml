theological_decisions:
- issue: Covenant-blessing language tied to agricultural abundance and security in
    the land
  chosen_reading: Retain concrete agricultural and land terminology without spiritualizing
  alternative_readings:
  - Generalized prosperity language
  rationale: 'The verse promises tangible covenant blessings: extended harvest cycles,
    abundant food, and secure dwelling in the land. The translation preserves these
    concrete features rather than broadening them into abstract prosperity.'
  doctrine_reference: Translation philosophy §§1, 5
