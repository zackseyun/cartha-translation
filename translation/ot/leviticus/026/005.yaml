id: LEV.26.5
reference: Leviticus 26:5
source:
  edition: WLC
  text: וְ/הִשִּׂ֨יג לָ/כֶ֥ם דַּ֨יִשׁ֙ אֶת בָּצִ֔יר וּ/בָצִ֖יר יַשִּׂ֣יג אֶת זָ֑רַע
    וַ/אֲכַלְתֶּ֤ם לַחְמְ/כֶם֙ לָ/שֹׂ֔בַע וִֽ/ישַׁבְתֶּ֥ם לָ/בֶ֖טַח בְּ/אַרְצְ/כֶֽם־־׃
translation:
  text: Your threshing will last for you until the grape harvest, and the grape harvest
    will last until sowing; and you will eat your bread to the full and live securely
    in your land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Your threshing will overtake the grape harvest, and
      the grape harvest will overtake the sowing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשִּׂיג
  chosen: will last ... until / will last until
  alternatives:
  - will overtake
  - will reach
  lexicon: HALOT
  rationale: The Hiphil of נָשַׂג here idiomatically expresses one agricultural season
    extending up to the next, not literal pursuit. 'Will last until' communicates
    the sense clearly in modern English while preserving the image of one season reaching
    the next.
- source_word: דַּיִשׁ
  chosen: threshing
  alternatives:
  - threshing time
  - threshing season
  lexicon: HALOT
  rationale: Refers to the threshing process/season. 'Threshing' is concise and natural
    in English, and in context clearly denotes the period of processing grain harvest.
- source_word: בָּצִיר
  chosen: grape harvest
  alternatives:
  - vintage
  - harvest
  lexicon: HALOT
  rationale: Though often rendered 'vintage,' the noun denotes grape gathering/harvest.
    'Grape harvest' is clearer for modern readers and avoids archaic tone.
- source_word: זָרַע
  chosen: sowing
  alternatives:
  - seedtime
  - planting
  lexicon: HALOT
  rationale: In this context the noun refers to the time of sowing rather than seed
    as an object. 'Sowing' best matches the agricultural sequence.
- source_word: לַחְמְכֶם
  chosen: your bread
  alternatives:
  - your food
  lexicon: HALOT
  rationale: Though 'bread' can stand broadly for food, retaining 'bread' preserves
    the concrete Hebrew expression and covenantal tone without obscuring meaning.
- source_word: לָשֹׂבַע
  chosen: to the full
  alternatives:
  - until satisfied
  - in fullness
  lexicon: HALOT
  rationale: Conveys eating in abundance/satisfaction. 'To the full' is idiomatic,
    concise, and preserves the promise of sufficiency.
- source_word: וִישַׁבְתֶּם
  chosen: live
  alternatives:
  - dwell
  - sit
  lexicon: HALOT
  rationale: While the verb literally means 'dwell/sit,' in this covenant context
    it denotes settled habitation. 'Live securely' reads naturally in English and
    captures the state of settled residence.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: Expresses security/safety from threat. 'Securely' pairs naturally with
    'live' and preserves the covenant blessing of safety.
- source_word: בְּאַרְצְכֶם
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal term in Leviticus and better preserves
    the theological resonance of Israel''s land promise than ''country''.'
