id: LEV.26.15
reference: Leviticus 26:15
source:
  edition: WLC
  text: וְ/אִם בְּ/חֻקֹּתַ֣/י תִּמְאָ֔סוּ וְ/אִ֥ם אֶת מִשְׁפָּטַ֖/י תִּגְעַ֣ל נַפְשְׁ/כֶ֑ם
    לְ/בִלְתִּ֤י עֲשׂוֹת֙ אֶת כָּל מִצְוֺתַ֔/י לְ/הַפְרְ/כֶ֖ם אֶת בְּרִיתִֽ/י־־־־־׃
translation:
  text: and if you reject my statutes, and if your soul abhors my judgments, so that
    you do not do all my commandments, thereby breaking my covenant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''your whole being abhors my judgments.'' Hebrew: ''your soul abhors.'''
    reason: lexical_alternative
  - marker: b
    text: '''My judgments'' may also be rendered ''my rules'' or ''my ordinances.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'thereby violating my covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to prescribed enactments or statutes. 'Statutes'
    preserves the legal-covenantal register and distinguishes it from מִשְׁפָּטִים
    in the next clause.
- source_word: תִּמְאָסוּ
  chosen: you reject
  alternatives:
  - you despise
  - you spurn
  lexicon: HALOT
  rationale: מאס conveys rejection with contempt. 'Reject' is clear modern English
    and fits the covenantal warning context without over-paraphrasing.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים are legal decisions/judgments. 'Judgments' keeps the formal
    legal nuance and maintains distinction from 'statutes.'
- source_word: תִּגְעַל נַפְשְׁכֶם
  chosen: your soul abhors
  alternatives:
  - you abhor
  - your inner being loathes
  lexicon: HALOT
  rationale: The verb געל means to loathe or abhor. Because the grammatical subject
    is נֶפֶשׁ ('soul/self'), rendering it explicitly preserves the Hebrew expression's
    intensity rather than flattening it to a simple 'you abhor.'
- source_word: לְבִלְתִּי עֲשׂוֹת
  chosen: so that you do not do
  alternatives:
  - so as not to do
  - to the point of not doing
  lexicon: HALOT
  rationale: This construction expresses result or purpose. 'So that you do not do'
    is a natural English rendering that preserves the connection between abhorrence
    and disobedience.
- source_word: כָּל מִצְוֺתַי
  chosen: all my commandments
  alternatives:
  - all my commands
  lexicon: HALOT
  rationale: מִצְוֹת are commands/commandments. 'Commandments' preserves the covenantal
    and legal tone of the passage.
- source_word: לְהַפְרְכֶם
  chosen: thereby breaking
  alternatives:
  - so as to break
  - by breaking
  - violating
  lexicon: HALOT
  rationale: The Hiphil of פרר here indicates nullifying or breaking the covenant.
    'Thereby breaking' captures the consequential force linking refusal to obey with
    covenant breach.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term. 'Covenant' is the established
    and precise theological-legal rendering.
