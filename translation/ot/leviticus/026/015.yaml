theological_decisions:
- issue: Retention of anthropological term נֶפֶשׁ in an idiomatic expression
  chosen_reading: your soul abhors
  alternative_readings:
  - you abhor
  - your whole being abhors
  rationale: The Hebrew explicitly uses נֶפֶשׁ as subject. Rendering it as 'your soul'
    preserves the text's anthropological language and emotional intensity without
    importing a technical doctrine of the soul beyond the verse's plain sense.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Differentiation of covenant-law terms
  chosen_reading: statutes / judgments / commandments / covenant
  alternative_readings:
  - decrees / rules / commands / covenant
  rationale: The verse stacks several distinct legal-covenantal terms. Preserving
    their distinctions in English reflects the source text's texture and avoids collapsing
    categories for stylistic smoothness.
  doctrine_reference: Translation philosophy §1, §5
