id: LEV.26.43
reference: Leviticus 26:43
source:
  edition: WLC
  text: וְ/הָ/אָרֶץ֩ תֵּעָזֵ֨ב מֵ/הֶ֜ם וְ/תִ֣רֶץ אֶת שַׁבְּתֹתֶ֗י/הָ בָּ/הְשַׁמָּ/ה֙
    מֵ/הֶ֔ם וְ/הֵ֖ם יִרְצ֣וּ אֶת עֲוֺנָ֑/ם יַ֣עַן וּ/בְ/יַ֔עַן בְּ/מִשְׁפָּטַ֣/י מָאָ֔סוּ
    וְ/אֶת חֻקֹּתַ֖/י גָּעֲלָ֥ה נַפְשָֽׁ/ם־־־׃
translation:
  text: But the land will be abandoned by them and will enjoy its Sabbaths while it
    lies desolate without them, and they will accept their punishment for iniquity,
    because—indeed, because—they rejected my judgments and their soul abhorred my
    statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will accept their iniquity' or 'they will make amends for their
      iniquity.' The Hebrew idiom can be understood in more than one way; here it
      is rendered with its judicial sense in the context of covenant punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּעָזֵב
  chosen: will be abandoned
  alternatives:
  - will be left
  - will be forsaken
  lexicon: HALOT
  rationale: Nifal imperfect of עזב conveys being left/abandoned. 'Will be abandoned'
    is natural English and preserves the passive sense with the land as subject.
- source_word: וְתִרֶץ
  chosen: will enjoy
  alternatives:
  - will make up for
  - will be paid for by
  lexicon: HALOT
  rationale: From רצה in this context of land and Sabbaths (cf. Lev 26:34, 43; 2 Chr
    36:21), the sense is that the land receives or enjoys the rest due to it. 'Will
    enjoy its Sabbaths' is the established contextual meaning and fits the idiom better
    than a wooden 'will accept' here.
- source_word: שַׁבְּתֹתֶיהָ
  chosen: its Sabbaths
  alternatives:
  - its Sabbath rests
  lexicon: HALOT
  rationale: Plural of 'Sabbath' referring to the land's sabbatical rests. 'Its Sabbaths'
    is concise and preserves the covenantal terminology.
- source_word: בָּהְשַׁמָּה מֵהֶם
  chosen: while it lies desolate without them
  alternatives:
  - in being desolate from them
  - while desolate because of them
  lexicon: HALOT
  rationale: The phrase indicates the land's desolation in the absence of the people.
    'While it lies desolate without them' renders both the state of desolation and
    their absence in idiomatic English.
- source_word: יִרְצוּ אֶת עֲוֺנָם
  chosen: will accept their punishment for iniquity
  alternatives:
  - will accept their iniquity
  - will pay for their iniquity
  - will make amends for their iniquity
  lexicon: HALOT
  rationale: The idiom רצה + עון in judgment contexts can mean to accept the penalty
    due for guilt, not merely to 'accept their iniquity' in a psychological sense.
    'Punishment for iniquity' makes the judicial force clear in English while remaining
    close to the Hebrew idiom.
- source_word: עֲוֺנָם
  chosen: their punishment for iniquity
  alternatives:
  - their iniquity
  - their guilt
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the punishment borne for it. In this
    context of covenant curses and the idiom with רצה, the penal nuance is likely
    foregrounded, so the English expands slightly for clarity.
- source_word: יַעַן וּבְיַעַן
  chosen: because—indeed, because—
  alternatives:
  - because
  - for this reason that
  lexicon: HALOT
  rationale: The doubled causal expression intensifies the reason. The dash-marked
    repetition preserves the emphatic force without sounding unnatural.
- source_word: בְּמִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים are covenantal legal decisions/ordinances. 'Judgments' is
    more formally consistent with the Hebrew term, though 'ordinances' is possible.
- source_word: מָאָסוּ
  chosen: rejected
  alternatives:
  - despised
  - spurned
  lexicon: HALOT
  rationale: מאס denotes rejection with contempt. 'Rejected' is clear modern English
    and fits legal-covenantal context.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  lexicon: HALOT
  rationale: חקים is commonly rendered 'statutes' in legal contexts. This preserves
    distinction from מִשְׁפָּטִים.
- source_word: גָּעֲלָה נַפְשָׁם
  chosen: their soul abhorred
  alternatives:
  - they abhorred
  - their inner being loathed
  lexicon: HALOT
  rationale: The Hebrew singular 'their soul' is retained as a collective expression.
    געל conveys abhorrence/loathing. Keeping 'soul' preserves the anthropological
    force of the source rather than flattening to a simple verbal subject.
