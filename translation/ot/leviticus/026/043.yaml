theological_decisions:
- issue: Meaning of עון in the phrase יִרְצוּ אֶת עֲוֺנָם
  chosen_reading: 'penal sense: ''accept their punishment for iniquity'''
  alternative_readings:
  - '''accept their iniquity'''
  - '''make amends for their iniquity'''
  rationale: The immediate context is covenant curse, exile, and the land enjoying
    missed Sabbaths. In such a judicial setting, עון plausibly carries the consequence/penalty
    of guilt, and the idiom with רצה points to bearing or accepting the due punishment.
    This avoids implying meritorious self-atonement while preserving the text's emphasis
    on deserved covenant judgment.
  doctrine_reference: Translation philosophy §1, §3
