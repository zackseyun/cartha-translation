id: LEV.26.23
reference: Leviticus 26:23
source:
  edition: WLC
  text: וְ/אִ֨ם בְּ/אֵ֔לֶּה לֹ֥א תִוָּסְר֖וּ לִ֑/י וַ/הֲלַכְתֶּ֥ם עִמִּ֖/י קֶֽרִי־׃
translation:
  text: And if by these things you are not corrected for me, but walk in hostility
    with me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walk contrary to me.' The Hebrew idiom literally uses 'with me' plus
      a noun expressing opposition/hostility.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵלֶּה
  chosen: by these things
  alternatives:
  - through these things
  - in these things
  lexicon: HALOT
  rationale: The preposition ב with the demonstrative likely refers instrumentally
    to the preceding judgments/chastisements just described. 'By these things' is
    natural English and preserves the connection to the prior context.
- source_word: תִוָּסְרוּ
  chosen: are not corrected
  alternatives:
  - are not disciplined
  - are not instructed
  - do not accept correction
  lexicon: HALOT
  rationale: Niphal of יסר conveys being chastened, disciplined, or corrected. 'Are
    not corrected' fits the passive form and the covenant-discipline context. 'Disciplined'
    is possible, but in English passive 'are not disciplined' can imply the discipline
    never happened, whereas the sense here is that the prior blows failed to bring
    correction.
- source_word: לִי
  chosen: for me
  alternatives:
  - by me
  - toward me
  - because of me
  lexicon: HALOT
  rationale: The dative/pronominal suffix after יסר is somewhat idiomatic. 'For me'
    preserves the Hebrew closely and can carry the sense of responding rightly in
    relation to God. Because this is slightly awkward in English, the broader clause
    is smoothed by context rather than over-paraphrased.
- source_word: וַהֲלַכְתֶּם
  chosen: but walk
  alternatives:
  - and walk
  - then walk
  lexicon: HALOT
  rationale: 'In this conditional sequence, waw plus perfect continues the apodosis/result.
    ''But walk'' brings out the adversative force implied by the contrast: despite
    correction, they persist in a contrary course.'
- source_word: עִמִּי
  chosen: with me
  alternatives:
  - contrary to me
  lexicon: HALOT
  rationale: The preposition itself is 'with,' but its force is determined by the
    following noun קֶרִי. Retaining 'with me' allows the idiom to be expressed in
    the next term.
- source_word: קֶרִי
  chosen: hostility
  alternatives:
  - contrariness
  - opposition
  - stubbornness
  lexicon: HALOT
  rationale: In Leviticus 26 this term describes a hostile or contrary stance in the
    covenant relationship. Traditional 'contrary' is formally close but unnatural
    in modern English ('walk contrary with me'). 'Hostility' communicates the relational
    antagonism clearly while staying within the semantic range.
