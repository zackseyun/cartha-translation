theological_decisions:
- issue: Rendering the covenant-relationship idiom עִמִּי קֶרִי
  chosen_reading: walk in hostility with me
  alternative_readings:
  - walk contrary to me
  - walk in opposition to me
  rationale: The Hebrew idiom expresses covenantal opposition between Israel and the
    LORD. The chosen rendering preserves the relational dimension ('with me') while
    making the sense intelligible in modern English. It avoids flattening the phrase
    into mere disobedience and does not import later theological categories.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve original-language
    primacy and readable modern English.'
