id: LEV.26.19
reference: Leviticus 26:19
source:
  edition: WLC
  text: וְ/שָׁבַרְתִּ֖י אֶת גְּא֣וֹן עֻזְּ/כֶ֑ם וְ/נָתַתִּ֤י אֶת שְׁמֵי/כֶם֙ כַּ/בַּרְזֶ֔ל
    וְ/אֶֽת אַרְצְ/כֶ֖ם כַּ/נְּחֻשָֽׁה־־־׃
translation:
  text: And I will break the pride of your strength, and I will make your heavens
    like iron and your land like bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sky like iron.' The Hebrew has 'your heavens,' a plural form often
      used for the sky above.
    reason: lexical_alternative
  - marker: b
    text: Or 'like copper.' The Hebrew term can refer to copper or bronze.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבַרְתִּי
  chosen: And I will break
  alternatives:
  - and I will shatter
  lexicon: HALOT
  rationale: שׁבר commonly means 'break' or 'shatter.' 'Break' is the more natural
    modern English choice here and fits the idiom of humbling resistant strength without
    over-intensifying beyond the source.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the exaltation
  - the arrogance
  - the majesty
  lexicon: HALOT
  rationale: גָּאוֹן can denote pride, exaltation, or majesty depending on context.
    In a covenant-curse context directed against rebellious Israel, 'pride' best captures
    the negative sense of haughty self-reliance.
- source_word: עֻזְּכֶם
  chosen: of your strength
  alternatives:
  - of your power
  - of your might
  lexicon: HALOT
  rationale: עֹז denotes strength, might, or power. 'Strength' is concise and idiomatic
    in the phrase 'the pride of your strength,' preserving the Hebrew genitival construction.
- source_word: וְנָתַתִּי
  chosen: and I will make
  alternatives:
  - and I will set
  - and I will give
  lexicon: HALOT
  rationale: נתן literally means 'give' or 'set,' but in this construction with double
    object and comparative phrase it idiomatically means to make something become
    like something else. 'Make' communicates the result clearly in English.
- source_word: שְׁמֵיכֶם
  chosen: your heavens
  alternatives:
  - your sky
  lexicon: HALOT
  rationale: The Hebrew is plural 'heavens.' Retaining 'heavens' preserves the source
    form and biblical register, while still clearly referring to the sky above in
    this agricultural judgment context.
- source_word: כַּבַּרְזֶל
  chosen: like iron
  alternatives:
  - as iron
  lexicon: HALOT
  rationale: The comparative כ plus 'iron' depicts the heavens as hard and unyielding,
    withholding rain. 'Like iron' is the clearest natural rendering.
- source_word: אַרְצְכֶם
  chosen: your land
  alternatives:
  - your earth
  - your ground
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or ground. In the covenantal and agricultural
    setting, 'land' best conveys the territory/soil under judgment.
- source_word: כַּנְּחֻשָׁה
  chosen: like bronze
  alternatives:
  - like copper
  lexicon: HALOT
  rationale: נְחֻשָׁה refers to copper/bronze. 'Bronze' is the conventional and likely
    intended sense in this idiom of hardened, unproductive ground; 'copper' is possible
    but less idiomatic in English Bible style.
