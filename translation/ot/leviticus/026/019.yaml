theological_decisions:
- issue: Metaphorical force of the curse imagery
  chosen_reading: The verse describes covenant judgment in which the sky becomes unyielding
    and the land infertile.
  alternative_readings:
  - A more general image of severe hardship without specific reference to drought
  rationale: The iron heavens and bronze land are stock images of drought and agricultural
    barrenness in covenant-curse contexts. The translation preserves the metaphor
    rather than making it explicit in the main text.
