theological_decisions:
- issue: Order and emphasis of the patriarchal covenants
  chosen_reading: Retain the Hebrew order Jacob, Isaac, Abraham and preserve the repeated
    'my covenant' phrasing.
  alternative_readings:
  - Reorder to Abraham, Isaac, Jacob for chronological familiarity
  - Compress to 'the covenant with Abraham, Isaac, and Jacob'
  rationale: The Hebrew intentionally presents the names in reverse order and repeats
    'my covenant' for each patriarch. Preserving this avoids importing a smoother
    traditional formula not present in the text and keeps the rhetorical emphasis
    of divine remembrance.
  doctrine_reference: Translation philosophy §1, §5
- issue: Meaning of divine 'remembering'
  chosen_reading: Render as 'remember' without expanding to 'act on' or 'renew.'
  alternative_readings:
  - I will call to mind and act on
  - I will renew
  rationale: In covenantal contexts, divine remembrance implies action, but the text
    itself says 'remember.' Preserving the lexical form maintains theological tension
    and avoids paraphrastic expansion beyond the source text.
  doctrine_reference: Translation philosophy §3
