id: LEV.26.42
reference: Leviticus 26:42
source:
  edition: WLC
  text: וְ/זָכַרְתִּ֖י אֶת בְּרִיתִ֣/י יַעֲק֑וֹב וְ/אַף֩ אֶת בְּרִיתִ֨/י יִצְחָ֜ק
    וְ/אַ֨ף אֶת בְּרִיתִ֧/י אַבְרָהָ֛ם אֶזְכֹּ֖ר וְ/הָ/אָ֥רֶץ אֶזְכֹּֽר־־־׃
translation:
  text: Then I will remember my covenant with Jacob, and also my covenant with Isaac,
    and also my covenant with Abraham I will remember; and I will remember the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I will remember.' The Hebrew conjunction can be rendered simply
      'and'; 'then' reflects the verse's connection to the preceding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתִּי
  chosen: Then I will remember
  alternatives:
  - And I will remember
  lexicon: HALOT
  rationale: זכר in covenant contexts commonly denotes calling to mind with intent
    to act, not mere recollection. The prefixed conjunction can be rendered 'and,'
    but here 'then' fits the discourse flow from the preceding conditional/restoration
    context while preserving the forward-moving sense.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in the Hebrew Bible and carries
    theological weight tied to God's binding relationship with the patriarchs. 'Covenant'
    is the established and most accurate English equivalent.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name transliterated according to standard English convention,
    per translation philosophy.
- source_word: וְאַף
  chosen: and also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: אַף here adds emphasis and continuation. 'And also' preserves both the
    conjunction and the additive/emphatic force without sounding overly stiff.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Personal name transliterated according to standard English convention.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Personal name transliterated according to standard English convention.
- source_word: אֶזְכֹּר
  chosen: I will remember
  alternatives:
  - I will call to mind
  lexicon: HALOT
  rationale: Repeated finite verb retained rather than smoothed away, because the
    Hebrew repetition gives rhetorical weight to the remembrance of Abraham and then
    the land.
- source_word: וְהָאָרֶץ
  chosen: and the land
  alternatives:
  - and the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers specifically to the promised land in covenant context,
    so 'the land' is the natural and theologically appropriate rendering.
