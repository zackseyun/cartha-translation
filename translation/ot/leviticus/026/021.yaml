id: LEV.26.21
reference: Leviticus 26:21
source:
  edition: WLC
  text: וְ/אִם תֵּֽלְכ֤וּ עִמִּ/י֙ קֶ֔רִי וְ/לֹ֥א תֹאב֖וּ לִ/שְׁמֹ֣עַֽ לִ֑/י וְ/יָסַפְתִּ֤י
    עֲלֵי/כֶם֙ מַכָּ֔ה שֶׁ֖בַע כְּ/חַטֹּאתֵי/כֶֽם־׃
translation:
  text: And if you walk contrary to me and are not willing to listen to me, then I
    will continue to strike you sevenfold according to your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in hostility toward me' / 'in opposition to me.' The Hebrew idiom 'walk
      with me in qeri' is difficult; in this chapter it conveys a stance of opposition
      rather than mere chance.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will add to strike you seven times for your sins.'
    reason: alternative_reading
lexical_decisions:
- source_word: קֶרִי
  chosen: contrary
  alternatives:
  - hostility
  - in opposition
  - at random
  lexicon: HALOT
  rationale: In Leviticus 26 this noun appears repeatedly in the idiom 'walk with/against
    ... qeri' and denotes a stance of opposition or hostility rather than mere chance.
    'Contrary' preserves the covenantal reciprocity of the passage and matches the
    repeated pattern in the chapter. 'At random' is possible in other discussions
    of the term, but fits this context poorly.
- source_word: תֵּלְכוּ עִמִּי קֶרִי
  chosen: you walk contrary to me
  alternatives:
  - you walk in hostility toward me
  - you behave in opposition to me
  lexicon: HALOT
  rationale: The Hebrew uses 'walk' idiomatically for conduct. Keeping 'walk' preserves
    the formal texture, while 'contrary to me' communicates the idiom's sense in readable
    English.
- source_word: תֹאבוּ
  chosen: are not willing
  alternatives:
  - refuse
  - do not consent
  lexicon: HALOT
  rationale: The verb expresses volition rather than mere future action. 'Are not
    willing' captures the stubbornness of the people without overparaphrasing. 'Refuse'
    is possible but slightly more interpretive in tone.
- source_word: לִשְׁמֹעַ לִי
  chosen: to listen to me
  alternatives:
  - to obey me
  - to hear me
  lexicon: HALOT
  rationale: The Hebrew verb 'hear/listen' in covenant contexts often implies obedience.
    Here 'listen to me' preserves the lexical form while allowing the obedience nuance
    to remain implicit. 'Obey me' is a viable contextual rendering but is more interpretive
    than the source wording.
- source_word: וְיָסַפְתִּי
  chosen: I will continue
  alternatives:
  - I will add
  - I will increase further
  lexicon: HALOT
  rationale: The verb literally means 'add' or 'increase.' In context of escalating
    covenant punishments, 'I will continue' communicates the sense of further action
    being added to prior judgments in natural English.
- source_word: מַכָּה
  chosen: to strike you
  alternatives:
  - a blow
  - a plague
  - a wound
  lexicon: HALOT
  rationale: The noun denotes a blow, stroke, or plague-like affliction. Rendering
    the clause verbally as 'to strike you' produces natural English after 'I will
    continue' while preserving the punitive sense. 'Plague' is too specific here;
    the term is broader.
- source_word: שֶׁבַע
  chosen: sevenfold
  alternatives:
  - seven times
  - seven
  lexicon: HALOT
  rationale: In Leviticus 26 this term functions adverbially/intensively in the repeated
    judgment formula. 'Sevenfold' is the most idiomatic English equivalent for the
    covenant curse pattern.
- source_word: כְּחַטֹּאתֵיכֶם
  chosen: according to your sins
  alternatives:
  - for your sins
  - in proportion to your sins
  - because of your sins
  lexicon: HALOT
  rationale: The prefixed כ here most naturally conveys correspondence or proportion
    in the punishment formula. 'According to your sins' preserves that nuance better
    than the simpler causal 'for your sins,' though the latter is close.
