theological_decisions:
- issue: Nature of the covenant punishment formula
  chosen_reading: Render the verse as an escalation of divine judgment proportionate
    to Israel's sins without specifying a particular mechanism beyond the text.
  alternative_readings:
  - Interpret מַכָּה specifically as 'plague'
  - Interpret כְּחַטֹּאתֵיכֶם merely causally as 'because of your sins'
  rationale: The verse belongs to the covenant-sanctions sequence of Leviticus 26.
    The translation should preserve the text's warning of intensified divine judgment
    while avoiding narrowing the punishment to one form not demanded by the Hebrew.
    'According to your sins' also preserves the proportional aspect of the warning.
