id: LEV.26.40
reference: Leviticus 26:40
source:
  edition: WLC
  text: וְ/הִתְוַדּ֤וּ אֶת עֲוֺנָ/ם֙ וְ/אֶת עֲוֺ֣ן אֲבֹתָ֔/ם בְּ/מַעֲלָ֖/ם אֲשֶׁ֣ר
    מָֽעֲלוּ בִ֑/י וְ/אַ֕ף אֲשֶׁר הָֽלְכ֥וּ עִמִּ֖/י בְּ/קֶֽרִי־־־־׃
translation:
  text: But if they confess their iniquity and the iniquity of their fathers, in the
    unfaithfulness by which they were unfaithful to me, and also that they walked
    contrary to me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''their trespass'' / ''their treachery'' for ''the unfaithfulness.''
      The Hebrew uses cognate forms to stress covenant breach: ''in their unfaithfulness
      by which they were unfaithful to me.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'walked in hostility toward me.' The Hebrew phrase 'walked with me in
      qeri' uses a difficult term repeated in this chapter for oppositional or hostile
      conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְוַדּוּ
  chosen: if they confess
  alternatives:
  - and they shall confess
  - then they shall confess
  lexicon: HALOT
  rationale: The form is a waw + Hitpael perfect 3cp of ידה in the sense 'confess.'
    In context it continues the conditional/apodosis flow from the preceding verse,
    so English idiom is best captured with 'if they confess' rather than a bare coordinate
    'and they confess.'
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. Here
    it refers to culpable wrongdoing to be acknowledged, and 'iniquity' preserves
    the moral weight and links with the following parallel phrase.
- source_word: עֲוֺן אֲבֹתָם
  chosen: the iniquity of their fathers
  alternatives:
  - their fathers' iniquity
  - the guilt of their fathers
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Fathers' is retained rather than
    a gender-neutral substitute because the Hebrew explicitly uses the masculine ancestral
    term and the translation philosophy prefers gender-accurate rendering.
- source_word: בְּמַעֲלָם
  chosen: in the unfaithfulness
  alternatives:
  - for their trespass
  - in their treachery
  - in their faithlessness
  lexicon: HALOT
  rationale: מַעַל denotes breach of faith, treachery, or unfaithful act, especially
    covenantal infidelity. 'Unfaithfulness' communicates the relational/covenantal
    dimension better than the more technical 'trespass.' The prefixed ב is rendered
    instrumentally/circumstantially as 'in the unfaithfulness by which...'.
- source_word: מָעֲלוּ בִי
  chosen: they were unfaithful to me
  alternatives:
  - they trespassed against me
  - they acted treacherously toward me
  lexicon: HALOT
  rationale: The cognate verb with ב marks covenant breach against God. 'Were unfaithful
    to me' preserves the lexical connection with מַעַל and is natural modern English.
- source_word: וְאַף
  chosen: and also
  alternatives:
  - and even
  - and indeed
  lexicon: HALOT
  rationale: Adds an additional element to the confession. 'And also' is clear and
    idiomatic without overstating emphasis.
- source_word: הָלְכוּ עִמִּי
  chosen: they walked ... to me
  alternatives:
  - they went with me
  - they conducted themselves toward me
  lexicon: HALOT
  rationale: הלך with עם is idiomatically 'walk with,' but here the following phrase
    בְּקֶרִי gives the manner. In English, 'walked contrary to me' best captures the
    whole idiom.
- source_word: בְּקֶרִי
  chosen: contrary
  alternatives:
  - in hostility
  - stubbornly
  - in opposition
  lexicon: HALOT
  rationale: קֶרִי in Leviticus 26 is a difficult term often rendered 'contrary' in
    the sense of hostile opposition or antagonism. 'Contrary' preserves the repeated
    covenant lawsuit language in this chapter and matches the reciprocal phrasing
    used of God and Israel.
