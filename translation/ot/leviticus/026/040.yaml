theological_decisions:
- issue: Corporate confession including ancestral guilt
  chosen_reading: Retain 'the iniquity of their fathers' in the main text without
    softening it to mere consequences or example.
  alternative_readings:
  - the sins of their ancestors
  - their fathers' guilt in which they shared
  rationale: The Hebrew explicitly includes confession of ancestral iniquity alongside
    their own. The translation should preserve this covenantal, corporate dimension
    without importing later doctrinal explanations or reducing it to individualism.
  doctrine_reference: Translation philosophy §§1, 3, 4
