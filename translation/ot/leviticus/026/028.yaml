theological_decisions:
- issue: Nature of divine response in covenant curse
  chosen_reading: 'Retain both adversarial and disciplinary language: God ''walks
    contrary'' and ''disciplines'' Israel.'
  alternative_readings:
  - Render the whole verse only in punitive terms ('punish')
  - Soften the adversarial idiom into general displeasure
  rationale: The Hebrew combines relational opposition (הלך + עם + קֶרִי) with יסר,
    which can include chastening/discipline. Preserving both avoids importing either
    a purely retributive or overly softened theological reading.
  doctrine_reference: Translation philosophy §§1, 3, 5
