id: LEV.26.28
reference: Leviticus 26:28
source:
  edition: WLC
  text: וְ/הָלַכְתִּ֥י עִמָּ/כֶ֖ם בַּ/חֲמַת קֶ֑רִי וְ/יִסַּרְתִּ֤י אֶתְ/כֶם֙ אַף אָ֔נִי
    שֶׁ֖בַע עַל חַטֹּאתֵי/כֶם־־־׃
translation:
  text: then I also will walk contrary to you in furious hostility, and I myself will
    discipline you sevenfold for your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the fury of contrariness'; traditionally, 'I will walk contrary to
      you in fury.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will chastise you seven times for your sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלַכְתִּי
  chosen: I will walk
  alternatives:
  - I will act
  - I will proceed
  lexicon: HALOT
  rationale: הלך literally means 'walk/go.' In this covenant-curse context, the idiom
    of 'walking' with/against Israel is important and should be preserved rather than
    flattened to 'act.'
- source_word: עִמָּכֶם
  chosen: to you
  alternatives:
  - with you
  - against you
  lexicon: HALOT
  rationale: The preposition עם is literally 'with,' but in the repeated idiom of
    this chapter ('walk with ... in hostility/contrariness') the sense is adversative.
    English 'to you' works naturally with 'contrary' while preserving the relational
    force; 'against you' is possible but somewhat redundant with 'contrary.'
- source_word: בַּחֲמַת
  chosen: in furious
  alternatives:
  - in wrathful
  - in the fury of
  lexicon: HALOT
  rationale: חֵמָה denotes heat, fury, wrath. Rendering it with 'furious' keeps the
    emotional intensity in readable modern English and fits the following noun phrase
    smoothly.
- source_word: קֶרִי
  chosen: hostility
  alternatives:
  - contrariness
  - opposition
  lexicon: HALOT
  rationale: קֶרִי in Leviticus 26 is a difficult term often rendered 'contrary/contrariness.'
    Because that is awkward in modern English, 'hostility' communicates the adversarial
    covenant stance clearly. The traditional alternative is preserved in a footnote
    because the chapter repeats this term formulaically.
- source_word: וְיִסַּרְתִּי
  chosen: I will discipline
  alternatives:
  - I will chastise
  - I will punish
  - I will correct
  lexicon: HALOT
  rationale: יסר commonly carries the sense of disciplining/chastening, not merely
    penal punishment. 'Discipline' preserves the corrective nuance while fitting the
    covenantal warning context.
- source_word: אַף אֲנִי
  chosen: I also ... I myself
  alternatives:
  - even I
  - I, even I
  lexicon: HALOT
  rationale: The combination intensifies the subject. Rendering both elements in English
    ('also' and 'I myself') preserves the emphatic force without sounding archaic.
- source_word: שֶׁבַע
  chosen: sevenfold
  alternatives:
  - seven times
  lexicon: HALOT
  rationale: In Leviticus 26 this term functions idiomatically for intensified judgment.
    'Sevenfold' is concise and idiomatic in English, while 'seven times' is a viable
    alternative.
- source_word: עַל חַטֹּאתֵיכֶם
  chosen: for your sins
  alternatives:
  - because of your sins
  - on account of your sins
  lexicon: HALOT
  rationale: עַל here marks the basis/ground of the discipline. 'For your sins' is
    natural English and preserves the causal sense.
