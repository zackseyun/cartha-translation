id: LEV.26.25
reference: Leviticus 26:25
source:
  edition: WLC
  text: וְ/הֵבֵאתִ֨י עֲלֵי/כֶ֜ם חֶ֗רֶב נֹקֶ֨מֶת֙ נְקַם בְּרִ֔ית וְ/נֶאֱסַפְתֶּ֖ם אֶל
    עָרֵי/כֶ֑ם וְ/שִׁלַּ֤חְתִּי דֶ֨בֶר֙ בְּ/ת֣וֹכְ/כֶ֔ם וְ/נִתַּתֶּ֖ם בְּ/יַד אוֹיֵֽב־־־׃
translation:
  text: And I will bring against you a sword avenging the vengeance of the covenant,
    and you will be gathered into your cities. Then I will send pestilence among you,
    and you will be given into the hand of the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'executing covenant vengeance,' 'taking vengeance for the covenant,'
      or more smoothly 'avenging the covenant.' The Hebrew is literally 'a sword avenging
      the vengeance of the covenant,' an emphatic expression linking the sword to
      covenant judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: And I will bring
  alternatives:
  - And I will bring in
  - And I will cause to come
  lexicon: HALOT
  rationale: 'Hiphil of בוא with first person subject expresses causation: Yahweh
    brings or causes something to come upon them. ''Bring'' is idiomatic and sufficiently
    formal.'
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With hostile judgment imagery, עַל is best rendered 'against' rather
    than the more neutral 'upon'.
- source_word: חֶרֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: Indefinite in English works naturally here as an instrument of war/judgment;
    Hebrew lacks the article.
- source_word: נֹקֶמֶת נְקַם בְּרִית
  chosen: avenging the vengeance of the covenant
  alternatives:
  - executing covenant vengeance
  - taking vengeance for the covenant
  - avenging the covenant
  lexicon: HALOT
  rationale: 'The participle plus cognate noun intensifies the action: literally ''avenging
    vengeance.'' Retaining both elements preserves the emphatic Hebrew. ''Of the covenant''
    reflects the construct relation with בְּרִית. Although smoother English options
    exist, this wording keeps the covenantal judicial force visible.'
- source_word: וְנֶאֱסַפְתֶּם
  chosen: and you will be gathered
  alternatives:
  - and you will withdraw
  - and you will be collected
  lexicon: HALOT
  rationale: Niphal of אסף is passive/reflexive. In context it refers to being driven
    together into fortified urban centers. 'Be gathered' preserves the form and sense.
- source_word: אֶל עָרֵיכֶם
  chosen: into your cities
  alternatives:
  - to your cities
  lexicon: HALOT
  rationale: '''Into'' better conveys movement for refuge/confinement within the cities,
    fitting the siege context.'
- source_word: וְשִׁלַּחְתִּי
  chosen: Then I will send
  alternatives:
  - and I will send
  lexicon: HALOT
  rationale: The conjunction is sequential in context; 'Then' makes the progression
    of judgments clear without over-paraphrasing.
- source_word: דֶבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: דבר in covenant-curse contexts commonly denotes epidemic plague. 'Pestilence'
    preserves the formal biblical register and severity.
- source_word: בְּתוֹכְכֶם
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: '''Among you'' is natural English for an outbreak spreading through the
    people; ''in your midst'' is possible but slightly more archaic.'
- source_word: וְנִתַּתֶּם
  chosen: and you will be given
  alternatives:
  - and you will be delivered
  - and you will be handed over
  lexicon: HALOT
  rationale: Niphal/passive sense of נתן here indicates being surrendered to enemy
    power. 'Given' is close to the Hebrew and idiomatic with the following phrase.
- source_word: בְּיַד אוֹיֵב
  chosen: into the hand of the enemy
  alternatives:
  - into enemy hands
  - to the power of the enemy
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common in Hebrew for subjection to power.
    Retaining 'hand' preserves the biblical idiom and judicial tone; singular 'enemy'
    matches the Hebrew form.
