theological_decisions:
- issue: Meaning of 'vengeance of the covenant'
  chosen_reading: The phrase refers to covenantal judgment executed by God in response
    to Israel's breach of the covenant.
  alternative_readings:
  - vengeance on behalf of the covenant
  - vengeance consisting in covenant sanctions
  rationale: The Hebrew construct permits closely related nuances, but all center
    on the covenant as the basis for divine retribution. The translation preserves
    the phrase rather than interpreting it away, maintaining the theological connection
    between covenant violation and judgment.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
