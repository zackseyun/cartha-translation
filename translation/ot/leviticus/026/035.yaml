id: LEV.26.35
reference: Leviticus 26:35
source:
  edition: WLC
  text: כָּל יְמֵ֥י הָשַּׁמָּ֖/ה תִּשְׁבֹּ֑ת אֵ֣ת אֲשֶׁ֧ר לֹֽא שָׁבְתָ֛ה בְּ/שַׁבְּתֹתֵי/כֶ֖ם
    בְּ/שִׁבְתְּ/כֶ֥ם עָלֶֽי/הָ־־׃
translation:
  text: All the days of its desolation it shall have rest—the rest that it did not
    have during your Sabbaths, while you were dwelling on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'it shall rest for what it did not rest during your Sabbaths.'
      The Hebrew repeats the verb 'rest' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Your Sabbaths'' here refers to the sabbath rests due to the land, especially
      the sabbatical years in the surrounding context.'
    reason: cross_reference
lexical_decisions:
- source_word: כָּל יְמֵי
  chosen: All the days of
  alternatives:
  - For all the days of
  - Throughout all the days of
  lexicon: HALOT
  rationale: כָּל with the construct plural יְמֵי gives a totalizing temporal expression.
    'All the days of' is natural English and preserves the comprehensiveness.
- source_word: הַשַּׁמָּה
  chosen: its desolation
  alternatives:
  - the desolation
  - its devastation
  lexicon: HALOT
  rationale: The noun denotes desolation/devastation; with the 3fs suffix it refers
    back to the land. 'Its desolation' makes the pronominal reference explicit in
    English.
- source_word: תִּשְׁבֹּת
  chosen: it shall have rest
  alternatives:
  - it shall rest
  - it shall cease
  lexicon: HALOT
  rationale: From שׁבת, here of the land in feminine singular. 'It shall have rest'
    fits the agricultural-sabbath context and anticipates the following contrast with
    the rest previously not enjoyed.
- source_word: אֵת אֲשֶׁר לֹא שָׁבְתָה
  chosen: the rest that it did not have
  alternatives:
  - what it did not rest
  - that which it did not observe as rest
  lexicon: HALOT
  rationale: 'The particle אֵת before אֲשֶׁר marks the object of תִּשְׁבֹּת. English
    requires an explicit object; supplying ''the rest'' best reflects the cognate
    verbal idea and yields idiomatic sense: the land will enjoy the rest it previously
    lacked.'
- source_word: בְּשַׁבְּתֹתֵיכֶם
  chosen: during your Sabbaths
  alternatives:
  - in your sabbath years
  - during your times of rest
  lexicon: HALOT
  rationale: Plural of שַׁבָּת/שַׁבָּתוֹת here refers to the sabbatical rests owed
    to the land in context (cf. Lev 26:34). 'During your Sabbaths' is formally close;
    the broader context clarifies these are the land's sabbath rests under Israel's
    tenure.
- source_word: בְּשִׁבְתְּכֶם עָלֶיהָ
  chosen: while you were dwelling on it
  alternatives:
  - while you lived on it
  - when you dwelt upon it
  lexicon: HALOT
  rationale: Infinitive construct of ישׁב with 2mp suffix plus עַל + 3fs refers to
    Israel's residence on the land. 'While you were dwelling on it' is clear, natural,
    and preserves the temporal force.
