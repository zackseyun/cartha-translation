theological_decisions:
- issue: Covenant warning idiom in Leviticus 26
  chosen_reading: Retain the relational idiom 'walk contrary to me' rather than flattening
    it to simple disobedience.
  alternative_readings:
  - behave hostilely toward me
  - remain disobedient to me
  rationale: The verse describes not only failure to obey but an oppositional stance
    in covenant relationship. Preserving 'walk' and 'contrary' keeps the theological
    texture of escalating covenant breach without importing extra doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
