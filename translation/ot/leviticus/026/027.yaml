id: LEV.26.27
reference: Leviticus 26:27
source:
  edition: WLC
  text: וְ/אִ֨ם בְּ/זֹ֔את לֹ֥א תִשְׁמְע֖וּ לִ֑/י וַ/הֲלַכְתֶּ֥ם עִמִּ֖/י בְּ/קֶֽרִי־׃
translation:
  text: But if in spite of this you will not listen to me, and you walk contrary to
    me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despite this' or 'for all this.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'walk with me in contrary/opposition'; the phrase is an idiom for
      acting in hostility toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a further conditional stage in the covenant warning sequence.
    'But if' captures both the conditional force and the adversative progression from
    the preceding context better than a bare 'if.'
- source_word: בְּזֹאת
  chosen: in spite of this
  alternatives:
  - with this
  - by this
  - in this
  lexicon: HALOT
  rationale: In context this phrase points back to the preceding disciplinary acts
    and means 'despite this' or 'for all this,' not merely a spatial/instrumental
    'in this.' 'In spite of this' communicates the concessive force in natural English.
- source_word: לֹא תִשְׁמְעוּ לִי
  chosen: you will not listen to me
  alternatives:
  - you do not obey me
  - you will not hear me
  lexicon: HALOT
  rationale: שׁמע with ל often carries the sense of listening with responsive obedience.
    'Listen to me' preserves the auditory metaphor of the Hebrew while still implying
    heed; 'obey me' is possible but slightly more interpretive.
- source_word: וַהֲלַכְתֶּם
  chosen: and you walk
  alternatives:
  - and you continue to walk
  - and you go
  lexicon: HALOT
  rationale: הלך here is idiomatic for conduct or manner of life. Present 'walk' works
    well in English biblical style and matches the covenantal idiom without over-paraphrasing.
- source_word: עִמִּי
  chosen: to me
  alternatives:
  - with me
  - against me
  lexicon: HALOT
  rationale: Literally 'with me,' but in combination with 'walk' and the following
    בְּקֶרִי the sense is relational opposition in God's dealings with Israel. Rendering
    the phrase as 'walk contrary to me' reflects the idiom as a whole; the preposition
    is therefore represented idiomatically rather than woodenly.
- source_word: בְּקֶרִי
  chosen: contrary
  alternatives:
  - hostility
  - opposition
  - stubbornly
  lexicon: HALOT
  rationale: קֶרִי in Leviticus 26 is a difficult term often rendered 'contrary' in
    this repeated covenant formula. It denotes hostile or oppositional conduct in
    reciprocal relationship language. 'Contrary' preserves the established idiomatic
    sense here without over-specifying the nuance.
