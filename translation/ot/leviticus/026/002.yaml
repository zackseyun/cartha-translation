theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of ירא with reference to the sanctuary
  chosen_reading: revere
  alternative_readings:
  - fear
  - stand in awe of
  rationale: The command concerns proper holy regard for God's sanctuary, not merely emotional fear. 'Revere' preserves the theological sense of worshipful respect while remaining readable modern English.
