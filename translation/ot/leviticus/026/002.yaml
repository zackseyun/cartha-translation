id: LEV.26.2
reference: Leviticus 26:2
source:
  edition: WLC
  text: אֶת שַׁבְּתֹתַ֣/י תִּשְׁמֹ֔רוּ וּ/מִקְדָּשִׁ֖/י תִּירָ֑אוּ אֲנִ֖י יְהוָֽה־׃ס
translation:
  text: You shall keep my Sabbaths and revere my sanctuary; I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear my sanctuary' or 'stand in awe of my sanctuary.' The Hebrew verb can express fear, reverence, or awe depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבְּתֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  - my sabbath observances
  lexicon: HALOT
  rationale: The plural construct with first-person singular suffix is best rendered literally as 'my Sabbaths.' The plural likely refers to the full set of sacred sabbath times rather than a single weekly day only. Retaining 'Sabbaths' preserves the covenantal and cultic breadth of the Hebrew.
- source_word: תִּשְׁמֹרוּ
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly carries the sense of keeping, observing, or guarding commandments and sacred times. 'Keep' is concise, idiomatic in covenantal instruction, and preserves both obedience and careful observance.
- source_word: וּמִקְדָּשִׁי
  chosen: and my sanctuary
  alternatives:
  - and my holy place
  - and my sanctuary place
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place or sanctuary. 'Sanctuary' is the most natural and established English equivalent in cultic contexts and fits the likely reference to the tabernacle as the LORD's holy dwelling.
- source_word: תִּירָאוּ
  chosen: you shall revere
  alternatives:
  - you shall fear
  - you shall stand in awe of
  lexicon: HALOT
  rationale: ירא can mean fear, revere, or stand in awe. In relation to the sanctuary, 'revere' best communicates covenantal reverence and holy respect without implying mere terror, while still preserving the seriousness of the command.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I, the LORD
  - I am Yahweh
  lexicon: HALOT
  rationale: This covenant formula is naturally rendered 'I am the LORD.' It preserves the emphatic self-identification that grounds the commands in the speaker's divine authority.
