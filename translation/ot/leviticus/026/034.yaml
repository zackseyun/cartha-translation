theological_decisions:
- issue: Meaning of the land's relation to its Sabbaths in exile judgment
  chosen_reading: The verse states that the land receives compensation for neglected
    Sabbath rests during Israel's exile.
  alternative_readings:
  - The land 'enjoys' its Sabbaths
  - The land 'is pleased with' its Sabbaths
  rationale: The context in Leviticus 26 concerns covenant curses tied to failure
    to observe sabbatical rhythms. Rendering רצה as 'make up for' preserves the judicial-compensatory
    sense without importing emotional language like 'enjoy,' which can sound anthropomorphic
    or euphemistic in modern English.
