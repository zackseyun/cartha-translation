id: LEV.26.34
reference: Leviticus 26:34
source:
  edition: WLC
  text: אָז֩ תִּרְצֶ֨ה הָ/אָ֜רֶץ אֶת שַׁבְּתֹתֶ֗י/הָ כֹּ֚ל יְמֵ֣י הֳשַׁמָּ֔/ה וְ/אַתֶּ֖ם
    בְּ/אֶ֣רֶץ אֹיְבֵי/כֶ֑ם אָ֚ז תִּשְׁבַּ֣ת הָ/אָ֔רֶץ וְ/הִרְצָ֖ת אֶת שַׁבְּתֹתֶֽי/הָ־־׃
translation:
  text: Then the land will make up for its Sabbaths all the days of its desolation,
    while you are in the land of your enemies; then the land will rest and make up
    for its Sabbaths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will enjoy its Sabbaths' / 'will be paid back for its Sabbaths.' The
      Hebrew verb carries the sense of receiving what was due in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence/result of the preceding judgment.
    'Then' is natural and sufficiently formal.
- source_word: תִּרְצֶה / וְהִרְצָת
  chosen: will make up for / make up for
  alternatives:
  - will enjoy
  - will pay off
  - will satisfy
  lexicon: HALOT
  rationale: From רצה in this context of the land and missed sabbatical observance,
    the sense is that the land receives or is compensated for the Sabbaths previously
    denied. 'Make up for' communicates recompense in clear modern English better than
    the traditional but potentially misleading 'enjoy.' The repeated root is preserved
    with the same English wording in both clauses for consistency.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the ground
  lexicon: HALOT
  rationale: In Leviticus, הארץ here refers specifically to the covenant land of Israel,
    not the whole earth. 'The land' is the standard contextual rendering.
- source_word: אֶת שַׁבְּתֹתֶיהָ
  chosen: for its Sabbaths
  alternatives:
  - its Sabbath rests
  - its sabbatical rests
  lexicon: HALOT
  rationale: Refers to the land's Sabbath observances, especially sabbatical years
    in context. 'Its Sabbaths' is concise and preserves the Hebrew expression; the
    preposition 'for' is supplied idiomatically in English with 'make up for.'
- source_word: כֹּל יְמֵי הֳשַׁמָּה
  chosen: all the days of its desolation
  alternatives:
  - all the days of the desolation
  - throughout the time it lies desolate
  lexicon: HALOT
  rationale: The phrase denotes the full duration of the land's devastated state.
    'Its desolation' takes the pronominal suffix seriously and reads naturally.
- source_word: וְאַתֶּם בְּאֶרֶץ אֹיְבֵיכֶם
  chosen: while you are in the land of your enemies
  alternatives:
  - while you are in your enemies' land
  - and you are in the land of your enemies
  lexicon: HALOT
  rationale: The clause is circumstantial, indicating the period during which the
    land lies desolate. 'While you are' best conveys the temporal force in smooth
    English.
- source_word: תִּשְׁבַּת
  chosen: will rest
  alternatives:
  - will cease
  - will keep Sabbath
  lexicon: HALOT
  rationale: From שבת, here the land ceases from cultivation and thus rests. 'Will
    rest' is idiomatic and fits the sabbatical theme; 'keep Sabbath' is possible but
    less natural with 'land' as subject in English.
