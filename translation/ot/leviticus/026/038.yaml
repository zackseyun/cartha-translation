theological_decisions:
- issue: Metaphorical force of 'the land ... will consume you'
  chosen_reading: Retain the metaphor of the enemies' land consuming the exiles as
    a covenant-curse image.
  alternative_readings:
  - Paraphrase as 'the land of your enemies will destroy you'
  rationale: The Hebrew uses the common verb 'eat/consume' metaphorically with the
    land as subject. Preserving the image maintains the severity and literary texture
    of the curse without adding doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
