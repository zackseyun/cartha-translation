id: LEV.26.38
reference: Leviticus 26:38
source:
  edition: WLC
  text: וַ/אֲבַדְתֶּ֖ם בַּ/גּוֹיִ֑ם וְ/אָכְלָ֣ה אֶתְ/כֶ֔ם אֶ֖רֶץ אֹיְבֵי/כֶֽם׃
translation:
  text: You will perish among the nations, and the land of your enemies will consume
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of your enemies will devour you.' The Hebrew verb is literally
      'eat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲבַדְתֶּם
  chosen: you will perish
  alternatives:
  - you will be lost
  - you will vanish
  - you will be destroyed
  lexicon: HALOT
  rationale: From אבד in the Qal with prefixed waw, here expressing the consequence
    in the covenant-curse sequence. 'Perish' best captures ruin/destruction without
    over-specifying violent killing; 'be destroyed' is possible but slightly stronger
    and less natural with the following locative phrase 'among the nations.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - in the nations
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם means 'nations/peoples.' 'Among the nations' is idiomatic in
    English and fits the exile context. 'Gentiles' would import later Jewish/Christian
    usage not required here.
- source_word: וְאָכְלָה
  chosen: will consume
  alternatives:
  - will eat up
  - will devour
  lexicon: HALOT
  rationale: From אכל, literally 'eat.' With 'land' as subject, the verb is metaphorical
    for swallowing up or consuming those in exile. 'Consume' preserves the metaphor's
    force in natural English; 'devour' is vivid but slightly more personified.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct-object marker with 2mp suffix, represented naturally in English
    as the object 'you.'
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/earth/country. In covenantal exile context, 'the
    land of your enemies' is the most natural and specific rendering.
- source_word: אֹיְבֵיכֶם
  chosen: of your enemies
  alternatives:
  - belonging to your enemies
  - of those hostile to you
  lexicon: HALOT
  rationale: Construct phrase modifying 'land.' 'Your enemies' is the straightforward
    rendering and preserves the covenant-judgment setting.
