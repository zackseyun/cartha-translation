theological_decisions:
- issue: Whether to render שׁמע ל as 'listen to me' or the more interpretive 'obey
    me'
  chosen_reading: listen to me
  alternative_readings:
  - obey me
  rationale: The Hebrew wording literally speaks of listening to Yahweh, and the next
    clause separately states not doing the commandments. Rendering the first clause
    as 'listen to me' preserves the textual distinction and avoids collapsing hearing
    and doing into one expression.
  doctrine_reference: Translation philosophy §3, §5
