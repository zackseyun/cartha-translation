id: LEV.26.14
reference: Leviticus 26:14
source:
  edition: WLC
  text: וְ/אִם לֹ֥א תִשְׁמְע֖וּ לִ֑/י וְ/לֹ֣א תַעֲשׂ֔וּ אֵ֥ת כָּל הַ/מִּצְוֺ֖ת הָ/אֵֽלֶּה־־׃
translation:
  text: But if you do not listen to me and do not do all these commandments,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obey me.' The Hebrew verb can carry the sense of obedient listening,
      though the main text preserves the more literal wording 'listen to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction introduces a contrast with the preceding blessings section,
    so 'But if' best captures the adversative force in context while preserving the
    conditional sense of אִם.
- source_word: לֹא
  chosen: do not
  alternatives:
  - will not
  - do not
  lexicon: HALOT
  rationale: With the imperfect verb, the negation is rendered as a present/future
    conditional in English. 'Do not' fits the protasis naturally in modern English.
- source_word: תִשְׁמְעוּ לִי
  chosen: listen to me
  alternatives:
  - obey me
  - hear me
  lexicon: HALOT
  rationale: שׁמע with ל can mean 'listen to' and by implication 'obey.' Here 'listen
    to me' preserves the literal auditory-relational wording without over-interpreting,
    while the following clause about doing the commandments makes the obedience sense
    explicit.
- source_word: וְלֹא
  chosen: and do not
  alternatives:
  - nor
  - and not
  lexicon: HALOT
  rationale: A straightforward coordination of the second negated clause. 'And do
    not' is clear and natural in English.
- source_word: תַעֲשׂוּ
  chosen: do
  alternatives:
  - carry out
  - observe
  - practice
  lexicon: HALOT
  rationale: עשה is broad and commonly rendered 'do' in legal contexts. 'Do' keeps
    the wording simple and close to the Hebrew.
- source_word: אֵת כָּל
  chosen: all
  alternatives:
  - the whole of
  - every one of
  lexicon: HALOT
  rationale: The direct-object marker אֵת is untranslated in English; כָּל contributes
    the sense 'all.' The phrase is naturally rendered 'all these commandments.'
- source_word: הַמִּצְוֺת
  chosen: commandments
  alternatives:
  - commands
  - statutes
  lexicon: HALOT
  rationale: מִצְוֺת specifically denotes commands/commandments. 'Commandments' preserves
    the covenantal-legal register better than the more generic 'commands.'
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - here
  - these here
  lexicon: HALOT
  rationale: A simple demonstrative referring to the commands just set forth; 'these'
    is the natural English equivalent.
