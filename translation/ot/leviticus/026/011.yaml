theological_decisions:
- issue: Whether מִשְׁכָּן should be rendered with the cultic term 'tabernacle' or
    the broader 'dwelling place'
  chosen_reading: my dwelling place
  alternative_readings:
  - my tabernacle
  rationale: The Hebrew word can denote the tabernacle, but in this promise formula
    the emphasis is God's dwelling among the people. 'Dwelling place' better reflects
    the lexical sense while allowing the cultic resonance to remain available by context
    and footnote, without importing a narrower reading than the text itself requires.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether נַפְשִׁי should be idiomatically flattened to 'I' or retained as
    'my soul'
  chosen_reading: my soul will not abhor you
  alternative_readings:
  - I will not abhor you
  - I will not reject you
  rationale: The Hebrew explicitly uses 'my soul,' and the translation philosophy
    favors preserving significant source-language features unless readability plainly
    forbids it. Retaining 'my soul' preserves the personal and affective force of
    the statement without creating doctrinal distortion.
  doctrine_reference: Translation philosophy §1, §5
