id: LEV.26.11
reference: Leviticus 26:11
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י מִשְׁכָּנִ֖/י בְּ/תוֹכְ/כֶ֑ם וְ/לֹֽא תִגְעַ֥ל נַפְשִׁ֖/י אֶתְ/כֶֽם־׃
translation:
  text: And I will set my dwelling place among you, and my soul will not abhor you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my tabernacle.' The Hebrew מִשְׁכָּן can refer specifically to the tabernacle,
      but more broadly means 'dwelling place.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my soul will not abhor you,' an idiom expressing deep personal revulsion
      that is here denied.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will set
  alternatives:
  - And I will place
  - And I will give
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' With 'my dwelling place' as object,
    idiomatic English prefers 'set' or 'place' rather than 'give.' 'Set' preserves
    the concrete sense without sounding wooden.
- source_word: מִשְׁכָּנִי
  chosen: my dwelling place
  alternatives:
  - my tabernacle
  - my dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן denotes a dwelling place, often specifically the tabernacle.
    In this covenant-blessing context, 'dwelling place' preserves the lexical sense
    and broader theological idea of God's habitation among his people without prematurely
    narrowing it to the cultic structure alone. 'Tabernacle' is possible but more
    tradition-bound and potentially too specific here.
- source_word: בְּתוֹכְכֶם
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: The phrase means 'in the midst of you.' 'Among you' is natural modern
    English and accurately conveys communal presence. 'Within you' could suggest inward
    individual indwelling, which is not the plain sense in this Hebrew context.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - and not
  lexicon: HALOT
  rationale: The conjunction plus negation straightforwardly coordinates the second
    clause with negation.
- source_word: תִגְעַל
  chosen: will ... abhor
  alternatives:
  - will reject
  - will loathe
  - will detest
  lexicon: HALOT
  rationale: געל conveys revulsion or abhorrence. 'Abhor' preserves the strong covenantal
    and affective force better than the weaker 'reject,' while remaining readable.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my being
  lexicon: HALOT
  rationale: נפש literally means 'soul/self/life.' Retaining 'my soul' preserves the
    Hebrew idiom and intensity of personal aversion. Rendering simply 'I' would flatten
    the expression; 'my being' is possible but less idiomatic in English Bible style.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker with 2mp suffix; rendered as the English object
    'you'.
