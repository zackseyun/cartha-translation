theological_decisions:
- issue: Rendering the covenant-judgment idiom בקרי in reciprocal statements about
    God and Israel
  chosen_reading: contrary
  alternative_readings:
  - in hostility
  - in opposition
  rationale: The verse depicts covenant reciprocity in judgment without importing
    later theological categories. 'Contrary' preserves the idiomatic and literary
    repetition across Leviticus 26 and avoids overinterpreting the term as emotional
    hostility alone.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Degree of literalness in the punishment formula שבע
  chosen_reading: sevenfold
  alternative_readings:
  - seven times
  rationale: The phrase is retained in a form that preserves the text's rhetorical
    intensity and theological warning without flattening it into a merely arithmetic
    statement.
  doctrine_reference: Translation philosophy §§1, 3, 6
