id: LEV.26.24
reference: Leviticus 26:24
source:
  edition: WLC
  text: וְ/הָלַכְתִּ֧י אַף אֲנִ֛י עִמָּ/כֶ֖ם בְּ/קֶ֑רִי וְ/הִכֵּיתִ֤י אֶתְ/כֶם֙ גַּם
    אָ֔נִי שֶׁ֖בַע עַל חַטֹּאתֵי/כֶֽם־־־׃
translation:
  text: then I also will walk contrary to you, and I myself will strike you sevenfold
    for your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with hostility' / 'in opposition.' The Hebrew term translated 'contrary'
      is a repeated keyword in Leviticus 26 describing reciprocal opposition between
      Israel and the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'seven times for your sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הָלַכְתִּי
  chosen: then I ... will walk
  alternatives:
  - and I will walk
  lexicon: HALOT
  rationale: הלך literally means 'walk/go.' In this covenant-judgment context, 'walk'
    preserves the repeated idiom from the surrounding passage rather than paraphrasing
    to 'act' or 'proceed.' The prefixed conjunction is rendered contextually as 'then'
    to reflect the apodosis-like progression of warnings.
- source_word: אַף אֲנִי
  chosen: I also
  alternatives:
  - even I
  - I myself also
  lexicon: HALOT
  rationale: 'The combination adds emphasis: God in turn will respond. ''I also''
    captures the reciprocal force succinctly in English.'
- source_word: עִמָּכֶם
  chosen: to you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Although literally 'with you,' English idiom with 'walk contrary' more
    naturally takes 'to' or 'against.' Because the hostility is already carried by
    בקרי, 'to you' preserves readability without overloading the preposition.
- source_word: בְּ/קֶרִי
  chosen: contrary
  alternatives:
  - in hostility
  - with hostility
  - in opposition
  lexicon: HALOT
  rationale: קרי in Leviticus 26 is a key repeated term describing oppositional or
    hostile conduct. 'Contrary' preserves the established covenant lawsuit idiom and
    echoes the reciprocal pattern of Israel's and God's stance in this chapter.
- source_word: וְ/הִכֵּיתִי
  chosen: and ... will strike
  alternatives:
  - and ... will smite
  - and ... will strike down
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Strike' is clear modern English and
    avoids archaic diction while retaining the force of punitive action.
- source_word: גַּם אָ֔נִי
  chosen: I myself
  alternatives:
  - I also
  - even I
  lexicon: HALOT
  rationale: This second emphatic self-reference heightens the directness of divine
    action. 'I myself' brings out the emphasis without sounding archaic.
- source_word: שֶׁבַע
  chosen: sevenfold
  alternatives:
  - seven times
  lexicon: HALOT
  rationale: In Leviticus 26 this term functions idiomatically for intensified punishment.
    'Sevenfold' is the conventional and concise English equivalent, while 'seven times'
    is possible but can sound more strictly numerical than the idiom requires.
- source_word: עַל חַטֹּאתֵיכֶם
  chosen: for your sins
  alternatives:
  - because of your sins
  - on account of your sins
  lexicon: HALOT
  rationale: The preposition על here marks the basis or cause of punishment. 'For
    your sins' is natural English and preserves the causal sense.
