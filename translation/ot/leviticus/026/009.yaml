theological_decisions:
- issue: Whether to make the favorable sense of God's turning explicit
  chosen_reading: Retain the concrete expression 'I will turn toward you' in the main
    text
  alternative_readings:
  - I will look favorably on you
  rationale: The context clearly conveys blessing, but the Hebrew verb itself is the
    ordinary verb 'turn.' Preserving the image maintains transparency to the source
    while allowing readers to infer the favorable sense from context.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not paraphrase beyond what the source warrants.'
- issue: Rendering the covenant formula of fruitfulness and multiplication
  chosen_reading: Use 'make you fruitful and multiply you'
  alternative_readings:
  - make you fertile and increase your numbers
  rationale: This preserves the recognizable covenant/blessing diction that echoes
    earlier Pentateuchal promises without flattening it into a merely demographic
    statement.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
