id: LEV.26.9
reference: Leviticus 26:9
source:
  edition: WLC
  text: וּ/פָנִ֣יתִי אֲלֵי/כֶ֔ם וְ/הִפְרֵיתִ֣י אֶתְ/כֶ֔ם וְ/הִרְבֵּיתִ֖י אֶתְ/כֶ֑ם
    וַ/הֲקִימֹתִ֥י אֶת בְּרִיתִ֖/י אִתְּ/כֶֽם־׃
translation:
  text: And I will turn toward you and make you fruitful and multiply you, and I will
    establish my covenant with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look favorably on you.' The Hebrew literally says 'turn toward you,'
      which in context implies divine favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָנִיתִי
  chosen: I will turn toward
  alternatives:
  - I will look favorably on
  - I will turn to
  lexicon: HALOT
  rationale: פנה literally denotes turning toward. In this covenant-blessing context
    it implies favorable regard, but 'turn toward' preserves the concrete Hebrew image
    without over-interpreting it as an idiom of favor alone.
- source_word: אֲלֵיכֶם
  chosen: toward you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks direction toward the addressees.
    'Toward you' fits the verbal image of turning.
- source_word: וְהִפְרֵיתִי
  chosen: make you fruitful
  alternatives:
  - make you fertile
  - cause you to be fruitful
  lexicon: HALOT
  rationale: 'The Hiphil of פרה is causative: God causes the people to be fruitful.
    ''Make you fruitful'' is natural English and preserves the covenantal echo of
    fruitfulness promises.'
- source_word: וְהִרְבֵּיתִי
  chosen: multiply you
  alternatives:
  - increase you greatly
  - make you numerous
  lexicon: HALOT
  rationale: The Hiphil of רבה means to make numerous or multiply. 'Multiply you'
    keeps the close connection with the recurring biblical blessing formula 'be fruitful
    and multiply.'
- source_word: וַהֲקִימֹתִי
  chosen: I will establish
  alternatives:
  - I will confirm
  - I will uphold
  lexicon: HALOT
  rationale: The Hiphil of קום with 'covenant' commonly means to establish or confirm
    a covenant. 'Establish' is the most standard and transparent rendering in covenant
    contexts.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in the Hebrew Bible. 'Covenant'
    preserves its theological and canonical significance better than less formal alternatives.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition here marks covenant relationship with the people. 'With
    you' is the direct and idiomatic rendering.
