id: LEV.26.29
reference: Leviticus 26:29
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּ֖ם בְּשַׂ֣ר בְּנֵי/כֶ֑ם וּ/בְשַׂ֥ר בְּנֹתֵי/כֶ֖ם תֹּאכֵֽלוּ׃
translation:
  text: And you will eat the flesh of your sons, and you will eat the flesh of your
    daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  chosen: you will eat
  alternatives:
  - you shall eat
  - then you will eat
  lexicon: HALOT
  rationale: From אכל, Qal 2mp with prefixed waw in this judgment sequence. In context
    of covenant curses, English future 'you will eat' best conveys the predictive
    force without archaic 'shall.' The conjunction is absorbed into the sentence-initial
    'And' rather than rendered as 'then.'
- source_word: בְּשַׂר
  chosen: the flesh
  alternatives:
  - flesh
  - meat
  lexicon: HALOT
  rationale: בָּשָׂר denotes flesh. 'Flesh' preserves the stark, horrific literal
    sense of cannibalism better than 'meat,' which can sound euphemistic or culinary.
    The English article is supplied naturally in apposition with the following construct
    phrase.
- source_word: בְּנֵיכֶם
  chosen: of your sons
  alternatives:
  - of your children
  lexicon: HALOT
  rationale: The masculine plural construct of 'sons' should be rendered specifically,
    not generalized to 'children,' because the next phrase separately names daughters.
    This preserves the source's gender-specific pairing.
- source_word: וּבְשַׂר
  chosen: and the flesh
  alternatives:
  - and flesh
  - and the meat
  lexicon: HALOT
  rationale: Repeated noun retained in English for the Hebrew parallelism and rhetorical
    force. 'And the flesh' mirrors the first clause and preserves the grim cadence.
- source_word: בְּנֹתֵיכֶם
  chosen: of your daughters
  alternatives:
  - of your female children
  lexicon: HALOT
  rationale: Direct rendering of 'your daughters' preserves the explicit male/female
    pairing in the Hebrew and avoids unnecessary expansion.
- source_word: תֹּאכֵלוּ
  chosen: you will eat
  alternatives:
  - you shall eat
  lexicon: HALOT
  rationale: The second finite verb is repeated in Hebrew and should be repeated in
    English rather than omitted, preserving emphasis and the parallel structure of
    the warning.
