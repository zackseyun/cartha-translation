theological_decisions:
- issue: Rendering a covenant-curse statement of cannibalism
  chosen_reading: 'A direct predictive judgment statement: ''you will eat the flesh
    of your sons ... daughters'''
  alternative_readings:
  - A softened idiomatic rendering
  rationale: The verse is a literal covenant-curse warning and should not be euphemized.
    A direct rendering preserves the gravity of divine judgment without importing
    additional theological explanation.
  doctrine_reference: Translation philosophy §§1, 6
