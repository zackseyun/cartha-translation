id: LEV.18.24
reference: Leviticus 18:24
source:
  edition: WLC
  text: אַל תִּֽטַּמְּא֖וּ בְּ/כָל אֵ֑לֶּה כִּ֤י בְ/כָל אֵ֨לֶּה֙ נִטְמְא֣וּ הַ/גּוֹיִ֔ם
    אֲשֶׁר אֲנִ֥י מְשַׁלֵּ֖חַ מִ/פְּנֵי/כֶֽם־־־־׃
translation:
  text: Do not make yourselves unclean by any of these things, for by all these things
    the nations that I am driving out before you became unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not defile yourselves by any of these things ... the nations ...
      were defiled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You must not
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. 'Do not' is clear modern
    English and preserves the direct prohibitive force without adding emphasis not
    explicit in the Hebrew.
- source_word: תִּטַּמְּאוּ
  chosen: make yourselves unclean
  alternatives:
  - defile yourselves
  - become unclean
  lexicon: HALOT
  rationale: The Hitpael/imperfect of טמא is reflexive here, so 'make yourselves unclean'
    best reflects the self-involving action. 'Defile yourselves' is traditional and
    possible, but 'unclean' better preserves the ritual-moral vocabulary of the chapter.
- source_word: בְּכָל אֵלֶּה
  chosen: by any of these things
  alternatives:
  - with any of these things
  - in any of these things
  lexicon: HALOT
  rationale: The preposition ב with 'all these' here marks means or sphere. 'By any
    of these things' communicates the instrumental sense naturally in English while
    fitting the negative prohibition.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: כִּי introduces the ground for the prohibition. 'For' is concise and
    preserves the explanatory connection.
- source_word: נִטְמְאוּ
  chosen: became unclean
  alternatives:
  - were defiled
  - defiled themselves
  lexicon: HALOT
  rationale: The Niphal of טמא is passive/stative here. 'Became unclean' reflects
    resultant state without overcommitting to a causative nuance. It also maintains
    lexical consistency with the earlier 'unclean.'
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם in this context refers to the non-Israelite peoples inhabiting
    the land. 'The nations' is the standard and contextually appropriate rendering;
    'Gentiles' would sound anachronistic in English here.
- source_word: אֲשֶׁר אֲנִי מְשַׁלֵּחַ
  chosen: that I am driving out
  alternatives:
  - that I am sending away
  - that I am casting out
  lexicon: HALOT
  rationale: Though שׁלח often means 'send,' in this land-judgment context it carries
    the sense of expelling/removing. 'Driving out' best matches the contextual force
    and common biblical idiom for dispossessing nations.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - ahead of you
  lexicon: HALOT
  rationale: Literally 'from before you,' but in idiomatic English with expulsion
    language, 'before you' conveys removal from Israel's presence/advance. This keeps
    the sense natural without losing the spatial idea.
