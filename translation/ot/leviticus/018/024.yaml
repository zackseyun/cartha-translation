theological_decisions:
- issue: Ritual-moral impurity terminology in Leviticus 18
  chosen_reading: unclean / became unclean
  alternative_readings:
  - defile / were defiled
  rationale: The chapter treats prohibited sexual practices as causing real impurity.
    Rendering טמא with 'unclean' preserves the Levitical category without importing
    a narrower merely ceremonial or a more rhetorically charged English term. The
    alternative 'defile' is valid and traditional, but the chosen wording better maintains
    conceptual continuity within holiness language.
  doctrine_reference: Translation philosophy §§1, 5, 6
