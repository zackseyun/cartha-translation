id: LEV.18.11
reference: Leviticus 18:11
source:
  edition: WLC
  text: עֶרְוַ֨ת בַּת אֵ֤שֶׁת אָבִ֨י/ךָ֙ מוֹלֶ֣דֶת אָבִ֔י/ךָ אֲחוֹתְ/ךָ֖ הִ֑וא לֹ֥א
    תְגַלֶּ֖ה עֶרְוָתָֽ/הּ־׃ס
translation:
  text: You shall not uncover the nakedness of your father's wife's daughter, begotten
    by your father; she is your sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she is your half-sister.' The Hebrew says literally, 'she is your sister,'
      with the preceding description specifying the relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת / עֶרְוָתָהּ
  chosen: the nakedness of ... / her nakedness
  alternatives:
  - the shame of ... / her shame
  - the private parts of ... / her private parts
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה is a fixed idiom in sexual-prohibition formulas
    ('uncover nakedness'). Rendering it as 'nakedness' preserves the legal-idiomatic
    force and inter-verse consistency better than more interpretive options like 'shame'
    or anatomically explicit paraphrase.
- source_word: בַּת
  chosen: daughter
  lexicon: HALOT
  rationale: Straightforward kinship term; retained literally.
- source_word: אֵשֶׁת אָבִיךָ
  chosen: your father's wife
  alternatives:
  - your stepmother
  lexicon: HALOT
  rationale: The Hebrew expression is explicitly relational ('wife of your father').
    'Stepmother' could be inferred, but the verse focuses on the daughter of that
    woman, so the more literal phrase avoids over-compression and preserves the source
    wording.
- source_word: מוֹלֶדֶת אָבִיךָ
  chosen: begotten by your father
  alternatives:
  - born to your father
  - fathered by your father
  lexicon: HALOT
  rationale: This participial/noun form marks biological descent. 'Begotten by your
    father' is slightly formal but concise and preserves the paternal-genetic emphasis.
    'Born to your father' is less idiomatic in English, and 'fathered by your father'
    is possible but stylistically rougher.
- source_word: אֲחוֹתְךָ הִוא
  chosen: she is your sister
  alternatives:
  - she is your half-sister
  lexicon: HALOT
  rationale: The Hebrew states the kinship directly without adding 'half-'. While
    the relationship is effectively that of a half-sister, the text's own wording
    is broader and should be preserved in the main text.
- source_word: לֹא תְגַלֶּה
  chosen: You shall not uncover
  alternatives:
  - You must not uncover
  - Do not uncover
  lexicon: HALOT
  rationale: This is the standard legal prohibition formula in the chapter. 'You shall
    not' fits English legal-register style and maintains consistency across the holiness
    code.
