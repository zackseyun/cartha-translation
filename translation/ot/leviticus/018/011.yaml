theological_decisions:
- issue: Whether to specify the relation as 'half-sister' in the main text
  chosen_reading: Retain the source-level wording 'she is your sister' and let the
    preceding qualifiers define the relationship.
  alternative_readings:
  - she is your half-sister
  rationale: The verse itself explains the precise family relation by describing her
    as the daughter of your father's wife, begotten by your father, then concludes
    'she is your sister.' Adding 'half-' in the main text clarifies but also interprets
    beyond the explicit wording. Optimal equivalence favors preserving the Hebrew
    formulation while allowing the genealogy to do the clarifying work.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it unnecessarily.'
