theological_decisions:
- issue: Rendering sexual-impurity language without reducing it to either merely ritual
    or importing later doctrinal categories
  chosen_reading: to become unclean with it
  alternative_readings:
  - for uncleanness with it
  - defile yourself with it
  rationale: The verse presents the act as defiling and morally disordered. 'Become
    unclean' preserves the biblical category of impurity without narrowing it to ceremonial
    impurity alone or paraphrasing beyond the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering תֶּבֶל
  chosen_reading: perversion
  alternative_readings:
  - confusion
  - outrage
  rationale: The term marks the act as a violation of created/moral order. 'Perversion'
    communicates that force in modern English more accurately than the traditional
    'confusion,' which now commonly suggests mere mental uncertainty.
  doctrine_reference: Translation philosophy §§1, 6
