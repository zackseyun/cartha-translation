id: LEV.18.23
reference: Leviticus 18:23
source:
  edition: WLC
  text: וּ/בְ/כָל בְּהֵמָ֛ה לֹא תִתֵּ֥ן שְׁכָבְתְּ/ךָ֖ לְ/טָמְאָה בָ֑/הּ וְ/אִשָּׁ֗ה
    לֹֽא תַעֲמֹ֞ד לִ/פְנֵ֧י בְהֵמָ֛ה לְ/רִבְעָ֖/הּ תֶּ֥בֶל הֽוּא־־־־׃
translation:
  text: And with any animal you shall not give your lying to become unclean with it,
    and a woman shall not stand before an animal to mate with it; it is a perversion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for uncleanness with it' or 'thereby defiling yourself with it.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to lie down/mount'; the phrase refers to sexual intercourse with
      an animal.
    reason: lexical_alternative
  - marker: c
    text: Or 'confusion' or 'outrage'; the Hebrew term denotes a violation of proper
      order, especially in a sexual context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל בְּהֵמָה
  chosen: And with any animal
  alternatives:
  - And with any beast
  - And with any livestock
  lexicon: HALOT
  rationale: בְּהֵמָה broadly denotes an animal/beast, often domesticated but not
    necessarily limited to livestock in English perception. 'Any animal' is natural
    modern English and preserves the comprehensive force of כָּל.
- source_word: לֹא תִתֵּן
  chosen: you shall not give
  alternatives:
  - you shall not have
  - you shall not lie
  lexicon: HALOT
  rationale: The verb is literally 'give.' Retaining 'give' preserves the Hebrew idiom
    rather than replacing it with a smoother but less transparent euphemism. The following
    object supplies the sexual sense.
- source_word: שְׁכָבְתְּךָ
  chosen: your lying
  alternatives:
  - your emission
  - your sexual lying
  - your bed
  lexicon: HALOT
  rationale: From שָׁכַב / שְׁכֹבֶת language for lying down sexually. 'Your lying'
    is slightly formal but transparent and avoids over-specifying the exact nuance
    beyond the Hebrew idiom.
- source_word: לְטָמְאָה בָהּ
  chosen: to become unclean with it
  alternatives:
  - for uncleanness with it
  - thereby making yourself unclean with it
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose tied to ritual-moral defilement.
    'To become unclean with it' is readable and preserves the defilement concept without
    flattening it to merely ceremonial impurity.
- source_word: וְאִשָּׁה
  chosen: and a woman
  alternatives:
  - and a wife
  lexicon: HALOT
  rationale: אִשָּׁה here is generic 'woman,' not specifically 'wife.' This preserves
    the gender-specific wording of the Hebrew.
- source_word: לֹא תַעֲמֹד לִפְנֵי בְהֵמָה
  chosen: shall not stand before an animal
  alternatives:
  - shall not present herself before an animal
  - shall not stand in front of an animal
  lexicon: HALOT
  rationale: The idiom likely means placing oneself before the animal for sexual use.
    'Stand before' is the most transparent formal rendering; the sexual purpose is
    clarified by the following infinitive.
- source_word: לְרִבְעָהּ
  chosen: to mate with it
  alternatives:
  - for it to mount her
  - to be mounted by it
  - to copulate with it
  lexicon: HALOT
  rationale: The root רבע in this context refers to animal mounting/sexual intercourse.
    'To mate with it' is readable and communicates the sexual act without crude overstatement.
    The feminine suffix indicates the woman as object of the act, but English can
    express the prohibition naturally this way.
- source_word: תֶּבֶל
  chosen: a perversion
  alternatives:
  - confusion
  - an outrage
  - a violation of order
  lexicon: HALOT
  rationale: תֶּבֶל denotes a violation of proper order, often in sexual contexts.
    'Perversion' best captures the moral-disordering sense in contemporary English.
    'Confusion' is too weak or misleading in modern usage.
- source_word: הוּא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: Simple predication referring to the prohibited act as a category judgment.
