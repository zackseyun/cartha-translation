theological_decisions:
- issue: Nature of the Molech prohibition
  chosen_reading: Render the act idiomatically but without explicitly stating 'sacrifice
    by fire' in the main text.
  alternative_readings:
  - Render as 'sacrifice any of your children to Molech'
  - Render as 'make your offspring pass through the fire to Molech'
  rationale: The Hebrew says 'give ... to make pass over to Molech.' While the broader
    canon strongly associates this with child sacrifice and often with fire, this
    verse itself does not explicitly mention fire. To avoid importing more than the
    text states, the main text preserves the idiom, while a footnote records the likely
    ritual sense.
  doctrine_reference: 'Translation philosophy 1 and 3: original-language primacy;
    preserve theological tension rather than resolve it'
- issue: Referent of זרע in this law
  chosen_reading: Use 'offspring' rather than the more specific 'children' in the
    main text.
  alternative_readings:
  - children
  - seed
  rationale: The Hebrew term is broader than a single age category and literally means
    'seed/offspring.' 'Offspring' is accurate and natural, while a footnote can preserve
    the common alternative 'children.'
  doctrine_reference: 'Translation philosophy 5: consistency of key terms, or documented
    exception'
