id: LEV.18.21
reference: Leviticus 18:21
source:
  edition: WLC
  text: וּ/מִֽ/זַּרְעֲ/ךָ֥ לֹא תִתֵּ֖ן לְ/הַעֲבִ֣יר לַ/מֹּ֑לֶךְ וְ/לֹ֧א תְחַלֵּ֛ל
    אֶת שֵׁ֥ם אֱלֹהֶ֖י/ךָ אֲנִ֥י יְהוָֽה־־׃
translation:
  text: And you shall not give any of your offspring to make them pass over to Molech,
    and you shall not profane the name of your God. I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any of your children.' The Hebrew literally says 'from your seed.'
    reason: lexical_alternative
  - marker: b
    text: That is, to a rite associated with Molech; many understand this as child
      sacrifice, often described elsewhere as making children 'pass through the fire.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִזַּרְעֲךָ
  chosen: any of your offspring
  alternatives:
  - from your seed
  - any of your children
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed,' but in this legal context it refers to
    one's descendants/children. 'Any of your offspring' preserves the partitive מִן
    ('from, any of') and avoids over-literal English while retaining the familial
    sense.
- source_word: תִתֵּן
  chosen: you shall not give
  alternatives:
  - you must not give
  lexicon: HALOT
  rationale: נתן is the ordinary verb 'give.' In legal material, 'shall not' gives
    clear prohibitive force in natural English while staying close to the Hebrew.
- source_word: לְהַעֲבִיר
  chosen: to make them pass over
  alternatives:
  - to pass through
  - to present
  lexicon: HALOT
  rationale: The Hiphil of עבר means 'cause to pass.' The phrase is associated with
    a Molech rite, often understood as child sacrifice or a ritual passing through
    fire. 'Make them pass over' keeps the Hebrew idiom without importing a full interpretive
    conclusion into the main text.
- source_word: לַמֹּלֶךְ
  chosen: to Molech
  alternatives:
  - to the Molech
  - to Milcom
  lexicon: HALOT
  rationale: The pointing and traditional understanding support the proper name 'Molech,'
    referring to the deity associated with the prohibited rite. Rendering it as a
    name is clearer in English than a literalized form with the article.
- source_word: תְחַלֵּל
  chosen: you shall not profane
  alternatives:
  - you shall not defile
  - you shall not desecrate
  lexicon: HALOT
  rationale: חלל in the Piel commonly means 'profane, desecrate.' 'Profane' best matches
    the covenantal/legal register and the object 'the name of your God.'
- source_word: שֵׁם אֱלֹהֶיךָ
  chosen: the name of your God
  alternatives:
  - your God's name
  lexicon: HALOT
  rationale: A formal but natural rendering that preserves the theological weight
    of 'name' in covenant context, where God's name represents his revealed honor
    and reputation among his people.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
