id: LEV.18.16
reference: Leviticus 18:16
source:
  edition: WLC
  text: עֶרְוַ֥ת אֵֽשֶׁת אָחִ֖י/ךָ לֹ֣א תְגַלֵּ֑ה עֶרְוַ֥ת אָחִ֖י/ךָ הִֽוא־׃ס
translation:
  text: You shall not uncover the nakedness of your brother’s wife; it is your brother’s
    nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'You shall not have sexual relations with your brother’s
      wife.' The Hebrew uses the idiom 'uncover the nakedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the private parts of
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה in the idiom גלה ערוה is a fixed legal-euphemistic
    expression for prohibited sexual exposure or relations. 'Uncover the nakedness
    of' preserves the established idiom and its legal force better than reducing it
    to a more interpretive paraphrase.
- source_word: אֵשֶׁת
  chosen: wife of
  alternatives:
  - woman of
  lexicon: HALOT
  rationale: 'In construct with ''your brother,'' the sense is specifically marital:
    ''your brother’s wife.'' ''Woman'' would be too broad and less precise in this
    legal context.'
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Straightforward kinship term. The masculine singular is retained in English
    in keeping with the source and the legal address to the male Israelite.
- source_word: לֹא תְגַלֶּה
  chosen: you shall not uncover
  alternatives:
  - do not uncover
  - you must not uncover
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material is well rendered as a prohibition.
    'You shall not' matches the covenant-law register of the chapter while remaining
    natural English.
- source_word: עֶרְוַת אָחִיךָ הִוא
  chosen: it is your brother’s nakedness
  alternatives:
  - that is your brother’s nakedness
  - it belongs to your brother
  lexicon: HALOT
  rationale: The clause grounds the prohibition by identifying the brother’s wife
    sexually/juridically with the brother. Rendering the repeated עֶרְוָה as 'nakedness'
    maintains the lexical repetition and legal logic of the verse.
