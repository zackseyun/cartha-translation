theological_decisions:
- issue: Whether to make the euphemistic legal idiom explicit as a direct prohibition
    of sexual relations
  chosen_reading: Retain the Hebrew idiom 'uncover the nakedness' in the main text
  alternative_readings:
  - You shall not have sexual relations with your brother’s wife
  rationale: The Hebrew uses a conventional legal euphemism rather than a blunt expression.
    Preserving the idiom keeps the wording closer to the source and maintains consistency
    across Leviticus 18, while the meaning remains clear in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
