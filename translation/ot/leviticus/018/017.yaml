id: LEV.18.17
reference: Leviticus 18:17
source:
  edition: WLC
  text: עֶרְוַ֥ת אִשָּׁ֛ה וּ/בִתָּ֖/הּ לֹ֣א תְגַלֵּ֑ה אֶֽת בַּת בְּנָ֞/הּ וְ/אֶת בַּת
    בִּתָּ֗/הּ לֹ֤א תִקַּח֙ לְ/גַלּ֣וֹת עֶרְוָתָ֔/הּ שַׁאֲרָ֥ה הֵ֖נָּה זִמָּ֥ה הִֽוא־־־־
translation:
  text: You shall not uncover the nakedness of a woman and her daughter. You shall
    not take her son's daughter or her daughter's daughter to uncover her nakedness;
    they are her close relatives. It is depravity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her near kin' or more literally 'her flesh.'
    reason: lexical_alternative
  - marker: b
    text: '''Uncover the nakedness'' is a Hebrew idiom for prohibited sexual relations.'
    reason: cultural_note
  - marker: c
    text: Or 'wickedness,' 'lewdness,' or 'an outrageous act.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת ... תְגַלֵּה
  chosen: uncover the nakedness of
  alternatives:
  - have sexual relations with
  - expose the nakedness of
  lexicon: HALOT
  rationale: This is the standard idiom in Leviticus for prohibited sexual relations.
    Retaining 'uncover the nakedness of' preserves the legal-idiomatic force and intertextual
    consistency, while allowing the sexual meaning to remain clear from context.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: The noun can mean either 'woman' or 'wife.' Here the law concerns a female
    person together with her daughter and descendants, not necessarily a marital relationship,
    so 'woman' is the broader and safer rendering.
- source_word: וּבִתָּהּ
  chosen: and her daughter
  lexicon: HALOT
  rationale: Straightforward possessive construction; the suffix refers back to the
    woman.
- source_word: תִקַּח
  chosen: take
  alternatives:
  - marry
  - take sexually
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'take.' In this legal context it can imply
    taking a woman in marriage or sexual union. 'Take' preserves the source wording
    while the following infinitive clause clarifies the sexual prohibition.
- source_word: בַּת בְּנָהּ
  chosen: her son's daughter
  alternatives:
  - her granddaughter through her son
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew kinship structure
    and avoids over-paraphrase.
- source_word: בַּת בִּתָּהּ
  chosen: her daughter's daughter
  alternatives:
  - her granddaughter through her daughter
  lexicon: HALOT
  rationale: As above, the literal kinship expression is clear in English and preserves
    the legal specificity.
- source_word: לְגַלּוֹת עֶרְוָתָהּ
  chosen: to uncover her nakedness
  alternatives:
  - to have sexual relations with her
  lexicon: HALOT
  rationale: Repeats the governing idiom and keeps the legal style consistent. The
    singular suffix most naturally refers back to the woman, indicating that taking
    these descendants constitutes uncovering her nakedness as well.
- source_word: שַׁאֲרָה
  chosen: her close relatives
  alternatives:
  - her flesh
  - her near kin
  lexicon: HALOT
  rationale: The term denotes blood relation/kinship. 'Close relatives' communicates
    the sense naturally in modern English; 'flesh' would be more literal but less
    clear here.
- source_word: הֵנָּה
  chosen: they are
  lexicon: HALOT
  rationale: Feminine plural pronoun referring to the descendants just mentioned.
- source_word: זִמָּה
  chosen: depravity
  alternatives:
  - wickedness
  - lewdness
  - an outrageous act
  lexicon: HALOT
  rationale: The noun denotes a morally heinous, especially sexually perverse act.
    'Depravity' is concise, serious, and accessible, fitting the legal condemnation.
- source_word: הִוא
  chosen: it is
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the act characterized by
    זִמָּה.
