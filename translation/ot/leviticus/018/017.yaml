theological_decisions:
- issue: Referent of the singular suffix in 'to uncover her nakedness'
  chosen_reading: The suffix refers to the original woman, so taking her granddaughter
    is treated as uncovering the woman's nakedness as well.
  alternative_readings:
  - The suffix could be read distributively with each descendant in view.
  rationale: The immediate context begins with 'the nakedness of a woman and her daughter'
    and then extends the prohibition to her son's daughter and her daughter's daughter.
    Rendering the suffix as 'her' without expansion preserves the Hebrew linkage and
    the legal logic of the kinship prohibition.
- issue: Force of 'take' in this incest law
  chosen_reading: Retain the broader verb 'take' rather than specifying marriage alone.
  alternative_readings:
  - marry
  - take in marriage
  rationale: The verse prohibits a sexual/kinship violation, not merely a formal marriage
    contract. Keeping 'take' avoids narrowing the law beyond the Hebrew while the
    infinitive phrase explains the prohibited purpose.
