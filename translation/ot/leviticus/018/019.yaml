theological_decisions:
- issue: Whether to render the impurity language as ritual uncleanness or as a purely
    hygienic/medical condition
  chosen_reading: ritual uncleanness
  alternative_readings:
  - menstrual period
  - menstrual impurity
  rationale: The Hebrew טֻמְאָה is cultic/ritual language in Leviticus. Rendering
    it as 'uncleanness' preserves the text's own category without importing modern
    medical or moral judgments beyond the source.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense'
