id: LEV.18.19
reference: Leviticus 18:19
source:
  edition: WLC
  text: וְ/אֶל אִשָּׁ֖ה בְּ/נִדַּ֣ת טֻמְאָתָ֑/הּ לֹ֣א תִקְרַ֔ב לְ/גַלּ֖וֹת עֶרְוָתָֽ/הּ־׃
translation:
  text: You shall not approach a woman during her menstrual uncleanness to uncover
    her nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'during her menstrual impurity.' The Hebrew uses ritual-purity language.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: approach ... a woman
  alternatives:
  - to a woman
  - toward a woman
  lexicon: HALOT
  rationale: The preposition אֶל with the verb קָרַב forms the idiom 'approach' rather
    than a more wooden 'to/toward.' English expresses the prohibition naturally by
    attaching the directional sense to the verb.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' In this list of sexual prohibitions
    the term is indefinite and not marked as possessive, so 'a woman' best reflects
    the generic scope.
- source_word: בְּ/נִדַּת טֻמְאָתָהּ
  chosen: during her menstrual uncleanness
  alternatives:
  - in her menstrual impurity
  - in the uncleanness of her menstruation
  lexicon: HALOT
  rationale: נִדָּה refers here to the menstruation-related state of separation/impurity,
    and טֻמְאָה denotes ritual uncleanness. 'During her menstrual uncleanness' is
    clear modern English that preserves the ritual category without paraphrasing it
    away.
- source_word: לֹא תִקְרַב
  chosen: You shall not approach
  alternatives:
  - Do not come near
  - You must not approach
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material is well represented by 'shall
    not.' 'Approach' preserves the formal legal tone and the sexual-context nuance
    of coming near for intercourse.
- source_word: לְ/גַלּוֹת
  chosen: to uncover
  alternatives:
  - to expose
  - to reveal
  lexicon: HALOT
  rationale: גלה in this idiom is conventionally and accurately rendered 'uncover.'
    This preserves the legal euphemism used throughout Leviticus 18.
- source_word: עֶרְוָתָהּ
  chosen: her nakedness
  alternatives:
  - her private parts
  lexicon: HALOT
  rationale: '''Nakedness'' is the established and contextually precise rendering
    for עֶרְוָה in Leviticus 18, especially in the idiom ''uncover nakedness,'' which
    functions as a sexual euphemism. A more explicit rendering would over-interpret
    the idiom in the main text.'
