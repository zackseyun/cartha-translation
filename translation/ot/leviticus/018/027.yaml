id: LEV.18.27
reference: Leviticus 18:27
source:
  edition: WLC
  text: כִּ֚י אֶת כָּל הַ/תּוֹעֵבֹ֣ת הָ/אֵ֔ל עָשׂ֥וּ אַנְשֵֽׁי הָ/אָ֖רֶץ אֲשֶׁ֣ר לִ/פְנֵי/כֶ֑ם
    וַ/תִּטְמָ֖א הָ/אָֽרֶץ־־־׃
translation:
  text: For the men of the land who were before you did all these abominations, and
    the land became unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the land was defiled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding prohibition/warning.
    'For' preserves the connective force in natural English.
- source_word: כָּל הַתּוֹעֵבֹת הָאֵל
  chosen: all these abominations
  alternatives:
  - all these detestable things
  lexicon: HALOT
  rationale: תּוֹעֵבָה commonly denotes something abhorrent or ritually/morally detestable.
    'Abominations' preserves the strong covenantal and moral force of the Hebrew and
    matches the plural with demonstrative emphasis.
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - committed
  - practiced
  lexicon: HALOT
  rationale: The verb is the common עשה, 'do/make.' 'Did' is the most direct rendering;
    English idiom allows 'did ... abominations' here without over-interpreting as
    a specialized legal or cultic term.
- source_word: אַנְשֵׁי הָאָרֶץ
  chosen: the men of the land
  alternatives:
  - the people of the land
  - the inhabitants of the land
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In keeping with the project's gender-accurate
    principle, 'men' is retained rather than neutralizing to 'people,' since the Hebrew
    uses a masculine plural construct. The phrase functions collectively for the prior
    inhabitants.
- source_word: אֲשֶׁר לִפְנֵיכֶם
  chosen: who were before you
  alternatives:
  - who were there before you
  - who preceded you
  lexicon: HALOT
  rationale: The relative clause identifies the prior inhabitants temporally. 'Who
    were before you' is clear, close to the Hebrew, and idiomatic.
- source_word: וַתִּטְמָא
  chosen: became unclean
  alternatives:
  - was defiled
  - became defiled
  lexicon: HALOT
  rationale: The verb טמא in the nifal/qal passive-like sense indicates becoming unclean/defiled.
    'Became unclean' preserves the process/result sense without importing a more interpretive
    nuance than necessary; 'defiled' remains a viable alternative.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In Leviticus 18 the reference is specifically to the territory inhabited
    before Israel, not the globe in general. 'Land' best fits the covenantal-geographical
    context.
