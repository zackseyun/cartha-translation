theological_decisions:
- issue: Nature of the land's impurity
  chosen_reading: the land became unclean
  alternative_readings:
  - the land was defiled
  rationale: The Hebrew presents the land as rendered impure by the prior inhabitants'
    acts. The translation preserves the text's theological-moral linkage between human
    sin and land impurity without narrowing it to either purely ritual or purely metaphorical
    categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
