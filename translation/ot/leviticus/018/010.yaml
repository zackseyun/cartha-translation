id: LEV.18.10
reference: Leviticus 18:10
source:
  edition: WLC
  text: עֶרְוַ֤ת בַּת בִּנְ/ךָ֙ א֣וֹ בַֽת בִּתְּ/ךָ֔ לֹ֥א תְגַלֶּ֖ה עֶרְוָתָ֑/ן כִּ֥י
    עֶרְוָתְ/ךָ֖ הֵֽנָּה־־׃ס
translation:
  text: You shall not uncover the nakedness of your son's daughter or of your daughter's
    daughter, because they are your nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'You shall not have sexual relations with your
      son's daughter or your daughter's daughter.' The Hebrew idiom is literally 'uncover
      the nakedness of.'
    reason: lexical_alternative
  - marker: b
    text: The closing clause is literally 'for they are your nakedness,' expressing
      that these close descendants are regarded as an extension of one's own family
      flesh and therefore sexually forbidden.
    reason: cultural_note
lexical_decisions:
- source_word: עֶרְוַת / עֶרְוָתָן / עֶרְוָתְךָ
  chosen: nakedness
  alternatives:
  - genitals
  - sexual shame
  lexicon: HALOT
  rationale: The idiom גלה ערוה in Leviticus is a fixed legal euphemism for prohibited
    sexual relations, traditionally rendered 'uncover the nakedness of.' Retaining
    'nakedness' preserves the legal-idiomatic force and intertextual consistency across
    the chapter better than a more explicit paraphrase. The final clause likewise
    keeps 'your nakedness' to mirror the Hebrew rationale that these descendants are
    considered an extension of one's own flesh/shame.
- source_word: בַּת בִּנְךָ
  chosen: your son's daughter
  alternatives:
  - your granddaughter through your son
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew kinship construction
    and legal precision. 'Your son's daughter' is natural enough in English and keeps
    the bilateral structure of the verse.
- source_word: בַת בִּתְּךָ
  chosen: your daughter's daughter
  alternatives:
  - your granddaughter through your daughter
  lexicon: HALOT
  rationale: As with the previous phrase, the direct kinship expression best preserves
    the source structure and legal specificity.
- source_word: לֹא תְגַלֶּה
  chosen: You shall not uncover
  alternatives:
  - You must not uncover
  - You shall not have sexual relations with
  lexicon: HALOT
  rationale: '''You shall not uncover'' preserves the legal register and the established
    idiom of the chapter. A more interpretive rendering such as ''have sexual relations
    with'' captures the sense but loses the repeated formula that structures Leviticus
    18.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: '''Because'' gives clear modern English while preserving the causal force
    of the Hebrew conjunction.'
- source_word: הֵנָּה
  chosen: they are
  alternatives:
  - these are
  lexicon: HALOT
  rationale: The feminine plural pronoun refers back to the two granddaughters. 'They
    are' is idiomatic English and communicates the predication cleanly.
