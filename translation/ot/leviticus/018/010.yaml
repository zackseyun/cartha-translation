theological_decisions:
- issue: Meaning of the closing rationale 'for they are your nakedness'
  chosen_reading: The clause is preserved literally to reflect the kinship-based rationale
    of incest prohibition without overexplaining it in the main text.
  alternative_readings:
  - for they are your own flesh
  - for their nakedness is as your own
  rationale: The Hebrew expresses a familial identity/extension logic rather than
    a modern analytic explanation. Keeping the literal wording preserves the text's
    own conceptual world and avoids importing a paraphrastic interpretation into the
    law.
  doctrine_reference: Translation philosophy §1, §3, §5
