theological_decisions:
- issue: Interpretation of 'the nakedness of your father'
  chosen_reading: 'Rendered as an explanatory apposition: ''the nakedness of your
    father, that is, the nakedness of your mother.'''
  alternative_readings:
  - Rendered more literally as 'the nakedness of your father and the nakedness of
    your mother'
  rationale: Within Leviticus 18:7 the second phrase and the clause 'She is your mother'
    explain the first, indicating that violating the mother is counted as uncovering
    the father's nakedness. This preserves the familial-honor logic of the law without
    obscuring the immediate referent.
