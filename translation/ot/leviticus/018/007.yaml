id: LEV.18.7
reference: Leviticus 18:7
source:
  edition: WLC
  text: עֶרְוַ֥ת אָבִ֛י/ךָ וְ/עֶרְוַ֥ת אִמְּ/ךָ֖ לֹ֣א תְגַלֵּ֑ה אִמְּ/ךָ֣ הִ֔וא לֹ֥א
    תְגַלֶּ֖ה עֶרְוָתָֽ/הּ׃ס
translation:
  text: You shall not uncover the nakedness of your father, that is, the nakedness
    of your mother. She is your mother; you shall not uncover her nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or more literally, ''You shall not uncover the nakedness of your father
      and the nakedness of your mother.'' The verse explains this as referring to
      your mother: ''She is your mother.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the genitals of
  lexicon: HALOT
  rationale: In Leviticus 18 the idiom גלה ערוה ('uncover nakedness') is a fixed euphemistic
    legal expression for prohibited sexual relations. Rendering עֶרְוָה as 'nakedness'
    preserves the idiom and its legal register better than a more explicit paraphrase,
    while still being understandable in English.
- source_word: תְגַלֵּה / תְגַלֶּה
  chosen: you shall not uncover
  alternatives:
  - you must not uncover
  - you shall not have sexual relations with
  lexicon: HALOT
  rationale: The Piel of גלה with עֶרְוָה forms the standard prohibition formula in
    this chapter. 'You shall not uncover' keeps the repeated legal idiom visible and
    avoids over-paraphrasing, though the sexual sense is implicit.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct, literal rendering of the kinship term with second masculine singular
    suffix.
- source_word: וְעֶרְוַת אִמְּךָ
  chosen: that is, the nakedness of your mother
  alternatives:
  - and the nakedness of your mother
  lexicon: HALOT
  rationale: The Hebrew coordinate phrase can be rendered woodenly as 'the nakedness
    of your father and the nakedness of your mother,' but in context the law clarifies
    that the father's nakedness is represented by the mother's. 'That is' makes explicit
    the appositional/explanatory force already reflected by the following clause 'She
    is your mother,' and matches the legal sense without adding new content.
- source_word: הִוא
  chosen: She is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring to the mother. 'She is your
    mother' preserves the emphatic explanatory statement of identity.
- source_word: אִמְּךָ
  chosen: your mother
  lexicon: HALOT
  rationale: Literal kinship term; repeated in Hebrew for emphasis and legal clarity.
