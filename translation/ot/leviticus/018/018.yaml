id: LEV.18.18
reference: Leviticus 18:18
source:
  edition: WLC
  text: וְ/אִשָּׁ֥ה אֶל אֲחֹתָ֖/הּ לֹ֣א תִקָּ֑ח לִ/צְרֹ֗ר לְ/גַלּ֧וֹת עֶרְוָתָ֛/הּ
    עָלֶ֖י/הָ בְּ/חַיֶּֽי/הָ־׃
translation:
  text: And you shall not take a woman as a rival to her sister, to uncover her nakedness
    while her sister is still alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And you shall not take a woman in addition to her sister, to make her
      a rival.' The Hebrew is compact and may be rendered more literally, but the
      sense is a prohibition against taking one sister as an additional wife during
      the other sister's lifetime.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשָּׁה
  chosen: And ... a woman
  alternatives:
  - And a wife
  - And one woman
  lexicon: HALOT
  rationale: אִשָּׁה can mean either 'woman' or 'wife.' Here the legal context of
    taking in marriage supports 'woman' in English with the marital sense supplied
    by 'take,' avoiding overtranslation while preserving the generic legal formulation.
- source_word: אֶל אֲחֹתָהּ
  chosen: as a rival to her sister
  alternatives:
  - in addition to her sister
  - beside her sister
  - to her sister
  lexicon: HALOT
  rationale: The preposition אֶל literally means 'to/toward,' but in this idiom with
    אִשָּׁה and לִצְרֹר it signals taking one woman in relation to her sister. English
    needs the relational force made explicit; 'as a rival to her sister' captures
    the sense of a second woman taken in a way that creates rivalry.
- source_word: לֹא תִקָּח
  chosen: you shall not take
  alternatives:
  - you must not take
  lexicon: HALOT
  rationale: Standard legal prohibition with imperfect; 'you shall not take' preserves
    the formal legal tone appropriate to Levitical law.
- source_word: לִצְרֹר
  chosen: as a rival
  alternatives:
  - to make her a rival
  - to vex
  - to cause hostility
  lexicon: HALOT
  rationale: From צרר in this context, the sense is not merely 'to afflict' but to
    create a rival relationship between sisters. Rendering the resultative force idiomatically
    as 'as a rival' best fits the marriage-law context.
- source_word: לְגַלּוֹת עֶרְוָתָהּ
  chosen: to uncover her nakedness
  alternatives:
  - to have sexual relations with her
  - to expose her nakedness
  lexicon: HALOT
  rationale: This is the standard Levitical euphemism for illicit sexual relations.
    The translation keeps the idiom 'uncover her nakedness' for consistency and transparency
    to the source, rather than flattening it to an interpretive paraphrase.
- source_word: עָלֶיהָ
  chosen: while her sister is still alive
  alternatives:
  - beside her
  - over her
  lexicon: HALOT
  rationale: Literally 'upon/over her,' but in context with the final phrase it conveys
    taking the second woman in addition to the first during the first sister's lifetime.
    English expresses the legal force more clearly by attaching the temporal restriction
    to the sister's life.
- source_word: בְּחַיֶּיהָ
  chosen: while her sister is still alive
  alternatives:
  - in her lifetime
  - during her life
  lexicon: HALOT
  rationale: The phrase means 'during her lifetime.' Because the antecedent chain
    can be unclear in English, 'while her sister is still alive' clarifies that the
    prohibition concerns marrying a woman's sister during the first woman's life.
