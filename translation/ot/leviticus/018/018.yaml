theological_decisions:
- issue: Scope of the prohibition in relation to polygamy and sororal marriage
  chosen_reading: The verse prohibits taking a woman's sister as an additional wife
    during the first sister's lifetime.
  alternative_readings:
  - The verse broadly prohibits marrying two sisters under any circumstances, including
    after the first sister's death.
  - The verse primarily prohibits any marriage arrangement that creates rivalry, not
    specifically sororal marriage.
  rationale: The Hebrew syntax, especially לִצְרֹר and בְּחַיֶּיהָ, most naturally
    points to taking a sister in addition to the first woman in a way that creates
    rivalry while the first is alive. The translation preserves that narrower legal
    sense without expanding it into a universal statement beyond what the text explicitly
    says.
  doctrine_reference: Translation philosophy §§1, 3, 5
