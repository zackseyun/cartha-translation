id: LEV.18.9
reference: Leviticus 18:9
source:
  edition: WLC
  text: עֶרְוַ֨ת אֲחֽוֹתְ/ךָ֤ בַת אָבִ֨י/ךָ֙ א֣וֹ בַת אִמֶּ֔/ךָ מוֹלֶ֣דֶת בַּ֔יִת
    א֖וֹ מוֹלֶ֣דֶת ח֑וּץ לֹ֥א תְגַלֶּ֖ה עֶרְוָתָֽ/ן־־׃ס
translation:
  text: You shall not uncover the nakedness of your sister, whether your father's
    daughter or your mother's daughter, born in the household or born outside it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'born at home or born outside.' The Hebrew contrasts birth 'in the house/household'
      with birth 'outside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת / עֶרְוָתָן
  chosen: the nakedness of ... / their nakedness
  alternatives:
  - the shame of ... / their shame
  - the private parts of ... / their private parts
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה is an established idiom for sexual nakedness
    in prohibited relations. 'Uncover the nakedness' preserves the legal-idiomatic
    force better than reducing it to mere shame, while remaining understandable in
    English.
- source_word: אֲחוֹתְךָ
  chosen: your sister
  lexicon: HALOT
  rationale: Direct kinship term; singular address to a male Israelite is preserved
    as 'your sister' in keeping with the gender-accurate policy and the legal style
    of the chapter.
- source_word: בַת אָבִיךָ
  chosen: your father's daughter
  alternatives:
  - the daughter of your father
  lexicon: HALOT
  rationale: This appositional phrase specifies one class of sister. 'Your father's
    daughter' is natural modern English and keeps the familial precision of the Hebrew.
- source_word: בַת אִמֶּךָ
  chosen: your mother's daughter
  alternatives:
  - the daughter of your mother
  lexicon: HALOT
  rationale: Parallel to 'your father's daughter'; the translation preserves the symmetry
    and legal specificity of the Hebrew.
- source_word: מוֹלֶדֶת
  chosen: born
  alternatives:
  - begotten
  - native-born
  lexicon: HALOT
  rationale: The noun/adjectival form here denotes one born from the named parentage.
    'Born' is the clearest idiomatic English in this legal listing.
- source_word: בַּיִת
  chosen: in the household
  alternatives:
  - at home
  - in the house
  lexicon: HALOT
  rationale: In this contrast with 'outside,' בַּיִת likely refers not merely to a
    building but to the domestic household sphere. 'In the household' communicates
    the social/familial setting more clearly than the overly literal 'in the house.'
- source_word: חוּץ
  chosen: outside it
  alternatives:
  - outside
  - abroad
  lexicon: HALOT
  rationale: Paired with בַּיִת, this marks birth outside the household/home sphere.
    'Outside it' makes the contrast explicit in English and avoids ambiguity.
- source_word: לֹא תְגַלֶּה
  chosen: You shall not uncover
  alternatives:
  - Do not uncover
  - You must not uncover
  lexicon: HALOT
  rationale: The imperfect in legal prohibition is well rendered by 'You shall not,'
    which matches the covenant-law register of the chapter without sounding archaic.
    'Uncover' preserves the idiom tied to עֶרְוָה.
- source_word: אוֹ ... אוֹ
  chosen: whether ... or
  alternatives:
  - or ... or
  - either ... or
  lexicon: HALOT
  rationale: The repeated disjunctive structure is naturally represented in English
    by 'whether ... or,' which reads smoothly while preserving the alternatives listed.
