theological_decisions:
- issue: Scope of the prohibited relationship
  chosen_reading: The verse prohibits sexual relations with one's sister, including
    both a father's daughter and a mother's daughter, whether born within the household
    or outside it.
  alternative_readings:
  - The final qualifiers may be taken to distinguish full/half-sisters or sisters
    born in the home versus elsewhere, but without changing the overall prohibition.
  rationale: The Hebrew legal formula is primarily classificatory, expanding the category
    of 'your sister' rather than narrowing it. The translation keeps the broad scope
    explicit without importing later legal distinctions not stated in the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
