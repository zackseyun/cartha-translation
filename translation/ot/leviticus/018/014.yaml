theological_decisions:
- issue: Rendering the incest-law idiom without flattening it into paraphrase
  chosen_reading: Retain 'uncover the nakedness' in the main text while allowing the
    context to signal prohibited sexual relations.
  alternative_readings:
  - Replace with an interpretive paraphrase such as 'have sexual relations with'
  rationale: The chapter repeatedly uses a fixed legal idiom. Preserving it maintains
    inter-verse consistency and transparency to the Hebrew, while the surrounding
    kinship language makes the sexual prohibition clear.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Specific kinship identification
  chosen_reading: Translate the final identification as 'She is your aunt.'
  alternative_readings:
  - '''She is your father''s brother''s wife'''
  - '''She is your paternal aunt by marriage'''
  rationale: The Hebrew uses the ordinary kinship term rather than repeating the full
    relational chain. The concise English equivalent best matches the source while
    the previous clause already specifies the exact relationship.
  doctrine_reference: Translation philosophy §§1, 6
