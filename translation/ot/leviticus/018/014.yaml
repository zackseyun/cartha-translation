id: LEV.18.14
reference: Leviticus 18:14
source:
  edition: WLC
  text: עֶרְוַ֥ת אֲחִֽי אָבִ֖י/ךָ לֹ֣א תְגַלֵּ֑ה אֶל אִשְׁתּ/וֹ֙ לֹ֣א תִקְרָ֔ב דֹּדָֽתְ/ךָ֖
    הִֽוא־־׃ס
translation:
  text: You shall not uncover the nakedness of your father's brother; you shall not
    approach his wife. She is your aunt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'approach'; in this context the verb carries sexual force within
      the incest-law formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the sexual nakedness of
  - the shame of
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה in the fixed expression 'uncover nakedness'
    is an idiom for prohibited sexual relations, but the translation preserves the
    established concrete wording 'nakedness' rather than paraphrasing the idiom away.
    This keeps the legal formula visible while remaining understandable in English.
- source_word: אֲחִי אָבִיךָ
  chosen: your father's brother
  alternatives:
  - your paternal uncle
  - the brother of your father
  lexicon: HALOT
  rationale: The construct chain is most directly 'the brother of your father.' 'Your
    father's brother' is natural modern English and preserves the familial specificity.
    'Paternal uncle' is possible but less transparent to the Hebrew wording.
- source_word: תְגַלֶּה
  chosen: you shall ... uncover
  alternatives:
  - you must not uncover
  - you shall not expose
  lexicon: HALOT
  rationale: Piel of גלה here is the standard legal idiom 'uncover [nakedness].' 'You
    shall not' matches the prohibition style of the chapter and keeps the formal legal
    tone.
- source_word: אֶל אִשְׁתּוֹ לֹא תִקְרָב
  chosen: you shall not approach his wife
  alternatives:
  - you shall not come near to his wife
  - do not approach his wife sexually
  lexicon: HALOT
  rationale: קרב with אֶל literally means 'approach' or 'come near.' In this context
    it carries sexual force, but the Hebrew itself uses the more restrained verb,
    so 'approach his wife' preserves the legal euphemism without over-paraphrase.
    The object 'his wife' clarifies that the prohibition concerns the uncle's wife.
- source_word: דֹּדָתְךָ
  chosen: your aunt
  alternatives:
  - your uncle's wife
  lexicon: HALOT
  rationale: דּוֹדָה denotes 'aunt,' here specifically the wife of the father's brother
    as the preceding clause explains. 'Your aunt' is the natural English equivalent,
    while the prior clause preserves the more explicit relational detail.
- source_word: הִוא
  chosen: She is
  alternatives:
  - for she is
  - because she is
  lexicon: HALOT
  rationale: 'The pronoun functions predicatively: ''she is your aunt.'' English can
    supply ''She is'' straightforwardly. Adding ''for'' or ''because'' would make
    the explanatory force more explicit than the Hebrew requires.'
