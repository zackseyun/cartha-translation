id: LEV.18.13
reference: Leviticus 18:13
source:
  edition: WLC
  text: עֶרְוַ֥ת אֲחֽוֹת אִמְּ/ךָ֖ לֹ֣א תְגַלֵּ֑ה כִּֽי שְׁאֵ֥ר אִמְּ/ךָ֖ הִֽוא־־׃ס
translation:
  text: You shall not uncover the nakedness of your mother's sister, for she is your
    mother's close relative.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'You shall not have sexual relations with your mother's
      sister.' The Hebrew reads literally, 'You shall not uncover the nakedness of
      your mother's sister.'
    reason: lexical_alternative
  - marker: b
    text: '''Close relative'' translates Hebrew שְׁאֵר, a kinship term meaning near
      flesh-kin.'
    reason: cultural_note
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the private parts of
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה in the idiom 'uncover the nakedness of' is a
    fixed legal euphemism for prohibited sexual relations. Retaining 'nakedness' preserves
    the established idiom and its legal register better than paraphrasing.
- source_word: תְגַלֵּה
  chosen: you shall not uncover
  alternatives:
  - you must not uncover
  - you shall not have sexual relations with
  lexicon: HALOT
  rationale: The Piel of גלה here forms the standard prohibition formula 'uncover
    nakedness.' 'You shall not uncover' keeps the formal legal idiom, while the sexual
    sense is carried by the phrase as a whole.
- source_word: אֲחוֹת אִמְּךָ
  chosen: your mother's sister
  alternatives:
  - the sister of your mother
  - your maternal aunt
  lexicon: HALOT
  rationale: The construct phrase directly denotes the mother's sister. 'Your mother's
    sister' is clear, natural English and preserves the kinship relation without over-paraphrase.
    'Maternal aunt' is possible but less literal than the Hebrew wording.
- source_word: שְׁאֵר
  chosen: close relative
  alternatives:
  - flesh
  - blood relative
  - kin
  lexicon: HALOT
  rationale: שְׁאֵר in kinship-law contexts refers to near flesh-kin. 'Close relative'
    communicates the legal rationale in natural English. 'Flesh' is more literal but
    less clear in contemporary English here; 'blood relative' is interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי introduces the rationale for the prohibition. 'For' fits the legal
    style and reads naturally in English.
- source_word: הִוא
  chosen: she is
  alternatives:
  - she herself is
  lexicon: HALOT
  rationale: The pronoun simply states the reason clause's subject and is naturally
    represented by 'she is' in English.
