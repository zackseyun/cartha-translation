theological_decisions:
- issue: Rendering the incest-law idiom without flattening its euphemistic legal force
  chosen_reading: Retain the idiom 'uncover the nakedness of' in the main text
  alternative_readings:
  - Render dynamically as 'have sexual relations with'
  rationale: The Hebrew uses a repeated legal euphemism throughout Leviticus 18. Preserving
    it maintains literary consistency and the text's formal legal tone, while still
    being understandable in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
