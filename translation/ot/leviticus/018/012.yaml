id: LEV.18.12
reference: Leviticus 18:12
source:
  edition: WLC
  text: עֶרְוַ֥ת אֲחוֹת אָבִ֖י/ךָ לֹ֣א תְגַלֵּ֑ה שְׁאֵ֥ר אָבִ֖י/ךָ הִֽוא־׃ס
translation:
  text: You shall not uncover the nakedness of your father's sister; she is your father's
    close relative.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'uncover the nakedness of' is a legal idiom in Leviticus for prohibited
      sexual exposure or relations.
    reason: lexical_alternative
  - marker: b
    text: Or 'she is your father's flesh' / 'blood relative.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the private parts of
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה is a fixed idiom in the prohibition formula
    'uncover the nakedness of,' referring to illicit sexual exposure/relations. Retaining
    'nakedness' preserves the legal idiom and intertextual consistency in the chapter
    better than a more interpretive paraphrase.
- source_word: תְגַלֵּה
  chosen: you shall not uncover
  alternatives:
  - you must not uncover
  - you shall not have sexual relations with
  lexicon: HALOT
  rationale: The Piel of גלה with עֶרְוָה forms the standard legal expression in this
    chapter. 'You shall not uncover' keeps the formal idiom while remaining understandable.
    The more explicit paraphrase 'have sexual relations with' captures the sense but
    goes beyond the wording of the Hebrew.
- source_word: אֲחוֹת אָבִיךָ
  chosen: your father's sister
  alternatives:
  - the sister of your father
  - your paternal aunt
  lexicon: HALOT
  rationale: '''Your father''s sister'' is the most natural modern English rendering
    and preserves the kinship relation directly. ''Paternal aunt'' is accurate but
    less transparent to the source phrasing.'
- source_word: שְׁאֵר
  chosen: close relative
  alternatives:
  - flesh
  - blood relative
  - kin
  lexicon: HALOT
  rationale: שְׁאֵר in kinship contexts denotes near flesh-relationship or close blood
    relation. 'Close relative' communicates the legal-kinship force clearly in modern
    English. 'Flesh' is more literal but less idiomatic here; 'blood relative' is
    possible but slightly more interpretive.
- source_word: הִוא
  chosen: she is
  alternatives:
  - she herself is
  lexicon: HALOT
  rationale: The pronoun identifies the woman as belonging to the prohibited degree
    of kinship. Simple 'she is' is sufficient and natural in English.
