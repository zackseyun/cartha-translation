theological_decisions:
- issue: Rendering the incest-law idiom without over-paraphrase
  chosen_reading: Retain the formula 'uncover the nakedness of' in the main text.
  alternative_readings:
  - Render dynamically as 'have sexual relations with'
  rationale: The verse is legal and formulaic within Leviticus 18. Preserving the
    idiom maintains textual consistency and avoids importing a fuller paraphrase than
    the Hebrew explicitly states, while the context still makes the sexual prohibition
    clear.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition; Never paraphrase beyond what the source text
    warrants.'
