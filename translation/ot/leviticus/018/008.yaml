id: LEV.18.8
reference: Leviticus 18:8
source:
  edition: WLC
  text: עֶרְוַ֥ת אֵֽשֶׁת אָבִ֖י/ךָ לֹ֣א תְגַלֵּ֑ה עֶרְוַ֥ת אָבִ֖י/ךָ הִֽוא־׃ס
translation:
  text: You shall not uncover the nakedness of your father's wife; it is your father's
    nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'You shall not have sexual relations with your father's
      wife.' The Hebrew says, literally, 'uncover the nakedness of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the private parts of
  lexicon: HALOT
  rationale: In Leviticus 18 this noun functions in the fixed idiom 'uncover nakedness,'
    a legal euphemism for prohibited sexual relations. Rendering it as 'the nakedness
    of' preserves the idiom and its repeated legal formula in the chapter better than
    paraphrastic options.
- source_word: אֵשֶׁת
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: 'In construct with ''your father,'' the sense is specifically marital:
    ''your father''s wife,'' not merely ''your father''s woman.'' This matches the
    legal relationship in view.'
- source_word: לֹא תְגַלֶּה
  chosen: you shall not uncover
  alternatives:
  - you must not uncover
  - do not uncover
  lexicon: HALOT
  rationale: The imperfect with negation in this legal context is well represented
    by English 'shall not.' 'Uncover' keeps the Hebrew metaphor and the chapter's
    repeated wording, rather than resolving it into an interpretive paraphrase such
    as 'have sexual relations with.'
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Straightforward possessive rendering. Repeated in the verse and retained
    for clarity and formal correspondence.
- source_word: הִוא
  chosen: it is
  alternatives:
  - she is
  lexicon: HALOT
  rationale: Although the pronoun is grammatically feminine, its predicate points
    back to the feminine noun 'nakedness' rather than identifying the woman herself.
    English therefore naturally renders the clause as 'it is your father's nakedness.'
