theological_decisions:
- issue: Whether to translate the euphemistic legal idiom explicitly as a prohibition
    of sexual relations
  chosen_reading: Retain the idiom 'uncover the nakedness' in the main text
  alternative_readings:
  - You shall not have sexual relations with your father's wife
  rationale: The Hebrew uses a repeated covenant-law formula in this chapter. Preserving
    the idiom maintains lexical consistency and allows the text's own euphemistic
    register to stand, while the more explicit interpretation is valid as an explanatory
    alternative rather than the main translation.
  doctrine_reference: Translation philosophy §§1, 5, 6
