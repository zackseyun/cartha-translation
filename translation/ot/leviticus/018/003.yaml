theological_decisions:
- issue: Whether to make explicit that the prohibited behavior concerns the inhabitants
    of Egypt and Canaan rather than the soil/land itself
  chosen_reading: Render the idiom as 'as they do in the land of Egypt/Canaan'
  alternative_readings:
  - according to the practices of the land of Egypt/Canaan
  - after the doings of the land of Egypt/Canaan
  rationale: The Hebrew idiom attributes practices to 'the land,' but in English this
    can sound overly literal or misleading. The chosen rendering preserves the referent—the
    peoples' practices—without flattening the warning into a vague cultural abstraction.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether חֻקֹּתֵיהֶם should be rendered more dynamically as 'customs' or more
    formally as 'statutes'
  chosen_reading: statutes
  alternative_readings:
  - customs
  - ordinances
  rationale: In this legal context, 'statutes' better preserves the sense of binding
    norms and keeps the contrast with the LORD's own statutes in the surrounding chapter.
    'Customs' is possible but may sound merely sociological rather than morally regulated.
  doctrine_reference: Translation philosophy §5, §6
