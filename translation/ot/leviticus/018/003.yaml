id: LEV.18.3
reference: Leviticus 18:3
source:
  edition: WLC
  text: כְּ/מַעֲשֵׂ֧ה אֶֽרֶץ מִצְרַ֛יִם אֲשֶׁ֥ר יְשַׁבְתֶּם בָּ֖/הּ לֹ֣א תַעֲשׂ֑וּ
    וּ/כְ/מַעֲשֵׂ֣ה אֶֽרֶץ כְּנַ֡עַן אֲשֶׁ֣ר אֲנִי֩ מֵבִ֨יא אֶתְ/כֶ֥ם שָׁ֨מָּ/ה֙ לֹ֣א
    תַעֲשׂ֔וּ וּ/בְ/חֻקֹּתֵי/הֶ֖ם לֹ֥א תֵלֵֽכוּ־־־׃
translation:
  text: You shall not do as they do in the land of Egypt, where you lived, and you
    shall not do as they do in the land of Canaan, where I am bringing you. You shall
    not walk in their statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the practices of the land of Egypt ... and according to
      the practices of the land of Canaan.' The Hebrew idiom literally speaks of the
      'deeds' or 'practices' of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'You shall not follow their customs/ordinances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַעֲשֵׂה
  chosen: as they do
  alternatives:
  - according to the deeds of
  - like the practices of
  - after the manner of
  lexicon: HALOT
  rationale: Literally 'according to the deed/work of.' In idiomatic English, 'as
    they do' best conveys the comparative force with the following prohibition, while
    still reflecting the concrete sense of behavior/practice rather than abstract
    culture.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Retains the Hebrew construct with 'land of,' which is natural in English
    and preserves the geographic emphasis.
- source_word: אֲשֶׁר יְשַׁבְתֶּם בָּהּ
  chosen: where you lived
  alternatives:
  - in which you dwelt
  - where you were living
  lexicon: HALOT
  rationale: The relative clause identifies Egypt as the place of Israel's former
    residence. 'Where you lived' is clear modern English and adequately reflects the
    qatal verb.
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall not do
  alternatives:
  - do not do
  - you must not do
  lexicon: HALOT
  rationale: Uses covenantal legal style in English. The imperfect with negation in
    this legal context is well represented by 'you shall not.'
- source_word: וּכְמַעֲשֵׂה אֶרֶץ כְּנַעַן
  chosen: as they do in the land of Canaan
  alternatives:
  - according to the practices of the land of Canaan
  - like the deeds of the land of Canaan
  lexicon: HALOT
  rationale: Parallels the first clause for clarity and rhythm. Supplying 'they' makes
    explicit the inhabitants implied by 'the land of Canaan' without adding a new
    idea beyond the Hebrew idiom.
- source_word: אֲשֶׁר אֲנִי מֵבִיא אֶתְכֶם שָׁמָּה
  chosen: where I am bringing you
  alternatives:
  - to which I am bringing you
  - where I am about to bring you
  - into which I am bringing you
  lexicon: HALOT
  rationale: The participle מֵבִיא gives an ongoing/imminent sense. 'Where I am bringing
    you' is natural and preserves the divine action and destination.
- source_word: וּבְחֻקֹּתֵיהֶם
  chosen: in their statutes
  alternatives:
  - by their statutes
  - in their customs
  - in their ordinances
  lexicon: HALOT
  rationale: חֻקּוֹת can mean statutes, prescriptions, or fixed customs. 'Statutes'
    preserves the normative force and keeps lexical continuity with Pentateuchal legal
    language, while the possessive 'their' marks these as pagan norms rather than
    Yahweh's laws.
- source_word: לֹא תֵלֵכוּ
  chosen: you shall not walk
  alternatives:
  - you shall not follow
  - you shall not live
  - you shall not go
  lexicon: HALOT
  rationale: '''Walk'' is the standard biblical metaphor for conduct and should be
    preserved here. A more interpretive gloss like ''follow'' is possible but less
    transparent to the source imagery.'
