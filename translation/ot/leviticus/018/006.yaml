id: LEV.18.6
reference: Leviticus 18:6
source:
  edition: WLC
  text: אִ֥ישׁ אִישׁ֙ אֶל כָּל שְׁאֵ֣ר בְּשָׂר֔/וֹ לֹ֥א תִקְרְב֖וּ לְ/גַלּ֣וֹת עֶרְוָ֑ה אֲנִ֖י יְהוָֽה־־׃ס
translation:
  text: No man among you shall approach any close relative of his flesh to uncover nakedness; I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to uncover nakedness' is a legal idiom in this chapter referring to prohibited sexual exposure or sexual relations with a close relative.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  chosen: No man among you
  alternatives:
  - Each man
  - Any man
  - Man by man
  lexicon: HALOT
  rationale: The doubled singular noun is a distributive idiom, emphasizing each individual case. 'No man among you' captures the prohibitive force in idiomatic English while preserving the masculine/generic form per the gender-accurate policy. 'Among you' is supplied from context to make the distributive prohibition natural in English, reflecting the common legal style of the chapter without materially adding content.
- source_word: אֶל
  chosen: approach
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although the preposition itself is simply 'to/toward,' in combination with קָרַב it forms the idiom 'approach.' Rendering the phrase together avoids wooden English.
- source_word: שְׁאֵר בְּשָׂרוֹ
  chosen: close relative of his flesh
  alternatives:
  - near kin
  - blood relative
  - flesh of his flesh
  lexicon: HALOT
  rationale: The phrase denotes kinship based on blood/flesh relation. 'Close relative of his flesh' stays close to the Hebrew imagery while remaining intelligible. 'Blood relative' is idiomatic but imports a more interpretive modern expression; 'near kin' is possible but less transparent to contemporary readers.
- source_word: תִקְרְבוּ
  chosen: shall approach
  alternatives:
  - must not come near
  - are not to approach
  lexicon: HALOT
  rationale: Qal imperfect 2mp under negation in legal material is well represented by English 'shall' for prohibition. 'Approach' preserves the formal/legal tone and the euphemistic setup for the following infinitive phrase.
- source_word: לְגַלּוֹת עֶרְוָה
  chosen: to uncover nakedness
  alternatives:
  - to uncover sexual nakedness
  - to have sexual relations with
  - to expose nakedness
  lexicon: HALOT
  rationale: This is a fixed idiom in Leviticus for prohibited sexual exposure/relations. The main text keeps the Hebrew idiom 'uncover nakedness' rather than flattening it to an interpretive paraphrase. Because modern readers may not immediately recognize the sexual sense, an explanatory footnote preserves the idiomatic meaning.
- source_word: עֶרְוָה
  chosen: nakedness
  alternatives:
  - genitals
  - shame
  lexicon: HALOT
  rationale: In this legal idiom the noun refers to sexual nakedness/exposure. 'Nakedness' is the standard and sufficiently precise rendering in context; more explicit alternatives are interpretive and better suited to a footnote if needed.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: The covenant formula is retained. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'I am' preserves the emphatic divine self-identification that grounds the command.
