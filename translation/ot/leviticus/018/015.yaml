id: LEV.18.15
reference: Leviticus 18:15
source:
  edition: WLC
  text: עֶרְוַ֥ת כַּלָּֽתְ/ךָ֖ לֹ֣א תְגַלֵּ֑ה אֵ֤שֶׁת בִּנְ/ךָ֙ הִ֔וא לֹ֥א תְגַלֶּ֖ה
    עֶרְוָתָֽ/הּ׃ס
translation:
  text: You shall not uncover the nakedness of your daughter-in-law; she is your son's
    wife; you shall not uncover her nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''uncover the nakedness,'' a recurring legal euphemism in Leviticus
      for prohibited sexual relations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the private parts of
  lexicon: HALOT
  rationale: In Leviticus 18, עֶרְוָה in the idiom 'uncover nakedness' is a fixed
    euphemistic expression for prohibited sexual relations. Rendering the noun as
    'nakedness' preserves the legal idiom and its intertextual consistency in the
    chapter better than a more interpretive paraphrase.
- source_word: כַּלָּתְךָ
  chosen: your daughter-in-law
  lexicon: HALOT
  rationale: The construct with 2ms suffix directly denotes the addressee's daughter-in-law.
    This is the plain kinship term in context.
- source_word: תְגַלֵּה / תְגַלֶּה
  chosen: you shall not uncover
  alternatives:
  - you must not uncover
  - you shall not have sexual relations with
  lexicon: HALOT
  rationale: The Piel of גלה with עֶרְוָה forms the recurring prohibition formula
    in this chapter. 'You shall not uncover' keeps the formal legal idiom, while the
    sexual sense is clear from context. A more explicit paraphrase would over-interpret
    the established expression.
- source_word: אֵשֶׁת בִּנְךָ
  chosen: your son's wife
  alternatives:
  - the wife of your son
  lexicon: HALOT
  rationale: This appositional clause explains why the daughter-in-law is prohibited.
    'Your son's wife' is natural modern English while preserving the possessive relationship.
- source_word: הִוא
  chosen: she is
  alternatives:
  - it is she who is
  lexicon: HALOT
  rationale: The pronoun is emphatic/appositional, identifying the woman just named.
    'She is' communicates the explanatory force without awkward English emphasis.
- source_word: עֶרְוָתָהּ
  chosen: her nakedness
  alternatives:
  - her shame
  lexicon: HALOT
  rationale: Repeating 'her nakedness' preserves the Hebrew repetition and the legal
    style of the holiness code. This also maintains consistency with the chapter's
    refrain.
