theological_decisions:
- issue: Rendering the idiom 'uncover nakedness' in a sexual-prohibition context
  chosen_reading: Retain the idiom 'uncover the nakedness' rather than replacing it
    with an explicit paraphrase such as 'have sexual relations with.'
  alternative_readings:
  - have sexual relations with
  - dishonor sexually
  rationale: The Hebrew uses a stable legal euphemism throughout Leviticus 18. Preserving
    it respects original-language primacy and consistency of key terms, while still
    being intelligible in context. The verse makes a moral/legal prohibition about
    incestuous sexual relations, but the translation should not flatten the idiom
    into a paraphrase unless required by clarity.
  doctrine_reference: Translation philosophy §§1, 5, 6
