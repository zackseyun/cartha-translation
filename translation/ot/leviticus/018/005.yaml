theological_decisions:
- issue: Scope of 'live by them'
  chosen_reading: Retain the broad covenantal expression 'he shall live by them' without
    specifying temporal prosperity, covenant life in the land, or eternal life.
  alternative_readings:
  - he shall live in them
  - he shall gain life through them
  rationale: The Hebrew itself does not explicitly resolve the precise scope of the
    promised life. Because this verse later bears theological significance in Jewish
    and Christian interpretation, the translation preserves the original tension rather
    than narrowing it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine אדם
  chosen_reading: Render as 'a man' in the main text.
  alternative_readings:
  - a person
  - anyone
  - humankind
  rationale: The source uses grammatically masculine singular with representative
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing; an explanatory footnote preserves the representative sense for modern
    readers.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral;
    Contested terms table for אָדָם.'
