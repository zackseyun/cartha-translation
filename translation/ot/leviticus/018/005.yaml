id: LEV.18.5
reference: Leviticus 18:5
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֤ם אֶת חֻקֹּתַ/י֙ וְ/אֶת מִשְׁפָּטַ֔/י אֲשֶׁ֨ר יַעֲשֶׂ֥ה אֹתָ֛/ם
    הָ/אָדָ֖ם וָ/חַ֣י בָּ/הֶ֑ם אֲנִ֖י יְהוָֽה־־׃ס
translation:
  text: So you shall keep my statutes and my judgments, which if a man does them,
    he shall live by them. I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which if anyone does them, he shall live by them.' Hebrew 'man' here
      is a singular representative expression.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he shall live in them.' The Hebrew preposition can be understood instrumentally
      ('by') or as sphere/realm ('in').
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - You must keep
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal instruction functions
    imperativally/futurally. 'Keep' is the standard covenantal rendering for שמר in
    this context. 'So' reflects the connective force smoothly in English after the
    preceding prohibitions.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  lexicon: HALOT
  rationale: חקה/חק denotes prescribed enactments or statutes. 'Statutes' preserves
    the formal legal sense and pairs naturally with 'judgments' for the common legal
    collocation.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: משפט often refers to legal judgments/ordinances. 'Judgments' keeps the
    lexical distinction from חקים and reflects the source pairing without flattening
    both terms into a single English category.
- source_word: אֲשֶׁר יַעֲשֶׂה אֹתָם
  chosen: which if a man does them
  alternatives:
  - which a man shall do
  - which whoever does
  lexicon: HALOT
  rationale: The relative clause modifies the statutes and judgments. Hebrew idiom
    is concise; English requires expansion for clarity. 'Does them' preserves the
    concrete obedience language of עשה. 'If a man does them' captures the conditional
    sense implied by the sequence and retains the masculine singular generic.
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - the man
  - humankind
  - a person
  lexicon: HALOT
  rationale: Per doctrine, אדם should be rendered 'man / humankind' according to context.
    Here the singular masculine generic is representative rather than referring to
    humanity abstractly. 'A man' preserves the grammar and the proverbial legal formulation;
    inclusivity can be noted in a footnote.
- source_word: וָחַי
  chosen: he shall live
  alternatives:
  - he will live
  - he shall have life
  lexicon: HALOT
  rationale: The verb חיה here denotes living as the result of obedience. 'He shall
    live' is the most direct rendering and preserves the covenantal consequence without
    over-interpreting whether the life is temporal, covenantal, or more broadly theological.
- source_word: בָּהֶם
  chosen: by them
  alternatives:
  - in them
  - through them
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'by' or 'in' here. 'By them' is idiomatic
    in English and preserves the instrumental/sphere ambiguity of the Hebrew better
    than a more interpretive gloss.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD' in
    keeping with Jewish reverence tradition and the Septuagintal pattern.
