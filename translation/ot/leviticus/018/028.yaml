id: LEV.18.28
reference: Leviticus 18:28
source:
  edition: WLC
  text: וְ/לֹֽא תָקִ֤יא הָ/אָ֨רֶץ֙ אֶתְ/כֶ֔ם בְּ/טַֽמַּאֲ/כֶ֖ם אֹתָ֑/הּ כַּ/אֲשֶׁ֥ר
    קָאָ֛ה אֶת הַ/גּ֖וֹי אֲשֶׁ֥ר לִ/פְנֵי/כֶֽם־־׃
translation:
  text: so that the land will not vomit you out when you defile it, as it vomited
    out the nation that was before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spew you out' / 'spewed out.' The Hebrew uses a vivid image of the land
      expelling its inhabitants because of defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָקִיא / קָאָה
  chosen: vomit ... out / vomited out
  alternatives:
  - spew out
  - cast out
  lexicon: HALOT
  rationale: The Hiphil/Qal forms of קוא/קיא here use vivid expulsion imagery. 'Vomit
    out' preserves the force of the metaphor more transparently than the traditional
    but slightly softer 'spew out.' Adding 'out' reflects the idiomatic sense of expulsion
    in English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In Leviticus 18 the reference is specifically to the land of Canaan as
    covenant space, not the whole earth. 'Land' best fits the immediate context.
- source_word: בְּטַמַּאֲכֶם אֹתָהּ
  chosen: when you defile it
  alternatives:
  - by your defiling it
  - in your making it unclean
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct can be rendered temporally
    or instrumentally. ''When you defile it'' is natural English and fits the warning
    sense, while preserving the causative idea of טמא in the Piel: making the land
    unclean/defiled.'
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the Gentile nation
  lexicon: HALOT
  rationale: The singular collective גוי refers to the prior inhabitants as a people-group.
    'Nation' preserves the singular collective form better than 'people.' 'Gentile'
    would import later covenantal nuance not explicit here.
- source_word: אֲשֶׁר לִפְנֵיכֶם
  chosen: that was before you
  alternatives:
  - that was ahead of you
  - that was before your face
  - that was there before you
  lexicon: HALOT
  rationale: The phrase denotes those previously in the land prior to Israel. 'That
    was before you' is concise and faithful; in English it naturally conveys temporal
    priority in this context.
- source_word: וְלֹא
  chosen: so that ... will not
  alternatives:
  - and not
  - lest
  lexicon: HALOT
  rationale: Although formally 'and not,' in context following the preceding prohibition/warning
    it functions as a negative purpose/result clause. 'So that ... will not' communicates
    the discourse force in readable English. 'Lest' is possible but less natural for
    modern readers.
