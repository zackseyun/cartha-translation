theological_decisions:
- issue: Personification of the land as agent of judgment
  chosen_reading: Retain the land as the grammatical subject that 'vomits out' its
    inhabitants.
  alternative_readings:
  - Render more abstractly as God causing expulsion through the land
  rationale: The Hebrew explicitly personifies the land as reacting to defilement.
    Preserving that imagery maintains the theological texture of Leviticus, where
    moral impurity pollutes the land and results in expulsion, without denying God's
    ultimate sovereignty.
  doctrine_reference: Translation philosophy §1, §3
