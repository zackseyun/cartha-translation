id: LEV.18.25
reference: Leviticus 18:25
source:
  edition: WLC
  text: וַ/תִּטְמָ֣א הָ/אָ֔רֶץ וָ/אֶפְקֹ֥ד עֲוֺנָ֖/הּ עָלֶ֑י/הָ וַ/תָּקִ֥א הָ/אָ֖רֶץ
    אֶת יֹשְׁבֶֽי/הָ־׃
translation:
  text: So the land became unclean, and I punished its iniquity upon it, and the land
    vomited out its inhabitants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was defiled.' The Hebrew verb can be rendered either 'became unclean'
      or 'was defiled.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'I visited its iniquity upon it,' an idiom for calling guilt to
      account in judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'spewed out.' The Hebrew keeps the graphic image of vomiting to portray
      the land's expulsion of its inhabitants because of defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּטְמָא
  chosen: became unclean
  alternatives:
  - was defiled
  - became defiled
  lexicon: HALOT
  rationale: טמא in the Niphal/Qal passive-like sense here describes the land as rendered
    ritually/morally unclean by the abominations in context. 'Became unclean' is clear
    modern English and preserves the resultative sense without overinterpreting the
    mechanism.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Leviticus 18 the reference is specifically
    to the land of Canaan in covenantal context, so 'the land' is more precise than
    the broader 'earth.'
- source_word: וָאֶפְקֹד
  chosen: I punished
  alternatives:
  - I visited
  - I called to account
  lexicon: HALOT
  rationale: פקד literally has a broad range including 'visit' or 'attend to,' but
    with עון as object it commonly conveys punitive visitation or calling sin to account.
    'I punished' communicates the idiomatic force in natural English.
- source_word: עֲוֺנָהּ
  chosen: its iniquity
  alternatives:
  - its guilt
  - its wrongdoing
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or guilt-bearing consequence. 'Iniquity'
    preserves the moral weight and traditional covenantal register here, while still
    being understandable.
- source_word: עָלֶיהָ
  chosen: upon it
  alternatives:
  - against it
  - on it
  lexicon: HALOT
  rationale: The preposition עַל with פקד עון marks the object against/upon which
    punishment is visited. 'Upon it' preserves the Hebrew imagery and syntax, though
    English readers may understand it idiomatically with 'punished its iniquity upon
    it.'
- source_word: וַתָּקִא
  chosen: vomited out
  alternatives:
  - spewed out
  - cast out
  lexicon: HALOT
  rationale: קיא is a vivid verb meaning 'vomit.' The land is personified as expelling
    its inhabitants because of defilement. 'Vomited out' preserves the forceful metaphor
    better than the softened 'cast out.'
- source_word: יֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those dwelling in it
  - those who live in it
  lexicon: HALOT
  rationale: The participial form from ישב denotes those dwelling in the land. 'Its
    inhabitants' is concise, natural, and faithful to the collective sense.
