theological_decisions:
- issue: Personification of the land as morally responsive to defilement
  chosen_reading: Retain the concrete imagery that the land 'vomited out' its inhabitants.
  alternative_readings:
  - Soften to 'the land expelled its inhabitants'
  rationale: The Hebrew intentionally personifies the land as reacting to covenantal/moral
    pollution. Preserving the metaphor maintains the theological connection between
    sin, defilement, divine judgment, and exile without reducing it to mere political
    displacement.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of divine judgment in וָאֶפְקֹד עֲוֺנָהּ עָלֶיהָ
  chosen_reading: 'Express as direct punishment: ''I punished its iniquity upon it.'''
  alternative_readings:
  - I visited its iniquity upon it
  - I called its guilt to account against it
  rationale: The clause attributes judgment directly to God. 'Punished' makes the
    idiomatic sense explicit in English while preserving divine agency and the moral
    seriousness of the text.
  doctrine_reference: Translation philosophy §1, §6
