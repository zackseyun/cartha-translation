theological_decisions:
- issue: Nature of the prohibition and impurity language
  chosen_reading: Render the verse as a prohibition of sexual intercourse with another
    man's wife, preserving the text's own language of uncleanness without expanding
    it into later doctrinal categories.
  alternative_readings:
  - Render more interpretively as 'Do not have sexual relations with your neighbor's
    wife and defile yourself with her.'
  rationale: The Hebrew idiom clearly prohibits intercourse with a fellow's wife and
    grounds it in becoming unclean. The translation preserves that moral-ritual category
    ('unclean') rather than replacing it with a generalized modern ethical term such
    as 'defile yourself,' though that is a viable idiomatic alternative.
  doctrine_reference: Translation philosophy §§1, 3, 6
