id: LEV.18.20
reference: Leviticus 18:20
source:
  edition: WLC
  text: וְ/אֶל אֵ֨שֶׁת֙ עֲמִֽיתְ/ךָ֔ לֹא תִתֵּ֥ן שְׁכָבְתְּ/ךָ֖ לְ/זָ֑רַע לְ/טָמְאָה
    בָֽ/הּ־־־׃
translation:
  text: And you shall not give your emission to the wife of your fellow man, to become
    unclean with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you shall not give your lying/emission for seed to the
      wife of your fellow.' The expression is an idiom for sexual intercourse involving
      seminal emission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: And ... to
  alternatives:
  - And with
  - And toward
  lexicon: HALOT
  rationale: 'The preposition אֶל marks direction toward a person: ''to/toward.''
    In English the prohibition is best carried by fronting the object phrase (''to
    the wife...'') while retaining the connective ''And'' to reflect the verse''s
    place in the list.'
- source_word: אֵשֶׁת
  chosen: wife of
  alternatives:
  - woman of
  lexicon: HALOT
  rationale: Construct form of 'woman/wife'; in this legal-sexual context 'wife of'
    is the natural and specific sense.
- source_word: עֲמִיתְךָ
  chosen: your fellow man
  alternatives:
  - your neighbor
  - your associate
  - your fellow
  lexicon: HALOT
  rationale: עָמִית commonly denotes a fellow member of the community, often in legal/ethical
    contexts. 'Your fellow man' preserves the singular masculine addressee and the
    interpersonal/legal nuance better than the broader 'neighbor.'
- source_word: לֹא תִתֵּן
  chosen: you shall not give
  alternatives:
  - you must not give
  - do not give
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material is well represented by English
    'shall not' for prohibition. 'Give' is retained rather than paraphrasing, since
    the Hebrew idiom uses נתן.
- source_word: שְׁכָבְתְּךָ
  chosen: your emission
  alternatives:
  - your lying
  - your seed
  - your semen
  lexicon: HALOT
  rationale: Though from the root 'to lie down,' in this collocation with 'give' and
    'for seed' it refers to seminal emission/sexual intercourse. 'Your emission' is
    explicit enough for modern readers without adding a more clinical term not directly
    present in the Hebrew. 'Your lying' is too opaque in English; 'your seed' would
    duplicate the following לְזָרַע.
- source_word: לְזָרַע
  chosen: to become unclean
  alternatives:
  - for seed
  - for semen
  - for emission
  lexicon: HALOT
  rationale: This phrase is difficult and idiomatic. The לְזָרַע most naturally means
    'for seed,' i.e., as a seminal emission. Because English cannot easily reproduce
    the Hebrew idiom after 'give your emission,' the reproductive/seminal sense is
    absorbed into 'emission' in the main clause, while the remainder of the verse
    carries the result clause. The more literal alternative is preserved in a footnote.
- source_word: לְ/טָמְאָה
  chosen: to become unclean
  alternatives:
  - to make yourself unclean
  - for uncleanness
  lexicon: HALOT
  rationale: 'Infinitive construct of טמא with prefixed ל expresses result/purpose:
    ''so as to become unclean'' or ''thereby making oneself unclean.'' ''To become
    unclean'' is concise and preserves the ritual/moral defilement language.'
- source_word: בָהּ
  chosen: with her
  alternatives:
  - by her
  - in her
  lexicon: HALOT
  rationale: The preposition ב here is idiomatic in sexual context. 'With her' is
    the most natural English rendering and avoids a misleadingly anatomical sense
    that 'in her' might suggest.
