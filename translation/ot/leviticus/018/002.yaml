theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves the covenantal force while following the stated translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is explicitly masculine plural in a familial covenant expression.
    Following the gender-accurate principle, the translation preserves that form rather
    than neutralizing it, while recognizing its representative corporate sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
