id: LEV.18.2
reference: Leviticus 18:2
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: Speak to the sons of Israel and say to them, ‘I am the LORD your God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the children of Israel” or “the Israelites.” The Hebrew is literally
      “the sons of Israel,” a familial covenant expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered “the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak out
  lexicon: HALOT
  rationale: Imperative of דבר introducing direct divine instruction to Moses; 'Speak'
    is the natural formal-modern English equivalent and fits the command sequence.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the familial expression is preserved rather than flattened to 'Israelites,' while
    still functioning corporately for the covenant people.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Straightforward continuation of the command. 'Say to them' preserves
    the directness and cadence of the Hebrew better than the slightly more interpretive
    'tell them.'
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is naturally rendered with the implied copula
    in English in this identification formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With singular covenantal reference to YHWH, the plural-form noun functions
    as the singular 'God.' The 2mp suffix is represented by 'your.'
