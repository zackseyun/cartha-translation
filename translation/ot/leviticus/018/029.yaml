theological_decisions:
- issue: Meaning of the penalty formula וְנִכְרְתוּ ... מִקֶּרֶב עַמָּם
  chosen_reading: shall be cut off from among their people
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  rationale: The Hebrew legal formula does not itself specify whether the cutting
    off is direct divine judgment, human-imposed death, or expulsion; those possibilities
    are debated from broader Pentateuchal usage. To preserve the text's legal-theological
    tension rather than resolve it, the main text retains the idiom 'cut off' without
    narrowing the penalty.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
