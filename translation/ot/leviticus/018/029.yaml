id: LEV.18.29
reference: Leviticus 18:29
source:
  edition: WLC
  text: כִּ֚י כָּל אֲשֶׁ֣ר יַעֲשֶׂ֔ה מִ/כֹּ֥ל הַ/תּוֹעֵב֖וֹת הָ/אֵ֑לֶּה וְ/נִכְרְת֛וּ
    הַ/נְּפָשׁ֥וֹת הָ/עֹשֹׂ֖ת מִ/קֶּ֥רֶב עַמָּֽ/ם־׃
translation:
  text: For whoever does any of all these abominations, the persons who do them shall
    be cut off from among their people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall be put to death' or 'shall be excluded from the community'; the
      Hebrew says 'shall be cut off,' without specifying the exact mode of judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale or consequence flowing from the preceding prohibition
    section; 'For' fits the explanatory force in context.
- source_word: כָּל אֲשֶׁר
  chosen: whoever
  alternatives:
  - everyone who
  - anyone who
  lexicon: HALOT
  rationale: 'The combination expresses an indefinite universal relative: ''everyone/whoever
    that.'' ''Whoever'' is concise and natural English while preserving the universal
    scope.'
- source_word: יַעֲשֶׂה
  chosen: does
  alternatives:
  - commits
  - practices
  lexicon: HALOT
  rationale: The basic verb is 'do/make.' 'Does' preserves the broad verbal sense
    without narrowing it to a specialized moral term beyond what the Hebrew states.
- source_word: מִכֹּל הַתּוֹעֵבוֹת הָאֵלֶּה
  chosen: any of all these abominations
  alternatives:
  - any of these abominations
  - anything from all these abominations
  lexicon: HALOT
  rationale: The phrase literally includes 'from all these abominations.' In idiomatic
    English, 'any of all these abominations' preserves both the partitive מִן and
    the comprehensive force of כֹּל, though slightly smoothed. 'Abominations' is the
    standard and contextually weighty rendering of תּוֹעֵבוֹת.
- source_word: תּוֹעֵבוֹת
  chosen: abominations
  alternatives:
  - detestable acts
  - abhorrent things
  lexicon: HALOT
  rationale: The noun denotes things that are ritually and morally detestable in this
    holiness-law context. 'Abominations' preserves the gravity and established semantic
    force without paraphrase.
- source_word: וְנִכְרְתוּ
  chosen: shall be cut off
  alternatives:
  - will be cut off
  - shall be eliminated
  lexicon: HALOT
  rationale: The Niphal of כרת in covenant/legal contexts is conventionally and accurately
    rendered 'be cut off.' The exact mechanism is not specified here, so the traditional
    legal idiom is best preserved rather than interpreted more narrowly.
- source_word: הַנְּפָשׁוֹת
  chosen: the persons
  alternatives:
  - the souls
  - the people
  lexicon: HALOT
  rationale: Though נֶפֶשׁ is often literally 'soul' or 'life,' in legal contexts
    it commonly refers to persons/individuals. 'Persons' avoids misleading dualistic
    overtones in English while preserving the personal reference.
- source_word: הָעֹשֹׂת
  chosen: who do them
  alternatives:
  - doing these things
  - who commit them
  lexicon: HALOT
  rationale: The participle identifies the offending persons as the ones performing
    these acts. 'Who do them' is a natural English relative rendering tied back to
    the abominations just mentioned.
- source_word: מִקֶּרֶב עַמָּם
  chosen: from among their people
  alternatives:
  - from the midst of their people
  - from among their kin
  lexicon: HALOT
  rationale: This phrase is a standard covenant-community formula. 'From among their
    people' is clear modern English and preserves the communal setting of exclusion/judgment.
