id: LEV.18.26
reference: Leviticus 18:26
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֣ם אַתֶּ֗ם אֶת חֻקֹּתַ/י֙ וְ/אֶת מִשְׁפָּטַ֔/י וְ/לֹ֣א תַעֲשׂ֔וּ
    מִ/כֹּ֥ל הַ/תּוֹעֵבֹ֖ת הָ/אֵ֑לֶּה הָֽ/אֶזְרָ֔ח וְ/הַ/גֵּ֖ר הַ/גָּ֥ר בְּ/תוֹכְ/כֶֽם־־׃
translation:
  text: But you yourselves shall keep my statutes and my judgments, and you shall
    not do any of these abominations, neither the native-born nor the sojourner who
    sojourns among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigner who resides among you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: shall keep
  alternatives:
  - must keep
  - are to keep
  - shall observe
  lexicon: HALOT
  rationale: שׁמר in covenant/legal contexts commonly means to keep, observe, or guard.
    'Shall keep' preserves the directive force and legal tone without sounding archaic
    beyond the register of the passage.
- source_word: אַתֶּם
  chosen: you yourselves
  alternatives:
  - you
  - as for you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal suffix. 'You
    yourselves' brings that emphasis into English.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקִּים are fixed prescriptions. 'Statutes' is a standard and suitably
    precise legal rendering in Torah contexts.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  - my judgments and rulings
  lexicon: HALOT
  rationale: מִשְׁפָּטִים are judicial decisions or legal judgments. 'Judgments' keeps
    the legal nuance and pairs naturally with 'statutes.'
- source_word: תַעֲשׂוּ
  chosen: do
  alternatives:
  - practice
  - commit
  lexicon: HALOT
  rationale: עשה is broad and here governs the prohibited acts. 'Do' is the most direct
    equivalent; 'practice' would add an iterative nuance not explicit in the form.
- source_word: מִכֹּל
  chosen: any of
  alternatives:
  - from any of
  - anything of
  lexicon: HALOT
  rationale: With negation, מן + כל idiomatically yields 'any of.' This is natural
    English and preserves the comprehensive prohibition.
- source_word: הַתּוֹעֵבֹת
  chosen: abominations
  alternatives:
  - detestable things
  - abhorrent practices
  lexicon: HALOT
  rationale: תּוֹעֵבָה denotes something detestable, especially in moral/cultic violation.
    'Abominations' preserves the strong evaluative force and matches the gravity of
    the context.
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - such
  lexicon: HALOT
  rationale: Simple demonstrative reference to the prohibited acts listed in the chapter.
- source_word: הָאֶזְרָח
  chosen: the native-born
  alternatives:
  - the native
  - the citizen
  lexicon: HALOT
  rationale: אֶזְרָח refers to one native to the land/community. 'Native-born' is
    clear and preserves the contrast with the resident foreigner.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the alien
  - the stranger
  lexicon: HALOT
  rationale: גֵּר is a non-native residing within Israelite society under its protections
    and obligations. 'Sojourner' is concise and traditional; 'resident foreigner'
    is a viable explanatory alternative.
- source_word: הַגָּר בְּתוֹכְכֶם
  chosen: who sojourns among you
  alternatives:
  - who resides among you
  - who lives among you
  lexicon: HALOT
  rationale: The participial phrase restates the status of the גֵּר. 'Who sojourns
    among you' preserves the lexical connection with גֵּר and the resident-within-community
    sense.
