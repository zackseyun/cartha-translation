theological_decisions:
- issue: Scope of the prohibition for both Israelites and non-native residents
  chosen_reading: The command applies equally to the native-born and to the sojourner
    residing among Israel.
  alternative_readings:
  - The final phrase could be taken appositionally as identifying those bound by the
    command without emphasizing equality.
  rationale: The syntax places both הָאֶזְרָח and הַגֵּר as subjects implicated in
    the prohibition. The verse explicitly extends covenant-community moral obligations
    to both groups present in the land.
