id: LEV.18.4
reference: Leviticus 18:4
source:
  edition: WLC
  text: אֶת מִשְׁפָּטַ֧/י תַּעֲשׂ֛וּ וְ/אֶת חֻקֹּתַ֥/י תִּשְׁמְר֖וּ לָ/לֶ֣כֶת בָּ/הֶ֑ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־־׃
translation:
  text: You shall do my judgments, and you shall keep my statutes, to walk in them. I am Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to live by them.' The Hebrew literally says 'to walk in them,' an idiom for ordering one's life according to God's commands.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  - my decrees
  lexicon: HALOT
  rationale: מִשְׁפָּט often denotes legal decisions, judgments, or ordinances. 'Judgments' preserves the juridical force and pairs distinctly with חֻקּוֹת, avoiding flattening both terms into the same English gloss.
- source_word: תַּעֲשׂוּ
  chosen: you shall carry out
  alternatives:
  - you shall do
  - you shall practice
  lexicon: HALOT
  rationale: עשה is broadly 'do/make,' but in legal/ethical context 'carry out' communicates actual observance in natural English while remaining close to the source.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my prescriptions
  lexicon: HALOT
  rationale: חֹק/חֻקָּה commonly refers to prescribed statutes or enactments. 'Statutes' is a standard and precise legal rendering that maintains distinction from מִשְׁפָּטַי.
- source_word: תִּשְׁמְרוּ
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר literally means 'keep/guard/watch.' In covenant-law contexts, 'keep' is idiomatic and preserves the covenantal sense of careful observance.
- source_word: לָלֶכֶת בָּהֶם
  chosen: to walk in them
  alternatives:
  - by walking in them
  - to live by them
  - to follow them
  lexicon: HALOT
  rationale: הלך with ב conveys conduct or manner of life. 'To walk in them' preserves the Hebrew metaphor and its ethical force. 'Live by them' is possible interpretively, but this verse's wording more directly expresses ongoing conduct than the stronger life-from-obedience formulation found elsewhere.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2mp suffix straightforwardly means 'your God,' expressing covenant relationship.
