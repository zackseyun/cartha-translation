theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Moral/cultic force of תּוֹעֵבֹת
  chosen_reading: abominable
  alternative_readings:
  - detestable
  - abhorrent
  rationale: The verse condemns these practices with strong evaluative language. 'Abominable'
    preserves the text's gravity without adding specificity beyond the Hebrew.
