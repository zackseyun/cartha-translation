id: LEV.18.30
reference: Leviticus 18:30
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֣ם אֶת מִשְׁמַרְתִּ֗/י לְ/בִלְתִּ֨י עֲשׂ֜וֹת מֵ/חֻקּ֤וֹת הַ/תּֽוֹעֵבֹת֙
    אֲשֶׁ֣ר נַעֲשׂ֣וּ לִ/פְנֵי/כֶ֔ם וְ/לֹ֥א תִֽטַּמְּא֖וּ בָּ/הֶ֑ם אֲנִ֖י יְהוָ֥ה
    אֱלֹהֵי/כֶֽם־׃פ
translation:
  text: So you shall keep my charge, so as not to practice any of the abominable statutes
    that were practiced before you, and you shall not make yourselves unclean by them.
    I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'detestable statutes' / 'detestable customs.' The Hebrew terms can denote
      prescribed practices or customs, not only formal statutes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: you shall keep
  alternatives:
  - you must keep
  - you are to keep
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' 'You shall keep' preserves
    the covenantal/legal force and matches the imperfect's directive sense in context.
- source_word: מִשְׁמַרְתִּי
  chosen: my charge
  alternatives:
  - my obligation
  - my ordinance
  - my command
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes a charge, duty, or obligation to be kept. 'My
    charge' is concise, idiomatic, and preserves the sense of entrusted obligation
    better than the more generic 'my command.'
- source_word: לְבִלְתִּי עֲשׂוֹת
  chosen: so as not to practice
  alternatives:
  - not to do
  - so as not to do
  - in order not to commit
  lexicon: HALOT
  rationale: 'The construction expresses purpose/prevention: ''so as not to.'' Because
    the object is a set of customary practices/statutes, ''practice'' communicates
    repeated conduct more naturally than bare ''do'' while remaining close to the
    Hebrew.'
- source_word: מֵחֻקּוֹת
  chosen: any of the ... statutes
  alternatives:
  - customs
  - ordinances
  - prescribed practices
  lexicon: HALOT
  rationale: חֻקּוֹת can mean statutes or prescribed customs. Here, in parallel with
    the nations' detestable behaviors, it refers to established practices. 'Statutes'
    preserves the formal lexical link while 'any of the' reflects the partitive מִן.
- source_word: הַתּוֹעֵבֹת
  chosen: abominable
  alternatives:
  - detestable
  - abhorrent
  lexicon: HALOT
  rationale: תּוֹעֵבָה denotes something detestable/abominable, often with strong
    cultic-moral revulsion. 'Abominable' preserves the gravity and traditional moral
    force of the term.
- source_word: אֲשֶׁר נַעֲשׂוּ לִפְנֵיכֶם
  chosen: that were practiced before you
  alternatives:
  - that were done before you
  - which were practiced prior to your arrival
  lexicon: HALOT
  rationale: The passive 'were done' refers to the actions of prior inhabitants. 'Before
    you' in context means prior to Israel in the land, not merely spatially in front
    of them. 'Were practiced before you' makes the temporal-cultural sense clear.
- source_word: וְלֹא תִטַּמְּאוּ בָּהֶם
  chosen: and you shall not make yourselves unclean by them
  alternatives:
  - and do not defile yourselves with them
  - and you shall not become unclean through them
  lexicon: HALOT
  rationale: 'טמא in the hitpael/tithpael-type stem here is reflexive: ''make yourselves
    unclean/defile yourselves.'' ''Make yourselves unclean by them'' preserves the
    reflexive force and the instrumental בָּהֶם.'
- source_word: אֲנִי יְהוָה אֱלֹהֵיכֶם
  chosen: I am the LORD your God
  alternatives:
  - I, the LORD, am your God
  lexicon: HALOT
  rationale: This is the standard covenantal self-identification formula. Per doctrine
    guidance, יְהוָה is rendered 'the LORD' rather than transliterated.
