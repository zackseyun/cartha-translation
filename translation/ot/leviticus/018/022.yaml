theological_decisions:
- issue: Nature of the prohibition in holiness-code context
  chosen_reading: Render the verse as a direct prohibition of male-male sexual intercourse
    without narrowing it to a specific exploitative subset not stated in the Hebrew.
  alternative_readings:
  - Render more narrowly toward specific cultic or exploitative practices
  - Render more interpretively as a prohibition of same-sex intercourse
  rationale: The Hebrew text directly prohibits lying with a male 'as one lies with
    a woman' and labels the act תּוֹעֵבָה. The translation should state what the text
    says without importing limiting qualifiers not present in the verse, while also
    avoiding paraphrase that expands beyond the wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; never import
    doctrinal claims the text does not make.'
