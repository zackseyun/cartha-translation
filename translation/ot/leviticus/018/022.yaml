id: LEV.18.22
reference: Leviticus 18:22
source:
  edition: WLC
  text: וְ/אֶ֨ת זָכָ֔ר לֹ֥א תִשְׁכַּ֖ב מִשְׁכְּבֵ֣י אִשָּׁ֑ה תּוֹעֵבָ֖ה הִֽוא־׃
translation:
  text: You shall not lie with a male as one lies with a woman; it is an abomination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the lyings of a woman,'' an idiom referring to sexual intercourse
      with a woman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכָר
  chosen: a male
  alternatives:
  - a man
  - the male
  lexicon: HALOT
  rationale: זָכָר denotes a male person/sexed male. 'A male' is the most direct rendering
    and avoids narrowing the term beyond the Hebrew. 'A man' is possible in English
    but can suggest adult status more specifically than the Hebrew requires.
- source_word: תִשְׁכַּב
  chosen: you shall not lie
  alternatives:
  - you shall not have sexual relations
  - you shall not sleep
  lexicon: HALOT
  rationale: From שׁכב, here a sexual euphemism in legal prohibition. 'Lie' preserves
    the Hebrew idiom with sufficient clarity in context, while 'have sexual relations'
    is more explicit but less formally tied to the source.
- source_word: מִשְׁכְּבֵי אִשָּׁה
  chosen: as one lies with a woman
  alternatives:
  - the lyings of a woman
  - as with a woman
  lexicon: HALOT
  rationale: The plural construct phrase is idiomatic and refers to sexual lying/sexual
    intercourse with a woman. 'As one lies with a woman' renders the sense in natural
    English while preserving the comparison embedded in the Hebrew. A more literal
    'the lyings of a woman' is awkward and opaque in English.
- source_word: תּוֹעֵבָה
  chosen: an abomination
  alternatives:
  - detestable
  - a detestable thing
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong term for something abhorrent or ritually/morally
    detestable within the holiness code. 'Abomination' is the established and suitably
    weighty English equivalent here, preserving the force of the prohibition.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the prohibited act as summarized
    by תּוֹעֵבָה. English idiom naturally expresses this predication as 'it is.'
