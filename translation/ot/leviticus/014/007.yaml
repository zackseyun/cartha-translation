theological_decisions:
- issue: Rendering of צָרַעַת
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  rationale: Levitical צָרַעַת refers to a ritual-impurity category broader than modern
    leprosy. Using 'skin disease' avoids importing anachronistic medical assumptions
    into the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
