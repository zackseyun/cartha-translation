id: LEV.14.7
reference: Leviticus 14:7
source:
  edition: WLC
  text: וְ/הִזָּ֗ה עַ֧ל הַ/מִּטַּהֵ֛ר מִן הַ/צָּרַ֖עַת שֶׁ֣בַע פְּעָמִ֑ים וְ/טִ֣הֲר֔/וֹ
    וְ/שִׁלַּ֛ח אֶת הַ/צִּפֹּ֥ר הַֽ/חַיָּ֖ה עַל פְּנֵ֥י הַ/שָּׂדֶֽה־־־׃
translation:
  text: He shall sprinkle it on the one being cleansed from the skin disease seven
    times, and he shall pronounce him clean, and he shall let the living bird go free
    over the open field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally 'leprosy.' The Hebrew term refers more broadly to a range
      of skin-related conditions in Leviticus, not necessarily modern leprosy.
    reason: lexical_alternative
  - marker: b
    text: Or 'declare him clean.' The priest's action is ritual/judicial, not merely
      medical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  chosen: He shall sprinkle it
  alternatives:
  - and he shall spatter
  - and he shall sprinkle
  lexicon: HALOT
  rationale: Hiphil of נזה in ritual contexts commonly means to sprinkle a liquid
    or blood. English idiom benefits from supplying the implied object 'it' from the
    immediately preceding ritual mixture, since the Hebrew verb here is transitive
    by context though the object is unstated in this verse.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one to be cleansed
  - the person being purified
  lexicon: HALOT
  rationale: The hitpael participle of טהר denotes the person undergoing the cleansing
    process. 'Being cleansed' preserves the procedural sense better than a simple
    adjective like 'clean.'
- source_word: מִן הַצָּרַעַת
  chosen: from the skin disease
  alternatives:
  - from leprosy
  - from the defiling skin disease
  lexicon: HALOT
  rationale: צָרַעַת in Leviticus does not map neatly onto modern Hansen's disease,
    so 'skin disease' avoids misleading medical specificity. 'From' reflects separation
    from the condition.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Straightforward numerical-adverbial phrase; 'seven times' is the natural
    English equivalent.
- source_word: וְטִהֲרוֹ
  chosen: and he shall pronounce him clean
  alternatives:
  - and he shall cleanse him
  - and he shall declare him clean
  lexicon: HALOT
  rationale: In priestly/legal contexts, טהר in the piel/qal with a human object can
    denote the priest's formal act of declaring someone clean, not merely effecting
    physical cleansing. 'Pronounce him clean' makes the juridical-ritual force explicit
    in idiomatic English.
- source_word: וְשִׁלַּח
  chosen: and he shall let ... go free
  alternatives:
  - and he shall send away
  - and he shall release
  lexicon: HALOT
  rationale: שׁלח means send/release. Because the bird is released alive as part of
    the rite, 'let ... go free' captures the action naturally and vividly without
    overparaphrasing.
- source_word: הַצִּפֹּר הַחַיָּה
  chosen: the living bird
  alternatives:
  - the live bird
  - the bird that is alive
  lexicon: HALOT
  rationale: The adjective distinguishes this bird from the one slaughtered in the
    prior verse. 'Living bird' is clear and suitably formal.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: over the open field
  alternatives:
  - into the open country
  - over the face of the field
  - in the open field
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי often means 'over/upon the surface of' or more broadly
    'in the open expanse of.' 'Over the open field' preserves the spatial imagery
    while sounding natural in English.
