theological_decisions:
- issue: Gender rendering of generic masculine singular forms in legal instruction
  chosen_reading: Use 'whoever ... his clothes'
  alternative_readings:
  - the one who ... his clothes
  - anyone who ... their clothes
  rationale: The Hebrew uses grammatically masculine singular participles and suffixes
    in a representative legal sense. Per the translation philosophy, gender-accurate
    rendering is preferred over flattening to gender-neutral language. 'Whoever' communicates
    generic scope, while 'his clothes' preserves the singular masculine form without
    implying restriction to males only.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
