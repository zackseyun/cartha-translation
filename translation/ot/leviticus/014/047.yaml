id: LEV.14.47
reference: Leviticus 14:47
source:
  edition: WLC
  text: וְ/הַ/שֹּׁכֵ֣ב בַּ/בַּ֔יִת יְכַבֵּ֖ס אֶת בְּגָדָ֑י/ו וְ/הָ/אֹכֵ֣ל בַּ/בַּ֔יִת
    יְכַבֵּ֖ס אֶת בְּגָדָֽי/ו־־׃
translation:
  text: And whoever lies down in the house shall wash his clothes, and whoever eats
    in the house shall wash his clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever sleeps in the house.' The Hebrew verb can mean 'lie down' or
      'sleep'; 'lies down' is broader and fits the legal context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his clothes' uses a masculine singular form in a generic legal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשֹּׁכֵב
  chosen: and whoever lies down
  alternatives:
  - and the one who lies down
  - and whoever sleeps
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring generically
    to any person who lies down in the house. 'Whoever lies down' is natural English
    and preserves the habitual/legal force. 'Lies down' is preferred over 'sleeps'
    because the verb שׁכב can denote lying down generally, and the legal context does
    not require actual sleep.
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - inside the house
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'In the house' is the most direct and
    idiomatic rendering.
- source_word: יְכַבֵּס
  chosen: shall wash
  alternatives:
  - must wash
  - shall launder
  lexicon: HALOT
  rationale: In priestly legal material, the imperfect commonly expresses obligation
    or prescribed result. 'Shall wash' preserves the legal register without becoming
    overly paraphrastic. 'Launder' is too specific and modern.
- source_word: אֶת־בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: בֶּגֶד refers to clothing/garments. 'Clothes' is clearer modern English;
    'garments' is possible but more formal and less natural. The masculine singular
    suffix is retained as 'his' in keeping with the gender-accurate policy for a grammatically
    masculine generic singular in legal discourse.
- source_word: וְהָאֹכֵל
  chosen: and whoever eats
  alternatives:
  - and the one who eats
  lexicon: HALOT
  rationale: Like the previous participle, this is a substantival participle with
    generic force. 'Whoever eats' is idiomatic and matches the legal style of the
    verse.
