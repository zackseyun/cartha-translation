id: LEV.14.51
reference: Leviticus 14:51
source:
  edition: WLC
  text: וְ/לָקַ֣ח אֶת עֵֽץ הָ֠/אֶרֶז וְ/אֶת הָ֨/אֵזֹ֜ב וְ/אֵ֣ת שְׁנִ֣י הַ/תּוֹלַ֗עַת
    וְ/אֵת֮ הַ/צִּפֹּ֣ר הַֽ/חַיָּה֒ וְ/טָבַ֣ל אֹתָ֗/ם בְּ/דַם֙ הַ/צִּפֹּ֣ר הַ/שְּׁחוּטָ֔ה
    וּ/בַ/מַּ֖יִם הַֽ/חַיִּ֑ים וְ/הִזָּ֥ה אֶל הַ/בַּ֖יִת שֶׁ֥בַע פְּעָמִֽים־־־׀־׃
translation:
  text: Then he shall take the cedar wood, the hyssop, the scarlet yarn, and the living
    bird, and dip them in the blood of the slaughtered bird and in the fresh water,
    and sprinkle the house seven times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'scarlet of the worm'; traditionally understood as scarlet-dyed
      thread or yarn.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'living water,' that is, fresh or flowing water.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then he shall take
  alternatives:
  - and he shall take
  - and he took
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural legal material commonly
    carries sequential/jussive force in English; 'shall take' fits the ritual instruction
    context better than a simple past.
- source_word: עֵץ הָאֶרֶז
  chosen: the cedar wood
  alternatives:
  - cedarwood
  - wood of cedar
  lexicon: HALOT
  rationale: The construct phrase refers to cedar wood as a ritual material. 'Cedar
    wood' is clear modern English while remaining close to the Hebrew.
- source_word: הָאֵזֹב
  chosen: the hyssop
  alternatives:
  - hyssop plant
  lexicon: HALOT
  rationale: Standard rendering for אֵזוֹב; no need to expand beyond the source text.
- source_word: שְׁנִי הַתּוֹלַעַת
  chosen: the scarlet yarn
  alternatives:
  - scarlet thread
  - crimson yarn
  - scarlet stuff
  lexicon: HALOT
  rationale: This expression denotes scarlet-dyed material, traditionally thread/yarn.
    'Scarlet yarn' is idiomatic and fits the ritual bundle imagery; 'thread' is possible
    and preserved in a footnote.
- source_word: הַצִּפֹּר הַחַיָּה
  chosen: the living bird
  alternatives:
  - the live bird
  lexicon: HALOT
  rationale: Adjective חַיָּה distinguishes this bird from the slaughtered one. 'Living
    bird' is natural and precise.
- source_word: וְטָבַל אֹתָם
  chosen: and dip them
  alternatives:
  - and immerse them
  lexicon: HALOT
  rationale: טבל means to dip/immerse. 'Dip them' is the most natural English in this
    ritual context.
- source_word: בְּדַם הַצִּפֹּר הַשְּׁחוּטָה
  chosen: in the blood of the slaughtered bird
  alternatives:
  - in the blood of the killed bird
  - in the blood of the bird that was slaughtered
  lexicon: HALOT
  rationale: שׁחט is the standard verb for slaughtering in sacrificial/ritual contexts.
    'Slaughtered' preserves that cultic nuance better than merely 'killed'.
- source_word: וּבַמַּיִם הַחַיִּים
  chosen: and in the fresh water
  alternatives:
  - and in the living water
  - and in running water
  lexicon: HALOT
  rationale: מַיִם חַיִּים literally 'living water' refers to fresh, flowing water.
    To avoid importing later theological associations into a ritual law context, 'fresh
    water' is used in the main text, with literal and more specific alternatives preserved
    in a footnote.
- source_word: וְהִזָּה אֶל הַבַּיִת
  chosen: and sprinkle the house
  alternatives:
  - and spatter toward the house
  - and sprinkle onto the house
  lexicon: HALOT
  rationale: נזה in Hiphil is the standard verb for ritual sprinkling. With אֶל, English
    idiom still prefers direct object 'sprinkle the house'.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Straightforward numerical adverbial phrase; no expansion needed.
