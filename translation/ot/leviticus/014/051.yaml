theological_decisions:
- issue: Rendering of מַיִם חַיִּים in ritual legislation
  chosen_reading: fresh water
  alternative_readings:
  - living water
  - running water
  rationale: The Hebrew idiom denotes water from a fresh/flowing source. In this legal-ritual
    context, 'fresh water' communicates the plain sense in accessible English without
    foregrounding later theological resonances attached to the literal phrase 'living
    water.' The literal alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 3, 6
