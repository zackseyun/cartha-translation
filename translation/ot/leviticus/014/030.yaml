id: LEV.14.30
reference: Leviticus 14:30
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה אֶת הָֽ/אֶחָד֙ מִן הַ/תֹּרִ֔ים א֖וֹ מִן בְּנֵ֣י הַ/יּוֹנָ֑ה מֵ/אֲשֶׁ֥ר
    תַּשִּׂ֖יג יָדֽ/וֹ־־־׃
translation:
  text: And he shall offer one of the turtledoves or one of the young pigeons, from
    what his means can afford—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from what his hand attains,' a Hebrew idiom meaning according
      to what he can afford.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: And he shall offer
  alternatives:
  - and he shall make
  - and he shall do
  lexicon: HALOT
  rationale: Though the verb is literally 'do/make,' in sacrificial contexts עשה commonly
    means to perform or offer a sacrifice. 'Offer' gives the cultic sense in natural
    English without over-paraphrasing.
- source_word: אֶת־הָאֶחָד
  chosen: one
  alternatives:
  - the one
  - one of them
  lexicon: HALOT
  rationale: The direct-object marker plus 'the one' idiomatically means 'one' from
    the following alternatives. English does not need the article here.
- source_word: מִן־הַתֹּרִים
  chosen: of the turtledoves
  alternatives:
  - from the turtledoves
  - of the doves
  lexicon: HALOT
  rationale: תֹּרִים refers specifically to turtledoves in sacrificial legislation,
    not doves generically.
- source_word: אוֹ מִן־בְּנֵי הַיּוֹנָה
  chosen: or one of the young pigeons
  alternatives:
  - or of the young pigeons
  - or one of the pigeon young
  lexicon: HALOT
  rationale: בְּנֵי הַיּוֹנָה is the standard idiom for young pigeons in Levitical
    sacrificial contexts. Repeating 'one of' in English clarifies the distributive
    sense carried by the construction.
- source_word: מֵאֲשֶׁר תַּשִּׂיג יָדוֹ
  chosen: from what his means can afford
  alternatives:
  - from what his hand can reach
  - according to what he can afford
  - as his means suffice
  lexicon: HALOT
  rationale: Literally 'from what his hand attains.' This Hebrew idiom refers to financial
    ability or means. 'What his means can afford' preserves the economic sense in
    readable English.
