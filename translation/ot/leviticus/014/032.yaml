id: LEV.14.32
reference: Leviticus 14:32
source:
  edition: WLC
  text: זֹ֣את תּוֹרַ֔ת אֲשֶׁר בּ֖/וֹ נֶ֣גַע צָרָ֑עַת אֲשֶׁ֛ר לֹֽא תַשִּׂ֥יג יָד֖/וֹ
    בְּ/טָהֳרָתֽ/וֹ־־׃פ
translation:
  text: This is the law for him in whom there is an infection of skin disease, whose
    hand cannot afford what is required for his cleansing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרָעַת traditionally rendered 'leprosy,' but in Leviticus it refers
      more broadly to a range of serious skin conditions and related ritual impurity.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose hand does not reach in his cleansing,' an idiom meaning
      he lacks sufficient means for the purification offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  chosen: law
  alternatives:
  - instruction
  - regulation
  lexicon: HALOT
  rationale: In priestly material תּוֹרָה often introduces a prescribed legal/procedural
    rule. 'Law' is concise and idiomatic here, while 'instruction' or 'regulation'
    are possible alternatives.
- source_word: בּוֹ
  chosen: in whom there is
  alternatives:
  - who has
  - in him is
  lexicon: HALOT
  rationale: The preposition plus pronoun with נֶגַע expresses that the affliction
    is present in the person. 'In whom there is' preserves the Hebrew construction
    more closely than the smoother 'who has'.
- source_word: נֶגַע צָרָעַת
  chosen: an infection of skin disease
  alternatives:
  - a case of leprous disease
  - the plague of leprosy
  - an affliction of a skin disease
  lexicon: HALOT
  rationale: צָרָעַת in Leviticus does not map neatly onto modern Hansen's disease,
    so 'leprosy' can mislead. 'Skin disease' communicates the broader ritual-dermatological
    category, and נֶגַע is represented by 'infection/affliction' rather than omitted.
- source_word: לֹא תַשִּׂיג יָדוֹ
  chosen: whose hand cannot afford
  alternatives:
  - whose means do not suffice
  - who cannot obtain
  - whose resources are insufficient
  lexicon: HALOT
  rationale: This idiom refers to financial means being insufficient. 'Whose hand
    cannot afford' keeps the Hebrew image while remaining understandable in English.
- source_word: בְּטָהֳרָתוֹ
  chosen: what is required for his cleansing
  alternatives:
  - for his cleansing
  - in his cleansing
  - for his purification
  lexicon: HALOT
  rationale: The preposition ב here is idiomatic in context, referring to what pertains
    to the purification process described in the preceding verses. Expanding to 'what
    is required for his cleansing' makes the sense explicit in natural English without
    adding new content. 'Cleansing' fits the ritual context accessibly; 'purification'
    is also possible.
