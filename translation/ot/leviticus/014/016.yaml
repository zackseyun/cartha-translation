id: LEV.14.16
reference: Leviticus 14:16
source:
  edition: WLC
  text: וְ/טָבַ֤ל הַ/כֹּהֵן֙ אֶת אֶצְבָּע֣/וֹ הַ/יְמָנִ֔ית מִן הַ/שֶּׁ֕מֶן אֲשֶׁ֥ר עַל כַּפּ֖/וֹ הַ/שְּׂמָאלִ֑ית וְ/הִזָּ֨ה מִן הַ/שֶּׁ֧מֶן בְּ/אֶצְבָּע֛/וֹ שֶׁ֥בַע פְּעָמִ֖ים לִ/פְנֵ֥י יְהוָֽה־־־־׃
translation:
  text: The priest shall dip his right finger into some of the oil that is on his left palm, and with his finger he shall sprinkle some of the oil seven times before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before Yahweh.'' The main text follows the project''s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: טָבַל
  chosen: dip
  alternatives:
  - immerse
  lexicon: HALOT
  rationale: The verb denotes dipping into a liquid. 'Dip' is natural English and fits the ritual action better than the more expansive 'immerse,' since only the finger is involved.
- source_word: אֶצְבָּעוֹ הַיְמָנִית
  chosen: his right finger
  alternatives:
  - the finger of his right hand
  lexicon: HALOT
  rationale: This is the most direct and idiomatic rendering of the construct with adjective. It preserves the bodily specificity required for the ritual.
- source_word: מִן הַשֶּׁמֶן
  chosen: into some of the oil
  alternatives:
  - from the oil
  lexicon: HALOT
  rationale: The preposition מִן after 'dip' is most naturally expressed in English as dipping into the substance, while still conveying that only part of the oil is involved.
- source_word: אֲשֶׁר עַל כַּפּוֹ הַשְּׂמָאלִית
  chosen: that is on his left palm
  alternatives:
  - which is on his left hand
  - that is in the palm of his left hand
  lexicon: HALOT
  rationale: כַּף here refers specifically to the palm, not the whole hand. 'On his left palm' follows the Hebrew spatial wording while remaining natural in English.
- source_word: הִזָּה
  chosen: sprinkle
  alternatives:
  - spatter
  - dash
  lexicon: HALOT
  rationale: In priestly ritual contexts this verb commonly refers to sprinkling a liquid in a prescribed manner. 'Sprinkle' is the standard and clearest ritual term in English.
- source_word: בְּאֶצְבָּעוֹ
  chosen: with his finger
  alternatives:
  - using his finger
  - with his fingertip
  lexicon: HALOT
  rationale: The preposition ב marks instrument here. 'With his finger' is concise and accurately expresses the means of sprinkling.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: This is a straightforward numerical expression and should be rendered literally because the count is ritually significant.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase is a standard cultic expression meaning in Yahweh's presence. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before the LORD' preserves the formal ritual register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential substitution pattern.
