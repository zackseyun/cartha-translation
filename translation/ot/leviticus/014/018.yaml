id: LEV.14.18
reference: Leviticus 14:18
source:
  edition: WLC
  text: וְ/הַ/נּוֹתָ֗ר בַּ/שֶּׁ֨מֶן֙ אֲשֶׁר֙ עַל כַּ֣ף הַ/כֹּהֵ֔ן יִתֵּ֖ן עַל רֹ֣אשׁ הַ/מִּטַּהֵ֑ר וְ/כִפֶּ֥ר עָלָ֛י/ו הַ/כֹּהֵ֖ן לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: And what remains of the oil that is on the priest’s palm he shall put on the head of the one being cleansed, and the priest shall make atonement for him before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is left of the oil that is on the priest’s palm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  chosen: And what remains
  alternatives:
  - And the remainder
  - And what is left
  lexicon: HALOT
  rationale: The Niphal participle from יתר/נותר denotes what is left over or remains. 'What remains' is natural modern English and preserves the substantival force.
- source_word: בַּשֶּׁמֶן
  chosen: of the oil
  alternatives:
  - from the oil
  - in the oil
  lexicon: HALOT
  rationale: With the preceding substantival participle, English idiom is best expressed as 'what remains of the oil.' This reflects the partitive sense in context.
- source_word: אֲשֶׁר עַל כַּף הַכֹּהֵן
  chosen: that is in the priest’s palm
  alternatives:
  - that is on the priest’s palm
  - that is on the priest’s hand
  lexicon: HALOT
  rationale: כַּף commonly refers to the palm of the hand. Although עַל is literally 'on,' English naturally says oil is 'in' the palm when held there. 'Palm' is more precise than the broader 'hand.'
- source_word: יִתֵּן
  chosen: he shall put
  alternatives:
  - he shall place
  - he shall give
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/place.' In this ritual action involving application of oil, 'put' is the most idiomatic and accurate.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'on' is clear modern English.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the person being cleansed
  - the cleansed person
  lexicon: HALOT
  rationale: The Hitpael participle of טהר here refers to the person undergoing ritual cleansing. 'The one being cleansed' preserves the ongoing/passive sense better than 'the cleansed person.'
- source_word: וְכִפֶּר עָלָיו
  chosen: and the priest shall make atonement for him
  alternatives:
  - and the priest shall purge him
  - and the priest shall effect atonement on his behalf
  lexicon: HALOT
  rationale: כפר in priestly ritual contexts is conventionally and accurately rendered 'make atonement.' 'For him' reflects עָלָיו idiomatically in English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is concise and standard. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved only as an alternative, not in the main text.
