id: LEV.14.14
reference: Leviticus 14:14
source:
  edition: WLC
  text: וְ/לָקַ֣ח הַ/כֹּהֵן֮ מִ/דַּ֣ם הָ/אָשָׁם֒ וְ/נָתַן֙ הַ/כֹּהֵ֔ן עַל תְּנ֛וּךְ
    אֹ֥זֶן הַ/מִּטַּהֵ֖ר הַ/יְמָנִ֑ית וְ/עַל בֹּ֤הֶן יָד/וֹ֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן
    רַגְל֖/וֹ הַ/יְמָנִֽית־־־׃
translation:
  text: Then the priest shall take some of the blood of the guilt offering, and the
    priest shall put it on the lobe of the right ear of the one being cleansed, and
    on the thumb of his right hand, and on the big toe of his right foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tip of the right ear.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the blood of the guilt offering'; the sense is that the priest
      takes some of it for the rite.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדַּם
  chosen: some of the blood of
  alternatives:
  - from the blood of
  lexicon: HALOT
  rationale: The preposition מִן with דָּם naturally means 'from/of the blood.' In
    English ritual instructions, 'take some of the blood of' conveys the partitive
    sense clearly and idiomatically without implying all the blood is taken.
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  - the guilt sacrifice
  lexicon: HALOT
  rationale: אָשָׁם in Levitical sacrificial contexts denotes the specific offering
    commonly rendered 'guilt offering.' This is the most recognizable and contextually
    precise English equivalent.
- source_word: תְּנוּךְ אֹזֶן
  chosen: the lobe of the ... ear
  alternatives:
  - the tip of the ... ear
  lexicon: HALOT
  rationale: תְּנוּךְ refers to the extremity or soft part of the ear in ritual contexts.
    'Lobe' is the most natural modern English rendering here and matches the likely
    anatomical referent better than the more general 'tip.'
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one to be cleansed
  - the person being purified
  lexicon: HALOT
  rationale: The hitpael participle of טהר here denotes the person undergoing the
    cleansing rite, not one actively cleansing himself. 'The one being cleansed' preserves
    the passive/process sense and fits the ritual context.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - right side
  lexicon: HALOT
  rationale: The adjective indicates the right-side member in each case. English idiom
    prefers simply 'right ear/hand/foot' rather than 'right-side ear/hand/foot.'
- source_word: בֹּהֶן יָדוֹ
  chosen: the thumb of his ... hand
  alternatives:
  - the big thumb of his hand
  lexicon: HALOT
  rationale: בֹּהֶן denotes the thumb when used with the hand. 'Thumb' is the direct
    and idiomatic anatomical equivalent.
- source_word: בֹּהֶן רַגְלוֹ
  chosen: the big toe of his ... foot
  alternatives:
  - the great toe of his foot
  lexicon: HALOT
  rationale: בֹּהֶן denotes the great/big toe when used with the foot. 'Big toe' is
    standard modern English and more readable than 'great toe.'
- source_word: וְלָקַח ... וְנָתַן
  chosen: shall take ... shall put
  alternatives:
  - took ... put
  - is to take ... is to put
  lexicon: HALOT
  rationale: The qatal forms in this procedural legal context function instructionally/futurally.
    English 'shall' appropriately conveys prescriptive ritual action in legal material.
