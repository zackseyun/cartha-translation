theological_decisions:
- issue: Nature of the cleansing subject in ritual law
  chosen_reading: the participant is described as undergoing cleansing ('the one being
    cleansed') rather than as self-purifying
  alternative_readings:
  - the one cleansing himself
  - the purified one
  rationale: The Hebrew participle in context refers to the person who is the object
    of the priestly purification rite. This avoids implying autonomous self-cleansing
    and better reflects the ritual process described in Leviticus 14.
  doctrine_reference: Translation philosophy §1, §3
