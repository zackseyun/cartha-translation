id: LEV.14.21
reference: Leviticus 14:21
source:
  edition: WLC
  text: וְ/אִם דַּ֣ל ה֗וּא וְ/אֵ֣ין יָד/וֹ֮ מַשֶּׂגֶת֒ וְ֠/לָקַח כֶּ֣בֶשׂ אֶחָ֥ד אָשָׁ֛ם
    לִ/תְנוּפָ֖ה לְ/כַפֵּ֣ר עָלָ֑י/ו וְ/עִשָּׂר֨וֹן סֹ֜לֶת אֶחָ֨ד בָּל֥וּל בַּ/שֶּׁ֛מֶן
    לְ/מִנְחָ֖ה וְ/לֹ֥ג שָֽׁמֶן־׃
translation:
  text: But if he is poor and his means are insufficient, then he shall take one male
    lamb for a guilt offering, for a wave offering, to make atonement for him, and
    one-tenth of an ephah of fine flour mixed with oil for a grain offering, and one
    log of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his hand does not reach'; that is, he lacks sufficient
      means.
    reason: lexical_alternative
  - marker: b
    text: A 'log' is a small liquid measure used in Israelite ritual law.
    reason: cultural_note
lexical_decisions:
- source_word: דַּל
  chosen: poor
  alternatives:
  - of low means
  - needy
  lexicon: HALOT
  rationale: דַּל denotes one who is poor or of low economic status. 'Poor' is the
    most natural and direct English equivalent in this legal context.
- source_word: וְאֵין יָדוֹ מַשֶּׂגֶת
  chosen: his means are insufficient
  alternatives:
  - his hand cannot reach
  - he cannot afford
  lexicon: HALOT
  rationale: The idiom literally involves the 'hand' not attaining or reaching, but
    in context it refers to financial capacity. 'His means are insufficient' preserves
    the economic sense without over-paraphrasing; 'he cannot afford' is possible but
    slightly more interpretive.
- source_word: כֶּבֶשׂ אֶחָד
  chosen: one male lamb
  alternatives:
  - one lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ specifically denotes a male lamb. Including 'male' reflects the
    lexical specificity of the Hebrew and the sacrificial precision of the passage.
- source_word: אָשָׁם
  chosen: guilt offering
  alternatives:
  - reparation offering
  lexicon: HALOT
  rationale: אָשָׁם is the standard sacrificial term commonly rendered 'guilt offering.'
    'Reparation offering' captures part of the sense but is less established and less
    immediately recognizable.
- source_word: לִתְנוּפָה
  chosen: for a wave offering
  alternatives:
  - to be waved
  lexicon: HALOT
  rationale: תְּנוּפָה refers to the ritual presentation by waving. 'For a wave offering'
    keeps the cultic category explicit and aligns with the sacrificial procedure described
    in context.
- source_word: לְכַפֵּר עָלָיו
  chosen: to make atonement for him
  alternatives:
  - to purge for him
  - to effect atonement on his behalf
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' This preserves the theological and ritual force without
    importing a narrower doctrinal theory.
- source_word: וְעִשָּׂרוֹן סֹלֶת אֶחָד
  chosen: one-tenth of an ephah of fine flour
  alternatives:
  - one tenth-measure of fine flour
  lexicon: HALOT
  rationale: עִשָּׂרוֹן is a tenth-part dry measure, conventionally understood as
    a tenth of an ephah in sacrificial legislation. Supplying 'of an ephah' makes
    the measure intelligible in English and reflects standard usage in Torah translation.
- source_word: בָּלוּל בַּשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participle indicates flour combined with oil. 'Mixed with oil' is
    clear modern English while remaining faithful to the ritual description.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in Levitical sacrificial contexts refers specifically to the
    grain offering. 'Grain offering' is the clearest contextual rendering.
- source_word: לֹג שָׁמֶן
  chosen: one log of oil
  alternatives:
  - a log of oil
  lexicon: HALOT
  rationale: לֹג is a specific liquid measure. Retaining 'log' preserves the technical
    unit rather than replacing it with an uncertain modern equivalent.
