theological_decisions:
- issue: Rendering of sacrificial terminology in priestly law
  chosen_reading: Retain established cultic terms such as 'guilt offering,' 'wave
    offering,' 'make atonement,' and 'grain offering' in the main text.
  alternative_readings:
  - Use more explanatory renderings such as 'reparation offering' or 'ritual presentation'
  rationale: The verse is legal-ritual instruction, and these terms map closely to
    distinct Hebrew sacrificial categories. Retaining them preserves precision and
    theological continuity while remaining readable.
  doctrine_reference: Translation philosophy §§1, 5, 6
