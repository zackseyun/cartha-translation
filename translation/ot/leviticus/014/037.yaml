id: LEV.14.37
reference: Leviticus 14:37
source:
  edition: WLC
  text: וְ/רָאָ֣ה אֶת הַ/נֶּ֗גַע וְ/הִנֵּ֤ה הַ/נֶּ֨גַע֙ בְּ/קִירֹ֣ת הַ/בַּ֔יִת שְׁקַֽעֲרוּרֹת֙
    יְרַקְרַקֹּ֔ת א֖וֹ אֲדַמְדַּמֹּ֑ת וּ/מַרְאֵי/הֶ֥ן שָׁפָ֖ל מִן הַ/קִּֽיר־־׃
translation:
  text: He shall examine the infection, and if the infection is in the walls of the
    house as sunken areas, greenish or reddish, and their appearance is deeper than
    the wall,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'depressions' for 'sunken areas.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'lower than the wall'; that is, appearing recessed below the
      wall surface.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: He shall examine
  alternatives:
  - he shall see
  - he shall inspect
  lexicon: HALOT
  rationale: In this priestly diagnostic context, ראה carries the sense of examining/inspecting
    rather than merely seeing. 'Examine' communicates the procedural force in natural
    English.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the diseased area
  - the mark
  - the plague
  lexicon: HALOT
  rationale: נגע in Leviticus 13–14 refers to an affliction or infected spot, including
    on houses. 'Infection' is clearer for modern readers than the traditional but
    potentially misleading 'plague,' while still indicating an abnormal contaminated
    condition.
- source_word: וְהִנֵּה
  chosen: and if
  alternatives:
  - and behold
  - and look
  lexicon: HALOT
  rationale: Although literally 'and behold,' in procedural legal prose it often introduces
    the condition discovered on inspection. 'And if' conveys the idiomatic force in
    English without archaic diction.
- source_word: בְּקִירֹת הַבַּיִת
  chosen: in the walls of the house
  alternatives:
  - on the walls of the house
  lexicon: HALOT
  rationale: The preposition with 'walls' can be rendered 'in' here because the following
    description concerns depressions appearing within the wall surface. 'In the walls'
    best matches the imagery of penetration below the surface.
- source_word: שְׁקַעֲרוּרֹת
  chosen: sunken areas
  alternatives:
  - depressions
  - hollows
  lexicon: HALOT
  rationale: This rare term denotes hollowed or depressed spots. 'Sunken areas' is
    natural modern English and prepares for the following statement that their appearance
    is deeper than the wall.
- source_word: יְרַקְרַקֹּת
  chosen: greenish
  alternatives:
  - yellowish-green
  - pale green
  lexicon: HALOT
  rationale: The reduplicated form suggests a greenish hue rather than a strong pure
    green. 'Greenish' preserves that nuance succinctly.
- source_word: אֲדַמְדַּמֹּת
  chosen: reddish
  alternatives:
  - red
  - pinkish-red
  lexicon: HALOT
  rationale: The reduplicated adjective indicates a reddish tint rather than vivid
    red. 'Reddish' captures the attenuated color value.
- source_word: וּמַרְאֵיהֶן
  chosen: and their appearance
  alternatives:
  - and their look
  - and their sight
  lexicon: HALOT
  rationale: מראה commonly means appearance/visible aspect. 'Their appearance' is
    the most idiomatic rendering in English.
- source_word: שָׁפָל מִן הַקִּיר
  chosen: is deeper than the wall
  alternatives:
  - is lower than the wall surface
  - lies beneath the wall
  lexicon: HALOT
  rationale: Literally 'lower than the wall,' but in context of wall depressions the
    sense is that the affected spots appear recessed below the surface. 'Deeper than
    the wall' communicates the diagnostic visual criterion clearly.
