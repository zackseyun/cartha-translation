theological_decisions:
- issue: Ritual sense of לְחַטֵּא with a house as object
  chosen_reading: Rendered as ritual purification ('to purify the house from sin')
    rather than moral cleansing or explicit atonement.
  alternative_readings:
  - to cleanse the house
  - to make atonement for the house
  rationale: The verse concerns a contaminated house in a Levitical purification rite.
    The Hebrew verb in piel here denotes removal of impurity/sin contamination in
    a cultic sense. Rendering it as ritual purification preserves the text's category
    without overstating a theological mechanism not explicit in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
