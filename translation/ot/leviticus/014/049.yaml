id: LEV.14.49
reference: Leviticus 14:49
source:
  edition: WLC
  text: וְ/לָקַ֛ח לְ/חַטֵּ֥א אֶת הַ/בַּ֖יִת שְׁתֵּ֣י צִפֳּרִ֑ים וְ/עֵ֣ץ אֶ֔רֶז וּ/שְׁנִ֥י
    תוֹלַ֖עַת וְ/אֵזֹֽב־׃
translation:
  text: And he shall take, to purify the house from sin, two birds, cedar wood, scarlet
    yarn, and hyssop.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to cleanse the house'; the Hebrew verb in this ritual context has the
      sense of purifying from sin/impurity.
    reason: lexical_alternative
  - marker: b
    text: Or 'scarlet thread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: And he shall take
  alternatives:
  - And he is to take
  - Then he shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural/legal sequence commonly
    carries future/modal force in English. 'He shall take' fits the ritual instruction
    context and preserves the formal tone.
- source_word: לְחַטֵּא
  chosen: to purify the house from sin
  alternatives:
  - to cleanse the house
  - to make atonement for the house
  - to de-sin the house
  lexicon: HALOT
  rationale: The piel of חטא in ritual contexts means to purify/decontaminate from
    sin or impurity, not merely 'to sin.' 'Purify the house from sin' preserves the
    causative ritual sense without importing the fuller atonement language unless
    context requires it. It also reflects that the object is a house, which is being
    ritually cleansed rather than morally forgiven.
- source_word: אֶת הַבַּיִת
  chosen: the house
  alternatives:
  - the household
  lexicon: HALOT
  rationale: In Leviticus 14 the referent is the physical dwelling afflicted with
    mold-like contamination, so 'house' is the plain and contextually correct rendering.
- source_word: שְׁתֵּי צִפֳּרִים
  chosen: two birds
  alternatives:
  - two living birds
  lexicon: HALOT
  rationale: The Hebrew here specifies only 'two birds.' 'Living' appears in the broader
    ritual context (cf. nearby verses) but is not stated in this verse, so it should
    not be added to the main text.
- source_word: וְעֵץ אֶרֶז
  chosen: cedar wood
  alternatives:
  - wood of cedar
  - cedar timber
  lexicon: HALOT
  rationale: The construct phrase naturally means 'cedar wood.' This is standard,
    clear English and preserves the material reference used in purification rites.
- source_word: וּשְׁנִי תוֹלַעַת
  chosen: scarlet yarn
  alternatives:
  - scarlet thread
  - crimson yarn
  - scarlet stuff
  lexicon: HALOT
  rationale: This expression denotes scarlet material/dyed thread used in ritual contexts.
    'Scarlet yarn' is idiomatic modern English and matches common usage in similar
    passages, while avoiding overly vague wording.
- source_word: וְאֵזֹב
  chosen: hyssop
  lexicon: HALOT
  rationale: The traditional and widely recognized rendering for אֵזוֹב is 'hyssop.'
    Though the exact botanical identification is debated, 'hyssop' remains the best
    conventional translation.
