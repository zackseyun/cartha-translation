theological_decisions:
- issue: Ritual impurity terminology
  chosen_reading: render טמא as 'become unclean'
  alternative_readings:
  - be defiled
  - become impure
  rationale: In Leviticus, טמא denotes ceremonial/ritual uncleanness rather than necessarily
    moral guilt. 'Become unclean' is the clearest modern English equivalent and avoids
    importing moralized language.
