id: LEV.14.36
reference: Leviticus 14:36
source:
  edition: WLC
  text: וְ/צִוָּ֨ה הַ/כֹּהֵ֜ן וּ/פִנּ֣וּ אֶת הַ/בַּ֗יִת בְּ/טֶ֨רֶם יָבֹ֤א הַ/כֹּהֵן֙
    לִ/רְא֣וֹת אֶת הַ/נֶּ֔גַע וְ/לֹ֥א יִטְמָ֖א כָּל אֲשֶׁ֣ר בַּ/בָּ֑יִת וְ/אַ֥חַר
    כֵּ֛ן יָבֹ֥א הַ/כֹּהֵ֖ן לִ/רְא֥וֹת אֶת הַ/בָּֽיִת־־־־׃
translation:
  text: Then the priest shall command that they empty the house before the priest
    goes in to inspect the diseased area, so that everything in the house may not
    become unclean; and afterward the priest shall go in to inspect the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mark,' 'the infection,' or traditionally 'the plague.' Hebrew negaʿ
      refers to the afflicted spot or condition under priestly inspection.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  chosen: Then ... shall command
  alternatives:
  - And ... shall command
  lexicon: HALOT
  rationale: Waw + perfect in procedural law is naturally rendered as a sequential
    future/modal in English. 'Then' captures the stepwise instruction better than
    a bare 'and.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן in Levitical legal context.
- source_word: וּפִנּוּ
  chosen: that they empty
  alternatives:
  - and they shall empty
  - that the house be emptied
  - that they clear out
  lexicon: HALOT
  rationale: The plural verb has an indefinite subject ('they'), following the priest's
    command. English idiom prefers 'command that they empty the house.' 'Empty' is
    more direct than 'clear out,' while preserving the sense of removing contents.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the home
  lexicon: HALOT
  rationale: בַּיִת here refers to the physical dwelling under inspection; 'house'
    is the natural legal/ritual term.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - prior to the time that
  lexicon: HALOT
  rationale: Simple temporal marker; 'before' is clear and natural.
- source_word: לִרְאוֹת
  chosen: to inspect
  alternatives:
  - to see
  - to look at
  - to examine
  lexicon: HALOT
  rationale: Although the verb is literally 'to see,' in this priestly diagnostic
    context 'inspect' best conveys official examination without overtechnical paraphrase.
- source_word: הַנֶּגַע
  chosen: the diseased area
  alternatives:
  - the plague
  - the infection
  - the mark
  - the affliction
  lexicon: HALOT
  rationale: נֶגַע in Leviticus 13–14 denotes an afflicted spot/condition, not necessarily
    a modern medical 'plague.' 'Diseased area' communicates the visible affected area
    in accessible English.
- source_word: וְלֹא יִטְמָא
  chosen: so that ... may not become unclean
  alternatives:
  - and ... will not become unclean
  - lest ... become unclean
  lexicon: HALOT
  rationale: The clause expresses purpose/result of emptying the house before inspection.
    'May not become unclean' captures the preventative aim in idiomatic English.
- source_word: כָּל אֲשֶׁר בַּבָּיִת
  chosen: everything in the house
  alternatives:
  - all that is in the house
  - everything that is in the house
  lexicon: HALOT
  rationale: This refers to the contents of the house. 'Everything in the house' is
    concise and faithful.
- source_word: וְאַחַר כֵּן
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: Marks the next procedural step in the ritual sequence.
- source_word: לִרְאוֹת אֶת הַבָּיִת
  chosen: to inspect the house
  alternatives:
  - to examine the house
  - to look at the house
  lexicon: HALOT
  rationale: The second inspection phrase broadens from the specific affected area
    to the house as the object under priestly examination; 'inspect' maintains consistency
    with the procedural setting.
