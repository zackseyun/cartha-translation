id: LEV.14.50
reference: Leviticus 14:50
source:
  edition: WLC
  text: וְ/שָׁחַ֖ט אֶת הַ/צִּפֹּ֣ר הָ/אֶחָ֑ת אֶל כְּלִי חֶ֖רֶשׂ עַל מַ֥יִם חַיִּֽים־־־־׃
translation:
  text: Then he shall slaughter the one bird into an earthenware vessel over fresh
    water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'living water'; that is, fresh or running water.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  chosen: Then he shall slaughter
  alternatives:
  - and he shall slaughter
  - then he slaughtered
  lexicon: HALOT
  rationale: The form is a waw-consecutive with qatal functioning in procedural sequence,
    naturally rendered as a future/modal instruction in English within this ritual
    context. 'Then' captures the sequential force, and 'slaughter' is more precise
    than the more generic 'kill' for sacrificial/ritual killing.
- source_word: הַצִּפֹּר הָאֶחָת
  chosen: the one bird
  alternatives:
  - one of the birds
  - the first bird
  lexicon: HALOT
  rationale: 'The phrase is definite: literally ''the bird, the one.'' In context
    it distinguishes one bird from the other bird previously mentioned. ''The one
    bird'' preserves that specificity without importing an ordinal not stated in the
    Hebrew.'
- source_word: אֶל
  chosen: into
  alternatives:
  - in
  - toward
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' with a vessel in this construction
    the sense is that the slaughter is performed so that the blood goes into the vessel.
    'Into' expresses the idiomatic English sense of the action more clearly while
    remaining faithful to the ritual procedure.
- source_word: כְּלִי חֶרֶשׂ
  chosen: an earthenware vessel
  alternatives:
  - a clay vessel
  - a pottery vessel
  lexicon: HALOT
  rationale: כְּלִי is a general container or vessel, and חֶרֶשׂ specifies earthenware/clay
    material. 'Earthenware vessel' is a standard, accurate rendering in ritual contexts.
- source_word: עַל
  chosen: over
  alternatives:
  - above
  - upon
  lexicon: HALOT
  rationale: In this slaughter formula, עַל with 'living/fresh water' indicates the
    act occurs over the water in the vessel, not merely spatially above in an abstract
    sense. 'Over' is the most natural English equivalent.
- source_word: מַיִם חַיִּים
  chosen: fresh water
  alternatives:
  - living water
  - running water
  lexicon: HALOT
  rationale: Literally 'living water.' In Hebrew idiom this refers to fresh, flowing
    water as opposed to stagnant water. 'Fresh water' communicates the plain sense
    in accessible modern English; the more literal 'living water' is preserved in
    a footnote because of its established biblical resonance.
