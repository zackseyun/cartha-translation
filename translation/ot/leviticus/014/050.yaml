theological_decisions:
- issue: Rendering of מַיִם חַיִּים in a ritual purity context
  chosen_reading: fresh water
  alternative_readings:
  - living water
  - running water
  rationale: The phrase here is not primarily a theological metaphor but a ritual
    specification for non-stagnant water. Following optimal equivalence, 'fresh water'
    best communicates the Hebrew idiom to modern readers, while preserving 'living
    water' in a footnote because it is a familiar literal rendering with broader biblical
    associations.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Preserve theological
    tension rather than resolve it'
