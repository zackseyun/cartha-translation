id: LEV.14.13
reference: Leviticus 14:13
source:
  edition: WLC
  text: וְ/שָׁחַ֣ט אֶת הַ/כֶּ֗בֶשׂ בִּ֠/מְקוֹם אֲשֶׁ֨ר יִשְׁחַ֧ט אֶת הַֽ/חַטָּ֛את
    וְ/אֶת הָ/עֹלָ֖ה בִּ/מְק֣וֹם הַ/קֹּ֑דֶשׁ כִּ֡י כַּ֠/חַטָּאת הָ/אָשָׁ֥ם הוּא֙ לַ/כֹּהֵ֔ן
    קֹ֥דֶשׁ קָֽדָשִׁ֖ים הֽוּא־־־׃
translation:
  text: And he shall slaughter the lamb in the place where they slaughter the sin
    offering and the burnt offering, in the holy place; for like the sin offering,
    the guilt offering belongs to the priest; it is most holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering' (Hebrew חַטָּאת), emphasizing
      the rite's cleansing function in priestly law.
    reason: lexical_alternative
  - marker: b
    text: Or 'reparation offering' for 'guilt offering' (Hebrew אָשָׁם), highlighting
      the offering's restitution aspect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  chosen: And he shall slaughter
  alternatives:
  - and he shall kill
  - and he shall slaughter it
  lexicon: HALOT
  rationale: שָׁחַט is the standard verb for ritual slaughter in sacrificial contexts.
    'Slaughter' preserves the cultic sense better than the more general 'kill.' The
    prefixed conjunction is carried as 'And.'
- source_word: הַכֶּבֶשׂ
  chosen: the lamb
  alternatives:
  - the male lamb
  - the sheep
  lexicon: HALOT
  rationale: כֶּבֶשׂ commonly denotes a lamb, often a young male sheep in sacrificial
    legislation. 'The lamb' is natural English and sufficient here, since the immediate
    context already specifies the sacrificial animal.
- source_word: בִּמְקוֹם אֲשֶׁר יִשְׁחַט
  chosen: in the place where they slaughter
  alternatives:
  - in the place where he slaughters
  - at the place where one slaughters
  lexicon: HALOT
  rationale: The singular imperfect יִשְׁחַט can function generically/indefinitely
    in legal instruction. English 'they slaughter' idiomatically conveys the prescribed
    practice without implying a specific individual. This avoids awkwardness while
    preserving the legal sense.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת in sacrificial contexts is traditionally and accurately rendered
    'sin offering.' Although some argue for 'purification offering' in priestly texts,
    'sin offering' remains the clearer default in English and matches the sacrificial
    category named here.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering. 'Burnt offering' is
    the established and accurate rendering.
- source_word: בִּמְקוֹם הַקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in a holy place
  - in the sacred place
  lexicon: HALOT
  rationale: With the article, the phrase points to the designated sacred area for
    slaughter. 'The holy place' is the most natural rendering in English for the specified
    cultic location.
- source_word: כִּי כַּחַטָּאת הָאָשָׁם הוּא לַכֹּהֵן
  chosen: for like the sin offering, the guilt offering belongs to the priest
  alternatives:
  - for the guilt offering is like the sin offering; it is for the priest
  - for as the sin offering, so the guilt offering is the priest's
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial law is best rendered 'guilt offering.' The clause
    expresses analogy and priestly entitlement. 'Belongs to the priest' communicates
    לַכֹּהֵן clearly in idiomatic English.
- source_word: קֹדֶשׁ קָדָשִׁים הוּא
  chosen: it is most holy
  alternatives:
  - it is holy of holies
  - it is especially holy
  lexicon: HALOT
  rationale: The superlative construction קֹדֶשׁ קָדָשִׁים is idiomatically rendered
    'most holy' in English sacrificial legislation. This preserves the technical holiness
    classification without wooden phrasing.
