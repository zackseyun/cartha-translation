theological_decisions:
- issue: Rendering of חַטָּאת in priestly sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote both sin and purification aspects in Levitical
    ritual. To preserve readability and continuity with established sacrificial categories,
    the main text uses 'sin offering,' while the alternative is preserved in a footnote
    because it is a meaningful scholarly option and affects how readers construe the
    rite's purpose.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - compensation offering
  rationale: In this legal-sacrificial context, 'guilt offering' is the clearest conventional
    rendering and fits the analogy to the sin offering. Alternatives emphasize restitution,
    but the broader sacrificial category is best preserved in the main text.
  doctrine_reference: Translation philosophy §5
