id: LEV.14.53
reference: Leviticus 14:53
source:
  edition: WLC
  text: וְ/שִׁלַּ֞ח אֶת הַ/צִּפֹּ֧ר הַֽ/חַיָּ֛ה אֶל מִ/ח֥וּץ לָ/עִ֖יר אֶל פְּנֵ֣י
    הַ/שָּׂדֶ֑ה וְ/כִפֶּ֥ר עַל הַ/בַּ֖יִת וְ/טָהֵֽר־־־־׃
translation:
  text: Then he shall release the live bird outside the city into the open field.
    In this way he shall make atonement for the house, and it shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall purge the house' or 'he shall make expiation for the house.'
      The Hebrew uses priestly atonement language here in a ritual cleansing context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּח
  chosen: Then he shall release
  alternatives:
  - and he shall send away
  - and he shall let go
  lexicon: HALOT
  rationale: Piel of שלח here denotes the ritual act of letting the bird go free.
    'Release' is natural modern English and fits the ceremonial context. 'Then' brings
    out the sequential waw in readable English.
- source_word: הַצִּפֹּר הַחַיָּה
  chosen: the live bird
  alternatives:
  - the living bird
  - the bird that is alive
  lexicon: HALOT
  rationale: The adjective marks the contrast with the bird previously killed in the
    ritual. 'Live bird' is concise and idiomatic in English while preserving the contrast.
- source_word: אֶל מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - to outside the city
  - to a place outside the city
  lexicon: HALOT
  rationale: The prepositional phrase indicates movement to a location beyond the
    city's bounds. 'Outside the city' is the most natural equivalent.
- source_word: אֶל פְּנֵי הַשָּׂדֶה
  chosen: into the open field
  alternatives:
  - over the face of the field
  - into the field
  lexicon: HALOT
  rationale: The idiom 'to the face of the field' means into the open country/field
    area. 'Open field' preserves the sense better than a wooden literalism.
- source_word: וְכִפֶּר עַל הַבַּיִת
  chosen: he shall make atonement for the house
  alternatives:
  - he shall purge the house
  - he shall make expiation for the house
  lexicon: HALOT
  rationale: כפר in priestly ritual language regularly carries the sense of making
    atonement/expiation. 'Make atonement' is the standard transparent rendering and
    avoids importing a narrower doctrinal explanation. 'For the house' reflects עַל
    in this ritual context.
- source_word: וְטָהֵר
  chosen: and it shall be clean
  alternatives:
  - and it shall be purified
  - and it shall be clean again
  lexicon: HALOT
  rationale: The verb טהר here describes the resulting status of the house after the
    rite. Rendering the subject explicitly as 'it' makes clear that the house is what
    becomes clean. 'Clean' is accessible and fits the purity context; 'purified' is
    possible but slightly more interpretive.
