theological_decisions:
- issue: Rendering of כפר in a ritual-purity context involving a house
  chosen_reading: make atonement for the house
  alternative_readings:
  - purge the house
  - make expiation for the house
  rationale: The text uses priestly atonement language even for a house, so the translation
    preserves that theological category rather than reducing it to mere cleansing.
    At the same time, it does not specify a later doctrinal theory of atonement beyond
    the ritual sense present in Leviticus.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic'
