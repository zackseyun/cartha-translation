id: LEV.14.3
reference: Leviticus 14:3
source:
  edition: WLC
  text: וְ/יָצָא֙ הַ/כֹּהֵ֔ן אֶל מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה וְ/רָאָה֙ הַ/כֹּהֵ֔ן וְ/הִנֵּ֛ה
    נִרְפָּ֥א נֶֽגַע הַ/צָּרַ֖עַת מִן הַ/צָּרֽוּעַ־־־׃
translation:
  text: The priest shall go out to a place outside the camp, and the priest shall
    examine him; and if the diseased skin condition has been healed in the one with
    the skin disease,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'the leprosy disease has been healed in the leprous person.'
      The Hebrew terms refer more broadly to a skin disease/affliction than specifically
      to modern leprosy.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָצָא
  chosen: shall go out
  alternatives:
  - will go out
  - must go out
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural legal context is
    best rendered with English future/modal force ('shall') to express prescribed
    action rather than simple past narrative.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal context. Repeated in Hebrew
    and retained in English for clarity and formal correspondence.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: to a place outside the camp
  alternatives:
  - outside the camp
  - to outside the camp
  lexicon: HALOT
  rationale: מִחוּץ is a noun/adverbial expression 'outside' with אֶל indicating movement
    toward that location. 'To a place outside the camp' is idiomatic English that
    preserves the directional sense.
- source_word: וְרָאָה
  chosen: shall examine him
  alternatives:
  - shall look
  - shall see
  lexicon: HALOT
  rationale: Although ראה literally means 'see,' in inspection legislation it carries
    the sense of examining/inspecting. 'Examine him' communicates the priestly evaluative
    action required by the context.
- source_word: וְהִנֵּה
  chosen: and if
  alternatives:
  - and behold
  - and look
  lexicon: HALOT
  rationale: Literally 'and behold,' but in English legal/procedural style this often
    introduces the condition discovered by inspection. 'And if' captures the functional
    sense naturally without unnecessary archaism.
- source_word: נִרְפָּא
  chosen: has been healed
  alternatives:
  - is healed
  - has healed
  lexicon: HALOT
  rationale: Niphal indicates passive/resultative sense. Present perfect English conveys
    the state resulting from prior healing at the time of inspection.
- source_word: נֶגַע הַצָּרַעַת
  chosen: the diseased skin condition
  alternatives:
  - the infection of skin disease
  - the plague of leprosy
  - the mark of the skin disease
  lexicon: HALOT
  rationale: The phrase denotes the affliction/spot associated with צָרַעַת. Because
    biblical צָרַעַת does not map neatly onto modern Hansen's disease, 'diseased skin
    condition' avoids misleading medical specificity while remaining readable.
- source_word: מִן הַצָּרוּעַ
  chosen: in the one with the skin disease
  alternatives:
  - from the diseased person
  - from the leprous person
  - from the one afflicted
  lexicon: HALOT
  rationale: 'מן here marks separation/removal from the afflicted person: the condition
    has departed from him. English idiom is smoother with ''in the one with the skin
    disease,'' which preserves the sense without the misleading traditional term ''leprous.'''
