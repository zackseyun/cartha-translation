theological_decisions:
- issue: Rendering of צָרַעַת / צָרוּעַ
  chosen_reading: skin disease / one with the skin disease
  alternative_readings:
  - leprosy / leprous person
  rationale: The Hebrew terms refer to a range of ritual-impurity skin conditions
    and do not necessarily denote modern leprosy (Hansen's disease). To avoid importing
    anachronistic medical claims, the translation uses broader language. The traditional
    rendering is preserved in a footnote for reader familiarity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
