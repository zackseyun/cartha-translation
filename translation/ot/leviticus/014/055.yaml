id: LEV.14.55
reference: Leviticus 14:55
source:
  edition: WLC
  text: וּ/לְ/צָרַ֥עַת הַ/בֶּ֖גֶד וְ/לַ/בָּֽיִת׃
translation:
  text: and for a skin disease in a garment or in a house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tsaraʿat is traditionally rendered 'leprosy,' but in Leviticus it
      refers more broadly to a range of afflictions or contaminations, including those
      affecting garments and houses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְ
  chosen: and for
  alternatives:
  - and concerning
  - also for
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition continue the list of matters
    for which the preceding instructions serve as a law. 'And for' is natural English
    and preserves the list structure.
- source_word: צָרַעַת
  chosen: a skin disease
  alternatives:
  - leprous disease
  - mildew
  - defiling skin disease
  lexicon: HALOT
  rationale: Though often traditionally rendered 'leprosy,' the Hebrew term in Leviticus
    covers a broader range of afflictions and even surface contaminations affecting
    objects and houses. Since this verse applies the term to garments and houses as
    well, 'a skin disease' avoids the misleading clinical specificity of 'leprosy'
    while still signaling the broader category used in this chapter.
- source_word: הַבֶּגֶד
  chosen: a garment
  alternatives:
  - the garment
  - clothing
  lexicon: HALOT
  rationale: The Hebrew has the article, but in English a generic singular after 'for'
    is more idiomatic as 'a garment.' 'Garment' is slightly more formal and precise
    than 'clothing' for the singular noun.
- source_word: וְלַבָּיִת
  chosen: or in a house
  alternatives:
  - and in the house
  - or for a house
  lexicon: HALOT
  rationale: The conjunction here links another instance of the same affliction category.
    English idiom is smoother with 'or in a house,' making explicit the locative sense
    implied by the noun in context. 'Or' fits the distributive listing better than
    a wooden repetition of 'and.'
