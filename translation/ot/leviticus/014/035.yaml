id: LEV.14.35
reference: Leviticus 14:35
source:
  edition: WLC
  text: וּ/בָא֙ אֲשֶׁר ל֣/וֹ הַ/בַּ֔יִת וְ/הִגִּ֥יד לַ/כֹּהֵ֖ן לֵ/אמֹ֑ר כְּ/נֶ֕גַע
    נִרְאָ֥ה לִ֖/י בַּ/בָּֽיִת־׃
translation:
  text: then the owner of the house shall come and tell the priest, saying, ‘Something
    like an infection has appeared to me in the house.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like an infection/plague.'' The owner reports only an apparent
      condition, not a definitive diagnosis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: then ... shall come
  alternatives:
  - and he shall come
  - and the one shall come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/procedural context carries
    sequential force; English future-like 'shall come' fits the instruction sequence,
    and 'then' brings out the procedural progression.
- source_word: אֲשֶׁר לוֹ הַבַּיִת
  chosen: the owner of the house
  alternatives:
  - he whose house it is
  - the one to whom the house belongs
  lexicon: HALOT
  rationale: Literally 'who has the house / to whom the house belongs.' 'Owner of
    the house' is the most natural modern English expression and accurately conveys
    possession without unnecessary awkwardness.
- source_word: וְהִגִּיד
  chosen: tell
  alternatives:
  - report
  - declare
  lexicon: HALOT
  rationale: Hiphil of נגד means to make known or report. 'Tell' is clear modern English;
    the formal recipient ('the priest') preserves the official reporting context.
- source_word: לַכֹּהֵן
  chosen: the priest
  alternatives:
  - to the priest
  lexicon: HALOT
  rationale: Included as the object of 'tell' in idiomatic English rather than preserving
    the preposition woodenly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - thus saying
  lexicon: HALOT
  rationale: Standard quotation introducer; 'saying' preserves the Hebrew discourse
    marker naturally.
- source_word: כְּנֶגַע
  chosen: something like an infection
  alternatives:
  - what seems to be an infection
  - like a plague
  - like a mark
  - like an affliction
  lexicon: HALOT
  rationale: 'The prefixed כ indicates approximation: the speaker does not definitively
    diagnose the condition. נגע in Leviticus impurity contexts refers to an affected
    spot/plague-like condition. ''Infection'' communicates the visible, concerning
    condition in accessible English without over-specifying modern medical categories;
    ''something like'' preserves the tentativeness.'
- source_word: נִרְאָה לִי
  chosen: has appeared to me
  alternatives:
  - has been seen by me
  - seems to me
  lexicon: HALOT
  rationale: Niphal of ראה is passive/reflexive 'appeared/was seen.' 'Has appeared
    to me' is idiomatic and preserves the owner's limited observational claim rather
    than a formal diagnosis.
- source_word: בַּבָּיִת
  chosen: in the house
  alternatives:
  - on the house
  - inside the house
  lexicon: HALOT
  rationale: The preposition ב here is best rendered broadly as 'in' with reference
    to the house as the affected structure.
