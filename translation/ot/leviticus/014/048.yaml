theological_decisions:
- issue: Ritual declaration versus physical cleansing in וְטִהַר
  chosen_reading: The priest pronounces the house clean
  alternative_readings:
  - The priest cleanses the house
  rationale: The priest's role in Leviticus is often declarative within the purity
    system. Rendering the verb as a pronouncement avoids implying that the priest
    personally performs all physical remediation at this point and better matches
    the legal-ritual context.
  doctrine_reference: Translation philosophy §1, §5
