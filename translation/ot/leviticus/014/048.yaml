id: LEV.14.48
reference: Leviticus 14:48
source:
  edition: WLC
  text: וְ/אִם בֹּ֨א יָבֹ֜א הַ/כֹּהֵ֗ן וְ/רָאָה֙ וְ֠/הִנֵּה לֹא פָשָׂ֤ה הַ/נֶּ֨גַע֙
    בַּ/בַּ֔יִת אַחֲרֵ֖י הִטֹּ֣חַ אֶת הַ/בָּ֑יִת וְ/טִהַ֤ר הַ/כֹּהֵן֙ אֶת הַ/בַּ֔יִת
    כִּ֥י נִרְפָּ֖א הַ/נָּֽגַע־־־־׃
translation:
  text: But if the priest comes in and looks, and behold, the disease has not spread
    in the house after the house was plastered, then the priest shall pronounce the
    house clean, because the disease is healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'declare the house clean.' The Hebrew verb can denote ritual cleansing
      or a priestly pronouncement of cleanness in context.
    reason: lexical_alternative
  - marker: b
    text: Traditional versions often render נגע here as 'plague.' The term refers
      to the diseased affliction affecting the house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation in the legal procedure. 'But if'
    captures the contrast with the prior case while remaining natural in English.
- source_word: בֹּא יָבֹא
  chosen: comes in
  alternatives:
  - indeed comes
  - enters
  lexicon: HALOT
  rationale: The infinitive absolute with imperfect intensifies the verbal idea. English
    usually does not preserve this formally, so 'comes in' gives the procedural sense
    of entering for inspection.
- source_word: וְרָאָה
  chosen: looks
  alternatives:
  - sees
  - examines
  lexicon: HALOT
  rationale: In context the priest is conducting an inspection. 'Looks' is simple
    and natural; 'examines' is possible but slightly more interpretive than the Hebrew
    verb itself.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and see
  - indeed
  lexicon: HALOT
  rationale: Retains the discourse marker that draws attention to the inspection result.
    'Behold' is slightly formal but still clear and preserves the Hebrew emphasis.
- source_word: לֹא פָשָׂה
  chosen: has not spread
  alternatives:
  - has not extended
  - has not broken out further
  lexicon: HALOT
  rationale: פשה in skin/house-disease contexts refers to spreading. 'Has not spread'
    is the standard and clearest rendering.
- source_word: הַנֶּגַע
  chosen: the disease
  alternatives:
  - the affliction
  - the plague
  - the mark
  lexicon: HALOT
  rationale: In Leviticus 13–14 נגע denotes the affected condition or diseased contamination,
    not necessarily a modern medical diagnosis. 'Disease' is accessible and fits the
    procedural context better than the traditional but potentially misleading 'plague.'
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - on the house
  lexicon: HALOT
  rationale: The Hebrew preposition is 'in,' and the context concerns infestation
    within the structure. English idiom also favors 'in the house' here.
- source_word: אַחֲרֵי הִטֹּחַ אֶת־הַבָּיִת
  chosen: after the house was plastered
  alternatives:
  - after plastering the house
  - after the house was coated
  lexicon: HALOT
  rationale: The infinitive construct of טוח refers to plastering or coating the house
    as part of the cleansing procedure. Passive English is natural because the actor
    is not emphasized here.
- source_word: וְטִהַר הַכֹּהֵן אֶת־הַבַּיִת
  chosen: then the priest shall pronounce the house clean
  alternatives:
  - and the priest shall cleanse the house
  - and the priest shall declare the house clean
  lexicon: HALOT
  rationale: In priestly purity contexts טהר can denote declarative pronouncement
    of cleanness, not merely physical cleaning. 'Pronounce ... clean' best conveys
    the priest's juridical/ritual role.
- source_word: כִּי נִרְפָּא הַנָּגַע
  chosen: because the disease is healed
  alternatives:
  - because the disease has been healed
  - because the affliction is healed
  lexicon: HALOT
  rationale: נרפא, from רפא, literally means 'is healed.' Retaining healing language
    reflects the Hebrew metaphor for the remission of the house-disease rather than
    flattening it to 'is gone.'
