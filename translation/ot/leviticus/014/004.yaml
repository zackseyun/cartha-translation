id: LEV.14.4
reference: Leviticus 14:4
source:
  edition: WLC
  text: וְ/צִוָּה֙ הַ/כֹּהֵ֔ן וְ/לָקַ֧ח לַ/מִּטַּהֵ֛ר שְׁתֵּֽי צִפֳּרִ֥ים חַיּ֖וֹת
    טְהֹר֑וֹת וְ/עֵ֣ץ אֶ֔רֶז וּ/שְׁנִ֥י תוֹלַ֖עַת וְ/אֵזֹֽב־׃
translation:
  text: Then the priest shall command that for the one being cleansed two live clean
    birds be taken, along with cedar wood, scarlet yarn, and hyssop.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scarlet thread.' The Hebrew expression שְׁנִי תוֹלַעַת refers to scarlet-dyed
      material, and the exact form of the material may be rendered in different ways.
    reason: lexical_alternative
  - marker: b
    text: The exact plant denoted by 'hyssop' is uncertain; the traditional rendering
      is retained.
    reason: cultural_note
lexical_decisions:
- source_word: וְצִוָּה
  chosen: Then ... shall command
  alternatives:
  - and the priest shall command
  - the priest shall give orders
  lexicon: HALOT
  rationale: The waw plus perfect in procedural legal material advances the sequence,
    so 'Then' captures the stepwise instruction naturally in English while retaining
    the priest as subject with a modal future sense.
- source_word: וְלָקַח
  chosen: be taken
  alternatives:
  - and he shall take
  - they shall take
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb here functions idiomatically in
    the ritual instruction after 'the priest shall command'; English passive 'be taken'
    best conveys that the priest orders the procurement of the items rather than personally
    taking them.
- source_word: לַמִּטַּהֵר
  chosen: for the one being cleansed
  alternatives:
  - for the cleansed person
  - for the one to be cleansed
  - for the person undergoing cleansing
  lexicon: HALOT
  rationale: The Hitpael participle denotes the person in the process/status of ritual
    purification. 'The one being cleansed' preserves the passive/process nuance better
    than a simple adjective like 'cleansed.'
- source_word: שְׁתֵּי צִפֳּרִים
  chosen: two ... birds
  alternatives:
  - two sparrows
  - two small birds
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for bird, not specifically sparrow. 'Birds'
    avoids over-specification.
- source_word: חַיּוֹת
  chosen: live
  alternatives:
  - living
  - alive
  lexicon: HALOT
  rationale: The adjective distinguishes these birds from dead ones required in some
    rites. 'Live' is concise and idiomatic before the noun phrase.
- source_word: טְהֹרוֹת
  chosen: clean
  alternatives:
  - ceremonially clean
  - pure
  lexicon: HALOT
  rationale: In Levitical ritual context, 'clean' is the standard concise rendering
    for טהור. 'Ceremonially clean' is interpretive and heavier than needed in the
    main text.
- source_word: עֵץ אֶרֶז
  chosen: cedar wood
  alternatives:
  - wood of cedar
  - a piece of cedar wood
  lexicon: HALOT
  rationale: The construct phrase refers to cedar wood/material used in the rite.
    'Cedar wood' is natural English and sufficiently precise.
- source_word: שְׁנִי תוֹלַעַת
  chosen: scarlet yarn
  alternatives:
  - scarlet thread
  - crimson yarn
  - scarlet stuff
  lexicon: HALOT
  rationale: This expression commonly denotes scarlet material/thread associated with
    dye from the worm. 'Scarlet yarn' is a clear modern rendering; 'thread' is also
    possible but may sound too narrow for the ritual bundle.
- source_word: אֵזֹב
  chosen: hyssop
  alternatives:
  - marjoram
  lexicon: HALOT
  rationale: '''Hyssop'' is the conventional rendering for אֵזוֹב in biblical ritual
    contexts. Although the exact botanical identification is debated, retaining ''hyssop''
    preserves continuity and avoids speculative specificity.'
