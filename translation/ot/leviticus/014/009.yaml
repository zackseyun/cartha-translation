id: LEV.14.9
reference: Leviticus 14:9
source:
  edition: WLC
  text: וְ/הָיָה֩ בַ/יּ֨וֹם הַ/שְּׁבִיעִ֜י יְגַלַּ֣ח אֶת כָּל שְׂעָר֗/וֹ אֶת רֹאשׁ֤/וֹ
    וְ/אֶת זְקָנ/וֹ֙ וְ/אֵת֙ גַּבֹּ֣ת עֵינָ֔י/ו וְ/אֶת כָּל שְׂעָר֖/וֹ יְגַלֵּ֑חַ
    וְ/כִבֶּ֣ס אֶת בְּגָדָ֗י/ו וְ/רָחַ֧ץ אֶת בְּשָׂר֛/וֹ בַּ/מַּ֖יִם וְ/טָהֵֽר־־־־־־־־׃
translation:
  text: 'And on the seventh day he shall shave off all his hair: his head, his beard,
    and his eyebrows. He shall shave off all his hair, wash his clothes, and bathe
    his body in water; then he shall be clean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wash his flesh in water.' The Hebrew says 'his flesh,' a common idiom
      here for the person's body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And on
  alternatives:
  - And it shall be
  - Then on
  lexicon: HALOT
  rationale: The clause introduces the next procedural step in a ritual sequence.
    In English, rendering the idiom with temporal force ('And on the seventh day')
    is more natural than a wooden 'And it shall be on,' while preserving the sequential
    sense.
- source_word: בַיּוֹם הַשְּׁבִיעִי
  chosen: the seventh day
  alternatives:
  - on the seventh day
  lexicon: HALOT
  rationale: Temporal phrase marking the specified day in the purification process.
    Included with the preposition in the full clause as 'on the seventh day.'
- source_word: יְגַלַּח
  chosen: he shall shave off
  alternatives:
  - he shall shave
  - he shall shave clean
  lexicon: HALOT
  rationale: The Piel of גלח here denotes removal of hair. 'Shave off' makes the object-removal
    sense explicit in idiomatic English.
- source_word: כָּל שְׂעָרוֹ
  chosen: all his hair
  alternatives:
  - every hair of his
  - all the hair on him
  lexicon: HALOT
  rationale: Comprehensive expression indicating total removal of bodily hair in the
    ritual context.
- source_word: רֹאשׁוֹ
  chosen: his head
  alternatives:
  - the hair of his head
  lexicon: HALOT
  rationale: Direct object in apposition specifying one area to be shaved. 'His head'
    is idiomatic shorthand in English for the hair on the head in this context.
- source_word: זְקָנוֹ
  chosen: his beard
  alternatives:
  - his facial hair
  lexicon: HALOT
  rationale: Standard lexical sense of זָקָן in this context is 'beard.'
- source_word: גַּבֹּת עֵינָיו
  chosen: his eyebrows
  alternatives:
  - the brows of his eyes
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for the eyebrow area. 'Eyebrows' is the natural
    English equivalent.
- source_word: וְאֶת כָּל שְׂעָרוֹ יְגַלֵּחַ
  chosen: He shall shave off all his hair
  alternatives:
  - indeed, all his hair he shall shave off
  - he shall shave all his hair
  lexicon: HALOT
  rationale: The repetition after listing specific areas is retained rather than collapsed,
    because it emphasizes totality. English repeats the clause for auditability and
    fidelity.
- source_word: וְכִבֶּס אֶת בְּגָדָיו
  chosen: wash his clothes
  alternatives:
  - launder his garments
  lexicon: HALOT
  rationale: כִּבֵּס commonly refers to washing garments. 'Wash his clothes' is clear
    modern English; 'garments' is possible but less natural.
- source_word: וְרָחַץ אֶת בְּשָׂרוֹ בַּמַּיִם
  chosen: bathe his body in water
  alternatives:
  - wash his flesh in water
  - bathe himself in water
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in ritual washing contexts 'body'
    communicates the referent naturally in English without loss of meaning. 'In water'
    preserves the Hebrew prepositional phrase.
- source_word: וְטָהֵר
  chosen: then he shall be clean
  alternatives:
  - and he shall be clean
  - and he shall be purified
  lexicon: HALOT
  rationale: The verb marks the resulting state after the ritual actions. 'Be clean'
    fits the ritual-purity context. 'Then' clarifies sequence in English; 'purified'
    would shift from state to process.
