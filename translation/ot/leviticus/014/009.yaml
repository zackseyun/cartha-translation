theological_decisions:
- issue: Ritual purity terminology
  chosen_reading: clean
  alternative_readings:
  - pure
  - purified
  rationale: The context is Levitical ritual status, not moral innocence. 'Clean'
    is the standard accessible English rendering for טהר in purity legislation and
    preserves the cultic category without importing later theological abstractions.
  doctrine_reference: Translation philosophy §6; preserve source meaning without importing
    doctrinal claims
