id: LEV.14.12
reference: Leviticus 14:12
source:
  edition: WLC
  text: וְ/לָקַ֨ח הַ/כֹּהֵ֜ן אֶת הַ/כֶּ֣בֶשׂ הָ/אֶחָ֗ד וְ/הִקְרִ֥יב אֹת֛/וֹ לְ/אָשָׁ֖ם וְ/אֶת לֹ֣ג הַ/שָּׁ֑מֶן וְ/הֵנִ֥יף אֹתָ֛/ם תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: Then the priest shall take the one male lamb and present it as a guilt offering, along with the log of oil, and he shall wave them as a wave offering before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A 'log' was a small unit of liquid measure used in Israel's ritual system.
    reason: cultural_note
  - marker: b
    text: Or 'as a reparation offering' for 'as a guilt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - And ... shall take
  lexicon: HALOT
  rationale: The waw + qatal continues the ritual sequence. 'Then' conveys procedural progression in clear English, while 'shall take' preserves the prescriptive/ritual force.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context.
- source_word: הַכֶּבֶשׂ הָאֶחָד
  chosen: the one male lamb
  alternatives:
  - the one lamb
  - one lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, typically male in sacrificial usage; the context of the purification offering here specifies a male animal in the broader passage. 'The one' reflects the article + numeral, distinguishing this animal from the others in the ritual.
- source_word: וְהִקְרִיב אֹתוֹ
  chosen: present it
  alternatives:
  - bring it near
  - offer it
  lexicon: HALOT
  rationale: הקריב in sacrificial contexts means to bring/present for offering. 'Present it' is natural English and avoids prematurely specifying the exact sacrificial action beyond the Hebrew wording.
- source_word: לְאָשָׁם
  chosen: as a guilt offering
  alternatives:
  - for guilt
  - as a reparation offering
  lexicon: HALOT
  rationale: אָשָׁם in Leviticus is the technical sacrificial term commonly rendered 'guilt offering.' This is clearer and more established in cultic legislation than the broader 'for guilt.'
- source_word: לֹג הַשָּׁמֶן
  chosen: the log of oil
  alternatives:
  - a log of oil
  lexicon: HALOT
  rationale: לֹג is a specific liquid measure. Retaining 'log' preserves the technical unit rather than approximating it. The article on 'oil' is represented by 'the log of oil' in idiomatic English.
- source_word: וְהֵנִיף אֹתָם
  chosen: he shall wave them
  alternatives:
  - he shall elevate them
  - he shall present them with a waving motion
  lexicon: HALOT
  rationale: הניף in sacrificial procedure refers to the ritual waving/presentation motion. 'Wave them' is the conventional and sufficiently transparent rendering.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - as a presentation offering
  lexicon: HALOT
  rationale: תְּנוּפָה is the technical noun corresponding to the waving rite. 'Wave offering' preserves the cultic terminology and matches the verbal action in the clause.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' is the natural equivalent of לִפְנֵי in ritual setting.
