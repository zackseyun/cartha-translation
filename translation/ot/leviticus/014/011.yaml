id: LEV.14.11
reference: Leviticus 14:11
source:
  edition: WLC
  text: וְ/הֶעֱמִ֞יד הַ/כֹּהֵ֣ן הַֽ/מְטַהֵ֗ר אֵ֛ת הָ/אִ֥ישׁ הַ/מִּטַּהֵ֖ר וְ/אֹתָ֑/ם
    לִ/פְנֵ֣י יְהוָ֔ה פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד׃
translation:
  text: And the priest who performs the cleansing shall present the man who is being
    cleansed, along with those things, before the LORD at the entrance of the tent
    of meeting.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהֶעֱמִיד
  chosen: shall present
  alternatives:
  - shall set
  - shall make stand
  - shall place
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to cause someone/something to stand before
    YHWH in a ritual setting. 'Present' captures the formal cultic sense in natural
    English better than the more wooden 'make stand' or 'set.'
- source_word: הַכֹּהֵן הַמְטַהֵר
  chosen: the priest who performs the cleansing
  alternatives:
  - the cleansing priest
  - the priest who cleanses
  - the priest who pronounces clean
  lexicon: HALOT
  rationale: The participle from טהר modifies 'priest' and refers to his ritual role
    in the purification process. 'Performs the cleansing' communicates the priest's
    officiating function without implying that he effects moral purity. 'Pronounces
    clean' is too narrow for the broader ritual actions in context.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine singular 'man.' Per the gender-accurate
    policy, this is retained rather than neutralized to 'person.'
- source_word: הַמִּטַּהֵר
  chosen: who is being cleansed
  alternatives:
  - who is being purified
  - who is being made clean
  lexicon: HALOT
  rationale: The Hitpael/passive-reflexive nuance here indicates the man undergoing
    ritual purification. 'Being cleansed' is clear, idiomatic, and fits the ceremonial
    context.
- source_word: וְאֹתָם
  chosen: along with those things
  alternatives:
  - and them
  - together with them
  lexicon: HALOT
  rationale: The pronoun refers back to the items specified in the preceding verse,
    not additional persons. 'Along with those things' makes the referent explicit
    in English for readability while staying within the context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is standard covenantal/cultic language for appearing in God's presence.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  - at the entrance to the tent of meeting
  lexicon: HALOT
  rationale: This is the conventional and accurate rendering of the sanctuary location.
    'Entrance' is natural modern English, and 'tent of meeting' preserves the established
    sense of אֹהֶל מוֹעֵד.
