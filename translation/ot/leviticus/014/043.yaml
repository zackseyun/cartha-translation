id: LEV.14.43
reference: Leviticus 14:43
source:
  edition: WLC
  text: וְ/אִם יָשׁ֤וּב הַ/נֶּ֨גַע֙ וּ/פָרַ֣ח בַּ/בַּ֔יִת אַחַ֖ר חִלֵּ֣ץ אֶת הָ/אֲבָנִ֑ים
    וְ/אַחֲרֵ֛י הִקְצ֥וֹת אֶת הַ/בַּ֖יִת וְ/אַחֲרֵ֥י הִטּֽוֹחַ־־־׃
translation:
  text: But if the disease returns and breaks out in the house after he has removed
    the stones, and after he has scraped the house, and after it has been plastered,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the infection' or 'the affliction' for 'the disease' (Hebrew negaʿ),
      a technical term in Leviticus for a marked diseased condition affecting persons,
      garments, or houses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation in legal procedure. 'But if' captures
    both the connective and the adversative sense in context, marking a new case after
    the prior instructions.
- source_word: יָשׁוּב
  chosen: returns
  alternatives:
  - comes back
  - turns back
  lexicon: HALOT
  rationale: From שוב, here describing the reappearance of the affliction. 'Returns'
    is idiomatic and concise in English legal/procedural style.
- source_word: הַנֶּגַע
  chosen: the disease
  alternatives:
  - the infection
  - the plague
  - the affliction
  lexicon: HALOT
  rationale: נגע in Leviticus denotes a marked affliction or diseased condition, including
    in houses. 'Disease' is clear modern English and avoids the overly archaic or
    potentially misleading 'plague.'
- source_word: וּפָרַח
  chosen: breaks out
  alternatives:
  - spreads
  - sprouts
  - appears
  lexicon: HALOT
  rationale: The verb literally evokes budding/sprouting, used idiomatically for an
    eruption or outbreak of the house-affliction. 'Breaks out' best conveys the metaphor
    in natural English.
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - on the house
  - within the house
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'In the house' is the most natural
    rendering in English for the recurrence of the condition within the structure.
- source_word: אַחַר חִלֵּץ אֶת־הָאֲבָנִים
  chosen: after he has removed the stones
  alternatives:
  - after he has pulled out the stones
  - after the stones have been removed
  lexicon: HALOT
  rationale: The infinitive/verb sequence refers back to the prescribed remediation.
    'Removed the stones' is straightforward and fits the procedural context.
- source_word: וְאַחֲרֵי הִקְצוֹת אֶת־הַבַּיִת
  chosen: and after he has scraped the house
  alternatives:
  - and after he has pared the house
  - and after he has cleaned out the house
  lexicon: HALOT
  rationale: קצה in this stem refers to scraping or scouring the interior surfaces.
    'Scraped' is concrete and preserves the physical action better than a generalized
    'cleaned.'
- source_word: וְאַחֲרֵי הִטּוֹחַ
  chosen: and after it has been plastered
  alternatives:
  - and after he has plastered it
  - and after it has been coated
  lexicon: HALOT
  rationale: טוח refers to plastering/coating the house after scraping. English naturally
    supplies the house as the object. The passive 'it has been plastered' avoids over-specifying
    the subject where Hebrew uses an infinitive construct.
