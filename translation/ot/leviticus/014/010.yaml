id: LEV.14.10
reference: Leviticus 14:10
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הַ/שְּׁמִינִ֗י יִקַּ֤ח שְׁנֵֽי כְבָשִׂים֙ תְּמִימִ֔ים וְ/כַבְשָׂ֥ה
    אַחַ֛ת בַּת שְׁנָתָ֖/הּ תְּמִימָ֑ה וּ/שְׁלֹשָׁ֣ה עֶשְׂרֹנִ֗ים סֹ֤לֶת מִנְחָה֙
    בְּלוּלָ֣ה בַ/שֶּׁ֔מֶן וְ/לֹ֥ג אֶחָ֖ד שָֽׁמֶן־־׃
translation:
  text: And on the eighth day he shall take two male lambs without blemish, and one
    ewe lamb a year old without blemish, and three-tenths of an ephah of fine flour
    for a grain offering mixed with oil, and one log of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A 'log' is a small liquid measure used in Israelite ritual practice.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַיּוֹם הַשְּׁמִינִי
  chosen: And on the eighth day
  alternatives:
  - On the eighth day
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'And
    on' in context, preserving the procedural sequence of the ritual instructions.
- source_word: יִקַּח
  chosen: he shall take
  alternatives:
  - he is to take
  - he must take
  lexicon: HALOT
  rationale: The imperfect here functions instructionally within legal material. 'Shall
    take' preserves the prescriptive force in idiomatic English.
- source_word: שְׁנֵי כְבָשִׂים
  chosen: two male lambs
  alternatives:
  - two lambs
  - two young rams
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, and the masculine form here contrasts with the
    following feminine כַּבְשָׂה. 'Male lambs' makes the sex distinction explicit,
    which is significant in sacrificial specification.
- source_word: תְּמִימִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תמים refers to an animal free from defect. 'Without
    blemish' is the standard clear English equivalent and fits the cultic register.
- source_word: וְכַבְשָׂה אַחַת
  chosen: and one ewe lamb
  alternatives:
  - and one female lamb
  - and one lamb
  lexicon: HALOT
  rationale: The feminine noun should be reflected in English because the verse intentionally
    distinguishes the female animal from the two males.
- source_word: בַּת שְׁנָתָהּ
  chosen: a year old
  alternatives:
  - in its first year
  - daughter of its year
  lexicon: HALOT
  rationale: This idiom denotes an animal in its first year / one year old. 'A year
    old' is natural modern English while preserving the age requirement.
- source_word: תְּמִימָה
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Same sacrificial adjective as above, here agreeing with the feminine
    noun. English repeats 'without blemish' for clarity and consistency.
- source_word: וּשְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: and three-tenths of an ephah
  alternatives:
  - and three tenth-measures
  - and three omers
  lexicon: HALOT
  rationale: An עִשָּׂרוֹן is a tenth-part measure, conventionally understood here
    as a tenth of an ephah. Rendering the implied standard measure makes the quantity
    intelligible in English.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת refers to finely milled flour used in offerings. 'Fine flour' is
    the established and accurate rendering.
- source_word: מִנְחָה
  chosen: for a grain offering
  alternatives:
  - as a grain offering
  - for an offering
  lexicon: HALOT
  rationale: In Levitical sacrificial terminology, מִנְחָה is best rendered 'grain
    offering.' Adding 'for a' expresses the appositional relationship smoothly in
    English.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participle describes the flour as combined with oil. 'Mixed with
    oil' is clear modern English without loss of meaning.
- source_word: וְלֹג אֶחָד שָׁמֶן
  chosen: and one log of oil
  alternatives:
  - and one flask of oil
  lexicon: HALOT
  rationale: לֹג is a specific liquid measure. Because no exact common English equivalent
    exists, transliterating the unit as 'log' best preserves the source text; the
    measure can be clarified in a footnote.
