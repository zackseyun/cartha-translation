theological_decisions:
- issue: Rendering of אָשָׁם in sacrificial terminology
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - compensation offering
  rationale: In Levitical sacrificial usage, אָשָׁם is the established technical term
    for a specific offering associated with guilt/liability. 'Guilt offering' is the
    most recognizable and sufficiently precise English rendering without importing
    later doctrinal categories.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
