id: LEV.14.17
reference: Leviticus 14:17
source:
  edition: WLC
  text: וּ/מִ/יֶּ֨תֶר הַ/שֶּׁ֜מֶן אֲשֶׁ֣ר עַל כַּפּ֗/וֹ יִתֵּ֤ן הַ/כֹּהֵן֙ עַל תְּנ֞וּךְ
    אֹ֤זֶן הַ/מִּטַּהֵר֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֤הֶן יָד/וֹ֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן
    רַגְל֖/וֹ הַ/יְמָנִ֑ית עַ֖ל דַּ֥ם הָ/אָשָֽׁם־־־־׃
translation:
  text: And from the rest of the oil that is on his palm, the priest shall put some
    on the lobe of the right ear of the one being cleansed, and on the thumb of his
    right hand, and on the big toe of his right foot, on top of the blood of the guilt
    offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tip of the right ear.' The Hebrew term refers to the outer extremity
      of the ear; 'lobe' is the clearest modern rendering in this ritual context.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon the blood of the guilt offering.' The sense is that the oil is
      applied at the same spot already marked by the blood.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיֶּתֶר
  chosen: from the rest of
  alternatives:
  - from the remainder of
  - from what is left of
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains or is left over. 'From the rest of' is natural
    English and preserves the partitive sense introduced by מִן.
- source_word: הַשֶּׁמֶן
  chosen: the oil
  lexicon: HALOT
  rationale: Standard rendering for שֶׁמֶן in ritual contexts; no contextual reason
    to specify a different substance.
- source_word: עַל כַּפּוֹ
  chosen: that is on his palm
  alternatives:
  - that is in his palm
  - upon his palm
  lexicon: HALOT
  rationale: כַּף can mean palm or hollow of the hand. 'On his palm' follows the Hebrew
    preposition עַל and matches the ritual picture from the surrounding context.
- source_word: יִתֵּן
  chosen: shall put some
  alternatives:
  - shall put
  - shall place
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/place.' English idiom benefits from 'put some'
    because only part of the remaining oil is applied, though the partitive force
    is already implied by מִיֶּתֶר.
- source_word: תְּנוּךְ אֹזֶן
  chosen: the lobe of the ... ear
  alternatives:
  - the tip of the ... ear
  lexicon: HALOT
  rationale: תְּנוּךְ in this ritual formula refers to the extremity/lobe of the ear.
    'Lobe' is the clearest modern anatomical term in English for the application point.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the person being cleansed
  lexicon: HALOT
  rationale: The hitpael participle marks the person undergoing ritual cleansing.
    'The one being cleansed' preserves the passive/process sense without overinterpreting.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - right-side
  lexicon: HALOT
  rationale: 'Straightforward adjectival rendering in the repeated ritual formula:
    right ear, right hand, right foot.'
- source_word: בֹּהֶן יָדוֹ
  chosen: the thumb of his right hand
  alternatives:
  - the big thumb of his right hand
  lexicon: HALOT
  rationale: בֹּהֶן denotes the thumb for the hand and the big toe for the foot. English
    requires the specific anatomical term by context.
- source_word: בֹּהֶן רַגְלוֹ
  chosen: the big toe of his right foot
  alternatives:
  - the great toe of his right foot
  lexicon: HALOT
  rationale: Context determines that בֹּהֶן here is the big toe. 'Big toe' is standard
    modern English.
- source_word: עַל דַּם הָאָשָׁם
  chosen: on top of the blood of the guilt offering
  alternatives:
  - upon the blood of the guilt offering
  - over the blood of the reparation offering
  - on the blood of the guilt offering
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial context is best rendered 'guilt offering.' The
    final עַל likely indicates that the oil is applied over the place already marked
    by the blood, so 'on top of' makes that relation explicit in idiomatic English.
