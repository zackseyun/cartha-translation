id: LEV.14.54
reference: Leviticus 14:54
source:
  edition: WLC
  text: זֹ֖את הַ/תּוֹרָ֑ה לְ/כָל נֶ֥גַע הַ/צָּרַ֖עַת וְ/לַ/נָּֽתֶק־׃
translation:
  text: This is the law for every case of skin disease and for an itch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and for a scaly eruption,' traditionally 'and for scall.' The Hebrew
      term refers to a specific skin condition, especially of the scalp or beard,
      but its exact medical equivalent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: 'Demonstrative feminine singular introducing a summary statement; English
    idiom naturally supplies the copula: ''This is.'''
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  lexicon: HALOT
  rationale: תּוֹרָה here refers to the prescribed legal/procedural regulation for
    diagnosing and handling impurity cases in Leviticus 13–14. 'Law' fits the legal
    summary formula in context, while 'instruction' is possible but less natural in
    this closing rubric.
- source_word: לְכָל
  chosen: for every
  alternatives:
  - concerning every
  - for all
  lexicon: HALOT
  rationale: 'The preposition לְ with כָּל marks scope/reference: the regulation applies
    ''for every'' such case.'
- source_word: נֶגַע
  chosen: case
  alternatives:
  - affliction
  - plague
  - mark
  lexicon: HALOT
  rationale: נֶגַע literally denotes a stroke/affliction/spot, but in this legal context
    it refers to an instance or case under examination. 'Case' communicates the procedural
    sense clearly in modern English without importing epidemic connotations of 'plague.'
- source_word: הַצָּרַעַת
  chosen: skin disease
  alternatives:
  - leprous disease
  - defiling skin disease
  - leprosy
  lexicon: HALOT
  rationale: צָרַעַת in Leviticus does not map neatly onto modern Hansen's disease.
    'Skin disease' is accessible and avoids the misleading traditional term 'leprosy.'
    'Defiling skin disease' is interpretively fuller but adds an element not explicit
    in this verse.
- source_word: וְלַנָּתֶק
  chosen: and for an itch
  alternatives:
  - and for a scaly eruption
  - and for scall
  - and for an eruption
  lexicon: HALOT
  rationale: נֶתֶק denotes a specific scalp/beard-related skin condition discussed
    earlier in Leviticus 13. Traditional 'scall' is archaic; 'itch' is concise and
    readable, though somewhat broad. The more technical alternatives are preserved
    in a footnote because the exact dermatological referent is uncertain.
