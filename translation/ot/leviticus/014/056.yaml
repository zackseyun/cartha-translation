id: LEV.14.56
reference: Leviticus 14:56
source:
  edition: WLC
  text: וְ/לַ/שְׂאֵ֥ת וְ/לַ/סַּפַּ֖חַת וְ/לַ/בֶּהָֽרֶת׃
translation:
  text: and for a swelling, and for a scab, and for a bright spot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eruption' or 'rash' for 'scab' (סַפַּחַת); the exact dermatological
      sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'bright patch' or, in context, 'white spot' for 'bright spot' (בֶּהֶרֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאֵת
  chosen: swelling
  alternatives:
  - raised sore
  - eruption
  - swelling of the skin
  lexicon: HALOT
  rationale: In Leviticus 13–14 this noun denotes an elevated skin condition or raised
    area associated with examination for skin disease. 'Swelling' is concise, medically
    neutral, and fits the list structure here better than the more interpretive 'raised
    sore.'
- source_word: סַפַּחַת
  chosen: scab
  alternatives:
  - eruption
  - rash
  - scale
  lexicon: HALOT
  rationale: This term refers to a secondary skin eruption or patch. 'Scab' is a traditional
    and still understandable rendering in this diagnostic context, though the exact
    dermatological referent is uncertain; alternatives are preserved in a footnote
    because English equivalents vary.
- source_word: בֶּהֶרֶת
  chosen: bright spot
  alternatives:
  - bright patch
  - shining spot
  - white spot
  lexicon: HALOT
  rationale: The noun denotes a bright or whitish spot on the skin in priestly diagnostic
    language. 'Bright spot' preserves the core semantic idea without over-specifying
    color where the Hebrew term itself emphasizes brightness; 'white spot' is a common
    contextual alternative and is preserved in a footnote.
- source_word: וְ/לַ
  chosen: and for
  alternatives:
  - and concerning
  - and as for
  lexicon: Hebrew grammar
  rationale: The repeated conjunction plus preposition introduces the final items
    in the preceding summary of regulations. 'And for' is a natural English equivalent
    that preserves the list-like legal style.
