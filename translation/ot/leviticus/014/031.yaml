id: LEV.14.31
reference: Leviticus 14:31
source:
  edition: WLC
  text: אֵ֣ת אֲשֶׁר תַּשִּׂ֞יג יָד֗/וֹ אֶת הָ/אֶחָ֥ד חַטָּ֛את וְ/אֶת הָ/אֶחָ֥ד עֹלָ֖ה
    עַל הַ/מִּנְחָ֑ה וְ/כִפֶּ֧ר הַ/כֹּהֵ֛ן עַ֥ל הַ/מִּטַּהֵ֖ר לִ/פְנֵ֥י יְהוָֽה־־־־׃
translation:
  text: whatever his means can afford, one as a sin offering and one as a burnt offering,
    along with the grain offering. Thus the priest shall make atonement for the one
    being cleansed before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'what his hand reaches'; that is, what he can afford.
    reason: lexical_alternative
  - marker: b
    text: Or 'one as a purification offering.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר תַּשִּׂיג יָדוֹ
  chosen: whatever his means can afford
  alternatives:
  - what his hand can reach
  - what he can afford
  lexicon: HALOT
  rationale: The idiom literally involves 'his hand reaching/attaining' and denotes
    financial ability or means. 'Whatever his means can afford' preserves the idiomatic
    sense in natural English while retaining the masculine singular reflected in the
    Hebrew.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חַטָּאת conventionally denotes the
    offering associated with sin/ritual purification. 'Sin offering' is the most recognizable
    and sufficiently accurate here; 'purification offering' is a viable contextual
    alternative but is not required by the immediate syntax.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the offering that goes up in smoke. 'Burnt
    offering' is the established and accurate English rendering.
- source_word: עַל הַמִּנְחָה
  chosen: along with the grain offering
  alternatives:
  - with the grain offering
  - in addition to the grain offering
  lexicon: HALOT
  rationale: Here עַל in sacrificial procedure indicates accompaniment/addition rather
    than spatial 'on/upon.' 'Along with' communicates the ritual sequencing naturally
    in English.
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall atone
  - shall purge
  lexicon: HALOT
  rationale: In priestly sacrificial contexts כפר is best rendered 'make atonement.'
    This preserves the cultic and theological force without importing a narrower doctrinal
    theory of atonement.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the one to be cleansed
  lexicon: HALOT
  rationale: The participial form denotes the person undergoing the cleansing process.
    'The one being cleansed' reflects the ongoing/resultative ritual state in clear
    English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' The divine name יְהוָה is
    rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for the divine
    name, following Jewish reverence tradition and the Septuagintal pattern.
