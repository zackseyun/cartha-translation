theological_decisions:
- issue: Rendering of sacrificial terminology without over-resolving atonement theology
  chosen_reading: Use traditional cultic terms 'sin offering,' 'burnt offering,' and
    'make atonement'
  alternative_readings:
  - purification offering
  - shall purge
  rationale: The verse describes Levitical ritual procedure. The chosen renderings
    preserve the sacrificial and expiatory language of the Hebrew text without importing
    later doctrinal precision beyond what the verse itself states.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering the divine name
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יְהוָה and preserves consistency
    across the translation.
