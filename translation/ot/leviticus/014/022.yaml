theological_decisions:
- issue: Rendering of חַטָּאת in Levitical sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The noun can denote both sin and the offering associated with purification
    from impurity. In this ritual context for cleansing, 'purification offering' is
    a viable alternative, but 'sin offering' remains the standard English cultic term
    and best balances familiarity with accuracy. The alternative is preserved in a
    footnote to avoid flattening the ritual nuance.
  doctrine_reference: Translation philosophy §3, §5
