id: LEV.14.22
reference: Leviticus 14:22
source:
  edition: WLC
  text: וּ/שְׁתֵּ֣י תֹרִ֗ים א֤וֹ שְׁנֵי֙ בְּנֵ֣י יוֹנָ֔ה אֲשֶׁ֥ר תַּשִּׂ֖יג יָד֑/וֹ
    וְ/הָיָ֤ה אֶחָד֙ חַטָּ֔את וְ/הָ/אֶחָ֖ד עֹלָֽה׃
translation:
  text: and two turtledoves or two young pigeons, as his means can afford; and one
    shall be a sin offering and the other a burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a purification offering.” The Hebrew term can denote the offering used
      for purification in ritual contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁתֵּי
  chosen: and two
  alternatives:
  - and the two
  lexicon: HALOT
  rationale: The conjunction plus feminine construct numeral introduces the continuation
    of the offering list from the previous verse. English naturally renders it as
    'and two.'
- source_word: תֹרִים
  chosen: turtledoves
  alternatives:
  - doves
  lexicon: HALOT
  rationale: The specific bird named is the turtledove, a standard sacrificial bird
    in Leviticus. 'Turtledoves' is more precise than the broader 'doves.'
- source_word: א֤וֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunction between the two permitted bird options.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  chosen: two young pigeons
  alternatives:
  - two sons of a dove
  - two pigeons
  lexicon: HALOT
  rationale: The idiom literally means 'two sons of a dove,' conventionally referring
    to young pigeons. 'Young pigeons' preserves the age nuance better than simply
    'pigeons.'
- source_word: אֲשֶׁר תַּשִּׂיג יָדוֹ
  chosen: as his means can afford
  alternatives:
  - which his hand can obtain
  - as much as he can afford
  lexicon: HALOT
  rationale: The Hebrew idiom 'his hand reaches/attains' refers to financial capacity.
    'As his means can afford' is natural English and preserves the economic sense
    without over-paraphrase.
- source_word: וְ/הָיָה
  chosen: and one shall be
  alternatives:
  - and it shall be
  - and there shall be
  lexicon: HALOT
  rationale: Here the singular verb introduces the assignment of each bird to a sacrificial
    role. In English, 'one shall be' makes the distributive sense explicit.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: 'Distributive numeral: one bird of the pair.'
- source_word: חַטָּאת
  chosen: a sin offering
  alternatives:
  - a purification offering
  lexicon: HALOT
  rationale: The standard cultic rendering is 'sin offering.' While some contexts
    emphasize purification, 'sin offering' remains the most recognizable and contextually
    fitting here; the alternative is worth preserving because Levitical usage can
    include purification nuance.
- source_word: וְ/הָ/אֶחָד
  chosen: and the other
  alternatives:
  - and one
  - and the one
  lexicon: HALOT
  rationale: With the article, the phrase contrasts the remaining bird with the first.
    'The other' is the clearest idiomatic English rendering.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascending offering
  lexicon: HALOT
  rationale: The established sacrificial term is 'burnt offering.' 'Ascending offering'
    is more etymologically transparent but less idiomatic in English Bible usage.
