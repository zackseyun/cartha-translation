theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אָשָׁם in sacrificial law
  chosen_reading: guilt offering
  alternative_readings:
  - trespass offering
  rationale: '''Guilt offering'' is clearer in contemporary English and better reflects
    the semantic field of incurred guilt/liability without importing older ecclesiastical
    phrasing. No doctrinal dispute is at stake, but the sacrificial category should
    remain explicit.'
