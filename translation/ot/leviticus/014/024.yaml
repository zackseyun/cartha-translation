id: LEV.14.24
reference: Leviticus 14:24
source:
  edition: WLC
  text: וְ/לָקַ֧ח הַ/כֹּהֵ֛ן אֶת כֶּ֥בֶשׂ הָ/אָשָׁ֖ם וְ/אֶת לֹ֣ג הַ/שָּׁ֑מֶן וְ/הֵנִ֨יף
    אֹתָ֧/ם הַ/כֹּהֵ֛ן תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: Then the priest shall take the guilt-offering lamb and the log of oil, and
    the priest shall wave them as a wave offering before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the lamb of the guilt offering'; traditionally, 'the trespass-offering
      lamb.'
    reason: lexical_alternative
  - marker: b
    text: A 'log' was a small unit of liquid measure used in Israel's ritual system.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - And ... shall take
  - shall take
  lexicon: HALOT
  rationale: The waw with qatal continues the ritual sequence. 'Then' conveys procedural
    progression in clear English while preserving the directive force of the Hebrew.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal contexts. The repeated subject
    is retained in English because the Hebrew repeats it before the second verb.
- source_word: כֶּבֶשׂ הָאָשָׁם
  chosen: the guilt-offering lamb
  alternatives:
  - the lamb of the guilt offering
  - the trespass-offering lamb
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial contexts is best rendered 'guilt offering' in modern
    English; 'trespass offering' is traditional but less transparent. The construct
    relation is expressed naturally as 'guilt-offering lamb.'
- source_word: לֹג הַשָּׁמֶן
  chosen: the log of oil
  alternatives:
  - the measure of oil
  lexicon: HALOT
  rationale: לֹג is a specific liquid measure, so transliterating as 'log' preserves
    the technical cultic term more precisely than a generic 'measure.'
- source_word: וְהֵנִיף
  chosen: shall wave
  alternatives:
  - shall present with a waving motion
  - shall elevate
  lexicon: HALOT
  rationale: The Hiphil of נוּף in sacrificial procedure refers to the ritual act
    of waving/presenting before YHWH. 'Wave' is the conventional and sufficiently
    clear rendering.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The plural pronoun refers jointly to the lamb and the log of oil, so
    the plural object should be explicit.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - for a wave offering
  - as a presentation offering
  lexicon: HALOT
  rationale: The noun cognate with the verb נוּף denotes the ritual category/result
    of the waving. 'As a wave offering' is idiomatic and preserves the technical sacrificial
    terminology.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This standard cultic phrase indicates presentation in YHWH's presence.
    Per doctrine, יְהוָה is rendered 'the LORD.'
