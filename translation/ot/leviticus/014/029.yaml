id: LEV.14.29
reference: Leviticus 14:29
source:
  edition: WLC
  text: וְ/הַ/נּוֹתָ֗ר מִן הַ/שֶּׁ֨מֶן֙ אֲשֶׁר֙ עַל כַּ֣ף הַ/כֹּהֵ֔ן יִתֵּ֖ן עַל רֹ֣אשׁ הַ/מִּטַּהֵ֑ר לְ/כַפֵּ֥ר עָלָ֖י/ו לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: And the rest of the oil that is in the priest’s palm he shall put on the head of the one being cleansed, to make atonement for him before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what remains of the oil that is on the priest’s palm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  chosen: And the rest
  alternatives:
  - And what remains
  - And the remainder
  lexicon: HALOT
  rationale: The Niphal participle from יתר/נותר denotes what is left over or remains. 'The rest' is natural modern English and fits the ritual sequence.
- source_word: מִן הַשֶּׁמֶן
  chosen: of the oil
  alternatives:
  - from the oil
  lexicon: HALOT
  rationale: With הַנּוֹתָר, the partitive sense is best conveyed in English as 'the rest of the oil' rather than the more wooden 'what remains from the oil.'
- source_word: אֲשֶׁר עַל כַּף הַכֹּהֵן
  chosen: that is in the priest’s palm
  alternatives:
  - that is on the priest’s palm
  - that is on the priest’s hand
  lexicon: HALOT
  rationale: כַּף literally refers to the palm or hollow of the hand. Although עַל is literally 'on,' English idiom for liquid held in the hand is better expressed as 'in the priest’s palm.' This preserves the concrete ritual image without awkwardness.
- source_word: יִתֵּן
  chosen: he shall put
  alternatives:
  - he shall give
  - he shall place
  lexicon: HALOT
  rationale: נתן is broad ('give/put/place'). In this ritual action, 'put' is the most idiomatic English equivalent for applying oil to a person.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: A straightforward locative rendering; 'on' is clear modern English.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the cleansed person
  lexicon: HALOT
  rationale: The Hitpael participle of טהר here refers to the person undergoing the cleansing rite. 'The one being cleansed' preserves the process-oriented sense better than the stative 'the cleansed person.'
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  lexicon: HALOT
  rationale: כפר is a key cultic term. 'Make atonement' is the standard and clearest English rendering in sacrificial contexts, preserving theological weight without paraphrase.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - on his behalf
  - for him
  lexicon: HALOT
  rationale: With כפר, על commonly marks the person for whom atonement is made. 'For him' is concise and idiomatic.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes presence before God in a cultic setting. The divine name יְהוָה follows the project's default rendering 'the LORD' per DOCTRINE.md.
