theological_decisions:
- issue: Nature of ritual purity language
  chosen_reading: Rendered טהר/מטהר with 'cleansed/clean' in ritual terms rather than
    moralized language.
  alternative_readings:
  - purified/pure
  rationale: The context is Levitical ritual restoration after skin disease, not primarily
    moral or inward sanctification. 'Cleansed/clean' communicates ceremonial status
    in accessible English while preserving the ritual logic of the passage.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    doctrinal claims the text does not make.'
