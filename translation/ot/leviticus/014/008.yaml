id: LEV.14.8
reference: Leviticus 14:8
source:
  edition: WLC
  text: וְ/כִבֶּס֩ הַ/מִּטַּהֵ֨ר אֶת בְּגָדָ֜י/ו וְ/גִלַּ֣ח אֶת כָּל שְׂעָר֗/וֹ וְ/רָחַ֤ץ
    בַּ/מַּ֨יִם֙ וְ/טָהֵ֔ר וְ/אַחַ֖ר יָב֣וֹא אֶל הַֽ/מַּחֲנֶ֑ה וְ/יָשַׁ֛ב מִ/ח֥וּץ
    לְ/אָהֳל֖/וֹ שִׁבְעַ֥ת יָמִֽים־־־־׃
translation:
  text: The one being cleansed shall wash his clothes, shave off all his hair, and
    bathe in water; then he shall be clean. Afterward he may come into the camp, but
    he shall stay outside his tent for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one being purified.' The Hebrew refers to the person undergoing
      the prescribed ritual cleansing.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall come into the camp.' The Hebrew form can be read as simple
      future ('shall come') or permissive ('may come'); the context suggests permitted
      reentry with continued restrictions.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the person being cleansed
  - he who is to be cleansed
  lexicon: HALOT
  rationale: The Hitpael/participle form denotes the person undergoing the cleansing
    process rather than actively cleansing himself. 'The one being cleansed' preserves
    the ritual/passive sense in natural English.
- source_word: כִבֶּס ... בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  - shall launder his clothes
  lexicon: HALOT
  rationale: כִּבֵּס commonly refers to washing garments. 'Clothes' is more readable
    modern English than 'garments' while remaining accurate.
- source_word: גִלַּח אֶת כָּל שְׂעָרוֹ
  chosen: shave off all his hair
  alternatives:
  - shave all his hair
  - shave off every hair
  lexicon: HALOT
  rationale: The verb plus direct object indicates complete removal of the hair. 'Shave
    off all his hair' makes the totality explicit and idiomatic.
- source_word: רָחַץ בַּמַּיִם
  chosen: bathe in water
  alternatives:
  - wash in water
  - bathe himself in water
  lexicon: HALOT
  rationale: In ritual contexts רָחַץ often refers to washing the body. 'Bathe in
    water' distinguishes this from washing clothes earlier in the verse.
- source_word: וְטָהֵר
  chosen: then he shall be clean
  alternatives:
  - and he shall be clean
  - and he will be clean
  lexicon: HALOT
  rationale: The clause marks the resulting ritual status after the washing actions.
    'Then' brings out the sequence implied by the Hebrew waw in context.
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - and afterward
  - then afterward
  lexicon: HALOT
  rationale: This adverb introduces the next stage in the ritual sequence. 'Afterward'
    is concise and natural.
- source_word: יָבֹא אֶל הַמַּחֲנֶה
  chosen: he may come into the camp
  alternatives:
  - he shall come into the camp
  - he may enter the camp
  lexicon: HALOT
  rationale: 'Given the following restriction that he must remain outside his tent,
    the imperfect here is best understood permissively: he is allowed to reenter the
    camp, though not yet fully resume ordinary domestic life.'
- source_word: וְיָשַׁב מִחוּץ לְאָהֳלוֹ
  chosen: but he shall stay outside his tent
  alternatives:
  - and he shall dwell outside his tent
  - and he shall remain outside his tent
  lexicon: HALOT
  rationale: יָשַׁב can mean sit, remain, or dwell. Here it denotes temporary residence/remain.
    'Stay' is natural modern English. 'But' clarifies the contrast with reentry into
    the camp, though the Hebrew conjunction is simply waw.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the duration expression.
