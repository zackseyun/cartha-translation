id: LEV.14.15
reference: Leviticus 14:15
source:
  edition: WLC
  text: וְ/לָקַ֥ח הַ/כֹּהֵ֖ן מִ/לֹּ֣ג הַ/שָּׁ֑מֶן וְ/יָצַ֛ק עַל כַּ֥ף הַ/כֹּהֵ֖ן הַ/שְּׂמָאלִֽית־׃
translation:
  text: Then the priest shall take some of the log of oil and pour it into the palm
    of the priest’s left hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A 'log' was an ancient liquid measure.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... took
  - and ... shall take
  lexicon: HALOT
  rationale: The waw + qatal continues the ritual procedure with sequential force.
    In English legal/ritual instruction, 'Then ... shall take' best conveys the prescriptive
    sequence naturally.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context; the article is preserved.
- source_word: מִלֹּג הַשָּׁמֶן
  chosen: some of the log of oil
  alternatives:
  - from the log of oil
  - out of the log of oil
  lexicon: HALOT
  rationale: מִן marks source/partitive sense. Because the next action is pouring
    from the measured vessel into the hand, 'some of the log of oil' communicates
    that oil is taken from the log-measure, not that the entire measure is itself
    taken up.
- source_word: לֹג
  chosen: log
  alternatives:
  - a log-measure
  lexicon: HALOT
  rationale: A specific ancient liquid measure is best retained by transliteration
    rather than replaced with an uncertain modern equivalent.
- source_word: וְיָצַק
  chosen: and pour
  alternatives:
  - and he poured
  - then pour
  lexicon: HALOT
  rationale: In procedural legislation, English future/modal style ('shall ... pour')
    is idiomatic; coordinated here as 'and pour' under the same modal force.
- source_word: עַל כַּף
  chosen: into the palm of
  alternatives:
  - onto the palm of
  - upon the palm of
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' with pouring into a cupped hand
    idiomatic English prefers 'into the palm of' to express the practical sense without
    distorting the action.
- source_word: כַּף
  chosen: palm
  alternatives:
  - hand
  - hollow of the hand
  lexicon: HALOT
  rationale: כַּף specifically denotes the palm rather than the hand in general; 'palm'
    preserves the concrete ritual detail.
- source_word: הַשְּׂמָאלִית
  chosen: left hand
  alternatives:
  - left palm
  lexicon: HALOT
  rationale: The adjective modifies the priest's palm/hand. English idiom normally
    says 'left hand,' though 'palm' is already expressed earlier.
