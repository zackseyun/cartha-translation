id: LEV.14.27
reference: Leviticus 14:27
source:
  edition: WLC
  text: וְ/הִזָּ֤ה הַ/כֹּהֵן֙ בְּ/אֶצְבָּע֣/וֹ הַ/יְמָנִ֔ית מִן הַ/שֶּׁ֕מֶן אֲשֶׁ֥ר
    עַל כַּפּ֖/וֹ הַ/שְּׂמָאלִ֑ית שֶׁ֥בַע פְּעָמִ֖ים לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: Then the priest shall sprinkle with his right finger some of the oil that
    is on his left palm seven times before the LORD.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִזָּה
  chosen: Then ... shall sprinkle
  alternatives:
  - and ... shall sprinkle
  - shall spatter
  lexicon: HALOT
  rationale: The Hiphil of נזה in ritual contexts commonly means 'sprinkle.' The prefixed
    conjunction is rendered 'Then' for natural procedural sequence in English, while
    preserving the narrative-ritual progression.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן in cultic legislation.
- source_word: בְּאֶצְבָּעוֹ הַיְמָנִית
  chosen: with his right finger
  alternatives:
  - with the finger of his right hand
  lexicon: HALOT
  rationale: The phrase specifies the instrument used. 'With his right finger' is
    idiomatic English and preserves the singular and the emphasis on the right side.
- source_word: מִן הַשֶּׁמֶן
  chosen: some of the oil
  alternatives:
  - from the oil
  lexicon: HALOT
  rationale: 'The preposition מִן is partitive here: the priest sprinkles a portion
    taken from the oil, not the entirety. ''Some of the oil'' makes that sense clear
    in natural English.'
- source_word: אֲשֶׁר עַל כַּפּוֹ הַשְּׂמָאלִית
  chosen: that is on his left palm
  alternatives:
  - which is on his left hand
  - that is on the palm of his left hand
  lexicon: HALOT
  rationale: כַּף here refers specifically to the palm rather than the hand in general.
    'Left palm' is more precise and fits the ritual image of oil being held there.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the distributive/counting expression.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes position or action before God's presence in a cultic
    sense. Per doctrine, יְהוָה is rendered 'the LORD.'
