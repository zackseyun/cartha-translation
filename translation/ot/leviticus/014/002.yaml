theological_decisions:
- issue: Rendering of מְצֹרָע in relation to historical 'leprosy' terminology
  chosen_reading: the leprous person
  alternative_readings:
  - the person with a skin disease
  - the leper
  rationale: The Hebrew term refers to a ritual-impurity condition traditionally rendered
    with 'leprosy' language, but it is not identical to modern medical leprosy. 'Leprous
    person' preserves continuity with traditional terminology while avoiding an overly
    precise medical claim and avoiding identity-reducing wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms, or documented exception.'
