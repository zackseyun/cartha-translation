id: LEV.14.2
reference: Leviticus 14:2
source:
  edition: WLC
  text: זֹ֤את תִּֽהְיֶה֙ תּוֹרַ֣ת הַ/מְּצֹרָ֔ע בְּ/י֖וֹם טָהֳרָת֑/וֹ וְ/הוּבָ֖א אֶל
    הַ/כֹּהֵֽן־׃
translation:
  text: 'This shall be the law for the leprous person on the day of his cleansing:
    he shall be brought to the priest.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the leprous person' translates a term traditionally rendered 'leper,'
      referring to someone affected by a condition associated with צָרַעַת, not necessarily
      modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the regulation. Rendered
    simply as 'This' to match the Hebrew clause opening.
- source_word: תִּהְיֶה
  chosen: shall be
  alternatives:
  - is
  - will be
  lexicon: HALOT
  rationale: Qal imperfect of היה used in legal formulation; 'shall be' fits prescriptive/legal
    English better than simple present while preserving the Hebrew sense.
- source_word: תּוֹרַת
  chosen: the law for
  alternatives:
  - the instruction for
  - the regulation for
  lexicon: HALOT
  rationale: תּוֹרָה here refers to the prescribed ritual procedure, not abstract
    doctrine. 'Law' is traditional and natural in Leviticus, while 'for' reflects
    the construct relationship with the following noun.
- source_word: הַמְּצֹרָע
  chosen: the leprous person
  alternatives:
  - the one with a skin disease
  - the person with a defiling skin disease
  - the leper
  lexicon: HALOT
  rationale: מְצֹרָע denotes a person affected by צָרַעַת, which does not map neatly
    onto modern Hansen's disease. 'Leprous person' preserves the traditional connection
    without implying a precise modern diagnosis as strongly as 'leper' might. 'Person'
    avoids reducing identity to condition.
- source_word: בְּיוֹם
  chosen: on the day of
  alternatives:
  - in the day of
  - when
  lexicon: HALOT
  rationale: Standard temporal prepositional phrase; 'on the day of' is the most direct
    and idiomatic rendering.
- source_word: טָהֳרָתוֹ
  chosen: his cleansing
  alternatives:
  - his purification
  - his becoming clean
  lexicon: HALOT
  rationale: From the root טהר, referring here to ritual restoration/cleansing. 'Cleansing'
    is accessible modern English and fits the ritual context without overtechnicality.
- source_word: וְהוּבָא
  chosen: he shall be brought
  alternatives:
  - and he shall be brought
  - then he shall be brought
  lexicon: HALOT
  rationale: Hophal perfect with prefixed conjunction functioning in procedural sequence.
    English legal style can omit an explicit initial 'and' after the colon while preserving
    the passive sense.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to a priest
  lexicon: HALOT
  rationale: Definite article in Hebrew supports 'the priest,' likely the officiating
    priest in context rather than an indefinite member of the priesthood.
