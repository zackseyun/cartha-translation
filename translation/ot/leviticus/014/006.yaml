theological_decisions:
- issue: Rendering of מַיִם חַיִּים in a ritual purity context
  chosen_reading: fresh water
  alternative_readings:
  - living water
  - running water
  rationale: The phrase is literal Hebrew for water that is flowing/fresh, in contrast
    to stagnant water. Because 'living water' can carry later theological associations
    in English that are not explicit in this Levitical ritual context, the main text
    uses 'fresh water' for clarity, while preserving the literal/traditional rendering
    in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
