id: LEV.14.6
reference: Leviticus 14:6
source:
  edition: WLC
  text: אֶת הַ/צִּפֹּ֤ר הַֽ/חַיָּה֙ יִקַּ֣ח אֹתָ֔/הּ וְ/אֶת עֵ֥ץ הָ/אֶ֛רֶז וְ/אֶת
    שְׁנִ֥י הַ/תּוֹלַ֖עַת וְ/אֶת הָ/אֵזֹ֑ב וְ/טָבַ֨ל אוֹתָ֜/ם וְ/אֵ֣ת הַ/צִּפֹּ֣ר
    הַֽ/חַיָּ֗ה בְּ/דַם֙ הַ/צִּפֹּ֣ר הַ/שְּׁחֻטָ֔ה עַ֖ל הַ/מַּ֥יִם הַֽ/חַיִּֽים־־־־׀׃
translation:
  text: As for the living bird, he shall take it, along with the cedar wood, the scarlet
    yarn, and the hyssop, and dip them and the living bird in the blood of the bird
    that was slaughtered over the fresh water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'living water'; also rendered 'running water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּפֹּר הַחַיָּה
  chosen: the living bird
  alternatives:
  - the live bird
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a small bird; 'bird' is the natural English
    equivalent. חַיָּה as attributive adjective is best rendered 'living' in this
    ritual context. 'Live bird' is possible, but 'living bird' reads more naturally
    while preserving the contrast with the slaughtered bird.
- source_word: יִקַּח
  chosen: he shall take
  alternatives:
  - he is to take
  - he must take
  lexicon: HALOT
  rationale: The imperfect here functions instructionally within ritual legislation.
    'He shall take' preserves the legal-prescriptive force in readable English.
- source_word: עֵץ הָאֶרֶז
  chosen: the cedar wood
  alternatives:
  - cedarwood
  - wood of cedar
  lexicon: HALOT
  rationale: The construct phrase refers to a piece/material of cedar wood used in
    the rite. 'The cedar wood' is clear and fairly formal.
- source_word: שְׁנִי הַתּוֹלַעַת
  chosen: the scarlet yarn
  alternatives:
  - scarlet thread
  - crimson yarn
  - scarlet stuff
  lexicon: HALOT
  rationale: This expression denotes scarlet material/dyed thread associated with
    crimson dye from the worm. 'Scarlet yarn' is a common and understandable rendering
    in ritual contexts; 'thread' is also possible, but 'yarn' better reflects material
    used with the other ritual items.
- source_word: הָאֵזֹב
  chosen: the hyssop
  lexicon: HALOT
  rationale: Traditional and likely correct rendering for the ritual plant term אֵזוֹב.
    Although the exact botanical identification is debated, 'hyssop' remains the standard
    transparent translation.
- source_word: וְטָבַל
  chosen: and dip
  alternatives:
  - and immerse
  - and plunge
  lexicon: HALOT
  rationale: The verb means to dip/immerse briefly. 'Dip' is the most idiomatic English
    choice for this ritual action.
- source_word: אוֹתָם
  chosen: them
  alternatives:
  - these things
  lexicon: HALOT
  rationale: The masculine plural pronoun naturally refers to the collected ritual
    items just listed. 'Them' is sufficient in English.
- source_word: וְאֵת הַצִּפֹּר הַחַיָּה
  chosen: and the living bird
  alternatives:
  - together with the living bird
  lexicon: HALOT
  rationale: The direct-object marker introduces an additional object of the dipping
    action. English can express this simply as 'and the living bird'; the sentence
    structure clarifies that both the items and the bird are dipped.
- source_word: בְּדַם
  chosen: in the blood of
  alternatives:
  - into the blood of
  - with the blood of
  lexicon: HALOT
  rationale: בְּ after טבל commonly marks the substance into which something is dipped.
    'In the blood of' is the most straightforward rendering.
- source_word: הַצִּפֹּר הַשְּׁחֻטָה
  chosen: the bird that was slaughtered
  alternatives:
  - the slaughtered bird
  - the bird that was killed
  lexicon: HALOT
  rationale: שׁחט is the standard verb for slaughtering an animal in sacrificial/ritual
    contexts. 'Slaughtered' preserves the cultic nuance better than the generic 'killed.'
- source_word: עַל הַמַּיִם הַחַיִּים
  chosen: over the fresh water
  alternatives:
  - over living water
  - over running water
  lexicon: HALOT
  rationale: מַיִם חַיִּים literally means 'living water,' i.e., fresh/running water.
    In English, 'fresh water' communicates the sense naturally in this ritual context,
    while a footnote preserves the more literal and traditional alternatives.
