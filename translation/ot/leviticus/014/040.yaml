theological_decisions:
- issue: Rendering of Levitical purity terminology
  chosen_reading: Use 'unclean' for טָמֵא and 'infection' for נֶגַע in a house context
  alternative_readings:
  - '''impure'' for טָמֵא'
  - '''plague,'' ''mildew,'' or ''diseased area'' for נֶגַע'
  rationale: The verse concerns ritual impurity regulations, not a fully specified
    modern medical or scientific diagnosis. 'Unclean' preserves the established purity-category
    meaning, while 'infection' avoids overcommitting to mildew/leprosy terminology
    yet still conveys a contaminating condition affecting the stones.
  doctrine_reference: Translation philosophy §§1, 5, 6
