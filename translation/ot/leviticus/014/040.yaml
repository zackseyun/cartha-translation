id: LEV.14.40
reference: Leviticus 14:40
source:
  edition: WLC
  text: וְ/צִוָּה֙ הַ/כֹּהֵ֔ן וְ/חִלְּצוּ֙ אֶת הָ֣/אֲבָנִ֔ים אֲשֶׁ֥ר בָּ/הֵ֖ן הַ/נָּ֑גַע
    וְ/הִשְׁלִ֤יכוּ אֶתְ/הֶן֙ אֶל מִ/ח֣וּץ לָ/עִ֔יר אֶל מָק֖וֹם טָמֵֽא־־־׃
translation:
  text: then the priest shall command that they remove the stones in which the infection
    is, and throw them outside the city to an unclean place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stones that have the infection in them.' The Hebrew phrase is literally
      'the stones in which the infection is.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  chosen: then ... shall command
  alternatives:
  - and ... shall command
  - and he shall command
  lexicon: HALOT
  rationale: The waw + perfect continues the procedural sequence with future-like
    force in English legal/ritual instruction. 'Then' captures the stepwise progression
    naturally, while 'shall command' preserves the directive force.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Levitical ritual contexts; the definite
    article is preserved.
- source_word: וְחִלְּצוּ
  chosen: that they remove
  alternatives:
  - and they shall pull out
  - and they shall take out
  lexicon: HALOT
  rationale: The verb denotes drawing out/removing. In context of stones from a house
    wall, 'remove' is idiomatic and precise without over-specifying the mechanics.
- source_word: הָאֲבָנִים
  chosen: the stones
  alternatives:
  - the masonry stones
  lexicon: HALOT
  rationale: Direct and natural rendering of אֲבָנִים; in context these are building
    stones, but 'stones' is sufficient and closer to the Hebrew.
- source_word: אֲשֶׁר בָּהֵן הַנָּגַע
  chosen: in which the infection is
  alternatives:
  - that have the infection in them
  - in which the diseased area is
  - where the mark is
  lexicon: HALOT
  rationale: נֶגַע in Leviticus 13–14 refers to an afflicting mark/plague-like infection
    affecting skin, garments, or houses. 'Infection' communicates the ritual-contaminating
    phenomenon in accessible English without implying certainty about modern medical
    diagnosis. 'In which' reflects בָּהֵן closely.
- source_word: וְהִשְׁלִיכוּ
  chosen: and throw
  alternatives:
  - and cast
  - and hurl
  lexicon: HALOT
  rationale: '''Throw'' is the natural modern equivalent of השליך here; ''cast'' is
    possible but more archaic.'
- source_word: אֶתְהֶן
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the stones; English object pronoun is required.
- source_word: אֶל מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - to outside the city
  - outside the town
  lexicon: HALOT
  rationale: מִחוּץ with אֶל indicates movement to a place outside. 'Outside the city'
    is idiomatic and preserves the spatial sense.
- source_word: אֶל מָקוֹם טָמֵא
  chosen: to an unclean place
  alternatives:
  - to a defiled place
  - to an impure place
  lexicon: HALOT
  rationale: טָמֵא in Leviticus is a key purity term. 'Unclean' is the standard and
    most transparent rendering in ritual contexts; 'impure' is possible but less traditional
    here.
