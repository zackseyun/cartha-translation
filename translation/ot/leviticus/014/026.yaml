id: LEV.14.26
reference: Leviticus 14:26
source:
  edition: WLC
  text: וּ/מִן הַ/שֶּׁ֖מֶן יִצֹ֣ק הַ/כֹּהֵ֑ן עַל כַּ֥ף הַ/כֹּהֵ֖ן הַ/שְּׂמָאלִֽית־־׃
translation:
  text: And from the oil the priest shall pour onto the palm of the priest's left
    hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'onto the palm of the priest, the left [one].'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  chosen: And from
  alternatives:
  - And some of
  - Then from
  lexicon: HALOT
  rationale: The conjunction prefixed to מן naturally continues the ritual sequence
    ('And'), while מן indicates source ('from'). 'Some of' is interpretive and not
    required, though context implies a portion of the oil.
- source_word: הַ/שֶּׁמֶן
  chosen: the oil
  lexicon: HALOT
  rationale: Straightforward rendering of שׁמן with the article. In this ritual context
    it refers to the previously mentioned consecratory oil.
- source_word: יִצֹק
  chosen: shall pour
  alternatives:
  - will pour
  - shall pour out
  lexicon: HALOT
  rationale: The yiqtol here functions instructionally/futurally within ritual procedure,
    well represented by 'shall pour.' 'Pour out' is possible but adds emphasis not
    explicit in the Hebrew.
- source_word: הַ/כֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal material.
- source_word: עַל
  chosen: onto
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: '''Onto'' conveys motion toward a surface, fitting the act of pouring.
    ''On/upon'' are also possible but slightly less explicit in English.'
- source_word: כַּף
  chosen: the palm
  alternatives:
  - the hollow
  - the hand
  lexicon: HALOT
  rationale: כַּף often denotes the palm or hollow of the hand rather than the hand
    generally. 'Palm' is the most precise and natural here.
- source_word: הַ/כֹּהֵן הַ/שְּׂמָאלִית
  chosen: the priest's left hand
  alternatives:
  - the left palm of the priest
  - the priest's left palm
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'the palm of the priest, the left
    [one],' idiomatic English expresses this as 'the priest's left hand.' This preserves
    the sense while remaining readable. 'Left palm' is more formally precise but less
    natural in English.
