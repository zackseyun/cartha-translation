theological_decisions:
- issue: Rendering of ritual-purity terminology
  chosen_reading: unclean
  alternative_readings:
  - impure
  rationale: Leviticus uses טמא within a ritual and legal purity framework. 'Unclean'
    preserves the established cultic sense without importing later doctrinal claims.
    This is a lexical-theological choice because purity language is central to the
    book's theology.
  doctrine_reference: Translation philosophy §5; Contested terms table principle of
    consistency for key terms
