id: LEV.14.45
reference: Leviticus 14:45
source:
  edition: WLC
  text: וְ/נָתַ֣ץ אֶת הַ/בַּ֗יִת אֶת אֲבָנָי/ו֙ וְ/אֶת עֵצָ֔י/ו וְ/אֵ֖ת כָּל עֲפַ֣ר
    הַ/בָּ֑יִת וְ/הוֹצִיא֙ אֶל מִ/ח֣וּץ לָ/עִ֔יר אֶל מָק֖וֹם טָמֵֽא־־־־־־׃
translation:
  text: Then he shall tear down the house—its stones, its timbers, and all the plaster
    of the house—and carry them out to an unclean place outside the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the dust of the house' or 'all the mortar/plaster of the house.'
      The Hebrew is literally 'all the dust of the house,' but in this building context
      it likely refers to the scraped wall material.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַץ
  chosen: Then he shall tear down
  alternatives:
  - and he shall break down
  - and he shall demolish
  lexicon: HALOT
  rationale: נתץ in this context refers to dismantling or demolishing a contaminated
    house. 'Tear down' is natural modern English and preserves the force of physical
    demolition. 'Then' reflects the sequential waw in context, not merely simple coordination.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the home
  lexicon: HALOT
  rationale: בית here denotes the physical structure under inspection for contamination.
    'House' is the standard and contextually precise rendering.
- source_word: אֲבָנָיו
  chosen: its stones
  alternatives:
  - its masonry
  lexicon: HALOT
  rationale: The plural noun literally means 'its stones.' Retaining the concrete
    image fits the dismantling procedure described in the law.
- source_word: עֵצָיו
  chosen: its timbers
  alternatives:
  - its wood
  - its beams
  lexicon: HALOT
  rationale: While literally 'its woods/woodwork,' in a house-demolition context 'timbers'
    best conveys the structural wooden components in idiomatic English.
- source_word: כָּל עֲפַר הַבָּיִת
  chosen: all the plaster of the house
  alternatives:
  - all the dust of the house
  - all the mortar of the house
  lexicon: HALOT
  rationale: עפר literally means 'dust/loose earth,' but in this house-purification
    context it refers to the material scraped from the walls or structure. 'Plaster'
    best matches the building context and the preceding legislation about scraping
    the house, while remaining understandable.
- source_word: וְהוֹצִיא
  chosen: and carry them out
  alternatives:
  - and bring them out
  - and take them out
  lexicon: HALOT
  rationale: The verb means to cause to go out or bring out. Because the direct objects
    are the dismantled materials collectively, 'carry them out' makes the implied
    physical removal explicit in natural English.
- source_word: אֶל מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - to outside the city
  lexicon: HALOT
  rationale: 'The phrase is idiomatically locative/directional: removal beyond the
    inhabited area. ''Outside the city'' is the natural English equivalent.'
- source_word: אֶל מָקוֹם טָמֵא
  chosen: to an unclean place
  alternatives:
  - to an impure place
  lexicon: HALOT
  rationale: טמא is a key ritual-purity term. 'Unclean' preserves the cultic sense
    better than the more abstract 'impure,' especially in Leviticus.
