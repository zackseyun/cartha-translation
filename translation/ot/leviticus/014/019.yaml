id: LEV.14.19
reference: Leviticus 14:19
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה הַ/כֹּהֵן֙ אֶת הַ֣/חַטָּ֔את וְ/כִפֶּ֕ר עַל הַ/מִּטַּהֵ֖ר מִ/טֻּמְאָת֑/וֹ
    וְ/אַחַ֖ר יִשְׁחַ֥ט אֶת הָ/עֹלָֽה־־־׃
translation:
  text: Then the priest shall offer the sin offering and make atonement for the one
    being cleansed from his uncleanness; and afterward he shall slaughter the burnt
    offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purification offering.' The Hebrew term חַטָּאת can denote the offering
      used for purification in Levitical ritual contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: shall offer
  alternatives:
  - shall do
  - shall make
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial contexts עשה
    commonly means to perform or offer a sacrifice. 'Offer' gives the cultic sense
    in natural English without over-paraphrasing.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the definite noun in this ritual context.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  - the sin sacrifice
  lexicon: HALOT
  rationale: חטאת can denote either 'sin' or the 'sin offering.' Here the direct object
    of sacrificial action requires the offering sense. 'Sin offering' is the most
    recognizable English rendering, though 'purification offering' is a plausible
    contextual alternative in Leviticus.
- source_word: וְכִפֶּר
  chosen: make atonement
  alternatives:
  - purge
  - effect atonement
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' This preserves the ritual-theological force without
    importing a narrower doctrinal theory of atonement.
- source_word: עַל
  chosen: for
  alternatives:
  - upon
  - on behalf of
  lexicon: HALOT
  rationale: With כפר, על often marks the person for whom atonement is made. 'For'
    is idiomatic English and preserves the relational sense.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the one cleansing himself
  lexicon: HALOT
  rationale: The hitpael participle here refers to the person undergoing ritual cleansing.
    'The one being cleansed' best captures the passive/reflexive nuance in context
    and reads naturally in English.
- source_word: מִטֻּמְאָתוֹ
  chosen: from his uncleanness
  alternatives:
  - from his impurity
  - from his ritual uncleanness
  lexicon: HALOT
  rationale: טֻמְאָה in Leviticus denotes ritual impurity/uncleanness. 'Uncleanness'
    preserves traditional cultic diction; 'his' reflects the masculine singular suffix
    and the gender-accurate policy.
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: Marks sequence in the ritual procedure. 'And afterward' is clear and
    natural.
- source_word: יִשְׁחַט
  chosen: he shall slaughter
  alternatives:
  - he shall kill
  - he shall butcher
  lexicon: HALOT
  rationale: The verb is the standard term for slaughtering sacrificial animals. 'Slaughter'
    preserves the formal sacrificial sense better than the more generic 'kill.'
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עלה is the standard term for the burnt offering. 'Burnt offering' is
    the clearest established English equivalent; 'whole burnt offering' is more explicit
    but less idiomatic.
