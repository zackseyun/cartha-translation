theological_decisions:
- issue: Rendering of חַטָּאת in Levitical sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: In Leviticus, חטאת often functions as a technical sacrificial term associated
    with purification from impurity. However, the base sacrificial label 'sin offering'
    remains the most transparent and widely recognized English rendering. The alternative
    is preserved in a footnote because some interpreters prefer it in purity contexts
    such as this one.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Gendered suffix in מִטֻּמְאָתוֹ
  chosen_reading: his uncleanness
  alternative_readings:
  - their uncleanness
  rationale: The Hebrew suffix is masculine singular. Per the gender-accurate policy,
    the translation retains the singular masculine reference rather than neutralizing
    it.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
