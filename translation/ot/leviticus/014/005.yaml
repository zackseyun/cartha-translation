theological_decisions:
- issue: Rendering of מַיִם חַיִּים in ritual context
  chosen_reading: fresh water
  alternative_readings:
  - living water
  - running water
  rationale: The phrase here refers to naturally sourced, non-stagnant water used
    in purification ritual, not directly to later theological symbolism. 'Fresh water'
    best communicates the ritual sense in contemporary English while preserving alternatives
    in a footnote.
  doctrine_reference: Translation philosophy §6; §3 preserve theological tension rather
    than resolve it
