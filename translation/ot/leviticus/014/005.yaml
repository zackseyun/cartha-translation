id: LEV.14.5
reference: Leviticus 14:5
source:
  edition: WLC
  text: וְ/צִוָּה֙ הַ/כֹּהֵ֔ן וְ/שָׁחַ֖ט אֶת הַ/צִּפּ֣וֹר הָ/אֶחָ֑ת אֶל כְּלִי חֶ֖רֶשׂ
    עַל מַ֥יִם חַיִּֽים־־־־׃
translation:
  text: Then the priest shall command that one bird be slaughtered into an earthenware
    vessel over fresh water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'living water,' that is, running or fresh water.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  chosen: Then ... shall command
  alternatives:
  - and the priest shall command
  - the priest shall give orders
  lexicon: HALOT
  rationale: The waw + perfect in procedural legal narrative is naturally rendered
    with future/modal force in English instructions. 'Then' captures the sequential
    force, and 'shall command' preserves the priest's authoritative directive.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal context.
- source_word: וְשָׁחַט
  chosen: be slaughtered
  alternatives:
  - and he shall slaughter
  - be killed
  lexicon: HALOT
  rationale: Although morphologically active, the verb follows 'the priest shall command,'
    and English idiom commonly supplies the commanded action as passive ('shall command
    that ... be slaughtered'). 'Slaughtered' is more precise than 'killed' for ritual
    animal killing.
- source_word: אֶת־הַצִּפּוֹר הָאֶחָת
  chosen: one bird
  alternatives:
  - the one bird
  - one of the birds
  lexicon: HALOT
  rationale: The phrase identifies one bird from the pair specified in the surrounding
    context. 'One bird' is natural English while preserving the individuating force
    of הָאֶחָת.
- source_word: אֶל
  chosen: into
  alternatives:
  - in
  - over
  lexicon: HALOT
  rationale: With a verb of slaughter and a vessel as object of the preposition, אֶל
    is best rendered 'into,' indicating that the blood is directed into the vessel.
- source_word: כְּלִי חֶרֶשׂ
  chosen: an earthenware vessel
  alternatives:
  - a clay vessel
  - a pottery vessel
  lexicon: HALOT
  rationale: '''Earthenware vessel'' is a clear, standard rendering for a ceramic/clay
    container used in ritual contexts.'
- source_word: עַל מַיִם חַיִּים
  chosen: over fresh water
  alternatives:
  - over living water
  - over running water
  lexicon: HALOT
  rationale: מַיִם חַיִּים literally means 'living water,' i.e., fresh/running water.
    In main text, 'fresh water' communicates the sense in accessible modern English;
    the more literal and traditional alternative is preserved in a footnote.
