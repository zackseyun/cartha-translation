theological_decisions:
- issue: Rendering of sacrificial term אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - trespass offering
  - reparation offering
  rationale: The verse concerns a specific Levitical sacrifice. 'Guilt offering' best
    communicates the offering's function in modern English without importing later
    doctrinal nuance. No doctrinal controversy is resolved beyond lexical precision.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
