id: LEV.14.25
reference: Leviticus 14:25
source:
  edition: WLC
  text: וְ/שָׁחַט֮ אֶת כֶּ֣בֶשׂ הָֽ/אָשָׁם֒ וְ/לָקַ֤ח הַ/כֹּהֵן֙ מִ/דַּ֣ם הָֽ/אָשָׁ֔ם
    וְ/נָתַ֛ן עַל תְּנ֥וּךְ אֹֽזֶן הַ/מִּטַּהֵ֖ר הַ/יְמָנִ֑ית וְ/עַל בֹּ֤הֶן יָד/וֹ֙
    הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן רַגְל֖/וֹ הַ/יְמָנִֽית־־־־־׃
translation:
  text: Then he shall slaughter the guilt-offering lamb, and the priest shall take
    some of the blood of the guilt offering and put it on the lobe of the right ear
    of the one being cleansed, and on the thumb of his right hand, and on the big
    toe of his right foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tip of the right ear.' The Hebrew term refers to the outer extremity
      of the ear.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'trespass offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁחַט
  chosen: shall slaughter
  alternatives:
  - slay
  - kill
  lexicon: HALOT
  rationale: Cultic sacrificial context calls for the technical verb 'slaughter' rather
    than the more generic 'kill'; English future-like 'shall' fits the procedural
    sequence.
- source_word: כֶּבֶשׂ הָאָשָׁם
  chosen: the guilt-offering lamb
  alternatives:
  - the lamb of the guilt offering
  - the trespass-offering lamb
  lexicon: HALOT
  rationale: Construct relationship indicates the lamb designated for the אָשָׁם offering.
    'Guilt offering' is preferred modern rendering over traditional 'trespass offering'
    for clarity and consistency.
- source_word: אָשָׁם
  chosen: guilt offering
  alternatives:
  - reparation offering
  - trespass offering
  lexicon: HALOT
  rationale: In Levitical sacrificial terminology this noun denotes the specific offering,
    not merely abstract guilt. 'Guilt offering' is the clearest standard English equivalent.
- source_word: מִדַּם הָאָשָׁם
  chosen: some of the blood of the guilt offering
  alternatives:
  - from the blood of the guilt offering
  - part of the blood of the guilt offering
  lexicon: HALOT
  rationale: The preposition מִן here is naturally partitive; 'some of the blood'
    communicates that only a portion is applied.
- source_word: תְּנוּךְ אֹזֶן
  chosen: the lobe of the ... ear
  alternatives:
  - the tip of the ... ear
  - the cartilage of the ... ear
  lexicon: HALOT
  rationale: The term refers to the extremity/protruding part of the ear. 'Lobe' is
    idiomatic and matches the ritual application point better than the vaguer 'tip.'
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one to be cleansed
  - the person being purified
  lexicon: HALOT
  rationale: The hitpael participle denotes the person undergoing the cleansing process.
    'Being cleansed' preserves the procedural/passive sense in context.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - right side
  lexicon: HALOT
  rationale: Used adjectivally with ear, hand, and foot; concise English 'right' is
    natural and accurate.
- source_word: בֹּהֶן יָדוֹ
  chosen: the thumb of his right hand
  alternatives:
  - the big thumb of his right hand
  lexicon: HALOT
  rationale: בֹּהֶן denotes the thumb when used with the hand. English requires the
    specific anatomical term rather than a literal but awkward 'big finger.'
- source_word: בֹּהֶן רַגְלוֹ
  chosen: the big toe of his right foot
  alternatives:
  - the great toe of his right foot
  lexicon: HALOT
  rationale: With foot, בֹּהֶן denotes the big toe. 'Big toe' is standard modern English.
- source_word: וְ
  chosen: Then / and
  alternatives:
  - and
  lexicon: HALOT
  rationale: The repeated waw links sequential ritual actions. Rendering the first
    as 'Then' helps readable English while preserving procedural flow; subsequent
    instances are rendered 'and'.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the cultic officiant.
