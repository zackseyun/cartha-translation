id: LEV.14.38
reference: Leviticus 14:38
source:
  edition: WLC
  text: וְ/יָצָ֧א הַ/כֹּהֵ֛ן מִן הַ/בַּ֖יִת אֶל פֶּ֣תַח הַ/בָּ֑יִת וְ/הִסְגִּ֥יר אֶת
    הַ/בַּ֖יִת שִׁבְעַ֥ת יָמִֽים־־־׃
translation:
  text: Then the priest shall go out of the house to the doorway of the house and
    shut up the house for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'close up the house for seven days.' The Hebrew verb can denote shutting
      off access for an inspection period.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then ... shall go out
  alternatives:
  - and he shall go out
  - and the priest shall go out
  lexicon: HALOT
  rationale: The waw + qatal in procedural legal material commonly advances the sequence
    of actions. 'Then' brings out the step-by-step force in natural English, while
    'shall go out' preserves the directive/legal sense.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Levitical legal contexts; the definite
    article is preserved.
- source_word: מִן הַבַּיִת
  chosen: out of the house
  alternatives:
  - from the house
  lexicon: HALOT
  rationale: With יָצָא, English idiom prefers 'out of the house.' The definite article
    is retained.
- source_word: אֶל פֶּתַח הַבָּיִת
  chosen: to the doorway of the house
  alternatives:
  - to the entrance of the house
  - to the opening of the house
  lexicon: HALOT
  rationale: פֶּתַח denotes an entrance/opening. 'Doorway' is concrete and natural
    here, matching the inspection procedure without over-specifying a physical door.
- source_word: וְהִסְגִּיר
  chosen: and shut up
  alternatives:
  - and quarantine
  - and close up
  - and isolate
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to shut/close off the house for a set period.
    'Shut up' preserves the formal procedural sense used in impurity legislation better
    than the more interpretive 'quarantine,' while still being understandable.
- source_word: אֶת הַבַּיִת
  chosen: the house
  lexicon: HALOT
  rationale: Direct object marker is not translated; the definite noun is rendered
    straightforwardly.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English requires the preposition 'for' to express duration naturally.
    The construct numeral phrase is rendered idiomatically.
