theological_decisions:
- issue: Rendering of אָשָׁם
  chosen_reading: guilt offering
  alternative_readings:
  - reparation offering
  - compensation offering
  rationale: אָשָׁם can denote both guilt and the associated offering. In Levitical
    sacrificial contexts, 'guilt offering' is the most recognizable and sufficiently
    precise English rendering. No doctrinal dispute is at stake, but the sacrificial
    term should remain explicit.
