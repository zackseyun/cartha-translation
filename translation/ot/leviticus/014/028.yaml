id: LEV.14.28
reference: Leviticus 14:28
source:
  edition: WLC
  text: וְ/נָתַ֨ן הַ/כֹּהֵ֜ן מִן הַ/שֶּׁ֣מֶן אֲשֶׁ֣ר עַל כַּפּ֗/וֹ עַל תְּנ֞וּךְ אֹ֤זֶן
    הַ/מִּטַּהֵר֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֤הֶן יָד/וֹ֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן
    רַגְל֖/וֹ הַ/יְמָנִ֑ית עַל מְק֖וֹם דַּ֥ם הָ/אָשָֽׁם־׀־־־־־׃
translation:
  text: And the priest shall put some of the oil that is on his palm on the lobe of
    the right ear of the one being cleansed, and on the thumb of his right hand, and
    on the big toe of his right foot, on the place of the guilt-offering blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the spot where the blood of the guilt offering was applied.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: shall put
  alternatives:
  - shall place
  - shall apply
  - shall give
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/place.' In this ritual context, 'put' is natural
    English for applying oil to body parts without over-interpreting the action.
- source_word: מִן הַשֶּׁמֶן
  chosen: some of the oil
  alternatives:
  - from the oil
  lexicon: HALOT
  rationale: The partitive מן is best represented in idiomatic English as 'some of
    the oil.'
- source_word: אֲשֶׁר עַל כַּפּוֹ
  chosen: that is on his palm
  alternatives:
  - that is in his palm
  - that is upon his hand
  lexicon: HALOT
  rationale: כַּף here refers specifically to the priest's palm/hand hollow. 'On his
    palm' follows the Hebrew preposition and fits the ritual image established in
    the context.
- source_word: תְּנוּךְ אֹזֶן
  chosen: the lobe of the ... ear
  alternatives:
  - the tip of the ... ear
  - the cartilage of the ... ear
  lexicon: HALOT
  rationale: תנוך in priestly ritual contexts denotes the ear lobe, as in parallel
    passages. 'Lobe' is the clearest modern anatomical rendering.
- source_word: הַמִּטַּהֵר
  chosen: the one being cleansed
  alternatives:
  - the one being purified
  - the cleansed person
  lexicon: HALOT
  rationale: The hitpael participle denotes the person undergoing ritual cleansing.
    'The one being cleansed' preserves the process-oriented sense better than a completed-state
    rendering.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - right-side
  lexicon: HALOT
  rationale: Standard anatomical adjective; 'right' is the natural English equivalent
    in each occurrence.
- source_word: בֹּהֶן יָדוֹ
  chosen: the thumb of his ... hand
  alternatives:
  - the big thumb of his hand
  lexicon: HALOT
  rationale: בֹּהֶן denotes the thumb/finger extremity here; 'thumb' is the established
    and precise English term.
- source_word: בֹּהֶן רַגְלוֹ
  chosen: the big toe of his ... foot
  alternatives:
  - the great toe of his foot
  lexicon: HALOT
  rationale: For the foot, בֹּהֶן is best rendered 'big toe,' the normal modern English
    expression.
- source_word: עַל מְקוֹם דַּם הָאָשָׁם
  chosen: on the place of the guilt-offering blood
  alternatives:
  - on the spot of the guilt-offering blood
  - where the blood of the guilt offering was placed
  - upon the place of the reparation-offering blood
  lexicon: HALOT
  rationale: מקום is 'place/spot.' The phrase refers to the same location where the
    guilt-offering blood had been applied in the preceding ritual. 'Guilt-offering'
    is the standard rendering for אָשָׁם in Leviticus and is clearer than more interpretive
    alternatives.
