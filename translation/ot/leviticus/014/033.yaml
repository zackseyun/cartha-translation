id: LEV.14.33
reference: Leviticus 14:33
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: And Yahweh spoke to Moses and to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces a new speech event in standard narrative style. 'Spoke' is the natural English rendering in this formulaic context and pairs well with the following 'saying.' 'Said' is possible but less idiomatic in this construction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech. 'To' is the clear modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and unto
  lexicon: HALOT
  rationale: The conjunction plus preposition is best represented explicitly as 'and to,' preserving that both Moses and Aaron are direct addressees.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional introduction to direct discourse. 'Saying' preserves the Hebrew discourse formula without unnecessary paraphrase.
