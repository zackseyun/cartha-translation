theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly require the default rendering 'the
    LORD' for יְהוָה unless context demands otherwise; no such exception applies here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term לְטָהֳרָתוֹ in a ritual-purity context
  chosen_reading: for his cleansing
  alternative_readings:
  - for his purification
  rationale: The verse concerns ritual restoration after skin disease. 'Cleansing'
    preserves the ceremonial sense without importing later doctrinal connotations
    beyond the text. The alternative is lexically viable and preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English;
    preserve source-text sense without importing doctrinal claims'
