id: LEV.14.23
reference: Leviticus 14:23
source:
  edition: WLC
  text: וְ/הֵבִ֨יא אֹתָ֜/ם בַּ/יּ֧וֹם הַ/שְּׁמִינִ֛י לְ/טָהֳרָת֖/וֹ אֶל הַ/כֹּהֵ֑ן
    אֶל פֶּ֥תַח אֹֽהֶל מוֹעֵ֖ד לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: And on the eighth day he shall bring them for his cleansing to the priest,
    at the entrance of the tent of meeting, before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for his purification.” The Hebrew term refers to the ritual cleansing
      process in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: he shall bring
  alternatives:
  - and he will bring
  - then he shall bring
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in legal/instructional context
    functions with directive/future force; English 'shall bring' fits the procedural
    prescription.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Masculine plural object pronoun refers back to the required sacrificial
    items listed in the preceding verse; 'them' is the natural English rendering.
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: on the eighth day
  alternatives:
  - in the eighth day
  lexicon: HALOT
  rationale: Standard temporal expression with beth preposition; idiomatic English
    is 'on the eighth day.'
- source_word: לְטָהֳרָתוֹ
  chosen: for his cleansing
  alternatives:
  - for his purification
  - for his being cleansed
  lexicon: HALOT
  rationale: The noun from טהר here denotes the ritual cleansing process/result in
    the leprosy-purification procedure. 'Cleansing' is readable modern English and
    fits the cultic context without overtechnicality. 'Purification' is possible but
    slightly less transparent for contemporary readers.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - unto the priest
  lexicon: HALOT
  rationale: Straightforward directional phrase; 'to the priest' is natural modern
    English.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - to the entrance of the tent of meeting
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: Though אֶל often means 'to,' in context the phrase specifies the location
    where the items are brought before the priest. 'At the entrance' communicates
    the procedural setting clearly. 'Tent of meeting' preserves the established sense
    of אֹהֶל מוֹעֵד.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/cultic phrase meaning in Yahweh's presence. Per doctrine,
    יְהוָה is rendered 'the LORD.' 'Before the LORD' is both accurate and idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
