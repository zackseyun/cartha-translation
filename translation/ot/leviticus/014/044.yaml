theological_decisions:
- issue: Rendering צָרַעַת in a house context
  chosen_reading: Translate with a non-medical term ('skin disease') rather than traditional
    'leprosy'
  alternative_readings:
  - leprosy
  - defiling disease
  rationale: The text concerns ritual impurity rather than a modern clinical diagnosis,
    and the same Hebrew term is used across persons, garments, and houses. Retaining
    'leprosy' would mislead readers into a specific medical identification the Hebrew
    does not warrant. 'Skin disease' is the project's accessible default for tsaraath
    language, even though here the referent is a house; the phrase 'in the house'
    preserves the unusual application.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the procedural syntax
  chosen_reading: Use legal-procedural English ('then the priest shall come and inspect')
  alternative_readings:
  - simple past narrative rendering
  rationale: This verse belongs to priestly legislation, so English should reflect
    procedural instruction rather than flatten it into mere past narrative.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
