id: LEV.14.44
reference: Leviticus 14:44
source:
  edition: WLC
  text: וּ/בָא֙ הַ/כֹּהֵ֔ן וְ/רָאָ֕ה וְ/הִנֵּ֛ה פָּשָׂ֥ה הַ/נֶּ֖גַע בַּ/בָּ֑יִת צָרַ֨עַת
    מַמְאֶ֥רֶת הִ֛וא בַּ/בַּ֖יִת טָמֵ֥א הֽוּא׃
translation:
  text: then the priest shall come and inspect, and if indeed the infection has spread
    in the house, it is a destructive skin disease in the house; it is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leprosy.' The Hebrew term צָרַעַת refers to a broader category of ritual
      impurity than modern leprosy and is even used of houses here.
    reason: lexical_alternative
  - marker: b
    text: Or 'malignant' or 'corrosive' for 'destructive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: then ... shall come
  alternatives:
  - and ... came
  - and ... shall come
  lexicon: HALOT
  rationale: The waw + qatal in procedural legal material commonly carries sequential/jussive-future
    force in English. 'Then ... shall come' fits the inspection procedure context
    better than a simple past.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the cultic official; definite article preserved.
- source_word: וְרָאָה
  chosen: inspect
  alternatives:
  - see
  - look
  lexicon: HALOT
  rationale: Although literally 'see,' in this diagnostic-priestly context the sense
    is evaluative examination. 'Inspect' conveys the procedural force without undue
    paraphrase.
- source_word: וְהִנֵּה
  chosen: if indeed
  alternatives:
  - and behold
  - and if behold
  lexicon: HALOT
  rationale: Introduces the observed condition after inspection. In English legal/procedural
    style, 'if indeed' naturally conveys the evidential force better than the wooden
    'behold.'
- source_word: פָּשָׂה
  chosen: has spread
  alternatives:
  - has extended
  - has broken out
  lexicon: HALOT
  rationale: In plague/skin-disease contexts this verb denotes spreading or extending.
    'Has spread' is idiomatic and precise.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the plague
  - the mark
  - the affliction
  lexicon: HALOT
  rationale: נגע in Leviticus refers to the affected spot/plague-like contamination.
    'Infection' is accessible modern English and fits house contamination context
    better than the archaic 'plague,' while avoiding overprecision about medical diagnosis.
- source_word: בַּבָּיִת
  chosen: in the house
  alternatives:
  - on the house
  - within the house
  lexicon: HALOT
  rationale: The preposition beth with house here is best rendered 'in the house'
    for the condition affecting the structure.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling disease
  lexicon: HALOT
  rationale: Traditional 'leprosy' is misleading, since biblical tsaraath is a broader
    ritual-impurity category and here even applies to a house. 'Skin disease' preserves
    continuity with Levitical usage while signaling that the term is not modern Hansen's
    disease; in this house context it functions as the established label for the contamination
    category.
- source_word: מַמְאֶרֶת
  chosen: destructive
  alternatives:
  - malignant
  - corrosive
  - persistent
  lexicon: HALOT
  rationale: The adjective denotes something grievous/consuming in this ritual-diagnostic
    context. 'Destructive' communicates the serious, spreading character without importing
    modern medical connotations like 'malignant.'
- source_word: טָמֵא הוּא
  chosen: it is unclean
  alternatives:
  - it is impure
  lexicon: HALOT
  rationale: Standard ritual-status language in Leviticus. 'Unclean' is the established
    and clearest English equivalent for טמא in purity legislation.
