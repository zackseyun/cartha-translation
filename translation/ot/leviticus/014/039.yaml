id: LEV.14.39
reference: Leviticus 14:39
source:
  edition: WLC
  text: וְ/שָׁ֥ב הַ/כֹּהֵ֖ן בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֑י וְ/רָאָ֕ה וְ/הִנֵּ֛ה פָּשָׂ֥ה
    הַ/נֶּ֖גַע בְּ/קִירֹ֥ת הַ/בָּֽיִת׃
translation:
  text: Then the priest shall return on the seventh day and look, and if the infection
    has spread in the walls of the house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behold, the mark has spread on the walls of the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  chosen: Then ... shall return
  alternatives:
  - and he returned
  - and he shall return
  lexicon: HALOT
  rationale: The waw + qatal in procedural legal material commonly carries sequential
    force. 'Then ... shall return' gives clear English sequence in instructions while
    preserving the sense of returning.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in Leviticus; the referent is the inspecting
    priest in the ritual procedure.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: Natural modern English rendering of the temporal phrase, preserving the
    definite article and ordinal sense.
- source_word: וְרָאָה
  chosen: and look
  alternatives:
  - and see
  - and inspect
  lexicon: HALOT
  rationale: In context the priest is making an official examination, but 'look' keeps
    the direct lexical sense of ראה while fitting the procedural style in English
    after 'shall return.'
- source_word: וְהִנֵּה
  chosen: and if
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: Although הִנֵּה literally means 'behold,' in this legal conditional context
    it introduces the observed state that triggers the next action. 'And if' communicates
    the procedural force more idiomatically in English without unnecessary archaism.
- source_word: פָּשָׂה
  chosen: has spread
  alternatives:
  - has extended
  - has spread further
  lexicon: HALOT
  rationale: פּשה in skin/house-disease contexts denotes spreading. Present perfect
    English fits the state observed at inspection.
- source_word: הַנֶּגַע
  chosen: the infection
  alternatives:
  - the disease
  - the plague
  - the mark
  - the affliction
  lexicon: HALOT
  rationale: In Leviticus 13–14, נגע refers to an afflicting contamination or diseased
    spot. 'Infection' is accessible modern English and fits house-wall contamination
    better than the archaic 'plague,' while avoiding overprecision about medical diagnosis.
- source_word: בְּקִירֹת הַבָּיִת
  chosen: in the walls of the house
  alternatives:
  - on the walls of the house
  - in the house walls
  lexicon: HALOT
  rationale: The preposition with 'walls' is best rendered 'in' here because the problem
    is described as penetrating/spreading within the wall surfaces, though 'on' is
    possible in English. 'Walls of the house' is the most natural construct rendering.
