id: LEV.14.46
reference: Leviticus 14:46
source:
  edition: WLC
  text: וְ/הַ/בָּא֙ אֶל הַ/בַּ֔יִת כָּל יְמֵ֖י הִסְגִּ֣יר אֹת֑/וֹ יִטְמָ֖א עַד הָ/עָֽרֶב־־־׃
translation:
  text: And whoever enters the house during all the days that it is quarantined shall
    be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that it is shut up' or 'that it is confined.' The Hebrew refers to
      the house being isolated under priestly restriction for inspection.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/בָּא
  chosen: And whoever enters
  alternatives:
  - And the one who enters
  - And anyone who enters
  lexicon: HALOT
  rationale: The article with the participle functions substantivally, referring generically
    to any person who enters. 'Whoever enters' is natural English and preserves the
    general legal force.
- source_word: אֶל הַ/בַּיִת
  chosen: the house
  alternatives:
  - into the house
  lexicon: HALOT
  rationale: With בוא plus אֶל, the sense is movement into/entering the house. English
    'enters the house' naturally incorporates the preposition.
- source_word: כָּל יְמֵי
  chosen: during all the days
  alternatives:
  - all the days of
  - throughout the days that
  lexicon: HALOT
  rationale: This phrase marks the full duration of the confinement period. 'During
    all the days' preserves the temporal scope while reading smoothly in English.
- source_word: הִסְגִּיר אֹתוֹ
  chosen: that it is quarantined
  alternatives:
  - that he has shut it up
  - that it is shut up
  - that it is confined
  lexicon: HALOT
  rationale: In Leviticus 13–14, סגר in impurity procedures refers to isolating or
    confining a person or house for inspection. 'Quarantined' communicates the ritual-legal
    isolation clearly in contemporary English without implying modern medicine as
    the primary sense.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: The verb denotes becoming/being rendered ritually unclean. 'Shall be
    unclean' fits the legal register of the verse and communicates the resulting impurity
    state.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Standard idiom for the duration of temporary ritual impurity. The article
    is naturally represented in English as 'the evening,' though 'until evening' would
    also be acceptable.
