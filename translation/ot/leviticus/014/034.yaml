id: LEV.14.34
reference: Leviticus 14:34
source:
  edition: WLC
  text: כִּ֤י תָבֹ֨אוּ֙ אֶל אֶ֣רֶץ כְּנַ֔עַן אֲשֶׁ֥ר אֲנִ֛י נֹתֵ֥ן לָ/כֶ֖ם לַ/אֲחֻזָּ֑ה
    וְ/נָתַתִּי֙ נֶ֣גַע צָרַ֔עַת בְּ/בֵ֖ית אֶ֥רֶץ אֲחֻזַּתְ/כֶֽם־׃
translation:
  text: When you enter the land of Canaan that I am giving to you as a possession,
    and I put an outbreak of skin disease in a house in the land of your possession,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leprosy.' The Hebrew term refers more broadly to a range of diseased
      conditions or contaminating outbreaks, not only what is called leprosy in modern
      usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a future circumstance/time clause tied to the following
    legislation. 'When' best fits the legal setting and English idiom.
- source_word: תָבֹאוּ
  chosen: you enter
  alternatives:
  - you come
  - you go in
  lexicon: HALOT
  rationale: From בוא, with second masculine plural reference to Israel. 'Enter' is
    the most natural legal-geographical rendering in English.
- source_word: אֶל אֶרֶץ כְּנַעַן
  chosen: the land of Canaan
  alternatives:
  - into the land of Canaan
  lexicon: HALOT
  rationale: Standard rendering of the destination phrase; 'the land of Canaan' is
    idiomatic and preserves the territorial sense.
- source_word: אֲשֶׁר אֲנִי נֹתֵן לָכֶם
  chosen: that I am giving to you
  alternatives:
  - which I give to you
  - that I give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express imminent or ongoing divine action. 'Am
    giving' preserves that aspect better than a simple present while remaining natural.
- source_word: לַאֲחֻזָּה
  chosen: as a possession
  alternatives:
  - for a possession
  - as property
  - as an inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes landed property/holding. 'Possession' is broad enough
    to fit the land-tenure context without importing later inheritance language too
    strongly.
- source_word: וְנָתַתִּי
  chosen: and I put
  alternatives:
  - and I place
  - and I set
  - and I give
  lexicon: HALOT
  rationale: Although literally 'and I give,' English with 'give' is awkward here.
    In context of affliction appearing in a house, 'put' conveys the causative placement
    naturally while preserving divine agency explicit in the Hebrew.
- source_word: נֶגַע
  chosen: an outbreak
  alternatives:
  - a plague
  - an affliction
  - a mark
  lexicon: HALOT
  rationale: נֶגַע is a struck mark/affliction. In Leviticus 13–14, 'outbreak' works
    well for the visible phenomenon without overcommitting to a modern medical category.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling disease
  lexicon: HALOT
  rationale: Traditional 'leprosy' is misleading, since צָרַעַת in Leviticus covers
    a broader set of conditions and even affects houses. 'Skin disease' is the project's
    accessible non-technical rendering, though here the house-context makes the phrase
    somewhat analogical.
- source_word: בְּבֵית
  chosen: in a house
  alternatives:
  - on a house
  - within a house
  lexicon: HALOT
  rationale: The preposition ב plus 'house' is most naturally rendered 'in a house'
    in English for this context.
- source_word: אֶרֶץ אֲחֻזַּתְכֶם
  chosen: the land of your possession
  alternatives:
  - the land you possess
  - your landed property
  lexicon: HALOT
  rationale: This phrase reiterates the possession theme from לַאֲחֻזָּה. Rendering
    it more formally as 'the land of your possession' preserves the lexical connection
    and covenant-land emphasis.
