theological_decisions:
- issue: Divine agency in the house affliction
  chosen_reading: 'Retain explicit first-person divine action: ''I put an outbreak...'''
  alternative_readings:
  - Use an impersonal rendering such as 'there appears' or 'there is'
  rationale: The Hebrew explicitly attributes the occurrence to God (וְנָתַתִּי).
    The translation should preserve that theological tension rather than soften it
    by making the event impersonal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
