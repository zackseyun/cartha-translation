theological_decisions:
- issue: Rendering of טָמֵא in a Levitical purity context
  chosen_reading: unclean
  alternative_readings:
  - defiled
  - impure
  rationale: Leviticus uses טָמֵא as a technical purity term. 'Unclean' best preserves
    the ritual category without importing a stronger moral sense.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological
    tension; do not import doctrinal claims the text does not make.'
