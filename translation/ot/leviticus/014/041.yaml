id: LEV.14.41
reference: Leviticus 14:41
source:
  edition: WLC
  text: וְ/אֶת הַ/בַּ֛יִת יַקְצִ֥עַ מִ/בַּ֖יִת סָבִ֑יב וְ/שָׁפְכ֗וּ אֶת הֶֽ/עָפָר֙
    אֲשֶׁ֣ר הִקְצ֔וּ אֶל מִ/ח֣וּץ לָ/עִ֔יר אֶל מָק֖וֹם טָמֵֽא־־־־׃
translation:
  text: He shall have the inside of the house scraped all around, and they shall pour
    out the plaster dust that they scraped off outside the city, into an unclean place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'the dust.' The Hebrew term is literally 'dust,' here referring
      to the material scraped from the house walls.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַקְצִעַ
  chosen: shall have ... scraped
  alternatives:
  - shall scrape
  - shall cause to be scraped
  lexicon: HALOT
  rationale: 'Hiphil of קצע here is causative: the priest directs the action rather
    than personally performing all labor. English ''shall have ... scraped'' captures
    the causative force naturally.'
- source_word: מִבַּיִת סָבִיב
  chosen: the inside of the house ... all around
  alternatives:
  - within the house all around
  - from the house all around
  lexicon: HALOT
  rationale: The phrase indicates the interior surface/inside area of the house, with
    סָבִיב adding the sense of around the whole interior perimeter. 'Inside of the
    house ... all around' is clearer in modern English than a more wooden 'from the
    house round about.'
- source_word: וְשָׁפְכוּ
  chosen: they shall pour out
  alternatives:
  - they shall dump
  - they shall spill out
  lexicon: HALOT
  rationale: שׁפך commonly means 'pour out.' In this disposal context, 'pour out'
    remains natural and preserves the concrete action without becoming too colloquial.
- source_word: הֶעָפָר
  chosen: the plaster dust
  alternatives:
  - the dust
  - the loose material
  - the mortar debris
  lexicon: HALOT
  rationale: Literally 'the dust.' In context of scraping diseased house walls, the
    material is the scraped-off dusty plaster/coating. 'Plaster dust' makes the referent
    explicit for modern readers while staying close to the source sense.
- source_word: אֲשֶׁר הִקְצוּ
  chosen: that they scraped off
  alternatives:
  - that they removed by scraping
  - that they cut away
  lexicon: HALOT
  rationale: This clause refers back to the material removed from the walls. 'Scraped
    off' matches the house-remediation context and coheres with the earlier verb.
- source_word: אֶל מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - to outside the city
  - to a place outside the city
  lexicon: HALOT
  rationale: The prepositional sequence indicates movement to a location beyond the
    city limits. 'Outside the city' is idiomatic English.
- source_word: אֶל מָקוֹם טָמֵא
  chosen: into an unclean place
  alternatives:
  - to an unclean place
  - to a defiled place
  lexicon: HALOT
  rationale: טָמֵא in Leviticus is a key ritual category. 'Unclean' preserves the
    cultic/ritual sense better than 'defiled,' which can imply moral corruption not
    explicit here. 'Into' fits the motion of disposal.
