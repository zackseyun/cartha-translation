theological_decisions:
- issue: Nature of cleanness in priestly law
  chosen_reading: ritual cleanness
  alternative_readings:
  - moral purity
  rationale: In Leviticus 14 the context is priestly restoration after skin-disease
    impurity, so 'clean' should be understood as ritual status, not primarily moral
    transformation. The translation keeps the simple biblical term 'clean' rather
    than importing explanatory wording into the main text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
