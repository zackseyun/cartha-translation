id: LEV.14.20
reference: Leviticus 14:20
source:
  edition: WLC
  text: וְ/הֶעֱלָ֧ה הַ/כֹּהֵ֛ן אֶת הָ/עֹלָ֥ה וְ/אֶת הַ/מִּנְחָ֖ה הַ/מִּזְבֵּ֑חָ/ה
    וְ/כִפֶּ֥ר עָלָ֛י/ו הַ/כֹּהֵ֖ן וְ/טָהֵֽר־־׃ס
translation:
  text: Then the priest shall offer up the burnt offering and the grain offering on
    the altar, and the priest shall make atonement for him, and he shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and he shall be purified.'' The Hebrew more literally states the resulting
      condition: ''and he shall be clean.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱלָה
  chosen: shall offer up
  alternatives:
  - shall bring up
  - shall present
  lexicon: HALOT
  rationale: Hiphil of עלה in sacrificial context commonly means to offer up on the
    altar, not merely to bring. 'Shall offer up' preserves the cultic sense and the
    forward-looking force in English legal/ritual style.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עלה as a sacrificial noun is the standard term for the burnt offering.
    'Burnt offering' is the clearest established English equivalent.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: In Levitical sacrificial legislation, מִנְחָה refers specifically to
    the grain offering. Although the term can more broadly mean gift or tribute elsewhere,
    the ritual context here narrows the sense.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  - upon the altar
  lexicon: HALOT
  rationale: The directional ending with מזבח in sacrificial context idiomatically
    indicates placement/offering on the altar. 'On the altar' is natural English and
    fits the ritual action.
- source_word: וְכִפֶּר עָלָיו
  chosen: shall make atonement for him
  alternatives:
  - shall purge him
  - shall effect atonement on his behalf
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.'
    'For him' captures עָלָיו idiomatically as benefactive/on behalf of the cleansed
    person.
- source_word: וְטָהֵר
  chosen: and he shall be clean
  alternatives:
  - and he shall be purified
  - and he shall be clean again
  lexicon: HALOT
  rationale: The Qal form here states the resulting status after the rite. 'Be clean'
    preserves the ritual-cleanness category without overinterpreting it as a process
    ('be purified').
