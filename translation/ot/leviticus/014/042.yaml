id: LEV.14.42
reference: Leviticus 14:42
source:
  edition: WLC
  text: וְ/לָקְחוּ֙ אֲבָנִ֣ים אֲחֵר֔וֹת וְ/הֵבִ֖יאוּ אֶל תַּ֣חַת הָ/אֲבָנִ֑ים וְ/עָפָ֥ר
    אַחֵ֛ר יִקַּ֖ח וְ/טָ֥ח אֶת הַ/בָּֽיִת־־׃
translation:
  text: Then they shall take other stones and bring them in place of the stones, and
    he shall take other plaster and plaster the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'other mortar' or, more literally, 'other dust/earth.' The Hebrew refers
      to the material used to recoat the house after the infected stones are replaced.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under the stones,' an idiom here meaning 'in place of the stones'
      or 'to replace the stones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  chosen: Then they shall take
  alternatives:
  - And they shall take
  - Then they must take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural legal sequence; rendered
    with future-like English 'shall' to reflect instruction within ritual law. 'Then'
    brings out the sequential force of the waw in context.
- source_word: אֲבָנִים אֲחֵרוֹת
  chosen: other stones
  alternatives:
  - different stones
  lexicon: HALOT
  rationale: Straightforward nominal phrase; 'other stones' preserves the replacement
    sense without unnecessary expansion.
- source_word: וְהֵבִיאוּ אֶל תַּחַת הָאֲבָנִים
  chosen: and bring them in place of the stones
  alternatives:
  - and bring them under the stones
  - and bring them to replace the stones
  lexicon: HALOT
  rationale: תַּחַת here is idiomatic for substitution/replacement, not physical position
    'under.' 'In place of' best captures the sense in context of replacing removed
    stones.
- source_word: וְעָפָר אַחֵר
  chosen: other plaster
  alternatives:
  - other mortar
  - other dust
  lexicon: HALOT
  rationale: Although עָפָר often means 'dust' or 'loose earth,' in this house-repair
    context it refers to the earthen material used for coating the wall. 'Plaster'
    communicates the functional sense in natural English better than the overly literal
    'dust.'
- source_word: יִקַּח
  chosen: he shall take
  alternatives:
  - one shall take
  - they shall take
  lexicon: HALOT
  rationale: The verb is 3ms singular. English legal style commonly uses singular
    'he shall' for an unspecified agent in procedural instructions. The shift from
    plural to singular is preserved rather than harmonized.
- source_word: וְטָח אֶת הַבָּיִת
  chosen: and plaster the house
  alternatives:
  - and coat the house
  - and smear the house
  lexicon: HALOT
  rationale: The verb טוח in this construction refers to plastering/coating a wall
    or house surface. 'Plaster' is the most idiomatic and contextually precise English
    rendering.
