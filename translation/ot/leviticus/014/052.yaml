id: LEV.14.52
reference: Leviticus 14:52
source:
  edition: WLC
  text: וְ/חִטֵּ֣א אֶת הַ/בַּ֔יִת בְּ/דַם֙ הַ/צִּפּ֔וֹר וּ/בַ/מַּ֖יִם הַֽ/חַיִּ֑ים
    וּ/בַ/צִּפֹּ֣ר הַ/חַיָּ֗ה וּ/בְ/עֵ֥ץ הָ/אֶ֛רֶז וּ/בָ/אֵזֹ֖ב וּ/בִ/שְׁנִ֥י הַ/תּוֹלָֽעַת־׃
translation:
  text: Thus he shall purify the house with the blood of the bird, with the living
    water, with the live bird, with cedar wood, with hyssop, and with scarlet yarn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fresh water' or 'running water'; Hebrew 'living water,' a standard expression
      for water from a fresh, flowing source.
    reason: lexical_alternative
  - marker: b
    text: Or 'scarlet thread.' The Hebrew expression refers to scarlet-dyed material
      used in the purification rite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִטֵּא
  chosen: Thus he shall purify
  alternatives:
  - and he shall cleanse
  - and he shall make atonement for/purge
  lexicon: HALOT
  rationale: Piel of חטא in ritual contexts means to purify/decontaminate rather than
    to cause to sin. 'Purify' communicates the ritual-cleansing sense in natural English.
    'Thus' brings forward the conjunctive force in context, linking this action to
    the preceding ritual procedure.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the home
  lexicon: HALOT
  rationale: בַּיִת here refers to the physical house undergoing ritual cleansing
    from mold-like contamination. 'House' is the standard and sufficiently concrete
    rendering.
- source_word: בְּדַם הַצִּפּוֹר
  chosen: with the blood of the bird
  alternatives:
  - by the blood of the bird
  lexicon: HALOT
  rationale: The preposition ב marks means/instrument in this ritual list. 'With'
    is the most natural English rendering for the materials used in purification.
- source_word: וּבַמַּיִם הַחַיִּים
  chosen: with the living water
  alternatives:
  - with fresh water
  - with running water
  lexicon: HALOT
  rationale: מַיִם חַיִּים literally means 'living water,' an idiom for fresh/running
    water. The literal rendering preserves the ritual terminology and intertextual
    resonance, while remaining understandable in context.
- source_word: וּבַצִּפֹּר הַחַיָּה
  chosen: with the live bird
  alternatives:
  - with the living bird
  lexicon: HALOT
  rationale: The adjective חַיָּה distinguishes this bird from the one whose blood
    has been used. 'Live bird' is idiomatic English and preserves the contrast.
- source_word: וּבְעֵץ הָאֶרֶז
  chosen: with cedar wood
  alternatives:
  - with cedar timber
  lexicon: HALOT
  rationale: עֵץ with a tree species often denotes wood from that tree used in ritual.
    'Cedar wood' is the conventional and clear rendering.
- source_word: וּבָאֵזֹב
  chosen: with hyssop
  lexicon: HALOT
  rationale: אֵזֹב is traditionally rendered 'hyssop.' The exact botanical identification
    is debated, but 'hyssop' remains the standard translation and best preserves biblical
    ritual terminology.
- source_word: וּבִשְׁנִי הַתּוֹלָעַת
  chosen: with scarlet yarn
  alternatives:
  - with scarlet thread
  - with crimson yarn
  lexicon: HALOT
  rationale: This expression denotes scarlet-dyed material, likely thread/yarn used
    in the rite. 'Scarlet yarn' is clear modern English and fits the ritual inventory.
