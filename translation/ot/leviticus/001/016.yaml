id: LEV.1.16
reference: Leviticus 1:16
source:
  edition: WLC
  text: וְ/הֵסִ֥יר אֶת מֻרְאָת֖/וֹ בְּ/נֹצָתָ֑/הּ וְ/הִשְׁלִ֨יךְ אֹתָ֜/הּ אֵ֤צֶל הַ/מִּזְבֵּ֨חַ֙
    קֵ֔דְמָ/ה אֶל מְק֖וֹם הַ/דָּֽשֶׁן־־׃
translation:
  text: He shall remove its crop with its feathers and throw it beside the altar,
    on the east side, to the place of the ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its craw' for 'its crop.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with its feathers'; some translations render this phrase 'with its
      filth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵסִיר
  chosen: He shall remove
  alternatives:
  - and he shall take away
  - and he shall remove
  lexicon: HALOT
  rationale: Hiphil of סור here denotes causing something to be removed. 'He shall
    remove' is natural modern English and preserves the procedural force of the sacrificial
    instruction.
- source_word: מֻרְאָתוֹ
  chosen: its crop
  alternatives:
  - its craw
  - its gullet contents
  lexicon: HALOT
  rationale: In the context of bird sacrifice, the noun refers to the crop/craw area
    rather than a general appearance or unrelated sense. 'Crop' is the clearest anatomical
    term in contemporary English.
- source_word: בְּנֹצָתָהּ
  chosen: with its feathers
  alternatives:
  - in/with its filth
  - with its plumage
  lexicon: HALOT
  rationale: The phrase is difficult and has been rendered variously. The consonantal
    form naturally relates to נוצה, 'feather/plumage.' Given the immediate bird context
    and the plain lexical sense, 'with its feathers' best reflects the Hebrew. The
    alternative understanding 'with its filth' likely arises from interpretive tradition
    about the crop's contents rather than the most straightforward lexical value.
- source_word: וְהִשְׁלִיךְ אֹתָהּ
  chosen: and throw it
  alternatives:
  - and cast it
  - and toss it
  lexicon: HALOT
  rationale: The Hiphil of שלך commonly means to throw/cast. 'Throw it' is idiomatic
    and suitably direct for ritual instruction.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  chosen: beside the altar
  alternatives:
  - at the side of the altar
  - near the altar
  lexicon: HALOT
  rationale: אצל indicates proximity at the side of something. 'Beside the altar'
    is concise and accurate.
- source_word: קֵדְמָה
  chosen: on the east side
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The directional adverb specifies the eastern side/location. 'On the east
    side' fits the spatial instruction in English.
- source_word: אֶל מְקוֹם הַדָּשֶׁן
  chosen: to the place of the ashes
  alternatives:
  - to the ash heap
  - to the place of fat ashes
  lexicon: HALOT
  rationale: דשן in sacrificial contexts can denote the fatty ashes from the altar.
    'The place of the ashes' is clear, readable, and contextually appropriate without
    over-specifying beyond the Hebrew.
