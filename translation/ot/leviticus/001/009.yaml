id: LEV.1.9
reference: Leviticus 1:9
source:
  edition: WLC
  text: וְ/קִרְבּ֥/וֹ וּ/כְרָעָ֖י/ו יִרְחַ֣ץ בַּ/מָּ֑יִם וְ/הִקְטִ֨יר הַ/כֹּהֵ֤ן אֶת הַ/כֹּל֙ הַ/מִּזְבֵּ֔חָ/ה עֹלָ֛ה אִשֵּׁ֥ה רֵֽיחַ נִיח֖וֹחַ לַֽ/יהוָֽה־־׃ס
translation:
  text: But he shall wash its entrails and its legs with water, and the priest shall turn all of it into smoke on the altar, a burnt offering, a food offering, a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering' for 'a food offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a pleasing aroma'; the expression is a stock sacrificial formula indicating that the offering is acceptable to the LORD.
    reason: cultural_note
  - marker: c
    text: Or 'to Yahweh.' The main text follows the project default of rendering the divine name as 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: קִרְבּוֹ
  chosen: its entrails
  alternatives:
  - its inner parts
  - its inward parts
  lexicon: HALOT
  rationale: קֶרֶב in sacrificial contexts refers to the internal organs/inner parts of the animal. 'Entrails' is concrete and natural in English, fitting the ritual washing context better than the vaguer 'inward parts.'
- source_word: כְרָעָיו
  chosen: its legs
  alternatives:
  - its shanks
  lexicon: HALOT
  rationale: The term denotes the lower limbs/legs of the animal. 'Legs' is clear modern English; 'shanks' is more technical and less accessible.
- source_word: יִרְחַץ בַּמָּיִם
  chosen: he shall wash ... with water
  alternatives:
  - he shall wash ... in water
  lexicon: HALOT
  rationale: The verb means 'wash.' English idiom prefers 'wash with water' here, while still preserving the ritual action indicated by the Hebrew preposition.
- source_word: וְהִקְטִיר
  chosen: shall turn ... into smoke
  alternatives:
  - shall burn
  - shall offer up in smoke
  lexicon: HALOT
  rationale: In sacrificial language this verb specifically refers to causing an offering to go up in smoke on the altar, not merely generic burning. 'Turn ... into smoke' preserves that cultic nuance better than simply 'burn.'
- source_word: אֶת־הַכֹּל
  chosen: all of it
  alternatives:
  - the whole of it
  - all
  lexicon: HALOT
  rationale: 'The phrase emphasizes totality: the entire animal (as prepared) is offered. ''All of it'' is idiomatic and preserves the comprehensiveness of the burnt offering.'
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard sacrificial terminology. 'On the altar' is natural modern English; 'upon' is unnecessarily archaic.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  lexicon: HALOT
  rationale: The established sacrificial term for עֹלָה is 'burnt offering.' Although the root relates to 'going up,' 'ascent offering' is less transparent to readers and not required by the context.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Though traditionally rendered 'offering by fire,' the noun is commonly understood in priestly sacrificial formulae as a food gift/offering presented by fire. 'Food offering' is readable modern English and avoids implying that fire itself is the essence of the offering rather than the means of presentation.
- source_word: רֵיחַ נִיחוֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression denotes acceptability to God, not divine olfactory need. 'A pleasing aroma' is idiomatic, accessible, and preserves the metaphor without archaic phrasing.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
