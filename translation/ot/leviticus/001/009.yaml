theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of רֵיחַ נִיחוֹחַ in sacrificial formula
  chosen_reading: a pleasing aroma
  alternative_readings:
  - a soothing aroma
  - a sweet aroma
  rationale: The phrase is retained as sacrificial metaphor for divine acceptance without importing a mechanistic or overly literal theology of God smelling the sacrifice. 'Pleasing aroma' preserves the text's imagery and theological restraint.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
