id: LEV.1.6
reference: Leviticus 1:6
source:
  edition: WLC
  text: וְ/הִפְשִׁ֖יט אֶת הָ/עֹלָ֑ה וְ/נִתַּ֥ח אֹתָ֖/הּ לִ/נְתָחֶֽי/הָ־׃
translation:
  text: Then he shall skin the burnt offering and cut it into its pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flay the burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'cut it into its pieces,' referring to dividing the animal into sections
      for the sacrifice.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִפְשִׁיט
  chosen: shall skin
  alternatives:
  - shall flay
  - shall strip the skin from
  lexicon: HALOT
  rationale: The Hifil of פשט in sacrificial context means to remove the skin/hide
    of the animal. 'Skin' is clear modern English and more readable than the traditional
    'flay,' while preserving the concrete ritual action.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering in Leviticus.
    'Burnt offering' is the established and accurate cultic rendering in English;
    'ascent offering' reflects etymology but is less idiomatic and less clear in this
    ritual context.
- source_word: וְנִתַּח
  chosen: and cut
  alternatives:
  - and divide
  - and dismember
  lexicon: HALOT
  rationale: The verb נתּח refers to cutting an animal into sections for sacrifice.
    'Cut' is natural English; the following phrase 'into its pieces' supplies the
    sense of division into sections without sounding overly technical or harsh.
- source_word: לִנְתָחֶיהָ
  chosen: into its pieces
  alternatives:
  - by its pieces
  - into its sections
  - piece by piece
  lexicon: HALOT
  rationale: 'The noun נתח means a cut piece or section. With ל here, the sense is
    distributive/resultative: the animal is cut into its constituent pieces. ''Into
    its pieces'' is idiomatic and reflects the ritual procedure.'
- source_word: וְ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed conjunction links this instruction sequentially with the
    preceding verse. 'Then' brings out the procedural sequence in readable English
    better than a bare 'And,' while remaining faithful to the discourse flow.
