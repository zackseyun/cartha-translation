id: LEV.1.1
reference: Leviticus 1:1
source:
  edition: WLC
  text: וַ/יִּקְרָ֖א אֶל מֹשֶׁ֑ה וַ/יְדַבֵּ֤ר יְהוָה֙ אֵלָ֔י/ו מֵ/אֹ֥הֶל מוֹעֵ֖ד לֵ/אמֹֽר־׃
translation:
  text: Then Yahweh called to Moses and spoke to him from the tent of meeting, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yahweh.' The Hebrew has the divine name יְהוָה.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - called out
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this context introduces divine address to Moses. 'Called' is the most natural and sufficiently formal English rendering. 'Called out' is possible but slightly over-specifies the manner; 'summoned' may imply a stronger command than the Hebrew requires.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: 'With קרא, אֶל is idiomatically rendered ''to'' in English: ''called to Moses.'' ''Toward'' is too spatially wooden for this discourse context.'
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name משה.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: דבר commonly denotes speaking, often in formal divine communication. 'Spoke' preserves the distinction from the following לֵאמֹר ('saying'), whereas 'said' would flatten the two-part Hebrew discourse formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: 'The preposition plus pronominal suffix straightforwardly refers back to Moses: ''spoke to him.'''
- source_word: מֵאֹהֶל מוֹעֵד
  chosen: from the tent of meeting
  alternatives:
  - from the meeting tent
  - from the tabernacle of meeting
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד is the standard designation for the sanctuary as the place of appointed meeting. 'Tent of meeting' is the most transparent and established rendering. 'Tabernacle of meeting' is more traditional but introduces terminology not present in the Hebrew phrase itself here.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: This infinitive construct introduces the content of the speech in standard Hebrew narrative style. 'Saying,' preserves the formal discourse marker and prepares for the quotation in the next verse.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw-consecutive advances the narrative from the end of Exodus. 'Then' communicates sequence in natural English better than a bare 'And,' while remaining faithful to the discourse flow.
