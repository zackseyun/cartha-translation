id: LEV.1.12
reference: Leviticus 1:12
source:
  edition: WLC
  text: וְ/נִתַּ֤ח אֹת/וֹ֙ לִ/נְתָחָ֔י/ו וְ/אֶת רֹאשׁ֖/וֹ וְ/אֶת פִּדְר֑/וֹ וְ/עָרַ֤ךְ
    הַ/כֹּהֵן֙ אֹתָ֔/ם עַל הָֽ/עֵצִים֙ אֲשֶׁ֣ר עַל הָ/אֵ֔שׁ אֲשֶׁ֖ר עַל הַ/מִּזְבֵּֽחַ־־־־־׃
translation:
  text: And he shall cut it into its pieces, with its head and its fat, and the priest
    shall arrange them on the wood that is on the fire, which is on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its suet' or 'the fat around its entrails' for 'its fat.' The Hebrew
      term refers to fatty tissue associated with the sacrificial animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִתַּח
  chosen: he shall cut ... into
  alternatives:
  - he shall divide
  - he shall cut up
  lexicon: HALOT
  rationale: The verb נתח in sacrificial context refers to cutting the animal into
    pieces. English 'cut ... into' is natural and preserves the procedural sense better
    than the more abstract 'divide.' The yiqtol/qatal sequence in this legal-ritual
    context is rendered with modal/future force ('shall').
- source_word: לִנְתָחָיו
  chosen: its pieces
  alternatives:
  - its piece by piece parts
  - its sections
  lexicon: HALOT
  rationale: The noun from the same root denotes the cut pieces of the animal. 'Its
    pieces' is idiomatic and sufficiently precise in sacrificial instructions.
- source_word: רֹאשׁוֹ
  chosen: its head
  lexicon: HALOT
  rationale: Straightforward anatomical term; 'its' matches the sacrificial animal.
- source_word: פִּדְרוֹ
  chosen: its fat
  alternatives:
  - its suet
  - the fat around its entrails
  lexicon: HALOT
  rationale: פדר refers to the fatty covering/fat associated with the animal in sacrificial
    preparation. 'Its fat' is clear modern English; 'suet' is more technical/archaic,
    while the fuller paraphrase is more interpretive than the Hebrew requires.
- source_word: וְעָרַךְ
  chosen: shall arrange
  alternatives:
  - shall lay in order
  - shall set in order
  lexicon: HALOT
  rationale: ערך in cultic contexts commonly means to arrange or set in order. 'Arrange'
    is readable modern English while preserving the ordered ritual action.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כהן in Levitical sacrificial legislation.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the pieces, head, and fat collectively.
- source_word: עַל הָעֵצִים
  chosen: on the wood
  alternatives:
  - on the pieces of wood
  lexicon: HALOT
  rationale: Though plural in Hebrew, English often uses collective singular 'wood'
    naturally in this context. This avoids awkwardness while preserving the material
    placed on the altar fire.
- source_word: אֲשֶׁר עַל הָאֵשׁ
  chosen: that is on the fire
  alternatives:
  - which are on the fire
  - over the fire
  lexicon: HALOT
  rationale: The relative clause modifies the wood. 'That is on the fire' follows
    the Hebrew sequence closely. Singular agreement follows the collective English
    'wood.'
- source_word: אֲשֶׁר עַל הַמִּזְבֵּחַ
  chosen: which is on the altar
  alternatives:
  - that is on the altar
  lexicon: HALOT
  rationale: A second relative clause describing the fire as being on the altar. Retaining
    both relative clauses preserves the layered spatial description of the Hebrew.
