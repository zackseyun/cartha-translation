theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of לִרְצֹנוֹ
  chosen_reading: for his acceptance
  alternative_readings:
  - for his favorable acceptance
  - of his own free will
  - for his pleasure
  rationale: The Hebrew has a well-known interpretive ambiguity. In this sacrificial
    context, the main text preserves the likely cultic sense of acceptability before
    God. Because the alternative 'of his own free will' has a long translation history,
    it is preserved in a footnote rather than silently excluded.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
