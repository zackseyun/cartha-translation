id: LEV.1.3
reference: Leviticus 1:3
source:
  edition: WLC
  text: אִם עֹלָ֤ה קָרְבָּנ/וֹ֙ מִן הַ/בָּקָ֔ר זָכָ֥ר תָּמִ֖ים יַקְרִיבֶ֑/נּוּ אֶל
    פֶּ֝תַח אֹ֤הֶל מוֹעֵד֙ יַקְרִ֣יב אֹת֔/וֹ לִ/רְצֹנ֖/וֹ לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: If his offering is a burnt offering from the herd, he shall offer a male without
    blemish. He shall offer it at the entrance of the tent of meeting, for his acceptance
    before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he may be accepted before the LORD'; traditionally, 'of his own
      free will before the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  - whole burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term in Leviticus for an offering wholly turned
    into smoke on the altar. 'Burnt offering' is the clearest established English
    equivalent without unnecessary paraphrase.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربן / offering
  lexicon: HALOT
  rationale: From קרבן, a general term for an offering brought near. 'Offering' is
    natural English and fits the sacrificial context; 'gift' is possible but too broad
    here.
- source_word: מִן הַבָּקָר
  chosen: from the herd
  alternatives:
  - from the cattle
  - from the bovines
  lexicon: HALOT
  rationale: Refers to herd animals, specifically bovine livestock. 'From the herd'
    is idiomatic modern English and avoids the less natural 'from the cattle' while
    preserving the source sense.
- source_word: זָכָר
  chosen: a male
  alternatives:
  - male
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies sex. 'A male' is the most natural English
    expression in this sacrificial instruction and preserves the gender-specific requirement.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  - whole
  lexicon: HALOT
  rationale: In sacrificial contexts תמִים denotes an animal free from defect. 'Without
    blemish' is the standard and precise cultic rendering in English.
- source_word: יַקְרִיבֶנּוּ
  chosen: he shall offer
  alternatives:
  - he shall bring near
  - he shall present
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts means to present/offer. 'Offer'
    best matches English sacrificial usage. The object suffix is represented by the
    direct object in context.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: the entrance of the tent of meeting
  alternatives:
  - the doorway of the tent of meeting
  - the entrance to the tent of meeting
  lexicon: HALOT
  rationale: A standard sanctuary expression. 'Entrance of the tent of meeting' is
    clear, natural, and close to the Hebrew construct chain.
- source_word: לִרְצֹנוֹ
  chosen: for his acceptance
  alternatives:
  - that he may be accepted
  - for his favor
  - according to his good pleasure
  lexicon: HALOT
  rationale: The phrase is syntactically difficult and has been understood either
    as the offerer's acceptance by God or as voluntariness. In Levitical sacrificial
    context, 'for his acceptance' best fits the likely sense of acceptability before
    YHWH while remaining concise. The voluntariness alternative is preserved in a
    footnote.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' The divine name יְהוָה follows
    the project's default rendering 'the LORD' per doctrine guidance.
