id: LEV.1.7
reference: Leviticus 1:7
source:
  edition: WLC
  text: וְ֠/נָתְנוּ בְּנֵ֨י אַהֲרֹ֧ן הַ/כֹּהֵ֛ן אֵ֖שׁ עַל הַ/מִּזְבֵּ֑חַ וְ/עָרְכ֥וּ
    עֵצִ֖ים עַל הָ/אֵֽשׁ־־׃
translation:
  text: And the sons of Aaron the priest shall put fire on the altar and arrange wood
    on the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Aaron's sons the priesthood family shall place fire on the altar and
      set the wood in order on the fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  chosen: shall put
  alternatives:
  - and they shall place
  - and they shall set
  lexicon: HALOT
  rationale: נתן commonly means 'give/put/set.' In this ritual instruction context,
    'put' is natural modern English and fits the concrete action of placing fire on
    the altar. 'Shall' reflects the procedural/instructional force in context.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: A formal rendering preserves the Hebrew construct expression and the
    familial/priestly identification. 'Aaron's sons' is possible, but 'the sons of
    Aaron' better matches the register of sacrificial legislation.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priestly one
  lexicon: HALOT
  rationale: 'The appositional singular after ''Aaron'' identifies him as ''the priest.''
    Retaining the singular mirrors the Hebrew: Aaron the priest, whose sons perform
    the action.'
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: The plain sense is literal fire in the sacrificial procedure.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard and natural rendering for the prepositional phrase in sacrificial
    context.
- source_word: וְעָרְכוּ
  chosen: and arrange
  alternatives:
  - and lay out
  - and set in order
  lexicon: HALOT
  rationale: ערך in ritual contexts often means to arrange or set in order. 'Arrange'
    is concise, natural, and preserves the ordered nature of the action better than
    the flatter 'lay out.'
- source_word: עֵצִים
  chosen: wood
  alternatives:
  - pieces of wood
  - logs
  lexicon: HALOT
  rationale: Though morphologically plural, English idiom normally uses the mass noun
    'wood' in this context. 'Pieces of wood' is more explicit but less natural; 'logs'
    is too specific.
- source_word: עַל הָאֵשׁ
  chosen: on the fire
  alternatives:
  - upon the fire
  lexicon: HALOT
  rationale: A straightforward rendering of the repeated prepositional phrase; repetition
    is preserved to reflect the Hebrew sequence of actions.
