id: LEV.1.8
reference: Leviticus 1:8
source:
  edition: WLC
  text: וְ/עָרְכ֗וּ בְּנֵ֤י אַהֲרֹן֙ הַ/כֹּ֣הֲנִ֔ים אֵ֚ת הַ/נְּתָחִ֔ים אֶת הָ/רֹ֖אשׁ
    וְ/אֶת הַ/פָּ֑דֶר עַל הָ/עֵצִים֙ אֲשֶׁ֣ר עַל הָ/אֵ֔שׁ אֲשֶׁ֖ר עַל הַ/מִּזְבֵּֽחַ־־־־־׃
translation:
  text: And Aaron’s sons, the priests, shall arrange the pieces, the head, and the
    fat on the wood that is on the fire that is on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the suet' or 'the fatty covering'; the Hebrew term refers to a fatty
      portion of the animal used in the offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָרְכוּ
  chosen: shall arrange
  alternatives:
  - and they shall arrange
  - shall lay in order
  lexicon: HALOT
  rationale: ערך in sacrificial contexts commonly means to arrange or lay out in order.
    'Shall arrange' preserves the procedural sense and fits the instructional style
    of Leviticus. The prefixed conjunction is carried by initial 'And.'
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: Aaron’s sons, the priests
  alternatives:
  - the sons of Aaron the priests
  - Aaron's sons the priests
  lexicon: HALOT
  rationale: This appositional phrase identifies Aaron’s sons specifically as the
    priests. The comma in English clarifies apposition without changing meaning.
- source_word: הַנְּתָחִים
  chosen: the pieces
  alternatives:
  - the parts
  - the cut pieces
  lexicon: HALOT
  rationale: נְתָחִים refers to the animal's cut-up sections from the previous butchering
    step. 'Pieces' is natural modern English and sufficiently concrete; 'parts' is
    possible but less vivid, while 'cut pieces' is more explicit than the Hebrew requires
    here.
- source_word: הָרֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: A straightforward anatomical term; no reason to depart from the plain
    sense.
- source_word: הַפָּדֶר
  chosen: the fat
  alternatives:
  - the suet
  - the fat tail
  - the fatty covering
  lexicon: HALOT
  rationale: פָּדֶר denotes the fatty portion associated with the offering, likely
    the suet or fatty covering. 'The fat' is the clearest accessible rendering in
    modern English. Because the exact anatomical nuance is somewhat debated, alternatives
    are preserved in a footnote.
- source_word: עַל הָעֵצִים
  chosen: on the wood
  alternatives:
  - upon the wood
  - on the pieces of wood
  lexicon: HALOT
  rationale: The singular collective sense of עֵצִים is well represented by 'wood.'
    This refers to the fuel arranged for the offering.
- source_word: אֲשֶׁר עַל הָאֵשׁ אֲשֶׁר עַל הַמִּזְבֵּחַ
  chosen: that is on the fire that is on the altar
  alternatives:
  - which is on the fire that is on the altar
  - on the wood over the fire on the altar
  lexicon: HALOT
  rationale: 'The Hebrew uses two relative clauses in sequence, creating a layered
    spatial description: the wood is on the fire, and the fire is on the altar. This
    somewhat repetitive structure is preserved rather than smoothed away, since it
    reflects the source text''s procedural precision.'
