id: LEV.1.4
reference: Leviticus 1:4
source:
  edition: WLC
  text: וְ/סָמַ֣ךְ יָד֔/וֹ עַ֖ל רֹ֣אשׁ הָ/עֹלָ֑ה וְ/נִרְצָ֥ה ל֖/וֹ לְ/כַפֵּ֥ר עָלָֽי/ו׃
translation:
  text: And he shall lay his hand on the head of the burnt offering, and it shall
    be accepted for him to make atonement for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he shall be accepted'—the Hebrew passive can be understood as referring
      more directly to the offerer rather than the offering.
    reason: alternative_reading
lexical_decisions:
- source_word: וְסָמַךְ
  chosen: And he shall lay
  alternatives:
  - and he shall lean
  - and he shall place
  lexicon: HALOT
  rationale: סמך in sacrificial contexts refers to placing/pressing the hand upon
    the animal. 'Lay' is idiomatic English and preserves the ritual action without
    over-specifying the force.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Straightforward possessive construction; singular is retained as in the
    Hebrew.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: A direct and natural rendering of the prepositional phrase, preserving
    the physical gesture.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascent offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'Burnt offering'
    is the established and accurate cultic equivalent in English; 'ascent offering'
    reflects etymology but is less transparent here.
- source_word: וְנִרְצָה
  chosen: and it shall be accepted
  alternatives:
  - and it shall be favorably received
  - and he shall be accepted
  lexicon: HALOT
  rationale: The Niphal of רצה here most naturally means that the offering is accepted.
    English 'it shall be accepted' preserves the passive sense and fits the sacrificial
    context.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - on his behalf
  lexicon: HALOT
  rationale: The preposition marks benefit/advantage. 'For him' is concise and leaves
    the relation broad enough to cover representative sacrificial acceptance.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  lexicon: HALOT
  rationale: כפר is a key sacrificial term. 'Make atonement' is the standard English
    rendering and preserves the cultic-theological weight without importing a narrower
    theory of atonement.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - on his behalf
  - concerning him
  lexicon: HALOT
  rationale: In sacrificial usage with כפר, על often indicates the person for whom
    atonement is made. 'For him' is idiomatic and communicates the beneficiary clearly.
