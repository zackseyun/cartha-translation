theological_decisions:
- issue: Referent of the passive verb וְנִרְצָה
  chosen_reading: the offering is accepted
  alternative_readings:
  - the offerer is accepted
  rationale: The Hebrew verb is third masculine singular and could in principle be
    understood with an impersonal/passive nuance. In context, the nearest sacrificial
    referent is the offering, and the sequence 'lay hand... it shall be accepted...
    to make atonement' naturally describes the offering's acceptability on behalf
    of the worshiper. The alternative is preserved in a footnote because some interpreters
    understand the acceptance to apply more directly to the offerer.
  doctrine_reference: Preserve theological tension rather than resolve it.
