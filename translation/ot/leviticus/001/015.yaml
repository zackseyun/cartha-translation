id: LEV.1.15
reference: Leviticus 1:15
source:
  edition: WLC
  text: וְ/הִקְרִיב֤/וֹ הַ/כֹּהֵן֙ אֶל הַ/מִּזְבֵּ֔חַ וּ/מָלַק֙ אֶת רֹאשׁ֔/וֹ וְ/הִקְטִ֖יר
    הַ/מִּזְבֵּ֑חָ/ה וְ/נִמְצָ֣ה דָמ֔/וֹ עַ֖ל קִ֥יר הַ/מִּזְבֵּֽחַ־־׃
translation:
  text: And the priest shall bring it to the altar, and pinch off its head and burn
    it on the altar, and its blood shall be drained out on the side of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wring off its head'; the Hebrew verb is a technical term for the priestly
      killing of a bird offering.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on the wall of the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיבוֹ
  chosen: shall bring it
  alternatives:
  - shall present it
  - shall offer it
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present. Here, with אֶל הַמִּזְבֵּחַ
    immediately following, 'bring it to the altar' best preserves the concrete movement
    implied by the verb while remaining natural English. 'Offer it' is possible but
    less specific because the next actions describe the offering procedure in detail.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in sacrificial legislation.
- source_word: אֶל הַמִּזְבֵּחַ
  chosen: to the altar
  alternatives:
  - near the altar
  lexicon: HALOT
  rationale: אֶל normally indicates motion toward a destination. 'To the altar' is
    the most straightforward rendering in this ritual context.
- source_word: וּמָלַק
  chosen: pinch off
  alternatives:
  - wring off
  - nip off
  lexicon: HALOT
  rationale: מלק is a technical verb used for the priestly killing of a bird by pinching/wringing
    off the head with the fingernail. 'Pinch off' is concrete and accessible modern
    English; 'wring off' is traditional but can suggest twisting rather than the specific
    priestly action.
- source_word: אֶת רֹאשׁוֹ
  chosen: its head
  lexicon: HALOT
  rationale: Direct object of מלק; the bird is in view, so 'its head' is required.
- source_word: וְהִקְטִיר
  chosen: burn it
  alternatives:
  - turn it into smoke
  - offer it up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts, קטר refers to burning an offering on the altar
    so that it goes up in smoke. 'Burn it' is the clearest main-text rendering in
    modern English; the more explicit sacrificial nuance can be noted as an alternative.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - at the altar
  lexicon: HALOT
  rationale: The directional ending here idiomatically accompanies the sacrificial
    action at/on the altar. In English, 'on the altar' best matches the ritual act
    of burning the offering there.
- source_word: וְנִמְצָה
  chosen: shall be drained out
  alternatives:
  - shall be squeezed out
  - shall be pressed out
  lexicon: HALOT
  rationale: The Niphal of מצה here refers to the blood being pressed or drained out
    from the bird onto the altar wall. 'Shall be drained out' communicates the result
    clearly in natural English while preserving the passive sense.
- source_word: דָמוֹ
  chosen: its blood
  lexicon: HALOT
  rationale: Refers to the blood of the bird offering.
- source_word: עַל קִיר הַמִּזְבֵּחַ
  chosen: on the side of the altar
  alternatives:
  - against the wall of the altar
  lexicon: HALOT
  rationale: קִיר literally means 'wall,' but for an altar in English 'side' is more
    idiomatic and communicates the intended location without implying a separate architectural
    wall. The literal alternative is worth preserving in a footnote.
