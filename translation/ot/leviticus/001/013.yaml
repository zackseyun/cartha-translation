theological_decisions:
- issue: Anthropomorphic sacrificial language in רֵיחַ נִיחֹחַ
  chosen_reading: a pleasing aroma
  alternative_readings:
  - a soothing aroma
  - a sweet aroma
  rationale: The Hebrew uses sensory language for divine acceptance of the sacrifice. The translation preserves the metaphor without over-literalizing it into a statement about divine physiology, maintaining the text's theological tension and cultic imagery.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of אִשֵּׁה
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The term is traditionally rendered 'offering by fire.' 'Food offering' is used in several modern translations to communicate the sacrificial category in readable English. Because the literal fire-related nuance is significant, the alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6
