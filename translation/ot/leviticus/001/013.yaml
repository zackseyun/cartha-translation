id: LEV.1.13
reference: Leviticus 1:13
source:
  edition: WLC
  text: וְ/הַ/קֶּ֥רֶב וְ/הַ/כְּרָעַ֖יִם יִרְחַ֣ץ בַּ/מָּ֑יִם וְ/הִקְרִ֨יב הַ/כֹּהֵ֤ן אֶת הַ/כֹּל֙ וְ/הִקְטִ֣יר הַ/מִּזְבֵּ֔חָ/ה עֹלָ֣ה ה֗וּא אִשֵּׁ֛ה רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָֽה־׃פ
translation:
  text: But he shall wash the entrails and the legs with water, and the priest shall present all of it and turn it into smoke on the altar. It is a burnt offering, a food offering, a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֶּרֶב
  chosen: the entrails
  alternatives:
  - the inner parts
  - the inward parts
  lexicon: HALOT
  rationale: In sacrificial context this refers to the internal organs/innards of the animal. 'Entrails' is concrete and natural English, while 'inner parts' is possible but less vivid.
- source_word: הַכְּרָעַיִם
  chosen: the legs
  alternatives:
  - the shanks
  - the lower legs
  lexicon: HALOT
  rationale: Refers to the legs of the sacrificial animal, especially the lower limbs. 'Legs' is the clearest modern English rendering.
- source_word: יִרְחַץ בַּמָּיִם
  chosen: shall wash ... with water
  alternatives:
  - shall rinse ... with water
  lexicon: HALOT
  rationale: The verb רחץ means to wash. 'With water' preserves the instrumental phrase explicitly present in Hebrew.
- source_word: וְהִקְרִיב
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב often means to bring near/present an offering. 'Present' fits sacrificial procedure and avoids collapsing it into the next verb, which specifically describes burning.
- source_word: אֶת־הַכֹּל
  chosen: all of it
  alternatives:
  - the whole of it
  - all
  lexicon: HALOT
  rationale: Refers to the whole prepared animal. 'All of it' is idiomatic and preserves the totality emphasized in the Hebrew.
- source_word: וְהִקְטִיר
  chosen: turn it into smoke
  alternatives:
  - burn
  - make it smoke
  lexicon: HALOT
  rationale: This sacrificial verb is more specific than generic 'burn'; it denotes causing the offering to go up in smoke on the altar. 'Turn it into smoke' preserves that cultic nuance in accessible English.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard rendering of the altar phrase; 'on' is modern English while preserving the sacrificial location.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascending offering
  lexicon: HALOT
  rationale: Traditional and accurate rendering for the specific sacrifice. Although the root suggests ascent, 'burnt offering' is the established cultic equivalent in English.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Food offering' communicates the sacrificial category in contemporary English, while avoiding archaic phrasing; the more literal alternative is preserved in a footnote.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This idiom describes the offering as acceptable/pleasing to God. 'Pleasing aroma' is idiomatic, readable, and avoids misleading sensory literalism while preserving the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following Jewish reverence tradition and common English Bible practice.
