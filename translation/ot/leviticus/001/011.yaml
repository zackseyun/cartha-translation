id: LEV.1.11
reference: Leviticus 1:11
source:
  edition: WLC
  text: וְ/שָׁחַ֨ט אֹת֜/וֹ עַ֣ל יֶ֧רֶךְ הַ/מִּזְבֵּ֛חַ צָפֹ֖נָ/ה לִ/פְנֵ֣י יְהוָ֑ה
    וְ/זָרְק֡וּ בְּנֵי֩ אַהֲרֹ֨ן הַ/כֹּהֲנִ֧ים אֶת דָּמ֛/וֹ עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־׃
translation:
  text: And he shall slaughter it on the north side of the altar before the LORD,
    and Aaron’s sons, the priests, shall throw its blood against the altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall dash its blood against the altar all around.' The Hebrew verb
      suggests a forceful casting of the blood, not a light sprinkling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  chosen: shall slaughter
  alternatives:
  - shall kill
  - shall slaughter it
  lexicon: HALOT
  rationale: שׁחט is the standard sacrificial verb for slaughtering an animal, more
    specific than generic 'kill.' 'Shall' reflects the instructional/legal register
    of the qatal in ritual procedure.
- source_word: יֶרֶךְ הַמִּזְבֵּחַ צָפֹנָה
  chosen: the north side of the altar
  alternatives:
  - the flank of the altar, northward
  - the side of the altar on the north
  lexicon: HALOT
  rationale: יֶרֶךְ literally means 'side/flank.' In altar-location language, idiomatic
    English is 'side of the altar.' צָפֹנָה indicates direction/location toward the
    north, yielding 'north side.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic expression meaning in Yahweh's presence. Per doctrine,
    יְהוָה is rendered 'the LORD.' 'Before the LORD' is both accurate and idiomatic
    in sacrificial contexts.
- source_word: וְזָרְקוּ
  chosen: shall throw
  alternatives:
  - shall sprinkle
  - shall dash
  lexicon: HALOT
  rationale: זרק commonly means 'throw/toss' and in sacrificial blood rites refers
    to casting blood against the altar. 'Sprinkle' can understate the force and overlap
    with other Hebrew verbs; 'throw' best reflects the source while remaining readable.
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: Aaron’s sons, the priests
  alternatives:
  - the priests, Aaron’s sons
  lexicon: HALOT
  rationale: The appositional structure identifies Aaron's sons as the priests. This
    preserves both lineage and office without collapsing either element.
- source_word: דָּמוֹ
  chosen: its blood
  alternatives:
  - his blood
  lexicon: HALOT
  rationale: The pronoun refers to the sacrificial animal. English normally uses 'its'
    for an animal in ritual instruction.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  chosen: against the altar all around
  alternatives:
  - on the altar all around
  - around the altar
  lexicon: HALOT
  rationale: With זרק, עַל can be rendered 'against' in English to convey blood being
    cast onto the altar's sides/surface. סָבִיב indicates around the altar on every
    side. 'Against the altar all around' best captures the ritual action.
