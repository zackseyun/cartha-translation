id: LEV.1.17
reference: Leviticus 1:17
source:
  edition: WLC
  text: וְ/שִׁסַּ֨ע אֹת֣/וֹ בִ/כְנָפָי/ו֮ לֹ֣א יַבְדִּיל֒ וְ/הִקְטִ֨יר אֹת֤/וֹ הַ/כֹּהֵן֙ הַ/מִּזְבֵּ֔חָ/ה עַל הָ/עֵצִ֖ים אֲשֶׁ֣ר עַל הָ/אֵ֑שׁ עֹלָ֣ה ה֗וּא אִשֵּׁ֛ה רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָֽה־־׃ס
translation:
  text: He shall tear it open by its wings, but he shall not divide it; and the priest shall burn it on the altar, on the wood that is on the fire. It is a burnt offering, a food offering, a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁסַּע
  chosen: tear it open
  alternatives:
  - split it
  - tear it
  lexicon: HALOT
  rationale: The verb refers to tearing or cleaving the bird's body. 'Tear it open' communicates the physical action clearly in modern English and fits the following qualification that it is not to be fully separated.
- source_word: בִכְנָפָיו
  chosen: by its wings
  alternatives:
  - through its wings
  - at its wings
  lexicon: HALOT
  rationale: The preposition with 'wings' indicates the location/instrument of the tearing. 'By its wings' is idiomatic and preserves the concrete imagery.
- source_word: לֹא יַבְדִּיל
  chosen: he shall not divide it
  alternatives:
  - he shall not separate it
  - he shall not sever it completely
  lexicon: HALOT
  rationale: The Hiphil of בדל means to separate/divide. 'Divide it' is concise and pairs naturally with the prior tearing action, indicating the bird is opened but not fully split apart.
- source_word: וְהִקְטִיר
  chosen: shall burn it
  alternatives:
  - shall turn it into smoke
  - shall offer it up in smoke
  lexicon: HALOT
  rationale: In sacrificial contexts this verb denotes burning on the altar so that the offering goes up in smoke. 'Burn it' is the clearest main-text rendering in English; the more technical nuance is implicit from the altar context.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard sacrificial terminology; 'on the altar' is natural modern English.
- source_word: עַל הָעֵצִים אֲשֶׁר עַל הָאֵשׁ
  chosen: on the wood that is on the fire
  alternatives:
  - on the wood that is over the fire
  - on the pieces of wood on the fire
  lexicon: HALOT
  rationale: The Hebrew repeats 'on' for the wood and the fire. The translation preserves the layered altar arrangement without over-paraphrasing.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  lexicon: HALOT
  rationale: '''Burnt offering'' is the established and accurate rendering for עולה in Leviticus. Although the term is etymologically related to ''going up,'' the cultic sense in English is best captured by the traditional term.'
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Food offering' is a clear contemporary rendering used in many modern translations, while still conveying sacrificial presentation to God. Because 'offering by fire' remains possible, it is preserved in a footnote.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial phrase expresses divine acceptance of the offering. 'A pleasing aroma' is idiomatic modern English and avoids archaic phrasing while preserving the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל marks relation/direction; 'to the LORD' is a straightforward rendering here.
