theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, aligning with Jewish reverence
    tradition and longstanding English Bible practice without making a sectarian theological
    claim.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Representative masculine language in אָדָם and בְּנֵי יִשְׂרָאֵל
  chosen_reading: Retain masculine forms in English ('a man,' 'sons of Israel')
  alternative_readings:
  - anyone
  - person
  - people of Israel
  - Israelites
  rationale: The doctrine specifies gender-accurate over gender-neutral renderings
    where the source uses masculine forms with representative force. Alternatives
    are preserved in footnotes where inclusivity may be contextually relevant.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
