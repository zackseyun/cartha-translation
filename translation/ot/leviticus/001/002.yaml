id: LEV.1.2
reference: Leviticus 1:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם אָדָ֗ם כִּֽי יַקְרִ֥יב
    מִ/כֶּ֛ם קָרְבָּ֖ן לַֽ/יהוָ֑ה מִן הַ/בְּהֵמָ֗ה מִן הַ/בָּקָר֙ וּ/מִן הַ/צֹּ֔אן
    תַּקְרִ֖יבוּ אֶת קָרְבַּנְ/כֶֽם־־־־־־׃
translation:
  text: 'Speak to the sons of Israel and say to them: When a man from among you brings
    an offering to the LORD, you shall bring your offering from the livestock—from
    the herd or from the flock.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'anyone' or 'a person.' The Hebrew has 'a man' (adam) used here in a
      representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Formal address formula. Rendered gender-accurately as 'sons of Israel'
    per doctrine, preserving the Hebrew idiom rather than flattening to 'people,'
    though 'Israelites' is a viable smoother alternative.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - anyone
  - a person
  - humankind
  lexicon: HALOT
  rationale: 'Here the singular introduces an individual case law scenario: ''when
    a man... brings.'' Per doctrine, gender-accurate rendering is preferred where
    the Hebrew is masculine with representative force. ''Anyone'' would be more inclusive
    in English but less formally aligned to the source.'
- source_word: יַקְרִיב
  chosen: brings
  alternatives:
  - offers
  - presents
  - draws near with
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to bring near/present
    an offering. 'Brings' keeps the concrete movement implied by the verb and works
    naturally with 'offering.'
- source_word: מִכֶּם
  chosen: from among you
  alternatives:
  - of you
  - from you
  lexicon: HALOT
  rationale: 'Attached to the conditional subject, this phrase is best taken partitively:
    an individual from the community. This avoids the less natural English sequence
    ''a man of you'' while preserving the Hebrew sense.'
- source_word: קָרְבָּן
  chosen: an offering
  alternatives:
  - a gift offering
  - a sacrifice
  - a presented offering
  lexicon: HALOT
  rationale: '''Offering'' is the broadest and most natural rendering for qorban in
    this introductory sacrificial legislation. ''Sacrifice'' is too narrow here because
    the term can cover a range of presented gifts.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the animals
  - the cattle
  lexicon: HALOT
  rationale: This is the broad category of domesticated animals suitable for sacrifice.
    'Livestock' best captures the collective category in contemporary English.
- source_word: הַבָּקָר
  chosen: the herd
  alternatives:
  - the cattle
  lexicon: HALOT
  rationale: Refers specifically to bovine animals as one subdivision under livestock.
    'Herd' is idiomatic in the stock phrase 'from the herd or from the flock.'
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the small livestock
  - the sheep and goats
  lexicon: HALOT
  rationale: Refers collectively to small domesticated animals, especially sheep and
    goats. 'Flock' is the standard concise rendering and pairs naturally with 'herd.'
- source_word: תַּקְרִיבוּ אֶת קָרְבַּנְכֶם
  chosen: you shall bring your offering
  alternatives:
  - you shall present your offering
  - you shall offer your offering
  lexicon: HALOT
  rationale: The second-person plural addresses the community after the singular case
    introduction. 'Bring your offering' preserves the verbal link with earlier יקריב
    and keeps the instruction concrete.
