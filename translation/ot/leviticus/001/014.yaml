id: LEV.1.14
reference: Leviticus 1:14
source:
  edition: WLC
  text: וְ/אִ֧ם מִן הָ/ע֛וֹף עֹלָ֥ה קָרְבָּנ֖/וֹ לַֽ/יהוָ֑ה וְ/הִקְרִ֣יב מִן הַ/תֹּרִ֗ים א֛וֹ מִן בְּנֵ֥י הַ/יּוֹנָ֖ה אֶת קָרְבָּנֽ/וֹ־־־־׃
translation:
  text: And if his offering to Yahweh is a burnt offering from the birds, then he shall present his offering from the turtledoves or from the young pigeons.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces the next case in the sacrificial instructions. 'And if' preserves the discourse flow from the preceding verses better than a bare 'If.'
- source_word: מִן הָעוֹף
  chosen: from the birds
  alternatives:
  - from the fowl
  - from birds
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures/birds in sacrificial context. 'Birds' is clear modern English; 'fowl' is more archaic and potentially misleading.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: The established sacrificial term for עֹלָה is 'burnt offering.' While the root relates to ascending, 'burnt offering' best communicates the specific cultic category in readable English.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربan/offering
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near. 'Offering' is the most natural and contextually accurate English rendering here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Following the project's default for יְהוָה, the divine name is rendered 'the LORD.' The preposition ל is naturally expressed here as 'to' with sacrificial presentation language.
- source_word: וְהִקְרִיב
  chosen: then he shall present
  alternatives:
  - and he shall bring near
  - and he shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring/present an offering. 'Present' preserves the ritual sense without awkward literalism; 'then' smooths the conditional sequence in English.
- source_word: מִן הַתֹּרִים
  chosen: from the turtledoves
  alternatives:
  - from the turtle-doves
  lexicon: HALOT
  rationale: תֹּרִים refers to turtledoves. The closed compound 'turtledoves' is standard modern spelling.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunction between the two permitted bird types.
- source_word: מִן בְּנֵי הַיּוֹנָה
  chosen: from the young pigeons
  alternatives:
  - from the sons of the dove
  - from the pigeons
  lexicon: HALOT
  rationale: The idiom 'sons of the dove' refers to young pigeons/doves. 'Young pigeons' is the idiomatic and specific English equivalent in sacrificial contexts.
- source_word: אֶת קָרְבָּנוֹ
  chosen: his offering
  lexicon: HALOT
  rationale: The direct-object marker plus repeated noun resumes and specifies what is presented. English does not require repeating a more literal structure beyond 'his offering,' which preserves the emphasis adequately.
