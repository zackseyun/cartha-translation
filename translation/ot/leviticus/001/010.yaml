theological_decisions:
- issue: Rendering of sacrificial term עֹלָה
  chosen_reading: burnt offering
  alternative_readings:
  - ascending offering
  rationale: The verse concerns Levitical sacrificial procedure. 'Burnt offering'
    communicates the established cultic category in understandable English without
    importing extra theological interpretation. The more etymological 'ascending offering'
    is possible but less natural and not required by the context.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Gender-specific requirement for the animal
  chosen_reading: a male
  alternative_readings:
  - male
  rationale: The Hebrew is explicitly masculine and refers to the sacrificial animal's
    sex, not a generic human referent. The translation preserves this specificity
    in line with the gender-accurate principle.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
