id: LEV.1.10
reference: Leviticus 1:10
source:
  edition: WLC
  text: וְ/אִם מִן הַ/צֹּ֨אן קָרְבָּנ֧/וֹ מִן הַ/כְּשָׂבִ֛ים א֥וֹ מִן הָ/עִזִּ֖ים
    לְ/עֹלָ֑ה זָכָ֥ר תָּמִ֖ים יַקְרִיבֶֽ/נּוּ־־־־׃
translation:
  text: And if his offering is from the flock, from the sheep or from the goats, for
    a burnt offering, he shall offer it, a male without blemish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: '''Without blemish'' means free from physical defect, the required condition
      for this sacrifice.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - Now if
  lexicon: HALOT
  rationale: Introduces the next conditional case in the sacrificial instructions.
    'And if' preserves the connective force of ו plus the conditional אִם without
    overinterpreting discourse contrast.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the small livestock
  - from the sheep and goats
  lexicon: HALOT
  rationale: צֹאן is the collective term for small domesticated flock animals, especially
    sheep and goats. 'Flock' is idiomatic and accurate, while the following phrases
    specify the subcategories.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربן / presentation
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering brought near/presented in worship. 'Offering'
    is the standard clear English equivalent in sacrificial contexts.
- source_word: מִן הַכְּשָׂבִים
  chosen: from the sheep
  alternatives:
  - from the lambs
  - from the rams
  lexicon: HALOT
  rationale: כְּשָׂבִים can denote sheep more specifically, often including lambs
    depending on context. Here 'sheep' best matches the category contrast with goats
    and avoids narrowing the age unnecessarily, especially since 'male without blemish'
    follows as the actual qualification.
- source_word: אוֹ מִן הָעִזִּים
  chosen: or from the goats
  alternatives:
  - or from the she-goats/goat-kind
  lexicon: HALOT
  rationale: עִזִּים is the normal plural for goats. 'Goats' is the natural collective
    rendering.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  - for an ascending offering
  lexicon: HALOT
  rationale: עֹלָה is the established sacrificial term for the whole burnt offering.
    'Burnt offering' is the clearest conventional rendering; 'ascending offering'
    is more etymological but less transparent in English.
- source_word: זָכָר
  chosen: a male
  alternatives:
  - male
  lexicon: HALOT
  rationale: The Hebrew specifies the sex of the animal. 'A male' is natural English
    and preserves the requirement.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  - whole
  lexicon: HALOT
  rationale: In sacrificial contexts תמים refers to an animal free from defect. 'Without
    blemish' is the standard and precise cultic rendering.
- source_word: יַקְרִיבֶנּוּ
  chosen: he shall offer it
  alternatives:
  - he shall present it
  - he must bring it near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts means to present/offer. 'He shall
    offer it' is clear, idiomatic, and preserves the instructional force.
