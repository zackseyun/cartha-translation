id: LEV.21.11
reference: Leviticus 21:11
source:
  edition: WLC
  text: וְ/עַ֛ל כָּל נַפְשֹׁ֥ת מֵ֖ת לֹ֣א יָבֹ֑א לְ/אָבִ֥י/ו וּ/לְ/אִמּ֖/וֹ לֹ֥א יִטַּמָּֽא־׃
translation:
  text: He shall not go near any dead body; he shall not make himself unclean even
    for his father or for his mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corpse.' Literally, 'dead person' / 'soul of the dead,' an idiom for
      a dead body in purity laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: go near
  alternatives:
  - come upon
  - approach
  lexicon: HALOT
  rationale: The preposition עַל with בוא in priestly purity contexts idiomatically
    expresses approaching/contact with a corpse rather than merely spatial movement
    'upon.' 'Go near' is natural English and preserves the prohibition's force.
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: With the negative and singular collective sense in English, 'any' best
    conveys the comprehensive prohibition.
- source_word: נַפְשֹׁת מֵת
  chosen: dead body
  alternatives:
  - corpse
  - dead person
  - soul of the dead
  lexicon: HALOT
  rationale: Literally 'souls/persons of a dead one/the dead,' but in Levitical impurity
    legislation נֶפֶשׁ in this construction refers metonymically to a human corpse.
    'Dead body' is clear modern English; 'soul of the dead' would mislead.
- source_word: לֹא יָבֹא
  chosen: shall not go near
  alternatives:
  - shall not come
  - must not approach
  lexicon: HALOT
  rationale: The imperfect in legal material is well rendered with English 'shall
    not' for prohibition. 'Go near' makes explicit the idiomatic sense with the preceding
    phrase.
- source_word: לְאָבִיו וּלְאִמּוֹ
  chosen: for his father or for his mother
  alternatives:
  - for his father and his mother
  - because of his father or his mother
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/reference: even in the case of his
    parents. English ''for'' communicates the exception being denied. ''Or'' fits
    the distributive sense in English legal style.'
- source_word: לֹא יִטַּמָּא
  chosen: he shall not make himself unclean
  alternatives:
  - he shall not defile himself
  - he shall not become unclean
  lexicon: HALOT
  rationale: The Hitpael of טמא here is reflexive. 'Make himself unclean' preserves
    ritual impurity language without importing moral defilement too strongly; 'defile
    himself' is possible but less precise for Levitical purity law.
- source_word: word order / implied emphasis
  chosen: even for his father or for his mother
  alternatives:
  - for his father or his mother
  rationale: English adds 'even' to reflect the emphatic force of naming the closest
    family members after the general prohibition, matching the sense of an exception
    explicitly denied in context.
