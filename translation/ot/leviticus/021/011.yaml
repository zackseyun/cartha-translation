theological_decisions:
- issue: Ritual impurity terminology
  chosen_reading: Retain 'unclean' language rather than moralized paraphrase.
  alternative_readings:
  - defiled
  - ceremonially unclean
  rationale: The verse concerns priestly corpse impurity in Levitical law. 'Unclean'
    preserves the biblical category without collapsing it into sinfulness; 'ceremonially'
    is interpretive and unnecessary in the main text.
  doctrine_reference: Translation philosophy §1, §6
