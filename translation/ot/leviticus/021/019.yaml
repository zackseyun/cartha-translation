id: LEV.21.19
reference: Leviticus 21:19
source:
  edition: WLC
  text: א֣וֹ אִ֔ישׁ אֲשֶׁר יִהְיֶ֥ה ב֖/וֹ שֶׁ֣בֶר רָ֑גֶל א֖וֹ שֶׁ֥בֶר יָֽד־׃
translation:
  text: or a man who has a broken foot or a broken hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man in whom there is a fracture of the foot or a fracture of the hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction continuing the list of disqualifying physical
    conditions.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - any man
  lexicon: HALOT
  rationale: The Hebrew singular masculine noun is best rendered gender-accurately
    as 'a man' in this priestly legal context, referring to an individual male priest.
- source_word: אֲשֶׁר יִהְיֶה בוֹ
  chosen: who has
  alternatives:
  - in whom there is
  - who has in him
  lexicon: HALOT
  rationale: This relative clause literally means 'who/that there is in him,' but
    idiomatic English expresses the possessed condition as 'who has' without loss
    of meaning.
- source_word: שֶׁבֶר
  chosen: broken
  alternatives:
  - fracture
  - broken bone
  lexicon: HALOT
  rationale: 'The noun denotes a fracture or break. In English, attributive ''broken''
    before the body part is natural and concise: ''broken foot'' / ''broken hand.''
    ''Fracture'' is possible but sounds more clinical than the surrounding style.'
- source_word: רָגֶל
  chosen: foot
  alternatives:
  - leg
  lexicon: HALOT
  rationale: The default sense is 'foot.' Although Hebrew can sometimes extend to
    the leg, here 'broken foot' is the most direct rendering of the lexical item.
- source_word: שֶׁבֶר יָד
  chosen: a broken hand
  alternatives:
  - a fractured hand
  - a broken arm
  lexicon: HALOT
  rationale: The repeated noun phrase is rendered consistently. 'Hand' matches יָד
    directly; while יָד can sometimes extend to the arm, there is no contextual necessity
    to broaden it here.
