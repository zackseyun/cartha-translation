theological_decisions:
- issue: Marriage terminology in priestly legislation
  chosen_reading: Retain the idiom 'take a wife' rather than paraphrasing as 'marry'
    alone.
  alternative_readings:
  - He shall marry a virgin woman
  - He shall take as wife a woman in her virginity
  rationale: The verse is legal and formulaic. Preserving the Hebrew marriage idiom
    maintains the textual texture and avoids unnecessary paraphrase, while still being
    understandable in modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
