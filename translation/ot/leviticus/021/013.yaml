id: LEV.21.13
reference: Leviticus 21:13
source:
  edition: WLC
  text: וְ/ה֕וּא אִשָּׁ֥ה בִ/בְתוּלֶ֖י/הָ יִקָּֽח׃
translation:
  text: And he shall take a wife in her virginity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a virgin.' The Hebrew literally says 'in her virginity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: And he
  alternatives:
  - And he himself
  - He
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks continuation and gives
    slight emphasis to the subject. 'And he' preserves the discourse flow and the
    explicit subject without overemphasizing it.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In marriage-taking contexts, אִשָּׁה commonly means 'wife' rather than
    the more generic 'woman.' Since the verb 'take' here refers to marriage, 'a wife'
    best reflects the idiomatic sense in English.
- source_word: בִּבְתוּלֶיהָ
  chosen: in her virginity
  alternatives:
  - as a virgin
  - from among virgins
  lexicon: HALOT
  rationale: The preposition ב plus the plural abstract/form בְּתוּלִים with 3fs suffix
    literally denotes the state of her virginity. 'In her virginity' is a relatively
    formal but clear rendering that preserves the Hebrew construction better than
    the more interpretive 'as a virgin.'
- source_word: יִקָּח
  chosen: shall take
  alternatives:
  - shall marry
  - is to take
  lexicon: HALOT
  rationale: לקח is the standard verb 'take,' often used idiomatically for taking
    a wife in marriage. 'Shall take' preserves the Hebrew wording and legal register;
    the marital sense is already clarified by rendering אִשָּׁה as 'wife'.
