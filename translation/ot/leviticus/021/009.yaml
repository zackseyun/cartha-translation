id: LEV.21.9
reference: Leviticus 21:9
source:
  edition: WLC
  text: וּ/בַת֙ אִ֣ישׁ כֹּהֵ֔ן כִּ֥י תֵחֵ֖ל לִ/זְנ֑וֹת אֶת אָבִ֨י/הָ֙ הִ֣יא מְחַלֶּ֔לֶת
    בָּ/אֵ֖שׁ תִּשָּׂרֵֽף־׃ס
translation:
  text: And the daughter of a priest, if she profanes herself by prostituting herself,
    profanes her father; she shall be burned with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if she begins to prostitute herself.' The Hebrew verb can in some contexts
      mean 'begin,' but here it is better taken in the sense of becoming profaned/profaning
      herself.
    reason: lexical_alternative
  - marker: b
    text: Or 'by playing the prostitute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת אִישׁ כֹּהֵן
  chosen: And the daughter of a priest
  alternatives:
  - And a priest's daughter
  lexicon: HALOT
  rationale: Construct chain literally denotes 'the daughter of a man, a priest,'
    idiomatically 'the daughter of a priest.' The smoother English alternative is
    possible, but the chosen wording preserves the formal legal tone.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this legal context, כִּי introduces a conditional case. 'If' best
    reflects the casuistic force without overcommitting to temporal nuance.
- source_word: תֵחֵל
  chosen: profanes herself
  alternatives:
  - begins
  - becomes profaned
  - defiles herself
  lexicon: HALOT
  rationale: From חלל in the Niphal, the sense here is not merely 'begin' but 'be
    profaned/profane oneself.' Because the following infinitive explains the manner,
    'profanes herself' captures the reflexive/resultative force in idiomatic English.
    'Begins' would reflect a different common use of החל but is contextually weak
    here.
- source_word: לִ/זְנ֑וֹת
  chosen: by prostituting herself
  alternatives:
  - by playing the prostitute
  - by committing sexual immorality
  - to prostitute herself
  lexicon: HALOT
  rationale: זנה often denotes prostitution or harlotry, whether literal or figurative.
    In this legal holiness context concerning a priest's daughter, the concrete sexual
    sense is primary. 'By prostituting herself' makes the relation to תחל explicit
    and avoids the broader, less specific 'sexual immorality.'
- source_word: אֶת אָבִיהָ
  chosen: her father
  alternatives:
  - the honor of her father
  lexicon: HALOT
  rationale: Direct-object marker plus noun/pronominal suffix yields 'her father'
    as the object of the following participle. English idiom requires the verb to
    carry the sense of dishonor/profanation rather than expanding the object.
- source_word: הִיא מְחַלֶּלֶת
  chosen: profanes
  alternatives:
  - dishonors
  - defiles
  lexicon: HALOT
  rationale: Piel participle of חלל means 'profane, desecrate.' 'Profanes' preserves
    the holiness vocabulary linking the daughter's act to the priestly sanctity of
    her father. 'Dishonors' is interpretive and weaker cultically.
- source_word: בָּ/אֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  lexicon: HALOT
  rationale: The preposition ב with אֵשׁ in penal formulas is naturally rendered 'with
    fire' in English ('burned with fire'), preserving the idiomatic judicial expression.
- source_word: תִּשָּׂרֵף
  chosen: she shall be burned
  alternatives:
  - she must be burned
  - she is to be burned
  lexicon: HALOT
  rationale: Niphal imperfect in legal material expresses prescribed penalty. 'She
    shall be burned' is the standard formal rendering for legal prescription and fits
    the solemn register.
