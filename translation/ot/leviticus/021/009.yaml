theological_decisions:
- issue: Rendering חלל vocabulary in a priestly holiness law
  chosen_reading: Use 'profane' language in both clauses
  alternative_readings:
  - Use 'dishonor' or 'defile' in one or both clauses
  rationale: The verse is embedded in priestly holiness legislation, where חלל carries
    cultic/theological weight. Preserving 'profane' maintains the connection between
    sexual misconduct and desecration of priestly holiness, without importing later
    doctrinal conclusions beyond the text.
  doctrine_reference: Translation philosophy §1, §5
