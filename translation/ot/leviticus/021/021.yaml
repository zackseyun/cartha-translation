id: LEV.21.21
reference: Leviticus 21:21
source:
  edition: WLC
  text: כָּל אִ֞ישׁ אֲשֶׁר בּ֣/וֹ מ֗וּם מִ/זֶּ֨רַע֙ אַהֲרֹ֣ן הַ/כֹּהֵ֔ן לֹ֣א יִגַּ֔שׁ לְ/הַקְרִ֖יב אֶת אִשֵּׁ֣י יְהוָ֑ה מ֣וּם בּ֔/וֹ אֵ֚ת לֶ֣חֶם אֱלֹהָ֔י/ו לֹ֥א יִגַּ֖שׁ לְ/הַקְרִֽיב־־־׃
translation:
  text: No man from the offspring of Aaron the priest who has a defect shall come near to offer the food offerings of Yahweh. A defect is in him; he shall not come near to offer the bread of his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offerings by fire of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Bread of his God'' is a priestly idiom for the food presented to God in sacrifice; alternatively, ''the food of his God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אִישׁ
  chosen: No man
  alternatives:
  - Every man
  - No one
  lexicon: HALOT
  rationale: The construction with כָּל plus the following negative clause yields a universal prohibition. 'Man' preserves the masculine singular form and priestly context, in line with the gender-accurate policy; 'No man' is idiomatic English for the legal prohibition.
- source_word: מוּם
  chosen: defect
  alternatives:
  - blemish
  - physical defect
  lexicon: HALOT
  rationale: מוּם in this priestly context denotes a disqualifying bodily impairment. 'Defect' is clear modern English and avoids the slightly archaic cultic feel of 'blemish,' while still matching the legal sense.
- source_word: מִזֶּרַע אַהֲרֹן
  chosen: from the offspring of Aaron
  alternatives:
  - from the descendants of Aaron
  - of Aaron's seed
  lexicon: HALOT
  rationale: זֶרַע refers to lineage/descendants. 'Offspring' is a natural modern rendering that preserves the genealogical sense without archaic wording.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: 'Appositional to Aaron: ''Aaron the priest.'' This is the straightforward lexical sense.'
- source_word: יִגַּשׁ
  chosen: shall come near
  alternatives:
  - shall approach
  lexicon: HALOT
  rationale: נגשׁ in sacrificial/legal contexts commonly means to approach for cultic service. 'Come near' is slightly more literal and preserves the repeated wording in the verse.
- source_word: לְהַקְרִיב
  chosen: to offer
  alternatives:
  - to present
  - to bring near
  lexicon: HALOT
  rationale: In sacrificial contexts הקריב means to present/offer an offering. 'Offer' is the clearest idiomatic English equivalent.
- source_word: אִשֵּׁי יְהוָה
  chosen: the food offerings of the LORD
  alternatives:
  - the offerings by fire of the LORD
  - the LORD's fire offerings
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally appears as 'offering by fire,' but in Leviticus it functions as a technical term for offerings presented to God, often associated with food imagery. Because the verse later parallels this with 'bread of his God,' 'food offerings' best captures the semantic link in readable English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לֶחֶם אֱלֹהָיו
  chosen: the bread of his God
  alternatives:
  - the food of his God
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread,' and in priestly sacrificial language can metonymically refer to God's food. The literal 'bread' is retained to preserve the cultic idiom and its connection to Levitical usage, while the broader sense is worth noting in a footnote.
