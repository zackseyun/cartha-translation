id: LEV.21.7
reference: Leviticus 21:7
source:
  edition: WLC
  text: אִשָּׁ֨ה זֹנָ֤ה וַ/חֲלָלָה֙ לֹ֣א יִקָּ֔חוּ וְ/אִשָּׁ֛ה גְּרוּשָׁ֥ה מֵ/אִישָׁ֖/הּ
    לֹ֣א יִקָּ֑חוּ כִּֽי קָדֹ֥שׁ ה֖וּא לֵ/אלֹהָֽי/ו־׃
translation:
  text: They shall not take a woman who is a prostitute or defiled, and they shall
    not take a woman divorced from her husband, for he is holy to his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'profaned.' The Hebrew term can denote a woman whose status has been
      profaned or defiled.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a promiscuous woman
  lexicon: HALOT
  rationale: The noun denotes a woman engaged in prostitution. 'Prostitute' is clear
    modern English and avoids archaic 'harlot.'
- source_word: חֲלָלָה
  chosen: defiled
  alternatives:
  - profaned
  - dishonored
  lexicon: HALOT
  rationale: In priestly holiness contexts, the passive/adjectival sense is of a woman
    whose status has been profaned or defiled, especially in relation to sexual/marital
    eligibility. 'Defiled' is more natural in English here while preserving ritual-moral
    force. Because the exact nuance can be rendered 'profaned,' that alternative is
    preserved in a footnote.
- source_word: יִקָּחוּ
  chosen: shall not take
  alternatives:
  - shall not marry
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'take,' commonly used for taking a wife
    in marriage. Retaining 'take' preserves the source wording while still being idiomatic
    enough in context.
- source_word: גְּרוּשָׁה מֵאִישָׁהּ
  chosen: a woman divorced from her husband
  alternatives:
  - a divorced woman
  lexicon: HALOT
  rationale: The fuller phrase explicitly states divorce from her husband; preserving
    it reflects the Hebrew more completely than the shorter 'a divorced woman.'
- source_word: קָדֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: '''Holy'' is the standard rendering in priestly legislation and preserves
    the covenantal/theological register better than the explanatory ''set apart.'''
- source_word: לֵאלֹהָיו
  chosen: to his God
  alternatives:
  - for his God
  lexicon: HALOT
  rationale: The lamed here expresses relation/dedication. 'To his God' is a natural
    rendering that conveys consecrated belonging; 'for his God' is possible but less
    idiomatic in this clause.
