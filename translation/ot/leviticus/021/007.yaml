theological_decisions:
- issue: Referent of the singular pronoun in 'for he is holy to his God'
  chosen_reading: The singular refers to the individual priest governed by the law,
    while the preceding plurals address priests collectively.
  alternative_readings:
  - The singular could be taken generically for the priesthood as a class.
  rationale: The verse addresses priests in the plural ('they shall not take') but
    grounds the command in the holiness status of each priest ('for he is holy').
    This preserves the Hebrew number shift without smoothing it away.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering priestly purity language in relation to marriage eligibility
  chosen_reading: Use 'defiled' in the main text without expanding the text into later
    interpretive categories.
  alternative_readings:
  - Use 'profaned' to emphasize cultic status
  rationale: The verse states a holiness restriction for priests; the translation
    should preserve that rationale without importing extra doctrinal or halakhic explanation
    into the main text.
  doctrine_reference: Translation philosophy §1, §3
