theological_decisions:
- issue: Cultic restriction language concerning priests with physical defects
  chosen_reading: Render the verse as a regulation about approaching to offer priestly
    food offerings, without implying diminished personal worth or broader exclusion
    from covenant standing.
  alternative_readings:
  - Use more traditional 'blemish' and 'bread of his God' phrasing
  rationale: The verse concerns eligibility for a specific priestly function in the
    sanctuary. The translation should preserve the legal-cultic restriction without
    importing claims the text itself does not make about moral guilt or human value.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
