id: LEV.21.17
reference: Leviticus 21:17
source:
  edition: WLC
  text: דַּבֵּ֥ר אֶֽל אַהֲרֹ֖ן לֵ/אמֹ֑ר אִ֣ישׁ מִֽ/זַּרְעֲ/ךָ֞ לְ/דֹרֹתָ֗/ם אֲשֶׁ֨ר
    יִהְיֶ֥ה ב/וֹ֙ מ֔וּם לֹ֣א יִקְרַ֔ב לְ/הַקְרִ֖יב לֶ֥חֶם אֱלֹהָֽי/ו־׃
translation:
  text: 'Speak to Aaron, saying: Any man from your offspring throughout their generations
    who has a defect shall not come near to offer the food of his God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blemish.' Hebrew mum refers to a physical defect that disqualifies from
      this priestly duty.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the bread of his God'; in this priestly context, 'bread' refers
      more broadly to sacrificial food offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative of דבר introducing a direct command. 'Speak' is the standard
    and sufficiently natural rendering in legal material.
- source_word: אֶל אַהֲרֹן לֵאמֹר
  chosen: to Aaron, saying
  alternatives:
  - 'to Aaron: Say'
  - to Aaron and say
  lexicon: HALOT
  rationale: Preserves the common Hebrew speech-introduction formula with readable
    English cadence.
- source_word: אִישׁ
  chosen: Any man
  alternatives:
  - Anyone
  - Any person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in priestly legislation
    refers representatively to a male descendant eligible for priestly service. Per
    doctrine, gender-accurate rendering is preferred over gender-neutral.
- source_word: מִזַּרְעֲךָ
  chosen: from your offspring
  alternatives:
  - from your descendants
  - of your seed
  lexicon: HALOT
  rationale: Addressed to Aaron; 'offspring' is natural modern English and preserves
    descent language without archaic 'seed'.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - in their generations
  lexicon: HALOT
  rationale: Expresses ongoing applicability across successive generations of Aaron's
    line.
- source_word: מוּם
  chosen: a defect
  alternatives:
  - a blemish
  - an impairment
  lexicon: HALOT
  rationale: מוּם in sacrificial/priestly contexts denotes a physical defect that
    disqualifies from cultic approach. 'Defect' is clear modern English; 'blemish'
    is traditional but can sound cosmetic in contemporary usage.
- source_word: לֹא יִקְרַב
  chosen: shall not come near
  alternatives:
  - must not approach
  - is not to come near
  lexicon: HALOT
  rationale: קרב in priestly texts often carries technical approach-to-sanctuary language.
    'Shall not come near' preserves both the legal force and the cultic idiom.
- source_word: לְהַקְרִיב
  chosen: to offer
  alternatives:
  - to present
  - to bring near as an offering
  lexicon: HALOT
  rationale: Hiphil infinitive of קרב here refers to presenting an offering. 'Offer'
    is the most idiomatic English equivalent in sacrificial context.
- source_word: לֶחֶם אֱלֹהָיו
  chosen: the food of his God
  alternatives:
  - the bread of his God
  - the offering-food of his God
  lexicon: HALOT
  rationale: Although לֶחֶם is literally 'bread,' in priestly sacrificial idiom it
    can denote food offerings more broadly. 'Food of his God' best communicates the
    cultic sense in contemporary English while remaining close to the Hebrew.
