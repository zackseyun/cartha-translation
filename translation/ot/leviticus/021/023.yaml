id: LEV.21.23
reference: Leviticus 21:23
source:
  edition: WLC
  text: אַ֣ךְ אֶל הַ/פָּרֹ֜כֶת לֹ֣א יָבֹ֗א וְ/אֶל הַ/מִּזְבֵּ֛חַ לֹ֥א יִגַּ֖שׁ כִּֽי מ֣וּם בּ֑/וֹ וְ/לֹ֤א יְחַלֵּל֙ אֶת מִקְדָּשַׁ֔/י כִּ֛י אֲנִ֥י יְהוָ֖ה מְקַדְּשָֽׁ/ם־־־־׃
translation:
  text: However, he shall not go in to the veil or come near the altar, because there is a defect in him, so that he may not profane my sanctuaries; for I am Yahweh who sanctifies them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curtain.' The Hebrew term refers to the sanctuary veil.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has a blemish in him.' The Hebrew speaks of a physical defect that disqualifies from this priestly approach, not a moral fault.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my sanctuaries' (plural); some translations smooth this to 'my sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - But
  - Only
  lexicon: HALOT
  rationale: Introduces a restriction or exception to the preceding allowance in v. 22. 'However' captures the adversative force in natural modern English better than the more ambiguous 'only.'
- source_word: הַפָּרֹכֶת
  chosen: the veil
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: Refers to the inner sanctuary curtain. 'Veil' is traditional and concise; 'curtain' is possible but slightly flatter. The cultic referent is preserved.
- source_word: יָבֹא
  chosen: go in
  alternatives:
  - enter
  - come
  lexicon: HALOT
  rationale: With אֶל and the sanctuary context, the sense is entering into the area of the veil. 'Go in' is idiomatic and clear.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial altar in priestly context.
- source_word: יִגַּשׁ
  chosen: come near
  alternatives:
  - approach
  lexicon: HALOT
  rationale: '''Come near'' is a common rendering for נגשׁ in priestly approach language and remains readable. ''Approach'' is also valid but slightly more formal.'
- source_word: מ֣וּם בּוֹ
  chosen: there is a defect in him
  alternatives:
  - he has a blemish
  - there is a blemish in him
  lexicon: HALOT
  rationale: מוּם denotes a physical defect/disqualifying blemish in this legal context. 'Defect' communicates the ritual qualification issue without importing moral fault. 'Blemish' is traditional and viable, but in contemporary English can sound cosmetic.
- source_word: יְחַלֵּל
  chosen: profane
  alternatives:
  - defile
  - desecrate
  lexicon: HALOT
  rationale: In priestly holiness language, חלל means to treat as common/profane what is holy. 'Profane' best matches the holiness contrast.
- source_word: מִקְדָּשַׁי
  chosen: my sanctuaries
  alternatives:
  - my holy places
  - my sanctuary
  lexicon: HALOT
  rationale: The Hebrew is plural with 1cs suffix. Rendering the plural explicitly preserves the form and likely refers collectively to the holy precincts/holy things rather than flattening to singular.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדְּשָׁם
  chosen: who sanctifies them
  alternatives:
  - who makes them holy
  - who consecrates them
  lexicon: HALOT
  rationale: The 3mp suffix most naturally refers back to 'my sanctuaries' (plural). 'Sanctifies' preserves the holiness terminology; 'makes them holy' is a dynamic alternative.
