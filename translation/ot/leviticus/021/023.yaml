theological_decisions:
- issue: Referent of the pronoun in מְקַדְּשָׁם
  chosen_reading: them refers to 'my sanctuaries'
  alternative_readings:
  - them refers more broadly to the priests/people
  rationale: The nearest grammatical antecedent is the plural noun 'my sanctuaries.' This also fits the immediate context of restricted access to holy space. The alternative broader referent is possible in theology, but less likely in this syntax.
- issue: Rendering of מוּם in a priestly holiness law
  chosen_reading: defect
  alternative_readings:
  - blemish
  rationale: The term concerns ritual disqualification for altar service, not moral impurity or lesser human worth. 'Defect' avoids implying sin while preserving the legal restriction in the text.
  doctrine_reference: Translation philosophy §3, §6
