id: LEV.21.1
reference: Leviticus 21:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה אֱמֹ֥ר אֶל הַ/כֹּהֲנִ֖ים בְּנֵ֣י אַהֲרֹ֑ן וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם לְ/נֶ֥פֶשׁ לֹֽא יִטַּמָּ֖א בְּ/עַמָּֽי/ו־־־׃
translation:
  text: 'And Yahweh said to Moses, “Speak to the priests, the sons of Aaron, and say to them: None shall make himself unclean for a dead person among his people,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'for a dead person'; literally 'for a נפשׁ (nephesh)' in this purity-law context, an idiom for a corpse or dead person.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall not become unclean' or 'shall not defile himself.' The Hebrew refers to ritual impurity from contact with the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱמֹר ... וְאָמַרְתָּ
  chosen: Speak ... and say
  alternatives:
  - Tell ... and say
  - Speak ... and tell
  lexicon: HALOT
  rationale: The verse uses the verb אמר twice in close succession, first as an instruction to Moses and then introducing the content to be delivered. Rendering both distinctly as 'Speak ... and say' preserves the Hebrew repetition without sounding overly wooden.
- source_word: הַכֹּהֲנִים בְּנֵי אַהֲרֹן
  chosen: the priests, the sons of Aaron
  alternatives:
  - the priests, Aaron's sons
  - the priests, descendants of Aaron
  lexicon: HALOT
  rationale: This appositional phrase identifies which priests are in view. 'The sons of Aaron' is formally closer and preserves the covenantal/familial designation, while remaining intelligible in English.
- source_word: לְנֶפֶשׁ
  chosen: for a dead person
  alternatives:
  - for the dead
  - for a corpse
  - for a person
  lexicon: HALOT
  rationale: Here נֶפֶשׁ occurs in a purity-law context where it idiomatically refers to a dead person/corpse as the source of impurity. 'Dead person' is clear modern English and avoids the potentially misleading literal 'soul' or overly clinical 'corpse' in the main text.
- source_word: יִטַּמָּא
  chosen: shall not make himself unclean
  alternatives:
  - shall not become unclean
  - shall not defile himself
  lexicon: HALOT
  rationale: The hitpael-like/reflexive sense in context concerns ritual impurity incurred by contact with the dead. 'Make himself unclean' preserves the reflexive nuance and the ritual category better than the morally freighted 'defile himself.'
- source_word: בְּעַמָּיו
  chosen: among his people
  alternatives:
  - among his kin
  - for his people
  - among his relatives
  lexicon: HALOT
  rationale: The phrase literally means 'among his people/kinsmen.' In this context it situates the dead person within the priest's own people. 'Among his people' is the most straightforward rendering; the following verses specify the closer kin exceptions.
