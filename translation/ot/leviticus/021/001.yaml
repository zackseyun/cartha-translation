theological_decisions:
- issue: Nature of uncleanness in priestly legislation
  chosen_reading: Render as ritual impurity language ('make himself unclean') rather than moral pollution language.
  alternative_readings:
  - shall not defile himself
  rationale: The context is priestly purity law concerning corpse contamination, not a direct statement of moral evil. The translation should preserve the cultic/ritual category without importing broader doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
