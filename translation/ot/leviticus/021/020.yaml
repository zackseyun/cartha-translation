id: LEV.21.20
reference: Leviticus 21:20
source:
  edition: WLC
  text: אֽוֹ גִבֵּ֣ן אוֹ דַ֔ק א֖וֹ תְּבַלֻּ֣ל בְּ/עֵינ֑/וֹ א֤וֹ גָרָב֙ א֣וֹ יַלֶּ֔פֶת
    א֖וֹ מְר֥וֹחַ אָֽשֶׁךְ־־׃
translation:
  text: or hunchbacked, or dwarfed, or with a defect in his eye, or with an itch,
    or with scabs, or with crushed testicles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crookbacked' for hunchbacked.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'dwarfed' is uncertain; it may refer more generally
      to a stunted or wasted bodily form.
    reason: lexical_alternative
  - marker: c
    text: Or 'with a spot in his eye'; the exact eye defect is uncertain.
    reason: lexical_alternative
  - marker: d
    text: The two Hebrew terms here likely refer to different skin diseases; the precise
      modern diagnoses are uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: גִבֵּן
  chosen: hunchbacked
  alternatives:
  - crookbacked
  - humpbacked
  lexicon: HALOT
  rationale: The adjective denotes a deformity of the back, likely a hunched or curved
    back. 'Hunchbacked' is clear modern English and preserves the physical sense without
    archaic wording.
- source_word: דַק
  chosen: dwarfed
  alternatives:
  - stunted
  - thin
  - emaciated
  lexicon: HALOT
  rationale: The term is difficult and traditionally rendered 'dwarf' or 'stunted.'
    In this defect list it likely refers to abnormally small or wasted bodily form.
    'Dwarfed' is concise and idiomatic, while preserving the probable sense better
    than the vaguer 'thin.'
- source_word: תְּבַלֻּל בְּעֵינוֹ
  chosen: with a defect in his eye
  alternatives:
  - with a spot in his eye
  - with a cataract in his eye
  - with an eye blemish
  lexicon: HALOT
  rationale: The noun refers to an eye abnormality, but the exact medical condition
    is uncertain. A broader rendering avoids false precision while preserving that
    this is a visible ocular defect.
- source_word: גָרָב
  chosen: with an itch
  alternatives:
  - with scab disease
  - with mange
  lexicon: HALOT
  rationale: The term denotes a skin disease or irritation. 'Itch' is traditional
    and understandable, though not medically specific; the prepositional phrase 'with
    an itch' fits the list structure in English.
- source_word: יַלֶּפֶת
  chosen: with scabs
  alternatives:
  - with eczema
  - with a rash
  - with an eruptive skin disease
  lexicon: HALOT
  rationale: This is another skin condition, distinct from גָרָב. 'Scabs' is a natural
    English rendering that preserves the distinction without overcommitting to a modern
    diagnosis.
- source_word: מְרֹחַ אָשֶׁךְ
  chosen: with crushed testicles
  alternatives:
  - with damaged testicles
  - with crushed stones
  lexicon: HALOT
  rationale: The phrase refers to injury or damage to the testicles. 'Crushed testicles'
    is anatomically explicit, faithful to the Hebrew, and avoids euphemism that would
    obscure the bodily reference.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Repeated disjunctive particle marking each item in the list; rendered
    consistently as 'or' to preserve the catalog structure.
