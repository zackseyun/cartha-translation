theological_decisions:
- issue: Rendering bodily-defect terminology in a priestly holiness law
  chosen_reading: Use direct physical-language renderings without softening or importing
    moral judgment.
  alternative_readings:
  - Use euphemistic language to reduce perceived harshness
  - Use highly technical medical terminology
  rationale: The verse lists physical conditions affecting priestly eligibility for
    altar service, not moral guilt. The translation should preserve the concrete bodily
    focus of the Hebrew while avoiding language that implies sinfulness in the condition
    itself.
