id: LEV.21.5
reference: Leviticus 21:5
source:
  edition: WLC
  text: לֹֽא יקרחה קָרְחָה֙ בְּ/רֹאשָׁ֔/ם וּ/פְאַ֥ת זְקָנָ֖/ם לֹ֣א יְגַלֵּ֑חוּ וּ/בִ֨/בְשָׂרָ֔/ם
    לֹ֥א יִשְׂרְט֖וּ שָׂרָֽטֶת־׃
translation:
  text: They shall not make a bald patch on their head, nor shave off the edge of
    their beard, nor make cuts in their flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corners of their beard.' The Hebrew term can denote an edge, side,
      or corner.
    reason: lexical_alternative
lexical_decisions:
- source_word: יקרחה ... קָרְחָה
  chosen: make a bald patch
  alternatives:
  - make baldness
  - shave a bald spot
  - make themselves bald
  lexicon: HALOT
  rationale: The verb-noun pairing intensifies the prohibition and refers to producing
    a bald area as a mourning/customary ritual act, not merely becoming bald naturally.
    'Make a bald patch' is idiomatic modern English while preserving the concrete
    action.
- source_word: בְּרֹאשָׁם
  chosen: on their head
  alternatives:
  - on their heads
  lexicon: HALOT
  rationale: Hebrew uses a singular noun with plural suffix. English can idiomatically
    render this distributively as singular ('their head') or plural ('their heads').
    Singular keeps closer to the Hebrew form while remaining natural enough.
- source_word: פְאַת זְקָנָם
  chosen: the edge of their beard
  alternatives:
  - the corners of their beard
  - the side-growth of their beard
  lexicon: HALOT
  rationale: פאה commonly denotes edge, side, or corner. 'Edge' is a clear modern
    rendering that avoids over-specifying the exact grooming pattern while preserving
    the concrete image.
- source_word: יְגַלֵּחוּ
  chosen: shave off
  alternatives:
  - shave
  - clip
  lexicon: HALOT
  rationale: The piel form here conveys the act of removing hair. 'Shave off' makes
    explicit the removal sense in natural English.
- source_word: וּבִבְשָׂרָם
  chosen: in their flesh
  alternatives:
  - on their body
  - in their skin
  lexicon: HALOT
  rationale: בשר is literally 'flesh.' 'In their flesh' preserves the physical concreteness
    of the Hebrew and matches the idiom of self-laceration.
- source_word: יִשְׂרְטוּ שָׂרָטֶת
  chosen: make cuts
  alternatives:
  - gash themselves
  - make incisions
  - cut marks
  lexicon: HALOT
  rationale: The verb-noun combination denotes cutting or gashing the body, likely
    in mourning rites. 'Make cuts' is direct, readable, and avoids sounding either
    too clinical or too paraphrastic.
