theological_decisions:
- issue: Nature of the prohibition
  chosen_reading: Render as concrete ritual/body-modification prohibitions without
    importing an explicit explanation such as 'for the dead' from parallel passages.
  alternative_readings:
  - Expand the translation to specify mourning for the dead based on Lev 19:28 or
    Deut 14:1
  rationale: This verse itself states the prohibited actions but does not include
    the explanatory phrase found elsewhere. Optimal equivalence requires translating
    what is present in this verse without importing context into the main text.
  doctrine_reference: Translation philosophy §1, §3
