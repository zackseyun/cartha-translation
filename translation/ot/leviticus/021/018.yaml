theological_decisions:
- issue: Nature of the restriction in priestly law
  chosen_reading: Render the verse as a cultic qualification for approaching the sanctuary,
    not as a statement about personal worth or moral status.
  alternative_readings:
  - A broader social exclusion could be inferred by readers
  rationale: The Hebrew focuses on physical defects in relation to 'coming near' in
    priestly service. The translation preserves that limited cultic scope and avoids
    importing claims about intrinsic dignity or sinfulness that the verse itself does
    not state.
  doctrine_reference: Translation philosophy §1 and §3
