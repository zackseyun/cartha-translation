id: LEV.21.18
reference: Leviticus 21:18
source:
  edition: WLC
  text: כִּ֥י כָל אִ֛ישׁ אֲשֶׁר בּ֥/וֹ מ֖וּם לֹ֣א יִקְרָ֑ב אִ֤ישׁ עִוֵּר֙ א֣וֹ פִסֵּ֔חַ
    א֥וֹ חָרֻ֖ם א֥וֹ שָׂרֽוּעַ־־׃
translation:
  text: 'For no man who has a defect shall come near: a blind man, or a lame man,
    or one with a disfigured face, or one with a limb too long.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''blemish'': the Hebrew term refers to a physical defect that disqualifies
      from priestly approach in this context.'
    reason: lexical_alternative
  - marker: b
    text: '''Come near'' here refers to approaching for priestly service.'
    reason: cultural_note
  - marker: c
    text: The Hebrew term rendered 'one with a disfigured face' is rare and may refer
      more specifically to a damaged or malformed nose.
    reason: lexical_alternative
  - marker: d
    text: Or 'one with an extended/deformed limb'; the Hebrew term likely denotes
      a disproportionate body part.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding restriction. 'For'
    fits the explanatory force in context.
- source_word: כָל אִישׁ
  chosen: no man
  alternatives:
  - no one
  - no person
  lexicon: HALOT
  rationale: Literally 'every man'; with the following negation it yields 'no man.'
    'Man' is retained per gender-accurate policy because the immediate context concerns
    Aaronic males serving as priests.
- source_word: אֲשֶׁר בּוֹ מוּם
  chosen: who has a defect
  alternatives:
  - in whom is a blemish
  - who has a blemish
  lexicon: HALOT
  rationale: מוּם denotes a physical defect/blemish that disqualifies for priestly
    approach in this context. 'Defect' is clear modern English; 'blemish' is possible
    but can sound too superficial in English.
- source_word: לֹא יִקְרָב
  chosen: shall come near
  alternatives:
  - shall approach
  - may not come near
  lexicon: HALOT
  rationale: קרב in priestly contexts commonly means to approach for cultic service.
    'Shall come near' preserves the formal cultic sense without over-specifying beyond
    the Hebrew.
- source_word: אִישׁ עִוֵּר
  chosen: a blind man
  alternatives:
  - a man who is blind
  lexicon: HALOT
  rationale: Straightforward adjectival description; 'blind man' is natural and concise.
- source_word: פִסֵּחַ
  chosen: a lame man
  alternatives:
  - a crippled man
  lexicon: HALOT
  rationale: '''Lame'' is the standard and less pejorative English rendering for the
    physical condition indicated.'
- source_word: חָרֻם
  chosen: one with a disfigured face
  alternatives:
  - one with a mutilated nose
  - one with a split nose
  - one who is disfigured
  lexicon: HALOT
  rationale: The term is rare and traditionally linked to facial disfigurement, especially
    of the nose or face. 'Disfigured face' communicates the likely sense without falsely
    claiming more precision than the lexeme securely allows.
- source_word: שָׂרוּעַ
  chosen: one with a limb too long
  alternatives:
  - one with an extended limb
  - one with a deformed limb
  - one misshapen
  lexicon: HALOT
  rationale: The term likely refers to an extended, overgrown, or disproportionate
    limb/body part. 'A limb too long' gives a concrete, readable rendering while reflecting
    the probable physical disproportion.
