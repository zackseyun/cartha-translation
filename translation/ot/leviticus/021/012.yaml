theological_decisions:
- issue: Meaning of נֵזֶר in relation to the high priest's status
  chosen_reading: Rendered as 'the consecration' rather than a literal 'crown.'
  alternative_readings:
  - the crown of the anointing oil of his God is upon him
  rationale: 'Although נֵזֶר can mean ''crown/diadem,'' in this context the phrase
    explains why the high priest must not leave or profane the sanctuary: he bears
    the consecrated status signified by the anointing oil. Rendering it as ''consecration''
    communicates the theological point without implying a physical crown of oil. The
    alternative is preserved in a footnote because the Hebrew term can evoke crown
    imagery elsewhere.'
