id: LEV.21.12
reference: Leviticus 21:12
source:
  edition: WLC
  text: וּ/מִן הַ/מִּקְדָּשׁ֙ לֹ֣א יֵצֵ֔א וְ/לֹ֣א יְחַלֵּ֔ל אֵ֖ת מִקְדַּ֣שׁ אֱלֹהָ֑י/ו
    כִּ֡י נֵ֠זֶר שֶׁ֣מֶן מִשְׁחַ֧ת אֱלֹהָ֛י/ו עָלָ֖י/ו אֲנִ֥י יְהוָֽה־׃
translation:
  text: And he shall not go out from the sanctuary, nor shall he profane the sanctuary
    of his God, because the consecration of the anointing oil of his God is upon him.
    I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the crown of the anointing oil of his God is upon him.'
      The Hebrew term can mean 'crown' or 'consecration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַמִּקְדָּשׁ
  chosen: from the sanctuary
  alternatives:
  - out of the holy place
  - away from the sanctuary
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'Sanctuary' is the most natural
    and contextually fitting English rendering in priestly legislation. The prefixed
    conjunction plus preposition is carried by 'And ... from.'
- source_word: לֹא יֵצֵא
  chosen: he shall not go out
  alternatives:
  - he must not leave
  - he is not to go out
  lexicon: HALOT
  rationale: יָצָא in the qal means 'go out/come out.' The imperfect in legal material
    is well represented by English 'shall not.' 'Go out' preserves the concrete force
    of the Hebrew.
- source_word: וְלֹא יְחַלֵּל
  chosen: nor shall he profane
  alternatives:
  - nor shall he defile
  - nor shall he desecrate
  lexicon: HALOT
  rationale: In priestly holiness contexts, חלל in the piel commonly means to profane
    or desecrate what is holy. 'Profane' best matches the cultic register and keeps
    the holiness contrast explicit.
- source_word: אֵת מִקְדַּשׁ אֱלֹהָיו
  chosen: the sanctuary of his God
  alternatives:
  - the holy place of his God
  lexicon: HALOT
  rationale: Construct phrase with possessive suffix is rendered straightforwardly.
    Repeating 'sanctuary' reflects the Hebrew repetition and preserves legal emphasis.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: כִּי here introduces the rationale for the prohibition. 'Because' is
    clear modern English and preserves the causal force.
- source_word: נֵזֶר
  chosen: the consecration
  alternatives:
  - the crown
  - the dedication
  - the holy sign
  lexicon: HALOT
  rationale: נֵזֶר can denote a crown/diadem or consecration. In this priestly context,
    linked with the anointing oil, it refers to the consecrated status/sign conferred
    by the oil rather than a literal crown. 'Consecration' best conveys the underlying
    idea in idiomatic English.
- source_word: שֶׁמֶן מִשְׁחַת אֱלֹהָיו
  chosen: the anointing oil of his God
  alternatives:
  - the oil of anointing of his God
  - his God's anointing oil
  lexicon: HALOT
  rationale: The construct chain is rendered naturally in English while preserving
    all elements. 'Anointing oil' is the standard and transparent equivalent for שֶׁמֶן
    מִשְׁחָה/מִשְׁחַת.
- source_word: עָלָיו
  chosen: is upon him
  alternatives:
  - rests on him
  - is on him
  lexicon: HALOT
  rationale: The prepositional phrase is retained literally because it expresses the
    continuing state of consecration marked by the oil. 'Is upon him' preserves the
    solemn register.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Following the doctrine guideline for יְהוָה, the covenant name is rendered
    'the LORD.' The full formula 'I am the LORD' preserves the recurring legal-divine
    authentication formula in Leviticus.
