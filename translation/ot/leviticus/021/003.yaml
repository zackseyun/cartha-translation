id: LEV.21.3
reference: Leviticus 21:3
source:
  edition: WLC
  text: וְ/לַ/אֲחֹת֤/וֹ הַ/בְּתוּלָה֙ הַ/קְּרוֹבָ֣ה אֵלָ֔י/ו אֲשֶׁ֥ר לֹֽא הָיְתָ֖ה
    לְ/אִ֑ישׁ לָ֖/הּ יִטַּמָּֽא־׃
translation:
  text: and for his virgin sister who is near to him, who has not belonged to a man,
    he may make himself unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who has had no husband' or 'who has not been with a man.' The Hebrew
      expression is idiomatic and refers to a sister who has not entered union with
      a man.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/אֲחֹתוֹ
  chosen: and for his sister
  alternatives:
  - and for his own sister
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition introduce another permitted
    case in the list: ''and for his sister.'' The pronominal suffix marks possession
    (''his sister''). English does not require ''own,'' though it is implicit.'
- source_word: הַבְּתוּלָה
  chosen: virgin
  alternatives:
  - unmarried maiden
  lexicon: HALOT
  rationale: בְּתוּלָה most directly denotes a virgin. 'Virgin' preserves the sexual-status
    emphasis that is important to the legal condition in this verse better than the
    broader 'maiden.'
- source_word: הַקְּרוֹבָה אֵלָיו
  chosen: who is near to him
  alternatives:
  - who is close to him
  - the one nearest to him
  lexicon: HALOT
  rationale: The phrase describes close familial proximity/relationship. 'Near to
    him' is a transparent rendering that preserves the Hebrew imagery without over-interpreting
    it as emotional closeness only.
- source_word: אֲשֶׁר לֹא הָיְתָה לְאִישׁ
  chosen: who has not belonged to a man
  alternatives:
  - who has had no husband
  - who has not been with a man
  - who has not been married to a man
  lexicon: HALOT
  rationale: Literally, 'who has not been to a man / belonged to a man.' In this legal
    context it indicates that she has not entered a man's household through marriage
    or sexual union. 'Has not belonged to a man' keeps the formal force of the Hebrew
    better than the narrower 'has had no husband,' while still sounding natural enough
    in context.
- source_word: לָהּ
  chosen: (implicit in 'belonged to a man')
  lexicon: HALOT
  rationale: The pronominal element is absorbed idiomatically into the English clause.
    A hyper-literal rendering such as 'who has not been to a man for her' would be
    unnatural.
- source_word: יִטַּמָּא
  chosen: he may make himself unclean
  alternatives:
  - he shall defile himself
  - he may defile himself
  lexicon: HALOT
  rationale: In Levitical purity law, טמא in the hitpael-like sense here refers to
    becoming ritually unclean, specifically by corpse contact in context. 'May make
    himself unclean' communicates permission within the legal list and avoids the
    moralizing connotations of 'defile himself.'
