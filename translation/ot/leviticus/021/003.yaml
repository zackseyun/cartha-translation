theological_decisions:
- issue: Nature of impurity in priestly law
  chosen_reading: rendered as ritual uncleanness, not moral corruption
  alternative_readings:
  - defile himself
  rationale: The context concerns priestly corpse impurity regulations, so the English
    should reflect ceremonial/ritual status rather than imply personal sinfulness.
    This preserves the legal-theological category present in Leviticus.
