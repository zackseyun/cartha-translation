theological_decisions:
- issue: Referent of the prohibition and holiness rationale
  chosen_reading: The verse refers to the priest not rendering his offspring profane within the covenant community, because the LORD is the one who sanctifies the priest.
  alternative_readings:
  - The verse could be understood more specifically as prohibiting the high priest from disqualifying his line from priestly status by marrying a forbidden woman.
  rationale: The immediate context concerns priestly marriage restrictions, so the offspring are in view as the result of an illicit union. The Hebrew wording itself is broader than an explicit statement about priestly office, so the translation keeps the text's wording ('profane his offspring') rather than importing an interpretive expansion into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
