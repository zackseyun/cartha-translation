id: LEV.21.15
reference: Leviticus 21:15
source:
  edition: WLC
  text: וְ/לֹֽא יְחַלֵּ֥ל זַרְע֖/וֹ בְּ/עַמָּ֑י/ו כִּ֛י אֲנִ֥י יְהוָ֖ה מְקַדְּשֽׁ/וֹ־׃פ
translation:
  text: He shall not profane his offspring among his people, for I am Yahweh who sanctifies him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defile his offspring' or 'dishonor his offspring.' The Hebrew verb carries the sense of making what should be holy into something profane.
    reason: lexical_alternative
  - marker: b
    text: That is, by violating the marriage restrictions in this context, he would bring profanation upon his line within the covenant community.
    reason: cultural_note
  - marker: c
    text: Or 'who makes him holy' or 'who consecrates him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַלֵּל
  chosen: profane
  alternatives:
  - defile
  - dishonor
  lexicon: HALOT
  rationale: Piel of חלל in priestly holiness contexts commonly means to profane or make common what is holy. 'Profane' best preserves the cultic/holiness sense here, stronger and more precise than the broader 'dishonor.'
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed, offspring, or descendants. In this immediate marriage/priestly lineage context, 'offspring' is natural modern English and preserves the genealogical sense without the awkward literalism of 'seed.'
- source_word: בְּעַמָּיו
  chosen: among his people
  alternatives:
  - among his kin
  - within his people
  lexicon: HALOT
  rationale: The preposition ב plus עַם with 3ms suffix is most naturally rendered 'among his people.' This communicates the social-covenantal setting in which the priestly line must not be profaned.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדְּשׁוֹ
  chosen: who sanctifies him
  alternatives:
  - who makes him holy
  - who consecrates him
  lexicon: HALOT
  rationale: The participle of קדשׁ denotes making holy or setting apart. 'Sanctifies' preserves the formal holiness terminology and matches the priestly context; 'consecrates' is possible but can sound more ceremonial and narrower than the broader holiness idea here.
