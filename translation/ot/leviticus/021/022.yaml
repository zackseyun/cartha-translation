id: LEV.21.22
reference: Leviticus 21:22
source:
  edition: WLC
  text: לֶ֣חֶם אֱלֹהָ֔י/ו מִ/קָּדְשֵׁ֖י הַ/קֳּדָשִׁ֑ים וּ/מִן הַ/קֳּדָשִׁ֖ים יֹאכֵֽל־׃
translation:
  text: He may eat the food of his God, from the most holy things and from the holy
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread of his God.' Here 'bread' functions idiomatically for the priestly
      food portions.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Although the noun literally means 'bread,' in sacrificial/legal contexts
    it commonly extends to food provisions more generally. Here it governs both categories
    of sacred portions, so 'food' better reflects the idiomatic sense in English without
    implying only baked bread.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The suffix is singular masculine, referring to the priest. 'His God'
    preserves the covenantal and possessive wording of the Hebrew.
- source_word: מִקָּדְשֵׁי הַקֳּדָשִׁים
  chosen: from the most holy things
  alternatives:
  - from the holy things of holy things
  - from the most holy offerings
  lexicon: HALOT
  rationale: This construct expression is the standard superlative for the highest
    grade of sancta. 'Most holy things' is a clear and established English equivalent
    that preserves the cultic distinction.
- source_word: וּמִן הַקֳּדָשִׁים
  chosen: and from the holy things
  alternatives:
  - and from the sacred things
  - and from the holy offerings
  lexicon: HALOT
  rationale: The second phrase contrasts with the previous category and refers to
    the lesser class of sacred portions. 'Holy things' preserves the lexical link
    with קדש and the legal distinction in the verse.
- source_word: יֹאכֵל
  chosen: he may eat
  alternatives:
  - he shall eat
  - he can eat
  lexicon: HALOT
  rationale: In this legal context the imperfect expresses permission rather than
    simple future. 'May eat' communicates authorized access, fitting the surrounding
    legislation about priestly restrictions.
