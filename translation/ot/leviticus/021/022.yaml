theological_decisions:
- issue: Force of the legal imperfect יֹאכֵל in priestly legislation
  chosen_reading: permission ('he may eat')
  alternative_readings:
  - simple future ('he will eat')
  - injunctive/obligatory ('he shall eat')
  rationale: The context distinguishes what a blemished priest may not do (approach/offer)
    from what he remains permitted to do (eat sacred portions). Rendering the verb
    as permission best preserves that legal contrast without overstating obligation.
  doctrine_reference: Translation philosophy §1, §3, §6
