  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cultic expression אִשֵּׁי יְהוָה לֶחֶם אֱלֹהֵיהֶם
  chosen_reading: the food offerings of Yahweh, the food of their God
  alternative_readings:
  - the offerings by fire of the LORD, the bread of their God
  - the fire offerings of the LORD, the bread of their God
  rationale: The Hebrew combines a technical sacrificial term with 'bread/food of their God.' To avoid obscuring the cultic meaning for modern readers, the main text uses 'food offerings' and 'food,' while preserving more literal alternatives in a footnote.
