id: LEV.21.6
reference: Leviticus 21:6
source:
  edition: WLC
  text: קְדֹשִׁ֤ים יִהְיוּ֙ לֵ/אלֹ֣הֵי/הֶ֔ם וְ/לֹ֣א יְחַלְּל֔וּ שֵׁ֖ם אֱלֹהֵי/הֶ֑ם כִּי֩ אֶת אִשֵּׁ֨י יְהוָ֜ה לֶ֧חֶם אֱלֹהֵי/הֶ֛ם הֵ֥ם מַקְרִיבִ֖ם וְ/הָ֥יוּ קֹֽדֶשׁ־׃
translation:
  text: They shall be holy to their God and shall not profane the name of their God, because they present the food offerings of Yahweh, the food of their God; therefore they shall be holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the offerings by fire of the LORD, the bread of their God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֹשִׁים
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: HALOT
  rationale: Adjective meaning holy/set apart. 'Holy' is the most direct and theologically weighty English equivalent, and it matches the repeated holiness language in the verse.
- source_word: יִהְיוּ
  chosen: they shall be
  alternatives:
  - they must be
  - let them be
  lexicon: HALOT
  rationale: Imperfect of היה used here in legal/instructional context. 'They shall be' preserves the prescriptive force without over-paraphrasing.
- source_word: לֵאלֹהֵיהֶם
  chosen: to their God
  alternatives:
  - for their God
  - belonging to their God
  lexicon: HALOT
  rationale: The preposition ל marks relation/direction. 'To their God' is a close rendering in English and idiomatic with 'holy'; it conveys consecration in relation to God.
- source_word: יְחַלְּלוּ
  chosen: profane
  alternatives:
  - defile
  - dishonor
  - treat as common
  lexicon: HALOT
  rationale: Piel of חלל in cultic context commonly means to profane or desecrate. 'Profane' best preserves the holiness/commonness contrast central to Leviticus.
- source_word: שֵׁם אֱלֹהֵיהֶם
  chosen: the name of their God
  alternatives:
  - their God's name
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'The name of their God' preserves the formal dignity of the expression and its covenantal significance.
- source_word: אִשֵּׁי יְהוָה
  chosen: the food offerings of the LORD
  alternatives:
  - the offerings by fire of the LORD
  - the fire offerings of the LORD
  lexicon: HALOT
  rationale: The term traditionally refers to offerings made by fire, but in context with 'food/bread of their God' the sense is sacrificial food offerings. 'Food offerings' is clear modern English while remaining close to the cultic sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֶחֶם אֱלֹהֵיהֶם
  chosen: the food of their God
  alternatives:
  - the bread of their God
  lexicon: HALOT
  rationale: Although לֶחֶם literally means 'bread,' in sacrificial contexts it can denote food more broadly. 'Food' avoids misleadingly narrowing the sense to baked bread and fits the parallel with sacrificial offerings.
- source_word: מַקְרִיבִם
  chosen: they present
  alternatives:
  - they offer
  - they bring near
  lexicon: HALOT
  rationale: Hiphil participle of קרב means to bring near/present as an offering. 'Present' is natural English and preserves the formal sacrificial action; 'offer' would also fit, but 'present' avoids repetition with 'offerings'.
- source_word: וְהָיוּ קֹדֶשׁ
  chosen: therefore they shall be holy
  alternatives:
  - and they shall be holy
  - so they shall be holy
  lexicon: HALOT
  rationale: The clause restates the required status as a consequence of their priestly role. Rendering the conjunction inferentially as 'therefore' makes the logic explicit in natural English while staying within the verse's causal flow.
