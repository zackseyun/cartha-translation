theological_decisions:
- issue: Rendering of the covenantal ethnonym בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No doctrinal dispute is at stake, but the phrase is a recurring covenantal
    designation. The chosen rendering preserves the Hebrew form and masculine plural
    morphology while remaining understandable in English. An inclusive alternative
    is preserved in a footnote because the phrase often functions corporately for
    the whole people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
