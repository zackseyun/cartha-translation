id: LEV.21.24
reference: Leviticus 21:24
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁ֔ה אֶֽל אַהֲרֹ֖ן וְ/אֶל בָּנָ֑י/ו וְ/אֶֽל כָּל בְּנֵ֖י יִשְׂרָאֵֽל־־־־׃פ
translation:
  text: So Moses spoke to Aaron and to his sons and to all the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew
      is literally 'the sons of Israel,' a standard covenantal designation for the
      people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: So Moses spoke
  alternatives:
  - And Moses spoke
  - Then Moses spoke
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative. 'Spoke' is the plain
    sense. 'So' captures the concluding, summative force here at the end of the section,
    while remaining natural English.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks the addressees of Moses' speech; 'to' is the standard
    and most direct rendering in this context.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural with 3ms suffix, referring
    to Aaron's sons, not children in general. This follows the gender-accurate principle.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all' here, encompassing the entirety of
    the following group.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'sons of Israel.' Given the translation
    philosophy's gender-accurate preference and the representative covenantal expression,
    'sons of Israel' preserves the source form more closely than 'Israelites.' 'Children
    of Israel' is traditional but less precise to the masculine plural form.
