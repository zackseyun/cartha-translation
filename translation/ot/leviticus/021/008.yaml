theological_decisions:
- issue: Cultic expression לֶחֶם אֱלֹהֶיךָ
  chosen_reading: the food of your God
  alternative_readings:
  - the bread of your God
  rationale: The verse concerns priestly sacrificial service, so the broader cultic sense of לֶחֶם is preferable. This avoids an overly narrow reading while staying close to the Hebrew idiom.
- issue: Rendering repeated קדשׁ language
  chosen_reading: holy / sanctify
  alternative_readings:
  - consecrate / consecrate
  - set apart / make holy
  rationale: 'Using ''holy'' and ''sanctify'' preserves the lexical and theological cohesion of the verse: the priest is to be regarded as holy because he handles God''s offerings, and this is grounded in the LORD''s own holiness and sanctifying action.'
