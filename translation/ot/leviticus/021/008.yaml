id: LEV.21.8
reference: Leviticus 21:8
source:
  edition: WLC
  text: וְ/קִדַּשְׁתּ֔/וֹ כִּֽי אֶת לֶ֥חֶם אֱלֹהֶ֖י/ךָ ה֣וּא מַקְרִ֑יב קָדֹשׁ֙ יִֽהְיֶה לָּ֔/ךְ כִּ֣י קָד֔וֹשׁ אֲנִ֥י יְהוָ֖ה מְקַדִּשְׁ/כֶֽם־־־׃
translation:
  text: You shall treat him as holy, because he offers the food of your God. He shall be holy to you, for I, Yahweh who sanctify you, am holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread of your God.' Here 'bread' likely refers more broadly to the food offerings presented to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתּוֹ
  chosen: You shall treat him as holy
  alternatives:
  - you shall sanctify him
  - you shall consecrate him
  lexicon: HALOT
  rationale: Piel of קדשׁ with object suffix means to set apart as holy/consecrate. In direct address to Israel regarding the priest, idiomatic English is 'treat him as holy,' which preserves the imperative force without sounding overly technical. 'Sanctify' and 'consecrate' are possible but less natural here.
- source_word: לֶחֶם אֱלֹהֶיךָ
  chosen: the food of your God
  alternatives:
  - the bread of your God
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in priestly sacrificial contexts it can denote food offerings more broadly. 'Food of your God' best fits the cultic sense in context and avoids implying only literal bread.
- source_word: מַקְרִיב
  chosen: he offers
  alternatives:
  - he brings near
  - he presents
  lexicon: HALOT
  rationale: Hiphil participle of קרב in sacrificial contexts refers to presenting/offering a sacrifice or offering. 'He offers' is the clearest natural English equivalent.
- source_word: קָדֹשׁ יִהְיֶה לָּךְ
  chosen: He shall be holy to you
  alternatives:
  - he shall be set apart to you
  - he shall be consecrated for you
  lexicon: HALOT
  rationale: This clause states the priest's status relative to the people addressed. 'Holy to you' is a fairly formal but intelligible rendering that preserves the relational לְ and the repeated holiness language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדִּשְׁכֶם
  chosen: who sanctify you
  alternatives:
  - who make you holy
  - who consecrate you
  lexicon: HALOT
  rationale: The participle of קדשׁ echoes the opening command and grounds Israel's holiness in the LORD's action. 'Sanctify' preserves the lexical connection with the holiness theme; 'make you holy' is possible but loses some formal correspondence.
