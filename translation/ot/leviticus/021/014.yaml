theological_decisions:
- issue: Rendering of priestly purity term חֲלָלָה in a marriage prohibition
  chosen_reading: a defiled woman
  alternative_readings:
  - a profaned woman
  - a desecrated woman
  rationale: The verse concerns holiness qualifications for the high priest's marriage.
    The Hebrew adjective carries the idea of profanation relative to holiness status.
    'Defiled' communicates the exclusionary purity sense more naturally in modern
    English, while alternatives are preserved because 'profaned' is closer to the
    root idea.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning in readable modern English.'
