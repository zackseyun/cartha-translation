id: LEV.21.14
reference: Leviticus 21:14
source:
  edition: WLC
  text: אַלְמָנָ֤ה וּ/גְרוּשָׁה֙ וַ/חֲלָלָ֣ה זֹנָ֔ה אֶת אֵ֖לֶּה לֹ֣א יִקָּ֑ח כִּ֛י
    אִם בְּתוּלָ֥ה מֵ/עַמָּ֖י/ו יִקַּ֥ח אִשָּֽׁה־־׃
translation:
  text: 'He shall not take these as wife: a widow, or a divorced woman, or a defiled
    woman, or a prostitute. Rather, he shall take a virgin from his own people as
    wife.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a profaned woman' or 'a desecrated woman'; the Hebrew term refers to
      a woman whose status is considered unsuitable in priestly holiness law.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנָה
  chosen: a widow
  alternatives:
  - widow
  lexicon: HALOT
  rationale: Standard lexical sense; indefinite English fits the list of prohibited
    marriage partners.
- source_word: גְרוּשָׁה
  chosen: a divorced woman
  alternatives:
  - one who has been sent away
  - a divorcee
  lexicon: HALOT
  rationale: The passive participial form denotes a woman who has been divorced. 'Divorced
    woman' is clear modern English and preserves the legal-marital sense.
- source_word: חֲלָלָה
  chosen: a defiled woman
  alternatives:
  - a profaned woman
  - a desecrated woman
  lexicon: HALOT
  rationale: In priestly holiness contexts this term refers to a woman whose status
    is profaned/defiled in a way relevant to priestly marriage restrictions. 'Defiled
    woman' is more readable than 'profaned woman' while retaining the cultic-moral
    force.
- source_word: זֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  lexicon: HALOT
  rationale: Direct lexical equivalent in contemporary English; avoids archaic 'harlot'.
- source_word: אֶת אֵלֶּה
  chosen: these
  alternatives:
  - any of these women
  - these women
  lexicon: HALOT
  rationale: Object marker plus demonstrative points to the preceding categories collectively.
    'These' is concise; 'as wife' clarifies the implied marital object in English.
- source_word: לֹא יִקָּח
  chosen: he shall not take
  alternatives:
  - he must not marry
  - he may not take
  lexicon: HALOT
  rationale: Formal enough to preserve the legal idiom of taking a wife, while the
    added phrase 'as wife' makes the marital sense explicit in English.
- source_word: כִּי אִם
  chosen: Rather
  alternatives:
  - but only
  - except that
  lexicon: HALOT
  rationale: Introduces the permitted alternative after the prohibition. 'Rather'
    reads naturally in English while preserving the contrast.
- source_word: בְּתוּלָה
  chosen: a virgin
  alternatives:
  - a maiden
  lexicon: HALOT
  rationale: The term denotes a virgin in this marriage-law context; 'maiden' is less
    precise.
- source_word: מֵעַמָּיו
  chosen: from his own people
  alternatives:
  - from among his people
  - of his people
  lexicon: HALOT
  rationale: The preposition מן plus 'his people' indicates origin from within his
    own people-group. 'His own people' makes the restriction clear and natural.
- source_word: אִשָּׁה
  chosen: as wife
  alternatives:
  - a wife
  - for a wife
  lexicon: HALOT
  rationale: English idiom prefers 'take ... as wife' after 'take'; this makes explicit
    the marital function of the noun without awkwardness.
