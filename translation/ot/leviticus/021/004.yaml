theological_decisions:
- issue: Interpretation of the difficult clause בַּעַל בְּעַמָּיו
  chosen_reading: The verse forbids a priest from defiling himself for his wife, expressed
    as 'as a husband among his people.'
  alternative_readings:
  - He shall not defile himself as a chief man among his people
  - He shall not defile himself among his people, lest he profane himself
  rationale: The Hebrew is syntactically compressed and has been interpreted in multiple
    ways. Given בַּעַל's common sense 'husband' and the surrounding context of permitted
    corpse impurity for close relatives, this reading is coherent and preserves the
    likely kinship logic of the law. Because the clause is genuinely difficult, major
    alternatives are preserved in a footnote rather than silently excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
