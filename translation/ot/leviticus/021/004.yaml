id: LEV.21.4
reference: Leviticus 21:4
source:
  edition: WLC
  text: לֹ֥א יִטַּמָּ֖א בַּ֣עַל בְּ/עַמָּ֑י/ו לְ/הֵ֖חַלּֽ/וֹ׃
translation:
  text: He shall not defile himself as a husband among his people, and so profane
    himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He shall not defile himself as a chief man among his people, and so
      profane himself'; the Hebrew clause is difficult, and some understand it more
      generally as a prohibition against defiling himself in a socially prominent
      role rather than specifically as a husband.
    reason: alternative_reading
lexical_decisions:
- source_word: יִטַּמָּא
  chosen: defile himself
  alternatives:
  - become unclean
  lexicon: HALOT
  rationale: The Hitpael/imperfect of טמא here refers to ritual impurity incurred
    through contact with the dead. 'Defile himself' is idiomatic and fits the priestly
    holiness context, while 'become unclean' is a viable more formal alternative.
- source_word: בַּעַל
  chosen: husband
  alternatives:
  - master
  - chief man
  lexicon: HALOT
  rationale: In this difficult clause, בַּעַל most naturally carries the relational
    sense 'husband,' yielding the sense that a priest is not to contract corpse impurity
    for his wife among his kin-group. Although בַּעַל can mean 'master' or denote
    a prominent person, 'husband' best fits the immediate legal context about kinship-based
    mourning exceptions.
- source_word: בְּעַמָּיו
  chosen: among his people
  alternatives:
  - among his kin
  - among his relatives
  lexicon: HALOT
  rationale: Literally 'among his people.' In context this refers to his own people/kin-group.
    The more literal rendering is retained in the main text, with kinship nuance carried
    by context.
- source_word: לְהֵחַלּוֹ
  chosen: and so profane himself
  alternatives:
  - to profane himself
  - thus make himself common
  lexicon: HALOT
  rationale: 'From חלל in the Piel/Hiphil-related infinitival construction, expressing
    result/purpose: becoming ritually defiled would profane him in relation to priestly
    holiness. ''Profane himself'' preserves the holiness terminology better than a
    flatter paraphrase.'
