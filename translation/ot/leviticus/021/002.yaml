id: LEV.21.2
reference: Leviticus 21:2
source:
  edition: WLC
  text: כִּ֚י אִם לִ/שְׁאֵר֔/וֹ הַ/קָּרֹ֖ב אֵלָ֑י/ו לְ/אִמּ֣/וֹ וּ/לְ/אָבִ֔י/ו וְ/לִ/בְנ֥/וֹ
    וּ/לְ/בִתּ֖/וֹ וּ/לְ/אָחִֽי/ו־׃
translation:
  text: 'except for his close relative who is nearest to him: for his mother, for
    his father, for his son, for his daughter, and for his brother—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שְׁאֵר literally has the sense of 'flesh' or 'kin'; thus 'close relative'
      could also be rendered 'blood relative' or 'flesh-kin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: except for
  alternatives:
  - but if
  - except
  lexicon: HALOT
  rationale: In this legal context the collocation introduces an exception to the
    prohibition in the previous verse, so 'except for' best conveys the restrictive
    force in natural English.
- source_word: שְׁאֵרוֹ
  chosen: his close relative
  alternatives:
  - his flesh-kin
  - his blood relative
  - his nearest kin
  lexicon: HALOT
  rationale: שְׁאֵר can denote kinship relation, literally 'flesh.' 'Close relative'
    communicates the familial sense clearly in modern English without over-literal
    awkwardness.
- source_word: הַקָּרֹב אֵלָיו
  chosen: who is nearest to him
  alternatives:
  - who is close to him
  - who is related to him
  lexicon: HALOT
  rationale: The phrase qualifies שְׁאֵר with proximity of kinship. 'Nearest to him'
    preserves the superlative-like force of close familial relation better than the
    flatter 'close to him.'
- source_word: לְאִמּוֹ
  chosen: for his mother
  alternatives:
  - for his mother’s sake
  lexicon: HALOT
  rationale: The prefixed ל marks the person on whose account defilement is permitted
    in the broader sentence. 'For his mother' is idiomatic and sufficiently precise.
- source_word: וּלְאָבִיו
  chosen: for his father
  alternatives:
  - and for his father
  lexicon: HALOT
  rationale: Repeated 'for' in English mirrors the Hebrew list structure and keeps
    the legal enumeration clear.
- source_word: וְלִבְנוֹ
  chosen: for his son
  lexicon: HALOT
  rationale: Straightforward filial term; singular retained to match Hebrew legal
    style.
- source_word: וּלְבִתּוֹ
  chosen: for his daughter
  lexicon: HALOT
  rationale: Straightforward filial term; singular retained to match Hebrew legal
    style.
- source_word: וּלְאָחִיו
  chosen: and for his brother
  lexicon: HALOT
  rationale: אָח here refers to a male sibling in a literal kinship list, so 'brother'
    is the gender-accurate rendering required by context.
