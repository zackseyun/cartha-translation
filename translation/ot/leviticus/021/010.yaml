id: LEV.21.10
reference: Leviticus 21:10
source:
  edition: WLC
  text: וְ/הַ/כֹּהֵן֩ הַ/גָּד֨וֹל מֵ/אֶחָ֜י/ו אֲֽשֶׁר יוּצַ֥ק עַל רֹאשׁ֣/וֹ שֶׁ֤מֶן
    הַ/מִּשְׁחָה֙ וּ/מִלֵּ֣א אֶת יָד֔/וֹ לִ/לְבֹּ֖שׁ אֶת הַ/בְּגָדִ֑ים אֶת רֹאשׁ/וֹ֙
    לֹ֣א יִפְרָ֔ע וּ/בְגָדָ֖י/ו לֹ֥א יִפְרֹֽם־־׀־־־׃
translation:
  text: And the high priest, who is greater than his brothers, on whose head the anointing
    oil has been poured and whose hand has been filled to wear the garments, shall
    not let his head hang loose, nor shall he tear his garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'whose hand has been filled,' an idiom for being ordained or installed
      into priestly service.
    reason: lexical_alternative
  - marker: b
    text: That is, he must not adopt customary mourning signs such as leaving his
      hair/head unkempt or tearing his garments.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: Established and contextually precise rendering of the superlative priestly
    office; 'high priest' is idiomatic English for כֹּהֵן גָּדוֹל.
- source_word: מֵאֶחָיו
  chosen: who is greater than his brothers
  alternatives:
  - from among his brothers
  - above his brothers
  lexicon: HALOT
  rationale: The preposition מִן with 'brothers' marks comparison here, not merely
    source. 'Greater than his brothers' reflects his elevated status over fellow priests.
    'Brothers' is retained per gender-accurate policy and because the reference is
    specifically to male priestly kin.
- source_word: יוּצַק עַל רֹאשׁוֹ שֶׁמֶן הַמִּשְׁחָה
  chosen: on whose head the anointing oil has been poured
  alternatives:
  - upon whose head the oil of anointing was poured
  - who has been anointed with the anointing oil on his head
  lexicon: HALOT
  rationale: Keeps the passive verbal idea of pouring and preserves the concrete ritual
    imagery. 'Anointing oil' is natural English for שֶׁמֶן הַמִּשְׁחָה.
- source_word: וּמִלֵּא אֶת יָדוֹ
  chosen: whose hand has been filled
  alternatives:
  - who has been ordained
  - who has been installed
  lexicon: HALOT
  rationale: Literally 'fill the hand' is an ordination idiom. The main text preserves
    the Hebrew expression for auditability, while the idiomatic sense is important
    enough to preserve in a footnote.
- source_word: לִלְבֹּשׁ אֶת הַבְּגָדִים
  chosen: to wear the garments
  alternatives:
  - to put on the garments
  - to wear the priestly garments
  lexicon: HALOT
  rationale: Straightforward infinitive construction. 'The garments' is retained rather
    than adding 'priestly,' since the context already identifies the office and garments.
- source_word: אֶת רֹאשׁוֹ לֹא יִפְרָע
  chosen: shall not let his head hang loose
  alternatives:
  - shall not uncover his head
  - shall not leave his hair unkempt
  - shall not dishevel his hair
  lexicon: HALOT
  rationale: The verb refers to loosening or leaving unkempt the hair/head in mourning.
    'Let his head hang loose' preserves the idiomatic force without over-specifying
    hair where Hebrew says 'head,' though the sense concerns mourning dishevelment.
- source_word: וּבְגָדָיו לֹא יִפְרֹם
  chosen: nor shall he tear his garments
  alternatives:
  - nor shall he rend his clothes
  lexicon: HALOT
  rationale: Standard mourning gesture; 'tear his garments' is clear modern English
    and preserves the ritual significance.
