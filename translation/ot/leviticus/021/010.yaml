theological_decisions:
- issue: Rendering the ordination idiom מִלֵּא אֶת יָדוֹ
  chosen_reading: Preserve the literal idiom in the main text as 'whose hand has been
    filled,' with the ordination sense noted in a footnote.
  alternative_readings:
  - who has been ordained
  - who has been consecrated
  rationale: Optimal equivalence here favors retaining the Hebrew cultic idiom because
    it is theologically and ritually significant, while a footnote can clarify the
    idiomatic meaning for readers.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering מֵאֶחָיו with masculine 'brothers'
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - fellow priests
  rationale: The priestly context is specifically male and familial/corporate. Per
    gender-accurate policy, masculine language is retained rather than neutralized.
  doctrine_reference: Translation philosophy §4
