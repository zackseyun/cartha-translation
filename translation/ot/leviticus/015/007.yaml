theological_decisions:
- issue: Nature of impurity language
  chosen_reading: Render טָמֵא as ritual 'unclean' without importing moral guilt language.
  alternative_readings:
  - defiled
  - impure
  rationale: In Leviticus 15 the concern is ceremonial impurity within Israel's purity
    system. 'Unclean' is the established and accurate rendering, while avoiding the
    implication that mere contact is itself sinful in a moral sense.
  doctrine_reference: Translation philosophy §1, §3, §6
