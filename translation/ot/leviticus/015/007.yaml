id: LEV.15.7
reference: Leviticus 15:7
source:
  edition: WLC
  text: וְ/הַ/נֹּגֵ֖עַ בִּ/בְשַׂ֣ר הַ/זָּ֑ב יְכַבֵּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם
    וְ/טָמֵ֥א עַד הָ/עָֽרֶב־׃
translation:
  text: Whoever touches the flesh of the man with the discharge shall wash his clothes
    and bathe in water, and he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the body of the man with the discharge.' The Hebrew literally says 'the
      flesh of the one with the discharge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנֹּגֵעַ
  chosen: Whoever touches
  alternatives:
  - And the one who touches
  - Anyone who touches
  lexicon: HALOT
  rationale: 'The participial form with article functions substantivally and generically:
    ''the one who touches.'' ''Whoever touches'' gives natural English while preserving
    the general legal force.'
- source_word: בִּבְשַׂר
  chosen: the flesh of
  alternatives:
  - the body of
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In purity legislation it can refer concretely
    to the physical body. 'Flesh' preserves the Hebrew wording more closely; 'body'
    is a possible smoother alternative but is not necessary here.
- source_word: הַזָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the man having a discharge
  lexicon: HALOT
  rationale: The participle from זוּב denotes a person experiencing an abnormal bodily
    discharge in this context. Rendering it as 'the man with the discharge' makes
    the referent explicit and readable in English, matching the masculine singular
    form and the surrounding legislation.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  lexicon: HALOT
  rationale: כִּבֵּס commonly refers to washing garments. 'Clothes' is more natural
    modern English than 'garments' while preserving the legal requirement. 'Shall'
    fits the prescriptive legal style.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash himself in water
  - and bathe with water
  lexicon: HALOT
  rationale: רָחַץ in this context refers to bodily washing. English idiom favors
    'bathe in water.' The reflexive sense is implicit in English and need not be supplied
    with 'himself.'
- source_word: וְטָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and be unclean
  lexicon: HALOT
  rationale: טָמֵא here denotes ritual impurity, not moral evil. 'Unclean' is the
    standard concise rendering in Levitical purity laws. Retaining 'he shall be' mirrors
    the legal register and the masculine singular reference.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The phrase marks the duration of impurity through the day. 'Until the
    evening' is slightly more formal and matches the Hebrew article.
