id: LEV.15.20
reference: Leviticus 15:20
source:
  edition: WLC
  text: וְ/כֹל֩ אֲשֶׁ֨ר תִּשְׁכַּ֥ב עָלָ֛י/ו בְּ/נִדָּתָ֖/הּ יִטְמָ֑א וְ/כֹ֛ל אֲשֶׁר
    תֵּשֵׁ֥ב עָלָ֖י/ו יִטְמָֽא־׃
translation:
  text: And everything on which she lies during her menstrual impurity shall be unclean,
    and everything on which she sits shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'during her menstruation.' The Hebrew term includes the idea of ritual
      impurity associated with menstruation, not merely the physical cycle.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדָּה
  chosen: menstrual impurity
  alternatives:
  - menstruation
  - monthly period
  - impurity
  lexicon: HALOT
  rationale: In Leviticus 15 the term refers specifically to the state of ritual uncleanness
    associated with menstruation, not merely the biological event. 'Menstrual impurity'
    preserves both the menstrual context and the purity-law sense better than simply
    'menstruation' or the vaguer 'impurity'.
- source_word: תִּשְׁכַּב
  chosen: lies
  alternatives:
  - lays down
  - sleeps
  lexicon: HALOT
  rationale: The verb שׁכב commonly means 'lie down/lie.' Here it describes reclining
    on an object, not necessarily sleeping. 'Lies' is natural English and fits the
    legal context.
- source_word: תֵּשֵׁב
  chosen: sits
  alternatives:
  - sits down
  - remains seated
  lexicon: HALOT
  rationale: The verb ישׁב here straightforwardly denotes sitting on an object. 'Sits'
    is the most direct and idiomatic rendering.
- source_word: עָלָיו
  chosen: on which
  alternatives:
  - upon it
  - on it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers to the object beneath her.
    'On which' yields smooth English in a relative clause while preserving the spatial
    sense.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: The verb טמא in this legal context denotes entering or being in a ritually
    unclean state. 'Shall be unclean' matches the prescriptive tone of the purity
    laws and standard legal English.
- source_word: וְכֹל אֲשֶׁר
  chosen: everything on which
  alternatives:
  - every thing that
  - whatever
  lexicon: HALOT
  rationale: This construction introduces a comprehensive relative clause. 'Everything
    on which' is idiomatic and preserves the distributive force of the Hebrew.
