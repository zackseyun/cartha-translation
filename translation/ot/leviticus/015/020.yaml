theological_decisions:
- issue: Nature of uncleanness in Levitical purity law
  chosen_reading: Render טמא/נִדָּה in ritual-purity terms without importing moral
    guilt
  alternative_readings:
  - Translate in a way that could imply moral defilement or sinfulness
  rationale: The verse concerns ceremonial/ritual uncleanness within Israel's purity
    system. The English should preserve that category and avoid suggesting that menstruation
    is itself a moral offense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without importing doctrinal claims the text does not make.'
