theological_decisions:
- issue: Nature of uncleanness in Levitical purity law
  chosen_reading: Render טָמֵא as 'unclean' in its ritual sense without importing
    moral guilt.
  alternative_readings:
  - defiled
  - impure
  rationale: In Leviticus 15 the category is ceremonial/ritual impurity, not necessarily
    personal sinfulness. 'Unclean' is the standard and clearest English equivalent
    that preserves this distinction without interpretive expansion.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
