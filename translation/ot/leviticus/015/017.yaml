id: LEV.15.17
reference: Leviticus 15:17
source:
  edition: WLC
  text: וְ/כָל בֶּ֣גֶד וְ/כָל ע֔וֹר אֲשֶׁר יִהְיֶ֥ה עָלָ֖י/ו שִׁכְבַת זָ֑רַע וְ/כֻבַּ֥ס
    בַּ/מַּ֖יִם וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־־־־׃פ
translation:
  text: And every garment and every skin on which there is an emission of semen shall
    be washed with water and be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a seminal emission.'
    reason: lexical_alternative
  - marker: b
    text: '''Skin'' likely refers to an item made from animal hide; ''leather'' is
      a possible contextual rendering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּגֶד
  chosen: garment
  alternatives:
  - clothing
  - cloth
  lexicon: HALOT
  rationale: A broad term for an article of clothing. 'Garment' is natural modern
    English and preserves the concrete singular form.
- source_word: עוֹר
  chosen: skin
  alternatives:
  - hide
  - leather
  lexicon: HALOT
  rationale: The term denotes skin/hide, likely an animal skin item in this purity
    context. 'Skin' is the most direct rendering; 'leather' is interpretive and 'hide'
    is less natural in running English.
- source_word: אֲשֶׁר יִהְיֶה עָלָיו
  chosen: on which there is
  alternatives:
  - upon which is
  - that has on it
  lexicon: HALOT
  rationale: This clause literally means 'which there shall be on it.' 'On which there
    is' preserves the locative sense while reading smoothly in English.
- source_word: שִׁכְבַת זָרַע
  chosen: an emission of semen
  alternatives:
  - semen
  - seed
  - seminal emission
  lexicon: HALOT
  rationale: This idiom refers to emitted semen, not merely 'seed' in an abstract
    sense. 'An emission of semen' is explicit, accurate, and fits the ritual-purity
    context better than the more technical 'seminal emission' or the overly literal
    'seed.'
- source_word: וְכֻבַּס
  chosen: shall be washed
  alternatives:
  - must be washed
  - shall be laundered
  lexicon: HALOT
  rationale: Passive perfect/consecutive in legal instruction is well represented
    by English 'shall be washed.' 'Must be washed' is possible but slightly more interpretive;
    'laundered' is too specific.
- source_word: בַּמַּיִם
  chosen: with water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: English idiom prefers 'washed with water,' though 'in water' is possible.
    The preposition marks the means/instrument in natural English usage here.
- source_word: וְטָמֵא
  chosen: and be unclean
  alternatives:
  - and shall be unclean
  lexicon: HALOT
  rationale: This continues the legal consequence after washing. 'Be unclean' is concise
    and preserves the ritual category without paraphrase.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. 'Until the evening' is slightly
    more formal and reflects the source closely while remaining natural.
