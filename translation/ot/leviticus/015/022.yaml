theological_decisions:
- issue: Nature of impurity in Leviticus purity law
  chosen_reading: Render טָמֵא as ritual 'unclean' without importing moral guilt language.
  alternative_readings:
  - defiled
  - impure
  rationale: The verse concerns ceremonial impurity resulting from contact, not a
    statement of personal sinfulness. 'Unclean' preserves the cultic category familiar
    in Leviticus while avoiding interpretive expansion.
  doctrine_reference: Translation philosophy §1, §3
