id: LEV.15.22
reference: Leviticus 15:22
source:
  edition: WLC
  text: וְ/כָל הַ/נֹּגֵ֔עַ בְּ/כָל כְּלִ֖י אֲשֶׁר תֵּשֵׁ֣ב עָלָ֑י/ו יְכַבֵּ֧ס בְּגָדָ֛י/ו
    וְ/רָחַ֥ץ בַּ/מַּ֖יִם וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־־־׃
translation:
  text: And everyone who touches any object on which she sits shall wash his clothes
    and bathe in water, and he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any vessel' or 'any article.' The Hebrew כְּלִי is a broad term for
      an item or utensil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: And everyone
  alternatives:
  - And whoever
  - And anyone
  lexicon: HALOT
  rationale: כָל with the conjunction introduces a comprehensive class. 'Everyone'
    is natural modern English and preserves the universal scope better than a more
    wooden 'all who.'
- source_word: הַנֹּגֵעַ
  chosen: who touches
  alternatives:
  - whoever touches
  - the one touching
  lexicon: HALOT
  rationale: The participle functions substantivally for a generic person. 'Who touches'
    gives clear English while preserving the ongoing/generic force.
- source_word: בְּכָל כְּלִי
  chosen: any object
  alternatives:
  - any vessel
  - any article
  - any item
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article, utensil, vessel, or object. In
    this context of things sat upon, 'object' is broad and idiomatic, avoiding the
    overly narrow 'vessel.'
- source_word: אֲשֶׁר תֵּשֵׁב עָלָיו
  chosen: on which she sits
  alternatives:
  - that she sits on
  - upon which she sits
  lexicon: HALOT
  rationale: The clause modifies כְּלִי and refers back to the woman in the preceding
    context. 'On which she sits' is clear, natural, and sufficiently formal.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  lexicon: HALOT
  rationale: כִּבֵּס with בגדים refers to laundering garments, not merely rinsing.
    'Clothes' is more readable modern English than 'garments,' while 'shall' preserves
    the legal/instructional force.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash in water
  - and bathe himself in water
  lexicon: HALOT
  rationale: רָחַץ in purity legislation commonly refers to washing the body. 'Bathe
    in water' communicates bodily washing more clearly than the generic 'wash in water.'
- source_word: וְטָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and he will be unclean
  lexicon: HALOT
  rationale: טָמֵא here denotes ritual impurity, not moral defilement. 'Shall be unclean'
    is the standard concise rendering in legal material.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The phrase marks the duration of ritual impurity. 'Until the evening'
    is slightly more formal and matches the Hebrew article.
