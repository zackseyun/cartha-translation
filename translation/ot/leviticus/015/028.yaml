theological_decisions:
- issue: Ritual purity terminology
  chosen_reading: Render טהר/טמאה language with 'clean/cleansed' in a ritual sense,
    not as moral purity or sinfulness.
  alternative_readings:
  - pure/purified
  rationale: Leviticus 15 concerns ceremonial status associated with bodily discharges,
    not moral guilt. 'Clean/cleansed' preserves the cultic category in accessible
    English without importing ethical condemnation.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
