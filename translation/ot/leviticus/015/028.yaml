id: LEV.15.28
reference: Leviticus 15:28
source:
  edition: WLC
  text: וְ/אִֽם טָהֲרָ֖ה מִ/זּוֹבָ֑/הּ וְ/סָ֥פְרָה לָּ֛/הּ שִׁבְעַ֥ת יָמִ֖ים וְ/אַחַ֥ר
    תִּטְהָֽר־׃
translation:
  text: But if she is cleansed from her discharge, then she shall count seven days
    for herself, and after that she shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she becomes clean from her discharge ... after that she shall be purified.'
      The Hebrew uses the same root for both clauses, first for the cessation of the
      discharge and then for the resulting ritual status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding case. 'But if' captures
    the adversative/continuative force in readable English better than a bare 'if,'
    while remaining close to the Hebrew conjunction plus conditional particle.
- source_word: טָהֲרָה
  chosen: she is cleansed
  alternatives:
  - she becomes clean
  - she is clean
  - she is purified
  lexicon: HALOT
  rationale: From טהר in the qal/perfect, here describing the woman's transition out
    of the state caused by the discharge. 'Is cleansed' fits the ritual context and
    avoids implying merely subjective cleanliness. Passive English is natural though
    the Hebrew form is active/intransitive.
- source_word: מִזּוֹבָהּ
  chosen: from her discharge
  alternatives:
  - from her flow
  - from her bodily discharge
  lexicon: HALOT
  rationale: זוֹב refers to an abnormal bodily discharge in this purity legislation.
    'Discharge' is the clearest modern English term and matches the ritual-legal context
    better than the vaguer 'flow.' The preposition מִן is rendered 'from' to mark
    separation from the condition.
- source_word: וְסָפְרָה לָּהּ
  chosen: then she shall count seven days for herself
  alternatives:
  - and she shall count for herself seven days
  - she must count seven days
  lexicon: HALOT
  rationale: The waw-consecutive advances the procedure. 'Shall count' preserves the
    legal/instructional force. לָהּ is retained as 'for herself,' reflecting the dative
    pronoun rather than omitting it, since it is part of the Hebrew wording and indicates
    the counting pertains to her own purification period.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward numeral plus noun construction; standard English order
    is used.
- source_word: וְאַחַר
  chosen: and after that
  alternatives:
  - afterward
  - and afterward
  - after that
  lexicon: HALOT
  rationale: Marks the next stage after the seven-day count. 'After that' is explicit
    and natural in procedural English.
- source_word: תִּטְהָר
  chosen: she shall be clean
  alternatives:
  - she shall be cleansed
  - she will be clean
  - she shall become clean
  lexicon: HALOT
  rationale: 'Again from טהר, but here the result of the completed waiting period
    is in view. ''She shall be clean'' expresses the attained ritual status succinctly.
    Using ''clean'' here creates a useful distinction from the earlier ''is cleansed
    from her discharge'': first the discharge ceases, then after seven days she is
    ritually clean.'
