theological_decisions:
- issue: Nature of impurity language in Levitical law
  chosen_reading: Render טָמֵא / טֻמְאָה as ritual 'unclean/uncleanness' rather than
    moralized language.
  alternative_readings:
  - impure/impurity
  rationale: The verse concerns ceremonial status within Israel's purity system, not
    personal sinfulness. 'Unclean/uncleanness' is both standard and less likely to
    imply moral guilt when kept in this legal context.
- issue: Rendering נִדָּה
  chosen_reading: Translate concretely as 'menstruation' in this verse.
  alternative_readings:
  - menstrual impurity
  - period
  rationale: In context, the comparison is specifically to the woman's menstrual state
    described earlier in the chapter. 'Menstruation' is clear modern English and avoids
    importing extra interpretive wording into the main text.
