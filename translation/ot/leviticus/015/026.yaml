id: LEV.15.26
reference: Leviticus 15:26
source:
  edition: WLC
  text: כָּל הַ/מִּשְׁכָּ֞ב אֲשֶׁר תִּשְׁכַּ֤ב עָלָי/ו֙ כָּל יְמֵ֣י זוֹבָ֔/הּ כְּ/מִשְׁכַּ֥ב
    נִדָּתָ֖/הּ יִֽהְיֶה לָּ֑/הּ וְ/כָֽל הַ/כְּלִי֙ אֲשֶׁ֣ר תֵּשֵׁ֣ב עָלָ֔י/ו טָמֵ֣א
    יִהְיֶ֔ה כְּ/טֻמְאַ֖ת נִדָּתָֽ/הּ־־־־־׃
translation:
  text: Every bed on which she lies during all the days of her discharge shall be
    to her like the bed of her menstruation, and every vessel on which she sits shall
    be unclean, like the uncleanness of her menstruation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the bed of her menstrual impurity.' The Hebrew term נִדָּה can
      denote the menstrual state with its associated ritual separation.
    reason: lexical_alternative
  - marker: b
    text: '''Vessel'' is a broad term here for an article or object she sits on, not
      only a container.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִּשְׁכָּב
  chosen: bed
  alternatives:
  - lying place
  lexicon: HALOT
  rationale: Refers to the place where one lies down. 'Bed' is natural modern English
    and fits the ritual context without unnecessary abstraction.
- source_word: תִּשְׁכַּב עָלָיו
  chosen: she lies on
  alternatives:
  - she lies upon
  lexicon: HALOT
  rationale: The verb שׁכב with עַל indicates lying on/upon something. 'Lies on' is
    idiomatic contemporary English.
- source_word: כָּל יְמֵי זוֹבָהּ
  chosen: during all the days of her discharge
  alternatives:
  - all the days of her flow
  - all the days of her bodily discharge
  lexicon: HALOT
  rationale: זוֹב denotes an abnormal bodily discharge in this chapter. 'Discharge'
    is medically clear and contextually appropriate; 'during' smooths the temporal
    construction into natural English.
- source_word: כְּמִשְׁכַּב נִדָּתָהּ
  chosen: like the bed of her menstruation
  alternatives:
  - as the bed of her menstrual impurity
  - like her menstrual bed
  lexicon: HALOT
  rationale: נִדָּה here refers to menstrual separation/menstruation in the purity-law
    context. Rendering concretely as 'menstruation' communicates the referent clearly
    while preserving the comparison.
- source_word: יִהְיֶה לָּהּ
  chosen: shall be to her
  alternatives:
  - shall be for her
  - shall be regarded for her as
  lexicon: HALOT
  rationale: The Hebrew construction marks status or classification relative to her.
    'Shall be to her' preserves the formal sense while remaining understandable.
- source_word: כְּלִי
  chosen: vessel
  alternatives:
  - object
  - item
  - article
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement or article. 'Vessel' preserves
    the generality and traditional ritual-register breadth better than the narrower
    'chair' or the flatter 'object'.
- source_word: תֵּשֵׁב עָלָיו
  chosen: she sits on
  alternatives:
  - she sits upon
  lexicon: HALOT
  rationale: ישׁב with עַל indicates sitting on/upon something. 'Sits on' is idiomatic
    English.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: In Levitical purity legislation, 'unclean' is the standard and clearest
    English rendering for ritual impurity.
- source_word: כְּטֻמְאַת נִדָּתָהּ
  chosen: like the uncleanness of her menstruation
  alternatives:
  - like the impurity of her menstruation
  - as in the uncleanness of her menstrual period
  lexicon: HALOT
  rationale: טֻמְאָה denotes ritual uncleanness/impurity. 'Uncleanness' keeps the
    lexical connection with טָמֵא ('unclean') visible in English, and 'of her menstruation'
    specifies the comparison.
