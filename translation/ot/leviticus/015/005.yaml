id: LEV.15.5
reference: Leviticus 15:5
source:
  edition: WLC
  text: וְ/אִ֕ישׁ אֲשֶׁ֥ר יִגַּ֖ע בְּ/מִשְׁכָּב֑/וֹ יְכַבֵּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ
    בַּ/מַּ֖יִם וְ/טָמֵ֥א עַד הָ/עָֽרֶב־׃
translation:
  text: And a man who touches his bed shall wash his clothes and bathe in water, and
    he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his lying place.' The Hebrew term can refer more broadly to the place
      where he lay, not only a constructed bed.
    reason: lexical_alternative
  - marker: b
    text: That is, ritually unclean within the purity regulations.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אִישׁ
  chosen: And a man
  alternatives:
  - And anyone
  - And a person
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In this legal context it can function
    generically, but per the translation philosophy's gender-accurate principle, the
    masculine singular is retained rather than neutralized.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the defining clause; 'who' is the natural
    English rendering for a personal antecedent.
- source_word: יִגַּע
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'reach.' 'Touches' is sufficiently formal
    and fits the ritual-contact context without unnecessary expansion.
- source_word: בְּ/מִשְׁכָּב/וֹ
  chosen: his bed
  alternatives:
  - his lying place
  - the place where he lies
  lexicon: HALOT
  rationale: מִשְׁכָּב denotes a place of lying, often bed or bedding. 'Bed' is the
    most natural concise English equivalent here, with the possessive suffix preserved
    as 'his.'
- source_word: יְכַבֵּס
  chosen: shall wash
  alternatives:
  - must wash
  - shall launder
  lexicon: HALOT
  rationale: כִּבֵּס refers specifically to washing garments. 'Shall wash' preserves
    the legal/jussive force in English legislative style and matches the following
    object 'his clothes.'
- source_word: בְּגָדָי/ו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: בֶּגֶד means garment/clothing. 'Clothes' is more readable modern English;
    'garments' is possible but slightly more formal/archaic.
- source_word: וְ/רָחַץ
  chosen: and bathe
  alternatives:
  - and wash himself
  lexicon: HALOT
  rationale: רחץ in this context refers to washing the body. 'Bathe' communicates
    bodily washing more clearly than the bare 'wash' after the prior clause about
    washing clothes.
- source_word: בַּ/מַּיִם
  chosen: in water
  alternatives:
  - with water
  lexicon: HALOT
  rationale: The preposition with מים can be rendered either 'in' or 'with.' 'Bathe
    in water' is idiomatic and preserves the concrete ritual action.
- source_word: וְ/טָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and he will be unclean
  lexicon: HALOT
  rationale: טָמֵא here denotes ritual impurity, not moral evil. 'Shall be unclean'
    fits the legal register and standard cultic terminology.
- source_word: עַד הָ/עָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The phrase marks the duration of ritual impurity. 'Until the evening'
    is a natural rendering of the definite noun phrase and matches common Pentateuchal
    usage.
