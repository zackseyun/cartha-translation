theological_decisions:
- issue: Nature of 'unclean' in Levitical purity law
  chosen_reading: Rendered as ritual impurity ('unclean') without importing moral
    guilt language.
  alternative_readings:
  - Could be paraphrased as 'ceremonially unclean'
  rationale: The Hebrew טָמֵא in this context concerns cultic status resulting from
    bodily discharge contact. The main text keeps the traditional and accurate 'unclean'
    while avoiding interpretive expansion; the rationale clarifies that moral defilement
    is not being asserted.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s categories without importing doctrinal claims it does not make.'
