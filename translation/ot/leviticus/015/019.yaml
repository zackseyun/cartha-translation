id: LEV.15.19
reference: Leviticus 15:19
source:
  edition: WLC
  text: וְ/אִשָּׁה֙ כִּֽי תִהְיֶ֣ה זָבָ֔ה דָּ֛ם יִהְיֶ֥ה זֹבָ֖/הּ בִּ/בְשָׂרָ֑/הּ
    שִׁבְעַ֤ת יָמִים֙ תִּהְיֶ֣ה בְ/נִדָּתָ֔/הּ וְ/כָל הַ/נֹּגֵ֥עַ בָּ֖/הּ יִטְמָ֥א
    עַד הָ/עָֽרֶב־־־׃
translation:
  text: When a woman has a discharge, and her discharge in her body is blood, she
    shall remain in her menstrual impurity seven days, and everyone who touches her
    shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in her flesh.' The Hebrew is more literally 'in her flesh/body.'
    reason: lexical_alternative
  - marker: b
    text: '''Menstrual impurity'' refers to ritual uncleanness in Levitical law, not
      necessarily to moral wrongdoing.'
    reason: cultural_note
lexical_decisions:
- source_word: זָבָה
  chosen: has a discharge
  alternatives:
  - is flowing
  - has a flow
  lexicon: HALOT
  rationale: The participle from זוּב denotes a bodily flow/discharge. 'Has a discharge'
    is natural modern English and prepares for the specification that the discharge
    is blood.
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: Straightforward lexical sense; the verse specifies the nature of the
    discharge.
- source_word: זֹבָהּ
  chosen: her discharge
  alternatives:
  - her flow
  lexicon: HALOT
  rationale: Maintains lexical connection with זָבָה while using idiomatic English.
    'Discharge' is clearer than 'flow' in a ritual-purity context.
- source_word: בִּבְשָׂרָהּ
  chosen: in her body
  alternatives:
  - from her body
  - in her flesh
  lexicon: HALOT
  rationale: בשר literally means 'flesh,' but in this context refers to the woman's
    body/physical person. 'In her body' is more natural English while preserving the
    bodily reference. 'From her body' is possible interpretively, but the preposition
    is ב ('in'), so the main text stays closer to the Hebrew.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Direct numerical expression with no special idiomatic issue.
- source_word: בְנִדָּתָהּ
  chosen: in her menstrual impurity
  alternatives:
  - in her menstruation
  - in her period of impurity
  lexicon: HALOT
  rationale: נִדָּה in Levitical purity legislation refers to the state of menstrual
    impurity, not merely the biological event. 'Menstrual impurity' preserves the
    ritual sense without archaic wording.
- source_word: הַנֹּגֵעַ בָּהּ
  chosen: everyone who touches her
  alternatives:
  - whoever touches her
  - anyone touching her
  lexicon: HALOT
  rationale: The participle with כל expresses an indefinite general subject. 'Everyone
    who touches her' is clear and natural.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: Standard rendering for טמא in purity laws. 'Shall be unclean' fits the
    legal style and ritual context.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Definite article is present in Hebrew; 'until the evening' is slightly
    more formal and reflects the source, though 'until evening' would also be acceptable
    English.
