theological_decisions:
- issue: Rendering ritual impurity terminology without importing moral guilt
  chosen_reading: Use 'unclean' and 'menstrual impurity' as ritual-status terms
  alternative_readings:
  - impure
  - defiled
  rationale: Leviticus 15 concerns ceremonial/ritual impurity, not necessarily personal
    sinfulness. 'Unclean' is the established and clearest English equivalent for טמא,
    while 'menstrual impurity' clarifies that נדה is a ritual state tied to menstruation
    rather than a moral judgment.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
