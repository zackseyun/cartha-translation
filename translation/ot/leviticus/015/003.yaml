id: LEV.15.3
reference: Leviticus 15:3
source:
  edition: WLC
  text: וְ/זֹ֛את תִּהְיֶ֥ה טֻמְאָת֖/וֹ בְּ/זוֹב֑/וֹ רָ֣ר בְּשָׂר֞/וֹ אֶת זוֹב֗/וֹ
    אֽוֹ הֶחְתִּ֤ים בְּשָׂר/וֹ֙ מִ/זּוֹב֔/וֹ טֻמְאָת֖/וֹ הִֽוא־־׃
translation:
  text: 'And this shall be his uncleanness in his discharge: whether his body runs
    with his discharge, or his body is stopped up from his discharge, it is his uncleanness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his flesh flows with his discharge ... his flesh is stopped up from
      his discharge.' The Hebrew uses 'flesh,' but here it refers to the bodily condition
      involved in the discharge.
    reason: lexical_alternative
lexical_decisions:
- source_word: טֻמְאָתוֹ
  chosen: his uncleanness
  alternatives:
  - his impurity
  lexicon: HALOT
  rationale: The noun denotes ritual impurity/uncleanness in Levitical purity law.
    'Uncleanness' preserves the cultic category in familiar English better than the
    more abstract 'impurity.'
- source_word: זוֹב
  chosen: discharge
  alternatives:
  - flow
  - issue
  lexicon: HALOT
  rationale: In this context the term refers to an abnormal bodily genital discharge.
    'Discharge' is clear modern English and suitably clinical without being euphemistic.
- source_word: רָר
  chosen: runs with
  alternatives:
  - flows
  - drips
  lexicon: HALOT
  rationale: The verb describes the flesh/body emitting the discharge. 'Runs with'
    is idiomatic English that conveys active flowing.
- source_word: בְּשָׂרוֹ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: HALOT
  rationale: Although literally 'his flesh,' in this purity-law context the reference
    is to the man's bodily organ/body in relation to the discharge. 'His body' is
    more natural English and avoids misleading theological associations of 'flesh'
    here.
- source_word: הֶחְתִּים
  chosen: is stopped up
  alternatives:
  - is blocked
  - retains
  lexicon: HALOT
  rationale: The form indicates the body being closed up or obstructed from the discharge
    rather than freely emitting it. 'Is stopped up' best captures the contrast with
    the preceding flowing condition.
- source_word: מִזּוֹבוֹ
  chosen: from his discharge
  alternatives:
  - because of his discharge
  lexicon: HALOT
  rationale: The preposition marks separation/source in the phrase describing the
    body being obstructed from the discharge. 'From his discharge' preserves the Hebrew
    construction and the contrast in the verse.
- source_word: וְזֹאת תִּהְיֶה
  chosen: And this shall be
  alternatives:
  - Now this is
  - This shall be
  lexicon: HALOT
  rationale: A straightforward introductory formula. 'And this shall be' preserves
    the Hebrew conjunction and legal-register future.
- source_word: אוֹ
  chosen: whether ... or
  alternatives:
  - or
  lexicon: HALOT
  rationale: The disjunctive sets out two alternative conditions under which the same
    ruling applies. Rendering the pair as 'whether ... or' makes the legal logic explicit
    in English.
