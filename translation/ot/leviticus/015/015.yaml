id: LEV.15.15
reference: Leviticus 15:15
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה אֹתָ/ם֙ הַ/כֹּהֵ֔ן אֶחָ֣ד חַטָּ֔את וְ/הָ/אֶחָ֖ד עֹלָ֑ה וְ/כִפֶּ֨ר עָלָ֧י/ו הַ/כֹּהֵ֛ן לִ/פְנֵ֥י יְהוָ֖ה מִ/זּוֹבֽ/וֹ׃ס
translation:
  text: The priest shall offer them, one as a sin offering and the other as a burnt offering, and the priest shall make atonement for him before Yahweh because of his discharge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one for a purification offering.' The Hebrew term חַטָּאת can denote the offering used to remove ritual impurity, not only an offering for moral sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: shall offer
  alternatives:
  - shall make
  - shall prepare
  - shall perform
  lexicon: HALOT
  rationale: In sacrificial context, עשה with the objects referring to offerings commonly means to perform/offer them ritually rather than merely 'make' them. 'Shall offer' is idiomatic and contextually precise in English.
- source_word: אֹתָם
  chosen: them
  rationale: Refers back to the two birds specified in the previous verse; the plural pronoun is retained straightforwardly.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for כהן in cultic legislation.
- source_word: אֶחָד חַטָּאת
  chosen: one as a sin offering
  alternatives:
  - one for a purification offering
  lexicon: HALOT
  rationale: חטאת in sacrificial contexts can denote either 'sin offering' or, more specifically in priestly purity texts, 'purification offering.' Because English Bible tradition strongly recognizes 'sin offering,' and the offering still addresses impurity before God, the main text keeps 'sin offering' while preserving the more technical alternative in a footnote.
- source_word: וְהָאֶחָד עֹלָה
  chosen: and the other as a burnt offering
  lexicon: HALOT
  rationale: עלה is the standard whole burnt offering. 'The other' reflects the article on אחד.
- source_word: וְכִפֶּר עָלָיו
  chosen: and ... shall make atonement for him
  alternatives:
  - and ... shall purge him
  - and ... shall make expiation for him
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately rendered 'make atonement.' This preserves the cultic-theological force without over-specifying the mechanism. 'For him' reflects על + pronoun in this context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Natural rendering of the prepositional phrase in sacrificial law. Per doctrine, יהוה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's mandated default for the divine name.
- source_word: מִזּוֹבוֹ
  chosen: because of his discharge
  alternatives:
  - from his discharge
  lexicon: HALOT
  rationale: The preposition מן here marks the source/cause from which cleansing/atonement is needed. 'Because of his discharge' communicates the sense more clearly in English than the more wooden 'from his discharge.'
