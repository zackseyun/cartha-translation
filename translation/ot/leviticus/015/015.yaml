theological_decisions:
- issue: Rendering חַטָּאת in a ritual-purity context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: In Leviticus, חטאת often functions to remove impurity as well as address sin. 'Purification offering' captures priestly ritual nuance, but 'sin offering' remains the most recognizable and broadly accurate English rendering. The alternative is preserved in a footnote to maintain auditability and theological nuance without overloading the main text.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering כפר
  chosen_reading: make atonement
  alternative_readings:
  - make expiation
  - purge
  rationale: '''Make atonement'' preserves the theological tension and established cultic sense without narrowing the term to one theory of atonement or ritual effect. It is accessible modern English and fits the project''s optimal-equivalence approach.'
  doctrine_reference: Translation philosophy §3, §6
