id: LEV.15.2
reference: Leviticus 15:2
source:
  edition: WLC
  text: דַּבְּרוּ֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/אֲמַרְתֶּ֖ם אֲלֵ/הֶ֑ם אִ֣ישׁ אִ֗ישׁ
    כִּ֤י יִהְיֶה֙ זָ֣ב מִ/בְּשָׂר֔/וֹ זוֹב֖/וֹ טָמֵ֥א הֽוּא־׃
translation:
  text: 'Speak to the sons of Israel and say to them: If any man has a discharge from
    his body, his discharge is unclean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites'; literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from his flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative plural of דבר introducing divine instruction to Moses/Aaron.
    'Speak' preserves the formal command style better than the more colloquial 'tell'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the masculine
    plural is retained rather than neutralized to 'Israelites,' while remaining idiomatic
    English.
- source_word: וַאֲמַרְתֶּם אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Standard sequential command formula. 'Say to them' keeps the cadence
    and formality of the Hebrew legal discourse.
- source_word: אִישׁ אִישׁ
  chosen: any man
  alternatives:
  - a man, a man
  - each man
  - anyone
  lexicon: HALOT
  rationale: The distributive repetition means 'any man' or 'each man.' Because the
    context concerns male bodily discharge, 'man' is preferable to the gender-neutral
    'anyone.'
- source_word: זָב
  chosen: has a discharge
  alternatives:
  - is discharging
  - has a bodily flow
  lexicon: HALOT
  rationale: Here the participle functions predicatively for a man experiencing an
    abnormal genital/bodily discharge. 'Has a discharge' is natural modern English
    and fits the legal-medical context.
- source_word: מִבְּשָׂרוֹ
  chosen: from his body
  alternatives:
  - from his flesh
  lexicon: HALOT
  rationale: בשר literally means 'flesh,' but in this purity-law context 'from his
    body' communicates the sense more clearly in modern English without importing
    Pauline theological overtones associated with 'flesh.'
- source_word: זוֹבוֹ
  chosen: his discharge
  alternatives:
  - his flow
  lexicon: HALOT
  rationale: Noun cognate with זָב. Rendering both with 'discharge' preserves lexical
    consistency and the legal emphasis on the condition itself.
- source_word: טָמֵא הוּא
  chosen: is unclean
  alternatives:
  - he is unclean
  lexicon: HALOT
  rationale: Predicate adjective plus pronoun. English idiom prefers 'is unclean.'
    The uncleanness in context attaches to the discharge condition; the shorter rendering
    is natural while preserving ritual-legal force.
