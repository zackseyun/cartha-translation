theological_decisions:
- issue: Rendering ritual impurity terminology
  chosen_reading: unclean
  alternative_readings:
  - impure
  rationale: טָמֵא in Levitical purity law denotes ritual uncleanness, not necessarily
    moral sinfulness. 'Unclean' is the established and clearest English term in this
    legal context.
