id: LEV.15.24
reference: Leviticus 15:24
source:
  edition: WLC
  text: וְ/אִ֡ם שָׁכֹב֩ יִשְׁכַּ֨ב אִ֜ישׁ אֹתָ֗/הּ וּ/תְהִ֤י נִדָּתָ/הּ֙ עָלָ֔י/ו
    וְ/טָמֵ֖א שִׁבְעַ֣ת יָמִ֑ים וְ/כָל הַ/מִּשְׁכָּ֛ב אֲשֶׁר יִשְׁכַּ֥ב עָלָ֖י/ו יִטְמָֽא־־׃פ
translation:
  text: If a man indeed lies with her, and her menstrual impurity comes upon him,
    he shall be unclean seven days, and every bed on which he lies shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'If a man has sexual intercourse with her.' The Hebrew
      idiom is literally 'if a man surely lies with her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכֹב יִשְׁכַּב
  chosen: indeed lies
  alternatives:
  - lies with
  - has sexual intercourse with
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'Indeed
    lies' preserves the emphasis while keeping natural English. Because the object
    is the woman, the idiom clearly refers to sexual relations; this is reflected
    by 'lies with her' in the full clause rather than a more clinical paraphrase.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a male
  lexicon: HALOT
  rationale: The noun is singular masculine and refers to an adult male. 'A man' is
    the most natural gender-accurate rendering, in keeping with the translation philosophy.
- source_word: אֹתָהּ
  chosen: her
  lexicon: HALOT
  rationale: Direct object pronoun referring to the woman in context; straightforwardly
    rendered 'her.'
- source_word: נִדָּתָהּ
  chosen: her menstrual impurity
  alternatives:
  - her menstruation
  - her period
  - her uncleanness
  lexicon: HALOT
  rationale: נִדָּה in Levitical purity contexts denotes the woman's menstrual impurity
    state, not merely the biological event. 'Her menstrual impurity' preserves the
    ritual-purity sense better than the more colloquial 'period' or the too-vague
    'uncleanness.'
- source_word: וּתְהִי ... עָלָיו
  chosen: comes upon him
  alternatives:
  - is upon him
  - rests on him
  lexicon: HALOT
  rationale: Literally 'and it is upon him.' In English, 'comes upon him' communicates
    the transfer of impurity in a natural way while preserving the source image.
- source_word: וְטָמֵא
  chosen: he shall be unclean
  alternatives:
  - he is unclean
  - he becomes unclean
  lexicon: HALOT
  rationale: In this legal context, the qatal following the conditional has prescriptive/resultative
    force. 'He shall be unclean' fits English legal style and the verse's consequence
    statement.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Standard cardinal expression; rendered directly.
- source_word: הַמִּשְׁכָּב
  chosen: bed
  alternatives:
  - place of lying
  - couch
  lexicon: HALOT
  rationale: The noun denotes a place of lying down, here best rendered 'bed' in ordinary
    English. This matches the ritual context without unnecessary stiffness.
- source_word: אֲשֶׁר יִשְׁכַּב עָלָיו
  chosen: on which he lies
  alternatives:
  - where he lies down
  - upon which he lies
  lexicon: HALOT
  rationale: A relative clause modifying 'bed.' 'On which he lies' is clear and close
    to the Hebrew syntax.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - becomes unclean
  - will be unclean
  lexicon: HALOT
  rationale: Imperfect in legal consequence context; 'shall be unclean' maintains
    consistency with the earlier clause and preserves the juridical tone.
