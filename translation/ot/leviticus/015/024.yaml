theological_decisions:
- issue: Rendering ritual impurity language without importing moral guilt
  chosen_reading: Use 'unclean' and 'menstrual impurity' as ritual-purity terms
  alternative_readings:
  - defiled
  - polluted
  - impure in a moral sense
  rationale: Leviticus 15 addresses ceremonial/ritual impurity, not necessarily personal
    sin in this verse. 'Unclean' is the established and accurate English term, while
    'menstrual impurity' clarifies the domain of the uncleanness.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
