id: LEV.15.18
reference: Leviticus 15:18
source:
  edition: WLC
  text: וְ/אִשָּׁ֕ה אֲשֶׁ֨ר יִשְׁכַּ֥ב אִ֛ישׁ אֹתָ֖/הּ שִׁכְבַת זָ֑רַע וְ/רָחֲצ֣וּ
    בַ/מַּ֔יִם וְ/טָמְא֖וּ עַד הָ/עָֽרֶב־־׃
translation:
  text: If a man lies with a woman in an emission of semen, both of them shall wash
    in water and be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an emission of seed.' The Hebrew phrase refers specifically to
      seminal emission.
    reason: lexical_alternative
  - marker: b
    text: That is, ritually unclean until evening.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִשָּׁה אֲשֶׁר
  chosen: If a ... woman
  alternatives:
  - And a woman who
  - Now if a woman
  lexicon: HALOT
  rationale: Although the clause begins with conjunction + 'woman who,' English reads
    more naturally by fronting the conditional sense already implied by the relative
    construction in this legal context. 'If a ... woman' captures the casuistic force
    without losing the feminine subject.
- source_word: יִשְׁכַּב אִישׁ אֹתָהּ
  chosen: a man lies with a woman
  alternatives:
  - a man has sexual intercourse with her
  - a man lies her
  lexicon: HALOT
  rationale: שׁכב with a sexual object is a standard idiom for sexual intercourse.
    'Lies with' preserves the idiomatic and somewhat formal register of the Hebrew
    law text while remaining clear in modern English.
- source_word: שִׁכְבַת זָרַע
  chosen: in an emission of semen
  alternatives:
  - with an emission of seed
  - so that there is a seminal emission
  lexicon: HALOT
  rationale: This construct phrase literally means 'lying/emission of seed' and in
    Leviticus refers specifically to seminal emission. 'Emission of semen' is precise,
    readable modern English and avoids archaic 'seed' while preserving the bodily
    specificity of the purity law.
- source_word: וְרָחֲצוּ
  chosen: both of them shall wash
  alternatives:
  - they shall wash
  - they must bathe
  lexicon: HALOT
  rationale: The verb is plural, referring to both participants. 'Both of them' makes
    the dual referent explicit in English. 'Shall wash' fits the legal register; 'bathe'
    is possible but the Hebrew verb broadly means wash/bathe, and 'wash in water'
    closely follows the source.
- source_word: בַמַּיִם
  chosen: in water
  alternatives:
  - with water
  lexicon: HALOT
  rationale: The preposition is literally 'in the water.' English idiom prefers 'in
    water' here, preserving the ritual washing sense without over-specifying the mode.
- source_word: וְטָמְאוּ
  chosen: be unclean
  alternatives:
  - become unclean
  - be ceremonially unclean
  lexicon: HALOT
  rationale: טמא in Leviticus denotes ritual impurity. 'Be unclean' is the standard
    concise rendering. 'Ceremonially unclean' is interpretively clarifying but adds
    a qualifier not present in the Hebrew; the ritual sense can be noted in documentation
    rather than inserted into the text.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  - until sundown
  lexicon: HALOT
  rationale: The phrase is literally 'until the evening.' This is the standard temporal
    boundary in Levitical purity laws. 'Until the evening' is slightly more formal
    and closer to the Hebrew than 'until evening,' while 'sundown' is more interpretive.
