theological_decisions:
- issue: Nature of uncleanness in Levitical purity law
  chosen_reading: Render טמא simply as 'unclean' without importing moral guilt language.
  alternative_readings:
  - ceremonially unclean
  - ritually impure
  rationale: The verse concerns ritual impurity after sexual intercourse, not necessarily
    moral transgression. The translation should preserve that distinction and not
    imply sin where the text states a temporary purity status.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
