id: LEV.15.11
reference: Leviticus 15:11
source:
  edition: WLC
  text: וְ/כֹ֨ל אֲשֶׁ֤ר יִגַּע בּ/וֹ֙ הַ/זָּ֔ב וְ/יָדָ֖י/ו לֹא שָׁטַ֣ף בַּ/מָּ֑יִם
    וְ/כִבֶּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־־׃
translation:
  text: And everyone whom the man with the discharge touches, without having rinsed
    his hands in water, shall wash his clothes and bathe in water, and be unclean
    until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if he has not rinsed his hands in water.' The Hebrew clause may be
      read as stating the condition under which the touch transmits impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the discharge sufferer
  lexicon: HALOT
  rationale: The participial noun from זוּב refers to a male person experiencing a
    bodily discharge in this purity-law context. 'The man with the discharge' is clear
    modern English and preserves the male reference explicit in the Hebrew form and
    surrounding legislation.
- source_word: יִגַּע בּוֹ
  chosen: touches
  alternatives:
  - touches him
  - comes into contact with him
  lexicon: HALOT
  rationale: נגע with ב marks physical contact. English 'touches' is the most natural
    rendering. The object is implicit in English once the relative clause is formed,
    so 'whom ... touches' communicates the sense smoothly.
- source_word: וְיָדָיו לֹא שָׁטַף בַּמָּיִם
  chosen: without having rinsed his hands in water
  alternatives:
  - if he has not rinsed his hands in water
  - and his hands he has not rinsed in water
  lexicon: HALOT
  rationale: שטף means 'rinse, wash off, flush.' Here it refers specifically to the
    discharge-affected man not rinsing his hands before touching another person. Rendering
    it as a circumstantial clause with 'without having' captures the Hebrew sequence
    and clarifies the condition in idiomatic English.
- source_word: שָׁטַף
  chosen: rinsed
  alternatives:
  - washed
  - flushed
  lexicon: HALOT
  rationale: '''Rinsed'' distinguishes this verb from רחץ later in the verse (''bathe/wash
    oneself'') and from כבס (''wash clothes''), preserving lexical differentiation
    where possible.'
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  lexicon: HALOT
  rationale: כִּבֵּס commonly refers to laundering garments. 'Clothes' is more readable
    modern English than 'garments' while preserving the concrete requirement.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash himself in water
  lexicon: HALOT
  rationale: רחץ in purity contexts often refers to washing the body. 'Bathe in water'
    communicates bodily washing and keeps distinction from laundering clothes.
- source_word: וְטָמֵא עַד הָעָרֶב
  chosen: and be unclean until the evening
  alternatives:
  - and shall be unclean until evening
  lexicon: HALOT
  rationale: טמא denotes ritual impurity in this legal context, not moral evil. 'Unclean'
    is the standard concise rendering, and 'until the evening' reflects the definite
    noun with natural English phrasing.
- source_word: כֹל אֲשֶׁר
  chosen: everyone whom
  alternatives:
  - whoever
  - every person whom
  lexicon: HALOT
  rationale: The phrase is distributive and personal in context. 'Everyone whom' fits
    the following relative clause and keeps the scope broad without awkwardness.
