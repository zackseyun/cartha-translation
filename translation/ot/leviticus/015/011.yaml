theological_decisions:
- issue: Nature of impurity language in Leviticus purity law
  chosen_reading: Render טמא as 'unclean' in a ritual/purity sense, not as moral defilement.
  alternative_readings:
  - defiled
  rationale: The verse concerns ceremonial impurity resulting from bodily discharge
    and contact, with prescribed washing and time limits. 'Unclean' preserves the
    cultic category without importing moral guilt language.
