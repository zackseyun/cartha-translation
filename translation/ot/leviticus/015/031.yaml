id: LEV.15.31
reference: Leviticus 15:31
source:
  edition: WLC
  text: וְ/הִזַּרְתֶּ֥ם אֶת בְּנֵי יִשְׂרָאֵ֖ל מִ/טֻּמְאָתָ֑/ם וְ/לֹ֤א יָמֻ֨תוּ֙ בְּ/טֻמְאָתָ֔/ם
    בְּ/טַמְּאָ֥/ם אֶת מִשְׁכָּנִ֖/י אֲשֶׁ֥ר בְּ/תוֹכָֽ/ם־־־׃
translation:
  text: Thus you shall warn the sons of Israel about their uncleanness, so that they
    may not die in their uncleanness by making my tabernacle, which is among them,
    unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזַּרְתֶּם
  chosen: you shall warn
  alternatives:
  - you shall separate
  - you shall instruct
  lexicon: HALOT
  rationale: Hiphil of זהר here carries the sense of giving warning/admonition. In
    this legal context, 'warn' best captures the causative force and the preventative
    purpose that follows.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Because the translation philosophy prefers
    gender-accurate renderings matching the source, the more formal expression is
    retained in the main text rather than the idiomatic 'Israelites.'
- source_word: מִטֻּמְאָתָם
  chosen: about their uncleanness
  alternatives:
  - from their uncleanness
  - concerning their impurity
  lexicon: HALOT
  rationale: With the Hiphil of זהר, the preposition מִן can mark the matter against
    which warning is given. 'About their uncleanness' communicates the sense naturally
    in English while preserving the warning function. 'Uncleanness' is preferred here
    for ritual impurity language in Leviticus.
- source_word: טֻמְאָה
  chosen: uncleanness
  alternatives:
  - impurity
  lexicon: HALOT
  rationale: In Levitical ritual contexts, 'uncleanness' is a standard and clear rendering
    that preserves the cultic category without reducing it to merely moral impurity.
- source_word: וְלֹא יָמֻתוּ
  chosen: so that they may not die
  alternatives:
  - lest they die
  - and they shall not die
  lexicon: HALOT
  rationale: The clause expresses purpose/prevention following the warning. 'So that
    they may not die' makes the relationship explicit in contemporary English.
- source_word: בְּטֻמְאָתָם
  chosen: in their uncleanness
  alternatives:
  - while in their uncleanness
  - because of their uncleanness
  lexicon: HALOT
  rationale: The preposition ב marks the state or condition in which death would occur.
    'In their uncleanness' is concise and sufficiently literal.
- source_word: בְּטַמְּאָם
  chosen: by making ... unclean
  alternatives:
  - when they defile
  - in defiling
  lexicon: HALOT
  rationale: Infinitive construct of טמא with prefixed ב indicates the means/circumstance.
    'By making ... unclean' is natural English and preserves the causative sense toward
    the sanctuary.
- source_word: מִשְׁכָּנִי
  chosen: my tabernacle
  alternatives:
  - my dwelling place
  - my sanctuary
  lexicon: HALOT
  rationale: מִשְׁכָּן in the Pentateuch commonly refers to the tabernacle/dwelling.
    'My tabernacle' preserves the concrete cultic referent better than the broader
    'sanctuary.'
- source_word: אֲשֶׁר בְּתוֹכָם
  chosen: which is among them
  alternatives:
  - that is in their midst
  lexicon: HALOT
  rationale: This relative clause emphasizes God's dwelling presence among Israel.
    'Which is among them' is clear, natural, and close to the Hebrew.
