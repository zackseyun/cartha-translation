theological_decisions:
- issue: Ritual impurity terminology in Leviticus
  chosen_reading: Render טֻמְאָה as 'uncleanness' and preserve the cultic sense rather
    than moralizing it as sin.
  alternative_readings:
  - impurity
  - defilement
  rationale: The verse concerns ritual contamination of the divine dwelling and the
    resulting danger, not a generalized statement about moral guilt. 'Uncleanness'
    best preserves the Levitical category in readable English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered corporate designation
  chosen_reading: Retain 'the sons of Israel' in the main text.
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard covenantal
    designation. Per the gender-accurate principle, the translation keeps the source-oriented
    form rather than neutralizing it, while an idiomatic alternative may be noted.
  doctrine_reference: Translation philosophy §4
