theological_decisions:
- issue: Nature of טָמֵא in purity legislation
  chosen_reading: ritually unclean
  alternative_readings:
  - morally impure
  - ceremonially defiled
  rationale: The context is Levitical bodily-discharge legislation, where impurity
    is cultic/ritual rather than a statement of personal sinfulness. The main text
    keeps the traditional concise 'unclean,' while the rationale clarifies the category
    to avoid importing moral guilt into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
