id: LEV.15.16
reference: Leviticus 15:16
source:
  edition: WLC
  text: וְ/אִ֕ישׁ כִּֽי תֵצֵ֥א מִמֶּ֖/נּוּ שִׁכְבַת זָ֑רַע וְ/רָחַ֥ץ בַּ/מַּ֛יִם אֶת
    כָּל בְּשָׂר֖/וֹ וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־־־־׃
translation:
  text: And if a man has an emission of semen, he shall wash all his flesh in water
    and be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a seminal emission' or more literally 'an emission of seed.'
    reason: lexical_alternative
  - marker: b
    text: '''Unclean'' here refers to ritual impurity in the context of Levitical
      purity laws, not necessarily to moral guilt.'
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a male
  lexicon: HALOT
  rationale: Rendered gender-accurately as 'a man' because the verse specifically
    addresses a male bodily emission law, not humanity in general.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this casuistic legal context, כִּי introduces a conditional situation;
    'if' is the most natural English rendering.
- source_word: תֵצֵא מִמֶּנּוּ
  chosen: has an emission
  alternatives:
  - there comes out from him
  - there is discharged from him
  lexicon: HALOT
  rationale: The Hebrew literally says 'goes out from him,' but idiomatic English
    in a purity-law context is 'has an emission.' This preserves the event without
    awkward literalism.
- source_word: שִׁכְבַת זָרַע
  chosen: an emission of semen
  alternatives:
  - seed of copulation
  - seminal emission
  - emission of seed
  lexicon: HALOT
  rationale: This construct phrase refers to seminal discharge. 'An emission of semen'
    is clear modern English and more precise than the overly literal 'emission of
    seed.'
- source_word: וְרָחַץ
  chosen: he shall wash
  alternatives:
  - then he shall bathe
  - and he shall wash
  lexicon: HALOT
  rationale: The waw + perfect in legal sequence carries instruction/result. 'He shall
    wash' fits English legal style and the ritual requirement.
- source_word: בַּמַּיִם
  chosen: in water
  alternatives:
  - with water
  lexicon: HALOT
  rationale: The preposition is most naturally rendered 'in' here, matching the sense
    of bathing/washing the body.
- source_word: אֶת כָּל בְּשָׂרוֹ
  chosen: all his flesh
  alternatives:
  - his whole body
  - all his body
  lexicon: HALOT
  rationale: Retained 'all his flesh' to stay close to the Hebrew idiom while remaining
    understandable. In this context it denotes the whole body.
- source_word: וְטָמֵא
  chosen: and be unclean
  alternatives:
  - and he shall be unclean
  - and become unclean
  lexicon: HALOT
  rationale: Ritual impurity is the issue, so 'unclean' is the standard and contextually
    accurate rendering. The English infinitive construction follows naturally after
    'shall wash.'
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible; 'until the evening' reflects the Hebrew article and
    reads naturally in English.
