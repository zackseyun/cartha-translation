id: LEV.15.9
reference: Leviticus 15:9
source:
  edition: WLC
  text: וְ/כָל הַ/מֶּרְכָּ֗ב אֲשֶׁ֨ר יִרְכַּ֥ב עָלָ֛י/ו הַ/זָּ֖ב יִטְמָֽא־׃
translation:
  text: And every saddle on which the man with the discharge rides shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every thing ridden on'; the Hebrew term can refer more broadly to what
      is ridden upon, not only a saddle in the narrow sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And every
  alternatives:
  - And all
  - Every
  lexicon: HALOT
  rationale: וְ links this rule with the preceding regulations, and כָּל gives a distributive
    sense. 'And every' preserves both the conjunction and the universal scope in natural
    English.
- source_word: הַ/מֶּרְכָּב
  chosen: saddle
  alternatives:
  - thing ridden on
  - seat
  - carriage
  - chariot
  lexicon: HALOT
  rationale: מֶרְכָּב denotes something ridden upon. In this purity-law context, the
    referent is not a war chariot but the riding gear or riding seat associated with
    an animal. 'Saddle' gives the most natural and specific English sense here, while
    still fitting the context of personal contamination by contact.
- source_word: אֲשֶׁר יִרְכַּב עָלָיו
  chosen: on which ... rides
  alternatives:
  - which he rides on
  - that he mounts
  lexicon: HALOT
  rationale: 'The relative clause is straightforward: ''which/on which he rides.''
    Rendering with ''on which ... rides'' is idiomatic and preserves the Hebrew syntax
    and spatial sense of עַל.'
- source_word: הַ/זָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the discharge-afflicted man
  - the man who has the discharge
  lexicon: HALOT
  rationale: זָב here is the substantivized participle used throughout the chapter
    for a male suffering a genital/bodily discharge that causes ritual impurity. 'The
    man with the discharge' is clear modern English and preserves the male reference
    signaled by the masculine form and context.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: The verb טמא in the qal here states the resulting ritual status. 'Shall
    be unclean' is standard, clear English for legal material and avoids overinterpreting
    whether the focus is entrance into or continuance in the state.
