theological_decisions:
- issue: Nature of impurity language in Leviticus
  chosen_reading: Render טמא as 'unclean' in ritual/legal sense without importing
    moral guilt.
  alternative_readings:
  - defiled
  - impure
  rationale: The verse concerns ceremonial impurity from bodily discharge, not necessarily
    personal sin or moral corruption. 'Unclean' is the most established and least
    misleading English term in this legal context.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
