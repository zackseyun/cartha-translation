id: LEV.15.12
reference: Leviticus 15:12
source:
  edition: WLC
  text: וּ/כְלִי חֶ֛רֶשׂ אֲשֶׁר יִגַּע בּ֥/וֹ הַ/זָּ֖ב יִשָּׁבֵ֑ר וְ/כָל כְּלִי עֵ֔ץ
    יִשָּׁטֵ֖ף בַּ/מָּֽיִם־־־־־׃
translation:
  text: And an earthen vessel that the one with the discharge touches shall be broken,
    and every wooden vessel shall be rinsed with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clay vessel' or 'pottery vessel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the one with the discharge,' a technical purity-law term for a person
      affected by a bodily discharge.
    reason: cultural_note
  - marker: c
    text: Or 'shall be washed in water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלִי חֶרֶשׂ
  chosen: earthen vessel
  alternatives:
  - clay vessel
  - pottery vessel
  lexicon: HALOT
  rationale: כְלִי is a general term for an implement or vessel; with חֶרֶשׂ it specifically
    denotes a vessel made of earthenware. 'Earthen vessel' is natural English and
    preserves the material distinction that matters for purity law.
- source_word: אֲשֶׁר יִגַּע בּוֹ
  chosen: that ... touches
  alternatives:
  - which ... touches
  - that ... comes into contact with
  lexicon: HALOT
  rationale: נגע in Qal commonly means 'touch.' The relative clause is rendered straightforwardly.
    'Comes into contact with' is possible but less direct than the Hebrew.
- source_word: הַזָּב
  chosen: the one with the discharge
  alternatives:
  - the man with the discharge
  - the one who has the discharge
  lexicon: HALOT
  rationale: זָב here is the technical term for a person with a bodily discharge in
    this purity context. Because the immediate Hebrew form is a substantivized participle/article
    construction, 'the one with the discharge' communicates the condition clearly
    in modern English without unnecessary jargon. The broader context is male, but
    this verse's wording itself is best represented by the condition-focused expression.
- source_word: יִשָּׁבֵר
  chosen: shall be broken
  alternatives:
  - must be broken
  - is to be broken
  lexicon: HALOT
  rationale: Niphal of שבר here is a passive/jussive-like legal instruction in context.
    'Shall be broken' preserves the legal force in standard English legislative style.
- source_word: כָל כְּלִי עֵץ
  chosen: every wooden vessel
  alternatives:
  - every vessel of wood
  - every wooden article
  lexicon: HALOT
  rationale: The phrase denotes any implement made of wood. 'Every wooden vessel'
    is concise and keeps the parallel with 'earthen vessel.'
- source_word: יִשָּׁטֵף בַּמָּיִם
  chosen: shall be rinsed with water
  alternatives:
  - shall be washed in water
  - shall be rinsed in water
  lexicon: HALOT
  rationale: שטף in this ritual context refers to washing/rinsing by water. 'Rinsed
    with water' distinguishes this action from fuller laundering terms and fits the
    object ('vessel') naturally in English.
