id: LEV.15.33
reference: Leviticus 15:33
source:
  edition: WLC
  text: וְ/הַ/דָּוָה֙ בְּ/נִדָּתָ֔/הּ וְ/הַ/זָּב֙ אֶת זוֹב֔/וֹ לַ/זָּכָ֖ר וְ/לַ/נְּקֵבָ֑ה
    וּ/לְ/אִ֕ישׁ אֲשֶׁ֥ר יִשְׁכַּ֖ב עִם טְמֵאָֽה־־׃פ
translation:
  text: and for the woman who is sick in her menstrual impurity, and for the one who
    has a discharge, whether male or female, and for a man who lies with an unclean
    woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the menstruating woman'; the Hebrew term for 'the woman who is sick'
      refers here to a woman in her menstrual state.
    reason: lexical_alternative
  - marker: b
    text: '''Unclean'' in this verse refers to ritual impurity under Levitical law,
      not to moral uncleanness.'
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּוָה
  chosen: the woman who is sick
  alternatives:
  - the menstruating woman
  - the woman who is unwell
  lexicon: HALOT
  rationale: The adjective/noun denotes a woman in a state of menstrual infirmity/flow.
    'The woman who is sick' preserves the base sense of being in an afflicted condition,
    while the following phrase 'in her menstrual impurity' specifies the nature of
    that condition. This avoids flattening the first term into a mere repetition of
    the next noun.
- source_word: בְּנִדָּתָהּ
  chosen: in her menstrual impurity
  alternatives:
  - in her menstruation
  - in her impurity
  lexicon: HALOT
  rationale: נִדָּה in Levitical purity contexts refers specifically to menstrual
    impurity/separation. 'Menstrual impurity' makes the ritual context explicit and
    is more precise than the broader 'impurity'.
- source_word: הַזָּב
  chosen: the one who has a discharge
  alternatives:
  - the man with a discharge
  - the one with a bodily discharge
  lexicon: HALOT
  rationale: Though morphologically masculine singular, the following phrase 'whether
    male or female' shows this heading covers discharge cases generally. 'The one
    who has a discharge' preserves the singular category label without prematurely
    restricting it to a male.
- source_word: אֶת זוֹבוֹ
  chosen: has a discharge
  alternatives:
  - his discharge
  - his flow
  lexicon: HALOT
  rationale: 'The accusative plus cognate noun after הַזָּב is idiomatically represented
    in English by verbalizing the idea: ''has a discharge.'' This is clearer than
    a wooden ''the one discharging his discharge.'''
- source_word: לַזָּכָר וְלַנְּקֵבָה
  chosen: whether male or female
  alternatives:
  - for the male and for the female
  - for male and female
  lexicon: HALOT
  rationale: This pair specifies the scope of the preceding discharge legislation.
    'Whether male or female' is natural English and preserves the distributive sense.
- source_word: וּלְאִישׁ
  chosen: and for a man
  alternatives:
  - and for the man
  lexicon: HALOT
  rationale: The noun is singular masculine, referring to any man in this case category.
    The indefinite 'a man' fits English generic usage.
- source_word: אֲשֶׁר יִשְׁכַּב עִם
  chosen: who lies with
  alternatives:
  - who has sexual relations with
  - who sleeps with
  lexicon: HALOT
  rationale: The idiom means to lie sexually with someone. 'Lies with' is both accurate
    and readable, preserving the euphemistic register of the Hebrew better than a
    more explicit paraphrase.
- source_word: טְמֵאָה
  chosen: an unclean woman
  alternatives:
  - a woman who is unclean
  - an impure woman
  lexicon: HALOT
  rationale: The feminine singular adjective refers to a ritually unclean female.
    'Unclean woman' is concise and preserves the ritual-purity terminology standard
    in Leviticus.
