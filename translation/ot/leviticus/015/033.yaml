theological_decisions:
- issue: Ritual purity terminology
  chosen_reading: Render טְמֵאָה/נִדָּה with 'unclean' and 'menstrual impurity' rather
    than moralized language.
  alternative_readings:
  - defiled
  - dirty
  - impure in a moral sense
  rationale: The verse concerns ceremonial/ritual states within Levitical law, not
    moral worth. The chosen wording preserves the cultic category without importing
    ethical condemnation beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
