id: LEV.15.29
reference: Leviticus 15:29
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הַ/שְּׁמִינִ֗י תִּֽקַּֽח לָ/הּ֙ שְׁתֵּ֣י תֹרִ֔ים א֥וֹ שְׁנֵ֖י
    בְּנֵ֣י יוֹנָ֑ה וְ/הֵבִיאָ֤ה אוֹתָ/ם֙ אֶל הַ/כֹּהֵ֔ן אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־־׃
translation:
  text: And on the eighth day she shall take for herself two turtledoves or two young
    pigeons, and bring them to the priest at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the entrance of the tent of meeting.' The Hebrew repeats 'to' before
      'the entrance,' which may be rendered more formally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הַשְּׁמִינִי
  chosen: And on the eighth day
  alternatives:
  - On the eighth day
  lexicon: HALOT
  rationale: Temporal phrase with prefixed conjunction ו plus preposition ב. Retained
    'And' to reflect narrative/legal sequence, while 'on the eighth day' is the natural
    English rendering of the temporal construction.
- source_word: תִּקַּח לָהּ
  chosen: she shall take for herself
  alternatives:
  - she shall take
  - she is to take for herself
  lexicon: HALOT
  rationale: Qal imperfect 3fs of לקח in legal instruction is well rendered with modal
    future 'shall take.' The dative pronoun לָהּ is reflexive/benefactive; 'for herself'
    preserves the Hebrew nuance rather than omitting it.
- source_word: שְׁתֵּי תֹרִים
  chosen: two turtledoves
  alternatives:
  - a pair of turtledoves
  - two turtle doves
  lexicon: HALOT
  rationale: Standard zoological rendering for תֹרִים. 'Two turtledoves' closely follows
    the Hebrew numeral + noun construction and matches sacrificial-bird terminology
    in clear modern English.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction presenting the permitted alternative offering.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  chosen: two young pigeons
  alternatives:
  - a pair of young pigeons
  - two pigeon young
  lexicon: HALOT
  rationale: Idiomatic rendering of the construct phrase 'sons of a dove/pigeon' meaning
    young pigeons. 'Young pigeons' is standard sacrificial-language English and avoids
    wooden literalism.
- source_word: וְהֵבִיאָה אֹתָם
  chosen: and bring them
  alternatives:
  - and she shall bring them
  - and she must bring them
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in this legal sequence carries
    injunctive force following the preceding imperfect. English coordinates naturally
    with 'and bring them'; the subject 'she' is understood from context and need not
    be repeated.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to a priest
  lexicon: HALOT
  rationale: The article in Hebrew points to the officiating priest in the ritual
    setting; English idiom favors 'the priest' for the designated cultic role.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - to the entrance of the tent of meeting
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' Because the phrase follows 'bring them
    to the priest,' rendering the second אֶל locatively as 'at' produces smoother
    English without loss of meaning. 'Tent of meeting' is the established and accurate
    rendering of אֹהֶל מוֹעֵד.
