id: LEV.15.10
reference: Leviticus 15:10
source:
  edition: WLC
  text: וְ/כָל הַ/נֹּגֵ֗עַ בְּ/כֹל֙ אֲשֶׁ֣ר יִהְיֶ֣ה תַחְתָּ֔י/ו יִטְמָ֖א עַד הָ/עָ֑רֶב
    וְ/הַ/נּוֹשֵׂ֣א אוֹתָ֔/ם יְכַבֵּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם וְ/טָמֵ֥א
    עַד הָ/עָֽרֶב־־־׃
translation:
  text: And everyone who touches anything that was under him shall be unclean until
    the evening, and whoever carries them shall wash his clothes and bathe in water,
    and be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything that is under him.' The Hebrew may be rendered more literally
      with present tense, but the past sense fits the procedural context of objects
      previously beneath the affected person.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' refers collectively to the contaminated items associated
      with what was under him.
    reason: cross_reference
lexical_decisions:
- source_word: הַנֹּגֵעַ
  chosen: who touches
  alternatives:
  - who comes into contact with
  lexicon: HALOT
  rationale: The participle of נגע commonly denotes physical touching/contact. 'Touches'
    is the most natural and direct English rendering in this ritual-purity context.
- source_word: בְּכֹל אֲשֶׁר יִהְיֶה תַחְתָּיו
  chosen: anything that was under him
  alternatives:
  - anything that is under him
  - anything beneath him
  lexicon: HALOT
  rationale: This refers back to objects on which the man with the discharge sat or
    lay. English past tense 'was under him' fits the procedural sense in context better
    than a more wooden present, while preserving the spatial meaning of תַּחַת.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will become unclean
  lexicon: HALOT
  rationale: In purity legislation, טמא is conventionally and clearly rendered 'be
    unclean.' 'Shall' fits the legal-register style of the passage.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible; 'until the evening' reflects the Hebrew article and
    maintains the formal cadence of the law.
- source_word: הַנּוֹשֵׂא אֹתָם
  chosen: whoever carries them
  alternatives:
  - the one who carries them
  - whoever lifts them
  lexicon: HALOT
  rationale: נשא here means to carry/bear the contaminated items. 'Whoever carries
    them' is idiomatic and preserves the generic legal force. The plural pronoun 'them'
    follows the Hebrew אֹתָם, likely referring collectively to the items just mentioned.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - shall wash his garments
  lexicon: HALOT
  rationale: '''Clothes'' is more readable modern English than ''garments'' while
    accurately conveying בגדים.'
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash in water
  - and bathe himself in water
  lexicon: HALOT
  rationale: רחץ in this purification formula often implies washing the body. 'Bathe
    in water' communicates that more clearly in natural English without adding too
    much.
- source_word: וְטָמֵא עַד הָעָרֶב
  chosen: and be unclean until the evening
  alternatives:
  - and shall be unclean until the evening
  lexicon: HALOT
  rationale: This final clause states the resulting period of impurity after washing.
    'Be unclean' coordinates smoothly with the preceding verbs in English.
