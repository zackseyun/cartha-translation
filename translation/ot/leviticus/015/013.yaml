theological_decisions:
- issue: Rendering ritual purity terminology without importing moral guilt
  chosen_reading: Use 'cleansed/clean' in a ritual sense
  alternative_readings:
  - purified/pure
  rationale: Leviticus 15 concerns ceremonial impurity from bodily discharge, not
    necessarily personal sin. 'Cleansed' and 'clean' preserve the ritual category
    while remaining readable. This avoids importing moralized language the text itself
    does not state.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
