id: LEV.15.13
reference: Leviticus 15:13
source:
  edition: WLC
  text: וְ/כִֽי יִטְהַ֤ר הַ/זָּב֙ מִ/זּוֹב֔/וֹ וְ/סָ֨פַר ל֜/וֹ שִׁבְעַ֥ת יָמִ֛ים לְ/טָהֳרָת֖/וֹ
    וְ/כִבֶּ֣ס בְּגָדָ֑י/ו וְ/רָחַ֧ץ בְּשָׂר֛/וֹ בְּ/מַ֥יִם חַיִּ֖ים וְ/טָהֵֽר־׃
translation:
  text: And when the man with the discharge is cleansed from his discharge, then he
    shall count seven days for his cleansing, and wash his clothes and bathe his body
    in fresh water; then he shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'living water'; that is, fresh or flowing water.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the discharge sufferer
  - the man who has the discharge
  lexicon: HALOT
  rationale: The participial noun from זוּב refers to the person afflicted with the
    genital/bodily discharge described in this chapter. 'The man with the discharge'
    is natural modern English and keeps the male-specific reference required by context.
- source_word: יִטְהַר
  chosen: is cleansed
  alternatives:
  - becomes clean
  - is clean
  lexicon: HALOT
  rationale: In this ritual context טהר denotes becoming ritually clean. The passive-like
    English 'is cleansed' fits the intransitive Hebrew sense while signaling ritual
    purification rather than mere hygiene.
- source_word: מִזּוֹבוֹ
  chosen: from his discharge
  alternatives:
  - from his flow
  - from his emission
  lexicon: HALOT
  rationale: זוֹב in Leviticus 15 denotes an abnormal bodily discharge. 'Discharge'
    is the clearest and most medically neutral English equivalent.
- source_word: וְסָפַר לוֹ
  chosen: he shall count
  alternatives:
  - he must count
  - he is to count
  lexicon: HALOT
  rationale: The waw + perfect continues the procedural sequence with instruction-like
    force. 'He shall count' preserves the legal/ritual register without sounding archaic.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward numeral phrase; no adjustment needed.
- source_word: לְטָהֳרָתוֹ
  chosen: for his cleansing
  alternatives:
  - for his purification
  - for becoming clean
  lexicon: HALOT
  rationale: The noun refers to the process/state of ritual purification. 'For his
    cleansing' reads naturally and matches the ritual context; 'purification' is possible
    but slightly more formal.
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: wash his clothes
  alternatives:
  - launder his garments
  lexicon: HALOT
  rationale: כִּבֵּס means washing garments. 'Wash his clothes' is idiomatic modern
    English and sufficiently precise.
- source_word: וְרָחַץ בְּשָׂרוֹ
  chosen: bathe his body
  alternatives:
  - wash his flesh
  - wash his body
  lexicon: HALOT
  rationale: בשר literally means 'flesh,' but in this ritual washing context English
    'body' best conveys the intended sense without wooden literalism. 'Bathe' distinguishes
    whole-body washing from laundering clothes.
- source_word: בְּמַיִם חַיִּים
  chosen: in fresh water
  alternatives:
  - in living water
  - in running water
  lexicon: HALOT
  rationale: Literally 'living water,' an idiom for fresh, flowing water. In Levitical
    purity legislation the practical sense is primary. 'Fresh water' is clear in modern
    English; the more literal 'living water' could mislead readers here because of
    later theological associations, while 'running water' is a viable alternative.
- source_word: וְטָהֵר
  chosen: then he shall be clean
  alternatives:
  - and he shall be clean
  - then he is clean
  lexicon: HALOT
  rationale: This concludes the ritual sequence with the resulting state of ritual
    cleanness. 'Then he shall be clean' makes the sequence explicit in English.
