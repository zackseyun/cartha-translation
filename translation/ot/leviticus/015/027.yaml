id: LEV.15.27
reference: Leviticus 15:27
source:
  edition: WLC
  text: וְ/כָל הַ/נּוֹגֵ֥עַ בָּ֖/ם יִטְמָ֑א וְ/כִבֶּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם
    וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־׃
translation:
  text: And everyone who touches them shall be unclean, and he shall wash his clothes
    and bathe in water, and be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the objects associated with her impurity in the preceding context,
      such as what she lies on or sits on.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/כָל
  chosen: And everyone
  alternatives:
  - And whoever
  - And anyone
  lexicon: HALOT
  rationale: כָּל with the following participle forms an indefinite universal expression.
    'Everyone' is natural modern English and preserves the comprehensive scope.
- source_word: הַ/נּוֹגֵעַ
  chosen: who touches
  alternatives:
  - whoever touches
  - the one touching
  lexicon: HALOT
  rationale: 'The participle of נגע functions substantivally: ''the one who touches.''
    In English, ''who touches'' best fits after ''everyone''.'
- source_word: בָּם
  chosen: them
  alternatives:
  - those things
  lexicon: HALOT
  rationale: The 3mp pronominal suffix refers back to the items associated with the
    woman's impurity in the preceding context (objects she lies or sits on). 'Them'
    is the most direct rendering; specifying the referent in the main text would over-interpret.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will become unclean
  - shall be defiled
  lexicon: HALOT
  rationale: טמא in Levitical purity contexts denotes ritual uncleanness. 'Shall be
    unclean' is standard, clear, and avoids importing moral defilement.
- source_word: וְ/כִבֶּס בְּגָדָיו
  chosen: and he shall wash his clothes
  alternatives:
  - and he shall wash his garments
  lexicon: HALOT
  rationale: כִּבֶּס commonly refers to laundering garments. 'Clothes' is more readable
    modern English than 'garments' while preserving the sense.
- source_word: וְ/רָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash in water
  - and bathe himself in water
  lexicon: HALOT
  rationale: רחץ in this ritual context refers to washing the body. 'Bathe in water'
    communicates bodily washing more clearly than the generic 'wash in water.' The
    reflexive 'himself' is implicit in English and need not be stated.
- source_word: וְ/טָמֵא עַד הָעָרֶב
  chosen: and be unclean until the evening
  alternatives:
  - and shall be unclean until evening
  lexicon: HALOT
  rationale: This clause states the duration of ritual uncleanness. Including 'the'
    in 'the evening' reflects the Hebrew article and is idiomatic enough in English.
