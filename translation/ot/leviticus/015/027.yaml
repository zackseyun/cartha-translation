theological_decisions:
- issue: Nature of impurity language in Leviticus
  chosen_reading: Render טמא/unclean in ritual-purity terms, not as moral sinfulness.
  alternative_readings:
  - defiled
  rationale: The context is ceremonial impurity legislation. 'Unclean' preserves the
    cultic category without suggesting that mere contact is itself a moral transgression.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without importing doctrinal claims.'
