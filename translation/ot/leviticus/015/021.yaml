theological_decisions:
- issue: Nature of impurity language
  chosen_reading: Render טמא as ritual 'unclean' without importing moral guilt.
  alternative_readings:
  - defiled
  - impure
  rationale: In Leviticus 15 the context is ceremonial purity legislation. 'Unclean'
    preserves the established ritual category while avoiding an over-interpretation
    as personal sinfulness.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
