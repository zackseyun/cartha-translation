id: LEV.15.21
reference: Leviticus 15:21
source:
  edition: WLC
  text: וְ/כָל הַ/נֹּגֵ֖עַ בְּ/מִשְׁכָּבָ֑/הּ יְכַבֵּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם
    וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־׃
translation:
  text: And everyone who touches her bed shall wash his clothes and bathe in water,
    and he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her lying place' or 'her bedding.' The Hebrew term refers to the place
      where she lies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: And everyone
  alternatives:
  - And whoever
  - And anyone
  lexicon: HALOT
  rationale: כָּל with the conjunction introduces a generalizing statement. 'Everyone'
    is natural modern English and preserves the universal scope.
- source_word: הַנֹּגֵעַ
  chosen: who touches
  alternatives:
  - whoever touches
  - the one touching
  lexicon: HALOT
  rationale: From נגע, here a participle functioning substantivally. 'Who touches'
    gives clear idiomatic English while preserving the ongoing/general force.
- source_word: בְּמִשְׁכָּבָהּ
  chosen: her bed
  alternatives:
  - her lying place
  - her bedding
  lexicon: HALOT
  rationale: מִשְׁכָּב commonly denotes a place of lying or bed. In this purity-law
    context, 'bed' is the most direct and readable rendering, matching the concrete
    object in view.
- source_word: יְכַבֵּס
  chosen: shall wash
  alternatives:
  - must wash
  - shall launder
  lexicon: HALOT
  rationale: כבס refers specifically to washing garments. 'Shall wash' preserves the
    legal/instructional force without becoming overly technical.
- source_word: בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: בגדיו means his garments/clothes. 'Clothes' is more natural modern English;
    the possessive is retained.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash in water
  - and bathe himself in water
  lexicon: HALOT
  rationale: רחץ in this ritual context refers to washing the body. 'Bathe in water'
    communicates bodily washing more clearly than simply 'wash,' which could be confused
    with laundering clothes.
- source_word: וְטָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and he will be unclean
  lexicon: HALOT
  rationale: טמא here denotes ritual impurity, not moral defilement. 'Shall be unclean'
    is the standard concise rendering in legal material.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The phrase marks the duration of ritual impurity. 'Until the evening'
    is slightly more formal and matches the Hebrew article.
