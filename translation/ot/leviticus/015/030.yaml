id: LEV.15.30
reference: Leviticus 15:30
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה הַ/כֹּהֵן֙ אֶת הָ/אֶחָ֣ד חַטָּ֔את וְ/אֶת הָ/אֶחָ֖ד עֹלָ֑ה וְ/כִפֶּ֨ר עָלֶ֤י/הָ הַ/כֹּהֵן֙ לִ/פְנֵ֣י יְהוָ֔ה מִ/זּ֖וֹב טֻמְאָתָֽ/הּ־־׃
translation:
  text: Then the priest shall offer one as a sin offering and the other as a burnt offering, and the priest shall make atonement for her before Yahweh because of the discharge of her uncleanness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering' (Hebrew חַטָּאת), emphasizing the offering's cleansing function in Levitical ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: shall offer
  alternatives:
  - shall make
  - shall prepare
  lexicon: HALOT
  rationale: Although the verb is broadly 'do/make,' in sacrificial context with the direct objects 'one ... sin offering' and 'the other ... burnt offering,' idiomatic English is 'offer.' This reflects cultic usage without over-paraphrasing.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the officiating cultic agent.
- source_word: הָאֶחָד ... חַטָּאת
  chosen: one as a sin offering
  alternatives:
  - the one as a purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the offering associated with sin/purification. In Levitical sacrificial context it clearly denotes the offering. 'Sin offering' is the conventional and still clear rendering; 'purification offering' is a viable alternative but less established in English Bible usage.
- source_word: וְאֶת־הָאֶחָד עֹלָה
  chosen: and the other as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering. 'The other' matches the distributive sense of the repeated הָאֶחָד in context.
- source_word: וְכִפֶּר עָלֶיהָ
  chosen: and the priest shall make atonement for her
  alternatives:
  - and the priest shall purge her
  - and the priest shall make expiation for her
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.' This preserves the cultic-theological force in accessible English. 'For her' reflects עָלֶיהָ naturally in this context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal phrasing. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the formal cultic setting.
- source_word: מִזּוֹב טֻמְאָתָהּ
  chosen: because of her unclean discharge
  alternatives:
  - from the discharge of her uncleanness
  - for the discharge of her impurity
  lexicon: HALOT
  rationale: זוֹב denotes a bodily discharge/flow, and the construct with טֻמְאָה specifies its impurity. The preposition מִן after כפר can indicate the source/cause from which atonement-cleansing is made. 'Because of her unclean discharge' is natural English that preserves the relation without awkward literalism.
