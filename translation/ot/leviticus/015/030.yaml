  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can emphasize purification in priestly texts, but the verse plainly refers to the sacrificial category. 'Sin offering' remains the clearest default in English while the alternative is preserved in a footnote for auditability.
