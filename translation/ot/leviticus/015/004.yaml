theological_decisions:
- issue: Nature of impurity language
  chosen_reading: ritual impurity expressed as 'unclean'
  alternative_readings:
  - ceremonially unclean
  - defiled
  rationale: The verse concerns Levitical purity status, not necessarily moral guilt.
    'Unclean' is the most direct and established English rendering; 'ceremonially
    unclean' is interpretively clarifying but adds a modifier not present in the Hebrew,
    while 'defiled' can imply moral corruption more strongly than the context warrants.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal claims.'
- issue: Gender representation of the subject
  chosen_reading: 'explicitly male: ''the man with the discharge'' / ''he'''
  alternative_readings:
  - the one with the discharge / they
  rationale: The Hebrew uses masculine singular forms and the surrounding passage
    addresses a male bodily discharge. Per the gender-accurate policy, the translation
    should preserve the masculine reference rather than neutralize it.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
