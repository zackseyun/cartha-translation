id: LEV.15.4
reference: Leviticus 15:4
source:
  edition: WLC
  text: כָּל הַ/מִּשְׁכָּ֗ב אֲשֶׁ֨ר יִשְׁכַּ֥ב עָלָ֛י/ו הַ/זָּ֖ב יִטְמָ֑א וְ/כָֽל
    הַ/כְּלִ֛י אֲשֶׁר יֵשֵׁ֥ב עָלָ֖י/ו יִטְמָֽא־־־׃
translation:
  text: Every bed on which the man with the discharge lies shall be unclean, and every
    vessel on which he sits shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every object on which he sits.' The Hebrew word can refer broadly to
      an article, utensil, or vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּשְׁכָּב
  chosen: bed
  alternatives:
  - place of lying
  - couch
  lexicon: HALOT
  rationale: מִשְׁכָּב denotes a place for lying down. 'Bed' is the most natural modern
    English equivalent here and fits the ritual-impurity context without unnecessary
    stiffness.
- source_word: הַזָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the discharge sufferer
  lexicon: HALOT
  rationale: זָב is the substantival participle from זוּב, referring to a male experiencing
    a bodily discharge in this context. Rendering it as 'the man with the discharge'
    makes the referent explicit and readable in English, matching the masculine singular
    forms in the verse and immediate context.
- source_word: יִשְׁכַּב עָלָיו
  chosen: lies on which
  alternatives:
  - lies upon
  - shall lie on
  lexicon: HALOT
  rationale: The Hebrew relative clause literally says 'which he lies on.' English
    idiom prefers 'on which ... lies' or equivalent. Present-tense 'lies' works generically
    in legal material, while 'shall be' carries the result clause.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - is unclean
  - becomes unclean
  lexicon: HALOT
  rationale: טמא in the qal here states ritual impurity as the legal consequence.
    'Shall be unclean' is standard and clear in prescriptive/legal discourse, preserving
    the impurity category without overinterpreting process.
- source_word: הַכְּלִי
  chosen: vessel
  alternatives:
  - object
  - article
  - thing
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, utensil, vessel, implement'). In this context,
    something one can sit on is in view. 'Vessel' preserves the broad cultic/legal
    register better than the overly vague 'thing,' though the term is wider than containers
    in English.
- source_word: יֵשֵׁב עָלָיו
  chosen: he sits on which
  alternatives:
  - he sits upon
  - he may sit on
  lexicon: HALOT
  rationale: The verb ישׁב with עַל means 'sit on/upon.' The generic present suits
    the legal description of whatever object he uses for sitting.
