id: LEV.15.23
reference: Leviticus 15:23
source:
  edition: WLC
  text: וְ/אִ֨ם עַֽל הַ/מִּשְׁכָּ֜ב ה֗וּא א֧וֹ עַֽל הַ/כְּלִ֛י אֲשֶׁר הִ֥וא יֹשֶֽׁבֶת
    עָלָ֖י/ו בְּ/נָגְע/וֹ ב֑/וֹ יִטְמָ֖א עַד הָ/עָֽרֶב־־־־־־׃
translation:
  text: And if it is on the bed or on the item on which she sits, when he touches
    it he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'object' or 'vessel' for 'item' (Hebrew כְּלִי, a broad term for an article,
      implement, or vessel).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Retains the conjunction plus conditional particle. 'And if' reflects
    the Hebrew linkage to the preceding case law while remaining natural in English.
- source_word: עַל הַמִּשְׁכָּב
  chosen: on the bed
  alternatives:
  - upon the bed
  - on the couch
  lexicon: HALOT
  rationale: מִשְׁכָּב commonly denotes a bed or lying place. 'Bed' is the clearest
    modern English rendering in this purity-law context.
- source_word: הוּא
  chosen: it is
  alternatives:
  - he is
  - this is
  lexicon: HALOT
  rationale: The pronoun is masculine singular and here refers back to an implied
    object from context rather than a male person. English supplies 'it is' to make
    the clause intelligible.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Standard disjunctive conjunction.
- source_word: עַל הַכְּלִי
  chosen: on the item
  alternatives:
  - on the vessel
  - on the object
  - on the article
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement, vessel, or article. 'Item' preserves
    the breadth better than the narrower 'vessel' in this context.
- source_word: אֲשֶׁר הִוא יֹשֶׁבֶת עָלָיו
  chosen: on which she sits
  alternatives:
  - upon which she is sitting
  - that she sits on
  lexicon: HALOT
  rationale: A straightforward relative clause. Present English 'sits' adequately
    represents the Hebrew participial sense in legal prose.
- source_word: בְּנָגְעוֹ בוֹ
  chosen: when he touches it
  alternatives:
  - upon his touching it
  - when one touches it
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב conveys temporal circumstance:
    ''when he touches it.'' The 3ms suffix indicates a singular person in the legal
    scenario; ''he'' is gender-accurate to the Hebrew form.'
- source_word: יִטְמָא
  chosen: he shall be unclean
  alternatives:
  - he will be unclean
  - he becomes unclean
  lexicon: HALOT
  rationale: In legal material the imperfect has prescriptive/resultative force. 'Shall
    be unclean' fits English legal style and ritual-impurity context.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible; 'until the evening' mirrors the Hebrew article and
    the recurring formula in Leviticus.
