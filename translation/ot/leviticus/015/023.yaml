theological_decisions:
- issue: Nature of טָמֵא in Levitical purity law
  chosen_reading: ritual impurity, rendered simply as 'unclean'
  alternative_readings:
  - ceremonially unclean
  - defiled
  rationale: The verse concerns ritual status within purity legislation, not necessarily
    moral guilt. 'Unclean' is the standard, readable English term; 'ceremonially unclean'
    is interpretively accurate but heavier than the Hebrew wording and can be reserved
    for notes or broader context.
  doctrine_reference: Translation philosophy §6; preserve source-text plain sense
    without importing extra doctrinal claims.
