theological_decisions:
- issue: Rendering ritual purity terminology without implying moral guilt
  chosen_reading: Use 'unclean' and 'menstrual impurity' as ritual-status language
  alternative_readings:
  - Use 'impure' throughout
  - Use 'period' or 'menstruation' without explicit impurity language
  rationale: The verse concerns ceremonial uncleanness in Levitical law, not necessarily
    personal sinfulness. The chosen wording preserves the cultic category while remaining
    understandable in modern English.
  doctrine_reference: Translation philosophy §§1, 5, 6
