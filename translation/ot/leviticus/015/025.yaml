id: LEV.15.25
reference: Leviticus 15:25
source:
  edition: WLC
  text: וְ/אִשָּׁ֡ה כִּֽי יָזוּב֩ ז֨וֹב דָּמָ֜/הּ יָמִ֣ים רַבִּ֗ים בְּ/לֹא֙ עֶת נִדָּתָ֔/הּ
    א֥וֹ כִֽי תָז֖וּב עַל נִדָּתָ֑/הּ כָּל יְמֵ֞י ז֣וֹב טֻמְאָתָ֗/הּ כִּ/ימֵ֧י נִדָּתָ֛/הּ
    תִּהְיֶ֖ה טְמֵאָ֥ה הִֽוא־־־־־׃
translation:
  text: If a woman has a discharge of blood for many days, not at the time of her
    menstrual impurity, or if she has a discharge beyond her menstrual impurity, all
    the days of her unclean discharge she shall be unclean, as in the days of her
    menstrual impurity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the time of her menstruation.' The Hebrew term includes the
      state of ritual impurity associated with menstruation, not only the bleeding
      itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'if she has a discharge in addition to her menstrual impurity,' that
      is, extending beyond the normal menstrual period.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָזוּב / תָזוּב + זוֹב
  chosen: has a discharge / has a discharge beyond
  alternatives:
  - flows
  - has a flow
  - has an emission
  lexicon: HALOT
  rationale: The verb-noun combination from זוּב denotes an abnormal bodily flow/discharge.
    'Has a discharge' is natural modern English and preserves the ritual/medical sense
    without euphemistic paraphrase. 'Beyond' in the second clause reflects the preposition
    עַל in context as extension in addition to the normal period.
- source_word: דָּמָהּ
  chosen: of blood
  alternatives:
  - blood
  lexicon: HALOT
  rationale: The suffix marks 'her blood'; in idiomatic English after 'discharge'
    this is best rendered 'a discharge of blood.'
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - many days
  - a long time
  lexicon: HALOT
  rationale: Temporal duration is most clearly expressed in English with 'for many
    days.'
- source_word: בְּלֹא עֶת נִדָּתָהּ
  chosen: not at the time of her menstrual impurity
  alternatives:
  - outside the time of her menstruation
  - not during the time of her period
  lexicon: HALOT
  rationale: עֵת is 'time,' and נִדָּה in Leviticus refers not merely to menstruation
    biologically but to the associated state of ritual impurity. Rendering the phrase
    with 'menstrual impurity' preserves that cultic dimension.
- source_word: נִדָּה
  chosen: menstrual impurity
  alternatives:
  - menstruation
  - period
  - monthly impurity
  lexicon: HALOT
  rationale: In this legal context נִדָּה includes the impurity state connected with
    menstruation, not only the bleeding event itself. 'Menstrual impurity' keeps the
    ritual sense explicit and readable.
- source_word: עַל נִדָּתָהּ
  chosen: beyond her menstrual impurity
  alternatives:
  - in addition to her menstrual impurity
  - over her menstrual impurity
  lexicon: HALOT
  rationale: The preposition עַל here indicates extension beyond the normal menstrual
    period/state. 'Beyond' is concise and idiomatic.
- source_word: כָּל יְמֵי זֹב טֻמְאָתָהּ
  chosen: all the days of her unclean discharge
  alternatives:
  - all the days of the discharge of her impurity
  - all the days of her impure flow
  lexicon: HALOT
  rationale: The construct chain links the discharge with her impurity. 'Her unclean
    discharge' communicates both the flow and its ritually defiling status in clear
    English.
- source_word: טְמֵאָה
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: Levitical purity language is conventionally and accurately rendered 'unclean';
    this preserves the ritual category without implying moral evil.
- source_word: כִּימֵי נִדָּתָהּ
  chosen: as in the days of her menstrual impurity
  alternatives:
  - like the days of her menstruation
  - as during the days of her period
  lexicon: HALOT
  rationale: The comparison indicates that her status during the abnormal discharge
    matches her status during normal menstrual impurity. Repeating 'menstrual impurity'
    maintains lexical consistency with נִדָּה earlier in the verse.
