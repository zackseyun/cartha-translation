theological_decisions:
- issue: Purity terminology
  chosen_reading: Rendered טָהוֹר / טָמֵא as 'clean' / 'unclean' in ritual sense
  alternative_readings:
  - pure / impure
  rationale: In Leviticus 15 the concern is ceremonial status within Israel's purity
    system. 'Clean' and 'unclean' are the most established and accessible English
    equivalents, while avoiding the misleading implication that the text is speaking
    primarily of moral guilt.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve source
    meaning without importing doctrinal claims'
