id: LEV.15.8
reference: Leviticus 15:8
source:
  edition: WLC
  text: וְ/כִֽי יָרֹ֛ק הַ/זָּ֖ב בַּ/טָּה֑וֹר וְ/כִבֶּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם
    וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־׃
translation:
  text: And if the man with the discharge spits on a clean person, he shall wash his
    clothes and bathe in water, and he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on someone who is clean.' The Hebrew uses 'the clean one,' meaning a
      person who is ritually clean.
    reason: lexical_alternative
  - marker: b
    text: That is, ritually unclean until evening, not necessarily morally defiled.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִֽי
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case within the legal sequence. 'And if' preserves
    the connective force of ו plus conditional כִּי in context.
- source_word: יָרֹק
  chosen: spits
  alternatives:
  - spits on
  - expectoration
  lexicon: HALOT
  rationale: The verb means 'to spit.' English idiom requires the object relation
    to be expressed with 'on' when followed by a person, so the full clause is rendered
    'spits on a clean person.'
- source_word: הַזָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the discharge sufferer
  lexicon: HALOT
  rationale: Literally 'the one discharging' or 'the one with a discharge.' In this
    purity-law context, 'the man with the discharge' is natural English and matches
    the masculine singular referent of the surrounding legislation.
- source_word: בַּטָּהוֹר
  chosen: on a clean person
  alternatives:
  - on someone who is clean
  - on the clean one
  lexicon: HALOT
  rationale: טָהוֹר means 'clean' in ritual purity contexts, not merely physically
    clean. 'Person' is supplied for natural English because the adjective is substantivized
    in Hebrew.
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: he shall wash his clothes
  alternatives:
  - then he shall wash his garments
  lexicon: HALOT
  rationale: כִּבֶּס commonly refers to washing garments. 'Clothes' is more readable
    modern English than 'garments' while preserving the sense.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash in water
  - and bathe himself in water
  lexicon: HALOT
  rationale: רָחַץ in this ritual context refers to bodily washing. 'Bathe in water'
    communicates full-body washing more clearly than the generic 'wash.' The reflexive
    sense is implicit in English.
- source_word: וְטָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and he will be unclean
  lexicon: HALOT
  rationale: טָמֵא here denotes ritual impurity resulting from contact, not moral
    defilement. 'Shall be unclean' fits the legal register.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: A standard temporal formula in Leviticus for the duration of ritual impurity.
    The article is naturally represented in English as 'the evening.'
