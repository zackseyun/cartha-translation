id: LEV.15.32
reference: Leviticus 15:32
source:
  edition: WLC
  text: זֹ֥את תּוֹרַ֖ת הַ/זָּ֑ב וַ/אֲשֶׁ֨ר תֵּצֵ֥א מִמֶּ֛/נּוּ שִׁכְבַת זֶ֖רַע לְ/טָמְאָה
    בָֽ/הּ־־׃
translation:
  text: 'This is the law for the one with a discharge, and for him from whom an emission
    of semen goes out, making him unclean by it:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'This is the law of the one with a discharge, and of
      the one from whom semen is emitted, so that he becomes unclean by it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative introducing a summary statement; English idiom naturally
    supplies the copula.
- source_word: תּוֹרַת
  chosen: the law
  alternatives:
  - the instruction
  lexicon: HALOT
  rationale: In Leviticus, תּוֹרָה often denotes the prescribed legal instruction
    for a case. 'Law' fits the genre and context, while 'instruction' is possible
    but less idiomatic in this summary formula.
- source_word: הַזָּב
  chosen: the one with a discharge
  alternatives:
  - the man with a discharge
  - the discharging one
  lexicon: HALOT
  rationale: The participial noun refers to a person afflicted with a bodily discharge.
    'The one with a discharge' is clear modern English and avoids awkward literalism.
    'Man' is contextually possible here, but the Hebrew form itself is the condition-label;
    the male reference is already clear from the following clause about semen.
- source_word: וַאֲשֶׁר
  chosen: and for him from whom
  alternatives:
  - and whoever
  - and the one from whom
  lexicon: HALOT
  rationale: This relative construction links a second case to the summary formula.
    'And for him from whom' best prepares for the following verbal clause in natural
    English while preserving the personal reference.
- source_word: תֵּצֵא מִמֶּנּוּ
  chosen: an emission of semen goes out
  alternatives:
  - semen comes out from him
  - he has a seminal emission
  lexicon: HALOT
  rationale: The Hebrew is formally 'goes out from him.' The chosen rendering preserves
    the concrete imagery while remaining readable. 'He has a seminal emission' is
    smoother but slightly more interpretive.
- source_word: שִׁכְבַת זֶרַע
  chosen: an emission of semen
  alternatives:
  - seed of copulation
  - seminal emission
  lexicon: HALOT
  rationale: This idiom denotes seminal emission. 'An emission of semen' is clear,
    medically understandable, and avoids archaic euphemism like 'seed.'
- source_word: לְטָמְאָה
  chosen: making him unclean
  alternatives:
  - so as to make him unclean
  - for uncleanness
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose in context. 'Making him unclean'
    communicates the effect naturally in English.
- source_word: בָהּ
  chosen: by it
  alternatives:
  - through it
  - with it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the emission. 'By it' is
    concise and idiomatic for the means by which uncleanness is incurred.
