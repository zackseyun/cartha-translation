id: LEV.15.6
reference: Leviticus 15:6
source:
  edition: WLC
  text: וְ/הַ/יֹּשֵׁב֙ עַֽל הַ/כְּלִ֔י אֲשֶׁר יֵשֵׁ֥ב עָלָ֖י/ו הַ/זָּ֑ב יְכַבֵּ֧ס
    בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־־׃
translation:
  text: Whoever sits on the object on which the man with the discharge sat shall wash
    his clothes and bathe in water, and he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vessel' or 'the article'; the Hebrew term is broad for an item or
      object.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיֹּשֵׁב
  chosen: Whoever sits
  alternatives:
  - And the one who sits
  - Anyone who sits
  lexicon: HALOT
  rationale: The Hebrew is a substantival participle with prefixed conjunction and
    article, literally 'and the one sitting.' In English law-like material, 'whoever
    sits' is natural and preserves the generic force.
- source_word: הַכְּלִי
  chosen: the object
  alternatives:
  - the vessel
  - the article
  - the thing
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article, utensil, vessel, or object. In
    this context it refers generally to something sat upon, not necessarily a specialized
    vessel, so 'object' best preserves the breadth in readable English.
- source_word: אֲשֶׁר יֵשֵׁב עָלָיו
  chosen: on which ... sat
  alternatives:
  - that ... sat on
  - upon which ... sat
  lexicon: HALOT
  rationale: The relative clause identifies the object by prior contact. English past
    tense 'sat' is idiomatic here even though the Hebrew imperfect can be contextually
    modal or relative; it refers to the discharge-affected man's sitting on it.
- source_word: הַזָּב
  chosen: the man with the discharge
  alternatives:
  - the one with the discharge
  - the discharge sufferer
  - the man with a bodily discharge
  lexicon: HALOT
  rationale: זָב here is the substantivized participle used throughout the chapter
    for a male with a genital/bodily discharge. 'The man with the discharge' makes
    the referent explicit in English and fits the masculine context of Leviticus 15:2-15.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  - shall launder his clothes
  lexicon: HALOT
  rationale: כִּבֵּס commonly refers to washing garments. 'Shall wash his clothes'
    preserves the legal instruction in natural modern English.
- source_word: וְרָחַץ בַּמַּיִם
  chosen: and bathe in water
  alternatives:
  - and wash in water
  - and bathe himself in water
  lexicon: HALOT
  rationale: רָחַץ in purity contexts often denotes washing the body. 'Bathe in water'
    communicates bodily washing more clearly than simply 'wash,' while staying close
    to the Hebrew.
- source_word: וְטָמֵא עַד הָעָרֶב
  chosen: and he shall be unclean until the evening
  alternatives:
  - and be unclean until evening
  - and he will be unclean until evening
  lexicon: HALOT
  rationale: טָמֵא here states ritual impurity status resulting from contact. 'Shall
    be unclean until the evening' preserves the legal register and temporal limit.
