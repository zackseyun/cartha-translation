theological_decisions:
- issue: Nature of impurity language
  chosen_reading: ritual impurity is expressed simply as 'unclean' without importing
    moral guilt
  alternative_readings:
  - ceremonially unclean
  - defiled
  rationale: The context is Levitical purity law, not necessarily moral transgression.
    'Unclean' is the standard concise rendering; adding 'ceremonially' would interpret
    rather than translate, while 'defiled' may overstate the sense.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gender reference of הַזָּב and subsequent pronouns
  chosen_reading: explicitly male referent in the relative clause and masculine singular
    pronouns retained as 'the man... he'
  alternative_readings:
  - the one with the discharge... they
  rationale: The chapter section addresses a male discharge, and the Hebrew forms
    are masculine singular. This follows the gender-accurate principle rather than
    neutralizing the reference.
  doctrine_reference: Translation philosophy §4
