id: LEV.19.27
reference: Leviticus 19:27
source:
  edition: WLC
  text: לֹ֣א תַקִּ֔פוּ פְּאַ֖ת רֹאשְׁ/כֶ֑ם וְ/לֹ֣א תַשְׁחִ֔ית אֵ֖ת פְּאַ֥ת זְקָנֶֽ/ךָ׃
translation:
  text: You shall not round off the side hair of your heads, and you shall not ruin
    the edge of your beard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corners of your hair/head.' The Hebrew term means 'edge,' 'side,'
      or 'corner.'
    reason: lexical_alternative
  - marker: b
    text: This likely refers to shaving or trimming the hair at the sides of the head
      in a rounded fashion.
    reason: cultural_note
  - marker: c
    text: Or 'destroy,' 'mar,' or 'disfigure the edge of your beard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַקִּפוּ
  chosen: round off
  alternatives:
  - shave around
  - cut in a circle
  lexicon: HALOT
  rationale: The Hiphil of נקף here refers to cutting the hair in a rounded manner
    around the head's edge. 'Round off' is concise, natural English and preserves
    the concrete action better than a more interpretive paraphrase.
- source_word: פְּאַת
  chosen: side hair / edge
  alternatives:
  - corners
  - side
  lexicon: HALOT
  rationale: פֵּאָה literally denotes an edge, side, or extremity. In the first clause,
    'side hair' makes explicit that the reference is to the hair at the sides of the
    head; in the second, 'edge' works idiomatically with 'beard.' The traditional
    'corners' is possible but less transparent in contemporary English.
- source_word: רֹאשְׁכֶם
  chosen: your heads
  alternatives:
  - your head
  lexicon: HALOT
  rationale: The Hebrew uses a plural possessive with a collective sense addressed
    to the community. 'Your heads' reflects the form directly and reads naturally
    in English legal style.
- source_word: תַשְׁחִית
  chosen: ruin
  alternatives:
  - mar
  - destroy
  - disfigure
  lexicon: HALOT
  rationale: The Hiphil of שׁחת commonly means destroy, ruin, or spoil. In the context
    of beard grooming, 'ruin' communicates prohibited damaging alteration without
    over-specifying the exact method. 'Destroy' is possible but sounds overly absolute
    in English for hair.
- source_word: זְקָנֶךָ
  chosen: your beard
  lexicon: HALOT
  rationale: Standard rendering of זָקָן in this context. The singular suffix in the
    second clause is retained as singular in English.
- source_word: לֹא ... וְלֹא
  chosen: You shall not ... and you shall not ...
  alternatives:
  - Do not ... and do not ...
  rationale: The verse is legal instruction. 'You shall not' preserves the prohibitive
    force in covenant-law style better than the more colloquial imperative 'Do not.'
