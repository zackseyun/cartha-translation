theological_decisions:
- issue: Nature of the prohibition
  chosen_reading: A concrete prohibition against specific hair and beard cutting practices,
    without importing a full explanation of motive into the main text.
  alternative_readings:
  - A ban tied specifically to pagan mourning rites
  - A broader ban on certain grooming styles associated with surrounding nations
  rationale: The Hebrew text itself states the prohibited actions but does not explicitly
    specify the rationale in this verse. To preserve theological and interpretive
    restraint, the translation keeps the command concrete and leaves broader cultural
    explanations to footnotes or commentary rather than embedding them in the wording.
  doctrine_reference: Translation philosophy §1, §3
