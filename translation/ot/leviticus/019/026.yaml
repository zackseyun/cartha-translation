theological_decisions:
- issue: How specifically to render the obscure prohibition עַל הַדָּם
  chosen_reading: Retain a relatively literal rendering, 'over the blood,' in the
    main text
  alternative_readings:
  - with the blood
  - while the blood is still in it
  - at a blood-rite meal
  rationale: 'The exact referent of the prohibition is debated: it may concern eating
    meat with blood, participation in a blood-related ritual meal, or some other cultic
    practice. Following the translation philosophy of preserving tension rather than
    resolving uncertain interpretation, the main text keeps the Hebrew expression
    relatively transparent and preserves more specific interpretive options in a footnote.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
