id: LEV.19.26
reference: Leviticus 19:26
source:
  edition: WLC
  text: לֹ֥א תֹאכְל֖וּ עַל הַ/דָּ֑ם לֹ֥א תְנַחֲשׁ֖וּ וְ/לֹ֥א תְעוֹנֵֽנוּ־׃
translation:
  text: You shall not eat over the blood. You shall not practice divination or interpret
    omens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the blood'; the Hebrew expression is difficult and may refer to
      eating meat with blood in it or to participating in a blood-related ritual meal.
    reason: alternative_reading
  - marker: b
    text: Or 'practice soothsaying' or, more traditionally, 'observe times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תֹאכְלוּ
  chosen: You shall not eat
  alternatives:
  - You must not eat
  - Do not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is naturally rendered as
    a prohibition. 'You shall not eat' preserves the covenant-law register in clear
    modern English.
- source_word: עַל הַדָּם
  chosen: over the blood
  alternatives:
  - with the blood
  - on account of the blood
  - by the blood
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. A more interpretive rendering
    such as 'with the blood' risks resolving the exact practice prohibited. 'Over
    the blood' keeps the Hebrew preposition על transparent while remaining intelligible,
    preserving ambiguity in the main text.
- source_word: תְנַחֲשׁוּ
  chosen: practice divination
  alternatives:
  - divine
  - practice soothsaying
  lexicon: HALOT
  rationale: The verb נחשׁ in the piel refers to divinatory practice. 'Practice divination'
    is natural modern English and makes the prohibited occult activity explicit without
    archaic wording.
- source_word: תְעוֹנֵנוּ
  chosen: interpret omens
  alternatives:
  - practice soothsaying
  - tell fortunes
  - observe times
  lexicon: HALOT
  rationale: The verb ענן in this stem is traditionally associated with omen-reading
    or soothsaying. 'Interpret omens' communicates the likely sense in accessible
    English. 'Observe times' reflects older tradition but is obscure in modern English
    and likely too literal for the idiom.
