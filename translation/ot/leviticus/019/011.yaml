id: LEV.19.11
reference: Leviticus 19:11
source:
  edition: WLC
  text: לֹ֖א תִּגְנֹ֑בוּ וְ/לֹא תְכַחֲשׁ֥וּ וְ/לֹֽא תְשַׁקְּר֖וּ אִ֥ישׁ בַּ/עֲמִיתֽ/וֹ־־׃
translation:
  text: You shall not steal, and you shall not deal falsely, and you shall not lie
    to one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a man with his fellow' or 'each man to his neighbor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְנֹבוּ
  chosen: you shall not steal
  alternatives:
  - you must not steal
  - do not steal
  lexicon: HALOT
  rationale: Qal imperfect 2mp under לֹא in legal/instructional context functions
    as prohibition. 'Steal' is the plain lexical sense of גנב and should remain direct
    rather than expanded.
- source_word: תְכַחֲשׁוּ
  chosen: you shall not deal falsely
  alternatives:
  - you shall not deceive
  - you shall not deny falsely
  lexicon: HALOT
  rationale: Piel of כחש can denote acting deceptively, denying, or dealing falsely.
    In this triad of social prohibitions, 'deal falsely' captures dishonest conduct
    broadly without narrowing it only to verbal denial.
- source_word: תְשַׁקְּרוּ
  chosen: you shall not lie
  alternatives:
  - you shall not act falsely
  - you shall not speak falsely
  lexicon: HALOT
  rationale: Piel of שקר commonly denotes lying or acting falsely. Because the following
    phrase marks the interpersonal object, 'lie' is the most natural modern English
    rendering and preserves the verbal force.
- source_word: אִישׁ בַּעֲמִיתוֹ
  chosen: to one another
  alternatives:
  - each man to his neighbor
  - a man against his fellow
  - each one to his associate
  lexicon: HALOT
  rationale: Literally 'a man with/against his עמית.' The phrase is distributive and
    reciprocal in context. 'To one another' communicates the interpersonal prohibition
    in natural English, while avoiding an overly wooden repetition. The masculine
    singular אִישׁ is representative/generic here.
- source_word: עֲמִית
  chosen: one another
  alternatives:
  - neighbor
  - fellow
  lexicon: HALOT
  rationale: עמית refers to a fellow member of the community, associate, or neighbor.
    Because English already has the reciprocal construction from אִישׁ ... עֲמִיתוֹ,
    rendering the whole phrase as 'one another' best captures the sense idiomatically.
