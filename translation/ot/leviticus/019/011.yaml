theological_decisions:
- issue: Gendered distributive expression אִישׁ ... עֲמִיתוֹ
  chosen_reading: Rendered inclusively as 'one another' in the main text
  alternative_readings:
  - each man to his neighbor
  - a man to his fellow
  rationale: The Hebrew uses a grammatically masculine singular distributive expression
    with representative force, not a male-only restriction. Per the doctrine's gender-accurate
    principle, English should match the source intent rather than preserve masculine
    form where it is generic.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
