theological_decisions:
- issue: Rendering of צֶדֶק in a legal-ethical context
  chosen_reading: with righteousness
  alternative_readings:
  - with justice
  rationale: The Hebrew noun carries both moral and judicial dimensions. Following
    the project's principle of preserving theological tension rather than collapsing
    it, the main text keeps 'righteousness' while a footnote preserves 'with justice'
    as a viable contextual alternative.
