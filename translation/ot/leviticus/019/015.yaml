id: LEV.19.15
reference: Leviticus 19:15
source:
  edition: WLC
  text: לֹא תַעֲשׂ֥וּ עָ֨וֶל֙ בַּ/מִּשְׁפָּ֔ט לֹא תִשָּׂ֣א פְנֵי דָ֔ל וְ/לֹ֥א תֶהְדַּ֖ר
    פְּנֵ֣י גָד֑וֹל בְּ/צֶ֖דֶק תִּשְׁפֹּ֥ט עֲמִיתֶֽ/ךָ־־־׃
translation:
  text: You shall not commit injustice in judgment. You shall not show partiality
    to the poor, nor honor the face of the great; with righteousness you shall judge
    your neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with justice you shall judge your neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew idioms literally read 'lift up the face of the poor' and 'honor the
      face of the great,' meaning to show favoritism or deferential partiality in
      court.
    reason: cultural_note
lexical_decisions:
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  - perversion
  lexicon: HALOT
  rationale: In legal context with בַּמִּשְׁפָּט ('in judgment/justice'), עָוֶל refers
    to unjust action or perversion of justice. 'Injustice' is clear modern English
    and fits the judicial setting better than the broader 'wrongdoing'.
- source_word: בַּמִּשְׁפָּט
  chosen: in judgment
  alternatives:
  - in justice
  - in legal proceedings
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes the sphere of judicial decision-making. 'In judgment'
    preserves the formal legal sense while remaining idiomatic.
- source_word: תִשָּׂא פְנֵי
  chosen: show partiality to
  alternatives:
  - lift up the face of
  - favor
  lexicon: HALOT
  rationale: The idiom 'lift the face' means to show favor or partiality. 'Show partiality
    to' makes the judicial implication explicit in natural English.
- source_word: דָל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דָל commonly denotes one who is poor or socially weak. In this legal
    prohibition, 'the poor' is the most direct and conventional rendering.
- source_word: תֶהְדַּר פְּנֵי
  chosen: honor the face of
  alternatives:
  - defer to
  - show partiality to
  - honor
  lexicon: HALOT
  rationale: The verb with 'face' forms a parallel idiom to the previous clause, warning
    against preferential treatment of the socially prominent. I retained 'honor the
    face of' in the main text to preserve the Hebrew imagery while keeping the sense
    understandable.
- source_word: גָדוֹל
  chosen: the great
  alternatives:
  - the mighty
  - the prominent
  - the rich
  lexicon: HALOT
  rationale: גָדוֹל here refers to a person of high status or importance, not merely
    physical greatness. 'The great' preserves the broad social sense without narrowing
    it only to wealth or power.
- source_word: בְּצֶדֶק
  chosen: with righteousness
  alternatives:
  - righteously
  - with justice
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. 'With righteousness' preserves
    the noun form and moral-judicial weight; 'with justice' is possible but less closely
    tied to the Hebrew wording.
- source_word: תִּשְׁפֹּט
  chosen: you shall judge
  alternatives:
  - you shall render judgment for
  lexicon: HALOT
  rationale: A straightforward rendering of the judicial verb שׁפט. The future-like
    imperative force is well represented by 'you shall judge' in this legal instruction.
- source_word: עֲמִיתֶךָ
  chosen: your neighbor
  alternatives:
  - your fellow
  - your associate
  lexicon: HALOT
  rationale: עָמִית refers to one's fellow member of the community. 'Your neighbor'
    is natural English and aligns with the broader Leviticus 19 context, though it
    should be understood as covenant-community fellow rather than merely geographic
    proximity.
