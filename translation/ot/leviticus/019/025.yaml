id: LEV.19.25
reference: Leviticus 19:25
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָ֣ה הַ/חֲמִישִׁ֗ת תֹּֽאכְלוּ֙ אֶת פִּרְי֔/וֹ לְ/הוֹסִ֥יף לָ/כֶ֖ם
    תְּבוּאָת֑/וֹ אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: And in the fifth year you may eat its fruit, so that it may increase its produce
    for you. I am the LORD your God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבַשָּׁנָה הַחֲמִישִׁת
  chosen: And in the fifth year
  alternatives:
  - But in the fifth year
  - In the fifth year
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'And
    in' in legal/instructional sequence. 'But' is possible contextually, but simple
    coordination best reflects the Hebrew flow from the prior years' restrictions
    to the fifth year's permission.
- source_word: תֹּאכְלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you will eat
  lexicon: HALOT
  rationale: The imperfect 2mp in this legal context expresses permission/allowance
    after prior prohibition, not merely future prediction. 'You may eat' communicates
    the legal force in natural English better than the more wooden 'you shall eat.'
- source_word: אֶת־פִּרְיוֹ
  chosen: its fruit
  alternatives:
  - its produce
  lexicon: HALOT
  rationale: פְּרִי commonly means 'fruit' and here refers specifically to the tree's
    fruit. 'Its' reflects the 3ms suffix referring back to the tree/planting in context.
- source_word: לְהוֹסִיף
  chosen: so that it may increase
  alternatives:
  - to add
  - to make increase
  - to increase
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose/result: eating in
    the fifth year is connected to increased yield. Rendering with ''so that'' makes
    the purposive sense explicit in idiomatic English.'
- source_word: תְּבוּאָתוֹ
  chosen: its produce
  alternatives:
  - its yield
  - its harvest
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce/yield. 'Produce' is broad and natural here,
    avoiding the narrower 'harvest' while distinguishing it from the earlier 'fruit.'
    The suffix is rendered 'its,' again referring to the tree/planting.
- source_word: אֲנִי יְהוָה אֱלֹהֵיכֶם
  chosen: I am the LORD your God
  alternatives:
  - I, the LORD, am your God
  lexicon: HALOT
  rationale: This covenant formula is standard in Leviticus. Per doctrine guidance,
    יְהוָה is rendered 'the LORD.' The chosen English preserves the solemn self-identification
    and legal-theological grounding of the command.
