theological_decisions:
- issue: Rendering repeated צֶדֶק in a commercial-law context
  chosen_reading: honest
  alternative_readings:
  - just
  - righteous
  - accurate
  rationale: Although צֶדֶק often carries the broader sense 'righteousness/justice,'
    in this verse it modifies scales, weights, and measures. 'Honest' best captures
    the ethical demand in trade in readable modern English. This does not deny the
    broader semantic field; rather, it applies it contextually.
  doctrine_reference: Translation philosophy §§5–6
- issue: Rendering ancient units of measure
  chosen_reading: retain 'ephah' and 'hin'
  alternative_readings:
  - dry measure
  - liquid measure
  - approximate modern equivalents
  rationale: Optimal equivalence here favors preserving the source terms for specific
    ancient units rather than replacing them with vague or misleading modern approximations.
    Readability is maintained because the verse's point does not depend on exact conversion
    values.
  doctrine_reference: Translation philosophy §§1, 6
