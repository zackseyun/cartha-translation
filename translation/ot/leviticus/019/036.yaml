id: LEV.19.36
reference: Leviticus 19:36
source:
  edition: WLC
  text: מֹ֧אזְנֵי צֶ֣דֶק אַבְנֵי צֶ֗דֶק אֵ֥יפַת צֶ֛דֶק וְ/הִ֥ין צֶ֖דֶק יִהְיֶ֣ה לָ/כֶ֑ם
    אֲנִי֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם אֲשֶׁר הוֹצֵ֥אתִי אֶתְ/כֶ֖ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: You shall have honest scales, honest weights, an honest ephah, and an honest
    hin. I am the LORD your God, who brought you out of the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'just scales, just weights'; the repeated Hebrew word is צֶדֶק, often
      'righteousness' or 'justice,' here applied to commercial measures.
    reason: lexical_alternative
  - marker: b
    text: An ephah was an ancient dry measure.
    reason: cultural_note
  - marker: c
    text: A hin was an ancient liquid measure.
    reason: cultural_note
lexical_decisions:
- source_word: מֹאזְנֵי צֶדֶק
  chosen: honest scales
  alternatives:
  - just scales
  - righteous scales
  - accurate balances
  lexicon: HALOT
  rationale: מֹאזְנַיִם denotes scales/balances used for weighing. צֶדֶק here describes
    conformity to what is right in commerce. 'Honest scales' is idiomatic modern English
    that preserves the ethical force without sounding wooden; 'just' is possible but
    less natural in this commercial context.
- source_word: אַבְנֵי צֶדֶק
  chosen: honest weights
  alternatives:
  - just weights
  - righteous stones
  lexicon: HALOT
  rationale: אַבְנֵי literally means 'stones,' referring to stone weights used in
    trade. Rendering the metonymic sense as 'weights' communicates the referent clearly
    in English. 'Honest' matches the repeated commercial-ethical sense of צֶדֶק across
    the verse.
- source_word: אֵיפַת צֶדֶק
  chosen: an honest ephah
  alternatives:
  - a just ephah
  - an accurate ephah-measure
  lexicon: HALOT
  rationale: אֵיפָה is a dry measure. Retaining 'ephah' transliterates the ancient
    unit rather than flattening it into an approximate modern equivalent, preserving
    source-culture specificity. The adjective phrase again conveys fairness in measurement.
- source_word: וְהִין צֶדֶק
  chosen: and an honest hin
  alternatives:
  - and a just hin
  - and an accurate liquid measure
  lexicon: HALOT
  rationale: הִין is a liquid measure. As with 'ephah,' transliteration preserves
    the ancient unit. 'Honest' keeps the repeated cadence and ethical-commercial emphasis
    of צֶדֶק.
- source_word: יִהְיֶה לָכֶם
  chosen: You shall have
  alternatives:
  - shall be for you
  - must belong to you
  lexicon: HALOT
  rationale: Literally 'shall be for you,' but in English legal/instructional style
    this is best rendered 'You shall have,' expressing requirement and possession
    naturally.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name יְהוָה is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods (not contextually viable)
  lexicon: HALOT
  rationale: In covenant formula with יְהוָה, the plural form functions as the singular
    'God.' 'Your God' is the standard and contextually correct rendering.
- source_word: הוֹצֵאתִי אֶתְכֶם מֵאֶרֶץ מִצְרַיִם
  chosen: who brought you out of the land of Egypt
  alternatives:
  - who brought you forth from the land of Egypt
  lexicon: HALOT
  rationale: This is the standard exodus formula. 'Brought you out of the land of
    Egypt' is natural modern English and preserves the covenant-grounding motivation
    for the command.
