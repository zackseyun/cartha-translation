- issue: Rendering the parental command's affective force
  chosen_reading: fear his mother and his father
  alternative_readings:
  - revere his mother and his father
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Gender representation in the opening distributive singular
  chosen_reading: Each man
  alternative_readings:
  - Each person
  - Everyone
  rationale: The Hebrew uses masculine singular אִישׁ distributively. Per the gender-accurate policy, the translation preserves the representative masculine form rather than neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4
