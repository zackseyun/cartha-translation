theological_decisions:
- issue: Rendering the parental command's affective force
  chosen_reading: fear his mother and his father
  alternative_readings:
  - revere his mother and his father
  rationale: The verse links reverence toward parents with Sabbath-keeping under the
    covenant formula 'I am the LORD your God.' Using 'fear' preserves the lexical
    and theological weight of ירא without reducing it to mere respect. The contextual
    sense includes reverence, but the stronger term is retained in the main text.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Gender representation in the opening distributive singular
  chosen_reading: Each man
  alternative_readings:
  - Each person
  - Everyone
  rationale: The Hebrew uses masculine singular אִישׁ distributively. Per the gender-accurate
    policy, the translation preserves the representative masculine form rather than
    neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4
