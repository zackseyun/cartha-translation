id: LEV.19.3
reference: Leviticus 19:3
source:
  edition: WLC
  text: אִ֣ישׁ אִמּ֤/וֹ וְ/אָבִי/ו֙ תִּירָ֔אוּ וְ/אֶת שַׁבְּתֹתַ֖/י תִּשְׁמֹ֑רוּ אֲנִ֖י
    יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: Each man shall fear his mother and his father, and you shall keep my Sabbaths.
    I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Each person'; Hebrew 'each man' uses a masculine singular form distributively
      for the community.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall revere.' The Hebrew verb can denote fear in the sense of reverence
      or awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - Every man
  - Each person
  lexicon: HALOT
  rationale: The singular noun introduces a distributive command addressed to the
    community. 'Each man' preserves the Hebrew's masculine singular representative
    force in keeping with the gender-accurate policy. 'Each person' is possible in
    English sense, but would mute the source-form's masculine wording.
- source_word: אִמּוֹ וְאָבִיו
  chosen: his mother and his father
  alternatives:
  - his mother and father
  - his parents
  lexicon: HALOT
  rationale: The Hebrew explicitly names mother before father. The translation preserves
    both the individual kinship terms and their order, rather than collapsing them
    into 'parents.' The unusual order may be rhetorically significant and should remain
    visible.
- source_word: תִּירָאוּ
  chosen: shall fear
  alternatives:
  - shall revere
  - shall stand in awe of
  lexicon: HALOT
  rationale: The verb ירא commonly denotes fear/reverence. 'Fear' is the more direct
    lexical equivalent and preserves the stronger covenantal-ethical force; English
    readers may understand it here as reverential fear in context. 'Revere' is interpretive
    and somewhat softer, so it is preserved as an alternative rather than used in
    the main text.
- source_word: שַׁבְּתֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: The plural form is explicit in Hebrew and should be retained. 'My Sabbaths'
    preserves both the plurality and the divine possessive, reflecting the covenantal
    framing of sacred times belonging to YHWH.
- source_word: תִּשְׁמֹרוּ
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר has a broad semantic range including keep, observe, guard. With
    Sabbaths, 'keep' is idiomatic modern English and preserves the covenantal sense
    of careful observance without over-paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with YHWH and a singular
    referent functions as Israel's God. 'Your God' correctly reflects the syntax and
    sense in this covenant formula.
