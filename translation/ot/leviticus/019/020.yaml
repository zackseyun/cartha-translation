theological_decisions:
- issue: Legal status of נֶחֱרֶפֶת לְאִישׁ
  chosen_reading: designated for a man
  alternative_readings:
  - betrothed to a man
  - promised to a man
  rationale: The verse distinguishes this case from adultery involving a fully free
    betrothed woman, since the woman here remains unredeemed and unfreed. Rendering
    the phrase too strongly as formal betrothal could blur that legal distinction.
    The chosen wording preserves the relational commitment while leaving room for
    the woman's incomplete legal status.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Meaning of בִּקֹּרֶת
  chosen_reading: there shall be an inquiry
  alternative_readings:
  - there shall be punishment
  - there shall be compensation
  rationale: Because the noun is rare and disputed, the translation preserves ambiguity
    rather than forcing a specific penal theory into the text. An alternative is preserved
    in a footnote per the doctrine's instruction to preserve genuine ambiguity.
  doctrine_reference: Translation philosophy §3
