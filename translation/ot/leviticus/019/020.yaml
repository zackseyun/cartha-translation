id: LEV.19.20
reference: Leviticus 19:20
source:
  edition: WLC
  text: וְ֠/אִישׁ כִּֽי יִשְׁכַּ֨ב אֶת אִשָּׁ֜ה שִׁכְבַת זֶ֗רַע וְ/הִ֤וא שִׁפְחָה֙
    נֶחֱרֶ֣פֶת לְ/אִ֔ישׁ וְ/הָפְדֵּה֙ לֹ֣א נִפְדָּ֔תָה א֥וֹ חֻפְשָׁ֖ה לֹ֣א נִתַּן
    לָ֑/הּ בִּקֹּ֧רֶת תִּהְיֶ֛ה לֹ֥א יוּמְת֖וּ כִּי לֹ֥א חֻפָּֽשָׁה־־־־־׃
translation:
  text: If a man lies with a woman and has an emission of semen, and she is a slave
    woman designated for a man, but she has not been redeemed or given her freedom,
    there shall be an inquiry; they shall not be put to death, because she had not
    been freed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'betrothed to a man' or 'pledged to a man.' The Hebrew likely indicates
      that the slave woman is assigned or promised to a man, though her legal status
      is not that of a fully free wife.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'inquiry' is rare and uncertain; it may also mean
      'punishment' or 'compensation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: Gender-accurate singular human male is the plain sense here in legal
    casuistic style; 'a man' matches the Hebrew and the doctrine's gender-accurate
    principle.
- source_word: יִשְׁכַּב אֶת אִשָּׁה שִׁכְבַת זֶרַע
  chosen: lies with a woman and has an emission of semen
  alternatives:
  - lies sexually with a woman
  - has sexual intercourse with a woman
  lexicon: HALOT
  rationale: The idiom literally combines 'lie' with 'lying of seed/semen.' English
    needs both the sexual act and the semen-emission nuance. This rendering preserves
    the legal specificity better than a simple euphemism.
- source_word: שִׁפְחָה
  chosen: slave woman
  alternatives:
  - female slave
  - servant girl
  lexicon: HALOT
  rationale: The bonded status is salient in this law, so 'slave woman' is preferred
    over softer renderings like 'servant,' in line with the translation philosophy's
    preference to preserve bonded status where significant.
- source_word: נֶחֱרֶפֶת לְאִישׁ
  chosen: designated for a man
  alternatives:
  - betrothed to a man
  - pledged to a man
  lexicon: HALOT
  rationale: This participle is difficult and likely indicates that the slave woman
    is assigned/promised to a man, but not in the full legal status of a free betrothed
    woman. 'Designated for a man' preserves the relation without overstating it as
    a full marriage betrothal.
- source_word: וְהָפְדֵּה לֹא נִפְדָּתָה
  chosen: she has not been redeemed
  alternatives:
  - she has not been ransomed
  - her redemption has not been effected
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the statement that
    redemption has not actually taken place. 'Redeemed' is idiomatic and fits the
    legal-economic context.
- source_word: חֻפְשָׁה לֹא נִתַּן לָהּ
  chosen: given her freedom
  alternatives:
  - freedom has not been given to her
  - manumission has not been granted to her
  lexicon: HALOT
  rationale: The noun denotes freedom/liberation from slave status. 'Given her freedom'
    is natural modern English while preserving the legal sense.
- source_word: בִּקֹּרֶת
  chosen: an inquiry
  alternatives:
  - punishment
  - compensation
  - investigation
  lexicon: HALOT
  rationale: This rare term is notoriously uncertain. 'Inquiry' best captures the
    likely sense of official review/examination without importing a more specific
    penalty not explicit in the word itself. Because of the uncertainty, alternatives
    are preserved in a footnote.
- source_word: לֹא יוּמְתוּ
  chosen: they shall not be put to death
  alternatives:
  - they shall not die
  - they shall not be executed
  lexicon: HALOT
  rationale: The passive/causative legal sense is best represented by 'be put to death,'
    which fits judicial context.
- source_word: כִּי לֹא חֻפָּשָׁה
  chosen: because she had not been freed
  alternatives:
  - because she was not free
  - because she had not received her freedom
  lexicon: HALOT
  rationale: The reason given for the lesser penalty is her continued slave status.
    'Had not been freed' clearly ties back to the prior clause about freedom not being
    given.
