id: LEV.19.13
reference: Leviticus 19:13
source:
  edition: WLC
  text: לֹֽא תַעֲשֹׁ֥ק אֶת רֵֽעֲ/ךָ֖ וְ/לֹ֣א תִגְזֹ֑ל לֹֽא תָלִ֞ין פְּעֻלַּ֥ת שָׂכִ֛יר
    אִתְּ/ךָ֖ עַד בֹּֽקֶר־־־־׃
translation:
  text: You shall not oppress your neighbor or rob him. The wages of a hired worker
    shall not remain with you until morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The pay of a hired laborer shall not stay overnight with you until
      morning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשֹׁק
  chosen: oppress
  alternatives:
  - defraud
  - exploit
  lexicon: HALOT
  rationale: The verb עָשַׁק commonly denotes oppression by withholding what is due
    or abusing power. 'Oppress' preserves the broader ethical force better than the
    narrower 'defraud,' while still fitting the economic context of the verse.
- source_word: רֵעֲךָ
  chosen: your neighbor
  alternatives:
  - your fellow
  - your companion
  lexicon: HALOT
  rationale: רֵעַ in legal-ethical contexts often refers to one's fellow member of
    the community. 'Neighbor' is idiomatic and preserves the covenantal-social sense
    familiar from Torah usage.
- source_word: תִגְזֹל
  chosen: rob
  alternatives:
  - steal from
  - plunder
  lexicon: HALOT
  rationale: גָּזַל denotes taking by force or wrongful seizure. 'Rob' is concise
    and stronger than generic 'steal,' matching the progression from oppression to
    outright taking.
- source_word: תָלִין
  chosen: shall not remain
  alternatives:
  - shall not stay overnight
  - you shall not keep overnight
  lexicon: HALOT
  rationale: 'The verb לון/לין here is 3fs agreeing with the feminine subject ''wages'':
    literally, ''the wages ... shall not stay overnight.'' Rendering it as ''shall
    not remain'' gives natural English while preserving the subject and legal sense
    of withholding payment.'
- source_word: פְּעֻלַּת
  chosen: the wages of
  alternatives:
  - the pay of
  - the earnings of
  - the work of
  lexicon: HALOT
  rationale: פְּעֻלָּה can denote work or its recompense; in this collocation with
    שָׂכִיר and the prohibition against delaying payment, 'wages' best captures the
    intended meaning.
- source_word: שָׂכִיר
  chosen: a hired worker
  alternatives:
  - a hired laborer
  - a wage earner
  lexicon: HALOT
  rationale: שָׂכִיר refers to someone hired for wages. 'Hired worker' is clear modern
    English and avoids archaic phrasing while preserving the employment context.
- source_word: אִתְּךָ
  chosen: with you
  alternatives:
  - in your possession
  - by you
  lexicon: HALOT
  rationale: The preposition indicates the wages are being held by the employer. 'With
    you' is the most direct rendering and works naturally in English.
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - overnight
  lexicon: HALOT
  rationale: This temporal phrase marks the limit of delay. 'Until morning' is idiomatic
    and preserves the concrete time reference rather than paraphrasing it merely as
    'overnight'.
