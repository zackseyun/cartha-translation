id: LEV.19.21
reference: Leviticus 19:21
source:
  edition: WLC
  text: וְ/הֵבִ֤יא אֶת אֲשָׁמ/וֹ֙ לַֽ/יהוָ֔ה אֶל פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד אֵ֖יל אָשָֽׁם־־׃
translation:
  text: 'And he shall bring his guilt offering to Yahweh, to the entrance of the tent of meeting: a ram as a guilt offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his reparation offering.' The Hebrew term אָשָׁם can refer both to guilt and to the offering made in reparation for it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  chosen: And he shall bring
  alternatives:
  - And he must bring
  - Then he shall bring
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in legal material commonly carries injunctive/future force. 'Shall bring' fits English legislative style and preserves the prescriptive sense.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is not represented in the translation.
- source_word: אֲשָׁמוֹ
  chosen: his guilt offering
  alternatives:
  - his compensation offering
  - his reparation offering
  lexicon: HALOT
  rationale: אָשָׁם can denote both guilt and the associated reparation/guilt offering. In sacrificial context here, 'guilt offering' is the clearest established English rendering and matches the following appositional specification of the animal.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication. Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' preserves the offering's presentation to him.
- source_word: אֶל־פֶּתַח
  chosen: to the entrance
  alternatives:
  - to the doorway
  - to the opening
  lexicon: HALOT
  rationale: פֶּתַח denotes an entrance/opening. 'Entrance' is natural modern English and suits the sanctuary setting.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard designation for the sanctuary structure. 'Tent of meeting' is both accurate and idiomatic.
- source_word: אֵיל
  chosen: a ram
  lexicon: HALOT
  rationale: אֵיל specifically denotes a ram, the sacrificial animal required here.
- source_word: אָשָׁם
  chosen: as a guilt offering
  alternatives:
  - for a guilt offering
  - as a reparation offering
  lexicon: HALOT
  rationale: The final phrase appositionally identifies the ram's sacrificial function. 'As a guilt offering' reads smoothly in English while preserving the cultic category.
