theological_decisions:
- issue: Rendering the prohibition related to body marking without importing later
    doctrinal debates about all modern tattooing
  chosen_reading: Translate the Hebrew practice-language directly as a prohibition
    of cuttings for the dead and a tattoo mark on the body
  alternative_readings:
  - Interpret as limited only to pagan mourning rites
  - Interpret as a universal ban on any and all tattooing in every culture
  rationale: The verse explicitly links the first prohibition to mourning for the
    dead and then prohibits a tattoo mark without repeating the mourning phrase. The
    translation should state what the Hebrew says without narrowing or expanding its
    scope beyond the text itself. Interpretive applications are left to readers and
    teachers rather than embedded in the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
