id: LEV.19.28
reference: Leviticus 19:28
source:
  edition: WLC
  text: וְ/שֶׂ֣רֶט לָ/נֶ֗פֶשׁ לֹ֤א תִתְּנוּ֙ בִּ/בְשַׂרְ/כֶ֔ם וּ/כְתֹ֣בֶת קַֽעֲקַ֔ע
    לֹ֥א תִתְּנ֖וּ בָּ/כֶ֑ם אֲנִ֖י יְהוָֽה׃
translation:
  text: You shall not make any cuttings in your flesh for the dead, and you shall
    not put a tattoo mark on yourselves. I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a dead person.' The Hebrew phrase is idiomatic and commonly refers
      to mourning for the dead.
    reason: lexical_alternative
  - marker: b
    text: Or 'an inscribed mark' or 'a tattoo.' The Hebrew expression is rare and
      likely refers to a permanent body marking.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׂרֶט
  chosen: cuttings
  alternatives:
  - incision
  - gash
  - cut mark
  lexicon: HALOT
  rationale: The noun denotes a cut or incision made in the body. 'Cuttings' preserves
    the plural-like collective sense in English and fits the prohibition formula without
    over-specifying the instrument or severity.
- source_word: לָנֶפֶשׁ
  chosen: for the dead
  alternatives:
  - for a dead person
  - for a soul/person
  lexicon: HALOT
  rationale: In this legal context נֶפֶשׁ with ל often refers to a dead person in
    mourning-related impurity contexts. 'For the dead' communicates the idiomatic
    sense more naturally than the overly literal 'for a soul/person.'
- source_word: בִּבְשַׂרְכֶם
  chosen: in your flesh
  alternatives:
  - on your body
  - in your body
  lexicon: HALOT
  rationale: בָּשָׂר is literally 'flesh.' Retaining 'flesh' preserves the concrete
    bodily language of the Hebrew while remaining clear in English.
- source_word: כְתֹבֶת
  chosen: tattoo mark
  alternatives:
  - inscription
  - marking
  lexicon: HALOT
  rationale: The noun refers to a writing/marking impressed on the body. Because the
    following noun qualifies the kind of mark, 'tattoo mark' best captures the likely
    referent in idiomatic modern English.
- source_word: קַעֲקַע
  chosen: tattoo mark
  alternatives:
  - tattoo
  - incised mark
  lexicon: HALOT
  rationale: This rare term likely denotes a marked or incised sign on the skin. Taken
    together with כְתֹבֶת, the phrase is best rendered as a single expression, 'tattoo
    mark,' rather than two separate English nouns.
- source_word: לֹא תִתְּנוּ ... בָּכֶם
  chosen: you shall not put ... on yourselves
  alternatives:
  - you shall not place ... on you
  - you shall not make ... on yourselves
  lexicon: HALOT
  rationale: The verb נתן with the preposition ב here expresses applying or placing
    something on the body. 'Put ... on yourselves' is natural English and preserves
    the direct prohibition.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD.' The covenantal
    self-identification formula is standardly and clearly represented as 'I am the
    LORD.'
