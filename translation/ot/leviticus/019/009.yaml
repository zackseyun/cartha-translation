id: LEV.19.9
reference: Leviticus 19:9
source:
  edition: WLC
  text: וּֽ/בְ/קֻצְרְ/כֶם֙ אֶת קְצִ֣יר אַרְצְ/כֶ֔ם לֹ֧א תְכַלֶּ֛ה פְּאַ֥ת שָׂדְ/ךָ֖
    לִ/קְצֹ֑ר וְ/לֶ֥קֶט קְצִֽירְ/ךָ֖ לֹ֥א תְלַקֵּֽט־׃
translation:
  text: When you reap the harvest of your land, you shall not reap the very edge of
    your field completely, and you shall not gather the gleanings of your harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corner of your field.' The Hebrew term can denote an edge, side,
      or corner; here it refers to the outer part of the field that must be left unreaped.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקֻצְרְכֶם
  chosen: When you reap
  alternatives:
  - And when you reap
  - In your reaping
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with infinitive construct of
    קצר introduces a temporal circumstance. 'When you reap' is natural modern English
    and preserves the legal setting better than a more wooden 'in your reaping.'
- source_word: קְצִיר
  chosen: the harvest
  alternatives:
  - the crop
  - the reaping
  lexicon: HALOT
  rationale: Here קציר denotes the harvested produce/harvest event. 'Harvest' is the
    most idiomatic and contextually fitting rendering in an agricultural law.
- source_word: אַרְצְכֶם
  chosen: of your land
  alternatives:
  - of your country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the Israelites' land in an agricultural sense, not
    the nation in a political sense. 'Land' best fits the immediate context.
- source_word: לֹא תְכַלֶּה
  chosen: you shall not reap ... completely
  alternatives:
  - you shall not finish reaping
  - you shall not wholly reap
  lexicon: HALOT
  rationale: כלה in the Piel means to complete or finish. Because the object is 'the
    edge/corner of your field' and the following infinitive clarifies the action,
    English requires making the harvesting action explicit. 'Completely' captures
    the prohibition against stripping the field bare.
- source_word: פְּאַת שָׂדְךָ
  chosen: the very edge of your field
  alternatives:
  - the corner of your field
  - the border of your field
  lexicon: HALOT
  rationale: פאה literally means edge, side, or corner. In this harvest law it refers
    to the extremity of the field left for the poor. 'Edge' communicates the agricultural
    sense more clearly in contemporary English, while 'very edge' reflects the marked
    boundary idea.
- source_word: לִקְצֹר
  chosen: reap
  alternatives:
  - to reap
  lexicon: HALOT
  rationale: The infinitive expresses the action prohibited with respect to the field's
    edge. In English it is absorbed naturally into the verbal phrase 'shall not reap
    ... completely' rather than left as a separate infinitive.
- source_word: לֶקֶט
  chosen: the gleanings
  alternatives:
  - what is left behind
  - the fallen stalks
  lexicon: HALOT
  rationale: לקט in this legal context refers to scattered or left-over produce gathered
    after the main harvest. 'Gleanings' is the established and precise English agricultural
    term.
- source_word: קְצִירְךָ
  chosen: of your harvest
  alternatives:
  - from your harvest
  lexicon: HALOT
  rationale: The construct relationship is best rendered possessively in English.
    'Of your harvest' is straightforward and idiomatic.
- source_word: לֹא תְלַקֵּט
  chosen: you shall not gather
  alternatives:
  - you shall not pick up
  - you shall not glean
  lexicon: HALOT
  rationale: The verb לקט means to gather/pick up, especially leftover produce. 'Gather'
    avoids awkwardness from using 'glean' as both noun and verb while preserving the
    sense.
