id: LEV.19.30
reference: Leviticus 19:30
source:
  edition: WLC
  text: אֶת שַׁבְּתֹתַ֣/י תִּשְׁמֹ֔רוּ וּ/מִקְדָּשִׁ֖/י תִּירָ֑אוּ אֲנִ֖י יְהוָֽה־׃
translation:
  text: You shall keep my Sabbaths and revere my sanctuary; I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "fear my sanctuary." The Hebrew verb can mean either "fear" or "revere"; here it refers to showing holy regard for the LORD''s sacred place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבְּתֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: The plural form is explicit in Hebrew and refers to the LORD's appointed sabbath observances rather than a single Sabbath. 'Sabbaths' preserves the source form and covenantal nuance better than smoothing to singular.
- source_word: תִּשְׁמֹרוּ
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you must keep
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' 'Keep' is concise, idiomatic in covenantal/legal contexts, and pairs naturally with 'Sabbaths' in English Bible style without becoming archaic.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my sanctuary place
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'My sanctuary' is the most natural and established English equivalent, preserving the sacred-space sense without over-specifying tabernacle or temple.
- source_word: תִּירָאוּ
  chosen: revere
  alternatives:
  - fear
  - stand in awe of
  lexicon: HALOT
  rationale: ירא can mean fear or reverence. In this cultic context, the command concerns holy regard for God's sanctuary, so 'revere' communicates the intended posture in clear modern English without implying mere terror.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I, the LORD
  lexicon: HALOT
  rationale: This recurring covenant formula is best rendered in full as 'I am the LORD,' which is natural English and preserves the emphatic divine self-identification.
