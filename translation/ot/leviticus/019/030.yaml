theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of ירא with reference to the sanctuary
  chosen_reading: revere my sanctuary
  alternative_readings:
  - fear my sanctuary
  rationale: The Hebrew verb can denote fear or reverence. In context, the command concerns proper holy regard toward the place set apart for God's presence. 'Revere' preserves the seriousness without importing a narrower emotional sense of fright.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English; preserve source sense without flattening theological weight'
