theological_decisions:
- issue: Nature of the uncleanness in the prohibition
  chosen_reading: Render the result as 'become unclean' without specifying only ritual
    or only moral impurity.
  alternative_readings:
  - become ritually unclean
  - become morally defiled
  rationale: The verse prohibits occult consultation as a source of defilement, and
    the Hebrew term can carry both ritual and moral dimensions in Leviticus. The translation
    preserves that theological breadth rather than narrowing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
