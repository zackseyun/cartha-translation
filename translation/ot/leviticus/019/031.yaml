id: LEV.19.31
reference: Leviticus 19:31
source:
  edition: WLC
  text: אַל תִּפְנ֤וּ אֶל הָ/אֹבֹת֙ וְ/אֶל הַ/יִּדְּעֹנִ֔ים אַל תְּבַקְשׁ֖וּ לְ/טָמְאָ֣ה
    בָ/הֶ֑ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־־־־׃
translation:
  text: Do not turn to mediums or to spiritists; do not seek them out, to become unclean
    by them. I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'necromancers' for 'mediums,' and 'those with familiar spirits' or 'wizards'
      for 'spiritists.' The Hebrew terms refer to forbidden practitioners associated
      with consulting spirits or the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְנוּ
  chosen: turn to
  alternatives:
  - turn toward
  - consult
  lexicon: HALOT
  rationale: פנה literally means 'turn' or 'turn toward.' In this prohibition, 'turn
    to' naturally conveys directing oneself toward forbidden practitioners without
    over-paraphrasing into the more specific 'consult,' which is implied but not explicit.
- source_word: הָאֹבֹת
  chosen: mediums
  alternatives:
  - ghosts
  - spirits of the dead
  - necromancers
  lexicon: HALOT
  rationale: אוֹב refers in these legal contexts to a medium associated with consulting
    the dead, whether by the spirit invoked or the practitioner. 'Mediums' is clear
    modern English and best fits the parallel with יִדְּעֹנִים as categories of forbidden
    occult practitioners.
- source_word: הַיִּדְּעֹנִים
  chosen: spiritists
  alternatives:
  - wizards
  - familiar spirits
  - diviners
  lexicon: HALOT
  rationale: יִדְּעֹנִי denotes a practitioner of forbidden spirit knowledge or occult
    consultation. 'Spiritists' is accessible modern English and distinguishes the
    term from אוֹב while preserving the general domain of illicit spirit practice.
    Traditional 'wizards' is potentially misleading in modern usage.
- source_word: תְּבַקְשׁוּ
  chosen: seek them out
  alternatives:
  - seek
  - inquire of
  - consult
  lexicon: HALOT
  rationale: בקש means 'seek.' With the following phrase and object, 'seek them out'
    idiomatically captures pursuing these practitioners for access or consultation,
    while remaining close to the Hebrew.
- source_word: לְטָמְאָה בָהֶם
  chosen: to become unclean by them
  alternatives:
  - so as to be defiled by them
  - to defile yourselves by them
  lexicon: HALOT
  rationale: 'The infinitive construct of טמא with בָהֶם expresses result or purpose:
    becoming ritually/morally unclean through involvement with them. ''To become unclean
    by them'' preserves the passive/result nuance without importing a stronger reflexive
    form not present in the Hebrew.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal identification. 'Your God' preserves the second-person
    plural relationship stated in the Hebrew.
