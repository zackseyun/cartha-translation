theological_decisions:
- issue: Gendered expression in זָקֵן
  chosen_reading: old man
  alternative_readings:
  - old person
  - elder
  rationale: The Hebrew adjective/noun is masculine singular. Following the project's
    gender-accurate policy, the main text preserves the masculine form rather than
    neutralizing it. The command likely has representative force in context, but the
    translation should not erase the source-language gender marking.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of divine fear
  chosen_reading: fear your God
  alternative_readings:
  - revere your God
  rationale: The holiness code repeatedly grounds ethical commands in fear of God.
    'Fear' preserves the theological tension of reverence and awe without softening
    it to mere respect.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, with alternatives noted but not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
