id: LEV.19.32
reference: Leviticus 19:32
source:
  edition: WLC
  text: מִ/פְּנֵ֤י שֵׂיבָה֙ תָּק֔וּם וְ/הָדַרְתָּ֖ פְּנֵ֣י זָקֵ֑ן וְ/יָרֵ֥אתָ מֵּ/אֱלֹהֶ֖י/ךָ
    אֲנִ֥י יְהוָֽה׃פ
translation:
  text: You shall rise before gray hair, and you shall honor the face of an old man,
    and you shall fear your God; I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of gray hair'—the Hebrew uses a concrete expression
      for old age.
    reason: lexical_alternative
  - marker: b
    text: Or 'honor the presence of an elder.' The Hebrew literally says 'honor the
      face of an old man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: With קום ('rise'), the preposition plus פָּנִים idiomatically means to
    rise in someone's presence or before someone. 'Before' is concise and natural
    in English while preserving the spatial-respect sense.
- source_word: שֵׂיבָה
  chosen: gray hair
  alternatives:
  - gray-headed person
  - old age
  lexicon: HALOT
  rationale: The noun literally denotes gray hair/hoariness and by extension old age.
    'Gray hair' preserves the concrete Hebrew image rather than abstracting to 'old
    age.'
- source_word: תָּקוּם
  chosen: you shall rise
  alternatives:
  - you shall stand up
  lexicon: HALOT
  rationale: Qal imperfect of קום here gives the command to stand up as a sign of
    respect. 'Rise' is idiomatic and dignified in English.
- source_word: וְהָדַרְתָּ
  chosen: and you shall honor
  alternatives:
  - and you shall show honor to
  - and you shall revere
  lexicon: HALOT
  rationale: From הדר in the piel, meaning to honor or show deference. 'Honor' best
    captures the ethical command without overstating cultic reverence.
- source_word: פְּנֵי זָקֵן
  chosen: the face of an old man
  alternatives:
  - an old person
  - the presence of an elder
  lexicon: HALOT
  rationale: Literally 'the face of an old man/elder.' Retaining 'face' reflects the
    Hebrew idiom and parallels the first clause. 'Old man' follows the masculine singular
    source in keeping with the project's gender-accurate policy; the command is representative
    rather than excluding elderly women, but the Hebrew form is masculine.
- source_word: וְיָרֵאתָ
  chosen: and you shall fear
  alternatives:
  - and you shall revere
  lexicon: HALOT
  rationale: The verb ירא commonly means 'fear' or 'revere.' Because the object is
    God and the holiness code often uses this covenantal formula, 'fear' preserves
    the stronger theological weight while remaining standard biblical English.
- source_word: מֵאֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Direct second-person singular possessive is preserved: the command is
    addressed personally and covenantally.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the project's contested-terms
    policy.
