id: LEV.19.6
reference: Leviticus 19:6
source:
  edition: WLC
  text: בְּ/י֧וֹם זִבְחֲ/כֶ֛ם יֵאָכֵ֖ל וּ/מִֽ/מָּחֳרָ֑ת וְ/הַ/נּוֹתָר֙ עַד י֣וֹם הַ/שְּׁלִישִׁ֔י
    בָּ/אֵ֖שׁ יִשָּׂרֵֽף־׃
translation:
  text: It shall be eaten on the day of your sacrifice and on the next day, but what
    remains until the third day shall be burned in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and what is left over'; the Hebrew participle refers to the portion
      remaining after the permitted time for eating.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - in the day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם here marks time, best rendered idiomatically
    in English as 'on the day' rather than the more wooden 'in the day.'
- source_word: זִבְחֲכֶם
  chosen: of your sacrifice
  alternatives:
  - of your slaughtered offering
  - when you sacrifice it
  lexicon: HALOT
  rationale: זֶבַח denotes a sacrifice, often a slaughtered sacrificial offering.
    'Your sacrifice' is clear, natural English and fits the cultic context without
    over-specifying beyond the Hebrew form.
- source_word: יֵאָכֵל
  chosen: it shall be eaten
  alternatives:
  - it may be eaten
  - one shall eat it
  lexicon: HALOT
  rationale: The Niphal imperfect is naturally rendered as a passive here. In this
    legal context, 'shall be eaten' conveys instruction/regulation better than a mere
    permissive 'may be eaten.' The object 'it' is supplied in English from context.
- source_word: וּמִמָּחֳרָת
  chosen: and on the next day
  alternatives:
  - and on the morrow
  - and from the next day
  lexicon: HALOT
  rationale: מָחֳרָת means 'the next day' or 'morrow.' 'On the next day' is modern
    and clear. Although the prefixed preposition can be read literally as 'from,'
    the temporal sequence in context is best expressed idiomatically as 'on the next
    day.'
- source_word: וְהַנּוֹתָר
  chosen: but what remains
  alternatives:
  - and the remainder
  - and what is left over
  lexicon: HALOT
  rationale: The participial form from יתר/נותר refers to what is left over. 'What
    remains' is concise and natural; 'but' captures the shift to the contrasting instruction
    about leftovers.
- source_word: עַד יוֹם הַשְּׁלִישִׁי
  chosen: until the third day
  alternatives:
  - by the third day
  - up to the third day
  lexicon: HALOT
  rationale: The phrase marks the temporal limit for what is left over. 'Until the
    third day' preserves the Hebrew preposition עַד straightforwardly.
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  - by fire
  lexicon: HALOT
  rationale: The preposition ב with אֵשׁ is most directly 'in the fire.' This is idiomatic
    enough in English and preserves the concrete imagery of disposal by burning.
- source_word: יִשָּׂרֵף
  chosen: shall be burned
  alternatives:
  - must be burned
  - is to be burned
  lexicon: HALOT
  rationale: The Niphal imperfect is passive. 'Shall be burned' matches the legal-register
    instruction and pairs well with the earlier 'shall be eaten.'
