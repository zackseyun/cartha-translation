id: LEV.19.14
reference: Leviticus 19:14
source:
  edition: WLC
  text: לֹא תְקַלֵּ֣ל חֵרֵ֔שׁ וְ/לִ/פְנֵ֣י עִוֵּ֔ר לֹ֥א תִתֵּ֖ן מִכְשֹׁ֑ל וְ/יָרֵ֥אתָ מֵּ/אֱלֹהֶ֖י/ךָ אֲנִ֥י יְהוָֽה־׃
translation:
  text: 'You shall not curse a deaf man, and before a blind man you shall not put a stumbling block; but you shall fear your God: I am Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deaf' and 'the blind.' The Hebrew uses masculine singular forms as representative legal examples.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְקַלֵּל
  chosen: curse
  alternatives:
  - revile
  - speak evil of
  lexicon: HALOT
  rationale: קלל in the Piel commonly means to curse or treat with contempt. 'Curse' is the most direct and idiomatic rendering here, preserving the prohibition's moral and verbal force without softening it.
- source_word: חֵרֵשׁ
  chosen: a deaf man
  alternatives:
  - the deaf
  - a deaf person
  lexicon: HALOT
  rationale: The Hebrew adjective/noun is masculine singular. Per gender-accurate policy, 'a deaf man' matches the source form while still functioning representatively in law. 'The deaf' is possible but less concrete; 'a deaf person' is more gender-neutral than the source.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is the natural legal-ethical rendering for לִפְנֵי here and preserves the spatial sense without overexpansion.'
- source_word: עִוֵּר
  chosen: a blind man
  alternatives:
  - the blind
  - a blind person
  lexicon: HALOT
  rationale: Like חֵרֵשׁ, this masculine singular adjective/noun is rendered gender-accurately as 'a blind man.' It functions as a representative case in the law.
- source_word: תִתֵּן
  chosen: put
  alternatives:
  - place
  - set
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' English idiom with 'stumbling block' prefers 'put' or 'place.' 'Put' is the most natural and concise equivalent.
- source_word: מִכְשֹׁל
  chosen: a stumbling block
  alternatives:
  - an obstacle
  - a cause for stumbling
  lexicon: HALOT
  rationale: The noun denotes something that causes stumbling. 'Stumbling block' preserves both the literal image and its broader ethical resonance in biblical usage. 'Obstacle' is possible but loses the established metaphorical force.
- source_word: וְיָרֵאתָ
  chosen: but you shall fear
  alternatives:
  - and you shall fear
  - rather, fear
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English the clause marks the ethical ground of the prohibitions. 'But you shall fear' brings out the contrastive force implied by the move from hidden abuse of the vulnerable to accountability before God, without overstating the syntax.
- source_word: מֵאֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - from your God
  lexicon: HALOT
  rationale: With ירא, the preposition מן marks the object of fear in idiomatic Hebrew. English naturally says 'fear your God,' not 'fear from your God.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
