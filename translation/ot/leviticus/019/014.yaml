theological_decisions:
- issue: Representative masculine forms in case law
  chosen_reading: Retain masculine singular examples ('a deaf man,' 'a blind man') as gender-accurate representative cases
  alternative_readings:
  - a deaf person
  - a blind person
  - the deaf
  - the blind
  rationale: The Hebrew uses masculine singular forms in legal instruction. Following the project's gender-accurate policy, the translation preserves that form rather than neutralizing it, while understanding the law's ethical scope as general.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Force of the final motivation clause
  chosen_reading: Render the clause as grounding the command in reverence before God ('but you shall fear your God')
  alternative_readings:
  - and you shall fear your God
  rationale: The verse condemns acts that might be hidden from human accountability because the victims are vulnerable; the appeal to fearing God makes that theological-ethical logic explicit. The English conjunction 'but' helps communicate this discourse function while remaining within the semantic range of waw.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1
