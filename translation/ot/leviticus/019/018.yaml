id: LEV.19.18
reference: Leviticus 19:18
source:
  edition: WLC
  text: לֹֽא תִקֹּ֤ם וְ/לֹֽא תִטֹּר֙ אֶת בְּנֵ֣י עַמֶּ֔/ךָ וְ/אָֽהַבְתָּ֥ לְ/רֵעֲ/ךָ֖
    כָּמ֑וֹ/ךָ אֲנִ֖י יְהוָֽה־־־׃
translation:
  text: You shall not take vengeance or bear a grudge against the sons of your people,
    but you shall love your neighbor as yourself; I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against your own people.' Literally, 'against the sons of your people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִקֹּם
  chosen: take vengeance
  alternatives:
  - avenge yourself
  - seek revenge
  lexicon: HALOT
  rationale: The verb נקם denotes taking vengeance or exacting revenge. 'Take vengeance'
    is idiomatic modern English and preserves the active retaliatory sense without
    over-paraphrase.
- source_word: תִטֹּר
  chosen: bear a grudge
  alternatives:
  - keep wrath
  - hold resentment
  lexicon: HALOT
  rationale: The verb נטר in this context refers to keeping or maintaining anger/resentment.
    'Bear a grudge' is a natural English equivalent that captures the durative sense
    of harboring resentment.
- source_word: בְּנֵי עַמֶּךָ
  chosen: the sons of your people
  alternatives:
  - your own people
  - the children of your people
  lexicon: HALOT
  rationale: Literally 'the sons of your people.' Because the translation philosophy
    prefers gender-accurate renderings where the source is grammatically masculine
    and representative, the main text keeps 'sons.' The phrase denotes fellow members
    of the covenant community; a more idiomatic alternative is preserved in a footnote.
- source_word: וְאָהַבְתָּ
  chosen: you shall love
  alternatives:
  - and you must love
  lexicon: HALOT
  rationale: The waw + perfect here carries injunctive force in the legal context.
    'You shall love' matches the surrounding prohibitions and preserves covenant-command
    force in standard English legal style.
- source_word: לְרֵעֲךָ
  chosen: your neighbor
  alternatives:
  - your fellow
  - your companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or fellow. In this legal-ethical context,
    'neighbor' is the best established and contextually fitting English rendering,
    especially given its later canonical significance, while still denoting a fellow
    member of the community in the immediate context.
- source_word: כָּמוֹךָ
  chosen: as yourself
  alternatives:
  - like yourself
  lexicon: HALOT
  rationale: The comparative phrase is straightforward. 'As yourself' is the most
    natural and traditional English rendering and accurately conveys the standard
    of self-regard as the measure of love for the other.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding English convention and the reverential substitution
    pattern reflected in Jewish reading tradition and the Septuagint.
