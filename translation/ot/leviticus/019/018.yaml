theological_decisions:
- issue: Scope of the command's object
  chosen_reading: Render the immediate Hebrew phrase with its covenant-community reference
    ('the sons of your people') while retaining 'neighbor' for רֵעַ.
  alternative_readings:
  - Flatten both phrases into broader universal language in the main text
  rationale: The verse itself distinguishes between 'the sons of your people' and
    'your neighbor.' The translation preserves that textual particularity without
    importing later interpretive expansions or restrictions into the wording itself.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Divine name rendering
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יְהוָה and avoids making
    a per-verse exception where the Hebrew does not require one.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
