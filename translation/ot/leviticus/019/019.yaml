id: LEV.19.19
reference: Leviticus 19:19
source:
  edition: WLC
  text: אֶֽת חֻקֹּתַ/י֮ תִּשְׁמֹרוּ֒ בְּהֶמְתְּ/ךָ֙ לֹא תַרְבִּ֣יעַ כִּלְאַ֔יִם שָׂדְ/ךָ֖
    לֹא תִזְרַ֣ע כִּלְאָ֑יִם וּ/בֶ֤גֶד כִּלְאַ֨יִם֙ שַֽׁעַטְנֵ֔ז לֹ֥א יַעֲלֶ֖ה עָלֶֽי/ךָ־־־׃פ
translation:
  text: 'You shall keep my statutes: you shall not breed your livestock with two different
    kinds; you shall not sow your field with two kinds of seed; and a garment of mixed
    material, shaatnez, shall not come upon you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shaatnez is a technical term for a forbidden mixed fabric, traditionally
      understood as a mixture of wool and linen; compare Deuteronomy 22:11.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקָּה commonly denotes prescribed enactments or fixed statutes. 'Statutes'
    is a standard, readable rendering that preserves the legal force without overinterpreting.
- source_word: תִּשְׁמֹרוּ
  chosen: you shall keep
  alternatives:
  - you shall observe
  - keep
  lexicon: HALOT
  rationale: שׁמר in covenant/legal contexts often means to keep or observe. 'Keep'
    is concise and idiomatic in English legal-religious style.
- source_word: בְּהֶמְתְּךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers broadly to domesticated animals. 'Livestock' best
    fits the agricultural context and avoids the narrower 'cattle'.
- source_word: תַרְבִּיעַ
  chosen: breed
  alternatives:
  - mate
  - crossbreed
  lexicon: HALOT
  rationale: The Hiphil of רבע here refers to causing animals to mate. 'Breed' is
    natural English and broad enough to cover the prohibition without adding the more
    specific modern term 'crossbreed' in the verb itself.
- source_word: כִּלְאַיִם
  chosen: with two different kinds
  alternatives:
  - with mixed kinds
  - with diverse kinds
  lexicon: HALOT
  rationale: כִּלְאַיִם denotes mixture of heterogeneous kinds. In the animal clause,
    'with two different kinds' makes the sense explicit and readable in English.
- source_word: שָׂדְךָ
  chosen: your field
  lexicon: HALOT
  rationale: Straightforward possessive rendering of the agricultural noun.
- source_word: תִזְרַע
  chosen: sow
  alternatives:
  - plant
  lexicon: HALOT
  rationale: זרע in this context specifically refers to sowing seed. 'Sow' is the
    most precise agricultural equivalent.
- source_word: כִּלְאָיִם
  chosen: with two kinds of seed
  alternatives:
  - with mixed seed
  - with mixed kinds
  lexicon: HALOT
  rationale: The Hebrew repeats the same noun for mixed kinds; in English, adding
    'of seed' clarifies the object implied by the agricultural context and avoids
    awkwardness.
- source_word: בֶגֶד
  chosen: a garment
  alternatives:
  - clothing
  - a piece of clothing
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for clothing or garment. 'A garment' preserves
    the singular and legal style.
- source_word: כִּלְאַיִם
  chosen: mixed material
  alternatives:
  - mixed kinds
  - mixed fabric
  lexicon: HALOT
  rationale: In the clothing clause, the mixed-kinds concept applies to textile composition.
    'Mixed material' is understandable English without prematurely specifying the
    exact fibers in the main text.
- source_word: שַׁעַטְנֵז
  chosen: shaatnez
  alternatives:
  - cloth woven of wool and linen mixed
  - mixed fabric
  lexicon: HALOT
  rationale: שַׁעַטְנֵז is a rare technical term traditionally associated with a wool-linen
    mixture (cf. Deut 22:11). Because the exact nuance is specialized and culturally
    marked, transliterating it preserves the term while a footnote explains the likely
    sense.
- source_word: יַעֲלֶה עָלֶיךָ
  chosen: shall not come upon you
  alternatives:
  - shall not be worn by you
  - shall not be put on you
  lexicon: HALOT
  rationale: Literally 'shall not go up upon you.' 'Shall not come upon you' preserves
    the idiomatic force fairly closely while remaining intelligible. The more interpretive
    'be worn by you' is possible but less formally transparent.
