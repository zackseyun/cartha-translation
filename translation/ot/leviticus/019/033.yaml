id: LEV.19.33
reference: Leviticus 19:33
source:
  edition: WLC
  text: וְ/כִֽי יָג֧וּר אִתְּ/ךָ֛ גֵּ֖ר בְּ/אַרְצְ/כֶ֑ם לֹ֥א תוֹנ֖וּ אֹתֽ/וֹ־׃
translation:
  text: When a foreigner resides with you in your land, you shall not mistreat him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not oppress him' or 'you shall not wrong him.'
    reason: lexical_alternative
  - marker: b
    text: '''Foreigner'' translates Hebrew ger, a non-native resident living among
      Israel, often rendered ''sojourner'' or ''resident alien.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִי
  chosen: When
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional or situational clause. 'When' fits the legal
    style in English and reflects the expectation of such a case without overemphasizing
    uncertainty.
- source_word: יָגוּר
  chosen: resides
  alternatives:
  - sojourns
  - dwells
  - lives as a resident
  lexicon: HALOT
  rationale: From גור, referring to residing as a non-native or dependent resident.
    'Resides' is natural modern English and preserves the sense of ongoing residence
    better than the more archaic 'sojourns'.
- source_word: אִתְּךָ
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is most directly 'with you.' Although
    the addressee is singular, English legal style can preserve this naturally without
    forcing a plural.
- source_word: גֵּר
  chosen: foreigner
  alternatives:
  - sojourner
  - resident alien
  - stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living within Israelite society. 'Foreigner'
    is clear modern English; 'resident alien' is precise but bureaucratic, and 'stranger'
    can wrongly suggest an unknown passerby. The residency nuance is supported by
    the verb יָגוּר.
- source_word: בְּאַרְצְכֶם
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land belonging to the covenant community. 'Land'
    preserves biblical and covenantal resonance better than 'country.' The suffix
    is plural, addressing the people collectively.
- source_word: לֹא תוֹנוּ
  chosen: you shall not mistreat
  alternatives:
  - you shall not oppress
  - you shall not wrong
  - you shall not exploit
  lexicon: HALOT
  rationale: From ינה in the Hiphil, meaning to wrong, oppress, or mistreat. 'Mistreat'
    is accessible modern English and broad enough to cover abusive conduct in context.
    'Oppress' is possible and preserved in a footnote because it is a common and somewhat
    stronger alternative.
- source_word: אֹתוֹ
  chosen: him
  alternatives:
  - that person
  - the foreigner
  lexicon: HALOT
  rationale: The object pronoun is masculine singular, referring back to גֵּר. Per
    the gender-accurate policy, 'him' is retained rather than neutralizing the pronoun.
