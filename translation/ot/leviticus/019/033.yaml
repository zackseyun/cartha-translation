theological_decisions:
- issue: Rendering of גֵּר in Israel's holiness legislation
  chosen_reading: foreigner
  alternative_readings:
  - sojourner
  - resident alien
  - stranger
  rationale: The term refers to a non-Israelite living within the land and under Israel's
    social-legal protection. 'Foreigner' communicates non-native status in readable
    modern English, while the residency aspect is carried by 'resides.' This avoids
    both archaic diction and overly technical immigration language.
  doctrine_reference: Translation philosophy §§5–6; gender-accurate policy not directly
    contested but relevant to pronoun retention.
