theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The source contains the covenant name of God. Following the project's
    stated default for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the second clause
  chosen_reading: 'consequential: ''and so profane'''
  alternative_readings:
  - 'simple coordination: ''and profane'''
  rationale: The verse links false oath-taking with the profanation of God's name.
    English 'and so profane' preserves that ethical-theological connection without
    over-paraphrasing.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without unnecessary paraphrase'
