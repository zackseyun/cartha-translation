id: LEV.19.12
reference: Leviticus 19:12
source:
  edition: WLC
  text: וְ/לֹֽא תִשָּׁבְע֥וּ בִ/שְׁמִ֖/י לַ/שָּׁ֑קֶר וְ/חִלַּלְתָּ֛ אֶת שֵׁ֥ם אֱלֹהֶ֖י/ךָ
    אֲנִ֥י יְהוָֽה־־׃
translation:
  text: You shall not swear falsely by my name and so profane the name of your God.
    I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'You shall not swear by my name for falsehood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׁבְעוּ
  chosen: you shall not swear
  alternatives:
  - you must not swear
  - you shall not take an oath
  lexicon: HALOT
  rationale: Nifal of שׁבע in legal/ethical context means to swear or take an oath.
    'You shall not swear' preserves the direct prohibition and standard covenantal/legal
    force.
- source_word: בִשְׁמִי
  chosen: by my name
  alternatives:
  - in my name
  lexicon: HALOT
  rationale: The preposition ב with 'name' in oath contexts is best rendered 'by,'
    indicating the invoked basis of the oath.
- source_word: לַשָּׁקֶר
  chosen: falsely
  alternatives:
  - for falsehood
  - to a lie
  lexicon: HALOT
  rationale: Though literally 'to/for falsehood,' idiomatic English in oath contexts
    is 'swear falsely.' This captures the adverbial force without wooden phrasing.
- source_word: וְחִלַּלְתָּ
  chosen: and so profane
  alternatives:
  - and profane
  - thus profaning
  lexicon: HALOT
  rationale: The verb חלל in Piel means to profane or desecrate. 'And so profane'
    makes explicit the consequence relationship between false swearing and profaning
    God's name, which the Hebrew conjunction can imply in context.
- source_word: שֵׁם
  chosen: the name
  lexicon: HALOT
  rationale: '''Name'' should be retained literally because in biblical theology God''s
    ''name'' signifies his revealed identity and honor; no paraphrase is warranted.'
- source_word: אֱלֹהֶיךָ
  chosen: of your God
  alternatives:
  - of your gods
  lexicon: HALOT
  rationale: 'Though morphologically plural in form, אֱלֹהִים with singular referent
    and pronominal suffix here clearly means the one God of Israel: ''your God.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
