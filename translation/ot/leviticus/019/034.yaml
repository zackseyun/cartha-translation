id: LEV.19.34
reference: Leviticus 19:34
source:
  edition: WLC
  text: כְּ/אֶזְרָ֣ח מִ/כֶּם֩ יִהְיֶ֨ה לָ/כֶ֜ם הַ/גֵּ֣ר הַ/גָּ֣ר אִתְּ/כֶ֗ם וְ/אָהַבְתָּ֥
    ל/וֹ֙ כָּמ֔וֹ/ךָ כִּֽי גֵרִ֥ים הֱיִיתֶ֖ם בְּ/אֶ֣רֶץ מִצְרָ֑יִם אֲנִ֖י יְהוָ֥ה
    אֱלֹהֵי/כֶֽם׀־׃
translation:
  text: The sojourner who sojourns with you shall be to you like a native among you,
    and you shall love him as yourself, for you were sojourners in the land of Egypt.
    I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foreigner,' 'the resident alien,' or 'the stranger.' The Hebrew
      term refers to a non-native living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּאֶזְרָח
  chosen: like a native
  alternatives:
  - as a native-born person
  - like one born in the land
  - like a citizen
  lexicon: HALOT
  rationale: אֶזְרָח denotes a native inhabitant/native-born member of the community.
    'Like a native' is natural English and preserves the comparison introduced by
    כְּ.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גֵּר in Torah commonly refers not to a passing outsider but a non-native
    residing among Israel under its social protections. 'Sojourner' preserves this
    covenantal-legal nuance better than the more modern but technical 'resident alien'
    or the broader 'foreigner'.
- source_word: הַגָּר אִתְּכֶם
  chosen: who sojourns with you
  alternatives:
  - who resides with you
  - who lives among you
  lexicon: HALOT
  rationale: 'The participle גָּר echoes גֵּר and is best represented with a cognate
    expression to preserve the Hebrew wordplay and legal category: ''the sojourner
    who sojourns with you.'''
- source_word: יִהְיֶה לָכֶם
  chosen: shall be to you
  alternatives:
  - shall be for you
  - is to be to you
  lexicon: HALOT
  rationale: This construction expresses how the sojourner is to be regarded by Israel.
    'Shall be to you' is slightly formal but clear and close to the Hebrew syntax.
- source_word: וְאָהַבְתָּ לוֹ
  chosen: and you shall love him
  alternatives:
  - and you must love him
  - and love him
  lexicon: HALOT
  rationale: The verb is a covenantal command. 'You shall love him' preserves the
    imperative force in standard legal-English style and keeps the singular addressee
    typical of the law.
- source_word: כָּמוֹךָ
  chosen: as yourself
  alternatives:
  - as you love yourself
  - like yourself
  lexicon: HALOT
  rationale: This is the standard idiom of comparison in Lev 19. 'As yourself' is
    concise, idiomatic, and preserves the intertextual link with Lev 19:18.
- source_word: כִּי גֵרִים הֱיִיתֶם
  chosen: for you were sojourners
  alternatives:
  - for you were foreigners
  - for you were resident aliens
  lexicon: HALOT
  rationale: Repeating 'sojourners' preserves the lexical connection with גֵּר and
    grounds the command in Israel's own history of vulnerable residence in Egypt.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained because 'land of Egypt' is a common biblical
    expression and carries covenant-historical resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward covenant formula paired with the divine name: ''I am
    the LORD your God.'''
