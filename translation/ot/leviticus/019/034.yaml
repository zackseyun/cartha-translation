theological_decisions:
- issue: Rendering of גֵּר in a legal-ethical context
  chosen_reading: sojourner
  alternative_readings:
  - foreigner
  - resident alien
  - stranger
  rationale: The verse concerns a non-native residing among Israel and receiving treatment
    analogous to a native. 'Sojourner' best preserves the social and covenantal nuance
    without importing modern immigration categories. Because alternatives may help
    readers, they are preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH; no variance is warranted here.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
