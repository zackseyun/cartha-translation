id: LEV.19.37
reference: Leviticus 19:37
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֤ם אֶת כָּל חֻקֹּתַ/י֙ וְ/אֶת כָּל מִשְׁפָּטַ֔/י וַ/עֲשִׂיתֶ֖ם
    אֹתָ֑/ם אֲנִ֖י יְהוָֽה־־־־׃פ
translation:
  text: So you shall keep all my statutes and all my judgments, and do them. I am
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my decrees' for 'my statutes,' and 'my rules' or 'my ordinances' for
      'my judgments.' The Hebrew uses two distinct legal terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - You must keep
  lexicon: HALOT
  rationale: שׁמר in covenantal/legal contexts commonly means to keep, observe, or
    guard. 'Keep' is idiomatic in English for commandments and laws. The prefixed
    conjunction is rendered 'So' to reflect the verse's concluding, summative force
    at the end of the chapter, though 'And' is formally possible.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew in both occurrences.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקִּים refers to prescribed enactments or statutes. 'Statutes' is a
    standard and sufficiently clear legal rendering, preserving distinction from מִשְׁפָּטִים
    in the next phrase.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  - my judgments and rulings
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes judgments, legal decisions, or ordinances.
    'Judgments' preserves the lexical distinction from חֻקִּים and reflects the legal
    register of Leviticus, even if 'rules' would be more colloquial.
- source_word: וַ/עֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: עשה with legal objects means to do, perform, or carry out. 'Do them'
    is concise, natural, and preserves the directness of the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
