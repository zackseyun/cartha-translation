id: LEV.19.24
reference: Leviticus 19:24
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָה֙ הָ/רְבִיעִ֔ת יִהְיֶ֖ה כָּל פִּרְי֑/וֹ קֹ֥דֶשׁ הִלּוּלִ֖ים לַ/יהוָֽה־׃
translation:
  text: But in the fourth year all its fruit shall be holy, an offering of praise
    to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'holy, praises to the LORD' or 'holy, for praise to the
      LORD.' The Hebrew phrase is rare and may emphasize celebratory praise offered
      with the fruit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה
  chosen: But in the year
  alternatives:
  - And in the year
  - In the year
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered adversatively/sequentially as
    'But' to mark the contrast with the previous years in context (vv. 23–25), while
    ב marks the temporal phrase 'in the year.'
- source_word: הָרְבִיעִת
  chosen: the fourth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'year.'
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - will be
  lexicon: HALOT
  rationale: A standard future/copular rendering fits the legal instruction style.
- source_word: כָּל פִּרְיוֹ
  chosen: all its fruit
  alternatives:
  - all of its fruit
  - its whole fruit
  lexicon: HALOT
  rationale: כָּל with the singular noun and 3ms suffix naturally means the entirety
    of the tree's produce.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - a holy thing
  - set apart
  lexicon: HALOT
  rationale: 'Predicate use after ''shall be'': the fruit is designated as holy/set
    apart. ''Holy'' is the most natural and theologically weighty English equivalent.'
- source_word: הִלּוּלִים
  chosen: an offering of praise
  alternatives:
  - praises
  - for praise
  - jubilation
  lexicon: HALOT
  rationale: This plural noun is rare and related to praise/celebration. In this cultic
    context, 'an offering of praise' best conveys that the fruit is devoted to the
    LORD in a celebratory sacred use, not merely described as abstract 'praises.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication/direction. Following the project's
    contested-terms guidance, יהוה is rendered 'the LORD.' 'To the LORD' preserves
    the sense of consecration.
