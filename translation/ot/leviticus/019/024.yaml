theological_decisions:
- issue: Rendering the rare cultic phrase קֹדֶשׁ הִלּוּלִים
  chosen_reading: holy, an offering of praise to the LORD
  alternative_readings:
  - holy, for giving praise to the LORD
  - holy, praises to the LORD
  rationale: The phrase is unusual and could be rendered more formally as 'holy, praises
    to the LORD.' However, in the legal-sacrificial context, an English expression
    that makes the cultic force intelligible is preferable. 'An offering of praise'
    preserves the consecrated and celebratory sense without importing later doctrinal
    categories.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
