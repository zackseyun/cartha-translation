theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of לִרְצֹנְכֶם in sacrificial law
  chosen_reading: so that you may be accepted
  alternative_readings:
  - for your acceptance
  - at your pleasure
  rationale: The phrase is taken in the cultic sense of acceptability before God,
    consistent with nearby sacrificial legislation. This avoids implying that the
    offering is performed according to the worshiper's own preference.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
