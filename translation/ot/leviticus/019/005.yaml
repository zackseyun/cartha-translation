id: LEV.19.5
reference: Leviticus 19:5
source:
  edition: WLC
  text: וְ/כִ֧י תִזְבְּח֛וּ זֶ֥בַח שְׁלָמִ֖ים לַ/יהוָ֑ה לִֽ/רְצֹנְ/כֶ֖ם תִּזְבָּחֻֽ/הוּ׃
translation:
  text: And when you sacrifice a peace offering to the LORD, you shall sacrifice it
    so that you may be accepted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for your acceptance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: And when
  alternatives:
  - And if
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional/temporal instruction within legal
    material. 'And when' fits the flow from the preceding commands and avoids making
    the act merely hypothetical in English, while preserving the sense of a case law
    instruction.
- source_word: תִזְבְּחוּ
  chosen: you sacrifice
  alternatives:
  - you offer
  - you slaughter
  lexicon: HALOT
  rationale: From זבח, the verb specifically denotes sacrificial slaughter/offer.
    'Sacrifice' is the most natural English rendering in this cultic context and matches
    the object 'sacrifice/peace offering' without becoming overly technical.
- source_word: זֶבַח שְׁלָמִים
  chosen: a peace offering
  alternatives:
  - a sacrifice of peace offerings
  - a fellowship offering
  lexicon: HALOT
  rationale: The construct phrase denotes the well-known sacrificial category often
    rendered 'peace offering.' 'Fellowship offering' is interpretive and less directly
    tied to the Hebrew שלמים; 'peace offering' is the more transparent conventional
    rendering.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication of the offering. Per doctrine,
    יהוה is rendered 'the LORD.' 'To the LORD' is idiomatic and preserves the offering's
    dedication.
- source_word: לִ/רְצֹנְ/כֶם
  chosen: so that you may be accepted
  alternatives:
  - for your acceptance
  - at your pleasure
  - according to your will
  lexicon: HALOT
  rationale: רָצוֹן in sacrificial contexts commonly carries the sense of acceptability/acceptance
    before God. 'So that you may be accepted' makes explicit the idiomatic force in
    clear modern English. More literal 'for your acceptance' is possible but less
    natural; 'according to your will/at your pleasure' would wrongly suggest the worshiper's
    preference rather than divine acceptance.
- source_word: תִּזְבָּחֻהוּ
  chosen: you shall sacrifice it
  alternatives:
  - you shall offer it
  - you shall slaughter it
  lexicon: HALOT
  rationale: The repeated verb with 3ms suffix refers back to the offering and gives
    the governing instruction for how it is to be sacrificed. 'You shall sacrifice
    it' preserves the repetition and legal force better than smoothing it away.
