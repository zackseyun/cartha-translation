id: LEV.19.35
reference: Leviticus 19:35
source:
  edition: WLC
  text: לֹא תַעֲשׂ֥וּ עָ֖וֶל בַּ/מִּשְׁפָּ֑ט בַּ/מִּדָּ֕ה בַּ/מִּשְׁקָ֖ל וּ/בַ/מְּשׂוּרָֽה־׃
translation:
  text: You shall not commit injustice in judgment, in measurement of length, weight,
    or volume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You shall not do wrong in judgment, in measure, in weight, or in capacity
      measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall not commit
  alternatives:
  - You shall not do
  - Do not commit
  lexicon: HALOT
  rationale: The Hebrew is a second person masculine plural prohibition with עשה ('do/make').
    In English, 'commit' is a natural collocation with 'injustice' and preserves the
    prohibitive force without sounding wooden. 'You shall not' reflects the legal
    style of the context.
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrong
  - unrighteousness
  - injustice/fraud
  lexicon: HALOT
  rationale: עָוֶל denotes wrong, injustice, or unfairness. 'Injustice' fits the legal-commercial
    context of dishonest standards and aligns with the following specifics about measures
    and weights.
- source_word: בַּמִּשְׁפָּט
  chosen: in judgment
  alternatives:
  - in justice
  - in legal judgment
  - in matters of justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or legal decision. Here it likely
    functions broadly for judicial/fair dealing, introducing the sphere in which injustice
    must not be done. 'In judgment' is concise and close to the Hebrew while allowing
    the following measurement terms to specify practical applications.
- source_word: בַּמִּדָּה
  chosen: in measurement of length
  alternatives:
  - in measuring
  - in measure
  - in dimension
  lexicon: HALOT
  rationale: מִדָּה is a general term for measure, often of length or size. Because
    the verse then lists weight and liquid/dry capacity separately, specifying 'measurement
    of length' helps distinguish the categories in idiomatic English.
- source_word: בַּמִּשְׁקָל
  chosen: weight
  alternatives:
  - weighing
  - scales
  lexicon: HALOT
  rationale: מִשְׁקָל refers to weight or weighing. 'Weight' is the most direct rendering
    and matches the commercial context.
- source_word: וּבַמְּשׂוּרָה
  chosen: volume
  alternatives:
  - capacity measure
  - liquid measure
  - dry measure
  lexicon: HALOT
  rationale: מְשׂוּרָה denotes a measured quantity, especially a capacity measure.
    'Volume' is clear modern English and pairs well with 'length' and 'weight' as
    three categories of measurement. More specific options like 'liquid measure' are
    possible but narrower than the Hebrew requires.
