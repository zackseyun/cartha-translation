theological_decisions:
- issue: Whether to preserve the metaphor of 'uncircumcised' fruit or replace it with
    an interpretive term like 'forbidden'/'unpruned'
  chosen_reading: Preserve 'uncircumcised' in the main text
  alternative_readings:
  - forbidden
  - unpruned
  rationale: The Hebrew deliberately uses covenantal/cultic language (ערל/ערלה) metaphorically
    for fruit during its first three years. Rendering it 'forbidden' would communicate
    the practical effect but erase the metaphor; 'unpruned' is contextually unlikely
    here because the following clause concerns eating, not horticultural trimming.
    Preserving the metaphor maintains lexical transparency and theological texture
    while a footnote can clarify the sense.
  doctrine_reference: Translation philosophy §§1, 3, 5
