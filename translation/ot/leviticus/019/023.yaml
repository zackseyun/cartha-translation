id: LEV.19.23
reference: Leviticus 19:23
source:
  edition: WLC
  text: וְ/כִי תָבֹ֣אוּ אֶל הָ/אָ֗רֶץ וּ/נְטַעְתֶּם֙ כָּל עֵ֣ץ מַאֲכָ֔ל וַ/עֲרַלְתֶּ֥ם
    עָרְלָת֖/וֹ אֶת פִּרְי֑/וֹ שָׁלֹ֣שׁ שָׁנִ֗ים יִהְיֶ֥ה לָ/כֶ֛ם עֲרֵלִ֖ים לֹ֥א יֵאָכֵֽל־־־־׃
translation:
  text: When you come into the land and plant any kind of tree for food, you shall
    regard its fruit as uncircumcised. For three years it shall be uncircumcised to
    you; it shall not be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'uncircumcised.' The term is used metaphorically for fruit that is
      not yet permitted to be eaten during the first three years.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: When
  alternatives:
  - And when
  - Now when
  lexicon: HALOT
  rationale: In legal/instructional context, כִּי with prefixed conjunction introduces
    a future circumstance best rendered 'when' rather than a causal 'because.' 'And
    when' is possible but unnecessary in English.
- source_word: תָבֹאוּ אֶל הָאָרֶץ
  chosen: you come into the land
  alternatives:
  - you enter the land
  - you come to the land
  lexicon: HALOT
  rationale: בוא + אֶל הָאָרֶץ is naturally 'come into/enter the land.' 'The land'
    preserves the covenant-land reference without over-specifying 'Canaan,' which
    is not stated here.
- source_word: וּנְטַעְתֶּם כָּל עֵץ מַאֲכָל
  chosen: and plant any kind of tree for food
  alternatives:
  - and plant every food tree
  - and plant any tree for food
  lexicon: HALOT
  rationale: כָּל עֵץ מַאֲכָל refers to fruit-bearing trees intended for eating. 'Any
    kind of tree for food' is idiomatic English that preserves the distributive sense
    without implying literally every tree species.
- source_word: וַעֲרַלְתֶּם
  chosen: you shall regard
  alternatives:
  - you shall treat
  - you shall count
  lexicon: HALOT
  rationale: 'The verb from ערל in this causative/legal usage is idiomatic: the fruit
    is to be treated or considered as ''uncircumcised,'' not physically circumcised.
    ''Regard'' communicates the legal-status sense in natural English.'
- source_word: עָרְלָתוֹ אֶת פִּרְיוֹ
  chosen: its fruit as uncircumcised
  alternatives:
  - its fruit as forbidden
  - the uncircumcision of its fruit
  lexicon: HALOT
  rationale: The Hebrew uses the noun עָרְלָה with the fruit object, literally 'its
    uncircumcision, namely its fruit.' Retaining 'uncircumcised' preserves the metaphor
    and cultic terminology better than flattening it to 'forbidden' in the main text.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: For three years
  alternatives:
  - Three years
  lexicon: HALOT
  rationale: Fronting the time phrase reflects the Hebrew emphasis and reads naturally
    in English legal instruction.
- source_word: יִהְיֶה לָכֶם עֲרֵלִים
  chosen: it shall be uncircumcised to you
  alternatives:
  - it shall be forbidden to you
  - they shall be uncircumcised for you
  lexicon: HALOT
  rationale: Singular verb with plural adjective reflects the collective sense of
    fruit produce. English smooths this to singular 'it' referring collectively to
    the fruit. 'To you' preserves לָכֶם, indicating status relative to the Israelites.
- source_word: לֹא יֵאָכֵל
  chosen: it shall not be eaten
  alternatives:
  - you shall not eat it
  - it may not be eaten
  lexicon: HALOT
  rationale: The Niphal is passive/impersonal, so 'it shall not be eaten' is closer
    than an active prohibition addressed directly to the audience.
