id: LEV.19.10
reference: Leviticus 19:10
source:
  edition: WLC
  text: וְ/כַרְמְ/ךָ֙ לֹ֣א תְעוֹלֵ֔ל וּ/פֶ֥רֶט כַּרְמְ/ךָ֖ לֹ֣א תְלַקֵּ֑ט לֶֽ/עָנִ֤י
    וְ/לַ/גֵּר֙ תַּעֲזֹ֣ב אֹתָ֔/ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם׃
translation:
  text: And you shall not strip your vineyard bare, nor shall you gather the fallen
    grapes of your vineyard; you shall leave them for the poor and for the sojourner.
    I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'glean your vineyard'; the Hebrew verb refers to going over the vines
      again to take what remains after the main harvest.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gleanings of your vineyard'; the Hebrew refers to grapes left behind
      or fallen during harvest.
    reason: lexical_alternative
  - marker: c
    text: Or 'resident foreigner.' The Hebrew 'sojourner' refers to a non-native person
      living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּרְמְךָ
  chosen: your vineyard
  alternatives:
  - your vine-garden
  lexicon: HALOT
  rationale: כֶּרֶם denotes a vineyard. 'Vineyard' is standard, natural English and
    preserves the agricultural setting.
- source_word: תְעוֹלֵל
  chosen: strip ... bare
  alternatives:
  - glean
  - go over thoroughly
  lexicon: HALOT
  rationale: The verb עולל in this context refers to going over the vineyard a second
    time to remove what remains. 'Strip ... bare' communicates the prohibition against
    exhaustive harvesting more clearly than the more technical 'glean,' which in English
    is more often associated with the poor gathering leftovers.
- source_word: פֶּרֶט
  chosen: the fallen grapes
  alternatives:
  - gleanings
  - scattered grapes
  lexicon: HALOT
  rationale: פֶּרֶט refers to what is separated off or falls during harvesting. In
    a vineyard context, 'fallen grapes' makes the concrete referent explicit for modern
    readers while preserving the sense of leftover produce.
- source_word: תְלַקֵּט
  chosen: gather
  alternatives:
  - pick up
  - glean
  lexicon: HALOT
  rationale: לקט means to gather or pick up. 'Gather' is idiomatic here and avoids
    confusion with the previous harvesting prohibition while still matching the action
    of collecting what has fallen.
- source_word: לֶעָנִי
  chosen: for the poor
  alternatives:
  - for the needy
  lexicon: HALOT
  rationale: עָנִי commonly denotes a poor or afflicted person. 'The poor' is the
    most direct and conventional rendering in this legal context.
- source_word: וְלַגֵּר
  chosen: and for the sojourner
  alternatives:
  - and for the foreigner
  - and for the resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' preserves
    the covenantal-legal nuance better than the more modern but potentially bureaucratic
    'resident alien,' while avoiding the overbroad sense of 'foreigner.'
- source_word: תַּעֲזֹב אֹתָם
  chosen: you shall leave them
  alternatives:
  - you shall abandon them
  - you shall leave them behind
  lexicon: HALOT
  rationale: עזב here means to leave behind for others rather than abandon in an absolute
    sense. 'You shall leave them' is clear and faithful.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward covenant formula: ''I am the LORD your God.'' This preserves
    the legal-theological grounding of the command.'
