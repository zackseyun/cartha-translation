id: LEV.19.4
reference: Leviticus 19:4
source:
  edition: WLC
  text: אַל תִּפְנוּ֙ אֶל הָ֣/אֱלִילִ֔ים וֵֽ/אלֹהֵי֙ מַסֵּכָ֔ה לֹ֥א תַעֲשׂ֖וּ לָ/כֶ֑ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־־׃
translation:
  text: Do not turn to idols, and do not make cast-metal gods for yourselves. I am Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worthless idols'; the Hebrew term for idols may carry a pejorative sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'molten gods' or 'metal idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְנוּ
  chosen: turn
  alternatives:
  - turn toward
  - pay regard
  lexicon: HALOT
  rationale: פנה literally means to turn. In this prohibition with אֶל, 'turn to' naturally conveys directing oneself toward idols, whether in attention, allegiance, or worship, without over-paraphrasing to 'worship'.
- source_word: אֱלִילִים
  chosen: idols
  alternatives:
  - worthless idols
  - false gods
  lexicon: HALOT
  rationale: אֱלִילִים is the standard term for idols and likely carries a pejorative nuance of worthlessness, but 'idols' is the clearest natural English rendering. The stronger nuance is not required in the main text.
- source_word: אֱלֹהֵי מַסֵּכָה
  chosen: cast-metal gods
  alternatives:
  - molten gods
  - metal idols
  lexicon: HALOT
  rationale: The construct phrase denotes gods/images made by casting metal. 'Cast-metal gods' preserves both the plural 'gods' in אֱלֹהֵי and the manufacturing sense of מַסֵּכָה better than the more traditional but less transparent 'molten gods'.
- source_word: תַעֲשׂוּ לָכֶם
  chosen: make for yourselves
  alternatives:
  - make yourselves
  - fashion for yourselves
  lexicon: HALOT
  rationale: עשה with לָכֶם indicates making something for one's own use or possession. 'Make for yourselves' is idiomatic and preserves the reflexive-benefactive sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהֵי with second person suffix here refers syntactically and theologically to Israel's singular God in covenant formula language. 'Your God' is the established singular sense in context.
