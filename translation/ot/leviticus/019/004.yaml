theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit that turning to idols implies worship
  chosen_reading: Do not turn to idols
  alternative_readings:
  - Do not worship idols
  - Do not pay regard to idols
  rationale: The Hebrew verb פנה does not itself explicitly say 'worship'; it speaks of turning toward or directing oneself to idols. Preserving that wording avoids importing a narrower or stronger doctrinal claim than the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
