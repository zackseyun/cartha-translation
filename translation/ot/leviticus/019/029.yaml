id: LEV.19.29
reference: Leviticus 19:29
source:
  edition: WLC
  text: אַל תְּחַלֵּ֥ל אֶֽת בִּתְּ/ךָ֖ לְ/הַזְנוֹתָ֑/הּ וְ/לֹא תִזְנֶ֣ה הָ/אָ֔רֶץ
    וּ/מָלְאָ֥ה הָ/אָ֖רֶץ זִמָּֽה־־־׃
translation:
  text: Do not profane your daughter by making her a prostitute, lest the land become
    prostituted and the land be filled with depravity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by prostituting her' or 'to make her commit prostitution.' The Hebrew
      verb is causative.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'lest the land commit prostitution.' The phrase speaks metaphorically
      of the community becoming corrupted.
    reason: lexical_alternative
  - marker: c
    text: Or, 'lewdness' or 'wickedness.' The Hebrew term denotes outrageous moral
      depravity, often in a sexual context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחַלֵּל
  chosen: profane
  alternatives:
  - defile
  - dishonor
  lexicon: HALOT
  rationale: From חלל in the Piel, here meaning to treat as profane or desecrate.
    'Profane' preserves the holiness-context of Leviticus better than the more general
    'dishonor.'
- source_word: בִּתְּךָ
  chosen: your daughter
  lexicon: HALOT
  rationale: Straightforward filial term with 2ms suffix; singular retained.
- source_word: לְהַזְנוֹתָהּ
  chosen: by making her a prostitute
  alternatives:
  - to make her commit prostitution
  - by prostituting her
  lexicon: HALOT
  rationale: 'Hiphil infinitive of זנה with 3fs suffix is causative: causing her into
    prostitution. ''Making her a prostitute'' is idiomatic and preserves the causative
    force better than a simple intransitive rendering.'
- source_word: תִזְנֶה הָאָרֶץ
  chosen: the land become prostituted
  alternatives:
  - the land commit prostitution
  - the land play the prostitute
  lexicon: HALOT
  rationale: The verb זנה is used metaphorically of the land/society becoming characterized
    by sexual immorality. 'Become prostituted' keeps the metaphor while sounding natural
    in English; 'play the prostitute' is more literal but less idiomatic for modern
    readers.
- source_word: וּמָלְאָה הָאָרֶץ
  chosen: and the land be filled
  alternatives:
  - and the land become full
  lexicon: HALOT
  rationale: Qal perfect with vav here expresses resulting consequence. English subjunctive-like
    'be filled' fits the warning introduced by 'lest.'
- source_word: זִמָּה
  chosen: depravity
  alternatives:
  - lewdness
  - wickedness
  - sexual immorality
  lexicon: HALOT
  rationale: זִמָּה in Leviticus often denotes outrageous sexual misconduct or moral
    depravity. 'Depravity' captures the broad moral corruption implied by the consequence
    clause, while 'sexual immorality' would narrow the term too much and 'lewdness'
    may sound dated.
