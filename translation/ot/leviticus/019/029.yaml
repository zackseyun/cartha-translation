theological_decisions:
- issue: How to render the metaphor of the land 'committing prostitution'
  chosen_reading: Retain the metaphor with 'the land become prostituted' rather than
    flattening it to a generic moral decline.
  alternative_readings:
  - the land become immoral
  - the land fall into prostitution
  rationale: Leviticus uses sexual-prostitution language both literally and metaphorically
    to describe covenantal and communal corruption. Preserving the metaphor maintains
    the text's moral and rhetorical force without importing later theological categories.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether חלל should be rendered in a holiness-register term
  chosen_reading: Use 'profane' in the main text.
  alternative_readings:
  - defile
  - dishonor
  rationale: Because Leviticus is structured around holy/profane distinctions, 'profane'
    best preserves the book's theological vocabulary and conceptual world.
  doctrine_reference: Translation philosophy §1, §5
