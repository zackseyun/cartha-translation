theological_decisions:
- issue: Rendering the covenant identity term בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine and literally filial. In keeping
    with the translation philosophy's gender-accurate principle, the main text preserves
    that form rather than neutralizing it. Because English readers may understand
    the phrase corporately, an idiomatic alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Rendering the holiness command
  chosen_reading: You shall be holy
  alternative_readings:
  - Be holy
  - You must be holy
  rationale: The Hebrew construction can be rendered in English with imperative-like
    force, but 'You shall be holy' best preserves the covenantal, legislative tone
    and avoids collapsing the form into a bare imperative. The alternatives are viable
    and worth preserving.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence / preserve
    source sense
