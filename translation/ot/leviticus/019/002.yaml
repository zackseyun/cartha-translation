id: LEV.19.2
reference: Leviticus 19:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל כָּל עֲדַ֧ת בְּנֵי יִשְׂרָאֵ֛ל וְ/אָמַרְתָּ֥ אֲלֵ/הֶ֖ם קְדֹשִׁ֣ים
    תִּהְי֑וּ כִּ֣י קָד֔וֹשׁ אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־־־׃
translation:
  text: Speak to all the congregation of the sons of Israel, and say to them, ‘You
    shall be holy, for I, the LORD your God, am holy.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “the whole assembly of the Israelites.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “Be holy” or “You must be holy.”'
    reason: alternative_reading
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Address
  lexicon: HALOT
  rationale: Piel imperative of דבר, a direct command to Moses. 'Speak' is the straightforward
    formal rendering and fits the solemn legislative context.
- source_word: כָּל עֲדַת
  chosen: all the congregation
  alternatives:
  - the whole assembly
  - all the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves the corporate and somewhat formal sense appropriate to Leviticus, while
    'all' renders כָּל explicitly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is preserved
    as 'sons of Israel.' Although idiomatically it refers to the covenant people broadly,
    the source expression is explicitly filial and masculine in form. More idiomatic
    alternatives were considered but not chosen for main text.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: A common command sequence in legal discourse. 'Say to them' keeps the
    directness and cadence of the Hebrew.
- source_word: קְדֹשִׁים תִּהְיוּ
  chosen: You shall be holy
  alternatives:
  - You must be holy
  - Be holy
  lexicon: HALOT
  rationale: The predicate adjective plus imperfect of היה expresses obligation/result
    in covenant instruction. 'You shall be holy' preserves the formal force and echoes
    the legal-register style of the passage without over-paraphrasing.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: קדוש fundamentally conveys holiness/separateness in relation to God.
    'Holy' is the established and most theologically adequate rendering here; 'set
    apart' captures part of the sense but is too reductive in this context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English Bible convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: The pronominal suffix is second person masculine plural, matching the
    addressed community. 'Your God' is the natural and accurate rendering in covenant
    formula language.
