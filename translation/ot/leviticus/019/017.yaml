theological_decisions:
- issue: Scope of kinship language in covenant ethics
  chosen_reading: Retain the masculine singular relational terms 'brother' and 'neighbor'
    rather than neutralizing them.
  alternative_readings:
  - your fellow person
  - another Israelite
  rationale: The Hebrew uses grammatically masculine singular forms with representative
    force. Per translation philosophy, gender-accurate rendering is preferred over
    flattening to neutral language, while allowing the broader communal application
    to remain implicit in context.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
