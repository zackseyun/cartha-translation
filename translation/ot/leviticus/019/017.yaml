id: LEV.19.17
reference: Leviticus 19:17
source:
  edition: WLC
  text: לֹֽא תִשְׂנָ֥א אֶת אָחִ֖י/ךָ בִּ/לְבָבֶ֑/ךָ הוֹכֵ֤חַ תּוֹכִ֨יחַ֙ אֶת עֲמִיתֶ֔/ךָ
    וְ/לֹא תִשָּׂ֥א עָלָ֖י/ו חֵֽטְא־־־־׃
translation:
  text: You shall not hate your brother in your heart. You shall surely rebuke your
    neighbor, and you shall not bear sin because of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incur guilt on his account' or 'share in his sin.' The Hebrew expression
      is idiomatic and may refer to becoming culpable by failing to confront wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׂנָא
  chosen: hate
  alternatives:
  - be hostile to
  lexicon: HALOT
  rationale: The verb שׂנא straightforwardly denotes hatred. 'Hate' preserves the
    moral force of the prohibition better than a softened paraphrase.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your kinsman
  - your fellow Israelite
  lexicon: HALOT
  rationale: אָח can mean literal brother or a fellow member of the covenant community.
    'Brother' keeps the source term and preserves the familial/covenantal resonance;
    broader communal force can be inferred from context.
- source_word: בִּלְבָבֶךָ
  chosen: in your heart
  alternatives:
  - within yourself
  lexicon: HALOT
  rationale: לֵבָב commonly refers to the inner person, including thought and intention.
    'In your heart' is both literal and idiomatic in English, preserving the inward
    focus of the command.
- source_word: הוֹכֵחַ תּוֹכִיחַ
  chosen: you shall surely rebuke
  alternatives:
  - you shall certainly reprove
  - you must frankly correct
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Surely
    rebuke' captures the emphatic force while remaining natural English. 'Rebuke'
    fits the moral/covenantal context better than the weaker 'correct.'
- source_word: עֲמִיתֶךָ
  chosen: your neighbor
  alternatives:
  - your associate
  - your fellow
  lexicon: HALOT
  rationale: עָמִית refers to a fellow member of one's community. 'Neighbor' is the
    most idiomatic and recognizable English equivalent in this legal-ethical context,
    especially within Leviticus 19.
- source_word: תִשָּׂא עָלָיו חֵטְא
  chosen: bear sin because of him
  alternatives:
  - incur sin on his account
  - bear guilt because of him
  - share in his sin
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. נָשָׂא חֵטְא can mean to bear guilt
    or incur culpability. With עָלָיו, the sense is that failure to rebuke results
    in becoming guilty because of him. 'Bear sin because of him' stays close to the
    Hebrew while communicating causal force.
