theological_decisions:
- issue: Cultic status of meat eaten on the third day
  chosen_reading: The verse declares such meat ritually unacceptable rather than making
    a broader moral-metaphysical statement.
  alternative_readings:
  - The meat is merely spoiled or physically corrupt
  - The term denotes a full 'abomination' in the same sense as other severe taboo
    terms
  rationale: The immediate sacrificial context in Leviticus concerns acceptability
    of offerings. The final clause 'it will not be accepted' interprets פִּגּוּל in
    cultic terms. The translation therefore preserves the ritual-sacrificial force
    without expanding it into a broader doctrinal category.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
