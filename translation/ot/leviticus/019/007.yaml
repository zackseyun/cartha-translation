id: LEV.19.7
reference: Leviticus 19:7
source:
  edition: WLC
  text: וְ/אִ֛ם הֵאָכֹ֥ל יֵאָכֵ֖ל בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י פִּגּ֥וּל ה֖וּא לֹ֥א
    יֵרָצֶֽה׃
translation:
  text: But if it is eaten at all on the third day, it is an offensive thing; it will
    not be accepted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foul' or 'tainted.' The Hebrew term refers to sacrificial meat rendered
      unacceptable by being eaten beyond the permitted time.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional introduces a contrastive condition with
    the previous instruction. 'But if' captures the adversative flow in natural English
    while preserving the conditional force.
- source_word: הֵאָכֹל יֵאָכֵל
  chosen: it is eaten at all
  alternatives:
  - it is indeed eaten
  - it is surely eaten
  - it is eaten
  lexicon: HALOT
  rationale: The infinitive absolute with the following finite Niphal verb intensifies
    the verbal idea. 'Is eaten at all' conveys the emphatic warning idiomatically
    in English without over-paraphrasing.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on day three
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On the third day' is the natural
    and precise English rendering.
- source_word: פִּגּוּל
  chosen: an offensive thing
  alternatives:
  - foul
  - unclean thing
  - tainted meat
  - abomination
  lexicon: HALOT
  rationale: The noun refers in sacrificial context to something ritually unacceptable,
    especially meat rendered unfit by violation of sacrificial rules. 'An offensive
    thing' preserves the evaluative force without importing a narrower technical term
    not explicit in English. 'Abomination' would overstate and risk confusion with
    other Hebrew terms.
- source_word: הוּא
  chosen: it is
  alternatives:
  - it
  lexicon: HALOT
  rationale: 'The pronoun is predicative and emphatic: ''it is an offensive thing.''
    English requires the copular expression for clarity.'
- source_word: לֹא יֵרָצֶה
  chosen: it will not be accepted
  alternatives:
  - it will not be pleasing
  - it will not be favorably received
  lexicon: HALOT
  rationale: The Niphal of רצה in sacrificial contexts commonly denotes acceptability
    before God. 'Will not be accepted' is the clearest contextual rendering and matches
    the cultic sense better than the more general 'be pleasing'.
