theological_decisions:
- issue: Interpretation of לֹא תַעֲמֹד עַל דַּם רֵעֶךָ
  chosen_reading: A prohibition against acting against or endangering the life of one's neighbor, rendered literally as 'stand against the blood of your neighbor.'
  alternative_readings:
  - A prohibition against standing idly by while your neighbor's blood is shed
  - A prohibition against testifying against your neighbor in a capital case
  rationale: The Hebrew phrase is terse and admits more than one contextual nuance. The main text keeps the literal 'blood' language and chooses 'against' for על, which preserves the possibility of hostile or complicit action without over-paraphrasing. Because many interpreters understand the phrase as forbidding passive indifference to mortal danger, that alternative is preserved in a footnote rather than resolved away.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
