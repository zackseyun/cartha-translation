id: LEV.19.16
reference: Leviticus 19:16
source:
  edition: WLC
  text: לֹא תֵלֵ֤ךְ רָכִיל֙ בְּ/עַמֶּ֔י/ךָ לֹ֥א תַעֲמֹ֖ד עַל דַּ֣ם רֵעֶ֑/ךָ אֲנִ֖י יְהוָֽה־־׃
translation:
  text: You shall not go about as a slanderer among your people. You shall not stand against the blood of your neighbor. I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You shall not stand by while your neighbor's blood is shed.'
    reason: alternative_reading
lexical_decisions:
- source_word: תֵלֵךְ
  chosen: go about
  alternatives:
  - go
  - walk about
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' In this idiom with רָכִיל it conveys moving about within the community spreading reports, so 'go about' preserves the verbal image while sounding natural in English.
- source_word: רָכִיל
  chosen: slanderer
  alternatives:
  - talebearer
  - gossip
  - one who goes about trading in slander
  lexicon: HALOT
  rationale: רָכִיל denotes a person who circulates damaging reports. 'Talebearer' is traditional but archaic; 'gossip' can sound too light and may not capture the harmful, accusatory force. 'Slanderer' best conveys the moral seriousness in readable modern English.
- source_word: בְּעַמֶּיךָ
  chosen: among your people
  alternatives:
  - among your kinsmen
  - within your people
  lexicon: HALOT
  rationale: The preposition ב plus 'your people' is naturally rendered 'among your people,' indicating conduct within the covenant community.
- source_word: תַעֲמֹד
  chosen: stand
  alternatives:
  - stand by
  - take a stand
  lexicon: HALOT
  rationale: עמד is basically 'stand.' Retaining 'stand' keeps the Hebrew imagery and allows the following prepositional phrase to carry the nuance.
- source_word: עַל
  chosen: against
  alternatives:
  - by
  - over
  - upon
  lexicon: HALOT
  rationale: With 'stand' and 'blood,' על is difficult and has been understood either as hostile action ('against') or passive indifference ('by'). The immediate sense in context is prohibition against acting in a way that endangers a neighbor's life, so 'against' is chosen for the main text while the alternative is preserved in a footnote.
- source_word: דַּם
  chosen: blood
  alternatives:
  - lifeblood
  - life
  lexicon: HALOT
  rationale: דם is literally 'blood,' often metonymic for life or bloodshed. Keeping 'blood' preserves the Hebrew concreteness and legal-ethical force.
- source_word: רֵעֶךָ
  chosen: your neighbor
  alternatives:
  - your fellow
  - your companion
  lexicon: HALOT
  rationale: רֵעַ in this legal-ethical context refers to a fellow member of the community. 'Neighbor' is the most established and natural English rendering, and it resonates with later biblical usage without importing extra meaning.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
