id: LEV.19.8
reference: Leviticus 19:8
source:
  edition: WLC
  text: וְ/אֹֽכְלָי/ו֙ עֲוֺנ֣/וֹ יִשָּׂ֔א כִּֽי אֶת קֹ֥דֶשׁ יְהוָ֖ה חִלֵּ֑ל וְ/נִכְרְתָ֛ה
    הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מֵ/עַמֶּֽי/הָ־־׃
translation:
  text: Whoever eats it shall bear his iniquity, because he has profaned the holy
    thing of the LORD, and that person shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall bear his guilt.' The Hebrew idiom can refer to bearing culpability
      and its consequences.
    reason: lexical_alternative
  - marker: b
    text: '''The holy thing of the LORD'' refers to what has been consecrated to the
      LORD, here the sacrificial meat.'
    reason: cultural_note
  - marker: c
    text: Or 'that soul shall be cut off.' The Hebrew says 'soul,' a legal idiom for
      the person.
    reason: lexical_alternative
  - marker: d
    text: '''Shall be cut off'' is a covenantal penalty formula; the text does not
      specify here whether this means death, expulsion, or direct divine judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֹכְלָיו
  chosen: Whoever eats it
  alternatives:
  - its eater
  - the one who eats it
  lexicon: HALOT
  rationale: The participial form with pronominal suffix refers to any person eating
    the sacrificial meat in the prohibited timeframe from the previous verse. 'Whoever
    eats it' gives natural English while preserving the generic singular force.
- source_word: עֲוֺנוֹ יִשָּׂא
  chosen: shall bear his iniquity
  alternatives:
  - shall bear his guilt
  - shall bear the punishment for his iniquity
  lexicon: HALOT
  rationale: This idiom commonly denotes liability for wrongdoing and its consequences.
    'Bear his iniquity' preserves the formal biblical idiom and theological weight
    better than the more interpretive 'bear the punishment,' while remaining understandable.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the penalty. 'Because' is clearer in modern
    English than 'for' here.
- source_word: קֹדֶשׁ יְהוָה
  chosen: the holy thing of the LORD
  alternatives:
  - the LORD's holy offering
  - what is holy to the LORD
  - the holy portion of the LORD
  lexicon: HALOT
  rationale: The phrase refers to something consecrated to YHWH, here the sacrificial
    meat. 'The holy thing of the LORD' stays close to the Hebrew without over-specifying
    'offering,' which is contextually implied from the preceding verse rather than
    explicit in this clause.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: חִלֵּל
  chosen: has profaned
  alternatives:
  - has desecrated
  - has defiled
  lexicon: HALOT
  rationale: The piel of חלל here means to treat what is holy as common. 'Profaned'
    is the standard and suitably weighty English equivalent.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be removed
  - shall be cut down
  lexicon: HALOT
  rationale: This is the standard rendering of the covenantal penalty formula. It
    preserves the Hebrew expression without prematurely resolving whether the cutting
    off is death, excommunication, or divine judgment.
- source_word: הַנֶּפֶשׁ הַהִוא
  chosen: that person
  alternatives:
  - that soul
  - that individual
  lexicon: HALOT
  rationale: Although נֶפֶשׁ is literally 'soul,' in legal contexts it often denotes
    the person as a whole. 'That person' is idiomatic modern English and best reflects
    the legal sense.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from his kin
  - from his community
  lexicon: HALOT
  rationale: The suffix is grammatically feminine because it agrees with נֶפֶשׁ, but
    the referent is the generic offender. English naturally renders the sense as 'his
    people' in line with the generic singular established earlier.
