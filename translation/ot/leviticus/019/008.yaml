theological_decisions:
- issue: Meaning of the penalty formula 'cut off'
  chosen_reading: Retain the formula 'shall be cut off' without specifying the mechanism.
  alternative_readings:
  - shall be executed
  - shall be excommunicated
  - shall be removed by divine judgment
  rationale: The Hebrew formula is theologically and legally significant but not fully
    explicit about the mode of judgment in this verse. Preserving the idiom maintains
    the text's tension rather than resolving a debated interpretive question.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it).
