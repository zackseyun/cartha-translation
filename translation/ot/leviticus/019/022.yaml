id: LEV.19.22
reference: Leviticus 19:22
source:
  edition: WLC
  text: וְ/כִפֶּר֩ עָלָ֨י/ו הַ/כֹּהֵ֜ן בְּ/אֵ֤יל הָֽ/אָשָׁם֙ לִ/פְנֵ֣י יְהוָ֔ה עַל
    חַטָּאת֖/וֹ אֲשֶׁ֣ר חָטָ֑א וְ/נִסְלַ֣ח ל֔/וֹ מֵ/חַטָּאת֖/וֹ אֲשֶׁ֥ר חָטָֽא־׃פ
translation:
  text: And the priest shall make atonement for him before the LORD with the ram of
    the guilt offering for his sin that he committed, and he shall be forgiven for
    the sin that he committed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the ram of the reparation offering.' The Hebrew אָשָׁם can denote
      both guilt and the compensatory/reparative aspect of this sacrifice.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall make expiation
  - shall purge
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts commonly denotes the priest's ritual
    act of making atonement/expiation on behalf of someone. 'Make atonement' is the
    most established and clear English rendering in Leviticus, preserving the cultic
    sense without over-paraphrase.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - on his behalf
  - for him/on him
  lexicon: HALOT
  rationale: With כפר, על often indicates the person for whom atonement is made. 'For
    him' is idiomatic and accurately conveys beneficiary sense in English.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the officiating cultic agent; definite article
    preserved.
- source_word: בְּאֵיל הָאָשָׁם
  chosen: with the ram of the guilt offering
  alternatives:
  - with the ram of the reparation offering
  - by the guilt-offering ram
  lexicon: HALOT
  rationale: איל is specifically 'ram.' אָשָׁם in sacrificial law denotes the guilt/reparation
    offering. 'Guilt offering' is the most recognizable English equivalent; 'with'
    reflects instrumental beth.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is standard cultic spatial language. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Before the LORD' preserves the formal sacrificial setting.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for his sin that he committed
  alternatives:
  - concerning his sin which he sinned
  - because of his sin that he committed
  lexicon: HALOT
  rationale: The phrase specifies the offense for which atonement is made. English
    requires smoothing the Hebrew cognate construction; 'sin that he committed' preserves
    the emphasis without awkwardness.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and it shall be forgiven him
  lexicon: HALOT
  rationale: The Niphal of סלח is naturally rendered as passive divine forgiveness.
    English idiom favors 'he shall be forgiven,' while the implied divine agent remains
    unstated as in the Hebrew.
- source_word: מֵחַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: for the sin that he committed
  alternatives:
  - from his sin that he committed
  - of the sin that he committed
  lexicon: HALOT
  rationale: Though the preposition is מן, in this forgiveness formula English idiom
    is best expressed as forgiveness 'for' the sin rather than wooden 'from' the sin.
    This preserves meaning and readability in line with optimal equivalence.
