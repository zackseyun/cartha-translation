theological_decisions:
- issue: Rendering the kinship-redemption terminology
  chosen_reading: Use 'redeem' consistently for גאל in this legal context.
  alternative_readings:
  - buy back
  - recover
  rationale: The chapter's theology and law of redemption are tied to the גאל word-group.
    'Redeem' preserves that conceptual continuity better than a purely commercial
    gloss.
  doctrine_reference: Translation philosophy §5
- issue: Handling the idiom הִשִּׂיגָה יָדוֹ
  chosen_reading: 'Retain the hand-idiom in a readable form: ''if his hand prospers.'''
  alternative_readings:
  - if he prospers
  - if he acquires sufficient means
  rationale: Optimal equivalence favors preserving the Hebrew imagery where understandable,
    while the following clause explains the practical meaning. This avoids flattening
    the text into paraphrase.
  doctrine_reference: Translation philosophy §1, §6
