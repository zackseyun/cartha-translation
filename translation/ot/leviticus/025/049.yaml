id: LEV.25.49
reference: Leviticus 25:49
source:
  edition: WLC
  text: אוֹ דֹד֞/וֹ א֤וֹ בֶן דֹּד/וֹ֙ יִגְאָלֶ֔/נּוּ אֽוֹ מִ/שְּׁאֵ֧ר בְּשָׂר֛/וֹ
    מִ/מִּשְׁפַּחְתּ֖/וֹ יִגְאָלֶ֑/נּוּ אֽוֹ הִשִּׂ֥יגָה יָד֖/וֹ וְ/נִגְאָֽל־־־־׃
translation:
  text: or his uncle, or his uncle’s son, may redeem him; or one of his close blood
    relatives from his clan may redeem him; or if his hand prospers, he may redeem
    himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his uncle’s son'; that is, his cousin.
    reason: lexical_alternative
  - marker: b
    text: Or, 'if he acquires sufficient means.' Literally, 'if his hand prospers/attains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹדוֹ
  chosen: his uncle
  alternatives:
  - his beloved one
  lexicon: HALOT
  rationale: In kinship legislation דּוֹד denotes an uncle, not the broader sense
    'beloved.' The legal context of redemption by relatives requires the familial
    sense.
- source_word: בֶן דֹּדוֹ
  chosen: his uncle’s son
  alternatives:
  - his cousin
  lexicon: HALOT
  rationale: Literally 'son of his uncle.' This is transparent and formally close
    to the Hebrew; 'cousin' is a natural equivalent but less explicit about the underlying
    kinship expression.
- source_word: יִגְאָלֶנּוּ
  chosen: may redeem him
  alternatives:
  - shall redeem him
  - may buy him back
  lexicon: HALOT
  rationale: From גאל in the sense of kinship redemption. 'Redeem' preserves the legal-theological
    term used throughout the chapter. 'May' fits the permissive/casuistic force better
    than an absolute future.
- source_word: מִשְּׁאֵר בְּשָׂרוֹ
  chosen: one of his close blood relatives
  alternatives:
  - one of the remnant of his flesh
  - one of his near relatives
  lexicon: HALOT
  rationale: The idiom refers to near kin by blood relation. 'Close blood relatives'
    communicates the familial proximity without woodenly reproducing the Hebrew idiom
    'flesh.'
- source_word: מִמִּשְׁפַּחְתּוֹ
  chosen: from his clan
  alternatives:
  - from his family
  lexicon: HALOT
  rationale: מִשְׁפָּחָה often denotes a wider kinship unit or clan within Israelite
    social structure. 'Clan' better reflects that broader familial grouping in this
    legal setting.
- source_word: הִשִּׂיגָה יָדוֹ
  chosen: his hand prospers
  alternatives:
  - he acquires sufficient means
  - his hand attains enough
  lexicon: HALOT
  rationale: This Hebrew idiom means that he comes into sufficient resources. 'His
    hand prospers' preserves the concrete Hebrew image while remaining intelligible
    in English; the following clause clarifies the result.
- source_word: וְנִגְאָל
  chosen: he may redeem himself
  alternatives:
  - then he shall be redeemed
  - then he may be redeemed
  lexicon: HALOT
  rationale: 'In context, after the idiom about his means increasing, the sense is
    reflexive/self-redemption: he can secure his own redemption. English expresses
    this naturally as ''redeem himself,'' though the Hebrew form is not explicitly
    reflexive.'
