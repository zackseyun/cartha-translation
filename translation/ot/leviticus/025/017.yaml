id: LEV.25.17
reference: Leviticus 25:17
source:
  edition: WLC
  text: וְ/לֹ֤א תוֹנוּ֙ אִ֣ישׁ אֶת עֲמִית֔/וֹ וְ/יָרֵ֖אתָ מֵֽ/אֱלֹהֶ֑י/ךָ כִּ֛י אֲנִ֥י
    יְהֹוָ֖ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: And no man shall oppress his neighbor, but you shall fear your God, for I
    am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall wrong' or 'shall exploit.' The Hebrew verb can denote taking unfair
      advantage of another in social or economic dealings.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹנוּ
  chosen: shall oppress
  alternatives:
  - shall wrong
  - shall mistreat
  - shall exploit
  lexicon: HALOT
  rationale: The Hifil of ינה in this legal-economic context refers to taking unfair
    advantage of another, especially in dealings. 'Oppress' captures the seriousness
    and social-ethical force better than the weaker 'wrong,' while remaining broad
    enough for the context of Jubilee regulations.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with distributive force
    ('each man'). Per the translation philosophy's gender-accurate principle, 'man'
    is retained rather than neutralized, while still functioning representatively
    in context.
- source_word: עֲמִיתוֹ
  chosen: his neighbor
  alternatives:
  - his fellow
  - his associate
  lexicon: HALOT
  rationale: עָמִית commonly denotes a fellow member of the covenant community or
    social peer in legal material. 'Neighbor' is natural English and preserves the
    interpersonal ethical dimension.
- source_word: וְיָרֵאתָ
  chosen: but you shall fear
  alternatives:
  - and you shall fear
  lexicon: HALOT
  rationale: 'The conjunction is formally ''and,'' but in English the clause is adversative
    or contrastive in force: instead of oppressing, the hearer is to fear God. ''But''
    makes the relationship between the prohibitive and positive command clear without
    over-paraphrasing.'
- source_word: מֵאֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - from your God
  lexicon: HALOT
  rationale: After ירא, the preposition מן marks the object of fear idiomatically.
    English expresses this simply as 'fear your God,' not 'fear from your God.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: The plural pronominal suffix addresses the covenant community as a whole.
    English 'your God' naturally conveys this without awkward expansion.
- source_word: כִּי אֲנִי יְהוָה אֱלֹהֵיכֶם
  chosen: for I am the LORD your God
  alternatives:
  - because I am the LORD your God
  lexicon: HALOT
  rationale: This covenant formula grounds the command in the identity and authority
    of Israel's God. 'For' is idiomatic and preserves the causal force of כִּי.
