theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, while preserving alternatives only as needed. No special contextual
    factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Representative masculine language in אִישׁ
  chosen_reading: no man
  alternative_readings:
  - no one
  - no person
  rationale: The source uses masculine singular distributively. Following the gender-accurate
    principle, the translation retains 'man' rather than flattening to a gender-neutral
    term, while understanding it representatively in legal address.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
