theological_decisions:
- issue: Rendering of Israelite kinship language in social law
  chosen_reading: your brother
  alternative_readings:
  - your fellow Israelite
  - your kinsman
  rationale: The verse concerns debt servitude within Israel's covenant community.
    Retaining 'brother' preserves the familial-ethical force of the law rather than
    flattening it to a merely civic label.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Nature of the sale described by וְנִמְכַּר
  chosen_reading: sells himself
  alternative_readings:
  - is sold
  rationale: The legal context in Leviticus 25 concerns impoverished persons entering
    bonded service because of debt. 'Sells himself' makes explicit the self-sale implied
    by the context without importing claims beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 1
