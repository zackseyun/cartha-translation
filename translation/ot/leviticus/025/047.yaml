id: LEV.25.47
reference: Leviticus 25:47
source:
  edition: WLC
  text: וְ/כִ֣י תַשִּׂ֗יג יַ֣ד גֵּ֤ר וְ/תוֹשָׁב֙ עִמָּ֔/ךְ וּ/מָ֥ךְ אָחִ֖י/ךָ עִמּ֑/וֹ
    וְ/נִמְכַּ֗ר לְ/גֵ֤ר תּוֹשָׁב֙ עִמָּ֔/ךְ א֥וֹ לְ/עֵ֖קֶר מִשְׁפַּ֥חַת גֵּֽר׃
translation:
  text: Now if the means of a resident foreigner among you become sufficient, and
    your brother beside him becomes poor and sells himself to the resident foreigner
    among you, or to a member of the foreigner’s clan,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the stock/offshoot of a foreigner’s family.' The Hebrew expression
      is difficult; the main text renders the likely sense idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשִּׂיג יַד
  chosen: the means ... become sufficient
  alternatives:
  - the hand ... attains
  - prospers
  - acquires enough wealth
  lexicon: HALOT
  rationale: The idiom 'hand attains' refers to financial capacity or resources becoming
    sufficient. 'Means ... become sufficient' conveys the economic sense in natural
    English without over-paraphrasing.
- source_word: גֵּר
  chosen: resident foreigner
  alternatives:
  - sojourner
  - alien
  - foreigner
  lexicon: HALOT
  rationale: גֵּר denotes a non-native living within Israelite society under its protections,
    not merely a traveler. 'Resident foreigner' best captures settled residence and
    outsider status in readable modern English.
- source_word: תוֹשָׁב
  chosen: resident
  alternatives:
  - settler
  - temporary resident
  lexicon: HALOT
  rationale: In apposition with גֵּר, תּוֹשָׁב further specifies one dwelling among
    the Israelites. Rendering the pair as 'resident foreigner' in the first instance
    and 'resident foreigner' again in the sale clause preserves the combined sense
    without awkward duplication.
- source_word: וּמָךְ
  chosen: becomes poor
  alternatives:
  - grows poor
  - is impoverished
  lexicon: HALOT
  rationale: The verb marks a decline into poverty. 'Becomes poor' is straightforward
    and idiomatic.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: The covenantal-social term is literally 'your brother.' This preserves
    the familial language of the law; the referent is an Israelite compatriot in context.
- source_word: עִמּוֹ
  chosen: beside him
  alternatives:
  - with him
  - in relation to him
  lexicon: HALOT
  rationale: Here the phrase situates the poor brother in relation to the prosperous
    resident foreigner. 'Beside him' communicates proximity/comparison in status and
    circumstance more clearly than a bare 'with him.'
- source_word: וְנִמְכַּר
  chosen: sells himself
  alternatives:
  - is sold
  - is sold into service
  lexicon: HALOT
  rationale: 'Although the Niphal can be rendered passively (''is sold''), in this
    legal-economic context the sense is effectively reflexive: he sells himself due
    to debt poverty. This is the clearest English expression of the institution described.'
- source_word: לְגֵר תּוֹשָׁב עִמָּךְ
  chosen: to the resident foreigner among you
  alternatives:
  - to a sojourner who resides with you
  - to the foreign resident with you
  lexicon: HALOT
  rationale: This repeats the earlier social category. 'Among you' is a natural rendering
    of עִמָּךְ in this communal/legal setting.
- source_word: לְעֵקֶר מִשְׁפַּחַת גֵּר
  chosen: to a member of the foreigner’s clan
  alternatives:
  - to the stock of a foreigner's family
  - to an offshoot of a foreign clan
  - to a descendant of a foreign family
  lexicon: HALOT
  rationale: עֵקֶר is difficult and likely refers to a branch/root-stock/member of
    the family group. 'A member of the foreigner’s clan' gives a clear, contextually
    plausible sense in idiomatic English while avoiding overly wooden 'stock/root'
    language in the main text.
