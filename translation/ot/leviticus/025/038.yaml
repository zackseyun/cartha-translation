  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering the covenant formula לִהְיוֹת לָכֶם לֵאלֹהִים
  chosen_reading: to be your God
  alternative_readings:
  - to be God to you
  - to become your God
  rationale: The phrase expresses covenant relationship rather than a change in God's being. 'To be your God' preserves the theological force of divine covenant commitment without introducing unnecessary interpretive nuance.
