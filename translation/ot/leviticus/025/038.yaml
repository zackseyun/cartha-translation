id: LEV.25.38
reference: Leviticus 25:38
source:
  edition: WLC
  text: אֲנִ֗י יְהוָה֙ אֱלֹ֣הֵי/כֶ֔ם אֲשֶׁר הוֹצֵ֥אתִי אֶתְ/כֶ֖ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם לָ/תֵ֤ת לָ/כֶם֙ אֶת אֶ֣רֶץ כְּנַ֔עַן לִ/הְי֥וֹת לָ/כֶ֖ם לֵ/אלֹהִֽים־־׃ס
translation:
  text: I am Yahweh your God, who brought you out of the land of Egypt to give you the land of Canaan, to be your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים with a singular referent and in covenant formula context denotes the one God of Israel; 'your God' is the idiomatic and contextually correct rendering.
- source_word: הוֹצֵאתִי
  chosen: brought ... out
  alternatives:
  - caused ... to go out
  - led ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא commonly means 'bring out' in exodus contexts. 'Brought you out' is both faithful and natural in English, and preserves the covenantal-exodus formula.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from Egypt
  - from the country of Egypt
  lexicon: HALOT
  rationale: The phrase explicitly includes אֶרֶץ, so 'the land of Egypt' is retained rather than shortened to simply 'Egypt'.
- source_word: לָתֵת לָכֶם אֶת אֶרֶץ כְּנַעַן
  chosen: to give you the land of Canaan
  alternatives:
  - to give the land of Canaan to you
  - to grant you the land of Canaan
  lexicon: HALOT
  rationale: This infinitive clause expresses purpose/result tied to the exodus. 'To give you the land of Canaan' is a clear, direct rendering that preserves the syntax and covenantal promise language.
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  chosen: to be your God
  alternatives:
  - to become God to you
  - to be God for you
  lexicon: HALOT
  rationale: This is a standard covenant formula in Hebrew. 'To be your God' is the most idiomatic English rendering and preserves the relational-covenantal force without awkward literalism.
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'Although the Hebrew has the independent pronoun ''I,'' English idiom in this verbless identification clause naturally supplies ''am'': ''I am the LORD your God.'' This preserves the emphatic self-identification.'
