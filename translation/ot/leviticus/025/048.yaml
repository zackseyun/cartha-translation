theological_decisions:
- issue: Rendering the kinship term אֶחָיו
  chosen_reading: his brothers
  alternative_readings:
  - his relatives
  - his kinsmen
  rationale: The Hebrew is explicitly masculine plural and in this legal context refers
    to male family members eligible to act as redeemers. Following the gender-accurate
    policy, the translation keeps 'brothers' rather than broadening the term in the
    main text. A broader English alternative is preserved in a footnote for readers
    who may understand the legal kinship sense more generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
