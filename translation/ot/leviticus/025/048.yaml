id: LEV.25.48
reference: Leviticus 25:48
source:
  edition: WLC
  text: אַחֲרֵ֣י נִמְכַּ֔ר גְּאֻלָּ֖ה תִּהְיֶה לּ֑/וֹ אֶחָ֥ד מֵ/אֶחָ֖י/ו יִגְאָלֶֽ/נּוּ־׃
translation:
  text: After he has been sold, he may be redeemed; one of his brothers may redeem
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, “one of his relatives may redeem him.” The Hebrew literally
      says “one of his brothers,” referring to a male family member acting as kinsman-redeemer.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - Afterward
  - Following
  lexicon: HALOT
  rationale: Temporal preposition introducing the circumstance under which the following
    provision applies. 'After' is the most natural modern English equivalent.
- source_word: נִמְכַּר
  chosen: he has been sold
  alternatives:
  - he is sold
  - he was sold
  lexicon: HALOT
  rationale: 'Nifal of מכר, passive/reflexive sense ''be sold.'' English present perfect
    fits the Hebrew temporal sequence with אַחֲרֵי: once the sale has occurred.'
- source_word: גְּאֻלָּה
  chosen: be redeemed
  alternatives:
  - have redemption
  - have the right of redemption
  - be bought back
  lexicon: HALOT
  rationale: 'Noun meaning ''redemption/right of redemption.'' In English, the clause
    is most naturally rendered verbally with תִּהְיֶה לּוֹ: ''he may be redeemed.''
    This preserves the legal-redemptive sense without awkwardness.'
- source_word: תִּהְיֶה לּוֹ
  chosen: he may be
  alternatives:
  - there shall be for him
  - it shall belong to him
  lexicon: HALOT
  rationale: Existential/legal construction 'there shall be to him.' In context it
    expresses entitlement or possibility, so 'he may be redeemed' communicates that
    redemption remains available to him.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - any one
  - someone
  lexicon: HALOT
  rationale: 'Cardinal used distributively: one member from among the group may act
    as redeemer.'
- source_word: מֵאֶחָיו
  chosen: of his brothers
  alternatives:
  - from among his brothers
  - of his kinsmen
  lexicon: HALOT
  rationale: Literally 'from his brothers.' Per gender-accurate policy, 'brothers'
    is retained rather than neutralizing to 'relatives,' since the Hebrew is explicitly
    masculine and refers to male kin in the legal framework. Broader kinship is addressed
    in surrounding verses.
- source_word: יִגְאָלֶנּוּ
  chosen: may redeem him
  alternatives:
  - shall redeem him
  - may buy him back
  lexicon: HALOT
  rationale: Qal of גאל, the standard verb for kinship redemption. 'Redeem' preserves
    the legal and theological resonance better than the more colloquial 'buy back.'
    'May' fits the permissive/legal force of the verse.
