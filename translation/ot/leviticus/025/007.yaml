id: LEV.25.7
reference: Leviticus 25:7
source:
  edition: WLC
  text: וְ/לִ֨/בְהֶמְתְּ/ךָ֔ וְ/לַֽ/חַיָּ֖ה אֲשֶׁ֣ר בְּ/אַרְצֶ֑/ךָ תִּהְיֶ֥ה כָל תְּבוּאָתָ֖/הּ
    לֶ/אֱכֹֽל־׃ס
translation:
  text: And for your livestock, and for the wild animals that are in your land, all
    its produce shall be for food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its yield shall be to eat.' The Hebrew expression is more literally
      'all its produce shall be for eating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְהֶמְתְּךָ
  chosen: for your livestock
  alternatives:
  - for your cattle
  - for your animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers collectively to domesticated animals owned by the
    addressee. 'Livestock' is natural modern English and distinguishes domestic animals
    from the following wild animals better than 'cattle,' which is too narrow.
- source_word: לַחַיָּה
  chosen: for the wild animals
  alternatives:
  - for the beasts
  - for the wildlife
  lexicon: HALOT
  rationale: חַיָּה in contrast with livestock denotes undomesticated animals. 'Wild
    animals' is clear and readable; 'beasts' is archaic-toned and 'wildlife' is more
    abstract than the concrete Hebrew.
- source_word: אֲשֶׁר בְּאַרְצְךָ
  chosen: that are in your land
  alternatives:
  - that are in your country
  - that are in your land
  lexicon: HALOT
  rationale: The relative clause modifies 'wild animals.' 'Land' fits the covenantal/agricultural
    setting better than 'country' and preserves the concrete sense of אֶרֶץ.
- source_word: תִּהְיֶה
  chosen: shall be
  alternatives:
  - will be
  - shall belong
  lexicon: HALOT
  rationale: The verb היה here expresses resultant availability or designation. 'Shall
    be' is a straightforward rendering that preserves the legal/instructional tone
    of the context.
- source_word: כָּל תְּבוּאָתָהּ
  chosen: all its produce
  alternatives:
  - all its yield
  - all its increase
  lexicon: HALOT
  rationale: תְּבוּאָה refers to produce/yield from the land. The feminine suffix
    refers back to the land. 'Produce' is idiomatic in English and suits the sabbatical-year
    agricultural context.
- source_word: לֶאֱכֹל
  chosen: for food
  alternatives:
  - to eat
  - for eating
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result. 'For food' is idiomatic
    English after 'shall be' and matches the legal style better than the more wooden
    'to eat.'
