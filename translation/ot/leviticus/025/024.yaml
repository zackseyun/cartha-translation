id: LEV.25.24
reference: Leviticus 25:24
source:
  edition: WLC
  text: וּ/בְ/כֹ֖ל אֶ֣רֶץ אֲחֻזַּתְ/כֶ֑ם גְּאֻלָּ֖ה תִּתְּנ֥וּ לָ/אָֽרֶץ׃ס
translation:
  text: And in all the land of your possession, you shall grant redemption for the
    land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall allow the right of redemption for the land.'
    reason: lexical_alternative
  - marker: b
    text: '''Possession'' refers to landed property or holding within Israel''s inherited
      allotment.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְכֹל
  chosen: And in all
  alternatives:
  - And throughout all
  - And in every
  lexicon: HALOT
  rationale: 'The conjunction with preposition and noun is best carried as a connective
    phrase introducing a general rule: ''and in all.'' ''Throughout all'' is possible,
    but ''in all'' is more direct and sufficiently natural in English.'
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the country
  - the earth
  lexicon: HALOT
  rationale: In this legal-landed context, אֶרֶץ refers to landed territory rather
    than the whole earth. Because the phrase is completed by 'of your possession,'
    'the land' is the clearest rendering.
- source_word: אֲחֻזַּתְכֶם
  chosen: of your possession
  alternatives:
  - of your property
  - of your holding
  - of your hereditary property
  lexicon: HALOT
  rationale: אֲחֻזָּה in Leviticus commonly denotes a landed possession or holding
    within Israel's inheritance structure. 'Possession' preserves the formal legal
    sense without over-specifying 'hereditary' in the main text, though that nuance
    is present in context.
- source_word: גְּאֻלָּה
  chosen: redemption
  alternatives:
  - right of redemption
  - buyback
  - repurchase
  lexicon: HALOT
  rationale: The noun denotes redemption or the act/right of reclaiming property by
    payment. 'Redemption' is concise and preserves the covenant-legal terminology.
    'Right of redemption' is interpretive but contextually valid; it is preserved
    in a footnote.
- source_word: תִּתְּנוּ
  chosen: you shall grant
  alternatives:
  - you shall give
  - you shall allow
  lexicon: HALOT
  rationale: Literally 'you shall give,' but in English legal context 'grant' conveys
    the conferral of a recognized right more idiomatically while staying close to
    the source sense.
- source_word: לָאָרֶץ
  chosen: for the land
  alternatives:
  - to the land
  - for the property
  lexicon: HALOT
  rationale: With גְּאֻלָּה and נתן, the phrase expresses provision of redemption
    in relation to the land. 'For the land' is idiomatic and fits the legal sense
    of redeeming land that has been sold.
