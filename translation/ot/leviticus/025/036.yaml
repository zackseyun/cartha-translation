theological_decisions:
- issue: Rendering the social-ethical term אָחִיךָ in covenant legislation
  chosen_reading: your brother
  alternative_readings:
  - your fellow Israelite
  - your kin
  rationale: The verse addresses treatment of a fellow covenant member in poverty.
    Retaining 'brother' preserves the familial and covenantal force of the Hebrew,
    in line with the project's gender-accurate policy, while the broader communal
    sense can be noted in a footnote.
