id: LEV.25.36
reference: Leviticus 25:36
source:
  edition: WLC
  text: אַל תִּקַּ֤ח מֵֽ/אִתּ/וֹ֙ נֶ֣שֶׁךְ וְ/תַרְבִּ֔ית וְ/יָרֵ֖אתָ מֵֽ/אֱלֹהֶ֑י/ךָ
    וְ/חֵ֥י אָחִ֖י/ךָ עִמָּֽ/ךְ־׃
translation:
  text: Do not take interest or profit from him, but fear your God, so that your brother
    may live with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'increase' or 'gain' for 'profit'; the Hebrew pairs two related terms
      for interest extracted from a poor borrower.
    reason: lexical_alternative
  - marker: b
    text: '''Your brother'' here means a fellow member of the covenant community,
      not necessarily a biological brother.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּקַּח
  chosen: Do not take
  alternatives:
  - You shall not take
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not take' is natural
    modern English while preserving the direct force of the command.
- source_word: מֵאִתּוֹ
  chosen: from him
  alternatives:
  - from him as creditor
  lexicon: HALOT
  rationale: The prepositional phrase marks the disadvantaged fellow Israelite as
    the source from whom the prohibited gain would be extracted. Simple 'from him'
    is sufficient in English.
- source_word: נֶשֶׁךְ
  chosen: interest
  alternatives:
  - usury
  lexicon: HALOT
  rationale: The noun refers to interest charged on a loan. 'Usury' is traditional
    but archaic and in modern English can imply only excessive interest; 'interest'
    better matches readable modern English.
- source_word: וְתַרְבִּית
  chosen: profit
  alternatives:
  - increase
  - gain
  lexicon: HALOT
  rationale: This term is paired with נֶשֶׁךְ and denotes an added amount or increase
    exacted from the poor borrower. 'Profit' communicates the economic sense clearly
    in contemporary English; 'increase' is possible but less idiomatic here.
- source_word: וְיָרֵאתָ מֵאֱלֹהֶיךָ
  chosen: but fear your God
  alternatives:
  - and fear your God
  lexicon: HALOT
  rationale: 'The waw here is rendered adversatively in English to show the ethical
    contrast: instead of exploiting him, fear God. ''Your God'' preserves the covenantal
    directness of the Hebrew.'
- source_word: וְחֵי
  chosen: so that ... may live
  alternatives:
  - and let ... live
  - that ... may live
  lexicon: HALOT
  rationale: The form functions jussively/resultatively in context, expressing the
    intended outcome of the command. 'So that your brother may live' captures the
    purpose/result in idiomatic English.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: The Hebrew is literally 'your brother.' In Leviticus this often refers
    to a fellow member of the covenant community. Per translation philosophy, the
    gendered familial term is retained rather than neutralized.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - beside you
  - among you
  lexicon: HALOT
  rationale: The phrase indicates continued life in community alongside the addressee.
    'With you' is the most direct and natural rendering.
