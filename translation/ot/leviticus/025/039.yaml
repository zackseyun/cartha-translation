theological_decisions:
- issue: Rendering of social-status terminology in Israelite debt service law
  chosen_reading: Use 'slave' in the prohibition ('as a slave') rather than 'servant'
  alternative_readings:
  - as a servant
  - with slave labor
  - as a bondservant
  rationale: The Hebrew עבד and related labor terminology here concern bonded status
    and prohibited treatment, not merely generic service. In line with the project's
    doctrine on context-dependent rendering of bonded-service terms, 'slave' best
    preserves the force of the prohibition while avoiding euphemism. The verse does
    not deny that the impoverished brother enters a form of service; it forbids treating
    him with the labor-status of a slave.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος by analogy of bonded-status rendering
