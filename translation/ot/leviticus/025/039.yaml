id: LEV.25.39
reference: Leviticus 25:39
source:
  edition: WLC
  text: וְ/כִֽי יָמ֥וּךְ אָחִ֛י/ךָ עִמָּ֖/ךְ וְ/נִמְכַּר לָ֑/ךְ לֹא תַעֲבֹ֥ד בּ֖/וֹ
    עֲבֹ֥דַת עָֽבֶד־־־׃
translation:
  text: And if your brother becomes poor while with you and sells himself to you,
    you shall not make him serve as a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you shall not make him serve the service of a slave.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and is sold to you'; the Hebrew idiom can be expressed passively, though
      in context it refers to a poor man selling himself into debt service.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case with a connective. 'And if' preserves the
    Hebrew conjunction plus conditional particle without sounding overly wooden.
- source_word: יָמוּךְ
  chosen: becomes poor
  alternatives:
  - becomes impoverished
  - grows poor
  lexicon: HALOT
  rationale: The verb denotes falling into poverty or reduced circumstances. 'Becomes
    poor' is natural modern English and accurately reflects the onset of impoverishment.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: Literally 'your brother.' In Leviticus this often refers to a fellow
    member of the covenant community. Per translation philosophy, the familial term
    is retained in the main text rather than interpreted more broadly.
- source_word: עִמָּךְ
  chosen: while with you
  alternatives:
  - with you
  - in your midst
  lexicon: HALOT
  rationale: The phrase indicates the brother's situation in relation to the addressee.
    'While with you' reads smoothly in English and preserves the relational setting.
- source_word: וְנִמְכַּר לָךְ
  chosen: and sells himself to you
  alternatives:
  - and is sold to you
  - and is sold to you because of debt
  lexicon: HALOT
  rationale: The Niphal of מכר can be rendered passively ('is sold'), but in this
    legal context it commonly refers to self-sale due to poverty. 'Sells himself to
    you' makes explicit the idiomatic force without adding details beyond the context.
- source_word: לֹא תַעֲבֹד בּוֹ
  chosen: you shall not make him serve
  alternatives:
  - you shall not work him
  - you shall not make use of him for labor
  lexicon: HALOT
  rationale: The construction means causing or requiring labor from him. 'You shall
    not make him serve' captures the legal prohibition idiomatically in English.
- source_word: עֲבֹדַת עָבֶד
  chosen: as a slave
  alternatives:
  - with slave labor
  - the service of a slave
  - as a slave's service
  lexicon: HALOT
  rationale: 'The phrase literally means ''service/labor of a slave.'' Rendering it
    ''as a slave'' communicates the sense concisely: he is not to be treated with
    the status and labor expectations of a slave. Given the translation philosophy''s
    willingness to use ''slave'' where bonded status is salient, ''slave'' is preferable
    to ''servant'' here.'
