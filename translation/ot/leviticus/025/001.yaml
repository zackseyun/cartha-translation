id: LEV.25.1
reference: Leviticus 25:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר יְהוָה֙ אֶל מֹשֶׁ֔ה בְּ/הַ֥ר סִינַ֖י לֵ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses on Mount Sinai, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר introduces the next narrative event. 'And
    ... spoke' preserves the standard Hebrew narrative flow and distinguishes דבר
    ('speak') from אמר ('say').
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech; 'to' is the natural
    and precise English equivalent here.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּהַר סִינַי
  chosen: on Mount Sinai
  alternatives:
  - at Mount Sinai
  - in Mount Sinai
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'On Mount Sinai' is idiomatic English
    for speech occurring at the mountain and matches common usage for elevated terrain.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the following
    verse. 'Saying,' is the conventional and natural English rendering that preserves
    the forward link.
