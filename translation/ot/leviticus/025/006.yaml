id: LEV.25.6
reference: Leviticus 25:6
source:
  edition: WLC
  text: וְ֠/הָיְתָה שַׁבַּ֨ת הָ/אָ֤רֶץ לָ/כֶם֙ לְ/אָכְלָ֔ה לְ/ךָ֖ וּ/לְ/עַבְדְּ/ךָ֣
    וְ/לַ/אֲמָתֶ֑/ךָ וְ/לִ/שְׂכִֽירְ/ךָ֙ וּ/לְ/תוֹשָׁ֣בְ/ךָ֔ הַ/גָּרִ֖ים עִמָּֽ/ךְ׃
translation:
  text: The Sabbath of the land shall be for you for food—for you, for your male slave,
    for your female slave, for your hired worker, and for your resident foreigner
    who dwells with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sabbath produce of the land.' The Hebrew is literally 'the Sabbath
      of the land,' referring to what the land yields during its sabbatical rest.
    reason: lexical_alternative
  - marker: b
    text: '''Resident foreigner'' renders a term for a non-native person living among
      Israel; alternatively, ''sojourner'' or ''resident alien.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: shall be
  alternatives:
  - will be
  - shall become
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in legal material is naturally rendered
    as a future/modal statement in English. 'Shall be' fits the legislative context
    and preserves the prescriptive tone.
- source_word: שַׁבַּת הָאָרֶץ
  chosen: The Sabbath of the land
  alternatives:
  - the sabbath produce of the land
  - the land's sabbath rest
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'Sabbath of the land.' Here it refers
    to the sabbatical year's produce/rest as available for consumption. Retaining
    'Sabbath of the land' preserves the formal link to the institution just described,
    while the following phrase 'for food' clarifies function.
- source_word: לָכֶם לְאָכְלָה
  chosen: for you for food
  alternatives:
  - for you to eat
  - for your food
  lexicon: HALOT
  rationale: לְאָכְלָה denotes purpose/use, 'for eating/for food.' 'For you for food'
    is slightly formal but transparent and close to the Hebrew structure; it avoids
    over-paraphrasing while remaining intelligible.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - for yourself
  lexicon: HALOT
  rationale: The singular pronominal suffix begins the list of persons who may eat
    from the land's produce. 'For you' is the most natural English rendering.
- source_word: עַבְדְּךָ
  chosen: your male slave
  alternatives:
  - your servant
  - your slave
  lexicon: HALOT
  rationale: In this legal/social context the bonded status is salient, and the source
    term is the common word for slave/servant. Following the project's guidance, 'slave'
    is preferred where bonded status matters. 'Male' is supplied because the next
    term is explicitly the female counterpart.
- source_word: אֲמָתֶךָ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your slave-girl
  lexicon: HALOT
  rationale: This term denotes a female slave/maidservant. 'Female slave' is clear
    modern English and preserves the gender distinction present in the Hebrew pair.
- source_word: שְׂכִירְךָ
  chosen: your hired worker
  alternatives:
  - your hired servant
  - your hired laborer
  lexicon: HALOT
  rationale: The term refers to a wage-earning hired person rather than a household
    slave. 'Hired worker' is readable modern English and preserves the socioeconomic
    distinction.
- source_word: תוֹשָׁבְךָ
  chosen: your resident foreigner
  alternatives:
  - your sojourner
  - your temporary resident
  - your resident alien
  lexicon: HALOT
  rationale: תוֹשָׁב denotes a non-native resident living among Israelites. 'Resident
    foreigner' is clear and contemporary, avoiding the dated or potentially misleading
    'alien' while preserving outsider status.
- source_word: הַגָּרִים עִמָּךְ
  chosen: who dwells with you
  alternatives:
  - who sojourns with you
  - who resides with you
  lexicon: HALOT
  rationale: The participle plus prepositional phrase describes ongoing residence
    among the addressees. Singular 'dwells' agrees with the collective singular 'resident
    foreigner' in English. This wording keeps the sense of living among/with the Israelite
    household or community.
