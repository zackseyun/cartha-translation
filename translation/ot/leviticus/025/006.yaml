theological_decisions:
- issue: Rendering of servitude terms in Israelite law
  chosen_reading: Differentiate bonded household slaves from hired workers by translating
    עבד/אמה as 'male slave/female slave' and שׂכיר as 'hired worker.'
  alternative_readings:
  - Render all as 'servant(s)'
  rationale: The verse distinguishes social categories, and flattening them into 'servants'
    obscures the legal and economic distinctions in the Hebrew text. This follows
    the project's preference for source-language primacy and for using 'slave' where
    bonded status is salient.
  doctrine_reference: Translation philosophy §1, §5
