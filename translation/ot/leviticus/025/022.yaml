id: LEV.25.22
reference: Leviticus 25:22
source:
  edition: WLC
  text: וּ/זְרַעְתֶּ֗ם אֵ֚ת הַ/שָּׁנָ֣ה הַ/שְּׁמִינִ֔ת וַ/אֲכַלְתֶּ֖ם מִן הַ/תְּבוּאָ֣ה
    יָשָׁ֑ן עַ֣ד הַ/שָּׁנָ֣ה הַ/תְּשִׁיעִ֗ת עַד בּוֹא֙ תְּב֣וּאָתָ֔/הּ תֹּאכְל֖וּ
    יָשָֽׁן־׀־׃
translation:
  text: And you shall sow in the eighth year and eat from the old produce until the
    ninth year; until its produce comes in, you shall eat the old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'old produce' at both occurrences of 'the old.' The Hebrew simply says
      'old,' with 'produce' understood from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְרַעְתֶּם
  chosen: you shall sow
  alternatives:
  - you will sow
  - you may sow
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this legal/instructional context
    is best rendered with future/modal force in English: a statement of what Israel
    is to do in the eighth year following the sabbatical year.'
- source_word: הַשָּׁנָה הַשְּׁמִינִת
  chosen: the eighth year
  lexicon: HALOT
  rationale: Straightforward ordinal expression with article; rendered idiomatically
    in English.
- source_word: וַאֲכַלְתֶּם
  chosen: and eat
  alternatives:
  - and you shall eat
  - and you will eat
  lexicon: HALOT
  rationale: Coordinate action following the previous clause. English omits the repeated
    subject naturally while preserving the instructional/future sense.
- source_word: מִן הַתְּבוּאָה
  chosen: from the produce
  alternatives:
  - from the yield
  - from the crop
  lexicon: HALOT
  rationale: תְּבוּאָה refers to agricultural produce/yield. 'Produce' is natural
    modern English and broad enough for stored harvest.
- source_word: יָשָׁן
  chosen: old
  alternatives:
  - old grain
  - stored from the old harvest
  lexicon: HALOT
  rationale: The adjective means 'old' and here modifies the produce as produce from
    a previous harvest. The simple 'old' preserves the Hebrew repetition at both occurrences;
    the noun is supplied by context in English.
- source_word: עַד הַשָּׁנָה הַתְּשִׁיעִת
  chosen: until the ninth year
  lexicon: HALOT
  rationale: Temporal limit rendered directly.
- source_word: עַד בּוֹא תְּבוּאָתָהּ
  chosen: until its produce comes in
  alternatives:
  - until its produce arrives
  - until its harvest comes
  lexicon: HALOT
  rationale: בּוֹא literally 'come/arrive.' With תְּבוּאָתָהּ ('its produce,' referring
    to the ninth year), 'comes in' is idiomatic for harvest becoming available while
    staying close to the source.
- source_word: תְּבוּאָתָהּ
  chosen: its produce
  alternatives:
  - the produce of it
  - that year's produce
  lexicon: HALOT
  rationale: The 3fs suffix most naturally refers to the ninth year just mentioned.
    'Its produce' is concise and preserves the Hebrew pronominal linkage.
- source_word: תֹּאכְלוּ יָשָׁן
  chosen: you shall eat the old
  alternatives:
  - you shall eat old produce
  - you shall eat what is old
  lexicon: HALOT
  rationale: 'The Hebrew repeats the adjective for emphasis and continuity: they continue
    eating old stored produce until the new harvest is available. ''The old'' preserves
    the terseness and repetition better than expanding the phrase.'
