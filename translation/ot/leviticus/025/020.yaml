id: LEV.25.20
reference: Leviticus 25:20
source:
  edition: WLC
  text: וְ/כִ֣י תֹאמְר֔וּ מַה נֹּאכַ֤֖ל בַּ/שָּׁנָ֣ה הַ/שְּׁבִיעִ֑ת הֵ֚ן לֹ֣א נִזְרָ֔ע
    וְ/לֹ֥א נֶאֱסֹ֖ף אֶת תְּבוּאָתֵֽ/נוּ־־׃
translation:
  text: And if you say, ‘What will we eat in the seventh year, since we will not sow
    or gather our produce?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our harvest' or 'our yield' for 'our produce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional question flowing from the previous instruction.
    'And if' preserves the connective ו plus conditional כי without overstating contrast.
- source_word: תֹאמְרוּ
  chosen: you say
  alternatives:
  - you ask
  - you will say
  lexicon: HALOT
  rationale: Qal imperfect 2mp of אמר. In this context it introduces anticipated speech.
    Present 'you say' is natural English for a conditional protasis, while still reflecting
    the Hebrew form.
- source_word: מַה נֹּאכַל
  chosen: What will we eat
  alternatives:
  - What shall we eat
  - What are we to eat
  lexicon: HALOT
  rationale: Direct question about sustenance. 'Will' fits the future-oriented concern
    in idiomatic modern English.
- source_word: בַּשָּׁנָה הַשְּׁבִיעִת
  chosen: in the seventh year
  alternatives:
  - during the seventh year
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in the seventh year' is both formal
    enough and natural.
- source_word: הֵן
  chosen: since
  alternatives:
  - behold
  - look
  - indeed
  lexicon: HALOT
  rationale: Here הֵן introduces the grounds for the question rather than serving
    as an exclamation. 'Since' best conveys the explanatory force in smooth English.
- source_word: לֹא נִזְרָע
  chosen: we will not sow
  alternatives:
  - we do not sow
  - we are not to sow
  lexicon: HALOT
  rationale: First common plural imperfect of זרע in context of the sabbatical year.
    Future 'will not sow' matches the anticipated situation being described.
- source_word: וְלֹא נֶאֱסֹף
  chosen: or gather
  alternatives:
  - and not gather
  - nor gather in
  - nor harvest
  lexicon: HALOT
  rationale: אָסַף means gather/collect. 'Gather' is broad and fits produce generally;
    'or' gives natural English coordination after a negative clause.
- source_word: אֶת תְּבוּאָתֵנוּ
  chosen: our produce
  alternatives:
  - our crop
  - our yield
  - our harvest
  lexicon: HALOT
  rationale: תְּבוּאָה refers to produce/yield of the land. 'Produce' is slightly
    broader than 'crop' and avoids implying only grain, while remaining clear.
