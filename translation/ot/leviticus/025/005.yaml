id: LEV.25.5
reference: Leviticus 25:5
source:
  edition: WLC
  text: אֵ֣ת סְפִ֤יחַ קְצִֽירְ/ךָ֙ לֹ֣א תִקְצ֔וֹר וְ/אֶת עִנְּבֵ֥י נְזִירֶ֖/ךָ לֹ֣א
    תִבְצֹ֑ר שְׁנַ֥ת שַׁבָּת֖וֹן יִהְיֶ֥ה לָ/אָֽרֶץ־׃
translation:
  text: You shall not reap the aftergrowth of your harvest, and you shall not gather
    the grapes of your unpruned vine; it shall be a year of complete rest for the
    land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'volunteer growth' or 'self-grown crop' for 'aftergrowth.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the grapes of your separated/unpruned vine'; the Hebrew refers
      to a vine left untended during the sabbatical year.
    reason: lexical_alternative
  - marker: c
    text: Or 'a sabbath year' or 'a year of solemn rest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְפִיחַ
  chosen: aftergrowth
  alternatives:
  - volunteer growth
  - self-grown crop
  lexicon: HALOT
  rationale: Refers to produce that springs up of itself from previous seed, not a
    deliberately sown crop. 'Aftergrowth' is concise and natural in context, while
    preserving the idea of spontaneous growth.
- source_word: קְצִירְךָ
  chosen: your harvest
  alternatives:
  - your crop
  lexicon: HALOT
  rationale: The construct with סְפִיחַ yields 'the aftergrowth of your harvest,'
    i.e., what grows from the prior harvest. 'Harvest' is the most direct rendering
    of the noun.
- source_word: תִקְצֹר
  chosen: reap
  alternatives:
  - harvest
  lexicon: HALOT
  rationale: The verb specifically denotes reaping grain or field produce. 'Reap'
    preserves the agricultural specificity better than the broader 'harvest.'
- source_word: עִנְּבֵי
  chosen: the grapes of
  alternatives:
  - grapes from
  lexicon: HALOT
  rationale: The noun means 'grapes.' Rendering with 'the grapes of' reflects the
    construct relation with the following noun.
- source_word: נְזִירֶךָ
  chosen: your unpruned vine
  alternatives:
  - your undressed vine
  - your separated vine
  - your Nazirite vine
  lexicon: HALOT
  rationale: In this agricultural context the noun derives from the idea of something
    left apart/untended, referring to a vine left unpruned during the sabbatical year.
    'Unpruned vine' communicates the practical sense clearly. More literal options
    like 'separated vine' are obscure in English, and 'Nazirite vine' would wrongly
    suggest the personal vow term.
- source_word: תִבְצֹר
  chosen: gather
  alternatives:
  - pick
  - harvest
  lexicon: HALOT
  rationale: The verb is used for gathering grapes. 'Gather' is idiomatic and broad
    enough for vineyard produce without losing the agricultural sense.
- source_word: שְׁנַת שַׁבָּתוֹן
  chosen: a year of complete rest
  alternatives:
  - a sabbath year
  - a year of solemn rest
  lexicon: HALOT
  rationale: שַׁבָּתוֹן intensifies the sabbath-rest idea. 'Complete rest' communicates
    the force in accessible English. 'Sabbath year' is possible but leaves the intensifying
    noun untranslated.
- source_word: לָאָרֶץ
  chosen: for the land
  alternatives:
  - for the earth
  lexicon: HALOT
  rationale: In Leviticus 25 the referent is specifically the cultivated land of Israel
    in its agricultural rhythm, so 'land' is more precise than 'earth'.
