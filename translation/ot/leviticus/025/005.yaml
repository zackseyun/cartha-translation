theological_decisions:
- issue: Rendering the sabbatical-year terminology without importing later doctrinal
    or liturgical associations
  chosen_reading: a year of complete rest for the land
  alternative_readings:
  - a sabbath year for the land
  - a year of solemn rest for the land
  rationale: The verse legislates the land's sabbatical rest. The chosen rendering
    preserves the theological motif of Sabbath while expressing the intensified noun
    שַׁבָּתוֹן in clear modern English. It avoids flattening the phrase into a mere
    calendar label while not adding interpretive claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
