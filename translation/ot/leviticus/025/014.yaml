id: LEV.25.14
reference: Leviticus 25:14
source:
  edition: WLC
  text: וְ/כִֽי תִמְכְּר֤וּ מִמְכָּר֙ לַ/עֲמִיתֶ֔/ךָ א֥וֹ קָנֹ֖ה מִ/יַּ֣ד עֲמִיתֶ֑/ךָ
    אַל תּוֹנ֖וּ אִ֥ישׁ אֶת אָחִֽי/ו־־־׃
translation:
  text: And if you sell something to your neighbor, or buy from your neighbor’s hand,
    no man shall oppress his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not wrong one another'; the verb can denote taking unfair advantage,
      especially in commercial dealings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - And when
  - If
  lexicon: HALOT
  rationale: Introduces a conditional/casuistic clause. 'And if' preserves the connective
    force of ו plus the conditional sense of כי in legal material.
- source_word: תִמְכְּרוּ
  chosen: you sell
  alternatives:
  - you sell off
  lexicon: HALOT
  rationale: Qal imperfect 2mp of מכר in a legal conditional is naturally rendered
    as a simple present/future condition in English.
- source_word: מִמְכָּר
  chosen: something
  alternatives:
  - a sale
  - merchandise
  lexicon: HALOT
  rationale: The noun denotes a thing sold or a sale transaction. 'Something' fits
    idiomatic English with 'sell' while still reflecting an object of sale; 'a sale'
    would sound awkward in this syntax.
- source_word: לַעֲמִיתֶךָ
  chosen: to your neighbor
  alternatives:
  - to your fellow
  - to your associate
  lexicon: HALOT
  rationale: עָמִית refers to a fellow member of the community in legal/ethical contexts.
    'Neighbor' is natural and preserves the interpersonal covenantal sense.
- source_word: אוֹ קָנֹה
  chosen: or buy
  alternatives:
  - or if you buy
  - or acquire
  lexicon: HALOT
  rationale: The infinitive absolute functions here in coordination with the previous
    finite verb, yielding the sense 'or buy.' This is the most natural English rendering.
- source_word: מִיַּד
  chosen: from ... hand
  alternatives:
  - from
  - out of the hand of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of.' Retaining 'hand' in English
    preserves the concrete transactional idiom without obscuring meaning.
- source_word: עֲמִיתֶךָ
  chosen: your neighbor’s
  alternatives:
  - your fellow’s
  lexicon: HALOT
  rationale: Same term as earlier in the verse; rendered consistently as 'neighbor.'
    The possessive form works naturally with 'hand.'
- source_word: אַל
  chosen: no ... shall
  alternatives:
  - do not
  lexicon: HALOT
  rationale: With the following verb, this gives a prohibition. 'No man shall' fits
    the distributive איש and the legal register of the verse.
- source_word: תּוֹנוּ
  chosen: oppress
  alternatives:
  - wrong
  - exploit
  - mistreat
  lexicon: HALOT
  rationale: From ינה in this commercial context, the sense is to mistreat or take
    unfair advantage in dealings. 'Oppress' is traditional and broad enough, though
    the immediate context suggests economic wrong.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - anyone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with representative force.
    Per translation philosophy, gender-accurate language is preferred, so 'man' is
    retained rather than neutralizing to 'person'.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his fellow
  - his kinsman
  lexicon: HALOT
  rationale: אָח literally means 'brother' and in covenant law often carries fellow-Israelite
    solidarity. Per gender-accurate policy, 'brother' is preferred, with the broader
    social sense preserved by context.
