theological_decisions:
- issue: Representative masculine terms in legal prohibition
  chosen_reading: Retain 'man' and 'brother' in the main text
  alternative_readings:
  - person
  - one another
  - neighbor
  rationale: The Hebrew uses איש and אחיו, masculine forms with representative social
    force. Following the stated gender-accurate philosophy, the translation keeps
    the masculine wording rather than flattening it to gender-neutral English, while
    understanding the law's communal application more broadly.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
