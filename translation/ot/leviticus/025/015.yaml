id: LEV.25.15
reference: Leviticus 25:15
source:
  edition: WLC
  text: בְּ/מִסְפַּ֤ר שָׁנִים֙ אַחַ֣ר הַ/יּוֹבֵ֔ל תִּקְנֶ֖ה מֵ/אֵ֣ת עֲמִיתֶ֑/ךָ בְּ/מִסְפַּ֥ר
    שְׁנֵֽי תְבוּאֹ֖ת יִמְכָּר לָֽ/ךְ־־׃
translation:
  text: According to the number of years after the Jubilee, you shall buy from your
    fellow; according to the number of harvest years he shall sell to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'according to the number of years of produce/harvests.' The point
      is that the sale price is based on the number of crop-bearing years remaining
      until the next Jubilee, not on a permanent transfer of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפַּר
  chosen: according to the number of
  alternatives:
  - by the number of
  - in proportion to the number of
  lexicon: HALOT
  rationale: The preposition ב with מִסְפָּר expresses measure or standard. 'According
    to the number of' captures the pricing basis more idiomatically than a wooden
    'in the number of.'
- source_word: שָׁנִים
  chosen: years
  lexicon: HALOT
  rationale: Straightforward plural of 'year'; here it refers to elapsed years in
    relation to the Jubilee cycle.
- source_word: אַחַר הַיּוֹבֵל
  chosen: after the Jubilee
  alternatives:
  - following the Jubilee
  lexicon: HALOT
  rationale: Temporal marker indicating that valuation is based on years remaining
    after the Jubilee. 'Jubilee' is the established and accurate rendering of יוֹבֵל
    in Leviticus 25.
- source_word: תִּקְנֶה
  chosen: you shall buy
  alternatives:
  - you may buy
  lexicon: HALOT
  rationale: Imperfect 2ms in legal instruction is well rendered as 'you shall buy,'
    preserving the prescriptive force of the law.
- source_word: מֵאֵת עֲמִיתֶךָ
  chosen: from your fellow
  alternatives:
  - from your neighbor
  - from your countryman
  lexicon: HALOT
  rationale: עָמִית denotes an associate/fellow member of the covenant community in
    legal contexts. 'Fellow' is concise and preserves the interpersonal/legal sense
    without over-specifying ethnicity.
- source_word: שְׁנֵי תְבוּאֹת
  chosen: harvest years
  alternatives:
  - years of produce
  - crops
  lexicon: HALOT
  rationale: Literally 'years of produce/harvests.' The sense is not merely calendar
    years but years yielding crops before the Jubilee. 'Harvest years' is natural
    English that preserves this economic meaning.
- source_word: יִמְכָּר לָךְ
  chosen: he shall sell to you
  alternatives:
  - he is to sell to you
  lexicon: HALOT
  rationale: The 3ms verb with לָךְ states the seller's corresponding action. 'He
    shall sell to you' keeps the legal symmetry with 'you shall buy.'
