theological_decisions:
- issue: Nature of the final clause as ethical motivation
  chosen_reading: 'The verse grounds humane treatment in reverence toward God: ''but
    you shall fear your God.'''
  alternative_readings:
  - 'The clause could be read more woodenly as a coordinate command: ''and you shall
    fear your God.'''
  rationale: No doctrinal controversy is present, but the translation preserves the
    theological force that reverence for God regulates social power. The contrastive
    English conjunction clarifies the ethical logic without adding content.
  doctrine_reference: Translation philosophy §3, §6
