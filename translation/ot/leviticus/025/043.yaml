id: LEV.25.43
reference: Leviticus 25:43
source:
  edition: WLC
  text: לֹא תִרְדֶּ֥ה ב֖/וֹ בְּ/פָ֑רֶךְ וְ/יָרֵ֖אתָ מֵ/אֱלֹהֶֽי/ךָ־׃
translation:
  text: You shall not rule over him harshly, but you shall fear your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with harshness,' 'ruthlessly.' The Hebrew term refers to severe, crushing
      treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִרְדֶּה
  chosen: rule over
  alternatives:
  - make serve
  - dominate
  - subject
  lexicon: HALOT
  rationale: From רדה, 'to rule/have dominion.' In this legal context concerning treatment
    of a fellow Israelite in debt-service, 'rule over' best preserves the authority
    relationship without over-paraphrasing. 'Make serve' is too weak and 'dominate'
    too interpretive.
- source_word: בּוֹ
  chosen: him
  alternatives:
  - over him
  rationale: The pronominal object is masculine singular, referring back to the individual
    Israelite under service. In English, 'over him' is carried idiomatically by the
    verb phrase 'rule over him.'
- source_word: בְּפָרֶךְ
  chosen: harshly
  alternatives:
  - with harshness
  - ruthlessly
  - with severity
  lexicon: HALOT
  rationale: פָּרֶךְ denotes harsh, crushing labor or severity. 'Harshly' gives natural
    modern English with the verb 'rule over.' 'Ruthlessly' is possible but slightly
    stronger than the Hebrew requires here.
- source_word: וְיָרֵאתָ
  chosen: but you shall fear
  alternatives:
  - and you shall fear
  - rather, fear
  lexicon: HALOT
  rationale: 'The conjunction is formally ''and,'' but in English the clause functions
    contrastively after the prohibition: instead of harsh rule, the addressee is to
    fear God. ''But'' makes the discourse relation clear while remaining faithful
    to the sense.'
- source_word: מֵאֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - from your God
  lexicon: HALOT
  rationale: With ירא, the preposition מִן marks the object of fear in Hebrew idiom.
    English naturally renders this as 'fear your God,' not 'fear from your God.' The
    possessive is retained.
