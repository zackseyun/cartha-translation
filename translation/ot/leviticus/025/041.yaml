id: LEV.25.41
reference: Leviticus 25:41
source:
  edition: WLC
  text: וְ/יָצָא֙ מֵֽ/עִמָּ֔/ךְ ה֖וּא וּ/בָנָ֣י/ו עִמּ֑/וֹ וְ/שָׁב֙ אֶל מִשְׁפַּחְתּ֔/וֹ
    וְ/אֶל אֲחֻזַּ֥ת אֲבֹתָ֖י/ו יָשֽׁוּב־־׃
translation:
  text: Then he and his sons with him shall go out from you, and he shall return to
    his clan and return to the property of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his family'; the Hebrew term can denote a wider kin-group or clan.
    reason: lexical_alternative
  - marker: b
    text: Or 'the possession of his fathers' or 'his ancestral property.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: shall go out
  alternatives:
  - shall depart
  - shall be released
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in legal context functions futurally/sequentially:
    the man exits the master''s household/service. ''Go out'' preserves the concrete
    Hebrew idiom without over-interpreting as a technical term, though release is
    implied by context.'
- source_word: מֵעִמָּךְ
  chosen: from you
  alternatives:
  - from with you
  - from your service
  lexicon: HALOT
  rationale: Literally 'from with you.' In idiomatic English, 'from you' best conveys
    departure from the Israelite master/household. 'From your service' is interpretive
    and therefore left as an alternative rather than main text.
- source_word: הוּא וּבָנָיו עִמּוֹ
  chosen: he and his sons with him
  alternatives:
  - he and his children with him
  lexicon: HALOT
  rationale: Retains the masculine familial language of the Hebrew. 'Sons' is more
    precise than the gender-neutral 'children' because בנים is explicitly masculine
    plural here.
- source_word: וְשָׁב
  chosen: and he shall return
  alternatives:
  - and he shall go back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return.' This keeps the repeated restoration motif
    that is central to Jubilee legislation.
- source_word: מִשְׁפַּחְתּוֹ
  chosen: his clan
  alternatives:
  - his family
  - his kin-group
  lexicon: HALOT
  rationale: In land-tenure and kinship context, מִשְׁפָּחָה is broader than immediate
    household and often denotes a larger family unit or clan. 'Clan' best fits the
    social-legal setting.
- source_word: אֲחֻזַּת אֲבֹתָיו
  chosen: the property of his fathers
  alternatives:
  - the possession of his fathers
  - his ancestral property
  - the hereditary land of his fathers
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or hereditary property. 'Property'
    is clear modern English; 'of his fathers' preserves the Hebrew idiom for ancestral
    inheritance without flattening it to merely 'home.'
- source_word: יָשׁוּב
  chosen: return
  alternatives:
  - go back
  lexicon: HALOT
  rationale: The second use of שׁוב is rendered consistently as 'return' to preserve
    the Hebrew repetition and emphasis on restoration to inherited status and land.
