theological_decisions:
- issue: Rendering of masculine kinship language
  chosen_reading: his sons ... his fathers
  alternative_readings:
  - his children ... his ancestors
  rationale: The Hebrew uses explicitly masculine forms. Following the gender-accurate
    policy, the translation preserves these forms rather than neutralizing them, since
    the legal inheritance setting is tied to paternal lineage in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Socio-legal force of release language
  chosen_reading: go out from you
  alternative_readings:
  - be released from your service
  rationale: The verse describes Jubilee restoration from debt-servitude, but the
    Hebrew wording is the concrete verb 'go out.' The main text preserves the source
    expression while allowing the legal implication to remain contextual rather than
    imported into the wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
