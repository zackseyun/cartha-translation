id: LEV.25.11
reference: Leviticus 25:11
source:
  edition: WLC
  text: יוֹבֵ֣ל הִ֗וא שְׁנַ֛ת הַ/חֲמִשִּׁ֥ים שָׁנָ֖ה תִּהְיֶ֣ה לָ/כֶ֑ם לֹ֣א תִזְרָ֔עוּ
    וְ/לֹ֤א תִקְצְרוּ֙ אֶת סְפִיחֶ֔י/הָ וְ/לֹ֥א תִבְצְר֖וּ אֶת נְזִרֶֽי/הָ־־׃
translation:
  text: It shall be a Jubilee for you, the fiftieth year. You shall not sow, and you
    shall not reap its volunteer growth, and you shall not gather its unpruned vines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what grows of itself' for 'its volunteer growth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its undressed/unpruned grapes'; the Hebrew refers to vine growth left
      untended.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹבֵל
  chosen: Jubilee
  alternatives:
  - ram's horn
  - jubilee
  lexicon: HALOT
  rationale: In Leviticus 25 the term denotes the special sacred year rather than
    the horn itself. Capitalized as the established designation of the institution.
- source_word: שְׁנַת הַחֲמִשִּׁים שָׁנָה
  chosen: the fiftieth year
  alternatives:
  - the year of fifty years
  - year fifty
  lexicon: HALOT
  rationale: Idiomatic English for the construct phrase identifying the Jubilee as
    the fiftieth year.
- source_word: תִּהְיֶה לָכֶם
  chosen: It shall be for you
  alternatives:
  - it shall be yours
  - it shall be to you
  lexicon: HALOT
  rationale: Retains the Hebrew predication and dative sense without over-paraphrasing.
- source_word: לֹא תִזְרָעוּ
  chosen: You shall not sow
  alternatives:
  - you must not sow
  - do not sow
  lexicon: HALOT
  rationale: Future-form prohibition in legal material is naturally rendered with
    'shall not' in English.
- source_word: לֹא תִקְצְרוּ
  chosen: you shall not reap
  alternatives:
  - you must not harvest
  lexicon: HALOT
  rationale: Keeps the agricultural verb distinct from the later grape-harvest verb.
- source_word: סְפִיחֶיהָ
  chosen: its volunteer growth
  alternatives:
  - its aftergrowth
  - what grows of itself
  - its self-sown growth
  lexicon: HALOT
  rationale: Refers to produce that springs up by itself without sowing. 'Volunteer
    growth' is clear modern English and preserves the spontaneous sense.
- source_word: לֹא תִבְצְרוּ
  chosen: you shall not gather
  alternatives:
  - you shall not harvest
  - you shall not pick
  lexicon: HALOT
  rationale: The verb is specifically used for gathering grapes/vintage. 'Gather'
    works idiomatically here while avoiding repetition with 'reap.'
- source_word: נְזִרֶיהָ
  chosen: its unpruned vines
  alternatives:
  - its undressed vines
  - its consecrated growth
  - its Nazirites
  lexicon: HALOT
  rationale: In this agricultural context the noun derives from the idea of something
    left separate/untended, referring to vines left unpruned or untrimmed in the sabbatical/Jubilee
    year. This fits the parallel with spontaneous growth and the viticultural verb
    בצר.
