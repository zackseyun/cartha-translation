theological_decisions:
- issue: Rendering of kinship language in Israelite law
  chosen_reading: your brother
  alternative_readings:
  - your kinsman
  - your fellow Israelite
  rationale: The Hebrew uses the masculine familial term 'brother.' In this legal
    context it can represent a fellow member of the covenant community, but the translation
    preserves the source's kinship language per the gender-accurate policy rather
    than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of גאל terminology
  chosen_reading: redeemer / redeem
  alternative_readings:
  - kinsman-redeemer / redeem
  - buy back
  rationale: Because גאל carries both legal and theological significance in the Hebrew
    Bible, 'redeemer' and 'redeem' preserve the term's resonance better than purely
    commercial language. The kinship component is retained contextually through 'his
    nearest.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
