id: LEV.25.53
reference: Leviticus 25:53
source:
  edition: WLC
  text: כִּ/שְׂכִ֥יר שָׁנָ֛ה בְּ/שָׁנָ֖ה יִהְיֶ֣ה עִמּ֑/וֹ לֹֽא יִרְדֶּ֥/נּֽוּ בְּ/פֶ֖רֶךְ
    לְ/עֵינֶֽי/ךָ־׃
translation:
  text: Like a hired worker year by year he shall be with him; he shall not rule over
    him harshly in your sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As a hired servant, year by year he shall be with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּשְׂכִיר
  chosen: Like a hired worker
  alternatives:
  - As a hired servant
  - As a hired laborer
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'), and שׂכיר denotes a hired
    laborer/worker rather than a slave. 'Worker' is modern and clear; 'hired servant'
    is more traditional but less precise in contemporary English.
- source_word: שָׁנָה בְּשָׁנָה
  chosen: year by year
  alternatives:
  - from year to year
  - for each year
  lexicon: HALOT
  rationale: This idiom expresses an annual, ongoing status. 'Year by year' is concise
    and natural while preserving the distributive sense.
- source_word: יִהְיֶה עִמּוֹ
  chosen: he shall be with him
  alternatives:
  - he shall remain with him
  - he shall serve with him
  lexicon: HALOT
  rationale: The Hebrew is simply 'be with him.' 'Remain with him' is interpretive;
    'serve with him' adds content not explicit in the verb היה. The plain rendering
    best preserves the source.
- source_word: לֹא יִרְדֶּנּוּ
  chosen: he shall not rule over him
  alternatives:
  - he shall not dominate him
  - he shall not make him serve
  lexicon: HALOT
  rationale: רדה commonly means 'rule' or 'have dominion over.' In this legal context
    it refers to exercising mastery over the redeemed kinsman. 'Rule over' preserves
    the lexical link and avoids over-paraphrase.
- source_word: בְּפֶרֶךְ
  chosen: harshly
  alternatives:
  - with harshness
  - ruthlessly
  - with severity
  lexicon: HALOT
  rationale: The noun denotes harsh, ruthless severity, especially forced labor conditions.
    'Harshly' reads naturally in English with 'rule over,' while retaining the legal-ethical
    force.
- source_word: לְעֵינֶיךָ
  chosen: in your sight
  alternatives:
  - before your eyes
  - in your presence
  lexicon: HALOT
  rationale: The phrase literally refers to the observer's eyes, here the addressed
    Israelite relative. 'In your sight' is idiomatic and preserves the sense of visible,
    witnessed conduct.
