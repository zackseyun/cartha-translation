theological_decisions:
- issue: Nature of the Israelite's status under a foreign owner
  chosen_reading: Rendered as a comparison to a hired worker rather than as a slave,
    reflecting the legal protection and temporary status in context.
  alternative_readings:
  - As a hired servant
  rationale: The verse regulates treatment of an Israelite sold to a resident foreigner
    and frames his status by comparison to a hired worker. This avoids importing a
    stronger chattel-slavery sense not expressed by שׂכיר here, while still preserving
    the broader servitude context of the chapter.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
