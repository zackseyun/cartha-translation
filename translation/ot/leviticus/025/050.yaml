id: LEV.25.50
reference: Leviticus 25:50
source:
  edition: WLC
  text: וְ/חִשַּׁב֙ עִם קֹנֵ֔/הוּ מִ/שְּׁנַת֙ הִמָּ֣כְר/וֹ ל֔/וֹ עַ֖ד שְׁנַ֣ת הַ/יֹּבֵ֑ל
    וְ/הָיָ֞ה כֶּ֤סֶף מִמְכָּר/וֹ֙ בְּ/מִסְפַּ֣ר שָׁנִ֔ים כִּ/ימֵ֥י שָׂכִ֖יר יִהְיֶ֥ה
    עִמּֽ/וֹ־׃
translation:
  text: He shall calculate with his buyer from the year he sold himself to him until
    the year of jubilee, and the price of his sale shall be according to the number
    of years; he shall be with him as in the days of a hired worker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the year of his sale to him.' The Hebrew expression can be rendered
      more formally, but the context indicates that the man had sold himself into
      service.
    reason: lexical_alternative
  - marker: b
    text: Or, 'like the days of a hired laborer.' The comparison indicates that the
      valuation is to be reckoned as hired service rather than perpetual ownership.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִשַּׁב
  chosen: He shall calculate
  alternatives:
  - he shall reckon
  - he shall compute
  lexicon: HALOT
  rationale: The verb חשׁב here denotes making a financial reckoning or calculation
    in the context of redemption price. 'Calculate' is clear modern English and preserves
    the legal-economic sense.
- source_word: קֹנֵהוּ
  chosen: his buyer
  alternatives:
  - the one who bought him
  - his purchaser
  lexicon: HALOT
  rationale: The participle from קנה refers to the person who acquired him. 'Buyer'
    is concise and natural in English while retaining the transactional force of the
    Hebrew.
- source_word: מִשְּׁנַת הִמָּכְרוֹ לוֹ
  chosen: from the year he sold himself to him
  alternatives:
  - from the year of his being sold to him
  - from the year of his sale to him
  lexicon: HALOT
  rationale: The Niphal/nominal construction refers to the time when the Israelite
    sold himself. Rendering it actively as 'he sold himself' makes explicit the reflexive
    sense already established by the context of debt-slavery legislation and reads
    naturally in English.
- source_word: עַד שְׁנַת הַיֹּבֵל
  chosen: until the year of jubilee
  alternatives:
  - until the jubilee year
  lexicon: HALOT
  rationale: This is the standard expression for the Jubilee year. Lowercase 'jubilee'
    treats it as a common noun in English while preserving the institution's name.
- source_word: וְהָיָה כֶּסֶף מִמְכָּרוֹ
  chosen: and the price of his sale shall be
  alternatives:
  - and the money of his sale shall be
  - and the sale price shall be
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver/money,' but in this legal-commercial context
    it refers to the monetary value or price. 'Price of his sale' communicates the
    intended sense more idiomatically than a wooden 'money of his sale.'
- source_word: בְּמִסְפַּר שָׁנִים
  chosen: according to the number of years
  alternatives:
  - by the number of years
  - in proportion to the number of years
  lexicon: HALOT
  rationale: The phrase indicates proportional calculation based on elapsed or remaining
    years. 'According to' captures the normative basis of the reckoning.
- source_word: כִּימֵי שָׂכִיר
  chosen: as in the days of a hired worker
  alternatives:
  - like the days of a hired laborer
  - as the time of a hired worker
  lexicon: HALOT
  rationale: שָׂכִיר denotes a wage-earning hired worker. The idiom 'days of' is retained
    in moderated form to preserve the Hebrew comparison while remaining understandable.
- source_word: יִהְיֶה עִמּוֹ
  chosen: he shall be with him
  alternatives:
  - he shall remain with him
  - his time with him shall be
  lexicon: HALOT
  rationale: The clause states the status/duration of his service with the buyer.
    'He shall be with him' is formally close to the Hebrew; the preceding comparative
    phrase clarifies that this means in the manner of a hired worker.
