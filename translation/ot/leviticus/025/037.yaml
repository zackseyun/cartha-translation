id: LEV.25.37
reference: Leviticus 25:37
source:
  edition: WLC
  text: אֶ֨ת כַּסְפְּ/ךָ֔ לֹֽא תִתֵּ֥ן ל֖/וֹ בְּ/נֶ֑שֶׁךְ וּ/בְ/מַרְבִּ֖ית לֹא תִתֵּ֥ן
    אָכְלֶֽ/ךָ־־־׃
translation:
  text: You shall not lend him your money at interest, nor give him your food for
    profit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your silver.' Hebrew כֶּסֶף can mean both 'silver' and 'money'; here
      it refers to money used in lending.
    reason: lexical_alternative
  - marker: b
    text: Or 'at increase.' The Hebrew term can denote gain or increase taken from
      what is supplied, especially in parallel with 'interest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפְּךָ
  chosen: your money
  alternatives:
  - your silver
  lexicon: HALOT
  rationale: כֶּסֶף literally denotes 'silver' but commonly functions as 'money' in
    economic/legal contexts. Here the prohibition concerns lending, so 'money' best
    conveys the plain sense in modern English while preserving the economic reference.
- source_word: תִתֵּן לוֹ
  chosen: lend him
  alternatives:
  - give him
  lexicon: HALOT
  rationale: נתן is literally 'give,' but with the object 'your money' and the following
    phrase 'at interest,' the idiomatic sense is lending money. Rendering 'lend him'
    makes the legal-economic force explicit in natural English without adding beyond
    the context.
- source_word: בְּנֶשֶׁךְ
  chosen: at interest
  alternatives:
  - with interest
  - for interest
  - usury
  lexicon: HALOT
  rationale: נֶשֶׁךְ refers to interest exacted on a loan. 'At interest' is clear
    modern English. 'Usury' is archaic and in modern usage can imply only excessive
    interest, which is narrower than the Hebrew term.
- source_word: וּבְמַרְבִּית
  chosen: for profit
  alternatives:
  - at increase
  - with increase
  lexicon: HALOT
  rationale: מַרְבִּית denotes increase, gain, or profit, especially additional return
    on what is supplied. In parallel with נֶשֶׁךְ and with 'your food' as object,
    'for profit' communicates the sense of extracting gain from provisions.
- source_word: אָכְלֶךָ
  chosen: your food
  alternatives:
  - your provisions
  - your food supply
  lexicon: HALOT
  rationale: אָכֶל means food. 'Your food' is the most direct rendering; 'provisions'
    is possible but slightly more interpretive. The verse likely refers to food supplied
    to a poor brother, and 'food' keeps the wording concrete.
- source_word: לֹא ... לֹא
  chosen: You shall not ... nor
  alternatives:
  - Do not ... and do not
  lexicon: HALOT
  rationale: The paired negatives structure two coordinated prohibitions. 'You shall
    not ... nor' preserves the legal tone and smooth English parallelism.
