id: LEV.25.31
reference: Leviticus 25:31
source:
  edition: WLC
  text: וּ/בָתֵּ֣י הַ/חֲצֵרִ֗ים אֲשֶׁ֨ר אֵין לָ/הֶ֤ם חֹמָה֙ סָבִ֔יב עַל שְׂדֵ֥ה הָ/אָ֖רֶץ
    יֵחָשֵׁ֑ב גְּאֻלָּה֙ תִּהְיֶה לּ֔/וֹ וּ/בַ/יֹּבֵ֖ל יֵצֵֽא־־־׃
translation:
  text: But the houses of the villages that have no wall around them shall be regarded
    as open country; redemption shall be available for them, and in the Jubilee they
    shall go out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'shall be reckoned as the field of the land,' meaning these village
      houses are treated legally like rural land rather than like houses in a walled
      city.
    reason: lexical_alternative
  - marker: b
    text: Or 'and in the Jubilee it shall go out'—that is, the property reverts in
      the Jubilee year.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בָתֵּי הַ/חֲצֵרִים
  chosen: the houses of the villages
  alternatives:
  - the houses of the settlements
  - the houses of the unwalled villages
  lexicon: HALOT
  rationale: בָּתֵּי is construct ('houses of'), and חֲצֵרִים commonly refers to villages/settlements,
    often unwalled rural communities. 'Villages' is the most natural modern English
    rendering here; the lack of walls is then stated explicitly in the following clause
    rather than built into the noun.
- source_word: אֲשֶׁר אֵין לָהֶם חֹמָה סָבִיב
  chosen: that have no wall around them
  alternatives:
  - which do not have a wall all around
  - that are not surrounded by a wall
  lexicon: HALOT
  rationale: This relative clause straightforwardly describes the villages as lacking
    a surrounding wall. 'Around them' preserves סָבִיב without sounding wooden.
- source_word: עַל שְׂדֵה הָאָרֶץ יֵחָשֵׁב
  chosen: shall be regarded as open country
  alternatives:
  - shall be counted as the field of the land
  - shall be reckoned as countryside
  lexicon: HALOT
  rationale: Literally, 'it shall be reckoned upon/as the field of the land.' In context
    this contrasts unwalled village houses with houses in walled cities and classifies
    them with rural land. 'Open country' captures the legal sense in idiomatic English
    while remaining faithful to the contrast.
- source_word: גְּאֻלָּה תִּהְיֶה לּוֹ
  chosen: redemption shall be available for them
  alternatives:
  - it shall have redemption
  - there shall be a right of redemption for it
  lexicon: HALOT
  rationale: The phrase indicates that such property remains redeemable. Because the
    antecedent is plural in English ('houses of the villages'), 'for them' communicates
    the sense clearly, even though Hebrew uses a singular pronominal form agreeing
    with the classified property as a category.
- source_word: וּבַיֹּבֵל יֵצֵא
  chosen: and in the Jubilee they shall go out
  alternatives:
  - and in the Jubilee it shall go out
  - and at the Jubilee they shall revert
  lexicon: HALOT
  rationale: יֵצֵא literally means 'shall go out.' In this legal context it refers
    to release/reversion in the Jubilee year. Retaining 'go out' preserves the Hebrew
    idiom, while the plural English subject follows the earlier plural 'houses.'
