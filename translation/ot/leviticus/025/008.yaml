id: LEV.25.8
reference: Leviticus 25:8
source:
  edition: WLC
  text: וְ/סָפַרְתָּ֣ לְ/ךָ֗ שֶׁ֚בַע שַׁבְּתֹ֣ת שָׁנִ֔ים שֶׁ֥בַע שָׁנִ֖ים שֶׁ֣בַע
    פְּעָמִ֑ים וְ/הָי֣וּ לְ/ךָ֗ יְמֵי֙ שֶׁ֚בַע שַׁבְּתֹ֣ת הַ/שָּׁנִ֔ים תֵּ֥שַׁע וְ/אַרְבָּעִ֖ים
    שָׁנָֽה׃
translation:
  text: You shall count off seven sabbaths of years for yourself, seven years seven
    times, so that the days of the seven sabbaths of years shall amount to forty-nine
    years for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven weeks of years.' The Hebrew literally says 'seven sabbaths of
      years,' referring to seven seven-year cycles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָפַרְתָּ
  chosen: You shall count off
  alternatives:
  - you shall count
  - you shall number
  lexicon: HALOT
  rationale: The verb ספר in this context means to count or enumerate. 'Count off'
    captures the sense of reckoning a set sequence of time periods, with the prefixed
    conjunction carried naturally into English.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The dative pronoun is retained to reflect the Hebrew's explicit second-person
    reference. 'For yourself' makes the personal reckoning sense clear, though the
    final clause also repeats the pronoun idiomatically.
- source_word: שֶׁבַע שַׁבְּתֹת שָׁנִים
  chosen: seven sabbaths of years
  alternatives:
  - seven weeks of years
  - seven sabbatical periods of years
  lexicon: HALOT
  rationale: שַׁבָּת/שַׁבְּתוֹת here is used analogically for seven-year cycles, not
    literal weekly Sabbaths. 'Sabbaths of years' preserves the Hebrew imagery and
    connection to the sabbatical-year legislation, while remaining understandable
    in context.
- source_word: שֶׁבַע שָׁנִים שֶׁבַע פְּעָמִים
  chosen: seven years seven times
  alternatives:
  - seven years, seven times
  - seven times seven years
  lexicon: HALOT
  rationale: The Hebrew appositional/repetitive structure is preserved fairly closely.
    'Seven years seven times' reflects the source order and emphasizes repeated seven-year
    units.
- source_word: וְהָיוּ לְךָ
  chosen: so that ... shall amount to ... for you
  alternatives:
  - and they shall be for you
  - and they shall become for you
  lexicon: HALOT
  rationale: The idiom introduces the resulting total. Rendering it as 'shall amount
    to' communicates the arithmetic force in natural English while preserving the
    second-person reference.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the time of
  - the period of
  lexicon: HALOT
  rationale: The noun is literally 'days,' and retaining it preserves the Hebrew expression
    for the duration or span of the counted periods.
- source_word: שֶׁבַע שַׁבְּתֹת הַשָּׁנִים
  chosen: the seven sabbaths of years
  alternatives:
  - the seven weeks of years
  - the seven sabbatical cycles of years
  lexicon: HALOT
  rationale: This repeats and clarifies the earlier phrase. Keeping 'sabbaths of years'
    maintains lexical consistency and the conceptual link to sabbatical cycles.
- source_word: תֵּשַׁע וְאַרְבָּעִים שָׁנָה
  chosen: forty-nine years
  alternatives:
  - nine and forty years
  lexicon: HALOT
  rationale: Modern English normally reverses the Hebrew number order. 'Forty-nine
    years' is the clear and natural equivalent.
