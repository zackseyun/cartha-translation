id: LEV.25.23
reference: Leviticus 25:23
source:
  edition: WLC
  text: וְ/הָ/אָ֗רֶץ לֹ֤א תִמָּכֵר֙ לִ/צְמִתֻ֔ת כִּי לִ֖/י הָ/אָ֑רֶץ כִּֽי גֵרִ֧ים
    וְ/תוֹשָׁבִ֛ים אַתֶּ֖ם עִמָּדִֽ/י־־׃
translation:
  text: The land must not be sold permanently, because the land is mine. For you are
    strangers and sojourners with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in perpetuity' or 'for permanent alienation.'
    reason: lexical_alternative
  - marker: b
    text: '''Strangers and sojourners'' expresses Israel''s status as resident dependents
      under God''s ownership of the land.'
    reason: cultural_note
lexical_decisions:
- source_word: תִמָּכֵר
  chosen: must not be sold
  alternatives:
  - shall not be sold
  - is not to be sold
  lexicon: HALOT
  rationale: Nifal imperfect of מכר in legal material carries a passive/prohibitive
    force. English 'must not be sold' communicates the law's force naturally while
    preserving the passive sense.
- source_word: לִצְמִתֻת
  chosen: permanently
  alternatives:
  - in perpetuity
  - for permanent alienation
  lexicon: HALOT
  rationale: The noun צְמִתֻת denotes lasting or irrevocable cutting off/alienation
    in this land-tenure context. 'Permanently' is clear modern English; 'in perpetuity'
    is more formal but less accessible.
- source_word: כִּי לִי הָאָרֶץ
  chosen: because the land is mine
  alternatives:
  - for the land is mine
  lexicon: HALOT
  rationale: This clause gives the rationale for the prohibition. 'Because' makes
    the causal force explicit in contemporary English; 'the land is mine' preserves
    the direct divine ownership claim.
- source_word: גֵרִים
  chosen: strangers
  alternatives:
  - resident foreigners
  - sojourners
  lexicon: HALOT
  rationale: גֵר refers to one residing in a land not originally his own, with dependent
    status. Since the next term is rendered 'sojourners,' 'strangers' avoids redundancy
    while preserving non-native status.
- source_word: וְתוֹשָׁבִים
  chosen: sojourners
  alternatives:
  - settlers
  - temporary residents
  lexicon: HALOT
  rationale: תוֹשָׁב denotes a resident/dweller, often one living in a place without
    full hereditary claim. Paired with גֵר, 'sojourners' captures the provisional
    tenure emphasized by the verse.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - before me
  - in relation to me
  lexicon: HALOT
  rationale: The preposition עם with 1cs suffix is most straightforwardly 'with me.'
    In context it expresses Israel's status as dependent occupants under God's ownership,
    not autonomous possessors.
