theological_decisions:
- issue: Nature of Israel's relation to the land
  chosen_reading: The verse teaches that Israel's tenure in the land is derivative
    and subordinate to God's ownership, expressed without importing later doctrinal
    systems.
  alternative_readings:
  - The verse is only a socio-economic regulation with no theological claim about
    divine ownership
  - The verse implies absolute dispossession language beyond the immediate jubilee
    context
  rationale: The explicit rationale 'the land is mine' grounds the jubilee law theologically.
    The translation preserves both the legal and theological force without expanding
    beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §§1, 3, 6
