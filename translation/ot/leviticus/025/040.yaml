theological_decisions:
- issue: Status of the indebted Israelite in service
  chosen_reading: Rendered in a way that emphasizes hired-worker status rather than
    slave status.
  alternative_readings:
  - He shall be as a hired servant... he shall serve thee
  rationale: The immediate context (vv. 39-43) distinguishes this Israelite from a
    slave and regulates his labor as temporary and protected. The wording should not
    import chattel-slavery connotations that the text is explicitly limiting.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense without importing doctrinal claims.'
