id: LEV.25.40
reference: Leviticus 25:40
source:
  edition: WLC
  text: כְּ/שָׂכִ֥יר כְּ/תוֹשָׁ֖ב יִהְיֶ֣ה עִמָּ֑/ךְ עַד שְׁנַ֥ת הַ/יֹּבֵ֖ל יַעֲבֹ֥ד
    עִמָּֽ/ךְ־׃
translation:
  text: He shall be with you like a hired worker, like a resident foreigner; he shall
    serve with you until the year of jubilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a sojourner' or 'like a resident alien' for 'like a resident foreigner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשָׂכִיר
  chosen: like a hired worker
  alternatives:
  - as a hired servant
  - like a wage laborer
  lexicon: HALOT
  rationale: שָׂכִיר denotes a hired laborer working for wages. 'Hired worker' is
    clear modern English and preserves the non-slave status emphasized in the context.
- source_word: כְּתוֹשָׁב
  chosen: like a resident foreigner
  alternatives:
  - like a sojourner
  - like a resident alien
  lexicon: HALOT
  rationale: תוֹשָׁב refers to a non-native resident living among Israelites. 'Resident
    foreigner' is readable modern English and preserves the social-legal category
    better than the more archaic 'sojourner.'
- source_word: יִהְיֶה עִמָּךְ
  chosen: he shall be with you
  alternatives:
  - he shall be with you as
  - he shall remain with you
  lexicon: HALOT
  rationale: The clause states his status in relation to the Israelite master. 'Be
    with you' is the direct rendering; the comparative force is already carried by
    the two prefixed כ prepositions.
- source_word: עַד שְׁנַת הַיֹּבֵל
  chosen: until the year of jubilee
  alternatives:
  - until the year of the Jubilee
  lexicon: HALOT
  rationale: This is the standard designation of the release year in Leviticus 25.
    Lowercase 'jubilee' treats it as a common noun in English while preserving the
    technical legal term.
- source_word: יַעֲבֹד עִמָּךְ
  chosen: he shall serve with you
  alternatives:
  - he shall work with you
  - he shall labor for you
  lexicon: HALOT
  rationale: עבד can mean serve or work. Here 'serve with you' closely follows the
    Hebrew and avoids overstating domination, since the surrounding context explicitly
    forbids treating the person as a slave. 'For you' is possible idiomatically, but
    'with you' preserves the repeated עִמָּךְ.
