theological_decisions:
- issue: Rendering of kinship language in Israelite social law
  chosen_reading: Retain 'brothers' and 'sons of Israel' rather than gender-neutral
    substitutes.
  alternative_readings:
  - fellow Israelites
  - kinsmen
  - countrymen
  rationale: The Hebrew uses explicitly masculine kinship terms to frame covenant
    solidarity and legal obligation. Per the translation philosophy's gender-accurate
    principle, the masculine wording is preserved rather than neutralized, while still
    being understood representatively in the legal setting.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: How directly to render the verse's slavery language
  chosen_reading: Use inheritance/property and compelled-labor language without softening
    the social reality.
  alternative_readings:
  - servitude-oriented wording that minimizes ownership implications
  rationale: The Hebrew explicitly speaks of hereditary possession and labor extracted
    from persons. Optimal equivalence here requires preserving the legal force and
    moral weight of the text rather than smoothing it into less concrete employment
    language.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
