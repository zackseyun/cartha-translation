id: LEV.25.46
reference: Leviticus 25:46
source:
  edition: WLC
  text: וְ/הִתְנַחֲלְתֶּ֨ם אֹתָ֜/ם לִ/בְנֵי/כֶ֤ם אַחֲרֵי/כֶם֙ לָ/רֶ֣שֶׁת אֲחֻזָּ֔ה
    לְ/עֹלָ֖ם בָּ/הֶ֣ם תַּעֲבֹ֑דוּ וּ/בְ/אַ֨חֵי/כֶ֤ם בְּנֵֽי יִשְׂרָאֵל֙ אִ֣ישׁ בְּ/אָחִ֔י/ו
    לֹא תִרְדֶּ֥ה ב֖/וֹ בְּ/פָֽרֶךְ־־׃ס
translation:
  text: You may pass them on as an inheritance to your sons after you, to inherit
    as a possession permanently; from them you may exact labor. But over your brothers,
    the sons of Israel, no man shall rule over his brother harshly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you may bequeath them to your sons after you as hereditary property.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' and ''sons of Israel'' render the Hebrew masculine kinship
      terms directly; the law addresses fellow Israelites as covenant kin.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְנַחֲלְתֶּם
  chosen: you may pass them on as an inheritance
  alternatives:
  - you may bequeath them
  - you may make them an inherited possession
  lexicon: HALOT
  rationale: The Hithpael of נחל here carries the sense of causing something to be
    inherited or transmitted as hereditary property. 'Pass them on as an inheritance'
    is idiomatic modern English while preserving the legal-hereditary force.
- source_word: לִבְנֵיכֶם אַחֲרֵיכֶם
  chosen: to your sons after you
  alternatives:
  - to your children after you
  - for your sons after you
  lexicon: HALOT
  rationale: בנים is literally 'sons.' Per gender-accurate policy, the masculine form
    is retained rather than neutralized to 'children,' since the legal language of
    inheritance in the source is explicitly masculine.
- source_word: לָרֶשֶׁת אֲחֻזָּה
  chosen: to inherit as a possession
  alternatives:
  - as hereditary property
  - for a possession to inherit
  lexicon: HALOT
  rationale: The infinitive plus אֲחֻזָּה expresses hereditary possession. 'To inherit
    as a possession' preserves both the inheritance and property dimensions without
    over-technical wording.
- source_word: לְעֹלָם
  chosen: permanently
  alternatives:
  - forever
  - for all time
  lexicon: HALOT
  rationale: In legal material עוֹלָם often denotes enduring or perpetual status within
    the covenantal-social frame. 'Permanently' communicates the force in natural English
    without implying metaphysical eternity beyond the legal context.
- source_word: בָּהֶם תַּעֲבֹדוּ
  chosen: from them you may exact labor
  alternatives:
  - you may make them work
  - you may use them for service
  lexicon: HALOT
  rationale: עבד in this context concerns compelled labor from persons held as property.
    'Exact labor' makes the coercive social reality clearer than the softer 'use them
    for service,' while avoiding paraphrase.
- source_word: וּבְאַחֵיכֶם בְּנֵי יִשְׂרָאֵל
  chosen: But over your brothers, the sons of Israel
  alternatives:
  - But as for your brothers, the Israelites
  - But among your brothers, the sons of Israel
  lexicon: HALOT
  rationale: The phrase marks contrast with the previous clause and identifies fellow
    Israelites as covenant kin. 'Brothers, the sons of Israel' preserves the kinship
    language and appositional structure.
- source_word: אִישׁ בְּאָחִיו
  chosen: no man shall rule over his brother
  alternatives:
  - each man over his brother
  - one man over another, his brother
  lexicon: HALOT
  rationale: The distributive איש ... באחיו means each individual Israelite in relation
    to his fellow. English legal style is smoother with 'no man shall rule over his
    brother,' which captures the prohibition.
- source_word: לֹא תִרְדֶּה בוֹ
  chosen: shall rule over
  alternatives:
  - shall dominate
  - shall subjugate
  lexicon: HALOT
  rationale: רדה means to rule or exercise dominion. In this context of labor relations,
    'rule over' is sufficiently direct and leaves the modifying phrase 'harshly' to
    carry the abusive nuance.
- source_word: בְּפָרֶךְ
  chosen: harshly
  alternatives:
  - with harshness
  - ruthlessly
  lexicon: HALOT
  rationale: פרך denotes severity or ruthless harshness in forced labor contexts (cf.
    Exod 1). 'Harshly' is concise and idiomatic; 'ruthlessly' is possible but slightly
    interpretive in tone.
