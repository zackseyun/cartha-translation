id: LEV.25.16
reference: Leviticus 25:16
source:
  edition: WLC
  text: לְ/פִ֣י רֹ֣ב הַ/שָּׁנִ֗ים תַּרְבֶּה֙ מִקְנָת֔/וֹ וּ/לְ/פִי֙ מְעֹ֣ט הַ/שָּׁנִ֔ים
    תַּמְעִ֖יט מִקְנָת֑/וֹ כִּ֚י מִסְפַּ֣ר תְּבוּאֹ֔ת ה֥וּא מֹכֵ֖ר לָֽ/ךְ׀׃
translation:
  text: In proportion to the greater number of years you shall increase its purchase
    price, and in proportion to the fewer number of years you shall reduce its purchase
    price, because he is selling to you a number of harvests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the number of crops he sells to you.' The Hebrew תְּבוּאוֹת
      can be rendered 'crops,' 'produce,' or 'harvests.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפִי
  chosen: in proportion to
  alternatives:
  - according to
  - in keeping with
  lexicon: HALOT
  rationale: The idiom לְפִי marks correspondence or proportion. 'In proportion to'
    makes the pricing logic explicit in natural English while staying close to the
    Hebrew structure.
- source_word: רֹב הַשָּׁנִים
  chosen: the greater number of years
  alternatives:
  - many years
  - the multitude of years
  lexicon: HALOT
  rationale: רֹב with 'years' refers to a larger quantity of years remaining until
    Jubilee. 'The greater number of years' preserves the comparative sense needed
    for the legal formula.
- source_word: תַּרְבֶּה
  chosen: you shall increase
  alternatives:
  - you shall make great
  - you shall raise
  lexicon: HALOT
  rationale: 'Hiphil of רבה is causative: to make much/increase. ''You shall increase''
    fits the legal instruction about adjusting price upward.'
- source_word: מִקְנָתוֹ
  chosen: its purchase price
  alternatives:
  - its purchase
  - what is bought from him
  - its acquisition price
  lexicon: HALOT
  rationale: מִקְנָה can denote purchase, property acquired, or price of acquisition.
    In this context of calculating value by years and harvests, 'purchase price' best
    conveys the transactional sense. The 3ms suffix refers to the item/transaction
    being purchased from the seller, rendered idiomatically as 'its.'
- source_word: מְעֹט הַשָּׁנִים
  chosen: the fewer number of years
  alternatives:
  - few years
  - the small number of years
  lexicon: HALOT
  rationale: The phrase is the counterpart to רֹב הַשָּׁנִים and refers to fewer remaining
    years. 'The fewer number of years' preserves the comparative legal symmetry.
- source_word: תַּמְעִיט
  chosen: you shall reduce
  alternatives:
  - you shall diminish
  - you shall make less
  lexicon: HALOT
  rationale: Hiphil of מעט means to make small/decrease. 'Reduce' is clear modern
    legal-commercial English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the rationale for the pricing rule. 'Because' communicates
    the explanatory force plainly.
- source_word: מִסְפַּר תְּבוּאֹת
  chosen: a number of harvests
  alternatives:
  - the number of crops
  - a count of produce yields
  lexicon: HALOT
  rationale: תְּבוּאוֹת refers to produce/yields/harvests. In this land-sale context,
    the seller is effectively selling the right to a certain number of crop years.
    'A number of harvests' is natural and concrete.
- source_word: הוּא מֹכֵר לָךְ
  chosen: he is selling to you
  alternatives:
  - he sells to you
  - what he sells to you is
  lexicon: HALOT
  rationale: 'The clause explains the nature of the transaction: the seller is selling
    future productive years. The participle מֹכֵר is rendered as a present progressive/general
    present in English. Retaining ''he'' reflects the masculine singular form without
    forcing a gender-neutral recast.'
