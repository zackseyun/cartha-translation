theological_decisions:
- issue: Gendered distributive noun אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew uses masculine singular אִישׁ distributively. Following the
    stated gender-accurate policy, the translation preserves the masculine representative
    form rather than neutralizing it in the main text.
