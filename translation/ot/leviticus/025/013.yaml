id: LEV.25.13
reference: Leviticus 25:13
source:
  edition: WLC
  text: בִּ/שְׁנַ֥ת הַ/יּוֹבֵ֖ל הַ/זֹּ֑את תָּשֻׁ֕בוּ אִ֖ישׁ אֶל אֲחֻזָּתֽ/וֹ־׃
translation:
  text: In this Year of Jubilee, each man shall return to his property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each one shall return to his possession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In ... year
  alternatives:
  - In the year of
  - During the year of
  lexicon: HALOT
  rationale: The preposition ב plus construct of שָׁנָה is naturally rendered temporally
    as 'in [the] year of.' English idiom prefers 'In this Year of Jubilee' rather
    than a more wooden 'In the year of the Jubilee, this.'
- source_word: הַ/יּוֹבֵל
  chosen: Year of Jubilee
  alternatives:
  - Jubilee
  - the jubilee year
  lexicon: HALOT
  rationale: יוֹבֵל denotes the Jubilee institution/year in Leviticus 25. Rendering
    it as 'Year of Jubilee' makes explicit that the referent is the special year,
    matching the legal context.
- source_word: הַ/זֹּאת
  chosen: this
  alternatives:
  - that same
  lexicon: HALOT
  rationale: The demonstrative modifies 'Year of Jubilee' and is best brought forward
    in natural English as 'this Year of Jubilee.'
- source_word: תָּשֻׁבוּ
  chosen: shall return
  alternatives:
  - you shall return
  - are to return
  lexicon: HALOT
  rationale: Second masculine plural imperfect in legal instruction is well represented
    by English 'shall return.' Because the following אִישׁ distributes the command
    individually, English can shift from explicit plural 'you' to distributive 'each
    man shall return' without loss of meaning.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: אִישׁ here is distributive ('each/every man'). Per the gender-accurate
    policy, 'each man' preserves the masculine singular representative form better
    than a gender-neutral paraphrase. The distributive sense is retained.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  - back to
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is sufficient. The sense of restoration
    is already carried by 'return.'
- source_word: אֲחֻזָּת/וֹ
  chosen: his property
  alternatives:
  - his possession
  - his hereditary property
  - his holding
  lexicon: HALOT
  rationale: אֲחֻזָּה in Leviticus 25 refers to landed property/holding possessed
    by a family within Israel. 'Property' is clear modern English; 'possession' is
    possible but less idiomatic, while 'hereditary property' is more interpretive
    than the verse itself states.
