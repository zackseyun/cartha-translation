theological_decisions:
- issue: Relationship between obedience and secure dwelling in the land
  chosen_reading: 'The verse presents covenantal consequence within Israel''s land
    context: obedience leads to secure dwelling in the land.'
  alternative_readings:
  - A generalized promise of personal prosperity or safety for all believers in all
    contexts
  rationale: The Hebrew directly links keeping YHWH's statutes and judgments with
    dwelling securely in the land. The translation preserves this covenantal land
    setting and does not universalize it into an unconditional promise beyond the
    text.
  doctrine_reference: Translation philosophy §§1, 3, 5
