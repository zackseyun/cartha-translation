id: LEV.25.18
reference: Leviticus 25:18
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶם֙ אֶת חֻקֹּתַ֔/י וְ/אֶת מִשְׁפָּטַ֥/י תִּשְׁמְר֖וּ וַ/עֲשִׂיתֶ֣ם
    אֹתָ֑/ם וִֽ/ישַׁבְתֶּ֥ם עַל הָ/אָ֖רֶץ לָ/בֶֽטַח־־־׃
translation:
  text: So you shall carry out my statutes and keep my judgments, and do them, and
    you shall dwell in the land securely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my decrees ... my ordinances.' The Hebrew distinguishes two legal terms,
      חֻקִּים and מִשְׁפָּטִים.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats ''do'': literally, ''and you shall do my statutes ... and
      my judgments you shall keep and do them.'''
    reason: lexical_alternative
  - marker: c
    text: That is, dwell in the promised land in safety.
    reason: cultural_note
lexical_decisions:
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to prescribed enactments or statutes. 'Statutes'
    preserves the legal-covenantal sense and pairs naturally with מִשְׁפָּטַי as a
    distinct category.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes judgments, legal decisions, or ordinances.
    'Judgments' keeps the formal legal nuance and preserves distinction from חֻקִּים.
    'Rules' is clearer but less weighty; 'ordinances' risks collapsing the distinction.
- source_word: תִּשְׁמְרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר in covenantal/legal contexts often means to keep or observe. 'Keep'
    is idiomatic and concise in English while retaining covenantal force.
- source_word: וַעֲשִׂיתֶם ... אֹתָם
  chosen: carry out ... and do them
  alternatives:
  - do ... do them
  - practice ... practice them
  lexicon: HALOT
  rationale: The verse uses עשה twice, first with the statutes and then resumptively
    with 'them.' To avoid awkward repetition while preserving the emphatic two-step
    structure, the first is rendered 'carry out' and the second 'do them.' This documents
    a deliberate variation for readability without losing the Hebrew emphasis on actual
    obedience.
- source_word: וִישַׁבְתֶּם
  chosen: you shall dwell
  alternatives:
  - you shall live
  - you shall reside
  lexicon: HALOT
  rationale: ישׁב commonly means dwell, sit, or inhabit. In land-promise contexts,
    'dwell' best conveys settled habitation in the land.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Leviticus, הָאָרֶץ in this context refers specifically to the promised
    land of Israel. 'The land' is the standard covenantal rendering and preserves
    that resonance better than 'country.'
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: בֶּטַח denotes security, safety, or confidence. 'Securely' is natural
    with 'dwell' in English and conveys settled safety rather than merely the manner
    of movement.
