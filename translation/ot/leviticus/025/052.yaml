id: LEV.25.52
reference: Leviticus 25:52
source:
  edition: WLC
  text: וְ/אִם מְעַ֞ט נִשְׁאַ֧ר בַּ/שָּׁנִ֛ים עַד שְׁנַ֥ת הַ/יֹּבֵ֖ל וְ/חִשַּׁב ל֑/וֹ
    כְּ/פִ֣י שָׁנָ֔י/ו יָשִׁ֖יב אֶת גְּאֻלָּתֽ/וֹ־־־־׃
translation:
  text: But if few years remain until the Year of Jubilee, then he shall calculate
    with him; according to his years he shall repay his redemption.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall pay back his redemption price.' The Hebrew expression refers
      to the amount required for his redemption, not redemption in an abstract sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  chosen: few
  alternatives:
  - a few
  - little
  lexicon: HALOT
  rationale: 'In context with השנים (''the years''), the adjective functions quantitatively:
    ''few years remain.'' ''Little'' would sound unnatural in English here.'
- source_word: נִשְׁאַר בַּשָּׁנִים
  chosen: years remain
  alternatives:
  - is left in the years
  - remain in the years
  lexicon: HALOT
  rationale: The Niphal of שׁאר conveys what is left or remains. Rendering the phrase
    idiomatically as 'years remain' communicates the temporal sense clearly in modern
    English.
- source_word: שְׁנַת הַיּוֹבֵל
  chosen: the Year of Jubilee
  alternatives:
  - the year of jubilee
  lexicon: HALOT
  rationale: This is the established and accurate rendering of the covenantal institution
    in Leviticus 25. Capitalization reflects the formal designation of the institution,
    not a doctrinal addition.
- source_word: וְחִשַּׁב לוֹ
  chosen: he shall calculate with him
  alternatives:
  - he shall reckon with him
  - he shall calculate for him
  lexicon: HALOT
  rationale: חשב in this legal-economic context means to calculate or reckon. 'With
    him' best reflects the interpersonal accounting involved between the parties,
    matching the surrounding redemption-price procedure.
- source_word: כְּפִי שָׁנָיו
  chosen: according to his years
  alternatives:
  - in proportion to his years
  - based on his years
  lexicon: HALOT
  rationale: כפי indicates proportion or accordance. 'According to his years' is a
    fairly literal rendering that remains readable and preserves the legal formula.
- source_word: יָשִׁיב אֶת גְּאֻלָּתוֹ
  chosen: he shall repay his redemption
  alternatives:
  - he shall refund the price of his redemption
  - he shall pay back his redemption price
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to restore or repay. גאֻלה in this context
    is the redemption payment required for release. 'Repay his redemption' is concise
    and close to the Hebrew, though the sense is financial repayment.
