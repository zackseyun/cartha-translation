id: LEV.25.54
reference: Leviticus 25:54
source:
  edition: WLC
  text: וְ/אִם לֹ֥א יִגָּאֵ֖ל בְּ/אֵ֑לֶּה וְ/יָצָא֙ בִּ/שְׁנַ֣ת הַ/יֹּבֵ֔ל ה֖וּא וּ/בָנָ֥י/ו
    עִמּֽ/וֹ־׃
translation:
  text: But if he is not redeemed by these means, then he and his sons with him shall
    go out in the year of Jubilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by these'—referring to the redemption provisions described in the preceding
      verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the preceding regulations.
    'But if' captures both the connective force and the mild contrast with the prior
    redemption possibilities.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation of the following verb.
- source_word: יִגָּאֵל
  chosen: is redeemed
  alternatives:
  - is bought back
  - is ransomed
  lexicon: HALOT
  rationale: Nifal of גאל denotes being redeemed or reclaimed by a kinsman/payment
    mechanism in this legal context. 'Is redeemed' preserves the established legal-theological
    sense without over-paraphrase.
- source_word: בְּאֵלֶּה
  chosen: by these means
  alternatives:
  - by these
  - through these
  lexicon: HALOT
  rationale: The preposition with the demonstrative points back to the redemption
    provisions just described. 'By these means' makes the referent clear in natural
    English while staying close to the legal sense.
- source_word: וְיָצָא
  chosen: then ... shall go out
  alternatives:
  - and he shall go out
  - he shall be released
  lexicon: HALOT
  rationale: Literally 'and he shall go out'; in this servitude context it means release
    from bonded service. 'Shall go out' preserves the Hebrew idiom, with 'then' clarifying
    the apodosis of the conditional.
- source_word: בִּשְׁנַת הַיֹּבֵל
  chosen: in the year of Jubilee
  alternatives:
  - in the year of the Jubilee
  lexicon: HALOT
  rationale: Standard rendering of the legal time marker. 'Jubilee' is retained as
    the recognized term for יוֹבֵל in Leviticus.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis or clarity after the verb. English
    normally expresses this simply as 'he' unless stronger emphasis is needed.
- source_word: וּבָנָיו עִמּוֹ
  chosen: and his sons with him
  alternatives:
  - and his children with him
  - together with his sons
  lexicon: HALOT
  rationale: בנים specifically means 'sons' here, not a gender-neutral term. Per gender-accurate
    policy, the masculine form is preserved. 'With him' is retained to reflect the
    household release.
