- issue: Gendered household term בָנָיו
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew explicitly uses the masculine plural 'sons.' The translation
    preserves the source's gendered wording rather than broadening it to 'children.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over
    gender-neutral)
