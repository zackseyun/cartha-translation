id: LEV.25.29
reference: Leviticus 25:29
source:
  edition: WLC
  text: וְ/אִ֗ישׁ כִּֽי יִמְכֹּ֤ר בֵּית מוֹשַׁב֙ עִ֣יר חוֹמָ֔ה וְ/הָיְתָה֙ גְּאֻלָּת֔/וֹ
    עַד תֹּ֖ם שְׁנַ֣ת מִמְכָּר֑/וֹ יָמִ֖ים תִּהְיֶ֥ה גְאֻלָּתֽ/וֹ־־־׃
translation:
  text: If a man sells a house for dwelling in a walled city, its redemption may be
    made until the completion of a full year from its sale; its right of redemption
    shall last for days, that is, a full year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'for days'; in this legal idiom, the phrase denotes a full year's
      duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: If a man
  alternatives:
  - And if a man
  - If someone
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In legal casuistic style, 'if a man'
    is a natural English rendering and preserves the gender-accurate representative
    force of the Hebrew.
- source_word: כִּי
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this legal context כִּי introduces a case law condition, best rendered
    'if.'
- source_word: יִמְכֹּר
  chosen: sells
  alternatives:
  - should sell
  lexicon: HALOT
  rationale: 'Imperfect in casuistic law is naturally rendered with present English
    in a conditional protasis: ''if ... sells.'''
- source_word: בֵּית מוֹשַׁב
  chosen: a house for dwelling
  alternatives:
  - a dwelling house
  - a residential house
  lexicon: HALOT
  rationale: The construct phrase denotes a house used as a residence. 'House for
    dwelling' is slightly more literal while remaining natural; it distinguishes this
    from other kinds of structures.
- source_word: עִיר חוֹמָה
  chosen: a walled city
  alternatives:
  - a city wall
  - a fortified city
  lexicon: HALOT
  rationale: The phrase means a city characterized by a wall. 'Walled city' is the
    standard and clear English equivalent.
- source_word: וְהָיְתָה גְּאֻלָּתוֹ
  chosen: its redemption may be made
  alternatives:
  - its redemption shall be
  - he shall have redemption
  - its right of redemption shall be
  lexicon: HALOT
  rationale: גְּאֻלָּה in this legal context refers to the possibility/right of redemption
    after sale. Because English 'redemption' can sound abstract, the phrase is rendered
    verbally as a redeeming action/right that exists during the stated period. 'Its'
    follows the grammatical reference to the house/property sold.
- source_word: עַד תֹּם שְׁנַת מִמְכָּרוֹ
  chosen: until the completion of a full year from its sale
  alternatives:
  - until the end of the year of its sale
  - until a year from its sale is complete
  lexicon: HALOT
  rationale: The Hebrew literally says 'until the completion of the year of its sale.'
    In context this means one full year from the date of sale, not merely the end
    of the calendar year.
- source_word: יָמִים
  chosen: for days, that is, a full year
  alternatives:
  - for days
  - for a year
  - for a full year
  lexicon: HALOT
  rationale: 'In Hebrew idiom יָמִים can denote a full year''s duration in certain
    contexts. Here it clarifies the preceding clause: the redemption period is measured
    as a full year. The translation preserves the idiom and explains it in apposition
    for readability and auditability.'
- source_word: תִּהְיֶה גְאֻלָּתוֹ
  chosen: its right of redemption shall last
  alternatives:
  - its redemption shall be
  - its redemption shall remain
  lexicon: HALOT
  rationale: This clause states the duration of the redemption right. 'Shall last'
    makes the temporal force explicit in idiomatic English while preserving the legal
    sense of גְּאֻלָּה.
