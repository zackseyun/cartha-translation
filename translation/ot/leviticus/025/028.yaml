id: LEV.25.28
reference: Leviticus 25:28
source:
  edition: WLC
  text: וְ/אִ֨ם לֹֽא מָֽצְאָ֜ה יָד֗/וֹ דֵּי֮ הָשִׁ֣יב ל/וֹ֒ וְ/הָיָ֣ה מִמְכָּר֗/וֹ
    בְּ/יַד֙ הַ/קֹּנֶ֣ה אֹת֔/וֹ עַ֖ד שְׁנַ֣ת הַ/יּוֹבֵ֑ל וְ/יָצָא֙ בַּ/יֹּבֵ֔ל וְ/שָׁ֖ב
    לַ/אֲחֻזָּתֽ/וֹ־׃
translation:
  text: But if his hand does not find enough to restore it to him, then what he sold
    shall remain in the hand of the one who bought it until the year of Jubilee; and
    it shall go out in the Jubilee, and he shall return to his property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and it shall return to his possession.' The final Hebrew verb could
      be understood with the sold property as the subject rather than the seller.
    reason: alternative_reading
lexical_decisions:
- source_word: מָצְאָה יָדוֹ
  chosen: his hand does not find
  alternatives:
  - he cannot obtain
  - he does not have
  lexicon: HALOT
  rationale: The Hebrew idiom uses 'hand' as a metonym for means/resources. Retaining
    'his hand does not find' preserves the concrete Hebrew flavor while remaining
    intelligible in English. The alternatives express the sense more dynamically but
    lose the source-text imagery.
- source_word: דֵּי
  chosen: enough
  alternatives:
  - sufficiency
  - what is sufficient
  lexicon: HALOT
  rationale: דֵּי denotes sufficiency or enough quantity. 'Enough' is natural modern
    English and fits the legal-economic context.
- source_word: הָשִׁיב לוֹ
  chosen: to restore it to him
  alternatives:
  - to return it to him
  - to repay him
  lexicon: HALOT
  rationale: In this land-redemption context, the sense is restoring the sold property
    to its original owner by payment. 'Restore it to him' captures the legal result
    better than 'repay him,' which could suggest only money, and is slightly clearer
    than bare 'return it to him'.
- source_word: מִמְכָּרוֹ
  chosen: what he sold
  alternatives:
  - his sale
  - the thing sold by him
  lexicon: HALOT
  rationale: The noun can denote the sale or the thing sold. Here the following clauses
    about remaining with the buyer until Jubilee show the referent is the property
    sold, so 'what he sold' best conveys the sense in idiomatic English.
- source_word: בְּיַד הַקֹּנֶה אֹתוֹ
  chosen: in the hand of the one who bought it
  alternatives:
  - in the possession of the buyer
  - with the purchaser
  lexicon: HALOT
  rationale: '''In the hand of'' is a common Hebrew idiom for possession/control.
    Retaining ''in the hand of'' preserves the legal idiom, while ''the one who bought
    it'' makes the participle explicit and clear.'
- source_word: שְׁנַת הַיּוֹבֵל
  chosen: the year of Jubilee
  alternatives:
  - the Jubilee year
  lexicon: HALOT
  rationale: Both are accurate. 'The year of Jubilee' follows the Hebrew word order
    more closely while remaining standard English.
- source_word: וְיָצָא בַּיּוֹבֵל
  chosen: it shall go out in the Jubilee
  alternatives:
  - it shall be released at the Jubilee
  - it shall revert in the Jubilee
  lexicon: HALOT
  rationale: The verb 'go out' is the plain sense of יצא and likely refers to the
    property going out from the buyer's possession. A more interpretive rendering
    like 'revert' is possible, but 'go out' preserves the Hebrew wording and lets
    the next clause explain the result.
- source_word: וְשָׁב לַאֲחֻזָּתוֹ
  chosen: and he shall return to his property
  alternatives:
  - and it shall return to his property
  - and he shall return to his possession
  lexicon: HALOT
  rationale: The masculine singular verb most naturally refers back to the seller/owner,
    not the sold field/house, especially in the Jubilee legislation where the person
    returns to his hereditary holding. אֲחֻזָּה is a landed possession or hereditary
    property; 'property' is clear modern English, while 'possession' is possible but
    less natural.
