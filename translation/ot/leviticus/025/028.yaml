theological_decisions:
- issue: Referent of the final verb וְשָׁב
  chosen_reading: 'The original owner/seller is the subject: ''he shall return to
    his property.'''
  alternative_readings:
  - 'The sold property is the subject: ''it shall return to his property/possession.'''
  rationale: The Hebrew verb is masculine singular and could grammatically refer either
    to the sold item or the seller. In the immediate legal context and broader Jubilee
    legislation, the sense is that the owner regains access to his hereditary holding
    at Jubilee. Rendering the subject as 'he' preserves this likely sense while keeping
    the legal-personal focus of the passage.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpreive
    tension where genuine ambiguity exists)
