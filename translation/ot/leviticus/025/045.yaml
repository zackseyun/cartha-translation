id: LEV.25.45
reference: Leviticus 25:45
source:
  edition: WLC
  text: וְ֠/גַם מִ/בְּנֵ֨י הַ/תּוֹשָׁבִ֜ים הַ/גָּרִ֤ים עִמָּ/כֶם֙ מֵ/הֶ֣ם תִּקְנ֔וּ
    וּ/מִ/מִּשְׁפַּחְתָּ/ם֙ אֲשֶׁ֣ר עִמָּ/כֶ֔ם אֲשֶׁ֥ר הוֹלִ֖ידוּ בְּ/אַרְצְ/כֶ֑ם
    וְ/הָי֥וּ לָ/כֶ֖ם לַֽ/אֲחֻזָּֽה׃
translation:
  text: You may also buy from the sons of the sojourners who reside with you, and
    from their families who are with you, whom they have fathered in your land; and
    they shall become your property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the descendants of the resident foreigners living with you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as a possession'; here the legal sense is that they become inheritable
      property.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: You may also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional permitted source of acquisition in continuity
    with the previous verse. Rendering with 'You may also' makes the 2mp verbal force
    of תִּקְנוּ explicit in natural English.
- source_word: מִבְּנֵי
  chosen: from the sons of
  alternatives:
  - from the children of
  - from among the descendants of
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Because the phrase denotes offspring/descendants
    in a legal context, 'sons of' preserves the Hebrew form while remaining understandable.
    A broader rendering like 'descendants of' is possible but less formally transparent.
- source_word: הַתּוֹשָׁבִים הַגָּרִים עִמָּכֶם
  chosen: the sojourners who reside with you
  alternatives:
  - the resident foreigners living among you
  - the temporary residents staying with you
  lexicon: HALOT
  rationale: The paired terms describe non-native residents dwelling among Israel.
    'Sojourners' preserves the covenantal/legal register of the Hebrew, while 'who
    reside with you' renders the participial sense naturally.
- source_word: מֵהֶם תִּקְנוּ
  chosen: you may also buy from
  alternatives:
  - from them you may buy
  - you may acquire from them
  lexicon: HALOT
  rationale: קנה commonly means 'buy/acquire.' In this slavery legislation, the commercial
    sense is salient, so 'buy' is the clearest rendering. 'May' reflects the permissive
    legal force in context rather than a simple future.
- source_word: וּמִמִּשְׁפַּחְתָּם
  chosen: and from their families
  alternatives:
  - and from their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes family/clan grouping. 'Families' is more accessible
    modern English and fits the domestic/legal context.
- source_word: אֲשֶׁר עִמָּכֶם
  chosen: who are with you
  alternatives:
  - who reside among you
  - who are living with you
  lexicon: HALOT
  rationale: This relative clause further identifies the families as present among
    the Israelites. 'Who are with you' is a close and readable rendering.
- source_word: אֲשֶׁר הוֹלִידוּ בְּאַרְצְכֶם
  chosen: whom they have fathered in your land
  alternatives:
  - whom they have begotten in your land
  - whom they have had in your land
  lexicon: HALOT
  rationale: הוליד in the Hiphil commonly means 'beget/father.' Because the subject
    is masculine plural and the legal focus is lineage, 'fathered' is more precise
    than the generic 'had.'
- source_word: וְהָיוּ לָכֶם לַאֲחֻזָּה
  chosen: and they shall become your property
  alternatives:
  - and they shall be for you as a possession
  - and they shall become your holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession/holding, often landed property, but here
    refers to persons held as inheritable property in the legal framework of the passage.
    'Property' communicates the stark legal reality more clearly than the softer 'possession.'
