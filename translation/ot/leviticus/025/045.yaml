theological_decisions:
- issue: Rendering of slavery/property language in holiness-law legislation
  chosen_reading: Use direct ownership language ('buy,' 'property') rather than softened
    terms.
  alternative_readings:
  - acquire
  - possession
  - servants
  rationale: The Hebrew legal terminology describes actual purchase and status as
    inheritable possession. Following the translation philosophy's original-language
    primacy, the English should not mute the bonded nature of the institution by substituting
    euphemistic language.
  doctrine_reference: Translation philosophy §1, §6
