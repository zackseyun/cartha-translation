id: LEV.25.3
reference: Leviticus 25:3
source:
  edition: WLC
  text: שֵׁ֤שׁ שָׁנִים֙ תִּזְרַ֣ע שָׂדֶ֔/ךָ וְ/שֵׁ֥שׁ שָׁנִ֖ים תִּזְמֹ֣ר כַּרְמֶ֑/ךָ
    וְ/אָסַפְתָּ֖ אֶת תְּבוּאָתָֽ/הּ־׃
translation:
  text: For six years you shall sow your field, and for six years you shall prune
    your vineyard and gather its produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its yield.' The Hebrew term can denote agricultural produce more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשׁ שָׁנִים
  chosen: for six years
  alternatives:
  - six years
  lexicon: HALOT
  rationale: The accusative of duration indicates the span of time during which the
    action is to be done. 'For six years' makes the temporal force explicit in natural
    English.
- source_word: תִּזְרַע
  chosen: you shall sow
  alternatives:
  - you may sow
  - you are to sow
  lexicon: HALOT
  rationale: The imperfect here functions instructionally within legal material, best
    rendered with English 'shall' to reflect covenantal prescription without sounding
    archaic in the rest of the sentence.
- source_word: שָׂדֶךָ
  chosen: your field
  alternatives:
  - your land
  lexicon: HALOT
  rationale: שָׂדֶה refers specifically to a field/cultivated tract rather than the
    broader 'land.' 'Field' preserves the agricultural specificity of the verse.
- source_word: תִּזְמֹר
  chosen: you shall prune
  alternatives:
  - you shall trim
  - you shall tend
  lexicon: HALOT
  rationale: The verb זמר in vineyard context refers specifically to pruning vines.
    'Prune' is the most precise agricultural equivalent.
- source_word: כַּרְמֶךָ
  chosen: your vineyard
  alternatives:
  - your vine plot
  lexicon: HALOT
  rationale: Standard and precise rendering for כרם in an agricultural law context.
- source_word: וְאָסַפְתָּ
  chosen: and gather
  alternatives:
  - and you shall gather
  - and harvest
  lexicon: HALOT
  rationale: אָסַף means to gather/collect. 'Gather' preserves the lexical sense,
    while 'harvest' would slightly narrow or interpret the action. The auxiliary 'shall'
    is not repeated in English because it is naturally carried over from the parallel
    clauses.
- source_word: תְּבוּאָתָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its crops
  - its harvest
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce/yield from the land or vineyard. 'Its produce'
    is broad enough to cover the agricultural output without over-specifying. The
    feminine suffix is rendered as 'its,' referring to the vineyard/field produce
    in context.
