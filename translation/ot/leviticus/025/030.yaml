theological_decisions:
- issue: Legal force of the house sale in an unwalled city
  chosen_reading: The verse teaches that if not redeemed within one full year, the
    sale becomes permanent and is not reversed at the Jubilee.
  alternative_readings:
  - The sale simply remains valid for the buyer without emphasizing hereditary permanence
  - The phrase could be rendered more literally as 'shall stand' rather than interpreted
    as legal transfer
  rationale: The combination of וְקָם, לַצְּמִיתֻת, לְדֹרֹתָיו, and לֹא יֵצֵא בַּיּוֹבֵל
    strongly indicates an irrevocable transfer in contrast to normal Jubilee reversion.
    The translation makes that legal sense explicit without adding doctrinal claims
    beyond the property law context.
