id: LEV.25.30
reference: Leviticus 25:30
source:
  edition: WLC
  text: וְ/אִ֣ם לֹֽא יִגָּאֵ֗ל עַד מְלֹ֣את ל/וֹ֮ שָׁנָ֣ה תְמִימָה֒ וְ֠/קָם הַ/בַּ֨יִת
    אֲשֶׁר בָּ/עִ֜יר אֲשֶׁר לא חֹמָ֗ה לַ/צְּמִיתֻ֛ת לַ/קֹּנֶ֥ה אֹת֖/וֹ לְ/דֹרֹתָ֑י/ו
    לֹ֥א יֵצֵ֖א בַּ/יֹּבֵֽל־־־־׃
translation:
  text: But if it is not redeemed before a full year is completed for it, then the
    house that is in a city that has no wall shall pass permanently to the one who
    bought it, throughout his generations; it shall not go out in the Jubilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'shall stand permanently.' The Hebrew idiom expresses
      that the sale remains legally fixed.
    reason: lexical_alternative
  - marker: b
    text: '''It shall not go out in the Jubilee'' means the house does not revert
      to the original family at the Jubilee year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגָּאֵל
  chosen: is redeemed
  alternatives:
  - is bought back
  - is reclaimed
  lexicon: HALOT
  rationale: The Niphal of גאל here denotes being redeemed/bought back within the
    legal framework of property redemption. 'Redeemed' preserves the covenant-legal
    terminology used throughout Leviticus 25 better than the more colloquial 'bought
    back.'
- source_word: עַד מְלֹאת לוֹ שָׁנָה תְמִימָה
  chosen: before a full year is completed for it
  alternatives:
  - until the completion of a full year for it
  - within a full year
  lexicon: HALOT
  rationale: This phrase marks the deadline for redemption. 'Before a full year is
    completed for it' is idiomatic English while preserving the sense of a complete
    one-year period attached to the house/sale. 'For it' reflects the pronominal suffix
    without over-specifying.
- source_word: וְקָם
  chosen: shall pass
  alternatives:
  - shall stand
  - shall remain established
  - shall belong
  lexicon: HALOT
  rationale: Literally 'shall stand/arise,' but in this legal context it indicates
    that the sale stands permanently. 'Shall pass' communicates the transfer becoming
    fixed in ownership, while the permanence is then made explicit by לצמיתת. A more
    literal 'shall stand' would be obscure in English legal style.
- source_word: הַבַּיִת אֲשֶׁר בָּעִיר אֲשֶׁר לֹא חֹמָה
  chosen: the house that is in a city that has no wall
  alternatives:
  - the house in a city without a wall
  - the house in an unwalled city
  lexicon: HALOT
  rationale: The Hebrew is somewhat expanded and explicit. This rendering stays close
    to the source while remaining natural. 'Has no wall' preserves the relative-clause
    structure and avoids prematurely compressing the phrase.
- source_word: לַצְּמִיתֻת
  chosen: permanently
  alternatives:
  - in perpetuity
  - forever
  lexicon: HALOT
  rationale: The noun denotes permanence or irrevocability in property law. 'Permanently'
    is clear modern English; 'in perpetuity' is possible but more technical. The legal
    force is retained by context.
- source_word: לַקֹּנֶה אֹתוֹ
  chosen: to the one who bought it
  alternatives:
  - to its buyer
  - to the purchaser of it
  lexicon: HALOT
  rationale: The participle means 'the one buying/buyer.' 'The one who bought it'
    is natural English and clearly refers to the purchaser in this completed transaction.
- source_word: לְדֹרֹתָיו
  chosen: throughout his generations
  alternatives:
  - for his generations
  - for his descendants
  lexicon: HALOT
  rationale: This phrase indicates hereditary continuation in the buyer's line. 'Throughout
    his generations' preserves the formal sense without reducing it merely to 'descendants.'
- source_word: לֹא יֵצֵא בַּיּוֹבֵל
  chosen: it shall not go out in the Jubilee
  alternatives:
  - it shall not revert in the Jubilee
  - it shall not be released at the Jubilee
  lexicon: HALOT
  rationale: יצא literally means 'go out.' In this legal context it refers to not
    reverting/releasing at the Jubilee. The main text keeps the concrete idiom while
    remaining understandable; the legal nuance is worth preserving in a footnote.
- source_word: יּוֹבֵל
  chosen: Jubilee
  lexicon: HALOT
  rationale: Standard rendering for the institution in Leviticus 25; it is established
    biblical terminology and sufficiently transparent in English.
