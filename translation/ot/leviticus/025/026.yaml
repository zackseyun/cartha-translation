id: LEV.25.26
reference: Leviticus 25:26
source:
  edition: WLC
  text: וְ/אִ֕ישׁ כִּ֛י לֹ֥א יִֽהְיֶה לּ֖/וֹ גֹּאֵ֑ל וְ/הִשִּׂ֣יגָה יָד֔/וֹ וּ/מָצָ֖א
    כְּ/דֵ֥י גְאֻלָּתֽ/וֹ־׃
translation:
  text: But if a man has no redeemer, and his hand attains enough and he finds sufficient
    means for his redemption,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has no kinsman-redeemer.' The Hebrew גֹּאֵל often refers to a near relative
      with the duty or right to redeem family property.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his hand attains.' This Hebrew idiom refers to a person's means
      becoming sufficient.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ
  chosen: But if a man
  alternatives:
  - And if a man
  - But if someone
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In this legal context it introduces
    a case condition. 'But if a man' fits the flow from the previous verse and preserves
    the gender-accurate singular stipulated by the translation philosophy.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional clause, best rendered 'if' in English.
- source_word: לֹא יִהְיֶה לּוֹ גֹּאֵל
  chosen: has no redeemer
  alternatives:
  - has no kinsman-redeemer
  - has no one to redeem him
  lexicon: HALOT
  rationale: The clause literally means 'there is not for him a redeemer.' גֹּאֵל
    in Levitical land law refers to a family redeemer with the right to buy back property.
    'Redeemer' is concise and accurate in context; the more explicit familial nuance
    is preserved as an alternative.
- source_word: וְהִשִּׂיגָה יָדוֹ
  chosen: his hand attains enough
  alternatives:
  - his hand prospers
  - he acquires sufficient means
  - his means become sufficient
  lexicon: HALOT
  rationale: The idiom literally says 'his hand reaches/attains.' In Hebrew this commonly
    refers to one's means becoming sufficient. I retained some literal texture with
    'his hand attains enough' while making the sense intelligible in English legal
    prose.
- source_word: וּמָצָא
  chosen: and he finds
  alternatives:
  - and obtains
  - and comes upon
  lexicon: HALOT
  rationale: The verb is the common 'find.' In context it refers to finding or securing
    the needed amount. 'Finds' preserves the lexical form and works idiomatically.
- source_word: כְּדֵי גְאֻלָּתוֹ
  chosen: sufficient means for his redemption
  alternatives:
  - enough for its redemption
  - what is sufficient for his redemption
  - the amount needed for his redemption
  lexicon: HALOT
  rationale: כְּדֵי denotes sufficiency/what is enough, and גְאֻלָּתוֹ means 'his
    redemption' or 'his right of redemption' in this property context. 'Sufficient
    means for his redemption' communicates the legal-economic sense clearly.
