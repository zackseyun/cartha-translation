id: LEV.25.9
reference: Leviticus 25:9
source:
  edition: WLC
  text: וְ/הַֽעֲבַרְתָּ֞ שׁוֹפַ֤ר תְּרוּעָה֙ בַּ/חֹ֣דֶשׁ הַ/שְּׁבִעִ֔י בֶּ/עָשׂ֖וֹר
    לַ/חֹ֑דֶשׁ בְּ/יוֹם֙ הַ/כִּפֻּרִ֔ים תַּעֲבִ֥ירוּ שׁוֹפָ֖ר בְּ/כָל אַרְצְ/כֶֽם־׃
translation:
  text: Then you shall sound a trumpet blast in the seventh month, on the tenth day
    of the month. On the Day of Atonement you shall sound the trumpet throughout all
    your land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''shofar''; that is, a horn trumpet, traditionally often understood
      as a ram''s horn.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Day of Atonement' is literally 'day of atonements' (plural).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲבַרְתָּ
  chosen: Then you shall sound
  alternatives:
  - and you shall cause to pass
  - and you shall make resound
  lexicon: HALOT
  rationale: The Hiphil of עבר literally means 'cause to pass,' but with שׁוֹפָר it
    idiomatically refers to causing the horn's sound to go forth, hence 'sound.' 'Then'
    captures the sequential waw in natural English.
- source_word: שׁוֹפַר
  chosen: trumpet
  alternatives:
  - ram's horn
  - shofar
  lexicon: HALOT
  rationale: Shofar is a horn instrument, often specifically a ram's horn. 'Trumpet'
    is the most natural accessible English rendering in context, while the more specific
    alternatives are preserved as lexical possibilities.
- source_word: תְּרוּעָה
  chosen: blast
  alternatives:
  - shout
  - loud signal
  - alarm
  lexicon: HALOT
  rationale: Here תְּרוּעָה modifies שׁוֹפַר and refers to the sounding produced by
    it. 'Blast' fits the instrumental context better than 'shout,' while retaining
    the force of a loud signal.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in' is the natural English preposition
    for the Hebrew ב here.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: The idiom literally means 'on the tenth of the month.' Expanding to 'tenth
    day of the month' is clear modern English without adding meaning.
- source_word: בְּיוֹם הַכִּפֻּרִים
  chosen: On the Day of Atonement
  alternatives:
  - on the day of atonements
  - on the day of expiation
  lexicon: HALOT
  rationale: Though כippurim is morphologically plural, the established sense is the
    cultic holy day known in English as 'the Day of Atonement.' This best communicates
    the referent in idiomatic English.
- source_word: תַּעֲבִירוּ
  chosen: you shall sound
  alternatives:
  - you shall cause to sound
  - you shall make resound
  lexicon: HALOT
  rationale: Same verb as earlier in the verse, now plural. English can keep the idiomatic
    sense 'sound' rather than the more wooden 'cause to pass.'
- source_word: שׁוֹפָר
  chosen: the trumpet
  alternatives:
  - a trumpet
  - the shofar
  lexicon: HALOT
  rationale: The repeated noun refers back to the same instrument type already introduced.
    'The trumpet' gives natural anaphoric force in English.
- source_word: בְּכָל אַרְצְכֶם
  chosen: throughout all your land
  alternatives:
  - in all your land
  - throughout your whole land
  lexicon: HALOT
  rationale: The phrase indicates comprehensive extent across the Israelites' territory.
    'Throughout all your land' conveys the distributive force clearly.
