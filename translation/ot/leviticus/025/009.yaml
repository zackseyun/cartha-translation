theological_decisions:
- issue: Rendering of יוֹם הַכִּפֻּרִים
  chosen_reading: On the Day of Atonement
  alternative_readings:
  - on the day of atonements
  - on the day of expiation
  rationale: The Hebrew plural form is retained semantically in the traditional cultic
    designation rather than woodenly reproduced. This is not a doctrinally contested
    term in the provided table, but the established referent should be communicated
    clearly without obscuring the Hebrew form's nuance, which is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §6
