id: LEV.25.35
reference: Leviticus 25:35
source:
  edition: WLC
  text: וְ/כִֽי יָמ֣וּךְ אָחִ֔י/ךָ וּ/מָ֥טָה יָד֖/וֹ עִמָּ֑/ךְ וְ/הֶֽחֱזַ֣קְתָּ בּ֔/וֹ
    גֵּ֧ר וְ/תוֹשָׁ֛ב וָ/חַ֖י עִמָּֽ/ךְ־׃
translation:
  text: If your brother becomes poor and his hand falters beside you, then you shall
    support him—as a resident foreigner or a temporary resident—so that he may live
    beside you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'support him—the resident foreigner and the temporary resident'; the
      Hebrew phrase 'resident foreigner and temporary resident' is syntactically compressed
      and may be understood differently.
    reason: alternative_reading
  - marker: b
    text: Literally, 'his hand falters with you,' an idiom for losing means or becoming
      unable to support himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: If
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case law scenario. 'If' is the clearest modern
    English rendering; the prefixed conjunction need not be represented with a separate
    'and' in English.
- source_word: יָמוּךְ
  chosen: becomes poor
  alternatives:
  - becomes impoverished
  - grows weak
  lexicon: HALOT
  rationale: The verb denotes becoming low or reduced in circumstances, here in an
    economic context. 'Becomes poor' communicates the financial decline naturally
    in English.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: Literally 'your brother.' In Leviticus this often refers to a fellow
    member of the covenant community. Per translation philosophy, the gendered familial
    term is retained rather than generalized.
- source_word: וּמָטָה יָדוֹ עִמָּךְ
  chosen: and his hand falters beside you
  alternatives:
  - and his means fail with you
  - and he becomes unable to support himself among you
  - and his hand slips with you
  lexicon: HALOT
  rationale: The idiom 'his hand falters' refers to loss of means or capacity. 'Falter'
    preserves the metaphor while remaining intelligible. 'Beside you' reflects עִמָּךְ
    spatially/socially rather than paraphrasing too far.
- source_word: וְהֶחֱזַקְתָּ בּוֹ
  chosen: then you shall support him
  alternatives:
  - you shall strengthen him
  - you shall uphold him
  - you shall sustain him
  lexicon: HALOT
  rationale: Hiphil of חזק here means to take hold of or support someone in need.
    'Support him' best fits the economic-social context and idiomatic English.
- source_word: גֵּר
  chosen: resident foreigner
  alternatives:
  - sojourner
  - alien
  - foreigner
  lexicon: HALOT
  rationale: Refers to a non-native residing within Israelite society. 'Resident foreigner'
    is clear modern English and preserves the legal-social nuance better than the
    archaic 'sojourner'.
- source_word: וְתוֹשָׁב
  chosen: temporary resident
  alternatives:
  - settler
  - lodger
  - sojourner
  lexicon: HALOT
  rationale: Denotes a resident of lesser or temporary status. 'Temporary resident'
    distinguishes it from גֵּר while remaining readable.
- source_word: גֵּר וְתוֹשָׁב
  chosen: as a resident foreigner or a temporary resident
  alternatives:
  - whether a resident foreigner or a temporary resident
  - like a resident foreigner and a temporary resident
  lexicon: HALOT
  rationale: 'The phrase is syntactically compressed and has been understood in two
    main ways: either identifying the needy brother with protected resident classes,
    or commanding support for such classes as well. Rendering it adverbially with
    ''as'' best fits the immediate syntax with ''support him'' while preserving the
    comparison. ''Or'' avoids overstating whether the pair is hendiadys or two distinct
    categories.'
- source_word: וָחַי
  chosen: so that he may live
  alternatives:
  - and he shall live
  - that he may live
  lexicon: HALOT
  rationale: Expresses the intended result of the commanded support. 'So that he may
    live' makes the purpose/result relation explicit in natural English.
- source_word: עִמָּךְ
  chosen: beside you
  alternatives:
  - with you
  - among you
  lexicon: HALOT
  rationale: The repeated preposition frames the needy person as remaining in the
    community. 'Beside you' preserves the relational-spatial sense and echoes the
    earlier phrase.
