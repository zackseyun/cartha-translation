theological_decisions:
- issue: Scope of 'your brother'
  chosen_reading: Retain the literal familial term 'your brother' while understanding
    it contextually as a fellow member of the covenant community.
  alternative_readings:
  - your fellow Israelite
  - your kin
  rationale: The verse addresses intra-community economic responsibility. The translation
    keeps the source's kinship language rather than replacing it with an interpretive
    paraphrase.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Function of 'resident foreigner and temporary resident'
  chosen_reading: 'Render as a comparative/appositional phrase modifying how the poor
    brother is to be supported: ''as a resident foreigner or a temporary resident.'''
  alternative_readings:
  - 'Take the phrase as an additional object: ''support him, the resident foreigner
    and the temporary resident'''
  - 'Take it as a hendiadys: ''as a resident alien'''
  rationale: The Hebrew is compressed and somewhat ambiguous. The chosen rendering
    follows the most natural connection to 'support him' without importing a broader
    object list into the main text. Alternatives are preserved in a footnote to maintain
    transparency.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
