id: LEV.25.42
reference: Leviticus 25:42
source:
  edition: WLC
  text: כִּֽי עֲבָדַ֣/י הֵ֔ם אֲשֶׁר הוֹצֵ֥אתִי אֹתָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם לֹ֥א יִמָּכְר֖וּ
    מִמְכֶּ֥רֶת עָֽבֶד־־׃
translation:
  text: For they are my slaves, whom I brought out from the land of Egypt; they shall
    not be sold as a slave is sold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my servants.' The Hebrew עֲבָדַי can be rendered either way, but 'slaves'
      is used here because the verse emphasizes ownership and prohibits sale as ordinary
      slave property.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they shall not be sold with the sale of a slave,' that is, not
      in the manner of an ordinary slave transaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding law. 'For' fits natural English
    while preserving the explanatory force.
- source_word: עֲבָדַי
  chosen: my slaves
  alternatives:
  - my servants
  lexicon: HALOT
  rationale: 'From עֶבֶד with 1cs suffix. In this context the bonded status is central:
    Israelites belong to YHWH and therefore may not be treated as chattel by fellow
    Israelites. Following the project''s guidance on bonded terms, ''slaves'' better
    preserves the force than the softer ''servants''.'
- source_word: הֵם
  chosen: they are
  alternatives:
  - they
  lexicon: HALOT
  rationale: 'Explicit pronoun plus implied copula gives emphasis: ''they are my slaves.''
    English supplies the copula.'
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to persons; 'whom' is the most precise formal
    rendering in this clause.
- source_word: הוֹצֵאתִי
  chosen: I brought out
  alternatives:
  - I led out
  lexicon: HALOT
  rationale: Standard exodus idiom for divine deliverance from Egypt. 'Brought out'
    is idiomatic and preserves the covenant-redemptive wording.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Conventional and accurate rendering of the geographic phrase. 'From the
    land of Egypt' reads smoothly after 'brought out.'
- source_word: לֹא יִמָּכְרוּ
  chosen: they shall not be sold
  alternatives:
  - they must not be sold
  lexicon: HALOT
  rationale: Niphal imperfect in legal context expresses prohibition/passive result.
    'Shall not be sold' preserves the legal register of the holiness code.
- source_word: מִמְכֶּרֶת עָבֶד
  chosen: as a slave is sold
  alternatives:
  - in a slave sale
  - with the sale of a slave
  - as chattel
  lexicon: HALOT
  rationale: The phrase denotes the manner or kind of sale characteristic of a slave
    transaction. 'As a slave is sold' communicates the prohibition against treating
    an Israelite as ordinary slave property, while remaining close to the Hebrew.
