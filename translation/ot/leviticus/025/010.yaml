id: LEV.25.10
reference: Leviticus 25:10
source:
  edition: WLC
  text: וְ/קִדַּשְׁתֶּ֗ם אֵ֣ת שְׁנַ֤ת הַ/חֲמִשִּׁים֙ שָׁנָ֔ה וּ/קְרָאתֶ֥ם דְּר֛וֹר
    בָּ/אָ֖רֶץ לְ/כָל יֹשְׁבֶ֑י/הָ יוֹבֵ֥ל הִוא֙ תִּהְיֶ֣ה לָ/כֶ֔ם וְ/שַׁבְתֶּ֗ם אִ֚ישׁ
    אֶל אֲחֻזָּת֔/וֹ וְ/אִ֥ישׁ אֶל מִשְׁפַּחְתּ֖/וֹ תָּשֻֽׁבוּ־־־׃
translation:
  text: And you shall consecrate the fiftieth year, and proclaim liberty in the land
    to all its inhabitants. It shall be a jubilee for you, and each man shall return
    to his property, and each man shall return to his family.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'release' or 'freedom' for 'liberty' (Hebrew dror). The term refers to
      a formal proclamation of release in the Jubilee year.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man.' The masculine singular is distributive here, referring
      to each individual Israelite in the legal setting.
    reason: cultural_note
  - marker: c
    text: Or 'to his possession'; the Hebrew refers especially to an inherited property
      holding.
    reason: lexical_alternative
  - marker: d
    text: Or 'to his clan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתֶּם
  chosen: you shall consecrate
  alternatives:
  - you shall sanctify
  - you shall set apart as holy
  lexicon: HALOT
  rationale: קדשׁ in the Piel commonly means to consecrate or set apart as holy. 'Consecrate'
    is natural modern English and preserves the cultic sense better than the more
    archaic 'sanctify'.
- source_word: שְׁנַת הַחֲמִשִּׁים שָׁנָה
  chosen: the fiftieth year
  alternatives:
  - year fifty
  - the year of fifty
  lexicon: HALOT
  rationale: This construct phrase idiomatically means 'the fiftieth year.' English
    smooths the Hebrew number construction without loss of meaning.
- source_word: וּקְרָאתֶם דְּרוֹר
  chosen: and proclaim liberty
  alternatives:
  - and proclaim release
  - and proclaim freedom
  lexicon: HALOT
  rationale: דרור denotes a release/liberty proclamation, especially in the Jubilee
    context involving emancipation and restoration. 'Liberty' is the traditional and
    semantically strong rendering here; 'release' is possible but narrower.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - throughout the land
  - in the הארץ
  lexicon: HALOT
  rationale: The preposition and noun straightforwardly mean 'in the land.' Although
    English tradition often has 'throughout the land,' the Hebrew preposition ב primarily
    indicates location; the broader scope is already conveyed by 'to all its inhabitants.'
- source_word: לְכָל יֹשְׁבֶיהָ
  chosen: to all its inhabitants
  alternatives:
  - for all who dwell in it
  - to all who live in it
  lexicon: HALOT
  rationale: The participial form from ישׁב with suffix means 'its inhabitants' or
    'those dwelling in it.' 'Inhabitants' is concise and idiomatic.
- source_word: יוֹבֵל הִוא תִּהְיֶה לָכֶם
  chosen: It shall be a jubilee for you
  alternatives:
  - It shall be a ram's horn blast for you
  - It shall be a Jubilee for you
  lexicon: HALOT
  rationale: In Leviticus 25 יוֹבֵל functions as the technical term for the Jubilee
    year, not merely the horn associated with its announcement. Lowercase 'jubilee'
    treats it as a common noun designation rather than a fixed proper name.
- source_word: וְשַׁבְתֶּם ... תָּשֻׁבוּ
  chosen: shall return ... shall return
  alternatives:
  - shall go back ... shall go back
  - shall turn back ... shall turn back
  lexicon: HALOT
  rationale: The repeated שוב is intentionally echoed in Hebrew. Rendering both with
    'return' preserves the repetition and the restoration theme.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew singular איש is gendered in form but distributive in force.
    Per the project's gender-accurate policy, 'each man' best matches the source form
    and representative sense; a more inclusive paraphrase would flatten the Hebrew
    wording.
- source_word: אֶל אֲחֻזָּתוֹ
  chosen: to his property
  alternatives:
  - to his possession
  - to his holding
  - to his hereditary property
  lexicon: HALOT
  rationale: אֲחֻזָּה refers to a landed possession or property holding, especially
    inherited family land. 'Property' is clear modern English; 'possession' is possible
    but less natural, while 'hereditary property' is more interpretive than the immediate
    context requires.
- source_word: אֶל מִשְׁפַּחְתּוֹ
  chosen: to his family
  alternatives:
  - to his clan
  - to his kin-group
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can mean family or clan. 'Family' is the most accessible
    English rendering; 'clan' is possible but can sound anthropological and may over-specify
    the social unit in English.
