theological_decisions:
- issue: Rendering of distributive איש in a legal text
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The verse uses masculine singular איש distributively. Following the doctrine's
    gender-accurate policy, the translation preserves the source's masculine representative
    form rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Technical sense of יוֹבֵל
  chosen_reading: jubilee
  alternative_readings:
  - ram's horn
  - Jubilee
  rationale: In this context the term denotes the special fiftieth-year institution
    rather than only the horn. The common noun 'jubilee' communicates the institution
    clearly without importing later theological claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
