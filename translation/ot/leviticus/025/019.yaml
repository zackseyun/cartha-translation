id: LEV.25.19
reference: Leviticus 25:19
source:
  edition: WLC
  text: וְ/נָתְנָ֤ה הָ/אָ֨רֶץ֙ פִּרְיָ֔/הּ וַ/אֲכַלְתֶּ֖ם לָ/שֹׂ֑בַע וִֽ/ישַׁבְתֶּ֥ם
    לָ/בֶ֖טַח עָלֶֽי/הָ׃
translation:
  text: The land will yield its fruit, and you will eat your fill and live securely
    on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwell in safety on it.' The Hebrew verb can be rendered 'live' or 'dwell,'
      and the phrase emphasizes secure habitation in the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנָה
  chosen: will yield
  alternatives:
  - will give
  - shall produce
  lexicon: HALOT
  rationale: From נתן ('to give'), with the land as subject. In English, 'yield' naturally
    expresses agricultural production while preserving the sense that the land gives
    forth produce.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Leviticus 25 the referent is specifically the promised land and its
    agricultural productivity, so 'the land' is more contextually precise than 'the
    earth'.
- source_word: פִּרְיָהּ
  chosen: its fruit
  alternatives:
  - its produce
  - its yield
  lexicon: HALOT
  rationale: פְּרִי literally means 'fruit' and commonly extends to agricultural produce.
    'Its fruit' keeps the concrete Hebrew image while remaining idiomatic.
- source_word: וַאֲכַלְתֶּם
  chosen: and you will eat
  alternatives:
  - and you shall eat
  lexicon: HALOT
  rationale: Straightforward rendering of אכל in the second person plural. 'Will'
    fits readable modern English.
- source_word: לָשֹׂבַע
  chosen: your fill
  alternatives:
  - to satisfaction
  - until satisfied
  - in plenty
  lexicon: HALOT
  rationale: The noun שֹׂבַע denotes fullness/satiety. 'Eat your fill' is idiomatic
    English that conveys eating to satisfaction without over-paraphrasing.
- source_word: וִישַׁבְתֶּם
  chosen: and live
  alternatives:
  - and dwell
  - and sit
  lexicon: HALOT
  rationale: ישב often means 'dwell' or 'live' in a place. 'Live' is smoother in English
    here, especially with the following phrase 'on it,' while still conveying settled
    habitation.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: בֶּטַח denotes security/safety. 'Securely' communicates settled safety
    and pairs naturally with 'live'.
- source_word: עָלֶיהָ
  chosen: on it
  alternatives:
  - upon it
  - in it
  lexicon: HALOT
  rationale: Refers back to the feminine noun 'land.' 'On it' is the most direct rendering
    in English for dwelling upon the land.
