theological_decisions:
- issue: Rendering slavery terminology in a legal text
  chosen_reading: Use 'slave' rather than 'servant' for עֶבֶד/אָמָה in this verse.
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse explicitly concerns persons bought from surrounding nations;
    the bonded, owned status is central to the legal meaning. This aligns with the
    project's principle of using 'slave' where the bonded nature is salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Force of the imperfect תִּקְנוּ in context
  chosen_reading: Render as permissive 'you may buy.'
  alternative_readings:
  - you shall buy
  - you can buy
  rationale: Within the surrounding legislation, the verse permits acquisition from
    the nations rather than commanding purchase. 'May buy' best preserves that legal
    nuance in English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
