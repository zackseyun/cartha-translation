id: LEV.25.44
reference: Leviticus 25:44
source:
  edition: WLC
  text: וְ/עַבְדְּ/ךָ֥ וַ/אֲמָתְ/ךָ֖ אֲשֶׁ֣ר יִהְיוּ לָ֑/ךְ מֵ/אֵ֣ת הַ/גּוֹיִ֗ם אֲשֶׁר֙
    סְבִיבֹ֣תֵי/כֶ֔ם מֵ/הֶ֥ם תִּקְנ֖וּ עֶ֥בֶד וְ/אָמָֽה־׃
translation:
  text: As for your male slave and your female slave who may belong to you, from the
    nations that are around you, from them you may buy a male slave and a female slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your slave and your female servant'; Hebrew distinguishes male and female
      terms here, and the main text uses 'slave' because purchase and ownership are
      explicit in the context.
    reason: lexical_alternative
  - marker: b
    text: '''Nations'' refers to the non-Israelite peoples around Israel; alternatively,
      ''from among the peoples around you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  chosen: your male slave
  alternatives:
  - your slave
  - your servant
  lexicon: HALOT
  rationale: עֶבֶד commonly denotes a slave/servant in a range of statuses. In this
    legal context of acquisition by purchase, the bonded nature is explicit, so 'slave'
    is preferable to 'servant.' 'Male' is supplied to distinguish it from the paired
    feminine term that follows.
- source_word: אֲמָתְךָ
  chosen: your female slave
  alternatives:
  - your slave-girl
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: אָמָה is the feminine counterpart in this context. 'Female slave' is
    clear modern English and preserves the gender distinction without archaic tone.
- source_word: אֲשֶׁר יִהְיוּ לָךְ
  chosen: who may belong to you
  alternatives:
  - who shall be yours
  - who are to belong to you
  - who may be yours
  lexicon: HALOT
  rationale: The clause describes slaves that come to be in the addressee's possession.
    'May belong to you' captures the legal-possessive sense in readable English without
    overstating futurity.
- source_word: מֵאֵת הַגּוֹיִם
  chosen: from the nations
  alternatives:
  - from the Gentiles
  - from the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding non-Israelite nations. 'Nations' is
    the most natural and least theologically loaded rendering in this Torah legal
    setting; 'Gentiles' would sound anachronistically New Testament-coded.
- source_word: אֲשֶׁר סְבִיבֹתֵיכֶם
  chosen: that are around you
  alternatives:
  - that surround you
  - around you
  lexicon: HALOT
  rationale: This relative clause identifies the neighboring peoples. 'That are around
    you' is straightforward modern English and preserves the spatial sense.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - from among them
  lexicon: HALOT
  rationale: The preposition plus pronoun points back to the surrounding nations as
    the source from which slaves may be acquired. 'From them' is direct and sufficient.
- source_word: תִּקְנוּ
  chosen: you may buy
  alternatives:
  - you shall buy
  - you may acquire
  - you can purchase
  lexicon: HALOT
  rationale: קנה means buy/acquire. In this legal permission context, 'may buy' fits
    the verse's function better than an imperative-sounding 'shall buy.'
- source_word: עֶבֶד וְאָמָה
  chosen: a male slave and a female slave
  alternatives:
  - slaves, male and female
  - a slave and a slave-girl
  lexicon: HALOT
  rationale: The singular pair is distributive/generic, specifying both sexes. Rendering
    both explicitly preserves the Hebrew distinction and avoids flattening the legal
    categories.
