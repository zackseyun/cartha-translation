theological_decisions:
- issue: Rendering the holiness language of the Jubilee year
  chosen_reading: it shall be holy to you
  alternative_readings:
  - it shall be sacred to you
  - it shall be set apart for you
  rationale: The verse assigns covenantal holiness to the Jubilee year itself in relation
    to Israel's observance. 'Holy' preserves the theological weight of קֹדֶשׁ without
    reducing it to merely ceremonial or civic specialness.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
