id: LEV.25.12
reference: Leviticus 25:12
source:
  edition: WLC
  text: כִּ֚י יוֹבֵ֣ל הִ֔וא קֹ֖דֶשׁ תִּהְיֶ֣ה לָ/כֶ֑ם מִן הַ֨/שָּׂדֶ֔ה תֹּאכְל֖וּ
    אֶת תְּבוּאָתָֽ/הּ־־׃
translation:
  text: For it is a jubilee; it shall be holy to you. From the field you shall eat
    its produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its yield' or 'its crops.' The Hebrew term refers to what the field
      brings forth.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding instruction. 'For' fits the
    explanatory force in context better than the more causal-sounding 'because' in
    English.
- source_word: יוֹבֵל
  chosen: jubilee
  alternatives:
  - ram's horn
  - Jubilee
  lexicon: HALOT
  rationale: In Leviticus 25 the term denotes the special fiftieth year, not the instrument
    from which the term historically derives. Lowercase 'jubilee' treats it as a common
    noun rather than a formal title.
- source_word: קֹדֶשׁ תִּהְיֶה לָכֶם
  chosen: it shall be holy to you
  alternatives:
  - it shall be sacred to you
  - it shall be set apart for you
  lexicon: HALOT
  rationale: קֹדֶשׁ conveys holiness/set-apartness. 'Holy' preserves the covenantal-religious
    force better than the more generic 'sacred,' while remaining natural English.
- source_word: מִן הַשָּׂדֶה
  chosen: From the field
  alternatives:
  - Out of the field
  - From the open country
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. It emphasizes
    that food is to be taken directly from what the land yields, not from normal organized
    harvesting and storage.
- source_word: תֹּאכְלוּ
  chosen: you shall eat
  alternatives:
  - you may eat
  - you are to eat
  lexicon: HALOT
  rationale: The imperfect here functions instructionally/futurally in legal material.
    'You shall eat' matches the legal style and the verse's prescriptive tone.
- source_word: תְּבוּאָתָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its increase
  - its crops
  lexicon: HALOT
  rationale: Refers to what the land/field brings forth. 'Produce' is idiomatic modern
    English and broad enough to cover spontaneous agricultural yield in the Jubilee
    year.
