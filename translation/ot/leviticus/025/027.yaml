id: LEV.25.27
reference: Leviticus 25:27
source:
  edition: WLC
  text: וְ/חִשַּׁב֙ אֶת שְׁנֵ֣י מִמְכָּר֔/וֹ וְ/הֵשִׁיב֙ אֶת הָ֣/עֹדֵ֔ף לָ/אִ֖ישׁ
    אֲשֶׁ֣ר מָֽכַר ל֑/וֹ וְ/שָׁ֖ב לַ/אֲחֻזָּתֽ/וֹ־־־׃
translation:
  text: then he shall calculate the years since its sale and return the surplus to
    the man to whom he sold it, and he shall return to his property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remainder' or 'the excess.' The Hebrew refers to the amount left
      over after calculating the value of the unused years.
    reason: lexical_alternative
  - marker: b
    text: '''His property'' refers to his landed possession, likely his hereditary
      holding within Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: וְחִשַּׁב
  chosen: then he shall calculate
  alternatives:
  - and he shall calculate
  - then he shall reckon
  lexicon: HALOT
  rationale: The verb חשׁב here denotes calculating or reckoning the redemption price.
    'Calculate' is clear modern English; 'then' reflects the procedural sequence in
    context.
- source_word: שְׁנֵי מִמְכָּרוֹ
  chosen: the years since its sale
  alternatives:
  - the years of its sale
  - the years from its sale
  lexicon: HALOT
  rationale: Literally 'the years of his/its sale.' In context of land redemption,
    this refers to the number of years elapsed from the sale, used to compute repayment.
    'Its sale' refers to the field/property sold in the surrounding context.
- source_word: וְהֵשִׁיב
  chosen: return
  alternatives:
  - repay
  - restore
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause to return, i.e., repay or restore.
    'Return' preserves the lexical connection with the later ושׁב ('he shall return')
    while remaining natural in English.
- source_word: הָעֹדֵף
  chosen: the surplus
  alternatives:
  - the remainder
  - the excess
  lexicon: HALOT
  rationale: The participial form from עודף denotes what remains over, the excess
    amount after calculation. 'Surplus' fits the financial context of redemption.
- source_word: לָאִישׁ אֲשֶׁר מָכַר לוֹ
  chosen: to the man to whom he sold it
  alternatives:
  - to the man to whom he sold
  - to the buyer
  lexicon: HALOT
  rationale: Literally 'to the man whom he sold to him.' The sense is the purchaser.
    'To whom he sold it' makes the English syntax clear while preserving the personal
    reference 'the man' rather than reducing it to an abstract 'buyer.'
- source_word: וְשָׁב
  chosen: and he shall return
  alternatives:
  - and he may return
  - and he shall go back
  lexicon: HALOT
  rationale: Qal of שוב here indicates the seller's return upon redemption. 'Shall
    return' matches the legal register and the sequence of actions.
- source_word: לַאֲחֻזָּתוֹ
  chosen: to his property
  alternatives:
  - to his possession
  - to his hereditary property
  lexicon: HALOT
  rationale: אֲחֻזָּה in Leviticus often denotes landed property or hereditary holding.
    'Property' is readable modern English; 'hereditary property' is more explicit
    but heavier than the immediate verse requires.
