theological_decisions:
- issue: Nature of אֲחֻזָּה in Jubilee legislation
  chosen_reading: property
  alternative_readings:
  - possession
  - hereditary property
  rationale: The term refers not merely to generic property but to an ancestral landholding
    within Israel's covenantal land structure. The main text uses 'property' for readability,
    while the lexical rationale notes the hereditary nuance so as not to flatten the
    legal-theological background.
