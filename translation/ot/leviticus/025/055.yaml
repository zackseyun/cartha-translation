id: LEV.25.55
reference: Leviticus 25:55
source:
  edition: WLC
  text: כִּֽי לִ֤/י בְנֵֽי יִשְׂרָאֵל֙ עֲבָדִ֔ים עֲבָדַ֣/י הֵ֔ם אֲשֶׁר הוֹצֵ֥אתִי אוֹתָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־־־׃
translation:
  text: For the sons of Israel are my servants; they are my servants, whom I brought out of the land of Egypt. I am Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the children of Israel.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my servants.' The Hebrew term denotes bonded service; 'slaves' is used here because the verse emphasizes Israel's belonging to the LORD rather than to human masters.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding legislation. 'For' preserves the explanatory force in natural English.
- source_word: לִי
  chosen: my
  alternatives:
  - to me
  - belong to me
  lexicon: HALOT
  rationale: The preposition plus pronoun expresses possession/belonging. Rendering with possessive 'my' is concise and idiomatic when paired with 'slaves.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the familial/corporate idiom of the Hebrew while remaining clear. This follows the gender-accurate principle rather than flattening to a neutral collective in the main text.
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  lexicon: HALOT
  rationale: The noun denotes bonded service. In this context the ownership/belonging contrast is central to the Jubilee laws, so 'slaves' better preserves the force than the softer 'servants,' in line with the project's treatment of bonded-status terms.
- source_word: עֲבָדַי
  chosen: my slaves
  alternatives:
  - my servants
  lexicon: HALOT
  rationale: 'The repeated noun with 1cs suffix is emphatic: Israel belongs to YHWH. Repeating ''my slaves'' preserves the Hebrew emphasis and covenantal claim.'
- source_word: אֲשֶׁר הוֹצֵאתִי אוֹתָם
  chosen: whom I brought out
  alternatives:
  - that I brought out
  - whom I led out
  lexicon: HALOT
  rationale: '''Brought out'' is the standard and natural rendering of יצא in the Hiphil for the exodus motif, preserving the redemptive-historical language.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  lexicon: HALOT
  rationale: Pairs naturally with 'brought out' and preserves the stock exodus formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenant formula; straightforward possessive rendering best reflects the Hebrew.
