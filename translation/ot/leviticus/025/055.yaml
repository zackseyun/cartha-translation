theological_decisions:
- issue: Rendering עבד in a context of covenantal belonging and anti-chattel legislation
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: Although English 'slave' can evoke later race-based chattel systems, the verse's logic depends on Israel's exclusive belonging to YHWH as the reason they may not be permanently reduced to another Israelite's possession. 'Slaves' better preserves the bonded-status contrast and theological force than 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος analogously favoring 'slave' where bonded nature is salient
- issue: Gendered corporate expression בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a conventional corporate expression. Per the gender-accurate principle, the translation preserves the source form rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
