id: LEV.25.32
reference: Leviticus 25:32
source:
  edition: WLC
  text: וְ/עָרֵי֙ הַ/לְוִיִּ֔ם בָּתֵּ֖י עָרֵ֣י אֲחֻזָּתָ֑/ם גְּאֻלַּ֥ת עוֹלָ֖ם תִּהְיֶ֥ה
    לַ/לְוִיִּֽם׃
translation:
  text: As for the cities of the Levites, the houses in the cities of their possession
    may be redeemed permanently by the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'a perpetual right of redemption shall be for the Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עָרֵי
  chosen: As for the cities
  alternatives:
  - And the cities
  - Now the cities
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a new case within the larger legal
    discussion. 'As for the cities' brings out the topical shift naturally in English
    while preserving the referential force of 'and/cities'.
- source_word: הַ/לְוִיִּם
  chosen: of the Levites
  alternatives:
  - belonging to the Levites
  lexicon: HALOT
  rationale: Construct relationship with עָרֵי indicates possession/association. 'Of
    the Levites' is concise and natural.
- source_word: בָּתֵּי
  chosen: the houses
  alternatives:
  - houses
  lexicon: HALOT
  rationale: 'In construct with the following phrase, this specifies the subject matter
    of the redemption rule: the houses located in those cities.'
- source_word: עָרֵי אֲחֻזָּתָם
  chosen: in the cities of their possession
  alternatives:
  - in the cities of their property
  - in the cities of their hereditary possession
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes landed holding/possession, often with hereditary nuance.
    'Possession' preserves the legal sense without overloading the English. The preposition
    'in' is supplied idiomatically because 'houses of the cities of their possession'
    is awkward in English but reflects location within those cities.
- source_word: גְּאֻלַּת
  chosen: may be redeemed
  alternatives:
  - redemption
  - a right of redemption
  lexicon: HALOT
  rationale: The noun 'redemption' with the following verb 'shall be' forms an idiom
    expressing an enduring right or possibility of redemption. Rendering it verbally
    as 'may be redeemed' communicates the legal force in clear English.
- source_word: עוֹלָם
  chosen: permanently
  alternatives:
  - forever
  - for all time
  - in perpetuity
  lexicon: HALOT
  rationale: In legal context עוֹלָם indicates enduring or perpetual status rather
    than metaphysical infinity. 'Permanently' is readable modern English and fits
    the statute's legal character.
- source_word: תִּהְיֶה
  chosen: may be
  alternatives:
  - shall be
  - is
  lexicon: HALOT
  rationale: The imperfect here states legal provision. 'May be' expresses permitted/available
    redemption in idiomatic English; 'shall be' is possible but can sound stilted
    or overly mandatory in modern English.
- source_word: לַ/לְוִיִּם
  chosen: by the Levites
  alternatives:
  - for the Levites
  - to the Levites
  lexicon: HALOT
  rationale: The lamed marks the party to whom the perpetual redemption right belongs.
    In English legal sense, 'by the Levites' best conveys that they are the ones entitled
    to redeem these houses.
