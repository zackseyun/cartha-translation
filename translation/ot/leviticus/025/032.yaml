theological_decisions:
- issue: Legal force of the redemption clause for Levitical houses
  chosen_reading: The verse grants the Levites an ongoing right to redeem houses in
    their cities.
  alternative_readings:
  - The verse states abstractly that 'perpetual redemption' belongs to the Levites.
  - The verse could be rendered more formally as 'a perpetual right of redemption
    shall be for the Levites.'
  rationale: This is primarily a legal/lexical issue rather than a doctrinal one.
    The Hebrew nominal clause גְּאֻלַּת עוֹלָם תִּהְיֶה לַלְוִיִּם is most naturally
    understood as establishing a continuing redemption right for Levites regarding
    houses in their cities. The main text renders that force in natural English while
    preserving the more formal alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §5, §6
