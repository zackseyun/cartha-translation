id: LEV.25.2
reference: Leviticus 25:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם כִּ֤י תָבֹ֨אוּ֙ אֶל הָ/אָ֔רֶץ אֲשֶׁ֥ר אֲנִ֖י נֹתֵ֣ן לָ/כֶ֑ם וְ/שָׁבְתָ֣ה הָ/אָ֔רֶץ שַׁבָּ֖ת לַ/יהוָֽה־־׃
translation:
  text: Speak to the sons of Israel and say to them, ‘When you come into the land that I am giving to you, then the land shall observe a Sabbath to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the land shall rest a Sabbath for the LORD.' The Hebrew personifies the land as observing sabbath rest.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Address
  lexicon: HALOT
  rationale: Piel imperative of דבר, introducing direct divine instruction to Moses. 'Speak' is the standard and suitably direct rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate policy, the familial expression is preserved rather than flattened to 'Israelites,' though that is a natural English alternative.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Straightforward continuation of the command sequence; 'say to them' preserves the formal cadence of legal instruction.
- source_word: כִּי תָבֹאוּ
  chosen: When you come
  alternatives:
  - If you come
  - For when you enter
  lexicon: HALOT
  rationale: Here כִּי introduces a temporal clause in legal material; 'when' best fits the expected future circumstance rather than a mere condition.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With בוא plus אֶל, English idiom favors 'come into the land,' expressing entry into the promised land.
- source_word: אֲשֶׁר אֲנִי נֹתֵן לָכֶם
  chosen: that I am giving to you
  alternatives:
  - that I give you
  - which I am giving you
  lexicon: HALOT
  rationale: The participle נֹתֵן conveys ongoing or imminent divine giving. 'I am giving to you' preserves that aspect more clearly than a simple present.
- source_word: וְשָׁבְתָה הָאָרֶץ
  chosen: then the land shall keep
  alternatives:
  - then the land shall rest
  - and the land shall cease
  lexicon: HALOT
  rationale: From שבת, here the land is personified as observing sabbatical rest. 'Keep' works well with the following noun 'Sabbath' and preserves the covenantal observance nuance better than merely 'rest.'
- source_word: שַׁבָּת
  chosen: a Sabbath
  alternatives:
  - a sabbath-rest
  - a sabbath
  lexicon: HALOT
  rationale: The noun denotes sabbath observance/rest. Capitalizing 'Sabbath' signals the covenantal institution rather than generic rest.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here can be rendered 'to' or 'for'; 'to the LORD' preserves the Hebrew form and the sense of dedication.
