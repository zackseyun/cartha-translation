id: LEV.25.21
reference: Leviticus 25:21
source:
  edition: WLC
  text: וְ/צִוִּ֤יתִי אֶת בִּרְכָתִ/י֙ לָ/כֶ֔ם בַּ/שָּׁנָ֖ה הַ/שִּׁשִּׁ֑ית וְ/עָשָׂת֙
    אֶת הַ/תְּבוּאָ֔ה לִ/שְׁלֹ֖שׁ הַ/שָּׁנִֽים־־׃
translation:
  text: Then I will command my blessing for you in the sixth year, and it will produce
    the crop for three years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the produce' or 'the yield' for 'the crop.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוִּיתִי
  chosen: Then I will command
  alternatives:
  - and I will command
  - I will appoint
  lexicon: HALOT
  rationale: צוה in the first person singular denotes issuing a command or decree.
    'Command' preserves the force of divine authorization over the blessing. 'Then'
    brings out the conjunction's discourse function in context, where this verse answers
    the anticipated question of v. 20.
- source_word: בִּרְכָתִי
  chosen: my blessing
  alternatives:
  - my blessing [of fertility/prosperity]
  lexicon: HALOT
  rationale: ברכה here refers to Yahweh's bestowed favor resulting in agricultural
    abundance. 'My blessing' is the most direct and sufficiently broad rendering,
    allowing the following clause to specify its concrete effect.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - upon you
  - to you
  lexicon: HALOT
  rationale: The preposition ל marks the beneficiaries of the blessing. 'For you'
    is idiomatic English and fits the benefactive sense.
- source_word: בַּשָּׁנָה הַשִּׁשִּׁית
  chosen: in the sixth year
  alternatives:
  - during the sixth year
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In the sixth year' is natural English
    and preserves the timing of the promised blessing relative to the sabbatical cycle.
- source_word: וְעָשָׂת
  chosen: and it will produce
  alternatives:
  - and it will yield
  - and it will make
  lexicon: HALOT
  rationale: The feminine singular verb agrees with the following feminine noun in
    sense, referring to the year/land's productive result through the blessing. In
    English, rendering the implied subject as 'it' is necessary. 'Produce' communicates
    agricultural output more naturally than the overly literal 'make.'
- source_word: הַתְּבוּאָה
  chosen: the crop
  alternatives:
  - the produce
  - the yield
  lexicon: HALOT
  rationale: תבואה denotes produce, especially agricultural yield. 'The crop' is clear
    modern English; 'produce' is possible but can sound less specific in contemporary
    usage.
- source_word: לִשְׁלֹשׁ הַשָּׁנִים
  chosen: for three years
  alternatives:
  - for the three years
  - sufficient for three years
  lexicon: HALOT
  rationale: The phrase indicates duration or sufficiency of the harvest's provision.
    'For three years' is concise and faithful. 'Sufficient for three years' is interpretively
    accurate in context but adds an explanatory nuance not explicit in the Hebrew.
