id: LEV.25.4
reference: Leviticus 25:4
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָ֣ה הַ/שְּׁבִיעִ֗ת שַׁבַּ֤ת שַׁבָּתוֹן֙ יִהְיֶ֣ה לָ/אָ֔רֶץ שַׁבָּ֖ת
    לַ/יהוָ֑ה שָֽׂדְ/ךָ֙ לֹ֣א תִזְרָ֔ע וְ/כַרְמְ/ךָ֖ לֹ֥א תִזְמֹֽר׃
translation:
  text: But in the seventh year there shall be a sabbath of complete rest for the
    land, a sabbath to the LORD. You shall not sow your field, and you shall not prune
    your vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Sabbath of solemn rest.' The Hebrew expression intensifies the idea
      of complete cessation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה הַשְּׁבִיעִת
  chosen: But in the seventh year
  alternatives:
  - And in the seventh year
  - In the seventh year
  lexicon: HALOT
  rationale: The prefixed conjunction ו can be rendered 'and' or, in context, 'but.'
    Since v. 3 permits sowing and pruning for six years, this verse introduces a contrast
    for the seventh year; 'But in the seventh year' best reflects the discourse flow
    in natural English.
- source_word: שַׁבַּת שַׁבָּתוֹן
  chosen: a sabbath of complete rest
  alternatives:
  - a Sabbath of solemn rest
  - a complete Sabbath rest
  lexicon: HALOT
  rationale: The collocation intensifies the idea of cessation/rest. 'A sabbath of
    complete rest' preserves both the sabbath concept and the emphatic noun שַׁבָּתוֹן
    without sounding overly archaic. Capitalization is avoided because the referent
    is the sabbatical character of the year/land, not necessarily the weekly day as
    a proper name.
- source_word: יִהְיֶה לָאָרֶץ
  chosen: there shall be ... for the land
  alternatives:
  - it shall be for the land
  - the land shall have
  lexicon: HALOT
  rationale: The Hebrew states literally that such a sabbath-rest 'shall be for the
    land.' English idiom is improved by fronting the existential construction while
    retaining the land as beneficiary/subject of the rest.
- source_word: שַׁבָּת לַיהוָה
  chosen: a sabbath to the LORD
  alternatives:
  - a sabbath for the LORD
  - a sabbath of the LORD
  lexicon: HALOT
  rationale: The phrase marks the rest as consecrated to YHWH. 'To the LORD' is a
    natural rendering that preserves the directional/dedicatory force of ל. The divine
    name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD,' following established
    reverential convention and the project's stated default.
- source_word: שָׂדְךָ לֹא תִזְרָע
  chosen: You shall not sow your field
  alternatives:
  - You must not sow your field
  lexicon: HALOT
  rationale: Second masculine singular is rendered with generic legal 'you shall not,'
    standard in English law-like instruction. 'Sow' is the direct agricultural equivalent
    of זרע in this context.
- source_word: וְכַרְמְךָ לֹא תִזְמֹר
  chosen: and you shall not prune your vineyard
  alternatives:
  - nor shall you prune your vineyard
  - and your vineyard you shall not trim
  lexicon: HALOT
  rationale: זמר in vineyard context means 'prune.' 'Vineyard' is the normal rendering
    of כֶּרֶם. Repeating 'you shall not' mirrors the Hebrew prohibition structure
    clearly in English.
