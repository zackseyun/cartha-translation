id: LEV.25.51
reference: Leviticus 25:51
source:
  edition: WLC
  text: אִם ע֥וֹד רַבּ֖וֹת בַּ/שָּׁנִ֑ים לְ/פִי/הֶן֙ יָשִׁ֣יב גְּאֻלָּת֔/וֹ מִ/כֶּ֖סֶף
    מִקְנָתֽ/וֹ־׃
translation:
  text: If many years still remain, in proportion to them he shall repay his redemption
    price from the money of his purchase.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall pay back his redemption'—the Hebrew noun can denote the act
      of redemption, but here likely refers to the amount to be repaid for redemption.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - But if
  lexicon: HALOT
  rationale: Standard conditional particle introducing the case distinction in this
    law.
- source_word: עוֹד רַבּוֹת בַּשָּׁנִים
  chosen: many years still remain
  alternatives:
  - there are still many years
  - many years are yet left
  lexicon: HALOT
  rationale: Combines the adverb עוֹד ('still, yet') with רַבּוֹת ('many') and בַּשָּׁנִים
    ('in the years'). English idiom is smoother with 'remain' supplied, which is implied
    by the construction.
- source_word: לְפִיהֶן
  chosen: in proportion to them
  alternatives:
  - according to them
  - in accordance with them
  lexicon: HALOT
  rationale: Literally 'according to their mouth,' an idiom meaning 'according to/in
    proportion to' the number of years just mentioned.
- source_word: יָשִׁיב
  chosen: he shall repay
  alternatives:
  - he shall return
  - he shall pay back
  lexicon: HALOT
  rationale: Hiphil of שוב here has the sense of causing to return, i.e., repaying
    or refunding. 'Repay' fits the financial/legal context of redemption.
- source_word: גְּאֻלָּתוֹ
  chosen: his redemption price
  alternatives:
  - his redemption
  - the price of his redemption
  lexicon: HALOT
  rationale: In this context of calculating release from indenture, the noun refers
    concretely to the amount required for redemption, not merely the abstract act.
    'Redemption price' makes the legal-economic sense explicit.
- source_word: מִכֶּסֶף מִקְנָתוֹ
  chosen: from the money of his purchase
  alternatives:
  - from the purchase money
  - out of the money for which he was bought
  lexicon: HALOT
  rationale: Literally 'from the silver/money of his purchase.' This refers to the
    original purchase amount from which the proportional repayment is calculated.
    'Money of his purchase' stays close to the Hebrew while remaining readable.
