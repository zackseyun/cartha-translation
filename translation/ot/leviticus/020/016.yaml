theological_decisions:
- issue: Rendering a severe legal prohibition involving bestiality
  chosen_reading: 'Translate the legal sanction directly and without euphemistic softening:
    ''If a woman approaches any animal to mate with it... They shall surely be put
    to death.'''
  alternative_readings:
  - Use more euphemistic language such as 'lies with' or 'has relations with'
  - Use more literal but potentially opaque wording such as 'for it to be mounted
    by her'
  rationale: The verse is legal and penal in nature. Optimal equivalence here requires
    preserving both the gravity and the clarity of the prohibition without importing
    extra moral commentary beyond the text. The wording chosen is explicit enough
    for modern readers while remaining close to the Hebrew structure and force.
  doctrine_reference: Translation philosophy §§1, 5, 6
