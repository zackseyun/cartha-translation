id: LEV.20.16
reference: Leviticus 20:16
source:
  edition: WLC
  text: וְ/אִשָּׁ֗ה אֲשֶׁ֨ר תִּקְרַ֤ב אֶל כָּל בְּהֵמָה֙ לְ/רִבְעָ֣ה אֹתָ֔/הּ וְ/הָרַגְתָּ֥
    אֶת הָ/אִשָּׁ֖ה וְ/אֶת הַ/בְּהֵמָ֑ה מ֥וֹת יוּמָ֖תוּ דְּמֵי/הֶ֥ם בָּֽ/ם־־־־׃
translation:
  text: If a woman approaches any animal to mate with it, you shall kill the woman
    and the animal. They shall surely be put to death; their blood is on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to lie with it.' The Hebrew verb specifically refers to sexual intercourse,
      literally involving mounting.
    reason: lexical_alternative
  - marker: b
    text: Or 'their bloodguilt is upon them.' The idiom means responsibility for their
      death rests on themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְרַב
  chosen: approaches
  alternatives:
  - comes near
  - draws near
  lexicon: HALOT
  rationale: The verb קרב literally means 'come near/approach.' 'Approaches' preserves
    the concrete movement while fitting the legal style in English. The sexual purpose
    is then specified by the following infinitive, so the verb itself should not be
    overtranslated as 'has intercourse with.'
- source_word: בְּהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: בְּהֵמָה is a broad term for beast/animal. 'Animal' is clear modern English
    and avoids the archaic tone of 'beast,' while still covering the generic scope
    indicated by כָּל ('any/every').
- source_word: לְרִבְעָה אֹתָהּ
  chosen: to mate with it
  alternatives:
  - to lie with it
  - for it to be mounted
  - to have sexual relations with it
  lexicon: HALOT
  rationale: The infinitive from רבע in this context refers specifically to bestial
    sexual intercourse, literally involving mounting. 'To mate with it' is concise,
    intelligible, and communicates the sexual act without euphemistic obscurity. 'Lie
    with it' is possible but less transparent to modern readers; 'have sexual relations
    with it' is accurate but more expansive than the Hebrew phrasing.
- source_word: וְהָרַגְתָּ
  chosen: you shall kill
  alternatives:
  - you must kill
  - then you shall kill
  lexicon: HALOT
  rationale: In legal material the qatal with vav can carry directive force. 'You
    shall kill' preserves the formal legal register and mirrors common covenant-law
    English without becoming archaic.
- source_word: מוֹת יוּמָתוּ
  chosen: They shall surely be put to death
  alternatives:
  - They must certainly be put to death
  - They shall be put to death
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the death penalty
    formula. 'Surely be put to death' preserves that emphasis better than a flat 'shall
    be put to death.' The passive also reflects the conventional legal execution formula.
- source_word: דְּמֵיהֶם בָּם
  chosen: their blood is on them
  alternatives:
  - their bloodguilt is upon them
  - their blood is upon them
  lexicon: HALOT
  rationale: This idiom assigns responsibility for the death to the offenders themselves.
    'Their blood is on them' is a natural English rendering that preserves the legal-moral
    force. 'Bloodguilt' is interpretive and more technical than the Hebrew wording
    requires.
