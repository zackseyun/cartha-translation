id: LEV.20.11
reference: Leviticus 20:11
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֤ר יִשְׁכַּב֙ אֶת אֵ֣שֶׁת אָבִ֔י/ו עֶרְוַ֥ת אָבִ֖י/ו גִּלָּ֑ה
    מֽוֹת יוּמְת֥וּ שְׁנֵי/הֶ֖ם דְּמֵי/הֶ֥ם בָּֽ/ם־־׃
translation:
  text: If a man lies with his father's wife, he has uncovered his father's nakedness;
    both of them shall surely be put to death; their blood is on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'he has dishonored his father sexually.' The Hebrew
      literally reads, 'he has uncovered his father's nakedness,' a fixed idiom in
      Leviticus for a prohibited sexual violation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their blood is on them,' a legal formula indicating that responsibility
      for their death rests on themselves.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ
  chosen: If a man
  alternatives:
  - And a man
  - A man
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a casuistic law case. In English,
    'If a man' best conveys the conditional legal formulation naturally, while preserving
    the masculine singular 'man' in keeping with the gender-accurate policy.
- source_word: אֲשֶׁר
  chosen: If
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: 'Though formally a relative particle, in this legal context with וְאִישׁ
    it functions idiomatically to introduce the condition: ''If a man...'' rather
    than the less natural ''And a man who...''.'
- source_word: יִשְׁכַּב אֶת
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: The idiom שׁכב with a direct object in sexual-law contexts denotes sexual
    intercourse. 'Lies with' is both accurate and suitably formal without becoming
    euphemistically vague or overly clinical.
- source_word: אֵשֶׁת אָבִיו
  chosen: his father's wife
  alternatives:
  - the wife of his father
  - his stepmother
  lexicon: HALOT
  rationale: The Hebrew says literally 'his father's wife.' 'Stepmother' may often
    be the referent, but it is narrower and imports a kinship label not used in the
    text. The more literal rendering preserves the legal wording.
- source_word: עֶרְוַת אָבִיו גִּלָּה
  chosen: he has uncovered his father's nakedness
  alternatives:
  - he has exposed his father's nakedness
  - he has dishonored his father sexually
  lexicon: HALOT
  rationale: This is a fixed Levitical idiom for illicit sexual exposure/violation.
    'Uncovered ... nakedness' preserves the canonical idiom and its intertextual connection
    to Leviticus 18 and 20. The perfect is rendered 'has uncovered' to reflect the
    completed offense stated as the ground for judgment.
- source_word: מוֹת יוּמְתוּ
  chosen: shall surely be put to death
  alternatives:
  - must surely be put to death
  - shall certainly be executed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the penalty. 'Shall
    surely be put to death' preserves both the legal register and the emphatic force
    without over-specifying the method of execution.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The explicit pronoun is retained for clarity and emphasis that the penalty
    applies to both participants.
- source_word: דְּמֵיהֶם בָּם
  chosen: their blood is on them
  alternatives:
  - their bloodguilt is upon them
  - their blood is upon themselves
  lexicon: HALOT
  rationale: This legal formula assigns responsibility for the death penalty to the
    offenders themselves. 'Their blood is on them' is a clear, established English
    rendering that preserves the idiomatic force.
