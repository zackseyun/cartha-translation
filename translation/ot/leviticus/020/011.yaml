theological_decisions:
- issue: Rendering the sexual-law idiom without flattening its canonical and moral
    force
  chosen_reading: he has uncovered his father's nakedness
  alternative_readings:
  - he has dishonored his father sexually
  rationale: The text uses a stock holiness-code expression, not merely a generic
    statement of sexual misconduct. Preserving the idiom maintains intertextual links
    and avoids importing a narrower or more interpretive paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Gendered legal subject
  chosen_reading: If a man
  alternative_readings:
  - If anyone
  rationale: The Hebrew is grammatically masculine singular and in this law addresses
    a male offender specifically. Per the gender-accurate policy, the translation
    keeps 'man' rather than neutralizing the subject.
  doctrine_reference: Translation philosophy §4
