id: LEV.20.18
reference: Leviticus 20:18
source:
  edition: WLC
  text: וְ֠/אִישׁ אֲשֶׁר יִשְׁכַּ֨ב אֶת אִשָּׁ֜ה דָּוָ֗ה וְ/גִלָּ֤ה אֶת עֶרְוָתָ/הּ֙
    אֶת מְקֹרָ֣/הּ הֶֽעֱרָ֔ה וְ/הִ֕יא גִּלְּתָ֖ה אֶת מְק֣וֹר דָּמֶ֑י/הָ וְ/נִכְרְת֥וּ
    שְׁנֵי/הֶ֖ם מִ/קֶּ֥רֶב עַמָּֽ/ם־־־־־׃
translation:
  text: If a man lies with a woman during her menstrual impurity and uncovers her
    nakedness—he has exposed the flow of her blood, and she has uncovered the flow
    of her blood—both of them shall be cut off from among their people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'while she is menstruating.' The Hebrew term also carries the sense
      of ritual impurity associated with menstruation in Leviticus.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he has laid bare her source, and she has uncovered the source
      of her blood.' 'Source' is a Hebrew euphemism for the bodily flow.
    reason: lexical_alternative
  - marker: c
    text: '''Shall be cut off'' is a standard legal formula in the Torah; the text
      does not specify here how that removal is carried out.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Gender-accurate rendering fits the masculine singular legal formulation
    and the sexual context; the law addresses a male participant specifically.
- source_word: יִשְׁכַּב אֶת אִשָּׁה
  chosen: lies with a woman
  alternatives:
  - has sexual relations with a woman
  - sleeps with a woman
  lexicon: HALOT
  rationale: Hebrew idiom for sexual intercourse. 'Lies with' preserves the legal-register
    idiom without becoming euphemistically vague or overly clinical.
- source_word: דָּוָה
  chosen: during her menstrual impurity
  alternatives:
  - while she is menstruating
  - in her sickness/impurity
  lexicon: HALOT
  rationale: The adjective denotes a menstruant woman in a state of ritual impurity.
    'Menstrual impurity' makes the cultic dimension explicit, which is important in
    Levitical context.
- source_word: גִלָּה אֶת עֶרְוָתָהּ
  chosen: uncovers her nakedness
  alternatives:
  - reveals her nakedness
  - has sexual intercourse with her
  lexicon: HALOT
  rationale: This is a standard Levitical idiom for illicit sexual exposure/intercourse.
    'Uncovers her nakedness' preserves the idiom and its intertextual consistency
    in Leviticus.
- source_word: מְקֹרָהּ הֶעֱרָה
  chosen: he has exposed the flow of her blood
  alternatives:
  - he has laid bare her source
  - he has bared her fountain
  lexicon: HALOT
  rationale: מָקוֹר literally means 'source/spring/fountain,' here a euphemistic reference
    to the menstrual flow/source of blood. 'Flow of her blood' communicates the sense
    clearly in modern English while retaining the bodily imagery.
- source_word: וְהִיא גִּלְּתָה אֶת מְקוֹר דָּמֶיהָ
  chosen: and she has uncovered the flow of her blood
  alternatives:
  - and she has revealed the source of her blood
  - and she has exposed her blood flow
  lexicon: HALOT
  rationale: Parallel clause describing the woman's participation. Matching 'uncovered'
    with the previous idiom preserves the Hebrew symmetry; 'flow of her blood' clarifies
    the euphemism.
- source_word: וְנִכְרְתוּ
  chosen: shall be cut off
  alternatives:
  - must be cut off
  - shall be excluded
  lexicon: HALOT
  rationale: Standard covenantal/judicial formula in the Pentateuch. 'Cut off' is
    the established and sufficiently transparent rendering; its precise mode is left
    unspecified by the Hebrew and should not be overinterpreted in translation.
- source_word: מִקֶּרֶב עַמָּם
  chosen: from among their people
  alternatives:
  - from the midst of their people
  - from their community
  lexicon: HALOT
  rationale: Preserves the communal-covenantal setting of the penalty formula in natural
    English.
