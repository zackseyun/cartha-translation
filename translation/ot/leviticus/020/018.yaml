theological_decisions:
- issue: Nature of the woman's condition in דָּוָה
  chosen_reading: Rendered as 'menstrual impurity' to reflect ritual status rather
    than mere illness.
  alternative_readings:
  - '''menstruating'''
  - '''sick/unclean'''
  rationale: In Levitical law the concern is specifically menstruation as a source
    of ritual impurity, not generic sickness. The translation makes that cultic context
    explicit without adding extra interpretation beyond the legal setting.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of 'cut off' penalty
  chosen_reading: Retained the formal phrase 'shall be cut off' without specifying
    death, excommunication, or childlessness.
  alternative_readings:
  - executed
  - excluded from the community
  - die childless
  rationale: The Hebrew formula does not itself define the mechanism here. Preserving
    the ambiguity avoids importing a disputed doctrinal or legal conclusion into the
    main text.
  doctrine_reference: Translation philosophy §3
