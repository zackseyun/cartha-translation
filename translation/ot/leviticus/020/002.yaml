id: LEV.20.2
reference: Leviticus 20:2
source:
  edition: WLC
  text: וְ/אֶל בְּנֵ֣י יִשְׂרָאֵ֘ל תֹּאמַר֒ אִ֣ישׁ אִישׁ֩ מִ/בְּנֵ֨י יִשְׂרָאֵ֜ל וּ/מִן
    הַ/גֵּ֣ר הַ/גָּ֣ר בְּ/יִשְׂרָאֵ֗ל אֲשֶׁ֨ר יִתֵּ֧ן מִ/זַּרְע֛/וֹ לַ/מֹּ֖לֶךְ מ֣וֹת
    יוּמָ֑ת עַ֥ם הָ/אָ֖רֶץ יִרְגְּמֻ֥/הוּ בָ/אָֽבֶן־־׀׃
translation:
  text: 'And you shall say to the sons of Israel: Any man from the sons of Israel,
    or from the sojourner who sojourns in Israel, who gives any of his offspring to
    Molech shall surely be put to death; the people of the land shall stone him with
    stones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the resident foreigner who resides in Israel.'' The Hebrew uses a
      noun and cognate verb: ''the sojourner who sojourns.'''
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' translates a Hebrew word literally meaning ''seed,'' here
      referring to one''s descendants or children.'
    reason: lexical_alternative
  - marker: c
    text: Molech may refer to a deity traditionally associated with child sacrifice;
      some interpreters understand the term as referring instead to a type of offering.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew expression
    and its gender-accurate wording, in line with the project's preference not to
    neutralize masculine representative language without cause. 'Israelites' is possible
    but slightly smooths over the underlying idiom.
- source_word: אִישׁ אִישׁ
  chosen: Any man
  alternatives:
  - Each man
  - Whoever
  lexicon: HALOT
  rationale: The doubled noun is an idiomatic distributive expression meaning 'any
    man' or 'each man.' 'Any man' preserves the singular masculine force while reading
    naturally in English.
- source_word: הַגֵּר הַגָּר
  chosen: the sojourner who sojourns
  alternatives:
  - the stranger residing
  - the resident foreigner who resides
  lexicon: HALOT
  rationale: Used 'sojourner' to reflect גֵּר as a resident alien/foreigner living
    among Israel, and retained the cognate verbal force in 'who sojourns' for transparency
    to the Hebrew. More idiomatic alternatives are possible, but this keeps the lexical
    connection visible.
- source_word: יִתֵּן מִזַּרְעוֹ לַמֹּלֶךְ
  chosen: gives any of his offspring to Molech
  alternatives:
  - gives some of his seed to Molech
  - gives one of his children to Molech
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed/offspring.' In this context it refers to
    one's descendants/children. 'Offspring' preserves the lexical breadth without
    over-specifying a single child, while 'to Molech' follows the likely reference
    to the deity/title named Molech.
- source_word: לַמֹּלֶךְ
  chosen: to Molech
  alternatives:
  - to the Molech
  - as a molek-offering
  lexicon: HALOT
  rationale: Rendered as the proper name/title 'Molech,' the standard understanding
    in this legal context. Some scholars connect the term with a type of offering
    rather than a deity, but the traditional proper-name reading remains the most
    straightforward here.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - shall surely die
  - must be put to death
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the penalty. 'Shall
    surely be put to death' captures both the emphasis and the judicial/passive sense
    better than the less explicit 'shall surely die.'
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the common people
  lexicon: HALOT
  rationale: Rendered literally here. In this legal setting it refers to the people
    of the land/community who carry out the sentence, not necessarily a technical
    later sociological class.
- source_word: יִרְגְּמֻהוּ בָאָבֶן
  chosen: shall stone him with stones
  alternatives:
  - shall stone him
  - shall pelt him with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with stone,' and the plural sense is
    often conveyed idiomatically in English as 'stone him.' I retained 'with stones'
    to preserve the concrete instrument and the solemn legal force.
