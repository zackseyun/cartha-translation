theological_decisions:
- issue: Meaning of Molech-related child offering
  chosen_reading: The verse prohibits giving one's offspring to Molech, understood
    as a grave cultic act involving child sacrifice or dedication associated with
    Molech.
  alternative_readings:
  - The term may refer to a specific type of offering rather than a deity.
  rationale: The translation does not import a full explanatory paraphrase such as
    'sacrifice his child in the fire,' since those details are not stated in this
    verse itself, though they are associated with the broader biblical context. The
    main text therefore stays close to the Hebrew while preserving the main lexical
    referent 'Molech.'
