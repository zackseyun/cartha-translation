theological_decisions:
- issue: Rendering Israel's covenant holiness language without reducing it to either purely moral purity or merely ritual distinctness
  chosen_reading: Use 'holy' and 'separated' together in the verse
  alternative_readings:
  - Render קדש exclusively as 'set apart' throughout
  - Render the verse in more moralized language such as 'pure'
  rationale: The verse itself grounds Israel's holiness in the LORD's holiness and then adds a distinct verb, בדל, for separation from the peoples. Rendering קדש as 'holy' and בדל as 'separated' preserves the theological tension and lexical distinction present in the Hebrew.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
