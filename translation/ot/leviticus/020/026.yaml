id: LEV.20.26
reference: Leviticus 20:26
source:
  edition: WLC
  text: וִ/הְיִ֤יתֶם לִ/י֙ קְדֹשִׁ֔ים כִּ֥י קָד֖וֹשׁ אֲנִ֣י יְהוָ֑ה וָ/אַבְדִּ֥ל אֶתְ/כֶ֛ם מִן הָֽ/עַמִּ֖ים לִ/הְי֥וֹת לִֽ/י־׃
translation:
  text: You shall be holy to me, because I, Yahweh, am holy, and I have separated you from the peoples to be mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the nations.' The Hebrew עַמִּים can mean 'peoples' or, in some contexts, 'nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִהְיִיתֶם
  chosen: You shall be
  alternatives:
  - and you shall be
  - you must be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this legal/paraenetic context functions with future/resultative force. 'You shall be' preserves the covenantal imperative/result nuance without over-paraphrasing. The conjunction is not separately represented in English because smooth modern English does not require 'and' here.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - mine
  lexicon: HALOT
  rationale: The preposition ל with first-person suffix expresses relation/belonging. 'To me' keeps the Hebrew wording closely here; the final לִי is rendered differently as 'mine' for idiomatic English in that clause.
- source_word: קְדֹשִׁים
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: HALOT
  rationale: קדוש in Leviticus carries both moral and cultic separation. 'Holy' is the established and most theologically adequate English equivalent; 'set apart' captures part of the sense but is too narrow if used alone.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the ground for Israel's holiness. 'Because' is clearer in modern English than 'for' while preserving the causal force.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: Applied to the LORD, 'holy' is the standard and most theologically weighty rendering, preserving the connection with Israel's required holiness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וָאַבְדִּל
  chosen: I have separated
  alternatives:
  - I separated
  - I set apart
  - I distinguished
  lexicon: HALOT
  rationale: בדל means to separate/divide/set apart. 'I have separated' conveys the completed divine action with present covenantal relevance. 'Set apart' would overlap heavily with 'holy' and risk obscuring the lexical distinction between קדש and בדל.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct object marker plus suffix; naturally rendered as the English object 'you'.
- source_word: מִן הָעַמִּים
  chosen: from the peoples
  alternatives:
  - from the nations
  - from the other peoples
  lexicon: HALOT
  rationale: עמים is broader than specifically geopolitical 'nations' and often means peoples/groups. 'The peoples' best preserves the plural collective contrast with Israel. 'Other' is implied by context but not explicit in the Hebrew, so it is omitted from the main text.
- source_word: לִהְיוֹת לִי
  chosen: to be mine
  alternatives:
  - to belong to me
  - to be for me
  lexicon: HALOT
  rationale: Infinitive plus לִי expresses purpose/result of divine separation. 'To be mine' is concise, idiomatic, and preserves covenantal possession language.
