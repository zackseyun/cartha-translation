theological_decisions:
- issue: Retention of the sexual-infidelity metaphor for idolatry
  chosen_reading: Render זנה with 'prostitute themselves' rather than flattening to
    'are unfaithful' or 'commit idolatry.'
  alternative_readings:
  - are unfaithful
  - commit idolatry
  rationale: The Hebrew intentionally uses sexually charged covenant language to portray
    idolatry as spiritual infidelity. Preserving the metaphor maintains the theological
    and rhetorical force without importing additional doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of 'cut off' in covenant judgment
  chosen_reading: Preserve 'cut off' as the main text without specifying the mechanism
    of punishment.
  alternative_readings:
  - put to death
  - exclude from the community
  - destroy
  rationale: The text states divine covenant judgment but does not explicitly define
    the exact mechanism here. Preserving 'cut off' maintains the theological tension
    and avoids over-resolving whether the result is death, childlessness, or expulsion.
  doctrine_reference: Translation philosophy §3
