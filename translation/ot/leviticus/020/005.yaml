id: LEV.20.5
reference: Leviticus 20:5
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֨י אֲנִ֧י אֶת פָּנַ֛/י בָּ/אִ֥ישׁ הַ/ה֖וּא וּ/בְ/מִשְׁפַּחְתּ֑/וֹ
    וְ/הִכְרַתִּ֨י אֹת֜/וֹ וְ/אֵ֣ת כָּל הַ/זֹּנִ֣ים אַחֲרָ֗י/ו לִ/זְנ֛וֹת אַחֲרֵ֥י
    הַ/מֹּ֖לֶךְ מִ/קֶּ֥רֶב עַמָּֽ/ם־׀־׃
translation:
  text: then I myself will set my face against that man and against his family, and
    I will cut off him and all who prostitute themselves after him by prostituting
    themselves after Molech, from among their people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'play the prostitute after him.' The Hebrew uses the verb for sexual
      unfaithfulness metaphorically for idolatrous apostasy.
    reason: lexical_alternative
  - marker: b
    text: '''Cut off'' is a covenant-judgment expression; the text does not specify
      here whether this occurs by death, expulsion, or another form of divine removal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי אֲנִי אֶת־פָּנַי
  chosen: then I myself will set my face
  alternatives:
  - and I will set my face
  - I myself will turn my face
  lexicon: HALOT
  rationale: The idiom שׂוּם + פָּנִים means to direct oneself in opposition or attention
    toward someone. 'Set my face against' is a clear, established English equivalent
    that preserves the covenant-judgment force. אֲנִי is represented by 'I myself'
    for emphasis.
- source_word: בָּאִישׁ הַהוּא
  chosen: against that man
  alternatives:
  - against that האיש/person
  - against that one
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' Per gender-accurate policy, 'man'
    is retained rather than neutralizing to 'person,' since the Hebrew is grammatically
    masculine and refers to the individual offender.
- source_word: וּבְמִשְׁפַּחְתּוֹ
  chosen: and against his family
  alternatives:
  - and against his clan
  - and against his household
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can mean family, clan, or extended kin group. 'Family' is
    the most natural modern English choice here while still broad enough to include
    the household/kinship unit implicated by the context.
- source_word: וְהִכְרַתִּי אֹתוֹ
  chosen: and I will cut off him
  alternatives:
  - and I will cut him off
  - and I will eliminate him
  lexicon: HALOT
  rationale: כרת in the Hiphil in covenant-law contexts commonly means 'cut off,'
    often implying removal from the covenant community by divine judgment. The idiom
    is preserved rather than paraphrased.
- source_word: וְאֵת כָּל־הַזֹּנִים אַחֲרָיו
  chosen: and all who prostitute themselves after him
  alternatives:
  - and all who play the prostitute after him
  - and all who whore after him
  - and all who go astray after him
  lexicon: HALOT
  rationale: זנה is the standard metaphor for covenantal unfaithfulness/idolatry.
    'Prostitute themselves' preserves the sexualized metaphor without archaic phrasing.
    אַחֲרָיו is rendered 'after him,' indicating those who follow his example.
- source_word: לִזְנוֹת אַחֲרֵי הַמֹּלֶךְ
  chosen: by prostituting themselves after Molech
  alternatives:
  - in prostituting themselves after Molech
  - by playing the prostitute after Molech
  lexicon: HALOT
  rationale: The infinitive לִזְנוֹת expresses the manner/purpose of the following
    behavior. Repeating the prostitution metaphor preserves the Hebrew rhetoric. אַחֲרֵי
    is kept as 'after' to reflect the idiom of following in illicit devotion.
- source_word: הַמֹּלֶךְ
  chosen: Molech
  alternatives:
  - the Molech
  - Milcom
  lexicon: HALOT
  rationale: The form is traditionally understood as the deity/name Molech in this
    context of child sacrifice and idolatry. As a proper name, it is transliterated
    per project policy. The article is not separately represented in English because
    proper names normally omit it.
- source_word: מִקֶּרֶב עַמָּם
  chosen: from among their people
  alternatives:
  - from the midst of their people
  - from among his people
  lexicon: HALOT
  rationale: מִקֶּרֶב is an idiom for removal from the community. The suffix on עַמָּם
    is plural, matching the compound object ('him and all who...'), so 'their people'
    best reflects the Hebrew form.
