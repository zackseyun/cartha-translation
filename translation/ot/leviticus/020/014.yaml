theological_decisions:
- issue: Nature of the relationship implied by 'takes a woman and her mother'
  chosen_reading: Render broadly as 'takes a woman and her mother' rather than specifying
    marriage.
  alternative_readings:
  - marries a woman and her mother
  - takes in marriage a woman and her mother
  rationale: The Hebrew verb לקח can in legal contexts imply marriage, but the text
    itself does not explicitly add a marital term. A broader rendering avoids importing
    a narrower legal definition than the source states while still conveying a prohibited
    sexual/familial union.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the penalty clause
  chosen_reading: 'Translate the Hebrew as an active legal sentence: ''They shall
    burn him and them with fire.'''
  alternative_readings:
  - He and they shall be burned with fire
  rationale: The Hebrew verbal form is active plural, not a passive construction.
    Preserving that form maintains transparency to the source text without adding
    interpretive detail about the agents beyond the legal community implied by the
    law.
  doctrine_reference: Translation philosophy §1, §5
