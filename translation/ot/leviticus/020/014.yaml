id: LEV.20.14
reference: Leviticus 20:14
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֨ר יִקַּ֧ח אֶת אִשָּׁ֛ה וְ/אֶת אִמָּ֖/הּ זִמָּ֣ה הִ֑וא בָּ/אֵ֞שׁ
    יִשְׂרְפ֤וּ אֹת/וֹ֙ וְ/אֶתְ/הֶ֔ן וְ/לֹא תִהְיֶ֥ה זִמָּ֖ה בְּ/תוֹכְ/כֶֽם־־־׃
translation:
  text: If a man takes a woman and her mother, it is depravity. They shall burn him
    and them with fire, so that there will not be depravity among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marries a woman and her mother.' The Hebrew verb 'takes' can imply marriage
      in legal contexts, but the wording does not explicitly specify marriage here.
    reason: lexical_alternative
  - marker: b
    text: '''Them'' refers to the woman and her mother.'
    reason: lexical_alternative
  - marker: c
    text: Or 'wickedness,' 'lewdness,' or 'an outrage' for the Hebrew term describing
      a gross sexual offense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to the offending
    male party in this law. Per the translation philosophy, gender-accurate language
    is preferred over neutralizing it.
- source_word: יִקַּח
  chosen: takes
  alternatives:
  - marries
  - takes in marriage
  lexicon: HALOT
  rationale: לקח literally means 'take.' In this legal-sexual context it can imply
    taking as wife or entering a sexual union, but the text does not explicitly say
    'marry.' 'Takes' preserves the Hebrew wording while allowing the legal/sexual
    sense to be inferred from context.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean either 'woman' or 'wife.' Here the construction with
    לקח could support 'wife,' but because the verse does not explicitly mark marital
    status and because the offense is the union with both woman and her mother, 'woman'
    is the broader and less interpretively loaded choice.
- source_word: אִמָּהּ
  chosen: her mother
  lexicon: HALOT
  rationale: 'Straightforward possessive construction: the mother''s relation is to
    the woman already mentioned.'
- source_word: זִמָּה
  chosen: depravity
  alternatives:
  - wickedness
  - lewdness
  - outrage
  lexicon: HALOT
  rationale: זִמָּה in Levitical sexual legislation denotes a gross moral outrage
    or depraved act. 'Depravity' communicates the severe moral character of the offense
    in readable modern English without sounding euphemistic.
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  - by fire
  lexicon: HALOT
  rationale: The preposition beth here marks means/instrument. 'With fire' is idiomatic
    and preserves the sense of execution by burning.
- source_word: יִשְׂרְפוּ אֹתוֹ וְאֶתְהֶן
  chosen: They shall burn him and them
  alternatives:
  - He and they shall be burned
  - They shall burn him and both of them
  lexicon: HALOT
  rationale: 'The verb is third person plural active with explicit objects: ''they
    shall burn him and them.'' This preserves the active legal formulation of the
    Hebrew. ''Them'' refers to the two women; English does not require the more cumbersome
    ''both of them'' in the main text.'
- source_word: וְלֹא תִהְיֶה זִמָּה בְּתוֹכְכֶם
  chosen: so that there will not be depravity among you
  alternatives:
  - and there shall not be depravity among you
  - so that there may be no depravity in your midst
  lexicon: HALOT
  rationale: The clause expresses the intended result/purpose of the penalty within
    the covenant community. 'Among you' is a natural rendering of בְּתוֹכְכֶם, and
    'so that' makes the logic clear in English.
