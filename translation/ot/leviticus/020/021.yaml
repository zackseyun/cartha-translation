theological_decisions:
- issue: Meaning of the penalty phrase עֲרִירִים יִהְיוּ
  chosen_reading: They shall be childless
  alternative_readings:
  - They shall die without children
  - They shall remain without offspring as a divine judgment
  rationale: The Hebrew adjective itself denotes childlessness rather than explicitly
    stating death. The translation preserves the lexical sense and leaves the mechanism
    of the judgment unstated, avoiding interpretive expansion beyond the text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
