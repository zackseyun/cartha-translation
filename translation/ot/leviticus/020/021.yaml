id: LEV.20.21
reference: Leviticus 20:21
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֥ר יִקַּ֛ח אֶת אֵ֥שֶׁת אָחִ֖י/ו נִדָּ֣ה הִ֑וא עֶרְוַ֥ת אָחִ֛י/ו
    גִּלָּ֖ה עֲרִירִ֥ים יִהְיֽוּ־׃
translation:
  text: And if a man takes his brother’s wife, it is an impurity; he has uncovered
    his brother’s nakedness. They shall be childless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it is uncleanness' / 'it is a defilement.' The Hebrew term can denote
      impurity in a ritual-moral sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'They shall die childless.' The Hebrew more literally says 'They shall
      be childless,' without specifying how this judgment is carried out.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אִישׁ
  chosen: And if a man
  alternatives:
  - And a man
  - If a man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' The prefixed conjunction links to
    the surrounding case laws; 'And if a man' gives natural English while preserving
    the casuistic force.
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: In this legal formulation אֲשֶׁר with the imperfect functions idiomatically
    as a conditional relative clause. English 'if' best captures the sense in smooth
    legal English.
- source_word: יִקַּח
  chosen: takes
  alternatives:
  - marries
  - takes in marriage
  lexicon: HALOT
  rationale: לקח literally means 'take.' In marital contexts it can imply taking as
    wife, but here the object is already 'his brother's wife,' so 'takes' preserves
    the Hebrew wording without over-specifying a formal marriage ceremony.
- source_word: אֵשֶׁת אָחִיו
  chosen: his brother’s wife
  alternatives:
  - the wife of his brother
  lexicon: HALOT
  rationale: Standard construct phrase meaning 'his brother's wife.'
- source_word: נִדָּה הִוא
  chosen: it is an impurity
  alternatives:
  - she is unclean
  - it is uncleanness
  - it is a defilement
  lexicon: HALOT
  rationale: נִדָּה can denote menstrual impurity or, more broadly, a state/object
    of impurity/abhorrence. Here it predicates the union/act, not the woman herself,
    so 'it is an impurity' avoids implying that the woman is being labeled personally
    as unclean and fits the legal context.
- source_word: עֶרְוַת אָחִיו גִּלָּה
  chosen: he has uncovered his brother’s nakedness
  alternatives:
  - he has exposed his brother’s nakedness
  lexicon: HALOT
  rationale: This is the standard idiom for illicit sexual relations in Leviticus.
    'Uncovered ... nakedness' preserves the legal idiom and its intertextual consistency.
- source_word: עֲרִירִים יִהְיוּ
  chosen: They shall be childless
  alternatives:
  - They shall be left childless
  - They shall be barren
  lexicon: HALOT
  rationale: עֲרִירִים denotes being without children. 'Childless' is the most natural
    and concise rendering in English. The plural verb and adjective indicate the couple
    as the subject, hence 'They.'
