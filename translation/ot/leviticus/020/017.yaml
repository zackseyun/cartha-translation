theological_decisions:
- issue: Meaning of חֶסֶד in this verse
  chosen_reading: 'negative sense: ''a disgrace'''
  alternative_readings:
  - '''kindness'' in the older lexical sense, though unsuitable here'
  rationale: Although חֶסֶד often means covenant loyalty or kindness, context and
    usage here require a negative sense referring to a shameful act. Translating positively
    would misrepresent the prohibition.
- issue: Force of 'cut off' penalty
  chosen_reading: retain the formula 'they shall be cut off' without specifying execution
    or excommunication
  alternative_readings:
  - execution
  - childlessness/exclusion
  rationale: The Hebrew formula does not itself define the exact mechanism here. Preserving
    the traditional legal expression maintains the text's ambiguity rather than resolving
    a debated penalty beyond what the source states.
  doctrine_reference: Preserve theological tension rather than resolve it.
