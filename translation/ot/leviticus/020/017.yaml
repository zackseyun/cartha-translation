id: LEV.20.17
reference: Leviticus 20:17
source:
  edition: WLC
  text: וְ/אִ֣ישׁ אֲשֶׁר יִקַּ֣ח אֶת אֲחֹת֡/וֹ בַּת אָבִ֣י/ו א֣וֹ בַת אִ֠מּ/וֹ וְ/רָאָ֨ה
    אֶת עֶרְוָתָ֜/הּ וְ/הִֽיא תִרְאֶ֤ה אֶת עֶרְוָת/וֹ֙ חֶ֣סֶד ה֔וּא וְ/נִ֨כְרְת֔וּ
    לְ/עֵינֵ֖י בְּנֵ֣י עַמָּ֑/ם עֶרְוַ֧ת אֲחֹת֛/וֹ גִּלָּ֖ה עֲוֺנ֥/וֹ יִשָּֽׂא־־־־־־־׃
translation:
  text: If a man takes his sister, his father's daughter or his mother's daughter,
    and he sees her nakedness and she sees his nakedness, it is a disgrace, and they
    shall be cut off in the sight of the sons of their people. He has uncovered his
    sister's nakedness; he shall bear his guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shameful thing' or 'a reproach' for 'a disgrace' (Hebrew חֶסֶד in
      a rare negative sense here, not its usual sense 'kindness' or 'steadfast love').
    reason: lexical_alternative
  - marker: b
    text: '''They shall be cut off'' preserves the Hebrew legal formula without specifying
      whether the penalty is death, expulsion, or another form of removal.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Masculine singular is retained as 'a man' in keeping with the gender-accurate
    policy and the legal formulation of the Hebrew.
- source_word: יִקַּח
  chosen: takes
  alternatives:
  - marries
  - has sexual relations with
  lexicon: HALOT
  rationale: The verb literally means 'takes.' In this legal-sexual context it can
    imply taking sexually or as a wife, but the following clause about seeing nakedness
    specifies the sexual offense, so 'takes' best preserves the Hebrew wording without
    over-specifying.
- source_word: אֲחֹתוֹ בַּת אָבִיו אוֹ בַת אִמּוֹ
  chosen: his sister, his father's daughter or his mother's daughter
  alternatives:
  - his sister, whether his father's daughter or his mother's daughter
  lexicon: HALOT
  rationale: This preserves the appositional clarification in the Hebrew and makes
    explicit that both paternal and maternal half-sisters are included.
- source_word: וְרָאָה אֶת עֶרְוָתָהּ וְהִיא תִרְאֶה אֶת עֶרְוָתוֹ
  chosen: and he sees her nakedness and she sees his nakedness
  alternatives:
  - and he uncovers her nakedness and she uncovers his nakedness
  - and he has sexual relations with her and she with him
  lexicon: HALOT
  rationale: The Hebrew uses 'see nakedness,' an idiom for sexual exposure/intercourse
    in incest legislation. Rendering it literally as 'sees ... nakedness' preserves
    the source imagery and legal idiom, while the context makes the sexual sense clear.
- source_word: חֶסֶד
  chosen: a disgrace
  alternatives:
  - a shameful thing
  - a reproach
  lexicon: HALOT
  rationale: Here חֶסֶד does not carry its common positive sense of covenant loyalty/kindness.
    In this rare legal usage it denotes a shameful or disgraceful act. 'Disgrace'
    is concise, natural English and fits the punitive context.
- source_word: וְנִכְרְתוּ
  chosen: they shall be cut off
  alternatives:
  - they shall be eliminated
  - they shall be excluded
  lexicon: HALOT
  rationale: '''Cut off'' is the established and sufficiently literal rendering for
    כרת in covenant/legal judgment contexts, preserving the ambiguity of the exact
    mode of punishment.'
- source_word: לְעֵינֵי בְּנֵי עַמָּם
  chosen: in the sight of the sons of their people
  alternatives:
  - before the eyes of the people
  - in the sight of their kinsmen
  lexicon: HALOT
  rationale: The phrase is rendered fairly literally. 'Sons of their people' preserves
    the Hebrew familial-social idiom better than the flatter 'people,' while remaining
    understandable.
- source_word: גִּלָּה
  chosen: has uncovered
  alternatives:
  - has exposed
  - has laid bare
  lexicon: HALOT
  rationale: This is the standard idiom in Leviticus for illicit sexual exposure.
    'Has uncovered' preserves the lexical link with surrounding incest laws.
- source_word: עֲוֺנוֹ יִשָּׂא
  chosen: he shall bear his guilt
  alternatives:
  - he shall bear his iniquity
  - he shall bear the punishment for his sin
  lexicon: HALOT
  rationale: This common legal formula can denote bearing guilt and its consequences.
    'Bear his guilt' is clear modern English while preserving the theological-legal
    weight of the Hebrew.
