theological_decisions:
- issue: Meaning of the sanction עֲרִירִים יָמֻתוּ
  chosen_reading: they shall die childless
  alternative_readings:
  - they shall die without children
  - they shall die and remain childless / without surviving offspring
  rationale: The Hebrew does not explicitly specify the mechanism of punishment, only
    the outcome/status. Rendering it 'die childless' preserves the terse legal formula
    and avoids importing a more detailed doctrinal or juridical explanation than the
    text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
