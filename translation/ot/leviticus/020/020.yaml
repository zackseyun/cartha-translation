id: LEV.20.20
reference: Leviticus 20:20
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֤ר יִשְׁכַּב֙ אֶת דֹּ֣דָת֔/וֹ עֶרְוַ֥ת דֹּד֖/וֹ גִּלָּ֑ה חֶטְאָ֥/ם
    יִשָּׂ֖אוּ עֲרִירִ֥ים יָמֻֽתוּ־׃
translation:
  text: If a man lies with his aunt, he has uncovered his uncle’s nakedness. They
    shall bear their sin; they shall die childless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They shall bear their guilt.' The Hebrew idiom can express either sin
      or the liability/guilt borne for it.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his uncle’s nakedness he has uncovered'—a Levitical idiom for
      violating a prohibited sexual kinship bond by lying with the uncle’s wife.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ
  chosen: If a man
  alternatives:
  - And a man
  - If anyone
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' The prefixed conjunction introduces
    another case law; in English, 'If a man' best captures the casuistic force naturally.
    This follows the gender-accurate principle rather than neutralizing to 'anyone.'
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: In this legal formulation, אֲשֶׁר with the imperfect functions conditionally;
    English 'if' communicates the law-case structure more clearly than a more wooden
    'who.'
- source_word: יִשְׁכַּב אֶת
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: שׁכב in this context is the standard idiom for sexual intercourse. 'Lies
    with' preserves the formal idiom while remaining readable modern English.
- source_word: דֹּדָתוֹ
  chosen: his aunt
  alternatives:
  - his uncle's wife
  lexicon: HALOT
  rationale: The noun denotes the wife of one's uncle, i.e., 'aunt.' Since the next
    clause explicitly identifies the relationship through 'his uncle,' 'aunt' is the
    clearest natural English rendering.
- source_word: עֶרְוַת דֹּדוֹ גִּלָּה
  chosen: he has uncovered his uncle’s nakedness
  alternatives:
  - he has exposed his uncle's nakedness
  lexicon: HALOT
  rationale: This is the stock Levitical idiom for illicit sexual exposure/intercourse
    within prohibited kinship relations. Although the act is with the aunt, the text
    states that this uncovers the uncle's nakedness because she belongs to that kinship
    bond. The idiom should be preserved rather than paraphrased away.
- source_word: חֶטְאָם יִשָּׂאוּ
  chosen: They shall bear their sin
  alternatives:
  - They shall bear their guilt
  - They shall carry their sin
  lexicon: HALOT
  rationale: The plural subject and suffix indicate both parties bear culpability.
    חטא can denote sin or guilt; 'bear their sin' is a transparent rendering of the
    Hebrew idiom, with 'guilt' a viable interpretive alternative.
- source_word: עֲרִירִים
  chosen: childless
  alternatives:
  - without children
  - bereft of children
  lexicon: HALOT
  rationale: The adjective denotes being deprived of children/offspring. 'Childless'
    is the standard concise English equivalent.
- source_word: יָמֻתוּ
  chosen: they shall die
  alternatives:
  - they will die
  lexicon: HALOT
  rationale: 'The verb is simple ''die.'' In context with עֲרִירִים, the Hebrew sequence
    is best represented as two linked predicates: ''they shall die childless,'' preserving
    both elements without overexplaining whether childlessness precedes death or characterizes
    their death.'
