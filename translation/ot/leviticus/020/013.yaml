id: LEV.20.13
reference: Leviticus 20:13
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֨ר יִשְׁכַּ֤ב אֶת זָכָר֙ מִשְׁכְּבֵ֣י אִשָּׁ֔ה תּוֹעֵבָ֥ה עָשׂ֖וּ
    שְׁנֵי/הֶ֑ם מ֥וֹת יוּמָ֖תוּ דְּמֵי/הֶ֥ם בָּֽ/ם־׃
translation:
  text: If a man lies with a male as one lies with a woman, both of them have done
    an abomination; they shall surely be put to death; their blood is on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'as the lyings of a woman,' an idiom for sexual intercourse with
      a woman.
    reason: lexical_alternative
  - marker: b
    text: Or 'their bloodguilt is upon them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: If a man
  alternatives:
  - And a man
  - A man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' The prefixed וְ here introduces a
    casuistic law clause naturally rendered in English as 'If a man' rather than wooden
    'And a man.' This preserves the legal conditional sense.
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: 'In this legal formulation אֲשֶׁר with the following verb functions conditionally:
    ''if/whoever.'' English legal style is clearer with ''if'' after the initial noun
    phrase.'
- source_word: יִשְׁכַּב אֶת
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: שׁכב in this context is the standard idiom for sexual intercourse. 'Lies
    with' is both sufficiently formal and transparent, avoiding euphemistic flattening
    while staying close to the Hebrew idiom.
- source_word: זָכָר
  chosen: a male
  alternatives:
  - a man
  lexicon: HALOT
  rationale: זָכָר denotes 'male' rather than the more socially marked אִישׁ ('man').
    Rendering it 'male' preserves the lexical distinction present in the Hebrew.
- source_word: מִשְׁכְּבֵי אִשָּׁה
  chosen: as one lies with a woman
  alternatives:
  - the lyings of a woman
  - as with a woman
  lexicon: HALOT
  rationale: The plural construct phrase is an idiom referring to sexual lying/intercourse
    with a woman. A literal 'lyings of a woman' is unnatural in English; 'as one lies
    with a woman' communicates the idiomatic force while remaining close to the source.
- source_word: תּוֹעֵבָה
  chosen: an abomination
  alternatives:
  - a detestable thing
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a weighty covenantal/moral term often rendered 'abomination.'
    Retaining that term preserves the severity and intertextual consistency of the
    Hebrew Bible.
- source_word: עָשׂוּ שְׁנֵיהֶם
  chosen: both of them have done
  alternatives:
  - the two of them have done
  - both have committed
  lexicon: HALOT
  rationale: The Hebrew explicitly states that both participants have done this act.
    'Both of them have done' preserves the explicit dual emphasis without adding interpretive
    material.
- source_word: מוֹת יוּמָתוּ
  chosen: they shall surely be put to death
  alternatives:
  - they shall certainly be put to death
  - they must be put to death
  lexicon: HALOT
  rationale: The infinitive absolute plus passive/imperfect construction intensifies
    the penalty. 'Shall surely be put to death' is a standard and accurate way to
    convey both the passive and the emphasis.
- source_word: דְּמֵיהֶם בָּם
  chosen: their blood is on them
  alternatives:
  - their bloodguilt is upon them
  - their blood is upon themselves
  lexicon: HALOT
  rationale: This idiom assigns responsibility for the death to the offenders themselves.
    'Their blood is on them' is idiomatic English and preserves the legal-moral force.
