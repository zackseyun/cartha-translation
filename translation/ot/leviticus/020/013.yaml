theological_decisions:
- issue: Rendering a morally and culturally contested legal prohibition without softening
    or expanding it
  chosen_reading: Translated the verse directly according to its Hebrew legal wording,
    preserving both the prohibition and the stated penalty without paraphrase or doctrinal
    commentary.
  alternative_readings:
  - Using broader interpretive language such as 'homosexual acts'
  - Using narrower modern identity-based terminology
  rationale: The Hebrew describes a specific act in legal terms, not a modern identity
    category. The translation therefore keeps the act-focused wording of the source
    text and does not import contemporary conceptual frameworks beyond what the Hebrew
    states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered language
  chosen_reading: Retained 'man' and 'male' to reflect the distinct Hebrew terms אִישׁ
    and זָכָר.
  alternative_readings:
  - man/man
  - person/male
  - man/person
  rationale: The source text is grammatically and semantically masculine, and it distinguishes
    between אִישׁ ('man') and זָכָר ('male'). Following the gender-accurate principle,
    the English preserves that distinction rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
