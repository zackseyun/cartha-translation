id: LEV.20.9
reference: Leviticus 20:9
source:
  edition: WLC
  text: כִּֽי אִ֣ישׁ אִ֗ישׁ אֲשֶׁ֨ר יְקַלֵּ֧ל אֶת אָבִ֛י/ו וְ/אֶת אִמּ֖/וֹ מ֣וֹת יוּמָ֑ת
    אָבִ֧י/ו וְ/אִמּ֛/וֹ קִלֵּ֖ל דָּמָ֥י/ו בּֽ/וֹ־־־׃
translation:
  text: For any man who curses his father or his mother shall surely be put to death;
    he has cursed his father and his mother; his blood is on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a man, a man,' an idiom meaning 'any man' or 'whoever.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his father and his mother'; English 'or' brings out the legal sense
      that cursing either parent incurs the penalty.
    reason: lexical_alternative
  - marker: c
    text: Or 'his bloodguilt is upon him.' The Hebrew idiom assigns responsibility
      for his death to himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - If
  - Surely
  lexicon: HALOT
  rationale: Introduces the legal case and grounds the following penalty statement.
    'For' fits the casuistic flow in English better than a conditional 'if' here while
    preserving the explanatory force.
- source_word: אִישׁ אִישׁ
  chosen: any man
  alternatives:
  - a man, a man
  - whoever
  - anyone
  lexicon: HALOT
  rationale: The doubled noun is an idiomatic distributive expression meaning 'any
    man' or 'whoever.' Because the Hebrew is grammatically masculine and representative,
    'any man' preserves the source's gendered form in line with the gender-accurate
    policy, while still conveying distributive force.
- source_word: יְקַלֵּל
  chosen: curses
  alternatives:
  - reviles
  - treats with contempt
  lexicon: HALOT
  rationale: The piel of קלל here denotes speaking a curse against, not merely dishonoring
    in a broad sense. 'Curses' is the most direct and legally precise rendering in
    this context.
- source_word: אָבִיו וְאֶת אִמּוֹ
  chosen: his father or his mother
  alternatives:
  - his father and his mother
  lexicon: HALOT
  rationale: Although the first pair is linked with 'and' in Hebrew, English legal
    style often uses 'or' to express that either case incurs the penalty. This reflects
    the distributive legal sense without denying that cursing both would also qualify.
    The second occurrence is rendered with 'and' because it summarizes the offense
    as committed.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must be put to death
  - shall certainly be executed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the penalty. 'Shall
    surely be put to death' preserves both the passive/judicial sense and the emphatic
    force.
- source_word: קִלֵּל
  chosen: has cursed
  alternatives:
  - cursed
  lexicon: HALOT
  rationale: The perfect verb gives the ground for the sentence just pronounced. English
    present perfect captures the completed offense with present legal relevance.
- source_word: דָּמָיו בּוֹ
  chosen: his blood is on him
  alternatives:
  - his bloodguilt is upon him
  - his blood shall be upon him
  lexicon: HALOT
  rationale: This idiom assigns responsibility for the death to the offender himself.
    'His blood is on him' is concise, idiomatic, and preserves the juridical force
    without overinterpreting.
