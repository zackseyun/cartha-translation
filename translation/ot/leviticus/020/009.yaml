theological_decisions:
- issue: Gendered distributive expression אִישׁ אִישׁ
  chosen_reading: any man
  alternative_readings:
  - anyone
  - whoever
  rationale: The translation follows the stated gender-accurate policy rather than
    neutralizing the masculine form. In this legal context the masculine is representative,
    not exclusively male, but the source form is still best reflected in the main
    text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Responsibility formula דָּמָיו בּוֹ
  chosen_reading: his blood is on him
  alternative_readings:
  - his bloodguilt is upon him
  rationale: The phrase is rendered as a legal responsibility formula without importing
    later doctrinal notions of atonement or metaphysical guilt beyond the text's judicial
    meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
