theological_decisions:
- issue: Gendered legal subject
  chosen_reading: Rendered singular masculine אִישׁ as 'man' rather than a gender-neutral
    term.
  alternative_readings:
  - person
  - someone
  rationale: The translation follows the stated gender-accurate policy. The Hebrew
    is grammatically masculine and refers to a male offender in this law, so 'man'
    is the appropriate rendering.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Moral characterization of תֶּבֶל
  chosen_reading: Rendered as 'perversion' in the main text.
  alternative_readings:
  - confusion
  - outrage
  - disgraceful act
  rationale: The verse itself morally characterizes the act; translating תֶּבֶל with
    a morally weighty English term reflects the source text rather than importing
    extra doctrinal judgment. 'Perversion' communicates the legal-moral condemnation
    embedded in the Hebrew term.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
