id: LEV.20.12
reference: Leviticus 20:12
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֤ר יִשְׁכַּב֙ אֶת כַּלָּת֔/וֹ מ֥וֹת יוּמְת֖וּ שְׁנֵי/הֶ֑ם תֶּ֥בֶל
    עָשׂ֖וּ דְּמֵי/הֶ֥ם בָּֽ/ם־׃
translation:
  text: If a man lies with his daughter-in-law, both of them shall surely be put to
    death. They have committed perversion; their blood is upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confusion,' 'an outrage,' or 'a disgraceful act.' The Hebrew term תֶּבֶל
      denotes a morally disordered act in this legal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'their bloodguilt is upon them.' The Hebrew idiom assigns responsibility
      for their death to themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: If a man
  alternatives:
  - And if a man
  - A man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' The prefixed וְ here is best carried
    idiomatically in English as the start of a casuistic law clause ('If a man') rather
    than woodenly as 'And a man.' This preserves the legal conditional sense in context.
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: Although אֲשֶׁר is formally a relative particle ('who/that'), in this
    legal formula with וְאִישׁ אֲשֶׁר it functions naturally as the protasis of a
    case law statement, best rendered 'if.'
- source_word: יִשְׁכַּב אֶת
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: שׁכב with אֶת in this context is a standard idiom for sexual intercourse.
    'Lies with' is sufficiently clear, preserves the source idiom, and avoids either
    euphemistic vagueness or overly colloquial phrasing.
- source_word: כַּלָּתוֹ
  chosen: his daughter-in-law
  lexicon: HALOT
  rationale: כַּלָּה here specifically means a son's wife, so 'daughter-in-law' is
    the precise kinship term.
- source_word: מוֹת יוּמְתוּ
  chosen: shall surely be put to death
  alternatives:
  - must be put to death
  - shall certainly be put to death
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the passive/causative
    death formula. 'Shall surely be put to death' preserves both the legal force and
    the emphatic construction.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - the two of them
  - both
  lexicon: HALOT
  rationale: The term explicitly includes both participants; 'both of them' is natural
    and clear in English.
- source_word: תֶּבֶל
  chosen: perversion
  alternatives:
  - confusion
  - a disgraceful act
  - an outrage
  lexicon: HALOT
  rationale: תֶּבֶל denotes a morally disordered, abhorrent act, especially in sexual
    legislation. 'Perversion' best captures the sense of gross moral disorder in contemporary
    readable English without overexpanding the phrase.
- source_word: עָשׂוּ
  chosen: have committed
  alternatives:
  - have done
  - have practiced
  lexicon: HALOT
  rationale: While literally 'have done,' English idiom with an abstract object like
    תֶּבֶל is better expressed as 'have committed,' especially in legal-moral context.
- source_word: דְּמֵיהֶם בָּם
  chosen: their blood is upon them
  alternatives:
  - their bloodguilt is upon them
  - their blood is on them
  lexicon: HALOT
  rationale: This legal formula assigns responsibility for the death penalty to the
    offenders themselves. 'Their blood is upon them' is a standard, transparent rendering
    that preserves the idiom; 'bloodguilt' is interpretive and slightly more explicit
    than the Hebrew wording.
