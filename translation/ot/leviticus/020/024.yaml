id: LEV.20.24
reference: Leviticus 20:24
source:
  edition: WLC
  text: וָ/אֹמַ֣ר לָ/כֶ֗ם אַתֶּם֮ תִּֽירְשׁ֣וּ אֶת אַדְמָתָ/ם֒ וַ/אֲנִ֞י אֶתְּנֶ֤/נָּה
    לָ/כֶם֙ לָ/רֶ֣שֶׁת אֹתָ֔/הּ אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָ֑שׁ אֲנִי֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם
    אֲשֶׁר הִבְדַּ֥לְתִּי אֶתְ/כֶ֖ם מִן הָֽ/עַמִּֽים־־־׃
translation:
  text: But I said to you, ‘You shall possess their land, and I myself will give it
    to you to possess it’—a land flowing with milk and honey. I am the LORD your God,
    who has separated you from the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall inherit their land ... to inherit it.' The Hebrew verb יָרַשׁ
      can carry both the sense of inheriting and taking possession.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''a land flowing with milk and honey,'' an idiom for abundance
      and fertility.'
    reason: cultural_note
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
  - marker: d
    text: Or, 'who has set you apart from the peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: But I said
  alternatives:
  - And I said
  - So I said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the discourse. 'But' fits the contrast
    with the surrounding prohibitions and distinctions in context better than a simple
    'and,' while still reflecting the conjunction.
- source_word: תִּירְשׁוּ
  chosen: you shall possess
  alternatives:
  - you shall inherit
  - you shall take possession of
  lexicon: HALOT
  rationale: ירשׁ commonly denotes taking possession/inheriting land. 'Possess' is
    concise and natural here, and it matches the following infinitive לָרֶשֶׁת. 'Inherit'
    is possible, but in English it can suggest passive receipt more than active possession.
- source_word: אַדְמָתָם
  chosen: their land
  alternatives:
  - their ground
  - their soil
  lexicon: HALOT
  rationale: אדמה is literally ground/soil, but in territorial contexts 'land' is
    the most idiomatic English rendering and best matches the promise of territorial
    possession.
- source_word: וַאֲנִי
  chosen: and I myself
  alternatives:
  - and I
  - but I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'I myself' preserves that emphasis
    in English.
- source_word: אֶתְּנֶנָּה
  chosen: will give it
  alternatives:
  - am giving it
  - shall give it
  lexicon: HALOT
  rationale: נתן with the suffixed object refers to the land as a divine gift. Future
    'will give it' fits the promise context.
- source_word: לָרֶשֶׁת אֹתָהּ
  chosen: to possess it
  alternatives:
  - as a possession
  - to inherit it
  lexicon: HALOT
  rationale: The infinitive of ירשׁ expresses purpose/result. 'To possess it' keeps
    the verbal parallel with the earlier finite verb and preserves the active sense.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for abundance and fertility. 'Flowing
    with milk and honey' is standard, accurate, and readily understood.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: הִבְדַּלְתִּי
  chosen: has separated
  alternatives:
  - has set apart
  - distinguished
  - divided
  lexicon: HALOT
  rationale: בדל means to separate or set apart. 'Separated' is the most direct rendering
    here and echoes the chapter's holiness/separation theme. 'Set apart' is a good
    theological alternative but slightly more interpretive.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עמים refers broadly to peoples/groups. 'The peoples' is more literal
    here than 'the nations' and avoids importing a more political nuance than the
    Hebrew requires.
