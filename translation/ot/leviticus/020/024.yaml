theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    contested-terms policy, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of Israel's distinction from other groups
  chosen_reading: who has separated you from the peoples
  alternative_readings:
  - who has set you apart from the peoples
  rationale: The text states divine separation/distinction without expanding it into
    later doctrinal categories. 'Separated' preserves the holiness theme while avoiding
    interpretive overreach.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
