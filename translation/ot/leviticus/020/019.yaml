theological_decisions:
- issue: Referent shift between singular offender and plural offenders in the rationale
    and penalty clause
  chosen_reading: Render the explanatory clause with singular 'he has laid bare his
    own flesh' and the penalty with plural 'they shall bear their iniquity.'
  alternative_readings:
  - 'Smooth the verse to all-plural: ''for they have laid bare their own flesh; they
    shall bear their iniquity'''
  - 'Interpret the singular generically and translate more dynamically: ''for this
    exposes one''s own flesh; they shall bear their iniquity'''
  rationale: The Hebrew text shifts from singular suffixes in שְׁאֵרוֹ / הֶעֱרָה to
    plural suffix and verb in עֲוֺנָם יִשָּׂאוּ. Preserving the shift is more transparent
    to the source text and reflects the legal style, where the act may be described
    from the male offender's perspective while the liability falls on both participants.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether to make the sexual euphemism explicit in the main text
  chosen_reading: Retain the idiom 'uncover the nakedness' rather than replacing it
    with 'have sexual relations with.'
  alternative_readings:
  - Translate dynamically as 'You shall not have sexual relations with your mother's
    sister or your father's sister'
  rationale: The Hebrew legal idiom is central to the holiness code's style and intertextual
    coherence. Keeping it preserves the source texture without obscuring meaning,
    especially since the surrounding context establishes the idiom's sexual sense.
  doctrine_reference: Translation philosophy §§1, 5, 6
