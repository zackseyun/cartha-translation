id: LEV.20.19
reference: Leviticus 20:19
source:
  edition: WLC
  text: וְ/עֶרְוַ֨ת אֲח֧וֹת אִמְּ/ךָ֛ וַ/אֲח֥וֹת אָבִ֖י/ךָ לֹ֣א תְגַלֵּ֑ה כִּ֧י אֶת
    שְׁאֵר֛/וֹ הֶעֱרָ֖ה עֲוֺנָ֥/ם יִשָּֽׂאוּ־׃
translation:
  text: You shall not uncover the nakedness of your mother's sister or of your father's
    sister, for he has laid bare his own flesh; they shall bear their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for he has exposed his close relative' / 'for he has laid bare his kin.'
      The Hebrew 'his own flesh' uses kinship language literally.
    reason: lexical_alternative
  - marker: b
    text: '''They shall bear their iniquity'' can also mean ''they shall bear their
      guilt'' or ''they shall bear the punishment for their iniquity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the shame of
  - the genitals of
  lexicon: HALOT
  rationale: In Levitical sexual-prohibition formulas, עֶרְוָה in the construct phrase
    'uncover the nakedness of' is an established idiom for illicit sexual relations
    with a close relative. Retaining 'nakedness' preserves the legal idiom and intertextual
    consistency with the surrounding context better than a more interpretive paraphrase.
- source_word: תְגַלֶּה
  chosen: you shall not uncover
  alternatives:
  - you must not expose
  - you shall not have sexual relations with
  lexicon: HALOT
  rationale: From גלה in the Piel, this verb regularly forms the idiom 'uncover nakedness'
    in Leviticus. 'You shall not uncover' keeps the formal legal wording while remaining
    understandable. A more explicit sexual paraphrase is possible but would flatten
    the source idiom.
- source_word: אֲחוֹת אִמְּךָ
  chosen: your mother's sister
  alternatives:
  - the sister of your mother
  - your maternal aunt
  lexicon: HALOT
  rationale: This directly names the prohibited relative. 'Your mother's sister' is
    clear modern English and stays close to the Hebrew kinship expression; 'maternal
    aunt' is possible but less formally aligned with the source wording.
- source_word: וַאֲחוֹת אָבִיךָ
  chosen: or of your father's sister
  alternatives:
  - the sister of your father
  - your paternal aunt
  lexicon: HALOT
  rationale: Parallel to the previous kinship term. 'Or of your father's sister' preserves
    the Hebrew coordination and legal style.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition. 'For' fits English legal
    style and preserves the explanatory force without overinterpreting the nuance.
- source_word: שְׁאֵרוֹ
  chosen: his own flesh
  alternatives:
  - his close relative
  - his kin
  lexicon: HALOT
  rationale: שְׁאֵר can denote blood relation/close kin, literally 'flesh.' Here the
    idiom grounds the prohibition in consanguinity. 'His own flesh' preserves the
    concrete metaphor and echoes biblical kinship language, while the alternatives
    are interpretive and worth preserving.
- source_word: הֶעֱרָה
  chosen: has laid bare
  alternatives:
  - has exposed
  - has uncovered
  lexicon: HALOT
  rationale: From ערה, 'to make bare/expose.' 'Has laid bare' is idiomatic English
    and avoids awkward repetition with 'uncover' while still conveying exposure in
    a sexual-legal context.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequence of guilt. In penalty
    formulas with נשׂא, the phrase can carry both guilt and liability. 'Their iniquity'
    preserves the traditional compactness and moral weight, while the penal nuance
    is noted as an alternative.
- source_word: יִשָּׂאוּ
  chosen: they shall bear
  alternatives:
  - they shall carry
  - they shall suffer
  lexicon: HALOT
  rationale: נשא with עון is a standard idiom meaning to bear guilt/iniquity and its
    consequences. 'They shall bear' preserves the idiom and leaves the exact mode
    of penalty unstated, as in the Hebrew.
