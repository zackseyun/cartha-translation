id: LEV.20.27
reference: Leviticus 20:27
source:
  edition: WLC
  text: וְ/אִ֣ישׁ אֽוֹ אִשָּׁ֗ה כִּֽי יִהְיֶ֨ה בָ/הֶ֥ם א֛וֹב א֥וֹ יִדְּעֹנִ֖י מ֣וֹת
    יוּמָ֑תוּ בָּ/אֶ֛בֶן יִרְגְּמ֥וּ אֹתָ֖/ם דְּמֵי/הֶ֥ם בָּֽ/ם־־׃פ
translation:
  text: And a man or a woman, if there is in them a medium or a spiritist, shall surely
    be put to death; they shall stone them with stones. Their blood is on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a familiar spirit' for אוֹב; the term can denote the spirit associated
      with necromancy or, by extension, the medium who consults it.
    reason: lexical_alternative
  - marker: b
    text: Or 'a wizard' for יִדְּעֹנִי; here 'spiritist' is used to avoid misleading
      modern fantasy associations.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Their blood is on them,' a legal formula indicating responsibility
      for their own death.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ אֽוֹ אִשָּׁה
  chosen: And a man or a woman
  alternatives:
  - And a man or woman
  - Now a man or a woman
  lexicon: HALOT
  rationale: Preserves the explicit gender pair in the Hebrew, in keeping with the
    gender-accurate philosophy. The conjunction at the start is naturally rendered
    'And' here.
- source_word: כִּי יִהְיֶה בָהֶם
  chosen: if there is in them
  alternatives:
  - if there is among them
  - if one has
  lexicon: HALOT
  rationale: The Hebrew is literally singular verb with plural pronominal complement,
    idiomatically indicating that such a spiritistic condition/practice is present
    in the person. 'If there is in them' stays close to the source while remaining
    intelligible. Smoother alternatives are possible, but this wording best preserves
    the Hebrew construction without over-paraphrase.
- source_word: אוֹב
  chosen: a medium
  alternatives:
  - a ghost
  - a familiar spirit
  lexicon: HALOT
  rationale: In context this term refers to necromantic/spirit-medium practice rather
    than the spirit itself. 'Medium' is clear modern English and avoids archaic 'familiar
    spirit,' while preserving the occult sense.
- source_word: יִדְּעֹנִי
  chosen: a spiritist
  alternatives:
  - a wizard
  - a necromancer
  - one who consults spirits
  lexicon: HALOT
  rationale: This term is paired with אוֹב and denotes a practitioner associated with
    spirit consultation/occult knowledge. 'Spiritist' is concise, modern, and suitably
    parallel to 'medium.' 'Wizard' is traditional but misleading in contemporary English.
- source_word: מוֹת יוּמָתוּ
  chosen: shall surely be put to death
  alternatives:
  - must surely be put to death
  - shall certainly be put to death
  lexicon: HALOT
  rationale: Represents the infinitive absolute + finite verb construction, which
    intensifies the death penalty. 'Shall surely be put to death' is a standard, accurate
    English equivalent.
- source_word: בָּאֶבֶן יִרְגְּמוּ אֹתָם
  chosen: they shall stone them with stones
  alternatives:
  - they shall stone them
  - they shall pelt them with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with the stone/stone(s),' so the translation
    preserves the instrument rather than reducing it to the English verb alone. The
    plural 'stones' is idiomatic in English for execution by stoning.
- source_word: דְּמֵיהֶם בָּם
  chosen: Their blood is on them
  alternatives:
  - Their bloodguilt is upon them
  - Their blood is upon themselves
  lexicon: HALOT
  rationale: This legal formula assigns responsibility for the death to the offenders
    themselves. 'Their blood is on them' is concise, idiomatic, and preserves the
    judicial force. 'Bloodguilt' is interpretive and slightly more technical than
    the Hebrew wording requires.
