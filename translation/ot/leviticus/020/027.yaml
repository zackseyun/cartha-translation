theological_decisions:
- issue: Rendering of occult-practice terms in a legal prohibition
  chosen_reading: Translate אוֹב and יִדְּעֹנִי as 'medium' and 'spiritist'
  alternative_readings:
  - '''familiar spirit'' and ''wizard'''
  - '''ghost-medium'' and ''necromancer'''
  rationale: The verse condemns illicit spirit-related practices without requiring
    the translation to settle detailed ancient Near Eastern taxonomy. Modern accessible
    terms best communicate the prohibition while avoiding archaic or fantasy-laden
    English. This does not import a doctrinal claim beyond the text's legal judgment.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Retention of explicit male/female formulation
  chosen_reading: Keep 'a man or a woman' in the main text
  alternative_readings:
  - '''anyone'''
  rationale: The Hebrew explicitly names both sexes. Per the gender-accurate policy,
    the translation preserves that form rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
