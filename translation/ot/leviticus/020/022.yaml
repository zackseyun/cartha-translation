id: LEV.20.22
reference: Leviticus 20:22
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֤ם אֶת כָּל חֻקֹּתַ/י֙ וְ/אֶת כָּל מִשְׁפָּטַ֔/י וַ/עֲשִׂיתֶ֖ם
    אֹתָ֑/ם וְ/לֹא תָקִ֤יא אֶתְ/כֶם֙ הָ/אָ֔רֶץ אֲשֶׁ֨ר אֲנִ֜י מֵבִ֥יא אֶתְ/כֶ֛ם שָׁ֖מָּ/ה
    לָ/שֶׁ֥בֶת בָּֽ/הּ־־־־־׃
translation:
  text: So you shall keep all my statutes and all my judgments and do them, so that
    the land to which I am bringing you to live in it may not vomit you out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spew you out.' The Hebrew verb is literally 'vomit,' a vivid metaphor
      for the land expelling defiled inhabitants.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''my decrees and my ordinances.'' The Hebrew uses two distinct legal
      terms: חֻקּוֹת and מִשְׁפָּטִים.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - You must keep
  lexicon: HALOT
  rationale: שׁמר in covenant/legal contexts commonly means to keep, observe, or guard.
    'Keep' is the most natural legal-covenantal English rendering. The prefixed conjunction
    is rendered 'So' to connect with the preceding warning/inference in context, while
    preserving the imperative force with 'shall'.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקָּה often denotes prescribed enactments or statutes. 'Statutes' preserves
    the formal legal nuance and maintains distinction from מִשְׁפָּטִים in the same
    verse.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance. Here
    'judgments' keeps the lexical distinction from חֻקּוֹת and reflects covenantal
    legal terminology. 'Rules' is clearer in modern English but flattens the legal
    texture.
- source_word: וַ/עֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: עשה with legal objects regularly means to do or carry out. 'Do them'
    is concise, direct, and close to the Hebrew.
- source_word: וְ/לֹא תָקִיא
  chosen: may not vomit ... out
  alternatives:
  - may not spew ... out
  - will not vomit ... out
  lexicon: HALOT
  rationale: קיא literally means to vomit. The vivid metaphor should be preserved
    rather than softened. 'Vomit ... out' is more literal than 'spew ... out' and
    matches the force of the warning. The modal 'may not' fits the purpose/result
    nuance after the commands.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers specifically to the promised land rather than earth
    in general. 'Land' is the standard contextual rendering.
- source_word: אֲשֶׁר אֲנִי מֵבִיא אֶתְכֶם שָׁמָּה
  chosen: to which I am bringing you
  alternatives:
  - where I am bringing you
  - into which I am bringing you there
  lexicon: HALOT
  rationale: The clause identifies the land as the destination of God's present action.
    'To which I am bringing you' is idiomatic English and preserves the participial
    sense of ongoing divine action.
- source_word: לָשֶׁבֶת בָּהּ
  chosen: to live in it
  alternatives:
  - to dwell in it
  - to settle in it
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or live. 'Live in it' is readable modern
    English; 'dwell' is more traditional but less natural for the target audience.
    The infinitive expresses purpose/result of the bringing.
