theological_decisions:
- issue: Retention of the land-expulsion metaphor as covenant warning
  chosen_reading: The land is personified as capable of vomiting out its inhabitants.
  alternative_readings:
  - The land will reject you
  - The land will spew you out
  rationale: The Hebrew uses a vivid personification that communicates covenantal
    defilement and expulsion. Preserving the metaphor avoids muting the theological
    seriousness of holiness in the land.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Distinction between חֻקּוֹת and מִשְׁפָּטִים
  chosen_reading: 'Render with two distinct English legal terms: ''statutes'' and
    ''judgments.'''
  alternative_readings:
  - '''decrees'' and ''laws'''
  - '''statutes'' and ''rules'''
  rationale: The source uses two different legal categories. Preserving distinction
    supports auditability and avoids collapsing the Hebrew legal vocabulary into a
    single generic term.
  doctrine_reference: Translation philosophy §5
