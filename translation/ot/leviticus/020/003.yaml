theological_decisions:
- issue: Nature of the offense involving Molech
  chosen_reading: Retain the wording 'has given some of his offspring to Molech' without
    explicitly adding 'as a sacrifice' in the main text.
  alternative_readings:
  - has sacrificed some of his children to Molech
  - has made some of his offspring pass through the fire to Molech
  rationale: The broader context strongly implies child sacrifice, but this verse
    itself uses the more general verb 'given.' To avoid importing more than the source
    text states in this clause, the main text keeps the lexical wording while allowing
    the cultic implication to remain evident from context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
- issue: Divine self-involvement and judgment
  chosen_reading: Render the pronoun emphatically as 'I myself' and preserve the judicial
    idiom 'set my face against.'
  alternative_readings:
  - I will set my face against
  - I will oppose
  rationale: The Hebrew emphasizes God's personal action in judgment. The translation
    preserves that emphasis and the covenantal idiom rather than flattening it into
    a generic statement of opposition.
  doctrine_reference: 'Translation philosophy: Preserve theological weight without
    flattening; optimal equivalence.'
