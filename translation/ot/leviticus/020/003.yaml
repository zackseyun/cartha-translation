id: LEV.20.3
reference: Leviticus 20:3
source:
  edition: WLC
  text: וַ/אֲנִ֞י אֶתֵּ֤ן אֶת פָּנַ/י֙ בָּ/אִ֣ישׁ הַ/ה֔וּא וְ/הִכְרַתִּ֥י אֹת֖/וֹ
    מִ/קֶּ֣רֶב עַמּ֑/וֹ כִּ֤י מִ/זַּרְע/וֹ֙ נָתַ֣ן לַ/מֹּ֔לֶךְ לְמַ֗עַן טַמֵּא֙ אֶת
    מִקְדָּשִׁ֔/י וּ/לְ/חַלֵּ֖ל אֶת שֵׁ֥ם קָדְשִֽׁ/י־־־׃
translation:
  text: I myself will set my face against that man and cut him off from among his
    people, because he has given some of his offspring to Molech, so as to defile
    my sanctuary and to profane my holy name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has sacrificed some of his children to Molech.' The Hebrew says literally
      'has given some of his offspring to Molech'; the sacrificial sense is inferred
      from the wider context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: I myself
  alternatives:
  - and I
  - I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'I myself' brings out the emphatic
    force better than a simple 'I,' while remaining natural English.
- source_word: אֶתֵּן אֶת־פָּנַי בָּאִישׁ הַהוּא
  chosen: will set my face against that man
  alternatives:
  - will turn my face against that man
  - will set my face on that man
  lexicon: HALOT
  rationale: The idiom 'set my face against' is a well-established and transparent
    rendering of the Hebrew expression, conveying deliberate divine opposition. 'That
    man' preserves the demonstrative force of הַהוּא and the masculine singular אישׁ.
- source_word: וְהִכְרַתִּי אֹתוֹ
  chosen: and cut him off
  alternatives:
  - and I will cut him off
  - and destroy him
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means 'cut off' in covenantal/judicial contexts.
    This preserves the idiomatic legal-theological force without over-specifying the
    mode of judgment.
- source_word: מִקֶּרֶב עַמּוֹ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  - out of his people
  lexicon: HALOT
  rationale: A natural English rendering of the exclusion formula that retains the
    communal setting of the judgment.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the judgment. 'Because' is clearer in contemporary
    English than 'for' here.
- source_word: מִזַּרְעוֹ
  chosen: some of his offspring
  alternatives:
  - some of his seed
  - some of his children
  - his offspring
  lexicon: HALOT
  rationale: זֶרַע here refers to his descendants/children in the context of child
    sacrifice. 'Some of his offspring' reflects the partitive מן and avoids the archaic
    'seed.'
- source_word: נָתַן לַמֹּלֶךְ
  chosen: has given to Molech
  alternatives:
  - has given to the Molech
  - has offered to Molech
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'given'; 'offered' would be interpretive. 'Molech'
    is treated as a proper name and transliterated in keeping with the philosophy
    of transliterating names.
- source_word: לְמַעַן
  chosen: so as to
  alternatives:
  - in order to
  - with the result that
  lexicon: HALOT
  rationale: This expresses purpose or intended result. 'So as to' is concise and
    natural while preserving the linkage to the following infinitives.
- source_word: טַמֵּא אֶת־מִקְדָּשִׁי
  chosen: defile my sanctuary
  alternatives:
  - make my sanctuary unclean
  - pollute my sanctuary
  lexicon: HALOT
  rationale: טמא in cultic contexts is well rendered by 'defile.' 'Sanctuary' is the
    standard rendering of מקדש in this priestly context.
- source_word: וּלְחַלֵּל אֶת־שֵׁם קָדְשִׁי
  chosen: and to profane my holy name
  alternatives:
  - and to desecrate my holy name
  lexicon: HALOT
  rationale: חלל in relation to God's name is conventionally and accurately rendered
    'profane.' This preserves the covenantal/theological gravity of treating the divine
    name as common.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to a specific
    offender. Per the translation philosophy, gender-accurate rendering is preferred
    over neutralizing to 'person'.
