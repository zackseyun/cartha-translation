id: LEV.20.23
reference: Leviticus 20:23
source:
  edition: WLC
  text: וְ/לֹ֤א תֵֽלְכוּ֙ בְּ/חֻקֹּ֣ת הַ/גּ֔וֹי אֲשֶׁר אֲנִ֥י מְשַׁלֵּ֖חַ מִ/פְּנֵי/כֶ֑ם
    כִּ֤י אֶת כָּל אֵ֨לֶּה֙ עָשׂ֔וּ וָ/אָקֻ֖ץ בָּֽ/ם־־־׃
translation:
  text: And you shall not walk in the statutes of the nation that I am driving out
    before you, because they did all these things, and I loathed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'customs' for 'statutes'; the Hebrew term can denote prescribed practices
      or fixed ordinances.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sending away from before you'; here the sense is expelling or
      driving out.
    reason: lexical_alternative
  - marker: c
    text: Or 'I abhorred them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵלְכוּ
  chosen: shall not walk
  alternatives:
  - must not walk
  - shall not live
  lexicon: HALOT
  rationale: הלך literally means 'walk/go.' In covenantal-ethical contexts, 'walk'
    is a standard idiom for conduct, and preserving it maintains the Hebrew imagery
    without becoming obscure in English.
- source_word: בְּחֻקֹּת
  chosen: in the statutes
  alternatives:
  - according to the statutes
  - in the customs
  - in the ordinances
  lexicon: HALOT
  rationale: חֻקּוֹת often refers to prescribed statutes or fixed enactments. Here
    it denotes the established practices/norms of the nation. 'Statutes' preserves
    the legal-ethical force better than the looser 'customs,' while 'walk in' clarifies
    behavioral conformity.
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the Gentile nation
  lexicon: HALOT
  rationale: גּוֹי is singular here and refers to the dispossessed Canaanite population
    collectively. 'Nation' is the most natural singular rendering and avoids importing
    later NT connotations of 'Gentiles.'
- source_word: מְשַׁלֵּחַ
  chosen: am driving out
  alternatives:
  - am sending away
  - am casting out
  lexicon: HALOT
  rationale: Although שׁלח commonly means 'send,' in this context with מִפְּנֵיכֶם
    ('from before you') it denotes expulsion/removal from the land. 'Driving out'
    best captures the dispossessing action in idiomatic English.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - out of your presence
  lexicon: HALOT
  rationale: Literally 'from before your face/presence.' English commonly renders
    this idiom as 'before you' in conquest contexts; the sense is removal from Israel's
    presence.
- source_word: כִּי אֶת כָּל אֵלֶּה עָשׂוּ
  chosen: because they did all these things
  alternatives:
  - for they did all these things
  - because they practiced all these things
  lexicon: HALOT
  rationale: כִּי is causal here. 'Did all these things' is a straightforward rendering
    of the clause and points back to the prohibited practices in the surrounding context.
- source_word: וָאָקֻץ
  chosen: I loathed
  alternatives:
  - I abhorred
  - I was disgusted
  - I detested
  lexicon: HALOT
  rationale: קוץ in this stem conveys revulsion or abhorrence. 'I loathed' is strong,
    readable modern English that preserves the divine disgust without sounding archaic.
    'Abhorred' is possible but more formal.
- source_word: בָּם
  chosen: them
  alternatives:
  - because of them
  - at them
  lexicon: HALOT
  rationale: 'With קוץ, the preposition marks the object of loathing. English idiom
    prefers a direct object: ''loathed them.'' This is a natural optimal-equivalence
    rendering.'
