theological_decisions:
- issue: Rendering divine revulsion without overstating anthropopathism
  chosen_reading: and I loathed them
  alternative_readings:
  - and I abhorred them
  - and I was disgusted with them
  rationale: The Hebrew uses strong affective language for God's moral revulsion toward
    the nation's practices. The translation preserves that force without softening
    it into mere disapproval or expanding it into a doctrinal statement beyond the
    text.
