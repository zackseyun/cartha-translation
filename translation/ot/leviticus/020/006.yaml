theological_decisions:
- issue: Retention of the prostitution metaphor for covenantal infidelity
  chosen_reading: to prostitute himself after them
  alternative_readings:
  - to be unfaithful by following them
  rationale: The Hebrew explicitly uses זנה, a sexual-infidelity metaphor often applied
    to idolatry and illicit spiritual practice. Preserving the metaphor maintains
    the covenantal and theological weight of the offense rather than reducing it to
    a generic act of disobedience.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of the sanction 'cut off'
  chosen_reading: and cut him off
  alternative_readings:
  - and destroy him
  - and exclude him
  rationale: The exact mechanism of being 'cut off' is debated in Pentateuchal law.
    The translation preserves the Hebrew's judicial severity without resolving whether
    the sanction is death, childlessness, divine judgment, or expulsion.
  doctrine_reference: Translation philosophy §3
