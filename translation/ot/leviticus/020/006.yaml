id: LEV.20.6
reference: Leviticus 20:6
source:
  edition: WLC
  text: וְ/הַ/נֶּ֗פֶשׁ אֲשֶׁ֨ר תִּפְנֶ֤ה אֶל הָֽ/אֹבֹת֙ וְ/אֶל הַ/יִּדְּעֹנִ֔ים לִ/זְנ֖וֹת
    אַחֲרֵי/הֶ֑ם וְ/נָתַתִּ֤י אֶת פָּנַ/י֙ בַּ/נֶּ֣פֶשׁ הַ/הִ֔וא וְ/הִכְרַתִּ֥י אֹת֖/וֹ
    מִ/קֶּ֥רֶב עַמּֽ/וֹ־־־׃
translation:
  text: And the person who turns to the mediums and to the spiritists, to prostitute
    himself after them, I will set my face against that person and cut him off from
    among his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those with familiar spirits' for 'mediums'; the Hebrew term refers to
      practitioners who consult the dead or spirits.
    reason: lexical_alternative
  - marker: b
    text: Or 'to play the prostitute after them,' a metaphor for covenantal unfaithfulness
      through illicit spiritual practice.
    reason: lexical_alternative
  - marker: c
    text: '''Cut off'' is a standard legal formula; the text does not specify here
      the exact mode of judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  chosen: the person
  alternatives:
  - the soul
  - the life
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ often refers to the individual person rather
    than the immaterial soul. 'Person' is natural English and fits the judicial context.
- source_word: תִּפְנֶה
  chosen: turns to
  alternatives:
  - turns toward
  - consults
  lexicon: HALOT
  rationale: The verb פנה literally means 'turn' and here idiomatically indicates
    directing oneself toward or seeking out occult practitioners. 'Turns to' preserves
    the metaphor while remaining idiomatic.
- source_word: הָאֹבֹת
  chosen: the mediums
  alternatives:
  - the ghosts
  - the necromancers
  - those with familiar spirits
  lexicon: HALOT
  rationale: אוֹב refers to a medium/necromancer associated with spirit consultation.
    'Mediums' is the clearest modern English equivalent; the older 'those with familiar
    spirits' is traditional but obscure.
- source_word: הַיִּדְּעֹנִים
  chosen: the spiritists
  alternatives:
  - wizards
  - soothsayers
  - diviners
  lexicon: HALOT
  rationale: יִדְּעֹנִי denotes a practitioner of occult knowledge, often paired with
    אוֹב. 'Spiritists' distinguishes the term from the first while keeping the semantic
    field of spirit consultation.
- source_word: לִזְנוֹת אַחֲרֵיהֶם
  chosen: to prostitute himself after them
  alternatives:
  - to play the prostitute after them
  - to whore after them
  - to be unfaithful by following them
  lexicon: HALOT
  rationale: זנה is the standard prostitution/adultery metaphor for covenantal unfaithfulness.
    Retaining the sexualized metaphor preserves the theological force better than
    flattening it to 'be unfaithful,' while 'prostitute himself' is readable modern
    English.
- source_word: וְנָתַתִּי אֶת־פָּנַי בַּנֶּפֶשׁ הַהִוא
  chosen: I will set my face against that person
  alternatives:
  - I will turn my face against that person
  - I will oppose that person
  lexicon: HALOT
  rationale: The idiom 'set my face against' is a well-established and transparent
    rendering of divine opposition in judgment. It preserves the Hebrew imagery without
    undue obscurity.
- source_word: וְהִכְרַתִּי אֹתוֹ
  chosen: and cut him off
  alternatives:
  - and eliminate him
  - and destroy him
  lexicon: HALOT
  rationale: כרת in covenant/judicial contexts commonly means 'cut off.' The phrase
    is intentionally somewhat open-ended in Hebrew, so the traditional idiom is preferable
    to an over-specific interpretation.
- source_word: מִקֶּרֶב עַמּוֹ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  - from his people
  lexicon: HALOT
  rationale: This is a standard exclusion/judgment formula. 'From among his people'
    is idiomatic and preserves the communal setting.
