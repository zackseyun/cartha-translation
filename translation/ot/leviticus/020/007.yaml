id: LEV.20.7
reference: Leviticus 20:7
source:
  edition: WLC
  text: וְ/הִ֨תְקַדִּשְׁתֶּ֔ם וִ/הְיִיתֶ֖ם קְדֹשִׁ֑ים כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹהֵי/כֶֽם׃
translation:
  text: Consecrate yourselves, and be holy, because I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sanctify yourselves' or 'Make yourselves holy.' The Hebrew verb is reflexive,
      calling Israel to active self-consecration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְקַדִּשְׁתֶּם
  chosen: Consecrate yourselves
  alternatives:
  - Sanctify yourselves
  - Make yourselves holy
  lexicon: HALOT
  rationale: Hitpael imperative/command form of קדשׁ with reflexive sense. 'Consecrate
    yourselves' preserves the active-reflexive force better than the more stative
    'be holy,' which is expressed in the following clause. 'Sanctify yourselves' is
    possible but less natural in contemporary English.
- source_word: וִהְיִיתֶם
  chosen: and be
  alternatives:
  - and you shall be
  - so that you may be
  lexicon: HALOT
  rationale: Qal of היה following the prior command functions naturally as a second
    imperative-like command in sequence. 'And be' gives clear, readable English while
    preserving the coordination.
- source_word: קְדֹשִׁים
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: HALOT
  rationale: קדושׁ in covenantal/ethical contexts is best rendered 'holy.' 'Set apart'
    captures part of the meaning but can flatten the moral and theological weight
    in Leviticus.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the grounding reason for the command. 'Because' is slightly
    more explicit and natural in modern English than 'for,' while preserving the causal
    force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with pronominal suffix
    here refers to Israel's singular God and governs singular sense in context. 'Your
    God' is the standard and contextually correct rendering.
