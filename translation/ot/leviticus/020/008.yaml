id: LEV.20.8
reference: Leviticus 20:8
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּם֙ אֶת חֻקֹּתַ֔/י וַ/עֲשִׂיתֶ֖ם אֹתָ֑/ם אֲנִ֥י יְהוָ֖ה מְקַדִּשְׁ/כֶֽם־׃
translation:
  text: You shall keep my statutes and do them. I am Yahweh, who sanctifies you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who makes you holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: You shall keep
  alternatives:
  - And you shall keep
  - You must keep
  - You shall observe
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' 'Keep' is concise and idiomatic in legal/covenantal contexts. The prefixed conjunction is not separately represented because English style naturally begins the sentence without 'and' here.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקָּה in Torah often refers to prescribed enactments. 'Statutes' preserves the legal nuance and is a standard, readable rendering distinct from other law terms.
- source_word: וַ/עֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  - and obey them
  lexicon: HALOT
  rationale: עשה with legal objects often means to do/carry out. 'Do them' is formally close to the Hebrew and preserves the concrete call to enact the statutes, not merely assent to them.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדִּשְׁכֶם
  chosen: who sanctifies you
  alternatives:
  - who makes you holy
  - who consecrates you
  lexicon: HALOT
  rationale: The participle of קדשׁ expresses ongoing or characteristic action by YHWH. 'Sanctifies' preserves the theological and covenantal register of holiness language; 'who' naturally renders the participial force in English.
