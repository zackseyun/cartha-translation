theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering קדשׁ language in covenant context
  chosen_reading: sanctifies you
  alternative_readings:
  - makes you holy
  - consecrates you
  rationale: The verse grounds Israel's obedience in the LORD's sanctifying action. 'Sanctifies' best preserves the holiness terminology without reducing it to a merely moral sense. The alternative 'makes you holy' is understandable but less terminologically consistent with broader biblical holiness language.
