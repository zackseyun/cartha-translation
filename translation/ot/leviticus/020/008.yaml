theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering קדשׁ language in covenant context
  chosen_reading: sanctifies you
  alternative_readings:
  - makes you holy
  - consecrates you
  rationale: The verse grounds Israel's obedience in the LORD's sanctifying action.
    'Sanctifies' best preserves the holiness terminology without reducing it to a
    merely moral sense. The alternative 'makes you holy' is understandable but less
    terminologically consistent with broader biblical holiness language.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
