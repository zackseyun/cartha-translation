theological_decisions:
- issue: Gendered legal language
  chosen_reading: Retained masculine 'man' and explicit male/female offender terms
    ('adulterer' / 'adulteress').
  alternative_readings:
  - If anyone commits adultery... both parties shall be put to death
  rationale: The Hebrew is explicitly gendered in both the case description and the
    penalty. Per the translation philosophy, gender-accurate rendering is preferred
    over gender-neutral paraphrase.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Legal penalty formula
  chosen_reading: Rendered the penalty as 'shall surely be put to death' without specifying
    method.
  alternative_readings:
  - shall be executed
  rationale: The Hebrew states the death penalty emphatically but does not specify
    the means in this verse. The translation preserves the text's scope without importing
    details from other passages or traditions.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3
