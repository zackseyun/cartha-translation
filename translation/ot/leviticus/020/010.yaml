id: LEV.20.10
reference: Leviticus 20:10
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֤ר יִנְאַף֙ אֶת אֵ֣שֶׁת אִ֔ישׁ אֲשֶׁ֥ר יִנְאַ֖ף אֶת אֵ֣שֶׁת
    רֵעֵ֑/הוּ מֽוֹת יוּמַ֥ת הַ/נֹּאֵ֖ף וְ/הַ/נֹּאָֽפֶת־־־׃
translation:
  text: If a man commits adultery with another man's wife—if he commits adultery with
    his neighbor's wife—the adulterer and the adulteress shall surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'with the wife of a man ... with the wife of his neighbor.' The
      repetition intensifies and clarifies the offense in legal style.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: If a man
  alternatives:
  - And a man
  - A man
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a casuistic law. In English legal
    style, 'If a man' best conveys the conditional force of the clause naturally,
    while preserving the masculine singular form.
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: Though formally a relative particle, in this legal formulation it functions
    conditionally. Rendering it as 'if' communicates the law-case structure more clearly
    in English.
- source_word: יִנְאַף
  chosen: commits adultery
  alternatives:
  - adulterates
  - has sexual relations unlawfully
  lexicon: HALOT
  rationale: The verb נאף specifically denotes adultery, not sexual immorality in
    general. 'Commits adultery' is the standard clear English equivalent.
- source_word: אֶת אֵשֶׁת אִישׁ
  chosen: with another man's wife
  alternatives:
  - with a man's wife
  - the wife of a man
  lexicon: HALOT
  rationale: The object phrase literally means 'the wife of a man.' In idiomatic English,
    'another man's wife' conveys the sense that the woman is married to someone other
    than the offender.
- source_word: אֲשֶׁר יִנְאַף אֶת אֵשֶׁת רֵעֵהוּ
  chosen: if he commits adultery with his neighbor's wife
  alternatives:
  - that is, he commits adultery with his fellow's wife
  - who commits adultery with his neighbor's wife
  lexicon: HALOT
  rationale: The verse restates the offense in apposition/clarification. Repeating
    'if he commits adultery' preserves the Hebrew emphasis and legal precision. 'Neighbor'
    is the normal rendering of רֵעַ here, referring broadly to a fellow member of
    the community, not merely an adjacent resident.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his fellow
  - another man
  lexicon: HALOT
  rationale: '''Neighbor'' is the established and accurate gloss for רֵעַ in covenantal/legal
    contexts. ''Fellow'' is possible but less natural in contemporary English.'
- source_word: מוֹת יוּמַת
  chosen: shall surely be put to death
  alternatives:
  - shall certainly be put to death
  - must be put to death
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the passive verbal
    idea. 'Shall surely be put to death' preserves both the legal register and the
    emphatic force.
- source_word: הַנֹּאֵף
  chosen: the adulterer
  alternatives:
  - the man who commits adultery
  lexicon: HALOT
  rationale: The substantival participle identifies the guilty male party. 'The adulterer'
    is concise and precise.
- source_word: וְהַנֹּאָפֶת
  chosen: and the adulteress
  alternatives:
  - and the woman who commits adultery
  lexicon: HALOT
  rationale: The feminine substantival participle explicitly includes the female party.
    Rendering both terms symmetrically preserves the Hebrew's balanced legal formulation.
