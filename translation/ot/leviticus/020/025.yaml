theological_decisions:
- issue: Ritual-category language versus moralized paraphrase
  chosen_reading: clean/unclean as covenantal purity categories
  alternative_readings:
  - pure/impure
  - defiled/undefiled
  rationale: The verse concerns Israel's mandated distinctions in dietary/ritual holiness.
    Rendering with 'clean/unclean' preserves the Levitical category without importing
    later moral or merely hygienic interpretations.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Meaning of נֶפֶשׁ in אֶת נַפְשֹׁתֵיכֶם
  chosen_reading: refers to the persons themselves ('yourselves')
  alternative_readings:
  - your souls
  rationale: Using 'yourselves' avoids suggesting a dualistic anthropology not demanded
    by the Hebrew and matches common Hebrew idiom where נפשׁ stands for the whole
    person.
  doctrine_reference: Translation philosophy §§1, 6
