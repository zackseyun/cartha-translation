id: LEV.20.25
reference: Leviticus 20:25
source:
  edition: WLC
  text: וְ/הִבְדַּלְתֶּ֞ם בֵּֽין הַ/בְּהֵמָ֤ה הַ/טְּהֹרָה֙ לַ/טְּמֵאָ֔ה וּ/בֵין הָ/ע֥וֹף
    הַ/טָּמֵ֖א לַ/טָּהֹ֑ר וְ/לֹֽא תְשַׁקְּצ֨וּ אֶת נַפְשֹֽׁתֵי/כֶ֜ם בַּ/בְּהֵמָ֣ה
    וּ/בָ/ע֗וֹף וּ/בְ/כֹל֙ אֲשֶׁ֣ר תִּרְמֹ֣שׂ הָֽ/אֲדָמָ֔ה אֲשֶׁר הִבְדַּ֥לְתִּי לָ/כֶ֖ם
    לְ/טַמֵּֽא־־־־־׃
translation:
  text: So you shall distinguish between the clean animal and the unclean, and between
    the unclean bird and the clean; and you shall not make yourselves detestable by
    animal or by bird or by anything that creeps on the ground, which I have set apart
    for you as unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make yourselves abominable.' The Hebrew verb is from the same semantic
      field as 'detestable' or 'abhorrent,' not the usual term for 'become unclean.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your souls' or 'your persons'; the idiom means 'yourselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִבְדַּלְתֶּם
  chosen: So you shall distinguish
  alternatives:
  - And you shall separate
  - And you shall make a distinction
  lexicon: HALOT
  rationale: Hiphil of בדל conveys causing/securing a distinction. 'Distinguish' is
    idiomatic in English for discerning clean from unclean categories. 'So' reflects
    the connective in context without over-literal repetition of 'and'.
- source_word: בֵּין ... לַ
  chosen: between ... and ...
  alternatives:
  - between ... from ...
  lexicon: HALOT
  rationale: Standard English pairing for Hebrew contrastive construction.
- source_word: הַבְּהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: Broad category term here includes land animals generally. 'Animal' is
    modern and accessible; 'beast' sounds archaic and 'livestock' is too narrow.
- source_word: הַטְּהֹרָה / הַטָּמֵא / הַטְּמֵאָה / הַטָּהֹר
  chosen: clean / unclean
  alternatives:
  - pure / impure
  lexicon: HALOT
  rationale: In Levitical food and holiness regulations, 'clean/unclean' is the established
    and clearest ritual-category language in English. 'Pure/impure' is possible but
    less idiomatic in these lists.
- source_word: הָעוֹף
  chosen: bird
  alternatives:
  - flying creature
  - fowl
  lexicon: HALOT
  rationale: Though עוֹף can denote flying creatures more broadly, in this dietary
    context 'bird' is the most natural English rendering. 'Fowl' is dated; 'flying
    creature' is overly broad here.
- source_word: וְלֹא תְשַׁקְּצוּ
  chosen: you shall not make yourselves detestable
  alternatives:
  - you shall not make yourselves abominable
  - you shall not defile yourselves
  lexicon: HALOT
  rationale: Piel of שׁקץ is related to making something abhorrent/detestable. 'Make
    yourselves detestable' preserves the reflexive force with the same semantic field
    as the root. 'Defile yourselves' is interpretive and blurs distinction from טמא
    language already present in the verse.
- source_word: אֶת נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  - your persons
  lexicon: HALOT
  rationale: נפשׁ in this construction refers to the persons themselves, not an immaterial
    'soul' in a later technical sense. 'Yourselves' is idiomatic and avoids misleading
    anthropology.
- source_word: בַּבְּהֵמָה וּבָעוֹף
  chosen: by animal or by bird
  alternatives:
  - with animal or bird
  - through animal or bird
  lexicon: HALOT
  rationale: The preposition marks the means/instrument associated with making themselves
    detestable through prohibited contact/consumption. 'By' is concise and natural.
- source_word: וּבְכֹל אֲשֶׁר תִּרְמֹשׂ הָאֲדָמָה
  chosen: or by anything that creeps on the ground
  alternatives:
  - or by every creeping thing on the ground
  - or by anything that swarms on the earth
  lexicon: HALOT
  rationale: רמשׂ denotes creeping/moving close to the ground. 'Anything that creeps
    on the ground' is natural English and suitably broad. 'Swarms' would suggest a
    different nuance often associated with שׁרץ.
- source_word: אֲשֶׁר הִבְדַּלְתִּי לָכֶם
  chosen: which I have set apart for you
  alternatives:
  - which I have separated for you
  - which I have distinguished for you
  lexicon: HALOT
  rationale: The same בדל root is retained conceptually. 'Set apart for you' reads
    naturally in English while preserving divine designation of categories for Israel.
- source_word: לְטַמֵּא
  chosen: as unclean
  alternatives:
  - to be unclean
  - for uncleanness
  lexicon: HALOT
  rationale: 'Infinitive with ל here expresses result/designation: God has marked
    these creatures for Israel as unclean. ''As unclean'' communicates the classificatory
    sense more clearly than a wooden infinitive.'
