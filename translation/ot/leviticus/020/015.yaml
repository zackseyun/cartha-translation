- issue: Gender specificity of the offender
  chosen_reading: 'male-specific: ''a man'''
  alternative_readings:
  - gender-generic 'a person'
  rationale: The verse explicitly addresses a male offender, with the next verse treating
    the female case separately. Rendering it generically would blur the source text's
    structure and legal specificity.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
