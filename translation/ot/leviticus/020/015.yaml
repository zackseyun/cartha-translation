id: LEV.20.15
reference: Leviticus 20:15
source:
  edition: WLC
  text: וְ/אִ֗ישׁ אֲשֶׁ֨ר יִתֵּ֧ן שְׁכָבְתּ֛/וֹ בִּ/בְהֵמָ֖ה מ֣וֹת יוּמָ֑ת וְ/אֶת
    הַ/בְּהֵמָ֖ה תַּהֲרֹֽגוּ־׃
translation:
  text: If a man has sexual intercourse with an animal, he must surely be put to death,
    and you shall kill the animal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'gives his lying with an animal,' a Hebrew idiom for sexual intercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine singular and here refers specifically
    to a male offender, especially since the following verse addresses a woman separately.
    Per the translation philosophy, a gender-accurate rendering is preferred over
    a gender-neutral one.
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: Although formally a relative particle ('who/that'), in casuistic legal
    style the clause is most naturally rendered in English as 'if a man...' to communicate
    the conditional force idiomatically.
- source_word: יִתֵּן שְׁכָבְתּוֹ
  chosen: has sexual intercourse
  alternatives:
  - lies with
  - gives his lying
  lexicon: HALOT
  rationale: Literally, the idiom is 'gives his lying/bed with.' 'Has sexual intercourse'
    conveys the sexual act clearly in contemporary English without wooden obscurity.
    'Lies with' is possible but less explicit for modern readers.
- source_word: בִּבְהֵמָה
  chosen: with an animal
  alternatives:
  - with a beast
  lexicon: HALOT
  rationale: בְּהֵמָה denotes an animal/beast. 'Animal' is clearer and more natural
    in modern English than 'beast,' while preserving the legal prohibition against
    bestiality.
- source_word: מוֹת יוּמָת
  chosen: he must surely be put to death
  alternatives:
  - he shall surely be put to death
  - he must be executed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the penalty. 'Must
    surely be put to death' preserves both the legal force and the emphatic construction
    better than a flatter rendering.
- source_word: וְאֶת־הַבְּהֵמָה תַּהֲרֹגוּ
  chosen: and you shall kill the animal
  alternatives:
  - and the animal you shall kill
  - and you must kill the animal
  lexicon: HALOT
  rationale: The direct-object marker plus fronted object is naturally rendered in
    English with standard word order. The second person plural verb addresses the
    covenant community/judicial authorities. 'Kill' is the plain sense of the verb.
