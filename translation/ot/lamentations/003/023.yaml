theological_decisions:
- issue: Implied subject carried from the previous verse
  chosen_reading: They are new every morning
  alternative_readings:
  - It is new every morning
  rationale: The Hebrew verse begins with an adjective lacking an explicit subject;
    the antecedent is supplied from 3:22, most naturally the plural 'mercies/compassions.'
    English requires an explicit subject, and the plural 'they' best reflects the
    immediate context.
  doctrine_reference: Translation philosophy §1, §3, §6
