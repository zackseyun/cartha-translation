id: LAM.3.23
reference: Lamentations 3:23
source:
  edition: WLC
  text: חֲדָשִׁים֙ לַ/בְּקָרִ֔ים רַבָּ֖ה אֱמוּנָתֶֽ/ךָ׃
translation:
  text: They are new every morning; great is your faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It is new every morning,' if the implied subject is taken more collectively
      from the previous line.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲדָשִׁים
  chosen: new
  alternatives:
  - fresh
  - renewed
  lexicon: HALOT
  rationale: Plural adjective meaning 'new' or 'fresh.' Rendered 'new' in idiomatic
    English, with the implied subject carried over from the previous verse ('the LORD's
    mercies/compassions').
- source_word: לַבְּקָרִים
  chosen: every morning
  alternatives:
  - in the mornings
  - morning by morning
  lexicon: HALOT
  rationale: The noun בֹּקֶר with prefixed ל marks time, literally 'for the mornings'
    or 'in the mornings.' 'Every morning' gives natural English while preserving the
    iterative sense.
- source_word: רַבָּה
  chosen: great
  alternatives:
  - abundant
  - many
  lexicon: HALOT
  rationale: Adjective from רבה meaning 'much, many, great.' With the abstract noun
    that follows, 'great' is the most idiomatic predicate in English.
- source_word: אֱמוּנָתֶךָ
  chosen: your faithfulness
  alternatives:
  - your steadfastness
  - your fidelity
  lexicon: HALOT
  rationale: אֱמוּנָה denotes firmness, reliability, faithfulness. In reference to
    God, 'faithfulness' best captures covenant reliability without overnarrowing to
    mere subjective belief.
