id: LAM.3.24
reference: Lamentations 3:24
source:
  edition: WLC
  text: חֶלְקִ֤/י יְהוָה֙ אָמְרָ֣ה נַפְשִׁ֔/י עַל כֵּ֖ן אוֹחִ֥יל לֽ/וֹ־׃ס
translation:
  text: “The LORD is my portion,” says my soul; “therefore I will hope in him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD is my share' or 'The LORD is my inheritance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'therefore I will wait for him' or 'therefore I will wait expectantly
      for him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְקִי
  chosen: my portion
  alternatives:
  - my share
  - my inheritance
  lexicon: HALOT
  rationale: חֵלֶק commonly denotes a portion, share, or allotted inheritance. 'My
    portion' preserves the covenantal and devotional sense familiar in Hebrew poetry
    without over-specifying legal inheritance language.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: אָמְרָה
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically qatal ('she said'), in direct-speech framing
    Hebrew often uses the perfect for a present-like reporting sense. 'Says' reads
    naturally in English and fits the ongoing confessional force of the verse.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the speaker's inner self. 'My soul' preserves the
    poetic and theological register of the Hebrew better than a flattened paraphrase,
    while not implying a technical anthropology beyond the text.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so then
  lexicon: HALOT
  rationale: This idiom marks inference or consequence. 'Therefore' is concise and
    preserves the logical connection between confession and response.
- source_word: אוֹחִיל
  chosen: I will hope
  alternatives:
  - I will wait
  - I will wait expectantly
  lexicon: HALOT
  rationale: The Hiphil of יחל can denote waiting in hope or hoping expectantly. 'I
    will hope' is the most natural concise English rendering here, while the nuance
    of waiting is preserved as an alternative.
- source_word: לוֹ
  chosen: in him
  alternatives:
  - for him
  - on him
  lexicon: HALOT
  rationale: With יחל, the preposition can be represented idiomatically in English
    as 'hope in him.' This best communicates personal trust directed toward the LORD
    rather than mere waiting 'for' him.
