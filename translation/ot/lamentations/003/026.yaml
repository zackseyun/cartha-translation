id: LAM.3.26
reference: Lamentations 3:26
source:
  edition: WLC
  text: ט֤וֹב וְ/יָחִיל֙ וְ/דוּמָ֔ם לִ/תְשׁוּעַ֖ת יְהוָֽה׃
translation:
  text: It is good to wait quietly for the salvation of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It is good to hope and be silent for the LORD’s salvation'; the Hebrew
      verb can carry the sense of hopeful waiting, and 'quietly' may also be rendered
      'in silence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is good
  alternatives:
  - Good
  - It is good that
  lexicon: HALOT
  rationale: 'The adjective functions predicatively in this verbless clause. Supplying
    ''It is'' yields natural English while preserving the evaluative force: the statement
    declares something beneficial or fitting.'
- source_word: יָחִיל
  chosen: to wait
  alternatives:
  - to hope
  - to wait expectantly
  lexicon: HALOT
  rationale: From יחל, the sense includes hoping and waiting with expectation. In
    this context, paired with 'for the salvation of the LORD,' English 'wait' best
    captures the posture, while the hopeful nuance remains implicit. 'Wait expectantly'
    is possible but too expansive for the main text.
- source_word: דוּמָם
  chosen: quietly
  alternatives:
  - in silence
  - silently
  lexicon: HALOT
  rationale: The adverb conveys stillness or silence. 'Quietly' reads naturally in
    English and fits the adverbial relation to 'wait.' 'In silence' is more formally
    literal and is preserved as an alternative.
- source_word: לִתְשׁוּעַת
  chosen: for the salvation
  alternatives:
  - for deliverance
  - for victory
  lexicon: HALOT
  rationale: תְּשׁוּעָה can denote salvation or deliverance. 'Salvation' is appropriate
    here because the object is from the LORD and the term carries both immediate and
    broader theological resonance. 'Deliverance' is a viable contextual alternative
    but narrower.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated translation
    policy.
