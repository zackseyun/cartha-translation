id: LAM.3.49
reference: Lamentations 3:49
source:
  edition: WLC
  text: עֵינִ֧/י נִגְּרָ֛ה וְ/לֹ֥א תִדְמֶ֖ה מֵ/אֵ֥ין הֲפֻגֽוֹת׃
translation:
  text: My eye runs down and does not cease, without interruption,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My eye flows and is not still, without respite.' The Hebrew verb rendered
      'cease' can also carry the sense 'be still,' and the final noun can be rendered
      'pause,' 'respite,' or 'relief.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינִי
  chosen: My eye
  alternatives:
  - My eyes
  lexicon: HALOT
  rationale: Singular with 1cs suffix in Hebrew. English can retain the singular idiomatically
    in poetic lament, referring to the eye as the organ of weeping. 'My eyes' is possible
    as a smoothing translation but is less formally aligned to the singular source.
- source_word: נִגְּרָה
  chosen: runs down
  alternatives:
  - flows
  - pours down
  - streams
  lexicon: HALOT
  rationale: From נגר, used of flowing or streaming downward. In context of the eye,
    it denotes tears running down. 'Runs down' preserves the concrete verbal image
    without over-specifying 'tears' absent from the Hebrew.
- source_word: וְלֹא
  chosen: and does not
  alternatives:
  - and not
  rationale: Standard conjunction plus negation. 'And does not' gives natural English
    syntax while preserving the additive force.
- source_word: תִדְמֶה
  chosen: cease
  alternatives:
  - be still
  - grow numb
  - rest
  lexicon: HALOT
  rationale: The verb דמה can mean be still, cease, or be silent. In parallel with
    the eye flowing, the sense is that the weeping does not stop. 'Cease' best captures
    the contextual force in contemporary English.
- source_word: מֵאֵין
  chosen: without
  alternatives:
  - from there being no
  - for lack of
  lexicon: HALOT
  rationale: The preposition plus negative existential forms an idiom meaning 'without'
    or 'for lack of.' Here it introduces the absence of any pause in the weeping.
- source_word: הֲפֻגוֹת
  chosen: interruption
  alternatives:
  - pause
  - respite
  - relief
  lexicon: HALOT
  rationale: Plural noun from a root conveying slackening or pause. In this context
    it refers to breaks or respites in crying. 'Interruption' fits the flow of the
    line and pairs well with 'does not cease.'
