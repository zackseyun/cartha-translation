id: LAM.3.4
reference: Lamentations 3:4
source:
  edition: WLC
  text: בִּלָּ֤ה בְשָׂרִ/י֙ וְ/עוֹרִ֔/י שִׁבַּ֖ר עַצְמוֹתָֽ/י׃
translation:
  text: He has worn away my flesh and my skin; he has broken my bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has wasted away my flesh and my skin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלָּה
  chosen: has worn away
  alternatives:
  - has wasted away
  - has consumed
  lexicon: HALOT
  rationale: The Piel form of בלה conveys wearing out or causing to waste away. 'Has
    worn away' preserves the concrete bodily imagery and fits the lament context better
    than the more interpretive 'has consumed.'
- source_word: בְשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: '''Flesh'' is the most direct rendering of בשר and preserves the physical,
    visceral sense of the Hebrew. ''Body'' is smoother English but less textually
    precise.'
- source_word: וְעוֹרִי
  chosen: and my skin
  alternatives:
  - and my hide
  lexicon: HALOT
  rationale: עור plainly denotes 'skin.' Rendering it literally preserves the parallelism
    with 'my flesh' and the graphic bodily deterioration described.
- source_word: שִׁבַּר
  chosen: has broken
  alternatives:
  - has shattered
  lexicon: HALOT
  rationale: שבר commonly means 'break.' 'Has broken' is the natural English equivalent
    and avoids overstating the violence beyond what the verb itself requires.
- source_word: עַצְמוֹתַי
  chosen: my bones
  lexicon: HALOT
  rationale: A straightforward literal rendering that preserves the bodily metaphor
    and poetic intensity.
