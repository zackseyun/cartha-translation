theological_decisions:
- issue: Divine title rendering
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The Hebrew uses אֲדֹנָי, not the Tetragrammaton. The project default
    for κύριος/Kyrios as 'Lord' supports rendering the divine title as 'Lord' in English.
    'The Lord' is preferred here for idiomatic English syntax and does not import
    covenant-name distinctions not present in the source.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for κύριος/Kyrios → Lord'
