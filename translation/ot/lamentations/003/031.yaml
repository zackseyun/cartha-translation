id: LAM.3.31
reference: Lamentations 3:31
source:
  edition: WLC
  text: כִּ֣י לֹ֥א יִזְנַ֛ח לְ/עוֹלָ֖ם אֲדֹנָֽ/י׃
translation:
  text: For the Lord will not reject forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast off' or 'forsake.' The Hebrew verb can denote rejecting, spurning,
      or casting off.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the surrounding exhortation/context.
    'For' best preserves the connective force in natural English without over-specifying
    whether it is strictly causal ('because') or asseverative ('indeed').
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation directly modifying the verb; no expansion is warranted.
- source_word: יִזְנַח
  chosen: will reject
  alternatives:
  - will cast off
  - will forsake
  - will spurn
  lexicon: HALOT
  rationale: The verb זנח commonly carries the sense of rejecting, casting off, or
    spurning. 'Reject' is clear modern English and fits the relational context of
    divine displeasure without implying permanent abandonment beyond what the following
    'forever' already addresses.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for all time
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring duration. In this context, paired with negation,
    it means the Lord's rejection is not permanent. 'Forever' is idiomatic modern
    English and preserves the temporal force.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: 'אֲדֹנָי is the divine title ''Lord.'' Following the project''s default
    for lordship titles, it is translated rather than transliterated. Including the
    article in English yields the most natural sentence in this context: ''the Lord
    will not reject forever.'''
