id: LAM.3.60
reference: Lamentations 3:60
source:
  edition: WLC
  text: רָאִ֨יתָה֙ כָּל נִקְמָתָ֔/ם כָּל מַחְשְׁבֹתָ֖/ם לִֽ/י־־׃ס
translation:
  text: You have seen all their vengeance, all their schemes against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their plans concerning me.' The Hebrew phrase can be rendered more
      neutrally, but the hostile context supports 'schemes against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתָה
  chosen: You have seen
  alternatives:
  - You saw
  - You have looked upon
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה addressed to God; English present perfect fits
    the lament context, expressing completed action with present relevance. 'Seen'
    is the plain sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Used twice for totality; 'all' is the most natural and direct rendering
    in English.
- source_word: נִקְמָתָם
  chosen: their vengeance
  alternatives:
  - their revenge
  - their acts of vengeance
  lexicon: HALOT
  rationale: From נקמה, denoting vengeance or avenging action. 'Vengeance' preserves
    the force better than the more colloquial 'revenge.' The suffix marks third person
    plural, referring to the enemies.
- source_word: מַחְשְׁבֹתָם
  chosen: their schemes
  alternatives:
  - their plans
  - their thoughts
  - their devices
  lexicon: HALOT
  rationale: מחשבות can mean thoughts, plans, or devices. In this hostile context,
    'schemes' best captures malicious intent without over-paraphrasing.
- source_word: לִי
  chosen: against me
  alternatives:
  - concerning me
  - toward me
  lexicon: HALOT
  rationale: The preposition ל can mark relation or direction. Given the adversarial
    context of enemies' vengeance and plotting, 'against me' makes the implied hostility
    explicit in idiomatic English.
