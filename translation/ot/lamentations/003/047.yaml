id: LAM.3.47
reference: Lamentations 3:47
source:
  edition: WLC
  text: פַּ֧חַד וָ/פַ֛חַת הָ֥יָה לָ֖/נוּ הַ/שֵּׁ֥את וְ/הַ/שָּֽׁבֶר׃
translation:
  text: Terror and pitfall have come upon us, devastation and destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear and the pit.' The Hebrew echoes a known judgment formula (compare
      Isa 24:17), preserving both dread and entrapment imagery.
    reason: cross_reference
  - marker: b
    text: Or 'desolation and ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחַד
  chosen: terror
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: The noun denotes fear or terror. 'Terror' fits the lament context and
    pairs well with the following calamity term, conveying an objective experience
    of horror rather than merely an internal feeling.
- source_word: וָפַחַת
  chosen: pitfall
  alternatives:
  - pit
  - trap
  lexicon: HALOT
  rationale: This noun commonly denotes a pit or snare-like danger. 'Pitfall' preserves
    the wordplay/alliterative pairing with פַּחַד and reflects a calamity that overtakes
    the speaker. 'Trap' is possible, but 'pitfall' better matches the traditional
    pairing in prophetic judgment language.
- source_word: הָיָה לָנוּ
  chosen: have come upon us
  alternatives:
  - have been ours
  - were for us
  - came to us
  lexicon: HALOT
  rationale: Although literally 'has been to/for us,' the idiom in context expresses
    the arrival or experience of these calamities. 'Have come upon us' is natural
    English and captures the force without excessive paraphrase.
- source_word: הַשֵּׁאת
  chosen: devastation
  alternatives:
  - waste
  - desolation
  lexicon: HALOT
  rationale: The noun refers to ruin or desolation. 'Devastation' is idiomatic modern
    English and suitably weighty in parallel with the following term.
- source_word: וְהַשָּׁבֶר
  chosen: destruction
  alternatives:
  - breaking
  - ruin
  - crash
  lexicon: HALOT
  rationale: From the root 'to break,' the noun here denotes breaking in the sense
    of collapse or ruin. 'Destruction' communicates the result clearly in English
    and forms a strong parallel with 'devastation'.
