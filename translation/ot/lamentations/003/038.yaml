id: LAM.3.38
reference: Lamentations 3:38
source:
  edition: WLC
  text: מִ/פִּ֤י עֶלְיוֹן֙ לֹ֣א תֵצֵ֔א הָ/רָע֖וֹת וְ/הַ/טּֽוֹב׃
translation:
  text: Do not both calamities and good come from the mouth of the Most High?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil' or 'disasters'; the Hebrew רָעוֹת can denote harmful or adverse
      things broadly. Here 'calamities' is used to avoid implying moral evil as such.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/פִּי
  chosen: from the mouth of
  alternatives:
  - from
  - by the command of
  lexicon: HALOT
  rationale: The idiom literally refers to the mouth as the source of utterance or
    decree. Retaining 'mouth' preserves the Hebrew imagery and the sense of origination
    from divine speech or command.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the Highest
  lexicon: HALOT
  rationale: A standard rendering for the divine title עֶלְיוֹן that is both recognizable
    and faithful to the Hebrew superlative sense.
- source_word: לֹא
  chosen: Do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: 'Although formally a negation, in context with the following verb and
    the broader discourse it functions rhetorically, yielding an English interrogative:
    ''Do not ... come?'' This reflects the verse''s sense in context rather than a
    flat denial.'
- source_word: תֵצֵא
  chosen: come
  alternatives:
  - go out
  - proceed
  - come forth
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'go out' or 'come forth.' In idiomatic
    English with 'from the mouth,' 'come' best communicates emergence from a source
    without sounding wooden.
- source_word: הָ/רָעוֹת
  chosen: calamities
  alternatives:
  - evils
  - disasters
  - bad things
  lexicon: HALOT
  rationale: רָעוֹת can denote moral evil or experiential adversity. In this context,
    to avoid implying that God authors moral evil, 'calamities' captures the sense
    of harmful events or afflictions that come under divine sovereignty.
- source_word: וְ/הַ/טּוֹב
  chosen: and good
  alternatives:
  - and prosperity
  - and what is good
  lexicon: HALOT
  rationale: The singular adjective used substantivally is naturally rendered 'good.'
    This balances the preceding plural 'calamities' and preserves the broad category
    of beneficial outcomes.
