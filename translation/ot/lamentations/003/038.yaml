theological_decisions:
- issue: Whether רָעוֹת should be rendered in a way that suggests moral evil or adverse
    events
  chosen_reading: Rendered as 'calamities' rather than 'evil'
  alternative_readings:
  - evil
  - disaster
  - bad things
  rationale: The verse affirms that both adverse and favorable outcomes fall under
    the sovereignty of the Most High. In English, 'evil' would commonly imply moral
    evil and could import a doctrinal claim the Hebrew does not require here. 'Calamities'
    preserves the text's assertion about affliction/judgment without overstating divine
    causation of moral evil.
  doctrine_reference: Affirmations; Translation philosophy items 1, 3, and 6
- issue: Whether to preserve the verse as a rhetorical question rather than a declarative
    negation
  chosen_reading: Rendered as a rhetorical question
  alternative_readings:
  - From the mouth of the Most High do not come calamities and good.
  rationale: 'Within the immediate context (Lam 3:37–39), the sense is rhetorical:
    nothing happens apart from the Lord''s command, and both adversity and good are
    under his rule. English communicates this most clearly as a rhetorical question.'
  doctrine_reference: Translation philosophy items 1 and 6
