id: LAM.3.3
reference: Lamentations 3:3
source:
  edition: WLC
  text: אַ֣ךְ בִּ֥/י יָשֻׁ֛ב יַהֲפֹ֥ךְ יָד֖/וֹ כָּל הַ/יּֽוֹם־׃ס
translation:
  text: Surely against me he turns his hand again and again all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Surely against me he turns back; he turns his hand all day long.' The
      Hebrew uses two consecutive verbs ('turns/returns' and 'turns/overturns'), which
      may be rendered more formally or with an iterative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - Surely/indeed
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative particle introducing emphatic
    complaint, not a restrictive 'only.' 'Surely' captures the force naturally in
    English.
- source_word: בִּי
  chosen: against me
  alternatives:
  - on me
  - at me
  - to me
  lexicon: HALOT
  rationale: With hostile action in context, the preposition ב plus 1cs pronoun is
    best rendered 'against me,' making explicit the adversative force implied by the
    verbs of repeated attack.
- source_word: יָשֻׁב
  chosen: turns ... again and again
  alternatives:
  - returns
  - turns back
  - turns again
  lexicon: HALOT
  rationale: 'שׁוּב in sequence with the following verb conveys repeated action: ''he
    turns/returns.'' Because English can express the repetition more idiomatically
    with ''again and again'' distributed over the clause, the iterative sense is preserved
    without wooden repetition.'
- source_word: יַהֲפֹךְ
  chosen: turns
  alternatives:
  - turns against
  - overturns
  - turns back
  lexicon: HALOT
  rationale: הפך literally means 'turn/overturn.' With 'his hand' as object, the idiom
    denotes turning the hand against someone, i.e., repeated hostile action. 'Turns
    his hand' preserves the metaphor while remaining intelligible.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his power
  - his blow
  lexicon: HALOT
  rationale: The Hebrew uses the concrete noun 'hand,' a common figure for power or
    action. The main text keeps the image rather than interpreting it away.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  - all day
  lexicon: HALOT
  rationale: An idiomatic English rendering of the temporal phrase that preserves
    the sense of unrelenting duration.
