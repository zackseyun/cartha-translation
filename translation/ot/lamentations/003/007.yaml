id: LAM.3.7
reference: Lamentations 3:7
source:
  edition: WLC
  text: גָּדַ֧ר בַּעֲדִ֛/י וְ/לֹ֥א אֵצֵ֖א הִכְבִּ֥יד נְחָשְׁתִּֽ/י׃
translation:
  text: He has walled me in so that I cannot get out; he has made my bronze chain
    heavy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my bronze fetter' or simply 'my chain.' The Hebrew term is related to
      'bronze' and likely refers to a metal restraint.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדַר
  chosen: has walled ... in
  alternatives:
  - has fenced in
  - has blocked in
  - has enclosed
  lexicon: HALOT
  rationale: The verb means to wall up, fence, or enclose. 'Walled me in' is vivid,
    natural English and preserves the image of confinement better than a more abstract
    rendering.
- source_word: בַּעֲדִי
  chosen: me
  alternatives:
  - around me
  - behind me
  - against me
  lexicon: HALOT
  rationale: With גָּדַר, the preposition plus pronoun expresses enclosure affecting
    the speaker. In idiomatic English, 'walled me in' captures the force without awkwardly
    retaining the preposition.
- source_word: וְלֹא אֵצֵא
  chosen: so that I cannot get out
  alternatives:
  - and I cannot go out
  - and I cannot escape
  lexicon: HALOT
  rationale: The Hebrew is literally 'and I do not/cannot go out.' English idiom favors
    'cannot get out' in a confinement context. This preserves the result of the enclosure
    without over-paraphrasing.
- source_word: הִכְבִּיד
  chosen: has made ... heavy
  alternatives:
  - has weighed down
  - has made burdensome
  lexicon: HALOT
  rationale: The Hiphil of כבד here means to make heavy. 'Has made ... heavy' is straightforward
    and preserves the concrete imagery.
- source_word: נְחָשְׁתִּי
  chosen: my bronze chain
  alternatives:
  - my bronze fetter
  - my chain
  - my shackles
  lexicon: HALOT
  rationale: The noun derives from 'bronze/copper' and in context likely refers metonymically
    to a bronze restraint or chain. 'Bronze chain' keeps the material image explicit
    and fits the imprisonment metaphor of the verse. Because the exact object may
    be understood more generally as a fetter, that alternative is preserved in a footnote.
