id: LAM.3.6
reference: Lamentations 3:6
source:
  edition: WLC
  text: בְּ/מַחֲשַׁכִּ֥ים הוֹשִׁיבַ֖/נִי כְּ/מֵתֵ֥י עוֹלָֽם׃ס
translation:
  text: He has made me dwell in darkness like those long dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has seated me in dark places like the dead of old.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַחֲשַׁכִּים
  chosen: in darkness
  alternatives:
  - in dark places
  - in the darkness
  lexicon: HALOT
  rationale: 'The plural noun with prefixed ב conveys location: ''in darkness'' or
    ''in dark places.'' English idiom favors the collective singular ''in darkness''
    while preserving the image of being confined in a realm of gloom.'
- source_word: הוֹשִׁיבַנִי
  chosen: He has made me dwell
  alternatives:
  - he has seated me
  - he has made me sit
  - he has settled me
  lexicon: HALOT
  rationale: 'Hiphil of ישׁב with 1cs suffix is causative: ''cause me to sit/dwell.''
    In context of imposed confinement, ''has made me dwell'' communicates forced placement
    more naturally than the more wooden ''has seated me.'' The perfect is rendered
    with English present perfect to match the lament''s experiential force.'
- source_word: כְּמֵתֵי
  chosen: like those long dead
  alternatives:
  - like the dead
  - like dead ones
  lexicon: HALOT
  rationale: The comparative כ plus construct plural of 'dead' introduces a simile.
    Because the following עוֹלָם intensifies duration, 'those long dead' captures
    both the dead state and the sense of ancient or enduring death.
- source_word: עוֹלָם
  chosen: long
  alternatives:
  - of old
  - forever
  - ancient
  lexicon: HALOT
  rationale: עוֹלָם can denote remote antiquity or enduring duration depending on
    context. Here with 'dead' it likely means those dead from long ago, not metaphysical
    eternity. Rendering the phrase as 'those long dead' is idiomatic and contextually
    precise.
