theological_decisions:
- issue: Whether to preserve juridical and redemption imagery distinctly across the
    two cola
  chosen_reading: Retain legal language in the first colon ('defended the cause')
    and redemption language in the second ('redeemed my life')
  alternative_readings:
  - Flatten both cola into general deliverance language such as 'helped me' and 'saved
    me'
  rationale: 'The Hebrew uses two distinct verbs and images: legal advocacy (ריב)
    and redemption/deliverance (גאל). Preserving both maintains the poetic and theological
    richness without importing later doctrinal specificity beyond the text.'
  doctrine_reference: Translation philosophy §§1, 3, 5
