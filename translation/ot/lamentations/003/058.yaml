id: LAM.3.58
reference: Lamentations 3:58
source:
  edition: WLC
  text: רַ֧בְתָּ אֲדֹנָ֛/י רִיבֵ֥י נַפְשִׁ֖/י גָּאַ֥לְתָּ חַיָּֽ/י׃
translation:
  text: You have defended the cause of my soul, Lord; you have redeemed my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have pleaded the case of my soul' or 'You have contended for my
      life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבְתָּ
  chosen: have defended
  alternatives:
  - have pleaded
  - have contended for
  - have taken up
  lexicon: HALOT
  rationale: From ריב in the Qal, here with רִיבֵי as its object, the sense is legal
    advocacy or conducting a case. 'Defended' communicates that the Lord has taken
    up the speaker's cause in a juridical setting, in natural English. 'Pleaded' is
    possible but can sound weaker or ambiguous in modern English.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: The form is the divine title אֲדֹנָי. Following the doctrine's default
    for divine titles, it is translated 'Lord.' Although the form historically includes
    a first-person suffix, in usage it functions as the reverential divine title rather
    than a possessive expression, so 'my Lord' is not preferred in the main text.
- source_word: רִיבֵי
  chosen: the cause
  alternatives:
  - the disputes
  - the case
  - the contentions
  lexicon: HALOT
  rationale: 'Plural of רִיב, likely an abstract/intensive or collective plural in
    context: the speaker''s legal grievances/case. English idiom prefers singular
    collective ''the cause'' with ''defended'' rather than a wooden plural ''causes''
    or ''disputes.'''
- source_word: נַפְשִׁי
  chosen: of my soul
  alternatives:
  - of my life
  - of me
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or person. Here 'cause of my soul'
    preserves the Hebrew expression and its emotional depth. Since the second colon
    uses חַיַּי ('my life'), rendering נַפְשִׁי also as 'my life' would blur the poetic
    distinction.
- source_word: גָּאַלְתָּ
  chosen: have redeemed
  alternatives:
  - have rescued
  - have ransomed
  - have reclaimed
  lexicon: HALOT
  rationale: גאל carries the sense of acting as redeemer/kinsman-redeemer, delivering
    or reclaiming what belongs to one. 'Redeemed' best preserves the covenantal and
    theological weight without over-paraphrasing.
- source_word: חַיָּי
  chosen: my life
  alternatives:
  - my living being
  - my life-breath
  lexicon: HALOT
  rationale: Plural form used idiomatically for 'life.' 'My life' is the natural English
    equivalent and pairs well with 'redeemed.'
