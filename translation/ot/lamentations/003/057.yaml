theological_decisions:
- issue: Addressee and speaker identification
  chosen_reading: 'The verse is rendered as direct address to God: ''You came near
    ... you said.'''
  alternative_readings:
  - An impersonal or unspecified 'one came near' is grammatically less likely in context
  rationale: The 2ms verbal forms clearly indicate a singular masculine addressee,
    and within the surrounding prayer context this is best understood as God. The
    translation preserves the relational immediacy of the Hebrew without importing
    further doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3
