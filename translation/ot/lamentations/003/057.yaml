id: LAM.3.57
reference: Lamentations 3:57
source:
  edition: WLC
  text: קָרַ֨בְתָּ֙ בְּ/י֣וֹם אֶקְרָאֶ֔/ךָּ אָמַ֖רְתָּ אַל תִּירָֽא־׃ס
translation:
  text: You came near on the day I called to you; you said, “Do not fear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You drew near on the day I cried out to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרַבְתָּ
  chosen: You came near
  alternatives:
  - You drew near
  - You approached
  lexicon: HALOT
  rationale: Qal perfect 2ms of קרב, addressed to God in context. 'Came near' is natural
    modern English and preserves the concrete sense of nearness without overinterpreting
    it.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: HALOT
  rationale: The preposition ב with יוֹם is most naturally temporal here. 'On the
    day' keeps the Hebrew idiom more closely than the smoother but less formal 'when'.
- source_word: אֶקְרָאֶךָּ
  chosen: I called to you
  alternatives:
  - I call to you
  - I cried out to you
  lexicon: HALOT
  rationale: From קרא, 1cs with 2ms suffix. In this poetic context it denotes calling
    out to God. English past tense fits the surrounding perfects in translation and
    reads naturally. 'Called to you' is broad enough to include prayerful crying out
    without adding intensity not explicit in the verb alone.
- source_word: אָמַרְתָּ
  chosen: you said
  alternatives:
  - you spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר. 'Said' is the most direct and idiomatic choice.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Negative particle used with a following imperfect/jussive for prohibition.
    'Do not' best represents the force without exaggeration.
- source_word: תִּירָא
  chosen: fear
  alternatives:
  - be afraid
  lexicon: HALOT
  rationale: From ירא, 2ms imperfect/jussive after אַל. 'Do not fear' is a standard
    and transparent rendering; 'be afraid' is possible but slightly more interpretive
    in tone.
