id: LAM.3.8
reference: Lamentations 3:8
source:
  edition: WLC
  text: גַּ֣ם כִּ֤י אֶזְעַק֙ וַ/אֲשַׁוֵּ֔עַ שָׂתַ֖ם תְּפִלָּתִֽ/י׃
translation:
  text: Even when I cry out and call for help, he shuts out my prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Even though I cry out and cry for help, he blocks my prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם כִּי
  chosen: Even when
  alternatives:
  - Even though
  - Indeed when
  lexicon: HALOT
  rationale: 'The combination intensifies a concessive sense in context: despite the
    speaker''s crying out, the following action still occurs. ''Even when'' is natural
    English and preserves the lament''s force better than a more wooden rendering.'
- source_word: אֶזְעַק
  chosen: I cry out
  alternatives:
  - I call out
  - I cry
  lexicon: HALOT
  rationale: זעק commonly denotes a strong cry, often in distress. 'Cry out' preserves
    the intensity and prayerful distress of the lament.
- source_word: וַאֲשַׁוֵּעַ
  chosen: and call for help
  alternatives:
  - and plead
  - and cry for help
  lexicon: HALOT
  rationale: שׁוע in the Piel conveys a desperate plea for aid. Rendering it distinctly
    from זעק avoids flattening the parallelism while keeping the sense accessible
    in modern English.
- source_word: שָׂתַם
  chosen: he shuts out
  alternatives:
  - he blocks
  - he closes off
  - he shuts up
  lexicon: HALOT
  rationale: The verb means to stop up or block. With 'my prayer' as object, 'shuts
    out' communicates that the prayer is obstructed from reaching its destination,
    which fits the lament context and reads idiomatically in English.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: The noun straightforwardly means 'prayer.' 'My prayer' is the most direct
    and contextually appropriate rendering.
