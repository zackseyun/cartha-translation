theological_decisions:
- issue: Implicit subject of 'he shuts out'
  chosen_reading: Retain the masculine singular pronoun 'he' without explicitly supplying
    'God' or 'the Lord.'
  alternative_readings:
  - Explicitly identify the subject as God
  - Use a passive rendering such as 'my prayer is shut out'
  rationale: The Hebrew verb is 3ms with no explicit subject in this clause, but the
    surrounding context makes the referent clear. Keeping 'he' preserves the Hebrew's
    terseness and avoids adding a divine name not present in the verse itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text states without importing more.'
