id: LAM.3.22
reference: Lamentations 3:22
source:
  edition: WLC
  text: חַֽסְדֵ֤י יְהוָה֙ כִּ֣י לֹא תָ֔מְנוּ כִּ֥י לֹא כָל֖וּ רַחֲמָֽי/ו־־׃
translation:
  text: The steadfast love of the LORD never ceases; his mercies never come to an
    end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following the vocalization more directly: ''Because of the steadfast
      love of the LORD, we are not consumed,'' or ''The steadfast loves of the LORD—that
      we are not consumed.'''
    reason: alternative_reading
lexical_decisions:
- source_word: חַסְדֵי
  chosen: steadfast love
  alternatives:
  - acts of covenant love
  - lovingkindness
  - mercies
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love rather than mere affection.
    'Steadfast love' is established, readable English that preserves the covenantal
    and enduring sense better than the broader 'love' or the archaic 'lovingkindness.'
    The plural construct can be represented idiomatically in English by the singular
    abstract noun.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
- source_word: כִּי
  chosen: never
  alternatives:
  - for
  - because
  - surely
  lexicon: HALOT
  rationale: The particle introduces the ground or explanation, but in idiomatic English
    this verse is best rendered by folding the causal force into the clause as 'never,'
    matching the sense of the negated verbal statement rather than preserving a wooden
    'for.'
- source_word: לֹא תָמְנוּ
  chosen: never ceases
  alternatives:
  - we are not consumed
  - do not come to an end
  lexicon: HALOT
  rationale: 'The consonantal text with the vocalization given yields first person
    plural ''we are not consumed,'' but the immediate parallelism with ''his mercies
    do not come to an end'' strongly supports the traditional sense that the LORD''s
    חסדים are the subject: ''do not cease/come to an end.'' This reflects the common
    ancient and versional understanding and produces tight synonymous parallelism.
    The alternative is preserved in a footnote because the Hebrew form is auditable
    and significant.'
- source_word: כִּי
  chosen: ;
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The second כִּי again marks explanation. In English, a semicolon with
    a second clause communicates the explanatory parallelism naturally without overloading
    the line with repeated 'for.'
- source_word: לֹא כָלוּ
  chosen: never come to an end
  alternatives:
  - are not finished
  - do not fail
  lexicon: HALOT
  rationale: כלה in this context means to be finished or exhausted. 'Never come to
    an end' is natural modern English and matches the poetic parallelism with 'never
    ceases.'
- source_word: רַחֲמָיו
  chosen: his mercies
  alternatives:
  - his compassion
  - his compassions
  lexicon: HALOT
  rationale: The plural form conveys repeated or abundant compassionate acts. 'Mercies'
    preserves the plural and fits the poetic pairing with חסד. 'Compassion' is possible,
    but 'mercies' better reflects the distributive plural in English Bible style while
    remaining accessible.
