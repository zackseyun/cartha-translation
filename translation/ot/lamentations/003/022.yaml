theological_decisions:
- issue: Subject and syntax of the first clause
  chosen_reading: 'The LORD''s steadfast love is the subject: ''The steadfast love
    of the LORD never ceases.'''
  alternative_readings:
  - Because of the LORD's steadfast love we are not consumed
  - The steadfast loves of the LORD—that we are not consumed
  rationale: The Hebrew form תָמְנוּ can be read as first person plural ('we are finished/consumed'),
    which underlies a well-known traditional rendering. However, the immediate synonymous
    parallelism with 'his mercies never come to an end' favors taking the first colon
    as referring to the LORD's חסדים not ceasing. This preserves the poetic balance
    and avoids importing an explicit first-person object where the line can be read
    more smoothly as a statement about divine covenant love. Because the alternative
    is longstanding and textually significant, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; document ambiguity and preserve alternatives in a footnote.'
