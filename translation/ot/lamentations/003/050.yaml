id: LAM.3.50
reference: Lamentations 3:50
source:
  edition: WLC
  text: עַד יַשְׁקִ֣יף וְ/יֵ֔רֶא יְהוָ֖ה מִ/שָּׁמָֽיִם־׃
translation:
  text: until Yahweh looks down and sees from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''looks down and sees,'' a paired expression emphasizing the LORD''s attentive observation from heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: until
  alternatives:
  - as long as
  - until such time as
  lexicon: HALOT
  rationale: Temporal preposition/conjunction marking the endpoint of the speaker's ongoing condition from the previous verse; 'until' is the natural concise English equivalent.
- source_word: יַשְׁקִיף
  chosen: looks down
  alternatives:
  - looks out
  - gazes down
  - regards
  lexicon: HALOT
  rationale: Hiphil of שׁקף commonly conveys looking down/out from an elevated place, especially heaven. 'Looks down' fits the following 'from heaven' and preserves the vertical imagery.
- source_word: וְיֵרֶא
  chosen: and sees
  alternatives:
  - and looks
  - and takes notice
  lexicon: HALOT
  rationale: Qal of ראה is the common verb 'see.' Rendering it distinctly from יַשְׁקִיף avoids collapsing the two verbs into one and preserves the poetic parallelism/intensification.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - out of heaven
  - from the sky
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, שָׁמַיִם often functions idiomatically as singular 'heaven' in English, especially in divine-observation contexts. 'From heaven' is the most natural and theologically appropriate idiomatic rendering.
