id: LAM.3.13
reference: Lamentations 3:13
source:
  edition: WLC
  text: הֵבִיא֙ בְּ/כִלְיוֹתָ֔/י בְּנֵ֖י אַשְׁפָּתֽ/וֹ׃
translation:
  text: He drove the sons of his quiver into my kidneys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the sons of his quiver'; that is, his arrows.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵבִיא
  chosen: drove
  alternatives:
  - brought
  - caused to enter
  - sent
  lexicon: HALOT
  rationale: The Hiphil of בוא here has a causative sense, with the following prepositional
    phrase indicating penetration into the speaker's body. 'Drove' conveys forceful
    causation more naturally in English than the more neutral 'brought' or 'caused
    to enter,' fitting the violent imagery of the context.
- source_word: בְּכִלְיוֹתַי
  chosen: into my kidneys
  alternatives:
  - into my inward parts
  - into my reins
  lexicon: HALOT
  rationale: כִּלְיָה literally means 'kidney' and often functions idiomatically for
    the inner self or deepest emotions. Here, because the verse depicts arrows physically
    penetrating the body, the concrete anatomical sense is primary. 'Kidneys' preserves
    the Hebrew image better than the archaic 'reins' or the interpretive 'inward parts.'
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - arrows of
  - members of
  lexicon: HALOT
  rationale: The construct 'sons of' is retained because it is the literal Hebrew
    expression and preserves the vivid idiom. In context it refers to what belongs
    to or comes from the quiver, namely arrows, but keeping 'sons of' in the main
    text maintains the poetic force and auditable connection to the source.
- source_word: אַשְׁפָּתוֹ
  chosen: his quiver
  alternatives:
  - his arrow-case
  lexicon: HALOT
  rationale: אַשְׁפָּה denotes a quiver or arrow-case. 'Quiver' is the standard, natural
    English rendering.
