theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of קוה
  chosen_reading: wait for him
  alternative_readings:
  - hope in him
  - hope for him
  rationale: The Hebrew verb carries both waiting and hoping. In Lamentations' context of patient endurance amid suffering, 'wait for him' best preserves the tension of expectant delay; the hope nuance is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological/interpretive tension where genuine ambiguity exists
