theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for יְהוָה. This preserves reverential convention without altering the verse's
    meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of קוה
  chosen_reading: wait for him
  alternative_readings:
  - hope in him
  - hope for him
  rationale: The Hebrew verb carries both waiting and hoping. In Lamentations' context
    of patient endurance amid suffering, 'wait for him' best preserves the tension
    of expectant delay; the hope nuance is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological/interpretive
    tension where genuine ambiguity exists
