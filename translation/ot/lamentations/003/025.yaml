id: LAM.3.25
reference: Lamentations 3:25
source:
  edition: WLC
  text: ט֤וֹב יְהוָה֙ לְ/קוָֹ֔/ו לְ/נֶ֖פֶשׁ תִּדְרְשֶֽׁ/נּוּ׃
translation:
  text: Yahweh is good to those who wait for him, to the soul that seeks him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who hope in him'; the Hebrew verb includes the sense of waiting with expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective predicates YHWH's character/disposition in relation to the following datives. 'Good' is the most direct and idiomatic English equivalent and preserves the broad semantic range without narrowing it to mere kindness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְקֹוָו
  chosen: to those who wait for him
  alternatives:
  - to the one who hopes in him
  - to those who hope for him
  lexicon: HALOT
  rationale: From קוה, which can denote waiting with expectant hope. In this context, 'wait for him' best captures the posture of patient expectation in lament literature while remaining natural English. The plural/generic sense is represented by 'those who' rather than a singular generic.
- source_word: לְנֶפֶשׁ
  chosen: to the soul
  alternatives:
  - to the person
  - to the life
  lexicon: HALOT
  rationale: נפש often means 'soul,' 'self,' or 'person.' Here 'soul' preserves the Hebrew idiom and poetic register of the verse. It is not used to impose a technical anthropology beyond the text.
- source_word: תִּדְרְשֶׁנּוּ
  chosen: that seeks him
  alternatives:
  - that searches for him
  - that inquires after him
  lexicon: HALOT
  rationale: דרש in the Qal commonly means 'seek' in a relational/spiritual sense when God is the object. 'Seeks him' is concise, idiomatic, and fits the parallelism with 'wait for him.' The 3fs form agrees with נפש, hence 'that seeks him'.
