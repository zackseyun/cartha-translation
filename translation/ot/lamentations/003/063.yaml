id: LAM.3.63
reference: Lamentations 3:63
source:
  edition: WLC
  text: שִׁבְתָּ֤/ם וְ/קִֽימָתָ/ם֙ הַבִּ֔יטָ/ה אֲנִ֖י מַנְגִּינָתָֽ/ם׃ס
translation:
  text: Look at their sitting down and their rising up; I am the subject of their
    song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their taunt-song' / 'their mocking song.' The Hebrew term can mean 'song'
      or 'music,' and in this context likely refers to derisive singing about the
      speaker.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְתָּם
  chosen: their sitting down
  alternatives:
  - their sitting
  - their dwelling
  lexicon: HALOT
  rationale: From ישׁב, here paired meristically with 'their rising up' to denote
    the whole range of their activity. 'Sitting down' preserves the concrete Hebrew
    idiom better than a more interpretive 'dwelling'.
- source_word: וְקִימָתָם
  chosen: and their rising up
  alternatives:
  - and their standing up
  - and their getting up
  lexicon: HALOT
  rationale: From קום, in parallel with 'sitting down.' 'Rising up' is idiomatic English
    and preserves the Hebrew pair that expresses all their movements or daily conduct.
- source_word: הַבִּיטָה
  chosen: Look at
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Imperative addressed to God in context. 'Look at' is natural modern English
    while retaining the direct appeal of the Hebrew imperative.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: 'Explicit pronoun retained for emphasis: the speaker himself is the object
    in view.'
- source_word: מַנְגִּינָתָם
  chosen: the subject of their song
  alternatives:
  - their song
  - their mocking song
  - their taunt-song
  lexicon: HALOT
  rationale: מַנְגִּינָה can denote music/song, and in this lament context it refers
    to what they sing about concerning the speaker. 'The subject of their song' makes
    explicit the relational sense conveyed by the suffix and context, while avoiding
    over-specifying 'mocking' in the main text.
