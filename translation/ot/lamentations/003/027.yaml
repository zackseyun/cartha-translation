theological_decisions:
- issue: Generic masculine reference
  chosen_reading: for a man ... in his youth
  alternative_readings:
  - for a person ... in youth
  rationale: The Hebrew uses grammatically masculine גֶּבֶר with a 3ms suffix. In
    context it functions as a representative statement, but the translation philosophy
    calls for gender-accurate rendering rather than neutralization where the source
    is masculine.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
