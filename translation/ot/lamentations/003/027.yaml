id: LAM.3.27
reference: Lamentations 3:27
source:
  edition: WLC
  text: ט֣וֹב לַ/גֶּ֔בֶר כִּֽי יִשָּׂ֥א עֹ֖ל בִּ/נְעוּרָֽי/ו־׃ס
translation:
  text: It is good for a man that he bear the yoke in his youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a person'; the Hebrew has the masculine singular 'man' used generically.
    reason: lexical_alternative
  - marker: b
    text: Or 'carry the yoke'; the image is of taking up and enduring a burden or
      discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is good
  alternatives:
  - Good
  - It is beneficial
  lexicon: HALOT
  rationale: Predicative adjective opening the clause; English idiom naturally supplies
    'It is' to express the Hebrew evaluative statement.
- source_word: לַגֶּבֶר
  chosen: for a man
  alternatives:
  - for the man
  - for a strong man
  lexicon: HALOT
  rationale: גֶּבֶר commonly denotes 'man' and can carry the nuance of a male person
    in vigor, but here functions generically. Per gender-accurate policy, 'man' is
    retained rather than neutralizing to 'person' or 'one'.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what is good: ''that he bear...''
    rather than a strong causal ''because.'' English ''that'' best captures the clause
    linkage in this context.'
- source_word: יִשָּׂא
  chosen: he bear
  alternatives:
  - he carry
  - he lift
  lexicon: HALOT
  rationale: נשא has a broad range including lift, carry, bear. With עֹל ('yoke'),
    'bear' is the most natural collocation in English and preserves the sense of enduring
    a burden.
- source_word: עֹל
  chosen: the yoke
  alternatives:
  - a yoke
  - the burden
  lexicon: HALOT
  rationale: עֹל literally means 'yoke' and is a common metaphor for imposed discipline
    or burden. The article is not explicit in Hebrew, but English idiom often uses
    'the yoke' generically for this metaphorical burden; this preserves the image
    better than flattening to 'burden'.
- source_word: בִּנְעוּרָיו
  chosen: in his youth
  alternatives:
  - in his young years
  - while he is young
  lexicon: HALOT
  rationale: The plural form with suffix denotes the period of youth/young adulthood.
    'In his youth' is idiomatic and concise.
