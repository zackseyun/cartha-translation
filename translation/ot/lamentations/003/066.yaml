theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    יְהוָה, preserving the traditional reverential substitution pattern rather than
    transliteration in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the imperfect verbs in this prayer context
  chosen_reading: future-like petition ('You will pursue ... and destroy ...')
  alternative_readings:
  - jussive-like petition ('May you pursue ... and destroy ...')
  - past narrative ('You pursued ... and destroyed ...')
  rationale: In the lament-prayer context, the imperfects function as an appeal directed
    to God. English can represent this either with 'may you' or a future-like 'you
    will.' The latter keeps the directness and solemnity of the prayer while remaining
    idiomatic. The alternative volitive nuance is preserved in a footnote.
