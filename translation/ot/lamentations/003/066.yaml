id: LAM.3.66
reference: Lamentations 3:66
source:
  edition: WLC
  text: תִּרְדֹּ֤ף בְּ/אַף֙ וְ/תַשְׁמִידֵ֔/ם מִ/תַּ֖חַת שְׁמֵ֥י יְהוָֽה׃פ
translation:
  text: You will pursue them in anger and destroy them from under the heavens of the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May you pursue them in anger and destroy them,' reflecting the prayer-like
      force of the Hebrew imperfect verbs.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'from under the heavens of the LORD,' a poetic expression for total
      removal from the world under God's heavens.
    reason: cultural_note
lexical_decisions:
- source_word: תִּרְדֹּף
  chosen: You will pursue
  alternatives:
  - You pursued
  - May you pursue
  - You persecute
  lexicon: HALOT
  rationale: Qal imperfect 2ms of רדף, addressed to God in direct prayer. The imperfect
    here is best rendered as a volitive/future-like petition within the surrounding
    context, not simple past. 'Pursue' preserves the concrete verbal force better
    than the more interpretive 'persecute'.
- source_word: בְּאַף
  chosen: in anger
  alternatives:
  - with anger
  - in wrath
  lexicon: HALOT
  rationale: אַף literally denotes 'nose' and idiomatically 'anger.' The preposition
    ב marks attendant circumstance or manner. 'In anger' is natural English and preserves
    the idiomatic sense without over-intensifying to 'wrath'.
- source_word: וְתַשְׁמִידֵם
  chosen: and destroy them
  alternatives:
  - and annihilate them
  - and exterminate them
  lexicon: HALOT
  rationale: Hiphil imperfect 2ms + 3mp suffix from שׁמד, meaning to destroy/exterminate.
    'Destroy them' is strong and idiomatic while avoiding a potentially over-specific
    modern connotation in 'exterminate.'
- source_word: מִתַּחַת
  chosen: from under
  alternatives:
  - from beneath
  - from under
  lexicon: HALOT
  rationale: The preposition means 'from under/beneath.' Retaining the spatial imagery
    fits the poetic force of total removal.
- source_word: שְׁמֵי
  chosen: the heavens of
  alternatives:
  - the heavens under
  - beneath the heavens of
  lexicon: HALOT
  rationale: Construct plural of 'heavens/sky.' In combination with מִתַּחַת, the
    phrase yields the sense 'from under the heavens of ...' Preserving 'heavens' rather
    than simplifying to 'sky' better matches the elevated poetic register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows the project's stated policy for יְהוָה.
