id: LAM.3.10
reference: Lamentations 3:10
source:
  edition: WLC
  text: דֹּ֣ב אֹרֵ֥ב הוּא֙ לִ֔/י אריה בְּ/מִסְתָּרִֽים׃
translation:
  text: He is a bear lying in wait for me, a lion in hiding places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lion in secret places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹּב
  chosen: bear
  alternatives:
  - a bear
  lexicon: HALOT
  rationale: The noun plainly denotes a bear. English omits the indefinite article
    naturally in a verbless poetic clause, though the sense is indefinite/predicative.
- source_word: אֹרֵב
  chosen: lying in wait
  alternatives:
  - lurking
  - ambushing
  lexicon: HALOT
  rationale: The participle from ארב conveys ambush or lying in wait. 'Lying in wait'
    preserves the predatory, deliberate sense more fully than the simpler 'lurking.'
- source_word: הוּא
  chosen: He is
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun is explicit and functions as the subject in this
    verbless clause. Supplying 'is' is required in idiomatic English.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - against me
  lexicon: HALOT
  rationale: With imagery of ambush, the preposition marks hostile orientation toward
    the speaker. 'For me' in the sense 'lying in wait for me' is idiomatic English
    and preserves the target of the attack.
- source_word: אַרְיֵה
  chosen: a lion
  alternatives:
  - lion
  lexicon: HALOT
  rationale: 'The noun denotes a lion. Including the article in English helps the
    parallel predication read naturally: ''a bear ... a lion.'''
- source_word: בְּמִסְתָּרִים
  chosen: in hiding places
  alternatives:
  - in secret places
  - in concealment
  lexicon: HALOT
  rationale: The plural noun refers to concealed locations or hiding places. 'In hiding
    places' is concrete and fits the ambush imagery better than the more abstract
    'in secret places.'
