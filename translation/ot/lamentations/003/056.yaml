id: LAM.3.56
reference: Lamentations 3:56
source:
  edition: WLC
  text: קוֹלִ֖/י שָׁמָ֑עְתָּ אַל תַּעְלֵ֧ם אָזְנְ/ךָ֛ לְ/רַוְחָתִ֖/י לְ/שַׁוְעָתִֽ/י־׃
translation:
  text: 'You heard my voice: do not hide your ear from my relief, from my cry for
    help.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not close your ear to my relief, to my cry for help.' The Hebrew
      prepositional phrases are difficult, and some translators construe them with
      'to' rather than 'from.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  lexicon: HALOT
  rationale: קוֹל commonly denotes 'voice' or 'sound.' In direct prayer language,
    'my voice' is the natural English equivalent and preserves the personal appeal.
- source_word: שָׁמָעְתָּ
  chosen: you heard
  alternatives:
  - you have heard
  - you listened to
  lexicon: HALOT
  rationale: Qal perfect 2ms of שׁמע is straightforwardly 'you heard.' English simple
    past fits the poetic recollection; present perfect is possible but less direct.
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: אַל with the following verb expresses prohibition or urgent negative
    request. 'Do not' is the clearest idiomatic rendering in prayer.
- source_word: תַּעְלֵם
  chosen: hide
  alternatives:
  - close
  - ignore
  lexicon: HALOT
  rationale: From עלם in the Hiphil, the sense is to conceal or hide. With 'ear' as
    object, 'hide your ear' preserves the Hebrew metaphor better than flattening it
    to 'ignore,' while remaining understandable.
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: The singular 'ear' is idiomatic in Hebrew petitions and should be preserved
    in English for vividness and concreteness.
- source_word: לְרַוְחָתִי
  chosen: from my relief
  alternatives:
  - to my relief
  - for my relief
  - at my breathing
  lexicon: HALOT
  rationale: רַוְחָה can denote relief, respite, or breathing-space. In this context,
    paired with 'my cry for help,' it likely expresses the speaker's plea for deliverance.
    'From my relief' follows the preposition ל in a way that reflects the Hebrew construction
    as a negative request not to shut the ear against the plea for relief, though
    the phrase is difficult and somewhat elliptical.
- source_word: לְשַׁוְעָתִי
  chosen: from my cry for help
  alternatives:
  - to my cry
  - from my plea for help
  lexicon: HALOT
  rationale: שַׁוְעָה denotes a cry for help or desperate plea. 'Cry for help' is
    natural modern English and conveys the urgency. Rendering the prefixed ל in parallel
    with the previous phrase as 'from' gives coherent English with 'hide your ear
    from...'.
