theological_decisions:
- issue: Force of the verse as prayer vs prediction
  chosen_reading: 'Rendered as an imprecatory address to God: ''You will give them
    ... your curse upon them.'''
  alternative_readings:
  - May you give them hardness of heart, your curse to them.
  rationale: The verse is part of a prayer for divine judgment. English future can
    carry the force of solemn imprecation without adding interpretive wording. The
    alternative jussive-like rendering remains viable and is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
