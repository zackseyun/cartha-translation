id: LAM.3.65
reference: Lamentations 3:65
source:
  edition: WLC
  text: תִּתֵּ֤ן לָ/הֶם֙ מְגִנַּת לֵ֔ב תַּאֲלָֽתְ/ךָ֖ לָ/הֶֽם־׃
translation:
  text: You will give them hardness of heart—your curse upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May you give them hardness of heart, your curse to them.' The Hebrew
      imperfect may be heard as an imprecation.
    reason: alternative_reading
  - marker: b
    text: Literally, 'a covering/shield of heart.' The expression is rare; 'hardness
      of heart' reflects the likely sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  chosen: You will give
  alternatives:
  - You give
  - May you give
  lexicon: HALOT
  rationale: Qal imperfect 2ms of נתן, addressed to God. In this lament-prayer context,
    the imperfect can be read as a jussive-like wish ('may you give') or as a predictive/imprecatory
    future ('you will give'). The English future preserves the force of the prayer
    without over-paraphrasing.
- source_word: מְגִנַּת
  chosen: hardness
  alternatives:
  - covering
  - shielding
  - sorrow
  - faintness
  lexicon: HALOT
  rationale: The noun is difficult and rare. Although formally related to מגן ('shield'),
    in context with 'heart' it is widely understood idiomatically as a negative inner
    condition, often rendered 'hardness' or 'callousness of heart.' This fits the
    imprecatory parallelism with 'your curse.' A more literal 'covering of heart'
    is possible but obscure in English and less likely to convey the sense.
- source_word: לֵב
  chosen: heart
  lexicon: HALOT
  rationale: Standard rendering for לב. Here it denotes the inner disposition or moral/spiritual
    center, not merely emotion.
- source_word: תַּאֲלָתְךָ
  chosen: your curse
  alternatives:
  - your imprecation
  - your oath-curse
  - your execration
  lexicon: HALOT
  rationale: From אלה in the sense of a curse or oath-curse. 'Your curse' is the most
    natural modern English rendering and matches the imprecatory context.
- source_word: לָהֶם ... לָהֶם
  chosen: them ... upon them
  alternatives:
  - to them ... to them
  lexicon: HALOT
  rationale: The repeated preposition marks the recipients emphatically. English varies
    the second instance to 'upon them' for natural style while preserving the sense
    of directed judgment.
