id: LAM.3.12
reference: Lamentations 3:12
source:
  edition: WLC
  text: דָּרַ֤ךְ קַשְׁת/וֹ֙ וַ/יַּצִּיבֵ֔/נִי כַּ/מַּטָּרָ֖א לַ/חֵֽץ׃ס
translation:
  text: He bent his bow and set me up as a target for the arrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He drew his bow and set me like a target for the arrow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַךְ
  chosen: bent
  alternatives:
  - drew
  - trod
  lexicon: HALOT
  rationale: In context with 'bow,' the verb means to bend or draw a bow in preparation
    to shoot, not its more general sense 'tread.' 'Bent' is concise and natural English
    that preserves the physical image.
- source_word: קַשְׁתּוֹ
  chosen: his bow
  lexicon: HALOT
  rationale: 'Straightforward possessive noun: ''his bow.'' The 3ms suffix is retained.'
- source_word: וַיַּצִּיבֵנִי
  chosen: and set me up
  alternatives:
  - and stationed me
  - and made me stand
  - and set me
  lexicon: HALOT
  rationale: From יצב, 'set, place, station.' 'Set me up' fits the hostile imagery
    of positioning someone as an object of attack. It is more idiomatic than 'stationed
    me' while remaining faithful.
- source_word: כַּמַּטָּרָא
  chosen: as a target
  alternatives:
  - like a target
  - as the mark
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'), and מטרה denotes a target
    or mark. 'As a target' reads naturally in English and conveys the simile clearly.
- source_word: לַחֵץ
  chosen: for the arrow
  alternatives:
  - for an arrow
  - for arrows
  lexicon: HALOT
  rationale: 'The singular noun with prefixed ל is best rendered ''for the arrow,''
    expressing purpose or relation: the speaker is made a target for the arrow. The
    singular preserves the Hebrew image.'
