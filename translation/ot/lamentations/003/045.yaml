id: LAM.3.45
reference: Lamentations 3:45
source:
  edition: WLC
  text: סְחִ֧י וּ/מָא֛וֹס תְּשִׂימֵ֖/נוּ בְּ/קֶ֥רֶב הָ/עַמִּֽים׃ס
translation:
  text: You have made us scum and refuse in the midst of the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offscouring and refuse'; the two rare nouns together express extreme
      contempt and degradation.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְחִי
  chosen: scum
  alternatives:
  - offscouring
  - filth
  lexicon: HALOT
  rationale: A rare noun denoting something vile or scraped off; 'scum' is concise,
    vivid modern English and pairs naturally with the following term. 'Offscouring'
    is traditional but archaic; 'filth' is possible but less concrete.
- source_word: וּמָאוֹס
  chosen: and refuse
  alternatives:
  - and rejected thing
  - and offscouring
  lexicon: HALOT
  rationale: From a noun related to rejection/that which is loathed. 'Refuse' captures
    the sense of something discarded and detested, and forms a strong hendiadys-like
    pair with 'scum.'
- source_word: תְּשִׂימֵנוּ
  chosen: you have made us
  alternatives:
  - you set us
  - you make us
  lexicon: HALOT
  rationale: 'The verb שׂים literally means ''set/place,'' but in this predicate-object
    construction with two accusatives it idiomatically means ''make/render.'' The
    perfect is rendered with present-result force in English: ''have made us.'''
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: A fairly formal but natural rendering that preserves the spatial/social
    sense of being placed within a larger group. 'Among' is possible, but 'in the
    midst of' better reflects the Hebrew phrase.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' in the plural, referring to surrounding
    ethnic groups/nations. 'The peoples' is more formally precise here; 'the nations'
    is a viable contextual alternative.
