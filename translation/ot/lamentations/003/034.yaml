id: LAM.3.34
reference: Lamentations 3:34
source:
  edition: WLC
  text: לְ/דַכֵּא֙ תַּ֣חַת רַגְלָ֔י/ו כֹּ֖ל אֲסִ֥ירֵי אָֽרֶץ׃
translation:
  text: to crush under his feet all the prisoners of the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the prisoners of the land.' The Hebrew אֶרֶץ can mean either 'earth'
      or 'land'; here 'earth' was chosen to preserve the verse's broad, poetic scope.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/דַכֵּא
  chosen: to crush
  alternatives:
  - to crush down
  - to trample
  - to oppress
  lexicon: HALOT
  rationale: The infinitive construct with לְ introduces one item in the sequence
    of wrongs described in vv. 34–36. דכא conveys crushing or breaking down; 'to crush'
    is concise, concrete, and fits the physical imagery of what follows.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition is spatial and straightforward here, governing 'his feet.'
    'Under' preserves the vivid image without expansion.
- source_word: רַגְלָיו
  chosen: his feet
  alternatives:
  - his foot
  lexicon: HALOT
  rationale: The Hebrew form is plural with 3ms suffix. English idiom naturally uses
    'his feet' in this expression.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' best matches the collective scope before the plural construct
    ''prisoners of the earth.'''
- source_word: אֲסִירֵי
  chosen: the prisoners of
  alternatives:
  - the captives of
  - those bound of
  lexicon: HALOT
  rationale: The noun refers to prisoners or captives. 'Prisoners' is the most natural
    modern English rendering and suits the injustice context of the surrounding verses.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In this poetic context, 'the earth'
    better conveys a broad, universal sense ('all the prisoners of the earth') rather
    than a specific territory. The alternative is viable and worth preserving in a
    footnote.
