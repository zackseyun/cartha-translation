id: LAM.3.41
reference: Lamentations 3:41
source:
  edition: WLC
  text: נִשָּׂ֤א לְבָבֵ֨/נוּ֙ אֶל כַּפָּ֔יִם אֶל אֵ֖ל בַּ/שָּׁמָֽיִם־־׃
translation:
  text: Let us lift up our hearts with our hands to God in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Let us lift up our hearts to our hands, to God in heaven.'
      The Hebrew likely expresses lifting the heart together with uplifted hands in
      prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשָּׂא
  chosen: Let us lift up
  alternatives:
  - We lift up
  - Let us raise
  lexicon: HALOT
  rationale: Qal cohortative 1cp of נשׂא expresses exhortation or resolve, best rendered
    in English as a hortatory 'Let us lift up' rather than a simple indicative. 'Lift
    up' preserves the concrete metaphor.
- source_word: לְבָבֵנוּ
  chosen: our hearts
  alternatives:
  - our heart
  lexicon: HALOT
  rationale: Though formally singular with 1cp suffix, English idiom naturally uses
    the distributive plural 'our hearts' for a collective exhortation. 'Heart' here
    denotes the inner self, will, and affections.
- source_word: אֶל כַּפָּיִם
  chosen: with our hands
  alternatives:
  - to our hands
  - along with our hands
  lexicon: HALOT
  rationale: The preposition אֶל normally means 'to/toward,' but in this idiom the
    sense is that the inward lifting of the heart is joined with the outward gesture
    of raised hands in prayer. 'With our hands' communicates the likely idiomatic
    force in natural English better than the overly literal 'to our hands.'
- source_word: כַּפָּיִם
  chosen: our hands
  alternatives:
  - palms
  lexicon: HALOT
  rationale: Dual form of כף literally refers to the palms/hands. In English prayer
    language, 'hands' is the clearest and most natural rendering.
- source_word: אֶל אֵל
  chosen: to God
  alternatives:
  - to Mighty God
  - toward God
  lexicon: HALOT
  rationale: אֵל here is the common divine title 'God.' 'To God' fits the directional
    sense of prayer and avoids overtranslating the title.
- source_word: בַּשָּׁמָיִם
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: HALOT
  rationale: The Hebrew plural 'heavens' often functions idiomatically as a singular
    in English when referring to God's dwelling. 'In heaven' is natural modern English
    while preserving the locative sense.
