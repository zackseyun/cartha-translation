theological_decisions:
- issue: Prayer posture imagery
  chosen_reading: The verse joins inward repentance/prayer ('hearts') with outward
    supplication ('hands') without privileging a sacramental or merely physical act.
  alternative_readings:
  - A more literal rendering could suggest lifting the heart 'to' the hands before
    lifting both to God.
  rationale: The syntax is compressed and somewhat idiomatic. Rendering 'with our
    hands' preserves the theological point that true appeal to God involves both inner
    and outer expression, without creating an obscure sequence in English.
  doctrine_reference: Translation philosophy §3, §6
