id: LAM.3.44
reference: Lamentations 3:44
source:
  edition: WLC
  text: סַכּ֤וֹתָה בֶֽ/עָנָן֙ לָ֔/ךְ מֵ/עֲב֖וֹר תְּפִלָּֽה׃
translation:
  text: You have covered yourself with a cloud so that prayer cannot pass through.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'You have covered yourself with a cloud from the passing
      through of prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַכּוֹתָה
  chosen: you have covered yourself
  alternatives:
  - you covered yourself
  - you have screened yourself
  - you have hidden yourself
  lexicon: HALOT
  rationale: From סכך in the Qal perfect 2ms with paragogic ה, here addressed to God.
    The reflexive sense is demanded by the following לָךְ ('for yourself' / 'yourself'),
    yielding the idiomatic sense that God has covered himself over. Present perfect
    English fits the lament context and the Hebrew perfect well.
- source_word: בֶּעָנָן
  chosen: with a cloud
  alternatives:
  - in a cloud
  - by a cloud
  - with clouds
  lexicon: HALOT
  rationale: 'The preposition ב plus עָנָן most naturally expresses the means or enveloping
    medium: ''with/in a cloud.'' Singular is retained because the Hebrew noun is singular.'
- source_word: לָךְ
  chosen: yourself
  alternatives:
  - for yourself
  - to yourself
  lexicon: HALOT
  rationale: 'Though formally ''for/to you,'' in context it complements סַכּוֹתָה
    to produce a reflexive/benefactive sense: God has covered himself over. English
    requires an explicit reflexive expression for clarity.'
- source_word: מֵעֲבוֹר
  chosen: so that ... cannot pass through
  alternatives:
  - from passing through
  - to prevent ... from passing through
  - from passing
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive construct of עבר expresses prevention
    or exclusion: ''from passing through.'' In natural English with the following
    object ''prayer,'' this is best rendered as a purpose/result clause, ''so that
    prayer cannot pass through,'' while preserving the sense of obstruction.'
- source_word: תְּפִלָּה
  chosen: prayer
  alternatives:
  - a prayer
  - supplication
  lexicon: HALOT
  rationale: The singular noun is used generically. 'Prayer' in English preserves
    that generic force better than the more individualized 'a prayer.' 'Supplication'
    is possible but less natural in modern English and narrower in sense.
