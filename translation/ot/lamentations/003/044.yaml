theological_decisions:
- issue: Anthropomorphic depiction of God obstructing prayer
  chosen_reading: Retain the direct second-person address and imagery of God covering
    himself with a cloud that blocks prayer.
  alternative_readings:
  - Soften the image to 'you have hidden yourself in a cloud'
  - Interpret the line less personally as an impersonal barrier to prayer
  rationale: The Hebrew directly addresses God and uses vivid lament imagery. The
    translation preserves the theological tension of divine hiddenness/judgment without
    softening or resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
