id: LAM.3.46
reference: Lamentations 3:46
source:
  edition: WLC
  text: פָּצ֥וּ עָלֵ֛י/נוּ פִּי/הֶ֖ם כָּל אֹיְבֵֽי/נוּ־׃
translation:
  text: All our enemies have opened their mouths against us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have opened wide their mouths against us,' bringing out the hostile
      or taunting nuance of the idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצ֥וּ
  chosen: have opened
  alternatives:
  - have opened wide
  - have gaped open
  lexicon: HALOT
  rationale: Qal perfect 3cp of פצה, used idiomatically with 'mouth' to mean opening
    the mouth, often with hostile or mocking force. 'Have opened' is natural English
    and preserves the verbal action without overinterpreting the nuance.
- source_word: עָלֵ֛ינוּ
  chosen: against us
  alternatives:
  - over us
  - at us
  lexicon: HALOT
  rationale: The preposition עַל with hostile speech/action in this context is best
    rendered 'against us,' expressing adversative force rather than simple spatial
    relation.
- source_word: פִּיהֶם
  chosen: their mouths
  alternatives:
  - their mouth
  lexicon: HALOT
  rationale: Literally 'their mouth,' but with a plural pronominal suffix referring
    to multiple subjects. English idiom requires the distributive plural 'their mouths.'
- source_word: כָּל
  chosen: All
  alternatives:
  - every
  lexicon: HALOT
  rationale: 'Placed before ''our enemies,'' כָּל has a collective sense: ''all our
    enemies.'' This is the most natural rendering in English.'
- source_word: אֹיְבֵינוּ
  chosen: our enemies
  alternatives:
  - those hostile to us
  lexicon: HALOT
  rationale: Standard rendering of אויב with first person plural suffix. 'Enemies'
    is direct, consistent, and contextually appropriate in lament language.
