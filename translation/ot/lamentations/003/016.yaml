id: LAM.3.16
reference: Lamentations 3:16
source:
  edition: WLC
  text: וַ/יַּגְרֵ֤ס בֶּֽ/חָצָץ֙ שִׁנָּ֔/י הִכְפִּישַׁ֖/נִי בָּ/אֵֽפֶר׃
translation:
  text: He has ground my teeth with gravel; he has pressed me down into the ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has broken my teeth with pebbles.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'has pressed me down' is rare and may also be understood
      as 'has made me cower,' 'has humbled me,' or similarly 'has brought me low in
      ashes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגְרֵס
  chosen: has ground
  alternatives:
  - has broken
  - has crushed
  lexicon: HALOT
  rationale: The verb conveys crushing or grinding. 'Has ground' fits naturally with
    the object 'my teeth' and preserves the vivid bodily violence of the Hebrew better
    than the less specific 'broken' or 'crushed.' The perfect-like English present
    perfect suits the lament's recounting of completed affliction with present force.
- source_word: בֶּחָצָץ
  chosen: with gravel
  alternatives:
  - with pebbles
  - with grit
  lexicon: HALOT
  rationale: חָצָץ denotes small stones or gravel. 'Gravel' is the most idiomatic
    English choice in this context and communicates the image of teeth being ground
    against stones. 'Pebbles' is possible but sounds less abrasive; 'grit' is more
    interpretive.
- source_word: שִׁנַּי
  chosen: my teeth
  alternatives:
  - my tooth
  lexicon: HALOT
  rationale: The Hebrew form is plural with first-person singular suffix. 'My teeth'
    is the straightforward and natural rendering.
- source_word: הִכְפִּישַׁנִי
  chosen: has pressed me down
  alternatives:
  - has made me cower
  - has humbled me
  - has trampled me
  lexicon: HALOT
  rationale: This rare verb is difficult, but in context it conveys being forced down
    or abased. 'Has pressed me down' preserves the physical and humiliating sense
    without overcommitting to a more interpretive gloss. It also pairs well with the
    following phrase 'into the ashes.'
- source_word: בָּאֵפֶר
  chosen: into the ashes
  alternatives:
  - in ashes
  - in the dust
  lexicon: HALOT
  rationale: אֵפֶר means 'ashes,' not 'dust.' Rendering the preposition as 'into'
    rather than simply 'in' brings out the motion implied by the preceding verb and
    yields idiomatic English. The article is represented as 'the ashes.'
