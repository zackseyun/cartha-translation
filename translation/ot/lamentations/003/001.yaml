theological_decisions:
- issue: Referent of the pronoun in 'his wrath'
  chosen_reading: Retain the Hebrew pronoun as 'his' without explicitly supplying
    'God' or 'the LORD' in the main text.
  alternative_readings:
  - the LORD's wrath
  - God's wrath
  rationale: The immediate Hebrew text uses only a third-person masculine singular
    suffix, and the broader context makes the divine referent clear. Supplying 'God'
    or 'the LORD' in the main text would import an explicit referent not present in
    this verse. Preserving 'his' maintains the text's literary force and avoids over-interpretation.
  doctrine_reference: Translation philosophy §1, §3
