id: LAM.3.1
reference: Lamentations 3:1
source:
  edition: WLC
  text: אֲנִ֤י הַ/גֶּ֨בֶר֙ רָאָ֣ה עֳנִ֔י בְּ/שֵׁ֖בֶט עֶבְרָתֽ/וֹ׃
translation:
  text: I am the man who has seen affliction under the rod of his wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the rod of his wrath.' The Hebrew preposition can be rendered in
      several ways.
    reason: lexical_alternative
  - marker: b
    text: '''Affliction'' may also be rendered ''misery'' or ''suffering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic at the head of the line. Rendering
    it as 'I am' preserves the self-identification force in natural English better
    than a bare 'I' in this verbless opening phrase.
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  - the warrior
  - a man
  lexicon: HALOT
  rationale: 'גבר can carry connotations of a strong adult male, but in context it
    functions as a specific self-designation: ''the man.'' This preserves the definite
    article and the masculine singular form, in keeping with the gender-accurate policy.'
- source_word: רָאָה
  chosen: has seen
  alternatives:
  - saw
  - has experienced
  lexicon: HALOT
  rationale: The qatal form is rendered with English present perfect to fit the speaker's
    present self-description shaped by past suffering. 'Seen' keeps the Hebrew verb's
    plain sense; 'experienced' is interpretive and therefore left as an alternative
    rather than the main text.
- source_word: עֳנִי
  chosen: affliction
  alternatives:
  - misery
  - poverty
  - suffering
  lexicon: HALOT
  rationale: עֳנִי commonly denotes affliction, misery, or suffering. 'Affliction'
    best captures the breadth of distress here without narrowing it merely to economic
    poverty.
- source_word: בְּשֵׁבֶט
  chosen: under the rod
  alternatives:
  - by the rod
  - with the rod
  lexicon: HALOT
  rationale: שֵׁבֶט denotes a rod, staff, or scepter. In this context of chastisement/judgment,
    'rod' is primary. The preposition ב can be rendered several ways; 'under the rod'
    idiomatically conveys being subjected to punitive force, while preserving the
    disciplinary imagery.
- source_word: עֶבְרָתוֹ
  chosen: his wrath
  alternatives:
  - his fury
  - his overflowing anger
  - his rage
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath or fury, often intense anger. 'Wrath' fits the
    solemn register of Lamentations and preserves the theological weight of divine
    anger without over-paraphrase. The 3ms suffix is retained as 'his.'
