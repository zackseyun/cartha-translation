id: LAM.3.54
reference: Lamentations 3:54
source:
  edition: WLC
  text: צָֽפוּ מַ֥יִם עַל רֹאשִׁ֖/י אָמַ֥רְתִּי נִגְזָֽרְתִּי־־׃ס
translation:
  text: Waters closed over my head; I said, “I am cut off.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Waters flowed over my head.”
    reason: lexical_alternative
  - marker: b
    text: Or “I am doomed” or “I am destroyed.” The Hebrew says “I am cut off,” preserving
      the image of being severed from life or hope.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָפוּ
  chosen: closed over
  alternatives:
  - flowed over
  - covered
  - overflowed
  lexicon: HALOT
  rationale: The verb from צפה in this context conveys waters rising or covering over
    the speaker. 'Closed over' captures the image of engulfment in idiomatic modern
    English without over-paraphrasing. 'Flowed over' is possible but weaker; 'covered'
    is accurate but less vivid.
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The Hebrew plural is naturally rendered 'waters' in elevated poetic English,
    fitting the lament context and preserving the mass/plural form better than singular
    'water.'
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - above
  lexicon: HALOT
  rationale: With the verb and image of engulfing waters, 'over' is the most natural
    English preposition. 'Upon' is more formal but less readable.
- source_word: רֹאשִׁי
  chosen: my head
  lexicon: HALOT
  rationale: A direct and literal rendering of the body-part idiom, preserving the
    concrete image of near-drowning or overwhelming distress.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  lexicon: HALOT
  rationale: The verb אמר normally means 'say.' While it can introduce inward speech,
    'I said' preserves the Hebrew form and allows readers to infer internal or spoken
    lament from context.
- source_word: נִגְזָרְתִּי
  chosen: I am cut off
  alternatives:
  - I am doomed
  - I am destroyed
  - I am separated
  lexicon: HALOT
  rationale: The Niphal of גזר here expresses being cut off, likely from life or deliverance.
    'I am cut off' preserves the metaphor and theological-literary resonance found
    elsewhere in Scripture. More interpretive options like 'I am doomed' flatten the
    imagery.
