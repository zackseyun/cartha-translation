theological_decisions:
- issue: Divine non-forgiveness in lament
  chosen_reading: you have not forgiven
  alternative_readings:
  - you did not pardon
  rationale: The text directly addresses God and states the absence of forgiveness
    without softening or resolving the theological tension. This follows the translation
    philosophy of preserving the text's force rather than importing explanatory theology.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
