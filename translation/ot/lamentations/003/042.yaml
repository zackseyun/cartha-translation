id: LAM.3.42
reference: Lamentations 3:42
source:
  edition: WLC
  text: נַ֤חְנוּ פָשַׁ֨עְנוּ֙ וּ/מָרִ֔ינוּ אַתָּ֖ה לֹ֥א סָלָֽחְתָּ׃ס
translation:
  text: We have transgressed and rebelled; you have not forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you did not pardon.' The Hebrew verb is the common term for divine forgiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחְנוּ
  chosen: We
  lexicon: HALOT
  rationale: First person common plural independent pronoun, retained explicitly in
    English to preserve the emphatic subject before the verbal sequence.
- source_word: פָשַׁעְנוּ
  chosen: have transgressed
  alternatives:
  - have rebelled
  - have sinned
  lexicon: HALOT
  rationale: From פשע, denoting transgression/rebellion against authority. 'Have transgressed'
    preserves the covenantal and moral sense, while allowing the following מרה to
    carry the stronger nuance of open rebellion without collapsing the two verbs into
    one.
- source_word: וּמָרִינוּ
  chosen: and rebelled
  alternatives:
  - and were rebellious
  - and defied
  lexicon: HALOT
  rationale: From מרה, 'to be rebellious/rebel.' Rendered verbally as 'and rebelled'
    to match the parallel perfect verb and to preserve the intensification alongside
    פשע.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Second person masculine singular pronoun referring directly to God.
    Kept explicit in English because the Hebrew includes the pronoun for emphasis
    and contrast: ''we ... ; you ...''.'
- source_word: לֹא
  chosen: not
  alternatives:
  - have not
  lexicon: HALOT
  rationale: Simple negation modifying the following verb. In English the negation
    is naturally carried within 'have not forgiven'.
- source_word: סָלָחְתָּ
  chosen: have not forgiven
  alternatives:
  - did not forgive
  - have not pardoned
  lexicon: HALOT
  rationale: From סלח, 'to forgive, pardon,' especially of divine forgiveness. 'Forgiven'
    is the most natural modern English rendering; the perfect is rendered with present
    relevance ('have not forgiven') in this lament context.
