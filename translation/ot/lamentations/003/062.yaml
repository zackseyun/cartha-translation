id: LAM.3.62
reference: Lamentations 3:62
source:
  edition: WLC
  text: שִׂפְתֵ֤י קָמַ/י֙ וְ/הֶגְיוֹנָ֔/ם עָלַ֖/י כָּל הַ/יּֽוֹם־׃
translation:
  text: the lips of those who rise against me, and their muttering against me all
    day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the speech/words of those who rise against me.' Hebrew 'lips' is a concrete
      expression for speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'their meditation' or 'their whispering.' The Hebrew term can refer to
      inward musing or low utterance; here the hostile context favors 'muttering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  chosen: the lips of
  alternatives:
  - the speech of
  - the words of
  lexicon: HALOT
  rationale: Literally 'lips of.' In Hebrew, 'lips' can stand metonymically for speech.
    Retaining 'lips' preserves the concrete imagery and parallelism with the following
    noun for inward/ongoing speech.
- source_word: קָמַי
  chosen: those who rise against me
  alternatives:
  - my adversaries
  - my attackers
  - those who oppose me
  lexicon: HALOT
  rationale: From קום with 1cs suffix, literally 'my risers' or 'those rising against
    me.' The hostile sense is supplied by context and the following עָלַי. 'Those
    who rise against me' stays close to the Hebrew while remaining natural English.
- source_word: הֶגְיוֹנָם
  chosen: their muttering
  alternatives:
  - their meditation
  - their plotting
  - their whispering
  lexicon: HALOT
  rationale: הִגָּיוֹן/הֶגְיוֹן can denote musing, murmuring, or utterance. In this
    hostile context, 'muttering' best captures low, ongoing speech directed against
    the speaker without over-interpreting it as formal 'plotting.'
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - about me
  - upon me
  lexicon: HALOT
  rationale: Though literally 'upon me,' with hostile speech it idiomatically means
    'against me.' This also fits both occurrences in the verse.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Standard idiomatic English rendering of the Hebrew temporal phrase, preserving
    the sense of continual duration.
