id: LAM.3.30
reference: Lamentations 3:30
source:
  edition: WLC
  text: יִתֵּ֧ן לְ/מַכֵּ֛/הוּ לֶ֖חִי יִשְׂבַּ֥ע בְּ/חֶרְפָּֽה׃ס
translation:
  text: Let him give his cheek to the one who strikes him; let him be filled with
    reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let him have his fill of disgrace/insult.' The Hebrew idiom literally
      speaks of being 'filled with reproach.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֵּן
  chosen: Let him give
  alternatives:
  - He should give
  - May he give
  lexicon: HALOT
  rationale: Qal imperfect/jussive-like form of נתן in this context functions as an
    exhortation within the surrounding sequence of admonitions, best rendered with
    English 'Let him...' rather than a simple future.
- source_word: לְמַכֵּהוּ
  chosen: to the one who strikes him
  alternatives:
  - to his striker
  - to him who smites him
  lexicon: HALOT
  rationale: The preposition ל plus Hiphil participle of נכה with 3ms suffix denotes
    the person striking him. 'The one who strikes him' is natural modern English and
    preserves the participial force.
- source_word: לֶחִי
  chosen: his cheek
  alternatives:
  - the cheek
  - jaw
  lexicon: HALOT
  rationale: לחי denotes the cheek/jaw area. 'Cheek' fits the idiom of submitting
    to insult or assault and is the standard contextual rendering.
- source_word: יִשְׂבַּע
  chosen: let him be filled
  alternatives:
  - let him have his fill
  - let him be sated
  lexicon: HALOT
  rationale: 'שבע literally means to be satisfied/full. With בחרפה, the sense is figurative:
    to be filled with or saturated in reproach. ''Be filled'' preserves the metaphor
    without awkwardness.'
- source_word: בְּחֶרְפָּה
  chosen: with reproach
  alternatives:
  - with disgrace
  - with insult
  - with shame
  lexicon: HALOT
  rationale: חרפה commonly denotes reproach, disgrace, or insult. 'Reproach' best
    preserves the moral-social dimension of public humiliation in a lament context,
    while remaining readable.
