id: LAM.3.5
reference: Lamentations 3:5
source:
  edition: WLC
  text: בָּנָ֥ה עָלַ֛/י וַ/יַּקַּ֖ף רֹ֥אשׁ וּ/תְלָאָֽה׃
translation:
  text: He has built against me and encircled me with bitterness and hardship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with poison and hardship'; רֹאשׁ can denote a poisonous or bitter substance,
      traditionally also rendered 'gall.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'He has built against me'; the wording likely evokes siege imagery.
    reason: cultural_note
lexical_decisions:
- source_word: בָּנָה
  chosen: has built against
  alternatives:
  - has built up against
  - has besieged
  lexicon: HALOT
  rationale: The verb literally means 'build' and here, with עָלַי ('against/upon
    me'), conveys hostile construction against the speaker, likely siege imagery.
    'Has built against' preserves the metaphor more transparently than the more interpretive
    'has besieged,' while still making the adversative sense clear.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although the preposition can mean 'upon' or 'over,' in this hostile context
    with בנה it is best rendered 'against me' to reflect adversative force in idiomatic
    English.
- source_word: וַיַּקַּף
  chosen: encircled me
  alternatives:
  - surrounded me
  - hemmed me in
  lexicon: HALOT
  rationale: The verb means 'to surround/encircle.' 'Encircled me' preserves the concrete
    imagery and pairs well with the preceding building metaphor. The object 'me' is
    supplied from context, since the speaker remains the target of the action.
- source_word: רֹאשׁ
  chosen: bitterness
  alternatives:
  - poison
  - gall
  lexicon: HALOT
  rationale: In poetic and lament contexts, רֹאשׁ often denotes a bitter or poisonous
    substance metaphorically associated with affliction. 'Bitterness' is the most
    accessible modern English rendering here, while 'poison' and 'gall' remain viable
    lexical alternatives.
- source_word: וּתְלָאָה
  chosen: and hardship
  alternatives:
  - and weariness
  - and trouble
  - and misery
  lexicon: HALOT
  rationale: The noun denotes weariness, hardship, or trouble. 'Hardship' fits the
    context of affliction and pairs naturally with 'bitterness' in English without
    flattening the term into mere emotion.
