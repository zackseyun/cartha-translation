id: LAM.3.39
reference: Lamentations 3:39
source:
  edition: WLC
  text: מַה יִּתְאוֹנֵן֙ אָדָ֣ם חָ֔י גֶּ֖בֶר עַל חטא/ו־־׃ס
translation:
  text: Why should a living man complain, a man, about his sins?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about the punishment for his sins'; some take the phrase to refer not
      to sin itself but to the suffering brought by it.
    reason: alternative_reading
  - marker: b
    text: Or 'his sin.' The Hebrew form may be understood as singular in some traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: Why should
  alternatives:
  - Why
  - What
  lexicon: HALOT
  rationale: Here מַה introduces a rhetorical question. In English, 'Why should' best
    captures the idiomatic force in context rather than a bare 'What,' which would
    sound unnatural.
- source_word: יִתְאוֹנֵן
  chosen: complain
  alternatives:
  - murmur
  - lament
  - grumble
  lexicon: HALOT
  rationale: The Hitpolel/Hithpael form from אנה/און here conveys complaining or murmuring.
    'Complain' is the clearest modern English equivalent and fits the rhetorical rebuke
    of the verse. 'Lament' would blur the distinction with the book's genre title
    and could suggest legitimate mourning rather than resentful complaint.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: Although אדם can denote humanity generically, here it is paired with
    גבר and individualized by the singular syntax. Per the gender-accurate policy,
    'man' best reflects the representative singular rather than a gender-neutral abstraction.
- source_word: חָי
  chosen: living
  alternatives:
  - alive
  lexicon: HALOT
  rationale: '''Living'' works naturally attributively with ''man'' in English and
    preserves the contrast implied by one who is still alive and therefore under mercy
    rather than destroyed.'
- source_word: גֶּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a warrior
  lexicon: HALOT
  rationale: גבר often emphasizes a male person, sometimes with connotations of strength,
    but here the parallel with אדם is likely appositional/intensifying rather than
    introducing a distinct class. Rendering it again as 'a man' preserves the Hebrew
    repetition without overreading 'strong man' into the context.
- source_word: עַל
  chosen: about
  alternatives:
  - for
  - because of
  - on account of
  lexicon: HALOT
  rationale: The preposition marks the matter complained of. 'About' is the most idiomatic
    English with 'complain,' while still allowing the sense that the complaint concerns
    one's sins and their consequences.
- source_word: חטאו
  chosen: his sins
  alternatives:
  - his sin
  - the punishment of his sins
  lexicon: HALOT
  rationale: The ketiv/qere tradition and common interpretation support a plural sense
    in many editions/translations, but the consonantal form can be read singular.
    The context concerns culpability for wrongdoing; 'his sins' communicates that
    clearly in idiomatic English. Because some understand the phrase as shorthand
    for punishment for sin, that alternative is preserved in a footnote rather than
    imported into the main text.
