theological_decisions:
- issue: Whether to make the verse refer explicitly to punishment rather than sin
    itself
  chosen_reading: The main text speaks of complaining 'about his sins' without adding
    'punishment.'
  alternative_readings:
  - about the punishment for his sins
  - for his sin
  rationale: The Hebrew text does not explicitly include a noun for punishment. Some
    interpreters infer that the complaint is about the consequences of sin, but adding
    'punishment' in the main text would go beyond the wording. To preserve interpretive
    tension, the more literal reading is kept in the text and the interpretive alternative
    is footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
