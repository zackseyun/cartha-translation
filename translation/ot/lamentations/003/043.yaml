theological_decisions:
- issue: Direct address to God in a lament describing divine judgment
  chosen_reading: Retain the stark second-person accusation without softening it
  alternative_readings:
  - Paraphrastic softening such as 'you allowed us to be pursued' or 'you seemed to
    kill without pity'
  rationale: The Hebrew directly attributes these actions to the addressed subject
    and the genre of lament permits bold speech toward God. Preserving this tension
    accords with the translation philosophy not to mute difficult theological language.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
