id: LAM.3.43
reference: Lamentations 3:43
source:
  edition: WLC
  text: סַכֹּ֤תָה בָ/אַף֙ וַֽ/תִּרְדְּפֵ֔/נוּ הָרַ֖גְתָּ לֹ֥א חָמָֽלְתָּ׃
translation:
  text: You covered yourself in anger and pursued us; you killed without pity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with anger' or 'in wrath.' The Hebrew idiom uses 'nose' for anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not spare' / 'you did not have compassion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַכֹּתָה
  chosen: covered yourself
  alternatives:
  - covered
  - screened
  - shrouded yourself
  lexicon: HALOT
  rationale: 'From סכך in the Qal perfect 2ms with paragogic he, here reflexive in
    sense from context: the subject is addressed directly and is portrayed as enveloping
    himself. ''Covered yourself'' preserves the imagery and fits the parallel in the
    surrounding context better than a more interpretive rendering.'
- source_word: בָאַף
  chosen: in anger
  alternatives:
  - with anger
  - in wrath
  lexicon: HALOT
  rationale: אַף literally denotes 'nose' and idiomatically 'anger/wrath.' 'In anger'
    is natural English and preserves the instrumental/circumstantial force of the
    preposition without over-intensifying to 'wrath' unless context requires it.
- source_word: וַתִּרְדְּפֵנוּ
  chosen: and pursued us
  alternatives:
  - and chased us
  - and persecuted us
  lexicon: HALOT
  rationale: רדף commonly means 'pursue.' 'Pursued us' is the most direct and idiomatic
    rendering here; 'persecuted' would import a more specialized nuance not demanded
    by the immediate context.
- source_word: הָרַגְתָּ
  chosen: you killed
  alternatives:
  - you slew
  lexicon: HALOT
  rationale: הרג is the ordinary verb 'kill/slay.' 'Killed' is clear modern English;
    'slew' is archaic. The directness of the accusation should be retained.
- source_word: לֹא חָמָלְתָּ
  chosen: without pity
  alternatives:
  - you did not spare
  - you did not have compassion
  - without compassion
  lexicon: HALOT
  rationale: חמל means 'spare, have compassion/pity.' In this collocation after 'you
    killed,' English 'without pity' is concise and forceful, capturing the adverbial
    sense of unsparing action. 'You did not spare' is possible, but after 'you killed'
    it can sound redundant in English.
