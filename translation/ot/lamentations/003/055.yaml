theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The project default is to render יְהוָה as 'the LORD.' In direct address,
    English idiom commonly uses 'O LORD.' This preserves the doctrinally specified
    convention without importing a denominational preference for pronouncing the tetragrammaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
