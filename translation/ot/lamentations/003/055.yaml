id: LAM.3.55
reference: Lamentations 3:55
source:
  edition: WLC
  text: קָרָ֤אתִי שִׁמְ/ךָ֙ יְהוָ֔ה מִ/בּ֖וֹר תַּחְתִּיּֽוֹת׃
translation:
  text: I called on your name, O LORD, from the depths of the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the lowest parts of the pit,'' or ''from the depths below
      of the pit.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרָאתִי
  chosen: I called on
  alternatives:
  - I called
  - I cried out to
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרא, here with 'your name' as object and direct address
    to YHWH. 'Called on' makes explicit the idiomatic sense of invoking God, more
    natural in English than the bare 'called' while staying close to the Hebrew.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Literal rendering of 'your name.' In Hebrew this commonly denotes invocation
    of the person named, especially in prayer; the literal phrase is retained rather
    than paraphrasing to 'you' in order to preserve the idiom.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.' Because this is direct address, 'O LORD' is used for natural English vocative
    style while preserving the covenant name convention.
- source_word: מִבּוֹר
  chosen: from the pit
  alternatives:
  - from the cistern
  - from the dungeon
  lexicon: HALOT
  rationale: בּוֹר can denote a pit, cistern, or dungeon-like hole. In Lamentations
    3 the imagery is of being trapped in a deep place and near death; 'pit' is the
    broadest and most idiomatic English choice, preserving both literal and metaphorical
    resonance.
- source_word: תַּחְתִּיּוֹת
  chosen: the depths
  alternatives:
  - the lowest places
  - the lowest depths
  - the depths below
  lexicon: HALOT
  rationale: Adjectival/plural form from תחת conveys lower or lowest regions. With
    'pit,' English idiom is best served by 'the depths of the pit,' which captures
    the superlative sense without awkwardness.
