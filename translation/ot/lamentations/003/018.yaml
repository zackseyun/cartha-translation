id: LAM.3.18
reference: Lamentations 3:18
source:
  edition: WLC
  text: וָ/אֹמַר֙ אָבַ֣ד נִצְחִ֔/י וְ/תוֹחַלְתִּ֖/י מֵ/יְהוָֽה׃ס
translation:
  text: So I said, “My endurance has perished, and my hope from the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My splendor has perished,' if נִצְחִי is taken in the sense of eminence
      or glory rather than endurance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'my hope from the LORD,' an elliptical expression that
      may mean hope that comes from the LORD or hope placed in the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: So I said
  alternatives:
  - And I said
  - Then I said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר introduces the speaker's conclusion in sequence.
    'So I said' gives natural English while preserving the narrative progression and
    inferential force.
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - is lost
  - has vanished
  lexicon: HALOT
  rationale: The verb אבד denotes perishing, being lost, or vanishing. 'Has perished'
    preserves the strong sense of complete loss and fits the lament register better
    than the flatter 'is lost.'
- source_word: נִצְחִי
  chosen: my endurance
  alternatives:
  - my splendor
  - my strength
  - my perpetuity
  lexicon: HALOT
  rationale: נֵצַח can denote enduringness, lastingness, or in some contexts eminence/splendor.
    In this context of personal collapse and parallel with 'my hope,' 'my endurance'
    best captures the sense of staying power or capacity to continue. 'My strength'
    is interpretive; 'my splendor' fits other contexts less well here.
- source_word: וְתוֹחַלְתִּי
  chosen: and my hope
  alternatives:
  - and my expectation
  lexicon: HALOT
  rationale: תּוֹחֶלֶת commonly means hope or expectation. 'Hope' is the most natural
    and contextually fitting English rendering in lament language.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - in the LORD
  - because of the LORD
  lexicon: HALOT
  rationale: 'The preposition מִן most naturally means ''from.'' Here it likely marks
    source or object in an elliptical expression: hope that comes from the LORD, or
    hope directed toward him by implication. The more literal ''from the LORD'' preserves
    the Hebrew wording and the verse''s stark compression.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention.
