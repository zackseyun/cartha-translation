theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the stated
    doctrine, the Tetragrammaton is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נִצְחִי in context
  chosen_reading: my endurance
  alternative_readings:
  - my splendor
  - my strength
  rationale: The lament context emphasizes collapse of the speaker's capacity to continue
    and loss of hope. 'My endurance' preserves that experiential sense without overinterpreting
    toward physical strength alone.
