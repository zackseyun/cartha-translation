theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: O Yahweh
  alternative_readings:
  - the LORD
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mood of תָּשִׁיב in a prayer context
  chosen_reading: You will repay them
  alternative_readings:
  - May you repay them
  rationale: In lament/prayer discourse, the imperfect can function with volitional force. The English main text uses a future form that can still carry prayerful confidence, while the jussive-like alternative is preserved in a footnote to maintain the interpretive tension rather than over-resolve it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
