id: LAM.3.64
reference: Lamentations 3:64
source:
  edition: WLC
  text: תָּשִׁ֨יב לָ/הֶ֥ם גְּמ֛וּל יְהוָ֖ה כְּ/מַעֲשֵׂ֥ה יְדֵי/הֶֽם׃
translation:
  text: You will repay them, O Yahweh, according to the work of their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May you repay them, O LORD.' The Hebrew verb may be heard as a prayerful wish as well as a statement of confidence.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'according to the work of their hands,' an idiom referring to what they have done.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשִׁיב
  chosen: You will repay
  alternatives:
  - You will return
  - You will render
  - May you repay
  lexicon: HALOT
  rationale: Hiphil of שוב commonly carries the sense of causing to return or giving back. In this context with גְּמוּל and an object referring to hostile opponents, the idiomatic sense is requital/repayment. The yiqtol can be read as future or jussive in prayer; English 'will repay' preserves the predictive-prayer force without awkwardness, while the volitional nuance is preserved as an alternative in a footnote.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. In idiomatic English after 'repay,' simple 'them' is natural and preserves the sense.
- source_word: גְּמוּל
  chosen: repay
  alternatives:
  - recompense
  - requital
  - dealing
  lexicon: HALOT
  rationale: The noun denotes recompense or dealing received in return. Rather than a wooden 'repay them recompense,' the sense is carried idiomatically by the verb 'repay,' with the content further specified by the following phrase.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּמַעֲשֵׂה
  chosen: according to the work
  alternatives:
  - according to the deeds
  - in accordance with the doing
  lexicon: HALOT
  rationale: 'The preposition כ here expresses correspondence or measure: ''according to/in proportion to.'' מַעֲשֶׂה can mean deed, work, or action. Singular ''work'' is retained as a collective expression, matching the Hebrew singular construct while remaining natural English.'
- source_word: יְדֵיהֶם
  chosen: of their hands
  alternatives:
  - their hands
  - they have done
  lexicon: HALOT
  rationale: '''Hands'' is a common Hebrew metonym for actions or deeds. Retaining ''of their hands'' preserves the concrete imagery and the Hebrew idiom, rather than flattening it to merely ''what they have done.'''
