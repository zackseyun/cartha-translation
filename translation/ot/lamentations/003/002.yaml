id: LAM.3.2
reference: Lamentations 3:2
source:
  edition: WLC
  text: אוֹתִ֥/י נָהַ֛ג וַ/יֹּלַ֖ךְ חֹ֥שֶׁךְ וְ/לֹא אֽוֹר־׃
translation:
  text: He has driven me and made me walk in darkness and not light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has led me and made me go in darkness, and not light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹתִי
  chosen: me
  alternatives:
  - me (direct object marker left untranslated)
  lexicon: HALOT
  rationale: The particle marks the first-person singular direct object; in English
    this is naturally represented simply as 'me.'
- source_word: נָהַג
  chosen: has driven
  alternatives:
  - has led
  - has guided
  lexicon: HALOT
  rationale: The verb can mean lead, drive, or guide. In this lament context, 'driven'
    better conveys coercion and affliction than the more neutral or positive 'led/guided.'
    The perfect is rendered with present relevance in English as 'has driven.'
- source_word: וַיֹּלַךְ
  chosen: made me walk
  alternatives:
  - caused me to go
  - led me along
  lexicon: HALOT
  rationale: From הלך in the Hiphil/causative sense, the verb indicates causing someone
    to go or walk. 'Made me walk' preserves the causative force and pairs well with
    the prior verb.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: The noun straightforwardly denotes darkness. 'Darkness' is the standard
    and most transparent rendering in this poetic context.
- source_word: וְלֹא אוֹר
  chosen: and not light
  alternatives:
  - and not into light
  - without light
  lexicon: HALOT
  rationale: 'The Hebrew is stark and elliptical: literally ''and not light.'' Preserving
    that compact contrast suits the poetry better than smoothing it into a more interpretive
    phrase.'
