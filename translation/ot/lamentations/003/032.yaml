theological_decisions:
- issue: Rendering חסד in relation to רחם
  chosen_reading: Differentiate רחם as 'show compassion' and חסד as 'steadfast love.'
  alternative_readings:
  - Render both with mercy-language, e.g., 'have mercy' / 'mercies'
  rationale: 'The verse pairs two related but distinct mercy terms. Preserving the
    distinction reflects the Hebrew texture and avoids collapsing divine compassion
    into a single repeated concept. This also maintains theological nuance: God''s
    compassionate action flows from the abundance of his steadfast covenantal love.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
