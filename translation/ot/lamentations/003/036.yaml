id: LAM.3.36
reference: Lamentations 3:36
source:
  edition: WLC
  text: לְ/עַוֵּ֤ת אָדָם֙ בְּ/רִיב֔/וֹ אֲדֹנָ֖/י לֹ֥א רָאָֽה׃ס
translation:
  text: to deny a man justice in his case—the Lord does not see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to subvert a man in his lawsuit' or 'to pervert a person's case.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord does not see'; the phrase may also carry the sense 'the
      Lord does not approve.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְעַוֵּת
  chosen: to deny ... justice
  alternatives:
  - to subvert
  - to pervert
  - to wrong
  lexicon: HALOT
  rationale: The Piel infinitive of עוה here carries the sense of twisting or perverting
    what is right, especially in a legal setting. Because it is followed by 'a man'
    and 'in his case/dispute,' an English judicial expression best captures the force.
    'Deny ... justice' is idiomatic and conveys legal distortion more clearly than
    the more literal but less natural 'pervert.'
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: The noun is singular and refers to an individual human in a legal situation,
    not humanity in general. Per the project's gender-accurate policy, 'a man' best
    matches the source's singular masculine/generic form in this context.
- source_word: בְּרִיבוֹ
  chosen: in his case
  alternatives:
  - in his dispute
  - in his lawsuit
  - in his cause
  lexicon: HALOT
  rationale: רִיב often denotes a legal dispute, contention, or case. 'In his case'
    is clear modern English and preserves the judicial sense without sounding archaic
    like 'cause.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: The form is the divine title אֲדֹנָי, conventionally rendered 'the Lord.'
    The article in English is natural for a title used absolutely. 'My Lord' would
    misleadingly suggest a first-person possessive sense here rather than the standard
    divine title.
- source_word: לֹא רָאָה
  chosen: does not see
  alternatives:
  - has not seen
  - did not see
  - does not approve
  lexicon: HALOT
  rationale: The perfect after לֹא can express a general truth in context. 'Does not
    see' preserves the Hebrew verb 'see' while fitting the surrounding series of statements
    about what the Lord does not countenance. An interpretive rendering like 'does
    not approve' captures implication but moves beyond the lexical surface, so it
    is kept as an alternative rather than the main text.
