theological_decisions:
- issue: Whether לֹא רָאָה should be rendered as mere perception ('does not see')
    or evaluative approval ('does not approve')
  chosen_reading: 'Retain the literal visual idiom: ''the Lord does not see.'''
  alternative_readings:
  - the Lord does not approve
  rationale: 'The immediate context (Lam 3:34–36) lists injustices and concludes with
    language of the Lord''s relation to them. Hebrew ''see'' can imply regard or approval,
    but the text itself says ''see,'' and preserving that wording maintains the theological
    tension: the Lord is not indifferent to injustice, yet the verse states this in
    the idiom of seeing. The more explicit interpretive sense is preserved in a footnote
    rather than imported into the main text.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
