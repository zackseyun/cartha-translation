theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עַוָּתָתִי
  chosen_reading: the wrong done to me
  alternative_readings:
  - my wrong
  - the injustice against me
  rationale: Theologically and contextually, the speaker is appealing for divine justice regarding oppression suffered. Rendering the noun as the speaker's own moral wrong would invert the sense of the lament and disrupt the legal parallelism with 'judge my case.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3'
