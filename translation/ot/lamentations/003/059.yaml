id: LAM.3.59
reference: Lamentations 3:59
source:
  edition: WLC
  text: רָאִ֤יתָה יְהוָה֙ עַוָּ֣תָתִ֔/י שָׁפְטָ֖/ה מִשְׁפָּטִֽ/י׃
translation:
  text: You have seen, O LORD, the wrong done to me; judge my case.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the injustice against me"; the Hebrew noun can denote wrong, distortion,
      or injustice.
    reason: lexical_alternative
  - marker: b
    text: Or "vindicate my cause."
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתָה
  chosen: You have seen
  alternatives:
  - You saw
  - You have looked upon
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה, addressed directly to YHWH. English present perfect
    fits the prayerful appeal, expressing a past action with present relevance. 'Seen'
    is the plain sense and preserves the implied appeal to divine notice.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Because this is direct address
    in prayer, 'O LORD' is idiomatic English and preserves the vocative force.
- source_word: עַוָּתָתִי
  chosen: the wrong done to me
  alternatives:
  - my wrong
  - my affliction
  - the injustice against me
  lexicon: HALOT
  rationale: From עַוָּתָה/עוּת, denoting distortion, wrong, or injustice. In context
    the speaker is appealing against mistreatment suffered, not confessing his own
    wrongdoing, so an objective sense ('wrong done to me') best fits the parallel
    with 'judge my case.'
- source_word: שָׁפְטָה
  chosen: judge
  alternatives:
  - vindicate
  - decide
  - give judgment on
  lexicon: HALOT
  rationale: Imperative/vocative form from שׁפט, requesting judicial action from God.
    'Judge' keeps the legal metaphor explicit; 'vindicate' is interpretive and is
    therefore left as an alternative rather than placed in the main text.
- source_word: מִשְׁפָּטִי
  chosen: my case
  alternatives:
  - my cause
  - my judgment
  - my justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal claim, or case. Here, after
    an appeal to God to act judicially, 'my case' is natural modern English that preserves
    the forensic sense without awkwardness.
