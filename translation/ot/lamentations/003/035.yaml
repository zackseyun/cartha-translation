theological_decisions:
- issue: Rendering the divine title עֶלְיוֹן
  chosen_reading: the Most High
  alternative_readings:
  - the Exalted One
  rationale: This is a title for God, not a personal name. 'The Most High' preserves
    the theological force of God's supreme status without importing additional doctrinal
    interpretation.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
