id: LAM.3.35
reference: Lamentations 3:35
source:
  edition: WLC
  text: לְ/הַטּוֹת֙ מִשְׁפַּט גָּ֔בֶר נֶ֖גֶד פְּנֵ֥י עֶלְיֽוֹן־׃
translation:
  text: to deny a man justice before the face of the Most High—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to turn aside the justice of a man before the presence of the Most High.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/הַטּוֹת
  chosen: to deny
  alternatives:
  - to turn aside
  - to pervert
  - to bend
  lexicon: HALOT
  rationale: The Hiphil infinitive of נטה literally means 'to turn aside' or 'to bend.'
    In legal context with מִשְׁפַּט ('justice/judgment'), the idiom means to distort
    or deny proper justice. 'Deny' is concise modern English that captures the legal
    wrong without sounding archaic; the more literal sense is preserved in the alternatives.
- source_word: מִשְׁפַּט
  chosen: justice
  alternatives:
  - judgment
  - legal right
  - case
  lexicon: HALOT
  rationale: Here מִשְׁפַּט refers not to a judicial verdict in the abstract but to
    the just legal due owed to a person. 'Justice' best fits the context and reads
    naturally with the infinitive phrase.
- source_word: גָּבֶר
  chosen: a man
  alternatives:
  - a person
  - a strong man
  lexicon: HALOT
  rationale: The noun is grammatically and lexically masculine, often meaning 'man'
    in the sense of an individual male or representative human. Per the translation
    philosophy's gender-accurate principle, 'a man' is preferred over the gender-neutral
    'a person.'
- source_word: נֶגֶד פְּנֵי
  chosen: before the face of
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: The phrase literally means 'before the face of' and conveys being in
    full view of or in the presence of. Retaining 'face' preserves the Hebrew vividness
    while remaining intelligible in English.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: עֶלְיוֹן is a divine title meaning 'Most High.' This is the standard
    and most transparent English rendering in biblical context.
