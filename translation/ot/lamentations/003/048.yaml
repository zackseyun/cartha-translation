id: LAM.3.48
reference: Lamentations 3:48
source:
  edition: WLC
  text: פַּלְגֵי מַ֨יִם֙ תֵּרַ֣ד עֵינִ֔/י עַל שֶׁ֖בֶר בַּת עַמִּֽ/י־־־׃ס
translation:
  text: Streams of water run down from my eyes over the destruction of the daughter
    of my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ruin' or 'the brokenness of the daughter of my people.'
    reason: lexical_alternative
  - marker: b
    text: '''The daughter of my people'' is a Hebrew poetic expression personifying
      the people, often Zion/Judah, as a daughter.'
    reason: cultural_note
lexical_decisions:
- source_word: פַּלְגֵי מַיִם
  chosen: Streams of water
  alternatives:
  - Rivulets of water
  - Channels of water
  - Torrents of water
  lexicon: HALOT
  rationale: פֶּלֶג commonly denotes a channel, stream, or divided flow. In poetic
    context with tears, 'streams of water' preserves the vivid metaphor naturally
    in English without over-intensifying to 'torrents.'
- source_word: תֵּרַד
  chosen: run down
  alternatives:
  - descend
  - flow down
  - pour down
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down, descend.' With tears/eye imagery,
    idiomatic English is 'run down' or 'flow down.' 'Run down' is concise and preserves
    the motion from the eye.
- source_word: עֵינִי
  chosen: my eyes
  alternatives:
  - my eye
  lexicon: HALOT
  rationale: Though morphologically singular with 1cs suffix, Hebrew often uses the
    singular collectively for the pair of eyes. English idiom strongly prefers the
    plural here.
- source_word: עַל
  chosen: over
  alternatives:
  - because of
  - for
  - on account of
  lexicon: HALOT
  rationale: The preposition marks the cause or occasion of weeping. 'Over' is a natural
    English rendering for lamenting grief while staying close to the Hebrew.
- source_word: שֶׁבֶר
  chosen: the destruction
  alternatives:
  - the ruin
  - the brokenness
  - the breach
  - the fracture
  lexicon: HALOT
  rationale: שֶׁבֶר in lament contexts refers to ruin, collapse, or devastation. 'Destruction'
    communicates communal catastrophe clearly; 'brokenness' is possible but can sound
    more abstract or internal than the context suggests.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter, my people
  - my people's daughter
  lexicon: HALOT
  rationale: This is a conventional Hebrew personification for the community or city
    associated with the speaker's people. Retaining 'the daughter of my people' preserves
    the metaphor and lament diction rather than flattening it into paraphrase.
