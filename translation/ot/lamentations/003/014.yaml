id: LAM.3.14
reference: Lamentations 3:14
source:
  edition: WLC
  text: הָיִ֤יתִי שְּׂחֹק֙ לְ/כָל עַמִּ֔/י נְגִינָתָ֖/ם כָּל הַ/יּֽוֹם־־׃
translation:
  text: I have become a laughingstock to all my people, their song all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their taunt-song' or 'their mocking song.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I became
  - I was
  lexicon: HALOT
  rationale: Qal perfect 1cs of היה can be rendered as a present state resulting from
    prior events ('have become') in lament context, conveying the speaker's ongoing
    condition more naturally than simple past while remaining close to the Hebrew.
- source_word: שְּׂחֹק
  chosen: a laughingstock
  alternatives:
  - laughter
  - mockery
  - an object of ridicule
  lexicon: HALOT
  rationale: The noun denotes derision or something laughed at. 'A laughingstock'
    idiomatically captures the predicative sense after 'become' better than the more
    abstract 'laughter.'
- source_word: לְכָל
  chosen: to all
  alternatives:
  - for all
  - before all
  lexicon: HALOT
  rationale: The preposition ל with this predicate construction marks relation toward
    those doing the mocking; 'to all' is natural English and preserves the directionality.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my own people
  lexicon: HALOT
  rationale: The noun with 1cs suffix straightforwardly means 'my people.' 'My own
    people' is interpretive emphasis not explicit in the Hebrew, though contextually
    possible.
- source_word: נְגִינָתָם
  chosen: their song
  alternatives:
  - their taunt-song
  - their mocking song
  - their music
  lexicon: HALOT
  rationale: The noun can denote music, song, or taunt-song depending on context.
    In parallel with 'laughingstock,' it likely refers to a derisive song about the
    speaker. 'Their song' keeps the wording concise and literal enough, while the
    mocking nuance is supplied by the context; stronger interpretive options are preserved
    in a footnote.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: This common temporal expression is best rendered idiomatically in modern
    English as 'all day long.'
