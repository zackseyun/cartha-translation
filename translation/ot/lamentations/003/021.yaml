theological_decisions:
- issue: Anthropological idiom לֵב/heart
  chosen_reading: Rendered idiomatically as 'mind' within 'call to mind' rather than
    retaining 'heart' literally.
  alternative_readings:
  - This I bring back to my heart; therefore I hope.
  rationale: The Hebrew 'heart' includes thought, memory, and inner resolve. Rendering
    the idiom as 'call to mind' preserves meaning without importing a modern emotion-only
    sense of 'heart.' No doctrinal issue is altered; this is a semantic and stylistic
    decision in line with optimal equivalence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
