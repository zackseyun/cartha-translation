id: LAM.3.21
reference: Lamentations 3:21
source:
  edition: WLC
  text: זֹ֛את אָשִׁ֥יב אֶל לִבִּ֖/י עַל כֵּ֥ן אוֹחִֽיל־־׃ס
translation:
  text: This I call to mind; therefore I have hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'This I bring back to my heart; therefore I hope.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This thing
  - This matter
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring forward/backward to the content
    being recalled. Simple 'This' is natural English and preserves the open reference.
- source_word: אָשִׁיב
  chosen: I call
  alternatives:
  - I bring back
  - I return
  lexicon: HALOT
  rationale: Hiphil of שוב literally means 'cause to return/bring back.' With אֶל־לִבִּי,
    the idiom means to bring back to one's heart/mind, hence 'I call ... to mind'
    in idiomatic English.
- source_word: אֶל לִבִּי
  chosen: to mind
  alternatives:
  - to my heart
  - to my mind
  lexicon: HALOT
  rationale: Hebrew 'to my heart' often denotes inward reflection, memory, or resolve.
    'To mind' communicates the idiom clearly in modern English while preserving the
    cognitive sense; 'heart' is not excluded theologically but would sound less natural
    here.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - thus
  lexicon: HALOT
  rationale: Standard inferential phrase marking consequence. 'Therefore' best preserves
    the logical connection between recollection and resulting hope.
- source_word: אוֹחִיל
  chosen: I have hope
  alternatives:
  - I hope
  - I wait expectantly
  lexicon: HALOT
  rationale: Hiphil of יחל commonly conveys hoping or waiting in expectation. 'I have
    hope' fits the context of renewed confidence and reads naturally in English; 'I
    hope' could sound weaker or more wishful than the Hebrew in this lament context.
