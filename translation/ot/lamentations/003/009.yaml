id: LAM.3.9
reference: Lamentations 3:9
source:
  edition: WLC
  text: גָּדַ֤ר דְּרָכַ/י֙ בְּ/גָזִ֔ית נְתִיבֹתַ֖/י עִוָּֽה׃ס
translation:
  text: He has walled in my ways with hewn stone; he has made my paths crooked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has fenced in my ways.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with dressed stone' or 'with cut stone.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he has twisted my paths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדַר
  chosen: has walled in
  alternatives:
  - has fenced in
  - has blocked
  lexicon: HALOT
  rationale: The verb means to wall up, fence in, or enclose. 'Has walled in' preserves
    the concrete image of obstruction better than the more generic 'blocked,' and
    fits the following phrase 'with hewn stone.'
- source_word: דְּרָכַי
  chosen: my ways
  alternatives:
  - my roadways
  - my course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, path,' and in poetic contexts can
    carry both literal and figurative force. 'My ways' preserves that breadth and
    pairs naturally with the parallel 'my paths.'
- source_word: בְּגָזִית
  chosen: with hewn stone
  alternatives:
  - with cut stone
  - with dressed stone
  - with ashlar
  lexicon: HALOT
  rationale: גָּזִית refers to hewn or dressed stone. 'Hewn stone' is clear, natural
    English and preserves the image of a solid, deliberately constructed barrier.
- source_word: נְתִיבֹתַי
  chosen: my paths
  alternatives:
  - my tracks
  - my pathways
  lexicon: HALOT
  rationale: נְתִיבָה denotes a path or track. 'My paths' is idiomatic, concise, and
    maintains the poetic parallelism with 'my ways.'
- source_word: עִוָּה
  chosen: has made crooked
  alternatives:
  - has twisted
  - has bent out of shape
  - has perverted
  lexicon: HALOT
  rationale: The verb means to bend, twist, or make crooked. In this context of obstructed
    travel, 'has made crooked' best preserves the path imagery and avoids importing
    a moral sense that 'perverted' might suggest in English.
