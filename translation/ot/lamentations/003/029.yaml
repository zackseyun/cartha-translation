theological_decisions:
- issue: Idiomatic posture of humility and submission
  chosen_reading: Retain the concrete image 'put his mouth in the dust' rather than
    interpretively paraphrasing it.
  alternative_readings:
  - bow in humiliation
  - remain silent in abasement
  rationale: The phrase likely signifies deep humility, submission, or penitential
    silence before God, but the Hebrew presents this through vivid bodily imagery.
    Following optimal equivalence and the instruction not to paraphrase beyond the
    source, the main text preserves the image while allowing interpretive nuance to
    remain implicit.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
