id: LAM.3.28
reference: Lamentations 3:28
source:
  edition: WLC
  text: יֵשֵׁ֤ב בָּדָד֙ וְ/יִדֹּ֔ם כִּ֥י נָטַ֖ל עָלָֽי/ו׃
translation:
  text: Let him sit alone and be silent, for he has laid it on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for he has imposed a burden on him.' The Hebrew leaves both the subject
      ('he') and the object ('it') implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  chosen: Let him sit
  alternatives:
  - He sits
  - He should sit
  lexicon: HALOT
  rationale: 'Qal imperfect/jussive 3ms in this context functions exhortationally
    within the surrounding sequence of admonitions (cf. nearby jussives), so English
    is best rendered as a jussive: ''Let him sit'' rather than a simple future/present.'
- source_word: בָּדָד
  chosen: alone
  alternatives:
  - solitary
  - in isolation
  lexicon: HALOT
  rationale: The noun/adverb conveys solitude or isolation. 'Alone' is the most natural
    modern English equivalent and preserves the emotional force without sounding stilted.
- source_word: וְיִדֹּם
  chosen: and be silent
  alternatives:
  - and be still
  - and keep silent
  lexicon: HALOT
  rationale: From דמם, here likely expressing silence/stillness under affliction.
    'Be silent' fits the lament context and pairs naturally with 'sit alone.' 'Be
    still' is possible but less explicit.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'For' is concise and natural
    in English, preserving the causal sense.
- source_word: נָטַל
  chosen: has laid it on
  alternatives:
  - has borne
  - has lifted
  - has imposed
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry/take,' but with עַל it idiomatically
    conveys placing or laying a burden upon someone. 'Has laid it on' best captures
    the contextual sense of imposed affliction or yoke.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: Straightforward prepositional phrase. 'On him' is idiomatic modern English.
