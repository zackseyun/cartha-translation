theological_decisions:
- issue: Implicit subject of נָטַל and implied object
  chosen_reading: The subject is left implicit ('he'), and the imposed burden is represented
    by 'it' in English without specifying God or naming the burden.
  alternative_readings:
  - for the Lord has laid it on him
  - for he has borne it upon him
  rationale: The Hebrew clause does not explicitly name the subject or object. English
    requires some completion for readability, but the translation should not import
    'the Lord' or over-specify the burden where the text leaves it implicit. Using
    'he has laid it on him' preserves the ambiguity better than resolving it doctrinally
    or interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
