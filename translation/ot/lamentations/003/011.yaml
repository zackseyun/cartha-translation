id: LAM.3.11
reference: Lamentations 3:11
source:
  edition: WLC
  text: דְּרָכַ֥/י סוֹרֵ֛ר וַֽ/יְפַשְּׁחֵ֖/נִי שָׂמַ֥/נִי שֹׁמֵֽם׃
translation:
  text: He turned my paths aside and tore me apart; he made me desolate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mauled me.' The rare verb likely conveys violent tearing, possibly with
      animal imagery carried over from the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכַי
  chosen: my paths
  alternatives:
  - my ways
  - my road
  lexicon: HALOT
  rationale: Plural construct with 1cs suffix from דֶּרֶךְ, referring metaphorically
    to the speaker's course or way of life. 'My paths' preserves the plural and the
    concrete imagery better than the more abstract 'my ways.'
- source_word: סוֹרֵר
  chosen: turned ... aside
  alternatives:
  - turned away
  - made crooked
  - diverted
  lexicon: HALOT
  rationale: From סורר/סור in a causative or active sense of turning aside or diverting.
    With 'my paths' as object, the sense is that God diverted the speaker's course.
    'Turned ... aside' is idiomatic English and keeps the directional force.
- source_word: וַיְפַשְּׁחֵנִי
  chosen: tore me apart
  alternatives:
  - mauled me
  - tore me to pieces
  - lacerated me
  lexicon: HALOT
  rationale: The verb פשׁח is rare and contextually vivid, especially following the
    image of a predator in the surrounding verses. 'Tore me apart' conveys violent
    rending without over-specifying the manner. 'Mauled me' is possible in context
    but is more interpretive and therefore preserved as an alternative rather than
    placed in the main text.
- source_word: שָׂמַנִי
  chosen: he made me
  alternatives:
  - he set me
  - he placed me
  lexicon: HALOT
  rationale: Common verb שׂים, here with resultative complement. 'Made me' fits natural
    English before the predicate adjective 'desolate' and communicates the resulting
    state.
- source_word: שֹׁמֵם
  chosen: desolate
  alternatives:
  - appalled
  - devastated
  - a desolation
  lexicon: HALOT
  rationale: The participial/adjectival form denotes being laid waste or desolated.
    'Desolate' best captures the state of ruin in context. 'Appalled' can be a contextual
    nuance elsewhere, but here the devastation motif is stronger.
