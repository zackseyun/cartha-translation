id: LAM.3.19
reference: Lamentations 3:19
source:
  edition: WLC
  text: זְכָר עָנְיִ֥/י וּ/מְרוּדִ֖/י לַעֲנָ֥ה וָ/רֹֽאשׁ־׃
translation:
  text: Remember my affliction and my wandering, the wormwood and the gall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my homelessness' for 'my wandering'; the Hebrew term suggests unsettled
      roaming or vagrancy.
    reason: lexical_alternative
  - marker: b
    text: '''Wormwood and gall'' are concrete images of bitterness and poison; the
      phrase may also be understood metaphorically as extreme bitterness.'
    reason: cultural_note
lexical_decisions:
- source_word: זְכָר
  chosen: Remember
  alternatives:
  - Remember!
  - Call to mind
  lexicon: HALOT
  rationale: 'Qal imperative 2ms from זכר, functioning as a direct plea/address: ''Remember.''
    An imperative is more natural than an infinitive-like English rendering here.'
- source_word: עָנְיִי
  chosen: my affliction
  alternatives:
  - my misery
  - my suffering
  lexicon: HALOT
  rationale: From עֳנִי/עָנִי in the sense of affliction, misery, or suffering. 'Affliction'
    preserves the concrete weight of distress without overinterpreting it psychologically.
- source_word: מְרוּדִי
  chosen: my wandering
  alternatives:
  - my homelessness
  - my restlessness
  lexicon: HALOT
  rationale: The noun denotes roaming or unsettled wandering. 'Wandering' best preserves
    the image and remains broad enough to include the exile-like instability implied
    by the context. 'Homelessness' is interpretive and narrower.
- source_word: לַעֲנָה
  chosen: wormwood
  alternatives:
  - bitterness
  lexicon: HALOT
  rationale: A literal plant term often associated metaphorically with bitterness.
    The Hebrew uses the concrete noun, so the main text preserves the image as 'wormwood'
    rather than flattening it to the abstraction 'bitterness'.
- source_word: וָרֹאשׁ
  chosen: the gall
  alternatives:
  - poison
  - hemlock
  lexicon: HALOT
  rationale: רֹאשׁ can denote a poisonous/bitter plant or its venom-like effect. In
    poetic pairing with 'wormwood,' 'gall' is a well-established and suitably concrete
    English equivalent that preserves the bitterness/poison imagery.
