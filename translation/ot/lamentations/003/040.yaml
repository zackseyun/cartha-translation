theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render שׁוּב as 'return' or 'repent'
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The Hebrew verb fundamentally denotes turning/returning. 'Return' preserves the metaphor and theological openness of covenant restoration without narrowing the sense to an explicitly interior act, though repentance is contextually involved.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than over-resolve
