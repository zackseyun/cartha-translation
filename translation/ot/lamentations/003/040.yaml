theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse addresses covenant return to Israel's God. Following the project's
    contested-terms policy, the Tetragrammaton is rendered 'the LORD' rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render שׁוּב as 'return' or 'repent'
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The Hebrew verb fundamentally denotes turning/returning. 'Return' preserves
    the metaphor and theological openness of covenant restoration without narrowing
    the sense to an explicitly interior act, though repentance is contextually involved.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension rather than over-resolve
