id: LAM.3.20
reference: Lamentations 3:20
source:
  edition: WLC
  text: זָכ֣וֹר תִּזְכּ֔וֹר ו/תשיח עָלַ֖/י נַפְשִֽׁ/י׃
translation:
  text: My soul continually remembers, and is bowed down within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Remembering, it remembers; and my soul is bowed down
      upon me.' The repetition intensifies the act of remembering.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר תִּזְכּוֹר
  chosen: continually remembers
  alternatives:
  - surely remembers
  - keeps remembering
  - indeed remembers
  lexicon: HALOT
  rationale: The infinitive absolute followed by the imperfect of זכר intensifies
    the verbal idea. In English, a natural way to convey this emphasis is 'continually
    remembers' or 'keeps remembering.' Because the subject is supplied later as 'my
    soul' (feminine), the clause is rendered with that subject in view rather than
    as an impersonal imperative-like form.
- source_word: וְתָשִׁיחַ
  chosen: is bowed down
  alternatives:
  - is downcast
  - sinks down
  - is humbled
  lexicon: HALOT
  rationale: From שׁוח/שׁחח in the Hiphil, the sense here is that the soul is brought
    low or bowed down. 'Is bowed down' preserves the concrete metaphor while remaining
    idiomatic. 'Is downcast' is possible, but slightly more interpretive.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Literally 'upon me,' but with נפשי as subject and the idiom of inner
    dejection, English expresses the sense more naturally as 'within me.' This is
    an optimal-equivalence rendering of the Hebrew idiom rather than a denial of the
    preposition's literal force.
- source_word: נַפְשִׁי
  chosen: My soul
  alternatives:
  - I myself
  - my inner being
  lexicon: HALOT
  rationale: נפשׁ often denotes the self or inner life. 'My soul' preserves the poetic
    and anthropological texture of the Hebrew and fits the lament context. Alternatives
    such as 'I myself' or 'my inner being' are possible but flatten the poetic diction.
