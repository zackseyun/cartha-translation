theological_decisions:
- issue: Anthropomorphic expression of divine disposition
  chosen_reading: from his heart
  alternative_readings:
  - willingly
  rationale: The verse speaks of God's afflicting not arising from his heart, expressing
    that judgment is not his delight or inner inclination. The literal idiom is preserved
    to avoid reducing the statement to a flattened abstraction while still allowing
    the idiomatic sense to be noted.
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Representative masculine expression
  chosen_reading: the sons of man
  alternative_readings:
  - human beings
  - people
  rationale: The Hebrew phrase is grammatically masculine and representative. Following
    the gender-accurate policy, the translation keeps the masculine form in the main
    text rather than replacing it with a gender-neutral paraphrase, while preserving
    the broader human reference in a footnote.
  doctrine_reference: Translation philosophy §4
