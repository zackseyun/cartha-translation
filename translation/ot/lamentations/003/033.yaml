id: LAM.3.33
reference: Lamentations 3:33
source:
  edition: WLC
  text: כִּ֣י לֹ֤א עִנָּה֙ מִ/לִּבּ֔/וֹ וַ/יַּגֶּ֖ה בְנֵי אִֽישׁ־׃ס
translation:
  text: For he does not afflict from his heart or grieve the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'willingly'; literally, 'from his heart.'
    reason: lexical_alternative
  - marker: b
    text: '''The sons of man'' is a Hebrew expression referring to human beings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits the explanatory flow in English while preserving the causal sense.
- source_word: לֹא
  chosen: does not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Rendered with English auxiliary support to produce natural modern English
    while preserving straightforward negation.
- source_word: עִנָּה
  chosen: afflict
  alternatives:
  - humble
  - oppress
  - cause suffering
  lexicon: HALOT
  rationale: In this context the verb refers to causing affliction or suffering. 'Afflict'
    preserves the gravity and broad scope better than the narrower 'humble' or the
    more interpretive 'cause suffering.'
- source_word: מִלִּבּוֹ
  chosen: from his heart
  alternatives:
  - willingly
  - from the heart
  lexicon: HALOT
  rationale: The Hebrew is literally 'from his heart.' Retaining the concrete idiom
    preserves the anthropomorphic expression and avoids over-interpreting it as merely
    'willingly,' though that sense is related and worth preserving in a footnote.
- source_word: וַיַּגֶּה
  chosen: or grieve
  alternatives:
  - or cause grief
  - or afflict
  lexicon: HALOT
  rationale: The verb denotes causing grief or sorrow. 'Grieve' is concise and natural
    in English, while distinguishing it from the previous verb rather than flattening
    both into the same gloss.
- source_word: בְנֵי אִישׁ
  chosen: the sons of man
  alternatives:
  - human beings
  - people
  - the children of men
  lexicon: HALOT
  rationale: This expression is literally 'sons of man/man.' Per the project's gender-accurate
    philosophy, the masculine representative form is retained in the main text rather
    than neutralized. A more inclusive sense can be noted in a footnote.
