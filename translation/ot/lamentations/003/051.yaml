id: LAM.3.51
reference: Lamentations 3:51
source:
  edition: WLC
  text: עֵינִ/י֙ עֽוֹלְלָ֣ה לְ/נַפְשִׁ֔/י מִ/כֹּ֖ל בְּנ֥וֹת עִירִֽ/י׃ס
translation:
  text: My eye causes grief to my soul because of all the daughters of my city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My eye afflicts my soul more than all the daughters of my city.' The
      Hebrew of 'because of/from all' is difficult and may be taken comparatively
      rather than causally.
    reason: alternative_reading
  - marker: b
    text: '''The daughters of my city'' is a Hebrew expression for the female inhabitants
      of the city.'
    reason: cultural_note
lexical_decisions:
- source_word: עֵינִי
  chosen: My eye
  alternatives:
  - My eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with 1cs suffix ('my eye'). English can retain
    the singular idiomatically here, matching the poetic personification of the eye
    as the agent of grief.
- source_word: עוללה
  chosen: causes grief
  alternatives:
  - deals harshly with
  - afflicts
  - wears out
  lexicon: HALOT
  rationale: The verb from עלל in this context conveys harmful effect or mistreatment.
    With 'my eye' as subject and 'to my soul' as complement, the sense is that weeping/sight
    brings inner suffering. 'Causes grief' communicates the idiomatic force in clear
    English without over-paraphrasing.
- source_word: לנפשי
  chosen: to my soul
  alternatives:
  - to me
  - to my life
  - to my inner self
  lexicon: HALOT
  rationale: נפש often denotes the self, life, or inner being. 'Soul' preserves the
    Hebrew term and the lament's emotional depth; the preposition ל is retained as
    'to,' reflecting the construction rather than flattening it to a simple object.
- source_word: מכל
  chosen: because of all
  alternatives:
  - more than all
  - from all
  lexicon: HALOT
  rationale: The preposition מן with כל can be comparative ('more than all') or causal/source-related
    depending on context. Here the line most naturally means that the speaker's grief
    is occasioned by what he sees regarding all the daughters of the city. This avoids
    an awkward comparison and fits the lament context.
- source_word: בנות
  chosen: the daughters
  alternatives:
  - the women
  - the girls
  lexicon: HALOT
  rationale: Literally 'daughters.' In lament poetry this can denote the female inhabitants
    of the city. 'Daughters' preserves the metaphorical/corporate expression and its
    pathos better than flattening to 'women' or 'girls'.
- source_word: עירי
  chosen: of my city
  alternatives:
  - of the city
  lexicon: HALOT
  rationale: 'The 1cs suffix is explicit: ''my city.'' Retaining it preserves the
    speaker''s personal identification with the city''s suffering.'
