id: LAM.3.15
reference: Lamentations 3:15
source:
  edition: WLC
  text: הִשְׂבִּיעַ֥/נִי בַ/מְּרוֹרִ֖ים הִרְוַ֥/נִי לַעֲנָֽה׃ס
translation:
  text: He has filled me with bitterness; he has made me drink wormwood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has drenched me with wormwood' or 'He has given me my fill of wormwood.'
      The Hebrew verb can carry the sense of giving drink abundantly or saturating.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׂבִּיעַנִי
  chosen: has filled me
  alternatives:
  - has satisfied me
  - has sated me
  lexicon: HALOT
  rationale: The Hiphil of שׂבע commonly means to satisfy or fill. In this context
    of affliction, 'filled me' communicates being made full of something unpleasant
    more naturally than 'satisfied me,' which in modern English can sound positive.
- source_word: בַמְּרוֹרִים
  chosen: with bitterness
  alternatives:
  - with bitter things
  - with bitter herbs
  lexicon: HALOT
  rationale: The plural noun from מרור denotes bitter things/bitterness. 'With bitterness'
    gives idiomatic English while preserving the metaphorical sense of being filled
    with bitter suffering. 'Bitter herbs' would be too specific here without contextual
    warrant.
- source_word: הִרְוַנִי
  chosen: has made me drink
  alternatives:
  - has drenched me
  - has saturated me
  - has given me my fill
  lexicon: HALOT
  rationale: The Hiphil of רוה can mean to give drink, drench, or saturate. Because
    the object is לענה ('wormwood'), 'has made me drink' best preserves the concrete
    metaphor and parallels the first colon.
- source_word: לַעֲנָה
  chosen: wormwood
  alternatives:
  - bitterness
  - gall
  lexicon: HALOT
  rationale: לענה refers literally to wormwood, a bitter plant, and is often used
    metaphorically for bitter suffering or poison-like affliction. 'Wormwood' preserves
    the Hebrew image and its biblical resonance better than flattening it to 'bitterness.'
