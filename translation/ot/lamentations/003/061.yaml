id: LAM.3.61
reference: Lamentations 3:61
source:
  edition: WLC
  text: שָׁמַ֤עְתָּ חֶרְפָּתָ/ם֙ יְהוָ֔ה כָּל מַחְשְׁבֹתָ֖/ם עָלָֽ/י־׃
translation:
  text: You have heard their reproach, O LORD, all their schemes against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their thoughts concerning me.' The Hebrew noun can mean 'thoughts'
      or 'plans'; in context it likely refers to hostile schemes.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ
  chosen: You have heard
  alternatives:
  - You heard
  - You have listened to
  lexicon: HALOT
  rationale: Qal perfect 2ms of שׁמע addressed to YHWH. English present perfect fits
    the prayerful context, expressing a completed action with present relevance. 'Heard'
    is the plain sense; 'listened to' is possible but less direct.
- source_word: חֶרְפָּתָם
  chosen: their reproach
  alternatives:
  - their taunt
  - their disgrace
  - their insult
  lexicon: HALOT
  rationale: חֶרְפָּה commonly denotes reproach, scorn, or taunting disgrace. 'Reproach'
    preserves both the verbal abuse and shame dimension without over-specifying a
    single form such as 'taunt'.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Because it is used in direct
    address here, 'O LORD' is the most natural English vocative form.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all' here, modifying the plural noun that
    follows.
- source_word: מַחְשְׁבֹתָם
  chosen: their schemes
  alternatives:
  - their thoughts
  - their plans
  - their devices
  lexicon: HALOT
  rationale: Though the noun can mean 'thoughts,' in this hostile context ('against
    me') it likely refers to hostile plans or schemes. 'Schemes' captures the adversarial
    nuance better than the more neutral 'thoughts'.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - about me
  - upon me
  lexicon: HALOT
  rationale: With hostile plotting language, על commonly carries an adversative sense
    in English. 'Against me' best reflects the context of opposition.
