id: LAM.3.52
reference: Lamentations 3:52
source:
  edition: WLC
  text: צ֥וֹד צָד֛וּ/נִי כַּ/צִּפּ֖וֹר אֹיְבַ֥/י חִנָּֽם׃
translation:
  text: My enemies hunted me relentlessly like a bird, without cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew uses an infinitive absolute with the finite verb ('hunting they hunted
      me') for emphasis; alternatively, 'My enemies surely hunted me down like a bird,
      without cause.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צוֹד / צָדוּנִי
  chosen: hunted me relentlessly
  alternatives:
  - hunted me down
  - surely hunted me
  - trapped me
  lexicon: HALOT
  rationale: The infinitive absolute צוֹד followed by the finite verb צָדוּנִי intensifies
    the verbal idea. The root צוד commonly conveys hunting/trapping game. 'Hunted
    me relentlessly' captures both the predatory imagery and the intensification without
    becoming wooden. 'Trapped me' is possible but too result-focused; the verse emphasizes
    hostile pursuit.
- source_word: כַּצִּפּוֹר
  chosen: like a bird
  alternatives:
  - like a sparrow
  - as one hunts a bird
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a small bird, not a specific species here.
    'Like a bird' preserves the simile and the vulnerability implied by prey imagery.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those who hate me
  - my foes
  lexicon: HALOT
  rationale: The noun straightforwardly denotes enemies/foes. 'My enemies' is the
    most natural and transparent modern English rendering.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without reason
  lexicon: HALOT
  rationale: חִנָּם here indicates groundless hostility rather than lack of payment.
    'Without cause' is idiomatic English and preserves the moral claim of unjust persecution.
