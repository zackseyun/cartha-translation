theological_decisions:
- issue: Divine sovereignty language in צוה
  chosen_reading: commanded
  alternative_readings:
  - ordained
  - decreed
  rationale: The verse asserts that no event comes about apart from the Lord's directive
    will. To avoid importing a stronger systematic-theological term than the Hebrew
    itself supplies, the main text keeps the lexical sense 'commanded,' while preserving
    more interpretive alternatives in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
