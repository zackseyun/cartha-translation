id: LAM.3.37
reference: Lamentations 3:37
source:
  edition: WLC
  text: מִ֣י זֶ֤ה אָמַר֙ וַ/תֶּ֔הִי אֲדֹנָ֖/י לֹ֥א צִוָּֽה׃
translation:
  text: Who is this who speaks and it happens, if the Lord has not commanded it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'said ... and it came to pass'; the Hebrew uses past forms in a rhetorical
      statement of general truth.
    reason: lexical_alternative
  - marker: b
    text: Or 'if the Lord has not ordained/decreed it.' The Hebrew verb more literally
      means 'commanded.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי זֶה
  chosen: Who is this
  alternatives:
  - Who is he who
  - Who is this one who
  lexicon: HALOT
  rationale: Interrogative מִי with demonstrative זֶה forms an emphatic rhetorical
    question. 'Who is this' preserves the force and natural English style.
- source_word: אָמַר
  chosen: speaks
  alternatives:
  - said
  - has spoken
  lexicon: HALOT
  rationale: 'Although the Hebrew form is qatal (''said''), in this rhetorical construction
    English present ''speaks'' better conveys the general principle: anyone''s utterance
    resulting in an event. This is an optimal-equivalence adjustment rather than a
    strict formal past tense.'
- source_word: וַתֶּהִי
  chosen: and it happens
  alternatives:
  - and it came to pass
  - and it was
  - and it happens so
  lexicon: HALOT
  rationale: From היה, feminine singular agreeing with an implied event/thing. 'And
    it happens' expresses resultant occurrence in clear modern English without archaic
    'came to pass.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the Lord God
  - the Master
  lexicon: HALOT
  rationale: Adonai here is a divine title, not the Tetragrammaton. Per doctrine,
    titles are translated; 'the Lord' is the natural rendering.
- source_word: לֹא צִוָּה
  chosen: has not commanded it
  alternatives:
  - did not command it
  - has not ordained it
  - has not decreed it
  lexicon: HALOT
  rationale: צוה ordinarily means 'command.' 'Commanded it' stays close to the Hebrew
    while fitting the implied object of the event. 'Ordained/decreed' are interpretive
    expansions and therefore kept as alternatives only.
