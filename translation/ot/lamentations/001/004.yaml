id: LAM.1.4
reference: Lamentations 1:4
source:
  edition: WLC
  text: דַּרְכֵ֨י צִיּ֜וֹן אֲבֵל֗וֹת מִ/בְּלִי֙ בָּאֵ֣י מוֹעֵ֔ד כָּל שְׁעָרֶ֨י/הָ֙
    שֽׁוֹמֵמִ֔ין כֹּהֲנֶ֖י/הָ נֶאֱנָחִ֑ים בְּתוּלֹתֶ֥י/הָ נּוּג֖וֹת וְ/הִ֥יא מַר לָֽ/הּ־־׃ס
translation:
  text: The roads of Zion mourn, because no one comes to the appointed feast; all
    her gates are desolate, her priests groan, her virgins grieve, and she herself
    is bitter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appointed festival' or 'the appointed time'; Hebrew mo'ed can denote
      an appointed time or a festal assembly.
    reason: lexical_alternative
  - marker: b
    text: Or 'her maidens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּרְכֵי צִיּוֹן
  chosen: The roads of Zion
  alternatives:
  - The ways of Zion
  - Zion's roads
  lexicon: HALOT
  rationale: דֶּרֶךְ in the plural can mean roads/ways. In this lament context it
    refers concretely to the approach routes once filled with pilgrims, so 'roads'
    gives a vivid and natural English image while preserving the personification.
- source_word: אֲבֵלוֹת
  chosen: mourn
  alternatives:
  - are mourning
  - lament
  lexicon: HALOT
  rationale: The feminine plural adjective/participle-like form describes the roads
    as being in mourning. 'Mourn' is concise, idiomatic, and preserves the poetic
    personification.
- source_word: מִבְּלִי בָּאֵי מוֹעֵד
  chosen: because no one comes to the appointed feast
  alternatives:
  - for lack of those coming to the appointed time
  - because there are no pilgrims to the festival
  - with no one coming to the appointed festival
  lexicon: HALOT
  rationale: מִבְּלִי marks deprivation/lack ('because of the absence of'). בָּאֵי
    is 'those coming,' and מוֹעֵד can mean appointed time, meeting, or festival. In
    Lamentations' Zion/temple setting, the cultic-festal sense is primary, so 'appointed
    feast' best captures the reference to pilgrimage festivals without over-paraphrasing.
- source_word: כָּל שְׁעָרֶיהָ
  chosen: all her gates
  lexicon: HALOT
  rationale: A straightforward construct phrase with 3fs suffix referring to Zion/Jerusalem
    personified as a woman.
- source_word: שֹׁמֵמִין
  chosen: are desolate
  alternatives:
  - are deserted
  - lie desolate
  lexicon: HALOT
  rationale: The participle conveys devastation/emptiness. 'Are desolate' preserves
    the lament's tone and the broader ruin motif better than the milder 'deserted.'
- source_word: כֹּהֲנֶיהָ
  chosen: her priests
  lexicon: HALOT
  rationale: Direct rendering of the noun with suffix; no reason to generalize or
    paraphrase.
- source_word: נֶאֱנָחִים
  chosen: groan
  alternatives:
  - sigh
  - are groaning
  lexicon: HALOT
  rationale: The Niphal participle denotes audible lamenting or sighing. 'Groan' carries
    stronger anguish and fits the dirge context.
- source_word: בְּתוּלֹתֶיהָ
  chosen: her virgins
  alternatives:
  - her young women
  - her maidens
  lexicon: HALOT
  rationale: בְּתוּלָה most basically denotes a virgin/maiden. 'Virgins' is the more
    lexically transparent rendering; 'young women' would soften a specific term. Because
    'maidens' is also viable and more idiomatic in poetry, it is preserved in a footnote.
- source_word: נּוּגוֹת
  chosen: grieve
  alternatives:
  - are afflicted
  - are sorrowful
  lexicon: HALOT
  rationale: The form conveys being afflicted or grief-stricken. 'Grieve' reads naturally
    in English and matches the emotional register of the verse.
- source_word: וְהִיא
  chosen: and she herself
  alternatives:
  - and she
  - and it
  lexicon: HALOT
  rationale: The pronoun is emphatic. 'She herself' preserves the emphasis and the
    feminine personification of Zion/Jerusalem.
- source_word: מַר לָהּ
  chosen: is bitter
  alternatives:
  - has bitterness
  - it is bitter for her
  - is in bitterness
  lexicon: HALOT
  rationale: The idiom expresses bitter distress. 'Is bitter' is compact and idiomatic
    in English, while the dative לָהּ is absorbed naturally rather than rendered woodenly.
