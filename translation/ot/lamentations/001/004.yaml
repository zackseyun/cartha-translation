theological_decisions:
- issue: Referent and personification of the feminine singular suffixes/pronoun
  chosen_reading: Render Zion/Jerusalem as a personified woman with 'her' and 'she
    herself.'
  alternative_readings:
  - Render more abstractly as 'it' for the city
  rationale: The verse consistently uses feminine forms and personifies Zion/Jerusalem
    in lament. Preserving the feminine personification is faithful to the Hebrew poetry
    and important for the chapter's rhetoric.
  doctrine_reference: Translation philosophy §1, §6
