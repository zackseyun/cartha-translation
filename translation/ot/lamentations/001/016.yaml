id: LAM.1.16
reference: Lamentations 1:16
source:
  edition: WLC
  text: עַל אֵ֣לֶּה אֲנִ֣י בוֹכִיָּ֗ה עֵינִ֤/י עֵינִ/י֙ יֹ֣רְדָה מַּ֔יִם כִּֽי רָחַ֥ק
    מִמֶּ֛/נִּי מְנַחֵ֖ם מֵשִׁ֣יב נַפְשִׁ֑/י הָי֤וּ בָנַ/י֙ שֽׁוֹמֵמִ֔ים כִּ֥י גָבַ֖ר
    אוֹיֵֽב־׀׀־׃ס
translation:
  text: For these things I am weeping; my eye, my eye runs down with water, because
    the comforter who restores my life is far from me. My children have become desolate,
    because the enemy has prevailed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who restores my soul.' Hebrew nephesh can mean 'life,' 'self,' or 'soul'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל אֵלֶּה
  chosen: For these things
  alternatives:
  - Because of these things
  - Over these things
  lexicon: HALOT
  rationale: The preposition עַל with demonstrative אֵלֶּה introduces the cause/object
    of lament. 'For these things' is idiomatic and preserves the lamenting force without
    over-specifying causation.
- source_word: בוֹכִיָּה
  chosen: I am weeping
  alternatives:
  - I weep
  - I am crying
  lexicon: HALOT
  rationale: The participial/feminine form in context conveys ongoing lament by personified
    Daughter Zion/Jerusalem. 'I am weeping' captures the durative sense more naturally
    than a simple present.
- source_word: עֵינִי עֵינִי
  chosen: my eye, my eye
  alternatives:
  - my eyes
  - my eye and my eye
  lexicon: HALOT
  rationale: The singular noun is repeated for poetic intensity. Retaining the repetition
    and singular preserves the Hebrew rhetoric better than smoothing to 'my eyes.'
- source_word: יֹרְדָה מַיִם
  chosen: runs down with water
  alternatives:
  - flows with tears
  - goes down with water
  lexicon: HALOT
  rationale: Literally 'goes down [with] water.' 'Runs down with water' keeps the
    watery imagery while remaining natural English. 'Tears' is interpretive; the Hebrew
    says 'water,' likely as vivid poetic expression.
- source_word: מְנַחֵם
  chosen: the comforter
  alternatives:
  - one who comforts
  - a comforter
  lexicon: HALOT
  rationale: The participle functions substantivally. 'The comforter' fits the context
    of the absent one who could console, while preserving the definite sense implied
    in context.
- source_word: מֵשִׁיב נַפְשִׁי
  chosen: who restores my life
  alternatives:
  - who restores my soul
  - who revives me
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the self/life rather than an abstract immaterial
    'soul.' 'Restores my life' communicates renewal of the whole person and avoids
    importing later dualistic connotations.
- source_word: רָחַק מִמֶּנִּי
  chosen: is far from me
  alternatives:
  - has gone far from me
  - is distant from me
  lexicon: HALOT
  rationale: A straightforward rendering of distance/absence. Present English 'is
    far from me' suits the lament context.
- source_word: בָנַי
  chosen: My children
  alternatives:
  - My sons
  lexicon: HALOT
  rationale: Though literally 'my sons,' בנים often functions collectively for offspring/people.
    In personified Zion's speech, 'children' best conveys the inhabitants/people without
    implying only males.
- source_word: שֹׁמֵמִים
  chosen: have become desolate
  alternatives:
  - are devastated
  - are appalled
  lexicon: HALOT
  rationale: The term denotes devastation/desolation. 'Have become desolate' preserves
    the state resulting from judgment and matches Lamentations' recurring desolation
    language.
- source_word: גָבַר אוֹיֵב
  chosen: the enemy has prevailed
  alternatives:
  - the enemy has grown strong
  - the enemy has overcome
  lexicon: HALOT
  rationale: גבר conveys being strong or prevailing. 'Has prevailed' captures the
    enemy's dominance in context more idiomatically than a wooden 'has become strong.'
