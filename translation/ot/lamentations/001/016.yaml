theological_decisions:
- issue: Rendering of נַפְשִׁי in a lament context
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: The Hebrew נֶפֶשׁ often denotes the life/self/person. Rendering it as
    'life' here avoids importing a narrower anthropological sense and better fits
    the context of consolation and restoration amid catastrophe.
  doctrine_reference: Translation philosophy §1, §3
