theological_decisions:
- issue: Nature of the requested judgment on enemies
  chosen_reading: The verse is rendered as a plea that God bring the enemies' evil
    before himself and treat them correspondingly, without specifying a doctrine of
    personal vengeance beyond the text.
  alternative_readings:
  - A stronger imprecatory sense emphasizing retributive punishment
  - A softer sense focused only on God taking notice of their wrongdoing
  rationale: The Hebrew is a lament-prayer asking God to act in response to enemy
    wrongdoing, in parallel with his prior judgment on Zion. The translation preserves
    that judicial appeal without intensifying or softening it beyond the wording.
  doctrine_reference: Translation philosophy §1, §3
