id: LAM.1.22
reference: Lamentations 1:22
source:
  edition: WLC
  text: תָּבֹ֨א כָל רָעָתָ֤/ם לְ/פָנֶ֨י/ךָ֙ וְ/עוֹלֵ֣ל לָ֔/מוֹ כַּ/אֲשֶׁ֥ר עוֹלַ֛לְתָּ
    לִ֖/י עַ֣ל כָּל פְּשָׁעָ֑/י כִּֽי רַבּ֥וֹת אַנְחֹתַ֖/י וְ/לִבִּ֥/י דַוָּֽי־־־׃פ
translation:
  text: Let all their evil come before you, and deal with them as you have dealt with
    me because of all my transgressions; for my groans are many, and my heart is sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their wickedness'; רָעָה can also mean 'calamity' in some contexts,
      but here likely refers to culpable evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'do to them as you have done to me.' The Hebrew repeats the same verb
      in both clauses.
    reason: lexical_alternative
  - marker: c
    text: Or 'my sighs are many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּבֹא
  chosen: Let ... come
  alternatives:
  - May ... come
  - shall ... come
  lexicon: HALOT
  rationale: Qal imperfect 3fs of בוא used jussively in this prayer context; English
    'Let ... come' best captures the petitionary force without sounding overly archaic.
- source_word: רָעָתָם
  chosen: their evil
  alternatives:
  - their wickedness
  - their calamity
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or disaster. Here, because the following
    clause asks God to treat them as he treated Zion 'because of all my transgressions,'
    the focus is on their culpable wrongdoing rather than merely misfortune; thus
    'their evil' is preferred.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - into your presence
  - before your face
  lexicon: HALOT
  rationale: Standard idiom meaning to come into God's sight or presence. 'Before
    you' is natural modern English and preserves the judicial/prayer nuance.
- source_word: וְעוֹלֵל לָמוֹ
  chosen: and deal with them
  alternatives:
  - and do to them
  - and glean them
  - and bring severe treatment on them
  lexicon: HALOT
  rationale: The verb עלל in this stem/context means to deal with, act against, often
    harshly. 'Deal with them' is idiomatic and prepares for the comparative clause
    'as you have dealt with me.'
- source_word: כַּאֲשֶׁר עוֹלַלְתָּ לִי
  chosen: as you have dealt with me
  alternatives:
  - just as you have done to me
  - as you have treated me
  lexicon: HALOT
  rationale: Maintains the lexical repetition of עלל across the verse while sounding
    natural in English. The perfect refers to God's prior action in judgment on Zion.
- source_word: עַל כָּל פְּשָׁעַי
  chosen: because of all my transgressions
  alternatives:
  - for all my rebellions
  - on account of all my offenses
  lexicon: HALOT
  rationale: פשע carries the sense of rebellion/transgression against God. 'Transgressions'
    is clear, weighty, and fits penitential context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or grounds for the lamenting plea that follows.
    'For' preserves the formal connection well.
- source_word: רַבּוֹת אַנְחֹתַי
  chosen: my groans are many
  alternatives:
  - my sighs are many
  - my moanings are many
  lexicon: HALOT
  rationale: אַנְחָה denotes sighing/groaning from grief. 'Groans' is vivid and contemporary
    without being colloquial.
- source_word: לִבִּי דַוָּי
  chosen: my heart is sick
  alternatives:
  - my heart is faint
  - my heart is in pain
  lexicon: HALOT
  rationale: דַוָּי denotes sickness, weakness, or affliction. 'My heart is sick'
    preserves the metaphor of inner illness and matches the emotional intensity of
    the lament.
