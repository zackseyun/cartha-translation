id: LAM.1.14
reference: Lamentations 1:14
source:
  edition: WLC
  text: נִשְׂקַד֩ עֹ֨ל פְּשָׁעַ֜/י בְּ/יָד֗/וֹ יִשְׂתָּֽרְג֛וּ עָל֥וּ עַל צַוָּארִ֖/י
    הִכְשִׁ֣יל כֹּחִ֑/י נְתָנַ֣/נִי אֲדֹנָ֔/י בִּ/ידֵ֖י לֹא אוּכַ֥ל קֽוּם־־׃ס
translation:
  text: The yoke of my transgressions is bound by his hand; they are woven together,
    they have come up upon my neck; he has made my strength fail. The Lord has given
    me into hands from which I cannot rise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is watched over'; the Hebrew verb is rare and difficult. The context
      favors the sense that the yoke is fastened or bound.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are intertwined' or 'twisted together.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into hands'; the expression leaves the oppressors indefinite.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׂקַד
  chosen: is bound
  alternatives:
  - is watched over
  - is fastened
  lexicon: HALOT
  rationale: The verb is difficult and rare in this form. In context with 'yoke' and
    the following imagery of being placed on the neck, a sense like 'bound/fastened'
    best fits the metaphor of sins being made into an oppressive yoke. 'Watched over'
    reflects another possible sense of the root but fits the context less well here.
- source_word: עֹל
  chosen: yoke
  lexicon: HALOT
  rationale: Standard rendering for the image of oppressive burden or bondage; the
    metaphor is central to the verse.
- source_word: פְּשָׁעַי
  chosen: my transgressions
  alternatives:
  - my rebellions
  - my offenses
  lexicon: HALOT
  rationale: פשע often denotes rebellion or transgression against rightful authority.
    'Transgressions' is clear modern English and preserves the moral-theological weight.
- source_word: בידו
  chosen: by his hand
  alternatives:
  - in his hand
  lexicon: HALOT
  rationale: The preposition can be rendered either way, but 'by his hand' naturally
    expresses agency in English while preserving the Hebrew image.
- source_word: יִשְׂתָּרְגוּ
  chosen: they are woven together
  alternatives:
  - they are intertwined
  - they are twisted together
  lexicon: HALOT
  rationale: This rare verb likely conveys intertwining or interweaving. 'Woven together'
    fits the image of transgressions being formed into a yoke.
- source_word: עָלוּ עַל צַוָּארִי
  chosen: they have come up upon my neck
  alternatives:
  - they are laid on my neck
  - they have mounted onto my neck
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the physical image of the yoke rising
    onto and resting on the speaker's neck. The plural subject naturally refers to
    the intertwined transgressions/yoke-bands.
- source_word: הִכְשִׁיל כֹּחִי
  chosen: he has made my strength fail
  alternatives:
  - he has caused my strength to stumble
  - he has weakened my strength
  lexicon: HALOT
  rationale: The hiphil of כשל literally involves causing to stumble, but with 'strength'
    as object the idiomatic sense is that strength has been brought down or made to
    fail.
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Lord
  - the Master
  lexicon: HALOT
  rationale: As a divine title, 'Lord' is the standard English rendering and aligns
    with the project's treatment of κύριος/Lord-type titles. Capitalized 'The Lord'
    reflects reference to God in context.
- source_word: בידי
  chosen: into hands
  alternatives:
  - into the hands
  lexicon: HALOT
  rationale: The Hebrew lacks the article. English can omit it while still sounding
    natural, and the anarthrous plural leaves the oppressors somewhat indefinite.
- source_word: לֹא אוּכַל קוּם
  chosen: from which I cannot rise
  alternatives:
  - I cannot stand up
  - I am unable to rise
  lexicon: HALOT
  rationale: קום here is best understood as recovering or rising again from subjugation,
    not merely standing physically. 'From which I cannot rise' captures the result
    of being handed over.
