id: LAM.1.2
reference: Lamentations 1:2
source:
  edition: WLC
  text: בָּכ֨וֹ תִבְכֶּ֜ה בַּ/לַּ֗יְלָה וְ/דִמְעָתָ/הּ֙ עַ֣ל לֶֽחֱיָ֔/הּ אֵֽין לָ֥/הּ
    מְנַחֵ֖ם מִ/כָּל אֹהֲבֶ֑י/הָ כָּל רֵעֶ֨י/הָ֙ בָּ֣גְדוּ בָ֔/הּ הָ֥יוּ לָ֖/הּ לְ/אֹיְבִֽים־־־׃ס
translation:
  text: She weeps bitterly in the night, with her tears on her cheeks; among all her
    lovers she has no comforter. All her companions have dealt treacherously with
    her; they have become her enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among all her allies.' The Hebrew 'lovers' preserves the poem's personification
      of the city as a woman and may also imply political partners.
    reason: lexical_alternative
  - marker: b
    text: Or 'all her friends' or 'all her allies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּכוֹ תִבְכֶּה
  chosen: she weeps bitterly
  alternatives:
  - she surely weeps
  - she weeps and weeps
  - she weeps sorely
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'She
    weeps bitterly' captures the emphatic force in natural English without awkward
    literalism.
- source_word: בַּלַּיְלָה
  chosen: in the night
  alternatives:
  - at night
  - by night
  lexicon: HALOT
  rationale: The phrase is temporal. 'In the night' preserves the poetic feel and
    matches the Hebrew prepositional phrase closely.
- source_word: וְדִמְעָתָהּ עַל לֶחֱיָהּ
  chosen: with her tears on her cheeks
  alternatives:
  - and her tears are on her cheeks
  - her tear is on her cheek
  lexicon: HALOT
  rationale: Although 'tear' can appear singular in Hebrew as a collective, English
    idiom prefers the plural here. 'With her tears on her cheeks' preserves the image
    while reading smoothly.
- source_word: אֵין לָהּ מְנַחֵם
  chosen: she has no comforter
  alternatives:
  - there is no one to comfort her
  - she has none to comfort her
  lexicon: HALOT
  rationale: The existential construction plus participle denotes absence of anyone
    giving comfort. 'Comforter' is concise and preserves the nominal force of the
    participle.
- source_word: מִכָּל אֹהֲבֶיהָ
  chosen: among all her lovers
  alternatives:
  - from all her lovers
  - among all who loved her
  lexicon: HALOT
  rationale: In Lamentations, the term often refers to political allies or illicit
    lovers in the prophetic metaphor of Jerusalem as an unfaithful woman. 'Among all
    her lovers' preserves the metaphorical and relational force better than the flatter
    'those who loved her.'
- source_word: כָּל רֵעֶיהָ
  chosen: all her companions
  alternatives:
  - all her friends
  - all her allies
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or associate. 'Companions' fits the
    poetic register and allows both personal and political nuance.
- source_word: בָּגְדוּ בָהּ
  chosen: have dealt treacherously with her
  alternatives:
  - have betrayed her
  - have been faithless to her
  lexicon: HALOT
  rationale: בגד carries the sense of treachery or faithlessness, often covenantal
    or relational. 'Dealt treacherously with her' preserves that stronger nuance better
    than the simpler 'betrayed her.'
- source_word: הָיוּ לָהּ לְאֹיְבִים
  chosen: they have become her enemies
  alternatives:
  - they have been her enemies
  - they became enemies to her
  lexicon: HALOT
  rationale: The construction indicates a change of relation or status. 'Have become
    her enemies' communicates that transition clearly in idiomatic English.
