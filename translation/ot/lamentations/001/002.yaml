theological_decisions:
- issue: Metaphorical portrayal of Jerusalem/Zion as a woman with 'lovers'
  chosen_reading: Retain the relational metaphor with 'lovers' rather than flattening
    to purely political language.
  alternative_readings:
  - allies
  - friends
  rationale: The immediate context personifies the city as a woman, and prophetic
    literature commonly uses 'lovers' for illicit political or idolatrous attachments.
    Preserving 'lovers' keeps the literary and theological force of the metaphor,
    while 'companions' later allows the broader social-political reference of רֵעֶיהָ.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
