theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and longstanding biblical English usage while signaling the covenant
    name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Specificity of נִדָּה imagery
  chosen_reading: an unclean thing
  alternative_readings:
  - a menstruous woman
  - menstrual impurity
  rationale: The Hebrew likely evokes menstrual impurity imagery, but the verse's
    communicative force in context is Jerusalem's status as ritually defiling and
    socially repulsive. The main text uses accessible English while preserving the
    more specific cultic background in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
