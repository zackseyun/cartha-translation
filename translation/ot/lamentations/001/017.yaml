id: LAM.1.17
reference: Lamentations 1:17
source:
  edition: WLC
  text: פֵּֽרְשָׂ֨ה צִיּ֜וֹן בְּ/יָדֶ֗י/הָ אֵ֤ין מְנַחֵם֙ לָ֔/הּ צִוָּ֧ה יְהוָ֛ה לְ/יַעֲקֹ֖ב
    סְבִיבָ֣י/ו צָרָ֑י/ו הָיְתָ֧ה יְרוּשָׁלִַ֛ם לְ/נִדָּ֖ה בֵּינֵי/הֶֽם׃ס
translation:
  text: Zion has spread out her hands; there is no one to comfort her. The LORD has
    commanded concerning Jacob that his enemies surround him; Jerusalem has become
    an unclean thing among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'like a menstruant' or 'as menstrual impurity'; the
      Hebrew term carries ritual-impurity imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֵּרְשָׂה
  chosen: has spread out
  alternatives:
  - stretches out
  - has spread forth
  lexicon: HALOT
  rationale: The verb פרשׂ in the Qal can denote spreading out or extending. In this
    lament context, 'has spread out' conveys the completed gesture of desperate appeal
    without overinterpreting it as prayer specifically.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: בְּיָדֶיהָ
  chosen: her hands
  alternatives:
  - her hand
  lexicon: HALOT
  rationale: Though יָד is singular in lemma, the form here is dual/plural in sense
    with 3fs suffix. English idiom naturally uses 'hands' for the gesture of appeal.
- source_word: אֵין מְנַחֵם לָהּ
  chosen: there is no one to comfort her
  alternatives:
  - she has no comforter
  - there is none comforting her
  lexicon: HALOT
  rationale: This preserves the existential construction and the participial sense
    while using natural modern English. 'Comfort' is a key motif in Lamentations and
    should remain explicit.
- source_word: צִוָּה יְהוָה
  chosen: The LORD has commanded
  alternatives:
  - The LORD commanded
  - The LORD has ordained
  lexicon: HALOT
  rationale: צוה is most directly 'command.' 'Has commanded' matches the perfect aspect
    well in English and preserves divine agency without softening to 'ordained.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לְיַעֲקֹב
  chosen: concerning Jacob
  alternatives:
  - against Jacob
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל with צוה here introduces the one affected by the command.
    'Concerning Jacob' is broad enough to avoid overcommitting to either benefactive
    or adversative nuance while fitting the following clause.
- source_word: סְבִיבָיו
  chosen: surround him
  alternatives:
  - be around him
  - on every side around him
  lexicon: HALOT
  rationale: The noun/adverbial form 'around him' is rendered idiomatically with the
    verb 'surround' in English, which captures the hostile encirclement implied by
    the context.
- source_word: צָרָיו
  chosen: his enemies
  alternatives:
  - his adversaries
  - his foes
  lexicon: HALOT
  rationale: From צרר/צר, denoting those hostile or oppressive toward him. 'Enemies'
    is the clearest modern equivalent.
- source_word: הָיְתָה יְרוּשָׁלִַם
  chosen: Jerusalem has become
  alternatives:
  - Jerusalem became
  - Jerusalem has been
  lexicon: HALOT
  rationale: The clause marks a resulting state. 'Has become' communicates transition
    into disgrace.
- source_word: לְנִדָּה
  chosen: an unclean thing
  alternatives:
  - as an impurity
  - like a menstruant
  - as something impure
  lexicon: HALOT
  rationale: נִדָּה can denote menstrual impurity or something ritually unclean/rejected.
    Because the term carries impurity and repulsion imagery, 'an unclean thing' preserves
    the force without using language that may sound overly clinical or obscure in
    English. The more specific background is preserved in a footnote.
- source_word: בֵּינֵיהֶם
  chosen: among them
  alternatives:
  - in their midst
  - between them
  lexicon: HALOT
  rationale: Idiomatic English for Jerusalem's status in relation to the surrounding
    peoples/enemies.
