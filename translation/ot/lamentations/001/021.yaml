theological_decisions:
- issue: Divine agency in Jerusalem's calamity
  chosen_reading: 'The text explicitly attributes the disaster to God: ''you have
    done it'' and ''you have brought the day you proclaimed.'''
  alternative_readings:
  - A softer rendering that leaves divine agency vague
  rationale: The Hebrew directly addresses God in the second person and attributes
    the calamity and appointed day to him. The translation preserves this theological
    tension rather than muting it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
