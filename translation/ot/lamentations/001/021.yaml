id: LAM.1.21
reference: Lamentations 1:21
source:
  edition: WLC
  text: שָׁמְע֞וּ כִּ֧י נֶאֱנָחָ֣ה אָ֗נִי אֵ֤ין מְנַחֵם֙ לִ֔/י כָּל אֹ֨יְבַ֜/י שָׁמְע֤וּ
    רָֽעָתִ/י֙ שָׂ֔שׂוּ כִּ֥י אַתָּ֖ה עָשִׂ֑יתָ הֵבֵ֥אתָ יוֹם קָרָ֖אתָ וְ/יִֽהְי֥וּ
    כָמֽוֹ/נִי־־׃ס
translation:
  text: They have heard that I groan; there is no one to comfort me. All my enemies
    have heard of my trouble; they rejoice that you have done it. You have brought
    the day you proclaimed; let them become like me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my calamity' or 'my misery' for 'my trouble.' The Hebrew term can denote
      disaster or affliction.
    reason: lexical_alternative
  - marker: b
    text: Or 'You have brought the day you announced.' The verb can mean 'proclaimed'
      or 'announced' in this context.
    reason: lexical_alternative
  - marker: c
    text: Or 'and they will be like me.' The Hebrew form may be read as a wish ('let
      them become like me') or as a future statement, though the wish fits the lament
      context well.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁמְעוּ
  chosen: They have heard
  alternatives:
  - They heard
  lexicon: HALOT
  rationale: Qal perfect 3cp of שׁמע. English present perfect fits the lament context,
    expressing a completed action with present relevance. The subject is left implicit
    at first, then specified by the following clause.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what was heard: ''that I groan.'' ''That''
    is the most natural English complementizer here.'
- source_word: נֶאֱנָחָה
  chosen: I groan
  alternatives:
  - I am groaning
  - I sigh
  lexicon: HALOT
  rationale: From אנח, expressing groaning/sighing in distress. 'I groan' is concise
    and weighty; 'sigh' is weaker than the lament context suggests.
- source_word: אֵין מְנַחֵם לִי
  chosen: there is no one to comfort me
  alternatives:
  - I have no comforter
  - there is none to console me
  lexicon: HALOT
  rationale: The existential אֵין plus participle מְנַחֵם conveys absence of any comforter.
    'There is no one to comfort me' is idiomatic modern English while preserving the
    force.
- source_word: כָּל אֹיְבַי
  chosen: All my enemies
  alternatives:
  - all of my enemies
  lexicon: HALOT
  rationale: Straightforward rendering of the quantified construct phrase.
- source_word: רָעָתִי
  chosen: my trouble
  alternatives:
  - my calamity
  - my misery
  - my evil
  lexicon: HALOT
  rationale: רעה can denote evil, disaster, or affliction. In this lament context
    it refers to the speaker's calamity/suffering rather than moral evil. 'Trouble'
    is accessible English; 'calamity' is a viable stronger alternative.
- source_word: שָׂשׂוּ
  chosen: they rejoice
  alternatives:
  - they are glad
  - they exult
  lexicon: HALOT
  rationale: Conveys active joy at Zion's suffering. 'Rejoice' preserves the moral
    sharpness better than the flatter 'are glad.'
- source_word: כִּי אַתָּה עָשִׂיתָ
  chosen: that you have done it
  alternatives:
  - because you did it
  - for you have acted
  lexicon: HALOT
  rationale: The enemies rejoice specifically because the disaster is understood as
    God's doing. 'Done it' keeps the object implicit as in Hebrew and preserves the
    theological force without over-specifying.
- source_word: הֵבֵאתָ יוֹם קָרָאתָ
  chosen: You have brought the day you proclaimed
  alternatives:
  - You have brought the day you announced
  - You have brought the day you called
  lexicon: HALOT
  rationale: הביא + יום means 'bring a day' in the sense of causing an appointed day
    to arrive. קרא here is best understood as proclaiming/announcing a day rather
    than merely naming or summoning. 'Proclaimed' fits prophetic-judgment idiom.
- source_word: וְיִהְיוּ כָמוֹנִי
  chosen: let them become like me
  alternatives:
  - and they will be like me
  - so that they may be like me
  lexicon: HALOT
  rationale: 'Though morphologically an imperfect, in context it functions naturally
    as a jussive wish/prayer: Zion asks that her enemies come to share her condition.
    ''Let them become like me'' captures the imprecatory force and the process implied
    by היה.'
