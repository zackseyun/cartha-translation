id: LAM.1.3
reference: Lamentations 1:3
source:
  edition: WLC
  text: גָּֽלְתָ֨ה יְהוּדָ֤ה מֵ/עֹ֨נִי֙ וּ/מֵ/רֹ֣ב עֲבֹדָ֔ה הִ֚יא יָשְׁבָ֣ה בַ/גּוֹיִ֔ם
    לֹ֥א מָצְאָ֖ה מָנ֑וֹחַ כָּל רֹדְפֶ֥י/הָ הִשִּׂיג֖וּ/הָ בֵּ֥ין הַ/מְּצָרִֽים־׃ס
translation:
  text: Judah has gone into exile because of affliction and because of great slavery;
    she dwells among the nations and finds no rest. All her pursuers have overtaken
    her in the narrow places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between the straits'; the Hebrew may also echo the idea of distress,
      portraying Judah as trapped with no escape.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלְתָה
  chosen: has gone into exile
  alternatives:
  - has been exiled
  - has gone away captive
  lexicon: HALOT
  rationale: The verb from גלה in the Qal commonly denotes going into exile or being
    carried away. 'Has gone into exile' preserves the exile motif central to Lamentations
    while reading naturally in English.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - Judea
  lexicon: HALOT
  rationale: The proper name refers to the people/land of Judah personified as feminine
    in context. 'Judah' is the standard transliteration and best fits the poetic personification.
- source_word: מֵעֹנִי
  chosen: because of affliction
  alternatives:
  - from affliction
  - out of misery
  - because of poverty
  lexicon: HALOT
  rationale: The preposition מִן here is best taken causally with the following parallel
    phrase, yielding 'because of.' עֹנִי can denote affliction, misery, or poverty;
    'affliction' best captures the broad suffering in context without narrowing it
    only to economic deprivation.
- source_word: וּמֵרֹב עֲבֹדָה
  chosen: and because of great slavery
  alternatives:
  - and because of great servitude
  - and because of much labor
  - and because of harsh bondage
  lexicon: HALOT
  rationale: רֹב means abundance/greatness, and עֲבֹדָה here refers not merely to
    work but oppressive forced service in an exile context. Following the project's
    preference to expose bonded force where salient, 'slavery' better conveys the
    severity than 'labor' or 'service'.
- source_word: הִיא יָשְׁבָה בַגּוֹיִם
  chosen: she dwells among the nations
  alternatives:
  - she sits among the nations
  - she lives among the nations
  lexicon: HALOT
  rationale: יָשַׁב often means dwell/live, though literally 'sit.' In English poetry
    here, 'dwells' preserves the settled-yet-displaced condition. 'Nations' for גּוֹיִם
    is the standard contextual rendering, referring to foreign peoples.
- source_word: לֹא מָצְאָה מָנוֹחַ
  chosen: finds no rest
  alternatives:
  - has found no resting place
  - found no repose
  lexicon: HALOT
  rationale: מָנוֹחַ denotes rest or resting place. 'Finds no rest' is concise, idiomatic,
    and preserves both physical and existential unrest.
- source_word: כָּל רֹדְפֶיהָ
  chosen: All her pursuers
  alternatives:
  - All who pursued her
  - All her persecutors
  lexicon: HALOT
  rationale: The participle from רדף denotes pursuers in a hostile sense. 'Pursuers'
    is concrete and fits the chase imagery better than the more interpretive 'persecutors.'
- source_word: הִשִּׂיגוּהָ
  chosen: have overtaken her
  alternatives:
  - caught up with her
  - seized her
  lexicon: HALOT
  rationale: נשׂג in the Hiphil commonly means overtake or catch up with. 'Have overtaken
    her' preserves the pursuit metaphor and the poetic gravity.
- source_word: בֵּין הַמְּצָרִים
  chosen: in the narrow places
  alternatives:
  - between the straits
  - in the places of distress
  - between narrow passes
  lexicon: HALOT
  rationale: The phrase is literally 'between the narrow places/straits' and likely
    evokes being trapped in confined terrain, though it can also suggest distress
    by wordplay. 'In the narrow places' keeps the spatial image in the main text while
    allowing the distress nuance in a footnote.
