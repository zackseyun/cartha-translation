id: LAM.1.8
reference: Lamentations 1:8
source:
  edition: WLC
  text: חֵ֤טְא חָֽטְאָה֙ יְר֣וּשָׁלִַ֔ם עַל כֵּ֖ן לְ/נִידָ֣ה הָיָ֑תָה כָּֽל מְכַבְּדֶ֤י/הָ
    הִזִּיל֨וּ/הָ֙ כִּי רָא֣וּ עֶרְוָתָ֔/הּ גַּם הִ֥יא נֶאֶנְחָ֖ה וַ/תָּ֥שָׁב אָחֽוֹר־־־־׃ס
translation:
  text: Jerusalem has sinned grievously; therefore she has become unclean. All who
    honored her despise her, because they have seen her nakedness. She herself also
    groans and turns away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has become like a menstruant' or 'has become an impurity'; the Hebrew
      term carries the sense of ritual uncleanness and separation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'turns back' or 'turns backward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵטְא חָטְאָה
  chosen: has sinned grievously
  alternatives:
  - has sinned a sin
  - has grievously sinned
  - has surely sinned
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    English should reflect the emphasis idiomatically rather than woodenly; 'has sinned
    grievously' preserves both the act and its severity.
- source_word: לְנִידָה
  chosen: unclean
  alternatives:
  - as an impurity
  - as a menstruant
  - as something removed
  lexicon: HALOT
  rationale: נִידָה can denote menstrual impurity or a state/object of uncleanness
    and separation. In this lament context, the point is Jerusalem's defiled, socially
    shunned condition. 'Unclean' communicates the ritual-social force in readable
    English, while a footnote preserves the more concrete alternative.
- source_word: מְכַבְּדֶיהָ
  chosen: who honored her
  alternatives:
  - who esteemed her
  - who glorified her
  lexicon: HALOT
  rationale: From כבד in the sense of honoring/showing respect. 'Honored' is natural
    English and fits the contrast with present contempt.
- source_word: הִזִּילוּהָ
  chosen: despise her
  alternatives:
  - treat her with contempt
  - make light of her
  - disdain her
  lexicon: HALOT
  rationale: The Hiphil of זלל/related form here conveys treating as worthless or
    contemptible. 'Despise' is concise and matches the reversal from prior honor.
- source_word: עֶרְוָתָהּ
  chosen: her nakedness
  alternatives:
  - her shame
  - her private parts
  lexicon: HALOT
  rationale: The noun literally denotes nakedness and often carries connotations of
    shame/exposure. 'Her nakedness' preserves the metaphor of public humiliation without
    over-interpreting.
- source_word: נֶאֶנְחָה
  chosen: groans
  alternatives:
  - sighs
  - moans
  lexicon: HALOT
  rationale: The Niphal expresses lamenting with audible distress. 'Groans' best conveys
    deep suffering in contemporary English.
- source_word: וַתָּשָׁב אָחוֹר
  chosen: turns away
  alternatives:
  - turns backward
  - turns back
  lexicon: HALOT
  rationale: Literally 'turns back/backward.' In context this likely depicts recoiling
    in shame or withdrawal. 'Turns away' is idiomatic while preserving the motion
    of retreat; a footnote preserves the more literal wording.
