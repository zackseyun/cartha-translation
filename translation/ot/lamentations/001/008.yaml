theological_decisions:
- issue: Metaphor of impurity in Jerusalem's judgment
  chosen_reading: Render לְנִידָה as 'unclean' in the main text
  alternative_readings:
  - has become like a menstruant
  - has become an impurity
  rationale: The verse uses impurity imagery to describe Jerusalem's shame and exclusion,
    not to make a doctrinal statement about menstruation itself. 'Unclean' preserves
    the ritual-social force without unnecessary awkwardness, while the more concrete
    imagery is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
