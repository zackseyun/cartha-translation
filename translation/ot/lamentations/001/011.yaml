id: LAM.1.11
reference: Lamentations 1:11
source:
  edition: WLC
  text: כָּל עַמָּ֤/הּ נֶאֱנָחִים֙ מְבַקְּשִׁ֣ים לֶ֔חֶם נָתְנ֧וּ מחמודי/הם בְּ/אֹ֖כֶל לְ/הָשִׁ֣יב נָ֑פֶשׁ רְאֵ֤ה יְהוָה֙ וְֽ/הַבִּ֔יטָ/ה כִּ֥י הָיִ֖יתִי זוֹלֵלָֽה־׃ס
translation:
  text: All her people groan, seeking bread; they have given their precious things for food to restore life. Look, O Yahweh, and see, for I have become despised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their treasures' / 'their desirable things.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to restore the soul/life'; here the sense is to regain strength or preserve life.
    reason: lexical_alternative
  - marker: c
    text: Or 'for I have become vile' / 'contemptible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱנָחִים
  chosen: groan
  alternatives:
  - sigh
  - moan
  lexicon: HALOT
  rationale: Conveys audible distress in famine and siege conditions; 'groan' is idiomatic and weighty without over-paraphrase.
- source_word: מְבַקְּשִׁים לֶחֶם
  chosen: seeking bread
  alternatives:
  - looking for bread
  lexicon: HALOT
  rationale: A straightforward rendering of the participle plus object; 'bread' here stands for food provision generally but should be preserved literally in the main text.
- source_word: מחמודיהם
  chosen: their precious things
  alternatives:
  - their treasures
  - their desirable things
  - their valuables
  lexicon: HALOT
  rationale: The noun denotes desirable or precious possessions. 'Precious things' preserves the broad sense without narrowing it to money alone.
- source_word: בְּאֹכֶל
  chosen: for food
  alternatives:
  - for something to eat
  - for bread
  lexicon: HALOT
  rationale: 'The preposition marks exchange: they gave valuables in return for food. ''For food'' is concise and natural.'
- source_word: לְהָשִׁיב נָפֶשׁ
  chosen: to restore life
  alternatives:
  - to revive the soul
  - to sustain life
  - to restore themselves
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life/self rather than the immaterial soul in a narrow sense. 'Restore life' communicates survival in context while retaining the restoration idea.
- source_word: רְאֵה ... וְהַבִּיטָה
  chosen: Look ... and see
  alternatives:
  - See ... and behold
  - look ... and consider
  lexicon: HALOT
  rationale: The paired imperatives intensify the plea for divine attention. 'Look ... and see' preserves the parallelism in readable English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: זוֹלֵלָה
  chosen: despised
  alternatives:
  - worthless
  - vile
  - gluttonous
  lexicon: HALOT
  rationale: In this context the sense is social contempt or being treated as vile/contemptible, not literal gluttony. 'Despised' fits the lament's rhetoric and the resulting condition of Jerusalem.
