theological_decisions:
- issue: Divine agency in Jerusalem's suffering
  chosen_reading: because the LORD has afflicted her for the multitude of her transgressions
  alternative_readings:
  - because the LORD has caused her grief on account of her many transgressions
  rationale: The Hebrew explicitly attributes Jerusalem's affliction to the LORD and
    grounds it in her transgressions. The translation preserves both divine agency
    and human culpability without softening either.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it); Contested terms table for יְהוָה → 'the LORD'
