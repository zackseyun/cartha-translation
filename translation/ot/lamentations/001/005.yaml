id: LAM.1.5
reference: Lamentations 1:5
source:
  edition: WLC
  text: הָי֨וּ צָרֶ֤י/הָ לְ/רֹאשׁ֙ אֹיְבֶ֣י/הָ שָׁל֔וּ כִּֽי יְהוָ֥ה הוֹגָ֖/הּ עַ֣ל
    רֹב פְּשָׁעֶ֑י/הָ עוֹלָלֶ֛י/הָ הָלְכ֥וּ שְׁבִ֖י לִ/פְנֵי צָֽר־־־׃ס
translation:
  text: Her foes have become the head; her enemies prosper, because the LORD has afflicted
    her for the multitude of her transgressions. Her children have gone away into
    captivity before the foe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are at ease' / 'live securely' for 'prosper.' The Hebrew verb can denote
      ease or security as well as flourishing.
    reason: lexical_alternative
  - marker: b
    text: Or 'her little ones' or 'her infants.' The Hebrew term refers to young children
      and emphasizes their vulnerability.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרֶיהָ
  chosen: her foes
  alternatives:
  - her adversaries
  - her oppressors
  lexicon: HALOT
  rationale: צַר in this context denotes hostile enemies/oppressors. 'Foes' is concise,
    natural English and pairs well with the parallel 'her enemies.'
- source_word: לְרֹאשׁ
  chosen: have become the head
  alternatives:
  - are at the head
  - have become chief
  lexicon: HALOT
  rationale: Literally 'for/as head.' The idiom conveys ascendancy or dominance. 'Have
    become the head' preserves the Hebrew image while remaining intelligible.
- source_word: אֹיְבֶיהָ
  chosen: her enemies
  alternatives:
  - those who hate her
  lexicon: HALOT
  rationale: Standard rendering of אויב in a military/hostile context.
- source_word: שָׁלוּ
  chosen: prosper
  alternatives:
  - are at ease
  - live securely
  lexicon: HALOT
  rationale: From שלה, conveying ease, security, or prosperity. In context of reversal,
    'prosper' best captures the sense that Jerusalem's enemies are flourishing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.'
- source_word: הוֹגָהּ
  chosen: has afflicted her
  alternatives:
  - has caused her grief
  - has brought sorrow on her
  lexicon: HALOT
  rationale: The verb יגה in the Hiphil means to cause grief or affliction. 'Has afflicted
    her' is idiomatic and preserves the causative force.
- source_word: עַל רֹב פְּשָׁעֶיהָ
  chosen: for the multitude of her transgressions
  alternatives:
  - because of her many transgressions
  - for her abundant rebellions
  lexicon: HALOT
  rationale: רֹב indicates abundance/multitude, and פֶּשַׁע denotes transgression/rebellion.
    'For the multitude of her transgressions' is formal enough to reflect the weight
    of covenant violation.
- source_word: עוֹלָלֶיהָ
  chosen: her children
  alternatives:
  - her little ones
  - her infants
  lexicon: HALOT
  rationale: עוֹלָל can denote little children or infants. Here a broader term, 'children,'
    fits the lament context without over-specifying age, while still conveying vulnerability.
- source_word: שְׁבִי
  chosen: into captivity
  alternatives:
  - as captives
  - in exile
  lexicon: HALOT
  rationale: The noun denotes captivity/captive state. 'Into captivity' works naturally
    with 'have gone away' and reflects the resultative sense.
- source_word: לִפְנֵי צָר
  chosen: before the foe
  alternatives:
  - before the adversary
  - driven before the foe
  lexicon: HALOT
  rationale: Literally 'before the foe/adversary.' 'Before the foe' preserves the
    Hebrew spatial image, likely implying being led away under enemy power, without
    adding unwarranted detail.
