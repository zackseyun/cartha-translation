id: LAM.1.7
reference: Lamentations 1:7
source:
  edition: WLC
  text: זָֽכְרָ֣ה יְרוּשָׁלִַ֗ם יְמֵ֤י עָנְיָ/הּ֙ וּ/מְרוּדֶ֔י/הָ כֹּ֚ל מַחֲמֻדֶ֔י/הָ
    אֲשֶׁ֥ר הָי֖וּ מִ֣/ימֵי קֶ֑דֶם בִּ/נְפֹ֧ל עַמָּ֣/הּ בְּ/יַד צָ֗ר וְ/אֵ֤ין עוֹזֵר֙
    לָ֔/הּ רָא֣וּ/הָ צָרִ֔ים שָׂחֲק֖וּ עַ֥ל מִשְׁבַּתֶּֽ/הָ־׃ס
translation:
  text: Jerusalem remembered the days of her affliction and her wanderings, all her
    precious things that were from days of old. When her people fell into the hand
    of the foe, and there was no one to help her, foes saw her; they laughed at her
    downfall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and her homelessness' for 'and her wanderings'; the Hebrew term is rare
      and debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'they laughed at her ruin/desolation' for 'they laughed at her downfall';
      the Hebrew noun likely refers to Jerusalem's collapse or devastated condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  chosen: remembered
  alternatives:
  - remembers
  - called to mind
  lexicon: HALOT
  rationale: Qal perfect 3fs, with Jerusalem personified as feminine singular. Past
    narrative sense fits the lament context better than an English present.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name; the city is personified throughout
    the chapter.
- source_word: יְמֵי עָנְיָהּ
  chosen: the days of her affliction
  alternatives:
  - the days of her misery
  - the days of her suffering
  lexicon: HALOT
  rationale: עֳנִי commonly denotes affliction, misery, or suffering. 'Affliction'
    preserves the gravity and common biblical resonance without over-paraphrase.
- source_word: וּמְרוּדֶיהָ
  chosen: and her wanderings
  alternatives:
  - and her homelessness
  - and her miseries
  lexicon: HALOT
  rationale: The noun is difficult and has been understood from a root relating to
    wandering or homelessness. 'Wanderings' best fits the lament over exile and preserves
    the concrete image. Because the term is lexically debated, an alternative is preserved
    in a footnote.
- source_word: כֹּל מַחֲמֻדֶיהָ
  chosen: all her precious things
  alternatives:
  - all her treasures
  - all her delights
  - all her desirable things
  lexicon: HALOT
  rationale: The phrase refers broadly to valued possessions or cherished things,
    not necessarily only material wealth. 'Precious things' is natural English and
    sufficiently broad.
- source_word: אֲשֶׁר הָיוּ מִימֵי קֶדֶם
  chosen: that were from days of old
  alternatives:
  - that she had in former days
  - which were from ancient days
  lexicon: HALOT
  rationale: מִימֵי קֶדֶם points to former/ancient days. 'From days of old' preserves
    the temporal perspective and poetic tone.
- source_word: בִּנְפֹל עַמָּהּ
  chosen: When her people fell
  alternatives:
  - At the falling of her people
  - when her people were overthrown
  lexicon: HALOT
  rationale: 'Infinitive construct with ב marks the circumstance/time: ''when her
    people fell.'' This is smoother in English than a more wooden rendering.'
- source_word: בְּיַד צָר
  chosen: into the hand of the foe
  alternatives:
  - into the hand of the adversary
  - into the power of the enemy
  lexicon: HALOT
  rationale: '''Into the hand of'' is a standard Hebrew idiom for subjection to power;
    retained in recognizable English form. Singular צָר is rendered generically as
    ''the foe'' to avoid awkwardness while preserving the collective sense.'
- source_word: וְאֵין עוֹזֵר לָהּ
  chosen: and there was no one to help her
  alternatives:
  - and she had no helper
  - with no one helping her
  lexicon: HALOT
  rationale: This clause states Jerusalem's utter abandonment. 'No one to help her'
    is idiomatic and preserves the force of the participle עוֹזֵר.
- source_word: רָאוּהָ צָרִים
  chosen: foes saw her
  alternatives:
  - enemies saw her
  - adversaries looked on her
  lexicon: HALOT
  rationale: Plural צָרִים is best rendered 'foes' or 'enemies.' 'Foes' maintains
    some literary compactness and echoes the earlier singular collective 'foe'.
- source_word: שָׂחֲקוּ
  chosen: they laughed
  alternatives:
  - they mocked
  - they scoffed
  lexicon: HALOT
  rationale: The verb denotes laughing, often with derisive force. 'Laughed' keeps
    the concrete image; the object of derision is clarified by the following phrase.
- source_word: עַל מִשְׁבַּתֶּהָ
  chosen: at her downfall
  alternatives:
  - at her cessation
  - at her desolation
  - at her ruin
  lexicon: HALOT
  rationale: The noun is difficult and has been taken as 'cessation,' 'ruin,' or a
    state provoking mockery. In context, the sense is her collapse/desolation. 'Downfall'
    is idiomatic, vivid, and fits the enemies' derision. A lexical alternative is
    preserved in a footnote because the term is debated.
