id: LAM.1.12
reference: Lamentations 1:12
source:
  edition: WLC
  text: ל֣וֹא אֲלֵי/כֶם֮ כָּל עֹ֣בְרֵי דֶרֶךְ֒ הַבִּ֣יטוּ וּ/רְא֗וּ אִם יֵ֤שׁ מַכְאוֹב֙ כְּ/מַכְאֹבִ֔/י אֲשֶׁ֥ר עוֹלַ֖ל לִ֑/י אֲשֶׁר֙ הוֹגָ֣ה יְהוָ֔ה בְּ/י֖וֹם חֲר֥וֹן אַפּֽ/וֹ־־׃ס
translation:
  text: Is it nothing to you, all you who pass by on the road? Look and see whether there is any sorrow like my sorrow, which was dealt to me, with which Yahweh afflicted me in the day of his fierce anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Does it not concern you, all you who pass by?' The Hebrew opening is elliptical, literally 'not to you,' and can be understood as an appeal for attention or sympathy.
    reason: lexical_alternative
  - marker: b
    text: Or 'pain' or 'affliction' instead of 'sorrow' for the repeated Hebrew word.
    reason: lexical_alternative
lexical_decisions:
- source_word: ל֣וֹא אֲלֵיכֶם
  chosen: Is it nothing to you
  alternatives:
  - Not to you
  - Does it not concern you
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''not to you.'' In context it functions as an exclamatory appeal to passersby, asking whether the suffering means nothing to them. ''Is it nothing to you'' preserves the idiomatic force in natural English better than a bare literal rendering.'
- source_word: כָּל עֹבְרֵי דֶרֶךְ
  chosen: all you who pass by on the road
  alternatives:
  - all you who pass by
  - all passersby
  lexicon: HALOT
  rationale: עֹבְרֵי דֶרֶךְ is literally 'passers of the way/road.' 'All you who pass by on the road' keeps both the participial sense and the concrete image.
- source_word: הַבִּיטוּ וּרְאוּ
  chosen: Look and see
  alternatives:
  - Pay attention and see
  - Behold and see
  lexicon: HALOT
  rationale: The paired imperatives intensify the appeal. 'Look and see' is clear modern English and preserves the rhetorical force without archaic diction.
- source_word: אִם יֵשׁ
  chosen: whether there is any
  alternatives:
  - if there is
  - whether there exists
  lexicon: HALOT
  rationale: After the imperatives, אִם introduces an indirect question. 'Whether there is any' fits English idiom in this comparative lament.
- source_word: מַכְאוֹב ... כְּמַכְאֹבִי
  chosen: sorrow ... like my sorrow
  alternatives:
  - pain ... like my pain
  - affliction ... like my affliction
  - grief ... like my grief
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain/sorrow. 'Sorrow' best fits the lament context and reads naturally in the repeated comparison, while still allowing the emotional and experiential breadth of the Hebrew.
- source_word: אֲשֶׁר עוֹלַל לִי
  chosen: which was dealt to me
  alternatives:
  - which was inflicted on me
  - which he dealt to me
  lexicon: HALOT
  rationale: The verb עולל here conveys harsh treatment or dealing severely. The passive English 'was dealt to me' preserves the result-focused sense and avoids over-specifying the subject before the next clause names the LORD.
- source_word: אֲשֶׁר הוֹגָה
  chosen: with which ... afflicted me
  alternatives:
  - with which ... caused me grief
  - which ... made sorrowful
  lexicon: HALOT
  rationale: The Hiphil of יגה carries the sense of causing grief/afflicting. 'Afflicted me' is idiomatic and suitably weighty in context, while the relative construction is represented by 'with which.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיוֹם חֲרוֹן אַפּוֹ
  chosen: in the day of his fierce anger
  alternatives:
  - in the day of his burning anger
  - on the day of his wrath
  lexicon: HALOT
  rationale: חֲרוֹן אַף is an idiom for burning or fierce anger. 'In the day of his fierce anger' preserves the temporal phrase and the intensity of the idiom in accessible English.
