id: LAM.1.13
reference: Lamentations 1:13
source:
  edition: WLC
  text: מִ/מָּר֛וֹם שָֽׁלַח אֵ֥שׁ בְּ/עַצְמֹתַ֖/י וַ/יִּרְדֶּ֑/נָּה פָּרַ֨שׂ רֶ֤שֶׁת
    לְ/רַגְלַ/י֙ הֱשִׁיבַ֣/נִי אָח֔וֹר נְתָנַ֨/נִי֙ שֹֽׁמֵמָ֔ה כָּל הַ/יּ֖וֹם דָּוָֽה־־׃ס
translation:
  text: From on high he sent fire into my bones, and it overcame them; he spread a
    net for my feet; he turned me back; he made me desolate, faint all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and it subdued them'; the Hebrew verb can carry the sense of ruling,
      subduing, or overpowering.
    reason: lexical_alternative
  - marker: b
    text: Or 'sick all day long' or 'languishing all day long.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּרוֹם
  chosen: From on high
  alternatives:
  - From heaven
  - From above
  lexicon: HALOT
  rationale: מָרוֹם denotes a high place or height. In this poetic context it points
    to the exalted place from which God acts without requiring the more specific 'heaven'
    in the main text.
- source_word: שָׁלַח אֵשׁ
  chosen: he sent fire
  alternatives:
  - he dispatched fire
  lexicon: HALOT
  rationale: A straightforward rendering of the verb plus object. 'Sent fire' preserves
    the vivid imagery and agency of the Hebrew.
- source_word: בְּעַצְמֹתַי
  chosen: into my bones
  alternatives:
  - in my bones
  - through my bones
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously in English. 'Into my bones'
    best conveys invasive penetration of suffering while remaining natural in English.
- source_word: וַיִּרְדֶּנָּה
  chosen: and it overcame them
  alternatives:
  - and it subdued them
  - and it trampled them
  - and it ruled over them
  lexicon: HALOT
  rationale: The verb from רדה commonly means to rule or subdue. With feminine singular
    suffix referring back to 'fire' and plural object implied by 'my bones,' the sense
    is that the fire mastered or overpowered them. 'Overcame them' communicates the
    effect idiomatically in English.
- source_word: פָּרַשׂ רֶשֶׁת לְרַגְלַי
  chosen: he spread a net for my feet
  alternatives:
  - he spread a net for my steps
  - he laid a net for my feet
  lexicon: HALOT
  rationale: This is a common trapping image. 'For my feet' is more literal than 'for
    my steps' and preserves the bodily imagery of the lament.
- source_word: הֱשִׁיבַנִי אָחוֹר
  chosen: he turned me back
  alternatives:
  - he drove me back
  - he made me turn back
  lexicon: HALOT
  rationale: The hiphil of שוב with אָחוֹר expresses causing someone to turn back
    or retreat. 'Turned me back' is concise and faithful.
- source_word: נְתָנַנִי שֹׁמֵמָה
  chosen: he made me desolate
  alternatives:
  - he made me appalled
  - he left me desolate
  lexicon: HALOT
  rationale: שֹׁמֵמָה carries the sense of devastation/desolation, often with appalled
    ruin. 'Made me desolate' fits the lament context and keeps the state-result force.
- source_word: כָּל־הַיּוֹם דָּוָה
  chosen: faint all day long
  alternatives:
  - sick all day long
  - in pain all day long
  - languishing all day long
  lexicon: HALOT
  rationale: דָּוָה denotes sickness, weakness, or languishing. 'Faint' captures the
    exhausted, debilitated state in idiomatic modern English, though 'sick' and 'languishing'
    are possible.
