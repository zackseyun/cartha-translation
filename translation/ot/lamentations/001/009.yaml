theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD / O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the doctrinal default of rendering the Tetragrammaton
    as 'the LORD,' preserving reverential convention and broad Christian readability.
    In direct address, 'O LORD' is the natural English vocative form.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
