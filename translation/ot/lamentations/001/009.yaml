id: LAM.1.9
reference: Lamentations 1:9
source:
  edition: WLC
  text: טֻמְאָתָ֣/הּ בְּ/שׁוּלֶ֗י/הָ לֹ֤א זָֽכְרָה֙ אַחֲרִיתָ֔/הּ וַ/תֵּ֣רֶד פְּלָאִ֔ים
    אֵ֥ין מְנַחֵ֖ם לָ֑/הּ רְאֵ֤ה יְהוָה֙ אֶת עָנְיִ֔/י כִּ֥י הִגְדִּ֖יל אוֹיֵֽב־׃ס
translation:
  text: Her uncleanness was in her skirts; she did not remember her end. So she came
    down astonishingly; there was no comforter for her. Look, O LORD, on my affliction,
    for the enemy has magnified himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she did not remember her future' or 'she did not consider her outcome.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'she came down astonishingly'; the sense is a shocking, extraordinary
      downfall.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the enemy has exalted himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֻמְאָתָהּ
  chosen: her uncleanness
  alternatives:
  - her impurity
  - her filthiness
  lexicon: HALOT
  rationale: The noun denotes ritual/moral impurity or uncleanness. 'Uncleanness'
    preserves the strong, defiling sense and fits the lament's personification of
    Jerusalem without over-specifying ceremonial versus moral nuance.
- source_word: בְּשׁוּלֶיהָ
  chosen: in her skirts
  alternatives:
  - on her hems
  - in her train
  lexicon: HALOT
  rationale: The plural of שׁוּל refers to the lower edges or skirts of a garment.
    'In her skirts' is idiomatic and preserves the imagery of visible defilement/clinging
    impurity. 'On her hems' is possible but less natural in this context.
- source_word: לֹא זָכְרָה אַחֲרִיתָהּ
  chosen: she did not remember her end
  alternatives:
  - she did not consider her future
  - she did not remember what would come after
  lexicon: HALOT
  rationale: 'אַחֲרִית can mean end, outcome, or future. ''Her end'' keeps the Hebrew''s
    terseness and allows both senses: final outcome and future consequence. The broader
    sense is preserved in a footnote.'
- source_word: וַתֵּרֶד
  chosen: she came down
  alternatives:
  - she fell
  - she descended
  lexicon: HALOT
  rationale: The verb ירד is literally 'go down/descend.' 'Came down' preserves the
    metaphor of collapse/humiliation without flattening it into the interpretive 'fell.'
- source_word: פְּלָאִים
  chosen: astonishingly
  alternatives:
  - wonderfully
  - in a shocking way
  - to astonishment
  lexicon: HALOT
  rationale: From פלא, the term can denote something extraordinary, wondrous, or astonishing.
    In context of judgment and downfall, the sense is not positive 'wonderfully' but
    shocking astonishment. The adverbial English captures the force of the accusative.
- source_word: אֵין מְנַחֵם לָהּ
  chosen: there was no comforter for her
  alternatives:
  - there was no one to comfort her
  lexicon: HALOT
  rationale: The participle of נחם functions substantivally. 'No comforter' is a key
    refrain in Lamentations and should be kept consistently where possible.
- source_word: רְאֵה יְהוָה
  chosen: Look, O LORD
  alternatives:
  - See, O LORD
  - Look, LORD
  lexicon: HALOT
  rationale: The imperative is a plea for divine attention. 'Look' is natural modern
    English; 'O LORD' reflects direct address. Per doctrine, יְהוָה is rendered 'the
    LORD' in general, but in direct address 'O LORD' is the idiomatic equivalent.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Following the doctrinal default for the divine name, the Tetragrammaton
    is rendered 'the LORD'/'LORD' rather than transliterated. In vocative address,
    'O LORD' is stylistically appropriate.
- source_word: עָנְיִי
  chosen: my affliction
  alternatives:
  - my misery
  - my suffering
  lexicon: HALOT
  rationale: The noun denotes affliction, misery, or suffering. 'Affliction' preserves
    the lament register and avoids over-psychologizing the term.
- source_word: כִּי הִגְדִּיל אוֹיֵב
  chosen: for the enemy has magnified himself
  alternatives:
  - for the enemy has become great
  - for the enemy has exalted himself
  lexicon: HALOT
  rationale: The Hiphil of גדל here conveys making oneself great/exalting oneself
    in triumph. 'Has magnified himself' is close to the Hebrew and preserves the enemy's
    arrogant self-exaltation; a more idiomatic alternative is noted in the footnote.
