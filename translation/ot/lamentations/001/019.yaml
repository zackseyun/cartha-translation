id: LAM.1.19
reference: Lamentations 1:19
source:
  edition: WLC
  text: קָרָ֤אתִי לַֽ/מְאַהֲבַ/י֙ הֵ֣מָּה רִמּ֔וּ/נִי כֹּהֲנַ֥/י וּ/זְקֵנַ֖/י בָּ/עִ֣יר
    גָּוָ֑עוּ כִּֽי בִקְשׁ֥וּ אֹ֨כֶל֙ לָ֔/מוֹ וְ/יָשִׁ֖יבוּ אֶת נַפְשָֽׁ/ם־־׃ס
translation:
  text: I called to my lovers; they deceived me. My priests and my elders perished
    in the city, while they sought food for themselves to restore their life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''My lovers'' is a metaphorical expression that likely refers to Jerusalem''s
      political allies or other objects of misplaced trust.'
    reason: cultural_note
  - marker: b
    text: Or 'for they sought food for themselves to revive themselves.' The Hebrew
      can be read with a more explicitly causal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I cried out
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרא commonly means 'call' or 'cry out.' 'I called'
    preserves the direct appeal to allies without adding emotional coloring beyond
    the context.
- source_word: לַמְאַהֲבַי
  chosen: to my lovers
  alternatives:
  - to my allies
  - to those who loved me
  lexicon: HALOT
  rationale: From אהב in the participial/plural possessive form, literally 'my lovers.'
    In Lamentations this often refers metaphorically to political allies or illicit
    attachments, but the concrete metaphor should be preserved in the main text rather
    than flattened to 'allies.'
- source_word: הֵמָּה רִמּוּנִי
  chosen: they deceived me
  alternatives:
  - they betrayed me
  - they tricked me
  lexicon: HALOT
  rationale: רמה in the piel commonly conveys deception. 'Deceived' is the most straightforward
    rendering and fits the lament over failed allies.
- source_word: כֹּהֲנַי
  chosen: my priests
  lexicon: HALOT
  rationale: Straightforward possessive plural; no reason to generalize or paraphrase.
- source_word: וּזְקֵנַי
  chosen: and my elders
  alternatives:
  - and my old men
  lexicon: HALOT
  rationale: זקנים here denotes civic leaders/elders rather than merely aged men,
    especially in parallel with priests.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Simple locative phrase; 'in the city' is idiomatic and sufficient.
- source_word: גָּוָעוּ
  chosen: perished
  alternatives:
  - expired
  - died
  lexicon: HALOT
  rationale: גוע often denotes dying or breathing one's last. 'Perished' fits the
    poetic register and the calamity context without sounding overly clinical.
- source_word: כִּי בִקְשׁוּ אֹכֶל לָמוֹ
  chosen: while they sought food for themselves
  alternatives:
  - for they sought food for themselves
  - because they sought food for themselves
  lexicon: HALOT
  rationale: כִּי can be causal or explanatory. Here it introduces the circumstance
    in which they died; 'while' captures the temporal-explanatory force naturally
    in English.
- source_word: וְיָשִׁיבוּ אֶת נַפְשָׁם
  chosen: to restore their life
  alternatives:
  - to revive themselves
  - to restore their strength
  - to bring back their soul
  lexicon: HALOT
  rationale: נפש here refers to life/self rather than an abstract immaterial soul.
    The hiphil of שוב means 'bring back, restore.' 'Restore their life' communicates
    the idiom clearly in modern English while preserving the concrete sense.
