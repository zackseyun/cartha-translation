id: LAM.1.20
reference: Lamentations 1:20
source:
  edition: WLC
  text: רְאֵ֨ה יְהוָ֤ה כִּֽי צַר לִ/י֙ מֵעַ֣/י חֳמַרְמָ֔רוּ נֶהְפַּ֤ךְ לִבִּ/י֙ בְּ/קִרְבִּ֔/י כִּ֥י מָר֖וֹ מָרִ֑יתִי מִ/ח֥וּץ שִׁכְּלָה חֶ֖רֶב בַּ/בַּ֥יִת כַּ/מָּֽוֶת־־־׃ס
translation:
  text: Look, O Yahweh, for I am in distress; my inward parts are churning; my heart is overturned within me, because I have been very rebellious. Outside the sword bereaves; inside the house it is like death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for I have grievously rebelled' or 'for I have bitterly rebelled.' The Hebrew intensifies the verb 'rebel' by pairing a cognate form with it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my inward parts,' an embodied expression for deep inner anguish.
    reason: cultural_note
  - marker: c
    text: Or 'inside the house, there is death.' The Hebrew is terse and elliptical.
    reason: alternative_reading
lexical_decisions:
- source_word: רְאֵה
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: HALOT
  rationale: Imperative appeal to YHWH. 'Look' is natural modern English and preserves the direct plea better than the more archaic 'Behold.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צַר לִי
  chosen: I am in distress
  alternatives:
  - it is distressing for me
  - I am in anguish
  lexicon: HALOT
  rationale: The adjective with pronominal sense expresses personal distress. 'I am in distress' is idiomatic and communicates the state without unnecessary literalism.
- source_word: מֵעַי
  chosen: my inward parts
  alternatives:
  - my bowels
  - my insides
  lexicon: HALOT
  rationale: Hebrew anthropological language for deep inner emotion. 'My inward parts' preserves the embodied metaphor without the misleading modern connotations of 'bowels.'
- source_word: חֳמַרְמָרוּ
  chosen: are churning
  alternatives:
  - are troubled
  - are in turmoil
  - grow hot
  lexicon: HALOT
  rationale: The verb conveys intense inner agitation. 'Are churning' captures the visceral force and pairs naturally with 'inward parts.'
- source_word: נֶהְפַּךְ לִבִּי בְּקִרְבִּי
  chosen: my heart is overturned within me
  alternatives:
  - my heart is turned over within me
  - my heart is in turmoil within me
  lexicon: HALOT
  rationale: The passive/reflexive sense of הפך suggests an inner overturning. 'Overturned' preserves the metaphor more closely than a flattened 'troubled.'
- source_word: כִּי מָרוֹ מָרִיתִי
  chosen: because I have been very rebellious
  alternatives:
  - for I have grievously rebelled
  - for I have bitterly rebelled
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the idea of rebellion. 'Very rebellious' communicates the emphasis in readable English; 'grievously rebelled' is possible but less transparent to modern readers.
- source_word: מִחוּץ
  chosen: Outside
  alternatives:
  - From outside
  lexicon: HALOT
  rationale: Adverbial contrast with 'inside the house.' 'Outside' is concise and preserves the poetic parallelism.
- source_word: שִׁכְּלָה חֶרֶב
  chosen: the sword bereaves
  alternatives:
  - the sword makes childless
  - the sword takes away children
  lexicon: HALOT
  rationale: The verb commonly denotes bereavement, often child-loss. 'The sword bereaves' keeps the compact poetic force; the more explicit childlessness nuance is possible but would over-specify here.
- source_word: בַּבַּיִת
  chosen: inside the house
  alternatives:
  - in the house
  - at home
  lexicon: HALOT
  rationale: Chosen to preserve the antithesis with 'Outside.'
- source_word: כַּמָּוֶת
  chosen: it is like death
  alternatives:
  - there is death
  - like death
  lexicon: HALOT
  rationale: The prefixed כ indicates comparison. The clause is elliptical; supplying 'it is' in English preserves the simile rather than converting it into a flat assertion.
