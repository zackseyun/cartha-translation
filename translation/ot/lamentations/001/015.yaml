id: LAM.1.15
reference: Lamentations 1:15
source:
  edition: WLC
  text: סִלָּ֨ה כָל אַבִּירַ֤/י אֲדֹנָ/י֙ בְּ/קִרְבִּ֔/י קָרָ֥א עָלַ֛/י מוֹעֵ֖ד לִ/שְׁבֹּ֣ר
    בַּחוּרָ֑/י גַּ֚ת דָּרַ֣ךְ אֲדֹנָ֔/י לִ/בְתוּלַ֖ת בַּת יְהוּדָֽה־׀־׃ס
translation:
  text: The Lord has rejected all my mighty men in my midst; he has summoned an appointed
    assembly against me to crush my young men. The Lord has trodden the winepress
    for the virgin daughter of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he proclaimed a set time against me' or 'he called an assembly against
      me.' The Hebrew מוֹעֵד can mean an appointed time or an appointed gathering.
    reason: lexical_alternative
  - marker: b
    text: The image of treading a winepress is a metaphor for severe divine judgment.
    reason: cultural_note
lexical_decisions:
- source_word: סִלָּה
  chosen: has rejected
  alternatives:
  - has cast off
  - has discarded
  - has treated as worthless
  lexicon: HALOT
  rationale: The Piel of סלל/סלה here carries the sense of rejecting or casting away,
    not merely 'lifting up.' In context of lament over military defeat, 'has rejected'
    best conveys decisive repudiation of Jerusalem's warriors.
- source_word: אַבִּירַי
  chosen: my mighty men
  alternatives:
  - my strong ones
  - my warriors
  - my nobles
  lexicon: HALOT
  rationale: אַבִּיר can denote strong or mighty ones, often warriors. 'Mighty men'
    preserves the martial sense while remaining natural English. 'Nobles' is possible
    in some contexts but is less fitting here because the following clause speaks
    of crushing the young men.
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Rendered 'The Lord' as the divine title. This follows the project's default
    for divine titles and distinguishes the speaker's address from a merely human
    lord.
- source_word: בְּקִרְבִּי
  chosen: in my midst
  alternatives:
  - within me
  - inside me
  lexicon: HALOT
  rationale: The phrase refers to those present within Jerusalem/Zion, not an internal
    psychological state. 'In my midst' preserves the spatial and communal sense.
- source_word: קָרָא עָלַי מוֹעֵד
  chosen: he has summoned an appointed assembly against me
  alternatives:
  - he proclaimed a set time against me
  - he called a festival assembly against me
  lexicon: HALOT
  rationale: 'מוֹעֵד commonly means an appointed time or assembly. Here the sense
    is ironic: God convenes a fixed gathering for judgment, not celebration. ''Appointed
    assembly'' preserves both the formal and communal nuance better than simply ''set
    time.'''
- source_word: לִשְׁבֹּר
  chosen: to crush
  alternatives:
  - to break
  - to shatter
  lexicon: HALOT
  rationale: While literally 'to break,' in this military-judgment context 'to crush'
    communicates the violent destruction intended against the young men.
- source_word: בַּחוּרַי
  chosen: my young men
  alternatives:
  - my chosen men
  - my youths
  lexicon: HALOT
  rationale: בָּחוּר usually denotes a young man in his prime, often of fighting age.
    'My young men' is the clearest and most natural rendering here.
- source_word: גַּת דָּרַךְ
  chosen: has trodden the winepress
  alternatives:
  - has trampled the winepress
  lexicon: HALOT
  rationale: This is a standard metaphor of judgment. 'Trodden the winepress' is idiomatic,
    vivid, and close to the Hebrew image.
- source_word: לִבְתוּלַת בַּת יְהוּדָה
  chosen: for the virgin daughter of Judah
  alternatives:
  - the virgin daughter Judah
  - the maiden daughter of Judah
  lexicon: HALOT
  rationale: This personified expression refers to Judah/Zion as a young woman. 'For'
    reflects the lamed as indicating the object affected by the treading. 'Virgin
    daughter of Judah' preserves the established metaphor without overinterpreting
    it.
