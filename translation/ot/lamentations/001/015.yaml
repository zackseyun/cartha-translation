theological_decisions:
- issue: Rendering of divine title אֲדֹנָי
  chosen_reading: The Lord
  alternative_readings:
  - Lord
  rationale: The verse uses אֲדֹנָי, not the Tetragrammaton. Rendering it 'The Lord'
    preserves the title's force in readable English and aligns with the project's
    treatment of κύριος/Lord-type divine titles without importing YHWH-specific capitalization.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy §2'
