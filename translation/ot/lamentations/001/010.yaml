theological_decisions:
- issue: Referent of second-person address
  chosen_reading: The speaker addresses God directly with 'you commanded' and 'your
    assembly.'
  alternative_readings:
  - An impersonal or generalized command is implied rather than direct address
  rationale: The 2ms verb and 2fs pronominal phrase are most naturally read as direct
    address to God within the lament. This preserves the prayerful character of the
    book.
