id: LAM.1.10
reference: Lamentations 1:10
source:
  edition: WLC
  text: יָד/וֹ֙ פָּ֣רַשׂ צָ֔ר עַ֖ל כָּל מַחֲמַדֶּ֑י/הָ כִּֽי רָאֲתָ֤ה גוֹיִם֙ בָּ֣אוּ
    מִקְדָּשָׁ֔/הּ אֲשֶׁ֣ר צִוִּ֔יתָה לֹא יָבֹ֥אוּ בַ/קָּהָ֖ל לָֽ/ךְ־־־׃ס
translation:
  text: The enemy has stretched out his hand over all her precious things, for she
    has seen nations enter her sanctuary—those whom you commanded not to enter your
    assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her treasures' / 'her desirable things.'
    reason: lexical_alternative
  - marker: b
    text: '''Nations'' could also be rendered ''Gentiles,'' referring to foreign peoples
      entering the sacred precinct.'
    reason: lexical_alternative
  - marker: c
    text: Compare Deuteronomy 23, where certain peoples are forbidden to enter the
      assembly of the LORD.
    reason: cross_reference
lexical_decisions:
- source_word: יָדוֹ ... פָּרַשׂ
  chosen: has stretched out his hand
  alternatives:
  - has spread his hand
  - has reached out his hand
  lexicon: HALOT
  rationale: The idiom conveys hostile seizure or grasping. 'Stretched out his hand'
    preserves the Hebrew image while remaining natural English.
- source_word: צָר
  chosen: the enemy
  alternatives:
  - the foe
  - the adversary
  lexicon: HALOT
  rationale: In context of Jerusalem's devastation, the noun denotes a hostile oppressor.
    'Enemy' is the clearest modern rendering.
- source_word: מַחֲמַדֶּיהָ
  chosen: her precious things
  alternatives:
  - her treasures
  - her desirable things
  lexicon: HALOT
  rationale: The term refers broadly to valued or desirable possessions, not necessarily
    only monetary wealth. 'Precious things' preserves breadth and lament tone.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the preceding devastation. 'For' fits
    the explanatory connection in elevated but readable English.
- source_word: רָאֲתָה
  chosen: she has seen
  alternatives:
  - she saw
  lexicon: HALOT
  rationale: The perfect can be rendered as English present perfect to connect the
    observed outrage with the present lament. This keeps the vividness of the complaint.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - foreign nations
  lexicon: HALOT
  rationale: The plural denotes peoples from the nations. 'Nations' is the most direct
    rendering; 'Gentiles' would import a later Jewish/Christian contrast not explicit
    here.
- source_word: בָּאוּ מִקְדָּשָׁהּ
  chosen: enter her sanctuary
  alternatives:
  - came into her sanctuary
  - entered her holy place
  lexicon: HALOT
  rationale: The phrase describes profane intrusion into Jerusalem's sacred precinct.
    'Sanctuary' is more natural and contextually apt than the broader 'holy place'
    here.
- source_word: אֲשֶׁר צִוִּיתָה
  chosen: those whom you commanded
  alternatives:
  - whom you commanded
  - about whom you commanded
  lexicon: HALOT
  rationale: The relative clause refers to the nations just mentioned. Supplying 'those'
    makes the English syntax clear without adding new content.
- source_word: לֹא יָבֹאוּ
  chosen: not to enter
  alternatives:
  - shall not enter
  - must not come in
  lexicon: HALOT
  rationale: After 'commanded,' English infinitive style is most natural. It preserves
    the prohibition without awkwardness.
- source_word: בַקָּהָל לָךְ
  chosen: your assembly
  alternatives:
  - the assembly for you
  - your congregation
  lexicon: HALOT
  rationale: קָהָל denotes the assembled people/community in covenantal worship or
    civic-religious gathering. 'Assembly' is broad and avoids overly church-specific
    connotations of 'congregation.'
