id: LAM.1.6
reference: Lamentations 1:6
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א מן בת צִיּ֖וֹן כָּל הֲדָרָ֑/הּ הָי֣וּ שָׂרֶ֗י/הָ כְּ/אַיָּלִים֙
    לֹא מָצְא֣וּ מִרְעֶ֔ה וַ/יֵּלְכ֥וּ בְ/לֹא כֹ֖חַ לִ/פְנֵ֥י רוֹדֵֽף־־־־־׃ס
translation:
  text: From daughter Zion all her splendor has departed; her princes have become
    like deer that find no pasture; they went without strength before the pursuer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all her majesty" or "all her beauty has gone out from daughter Zion."
    reason: lexical_alternative
  - marker: b
    text: Or "like stags that found no pasture."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: has departed
  alternatives:
  - went out
  - has gone out
  lexicon: HALOT
  rationale: Literally 'went out,' but with 'all her splendor' as subject and 'from
    daughter Zion' as source, idiomatic English is 'has departed,' expressing loss
    from Zion rather than mere motion.
- source_word: מִן בַּת־צִיּוֹן
  chosen: From daughter Zion
  alternatives:
  - From the daughter of Zion
  - From Daughter Zion
  lexicon: HALOT
  rationale: Retains the prophetic personification of Zion as a daughter/city. Omission
    of the article reflects the Hebrew construct-like poetic expression. Lowercase
    'daughter' avoids making it a formal title while preserving imagery.
- source_word: כָּל הֲדָרָהּ
  chosen: all her splendor
  alternatives:
  - all her majesty
  - all her beauty
  - all her glory
  lexicon: HALOT
  rationale: הדר denotes adornment, majesty, or splendor. 'Splendor' best captures
    the city's former dignity and visible glory in this lament context without overloading
    theologically with 'glory.'
- source_word: שָׂרֶיהָ
  chosen: her princes
  alternatives:
  - her officials
  - her leaders
  lexicon: HALOT
  rationale: The term commonly denotes princes, rulers, or officials. 'Princes' fits
    the poetic and royal-national setting of Zion/Jerusalem better than the flatter
    'officials' or broader 'leaders.'
- source_word: כְּאַיָּלִים
  chosen: like deer
  alternatives:
  - like stags
  - like rams
  lexicon: HALOT
  rationale: אַיָּל often refers to a deer/stag. 'Deer' is natural modern English
    and works generically; 'stags' is possible but more marked. 'Rams' is less likely
    here given the pasture imagery.
- source_word: לֹא מָצְאוּ מִרְעֶה
  chosen: that find no pasture
  alternatives:
  - that found no pasture
  - without finding pasture
  - that find no grazing place
  lexicon: HALOT
  rationale: The clause describes the deer-like condition of the princes. Present-tense
    relative style in English gives a vivid proverbial comparison. מִרְעֶה is pasture/grazing
    place; 'pasture' is concise and natural.
- source_word: וַיֵּלְכוּ
  chosen: they went
  alternatives:
  - they walked
  - they fled
  lexicon: HALOT
  rationale: הלך is broadly 'go/walk.' 'Went' is the most neutral and avoids importing
    'fled,' which is contextually plausible but not explicit in the verb itself.
- source_word: בְּלֹא כֹחַ
  chosen: without strength
  alternatives:
  - without power
  - without vigor
  lexicon: HALOT
  rationale: כח here denotes strength or vigor. 'Without strength' preserves the physical
    and emotional exhaustion of the image.
- source_word: לִפְנֵי רוֹדֵף
  chosen: before the pursuer
  alternatives:
  - before the pursuer's face
  - before the one pursuing
  - from before the pursuer
  lexicon: HALOT
  rationale: לִפְנֵי can mean before/in the presence of/before the advance of. In
    context of pursuit, 'before the pursuer' conveys being driven ahead by an enemy.
    Singular participle is retained as a collective or representative pursuer.
