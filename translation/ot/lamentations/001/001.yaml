id: LAM.1.1
reference: Lamentations 1:1
source:
  edition: WLC
  text: אֵיכָ֣ה יָשְׁבָ֣ה בָדָ֗ד הָ/עִיר֙ רַבָּ֣תִי עָ֔ם הָיְתָ֖ה כְּ/אַלְמָנָ֑ה רַּבָּ֣תִי
    בַ/גּוֹיִ֗ם שָׂרָ֨תִי֙ בַּ/מְּדִינ֔וֹת הָיְתָ֖ה לָ/מַֽס׀׃ס
translation:
  text: How she sits alone, the city once full of people! She has become like a widow,
    she who was great among the nations, a princess among the provinces; she has become
    subject to forced labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for tribute.' The Hebrew מַס can refer either to tribute imposed by
      a conqueror or to forced labor; the main text chooses the labor sense because
      it best fits the reversal from 'princess' to subjugation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  chosen: How
  alternatives:
  - Alas
  - How can it be that
  lexicon: HALOT
  rationale: Introduces a lamenting exclamation, not an information-seeking question.
    'How' preserves the traditional lament formula and the rhetorical force of astonishment.
- source_word: יָשְׁבָה
  chosen: sits
  alternatives:
  - dwells
  - sits enthroned
  - has sat
  lexicon: HALOT
  rationale: Qal perfect 3fs of ישב in lament poetry can be rendered with present
    force in English to depict the vivid current state. 'Sits' also fits the image
    of desolate isolation.
- source_word: בָדָד
  chosen: alone
  alternatives:
  - solitary
  - in isolation
  lexicon: HALOT
  rationale: Conveys desolation and abandonment in natural modern English. 'Alone'
    is concise and idiomatic.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the city of Jerusalem
  lexicon: HALOT
  rationale: The Hebrew says simply 'the city'; the referent is Jerusalem by context,
    but the name should not be imported into the main text.
- source_word: רַבָּתִי עָם
  chosen: once full of people
  alternatives:
  - great with people
  - abounding in people
  - populous
  lexicon: HALOT
  rationale: The phrase literally means 'great of people' or 'abundant in people.'
    'Once full of people' communicates the former populous condition in clear English
    and fits the contrast with present desolation.
- source_word: הָיְתָה
  chosen: has become
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: Used predicatively to mark a changed state. 'Has become' highlights the
    reversal central to the lament.
- source_word: כְּאַלְמָנָה
  chosen: like a widow
  alternatives:
  - as a widow
  lexicon: HALOT
  rationale: The prefixed כ indicates comparison, not identity. 'Like a widow' preserves
    the simile and avoids overstating the image.
- source_word: רַבָּתִי בַגּוֹיִם
  chosen: great among the nations
  alternatives:
  - mighty among the nations
  - prominent among the peoples
  lexicon: HALOT
  rationale: Retains the comparative prestige language. 'Nations' is the standard
    rendering of גוים in this context.
- source_word: שָׂרָתִי
  chosen: a princess
  alternatives:
  - a noblewoman
  - a queenly lady
  - a ruler
  lexicon: HALOT
  rationale: The noun denotes a female of princely rank. 'Princess' is the most direct
    and natural English equivalent.
- source_word: בַּמְּדִינוֹת
  chosen: among the provinces
  alternatives:
  - among the districts
  - in the provinces
  lexicon: HALOT
  rationale: מדינות refers to administrative regions or provinces. 'Among the provinces'
    fits the parallel structure with 'among the nations.'
- source_word: לָמַס
  chosen: subject to forced labor
  alternatives:
  - for tribute
  - to corvée labor
  - to slave labor
  lexicon: HALOT
  rationale: מַס can denote tribute or compulsory labor, but in this context of political
    humiliation the sense of imposed labor best captures the reversal from princess
    to subjugated status. 'Subject to forced labor' is clear modern English and preserves
    the coercive nuance.
