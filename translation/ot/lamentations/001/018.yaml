- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Degree of literalness in פִּיהוּ
  chosen_reading: his mouth
  alternative_readings:
  - his command
  - his word
  rationale: The Hebrew is literally 'his mouth,' a metonym for what the LORD has spoken. To preserve auditable transparency and poetic force, the main text keeps the literal expression, while a footnote preserves the interpretive alternatives.
