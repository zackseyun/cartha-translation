id: LAM.1.18
reference: Lamentations 1:18
source:
  edition: WLC
  text: צַדִּ֥יק ה֛וּא יְהוָ֖ה כִּ֣י פִ֣י/הוּ מָרִ֑יתִי שִׁמְעוּ נָ֣א כָל עמים וּ/רְאוּ֙ מַכְאֹבִ֔/י בְּתוּלֹתַ֥/י וּ/בַחוּרַ֖/י הָלְכ֥וּ בַ/שֶּֽׁבִי־־׃ס
translation:
  text: 'Yahweh is righteous, for I have rebelled against his word. Hear, please, all peoples, and see my pain: my virgins and my young men have gone into captivity.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his mouth'; that is, what he spoke or commanded.
    reason: lexical_alternative
  - marker: b
    text: Or 'my maidens' / 'my young women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: Predicate adjective describing the LORD's moral rightness in judgment. 'Righteous' preserves the covenantal and theological sense better than the more forensic-sounding 'just' alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason Jerusalem acknowledges the LORD's righteousness. 'For' fits the confessional, poetic flow.
- source_word: פִּיהוּ
  chosen: his mouth
  alternatives:
  - his command
  - his word
  lexicon: HALOT
  rationale: Literally 'his mouth.' In context it refers metonymically to what the LORD has spoken or commanded. I retained the literal expression in the main text for transparency, while preserving more interpretive alternatives in a footnote.
- source_word: מָרִיתִי
  chosen: I have rebelled against
  alternatives:
  - I was rebellious against
  - I defied
  lexicon: HALOT
  rationale: The verb מרה conveys rebellion or defiance, especially against authority. 'I have rebelled against' is idiomatic and preserves the moral force.
- source_word: שִׁמְעוּ נָא
  chosen: Hear, please
  alternatives:
  - Listen, please
  - Hear now
  lexicon: HALOT
  rationale: Imperative plus particle of entreaty. 'Hear, please' preserves both the command and the pleading tone.
- source_word: כָל עַמִּים
  chosen: all peoples
  alternatives:
  - all nations
  - all peoples of the earth
  lexicon: HALOT
  rationale: עמים commonly means peoples/nations. 'All peoples' is broad and natural here as an appeal to surrounding nations.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  - and behold
  lexicon: HALOT
  rationale: Simple imperative parallel to 'hear'; 'see' is the most direct rendering.
- source_word: מַכְאֹבִי
  chosen: my pain
  alternatives:
  - my sorrow
  - my suffering
  - my anguish
  lexicon: HALOT
  rationale: The noun denotes pain or suffering. 'Pain' is concise and concrete, fitting the lament context.
- source_word: בְּתוּלֹתַי
  chosen: my virgins
  alternatives:
  - my young women
  - my maidens
  lexicon: HALOT
  rationale: The noun literally denotes virgins/maidens. To avoid flattening the lexical content, I kept 'virgins' in the main text and preserved smoother alternatives in a footnote.
- source_word: וּבַחוּרַי
  chosen: my young men
  alternatives:
  - my youths
  - my chosen men
  lexicon: HALOT
  rationale: In this context בחורים refers to young men in parallel with 'my virgins.' 'Young men' is the clearest modern rendering.
- source_word: הָלְכוּ
  chosen: have gone
  alternatives:
  - went
  - have been taken
  lexicon: HALOT
  rationale: The verb is simply 'went/walked.' In context of exile it can imply being led away, but the Hebrew verb itself is not causative, so 'have gone' stays closer to the text.
- source_word: בַּשֶּׁבִי
  chosen: into captivity
  alternatives:
  - into exile
  - as captives
  lexicon: HALOT
  rationale: Refers to the state of captivity. 'Into captivity' is the standard and accurate rendering in this military-deportation context.
