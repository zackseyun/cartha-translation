id: LAM.4.8
reference: Lamentations 4:8
source:
  edition: WLC
  text: חָשַׁ֤ךְ מִ/שְּׁחוֹר֙ תָּֽאֳרָ֔/ם לֹ֥א נִכְּר֖וּ בַּ/חוּצ֑וֹת צָפַ֤ד עוֹרָ/ם֙
    עַל עַצְמָ֔/ם יָבֵ֖שׁ הָיָ֥ה כָ/עֵֽץ־׃ס
translation:
  text: Their appearance has grown darker than soot; they are not recognized in the
    streets. Their skin has shriveled on their bones; it has become dry like wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'darker than blackness.' The Hebrew term may denote blackness generally;
      'soot' is chosen for a concrete image.
    reason: lexical_alternative
  - marker: b
    text: Or 'their skin clings to their bones.' The Hebrew verb can be understood
      as skin contracting tightly over the bones.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׁךְ
  chosen: has grown darker
  alternatives:
  - is darkened
  - became dark
  lexicon: HALOT
  rationale: Qal perfect of חשׁך conveys becoming dark/dim. English present perfect
    fits the lament's vivid description of a resulting condition.
- source_word: מִשְּׁחוֹר
  chosen: than soot
  alternatives:
  - than blackness
  - than coal
  lexicon: HALOT
  rationale: The comparative min with שׁחור indicates 'darker than blackness/soot.'
    'Soot' gives a concrete image in natural English and fits the context of visible
    darkening from famine.
- source_word: תָּאֳרָם
  chosen: their appearance
  alternatives:
  - their form
  - their visage
  - their countenance
  lexicon: HALOT
  rationale: תאר refers to form or appearance. 'Appearance' is broad and natural,
    avoiding archaic 'visage' while preserving the external, visible sense.
- source_word: לֹא נִכְּרוּ
  chosen: they are not recognized
  alternatives:
  - they are unrecognized
  - no one recognizes them
  lexicon: HALOT
  rationale: Niphal of נכר here is passive/reflexive, indicating they cannot be recognized.
    The passive English rendering closely matches the Hebrew.
- source_word: בַּחוּצוֹת
  chosen: in the streets
  alternatives:
  - in the squares
  - in the open places
  lexicon: HALOT
  rationale: חוּצוֹת commonly denotes streets or public places of a city. 'Streets'
    is the clearest modern equivalent.
- source_word: צָפַד
  chosen: has shriveled
  alternatives:
  - clings
  - is shrunk tight
  - has become hard
  lexicon: HALOT
  rationale: The verb conveys contracting/shriveling from emaciation. 'Has shriveled'
    best fits the famine imagery and the following phrase 'on their bones.'
- source_word: עוֹרָם
  chosen: their skin
  alternatives:
  - their hide
  lexicon: HALOT
  rationale: עוֹר is literally skin. 'Skin' is the normal English equivalent in human
    description.
- source_word: עַל עַצְמָם
  chosen: on their bones
  alternatives:
  - to their bones
  - upon their bones
  lexicon: HALOT
  rationale: The preposition על with this idiom depicts skin drawn tightly over the
    bones. 'On their bones' preserves the image without overinterpreting.
- source_word: יָבֵשׁ הָיָה
  chosen: it has become dry
  alternatives:
  - it is dried up
  - it became dry
  lexicon: HALOT
  rationale: The sequence expresses resultant dryness. Singular English 'it' refers
    back to the collective singular 'skin' in idiomatic English.
- source_word: כָעֵץ
  chosen: like wood
  alternatives:
  - like a stick
  - like a tree
  - like wood itself
  lexicon: HALOT
  rationale: עץ here is best taken as wood rather than tree, emphasizing lifeless
    dryness and hardness of the skin.
