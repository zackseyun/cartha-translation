id: LAM.4.5
reference: Lamentations 4:5
source:
  edition: WLC
  text: הָ/אֹֽכְלִים֙ לְ/מַ֣עֲדַנִּ֔ים נָשַׁ֖מּוּ בַּ/חוּצ֑וֹת הָ/אֱמֻנִים֙ עֲלֵ֣י
    תוֹלָ֔ע חִבְּק֖וּ אַשְׁפַּתּֽוֹת׃ס
translation:
  text: Those who used to eat delicacies are desolate in the streets; those who were
    brought up on scarlet embrace ash heaps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refuse heaps' or 'dung heaps'; the Hebrew term refers to places of discarded
      waste and conveys extreme humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹכְלִים
  chosen: those who used to eat
  alternatives:
  - those eating
  - the eaters
  lexicon: HALOT
  rationale: The participle functions substantivally ('those who eat/ate'). In this
    lament context, English idiom is improved by expressing the former habitual state
    with 'used to eat,' highlighting reversal from former luxury to present ruin.
- source_word: לְמַעֲדַנִּים
  chosen: delicacies
  alternatives:
  - dainties
  - luxuries
  - choice foods
  lexicon: HALOT
  rationale: The noun denotes luxurious or delightful foods/things. 'Delicacies' is
    natural modern English and preserves the sense of refined, privileged consumption
    better than the archaic 'dainties.'
- source_word: נָשַׁמּוּ
  chosen: are desolate
  alternatives:
  - are appalled
  - are devastated
  - languish
  lexicon: HALOT
  rationale: The verb conveys being laid waste/desolated. 'Are desolate' keeps the
    stark ruin imagery and fits the lament's reversal motif. Alternatives like 'languish'
    narrow the sense too much to physical weakness.
- source_word: בַּחוּצוֹת
  chosen: in the streets
  alternatives:
  - in the open places
  - in the squares
  lexicon: HALOT
  rationale: The term refers to public places of the city. 'Streets' is the most idiomatic
    English rendering here, while still evoking exposure in urban public space.
- source_word: הָאֱמֻנִים
  chosen: those who were brought up
  alternatives:
  - those reared
  - those nurtured
  - those accustomed
  lexicon: HALOT
  rationale: From אמן in the passive/participle sense of being cared for, reared,
    or nurtured. In context it describes people raised in luxury, not moral 'faithfulness';
    thus 'those who were brought up' best conveys the social upbringing implied.
- source_word: עֲלֵי תוֹלָע
  chosen: on scarlet
  alternatives:
  - in scarlet
  - on crimson cloth
  - on worm-dyed cloth
  lexicon: HALOT
  rationale: תוֹלָע here refers metonymically to scarlet/crimson material dyed from
    the worm, a standard luxury image. 'On scarlet' preserves the Hebrew preposition
    and the image of being reared amid costly textiles. 'Worm-dyed cloth' is more
    explicit but too technical for the main text.
- source_word: חִבְּקוּ
  chosen: embrace
  alternatives:
  - hug
  - cling to
  lexicon: HALOT
  rationale: 'The verb literally means ''embrace.'' Retaining this concrete verb sharpens
    the irony: those once surrounded by luxury now hold refuse heaps.'
- source_word: אַשְׁפַּתּוֹת
  chosen: ash heaps
  alternatives:
  - dung heaps
  - garbage heaps
  - refuse heaps
  lexicon: HALOT
  rationale: The noun denotes refuse heaps, often ash or dunghills. 'Ash heaps' is
    a traditional and plausible rendering in this context, but the semantic range
    includes refuse/dung heaps; the alternative is worth preserving in a footnote
    because the image is one of extreme degradation rather than merely ashes.
