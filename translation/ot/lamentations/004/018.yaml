id: LAM.4.18
reference: Lamentations 4:18
source:
  edition: WLC
  text: צָד֣וּ צְעָדֵ֔י/נוּ מִ/לֶּ֖כֶת בִּ/רְחֹבֹתֵ֑י/נוּ קָרַ֥ב קִצֵּ֛י/נוּ מָלְא֥וּ
    יָמֵ֖י/נוּ כִּי בָ֥א קִצֵּֽי/נוּ־׃ס
translation:
  text: They hunted our steps, so that we could not walk in our streets. Our end drew
    near; our days were full, for our end had come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They tracked our steps' or 'They lay in wait for our steps.' The Hebrew
      verb conveys hostile pursuit.
    reason: lexical_alternative
  - marker: b
    text: '''Our days were full'' is a Hebrew idiom meaning that the allotted time
      had run out or been completed.'
    reason: cultural_note
  - marker: c
    text: Or 'our doom' for 'our end'; the Hebrew word means 'end' and in context
      implies destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָדוּ
  chosen: They hunted
  alternatives:
  - They tracked
  - They lay in wait for
  - They watched
  lexicon: HALOT
  rationale: The verb from צדד/צוד in this context conveys hostile pursuit or stalking.
    'They hunted' preserves the predatory force and fits the following result clause
    about being unable to walk freely.
- source_word: צְעָדֵינוּ
  chosen: our steps
  alternatives:
  - our footsteps
  - our goings
  lexicon: HALOT
  rationale: Literally 'our steps.' This idiom can refer to movement generally, but
    retaining 'steps' preserves the concrete imagery of being tracked at every movement.
- source_word: מִלֶּכֶת
  chosen: so that we could not walk
  alternatives:
  - from walking
  - so that we could not go
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive expresses prevention: they hunted
    our steps from walking/in order to prevent walking. English idiom is best captured
    by an explicit result clause, ''so that we could not walk.'''
- source_word: בִּרְחֹבֹתֵינוּ
  chosen: in our streets
  alternatives:
  - in our squares
  - in our open places
  lexicon: HALOT
  rationale: רְחֹבוֹת can denote broad places, plazas, or streets within a city. In
    this lament context, 'streets' is the most natural modern English rendering while
    still fitting urban public space.
- source_word: קָרַב
  chosen: drew near
  alternatives:
  - came near
  - approached
  lexicon: HALOT
  rationale: A standard rendering of קרב. 'Drew near' is idiomatic and preserves the
    ominous progressive sense.
- source_word: קִצֵּינוּ
  chosen: our end
  alternatives:
  - our doom
  - our destruction
  lexicon: HALOT
  rationale: קֵץ means 'end.' In context it is the end of the city/people's allotted
    course, with destructive implications. 'Our end' preserves the lexical form and
    allows the context to supply the ominous force without over-interpreting.
- source_word: מָלְאוּ יָמֵינוּ
  chosen: our days were full
  alternatives:
  - our days were completed
  - our days were fulfilled
  lexicon: HALOT
  rationale: Literally 'our days were full.' This is an idiom for the completion of
    allotted time. Retaining 'were full' keeps the Hebrew imagery while remaining
    understandable in English.
- source_word: כִּי בָא קִצֵּינוּ
  chosen: for our end had come
  alternatives:
  - because our end had come
  - for our doom had come
  lexicon: HALOT
  rationale: כִּי here gives the reason for the preceding statement. 'For our end
    had come' is a natural English rendering and preserves the repetition of קץ from
    earlier in the verse.
