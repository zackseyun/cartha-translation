theological_decisions:
- issue: Metaphorical 'cup' imagery
  chosen_reading: The cup is retained as a metaphor for divine judgment rather than
    paraphrased away.
  alternative_readings:
  - The punishment will come to you
  rationale: The prophetic image of the cup is theologically and intertextually significant
    in Scripture. Preserving it maintains the text's literary and theological resonance
    while remaining understandable in English.
  doctrine_reference: Translation philosophy §1, §3, §6
