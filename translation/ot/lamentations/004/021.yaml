id: LAM.4.21
reference: Lamentations 4:21
source:
  edition: WLC
  text: שִׂ֤ישִׂי וְ/שִׂמְחִי֙ בַּת אֱד֔וֹם יושבתי בְּ/אֶ֣רֶץ ע֑וּץ גַּם עָלַ֨יִ/ךְ֙
    תַּעֲבָר כּ֔וֹס תִּשְׁכְּרִ֖י וְ/תִתְעָרִֽי־־־׃ס
translation:
  text: Rejoice and be glad, daughter of Edom, you who dwell in the land of Uz; yet
    the cup will also pass to you—you will become drunk and strip yourself bare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the cup will also come to you.' The image is the cup of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and be exposed' or 'and uncover yourself.' The Hebrew conveys shameful
      nakedness.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂישִׂי
  chosen: Rejoice
  alternatives:
  - Exult
  lexicon: HALOT
  rationale: Imperative feminine singular from שׂוּשׂ, calling for joyful exultation.
    'Rejoice' is natural modern English and pairs well with the following imperative.
- source_word: וְשִׂמְחִי
  chosen: and be glad
  alternatives:
  - and rejoice
  - and be joyful
  lexicon: HALOT
  rationale: Second imperative intensifies the call to celebration. Rendering with
    a slightly different English phrase avoids wooden repetition while preserving
    the parallelism.
- source_word: בַּת אֱדוֹם
  chosen: daughter of Edom
  alternatives:
  - Daughter Edom
  lexicon: HALOT
  rationale: Standard prophetic personification of a nation/city as a daughter. Retaining
    'daughter' preserves the metaphor and the feminine address reflected throughout
    the verse.
- source_word: יֹשַׁבְתִּי
  chosen: you who dwell
  alternatives:
  - inhabiting
  - sitting
  lexicon: HALOT
  rationale: Qal participle feminine singular of ישׁב used vocatively/appositionally
    with 'daughter of Edom.' 'You who dwell' is idiomatic and preserves the ongoing
    sense.
- source_word: בְּאֶרֶץ עוּץ
  chosen: in the land of Uz
  alternatives:
  - in the country of Uz
  lexicon: HALOT
  rationale: Geographical designation; 'land of Uz' is the conventional and clear
    rendering.
- source_word: גַּם עָלַיִךְ תַּעֲבָר כּוֹס
  chosen: yet the cup will also pass to you
  alternatives:
  - the cup will also come to you
  - the cup will also pass over to you
  lexicon: HALOT
  rationale: The idiom of the cup passing denotes the arrival of divinely appointed
    judgment. 'Pass to you' preserves the metaphor better than replacing it with a
    purely interpretive gloss.
- source_word: כּוֹס
  chosen: the cup
  alternatives:
  - a cup
  lexicon: HALOT
  rationale: In context this is the well-known metaphorical cup of wrath/judgment.
    English idiom favors the definite article here.
- source_word: תִּשְׁכְּרִי
  chosen: you will become drunk
  alternatives:
  - you will be drunk
  - you will get drunk
  lexicon: HALOT
  rationale: The verb means to become intoxicated; in prophetic judgment imagery it
    describes the staggering effect of the cup. 'Become drunk' is both accurate and
    readable.
- source_word: וְתִתְעָרִי
  chosen: and strip yourself bare
  alternatives:
  - and make yourself naked
  - and be exposed
  - and uncover yourself
  lexicon: HALOT
  rationale: Hitpael of ערה in this context conveys being laid bare/uncovered in shame.
    'Strip yourself bare' preserves the reflexive form and the disgrace imagery without
    archaic diction.
