id: LAM.4.11
reference: Lamentations 4:11
source:
  edition: WLC
  text: כִּלָּ֤ה יְהוָה֙ אֶת חֲמָת֔/וֹ שָׁפַ֖ךְ חֲר֣וֹן אַפּ֑/וֹ וַ/יַּצֶּת אֵ֣שׁ
    בְּ/צִיּ֔וֹן וַ/תֹּ֖אכַל יְסוֹדֹתֶֽי/הָ־־׃ס
translation:
  text: The LORD has exhausted his wrath; he has poured out his burning anger. He
    kindled a fire in Zion, and it consumed her foundations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has completed his wrath' or 'has spent his wrath fully.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the burning of his anger' or 'the fierceness of his anger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּלָּה
  chosen: has exhausted
  alternatives:
  - has completed
  - has spent
  - has finished
  lexicon: HALOT
  rationale: The verb כלה here conveys bringing something to its full extent or using
    it up. 'Has exhausted' captures the sense that the LORD's wrath has been fully
    spent, fitting the context of judgment better than the more neutral 'has completed'
    or 'has finished.'
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: חֲמָתוֹ
  chosen: his wrath
  alternatives:
  - his fury
  - his heat
  lexicon: HALOT
  rationale: חֵמָה commonly denotes wrath or fury. 'Wrath' is clear, weighty, and
    idiomatic in English for divine judgment.
- source_word: שָׁפַךְ
  chosen: has poured out
  alternatives:
  - has spilled
  - has emptied out
  lexicon: HALOT
  rationale: The verb literally means 'to pour out' and is a common metaphor for the
    outpouring of divine anger. The formal image should be preserved.
- source_word: חֲרוֹן אַפּוֹ
  chosen: his burning anger
  alternatives:
  - the fierceness of his anger
  - his fierce anger
  - his hot anger
  lexicon: HALOT
  rationale: The phrase literally involves the burning/heat of anger, with אף idiomatically
    meaning anger. 'Burning anger' preserves the heat imagery while remaining natural
    English.
- source_word: וַיַּצֶּת אֵשׁ
  chosen: He kindled a fire
  alternatives:
  - He set fire
  - He ignited a fire
  lexicon: HALOT
  rationale: The verb means to kindle or set ablaze. 'Kindled a fire' preserves the
    verbal imagery and avoids the slightly more idiomatic but less literal 'set fire.'
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - against Zion
  - within Zion
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' Here it locates the fire in Zion,
    the city personified and judged.
- source_word: וַתֹּאכַל
  chosen: it consumed
  alternatives:
  - it devoured
  - it ate up
  lexicon: HALOT
  rationale: The feminine verb agrees with 'fire.' 'Consumed' is idiomatic for fire
    and preserves the destructive force without sounding overly colloquial.
- source_word: יְסוֹדֹתֶיהָ
  chosen: her foundations
  alternatives:
  - its foundations
  lexicon: HALOT
  rationale: The suffix is feminine singular, referring back to Zion as a personified
    city. 'Her foundations' preserves that personification better than the impersonal
    'its foundations.'
