theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Depiction of divine judgment imagery
  chosen_reading: Retain both 'wrath' and 'burning anger' as distinct but parallel
    expressions
  alternative_readings:
  - Collapse into a single expression such as 'anger'
  rationale: The Hebrew uses two related but distinct expressions for divine anger.
    Preserving both maintains the poetic intensification and does not flatten the
    theology of judgment.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
