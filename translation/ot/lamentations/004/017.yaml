id: LAM.4.17
reference: Lamentations 4:17
source:
  edition: WLC
  text: עוד/ינה תִּכְלֶ֣ינָה עֵינֵ֔י/נוּ אֶל עֶזְרָתֵ֖/נוּ הָ֑בֶל בְּ/צִפִּיָּתֵ֣/נוּ
    צִפִּ֔ינוּ אֶל גּ֖וֹי לֹ֥א יוֹשִֽׁעַ־־׃ס
translation:
  text: Still our eyes failed, looking in vain for our help; in our watching we watched
    for a nation that could not save.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we waited for a nation that did not save.' The Hebrew verb can be rendered
      'watched for,' 'waited for,' or 'looked for,' and the final clause may be understood
      as inability or failure.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדֶינָה
  chosen: Still
  alternatives:
  - Yet
  - Even then
  - Still yet
  lexicon: HALOT
  rationale: Adverbial particle expressing continuance or persistence. 'Still' captures
    the ongoing state leading into the verbal clause without overcomplicating the
    English.
- source_word: תִּכְלֶינָה
  chosen: failed
  alternatives:
  - were exhausted
  - came to an end
  - wasted away
  lexicon: HALOT
  rationale: From כלה, here of the eyes being spent or exhausted from prolonged expectation.
    'Failed' is idiomatic English for eyes worn out by waiting and fits the lament
    context.
- source_word: עֵינֵינוּ
  chosen: our eyes
  lexicon: HALOT
  rationale: Literal rendering retained; the image of eyes failing from expectation
    is central to the verse's poetic force.
- source_word: אֶל־עֶזְרָתֵנוּ הָבֶל
  chosen: looking in vain for our help
  alternatives:
  - for our vain help
  - toward our futile help
  - for help—vanity
  lexicon: HALOT
  rationale: The syntax is compressed. הבל functions adverbially/predicatively to
    qualify the hoped-for help as futile. 'Looking in vain for our help' conveys both
    the directionality of אֶל and the futility marked by הבל in natural English.
- source_word: בְּצִפִּיָּתֵנוּ
  chosen: in our watching
  alternatives:
  - as we watched
  - in our expectation
  - while we kept watch
  lexicon: HALOT
  rationale: Noun from the root צפה/צפה in the sense of watchful expectation. 'In
    our watching' preserves the nominal form and the poetic parallel with the following
    verb.
- source_word: צִפִּינוּ
  chosen: we watched for
  alternatives:
  - we waited for
  - we looked for
  - we hoped for
  lexicon: HALOT
  rationale: The verb denotes watchful waiting or looking out for. 'Watched for' preserves
    the wordplay with בְּצִפִּיָּתֵנוּ better than the flatter 'waited for.'
- source_word: גּוֹי
  chosen: a nation
  alternatives:
  - a people
  lexicon: HALOT
  rationale: In context this refers to a foreign political power expected to provide
    deliverance. 'Nation' best fits the geopolitical sense.
- source_word: לֹא יוֹשִׁעַ
  chosen: could not save
  alternatives:
  - would not save
  - did not save
  - cannot deliver
  lexicon: HALOT
  rationale: Hiphil of ישׁע means 'save/deliver.' Given the retrospective lament over
    misplaced hope, 'could not save' communicates practical inability to bring the
    expected rescue; 'save' is retained as the core lexical equivalent.
