theological_decisions:
- issue: Whether to render צַדִּיקִים as a moral category or as merely judicial innocence
  chosen_reading: the righteous
  alternative_readings:
  - the innocent
  rationale: The Hebrew adjective commonly denotes those who are righteous/just, not
    merely victims proven innocent. Rendering it as 'the righteous' preserves the
    ethical and covenantal dimension without importing a narrower legal sense.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
