id: LAM.4.13
reference: Lamentations 4:13
source:
  edition: WLC
  text: מֵֽ/חַטֹּ֣את נְבִיאֶ֔י/הָ עֲוֺנ֖וֹת כֹּהֲנֶ֑י/הָ הַ/שֹּׁפְכִ֥ים בְּ/קִרְבָּ֖/הּ
    דַּ֥ם צַדִּיקִֽים׃ס
translation:
  text: Because of the sins of her prophets, the iniquities of her priests, who poured
    out in her midst the blood of the righteous,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who shed in her midst the blood of the righteous.' The Hebrew participle
      can be rendered with either 'poured out' or the more idiomatic 'shed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the innocent.' The Hebrew צַדִּיקִים more literally means 'the righteous
      ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/חַטֹּאת
  chosen: Because of the sins of
  alternatives:
  - From the sins of
  - For the sins of
  lexicon: HALOT
  rationale: The prefixed מ on חַטֹּאת can mark cause/source. In this context it introduces
    the reason for Jerusalem's condition in the surrounding lament, so 'Because of'
    best conveys the causal force in natural English while preserving the link to
    'sins.'
- source_word: נְבִיאֶיהָ
  chosen: her prophets
  lexicon: HALOT
  rationale: Straightforward construct with 3fs suffix referring to the city; 'her
    prophets' preserves the possessive relation.
- source_word: עֲוֺנוֹת
  chosen: the iniquities of
  alternatives:
  - the guilt of
  - the sins of
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of guilt/iniquity rather than a more general
    term for sin. 'Iniquities' preserves the moral weight and distinguishes it from
    חַטֹּאת earlier in the verse.
- source_word: כֹּהֲנֶיהָ
  chosen: her priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן with 3fs suffix; no contextual reason to
    vary.
- source_word: הַשֹּׁפְכִים
  chosen: who poured out
  alternatives:
  - who shed
  - those who poured out
  lexicon: HALOT
  rationale: The participle identifies the prophets and priests as the ones responsible.
    English relative clause 'who poured out' is smoother than a bare participle. 'Poured
    out' reflects the literal imagery of שפך; 'shed' is possible but less vivid.
- source_word: בְּקִרְבָּהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the midst of her
  lexicon: HALOT
  rationale: A literal but natural rendering that preserves the image of bloodshed
    occurring inside the city itself.
- source_word: דַּם
  chosen: the blood of
  lexicon: HALOT
  rationale: Direct object of the participle; standard rendering.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the innocent
  lexicon: HALOT
  rationale: צַדִּיקִים means 'righteous ones.' 'The righteous' is concise and preserves
    the moral category. 'The innocent' is interpretive and narrower.
