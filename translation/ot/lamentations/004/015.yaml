id: LAM.4.15
reference: Lamentations 4:15
source:
  edition: WLC
  text: ס֣וּרוּ טָמֵ֞א קָ֣רְאוּ לָ֗/מוֹ ס֤וּרוּ ס֨וּרוּ֙ אַל תִּגָּ֔עוּ כִּ֥י נָצ֖וּ
    גַּם נָ֑עוּ אָֽמְרוּ֙ בַּ/גּוֹיִ֔ם לֹ֥א יוֹסִ֖יפוּ לָ/גֽוּר־־׃ס
translation:
  text: “Turn aside! Unclean!” they cried to them. “Turn aside, turn aside, do not
    touch!” For they have fled; they have even wandered. Among the nations they said,
    “They will stay no longer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “they have been driven away” for “they have fled”; the Hebrew verb is
      rare and its nuance is debated in this context.
    reason: lexical_alternative
  - marker: b
    text: Or, “They will no longer sojourn,” preserving the sense of residing as foreigners.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  chosen: Turn aside
  alternatives:
  - Go away
  - Depart
  lexicon: HALOT
  rationale: Imperative plural from סור, here functioning as a shouted warning/order
    to keep away. 'Turn aside' preserves the sense of moving out of the way without
    overcommitting to total expulsion implied by 'depart.' Repetition is retained
    for rhetorical force.
- source_word: טָמֵא
  chosen: Unclean
  alternatives:
  - Impure
  lexicon: HALOT
  rationale: Cultic/social impurity term used as an exclamation identifying the persons
    as defiling. 'Unclean' is the standard and most transparent rendering in biblical
    context.
- source_word: קָרְאוּ לָמוֹ
  chosen: they cried to them
  alternatives:
  - they called out to them
  - they shouted at them
  lexicon: HALOT
  rationale: קרא with ל marks directed speech. 'Cried to them' captures the urgent
    public outcry.
- source_word: אַל תִּגָּעוּ
  chosen: do not touch
  alternatives:
  - do not come near
  - do not make contact
  lexicon: HALOT
  rationale: נגע literally means 'touch.' In this impurity context it implies avoiding
    contact; the literal wording best preserves the source while allowing the implication
    to be felt.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the warning and subsequent report. 'For'
    fits the poetic flow.
- source_word: נָצוּ
  chosen: they have fled
  alternatives:
  - they are scattered
  - they have been driven away
  lexicon: HALOT
  rationale: The verb is difficult and comparatively rare; in context it denotes being
    driven off or fleeing away. 'They have fled' fits the parallel with 'they have
    even wandered' and the social expulsion in the verse. An alternative is preserved
    in a footnote because the nuance is debated.
- source_word: גַּם נָעוּ
  chosen: they have even wandered
  alternatives:
  - they also staggered
  - they also roamed
  lexicon: HALOT
  rationale: נוע commonly conveys wandering or tottering. Here, after expulsion, 'wandered'
    best suits the context of displaced persons among the nations. 'Even' renders
    גַּם with emphatic progression.
- source_word: אָמְרוּ בַּגּוֹיִם
  chosen: Among the nations they said
  alternatives:
  - They said among the nations
  - In the nations they said
  lexicon: HALOT
  rationale: ב marks the sphere/location of the saying. 'Among the nations' is idiomatic
    and preserves the exile-diaspora setting.
- source_word: לֹא יוֹסִיפוּ לָגוּר
  chosen: They will stay no longer
  alternatives:
  - They will no longer dwell
  - They will no longer sojourn
  lexicon: HALOT
  rationale: גור denotes residing as a sojourner/temporary resident. In natural English,
    'stay no longer' communicates the sense clearly; a more formal alternative is
    preserved in a footnote because 'sojourn' carries useful nuance.
