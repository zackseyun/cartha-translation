theological_decisions:
- issue: Whether מְשִׁיחַ יְהוָה should be rendered in a way that suggests the eschatological
    Messiah/Christ
  chosen_reading: Rendered as 'the LORD’s anointed' referring to the historical Davidic
    king
  alternative_readings:
  - the LORD’s Messiah
  rationale: Although the Hebrew term is the same root later associated with 'Messiah,'
    the immediate context in Lamentations concerns Judah’s king. Following the translation
    philosophy, titles are translated for meaning, but the verse should not be made
    into a direct messianic prediction where the text itself speaks of the captured
    royal figure. The alternative is preserved conceptually in documentation, but
    not preferred in the main text.
  doctrine_reference: 'Translation philosophy §§1, 3; Contested terms: Χριστός/Messiah
    principle applied analogically to Hebrew מָשִׁיחַ'
