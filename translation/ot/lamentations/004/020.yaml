id: LAM.4.20
reference: Lamentations 4:20
source:
  edition: WLC
  text: ר֤וּחַ אַפֵּ֨י/נוּ֙ מְשִׁ֣יחַ יְהוָ֔ה נִלְכַּ֖ד בִּ/שְׁחִיתוֹתָ֑/ם אֲשֶׁ֣ר
    אָמַ֔רְנוּ בְּ/צִלּ֖/וֹ נִֽחְיֶ֥ה בַ/גּוֹיִֽם׃ס
translation:
  text: The breath of our nostrils, the LORD’s anointed, was captured in their pits—he
    of whom we said, “Under his shadow we will live among the nations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their traps' or 'in their snares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֤וּחַ
  chosen: breath
  alternatives:
  - spirit
  - wind
  lexicon: HALOT
  rationale: In the idiom 'breath of our nostrils,' רוּחַ refers to life-breath rather
    than 'spirit' or literal 'wind.' 'Breath' preserves the concrete metaphor and
    the emotional force of dependence on the king.
- source_word: אַפֵּינוּ
  chosen: our nostrils
  alternatives:
  - our nose
  lexicon: HALOT
  rationale: The plural construct with first person plural suffix is idiomatically
    'our nostrils.' Retaining the bodily image preserves the Hebrew expression rather
    than flattening it to a paraphrase like 'our very life.'
- source_word: מְשִׁיחַ יְהוָה
  chosen: the LORD’s anointed
  alternatives:
  - the anointed of the LORD
  - the LORD’s Messiah
  lexicon: HALOT
  rationale: מְשִׁיחַ literally means 'anointed one.' In this context it refers to
    the Davidic king, not directly to the eschatological Messiah. 'The LORD’s anointed'
    is the most natural English rendering and avoids importing a christological claim
    the verse itself does not make, while still preserving the royal-theological title.
- source_word: נִלְכַּד
  chosen: was captured
  alternatives:
  - was taken
  - was seized
  lexicon: HALOT
  rationale: The Niphal form conveys being caught or captured. 'Was captured' fits
    the military context and reads naturally in English.
- source_word: בִּשְׁחִיתוֹתָם
  chosen: in their pits
  alternatives:
  - in their traps
  - in their snares
  lexicon: HALOT
  rationale: The noun can denote pits or destructive traps. 'Pits' keeps the concrete
    image and matches the likely literal-metaphorical sense of enemy entrapment. Because
    'traps' is also plausible and interpretively significant, it is preserved in a
    footnote.
- source_word: אֲשֶׁר אָמַרְנוּ
  chosen: he of whom we said
  alternatives:
  - about whom we said
  - of whom we had said
  lexicon: HALOT
  rationale: This relative clause points back to 'the LORD’s anointed.' 'He of whom
    we said' is idiomatic and preserves the referential force without overcomplicating
    the syntax.
- source_word: בְּצִלּוֹ
  chosen: under his shadow
  alternatives:
  - in his shade
  - under his protection
  lexicon: HALOT
  rationale: The Hebrew image is literally 'in/under his shadow.' 'Under his shadow'
    preserves the metaphor of protection and political shelter; 'under his protection'
    would explain rather than translate.
- source_word: נִחְיֶה
  chosen: we will live
  alternatives:
  - we shall live
  - we will survive
  lexicon: HALOT
  rationale: The verb means 'live.' In context it includes survival, but 'we will
    live' is the more direct rendering and lets the context carry the nuance.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations generally. 'Among the nations'
    is the clearest and least misleading rendering in this exilic-political context;
    'Gentiles' would sound overly NT-specific.
