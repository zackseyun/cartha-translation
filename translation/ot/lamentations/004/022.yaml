theological_decisions:
- issue: Semantic range of עָוֹן in the first clause
  chosen_reading: Rendered as 'punishment' in 'Your punishment is finished'
  alternative_readings:
  - Rendered as 'iniquity' or 'guilt'
  rationale: The immediate context interprets the ending of Zion's exile, so the consequence/penalty
    sense of עָוֹן is most natural here. This does not deny the lexical sense 'iniquity'
    elsewhere; it reflects context-sensitive optimal equivalence.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Implicit subject of the verbs יוֹסִיף, פָּקַד, גִּלָּה
  chosen_reading: Rendered with 'he' rather than specifying 'the LORD'
  alternative_readings:
  - the LORD will not exile you again; the LORD has punished...
  rationale: Hebrew leaves the subject implicit. Since the divine subject is inferable
    from context but not explicit in this verse, 'he' avoids importing a noun absent
    from the text while preserving intelligibility in English.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
