id: LAM.4.22
reference: Lamentations 4:22
source:
  edition: WLC
  text: תַּם עֲוֺנֵ/ךְ֙ בַּת צִיּ֔וֹן לֹ֥א יוֹסִ֖יף לְ/הַגְלוֹתֵ֑/ךְ פָּקַ֤ד עֲוֺנֵ/ךְ֙
    בַּת אֱד֔וֹם גִּלָּ֖ה עַל חַטֹּאתָֽיִ/ךְ־־־־׃פ
translation:
  text: Your punishment is finished, daughter Zion; he will not exile you again. He
    has punished your iniquity, daughter Edom; he has uncovered your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your iniquity is finished' or 'Your guilt is ended.' The Hebrew word
      can mean iniquity, guilt, or the punishment resulting from guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has visited your iniquity'—that is, he has called it to account in
      judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'he has exposed your sins' or 'revealed your sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּם
  chosen: is finished
  alternatives:
  - is complete
  - has come to an end
  lexicon: HALOT
  rationale: Qal perfect 3ms of תמם/תם conveys completion or coming to an end. With
    עֲוֺנֵךְ as subject in context, English idiom is best expressed as 'is finished'
    rather than the more wooden 'is complete.'
- source_word: עֲוֺנֵךְ
  chosen: your punishment
  alternatives:
  - your iniquity
  - your guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the punishment/consequence of guilt.
    In the first clause, 'your punishment is finished' fits the context of exile ending
    ('he will not exile you again'). The semantic shift is contextually warranted
    and should be documented.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  lexicon: HALOT
  rationale: A conventional Hebrew personification for the city/people of Zion. Kept
    as 'daughter Zion' to preserve the metaphor and poetic address rather than flattening
    to 'people of Zion.' Capitalization is stylistic; lower-case 'daughter' is retained
    in running English.
- source_word: לֹא יוֹסִיף לְהַגְלוֹתֵךְ
  chosen: he will not exile you again
  alternatives:
  - he will not send you into exile again
  - he will no longer carry you away into exile
  lexicon: HALOT
  rationale: יָסַף + infinitive means 'continue/add to' doing something, here 'to
    exile you.' 'Again' captures the idiomatic force naturally in English. An explicit
    subject is not stated in Hebrew, but English requires one; 'he' is the most economical
    rendering.
- source_word: פָּקַד
  chosen: has punished
  alternatives:
  - has visited
  - has attended to
  - has called to account
  lexicon: HALOT
  rationale: פקד has a broad range including visit, attend, muster, punish. In this
    judgment context with עֲוֺנֵךְ, 'has punished' communicates the judicial sense
    clearly in modern English.
- source_word: עֲוֺנֵךְ
  chosen: your iniquity
  alternatives:
  - your guilt
  - your punishment
  lexicon: HALOT
  rationale: In the second clause, the object of פקד is best kept closer to the lexical
    core 'iniquity' rather than repeating 'punishment.' This preserves the parallel
    with the following exposure of sins and avoids obscuring Edom's culpability.
- source_word: בַּת אֱדוֹם
  chosen: daughter Edom
  alternatives:
  - Daughter Edom
  lexicon: HALOT
  rationale: As with 'daughter Zion,' this preserves the poetic personification of
    the nation/people.
- source_word: גִּלָּה עַל חַטֹּאתָיִךְ
  chosen: he has uncovered your sins
  alternatives:
  - he has exposed your sins
  - he has revealed your sins
  lexicon: HALOT
  rationale: גלה in the piel commonly means uncover/reveal. 'Uncovered your sins'
    preserves the metaphor of exposure while remaining natural English. The preposition
    עַל here is absorbed idiomatically into the English verb phrase.
- source_word: חַטֹּאתָיִךְ
  chosen: your sins
  alternatives:
  - your offenses
  lexicon: HALOT
  rationale: Straightforward plural of חטאת in the sense of sins/offenses. 'Sins'
    is the clearest and most theologically transparent rendering.
