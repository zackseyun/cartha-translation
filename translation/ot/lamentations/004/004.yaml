id: LAM.4.4
reference: Lamentations 4:4
source:
  edition: WLC
  text: דָּבַ֨ק לְשׁ֥וֹן יוֹנֵ֛ק אֶל חכּ֖/וֹ בַּ/צָּמָ֑א עֽוֹלָלִים֙ שָׁ֣אֲלוּ לֶ֔חֶם
    פֹּרֵ֖שׂ אֵ֥ין לָ/הֶֽם־׃ס
translation:
  text: The tongue of the nursing infant sticks to the roof of his mouth because of
    thirst; children ask for bread, but no one breaks it for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his palate.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'there is none for them breaking [bread].' The sense is that
      no one breaks or distributes bread to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבַק
  chosen: sticks
  alternatives:
  - clings
  - is stuck
  lexicon: HALOT
  rationale: The verb denotes adhering or sticking fast. Present-tense English gives
    a vivid, gnomic description of the famine scene and reads naturally in English
    poetry.
- source_word: לְשׁוֹן
  chosen: tongue
  lexicon: HALOT
  rationale: Literal body-part reference; no idiomatic reason to depart from the straightforward
    gloss.
- source_word: יוֹנֵק
  chosen: nursing infant
  alternatives:
  - suckling
  - nursing child
  lexicon: HALOT
  rationale: Refers to a baby still nursing. 'Nursing infant' is clear modern English
    and preserves the pathos of extreme deprivation.
- source_word: אֶל חכּוֹ
  chosen: to the roof of his mouth
  alternatives:
  - to his palate
  lexicon: HALOT
  rationale: חֵךְ can mean palate/roof of the mouth. 'Roof of his mouth' is more idiomatic
    and immediately understandable than 'palate' while remaining precise.
- source_word: בַּצָּמָא
  chosen: because of thirst
  alternatives:
  - from thirst
  - in thirst
  lexicon: HALOT
  rationale: The preposition with the noun expresses cause or circumstance. 'Because
    of thirst' makes the causal sense explicit in natural English.
- source_word: עוֹלָלִים
  chosen: children
  alternatives:
  - little children
  - young children
  lexicon: HALOT
  rationale: The term refers to small children. 'Children' is concise and sufficient
    here, with the surrounding context already indicating vulnerability and youth.
- source_word: שָׁאֲלוּ
  chosen: ask for
  alternatives:
  - beg for
  - request
  lexicon: HALOT
  rationale: The basic sense is 'ask.' 'Ask for' fits the direct object 'bread' and
    avoids overstating the verb as 'beg,' though the context is desperate.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The concrete noun 'bread' should be retained rather than generalized
    to 'food,' preserving the starkness of the image.
- source_word: פֹּרֵשׂ
  chosen: breaks it
  alternatives:
  - divides it
  - spreads it out
  lexicon: HALOT
  rationale: In context the participle refers to breaking/distributing bread to children.
    'Breaks it' reflects the common action associated with bread and fits the elliptical
    Hebrew expression.
- source_word: אֵין לָהֶם
  chosen: no one ... for them
  alternatives:
  - there is none for them
  - they have no one
  lexicon: HALOT
  rationale: 'The Hebrew literally says ''there is none for them.'' In English, supplying
    ''no one'' with the participle yields a natural sentence: there is no one to break
    bread for them.'
