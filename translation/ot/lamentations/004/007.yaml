id: LAM.4.7
reference: Lamentations 4:7
source:
  edition: WLC
  text: זַכּ֤וּ נְזִירֶ֨י/הָ֙ מִ/שֶּׁ֔לֶג צַח֖וּ מֵ/חָלָ֑ב אָ֤דְמוּ עֶ֨צֶם֙ מִ/פְּנִינִ֔ים
    סַפִּ֖יר גִּזְרָתָֽ/ם׃ס
translation:
  text: Her princes were purer than snow, whiter than milk; their bodies were more
    ruddy than corals, their form was like sapphire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her Nazirites' or 'her consecrated ones.' The Hebrew term can refer
      to those set apart by vow, but here may denote Jerusalem's distinguished nobles
      or princes.
    reason: alternative_reading
  - marker: b
    text: The Hebrew word rendered 'corals' is uncertain; it may also refer to rubies,
      pearls, or another precious red jewel.
    reason: lexical_alternative
  - marker: c
    text: The ancient term rendered 'sapphire' may refer to lapis lazuli rather than
      the modern sapphire gemstone.
    reason: cultural_note
lexical_decisions:
- source_word: נְזִירֶיהָ
  chosen: her princes
  alternatives:
  - her Nazirites
  - her consecrated ones
  lexicon: HALOT
  rationale: Though the noun can denote 'Nazirite' or one consecrated/separated, in
    this context of Jerusalem's former elite and in parallel with descriptions of
    physical splendor, 'princes' fits the likely sense of distinguished nobles. The
    alternative 'Nazirites' is preserved in a footnote because the lexical sense is
    debated and traditional translations often retain it.
- source_word: זַכּוּ
  chosen: were purer
  alternatives:
  - were pure
  - were brighter
  lexicon: HALOT
  rationale: The verb conveys cleanness/purity. 'Were purer' works idiomatically with
    the comparative phrase 'than snow' and preserves the poetic comparison.
- source_word: צַחוּ
  chosen: whiter
  alternatives:
  - were dazzling
  - were brighter
  lexicon: HALOT
  rationale: The verb denotes brightness/whiteness. 'Whiter than milk' is the most
    natural English rendering in this comparative poetic line.
- source_word: אָדְמוּ
  chosen: were more ruddy
  alternatives:
  - were redder
  - glowed red
  lexicon: HALOT
  rationale: The verb means to be red/ruddy. 'More ruddy' is idiomatic English for
    healthy reddish complexion and suits the elevated poetic register.
- source_word: עֶצֶם
  chosen: their bodies
  alternatives:
  - their bones
  - their frame
  lexicon: HALOT
  rationale: Although the noun commonly means 'bone,' in poetic usage it can stand
    for bodily substance or frame. 'Their bodies' best fits the description of outward
    appearance and avoids an overly anatomical English reading.
- source_word: פְּנִינִים
  chosen: corals
  alternatives:
  - rubies
  - pearls
  - red jewels
  lexicon: HALOT
  rationale: The precise referent is uncertain; it denotes a precious red or lustrous
    substance. 'Corals' is a strong contextual choice because the comparison is with
    redness ('were more ruddy'). Alternatives are preserved in a footnote due to lexical
    uncertainty.
- source_word: גִּזְרָתָם
  chosen: their form
  alternatives:
  - their appearance
  - their figure
  - their shape
  lexicon: HALOT
  rationale: The noun refers to shape, form, or figure. 'Their form was like sapphire'
    preserves the poetic imagery in natural English.
- source_word: סַפִּיר
  chosen: sapphire
  alternatives:
  - lapis lazuli
  lexicon: HALOT
  rationale: The traditional rendering 'sapphire' is retained, though the ancient
    stone may have referred to lapis lazuli rather than the modern gemstone. The lexical
    issue is preserved in a footnote.
