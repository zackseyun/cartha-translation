theological_decisions:
- issue: Referent of 'the holy stones'
  chosen_reading: Rendered literally without resolving whether the phrase refers to
    actual temple stones, consecrated precious stones, or metaphorically to Jerusalem's
    people.
  alternative_readings:
  - temple stones
  - sacred gems
  - the precious sons of Zion by anticipation of v.2
  rationale: The Hebrew phrase is poetic and contextually evocative. To preserve theological
    and literary tension, the main text keeps the literal wording rather than importing
    a specific interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
