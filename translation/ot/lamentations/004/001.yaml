id: LAM.4.1
reference: Lamentations 4:1
source:
  edition: WLC
  text: אֵיכָה֙ יוּעַ֣ם זָהָ֔ב יִשְׁנֶ֖א הַ/כֶּ֣תֶם הַ/טּ֑וֹב תִּשְׁתַּפֵּ֨כְנָה֙
    אַבְנֵי קֹ֔דֶשׁ בְּ/רֹ֖אשׁ כָּל חוּצֽוֹת־־׃ס
translation:
  text: How the gold has grown dim, how the fine gold has changed! The holy stones
    are poured out at the head of every street.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred stones' or 'the stones of the sanctuary.' The Hebrew may
      refer to consecrated temple stones or precious holy stones in poetic imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at the head of every street'; this may mean the street corners
      or entrances to the streets.
    reason: cultural_note
lexical_decisions:
- source_word: אֵיכָה
  chosen: How
  alternatives:
  - Alas, how
  - How sadly
  lexicon: HALOT
  rationale: Introduces a lamenting exclamation, best rendered with 'How' in keeping
    with the dirge style of Lamentations and the conventional force of the particle.
- source_word: יוּעַם
  chosen: has grown dim
  alternatives:
  - is darkened
  - has become tarnished
  lexicon: HALOT
  rationale: The Hophal form conveys becoming darkened or dimmed. 'Has grown dim'
    is natural English and preserves the image of lost brightness without over-specifying
    material corrosion.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: יִשְׁנֶא
  chosen: has changed
  alternatives:
  - is altered
  - has become different
  lexicon: HALOT
  rationale: Though the verb can carry the sense 'change' or 'be altered,' in context
    it describes the changed appearance/state of the fine gold. 'Has changed' is idiomatic
    and fits the parallelism with 'has grown dim.'
- source_word: הַכֶּתֶם הַטּוֹב
  chosen: the fine gold
  alternatives:
  - the pure gold
  - the best gold
  lexicon: HALOT
  rationale: כֶּתֶם denotes refined or precious gold; with הַטּוֹב, the phrase intensifies
    quality. 'Fine gold' is concise, idiomatic, and preserves the poetic distinction
    from the more general זָהָב.
- source_word: תִּשְׁתַּפֵּכְנָה
  chosen: are poured out
  alternatives:
  - are scattered
  - are spilled out
  lexicon: HALOT
  rationale: The Hitpael/passive-reflexive nuance from שפך evokes being poured out
    or strewn. 'Are poured out' preserves the vivid metaphor; 'scattered' is interpretive
    and therefore kept as an alternative.
- source_word: אַבְנֵי קֹדֶשׁ
  chosen: the holy stones
  alternatives:
  - the sacred stones
  - the stones of the sanctuary
  lexicon: HALOT
  rationale: Literally 'stones of holiness/holy stones.' This likely refers either
    to temple stones or to precious consecrated stones by metaphor. 'The holy stones'
    preserves the Hebrew wording and ambiguity better than the more interpretive 'stones
    of the sanctuary.'
- source_word: בְּרֹאשׁ
  chosen: at the head of
  alternatives:
  - at the corner of
  - at the beginning of
  lexicon: HALOT
  rationale: Literally 'at the head of.' In street contexts this can denote the top,
    entrance, or corner. 'At the head of' keeps the concrete Hebrew image while remaining
    intelligible in English.
- source_word: כָּל חוּצוֹת
  chosen: every street
  alternatives:
  - all the streets
  - every square
  lexicon: HALOT
  rationale: חוּצוֹת refers to streets or open places of a city. 'Every street' fits
    the distributive force of כָּל and reads smoothly in English.
