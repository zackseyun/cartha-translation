id: LAM.4.10
reference: Lamentations 4:10
source:
  edition: WLC
  text: יְדֵ֗י נָשִׁים֙ רַחֲמָ֣נִיּ֔וֹת בִּשְּׁל֖וּ יַלְדֵי/הֶ֑ן הָי֤וּ לְ/בָרוֹת֙
    לָ֔/מוֹ בְּ/שֶׁ֖בֶר בַּת עַמִּֽ/י־׃ס
translation:
  text: The hands of compassionate women cooked their own children; they became food
    for them in the destruction of the daughter of my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "boiled their children." The Hebrew verb specifically refers to cooking,
      often by boiling.
    reason: lexical_alternative
  - marker: b
    text: '"The daughter of my people" is a Hebrew poetic expression personifying
      my people, especially Jerusalem/Zion, in her devastation.'
    reason: cultural_note
lexical_decisions:
- source_word: יְדֵי
  chosen: The hands of
  alternatives:
  - The hands
  lexicon: HALOT
  rationale: Construct form of 'hands' introducing the subject with vivid concreteness.
    Retaining 'hands' rather than smoothing to simply 'women' preserves the Hebrew's
    stark imagery.
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: Generic plural 'women' fits the context; nothing in the verse requires
    the narrower 'wives'.
- source_word: רַחֲמָנִיּוֹת
  chosen: compassionate
  alternatives:
  - tenderhearted
  - merciful
  lexicon: HALOT
  rationale: 'The adjective highlights the shocking reversal: women characterized
    by compassion are driven to cannibalism. ''Compassionate'' is clear modern English
    and preserves the moral contrast.'
- source_word: בִּשְּׁלוּ
  chosen: cooked
  alternatives:
  - boiled
  lexicon: HALOT
  rationale: The verb denotes cooking/boiling. 'Cooked' is the broader, more natural
    English rendering while still covering the likely sense.
- source_word: יַלְדֵיהֶן
  chosen: their own children
  alternatives:
  - their children
  lexicon: HALOT
  rationale: Adding 'own' is a natural English intensifier that makes explicit the
    possessive force already present in Hebrew, without adding new content.
- source_word: הָיוּ
  chosen: they became
  alternatives:
  - they were
  lexicon: HALOT
  rationale: The verb links the children to the predicate that follows. 'Became' brings
    out the resultant state in idiomatic English.
- source_word: לְבָרוֹת
  chosen: food
  alternatives:
  - as food
  - for food
  - for eating
  lexicon: HALOT
  rationale: This infinitive/verb form from ברה in context refers to food taken for
    sustenance. 'Food' is concise and idiomatic in English.
- source_word: לָמוֹ
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: Dative/pronominal form indicating the women themselves as the beneficiaries/consumers.
    'For them' fits the idiom 'became food for them.'
- source_word: בְּשֶׁבֶר
  chosen: in the destruction
  alternatives:
  - in the ruin
  - in the breaking
  - in the collapse
  lexicon: HALOT
  rationale: The noun denotes fracture, breaking, or ruin. In this context of Jerusalem's
    catastrophe, 'destruction' communicates the calamity clearly.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people
  lexicon: HALOT
  rationale: This prophetic idiom personifies the people/city. Retaining 'daughter
    of my people' preserves the Hebrew metaphor and lament style rather than flattening
    it.
