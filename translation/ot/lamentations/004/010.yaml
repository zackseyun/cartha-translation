theological_decisions:
- issue: Whether to retain the idiom בַּת עַמִּי literally or paraphrase it
  chosen_reading: the daughter of my people
  alternative_readings:
  - my people
  - the daughter of my people
  rationale: The phrase is not merely referential but carries prophetic-poetic personification.
    Preserving the idiom maintains the lament's theological and literary force without
    importing extra interpretation.
  doctrine_reference: Translation philosophy §1, §6
- issue: How explicitly to render the horror of the verse
  chosen_reading: cooked their own children; they became food for them
  alternative_readings:
  - boiled their children; they were their food
  - prepared their children as food
  rationale: The Hebrew is stark and must not be softened. Optimal equivalence here
    favors direct wording that preserves the severity of covenant-judgment imagery
    while remaining idiomatic English.
  doctrine_reference: Translation philosophy §1, §6
