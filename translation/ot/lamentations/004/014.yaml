id: LAM.4.14
reference: Lamentations 4:14
source:
  edition: WLC
  text: נָע֤וּ עִוְרִים֙ בַּֽ/חוּצ֔וֹת נְגֹֽאֲל֖וּ בַּ/דָּ֑ם בְּ/לֹ֣א יֽוּכְל֔וּ יִגְּע֖וּ
    בִּ/לְבֻשֵׁי/הֶֽם׃ס
translation:
  text: They wandered blind through the streets, defiled with blood, so that no one
    could touch their garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They wandered like blind men through the streets, defiled with blood,
      so that people could not touch their garments.' The Hebrew is compressed, and
      the subject of 'could not touch' is not explicit.
    reason: alternative_reading
  - marker: b
    text: '''Defiled with blood'' likely carries impurity language, not merely the
      idea of being physically bloodstained.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָעוּ
  chosen: they wandered
  alternatives:
  - they staggered
  - they reeled
  lexicon: HALOT
  rationale: The verb from נוע conveys aimless movement or staggering. 'Wandered'
    fits the lament context and reads naturally in English, while still allowing the
    image of disoriented movement.
- source_word: עִוְרִים
  chosen: blind
  alternatives:
  - like the blind
  - blind men
  lexicon: HALOT
  rationale: The adjective/noun literally means 'blind ones' or 'blind men.' Rendering
    it predicatively as 'blind' after 'they wandered' gives idiomatic English while
    preserving the image. The phrase may be literal or simile-like in force, but the
    Hebrew lacks an explicit comparative particle.
- source_word: בַּחוּצוֹת
  chosen: through the streets
  alternatives:
  - in the streets
  - through the squares
  lexicon: HALOT
  rationale: חוּצוֹת refers to streets or open places of a city. 'Through the streets'
    matches the motion implied by the verb and is natural English.
- source_word: נְגֹאֲלוּ
  chosen: defiled
  alternatives:
  - polluted
  - stained
  lexicon: HALOT
  rationale: From גאל in the Niphal, the sense here is ritual or moral defilement/pollution.
    'Defiled' best preserves the impurity nuance, stronger than merely physical staining.
- source_word: בַּדָּם
  chosen: with blood
  alternatives:
  - by blood
  - in blood
  lexicon: HALOT
  rationale: The preposition marks the means or substance of defilement. 'With blood'
    is the clearest English expression here.
- source_word: בְּלֹא יוּכְלוּ
  chosen: so that no one could
  alternatives:
  - without being able to
  - they were unable to
  lexicon: HALOT
  rationale: The clause is syntactically difficult. In context, the sense is that
    because of their blood-defilement, contact was impossible or forbidden. English
    requires an explicit subject for clarity; 'no one could' captures the resulting
    impossibility reflected in many standard interpretations.
- source_word: יִגְּעוּ
  chosen: touch
  alternatives:
  - come near
  - lay hold of
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'reach.' Here 'touch' best fits the impurity
    context, where contact with garments would transmit defilement.
- source_word: בִּלְבֻשֵׁיהֶם
  chosen: their garments
  alternatives:
  - their clothes
  - their clothing
  lexicon: HALOT
  rationale: The noun refers to clothing/garments. 'Garments' preserves the slightly
    elevated register appropriate to lament poetry.
