id: LAM.4.16
reference: Lamentations 4:16
source:
  edition: WLC
  text: פְּנֵ֤י יְהוָה֙ חִלְּקָ֔/ם לֹ֥א יוֹסִ֖יף לְ/הַבִּיטָ֑/ם פְּנֵ֤י כֹהֲנִים֙ לֹ֣א נָשָׂ֔אוּ זקנים לֹ֥א חָנָֽנוּ׃ס
translation:
  text: The face of Yahweh has scattered them; he will no longer look on them. They showed no regard for priests; they showed no favor to elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The presence of the LORD has divided/dispersed them; he will no longer look at them.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they did not lift up the face of priests'; an idiom meaning they showed no regard or favor.
    reason: lexical_alternative
  - marker: c
    text: Or 'they had no mercy on elders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵי יְהוָה
  chosen: The face of the LORD
  alternatives:
  - The presence of the LORD
  - The LORD himself
  lexicon: HALOT
  rationale: פָּנִים/פְּנֵי literally means 'face,' but often functions idiomatically for presence. Here retaining 'face' preserves the vivid anthropomorphic imagery and the poetic parallelism, while 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חִלְּקָם
  chosen: has scattered them
  alternatives:
  - has divided them
  - has dispersed them
  lexicon: HALOT
  rationale: The piel of חלק can mean divide, apportion, or distribute/scatter. In this judgment context, with the object suffix 'them,' 'has scattered them' best captures the sense of dispersal under divine wrath and fits the surrounding lament context.
- source_word: לֹא יוֹסִיף לְהַבִּיטָם
  chosen: he will no longer look on them
  alternatives:
  - he will no longer regard them
  - he will no longer look at them
  lexicon: HALOT
  rationale: יסף + infinitive expresses continuation/addition, idiomatically 'continue' or 'again.' With negation, 'will no longer.' נבט means 'look at/upon.' 'Look on them' is natural English and preserves the relational/judicial nuance without overinterpreting.
- source_word: פְּנֵי כֹהֲנִים
  chosen: priests
  alternatives:
  - the faces of priests
  lexicon: HALOT
  rationale: Although literally 'the faces of priests,' this is an idiom continued by the following verbs about showing regard/favor. English expresses the sense more naturally by making 'priests' the object of regard.
- source_word: לֹא נָשָׂאוּ
  chosen: They showed no regard for
  alternatives:
  - They did not lift up the face of
  - They did not honor
  - They did not respect
  lexicon: HALOT
  rationale: נשא פנים is an idiom meaning to show partiality, favor, or regard. In this context of social collapse and contempt, 'showed no regard for' communicates the idiomatic sense clearly without implying positive favoritism alone.
- source_word: זקנים
  chosen: elders
  alternatives:
  - old men
  - the aged
  lexicon: HALOT
  rationale: זקנים can denote either older people or community elders. In this poetic pair with 'priests,' 'elders' best fits the likely social-leadership sense while still implying age.
- source_word: לֹא חָנָנוּ
  chosen: they showed no favor to
  alternatives:
  - they had no mercy on
  - they were not gracious to
  - they pitied not
  lexicon: HALOT
  rationale: חנן commonly means show favor, be gracious, have mercy. 'Showed no favor to' keeps the lexical connection to grace/favor and matches the parallel with the previous clause; 'had no mercy on' is possible but slightly stronger and more interpretive.
