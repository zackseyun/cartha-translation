theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'The face of the LORD' rather than flattening to an abstract expression alone.
  alternative_readings:
  - The presence of the LORD has scattered them
  rationale: The Hebrew uses concrete anthropomorphic imagery. Preserving it maintains the poetic force and does not imply a corporeal doctrine of God; it is standard biblical idiom.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
