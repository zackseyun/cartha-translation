id: LAM.4.12
reference: Lamentations 4:12
source:
  edition: WLC
  text: לֹ֤א הֶאֱמִ֨ינוּ֙ מַלְכֵי אֶ֔רֶץ ו/כל יֹשְׁבֵ֣י תֵבֵ֑ל כִּ֤י יָבֹא֙ צַ֣ר וְ/אוֹיֵ֔ב
    בְּ/שַׁעֲרֵ֖י יְרוּשָׁלִָֽם־׃ס
translation:
  text: The kings of the earth did not believe, nor did any of the inhabitants of
    the world, that an adversary and an enemy could enter the gates of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that an adversary and an enemy would come into the gates of Jerusalem.'
      The Hebrew verb is simply 'come'; 'enter' makes the sense explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמִינוּ
  chosen: did not believe
  alternatives:
  - did not trust
  - did not think possible
  lexicon: HALOT
  rationale: The Hiphil of אמן here expresses believing or regarding something as
    credible. In English, 'did not believe' best preserves the direct sense, while
    the following content clause supplies what was not believed.
- source_word: מַלְכֵי אֶרֶץ
  chosen: the kings of the earth
  alternatives:
  - earth's kings
  - the kings of the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth,' but in parallel with 'all the inhabitants
    of the world' the broader universal sense is intended. 'The kings of the earth'
    is natural and preserves the elevated register.
- source_word: וְכָל יֹשְׁבֵי תֵבֵל
  chosen: nor did any of the inhabitants of the world
  alternatives:
  - and all the inhabitants of the world
  - or any of the inhabitants of the world
  lexicon: HALOT
  rationale: The conjunction with the preceding negation is best rendered idiomatically
    in English as 'nor did any of.' תֵבֵל denotes the world/inhabited world, giving
    a universal scope parallel to 'earth.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what was not believed rather than
    a causal clause. 'That' best signals indirect discourse in English.
- source_word: יָבֹא
  chosen: could enter
  alternatives:
  - would come
  - might come
  - could come
  lexicon: HALOT
  rationale: 'Literally the verb is ''would come/enter,'' but with the prepositional
    phrase ''into the gates of Jerusalem'' the sense is ingress. ''Could enter'' communicates
    the incredulity implied by the context: they did not believe such a thing was
    possible.'
- source_word: צַר
  chosen: an adversary
  alternatives:
  - a foe
  - an oppressor
  - a besieger
  lexicon: HALOT
  rationale: צַר can denote an adversary, enemy, or one who presses hard. 'Adversary'
    preserves the distinct lexical value alongside the following אוֹיֵב without collapsing
    the pair into a single repeated English word.
- source_word: וְאוֹיֵב
  chosen: and an enemy
  alternatives:
  - or an enemy
  lexicon: HALOT
  rationale: אוֹיֵב is the common term for 'enemy.' Rendering both nouns distinctly
    preserves the Hebrew pairing for emphasis.
- source_word: בְּשַׁעֲרֵי יְרוּשָׁלִָם
  chosen: the gates of Jerusalem
  alternatives:
  - into the gates of Jerusalem
  - through the gates of Jerusalem
  lexicon: HALOT
  rationale: The preposition ב with 'gates' after a motion verb can indicate entry
    at/into the gates. English idiom prefers 'enter the gates of Jerusalem,' which
    conveys the sense clearly without overloading the preposition.
