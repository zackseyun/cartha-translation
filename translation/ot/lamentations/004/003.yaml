id: LAM.4.3
reference: Lamentations 4:3
source:
  edition: WLC
  text: גַּם תנין חָ֣לְצוּ שַׁ֔ד הֵינִ֖יקוּ גּוּרֵי/הֶ֑ן בַּת עַמִּ֣/י לְ/אַכְזָ֔ר
    כי ענים בַּ/מִּדְבָּֽר־־׃ס
translation:
  text: Even jackals bare the breast; they nurse their young. The daughter of my people
    has become cruel, like ostriches in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sea monsters' or 'dragons' for תנין; here 'jackals' is preferred because
      the verse describes nursing their young, which fits a land animal comparison
      better in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'like owls in the wilderness'; the Hebrew ענים is traditionally understood
      as 'ostriches,' especially in light of Job 39:13–17.
    reason: lexical_alternative
lexical_decisions:
- source_word: תנין
  chosen: jackals
  alternatives:
  - sea monsters
  - dragons
  lexicon: HALOT
  rationale: In this context of maternal nursing behavior on land, the plural noun
    is best understood as 'jackals,' a recognized sense in Hebrew usage, rather than
    mythic or marine creatures. This fits the comparison with neglectful desert birds/creatures
    and the famine setting.
- source_word: חָלְצוּ שַׁד
  chosen: bare the breast
  alternatives:
  - draw out the breast
  - offer the breast
  lexicon: HALOT
  rationale: The verb with 'breast' conveys exposing or presenting the breast for
    nursing. 'Bare the breast' is idiomatic modern English that preserves the concrete
    maternal image.
- source_word: הֵינִיקוּ
  chosen: they nurse
  alternatives:
  - they suckle
  - they give milk to
  lexicon: HALOT
  rationale: The hiphil of ינק means causing the young to suck, i.e., nursing/suckling
    them. 'Nurse' is natural English and keeps the maternal action clear.
- source_word: גּוּרֵיהֶן
  chosen: their young
  alternatives:
  - their cubs
  - their whelps
  lexicon: HALOT
  rationale: The noun refers to offspring of animals. 'Their young' is broad enough
    to fit the comparison without over-specifying species in English.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my nation
  lexicon: HALOT
  rationale: This is a conventional personification of the people/community. Retaining
    'daughter of my people' preserves the prophetic-poetic idiom and emotional force.
- source_word: לְאַכְזָר
  chosen: has become cruel
  alternatives:
  - is cruel
  - has turned cruel
  lexicon: HALOT
  rationale: 'The lamed with adjective after the subject expresses resultant state:
    she has become/turned cruel. ''Has become cruel'' captures the sense of degeneration
    in context.'
- source_word: כִּי עֲנִים
  chosen: like ostriches
  alternatives:
  - like owls
  lexicon: HALOT
  rationale: The comparison is traditionally and lexically best taken as 'ostriches,'
    desert creatures associated in biblical imagery with harsh treatment of their
    young (cf. Job 39:13-17). 'Owls' is less likely here.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is a standard rendering of מִדְבָּר and suits the poetic
    register. ''Desert'' is possible, but ''wilderness'' better preserves the broader
    semantic range.'
