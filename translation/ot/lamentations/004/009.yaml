id: LAM.4.9
reference: Lamentations 4:9
source:
  edition: WLC
  text: טוֹבִ֤ים הָיוּ֙ חַלְלֵי חֶ֔רֶב מֵֽ/חַלְלֵ֖י רָעָ֑ב שֶׁ֣/הֵ֤ם יָז֨וּבוּ֙ מְדֻקָּרִ֔ים
    מִ/תְּנוּבֹ֖ת שָׂדָֽי־׃ס
translation:
  text: Better off were those slain by the sword than those slain by hunger, who waste
    away, pierced through for lack of the produce of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who pine away, pierced through, because there is no produce from the
      field.' The Hebrew of this clause is difficult, especially the verb rendered
      'waste away' and the force of the preposition in 'from/for lack of the produce
      of the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבִים הָיוּ
  chosen: Better off were
  alternatives:
  - were better
  - were more fortunate
  lexicon: HALOT
  rationale: Idiomatic comparative use of טוֹב with היה expresses relative condition
    or advantage, not moral goodness. 'Better off were' preserves the comparative
    force and the lament style.
- source_word: חַלְלֵי חֶרֶב
  chosen: those slain by the sword
  alternatives:
  - the slain of the sword
  - those pierced by the sword
  lexicon: HALOT
  rationale: חָלָל commonly denotes one who has been slain. 'By the sword' is the
    natural instrumental sense of the construct phrase.
- source_word: מֵחַלְלֵי רָעָב
  chosen: than those slain by hunger
  alternatives:
  - than the slain of famine
  - than those killed by famine
  lexicon: HALOT
  rationale: The prefixed מ marks comparison ('than'). רָעָב can mean hunger or famine;
    here 'hunger' fits the experiential contrast with sword-death, while still implying
    famine conditions.
- source_word: שֶׁהֵם
  chosen: who
  alternatives:
  - for they
  - because they
  lexicon: HALOT
  rationale: The relative particle with pronoun introduces a clause describing the
    hunger-stricken. English 'who' gives a smooth relative clause without overtranslating
    the pronoun.
- source_word: יָזוּבוּ
  chosen: waste away
  alternatives:
  - flow away
  - pine away
  - drain away
  lexicon: HALOT
  rationale: The verb is difficult, with the sense of wasting/draining away in context.
    'Waste away' best fits the image of prolonged starvation and is widely supported
    by context, while avoiding an overly literal but opaque 'flow away'.
- source_word: מְדֻקָּרִים
  chosen: pierced through
  alternatives:
  - stabbed
  - stricken
  - wounded
  lexicon: HALOT
  rationale: Passive participle from דקר, literally 'pierced.' In context the starvation
    victims are metaphorically or internally 'pierced' by want. 'Pierced through'
    preserves the vividness without forcing a strictly physical weapon image.
- source_word: מִתְּנוּבוֹת שָׂדָי
  chosen: for lack of the produce of the field
  alternatives:
  - from the produce of the field
  - because there was no produce from the field
  - away from the fruits of the field
  lexicon: HALOT
  rationale: 'The preposition מ here is best taken in a privative/causal sense in
    context: they waste away because they are deprived of field produce. ''Produce
    of the field'' is a natural rendering of תְּנוּבוֹת שָׂדַי.'
