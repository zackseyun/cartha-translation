id: LAM.4.19
reference: Lamentations 4:19
source:
  edition: WLC
  text: קַלִּ֤ים הָיוּ֙ רֹדְפֵ֔י/נוּ מִ/נִּשְׁרֵ֖י שָׁמָ֑יִם עַל הֶ/הָרִ֣ים דְּלָקֻ֔/נוּ
    בַּ/מִּדְבָּ֖ר אָ֥רְבוּ לָֽ/נוּ־׃ס
translation:
  text: Our pursuers were swifter than the eagles of the heavens; on the mountains
    they chased us; in the wilderness they lay in wait for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than the eagles of the sky'; the Hebrew נֶשֶׁר can also denote a vulture
      in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלִּים
  chosen: swifter
  alternatives:
  - swift
  - faster
  lexicon: HALOT
  rationale: Comparative sense in context with מִן ('than') calls for an English comparative.
    'Swifter' is idiomatic and preserves the poetic force.
- source_word: רֹדְפֵינוּ
  chosen: our pursuers
  alternatives:
  - those who pursued us
  - our persecutors
  lexicon: HALOT
  rationale: From רדף, 'to pursue/chase.' 'Pursuers' is the most direct nominal rendering
    here; 'persecutors' would over-interpret toward hostility beyond the immediate
    chase imagery.
- source_word: מִנִּשְׁרֵי שָׁמָיִם
  chosen: than the eagles of the heavens
  alternatives:
  - than the eagles of the sky
  - than vultures of the heavens
  lexicon: HALOT
  rationale: נשר commonly denotes eagle or vulture; in English biblical style 'eagles'
    is the conventional and likely intended image of speed. 'Of the heavens' closely
    reflects the Hebrew genitive and preserves the elevated poetic register; 'of the
    sky' is possible but less formal.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - upon the mountains
  - in the hill country
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'On the mountains' is natural modern
    English and keeps the topographical imagery.
- source_word: דְּלָקֻנוּ
  chosen: they chased us
  alternatives:
  - they hotly pursued us
  - they hunted us down
  lexicon: HALOT
  rationale: From דלק, 'to pursue ardently/hotly.' 'Chased us' is readable and fits
    the parallel with 'our pursuers'; the adverbial intensity is present in the overall
    context, though 'hotly pursued' is a viable more formal alternative.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often refers to wilderness steppe rather than sandy desert specifically.
    'Wilderness' better preserves the broader biblical sense.
- source_word: אָרְבוּ לָנוּ
  chosen: they lay in wait for us
  alternatives:
  - they ambushed us
  - they lurked for us
  lexicon: HALOT
  rationale: ארב means to lie in ambush or wait. 'Lay in wait for us' is the clearest
    idiomatic rendering and preserves the durative/strategic sense better than the
    more event-focused 'ambushed us'.
