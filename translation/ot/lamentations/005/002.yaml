id: LAM.5.2
reference: Lamentations 5:2
source:
  edition: WLC
  text: נַחֲלָתֵ֨/נוּ֙ נֶֽהֶפְכָ֣ה לְ/זָרִ֔ים בָּתֵּ֖י/נוּ לְ/נָכְרִֽים׃
translation:
  text: Our inheritance has been turned over to strangers, our houses to foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our inheritance has been turned to strangers, our houses to foreigners.'
      The Hebrew verb can be rendered more literally as 'has been turned,' but here
      likely implies transfer of possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָתֵנוּ
  chosen: our inheritance
  alternatives:
  - our heritage
  - our possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance, possession, or allotted heritage.
    'Inheritance' best preserves the covenantal and land-allotment nuance without
    over-specifying. 'Heritage' is possible but slightly less concrete in English.
- source_word: נֶהֶפְכָה
  chosen: has been turned over
  alternatives:
  - has been turned
  - has been transferred
  - has changed hands
  lexicon: HALOT
  rationale: The Niphal of הפך conveys being turned, overturned, or changed. In this
    context of property passing to others, 'has been turned over' captures the passive/resultative
    sense and the transfer of possession more clearly than the more literal but vaguer
    'has been turned'.
- source_word: לְזָרִים
  chosen: to strangers
  alternatives:
  - to aliens
  - to outsiders
  lexicon: HALOT
  rationale: זָרִים refers to those who are foreign or outside the community. 'Strangers'
    is idiomatic and preserves the sense of non-members/non-kin without the modern
    ambiguity of 'aliens.'
- source_word: בָּתֵּינוּ
  chosen: our houses
  alternatives:
  - our homes
  lexicon: HALOT
  rationale: The basic sense is physical houses. 'Houses' is more formally aligned
    with the Hebrew and fits the parallelism with 'inheritance.'
- source_word: לְנָכְרִים
  chosen: to foreigners
  alternatives:
  - to strangers
  - to unknown people
  lexicon: HALOT
  rationale: נָכְרִים emphasizes foreignness. Rendering it 'foreigners' preserves
    a distinction from זָרִים in the previous colon, where the Hebrew uses a different
    term. This helps reflect the poetic parallelism without flattening the vocabulary.
