id: LAM.5.7
reference: Lamentations 5:7
source:
  edition: WLC
  text: אֲבֹתֵ֤י/נוּ חָֽטְאוּ֙ אינ/ם אנחנו עֲוֺנֹתֵי/הֶ֥ם סָבָֽלְנוּ׃
translation:
  text: Our fathers sinned, and they are no more; but we bear their iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we bear the punishment/consequences of their iniquities.' The Hebrew
      word can refer to iniquity itself, guilt, or its resulting burden.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבֹתֵינוּ
  chosen: Our fathers
  alternatives:
  - Our ancestors
  - Our forefathers
  lexicon: HALOT
  rationale: אָבוֹת commonly means 'fathers' and can extend to ancestors. 'Our fathers'
    preserves the familial and covenantal resonance of the Hebrew while remaining
    natural English. 'Ancestors' is possible but slightly flattens the direct filial
    force.
- source_word: חָטְאוּ
  chosen: sinned
  alternatives:
  - have sinned
  lexicon: HALOT
  rationale: Qal perfect 3cp of חטא denotes committing sin. Simple past fits the lament's
    retrospective statement in English better than an English present perfect.
- source_word: אֵינָם
  chosen: they are no more
  alternatives:
  - they are not
  - they are gone
  lexicon: HALOT
  rationale: The negative particle with 3mp suffix literally means 'they are not.'
    In context it idiomatically indicates that the fathers are no longer present/alive.
    'They are no more' captures the idiom with solemnity and clarity.
- source_word: אֲנַחְנוּ
  chosen: we
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis/contrast. In English the contrast
    is adequately conveyed by 'but we,' so the pronoun is retained straightforwardly.
- source_word: עֲוֺנֹתֵיהֶם
  chosen: their iniquities
  alternatives:
  - their guilt
  - their sins
  - the punishment for their iniquities
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences/punishment of guilt.
    Here, because it is something 'borne,' the term may include the burden or consequences
    of their wrongdoing. The main text keeps the more formally transparent 'iniquities,'
    while the semantic extension is preserved in a footnote.
- source_word: סָבָלְנוּ
  chosen: we bear
  alternatives:
  - we have borne
  - we suffer
  lexicon: HALOT
  rationale: The verb סבל means to bear, carry, or endure a burden. 'We bear' preserves
    the metaphor of carrying and matches the object עֲוֺנֹתֵיהֶם well. 'We suffer'
    is interpretive and less textually direct.
