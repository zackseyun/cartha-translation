theological_decisions:
- issue: Whether the verse teaches direct inherited guilt or the bearing of consequences
    from prior generations' sins
  chosen_reading: The translation preserves the Hebrew's tension by rendering 'we
    bear their iniquities' without resolving whether this means inherited guilt, punishment,
    or the ongoing burden/consequences of ancestral sin.
  alternative_readings:
  - we bear the punishment for their iniquities
  - we suffer for their sins
  rationale: עָוֹן can encompass sin, guilt, and its consequences, and the lament's
    rhetoric should not be narrowed beyond what the Hebrew states. This preserves
    theological tension rather than importing a specific doctrinal conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
