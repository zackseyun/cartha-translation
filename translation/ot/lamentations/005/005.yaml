id: LAM.5.5
reference: Lamentations 5:5
source:
  edition: WLC
  text: עַ֤ל צַוָּארֵ֨/נוּ֙ נִרְדָּ֔פְנוּ יָגַ֖עְנוּ לא הֽוּנַ֖ח לָֽ/נוּ׃
translation:
  text: We are pursued at our necks; we are weary; no rest is given to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'On our necks we are pursued.' The Hebrew preserves
      a vivid image of enemies pressing hard upon them.
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be rendered 'we are given no rest' or 'rest
      is not granted to us.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַל
  chosen: at
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: With the idiom involving 'neck,' עַל is best rendered in a way that conveys
    pressure directed against the person. 'At our necks' is a natural English equivalent
    for hostile pursuit and preserves the concrete imagery better than a flatter 'on'
    or more wooden 'upon.'
- source_word: צַוָּארֵינוּ
  chosen: our necks
  alternatives:
  - our neck
  - our throats
  lexicon: HALOT
  rationale: The noun denotes the neck. The plural with first person plural suffix
    is most naturally 'our necks.' 'Throats' would overinterpret, and singular 'our
    neck' would smooth the Hebrew collective image unnecessarily.
- source_word: נִרְדָּפְנוּ
  chosen: we are pursued
  alternatives:
  - we are persecuted
  - we are chased
  lexicon: HALOT
  rationale: From רדף, the passive/niphal sense here is straightforwardly 'be pursued.'
    'Persecuted' is possible in some contexts but is less concrete than the lament's
    imagery; 'chased' is too colloquial.
- source_word: יָגַעְנוּ
  chosen: we are weary
  alternatives:
  - we are exhausted
  - we have labored
  lexicon: HALOT
  rationale: The verb יגע can denote weariness from toil or strain. In context, after
    relentless pursuit, the resultative sense 'we are weary' communicates the condition
    produced by oppression. 'Exhausted' is stronger but slightly interpretive; 'have
    labored' misses the experiential state emphasized here.
- source_word: לֹא
  chosen: 'no'
  alternatives:
  - not
  lexicon: HALOT
  rationale: Used with the following passive verb to form the clause 'no rest is given
    to us.' This yields idiomatic English while preserving the negation.
- source_word: הוּנַח
  chosen: is given
  alternatives:
  - is granted
  - is allowed
  - is left
  lexicon: HALOT
  rationale: 'From נוח in the hophal, the sense is causative-passive: ''to be given
    rest'' or ''to be allowed repose.'' Because English normally supplies the implied
    object ''rest'' from the root''s semantic field, ''is given'' works well when
    paired with ''no rest.'''
- source_word: לָנוּ
  chosen: to us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: 'The preposition marks the indirect object of the passive expression:
    no rest is given ''to us.'' This is the most natural English rendering.'
