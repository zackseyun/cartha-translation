id: LAM.5.8
reference: Lamentations 5:8
source:
  edition: WLC
  text: עֲבָדִים֙ מָ֣שְׁלוּ בָ֔/נוּ פֹּרֵ֖ק אֵ֥ין מִ/יָּדָֽ/ם׃
translation:
  text: Slaves rule over us; there is no one to rescue us from their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants rule over us.' The Hebrew עֲבָדִים can denote either servants
      or slaves; 'slaves' is chosen here to preserve the force of social humiliation
      in the lament.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from their hand,' an idiom for being under their power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדִים
  chosen: Slaves
  alternatives:
  - servants
  lexicon: HALOT
  rationale: The noun עֶבֶד in the plural denotes slaves/servants. Here 'slaves' best
    preserves the social reversal and humiliation lamented in context; it reflects
    the bonded status more sharply than 'servants,' in line with the project's preference
    to avoid softening such terms where the condition is salient.
- source_word: מָשְׁלוּ בָנוּ
  chosen: rule over us
  alternatives:
  - have dominion over us
  - govern us
  lexicon: HALOT
  rationale: משל with ב conveys exercising rule over someone. 'Rule over us' is idiomatic
    modern English and preserves the oppressive force without sounding archaic.
- source_word: פֹּרֵק
  chosen: to rescue
  alternatives:
  - to deliver
  - to tear away
  - to free
  lexicon: HALOT
  rationale: 'The participle of פרק here functions substantivally: ''one who rescues/delivers.''
    In context of oppression ''rescue'' is natural English and conveys removal from
    another''s power. ''Deliver'' is possible but slightly more traditional/churchly;
    ''tear away'' is too literal for this context.'
- source_word: אֵין
  chosen: there is no one
  alternatives:
  - there is none
  lexicon: HALOT
  rationale: Existential אֵין with a substantival participle is best rendered as a
    full existential clause in English. 'There is no one' is clear, natural, and preserves
    the sense.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - from their power
  - out of their hand
  lexicon: HALOT
  rationale: יָד often metaphorically denotes power or control. The literal 'from
    their hand' is retained because it is intelligible in English and preserves the
    Hebrew imagery; the sense of power is implicit. 'Out of their hand' is also possible
    but slightly less smooth here.
