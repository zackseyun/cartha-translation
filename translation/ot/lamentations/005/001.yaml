theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies the default rendering 'the LORD' for יְהוָה,
    following Jewish reverence tradition and the Septuagintal pattern. In direct address,
    'O LORD' is the idiomatic vocative equivalent.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
