id: LAM.5.1
reference: Lamentations 5:1
source:
  edition: WLC
  text: זְכֹ֤ר יְהוָה֙ מֶֽה הָ֣יָה לָ֔/נוּ הביט וּ/רְאֵ֥ה אֶת חֶרְפָּתֵֽ/נוּ־־׃
translation:
  text: Remember, O Yahweh, what has happened to us; look, and see our disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'our reproach'; also 'our shame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Imperative 2ms of זכר addressed to YHWH. 'Remember' is the natural English imperative and preserves the covenantal-prayer force without implying mere mental recollection.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֶה הָיָה לָנוּ
  chosen: what has happened to us
  alternatives:
  - what has come upon us
  - what has become of us
  lexicon: HALOT
  rationale: The clause asks God to take note of the condition/events that have befallen the people. 'What has happened to us' is idiomatic modern English and fits the lament context better than the more static 'what has become of us,' while remaining faithful to the Hebrew.
- source_word: הביט
  chosen: look
  alternatives:
  - gaze
  - regard
  lexicon: HALOT
  rationale: Imperative of נבט, paired with 'see.' 'Look' preserves the urgent appeal and allows the parallelism with the following verb to stand in simple English.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and behold
  lexicon: HALOT
  rationale: Imperative of ראה. Rendered straightforwardly as 'and see' to preserve the twofold plea ('look' / 'see') rather than collapsing them into one English verb.
- source_word: אֶת חֶרְפָּתֵנוּ
  chosen: our disgrace
  alternatives:
  - our reproach
  - our shame
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, disgrace, or shame borne before others. 'Our disgrace' communicates both the public humiliation and the state of dishonor in clear modern English. 'Reproach' is more traditional but less accessible; 'shame' can sound too internal/subjective.
