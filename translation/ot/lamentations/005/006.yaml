id: LAM.5.6
reference: Lamentations 5:6
source:
  edition: WLC
  text: מִצְרַ֨יִם֙ נָתַ֣נּוּ יָ֔ד אַשּׁ֖וּר לִ/שְׂבֹּ֥עַֽ לָֽחֶם׃
translation:
  text: We have given the hand to Egypt and to Assyria, to get enough bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We have given a hand to Egypt and Assyria'—that is, submitted to them,
      sought alliance with them, or appealed to them for help.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Proper place-name; standard transliteration in English is 'Egypt.'
- source_word: נָתַנּוּ
  chosen: have given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: Qal perfect 1cp of נתן, here expressing completed action with present
    relevance in the lament context. English present perfect captures the speaker's
    present condition resulting from the action; simple past is possible but less
    vivid in context.
- source_word: יָד
  chosen: the hand
  alternatives:
  - hand
  - pledge
  - submission
  lexicon: HALOT
  rationale: Literally 'hand.' In the idiom נתן יד, the sense is to extend the hand
    in submission, alliance, or supplication. The main text preserves the Hebrew image
    with minimal interpretation; the idiomatic force is clarified by context and footnote-worthy
    alternatives are noted here.
- source_word: אַשּׁוּר
  chosen: Assyria
  lexicon: HALOT
  rationale: Proper place-name; standard English rendering is 'Assyria.'
- source_word: לִשְׂבֹּעַ
  chosen: to get enough
  alternatives:
  - to be satisfied
  - to be filled
  lexicon: HALOT
  rationale: Infinitive of שבע, 'to be sated/satisfied.' In English, 'to get enough'
    naturally conveys the purpose clause in connection with bread, while preserving
    the concrete sense of obtaining sufficient food.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Literal 'bread.' While it can metonymically refer to food in general,
    'bread' is retained because the Hebrew uses the concrete noun and the context
    of famine makes the image forceful.
