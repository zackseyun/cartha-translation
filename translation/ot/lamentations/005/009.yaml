id: LAM.5.9
reference: Lamentations 5:9
source:
  edition: WLC
  text: בְּ/נַפְשֵׁ֨/נוּ֙ נָבִ֣יא לַחְמֵ֔/נוּ מִ/פְּנֵ֖י חֶ֥רֶב הַ/מִּדְבָּֽר׃
translation:
  text: At the risk of our lives we get our bread, because of the sword in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we bring in our bread at the risk of our lives.' The Hebrew verb can
      be understood as 'bring' or more generally 'obtain/procure.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the sword of the wilderness,' possibly referring to sword-bearing
      danger in the wilderness rather than a sword belonging to the wilderness itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנַפְשֵׁנוּ
  chosen: At the risk of our lives
  alternatives:
  - With our lives
  - By our lives
  - At the cost of our lives
  lexicon: HALOT
  rationale: The idiom 'with/in our soul/life' here conveys mortal danger rather than
    instrumentality. 'At the risk of our lives' expresses the Hebrew idiom naturally
    in English while preserving the severity.
- source_word: נָבִיא
  chosen: we get
  alternatives:
  - we bring
  - we obtain
  lexicon: HALOT
  rationale: Hiphil of בוא can mean 'bring' or 'cause to come,' but with 'our bread'
    in this context the sense is obtaining/procuring food. 'We get' is idiomatic modern
    English and fits the lament context.
- source_word: לַחְמֵנוּ
  chosen: our bread
  alternatives:
  - our food
  lexicon: HALOT
  rationale: '''Bread'' is the literal term and in context stands for basic sustenance.
    Retaining ''bread'' preserves the concrete imagery and common biblical diction.'
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  - because of the threat of
  lexicon: HALOT
  rationale: The preposition here marks cause or reason. 'Because of' is the clearest
    natural rendering in English.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - the danger of the sword
  lexicon: HALOT
  rationale: Literal 'sword' preserves the vivid image of violent threat. The danger
    is implicit from context and need not be expanded in the main text.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  - the open country
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert region. 'Wilderness' is broad
    enough to include arid, unprotected terrain and matches biblical usage well here.
