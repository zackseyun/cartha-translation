id: LAM.5.21
reference: Lamentations 5:21
source:
  edition: WLC
  text: הֲשִׁיבֵ֨/נוּ יְהוָ֤ה אֵלֶ֨י/ךָ֙ ו/נשוב חַדֵּ֥שׁ יָמֵ֖י/נוּ כְּ/קֶֽדֶם׀׃
translation:
  text: Restore us to yourself, O LORD, that we may return; renew our days as of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Bring us back to you, O LORD, and we will return.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'as formerly' or 'as in former times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲשִׁיבֵנוּ
  chosen: Restore us
  alternatives:
  - Bring us back
  - Turn us back
  lexicon: HALOT
  rationale: Hiphil imperative of שוב with 1cp suffix means to cause to return/bring
    back. 'Restore us' fits the prayerful context and naturally carries the relational
    and covenantal sense without over-paraphrasing.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address with 'O,' this becomes 'O LORD.'
- source_word: אֵלֶיךָ
  chosen: to yourself
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition אֶל plus 2ms suffix is literally 'to you.' 'To yourself'
    is chosen in English because it makes explicit the relational direction of the
    plea and pairs idiomatically with 'restore us,' while preserving the sense of
    movement toward God.
- source_word: וְנָשׁוּב
  chosen: that we may return
  alternatives:
  - and we will return
  - so that we may return
  lexicon: HALOT
  rationale: 'Qal imperfect 1cp of שוב with prefixed waw can be read as result/purpose
    after the imperative: ''and then we will return'' or ''that we may return.'' In
    context, the clause expresses the effect of God''s restoring action, and ''that
    we may return'' communicates this well in natural English.'
- source_word: חַדֵּשׁ
  chosen: renew
  alternatives:
  - restore
  - make new
  lexicon: HALOT
  rationale: Piel imperative of חדש means to renew/make new. 'Renew' is the most direct
    and idiomatic choice for the petition regarding 'our days.'
- source_word: יָמֵינוּ
  chosen: our days
  alternatives:
  - our life
  - our times
  lexicon: HALOT
  rationale: Literally 'our days.' This can metonymically refer to the condition of
    life, but the concrete expression should be preserved in the main text.
- source_word: כְּקֶדֶם
  chosen: as of old
  alternatives:
  - as formerly
  - as in former times
  lexicon: HALOT
  rationale: The phrase means 'as before/in former times.' 'As of old' is concise,
    natural, and suitably elevated for lament poetry.
