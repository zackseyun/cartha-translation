theological_decisions:
- issue: Relationship between divine action and human return in וְנָשׁוּב
  chosen_reading: 'Render the clause as dependent result/purpose: ''that we may return.'''
  alternative_readings:
  - and we will return
  - so we shall return
  rationale: The Hebrew allows either a simple coordinate future-like sense or a result/purpose
    nuance following the imperative. Given the verse's theology of dependence on God's
    initiating restoration, the dependent rendering best reflects the prayer without
    importing a stronger doctrinal system than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
