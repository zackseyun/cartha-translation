theological_decisions:
- issue: Corporate confession and culpability
  chosen_reading: 'The verse is rendered as a communal acknowledgment of guilt: ''for
    we have sinned.'''
  alternative_readings:
  - A more purely circumstantial lament without emphasis on confession
  rationale: The Hebrew explicitly states communal sin as the cause of the woe. The
    translation preserves this theological connection between judgment/loss and confessed
    sin without expanding it beyond the verse.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
