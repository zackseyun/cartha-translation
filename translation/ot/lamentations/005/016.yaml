id: LAM.5.16
reference: Lamentations 5:16
source:
  edition: WLC
  text: נָֽפְלָה֙ עֲטֶ֣רֶת רֹאשֵׁ֔/נוּ אֽוֹי נָ֥א לָ֖/נוּ כִּ֥י חָטָֽאנוּ־׃
translation:
  text: The crown has fallen from our head. Woe to us, for we have sinned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The crown of our head fell.' The Hebrew uses a poetic construct phrase,
      literally 'the crown of our head.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Alas for us.' The expression is a cry of lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָפְלָה
  chosen: has fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: Qal perfect 3fs of נפל, agreeing with the feminine subject עטרת. English
    present perfect conveys the completed action with present lament force; simple
    past is possible but slightly less vivid in context.
- source_word: עֲטֶרֶת
  chosen: the crown
  alternatives:
  - our crown
  - wreath
  lexicon: HALOT
  rationale: Construct form with רֹאשֵׁנוּ, literally 'the crown of our head.' 'The
    crown' is the most natural English rendering while preserving the image of lost
    honor/royalty. 'Our crown' is interpretive and less formally tied to the construct
    chain.
- source_word: רֹאשֵׁנוּ
  chosen: our head
  alternatives:
  - our heads
  lexicon: HALOT
  rationale: Singular noun with 1cp suffix, literally 'our head.' English can retain
    the collective singular to mirror the Hebrew poetic expression 'the crown of our
    head.' Pluralizing to 'our heads' is possible but less faithful to the idiom.
- source_word: אוי נא לנו
  chosen: Woe to us
  alternatives:
  - Alas for us
  - Oh, woe to us
  lexicon: HALOT
  rationale: אוי is an interjection of lament; נא here intensifies the cry rather
    than functioning as a polite particle. 'Woe to us' is concise, idiomatic, and
    preserves the grief-laden exclamation.
- source_word: כי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason for the lament: ''for/because we have sinned.''
    ''For'' fits natural English style in lament poetry while preserving causal force.'
- source_word: חטאנו
  chosen: we have sinned
  alternatives:
  - we sinned
  - we have missed the mark
  lexicon: HALOT
  rationale: Qal perfect 1cp of חטא, the standard verb for sinning. 'We have sinned'
    is the clearest and most theologically appropriate rendering; paraphrases like
    'missed the mark' are too interpretive for the main text.
