id: LAM.5.12
reference: Lamentations 5:12
source:
  edition: WLC
  text: שָׂרִים֙ בְּ/יָדָ֣/ם נִתְל֔וּ פְּנֵ֥י זְקֵנִ֖ים לֹ֥א נֶהְדָּֽרוּ׃
translation:
  text: Princes were hung up by their hands; the faces of elders were not honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Princes were hung by their hands.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the faces of elders were not honored,' a Hebrew expression for
      denying elders the respect due to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרִים
  chosen: Princes
  alternatives:
  - officials
  - leaders
  - nobles
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes rulers, officials, or princes. 'Princes' preserves
    the social rank and traditional force in this lament context, where prominent
    men are being publicly humiliated.
- source_word: בְּיָדָם
  chosen: by their hands
  alternatives:
  - by their hand
  - with their hands
  lexicon: HALOT
  rationale: The preposition ב plus יָד with 3mp suffix is most naturally rendered
    'by their hands.' In context with נִתְלוּ, it likely indicates the body part by
    which they were suspended rather than agency.
- source_word: נִתְלוּ
  chosen: were hung up
  alternatives:
  - were hanged
  - were suspended
  lexicon: HALOT
  rationale: The Niphal plural of תלה means 'were hung/suspended.' 'Were hung up'
    is idiomatic modern English and avoids the narrower English association of 'hanged'
    with judicial execution, while still conveying violent public suspension.
- source_word: פְּנֵי זְקֵנִים
  chosen: the faces of elders
  alternatives:
  - elders were shown no respect
  - the presence of old men
  lexicon: HALOT
  rationale: Literally 'the faces of elders.' Retaining 'faces' preserves the Hebrew
    expression and the concrete imagery of public shaming. The phrase functions metonymically
    for the persons and dignity of the elders.
- source_word: לֹא נֶהְדָּרוּ
  chosen: were not honored
  alternatives:
  - were not respected
  - were not shown favor
  - were not treated with dignity
  lexicon: HALOT
  rationale: From הדר in the Niphal, the sense is that honor, dignity, or respect
    was not accorded. 'Were not honored' is concise and close to the Hebrew, while
    fitting the passive form.
