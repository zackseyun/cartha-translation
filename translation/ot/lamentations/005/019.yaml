  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the royal sense of ישׁב explicit
  chosen_reading: sit enthroned
  alternative_readings:
  - sit forever
  - remain forever
  rationale: The immediate parallel with 'your throne' indicates kingship, so making the enthronement sense explicit best reflects the Hebrew poetic meaning while remaining within optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
