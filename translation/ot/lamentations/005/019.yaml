id: LAM.5.19
reference: Lamentations 5:19
source:
  edition: WLC
  text: אַתָּ֤ה יְהוָה֙ לְ/עוֹלָ֣ם תֵּשֵׁ֔ב כִּסְאֲ/ךָ֖ לְ/דֹ֥ר וָ/דֽוֹר׃
translation:
  text: But you, O Yahweh, sit enthroned forever; your throne is from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you remain forever'; the Hebrew verb literally means 'sit,' but in this context it carries the sense of royal enthronement.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: Independent pronoun placed first for emphasis. English preserves the contrastive/emphatic force with 'But you' rather than an overly wooden repetition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring perpetuity. 'Forever' is natural modern English and fits the poetic assertion of God's unending reign.
- source_word: תֵּשֵׁב
  chosen: sit enthroned
  alternatives:
  - sit
  - remain seated
  - dwell
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit/dwell,' but with 'throne' in the parallel colon it clearly carries royal enthronement sense. 'Sit enthroned' makes explicit the idiomatic force without over-paraphrasing.
- source_word: כִּסְאֲךָ
  chosen: your throne
  lexicon: HALOT
  rationale: Standard rendering of כסא with 2ms suffix. It is the subject of the second colon's verbless/enduring assertion in sense.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to all generations
  - for generation after generation
  lexicon: HALOT
  rationale: Hebrew idiom expressing continuity across successive generations. 'From generation to generation' is idiomatic English and preserves the durative force.
