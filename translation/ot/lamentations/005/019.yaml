theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD.' In direct address, 'O LORD'
    is the most natural equivalent and maintains the reverential convention without
    introducing a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make the royal sense of ישׁב explicit
  chosen_reading: sit enthroned
  alternative_readings:
  - sit forever
  - remain forever
  rationale: The immediate parallel with 'your throne' indicates kingship, so making
    the enthronement sense explicit best reflects the Hebrew poetic meaning while
    remaining within optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy'
