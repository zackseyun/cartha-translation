id: LAM.5.10
reference: Lamentations 5:10
source:
  edition: WLC
  text: עוֹרֵ֨/נוּ֙ כְּ/תַנּ֣וּר נִכְמָ֔רוּ מִ/פְּנֵ֖י זַלְעֲפ֥וֹת רָעָֽב׃
translation:
  text: Our skin is as hot as an oven because of the burning fever of famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our skin is scorched like an oven because of the burning heat of famine.'
      The Hebrew terms for the verb and for 'burning fever/heat' are rare and may
      emphasize scorching heat rather than fever.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹרֵנוּ
  chosen: Our skin
  alternatives:
  - Our hide
  lexicon: HALOT
  rationale: The noun עוֹר means 'skin, hide.' In human context, 'skin' is the natural
    modern English rendering; 'hide' would sound zoological or harsh beyond what the
    Hebrew requires.
- source_word: כְּתַנּוּר
  chosen: as hot as an oven
  alternatives:
  - like an oven
  - as an oven
  lexicon: HALOT
  rationale: 'The comparative particle כְּ with תַּנּוּר indicates comparison. Since
    the verb conveys heating/burning, English idiom is clearer with the implicit sense
    made explicit: ''as hot as an oven.'''
- source_word: נִכְמָרוּ
  chosen: is as hot
  alternatives:
  - is scorched
  - glows
  - burns
  - is blackened
  lexicon: HALOT
  rationale: The Niphal of כמר is rare and context-sensitive. Here, with 'skin' and
    'oven' plus the causal phrase about famine, the sense is that the skin has become
    heated/scorched from feverish starvation. Because English requires a natural predicate
    with singular collective 'skin,' 'is as hot' best captures the resulting state
    without overcommitting to discoloration alone.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from
  - before
  - due to
  lexicon: HALOT
  rationale: In this context מִפְּנֵי introduces cause rather than spatial relation,
    so 'because of' is the clearest idiomatic rendering.
- source_word: זַלְעֲפוֹת
  chosen: burning fever
  alternatives:
  - burning heat
  - terrors
  - blasts
  lexicon: HALOT
  rationale: זַלְעָפוֹת can denote burning heat or feverish burning, and in connection
    with famine likely refers to the consuming, fever-like effects of starvation.
    'Burning fever' preserves the intensity and bodily focus better than the more
    generic 'heat.'
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  - starvation
  lexicon: HALOT
  rationale: רָעָב commonly means 'famine' but can shade into 'hunger/starvation.'
    Here it refers to the disastrous condition producing bodily wasting, so 'famine'
    keeps the broader calamity in view while fitting the lament context.
