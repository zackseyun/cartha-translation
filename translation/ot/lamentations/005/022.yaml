id: LAM.5.22
reference: Lamentations 5:22
source:
  edition: WLC
  text: כִּ֚י אִם מָאֹ֣ס מְאַסְתָּ֔/נוּ קָצַ֥פְתָּ עָלֵ֖י/נוּ עַד מְאֹֽד־־׃
translation:
  text: unless you have utterly rejected us and are exceedingly angry with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For if you have utterly rejected us and are very angry with us,' taking
      the line as a more standalone statement rather than an exception to the plea
      in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Literally, 'are angry against us' or 'upon us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - but if
  - unless indeed
  - for if
  lexicon: HALOT
  rationale: The collocation כִּי אִם here functions idiomatically to introduce an
    exception or limiting clause after the plea of v. 21, best rendered 'unless' in
    natural English. More literal options like 'for if' are possible but less idiomatic
    in context.
- source_word: מָאֹס מְאַסְתָּנוּ
  chosen: you have utterly rejected us
  alternatives:
  - you have surely rejected us
  - you have completely despised us
  - you have indeed rejected us
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of the same root intensifies
    the verbal idea. 'Utterly rejected' captures both the root sense מאס ('reject/despise')
    and the emphatic construction without sounding wooden. 'Despised' is lexically
    possible but 'rejected' better fits the covenantal lament context.
- source_word: קָצַפְתָּ
  chosen: are angry
  alternatives:
  - were angry
  - are wrathful
  - have been angry
  lexicon: HALOT
  rationale: The qatal can be rendered with English present perfective/resultative
    force in context, but because the clause describes God's standing disposition
    toward the people at the poem's close, present 'are angry' reads naturally in
    English. 'Wrathful' is too elevated for the translation philosophy.
- source_word: עָלֵינוּ
  chosen: with us
  alternatives:
  - against us
  - upon us
  lexicon: HALOT
  rationale: Although על often literally means 'upon' and with anger can imply hostility
    'against,' English idiom prefers 'angry with us.' This preserves the sense without
    awkwardness. 'Against us' is a viable alternative and worth preserving in a footnote.
- source_word: עַד מְאֹד
  chosen: exceedingly
  alternatives:
  - very much
  - beyond measure
  - greatly
  lexicon: HALOT
  rationale: The phrase intensifies the anger strongly. 'Exceedingly' conveys the
    elevated poetic force in readable modern English. 'Very much' is too flat; 'beyond
    measure' is interpretive.
