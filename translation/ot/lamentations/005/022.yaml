theological_decisions:
- issue: Whether the verse is rendered as a statement or as an exception to the preceding
    petition
  chosen_reading: 'An exception clause: ''unless you have utterly rejected us...,''
    continuing the thought of v. 21'
  alternative_readings:
  - 'A standalone assertion: ''For you have utterly rejected us...'''
  rationale: 'The Hebrew כִּי אִם naturally supports an exceptive sense, and in context
    this preserves the tension of the book''s ending: a plea for restoration that
    remains open-ended unless God has finally rejected his people. This avoids over-resolving
    the lament while following the plain syntax.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
