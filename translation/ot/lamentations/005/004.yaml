id: LAM.5.4
reference: Lamentations 5:4
source:
  edition: WLC
  text: מֵימֵ֨י/נוּ֙ בְּ/כֶ֣סֶף שָׁתִ֔ינוּ עֵצֵ֖י/נוּ בִּ/מְחִ֥יר יָבֹֽאוּ׃
translation:
  text: We drink our water for silver; our wood comes at a price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We drink our water with money.' The Hebrew says 'for/with silver,' using
      'silver' as the medium of payment.
    reason: lexical_alternative
  - marker: b
    text: Or 'our wood is brought for a price.' The Hebrew verb is plural ('they come'),
      but English commonly smooths this with the mass noun 'wood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵימֵינוּ
  chosen: our water
  alternatives:
  - the water that is ours
  - our own water
  lexicon: HALOT
  rationale: 'The construct with 1cp suffix literally means ''our waters,'' but English
    idiom prefers the mass noun singular ''our water.'' The possessive force is important
    in context: they must pay even for what should be their own supply.'
- source_word: בְּכֶסֶף
  chosen: for silver
  alternatives:
  - with money
  - for money
  lexicon: HALOT
  rationale: Literally 'with/for silver.' 'For silver' preserves the concrete economic
    language and the sense of payment, while remaining natural English. It also avoids
    over-specifying coined currency where the Hebrew simply says 'silver.'
- source_word: שָׁתִינוּ
  chosen: we drink
  alternatives:
  - we have drunk
  - we drank
  lexicon: HALOT
  rationale: The qatal can be rendered as a present in this lament context to express
    ongoing condition rather than a single past event. English present best matches
    the complaint's vivid immediacy.
- source_word: עֵצֵינוּ
  chosen: our wood
  alternatives:
  - our firewood
  - our timber
  lexicon: HALOT
  rationale: The Hebrew is simply 'our wood.' 'Firewood' is a plausible contextual
    narrowing, but the source does not require it. 'Wood' keeps the wording broader
    and closer to the Hebrew while still making sense in context.
- source_word: בִּמְחִיר
  chosen: at a price
  alternatives:
  - for a price
  - for payment
  - at cost
  lexicon: HALOT
  rationale: This phrase conveys that the wood must be obtained by payment. 'At a
    price' is idiomatic and preserves the lament's emphasis on deprivation and exploitation.
- source_word: יָבֹאוּ
  chosen: comes
  alternatives:
  - is brought
  - must be brought
  - comes to us
  lexicon: HALOT
  rationale: 'The verb is 3mp ''they come,'' with ''our wood'' as the effective subject
    in sense. English idiom naturally uses singular agreement with the mass noun ''wood'':
    ''our wood comes.'' The idea is that it reaches them only through purchase. An
    explicit passive (''is brought'') is possible but less direct than the Hebrew.'
