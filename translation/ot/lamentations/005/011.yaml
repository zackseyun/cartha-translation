id: LAM.5.11
reference: Lamentations 5:11
source:
  edition: WLC
  text: נָשִׁים֙ בְּ/צִיּ֣וֹן עִנּ֔וּ בְּתֻלֹ֖ת בְּ/עָרֵ֥י יְהוּדָֽה׃
translation:
  text: Women in Zion were violated, virgins in the cities of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were raped.' The Hebrew verb can denote humiliation or affliction more
      broadly, but in this context of women and virgins it likely refers to sexual
      violation.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׁים
  chosen: Women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: The plural commonly means 'women' or 'wives' depending on context. Here
    the parallel with 'virgins' points to a broad category of female victims rather
    than specifically married women, so 'Women' is the best contextual rendering.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Zion' is the natural English rendering
    for the place where the abuse occurred.
- source_word: עִנּוּ
  chosen: were violated
  alternatives:
  - were raped
  - were humbled
  - were afflicted
  lexicon: HALOT
  rationale: From ענה in the Piel, this verb can denote humiliation or violation;
    in contexts involving women it commonly refers to sexual violation. 'Were violated'
    communicates the likely sense clearly and gravely while avoiding over-precision
    beyond what the verb itself states. 'Were raped' is a strong possible interpretation,
    but 'violated' better preserves the lexical breadth while still reflecting the
    context.
- source_word: בְּתֻלֹת
  chosen: virgins
  alternatives:
  - young women
  lexicon: HALOT
  rationale: The noun denotes virgins/maidens. 'Virgins' is the more direct lexical
    equivalent and preserves the social and sexual status highlighted by the Hebrew.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - in Judah's towns
  lexicon: HALOT
  rationale: The construct phrase literally means 'in the cities of Judah.' This is
    clear, natural English and preserves the geographic parallel with 'in Zion'.
