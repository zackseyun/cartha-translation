id: LAM.5.14
reference: Lamentations 5:14
source:
  edition: WLC
  text: זְקֵנִים֙ מִ/שַּׁ֣עַר שָׁבָ֔תוּ בַּחוּרִ֖ים מִ/נְּגִינָתָֽ/ם׃
translation:
  text: The elders have ceased from the gate, the young men from their music.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their playing' or 'from their song'; the Hebrew term can refer
      to musical performance, often instrumental.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְקֵנִים
  chosen: the elders
  alternatives:
  - old men
  lexicon: HALOT
  rationale: The plural noun denotes older men, but in this civic context it likely
    refers not merely to age but to community leaders/senior men. 'The elders' captures
    both age and social function better than the flatter 'old men.'
- source_word: מִשַּׁעַר
  chosen: from the gate
  alternatives:
  - at the gate
  - from the city gate
  lexicon: HALOT
  rationale: The preposition מִן with 'gate' is most naturally rendered 'from the
    gate,' indicating cessation/removal from their customary place. In context the
    gate is the public place of civic life and judgment, but this is conveyed without
    expanding the text.
- source_word: שָׁבָתוּ
  chosen: have ceased
  alternatives:
  - stopped
  - desisted
  lexicon: HALOT
  rationale: The verb from שׁבת means to cease/stop. 'Have ceased' preserves the solemn
    tone and works idiomatically with both clauses, avoiding an overly colloquial
    'stopped.'
- source_word: בַּחוּרִים
  chosen: the young men
  alternatives:
  - young men
  lexicon: HALOT
  rationale: The noun refers specifically to young men in the prime of youth. Including
    the article matches the Hebrew's definite sense in parallel with 'the elders.'
- source_word: מִנְּגִינָתָם
  chosen: from their music
  alternatives:
  - from their playing
  - from their song
  - from their instrumental music
  lexicon: HALOT
  rationale: נְגִינָה can denote music, especially instrumental music or playing.
    'From their music' is broad, natural English and preserves the poetic parallelism.
    More specific options like 'instrumental music' may over-specify beyond what the
    verse itself requires.
