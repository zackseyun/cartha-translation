id: LAM.5.18
reference: Lamentations 5:18
source:
  edition: WLC
  text: עַ֤ל הַר צִיּוֹן֙ שֶׁ/שָּׁמֵ֔ם שׁוּעָלִ֖ים הִלְּכוּ בֽ/וֹ־־׃פ
translation:
  text: because Mount Zion lies desolate, foxes walk on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jackals' for 'foxes'; the Hebrew term can be understood more broadly
      in some contexts, though 'foxes' is the default rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: because
  alternatives:
  - on account of
  - over
  - upon
  lexicon: HALOT
  rationale: Although עַל commonly means 'on/upon,' in context it introduces the cause
    for the preceding lament, so a causal rendering ('because') best reflects the
    verse's function in English while preserving the Hebrew sense.
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: HALOT
  rationale: Standard English rendering of the construct phrase; concise and natural
    while preserving the proper name.
- source_word: שֶׁשָּׁמֵם
  chosen: lies desolate
  alternatives:
  - is desolate
  - has become desolate
  - is devastated
  lexicon: HALOT
  rationale: The relative particle plus verb expresses the condition of Mount Zion.
    'Lies desolate' is idiomatic English that conveys the ongoing ruined state with
    appropriate lament tone.
- source_word: שׁוּעָלִים
  chosen: foxes
  alternatives:
  - jackals
  lexicon: HALOT
  rationale: The usual gloss is 'foxes.' Some contexts may suggest a broader canid
    reference, but 'foxes' remains the most direct and traditional rendering absent
    compelling contextual pressure otherwise.
- source_word: הִלְּכוּ
  chosen: walk
  alternatives:
  - prowl
  - roam
  - go about
  lexicon: HALOT
  rationale: The verb simply denotes movement about the ruined site. 'Walk' is the
    most straightforward rendering; more vivid options like 'prowl' add nuance not
    explicit in the Hebrew.
- source_word: בוֹ
  chosen: on it
  alternatives:
  - in it
  - through it
  lexicon: HALOT
  rationale: With Mount Zion as antecedent, English idiom favors 'on it' for movement
    upon a mountain. 'In it' would sound less natural for this referent.
