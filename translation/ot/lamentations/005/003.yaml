id: LAM.5.3
reference: Lamentations 5:3
source:
  edition: WLC
  text: יְתוֹמִ֤ים הָיִ֨ינוּ֙ אין אָ֔ב אִמֹּתֵ֖י/נוּ כְּ/אַלְמָנֽוֹת׃
translation:
  text: We have become orphans, without a father; our mothers are like widows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְתוֹמִים
  chosen: orphans
  alternatives:
  - fatherless
  lexicon: HALOT
  rationale: The noun denotes children deprived of a parent, often specifically of
    paternal protection in Hebrew usage. 'Orphans' is the most natural modern English
    rendering; 'fatherless' is a viable more formal alternative but less idiomatic
    here.
- source_word: הָיִינוּ
  chosen: have become
  alternatives:
  - were
  - have been
  lexicon: HALOT
  rationale: The qatal of היה can be rendered simply 'were,' but in this lament context
    it conveys a resultant state brought about by catastrophe. 'Have become' captures
    the sense of transition into this condition.
- source_word: אֵין אָב
  chosen: without a father
  alternatives:
  - there is no father
  - fatherless
  lexicon: HALOT
  rationale: The existential negative plus noun literally means 'there is no father.'
    In English, 'without a father' expresses the sense smoothly while preserving the
    paternal loss emphasized by the Hebrew.
- source_word: אִמֹּתֵינוּ
  chosen: our mothers
  lexicon: HALOT
  rationale: 'Straightforward possessive plural: ''our mothers.'''
- source_word: כְּאַלְמָנוֹת
  chosen: like widows
  alternatives:
  - as widows
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, not strict identification. 'Like widows'
    preserves the simile and avoids overstating the claim, which likely reflects social
    abandonment and vulnerability rather than necessarily the literal death of every
    husband.
