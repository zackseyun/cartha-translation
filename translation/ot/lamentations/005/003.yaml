theological_decisions:
- issue: Force of the comparison in 'our mothers are like widows'
  chosen_reading: Retain the simile 'like widows' rather than making them literal
    widows.
  alternative_readings:
  - our mothers are widows
  rationale: The Hebrew explicitly uses the comparative prefix כ ('like/as'). Preserving
    the simile maintains the lament's rhetorical force and avoids importing a stronger
    historical claim than the text states.
  doctrine_reference: Translation philosophy §1, §3
