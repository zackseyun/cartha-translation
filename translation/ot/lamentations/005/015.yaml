id: LAM.5.15
reference: Lamentations 5:15
source:
  edition: WLC
  text: שָׁבַת֙ מְשׂ֣וֹשׂ לִבֵּ֔/נוּ נֶהְפַּ֥ךְ לְ/אֵ֖בֶל מְחֹלֵֽ/נוּ׃
translation:
  text: The joy of our heart has ceased; our dancing has turned to mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our dance has turned to mourning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבַת
  chosen: has ceased
  alternatives:
  - has stopped
  - has come to an end
  lexicon: HALOT
  rationale: Qal perfect of שׁבת denotes cessation or stopping. 'Has ceased' is concise,
    natural English and preserves the stative/resultative sense in context.
- source_word: מְשׂוֹשׂ
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy or exultation. 'Joy' fits idiomatic English in the
    construct phrase 'joy of our heart' and matches the lament context without overexpansion.
- source_word: לִבֵּנוּ
  chosen: our heart
  alternatives:
  - our hearts
  lexicon: HALOT
  rationale: Hebrew uses the singular collective 'our heart.' Retaining singular preserves
    the source image and is acceptable English, especially in poetic context.
- source_word: נֶהְפַּךְ
  chosen: has turned
  alternatives:
  - is turned
  - has been changed
  lexicon: HALOT
  rationale: Niphal perfect of הפך here expresses a change of state. 'Has turned'
    is idiomatic with the following prepositional phrase and preserves the poetic
    movement from joy to grief.
- source_word: לְאֵבֶל
  chosen: to mourning
  alternatives:
  - into mourning
  - to grief
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially lamentation associated with bereavement
    or communal grief. 'To mourning' works naturally with 'has turned' and keeps the
    lament register.
- source_word: מְחֹלֵנוּ
  chosen: our dancing
  alternatives:
  - our dance
  lexicon: HALOT
  rationale: The noun refers to dancing, often in celebratory settings. 'Our dancing'
    better conveys the activity that has been transformed into mourning, fitting the
    poetic contrast.
