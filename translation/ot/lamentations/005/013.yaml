id: LAM.5.13
reference: Lamentations 5:13
source:
  edition: WLC
  text: בַּחוּרִים֙ טְח֣וֹן נָשָׂ֔אוּ וּ/נְעָרִ֖ים בָּ/עֵ֥ץ כָּשָֽׁלוּ׃
translation:
  text: Young men carry millstones, and boys stagger under wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Young men bear grinding work' or 'Young men carry a mill.' The Hebrew
      term טְחוֹן is associated with grinding and may refer either to the labor itself
      or to the grinding apparatus.
    reason: lexical_alternative
  - marker: b
    text: Literally 'stumble under the wood' or 'stumble at/with wood,' likely describing
      boys collapsing beneath loads of wood.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּרִים
  chosen: Young men
  alternatives:
  - young men in their prime
  - choice young men
  lexicon: HALOT
  rationale: Refers to young adult males, likely those in the strength of youth. 'Young
    men' is natural modern English and preserves the social force of the term without
    overinterpreting.
- source_word: טְחוֹן
  chosen: millstones
  alternatives:
  - grinding work
  - mill
  lexicon: HALOT
  rationale: From the noun related to grinding; in context with 'carry' it most naturally
    refers to the burden associated with grinding, likely millstones rather than the
    abstract act of grinding. This fits the image of forced labor and heavy loads
    in the lament.
- source_word: נָשָׂאוּ
  chosen: carry
  alternatives:
  - bear
  - lifted
  lexicon: HALOT
  rationale: Common verb 'to lift/carry/bear.' 'Carry' best fits the concrete burden
    imagery in idiomatic English.
- source_word: וּנְעָרִים
  chosen: and boys
  alternatives:
  - and youths
  - and young men
  lexicon: HALOT
  rationale: Distinct from the previous term; 'boys' preserves the likely younger
    age and heightens the pathos of the verse. 'Youths' is possible but less vivid
    in contemporary English.
- source_word: בָּעֵץ
  chosen: under wood
  alternatives:
  - under timber
  - with wood
  - at the wood
  lexicon: HALOT
  rationale: The preposition with 'wood' here conveys being burdened by a load of
    wood. 'Under wood' is concise and preserves the physical image of collapsing beneath
    a load, rather than smoothing it into a more interpretive paraphrase.
- source_word: כָּשָׁלוּ
  chosen: stagger
  alternatives:
  - stumble
  - collapse
  lexicon: HALOT
  rationale: The verb denotes stumbling or faltering. 'Stagger' communicates ongoing
    physical weakness under a burden and fits the poetic lament well; 'collapse' would
    overstate the action.
