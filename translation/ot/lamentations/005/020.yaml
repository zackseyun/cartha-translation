id: LAM.5.20
reference: Lamentations 5:20
source:
  edition: WLC
  text: לָ֤/מָּה לָ/נֶ֨צַח֙ תִּשְׁכָּחֵ֔/נוּ תַּֽעַזְבֵ֖/נוּ לְ/אֹ֥רֶךְ יָמִֽים׃
translation:
  text: Why do you forget us forever? Why do you abandon us for so many days?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for length of days,' an idiom meaning 'for a long time'
      or 'for many days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  lexicon: HALOT
  rationale: Interrogative adverb introducing a lament question; straightforwardly
    rendered as 'Why'.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for perpetuity
  - for ever
  lexicon: HALOT
  rationale: נֶצַח with prefixed ל expresses enduring duration. 'Forever' is idiomatic
    modern English and fits the lament's rhetorical force better than more wooden
    alternatives.
- source_word: תִּשְׁכָּחֵנוּ
  chosen: do you forget us
  alternatives:
  - will you forget us
  lexicon: HALOT
  rationale: Qal imperfect 2ms + 1cp object from שׁכח. In context of direct lament
    prayer, English present 'do you forget us' best conveys the ongoing complaint,
    though a future nuance is possible.
- source_word: תַּעַזְבֵנוּ
  chosen: do you abandon us
  alternatives:
  - will you forsake us
  - do you forsake us
  - will you abandon us
  lexicon: HALOT
  rationale: עזב commonly means 'leave, forsake, abandon.' 'Abandon' is clear modern
    English and preserves the emotional severity. 'Forsake' is traditional but less
    natural for the target register.
- source_word: לְאֹרֶךְ יָמִים
  chosen: for so many days
  alternatives:
  - for length of days
  - for a long time
  - for many days
  lexicon: HALOT
  rationale: Literally 'for length of days,' an idiom for prolonged duration. 'For
    so many days' preserves the concrete imagery of days while sounding natural in
    English and matching the complaint's tone.
