id: LAM.5.17
reference: Lamentations 5:17
source:
  edition: WLC
  text: עַל זֶ֗ה הָיָ֤ה דָוֶה֙ לִבֵּ֔/נוּ עַל אֵ֖לֶּה חָשְׁכ֥וּ עֵינֵֽי/נוּ־־׃
translation:
  text: Because of this our heart has become sick; because of these things our eyes
    have grown dim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For this our heart was faint; for these things our eyes were darkened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֶה
  chosen: Because of this
  alternatives:
  - For this
  - On account of this
  lexicon: HALOT
  rationale: עַל with the demonstrative זֶה introduces cause or basis here, not spatial
    relation. 'Because of this' gives clear causal force in natural English.
- source_word: הָיָה
  chosen: has become
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: The qatal of היה with the predicate adjective דָוֶה expresses a resulting
    state. Present perfect English ('has become') captures the present condition arising
    from prior events better than simple past.
- source_word: דָוֶה
  chosen: sick
  alternatives:
  - faint
  - weak
  - grieved
  lexicon: HALOT
  rationale: דָוֶה denotes being ill, faint, or languishing. With 'heart' as subject,
    'sick' preserves the bodily-metaphorical force without overinterpreting it as
    merely emotional sorrow.
- source_word: לִבֵּנוּ
  chosen: our heart
  alternatives:
  - our mind
  - our inner being
  lexicon: HALOT
  rationale: לֵב commonly denotes the inner person, but 'heart' is the standard and
    sufficiently transparent English equivalent here, preserving the Hebrew imagery.
- source_word: עַל אֵלֶּה
  chosen: because of these things
  alternatives:
  - for these
  - because of these
  lexicon: HALOT
  rationale: The repeated עַל again marks cause. Adding 'things' makes the plural
    demonstrative idiomatic in English while retaining the reference to the preceding
    calamities.
- source_word: חָשְׁכוּ
  chosen: have grown dim
  alternatives:
  - are darkened
  - have become dark
  - have failed
  lexicon: HALOT
  rationale: The verb literally means 'became dark.' With 'eyes' as subject in lament
    language, 'have grown dim' is idiomatic English that preserves the image of failing
    sight from grief or exhaustion.
- source_word: עֵינֵינוּ
  chosen: our eyes
  lexicon: HALOT
  rationale: Literal rendering best preserves the poetic bodily imagery of lament.
