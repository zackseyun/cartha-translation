theological_decisions:
- issue: Rendering the two divine designations in one verse
  chosen_reading: יְהוָה rendered 'Yahweh'; אֲדֹנָי rendered 'the Lord'
  alternative_readings:
  - Render both simply as 'Lord'
  - Render יְהוָה as 'Yahweh'
  rationale: The Hebrew intentionally uses two different divine forms. Preserving the distinction in English reflects the source text and aligns with the project's default treatment of YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
