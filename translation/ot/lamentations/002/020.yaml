id: LAM.2.20
reference: Lamentations 2:20
source:
  edition: WLC
  text: רְאֵ֤ה יְהוָה֙ וְֽ/הַבִּ֔יטָ/ה לְ/מִ֖י עוֹלַ֣לְתָּ כֹּ֑ה אִם תֹּאכַ֨לְנָה נָשִׁ֤ים פִּרְיָ/ם֙ עֹלֲלֵ֣י טִפֻּחִ֔ים אִם יֵהָרֵ֛ג בְּ/מִקְדַּ֥שׁ אֲדֹנָ֖/י כֹּהֵ֥ן וְ/נָבִֽיא־־׃ס
translation:
  text: Look, O Yahweh, and see—to whom have you done this? Should women eat their offspring, the children they have cared for? Should priest and prophet be killed in the sanctuary of the Lord?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their fruit,' that is, their own offspring.
    reason: lexical_alternative
  - marker: b
    text: Or 'their pampered children' / 'the little ones they have dandled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: Look
  alternatives:
  - See
  lexicon: HALOT
  rationale: Imperative of ראה opening a lament appeal. 'Look' gives the force of urgent petition in natural English; the following הַבִּיטָה is then rendered separately as 'see' to preserve the paired verbs.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהַבִּיטָה
  chosen: and see
  alternatives:
  - and behold
  - and look
  lexicon: HALOT
  rationale: Second imperative intensifies the plea. 'And see' preserves the parallelism with readable modern English; 'behold' would sound archaic.
- source_word: לְמִי
  chosen: to whom
  alternatives:
  - against whom
  - for whom
  lexicon: HALOT
  rationale: 'The preposition plus interrogative asks the object/recipient of the action: ''to whom have you done this?'' This best fits the lament''s protest.'
- source_word: עוֹלַלְתָּ
  chosen: have you done
  alternatives:
  - have you dealt
  - have you treated
  lexicon: HALOT
  rationale: The verb here carries the sense of dealing severely or acting against someone. 'Have you done' is concise and idiomatic in the fixed expression 'done this,' while the harmful sense is supplied by context.
- source_word: כֹּה
  chosen: this
  alternatives:
  - thus
  - such a thing
  lexicon: HALOT
  rationale: In context the adverb points to the shocking calamity just described. English idiom prefers 'done this' rather than 'done thus.'
- source_word: אִם ... תֹּאכַלְנָה
  chosen: Should ... eat
  alternatives:
  - Will ... eat
  - If ... eat
  lexicon: HALOT
  rationale: The particle introduces a horrified rhetorical question, not a conditional clause. 'Should women eat...?' best conveys the lament's moral shock.
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: Generic adult females are in view, specifically mothers in the siege context; 'women' is the broad and natural rendering.
- source_word: פִּרְיָם
  chosen: their own fruit
  alternatives:
  - their fruit
  - their offspring
  lexicon: HALOT
  rationale: Literally 'their fruit,' an idiom for offspring. Retaining 'fruit' preserves the Hebrew imagery, while 'their own' clarifies the possessive in English.
- source_word: עֹלֲלֵי טִפֻּחִים
  chosen: the children they have cared for
  alternatives:
  - their little ones
  - their pampered children
  - the infants they have dandled
  lexicon: HALOT
  rationale: The phrase refers to little children tenderly cared for or dandled. A fully literal rendering would be obscure in modern English; this wording preserves both the child reference and the nuance of tender nurture.
- source_word: אִם יֵהָרֵג
  chosen: Should ... be killed
  alternatives:
  - Should ... be slain
  - Will ... be killed
  lexicon: HALOT
  rationale: Again a rhetorical question expressing horror. Passive 'be killed' is clear modern English; 'slain' is more traditional but less current.
- source_word: בְּמִקְדַּשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the temple sanctuary
  lexicon: HALOT
  rationale: מקדש denotes the holy sanctuary. 'Sanctuary' is the most direct and idiomatic rendering here.
- source_word: אֲדֹנָי
  chosen: of the Lord
  alternatives:
  - of the Lord GOD
  lexicon: HALOT
  rationale: Here אֲדֹנָי is the divine title, not the Tetragrammaton. It is therefore rendered 'the Lord,' distinguished from the earlier covenant name rendered 'the LORD.'
- source_word: כֹּהֵן וְנָבִיא
  chosen: priest and prophet
  alternatives:
  - a priest and a prophet
  lexicon: HALOT
  rationale: The singular nouns function collectively/representatively. English idiom naturally renders them without the indefinite article in this rhetorical pairing.
