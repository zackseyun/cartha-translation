id: LAM.2.15
reference: Lamentations 2:15
source:
  edition: WLC
  text: סָֽפְק֨וּ עָלַ֤יִ/ךְ כַּפַּ֨יִם֙ כָּל עֹ֣בְרֵי דֶ֔רֶךְ שָֽׁרְקוּ֙ וַ/יָּנִ֣עוּ
    רֹאשָׁ֔/ם עַל בַּ֖ת יְרוּשָׁלִָ֑ם הֲ/זֹ֣את הָ/עִ֗יר שֶׁ/יֹּֽאמְרוּ֙ כְּלִ֣ילַת
    יֹ֔פִי מָשׂ֖וֹשׂ לְ/כָל הָ/אָֽרֶץ־־־׃ס
translation:
  text: 'All who pass along the road clap their hands at you; they hiss and shake
    their heads over daughter Jerusalem: “Is this the city that they called the perfection
    of beauty, the joy of all the earth?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whistle'; the Hebrew verb can denote a sharp sound of derision, whether
      rendered 'hiss' or 'whistle.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter Jerusalem,' a poetic personification of the city.
    reason: cultural_note
  - marker: c
    text: Or 'perfect in beauty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סָפְקוּ ... כַּפַּיִם
  chosen: clap their hands
  alternatives:
  - strike their hands
  - smite the hands together
  lexicon: HALOT
  rationale: The idiom with כף commonly denotes clapping/striking the hands, here
    as a gesture of derision by passersby. 'Clap their hands' is natural modern English
    and preserves the hostile gesture in context.
- source_word: עָלַיִךְ
  chosen: at you
  alternatives:
  - over you
  - against you
  lexicon: HALOT
  rationale: With gestures of mockery, על conveys direction toward the object of scorn.
    'At you' best fits English idiom with 'clap their hands' and keeps the adversative
    sense.
- source_word: כָּל עֹבְרֵי דֶרֶךְ
  chosen: all who pass along the road
  alternatives:
  - all who pass by
  - all passersby on the way
  lexicon: HALOT
  rationale: The phrase refers to travelers passing by. 'Pass along the road' is slightly
    fuller than 'pass by' and reflects דרך explicitly without sounding wooden.
- source_word: שָׁרְקוּ
  chosen: hiss
  alternatives:
  - whistle
  - jeer with a whistle
  lexicon: HALOT
  rationale: The verb can denote whistling or hissing; in judgment/mockery contexts,
    'hiss' better communicates contempt to modern readers.
- source_word: וַיָּנִעוּ רֹאשָׁם
  chosen: shake their heads
  alternatives:
  - wag their heads
  lexicon: HALOT
  rationale: This is a conventional gesture of scorn or astonishment. 'Shake their
    heads' is idiomatic modern English; 'wag their heads' is more traditional but
    less current.
- source_word: עַל בַּת יְרוּשָׁלָם
  chosen: over daughter Jerusalem
  alternatives:
  - at daughter Jerusalem
  - over the daughter of Jerusalem
  lexicon: HALOT
  rationale: The construct 'daughter Jerusalem' personifies the city. Retaining 'daughter'
    preserves the poetic personification; 'over' fits the gesture and lament context.
- source_word: הֲזֹאת הָעִיר
  chosen: Is this the city
  alternatives:
  - Is this that city
  lexicon: HALOT
  rationale: A rhetorical question expressing scorn. 'Is this the city' is direct
    and natural.
- source_word: שֶׁיֹּאמְרוּ
  chosen: that they called
  alternatives:
  - of which they said
  - that people used to call
  lexicon: HALOT
  rationale: The imperfect in this relative clause points to what people characteristically
    said of Jerusalem. English simple past 'called' communicates the remembered reputation
    succinctly.
- source_word: כְּלִילַת יֹפִי
  chosen: the perfection of beauty
  alternatives:
  - perfect in beauty
  - the crown of beauty
  - the consummation of beauty
  lexicon: HALOT
  rationale: The phrase denotes completeness/perfection in beauty. 'The perfection
    of beauty' preserves the nominal style and echoes the city's former renown without
    over-paraphrase.
- source_word: מָשׂוֹשׂ לְכָל הָאָרֶץ
  chosen: the joy of all the earth
  alternatives:
  - a joy to all the earth
  - the delight of the whole earth
  lexicon: HALOT
  rationale: A set phrase for widespread delight. 'The joy of all the earth' is idiomatic,
    concise, and preserves the superlative scope.
