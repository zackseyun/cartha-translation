theological_decisions:
- issue: Metaphorical language for divine judgment
  chosen_reading: Retain the metaphors 'horn,' 'right hand,' and fire imagery rather
    than interpret them away.
  alternative_readings:
  - Replace 'horn' with 'strength' in the main text
  - Replace 'right hand' with 'power' in the main text
  rationale: The verse communicates divine judgment through layered metaphors of strength
    removed, protection withdrawn, and consuming fire. Preserving these images maintains
    the literary and theological force of the Hebrew while remaining understandable
    in English.
  doctrine_reference: Translation philosophy §§1, 3, 5
