id: LAM.2.3
reference: Lamentations 2:3
source:
  edition: WLC
  text: גָּדַ֣ע בָּֽ/חֳרִי אַ֗ף כֹּ֚ל קֶ֣רֶן יִשְׂרָאֵ֔ל הֵשִׁ֥יב אָח֛וֹר יְמִינ֖/וֹ
    מִ/פְּנֵ֣י אוֹיֵ֑ב וַ/יִּבְעַ֤ר בְּ/יַעֲקֹב֙ כְּ/אֵ֣שׁ לֶֽהָבָ֔ה אָכְלָ֖ה סָבִֽיב׃ס
translation:
  text: In burning anger he has cut down every horn of Israel; he has drawn back his
    right hand from before the enemy, and he has burned in Jacob like a flaming fire
    that devours all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Horn'' is a Hebrew metaphor for strength or power.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he has withdrawn his right hand before the enemy.' The image is of God
      pulling back his power or protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדַע
  chosen: has cut down
  alternatives:
  - has cut off
  - has hewn down
  lexicon: HALOT
  rationale: The verb denotes cutting off/down, often violently. 'Cut down' is idiomatic
    in English and preserves the destructive force without sounding overly wooden.
- source_word: בָּחֳרִי אַף
  chosen: in burning anger
  alternatives:
  - in fierce anger
  - in the heat of anger
  lexicon: HALOT
  rationale: The phrase combines חֳרִי ('burning, heat') with אַף ('anger'). 'Burning
    anger' preserves the fire imagery that continues later in the verse.
- source_word: כָּל קֶרֶן יִשְׂרָאֵל
  chosen: every horn of Israel
  alternatives:
  - all the strength of Israel
  - every might of Israel
  lexicon: HALOT
  rationale: '''Horn'' is a common Hebrew metaphor for strength, power, or exaltation.
    The metaphor is retained in the main text for transparency to the source, while
    its sense could be explained by readers from context.'
- source_word: הֵשִׁיב אָחוֹר יְמִינוֹ
  chosen: he has drawn back his right hand
  alternatives:
  - he has turned back his right hand
  - he has withdrawn his right hand
  lexicon: HALOT
  rationale: The idiom depicts withdrawal of power/protection. 'Drawn back' is natural
    English and preserves the image of deliberate retraction.
- source_word: מִפְּנֵי אוֹיֵב
  chosen: from before the enemy
  alternatives:
  - in the face of the enemy
  - before the enemy
  lexicon: HALOT
  rationale: The preposition with פָּנִים is literally 'from before.' This likely
    means withdrawing his hand in the enemy's presence. The more literal phrasing
    is retained because it is intelligible in English.
- source_word: וַיִּבְעַר בְּיַעֲקֹב
  chosen: he has burned in Jacob
  alternatives:
  - he has kindled against Jacob
  - he burned against Jacob
  lexicon: HALOT
  rationale: בער can mean burn/kindle. With בְּ plus Jacob, the sense is that destructive
    fire is active within Jacob. 'Burned in Jacob' best fits the following simile
    of consuming fire.
- source_word: כְּאֵשׁ לֶהָבָה
  chosen: like a flaming fire
  alternatives:
  - like a blaze of fire
  - like a fire of flame
  lexicon: HALOT
  rationale: The phrase intensifies the image. 'Flaming fire' is idiomatic and preserves
    the emphatic pairing of fire and flame.
- source_word: אָכְלָה סָבִיב
  chosen: that devours all around
  alternatives:
  - consuming all around
  - which has consumed round about
  lexicon: HALOT
  rationale: The feminine singular verb agrees with the fire image. 'Devours all around'
    is vivid, natural English and conveys the comprehensive destruction implied by
    סָבִיב.
