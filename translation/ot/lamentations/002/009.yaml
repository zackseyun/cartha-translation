theological_decisions:
- issue: Implicit subject of the singular verbs אִבַּד and וְשִׁבַּר
  chosen_reading: Leave the subject implicit in English as 'he' rather than specifying
    'the LORD.'
  alternative_readings:
  - Specify 'the LORD has destroyed and broken'
  rationale: The Hebrew uses third-person singular verbs without an explicit subject
    in this clause. Context strongly points to the LORD as the actor, but preserving
    the pronoun keeps closer to the source while allowing the context to supply the
    referent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of תּוֹרָה in this context
  chosen_reading: Render as 'law' in the main text.
  alternative_readings:
  - instruction
  - Torah
  rationale: In this lament over Jerusalem's collapse, תּוֹרָה likely evokes the absence
    of covenantal order and authoritative divine/legal instruction. 'Law' is the most
    concise main-text rendering, while the broader sense 'instruction' is preserved
    in a footnote.
  doctrine_reference: Consistency of key terms, or documented exception.
