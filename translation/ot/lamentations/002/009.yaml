id: LAM.2.9
reference: Lamentations 2:9
source:
  edition: WLC
  text: טָבְע֤וּ בָ/אָ֨רֶץ֙ שְׁעָרֶ֔י/הָ אִבַּ֥ד וְ/שִׁבַּ֖ר בְּרִיחֶ֑י/הָ מַלְכָּ֨/הּ
    וְ/שָׂרֶ֤י/הָ בַ/גּוֹיִם֙ אֵ֣ין תּוֹרָ֔ה גַּם נְבִיאֶ֕י/הָ לֹא מָצְא֥וּ חָז֖וֹן
    מֵ/יְהוָֽה־־׃ס
translation:
  text: Her gates have sunk into the earth; he has destroyed and broken her bars.
    Her king and her princes are among the nations; there is no law. Even her prophets
    have found no vision from the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no instruction'; Hebrew torah can denote law, instruction,
      or teaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָבְעוּ
  chosen: have sunk
  alternatives:
  - have sunk down
  - have been submerged
  lexicon: HALOT
  rationale: The verb denotes sinking or being driven down. 'Have sunk' is natural
    English and preserves the image of the city's gates collapsing into the ground.
- source_word: בָאָרֶץ
  chosen: into the earth
  alternatives:
  - into the ground
  - in the earth
  lexicon: HALOT
  rationale: 'With the verb ''sink,'' the prepositional phrase is best rendered dynamically
    as motion/result: ''into the earth.'' ''Ground'' is possible, but ''earth'' preserves
    the poetic gravity.'
- source_word: שְׁעָרֶיהָ
  chosen: her gates
  lexicon: HALOT
  rationale: Standard rendering for city gates; the feminine suffix refers to the
    city, personified as 'her.'
- source_word: אִבַּד
  chosen: has destroyed
  alternatives:
  - has ruined
  - has made perish
  lexicon: HALOT
  rationale: The singular verb has an implicit subject, contextually the LORD from
    the surrounding lament. 'Has destroyed' is idiomatic and strong without overinterpreting.
- source_word: וְשִׁבַּר
  chosen: and broken
  alternatives:
  - and shattered
  lexicon: HALOT
  rationale: Pairs naturally with 'destroyed' and keeps the concrete image of smashed
    gate-bars.
- source_word: בְּרִיחֶיהָ
  chosen: her bars
  alternatives:
  - her gate-bars
  - her bolts
  lexicon: HALOT
  rationale: Refers to the bars/bolts securing the gates. 'Bars' is concise and idiomatic;
    'gate-bars' is more explicit but less smooth.
- source_word: מַלְכָּהּ וְשָׂרֶיהָ
  chosen: Her king and her princes
  alternatives:
  - Her king and her officials
  - Her king and her leaders
  lexicon: HALOT
  rationale: '''Princes'' preserves the political/noble sense of שָׂרִים better than
    the flatter ''officials'' or broader ''leaders.'''
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in exile among the nations
  lexicon: HALOT
  rationale: '''Nations'' is the standard rendering of גוים in the Hebrew Bible. ''Gentiles''
    would sound overly NT-shaped here, and ''in exile'' is interpretive though contextually
    true.'
- source_word: אֵין תּוֹרָה
  chosen: there is no law
  alternatives:
  - there is no instruction
  - there is no Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean law or instruction. Here the collapse of ordered covenant
    life and governance is in view; 'law' is concise and fits the lament. The broader
    sense 'instruction' remains possible and is preserved in a footnote.
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  lexicon: HALOT
  rationale: '''Even'' conveys the climactic force: not only political collapse, but
    prophetic silence as well.'
- source_word: נְבִיאֶיהָ
  chosen: her prophets
  lexicon: HALOT
  rationale: Straightforward rendering with the feminine suffix referring to the city.
- source_word: לֹא מָצְאוּ
  chosen: have found no
  alternatives:
  - did not find
  lexicon: HALOT
  rationale: Present perfect in English fits the lament's present state resulting
    from past devastation.
- source_word: חָזוֹן
  chosen: vision
  alternatives:
  - revelation
  - prophetic vision
  lexicon: HALOT
  rationale: '''Vision'' is the standard prophetic term and preserves the connection
    to prophetic revelation without overexpansion.'
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The preposition indicates
    source: no prophetic vision is coming from him.'
