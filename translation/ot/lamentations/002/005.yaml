theological_decisions:
- issue: Whether to render the comparison as identity ('the Lord was an enemy') or
    simile ('the Lord became like an enemy')
  chosen_reading: The Lord became like an enemy
  alternative_readings:
  - The Lord was like an enemy
  - The Lord was an enemy
  rationale: The Hebrew explicitly uses the comparative particle כ ('like/as'), so
    the translation should preserve the simile rather than collapse it into identity.
    This maintains the theological tension of divine judgment without overstating
    the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
