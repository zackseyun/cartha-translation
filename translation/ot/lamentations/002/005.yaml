id: LAM.2.5
reference: Lamentations 2:5
source:
  edition: WLC
  text: הָיָ֨ה אֲדֹנָ֤/י כְּ/אוֹיֵב֙ בִּלַּ֣ע יִשְׂרָאֵ֔ל בִּלַּע֙ כָּל אַרְמְנוֹתֶ֔י/הָ
    שִׁחֵ֖ת מִבְצָרָ֑י/ו וַ/יֶּ֨רֶב֙ בְּ/בַת יְהוּדָ֔ה תַּאֲנִיָּ֖ה וַ/אֲנִיָּֽה׀־־׃ס
translation:
  text: The Lord became like an enemy; he swallowed up Israel. He swallowed up all
    her palaces; he destroyed his strongholds, and he multiplied mourning and lamentation
    in Daughter Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his strongholds'; some translations smooth this to 'her strongholds'
      to match 'her palaces,' but the Masoretic Text reads a masculine singular suffix.
    reason: textual_variant
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Master
  lexicon: HALOT
  rationale: Rendered as the title 'The Lord' in keeping with standard English treatment
    of the divine title and the project's default for lordship language. Here it refers
    to God acting in judgment, not to a human master.
- source_word: הָיָה ... כְּאוֹיֵב
  chosen: became like an enemy
  alternatives:
  - was like an enemy
  - has become like an enemy
  lexicon: HALOT
  rationale: 'The qatal of היה with כ marks a state/comparison: ''became/was like
    an enemy.'' ''Became like'' preserves the sense of a change in posture in the
    lament context without asserting that the Lord is literally an enemy in essence.'
- source_word: אוֹיֵב
  chosen: enemy
  alternatives:
  - foe
  lexicon: HALOT
  rationale: Standard gloss; 'enemy' is the most natural and transparent English equivalent.
- source_word: בִּלַּע
  chosen: swallowed up
  alternatives:
  - devoured
  - consumed
  lexicon: HALOT
  rationale: The verb literally denotes swallowing, often metaphorically for total
    destruction. 'Swallowed up' preserves the vivid imagery and is idiomatic in English
    biblical style.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by transliteration.
- source_word: כָּל אַרְמְנוֹתֶיהָ
  chosen: all her palaces
  alternatives:
  - all her citadels
  - all her fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן commonly denotes palace or fortified palace/citadel. 'Palaces'
    fits the common sense and preserves the feminine suffix referring to the city/nation
    personified.
- source_word: שִׁחֵת
  chosen: destroyed
  alternatives:
  - ruined
  - laid waste
  lexicon: HALOT
  rationale: A standard rendering for the verb in contexts of devastation; clear and
    forceful in English.
- source_word: מִבְצָרָיו
  chosen: his strongholds
  alternatives:
  - his fortresses
  - its strongholds
  lexicon: HALOT
  rationale: מִבְצָר denotes fortified places/strongholds. The suffix is masculine
    singular in the MT, most naturally rendered 'his.' This creates a shift from 'her
    palaces' to 'his strongholds,' likely reflecting personified Israel/Judah or a
    collective singular. The translation preserves the Hebrew suffix rather than smoothing
    it away.
- source_word: וַיֶּרֶב
  chosen: he multiplied
  alternatives:
  - he increased
  - he made abundant
  lexicon: HALOT
  rationale: The hiphil/waw-consecutive form from רבה conveys causing increase. 'Multiplied'
    is concise and preserves the causative force.
- source_word: בְּבַת יְהוּדָה
  chosen: in Daughter Judah
  alternatives:
  - in the daughter of Judah
  - for Daughter Judah
  lexicon: HALOT
  rationale: The phrase is a personification of the people/city. 'Daughter Judah'
    preserves the poetic idiom better than flattening it to simply 'Judah'.
- source_word: תַּאֲנִיָּה וַאֲנִיָּה
  chosen: mourning and lamentation
  alternatives:
  - mourning and moaning
  - grief and sorrow
  lexicon: HALOT
  rationale: The paired nouns are near-synonyms intensifying grief. 'Mourning and
    lamentation' preserves the poetic doubling while remaining natural English.
