theological_decisions:
- issue: Rendering of אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - my Lord
  rationale: The form here is אֲדֹנָי, not the Tetragrammaton. Following the doctrine
    table's default for κύριος-type divine title language, 'the Lord' is the appropriate
    rendering without importing the covenant-name convention reserved for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος / YHWH'
