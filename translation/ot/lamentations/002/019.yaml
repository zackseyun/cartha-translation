id: LAM.2.19
reference: Lamentations 2:19
source:
  edition: WLC
  text: ק֣וּמִי רֹ֣נִּי ב/ליל לְ/רֹאשׁ֙ אַשְׁמֻר֔וֹת שִׁפְכִ֤י כַ/מַּ֨יִם֙ לִבֵּ֔/ךְ
    נֹ֖כַח פְּנֵ֣י אֲדֹנָ֑/י שְׂאִ֧י אֵלָ֣י/ו כַּפַּ֗יִ/ךְ עַל נֶ֨פֶשׁ֙ עֽוֹלָלַ֔יִ/ךְ
    הָ/עֲטוּפִ֥ים בְּ/רָעָ֖ב בְּ/רֹ֥אשׁ כָּל חוּצֽוֹת׀־־׃ס
translation:
  text: Rise, cry out in the night, at the beginning of the watches; pour out your
    heart like water before the face of the Lord. Lift up your hands to him for the
    lives of your little children, who are faint with hunger at the head of every
    street.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'at every street corner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּמִי
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: Imperative feminine singular from קום, addressed to personified daughter
    Zion/Jerusalem. 'Rise' is natural modern English and preserves the urgent summons.
- source_word: רֹ֣נִּי
  chosen: cry out
  alternatives:
  - cry aloud
  - wail
  - sing out
  lexicon: HALOT
  rationale: רן can denote ringing cry or lamenting outcry depending on context. In
    this lament setting, 'cry out' fits better than 'sing' and avoids implying joy.
- source_word: ב/ליל
  chosen: in the night
  alternatives:
  - by night
  - during the night
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in the night' is idiomatic and clear.
- source_word: לְ/רֹאשׁ אַשְׁמֻר֔וֹת
  chosen: at the beginning of the watches
  alternatives:
  - at the start of the night watches
  - at the head of the watches
  lexicon: HALOT
  rationale: רֹאשׁ here means 'beginning' and אַשְׁמֻרוֹת refers to the divisions
    of the night watch. The phrase points to repeated nighttime vigils; 'beginning
    of the watches' is close to the Hebrew while readable.
- source_word: שִׁפְכִ֤י
  chosen: pour out
  alternatives:
  - spill out
  lexicon: HALOT
  rationale: Common metaphor for intense emotional prayer or lament; 'pour out' is
    the established and accurate English equivalent.
- source_word: כַ/מַּ֨יִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: Retains the simile of unrestrained outpouring.
- source_word: לִבֵּ֔/ךְ
  chosen: your heart
  lexicon: HALOT
  rationale: Literal and idiomatic in English; refers to the inner self/emotions.
- source_word: נֹ֖כַח פְּנֵ֣י אֲדֹנָ֑/י
  chosen: before the face of the Lord
  alternatives:
  - before the Lord
  - in the presence of the Lord
  lexicon: HALOT
  rationale: נֹכַח plus פְּנֵי expresses direct presence. 'Before the face of the
    Lord' preserves the vivid Hebrew idiom; 'Lord' follows the doctrinal default for
    אֲדֹנָי/κύριος-type title language.
- source_word: שְׂאִ֧י
  chosen: Lift up
  alternatives:
  - raise
  lexicon: HALOT
  rationale: Imperative of נשׂא. 'Lift up' is the natural collocation with hands in
    prayer.
- source_word: אֵלָ֣י/ו
  chosen: to him
  alternatives:
  - toward him
  lexicon: HALOT
  rationale: Directional preposition with pronominal suffix; 'to him' is idiomatic
    in context of prayer.
- source_word: כַּפַּ֗יִ/ךְ
  chosen: your hands
  alternatives:
  - your palms
  lexicon: HALOT
  rationale: Dual form of 'palms/hands'; in prayer context English normally uses 'hands'.
- source_word: עַל נֶ֨פֶשׁ֙ עֽוֹלָלַ֔יִ/ךְ
  chosen: for the lives of your little children
  alternatives:
  - for the life of your little children
  - for your children's lives
  - for the souls of your little children
  lexicon: HALOT
  rationale: עַל here conveys intercession on behalf of. נֶפֶשׁ in this context refers
    to life rather than an abstract 'soul.' עוֹלָלִים denotes very young children;
    'little children' preserves the pathos.
- source_word: הָ/עֲטוּפִ֥ים
  chosen: who are faint
  alternatives:
  - who are languishing
  - who are swooning
  lexicon: HALOT
  rationale: Participle from עטף in contexts of collapse/exhaustion. 'Faint' is concise
    and natural; it captures physical weakening without overtranslation.
- source_word: בְּ/רָעָ֖ב
  chosen: with hunger
  alternatives:
  - from hunger
  - because of hunger
  lexicon: HALOT
  rationale: Beth marks circumstance/cause. 'With hunger' is idiomatic with 'faint'
    in English and reflects the Hebrew closely.
- source_word: בְּ/רֹ֥אשׁ כָּל חוּצֽוֹת
  chosen: at the head of every street
  alternatives:
  - at every street corner
  - at the entrance of every street
  lexicon: HALOT
  rationale: Literally 'at the head of all streets.' This likely refers to prominent
    street corners or openings. The main text keeps the Hebrew image; a footnote preserves
    the more idiomatic alternative.
