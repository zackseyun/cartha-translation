theological_decisions:
- issue: Referent of 'his footstool'
  chosen_reading: Kept as 'his footstool' without specifying the referent in the main
    text
  alternative_readings:
  - the temple
  - Zion/Jerusalem
  - the ark as symbolic throne-footstool
  rationale: The Hebrew expression is metaphorical and may point to the temple complex,
    Zion, or the ark by association. The verse itself does not force a single referent,
    so the translation preserves the image rather than resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
