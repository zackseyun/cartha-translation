id: LAM.2.1
reference: Lamentations 2:1
source:
  edition: WLC
  text: אֵיכָה֩ יָעִ֨יב בְּ/אַפּ֤/וֹ אֲדֹנָ/י֙ אֶת בַּת צִיּ֔וֹן הִשְׁלִ֤יךְ מִ/שָּׁמַ֨יִם֙
    אֶ֔רֶץ תִּפְאֶ֖רֶת יִשְׂרָאֵ֑ל וְ/לֹא זָכַ֥ר הֲדֹם רַגְלָ֖י/ו בְּ/י֥וֹם אַפּֽ/וֹ׀־־־־׃ס
translation:
  text: How the Lord in his anger has clouded over daughter Zion! He has cast from
    heaven to earth the beauty of Israel, and he did not remember his footstool in
    the day of his anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has darkened' or 'has covered with a cloud.' The Hebrew verb evokes
      the imagery of clouding over.
    reason: lexical_alternative
  - marker: b
    text: '''His footstool'' may refer to Zion, the temple, or the ark as the place
      associated with God''s earthly presence.'
    reason: alternative_reading
  - marker: c
    text: Or 'the glory of Israel' or 'the splendor of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  chosen: How
  alternatives:
  - Alas, how
  - How indeed
  lexicon: HALOT
  rationale: Introduces a lament/exclamation, not a request for information. 'How'
    preserves the poetic force familiar in Lamentations without over-paraphrasing
    into an interjection.
- source_word: יָעִיב
  chosen: has clouded over
  alternatives:
  - has darkened
  - has treated as an enemy
  - has covered with a cloud
  lexicon: HALOT
  rationale: The Hiphil of עוּב/עָבַב here evokes clouding or obscuring. 'Has clouded
    over' preserves the image and avoids importing the more interpretive 'treated
    as an enemy,' while still reading naturally in English.
- source_word: בְּאַפּוֹ
  chosen: in his anger
  alternatives:
  - in his wrath
  - in his nostrils/anger
  lexicon: HALOT
  rationale: אַפּ literally relates to nose/anger, but idiomatically means anger/wrath.
    'In his anger' is clear modern English and fits the poetic context.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: As a divine title, it is translated rather than transliterated, in keeping
    with the project's philosophy. The article in English is natural here after the
    exclamatory opening.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - the daughter of Zion
  - Daughter Zion
  lexicon: HALOT
  rationale: A personified city/people expression. 'Daughter Zion' preserves the Hebrew
    compactness and poetic personification better than the more expanded 'the daughter
    of Zion.'
- source_word: הִשְׁלִיךְ
  chosen: has cast
  alternatives:
  - has thrown down
  - has hurled
  lexicon: HALOT
  rationale: A strong verb of throwing/casting. 'Has cast' is forceful and idiomatic,
    and pairs well with the heaven-to-earth contrast.
- source_word: מִשָּׁמַיִם אֶרֶץ
  chosen: from heaven to earth
  alternatives:
  - from the heavens to the earth
  lexicon: HALOT
  rationale: The phrase marks a dramatic descent from exaltation to humiliation. Singular
    'heaven' and anarthrous 'earth' are idiomatic in English.
- source_word: תִּפְאֶרֶת יִשְׂרָאֵל
  chosen: the beauty of Israel
  alternatives:
  - the glory of Israel
  - the splendor of Israel
  lexicon: HALOT
  rationale: תפארת can mean beauty, glory, or splendor. 'Beauty' best fits the concrete-poetic
    register here while leaving open whether the referent is Jerusalem, the temple,
    or Israel's honored state.
- source_word: וְלֹא זָכַר
  chosen: and he did not remember
  alternatives:
  - and he did not call to mind
  - and he paid no regard to
  lexicon: HALOT
  rationale: '''Remember'' is the direct lexical equivalent and preserves the covenantal
    resonance of זכר. More interpretive renderings like ''paid no regard to'' are
    possible but less transparent.'
- source_word: הֲדֹם רַגְלָיו
  chosen: his footstool
  alternatives:
  - the footstool of his feet
  lexicon: HALOT
  rationale: An idiomatic expression for God's footstool, likely referring to Zion/temple.
    'His footstool' is the natural English equivalent.
- source_word: בְּיוֹם אַפּוֹ
  chosen: in the day of his anger
  alternatives:
  - on the day of his wrath
  lexicon: HALOT
  rationale: Retains the temporal phrase and repeats the anger motif. 'Day of his
    anger' preserves the Hebrew structure and solemnity.
