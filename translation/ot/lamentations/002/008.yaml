id: LAM.2.8
reference: Lamentations 2:8
source:
  edition: WLC
  text: חָשַׁ֨ב יְהוָ֤ה לְ/הַשְׁחִית֙ חוֹמַ֣ת בַּת צִיּ֔וֹן נָ֣טָה קָ֔ו לֹא הֵשִׁ֥יב
    יָד֖/וֹ מִ/בַּלֵּ֑עַ וַ/יַּֽאֲבֶל חֵ֥ל וְ/חוֹמָ֖ה יַחְדָּ֥ו אֻמְלָֽלוּ׀־־־׃ס
translation:
  text: The LORD determined to destroy the wall of daughter Zion; he stretched out
    a measuring line; he did not hold back his hand from swallowing up, and he made
    rampart and wall mourn; together they waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wall of the daughter of Zion.' The Hebrew personifies Zion/Jerusalem
      as a daughter.
    reason: lexical_alternative
  - marker: b
    text: Or 'he did not turn back his hand from consuming.' The Hebrew literally
      says 'from swallowing up,' a vivid image of total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׁב
  chosen: determined
  alternatives:
  - planned
  - purposed
  - devised
  lexicon: HALOT
  rationale: In context the verb expresses deliberate intention by the LORD regarding
    judgment. 'Determined' conveys settled purpose more naturally in English than
    the more neutral 'thought' while staying close to the Hebrew sense.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: לְהַשְׁחִית
  chosen: to destroy
  alternatives:
  - to ruin
  - to bring to ruin
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׁחת here denotes active destruction in judgment.
    'Destroy' is the most direct and idiomatic rendering.
- source_word: חוֹמַת בַּת צִיּוֹן
  chosen: the wall of daughter Zion
  alternatives:
  - the wall of the daughter of Zion
  - daughter Zion's wall
  lexicon: HALOT
  rationale: The construct chain is preserved with the personified city expression
    'daughter Zion.' This keeps the poetic personification without over-paraphrasing
    to simply 'Jerusalem.'
- source_word: נָטָה קָו
  chosen: stretched out a measuring line
  alternatives:
  - extended a line
  - stretched out the line
  lexicon: HALOT
  rationale: The idiom refers to measured, deliberate action, often in construction
    or destruction contexts. 'Measuring line' makes the image explicit for modern
    readers.
- source_word: לֹא הֵשִׁיב יָדוֹ מִבַּלֵּעַ
  chosen: he did not hold back his hand from swallowing up
  alternatives:
  - he did not turn back his hand from consuming
  - he did not withdraw his hand from devouring
  lexicon: HALOT
  rationale: The idiom 'turn back the hand' means to refrain or hold back. The infinitive
    בלע carries the vivid image of engulfing or consuming destruction; 'swallowing
    up' preserves that metaphor better than the flatter 'destroying.'
- source_word: וַיַּאֲבֶל
  chosen: he made ... mourn
  alternatives:
  - and ... mourned
  - he caused ... to lament
  lexicon: HALOT
  rationale: 'The singular verb followed by two singular nouns is best taken causatively
    in sense: the LORD''s action causes the fortification structures to mourn. English
    supplies ''he made'' for clarity.'
- source_word: חֵל
  chosen: rampart
  alternatives:
  - bulwark
  - outer wall
  - fortification
  lexicon: HALOT
  rationale: The term refers to a defensive earthwork or outer fortification distinct
    from the wall proper. 'Rampart' is concise and preserves the military-architectural
    sense.
- source_word: וְחוֹמָה
  chosen: wall
  alternatives:
  - city wall
  lexicon: HALOT
  rationale: Rendered simply as 'wall' to preserve the poetic pairing with 'rampart.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - alike
  - as one
  lexicon: HALOT
  rationale: This adverb marks the shared condition of rampart and wall.
- source_word: אֻמְלָלוּ
  chosen: they waste away
  alternatives:
  - they languish
  - they are weakened
  - they wither
  lexicon: HALOT
  rationale: The verb conveys enfeeblement or wasting. 'Waste away' fits the lament
    context and the personified imagery of mourning fortifications.
