id: LAM.2.6
reference: Lamentations 2:6
source:
  edition: WLC
  text: וַ/יַּחְמֹ֤ס כַּ/גַּן֙ שֻׂכּ֔/וֹ שִׁחֵ֖ת מוֹעֲד֑/וֹ שִׁכַּ֨ח יְהוָ֤ה בְּ/צִיּוֹן֙ מוֹעֵ֣ד וְ/שַׁבָּ֔ת וַ/יִּנְאַ֥ץ בְּ/זַֽעַם אַפּ֖/וֹ מֶ֥לֶךְ וְ/כֹהֵֽן׀־׃ס
translation:
  text: He has laid waste his shelter like a garden; he has destroyed his appointed meeting place. Yahweh has caused appointed feast and Sabbath to be forgotten in Zion, and in the indignation of his anger he has spurned king and priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his booth' or 'his tabernacle.' The Hebrew term can denote a shelter or booth; the exact image here is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'his appointed place of assembly'; possibly 'his tent of meeting.' The Hebrew word is related to the term later rendered 'appointed feast.'
    reason: lexical_alternative
  - marker: c
    text: Or 'appointed time' or 'festival.' In this context, paired with 'Sabbath,' the word likely refers to the set feast times.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְמֹס
  chosen: has laid waste
  alternatives:
  - has violently treated
  - has ravaged
  - has done violence to
  lexicon: HALOT
  rationale: The verb חמס in the piel/waw-consecutive context conveys violent devastation rather than mere taking. 'Laid waste' captures the destructive force in idiomatic English without over-paraphrasing.
- source_word: כַּגַּן
  chosen: like a garden
  alternatives:
  - as a garden
  lexicon: HALOT
  rationale: Retains the simile explicitly. The image is difficult, but the Hebrew plainly compares the object to a garden, likely suggesting something easily torn down or stripped.
- source_word: שֻׂכּוֹ
  chosen: his shelter
  alternatives:
  - his booth
  - his tabernacle
  - his thicket
  lexicon: HALOT
  rationale: The noun סך/שׂך can denote a booth, shelter, or covering. 'Shelter' is broad enough to fit the poetic context and avoids importing later technical associations of 'tabernacle.' Because the referent is debated, an alternative is preserved in a footnote.
- source_word: שִׁחֵת
  chosen: has destroyed
  alternatives:
  - has ruined
  - has corrupted
  lexicon: HALOT
  rationale: In this context of judgment on Zion and its institutions, 'destroyed' best reflects concrete devastation.
- source_word: מוֹעֲדוֹ
  chosen: his appointed meeting place
  alternatives:
  - his appointed place
  - his place of assembly
  - his tent of meeting
  lexicon: HALOT
  rationale: 'מוֹעֵד can denote appointed time or appointed place/meeting. Here, because it is the object of ''destroyed'' and is followed later by ''appointed feast and Sabbath,'' the first occurrence is best taken spatially: the place of appointed assembly. This preserves the lexical link while fitting the syntax.'
- source_word: שִׁכַּח
  chosen: has caused ... to be forgotten
  alternatives:
  - has made ... forgotten
  - has obliterated the memory of
  lexicon: HALOT
  rationale: The hiphil sense is causative. English expresses this naturally as 'has caused ... to be forgotten.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: מוֹעֵד
  chosen: appointed feast
  alternatives:
  - appointed time
  - festival
  - assembly
  lexicon: HALOT
  rationale: In collocation with 'Sabbath,' the temporal/festal sense is primary here. 'Appointed feast' preserves the cultic nuance better than the more generic 'festival' while remaining readable.
- source_word: וְשַׁבָּת
  chosen: and Sabbath
  alternatives:
  - and the Sabbath
  lexicon: HALOT
  rationale: Rendered simply and idiomatically; the anarthrous Hebrew does not require the English article.
- source_word: וַיִּנְאַץ
  chosen: has spurned
  alternatives:
  - has rejected
  - has despised
  - has disdained
  lexicon: HALOT
  rationale: The verb conveys contemptuous rejection. 'Spurned' captures both rejection and disdain in concise modern English.
- source_word: בְּזַעַם אַפּוֹ
  chosen: in the indignation of his anger
  alternatives:
  - in his fierce anger
  - in the fury of his anger
  - in the wrath of his anger
  lexicon: HALOT
  rationale: The paired nouns intensify divine anger. 'Indignation of his anger' preserves the doubled expression with elevated but still accessible diction.
- source_word: מֶלֶךְ וְכֹהֵן
  chosen: king and priest
  alternatives:
  - the king and the priest
  lexicon: HALOT
  rationale: The singular nouns function collectively or representatively. 'King and priest' is natural English and preserves the institutional focus of the verse.
