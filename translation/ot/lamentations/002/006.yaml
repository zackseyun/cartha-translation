theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of מוֹעֲדוֹ in the first colon
  chosen_reading: 'spatial sense: ''his appointed meeting place'''
  alternative_readings:
  - 'temporal sense: ''his appointed time/feast'''
  - 'cultic-technical sense: ''his tent of meeting'''
  rationale: Because the verb is 'destroyed' and the next clause separately mentions מוֹעֵד with Sabbath in a temporal/festal sense, the first occurrence is best read as the place of assembly rather than the time of assembly. This preserves the poetic wordplay without collapsing the two uses into one meaning.
