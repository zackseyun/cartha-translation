id: LAM.2.12
reference: Lamentations 2:12
source:
  edition: WLC
  text: לְ/אִמֹּתָ/ם֙ יֹֽאמְר֔וּ אַיֵּ֖ה דָּגָ֣ן וָ/יָ֑יִן בְּ/הִֽתְעַטְּפָ֤/ם כֶּֽ/חָלָל֙
    בִּ/רְחֹב֣וֹת עִ֔יר בְּ/הִשְׁתַּפֵּ֣ךְ נַפְשָׁ֔/ם אֶל חֵ֖יק אִמֹּתָֽ/ם־׃ס
translation:
  text: They say to their mothers, “Where are grain and wine?” as they faint like
    the wounded in the streets of the city, as their life is poured out into their
    mothers’ bosom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like the slain.” The Hebrew חָלָל can refer to one slain, pierced, or
      mortally wounded; here it likely evokes children collapsing as if battlefield
      casualties.
    reason: lexical_alternative
  - marker: b
    text: Hebrew nephesh, often rendered “soul,” here likely means “life” in the sense
      of life ebbing away.
    reason: lexical_alternative
  - marker: c
    text: Or “into their mothers’ arms” or “on their mothers’ lap.” Hebrew “bosom”
      is a literal, intimate maternal image.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאִמֹּתָם
  chosen: to their mothers
  alternatives:
  - to their own mothers
  lexicon: HALOT
  rationale: The preposition ל marks indirect address, and אֵם with 3mp suffix is
    straightforwardly plural possessive. 'To their mothers' is natural English and
    preserves the familial pathos.
- source_word: יֹאמְרוּ
  chosen: they say
  alternatives:
  - they keep saying
  - they will say
  lexicon: HALOT
  rationale: The imperfect here functions in vivid present/past narrative description.
    English present 'they say' captures the immediacy of the lament better than a
    simple future.
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: The interrogative asks after the availability of two items, grain and
    wine, so plural English agreement is idiomatic.
- source_word: דָּגָן וָיָיִן
  chosen: grain and wine
  alternatives:
  - corn and wine
  - food and wine
  lexicon: HALOT
  rationale: דגן denotes grain/cereal produce, not specifically 'corn' in modern English.
    Retaining 'grain and wine' preserves the concrete staples being sought.
- source_word: בְּהִתְעַטְּפָם
  chosen: as they faint
  alternatives:
  - when they faint
  - as they grow weak
  - as they swoon
  lexicon: HALOT
  rationale: The hitpael of עטף in lament contexts conveys languishing/fainting away.
    'As they faint' is clear modern English and fits the durative scene.
- source_word: כֶּחָלָל
  chosen: like the wounded
  alternatives:
  - like the slain
  - like one pierced
  lexicon: HALOT
  rationale: חלל can denote one slain or mortally wounded. In this context the children
    are collapsing in the streets but not necessarily already dead; 'like the wounded'
    best fits the comparison while preserving the violence of the image.
- source_word: בִּרְחֹבוֹת עִיר
  chosen: in the streets of the city
  alternatives:
  - in the city squares
  - in the broad places of the city
  lexicon: HALOT
  rationale: רחבות refers to open streets/squares. 'Streets of the city' is idiomatic
    and sufficiently concrete without sounding archaic.
- source_word: בְּהִשְׁתַּפֵּךְ נַפְשָׁם
  chosen: as their life is poured out
  alternatives:
  - as their soul is poured out
  - while their life drains away
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self. Here the image is of life ebbing away
    in starvation and collapse, so 'life' communicates the sense more naturally in
    English while preserving the metaphor of being poured out.
- source_word: אֶל חֵיק אִמֹּתָם
  chosen: into their mothers’ bosom
  alternatives:
  - into their mothers' arms
  - on their mothers' lap
  lexicon: HALOT
  rationale: חיק is literally bosom/lap. 'Bosom' preserves the intimate, maternal
    image and the pathos of dying against one's mother, though it is slightly elevated
    diction.
