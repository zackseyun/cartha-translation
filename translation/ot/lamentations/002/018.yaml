id: LAM.2.18
reference: Lamentations 2:18
source:
  edition: WLC
  text: צָעַ֥ק לִבָּ֖/ם אֶל אֲדֹנָ֑/י חוֹמַ֣ת בַּת צִ֠יּוֹן הוֹרִ֨ידִי כַ/נַּ֤חַל
    דִּמְעָה֙ יוֹמָ֣ם וָ/לַ֔יְלָה אַֽל תִּתְּנִ֤י פוּגַת֙ לָ֔/ךְ אַל תִּדֹּ֖ם בַּת
    עֵינֵֽ/ךְ־־־־־׃ס
translation:
  text: 'Their heart cried out to the Lord: O wall of daughter Zion, let tears run
    down like a stream day and night; give yourself no relief; let not the apple of
    your eye be still.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hearts cried out to the Lord.' The Hebrew has singular 'heart'
      with a plural suffix, likely a collective expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'let tears flow like a wadi/torrent.' The Hebrew נחל can refer to a streambed
      or torrent valley.
    reason: lexical_alternative
  - marker: c
    text: Literally 'let not the daughter of your eye be still,' an idiom for the
      pupil/eye and thus for unceasing weeping.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָעַק
  chosen: cried out
  alternatives:
  - cried
  - called out
  lexicon: HALOT
  rationale: Qal perfect 3ms with collective subject 'their heart' functions idiomatically
    for an intense cry. 'Cried out' preserves the force better than the flatter 'cried.'
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their hearts
  lexicon: HALOT
  rationale: The Hebrew is singular with a 3mp suffix. Retaining singular 'heart'
    reflects the collective sense of the people as one grieving entity.
- source_word: אֶל אֲדֹנָי
  chosen: to the Lord
  alternatives:
  - to my Lord
  - to the Lord GOD
  lexicon: HALOT
  rationale: The pointing and context support the divine title 'Lord.' This follows
    the doctrine default for אֲדֹנָי/κύριος-type divine title language.
- source_word: חוֹמַת בַּת צִיּוֹן
  chosen: O wall of daughter Zion
  alternatives:
  - wall of Daughter Zion
  - rampart of daughter Zion
  lexicon: HALOT
  rationale: The phrase is best taken as direct address after the opening clause.
    'Wall' is the plain sense of חוֹמָה; 'daughter Zion' preserves the personified
    city idiom without paraphrase.
- source_word: הוֹרִידִי
  chosen: let ... run down
  alternatives:
  - bring down
  - cause to descend
  - pour down
  lexicon: HALOT
  rationale: Hiphil imperative 2fs addressed to the wall/daughter Zion. In context
    with 'tears' and 'like a stream,' idiomatic English prefers 'let tears run down'
    rather than the more wooden 'bring down tears.'
- source_word: כַנַּחַל דִּמְעָה
  chosen: tears run down like a stream
  alternatives:
  - bring down tears like a wadi
  - let tears flow like a torrent
  lexicon: HALOT
  rationale: נחל can denote a stream/wadi. 'Stream' is more natural in English here
    while preserving the simile. The singular 'tear' in Hebrew is a collective; English
    plural 'tears' is idiomatic.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: HALOT
  rationale: Standard merism for continual duration; 'day and night' is the natural
    equivalent.
- source_word: אַל תִּתְּנִי פוּגַת לָךְ
  chosen: give yourself no relief
  alternatives:
  - grant yourself no respite
  - give yourself no rest
  lexicon: HALOT
  rationale: פוּגָה denotes respite, relief, or pause. 'Relief' fits the lament context
    and avoids implying sleep specifically, which 'rest' might suggest.
- source_word: אַל תִּדֹּם
  chosen: let not ... be still
  alternatives:
  - let not ... be silent
  - let not ... cease
  lexicon: HALOT
  rationale: The verb denotes being still/silent. Because the subject is 'the apple
    of your eye,' 'be still' works idiomatically for tears not stopping, while preserving
    the image.
- source_word: בַּת עֵינֵךְ
  chosen: the apple of your eye
  alternatives:
  - the daughter of your eye
  - your pupil
  lexicon: HALOT
  rationale: This Hebrew idiom refers to the pupil/eye itself. 'Apple of your eye'
    is an established English idiom that preserves the metaphorical force and emotional
    vividness better than a clinical rendering.
