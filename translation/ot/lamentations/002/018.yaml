theological_decisions:
- issue: Rendering the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - my Lord
  rationale: In this lament context the title refers to Israel's God, not a human
    superior. 'The Lord' matches the project's default handling of divine title language
    and avoids introducing first-person possessive nuance into English.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος/Kyrios → Lord'
