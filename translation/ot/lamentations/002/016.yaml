id: LAM.2.16
reference: Lamentations 2:16
source:
  edition: WLC
  text: פָּצ֨וּ עָלַ֤יִ/ךְ פִּי/הֶם֙ כָּל א֣וֹיְבַ֔יִ/ךְ שָֽׁרְקוּ֙ וַ/יַּֽחַרְקוּ
    שֵׁ֔ן אָמְר֖וּ בִּלָּ֑עְנוּ אַ֣ךְ זֶ֥ה הַ/יּ֛וֹם שֶׁ/קִּוִּינֻ֖/הוּ מָצָ֥אנוּ
    רָאִֽינוּ־־׃ס
translation:
  text: All your enemies open their mouths against you; they hiss and gnash their
    teeth. They say, “We have swallowed her up! Surely this is the day we hoped for;
    we have found it, we have seen it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hiss'; the verb can also be rendered 'whistle,' but here it expresses
      derision from enemies.
    reason: lexical_alternative
  - marker: b
    text: Or 'We have devoured her.' Hebrew 'swallowed her up' is a vivid metaphor
      for total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצוּ
  chosen: open
  alternatives:
  - gape
  - open wide
  lexicon: HALOT
  rationale: The verb means to open wide, especially the mouth. 'Open' is natural
    modern English, while the object 'their mouths' carries the force. 'Gape' is possible
    but sounds more marked in English than the Hebrew requires.
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - at you
  - over you
  lexicon: HALOT
  rationale: With hostile speech and gesture in context, על conveys opposition directed
    toward Zion/Jerusalem. 'Against you' best captures the adversarial sense.
- source_word: פִּיהֶם
  chosen: their mouths
  lexicon: HALOT
  rationale: Literal rendering retained; the idiom 'open their mouths against you'
    is transparent in English and preserves the vivid hostility of the Hebrew.
- source_word: כָּל אֹיְבַיִךְ
  chosen: all your enemies
  alternatives:
  - every one of your enemies
  lexicon: HALOT
  rationale: Straightforward collective expression. 'All your enemies' is idiomatic
    and preserves the totality.
- source_word: שָׁרְקוּ
  chosen: hiss
  alternatives:
  - whistle
  - jeer
  lexicon: HALOT
  rationale: The verb can denote hissing/whistling as a sign of derision or astonishment.
    'Hiss' best fits the hostile mockery here; 'whistle' could be misunderstood positively
    in English.
- source_word: וַיַּחַרְקוּ שֵׁן
  chosen: gnash their teeth
  alternatives:
  - grind their teeth
  lexicon: HALOT
  rationale: This is a conventional expression of rage and malice. 'Gnash their teeth'
    is the established and accurate English equivalent.
- source_word: בִּלָּעְנוּ
  chosen: We have swallowed her up
  alternatives:
  - We have devoured her
  - We have consumed her
  lexicon: HALOT
  rationale: The verb בלע commonly means 'swallow up' in contexts of destruction.
    The feminine object is implicit from the context (daughter Zion/Jerusalem), so
    English supplies 'her.' 'Swallowed her up' preserves the metaphor and the perfective
    force.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - 'Yes'
  lexicon: HALOT
  rationale: Here the particle adds emphatic affirmation. 'Surely' conveys the triumphant
    certainty of the enemies' speech.
- source_word: זֶה הַיּוֹם
  chosen: this is the day
  alternatives:
  - this is that day
  lexicon: HALOT
  rationale: A direct rendering is best. English naturally supplies 'is' in the quoted
    speech.
- source_word: שֶׁקִּוִּינֻהוּ
  chosen: we hoped for
  alternatives:
  - we waited for
  - we longed for
  lexicon: HALOT
  rationale: קוה often carries the sense of waiting in hope or expectation. In the
    enemies' taunt, 'hoped for' communicates their eager expectation more naturally
    than the flatter 'waited for.'
- source_word: מָצָאנוּ
  chosen: we have found it
  alternatives:
  - we have attained it
  - we have come upon it
  lexicon: HALOT
  rationale: Although the object is not explicit in Hebrew, English benefits from
    supplying 'it,' referring back to 'the day.' 'Found it' is the most direct equivalent.
- source_word: רָאִינוּ
  chosen: we have seen it
  alternatives:
  - we have lived to see it
  lexicon: HALOT
  rationale: The Hebrew is simple and forceful. Supplying 'it' clarifies the implied
    object in English while preserving the climactic parallelism with 'we have found
    it.'
