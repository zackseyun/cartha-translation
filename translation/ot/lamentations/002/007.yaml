id: LAM.2.7
reference: Lamentations 2:7
source:
  edition: WLC
  text: זָנַ֨ח אֲדֹנָ֤/י מִזְבְּח/וֹ֙ נִאֵ֣ר מִקְדָּשׁ֔/וֹ הִסְגִּיר֙ בְּ/יַד אוֹיֵ֔ב חוֹמֹ֖ת אַרְמְנוֹתֶ֑י/הָ ק֛וֹל נָתְנ֥וּ בְּ/בֵית יְהוָ֖ה כְּ/י֥וֹם מוֹעֵֽד׀־־׃ס
translation:
  text: The Lord has rejected his altar; he has abandoned his sanctuary. He has given the walls of her palaces into the hand of the enemy. They raised a shout in the house of Yahweh as on the day of an appointed feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has abhorred his sanctuary.' The Hebrew verb is stronger than the previous 'has rejected.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of the enemy,' an idiom meaning to hand over to an enemy's power.
    reason: lexical_alternative
  - marker: c
    text: Or 'as on a feast day' or 'as on the day of an appointed festival.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנַח
  chosen: has rejected
  alternatives:
  - has cast off
  - has abandoned
  - has rejected
  lexicon: HALOT
  rationale: Conveys repudiation/disfavor in a covenant-judgment context without overreading total abandonment. Present perfect in English fits the completed action with present force in the lament.
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Lord
  - the Master
  lexicon: HALOT
  rationale: As a divine title, 'Lord' is the standard rendering. Capitalized with article in English to mark the title naturally.
- source_word: מִזְבְּחוֹ
  chosen: his altar
  alternatives:
  - his altar
  lexicon: HALOT
  rationale: Direct and literal; singular is maintained.
- source_word: נִאֵר
  chosen: has spurned
  alternatives:
  - has rejected
  - has treated with contempt
  - has abhorred
  lexicon: HALOT
  rationale: This verb is stronger than the previous זָנַח and suggests disdain or repudiation. 'Spurned' preserves the sharper emotional force while remaining readable modern English.
- source_word: מִקְדָּשׁוֹ
  chosen: his sanctuary
  alternatives:
  - his holy place
  - his sanctuary
  lexicon: HALOT
  rationale: '''Sanctuary'' is the most natural English equivalent for the sacred precinct and fits the temple context.'
- source_word: הִסְגִּיר בְּיַד אוֹיֵב
  chosen: has given ... into the hand of the enemy
  alternatives:
  - has delivered ... into the hand of the enemy
  - has handed ... over to the enemy
  lexicon: HALOT
  rationale: This idiom commonly means to hand over to hostile power. Retaining 'into the hand of' preserves the Hebrew imagery while remaining intelligible.
- source_word: חוֹמֹת
  chosen: the walls
  alternatives:
  - the walls
  - walls
  lexicon: HALOT
  rationale: Definite in sense from the construct relationship; refers specifically to the fortifications now surrendered.
- source_word: אַרְמְנוֹתֶיהָ
  chosen: her palaces
  alternatives:
  - her citadels
  - her fortresses
  - her palaces
  lexicon: HALOT
  rationale: The feminine suffix refers to the city personified. 'Palaces' is the usual rendering, though the term can overlap with fortified structures; the context of walls supports a royal/urban architectural sense without excluding defensibility.
- source_word: קוֹל נָתְנוּ
  chosen: They raised a shout
  alternatives:
  - they made a noise
  - they gave forth a sound
  - they shouted
  lexicon: HALOT
  rationale: Hebrew idiom literally 'they gave a sound/voice.' 'Raised a shout' captures the hostile clamor in idiomatic English.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the house of the LORD
  - in the temple of the LORD
  lexicon: HALOT
  rationale: The phrase is literally 'house of YHWH.' Per doctrine, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' to preserve the source expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּיוֹם מוֹעֵד
  chosen: as on the day of an appointed feast
  alternatives:
  - as on a feast day
  - as on the day of an appointed festival
  - as on the day of assembly
  lexicon: HALOT
  rationale: 'מוֹעֵד denotes an appointed time/festival. ''Appointed feast'' preserves the cultic nuance and the bitter irony: enemy shouting now fills the temple like festival crowds once did.'
