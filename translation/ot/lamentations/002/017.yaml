id: LAM.2.17
reference: Lamentations 2:17
source:
  edition: WLC
  text: עָשָׂ֨ה יְהוָ֜ה אֲשֶׁ֣ר זָמָ֗ם בִּצַּ֤ע אֶמְרָת/וֹ֙ אֲשֶׁ֣ר צִוָּ֣ה מִֽ/ימֵי קֶ֔דֶם הָרַ֖ס וְ/לֹ֣א חָמָ֑ל וַ/יְשַׂמַּ֤ח עָלַ֨יִ/ךְ֙ אוֹיֵ֔ב הֵרִ֖ים קֶ֥רֶן צָרָֽיִ/ךְ־׃ס
translation:
  text: Yahweh has done what he planned; he has fulfilled his word, which he commanded from days of old. He has torn down and has not shown pity; he has made the enemy rejoice over you; he has exalted the horn of your foes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carried out' or 'executed' his word.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from days of old,' that is, from long ago.
    reason: lexical_alternative
  - marker: c
    text: '''Horn'' is a biblical image for strength, power, or honor.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: זָמָם
  chosen: planned
  alternatives:
  - purposed
  - devised
  - intended
  lexicon: HALOT
  rationale: Conveys deliberate intention without implying mere abstract thought; fits the context of YHWH carrying out a prior resolve of judgment.
- source_word: בִּצַּע
  chosen: has fulfilled
  alternatives:
  - has carried out
  - has executed
  - has completed
  lexicon: HALOT
  rationale: In context the verb refers to bringing a declared word to completion. 'Fulfilled' reads naturally with 'his word' and preserves the sense of execution/completion.
- source_word: אֶמְרָתוֹ
  chosen: his word
  alternatives:
  - his utterance
  - his promise
  - his saying
  lexicon: HALOT
  rationale: '''Word'' is the most natural English equivalent here and broad enough to include a prior pronouncement of judgment without narrowing it to promise.'
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordained
  - decreed
  lexicon: HALOT
  rationale: A straightforward rendering of the verb. In this context it refers to what God ordered long ago; 'commanded' preserves the verbal force better than the more interpretive 'decreed,' though the latter is a viable nuance.
- source_word: מִימֵי קֶדֶם
  chosen: from days of old
  alternatives:
  - from ancient days
  - long ago
  lexicon: HALOT
  rationale: Keeps the temporal idiom's poetic flavor while remaining clear in modern English.
- source_word: הָרַס
  chosen: has torn down
  alternatives:
  - has destroyed
  - has broken down
  lexicon: HALOT
  rationale: Reflects the imagery of demolition in the lament context. 'Torn down' is vivid and suits the city's ruin.
- source_word: חָמָל
  chosen: has not shown pity
  alternatives:
  - has not spared
  - has had no compassion
  lexicon: HALOT
  rationale: Expresses the withholding of compassion in idiomatic English. 'Spared' is possible, but 'shown pity' better matches the emotional force of the lament.
- source_word: וַיְשַׂמַּח עָלַיִךְ אוֹיֵב
  chosen: he has made the enemy rejoice over you
  alternatives:
  - he has gladdened the enemy against you
  - he has caused the enemy to rejoice over you
  lexicon: HALOT
  rationale: Captures the causative sense of the verb and the hostile triumph of the enemy over Jerusalem/Zion, addressed as feminine singular.
- source_word: הֵרִים קֶרֶן
  chosen: he has exalted the horn
  alternatives:
  - he has raised up the horn
  - he has lifted up the horn
  lexicon: HALOT
  rationale: '''Horn'' is a standard biblical metaphor for strength and honor. ''Exalted'' communicates the metaphor''s sense in natural English while preserving the image.'
- source_word: צָרַיִךְ
  chosen: your foes
  alternatives:
  - your adversaries
  - your enemies
  lexicon: HALOT
  rationale: Provides slight variation from the earlier singular 'enemy' while reflecting the plural form here. 'Foes' is concise and suitably poetic.
