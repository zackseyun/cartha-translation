theological_decisions:
- issue: Divine agency in Jerusalem's destruction
  chosen_reading: The verse is rendered with God as the explicit subject of planning, fulfilling, tearing down, withholding pity, and enabling enemy triumph.
  alternative_readings:
  - Soften the causation to mere permission
  rationale: The Hebrew verbs consistently present the LORD as the acting subject. The translation preserves this theological tension rather than reducing divine agency to indirect permission.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
