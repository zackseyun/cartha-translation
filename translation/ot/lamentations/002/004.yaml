theological_decisions:
- issue: Portrayal of God as acting 'like an enemy' toward Zion
  chosen_reading: Retain the simile directly in the main text without softening it.
  alternative_readings:
  - He attacked as an enemy
  - He seemed like an enemy
  rationale: The Hebrew explicitly compares his action to that of an enemy and a foe.
    The translation preserves this theological tension rather than resolving or mitigating
    it, in keeping with the stated philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering בַּת־צִיּוֹן
  chosen_reading: daughter Zion
  alternative_readings:
  - the daughter of Zion
  - Zion
  rationale: The personified expression is theologically and poetically significant
    in Lamentations. Preserving it maintains the text's imagery and covenantal lament
    setting.
