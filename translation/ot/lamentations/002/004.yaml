id: LAM.2.4
reference: Lamentations 2:4
source:
  edition: WLC
  text: דָּרַ֨ךְ קַשְׁתּ֜/וֹ כְּ/אוֹיֵ֗ב נִצָּ֤ב יְמִינ/וֹ֙ כְּ/צָ֔ר וַֽ/יַּהֲרֹ֔ג
    כֹּ֖ל מַחֲמַדֵּי עָ֑יִן בְּ/אֹ֨הֶל֙ בַּת צִיּ֔וֹן שָׁפַ֥ךְ כָּ/אֵ֖שׁ חֲמָתֽ/וֹ־־׃ס
translation:
  text: He bent his bow like an enemy; his right hand stood ready like a foe, and
    he killed all who were pleasing to the eye in the tent of daughter Zion; he poured
    out his wrath like fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that was delightful to the eye.' The Hebrew expression may refer
      more broadly to what was beautiful or precious, though here it likely points
      to beloved people.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַךְ
  chosen: bent
  alternatives:
  - strung
  - drew
  lexicon: HALOT
  rationale: The verb with 'bow' means to tread/bend or draw a bow for shooting. 'Bent
    his bow' is idiomatic enough in English and preserves the martial image without
    over-specifying the stage of action.
- source_word: קַשְׁתּוֹ
  chosen: his bow
  lexicon: HALOT
  rationale: Straightforward possessive noun; no reason to paraphrase.
- source_word: כְּאוֹיֵב
  chosen: like an enemy
  alternatives:
  - as an enemy
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like an enemy' preserves the simile
    and the shocking portrayal of God acting against Zion as though he were her enemy.
- source_word: נִצָּב יְמִינוֹ
  chosen: his right hand stood ready
  alternatives:
  - his right hand was stationed
  - he stationed his right hand
  lexicon: HALOT
  rationale: The participle נִצָּב conveys being set/standing in position. With 'right
    hand' in a battle context, 'stood ready' communicates poised hostility in natural
    English.
- source_word: כְּצָר
  chosen: like a foe
  alternatives:
  - like an adversary
  - like an oppressor
  lexicon: HALOT
  rationale: צָר can mean enemy/adversary/foe. 'Foe' avoids repeating 'enemy' while
    retaining the hostile military sense.
- source_word: וַיַּהֲרֹג
  chosen: he killed
  alternatives:
  - he slew
  lexicon: HALOT
  rationale: Common verb for killing. 'Killed' is clear modern English; 'slew' is
    archaic.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the totalizing force of the Hebrew.
- source_word: מַחֲמַדֵּי עָיִן
  chosen: all who were pleasing to the eye
  alternatives:
  - all the delights of the eye
  - all the precious ones of the eye
  - all that was delightful to the eye
  lexicon: HALOT
  rationale: The phrase literally denotes desirable/pleasant things to the eye. In
    this context of persons being killed, an English personal rendering best fits
    the verbal object while preserving the idiom's sense of beauty and preciousness.
- source_word: בְּאֹהֶל בַּת־צִיּוֹן
  chosen: in the tent of daughter Zion
  alternatives:
  - in the tent of the daughter of Zion
  - in daughter Zion's tent
  lexicon: HALOT
  rationale: '''Daughter Zion'' is a conventional personification of the city/people
    and should be preserved rather than flattened to ''Jerusalem.'' ''Tent'' is kept
    literally, likely evoking the city''s dwelling/place.'
- source_word: שָׁפַךְ
  chosen: he poured out
  alternatives:
  - he spilled out
  lexicon: HALOT
  rationale: Standard rendering for the verb, especially with wrath as the object.
- source_word: כָּאֵשׁ
  chosen: like fire
  alternatives:
  - as fire
  lexicon: HALOT
  rationale: Simple simile; 'like fire' is the most natural English equivalent.
- source_word: חֲמָתוֹ
  chosen: his wrath
  alternatives:
  - his fury
  - his anger
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' best preserves the intensity
    and solemn register of divine judgment in this context.
