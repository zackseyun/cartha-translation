id: LAM.2.11
reference: Lamentations 2:11
source:
  edition: WLC
  text: כָּל֨וּ בַ/דְּמָע֤וֹת עֵינַ/י֙ חֳמַרְמְר֣וּ מֵעַ֔/י נִשְׁפַּ֤ךְ לָ/אָ֨רֶץ֙
    כְּבֵדִ֔/י עַל שֶׁ֖בֶר בַּת עַמִּ֑/י בֵּֽ/עָטֵ֤ף עוֹלֵל֙ וְ/יוֹנֵ֔ק בִּ/רְחֹב֖וֹת
    קִרְיָֽה־־׃ס
translation:
  text: My eyes are spent with tears; my inward parts churn; my liver is poured out
    to the earth because of the destruction of the daughter of my people, as infant
    and nursing child faint in the streets of the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my inward parts are troubled' for 'my inward parts churn'; the Hebrew
      uses visceral body imagery for deep anguish.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my liver is poured out to the earth,' a concrete bodily image for
      profound grief and collapse.
    reason: cultural_note
  - marker: c
    text: Or 'because of the brokenness of the daughter of my people.'
    reason: alternative_reading
  - marker: d
    text: '''The daughter of my people'' is a Hebrew poetic personification for the
      people/city.'
    reason: cultural_note
lexical_decisions:
- source_word: כָּלוּ
  chosen: are spent
  alternatives:
  - fail
  - are exhausted
  - come to an end
  lexicon: HALOT
  rationale: The verb conveys being used up or exhausted. With 'my eyes' and 'with
    tears,' 'are spent' preserves the vivid physical depletion better than the more
    interpretive 'fail.'
- source_word: בַדְּמָעוֹת
  chosen: with tears
  alternatives:
  - in tears
  - from tears
  lexicon: HALOT
  rationale: The beth preposition here is instrumental/circumstantial. 'With tears'
    is idiomatic and keeps the close connection to the eyes being exhausted.
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: Literal body-part language should be preserved here because the verse
    is intensely embodied lament poetry.
- source_word: חֳמַרְמְרוּ
  chosen: churn
  alternatives:
  - are troubled
  - boil
  - grow hot
  lexicon: HALOT
  rationale: The rare verb expresses visceral agitation. 'Churn' communicates internal
    turmoil in contemporary English without flattening the bodily imagery into a merely
    emotional abstraction.
- source_word: מֵעַי
  chosen: my inward parts
  alternatives:
  - my bowels
  - my insides
  - my heart
  lexicon: HALOT
  rationale: Hebrew often locates deep emotion in the entrails. 'My inward parts'
    preserves the concrete anthropological imagery better than 'my heart,' while avoiding
    the archaic or potentially distracting 'bowels.'
- source_word: נשפך לארץ
  chosen: is poured out to the earth
  alternatives:
  - is poured out on the ground
  - spills to the earth
  lexicon: HALOT
  rationale: The passive image is retained. 'To the earth' closely follows the Hebrew
    and preserves the poetic downward motion of collapse and humiliation.
- source_word: כְּבֵדִי
  chosen: my liver
  alternatives:
  - my heart
  - my inner being
  - my glory
  lexicon: HALOT
  rationale: The Hebrew noun ordinarily means 'liver' here as a bodily organ associated
    with deep emotion. Retaining 'liver' preserves the concrete metaphor of grief
    rather than domesticating it into a generalized emotional term.
- source_word: עַל שֶׁבֶר
  chosen: because of the destruction
  alternatives:
  - over the brokenness
  - because of the ruin
  - over the fracture
  lexicon: HALOT
  rationale: In this context of Jerusalem's devastation, 'destruction' best captures
    the communal catastrophe in view. 'Brokenness' is possible but can sound overly
    abstract in English.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people-group
  lexicon: HALOT
  rationale: This is a conventional Hebrew personification for the community/city.
    The literal expression is preserved because it is a significant poetic and prophetic
    idiom.
- source_word: בְּעָטֵף
  chosen: faint
  alternatives:
  - grow weak
  - swoon
  - expire
  lexicon: HALOT
  rationale: The infinitive construct here describes the condition of children collapsing
    from deprivation. 'Faint' is concise, natural, and faithful to the scene.
- source_word: עוֹלֵל
  chosen: infant
  alternatives:
  - little child
  - young child
  lexicon: HALOT
  rationale: The term denotes a very young child. 'Infant' fits well alongside 'nursing
    child' and preserves the pathos of extreme vulnerability.
- source_word: יוֹנֵק
  chosen: nursing child
  alternatives:
  - suckling
  - breastfeeding infant
  lexicon: HALOT
  rationale: The participle refers to a child still nursing. 'Nursing child' is clear
    modern English; 'suckling' is accurate but less natural for the target audience.
- source_word: בִּרְחֹבוֹת
  chosen: in the streets
  alternatives:
  - in the squares
  - in the open places
  lexicon: HALOT
  rationale: The noun can denote broad places or public squares, but 'streets' is
    a natural rendering in English and fits the urban setting.
- source_word: קִרְיָה
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: A straightforward rendering of the urban locale; 'city' best matches
    the scale and literary context of Jerusalem's fall.
