id: LAM.2.22
reference: Lamentations 2:22
source:
  edition: WLC
  text: תִּקְרָא֩ כְ/י֨וֹם מוֹעֵ֤ד מְגוּרַ/י֙ מִ/סָּבִ֔יב וְ/לֹ֥א הָיָ֛ה בְּ/י֥וֹם
    אַף יְהוָ֖ה פָּלִ֣יט וְ/שָׂרִ֑יד אֲשֶׁר טִפַּ֥חְתִּי וְ/רִבִּ֖יתִי אֹיְבִ֥/י כִלָּֽ/ם־־׃פ
translation:
  text: You summoned my terrors from every side as on an appointed day, and on the
    day of the LORD’s anger there was no survivor or escapee. Those whom I nurtured
    and raised, my enemy destroyed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as on a feast day' / 'like a festival day'; the Hebrew compares the
      gathering of terrors to the assembling of people on an appointed festival occasion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my terrors from every side'; some understand this more broadly as
      'those who terrorize me on every side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְרָא
  chosen: You summoned
  alternatives:
  - You called
  - You proclaimed
  lexicon: HALOT
  rationale: Qal imperfect 2ms of קרא, addressed to the LORD in direct speech. 'Summoned'
    fits the sense of calling hostile forces/terrors to assemble, stronger and more
    contextually apt than the more generic 'called'.
- source_word: כְיוֹם מוֹעֵד
  chosen: as on an appointed day
  alternatives:
  - as on a feast day
  - like a festival day
  lexicon: HALOT
  rationale: 'מוֹעֵד can denote an appointed time, including a festival assembly.
    Here the comparison is ironic: the gathering of terrors is like the gathering
    of people for a solemn/festal occasion. ''Appointed day'' preserves the broader
    lexical sense while allowing the irony to stand.'
- source_word: מְגוּרַי
  chosen: my terrors
  alternatives:
  - those who terrorize me
  - my sojournings
  lexicon: HALOT
  rationale: In context and by common usage in this form, the noun refers to objects
    of dread/terrors rather than 'sojournings.' The phrase 'my terrors from every
    side' is idiomatic in judgment contexts and matches the lament's imagery.
- source_word: מִסָּבִיב
  chosen: from every side
  alternatives:
  - all around
  - from around
  lexicon: HALOT
  rationale: Idiomatic rendering of the spatial expression, conveying encirclement.
- source_word: בְּיוֹם אַף יְהוָה
  chosen: on the day of the LORD’s anger
  alternatives:
  - in the day of the LORD’s anger
  - on the day of Yahweh's anger
  lexicon: HALOT
  rationale: אַף here denotes anger/wrath. Per doctrine, יְהוָה is rendered 'the LORD.'
    'On the day of the LORD’s anger' is natural English and preserves the genitival
    relation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine's contested terms table for the divine name.
- source_word: פָּלִיט וְשָׂרִיד
  chosen: survivor or escapee
  alternatives:
  - one who escaped or survived
  - survivor or remnant
  lexicon: HALOT
  rationale: The paired nouns intensify total destruction. 'Survivor or escapee' preserves
    the distinction between one who remains and one who gets away, without collapsing
    them into a single term.
- source_word: טִפַּחְתִּי
  chosen: I nurtured
  alternatives:
  - I cared for
  - I dandled
  lexicon: HALOT
  rationale: The verb conveys tender rearing/care, often of children. 'Nurtured' communicates
    the maternal tenderness in accessible modern English.
- source_word: וְרִבִּיתִי
  chosen: and raised
  alternatives:
  - and brought up
  - and made many
  lexicon: HALOT
  rationale: In this context with children, the sense is rearing/bringing up rather
    than numerical multiplication. 'Raised' pairs naturally with 'nurtured' and fits
    the lament over lost children.
- source_word: אֹיְבִי
  chosen: my enemy
  alternatives:
  - the enemy
  - my foe
  lexicon: HALOT
  rationale: With 1cs suffix, the singular is best rendered 'my enemy.' The singular
    may function collectively, but the Hebrew form should be preserved in translation.
- source_word: כִלָּם
  chosen: destroyed them
  alternatives:
  - consumed them
  - finished them off
  lexicon: HALOT
  rationale: כלה in the Piel commonly means to bring to an end, consume, or destroy.
    'Destroyed them' is clear and suitably grave in context.
