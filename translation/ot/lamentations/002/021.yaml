id: LAM.2.21
reference: Lamentations 2:21
source:
  edition: WLC
  text: שָׁכְב֨וּ לָ/אָ֤רֶץ חוּצוֹת֙ נַ֣עַר וְ/זָקֵ֔ן בְּתוּלֹתַ֥/י וּ/בַחוּרַ֖/י
    נָפְל֣וּ בֶ/חָ֑רֶב הָרַ֨גְתָּ֙ בְּ/י֣וֹם אַפֶּ֔/ךָ טָבַ֖חְתָּ לֹ֥א חָמָֽלְתָּ׃ס
translation:
  text: Young and old lie on the ground in the streets; my virgins and my young men
    have fallen by the sword. You killed them in the day of your anger; you slaughtered
    without pity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my maidens'; Hebrew בְּתוּלֹתַי more literally means 'my virgins.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not spare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכְבוּ
  chosen: lie
  alternatives:
  - have lain
  - are lying
  lexicon: HALOT
  rationale: Qal perfect plural of שׁכב, here describing the state/result of the dead
    in the streets. Present English 'lie' conveys the vivid scene naturally, while
    retaining the concrete image.
- source_word: לָאָרֶץ
  chosen: on the ground
  alternatives:
  - to the ground
  - on the earth
  lexicon: HALOT
  rationale: With שׁכב, the phrase denotes physical position. 'On the ground' is idiomatic
    and concrete in English; 'earth' would sound too broad here.
- source_word: חוּצוֹת
  chosen: in the streets
  alternatives:
  - in the squares
  - in the open places
  lexicon: HALOT
  rationale: Refers to public city spaces/streets. 'In the streets' is the most natural
    rendering in this lament context, though 'squares' is a possible narrower alternative.
- source_word: נַעַר וְזָקֵן
  chosen: Young and old
  alternatives:
  - boy and old man
  - youth and elder
  lexicon: HALOT
  rationale: The pair is a merism expressing all ages. 'Young and old' preserves the
    idiomatic force better than a more wooden singular-for-singular rendering.
- source_word: בְּתוּלֹתַי
  chosen: my virgins
  alternatives:
  - my young women
  - my maidens
  lexicon: HALOT
  rationale: בְּתוּלָה most directly denotes a virgin/maiden. 'Virgins' preserves
    the lexical content more transparently than the broader 'young women.' Because
    the possessive is first person, it reflects Zion/Jerusalem speaking of her people.
- source_word: וּבַחוּרַי
  chosen: my young men
  alternatives:
  - my chosen men
  - my youths
  lexicon: HALOT
  rationale: בָּחוּר in this context refers to young men in the prime of life, not
    'chosen men.' 'Young men' is the clearest modern equivalent.
- source_word: נָפְלוּ בֶחָרֶב
  chosen: have fallen by the sword
  alternatives:
  - fell by the sword
  - have fallen in battle
  lexicon: HALOT
  rationale: A common idiom for violent death. 'By the sword' preserves the Hebrew
    imagery and avoids over-interpretive expansion such as 'in battle.'
- source_word: הָרַגְתָּ
  chosen: You killed them
  alternatives:
  - You have slain
  - You killed
  lexicon: HALOT
  rationale: Second masculine singular addresses God directly. English requires an
    object for clarity; 'them' is supplied from context. 'Killed' is straightforward
    and readable.
- source_word: בְּיוֹם אַפֶּךָ
  chosen: in the day of your anger
  alternatives:
  - on the day of your anger
  - in the day of your wrath
  lexicon: HALOT
  rationale: אַף here denotes anger/wrath. 'Anger' is accessible modern English; 'day
    of your anger' preserves the temporal phrase and prophetic tone.
- source_word: טָבַחְתָּ
  chosen: you slaughtered
  alternatives:
  - you butchered
  - you slew
  lexicon: HALOT
  rationale: Stronger and more graphic than הרגת. 'Slaughtered' preserves the intensified
    violence without becoming colloquial.
- source_word: לֹא חָמָלְתָּ
  chosen: without pity
  alternatives:
  - you did not spare
  - without compassion
  lexicon: HALOT
  rationale: The clause states lack of sparing/compassion. 'Without pity' is concise
    and forceful in English, though 'you did not spare' is a close formal alternative.
