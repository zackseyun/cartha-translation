theological_decisions:
- issue: Direct attribution of Jerusalem's slaughter to God
  chosen_reading: 'Retain the second-person address to God: ''You killed... you slaughtered'''
  alternative_readings:
  - Soften to passive or impersonal language
  rationale: The Hebrew directly addresses God as the agent within the lament. The
    translation preserves this theological tension rather than softening divine agency.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
