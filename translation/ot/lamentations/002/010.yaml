id: LAM.2.10
reference: Lamentations 2:10
source:
  edition: WLC
  text: יֵשְׁב֨וּ לָ/אָ֤רֶץ יִדְּמוּ֙ זִקְנֵ֣י בַת צִיּ֔וֹן הֶֽעֱל֤וּ עָפָר֙ עַל רֹאשָׁ֔/ם
    חָגְר֖וּ שַׂקִּ֑ים הוֹרִ֤ידוּ לָ/אָ֨רֶץ֙ רֹאשָׁ֔/ן בְּתוּלֹ֖ת יְרוּשָׁלִָֽם־־׃ס
translation:
  text: The elders of daughter Zion sit on the ground in silence; they have thrown
    dust on their heads and put on sackcloth; the virgins of Jerusalem have bowed
    their heads down to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the maidens of Jerusalem.' The Hebrew term refers specifically to virgins/young
      unmarried women, and in context functions as a poetic social group in mourning.
    reason: lexical_alternative
  - marker: b
    text: '''Daughter Zion'' is a poetic personification of Zion/Jerusalem, preserved
      from the Hebrew rather than paraphrased away.'
    reason: cultural_note
lexical_decisions:
- source_word: יֵשְׁבוּ
  chosen: sit
  alternatives:
  - sit down
  - remain seated
  lexicon: HALOT
  rationale: Basic sense of ישׁב is 'sit/dwell.' In this mourning scene, 'sit' best
    preserves the concrete posture without overinterpreting duration.
- source_word: לָאָרֶץ
  chosen: on the ground
  alternatives:
  - to the ground
  - on the earth
  lexicon: HALOT
  rationale: 'With ישׁבוּ, the phrase naturally denotes location/posture: sitting
    on the ground. ''Ground'' fits the mourning context better than the broader ''earth.'''
- source_word: יִדְּמוּ
  chosen: in silence
  alternatives:
  - are silent
  - sit silent
  - are still
  lexicon: HALOT
  rationale: The verb דמם here conveys silence/stillness in grief. Rendering adverbially
    with 'sit on the ground in silence' produces natural English while preserving
    the lament posture.
- source_word: זִקְנֵי
  chosen: the elders
  alternatives:
  - old men
  - leaders
  lexicon: HALOT
  rationale: '''Elders'' best captures both age and communal status; ''old men'' is
    too merely biological, and ''leaders'' is too interpretive.'
- source_word: בַת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  - the daughter of Zion
  lexicon: HALOT
  rationale: This prophetic personification is preserved rather than flattened. Lowercase
    'daughter Zion' treats it as a poetic designation rather than a strict proper
    name title.
- source_word: הֶעֱלוּ עָפָר עַל רֹאשָׁם
  chosen: have thrown dust on their heads
  alternatives:
  - have cast dust on their heads
  - have lifted dust onto their heads
  lexicon: HALOT
  rationale: The idiom describes a mourning gesture. 'Thrown dust on their heads'
    is idiomatic modern English and communicates the action clearly.
- source_word: חָגְרוּ שַׂקִּים
  chosen: put on sackcloth
  alternatives:
  - girded themselves with sackcloth
  - wrapped themselves in sackcloth
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'girded sackcloths,' English idiom
    prefers the mass noun 'sackcloth.' 'Put on' is a readable equivalent for the clothing
    idiom.
- source_word: הוֹרִידוּ לָאָרֶץ רֹאשָׁן
  chosen: have bowed their heads down to the ground
  alternatives:
  - have lowered their heads to the ground
  - have brought their heads down to the ground
  lexicon: HALOT
  rationale: The phrase denotes a gesture of humiliation and grief. 'Bowed their heads
    down to the ground' is natural English and preserves the physical imagery.
- source_word: בְּתוּלֹת יְרוּשָׁלִָם
  chosen: the virgins of Jerusalem
  alternatives:
  - the young women of Jerusalem
  - the maidens of Jerusalem
  lexicon: HALOT
  rationale: בתולות most directly means 'virgins,' and the translation should not
    soften the lexical force without necessity. 'Maidens' is possible but less transparent
    in modern English; 'young women' loses the specific term.
