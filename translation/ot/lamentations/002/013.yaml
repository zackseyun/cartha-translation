id: LAM.2.13
reference: Lamentations 2:13
source:
  edition: WLC
  text: מָֽה אֲעִידֵ֞/ךְ מָ֣ה אֲדַמֶּה לָּ֗/ךְ הַ/בַּת֙ יְר֣וּשָׁלִַ֔ם מָ֤ה אַשְׁוֶה
    לָּ/ךְ֙ וַ/אֲנַֽחֲמֵ֔/ךְ בְּתוּלַ֖ת בַּת צִיּ֑וֹן כִּֽי גָד֥וֹל כַּ/יָּ֛ם שִׁבְרֵ֖/ךְ
    מִ֥י יִרְפָּא לָֽ/ךְ־־־־־־׃ס
translation:
  text: What can I testify for you? What can I compare to you, daughter Jerusalem?
    What can I liken to you, so that I may comfort you, virgin daughter Zion? For
    your fracture is as great as the sea; who can heal you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What can I bear witness to for you?' The Hebrew verb can carry a witness/testimony
      sense; the line is difficult, and some understand it more broadly as 'What can
      I say about you?'
    reason: lexical_alternative
  - marker: b
    text: Or 'your wound,' 'your ruin,' or 'your brokenness.' The Hebrew term denotes
      a breaking or collapse and is rendered here as 'fracture' to match the following
      question about healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What can I ...?
  alternatives:
  - How can I ...?
  lexicon: HALOT
  rationale: Interrogative repeated three times to express lamented inability. 'What
    can I...?' preserves the direct question more formally than smoothing to 'How
    can I...?'.
- source_word: אֲעִידֵךְ
  chosen: testify for you
  alternatives:
  - bear witness to you
  - say about you
  - admonish you
  lexicon: HALOT
  rationale: From עוד in Hiphil, likely 'bear witness/testify.' In this context the
    speaker asks what witness or example could be brought on Jerusalem's behalf. 'Testify
    for you' keeps the forensic/witness nuance while remaining readable. Because the
    idiom is difficult, alternatives are preserved in a footnote.
- source_word: אֲדַמֶּה לָּךְ
  chosen: compare to you
  alternatives:
  - liken to you
  lexicon: HALOT
  rationale: Common comparative sense of דמה. 'Compare to you' is idiomatic modern
    English.
- source_word: הַבַּת יְרוּשָׁלִַם
  chosen: daughter Jerusalem
  alternatives:
  - O daughter Jerusalem
  - fair daughter Jerusalem
  lexicon: HALOT
  rationale: Construct-like appositional address preserved. 'Daughter Jerusalem' reflects
    the personified city without adding adjectives not in the Hebrew.
- source_word: אַשְׁוֶה לָּךְ
  chosen: liken to you
  alternatives:
  - compare with you
  - match to you
  lexicon: HALOT
  rationale: A near-synonym to the previous verb, retained with slight English variation
    to reflect the Hebrew's rhetorical piling up rather than flattening all three
    questions into one expression.
- source_word: וַאֲנַחֲמֵךְ
  chosen: so that I may comfort you
  alternatives:
  - and comfort you
  - that I might console you
  lexicon: HALOT
  rationale: 'The conjunction with the imperfect here expresses purpose/result following
    the comparison: finding an analogy might enable comfort. ''So that I may comfort
    you'' makes the logic clear in English.'
- source_word: בְּתוּלַת בַּת צִיּוֹן
  chosen: virgin daughter Zion
  alternatives:
  - maiden daughter Zion
  lexicon: HALOT
  rationale: Traditional personification of the city. 'Virgin' is the plain lexical
    sense of בתולה and should be preserved rather than softened, while recognizing
    the metaphorical civic address.
- source_word: שִׁבְרֵךְ
  chosen: your fracture
  alternatives:
  - your brokenness
  - your ruin
  - your wound
  - your breach
  lexicon: HALOT
  rationale: שבר can denote breaking, fracture, collapse, or ruin. 'Fracture' preserves
    the concrete metaphor that fits the following healing language better than the
    more abstract 'ruin.' A lexical alternative is worth preserving in a footnote
    because English options vary.
- source_word: גָדוֹל כַּיָּם
  chosen: as great as the sea
  alternatives:
  - great like the sea
  - vast as the sea
  lexicon: HALOT
  rationale: Simple simile retained. 'As great as the sea' is natural and preserves
    the scale imagery.
- source_word: מִי יִרְפָּא לָךְ
  chosen: who can heal you?
  alternatives:
  - who will heal you?
  - who can restore you?
  lexicon: HALOT
  rationale: רפא is 'heal.' 'Can' fits the rhetorical question of impossibility or
    extremity better than a merely future 'will.' 'Heal' also coheres with the injury
    metaphor in שבר.
