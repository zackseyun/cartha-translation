id: LAM.2.14
reference: Lamentations 2:14
source:
  edition: WLC
  text: נְבִיאַ֗יִ/ךְ חָ֤זוּ לָ/ךְ֙ שָׁ֣וְא וְ/תָפֵ֔ל וְ/לֹֽא גִלּ֥וּ עַל עֲוֺנֵ֖/ךְ
    לְ/הָשִׁ֣יב שבית/ך וַ/יֶּ֣חֱזוּ לָ֔/ךְ מַשְׂא֥וֹת שָׁ֖וְא וּ/מַדּוּחִֽים־־׃ס
translation:
  text: Your prophets saw for you falsehood and folly, and they did not uncover your
    iniquity to restore your fortunes; instead, they saw for you false oracles and
    misleading visions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “to turn back your captivity” or “to restore your captives.”
      The Hebrew idiom often refers to restoring a people from calamity or exile.
    reason: alternative_reading
  - marker: b
    text: Or “burdens,” a traditional rendering of the prophetic term translated here
      as “oracles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאַיִךְ
  chosen: your prophets
  alternatives:
  - your prophetesses
  lexicon: HALOT
  rationale: The plural noun with 2fs suffix addresses Daughter Zion/Jerusalem as
    feminine singular. The form denotes prophets belonging to or speaking to her.
    'Your prophets' is the natural English rendering.
- source_word: חָזוּ
  chosen: saw
  alternatives:
  - envisioned
  - prophesied
  lexicon: HALOT
  rationale: The verb חזה literally means 'see' in prophetic contexts, often with
    the sense of visionary perception. 'Saw' preserves the prophetic idiom and allows
    the object to define the content of the vision.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The preposition here is best taken as advantage/reference: the prophets
    saw visions on Jerusalem''s behalf or concerning her. ''For you'' fits both occurrences
    and preserves the rhetorical address.'
- source_word: שָׁוְא
  chosen: falsehood
  alternatives:
  - vanity
  - emptiness
  - deception
  lexicon: HALOT
  rationale: The noun commonly denotes what is empty, false, or deceptive. Here it
    characterizes the content of prophetic vision as untrue and worthless. 'Falsehood'
    communicates that force clearly in modern English.
- source_word: תָפֵל
  chosen: folly
  alternatives:
  - worthlessness
  - insipidity
  - whitewash
  lexicon: HALOT
  rationale: This rare adjective/noun conveys something tasteless, unseasoned, or
    figuratively absurd/worthless. In parallel with שָׁוְא it describes the prophets'
    visions as empty and foolish. 'Folly' captures the moral-intellectual emptiness
    without overinterpreting.
- source_word: גִלּוּ עַל עֲוֺנֵךְ
  chosen: did not uncover your iniquity
  alternatives:
  - did not expose your guilt
  - did not reveal your sin
  lexicon: HALOT
  rationale: The idiom means to expose or lay bare wrongdoing. 'Iniquity' preserves
    the moral weight of עָוֹן, and 'uncover' reflects the concrete metaphor of revelation/exposure.
- source_word: לְהָשִׁיב שְׁבִיתֵךְ
  chosen: to restore your fortunes
  alternatives:
  - to turn back your captivity
  - to restore your captives
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבִית/שְׁבוּת can mean restoration from captivity or,
    more broadly, restoration of fortunes. In this context, exposing sin would have
    led to reversal of Jerusalem's calamity. 'Restore your fortunes' is idiomatic
    English while preserving the restorative sense; the captivity-oriented alternative
    is preserved in a footnote because the Hebrew idiom can be read more literally.
- source_word: וַיֶּחֱזוּ
  chosen: instead, they saw
  alternatives:
  - and they saw
  - but they saw
  lexicon: HALOT
  rationale: The waw here advances the contrast with what they failed to do. 'Instead'
    makes the adversative force explicit in readable English.
- source_word: מַשְׂאוֹת
  chosen: oracles
  alternatives:
  - burdens
  - utterances
  lexicon: HALOT
  rationale: מַשָּׂא can denote an oracle, often a prophetic pronouncement, though
    literally 'burden.' Here plural 'oracles' fits the prophetic setting better than
    the opaque traditional 'burdens.' The alternative is worth preserving because
    of the term's established prophetic usage.
- source_word: שָׁוְא
  chosen: 'false'
  alternatives:
  - empty
  - deceptive
  lexicon: HALOT
  rationale: With מַשְׂאוֹת as an attributive complement, the sense is that the oracles
    were false or empty. 'False' is the clearest concise rendering in English.
- source_word: מַדּוּחִים
  chosen: misleading visions
  alternatives:
  - delusions
  - things that lead astray
  - seductions
  lexicon: HALOT
  rationale: From a root meaning to drive away or lead astray, the noun denotes deceptive
    things that mislead. Since it parallels prophetic seeing, 'misleading visions'
    makes the implied visionary content explicit in English without changing the sense.
