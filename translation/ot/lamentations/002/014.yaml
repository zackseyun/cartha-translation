theological_decisions:
- issue: Rendering the idiom לְהָשִׁיב שְׁבִיתֵךְ
  chosen_reading: to restore your fortunes
  alternative_readings:
  - to turn back your captivity
  - to restore your captives
  rationale: The Hebrew idiom can be rendered more literally in terms of captivity,
    but in many contexts it functions as a broader restoration formula. Here the point
    is that true prophetic exposure of sin would have led to reversal of Jerusalem's
    condition. The broader idiomatic rendering best fits natural English while preserving
    the restorative sense; the more literal captivity reading is preserved in a footnote
    due to its interpretive significance.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering מַשְׂאוֹת
  chosen_reading: oracles
  alternative_readings:
  - burdens
  rationale: The traditional 'burdens' reflects the literal sense and older prophetic
    terminology, but in contemporary English it obscures that these are prophetic
    pronouncements. 'Oracles' better communicates the genre while a footnote preserves
    the traditional alternative.
  doctrine_reference: Translation philosophy §1, §6
