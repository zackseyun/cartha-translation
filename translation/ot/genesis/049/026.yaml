theological_decisions:
- issue: Interpretation of Joseph's epithet נְזִיר אֶחָיו
  chosen_reading: the one set apart from his brothers
  alternative_readings:
  - the prince among his brothers
  - the Nazirite among his brothers
  rationale: The verse poetically highlights Joseph's distinguished status among his
    brothers. Rendering the term as 'set apart' preserves the core lexical sense of
    consecration/separation without overstating a formal Nazirite institution or collapsing
    the term into a purely political title. This preserves interpretive tension rather
    than resolving it too narrowly.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
