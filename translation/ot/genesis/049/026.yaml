id: GEN.49.26
reference: Genesis 49:26
source:
  edition: WLC
  text: בִּרְכֹ֣ת אָבִ֗י/ךָ גָּֽבְרוּ֙ עַל בִּרְכֹ֣ת הוֹרַ֔/י עַֽד תַּאֲוַ֖ת גִּבְעֹ֣ת
    עוֹלָ֑ם תִּֽהְיֶ֨ין֙ לְ/רֹ֣אשׁ יוֹסֵ֔ף וּ/לְ/קָדְקֹ֖ד נְזִ֥יר אֶחָֽי/ו־־׃פ
translation:
  text: The blessings of your father have prevailed beyond the blessings of my parents,
    to the utmost bounds of the ancient hills. May they be on the head of Joseph,
    and on the crown of the head of the one set apart from his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the everlasting hills.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the prince among his brothers'; Hebrew 'the one consecrated/set apart
      from his brothers.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּרְכֹת
  chosen: blessings
  alternatives:
  - blessing
  lexicon: HALOT
  rationale: Plural construct is best represented by 'blessings,' matching the repeated
    plural form and the accumulation of bestowed benefits in the poetic context.
- source_word: אָבִיךָ
  chosen: your father
  alternatives:
  - my father
  lexicon: HALOT
  rationale: The ketiv/qere tradition and context of Jacob addressing Joseph support
    'your father' in direct address. This fits the second-person suffix in the provided
    text and the flow of the blessing speech.
- source_word: גָּבְרוּ
  chosen: have prevailed beyond
  alternatives:
  - are greater than
  - have surpassed
  lexicon: HALOT
  rationale: The verb conveys strength/superiority. 'Have prevailed beyond' preserves
    the imagery of exceeding in strength while remaining natural English.
- source_word: עַל
  chosen: beyond
  alternatives:
  - over
  - above
  - more than
  lexicon: HALOT
  rationale: With גבר in a comparative sense, 'beyond' communicates surpassing more
    idiomatically than a wooden 'over'.
- source_word: הוֹרַי
  chosen: my parents
  alternatives:
  - my progenitors
  - my ancestors
  lexicon: HALOT
  rationale: The plural participial form from 'beget' refers to those who begot Jacob.
    'My parents' is the most straightforward modern English rendering, though broader
    ancestral reference is possible.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: Introduces the extent or limit of the surpassing blessings. 'To' works
    smoothly with the following phrase in English.
- source_word: תַּאֲוַת
  chosen: utmost bounds
  alternatives:
  - desire
  - bounty
  - delight
  lexicon: HALOT
  rationale: 'In this difficult poetic phrase, the noun is commonly understood in
    a spatial/extent sense in context: the blessings extend to the furthest reaches
    of the hills. ''Utmost bounds'' captures that likely sense in idiomatic English
    while avoiding an opaque literal ''desire of.'''
- source_word: גִּבְעֹת עוֹלָם
  chosen: the ancient hills
  alternatives:
  - the everlasting hills
  - the eternal hills
  lexicon: HALOT
  rationale: The phrase denotes primeval or age-old hills. 'Ancient hills' is clear
    modern English; the traditional 'everlasting hills' remains possible and is preserved
    in a footnote because of its familiarity and poetic force.
- source_word: תִּהְיֶיןָ
  chosen: May they be
  alternatives:
  - they shall be
  - let them be
  lexicon: HALOT
  rationale: In blessing context, the imperfect has a jussive-like force. 'May they
    be' best conveys the performative wish/pronouncement.
- source_word: לְרֹאשׁ
  chosen: on the head of
  alternatives:
  - for the head of
  lexicon: HALOT
  rationale: The preposition plus 'head' in blessing formula naturally indicates the
    blessings resting upon the person.
- source_word: קָדְקֹד
  chosen: the crown of the head
  alternatives:
  - the crown
  - the scalp
  - the pate
  lexicon: HALOT
  rationale: The term refers to the top/crown of the head. The fuller phrase preserves
    the Hebrew parallelism with 'head' while remaining intelligible.
- source_word: נְזִיר אֶחָיו
  chosen: the one set apart from his brothers
  alternatives:
  - the prince among his brothers
  - the consecrated one among his brothers
  - the Nazirite among his brothers
  lexicon: HALOT
  rationale: נְזִיר fundamentally denotes one consecrated or set apart. In Joseph's
    context, 'the one set apart from his brothers' captures both his distinct status
    and the likely wordplay without importing the later technical institution of the
    Nazirite. Because 'prince' is also argued from context, it is preserved in a footnote.
