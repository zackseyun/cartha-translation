id: GEN.49.12
reference: Genesis 49:12
source:
  edition: WLC
  text: חַכְלִילִ֥י עֵינַ֖יִם מִ/יָּ֑יִן וּ/לְבֶן שִׁנַּ֖יִם מֵ/חָלָֽב־׃פ
translation:
  text: His eyes are darker than wine, and his teeth whiter than milk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His eyes are red from wine' (or 'sparkling with wine'). The rare Hebrew
      adjective חַכְלִילִי and the preposition מִן allow a traditional reading that
      connects the color to wine as cause rather than comparison.
    reason: lexical_alternative
  - marker: b
    text: Or 'His eyes are darker than wine, and his teeth whiter than milk.'.
    reason: previous_rendering
lexical_decisions:
- source_word: חַכְלִילִי
  chosen: darker
  alternatives:
  - sparkling
  - red
  - dark
  lexicon: HALOT
  rationale: The adjective is rare and debated. In parallel with 'whiter than milk'
    and modifying 'eyes,' it most plausibly describes a rich dark or lustrous appearance
    rather than intoxication. 'Darker' gives a natural English comparative sense with
    the following מִן construction ('than wine') while avoiding the less clear traditional
    'red'.
- source_word: עֵינַיִם
  chosen: eyes
  lexicon: HALOT
  rationale: Straightforward rendering of the dual noun for the eyes.
- source_word: מִיָּיִן
  chosen: than wine
  alternatives:
  - from wine
  lexicon: HALOT
  rationale: 'The preposition מִן can be comparative or causal/source. In this poetic
    blessing, the parallelism with ''whiter than milk'' strongly favors a comparative
    sense: the eyes are darker than wine.'
- source_word: וּלְבֶן
  chosen: and ... whiter
  alternatives:
  - and white
  lexicon: HALOT
  rationale: 'The adjective ''white'' is used in poetic parallelism with an implied
    comparative from the following מִן phrase. English idiom requires making the comparison
    explicit: ''whiter than.'''
- source_word: שִׁנַּיִם
  chosen: teeth
  lexicon: HALOT
  rationale: Straightforward rendering of the dual noun for teeth.
- source_word: מֵחָלָב
  chosen: than milk
  alternatives:
  - from milk
  lexicon: HALOT
  rationale: As with מִיָּיִן, the poetic parallelism supports a comparative reading
    rather than source or cause.
