id: GEN.49.5
reference: Genesis 49:5
source:
  edition: WLC
  text: שִׁמְע֥וֹן וְ/לֵוִ֖י אַחִ֑ים כְּלֵ֥י חָמָ֖ס מְכֵרֹתֵי/הֶֽם׃
translation:
  text: Simeon and Levi are brothers; weapons of violence are their swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'weapons of violence are their implements.' The Hebrew term
      rendered 'their swords' is rare and uncertain; older translations have 'their
      habitations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, per translation
    philosophy to transliterate names rather than translate them.
- source_word: וְלֵוִי
  chosen: and Levi
  lexicon: HALOT
  rationale: Conjunction plus proper name; rendered straightforwardly with standard
    English transliteration.
- source_word: אַחִים
  chosen: are brothers
  alternatives:
  - brothers
  - kinsmen
  lexicon: HALOT
  rationale: The noun means 'brothers.' Because English requires a predicate in this
    verbless clause, 'are' is supplied. 'Brothers' is preferred over broader 'kinsmen'
    because the immediate sense is literal/fraternal as well as morally associative.
- source_word: כְּלֵי
  chosen: weapons
  alternatives:
  - instruments
  - articles
  - implements
  lexicon: HALOT
  rationale: The construct plural of כְּלִי is broad ('vessels, articles, implements,
    weapons'). In this context, paired with 'violence' and followed by a difficult
    term for their implements, 'weapons' best captures the hostile sense without over-paraphrase.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence/cruelty
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence or violent wrongdoing. 'Violence' is
    the most direct and idiomatic rendering here.
- source_word: מְכֵרֹתֵיהֶם
  chosen: their swords
  alternatives:
  - their implements
  - their devices
  - their habitations
  lexicon: HALOT
  rationale: This is a notoriously difficult and rare term. In context, after 'weapons
    of violence,' many understand it as referring to instruments/weapons; 'their swords'
    gives a concrete, readable sense that fits the poetic denunciation. Because the
    lexical basis is uncertain and some traditions render it differently (notably
    'habitations' in older English versions), the alternative is preserved in a footnote.
