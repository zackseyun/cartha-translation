theological_decisions:
- issue: Nature of Issachar's subjection in the final clause
  chosen_reading: became a laborer under forced labor
  alternative_readings:
  - became a slave laborer
  - became a tributary servant
  rationale: The verse is poetic and can be read either as submission to corvée labor or to tributary servitude. The Hebrew מַס most naturally points to forced labor, so the main text reflects that. Because the exact social nuance is debated, alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpreive tension where genuine ambiguity exists)
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/049/015.json
  category: awkward_english
  tier: 1
  from: a laborer under forced labor
  to: a servant at forced labor
  rationale: The current rendering is redundant ('laborer... labor') and clunky. While it accurately reflects the two Hebrew components (`עֹבֵד` and `מַס`), the result is unnatural English. 'A servant at forced labor' is more idiomatic, uses a standard rendering for `עֹבֵד`, avoids the repetition, and still clearly conveys the meaning of subjection to a corvée system.
