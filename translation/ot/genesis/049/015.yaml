id: GEN.49.15
reference: Genesis 49:15
source:
  edition: WLC
  text: וַ/יַּ֤רְא מְנֻחָה֙ כִּ֣י ט֔וֹב וְ/אֶת הָ/אָ֖רֶץ כִּ֣י נָעֵ֑מָה וַ/יֵּ֤ט שִׁכְמ/וֹ֙ לִ/סְבֹּ֔ל וַ/יְהִ֖י לְ/מַס עֹבֵֽד־־׃ס
translation:
  text: He saw that the resting place was good, and that the land was pleasant, so he bent his shoulder to bear, and became a servant at forced labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rest was good.' The Hebrew מְנֻחָה can mean either 'rest' or 'resting place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'became a tributary servant' or 'became a slave laborer.' The Hebrew לְמַס עֹבֵד is debated; מַס often refers to forced labor or corvée.
    reason: alternative_reading
  - marker: c
    text: Or 'a laborer under forced labor'.
    reason: previous_rendering
lexical_decisions:
- source_word: מְנֻחָה
  chosen: the resting place
  alternatives:
  - rest
  - resting place
  lexicon: HALOT
  rationale: The noun can denote rest or a resting place. In parallel with 'the land,' the concrete sense 'resting place' best fits the context of Issachar perceiving a desirable territory.
- source_word: טוֹב
  chosen: good
  alternatives:
  - pleasant
  - favorable
  lexicon: HALOT
  rationale: A broad positive adjective; 'good' preserves the Hebrew's simplicity and allows the following clause to specify the land as 'pleasant.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In tribal-blessing context, 'land' naturally refers to territory rather than earth in general.
- source_word: נָעֵמָה
  chosen: pleasant
  alternatives:
  - delightful
  - lovely
  lexicon: HALOT
  rationale: Conveys attractiveness or agreeableness of the land; 'pleasant' is idiomatic and suitably restrained.
- source_word: וַיֵּט שִׁכְמוֹ
  chosen: he bent his shoulder
  alternatives:
  - he bowed his shoulder
  - he inclined his back
  lexicon: HALOT
  rationale: This idiom pictures submitting oneself to a burden. 'Bent his shoulder' is natural English while preserving the bodily image.
- source_word: לִסְבֹּל
  chosen: to bear
  alternatives:
  - to carry burdens
  - to bear a load
  lexicon: HALOT
  rationale: The infinitive expresses bearing a burden. 'To bear' keeps the concise idiomatic force and pairs well with 'shoulder.'
- source_word: לְמַס עֹבֵד
  chosen: a laborer under forced labor
  alternatives:
  - a forced laborer
  - a slave laborer
  - a tribute-paying servant
  lexicon: HALOT
  rationale: מַס commonly denotes forced labor, corvée, or labor levy rather than ordinary service. Because עֹבֵד is participial, the phrase describes becoming one who labors under such compulsion. 'Laborer under forced labor' preserves both elements without overstating chattel slavery. The alternative 'tribute-paying servant' reflects an older interpretive tradition but is less likely here because מַס often refers to labor service.
