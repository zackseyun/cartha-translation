id: GEN.49.13
reference: Genesis 49:13
source:
  edition: WLC
  text: זְבוּלֻ֕ן לְ/ח֥וֹף יַמִּ֖ים יִשְׁכֹּ֑ן וְ/הוּא֙ לְ/ח֣וֹף אֳנִיּ֔וֹת וְ/יַרְכָת֖/וֹ
    עַל צִידֹֽן־׃ס
translation:
  text: Zebulun will dwell by the shore of the seas; he will be by the shore of ships,
    and his flank will be toward Sidon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at a haven for ships.' The Hebrew more literally says 'by the shore
      of ships.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his side,' 'his border,' or 'his farthest reaches will be toward Sidon.'
      The Hebrew term can denote a side, flank, or extremity in a geographic sense.
    reason: lexical_alternative
  - marker: c
    text: '''The seas'' translates a Hebrew plural; some English versions render it
      idiomatically as singular, ''the sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבוּלֻן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: לְחֹוף
  chosen: by the shore of
  alternatives:
  - at the shore of
  - toward the shore of
  lexicon: HALOT
  rationale: The preposition לְ with חֹוף here indicates location/orientation. 'By
    the shore of' gives natural English while preserving the spatial sense better
    than a more wooden 'to the shore of.'
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - the sea
  lexicon: HALOT
  rationale: The Hebrew is plural. 'The seas' preserves the form and may reflect the
    broader maritime region rather than a single body of water. Singular 'sea' is
    possible idiomatically, but the plural is retained in the main text for transparency
    to the source.
- source_word: יִשְׁכֹּן
  chosen: will dwell
  alternatives:
  - will live
  - will settle
  lexicon: HALOT
  rationale: Qal imperfect of שכן commonly denotes dwelling/settling. 'Will dwell'
    is both natural and slightly more formal, fitting the poetic blessing context.
- source_word: וְהוּא
  chosen: he
  alternatives:
  - indeed he
  - and he
  lexicon: HALOT
  rationale: The pronoun is retained explicitly for the parallel poetic structure.
    English does not require the conjunction to be repeated as heavily, but 'he' preserves
    the emphasis and parallelism.
- source_word: לְחֹוף אֳנִיּוֹת
  chosen: by the shore of ships
  alternatives:
  - at a haven for ships
  - by the coast for ships
  lexicon: HALOT
  rationale: Literally 'to/by the shore of ships.' This preserves the imagery without
    importing the interpretive gloss 'haven,' which is traditional but more expansive
    than the Hebrew wording itself warrants.
- source_word: וְיַרְכָתוֹ
  chosen: his flank
  alternatives:
  - his side
  - his border
  - his farthest reaches
  lexicon: HALOT
  rationale: יַרְכָה can denote side, flank, remote part, or extremity. In a territorial/geographical
    context, 'flank' preserves the concrete metaphor and avoids over-specifying a
    technical boundary term. Because the referent may be territorial, alternatives
    are preserved in a footnote.
- source_word: עַל
  chosen: toward
  alternatives:
  - upon
  - against
  - as far as
  lexicon: HALOT
  rationale: With a place name in this geographic statement, עַל likely expresses
    orientation/extension rather than literal superposition. 'Toward' is idiomatic
    and cautious.
- source_word: צִידֹן
  chosen: Sidon
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention.
