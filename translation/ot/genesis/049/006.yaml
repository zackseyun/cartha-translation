id: GEN.49.6
reference: Genesis 49:6
source:
  edition: WLC
  text: בְּ/סֹדָ/ם֙ אַל תָּבֹ֣א נַפְשִׁ֔/י בִּ/קְהָלָ֖/ם אַל תֵּחַ֣ד כְּבֹדִ֑/י כִּ֤י
    בְ/אַפָּ/ם֙ הָ֣רְגוּ אִ֔ישׁ וּ/בִ/רְצֹנָ֖/ם עִקְּרוּ שֽׁוֹר־־־׃
translation:
  text: Let my soul not enter their council; let my honor not be joined to their assembly.
    For in their anger they killed a man, and in their self-will they hamstrung an
    ox.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their secret council'; סוֹד can carry the sense of a confidential or
      intimate council.
    reason: lexical_alternative
  - marker: b
    text: Or 'let my glory not be united to their assembly.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew שׁוֹר is traditionally read 'ox.' Some interpret the consonants differently
      and render the line 'they tore down a wall.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּסֹדָם
  chosen: their council
  alternatives:
  - their secret council
  - their counsel
  lexicon: HALOT
  rationale: סוֹד can denote a confidential council, intimate circle, or counsel.
    In parallel with קָהָל ('assembly'), 'council' best preserves the sense of a deliberative
    group without overcommitting to secrecy, though that nuance remains possible.
- source_word: תָּבֹא נַפְשִׁי
  chosen: let my soul not enter
  alternatives:
  - may I not enter
  - let me not enter
  lexicon: HALOT
  rationale: The jussive with אַל expresses a wish/prohibition. Retaining 'my soul'
    reflects the Hebrew idiom and poetic force rather than flattening it to simply
    'I.'
- source_word: בִּקְהָלָם
  chosen: their assembly
  alternatives:
  - their congregation
  - their company
  lexicon: HALOT
  rationale: קָהָל commonly means assembly or gathered company. 'Assembly' is natural
    modern English and preserves the parallelism with 'council.'
- source_word: תֵּחַד כְּבֹדִי
  chosen: let my honor not be joined
  alternatives:
  - let my glory not be united
  - let my honor not be associated
  lexicon: HALOT
  rationale: יחד here is best taken in the sense of being united or joined. כָּבוֹד
    can mean glory, honor, or reputation; 'honor' fits Jacob's self-distancing from
    their violent deed in idiomatic English.
- source_word: בְאַפָּם
  chosen: in their anger
  alternatives:
  - in their wrath
  - when angry
  lexicon: HALOT
  rationale: אַף literally refers to nose/anger and idiomatically means anger or wrath.
    'In their anger' is a clear and natural rendering.
- source_word: הָרְגוּ אִישׁ
  chosen: they killed a man
  alternatives:
  - they slew a man
  lexicon: HALOT
  rationale: The singular אִישׁ is retained as 'a man.' This likely alludes to the
    Shechem incident and should not be generalized away.
- source_word: וּבִרְצֹנָם
  chosen: in their self-will
  alternatives:
  - at their pleasure
  - in their willfulness
  lexicon: HALOT
  rationale: רָצוֹן often means pleasure, favor, or will. In this negative context,
    'self-will' captures the sense of willful, unrestrained intent behind the action.
- source_word: עִקְּרוּ
  chosen: they hamstrung
  alternatives:
  - they crippled
  - they uprooted
  lexicon: HALOT
  rationale: The verb עקר in this context is traditionally understood as hamstringing/maiming
    animals, fitting the object שׁוֹר. 'Hamstrung' is specific and reflects the likely
    concrete action.
- source_word: שׁוֹר
  chosen: an ox
  alternatives:
  - a bull
  lexicon: HALOT
  rationale: שׁוֹר denotes an ox/bull. 'Ox' is the more general and traditional rendering
    here, especially with the idiom 'hamstrung an ox.'
