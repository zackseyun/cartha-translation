theological_decisions:
- issue: Rendering of כָּבוֹדִי in a self-referential poetic curse/distancing formula
  chosen_reading: my honor
  alternative_readings:
  - my glory
  rationale: The verse is poetic and expresses Jacob's repudiation of Simeon and Levi's
    violence. 'My honor' communicates personal dignity/reputation in contemporary
    English without importing later theological overtones that 'glory' may carry.
  doctrine_reference: Translation philosophy §§5–6
- issue: Interpretation of שׁוֹר in the final colon
  chosen_reading: an ox
  alternative_readings:
  - a wall
  rationale: Although some interpreters, ancient and modern, connect the consonants
    with a different sense yielding 'wall,' the Masoretic pointing reads שׁוֹר ('ox'),
    and the collocation with עקר supports the traditional understanding of hamstringing
    an animal. The alternative is preserved in a footnote because it is a notable
    interpretive option.
  doctrine_reference: Translation philosophy §3
