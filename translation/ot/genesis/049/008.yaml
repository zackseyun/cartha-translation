theological_decisions:
- issue: Meaning of homage language in יִשְׁתַּחֲווּ לְךָ
  chosen_reading: human bowing in submission/honor, not divine worship
  alternative_readings:
  - worship language if read more strongly
  rationale: Because the addressee is Judah within Jacob's blessing, the verb should
    be rendered as homage rather than worship. This avoids importing theological claims
    not made by the text while preserving the royal-submission nuance that later biblical
    theology may develop.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
