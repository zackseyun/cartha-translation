id: GEN.49.8
reference: Genesis 49:8
source:
  edition: WLC
  text: יְהוּדָ֗ה אַתָּה֙ יוֹד֣וּ/ךָ אַחֶ֔י/ךָ יָדְ/ךָ֖ בְּ/עֹ֣רֶף אֹיְבֶ֑י/ךָ יִשְׁתַּחֲוּ֥וּ
    לְ/ךָ֖ בְּנֵ֥י אָבִֽי/ךָ׃
translation:
  text: Judah, your brothers will praise you; your hand will be on the neck of your
    enemies; the sons of your father will bow down to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will give thanks to you.' The Hebrew verb can denote giving thanks,
      confessing, or praising; here 'praise' best fits the blessing and the wordplay
      on Judah's name.
    reason: lexical_alternative
  - marker: b
    text: Or 'your father’s sons will bow down to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    in keeping with the policy to transliterate names rather than translate them.
- source_word: יוֹדוּךָ
  chosen: will praise you
  alternatives:
  - will give thanks to you
  - will confess you
  lexicon: HALOT
  rationale: Hiphil of ידה here carries the sense of praising or acknowledging with
    honor. 'Praise' fits the wordplay with Judah's name and the blessing context better
    than the more wooden 'give thanks to.'
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your kin
  lexicon: HALOT
  rationale: Masculine plural noun with 2ms suffix. 'Brothers' is gender-accurate
    to the Hebrew form and suits the immediate familial context of Jacob's sons; broader
    inclusive renderings would soften the source wording.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Retained literally. In context it signifies power or mastery, but the
    concrete image should be preserved in translation.
- source_word: בְּעֹרֶף אֹיְבֶיךָ
  chosen: on the neck of your enemies
  alternatives:
  - on the back of your enemies
  - against the neck of your enemies
  lexicon: HALOT
  rationale: עֹרֶף denotes the neck or nape. 'On the neck' preserves the idiom of
    conquest and domination more clearly than 'back.'
- source_word: יִשְׁתַּחֲווּ לְךָ
  chosen: will bow down to you
  alternatives:
  - will prostrate themselves before you
  - will worship you
  lexicon: HALOT
  rationale: The verb can denote bowing in homage or worship depending on context.
    Here the setting is familial and royal honor, not divine worship, so 'bow down
    to you' best preserves the act without importing cultic meaning.
- source_word: בְּנֵי אָבִיךָ
  chosen: the sons of your father
  alternatives:
  - your father's sons
  - the children of your father
  lexicon: HALOT
  rationale: Literally 'sons of your father.' This idiom refers to Judah's brothers.
    The more literal phrasing is preserved in the main text for transparency, while
    remaining natural English.
