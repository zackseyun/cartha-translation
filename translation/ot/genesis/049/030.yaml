id: GEN.49.30
reference: Genesis 49:30
source:
  edition: WLC
  text: בַּ/מְּעָרָ֞ה אֲשֶׁ֨ר בִּ/שְׂדֵ֧ה הַ/מַּכְפֵּלָ֛ה אֲשֶׁ֥ר עַל פְּנֵי מַמְרֵ֖א
    בְּ/אֶ֣רֶץ כְּנָ֑עַן אֲשֶׁר֩ קָנָ֨ה אַבְרָהָ֜ם אֶת הַ/שָּׂדֶ֗ה מֵ/אֵ֛ת עֶפְרֹ֥ן
    הַ/חִתִּ֖י לַ/אֲחֻזַּת קָֽבֶר־־־־׃
translation:
  text: in the cave that is in the field of Machpelah, which is opposite Mamre, in
    the land of Canaan, which Abraham bought with the field from Ephron the Hittite
    as a burial property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing Mamre' or 'before Mamre'; the Hebrew expression denotes a location
      in relation to Mamre.
    reason: lexical_alternative
  - marker: b
    text: Literally 'which Abraham bought the field from Ephron the Hittite'; the
      wording reflects that the cave was purchased together with the field.
    reason: lexical_alternative
  - marker: c
    text: Or 'for a burial possession.' The Hebrew emphasizes a legally held property
      designated for burial.
    reason: lexical_alternative
  - marker: d
    text: Or 'which Abraham bought with the field'.
    reason: previous_rendering
lexical_decisions:
- source_word: בַּמְּעָרָה
  chosen: in the cave
  alternatives:
  - in the cavern
  lexicon: HALOT
  rationale: 'The prefixed preposition ב plus the definite noun indicates location:
    ''in the cave.'' ''Cave'' is the natural modern English equivalent; ''cavern''
    is possible but less idiomatic here.'
- source_word: אֲשֶׁר בִּשְׂדֵה הַמַּכְפֵּלָה
  chosen: that is in the field of Machpelah
  alternatives:
  - which is in the field of Machpelah
  lexicon: HALOT
  rationale: The relative clause identifies the cave's location. 'Machpelah' is transliterated
    as a place name in keeping with the philosophy of transliterating names. 'That
    is' reads naturally while preserving the restrictive force.
- source_word: עַל פְּנֵי מַמְרֵא
  chosen: opposite Mamre
  alternatives:
  - before Mamre
  - facing Mamre
  - near Mamre
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי commonly denotes spatial relation such as 'opposite'
    or 'facing.' 'Opposite Mamre' best preserves the locative sense without overinterpreting
    as mere proximity.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  lexicon: HALOT
  rationale: A straightforward geographic phrase; 'land of Canaan' is the standard
    and accurate rendering.
- source_word: אֲשֶׁר קָנָה אַבְרָהָם
  chosen: which Abraham bought
  alternatives:
  - which Abraham acquired
  lexicon: HALOT
  rationale: קנה in this context refers to purchase. 'Bought' is more specific and
    idiomatic than 'acquired,' matching the transaction described in Genesis 23.
- source_word: אֶת הַשָּׂדֶה
  chosen: with the field
  alternatives:
  - the field
  - along with the field
  lexicon: HALOT
  rationale: Although the direct-object marker אֶת marks 'the field' as the object,
    English style here benefits from making explicit that Abraham purchased not only
    the cave but the field containing it, as in the broader narrative. 'With the field'
    captures the sense economically while remaining faithful to the syntax and context.
- source_word: מֵאֵת עֶפְרֹן הַחִתִּי
  chosen: from Ephron the Hittite
  lexicon: HALOT
  rationale: מֵאֵת marks the seller/source in a purchase transaction. 'The Hittite'
    is a gentilic title and should be translated, while 'Ephron' is transliterated
    as a personal name.
- source_word: לַאֲחֻזַּת קָבֶר
  chosen: as a burial property
  alternatives:
  - for a burial possession
  - as a burial site
  - for a family grave holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or property holding, and קֶבֶר means grave/burial.
    'Burial property' preserves the legal-possession nuance better than the simpler
    'burial site,' while remaining readable modern English.
