id: GEN.49.9
reference: Genesis 49:9
source:
  edition: WLC
  text: גּ֤וּר אַרְיֵה֙ יְהוּדָ֔ה מִ/טֶּ֖רֶף בְּנִ֣/י עָלִ֑יתָ כָּרַ֨ע רָבַ֧ץ כְּ/אַרְיֵ֛ה
    וּ/כְ/לָבִ֖יא מִ֥י יְקִימֶֽ/נּוּ׃
translation:
  text: Judah is a lion’s cub; from the prey, my son, you have gone up. He crouched,
    he lay down like a lion, and like a lioness—who will rouse him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and like a great lion.' The Hebrew word here differs from the earlier
      word for 'lion,' and many translations preserve the distinction as 'lioness'
      or 'great lion.'
    reason: lexical_alternative
  - marker: b
    text: The lion imagery for Judah is often read typologically in connection with
      later royal and messianic hope, but the verse itself speaks directly of Judah
      in Jacob's blessing.
    reason: cross_reference
lexical_decisions:
- source_word: גּוּר
  chosen: cub
  alternatives:
  - whelp
  - young lion
  lexicon: HALOT
  rationale: The noun denotes a young animal; in construct with אַרְיֵה it forms the
    idiom 'lion’s cub.' 'Cub' is natural modern English and preserves the metaphor's
    force better than archaic 'whelp.'
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Standard term for 'lion.' In the opening construct phrase it yields 'lion’s
    cub'; later with כְּ it is comparative, 'like a lion.'
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Personal/tribal name is transliterated per project philosophy.
- source_word: מִטֶּרֶף
  chosen: from the prey
  alternatives:
  - from prey
  - from tearing prey
  lexicon: HALOT
  rationale: טֶרֶף refers to prey torn/captured by a predator. 'From the prey' is
    concise and idiomatic, preserving the predatory image.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - O my son
  lexicon: HALOT
  rationale: Taken as a direct address by Jacob to Judah. 'My son' preserves both
    the familial and poetic force without adding an interjection not explicit in the
    Hebrew.
- source_word: עָלִיתָ
  chosen: you have gone up
  alternatives:
  - you ascended
  - you came up
  lexicon: HALOT
  rationale: Literal upward motion is retained. In context it likely pictures the
    lion going up from the kill to a secure resting place; 'gone up' keeps the imagery
    without over-interpreting.
- source_word: כָּרַע
  chosen: he crouched
  alternatives:
  - he bowed down
  - he bent down
  lexicon: HALOT
  rationale: In animal imagery the verb suggests crouching down rather than worshipful
    bowing. 'He crouched' fits the lion metaphor.
- source_word: רָבַץ
  chosen: he lay down
  alternatives:
  - he stretched out
  - he lay crouched
  lexicon: HALOT
  rationale: Common verb for an animal lying down/resting. 'Lay down' is clear and
    natural in English.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  lexicon: HALOT
  rationale: Straightforward comparative use of the noun with prefixed כְּ.
- source_word: וּכְלָבִיא
  chosen: and like a lioness
  alternatives:
  - and like a great lion
  - and like a lion
  lexicon: HALOT
  rationale: לָבִיא often denotes a mature, powerful lion and is frequently rendered
    'lioness' in English tradition. Here 'lioness' preserves the lexical distinction
    from אַרְיֵה and matches common Hebrew poetic pairing, while still conveying ferocity.
- source_word: מִי יְקִימֶנּוּ
  chosen: who will rouse him?
  alternatives:
  - who will awaken him?
  - who dares stir him up?
  lexicon: HALOT
  rationale: The Hiphil of קום here means to cause to rise, i.e., to rouse/stir up.
    'Rouse' is vivid and idiomatic; 'dares' is interpretive and therefore left as
    an alternative rather than placed in the main text.
