theological_decisions:
- issue: Messianic or tribal reference of Judah imagery
  chosen_reading: Primary sense kept at the level of Jacob's blessing over Judah/tribe
    without making an explicit messianic claim in the translation.
  alternative_readings:
  - A typological/messianic reading connecting Judah's lion imagery to later royal
    and messianic expectation
  rationale: The verse itself poetically blesses Judah with leonine strength and dominance.
    While later biblical theology may develop this imagery messianically, the translation
    should not import that conclusion into the main text where the Hebrew does not
    state it explicitly.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; never import doctrinal claims the text does not make.'
