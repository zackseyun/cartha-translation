id: GEN.49.14
reference: Genesis 49:14
source:
  edition: WLC
  text: יִשָּׂשכָ֖ר חֲמֹ֣ר גָּ֑רֶם רֹבֵ֖ץ בֵּ֥ין הַֽ/מִּשְׁפְּתָֽיִם׃
translation:
  text: Issachar is a strong-boned donkey, lying down between the sheepfolds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between the saddlebags.' The Hebrew term is rare and its meaning is
      debated; 'sheepfolds' is the traditional and likely contextual sense in this
      pastoral blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: חֲמֹר
  chosen: donkey
  alternatives:
  - male donkey
  - ass
  lexicon: HALOT
  rationale: The basic sense is 'donkey.' 'Ass' is traditional but archaic in modern
    English; 'male donkey' is overly explicit for the poetic line. 'Donkey' is clear
    and natural.
- source_word: גָּרֶם
  chosen: strong-boned
  alternatives:
  - bony
  - rawboned
  - of bone
  lexicon: HALOT
  rationale: In this poetic construction with 'donkey,' the noun 'bone' functions
    adjectivally, describing sturdy physical build rather than merely skeletal thinness.
    'Strong-boned' preserves the concrete imagery while communicating the likely sense
    better than the more ambiguous 'bony.'
- source_word: רֹבֵץ
  chosen: lying down
  alternatives:
  - crouching
  - resting
  lexicon: HALOT
  rationale: The participle denotes an animal lying or crouching down. 'Lying down'
    is the most natural English rendering here and fits the pastoral image.
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'between'; no contextual pressure
    requires a looser rendering.
- source_word: הַמִּשְׁפְּתָיִם
  chosen: the sheepfolds
  alternatives:
  - the saddlebags
  - the campfires
  - the boundary markers
  lexicon: HALOT
  rationale: This rare dual/plural form is traditionally understood as 'sheepfolds'
    or related livestock enclosures, likely from a root associated with sheep pens.
    Because the term is lexically difficult and debated, the main text keeps the widely
    accepted pastoral sense, while alternatives are preserved in a footnote for auditability.
