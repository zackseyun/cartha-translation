id: GEN.49.23
reference: Genesis 49:23
source:
  edition: WLC
  text: וַֽ/יְמָרֲרֻ֖/הוּ וָ/רֹ֑בּוּ וַֽ/יִּשְׂטְמֻ֖/הוּ בַּעֲלֵ֥י חִצִּֽים׃
translation:
  text: They bitterly attacked him, and shot at him, and hated him—archers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They embittered him, and attacked him, and hated him, the archers.'
      The Hebrew of the middle verb is difficult; it may also be understood more generally
      as 'contended with him' or 'assailed him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָרֲרֻהוּ
  chosen: they bitterly attacked him
  alternatives:
  - they embittered him
  - they provoked him bitterly
  - they harassed him
  lexicon: HALOT
  rationale: 'From מרר in the piel with 3ms object suffix, the sense is causative/intensive:
    to make bitter, embitter, or treat bitterly. In context with the following hostile
    verbs, an idiomatic English rendering that conveys hostile action rather than
    internal emotion alone is preferable. ''Bitterly attacked him'' preserves the
    bitterness nuance while reading naturally in English.'
- source_word: וָרֹבּוּ
  chosen: and shot at him
  alternatives:
  - and contended with him
  - and were many against him
  - and assailed him
  lexicon: HALOT
  rationale: The consonantal form from רבה is difficult in isolation, since the common
    qal perfect would mean 'they were many.' In this poetic context, however, the
    parallelism with 'hated him' and 'archers' strongly supports the traditional sense
    of hostile assault, often understood as 'shot at him' or 'contended with him.'
    'Shot at him' fits the immediate imagery completed by 'archers' in the next phrase.
- source_word: וַיִּשְׂטְמֻהוּ
  chosen: and hated him
  alternatives:
  - and were hostile toward him
  - and bore a grudge against him
  lexicon: HALOT
  rationale: From שטם, denoting enmity, hostility, or hatred. 'Hated him' is the clearest
    concise English equivalent and matches the hostile progression of the verse.
- source_word: בַּעֲלֵי
  chosen: archers
  alternatives:
  - masters of
  - lords of
  - owners of
  lexicon: HALOT
  rationale: Literally 'masters/possessors of,' but in construct with 'arrows' it
    forms an idiom for those characterized by arrows, i.e., archers. Rendering the
    idiom directly avoids wooden English.
- source_word: חִצִּים
  chosen: archers
  alternatives:
  - arrows
  lexicon: HALOT
  rationale: Literally 'arrows.' Because the phrase בַּעֲלֵי חִצִּים is idiomatic,
    the lexical content is carried into the compound rendering 'archers' rather than
    translated separately as 'owners of arrows.'
