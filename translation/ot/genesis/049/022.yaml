id: GEN.49.22
reference: Genesis 49:22
source:
  edition: WLC
  text: בֵּ֤ן פֹּרָת֙ יוֹסֵ֔ף בֵּ֥ן פֹּרָ֖ת עֲלֵי עָ֑יִן בָּנ֕וֹת צָעֲדָ֖ה עֲלֵי שֽׁוּר־־׃
translation:
  text: Joseph is a fruitful son, a fruitful son by a spring; daughters step over
    the wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Joseph is a fruitful bough, a fruitful bough by a spring.' The Hebrew
      is poetic and compressed; the traditional 'bough' rendering interprets the imagery
      more explicitly.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'daughters.' This may be understood metaphorically of branches
      or shoots extending over a wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  chosen: son
  alternatives:
  - branch
  lexicon: HALOT
  rationale: The plain sense of בֵּן is 'son.' Although some English versions render
    the phrase idiomatically as 'fruitful bough,' that requires taking בֵּן in an
    extended metaphorical sense. Here 'son' preserves the Hebrew wording and lets
    the poetic imagery remain slightly compressed.
- source_word: פֹּרָת
  chosen: fruitful
  alternatives:
  - fruit-bearing
  - bough
  lexicon: HALOT
  rationale: From the root פרה ('to be fruitful'). 'Fruitful' best reflects the verbal/adjectival
    force. 'Bough' is interpretive and likely influenced by the surrounding imagery
    rather than the form itself.
- source_word: בֵּן פֹּרָת
  chosen: a fruitful son
  alternatives:
  - a fruitful bough
  - a son of fruitfulness
  lexicon: HALOT
  rationale: The collocation is poetic and somewhat elliptical. 'A fruitful son' keeps
    the lexical value of both words while remaining readable English. The more traditional
    'fruitful bough' is preserved as an alternative because it is a longstanding interpretive
    rendering.
- source_word: עֲלֵי עָיִן
  chosen: by a spring
  alternatives:
  - by a fountain
  - over an eye
  lexicon: HALOT
  rationale: 'עַיִן commonly means ''spring, fountain'' as well as ''eye.'' In this
    agricultural blessing context, ''spring'' fits the fertility imagery naturally.
    The preposition-plus-noun phrase is rendered idiomatically as location: ''by a
    spring.'''
- source_word: בָּנוֹת
  chosen: daughters
  alternatives:
  - branches
  - shoots
  lexicon: HALOT
  rationale: Lexically the word means 'daughters.' Some translations take it metaphorically
    for offshoots/branches in the vine imagery, but the Hebrew term itself is 'daughters.'
    Retaining 'daughters' preserves the poetic metaphor rather than resolving it.
- source_word: צָעֲדָה
  chosen: step
  alternatives:
  - march
  - climb
  - run
  lexicon: HALOT
  rationale: The verb denotes stepping or striding. 'Step' is the most natural concise
    rendering in English and suits the image of extending beyond a boundary.
- source_word: עֲלֵי שׁוּר
  chosen: over the wall
  alternatives:
  - over a wall
  - upon the wall
  lexicon: HALOT
  rationale: שׁוּר here is best taken as 'wall.' The phrase pictures luxuriant growth
    extending beyond confinement. 'The wall' reads naturally in English for the poetic
    image.
