id: GEN.49.19
reference: Genesis 49:19
source:
  edition: WLC
  text: גָּ֖ד גְּד֣וּד יְגוּדֶ֑/נּוּ וְ/ה֖וּא יָגֻ֥ד עָקֵֽב׃ס
translation:
  text: Gad—a raiding band will raid him, but he will raid at their heels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew uses a wordplay on Gad, 'raiding band,' and 'raid' (gad / gedud /
      yagud).
    reason: lexical_alternative
  - marker: b
    text: Or 'Gad, raiders will raid him, but he will raid at the heel'—the final
      phrase may mean striking from behind or pursuing in the rear.
    reason: alternative_reading
lexical_decisions:
- source_word: גָּד
  chosen: Gad
  lexicon: HALOT
  rationale: Proper name of Jacob's son/tribe; transliterated per translation philosophy
    for personal/tribal names.
- source_word: גְּדוּד
  chosen: a raiding band
  alternatives:
  - a troop
  - raiders
  - a marauding band
  lexicon: HALOT
  rationale: The noun denotes a band of raiders or troops. 'Raiding band' preserves
    the wordplay with the following verb גדד while sounding natural in modern English.
    'Troop' is traditional but less specific.
- source_word: יְגוּדֶנּוּ
  chosen: will raid him
  alternatives:
  - will attack him
  - will press upon him
  lexicon: HALOT
  rationale: Qal imperfect of גדד with 3ms suffix. In this context of גְּדוּד, the
    sense is hostile incursion/raiding. 'Will raid him' keeps the paronomasia with
    גְּדוּד and the later יָגֻד.
- source_word: וְהוּא
  chosen: but he
  alternatives:
  - and he
  lexicon: HALOT
  rationale: Though waw can be simply conjunctive, English idiom and the adversative
    sense of the line favor 'but he,' highlighting the reversal between being raided
    and counter-raiding.
- source_word: יָגֻד
  chosen: will raid
  alternatives:
  - will attack
  - will press
  lexicon: HALOT
  rationale: Same verbal root as earlier in the verse; rendered consistently to preserve
    the Hebrew wordplay and reciprocal action.
- source_word: עָקֵב
  chosen: at their heels
  alternatives:
  - at the heel
  - in the rear
  - on their heels
  lexicon: HALOT
  rationale: Literally 'heel,' used idiomatically for the rear or aftermath. 'At their
    heels' conveys pursuit from behind in idiomatic English and reflects the singular
    collective sense against the raiding band.
