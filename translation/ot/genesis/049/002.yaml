theological_decisions:
- issue: Rendering the parallel names Jacob / Israel
  chosen_reading: 'Retain both names distinctly in the main text: ''sons of Jacob
    ... Israel your father'''
  alternative_readings:
  - Harmonize to one name only for smoothness
  rationale: The Hebrew deliberately uses both names in parallel, likely for poetic
    emphasis and covenantal resonance. The translation preserves this tension rather
    than flattening it.
  doctrine_reference: Translation philosophy §3, §2
