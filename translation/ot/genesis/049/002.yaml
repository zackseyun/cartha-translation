id: GEN.49.2
reference: Genesis 49:2
source:
  edition: WLC
  text: הִקָּבְצ֥וּ וְ/שִׁמְע֖וּ בְּנֵ֣י יַעֲקֹ֑ב וְ/שִׁמְע֖וּ אֶל יִשְׂרָאֵ֥ל אֲבִי/כֶֽם־׃
translation:
  text: Gather yourselves and listen, sons of Jacob; listen to Israel your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Assemble yourselves and hear, sons of Jacob; and hear Israel, your father.'
      The Hebrew repeats the command for emphasis, and 'hear' is a more formal alternative
      to 'listen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקָּבְצוּ
  chosen: Gather yourselves
  alternatives:
  - Assemble yourselves
  - Come together
  lexicon: HALOT
  rationale: Niphal imperative plural of קבץ calls the sons to gather themselves together.
    'Gather yourselves' preserves the reflexive/passive nuance more closely than a
    simple 'gather.'
- source_word: שִׁמְעוּ
  chosen: listen
  alternatives:
  - hear
  - pay attention
  lexicon: HALOT
  rationale: The imperative here calls for attentive hearing, not mere auditory reception.
    'Listen' is natural modern English and fits the exhortational force.
- source_word: בְּנֵי יַעֲקֹב
  chosen: sons of Jacob
  alternatives:
  - children of Jacob
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct, referring to Jacob's
    male offspring gathered for blessing. Per gender-accurate policy, 'sons' is preferred
    over the more neutral 'children'.
- source_word: שִׁמְעוּ אֶל
  chosen: listen to
  alternatives:
  - hear
  - give ear to
  lexicon: HALOT
  rationale: The repetition with אֶל intensifies the call to heed the speaker. 'Listen
    to' best reflects the idiom in readable English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by transliteration. Here it is Jacob's covenant
    name, used in parallel with 'Jacob' for poetic and rhetorical effect.
- source_word: אֲבִיכֶם
  chosen: your father
  lexicon: HALOT
  rationale: 'Straightforward possessive construction. Placed after ''Israel'' in
    English to preserve the appositional sense: ''Israel your father.'''
