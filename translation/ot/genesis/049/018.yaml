id: GEN.49.18
reference: Genesis 49:18
source:
  edition: WLC
  text: לִֽ/ישׁוּעָתְ/ךָ֖ קִוִּ֥יתִי יְהוָֽה׃
translation:
  text: I wait for your salvation, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have waited for your deliverance, O Yahweh.' The Hebrew can also be
      rendered with 'deliverance' for 'salvation,' and the divine name is literally
      YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִישׁוּעָתְךָ
  chosen: for your salvation
  alternatives:
  - for your deliverance
  - for your victory
  lexicon: HALOT
  rationale: The noun יְשׁוּעָה commonly denotes salvation or deliverance. In this
    poetic context, 'salvation' best preserves the broader theological and existential
    sense without narrowing it to military rescue alone. The prefixed ל is not separately
    represented in English because 'wait for' naturally incorporates the object of
    expectation.
- source_word: קִוִּיתִי
  chosen: I wait
  alternatives:
  - I have waited
  - I hope for
  lexicon: HALOT
  rationale: The verb קוה expresses waiting with hope or expectation. English present
    'I wait' works idiomatically in this brief poetic exclamation and conveys ongoing
    expectancy; 'I have waited' is possible but sounds more retrospective than the
    Hebrew necessarily requires here.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.' Because this is direct address, 'O LORD' is the most natural English
    vocative form.
