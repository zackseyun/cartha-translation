id: GEN.49.17
reference: Genesis 49:17
source:
  edition: WLC
  text: יְהִי דָן֙ נָחָ֣שׁ עֲלֵי דֶ֔רֶךְ שְׁפִיפֹ֖ן עֲלֵי אֹ֑רַח הַ/נֹּשֵׁךְ֙ עִקְּבֵי
    ס֔וּס וַ/יִּפֹּ֥ל רֹכְב֖/וֹ אָחֽוֹר־־־־׃
translation:
  text: Let Dan be a serpent by the road, a viper by the path, that bites the horse’s
    heels so that its rider falls backward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adder' for the rare Hebrew word שְׁפִיפֹן; the precise species is uncertain,
      but the sense is a dangerous snake.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: Let ... be
  alternatives:
  - shall be
  - may ... be
  lexicon: HALOT
  rationale: Qal jussive of היה expresses a wish/declaration in Jacob’s blessing.
    'Let Dan be' preserves the volitional nuance better than a flat future, while
    remaining natural English.
- source_word: דָן
  chosen: Dan
  rationale: Proper name of Jacob’s son/tribe; transliterated according to the translation
    philosophy for names.
- source_word: נָחָשׁ
  chosen: serpent
  alternatives:
  - snake
  lexicon: HALOT
  rationale: Refers broadly to a snake/serpent. 'Serpent' fits the elevated poetic
    register of the blessing and pairs well with the following more specific term.
- source_word: עֲלֵי דֶרֶךְ
  chosen: by the road
  alternatives:
  - upon the road
  - along the road
  lexicon: HALOT
  rationale: The preposition with 'road' locates the serpent at the roadside/in relation
    to the road. 'By the road' is idiomatic English and suits the ambush imagery.
- source_word: שְׁפִיפֹן
  chosen: viper
  alternatives:
  - horned snake
  - adder
  lexicon: HALOT
  rationale: A rare term for a kind of snake, likely emphasizing a venomous species.
    'Viper' communicates danger clearly in modern English without overclaiming a precise
    zoological identification. 'Adder' is traditional but less transparent to many
    readers.
- source_word: עֲלֵי אֹרַח
  chosen: by the path
  alternatives:
  - upon the path
  - along the path
  lexicon: HALOT
  rationale: Parallel to 'by the road'; 'path' preserves the poetic synonymy between
    דֶרֶךְ and אֹרַח without flattening them into identical English terms.
- source_word: הַנֹּשֵׁךְ
  chosen: that bites
  alternatives:
  - biting
  - which bites
  lexicon: HALOT
  rationale: Substantival/participial form describing the serpent/viper by its action.
    'That bites' reads smoothly in English and preserves the descriptive force.
- source_word: עִקְּבֵי סוּס
  chosen: the horse’s heels
  alternatives:
  - the heels of a horse
  - a horse’s heels
  lexicon: HALOT
  rationale: Construct phrase meaning the hind/heel area of the horse. The singular
    'horse' is generic. Definite 'the horse’s heels' works naturally in the image.
- source_word: וַיִּפֹּל
  chosen: so that ... falls
  alternatives:
  - and ... falls
  - then ... falls
  lexicon: HALOT
  rationale: The waw-consecutive advances the result of the bite. In English, 'so
    that' makes the causal/resultative relationship explicit and natural in the poetic
    simile.
- source_word: רֹכְבוֹ
  chosen: its rider
  alternatives:
  - his rider
  - the one riding it
  lexicon: HALOT
  rationale: Suffix most naturally refers to the horse. English 'its rider' avoids
    ambiguity and matches the immediate antecedent.
- source_word: אָחוֹר
  chosen: backward
  alternatives:
  - backwards
  - behind
  lexicon: HALOT
  rationale: Describes the direction of the rider’s fall. 'Backward' is the most idiomatic
    adverbial choice in this register.
