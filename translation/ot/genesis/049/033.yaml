id: GEN.49.33
reference: Genesis 49:33
source:
  edition: WLC
  text: וַ/יְכַ֤ל יַעֲקֹב֙ לְ/צַוֺּ֣ת אֶת בָּנָ֔י/ו וַ/יֶּאֱסֹ֥ף רַגְלָ֖י/ו אֶל הַ/מִּטָּ֑ה
    וַ/יִּגְוַ֖ע וַ/יֵּאָ֥סֶף אֶל עַמָּֽי/ו־־־׃
translation:
  text: When Jacob finished commanding his sons, he drew his feet up into the bed,
    breathed his last, and was gathered to his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he gathered his feet into the bed.' The Hebrew uses an idiom with 'gathered.'
    reason: lexical_alternative
  - marker: b
    text: '''Was gathered to his people'' is a Hebrew expression associated with death
      and reunion with one''s people; it is more than a simple statement of burial.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְכַל
  chosen: finished
  alternatives:
  - completed
  - came to an end
  lexicon: HALOT
  rationale: The verb כלה in the wayyiqtol here marks the completion of Jacob's act
    of speaking/instructing. 'Finished' is natural modern English and preserves the
    sequential narrative force.
- source_word: לְצַוֹּת
  chosen: commanding
  alternatives:
  - instructing
  - charging
  lexicon: HALOT
  rationale: צוה commonly means 'command' or 'charge.' In this context Jacob is giving
    solemn final directives/blessings to his sons. 'Commanding' stays close to the
    Hebrew while remaining readable; 'charging' is possible but slightly less natural
    in contemporary English.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his sons,' not a gender-neutral collective.
    This follows the gender-accurate principle and the immediate context concerns
    Jacob's male sons/tribal heads.
- source_word: וַיֶּאֱסֹף רַגְלָיו אֶל הַמִּטָּה
  chosen: he drew his feet up into the bed
  alternatives:
  - he gathered his feet into the bed
  - he pulled his feet onto the bed
  lexicon: HALOT
  rationale: אָסַף literally means 'gather,' but in idiomatic English the action is
    best expressed as drawing or pulling the feet up onto/into the bed. 'Into the
    bed' reflects אֶל plus the image of reclining on a bed/couch, while avoiding an
    overly wooden rendering.
- source_word: הַמִּטָּה
  chosen: the bed
  alternatives:
  - the couch
  lexicon: HALOT
  rationale: מִטָּה can denote a bed or couch. 'Bed' is the most straightforward and
    familiar rendering in this deathbed scene.
- source_word: וַיִּגְוַע
  chosen: breathed his last
  alternatives:
  - expired
  - died
  lexicon: HALOT
  rationale: גוע often denotes expiring/breathing one's last. Rendering it as 'breathed
    his last' preserves the distinct nuance and avoids collapsing it into the following
    clause.
- source_word: וַיֵּאָסֶף אֶל עַמָּיו
  chosen: was gathered to his people
  alternatives:
  - was gathered to his kin
  - joined his people
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression associated with death and reunion
    with one's people/ancestors. 'Was gathered to his people' preserves the idiom
    and its theological-literary resonance better than a flattened paraphrase.
