theological_decisions:
- issue: Meaning of 'was gathered to his people'
  chosen_reading: Retain the idiomatic expression without reducing it to mere burial.
  alternative_readings:
  - was buried with his ancestors
  - died and joined his forefathers
  rationale: The phrase occurs before Jacob's burial in the following chapter, so
    it should not be translated as a simple burial notice. Preserving the idiom maintains
    the text's theological tension regarding death, ancestry, and postmortem gathering
    without over-defining the concept.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
