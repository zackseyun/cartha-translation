id: GEN.49.16
reference: Genesis 49:16
source:
  edition: WLC
  text: דָּ֖ן יָדִ֣ין עַמּ֑/וֹ כְּ/אַחַ֖ד שִׁבְטֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: Dan will judge his people as one of the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Dan will vindicate his people'; the Hebrew verb can include the sense
      of defending or securing justice, not only pronouncing judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּן
  chosen: Dan
  lexicon: HALOT
  rationale: Proper name of Jacob's son/tribe; transliterated per translation philosophy
    for personal/tribal names. The name also puns with the following verb 'judge,'
    but the main text keeps the name as a proper noun.
- source_word: יָדִין
  chosen: will judge
  alternatives:
  - shall judge
  - will vindicate
  lexicon: HALOT
  rationale: Qal imperfect 3ms of דין, here naturally future/predictive in Jacob's
    blessing. 'Judge' preserves the lexical link with the name Dan and the ordinary
    sense of exercising judgment/governance. 'Vindicate' is possible in some contexts
    but is less likely here given the comparison with a tribe in Israel.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his own people
  lexicon: HALOT
  rationale: עם with 3ms suffix means 'his people.' In context this most likely refers
    to the people associated with Dan, i.e., his tribal constituency, but the Hebrew
    expression is best rendered straightforwardly.
- source_word: כְּאַחַד
  chosen: as one
  alternatives:
  - like one
  - as each one
  lexicon: HALOT
  rationale: 'Comparative כ plus אחד yields ''as one'' or ''like one.'' Here it introduces
    comparison: Dan will function ''as one'' of Israel''s tribes, that is, on equal
    footing with them.'
- source_word: שִׁבְטֵי
  chosen: of the tribes of
  alternatives:
  - tribes of
  - scepters of
  lexicon: HALOT
  rationale: Construct plural of שֵׁבֶט. In this context 'tribes' is clearly intended,
    not the literal 'scepters,' because it is followed by 'Israel' and refers to tribal
    identity within the nation.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name for the covenant people/nation; transliterated in standard
    English form.
