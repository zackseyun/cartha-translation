theological_decisions:
- issue: Sense of Dan's role in the blessing
  chosen_reading: Dan is portrayed as exercising judgment/governance as a full member
    among Israel's tribes.
  alternative_readings:
  - Dan will vindicate his people
  - Dan will judge his people in the sense of deliver or defend them
  rationale: The Hebrew verb דין can carry nuances of judging, governing, or vindicating.
    The immediate comparison 'as one of the tribes of Israel' favors the idea of Dan
    acting with the standing and authority of a tribe within Israel, so 'judge' is
    retained in the main text while broader nuances are preserved as alternatives.
