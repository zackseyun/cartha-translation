theological_decisions:
- issue: Meaning of 'gathered to my people'
  chosen_reading: Retain the idiom rather than reducing it to a simple statement of
    death
  alternative_readings:
  - I am about to die
  rationale: The phrase carries more than biological death in the patriarchal narratives,
    gesturing toward ancestral reunion in death. Preserving the idiom maintains the
    theological tension without forcing a detailed doctrine of the afterlife beyond
    what the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
