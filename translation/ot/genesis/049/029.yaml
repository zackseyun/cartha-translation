id: GEN.49.29
reference: Genesis 49:29
source:
  edition: WLC
  text: וַ/יְצַ֣ו אוֹתָ֗/ם וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ אֲנִי֙ נֶאֱסָ֣ף אֶל עַמִּ֔/י קִבְר֥וּ
    אֹתִ֖/י אֶל אֲבֹתָ֑/י אֶל הַ֨/מְּעָרָ֔ה אֲשֶׁ֥ר בִּ/שְׂדֵ֖ה עֶפְר֥וֹן הַֽ/חִתִּֽי־־־׃
translation:
  text: Then he commanded them and said to them, “I am about to be gathered to my
    people. Bury me with my fathers, in the cave that is in the field of Ephron the
    Hittite,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am being gathered to my people.' The Hebrew idiom refers to impending
      death and reunion with one's people/ancestors in death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he charged
  - he instructed
  lexicon: HALOT
  rationale: צוה commonly denotes giving a charge or command. 'Commanded' preserves
    the force of Jacob's solemn directive in context.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: and said to them
  alternatives:
  - and told them
  lexicon: HALOT
  rationale: A straightforward rendering of the common speech formula, preserving
    the narrative cadence without unnecessary paraphrase.
- source_word: נֶאֱסָף אֶל־עַמִּי
  chosen: I am about to be gathered to my people
  alternatives:
  - I am being gathered to my people
  - I am about to be joined to my people
  lexicon: HALOT
  rationale: The Niphal of אסף with 'to my people' is an idiomatic expression for
    impending death and reunion with one's kin/people in death. 'About to be gathered'
    captures the imminent sense in context while preserving the metaphor rather than
    flattening it to 'I am about to die'.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my kin
  lexicon: HALOT
  rationale: The Hebrew says 'my people,' an established idiom in burial/death contexts.
    Retaining it preserves the text's theological and familial resonance.
- source_word: קִבְרוּ אֹתִי
  chosen: Bury me
  alternatives:
  - Inter me
  lexicon: HALOT
  rationale: Direct imperative plural plus object suffix. 'Bury me' is natural modern
    English and fully accurate.
- source_word: אֶל־אֲבֹתָי
  chosen: with my fathers
  alternatives:
  - to my fathers
  - beside my fathers
  lexicon: HALOT
  rationale: Although the preposition is literally 'to,' English idiom with burial
    is better expressed as 'with my fathers.' This conveys burial alongside ancestors
    rather than motion toward them in an abstract sense.
- source_word: הַמְּעָרָה
  chosen: the cave
  alternatives:
  - the burial cave
  lexicon: HALOT
  rationale: The noun simply means 'the cave.' Since the burial context is already
    explicit, adding 'burial' in the main text would over-interpret.
- source_word: אֲשֶׁר בִּשְׂדֵה עֶפְרוֹן
  chosen: that is in the field of Ephron
  alternatives:
  - which is in Ephron's field
  lexicon: HALOT
  rationale: This preserves the relative clause structure and keeps Ephron as a transliterated
    personal name per project policy.
- source_word: הַחִתִּי
  chosen: the Hittite
  lexicon: HALOT
  rationale: Standard rendering of the gentilic/ethnic designation, identifying Ephron's
    people group.
