id: GEN.49.1
reference: Genesis 49:1
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א יַעֲקֹ֖ב אֶל בָּנָ֑י/ו וַ/יֹּ֗אמֶר הֵאָֽסְפוּ֙ וְ/אַגִּ֣ידָה
    לָ/כֶ֔ם אֵ֛ת אֲשֶׁר יִקְרָ֥א אֶתְ/כֶ֖ם בְּ/אַחֲרִ֥ית הַ/יָּמִֽים־־׃
translation:
  text: Then Jacob called his sons and said, “Gather yourselves, and I will tell you
    what will happen to you in the days to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in the latter days.” The Hebrew phrase can also carry an eschatological
      sense in some contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative wayyiqtol context means to call or summon.
    'Called' is natural modern English and fits the direct object 'his sons.'
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here refers specifically to Jacob's male offspring, the tribal sons
    named in the following context. 'His sons' is gender-accurate and contextually
    precise.
- source_word: הֵאָסְפוּ
  chosen: Gather yourselves
  alternatives:
  - assemble yourselves
  - come together
  lexicon: HALOT
  rationale: The Niphal imperative of אסף calls the sons to assemble. 'Gather yourselves'
    preserves the reflexive force and the solemn tone.
- source_word: וְאַגִּידָה לָכֶם
  chosen: and I will tell you
  alternatives:
  - that I may tell you
  - and let me declare to you
  lexicon: HALOT
  rationale: The cohortative form expresses Jacob's intention following the imperative.
    In English, 'and I will tell you' best conveys the sequence and purpose in idiomatic
    form.
- source_word: אֵת אֲשֶׁר יִקְרָא אֶתְכֶם
  chosen: what will happen to you
  alternatives:
  - what will befall you
  - that which will call/meet you
  lexicon: HALOT
  rationale: The idiom with קרה means 'happen' or 'befall.' 'What will happen to you'
    is clear modern English; 'befall' is possible but less natural. The sense is not
    'call' here but occurrence coming upon them.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the days to come
  alternatives:
  - in the latter days
  - in the end of days
  lexicon: HALOT
  rationale: The phrase can denote a future time, sometimes with eschatological overtones
    depending on context. Here Jacob is speaking of what lies ahead for his sons/tribes.
    'In the days to come' preserves the future-looking sense without overstating a
    technical eschatological meaning in the main text.
