id: GEN.49.10
reference: Genesis 49:10
source:
  edition: WLC
  text: לֹֽא יָס֥וּר שֵׁ֨בֶט֙ מִֽ/יהוּדָ֔ה וּ/מְחֹקֵ֖ק מִ/בֵּ֣ין רַגְלָ֑י/ו עַ֚ד כִּֽי
    יָבֹ֣א שילה וְ/ל֖/וֹ יִקְּהַ֥ת עַמִּֽים־־׃
translation:
  text: The scepter will not depart from Judah, nor the ruler’s staff from between
    his feet, until Shiloh comes; and to him will be the obedience of the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until he comes whose right it is'; the Hebrew שילה is difficult and
      has also been understood as a title, a place name, or a reference to tribute.
    reason: alternative_reading
  - marker: b
    text: Or 'and to him will be the gathering of the peoples,' or 'the submission
      of the peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁבֶט
  chosen: scepter
  alternatives:
  - tribe
  - rod
  - staff
  lexicon: HALOT
  rationale: In royal-poetic context parallel to מְחֹקֵק, the sense is the emblem
    of rule rather than 'tribe' or a simple rod. 'Scepter' best preserves the dynastic/judicial
    nuance.
- source_word: מִיהוּדָה
  chosen: from Judah
  alternatives:
  - from Yehudah
  lexicon: HALOT
  rationale: 'Judah is the standard English transliteration. The preposition marks
    source/separation: the scepter will not depart from Judah.'
- source_word: מְחֹקֵק
  chosen: ruler’s staff
  alternatives:
  - lawgiver
  - ruler
  - commander's staff
  lexicon: HALOT
  rationale: The noun can denote one who decrees or the staff/symbol associated with
    rule. In parallel with 'scepter' and followed by 'from between his feet,' an implement
    of rule is more natural in English than 'lawgiver.' 'Ruler’s staff' communicates
    the royal insignia sense without overcommitting to legislative nuance.
- source_word: מִבֵּין רַגְלָיו
  chosen: from between his feet
  alternatives:
  - from between his legs
  - from among his descendants
  lexicon: HALOT
  rationale: The phrase is retained literally because it is the Hebrew expression
    in this poetic blessing. It likely evokes seated rule and/or posterity, but the
    text itself is concrete; interpretive expansions such as 'descendants' are not
    placed in the main text.
- source_word: עַד כִּי
  chosen: until
  alternatives:
  - until the time when
  - until that
  lexicon: HALOT
  rationale: This combination introduces the terminus of the preceding statement.
    Simple 'until' is idiomatic and sufficiently precise.
- source_word: שילה
  chosen: Shiloh
  alternatives:
  - he whose it is
  - tribute
  - to Shiloh
  lexicon: HALOT
  rationale: The Hebrew form is notoriously difficult and heavily contested. Because
    the consonantal text here is traditionally read as a proper name, and the morphology
    table marks it as a proper noun, the main text preserves 'Shiloh' as a transliterated
    form. Major alternatives are preserved in footnotes rather than resolved dogmatically.
- source_word: וְלוֹ
  chosen: to him
  alternatives:
  - to it
  - for him
  lexicon: HALOT
  rationale: With 'Shiloh' taken as a personal referent in the main text, the pronominal
    suffix is rendered personally. This keeps the syntax straightforward while preserving
    the verse's messianic/royal trajectory without overdefining identity.
- source_word: יִקְּהַת
  chosen: obedience
  alternatives:
  - gathering
  - submission
  - homage
  lexicon: HALOT
  rationale: The noun is rare and debated. In context with 'peoples' and royal imagery,
    'obedience' best captures the sense of peoples yielding to the coming ruler. Alternatives
    such as 'gathering' are possible and preserved in a footnote.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: '''Peoples'' is the more direct rendering of the plural and preserves
    the broader ethnic scope. ''Nations'' is possible but slightly more interpretive.'
