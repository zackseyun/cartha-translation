theological_decisions:
- issue: Identity and rendering of שילה in a text with longstanding messianic interpretation
  chosen_reading: Retain 'Shiloh' in the main text as a transliterated proper name,
    without explicitly identifying the referent as the Messiah in translation.
  alternative_readings:
  - he whose it is
  - until tribute comes to him
  - until he comes to Shiloh
  rationale: This approach honors original-language primacy and preserves theological
    tension rather than resolving a difficult Hebrew crux in the main text. It also
    avoids importing a more explicit christological identification than the verse
    itself states, while leaving room for canonical messianic interpretation.
  doctrine_reference: Translation philosophy §§1, 3; Translate titles; transliterate
    names
- issue: Royal/messianic force of the verse
  chosen_reading: Use royal language ('scepter,' 'ruler’s staff,' 'obedience of the
    peoples') that reflects the Hebrew imagery without making an explicit doctrinal
    claim beyond the text.
  alternative_readings:
  - More dynastic-political reading without messianic overtones
  - Explicitly messianic paraphrase
  rationale: The verse clearly uses royal imagery tied to Judah. The translation preserves
    that imagery while refraining from paraphrastic expansion into explicit messianic
    doctrine in the main text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
