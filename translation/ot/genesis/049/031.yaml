id: GEN.49.31
reference: Genesis 49:31
source:
  edition: WLC
  text: שָׁ֣מָּ/ה קָֽבְר֞וּ אֶת אַבְרָהָ֗ם וְ/אֵת֙ שָׂרָ֣ה אִשְׁתּ֔/וֹ שָׁ֚מָּ/ה קָבְר֣וּ
    אֶת יִצְחָ֔ק וְ/אֵ֖ת רִבְקָ֣ה אִשְׁתּ֑/וֹ וְ/שָׁ֥מָּ/ה קָבַ֖רְתִּי אֶת לֵאָֽה־־־׃
translation:
  text: There they buried Abraham and Sarah his wife; there they buried Isaac and
    Rebekah his wife; and there I buried Leah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - therein
  - to that place
  lexicon: HALOT
  rationale: The adverb points back to the burial cave/field just described. In English,
    simple 'there' is the most natural and sufficiently precise rendering.
- source_word: קָבְרוּ
  chosen: they buried
  alternatives:
  - they have buried
  - were buried
  lexicon: HALOT
  rationale: Qal perfect 3cp with an unspecified plural subject is best rendered actively
    as 'they buried.' An English passive ('were buried') would obscure the Hebrew
    verbal form and the implied human agents.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: This marks the definite direct object in Hebrew and is not represented
    by a separate English word.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - wife of him
  lexicon: HALOT
  rationale: The construct noun with 3ms suffix is naturally rendered 'his wife' in
    English. Repeating it for both Sarah and Rebekah preserves the Hebrew structure.
- source_word: וְ
  chosen: and
  alternatives:
  - also
  - with
  lexicon: Hebrew grammar
  rationale: The conjunction simply coordinates the clauses and paired objects. 'And'
    preserves the straightforward listing style of Jacob's speech.
- source_word: קָבַרְתִּי
  chosen: I buried
  alternatives:
  - I have buried
  lexicon: HALOT
  rationale: Qal perfect 1cs refers to Jacob's own past action regarding Leah. Simple
    past fits the narrative context in English.
- source_word: לֵאָה
  chosen: Leah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: קָבְרוּ ... קָבְרוּ ... קָבַרְתִּי
  chosen: buried ... buried ... buried
  alternatives:
  - laid to rest ... laid to rest ... buried
  lexicon: HALOT
  rationale: Using the same English verb throughout preserves the repetition of קבר
    in Hebrew and maintains consistency of key terms.
