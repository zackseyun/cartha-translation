theological_decisions:
- issue: Messianic or tribal imagery in Jacob's blessing over Judah
  chosen_reading: Retain the verse as poetic imagery of extraordinary abundance and
    royal prosperity without making an explicit messianic interpretation in the translation
    itself.
  alternative_readings:
  - A direct messianic prophecy
  - A purely historical description of Judah's tribal prosperity
  rationale: The verse has been read messianically in Christian tradition, especially
    within the larger Judah oracle, but the Hebrew text itself presents poetic imagery
    of vine-rich abundance and dignity. Per translation philosophy, doctrinal interpretation
    should not be imported into the main text beyond what the source explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it.
