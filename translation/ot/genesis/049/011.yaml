id: GEN.49.11
reference: Genesis 49:11
source:
  edition: WLC
  text: אֹסְרִ֤י לַ/גֶּ֨פֶן֙ עיר/ה וְ/לַ/שֹּׂרֵקָ֖ה בְּנִ֣י אֲתֹנ֑/וֹ כִּבֵּ֤ס בַּ/יַּ֨יִן֙
    לְבֻשׁ֔/וֹ וּ/בְ/דַם עֲנָבִ֖ים סות/ה־׃
translation:
  text: Binding his donkey to the vine, and his donkey’s colt to the choice vine,
    he washes his garments in wine, and his robe in the blood of grapes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his foal'; the Hebrew עִיר can denote a young donkey or donkey colt.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the noble vine'; the Hebrew שֹׂרֵקָה refers to a select or choice
      vine.
    reason: lexical_alternative
  - marker: c
    text: '''Blood of grapes'' is a Hebrew poetic expression for grape juice or wine,
      preserved here for its imagery.'
    reason: cultural_note
lexical_decisions:
- source_word: אֹסְרִי
  chosen: Binding
  alternatives:
  - He binds
  - Tying
  lexicon: HALOT
  rationale: Qal participle masculine singular from אסר, used here in a poetic/blessing
    context. Rendering as a participial English form ('Binding') preserves the vivid,
    descriptive force of the Hebrew better than a simple finite verb, while still
    reading naturally in English.
- source_word: לַגֶּפֶן
  chosen: to the vine
  alternatives:
  - to a vine
  lexicon: HALOT
  rationale: גפן is the common noun 'vine.' The prefixed article is retained with
    'the vine,' though in English this can function generically. The singular is preserved.
- source_word: עִירֹה
  chosen: his donkey
  alternatives:
  - his foal
  - his colt
  lexicon: HALOT
  rationale: עַיִר commonly denotes a young donkey or donkey colt. Because the following
    phrase explicitly uses 'colt' (בְּנִי אֲתֹנוֹ), rendering this first term as 'his
    donkey' avoids awkward repetition while preserving the animal reference. The possessive
    suffix is represented by 'his.'
- source_word: וְלַשֹּׂרֵקָה
  chosen: and ... to the choice vine
  alternatives:
  - and ... to the noble vine
  - and ... to the vine branch
  lexicon: HALOT
  rationale: שֹׂרֵקָה refers to a choice or select vine, often associated with high-quality
    grapes. 'Choice vine' best captures the adjectival nuance in accessible English.
- source_word: בְּנִי אֲתֹנוֹ
  chosen: his donkey’s colt
  alternatives:
  - the foal of his donkey
  - the son of his she-donkey
  lexicon: HALOT
  rationale: Literally 'the son of his she-donkey.' In idiomatic English, 'his donkey’s
    colt' communicates the filial relation and the animal species clearly without
    wooden literalism.
- source_word: כִּבֵּס
  chosen: he washes
  alternatives:
  - he has washed
  - he will wash
  - washing
  lexicon: HALOT
  rationale: The perfect verb in Hebrew poetry can describe vivid characteristic action
    or a future-like scene in blessing/oracle. Present tense in English fits the poetic
    depiction and aligns with the participial opening, presenting the abundance image
    as a tableau.
- source_word: בַּיַּיִן
  chosen: in wine
  alternatives:
  - with wine
  lexicon: HALOT
  rationale: The preposition ב here is most naturally rendered 'in,' preserving the
    concrete imagery of washing garments in wine rather than merely using wine as
    an instrument.
- source_word: לְבֻשׁוֹ
  chosen: his garments
  alternatives:
  - his clothing
  - his garment
  lexicon: HALOT
  rationale: Though formally singular, this noun can function collectively for clothing.
    'His garments' is idiomatic English and pairs well with the parallel 'his robe'
    in the next colon.
- source_word: וּבְדַם עֲנָבִים
  chosen: and ... in the blood of grapes
  alternatives:
  - and ... in grape-blood
  - and ... with the juice of grapes
  lexicon: HALOT
  rationale: 'The phrase is metaphorical but concrete: ''blood of grapes'' is a vivid
    Hebrew idiom for grape juice/wine. It should be preserved rather than flattened,
    since the poetic richness is significant.'
- source_word: סוּתוֹ
  chosen: his robe
  alternatives:
  - his cloak
  - his covering garment
  lexicon: HALOT
  rationale: A garment term parallel to לְבֻשׁוֹ. 'Robe' gives a dignified, readable
    equivalent and preserves the poetic parallelism without over-specifying the exact
    garment type.
