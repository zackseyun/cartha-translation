id: GEN.49.28
reference: Genesis 49:28
source:
  edition: WLC
  text: כָּל אֵ֛לֶּה שִׁבְטֵ֥י יִשְׂרָאֵ֖ל שְׁנֵ֣ים עָשָׂ֑ר וְ֠/זֹאת אֲשֶׁר דִּבֶּ֨ר
    לָ/הֶ֤ם אֲבִי/הֶם֙ וַ/יְבָ֣רֶךְ אוֹתָ֔/ם אִ֛ישׁ אֲשֶׁ֥ר כְּ/בִרְכָת֖/וֹ בֵּרַ֥ךְ
    אֹתָֽ/ם־־׃
translation:
  text: 'All these are the twelve tribes of Israel, and this is what their father
    spoke to them when he blessed them: he blessed each one with the blessing appropriate
    to him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he blessed them, each according to his blessing he blessed them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: A straightforward demonstrative phrase introducing the summary statement.
    'All these' is natural modern English and preserves the collective force.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: tribes of Israel
  alternatives:
  - tribes belonging to Israel
  lexicon: HALOT
  rationale: Construct chain rendered directly. 'Tribes of Israel' is the standard
    and plain sense here.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - the twelve
  lexicon: HALOT
  rationale: Cardinal number rendered idiomatically in English. The article is unnecessary
    because the appositional phrase already identifies them.
- source_word: וְזֹאת אֲשֶׁר דִּבֶּר לָהֶם אֲבִיהֶם
  chosen: and this is what their father spoke to them
  alternatives:
  - and this is what their father said to them
  - and this is what their father spoke over them
  lexicon: HALOT
  rationale: The clause resumes and summarizes the preceding speech. 'Spoke to them'
    stays close to דִּבֶּר while remaining readable; 'said' is possible but slightly
    less formally aligned with the Hebrew verb.
- source_word: וַיְבָרֶךְ אֹתָם
  chosen: when he blessed them
  alternatives:
  - and he blessed them
  lexicon: HALOT
  rationale: Although formally a waw-consecutive, in English the sense is explanatory/appositional
    to the preceding clause. 'When he blessed them' smooths the syntax and clarifies
    that the speech just described was a blessing.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - each man
  - each
  lexicon: HALOT
  rationale: Literally 'man,' but here distributive over the sons/tribes. 'Each one'
    preserves the distributive force without awkwardness, while avoiding an overly
    wooden repetition of 'man' in English. This is a documented contextual rendering
    of a masculine singular distributive form.
- source_word: כְּבִרְכָתוֹ
  chosen: with the blessing appropriate to him
  alternatives:
  - according to his blessing
  - with his own blessing
  lexicon: HALOT
  rationale: The phrase literally means 'according to his blessing.' In context it
    indicates a blessing fitted to each son/tribe. 'Appropriate to him' makes the
    idiomatic sense clear in modern English without adding content beyond the contextual
    implication.
- source_word: בֵּרַךְ אֹתָם
  chosen: he blessed
  alternatives:
  - he pronounced a blessing on
  lexicon: HALOT
  rationale: Repetition of the Hebrew root ברך is retained in English by repeating
    'blessed,' preserving the emphatic summary style of the verse.
