theological_decisions:
- issue: Sexual euphemism and moral evaluation in Jacob’s oracle over Reuben
  chosen_reading: Render the euphemistic language transparently ('went up to your
    father’s bed') and the evaluative verb as 'defiled' without softening or expanding
    the accusation.
  alternative_readings:
  - Use a more explicit paraphrase such as 'slept with your father’s concubine'
  - Use a more cultic term such as 'profaned'
  rationale: The Hebrew itself uses euphemistic but intelligible language. Optimal
    equivalence preserves that register while making the charge clear. The verse condemns
    Reuben’s act without importing details from Genesis 35:22 directly into the line
    itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Final clause ambiguity (עָלָה)
  chosen_reading: Keep the Masoretic 3ms wording in the main text as 'he went up'
    and preserve the more interpretively smoothed alternative in a footnote.
  alternative_readings:
  - '''you went up to my couch'''
  - '''he went up to my couch'' understood as an exclamatory repetition about Reuben'
  rationale: The final clause is syntactically abrupt and somewhat ambiguous. Per
    the doctrine statement, genuine ambiguity should be preserved rather than resolved
    silently. The main text reflects the Hebrew form; the footnote records the smoother
    alternative reading many English translations adopt.
  doctrine_reference: Translation philosophy §3
