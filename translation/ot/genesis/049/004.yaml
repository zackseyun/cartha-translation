id: GEN.49.4
reference: Genesis 49:4
source:
  edition: WLC
  text: פַּ֤חַז כַּ/מַּ֨יִם֙ אַל תּוֹתַ֔ר כִּ֥י עָלִ֖יתָ מִשְׁכְּבֵ֣י אָבִ֑י/ךָ אָ֥ז
    חִלַּ֖לְתָּ יְצוּעִ֥/י עָלָֽה־׃פ
translation:
  text: Unstable as water, you shall not excel, because you went up to your father’s
    bed; then you defiled it—he went up to my couch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'then you defiled my couch—you went up to it.' The Hebrew
      abruptly shifts in the final clause to third person, 'he went up,' which may
      be an exclamatory repetition referring to Reuben.
    reason: alternative_reading
lexical_decisions:
- source_word: פַּחַז
  chosen: Unstable
  alternatives:
  - reckless
  - boiling over
  - wanton
  lexicon: HALOT
  rationale: The noun conveys instability, recklessness, or uncontrolled impetuosity.
    In context Jacob is characterizing Reuben’s volatile character, and 'Unstable'
    works naturally with the following simile 'as water' while preserving the moral
    sense.
- source_word: כַּמַּיִם
  chosen: as water
  alternatives:
  - like water
  lexicon: HALOT
  rationale: A straightforward simile. 'As water' is idiomatic in English and preserves
    the comparison of uncontrolled, uncontained movement.
- source_word: אַל תּוֹתַר
  chosen: you shall not excel
  alternatives:
  - do not have preeminence
  - you will not remain superior
  - you shall not abound
  lexicon: HALOT
  rationale: From יתר, here in context of losing firstborn privilege and preeminence.
    'You shall not excel' is concise and idiomatic, matching the sense that Reuben
    will not retain superiority.
- source_word: כִּי עָלִיתָ
  chosen: because you went up
  alternatives:
  - for you went up
  lexicon: HALOT
  rationale: Keeps the causal force of כִּי and the literal verb 'went up,' which
    in this context is a euphemistic but still transparent reference to sexual violation.
- source_word: מִשְׁכְּבֵי אָבִיךָ
  chosen: to your father’s bed
  alternatives:
  - to the beds of your father
  - to your father’s couch
  lexicon: HALOT
  rationale: Although the Hebrew uses a plural form ('beds/beddings'), English idiom
    prefers singular here. The phrase refers to the father’s marriage bed; singular
    communicates the sense clearly without unnecessary awkwardness.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Marks the consequence/result in a compact way.
- source_word: חִלַּלְתָּ
  chosen: you defiled
  alternatives:
  - you profaned
  - you polluted
  lexicon: HALOT
  rationale: The verb can mean profane or defile. In the sexual and familial context,
    'defiled' is the clearest modern English rendering and preserves the moral gravity.
- source_word: יְצוּעִי
  chosen: my couch
  alternatives:
  - my bed
  - my resting place
  lexicon: HALOT
  rationale: The noun refers to a bed or couch. 'My couch' preserves the shift to
    first person ('my') and avoids repeating 'bed' too mechanically, while still sounding
    natural.
- source_word: עָלָה
  chosen: he went up
  alternatives:
  - you went up
  - it was ascended
  lexicon: HALOT
  rationale: The Hebrew form is 3ms, creating an abrupt shift. Retaining 'he went
    up' preserves the Masoretic wording and the rhetorical shock. Many interpreters
    understand it as a brief self-reference or exclamatory repetition about Reuben;
    the main text keeps the literal form and a footnote preserves the alternative
    understanding.
