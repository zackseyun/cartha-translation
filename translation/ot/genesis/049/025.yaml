id: GEN.49.25
reference: Genesis 49:25
source:
  edition: WLC
  text: מֵ/אֵ֨ל אָבִ֜י/ךָ וְ/יַעְזְרֶ֗/ךָּ וְ/אֵ֤ת שַׁדַּי֙ וִ/יבָ֣רְכֶ֔/ךָּ בִּרְכֹ֤ת
    שָׁמַ֨יִם֙ מֵ/עָ֔ל בִּרְכֹ֥ת תְּה֖וֹם רֹבֶ֣צֶת תָּ֑חַת בִּרְכֹ֥ת שָׁדַ֖יִם וָ/רָֽחַם׃
translation:
  text: by the God of your father, who will help you, and by the Almighty, who will
    bless you with blessings of heaven above, blessings of the deep lying beneath,
    blessings of breasts and womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the God of your father ... and with the Almighty.' The Hebrew prepositions
      and the particle before 'the Almighty' are syntactically compressed, and the
      line may be understood as source, agency, or close apposition.
    reason: alternative_reading
  - marker: b
    text: Or 'the deep crouching below.' The Hebrew verb can mean 'lying down' or
      'crouching.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֵל
  chosen: by the God of
  alternatives:
  - from the God of
  lexicon: HALOT
  rationale: The preposition מִן with אֵל here is syntactically difficult in this
    blessing context. English 'by the God of your father' best captures the sense
    of agency/source in parallel with the following clause about the Almighty. 'From
    the God of' is possible more formally, but 'by' reads more naturally with the
    ensuing finite verbs ('will help,' 'will bless').
- source_word: אָבִיךָ
  chosen: your father
  alternatives:
  - your ancestor
  lexicon: HALOT
  rationale: The singular with 2ms suffix naturally refers to Joseph's father in Jacob's
    blessing. 'Your father' is the plain sense.
- source_word: יַעְזְרֶךָ
  chosen: who will help you
  alternatives:
  - and he will help you
  lexicon: HALOT
  rationale: The verb is 3ms with 2ms object suffix. Rendering it as a relative clause
    in English smooths the Hebrew coordination and makes explicit that God is the
    subject. The future 'will help' fits the blessing context.
- source_word: אֵת
  chosen: and by
  alternatives:
  - even
  - namely
  - with
  lexicon: HALOT
  rationale: The particle אֵת before שַׁדַּי is unusual here and often understood
    as marking coordination/apposition. Rendering 'and by the Almighty' preserves
    the parallelism with the previous prepositional phrase and avoids an awkward untranslated
    object marker.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated rather than transliterated.
    'The Almighty' is the standard and contextually fitting rendering of the divine
    title שַׁדַּי.
- source_word: וִיבָרְכֶךָ
  chosen: who will bless you
  alternatives:
  - and he will bless you
  lexicon: HALOT
  rationale: As with 'who will help you,' a relative clause gives clear English while
    preserving the 3ms subject and blessing-force of the Hebrew imperfect.
- source_word: בִּרְכֹת שָׁמַיִם מֵעָל
  chosen: with blessings of heaven above
  alternatives:
  - the blessings of heaven from above
  - blessings from heaven above
  lexicon: HALOT
  rationale: The construct phrase denotes the content of blessing. 'Heaven above'
    preserves the vertical imagery and poetic parallelism.
- source_word: תְּהוֹם רֹבֶצֶת תָּחַת
  chosen: the deep lying beneath
  alternatives:
  - the deep crouching below
  - the abyss lying below
  lexicon: HALOT
  rationale: תְּהוֹם refers to the primeval deep/watery depths. 'The deep' is idiomatic
    and traditional without being archaic. רֹבֶצֶת literally means 'lying down/crouching';
    'lying' is more natural in English for subterranean waters. 'Beneath' matches
    תָּחַת and preserves the above/below parallel.
- source_word: שָׁדַיִם
  chosen: breasts
  alternatives:
  - breast
  lexicon: HALOT
  rationale: The plural noun plainly refers to breasts as a source of nurture/fertility.
    The plural should be retained.
- source_word: רָחַם
  chosen: womb
  alternatives:
  - uterus
  lexicon: HALOT
  rationale: In this collocation with 'breasts,' רָחַם denotes the womb and thus fertility/fruitfulness.
    'Womb' is the natural, readable English equivalent.
