theological_decisions:
- issue: Metaphorical force of Jacob's blessing over Benjamin
  chosen_reading: Render the verse as a vivid metaphor of predatory strength and victorious
    distribution of gains, without specifying a later historical referent in the main
    text.
  alternative_readings:
  - A tribal characterization fulfilled in Benjamin's warlike history
  - A more general poetic description of ferocity and success
  rationale: The Hebrew presents poetic imagery rather than an explicit doctrinal
    claim or named historical fulfillment. The translation preserves the metaphor
    and leaves broader interpretive connections to readers and notes rather than importing
    them into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
