id: GEN.49.27
reference: Genesis 49:27
source:
  edition: WLC
  text: בִּנְיָמִין֙ זְאֵ֣ב יִטְרָ֔ף בַּ/בֹּ֖קֶר יֹ֣אכַל עַ֑ד וְ/לָ/עֶ֖רֶב יְחַלֵּ֥ק
    שָׁלָֽל׃
translation:
  text: Benjamin is a wolf that tears its prey; in the morning he devours the prey,
    and in the evening he divides the spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Benjamin is a ravening wolf'; the Hebrew verb emphasizes tearing prey,
      so the main text renders the image more explicitly.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'prey' can also be understood more broadly as 'booty'
      or 'plunder.'
    reason: lexical_alternative
  - marker: c
    text: '''Spoil'' may also be translated ''plunder'' or ''booty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְיָמִין
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    in keeping with the policy to transliterate names rather than translate them.
- source_word: זְאֵב
  chosen: wolf
  alternatives:
  - ravening wolf
  - predatory wolf
  lexicon: HALOT
  rationale: The noun plainly denotes a wolf. English 'wolf' is sufficient; the predatory
    force is carried by the following verb rather than built into the noun.
- source_word: יִטְרָף
  chosen: tears its prey
  alternatives:
  - tears
  - ravenes
  - preys
  lexicon: HALOT
  rationale: From טרף, commonly used of tearing prey. Rendering it as 'tears its prey'
    makes the predatory image explicit in natural English. 'Ravenes' is archaic, and
    'tears' alone would leave the object implicit too abruptly for modern readers.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - by morning
  - at morning
  lexicon: HALOT
  rationale: Temporal prepositional phrase; 'in the morning' is the most natural modern
    English equivalent.
- source_word: יֹאכַל
  chosen: he devours
  alternatives:
  - he eats
  - he consumes
  lexicon: HALOT
  rationale: Although the verb is the common 'eat,' in this animal-warrior metaphor
    'devours' better conveys the vivid predatory sense without over-paraphrasing.
- source_word: עַד
  chosen: the prey
  alternatives:
  - booty
  - plunder
  lexicon: HALOT
  rationale: Here עַד refers to what is consumed by the predator, best understood
    as prey in parallel with the wolf imagery. 'Booty' or 'plunder' would lean too
    quickly into military metaphor at this point, whereas the verse moves from animal
    imagery in the first colon to spoil-sharing in the second.
- source_word: וְלָעֶרֶב
  chosen: and in the evening
  alternatives:
  - and at evening
  - but by evening
  lexicon: HALOT
  rationale: Straightforward temporal phrase with conjunction; 'and in the evening'
    preserves the parallel structure with 'in the morning.'
- source_word: יְחַלֵּק
  chosen: he divides
  alternatives:
  - he apportions
  - he shares out
  lexicon: HALOT
  rationale: Piel of חלק in this context means to divide or apportion. 'Divides' is
    concise and idiomatic with 'spoil.'
- source_word: שָׁלָל
  chosen: the spoil
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: A standard term for spoil taken in conflict. 'Spoil' is a clear and established
    English equivalent; 'plunder' is possible but slightly more verbal in feel.
