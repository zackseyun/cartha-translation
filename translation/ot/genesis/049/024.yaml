  from: his arms and hands
  to: his arms
  rationale: The Hebrew idiom 'z'ro'ei yadav' (literally 'the arms of his hands') is often understood as a poetic amplification for 'arms' or 'forearms'. Rendering it as a compound 'his arms and hands' is a plausible but slightly clunky interpretation. Most modern optimal-equivalence translations (e.g., ESV, NIV, NRSV) simplify this to 'his arms', which is more concise and likely captures the functional meaning of the idiom without over-translating its components.
