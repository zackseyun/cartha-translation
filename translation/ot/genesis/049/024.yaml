theological_decisions:
- issue: Whether the final clause names God with titles or refers to Joseph / a coming ruler
  chosen_reading: 'Treat the clause as continuing the reference to God: ''from there is the Shepherd, the Stone of Israel.'''
  alternative_readings:
  - Treat 'shepherd/stone' as referring to Joseph
  - Treat the line messianically as a future ruler descended from Joseph or Israel
  rationale: The immediate context emphasizes divine empowerment ('by the hands of the Mighty One of Jacob'), and the paired titles fit divine epithets elsewhere in Hebrew poetry. The Hebrew remains compressed and somewhat ambiguous, so alternatives are preserved in footnotes rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
