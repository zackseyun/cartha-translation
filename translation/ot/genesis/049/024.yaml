id: GEN.49.24
reference: Genesis 49:24
source:
  edition: WLC
  text: וַ/תֵּ֤שֶׁב בְּ/אֵיתָן֙ קַשְׁתּ֔/וֹ וַ/יָּפֹ֖זּוּ זְרֹעֵ֣י יָדָ֑י/ו מִ/ידֵי֙ אֲבִ֣יר יַעֲקֹ֔ב מִ/שָּׁ֥ם רֹעֶ֖ה אֶ֥בֶן יִשְׂרָאֵֽל׃
translation:
  text: Yet his bow remained steady, and his arms were made agile by the hands of the Mighty One of Jacob; from there is the Shepherd, the Stone of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his arms were strengthened.' The Hebrew verb is rare and may suggest strength, suppleness, or agility.
    reason: lexical_alternative
  - marker: b
    text: Or 'from him,' if the phrase is taken to refer directly to the Mighty One of Jacob rather than more literally 'from there.'
    reason: alternative_reading
  - marker: c
    text: '''The Shepherd, the Stone of Israel'' may be understood as divine titles; some take the phrase instead as referring to Joseph or to a future ruler. ''Stone'' could also be rendered ''Rock'' interpretively.'
    reason: alternative_reading
  - marker: d
    text: Or 'his arms and hands'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - abode
  - sat
  lexicon: HALOT
  rationale: From ישׁב, here idiomatically of the bow 'remaining' or 'staying' firm rather than literally 'sitting.' 'Remained' gives natural English while preserving the durative sense.
- source_word: בְּאֵיתָן
  chosen: steady
  alternatives:
  - firmness
  - strength
  - ever-flowing/lasting
  lexicon: HALOT
  rationale: אֵיתָן denotes firmness, permanence, or strength. With 'bow' the adjectival sense 'steady' communicates the image of firmness in battle more naturally than a noun phrase like 'in firmness.'
- source_word: קַשְׁתּוֹ
  chosen: his bow
  lexicon: HALOT
  rationale: Standard rendering of קֶשֶׁת with 3ms suffix; the martial metaphor should be preserved.
- source_word: וַיָּפֹזּוּ
  chosen: were made agile
  alternatives:
  - were strengthened
  - were supple
  - were nimble
  lexicon: HALOT
  rationale: This rare verb is difficult. Traditional renderings include 'were made strong,' but the root is associated with fine gold / refinement and by extension agility or suppleness in some interpretations. 'Were made agile' fits the image of arms/hands empowered for archery while preserving the unusual nuance; the stronger alternative is preserved in a footnote.
- source_word: זְרֹעֵי יָדָיו
  chosen: his arms and hands
  alternatives:
  - the arms of his hands
  - his forearms
  lexicon: HALOT
  rationale: The Hebrew is literally 'the arms of his hands,' an idiom for the upper limbs. 'His arms and hands' preserves both body-part terms without wooden English.
- source_word: מִידֵי
  chosen: by the hands of
  alternatives:
  - from the hands of
  - through the hands of
  lexicon: HALOT
  rationale: The preposition מן with 'hands' here marks agency or source. 'By the hands of' best conveys divine enablement in idiomatic English.
- source_word: אֲבִיר יַעֲקֹב
  chosen: the Mighty One of Jacob
  alternatives:
  - the Mighty One of Israel
  - the Strong One of Jacob
  lexicon: HALOT
  rationale: A recognized divine title. 'Mighty One of Jacob' is the standard and most transparent rendering of the construct phrase.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from him
  - thence
  lexicon: HALOT
  rationale: The adverb normally means 'from there.' In this difficult clause it likely points back to the divine source just mentioned. Because the Hebrew wording is terse and debated, the more interpretive alternative 'from him' is preserved in a footnote rather than adopted in the main text.
- source_word: רֹעֶה
  chosen: the Shepherd
  alternatives:
  - shepherd
  - one who shepherds
  lexicon: HALOT
  rationale: Used substantivally here. Capitalized because in context it functions as a divine title/appellation in parallel with 'Stone of Israel.'
- source_word: אֶבֶן יִשְׂרָאֵל
  chosen: the Stone of Israel
  alternatives:
  - the Rock of Israel
  lexicon: HALOT
  rationale: The noun is literally 'stone,' not the more common צוּר 'rock.' Retaining 'Stone' preserves the source wording and the poetic title, while 'Rock' is noted as an interpretive alternative due to English idiom and theological resonance.
