theological_decisions:
- issue: Rendering of אָדָם in narrative context
  chosen_reading: Adam
  alternative_readings:
  - the man
  rationale: The verse addresses the specific individual in the Eden narrative. Using
    'Adam' preserves the personal referent without making a broader anthropological
    statement in this clause. The doctrine table allows 'man / humankind' by context
    for אָדָם.
  doctrine_reference: 'DOCTRINE.md: Contested terms — אָדָם adam | man / humankind
    (context)'
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/003/017.json
  category: awkward_english
  tier: 1
  from: about which I commanded you
  to: which I commanded you about
  rationale: The current phrasing 'about which I commanded you' is grammatically correct
    but feels formal and slightly stilted in modern English. Rephrasing to 'which
    I commanded you about' is more natural and improves the flow of the sentence without
    altering the meaning.
- timestamp: '2026-04-21T00:31:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/003/017.json
  category: awkward_english
  tier: 1
  from: you listened to your wife's voice
  to: you listened to your wife
  rationale: The Hebrew idiom שָׁמַע לְקוֹל (shama' leqol) is very common and often
    means 'to obey' or 'to heed' (see BDB 1033 1.d; HALOT 1581 Qal 4.b). While the
    draft's 'listened to your wife's voice' is a literal rendering (followed by ESV,
    NRSV), it is somewhat unidiomatic in English. A more natural rendering that stays
    close to the source is 'listened to your wife' (cf. NIV). This avoids the stronger
    interpretation of 'obeyed' (cf. NET) while improving the English flow. The current
    footnote 'b' would then become more meaningful, explaining the literal Hebrew
    that was smoothed for readability.
