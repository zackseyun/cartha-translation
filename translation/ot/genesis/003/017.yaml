id: GEN.3.17
reference: Genesis 3:17
source:
  edition: WLC
  text: וּ/לְ/אָדָ֣ם אָמַ֗ר כִּֽי שָׁמַעְתָּ֮ לְ/ק֣וֹל אִשְׁתֶּ/ךָ֒ וַ/תֹּ֨אכַל֙ מִן
    הָ/עֵ֔ץ אֲשֶׁ֤ר צִוִּיתִ֨י/ךָ֙ לֵ/אמֹ֔ר לֹ֥א תֹאכַ֖ל מִמֶּ֑/נּוּ אֲרוּרָ֤ה הָֽ/אֲדָמָה֙
    בַּֽ/עֲבוּרֶ֔/ךָ בְּ/עִצָּבוֹן֙ תֹּֽאכֲלֶ֔/נָּה כֹּ֖ל יְמֵ֥י חַיֶּֽי/ךָ־־׃
translation:
  text: And to Adam he said, “Because you listened to the voice of your wife and ate
    from the tree about which I commanded you, saying, ‘You shall not eat from it,’
    the ground is cursed because of you; in painful toil you shall eat from it all
    the days of your life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the man” for “Adam.”
    reason: alternative_reading
  - marker: b
    text: Hebrew “you listened to the voice of your wife.”
    reason: lexical_alternative
  - marker: c
    text: Or “cursed is the ground on your account”; the Hebrew can be rendered more
      formally this way.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew term can also be rendered “in sorrow” or “with pain”; here it
      refers to hardship in labor for food.
    reason: lexical_alternative
  - marker: e
    text: Or 'about which I commanded you'.
    reason: previous_rendering
  - marker: f
    text: Or "you listened to your wife's voice".
    reason: previous_rendering
lexical_decisions:
- source_word: לְאָדָם
  chosen: to Adam
  alternatives:
  - to the man
  lexicon: HALOT
  rationale: Here the referent is the individual man in the narrative, not humankind
    in general, so the personal name 'Adam' is preferred over 'the man.' This follows
    the doctrine guidance that אָדָם be rendered by context as 'man' or a name.
- source_word: כִּי
  chosen: Because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the judgment; 'because' is the clearest modern
    English causal connector.
- source_word: שָׁמַעְתָּ לְקוֹל אִשְׁתֶּךָ
  chosen: you listened to your wife's voice
  alternatives:
  - you obeyed your wife
  - you listened to your wife
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listened to the voice of your wife.' Retaining
    'voice' preserves the source wording and avoids over-interpreting the phrase as
    mere obedience, while still communicating heed given to her speech.
- source_word: וַתֹּאכַל מִן הָעֵץ
  chosen: and ate from the tree
  alternatives:
  - and ate of the tree
  lexicon: HALOT
  rationale: '''Ate from'' is natural modern English and reflects the preposition
    מִן.'
- source_word: אֲשֶׁר צִוִּיתִיךָ לֵאמֹר
  chosen: about which I commanded you, saying
  alternatives:
  - which I commanded you about, saying
  - which I commanded you
  lexicon: HALOT
  rationale: This preserves both the relative clause and the infinitive 'saying,'
    which introduces the content of the command.
- source_word: לֹא תֹאכַל מִמֶּנּוּ
  chosen: You shall not eat from it
  alternatives:
  - You must not eat from it
  - Do not eat from it
  lexicon: HALOT
  rationale: '''You shall not'' reflects the force of the prohibition in a formal
    but still readable way. ''From it'' keeps the Hebrew preposition explicit.'
- source_word: אֲרוּרָה הָאֲדָמָה
  chosen: the ground is cursed
  alternatives:
  - cursed is the ground
  lexicon: HALOT
  rationale: Predicate adjective plus subject can be rendered either way in English.
    'The ground is cursed' is slightly more natural in contemporary prose while preserving
    the meaning. 'Ground' is preferable to 'earth' here because the context is agricultural
    labor.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the soil
  - the land
  lexicon: HALOT
  rationale: In this immediate context of cultivation and eating produce, 'ground'
    best captures the cultivated earth from which Adam will labor for food.
- source_word: בַּעֲבוּרֶךָ
  chosen: because of you
  alternatives:
  - for your sake
  - on your account
  lexicon: HALOT
  rationale: The phrase indicates causation on account of Adam. 'Because of you' avoids
    the possible misunderstanding of 'for your sake' as beneficial purpose.
- source_word: בְּעִצָּבוֹן
  chosen: in painful toil
  alternatives:
  - in sorrow
  - with pain
  - in toil
  lexicon: HALOT
  rationale: The noun overlaps semantically with pain, hardship, and toil. In this
    context of laboring for food, 'painful toil' captures both the physical hardship
    and the laborious aspect, and echoes the thematic link with the woman's pain in
    the previous verse without flattening the nuance.
- source_word: תֹּאכֲלֶנָּה
  chosen: you shall eat from it
  alternatives:
  - you shall eat it
  - you shall eat from the ground
  lexicon: HALOT
  rationale: The feminine suffix refers back to 'the ground.' Because the sense is
    eating what comes from the ground rather than literally consuming soil, 'eat from
    it' is the most idiomatic and contextually accurate rendering.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - all your life
  - throughout your life
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. The fuller rendering preserves the cadence
    and solemnity of the judgment.
