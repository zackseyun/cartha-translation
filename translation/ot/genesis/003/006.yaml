theological_decisions:
- issue: Moral coloring of the woman's perception
  chosen_reading: Render the evaluative terms in relatively neutral lexical form ('good,'
    'a delight,' 'desirable') rather than importing explicit sinful language.
  alternative_readings:
  - Render with stronger negative coloring such as 'lust,' 'coveted,' or 'tempting'
  rationale: The verse narrates the woman's perception of the tree using positive
    evaluative language before the act of disobedience is stated. The translation
    should not front-load theological judgment into the descriptive terms beyond what
    the Hebrew itself says.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Implication of the husband's presence
  chosen_reading: Make עִמָּהּ explicit as modifying 'her husband' with 'who was with
    her.'
  alternative_readings:
  - Translate more tersely as 'and she gave also to her husband with her'
  rationale: The Hebrew indicates the husband was with her. Clarifying this in English
    is a syntactic decision, not an interpretive expansion beyond the text, and it
    preserves an important narrative detail.
  doctrine_reference: Optimal equivalence; readable modern English, not archaic or
    academic.
