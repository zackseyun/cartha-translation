id: GEN.3.6
reference: Genesis 3:6
source:
  edition: WLC
  text: וַ/תֵּ֣רֶא הָֽ/אִשָּׁ֡ה כִּ֣י טוֹב֩ הָ/עֵ֨ץ לְ/מַאֲכָ֜ל וְ/כִ֧י תַֽאֲוָה ה֣וּא
    לָ/עֵינַ֗יִם וְ/נֶחְמָ֤ד הָ/עֵץ֙ לְ/הַשְׂכִּ֔יל וַ/תִּקַּ֥ח מִ/פִּרְי֖/וֹ וַ/תֹּאכַ֑ל
    וַ/תִּתֵּ֧ן גַּם לְ/אִישָׁ֛/הּ עִמָּ֖/הּ וַ/יֹּאכַֽל־־׃
translation:
  text: So the woman saw that the tree was good for food, and that it was a delight
    to the eyes, and that the tree was desirable for gaining wisdom. So she took from
    its fruit and ate, and she also gave some to her husband, who was with her, and
    he ate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a desire to the eyes' or 'desirable to the eyes.' The Hebrew expression
      emphasizes the tree's visual attractiveness.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make one wise.' The Hebrew can express the gaining of wisdom or the
      imparting of wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: saw
  alternatives:
  - looked
  - perceived
  lexicon: HALOT
  rationale: Basic narrative verb of seeing; 'saw' preserves the straightforward observational
    force without adding interpretation.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In context this refers to the woman/Eve. 'The woman' matches the Hebrew
    noun and preserves the narrative designation rather than importing the marital
    role too early.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what she saw in each clause; English 'that'
    best fits the repeated evaluative structure.
- source_word: טוֹב
  chosen: good
  alternatives:
  - pleasant
  - beneficial
  lexicon: HALOT
  rationale: Standard rendering of טוֹב. Here it describes the tree as suitable in
    relation to food.
- source_word: לְמַאֲכָל
  chosen: for food
  alternatives:
  - for eating
  - as food
  lexicon: HALOT
  rationale: Expresses suitability for consumption. 'For food' is idiomatic and close
    to the Hebrew.
- source_word: תַאֲוָה
  chosen: a delight
  alternatives:
  - desirable
  - a craving
  - a lust
  lexicon: HALOT
  rationale: The noun can denote desire or that which is desired. In this immediate
    aesthetic context, 'a delight' captures attractiveness without prematurely moralizing
    the term as sinful lust.
- source_word: לָעֵינַיִם
  chosen: to the eyes
  alternatives:
  - to look at
  - to the sight
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom and the sensory emphasis
    of visual appeal.
- source_word: וְנֶחְמָד
  chosen: desirable
  alternatives:
  - pleasant
  - coveted
  - precious
  lexicon: HALOT
  rationale: The participle denotes something attractive or desirable. 'Desirable'
    fits the evaluative progression and avoids overreading with 'coveted,' though
    that nuance may be present.
- source_word: לְהַשְׂכִּיל
  chosen: for gaining wisdom
  alternatives:
  - to make one wise
  - for insight
  - for understanding
  lexicon: HALOT
  rationale: The Hiphil infinitive of שכל conveys becoming prudent/wise or gaining
    insight. 'For gaining wisdom' is natural English and reflects purpose/result without
    over-specifying the implied subject.
- source_word: מִפִּרְיוֹ
  chosen: from its fruit
  alternatives:
  - some of its fruit
  lexicon: HALOT
  rationale: The preposition מן is retained with 'from,' and the singular collective
    'fruit' is natural in English.
- source_word: וַתֹּאכַל
  chosen: ate
  alternatives:
  - did eat
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol; 'ate' is the natural modern English equivalent.
- source_word: וַתִּתֵּן גַּם
  chosen: also gave some
  alternatives:
  - gave also
  - gave as well
  lexicon: HALOT
  rationale: The adverb גַּם marks addition. 'Also gave some' makes explicit in idiomatic
    English that she gave part of the fruit, which is implied by the context and object
    ellipsis.
- source_word: לְאִישָׁהּ
  chosen: to her husband
  alternatives:
  - to her man
  lexicon: HALOT
  rationale: In this context אִישׁ with pronominal suffix refers to her husband. This
    is the natural and contextually accurate English rendering.
- source_word: עִמָּהּ
  chosen: who was with her
  alternatives:
  - with her
  lexicon: HALOT
  rationale: The phrase modifies her husband. Expanding to 'who was with her' makes
    the syntactic relation clear in English and preserves the narrative implication
    that he was present.
- source_word: וַיֹּאכַל
  chosen: and he ate
  alternatives:
  - and he did eat
  lexicon: HALOT
  rationale: Simple narrative continuation; explicit subject retained in English for
    clarity and emphasis.
