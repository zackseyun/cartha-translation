id: GEN.3.16
reference: Genesis 3:16
source:
  edition: WLC
  text: אֶֽל הָ/אִשָּׁ֣ה אָמַ֗ר הַרְבָּ֤ה אַרְבֶּה֙ עִצְּבוֹנֵ֣/ךְ וְ/הֵֽרֹנֵ֔/ךְ
    בְּ/עֶ֖צֶב תֵּֽלְדִ֣י בָנִ֑ים וְ/אֶל אִישֵׁ/ךְ֙ תְּשׁ֣וּקָתֵ֔/ךְ וְ/ה֖וּא יִמְשָׁל
    בָּֽ/ךְ־־־׃ס
translation:
  text: To the woman he said, “I will greatly multiply your pain and your conception;
    in pain you will bear children. Your desire will be for your husband, and he will
    rule over you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your pregnancy.' The Hebrew term can denote conception or pregnancy.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; here likely meaning children/offspring generally.
    reason: lexical_alternative
  - marker: c
    text: Or 'longing.' The rare Hebrew word may denote desire in a broad sense; some
      interpret it as a desire to control (compare Gen 4:7), while others take it
      as relational or sexual longing.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: The noun can mean either 'woman' or 'wife' depending on context. Here
    the address is to the female human as such in the judgment scene, so 'the woman'
    best matches the immediate discourse, while 'husband' later reflects the marital
    relation explicitly marked by אִישֵׁךְ.
- source_word: הַרְבָּה אַרְבֶּה
  chosen: I will greatly multiply
  alternatives:
  - I will surely multiply
  - I will multiply greatly
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'I will
    greatly multiply' preserves the emphatic force in natural English.
- source_word: עִצְּבוֹנֵךְ
  chosen: your pain
  alternatives:
  - your toil
  - your sorrow
  lexicon: HALOT
  rationale: The noun denotes pain, hardship, or toil. In this immediate context,
    paired with childbirth and followed by בְּעֶצֶב, 'pain' is the clearest and most
    contextually fitting rendering, while still allowing the broader hardship sense
    to be noted.
- source_word: וְהֵרֹנֵךְ
  chosen: your conception
  alternatives:
  - your pregnancy
  lexicon: HALOT
  rationale: The noun refers to conception/pregnancy. 'Conception' is more formally
    aligned with the Hebrew form and preserves the distinction from the later act
    of bearing children; 'pregnancy' is possible but slightly more interpretive.
- source_word: בְּעֶצֶב
  chosen: in pain
  alternatives:
  - with pain
  - in toil
  lexicon: HALOT
  rationale: The prepositional phrase marks the manner/circumstance of childbearing.
    'In pain' is idiomatic and closely reflects the Hebrew.
- source_word: תֵּלְדִי בָנִים
  chosen: you will bear children
  alternatives:
  - you will give birth to sons
  lexicon: HALOT
  rationale: Although בָנִים is literally 'sons,' Hebrew often uses it more broadly
    for offspring/children. In this context the statement concerns childbirth generally,
    so 'children' best conveys the sense without over-literalizing the gender.
- source_word: אִישֵׁךְ
  chosen: your husband
  alternatives:
  - your man
  lexicon: HALOT
  rationale: In relation to the woman, אִישׁ naturally means 'husband' here, not merely
    'man.' This makes the relational sense explicit in English.
- source_word: תְּשׁוּקָתֵךְ
  chosen: your desire will be for
  alternatives:
  - your longing will be for
  - your turning will be toward
  lexicon: HALOT
  rationale: The noun occurs rarely and is debated. 'Desire' is the standard and most
    defensible rendering, preserving ambiguity about whether the desire is affectionate,
    dependent, or controlling. More interpretive options should not be forced into
    the main text.
- source_word: יִמְשָׁל בָּךְ
  chosen: he will rule over you
  alternatives:
  - he will govern you
  - he will dominate you
  lexicon: HALOT
  rationale: The verb means to rule/govern. 'Rule over' is the most direct and traditional
    rendering. 'Dominate' is more interpretive and stronger than the lexical data
    alone requires.
