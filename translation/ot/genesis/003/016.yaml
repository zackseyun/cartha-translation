theological_decisions:
- issue: Meaning of the woman’s 'desire' in relation to her husband
  chosen_reading: Render תְּשׁוּקָה as 'desire' without specifying whether it is sexual
    desire, relational longing, or a desire to control.
  alternative_readings:
  - sexual desire
  - relational dependence or longing
  - desire to control, in parallel with Genesis 4:7
  rationale: The Hebrew term is rare and the context does not compel a single interpretive
    nuance. To preserve theological and interpretive tension, the main text keeps
    the broader 'desire,' while alternatives are preserved in a footnote rather than
    resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Whether the verse is prescriptive or descriptive regarding male rule
  chosen_reading: 'Translate as a description of the post-fall condition: ''he will
    rule over you.'''
  alternative_readings:
  - an implicit prescription of male authority
  rationale: The Hebrew verbal form straightforwardly states what will happen, not
    what ought to happen. The translation should not import a normative doctrinal
    claim beyond the text itself.
  doctrine_reference: 'Affirmations: do not advocate denominational distinctives unless
    the Hebrew unambiguously supports one reading.'
