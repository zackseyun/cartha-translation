theological_decisions:
- issue: Referent of אֱלֹהִים in כֵּאלֹהִים
  chosen_reading: like God
  alternative_readings:
  - like gods
  - like divine beings
  rationale: The immediate context repeatedly refers to the one God, and the following
    participle 'knowing good and evil' echoes divine prerogative in the narrative.
    Rendering 'like God' best reflects the likely sense while preserving the debated
    alternatives in a footnote rather than overstating certainty.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
