id: GEN.3.5
reference: Genesis 3:5
source:
  edition: WLC
  text: כִּ֚י יֹדֵ֣עַ אֱלֹהִ֔ים כִּ֗י בְּ/יוֹם֙ אֲכָלְ/כֶ֣ם מִמֶּ֔/נּוּ וְ/נִפְקְח֖וּ
    עֵֽינֵי/כֶ֑ם וִ/הְיִיתֶם֙ כֵּֽ/אלֹהִ֔ים יֹדְעֵ֖י ט֥וֹב וָ/רָֽע׃
translation:
  text: For God knows that on the day you eat from it, your eyes will be opened, and
    you will be like God, knowing good and evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like gods' or 'like divine beings.' The Hebrew אֱלֹהִים can bear these
      senses in some contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the serpent's explanation/justification of the prior claim,
    so 'For' fits the discourse flow in English.
- source_word: יֹדֵעַ אֱלֹהִים
  chosen: God knows
  alternatives:
  - God is knowing
  lexicon: HALOT
  rationale: Idiomatic English present tense best represents the Hebrew participle
    with subject.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - indeed
  lexicon: HALOT
  rationale: Here the conjunction introduces the content of what God knows; 'that'
    is the most natural English complementizer.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  - in the day
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew temporal idiom without
    over-paraphrasing. In context it means the time when the act occurs, not necessarily
    a 24-hour period.
- source_word: אֲכָלְכֶם מִמֶּנּוּ
  chosen: you eat from it
  alternatives:
  - you eat of it
  lexicon: HALOT
  rationale: Modern readable English prefers 'eat from it'; 'of it' is traditional
    but archaic.
- source_word: וְנִפְקְחוּ עֵינֵיכֶם
  chosen: your eyes will be opened
  alternatives:
  - your eyes will be opened up
  - your eyes will be unsealed
  lexicon: HALOT
  rationale: Passive rendering reflects the Niphal form and preserves the metaphor
    of perception/awareness.
- source_word: וִהְיִיתֶם
  chosen: you will be
  alternatives:
  - you will become
  lexicon: HALOT
  rationale: The verb can denote becoming, but 'you will be' is the more direct and
    common rendering here; the resulting state is emphasized.
- source_word: כֵּאלֹהִים
  chosen: like God
  alternatives:
  - like gods
  - like divine beings
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be rendered 'gods' or 'divine beings' in some contexts,
    in Genesis 3:5 the singular sense 'God' best fits the narrative context and the
    serpent's contrast with God's knowledge. Because the phrase is genuinely debated,
    alternatives are preserved in a footnote.
- source_word: יֹדְעֵי
  chosen: knowing
  alternatives:
  - who know
  lexicon: HALOT
  rationale: The participle is rendered as a predicate participial phrase modifying
    'you' after 'you will be like God,' preserving the Hebrew compactness.
- source_word: טוֹב וָרָע
  chosen: good and evil
  alternatives:
  - good and bad
  lexicon: HALOT
  rationale: '''Good and evil'' is the established and semantically weightier rendering,
    fitting moral and discernment connotations in context.'
