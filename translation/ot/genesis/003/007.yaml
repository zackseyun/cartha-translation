id: GEN.3.7
reference: Genesis 3:7
source:
  edition: WLC
  text: וַ/תִּפָּקַ֨חְנָה֙ עֵינֵ֣י שְׁנֵי/הֶ֔ם וַ/יֵּ֣דְע֔וּ כִּ֥י עֵֽירֻמִּ֖ם הֵ֑ם וַֽ/יִּתְפְּרוּ֙ עֲלֵ֣ה תְאֵנָ֔ה וַ/יַּעֲשׂ֥וּ לָ/הֶ֖ם חֲגֹרֹֽת׃
translation:
  text: Then the eyes of both of them were opened, and they knew that they were naked. So they sewed fig leaves together and made themselves coverings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loincloths' or 'aprons' for 'coverings.'
    reason: lexical_alternative
  - marker: b
    text: Or 'made coverings for themselves'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּפָּקַחְנָה
  chosen: were opened
  alternatives:
  - were opened wide
  - were opened up
  lexicon: HALOT
  rationale: The Niphal/waw form of פקח here is best rendered as a passive-like intransitive, 'were opened,' referring to the eyes. This preserves the Hebrew idiom without overinterpreting the nature of their new perception.
- source_word: עֵינֵי שְׁנֵיהֶם
  chosen: the eyes of both of them
  alternatives:
  - both their eyes
  lexicon: HALOT
  rationale: A fairly direct rendering preserves the emphasis on both participants. 'The eyes of both of them' is slightly more formal but natural enough in English and reflects the construct chain clearly.
- source_word: וַיֵּדְעוּ
  chosen: they knew
  alternatives:
  - they realized
  - they became aware
  lexicon: HALOT
  rationale: ידע commonly means 'know.' Although 'realized' captures the contextual sense, 'knew' better preserves the lexical connection and avoids unnecessary interpretive expansion.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they knew, so 'that' is the most straightforward English equivalent.
- source_word: עֵירֻמִּם
  chosen: naked
  alternatives:
  - bare
  lexicon: HALOT
  rationale: The adjective means 'naked.' This also preserves the narrative linkage with the same root idea in Genesis 2:25, now reframed by shame-awareness after disobedience.
- source_word: וַיִּתְפְּרוּ
  chosen: they sewed
  alternatives:
  - they stitched
  lexicon: HALOT
  rationale: A simple past verb is appropriate. 'Sewed' is the most natural and direct equivalent for the action described.
- source_word: עֲלֵה תְאֵנָה
  chosen: fig leaves
  alternatives:
  - leaves of the fig tree
  lexicon: HALOT
  rationale: The construct phrase literally means 'leaves of fig.' 'Fig leaves' is idiomatic English and fully accurate.
- source_word: וַיַּעֲשׂוּ לָהֶם
  chosen: made for themselves
  alternatives:
  - made themselves
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the prepositional phrase 'for themselves.' Rendering it preserves the reflexive sense of self-provision in response to their nakedness.
- source_word: חֲגֹרֹת
  chosen: coverings
  alternatives:
  - loincloths
  - girdles
  - aprons
  lexicon: HALOT
  rationale: The noun refers to something girded around the body. 'Aprons' is traditional but potentially misleading in modern English; 'loincloths' may be too specific. 'Coverings' is clear, modest, and contextually appropriate while allowing some ambiguity about exact form.
