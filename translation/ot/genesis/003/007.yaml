theological_decisions:
- issue: Relation of newfound knowledge to shame and moral awareness
  chosen_reading: 'Render the verse descriptively without importing explicit theological conclusions beyond the text: their eyes were opened, they knew they were naked, and they made coverings.'
  alternative_readings:
  - Render with interpretive language such as 'they became ashamed' or 'their consciences were awakened'
  rationale: The verse implies altered self-awareness and shame, but it does not explicitly state 'shame' or define the theological mechanics of the change. The translation therefore preserves the narrative tension rather than resolving it with doctrinal paraphrase.
  doctrine_reference: Translation philosophy §3
- issue: Rendering חֲגֹרֹת
  chosen_reading: coverings
  alternative_readings:
  - aprons
  - loincloths
  rationale: The exact garment type is not fully specified. 'Coverings' avoids overprecision while still conveying their attempt to conceal nakedness. This keeps the text readable and faithful without importing a more concrete image than the Hebrew requires.
  doctrine_reference: Translation philosophy §6
