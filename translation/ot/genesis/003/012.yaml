theological_decisions:
- issue: Potential implication of blame toward God in the man's reply
  chosen_reading: Retain the wording 'the woman whom you gave to be with me' without
    softening or intensifying it.
  alternative_readings:
  - the woman you gave me
  - the woman you put here with me
  rationale: The Hebrew plainly records the man's response, which implicitly shifts
    blame toward both the woman and God. The translation should preserve that tension
    without paraphrastic exaggeration or mitigation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
