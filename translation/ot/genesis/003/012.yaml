id: GEN.3.12
reference: Genesis 3:12
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר הָֽ/אָדָ֑ם הָֽ/אִשָּׁה֙ אֲשֶׁ֣ר נָתַ֣תָּה עִמָּדִ֔/י הִ֛וא נָֽתְנָה
    לִּ֥/י מִן הָ/עֵ֖ץ וָ/אֹכֵֽל־־׃
translation:
  text: And the man said, “The woman whom you gave to be with me—she gave me fruit
    from the tree, and I ate.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the tree''; ''fruit'' is supplied in English because the
      object is implied by the context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - the human being
  lexicon: HALOT
  rationale: Rendered 'the man' in keeping with the contextual reference to the individual
    male human, Adam, rather than humanity in general. This follows the doctrine guideline
    for אָדָם as 'man / humankind' according to context.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: The immediate referent is the woman/Eve. 'The woman' preserves the Hebrew
    wording; 'wife' is possible in some contexts for אִשָּׁה but is less direct here.
- source_word: אֲשֶׁר נָתַתָּה עִמָּדִי
  chosen: whom you gave to be with me
  alternatives:
  - whom you gave with me
  - whom you placed with me
  lexicon: HALOT
  rationale: The clause identifies the woman as the one God gave to the man in companionship.
    'To be with me' makes the relational sense of עִמָּדִי natural in English without
    adding content beyond the Hebrew.
- source_word: הִוא
  chosen: she
  alternatives:
  - that one
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in Hebrew. English reflects this
    naturally with 'she' and punctuation emphasis rather than an overly wooden 'she
    herself.'
- source_word: נָתְנָה לִי
  chosen: gave me
  alternatives:
  - has given me
  lexicon: HALOT
  rationale: Simple past fits the narrative sequence and standard English storytelling
    style.
- source_word: מִן הָעֵץ
  chosen: fruit from the tree
  alternatives:
  - from the tree
  - some of the tree's fruit
  lexicon: HALOT
  rationale: Although 'fruit' is not explicit in the Hebrew here, English idiom normally
    requires an object for 'gave me from the tree.' The object is clearly implied
    by the context of the forbidden tree and prior verses. Supplying 'fruit' is a
    minimal, contextually warranted expansion for clarity.
- source_word: וָאֹכֵל
  chosen: and I ate
  alternatives:
  - so I ate
  - and I did eat
  lexicon: HALOT
  rationale: Rendered as a straightforward past narrative verb. 'And I ate' preserves
    the sequence without adding interpretive force such as 'so'.
