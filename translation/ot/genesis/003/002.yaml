id: GEN.3.2
reference: Genesis 3:2
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר הָֽ/אִשָּׁ֖ה אֶל הַ/נָּחָ֑שׁ מִ/פְּרִ֥י עֵֽץ הַ/גָּ֖ן נֹאכֵֽל־־׃
translation:
  text: And the woman said to the serpent, “We may eat from the fruit of the trees
    of the garden,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the fruit of the tree of the garden we may eat';
      here 'tree' is understood collectively, hence 'trees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה here refers to the female human character in the narrative, not
    specifically in her marital role. 'The woman' matches the immediate context and
    preserves consistency with the surrounding passage.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: הַנָּחָשׁ
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: HALOT
  rationale: נָחָשׁ can denote a snake/serpent. 'Serpent' better fits the elevated
    narrative tone and traditional identification in this passage without changing
    the referent.
- source_word: מִפְּרִי
  chosen: from the fruit
  alternatives:
  - of the fruit
  - from fruit
  lexicon: HALOT
  rationale: The preposition מִן is best represented here as 'from,' indicating source.
    The construct with פְּרִי naturally yields 'from the fruit' in English.
- source_word: עֵץ
  chosen: the trees of
  alternatives:
  - the tree(s) of
  lexicon: HALOT
  rationale: Although עֵץ is morphologically singular, in this distributive/genitive
    construction with collective sense and in light of the plural permission of the
    context, idiomatic English is 'the trees of the garden.' This avoids the misleading
    impression that only one tree is in view in v. 2.
- source_word: הַגָּן
  chosen: the garden
  lexicon: HALOT
  rationale: Straightforward definite noun; 'the garden' preserves the specificity
    of the setting.
- source_word: נֹאכֵל
  chosen: we may eat
  alternatives:
  - we eat
  - we can eat
  lexicon: HALOT
  rationale: The imperfect 1cp expresses permitted action in context, echoing the
    divine permission of 2:16. 'We may eat' communicates allowance more clearly than
    the bare 'we eat' and more precisely than mere ability 'we can eat.'
