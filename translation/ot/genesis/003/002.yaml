theological_decisions:
- issue: Scope of permitted trees/fruit in Eve's reply
  chosen_reading: 'Render the phrase as a general permission: ''from the fruit of
    the trees of the garden'''
  alternative_readings:
  - from the fruit of the tree of the garden
  rationale: The Hebrew uses singular עֵץ in a construct phrase, but the sense in
    context is collective/distributive, corresponding to the broad permission of Genesis
    2:16. Rendering it with English plural avoids implying that Eve refers only to
    a single tree before she introduces the exception in the next verse.
  doctrine_reference: Translation philosophy §1, §5
