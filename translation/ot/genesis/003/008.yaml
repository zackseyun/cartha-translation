id: GEN.3.8
reference: Genesis 3:8
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֞וּ אֶת ק֨וֹל יְהוָ֧ה אֱלֹהִ֛ים מִתְהַלֵּ֥ךְ בַּ/גָּ֖ן לְ/ר֣וּחַ
    הַ/יּ֑וֹם וַ/יִּתְחַבֵּ֨א הָֽ/אָדָ֜ם וְ/אִשְׁתּ֗/וֹ מִ/פְּנֵי֙ יְהוָ֣ה אֱלֹהִ֔ים
    בְּ/ת֖וֹךְ עֵ֥ץ הַ/גָּֽן־׃
translation:
  text: And they heard the sound of the LORD God walking in the garden in the breeze
    of the day, and the man and his wife hid themselves from the presence of the LORD
    God among the trees of the garden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'voice of the LORD God.' The Hebrew word can mean either 'sound' or 'voice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the cool of the day.' Literally, 'in the breeze/wind of the day.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the man'; alternatively, 'Adam.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - sound of approach
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or more broadly 'sound/noise.' Here, because the
    participle 'walking' follows and the text does not explicitly say God spoke, 'sound'
    best preserves the Hebrew's ambiguity without over-specifying speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In apposition with יְהוָה, this forms the standard designation 'the LORD
    God.'
- source_word: מִתְהַלֵּךְ
  chosen: walking
  alternatives:
  - moving about
  - going back and forth
  lexicon: HALOT
  rationale: The Hitpael participle of הלך conveys movement about within the garden.
    'Walking' is the most natural English equivalent and preserves the anthropomorphic
    presentation without interpretive expansion.
- source_word: בַּגָּן
  chosen: in the garden
  alternatives:
  - through the garden
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in.' 'In the garden' is sufficiently
    natural and close to the Hebrew.
- source_word: לְרוּחַ הַיּוֹם
  chosen: in the breeze of the day
  alternatives:
  - at the wind of the day
  - in the cool of the day
  lexicon: HALOT
  rationale: רוּחַ denotes wind, breath, or spirit. The idiom likely refers to the
    day's breeze, probably toward evening. 'In the breeze of the day' is more source-transparent
    than the traditional 'in the cool of the day,' which interprets the effect rather
    than translating the noun.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - Adam
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here with 'his
    wife,' the singular individual sense is primary, so 'the man' fits best while
    preserving the narrative's representative resonance.
- source_word: וְאִשְׁתּוֹ
  chosen: and his wife
  alternatives:
  - with his wife
  lexicon: HALOT
  rationale: Straightforward conjunctive rendering of the noun with 3ms suffix.
- source_word: מִפְּנֵי
  chosen: from the presence of
  alternatives:
  - from before
  - from
  lexicon: HALOT
  rationale: Literally 'from the face/presence of.' 'From the presence of' preserves
    the relational and spatial force better than the flatter 'from.'
- source_word: בְּתוֹךְ עֵץ הַגָּן
  chosen: among the trees of the garden
  alternatives:
  - in the midst of the tree of the garden
  - among the garden trees
  lexicon: HALOT
  rationale: Though עֵץ is morphologically singular, Hebrew often uses the singular
    collectively for trees/wood. In context of hiding places, English idiom strongly
    favors the collective 'trees.'
