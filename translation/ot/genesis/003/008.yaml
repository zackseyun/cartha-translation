theological_decisions:
- issue: Anthropomorphic depiction of God 'walking' in the garden
  chosen_reading: Retain the concrete anthropomorphic language 'walking' without softening
    or allegorizing.
  alternative_readings:
  - moving about in the garden
  - the sound of the LORD God's presence in the garden
  rationale: The Hebrew presents God in vivid narrative terms. Per translation philosophy,
    the translation should preserve theological tension rather than resolve it by
    either demythologizing or over-systematizing the description.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of הָאָדָם
  chosen_reading: the man
  alternative_readings:
  - the human
  - Adam
  rationale: The term can carry both individual and representative force. Here the
    immediate narrative setting ('and his wife') points to the individual man, so
    'the man' is preferred while leaving broader theological resonance intact.
  doctrine_reference: 'Contested terms: אָדָם; Translation philosophy §4'
