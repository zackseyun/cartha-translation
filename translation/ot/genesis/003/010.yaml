id: GEN.3.10
reference: Genesis 3:10
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אֶת קֹלְ/ךָ֥ שָׁמַ֖עְתִּי בַּ/גָּ֑ן וָ/אִירָ֛א כִּֽי עֵירֹ֥ם אָנֹ֖כִי
    וָ/אֵחָבֵֽא־־׃
translation:
  text: And he said, “I heard your sound in the garden, and I was afraid because I
    was naked, so I hid myself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your voice.” Hebrew qol can mean either “sound” or “voice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Adam's reply. 'And he said'
    preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אֶת קֹלְךָ
  chosen: your sound
  alternatives:
  - your voice
  - the sound of you
  lexicon: HALOT
  rationale: קוֹל commonly means 'sound' or 'voice.' Here the object is what was heard
    in the garden; 'your sound' preserves the broader Hebrew sense and avoids assuming
    speech specifically, though 'voice' is a viable traditional alternative.
- source_word: שָׁמַעְתִּי
  chosen: I heard
  lexicon: HALOT
  rationale: Direct and standard rendering of שמע in the qal perfect 1cs.
- source_word: בַּגָּן
  chosen: in the garden
  lexicon: HALOT
  rationale: Definite article is preserved; the setting is the garden already established
    in context.
- source_word: וָאִירָא
  chosen: and I was afraid
  alternatives:
  - and I feared
  lexicon: HALOT
  rationale: ירא in this context denotes fear experienced by Adam. 'I was afraid'
    is idiomatic modern English and preserves the emotional sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי gives the reason for Adam's fear. 'Because' best communicates
    the causal force in English.
- source_word: עֵירֹם אָנֹכִי
  chosen: I was naked
  alternatives:
  - I am naked
  lexicon: HALOT
  rationale: עֵירֹם means 'naked.' Although the Hebrew nominal clause is tenseless,
    English past tense fits the surrounding past narrative verbs and Adam's explanation
    of why he hid.
- source_word: וָאֵחָבֵא
  chosen: so I hid myself
  alternatives:
  - and I hid
  - and I hid myself
  lexicon: HALOT
  rationale: The verb is reflexive in sense ('hide oneself'). 'So I hid myself' makes
    the result relation explicit and reads naturally in English while staying close
    to the Hebrew sequence.
