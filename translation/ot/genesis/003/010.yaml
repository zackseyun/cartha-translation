theological_decisions:
- issue: Rendering of קוֹל in relation to God's presence
  chosen_reading: your sound
  alternative_readings:
  - your voice
  rationale: The Hebrew term can denote either 'sound' or 'voice.' Since the text
    says Adam heard God in the garden, but does not explicitly state articulated speech
    at this point, the broader term is retained in the main text. The traditional
    alternative 'your voice' is preserved in a footnote to maintain interpretive transparency
    without narrowing the source unnecessarily.
  doctrine_reference: Translation philosophy §1, §3
