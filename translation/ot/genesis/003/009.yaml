id: GEN.3.9
reference: Genesis 3:9
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א יְהוָ֥ה אֱלֹהִ֖ים אֶל הָֽ/אָדָ֑ם וַ/יֹּ֥אמֶר ל֖/וֹ אַיֶּֽ/כָּה־׃
translation:
  text: Then Yahweh God called to the man and said to him, “Where are you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Yahweh God.” The main text follows the project’s default rendering of יְהוָה as “the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - called out
  - summoned
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא in narrative sequence. 'Called' is the most natural and sufficiently formal rendering; 'called out' is possible but not required by the context.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  - the Lord GOD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The compound divine designation is standardly and clearly represented as 'the LORD God.' 'Yahweh' is preserved as an alternative but not used in the main text.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction of speech here; in idiomatic English with verbs of speaking/calling, 'to' is the best rendering.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - the human being
  - humankind
  lexicon: HALOT
  rationale: In this immediate narrative context, הָאָדָם refers to the individual male human addressed in the garden, not humanity in general. Per doctrine on אָדָם, 'the man' is the gender-accurate rendering.
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the pronominal object 'to him'; retaining it preserves the source text's fullness and clarifies the addressee.
- source_word: אַיֶּכָּה
  chosen: Where are you?
  alternatives:
  - Where are you
  - Where are you now?
  lexicon: HALOT
  rationale: The interrogative with 2ms suffix is a direct personal question. English idiom requires 'Where are you?' The form addresses the man's location without adding interpretive nuance.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw on the wayyiqtol continues the narrative. 'Then' gives readable modern English while preserving sequential force better than a wooden initial 'And.'
