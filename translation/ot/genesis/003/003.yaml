id: GEN.3.3
reference: Genesis 3:3
source:
  edition: WLC
  text: וּ/מִ/פְּרִ֣י הָ/עֵץ֮ אֲשֶׁ֣ר בְּ/תוֹךְ הַ/גָּן֒ אָמַ֣ר אֱלֹהִ֗ים לֹ֤א תֹֽאכְלוּ֙
    מִמֶּ֔/נּוּ וְ/לֹ֥א תִגְּע֖וּ בּ֑/וֹ פֶּן תְּמֻתֽוּ/ן־־׃
translation:
  text: But from the fruit of the tree that is in the middle of the garden, God said,
    ‘You shall not eat from it, and you shall not touch it, lest you die.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that is in the midst of the garden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/פְּרִי
  chosen: But from the fruit
  alternatives:
  - And from the fruit
  - But of the fruit
  lexicon: HALOT
  rationale: The conjunction plus preposition-noun sequence continues Eve's contrast
    with v. 2. English 'But from the fruit' captures the adversative sense in context
    more naturally than a simple 'And,' while preserving the partitive/prepositional
    force of מִן with 'from.'
- source_word: הָעֵץ
  chosen: the tree
  lexicon: HALOT
  rationale: Straightforward definite noun; 'tree' is the plain sense.
- source_word: אֲשֶׁר בְּתוֹךְ הַגָּן
  chosen: that is in the middle of the garden
  alternatives:
  - that is in the midst of the garden
  - which is in the center of the garden
  lexicon: HALOT
  rationale: בְּתוֹךְ denotes the interior/middle. 'In the middle of the garden' is
    idiomatic modern English and preserves the spatial emphasis.
- source_word: אָמַר אֱלֹהִים
  chosen: God said
  alternatives:
  - God has said
  lexicon: HALOT
  rationale: The qatal form here reports prior speech in narrative discourse. Simple
    past 'God said' is the most natural English rendering.
- source_word: לֹא תֹאכְלוּ
  chosen: You shall not eat
  alternatives:
  - You must not eat
  - Do not eat
  lexicon: HALOT
  rationale: The negated imperfect in reported divine command is well represented
    by English future-like prohibition 'shall not.' This preserves the formal force
    without sounding archaic in context.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - of it
  lexicon: HALOT
  rationale: The preposition מן is best carried into English as 'from,' matching the
    Hebrew and clarifying the object of eating.
- source_word: וְלֹא תִגְּעוּ בוֹ
  chosen: and you shall not touch it
  alternatives:
  - and you must not touch it
  - nor shall you touch it
  lexicon: HALOT
  rationale: נגע commonly means 'touch.' Rendering with 'touch it' is direct and idiomatic.
    The conjunction is kept as 'and' to reflect the additive prohibition.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative consequence or precaution. 'Lest' is concise
    and accurate, and remains sufficiently readable here.
- source_word: תְּמֻתוּן
  chosen: you die
  alternatives:
  - you will die
  lexicon: HALOT
  rationale: Following פֶּן, the clause expresses feared consequence. 'Lest you die'
    is the standard and precise English equivalent. 'You will die' is possible but
    slightly overstates the modal nuance in this reported wording.
