theological_decisions:
- issue: Eve's reported wording differs from God's command in Genesis 2:17 by adding
    'and you shall not touch it.'
  chosen_reading: Translate Eve's speech as given, without harmonizing it to the earlier
    command.
  alternative_readings:
  - Conform the wording to Genesis 2:17 by omitting or softening the added prohibition
  rationale: The translation should reflect the Hebrew text of this verse as spoken
    by Eve, preserving the narrative and theological tension rather than resolving
    it by harmonization.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
