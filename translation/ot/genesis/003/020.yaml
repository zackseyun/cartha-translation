id: GEN.3.20
reference: Genesis 3:20
source:
  edition: WLC
  text: וַ/יִּקְרָ֧א הָֽ/אָדָ֛ם שֵׁ֥ם אִשְׁתּ֖/וֹ חַוָּ֑ה כִּ֛י הִ֥וא הָֽיְתָ֖ה אֵ֥ם
    כָּל חָֽי־׃
translation:
  text: And the man called his wife's name Eve, because she was the mother of all
    the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Adam called his wife's name Eve.' The Hebrew reads 'the man' (ha'adam),
      with the article.
    reason: alternative_reading
  - marker: b
    text: Or 'mother of all living beings' / 'mother of everyone living.' The Hebrew
      literally says 'mother of all the living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא here introduces the act of giving a name. 'Called'
    is idiomatic and close to the Hebrew, while still naturally implying naming in
    context.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - Adam
  lexicon: HALOT
  rationale: The Hebrew uses the noun with article, 'the man,' not the proper name
    form without article. Per doctrine, אָדָם is rendered according to context; here
    the article favors 'the man' rather than the name 'Adam,' though the character
    is the individual man introduced earlier.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Direct object in the naming formula 'called the name of.' Retained in
    English as part of the idiomatic expression 'called his wife's name Eve' rather
    than reducing the phrase too far.
- source_word: אִשְׁתּוֹ
  chosen: his wife's
  alternatives:
  - his woman’s
  lexicon: HALOT
  rationale: In this context אִשָּׁה refers specifically to the man's spouse, so 'his
    wife's' is the natural and contextually precise rendering.
- source_word: חַוָּה
  chosen: Eve
  alternatives:
  - Chavvah
  - Havvah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Eve'
    is the established English form for חַוָּה.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the naming. 'Because' communicates the causal
    force clearly in modern English.
- source_word: הִוא
  chosen: she
  lexicon: HALOT
  rationale: Straightforward 3fs pronoun referring to the woman.
- source_word: הָיְתָה
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: The verb היה here most naturally expresses state rather than transition.
    'Was' best fits the explanatory clause.
- source_word: אֵם
  chosen: mother
  lexicon: HALOT
  rationale: Standard rendering of אֵם in a genealogical/progenitive sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Regular distributive/collective sense; 'all' is the most natural collocation
    with the following adjective used substantivally.
- source_word: חָי
  chosen: the living
  alternatives:
  - all living beings
  - everyone living
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'The living' preserves the compact
    Hebrew expression and avoids over-specifying beyond the text, while still conveying
    that Eve is presented as ancestress of all living humans/life.
