theological_decisions:
- issue: Whether הָאָדָם should be rendered as the proper name 'Adam' or the descriptive
    'the man'
  chosen_reading: the man
  alternative_readings:
  - Adam
  rationale: 'The presence of the article strongly supports the descriptive form in
    Hebrew. This also aligns with the doctrine guideline for אָדָם: ''man / humankind
    (context).'' Since the text has not yet shifted unambiguously to a bare proper-name
    form, the translation preserves the Hebrew nuance rather than importing later
    English convention.'
  doctrine_reference: 'DOCTRINE.md: אָדָם default ''man / humankind (context)''; gender-accurate
    over gender-neutral'
- issue: Scope of 'mother of all the living'
  chosen_reading: Retain the broad phrase without narrowing it in translation
  alternative_readings:
  - mother of all living humans
  - mother of all living beings
  rationale: The Hebrew phrase is concise and somewhat open in scope. The translation
    preserves that breadth rather than resolving the interpretive question. A footnote
    preserves a more explicit alternative gloss.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
