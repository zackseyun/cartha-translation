- issue: Whether to render אָדָם as a personal name or as a common noun
  chosen_reading: 'common noun: ''the man'''
  alternative_readings:
  - 'personal name: ''Adam'''
  rationale: The verse contrasts the male human with 'his wife,' and the Hebrew still naturally supports the common-noun reading in this stage of the narrative. This avoids prematurely hardening the term into a proper name where the text itself retains literary ambiguity.
