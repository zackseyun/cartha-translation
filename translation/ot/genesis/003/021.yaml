id: GEN.3.21
reference: Genesis 3:21
source:
  edition: WLC
  text: וַ/יַּעַשׂ֩ יְהוָ֨ה אֱלֹהִ֜ים לְ/אָדָ֧ם וּ/לְ/אִשְׁתּ֛/וֹ כָּתְנ֥וֹת ע֖וֹר וַ/יַּלְבִּשֵֽׁ/ם׃פ
translation:
  text: And Yahweh God made garments of skin for the man and for his wife, and clothed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Adam and for his wife.' The Hebrew אָדָם can function as the personal name 'Adam' or as the common noun 'man' depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'tunics of skin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In apposition with יְהוָה, this forms the compound designation 'the LORD God,' the standard sense in this narrative context.
- source_word: לְאָדָם
  chosen: for the man
  alternatives:
  - for Adam
  - for humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to the individual male human in contrast with 'his wife,' not humanity in general. 'The man' preserves the narrative force and gender-accurate sense better than 'humankind.' 'Adam' is possible as a name, but in this immediate context the common-noun sense remains prominent.
- source_word: וּלְאִשְׁתּוֹ
  chosen: and for his wife
  alternatives:
  - and for the woman
  lexicon: HALOT
  rationale: אִשָּׁה with the 3ms suffix naturally means 'his wife' in this marital context. This is more idiomatic and contextually precise than 'the woman' here.
- source_word: כָּתְנוֹת
  chosen: garments
  alternatives:
  - tunics
  - coats
  lexicon: HALOT
  rationale: כֻּתֹּנֶת denotes a body garment or tunic. 'Garments' is slightly broader but natural modern English and fits optimal equivalence without over-specifying style. 'Tunics' is possible but less natural for many readers.
- source_word: עוֹר
  chosen: skin
  alternatives:
  - hide
  - leather
  lexicon: HALOT
  rationale: עוֹר denotes skin/hide. 'Of skin' is the most direct and traditional rendering; 'hide' or 'leather' are possible but either less idiomatic here or slightly more interpretive.
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה is the common verb 'make/do.' 'Made' is the plain sense and avoids unnecessary embellishment.
- source_word: וַיַּלְבִּשֵׁם
  chosen: and clothed them
  alternatives:
  - and dressed them
  lexicon: HALOT
  rationale: The Hiphil of לבש means to cause to wear, hence 'clothe' or 'dress.' 'Clothed them' preserves the slightly weightier register and echoes the source more closely.
