  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Moral nuance of עָרוּם
  chosen_reading: crafty
  alternative_readings:
  - shrewd
  - subtle
  rationale: The Hebrew term can be positive or negative depending on context. Because the verse immediately presents deceptive questioning, the translation reflects the ominous nuance without importing later theological identifications into the wording itself.
