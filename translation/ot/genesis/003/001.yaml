id: GEN.3.1
reference: Genesis 3:1
source:
  edition: WLC
  text: וְ/הַ/נָּחָשׁ֙ הָיָ֣ה עָר֔וּם מִ/כֹּל֙ חַיַּ֣ת הַ/שָּׂדֶ֔ה אֲשֶׁ֥ר עָשָׂ֖ה יְהוָ֣ה אֱלֹהִ֑ים וַ/יֹּ֨אמֶר֙ אֶל הָ֣/אִשָּׁ֔ה אַ֚ף כִּֽי אָמַ֣ר אֱלֹהִ֔ים לֹ֣א תֹֽאכְל֔וּ מִ/כֹּ֖ל עֵ֥ץ הַ/גָּֽן־־׃
translation:
  text: Now the serpent was more crafty than any beast of the field that Yahweh God had made. And he said to the woman, “Indeed, has God said, ‘You shall not eat from any tree of the garden’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more shrewd' or 'more subtle.' The Hebrew term can describe prudence in some contexts, but here it carries a deceptive nuance.
    reason: lexical_alternative
  - marker: b
    text: The narrator says 'the LORD God,' but the serpent says only 'God,' preserving a shift in the Hebrew wording.
    reason: alternative_reading
  - marker: c
    text: Or 'from every tree of the garden.' In this negated question, 'any tree' best conveys the serpent's exaggeration of God's command.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנָּחָשׁ
  chosen: Now the serpent
  alternatives:
  - And the serpent
  lexicon: HALOT
  rationale: הַנָּחָשׁ is straightforwardly 'the serpent.' The prefixed וְ can be rendered 'and,' but at the start of a new scene in English narrative, 'now' better reflects discourse flow without losing the connective sense.
- source_word: עָרוּם
  chosen: more crafty
  alternatives:
  - shrewd
  - cunning
  - subtle
  lexicon: HALOT
  rationale: עָרוּם can denote prudence/shrewdness in positive contexts or cunning/craftiness in negative ones. In this context, introducing deceptive speech, 'crafty' best captures the morally charged nuance. 'More crafty' reflects the comparative force created by מִכֹּל.
- source_word: מִכֹּל חַיַּת הַשָּׂדֶה
  chosen: than any beast of the field
  alternatives:
  - than any wild animal of the field
  - than all the animals of the field
  lexicon: HALOT
  rationale: 'The phrase is a comparative construction: ''more ... than any/every beast of the field.'' חַיַּת הַשָּׂדֶה refers to land animals associated with the open country/field. ''Beast of the field'' is idiomatic and preserves the register of the Hebrew.'
- source_word: אֲשֶׁר עָשָׂה
  chosen: that ... had made
  alternatives:
  - which ... made
  lexicon: HALOT
  rationale: The relative clause modifies 'beast of the field.' English past perfect ('had made') fits the narrative sequence naturally.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The compound divine name is therefore 'the LORD God,' preserving both covenant name convention and the Hebrew pairing.
- source_word: וַיֹּאמֶר אֶל־הָאִשָּׁה
  chosen: And he said to the woman
  alternatives:
  - Then he said to the woman
  lexicon: HALOT
  rationale: The subject remains the serpent from the prior clause. English requires the pronoun for natural flow. 'The woman' preserves the Hebrew designation rather than supplying 'Eve,' which the text has not yet used.
- source_word: אַף כִּי
  chosen: Did ... really
  alternatives:
  - Indeed, did ...
  - Is it really the case that ...
  - Has ... actually
  lexicon: HALOT
  rationale: אַף כִּי here introduces a skeptical, insinuating question. Rather than a wooden 'indeed that,' idiomatic English 'Did God really say' captures the serpent's challenge and rhetorical force.
- source_word: אָמַר אֱלֹהִים
  chosen: God really say
  alternatives:
  - God say
  lexicon: HALOT
  rationale: אֱלֹהִים here is simply 'God,' not the fuller 'the LORD God' used by the narrator. Preserving that shift is significant in the discourse and should not be harmonized.
- source_word: לֹא תֹאכְלוּ
  chosen: You shall not eat
  alternatives:
  - You must not eat
  - You may not eat
  lexicon: HALOT
  rationale: The imperfect with negation reports the divine prohibition. 'You shall not eat' preserves the formal force of the quoted command while remaining natural English.
- source_word: מִכֹּל עֵץ הַגָּן
  chosen: from any tree of the garden
  alternatives:
  - from every tree of the garden
  lexicon: HALOT
  rationale: In a negated context, מִכֹּל is naturally rendered 'from any.' This best communicates the serpent's exaggeration of the command. 'Of the garden' preserves the genitive relation more formally than 'in the garden.'
