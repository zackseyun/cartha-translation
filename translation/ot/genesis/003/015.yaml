id: GEN.3.15
reference: Genesis 3:15
source:
  edition: WLC
  text: וְ/אֵיבָ֣ה אָשִׁ֗ית בֵּֽינְ/ךָ֙ וּ/בֵ֣ין הָֽ/אִשָּׁ֔ה וּ/בֵ֥ין זַרְעֲ/ךָ֖
    וּ/בֵ֣ין זַרְעָ֑/הּ ה֚וּא יְשׁוּפְ/ךָ֣ רֹ֔אשׁ וְ/אַתָּ֖ה תְּשׁוּפֶ֥/נּוּ עָקֵֽב׀׃ס
translation:
  text: And I will put hostility between you and the woman, and between your offspring
    and her offspring; he will strike your head, and you will strike his heel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enmity.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'seed' in both places; the term can refer collectively to offspring/descendants
      or to a representative individual.
    reason: lexical_alternative
  - marker: c
    text: Or 'it will strike your head.' The Hebrew pronoun is masculine singular
      following a collective noun.
    reason: alternative_reading
  - marker: d
    text: The Hebrew verb in both clauses is the same; traditionally, 'bruise.' Some
      render the first clause more strongly as 'crush' because of 'head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיבָה
  chosen: hostility
  alternatives:
  - enmity
  lexicon: HALOT
  rationale: Denotes active opposition or enmity. 'Hostility' is clear modern English;
    'enmity' is traditional and precise but less common, so it is preserved as an
    alternative.
- source_word: אָשִׁית
  chosen: I will put
  alternatives:
  - I will set
  lexicon: HALOT
  rationale: Qal of שׂים commonly means 'put, place, set.' 'I will put' is the most
    natural modern rendering here.
- source_word: בֵּינְךָ ... וּבֵין הָאִשָּׁה
  chosen: between you and the woman
  lexicon: HALOT
  rationale: Straightforward relational preposition repeated for emphasis; retained
    in English for the parallel structure.
- source_word: זַרְעֲךָ ... זַרְעָהּ
  chosen: your offspring ... her offspring
  alternatives:
  - your seed ... her seed
  - your descendants ... her descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective noun that can denote seed, offspring, or descendants.
    'Offspring' preserves both the collective sense and the possibility of an individual
    representative within the collective better than 'descendants,' while avoiding
    overly literal 'seed' in the main text.
- source_word: הוּא
  chosen: he
  alternatives:
  - it
  - he/it
  lexicon: HALOT
  rationale: The pronoun is grammatically masculine singular. Given the singular pronoun
    following the collective noun 'offspring,' English 'he' best reflects the Hebrew
    form while allowing the representative-individual sense to remain visible. The
    collective possibility is preserved in a footnote.
- source_word: יְשׁוּפְךָ ... תְּשׁוּפֶנּוּ
  chosen: will strike ... will strike
  alternatives:
  - will bruise ... will bruise
  - will crush ... will strike
  - will attack ... will attack
  lexicon: HALOT
  rationale: The verb שׁוּף is rare and debated. Using 'strike' in both clauses preserves
    lexical consistency and avoids over-interpreting the degree of injury in either
    direction. 'Bruise' is traditional; 'crush' may overstate the first clause unless
    interpretively inferred from 'head.'
- source_word: רֹאשׁ
  chosen: head
  lexicon: HALOT
  rationale: Literal body-part term; retained plainly.
- source_word: עָקֵב
  chosen: heel
  lexicon: HALOT
  rationale: Literal body-part term; retained plainly.
