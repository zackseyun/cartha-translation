theological_decisions:
- issue: Whether the woman's offspring should be rendered in a way that preserves
    both collective and individual dimensions often associated with this verse
  chosen_reading: Rendered זֶרַע as 'offspring' and the following pronoun הוּא as
    'he' in the main text
  alternative_readings:
  - Rendered collectively as 'they' or 'it'
  - Rendered more traditionally as 'seed' with masculine singular pronoun
  rationale: The Hebrew uses a collective noun followed by a masculine singular pronoun.
    'Offspring' preserves the collective noun, while 'he' reflects the singular pronoun
    without forcing a full messianic interpretation into the translation itself. This
    preserves theological tension rather than resolving it, while leaving room for
    canonical interpretation.
  doctrine_reference: Translation philosophy §3; §4
- issue: How strongly to render שׁוּף in the first clause
  chosen_reading: Used 'strike' rather than 'crush' or 'bruise'
  alternative_readings:
  - '''bruise'' in both clauses'
  - '''crush'' for the head clause and ''bruise/strike'' for the heel clause'
  rationale: The Hebrew verb is the same in both clauses, so the main text keeps the
    same English verb for transparency. The differing body parts already imply differing
    severity. This avoids importing a theological interpretation into the lexical
    choice while preserving the verse's asymmetry.
  doctrine_reference: Translation philosophy §1; §3; §5
