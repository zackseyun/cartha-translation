theological_decisions:
- issue: Speaker identification of the masculine singular subject
  chosen_reading: Rendered simply as 'he' rather than supplying 'the LORD God.'
  alternative_readings:
  - And the LORD God said
  rationale: The Hebrew of this verse has only the third masculine singular verb with
    no explicit subject. The antecedent from the prior context is God, but this verse
    itself does not restate the name. To avoid importing more than the source text
    says in this clause, the translation keeps the pronoun.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
