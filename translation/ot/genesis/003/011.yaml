id: GEN.3.11
reference: Genesis 3:11
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר מִ֚י הִגִּ֣יד לְ/ךָ֔ כִּ֥י עֵירֹ֖ם אָ֑תָּה הֲ/מִן הָ/עֵ֗ץ אֲשֶׁ֧ר
    צִוִּיתִ֛י/ךָ לְ/בִלְתִּ֥י אֲכָל מִמֶּ֖/נּוּ אָכָֽלְתָּ־־׃
translation:
  text: And he said, “Who told you that you were naked? Have you eaten from the tree
    that I commanded you not to eat from?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Did you eat from the tree ... ?' The Hebrew perfect
      can be represented in English either with a simple past or a present perfect
      in this context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from it.' English idiom often says 'eat from the tree' rather
      than 'eat from it' or 'eat of it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Direct interrogative pronoun introducing the first question.
- source_word: הִגִּיד לְךָ
  chosen: told you
  alternatives:
  - declared to you
  - announced to you
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means 'tell, declare, make known.' 'Told you'
    is the most natural modern English in this context.
- source_word: כִּי
  chosen: that
  alternatives:
  - that indeed
  lexicon: HALOT
  rationale: Introduces the content of what was told; simple 'that' fits the syntax.
- source_word: עֵירֹם
  chosen: naked
  alternatives:
  - bare
  lexicon: HALOT
  rationale: The adjective denotes being unclothed; 'naked' is the standard and contextually
    appropriate rendering, echoing the immediate context of Gen 3.
- source_word: אָתָּה
  chosen: you were
  alternatives:
  - you are
  lexicon: HALOT
  rationale: Although the pronoun itself is simply 'you,' English idiom after 'told
    you that' naturally supplies 'were' in this past-oriented discourse context. This
    is an optimal-equivalence adjustment for readable English.
- source_word: הֲמִן
  chosen: Have ... from
  alternatives:
  - Did ... from
  lexicon: HALOT
  rationale: Interrogative ה with מן introduces the yes/no question 'Have you eaten
    from...?' Present perfect in English suits the recent completed action with present
    relevance.
- source_word: הָעֵץ
  chosen: the tree
  lexicon: HALOT
  rationale: Definite noun referring to the previously specified forbidden tree.
- source_word: אֲשֶׁר צִוִּיתִיךָ
  chosen: that I commanded you
  alternatives:
  - which I commanded you
  lexicon: HALOT
  rationale: Relative clause with צוה plus pronominal suffix; 'that I commanded you'
    is natural modern English.
- source_word: לְבִלְתִּי אֲכָל
  chosen: not to eat
  alternatives:
  - that you should not eat
  - to refrain from eating
  lexicon: HALOT
  rationale: 'לבלתי + infinitive expresses prohibition/purpose: ''not to eat.'' This
    is concise and accurate.'
- source_word: מִמֶּנּוּ
  chosen: from it / from
  alternatives:
  - of it
  lexicon: HALOT
  rationale: מן with pronominal suffix means 'from it.' In idiomatic English with
    'tree,' 'eat from' is preferable to the more wooden 'eat of it.' The final preposition
    is retained in English to reflect the Hebrew relation.
- source_word: אָכָלְתָּ
  chosen: have you eaten
  alternatives:
  - did you eat
  lexicon: HALOT
  rationale: Qal perfect 2ms in direct question about a recent act is well represented
    by English present perfect.
