id: GEN.3.19
reference: Genesis 3:19
source:
  edition: WLC
  text: בְּ/זֵעַ֤ת אַפֶּ֨י/ךָ֙ תֹּ֣אכַל לֶ֔חֶם עַ֤ד שֽׁוּבְ/ךָ֙ אֶל הָ֣/אֲדָמָ֔ה כִּ֥י
    מִמֶּ֖/נָּה לֻקָּ֑חְתָּ כִּֽי עָפָ֣ר אַ֔תָּה וְ/אֶל עָפָ֖ר תָּשֽׁוּב־־־׃
translation:
  text: By the sweat of your face you will eat bread until you return to the ground,
    because from it you were taken; for you are dust, and to dust you will return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'By the sweat of your brow.' The Hebrew reads 'the
      sweat of your face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּזֵעַת אַפֶּיךָ
  chosen: By the sweat of your face
  alternatives:
  - By the sweat of your brow
  - In the sweat of your face
  lexicon: HALOT
  rationale: Literally 'in/by the sweat of your face.' 'Face' is the direct lexical
    equivalent of אַף here in the dual construct אַפֶּיךָ, while 'brow' is a common
    idiomatic English rendering. The main text keeps the Hebrew imagery more transparently;
    the idiomatic alternative is preserved in a footnote-worthy alternative list.
- source_word: תֹּאכַל לֶחֶם
  chosen: you will eat bread
  alternatives:
  - you will eat food
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread.' In context it can stand metonymically for
    food in general, but the Hebrew word itself is specific, so the main text retains
    'bread' while allowing readers to hear the broader sustenance sense from context.
- source_word: עַד שׁוּבְךָ אֶל הָאֲדָמָה
  chosen: until you return to the ground
  alternatives:
  - until you return to the soil
  lexicon: HALOT
  rationale: אֲדָמָה commonly means ground/soil/arable earth. 'Ground' is natural
    English and preserves the wordplay with humanity's origin from the earth without
    over-specifying agricultural nuance.
- source_word: כִּי מִמֶּנָּה לֻקָּחְתָּ
  chosen: because from it you were taken
  alternatives:
  - because you were taken from it
  - for from it you were taken
  lexicon: HALOT
  rationale: The clause gives the reason for returning to the ground. The feminine
    pronoun refers back to אֲדָמָה, hence 'it.' Passive 'were taken' reflects the
    Hebrew Pual.
- source_word: כִּי
  chosen: because / for
  alternatives:
  - for
  lexicon: HALOT
  rationale: The verse uses כִּי twice. The first is rendered 'because' to mark causal
    explanation clearly in modern English; the second is rendered 'for' to introduce
    the explanatory ground in a natural literary cadence. This reflects discourse
    function rather than forcing identical English in both positions.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - dry earth
  - loose soil
  lexicon: HALOT
  rationale: עָפָר is conventionally and accurately rendered 'dust' here, especially
    given the mortality formula 'to dust you will return.' This preserves the intertextual
    and theological resonance of human frailty and death.
- source_word: תָּשׁוּב
  chosen: you will return
  alternatives:
  - you shall return
  lexicon: HALOT
  rationale: The imperfect here expresses the announced consequence. 'Will return'
    is readable modern English and avoids archaic modal force while preserving the
    solemn certainty of the statement.
