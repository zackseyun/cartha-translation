theological_decisions:
- issue: Human mortality and material origin
  chosen_reading: The verse is rendered as a declaration that the man will return
    physically to the ground/dust from which he was taken.
  alternative_readings:
  - A more metaphorical reading emphasizing humiliation rather than physical death
  rationale: The immediate context and the lexical pairing of אֲדָמָה ('ground') and
    עָפָר ('dust') strongly support mortality and bodily return to the earth. The
    translation preserves this without importing later doctrinal elaboration beyond
    the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
