theological_decisions:
- issue: Force of the serpent's denial
  chosen_reading: 'A direct contradiction of the prior warning: ''You will not surely
    die.'''
  alternative_readings:
  - A softer denial such as 'You will not die'
  rationale: The Hebrew construction לֹא + infinitive absolute + finite verb is emphatic.
    Rendering the emphasis preserves the sharpness of the serpent's contradiction
    without adding interpretive commentary about immediate vs. eventual death.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
