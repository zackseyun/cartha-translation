id: GEN.3.4
reference: Genesis 3:4
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר הַ/נָּחָ֖שׁ אֶל הָֽ/אִשָּׁ֑ה לֹֽא מ֖וֹת תְּמֻתֽוּ/ן־־׃
translation:
  text: But the serpent said to the woman, “You will not surely die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''not dying you will die''—an emphatic construction meaning ''you
      will certainly/surely not die.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. English can render
    this as 'and,' 'then,' or 'but' depending on discourse function. Here the serpent's
    speech directly contradicts the prior divine warning, so 'But ... said' best captures
    the adversative force in context without over-paraphrasing.
- source_word: הַנָּחָשׁ
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: HALOT
  rationale: נָחָשׁ denotes a serpent/snake. 'Serpent' is preferred because it is
    standard in this narrative, carries the literary and theological weight of the
    tempter figure, and remains natural modern English.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition simply marks the indirect object of speech; 'to' is the
    natural English equivalent.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife' depending on context. In Genesis 2–3
    the narrative repeatedly uses 'the woman' before the naming of Eve, so 'the woman'
    preserves the literary pattern and avoids importing a narrower relational nuance
    here.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation; here it negates the following infinitive absolute
    + finite verb construction.
- source_word: מוֹת תְּמֻתוּן
  chosen: you will surely die
  alternatives:
  - you shall surely die
  - you will certainly die
  lexicon: HALOT
  rationale: The infinitive absolute מוֹת with the finite verb תְּמֻתוּן intensifies
    the verbal idea, expressing certainty/emphasis. In this negated clause, English
    is best rendered 'you will not surely die.' 'Surely' preserves the emphatic force
    more transparently than a bare 'die.' The 2nd person plural is retained as 'you'
    in English, since contemporary English lacks a distinct plural form.
