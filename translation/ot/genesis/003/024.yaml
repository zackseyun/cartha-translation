id: GEN.3.24
reference: Genesis 3:24
source:
  edition: WLC
  text: וַ/יְגָ֖רֶשׁ אֶת הָֽ/אָדָ֑ם וַ/יַּשְׁכֵּן֩ מִ/קֶּ֨דֶם לְ/גַן עֵ֜דֶן אֶת הַ/כְּרֻבִ֗ים
    וְ/אֵ֨ת לַ֤הַט הַ/חֶ֨רֶב֙ הַ/מִּתְהַפֶּ֔כֶת לִ/שְׁמֹ֕ר אֶת דֶּ֖רֶךְ עֵ֥ץ הַֽ/חַיִּֽים־־־־׃ס
translation:
  text: So he drove out the man, and at the east of the garden of Eden he stationed
    the cherubim and the flame of the sword that turns every way, to guard the way
    to the tree of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'east of the garden of Eden' or 'on the east side of the garden of Eden.'
      The Hebrew expression refers to the eastern side/front of the garden.
    reason: lexical_alternative
  - marker: b
    text: Traditionally rendered 'the flaming sword that turned every way.' The Hebrew
      is more literally 'the flame of the sword that turns itself/turns every way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  chosen: drove out
  alternatives:
  - banished
  - expelled
  lexicon: HALOT
  rationale: The verb גרשׁ commonly denotes driving out or expelling. 'Drove out'
    preserves the forceful action without adding interpretive nuance beyond the Hebrew.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here the narrative
    refers back to the individual human previously formed and placed in the garden,
    so 'the man' is the most contextually precise and gender-accurate rendering.
- source_word: וַיַּשְׁכֵּן
  chosen: he stationed
  alternatives:
  - he placed
  - he caused to dwell
  lexicon: HALOT
  rationale: The Hiphil of שכן here indicates causing something to dwell or be set
    in a location. 'Stationed' fits the guarding context better than the more neutral
    'placed' while remaining faithful to the sense.
- source_word: מִקֶּדֶם לְגַן עֵדֶן
  chosen: at the east of the garden of Eden
  alternatives:
  - east of the garden of Eden
  - on the east side of the garden of Eden
  lexicon: HALOT
  rationale: מִקֶּדֶם in this spatial context most naturally indicates the eastern
    side/front of the garden. 'At the east of' is idiomatic enough in English while
    preserving the locative sense.
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the established English transliteration for the plural
    heavenly beings and preserves the specific biblical term better than the more
    colloquial ''cherubs.'''
- source_word: לַהַט הַחֶרֶב הַמִּתְהַפֶּכֶת
  chosen: the flame of the sword that turns every way
  alternatives:
  - the flaming sword that turned every way
  - the flashing sword that whirled about
  lexicon: HALOT
  rationale: The Hebrew is literally 'the flame of the sword, the turning one.' Rendering
    it as 'the flame of the sword that turns every way' preserves the construct expression
    and the participial motion without collapsing it too quickly into a traditional
    paraphrase. 'Turns every way' conveys the ongoing, all-direction motion implied
    by the participle.
- source_word: לִשְׁמֹר
  chosen: to guard
  alternatives:
  - to keep
  - to watch over
  lexicon: HALOT
  rationale: שׁמר often means guard/keep/watch. In this context of restricted access,
    'to guard' best conveys protective and prohibitive force.
- source_word: דֶּרֶךְ
  chosen: the way to
  alternatives:
  - the way of
  - the path to
  lexicon: HALOT
  rationale: Although the Hebrew formally says 'the way of the tree of life,' in English
    the sense is the route leading to it. 'The way to' makes the relation clear and
    natural without distorting the meaning.
- source_word: עֵץ הַחַיִּים
  chosen: the tree of life
  lexicon: HALOT
  rationale: This is the standard and straightforward rendering of the construct phrase,
    with no contextual pressure to vary it.
