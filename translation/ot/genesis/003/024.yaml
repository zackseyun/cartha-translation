theological_decisions:
- issue: Rendering of אָדָם in narrative context
  chosen_reading: the man
  alternative_readings:
  - humankind
  - the human
  rationale: The verse refers to the specific individual expelled from Eden, not humanity
    in the abstract, so the singular personal rendering best matches the narrative
    while remaining consistent with the doctrine's gender-accurate principle for אָדָם.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, אָדָם; Translation philosophy
