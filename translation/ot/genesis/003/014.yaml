theological_decisions:
- issue: Nature of the serpent's curse
  chosen_reading: Translate the curse in straightforward creaturely terms without importing later theological identification into the main text.
  alternative_readings:
  - Read the serpent primarily as Satan and translate with interpretive expansion
  rationale: While later Scripture associates the serpent with Satan, this verse itself addresses 'the serpent' and describes the curse in concrete terms. The translation preserves the immediate narrative referent and does not import later doctrinal interpretation into the wording.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
