id: GEN.3.14
reference: Genesis 3:14
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ יְהֹוָ֨ה אֱלֹהִ֥ים אֶֽל הַ/נָּחָשׁ֮ כִּ֣י עָשִׂ֣יתָ זֹּאת֒ אָר֤וּר אַתָּה֙ מִ/כָּל הַ/בְּהֵמָ֔ה וּ/מִ/כֹּ֖ל חַיַּ֣ת הַ/שָּׂדֶ֑ה עַל גְּחֹנְ/ךָ֣ תֵלֵ֔ךְ וְ/עָפָ֥ר תֹּאכַ֖ל כָּל יְמֵ֥י חַיֶּֽי/ךָ׀־־־־׃
translation:
  text: Then Yahweh God said to the serpent, “Because you have done this, cursed are you above all livestock and above every beast of the field. On your belly you shall go, and dust you shall eat all the days of your life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the snake.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'eat dust' can also function as an image of humiliation and defeat, not necessarily a statement about literal diet alone.
    reason: cultural_note
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD' rather than a transliteration, following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In the collocation יְהֹוָה אֱלֹהִים, the natural English rendering is 'the LORD God.' This preserves both the divine name/title pairing and standard English syntax.
- source_word: הַנָּחָשׁ
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: HALOT
  rationale: '''Serpent'' better preserves the elevated and literary register of the narrative and its theological resonance, while still denoting a snake-like creature.'
- source_word: כִּי עָשִׂיתָ זֹּאת
  chosen: Because you have done this
  alternatives:
  - Since you have done this
  lexicon: HALOT
  rationale: This clause gives the reason for the ensuing judgment. 'Because' is the clearest modern English causal connector here.
- source_word: אָרוּר אַתָּה
  chosen: cursed are you
  alternatives:
  - you are cursed
  lexicon: HALOT
  rationale: Fronting 'cursed' reflects the Hebrew predicate adjective emphasis and preserves the solemn judicial tone.
- source_word: מִכָּל הַבְּהֵמָה
  chosen: above all livestock
  alternatives:
  - more than all livestock
  - from all livestock
  lexicon: HALOT
  rationale: The min-comparative here is best expressed in idiomatic English as 'above all livestock,' indicating the serpent is singled out as especially cursed in comparison with domesticated animals.
- source_word: וּמִכֹּל חַיַּת הַשָּׂדֶה
  chosen: and above every wild animal of the field
  alternatives:
  - and above all the beasts of the field
  - and above every animal of the field
  lexicon: HALOT
  rationale: חַיַּת הַשָּׂדֶה refers to wild land animals rather than domesticated stock. 'Wild animal of the field' communicates the distinction from livestock while remaining natural English.
- source_word: עַל גְּחֹנְךָ תֵלֵךְ
  chosen: On your belly you shall go
  alternatives:
  - On your belly you will crawl
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'go/walk,' not explicitly 'crawl.' 'You shall go' preserves the wording while the phrase 'on your belly' conveys the manner.
- source_word: וְעָפָר תֹּאכַל
  chosen: and dust you shall eat
  alternatives:
  - and you shall eat dust
  lexicon: HALOT
  rationale: Keeping 'dust' before the verb lightly reflects the Hebrew word order and preserves the vivid curse imagery. The phrase may be idiomatic for humiliation, but the translation should not over-interpret in the main text.
- source_word: כָּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - all your life
  lexicon: HALOT
  rationale: This fuller rendering preserves the formal cadence and explicitness of the Hebrew expression.
