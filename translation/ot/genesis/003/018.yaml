id: GEN.3.18
reference: Genesis 3:18
source:
  edition: WLC
  text: וְ/ק֥וֹץ וְ/דַרְדַּ֖ר תַּצְמִ֣יחַֽ לָ֑/ךְ וְ/אָכַלְתָּ֖ אֶת עֵ֥שֶׂב הַ/שָּׂדֶֽה־׃
translation:
  text: It will produce thorns and thistles for you, and you will eat the plants of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will sprout for you'; the Hebrew verb is causative and refers back to the ground from the previous verse.
    reason: lexical_alternative
  - marker: b
    text: '''Plants of the field'' may also be rendered ''vegetation of the field'' or, more traditionally, ''herb of the field.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'It will cause thorns and thistles to grow'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְקֹוץ
  chosen: thorns
  alternatives:
  - thorn
  lexicon: HALOT
  rationale: קוֹץ denotes thorny growth; the plural collective sense fits natural English and the paired expression with דַּרְדַּר.
- source_word: וְדַרְדַּר
  chosen: thistles
  alternatives:
  - briers
  - thorns
  lexicon: HALOT
  rationale: דַּרְדַּר refers to a prickly weed distinct from קוֹץ; 'thistles' preserves the conventional distinction in the pair without over-specifying a botanical species.
- source_word: תַּצְמִיחַ לָךְ
  chosen: it will cause ... to grow for you
  alternatives:
  - it will sprout ... for you
  - it will bring forth ... for you
  lexicon: HALOT
  rationale: The Hiphil of צמח is causative, with the feminine singular verb referring back to the ground from the previous verse. 'Cause to grow' is clear modern English and preserves the causative force better than a simple 'grow.' 'For you' keeps לָךְ explicit, indicating the ground's production in relation to the man, here in a burdensome sense.
- source_word: וְאָכַלְתָּ
  chosen: and you will eat
  alternatives:
  - and you shall eat
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction continues the consequence statement. 'Will eat' gives natural English future sense in context.
- source_word: עֵשֶׂב הַשָּׂדֶה
  chosen: the plants of the field
  alternatives:
  - the herb of the field
  - the vegetation of the field
  - the plants of the open country
  lexicon: HALOT
  rationale: עֵשֶׂב is broad vegetation suitable for food, not specifically grass. 'Plants' is accessible modern English and avoids the archaic feel of 'herb.' 'Of the field' preserves the genitive and echoes the Eden narrative context.
