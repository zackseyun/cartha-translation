theological_decisions:
- issue: Rendering of the woman's explanation of the serpent's action
  chosen_reading: The serpent deceived me
  alternative_readings:
  - The serpent beguiled me
  - The serpent tricked me
  rationale: The verse attributes deception to the serpent without requiring a more theologically loaded or archaic English term. 'Deceived' preserves the moral and narrative force while remaining accessible. No doctrinal tension is resolved beyond the Hebrew's plain sense.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic or academic; preserve theological tension rather than resolve it.'
