id: GEN.3.13
reference: Genesis 3:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֧ה אֱלֹהִ֛ים לָ/אִשָּׁ֖ה מַה זֹּ֣את עָשִׂ֑ית וַ/תֹּ֨אמֶר֙ הָֽ/אִשָּׁ֔ה הַ/נָּחָ֥שׁ הִשִּׁיאַ֖/נִי וָ/אֹכֵֽל־׃
translation:
  text: Then Yahweh God said to the woman, “What is this you have done?” And the woman said, “The serpent deceived me, and I ate.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beguiled me.' The Hebrew verb can denote misleading or deceiving; 'deceived me' is used here for clear modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In the collocation יְהוָה אֱלֹהִים, the natural English rendering is 'the LORD God.' This preserves both the divine name/title pairing and standard intelligibility.
- source_word: לָאִשָּׁה
  chosen: to the woman
  alternatives:
  - to the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' In this immediate context, 'the woman' best matches the narrative designation used throughout the exchange and avoids importing the marital nuance as the primary sense here, though that nuance is contextually present.
- source_word: מַה זֹּאת עָשִׂית
  chosen: What is this you have done?
  alternatives:
  - What have you done?
  - Why have you done this?
  lexicon: HALOT
  rationale: This rendering preserves both the interrogative מַה and the demonstrative זֹּאת, giving the Hebrew's fuller force more clearly than the shorter 'What have you done?' It does not overtranslate into a causal 'Why' question.
- source_word: הַנָּחָשׁ
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: HALOT
  rationale: '''Serpent'' is the established and contextually weightier rendering in Genesis 3, preserving the literary and theological resonance of the figure better than the more ordinary ''snake.'''
- source_word: הִשִּׁיאַנִי
  chosen: deceived me
  alternatives:
  - beguiled me
  - tricked me
  - led me astray
  lexicon: HALOT
  rationale: The verb conveys deception or misleading. 'Deceived me' is clear modern English and best fits the translation philosophy. 'Beguiled me' is traditional but archaic for the target audience.
- source_word: וָאֹכֵל
  chosen: and I ate
  alternatives:
  - so I ate
  lexicon: HALOT
  rationale: The waw-consecutive with first person singular is most straightforwardly rendered 'and I ate.' This preserves the sequence of events without adding an interpretive causal nuance beyond what the Hebrew explicitly states.
