theological_decisions:
- issue: Plural pronoun in 'like one of us'
  chosen_reading: Retain the plural 'us' without interpretive expansion.
  alternative_readings:
  - plural of majesty
  - divine council language
  - adumbration of intra-divine plurality
  rationale: The Hebrew plainly uses a first-person plural suffix/pronoun. The translation should preserve that theological tension rather than resolve it toward any one interpretive framework. No explanatory expansion is warranted in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Abrupt ending of the divine speech
  chosen_reading: Preserve the broken-off sense with a dash after 'live forever—'.
  alternative_readings:
  - complete the sense smoothly without punctuation
  - supply an implied apodosis
  rationale: The Hebrew presents an incomplete or abruptly suspended clause before the next verse continues the narrative action. The dash reflects the interruption and avoids adding words not present in the source.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
