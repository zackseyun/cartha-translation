id: GEN.3.22
reference: Genesis 3:22
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֣ה אֱלֹהִ֗ים הֵ֤ן הָֽ/אָדָם֙ הָיָה֙ כְּ/אַחַ֣ד מִמֶּ֔/נּוּ לָ/דַ֖עַת ט֣וֹב וָ/רָ֑ע וְ/עַתָּ֣ה פֶּן יִשְׁלַ֣ח יָד֗/וֹ וְ/לָקַח֙ גַּ֚ם מֵ/עֵ֣ץ הַֽ/חַיִּ֔ים וְ/אָכַ֖ל וָ/חַ֥י לְ/עֹלָֽם׀׀־׃
translation:
  text: Then Yahweh God said, “Behold, the man has become like one of us, knowing good and evil. And now, lest he reach out his hand and also take from the tree of life and eat, and live forever—”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as one of us.' The Hebrew plural 'us' is preserved; interpreters variously understand it as divine council language, a plural of deliberation, or an adumbration of intra-divine plurality.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In apposition with יְהוָה, the phrase יְהוָה אֱלֹהִים is idiomatically rendered 'the LORD God.'
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic/interjective force of the Hebrew while remaining natural in elevated narrative speech. 'Behold' best preserves the solemnity here.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - humankind
  lexicon: HALOT
  rationale: Per the doctrine note on אָדָם, context here points to the individual human just discussed, not humanity in the abstract. 'The man' is gender-accurate and contextually precise.
- source_word: הָיָה
  chosen: has become
  alternatives:
  - became
  - is become
  lexicon: HALOT
  rationale: The perfect here describes a resultant state following the transgression. 'Has become' communicates that present-result nuance better than simple past in English.
- source_word: כְּאַחַד מִמֶּנּוּ
  chosen: like one of us
  alternatives:
  - as one of us
  lexicon: HALOT
  rationale: This is the most straightforward rendering of the comparative phrase. 'Like one of us' is idiomatic modern English and preserves the plural pronoun.
- source_word: לָדַעַת טוֹב וָרָע
  chosen: knowing good and evil
  alternatives:
  - to know good and evil
  - with knowledge of good and evil
  lexicon: HALOT
  rationale: An infinitive of result/explanation after 'has become like one of us'; 'knowing good and evil' reads naturally in English and preserves the cognitive-moral scope of the Hebrew expression.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Preserves the discourse progression and urgency of the next clause.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that he may not
  lexicon: HALOT
  rationale: Best concise English equivalent for a preventive clause in elevated narrative style.
- source_word: יִשְׁלַח יָדוֹ
  chosen: he reach out his hand
  alternatives:
  - he stretch out his hand
  - he send out his hand
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression while preserving the concrete imagery.
- source_word: וְלָקַח גַּם מֵעֵץ הַחַיִּים
  chosen: and also take from the tree of life
  alternatives:
  - and take also from the tree of life
  - and even take from the tree of life
  lexicon: HALOT
  rationale: Places 'also' where it sounds natural in English while preserving the additive force of גַּם.
- source_word: עֵץ הַחַיִּים
  chosen: the tree of life
  lexicon: HALOT
  rationale: Standard and transparent rendering of the construct phrase.
- source_word: וְאָכַל
  chosen: and eat
  lexicon: HALOT
  rationale: Simple sequential action in the feared scenario; no need to over-interpret aspect.
- source_word: וָחַי לְעֹלָם
  chosen: and live forever
  alternatives:
  - and live for ever
  - and live indefinitely
  lexicon: HALOT
  rationale: לְעֹלָם here denotes enduring perpetuity in the narrative scenario. 'Live forever' is the clearest modern English rendering.
