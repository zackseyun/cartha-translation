theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relation of the man's task to his original vocation
  chosen_reading: to work the ground
  alternative_readings:
  - to cultivate the ground
  - to serve the ground
  rationale: The translation preserves the lexical continuity with humanity's original
    commission to work the garden/ground without adding interpretive commentary about
    curse or redemption beyond what the verse states.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
