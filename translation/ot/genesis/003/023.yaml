id: GEN.3.23
reference: Genesis 3:23
source:
  edition: WLC
  text: וַֽ/יְשַׁלְּחֵ֛/הוּ יְהוָ֥ה אֱלֹהִ֖ים מִ/גַּן עֵ֑דֶן לַֽ/עֲבֹד֙ אֶת הָ֣/אֲדָמָ֔ה
    אֲשֶׁ֥ר לֻקַּ֖ח מִ/שָּֽׁם־־׃
translation:
  text: So the LORD God sent him out from the garden of Eden to work the ground from
    which he had been taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to cultivate the ground.' The Hebrew verb can mean 'work,' 'serve,'
      or in this context 'cultivate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלְּחֵהוּ
  chosen: sent him out
  alternatives:
  - drove him out
  - sent him away
  lexicon: HALOT
  rationale: The verb שׁלח in the piel commonly means 'send' or 'send away.' Here
    the causative-expulsive sense is clear from the context of removal from Eden,
    so 'sent him out' preserves both the basic verbal meaning and the directional
    force without importing the stronger nuance of גרשׁ ('drive out'), which appears
    in the next verse.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' The compound
    divine designation is standardly represented as 'the LORD God,' preserving both
    covenant name reverence and the Hebrew pairing.
- source_word: מִגַּן עֵדֶן
  chosen: from the garden of Eden
  alternatives:
  - out of the garden of Eden
  lexicon: HALOT
  rationale: The preposition מִן marks separation from the location. 'From the garden
    of Eden' is natural English and keeps the place-name construction intact.
- source_word: לַעֲבֹד
  chosen: to work
  alternatives:
  - to cultivate
  - to serve
  lexicon: HALOT
  rationale: עבד can mean 'work,' 'serve,' or in agricultural contexts 'cultivate.'
    Because the object is 'the ground,' 'to work' is clear, natural, and broad enough
    to include cultivation without over-specifying.
- source_word: אֶת הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the soil
  - the land
  lexicon: HALOT
  rationale: אֲדָמָה in Genesis 2–3 refers specifically to the earth/soil from which
    the man was formed and which he is to till. 'Ground' preserves the narrative linkage
    and reads idiomatically with 'work.'
- source_word: אֲשֶׁר לֻקַּח מִשָּׁם
  chosen: from which he had been taken
  alternatives:
  - from there he was taken
  - whence he was taken
  lexicon: HALOT
  rationale: 'The relative clause modifies ''the ground.'' English idiom prefers fronting
    the preposition: ''from which he had been taken.'' The passive לֻקַּח is best
    rendered with past perfect (''had been taken'') to reflect prior action relative
    to his expulsion.'
