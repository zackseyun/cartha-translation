  from: 'These are the chiefs of the sons of Esau: the sons of Eliphaz, Esau’s firstborn: Chief Teman, Chief Omar, Chief Zepho, Chief Kenaz.'
  to: 'These are the chiefs of the sons of Esau. The sons of Eliphaz, Esau’s firstborn: Chief Teman, Chief Omar, Chief Zepho, Chief Kenaz.'
  rationale: The Hebrew text has a major pausal break (the atnach) after 'sons of Esau,' suggesting two distinct thoughts. The first phrase, 'These are the chiefs of the sons of Esau,' functions as a heading for the entire section (vv. 15-19), not just this verse's list. The current single-sentence, double-colon structure is grammatically cumbersome and obscures this discourse-level function by linking the main heading too tightly to the sub-list. Rendering it as two sentences (or a sentence followed by a list-heading fragment, as suggested) better reflects the Hebrew syntax and improves clarity for the English reader.
