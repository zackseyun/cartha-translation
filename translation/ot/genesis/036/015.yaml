id: GEN.36.15
reference: Genesis 36:15
source:
  edition: WLC
  text: אֵ֖לֶּה אַלּוּפֵ֣י בְנֵֽי עֵשָׂ֑ו בְּנֵ֤י אֱלִיפַז֙ בְּכ֣וֹר עֵשָׂ֔ו אַלּ֤וּף תֵּימָן֙ אַלּ֣וּף אוֹמָ֔ר אַלּ֥וּף צְפ֖וֹ אַלּ֥וּף קְנַֽז־׃
translation:
  text: 'These are the chiefs of the sons of Esau. The sons of Eliphaz, Esau’s firstborn: Chief Teman, Chief Omar, Chief Zepho, Chief Kenaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chiefs' for the title אַלּוּף; older English versions often have 'duke(s).'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''These are the chiefs of the sons of Esau: the sons of Eliphaz, Esau’s firstborn: Chief Teman, Chief Omar, Chief Zepho, Chief Kenaz.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: אַלּוּפֵי / אַלּוּף
  chosen: chiefs / Chief
  alternatives:
  - clans
  - dukes
  - tribal chiefs
  - leaders
  lexicon: HALOT
  rationale: אַלּוּף in Edomite genealogical lists denotes a clan leader or chieftain. 'Chief' preserves the title-like function in readable modern English better than archaic 'duke,' while avoiding the more interpretive plural 'clans' in the individual listings.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of.' In this genealogical context it can imply descendants, but the immediate line concerns named male lineage, so 'sons of' is the most textually transparent rendering.
- source_word: בְּכוֹר
  chosen: firstborn
  alternatives:
  - eldest son
  lexicon: HALOT
  rationale: '''Firstborn'' is the standard and precise rendering, preserving both birth-order and potential status implications without overexplaining.'
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: The verbless introductory formula is naturally rendered in English as 'These are' in genealogical enumeration.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention per translation philosophy.
- source_word: אֱלִיפַז
  chosen: Eliphaz
  rationale: Personal name transliterated by standard English convention.
- source_word: תֵּימָן
  chosen: Teman
  rationale: Personal name/clan name transliterated directly; in this list it functions as the name attached to the title 'Chief.'
- source_word: אוֹמָר
  chosen: Omar
  rationale: Personal name transliterated directly.
- source_word: צְפוֹ
  chosen: Zepho
  alternatives:
  - Zepo
  lexicon: HALOT
  rationale: The consonantal form is commonly represented as 'Zepho' in English translations; this preserves recognizable convention while reflecting the Hebrew name.
- source_word: קְנַז
  chosen: Kenaz
  rationale: Personal name transliterated directly.
