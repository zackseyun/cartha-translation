id: GEN.36.40
reference: Genesis 36:40
source:
  edition: WLC
  text: וְ֠/אֵלֶּה שְׁמ֞וֹת אַלּוּפֵ֤י עֵשָׂו֙ לְ/מִשְׁפְּחֹתָ֔/ם לִ/מְקֹמֹתָ֖/ם בִּ/שְׁמֹתָ֑/ם
    אַלּ֥וּף תִּמְנָ֛ע אַלּ֥וּף עַֽלְוָ֖ה אַלּ֥וּף יְתֵֽת׃
translation:
  text: 'And these are the names of the chiefs of Esau, according to their clans,
    according to their places, by their names: Chief Timna, Chief Alvah, Chief Jetheth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Timna may also be transliterated 'Timnah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Alvah'; compare the related form 'Aliah' in 1 Chronicles 1:51.
    reason: cross_reference
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative naturally introduces the next list.
    Rendering both elements as 'And these are' preserves the narrative linkage and
    list-introduction function.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct with the following noun requires 'the names of'; this is the
    standard and plain sense in a genealogical/list context.
- source_word: אַלּוּפֵי
  chosen: chiefs
  alternatives:
  - clan chiefs
  - leaders
  - dukes
  lexicon: HALOT
  rationale: אַלּוּף in Genesis 36 denotes Edomite tribal or clan leaders. 'Chiefs'
    is clear modern English and avoids the archaic 'dukes.' 'Clan chiefs' is possible,
    but 'chiefs' keeps the text readable while the following phrase 'according to
    their clans' supplies the social framework.
- source_word: עֵשָׂו
  chosen: Esau
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their clans
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה often refers to clan/family grouping. 'Clans' fits the tribal-genealogical
    context better than the more domestic-sounding 'families.' The prefixed ל is classificatory
    here, hence 'according to.'
- source_word: לִמְקֹמֹתָם
  chosen: according to their places
  alternatives:
  - by their places
  - according to their settlements
  lexicon: HALOT
  rationale: מָקוֹם is literally 'place.' In this list context it likely refers to
    territorial/local divisions. 'According to their places' preserves the Hebrew
    wording without over-interpreting as 'settlements,' though that nuance is possible.
- source_word: בִּשְׁמֹתָם
  chosen: by their names
  alternatives:
  - according to their names
  - named individually
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken in a classificatory/listing sense:
    the chiefs are enumerated by name. ''By their names'' is concise and natural while
    staying close to the Hebrew.'
- source_word: אַלּוּף
  chosen: Chief
  alternatives:
  - Clan chief
  - Leader
  - Duke
  lexicon: HALOT
  rationale: Repeated title before each proper name is best rendered consistently
    as 'Chief.' Capitalization reflects its use as a title in the list. 'Duke' is
    traditional but misleading in modern English because it suggests a later European
    noble rank.
- source_word: תִּמְנָע
  chosen: Timna
  alternatives:
  - Timnah
  lexicon: HALOT
  rationale: The consonantal form here is commonly represented as 'Timna.' 'Timnah'
    is also seen in English tradition and is worth preserving as an alternative transliteration.
- source_word: עַלְוָה
  chosen: Alvah
  alternatives:
  - Aliah
  lexicon: HALOT
  rationale: The MT here reads עַלְוָה, conventionally transliterated 'Alvah.' A related
    name appears as 'Aliah' in 1 Chronicles 1:51, so that alternative is worth noting,
    but the present verse should follow the MT form.
- source_word: יְתֵת
  chosen: Jetheth
  alternatives:
  - Jether
  lexicon: HALOT
  rationale: Standard transliteration of the Hebrew form in this verse. It should
    not be harmonized to other similar names such as Jether without textual warrant.
