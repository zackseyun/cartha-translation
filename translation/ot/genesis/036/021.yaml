id: GEN.36.21
reference: Genesis 36:21
source:
  edition: WLC
  text: וְ/דִשׁ֥וֹן וְ/אֵ֖צֶר וְ/דִישָׁ֑ן אֵ֣לֶּה אַלּוּפֵ֧י הַ/חֹרִ֛י בְּנֵ֥י שֵׂעִ֖יר
    בְּ/אֶ֥רֶץ אֱדֽוֹם׃
translation:
  text: and Dishon, and Ezer, and Dishan. These are the chiefs of the Horites, the
    sons of Seir, in the land of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan leaders' for 'chiefs' (Hebrew אַלּוּפִים), emphasizing social-political
      heads of groups rather than merely prominent individuals.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִשׁוֹן
  chosen: Dishon
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: אֵצֶר
  chosen: Ezer
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English form.
- source_word: דִישָׁן
  chosen: Dishan
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: 'Demonstrative plural introducing an identification formula. English
    idiom naturally supplies the copula: ''These are.'''
- source_word: אַלּוּפֵי
  chosen: chiefs
  alternatives:
  - clans
  - tribal chiefs
  - dukes
  lexicon: HALOT
  rationale: In Genesis 36, אַלּוּף denotes clan leaders or chieftains among Edomite/Horite
    groups. 'Chiefs' is clear modern English and avoids the archaic 'dukes,' while
    preserving the leadership sense better than the more abstract 'clans.'
- source_word: הַחֹרִי
  chosen: the Horites
  alternatives:
  - the Horite
  lexicon: HALOT
  rationale: Although morphologically singular with article, the term functions collectively/ethnically
    here. English idiom prefers the plural ethnonym 'the Horites' in apposition to
    'chiefs.'
- source_word: בְּנֵי שֵׂעִיר
  chosen: the sons of Seir
  alternatives:
  - the descendants of Seir
  lexicon: HALOT
  rationale: Formal genealogical expression. 'Sons' preserves the source wording and
    lineage emphasis; 'descendants' is possible but less formally aligned.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: Retains the full Hebrew phrase with 'land,' which is stylistically and
    geographically explicit.
