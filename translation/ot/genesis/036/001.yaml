theological_decisions:
- issue: Rendering the Genesis heading term תֹּלְדֹוֹת
  chosen_reading: the generations of
  alternative_readings:
  - the account of
  - the descendants of
  rationale: This is primarily a literary-structural decision rather than a doctrinal
    one. 'Generations of' preserves the recurring Genesis formula and avoids narrowing
    the term to either narrative account or biological descendants alone.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
