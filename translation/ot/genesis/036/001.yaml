id: GEN.36.1
reference: Genesis 36:1
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה תֹּלְד֥וֹת עֵשָׂ֖ו ה֥וּא אֱדֽוֹם׃
translation:
  text: Now these are the generations of Esau (that is, Edom).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And these are the generations of Esau; he is Edom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction וְ plus demonstrative אֵלֶּה introduces a new section.
    'Now these are' is natural modern English and preserves the discourse-marking
    force better than a bare 'These are,' while avoiding overly wooden style.
- source_word: תֹּלְדֹוֹת
  chosen: the generations of
  alternatives:
  - the family line of
  - the account of
  - the descendants of
  lexicon: HALOT
  rationale: Toledot is a key Genesis structuring term. 'Generations of' preserves
    the formal linkage with repeated Genesis headings better than more interpretive
    options like 'family line' or 'account.'
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: הוּא
  chosen: that is
  alternatives:
  - he is
  - who is
  lexicon: HALOT
  rationale: Here the pronoun functions appositionally/epexegetically, identifying
    Esau with Edom. English idiom prefers 'that is' in parenthetical explanation over
    the more wooden 'he is.'
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Proper name retained as 'Edom.' In context it identifies Esau with the
    nation/name Edom, and the parenthetical rendering makes that identification clear.
