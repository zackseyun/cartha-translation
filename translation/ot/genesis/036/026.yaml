id: GEN.36.26
reference: Genesis 36:26
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה בְּנֵ֣י דִישָׁ֑ן חֶמְדָּ֥ן וְ/אֶשְׁבָּ֖ן וְ/יִתְרָ֥ן וּ/כְרָֽן׃
translation:
  text: 'And these were the sons of Dishan: Hemdan, Eshban, Ithran, and Keran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions spell the final name 'Cheran.' The Hebrew form can
      be transliterated either way; 'Keran' is used here for closer transparency to
      the consonantal form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these were
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a genealogical list. English
    commonly supplies 'were' in this narrative/register to make the verbless Hebrew
    clause natural. 'These are' is possible, but 'these were' fits the genealogical
    recounting in context.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct form literally means 'sons of.' In genealogical lists,
    'descendants of' can be broader, but here the immediate listing of named male
    offspring favors the more specific and formally closer 'sons of.'
- source_word: דִישָׁן
  chosen: Dishan
  alternatives:
  - Dishon
  lexicon: HALOT
  rationale: This proper name is transliterated rather than translated, following
    the project's policy for personal names. 'Dishan' reflects the consonantal form
    in this verse.
- source_word: חֶמְדָּן
  chosen: Hemdan
  alternatives:
  - Hamdan
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention from the Hebrew
    form in the MT/WLC.
- source_word: וְ/אֶשְׁבָּן
  chosen: Eshban
  lexicon: HALOT
  rationale: Proper name transliterated directly; the prefixed conjunction is represented
    by the list punctuation and final 'and' in English.
- source_word: וְ/יִתְרָן
  chosen: Ithran
  alternatives:
  - Jethran
  lexicon: HALOT
  rationale: Proper name transliterated from Hebrew. 'Ithran' is the standard direct
    transliteration of יתרן in this context.
- source_word: וּ/כְרָן
  chosen: and Keran
  alternatives:
  - Cheran
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered explicitly as 'and' before the final
    item in the series. 'Keran' is a standard transliteration; some English traditions
    use 'Cheran,' but 'Keran' more transparently reflects the Hebrew consonant kaf
    here.
