id: GEN.36.5
reference: Genesis 36:5
source:
  edition: WLC
  text: וְ/אָהֳלִֽיבָמָה֙ יָֽלְדָ֔ה אֶת יעיש וְ/אֶת יַעְלָ֖ם וְ/אֶת קֹ֑רַח אֵ֚לֶּה
    בְּנֵ֣י עֵשָׂ֔ו אֲשֶׁ֥ר יֻלְּדוּ ל֖/וֹ בְּ/אֶ֥רֶץ כְּנָֽעַן־־־־׃
translation:
  text: And Oholibamah bore Jeush, Jalam, and Korah. These are the sons of Esau who
    were born to him in the land of Canaan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָהֳלִיבָמָה
  chosen: Oholibamah
  alternatives:
  - Aholibamah
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: The verb ילד in genealogical contexts is idiomatically rendered 'bore'
    in concise modern English, preserving the maternal subject and genealogical style.
- source_word: אֶת ... וְאֶת ... וְאֶת
  chosen: '[direct object markers omitted in English]'
  lexicon: HALOT
  rationale: The Hebrew direct object marker has no direct English equivalent and
    is naturally unexpressed in translation.
- source_word: יעיש
  chosen: Jeush
  alternatives:
  - Je'ush
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: יַעְלָם
  chosen: Jalam
  alternatives:
  - Jaalam
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; 'Jalam' is a common
    concise form in English Bible tradition.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These ones
  lexicon: HALOT
  rationale: Natural demonstrative rendering introducing the summary statement.
- source_word: בְּנֵי
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring here, and the verse lists
    named sons. This follows the gender-accurate principle.
- source_word: עֵשָׂו
  chosen: Esau
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אֲשֶׁר יֻלְּדוּ לוֹ
  chosen: who were born to him
  alternatives:
  - whom she bore to him
  - who were fathered by him
  lexicon: HALOT
  rationale: The passive construction with לּוֹ is most naturally rendered 'were born
    to him' in English. This preserves the Hebrew focus on these sons as Esau's offspring
    without awkwardness. 'Whom she bore to him' is possible by context but adds an
    explicit maternal element not stated in this clause.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retains the explicit noun 'land' (אֶרֶץ) while remaining natural English;
    this slightly more formal phrasing matches the genealogical register.
