id: GEN.36.41
reference: Genesis 36:41
source:
  edition: WLC
  text: אַלּ֧וּף אָהֳלִיבָמָ֛ה אַלּ֥וּף אֵלָ֖ה אַלּ֥וּף פִּינֹֽן׃
translation:
  text: Chief Oholibamah, chief Elah, chief Pinon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chief' for אַלּוּף; older English versions often have 'duke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - leader
  lexicon: HALOT
  rationale: In Genesis 36, אַלּוּף denotes an Edomite tribal or clan leader. 'Chief'
    is concise, natural English and avoids the archaic/tradition-bound 'duke.' 'Clan
    chief' is more explicit but heavier than the Hebrew's repeated list style.
- source_word: אָהֳלִיבָמָה
  chosen: Oholibamah
  alternatives:
  - Aholibamah
  rationale: Personal name transliterated per translation philosophy. 'Oholibamah'
    reflects a standard English transliteration of the Hebrew name; alternate spellings
    exist in English tradition.
- source_word: אֵלָה
  chosen: Elah
  rationale: Personal name transliterated directly from Hebrew. No title or descriptive
    sense is indicated here; it functions as a proper name in the list.
- source_word: פִּינֹן
  chosen: Pinon
  alternatives:
  - Pinnon
  rationale: Personal name transliterated directly from Hebrew. 'Pinon' is the conventional
    rendering of this proper name in English Bible tradition and matches the consonantal
    form adequately.
