id: GEN.36.42
reference: Genesis 36:42
source:
  edition: WLC
  text: אַלּ֥וּף קְנַ֛ז אַלּ֥וּף תֵּימָ֖ן אַלּ֥וּף מִבְצָֽר׃
translation:
  text: chief Kenaz, chief Teman, chief Mibzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chief' for each occurrence of 'chief'; traditional English versions
      often have 'duke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - chieftain
  lexicon: HALOT
  rationale: In Genesis 36, אַלּוּף denotes an Edomite tribal or clan leader. 'Chief'
    is concise, natural modern English, and fits the repetitive list structure better
    than the archaic 'duke.' 'Clan chief' is more explicit but adds a nuance not overtly
    present in each occurrence.
- source_word: קְנַז
  chosen: Kenaz
  rationale: Proper name; transliterated according to the translation philosophy to
    preserve the personal/clan name rather than translate.
- source_word: תֵּימָן
  chosen: Teman
  rationale: Proper name; transliterated. Although the root can relate to 'south'
    or 'right hand,' here it functions as a name in the Edomite chiefs list.
- source_word: מִבְצָר
  chosen: Mibzar
  alternatives:
  - Mibsar
  rationale: Proper name; transliterated. The consonantal form supports a standard
    English transliteration 'Mibzar'; a slightly different vocalized transliteration
    such as 'Mibsar' may appear in some traditions, but the name should remain transliterated
    rather than translated.
