id: GEN.36.28
reference: Genesis 36:28
source:
  edition: WLC
  text: אֵ֥לֶּה בְנֵֽי דִישָׁ֖ן ע֥וּץ וַ/אֲרָֽן־׃
translation:
  text: 'These are the sons of Dishan: Uz and Aran.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing a genealogical list. Rendering as 'These are'
    is idiomatic in English and matches the verbless Hebrew list-introduction formula.
- source_word: בְנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical contexts בנים commonly denotes direct male offspring
    or lineage members. Here, because two named males follow immediately, 'the sons
    of' is the most natural and specific rendering.
- source_word: דִישָׁן
  chosen: Dishan
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: עוּץ
  chosen: Uz
  alternatives:
  - Uts
  rationale: Proper personal name. 'Uz' is the standard English transliteration in
    biblical usage and preserves recognizability.
- source_word: וַאֲרָן
  chosen: and Aran
  rationale: Conjunction ו plus proper name אֲרָן. Rendered straightforwardly as 'and
    Aran'; the prefixed conjunction simply coordinates the second son in the list.
