id: GEN.36.16
reference: Genesis 36:16
source:
  edition: WLC
  text: אַלּֽוּף קֹ֛רַח אַלּ֥וּף גַּעְתָּ֖ם אַלּ֣וּף עֲמָלֵ֑ק אֵ֣לֶּה אַלּוּפֵ֤י אֱלִיפַז֙
    בְּ/אֶ֣רֶץ אֱד֔וֹם אֵ֖לֶּה בְּנֵ֥י עָדָֽה־׃
translation:
  text: Chief Korah, chief Gaatham, chief Amalek—these are the chiefs of Eliphaz in
    the land of Edom; these are the sons of Adah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gatam.' English transliteration of this name varies.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - leader
  lexicon: HALOT
  rationale: אַלּוּף in Genesis 36 denotes an Edomite tribal or clan leader. 'Chief'
    is clear modern English and avoids the archaic 'duke,' while preserving the social-political
    sense better than a generic 'leader.' Repetition is retained to reflect the Hebrew
    structure.
- source_word: קֹרַח
  chosen: Korah
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: גַּעְתָּם
  chosen: Gaatham
  alternatives:
  - Gatam
  rationale: Proper name transliterated. 'Gaatham' reflects the consonantal form more
    transparently in English, though 'Gatam' is a common conventional spelling; the
    alternative is preserved because English tradition varies.
- source_word: עֲמָלֵק
  chosen: Amalek
  rationale: Proper name transliterated by standard convention. Here it names a chief
    descended from Eliphaz, not the later people group in abstraction, though the
    name is the same.
- source_word: אֵלֶּה
  chosen: these are
  alternatives:
  - these
  lexicon: HALOT
  rationale: The demonstrative introduces an identifying clause. Rendering as 'these
    are' makes the verbless Hebrew clause natural in English while staying close to
    the syntax.
- source_word: אַלּוּפֵי אֱלִיפַז
  chosen: the chiefs of Eliphaz
  alternatives:
  - the clan chiefs of Eliphaz
  lexicon: HALOT
  rationale: Construct chain indicating the chiefs associated with or descended from
    Eliphaz. 'Of Eliphaz' is the most direct and sufficiently clear in context.
- source_word: בְּאֶרֶץ אֱדֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: The phrase explicitly includes 'land,' so it is retained rather than
    reduced to simply 'in Edom.' This preserves the geographic-territorial nuance.
- source_word: בְּנֵי עָדָה
  chosen: the sons of Adah
  alternatives:
  - the descendants of Adah
  - the children of Adah
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of' and in genealogical contexts can denote
    descendants. Here 'sons of Adah' preserves the formal genealogical wording and
    matches the Hebrew expression closely; broader alternatives are possible but less
    direct.
