id: GEN.36.17
reference: Genesis 36:17
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה בְּנֵ֤י רְעוּאֵל֙ בֶּן עֵשָׂ֔ו אַלּ֥וּף נַ֨חַת֙ אַלּ֣וּף זֶ֔רַח
    אַלּ֥וּף שַׁמָּ֖ה אַלּ֣וּף מִזָּ֑ה אֵ֣לֶּה אַלּוּפֵ֤י רְעוּאֵל֙ בְּ/אֶ֣רֶץ אֱד֔וֹם
    אֵ֕לֶּה בְּנֵ֥י בָשְׂמַ֖ת אֵ֥שֶׁת עֵשָֽׂו־׃
translation:
  text: 'And these are the sons of Reuel son of Esau: chief Nahath, chief Zerah, chief
    Shammah, chief Mizzah. These are the chiefs of Reuel in the land of Edom. These
    are the sons of Basemath, Esau’s wife.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chiefs' for the repeated Hebrew term אַלּוּף, denoting an Edomite
      tribal leader.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  - Now these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next genealogical unit.
    'And these are' preserves the narrative linkage and the formulaic genealogical
    style.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: In a genealogy listing named male offspring, 'sons of' is the most direct
    and gender-accurate rendering.
- source_word: רְעוּאֵל בֶּן עֵשָׂו
  chosen: Reuel son of Esau
  alternatives:
  - Reuel, Esau's son
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional genealogy straightforwardly in
    natural English.
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - leader
  - duke
  lexicon: HALOT
  rationale: In Edomite genealogical contexts, אַלּוּף denotes a tribal or clan leader.
    'Chief' is clear modern English and avoids the archaic 'duke.' 'Clan chief' is
    possible but more interpretive than the Hebrew requires.
- source_word: נַחַת
  chosen: Nahath
  rationale: Personal name transliterated by standard English convention.
- source_word: זֶרַח
  chosen: Zerah
  rationale: Personal name transliterated by standard English convention.
- source_word: שַׁמָּה
  chosen: Shammah
  alternatives:
  - Shamma
  rationale: Standard transliteration of the personal name; doubling the consonant
    reflects common English convention for this Hebrew form.
- source_word: מִזָּה
  chosen: Mizzah
  alternatives:
  - Mizah
  rationale: Personal name transliterated; the doubled z reflects the Hebrew spelling
    and common transliteration practice.
- source_word: אֵלֶּה אַלּוּפֵי רְעוּאֵל
  chosen: These are the chiefs of Reuel
  alternatives:
  - These are Reuel's chiefs
  - These are the clan chiefs of Reuel
  lexicon: HALOT
  rationale: Construct plural with the repeated demonstrative summarizes the preceding
    list. 'Chiefs of Reuel' is both natural and close to the Hebrew.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so it is retained rather than
    compressed to simply 'in Edom.'
- source_word: בָשְׂמַת אֵשֶׁת עֵשָׂו
  chosen: Basemath, Esau’s wife
  alternatives:
  - Basemath wife of Esau
  lexicon: HALOT
  rationale: This appositional phrase identifies the maternal line. The comma aids
    readability while preserving the Hebrew sense.
