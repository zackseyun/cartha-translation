id: GEN.36.3
reference: Genesis 36:3
source:
  edition: WLC
  text: וְ/אֶת בָּשְׂמַ֥ת בַּת יִשְׁמָעֵ֖אל אֲח֥וֹת נְבָיֽוֹת־־׃
translation:
  text: and Basemath, the daughter of Ishmael, the sister of Nebaioth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Nebaioth: traditionally spelled ''Nebajoth'' in some English versions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - and [direct object marker left untranslated]
  lexicon: HALOT
  rationale: In this list context, וְ introduces another item in Esau's wives, while
    אֵת marks the definite direct object and is not represented directly in English.
    Rendering simply as 'and' gives natural English while preserving the additive
    force.
- source_word: בָּשְׂמַת
  chosen: Basemath
  alternatives:
  - Basemath
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: בַּת
  chosen: the daughter of
  alternatives:
  - daughter of
  lexicon: HALOT
  rationale: 'Construct relationship indicating parentage. The article is supplied
    in English for naturalness because the phrase identifies Basemath appositionally:
    ''the daughter of Ishmael.'''
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Proper name, transliterated in standard English form.
- source_word: אֲח֥וֹת
  chosen: the sister of
  alternatives:
  - sister of
  lexicon: HALOT
  rationale: Construct noun indicating sibling relationship. The article is supplied
    for smooth appositional English parallel to 'the daughter of Ishmael.'
- source_word: נְבָיֽוֹת
  chosen: Nebaioth
  alternatives:
  - Nebajoth
  lexicon: HALOT
  rationale: Proper name, transliterated. 'Nebaioth' follows a common modern transliteration
    from the Hebrew; 'Nebajoth' reflects an older conventional English form and is
    worth preserving as an alternative.
