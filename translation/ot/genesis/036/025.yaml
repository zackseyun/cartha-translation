id: GEN.36.25
reference: Genesis 36:25
source:
  edition: WLC
  text: וְ/אֵ֥לֶּה בְנֵֽי עֲנָ֖ה דִּשֹׁ֑ן וְ/אָהֳלִיבָמָ֖ה בַּת עֲנָֽה־־׃
translation:
  text: 'And these were the sons of Anah: Dishon and Oholibamah daughter of Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Anah.' Since Oholibamah is then called 'daughter of Anah,'
      'sons' here likely functions as a genealogical term for offspring or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - And these are
  - Now these were
  lexicon: HALOT
  rationale: Introduces a genealogical notice. English past tense fits the narrative/genealogical
    context better than a rigid present, while preserving the demonstrative force
    of 'these'.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct form literally means 'sons of.' Although Oholibamah is
    female, Hebrew בנים can function as a broader offspring term in genealogical formulas.
    'Sons of' is retained because it is the direct lexical form and reflects the idiom,
    with the verse itself specifying 'daughter of Anah' for Oholibamah.
- source_word: עֲנָה
  chosen: Anah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: דִּשֹׁן
  chosen: Dishon
  alternatives:
  - Dishon/Dishon
  rationale: Personal name transliterated by standard convention.
- source_word: וְאָהֳלִיבָמָה
  chosen: and Oholibamah
  rationale: Conjunction plus personal name. The name is transliterated rather than
    translated.
- source_word: בַּת
  chosen: daughter of
  lexicon: HALOT
  rationale: The appositional phrase identifies Oholibamah specifically as female
    and as Anah's daughter; this should be rendered explicitly.
