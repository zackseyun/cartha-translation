theological_decisions:
- issue: Genealogical tension between 'sons of Anah' and inclusion of a daughter
  chosen_reading: Retain the literal genealogical formula 'sons of Anah' while also
    translating 'daughter of Anah' explicitly.
  alternative_readings:
  - Render בְנֵי more broadly as 'children of Anah' to smooth the English
  rationale: The Hebrew text itself presents the tension, likely using 'sons' idiomatically
    for offspring/descendants in a genealogy while then specifying Oholibamah as a
    daughter. Preserving both elements is more transparent and auditable than harmonizing
    the wording in translation.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
