id: GEN.36.20
reference: Genesis 36:20
source:
  edition: WLC
  text: אֵ֤לֶּה בְנֵֽי שֵׂעִיר֙ הַ/חֹרִ֔י יֹשְׁבֵ֖י הָ/אָ֑רֶץ לוֹטָ֥ן וְ/שׁוֹבָ֖ל
    וְ/צִבְע֥וֹן וַ/עֲנָֽה־׃
translation:
  text: 'These are the sons of Seir the Horite, the inhabitants of the land: Lotan,
    Shobal, Zibeon, and Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those dwelling in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Standard demonstrative introducing a genealogical list. Presentative
    English 'These are' fits Hebrew list style naturally.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Although genealogical contexts can sometimes imply broader descent, the
    immediate context lists named male clan heads, so 'sons of' preserves the formal
    genealogical wording.
- source_word: שֵׂעִיר
  chosen: Seir
  rationale: Proper name transliterated per translation philosophy.
- source_word: הַחֹרִי
  chosen: the Horite
  alternatives:
  - the Horite man
  - the Horite people
  lexicon: HALOT
  rationale: Gentilic/title identifying Seir ethnically. 'The Horite' is the most
    natural English appositional rendering after the proper name.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  - the dwellers of the land
  lexicon: HALOT
  rationale: Construct participle plus noun denotes settled inhabitants. 'Inhabitants
    of the land' is idiomatic and preserves the sense without over-paraphrase.
- source_word: לוֹטָן
  chosen: Lotan
  rationale: Proper name transliterated by standard convention.
- source_word: שׁוֹבָל
  chosen: Shobal
  rationale: Proper name transliterated by standard convention.
- source_word: צִבְעוֹן
  chosen: Zibeon
  rationale: Proper name transliterated by standard convention.
- source_word: עֲנָה
  chosen: Anah
  rationale: Proper name transliterated by standard convention.
