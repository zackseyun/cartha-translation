id: GEN.36.11
reference: Genesis 36:11
source:
  edition: WLC
  text: וַ/יִּהְי֖וּ בְּנֵ֣י אֱלִיפָ֑ז תֵּימָ֣ן אוֹמָ֔ר צְפ֥וֹ וְ/גַעְתָּ֖ם וּ/קְנַֽז׃
translation:
  text: And the sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions read 'Zepo' instead of 'Zepho.' The Masoretic Hebrew
      here points the name as Zepho.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: In a genealogical listing, היה with prefixed waw commonly functions as
    a simple copular/existential verb introducing descendants. 'Were' is the most
    natural English rendering here; 'became' would overstate development rather than
    list identity.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural construct 'sons of' in
    a genealogy. Per the gender-accurate principle, this should not be neutralized
    to 'children' unless context requires it.
- source_word: אֱלִיפָז
  chosen: Eliphaz
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: תֵּימָן
  chosen: Teman
  rationale: Personal name in this genealogical context; transliterated rather than
    rendered by any possible place-name association.
- source_word: אוֹמָר
  chosen: Omar
  rationale: Personal name transliterated.
- source_word: צְפוֹ
  chosen: Zepho
  alternatives:
  - Zepo
  lexicon: HALOT
  rationale: The consonantal form supports the traditional transliteration 'Zepho.'
    Some English traditions have 'Zepo' (cf. some renderings influenced by textual
    traditions), but the Masoretic pointing favors 'Zepho' here.
- source_word: גַעְתָּם
  chosen: Gatam
  rationale: Personal name transliterated.
- source_word: קְנַז
  chosen: Kenaz
  alternatives:
  - Qenaz
  rationale: Standard English transliteration of the personal name; 'Qenaz' is a more
    strictly phonetic alternative but less conventional for readable modern English.
