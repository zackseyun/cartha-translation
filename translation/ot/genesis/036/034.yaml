id: GEN.36.34
reference: Genesis 36:34
source:
  edition: WLC
  text: וַ/יָּ֖מָת יוֹבָ֑ב וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו חֻשָׁ֖ם מֵ/אֶ֥רֶץ הַ/תֵּימָנִֽי׃
translation:
  text: And Jobab died, and Husham from the land of the Temanites reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “from the land of Teman” or “from the land of the Temanite.”
      The Hebrew gentilic form can be understood as referring either to the region
      associated with Teman or to its people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates a simple past event in sequence; 'died' is
    the natural English rendering in genealogical/regnal notices.
- source_word: יוֹבָב
  chosen: Jobab
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in this regnal formula denotes accession to kingship. 'Reigned' is
    concise, idiomatic, and fits the recurring pattern in this chapter.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחת with pronominal suffix here indicates succession/substitution in
    office. 'In his place' is idiomatic English for royal succession and preserves
    the sense of replacement.
- source_word: חֻשָׁם
  chosen: Husham
  rationale: Proper personal name; transliterated rather than translated.
- source_word: מֵאֶרֶץ
  chosen: from the land of
  alternatives:
  - from the country of
  - out of the land of
  lexicon: HALOT
  rationale: The preposition מן plus אֶרֶץ marks geographic origin. 'From the land
    of' preserves the formal geographic sense used in biblical narrative.
- source_word: הַתֵּימָנִי
  chosen: the Temanites
  alternatives:
  - Teman
  - the Temanite
  lexicon: HALOT
  rationale: The form is best taken as a gentilic/collective designation tied to Teman.
    Because it follows 'land of,' English naturally expresses the inhabitants/region
    as 'the Temanites.' This avoids the awkward 'land of the Temanite' while preserving
    the gentilic force.
