id: GEN.36.38
reference: Genesis 36:38
source:
  edition: WLC
  text: וַ/יָּ֖מָת שָׁא֑וּל וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו בַּ֥עַל חָנָ֖ן בֶּן עַכְבּֽוֹר־׃
translation:
  text: And Shaul died, and Baal-hanan son of Akbor reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional English versions often spell these names ''Saul,'' ''Baal-hanan,''
      and ''Achbor.'' This translation uses forms closer to the Hebrew: ''Shaul''
      and ''Akbor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: Qal wayyiqtol of מות, the standard narrative verb for death. 'Died' is
    the plain, direct equivalent and avoids euphemism.
- source_word: שָׁאוּל
  chosen: Shaul
  alternatives:
  - Saul
  lexicon: HALOT
  rationale: Personal name transliterated per project philosophy. 'Shaul' more directly
    reflects the Hebrew form than the traditional 'Saul.'
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: HALOT
  rationale: Qal wayyiqtol of מלך in royal succession formulae is well rendered 'reigned.'
    This preserves the concise dynastic notice style.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix in succession contexts means
    taking another's place. 'In his place' is idiomatic English and accurately conveys
    succession.
- source_word: בַּעַל חָנָן
  chosen: Baal-hanan
  alternatives:
  - Baalhanan
  lexicon: HALOT
  rationale: Personal name transliterated and hyphenated to reflect the two-part Hebrew
    name while preserving readability.
- source_word: בֶּן
  chosen: son of
  alternatives: []
  lexicon: HALOT
  rationale: Standard construct usage indicating immediate filiation.
- source_word: עַכְבּוֹר
  chosen: Akbor
  alternatives:
  - Achbor
  lexicon: HALOT
  rationale: Personal name transliterated from Hebrew. 'Akbor' reflects the initial
    ע more transparently than the traditional 'Achbor,' while remaining readable in
    English.
