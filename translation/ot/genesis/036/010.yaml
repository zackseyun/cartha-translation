id: GEN.36.10
reference: Genesis 36:10
source:
  edition: WLC
  text: אֵ֖לֶּה שְׁמ֣וֹת בְּנֵֽי עֵשָׂ֑ו אֱלִיפַ֗ז בֶּן עָדָה֙ אֵ֣שֶׁת עֵשָׂ֔ו רְעוּאֵ֕ל
    בֶּן בָּשְׂמַ֖ת אֵ֥שֶׁת עֵשָֽׂו־־־׃
translation:
  text: 'These are the names of Esau’s sons: Eliphaz, the son of Adah, Esau’s wife;
    Reuel, the son of Basemath, Esau’s wife.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of Esau.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'Esau’s wife' after each maternal name; the repetition is
      retained for fidelity to the genealogical style.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Introduces the list deictically. Rendering with the copula in English
    produces natural syntax while preserving the presentational force of the Hebrew.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct with following noun phrase; 'the names of' is the natural English
    equivalent for the genealogical heading.
- source_word: בְּנֵי עֵשָׂו
  chosen: Esau’s sons
  alternatives:
  - the sons of Esau
  - Esau’s children
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' 'Esau’s sons' is concise and accurate.
    'Children' is too broad because the Hebrew is specifically masculine/plural and
    refers to male descendants named in the verse.
- source_word: אֱלִיפַז
  chosen: Eliphaz
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: בֶּן עָדָה
  chosen: the son of Adah
  alternatives:
  - son of Adah
  lexicon: HALOT
  rationale: בן marks direct filial relationship. Including 'the' improves English
    apposition after the proper name without changing meaning.
- source_word: אֵשֶׁת עֵשָׂו
  chosen: Esau’s wife
  alternatives:
  - wife of Esau
  lexicon: HALOT
  rationale: Construct phrase meaning 'wife of Esau.' The possessive form is more
    natural in modern English. The phrase is repeated in Hebrew after each maternal
    name, so it is retained both times rather than omitted.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Raguel
  rationale: Standard English transliteration from the Hebrew form רְעוּאֵל. 'Raguel'
    reflects a different transliteration tradition and is less directly tied to the
    Hebrew spelling here.
- source_word: בֶּן בָּשְׂמַת
  chosen: the son of Basemath
  alternatives:
  - son of Basemath
  lexicon: HALOT
  rationale: Same filial construction as earlier in the verse; rendered consistently.
- source_word: בָּשְׂמַת
  chosen: Basemath
  alternatives:
  - Basemat
  rationale: Standard English biblical transliteration of the personal name.
