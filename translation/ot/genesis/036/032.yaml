id: GEN.36.32
reference: Genesis 36:32
source:
  edition: WLC
  text: וַ/יִּמְלֹ֣ךְ בֶּ/אֱד֔וֹם בֶּ֖לַע בֶּן בְּע֑וֹר וְ/שֵׁ֥ם עִיר֖/וֹ דִּנְהָֽבָה־׃
translation:
  text: Bela son of Beor reigned in Edom, and the name of his city was Dinhabah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reigned over Edom.' The Hebrew says literally 'reigned in Edom,' with
      the preposition marking location; English may also express the royal domain
      as 'over Edom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of מלך in this king-list context denotes
    accession and exercise of kingship. 'Reigned' is idiomatic English for royal succession
    notices and fits the formula used in the surrounding verses.
- source_word: בֶּאֱדוֹם
  chosen: in Edom
  alternatives:
  - over Edom
  lexicon: HALOT
  rationale: The preposition ב commonly marks location, and in royal notices 'reigned
    in Edom' is the most direct rendering. 'Over Edom' is a possible contextual expansion,
    but the Hebrew preposition itself is better preserved by 'in.'
- source_word: בֶּלַע
  chosen: Bela
  rationale: Proper personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: בֶּן בְּעוֹר
  chosen: son of Beor
  lexicon: HALOT
  rationale: Standard genealogical construction. 'Son of' preserves the formal relationship
    stated in the Hebrew without paraphrase.
- source_word: וְשֵׁם
  chosen: and the name of
  alternatives:
  - and the name was
  - now the name of
  lexicon: HALOT
  rationale: This construct phrase introduces the following identification of the
    city. 'And the name of' preserves the Hebrew structure naturally in English when
    completed by 'his city was ...'.
- source_word: עִירוֹ
  chosen: his city
  alternatives:
  - the city
  lexicon: HALOT
  rationale: The 3ms suffix is explicit in Hebrew and should be represented. 'His
    city' likely means the city associated with his rule or residence.
- source_word: דִּנְהָבָה
  chosen: Dinhabah
  rationale: Proper place name; transliterated rather than translated.
