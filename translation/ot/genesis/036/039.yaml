id: GEN.36.39
reference: Genesis 36:39
source:
  edition: WLC
  text: וַ/יָּמָת֮ בַּ֣עַל חָנָ֣ן בֶּן עַכְבּוֹר֒ וַ/יִּמְלֹ֤ךְ תַּחְתָּי/ו֙ הֲדַ֔ר
    וְ/שֵׁ֥ם עִיר֖/וֹ פָּ֑עוּ וְ/שֵׁ֨ם אִשְׁתּ֤/וֹ מְהֵֽיטַבְאֵל֙ בַּת מַטְרֵ֔ד בַּ֖ת
    מֵ֥י זָהָֽב־־׃
translation:
  text: Baal-hanan son of Achbor died, and Hadar reigned in his place. The name of
    his city was Pau, and the name of his wife was Mehetabel daughter of Matred, daughter
    of Me-zahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: Hadar; some textual traditions and 1 Chronicles 1:50 read Hadad.'
    reason: textual_variant
  - marker: b
    text: 'Hebrew: Pau; 1 Chronicles 1:50 reads Pai.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The waw-consecutive verb from מות straightforwardly denotes death. 'Died'
    is the plain, natural English equivalent and avoids euphemism.
- source_word: בַּעַל חָנָן
  chosen: Baal-hanan
  alternatives:
  - Baal Hanan
  lexicon: HALOT
  rationale: Personal name is transliterated per project policy. Hyphenation reflects
    common English convention for this compound name.
- source_word: בֶּן עַכְבּוֹר
  chosen: son of Achbor
  alternatives:
  - the son of Achbor
  lexicon: HALOT
  rationale: Hebrew construct phrase is most naturally rendered 'son of Achbor.' The
    article is absent in Hebrew and unnecessary in English genealogy-style narration.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king in his place
  - reigned instead of him
  lexicon: HALOT
  rationale: מלך means 'reign/be king.' 'Reigned in his place' captures both the accession
    and succession sense of תחתיו in idiomatic English.
- source_word: הֲדַר
  chosen: Hadar
  alternatives:
  - Hadad
  lexicon: HALOT
  rationale: The Masoretic Text here reads Hadar. This should be translated according
    to the given Hebrew text, while the alternative form 'Hadad' known from some textual
    traditions and the parallel in 1 Chronicles 1:50 is worth preserving in a footnote.
- source_word: וְשֵׁם עִירוֹ
  chosen: The name of his city was
  alternatives:
  - and the name of his city was
  lexicon: HALOT
  rationale: This formulaic expression is rendered transparently. Starting a new sentence
    improves readability in English while preserving the informational content.
- source_word: פָּעוּ
  chosen: Pau
  alternatives:
  - Pai
  lexicon: HALOT
  rationale: The MT points the place name as Pau. As a proper name it is transliterated;
    the alternative 'Pai' from the parallel genealogy is preserved in a footnote.
- source_word: וְשֵׁם אִשְׁתּוֹ
  chosen: and the name of his wife was
  alternatives:
  - and his wife's name was
  lexicon: HALOT
  rationale: Either English form is possible; this rendering stays close to the Hebrew
    formula while remaining natural.
- source_word: מְהֵיטַבְאֵל
  chosen: Mehetabel
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בַּת מַטְרֵד
  chosen: daughter of Matred
  lexicon: HALOT
  rationale: Straightforward genealogical relationship; 'daughter of' is the normal
    rendering of בת in this context.
- source_word: בַּת מֵי זָהָב
  chosen: daughter of Me-zahab
  alternatives:
  - granddaughter of Me-zahab
  lexicon: HALOT
  rationale: Hebrew repeats 'daughter of,' which can indicate immediate descent or,
    more broadly, lineage. The most direct rendering is to preserve the repeated phrase
    literally; English readers can infer the genealogical chain. The broader sense
    'granddaughter of' is possible interpretively but is not required by the text.
