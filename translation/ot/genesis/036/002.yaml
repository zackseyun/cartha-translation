id: GEN.36.2
reference: Genesis 36:2
source:
  edition: WLC
  text: עֵשָׂ֛ו לָקַ֥ח אֶת נָשָׁ֖י/ו מִ/בְּנ֣וֹת כְּנָ֑עַן אֶת עָדָ֗ה בַּת אֵילוֹן֙
    הַֽ/חִתִּ֔י וְ/אֶת אָהֳלִֽיבָמָה֙ בַּת עֲנָ֔ה בַּת צִבְע֖וֹן הַֽ/חִוִּֽי־־־־־־׃
translation:
  text: 'Esau took his wives from the daughters of Canaan: Adah daughter of Elon the
    Hittite, and Oholibamah daughter of Anah, daughter of Zibeon the Hivite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Hivite.'' Some interpreters harmonize this with related genealogies
      and understand the lineage differently, including ''the Horite.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לָקַח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The verb literally means 'took.' In this genealogical summary, 'took'
    naturally conveys taking as wives without adding interpretive expansion. 'Married'
    is possible contextually but is less formally tied to the Hebrew wording.
- source_word: נָשָׁיו
  chosen: his wives
  alternatives:
  - his women
  lexicon: HALOT
  rationale: In this context אִשָּׁה in the plural with Esau as subject clearly means
    wives, not merely women. The possessive suffix is preserved.
- source_word: מִבְּנוֹת כְּנָעַן
  chosen: from the daughters of Canaan
  alternatives:
  - from the women of Canaan
  - from the daughters of the Canaanites
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom 'daughters of
    Canaan.' It denotes women belonging to the peoples/land of Canaan. This keeps
    continuity with Genesis usage without over-paraphrasing.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - the daughter of
  lexicon: HALOT
  rationale: The construct is straightforward filiation and is rendered consistently
    as 'daughter of.'
- source_word: הַחִתִּי
  chosen: the Hittite
  alternatives:
  - the Hethite
  lexicon: HALOT
  rationale: Standard English ethnonym for חִתִּי is 'Hittite.' The article is retained.
- source_word: אָהֳלִיבָמָה
  chosen: Oholibamah
  alternatives:
  - Aholibamah
  rationale: A standard English transliteration of the personal name. 'Oholibamah'
    is widely recognizable in English Bible tradition; 'Aholibamah' reflects a slightly
    different transliteration convention.
- source_word: הַחִוִּי
  chosen: the Hivite
  alternatives:
  - the Horite
  lexicon: HALOT
  rationale: The consonantal text here reads חִוִּי, 'Hivite.' Because Genesis 36
    contains related genealogical notices that create tension with other identifications,
    the main text follows the MT while preserving the notable alternative issue in
    a footnote.
