theological_decisions:
- issue: Genealogical/ethnic designation in the final clause
  chosen_reading: 'Follow the Masoretic Text: ''the Hivite.'''
  alternative_readings:
  - Some harmonize with related passages and read or interpret the lineage differently,
    e.g., 'the Horite' in light of Genesis 36:20 and parallels.
  rationale: This is not a doctrinally charged issue, but it is a significant textual/genealogical
    tension. The translation should reflect the received Hebrew text in the main line
    and preserve the alternative in a footnote rather than silently harmonize.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
