id: GEN.36.14
reference: Genesis 36:14
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה הָי֗וּ בְּנֵ֨י אָהֳלִיבָמָ֧ה בַת עֲנָ֛ה בַּת צִבְע֖וֹן אֵ֣שֶׁת
    עֵשָׂ֑ו וַ/תֵּ֣לֶד לְ/עֵשָׂ֔ו אֶת יעיש וְ/אֶת יַעְלָ֖ם וְ/אֶת קֹֽרַח־־־־־׃
translation:
  text: 'And these were the sons of Oholibamah daughter of Anah, daughter of Zibeon,
    Esau''s wife: she bore to Esau Jeush, Jalam, and Korah.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these
  alternatives:
  - Now these
  - These
  lexicon: HALOT
  rationale: Standard demonstrative introduction to a genealogical notice; 'And these'
    preserves the connective ו and the deictic force of אֵלֶּה.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: In this genealogical formula היה functions as a simple copula/existential
    in past narrative, best rendered 'were.'
- source_word: בְּנֵי
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: HALOT
  rationale: The immediate referents are named males, so 'sons' is more precise than
    the broader 'children' or 'descendants.'
- source_word: אָהֳלִיבָמָה
  chosen: Oholibamah
  rationale: Personal name is transliterated per project philosophy.
- source_word: בַת עֲנָה בַּת צִבְעוֹן
  chosen: daughter of Anah, daughter of Zibeon
  alternatives:
  - daughter of Anah, granddaughter of Zibeon
  lexicon: HALOT
  rationale: Hebrew repeats 'daughter of' in apposition; retaining both occurrences
    mirrors the source and preserves the genealogical structure. English readers can
    infer the lineage without smoothing to 'granddaughter.'
- source_word: אֵשֶׁת עֵשָׂו
  chosen: Esau's wife
  alternatives:
  - the wife of Esau
  lexicon: HALOT
  rationale: Construct relationship is naturally rendered with the English possessive;
    this is concise and clear.
- source_word: וַ/תֵּלֶד לְ/עֵשָׂו
  chosen: she bore to Esau
  alternatives:
  - she gave birth to for Esau
  - she bore Esau
  lexicon: HALOT
  rationale: The verb ילד with ל marks bearing children for/to a man; 'she bore to
    Esau' is a natural English rendering that preserves the relational nuance better
    than the flatter 'she bore Esau.'
- source_word: יעיש
  chosen: Jeush
  alternatives:
  - Yeush
  rationale: Standard English transliteration of the personal name.
- source_word: יַעְלָם
  chosen: Jalam
  alternatives:
  - Yalam
  rationale: Standard English transliteration of the personal name.
- source_word: קֹרַח
  chosen: Korah
  rationale: Standard English transliteration of the personal name.
