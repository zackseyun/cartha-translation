theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The Hebrew is literally 'sons of Israel.' Per the translation philosophy,
    gender-accurate renderings are preferred over gender-neutral smoothing unless
    context clearly demands otherwise. Here the phrase is a standard ethnonym, but
    retaining 'sons of Israel' preserves the source form while remaining understandable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
