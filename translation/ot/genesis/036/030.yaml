  from: according to their chiefs
  to: according to their clans
  rationale: The current rendering, 'chiefs... according to their chiefs,' is tautological and awkward. The Hebrew word אַלּוּף, while meaning 'chief,' can also refer to the division led by a chief, i.e., a 'clan' or 'chiefdom' (see HALOT 47, BDB 441). In the phrase לְאַלֻּפֵיהֶם, the context of a summary list strongly suggests this secondary sense. Translating it as 'according to their clans' resolves the awkward repetition and accurately reflects the classificatory nature of the phrase, a reading supported by major lexicons and commentaries (e.g., Wenham, Sarna).
