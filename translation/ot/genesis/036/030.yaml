id: GEN.36.30
reference: Genesis 36:30
source:
  edition: WLC
  text: אַלּ֥וּף דִּשֹׁ֛ן אַלּ֥וּף אֵ֖צֶר אַלּ֣וּף דִּישָׁ֑ן אֵ֣לֶּה אַלּוּפֵ֧י הַ/חֹרִ֛י לְ/אַלֻּפֵי/הֶ֖ם בְּ/אֶ֥רֶץ שֵׂעִֽיר׃פ
translation:
  text: Chief Dishon, chief Ezer, chief Dishan—these were the chiefs of the Horites, according to their clans in the land of Seir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their chiefs'; the Hebrew phrase may denote classification by tribal leaders or divisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their chiefs'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - leader
  - duke
  lexicon: HALOT
  rationale: In Genesis 36, אַלּוּף denotes a tribal or clan leader among Edom/Horites. 'Chief' is clear modern English and avoids the archaic/tradition-bound 'duke.' Repetition is preserved to reflect the Hebrew list structure.
- source_word: דִּשֹׁן
  chosen: Dishon
  alternatives:
  - Dishon
  rationale: Proper name; transliterated according to standard English convention.
- source_word: אֵצֶר
  chosen: Ezer
  alternatives:
  - Ezer
  rationale: Proper name; transliterated rather than translated, per translation philosophy.
- source_word: דִּישָׁן
  chosen: Dishan
  alternatives:
  - Dishan
  rationale: Proper name; transliterated according to standard English convention. Distinguished from Dishon as in the Hebrew.
- source_word: אֵלֶּה
  chosen: these were
  alternatives:
  - these are
  - these
  lexicon: HALOT
  rationale: The verbless Hebrew clause is naturally rendered in English with 'these were' in this genealogical summary context.
- source_word: אַלּוּפֵי הַחֹרִי
  chosen: the chiefs of the Horites
  alternatives:
  - the chiefs of the Horite
  - the clan chiefs of the Horites
  lexicon: HALOT
  rationale: הַחֹרִי refers to the Horites as a people group. English plural ethnonym is the most natural rendering.
- source_word: לְאַלֻּפֵיהֶם
  chosen: according to their chiefs
  alternatives:
  - by their chiefs
  - for their chiefs
  - according to their clans
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken as indicating classification/distribution: these are the Horite chiefs according to their respective chiefships/divisions. ''According to their chiefs'' preserves the structure without over-interpreting.'
- source_word: בְּאֶרֶץ שֵׂעִיר
  chosen: in the land of Seir
  alternatives:
  - in Seir
  - in the country of Seir
  lexicon: HALOT
  rationale: A standard geographical expression; 'land of Seir' preserves the formal sense while remaining natural English.
