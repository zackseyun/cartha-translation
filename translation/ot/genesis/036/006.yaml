id: GEN.36.6
reference: Genesis 36:6
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח עֵשָׂ֡ו אֶת נָ֠שָׁי/ו וְ/אֶת בָּנָ֣י/ו וְ/אֶת בְּנֹתָי/ו֮ וְ/אֶת
    כָּל נַפְשׁ֣וֹת בֵּית/וֹ֒ וְ/אֶת מִקְנֵ֣/הוּ וְ/אֶת כָּל בְּהֶמְתּ֗/וֹ וְ/אֵת֙
    כָּל קִנְיָנ֔/וֹ אֲשֶׁ֥ר רָכַ֖שׁ בְּ/אֶ֣רֶץ כְּנָ֑עַן וַ/יֵּ֣לֶךְ אֶל אֶ֔רֶץ מִ/פְּנֵ֖י
    יַעֲקֹ֥ב אָחִֽי/ו־־־־־־־־־־׃
translation:
  text: And Esau took his wives, his sons, his daughters, and all the persons of his
    household, along with his livestock, all his animals, and all his possessions
    that he had acquired in the land of Canaan, and went to another land because of
    his brother Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to a land.'' Some manuscripts and ancient versions support ''to
      the land of Seir''; many English translations render the phrase contextually
      as ''to another land.'''
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - gathered
  - took with him
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this migration context, English
    'took' naturally conveys that Esau took these people and goods with him when departing.
- source_word: נָשָׁיו
  chosen: his wives
  alternatives:
  - his women
  lexicon: HALOT
  rationale: The plural of אִשָּׁה here clearly refers to Esau's wives, not women
    generally.
- source_word: בָּנָיו / בְּנֹתָיו
  chosen: his sons, his daughters
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters, so the translation
    preserves both rather than collapsing them into 'children.'
- source_word: כָּל נַפְשׁוֹת בֵּיתוֹ
  chosen: all the persons of his household
  alternatives:
  - all the souls of his household
  - everyone in his household
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul' or 'life,' but in this idiom it refers
    to persons belonging to the household. 'Persons' preserves the concrete sense
    without importing later theological connotations of 'souls.'
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his cattle
  - his herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or movable property in animals. 'Livestock'
    is the clearest modern equivalent.
- source_word: כָּל בְּהֶמְתּוֹ
  chosen: all his animals
  alternatives:
  - all his beasts
  - all his cattle
  lexicon: HALOT
  rationale: בְּהֵמָה is a broad term for beasts/animals. Since מִקְנֶה has already
    been rendered 'livestock,' 'all his animals' preserves the distinction while remaining
    natural English.
- source_word: כָּל קִנְיָנוֹ
  chosen: all his possessions
  alternatives:
  - all his property
  - all his acquired goods
  lexicon: HALOT
  rationale: קִנְיָן refers to property or possessions, especially what has been acquired.
    'Possessions' is idiomatic and broad enough for the context.
- source_word: אֲשֶׁר רָכַשׁ
  chosen: that he had acquired
  alternatives:
  - that he had gained
  - that he had gotten
  lexicon: HALOT
  rationale: רכשׁ emphasizes acquisition. The pluperfect-like English 'had acquired'
    fits the narrative sequence and modifies 'possessions' naturally.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'in the land of Canaan'; preserving 'land'
    maintains the formal geographic expression.
- source_word: אֶל אֶרֶץ
  chosen: to another land
  alternatives:
  - to a land
  - to the land
  lexicon: HALOT
  rationale: The consonantal text reads simply 'to a land,' but in context and in
    line with ancient versions and common Hebrew usage, the sense is that Esau went
    to another land away from Jacob. English requires some specification for naturalness;
    'another land' best captures the contextual force.
- source_word: מִפְּנֵי יַעֲקֹב אָחִיו
  chosen: because of his brother Jacob
  alternatives:
  - from before his brother Jacob
  - away from his brother Jacob
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before' or 'because of.' In this context
    of separation due to coexistence pressures (explained in the next verse), 'because
    of his brother Jacob' communicates the causal sense most clearly.
