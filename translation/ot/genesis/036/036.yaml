id: GEN.36.36
reference: Genesis 36:36
source:
  edition: WLC
  text: וַ/יָּ֖מָת הֲדָ֑ד וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו שַׂמְלָ֖ה מִ/מַּשְׂרֵקָֽה׃
translation:
  text: And Hadad died, and Samlah from Masrekah reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of Masrekah.” The Hebrew preposition can mark origin or association
      with a place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the next event in sequence; 'died' is the natural
    English preterite in this royal succession formula.
- source_word: הֲדָד
  chosen: Hadad
  rationale: Personal name is transliterated per project philosophy rather than translated.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in this context is the standard verb for royal rule/succession. 'Reigned'
    is concise and idiomatic in the recurring king-list formula.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחת with pronominal suffix here marks succession. 'In his place' is a
    clear, natural rendering that preserves the replacement sense better than the
    temporally weaker 'after him'.
- source_word: שַׂמְלָה
  chosen: Samlah
  rationale: Personal name is transliterated by standard convention.
- source_word: מִמַּשְׂרֵקָה
  chosen: from Masrekah
  alternatives:
  - of Masrekah
  lexicon: HALOT
  rationale: The prefixed מן normally indicates origin or association. In these regnal
    notices, 'from Masrekah' naturally identifies Samlah by place of origin or hometown.
