id: GEN.36.4
reference: Genesis 36:4
source:
  edition: WLC
  text: וַ/תֵּ֧לֶד עָדָ֛ה לְ/עֵשָׂ֖ו אֶת אֱלִיפָ֑ז וּ/בָ֣שְׂמַ֔ת יָלְדָ֖ה אֶת רְעוּאֵֽל־־׃
translation:
  text: Adah bore Eliphaz to Esau, and Basemath bore Reuel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד / יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Both forms are from ילד, 'to bear/give birth.' 'Bore' is concise, natural
    in genealogical narrative, and preserves the maternal subject clearly.
- source_word: לְעֵשָׂו
  chosen: to Esau
  alternatives:
  - for Esau
  lexicon: HALOT
  rationale: 'The preposition ל with ילד in genealogical contexts commonly marks the
    father: ''bore X to Y.'' ''To Esau'' is a natural English rendering that preserves
    the relational sense without overinterpreting.'
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: אֱלִיפָז
  chosen: Eliphaz
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בָשְׂמַת
  chosen: Basemath
  alternatives:
  - Basemat
  rationale: Personal name transliterated by standard English convention. 'Basemath'
    is the familiar and readable form in English Bible tradition.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Raguel
  rationale: Personal name transliterated from the Hebrew form. 'Reuel' closely reflects
    the consonants and vowels of the Masoretic text.
- source_word: וּ
  chosen: and
  lexicon: Hebrew grammar
  rationale: Simple coordinating conjunction linking the two birth notices; rendered
    with straightforward English 'and'.
