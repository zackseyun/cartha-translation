id: GEN.36.27
reference: Genesis 36:27
source:
  edition: WLC
  text: אֵ֖לֶּה בְּנֵי אֵ֑צֶר בִּלְהָ֥ן וְ/זַעֲוָ֖ן וַ/עֲקָֽן־׃
translation:
  text: 'These are the sons of Etser: Bilhan, Zaavan, and Akan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Etser is traditionally rendered Ezer in many English versions.
    reason: lexical_alternative
  - marker: b
    text: Zaavan may also be spelled Zavan in English transliteration.
    reason: lexical_alternative
  - marker: c
    text: Akan is distinct from the name Achan; the Hebrew spelling here has qoph/nun,
      not kaph/resh or related variants.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing a genealogical list; present-tense English
    is idiomatic in list headings and matches common Hebrew verbless-clause rendering.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical contexts בֵּן commonly denotes filial or clan descent.
    Here 'sons of' is the most direct and formally accurate rendering for the immediate
    list of male descendants.
- source_word: אֵצֶר
  chosen: Etser
  alternatives:
  - Ezer
  rationale: Personal name transliterated per translation philosophy. 'Etser' reflects
    the consonantal form עֵצֶר/אֵצֶר as represented here more transparently than the
    traditionalized 'Ezer.'
- source_word: בִּלְהָן
  chosen: Bilhan
  rationale: Personal name; standard transliteration rather than translation.
- source_word: זַעֲוָן
  chosen: Zaavan
  alternatives:
  - Zavan
  rationale: Personal name; transliterated. The doubled vowel representation preserves
    the Hebrew vocalization more closely, though 'Zavan' is a possible simplified
    English form.
- source_word: עֲקָן
  chosen: Akan
  alternatives:
  - Achan
  rationale: Personal name; transliterated directly from the consonants ע-ק-ן. 'Achan'
    reflects a different Hebrew name/spelling and should not be imported here.
