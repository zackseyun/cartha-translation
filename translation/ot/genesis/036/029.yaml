id: GEN.36.29
reference: Genesis 36:29
source:
  edition: WLC
  text: אֵ֖לֶּה אַלּוּפֵ֣י הַ/חֹרִ֑י אַלּ֤וּף לוֹטָן֙ אַלּ֣וּף שׁוֹבָ֔ל אַלּ֥וּף צִבְע֖וֹן
    אַלּ֥וּף עֲנָֽה׃
translation:
  text: 'These are the chiefs of the Horites: chief Lotan, chief Shobal, chief Zibeon,
    chief Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan leaders' or 'tribal chiefs'; the Hebrew term can denote the head
      of a clan or tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: 'Deictic plural introducing a list; English idiom naturally supplies
    the copula: ''These are.'''
- source_word: אַלּוּפֵי / אַלּוּף
  chosen: chiefs / chief
  alternatives:
  - clans
  - tribal chiefs
  - dukes
  - leaders
  lexicon: HALOT
  rationale: In Genesis 36, אַלּוּף denotes clan or tribal leaders among Edom/Horites.
    'Chief' is clear modern English and preserves the leadership sense better than
    archaic 'duke.' The singular is repeated before each proper name in the Hebrew,
    so it is retained in English for transparency.
- source_word: הַחֹרִי
  chosen: the Horites
  alternatives:
  - the Horite
  lexicon: HALOT
  rationale: Though morphologically singular gentilic with article, in context it
    is a collective ethnic designation. English idiom renders this naturally as the
    plural people-group 'the Horites.'
- source_word: לוֹטָן
  chosen: Lotan
  alternatives:
  - Lotan
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: שׁוֹבָל
  chosen: Shobal
  alternatives:
  - Shobal
  rationale: Personal name transliterated by standard convention.
- source_word: צִבְעוֹן
  chosen: Zibeon
  alternatives:
  - Zib'eon
  rationale: Personal name transliterated by standard English biblical convention.
- source_word: עֲנָה
  chosen: Anah
  alternatives:
  - Anah
  rationale: Personal name transliterated by standard convention.
