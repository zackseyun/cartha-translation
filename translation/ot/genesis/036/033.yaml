id: GEN.36.33
reference: Genesis 36:33
source:
  edition: WLC
  text: וַ/יָּ֖מָת בָּ֑לַע וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו יוֹבָ֥ב בֶּן זֶ֖רַח מִ/בָּצְרָֽה־׃
translation:
  text: Bela died, and Jobab son of Zerah from Bozrah reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Bozrah.' The Hebrew preposition can mark origin or association with
      the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת narrates the next event in sequence. English supplies
    the subject by naming Bela explicitly rather than retaining a bare pronoun.
- source_word: בָּלַע
  chosen: Bela
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in this royal succession formula is best rendered 'reigned,' the
    standard idiom for assuming and exercising kingship in context.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחת with pronominal suffix indicates succession in place of the previous
    ruler. 'In his place' is natural English and preserves the succession sense.
- source_word: יוֹבָב
  chosen: Jobab
  rationale: Proper personal name; transliterated by standard convention.
- source_word: בֶּן זֶרַח
  chosen: son of Zerah
  lexicon: HALOT
  rationale: Construct chain identifying Jobab by patronymic; rendered straightforwardly.
- source_word: מִבָּצְרָה
  chosen: from Bozrah
  alternatives:
  - of Bozrah
  lexicon: HALOT
  rationale: The prefixed מִן normally denotes origin or association. 'From Bozrah'
    is the most direct rendering, though in a royal list it can also imply hometown
    association.
