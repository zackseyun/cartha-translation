id: GEN.36.12
reference: Genesis 36:12
source:
  edition: WLC
  text: וְ/תִמְנַ֣ע הָיְתָ֣ה פִילֶ֗גֶשׁ לֶֽ/אֱלִיפַז֙ בֶּן עֵשָׂ֔ו וַ/תֵּ֥לֶד לֶ/אֱלִיפַ֖ז אֶת עֲמָלֵ֑ק אֵ֕לֶּה בְּנֵ֥י עָדָ֖ה אֵ֥שֶׁת עֵשָֽׂו׀־־׃
translation:
  text: Timna was a concubine of Eliphaz, Esau’s son, and she bore Amalek to Eliphaz. These are the grandsons of Adah, Esau’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'she bore Amalek to Eliphaz.' The Hebrew uses a genealogical construction naming the father with 'to.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sons of Adah'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְתִמְנַע
  chosen: Timna
  lexicon: HALOT
  rationale: Proper name; transliterated according to the translation philosophy for personal names. The prefixed conjunction is not separately represented in English because the clause begins naturally with the subject name.
- source_word: הָיְתָה
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: Qal perfect of היה here functions as a simple copula describing Timna’s status in relation to Eliphaz, so 'was' is the most natural English rendering.
- source_word: פִילֶגֶשׁ
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: HALOT
  rationale: The term denotes a woman in a recognized but subordinate marital/sexual union. 'Concubine' is the standard concise English equivalent and best preserves the social-legal distinction without paraphrase.
- source_word: לֶאֱלִיפַז
  chosen: of Eliphaz
  alternatives:
  - to Eliphaz
  lexicon: HALOT
  rationale: 'With ''concubine,'' the preposition is best rendered idiomatically as possession/association in English: ''a concubine of Eliphaz.'''
- source_word: בֶּן עֵשָׂו
  chosen: Esau’s son
  alternatives:
  - the son of Esau
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. The possessive form is concise and clear.
- source_word: וַתֵּלֶד
  chosen: she bore
  alternatives:
  - she gave birth
  lexicon: HALOT
  rationale: Narrative wayyiqtol of ילד. 'She bore' is a natural and slightly more formal genealogical rendering that fits the register of the passage.
- source_word: אֶת עֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: Direct object marker אֶת is not translated; the proper name is transliterated.
- source_word: לֶאֱלִיפַז
  chosen: to Eliphaz
  alternatives:
  - for Eliphaz
  lexicon: HALOT
  rationale: After ילד, the lamed marks the father in Hebrew genealogical style. English commonly renders this as 'bore X to Y,' preserving the relational nuance without overexpansion.
- source_word: אֵלֶּה בְּנֵי
  chosen: These are the sons of
  alternatives:
  - These were the sons of
  lexicon: HALOT
  rationale: Standard genealogical formula. Present tense is conventional in English for list-introducing formulas and matches the discourse function.
- source_word: עָדָה
  chosen: Adah
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: אֵשֶׁת עֵשָׂו
  chosen: Esau’s wife
  alternatives:
  - the wife of Esau
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English. The phrase identifies Adah appositionally.
