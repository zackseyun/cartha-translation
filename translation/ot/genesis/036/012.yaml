  source_review: state/reviews/gemini/ot/genesis/036/012.json
  category: mistranslation
  tier: 2
  from: sons of Adah
  to: grandsons of Adah
  rationale: The current rendering, 'sons of Adah,' creates a genealogical contradiction. The individuals listed (Amalek in this verse, and the sons of Eliphaz in v. 11) are the sons of Eliphaz, who is the son of Adah (v. 10). Therefore, they are Adah's grandsons, not her sons. The Hebrew word for 'son' (בֵּן) has a broader semantic range than its English counterpart and frequently means 'grandson' or 'descendant.' Translating it as 'grandsons' here is contextually necessary to avoid making the text appear factually incorrect.
