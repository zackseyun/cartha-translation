id: GEN.36.23
reference: Genesis 36:23
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ בְּנֵ֣י שׁוֹבָ֔ל עַלְוָ֥ן וּ/מָנַ֖חַת וְ/עֵיבָ֑ל שְׁפ֖וֹ וְ/אוֹנָֽם׃
translation:
  text: 'These are the sons of Shobal: Alvan, Manahath, Ebal, Shepho, and Onam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has Alvan; the parallel genealogy in 1 Chronicles 1:40 reads Alian.
    reason: alternative_reading
  - marker: b
    text: Hebrew has Shepho; the parallel genealogy in 1 Chronicles 1:40 reads Shephi.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next genealogical item.
    'These are' is natural modern English; the prefixed conjunction is not always
    best represented by 'and' in English genealogy formulas.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical contexts בנים can sometimes broaden to descendants, but
    here it introduces a direct list of male offspring, so 'sons of' is the most precise
    and gender-accurate rendering.
- source_word: שׁוֹבָל
  chosen: Shobal
  rationale: Personal name; transliterated according to the translation philosophy
    to preserve proper-name form rather than translate.
- source_word: עַלְוָן
  chosen: Alvan
  alternatives:
  - Alian
  rationale: Personal name; transliterated from the Hebrew form in WLC. 'Alian' appears
    in some related genealogical traditions (cf. 1 Chronicles 1:40), but the Hebrew
    here supports 'Alvan' in the main text.
- source_word: וּ/מָנַחַת
  chosen: Manahath
  rationale: Personal name; transliterated from Hebrew. The prefixed conjunction is
    represented by the list punctuation and final 'and' in idiomatic English.
- source_word: וְ/עֵיבָל
  chosen: Ebal
  rationale: Personal name; transliterated directly from the Hebrew form.
- source_word: שְׁפוֹ
  chosen: Shepho
  alternatives:
  - Shephi
  rationale: Personal name; transliterated from the MT form here. 'Shephi' is the
    form found in the parallel genealogy in 1 Chronicles 1:40 and is worth preserving
    as an alternative in a footnote.
- source_word: וְ/אוֹנָם
  chosen: and Onam
  rationale: Personal name; transliterated directly. The conjunction is retained as
    'and' before the final item in the series, matching normal English list style.
