id: GEN.36.35
reference: Genesis 36:35
source:
  edition: WLC
  text: וַ/יָּ֖מָת חֻשָׁ֑ם וַ/יִּמְלֹ֨ךְ תַּחְתָּ֜י/ו הֲדַ֣ד בֶּן בְּדַ֗ד הַ/מַּכֶּ֤ה
    אֶת מִדְיָן֙ בִּ/שְׂדֵ֣ה מוֹאָ֔ב וְ/שֵׁ֥ם עִיר֖/וֹ עֲוִֽית־־׃
translation:
  text: And Husham died, and Hadad son of Bedad reigned in his place—the one who struck
    Midian in the field of Moab—and the name of his city was Avith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who defeated Midian in the field/country of Moab.' The Hebrew participle
      literally says 'the one who struck Midian.'
    reason: lexical_alternative
  - marker: b
    text: '''Field of Moab'' may also be understood more broadly as ''country'' or
      ''territory'' of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The waw-consecutive verb from מות straightforwardly denotes death. 'Died'
    is the plain, natural English equivalent and avoids euphemism.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king after him
  - reigned instead of him
  lexicon: HALOT
  rationale: מלך means 'to reign/be king,' and תחתיו indicates succession. 'Reigned
    in his place' preserves both the royal action and the succession relation in readable
    English.
- source_word: הֲדַד בֶּן בְּדַד
  chosen: Hadad son of Bedad
  alternatives:
  - Hadad, the son of Bedad
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of בן in genealogical notices.
- source_word: הַמַּכֶּה
  chosen: the one who struck
  alternatives:
  - who defeated
  - who struck down
  - the smiter of
  lexicon: HALOT
  rationale: The Hiphil participle of נכה identifies Hadad by a notable action. 'The
    one who struck' stays close to the Hebrew while remaining idiomatic. 'Defeated'
    is interpretive and slightly more specific than the source requires.
- source_word: אֶת מִדְיָן
  chosen: Midian
  alternatives:
  - the Midianites
  lexicon: HALOT
  rationale: The object is the proper name מִדְיָן. English can render this as the
    people/group 'Midian' without expanding to 'Midianites,' which would be a contextual
    interpretation rather than a direct lexical equivalent.
- source_word: בִּשְׂדֵה מוֹאָב
  chosen: in the field of Moab
  alternatives:
  - in the country of Moab
  - in the territory of Moab
  - in the open country of Moab
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field.' In geographic expressions it can denote
    open country or territory, but 'field of Moab' best preserves the Hebrew form
    while remaining understandable.
- source_word: וְשֵׁם עִירוֹ
  chosen: and the name of his city was
  alternatives:
  - and his city's name was
  lexicon: HALOT
  rationale: This is a standard Hebrew naming formula. The chosen rendering is natural
    English and preserves the formal notice style.
- source_word: עֲוִית
  chosen: Avith
  alternatives:
  - Avit
  - Awith
  rationale: As a place name, it is transliterated. 'Avith' is a standard English
    transliteration that reflects the consonantal form without overcomplicating pronunciation.
