id: GEN.36.9
reference: Genesis 36:9
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה תֹּלְד֥וֹת עֵשָׂ֖ו אֲבִ֣י אֱד֑וֹם בְּ/הַ֖ר שֵׂעִֽיר׃
translation:
  text: And these are the generations of Esau, the father of Edom, in the hill country
    of Seir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on Mount Seir' or 'in the mountains of Seir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: The conjunction וְ is retained as 'And' to reflect the narrative linkage,
    while אֵלֶּה is rendered 'these' in the standard formulaic introduction.
- source_word: תֹּלְדוֹת
  chosen: the generations
  alternatives:
  - the family line
  - the descendants
  - the account
  lexicon: HALOT
  rationale: In Genesis, תּוֹלְדוֹת is a recurring structural term introducing lineage/history
    sections. 'Generations' preserves the formal literary pattern better than more
    interpretive options like 'family line' or 'account'.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - ancestor of
  lexicon: HALOT
  rationale: The construct form with Edom most naturally means 'father of Edom,' expressing
    progenitorship. 'Ancestor of' is possible in broader genealogical contexts, but
    'father of' is the more direct rendering.
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Proper name retained in transliteration. Here it identifies the people/nation
    descended from Esau.
- source_word: בְּ/הַר
  chosen: in the hill country of
  alternatives:
  - on Mount
  - in the mountains of
  lexicon: HALOT
  rationale: הַר can mean 'mountain,' but in geographical expressions it often denotes
    hill country or mountainous region. Since Seir refers to a region, 'in the hill
    country of' communicates the locative sense naturally in English without implying
    a single peak.
- source_word: שֵׂעִיר
  chosen: Seir
  rationale: Proper place name transliterated by standard convention.
