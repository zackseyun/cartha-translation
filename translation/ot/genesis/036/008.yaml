id: GEN.36.8
reference: Genesis 36:8
source:
  edition: WLC
  text: וַ/יֵּ֤שֶׁב עֵשָׂו֙ בְּ/הַ֣ר שֵׂעִ֔יר עֵשָׂ֖ו ה֥וּא אֱדֽוֹם׃
translation:
  text: So Esau settled in the hill country of Seir; Esau is Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived in the mountains of Seir' or 'dwelt in Mount Seir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - lived
  - dwelt
  - resided
  lexicon: HALOT
  rationale: From ישׁב, here in wayyiqtol narrative form. 'Settled' fits the context
    of establishing residence in a region and reads naturally in modern English, while
    preserving the basic sense of dwelling.
- source_word: בְּהַר
  chosen: in the hill country of
  alternatives:
  - on Mount
  - in the mountain country of
  - in the mountains of
  lexicon: HALOT
  rationale: הַר can mean a mountain or mountainous/hill region. In connection with
    Seir as a territorial region, 'hill country of' best conveys geographic sense
    in idiomatic English without implying a single peak.
- source_word: שֵׂעִיר
  chosen: Seir
  rationale: Proper name; transliterated according to the translation philosophy for
    personal and place names.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Proper name; standard English transliteration.
- source_word: הוּא אֱדוֹם
  chosen: is Edom
  alternatives:
  - that is, Edom
  - he is Edom
  lexicon: HALOT
  rationale: The clause identifies Esau with Edom. 'Is Edom' is the most direct rendering
    of the verbless identification clause and preserves the genealogical note. 'That
    is, Edom' is interpretive and slightly more paraphrastic.
