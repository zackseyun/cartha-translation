id: GEN.36.22
reference: Genesis 36:22
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ בְנֵי לוֹטָ֖ן חֹרִ֣י וְ/הֵימָ֑ם וַ/אֲח֥וֹת לוֹטָ֖ן תִּמְנָֽע־׃
translation:
  text: The sons of Lotan were Hori and Hemam, and Lotan’s sister was Timna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hemam''; the parallel list in 1 Chronicles 1:39 reads ''Homam.'''
    reason: textual_variant
  - marker: b
    text: Or 'Timnah' in some English spellings; the Hebrew form here is Timna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a simple genealogical copula introducing
    descendants, so English 'were' is the most natural and accurate rendering in context.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical lists, בנים commonly denotes male offspring specifically.
    Since two male names follow, 'sons of' is more precise than the broader 'children
    of' or 'descendants of'.
- source_word: לוֹטָן
  chosen: Lotan
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: חֹרִי
  chosen: Hori
  rationale: This is a personal name and is therefore transliterated rather than translated.
- source_word: הֵימָם
  chosen: Hemam
  alternatives:
  - Homam
  rationale: The consonantal form here supports 'Hemam' in this verse. 'Homam' appears
    in a parallel genealogy tradition (cf. 1 Chronicles 1:39), but the present Hebrew
    text is best represented by 'Hemam'.
- source_word: וַאֲחוֹת
  chosen: and ... sister was
  alternatives:
  - and the sister of
  lexicon: HALOT
  rationale: 'The noun means ''sister.'' English requires a finite verb for smooth
    sense in this verbless-like genealogical apposition, supplied from the clause
    structure: ''and Lotan’s sister was Timna.'''
- source_word: תִּמְנָע
  chosen: Timna
  alternatives:
  - Timnah
  rationale: As a personal name, it is transliterated. 'Timna' closely reflects the
    Hebrew form here; English tradition sometimes uses 'Timnah,' but that spelling
    can also evoke the place-name and is less exact to this vocalization.
