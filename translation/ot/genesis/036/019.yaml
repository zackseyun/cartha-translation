id: GEN.36.19
reference: Genesis 36:19
source:
  edition: WLC
  text: אֵ֧לֶּה בְנֵי עֵשָׂ֛ו וְ/אֵ֥לֶּה אַלּוּפֵי/הֶ֖ם ה֥וּא אֱדֽוֹם־׃ס
translation:
  text: These are the sons of Esau, and these are their chiefs. He is Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their chieftains." The Hebrew אַלּוּפִים refers to clan or tribal heads
      in Edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing a genealogical summary. Present-tense English
    is natural in biblical genealogical formulas and matches the verbless Hebrew construction.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct form of בֵּן here refers specifically to male offspring
    in a genealogy, so 'sons of' is more precise than broader alternatives.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: וְאֵלֶּה
  chosen: and these are
  alternatives:
  - these also are
  lexicon: HALOT
  rationale: The conjunction links a second identifying clause. Repeating 'these are'
    preserves the Hebrew parallel structure.
- source_word: אַלּוּפֵיהֶם
  chosen: their chiefs
  alternatives:
  - their clans
  - their leaders
  - their chieftains
  lexicon: HALOT
  rationale: אַלּוּף in Genesis 36 denotes tribal or clan heads within Edom. 'Chiefs'
    is concise, readable modern English and preserves the social-political sense better
    than the more interpretive 'clans.'
- source_word: הוּא
  chosen: He is
  alternatives:
  - that is
  - this is
  lexicon: HALOT
  rationale: The pronoun resumes Esau and identifies him with Edom. 'He is' preserves
    the personal identification more directly than the explanatory 'that is.'
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Standard transliteration of the name/place designation. In context it
    identifies Esau as Edom, the ancestor/eponym of the Edomites.
