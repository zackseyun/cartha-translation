  from: These were the sons of Basemath
  to: These were the grandsons of Basemath
  rationale: The Hebrew word בְּנֵי (bene) can mean 'sons,' 'grandsons,' or 'descendants.'
    While the individuals listed are indeed the 'sons' of Reuel, the context established
    in Genesis 36:10 shows that Reuel is the son of Basemath. Therefore, the men listed
    in this verse are Basemath's grandsons. Translating the second instance of בְּנֵי
    as 'sons' creates a genealogical contradiction, making it appear that these men
    were simultaneously the sons of Reuel and the sons of Basemath. The rendering
    'grandsons' is necessary for genealogical accuracy and clarity in English.
