id: GEN.36.13
reference: Genesis 36:13
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ בְּנֵ֣י רְעוּאֵ֔ל נַ֥חַת וָ/זֶ֖רַח שַׁמָּ֣ה וּ/מִזָּ֑ה אֵ֣לֶּ֣ה
    הָי֔וּ בְּנֵ֥י בָשְׂמַ֖ת אֵ֥שֶׁת עֵשָֽׂו׃
translation:
  text: 'And these were the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These
    were the sons of Basemath, Esau’s wife.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these
  alternatives:
  - Now these
  - These
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next genealogical item
    in sequence. 'And these' preserves the Hebrew connective and list-introducing
    function without sounding overly wooden.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In a genealogy naming male offspring individually, 'sons of' is the most
    precise and gender-accurate rendering.
- source_word: רְעוּאֵל
  chosen: Reuel
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: נַחַת
  chosen: Nahath
  rationale: Personal name transliterated.
- source_word: וָ/זֶרַח
  chosen: and Zerah
  rationale: Personal name transliterated; conjunction retained to reflect the list
    structure.
- source_word: שַׁמָּה
  chosen: Shammah
  rationale: Personal name transliterated.
- source_word: וּ/מִזָּה
  chosen: and Mizzah
  rationale: Personal name transliterated; conjunction retained to complete the list.
- source_word: אֵלֶּה הָיוּ
  chosen: These were
  alternatives:
  - These became
  - These are
  lexicon: HALOT
  rationale: Standard past-tense genealogical formula. 'These were' is natural English
    and reflects the Hebrew copular construction with היה.
- source_word: בְּנֵי בָשְׂמַת
  chosen: the sons of Basemath
  alternatives:
  - Basemath's sons
  - the descendants of Basemath
  lexicon: HALOT
  rationale: Repeats the genealogical formula clearly and formally. 'Sons' is preferable
    to 'descendants' because the named individuals are immediate offspring through
    Reuel.
- source_word: אֵשֶׁת עֵשָׂו
  chosen: Esau’s wife
  alternatives:
  - the wife of Esau
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in modern English. The possessive
    form is concise and natural while preserving the relational identification.
