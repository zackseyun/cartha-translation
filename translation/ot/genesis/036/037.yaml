id: GEN.36.37
reference: Genesis 36:37
source:
  edition: WLC
  text: וַ/יָּ֖מָת שַׂמְלָ֑ה וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו שָׁא֖וּל מֵ/רְחֹב֥וֹת הַ/נָּהָֽר׃
translation:
  text: Then Samlah died, and Shaul from Rehoboth on the River reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul,' the traditional English form of the name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Rehoboth the River,' likely meaning Rehoboth situated by a notable
      river.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Then ... died
  alternatives:
  - and ... died
  - so ... died
  lexicon: HALOT
  rationale: Wayyiqtol of מות advances the narrative. 'Then ... died' gives natural
    English sequence while preserving the simple past narrative force.
- source_word: שַׂמְלָה
  chosen: Samlah
  rationale: Personal name is transliterated per translation philosophy.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in this royal succession formula is best rendered 'reigned.' 'Became
    king' would underrepresent the standard dynastic notice formula, though the accession
    sense is implicit.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: The idiom תחתיו in succession contexts means one ruler taking the place
    of another. 'In his place' is idiomatic and precise.
- source_word: שָׁאוּל
  chosen: Shaul
  alternatives:
  - Saul
  rationale: Personal names are transliterated by standard conventions from Hebrew.
    'Shaul' more directly reflects the Hebrew form שָׁאוּל, while 'Saul' is the traditional
    Anglicized form.
- source_word: מֵרְחֹבוֹת
  chosen: from Rehoboth
  alternatives:
  - from Rehoboth-of
  lexicon: HALOT
  rationale: 'The prefixed מִן marks origin or association: Shaul is identified as
    being from Rehoboth. Rehoboth is treated as a place name, not translated as the
    common noun ''broad places'' in this context.'
- source_word: הַנָּהָר
  chosen: on the River
  alternatives:
  - by the River
  - of the River
  lexicon: HALOT
  rationale: 'With Rehoboth, the phrase functions as a geographic qualifier: ''Rehoboth
    on the River.'' ''On'' is a natural English rendering for a settlement identified
    by a major river; the article is retained as ''the River,'' reflecting the Hebrew
    definite form and likely a known river in context.'
