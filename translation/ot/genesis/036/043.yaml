id: GEN.36.43
reference: Genesis 36:43
source:
  edition: WLC
  text: אַלּ֥וּף מַגְדִּיאֵ֖ל אַלּ֣וּף עִירָ֑ם אֵ֣לֶּה אַלּוּפֵ֣י אֱד֗וֹם לְ/מֹֽשְׁבֹתָ/ם֙ בְּ/אֶ֣רֶץ אֲחֻזָּתָ֔/ם ה֥וּא עֵשָׂ֖ו אֲבִ֥י אֱדֽוֹם׀׃פ
translation:
  text: Chief Magdiel, chief Iram. These are the chiefs of Edom, according to their settlements in the land of their possession. This is Esau, the father of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chiefs of Edom.' The Hebrew term can denote tribal or clan leaders.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the land they possessed.'
    reason: lexical_alternative
  - marker: c
    text: That is, Esau was the forefather of the Edomites.
    reason: cultural_note
  - marker: d
    text: Or 'He is Esau'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - leader
  lexicon: HALOT
  rationale: In Genesis 36 the term denotes named Edomite tribal or clan leaders. 'Chief' is concise, natural English and avoids the archaic 'duke' while preserving a formal leadership title.
- source_word: מַגְדִּיאֵל
  chosen: Magdiel
  rationale: Personal name; transliterated per translation philosophy.
- source_word: עִירָם
  chosen: Iram
  rationale: Personal name; transliterated per translation philosophy.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing the summary statement. Present-tense English works idiomatically in genealogical/list style.
- source_word: אַלּוּפֵי אֱדֹם
  chosen: the chiefs of Edom
  alternatives:
  - the clan chiefs of Edom
  - the leaders of Edom
  lexicon: HALOT
  rationale: Construct phrase summarizing the preceding list. Repeating 'chiefs' maintains consistency with the singular occurrences earlier in the verse.
- source_word: לְמֹשְׁבֹתָם
  chosen: according to their settlements
  alternatives:
  - by their dwelling places
  - for their habitations
  lexicon: HALOT
  rationale: The prefixed ל here marks classification or arrangement, not motion. 'According to their settlements' captures the organizational sense of the list.
- source_word: בְּאֶרֶץ אֲחֻזָּתָם
  chosen: in the land of their possession
  alternatives:
  - in the land they possessed
  - in the land of their holdings
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or holding, often landed property. The more literal 'land of their possession' preserves the noun-based expression and its formal tone.
- source_word: הוּא עֵשָׂו
  chosen: He is Esau
  alternatives:
  - That is Esau
  - This was Esau
  lexicon: HALOT
  rationale: The pronoun plus proper name forms an identifying conclusion to the genealogy. 'He is Esau' is a straightforward rendering that preserves the emphatic identification.
- source_word: אֲבִי אֱדֹם
  chosen: the father of Edom
  alternatives:
  - the ancestor of Edom
  lexicon: HALOT
  rationale: אָב can denote progenitor as well as immediate father. 'Father of Edom' is the established and sufficiently clear genealogical idiom here, referring to Esau as progenitor of the Edomites.
