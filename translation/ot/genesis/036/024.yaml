id: GEN.36.24
reference: Genesis 36:24
source:
  edition: WLC
  text: וְ/אֵ֥לֶּה בְנֵֽי צִבְע֖וֹן וְ/אַיָּ֣ה וַ/עֲנָ֑ה ה֣וּא עֲנָ֗ה אֲשֶׁ֨ר מָצָ֤א
    אֶת הַ/יֵּמִם֙ בַּ/מִּדְבָּ֔ר בִּ/רְעֹת֥/וֹ אֶת הַ/חֲמֹרִ֖ים לְ/צִבְע֥וֹן אָבִֽי/ו־־־׃
translation:
  text: 'These are the sons of Zibeon: Aiah and Anah. This is the Anah who found the
    yemim in the wilderness while he was pasturing the donkeys for Zibeon his father.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The meaning of Hebrew yemim is uncertain. It has been understood as 'hot
      springs' or, in some ancient and later interpretations, 'mules.' The main text
      preserves the Hebrew term because the lexical evidence is inconclusive.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct phrase literally denotes male offspring. In this genealogical
    context, 'sons of' is the most direct and conventional rendering.
- source_word: צִבְעוֹן
  chosen: Zibeon
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: אַיָּה
  chosen: Aiah
  alternatives:
  - Ajah
  rationale: Personal name transliterated. 'Aiah' is a standard English form; 'Ajah'
    is an older variant.
- source_word: עֲנָה
  chosen: Anah
  rationale: Personal name transliterated consistently in the genealogy.
- source_word: הוּא עֲנָה
  chosen: This is the Anah
  alternatives:
  - He is Anah
  - that was Anah
  lexicon: HALOT
  rationale: The pronoun plus name serves to identify this particular Anah among possible
    referents in the genealogy. 'This is the Anah' communicates the identificational
    force naturally in English.
- source_word: מָצָא
  chosen: found
  alternatives:
  - discovered
  lexicon: HALOT
  rationale: The common verb means 'find.' 'Found' is the plainest and most formal
    equivalent here.
- source_word: הַיֵּמִם
  chosen: yemim
  alternatives:
  - hot springs
  - mules
  lexicon: HALOT
  rationale: The Hebrew term is rare and uncertain. Rather than force a disputed interpretation
    into the main text, the translation preserves the Hebrew form 'yemim' and explains
    major alternatives in a footnote for auditability.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is a standard rendering for מִדְבָּר and fits the broader
    biblical usage better than the narrower ''desert''.'
- source_word: בִּרְעֹתוֹ
  chosen: while he was pasturing
  alternatives:
  - when he was grazing
  - as he shepherded
  lexicon: HALOT
  rationale: The infinitive construct with preposition indicates contemporaneous action.
    Because the object is donkeys, 'pasturing' is more idiomatic than 'shepherding'
    while still reflecting the underlying verb 'to pasture/graze.'
- source_word: הַחֲמֹרִים
  chosen: the donkeys
  alternatives:
  - the asses
  lexicon: HALOT
  rationale: Modern, clear English equivalent for the animal term; avoids archaic
    wording.
- source_word: לְצִבְעוֹן אָבִיו
  chosen: for Zibeon his father
  alternatives:
  - belonging to Zibeon his father
  - for his father Zibeon
  lexicon: HALOT
  rationale: The preposition plus name and apposition indicates service rendered in
    relation to his father Zibeon. 'For Zibeon his father' is natural and preserves
    the filial apposition.
