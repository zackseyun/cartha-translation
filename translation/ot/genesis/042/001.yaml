id: GEN.42.1
reference: Genesis 42:1
source:
  edition: WLC
  text: וַ/יַּ֣רְא יַעֲקֹ֔ב כִּ֥י יֶשׁ שֶׁ֖בֶר בְּ/מִצְרָ֑יִם וַ/יֹּ֤אמֶר יַעֲקֹב֙
    לְ/בָנָ֔י/ו לָ֖/מָּה תִּתְרָאֽוּ־׃
translation:
  text: When Jacob saw that there was grain in Egypt, Jacob said to his sons, “Why
    do you keep looking at one another?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why do you show yourselves?” The Hebrew verb can be understood differently,
      but in this context it most likely refers to the brothers looking at one another
      in hesitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - and ... saw
  - now ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering it as 'When ...
    saw' makes the temporal relationship to the following speech natural in English
    while preserving the sense of Jacob's perception.
- source_word: כִּי יֶשׁ
  chosen: that there was
  alternatives:
  - that there is
  - that
  lexicon: HALOT
  rationale: The existential particle יֵשׁ with כִּי introduces the content of what
    Jacob perceived. English idiom in past narrative prefers 'that there was.'
- source_word: שֶׁבֶר
  chosen: grain
  alternatives:
  - food
  - corn
  lexicon: HALOT
  rationale: In the Joseph narrative שֶׁבֶר refers to grain available for purchase
    in time of famine, not merely 'breaking.' 'Grain' is more precise than the broader
    'food' and more current than older English 'corn.'
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - at Egypt
  lexicon: HALOT
  rationale: Standard locative sense of בְּ with the place name.
- source_word: לְבָנָיו
  chosen: to his sons
  alternatives:
  - to his children
  lexicon: HALOT
  rationale: בָּנִים here refers specifically to Jacob's male offspring in the narrative
    context. 'Sons' is gender-accurate and matches the Hebrew form and referent.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative preserved straightforwardly.
- source_word: תִּתְרָאוּ
  chosen: do you keep looking at one another
  alternatives:
  - do you look at one another
  - do you show yourselves
  - do you stare at one another
  lexicon: HALOT
  rationale: The hitpael of ראה here is idiomatic and commonly understood as reciprocal/reflexive
    behavior among the brothers in their inaction. 'Keep looking at one another' captures
    the likely iterative nuance in context better than the more wooden 'look at one
    another.' The alternative 'show yourselves' is lexically possible in some contexts
    but fits this scene less well.
