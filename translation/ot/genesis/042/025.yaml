id: GEN.42.25
reference: Genesis 42:25
source:
  edition: WLC
  text: וַ/יְצַ֣ו יוֹסֵ֗ף וַ/יְמַלְא֣וּ אֶת כְּלֵי/הֶם֮ בָּר֒ וּ/לְ/הָשִׁ֤יב כַּסְפֵּי/הֶם֙
    אִ֣ישׁ אֶל שַׂקּ֔/וֹ וְ/לָ/תֵ֥ת לָ/הֶ֛ם צֵדָ֖ה לַ/דָּ֑רֶךְ וַ/יַּ֥עַשׂ לָ/הֶ֖ם
    כֵּֽן־־׃
translation:
  text: Then Joseph gave orders to fill their containers with grain, to return each
    man's silver to his sack, and to give them provisions for the journey. And so
    it was done for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'their vessels'; the Hebrew term is broader than 'sack,' which appears
      later in the verse as a different word.
    reason: lexical_alternative
  - marker: b
    text: '''Silver'' can also mean ''money'' in context.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'And he did so for them.' The Hebrew does not emphasize the agent as
      strongly as English often does.
    reason: lexical_alternative
  - marker: d
    text: Or 'And it was done for them that way.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְצַו
  chosen: gave orders
  alternatives:
  - commanded
  - ordered
  lexicon: HALOT
  rationale: The verb צוה denotes issuing a command. 'Gave orders' is natural modern
    English and fits the indirect-command structure that follows.
- source_word: כְּלֵיהֶם
  chosen: their containers
  alternatives:
  - their vessels
  - their bags
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel/container. Since שַׂק appears later
    for 'sack,' rendering this more generally as 'containers' preserves the distinction
    and avoids prematurely identifying the item as sacks.
- source_word: בָּר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: בָּר here refers to grain produce in the Egyptian famine context. 'Grain'
    is the clearest contemporary English rendering; 'corn' is archaic/region-specific
    and 'wheat' is too narrow.
- source_word: וּלְהָשִׁיב כַּסְפֵּיהֶם
  chosen: to return their silver
  alternatives:
  - to restore their money
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver' and often functions as money. Because
    the narrative later emphasizes the brothers finding their silver, retaining 'silver'
    preserves the concrete wording while remaining intelligible.
- source_word: אִישׁ אֶל שַׂקּוֹ
  chosen: each man's silver to his sack
  alternatives:
  - each one's silver to his sack
  - each man's money into his bag
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man.' Per the translation philosophy,
    the masculine singular is retained as gender-accurate to the male brothers in
    context. שַׂק is specifically a sack, so it is rendered distinctly from כְּלִי.
- source_word: וְלָתֵת לָהֶם צֵדָה לַדָּרֶךְ
  chosen: and to give them provisions for the journey
  alternatives:
  - food for the road
  - supplies for the trip
  lexicon: HALOT
  rationale: צֵדָה denotes provisions/supplies for travel. 'Provisions for the journey'
    is idiomatic and preserves the travel context signaled by לַדָּרֶךְ.
- source_word: וַיַּעַשׂ לָהֶם כֵּן
  chosen: And it was done for them that way
  alternatives:
  - And he did so for them
  - And this was done for them
  lexicon: HALOT
  rationale: The Hebrew uses a singular verb with an unspecified subject after Joseph's
    orders. English can render this idiomatically either actively or passively. The
    passive-like 'it was done for them that way' preserves the focus on execution
    of Joseph's instructions without overemphasizing a specific agent.
