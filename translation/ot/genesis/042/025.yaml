  from: And it was done for them that way.
  to: And so it was done for them.
  rationale: The current rendering is acceptable and the passive voice is a valid
    choice for the indefinite active subject of וַיַּעַשׂ. However, 'that way' is
    a slightly wordy and less idiomatic translation of כֵּן ('so,' 'thus') in this
    concluding formula. 'And so it was done for them' is more concise and flows more
    naturally in English, while conveying the exact same meaning.
