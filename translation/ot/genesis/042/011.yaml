id: GEN.42.11
reference: Genesis 42:11
source:
  edition: WLC
  text: כֻּלָּ֕/נוּ בְּנֵ֥י אִישׁ אֶחָ֖ד נָ֑חְנוּ כֵּנִ֣ים אֲנַ֔חְנוּ לֹא הָי֥וּ עֲבָדֶ֖י/ךָ
    מְרַגְּלִֽים־־׃
translation:
  text: We are all the sons of one man. We are honest men; your servants have not
    been spies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upright' or 'truthful' for 'honest.' The Hebrew describes them as reliable
      or sincere in contrast to the charge of espionage.
    reason: lexical_alternative
  - marker: b
    text: Or 'your servants are not spies' or 'your servants were not spies.' The
      Hebrew construction can be represented in several natural English ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּנוּ
  chosen: all
  alternatives:
  - all of us
  lexicon: HALOT
  rationale: Expresses totality of the speaker group. In English, 'We are all...'
    is the most natural placement while preserving the emphasis.
- source_word: בְּנֵי אִישׁ אֶחָד
  chosen: the sons of one man
  alternatives:
  - sons of one man
  - children of one man
  lexicon: HALOT
  rationale: Literally 'sons of one man.' 'Sons' is retained rather than gender-neutral
    'children' because the Hebrew is explicitly masculine and refers to male siblings;
    this follows the gender-accurate principle.
- source_word: נָחְנוּ / אֲנַחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: The independent pronouns are emphatic in Hebrew. English requires the
    copula for natural expression in both clauses; the repetition is preserved across
    the verse.
- source_word: כֵּנִים
  chosen: honest
  alternatives:
  - upright
  - truthful
  lexicon: HALOT
  rationale: Conveys that they present themselves as trustworthy and sincere. 'Honest'
    is idiomatic modern English in this context and fits the brothers' self-defense
    before Joseph.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as a conventional
    deferential self-reference before a ruler rather than emphasizing bonded status.
    Therefore 'servants' better matches the discourse context.
- source_word: מְרַגְּלִים
  chosen: spies
  alternatives:
  - spying men
  - scouts
  lexicon: HALOT
  rationale: In this context the participle denotes people acting as spies, not neutral
    reconnaissance. 'Spies' is the clearest and most idiomatic English rendering.
- source_word: לֹא הָיוּ ... מְרַגְּלִים
  chosen: have not been spies
  alternatives:
  - are not spies
  - were not spies
  lexicon: HALOT
  rationale: The Hebrew uses היה with a participle to describe their status/action.
    'Have not been spies' communicates their denial of ever having acted in that capacity,
    fitting the context of accusation and defense.
