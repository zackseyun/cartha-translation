  category: awkward_english
  tier: 1
  from: And it happened, as they were emptying their sacks, that behold,
  to: And as they were emptying their sacks, behold,
  rationale: The construction 'And it happened... that behold' is an awkward calque of the Hebrew narrative sequence וַיְהִי... וְהִנֵּה. The phrase 'that behold' is unidiomatic in English. Rephrasing the opening to 'And as they were emptying their sacks, behold,' preserves the temporal relationship established by the participle (מְרִיקִים) and the element of surprise from הִנֵּה, but in a more natural English style.
