id: GEN.42.35
reference: Genesis 42:35
source:
  edition: WLC
  text: וַ/יְהִ֗י הֵ֚ם מְרִיקִ֣ים שַׂקֵּי/הֶ֔ם וְ/הִנֵּה אִ֥ישׁ צְרוֹר כַּסְפּ֖/וֹ בְּ/שַׂקּ֑/וֹ וַ/יִּרְא֞וּ אֶת צְרֹר֧וֹת כַּסְפֵּי/הֶ֛ם הֵ֥מָּה וַ/אֲבִי/הֶ֖ם וַ/יִּירָֽאוּ־־־׃
translation:
  text: And as they were emptying their sacks, behold, each man’s bundle of silver was in his sack; and they saw their bundles of silver, they and their father, and they were afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pouch of money' for 'bundle of silver.' The Hebrew term refers to something tied up or wrapped together.
    reason: lexical_alternative
  - marker: b
    text: Or 'And it happened, as they were emptying their sacks, that behold,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development. 'And it happened' preserves the Hebrew discourse function without archaic excess.
- source_word: מְרִיקִים
  chosen: emptying
  alternatives:
  - unloading
  - pouring out
  lexicon: HALOT
  rationale: The Hiphil participle of ריק conveys emptying out contents. 'Emptying' fits the action with modern clarity better than the more interpretive 'unloading.'
- source_word: שַׂקֵּיהֶם
  chosen: their sacks
  alternatives:
  - their bags
  lexicon: HALOT
  rationale: שַׂק denotes a sack/bag used for grain or goods. 'Sacks' better preserves the ancient storage sense than the more generic 'bags.'
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The particle marks sudden discovery and surprise. 'Behold' retains the force succinctly; although somewhat elevated, it remains readable and matches the narrative shock.
- source_word: אִישׁ
  chosen: each man’s
  alternatives:
  - each one’s
  - a man's
  lexicon: HALOT
  rationale: In distributive use with the following singular noun, אִישׁ indicates each individual among them. 'Each man's' captures the distributive sense naturally in English.
- source_word: צְרוֹר כַּסְפּוֹ
  chosen: bundle of silver
  alternatives:
  - pouch of money
  - bag of silver
  lexicon: HALOT
  rationale: צְרוֹר is something bound up, a bundle or pouch. Since כֶּסֶף here refers to silver as money, 'bundle of silver' stays close to the Hebrew while remaining intelligible.
- source_word: בְּשַׂקּוֹ
  chosen: in his sack
  alternatives:
  - inside his sack
  - in his bag
  lexicon: HALOT
  rationale: Simple locative phrase; 'in his sack' is the most direct rendering and preserves the singular corresponding to each brother.
- source_word: וַיִּרְאוּ אֶת צְרֹרוֹת כַּסְפֵּיהֶם
  chosen: and they saw their bundles of silver
  alternatives:
  - and they saw their money bundles
  - and they saw the bundles of their silver
  lexicon: HALOT
  rationale: The plural resumes the discovery collectively. Rendering both nouns explicitly preserves the concreteness of the Hebrew rather than flattening to 'their money.'
- source_word: הֵמָּה וַאֲבִיהֶם
  chosen: they and their father
  alternatives:
  - both they and their father
  lexicon: HALOT
  rationale: An emphatic apposition specifying who saw and reacted. 'They and their father' is straightforward and preserves the Hebrew emphasis.
- source_word: וַיִּירָאוּ
  chosen: and they were afraid
  alternatives:
  - and they feared
  - and they became afraid
  lexicon: HALOT
  rationale: From ירא in narrative context, indicating fear in response to the discovery. 'Were afraid' is idiomatic modern English and conveys the emotional reaction clearly.
