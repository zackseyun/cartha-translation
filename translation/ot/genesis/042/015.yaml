id: GEN.42.15
reference: Genesis 42:15
source:
  edition: WLC
  text: בְּ/זֹ֖את תִּבָּחֵ֑נוּ חֵ֤י פַרְעֹה֙ אִם תֵּצְא֣וּ מִ/זֶּ֔ה כִּ֧י אִם בְּ/ב֛וֹא
    אֲחִי/כֶ֥ם הַ/קָּטֹ֖ן הֵֽנָּה־־׃
translation:
  text: 'By this you will be tested: as Pharaoh lives, you shall not leave this place
    unless your youngest brother comes here.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''if you leave from here''; in this oath construction,
      ''if'' expresses a strong negation: ''you shall not leave from here.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּזֹאת
  chosen: By this
  alternatives:
  - In this
  - By means of this
  lexicon: HALOT
  rationale: Instrumental ב with demonstrative זאת introduces the means or criterion
    of testing; 'By this' is concise and natural English.
- source_word: תִּבָּחֵנוּ
  chosen: you will be tested
  alternatives:
  - you shall be examined
  - you will be proved
  lexicon: HALOT
  rationale: Niphal of בחן conveys being tested or examined. 'Tested' fits the context
    of verifying the brothers' claim.
- source_word: חֵי פַרְעֹה
  chosen: as Pharaoh lives
  alternatives:
  - by the life of Pharaoh
  - Pharaoh lives!
  lexicon: HALOT
  rationale: This is an oath formula literally invoking the life of Pharaoh. 'As Pharaoh
    lives' preserves the idiomatic force in readable English.
- source_word: אִם תֵּצְאוּ מִזֶּה
  chosen: you shall not leave this place
  alternatives:
  - if you leave here
  - you will leave here only if not
  lexicon: HALOT
  rationale: 'Following an oath, אִם can function elliptically in a negative asseveration:
    ''surely not'' or ''you shall not.'' Rendering the clause as a prohibition/denial
    reflects standard Hebrew oath usage better than a bare conditional in English.
    ''This place'' makes מִזֶּה idiomatic.'
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - only if
  lexicon: HALOT
  rationale: The paired particles introduce the sole exception to the denial. 'Unless'
    is the most natural English equivalent.
- source_word: בְּבוֹא
  chosen: comes
  alternatives:
  - in the coming of
  - when ... comes
  lexicon: HALOT
  rationale: Infinitive construct with ב marks the circumstance under which they may
    leave. In English, a finite verb after 'unless' is smoother and preserves the
    sense.
- source_word: אֲחִיכֶם הַקָּטֹן
  chosen: your youngest brother
  alternatives:
  - your little brother
  - your younger brother
  lexicon: HALOT
  rationale: Though literally 'your small/young brother,' in sibling context the idiomatic
    sense is the youngest brother, referring to Benjamin.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - to here
  - hither
  lexicon: HALOT
  rationale: Directional adverb meaning 'here/to here.' 'Here' is natural modern English;
    'hither' is archaic.
