theological_decisions:
- issue: Meaning of Joseph's confession אֶת הָאֱלֹהִים אֲנִי יָרֵא
  chosen_reading: Joseph appeals to his reverence for the one true God as the basis
    for his just treatment of his brothers.
  alternative_readings:
  - Joseph invokes generic deity-fear in an Egyptian court setting.
  rationale: In Genesis' narrative context Joseph is consistently portrayed as fearing
    and serving the God of his fathers. Rendering simply 'for I fear God' preserves
    the theological force without overexplaining it in the main text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
