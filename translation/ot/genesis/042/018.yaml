id: GEN.42.18
reference: Genesis 42:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵ/הֶ֤ם יוֹסֵף֙ בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֔י זֹ֥את עֲשׂ֖וּ וִֽ/חְי֑וּ
    אֶת הָ/אֱלֹהִ֖ים אֲנִ֥י יָרֵֽא־׃
translation:
  text: On the third day Joseph said to them, “Do this and live, for I fear God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do this, so that you may live”; the Hebrew can express either a direct
      command followed by consequence or an implied result.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing direct speech; 'said' is the natural
    modern English rendering.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Preposition plus pronominal suffix straightforwardly indicates the indirect
    object of speech.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: On the third day
  alternatives:
  - on day three
  lexicon: HALOT
  rationale: Idiomatic temporal expression in Hebrew; standard English is 'On the
    third day.'
- source_word: זֹאת עֲשׂוּ
  chosen: Do this
  alternatives:
  - Do this thing
  lexicon: HALOT
  rationale: Demonstrative plus imperative; concise English preserves the command
    without unnecessary expansion.
- source_word: וִחְיוּ
  chosen: and live
  alternatives:
  - so that you may live
  - and you will live
  lexicon: HALOT
  rationale: Imperative/cohortative sequence after a command can express result or
    consequence. 'And live' preserves the Hebrew compactly while allowing the implied
    sense that compliance will spare their lives.
- source_word: אֶת הָאֱלֹהִים
  chosen: God
  alternatives:
  - the gods
  - God himself
  lexicon: HALOT
  rationale: With the definite article and in Joseph's monotheistic confession, הָאֱלֹהִים
    refers to the true God, not plural 'gods.' English omits the article naturally.
- source_word: אֲנִי יָרֵא
  chosen: for I fear
  alternatives:
  - I am one who fears
  - because I fear
  lexicon: HALOT
  rationale: Predicate participle with explicit pronoun expresses Joseph's characteristic
    reverence. 'For I fear' fits the discourse logic, explaining why his proposal
    is trustworthy and humane.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention per project
    philosophy.
