id: GEN.42.17
reference: Genesis 42:17
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֥ף אֹתָ֛/ם אֶל מִשְׁמָ֖ר שְׁלֹ֥שֶׁת יָמִֽים־׃
translation:
  text: And he put them in custody for three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he confined them in guard/custody for three days.' The Hebrew verb
      literally means 'gathered/collected,' but here functions idiomatically for placing
      them under guard.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: put
  alternatives:
  - gathered
  - confined
  - placed
  lexicon: HALOT
  rationale: The verb אסף literally means 'gather' or 'collect,' but in the idiom
    with אֶל מִשְׁמָר it means to place or confine someone into custody. 'Put' is
    natural modern English and preserves the action without over-paraphrasing.
- source_word: אֹתָם
  chosen: them
  rationale: Direct-object pronoun, masculine plural, referring to Joseph's brothers.
- source_word: אֶל
  chosen: in
  alternatives:
  - into
  - to
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to' or 'into,' English idiom with 'custody'
    prefers 'in custody.' This reflects the sense of movement into a state of confinement.
- source_word: מִשְׁמָר
  chosen: custody
  alternatives:
  - guard
  - prison
  - confinement
  lexicon: HALOT
  rationale: מִשְׁמָר denotes a place or condition of keeping/guarding. 'Custody'
    best fits the context and avoids overstating the term as a formal prison if the
    Hebrew does not require that specificity.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: for three days
  alternatives:
  - three days
  lexicon: HALOT
  rationale: The construct phrase straightforwardly denotes a duration. 'For three
    days' is the most natural English expression of the temporal extent.
