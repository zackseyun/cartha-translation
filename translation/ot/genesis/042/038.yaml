theological_decisions:
- issue: Rendering שְׁאֹל as Sheol versus grave
  chosen_reading: to Sheol
  alternative_readings:
  - to the grave
  - to the realm of the dead
  rationale: The Hebrew uses שְׁאֹל, which can denote the underworld/the realm of
    the dead and is not identical in every context to a physical grave. Preserving
    'Sheol' maintains lexical transparency and avoids importing a narrower interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
