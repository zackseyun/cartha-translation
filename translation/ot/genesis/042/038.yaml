id: GEN.42.38
reference: Genesis 42:38
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לֹֽא יֵרֵ֥ד בְּנִ֖/י עִמָּ/כֶ֑ם כִּֽי אָחִ֨י/ו מֵ֜ת וְ/ה֧וּא לְ/בַדּ֣/וֹ
    נִשְׁאָ֗ר וּ/קְרָאָ֤/הוּ אָסוֹן֙ בַּ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר תֵּֽלְכוּ בָ֔/הּ וְ/הוֹרַדְתֶּ֧ם
    אֶת שֵׂיבָתִ֛/י בְּ/יָג֖וֹן שְׁאֽוֹלָ/ה־־־־׃
translation:
  text: But he said, “My son will not go down with you, because his brother is dead,
    and he alone is left. If harm should happen to him on the journey that you take,
    then you would bring my gray hair down to Sheol in sorrow.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If disaster befalls him on the way that you go.'
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרֵד
  chosen: will not go down
  alternatives:
  - will not go
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/downward.' In Genesis, travel from
    Canaan to Egypt is regularly described as 'going down,' so retaining 'go down'
    preserves the narrative geography and source-text wording.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: בן with 1cs suffix is straightforwardly 'my son.' 'My child' would be
    more interpretive and less specific than the Hebrew.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: Refers to Joseph as Benjamin's brother. The possessive should be retained
    directly.
- source_word: מֵת
  chosen: is dead
  alternatives:
  - died
  lexicon: HALOT
  rationale: 'The stative/resultative sense fits Jacob''s present perspective: Joseph
    remains in the state of being dead, as Jacob believes. ''Died'' is possible but
    less aligned with the Hebrew predicate adjective/participle force here.'
- source_word: לְבַדּוֹ נִשְׁאָר
  chosen: he alone is left
  alternatives:
  - he alone remains
  - he is the only one left
  lexicon: HALOT
  rationale: This expresses Benjamin as the sole remaining son of Rachel from Jacob's
    perspective. 'He alone is left' is natural English while preserving the emphatic
    sense of לבד.
- source_word: וּקְרָאָהוּ אָסוֹן
  chosen: If harm should happen to him
  alternatives:
  - and harm befalls him
  - and disaster happens to him
  lexicon: HALOT
  rationale: אָסוֹן denotes serious harm, calamity, or disaster. The clause is conditional
    in sense within Jacob's warning, so English idiom is best represented with 'If
    harm should happen to him.' 'Disaster' is possible but sounds slightly heavier
    and less idiomatic here.
- source_word: אָסוֹן
  chosen: harm
  alternatives:
  - disaster
  - calamity
  lexicon: HALOT
  rationale: A broad term for serious misfortune. 'Harm' is concise and idiomatic
    in this paternal warning, while still allowing the severity implied by the context.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תֵּלְכוּ בָהּ
  chosen: on the journey that you take
  alternatives:
  - on the road by which you go
  - on the way that you go
  lexicon: HALOT
  rationale: דרך is literally 'way/road,' but in travel narrative often means the
    journey itself. 'On the journey that you take' is readable modern English without
    losing the concrete travel sense.
- source_word: וְהוֹרַדְתֶּם
  chosen: you would bring down
  alternatives:
  - you will bring down
  - you would send down
  lexicon: HALOT
  rationale: Hiphil of ירד means 'cause to go down/bring down.' In context it expresses
    the consequence of the hypothetical harm, so 'would bring down' fits the conditional
    force better than a simple future.
- source_word: שֵׂיבָתִי
  chosen: my gray hair
  alternatives:
  - my gray head
  - my old age
  lexicon: HALOT
  rationale: The noun refers literally to gray hair and by extension old age. Retaining
    the concrete image matches the Hebrew vividness better than abstract 'old age.'
- source_word: בְּיָגוֹן
  chosen: in sorrow
  alternatives:
  - with grief
  - in grief
  lexicon: HALOT
  rationale: יגון denotes grief/sorrow. 'In sorrow' is idiomatic with 'bring down
    ... to Sheol' and preserves the emotional state.
- source_word: שְׁאֹלָה
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: HALOT
  rationale: Per translation philosophy, the Hebrew term should not be flattened where
    the source uses Sheol. 'Sheol' preserves the Hebrew concept and avoids over-resolving
    whether the emphasis is grave, underworld, or realm of the dead.
