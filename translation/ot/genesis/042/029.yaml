id: GEN.42.29
reference: Genesis 42:29
source:
  edition: WLC
  text: וַ/יָּבֹ֛אוּ אֶל יַעֲקֹ֥ב אֲבִי/הֶ֖ם אַ֣רְצָ/ה כְּנָ֑עַן וַ/יַּגִּ֣ידוּ ל֔/וֹ
    אֵ֛ת כָּל הַ/קֹּרֹ֥ת אֹתָ֖/ם לֵ/אמֹֽר־־׃
translation:
  text: Then they came to Jacob their father in the land of Canaan and told him all
    that had happened to them, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to Jacob their father, to the land of Canaan.' The translation
      renders the phrase idiomatically as 'to Jacob their father in the land of Canaan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  - So they came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then they came' preserves the
    sequential force in natural English.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name is transliterated by standard convention.
- source_word: אֲבִיהֶם
  chosen: their father
  lexicon: HALOT
  rationale: Construct form with 3mp suffix; straightforward filial designation.
- source_word: אַרְצָה כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - to the land of Canaan
  - toward the land of Canaan
  lexicon: HALOT
  rationale: The directional ending on אֶרֶץ with Canaan indicates movement toward/into
    the land, but in English after 'came to Jacob' the idiomatic expression is 'came
    ... in the land of Canaan,' locating Jacob there. This avoids awkward double destination
    while preserving the geographical notice.
- source_word: וַיַּגִּידוּ לוֹ
  chosen: and told him
  alternatives:
  - and reported to him
  - and declared to him
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell/report. 'Told him' is clear, natural, and
    sufficient in this narrative context.
- source_word: אֵת כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Direct-object marker plus כָּל introduces the totality of what follows;
    'all' is the idiomatic rendering.
- source_word: הַקֹּרֹת אֹתָם
  chosen: that had happened to them
  alternatives:
  - the things that had happened to them
  - all their experiences
  lexicon: HALOT
  rationale: The participial form from קרה refers to events/befallings. 'That had
    happened to them' is idiomatic English and preserves the sense of events that
    befell them.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: Introduces the following direct discourse. 'Saying,' is the standard
    narrative marker and signals continuation into the next verse.
