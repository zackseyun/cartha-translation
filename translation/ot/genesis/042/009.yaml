id: GEN.42.9
reference: Genesis 42:9
source:
  edition: WLC
  text: וַ/יִּזְכֹּ֣ר יוֹסֵ֔ף אֵ֚ת הַ/חֲלֹמ֔וֹת אֲשֶׁ֥ר חָלַ֖ם לָ/הֶ֑ם וַ/יֹּ֤אמֶר
    אֲלֵ/הֶם֙ מְרַגְּלִ֣ים אַתֶּ֔ם לִ/רְא֛וֹת אֶת עֶרְוַ֥ת הָ/אָ֖רֶץ בָּאתֶֽם־׃
translation:
  text: Then Joseph remembered the dreams that he had dreamed about them, and he said
    to them, “You are spies; you have come to see the nakedness of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the exposed/vulnerable parts of the land”; the Hebrew literally says
      “the nakedness of the land,” an idiom for areas open to attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  chosen: remembered
  alternatives:
  - called to mind
  - recalled
  lexicon: HALOT
  rationale: The wayyiqtol of זכר straightforwardly narrates Joseph's recollection
    at this moment. 'Remembered' is the natural English narrative equivalent.
- source_word: הַחֲלֹמוֹת אֲשֶׁר חָלַם
  chosen: the dreams that he had dreamed
  alternatives:
  - the dreams he dreamed
  lexicon: HALOT
  rationale: The Hebrew uses the cognate accusative construction with חלם + חלומות.
    Retaining 'the dreams that he had dreamed' preserves the emphatic/formal flavor
    without becoming unnatural.
- source_word: לָהֶם
  chosen: about them
  alternatives:
  - concerning them
  - for them
  lexicon: HALOT
  rationale: In context, the dreams concerned Joseph's brothers. 'About them' communicates
    the relational sense idiomatically in English better than the more wooden 'for
    them.'
- source_word: מְרַגְּלִים
  chosen: spies
  alternatives:
  - scouts
  lexicon: HALOT
  rationale: The participle from רגל in this context denotes persons engaged in espionage.
    'Spies' is the standard and clearest rendering.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to inspect
  - to spy out
  lexicon: HALOT
  rationale: The infinitive literally means 'to see.' Although the broader accusation
    implies reconnaissance, 'to see' preserves the Hebrew wording while allowing the
    espionage sense to arise from context.
- source_word: עֶרְוַת הָאָרֶץ
  chosen: the nakedness of the land
  alternatives:
  - the undefended parts of the land
  - the weakness of the land
  - the exposed places of the land
  lexicon: HALOT
  rationale: The phrase is idiomatic for the land's vulnerable or exposed areas, but
    the Hebrew image is literally 'nakedness.' Following optimal equivalence, the
    main text preserves the metaphor, with a footnote explaining the idiomatic sense.
- source_word: בָּאתֶם
  chosen: you have come
  alternatives:
  - you came
  lexicon: HALOT
  rationale: English present perfect fits the direct accusation in dialogue and conveys
    the force of their arrival with present relevance.
