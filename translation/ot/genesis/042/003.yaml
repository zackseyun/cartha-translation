id: GEN.42.3
reference: Genesis 42:3
source:
  edition: WLC
  text: וַ/יֵּרְד֥וּ אֲחֵֽי יוֹסֵ֖ף עֲשָׂרָ֑ה לִ/שְׁבֹּ֥ר בָּ֖ר מִ/מִּצְרָֽיִם־׃
translation:
  text: So Joseph’s ten brothers went down to buy grain from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to buy grain in Egypt.' The Hebrew more literally says 'to buy grain
      from Egypt,' expressing the source of the grain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - went
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Went down' preserves
    the common geographical idiom for travel to Egypt while remaining natural English.
- source_word: אֲחֵי יוֹסֵף
  chosen: Joseph’s brothers
  alternatives:
  - the brothers of Joseph
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means 'the brothers of Joseph.'
    English possessive style is the most natural rendering.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal number specifying how many brothers went. In English it is best
    placed before 'brothers' as 'ten brothers.'
- source_word: לִשְׁבֹּר
  chosen: to buy
  alternatives:
  - to purchase
  - to buy grain
  lexicon: HALOT
  rationale: In this context שׁבר is the idiom for procuring grain, especially in
    famine narratives. 'To buy' captures the sense clearly; the object 'grain' is
    supplied explicitly from the following noun.
- source_word: בָּר
  chosen: grain
  alternatives:
  - corn
  - food
  lexicon: HALOT
  rationale: בָּר here refers to grain/cereal produce. 'Grain' is the clearest modern
    English equivalent; 'corn' would be misleading in contemporary English.
- source_word: מִמִּצְרָיִם
  chosen: from Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: 'The preposition מן normally means ''from.'' In this construction it
    indicates source: they went down to buy grain from Egypt, i.e., sourced there.
    Some English versions smooth this to ''in Egypt,'' but ''from Egypt'' more closely
    reflects the Hebrew.'
