id: GEN.42.12
reference: Genesis 42:12
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֲלֵ/הֶ֑ם לֹ֕א כִּֽי עֶרְוַ֥ת הָ/אָ֖רֶץ בָּאתֶ֥ם לִ/רְאֽוֹת־׃
translation:
  text: But he said to them, “No; you have come to see the nakedness of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exposed/undefended parts of the land.' The Hebrew literally says
      'the nakedness of the land,' a metaphor for vulnerable areas that could be exploited
      by invaders or spies.
    reason: lexical_alternative
  - marker: b
    text: Or 'to spy out.' The Hebrew verb is literally 'to see,' but in context Joseph
      is accusing them of reconnaissance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can render this as
    either 'and' or 'but' depending on discourse flow. Here 'but' fits the adversative
    response to the brothers' denial in the previous verse while still reflecting
    the narrative sequence.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard preposition plus pronominal suffix indicating the indirect object
    of speech.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - Not so
  - No indeed
  lexicon: HALOT
  rationale: Used here as a forceful denial of the brothers' claim from the previous
    verse. 'No' is natural modern English and preserves the abrupt rebuttal.
- source_word: כִּי
  chosen: ;
  alternatives:
  - for
  - rather
  - indeed
  lexicon: HALOT
  rationale: 'In this context כִּי introduces the corrective accusation following
    the denial. English punctuation with an explanatory/corrective clause communicates
    the sense more naturally than a wooden ''for'' or ''indeed.'' The semantic force
    is preserved in the full clause: ''No; you have come...''.'
- source_word: עֶרְוַת
  chosen: the nakedness of
  alternatives:
  - the exposed places of
  - the undefended parts of
  - the weakness of
  lexicon: HALOT
  rationale: The noun literally denotes 'nakedness' and is used metaphorically here
    for the land's vulnerable or exposed areas. The literal image is important and
    should be preserved in the main text rather than flattened to an interpretation.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering of אֶרֶץ and fits the immediate context
    of Egypt and its territory. ''Country'' is possible but less consistent with the
    Hebrew term.'
- source_word: בָּאתֶם
  chosen: you have come
  alternatives:
  - you came
  lexicon: HALOT
  rationale: 'The perfect verb in direct speech can be rendered as English present
    perfect to express the present relevance of their arrival: Joseph''s accusation
    concerns their purpose in coming.'
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to look at
  - to spy out
  lexicon: HALOT
  rationale: The infinitive of ראה is literally 'to see.' Although the broader context
    concerns spying, the Hebrew here does not use the usual verb 'to spy out' but
    the more basic 'to see,' paired with the metaphor 'nakedness of the land.' Retaining
    'to see' preserves the source wording while allowing the accusation to remain
    clear in context.
