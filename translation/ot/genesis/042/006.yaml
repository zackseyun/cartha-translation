theological_decisions:
- issue: Rendering of Joseph’s brothers’ act toward him
  chosen_reading: bowed down to him
  alternative_readings:
  - prostrated themselves before him
  - worshiped him
  rationale: The scene fulfills Joseph’s earlier dreams and depicts social submission,
    not divine worship. The chosen wording preserves the physical and honorific sense
    without theological overstatement.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
