id: GEN.42.6
reference: Genesis 42:6
source:
  edition: WLC
  text: וְ/יוֹסֵ֗ף ה֚וּא הַ/שַּׁלִּ֣יט עַל הָ/אָ֔רֶץ ה֥וּא הַ/מַּשְׁבִּ֖יר לְ/כָל
    עַ֣ם הָ/אָ֑רֶץ וַ/יָּבֹ֨אוּ֙ אֲחֵ֣י יוֹסֵ֔ף וַ/יִּשְׁתַּֽחֲווּ ל֥/וֹ אַפַּ֖יִם
    אָֽרְצָ/ה־־־׃
translation:
  text: Now Joseph was the ruler over the land; he was the one who sold grain to all
    the people of the land. And Joseph’s brothers came and bowed down to him with
    their faces to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “prostrated themselves before him.” The Hebrew verb can denote deep bowing
      or prostration as an act of homage.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשַּׁלִּיט
  chosen: the ruler
  alternatives:
  - the governor
  - the one in authority
  lexicon: HALOT
  rationale: The adjective/noun denotes one exercising authority or dominion. 'Ruler'
    is natural modern English and preserves Joseph’s governing status without over-specifying
    an office title.
- source_word: עַל הָאָרֶץ
  chosen: over the land
  alternatives:
  - over the הארץ/country
  - over the earth
  lexicon: HALOT
  rationale: In Genesis narrative, אֶרֶץ here refers to the land/country in view,
    namely Egypt, not the whole earth. 'Land' is a straightforward rendering.
- source_word: הַמַּשְׁבִּיר
  chosen: the one who sold grain
  alternatives:
  - the provider of grain
  - the one distributing grain
  - the seller
  lexicon: HALOT
  rationale: The Hifil participle of שׁבר in this context refers to selling grain
    during famine conditions. 'Sold grain' makes explicit the object understood from
    context and matches the narrative situation better than a bare 'seller'.
- source_word: לְכָל עַם הָאָרֶץ
  chosen: to all the people of the land
  alternatives:
  - to all the people of the country
  - to all the people of the earth
  lexicon: HALOT
  rationale: עַם is collective singular, best rendered 'people.' As above, הָאָרֶץ
    is local, not global, in this immediate context.
- source_word: אֲחֵי יוֹסֵף
  chosen: Joseph’s brothers
  alternatives:
  - the brothers of Joseph
  lexicon: HALOT
  rationale: Construct phrase naturally rendered with English possessive. 'Brothers'
    is gender-accurate and matches the male siblings in context.
- source_word: וַיִּשְׁתַּחֲווּ לוֹ
  chosen: bowed down to him
  alternatives:
  - prostrated themselves before him
  - paid homage to him
  - worshiped him
  lexicon: HALOT
  rationale: The verb שׁחה commonly denotes bowing/prostration. 'Bowed down to him'
    fits the physical act here without importing cultic 'worship,' though the gesture
    is one of deep obeisance.
- source_word: אַפַּיִם אָרְצָה
  chosen: with their faces to the ground
  alternatives:
  - face down to the ground
  - with their nostrils to the earth
  lexicon: HALOT
  rationale: This idiom describes full prostration. A literal rendering with 'nostrils'
    or 'faces' can sound awkward; 'with their faces to the ground' clearly communicates
    the posture in natural English.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction advances the narrative. 'Now' is a common English way
    to mark a scene-setting transition, while remaining faithful to the discourse
    function.
