id: GEN.42.37
reference: Genesis 42:37
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר רְאוּבֵן֙ אֶל אָבִ֣י/ו לֵ/אמֹ֔ר אֶת שְׁנֵ֤י בָנַ/י֙ תָּמִ֔ית אִם
    לֹ֥א אֲבִיאֶ֖/נּוּ אֵלֶ֑י/ךָ תְּנָ֤/ה אֹת/וֹ֙ עַל יָדִ֔/י וַ/אֲנִ֖י אֲשִׁיבֶ֥/נּוּ
    אֵלֶֽי/ךָ־־־־׃
translation:
  text: Then Reuben said to his father, “You may put my two sons to death if I do
    not bring him back to you. Put him in my hand, and I myself will bring him back
    to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Entrust him to me” (literally, “Put him in my hand”).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל אָבִיו
  chosen: to his father
  alternatives:
  - to his own father
  lexicon: HALOT
  rationale: Straightforward relational phrase; 'his father' is idiomatic and sufficient
    in English.
- source_word: לֵאמֹר
  chosen: omitted in English quotation introduction
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew speech-introducer is normally not represented separately in natural
    English once direct discourse is introduced.
- source_word: אֶת שְׁנֵי בָנַי תָּמִית
  chosen: You may put my two sons to death
  alternatives:
  - Kill my two sons
  - You shall put my two sons to death
  lexicon: HALOT
  rationale: The Hiphil of מות here expresses causing death. 'Put ... to death' preserves
    the causative sense and avoids an overly abrupt English imperative, while still
    conveying Reuben's pledge.
- source_word: אִם לֹא
  chosen: if ... not
  alternatives:
  - if I fail to
  lexicon: HALOT
  rationale: Rendered as a standard conditional with negation. The smoother English
    sense is carried by 'if I do not bring him back'.
- source_word: אֲבִיאֶנּוּ אֵלֶיךָ
  chosen: I do not bring him back to you
  alternatives:
  - I do not bring him to you
  lexicon: HALOT
  rationale: Although בוא in Hiphil is literally 'bring,' context requires 'bring
    back,' since Benjamin is to be returned to Jacob.
- source_word: תְּנָה אֹתוֹ עַל יָדִי
  chosen: Put him in my hand
  alternatives:
  - Give him into my hand
  - Entrust him to me
  lexicon: HALOT
  rationale: The idiom literally involves the hand and denotes entrusting. 'Put him
    in my hand' keeps the concrete Hebrew image while remaining understandable; the
    more interpretive 'Entrust him to me' is preserved as an alternative.
- source_word: וַאֲנִי
  chosen: and I myself
  alternatives:
  - and I
  - as for me, I
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis. 'I myself' reflects that emphasis
    naturally in English.
- source_word: אֲשִׁיבֶנּוּ אֵלֶיךָ
  chosen: will bring him back to you
  alternatives:
  - will return him to you
  lexicon: HALOT
  rationale: The Hiphil of שוב means 'cause to return/bring back.' 'Bring him back'
    is idiomatic and matches the narrative context of safe return.
