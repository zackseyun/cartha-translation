id: GEN.42.14
reference: Genesis 42:14
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲלֵ/הֶ֖ם יוֹסֵ֑ף ה֗וּא אֲשֶׁ֨ר דִּבַּ֧רְתִּי אֲלֵ/כֶ֛ם לֵ/אמֹ֖ר
    מְרַגְּלִ֥ים אַתֶּֽם׃
translation:
  text: Joseph said to them, “It is as I said to you, saying, ‘You are spies.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “It is that which I spoke to you, saying, ‘You are spies.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from אמר. In English narrative, simple
    past 'said' is natural; the conjunction is absorbed into the flow rather than
    rendered woodenly as 'and said'.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus pronominal suffix, indicating
    Joseph's addressees.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: הוּא אֲשֶׁר
  chosen: It is as
  alternatives:
  - This is what
  - It is what
  lexicon: HALOT
  rationale: 'The pronoun plus relative particle forms an emphatic resumptive expression:
    ''it is that which...''. ''It is as'' communicates the idiomatic force in natural
    English while preserving the emphasis that Joseph''s prior statement is being
    reaffirmed.'
- source_word: דִּבַּרְתִּי
  chosen: I said
  alternatives:
  - I spoke
  lexicon: HALOT
  rationale: Though the verb is דבר ('speak'), in this context with quoted content
    and addressee, idiomatic English prefers 'I said to you.'
- source_word: אֲלֵכֶם
  chosen: to you
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus second masculine plural suffix.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when I said
  - namely
  lexicon: HALOT
  rationale: Infinitive construct of אמר introducing the content of the previous speech.
    Retained as 'saying' to reflect the Hebrew structure and emphasis, even though
    English could omit it.
- source_word: מְרַגְּלִים
  chosen: spies
  alternatives:
  - spies out
  - men spying
  lexicon: HALOT
  rationale: Participle from רגל in the sense of spying out land. 'Spies' is the clear
    and idiomatic English equivalent.
- source_word: אַתֶּם
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'Independent pronoun supplies the predicate structure with the participle:
    ''you are spies.'' English requires the copula for natural expression.'
