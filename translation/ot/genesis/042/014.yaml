  from: It is as I said to you, saying,
  to: 'It is just as I told you:'
  rationale: The current rendering is a very literal translation of the Hebrew structure `הוּא אֲשֶׁר דִּבַּרְתִּי ... לֵאמֹר`. This results in the slightly redundant and awkward English phrase 'I said... saying'. While defensible as a formal equivalent, a more optimal-equivalence rendering would smooth this Hebraism. Using a colon is a standard English way to represent the function of `לֵאמֹר` (introducing a quote). Additionally, 'just as I told you' is slightly more forceful and natural than 'as I said to you,' better capturing the emphatic `הוּא אֲשֶׁר` ('It is that which...').
