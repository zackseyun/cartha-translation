id: GEN.42.5
reference: Genesis 42:5
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לִ/שְׁבֹּ֖ר בְּ/ת֣וֹךְ הַ/בָּאִ֑ים כִּֽי
    הָיָ֥ה הָ/רָעָ֖ב בְּ/אֶ֥רֶץ כְּנָֽעַן־׃
translation:
  text: So the sons of Israel came to buy grain among those who were coming, because
    the famine was in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'to buy'; the Hebrew verb can stand without an explicit object,
      but in this famine context it refers to buying grain/food.
    reason: lexical_alternative
  - marker: b
    text: Or 'came to buy grain among those who were coming'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence. 'Came' is the natural
    English narrative rendering here, matching the perspective of arrival in Egypt.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - Israel's sons
  lexicon: HALOT
  rationale: The phrase is literally 'sons of Israel.' In this immediate context it
    refers specifically to Jacob's sons, not the nation generically, so the gender-accurate
    and contextually precise rendering is preferred over the traditional but broader
    'children of Israel.'
- source_word: לִשְׁבֹּר
  chosen: to buy grain
  alternatives:
  - to buy
  - to purchase grain
  lexicon: HALOT
  rationale: Though the verb's basic sense is 'buy,' in the Joseph narrative it is
    idiomatically used for buying grain/food in famine context. Supplying 'grain'
    in English makes the sense explicit without over-paraphrasing.
- source_word: בְּתוֹךְ הַבָּאִים
  chosen: among those who were coming
  alternatives:
  - in the midst of those coming
  - among the arrivals
  lexicon: HALOT
  rationale: בְּתוֹךְ indicates being in the midst of a group; הַבָּאִים is a participle,
    'those coming.' The phrase conveys that Jacob's sons came as part of the larger
    stream of people arriving to buy food.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for their coming with the others. 'Because' is
    clear modern English.
- source_word: הָיָה הָרָעָב
  chosen: the famine was
  alternatives:
  - there was famine
  lexicon: HALOT
  rationale: A straightforward existential/state clause. 'The famine was' preserves
    the definite article on רָעָב and links to the known famine in the narrative.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retains the concrete Hebrew expression 'land of Canaan,' which is both
    geographically and narratively significant.
