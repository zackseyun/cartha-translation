  from: came to buy grain among those who were coming
  to: came to buy grain along with the others who were coming
  rationale: The current rendering is a literal translation that results in the slightly
    repetitive English phrase 'came... among those who were coming.' While this reflects
    the Hebrew's use of the same root (בוא), a smoother phrasing like 'along with
    the others who were coming' or 'among the other arrivals' improves readability
    without sacrificing the meaning that they traveled as part of a larger group.
