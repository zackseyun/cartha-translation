id: GEN.42.33
reference: Genesis 42:33
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלֵ֗י/נוּ הָ/אִישׁ֙ אֲדֹנֵ֣י הָ/אָ֔רֶץ בְּ/זֹ֣את אֵדַ֔ע כִּ֥י
    כֵנִ֖ים אַתֶּ֑ם אֲחִי/כֶ֤ם הָֽ/אֶחָד֙ הַנִּ֣יחוּ אִתִּ֔/י וְ/אֶת רַעֲב֥וֹן בָּתֵּי/כֶ֖ם
    קְח֥וּ וָ/לֵֽכוּ־׃
translation:
  text: 'Then the man, the lord of the land, said to us, ‘By this I will know that
    you are honest: leave one of your brothers with me, take grain for the famine
    of your households, and go.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'take the famine of your households.' The sense is to
      take grain or provisions for the famine affecting their households.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ אֲדֹנֵי הָאָרֶץ
  chosen: the man, the lord of the land
  alternatives:
  - the man, lord of the land
  - the master of the land
  lexicon: HALOT
  rationale: הָאִישׁ is the ordinary noun 'man,' followed appositionally by אֲדֹנֵי
    הָאָרֶץ, 'lord of the land.' 'Lord' is preferred over 'master' here because it
    naturally conveys high authority in context without importing servile overtones.
- source_word: בְּזֹאת
  chosen: By this
  alternatives:
  - In this
  - By means of this
  lexicon: HALOT
  rationale: The preposition ב with the demonstrative points to the test or criterion
    by which the speaker will know their character. 'By this' is idiomatic and sufficiently
    formal.
- source_word: אֵדַע
  chosen: I will know
  alternatives:
  - I shall know
  - I know
  lexicon: HALOT
  rationale: Though morphologically yiqtol can be non-past or modal, in this direct-speech
    context it expresses future result contingent on the brothers' action. 'I will
    know' best fits the sense.
- source_word: כֵנִים
  chosen: honest
  alternatives:
  - truthful
  - upright
  - sincere
  lexicon: HALOT
  rationale: In the Joseph narrative כנים describes men who are straightforward and
    not spies. 'Honest' is natural modern English and captures the forensic-social
    sense better than the more abstract 'true'.
- source_word: אֲחִיכֶם הָאֶחָד
  chosen: one of your brothers
  alternatives:
  - your one brother
  - your brothers, the one
  lexicon: HALOT
  rationale: The Hebrew phrase identifies a single brother from among the group. English
    idiom requires 'one of your brothers' rather than a more wooden rendering.
- source_word: הַנִּיחוּ אִתִּי
  chosen: leave one of your brothers with me
  alternatives:
  - set down with me
  - let remain with me
  lexicon: HALOT
  rationale: הניח in the Hiphil here means to leave or allow to remain. 'Leave ...
    with me' is the clearest contextual rendering.
- source_word: רַעֲבוֹן בָּתֵּיכֶם
  chosen: grain for the famine of your households
  alternatives:
  - provisions for the hunger of your households
  - food for the famine in your houses
  lexicon: HALOT
  rationale: 'The direct object marker before רַעֲבוֹן creates an elliptical expression:
    take what is needed for the famine affecting your households. Since the immediate
    context is buying grain in Egypt, supplying ''grain'' in English makes the sense
    explicit without over-paraphrasing.'
- source_word: קְחוּ וָלֵכוּ
  chosen: take ... and go
  alternatives:
  - take ... and be gone
  - carry it and go
  lexicon: HALOT
  rationale: Two simple imperatives conclude the command. 'Take ... and go' preserves
    the straightforward force and sequence.
