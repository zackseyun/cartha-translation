id: GEN.42.19
reference: Genesis 42:19
source:
  edition: WLC
  text: אִם כֵּנִ֣ים אַתֶּ֔ם אֲחִי/כֶ֣ם אֶחָ֔ד יֵאָסֵ֖ר בְּ/בֵ֣ית מִשְׁמַרְ/כֶ֑ם וְ/אַתֶּם֙
    לְכ֣וּ הָבִ֔יאוּ שֶׁ֖בֶר רַעֲב֥וֹן בָּתֵּי/כֶֽם־׃
translation:
  text: If you are honest, let one of your brothers be confined in your place of custody,
    and you go, bring grain for the famine of your households.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you are truthful men.' The Hebrew adjective can be rendered more
      formally as 'true' or 'truthful.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the house of your custody.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּנִים
  chosen: honest
  alternatives:
  - truthful
  - upright
  lexicon: HALOT
  rationale: In this context Joseph is testing whether the brothers are speaking truthfully.
    'Honest' is idiomatic modern English and fits the forensic/interrogative setting
    better than the more wooden 'true men.'
- source_word: אֲחִיכֶם אֶחָד
  chosen: one of your brothers
  alternatives:
  - your one brother
  - one brother of yours
  lexicon: HALOT
  rationale: The Hebrew construction specifies a single member from among the brothers.
    'One of your brothers' is natural English and preserves the partitive sense.
- source_word: יֵאָסֵר
  chosen: be confined
  alternatives:
  - be bound
  - be imprisoned
  - be held
  lexicon: HALOT
  rationale: The Niphal of אסר can denote being bound or imprisoned. Given the following
    phrase about a house of custody, 'be confined' captures the custodial sense without
    over-specifying physical binding.
- source_word: בְּבֵית מִשְׁמַרְכֶם
  chosen: in your place of custody
  alternatives:
  - in your prison
  - in the house of your custody
  - in your guardhouse
  lexicon: HALOT
  rationale: Literally 'in the house of your custody/guard.' The suffix likely refers
    to the custody in which they are being held. 'Place of custody' is readable and
    reflects the institutional setting without importing a more formal prison system
    than the text requires.
- source_word: לְכוּ
  chosen: you go
  alternatives:
  - go
  - be on your way
  lexicon: HALOT
  rationale: The independent pronoun plus imperative creates emphasis and contrast
    with the one brother left behind. Rendering both pronoun and verb preserves that
    contrast.
- source_word: הָבִיאוּ
  chosen: bring
  alternatives:
  - carry
  - take in
  lexicon: HALOT
  rationale: 'Standard causative/transfer sense of בוא in Hiphil here: they are to
    bring provisions back home.'
- source_word: שֶׁבֶר
  chosen: grain
  alternatives:
  - food
  - provisions
  - rations
  lexicon: HALOT
  rationale: In the Joseph narrative שבר commonly refers to grain purchased during
    famine. 'Grain' is more specific and contextually appropriate than the broader
    'food.'
- source_word: רַעֲבוֹן
  chosen: for the famine
  alternatives:
  - for the hunger
  - against the famine
  lexicon: HALOT
  rationale: The noun denotes famine. The construct-like relation with שבר expresses
    grain needed because of the famine; 'for the famine' is concise and idiomatic
    in English.
- source_word: בָּתֵּיכֶם
  chosen: your households
  alternatives:
  - your houses
  - your families
  lexicon: HALOT
  rationale: Although literally 'your houses,' the sense here is the people dependent
    on them at home. 'Households' preserves the domestic scope better than the overly
    physical 'houses' and is less interpretive than simply 'families.'
