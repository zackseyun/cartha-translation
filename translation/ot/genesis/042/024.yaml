lexical_decisions:
- source_word: וַיִּסֹּב
  chosen: turned away
  alternatives:
  - turned around
  - withdrew
  lexicon: HALOT
  rationale: The verb סבב in this stem can denote turning or moving around. In context,
    Joseph removes himself from his brothers in order to weep privately, so 'turned
    away' captures both the physical motion and the relational withdrawal better than
    the more neutral 'turned around.'
- source_word: מֵעֲלֵיהֶם
  chosen: from them
  alternatives:
  - away from them
  - from beside them
  lexicon: HALOT
  rationale: Literally 'from upon/from over them,' but idiomatically it marks separation
    from their presence. 'From them' is natural English and preserves the sense of
    withdrawing from their company.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: '''Wept'' is the standard and more precise rendering for בכה in narrative
    contexts, avoiding the ambiguity of ''cried,'' which can suggest shouting.'
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: שוב commonly means return. 'Returned' is concise and fits the narrative
    sequence after his temporary withdrawal.
- source_word: וַיְדַבֵּר אֲלֵהֶם
  chosen: spoke to them
  alternatives:
  - talked with them
  lexicon: HALOT
  rationale: The piel of דבר regularly means 'speak.' 'Spoke to them' is the most
    direct and contextually appropriate rendering.
- source_word: וַיִּקַּח מֵאִתָּם אֶת שִׁמְעוֹן
  chosen: he took Simeon from among them
  alternatives:
  - he took Simeon from them
  lexicon: HALOT
  rationale: The phrase מֵאִתָּם indicates selection out of the group. 'From among
    them' makes explicit that Simeon was singled out from his brothers.
- source_word: וַיֶּאֱסֹר אֹתוֹ
  chosen: bound him
  alternatives:
  - tied him up
  - imprisoned him
  lexicon: HALOT
  rationale: אסר fundamentally means bind or tie. 'Bound him' preserves the concrete
    action; 'imprisoned him' is too interpretive, since the verse emphasizes the visible
    act of restraint.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: Literally 'to/for their eyes.' 'Before their eyes' is a natural English
    idiom that preserves the vividness and public nature of the act.
