  from: Then he turned away from them and wept. Then he returned to them and spoke
    to them, and he took Simeon from among them and bound him before their eyes.
  to: He turned away from them and wept. Then he returned to them and spoke to them,
    and he took Simeon from among them and bound him before their eyes.
  rationale: The current rendering combines four distinct actions into a single, long
    sentence connected by multiple 'and's. While grammatically permissible, it is
    stylistically heavy. The use of 'Then... Then...' in consecutive sentences is
    also slightly wooden. Removing the first 'Then' and rephrasing the second sentence
    to use a compound predicate ('returned... spoke... took... and bound') would create
    a more fluid and natural English narrative flow without losing the sequential
    sense of the Hebrew.
