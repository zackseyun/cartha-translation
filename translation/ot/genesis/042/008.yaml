id: GEN.42.8
reference: Genesis 42:8
source:
  edition: WLC
  text: וַ/יַּכֵּ֥ר יוֹסֵ֖ף אֶת אֶחָ֑י/ו וְ/הֵ֖ם לֹ֥א הִכִּרֻֽ/הוּ־׃
translation:
  text: Joseph recognized his brothers, but they did not recognize him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the same verb in both clauses: ''Joseph recognized his brothers,
      but they did not recognize him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּר
  chosen: recognized
  alternatives:
  - knew
  - identified
  lexicon: HALOT
  rationale: The Hifil of נכר here means to recognize or identify someone previously
    known. 'Recognized' is natural modern English and matches the narrative contrast
    with the brothers' failure to recognize Joseph.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: אֶת־אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: HALOT
  rationale: The noun אָח in the masculine plural with 3ms suffix refers specifically
    to Joseph's male siblings in this context. 'His brothers' is gender-accurate and
    contextually precise.
- source_word: וְהֵם
  chosen: but they
  alternatives:
  - and they
  rationale: Although ו can be rendered simply as 'and,' here the clause is adversative
    in sense, setting Joseph's recognition over against their non-recognition. 'But
    they' best conveys the Hebrew narrative contrast in idiomatic English.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  rationale: Rendered with English auxiliary negation for natural syntax.
- source_word: הִכִּרֻהוּ
  chosen: recognize him
  alternatives:
  - know him
  - identify him
  lexicon: HALOT
  rationale: Same verb נכר as earlier in the verse; 'recognize' preserves the lexical
    repetition and the narrative irony. The pronominal suffix is represented by 'him,'
    referring to Joseph.
