id: GEN.42.27
reference: Genesis 42:27
source:
  edition: WLC
  text: וַ/יִּפְתַּ֨ח הָ/אֶחָ֜ד אֶת שַׂקּ֗/וֹ לָ/תֵ֥ת מִסְפּ֛וֹא לַ/חֲמֹר֖/וֹ בַּ/מָּל֑וֹן
    וַ/יַּרְא֙ אֶת כַּסְפּ֔/וֹ וְ/הִנֵּה ה֖וּא בְּ/פִ֥י אַמְתַּחְתּֽ/וֹ־־־׃
translation:
  text: Then one of them opened his sack to give fodder to his donkey at the lodging
    place, and he saw his silver—and behold, it was in the mouth of his bag.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the opening of his bag' for 'in the mouth of his bag.'
    reason: lexical_alternative
  - marker: b
    text: '''Silver'' here refers to the money he had paid.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפְתַּח
  chosen: opened
  alternatives:
  - unfastened
  lexicon: HALOT
  rationale: Basic narrative verb from פתח, rendered with the straightforward English
    past tense 'opened.'
- source_word: הָאֶחָד
  chosen: one of them
  alternatives:
  - one
  lexicon: HALOT
  rationale: Literally 'the one,' but in context referring to one of the brothers.
    English idiom naturally supplies 'of them' to make the referent clear without
    adding new information.
- source_word: שַׂקּוֹ
  chosen: his sack
  alternatives:
  - his grain sack
  - his bag
  lexicon: HALOT
  rationale: שַׂק commonly denotes a sack. 'Sack' fits the transport context and distinguishes
    it from the later אַמְתַּחַת term.
- source_word: לָתֵת מִסְפּוֹא
  chosen: to give fodder
  alternatives:
  - to give feed
  - to give provender
  lexicon: HALOT
  rationale: מִסְפּוֹא refers to fodder/feed for animals. 'Fodder' is clear and suitably
    concrete in this travel context.
- source_word: לַחֲמֹרוֹ
  chosen: to his donkey
  alternatives:
  - for his donkey
  lexicon: HALOT
  rationale: The lamed marks the indirect object/purpose recipient. 'To his donkey'
    is natural with 'give fodder.'
- source_word: בַּמָּלוֹן
  chosen: at the lodging place
  alternatives:
  - at the inn
  - at the campsite
  - at the place where they lodged
  lexicon: HALOT
  rationale: מָלוֹן can mean lodging place or overnight stop. 'Lodging place' avoids
    implying a commercial inn while preserving the sense of a stopping place for the
    night.
- source_word: וַיַּרְא אֶת־כַּסְפּוֹ
  chosen: and he saw his silver
  alternatives:
  - and he saw his money
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver' and often functions as money. Here the narrative
    emphasis is on the returned payment, so 'silver' preserves the concrete Hebrew
    wording.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: Discourse particle marking surprise/discovery. 'Behold' preserves the
    suddenness and narrative force without paraphrase.
- source_word: הוּא
  chosen: it was
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronoun refers back to the silver. English requires the copular expression
    'it was' for a natural clause.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - at the opening of
  lexicon: HALOT
  rationale: Hebrew 'mouth' is an idiom for the opening of a container. The literal
    rendering is retained because it is intelligible in English and reflects the Hebrew
    imagery.
- source_word: אַמְתַּחְתּוֹ
  chosen: his bag
  alternatives:
  - his pack
  - his pouch
  lexicon: HALOT
  rationale: A container term distinct from שַׂק. 'Bag' is a natural English equivalent
    and allows the verse to preserve the distinction between the larger 'sack' and
    the bag/opening where the silver was found.
