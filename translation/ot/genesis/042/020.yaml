id: GEN.42.20
reference: Genesis 42:20
source:
  edition: WLC
  text: וְ/אֶת אֲחִי/כֶ֤ם הַ/קָּטֹן֙ תָּבִ֣יאוּ אֵלַ֔/י וְ/יֵאָמְנ֥וּ דִבְרֵי/כֶ֖ם
    וְ/לֹ֣א תָמ֑וּתוּ וַ/יַּעֲשׂוּ כֵֽן־־׃
translation:
  text: Then bring your youngest brother to me, so that your words may be verified
    and you will not die.” And they did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that your words may be confirmed' or 'believed.' The Hebrew verb
      can denote being established as true or being accepted as trustworthy; here
      the context favors verification.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִיכֶם הַקָּטֹן
  chosen: your youngest brother
  alternatives:
  - your little brother
  - your younger brother
  lexicon: HALOT
  rationale: הַקָּטֹן literally means 'the small/young one.' In sibling context, idiomatic
    English is 'youngest brother,' which best conveys birth-order sense in the narrative
    about Benjamin.
- source_word: תָּבִיאוּ אֵלַי
  chosen: bring ... to me
  alternatives:
  - bring ... here to me
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring.' 'To me' preserves אֵלַי directly without
    adding unnecessary emphasis.
- source_word: וְיֵאָמְנוּ
  chosen: so that ... may be verified
  alternatives:
  - and ... will be confirmed
  - and ... will be believed
  lexicon: HALOT
  rationale: Niphal of אמן here most naturally means 'be confirmed/verified' with
    דִבְרֵיכֶם as subject ('your words'). 'Verified' fits the investigative context
    of Joseph testing the brothers better than 'believed,' which could imply mere
    subjective acceptance.
- source_word: דִבְרֵיכֶם
  chosen: your words
  alternatives:
  - your statements
  - what you say
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct. 'Your words' is
    natural English and preserves the formal link to their prior claims.
- source_word: וְלֹא תָמֻתוּ
  chosen: and you will not die
  alternatives:
  - so that you may not die
  lexicon: HALOT
  rationale: The clause can be read as result or consequence following compliance
    with Joseph's demand. 'And you will not die' preserves the Hebrew coordination
    and the force of Joseph's assurance/threat.
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: And they did so
  alternatives:
  - And they did thus
  - And they did accordingly
  lexicon: HALOT
  rationale: Idiomatic English equivalent for the narrative formula, preserving the
    sense of compliance.
