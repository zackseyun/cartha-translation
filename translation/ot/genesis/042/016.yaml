id: GEN.42.16
reference: Genesis 42:16
source:
  edition: WLC
  text: שִׁלְח֨וּ מִ/כֶּ֣ם אֶחָד֮ וְ/יִקַּ֣ח אֶת אֲחִי/כֶם֒ וְ/אַתֶּם֙ הֵאָ֣סְר֔וּ
    וְ/יִבָּֽחֲנוּ֙ דִּבְרֵי/כֶ֔ם הַֽ/אֱמֶ֖ת אִתְּ/כֶ֑ם וְ/אִם לֹ֕א חֵ֣י פַרְעֹ֔ה
    כִּ֥י מְרַגְּלִ֖ים אַתֶּֽם־־׃
translation:
  text: Send one of you, and let him bring your brother, while you remain confined,
    so that your words may be tested whether the truth is with you. But if not, as
    Pharaoh lives, surely you are spies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and let him take your brother.' The Hebrew verb commonly
      means 'take,' but here it refers to fetching the brother and bringing him back.
    reason: lexical_alternative
  - marker: b
    text: Or 'and you be imprisoned' / 'and you remain under guard.' The Hebrew verb
      can denote being bound or held in custody.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'whether the truth is with you,' that is, whether you are telling
      the truth.
    reason: lexical_alternative
  - marker: d
    text: '''As Pharaoh lives'' is an oath formula invoking Pharaoh''s life.'
    reason: cultural_note
lexical_decisions:
- source_word: שִׁלְחוּ
  chosen: Send
  alternatives:
  - Send out
  - Dispatch
  lexicon: HALOT
  rationale: Qal imperative plural of שלח, a direct command. 'Send' is the most natural
    and sufficiently formal English equivalent here.
- source_word: מִכֶּם אֶחָד
  chosen: one of you
  alternatives:
  - one from among you
  lexicon: HALOT
  rationale: The preposition מן plus numeral indicates selection from the group. 'One
    of you' is idiomatic and precise.
- source_word: וְיִקַּח אֶת אֲחִיכֶם
  chosen: and let him bring your brother
  alternatives:
  - and let him take your brother
  - and he shall get your brother
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this context of fetching Benjamin
    from home, English 'bring' best conveys the intended motion toward Joseph without
    over-literal awkwardness.
- source_word: וְאַתֶּם הֵאָסְרוּ
  chosen: while you remain confined
  alternatives:
  - and you be bound
  - and you be imprisoned
  - and you remain under guard
  lexicon: HALOT
  rationale: The Niphal imperative/passive sense from אסר refers to being bound or
    imprisoned. 'Remain confined' captures the custodial sense in readable modern
    English. 'While' reflects the circumstantial relation to the first command.
- source_word: וְיִבָּחֲנוּ דִּבְרֵיכֶם
  chosen: so that your words may be tested
  alternatives:
  - and your words shall be examined
  - that your statements may be proved
  lexicon: HALOT
  rationale: בחן in the Niphal denotes being tested or examined. 'Your words' preserves
    the Hebrew expression better than the more interpretive 'your story,' while still
    making sense in English.
- source_word: הָאֱמֶת אִתְּכֶם
  chosen: whether the truth is with you
  alternatives:
  - whether you are truthful
  - whether truth is in your account
  lexicon: HALOT
  rationale: The Hebrew is literally 'the truth [is] with you.' This idiom concerns
    whether they are telling the truth. The chosen rendering preserves the Hebrew
    imagery while remaining intelligible.
- source_word: וְאִם לֹא
  chosen: But if not
  alternatives:
  - And if not
  - Otherwise if not
  lexicon: HALOT
  rationale: Introduces the contrary outcome if the test fails. 'But if not' fits
    the adversative force in English discourse.
- source_word: חֵי פַרְעֹה
  chosen: as Pharaoh lives
  alternatives:
  - by the life of Pharaoh
  - Pharaoh lives!
  lexicon: HALOT
  rationale: This is an oath formula. 'As Pharaoh lives' is the standard natural English
    equivalent and preserves the formality of the oath.
- source_word: כִּי מְרַגְּלִים אַתֶּם
  chosen: surely you are spies
  alternatives:
  - then you are spies
  - indeed you are spies
  lexicon: HALOT
  rationale: Here כי is asseverative/resultative in context, reinforcing Joseph's
    accusation. 'Surely' conveys the emphatic force without wooden literalism. 'Spies'
    is the straightforward rendering of מרגלים.
