id: GEN.42.31
reference: Genesis 42:31
source:
  edition: WLC
  text: וַ/נֹּ֥אמֶר אֵלָ֖י/ו כֵּנִ֣ים אֲנָ֑חְנוּ לֹ֥א הָיִ֖ינוּ מְרַגְּלִֽים׃
translation:
  text: And we said to him, ‘We are honest men; we have not been spies.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We are upright men.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we were not spies' / 'we were not spying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  chosen: And we said
  alternatives:
  - Then we said
  - So we said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר narrates the next event in sequence. 'And we said' preserves
    the straightforward narrative progression without overinterpreting the conjunction.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: Preposition אֶל with 3ms suffix is directly rendered 'to him.'
- source_word: כֵּנִים
  chosen: honest
  alternatives:
  - upright
  - truthful
  - sincere
  lexicon: HALOT
  rationale: כֵּנִים here describes the brothers as straightforward and trustworthy
    in contrast to the accusation of espionage. 'Honest' is idiomatic modern English
    and fits the self-defense context better than the more formal 'upright' or narrower
    'truthful.'
- source_word: אֲנָחְנוּ
  chosen: we
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis; English naturally includes 'we'
    as the subject. The emphasis is adequately conveyed by the clause structure.
- source_word: לֹא הָיִינוּ
  chosen: we have not been
  alternatives:
  - we were not
  lexicon: HALOT
  rationale: 'The negated היה with participle expresses a past durative/state: ''we
    were not being/acting as.'' In English, ''we have not been'' works naturally in
    reported speech recounting their prior claim, while preserving the sense of denied
    status or activity.'
- source_word: מְרַגְּלִים
  chosen: spies
  alternatives:
  - spying
  - espionage agents
  lexicon: HALOT
  rationale: Participle of רגל in this context denotes persons acting as spies. English
    idiom prefers the predicate noun 'spies' rather than the more wooden 'spying.'
