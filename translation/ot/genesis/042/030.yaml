id: GEN.42.30
reference: Genesis 42:30
source:
  edition: WLC
  text: דִּ֠בֶּר הָ/אִ֨ישׁ אֲדֹנֵ֥י הָ/אָ֛רֶץ אִתָּ֖/נוּ קָשׁ֑וֹת וַ/יִּתֵּ֣ן אֹתָ֔/נוּ
    כִּֽ/מְרַגְּלִ֖ים אֶת הָ/אָֽרֶץ־׃
translation:
  text: The man, the lord of the land, spoke harshly with us and treated us as spies
    of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke harsh things to us' or 'spoke severely with us.' The Hebrew phrase
      uses an adjective adverbially.
    reason: lexical_alternative
  - marker: b
    text: Or 'considered us spies of the land.' The Hebrew literally says 'gave us
      as spies of the land,' an idiom for regarding or treating someone as such.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - spoke to
  - talked with
  lexicon: HALOT
  rationale: Piel of דבר commonly means 'speak.' With אִתָּנוּ, English idiom can
    be 'spoke with us' or 'spoke to us.' 'Spoke' keeps the verbal force and allows
    the adverbial complement 'harshly' to modify it naturally.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש/man
  lexicon: HALOT
  rationale: Definite noun referring to Joseph as identified by his brothers. 'The
    man' preserves the narrative perspective of the speakers.
- source_word: אֲדֹנֵי הָאָרֶץ
  chosen: the lord of the land
  alternatives:
  - the master of the land
  - the ruler of the land
  lexicon: HALOT
  rationale: Construct phrase with אֲדֹנֵי functioning as a title of authority. 'Lord'
    best reflects the lexical sense of אדון here without over-specifying a formal
    office. Lowercase avoids confusion with the divine title.
- source_word: אִתָּנוּ
  chosen: with us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: The preposition is literally 'with us.' In English, 'spoke harshly with
    us' is understandable and fairly close to the Hebrew, though somewhat marked;
    it preserves the source preposition.
- source_word: קָשׁוֹת
  chosen: harshly
  alternatives:
  - harsh things
  - severely
  - roughly
  lexicon: HALOT
  rationale: Adjectival feminine plural used adverbially after דִּבֶּר. English adverb
    'harshly' conveys the sense idiomatically. 'Harsh things' is possible but less
    natural in context.
- source_word: וַיִּתֵּן אֹתָנוּ
  chosen: treated us as
  alternatives:
  - considered us
  - regarded us as
  - set us down as
  lexicon: HALOT
  rationale: נתן with object plus כ can mean 'regard/treat as.' 'Treated us as' is
    idiomatic English and fits the accusation context better than a wooden 'gave us
    as.'
- source_word: כִּמְרַגְּלִים
  chosen: as spies
  alternatives:
  - for spies
  - like spies
  lexicon: HALOT
  rationale: מרגלים denotes persons spying out a land. 'Spies' is the direct and natural
    rendering.
- source_word: אֶת הָאָרֶץ
  chosen: of the land
  alternatives:
  - the land
  lexicon: HALOT
  rationale: With 'spies,' English commonly uses 'spies of the land' or 'spies of
    the country' to express the object of reconnaissance. Retaining 'land' matches
    the Hebrew noun and the repeated phrase earlier in the verse.
