id: GEN.42.23
reference: Genesis 42:23
source:
  edition: WLC
  text: וְ/הֵם֙ לֹ֣א יָֽדְע֔וּ כִּ֥י שֹׁמֵ֖עַ יוֹסֵ֑ף כִּ֥י הַ/מֵּלִ֖יץ בֵּינֹתָֽ/ם׃
translation:
  text: But they did not know that Joseph understood, because the interpreter was
    between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Joseph was listening,' with the sense that he could understand what
      they were saying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  chosen: But they
  alternatives:
  - And they
  - Now they
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks a contrast with the preceding context;
    'But they' brings out the narrative contrast naturally in English while retaining
    the explicit subject.
- source_word: לֹא יָדְעוּ
  chosen: did not know
  alternatives:
  - were unaware
  - did not realize
  lexicon: HALOT
  rationale: ידע in the qatal here denotes lack of knowledge. 'Did not know' is the
    most direct and formally faithful rendering.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The first כִּי introduces the content of what they did not know, so 'that'
    best reflects its function.
- source_word: שֹׁמֵעַ
  chosen: understood
  alternatives:
  - was listening
  - heard
  lexicon: HALOT
  rationale: Although שמע literally means 'hear/listen,' in this context Joseph's
    brothers are speaking in his presence through an interpreter, and the point is
    that Joseph comprehended their speech. 'Understood' captures the idiomatic sense
    in context better than the more wooden 'heard.'
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: The second כִּי gives the reason they did not know Joseph understood
    them. 'Because' is the clearest modern English connector.
- source_word: הַמֵּלִיץ
  chosen: the interpreter
  alternatives:
  - the mediator
  - the spokesman
  - the translator
  lexicon: HALOT
  rationale: מליץ in this narrative context refers to the intermediary conveying speech
    between parties of different languages. 'Interpreter' is the most precise contextual
    rendering.
- source_word: בֵּינֹתָם
  chosen: between them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The prepositional phrase indicates the interpreter's mediating position
    between Joseph and his brothers. 'Between them' preserves that relational sense
    clearly.
