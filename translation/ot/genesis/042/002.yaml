id: GEN.42.2
reference: Genesis 42:2
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר הִנֵּ֣ה שָׁמַ֔עְתִּי כִּ֥י יֶשׁ שֶׁ֖בֶר בְּ/מִצְרָ֑יִם רְדוּ שָׁ֨מָּ/ה֙
    וְ/שִׁבְרוּ לָ֣/נוּ מִ/שָּׁ֔ם וְ/נִחְיֶ֖ה וְ/לֹ֥א נָמֽוּת־־־׃
translation:
  text: He said, “Look, I have heard that there is grain in Egypt. Go down there and
    buy some for us from there, so that we may live and not die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “buy grain for us from there.” The Hebrew verb in this context specifically
      refers to purchasing grain.
    reason: lexical_alternative
  - marker: b
    text: Or 'buy some for us from there'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse particle drawing attention to what follows. 'Look' preserves
    the immediacy in readable modern English better than archaic 'Behold.'
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Perfect verb expressing acquired information with present relevance;
    English present perfect fits the discourse naturally.
- source_word: שֶׁבֶר
  chosen: grain
  alternatives:
  - food
  - corn
  lexicon: HALOT
  rationale: In Genesis famine context, שֶׁבֶר refers to grain available for purchase,
    not merely 'breaking.' 'Grain' is more precise than broader 'food'; 'corn' is
    misleading in modern English.
- source_word: רְדוּ
  chosen: Go down
  alternatives:
  - Go
  lexicon: HALOT
  rationale: The verb literally means 'go down,' reflecting travel from Canaan to
    Egypt and preserving the Hebrew directional nuance.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Standard directional adverb; simple 'there' is idiomatic in English.
- source_word: וְשִׁבְרוּ
  chosen: buy some
  alternatives:
  - buy grain
  - purchase
  lexicon: HALOT
  rationale: From שׁבר in the commercial sense 'buy grain.' Because 'grain' has just
    been stated, 'buy some' avoids awkward repetition while retaining the sense. The
    object is implicit from context.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - for ourselves
  lexicon: HALOT
  rationale: Dative of advantage; 'for us' is the most natural rendering in Jacob's
    instruction to his sons.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - there
  lexicon: HALOT
  rationale: 'The preposition מִן is explicit and should be represented: they are
    to obtain grain from Egypt.'
- source_word: וְנִחְיֶה
  chosen: so that we may live
  alternatives:
  - and we will live
  - that we may stay alive
  lexicon: HALOT
  rationale: Cohortative/imperfect expressing purpose or desired result. 'So that
    we may live' captures the volitional/resultative force in context.
- source_word: וְלֹא נָמוּת
  chosen: and not die
  alternatives:
  - so that we do not die
  lexicon: HALOT
  rationale: Paired with 'we may live' as the negative counterpart. The simple coordinate
    English preserves the Hebrew balance and urgency.
