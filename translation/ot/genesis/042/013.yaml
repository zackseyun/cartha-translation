id: GEN.42.13
reference: Genesis 42:13
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ שְׁנֵ֣ים עָשָׂר֩ עֲבָדֶ֨י/ךָ אַחִ֧ים אֲנַ֛חְנוּ בְּנֵ֥י אִישׁ
    אֶחָ֖ד בְּ/אֶ֣רֶץ כְּנָ֑עַן וְ/הִנֵּ֨ה הַ/קָּטֹ֤ן אֶת אָבִ֨י/נוּ֙ הַ/יּ֔וֹם וְ/הָ/אֶחָ֖ד
    אֵינֶֽ/נּוּ׀־־׃
translation:
  text: And they said, “We, your servants, are twelve brothers, sons of one man in
    the land of Canaan. And look, the youngest is with our father today, and one is
    no more.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and one is not,'' a euphemistic expression that can mean ''is
      gone'' or imply death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative progression; 'And they said' preserves the
    Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the brothers are speaking
    deferentially to an Egyptian ruler, using courtly self-abasement rather than describing
    literal bonded status. 'Your servants' best fits the discourse context.
- source_word: אַחִים אֲנַחְנוּ
  chosen: we ... are twelve brothers
  alternatives:
  - we are brothers, twelve in number
  lexicon: HALOT
  rationale: The Hebrew apposition identifies them as brothers and gives their number.
    English idiom is smoother with 'we ... are twelve brothers' while preserving the
    claim.
- source_word: בְּנֵי אִישׁ אֶחָד
  chosen: sons of one man
  alternatives:
  - the sons of one man
  - children of one man
  lexicon: HALOT
  rationale: Formal filial language is retained. 'Sons' matches the masculine Hebrew
    and the specific referent of Jacob's male children.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retains the explicit noun 'land,' which is present in Hebrew and natural
    in English.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - And see
  lexicon: HALOT
  rationale: Introduces the explanatory update with a vivid discourse marker. 'And
    look' is readable modern English while preserving the presentational force of
    הִנֵּה.
- source_word: הַקָּטֹן
  chosen: the youngest
  alternatives:
  - the younger one
  - the little one
  lexicon: HALOT
  rationale: In context this refers to the youngest brother, not merely a small child.
    'The youngest' conveys the familial comparative sense idiomatically.
- source_word: אֶת אָבִינוּ
  chosen: is with our father
  alternatives:
  - is beside our father
  lexicon: HALOT
  rationale: The particle אֶת here marks accompaniment, not a direct object. 'With
    our father' is the natural English rendering.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - at this time
  - now
  lexicon: HALOT
  rationale: Direct temporal adverbial; 'today' is the simplest and most precise rendering.
- source_word: וְהָאֶחָד אֵינֶנּוּ
  chosen: and one is no more
  alternatives:
  - and one is not
  - and one is gone
  - and one is no longer alive
  lexicon: HALOT
  rationale: The Hebrew literally says 'one is not,' an idiom used euphemistically
    for someone absent or presumed dead. 'Is no more' preserves the euphemistic ambiguity
    better than the more explicit 'is no longer alive.'
