theological_decisions:
- issue: Gendered kinship language
  chosen_reading: sons of one man
  alternative_readings:
  - children of one man
  rationale: The Hebrew is specifically masculine and refers to Jacob's male offspring
    in this narrative. Per translation philosophy, gender-accurate language is preferred
    over neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Ambiguity of Joseph's status in 'one is not'
  chosen_reading: one is no more
  alternative_readings:
  - one is not
  - one is no longer alive
  rationale: The brothers speak euphemistically and from their perspective imply Joseph's
    loss without formally stating death. The translation preserves that tension rather
    than resolving it into a doctrinally or narratively stronger claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
