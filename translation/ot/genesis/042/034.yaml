id: GEN.42.34
reference: Genesis 42:34
source:
  edition: WLC
  text: וְ֠/הָבִיאוּ אֶת אֲחִי/כֶ֣ם הַ/קָּטֹן֮ אֵלַ/י֒ וְ/אֵֽדְעָ֗ה כִּ֣י לֹ֤א מְרַגְּלִים֙
    אַתֶּ֔ם כִּ֥י כֵנִ֖ים אַתֶּ֑ם אֶת אֲחִי/כֶם֙ אֶתֵּ֣ן לָ/כֶ֔ם וְ/אֶת הָ/אָ֖רֶץ
    תִּסְחָֽרוּ־־־׃
translation:
  text: Bring your youngest brother to me, so that I may know that you are not spies,
    but that you are honest men. Then I will give your brother back to you, and you
    may trade in the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and you may move about in the land.' The Hebrew verb can be understood
      more broadly as traveling around, though its commercial sense ('trade/do business')
      best fits the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָבִיאוּ
  chosen: Bring
  alternatives:
  - and bring
  - you must bring
  lexicon: HALOT
  rationale: Hiphil imperative/volitive sense from בוא in direct speech; concise English
    imperative fits the command.
- source_word: אֲחִיכֶם הַקָּטֹן
  chosen: your youngest brother
  alternatives:
  - your little brother
  - your younger brother
  lexicon: HALOT
  rationale: הַקָּטֹן literally 'the small/young one'; in sibling context 'youngest
    brother' is the most natural and precise English rendering.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - here to me
  lexicon: HALOT
  rationale: Simple directional prepositional phrase with 1cs suffix.
- source_word: וְאֵדְעָה
  chosen: so that I may know
  alternatives:
  - and I will know
  - then I shall know
  lexicon: HALOT
  rationale: Cohortative expresses intended result/purpose after the command; English
    purpose clause communicates the discourse flow better than a wooden coordination.
- source_word: כִּי לֹא מְרַגְּלִים אַתֶּם
  chosen: that you are not spies
  alternatives:
  - that you are not spying
  - that you are not scouts
  lexicon: HALOT
  rationale: מְרַגְּלִים is a participial noun/adjective meaning 'spies'; predicate
    nominative is the natural English equivalent in this context.
- source_word: כִּי כֵנִים אַתֶּם
  chosen: but that you are honest men
  alternatives:
  - but that you are truthful
  - but that you are upright men
  - for you are honest
  lexicon: HALOT
  rationale: כֵנִים denotes honesty/reliability. 'Honest men' preserves the masculine
    plural and the contrast with 'spies' in idiomatic English.
- source_word: אֶת אֲחִיכֶם אֶתֵּן לָכֶם
  chosen: Then I will give your brother back to you
  alternatives:
  - I will give your brother to you
  - I will release your brother to you
  lexicon: HALOT
  rationale: The context is the detained brother; 'give ... back' makes the implied
    restoration explicit in natural English without adding new content.
- source_word: וְאֶת הָאָרֶץ תִּסְחָרוּ
  chosen: and you may trade in the land
  alternatives:
  - and you may travel about in the land
  - and you may do business in the land
  - and you may move freely about the land
  lexicon: HALOT
  rationale: סחר commonly relates to trade/commerce. In this famine narrative, permission
    to conduct business in the land best fits the lexical sense and context, rather
    than merely 'travel about.'
