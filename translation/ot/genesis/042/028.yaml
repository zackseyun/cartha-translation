id: GEN.42.28
reference: Genesis 42:28
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֶל אֶחָי/ו֙ הוּשַׁ֣ב כַּסְפִּ֔/י וְ/גַ֖ם הִנֵּ֣ה בְ/אַמְתַּחְתִּ֑/י
    וַ/יֵּצֵ֣א לִבָּ֗/ם וַ/יֶּֽחֶרְד֞וּ אִ֤ישׁ אֶל אָחִי/ו֙ לֵ/אמֹ֔ר מַה זֹּ֛את עָשָׂ֥ה
    אֱלֹהִ֖ים לָֽ/נוּ־־־׃
translation:
  text: He said to his brothers, “My silver has been returned, and look, it is even
    in my sack!” Then their hearts failed them, and they trembled, each man to his
    brother, saying, “What is this that God has done to us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “their courage left them”; literally, “their heart went out.”
    reason: lexical_alternative
  - marker: b
    text: Or, “to one another.” Literally, “each man to his brother.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּשַׁב
  chosen: has been returned
  alternatives:
  - was returned
  - has been restored
  lexicon: HALOT
  rationale: Hophal of שוב indicates a passive/causative sense, 'was caused to return'
    or 'was returned.' Present perfect English fits the direct speech reporting a
    discovered state.
- source_word: כַּסְפִּי
  chosen: my silver
  alternatives:
  - my money
  lexicon: HALOT
  rationale: Hebrew כסף literally means 'silver' and often by extension 'money.' Here
    'silver' preserves the concrete wording and historical setting without obscuring
    the economic sense.
- source_word: אַמְתַּחַת
  chosen: sack
  alternatives:
  - bag
  - pack
  lexicon: HALOT
  rationale: Refers to a container for grain or provisions. 'Sack' best matches the
    ancient transport context and common English usage in the Joseph narrative.
- source_word: וְגַם הִנֵּה
  chosen: and look, it is even
  alternatives:
  - and indeed it is
  - and behold, it is also
  lexicon: HALOT
  rationale: The combination adds emphasis and surprise. 'And look, it is even' captures
    both the deictic force of הִנֵּה and the additive/emphatic force of גַם in natural
    English.
- source_word: וַיֵּצֵא לִבָּם
  chosen: their hearts failed them
  alternatives:
  - their heart went out
  - their courage left them
  lexicon: HALOT
  rationale: Literally 'their heart went out.' In context this idiom expresses loss
    of courage or emotional collapse. 'Their hearts failed them' is a natural English
    equivalent that preserves the heart imagery.
- source_word: וַיֶּחֶרְדוּ
  chosen: they trembled
  alternatives:
  - they were terrified
  - they shuddered
  lexicon: HALOT
  rationale: חרד denotes trembling with fear or anxiety. 'They trembled' keeps the
    physical and emotional force without overinterpreting.
- source_word: אִישׁ אֶל אָחִיו
  chosen: each man to his brother
  alternatives:
  - to one another
  - each to his brother
  lexicon: HALOT
  rationale: The Hebrew is distributive and masculine-singular in form. This rendering
    preserves the source's gendered and relational wording in line with the project's
    gender-accurate policy, while still being understandable.
- source_word: מַה זֹּאת
  chosen: What is this
  alternatives:
  - What is this thing
  - Why has this happened
  lexicon: HALOT
  rationale: A direct exclamatory question. 'What is this' is the most straightforward
    rendering and avoids paraphrasing into an explanatory 'why' question.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context אֱלֹהִים refers to the true God rather than
    'gods' or a generic deity. Singular 'God' is the natural English rendering.
