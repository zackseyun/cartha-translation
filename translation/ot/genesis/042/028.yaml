theological_decisions:
- issue: Rendering of אֱלֹהִים in the brothers' fearful question
  chosen_reading: God
  alternative_readings:
  - god
  - gods
  rationale: Although the form is morphologically plural, the syntax and narrative
    context support a singular reference to deity. Rendering 'God' preserves the brothers'
    recognition of divine agency without importing a fuller theological explanation
    than the text states.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Gendered relational phrase אִישׁ אֶל אָחִיו
  chosen_reading: each man to his brother
  alternative_readings:
  - to one another
  rationale: The source text uses masculine singular forms with distributive force.
    Per the gender-accurate policy, the translation preserves the male sibling language
    rather than neutralizing it.
  doctrine_reference: 'Translation philosophy #4'
