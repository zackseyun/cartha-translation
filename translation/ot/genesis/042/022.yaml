id: GEN.42.22
reference: Genesis 42:22
source:
  edition: WLC
  text: וַ/יַּעַן֩ רְאוּבֵ֨ן אֹתָ֜/ם לֵ/אמֹ֗ר הֲ/לוֹא֩ אָמַ֨רְתִּי אֲלֵי/כֶ֧ם לֵ/אמֹ֛ר
    אַל תֶּחֶטְא֥וּ בַ/יֶּ֖לֶד וְ/לֹ֣א שְׁמַעְתֶּ֑ם וְ/גַם דָּמ֖/וֹ הִנֵּ֥ה נִדְרָֽשׁ׀־־׃
translation:
  text: Then Reuben answered them, saying, “Did I not tell you, ‘Do not sin against
    the boy’? But you did not listen. And now, look, his blood is being required.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “his blood is being demanded,” that is, accountability for his bloodshed
      is now being exacted.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying in dialogue; 'answered' fits idiomatic
    English and preserves the conversational force.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Retained as 'saying' to reflect the Hebrew speech-introduction formula
    without overloading the English with repeated finite verbs.
- source_word: הֲלוֹא
  chosen: Did I not
  alternatives:
  - Surely I
  - Was it not that I
  lexicon: HALOT
  rationale: Captures the rhetorical question expecting agreement and introduces Reuben's
    rebuke naturally in English.
- source_word: אַל תֶּחֶטְאוּ
  chosen: Do not sin
  alternatives:
  - Do not do wrong
  - Do not offend
  lexicon: HALOT
  rationale: The verb חטא fundamentally means 'to sin'; retaining 'sin' preserves
    the moral and theological weight of Reuben's warning rather than reducing it to
    generic wrongdoing.
- source_word: בַיֶּלֶד
  chosen: against the boy
  alternatives:
  - against the child
  - with regard to the boy
  lexicon: HALOT
  rationale: With חטא plus ב, the sense is sinning against someone. 'Boy' fits Joseph's
    remembered status from the brothers' perspective and is idiomatic in context.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: But you did not listen
  alternatives:
  - and you did not listen
  - but you did not obey
  lexicon: HALOT
  rationale: '''Listen'' is the direct lexical sense of שמע here; ''But'' brings out
    the adversative force in context, contrasting Reuben''s warning with their refusal.'
- source_word: וְגַם
  chosen: And now
  alternatives:
  - And also
  - So now
  lexicon: HALOT
  rationale: The phrase marks escalation from past warning to present consequence.
    'And now' communicates the discourse movement more naturally than a wooden 'and
    also.'
- source_word: דָּמוֹ
  chosen: his blood
  alternatives:
  - his lifeblood
  - bloodguilt for him
  lexicon: HALOT
  rationale: '''His blood'' preserves the Hebrew idiom, which in context refers to
    accountability for Joseph''s apparent death or bloodshed.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  - now
  lexicon: HALOT
  rationale: Used to draw attention to the present reality. 'Look' is readable modern
    English and preserves the deictic emphasis.
- source_word: נִדְרָשׁ
  chosen: is being required
  alternatives:
  - is being demanded
  - is being called to account
  - is required of us
  lexicon: HALOT
  rationale: The Niphal of דרש here conveys that blood is being sought or required
    in the sense of accountability being exacted. 'Is being required' preserves the
    passive form and the judicial nuance without over-interpreting the implied agent.
