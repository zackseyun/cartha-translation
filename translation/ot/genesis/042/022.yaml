theological_decisions:
- issue: Whether to make divine agency explicit in the requital formula 'his blood
    is being required'
  chosen_reading: Kept the passive without naming God
  alternative_readings:
  - his blood is being required by God
  - we are being held accountable for his blood
  rationale: The Hebrew uses a passive construction and leaves the agent unstated.
    In context the brothers likely imply divine justice, but the text itself preserves
    that implication rather than stating it directly. Following the translation philosophy,
    the draft preserves the theological tension and does not import an explicit subject.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
