id: GEN.42.4
reference: Genesis 42:4
source:
  edition: WLC
  text: וְ/אֶת בִּנְיָמִין֙ אֲחִ֣י יוֹסֵ֔ף לֹא שָׁלַ֥ח יַעֲקֹ֖ב אֶת אֶחָ֑י/ו כִּ֣י
    אָמַ֔ר פֶּן יִקְרָאֶ֖/נּוּ אָסֽוֹן־־־־׃
translation:
  text: But Jacob did not send Benjamin, Joseph’s brother, with his brothers, for
    he said, “Lest harm happen to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lest disaster befall him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: 'The conjunction links this verse to the previous one, but in English
    ''But'' better reflects the contrast: although the other sons went, Benjamin did
    not. The object marker itself is not translated.'
- source_word: בִּנְיָמִין
  chosen: Benjamin
  rationale: Standard English transliteration of the personal name.
- source_word: אֲחִי יוֹסֵף
  chosen: Joseph’s brother
  alternatives:
  - the brother of Joseph
  lexicon: HALOT
  rationale: Construct chain identifying Benjamin specifically in relation to Joseph.
    The possessive form is natural modern English and preserves the familial identification.
- source_word: לֹא שָׁלַח
  chosen: did not send
  alternatives:
  - did not let go
  - did not dispatch
  lexicon: HALOT
  rationale: שׁלח commonly means 'send.' The English auxiliary construction reflects
    the Hebrew perfect in narrative prose.
- source_word: אֶת אֶחָיו
  chosen: with his brothers
  alternatives:
  - his brothers
  - along with his brothers
  lexicon: HALOT
  rationale: The direct object marker plus 'his brothers' could woodenly be rendered
    'his brothers,' but English idiom requires making explicit that Benjamin was not
    sent together with them. 'With his brothers' captures the sense without over-paraphrasing.
- source_word: כִּי אָמַר
  chosen: for he said
  alternatives:
  - because he said
  - for he thought
  lexicon: HALOT
  rationale: כִּי here gives the reason. 'For he said' is a straightforward rendering
    of the narrative explanation. 'Thought' would be interpretive beyond the explicit
    verb.
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - otherwise
  - in case
  lexicon: HALOT
  rationale: פֶּן introduces a feared possibility. 'Lest' is concise and accurate,
    though slightly elevated; it remains readable here and preserves the nuance of
    apprehension.
- source_word: יִקְרָאֶנּוּ
  chosen: happen to him
  alternatives:
  - befall him
  - come upon him
  lexicon: HALOT
  rationale: With אָסוֹן as subject/complement, the idiom means that harm might happen
    or befall him. 'Happen to him' is natural modern English.
- source_word: אָסוֹן
  chosen: harm
  alternatives:
  - disaster
  - misfortune
  - injury
  lexicon: HALOT
  rationale: אָסוֹן denotes serious harm, disaster, or misfortune. 'Harm' is broad
    enough to preserve the father's fear without overstating a specific kind of calamity.
    'Disaster' is possible but sounds slightly more abstract in English.
