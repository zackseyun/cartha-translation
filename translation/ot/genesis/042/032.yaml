id: GEN.42.32
reference: Genesis 42:32
source:
  edition: WLC
  text: שְׁנֵים עָשָׂ֥ר אֲנַ֛חְנוּ אַחִ֖ים בְּנֵ֣י אָבִ֑י/נוּ הָ/אֶחָ֣ד אֵינֶ֔/נּוּ
    וְ/הַ/קָּטֹ֥ן הַ/יּ֛וֹם אֶת אָבִ֖י/נוּ בְּ/אֶ֥רֶץ כְּנָֽעַן־־׃
translation:
  text: We are twelve brothers, sons of our father. One is no more, and the youngest
    is today with our father in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'one is not.' The Hebrew idiom can denote that a person
      is missing, gone, or presumed dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - twelve in number
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly as 'twelve.' The fuller English
    phrase 'twelve in number' is unnecessary and less natural.
- source_word: אֲנַחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: The independent pronoun is expressed in idiomatic English as 'we are'
    to complete the verbless clause.
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: HALOT
  rationale: The Hebrew denotes male siblings here in a literal family context, so
    'brothers' is the most accurate rendering.
- source_word: בְּנֵי אָבִינוּ
  chosen: sons of our father
  alternatives:
  - our father's sons
  lexicon: HALOT
  rationale: This appositional phrase clarifies the family relationship. 'Sons of
    our father' preserves the Hebrew structure and emphasis.
- source_word: הָאֶחָד
  chosen: one
  alternatives:
  - the one
  lexicon: HALOT
  rationale: Used substantivally to refer to one brother. English idiom prefers 'one'
    rather than the more wooden 'the one.'
- source_word: אֵינֶנּוּ
  chosen: is no more
  alternatives:
  - is not
  - is gone
  lexicon: HALOT
  rationale: In this context the idiom refers to the absent/lost brother (Joseph,
    presumed dead by the speakers). 'Is no more' conveys the idiomatic sense better
    than the overly literal 'is not,' while avoiding overstatement beyond the speakers'
    perspective.
- source_word: וְהַקָּטֹן
  chosen: the youngest
  alternatives:
  - the younger one
  - the little one
  lexicon: HALOT
  rationale: Though literally 'the small/young one,' in a sibling list it idiomatically
    means 'the youngest.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - at present
  - now
  lexicon: HALOT
  rationale: Temporal adverb rendered directly as 'today,' preserving the Hebrew wording
    and immediacy.
- source_word: אֶת אָבִינוּ
  chosen: with our father
  alternatives:
  - beside our father
  lexicon: HALOT
  rationale: Here אֵת functions in the sense of accompaniment, not as a direct-object
    marker. 'With our father' is the natural and accurate rendering.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The construct phrase explicitly includes 'land,' and retaining it preserves
    the Hebrew expression without sounding unnatural.
