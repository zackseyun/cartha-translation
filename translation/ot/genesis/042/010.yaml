id: GEN.42.10
reference: Genesis 42:10
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ אֵלָ֖י/ו לֹ֣א אֲדֹנִ֑/י וַ/עֲבָדֶ֥י/ךָ בָּ֖אוּ לִ/שְׁבָּר אֹֽכֶל־׃
translation:
  text: But they said to him, “No, my lord; your servants have come to buy food.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to buy grain.” The Hebrew says “to buy food,” though in the famine context
      the food in view is likely grain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: But they said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can render this as
    either 'and' or 'but'; 'but' fits the immediate contrast to Joseph's accusation
    in the preceding verse and reads naturally while preserving the discourse function.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Standard directional use of אֶל with pronominal suffix, indicating the
    brothers' reply is addressed to Joseph.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - Not so
  lexicon: HALOT
  rationale: Here the negative functions as an emphatic denial in direct speech. 'No'
    is idiomatic modern English; 'Not so' is more formal/traditional but less natural.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: As a respectful form of address to an Egyptian official, אֲדֹנִי denotes
    deference. 'My lord' preserves the social hierarchy and the brothers' submissive
    tone better than the flatter 'sir.' 'My master' is possible but can sound overly
    servile in English.
- source_word: וַעֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Though עֶבֶד can denote slave or servant, in this courtly self-reference
    the emphasis is deferential address rather than bonded status. 'Your servants'
    is the most natural and contextually appropriate rendering.
- source_word: בָּאוּ
  chosen: have come
  alternatives:
  - came
  lexicon: HALOT
  rationale: 'The perfect here reports the purpose of their arrival with present relevance
    in the dialogue. English present perfect sounds natural in direct speech: they
    are here because they have come for this purpose.'
- source_word: לִשְׁבָּר
  chosen: to buy
  alternatives:
  - to buy grain
  lexicon: HALOT
  rationale: From שׁבר in this context of famine and Egyptian provisioning, the sense
    is purchasing grain/food. Since the object follows, 'to buy' is sufficient in
    the main text.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - grain
  lexicon: HALOT
  rationale: אֹכֶל broadly means food. In the immediate famine context it likely refers
    specifically to grain, but the Hebrew term itself is broader, so 'food' best preserves
    the wording without over-specifying.
