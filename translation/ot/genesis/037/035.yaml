theological_decisions:
- issue: Rendering of שְׁאוֹל (Sheol)
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term carries more semantic weight than a mere burial place and should not be prematurely reduced to 'grave.' Transliteration preserves the Old Testament concept and avoids importing a more developed doctrine of the afterlife than the text itself states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:19:43Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/037/035.json
  category: awkward_english
  tier: 1
  from: I will go down mourning to Sheol to my son
  to: I will go down to Sheol to my son, mourning
  rationale: The current rendering contains the awkward sequence of prepositional phrases 'to Sheol to my son.' While the meaning is discernible, the phrasing is unnatural in English. The Hebrew word order is 'to my son, mourning, to Sheol' (אֶל־בְּנִי אָבֵל שְׁאֹלָה). Reordering the adverbial 'mourning' to the end of the clause, as in the suggested rewrite, resolves the awkwardness by grouping the locative phrases and creates more natural English prose, a common strategy in other formal translations (e.g., ESV).
