id: GEN.37.35
reference: Genesis 37:35
source:
  edition: WLC
  text: וַ/יָּקֻמוּ֩ כָל בָּנָ֨י/ו וְ/כָל בְּנֹתָ֜י/ו לְ/נַחֲמ֗/וֹ וַ/יְמָאֵן֙ לְ/הִתְנַחֵ֔ם וַ/יֹּ֕אמֶר כִּֽי אֵרֵ֧ד אֶל בְּנִ֛/י אָבֵ֖ל שְׁאֹ֑לָ/ה וַ/יֵּ֥בְךְּ אֹת֖/וֹ אָבִֽי/ו־־־־׃
translation:
  text: Then all his sons and all his daughters rose up to comfort him, but he refused to be comforted and said, “For I will go down to Sheol to my son, mourning.” So his father wept for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the grave”; Hebrew “to Sheol.”
    reason: lexical_alternative
  - marker: b
    text: Or 'I will go down mourning to Sheol to my son'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: rose up
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, a common narrative verb meaning to arise/stand up. 'Rose up' preserves the narrative movement without overinterpreting the action.
- source_word: כָל בָּנָיו וְכָל בְּנֹתָיו
  chosen: all his sons and all his daughters
  alternatives:
  - all his children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters. Per gender-accurate philosophy, the translation preserves the marked pair rather than collapsing to the generic 'children'.
- source_word: לְנַחֲמוֹ
  chosen: to comfort him
  alternatives:
  - to console him
  lexicon: HALOT
  rationale: The piel infinitive of נחם here denotes offering comfort after bereavement. 'Comfort' is the most natural modern English equivalent and matches the following reflexive form.
- source_word: וַיְמָאֵן
  chosen: he refused
  alternatives:
  - he was unwilling
  lexicon: HALOT
  rationale: מאן expresses refusal or unwillingness. 'Refused' best captures the active resistance in context.
- source_word: לְהִתְנַחֵם
  chosen: to be comforted
  alternatives:
  - to accept comfort
  - to console himself
  lexicon: HALOT
  rationale: The hitpael of נחם can be reflexive/passive in sense. In this mourning context, 'to be comforted' is idiomatic English and fits the construction after 'refused.'
- source_word: כִּי
  chosen: For
  alternatives:
  - surely
  - indeed
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the content and rationale of Jacob's refusal. 'For' naturally conveys the explanatory force in direct speech.
- source_word: אֵרֵד
  chosen: I will go down
  alternatives:
  - I shall go down
  lexicon: HALOT
  rationale: ירד in first person imperfect is retained literally. 'Go down' also coheres with the following destination, Sheol.
- source_word: אֶל־בְּנִי
  chosen: to my son
  alternatives:
  - to my son’s place
  - to my son
  lexicon: HALOT
  rationale: The preposition אֶל normally means 'to/toward.' In context Jacob speaks of descending to where his son is presumed to be. 'To my son' preserves the Hebrew wording without adding explanatory material to the main text.
- source_word: אָבֵל
  chosen: mourning
  alternatives:
  - as a mourner
  - in mourning
  - grieving
  lexicon: HALOT
  rationale: The adjective/noun conveys a state of mourning. 'Mourning' works adverbially in English after 'go down' and preserves the terseness of the Hebrew.
- source_word: שְׁאֹלָה
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: HALOT
  rationale: Sheol is a significant Hebrew term for the underworld/realm of the dead. Following original-language primacy, it is transliterated here rather than flattened to 'grave,' while an alternative is preserved in a footnote.
- source_word: וַיֵּבְךְּ אֹתוֹ אָבִיו
  chosen: So his father wept for him
  alternatives:
  - And his father wept for him
  lexicon: HALOT
  rationale: 'The clause is straightforward: subject ''his father'' with object ''him.'' ''So'' gives smooth narrative progression in English while preserving the sense of the waw-consecutive.'
