id: GEN.37.27
reference: Genesis 37:27
source:
  edition: WLC
  text: לְכ֞וּ וְ/נִמְכְּרֶ֣/נּוּ לַ/יִּשְׁמְעֵאלִ֗ים וְ/יָדֵ֨/נוּ֙ אַל תְּהִי ב֔/וֹ
    כִּֽי אָחִ֥י/נוּ בְשָׂרֵ֖/נוּ ה֑וּא וַֽ/יִּשְׁמְע֖וּ אֶחָֽי/ו־־־׃
translation:
  text: Come, let us sell him to the Ishmaelites, and let our hand not be upon him,
    for he is our brother, our own flesh.” And his brothers listened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''let our hand not be upon him,'' an idiom meaning not to harm
      him directly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our own kin' for 'our own flesh.'
    reason: lexical_alternative
  - marker: c
    text: '''Listened'' may also be understood as ''agreed'' or ''heeded'' in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Come now
  - Come on
  lexicon: HALOT
  rationale: Imperative plural of הלך used idiomatically to urge action. 'Come' is
    the natural concise English equivalent in deliberative speech.
- source_word: וְנִמְכְּרֶנּוּ
  chosen: let us sell him
  alternatives:
  - and we will sell him
  - let us sell him off
  lexicon: HALOT
  rationale: Cohortative first person plural with prefixed conjunction expresses proposal/exhortation.
    'Let us sell him' best captures the volitional force.
- source_word: לַיִּשְׁמְעֵאלִים
  chosen: to the Ishmaelites
  alternatives:
  - to Ishmaelites
  lexicon: HALOT
  rationale: Proper ethnonym with preposition and article; standard English uses 'the
    Ishmaelites' for the people group.
- source_word: וְיָדֵנוּ אַל תְּהִי בוֹ
  chosen: and let our hand not be upon him
  alternatives:
  - and do not let our hand be against him
  - but let us not lay a hand on him
  lexicon: HALOT
  rationale: Literally 'and our hand, let it not be on him.' The idiom means refraining
    from direct violence. I preserved the Hebrew imagery with readable English rather
    than replacing it entirely with the idiomatic 'lay a hand on him.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Judah's proposal. 'For' fits the discourse
    flow in English.
- source_word: אָחִינוּ
  chosen: our brother
  lexicon: HALOT
  rationale: Straightforward kinship term; no reason to weaken or generalize it.
- source_word: בְשָׂרֵנוּ
  chosen: our own flesh
  alternatives:
  - our flesh
  - our own kin
  lexicon: HALOT
  rationale: בשר here refers to blood relation/kinship. 'Our own flesh' preserves
    the concrete Hebrew expression while making the familial force clear in English.
- source_word: וַיִּשְׁמְעוּ אֶחָיו
  chosen: And his brothers listened
  alternatives:
  - And his brothers agreed
  - And his brothers heard him
  lexicon: HALOT
  rationale: שמע can mean hear, listen, or heed/obey depending on context. Here the
    narrative sense is that they accepted Judah's proposal, but 'listened' preserves
    the lexical link without over-interpreting as full agreement beyond the immediate
    action.
