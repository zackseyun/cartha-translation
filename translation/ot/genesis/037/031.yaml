id: GEN.37.31
reference: Genesis 37:31
source:
  edition: WLC
  text: וַ/יִּקְח֖וּ אֶת כְּתֹ֣נֶת יוֹסֵ֑ף וַֽ/יִּשְׁחֲטוּ֙ שְׂעִ֣יר עִזִּ֔ים וַ/יִּטְבְּל֥וּ
    אֶת הַ/כֻּתֹּ֖נֶת בַּ/דָּֽם־־׃
translation:
  text: Then they took Joseph’s tunic, slaughtered a male goat, and dipped the tunic
    in the blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'robe' or 'coat'; the Hebrew term denotes a tunic-like garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: Then they took
  alternatives:
  - And they took
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative sequence. 'Then' gives natural English
    narrative flow while preserving the consecutive sense; 'and' is possible but less
    idiomatic in modern English.
- source_word: כְּתֹנֶת יוֹסֵף
  chosen: Joseph’s tunic
  alternatives:
  - Joseph’s robe
  - Joseph’s coat
  lexicon: HALOT
  rationale: כְּתֹנֶת denotes a tunic-like garment. 'Tunic' is more source-near than
    traditional 'coat' and avoids implying a modern outer garment. The construct with
    the proper name is naturally rendered possessively.
- source_word: וַיִּשְׁחֲטוּ
  chosen: slaughtered
  alternatives:
  - killed
  - butchered
  lexicon: HALOT
  rationale: The verb commonly refers to slaughtering an animal, often in sacrificial
    or food-preparation contexts. 'Slaughtered' best matches the specific animal-killing
    sense here.
- source_word: שְׂעִיר עִזִּים
  chosen: a male goat
  alternatives:
  - a goat
  - a kid of the goats
  lexicon: HALOT
  rationale: The phrase specifies a he-goat/goat buck. 'Male goat' is clear modern
    English and preserves the sex distinction better than simply 'goat.'
- source_word: וַיִּטְבְּלוּ
  chosen: dipped
  alternatives:
  - immersed
  lexicon: HALOT
  rationale: The verb means to dip or immerse. 'Dipped' is the most natural English
    choice for a garment being put into blood.
- source_word: הַכֻּתֹּנֶת
  chosen: the tunic
  alternatives:
  - the robe
  - the coat
  lexicon: HALOT
  rationale: For consistency with כְּתֹנֶת earlier in the verse, the same English
    gloss is retained.
- source_word: בַּדָּם
  chosen: in the blood
  alternatives:
  - in blood
  lexicon: HALOT
  rationale: The prefixed preposition with article is most naturally rendered 'in
    the blood,' referring to the blood of the slaughtered goat just mentioned.
