id: GEN.37.24
reference: Genesis 37:24
source:
  edition: WLC
  text: וַ/יִּ֨קָּחֻ֔/הוּ וַ/יַּשְׁלִ֥כוּ אֹת֖/וֹ הַ/בֹּ֑רָ/ה וְ/הַ/בּ֣וֹר רֵ֔ק אֵ֥ין
    בּ֖/וֹ מָֽיִם׃
translation:
  text: Then they took him and threw him into the pit. Now the pit was empty; there
    was no water in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cistern' for 'pit'; the Hebrew bor can refer to a water pit or cistern,
      which fits the note that there was no water in it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחֻהוּ
  chosen: Then they took him
  alternatives:
  - And they took him
  - So they seized him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Took him' is the plain sense
    of לקח here. 'Then' gives natural English narrative flow without overstating the
    conjunction; 'seized him' is possible contextually but more interpretive than
    the Hebrew requires.
- source_word: וַיַּשְׁלִכוּ אֹתוֹ
  chosen: and threw him
  alternatives:
  - and cast him
  - and hurled him
  lexicon: HALOT
  rationale: השליך commonly means 'throw/cast.' 'Threw' is clear modern English and
    fits the violent action. 'Cast' is more traditional but less natural; 'hurled'
    may over-intensify the verb.
- source_word: הַבֹּרָה
  chosen: into the pit
  alternatives:
  - into the cistern
  - into the well
  lexicon: HALOT
  rationale: בּוֹר can denote a pit, cistern, or dungeon-like hole. In this context,
    the following note that it had no water suggests a cistern-like pit, but 'pit'
    is broad, idiomatic, and preserves the Hebrew image without over-specifying. The
    more specific alternative is worth preserving in a footnote.
- source_word: וְהַבּוֹר רֵק
  chosen: Now the pit was empty
  alternatives:
  - and the pit was empty
  - but the pit was empty
  lexicon: HALOT
  rationale: The clause gives explanatory background. Rendering waw as 'Now' communicates
    the parenthetical/explanatory force in natural English. רֵק means 'empty' or 'empty
    of contents.'
- source_word: אֵין בּוֹ מָיִם
  chosen: there was no water in it
  alternatives:
  - it had no water in it
  - there was not water in it
  lexicon: HALOT
  rationale: This clause explains in what sense the pit was empty. 'There was no water
    in it' is idiomatic English and preserves the explicit mention of water.
