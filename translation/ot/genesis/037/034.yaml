id: GEN.37.34
reference: Genesis 37:34
source:
  edition: WLC
  text: וַ/יִּקְרַ֤ע יַעֲקֹב֙ שִׂמְלֹתָ֔י/ו וַ/יָּ֥שֶׂם שַׂ֖ק בְּ/מָתְנָ֑י/ו וַ/יִּתְאַבֵּ֥ל
    עַל בְּנ֖/וֹ יָמִ֥ים רַבִּֽים־׃
translation:
  text: Then Jacob tore his clothes, put sackcloth around his waist, and mourned for
    his son many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'around his loins.' The Hebrew literally refers to the waist/loins area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרַע
  chosen: tore
  alternatives:
  - ripped
  - tore apart
  lexicon: HALOT
  rationale: The verb קרע in mourning contexts commonly denotes tearing garments as
    a sign of grief. 'Tore' is natural modern English and preserves the concrete action
    without paraphrase.
- source_word: שִׂמְלֹתָיו
  chosen: his clothes
  alternatives:
  - his garments
  - his robes
  lexicon: HALOT
  rationale: שִׂמְלָה refers broadly to clothing/garments. 'His clothes' is clear,
    contemporary English; 'garments' is more formal but less natural here, and 'robes'
    is too specific.
- source_word: שַׂק
  chosen: sackcloth
  alternatives:
  - coarse cloth
  lexicon: HALOT
  rationale: This is the standard term for mourning attire in biblical contexts. 'Sackcloth'
    preserves the cultural and literary register better than a descriptive paraphrase.
- source_word: בְּמָתְנָיו
  chosen: around his waist
  alternatives:
  - on his loins
  - around his loins
  lexicon: HALOT
  rationale: מָתְנַיִם literally means loins/waist. 'Around his waist' communicates
    the bodily location idiomatically in modern English, while avoiding archaic phrasing.
- source_word: וַיִּתְאַבֵּל
  chosen: mourned
  alternatives:
  - lamented
  - grieved
  lexicon: HALOT
  rationale: The Hitpael of אבל denotes entering a state of mourning, often with customary
    signs of grief. 'Mourned' best matches the formal bereavement sense in context.
- source_word: עַל־בְּנוֹ
  chosen: for his son
  alternatives:
  - over his son
  lexicon: HALOT
  rationale: The preposition עַל with mourning language can be rendered 'for' or 'over.'
    'For his son' is the most idiomatic English expression here while preserving the
    sense.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - for many days
  lexicon: HALOT
  rationale: The phrase literally means 'many days.' In English, attaching it adverbially
    after 'mourned' naturally conveys duration. The duration sense is retained without
    unnecessary expansion.
