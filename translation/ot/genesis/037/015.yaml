id: GEN.37.15
reference: Genesis 37:15
source:
  edition: WLC
  text: וַ/יִּמְצָאֵ֣/הוּ אִ֔ישׁ וְ/הִנֵּ֥ה תֹעֶ֖ה בַּ/שָּׂדֶ֑ה וַ/יִּשְׁאָלֵ֧/הוּ
    הָ/אִ֛ישׁ לֵ/אמֹ֖ר מַה תְּבַקֵּֽשׁ־׃
translation:
  text: A man found him, and behold, he was wandering in the field. The man asked
    him, saying, “What are you seeking?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What are you looking for?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָאֵהוּ
  chosen: found him
  alternatives:
  - came upon him
  - encountered him
  lexicon: HALOT
  rationale: מצא in the Qal commonly means 'find.' 'Found him' is the most direct
    and natural rendering in narrative context.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: איש denotes an individual male person here. 'A man' preserves the concrete,
    gendered singular reference of the Hebrew.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there he was
  lexicon: HALOT
  rationale: הנה marks vivid presentation or sudden notice in narrative. 'Behold'
    preserves the discourse force, though slightly formal; it fits the narrative style
    and signals the narrator's attention-directing particle.
- source_word: תֹעֶה
  chosen: wandering
  alternatives:
  - straying
  - lost
  lexicon: HALOT
  rationale: The participle from תעה denotes going astray or wandering. 'Wandering'
    best fits Joseph's movement in search of his brothers without overstating his
    condition as fully 'lost,' though that nuance is nearby.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: שדה is the ordinary term for field/open land. 'In the field' is the straightforward
    rendering.
- source_word: וַיִּשְׁאָלֵהוּ
  chosen: asked him
  alternatives:
  - questioned him
  - inquired of him
  lexicon: HALOT
  rationale: שאל means ask/inquire. 'Asked him' is idiomatic and sufficient in this
    direct-speech introduction.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct speech. 'Saying' closely
    reflects the Hebrew narrative convention.
- source_word: מַה תְּבַקֵּשׁ
  chosen: What are you seeking?
  alternatives:
  - What are you looking for?
  - What do you seek?
  lexicon: HALOT
  rationale: בקש means seek/look for. 'What are you seeking?' preserves the verbal
    sense and present action, while remaining readable modern English. 'Looking for'
    is possible but slightly more colloquial.
