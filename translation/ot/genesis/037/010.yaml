theological_decisions:
- issue: Sense of השתחוה in a non-cultic context
  chosen_reading: bow down before you
  alternative_readings:
  - worship you
  - prostrate ourselves before you
  rationale: The verb can denote worship in divine contexts, but here Jacob speaks
    of familial obeisance in response to Joseph's dream. Rendering it as 'bow down'
    preserves the social sense and avoids importing cultic theology the text does
    not require.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
