id: GEN.37.10
reference: Genesis 37:10
source:
  edition: WLC
  text: וַ/יְסַפֵּ֣ר אֶל אָבִי/ו֮ וְ/אֶל אֶחָי/ו֒ וַ/יִּגְעַר בּ֣/וֹ אָבִ֔י/ו וַ/יֹּ֣אמֶר
    ל֔/וֹ מָ֛ה הַ/חֲל֥וֹם הַ/זֶּ֖ה אֲשֶׁ֣ר חָלָ֑מְתָּ הֲ/ב֣וֹא נָב֗וֹא אֲנִי֙ וְ/אִמְּ/ךָ֣
    וְ/אַחֶ֔י/ךָ לְ/הִשְׁתַּחֲוֺ֥ת לְ/ךָ֖ אָֽרְצָ/ה־־־׃
translation:
  text: And he told it to his father and to his brothers, and his father rebuked him
    and said to him, “What is this dream that you have dreamed? Shall I and your mother
    and your brothers indeed come to bow down to the ground before you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to prostrate ourselves before you.” The Hebrew verb can denote deep
      obeisance; here it refers to bowing in submission, not necessarily worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  chosen: he told it
  alternatives:
  - he recounted
  - he related
  lexicon: HALOT
  rationale: The verb ספר in the piel commonly means to tell or recount. 'Told it'
    is natural English and keeps the implied object from context, namely the dream.
- source_word: אָבִיו ... אֶחָיו
  chosen: his father ... his brothers
  alternatives:
  - his father ... his brethren
  lexicon: HALOT
  rationale: Straightforward kinship terms. 'Brothers' fits readable modern English
    and preserves the masculine plural in the source.
- source_word: וַיִּגְעַר בּוֹ
  chosen: rebuked him
  alternatives:
  - scolded him
  - reproved him
  lexicon: HALOT
  rationale: גער conveys a verbal rebuke or reprimand. 'Rebuked' preserves the force
    better than the milder 'scolded' and is standard, clear English.
- source_word: מָה הַחֲלוֹם הַזֶּה אֲשֶׁר חָלָמְתָּ
  chosen: What is this dream that you have dreamed?
  alternatives:
  - What is this dream you dreamed?
  lexicon: HALOT
  rationale: This preserves the Hebrew rhetorical form, including the cognate accusative-like
    repetition of 'dream' and 'dreamed,' while remaining idiomatic enough in English.
- source_word: הֲבוֹא נָבוֹא
  chosen: Shall ... indeed come
  alternatives:
  - Are we really to come
  - Will ... actually come
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Indeed
    come' captures the emphatic force without over-paraphrasing.
- source_word: אֲנִי וְאִמְּךָ וְאַחֶיךָ
  chosen: I and your mother and your brothers
  alternatives:
  - I, your mother, and your brothers
  lexicon: HALOT
  rationale: This reproduces the listed subjects directly. The slightly smoother alternative
    is possible, but the chosen wording stays closer to the Hebrew sequence.
- source_word: לְהִשְׁתַּחֲוֺת לְךָ
  chosen: to bow down before you
  alternatives:
  - to prostrate ourselves before you
  - to worship you
  lexicon: HALOT
  rationale: The verb שׁחה here denotes an act of obeisance. 'Bow down before you'
    is the best contextual rendering; 'worship' would overstate the sense in this
    familial setting.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: The directional form of 'earth/land' here idiomatically indicates bowing
    down to the ground. This makes explicit in natural English what the Hebrew adverbial
    ending conveys.
