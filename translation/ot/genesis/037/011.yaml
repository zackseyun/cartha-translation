id: GEN.37.11
reference: Genesis 37:11
source:
  edition: WLC
  text: וַ/יְקַנְאוּ ב֖/וֹ אֶחָ֑י/ו וְ/אָבִ֖י/ו שָׁמַ֥ר אֶת הַ/דָּבָֽר־־׃
translation:
  text: So his brothers were jealous of him, but his father kept the matter in mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his father kept the saying' / 'kept the word,' that is, he held Joseph's
      report in mind and continued to consider it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַנְאוּ
  chosen: were jealous
  alternatives:
  - envied
  lexicon: HALOT
  rationale: The verb קנא in this context denotes jealousy/envy provoked by Joseph's
    favored status and dreams. 'Were jealous' fits natural English and captures the
    ongoing emotional response better than a bare 'envied,' while staying close to
    the Hebrew sense.
- source_word: בּוֹ
  chosen: of him
  alternatives:
  - at him
  - against him
  lexicon: HALOT
  rationale: With קנא, the preposition ב can mark the object of jealousy. In English,
    'jealous of him' is the most idiomatic equivalent.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers and sisters (inclusive interpretation)
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural, referring to Joseph's brothers
    in the narrative. Per gender-accurate policy, 'his brothers' should be retained.
- source_word: וְאָבִיו
  chosen: but his father
  alternatives:
  - and his father
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but the clause contrasts the brothers'
    jealous reaction with the father's reflective response. Rendering it as 'but'
    communicates the discourse contrast naturally in English without distorting the
    sense.
- source_word: שָׁמַר
  chosen: kept
  alternatives:
  - guarded
  - observed
  - watched
  lexicon: HALOT
  rationale: שׁמר literally means 'keep/guard,' but here it idiomatically means to
    retain or hold onto something attentively. 'Kept' preserves the verbal image and
    allows the idiomatic expansion 'in mind' in English.
- source_word: אֶת־הַדָּבָר
  chosen: the matter
  alternatives:
  - the saying
  - the word
  - this thing
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to the content/significance
    of Joseph's dream report. 'The matter' is idiomatic and broad enough to include
    both the saying and its significance.
