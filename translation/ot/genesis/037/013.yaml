id: GEN.37.13
reference: Genesis 37:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יִשְׂרָאֵ֜ל אֶל יוֹסֵ֗ף הֲ/ל֤וֹא אַחֶ֨י/ךָ֙ רֹעִ֣ים בִּ/שְׁכֶ֔ם
    לְכָ֖/ה וְ/אֶשְׁלָחֲ/ךָ֣ אֲלֵי/הֶ֑ם וַ/יֹּ֥אמֶר ל֖/וֹ הִנֵּֽ/נִי־׃
translation:
  text: Then Israel said to Joseph, “Are not your brothers shepherding in Shechem?
    Come, and I will send you to them.” And he said to him, “Here I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “pasturing” or “tending the flock” for “shepherding.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses the personal name/title 'Israel' here, not 'Jacob.'
    Following original-language primacy and the instruction to transliterate names,
    the main text preserves 'Israel.' 'Jacob' is not adopted because it is not the
    form present in this verse.
- source_word: הֲלֹא
  chosen: Are not
  alternatives:
  - Is it not true that
  - Surely
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Are
    not' preserves the interrogative force in natural English better than a flat assertion,
    while remaining close to the Hebrew.
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your brothers of yours
  - your kin
  lexicon: HALOT
  rationale: The noun is masculine plural with 2ms suffix, referring specifically
    to Joseph's brothers. 'Brothers' is the most direct and contextually accurate
    rendering.
- source_word: רֹעִים
  chosen: shepherding
  alternatives:
  - pasturing
  - grazing the flock
  - feeding
  lexicon: HALOT
  rationale: The participle from רעה denotes the activity of tending flocks. 'Shepherding'
    preserves the verbal sense and pastoral context better than the more generic 'feeding'
    or the more interpretive 'grazing the flock.'
- source_word: בִּשְׁכֶם
  chosen: in Shechem
  alternatives:
  - at Shechem
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in/at.' 'In Shechem' is a natural English
    rendering for location and keeps the place name transliterated.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Go
  - Come now
  lexicon: HALOT
  rationale: This imperative often functions idiomatically as an invitation or summons.
    'Come' is the most direct equivalent; 'Go' would over-interpret the motion from
    the speaker's perspective, and 'Come now' adds emphasis not required by the text.
- source_word: וְאֶשְׁלָחֲךָ
  chosen: and I will send you
  alternatives:
  - that I may send you
  - let me send you
  lexicon: HALOT
  rationale: The cohortative-like first person form after the imperative is well represented
    by a simple future in English. 'And I will send you' is idiomatic and preserves
    the sequence of invitation plus commission.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - to your brothers
  - to where they are
  lexicon: HALOT
  rationale: The pronoun refers back to the brothers. 'To them' is sufficiently clear
    in context and reflects the Hebrew pronoun without unnecessary repetition.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - I am here
  - At your service
  lexicon: HALOT
  rationale: This is the standard self-presenting response formula in Hebrew narrative.
    'Here I am' preserves both the idiomatic force and the literary resonance of the
    expression better than paraphrastic alternatives.
