id: GEN.37.26
reference: Genesis 37:26
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוּדָ֖ה אֶל אֶחָ֑י/ו מַה בֶּ֗צַע כִּ֤י נַהֲרֹג֙ אֶת אָחִ֔י/נוּ
    וְ/כִסִּ֖ינוּ אֶת דָּמֽ/וֹ־־־־׃
translation:
  text: Then Judah said to his brothers, “What profit is there if we kill our brother
    and cover his blood?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What gain is there if we kill our brother and conceal his blood?' The
      Hebrew expression 'cover his blood' is an idiom for hiding bloodshed or guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers/brothers and sisters
  - to his siblings
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural, referring here to Joseph's
    male siblings present in the narrative. 'Brothers' is both accurate and natural.
- source_word: מַה בֶּצַע
  chosen: What profit is there
  alternatives:
  - What gain is there
  - What advantage is there
  - What do we gain
  lexicon: HALOT
  rationale: בֶּצַע denotes gain, profit, or advantage, often with a material or self-interested
    nuance. 'What profit is there' preserves Judah's pragmatic calculation without
    over-paraphrasing.
- source_word: כִּי
  chosen: if
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/condition of the rhetorical question
    in idiomatic English: ''if we kill...''.'
- source_word: נַהֲרֹג
  chosen: we kill
  alternatives:
  - we should kill
  - we were to kill
  lexicon: HALOT
  rationale: First person plural imperfect in this rhetorical question is well represented
    by simple present 'we kill' in English.
- source_word: אָחִינוּ
  chosen: our brother
  lexicon: HALOT
  rationale: Direct and literal rendering; the familial term is central to the moral
    force of the line.
- source_word: וְכִסִּינוּ אֶת דָּמוֹ
  chosen: and cover his blood
  alternatives:
  - and conceal his blood
  - and cover up his bloodshed
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cover his blood.' This likely implies
    concealing responsibility for bloodshed, but the literal expression is retained
    because it is intelligible in English and preserves the imagery.
