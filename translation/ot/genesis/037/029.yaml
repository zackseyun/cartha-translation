id: GEN.37.29
reference: Genesis 37:29
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב רְאוּבֵן֙ אֶל הַ/בּ֔וֹר וְ/הִנֵּ֥ה אֵין יוֹסֵ֖ף בַּ/בּ֑וֹר וַ/יִּקְרַ֖ע
    אֶת בְּגָדָֽי/ו־־־׃
translation:
  text: When Reuben returned to the pit, behold, Joseph was not in the pit, and he
    tore his clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cistern' for 'the pit' (Hebrew bor).
    reason: lexical_alternative
  - marker: b
    text: Tearing one's clothes was a customary expression of grief, shock, or distress.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - went back
  lexicon: HALOT
  rationale: From שוב, here a wayyiqtol narrative verb indicating Reuben's return
    to a previous location. 'Returned' is natural modern English and preserves the
    directional sense without over-specifying manner.
- source_word: הַבּוֹר / בַּבּוֹר
  chosen: the pit / in the pit
  alternatives:
  - the cistern
  lexicon: HALOT
  rationale: בּוֹר can denote a pit or cistern. In the Joseph narrative it refers
    to the place into which Joseph was thrown. 'Pit' is the more idiomatic and broadly
    understandable rendering in English, while still fitting the context; 'cistern'
    is a plausible lexical alternative worth preserving.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what follows. 'Behold'
    preserves the suddenness and narrative force better than omitting it, even though
    it is slightly elevated English.
- source_word: אֵין יוֹסֵף בַּבּוֹר
  chosen: Joseph was not in the pit
  alternatives:
  - there was no Joseph in the pit
  - Joseph was gone from the pit
  lexicon: HALOT
  rationale: אֵין expresses nonexistence/absence. The chosen rendering is idiomatic
    English and accurately conveys Joseph's absence without adding interpretive nuance
    such as 'gone' beyond the text.
- source_word: וַיִּקְרַע אֶת בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: קרע בגדיו is a conventional expression of grief or distress. 'Tore his
    clothes' is clear modern English; 'garments' is more formal but less natural for
    the target audience.
