id: GEN.37.19
reference: Genesis 37:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ אִ֣ישׁ אֶל אָחִ֑י/ו הִנֵּ֗ה בַּ֛עַל הַ/חֲלֹמ֥וֹת הַלָּזֶ֖ה בָּֽא־׃
translation:
  text: And they said to one another, “Look, this dreamer is coming.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the master/lord of dreams.' The Hebrew expression is rendered
      idiomatically as 'dreamer' to reflect the brothers' mocking tone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next narrative action. 'And they said'
    preserves the Hebrew narrative sequence naturally in English.
- source_word: אִישׁ אֶל אָחִיו
  chosen: to one another
  alternatives:
  - each man to his brother
  - one man to his brother
  lexicon: HALOT
  rationale: The idiom literally reads 'a man to his brother,' but in context it functions
    reciprocally. 'To one another' conveys the sense in clear modern English while
    avoiding an overly wooden rendering.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic/interjection drawing attention. 'Look' is a readable
    modern equivalent; 'Behold' is more traditional but archaic for the stated translation
    philosophy.
- source_word: בַּעַל הַחֲלֹמוֹת
  chosen: this dreamer
  alternatives:
  - the master of dreams
  - the lord of dreams
  - this master of dreams
  lexicon: HALOT
  rationale: בעל can denote one characterized by or associated with something. Here,
    in the brothers' mocking speech about Joseph's dreams, English idiom is best captured
    by 'dreamer.' This preserves the derisive force better than the more literal but
    awkward 'master/lord of dreams.'
- source_word: הַלָּזֶה
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: The demonstrative points out Joseph with a dismissive tone. 'This' works
    naturally in English and can carry the same contemptuous nuance in context.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - is arriving
  lexicon: HALOT
  rationale: The participle of בוא expresses an action in progress or imminent approach.
    'Is coming' best reflects the aspect in idiomatic English.
