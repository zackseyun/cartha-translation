id: GEN.37.36
reference: Genesis 37:36
source:
  edition: WLC
  text: וְ/הַ֨/מְּדָנִ֔ים מָכְר֥וּ אֹת֖/וֹ אֶל מִצְרָ֑יִם לְ/פֽוֹטִיפַר֙ סְרִ֣יס פַּרְעֹ֔ה
    שַׂ֖ר הַ/טַּבָּחִֽים־׃פ
translation:
  text: Meanwhile, the Midianites sold him in Egypt to Potiphar, an officer of Pharaoh,
    the captain of the guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Medanites''; traditionally understood here as ''Midianites''
      in light of the surrounding narrative and ancient versions.'
    reason: alternative_reading
  - marker: b
    text: Or 'a eunuch of Pharaoh' or 'a court official of Pharaoh.' The Hebrew term
      can refer either to a literal eunuch or to a royal officer.
    reason: lexical_alternative
  - marker: c
    text: Literally 'chief of the slaughterers.' In royal context this likely refers
      to the captain of the guard or bodyguard.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמְּדָנִים
  chosen: Meanwhile, the Midianites
  alternatives:
  - And the Medanites
  - And the Midianites
  lexicon: HALOT
  rationale: The conjunction ו is rendered contextually as 'Meanwhile' to signal the
    narrative shift smoothly in English. The ethnonym is traditionally rendered 'Midianites'
    in this context, aligning with the broader Joseph narrative usage and common identification
    of this trading group; 'Medanites' is a more formally possible rendering from
    the consonants but is less likely in context and can be preserved as an alternative.
- source_word: מָכְרוּ
  chosen: sold
  alternatives:
  - had sold
  lexicon: HALOT
  rationale: 'Qal perfect 3cp is best rendered as simple past in the narrative sequence:
    ''sold.'' English pluperfect is possible in some discourse analyses, but the straightforward
    past fits the verse''s resumptive narration.'
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct object pronoun referring to Joseph; 'him' is the natural English
    equivalent.
- source_word: אֶל מִצְרַיִם
  chosen: in Egypt
  alternatives:
  - to Egypt
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' the following phrase names the purchaser
    in Egypt, so idiomatic English is 'sold him in Egypt to Potiphar.' This preserves
    the sense without awkwardness.
- source_word: לְפוֹטִיפַר
  chosen: to Potiphar
  lexicon: HALOT
  rationale: 'The preposition ל marks the indirect object/purchaser: Potiphar. The
    name is transliterated per translation philosophy.'
- source_word: סְרִיס פַּרְעֹה
  chosen: an officer of Pharaoh
  alternatives:
  - a eunuch of Pharaoh
  - a court official of Pharaoh
  lexicon: HALOT
  rationale: סָרִיס can denote a literal eunuch or, more broadly, a royal officer/court
    official. In this context, 'officer of Pharaoh' is the clearest and least overcommitted
    rendering in English, since the term often functions as an administrative title.
- source_word: שַׂר הַטַּבָּחִים
  chosen: the captain of the guard
  alternatives:
  - chief of the slaughterers
  - captain of the bodyguard
  lexicon: HALOT
  rationale: The phrase literally involves authority over the טַבָּחִים, a term that
    can denote slaughterers, cooks, or executioners/bodyguards depending on court
    context. In Genesis, the established and contextually fitting sense is a high
    royal security/execution post, well conveyed by 'captain of the guard.'
