id: GEN.37.9
reference: Genesis 37:9
source:
  edition: WLC
  text: וַ/יַּחֲלֹ֥ם עוֹד֙ חֲל֣וֹם אַחֵ֔ר וַ/יְסַפֵּ֥ר אֹת֖/וֹ לְ/אֶחָ֑י/ו וַ/יֹּ֗אמֶר
    הִנֵּ֨ה חָלַ֤מְתִּֽי חֲלוֹם֙ ע֔וֹד וְ/הִנֵּ֧ה הַ/שֶּׁ֣מֶשׁ וְ/הַ/יָּרֵ֗חַ וְ/אַחַ֤ד
    עָשָׂר֙ כּֽוֹכָבִ֔ים מִֽשְׁתַּחֲוִ֖ים לִֽ/י׃
translation:
  text: 'Then he dreamed another dream and told it to his brothers, and said, “Look,
    I have dreamed another dream: the sun, the moon, and eleven stars were bowing
    down to me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were prostrating themselves before me.' The Hebrew verb can denote deep
      obeisance; here it refers to homage rather than divine worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲלֹם
  chosen: Then he dreamed
  alternatives:
  - And he dreamed
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    sequence while preserving the consecutive force.
- source_word: עוֹד חֲלוֹם אַחֵר
  chosen: another dream
  alternatives:
  - yet another dream
  - still another dream
  lexicon: HALOT
  rationale: The combination of עוֹד with אַחֵר intensifies repetition. 'Another dream'
    is concise and idiomatic; the repeated 'another' is retained later in Joseph's
    speech to reflect the Hebrew repetition.
- source_word: וַיְסַפֵּר אֹתוֹ לְאֶחָיו
  chosen: and told it to his brothers
  alternatives:
  - and recounted it to his brothers
  lexicon: HALOT
  rationale: סִפֵּר commonly means to tell or recount. 'Told it' is clear modern English
    and fits the narrative register. 'Brothers' matches the masculine plural and context.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' preserves the
    deictic force in readable modern English better than archaic 'Behold.'
- source_word: חָלַמְתִּי חֲלוֹם עוֹד
  chosen: I have dreamed another dream
  alternatives:
  - I dreamed another dream
  - I have had another dream
  lexicon: HALOT
  rationale: The cognate construction 'dreamed a dream' is preserved because it is
    natural enough in English and reflects the Hebrew wording. Present perfect is
    acceptable in direct speech introducing the content just experienced.
- source_word: וְהִנֵּה
  chosen: ':'
  alternatives:
  - and look
  - and behold
  lexicon: HALOT
  rationale: Here הִנֵּה introduces the dream scene. In English, a colon naturally
    introduces the content without overloading the sentence with repeated discourse
    markers; the attentional force is still conveyed by the structure.
- source_word: הַשֶּׁמֶשׁ וְהַיָּרֵחַ וְאַחַד עָשָׂר כּוֹכָבִים
  chosen: the sun, the moon, and eleven stars
  lexicon: HALOT
  rationale: A straightforward rendering of the celestial bodies and number. The definite
    articles on sun and moon are naturally represented in English; 'eleven stars'
    is idiomatic without an article.
- source_word: מִשְׁתַּחֲוִים לִי
  chosen: were bowing down to me
  alternatives:
  - were prostrating themselves before me
  - were worshiping me
  lexicon: HALOT
  rationale: The participle depicts ongoing action within the dream scene, hence 'were
    bowing down.' While שׁחה can in some contexts denote worship, here the family-authority
    context favors obeisance rather than cultic worship.
