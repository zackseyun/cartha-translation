theological_decisions:
- issue: Sense of מִשְׁתַּחֲוִים in Joseph's dream
  chosen_reading: non-cultic obeisance ('bowing down to me')
  alternative_readings:
  - worshiping me
  rationale: The immediate narrative context concerns familial submission and later
    fulfillment in acts of homage, not divine worship. Rendering it as 'bowing down'
    preserves the social-political sense without importing theological claims the
    text does not make.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it beyond the
    text.'
