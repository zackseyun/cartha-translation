id: GEN.37.12
reference: Genesis 37:12
source:
  edition: WLC
  text: וַ/יֵּלְכ֖וּ אֶחָ֑י/ו לִ/רְע֛וֹת אֶׄתׄ צֹ֥אן אֲבִי/הֶ֖ם בִּ/שְׁכֶֽם־׃
translation:
  text: Now his brothers went to pasture their father's flock at Shechem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Shechem.' The Hebrew preposition can denote location either within
      the place or at it/in its vicinity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - set out
  - went on
  lexicon: HALOT
  rationale: Wayyiqtol of הלך introduces the next event in the narrative sequence.
    'Went' is the plain, natural English rendering; 'Now' in the sentence reflects
    the narrative progression signaled by the waw-consecutive.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers (siblings)
  lexicon: HALOT
  rationale: The noun means 'his brothers.' The masculine plural here refers specifically
    to Joseph's male siblings in context, so the gender-accurate rendering 'brothers'
    fits the source and the stated translation philosophy.
- source_word: לִרְעוֹת
  chosen: to pasture
  alternatives:
  - to shepherd
  - to graze
  lexicon: HALOT
  rationale: From רעה in the sense of tending/grazing flocks. 'To pasture' captures
    the infinitive's purpose with the flock as object and reads naturally in English.
    'To shepherd' is possible, but here the focus is the activity of tending the animals
    rather than the title/role of shepherd.
- source_word: אֶת
  chosen: '[direct object marker not translated]'
  lexicon: Hebrew grammar
  rationale: אֵת marks the definite direct object and normally has no independent
    English equivalent.
- source_word: צֹאן
  chosen: flock
  alternatives:
  - small livestock
  - sheep
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flock' is the best idiomatic collective rendering in English without over-specifying
    the species.
- source_word: אֲבִיהֶם
  chosen: their father’s
  alternatives:
  - of their father
  lexicon: HALOT
  rationale: Construct form with pronominal suffix indicates possession. The English
    genitive is the most natural rendering.
- source_word: בִּשְׁכֶם
  chosen: at Shechem
  alternatives:
  - in Shechem
  lexicon: HALOT
  rationale: As a place name, Shechem is transliterated per project policy. The preposition
    ב can be rendered 'in' or 'at'; 'at Shechem' fits the pastoral setting in the
    vicinity of the place.
