id: GEN.37.8
reference: Genesis 37:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמְרוּ ל/וֹ֙ אֶחָ֔י/ו הֲ/מָלֹ֤ךְ תִּמְלֹךְ֙ עָלֵ֔י/נוּ אִם מָשׁ֥וֹל
    תִּמְשֹׁ֖ל בָּ֑/נוּ וַ/יּוֹסִ֤פוּ עוֹד֙ שְׂנֹ֣א אֹת֔/וֹ עַל חֲלֹמֹתָ֖י/ו וְ/עַל
    דְּבָרָֽי/ו־־־׃
translation:
  text: His brothers said to him, “Will you really reign over us? Will you really
    rule over us?” So they hated him even more because of his dreams and because of
    his words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because of what he said.” The Hebrew דְּבָרָיו can mean “his words”
      or more broadly “what he said.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers/brothers
  lexicon: HALOT
  rationale: The noun means 'brothers' and here refers specifically to Joseph's male
    siblings. This follows the gender-accurate principle; no inclusive rendering is
    warranted in context.
- source_word: הֲמָלֹךְ תִּמְלֹךְ
  chosen: Will you really reign
  alternatives:
  - Will you indeed reign
  - Are you actually going to reign
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'Will
    you really reign' captures the incredulous, emphatic force in natural English
    while preserving the royal sense of מלך.
- source_word: עָלֵינוּ
  chosen: over us
  alternatives:
  - upon us
  lexicon: HALOT
  rationale: With מלך, the preposition conveys dominion 'over' someone. 'Over us'
    is idiomatic and semantically precise.
- source_word: אִם מָשׁוֹל תִּמְשֹׁל
  chosen: Will you really rule
  alternatives:
  - Will you indeed govern
  - Will you actually have dominion
  lexicon: HALOT
  rationale: A second infinitive absolute + imperfect construction intensifies משל.
    'Rule' distinguishes it slightly from 'reign' while preserving the parallelism
    and rhetorical force.
- source_word: בָּנוּ
  chosen: over us
  alternatives:
  - among us
  - in us
  lexicon: HALOT
  rationale: In this context with משל, the sense is dominion over persons. English
    idiom prefers 'rule over us.'
- source_word: וַיּוֹסִפוּ עוֹד שְׂנֹא
  chosen: So they hated him even more
  alternatives:
  - And they continued to hate him still more
  - And they added again to hate him
  lexicon: HALOT
  rationale: The construction expresses increase/intensification of their hatred.
    'Even more' conveys both עוד and the idiomatic force of יסף + infinitive construct
    in readable English.
- source_word: עַל חֲלֹמֹתָיו
  chosen: because of his dreams
  alternatives:
  - on account of his dreams
  - for his dreams
  lexicon: HALOT
  rationale: עַל here gives the basis/cause of their hatred. 'Because of' is the clearest
    modern English causal rendering.
- source_word: וְעַל דְּבָרָיו
  chosen: because of his words
  alternatives:
  - because of what he said
  - and because of his matters
  lexicon: HALOT
  rationale: דבר can mean 'word, speech, matter.' Here it most naturally refers to
    Joseph's reported speech about the dreams. 'His words' is formally closer; 'what
    he said' is a viable dynamic alternative.
