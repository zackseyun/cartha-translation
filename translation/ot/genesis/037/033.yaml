id: GEN.37.33
reference: Genesis 37:33
source:
  edition: WLC
  text: וַ/יַּכִּירָ֤/הּ וַ/יֹּ֨אמֶר֙ כְּתֹ֣נֶת בְּנִ֔/י חַיָּ֥ה רָעָ֖ה אֲכָלָ֑תְ/הוּ
    טָרֹ֥ף טֹרַ֖ף יוֹסֵֽף׃
translation:
  text: He recognized it and said, “It is my son’s tunic. A vicious wild animal has
    devoured him. Yosef has surely been torn to pieces.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a wild beast has devoured him.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew intensifies the verb: “torn, surely torn.”'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional English: “Joseph.” Hebrew: “Yosef.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכִּירָהּ
  chosen: He recognized it
  alternatives:
  - He identified it
  - He recognized her/it
  lexicon: HALOT
  rationale: The verb נכר in Hifil means to recognize/identify. The 3fs suffix refers
    to the tunic (כְּתֹנֶת, feminine), which English naturally renders as 'it.' 'Recognized'
    is idiomatic and fits the narrative context.
- source_word: כְּתֹנֶת בְּנִי
  chosen: my son’s tunic
  alternatives:
  - the tunic of my son
  - my son’s robe
  lexicon: HALOT
  rationale: כְּתֹנֶת denotes a tunic/long garment. 'Tunic' is more specific and source-near
    than the traditional but broader 'coat.' The construct phrase is naturally rendered
    with the English possessive.
- source_word: חַיָּה רָעָה
  chosen: a vicious wild animal
  alternatives:
  - a wild beast
  - an evil animal
  - a savage beast
  lexicon: HALOT
  rationale: חַיָּה here refers to a wild animal/beast; רָעָה describes it as harmful,
    fierce, or vicious rather than morally evil. 'Vicious wild animal' communicates
    the predatory sense in clear modern English.
- source_word: אֲכָלָתְהוּ
  chosen: has devoured him
  alternatives:
  - has eaten him
  - has consumed him
  lexicon: HALOT
  rationale: The perfect verb with object suffix states Jacob’s conclusion. 'Devoured'
    better matches predatory-animal context than the more wooden 'eaten.' Present
    perfect in English conveys the resulting state naturally in direct speech.
- source_word: טָרֹף טֹרַף
  chosen: has surely been torn to pieces
  alternatives:
  - has surely been torn apart
  - was torn, yes torn
  - has been torn to pieces
  lexicon: HALOT
  rationale: The infinitive absolute plus finite/passive form intensifies the verb
    טרף. 'Surely' captures the emphatic force, and 'torn to pieces' expresses the
    violent predatory sense more idiomatically than a bare 'torn.'
- source_word: יוֹסֵף
  chosen: Yosef
  alternatives:
  - Joseph
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated by standard
    conventions rather than replaced by traditional Anglicized forms. 'Yosef' reflects
    the Hebrew name directly.
