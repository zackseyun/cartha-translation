id: GEN.37.17
reference: Genesis 37:17
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הָ/אִישׁ֙ נָסְע֣וּ מִ/זֶּ֔ה כִּ֤י שָׁמַ֨עְתִּי֙ אֹֽמְרִ֔ים נֵלְכָ֖ה
    דֹּתָ֑יְנָ/ה וַ/יֵּ֤לֶךְ יוֹסֵף֙ אַחַ֣ר אֶחָ֔י/ו וַ/יִּמְצָאֵ֖/ם בְּ/דֹתָֽן׃
translation:
  text: The man said, “They have moved on from here, because I heard them saying,
    ‘Let us go to Dothan.’” So Joseph went after his brothers and found them at Dothan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to Dothan' uses a directional ending on the place name, literally
      'Dothan-ward.'
    reason: cultural_note
  - marker: b
    text: Or 'I heard them say.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסְעוּ
  chosen: have moved on
  alternatives:
  - have departed
  - have journeyed on
  - pulled up and moved on
  lexicon: HALOT
  rationale: The verb נסע commonly refers to breaking camp and moving on. In this
    narrative context, 'have moved on' is natural modern English and preserves the
    sense of departure from a location without over-specifying camping imagery.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  - from here
  lexicon: HALOT
  rationale: The deictic expression points to the present location. 'From here' is
    idiomatic and sufficiently precise.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the man's statement. 'Because' communicates
    the causal force clearly in modern English.
- source_word: שָׁמַעְתִּי אֹמְרִים
  chosen: I heard them saying
  alternatives:
  - I heard them say
  - I heard people saying
  lexicon: HALOT
  rationale: The construction combines 'I heard' with a participle 'saying.' 'I heard
    them saying' preserves the ongoing reported speech naturally. The object 'them'
    is implied by context, referring to Joseph's brothers.
- source_word: נֵלְכָה
  chosen: Let us go
  alternatives:
  - We should go
  - Let us go on
  lexicon: HALOT
  rationale: The cohortative first person plural is well represented by 'Let us go,'
    preserving the deliberative/self-exhortative nuance.
- source_word: דֹּתָיְנָה
  chosen: to Dothan
  alternatives:
  - toward Dothan
  lexicon: HALOT
  rationale: The directional ending on the place name indicates motion toward Dothan.
    English normally expresses this simply as 'to Dothan.' The place name is transliterated
    per translation philosophy.
- source_word: אַחַר אֶחָיו
  chosen: after his brothers
  alternatives:
  - behind his brothers
  - in pursuit of his brothers
  lexicon: HALOT
  rationale: אַחַר here marks following after someone. 'After his brothers' is the
    most direct and natural rendering.
- source_word: וַיִּמְצָאֵם
  chosen: found them
  alternatives:
  - came upon them
  - located them
  lexicon: HALOT
  rationale: מצא in narrative commonly means 'find.' 'Found them' is straightforward
    and idiomatic.
- source_word: בְּדֹתָן
  chosen: at Dothan
  alternatives:
  - in Dothan
  lexicon: HALOT
  rationale: For a town location in English, either 'in' or 'at' is possible. 'At
    Dothan' fits the sense of locating the brothers at that place, especially after
    the motion toward it.
