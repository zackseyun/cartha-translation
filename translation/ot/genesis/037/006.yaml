id: GEN.37.6
reference: Genesis 37:6
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֲלֵי/הֶ֑ם שִׁמְעוּ נָ֕א הַ/חֲל֥וֹם הַ/זֶּ֖ה אֲשֶׁ֥ר חָלָֽמְתִּי־׃
translation:
  text: 'And he said to them, “Please listen to this dream that I dreamed:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the cognate noun and verb: ''this dream that I dreamed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  - So he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he said' preserves the
    Hebrew narrative flow in natural English without overinterpreting the connective.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Directly renders the preposition plus pronominal suffix, indicating Joseph's
    speech is addressed to his brothers.
- source_word: שִׁמְעוּ
  chosen: listen
  alternatives:
  - hear
  - listen up
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Listen' is idiomatic in direct address and
    fits modern readable English better than the more formal 'hear,' while retaining
    the command to attend.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: נא softens or politely urges the imperative. 'Please' best captures its
    discourse function in contemporary English; 'now' would be misleading here.
- source_word: הַחֲלוֹם הַזֶּה
  chosen: this dream
  alternatives:
  - the dream, this one
  lexicon: HALOT
  rationale: The Hebrew definite noun with demonstrative is naturally rendered in
    English as 'this dream.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'dream.' 'That' is the most
    natural modern English relative marker here.
- source_word: חָלָמְתִּי
  chosen: I dreamed
  alternatives:
  - I had
  - I dreamt
  lexicon: HALOT
  rationale: Verb cognate with 'dream.' Rendering the cognate construction as 'this
    dream that I dreamed' preserves the Hebrew emphasis and repetition better than
    smoothing to 'the dream I had.'
