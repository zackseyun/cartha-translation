id: GEN.37.4
reference: Genesis 37:4
source:
  edition: WLC
  text: וַ/יִּרְא֣וּ אֶחָ֗י/ו כִּֽי אֹת֞/וֹ אָהַ֤ב אֲבִי/הֶם֙ מִ/כָּל אֶחָ֔י/ו וַֽ/יִּשְׂנְא֖וּ
    אֹת֑/וֹ וְ/לֹ֥א יָכְל֖וּ דַּבְּר֥/וֹ לְ/שָׁלֹֽם־־׃
translation:
  text: When his brothers saw that their father loved him more than all his brothers,
    they hated him and could not speak peaceably to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'could not speak to him in peace,' that is, they could not speak to
      him on friendly terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: When ... saw
  alternatives:
  - And ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' captures
    the temporal force in English and links the brothers' perception to their resulting
    hatred.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers/brothers
  lexicon: HALOT
  rationale: The construct with 3ms suffix refers to Joseph's brothers. 'Brothers'
    is the natural and gender-accurate rendering in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what they saw: ''that their father
    loved him...''. ''Because'' would shift the syntax away from direct perception-content.'
- source_word: אָהַב
  chosen: loved
  alternatives:
  - favored
  lexicon: HALOT
  rationale: The verb is the common Hebrew word for 'love.' Although the context implies
    favoritism, the text itself says 'loved,' and the comparative phrase supplies
    the nuance.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - his father
  lexicon: HALOT
  rationale: The suffix is 3mp, referring to the brothers collectively. In English,
    'their father' is the straightforward rendering, even though the loved one is
    Joseph.
- source_word: מִכָּל אֶחָיו
  chosen: more than all his brothers
  alternatives:
  - more than any of his brothers
  - more than all his other brothers
  lexicon: HALOT
  rationale: The comparative מן with כָּל yields 'more than all his brothers.' This
    preserves the Hebrew comparison without adding 'other,' which is implied but not
    explicit.
- source_word: וַיִּשְׂנְאוּ
  chosen: they hated
  alternatives:
  - they came to hate
  lexicon: HALOT
  rationale: The verb שׂנא straightforwardly means 'hate.' The narrative wayyiqtol
    is best rendered simply as past narrative.
- source_word: וְלֹא יָכְלוּ
  chosen: and could not
  alternatives:
  - so that they were unable to
  - and were not able to
  lexicon: HALOT
  rationale: This expresses inability resulting from their hatred. 'Could not' is
    idiomatic and preserves the force.
- source_word: דַּבְּרוֹ
  chosen: speak ... to him
  alternatives:
  - speak with him
  lexicon: HALOT
  rationale: The infinitive with pronominal suffix refers to speaking to Joseph. English
    requires an explicit preposition; 'to him' best fits the likely sense of addressing
    him.
- source_word: לְשָׁלֹם
  chosen: peaceably
  alternatives:
  - in peace
  - for peace
  - shalomably
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes peaceful, friendly relations or greeting. 'Peaceably'
    is a natural English adverbial rendering that captures the idiom 'speak peaceably
    to someone' without flattening it to mere silence.
