id: GEN.37.22
reference: Genesis 37:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵ/הֶ֣ם רְאוּבֵן֮ אַל תִּשְׁפְּכוּ דָם֒ הַשְׁלִ֣יכוּ אֹת֗/וֹ
    אֶל הַ/בּ֤וֹר הַ/זֶּה֙ אֲשֶׁ֣ר בַּ/מִּדְבָּ֔ר וְ/יָ֖ד אַל תִּשְׁלְחוּ ב֑/וֹ לְמַ֗עַן
    הַצִּ֤יל אֹת/וֹ֙ מִ/יָּדָ֔/ם לַ/הֲשִׁיב֖/וֹ אֶל אָבִֽי/ו׀־־־־־־׃
translation:
  text: And Reuben said to them, “Do not shed blood. Throw him into this pit that
    is in the wilderness, but do not lay a hand on him”—that he might rescue him from
    their hand, to return him to his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “cistern” for “pit.” The Hebrew בּוֹר can refer to a water pit or cistern.
    reason: lexical_alternative
  - marker: b
    text: Or 'him,” so that he might rescue him'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַל תִּשְׁפְּכוּ דָם
  chosen: Do not shed blood
  alternatives:
  - Do not spill blood
  - Do not kill him
  lexicon: HALOT
  rationale: The idiom literally refers to shedding blood and commonly means bloodguilt-producing
    violence or murder. 'Do not shed blood' preserves the Hebrew expression while
    remaining natural English; 'Do not kill him' is interpretive and less textually
    transparent.
- source_word: הַשְׁלִיכוּ אֹתוֹ
  chosen: Throw him
  alternatives:
  - Cast him
  - Hurl him
  lexicon: HALOT
  rationale: The Hiphil imperative of שלך here means to throw/cast. 'Throw him' is
    clear modern English and fits the physical action without sounding archaic like
    'cast.'
- source_word: הַבּוֹר
  chosen: pit
  alternatives:
  - cistern
  - well
  lexicon: HALOT
  rationale: בּוֹר can denote a pit, cistern, or dungeon-like hole. In this narrative
    it is a pit/cistern, but 'pit' is the broadest and most natural rendering in the
    main text. The more specific 'cistern' is worth preserving in a footnote.
- source_word: אֲשֶׁר בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the open country
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or steppe rather than a sand desert
    specifically. 'In the wilderness' is the most standard and contextually suitable
    rendering.
- source_word: וְיָד אַל תִּשְׁלְחוּ בוֹ
  chosen: but do not lay a hand on him
  alternatives:
  - and do not put a hand on him
  - and do not strike him
  lexicon: HALOT
  rationale: This is an idiomatic expression. A formally literal rendering ('do not
    send a hand against him') would be obscure in English. 'Do not lay a hand on him'
    preserves the idiomatic force and the prohibition of personal violence.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: לְמַעַן introduces purpose. 'So that' is natural modern English and clearly
    signals Reuben's hidden intent.
- source_word: הַצִּיל אֹתוֹ מִיָּדָם
  chosen: he might rescue him from their hand
  alternatives:
  - to deliver him from their hand
  - to save him from them
  lexicon: HALOT
  rationale: נצל means rescue/deliver. 'From their hand' retains the Hebrew idiom
    for power/control and is still intelligible in English.
- source_word: לַהֲשִׁיבוֹ אֶל אָבִיו
  chosen: to return him to his father
  alternatives:
  - to bring him back to his father
  - to restore him to his father
  lexicon: HALOT
  rationale: שׁוּב in Hiphil here means cause to return/bring back. 'Return him to
    his father' is concise and faithful.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
