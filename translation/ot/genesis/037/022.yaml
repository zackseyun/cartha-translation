  from: him,” so that he might rescue him
  to: him”—that he might rescue him
  rationale: The Hebrew clause starting with 'לְמַעַן' (in order to) is a narrative
    comment on Reuben's motive, not part of his speech. The current rendering uses
    a comma to connect the speech to this clause, which is grammatically viable but
    slightly awkward. It makes the purpose clause feel like a simple continuation
    rather than a separate authorial aside. Using an em-dash, as many modern translations
    do (e.g., ESV, NRSVUE), more clearly signals this shift from direct discourse
    to narrative explanation, improving the flow and structural clarity of the sentence.
