id: GEN.37.30
reference: Genesis 37:30
source:
  edition: WLC
  text: וַ/יָּ֥שָׁב אֶל אֶחָ֖י/ו וַ/יֹּאמַ֑ר הַ/יֶּ֣לֶד אֵינֶ֔/נּוּ וַ/אֲנִ֖י אָ֥נָה
    אֲנִי בָֽא־־׃
translation:
  text: He returned to his brothers and said, “The boy is gone, and I—where can I
    go?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “The boy is not [there], and I—where am I to come?”
      The Hebrew idiom means “where can I go?” or “what am I to do?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: He returned
  alternatives:
  - He went back
  - He came back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol form denotes returning. 'Returned' is a
    natural, concise English rendering that preserves the narrative sequence.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers
  lexicon: HALOT
  rationale: אֶל marks direction, and אֶחָיו means 'his brothers.' Given the immediate
    family context, 'brothers' is the accurate gendered rendering.
- source_word: הַיֶּלֶד
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: יֶלֶד commonly means 'boy/child.' Here 'the boy' fits the brothers' reference
    to Joseph and preserves the emotional force without sounding archaic like 'lad.'
- source_word: אֵינֶנּוּ
  chosen: is gone
  alternatives:
  - is not there
  - is no more
  - is not
  lexicon: HALOT
  rationale: Literally 'is not him/there is no him,' an idiomatic expression for absence.
    'Is gone' communicates the immediate sense naturally in English without overstating
    death.
- source_word: וַאֲנִי
  chosen: and I
  alternatives:
  - as for me
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks an emphatic shift to Reuben's personal
    predicament. 'And I' preserves the abruptness and emphasis.
- source_word: אָ֥נָה
  chosen: where
  alternatives:
  - where to
  - to where
  lexicon: HALOT
  rationale: אָנה is an interrogative adverb meaning 'where?/whither?' In idiomatic
    English with a motion verb, 'where' or 'where can I go?' best conveys the sense.
- source_word: אֲנִי בָא
  chosen: can I go
  alternatives:
  - shall I go
  - am I to go
  - do I come
  lexicon: HALOT
  rationale: Literally 'I am coming,' but with אָנה this forms an idiom of destination
    ('where shall/can I go?'). 'Can I go' expresses Reuben's distressed rhetorical
    question in natural English. The more literal 'where am I to come?' would be awkward
    and misleading in English.
