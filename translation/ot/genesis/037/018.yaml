id: GEN.37.18
reference: Genesis 37:18
source:
  edition: WLC
  text: וַ/יִּרְא֥וּ אֹת֖/וֹ מֵ/רָחֹ֑ק וּ/בְ/טֶ֨רֶם֙ יִקְרַ֣ב אֲלֵי/הֶ֔ם וַ/יִּֽתְנַכְּל֥וּ
    אֹת֖/וֹ לַ/הֲמִיתֽ/וֹ׃
translation:
  text: They saw him from a distance, and before he came near to them, they conspired
    against him to kill him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they plotted against him.' The Hebrew verb can denote scheming or acting
      deceitfully; here the context makes a murderous plot explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: They saw
  alternatives:
  - And they saw
  lexicon: HALOT
  rationale: Qal wayyiqtol of ראה, straightforward narrative past. English omits the
    conjunction for natural style while preserving sequence.
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct-object marker with 3ms suffix; rendered by the English object
    pronoun.
- source_word: מֵרָחֹק
  chosen: from a distance
  alternatives:
  - from afar
  - far off
  lexicon: HALOT
  rationale: Idiomatic English for the preposition מן plus רָחוֹק. 'From afar' is
    possible but slightly more literary/archaic.
- source_word: וּבְטֶרֶם
  chosen: and before
  alternatives:
  - but before
  - while not yet
  lexicon: HALOT
  rationale: בְּטֶרֶם introduces a temporal clause meaning 'before/not yet.' 'And
    before' best preserves the Hebrew coordination and temporal sense in readable
    English.
- source_word: יִקְרַב אֲלֵיהֶם
  chosen: he came near to them
  alternatives:
  - he approached them
  - he drew near to them
  lexicon: HALOT
  rationale: קרב in the Qal means 'come near, approach.' 'Came near to them' keeps
    the spatial nuance and fits the temporal clause naturally.
- source_word: וַיִּתְנַכְּלוּ
  chosen: they conspired against
  alternatives:
  - they plotted against
  - they dealt deceitfully with
  lexicon: HALOT
  rationale: Hitpael of נכל here denotes scheming/plotting with hostile intent. 'Conspired
    against' captures coordinated malicious planning and fits the following infinitive
    of purpose.
- source_word: לַהֲמִיתוֹ
  chosen: to kill him
  alternatives:
  - in order to put him to death
  lexicon: HALOT
  rationale: 'Hiphil infinitive construct of מות with 3ms suffix expresses purpose/result:
    their conspiracy aimed at his death. ''To kill him'' is the clearest natural rendering.'
