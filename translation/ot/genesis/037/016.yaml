id: GEN.37.16
reference: Genesis 37:16
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אֶת אַחַ֖/י אָנֹכִ֣י מְבַקֵּ֑שׁ הַגִּֽידָ/ה נָּ֣א לִ֔/י אֵיפֹ֖ה
    הֵ֥ם רֹעִֽים־־׃
translation:
  text: He said, “I am looking for my brothers. Please tell me where they are pasturing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “where they are shepherding” / “where they are grazing the flock.” The
      Hebrew participle refers to tending animals at pasture.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. English commonly omits the conjunction
    in smooth narrative unless emphasis on sequence is needed.
- source_word: אֶת אַחַי
  chosen: my brothers
  alternatives:
  - my brothers as the object marker construction
  lexicon: HALOT
  rationale: אֶת marks the definite direct object; אַחַי is 'my brothers.' 'Brothers'
    is gender-accurate and contextually refers to Joseph's male siblings.
- source_word: אָנֹכִי מְבַקֵּשׁ
  chosen: I am looking for
  alternatives:
  - I seek
  - I am seeking
  lexicon: HALOT
  rationale: 'The independent pronoun plus participle gives an ongoing or immediate
    sense: ''I am looking for'' is natural modern English and preserves the progressive
    nuance better than the more formal ''I seek.'''
- source_word: הַגִּידָה נָּא לִי
  chosen: Please tell me
  alternatives:
  - Do tell me
  - Tell me, please
  lexicon: HALOT
  rationale: Hiphil imperative of נגד with enclitic/paragogic ה and particle נָא expresses
    a polite request. 'Please tell me' captures both the imperative and the courteous
    nuance in readable English.
- source_word: אֵיפֹה
  chosen: where
  alternatives:
  - where is it that
  lexicon: HALOT
  rationale: Interrogative adverb asking location. Simple 'where' is the most natural
    equivalent.
- source_word: הֵם
  chosen: they
  lexicon: HALOT
  rationale: Explicit pronoun retained in English as the subject of the following
    participle.
- source_word: רֹעִים
  chosen: are pasturing
  alternatives:
  - are shepherding
  - are grazing the flock
  - are feeding
  lexicon: HALOT
  rationale: Qal participle of רעה in shepherding context. Since the brothers are
    tending flocks, 'are pasturing' preserves the pastoral sense without adding an
    explicit object not present in the Hebrew. 'Are shepherding' is possible but slightly
    less idiomatic in English here.
