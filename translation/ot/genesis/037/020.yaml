id: GEN.37.20
reference: Genesis 37:20
source:
  edition: WLC
  text: וְ/עַתָּ֣ה לְכ֣וּ וְ/נַֽהַרְגֵ֗/הוּ וְ/נַשְׁלִכֵ֨/הוּ֙ בְּ/אַחַ֣ד הַ/בֹּר֔וֹת
    וְ/אָמַ֕רְנוּ חַיָּ֥ה רָעָ֖ה אֲכָלָ֑תְ/הוּ וְ/נִרְאֶ֕ה מַה יִּהְי֖וּ חֲלֹמֹתָֽי/ו׀־׃
translation:
  text: So now, come, let us kill him and throw him into one of the pits, and we will
    say, ‘A vicious wild animal has eaten him.’ Then we will see what becomes of his
    dreams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the cisterns.' The Hebrew בּוֹר can refer to a pit, cistern,
      or well-like holding place depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'a wild beast has devoured him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - Now
  - Come now
  lexicon: HALOT
  rationale: Introduces the brothers' immediate proposal with a discourse marker plus
    temporal adverb. 'So now' preserves both the connective force and urgency in natural
    English.
- source_word: לְכוּ
  chosen: come
  alternatives:
  - go
  - come on
  lexicon: HALOT
  rationale: As an interjection-like plural imperative, it functions idiomatically
    as an exhortation ('come!') rather than a literal command to depart. 'Come' is
    concise and natural in English.
- source_word: וְנַהַרְגֵהוּ
  chosen: let us kill him
  alternatives:
  - and we will kill him
  - let us strike him down
  lexicon: HALOT
  rationale: First common plural cohortative expresses proposed joint action. 'Let
    us kill him' best captures the volitional force.
- source_word: וְנַשְׁלִכֵהוּ
  chosen: throw him
  alternatives:
  - cast him
  - hurl him
  lexicon: HALOT
  rationale: The verb means to throw/cast. 'Throw' is modern and readable while remaining
    faithful.
- source_word: בְּאַחַד הַבֹּרוֹת
  chosen: into one of the pits
  alternatives:
  - into one of the cisterns
  - into one of the wells
  lexicon: HALOT
  rationale: בּוֹר often refers to a pit or cistern. In this narrative setting, 'pit'
    is the clearest general rendering; 'cistern' is possible but more specific than
    the immediate phrase requires.
- source_word: וְאָמַרְנוּ
  chosen: and we will say
  alternatives:
  - then let us say
  - and let us say
  lexicon: HALOT
  rationale: A simple sequential perfect with vav in direct speech planning future
    action. 'And we will say' fits the plotted sequence naturally in English.
- source_word: חַיָּה רָעָה
  chosen: a vicious wild animal
  alternatives:
  - a wild beast
  - a savage animal
  - a harmful beast
  lexicon: HALOT
  rationale: The phrase denotes a dangerous animal of the wild. 'Vicious wild animal'
    communicates both the zoological and threatening sense in contemporary English;
    'wild beast' is traditional but less natural.
- source_word: אֲכָלָתְהוּ
  chosen: has eaten him
  alternatives:
  - devoured him
  - consumed him
  lexicon: HALOT
  rationale: The perfect verb in the fabricated report is naturally rendered in English
    as present perfect after the quoted claim. 'Has eaten him' is straightforward;
    'devoured' is possible but slightly more interpretive.
- source_word: וְנִרְאֶה
  chosen: Then we will see
  alternatives:
  - and we will see
  - let us see
  lexicon: HALOT
  rationale: The form can be taken as a first person plural imperfect/cohortative
    nuance in context. Here it expresses the brothers' anticipated result after their
    scheme. 'Then we will see' captures the taunting consequential sense.
- source_word: מַה יִּהְיוּ חֲלֹמֹתָיו
  chosen: what becomes of his dreams
  alternatives:
  - what his dreams will be
  - what will become of his dreams
  lexicon: HALOT
  rationale: 'An idiomatic English rendering of the clause''s sense: they mockingly
    challenge the outcome of Joseph''s dreams. ''What becomes of his dreams'' is concise
    and natural while preserving the future-oriented force.'
