id: GEN.37.28
reference: Genesis 37:28
source:
  edition: WLC
  text: וַ/יַּֽעַבְרוּ֩ אֲנָשִׁ֨ים מִדְיָנִ֜ים סֹֽחֲרִ֗ים וַֽ/יִּמְשְׁכוּ֙ וַ/יַּֽעֲל֤וּ אֶת יוֹסֵף֙ מִן הַ/בּ֔וֹר וַ/יִּמְכְּר֧וּ אֶת יוֹסֵ֛ף לַ/יִּשְׁמְעֵאלִ֖ים בְּ/עֶשְׂרִ֣ים כָּ֑סֶף וַ/יָּבִ֥יאוּ אֶת יוֹסֵ֖ף מִצְרָֽיְמָ/ה־־־־׃
translation:
  text: Then Midianite men, traders, passed by; and they pulled and lifted Joseph up out of the pit, and sold Joseph to the Ishmaelites for twenty pieces of silver. Then they brought Joseph to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for twenty silver''; the unit is not explicitly stated, hence ''pieces of silver.'''
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses plural verbs ('they pulled,' 'they brought up,' 'they sold,' 'they brought') after mentioning both Midianite traders and Ishmaelites, leaving some ambiguity about which group is in view at each step.
    reason: alternative_reading
  - marker: c
    text: Or 'they pulled Joseph up and brought him up out of the pit'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: passed by
  alternatives:
  - came by
  - passed along
  lexicon: HALOT
  rationale: The verb עבר in this wayyiqtol context denotes movement past the location. 'Passed by' is natural English and preserves the narrative sense without overinterpreting as arrival.
- source_word: אֲנָשִׁים מִדְיָנִים
  chosen: Midianite men
  alternatives:
  - men of Midian
  - Midianites
  lexicon: HALOT
  rationale: The Hebrew explicitly has 'men, Midianites.' 'Midianite men' preserves both the noun and gentilic more closely than simply 'Midianites,' while remaining readable.
- source_word: סֹחֲרִים
  chosen: traders
  alternatives:
  - merchants
  lexicon: HALOT
  rationale: The participle denotes commercial travelers. 'Traders' is clear modern English; 'merchants' is possible but slightly more formal.
- source_word: וַיִּמְשְׁכוּ
  chosen: they pulled
  alternatives:
  - they drew
  - they hauled
  lexicon: HALOT
  rationale: משך here refers to drawing Joseph up from the pit. 'Pulled' is straightforward and idiomatic in modern English.
- source_word: וַיַּעֲלוּ
  chosen: brought him up
  alternatives:
  - lifted him up
  - raised him up
  lexicon: HALOT
  rationale: עלה with מן הבור expresses upward movement out of the pit. Rendering both verbs distinctly ('pulled' ... 'brought him up') reflects the Hebrew's two-step verbal sequence rather than collapsing them.
- source_word: מִן הַבּוֹר
  chosen: out of the pit
  alternatives:
  - from the pit
  - out of the cistern
  lexicon: HALOT
  rationale: בור can denote a pit or cistern. In this narrative setting 'pit' is the established and sufficiently accurate English term; 'cistern' is possible but less natural here.
- source_word: וַיִּמְכְּרוּ
  chosen: sold
  lexicon: HALOT
  rationale: The verb plainly means 'sold'; no expansion beyond the text is needed.
- source_word: לַיִּשְׁמְעֵאלִים
  chosen: to the Ishmaelites
  lexicon: HALOT
  rationale: The indirect object is explicit. The verse distinguishes Midianite traders from Ishmaelites in the sale transaction, so the translation preserves both group names as given.
- source_word: בְּעֶשְׂרִים כָּסֶף
  chosen: for twenty pieces of silver
  alternatives:
  - for twenty silver shekels
  - for twenty silver pieces
  lexicon: HALOT
  rationale: Literally 'for twenty silver.' English commonly supplies 'pieces of silver.' 'Shekels' is interpretive because the unit is not stated in the Hebrew of this verse.
- source_word: וַיָּבִיאוּ
  chosen: they brought
  alternatives:
  - they took
  lexicon: HALOT
  rationale: The verb means 'bring' or 'cause to come.' 'Brought' best matches the direct object plus destination construction.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is idiomatic and accurate.
