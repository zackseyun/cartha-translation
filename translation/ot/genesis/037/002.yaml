  from: was shepherding the flock with his brothers. Now he was a young man with the sons of Bilhah and with the sons of Zilpah, his father's wives,
  to: was shepherding the flock with his brothers; and he, a youth, was with the sons of Bilhah and the sons of Zilpah, his father's wives,
  rationale: The Hebrew `וְהוּא נַעַר אֶת־בְּנֵי בִלְהָה...` ('and he, a youth, with the sons of Bilhah...') is a circumstantial clause that specifies which brothers from the previous phrase ('his brothers') Joseph was with. The draft's decision to break this into a new sentence starting with 'Now...' creates a slight awkwardness and weakens the direct clarifying relationship between the two phrases. Joining them into a single sentence better reflects the Hebrew syntax and logical flow, making it clear that the sons of the handmaids are the specific brothers in question.
