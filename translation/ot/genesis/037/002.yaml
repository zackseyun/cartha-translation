id: GEN.37.2
reference: Genesis 37:2
source:
  edition: WLC
  text: אֵ֣לֶּה תֹּלְד֣וֹת יַעֲקֹ֗ב יוֹסֵ֞ף בֶּן שְׁבַֽע עֶשְׂרֵ֤ה שָׁנָה֙ הָיָ֨ה רֹעֶ֤ה אֶת אֶחָי/ו֙ בַּ/צֹּ֔אן וְ/ה֣וּא נַ֗עַר אֶת בְּנֵ֥י בִלְהָ֛ה וְ/אֶת בְּנֵ֥י זִלְפָּ֖ה נְשֵׁ֣י אָבִ֑י/ו וַ/יָּבֵ֥א יוֹסֵ֛ף אֶת דִּבָּתָ֥/ם רָעָ֖ה אֶל אֲבִי/הֶֽם׀־־־־־־־׃
translation:
  text: 'These are the generations of Jacob: Joseph, being seventeen years old, was shepherding the flock with his brothers; and he, a youth, was with the sons of Bilhah and the sons of Zilpah, his father''s wives, and Joseph brought a bad report about them to their father.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the account/family history of Jacob.' The Hebrew toledot often introduces a new section in Genesis and can denote what proceeds from a person, not merely biological descendants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their father'; the text explicitly uses the plural possessive, referring to Jacob as the father shared by Joseph and the brothers.
    reason: lexical_alternative
  - marker: c
    text: Or "was shepherding the flock with his brothers. Now he was a young man with the sons of Bilhah and with the sons of Zilpah, his father's wives,".
    reason: previous_rendering
lexical_decisions:
- source_word: תֹּלְדוֹת
  chosen: generations
  alternatives:
  - account
  - family history
  lexicon: HALOT
  rationale: In Genesis this term functions as a structural heading and often carries the sense of lineage/history proceeding from a person. 'Generations' preserves the established technical sense without over-paraphrasing to 'account.'
- source_word: הָיָה רֹעֶה
  chosen: was shepherding
  alternatives:
  - was pasturing
  - was tending
  lexicon: HALOT
  rationale: The participial construction conveys ongoing activity. 'Was shepherding' preserves the verbal connection to shepherding rather than the more generic 'tending.'
- source_word: אֶת אֶחָיו בַּצֹּאן
  chosen: the flock with his brothers
  alternatives:
  - his brothers in the flock
  - his brothers among the sheep
  lexicon: HALOT
  rationale: The Hebrew most naturally indicates Joseph was engaged in flock-work in company with his brothers, not that he was shepherding his brothers. Rendering the object as 'the flock' makes the English syntax clear while staying close to the sense.
- source_word: נַעַר
  chosen: young man
  alternatives:
  - boy
  - youth
  - servant
  lexicon: HALOT
  rationale: Although the term can mean 'boy' or 'youth,' Joseph is already specified as seventeen years old. 'Young man' fits the age and avoids implying small childhood. The servant nuance is not demanded here.
- source_word: אֶת בְּנֵי בִלְהָה וְאֶת בְּנֵי זִלְפָּה
  chosen: with the sons of Bilhah and with the sons of Zilpah
  alternatives:
  - alongside the sons of Bilhah and Zilpah
  - attending the sons of Bilhah and Zilpah
  lexicon: HALOT
  rationale: 'The repeated object marker after נַעַר is syntactically difficult. The sense is best taken appositionally/circumstantially: Joseph was a young man in association with these half-brothers. ''With'' is idiomatic and minimally interpretive.'
- source_word: נְשֵׁי אָבִיו
  chosen: his father's wives
  alternatives:
  - his father's women
  lexicon: HALOT
  rationale: A straightforward possessive phrase identifying Bilhah and Zilpah. 'Wives' is the natural English equivalent in context.
- source_word: דִּבָּתָם רָעָה
  chosen: a bad report about them
  alternatives:
  - an evil report about them
  - their bad reputation/report
  lexicon: HALOT
  rationale: The phrase denotes an unfavorable report. 'Bad report' is natural modern English and does not overstate beyond the Hebrew. 'Evil report' is more traditional but less idiomatic today.
- source_word: אֶל אֲבִיהֶם
  chosen: to their father
  alternatives:
  - to his father
  lexicon: HALOT
  rationale: The pronominal suffix is plural ('their father'), referring to Joseph and the brothers sharing Jacob as father. This should be preserved rather than harmonized to singular for smoother English.
