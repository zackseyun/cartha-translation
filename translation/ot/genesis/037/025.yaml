id: GEN.37.25
reference: Genesis 37:25
source:
  edition: WLC
  text: וַ/יֵּשְׁבוּ֮ לֶֽ/אֱכָל לֶחֶם֒ וַ/יִּשְׂא֤וּ עֵֽינֵי/הֶם֙ וַ/יִּרְא֔וּ וְ/הִנֵּה֙
    אֹרְחַ֣ת יִשְׁמְעֵאלִ֔ים בָּאָ֖ה מִ/גִּלְעָ֑ד וּ/גְמַלֵּי/הֶ֣ם נֹֽשְׂאִ֗ים נְכֹאת֙
    וּ/צְרִ֣י וָ/לֹ֔ט הוֹלְכִ֖ים לְ/הוֹרִ֥יד מִצְרָֽיְמָ/ה־׃
translation:
  text: Then they sat down to eat bread, and they lifted up their eyes and looked,
    and behold, a caravan of Ishmaelites was coming from Gilead, and their camels
    were carrying gum, balm, and myrrh, going to take them down to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ladanum' for 'myrrh'; the Hebrew term לֹט refers to a fragrant resin,
      and its precise identification is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to eat bread,' that is, to eat a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: Then they sat down
  alternatives:
  - And they sat down
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline. 'Then they sat down'
    gives natural English narrative sequence while preserving the concrete action.
- source_word: לֶאֱכָל לֶחֶם
  chosen: to eat bread
  alternatives:
  - to eat a meal
  - to eat food
  lexicon: HALOT
  rationale: Literally 'to eat bread,' a common Hebrew idiom for taking a meal. Main
    text keeps the idiom's concrete wording; alternatives are possible dynamic renderings.
- source_word: וַיִּשְׂאוּ עֵינֵיהֶם
  chosen: they lifted up their eyes
  alternatives:
  - they looked up
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. Retaining 'lifted up their eyes' preserves
    the narrative texture; the following verb 'and looked' completes the sense in
    idiomatic English.
- source_word: וַיִּרְאוּ
  chosen: and looked
  alternatives:
  - and saw
  lexicon: HALOT
  rationale: Because 'behold' follows and the object is introduced afterward, 'looked'
    works smoothly with the preceding idiom and avoids awkward repetition with the
    resulting perception.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there was
  - suddenly
  lexicon: HALOT
  rationale: Marks a vivid narrative introduction. 'Behold' is slightly elevated but
    still transparent and preserves the discourse force better than flattening it.
- source_word: אֹרְחַת יִשְׁמְעֵאלִים
  chosen: a caravan of Ishmaelites
  alternatives:
  - a company of Ishmaelites
  - a traveling party of Ishmaelites
  lexicon: HALOT
  rationale: אֹרְחָה denotes a caravan or traveling company, especially in trade context.
    'Caravan' fits the camels and merchandise named in the verse.
- source_word: בָּאָה מִגִּלְעָד
  chosen: was coming from Gilead
  alternatives:
  - came from Gilead
  lexicon: HALOT
  rationale: The participial-like scene description in context is well represented
    by English progressive aspect, highlighting the caravan as approaching.
- source_word: וּגְמַלֵּיהֶם נֹשְׂאִים
  chosen: and their camels were carrying
  alternatives:
  - with their camels carrying
  - and their camels carrying
  lexicon: HALOT
  rationale: Makes explicit the descriptive clause attached to the caravan. Progressive
    English reflects the ongoing scene.
- source_word: נְכֹאת
  chosen: gum
  alternatives:
  - tragacanth gum
  - gum resin
  - spices
  lexicon: HALOT
  rationale: The exact botanical identification is uncertain, but 'gum' is a standard
    and sufficiently precise rendering without overclaiming a specific species.
- source_word: צְרִי
  chosen: balm
  alternatives:
  - resin
  - balsam
  lexicon: HALOT
  rationale: A well-established rendering for a resinous medicinal/aromatic product
    associated with Gilead. 'Balm' is both traditional and lexically defensible.
- source_word: לֹט
  chosen: myrrh
  alternatives:
  - ladanum
  - resin
  lexicon: HALOT
  rationale: The term likely refers to a fragrant resin; English tradition often has
    'myrrh,' though some identify it as ladanum. Because the identification is uncertain,
    the alternative is preserved in a footnote.
- source_word: הוֹלְכִים לְהוֹרִיד
  chosen: going to take them down
  alternatives:
  - on their way to carry them down
  - going down to bring them
  lexicon: HALOT
  rationale: The plural participle with infinitive expresses purpose/direction. 'Take
    them down' refers to the goods just listed and reflects the idiomatic 'down' to
    Egypt.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - down to Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. Because English
    already has 'take them down,' the destination is rendered simply 'to Egypt' to
    avoid redundancy.
