id: GEN.37.14
reference: Genesis 37:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֗/וֹ לֶךְ נָ֨א רְאֵ֜ה אֶת שְׁל֤וֹם אַחֶ֨י/ךָ֙ וְ/אֶת שְׁל֣וֹם
    הַ/צֹּ֔אן וַ/הֲשִׁבֵ֖/נִי דָּבָ֑ר וַ/יִּשְׁלָחֵ֨/הוּ֙ מֵ/עֵ֣מֶק חֶבְר֔וֹן וַ/יָּבֹ֖א
    שְׁכֶֽמָ/ה־־־׃
translation:
  text: He said to him, “Go now, see whether your brothers are well and whether the
    flock is well, and bring me word.” So he sent him from the Valley of Hebron, and
    he came to Shechem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'see the welfare of your brothers and the welfare of the flock.' The
      Hebrew uses shalom ('peace, welfare, well-being') in both phrases.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶךְ נָא
  chosen: Go now
  alternatives:
  - Please go
  - Go, please
  lexicon: HALOT
  rationale: לֶךְ is the imperative 'go'; נָא adds a particle of entreaty or softening.
    'Go now' preserves the urgency/politeness without sounding overly formal or archaic.
    'Please go' is possible but less natural in this narrative flow.
- source_word: רְאֵה
  chosen: see whether
  alternatives:
  - see
  - look into
  - check on
  lexicon: HALOT
  rationale: ראה literally means 'see,' but in this context it introduces an inquiry
    into the condition of the brothers and flock. 'See whether' keeps the concrete
    verb while making the idiomatic sense clear in English.
- source_word: שְׁלוֹם
  chosen: are well / is well
  alternatives:
  - peace
  - welfare
  - well-being
  lexicon: HALOT
  rationale: שׁלום here refers to welfare or well-being, not merely absence of conflict.
    Rendering it verbally as 'are well / is well' produces natural English while preserving
    the sense of checking their condition.
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your siblings
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'brothers' and refers
    to Joseph's male siblings in context. This follows the gender-accurate principle
    and does not broaden the reference.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צאן can denote small livestock, especially sheep and goats. 'The flock'
    is the most natural collective rendering here and fits the pastoral context without
    over-specifying species.
- source_word: וַהֲשִׁבֵנִי דָּבָר
  chosen: bring me word
  alternatives:
  - bring me back word
  - report to me
  - bring me a report
  lexicon: HALOT
  rationale: The idiom combines שוב in the causative with 'word/matter' to mean reporting
    back. 'Bring me word' is concise, idiomatic English; the sense of return is implicit
    in the reporting context.
- source_word: מֵעֵמֶק חֶבְרוֹן
  chosen: from the Valley of Hebron
  alternatives:
  - from Hebron Valley
  - from the valley of Hebron
  lexicon: HALOT
  rationale: עֵמֶק means 'valley.' Capitalizing 'Valley' is a stylistic choice for
    a geographic designation; 'of Hebron' preserves the construct relation. This is
    more transparent than treating Hebron alone as the point of departure.
- source_word: שְׁכֶמָה
  chosen: to Shechem
  alternatives:
  - Shechemward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Shechem.
    Standard English expresses this simply as 'to Shechem'; the directional nuance
    does not require a special English form.
