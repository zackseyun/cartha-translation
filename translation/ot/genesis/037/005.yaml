id: GEN.37.5
reference: Genesis 37:5
source:
  edition: WLC
  text: וַ/יַּחֲלֹ֤ם יוֹסֵף֙ חֲל֔וֹם וַ/יַּגֵּ֖ד לְ/אֶחָ֑י/ו וַ/יּוֹסִ֥פוּ ע֖וֹד שְׂנֹ֥א
    אֹתֽ/וֹ׃
translation:
  text: Now Joseph dreamed a dream, and he told it to his brothers, and they hated
    him even more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Joseph dreamed a dream.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲלֹם
  chosen: dreamed
  alternatives:
  - had a dream
  lexicon: HALOT
  rationale: From חלם, the basic sense is to dream. English can render the Hebrew
    cognate construction either literally ('dreamed a dream') or idiomatically. Here
    the verbal element is preserved with natural English.
- source_word: חֲלוֹם
  chosen: a dream
  lexicon: HALOT
  rationale: The noun forms a cognate accusative with the verb ('dreamed a dream').
    Retained in English because it is both natural enough and reflects the Hebrew
    emphasis on the event of dreaming.
- source_word: וַיַּגֵּד
  chosen: told it
  alternatives:
  - reported it
  - declared it
  lexicon: HALOT
  rationale: נגד commonly means to tell, report, or make known. 'Told it' is the most
    natural modern English in this narrative context, with 'it' supplied from the
    immediately preceding 'dream.'
- source_word: לְאֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers alone
  lexicon: HALOT
  rationale: The masculine plural noun with 3ms suffix straightforwardly means 'to
    his brothers.' Per translation philosophy, the gendered familial term is preserved
    rather than neutralized.
- source_word: וַיּוֹסִפוּ עוֹד
  chosen: even more
  alternatives:
  - still more
  - yet more
  - continued further
  lexicon: HALOT
  rationale: 'The combination of יסף with עוד intensifies increase: they added still
    more to their hatred. ''Even more'' is concise, idiomatic, and captures the comparative
    escalation.'
- source_word: שְׂנֹא אֹתוֹ
  chosen: hated him
  alternatives:
  - to hate him
  lexicon: HALOT
  rationale: The infinitive construct after יסף yields the sense 'they added to hate
    him' = 'they hated him more.' English finite verbal rendering is required for
    natural syntax.
- source_word: וַ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw advances the narrative. 'Now' is a common and natural
    English discourse marker at the start of a new development, while still reflecting
    narrative continuity.
