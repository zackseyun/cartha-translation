  from: on all that he had, in the house and in the field
  to: on everything he had, both in the house and in the field
  rationale: The Hebrew phrase 'in the house and in the field' is a merism that specifies the domains covered by 'all that he had.' The current rendering connects these two phrases with a simple comma, which is grammatically correct but slightly abrupt. Using 'everything' instead of 'all that' and adding 'both' creates a more fluid and integrated clause in English, clarifying that the final phrase defines the total scope of Potiphar's possessions.
