id: GEN.39.2
reference: Genesis 39:2
source:
  edition: WLC
  text: וַ/יְהִ֤י יְהוָה֙ אֶת יוֹסֵ֔ף וַ/יְהִ֖י אִ֣ישׁ מַצְלִ֑יחַ וַ/יְהִ֕י בְּ/בֵ֥ית אֲדֹנָ֖י/ו הַ/מִּצְרִֽי־׃
translation:
  text: Yahweh was with Joseph, and he became a successful man; and he was in the house of his Egyptian master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prosperous man.' The Hebrew participle can denote one who prospers or succeeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת יוֹסֵף
  chosen: with Joseph
  alternatives:
  - with Yosef
  lexicon: HALOT
  rationale: The construction 'YHWH was with Joseph' is idiomatic for divine presence and favor. 'Joseph' follows standard English transliteration conventions.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine singular and here refers specifically to Joseph, an individual male. Per the gender-accurate policy, 'man' is the appropriate rendering.
- source_word: מַצְלִיחַ
  chosen: successful
  alternatives:
  - prosperous
  - causing to prosper
  - prospering
  lexicon: HALOT
  rationale: The participial form from צלח conveys prospering/succeeding. 'Successful' gives natural modern English in predication with 'man' while preserving the sense that Joseph's endeavors were prospering because the LORD was with him. 'Prosperous' is possible, but in English can suggest chiefly financial wealth, which is narrower than the Hebrew here.
- source_word: בְּבֵית
  chosen: in the house of
  alternatives:
  - in the household of
  lexicon: HALOT
  rationale: The phrase literally means 'in the house of.' While it can imply household establishment, the more literal rendering fits the narrative setting and remains clear in English.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: In this context of Joseph's status in Egypt, אֲדוֹן refers to the one who has authority over him in the household. 'Master' is the most natural contextual rendering; 'lord' would sound overly elevated in English and could confuse with divine usage.
- source_word: הַמִּצְרִי
  chosen: Egyptian
  alternatives:
  - the Egyptian
  lexicon: HALOT
  rationale: Used attributively with 'master,' the adjective identifies the master's ethnicity. English idiom prefers 'his Egyptian master' rather than the more wooden 'his master, the Egyptian,' though the latter is also possible.
- source_word: וַיְהִי ... וַיְהִי ... וַיְהִי
  chosen: was ... became ... was
  alternatives:
  - came to pass ... was ... was
  - was ... was ... was
  lexicon: HALOT
  rationale: The repeated wayyiqtol of היה structures the verse. Rendering the middle clause as 'he became a successful man' captures the predicative development in smoother English, while preserving the sequence of states described in Hebrew.
