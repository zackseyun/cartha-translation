id: GEN.39.15
reference: Genesis 39:15
source:
  edition: WLC
  text: וַ/יְהִ֣י כְ/שָׁמְע֔/וֹ כִּֽי הֲרִימֹ֥תִי קוֹלִ֖/י וָ/אֶקְרָ֑א וַ/יַּעֲזֹ֤ב
    בִּגְד/וֹ֙ אֶצְלִ֔/י וַ/יָּ֖נָס וַ/יֵּצֵ֥א הַ/חֽוּצָ/ה־׃
translation:
  text: And when he heard that I had raised my voice and cried out, he left his garment
    beside me and fled and went outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I lifted up my voice and called out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he left his garment with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְשָׁמְעוֹ
  chosen: And when he heard
  alternatives:
  - And it happened, when he heard
  - When he heard
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי plus temporal כְּ + infinitive is
    naturally rendered in English as a temporal clause. 'And when he heard' preserves
    the sequence without woodenly reproducing 'and it happened.'
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what he heard: that she had raised
    her voice and cried out. ''That'' best fits the syntax and sense.'
- source_word: הֲרִימֹתִי קוֹלִי
  chosen: I had raised my voice
  alternatives:
  - I lifted up my voice
  - I raised my voice
  lexicon: HALOT
  rationale: The idiom literally means 'I lifted my voice.' 'I had raised my voice'
    is idiomatic modern English and reflects the prior action relative to 'he heard.'
- source_word: וָאֶקְרָא
  chosen: and cried out
  alternatives:
  - and called out
  - and shouted
  lexicon: HALOT
  rationale: קרא in this context denotes a loud cry for help/alarm. 'Cried out' is
    natural and suitably urgent without over-specifying the content.
- source_word: וַיַּעֲזֹב בִּגְדוֹ
  chosen: he left his garment
  alternatives:
  - he left his clothing
  - he abandoned his garment
  lexicon: HALOT
  rationale: בגד commonly means garment/clothing. Singular 'garment' matches the Hebrew
    singular and the immediate narrative detail.
- source_word: אֶצְלִי
  chosen: beside me
  alternatives:
  - with me
  - by me
  - near me
  lexicon: HALOT
  rationale: The preposition indicates proximity or presence with someone. 'Beside
    me' communicates physical nearness clearly in English and fits the scene better
    than the more ambiguous 'with me.'
- source_word: וַיָּנָס
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: נוס means to flee. 'Fled' is concise and preserves the force of sudden
    escape.
- source_word: וַיֵּצֵא הַחוּצָה
  chosen: and went outside
  alternatives:
  - and went out
  - and went out to the outside
  lexicon: HALOT
  rationale: The verb plus directional noun/adverb indicates movement out of the house.
    'Went outside' is idiomatic and preserves the directional sense.
