id: GEN.39.12
reference: Genesis 39:12
source:
  edition: WLC
  text: וַ/תִּתְפְּשֵׂ֧/הוּ בְּ/בִגְד֛/וֹ לֵ/אמֹ֖ר שִׁכְבָ֣/ה עִמִּ֑/י וַ/יַּעֲזֹ֤ב
    בִּגְד/וֹ֙ בְּ/יָדָ֔/הּ וַ/יָּ֖נָס וַ/יֵּצֵ֥א הַ/חֽוּצָ/ה׃
translation:
  text: Then she grabbed him by his garment, saying, “Lie with me!” But he left his
    garment in her hand and fled and went outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sleep with me!” The Hebrew idiom literally uses “lie” for a sexual proposition.
    reason: lexical_alternative
  - marker: b
    text: “Garment” could also be rendered “cloak” or “robe”; the Hebrew term is general
      for an article of clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְפְּשֵׂהוּ
  chosen: she grabbed him
  alternatives:
  - she seized him
  - she caught hold of him
  lexicon: HALOT
  rationale: תפשׂ conveys taking hold of someone or something firmly. 'Grabbed' is
    vivid, natural English and fits the sudden physical action in context.
- source_word: בְּבִגְדוֹ / בִּגְדוֹ
  chosen: by his garment / his garment
  alternatives:
  - by his cloak / his cloak
  - by his robe / his robe
  lexicon: HALOT
  rationale: בגד is a general term for clothing or garment. 'Garment' preserves the
    lexical breadth without over-specifying the type of clothing. The first occurrence
    with בְ marks what she seized; idiomatic English expresses this as 'by his garment.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct introduces direct speech. 'Saying' closely reflects
    the Hebrew discourse form while remaining natural in English.
- source_word: שִׁכְבָה עִמִּי
  chosen: Lie with me!
  alternatives:
  - Sleep with me!
  lexicon: HALOT
  rationale: שׁכב with עִם is a sexual euphemism. 'Lie with me' preserves the idiomatic
    and literary force of the Hebrew better than the more colloquial 'sleep with me,'
    while still being understandable in modern English.
- source_word: וַיַּעֲזֹב
  chosen: he left
  alternatives:
  - he abandoned
  - he let go of
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, or abandon. Here the object is his
    garment, and 'left' is the most natural contextual rendering.
- source_word: בְּיָדָהּ
  chosen: in her hand
  alternatives:
  - in her grasp
  lexicon: HALOT
  rationale: יד literally means 'hand.' The phrase indicates that the garment remained
    physically in her possession. 'In her hand' is both literal and idiomatic.
- source_word: וַיָּנָס
  chosen: fled
  alternatives:
  - ran away
  lexicon: HALOT
  rationale: נוס denotes fleeing, often in urgent escape. 'Fled' preserves the intensity
    and compactness of the Hebrew narrative style.
- source_word: וַיֵּצֵא הַחוּצָה
  chosen: went outside
  alternatives:
  - went out outdoors
  - went out to the outside
  lexicon: HALOT
  rationale: יצא plus החוצה expresses movement out from the interior to the outside.
    'Went outside' is idiomatic modern English and preserves the directional sense.
