id: GEN.39.9
reference: Genesis 39:9
source:
  edition: WLC
  text: אֵינֶ֨/נּוּ גָד֜וֹל בַּ/בַּ֣יִת הַ/זֶּה֮ מִמֶּ/נִּי֒ וְ/לֹֽא חָשַׂ֤ךְ מִמֶּ֨/נִּי֙
    מְא֔וּמָה כִּ֥י אִם אוֹתָ֖/ךְ בַּ/אֲשֶׁ֣ר אַתְּ אִשְׁתּ֑/וֹ וְ/אֵ֨יךְ אֶֽעֱשֶׂ֜ה
    הָ/רָעָ֤ה הַ/גְּדֹלָה֙ הַ/זֹּ֔את וְ/חָטָ֖אתִי לֵֽ/אלֹהִֽים־־־׃
translation:
  text: There is no one greater in this house than I am, and he has withheld nothing
    from me except you, because you are his wife. So how could I do this great evil
    and sin against God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'No one in this house is greater than I.' The Hebrew literally negates
      the existence of anyone greater than Joseph within the house.
    reason: lexical_alternative
  - marker: b
    text: Or, 'this great wickedness.' The Hebrew רָעָה can denote evil, wickedness,
      or wrong.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵינֶנּוּ גָדוֹל ... מִמֶּנִּי
  chosen: There is no one greater ... than I am
  alternatives:
  - He is not greater ... than I am
  - No one in this house is greater than I
  lexicon: HALOT
  rationale: 'The Hebrew construction with אֵין + adjective expresses nonexistence:
    ''there is not [one] greater.'' In context Joseph is stating his rank within the
    household, so idiomatic English is ''There is no one greater in this house than
    I am.'' This avoids the less likely reading that a specific male person ''is not
    greater.'''
- source_word: בַּבַּיִת הַזֶּה
  chosen: in this house
  alternatives:
  - in this household
  lexicon: HALOT
  rationale: בַּיִת can mean physical house or household/estate. Here Potiphar's domestic
    sphere and administration are in view. 'House' is natural and sufficiently broad
    in English, while preserving the Hebrew image.
- source_word: חָשַׂךְ מִמֶּנִּי מְאוּמָה
  chosen: has withheld nothing from me
  alternatives:
  - has kept back nothing from me
  - has denied me nothing
  lexicon: HALOT
  rationale: חָשַׂךְ in this construction means to withhold or keep back. מְאוּמָה
    means 'anything/nothing' depending on negation. 'Has withheld nothing from me'
    is both accurate and idiomatic.
- source_word: כִּי אִם אוֹתָךְ
  chosen: except you
  alternatives:
  - but only you
  lexicon: HALOT
  rationale: 'כִּי אִם after a negation marks exception: ''except, but only.'' ''Except
    you'' is the clearest concise rendering.'
- source_word: בַּאֲשֶׁר אַתְּ אִשְׁתּוֹ
  chosen: because you are his wife
  alternatives:
  - inasmuch as you are his wife
  - since you are his wife
  lexicon: HALOT
  rationale: The preposition plus relative particle introduces the reason for the
    exception. 'Because you are his wife' communicates the causal force in natural
    English.
- source_word: וְאֵיךְ
  chosen: So how could I
  alternatives:
  - And how could I
  - How then could I
  lexicon: HALOT
  rationale: וְאֵיךְ introduces Joseph's moral conclusion from the preceding facts.
    'So how could I' captures the inferential force in readable modern English.
- source_word: אֶעֱשֶׂה
  chosen: do
  alternatives:
  - commit
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' Because the object already specifies
    'this great evil,' 'do' is sufficient and closer to the Hebrew than the more interpretive
    'commit.'
- source_word: הָרָעָה הַגְּדֹלָה הַזֹּאת
  chosen: this great evil
  alternatives:
  - this great wickedness
  - this great wrong
  lexicon: HALOT
  rationale: רָעָה denotes evil, wrong, or wickedness. 'This great evil' preserves
    the moral weight and the demonstrative structure of the Hebrew while remaining
    natural English.
- source_word: וְחָטָאתִי לֵאלֹהִים
  chosen: and sin against God
  alternatives:
  - and sin to God
  lexicon: HALOT
  rationale: חטא with ל can denote sinning against someone. English idiom requires
    'against God.' Capitalized 'God' reflects אֱלֹהִים here as the true God in Joseph's
    speech, not a generic deity.
