theological_decisions:
- issue: Referent of אֱלֹהִים in Joseph's speech
  chosen_reading: God
  alternative_readings:
  - a god
  - god
  rationale: In Genesis narrative, Joseph consistently speaks with reference to the
    God he worships, and the moral claim transcends merely social offense. Rendering
    אֱלֹהִים as 'God' best reflects the narrative theology and standard English usage
    for Israel's God in this context.
