id: GEN.39.16
reference: Genesis 39:16
source:
  edition: WLC
  text: וַ/תַּנַּ֥ח בִּגְד֖/וֹ אֶצְלָ֑/הּ עַד בּ֥וֹא אֲדֹנָ֖י/ו אֶל בֵּיתֽ/וֹ־־׃
translation:
  text: So she kept his garment beside her until his master came home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to his house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּנַּח
  chosen: So she kept
  alternatives:
  - and she laid down
  - and she left
  - and she placed
  lexicon: HALOT
  rationale: The verb from נוח in the Hiphil/waw-consecutive narrative form can mean
    'set down, lay, leave.' In context, Potiphar's wife retains Joseph's garment as
    evidence for her accusation, so 'kept' best conveys the narrative function in
    natural English while staying within the semantic range.
- source_word: בִּגְדוֹ
  chosen: his garment
  alternatives:
  - his cloak
  - his robe
  lexicon: HALOT
  rationale: בגד is a general term for clothing/garment. 'Garment' is broad and contextually
    appropriate, avoiding over-specification where the Hebrew does not require a particular
    article of clothing.
- source_word: אֶצְלָהּ
  chosen: beside her
  alternatives:
  - with her
  - by her
  lexicon: HALOT
  rationale: אצל commonly denotes proximity, 'beside/near/with.' 'Beside her' preserves
    the spatial sense more clearly than the broader 'with her.'
- source_word: עַד בּוֹא
  chosen: until ... came
  alternatives:
  - until the coming of
  - until ... arrived
  lexicon: HALOT
  rationale: 'The preposition plus infinitive construct expresses a temporal limit.
    English idiom prefers a finite clause: ''until ... came.'''
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: In the Joseph-slavery context, אֲדוֹן refers to Joseph's human superior,
    Potiphar. 'Master' is the most natural contextual rendering in English for a slave's
    owner/household superior; 'lord' would sound overly elevated here.
- source_word: אֶל בֵּיתוֹ
  chosen: home
  alternatives:
  - to his house
  - into his house
  lexicon: HALOT
  rationale: Literally 'to his house.' In English narrative, 'came home' is a natural
    equivalent that preserves the sense without unnecessary stiffness. The destination
    is implicit in 'home.'
