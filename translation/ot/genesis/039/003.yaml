theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly attributes Joseph's success to Israel's covenant
    God. Following the project's doctrine, the Tetragrammaton is rendered 'the LORD'
    rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of idiomatic smoothing in בְּיָדוֹ
  chosen_reading: retain 'in his hand' in the main text
  alternative_readings:
  - through his hand
  - under his direction
  rationale: The phrase is idiomatic, but not opaque in English. Retaining it preserves
    the concrete Hebrew imagery and avoids over-resolving whether the nuance is instrumentality,
    agency, or sphere of action.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source-text sense without unnecessary paraphrase'
