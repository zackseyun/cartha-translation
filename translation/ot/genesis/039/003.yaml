id: GEN.39.3
reference: Genesis 39:3
source:
  edition: WLC
  text: וַ/יַּ֣רְא אֲדֹנָ֔י/ו כִּ֥י יְהוָ֖ה אִתּ֑/וֹ וְ/כֹל֙ אֲשֶׁר ה֣וּא עֹשֶׂ֔ה
    יְהוָ֖ה מַצְלִ֥יחַ בְּ/יָדֽ/וֹ־׃
translation:
  text: His master saw that the LORD was with him, and that the LORD made everything
    he did prosper in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through his hand' or 'under his direction'; Hebrew literally 'in his
      hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - observed
  - noticed
  lexicon: HALOT
  rationale: The verb ראה in the wayyiqtol narrative form straightforwardly means
    'saw.' In context it includes perception based on evidence, but 'saw' preserves
    the Hebrew narrative simplicity without over-interpreting.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: Refers to Potiphar as Joseph's superior/master in a household-slave context.
    'His master' is idiomatic modern English and fits the social setting better than
    the potentially misleading 'lord.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This also matches established English convention for the Tetragrammaton.
- source_word: אִתּוֹ
  chosen: was with him
  alternatives:
  - was with Joseph
  lexicon: HALOT
  rationale: The prepositional phrase denotes divine presence with Joseph. 'Was with
    him' is the natural English rendering and preserves the pronoun linkage to the
    immediate context.
- source_word: וְכֹל אֲשֶׁר הוּא עֹשֶׂה
  chosen: everything he did
  alternatives:
  - all that he was doing
  - everything he was doing
  lexicon: HALOT
  rationale: The Hebrew expression means 'all that he was doing/does.' English narrative
    style is smoother with 'everything he did,' which still captures the comprehensive
    scope.
- source_word: מַצְלִיחַ
  chosen: made ... prosper
  alternatives:
  - caused ... to succeed
  - gave success to
  lexicon: HALOT
  rationale: 'The Hiphil of צלח is causative: the LORD causes Joseph''s work to succeed.
    ''Made ... prosper'' is natural English and preserves divine agency.'
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - under his hand
  - through his hand
  lexicon: HALOT
  rationale: Literally 'in his hand.' Here it conveys the sphere/instrumentality of
    Joseph's activity. Retaining 'in his hand' preserves the Hebrew idiom while remaining
    understandable in English, especially with 'made everything he did prosper' preceding
    it.
