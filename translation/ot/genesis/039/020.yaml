id: GEN.39.20
reference: Genesis 39:20
source:
  edition: WLC
  text: וַ/יִּקַּח֩ אֲדֹנֵ֨י יוֹסֵ֜ף אֹת֗/וֹ וַֽ/יִּתְּנֵ֨/הוּ֙ אֶל בֵּ֣ית הַ/סֹּ֔הַר
    מְק֕וֹם אֲשֶׁר אסורי הַ/מֶּ֖לֶךְ אֲסוּרִ֑ים וַֽ/יְהִי שָׁ֖ם בְּ/בֵ֥ית הַ/סֹּֽהַר־־־׃
translation:
  text: So Yosef’s master took him and put him into the prison, the place where the
    king’s prisoners were confined. And he was there in the prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the house of the sohar,' an Egyptian term for a prison
      or detention house.
    reason: cultural_note
  - marker: b
    text: 'Hebrew repeats the root for ''bind/imprison'': literally, ''where the king’s
      prisoners were imprisoned.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנֵי יוֹסֵף
  chosen: Yosef’s master
  alternatives:
  - the lord of Yosef
  - Joseph's master
  lexicon: HALOT
  rationale: אדון in construct with Yosef denotes his human owner/master in this narrative
    context, not a divine title. 'Master' is natural modern English and fits the household-slavery
    setting better than 'lord.' The name is transliterated as 'Yosef' per project
    philosophy.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  lexicon: HALOT
  rationale: לקח commonly means 'take.' Here it introduces Potiphar's action toward
    Yosef without requiring the more forceful 'seized,' which would overstate the
    verb absent explicit intensification.
- source_word: וַיִּתְּנֵהוּ אֶל
  chosen: put him into
  alternatives:
  - gave him over to
  - placed him in
  lexicon: HALOT
  rationale: נתן plus אֶל in this context means to place/put someone into a location.
    'Put him into' is idiomatic and preserves the concrete movement into confinement.
- source_word: בֵּית הַסֹּהַר
  chosen: the prison
  alternatives:
  - the jail
  - the house of confinement
  lexicon: HALOT
  rationale: Literally 'house of the sohar,' an Egyptian prison term. In context it
    clearly denotes a prison. 'Prison' is the most natural modern equivalent; the
    more literal 'house of confinement' would be opaque.
- source_word: מְקוֹם אֲשֶׁר
  chosen: the place where
  alternatives:
  - where
  lexicon: HALOT
  rationale: The Hebrew explicitly apposes the prison as 'the place where...' Retaining
    'the place where' preserves the explanatory apposition rather than compressing
    it away.
- source_word: אֲסוּרֵי הַמֶּלֶךְ אֲסוּרִים
  chosen: the king’s prisoners were confined
  alternatives:
  - the prisoners of the king were imprisoned
  - the king's bound ones were held
  lexicon: HALOT
  rationale: The construction uses the passive participle/root אסר twice, first in
    construct ('prisoners of') and then predicatively ('were confined/imprisoned').
    English smooths the repetition while preserving the sense. 'The king’s prisoners
    were confined' avoids awkward redundancy yet reflects the Hebrew emphasis on incarceration.
- source_word: וַיְהִי שָׁם
  chosen: And he was there
  alternatives:
  - and he remained there
  lexicon: HALOT
  rationale: היה with שם states Yosef's resulting presence in that place. 'He was
    there' is the plain sense; 'remained' adds durative nuance not explicit in the
    verb.
- source_word: בְּבֵית הַסֹּהַר
  chosen: in the prison
  alternatives:
  - in the jail
  lexicon: HALOT
  rationale: The phrase repeats the location for emphasis. Rendering it again as 'in
    the prison' preserves the Hebrew repetition rather than omitting it as stylistic
    redundancy.
