id: GEN.39.23
reference: Genesis 39:23
source:
  edition: WLC
  text: אֵ֣ין שַׂ֣ר בֵּית הַ/סֹּ֗הַר רֹאֶ֤ה אֶֽת כָּל מְא֨וּמָה֙ בְּ/יָד֔/וֹ בַּ/אֲשֶׁ֥ר יְהוָ֖ה אִתּ֑/וֹ וַֽ/אֲשֶׁר ה֥וּא עֹשֶׂ֖ה יְהוָ֥ה מַצְלִֽיחַ׀־־־־׃ס
translation:
  text: The chief of the prison paid attention to nothing that was in his hand, because Yahweh was with him; and whatever he did, Yahweh made prosper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerned himself with nothing' or 'saw nothing' that was in Joseph's charge.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in his hand,' an idiom for what was entrusted to his control.
    reason: cultural_note
  - marker: c
    text: Or 'the LORD caused to succeed' whatever he did.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר בֵּית הַסֹּהַר
  chosen: the chief of the prison
  alternatives:
  - the keeper of the prison
  - the captain/official of the prison house
  lexicon: HALOT
  rationale: שַׂר denotes a chief, ruler, or official rather than a mere guard. בֵּית הַסֹּהַר is the prison. 'Chief of the prison' preserves the administrative sense while remaining natural English.
- source_word: אֵין ... רֹאֶה
  chosen: paid attention to nothing
  alternatives:
  - saw nothing
  - concerned himself with nothing
  - looked after nothing
  lexicon: HALOT
  rationale: The idiom 'there is not ... seeing' in context means the prison chief did not inspect or concern himself with matters entrusted to Joseph. 'Paid attention to nothing' captures the functional sense better than the overly literal 'saw nothing.'
- source_word: כָּל מְאוּמָה
  chosen: nothing
  alternatives:
  - anything
  - not a single thing
  lexicon: HALOT
  rationale: 'With אֵין, the phrase yields a strong negation: ''nothing at all'' or ''anything.'' ''Nothing'' is concise and idiomatic in English.'
- source_word: בְּיָדוֹ
  chosen: that was in his hand
  alternatives:
  - under his authority
  - in his charge
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in his hand,' referring to what had been entrusted to Joseph's control. Retaining 'in his hand' preserves the concrete Hebrew image while remaining understandable.
- source_word: בַּאֲשֶׁר יְהוָה אִתּוֹ
  chosen: because the LORD was with him
  alternatives:
  - inasmuch as the LORD was with him
  - since the LORD was with him
  lexicon: HALOT
  rationale: The preposition with אֲשֶׁר here gives a causal sense in context. 'Because' expresses the reason for the prison chief's confidence in Joseph.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַאֲשֶׁר הוּא עֹשֶׂה
  chosen: whatever he did
  alternatives:
  - whatever he was doing
  - whatever he made/did
  lexicon: HALOT
  rationale: This relative construction is idiomatically rendered 'whatever he did,' referring comprehensively to Joseph's activities.
- source_word: מַצְלִיחַ
  chosen: made prosper
  alternatives:
  - caused to succeed
  - gave success to
  lexicon: HALOT
  rationale: 'The Hiphil of צלח is causative: the LORD caused Joseph''s work to prosper or succeed. ''Made prosper'' is concise, natural, and preserves the causative force.'
