id: GEN.39.17
reference: Genesis 39:17
source:
  edition: WLC
  text: וַ/תְּדַבֵּ֣ר אֵלָ֔י/ו כַּ/דְּבָרִ֥ים הָ/אֵ֖לֶּה לֵ/אמֹ֑ר בָּֽא אֵלַ֞/י הָ/עֶ֧בֶד
    הָֽ/עִבְרִ֛י אֲשֶׁר הֵבֵ֥אתָ לָּ֖/נוּ לְ/צַ֥חֶק בִּֽ/י־־׃
translation:
  text: Then she spoke to him with words like these, saying, “The Hebrew slave whom
    you brought to us came to me to mock me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to make sport of me,” possibly with a sexual or abusive nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּדַבֵּר
  chosen: Then she spoke
  alternatives:
  - And she spoke
  - Then she said
  lexicon: HALOT
  rationale: Wayyiqtol of דבר advances the narrative. 'Then she spoke' preserves the
    sequential force while remaining natural English.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Potiphar
  lexicon: HALOT
  rationale: The pronominal object refers to her husband in context. The translation
    keeps the pronoun as in the Hebrew rather than substituting the name.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: with words like these
  alternatives:
  - according to these words
  - in these terms
  lexicon: HALOT
  rationale: The idiom introduces the substance of her report rather than requiring
    a wooden rendering. 'With words like these' captures the comparative כ and the
    plural 'words' naturally.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech.
- source_word: בָּא אֵלַי
  chosen: came to me
  alternatives:
  - came in to me
  lexicon: HALOT
  rationale: בוא plus אל marks motion toward her. 'Came to me' is the plain sense.
    'Came in to me' could suggest a sexual euphemism more strongly than the Hebrew
    itself here, since the accusation is clarified by the following infinitive phrase.
- source_word: הָעֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: עבד here denotes a socially subordinate household bondman. In keeping
    with the project's philosophy, 'slave' better reflects the bonded status than
    the softer 'servant'.
- source_word: הָעִבְרִי
  chosen: Hebrew
  alternatives:
  - Hebrew man
  lexicon: HALOT
  rationale: The ethnic designation is adjectival/appositional to 'slave.' 'Hebrew'
    is concise and natural in English.
- source_word: אֲשֶׁר הֵבֵאתָ לָּנוּ
  chosen: whom you brought to us
  alternatives:
  - whom you brought among us
  - whom you brought here to us
  lexicon: HALOT
  rationale: Retains her accusatory wording toward Potiphar and the first person plural
    pronoun, which likely refers to the household from her perspective.
- source_word: לְצַחֶק בִּי
  chosen: to mock me
  alternatives:
  - to laugh at me
  - to make sport of me
  - to toy with me
  lexicon: HALOT
  rationale: צחק in this context carries a hostile or sexually abusive nuance in accusation
    narratives. 'Mock me' preserves the derisive force without over-specifying beyond
    the Hebrew. Because the expression can also imply sexual violation or abusive
    sport in context, an alternative is preserved in a footnote.
