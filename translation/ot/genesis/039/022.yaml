  from: he was the one doing it
  to: he was the one who did it
  rationale: The current rendering accurately captures the emphatic pronoun (הוּא) and the durative aspect of the verb (הָיָה עֹשֶׂה). However, the phrasing 'he was the one doing it' is slightly stilted in English. A rewrite like 'he was the one who did it' or 'it was he who did it' preserves the emphasis on Joseph's agency using a more natural English construction (a relative or cleft sentence) while still conveying the sense that he was the responsible party for all the work.
