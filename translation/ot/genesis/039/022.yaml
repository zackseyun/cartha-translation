id: GEN.39.22
reference: Genesis 39:22
source:
  edition: WLC
  text: וַ/יִּתֵּ֞ן שַׂ֤ר בֵּית הַ/סֹּ֨הַר֙ בְּ/יַד יוֹסֵ֔ף אֵ֚ת כָּל הָ֣/אֲסִירִ֔ם אֲשֶׁ֖ר בְּ/בֵ֣ית הַ/סֹּ֑הַר וְ/אֵ֨ת כָּל אֲשֶׁ֤ר עֹשִׂים֙ שָׁ֔ם ה֖וּא הָיָ֥ה עֹשֶֽׂה־־־־׃
translation:
  text: And the chief of the prison put into Yosef’s hand all the prisoners who were in the prison, and whatever was done there, he was the one who did it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into Yosef’s hand,'' an idiom meaning that the prisoners were entrusted to his control.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and all that was done there, he did it'; the Hebrew emphasizes Yosef’s active oversight and responsibility for the prison’s operations.
    reason: alternative_reading
  - marker: c
    text: Or 'he was the one doing it'.
    reason: previous_rendering
lexical_decisions:
- source_word: שַׂר בֵּית הַסֹּהַר
  chosen: the chief of the prison
  alternatives:
  - the warden of the prison
  - the captain of the prison house
  lexicon: HALOT
  rationale: שַׂר denotes an official, chief, or overseer. In this context it refers to the official in charge of the prison. 'Chief of the prison' stays close to the Hebrew while remaining natural English.
- source_word: בְּיַד יוֹסֵף
  chosen: into Yosef’s hand
  alternatives:
  - to Yosef
  - under Yosef’s authority
  lexicon: HALOT
  rationale: The idiom 'into the hand of' conveys entrusting or placing under someone's control. Retaining 'hand' preserves the Hebrew imagery while still being understandable in English.
- source_word: יוֹסֵף
  chosen: Yosef
  alternatives:
  - Joseph
  rationale: Per translation philosophy, personal names are transliterated rather than translated according to inherited English convention.
- source_word: כָּל הָאֲסִירִם
  chosen: all the prisoners
  alternatives:
  - all the captives
  - all the confined men
  lexicon: HALOT
  rationale: אֲסִירִים refers to those bound or imprisoned. 'Prisoners' is the clearest natural rendering in this prison context.
- source_word: אֲשֶׁר בְּבֵית הַסֹּהַר
  chosen: who were in the prison
  alternatives:
  - who were in the prison house
  lexicon: HALOT
  rationale: This relative clause specifies the prisoners located in the prison. 'Prison' is more natural modern English than 'prison house' while preserving the sense.
- source_word: וְאֵת כָּל אֲשֶׁר עֹשִׂים שָׁם
  chosen: and whatever was done there
  alternatives:
  - and all that was done there
  - and everything they did there
  lexicon: HALOT
  rationale: 'The plural participle עֹשִׂים is an indefinite active form (''they do''), often rendered idiomatically in English as a passive: ''was done.'' This best captures the Hebrew sense of all activity carried out there without forcing an explicit subject.'
- source_word: הוּא הָיָה עֹשֶׂה
  chosen: he was the one doing it
  alternatives:
  - he did it
  - he was doing it
  - he was the one who did it
  lexicon: HALOT
  rationale: 'The pronoun הוּא is emphatic, and the היה + participle construction expresses ongoing or characteristic action. ''He was the one doing it'' preserves both the emphasis and the durative nuance: Yosef was effectively responsible for what was done there.'
