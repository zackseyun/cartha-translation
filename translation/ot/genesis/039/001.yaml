theological_decisions:
- issue: Meaning of סְרִיס in Potiphar's title
  chosen_reading: Rendered as 'officer of Pharaoh' in the main text
  alternative_readings:
  - '''eunuch of Pharaoh'''
  rationale: The Hebrew term can denote a literal eunuch or a court official. Since the narrative does not require the biological sense here, the broader administrative sense is preferred in the main text, while preserving the alternative in a footnote for transparency.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive tension where genuine ambiguity exists)
revisions:
- timestamp: '2026-04-21T00:19:43Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/039/001.json
  category: awkward_english
  tier: 1
  from: an Egyptian man
  to: an Egyptian
  rationale: The current rendering is a literal translation of 'אִישׁ מִצְרִ֔י'. However, in the context of a list of appositives following a named individual ('Potiphar'), the inclusion of 'man' is redundant in English and makes the phrase slightly cumbersome. The more natural English rendering 'an Egyptian' conveys the essential information—his nationality—without the awkwardness, and loses no significant meaning.
