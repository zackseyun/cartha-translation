id: GEN.39.1
reference: Genesis 39:1
source:
  edition: WLC
  text: וְ/יוֹסֵ֖ף הוּרַ֣ד מִצְרָ֑יְמָ/ה וַ/יִּקְנֵ֡/הוּ פּוֹטִיפַר֩ סְרִ֨יס פַּרְעֹ֜ה שַׂ֤ר הַ/טַּבָּחִים֙ אִ֣ישׁ מִצְרִ֔י מִ/יַּד֙ הַ/יִּשְׁמְעֵאלִ֔ים אֲשֶׁ֥ר הוֹרִדֻ֖/הוּ שָֽׁמָּ/ה׃
translation:
  text: Now Joseph had been brought down to Egypt, and Potiphar, an officer of Pharaoh, the captain of the guard, an Egyptian, bought him from the Ishmaelites who had brought him down there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew סְרִיס can mean either 'official/court officer' or 'eunuch.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an Egyptian man'.
    reason: previous_rendering
lexical_decisions:
- source_word: הוּרַד
  chosen: had been brought down
  alternatives:
  - was brought down
  - had been taken down
  lexicon: HALOT
  rationale: Hophal of ירד is passive/causative-passive, indicating Joseph was caused to go down. 'Had been brought down' captures both the passive sense and the prior action relative to Potiphar's purchase.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: Directional ending indicates motion toward Egypt. 'To Egypt' is idiomatic English and preserves the destination.
- source_word: וַיִּקְנֵהוּ
  chosen: bought him
  alternatives:
  - acquired him
  - purchased him
  lexicon: HALOT
  rationale: קנה in this context of slave trade most naturally means 'buy/purchase.' 'Bought him' is the plainest modern English and preserves the transactional force.
- source_word: סְרִיס פַּרְעֹה
  chosen: an officer of Pharaoh
  alternatives:
  - a court official of Pharaoh
  - a eunuch of Pharaoh
  lexicon: HALOT
  rationale: סְרִיס can denote either a literal eunuch or, more broadly, a royal official. In this narrative context the official sense is safest in the main text; the literal alternative is preserved in a footnote because the Hebrew term can bear that meaning.
- source_word: שַׂר הַטַּבָּחִים
  chosen: the captain of the guard
  alternatives:
  - chief of the executioners
  - captain of the bodyguard
  lexicon: HALOT
  rationale: The phrase traditionally rendered 'captain of the guard' likely refers to the commander over royal guards/executioners. This established rendering communicates the office clearly in English without over-specifying one debated nuance.
- source_word: אִישׁ מִצְרִי
  chosen: an Egyptian man
  alternatives:
  - an Egyptian
  - a man of Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אִישׁ ('man') plus the gentilic. 'An Egyptian man' preserves both elements, even though English might more smoothly say simply 'an Egyptian.'
- source_word: מִיַּד
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of,' but in purchase context English normally says 'from.' The fuller idiom is not semantically significant enough to preserve in the main text.
- source_word: הַיִּשְׁמְעֵאלִים
  chosen: the Ishmaelites
  alternatives:
  - the Ishmaelite traders
  lexicon: HALOT
  rationale: The ethnonym should be retained directly. 'Traders' is inferential from context and therefore left out of the main text.
- source_word: אֲשֶׁר הוֹרִדֻהוּ שָׁמָּה
  chosen: who had brought him down there
  alternatives:
  - who had taken him down there
  lexicon: HALOT
  rationale: The relative clause refers back to the Ishmaelites and repeats the 'bring down' motif from ירד. 'There' preserves שָׁמָּה and ties the clause to Egypt as the destination.
