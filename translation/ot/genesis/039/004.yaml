id: GEN.39.4
reference: Genesis 39:4
source:
  edition: WLC
  text: וַ/יִּמְצָ֨א יוֹסֵ֥ף חֵ֛ן בְּ/עֵינָ֖י/ו וַ/יְשָׁ֣רֶת אֹת֑/וֹ וַ/יַּפְקִדֵ֨/הוּ֙
    עַל בֵּית֔/וֹ וְ/כָל יֶשׁ ל֖/וֹ נָתַ֥ן בְּ/יָדֽ/וֹ־־־׃
translation:
  text: And Joseph found favor in his eyes and served him, and he appointed him over
    his house and put all that he had into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into his hand,'' an idiom meaning under Joseph''s authority or
      care.'
    reason: cultural_note
  - marker: b
    text: Or 'he put him in charge of his house' / 'he entrusted everything he had
      to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא
  chosen: found
  alternatives:
  - came to find
  - gained
  lexicon: HALOT
  rationale: Common idiom with חֵן is 'find favor/grace'; 'found' preserves the Hebrew
    expression without over-paraphrasing.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: In the idiom 'find favor in someone's eyes,' English 'favor' is the most
    natural and contextually precise rendering; 'grace' is possible but sounds more
    theological than the immediate narrative context requires.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - with him
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for someone's evaluation. 'In his eyes'
    keeps the imagery and remains clear in English.
- source_word: וַיְשָׁרֶת אֹתוֹ
  chosen: served him
  alternatives:
  - ministered to him
  - attended him
  lexicon: HALOT
  rationale: '''Served him'' is the most straightforward narrative rendering of שרת
    here, referring to Joseph''s personal service to Potiphar.'
- source_word: וַיַּפְקִדֵהוּ עַל בֵּיתוֹ
  chosen: he appointed him over his house
  alternatives:
  - he put him in charge of his house
  - he made him overseer of his household
  lexicon: HALOT
  rationale: The verb פקד in this causative/administrative context denotes appointment
    to oversight. 'Appointed him over his house' preserves the formal sense while
    remaining natural English.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  lexicon: HALOT
  rationale: Hebrew 'house' can mean the household establishment. 'House' is retained
    in the main text for formal closeness, while the broader sense is reflected by
    context.
- source_word: וְכָל יֶשׁ־לוֹ
  chosen: all that he had
  alternatives:
  - everything that belonged to him
  - all his possessions
  lexicon: HALOT
  rationale: This phrase refers comprehensively to Potiphar's possessions/property.
    'All that he had' is idiomatic and sufficiently broad.
- source_word: נָתַן בְּיָדוֹ
  chosen: put all that he had into his hand
  alternatives:
  - placed all that he had under his authority
  - entrusted everything he had to him
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'hand' to denote entrusted control or
    authority. The main text preserves the imagery with readable English rather than
    flattening it entirely.
