  from: and he appointed him over his house and put all that he had into his hand
  to: and his master appointed him over his house and put all that he had into his
    care.
  rationale: The English rendering creates a chain of pronouns ('he', 'him', 'his',
    'he', 'his') that is ambiguous. The subject of 'appointed' is not immediately
    clear, and 'into his hand' could refer to Potiphar's own hand, though context
    suggests Joseph's. While the Hebrew structure is preserved, the English pronoun
    system makes this construction more confusing than the source. A clarification,
    such as specifying the subject ('his master' or 'Potiphar') or using a clearer
    English idiom for the final phrase ('into his care' or 'into Joseph's hand'),
    would improve readability without altering the meaning.
