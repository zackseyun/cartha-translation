id: GEN.39.8
reference: Genesis 39:8
source:
  edition: WLC
  text: וַ/יְמָאֵ֓ן וַ/יֹּ֨אמֶר֙ אֶל אֵ֣שֶׁת אֲדֹנָ֔י/ו הֵ֣ן אֲדֹנִ֔/י לֹא יָדַ֥ע אִתִּ֖/י מַה בַּ/בָּ֑יִת וְ/כֹ֥ל אֲשֶׁר יֶשׁ ל֖/וֹ נָתַ֥ן בְּ/יָדִֽ/י׀־־־־־׃
translation:
  text: But he refused and said to his master's wife, "Look, with me around, my master does not concern himself with what is in the house, and everything that belongs to him he has put into my hand."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''does not know with me,'' an idiom meaning he leaves household matters under Joseph''s supervision and does not concern himself with them.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''he has entrusted to me.'' Hebrew literally: ''he has put into my hand.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'with me here my master does not concern himself with'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְמָאֵן
  chosen: But he refused
  alternatives:
  - And he refused
  - But he refused
  lexicon: HALOT
  rationale: The verb means 'refused' or 'declined.' Rendering with 'But' captures the adversative force in context, since this is Joseph's rejection of her proposition from the previous verse.
- source_word: וַיֹּאמֶר אֶל־אֵשֶׁת אֲדֹנָיו
  chosen: and said to his master's wife
  alternatives:
  - and said to the wife of his master
  lexicon: HALOT
  rationale: A natural English rendering of the construct phrase. 'His master's wife' is idiomatic and preserves the relational force.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: The particle draws attention to what follows. 'Look' is readable modern English and preserves the discourse function better than archaic 'Behold.'
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: In this household context, 'master' best conveys Joseph's social relation to Potiphar. 'Lord' would sound overly elevated and potentially confuse readers given English theological usage.
- source_word: לֹא יָדַע אִתִּי
  chosen: does not concern himself with
  alternatives:
  - does not know with me
  - does not know, with me
  - does not know anything under my care
  lexicon: HALOT
  rationale: Literally 'does not know with me,' an idiom meaning the master leaves matters to Joseph's oversight and does not concern himself with them. This rendering communicates the idiomatic sense in clear English without woodenly preserving an opaque expression.
- source_word: מַה בַּבָּיִת
  chosen: what is in the house
  alternatives:
  - anything in the house
  - what is in the household
  lexicon: HALOT
  rationale: The phrase refers to household affairs or property within the house. 'What is in the house' stays close to the Hebrew while remaining natural.
- source_word: וְכֹל אֲשֶׁר יֶשׁ־לוֹ
  chosen: everything that belongs to him
  alternatives:
  - all that he has
  - everything he has
  lexicon: HALOT
  rationale: This phrase denotes the totality of the master's possessions. 'Everything that belongs to him' makes the possessive sense explicit and reads smoothly.
- source_word: נָתַן בְּיָדִי
  chosen: he has put into my hand
  alternatives:
  - he has placed in my hand
  - he has entrusted to me
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of placing something into someone's hand, conveying entrustment or authority. The main text keeps the concrete metaphor ('into my hand') while remaining understandable in English.
