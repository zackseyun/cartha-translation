id: GEN.39.6
reference: Genesis 39:6
source:
  edition: WLC
  text: וַ/יַּעֲזֹ֣ב כָּל אֲשֶׁר ל/וֹ֮ בְּ/יַד יוֹסֵף֒ וְ/לֹא יָדַ֤ע אִתּ/וֹ֙ מְא֔וּמָה
    כִּ֥י אִם הַ/לֶּ֖חֶם אֲשֶׁר ה֣וּא אוֹכֵ֑ל וַ/יְהִ֣י יוֹסֵ֔ף יְפֵה תֹ֖אַר וִ/יפֵ֥ה
    מַרְאֶֽה־־־־־־־׃
translation:
  text: So he left all that he had in Joseph’s hand, and with him he concerned himself
    with nothing except the food that he ate. Now Joseph was handsome in form and
    handsome in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the bread that he ate'; here 'bread' likely means food generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  chosen: he left
  alternatives:
  - he entrusted
  - he abandoned
  lexicon: HALOT
  rationale: The verb עזב literally means 'leave' or 'forsake.' In this administrative
    context, 'left' preserves the Hebrew wording while naturally implying entrusting
    responsibility to Joseph.
- source_word: כָּל אֲשֶׁר לוֹ
  chosen: all that he had
  alternatives:
  - everything that belonged to him
  - all his possessions
  lexicon: HALOT
  rationale: This phrase refers comprehensively to Potiphar’s holdings or affairs.
    'All that he had' is idiomatic, broad, and close to the source.
- source_word: בְּיַד יוֹסֵף
  chosen: in Joseph’s hand
  alternatives:
  - into Joseph’s care
  - under Joseph’s authority
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'hand' to denote control or charge. Retaining
    'in Joseph’s hand' preserves the imagery while remaining understandable in English.
- source_word: וְלֹא יָדַע אִתּוֹ מְאוּמָה
  chosen: with him he concerned himself with nothing
  alternatives:
  - he knew nothing with him
  - he paid attention to nothing under his care
  lexicon: HALOT
  rationale: Literally, 'he did not know with him anything.' In context this means
    Potiphar no longer concerned himself with or kept track of anything because Joseph
    managed it. 'Concerned himself with nothing' communicates the idiomatic sense
    better than a wooden 'knew nothing.'
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - except for
  - save only
  lexicon: HALOT
  rationale: This construction marks an exception. 'Except' is the most natural concise
    rendering.
- source_word: הַלֶּחֶם אֲשֶׁר הוּא אֹכֵל
  chosen: the food that he ate
  alternatives:
  - the bread that he ate
  - his own food
  lexicon: HALOT
  rationale: Though לֶחֶם literally means 'bread,' it often stands metonymically for
    food or a meal. 'Food' best fits modern English and the context of Potiphar retaining
    only personal oversight of his own eating.
- source_word: וַיְהִי יוֹסֵף
  chosen: Now Joseph was
  alternatives:
  - And Joseph was
  - Joseph became
  lexicon: HALOT
  rationale: Here the waw-consecutive introduces the narrative transition to Joseph’s
    appearance, setting up the next episode. 'Now Joseph was' signals that shift smoothly
    in English.
- source_word: יְפֵה תֹאַר
  chosen: handsome in form
  alternatives:
  - well-built
  - beautiful in figure
  lexicon: HALOT
  rationale: This phrase refers to physical build or figure. 'Handsome in form' is
    natural for a male subject and preserves the distinction from the following phrase.
- source_word: וִיפֵה מַרְאֶה
  chosen: handsome in appearance
  alternatives:
  - good-looking
  - beautiful in appearance
  lexicon: HALOT
  rationale: 'This phrase emphasizes visible appearance. Rendering both phrases distinctly
    preserves the Hebrew parallelism: Joseph was attractive both in physique and in
    overall appearance.'
