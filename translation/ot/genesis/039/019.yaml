id: GEN.39.19
reference: Genesis 39:19
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ אֲדֹנָ֜י/ו אֶת דִּבְרֵ֣י אִשְׁתּ֗/וֹ אֲשֶׁ֨ר דִּבְּרָ֤ה
    אֵלָי/ו֙ לֵ/אמֹ֔ר כַּ/דְּבָרִ֣ים הָ/אֵ֔לֶּה עָ֥שָׂהּ לִ֖/י עַבְדֶּ֑/ךָ וַ/יִּ֖חַר
    אַפּֽ/וֹ־׃
translation:
  text: And it happened that when his master heard the words of his wife that she
    spoke to him, saying, “These are the things your slave did to me,” his anger burned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Like these things your slave did to me.” The Hebrew
      expression can mean “such things” or point demonstratively to the reported accusation.
    reason: lexical_alternative
  - marker: b
    text: Or “your servant.” The Hebrew עבד can denote either, but “slave” best fits
      Joseph’s status in this household context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came about
  lexicon: HALOT
  rationale: Wayyiqtol of היה introducing the next event in narrative sequence; 'And
    it happened' preserves the Hebrew narrative transition without sounding overly
    archaic.
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - as ... heard
  - upon hearing
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of שמע marks temporal circumstance
    here; 'when ... heard' is natural English and preserves the timing relation.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: In the Joseph narrative this refers to Potiphar as Joseph's owner/superior.
    'Master' best fits the household-slavery context in idiomatic English.
- source_word: דִּבְרֵי אִשְׁתּוֹ
  chosen: the words of his wife
  alternatives:
  - his wife's words
  - the things his wife said
  lexicon: HALOT
  rationale: דברי literally means 'words' and should be retained rather than generalized
    too quickly; this also matches the following relative clause.
- source_word: אֲשֶׁר דִּבְּרָה אֵלָיו
  chosen: that she spoke to him
  alternatives:
  - which she said to him
  lexicon: HALOT
  rationale: A straightforward relative clause modifying 'words'; 'spoke to him' is
    slightly more formal and mirrors the Hebrew verb דבר.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - namely
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive; 'saying' cleanly introduces the reported
    speech.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: These are the things
  alternatives:
  - Like these things
  - According to these words
  - Such things
  lexicon: HALOT
  rationale: The phrase points to the content/character of the alleged act. 'These
    are the things' communicates the demonstrative force in idiomatic English. A more
    literal 'like these things' is possible but less natural here.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - has done
  - treated
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' In this accusation, 'did' is the most
    direct rendering and avoids importing interpretive nuance.
- source_word: לִי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition is simply 'to/for me.' Although English may infer hostile
    action, the Hebrew does not explicitly say 'against,' so 'to me' is retained.
- source_word: עַבְדְּךָ
  chosen: your slave
  alternatives:
  - your servant
  lexicon: HALOT
  rationale: The noun עבד can mean servant or slave, but in the Joseph-Potiphar context
    the bonded status is salient. Per translation philosophy, 'slave' is preferred
    where the bonded nature is clear.
- source_word: וַיִּחַר אַפּוֹ
  chosen: his anger burned
  alternatives:
  - his anger was kindled
  - he became angry
  lexicon: HALOT
  rationale: The idiom literally refers to the burning of the nose/anger. 'His anger
    burned' preserves the metaphor more closely than the flattened 'he became angry'
    while remaining readable modern English.
