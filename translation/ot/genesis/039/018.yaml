id: GEN.39.18
reference: Genesis 39:18
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/הֲרִימִ֥/י קוֹלִ֖/י וָ/אֶקְרָ֑א וַ/יַּעֲזֹ֥ב בִּגְד֛/וֹ אֶצְלִ֖/י
    וַ/יָּ֥נָס הַ/חֽוּצָ/ה׃
translation:
  text: And when I raised my voice and cried out, he left his garment beside me and
    fled outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his cloak.' The Hebrew בֶּגֶד is a general term for a garment and does
      not specify the exact article of clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened
  - Then when
  lexicon: HALOT
  rationale: The waw-consecutive of היה here introduces the temporal clause that follows
    rather than needing a wooden 'and it happened.' 'And when' preserves the narrative
    flow in natural English while reflecting the Hebrew construction.
- source_word: כַּהֲרִימִי
  chosen: I raised
  alternatives:
  - I lifted up
  lexicon: HALOT
  rationale: From רום in the Hiphil with prefixed כ, meaning 'when I raised/lifted.'
    'Raised' is idiomatic with 'voice' in English and preserves the causative sense.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in this context. The idiom 'raise my voice'
    is standard and fits the accusation narrative.
- source_word: וָאֶקְרָא
  chosen: and cried out
  alternatives:
  - and called out
  - and shouted
  lexicon: HALOT
  rationale: קרא can mean call, cry, proclaim. In this immediate context of alarm,
    'cried out' best conveys an urgent vocal outburst without overinterpreting the
    exact volume.
- source_word: וַיַּעֲזֹב
  chosen: he left
  alternatives:
  - he abandoned
  - he let go of
  lexicon: HALOT
  rationale: עזב here describes Joseph leaving the garment behind. 'Left' is the most
    natural and contextually precise rendering.
- source_word: בִּגְדוֹ
  chosen: his garment
  alternatives:
  - his cloak
  - his robe
  lexicon: HALOT
  rationale: בגד is a general term for clothing/garment. 'Garment' avoids specifying
    a type of clothing beyond what the Hebrew states, though 'cloak' is possible from
    context.
- source_word: אֶצְלִי
  chosen: beside me
  alternatives:
  - with me
  - by me
  lexicon: HALOT
  rationale: אצל indicates proximity, 'beside/near.' 'Beside me' is more spatially
    precise in English than 'with me,' which could imply possession rather than location.
- source_word: וַיָּנָס
  chosen: and fled
  alternatives:
  - and ran away
  - and escaped
  lexicon: HALOT
  rationale: נוס means to flee. 'Fled' preserves the urgency and is concise.
- source_word: הַחוּצָה
  chosen: outside
  alternatives:
  - outdoors
  - to the outside
  lexicon: HALOT
  rationale: The directional form with ה locale means movement outward. 'Outside'
    captures the adverbial/directional sense naturally in English.
