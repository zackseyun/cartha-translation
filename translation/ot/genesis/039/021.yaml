id: GEN.39.21
reference: Genesis 39:21
source:
  edition: WLC
  text: וַ/יְהִ֤י יְהוָה֙ אֶת יוֹסֵ֔ף וַ/יֵּ֥ט אֵלָ֖י/ו חָ֑סֶד וַ/יִּתֵּ֣ן חִנּ֔/וֹ בְּ/עֵינֵ֖י שַׂ֥ר בֵּית הַ/סֹּֽהַר־־׃
translation:
  text: But the LORD was with Joseph and extended covenant faithfulness to him, and he gave him favor in the eyes of the prison warden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'showed him steadfast love.' The Hebrew חָסֶד can also be rendered 'steadfast love,' 'loyal love,' or 'kindness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the chief of the prison'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the LORD' rather than a transliteration, following Jewish reverence tradition and the LXX pattern.
- source_word: וַיְהִי ... אֶת
  chosen: was with
  alternatives:
  - was with the presence of
  - remained with
  lexicon: HALOT
  rationale: The construction וַיְהִי + אֶת + personal name idiomatically expresses presence/companionship. 'Was with' is the natural English equivalent and matches the recurring Joseph narrative formula.
- source_word: חָסֶד
  chosen: covenant faithfulness
  alternatives:
  - steadfast love
  - kindness
  - loyal love
  lexicon: HALOT
  rationale: חָסֶד is richer than mere 'kindness' and often denotes loyal, steadfast favor. 'Covenant faithfulness' makes the theological weight explicit without overstating a formal covenant reference in this immediate context. It captures YHWH's loyal benevolence toward Joseph.
- source_word: וַיֵּט אֵלָיו חָסֶד
  chosen: extended covenant faithfulness to him
  alternatives:
  - showed him steadfast love
  - inclined kindness toward him
  lexicon: HALOT
  rationale: The verb נָטָה literally means 'stretch out/extend/turn,' but in this idiom it means to show or extend favor. 'Extended ... to him' preserves some of the verbal imagery while remaining idiomatic English.
- source_word: חִנּוֹ
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: חֵן commonly denotes favor or gracious acceptance in another's sight. 'Favor' is the most natural fit in this court/prison-administrative context.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom is common and understandable in English. Retaining 'in the eyes of' preserves the source texture while remaining readable.
- source_word: שַׂר
  chosen: chief
  alternatives:
  - captain
  - official
  - commander
  lexicon: HALOT
  rationale: שַׂר denotes a ruler, chief, or official. Here it refers to the person in charge of the prison. 'Chief' is concise and fits the construct chain with 'of the prison.'
- source_word: בֵּית הַסֹּהַר
  chosen: the prison
  alternatives:
  - the jail
  - the house of confinement
  lexicon: HALOT
  rationale: Literally 'house of the prison/dungeon.' In natural English, 'the prison' best conveys the referent without unnecessary woodenness.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: Although waw-consecutive often simply continues narrative, 'But' appropriately signals the contrast with Joseph's imprisonment in the preceding context and is warranted by English discourse flow.
