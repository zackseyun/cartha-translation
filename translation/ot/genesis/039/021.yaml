theological_decisions:
- issue: Rendering of divine loyal favor in חָסֶד
  chosen_reading: covenant faithfulness
  alternative_readings:
  - steadfast love
  - kindness
  - loyal love
  rationale: The verse attributes to the LORD a form of loyal, enduring favor toward Joseph. 'Covenant faithfulness' foregrounds the theological depth of חָסֶד, though the immediate verse does not explicitly mention covenant. Because this may be heard as more interpretive than 'steadfast love,' the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for יְהוָה in DOCTRINE.md and avoids introducing a transliterated form against project policy.
