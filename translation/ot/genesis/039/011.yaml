  from: was there in the house
  to: was in the house
  rationale: The Hebrew phrase `שָׁם בַּבָּיִת` (šām babbāyit) literally means 'there
    in the house' and is a common Semitic construction using a redundant locative
    for emphasis. While the current rendering is a faithful formal equivalent, it
    creates a slight pleonasm in English. A more natural phrasing would be simply
    'was in the house.' Dropping the translation of `שָׁם` ('there') in this context
    improves English flow without a significant loss of meaning, as the location is
    already specified by 'in the house.' This is a reasonable trade-off for an optimal-equivalence
    translation.
