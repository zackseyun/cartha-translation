id: GEN.39.11
reference: Genesis 39:11
source:
  edition: WLC
  text: וַ/יְהִי֙ כְּ/הַ/יּ֣וֹם הַ/זֶּ֔ה וַ/יָּבֹ֥א הַ/בַּ֖יְתָ/ה לַ/עֲשׂ֣וֹת מְלַאכְתּ֑/וֹ
    וְ/אֵ֨ין אִ֜ישׁ מֵ/אַנְשֵׁ֥י הַ/בַּ֛יִת שָׁ֖ם בַּ/בָּֽיִת׃
translation:
  text: And it happened on such a day that he went into the house to do his work,
    and none of the men of the house was there in the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'on this day.' The Hebrew expression is idiomatic and
      likely means 'on such an occasion' or 'one day like this.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was there in the house'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form introduces the next event in narrative sequence.
    'And it happened' preserves the Hebrew narrative formula in readable modern English
    without archaic phrasing.
- source_word: כְּהַיּוֹם הַזֶּה
  chosen: on such a day
  alternatives:
  - about this time
  - on this day
  lexicon: HALOT
  rationale: The expression is idiomatic in context, referring to a particular occasion
    rather than emphasizing the calendar day itself. 'On such a day' captures the
    sense of 'on an occasion like this/one day' more naturally than the overly literal
    'on this day.'
- source_word: וַיָּבֹא הַבַּיְתָה
  chosen: he went into the house
  alternatives:
  - he came into the house
  - he entered the house
  lexicon: HALOT
  rationale: The verb בוא with directional ה conveys movement into the house. 'Went
    into the house' is natural in English and fits the narrative viewpoint.
- source_word: לַעֲשׂוֹת מְלַאכְתּוֹ
  chosen: to do his work
  alternatives:
  - to do his task
  - to do his business
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work or occupation. 'To do his work' is the
    most straightforward rendering in this domestic-administrative context.
- source_word: וְאֵין אִישׁ
  chosen: and none ... was there
  alternatives:
  - and there was no man
  - and not a man was there
  lexicon: HALOT
  rationale: The negative existential construction states absence. Because the following
    phrase specifies 'of the men of the house,' English is smoother if the negation
    is carried into 'none ... was there' rather than a wooden 'there was no man.'
- source_word: מֵאַנְשֵׁי הַבַּיִת
  chosen: of the men of the house
  alternatives:
  - from the household men
  - of the household
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'men of the house,' not merely 'people' or
    'household.' In keeping with the gender-accurate principle, the masculine term
    is preserved.
- source_word: שָׁם בַּבָּיִת
  chosen: there in the house
  alternatives:
  - there in the household
  - inside the house
  lexicon: HALOT
  rationale: The repetition of 'house' in Hebrew is stylistically emphatic and locative.
    Retaining 'there in the house' reflects the emphasis better than collapsing the
    phrase.
