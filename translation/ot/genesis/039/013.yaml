id: GEN.39.13
reference: Genesis 39:13
source:
  edition: WLC
  text: וַ/יְהִי֙ כִּ/רְאוֹתָ֔/הּ כִּֽי עָזַ֥ב בִּגְד֖/וֹ בְּ/יָדָ֑/הּ וַ/יָּ֖נָס
    הַ/חֽוּצָ/ה־׃
translation:
  text: And when she saw that he had left his garment in her hand and had fled outside,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his clothing'; the Hebrew term is general and does not require the more
      specific 'cloak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive on היה functions as a narrative transition. In English,
    a simple 'And' with the following temporal clause conveys the discourse function
    more naturally than the wooden 'and it happened,' while preserving the sequential
    narrative flow.
- source_word: כִּרְאוֹתָהּ
  chosen: when she saw
  alternatives:
  - as she saw
  - upon her seeing
  lexicon: HALOT
  rationale: 'The preposition כ with the infinitive construct of ראה plus 3fs suffix
    yields a temporal sense: ''when she saw.'' This is the most natural modern English
    rendering and accurately reflects the clause linkage.'
- source_word: כִּי
  chosen: that
  alternatives:
  - indeed that
  - how
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what she saw: ''that he had left
    ... and had fled.'' ''That'' best marks the object clause in English.'
- source_word: עָזַב
  chosen: had left
  alternatives:
  - left
  - abandoned
  lexicon: HALOT
  rationale: The verb means 'leave, forsake.' In this context, 'left' is the straightforward
    sense. The pluperfect 'had left' fits the English sequence after 'when she saw
    that...' and clarifies prior action relative to her perception.
- source_word: בִּגְדוֹ
  chosen: his garment
  alternatives:
  - his clothing
  - his cloak
  lexicon: HALOT
  rationale: בגד is a general term for a garment or piece of clothing. 'Garment' preserves
    the lexical breadth and avoids over-specifying the item as a 'cloak,' which some
    English traditions use but the Hebrew does not require.
- source_word: בְּיָדָהּ
  chosen: in her hand
  alternatives:
  - in her grasp
  lexicon: HALOT
  rationale: The phrase is literal and vivid. 'In her hand' preserves the concrete
    imagery and matches normal English idiom.
- source_word: וַיָּנָס
  chosen: had fled
  alternatives:
  - fled
  - ran away
  lexicon: HALOT
  rationale: נוס means 'flee.' 'Had fled' matches the prior perfect sense in English
    under the content clause introduced by 'that.' 'Ran away' is weaker and less precise
    than 'fled,' which better conveys urgent escape.
- source_word: הַחוּצָה
  chosen: outside
  alternatives:
  - outdoors
  - to the outside
  lexicon: HALOT
  rationale: 'With the directional ending, the noun means movement outward: ''outside.''
    This is idiomatic and preserves the directional force without awkwardness.'
