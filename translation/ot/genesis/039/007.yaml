id: GEN.39.7
reference: Genesis 39:7
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/תִּשָּׂ֧א אֵֽשֶׁת אֲדֹנָ֛י/ו
    אֶת עֵינֶ֖י/הָ אֶל יוֹסֵ֑ף וַ/תֹּ֖אמֶר שִׁכְבָ֥/ה עִמִּֽ/י־־־׃
translation:
  text: And after these things, his master's wife cast her eyes on Yosef and said,
    “Lie with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'lifted her eyes to Yosef,' an idiom here expressing focused,
      desirous attention.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: And after these things
  alternatives:
  - Now after these things
  - After these events
  lexicon: HALOT
  rationale: The idiom introduces a subsequent development in narrative. 'After these
    things' preserves the Hebrew phrasing closely while remaining natural English.
- source_word: וַתִּשָּׂא ... אֶת עֵינֶיהָ אֶל
  chosen: cast her eyes on
  alternatives:
  - lifted her eyes to
  - looked at
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lifted her eyes to.' In this context
    it signals directed, desirous attention rather than a neutral glance. 'Cast her
    eyes on' preserves the idiomatic force better than a flat 'looked at' while avoiding
    over-interpretation.
- source_word: אֵשֶׁת אֲדֹנָיו
  chosen: his master's wife
  alternatives:
  - the wife of his master
  lexicon: HALOT
  rationale: This construct chain identifies the woman by relation to Joseph's master.
    'His master's wife' is the most natural English rendering and keeps the possessive
    reference clear.
- source_word: יוֹסֵף
  chosen: Yosef
  alternatives:
  - Joseph
  rationale: Per translation philosophy, personal names are transliterated by standard
    conventions rather than replaced by traditional Anglicized forms. 'Yosef' reflects
    the Hebrew name directly.
- source_word: שִׁכְבָה עִמִּי
  chosen: Lie with me
  alternatives:
  - Sleep with me
  - Come to bed with me
  lexicon: HALOT
  rationale: The imperative plus preposition is a direct sexual proposition. 'Lie
    with me' is the most textually grounded and idiomatically established rendering;
    'sleep with me' is possible but slightly more euphemistic and contemporary than
    the Hebrew requires.
