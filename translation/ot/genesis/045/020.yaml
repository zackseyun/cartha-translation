  from: do not let your eye spare your belongings
  to: do not be concerned about your belongings
  rationale: The Hebrew idiom 'let not your eye spare/pity' (וְעֵינְכֶם אַל־תָּחֹס) is rendered too literally, creating an awkward and unnatural English phrase. The verb 'spare' does not collocate with 'eye' in this manner in English. The intended meaning is about not feeling regret or anxiety over leaving possessions behind. The suggested rewrite, which aligns with the provided footnote and many modern translations (e.g., ESV, NIV), conveys this meaning clearly and naturally to the English reader.
