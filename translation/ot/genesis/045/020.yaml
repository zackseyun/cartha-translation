id: GEN.45.20
reference: Genesis 45:20
source:
  edition: WLC
  text: וְ/עֵ֣ינְ/כֶ֔ם אַל תָּחֹ֖ס עַל כְּלֵי/כֶ֑ם כִּי ט֛וּב כָּל אֶ֥רֶץ מִצְרַ֖יִם לָ/כֶ֥ם הֽוּא־־־־׃
translation:
  text: And do not be concerned about your belongings, for the best of all the land of Egypt is yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be concerned about your goods'; literally, 'do not let your eye spare your belongings.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not let your eye spare your belongings'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעֵינְכֶם
  chosen: And do not let your eye
  alternatives:
  - And as for your eye
  - And your eye
  lexicon: HALOT
  rationale: The idiom uses 'eye' as the subject of the verb חוס ('spare, look with pity/regret toward'). In English, preserving 'eye' keeps the Hebrew imagery better than flattening it to 'do not regret' or 'do not be concerned.' The conjunction וְ is carried as 'And.' Singular 'eye' reflects the Hebrew singular noun with 2mp suffix.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Standard negative particle for jussive/prohibitive force; 'do not' is natural modern English.
- source_word: תָּחֹס
  chosen: spare
  alternatives:
  - have pity on
  - regret leaving
  - be concerned for
  lexicon: HALOT
  rationale: חוס commonly means 'spare, have compassion/pity.' With 'eye' and 'upon your belongings,' the sense is 'do not look regretfully/protectively toward your possessions.' 'Spare' preserves the Hebrew idiom while remaining intelligible.
- source_word: עַל
  chosen: spare ... your belongings
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: The preposition is naturally absorbed into the English verbal phrase 'spare ...' rather than rendered woodenly as 'upon'.
- source_word: כְּלֵיכֶם
  chosen: your belongings
  alternatives:
  - your goods
  - your things
  - your possessions
  lexicon: HALOT
  rationale: כְּלִי can denote articles, vessels, equipment, or goods. In this travel context, Pharaoh tells them not to be concerned about transporting their household items. 'Belongings' is broad and natural; 'goods' is possible but slightly less idiomatic in contemporary English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the command; 'for' fits the explanatory tone.
- source_word: טוּב
  chosen: the best
  alternatives:
  - the good things
  - the bounty
  - the goodness
  lexicon: HALOT
  rationale: In context טוּב refers to the choicest produce/resources of Egypt rather than abstract goodness. 'The best' is concise and idiomatic.
- source_word: כָּל אֶרֶץ מִצְרַיִם
  chosen: of all the land of Egypt
  alternatives:
  - of the whole land of Egypt
  - of all Egypt
  lexicon: HALOT
  rationale: This construction most naturally means 'the best of all the land of Egypt,' i.e., the choicest things the land offers. Retaining 'land' preserves the Hebrew expression and avoids overcompression.
- source_word: לָכֶם הוּא
  chosen: is yours
  alternatives:
  - belongs to you
  - is for you
  lexicon: HALOT
  rationale: The lamed plus pronoun with הוּא expresses possession/emphasis. 'Is yours' is the most natural English equivalent and preserves the force of Pharaoh's assurance.
