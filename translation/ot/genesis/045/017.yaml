  category: awkward_english
  tier: 1
  from: and go; come
  to: and go back
  rationale: The Hebrew uses two consecutive imperatives, `לְכוּ` (go/depart) and `בֹאוּ` (come/arrive), to describe the single journey from Egypt to Canaan. The current rendering 'and go; come' is a very literal but stylistically awkward English construction. The semicolon creates an unnatural separation between two tightly linked actions. A more idiomatic and clear rendering in English would be to combine the sense of both verbs into a single phrasal verb like 'go back' or 'return,' which accurately conveys the meaning of leaving one place and arriving at a previous one without the clunky phrasing. The full phrase would then read '...and go back to the land of Canaan.'
