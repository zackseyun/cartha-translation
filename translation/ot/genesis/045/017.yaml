id: GEN.45.17
reference: Genesis 45:17
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר פַּרְעֹה֙ אֶל יוֹסֵ֔ף אֱמֹ֥ר אֶל אַחֶ֖י/ךָ זֹ֣את עֲשׂ֑וּ טַֽעֲנוּ֙ אֶת בְּעִ֣ירְ/כֶ֔ם וּ/לְכוּ בֹ֖אוּ אַ֥רְצָ/ה כְּנָֽעַן־־־־׃
translation:
  text: 'Then Pharaoh said to Joseph, “Tell your brothers, ‘Do this: load your animals and go back to the land of Canaan.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, “Say to your brothers, ‘Do this: load your beasts and go, come to the land of Canaan.’”'
    reason: lexical_alternative
  - marker: b
    text: Or 'and go; come'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'and ... said' is more formally literal but less idiomatic here.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name used in Genesis.
- source_word: אֱמֹר אֶל אַחֶיךָ
  chosen: Tell your brothers
  alternatives:
  - Say to your brothers
  lexicon: HALOT
  rationale: The infinitive/imperative construction introduces quoted speech through Joseph. 'Tell' is slightly more natural in English indirect command style, while accurately conveying the directive to speak to his brothers.
- source_word: זֹאת עֲשׂוּ
  chosen: Do this
  alternatives:
  - Do this thing
  lexicon: HALOT
  rationale: Idiomatic rendering of the demonstrative plus imperative. 'Do this' is concise and faithful.
- source_word: טַעֲנוּ
  chosen: load
  alternatives:
  - load up
  - pack
  lexicon: HALOT
  rationale: The verb means to load a beast or conveyance. 'Load' is the clearest direct equivalent in this context.
- source_word: בְּעִירְכֶם
  chosen: your animals
  alternatives:
  - your beasts
  - your livestock
  lexicon: HALOT
  rationale: בְּעִיר commonly refers to beasts of burden or domestic animals. In context of transporting goods and traveling, 'your animals' is natural modern English and broad enough to cover pack animals without sounding archaic like 'beasts.'
- source_word: וּלְכוּ בֹאוּ
  chosen: and go; come
  alternatives:
  - and go, come
  - go and come
  lexicon: HALOT
  rationale: 'The Hebrew preserves two imperatives in sequence: depart and arrive. English can sound awkward if flattened to one verb, so the translation keeps both actions, punctuated for readability.'
- source_word: אַרְצָה כְּנָעַן
  chosen: to the land of Canaan
  alternatives:
  - to Canaan
  - landward to Canaan
  lexicon: HALOT
  rationale: The directional ending on אֶרֶץ plus the proper name is best represented as 'to the land of Canaan,' preserving the explicit noun 'land' present in the Hebrew.
