  from: about all my honor in Egypt and about everything you have seen
  to: about all my honor in Egypt and everything you have seen
  rationale: The Hebrew verb governs two parallel direct objects. While 'tell about' is a valid rendering, repeating 'about' for the second object ('...about X and about Y') is slightly redundant and less fluid in English than the more common construction '...about X and Y'. Removing the second 'about' improves the style without changing the meaning.
