id: GEN.45.13
reference: Genesis 45:13
source:
  edition: WLC
  text: וְ/הִגַּדְתֶּ֣ם לְ/אָבִ֗/י אֶת כָּל כְּבוֹדִ/י֙ בְּ/מִצְרַ֔יִם וְ/אֵ֖ת כָּל אֲשֶׁ֣ר רְאִיתֶ֑ם וּ/מִֽהַרְתֶּ֛ם וְ/הוֹרַדְתֶּ֥ם אֶת אָבִ֖/י הֵֽנָּה־־־־׃
translation:
  text: And tell my father about all my honor in Egypt and everything you have seen. Hurry and bring my father down here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all my glory in Egypt.' The Hebrew כָּבוֹד can refer to honor, glory, or splendor; here it points to Joseph's exalted status in Egypt.
    reason: lexical_alternative
  - marker: b
    text: Or 'about all my honor in Egypt and about everything you have seen'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִגַּדְתֶּם
  chosen: tell
  alternatives:
  - report
  - declare
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to make known or tell. 'Tell' is natural modern English and fits direct speech to Joseph's brothers.
- source_word: כָּל כְּבוֹדִי
  chosen: all my honor
  alternatives:
  - all my glory
  - all my splendor
  lexicon: HALOT
  rationale: כבוד can denote honor, glory, or splendor. In Joseph's court setting, the sense is his elevated status and dignity in Egypt. 'Honor' communicates status without overstating with more theological-sounding 'glory,' though that remains a viable alternative.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative phrase.
- source_word: כָּל אֲשֶׁר רְאִיתֶם
  chosen: everything you have seen
  alternatives:
  - all that you have seen
  lexicon: HALOT
  rationale: This clause broadens the report beyond Joseph's status to the concrete evidence the brothers witnessed. Present perfect in English fits the completed experience with present relevance.
- source_word: מִהַרְתֶּם
  chosen: Hurry
  alternatives:
  - make haste
  - quickly
  lexicon: HALOT
  rationale: The verb carries urgency. Imperatival force in context is well represented by the concise English command 'Hurry.'
- source_word: הוֹרַדְתֶּם
  chosen: bring ... down
  alternatives:
  - bring
  - lead down
  - take down
  lexicon: HALOT
  rationale: Hiphil of ירד means cause to go down. Because movement to Egypt is regularly conceptualized as 'down' in Genesis, 'bring ... down' preserves the directional nuance.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - to here
  - to this place
  lexicon: HALOT
  rationale: Deictic adverb indicating destination toward the speaker's location. 'Here' is idiomatic English.
