  from: To all of them he gave each man
  to: To each of them he gave
  rationale: 'The Hebrew uses two distributive terms for emphasis: ''to all of them''
    (לְכֻלָּם) and ''to each man'' (לָאִישׁ). The current English rendering, ''To
    all of them he gave each man,'' is a literal but slightly redundant and awkward
    construction. A smoother rendering like ''To each of them he gave'' combines these
    ideas naturally in English, preserves the distributive sense, and creates better
    parallelism with the following clause (''but to Benjamin he gave...'').'
