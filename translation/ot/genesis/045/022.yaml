id: GEN.45.22
reference: Genesis 45:22
source:
  edition: WLC
  text: לְ/כֻלָּ֥/ם נָתַ֛ן לָ/אִ֖ישׁ חֲלִפ֣וֹת שְׂמָלֹ֑ת וּ/לְ/בִנְיָמִ֤ן נָתַן֙ שְׁלֹ֣שׁ
    מֵא֣וֹת כֶּ֔סֶף וְ/חָמֵ֖שׁ חֲלִפֹ֥ת שְׂמָלֹֽת׃
translation:
  text: To each of them he gave a change of clothes, but to Benjamin he gave three
    hundred pieces of silver and five changes of clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''three hundred silver''; the specific monetary unit is not stated,
      so ''pieces of silver'' is used rather than a more specific term such as ''shekels.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'To all of them he gave each man'.
    reason: previous_rendering
lexical_decisions:
- source_word: לְכֻלָּם
  chosen: to all of them
  alternatives:
  - to them all
  - for all of them
  lexicon: HALOT
  rationale: The preposition ל with כֻּלָּם marks the indirect object/distributive
    group. 'To all of them' is natural English and preserves the sense that the gifts
    were given to the whole group of brothers.
- source_word: נָתַן
  chosen: he gave
  alternatives:
  - he presented
  - he bestowed
  lexicon: HALOT
  rationale: Standard rendering of נתן in narrative gift-giving context. 'Gave' is
    the plain sense and avoids unnecessary elevation.
- source_word: לָאִישׁ
  chosen: each man
  alternatives:
  - to each one
  - to each brother
  lexicon: HALOT
  rationale: The phrase לָאִישׁ is distributive, literally 'to the man/each man.'
    'Each man' preserves the masculine singular distributive force. 'Each brother'
    is contextually possible but adds a relational nuance not explicit in the Hebrew.
- source_word: חֲלִפוֹת שְׂמָלֹת
  chosen: changes of clothes
  alternatives:
  - changes of garments
  - sets of clothing
  - festal garments
  lexicon: HALOT
  rationale: The collocation denotes replacement sets of clothing. 'Changes of clothes'
    is idiomatic modern English and fits optimal equivalence. 'Garments' is more formal;
    'festal garments' is too interpretive for this context.
- source_word: וּלְבִנְיָמִן
  chosen: but to Benjamin
  alternatives:
  - and to Benjamin
  - while to Benjamin
  lexicon: HALOT
  rationale: The conjunction introduces a contrast between what all the brothers received
    and Benjamin's exceptional gift. Rendering with 'but' makes the contrast explicit
    in natural English.
- source_word: שְׁלֹשׁ מֵאוֹת כֶּסֶף
  chosen: three hundred pieces of silver
  alternatives:
  - three hundred silver pieces
  - three hundred shekels of silver
  - three hundred silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'three hundred silver.' Since no unit such
    as shekels is stated, 'pieces of silver' conveys a monetary amount without specifying
    an unwarranted denomination. 'Shekels' would overtranslate.
- source_word: וְחָמֵשׁ חֲלִפֹת שְׂמָלֹת
  chosen: and five changes of clothes
  alternatives:
  - and five changes of garments
  - and five sets of clothing
  lexicon: HALOT
  rationale: Same clothing expression as earlier in the verse, kept consistent. The
    number is preserved straightforwardly.
