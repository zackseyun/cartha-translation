id: GEN.45.1
reference: Genesis 45:1
source:
  edition: WLC
  text: וְ/לֹֽא יָכֹ֨ל יוֹסֵ֜ף לְ/הִתְאַפֵּ֗ק לְ/כֹ֤ל הַ/נִּצָּבִים֙ עָלָ֔י/ו וַ/יִּקְרָ֕א
    הוֹצִ֥יאוּ כָל אִ֖ישׁ מֵ/עָלָ֑/י וְ/לֹא עָ֤מַד אִישׁ֙ אִתּ֔/וֹ בְּ/הִתְוַדַּ֥ע
    יוֹסֵ֖ף אֶל אֶחָֽי/ו־־־־׃
translation:
  text: Then Joseph could no longer restrain himself before all those standing by
    him, and he cried out, “Have everyone go out from me!” And no one remained with
    him when Joseph made himself known to his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “in the presence of all who stood by him.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “no man stood with him,” meaning no one remained present.
    reason: lexical_alternative
  - marker: c
    text: Or 'So no man stood with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: יָכֹל
  chosen: could
  alternatives:
  - was able
  lexicon: HALOT
  rationale: Standard rendering of the verb of ability; paired with לֹא to express
    inability.
- source_word: לְהִתְאַפֵּק
  chosen: restrain himself
  alternatives:
  - control himself
  - contain himself
  lexicon: HALOT
  rationale: The hitpael here conveys self-restraint or holding oneself in. 'Restrain
    himself' is natural modern English and preserves the reflexive sense without overinterpreting
    the emotion.
- source_word: לְכֹל הַנִּצָּבִים עָלָיו
  chosen: before all those standing by him
  alternatives:
  - in the presence of all who stood by him
  - before all his attendants
  lexicon: HALOT
  rationale: נצב in the participial form refers to those stationed/standing near him.
    'Standing by him' is a close rendering; 'before' captures the relational force
    in context. 'Attendants' is interpretive and therefore left as an alternative
    only.
- source_word: וַיִּקְרָא
  chosen: he cried out
  alternatives:
  - he called out
  - he said
  lexicon: HALOT
  rationale: The verb denotes calling aloud. 'Cried out' fits the emotionally charged
    scene better than the flatter 'said' while remaining textually warranted.
- source_word: הוֹצִיאוּ כָל אִישׁ מֵעָלָי
  chosen: Send everyone out from me
  alternatives:
  - Have everyone leave me
  - Take every man out from before me
  lexicon: HALOT
  rationale: The imperative is plural and directed to those present. כָל אִישׁ is
    idiomatically distributive, meaning every person. 'From me' preserves the Hebrew
    expression without awkward literalism.
- source_word: וְלֹא עָמַד אִישׁ אִתּוֹ
  chosen: So no man stood with him
  alternatives:
  - And no one remained with him
  - and not a man stood with him
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in context it means remain present.
    I kept 'stood with him' for formal transparency, while the sense 'remained with
    him' is preserved as an alternative.
- source_word: בְּהִתְוַדַּע
  chosen: when Joseph made himself known
  alternatives:
  - while Joseph revealed himself
  - when Joseph disclosed himself
  lexicon: HALOT
  rationale: The hitpael of ידע here means to make oneself known or reveal oneself.
    'Made himself known' is idiomatic English and a standard equivalent.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers
  lexicon: HALOT
  rationale: Direct and contextually precise rendering of the kinship term; no inclusive
    adjustment is warranted because literal male siblings are in view.
