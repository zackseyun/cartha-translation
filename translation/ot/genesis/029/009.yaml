id: GEN.29.9
reference: Genesis 29:9
source:
  edition: WLC
  text: עוֹדֶ֖/נּוּ מְדַבֵּ֣ר עִמָּ֑/ם וְ/רָחֵ֣ל בָּ֗אָה עִם הַ/צֹּאן֙ אֲשֶׁ֣ר לְ/אָבִ֔י/הָ
    כִּ֥י רֹעָ֖ה הִֽוא׀־׃
translation:
  text: While he was still speaking with them, Rachel came with her father’s flock,
    for she was a shepherdess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she was a shepherd.' The Hebrew uses a feminine form identifying Rachel’s
      role as one who tended the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדֶנּוּ
  chosen: while he was still
  alternatives:
  - he was yet
  - still
  lexicon: HALOT
  rationale: The idiom with the following participle marks ongoing action at that
    very time. 'While he was still' gives natural English and preserves the temporal
    overlap.
- source_word: מְדַבֵּר
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: Piel participle of דבר indicates ongoing speech. 'Speaking' is slightly
    more neutral and formal than 'talking' and fits the narrative style.
- source_word: עִמָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward preposition plus 3mp suffix; refers to the shepherds
    Jacob had been addressing.
- source_word: וְרָחֵל
  chosen: Rachel
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בָּאָה
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Qal perfect of בוא in narrative commonly advances the storyline with
    'came.' 'Arrived' is possible but less idiomatic here.
- source_word: עִם הַצֹּאן
  chosen: with her father’s flock
  alternatives:
  - with the flock
  lexicon: HALOT
  rationale: Although 'with the flock' is formally possible, English reads more naturally
    by bringing forward the possessive relation expressed in the next clause. 'Flock'
    is the standard collective rendering for צאן.
- source_word: אֲשֶׁר לְאָבִיהָ
  chosen: her father’s
  alternatives:
  - that belonged to her father
  - which was her father's
  lexicon: HALOT
  rationale: The relative clause specifies ownership of the flock. Compressing it
    to the English possessive is natural and does not lose meaning.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for why Rachel came with the flock. 'For'
    fits narrative explanation smoothly.
- source_word: רֹעָה הִוא
  chosen: she was a shepherdess
  alternatives:
  - she was tending them
  - she was a shepherd
  lexicon: HALOT
  rationale: The predicate identifies Rachel's role. Because the subject is explicitly
    feminine, 'shepherdess' accurately reflects the gendered form and avoids flattening
    the statement into mere activity. 'Shepherd' is possible in contemporary English,
    but 'shepherdess' better mirrors the Hebrew feminine participial form in this
    context.
