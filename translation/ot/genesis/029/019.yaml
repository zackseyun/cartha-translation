id: GEN.29.19
reference: Genesis 29:19
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָבָ֗ן ט֚וֹב תִּתִּ֣/י אֹתָ֣/הּ לָ֔/ךְ מִ/תִּתִּ֥/י אֹתָ֖/הּ לְ/אִ֣ישׁ
    אַחֵ֑ר שְׁבָ֖/ה עִמָּדִֽ/י׃
translation:
  text: Laban said, “It is better that I give her to you than that I give her to another
    man. Stay with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “It is good for me to give her to you rather than my
      giving her to another man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the natural English equivalent.
- source_word: טוֹב
  chosen: it is better
  alternatives:
  - it is good
  - better
  lexicon: HALOT
  rationale: In the comparative construction with מִן + infinitive ('better ... than
    ...'), English idiom requires 'it is better' rather than the more wooden 'good'.
- source_word: תִּתִּי אֹתָהּ לָךְ
  chosen: that I give her to you
  alternatives:
  - for me to give her to you
  lexicon: HALOT
  rationale: Qal infinitive construct with 1cs suffix functions verbally after טוֹב;
    rendered as a finite English clause for readability while preserving the sense.
- source_word: מִתִּתִּי אֹתָהּ לְאִישׁ אַחֵר
  chosen: than that I give her to another man
  alternatives:
  - than my giving her to another man
  lexicon: HALOT
  rationale: Comparative min plus infinitive construct expresses the second term of
    comparison. 'Another man' accurately reflects אִישׁ אַחֵר in this marriage context.
- source_word: אִישׁ אַחֵר
  chosen: another man
  alternatives:
  - someone else
  - another husband
  lexicon: HALOT
  rationale: Literally 'another man.' 'Another husband' is contextually possible but
    adds an interpretive nuance not explicit in the Hebrew; 'another man' preserves
    the source wording.
- source_word: שְׁבָה
  chosen: stay
  alternatives:
  - dwell
  - remain
  - sit
  lexicon: HALOT
  rationale: Imperative of ישׁב here means to remain/live in a place. 'Stay' is clear
    modern English and fits the immediate context.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - by me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating continued presence with
    Laban.
