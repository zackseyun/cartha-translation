id: GEN.29.13
reference: Genesis 29:13
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ לָבָ֜ן אֶת שֵׁ֣מַע יַעֲקֹ֣ב בֶּן אֲחֹת֗/וֹ וַ/יָּ֤רָץ
    לִ/קְרָאת/וֹ֙ וַ/יְחַבֶּק ל/וֹ֙ וַ/יְנַשֶּׁק ל֔/וֹ וַ/יְבִיאֵ֖/הוּ אֶל בֵּית֑/וֹ
    וַ/יְסַפֵּ֣ר לְ/לָבָ֔ן אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־׀־־־־־׃
translation:
  text: And when Laban heard the news about Jacob, his sister’s son, he ran to meet
    him and embraced him and kissed him and brought him to his house. Then Jacob told
    Laban all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the report of Jacob.' The Hebrew phrase refers to news or a report concerning
      Jacob.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his sister’s son.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he told Laban'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִ/שְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - as soon as ... heard
  - upon hearing
  lexicon: HALOT
  rationale: The preposition כ with the infinitive construct of שׁמע introduces a
    temporal clause. 'When ... heard' is natural modern English and preserves the
    sequence without overstating immediacy, though 'upon hearing' is also possible.
- source_word: שֵׁמַע
  chosen: the news about
  alternatives:
  - the report of
  - the hearing of
  lexicon: HALOT
  rationale: שֵׁמַע here denotes a report or news, not merely the act of hearing.
    'The news about Jacob' is idiomatic English; 'report of Jacob' is more formal
    but less natural.
- source_word: בֶּן אֲחֹתוֹ
  chosen: his sister’s son
  alternatives:
  - the son of his sister
  - his nephew
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'son of his sister.' 'His sister’s son' preserves
    the kinship wording more closely than 'nephew,' which is accurate but less transparent
    to the source phrasing.
- source_word: וַיָּרָץ לִקְרָאתוֹ
  chosen: he ran to meet him
  alternatives:
  - he ran toward him
  - he ran to greet him
  lexicon: HALOT
  rationale: לקראת commonly means 'to meet' or 'to encounter.' 'Ran to meet him' is
    the most straightforward rendering in context.
- source_word: וַיְחַבֶּק לוֹ
  chosen: embraced him
  alternatives:
  - hugged him
  lexicon: HALOT
  rationale: חבק means to embrace. 'Embraced' fits the narrative register better than
    the more colloquial 'hugged.'
- source_word: וַיְנַשֶּׁק לוֹ
  chosen: kissed him
  lexicon: HALOT
  rationale: נשׁק in this stem means to kiss. In this family-greeting context the
    plain rendering 'kissed him' is appropriate without importing romantic connotations.
- source_word: וַיְבִיאֵהוּ אֶל בֵּיתוֹ
  chosen: brought him to his house
  alternatives:
  - brought him into his house
  - took him to his house
  lexicon: HALOT
  rationale: The verb בוא in the causative means 'bring.' 'To his house' is a natural
    rendering of אל ביתו and need not be expanded to 'into' unless the context stresses
    entry.
- source_word: וַיְסַפֵּר
  chosen: he told
  alternatives:
  - he recounted
  - he related
  lexicon: HALOT
  rationale: ספר in the Piel means to recount or tell. 'He told' is clear modern English;
    the following object supplies the content.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these things
  alternatives:
  - all these matters
  - all these words
  lexicon: HALOT
  rationale: דברים can mean words, matters, or things depending on context. Here it
    refers broadly to the events Jacob recounted, so 'all these things' is the best
    idiomatic choice.
- source_word: וַיְסַפֵּר לְלָבָן
  chosen: Then he told Laban
  alternatives:
  - And he told Laban
  lexicon: HALOT
  rationale: The subject of וַיְסַפֵּר is most naturally Jacob, continuing the narrative
    after Laban brought him home. Adding 'Then' helps English readers track the shift
    in action while preserving the Hebrew narrative sequence.
