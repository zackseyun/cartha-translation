id: GEN.29.6
reference: Genesis 29:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר לָ/הֶ֖ם הֲ/שָׁל֣וֹם ל֑/וֹ וַ/יֹּאמְר֣וּ שָׁל֔וֹם וְ/הִנֵּה֙ רָחֵ֣ל
    בִּתּ֔/וֹ בָּאָ֖ה עִם הַ/צֹּֽאן־׃
translation:
  text: He said to them, “Is he well?” And they said, “He is well. And look, Rachel
    his daughter is coming with the flock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Is it well with him?” Hebrew uses shalom in the sense of welfare or
      well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲשָׁלוֹם לוֹ
  chosen: Is he well?
  alternatives:
  - Is it well with him?
  - Does he have peace?
  - Is he at peace?
  lexicon: HALOT
  rationale: שָׁלוֹם here functions in a welfare/greeting sense, asking about Laban's
    well-being rather than abstract peace. 'Is he well?' is natural modern English
    and preserves the interpersonal inquiry.
- source_word: שָׁלוֹם
  chosen: He is well
  alternatives:
  - Peace
  - It is well
  - He is at peace
  lexicon: HALOT
  rationale: The reply mirrors the question and confirms Laban's welfare. Supplying
    'He is' is required in English for clarity.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Look
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what is immediately visible. 'And look' preserves
    the deictic force in readable modern English better than the more archaic 'behold.'
- source_word: רָחֵל
  chosen: Rachel
  rationale: Personal names are transliterated by standard English convention.
- source_word: בִּתּוֹ
  chosen: his daughter
  alternatives:
  - his daughter Rachel
  lexicon: HALOT
  rationale: The suffix refers to Laban. 'His daughter' is the plain sense and keeps
    the familial identification explicit.
- source_word: בָּאָה
  chosen: is coming
  alternatives:
  - comes
  - was coming
  lexicon: HALOT
  rationale: The participle-like present scene in narrative is well represented by
    English progressive 'is coming,' fitting the immediate visual notice introduced
    by הִנֵּה.
- source_word: עִם הַצֹּאן
  chosen: with the flock
  alternatives:
  - with the sheep
  lexicon: HALOT
  rationale: צֹאן denotes small livestock collectively, often sheep and goats. 'Flock'
    is the broader and more accurate collective term in context.
