id: GEN.29.35
reference: Genesis 29:35
source:
  edition: WLC
  text: וַ/תַּ֨הַר ע֜וֹד וַ/תֵּ֣לֶד בֵּ֗ן וַ/תֹּ֨אמֶר֙ הַ/פַּ֨עַם֙ אוֹדֶ֣ה אֶת יְהוָ֔ה
    עַל כֵּ֛ן קָרְאָ֥ה שְׁמ֖/וֹ יְהוּדָ֑ה וַֽ/תַּעֲמֹ֖ד מִ/לֶּֽדֶת־־׃
translation:
  text: And she conceived again and bore a son, and she said, “This time I will praise
    the LORD.” Therefore she named him Judah. Then she stopped bearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Judah sounds like the Hebrew verb for 'praise' or 'give thanks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'She conceived' is
    concise and idiomatic in narrative English.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: In this birth sequence, עוֹד marks repetition, so 'again' best fits the
    narrative flow.
- source_word: וַתֵּלֶד בֵּן
  chosen: bore a son
  alternatives:
  - gave birth to a son
  lexicon: HALOT
  rationale: ילד with בן is the standard idiom for childbirth. 'Bore a son' is natural
    and slightly more formal, fitting the style of Genesis narrative.
- source_word: הַפַּעַם
  chosen: This time
  alternatives:
  - Now at last
  - At this time
  lexicon: HALOT
  rationale: The phrase points to the present occasion in contrast with prior births.
    'This time' preserves the deictic force without overinterpreting emotional nuance.
- source_word: אוֹדֶה
  chosen: I will praise
  alternatives:
  - I praise
  - I will give thanks to
  lexicon: HALOT
  rationale: The Hiphil of ידה here expresses praise/thanksgiving. Because the naming
    explanation links forward from this declaration, 'I will praise' works well in
    English. 'Give thanks to' is possible, but 'praise' better matches the wordplay
    with Judah and common usage in naming formulas.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the project's default.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: This formula introduces the naming consequence. 'Therefore' preserves
    the causal connection clearly and compactly.
- source_word: קָרְאָה שְׁמוֹ
  chosen: she named him
  alternatives:
  - she called his name
  - she called him
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'she called his name,' but idiomatic
    English is 'she named him.' This preserves meaning without wooden phrasing.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Judah' also
    preserves the audible connection to the verb ידה ('praise/thank').
- source_word: וַתַּעֲמֹד מִלֶּדֶת
  chosen: Then she stopped bearing
  alternatives:
  - Then she ceased bearing children
  - Then she stopped giving birth
  lexicon: HALOT
  rationale: עמד + מן + infinitive here means to stop/cease an activity. 'Stopped
    bearing' is concise and natural; the context already makes clear that childbearing
    is in view.
