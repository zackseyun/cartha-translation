id: GEN.29.27
reference: Genesis 29:27
source:
  edition: WLC
  text: מַלֵּ֖א שְׁבֻ֣עַ זֹ֑את וְ/נִתְּנָ֨ה לְ/ךָ֜ גַּם אֶת זֹ֗את בַּ/עֲבֹדָה֙ אֲשֶׁ֣ר
    תַּעֲבֹ֣ד עִמָּדִ֔/י ע֖וֹד שֶֽׁבַע שָׁנִ֥ים אֲחֵרֽוֹת־־־׃
translation:
  text: Complete this woman's bridal week, and we will give you this one also in return
    for the work that you will serve with me for another seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Complete the week of this one'; the phrase refers to the customary
      bridal or wedding week.
    reason: cultural_note
  - marker: b
    text: Or 'and she will be given to you also' / 'and this one also will be given
      to you.' The Hebrew form is formally third feminine singular, but the sense
      in context is Laban's promise to give the other daughter as well.
    reason: lexical_alternative
  - marker: c
    text: Or 'that you will work for me.' The Hebrew verb can mean 'serve' or 'work'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלֵּא
  chosen: Complete
  alternatives:
  - Fulfill
  - Finish
  lexicon: HALOT
  rationale: Imperative of מלא, calling Jacob to finish or complete a set period.
    'Complete' is natural modern English and preserves the command force.
- source_word: שְׁבֻעַ זֹאת
  chosen: this woman's bridal week
  alternatives:
  - this week
  - the week of this one
  lexicon: HALOT
  rationale: שְׁבֻעַ literally denotes a period of seven, here idiomatically a week,
    specifically the wedding/bridal week in context. Adding 'woman's' clarifies that
    זֹאת refers to Leah and avoids ambiguity in English; 'bridal week' captures the
    cultural setting better than bare 'week' while staying close to the sense.
- source_word: וְנִתְּנָה לְךָ
  chosen: and we will give you
  alternatives:
  - and she will be given to you
  - and it will be given to you
  lexicon: HALOT
  rationale: Though morphologically 3fs, the form functions idiomatically with an
    indefinite/passive-like sense in context. English naturally renders the speaker's
    intent as first person plural, since Laban is promising Rachel as well. This avoids
    awkward impersonal English and matches the discourse situation.
- source_word: גַּם אֶת זֹאת
  chosen: this one also
  alternatives:
  - also this one
  - this woman too
  lexicon: HALOT
  rationale: Refers to the other daughter, Rachel. 'This one also' is concise and
    preserves the demonstrative emphasis without over-paraphrasing.
- source_word: בַּעֲבֹדָה
  chosen: in return for the work
  alternatives:
  - for the service
  - for the labor
  lexicon: HALOT
  rationale: The preposition plus noun expresses the condition or price on which Rachel
    will be given. 'In return for the work' communicates the transactional sense clearly
    in modern English.
- source_word: תַּעֲבֹד עִמָּדִי
  chosen: that you will serve with me
  alternatives:
  - that you will work for me
  - that you will labor with me
  lexicon: HALOT
  rationale: עבד can mean serve or work. Because Jacob is entering a labor arrangement
    under Laban, 'serve with me' stays close to the Hebrew wording, though the sense
    includes working for Laban.
- source_word: עוֹד שֶׁבַע שָׁנִים אֲחֵרוֹת
  chosen: for another seven years
  alternatives:
  - yet seven other years
  - seven more years
  lexicon: HALOT
  rationale: Natural English rendering of the duration phrase. 'Another seven years'
    preserves both the additive force of עוֹד and the distinctness marked by אֲחֵרוֹת.
