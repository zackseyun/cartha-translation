id: GEN.29.1
reference: Genesis 29:1
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א יַעֲקֹ֖ב רַגְלָ֑י/ו וַ/יֵּ֖לֶךְ אַ֥רְצָ/ה בְנֵי קֶֽדֶם־׃
translation:
  text: Then Jacob set out and went to the land of the sons of the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''lifted up his feet,'' an idiom meaning that he set out or resumed
      his journey.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the people of the east' or 'the easterners.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: set out
  alternatives:
  - lifted up
  - took up
  lexicon: HALOT
  rationale: Literally 'lifted up,' but in the idiom 'lifted up his feet' it signals
    beginning a journey or moving on energetically. 'Set out' conveys the Hebrew idiom
    in natural English without over-literal awkwardness.
- source_word: רַגְלָיו
  chosen: implicit in 'set out'
  alternatives:
  - his feet
  lexicon: HALOT
  rationale: The noun 'his feet' is part of the Hebrew idiom with נשׂא. Rendering
    it explicitly as 'lifted his feet' is unnatural in English and obscures the sense;
    its meaning is carried by 'set out.'
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: HALOT
  rationale: A straightforward rendering of the common verb 'to go/walk.' 'Went' preserves
    the simple narrative movement and pairs naturally with 'set out.'
- source_word: אַרְצָה
  chosen: to the land
  alternatives:
  - landward to
  - toward the land of
  lexicon: HALOT
  rationale: The directional ending on 'land' indicates motion toward a place. In
    English, 'to the land' is the clearest idiomatic equivalent in this construction.
- source_word: בְנֵי קֶדֶם
  chosen: the sons of the east
  alternatives:
  - the people of the east
  - the easterners
  lexicon: HALOT
  rationale: Formally, the phrase is 'sons of the east.' This preserves the Hebrew
    familial ethnogeographic expression better than flattening it to 'easterners,'
    while remaining understandable in English. 'Sons' here denotes a people-group,
    not literal male offspring.
