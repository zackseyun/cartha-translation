id: GEN.29.10
reference: Genesis 29:10
source:
  edition: WLC
  text: וַ/יְהִ֡י כַּ/אֲשֶׁר֩ רָאָ֨ה יַעֲקֹ֜ב אֶת רָחֵ֗ל בַּת לָבָן֙ אֲחִ֣י אִמּ֔/וֹ
    וְ/אֶת צֹ֥אן לָבָ֖ן אֲחִ֣י אִמּ֑/וֹ וַ/יִּגַּ֣שׁ יַעֲקֹ֗ב וַ/יָּ֤גֶל אֶת הָ/אֶ֨בֶן֙
    מֵ/עַל֙ פִּ֣י הַ/בְּאֵ֔ר וַ/יַּ֕שְׁקְ אֶת צֹ֥אן לָבָ֖ן אֲחִ֥י אִמּֽ/וֹ־־־־־׃
translation:
  text: And when Jacob saw Rachel, the daughter of Laban, his mother’s brother, and
    the flock of Laban, his mother’s brother, Jacob came near and rolled the stone
    away from the mouth of the well, and watered the flock of Laban, his mother’s
    brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'his mother’s brother' three times in this verse, emphasizing
      Jacob’s family connection to Laban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event in sequence. 'And
    when' preserves the temporal force of כַּאֲשֶׁר with readable modern English,
    while avoiding overly wooden 'and it happened when.'
- source_word: רָאָה
  chosen: saw
  alternatives:
  - looked at
  lexicon: HALOT
  rationale: The verb plainly denotes visual perception here. 'Saw' is the most direct
    and natural rendering.
- source_word: בַּת
  chosen: the daughter of
  alternatives:
  - daughter of
  lexicon: HALOT
  rationale: 'The construct phrase identifies Rachel by family relation. Including
    ''the'' fits normal English apposition: ''Rachel, the daughter of Laban.'''
- source_word: אֲחִי אִמּוֹ
  chosen: his mother’s brother
  alternatives:
  - his maternal uncle
  - the brother of his mother
  lexicon: HALOT
  rationale: The Hebrew repeats the kinship phrase three times. 'His mother’s brother'
    preserves the explicit familial wording more closely than the idiomatic 'maternal
    uncle,' while remaining clear.
- source_word: צֹאן
  chosen: the flock
  alternatives:
  - the sheep
  - small livestock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, often sheep and goats.
    'Flock' best captures the collective sense without over-specifying species.
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - went up
  lexicon: HALOT
  rationale: The verb indicates moving toward the well/action scene. 'Came near' preserves
    the physical approach and fits the narrative flow.
- source_word: וַיָּגֶל
  chosen: rolled ... away
  alternatives:
  - removed
  - rolled away
  lexicon: HALOT
  rationale: The verb גלל commonly refers to rolling. Because the object is a stone
    covering the well, 'rolled the stone away' preserves the concrete imagery better
    than the more generic 'removed.'
- source_word: מֵעַל פִּי הַבְּאֵר
  chosen: from the mouth of the well
  alternatives:
  - from over the opening of the well
  - from upon the mouth of the well
  lexicon: HALOT
  rationale: פֶּה ('mouth') is the standard Hebrew idiom for an opening. Retaining
    'mouth of the well' preserves the source metaphor and remains idiomatic enough
    in English biblical narrative.
- source_word: וַיַּשְׁקְ
  chosen: watered
  alternatives:
  - gave water to
  lexicon: HALOT
  rationale: The Hiphil of שׁקה means to give water to or water. 'Watered' is concise,
    natural, and standard for livestock in English.
