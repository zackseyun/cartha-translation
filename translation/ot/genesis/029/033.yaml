theological_decisions:
- issue: Rendering Leah's description of her status in relation to Jacob
  chosen_reading: I am hated
  alternative_readings:
  - I am unloved
  - I am less loved
  rationale: The Hebrew uses the ordinary strong term שְׂנוּאָה. In context it may
    denote being rejected or comparatively less loved, but the translation philosophy
    prefers preserving the source's lexical force and theological/narrative tension
    rather than softening it interpretively in the main text.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
