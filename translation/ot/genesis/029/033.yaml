id: GEN.29.33
reference: Genesis 29:33
source:
  edition: WLC
  text: וַ/תַּ֣הַר עוֹד֮ וַ/תֵּ֣לֶד בֵּן֒ וַ/תֹּ֗אמֶר כִּֽי שָׁמַ֤ע יְהוָה֙ כִּֽי
    שְׂנוּאָ֣ה אָנֹ֔כִי וַ/יִּתֶּן לִ֖/י גַּם אֶת זֶ֑ה וַ/תִּקְרָ֥א שְׁמ֖/וֹ שִׁמְעֽוֹן־־־־־׃
translation:
  text: Then she conceived again and bore a son, and said, “Because the LORD has heard
    that I am hated, he has given me this one also.” So she called his name Simeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “that I am unloved” or “that I am less loved.” The Hebrew word is literally
      “hated,” but in context it can denote being rejected or comparatively less loved.
    reason: lexical_alternative
  - marker: b
    text: Simeon sounds like the Hebrew for “heard.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר עוֹד
  chosen: Then she conceived again
  alternatives:
  - And she conceived again
  - She became pregnant again
  lexicon: HALOT
  rationale: וַ consecutive advances the narrative; עוֹד indicates repetition ('again,
    still'). 'Conceived again' is natural modern English and preserves the sequence.
- source_word: וַתֵּלֶד בֵּן
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: HALOT
  rationale: Standard rendering of ילד + בן in birth narratives. 'Bore a son' is concise
    and idiomatic while remaining formally close.
- source_word: כִּי שָׁמַע יְהוָה
  chosen: Because the LORD has heard
  alternatives:
  - For the LORD has heard
  - Because the LORD heard
  lexicon: HALOT
  rationale: כִּי here introduces Leah's explanation ('because'). The perfect שָׁמַע
    can be rendered with English present perfect to express a completed action with
    present relevance. יְהוָה follows doctrine default 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: כִּי שְׂנוּאָה אָנֹכִי
  chosen: that I am hated
  alternatives:
  - that I am unloved
  - that I am hated by Jacob
  - that I am less loved
  lexicon: HALOT
  rationale: שְׂנוּאָה is the passive participial/adjectival form of 'hate.' The plain
    lexical sense is stronger than 'unloved.' Since Jacob is not explicitly named
    in this clause, the translation should not add him. The broader context may imply
    relative disfavor, but the source wording itself is best preserved as 'hated,'
    allowing the narrative tension to stand.
- source_word: וַיִּתֶּן לִי גַּם אֶת זֶה
  chosen: he has given me this one also
  alternatives:
  - he also gave me this one
  - he has given this one to me also
  lexicon: HALOT
  rationale: נתן + ל + demonstrative refers to the additional son just born. 'This
    one also' is idiomatic and preserves גַּם and זֶה without over-specifying 'son,'
    which is already clear from context.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: So she called his name
  alternatives:
  - and she named him
  - and she called his name
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' Retaining it here preserves
    the naming-formula flavor while remaining understandable in English.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  alternatives:
  - Shimon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Simeon'
    is the established English form and also reflects the sound-play with שָׁמַע ('heard')
    in the immediate context.
