id: GEN.29.20
reference: Genesis 29:20
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֧ד יַעֲקֹ֛ב בְּ/רָחֵ֖ל שֶׁ֣בַע שָׁנִ֑ים וַ/יִּהְי֤וּ בְ/עֵינָי/ו֙
    כְּ/יָמִ֣ים אֲחָדִ֔ים בְּ/אַהֲבָת֖/וֹ אֹתָֽ/הּ׃
translation:
  text: So Jacob served seven years for Rachel, and they seemed like only a few days
    to him because of his love for her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and they were in his eyes like a few days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹד
  chosen: served
  alternatives:
  - worked
  - labored
  lexicon: HALOT
  rationale: The verb עבד commonly means 'serve' or 'work.' Here it refers to Jacob's
    labor rendered as bride-service in exchange for Rachel. 'Served' preserves both
    the labor and the relational/contractual sense better than the flatter 'worked.'
- source_word: בְּרָחֵל
  chosen: for Rachel
  alternatives:
  - for the sake of Rachel
  - in exchange for Rachel
  lexicon: HALOT
  rationale: The preposition ב here is idiomatic in the context of service rendered
    for a bride. English 'for Rachel' is natural and accurately conveys the sense
    of labor performed in order to obtain marriage to Rachel.
- source_word: שֶׁבַע שָׁנִים
  chosen: seven years
  lexicon: HALOT
  rationale: A straightforward numerical expression; 'years' is the natural rendering
    of שנים in this context.
- source_word: וַיִּהְיוּ בְעֵינָיו
  chosen: they seemed to him
  alternatives:
  - they were in his eyes
  - they appeared to him
  lexicon: HALOT
  rationale: The idiom 'in his eyes' expresses subjective perception. 'They seemed
    to him' communicates the idiomatic sense in clear modern English while preserving
    the perspective marker.
- source_word: כְּיָמִים אֲחָדִים
  chosen: like only a few days
  alternatives:
  - like a few days
  - as a few days
  lexicon: HALOT
  rationale: Literally 'like days, a few/one.' In context the phrase means the seven
    years felt very short. 'Like only a few days' captures the idiomatic force naturally
    in English; 'only' makes explicit the minimization implied by the Hebrew expression.
- source_word: בְּאַהֲבָתוֹ אֹתָהּ
  chosen: because of his love for her
  alternatives:
  - through his love for her
  - in his loving her
  lexicon: HALOT
  rationale: 'The noun אהבה with prefixed ב conveys the circumstance or cause: the
    years seemed short on account of his love. ''Because of his love for her'' is
    idiomatic and preserves the causal sense without over-paraphrase.'
