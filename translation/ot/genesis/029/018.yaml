id: GEN.29.18
reference: Genesis 29:18
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֥ב יַעֲקֹ֖ב אֶת רָחֵ֑ל וַ/יֹּ֗אמֶר אֶֽעֱבָדְ/ךָ֙ שֶׁ֣בַע שָׁנִ֔ים
    בְּ/רָחֵ֥ל בִּתְּ/ךָ֖ הַ/קְּטַנָּֽה־׃
translation:
  text: Now Jacob loved Rachel, and he said, “I will serve you seven years for Rachel
    your younger daughter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Jacob loved Rachel.' The opening conjunction simply
      continues the narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  chosen: loved
  alternatives:
  - was in love with
  lexicon: HALOT
  rationale: The verb אָהַב straightforwardly denotes love. 'Loved' is the most direct
    and natural rendering; 'was in love with' is possible contextually but adds interpretive
    nuance beyond the lexical form.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - told
  lexicon: HALOT
  rationale: The common verb אמר is best rendered 'said' here, introducing direct
    speech without adding specificity not present in the Hebrew.
- source_word: אֶעֱבָדְךָ
  chosen: I will serve you
  alternatives:
  - I will work for you
  lexicon: HALOT
  rationale: The verb עבד in this context refers to labor rendered to Laban in exchange
    for marriage. 'Serve you' preserves the relational and labor sense better than
    the more commercial 'work for you,' while remaining idiomatic English.
- source_word: שֶׁבַע שָׁנִים
  chosen: seven years
  lexicon: HALOT
  rationale: A direct and unambiguous rendering of the numeral plus noun phrase.
- source_word: בְּרָחֵל
  chosen: for Rachel
  alternatives:
  - in exchange for Rachel
  - concerning Rachel
  lexicon: HALOT
  rationale: The preposition ב here marks the basis or exchange of Jacob's service.
    'For Rachel' is concise, idiomatic, and fits the marriage-arrangement context.
- source_word: בִּתְּךָ
  chosen: your daughter
  lexicon: HALOT
  rationale: Direct rendering of the construct with second masculine singular suffix.
- source_word: הַקְּטַנָּה
  chosen: younger
  alternatives:
  - younger one
  - the younger
  lexicon: HALOT
  rationale: Although the adjective literally means 'small' or 'little,' in familial
    comparison it idiomatically means 'younger.' Rendering it as 'younger' communicates
    the intended contrast with Leah in natural English.
- source_word: וַ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw-consecutive advances the narrative. 'Now' gives readable
    modern English while preserving the discourse shift; 'And' would be more formally
    literal but less natural in contemporary style.
