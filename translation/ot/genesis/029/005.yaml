id: GEN.29.5
reference: Genesis 29:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֔ם הַ/יְדַעְתֶּ֖ם אֶת לָבָ֣ן בֶּן נָח֑וֹר וַ/יֹּאמְר֖וּ יָדָֽעְנוּ־־׃
translation:
  text: He said to them, “Do you know Laban son of Nahor?” They said, “We do know
    him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''We know,'' with ''him'' implied by the context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English commonly omits repeated
    initial 'and' for readability in narrative, while 'He said' preserves the verbal
    action.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard preposition plus pronominal suffix indicating indirect object.
- source_word: הֲיְדַעְתֶּם
  chosen: Do you know
  alternatives:
  - Have you known
  - Do you recognize
  lexicon: HALOT
  rationale: The interrogative plus qatal of יָדַע here asks about acquaintance/knowledge
    of a person. In natural English, present 'Do you know' best conveys the sense
    of personal acquaintance.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is represented
    by normal English word order.
- source_word: לָבָן
  chosen: Laban
  rationale: Personal name transliterated according to the project's policy to transliterate
    names.
- source_word: בֶּן נָחוֹר
  chosen: son of Nahor
  alternatives:
  - the son of Nahor
  - descendant of Nahor
  lexicon: HALOT
  rationale: בֶּן literally means 'son.' Although Hebrew can sometimes mean descendant,
    the straightforward genealogical identification 'son of Nahor' should be preserved
    in the main text.
- source_word: וַיֹּאמְרוּ
  chosen: They said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: Narrative reply verb; English again omits initial 'and' for smoother
    style while preserving sequence.
- source_word: יָדָעְנוּ
  chosen: We do know him
  alternatives:
  - We know
  - We have known him
  lexicon: HALOT
  rationale: The verb repeats the root יָדַע from the question, so the translation
    preserves that repetition. 'Do' adds natural English emphasis in reply, and 'him'
    is supplied because English normally requires the object to make the response
    explicit.
