id: GEN.29.11
reference: Genesis 29:11
source:
  edition: WLC
  text: וַ/יִּשַּׁ֥ק יַעֲקֹ֖ב לְ/רָחֵ֑ל וַ/יִּשָּׂ֥א אֶת קֹל֖/וֹ וַ/יֵּֽבְךְּ־׃
translation:
  text: Then Jacob kissed Rachel, and he lifted up his voice and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jacob greeted Rachel with a kiss.' The Hebrew verb normally means 'kissed,'
      but in context it may also carry the sense of a familial greeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשַּׁק
  chosen: kissed
  alternatives:
  - greeted with a kiss
  lexicon: HALOT
  rationale: The verb נשק in the qal commonly means 'to kiss.' In this narrative context
    the plain sense is a physical kiss, not merely a generalized greeting, though
    in ancient Near Eastern custom it can function as a familial greeting. 'Kissed'
    is the most direct and natural rendering.
- source_word: לְרָחֵל
  chosen: Rachel
  alternatives:
  - to Rachel
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object after the verb 'kissed.'
    English idiom normally renders this simply as the direct object 'kissed Rachel'
    rather than the more wooden 'kissed to Rachel.' The personal name is transliterated
    per translation philosophy.
- source_word: וַיִּשָּׂא אֶת־קֹלוֹ
  chosen: lifted up his voice
  alternatives:
  - raised his voice
  lexicon: HALOT
  rationale: This is a Hebrew idiom for vocal expression, often introducing loud speech
    or crying. Retaining 'lifted up his voice' preserves the idiomatic and literary
    flavor while remaining understandable in modern English.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה means 'to weep/cry.' 'Wept' fits the elevated narrative register
    and pairs naturally with the preceding idiom 'lifted up his voice.'
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: Hebrew waw-consecutive usage
  rationale: The waw-consecutive advances the narrative. 'Then' conveys sequential
    movement in English more naturally than repeating 'and' at the start of the verse,
    while staying within optimal equivalence.
