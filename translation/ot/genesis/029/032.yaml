id: GEN.29.32
reference: Genesis 29:32
source:
  edition: WLC
  text: וַ/תַּ֤הַר לֵאָה֙ וַ/תֵּ֣לֶד בֵּ֔ן וַ/תִּקְרָ֥א שְׁמ֖/וֹ רְאוּבֵ֑ן כִּ֣י אָֽמְרָ֗ה כִּֽי רָאָ֤ה יְהוָה֙ בְּ/עָנְיִ֔/י כִּ֥י עַתָּ֖ה יֶאֱהָבַ֥/נִי אִישִֽׁ/י־׃
translation:
  text: Leah conceived and bore a son, and she called his name Reuben, for she said, “Because Yahweh has seen my affliction, now my husband will love me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Reuben sounds like the Hebrew for 'see, a son' and is explained here by Leah's words, 'the LORD has seen my affliction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'Conceived' is concise, natural, and standard in birth narratives.
- source_word: וַתֵּלֶד בֵּן
  chosen: bore a son
  alternatives:
  - gave birth to a son
  lexicon: HALOT
  rationale: ילד with בן is the standard idiom for childbirth. 'Bore a son' preserves the compact narrative style while remaining clear in modern English.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: she called his name
  alternatives:
  - she named him
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew naming formula and prepares for the wordplay with the name Reuben. 'Named him' is possible but slightly flattens the formulaic texture.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Personal names are transliterated by standard convention per translation philosophy. The Hebrew name also carries wordplay with 'see' (ראה), which is reflected in the explanation rather than translated in the name itself.
- source_word: כִּי אָמְרָה
  chosen: for she said
  alternatives:
  - because she said
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for the naming. 'For she said' is idiomatic in English and preserves the narrative logic.
- source_word: כִּי רָאָה יְהוָה
  chosen: Because the LORD has seen
  alternatives:
  - Surely the LORD has seen
  - For the LORD has seen
  lexicon: HALOT
  rationale: The clause explains Leah's reasoning. 'Has seen' renders the perfect naturally as a present-result statement in English. The causal 'Because' fits the direct speech context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעָנְיִי
  chosen: my affliction
  alternatives:
  - my misery
  - my suffering
  lexicon: HALOT
  rationale: עֳנִי commonly denotes affliction, misery, or suffering. 'Affliction' preserves the gravity and is a familiar biblical term without being archaic.
- source_word: כִּי עַתָּה
  chosen: now
  alternatives:
  - surely now
  - for now
  lexicon: HALOT
  rationale: The phrase marks Leah's expectation based on the birth. 'Now' is sufficient and natural; stronger particles like 'surely' are not required by the Hebrew.
- source_word: יֶאֱהָבַנִי אִישִׁי
  chosen: my husband will love me
  alternatives:
  - my man will love me
  lexicon: HALOT
  rationale: אִישִׁי in this marital context means 'my husband.' Rendering אהב as 'love' preserves the emotional and relational force of Leah's hope.
