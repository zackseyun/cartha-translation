id: GEN.29.25
reference: Genesis 29:25
source:
  edition: WLC
  text: וַ/יְהִ֣י בַ/בֹּ֔קֶר וְ/הִנֵּה הִ֖וא לֵאָ֑ה וַ/יֹּ֣אמֶר אֶל לָבָ֗ן מַה זֹּאת֙
    עָשִׂ֣יתָ לִּ֔/י הֲ/לֹ֤א בְ/רָחֵל֙ עָבַ֣דְתִּי עִמָּ֔/ךְ וְ/לָ֖/מָּה רִמִּיתָֽ/נִי־־־׃
translation:
  text: In the morning, behold, it was Leah. And he said to Laban, “What is this you
    have done to me? Was it not for Rachel that I worked with you? So why have you
    deceived me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I served you' instead of 'I worked with you.' The Hebrew verb can denote
      labor or service, and the context includes both hired work and service rendered
      to Laban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  chosen: In the morning
  alternatives:
  - When morning came
  - And it happened in the morning
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus temporal phrase introduces the next event.
    'In the morning' is natural modern English and preserves the temporal setting
    without over-literal awkwardness.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: This particle marks sudden realization and dramatic surprise. 'Behold'
    best preserves the force and shock of discovery here, even if slightly elevated;
    it remains readable and signals the narrative jolt.
- source_word: הִוא לֵאָה
  chosen: it was Leah
  alternatives:
  - she was Leah
  - there was Leah
  lexicon: HALOT
  rationale: English idiom after a discovery scene prefers 'it was Leah.' 'She was
    Leah' is possible but less natural in context. The sense is Jacob's realization
    of the woman's identity.
- source_word: מַה זֹּאת עָשִׂיתָ לִּי
  chosen: What is this you have done to me?
  alternatives:
  - What have you done to me?
  - What is this that you have done to me?
  lexicon: HALOT
  rationale: The demonstrative זֹּאת adds emphasis beyond a bare 'what have you done.'
    This rendering preserves the indignation and rhetorical force while remaining
    idiomatic.
- source_word: הֲלֹא
  chosen: Was it not
  alternatives:
  - Did I not
  - Surely
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Was
    it not' fits the clause structure in English when followed by the fronted phrase
    'for Rachel.'
- source_word: בְּרָחֵל
  chosen: for Rachel
  alternatives:
  - because of Rachel
  - regarding Rachel
  lexicon: HALOT
  rationale: The preposition ב here expresses the object or goal in connection with
    Jacob's labor agreement. 'For Rachel' is the clearest idiomatic rendering of the
    contractual sense.
- source_word: עָבַדְתִּי עִמָּךְ
  chosen: I worked with you
  alternatives:
  - I served you
  - I labored for you
  lexicon: HALOT
  rationale: עבד can mean 'work/serve.' In this marriage-contract context, Jacob's
    seven years are labor rendered to Laban. 'Worked with you' follows the Hebrew
    preposition עִם ('with you') closely, though 'for you' is also possible by sense.
    This keeps the wording transparent to the source text.
- source_word: וְלָמָּה
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: The conjunction plus interrogative advances the complaint to its conclusion.
    'So why' gives natural English flow while preserving the inferential force.
- source_word: רִמִּיתָנִי
  chosen: have you deceived me
  alternatives:
  - have you tricked me
  - have you cheated me
  lexicon: HALOT
  rationale: The verb denotes deception or betrayal by misleading. 'Deceived' is broad
    and serious without becoming colloquial; it suits the moral weight of Laban's
    action.
