id: GEN.29.23
reference: Genesis 29:23
source:
  edition: WLC
  text: וַ/יְהִ֣י בָ/עֶ֔רֶב וַ/יִּקַּח֙ אֶת לֵאָ֣ה בִתּ֔/וֹ וַ/יָּבֵ֥א אֹתָ֖/הּ אֵלָ֑י/ו
    וַ/יָּבֹ֖א אֵלֶֽי/הָ־׃
translation:
  text: And in the evening he took Leah his daughter and brought her to him, and he
    went in to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'went in to her,' a conventional idiom for sexual relations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened / And
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In readable modern English, the formula is naturally compressed to 'And' while
    preserving the temporal progression with the following phrase.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  - when evening came
  lexicon: HALOT
  rationale: The preposition ב plus עֶרֶב denotes the time setting of the action.
    'In the evening' is idiomatic and sufficiently formal.
- source_word: וַיִּקַּח
  chosen: he took
  alternatives:
  - he took along
  - he fetched
  lexicon: HALOT
  rationale: לקח in this context means 'take' in the sense of taking Leah for the
    marriage-night arrangement. 'He took' is the plain narrative sense and avoids
    over-interpretation.
- source_word: לֵאָה בִתּוֹ
  chosen: Leah his daughter
  alternatives:
  - his daughter Leah
  lexicon: HALOT
  rationale: The Hebrew apposition places the personal name before 'his daughter.'
    English can preserve this closely as 'Leah his daughter,' which remains natural
    enough and reflects the source order.
- source_word: וַיָּבֵא אֹתָהּ אֵלָיו
  chosen: and brought her to him
  alternatives:
  - and led her to him
  - and brought her in to him
  lexicon: HALOT
  rationale: בוא in the Hiphil means 'bring.' 'Brought her to him' is the straightforward
    sense. 'Led' is possible but less direct; 'brought her in to him' adds a nuance
    not explicit in the Hebrew.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: and he went in to her
  alternatives:
  - and he had relations with her
  - and he came to her
  lexicon: HALOT
  rationale: בוא אל is a conventional Hebrew idiom for sexual union. 'Went in to her'
    preserves the idiomatic and euphemistic force of the Hebrew without flattening
    it into an explicit paraphrase. 'Came to her' is possible but less transparent
    to modern readers.
