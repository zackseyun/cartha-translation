id: GEN.29.16
reference: Genesis 29:16
source:
  edition: WLC
  text: וּ/לְ/לָבָ֖ן שְׁתֵּ֣י בָנ֑וֹת שֵׁ֤ם הַ/גְּדֹלָה֙ לֵאָ֔ה וְ/שֵׁ֥ם הַ/קְּטַנָּ֖ה
    רָחֵֽל׃
translation:
  text: Now Laban had two daughters; the name of the older was Leah, and the name
    of the younger was Rachel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to Laban [were] two daughters,' an idiom meaning 'Laban
      had two daughters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְלָבָן
  chosen: Now Laban had
  alternatives:
  - And Laban had
  - Laban had
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/to Laban,'
    an idiomatic Hebrew possession construction meaning 'Laban had' or 'there were
    to Laban.' 'Now' appropriately renders the discourse-linking waw in smooth English
    narrative while preserving the introduction of a new detail.
- source_word: שְׁתֵּי בָנוֹת
  chosen: two daughters
  lexicon: HALOT
  rationale: Straightforward numeral + noun construct phrase. 'Daughters' is the natural
    and formally accurate rendering.
- source_word: שֵׁם
  chosen: the name of
  alternatives:
  - one was named
  - named
  lexicon: HALOT
  rationale: The Hebrew repeats 'name of' in a formulaic identification pattern. Retaining
    'the name of' reflects the source structure more closely than collapsing both
    clauses into a more idiomatic but less transparent English phrasing.
- source_word: הַגְּדֹלָה
  chosen: the older
  alternatives:
  - the elder
  - the greater
  lexicon: HALOT
  rationale: In context of two sisters, the adjective refers to relative age/status
    as the elder sibling. 'Older' is clear modern English; 'elder' is possible but
    slightly more formal.
- source_word: לֵאָה
  chosen: Leah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: וְשֵׁם
  chosen: and the name of
  alternatives:
  - and one was named
  - and
  lexicon: HALOT
  rationale: The repeated nominal formula is preserved for transparency and rhythm,
    matching the Hebrew parallelism.
- source_word: הַקְּטַנָּה
  chosen: the younger
  alternatives:
  - the younger one
  - the lesser
  lexicon: HALOT
  rationale: In this sibling context, the adjective denotes the younger sister rather
    than smallness in size. 'Younger' best conveys the relational sense in natural
    English.
- source_word: רָחֵל
  chosen: Rachel
  rationale: Personal name transliterated by standard English convention.
