id: GEN.29.28
reference: Genesis 29:28
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ יַעֲקֹב֙ כֵּ֔ן וַ/יְמַלֵּ֖א שְׁבֻ֣עַ זֹ֑את וַ/יִּתֶּן ל֛/וֹ אֶת
    רָחֵ֥ל בִּתּ֖/וֹ ל֥/וֹ לְ/אִשָּֽׁה־־׃
translation:
  text: And Jacob did so, and he completed this week; then Laban gave him Rachel his
    daughter as his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this bridal week'; the Hebrew literally refers to a period of seven,
      here likely the wedding feast week.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - did as requested
  lexicon: HALOT
  rationale: The verb עשה here refers back to Laban’s instruction in the previous
    verse. 'Did so' is idiomatic English that preserves the anaphoric force of כֵּן
    without over-specifying the action.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - accordingly
  lexicon: HALOT
  rationale: Used adverbially with וַיַּעַשׂ to mean 'thus/so.' 'Did so' is the most
    natural modern English rendering.
- source_word: וַיְמַלֵּא
  chosen: completed
  alternatives:
  - fulfilled
  - finished
  lexicon: HALOT
  rationale: The piel of מלא here means to complete or fulfill a period of time. 'Completed'
    is clear modern English and fits the temporal object 'week.'
- source_word: שְׁבֻעַ זֹאת
  chosen: this week
  alternatives:
  - the bridal week
  - this seven-day period
  lexicon: HALOT
  rationale: שְׁבֻעַ literally denotes a period of seven, and in this marriage context
    refers to the wedding week. 'This week' is concise and natural, while the cultural
    specificity can be preserved in a footnote.
- source_word: וַיִּתֶּן לוֹ
  chosen: then Laban gave him
  alternatives:
  - and he gave him
  lexicon: HALOT
  rationale: The subject is implicitly Laban from the prior context. Supplying 'Laban'
    in English avoids ambiguity. 'Then' captures the narrative sequence of the waw-consecutive.
- source_word: אֶת רָחֵל בִּתּוֹ
  chosen: Rachel his daughter
  alternatives:
  - Rachel, his daughter
  lexicon: HALOT
  rationale: A straightforward rendering of the direct object plus apposition/relationship
    term. English does not require a comma, though either punctuation choice is possible.
- source_word: לוֹ לְאִשָּׁה
  chosen: as his wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This construction commonly indicates giving a woman in marriage. 'As
    his wife' is idiomatic modern English and preserves the marital sense without
    archaic phrasing.
