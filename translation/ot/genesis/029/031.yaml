id: GEN.29.31
reference: Genesis 29:31
source:
  edition: WLC
  text: וַ/יַּ֤רְא יְהוָה֙ כִּֽי שְׂנוּאָ֣ה לֵאָ֔ה וַ/יִּפְתַּ֖ח אֶת רַחְמָ֑/הּ וְ/רָחֵ֖ל עֲקָרָֽה־־׃
translation:
  text: When Yahweh saw that Leah was unloved, he opened her womb, but Rachel was barren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unloved' or 'loved less,' reflecting the comparative sense the term can carry in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked upon
  - took notice
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form is straightforwardly 'saw.' In context it conveys divine perception/notice, but 'saw' preserves the Hebrew wording without over-interpreting.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what the LORD saw: ''that Leah was hated.'' This is more natural and syntactically precise than a causal ''because'' in English.'
- source_word: שְׂנוּאָה
  chosen: hated
  alternatives:
  - unloved
  - less loved
  - rejected
  lexicon: HALOT
  rationale: The passive participle from שׂנא most directly means 'hated.' Although in some contexts it can express being loved less by comparison, the translation philosophy prioritizes original-language primacy over softening by tradition. The comparative nuance can be preserved in a footnote.
- source_word: לֵאָה
  chosen: Leah
  rationale: Standard English transliteration of the personal name.
- source_word: וַיִּפְתַּח אֶת רַחְמָהּ
  chosen: he opened her womb
  alternatives:
  - he enabled her to conceive
  - he made her fruitful
  lexicon: HALOT
  rationale: פתח 'open' with רֶחֶם/רחם 'womb' is an idiomatic Hebrew expression for enabling conception. 'Opened her womb' preserves the concrete metaphor while remaining clear in English.
- source_word: רַחְמָהּ
  chosen: her womb
  lexicon: HALOT
  rationale: The noun with 3fs suffix refers to Leah's womb. Singular 'womb' is the natural English rendering.
- source_word: וְרָחֵל
  chosen: but Rachel
  alternatives:
  - and Rachel
  rationale: 'Although ו can be simply ''and,'' the clause is contrastive in context: Leah''s fertility is set against Rachel''s barrenness. ''But'' brings out the discourse contrast naturally in English.'
- source_word: עֲקָרָה
  chosen: was barren
  alternatives:
  - was infertile
  - was childless
  lexicon: HALOT
  rationale: עֲקָרָה denotes barrenness/infertility. 'Was barren' is the standard, concise rendering and fits the narrative register.
