theological_decisions:
- issue: Whether to soften Leah's status from 'hated' to 'unloved' for theological or pastoral reasons
  chosen_reading: Leah was hated
  alternative_readings:
  - Leah was unloved
  - Leah was less loved
  rationale: The Hebrew participle שְׂנוּאָה most directly means 'hated.' While the broader narrative may imply relative disfavor in comparison with Rachel, the text itself uses stronger language. To preserve theological and emotional tension rather than resolve it, the main text keeps 'hated' and a footnote preserves the softer comparative alternative.
  doctrine_reference: Translation philosophy §§1, 3, 6
