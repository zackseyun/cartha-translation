id: GEN.29.2
reference: Genesis 29:2
source:
  edition: WLC
  text: וַ/יַּ֞רְא וְ/הִנֵּ֧ה בְאֵ֣ר בַּ/שָּׂדֶ֗ה וְ/הִנֵּה שָׁ֞ם שְׁלֹשָׁ֤ה עֶדְרֵי
    צֹאן֙ רֹבְצִ֣ים עָלֶ֔י/הָ כִּ֚י מִן הַ/בְּאֵ֣ר הַ/הִ֔וא יַשְׁק֖וּ הָ/עֲדָרִ֑ים
    וְ/הָ/אֶ֥בֶן גְּדֹלָ֖ה עַל פִּ֥י הַ/בְּאֵֽר־־־־׃
translation:
  text: He looked, and behold, there was a well in the field, and behold, three flocks
    of sheep were lying there beside it, because from that well they watered the flocks.
    And the stone on the mouth of the well was large.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He saw.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'behold' twice for vividness.
    reason: lexical_alternative
  - marker: c
    text: Or 'by it' or, more literally, 'upon it.'
    reason: lexical_alternative
  - marker: d
    text: Or 'for from that well they would water the flocks.'
    reason: lexical_alternative
  - marker: e
    text: Literally 'on the mouth of the well'; that is, over its opening.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: He looked
  alternatives:
  - He saw
  lexicon: HALOT
  rationale: The wayyiqtol of ראה advances the narrative. 'He looked' fits the immediate
    scene-setting and naturally introduces what follows; 'he saw' is possible but
    slightly less vivid in English.
- source_word: וְהִנֵּה ... וְהִנֵּה
  chosen: and behold ... and behold
  alternatives:
  - and there was ... and there were
  - look ... look
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. Retaining 'behold'
    preserves the Hebrew's vividness and repeated deictic force in this narrative
    moment better than fully smoothing it away.
- source_word: בְאֵר
  chosen: a well
  alternatives:
  - a spring-well
  lexicon: HALOT
  rationale: The standard sense is 'well.' Nothing in the verse requires a more specific
    rendering.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field' or open countryside. 'In the field' is
    the most direct and idiomatic rendering here.
- source_word: שְׁלֹשָׁה עֶדְרֵי צֹאן
  chosen: three flocks of sheep
  alternatives:
  - three droves of sheep
  - three flocks
  lexicon: HALOT
  rationale: עֵדֶר denotes a flock/herd, and צֹאן specifies small livestock, especially
    sheep/goats. 'Flocks of sheep' is clear and natural; 'sheep' is acceptable as
    a representative rendering in context.
- source_word: רֹבְצִים
  chosen: were lying
  alternatives:
  - were resting
  - were crouching
  lexicon: HALOT
  rationale: The participle of רבץ refers to animals lying down or resting. 'Were
    lying' is the most literal and fits the pastoral scene.
- source_word: עָלֶיהָ
  chosen: beside it
  alternatives:
  - by it
  - near it
  - upon it
  lexicon: HALOT
  rationale: Literally 'upon/over it,' but with a well as referent the idiomatic spatial
    sense is proximity. 'Beside it' communicates the intended location in natural
    English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces an explanation for why the flocks were lying there.
    'Because' makes the causal relation explicit in contemporary English.
- source_word: מִן הַבְּאֵר הַהִוא
  chosen: from that well
  alternatives:
  - from the well there
  - from this well
  lexicon: HALOT
  rationale: The demonstrative הַהִוא points to a specific well in view. 'That well'
    preserves the deictic specificity.
- source_word: יַשְׁקוּ
  chosen: they watered
  alternatives:
  - they would water
  - one watered
  lexicon: HALOT
  rationale: The Hiphil of שׁקה means 'give drink, water.' The plural subject is indefinite/impersonal
    in English, but 'they watered' is a straightforward rendering matching the Hebrew
    verbal form.
- source_word: הָעֲדָרִים
  chosen: the flocks
  alternatives:
  - the herds
  lexicon: HALOT
  rationale: Consistent with עֶדֶר earlier in the verse. 'Flocks' suits the sheep
    context better than 'herds.'
- source_word: וְהָאֶבֶן גְּדֹלָה
  chosen: And the stone ... was large
  alternatives:
  - Now the stone ... was large
  - and a large stone
  lexicon: HALOT
  rationale: The clause is descriptive, not merely adjectival. Rendering it as a full
    clause preserves the Hebrew structure and prepares for the next verse's action.
- source_word: עַל פִּי הַבְּאֵר
  chosen: on the mouth of the well
  alternatives:
  - over the opening of the well
  - at the mouth of the well
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth' and is a common idiom for an opening. 'On
    the mouth of the well' is transparent and preserves the metaphor; 'opening' is
    possible but less formally tied to the Hebrew.
