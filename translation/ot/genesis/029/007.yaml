id: GEN.29.7
reference: Genesis 29:7
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הֵ֥ן עוֹד֙ הַ/יּ֣וֹם גָּד֔וֹל לֹא עֵ֖ת הֵאָסֵ֣ף הַ/מִּקְנֶ֑ה הַשְׁק֥וּ
    הַ/צֹּ֖אן וּ/לְכ֥וּ רְעֽוּ־׃
translation:
  text: Then he said, “Look, the day is still long; it is not time for the livestock
    to be gathered. Water the flock, then go and pasture them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “it is still broad daylight.” The Hebrew idiom literally says “the day
      is still great/long,” meaning much of the day remains.
    reason: lexical_alternative
  - marker: b
    text: “Livestock” renders a collective term that can refer broadly to domesticated
      herd animals, while “the flock” renders a more specific term for small livestock
      such as sheep or goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention. 'Look' preserves the discourse
    force in readable modern English better than the more archaic 'Behold.'
- source_word: עוֹד הַיּוֹם גָּדוֹל
  chosen: the day is still long
  alternatives:
  - it is still broad daylight
  - the day is still great
  lexicon: HALOT
  rationale: The idiom indicates that much of the day remains. 'Still long' communicates
    remaining daylight naturally in English without flattening the temporal sense.
- source_word: לֹא עֵת הֵאָסֵף הַמִּקְנֶה
  chosen: it is not time for the livestock to be gathered
  alternatives:
  - it is not the time to gather the cattle
  - it is not time for the herds to be brought in
  lexicon: HALOT
  rationale: עֵת marks the proper time; הֵאָסֵף is a passive infinitive/infinitival
    form, 'to be gathered'; מִקְנֶה is a collective term for livestock/herd animals,
    broader than only sheep. 'Livestock' best matches the collective noun.
- source_word: הַשְׁקוּ
  chosen: Water
  alternatives:
  - Give water to
  - Let ... drink
  lexicon: HALOT
  rationale: Hiphil imperative from שׁקה means to give water / cause to drink. 'Water'
    is concise, idiomatic, and preserves the imperative force.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  lexicon: HALOT
  rationale: Though often sheep specifically, צֹאן can function collectively for small
    livestock, especially sheep/goats. In this scene at the well, 'the flock' is the
    most natural collective rendering.
- source_word: וּלְכוּ
  chosen: then go
  alternatives:
  - and go
  lexicon: HALOT
  rationale: Simple imperative with conjunction. 'Then go' reflects the sequence implied
    by the two commands in English.
- source_word: רְעוּ
  chosen: pasture them
  alternatives:
  - feed them
  - graze them
  - shepherd them
  lexicon: HALOT
  rationale: From רעה in the sense of tending/grazing animals. 'Pasture them' best
    fits the immediate context of taking animals out to graze after watering; 'shepherd
    them' is broader and less specific.
