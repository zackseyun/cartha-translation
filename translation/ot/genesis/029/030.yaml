id: GEN.29.30
reference: Genesis 29:30
source:
  edition: WLC
  text: וַ/יָּבֹא֙ גַּ֣ם אֶל רָחֵ֔ל וַ/יֶּאֱהַ֥ב גַּֽם אֶת רָחֵ֖ל מִ/לֵּאָ֑ה וַ/יַּעֲבֹ֣ד
    עִמּ֔/וֹ ע֖וֹד שֶֽׁבַע שָׁנִ֥ים אֲחֵרֽוֹת־־־־׃
translation:
  text: So he went in to Rachel also, and he loved Rachel more than Leah; and he served
    with him for another seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he loved Rachel rather than Leah.' The Hebrew preposition can mark comparison,
      here most naturally 'more than Leah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא ... אֶל רָחֵל
  chosen: he went in to Rachel also
  alternatives:
  - he went to Rachel also
  - he had relations with Rachel also
  lexicon: HALOT
  rationale: בוא with אֶל in this marriage context is a conventional idiom for entering
    the woman's tent/bed, implying consummation. 'Went in to' preserves the idiomatic
    and sexual sense without becoming overly explicit. גַּם is retained as 'also'
    to mark addition after Leah.
- source_word: וַיֶּאֱהַב ... אֶת רָחֵל
  chosen: he loved Rachel
  alternatives:
  - he loved Rachel dearly
  lexicon: HALOT
  rationale: אָהַב is the standard verb 'love.' No intensifying adverb is present
    in the verb itself, so the simple rendering is preferred.
- source_word: מִלֵּאָה
  chosen: more than Leah
  alternatives:
  - rather than Leah
  - beyond Leah
  lexicon: HALOT
  rationale: The preposition מִן after a verb of affection commonly marks comparison.
    In English, 'loved Rachel more than Leah' is the most natural and contextually
    accurate rendering, making explicit the comparative force.
- source_word: וַיַּעֲבֹד עִמּוֹ
  chosen: he served with him
  alternatives:
  - he worked for him
  - he served him
  lexicon: HALOT
  rationale: עבד means 'serve/work.' With עִם plus pronominal suffix ('with him'),
    the Hebrew literally says 'served with him,' referring to continued labor under
    Laban. This preserves the preposition rather than smoothing it away entirely.
- source_word: עוֹד שֶׁבַע שָׁנִים אֲחֵרוֹת
  chosen: for another seven years
  alternatives:
  - seven more years
  - yet another seven years
  lexicon: HALOT
  rationale: עוֹד plus numeral and אֲחֵרוֹת expresses an additional period. 'Another
    seven years' is idiomatic modern English and accurately conveys the added term
    of service.
