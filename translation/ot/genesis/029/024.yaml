id: GEN.29.24
reference: Genesis 29:24
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן לָבָן֙ לָ֔/הּ אֶת זִלְפָּ֖ה שִׁפְחָת֑/וֹ לְ/לֵאָ֥ה בִתּ֖/וֹ שִׁפְחָֽה־׃
translation:
  text: And Laban gave Zilpah his female servant to Leah his daughter as a female
    servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidservant'; the Hebrew term denotes a female servant of dependent,
      likely enslaved, status.
    reason: lexical_alternative
  - marker: b
    text: Or 'And Laban gave Zilpah, his female servant, to Leah his daughter as a
      female servant.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - gave over
  - assigned
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן straightforwardly denotes giving. 'Gave'
    is the natural narrative rendering in English and fits the transactional sense
    here without overinterpreting.
- source_word: לָהּ
  chosen: to Leah
  alternatives:
  - to her
  lexicon: HALOT
  rationale: The pronominal suffix literally means 'to her,' but English is clearer
    if the referent is made explicit from the following apposition 'to Leah his daughter.'
    This is a minimal explicitation consistent with optimal equivalence.
- source_word: זִלְפָּה
  chosen: Zilpah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: שִׁפְחָתוֹ
  chosen: his female servant
  alternatives:
  - his maidservant
  - his slave girl
  lexicon: HALOT
  rationale: שִׁפְחָה refers to a female slave/servant of lower status. 'Female servant'
    preserves the gender and dependent status in readable modern English. 'Maidservant'
    is traditional but somewhat dated; 'slave girl' may sound too juvenile and harsh
    for this immediate appositional identification, though the bonded status is present.
- source_word: לְלֵאָה בִתּוֹ
  chosen: to Leah his daughter
  alternatives:
  - for Leah his daughter
  lexicon: HALOT
  rationale: The lamed marks the indirect object/recipient. 'To Leah his daughter'
    is the most direct rendering and preserves the filial apposition.
- source_word: שִׁפְחָה
  chosen: as a female servant
  alternatives:
  - as her female servant
  - to be her servant
  - as a maidservant
  lexicon: HALOT
  rationale: The final accusative/appositional noun states the role in which Zilpah
    was given. 'As a female servant' preserves the formal role assignment. Adding
    'her' would clarify the relationship but is not explicit in the Hebrew, so it
    is left implicit.
