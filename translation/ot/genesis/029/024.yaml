  from: And Laban gave Zilpah, his female servant, to Leah his daughter as a female
    servant.
  to: And Laban gave Zilpah, his female servant, to Leah his daughter to be her servant.
  rationale: The direct translation of the repeated Hebrew word 'šip̄ḥāh' results
    in the awkward repetition of 'female servant' in English. While formally accurate,
    it is stylistically poor. Changing the final phrase from 'as a female servant'
    to the infinitive clause 'to be her servant' is a more natural English idiom for
    this Hebrew construction (a second accusative indicating role/purpose). This change
    resolves the awkwardness, improves readability, and does not alter the essential
    meaning.
