id: GEN.29.14
reference: Genesis 29:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ לָבָ֔ן אַ֛ךְ עַצְמִ֥/י וּ/בְשָׂרִ֖/י אָ֑תָּה וַ/יֵּ֥שֶׁב
    עִמּ֖/וֹ חֹ֥דֶשׁ יָמִֽים׃
translation:
  text: Then Laban said to him, “Surely you are my bone and my flesh.” And he stayed
    with him a month of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''my bone and my flesh,'' meaning close blood relation or
      kin.'
    reason: cultural_note
  - marker: b
    text: Or more idiomatically, 'a full month' or 'for a month.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - indeed
  - truly
  - only
  lexicon: HALOT
  rationale: Here אַךְ functions as an asseverative particle, affirming kinship rather
    than restricting it. 'Surely' best captures the emphatic recognition in context.
- source_word: עַצְמִי וּבְשָׂרִי
  chosen: my bone and my flesh
  alternatives:
  - my own flesh and bone
  - my kinsman
  lexicon: HALOT
  rationale: This is a kinship idiom. The literal rendering is retained to preserve
    the Hebrew imagery and its intertextual resonance, rather than flattening it to
    'kinsman' in the main text.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you indeed are
  lexicon: HALOT
  rationale: The independent pronoun supplies the predication in context. English
    requires the copula, so 'you are' is the natural equivalent.
- source_word: וַיֵּשֶׁב
  chosen: And he stayed
  alternatives:
  - and he lived
  - and he remained
  - and he dwelt
  lexicon: HALOT
  rationale: ישב here refers to remaining/lodging with Laban for a period. 'Stayed'
    is idiomatic modern English and fits the temporary timeframe.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward prepositional phrase referring to Jacob staying with
    Laban.
- source_word: חֹדֶשׁ יָמִים
  chosen: a month of days
  alternatives:
  - a full month
  - for a month
  lexicon: HALOT
  rationale: The Hebrew expression is somewhat idiomatic, but the literal form 'a
    month of days' is preserved because it is intelligible in English and reflects
    the source wording more closely than a fully smoothed paraphrase.
