id: GEN.29.17
reference: Genesis 29:17
source:
  edition: WLC
  text: וְ/עֵינֵ֥י לֵאָ֖ה רַכּ֑וֹת וְ/רָחֵל֙ הָֽיְתָ֔ה יְפַת תֹּ֖אַר וִ/יפַ֥ת מַרְאֶֽה־׃
translation:
  text: Leah’s eyes were soft, but Rachel was beautiful in form and beautiful in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Leah’s eyes were tender,' 'delicate,' or 'weak.' The Hebrew adjective
      can suggest softness or delicacy; the exact nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי
  chosen: eyes
  alternatives:
  - look
  - appearance
  lexicon: HALOT
  rationale: The construct plural plainly denotes Leah's eyes, not her general appearance.
    Rendering it literally preserves the Hebrew focus on a specific feature.
- source_word: רַכּוֹת
  chosen: soft
  alternatives:
  - weak
  - delicate
  - tender
  lexicon: HALOT
  rationale: The adjective can denote softness/tenderness. 'Soft' is the most semantically
    basic and least interpretively loaded option in English. More evaluative renderings
    like 'weak' risk importing a negative judgment that the Hebrew adjective itself
    does not require; 'delicate' is possible but more interpretive. Because the phrase
    is debated in English tradition, the alternative is preserved in a footnote.
- source_word: יְפַת תֹּאַר
  chosen: beautiful in form
  alternatives:
  - beautiful of figure
  - well-formed
  lexicon: HALOT
  rationale: This collocation refers to physical shape or figure. 'Beautiful in form'
    is natural English while staying close to the Hebrew expression.
- source_word: וִיפַת מַרְאֶה
  chosen: beautiful in appearance
  alternatives:
  - beautiful to look at
  - beautiful in countenance
  lexicon: HALOT
  rationale: מַרְאֶה concerns visible appearance. Rendering the paired phrases distinctly
    ('form' / 'appearance') preserves the Hebrew's twofold description rather than
    collapsing them into a single adjective.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' the clause functions contrastively
    in context, setting Leah and Rachel side by side. 'But' communicates the discourse
    contrast in idiomatic English without over-paraphrasing.
