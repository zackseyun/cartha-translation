id: GEN.29.8
reference: Genesis 29:8
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֮ לֹ֣א נוּכַל֒ עַ֣ד אֲשֶׁ֤ר יֵאָֽסְפוּ֙ כָּל הָ֣/עֲדָרִ֔ים וְ/גָֽלֲלוּ֙
    אֶת הָ/אֶ֔בֶן מֵ/עַ֖ל פִּ֣י הַ/בְּאֵ֑ר וְ/הִשְׁקִ֖ינוּ הַ/צֹּֽאן־־׃
translation:
  text: They said, “We cannot until all the flocks are gathered and they roll the
    stone away from the mouth of the well; then we water the sheep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flock'; Hebrew צאן can refer collectively to small livestock, especially
      sheep and goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוּכַל
  chosen: we cannot
  alternatives:
  - we are not able
  - it is not possible for us
  lexicon: HALOT
  rationale: The verb יכל in the first person plural expresses inability. 'We cannot'
    is natural modern English and preserves the direct force of the statement.
- source_word: יֵאָסְפוּ
  chosen: are gathered
  alternatives:
  - have been gathered
  - assemble
  lexicon: HALOT
  rationale: 'Niphal of אסף is passive/reflexive here: the flocks are brought together.
    ''Are gathered'' fits the temporal clause introduced by עַד אֲשֶׁר.'
- source_word: הָעֲדָרִים
  chosen: the flocks
  alternatives:
  - the herds
  lexicon: HALOT
  rationale: עדר commonly refers to a flock/herd of small livestock. Since the verse
    ends with הַצֹּאן ('the sheep/flock'), 'flocks' here avoids over-specification
    while fitting the pastoral setting.
- source_word: וְגָלֲלוּ אֶת־הָאֶבֶן
  chosen: they roll the stone away
  alternatives:
  - they roll the stone
  - the stone is rolled away
  lexicon: HALOT
  rationale: גלל means 'roll.' In context the action is removing the covering stone
    from the well. 'Roll the stone away' makes the implied motion explicit in idiomatic
    English without adding new content.
- source_word: מֵעַל פִּי הַבְּאֵר
  chosen: from the mouth of the well
  alternatives:
  - from over the opening of the well
  - from upon the mouth of the well
  lexicon: HALOT
  rationale: פִּי literally 'mouth' is the standard Hebrew idiom for an opening. Retaining
    'mouth of the well' preserves the concrete imagery and remains understandable
    in English.
- source_word: וְהִשְׁקִינוּ
  chosen: then we water
  alternatives:
  - and we water
  - we give water to
  lexicon: HALOT
  rationale: Hiphil of שקה means 'give water to, water.' Because the clause is sequential
    after the gathering and stone removal, 'then we water' conveys the temporal sense
    clearly.
- source_word: הַצֹּאן
  chosen: the sheep
  alternatives:
  - the flock
  - the small livestock
  lexicon: HALOT
  rationale: צאן can denote small livestock collectively, often sheep and goats. Here
    'the sheep' is a natural rendering in context and matches common English pastoral
    usage, though broader 'flock' is possible.
