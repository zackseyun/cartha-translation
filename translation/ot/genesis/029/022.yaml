id: GEN.29.22
reference: Genesis 29:22
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֥ף לָבָ֛ן אֶת כָּל אַנְשֵׁ֥י הַ/מָּק֖וֹם וַ/יַּ֥עַשׂ מִשְׁתֶּֽה־־׃
translation:
  text: So Laban gathered all the men of the place and made a feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the people of the place.' The Hebrew more literally says 'all the
      men of the place,' and the translation keeps the masculine form because it likely
      refers to the male townsmen invited to the wedding celebration.
    reason: lexical_alternative
  - marker: b
    text: '''Feast'' translates a Hebrew term often used for a celebratory banquet
      and can imply drinking as part of the occasion.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: The verb אסף in this narrative context means to bring people together.
    'Gathered' is natural modern English and preserves the concrete action without
    overformal stiffness.
- source_word: לָבָן
  chosen: Laban
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: אֶת כָּל אַנְשֵׁי הַמָּקוֹם
  chosen: all the men of the place
  alternatives:
  - all the people of the place
  - all the men of that place
  lexicon: HALOT
  rationale: אַנְשֵׁי is the masculine plural construct of אִישׁ, literally 'men of.'
    In context it likely refers to the male townsmen invited to the wedding feast.
    Following the gender-accurate principle, 'men' is preferred over the more neutral
    'people.' 'Of the place' reflects הַמָּקוֹם straightforwardly without specifying
    'town' beyond the Hebrew.
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - prepared
  - held
  lexicon: HALOT
  rationale: עשה is a broad verb meaning 'do/make.' With מִשְׁתֶּה, English idiom
    allows 'made a feast,' which stays close to the Hebrew while remaining readable.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - a banquet
  - a drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast, often one involving drinking and celebration.
    'Feast' is the best concise rendering in this wedding context. 'Banquet' is possible
    but slightly more formal; 'drinking feast' is more explicit than the context requires.
