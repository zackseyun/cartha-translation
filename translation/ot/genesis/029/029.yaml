id: GEN.29.29
reference: Genesis 29:29
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן לָבָן֙ לְ/רָחֵ֣ל בִּתּ֔/וֹ אֶת בִּלְהָ֖ה שִׁפְחָת֑/וֹ לָ֖/הּ לְ/שִׁפְחָֽה־׃
translation:
  text: And Laban gave Bilhah, his female servant, to Rachel his daughter as her female
    servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "maidservant" for both occurrences of the Hebrew שִׁפְחָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - assigned
  - presented
  lexicon: HALOT
  rationale: 'The waw-consecutive form of נתן straightforwardly narrates a past action:
    ''and he gave.'' ''Gave'' is the plainest and most idiomatic rendering in context.'
- source_word: לָבָן
  chosen: Laban
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: לְרָחֵל
  chosen: to Rachel
  alternatives:
  - for Rachel
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/recipient here. 'To Rachel'
    best reflects the syntax and sense.
- source_word: בִּתּוֹ
  chosen: his daughter
  alternatives:
  - daughter of his
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix referring to Laban. Standard English possessive
    order is most natural.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent; its function is
    represented by English word order.
- source_word: בִּלְהָה
  chosen: Bilhah
  rationale: Personal name transliterated by standard English convention.
- source_word: שִׁפְחָתוֹ
  chosen: his female servant
  alternatives:
  - his maidservant
  - his slave-girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. In this domestic context, 'female
    servant' is clear modern English and preserves the gendered term without importing
    unnecessary archaism. 'Maidservant' is possible but less current; 'slave-girl'
    may over-specify age not present in the Hebrew.
- source_word: לָהּ
  chosen: as her
  alternatives:
  - to her, as
  lexicon: HALOT
  rationale: The pronoun refers back to Rachel. In combination with the following
    לְשִׁפְחָה, English idiom is best expressed as 'as her female servant' rather
    than a wooden repetition of 'to her for a...'
- source_word: לְשִׁפְחָה
  chosen: female servant
  alternatives:
  - maidservant
  - servant
  lexicon: HALOT
  rationale: The second occurrence states Bilhah's role relative to Rachel. Rendering
    it consistently as 'female servant' preserves the lexical repetition of שִׁפְחָה
    in readable modern English.
