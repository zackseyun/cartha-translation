id: GEN.29.4
reference: Genesis 29:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ יַעֲקֹ֔ב אַחַ֖/י מֵ/אַ֣יִן אַתֶּ֑ם וַ/יֹּ֣אמְר֔וּ מֵ/חָרָ֖ן
    אֲנָֽחְנוּ׃
translation:
  text: Jacob said to them, “My brothers, where are you from?” They said, “We are
    from Haran.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “from where are you?”
    reason: lexical_alternative
  - marker: b
    text: “My brothers” is a courteous fraternal address here, not necessarily a claim
      of literal kinship.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: The verb אמר is the standard verb of speech, best rendered 'said.' In
    English, the following direct question makes 'said' natural without over-interpreting
    the speech act as 'asked' in the main text.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: 'The preposition ל with 3mp suffix marks the indirect object of Jacob''s
    speech: ''to them.'''
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אַחַי
  chosen: My brothers
  alternatives:
  - Brothers
  - My kinsmen
  - My friends
  lexicon: HALOT
  rationale: Literally 'my brothers.' In context Jacob is addressing unknown male
    shepherds courteously, likely as a fraternal form of address rather than asserting
    literal kinship. The possessive is retained because it is present in the Hebrew,
    and 'brothers' is gender-accurate to the masculine plural addressees.
- source_word: מֵאַיִן
  chosen: where are you from
  alternatives:
  - from where
  - where from
  lexicon: HALOT
  rationale: The interrogative with prefixed מ expresses origin/source. Idiomatic
    modern English is 'where are you from?' rather than the more wooden 'from where
    are you?'.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: Second masculine plural pronoun, reflected in English by 'you' within
    the question.
- source_word: וַיֹּאמְרוּ
  chosen: They said
  alternatives:
  - They answered
  lexicon: HALOT
  rationale: Again the standard speech verb אמר. 'They said' is formally closer; 'answered'
    is possible by context but not required.
- source_word: מֵחָרָן
  chosen: from Haran
  rationale: Preposition מ marks origin; Haran is the place name, transliterated in
    standard English form.
- source_word: אֲנָחְנוּ
  chosen: We are
  alternatives:
  - we
  lexicon: HALOT
  rationale: 'The independent pronoun ''we'' functions as the full reply in Hebrew.
    English normally supplies the copula for naturalness: ''We are from Haran.'''
