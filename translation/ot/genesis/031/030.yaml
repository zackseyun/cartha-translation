id: GEN.31.30
reference: Genesis 31:30
source:
  edition: WLC
  text: וְ/עַתָּה֙ הָלֹ֣ךְ הָלַ֔כְתָּ כִּֽי נִכְסֹ֥ף נִכְסַ֖פְתָּה לְ/בֵ֣ית אָבִ֑י/ךָ
    לָ֥/מָּה גָנַ֖בְתָּ אֶת אֱלֹהָֽ/י־־׃
translation:
  text: And now, you have indeed gone away, because you longed greatly for your father's
    house. Why did you steal my gods?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my household gods.' The Hebrew here reads simply 'my gods,' but in
      context it refers to Laban's domestic idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing Laban's next point in the accusation; 'And
    now' preserves the connective force of ו plus the temporal adverb.
- source_word: הָלֹךְ הָלַכְתָּ
  chosen: you have indeed gone away
  alternatives:
  - you have surely gone
  - you have gone off
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'Have indeed gone away' captures both the completed action and emphatic force
    in natural English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason Laban concedes for Jacob's departure. 'Because'
    is clearer in modern English than the more formal 'for'.
- source_word: נִכְסֹף נִכְסַפְתָּה
  chosen: you longed greatly
  alternatives:
  - you intensely longed
  - you were homesick for
  lexicon: HALOT
  rationale: Another infinitive absolute plus finite verb construction expressing
    intensity. The root כָּסַף here denotes strong longing. 'Longed greatly' preserves
    the emphasis without paraphrasing into idiom like 'homesick.'
- source_word: לְבֵית אָבִיךָ
  chosen: for your father's house
  alternatives:
  - for the house of your father
  - for your ancestral home
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Your father's house' is both literal
    and idiomatic in English, preserving the familial-household sense.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative introducing Laban's accusation.
- source_word: גָנַבְתָּ
  chosen: did you steal
  alternatives:
  - have you stolen
  lexicon: HALOT
  rationale: Simple past works naturally in English in this direct question following
    the prior concession.
- source_word: אֶת אֱלֹהָי
  chosen: my gods
  alternatives:
  - my gods-images
  - my household gods
  lexicon: HALOT
  rationale: The plural form with 1cs suffix is most directly 'my gods.' In context
    these are household deities/teraphim, but that noun is not present in this verse,
    so the main text should not import it. A clarifying alternative is suitable for
    a footnote.
