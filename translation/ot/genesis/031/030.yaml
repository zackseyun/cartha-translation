theological_decisions:
- issue: Rendering אֱלֹהָי in Laban's speech
  chosen_reading: my gods
  alternative_readings:
  - my household gods
  rationale: The Hebrew text here simply says 'my gods,' referring to Laban's domestic
    deities. The translation preserves the plain lexical form without softening or
    reinterpreting it. Because the referent is likely the household idols mentioned
    in the surrounding context, that clarification is preserved in a footnote rather
    than imported into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where clarification is useful without
    being explicit in the source.'
