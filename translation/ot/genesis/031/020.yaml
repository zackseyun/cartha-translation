id: GEN.31.20
reference: Genesis 31:20
source:
  edition: WLC
  text: וַ/יִּגְנֹ֣ב יַעֲקֹ֔ב אֶת לֵ֥ב לָבָ֖ן הָ/אֲרַמִּ֑י עַל בְּלִי֙ הִגִּ֣יד ל֔/וֹ
    כִּ֥י בֹרֵ֖חַ הֽוּא־־׃
translation:
  text: And Jacob deceived Laban the Aramean by not telling him that he was fleeing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'And Jacob stole the heart of Laban the Aramean,' a Hebrew idiom
      meaning that he deceived him or took him by surprise.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְנֹב
  chosen: deceived
  alternatives:
  - stole
  - stole the heart of
  - outwitted
  lexicon: HALOT
  rationale: Although the verb literally means 'stole,' the idiom 'stole the heart'
    in Hebrew conveys acting stealthily so as to deceive or take unawares. In English,
    'deceived' best communicates the idiomatic sense here without implying emotional
    affection.
- source_word: אֶת לֵב
  chosen: deceived
  alternatives:
  - stole the heart of
  - stole from the mind of
  lexicon: HALOT
  rationale: The object 'the heart of' forms part of the Hebrew idiom with גנב. Rendering
    the whole expression idiomatically avoids a misleadingly literal English phrase.
- source_word: הָאֲרַמִּי
  chosen: the Aramean
  alternatives:
  - the Syrian
  lexicon: HALOT
  rationale: '''Aramean'' reflects the Hebrew ethnic/geographic designation more directly
    than the traditional but less precise ''Syrian''.'
- source_word: עַל בְּלִי הִגִּיד לוֹ
  chosen: by not telling him
  alternatives:
  - because he did not tell him
  - without telling him
  lexicon: HALOT
  rationale: This construction explains the manner/means by which Jacob deceived Laban.
    'By not telling him' is natural English and preserves the causal-instrumental
    force.
- source_word: כִּי בֹרֵחַ הוּא
  chosen: that he was fleeing
  alternatives:
  - that he was running away
  - that he intended to flee
  lexicon: HALOT
  rationale: The participle expresses ongoing action or immediate circumstance. 'Was
    fleeing' preserves the verbal aspect and the seriousness of Jacob's departure
    better than the more colloquial 'running away.'
