  from: he was not with him
  to: it was not toward him
  rationale: The current rendering 'he was not with him' creates pronoun ambiguity in English, as it's unclear who 'he' and 'him' refer to without careful contextual deduction. The Hebrew subject of the verb 'to be' (implied in אֵינֶנּוּ) is best understood as the preceding 'face of Laban' (פְּנֵי לָבָן), which is grammatically singular in concept and thus takes the English pronoun 'it'. Furthermore, the preposition עִם ('with') in this idiom involving 'face' denotes disposition. Translating it as 'toward' provides better English clarity and aligns with the parallel expression in Genesis 31:5, which uses אֶל ('to/toward'). The suggested rewrite 'it was not toward him' resolves the ambiguity and more clearly conveys the meaning of the Hebrew idiom.
