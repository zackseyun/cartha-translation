id: GEN.31.2
reference: Genesis 31:2
source:
  edition: WLC
  text: וַ/יַּ֥רְא יַעֲקֹ֖ב אֶת פְּנֵ֣י לָבָ֑ן וְ/הִנֵּ֥ה אֵינֶ֛/נּוּ עִמּ֖/וֹ כִּ/תְמ֥וֹל שִׁלְשֽׁוֹם־׃
translation:
  text: And Jacob saw Laban’s face, and behold, it was not toward him as before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “he was not with him as yesterday and the day before,” an idiom meaning his attitude toward Jacob had changed from earlier days.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was not with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - noticed
  lexicon: HALOT
  rationale: Qal wayyiqtol of ראה, the standard narrative verb 'saw.' 'Saw' preserves the simple observational sense without adding interpretation.
- source_word: פְּנֵי לָבָן
  chosen: Laban’s face
  alternatives:
  - Laban’s expression
  - the face of Laban
  lexicon: HALOT
  rationale: Hebrew 'face' often conveys visible disposition or attitude. 'Laban’s face' keeps the concrete Hebrew image while allowing the reader to infer the change in demeanor.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and indeed
  lexicon: HALOT
  rationale: הִנֵּה marks attention to what follows. 'And behold' preserves the discourse force and the narrative vividness better than a flatter connective.
- source_word: אֵינֶנּוּ עִמּוֹ
  chosen: he was not with him
  alternatives:
  - he was not toward him
  - he was not on his side
  - his attitude was not the same toward him
  lexicon: HALOT
  rationale: Literally, 'he is not with him.' In context this idiom refers to Laban's changed disposition toward Jacob. The rendering keeps the Hebrew relational idiom rather than fully paraphrasing it.
- source_word: כִּתְמוֹל שִׁלְשׁוֹם
  chosen: as before
  alternatives:
  - as yesterday and the day before
  - as formerly
  lexicon: HALOT
  rationale: The idiom literally means 'as yesterday, three days ago,' i.e., previously/formerly. 'As before' is natural modern English and accurately conveys the temporal comparison.
