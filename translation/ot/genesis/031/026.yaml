id: GEN.31.26
reference: Genesis 31:26
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָבָן֙ לְ/יַעֲקֹ֔ב מֶ֣ה עָשִׂ֔יתָ וַ/תִּגְנֹ֖ב אֶת לְבָבִ֑/י וַ/תְּנַהֵג֙
    אֶת בְּנֹתַ֔/י כִּ/שְׁבֻי֖וֹת חָֽרֶב־־׃
translation:
  text: Then Laban said to Jacob, “What have you done, that you have stolen my heart
    and driven my daughters away like captives of the sword?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that you have deceived me'; Hebrew literally, 'stolen my heart.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like captives of the sword,' that is, like women taken as war captives.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה עָשִׂיתָ
  chosen: What have you done
  alternatives:
  - What did you do
  lexicon: HALOT
  rationale: Idiomatic interrogative of accusation; present perfect in English captures
    the force of a completed act with present relevance.
- source_word: וַתִּגְנֹב אֶת לְבָבִי
  chosen: that you have stolen my heart
  alternatives:
  - that you have deceived me
  - that you have stolen my mind
  lexicon: HALOT
  rationale: The Hebrew is literally 'stolen my heart.' In context it is an idiom
    for winning over, deceiving, or taking away one's good sense/awareness, but the
    literal image is vivid and understandable in English. Retaining 'heart' preserves
    the source wording while allowing the emotional force of Laban's accusation to
    stand.
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my mind
  - my understanding
  lexicon: HALOT
  rationale: לֵב/לֵבָב can denote inner thought, will, or heart. 'Heart' is the most
    transparent and textually faithful rendering here; alternatives are interpretive
    expansions of the idiom.
- source_word: וַתְּנַהֵג
  chosen: driven ... away
  alternatives:
  - led away
  - conducted away
  lexicon: HALOT
  rationale: נהג commonly means to drive or lead, often with the nuance of driving
    along. Because the following comparison is to captives of war, 'driven ... away'
    best matches the coercive imagery.
- source_word: בְּנֹתַי
  chosen: my daughters
  lexicon: HALOT
  rationale: Straightforward possessive plural noun; no reason to flatten the familial
    claim in Laban's speech.
- source_word: כִּשְׁבֻיוֹת חָרֶב
  chosen: like captives of the sword
  alternatives:
  - like women taken captive by the sword
  - like captives in war
  lexicon: HALOT
  rationale: The phrase is literally 'like captives of the sword,' an idiom for war
    captives. Preserving 'of the sword' keeps the martial imagery and the sharpness
    of Laban's complaint, while remaining intelligible in English.
