theological_decisions:
- issue: Divine restraint expressed by the idiom 'God did not give him'
  chosen_reading: God actively withheld permission for Laban to harm Jacob
  alternative_readings:
  - God did not hand Jacob over to him
  - God did not let him succeed in harming Jacob
  rationale: The Hebrew idiom presents God as sovereignly preventing Laban's intended
    harm. Rendering it as 'did not allow him' preserves that theological force without
    importing more than the text states.
  doctrine_reference: Translation philosophy §1, §3
