id: GEN.31.17
reference: Genesis 31:17
source:
  edition: WLC
  text: וַ/יָּ֖קָם יַעֲקֹ֑ב וַ/יִּשָּׂ֛א אֶת בָּנָ֥י/ו וְ/אֶת נָשָׁ֖י/ו עַל הַ/גְּמַלִּֽים־־־׃
translation:
  text: Then Jacob arose and put his sons and his wives on the camels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "onto the camels." The Hebrew preposition can be rendered either way
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: From קום, the wayyiqtol advances the narrative with the sense of standing
    up/rising to act. 'Arose' preserves the narrative sequence and slightly formal
    biblical cadence without becoming archaic.
- source_word: וַיִּשָּׂא
  chosen: put
  alternatives:
  - lifted
  - carried
  - set
  lexicon: HALOT
  rationale: From נשׂא, literally 'lifted/carried,' but with עַל הַגמלים the idiomatic
    sense is causing them to be placed onto the camels. 'Put' is natural modern English
    and best reflects the action in context.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here is specifically masculine plural, and the doctrine calls for
    gender-accurate rendering over gender-neutral. 'His sons' matches the Hebrew form
    and likely referent.
- source_word: נָשָׁיו
  chosen: his wives
  alternatives:
  - his women
  lexicon: HALOT
  rationale: The noun אשה in plural with Jacob as possessor clearly refers to his
    wives. 'Wives' is the precise contextual rendering.
- source_word: עַל הַגְּמַלִּים
  chosen: on the camels
  alternatives:
  - onto the camels
  lexicon: HALOT
  rationale: 'The preposition על with motion after נשׂא can be rendered ''on'' in
    idiomatic English, with the motion implied by ''put.'' The plural with article
    is straightforward: ''the camels.'''
