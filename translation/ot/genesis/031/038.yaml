id: GEN.31.38
reference: Genesis 31:38
source:
  edition: WLC
  text: זֶה֩ עֶשְׂרִ֨ים שָׁנָ֤ה אָנֹכִי֙ עִמָּ֔/ךְ רְחֵלֶ֥י/ךָ וְ/עִזֶּ֖י/ךָ לֹ֣א
    שִׁכֵּ֑לוּ וְ/אֵילֵ֥י צֹאנְ/ךָ֖ לֹ֥א אָכָֽלְתִּי׃
translation:
  text: These twenty years I have been with you; your ewes and your female goats have
    not miscarried, and I have not eaten the rams of your flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not lost their young.' The Hebrew verb can denote being deprived
      of offspring; in this pastoral context it refers to miscarriage or loss of young.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה עֶשְׂרִים שָׁנָה
  chosen: These twenty years
  alternatives:
  - This twenty years
  - For twenty years now
  lexicon: HALOT
  rationale: The idiom literally reads 'this twenty years' but in natural modern English
    is best rendered 'these twenty years,' preserving the demonstrative force while
    remaining readable.
- source_word: אָנֹכִי עִמָּךְ
  chosen: I have been with you
  alternatives:
  - I am with you
  - I was with you
  lexicon: HALOT
  rationale: Although no explicit finite verb appears beyond the pronoun, the clause
    is idiomatic in context, summarizing a twenty-year period of service. English
    requires a verbal expression; present perfect best conveys duration up to the
    point of speaking.
- source_word: רְחֵלֶיךָ
  chosen: your ewes
  alternatives:
  - your sheep
  lexicon: HALOT
  rationale: The noun specifically denotes female sheep, not sheep generically. 'Ewes'
    preserves the lexical specificity of the Hebrew.
- source_word: וְעִזֶּיךָ
  chosen: your female goats
  alternatives:
  - your goats
  - your she-goats
  lexicon: HALOT
  rationale: The form refers specifically to female goats. 'Female goats' is clear
    modern English; 'she-goats' is possible but less natural.
- source_word: לֹא שִׁכֵּלוּ
  chosen: have not miscarried
  alternatives:
  - have not lost their young
  - have not been bereaved
  lexicon: HALOT
  rationale: In livestock context, the verb refers to losing offspring or miscarrying.
    'Have not miscarried' is the most concise and contextually precise rendering.
- source_word: וְאֵילֵי צֹאנְךָ
  chosen: the rams of your flock
  alternatives:
  - your flock's rams
  - the male sheep of your flock
  lexicon: HALOT
  rationale: אֵילִים are rams, the male sheep. Rendering both the specific animal
    and the possessive flock relation preserves the Hebrew sense.
- source_word: לֹא אָכָלְתִּי
  chosen: I have not eaten
  alternatives:
  - I did not eat
  lexicon: HALOT
  rationale: The perfect in this retrospective defense is well represented by English
    present perfect, matching the earlier clause and emphasizing Jacob's conduct over
    the whole period.
