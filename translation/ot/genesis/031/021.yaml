id: GEN.31.21
reference: Genesis 31:21
source:
  edition: WLC
  text: וַ/יִּבְרַ֥ח הוּא֙ וְ/כָל אֲשֶׁר ל֔/וֹ וַ/יָּ֖קָם וַ/יַּעֲבֹ֣ר אֶת הַ/נָּהָ֑ר
    וַ/יָּ֥שֶׂם אֶת פָּנָ֖י/ו הַ֥ר הַ/גִּלְעָֽד־־־־׃
translation:
  text: So he fled with all that was his, and he arose and crossed the River, and
    set his face toward the hill country of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crossed the Euphrates'; Hebrew simply says 'the River,' likely referring
      to the Euphrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: ברח commonly means 'flee' or 'run away.' 'Fled' is concise and preserves
    the narrative sense of departure under pressure without adding interpretive nuance.
- source_word: וְכָל אֲשֶׁר לוֹ
  chosen: with all that was his
  alternatives:
  - and all that he had
  - with everything belonging to him
  lexicon: HALOT
  rationale: The phrase denotes all possessions/dependents belonging to Jacob. 'With
    all that was his' is natural English and broad enough to include household and
    goods without narrowing the referent.
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he set out
  lexicon: HALOT
  rationale: קום in wayyiqtol narrative often marks a new action sequence. 'He arose'
    preserves the formal narrative step better than the more interpretive 'set out.'
- source_word: וַיַּעֲבֹר אֶת־הַנָּהָר
  chosen: crossed the River
  alternatives:
  - crossed the river
  - passed over the River
  lexicon: HALOT
  rationale: עבר means 'cross/pass over.' The noun with article likely refers to the
    Euphrates as a known geographical landmark in context, so 'the River' is capitalized
    to reflect probable specificity while remaining translational rather than explanatory.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the river
  - the Euphrates
  lexicon: HALOT
  rationale: In patriarchal narratives, 'the River' can function as a conventional
    designation for the Euphrates. The translation keeps the Hebrew expression in
    the main text and avoids importing the proper name directly; the more explicit
    identification is preserved in a footnote.
- source_word: וַיָּשֶׂם אֶת־פָּנָיו
  chosen: set his face toward
  alternatives:
  - turned his face toward
  - headed toward
  lexicon: HALOT
  rationale: This idiom literally means 'set his face' and conveys deliberate orientation
    or resolve. Retaining the idiom in readable English preserves the Hebrew flavor
    and intentionality better than the more colloquial 'headed toward.'
- source_word: הַר הַגִּלְעָד
  chosen: the hill country of Gilead
  alternatives:
  - Mount Gilead
  - the mountains of Gilead
  lexicon: HALOT
  rationale: הַר can denote mountain, hill country, or mountainous region. Here a
    regional sense fits the geography and English idiom better than a single-peak
    reading such as 'Mount Gilead.'
