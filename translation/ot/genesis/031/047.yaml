id: GEN.31.47
reference: Genesis 31:47
source:
  edition: WLC
  text: וַ/יִּקְרָא ל֣/וֹ לָבָ֔ן יְגַ֖ר שָׂהֲדוּתָ֑א וְ/יַֽעֲקֹ֔ב קָ֥רָא ל֖/וֹ גַּלְעֵֽד־׃
translation:
  text: Laban called it Jegar-sahadutha, but Jacob called it Galeed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jegar-sahadutha is Aramaic for 'heap of witness' or 'mound of testimony.'
    reason: lexical_alternative
  - marker: b
    text: Galeed is Hebrew for 'heap of witness' or 'mound of testimony.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with ל + pronominal suffix in naming contexts means 'call/name.'
    'Called' is natural and preserves the narrative style; 'named' is possible but
    slightly more interpretive.
- source_word: לּוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: Although the suffix is formally masculine singular ('to him'), in context
    it refers to the stone heap/monument just established, which English idiom renders
    as 'it' for an inanimate object.
- source_word: לָבָן
  chosen: Laban
  rationale: Standard English transliteration of the personal name.
- source_word: יְגַר שָׂהֲדוּתָא
  chosen: Jegar-sahadutha
  alternatives:
  - heap of witness
  - mound of testimony
  lexicon: HALOT
  rationale: This is an Aramaic place-name expression used by Laban. Following the
    translation philosophy, personal/place names are transliterated in the main text
    rather than translated, while the meaning is preserved in a footnote. The phrase
    means roughly 'heap of witness/testimony,' corresponding to the Hebrew name that
    follows.
- source_word: וְיַעֲקֹב
  chosen: but Jacob
  alternatives:
  - and Jacob
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but here an adversative
    nuance is contextually appropriate because the verse contrasts Laban's Aramaic
    name with Jacob's Hebrew name for the same heap.
- source_word: קָרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: Same naming verb as earlier in the verse; consistency favors 'called.'
- source_word: לּוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: As with the first occurrence, the masculine suffix refers to the heap/monument
    and is best rendered idiomatically in English as 'it.'
- source_word: גַּלְעֵד
  chosen: Galeed
  alternatives:
  - heap of witness
  - mound of testimony
  lexicon: HALOT
  rationale: Hebrew place-name/title corresponding semantically to Laban's Aramaic
    designation. It is transliterated in the main text to preserve the naming act,
    with its meaning supplied in a footnote.
