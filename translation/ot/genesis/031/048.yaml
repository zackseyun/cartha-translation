id: GEN.31.48
reference: Genesis 31:48
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָבָ֔ן הַ/גַּ֨ל הַ/זֶּ֥ה עֵ֛ד בֵּינִ֥/י וּ/בֵינְ/ךָ֖ הַ/יּ֑וֹם
    עַל כֵּ֥ן קָרָֽא שְׁמ֖/וֹ גַּלְעֵֽד־־׃
translation:
  text: And Laban said, “This heap is a witness between me and you today.” Therefore
    its name was called Galeed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Galeed sounds like the Hebrew for 'heap of witness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural
    English narrative rendering that preserves the sequence without overinterpreting
    temporal nuance.
- source_word: לָבָן
  chosen: Laban
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: הַגַּל
  chosen: this heap
  alternatives:
  - this mound
  - this cairn
  lexicon: HALOT
  rationale: גַּל commonly denotes a heap, especially a heap of stones in this context.
    'Heap' is the most straightforward and idiomatic choice in English.
- source_word: עֵד
  chosen: a witness
  alternatives:
  - witness
  - testimony
  lexicon: HALOT
  rationale: Here the heap functions as a testimonial marker between parties. 'A witness'
    best captures the covenantal/legal sense in context.
- source_word: בֵּינִי וּבֵינְךָ
  chosen: between me and you
  alternatives:
  - between us
  lexicon: HALOT
  rationale: The Hebrew explicitly names both parties in the singular. 'Between me
    and you' preserves that directness better than the more compressed 'between us.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is clear modern English and accurately reflects the temporal
    adverbial force here.'
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: This formula introduces the naming explanation. 'Therefore' preserves
    the causal connection concisely.
- source_word: קָרָא שְׁמוֹ
  chosen: its name was called
  alternatives:
  - he called its name
  - it was named
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms verb with 'his/its name' as object, a common naming
    formula. English often prefers a passive-like rendering here. 'Its name was called'
    stays close to the Hebrew while remaining understandable; the referent is the
    heap.
- source_word: גַּלְעֵד
  chosen: Galeed
  alternatives:
  - Heap of Witness
  lexicon: HALOT
  rationale: As a place/name designation, it is transliterated in the main text per
    project policy. Its meaning is transparent from the context and may be noted in
    a footnote.
