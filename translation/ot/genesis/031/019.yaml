id: GEN.31.19
reference: Genesis 31:19
source:
  edition: WLC
  text: וְ/לָבָ֣ן הָלַ֔ךְ לִ/גְזֹ֖ז אֶת צֹאנ֑/וֹ וַ/תִּגְנֹ֣ב רָחֵ֔ל אֶת הַ/תְּרָפִ֖ים
    אֲשֶׁ֥ר לְ/אָבִֽי/הָ־־׃
translation:
  text: Now Laban had gone to shear his flock, and Rachel stole the household idols
    that belonged to her father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew teraphim; also rendered 'household gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלַךְ
  chosen: had gone
  alternatives:
  - went
  lexicon: HALOT
  rationale: The qatal form in narrative here gives background information to the
    main action that follows; English past perfect naturally conveys that Laban was
    away when Rachel acted.
- source_word: לִגְזֹז
  chosen: to shear
  alternatives:
  - to clip
  lexicon: HALOT
  rationale: The infinitive refers specifically to shearing sheep or flock animals;
    'shear' is the standard precise English equivalent.
- source_word: צֹאנוֹ
  chosen: his flock
  alternatives:
  - his sheep
  - his small livestock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, especially sheep and goats.
    'Flock' is idiomatic and sufficiently broad in context.
- source_word: וַתִּגְנֹב
  chosen: stole
  alternatives:
  - took secretly
  lexicon: HALOT
  rationale: גנב straightforwardly means 'steal.' The stronger moral-legal sense should
    be preserved rather than softened.
- source_word: הַתְּרָפִים
  chosen: the household idols
  alternatives:
  - the teraphim
  - the household gods
  lexicon: HALOT
  rationale: תְּרָפִים refers to domestic cult objects associated with a household.
    'Household idols' communicates both their domestic setting and their idolatrous
    function in accessible English. Because 'teraphim' is a recognized transliteration
    and 'household gods' is also common, these are preserved in a footnote.
- source_word: אֲשֶׁר לְאָבִיהָ
  chosen: that belonged to her father
  alternatives:
  - that were her father's
  - which were for her father
  lexicon: HALOT
  rationale: The phrase identifies possession. 'Belonged to her father' is natural
    modern English and clearly expresses the genitival relationship.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction introduces the next narrative development. 'Now' is a
    natural discourse marker in English narrative, while still reflecting the Hebrew
    connective.
