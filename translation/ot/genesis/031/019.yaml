theological_decisions:
- issue: Rendering of תְּרָפִים in a context involving illicit worship objects
  chosen_reading: household idols
  alternative_readings:
  - teraphim
  - household gods
  rationale: The Hebrew term denotes domestic cult images. 'Household idols' avoids
    obscuring their religious nature while remaining understandable to modern readers.
    This is a lexical-cultural decision rather than a doctrinally disputed one, so
    the alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §6
