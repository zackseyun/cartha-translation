  from: to the field, to his flock
  to: to the field, by his flock
  rationale: The current rendering literally translates two consecutive locative phrases ('הַשָּׂדֶה' and 'אֶל צֹאנוֹ') with a repeated 'to,' which is slightly awkward in English. It can imply two sequential movements rather than one location specified by another. Using 'by his flock' for the second phrase (a valid sense of 'אֶל', and an alternative considered by the drafter) clarifies the relationship between the field and the flock more naturally, indicating he called them to a specific spot in the field marked by the presence of his flock.
