id: GEN.31.4
reference: Genesis 31:4
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח יַעֲקֹ֔ב וַ/יִּקְרָ֖א לְ/רָחֵ֣ל וּ/לְ/לֵאָ֑ה הַ/שָּׂדֶ֖ה אֶל צֹאנֽ/וֹ־׃
translation:
  text: So Jacob sent and called Rachel and Leah to the field, by his flock,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the field, where his flock was.' The final phrase likely clarifies the location of the meeting.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the field, to his flock'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח in this narrative context commonly means to send or dispatch. Here it introduces Jacob's initiative in summoning Rachel and Leah. 'Sent' is concise and natural; the following verb 'called' makes explicit that he sent for them rather than merely going himself.
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: קרא with לְ plus persons means to call to or summon. 'Called' preserves the straightforward narrative style; 'summoned' is possible but slightly more formal than the Hebrew requires.
- source_word: לְרָחֵל וּלְלֵאָה
  chosen: Rachel and Leah
  rationale: Personal names are transliterated by standard English conventions per project philosophy.
- source_word: הַשָּׂדֶה
  chosen: to the field
  alternatives:
  - into the field
  lexicon: HALOT
  rationale: שׂדה denotes open country or field. With the directional sense of the clause, 'to the field' is the most direct rendering and fits the narrative movement.
- source_word: אֶל צֹאנוֹ
  chosen: to his flock
  alternatives:
  - where his flock was
  - by his flock
  lexicon: HALOT
  rationale: 'צֹאן means small livestock/flock. The preposition אֶל can be rendered ''to'' in a directional sense. The phrase likely specifies the location more precisely: Jacob called them to the field, to where his flock was. ''To his flock'' is formally close and readable; the location nuance is preserved without over-paraphrase.'
