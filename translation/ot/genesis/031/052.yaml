id: GEN.31.52
reference: Genesis 31:52
source:
  edition: WLC
  text: עֵ֚ד הַ/גַּ֣ל הַ/זֶּ֔ה וְ/עֵדָ֖ה הַ/מַּצֵּבָ֑ה אִם אָ֗נִי לֹֽא אֶֽעֱבֹ֤ר אֵלֶ֨י/ךָ֙
    אֶת הַ/גַּ֣ל הַ/זֶּ֔ה וְ/אִם אַ֠תָּה לֹא תַעֲבֹ֨ר אֵלַ֜/י אֶת הַ/גַּ֥ל הַ/זֶּ֛ה
    וְ/אֶת הַ/מַּצֵּבָ֥ה הַ/זֹּ֖את לְ/רָעָֽה־־־־־־־׃
translation:
  text: This heap is a witness, and the pillar is a witness, that I will not pass
    over this heap toward you, and you will not pass over this heap and this pillar
    toward me for harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This heap is a witness, and the pillar is witness.' The Hebrew repeats
      the witness idea in parallel for both boundary markers.
    reason: lexical_alternative
  - marker: b
    text: Or 'cross' instead of 'pass over'; the sense is crossing this boundary marker.
    reason: lexical_alternative
  - marker: c
    text: '''For harm'' means with harmful or hostile intent, not merely physical
      movement across the boundary.'
    reason: cultural_note
lexical_decisions:
- source_word: עֵד
  chosen: a witness
  alternatives:
  - witness
  lexicon: HALOT
  rationale: 'Predicate noun declaring the memorial object''s function. English uses
    the indefinite expression naturally: ''is a witness.'''
- source_word: גַּל
  chosen: heap
  alternatives:
  - mound
  - pile of stones
  lexicon: HALOT
  rationale: Refers to the stone heap erected as a boundary marker in the immediate
    context. 'Heap' is concise and idiomatic while preserving the physical image.
- source_word: וְעֵדָה
  chosen: and the pillar is a witness
  alternatives:
  - and the pillar is witness
  - and the pillar is a testimony
  lexicon: HALOT
  rationale: 'Though the form differs from the prior עֵד, the sense in context is
    parallel: the pillar also serves as witness. The clause is rendered explicitly
    for clear English coordination.'
- source_word: מַצֵּבָה
  chosen: pillar
  alternatives:
  - standing stone
  - monument
  lexicon: HALOT
  rationale: Denotes an erected stone marker. 'Pillar' is a standard, readable rendering;
    'standing stone' is possible but less natural in running English.
- source_word: אִם
  chosen: that
  alternatives:
  - if
  - surely
  lexicon: HALOT
  rationale: In oath/covenant contexts אִם can introduce the content of the sworn
    stipulation rather than a simple conditional. Here it functions idiomatically
    after 'witness' to introduce what the witness attests.
- source_word: אֶעֱבֹר / תַעֲבֹר
  chosen: pass over
  alternatives:
  - cross
  - go past
  lexicon: HALOT
  rationale: The verb עבר here refers to crossing the boundary marker. 'Pass over'
    preserves the spatial sense without over-specifying terrain; 'cross' is possible
    but slightly less tied to the marker itself.
- source_word: אֵלֶיךָ / אֵלַי
  chosen: toward you / toward me
  alternatives:
  - to you / to me
  - against you / against me
  lexicon: HALOT
  rationale: The preposition marks direction toward the other party. 'Toward' preserves
    the directional nuance and avoids prematurely importing hostile intent, which
    is supplied later by 'for harm.'
- source_word: לְרָעָה
  chosen: for harm
  alternatives:
  - for evil
  - to do harm
  - for ill
  lexicon: HALOT
  rationale: Expresses hostile purpose or harmful intent. 'For harm' is natural modern
    English and preserves the covenantal prohibition against crossing with malicious
    purpose.
