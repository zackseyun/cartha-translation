id: GEN.31.10
reference: Genesis 31:10
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/עֵת֙ יַחֵ֣ם הַ/צֹּ֔אן וָ/אֶשָּׂ֥א עֵינַ֛/י וָ/אֵ֖רֶא בַּ/חֲל֑וֹם
    וְ/הִנֵּ֤ה הָֽ/עַתֻּדִים֙ הָ/עֹלִ֣ים עַל הַ/צֹּ֔אן עֲקֻדִּ֥ים נְקֻדִּ֖ים וּ/בְרֻדִּֽים־׃
translation:
  text: And it happened at the time when the flock was mating that I lifted up my
    eyes and saw in a dream, and behold, the male goats that were mounting the flock
    were striped, speckled, and mottled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ring-streaked' for 'striped.' The Hebrew term refers to banded markings
      on the animals.
    reason: lexical_alternative
  - marker: b
    text: Or 'dappled' for 'mottled.' The three color terms likely describe distinct
      coat patterns.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of היה introducing a past event. 'And it happened'
    preserves the Hebrew narrative flow without archaic English.
- source_word: בְּעֵת
  chosen: at the time
  alternatives:
  - when
  - in the time
  lexicon: HALOT
  rationale: Temporal phrase marking the occasion of the vision. 'At the time' keeps
    the formal temporal framing and works smoothly with the following clause.
- source_word: יַחֵם הַצֹּאן
  chosen: the flock was mating
  alternatives:
  - the flock was in heat
  - the flock conceived
  lexicon: HALOT
  rationale: The verb יחם in this breeding context refers to animals becoming heated
    for mating. 'Was mating' is idiomatic and clear in English, while avoiding the
    potentially too physiological 'was in heat' and the too-resultative 'conceived'.
- source_word: וָאֶשָּׂא עֵינַי
  chosen: I lifted up my eyes
  alternatives:
  - I looked up
  - I raised my eyes
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for directing one's gaze. The more literal
    rendering preserves the idiomatic texture of the source while remaining understandable.
- source_word: וָאֵרֶא בַּחֲלוֹם
  chosen: and saw in a dream
  alternatives:
  - and saw in the dream
  - and looked in a dream
  lexicon: HALOT
  rationale: The phrase indicates the medium of perception. 'In a dream' is the most
    natural English rendering and does not over-specify definiteness.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation. 'And behold' preserves the suddenness
    and visual force of the Hebrew.
- source_word: הָעַתֻּדִים
  chosen: the male goats
  alternatives:
  - the he-goats
  - the bucks
  lexicon: HALOT
  rationale: The term refers specifically to male goats used for breeding. 'Male goats'
    is clear modern English; 'he-goats' is more traditional but less natural.
- source_word: הָעֹלִים עַל הַצֹּאן
  chosen: that were mounting the flock
  alternatives:
  - that were going up upon the flock
  - that were breeding with the flock
  lexicon: HALOT
  rationale: עלה על here is a breeding euphemism/description for mounting. 'Mounting
    the flock' is accurate and natural, preserving the concrete imagery better than
    the more interpretive 'breeding with'.
- source_word: עֲקֻדִּים
  chosen: striped
  alternatives:
  - ring-streaked
  - banded
  lexicon: HALOT
  rationale: The adjective denotes animals marked with bands or stripes. 'Striped'
    is accessible modern English; the traditional 'ring-streaked' is possible but
    less transparent to contemporary readers.
- source_word: נְקֻדִּים
  chosen: speckled
  alternatives:
  - spotted
  - dotted
  lexicon: HALOT
  rationale: The word denotes spotted or speckled markings. 'Speckled' pairs well
    with the surrounding color-pattern terms and is a common rendering in this context.
- source_word: וּבְרֻדִּים
  chosen: mottled
  alternatives:
  - spotted
  - dappled
  - grisled
  lexicon: HALOT
  rationale: This adjective refers to variegated or patchy coloration distinct from
    the previous terms. 'Mottled' best conveys mixed irregular coloring while preserving
    distinction from 'speckled'.
