id: GEN.31.33
reference: Genesis 31:33
source:
  edition: WLC
  text: וַ/יָּבֹ֨א לָבָ֜ן בְּ/אֹ֥הֶל יַעֲקֹ֣ב וּ/בְ/אֹ֣הֶל לֵאָ֗ה וּ/בְ/אֹ֛הֶל שְׁתֵּ֥י
    הָ/אֲמָהֹ֖ת וְ/לֹ֣א מָצָ֑א וַ/יֵּצֵא֙ מֵ/אֹ֣הֶל לֵאָ֔ה וַ/יָּבֹ֖א בְּ/אֹ֥הֶל רָחֵֽל׀׃
translation:
  text: So Laban went into Jacob’s tent, and into Leah’s tent, and into the tent of
    the two female servants, but he did not find them. Then he came out of Leah’s
    tent and went into Rachel’s tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''did not find''; the object is unstated in this verse but refers
      from context to the household gods Laban was seeking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went into
  alternatives:
  - entered
  - came into
  lexicon: HALOT
  rationale: The verb בוא with בְּ marks movement into a place. 'Went into' reads
    naturally in English narrative and preserves the directional sense better than
    the more static 'was in' or overly literal repetition of 'came.'
- source_word: אֹהֶל
  chosen: tent
  alternatives:
  - dwelling
  lexicon: HALOT
  rationale: The ordinary sense is 'tent.' In this patriarchal setting the concrete
    term should be preserved rather than generalized to 'dwelling.'
- source_word: שְׁתֵּי הָאֲמָהֹת
  chosen: the two female servants
  alternatives:
  - the two maidservants
  - the two slave women
  lexicon: HALOT
  rationale: אָמָה denotes a female servant/slave woman. 'Female servants' is clear
    modern English and fits the household context here without importing more harsh
    wording than the immediate narrative requires. 'Maidservants' is traditional but
    less current; 'slave women' is possible but not demanded by this verse's focus.
- source_word: וְלֹא מָצָא
  chosen: but he did not find them
  alternatives:
  - and he did not find them
  - but he found nothing
  lexicon: HALOT
  rationale: 'The Hebrew object is implicit from context: he did not find the items/persons
    he was searching for, specifically the household gods from the surrounding narrative.
    English benefits from supplying ''them.'' ''But'' captures the adversative sense
    in context after the sequence of searches.'
- source_word: וַיֵּצֵא מֵאֹהֶל לֵאָה
  chosen: Then he came out of Leah’s tent
  alternatives:
  - and he went out from Leah’s tent
  - then he left Leah’s tent
  lexicon: HALOT
  rationale: יצא means 'go out/come out.' 'Came out' is idiomatic in English narrative.
    'Then' reflects the sequential waw in a smooth way.
- source_word: וַיָּבֹא בְּאֹהֶל רָחֵל
  chosen: and went into Rachel’s tent
  alternatives:
  - and entered Rachel’s tent
  lexicon: HALOT
  rationale: Repeats the same motion verb as earlier in the verse; rendering it consistently
    as 'went into' preserves the search sequence.
- source_word: וַיָּבֹא ... וּבְאֹהֶל ... וּבְאֹהֶל
  chosen: went into ... and into ... and into
  alternatives:
  - went into ... then into ... then into
  lexicon: HALOT
  rationale: The repeated prepositional pattern is retained to reflect the deliberate,
    step-by-step search through multiple tents.
