id: GEN.31.3
reference: Genesis 31:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶֽל יַעֲקֹ֔ב שׁ֛וּב אֶל אֶ֥רֶץ אֲבוֹתֶ֖י/ךָ וּ/לְ/מוֹלַדְתֶּ֑/ךָ
    וְ/אֶֽהְיֶ֖ה עִמָּֽ/ךְ־־׃
translation:
  text: Then the LORD said to Jacob, “Return to the land of your fathers and to your
    kindred, and I will be with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your relatives'; the Hebrew term can refer to kinfolk or to one's place
      of origin ('birthplace,' 'native land') depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential force better than a bare
    'said.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Go back
  - turn back
  lexicon: HALOT
  rationale: The imperative of שוב commonly means 'return.' 'Return' is both natural
    and slightly more formal than 'go back,' fitting divine speech and preserving
    the directional sense.
- source_word: אֶל אֶרֶץ אֲבוֹתֶיךָ
  chosen: to the land of your fathers
  alternatives:
  - to your fathers' land
  - to the land of your ancestors
  lexicon: HALOT
  rationale: This closely reflects the Hebrew construct phrase. 'Fathers' preserves
    the masculine familial wording of the source; 'ancestors' is possible but less
    gender-accurate to the Hebrew form.
- source_word: מוֹלַדְתֶּךָ
  chosen: your kindred
  alternatives:
  - your relatives
  - your birthplace
  - your native land
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote kin-group or place of origin depending on context.
    Here, alongside 'the land of your fathers,' the sense points to family/kin connections
    in Jacob's homeland. 'Kindred' preserves that relational nuance better than the
    more purely geographic 'birthplace' or 'native land.'
- source_word: וְאֶהְיֶה עִמָּךְ
  chosen: and I will be with you
  alternatives:
  - and I shall be with you
  lexicon: HALOT
  rationale: This is the straightforward future promise of divine presence. 'Will'
    is idiomatic modern English; 'shall' would sound archaic without adding meaning.
