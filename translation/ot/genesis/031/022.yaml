id: GEN.31.22
reference: Genesis 31:22
source:
  edition: WLC
  text: וַ/יֻּגַּ֥ד לְ/לָבָ֖ן בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י כִּ֥י בָרַ֖ח יַעֲקֹֽב׃
translation:
  text: On the third day, Laban was told that Jacob had fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it was reported to Laban that Jacob had fled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: was told
  alternatives:
  - it was reported
  - he was told
  - it was told
  lexicon: HALOT
  rationale: The Hophal form of נגד is passive/causative passive, indicating that
    information was conveyed to Laban. 'Was told' is natural modern English and preserves
    the passive sense without adding an explicit unnamed subject.
- source_word: לְלָבָן
  chosen: Laban
  lexicon: HALOT
  rationale: 'The preposition ל marks the indirect object/recipient of the report.
    English idiom expresses this as the object of ''was told'': ''Laban was told.''
    The personal name is transliterated per translation philosophy.'
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: On the third day
  alternatives:
  - on the third day after that
  - on the third day thereafter
  lexicon: HALOT
  rationale: This temporal phrase is most naturally rendered 'On the third day.' The
    Hebrew does not explicitly state 'after that,' so the simpler rendering avoids
    adding temporal detail beyond the text, while still conveying sequence.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what was reported rather than a
    causal clause. English ''that'' best marks indirect discourse: ''was told that
    Jacob had fled.'''
- source_word: בָרַח
  chosen: had fled
  alternatives:
  - fled
  - had run away
  - had escaped
  lexicon: HALOT
  rationale: ברח means 'to flee/run away.' In English narrative, past perfect ('had
    fled') fits well after 'was told' to indicate the prior action reported. 'Fled'
    is more precise and less colloquial than 'run away.'
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
