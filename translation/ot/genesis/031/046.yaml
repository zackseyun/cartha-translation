id: GEN.31.46
reference: Genesis 31:46
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יַעֲקֹ֤ב לְ/אֶחָי/ו֙ לִקְט֣וּ אֲבָנִ֔ים וַ/יִּקְח֥וּ אֲבָנִ֖ים
    וַ/יַּֽעֲשׂוּ גָ֑ל וַ/יֹּ֥אכְלוּ שָׁ֖ם עַל הַ/גָּֽל־־׃
translation:
  text: Then Jacob said to his brothers, “Gather stones.” So they took stones and
    made a heap, and they ate there by the heap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they ate there on the heap.” The Hebrew preposition can be read more
      literally as “on.”
    reason: lexical_alternative
  - marker: b
    text: “Brothers” may refer more broadly to Jacob’s male kinsmen or companions,
      not necessarily only literal siblings.
    reason: cultural_note
lexical_decisions:
- source_word: לְאֶחָיו
  chosen: to his brothers
  alternatives:
  - to his kinsmen
  - to his relatives
  lexicon: HALOT
  rationale: אָח commonly means 'brother,' but can extend to close kin or associates.
    In this narrative context, Jacob is addressing the men with him, likely a broader
    group than literal siblings; however, per translation philosophy, the gender-accurate
    and source-near rendering 'brothers' is preferred, with broader alternatives preserved.
- source_word: לִקְטוּ
  chosen: Gather
  alternatives:
  - Collect
  lexicon: HALOT
  rationale: The imperative from לקט calls for picking up or gathering items. 'Gather'
    is natural modern English and fits the command to assemble stones.
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - rocks
  lexicon: HALOT
  rationale: The ordinary sense is 'stones.' 'Rocks' is possible in English but less
    precise here, since the stones are being assembled into a marker heap.
- source_word: וַיַּעֲשׂוּ גָל
  chosen: made a heap
  alternatives:
  - made a mound
  - made a cairn
  lexicon: HALOT
  rationale: גַּל denotes a heap, especially of stones. 'Heap' is the most direct
    and readable rendering. 'Cairn' is more specific but less accessible for general
    readers.
- source_word: וַיֹּאכְלוּ שָׁם עַל הַגָּל
  chosen: they ate there by the heap
  alternatives:
  - they ate there on the heap
  - they ate there beside the heap
  lexicon: HALOT
  rationale: The preposition עַל can mean 'on,' 'over,' or more broadly 'by/beside'
    depending on context. Since eating literally on top of the heap is possible but
    not necessary, 'by the heap' best captures the likely scene in idiomatic English
    while staying close to the Hebrew. The more literal alternative is preserved in
    a footnote.
