id: GEN.31.35
reference: Genesis 31:35
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֶל אָבִ֗י/הָ אַל יִ֨חַר֙ בְּ/עֵינֵ֣י אֲדֹנִ֔/י כִּ֣י ל֤וֹא אוּכַל֙
    לָ/ק֣וּם מִ/פָּנֶ֔י/ךָ כִּי דֶ֥רֶךְ נָשִׁ֖ים לִ֑/י וַ/יְחַפֵּ֕שׂ וְ/לֹ֥א מָצָ֖א
    אֶת הַ/תְּרָפִֽים־־־־׃
translation:
  text: And she said to her father, “Let not my lord be angry in your sight that I
    cannot rise before you, for the way of women is upon me.” So he searched, but
    did not find the household idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the teraphim,'' a term for household cult images or idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And she said' preserves Hebrew
    narrative flow without overinterpreting sequence.
- source_word: אָבִיהָ
  chosen: her father
  lexicon: HALOT
  rationale: Straightforward possessive noun; identifies Laban as the addressee.
- source_word: אַל יִחַר בְּעֵינֵי אֲדֹנִי
  chosen: Let not my lord be angry in your sight
  alternatives:
  - Let not my lord be offended
  - Do not let my lord's anger burn
  lexicon: HALOT
  rationale: יִחַר from חרה literally denotes burning anger. 'Be angry' is idiomatic
    English; retaining 'in your sight' reflects בְּעֵינֵי rather than smoothing it
    away. 'My lord' reflects Rachel's deferential address to her father, not a divine
    title.
- source_word: לֹא אוּכַל לָקוּם מִפָּנֶיךָ
  chosen: that I cannot rise before you
  alternatives:
  - that I am unable to stand up before you
  - that I cannot get up in your presence
  lexicon: HALOT
  rationale: Keeps the physical sense of קום and the honorific nuance of מִפָּנֶיךָ
    ('before/in the presence of you'). 'Rise' is concise and natural.
- source_word: דֶרֶךְ נָשִׁים לִי
  chosen: for the way of women is upon me
  alternatives:
  - for I am having my period
  - for the manner of women is with me
  lexicon: HALOT
  rationale: Hebrew euphemism for menstruation. The chosen rendering preserves the
    source's modest euphemistic register rather than replacing it with a clinical
    paraphrase, while remaining understandable from context.
- source_word: וַיְחַפֵּשׂ
  chosen: So he searched
  alternatives:
  - And he searched
  lexicon: HALOT
  rationale: Narrative continuation with explicit subject from context (Laban). 'So'
    gives natural English progression after Rachel's explanation.
- source_word: וְלֹא מָצָא
  chosen: but did not find
  alternatives:
  - and did not find
  lexicon: HALOT
  rationale: Adversative sense is natural in English after 'searched'; preserves the
    failed outcome.
- source_word: הַתְּרָפִים
  chosen: the household idols
  alternatives:
  - the teraphim
  - the household gods
  lexicon: HALOT
  rationale: תְּרָפִים refers to household cult objects. 'Household idols' communicates
    both domestic setting and idolatrous function in accessible English. The transliteration
    'teraphim' is preserved in a footnote as a lexical alternative.
