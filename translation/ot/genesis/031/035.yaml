theological_decisions:
- issue: Rendering of תְּרָפִים
  chosen_reading: household idols
  alternative_readings:
  - teraphim
  - household gods
  rationale: The term denotes domestic cult images; translating rather than transliterating
    follows the project's preference for readable modern English while preserving
    the object's religious character. No doctrinal controversy is being resolved,
    but the lexical choice affects theological perception of the object, so alternatives
    are documented.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
