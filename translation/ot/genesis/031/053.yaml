id: GEN.31.53
reference: Genesis 31:53
source:
  edition: WLC
  text: אֱלֹהֵ֨י אַבְרָהָ֜ם וֵֽ/אלֹהֵ֤י נָחוֹר֙ יִשְׁפְּט֣וּ בֵינֵ֔י/נוּ אֱלֹהֵ֖י
    אֲבִי/הֶ֑ם וַ/יִּשָּׁבַ֣ע יַעֲקֹ֔ב בְּ/פַ֖חַד אָבִ֥י/ו יִצְחָֽק׃
translation:
  text: May the God of Abraham and the god of Nahor—the god of their father—judge
    between us. And Jacob swore by the Fear of his father Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May the God of Abraham and the God of Nahor, the God of their father,
      judge between us.' The Hebrew can be read as identifying the same deity throughout;
      the translation preserves the ambiguity in the main text.
    reason: alternative_reading
  - marker: b
    text: '''The Fear of his father Isaac'' is an unusual title for God, literally
      using the noun ''fear'' or ''dread'' as a divine designation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי אַבְרָהָם
  chosen: the God of Abraham
  alternatives:
  - the gods of Abraham
  - God of Abraham
  lexicon: HALOT
  rationale: Although אֱלֹהֵי is morphologically a plural construct form, with a singular
    personal referent it functions idiomatically as 'God of.' Capitalized 'God' reflects
    reference to Abraham's deity in English.
- source_word: וֵאלֹהֵי נָחוֹר
  chosen: and the god of Nahor
  alternatives:
  - and the God of Nahor
  lexicon: HALOT
  rationale: Rendered with lowercase 'god' to preserve the likely distinction in speaker
    perspective and the mixed formulation of the oath. Laban invokes the deity/deities
    associated with both Abraham and Nahor; English lowercase avoids prematurely identifying
    Nahor's god straightforwardly with Jacob's confession.
- source_word: אֱלֹהֵי אֲבִיהֶם
  chosen: the god of their father
  alternatives:
  - the God of their father
  - the gods of their father
  lexicon: HALOT
  rationale: Appositional or resumptive phrase clarifying the preceding invocation.
    Lowercase 'god' is retained for consistency with 'the god of Nahor' and to preserve
    the ambiguity of whether one shared ancestral deity or a broader familial religious
    appeal is in view.
- source_word: יִשְׁפְּטוּ
  chosen: may ... judge
  alternatives:
  - shall judge
  - judge
  lexicon: HALOT
  rationale: 'The 3mp imperfect after the invocation is best rendered as a jussive-like
    wish: ''may ... judge.'' The plural verb is preserved in sense by the compound
    subject, though idiomatic English uses singular ''judge'' after the coordinated
    appositional expression.'
- source_word: בֵינֵינוּ
  chosen: between us
  alternatives:
  - between me and you
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the reciprocal phrase in context of
    covenant witness.
- source_word: וַיִּשָּׁבַע
  chosen: And ... swore
  alternatives:
  - Then ... swore
  - So ... swore
  lexicon: HALOT
  rationale: Simple narrative waw-consecutive rendered with straightforward past tense.
- source_word: בְּפַחַד
  chosen: by the Fear of
  alternatives:
  - by the fear of
  - by the Awesome One of
  lexicon: HALOT
  rationale: פַּחַד literally means 'fear, dread,' but here functions as a reverential
    title for God in Jacob's oath formula. Capitalizing 'Fear' preserves the unusual
    title and its theological weight without paraphrasing it away.
- source_word: אָבִיו יִצְחָק
  chosen: his father Isaac
  alternatives:
  - his father, Isaac
  lexicon: HALOT
  rationale: Apposition identifying whose 'Fear' is meant; rendered naturally in English
    without overpunctuation.
