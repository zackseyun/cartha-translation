theological_decisions:
- issue: Whether to identify the deities invoked by Laban as the same God in uniformly
    capitalized form
  chosen_reading: 'Different English capitalization is used: ''the God of Abraham''
    but ''the god of Nahor—the god of their father.'''
  alternative_readings:
  - 'Uniform capitalization throughout: ''the God of Abraham and the God of Nahor,
    the God of their father'''
  rationale: The Hebrew uses repeated אֱלֹהֵי expressions with a plural verb and reflects
    Laban's broader familial invocation, while Jacob's own oath is distinctly by 'the
    Fear of his father Isaac.' Lowercasing in the Nahor/ancestor phrases preserves
    the textual tension rather than harmonizing all references into Jacob's covenantal
    confession.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: How to render Jacob's oath formula בְּפַחַד אָבִיו יִצְחָק
  chosen_reading: '''by the Fear of his father Isaac'''
  alternative_readings:
  - by the God feared by his father Isaac
  - by the Awesome One of his father Isaac
  rationale: The Hebrew presents an unusual divine title. Retaining the literal noun
    'Fear' best preserves the text's distinctive theology and avoids interpretive
    smoothing.
  doctrine_reference: Translation philosophy §1 and §3.
