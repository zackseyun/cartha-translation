id: GEN.31.32
reference: Genesis 31:32
source:
  edition: WLC
  text: עִ֠ם אֲשֶׁ֨ר תִּמְצָ֣א אֶת אֱלֹהֶי/ךָ֮ לֹ֣א יִֽחְיֶה֒ נֶ֣גֶד אַחֵ֧י/נוּ הַֽכֶּר
    לְ/ךָ֛ מָ֥ה עִמָּדִ֖/י וְ/קַֽח לָ֑/ךְ וְ/לֹֽא יָדַ֣ע יַעֲקֹ֔ב כִּ֥י רָחֵ֖ל גְּנָבָֽתַ/ם־־־־׃
translation:
  text: Whoever is found with your gods shall not live. In the presence of our brothers,
    identify what of yours is with me, and take it for yourself.” Jacob did not know
    that Rachel had stolen them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'with whom you find your gods.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' may refer to the wider group of male relatives or kinsmen
      present, not necessarily only biological brothers.'
    reason: cultural_note
  - marker: c
    text: That is, Rachel had stolen Laban’s household gods.
    reason: cross_reference
lexical_decisions:
- source_word: עִם אֲשֶׁר
  chosen: whoever is found with
  alternatives:
  - with whom you find
  - the one with whom you find
  lexicon: HALOT
  rationale: The idiom עִם אֲשֶׁר תִּמְצָא is most naturally rendered in English as
    an indefinite relative clause, 'whoever is found with,' preserving the sense of
    identifying any person in whose possession the objects are discovered.
- source_word: תִּמְצָא
  chosen: is found
  alternatives:
  - you find
  lexicon: HALOT
  rationale: 'Although the Hebrew is second masculine singular (''you find''), English
    idiom in this construction is smoother with passive sense: ''whoever is found
    with your gods.'' The addressee remains Laban.'
- source_word: אֱלֹהֶיךָ
  chosen: your gods
  alternatives:
  - your household gods
  - your divine images
  lexicon: HALOT
  rationale: The plural noun literally means 'your gods.' In context these are household
    idols/teraphim, but since the Hebrew here does not use תְּרָפִים in this clause,
    the more direct rendering 'your gods' best reflects the wording while allowing
    the narrative context to clarify the referent.
- source_word: לֹא יִחְיֶה
  chosen: shall not live
  alternatives:
  - must not live
  - let him not live
  lexicon: HALOT
  rationale: This expresses a death sentence or curse formula. 'Shall not live' preserves
    the formal force without overinterpreting whether it is legal, volitional, or
    predictive.
- source_word: נֶגֶד אַחֵינוּ
  chosen: In the presence of our brothers
  alternatives:
  - before our brothers
  - in front of our kinsmen
  lexicon: HALOT
  rationale: נֶגֶד means 'before/in the presence of.' אַחֵינוּ is literally 'our brothers,'
    likely broader kin/companions, but 'brothers' preserves the source term and fits
    the gender-accurate policy.
- source_word: הַכֶּר לְךָ
  chosen: identify
  alternatives:
  - recognize
  - examine for yourself
  lexicon: HALOT
  rationale: The imperative of נכר here calls for inspection and identification of
    property. 'Identify' is concise and contextually precise.
- source_word: מָה עִמָּדִי
  chosen: what of yours is with me
  alternatives:
  - what is with me
  - what among my things is yours
  lexicon: HALOT
  rationale: The Hebrew is elliptical; the possessive sense is supplied from context
    and the following 'take it for yourself.' This makes explicit what Jacob is challenging
    Laban to identify.
- source_word: וְקַח לָךְ
  chosen: and take it for yourself
  alternatives:
  - and take it
  - then take it
  lexicon: HALOT
  rationale: The dative לָךְ adds personal interest/benefit; 'for yourself' preserves
    that nuance naturally.
- source_word: וְלֹא יָדַע יַעֲקֹב
  chosen: Jacob did not know
  alternatives:
  - and Jacob did not know
  lexicon: HALOT
  rationale: A straightforward narrative aside. English can omit the initial conjunction
    without loss, but the sense is retained.
- source_word: גְּנָבָתַם
  chosen: had stolen them
  alternatives:
  - stole them
  lexicon: HALOT
  rationale: 'The suffix is plural (''them''), referring back to the gods. The qatal
    in this explanatory clause is well rendered as pluperfect in English: Rachel had
    already stolen them.'
