id: GEN.31.27
reference: Genesis 31:27
source:
  edition: WLC
  text: לָ֤/מָּה נַחְבֵּ֨אתָ֙ לִ/בְרֹ֔חַ וַ/תִּגְנֹ֖ב אֹתִ֑/י וְ/לֹא הִגַּ֣דְתָּ לִּ֔/י
    וָֽ/אֲשַׁלֵּחֲ/ךָ֛ בְּ/שִׂמְחָ֥ה וּ/בְ/שִׁרִ֖ים בְּ/תֹ֥ף וּ/בְ/כִנּֽוֹר־׃
translation:
  text: Why did you hide yourself to flee and steal away from me, and not tell me,
    so that I might have sent you away with joy and with songs, with tambourine and
    lyre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and you stole me.' The Hebrew idiom means to slip away from
      someone secretly or to steal away from them.
    reason: lexical_alternative
  - marker: b
    text: Or 'and with singing.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'timbrel.'
    reason: lexical_alternative
  - marker: d
    text: Or 'harp,' though the Hebrew more specifically denotes a lyre-type instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'Why' is natural modern English and
    fully adequate.
- source_word: נַחְבֵּאתָ
  chosen: did you hide yourself
  alternatives:
  - did you conceal yourself
  - did you secretly
  lexicon: HALOT
  rationale: Nifal of חבא conveys hiding oneself. Rendering it explicitly preserves
    the reflexive nuance rather than flattening it into merely 'leave secretly.'
- source_word: לִבְרֹחַ
  chosen: to flee
  alternatives:
  - to run away
  lexicon: HALOT
  rationale: Infinitive of ברח means 'to flee.' This keeps the verbal force and the
    accusatory tone of Laban's speech.
- source_word: וַתִּגְנֹב אֹתִי
  chosen: and steal away from me
  alternatives:
  - and steal me
  - and deceive me
  - and steal yourself away from me
  lexicon: HALOT
  rationale: Literally 'and you stole me,' an idiom in context meaning to steal away
    unnoticed from someone or to steal a march on someone. 'Steal away from me' preserves
    the metaphor while making idiomatic sense in English better than the opaque literal
    wording.
- source_word: וְלֹא הִגַּדְתָּ לִּי
  chosen: and not tell me
  alternatives:
  - and did not tell me
  - and did not inform me
  lexicon: HALOT
  rationale: Straightforward rendering of נגד in Hifil, with slightly compressed English
    for flow in a rhetorical question.
- source_word: וָאֲשַׁלֵּחֲךָ
  chosen: so that I might have sent you away
  alternatives:
  - and I would have sent you away
  - that I could have sent you away
  lexicon: HALOT
  rationale: 'The prefixed waw here is best taken as consequential in Laban''s complaint:
    had Jacob told him, he would have sent him off. ''Might have sent you away'' captures
    the unrealized potential in idiomatic English.'
- source_word: בְּשִׂמְחָה
  chosen: with joy
  alternatives:
  - in gladness
  - with rejoicing
  lexicon: HALOT
  rationale: Concrete and natural rendering of the noun; 'with joy' fits the farewell
    setting.
- source_word: וּבְשִׁרִים
  chosen: and with songs
  alternatives:
  - and with singing
  lexicon: HALOT
  rationale: Plural noun naturally rendered 'songs'; it pairs well with the following
    instruments.
- source_word: בְּתֹף
  chosen: with tambourine
  alternatives:
  - with timbrel
  - with hand drum
  lexicon: HALOT
  rationale: Modern, readable equivalent for תֹף. 'Timbrel' is traditional but archaic
    for the stated translation philosophy.
- source_word: וּבְכִנּוֹר
  chosen: and lyre
  alternatives:
  - and harp
  lexicon: HALOT
  rationale: כִּנּוֹר refers to a lyre-type stringed instrument. 'Lyre' is more precise
    than the broader 'harp,' while still understandable.
