id: GEN.31.50
reference: Genesis 31:50
source:
  edition: WLC
  text: אִם תְּעַנֶּ֣ה אֶת בְּנֹתַ֗/י וְ/אִם תִּקַּ֤ח נָשִׁים֙ עַל בְּנֹתַ֔/י אֵ֥ין
    אִ֖ישׁ עִמָּ֑/נוּ רְאֵ֕ה אֱלֹהִ֥ים עֵ֖ד בֵּינִ֥/י וּ/בֵינֶֽ/ךָ־־־־׃
translation:
  text: If you mistreat my daughters, or if you take wives besides my daughters—though
    no man is with us—see, God is witness between me and you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is no man with us'; the sense is that no human witness is present.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּעַנֶּה
  chosen: mistreat
  alternatives:
  - afflict
  - humble
  - oppress
  lexicon: HALOT
  rationale: The Piel of ענה here refers to causing hardship or ill-treatment to Laban's
    daughters in marriage. 'Mistreat' is natural modern English and fits the relational
    context better than the more wooden 'afflict' or the potentially misleading 'humble'.
- source_word: בְּנֹתַי
  chosen: my daughters
  lexicon: HALOT
  rationale: Straightforward possessive plural; repeated twice in the verse and retained
    both times for clarity and emphasis.
- source_word: תִּקַּח נָשִׁים עַל בְּנֹתַי
  chosen: take wives besides my daughters
  alternatives:
  - take other wives in addition to my daughters
  - marry women besides my daughters
  lexicon: HALOT
  rationale: The idiom 'take wives over/upon my daughters' means taking additional
    wives besides them, not replacing them. 'Besides my daughters' captures the sense
    concisely in idiomatic English.
- source_word: אֵין אִישׁ עִמָּנוּ
  chosen: though no man is with us
  alternatives:
  - there is no man with us
  - no one is with us
  lexicon: HALOT
  rationale: The clause signals the absence of human witnesses to the covenant warning.
    'Though' brings out the concessive force in context. 'Man' is retained as gender-accurate
    to אִישׁ, while the sense is that no human witness is present.
- source_word: רְאֵה
  chosen: see
  alternatives:
  - look
  - take notice
  lexicon: HALOT
  rationale: An imperative drawing attention to the solemn appeal. 'See' is concise
    and preserves the directness of the Hebrew.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the singular deity invoked as witness in the
    covenant context, so 'God' is the natural singular rendering.
- source_word: עֵד
  chosen: witness
  alternatives:
  - a witness
  lexicon: HALOT
  rationale: Predicate nominative in a solemn covenant formula. English idiom prefers
    'God is witness' without the article.
- source_word: בֵּינִי וּבֵינֶךָ
  chosen: between me and you
  alternatives:
  - between me and you two
  lexicon: HALOT
  rationale: Standard rendering of the relational phrase marking covenant accountability
    between the two parties.
