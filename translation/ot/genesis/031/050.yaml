theological_decisions:
- issue: Rendering אִישׁ in a generic-human sense
  chosen_reading: no man is with us
  alternative_readings:
  - no one is with us
  rationale: Following the translation philosophy's gender-accurate principle, אִישׁ
    is rendered with 'man' rather than neutralizing to 'one' or 'person.' In context
    the point is the absence of any human witness, which is explained in a footnote-worthy
    alternative but not required in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
