id: GEN.31.29
reference: Genesis 31:29
source:
  edition: WLC
  text: יֶשׁ לְ/אֵ֣ל יָדִ֔/י לַ/עֲשׂ֥וֹת עִמָּ/כֶ֖ם רָ֑ע וֵֽ/אלֹהֵ֨י אֲבִי/כֶ֜ם אֶ֣מֶשׁ
    אָמַ֧ר אֵלַ֣/י לֵ/אמֹ֗ר הִשָּׁ֧מֶר לְ/ךָ֛ מִ/דַּבֵּ֥ר עִֽם יַעֲקֹ֖ב מִ/טּ֥וֹב
    עַד רָֽע־׀־־׃
translation:
  text: It is in my power to do you harm, but the God of your father spoke to me last
    night, saying, ‘Be careful not to speak to Jacob either good or bad.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from good to bad,'' an idiom meaning anything at all, whether
      favorable or unfavorable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶשׁ לְאֵל יָדִי
  chosen: It is in my power
  alternatives:
  - There is power in my hand
  - My hand has power
  lexicon: HALOT
  rationale: The idiom literally involves 'there is to the power of my hand,' expressing
    ability or power. 'It is in my power' is natural English that preserves the sense
    without over-literal awkwardness.
- source_word: לַעֲשׂוֹת עִמָּכֶם רָע
  chosen: to do you harm
  alternatives:
  - to do evil to you
  - to do bad to you
  lexicon: HALOT
  rationale: רָע here denotes harmful action toward the hearers, not abstract moral
    evil alone. 'Do you harm' best conveys intended injury in idiomatic English.
- source_word: וֵאלֹהֵי אֲבִיכֶם
  chosen: but the God of your father
  alternatives:
  - and the God of your father
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply 'and,' but in context
    it introduces a contrast between Laban's ability and God's intervention. 'But'
    brings out the discourse function in clear English. Singular 'your father' matches
    the singular addressee Jacob despite the pronominal form reflecting address within
    the narrative context.
- source_word: אֶמֶשׁ
  chosen: last night
  alternatives:
  - yesterday evening
  - yesternight
  lexicon: HALOT
  rationale: In context the term refers to the previous night, not merely the previous
    day. 'Last night' is the clearest modern English rendering.
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful
  alternatives:
  - Take care
  - Watch yourself
  lexicon: HALOT
  rationale: The Niphal imperative gives a warning of caution. 'Be careful' is natural
    and preserves the force of divine warning.
- source_word: מִדַּבֵּר עִם יַעֲקֹב
  chosen: not to speak to Jacob
  alternatives:
  - from speaking with Jacob
  - about speaking to Jacob
  lexicon: HALOT
  rationale: The construction with הִשָּׁמֶר plus מן and infinitive/verb conveys prohibition.
    'Not to speak to Jacob' is idiomatic and accurate.
- source_word: מִטּוֹב עַד רָע
  chosen: either good or bad
  alternatives:
  - from good to bad
  - anything good or bad
  lexicon: HALOT
  rationale: This idiom marks the full range of speech, often meaning anything at
    all, whether favorable or unfavorable. 'Either good or bad' preserves the Hebrew
    polarity while remaining readable.
