theological_decisions:
- issue: Rendering of אֱלֹהִים in reference to the deity speaking to Laban
  chosen_reading: the God of your father
  alternative_readings:
  - God of your fathers
  rationale: The Hebrew construct here is singular in sense within the immediate address
    to Jacob, and the narrative refers to the true God restraining Laban. The translation
    preserves the personal, covenantal reference without importing later theological
    claims.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
