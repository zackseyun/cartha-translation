id: GEN.31.6
reference: Genesis 31:6
source:
  edition: WLC
  text: וְ/אַתֵּ֖נָה יְדַעְתֶּ֑ן כִּ֚י בְּ/כָל כֹּחִ֔/י עָבַ֖דְתִּי אֶת אֲבִי/כֶֽן־־׃
translation:
  text: And you yourselves know that I have served your father with all my strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worked for your father.' The Hebrew verb can mean 'serve' or 'work,'
      and both senses fit Jacob's years of labor under Laban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֵּנָה
  chosen: And you yourselves
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction וְ is rendered as simple connective 'And' in context.
    The independent 2nd person feminine plural pronoun adds emphasis, so 'yourselves'
    preserves the marked address to Rachel and Leah better than a bare 'you'.
- source_word: יְדַעְתֶּן
  chosen: know
  alternatives:
  - have known
  - are aware
  lexicon: HALOT
  rationale: Qal perfect 2fp of ידע can express a present state resulting from prior
    knowledge; idiomatic English prefers present 'know' here.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what they know, so 'that' best fits the clause
    structure.
- source_word: בְּ/כָל כֹּחִי
  chosen: with all my strength
  alternatives:
  - with all my power
  - with all my might
  lexicon: HALOT
  rationale: כֹּחַ denotes strength, power, or capacity. In this labor context, 'with
    all my strength' is natural modern English and conveys total exertion.
- source_word: עָבַדְתִּי
  chosen: have served
  alternatives:
  - have worked for
  - labored for
  lexicon: HALOT
  rationale: עבד commonly means serve/work. Because the object is a person ('your
    father'), 'served' preserves the relational sense while still implying labor.
    'Worked for' is possible but slightly flattens the lexical connection.
- source_word: אֶת אֲבִיכֶן
  chosen: your father
  alternatives:
  - for your father
  lexicon: HALOT
  rationale: The direct-object marker with 'your father' is naturally rendered in
    English without reproducing the marker. Since English 'serve' takes a direct object,
    'served your father' is straightforward and faithful.
