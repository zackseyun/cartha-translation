id: GEN.31.15
reference: Genesis 31:15
source:
  edition: WLC
  text: הֲ/ל֧וֹא נָכְרִיּ֛וֹת נֶחְשַׁ֥בְנוּ ל֖/וֹ כִּ֣י מְכָרָ֑/נוּ וַ/יֹּ֥אכַל גַּם
    אָכ֖וֹל אֶת כַּסְפֵּֽ/נוּ־־׃
translation:
  text: Are we not regarded by him as foreigners? For he has sold us, and has indeed
    completely consumed our money.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has utterly eaten up our silver.' The Hebrew uses an idiom of 'eating'
      with an emphatic infinitive absolute to express complete consumption.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Are ... not
  alternatives:
  - Have ... not
  - Surely ... not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English
    idiom is best captured with 'Are we not ... ?'.
- source_word: נָכְרִיּוֹת
  chosen: foreigners
  alternatives:
  - strangers
  - outsiders
  - foreign women
  lexicon: HALOT
  rationale: The adjective/noun denotes those treated as alien or outside the family.
    'Foreigners' best conveys the daughters' complaint that their father treats them
    as non-family. 'Foreign women' would sound overly literal and awkward in English
    here.
- source_word: נֶחְשַׁבְנוּ לוֹ
  chosen: are ... regarded by him
  alternatives:
  - are ... considered by him
  - have been reckoned by him
  lexicon: HALOT
  rationale: חשב in the Niphal here means 'to be considered/regarded.' 'Regarded by
    him' is natural modern English and preserves the passive sense with the dative/pronominal
    relation.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds for the rhetorical question. 'For' fits
    the explanatory force in English.
- source_word: מְכָרָנוּ
  chosen: he has sold us
  alternatives:
  - he sold us
  lexicon: HALOT
  rationale: The perfect summarizes a completed action with present relevance in the
    sisters' complaint. 'He has sold us' communicates that force well in English.
- source_word: וַיֹּאכַל גַּם אָכוֹל
  chosen: and has indeed completely consumed
  alternatives:
  - and has utterly devoured
  - and has surely eaten up
  - and has completely used up
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the action. Since
    the object is money, 'consumed' idiomatically conveys total use/exhaustion without
    flattening the metaphor. 'Indeed completely' reflects the emphatic גַּם + infinitive
    absolute construction.
- source_word: אֶת כַּסְפֵּנוּ
  chosen: our money
  alternatives:
  - our silver
  - the money due to us
  lexicon: HALOT
  rationale: כֶּסֶף can mean silver or money. In this context of bride-price/property,
    'our money' is the clearest natural English rendering, while preserving the economic
    complaint.
