id: GEN.31.9
reference: Genesis 31:9
source:
  edition: WLC
  text: וַ/יַּצֵּ֧ל אֱלֹהִ֛ים אֶת מִקְנֵ֥ה אֲבִי/כֶ֖ם וַ/יִּתֶּן לִֽ/י־־׃
translation:
  text: So God took away your father's livestock and gave them to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snatched away' or 'delivered.' The Hebrew verb can carry the sense of
      taking away from one party and transferring to another.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּל
  chosen: took away
  alternatives:
  - snatched away
  - delivered
  - rescued
  lexicon: HALOT
  rationale: The Hiphil of נצל can mean to snatch away, deliver, or strip from someone.
    In this context Jacob is describing God removing property from Laban and transferring
    it to Jacob, so 'took away' best captures the transfer without implying rescue
    from danger as strongly as 'delivered' or the abruptness of 'snatched away'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The common Hebrew term for God here refers to the deity acting providentially
    on Jacob's behalf. 'God' is the natural English rendering.
- source_word: מִקְנֵה
  chosen: livestock
  alternatives:
  - property
  - cattle
  - herds
  lexicon: HALOT
  rationale: מִקְנֶה denotes acquired possessions, especially domestic animals. In
    the immediate pastoral context of Jacob and Laban's flocks, 'livestock' is more
    precise and natural than the broader 'property' and less narrow than 'cattle'.
- source_word: אֲבִיכֶם
  chosen: your father’s
  alternatives:
  - your fathers'
  lexicon: HALOT
  rationale: 'The singular noun with 2mp suffix means ''your father,'' addressed to
    Rachel and Leah collectively about their one father, Laban. English idiom uses
    singular possessive: ''your father''s.'''
- source_word: וַיִּתֶּן לִי
  chosen: gave them to me
  alternatives:
  - gave to me
  - has given to me
  lexicon: HALOT
  rationale: The verb נתן with indirect object 'to me' implies transfer. English requires
    an object, supplied from the prior noun ('them' = the livestock). Simple past
    fits the narrative sequence.
