id: GEN.31.39
reference: Genesis 31:39
source:
  edition: WLC
  text: טְרֵפָה֙ לֹא הֵבֵ֣אתִי אֵלֶ֔י/ךָ אָנֹכִ֣י אֲחַטֶּ֔/נָּה מִ/יָּדִ֖/י תְּבַקְשֶׁ֑/נָּה
    גְּנֻֽבְתִ֣י י֔וֹם וּ/גְנֻֽבְתִ֖י לָֽיְלָה־׃
translation:
  text: I did not bring to you an animal torn by beasts; I myself bore the loss of
    it. You required it from my hand, whether stolen by day or stolen by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I paid for it' / 'I made good the loss of it.' The Hebrew verb here
      carries the sense of bearing liability for the missing animal.
    reason: lexical_alternative
  - marker: b
    text: Or 'You required it from my hand, whether stolen by day or stolen by night.'.
    reason: previous_rendering
lexical_decisions:
- source_word: טְרֵפָה
  chosen: an animal torn by beasts
  alternatives:
  - that which was torn
  - a torn animal
  - prey
  lexicon: HALOT
  rationale: The noun refers to an animal torn by wild beasts, in this pastoral context
    specifically livestock killed by predators. 'An animal torn by beasts' makes the
    referent explicit in natural English while preserving the concrete image.
- source_word: הֵבֵאתִי אֵלֶיךָ
  chosen: I did not bring to you
  alternatives:
  - I did not bring it to you
  - I never brought to you
  lexicon: HALOT
  rationale: ביא with אל marks bringing something to someone. The object is implied
    from טְרֵפָה, so English can leave it slightly implicit or make it explicit. The
    chosen wording stays close to the Hebrew syntax.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - as for me, I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal form. 'I myself'
    preserves the emphatic self-reference in Jacob's defense.
- source_word: אֲחַטֶּנָּה
  chosen: bore the loss of it
  alternatives:
  - paid for it
  - made good for it
  - suffered it
  lexicon: HALOT
  rationale: From חטא in the Piel, here in the sense of bearing liability or making
    good a loss. 'Bore the loss of it' captures the idiom naturally and fits the following
    clause about Laban requiring it from Jacob's hand.
- source_word: מִיָּדִי תְּבַקְשֶׁנָּה
  chosen: You required it from my hand
  alternatives:
  - you sought it from my hand
  - you demanded it from me
  lexicon: HALOT
  rationale: בקש plus מן/מיד can mean to demand or require accountability. 'From my
    hand' is retained because it is a common Hebrew idiom for personal responsibility
    and remains intelligible in English.
- source_word: גְּנֻבְתִי יוֹם
  chosen: stolen by day
  alternatives:
  - stolen in the daytime
  - daytime theft
  lexicon: HALOT
  rationale: The passive/participle-like form with 'day' denotes something stolen
    during the day. 'Stolen by day' is concise and parallel to the next phrase.
- source_word: וּגְנֻבְתִי לָיְלָה
  chosen: stolen by night
  alternatives:
  - stolen at night
  - nighttime theft
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'by night' preserves the rhythm and
    contrast of the Hebrew.
