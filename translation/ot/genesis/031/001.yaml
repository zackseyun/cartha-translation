id: GEN.31.1
reference: Genesis 31:1
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֗ע אֶת דִּבְרֵ֤י בְנֵֽי לָבָן֙ לֵ/אמֹ֔ר לָקַ֣ח יַעֲקֹ֔ב אֵ֖ת כָּל
    אֲשֶׁ֣ר לְ/אָבִ֑י/נוּ וּ/מֵ/אֲשֶׁ֣ר לְ/אָבִ֔י/נוּ עָשָׂ֕ה אֵ֥ת כָּל הַ/כָּבֹ֖ד
    הַ/זֶּֽה־־־־׃
translation:
  text: Now he heard the words of Laban’s sons, saying, “Jacob has taken all that
    belonged to our father, and from what belonged to our father he has gained all
    this wealth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this glory.' The Hebrew word can denote honor, splendor, or material
      wealth; here it refers to Jacob’s visible prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: Now he heard
  alternatives:
  - And he heard
  - Then he heard
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Now' gives natural English narrative
    progression without losing the sequential force; the subject is Jacob from context,
    so English supplies 'he.'
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the statements
  - the talk
  lexicon: HALOT
  rationale: דבר commonly means 'word/words, matter.' Here it refers to reported speech,
    and 'the words' preserves the concrete Hebrew expression.
- source_word: בְנֵי לָבָן
  chosen: Laban’s sons
  alternatives:
  - the sons of Laban
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English as a possessive.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that they were saying
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing direct discourse; 'saying' is concise
    and transparent.
- source_word: לָקַח
  chosen: has taken
  alternatives:
  - took
  - has seized
  lexicon: HALOT
  rationale: The accusation is presented in direct speech. 'Has taken' fits idiomatic
    English for a present complaint about completed action. 'Seized' would overstate
    the verb beyond what the Hebrew itself requires.
- source_word: כָּל אֲשֶׁר לְאָבִינוּ
  chosen: all that belonged to our father
  alternatives:
  - everything that was our father's
  - all that was our father's
  lexicon: HALOT
  rationale: The lamed construction indicates possession. 'Belonged to our father'
    is natural English and makes the possessive sense explicit.
- source_word: וּמֵאֲשֶׁר לְאָבִינוּ
  chosen: and from what belonged to our father
  alternatives:
  - and from our father's goods
  - and from what was our father's
  lexicon: HALOT
  rationale: 'מִן marks source: the sons claim Jacob''s gain came from their father''s
    property. The repeated possessive is retained for emphasis, as in Hebrew.'
- source_word: עָשָׂה
  chosen: he has gained
  alternatives:
  - he has made
  - he has acquired
  lexicon: HALOT
  rationale: Literally 'made/done,' but in context with the object 'all this wealth/glory'
    the sense is that Jacob has produced or acquired it for himself. 'Gained' communicates
    the idiomatic force in readable English.
- source_word: כָּל הַכָּבֹד הַזֶּה
  chosen: all this wealth
  alternatives:
  - all this glory
  - all this abundance
  lexicon: HALOT
  rationale: כָּבוֹד literally often means 'glory/honor,' but in some contexts denotes
    material wealth or impressive possessions. Here Laban's sons are speaking about
    Jacob's amassed property, so 'wealth' best fits the context. The more literal
    'glory' is preserved in a footnote because it is a viable lexical alternative.
