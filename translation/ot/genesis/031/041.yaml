id: GEN.31.41
reference: Genesis 31:41
source:
  edition: WLC
  text: זֶה לִּ֞/י עֶשְׂרִ֣ים שָׁנָה֮ בְּ/בֵיתֶ/ךָ֒ עֲבַדְתִּ֜י/ךָ אַרְבַּֽע עֶשְׂרֵ֤ה
    שָׁנָה֙ בִּ/שְׁתֵּ֣י בְנֹתֶ֔י/ךָ וְ/שֵׁ֥שׁ שָׁנִ֖ים בְּ/צֹאנֶ֑/ךָ וַ/תַּחֲלֵ֥ף
    אֶת מַשְׂכֻּרְתִּ֖/י עֲשֶׂ֥רֶת מֹנִֽים־־־׃
translation:
  text: 'These twenty years I have been in your house: I served you fourteen years
    for your two daughters, and six years for your flock, and you changed my wages
    ten times.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For these twenty years I have been in your household.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה לִּי עֶשְׂרִים שָׁנָה
  chosen: These twenty years
  alternatives:
  - For these twenty years
  - This is twenty years for me
  lexicon: HALOT
  rationale: The idiom introduces the duration just summarized by Jacob. 'These twenty
    years' is natural English and preserves the deictic force of זֶה with the first-person
    dative לִּי. 'For these twenty years' is possible, but the verbless opening is
    better carried into English as a fronted temporal phrase.
- source_word: בְּבֵיתֶךָ
  chosen: in your house
  alternatives:
  - with you
  - in your household
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' but can extend to household. Here 'in
    your house' preserves the concrete Hebrew while still idiomatic in context; 'with
    you' is too interpretive, and 'household' is possible but less direct.
- source_word: עֲבַדְתִּיךָ
  chosen: I served you
  alternatives:
  - I worked for you
  - I labored for you
  lexicon: HALOT
  rationale: עבד in this context denotes service/labor rendered to Laban. 'I served
    you' keeps the relational and labor sense without over-paraphrasing. 'Worked for
    you' is possible but slightly flattens the service nuance.
- source_word: אַרְבַּע עֶשְׂרֵה שָׁנָה בִּשְׁתֵּי בְנֹתֶיךָ
  chosen: fourteen years for your two daughters
  alternatives:
  - fourteen years in exchange for your two daughters
  - fourteen years because of your two daughters
  lexicon: HALOT
  rationale: The preposition בְּ here marks the object/consideration of service. 'For
    your two daughters' is concise and idiomatic, reflecting the bride-service arrangement
    without adding explanatory wording to the main text.
- source_word: וְשֵׁשׁ שָׁנִים בְּצֹאנֶךָ
  chosen: and six years for your flock
  alternatives:
  - and six years for your sheep
  - and six years over your flock
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep and goats.
    'Flock' is the best broad English equivalent and fits the economic context. 'Sheep'
    would be too narrow.
- source_word: וַתַּחֲלֵף
  chosen: and you changed
  alternatives:
  - and you altered
  - and you kept changing
  lexicon: HALOT
  rationale: חלף in the Hiphil here means to change or substitute. The simple past
    'you changed' matches the Hebrew form and the summary nature of Jacob's complaint.
    The iterative sense is supplied by 'ten times' without needing 'kept changing'
    in the main text.
- source_word: מַשְׂכֻּרְתִּי
  chosen: my wages
  alternatives:
  - my pay
  - my compensation
  lexicon: HALOT
  rationale: The noun denotes wages or hire. 'My wages' is the most standard and transparent
    rendering in this labor context.
- source_word: עֲשֶׂרֶת מֹנִים
  chosen: ten times
  alternatives:
  - ten times over
  - ten reckonings
  lexicon: HALOT
  rationale: The phrase is an idiom for repeated alteration, conventionally rendered
    'ten times.' A more literal rendering involving 'countings' or 'reckonings' would
    be obscure in English and miss the idiomatic force.
