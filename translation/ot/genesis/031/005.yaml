id: GEN.31.5
reference: Genesis 31:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֗ן רֹאֶ֤ה אָנֹכִי֙ אֶת פְּנֵ֣י אֲבִי/כֶ֔ן כִּֽי אֵינֶ֥/נּוּ
    אֵלַ֖/י כִּ/תְמֹ֣ל שִׁלְשֹׁ֑ם וֵֽ/אלֹהֵ֣י אָבִ֔/י הָיָ֖ה עִמָּדִֽ/י־־׃
translation:
  text: And he said to them, “I see that your father's face is not toward me as before,
    but the God of my father has been with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “not toward me as yesterday and the day before,” a Hebrew idiom
      meaning “not as before.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לָהֶן
  chosen: And he said to them
  alternatives:
  - Then he said to them
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. 'Them' reflects
    the feminine plural addressees (Rachel and Leah), though English does not mark
    gender in the pronoun.
- source_word: רֹאֶה אָנֹכִי
  chosen: I see
  alternatives:
  - I am seeing
  - I have seen
  lexicon: HALOT
  rationale: The participle with independent pronoun expresses Jacob's present perception.
    Simple present English is the most natural equivalent.
- source_word: אֶת פְּנֵי אֲבִיכֶן
  chosen: your father's face
  alternatives:
  - your father's countenance
  - your father's expression
  - your father
  lexicon: HALOT
  rationale: Hebrew 'face' often conveys disposition or attitude. Retaining 'face'
    preserves the concrete Hebrew idiom while remaining understandable in English.
- source_word: כִּי אֵינֶנּוּ אֵלַי
  chosen: is not toward me
  alternatives:
  - is not with me
  - is not favorable to me
  - is not for me
  lexicon: HALOT
  rationale: The phrase literally indicates orientation toward Jacob and, with 'face,'
    refers to Laban's changed attitude. 'Toward me' preserves the spatial metaphor
    without overinterpreting.
- source_word: כִּתְמֹל שִׁלְשֹׁם
  chosen: as before
  alternatives:
  - as yesterday and the day before
  - as formerly
  lexicon: HALOT
  rationale: The idiom literally means 'as yesterday, three days ago,' a Hebrew expression
    for former times. 'As before' communicates the sense in natural English; the more
    literal alternative is preserved in a footnote.
- source_word: וֵאלֹהֵי אָבִי
  chosen: but the God of my father
  alternatives:
  - and the God of my father
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in context because it contrasts
    Laban's hostility with God's support. 'God of my father' preserves Jacob's familial
    covenantal reference.
- source_word: הָיָה עִמָּדִי
  chosen: has been with me
  alternatives:
  - was with me
  lexicon: HALOT
  rationale: The perfect summarizes God's continuing support up to the present moment.
    English present perfect best captures that ongoing relevance.
