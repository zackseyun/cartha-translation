theological_decisions:
- issue: Rendering the divine reference אֱלֹהֵי אָבִי
  chosen_reading: the God of my father
  alternative_readings:
  - my father's God
  rationale: Both are possible in English, but 'the God of my father' more closely
    reflects the Hebrew construct and preserves the covenantal tone without adding
    doctrinal interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §5
