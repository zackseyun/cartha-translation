id: GEN.31.51
reference: Genesis 31:51
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר לָבָ֖ן לְ/יַעֲקֹ֑ב הִנֵּ֣ה הַ/גַּ֣ל הַ/זֶּ֗ה וְ/הִנֵּה֙ הַ/מַצֵּבָ֔ה
    אֲשֶׁ֥ר יָרִ֖יתִי בֵּינִ֥/י וּ/בֵינֶֽ/ךָ׀׃
translation:
  text: Then Laban said to Jacob, “Look at this mound, and look at the pillar that
    I have set up between me and you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “heap” for “mound.” The Hebrew term refers to the pile of stones raised
      as a witness between Laban and Jacob.
    reason: lexical_alternative
  - marker: b
    text: Or “standing stone” for “pillar.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: הִנֵּה
  chosen: Look at
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: The particle draws attention deictically. 'Look at' is idiomatic, readable
    modern English and fits the demonstrative setting better than archaic 'behold.'
- source_word: הַגַּל
  chosen: mound
  alternatives:
  - heap
  - pile of stones
  lexicon: HALOT
  rationale: גַּל here refers to the stone heap erected as a witness in the surrounding
    context. 'Mound' is natural English; 'heap' is possible and traditional, but sounds
    less idiomatic in contemporary usage.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - this here
  lexicon: HALOT
  rationale: Simple demonstrative modifying 'mound'; standard rendering is sufficient.
- source_word: וְהִנֵּה
  chosen: and look at
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: 'Repeated הִנֵּה is mirrored in English to preserve the emphatic parallelism:
    ''Look at this mound, and look at the pillar...''.'
- source_word: הַמַּצֵּבָה
  chosen: the pillar
  alternatives:
  - the standing stone
  - the monument
  lexicon: HALOT
  rationale: מַצֵּבָה denotes an erected stone/pillar. 'Pillar' is concise and standard;
    'standing stone' is more explicit but less natural in running English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces the relative clause naturally in English.
- source_word: יָרִיתִי
  chosen: I have set up
  alternatives:
  - I have erected
  - I have cast/thrown up
  lexicon: HALOT
  rationale: Given the object מַצֵּבָה ('pillar') and the covenant-marker context,
    the verb is best understood as establishing/setting up rather than a more literal
    but less clear 'threw up.' 'Set up' is idiomatic and fits both the pillar and
    the mound contextually.
- source_word: בֵּינִי וּבֵינֶךָ
  chosen: between me and you
  alternatives:
  - between me and you two
  lexicon: HALOT
  rationale: Straightforward relational phrase; preserved formally.
