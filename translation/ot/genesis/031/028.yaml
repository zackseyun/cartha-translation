id: GEN.31.28
reference: Genesis 31:28
source:
  edition: WLC
  text: וְ/לֹ֣א נְטַשְׁתַּ֔/נִי לְ/נַשֵּׁ֥ק לְ/בָנַ֖/י וְ/לִ/בְנֹתָ֑/י עַתָּ֖ה הִסְכַּ֥לְתָּֽ
    עֲשֽׂוֹ׃
translation:
  text: And you did not let me kiss my sons and my daughters. Now you have acted foolishly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'you did not leave me to kiss my sons and my daughters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטַשְׁתַּנִי
  chosen: you did not let me
  alternatives:
  - you did not leave me
  - you did not allow me
  lexicon: HALOT
  rationale: The verb נטשׁ commonly means 'leave, forsake, abandon,' but in this construction
    with an infinitive ('to kiss') it idiomatically conveys being allowed or given
    opportunity. 'Did not let me' is natural English and preserves the force of complaint
    better than the more wooden 'did not leave me.'
- source_word: לְנַשֵּׁק
  chosen: kiss
  alternatives:
  - give a farewell kiss
  lexicon: HALOT
  rationale: The infinitive means 'to kiss.' In context of departure, a farewell sense
    is implied, but the Hebrew does not explicitly add 'farewell,' so the main text
    keeps the simpler verb.
- source_word: לְבָנַי וְלִבְנֹתַי
  chosen: my sons and my daughters
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters. Following the gender-accurate
    principle, the translation preserves both terms rather than collapsing them into
    'children.'
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - as it is
  - at this point
  lexicon: HALOT
  rationale: A straightforward temporal/discourse marker introducing Laban's evaluation
    of Jacob's action.
- source_word: הִסְכַּלְתָּ עֲשׂוֹ
  chosen: you have acted foolishly
  alternatives:
  - you have done foolishly
  - you have acted like a fool
  lexicon: HALOT
  rationale: The Hiphil of שׂכל here carries the sense of acting foolishly, with עשה
    supplying the verbal complement ('to do/act'). 'You have acted foolishly' is idiomatic
    modern English while remaining close to the Hebrew.
