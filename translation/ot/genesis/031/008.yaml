id: GEN.31.8
reference: Genesis 31:8
source:
  edition: WLC
  text: אִם כֹּ֣ה יֹאמַ֗ר נְקֻדִּים֙ יִהְיֶ֣ה שְׂכָרֶ֔/ךָ וְ/יָלְד֥וּ כָל הַ/צֹּ֖אן
    נְקֻדִּ֑ים וְ/אִם כֹּ֣ה יֹאמַ֗ר עֲקֻדִּים֙ יִהְיֶ֣ה שְׂכָרֶ֔/ךָ וְ/יָלְד֥וּ כָל
    הַ/צֹּ֖אן עֲקֻדִּֽים־־־־׃
translation:
  text: If he said this, ‘The speckled will be your wages,’ then all the flock bore
    speckled young; and if he said this, ‘The streaked will be your wages,’ then all
    the flock bore streaked young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spotted” for “speckled.”
    reason: lexical_alternative
  - marker: b
    text: Or “striped,” “banded,” or the more traditional “ring-streaked” for “streaked.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם כֹּה יֹאמַר
  chosen: If he said this
  alternatives:
  - If he said thus
  - Whenever he said
  lexicon: HALOT
  rationale: כֹּה with אמר introduces direct speech meaning 'thus/this.' English 'If
    he said this' is natural and preserves the conditional setup in Jacob's report.
    'Whenever he said' is possible contextually, but the Hebrew formally uses a simple
    conditional repeated for each case.
- source_word: נְקֻדִּים
  chosen: the speckled
  alternatives:
  - spotted
  - speckled ones
  lexicon: HALOT
  rationale: The adjective refers to animals marked with small spots or speckles.
    'Speckled' best distinguishes it from other patterned terms in the passage while
    remaining idiomatic in English. The article is supplied in English to make the
    quoted wage category sound natural.
- source_word: יִהְיֶה שְׂכָרֶךָ
  chosen: will be your wages
  alternatives:
  - shall be your wages
  - will be your pay
  lexicon: HALOT
  rationale: שָׂכָר denotes wages/pay. 'Wages' fits the livestock-breeding employment
    context better than the broader 'pay.' The plural is idiomatic in English for
    compensation, even though the Hebrew noun is singular collective.
- source_word: וְיָלְדוּ
  chosen: then all the flock bore
  alternatives:
  - and all the flock gave birth to
  - and all the flock produced
  lexicon: HALOT
  rationale: ילד in this stem means 'to bear/give birth.' 'Bore' is concise and natural
    for animal offspring in English. 'Then' brings out the narrative/resultative force
    of the clause in context.
- source_word: כָל הַצֹּאן
  chosen: all the flock
  alternatives:
  - all the sheep and goats
  - the whole flock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flock' preserves the collective sense without over-specifying beyond the Hebrew.
- source_word: נְקֻדִּים (second occurrence)
  chosen: speckled young
  alternatives:
  - speckled ones
  - speckled offspring
  lexicon: HALOT
  rationale: The adjective stands predicatively after the birthing verb; English often
    needs an implied object. 'Speckled young' makes explicit that offspring are in
    view without adding undue interpretation.
- source_word: וְאִם כֹּה יֹאמַר
  chosen: and if he said this
  alternatives:
  - but if he said this
  - and if he said thus
  lexicon: HALOT
  rationale: The conjunction simply links the second conditional case. 'And if' preserves
    the Hebrew structure; English punctuation handles the contrast.
- source_word: עֲקֻדִּים
  chosen: the streaked
  alternatives:
  - striped
  - ring-streaked
  - banded
  lexicon: HALOT
  rationale: עָקֹד refers to animals marked with bands or streaks. 'Streaked' is clear
    modern English and avoids the more technical or archaic 'ring-streaked,' while
    still distinguishing it from 'speckled.'
- source_word: עֲקֻדִּים (second occurrence)
  chosen: streaked young
  alternatives:
  - streaked ones
  - streaked offspring
  lexicon: HALOT
  rationale: As with the earlier clause, English benefits from making the implied
    offspring explicit after 'bore.' 'Streaked young' is concise and natural.
