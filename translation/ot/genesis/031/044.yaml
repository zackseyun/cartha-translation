id: GEN.31.44
reference: Genesis 31:44
source:
  edition: WLC
  text: וְ/עַתָּ֗ה לְכָ֛/ה נִכְרְתָ֥ה בְרִ֖ית אֲנִ֣י וָ/אָ֑תָּה וְ/הָיָ֥ה לְ/עֵ֖ד
    בֵּינִ֥/י וּ/בֵינֶֽ/ךָ׃
translation:
  text: So now, come, let us make a covenant, you and I, and let it be a witness between
    me and you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'let us cut a covenant.' The Hebrew idiom means to make or establish
      a covenant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Introduces the next step in the dialogue with a natural discourse transition.
    'So now' preserves the conjunction while sounding idiomatic in modern English.
- source_word: לְכָה
  chosen: come
  alternatives:
  - go
  - come now
  lexicon: HALOT
  rationale: Though from הלך ('go/walk'), this imperative commonly functions idiomatically
    as an invitation or summons, best rendered 'come' in English in this context.
- source_word: נִכְרְתָה
  chosen: let us make
  alternatives:
  - let us cut
  - let us cut/make
  lexicon: HALOT
  rationale: The verb כרת with בְּרִית is the standard idiom 'cut/make a covenant.'
    English normally uses 'make a covenant' in the main text for clarity, while the
    more literal 'cut' is preserved as an alternative.
- source_word: בְרִית
  chosen: a covenant
  alternatives:
  - an agreement
  - a treaty
  lexicon: HALOT
  rationale: '''Covenant'' is the established and semantically weighty rendering for
    בְּרִית, especially in biblical contexts; weaker terms like ''agreement'' flatten
    the formal relational force.'
- source_word: אֲנִי וָאָתָּה
  chosen: you and I
  alternatives:
  - I and you
  - between us
  lexicon: HALOT
  rationale: The Hebrew explicitly names both parties. 'You and I' is idiomatic English
    and preserves the bilateral emphasis.
- source_word: וְהָיָה
  chosen: and let it be
  alternatives:
  - and it shall be
  - and may it be
  lexicon: HALOT
  rationale: 'Following the cohortative invitation, this is best rendered jussively
    in English: ''let it be.'' This preserves the volitional sense better than a simple
    future.'
- source_word: לְעֵד
  chosen: a witness
  alternatives:
  - for a witness
  - as a witness
  - a testimony
  lexicon: HALOT
  rationale: 'לְ plus עֵד expresses function: the covenant (or covenant arrangement)
    is to serve as a witness. ''A witness'' is the most direct and natural rendering.'
- source_word: בֵּינִי וּבֵינֶךָ
  chosen: between me and you
  alternatives:
  - between you and me
  - between us
  lexicon: HALOT
  rationale: This preserves the explicit personal framing of the Hebrew. Although
    'between you and me' is more idiomatic in English word order, 'between me and
    you' more closely follows the Hebrew sequence without obscuring meaning.
