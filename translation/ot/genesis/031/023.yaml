id: GEN.31.23
reference: Genesis 31:23
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח אֶת אֶחָי/ו֙ עִמּ֔/וֹ וַ/יִּרְדֹּ֣ף אַחֲרָ֔י/ו דֶּ֖רֶךְ שִׁבְעַ֣ת
    יָמִ֑ים וַ/יַּדְבֵּ֥ק אֹת֖/וֹ בְּ/הַ֥ר הַ/גִּלְעָֽד־׃
translation:
  text: And he took his kinsmen with him, and pursued him for seven days' journey,
    and overtook him in the hill country of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his brothers'; the Hebrew term can denote brothers more narrowly or
      kinsmen/relatives more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'overtook him' for 'caught up with him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'at Mount Gilead'; the Hebrew may refer either to a specific mountain
      or to the hill country region of Gilead.
    reason: lexical_alternative
  - marker: d
    text: Or 'pursued after him'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֶחָיו
  chosen: his kinsmen
  alternatives:
  - his brothers
  - his relatives
  lexicon: HALOT
  rationale: Although the lemma commonly means 'brothers,' in context Laban is gathering
    members of his wider clan to pursue Jacob. 'Kinsmen' preserves the familial sense
    without implying only biological brothers.
- source_word: וַיִּרְדֹּף אַחֲרָיו
  chosen: pursued after him
  alternatives:
  - pursued him
  - chased after him
  lexicon: HALOT
  rationale: The verb רדף means 'pursue/chase,' and the following preposition אַחַר
    adds the sense 'after.' 'Pursued after him' keeps the Hebrew construction visible,
    though idiomatic English could shorten it to 'pursued him.'
- source_word: דֶּרֶךְ שִׁבְעַת יָמִים
  chosen: for a journey of seven days
  alternatives:
  - for seven days
  - the distance of seven days
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road/journey' and here functions adverbially
    to indicate the extent of travel. 'For a journey of seven days' preserves that
    nuance better than the flatter 'for seven days.'
- source_word: וַיַּדְבֵּק אֹתוֹ
  chosen: caught up with him
  alternatives:
  - overtook him
  - reached him
  lexicon: HALOT
  rationale: The verb דבק in this stem/context conveys coming up to or overtaking
    someone in pursuit, not the more literal sense 'cling to.' 'Caught up with him'
    is natural modern English and fits the pursuit context.
- source_word: בְּהַר הַגִּלְעָד
  chosen: in the hill country of Gilead
  alternatives:
  - at Mount Gilead
  - in the mountains of Gilead
  lexicon: HALOT
  rationale: הַר can mean a mountain, hill, or hill country depending on context.
    Here a regional sense is likely, so 'hill country of Gilead' avoids implying a
    single named peak while remaining faithful to the Hebrew.
