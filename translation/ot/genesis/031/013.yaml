theological_decisions:
- issue: Self-identification of the speaker as 'the God of Bethel'
  chosen_reading: Render as 'I am the God of Bethel'
  alternative_readings:
  - I am God at Bethel
  - I am the god of Bethel
  rationale: The construction identifies the speaker with Jacob's prior encounter
    at Bethel (Gen 28), not a localized deity among others. Capitalized 'God' reflects
    monotheistic reference while avoiding paraphrastic expansion such as 'the God
    who appeared to you at Bethel.'
  doctrine_reference: Affirmations; Translation philosophy §1
