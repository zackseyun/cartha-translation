id: GEN.31.13
reference: Genesis 31:13
source:
  edition: WLC
  text: אָנֹכִ֤י הָ/אֵל֙ בֵּֽית אֵ֔ל אֲשֶׁ֨ר מָשַׁ֤חְתָּ שָּׁם֙ מַצֵּבָ֔ה אֲשֶׁ֨ר
    נָדַ֥רְתָּ לִּ֛/י שָׁ֖ם נֶ֑דֶר עַתָּ֗ה ק֥וּם צֵא֙ מִן הָ/אָ֣רֶץ הַ/זֹּ֔את וְ/שׁ֖וּב
    אֶל אֶ֥רֶץ מוֹלַדְתֶּֽ/ךָ־־־׃
translation:
  text: I am the God of Bethel, where you anointed a pillar, where you made a vow
    to me. Now rise, leave this land, and return to the land of your birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where you vowed a vow to me.' The Hebrew uses a verb-noun combination
      for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Bethel'' means ''house of God,'' but here it is the place name.'
    reason: cultural_note
lexical_decisions:
- source_word: הָאֵל
  chosen: the God
  alternatives:
  - God
  - the god
  lexicon: HALOT
  rationale: With the article and in direct divine speech, the phrase identifies the
    speaker as the true God rather than an indefinite 'god.' English capitalizes 'God'
    for the God of Israel.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - house of God
  lexicon: HALOT
  rationale: This is the place name Bethel, not a fresh translation of the components
    'house of God.' Per philosophy, names are transliterated by standard convention.
- source_word: מָשַׁחְתָּ ... מַצֵּבָה
  chosen: you anointed a pillar
  alternatives:
  - you poured oil on a pillar
  - you consecrated a pillar
  lexicon: HALOT
  rationale: מָשַׁח commonly means 'anoint.' מַצֵּבָה is an erected stone/pillar.
    'Anointed a pillar' preserves the concrete action from Gen 28:18 without overexplaining
    in the main text.
- source_word: מַצֵּבָה
  chosen: pillar
  alternatives:
  - standing stone
  - sacred pillar
  lexicon: HALOT
  rationale: '''Pillar'' is concise and natural English for the memorial stone Jacob
    set up. ''Standing stone'' is possible but less idiomatic; ''sacred pillar'' adds
    cultic nuance not explicit here.'
- source_word: נָדַרְתָּ לִּי ... נֶדֶר
  chosen: you made a vow to me
  alternatives:
  - you vowed a vow to me
  - you made me a vow
  lexicon: HALOT
  rationale: The Hebrew uses cognate verb and noun for emphasis ('vowed a vow'). English
    normally expresses this as 'made a vow.' 'To me' preserves the dative object.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - at this time
  lexicon: HALOT
  rationale: Marks the transition from recollection to command. 'Now' is natural and
    sufficient.
- source_word: קוּם
  chosen: rise
  alternatives:
  - get up
  - arise
  lexicon: HALOT
  rationale: Imperative of movement/preparation. 'Rise' is dignified modern English
    and pairs well with the following imperatives.
- source_word: צֵא
  chosen: leave
  alternatives:
  - go out
  - depart
  lexicon: HALOT
  rationale: Though literally 'go out,' in context of departing a region 'leave' is
    the most natural English equivalent.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this country
  - this earth
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory/region where Jacob is living, not
    the whole earth. 'Land' is the standard contextual rendering.
- source_word: וְשׁוּב
  chosen: and return
  alternatives:
  - and go back
  - and turn back
  lexicon: HALOT
  rationale: שׁוּב in travel context means returning to a prior place. 'Return' is
    clear and suitably formal.
- source_word: אֶרֶץ מוֹלַדְתֶּךָ
  chosen: the land of your birth
  alternatives:
  - the land of your kindred
  - your native land
  - the land of your relatives
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote birthplace, native land, or kin-group contextually.
    Here, with אֶרֶץ, it most naturally refers to Jacob's native land/origin. 'Land
    of your birth' preserves the connection to origin without narrowing only to relatives.
