id: GEN.31.40
reference: Genesis 31:40
source:
  edition: WLC
  text: הָיִ֧יתִי בַ/יּ֛וֹם אֲכָלַ֥/נִי חֹ֖רֶב וְ/קֶ֣רַח בַּ/לָּ֑יְלָה וַ/תִּדַּ֥ד
    שְׁנָתִ֖/י מֵֽ/עֵינָֽ/י׃
translation:
  text: By day the heat consumed me, and the frost by night, and my sleep fled from
    my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''I was: by day the heat consumed me, and the frost by night.'' The
      Hebrew begins with ''I was,'' which is absorbed into the English clause for
      natural style.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִיתִי
  chosen: '[implied in the clause structure]'
  alternatives:
  - I was
  lexicon: HALOT
  rationale: 'The verb ''I was'' introduces Jacob''s description of his condition,
    but idiomatic English expresses the sense more naturally by fronting the circumstances:
    ''By day the heat consumed me...'' The existential/copular force is preserved
    in the clause without a wooden ''I was''.'
- source_word: בַיּוֹם
  chosen: By day
  alternatives:
  - in the day
  - during the day
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking daytime conditions. 'By day' is
    concise, idiomatic, and preserves the contrast with 'by night'.
- source_word: אֲכָלַנִי
  chosen: consumed me
  alternatives:
  - ate me up
  - devoured me
  lexicon: HALOT
  rationale: From אכל, literally 'ate me,' used idiomatically for being worn down
    or consumed by harsh conditions. 'Consumed me' preserves the vivid metaphor without
    sounding awkward in modern English.
- source_word: חֹרֶב
  chosen: the heat
  alternatives:
  - drought
  - scorching heat
  - dry heat
  lexicon: HALOT
  rationale: In this context of exposure contrasted with nighttime frost, the noun
    refers to scorching daytime heat rather than abstract dryness. 'The heat' best
    fits the parallelism and Jacob's complaint.
- source_word: וְקֶרַח
  chosen: and the frost
  alternatives:
  - and cold
  - and ice
  lexicon: HALOT
  rationale: The term denotes frost/ice; with 'by night' it points to freezing nighttime
    conditions. 'Frost' is the most precise and natural rendering here.
- source_word: בַּלָּיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Temporal counterpart to 'by day.' 'By night' preserves the poetic balance
    of the Hebrew.
- source_word: וַתִּדַּד
  chosen: fled
  alternatives:
  - was driven away
  - departed
  - escaped
  lexicon: HALOT
  rationale: The rare verb conveys moving away or fleeing. With 'my sleep' as subject,
    'fled' is idiomatic English and captures the personified sense.
- source_word: שְׁנָתִי
  chosen: my sleep
  alternatives:
  - my slumber
  lexicon: HALOT
  rationale: Refers to sleep as a state rather than a single night's rest. 'My sleep'
    is straightforward modern English.
- source_word: מֵעֵינָי
  chosen: from my eyes
  alternatives:
  - from my eyelids
  lexicon: HALOT
  rationale: A standard Hebrew expression for sleeplessness. 'From my eyes' preserves
    the imagery and is understandable in English.
