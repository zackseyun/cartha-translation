id: GEN.31.34
reference: Genesis 31:34
source:
  edition: WLC
  text: וְ/רָחֵ֞ל לָקְחָ֣ה אֶת הַ/תְּרָפִ֗ים וַ/תְּשִׂמֵ֛/ם בְּ/כַ֥ר הַ/גָּמָ֖ל וַ/תֵּ֣שֶׁב
    עֲלֵי/הֶ֑ם וַ/יְמַשֵּׁ֥שׁ לָבָ֛ן אֶת כָּל הָ/אֹ֖הֶל וְ/לֹ֥א מָצָֽא־־־׃
translation:
  text: Now Rachel had taken the household idols, put them in the camel’s saddle cushion,
    and sat on them. Laban felt through the whole tent, but did not find them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the teraphim' or 'the household gods.' The Hebrew term refers to household
      cult objects.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the camel’s saddle' or 'in the camel’s pack-saddle gear.' The Hebrew
      likely refers to a padded part of the camel’s riding equipment.
    reason: lexical_alternative
  - marker: c
    text: Or 'had taken the household idols and put them in the camel’s saddle cushion,
      and she sat on them'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַתְּרָפִים
  chosen: the household idols
  alternatives:
  - the teraphim
  - the household gods
  lexicon: HALOT
  rationale: תְּרָפִים refers to household cult objects/deities. 'Household idols'
    communicates the likely referent in clear modern English while avoiding opaque
    transliteration. 'Household gods' is possible, but 'idols' better fits the narrative's
    illicit cultic objects from an Israelite perspective; the more literal transliteration
    is preserved as an alternative.
- source_word: בְּכַר הַגָּמָל
  chosen: in the camel’s saddle cushion
  alternatives:
  - in the camel’s saddle
  - in the camel’s pack-saddle basket
  lexicon: HALOT
  rationale: כַּר commonly denotes a cushion or padded piece. In context with a camel,
    it likely refers to the padded saddle gear or saddle cushion rather than the animal
    generically. 'Saddle cushion' preserves the concrete image while remaining readable.
- source_word: וַתֵּשֶׁב עֲלֵיהֶם
  chosen: and she sat on them
  alternatives:
  - and she was sitting on them
  lexicon: HALOT
  rationale: The wayyiqtol sequence advances the narrative with a simple past. 'Sat
    on them' is the natural English rendering and preserves the physical concealment
    of the objects.
- source_word: וַיְמַשֵּׁשׁ
  chosen: felt through
  alternatives:
  - searched
  - groped through
  - felt around in
  lexicon: HALOT
  rationale: The verb מששׁ emphasizes tactile searching or groping by touch, not merely
    generic searching. 'Felt through' preserves that sensory nuance in idiomatic English.
- source_word: כָּל הָאֹהֶל
  chosen: the whole tent
  alternatives:
  - all the tent
  - the entire tent
  lexicon: HALOT
  rationale: כָּל with the definite noun is best rendered idiomatically as 'the whole
    tent' or 'the entire tent.' 'Whole tent' is concise and natural.
- source_word: וְלֹא מָצָא
  chosen: but did not find them
  alternatives:
  - and did not find them
  - but did not find
  lexicon: HALOT
  rationale: Hebrew leaves the object implicit, but English benefits from supplying
    'them' from context, referring to the household idols. 'But' captures the adversative
    sense in the narrative flow better than a bare 'and.'
- source_word: וְרָחֵל
  chosen: Now Rachel
  alternatives:
  - And Rachel
  - Rachel
  lexicon: HALOT
  rationale: The initial waw here introduces a new step in the narrative with slight
    scene-shifting force. 'Now Rachel' reads naturally in English and signals the
    explanatory move.
