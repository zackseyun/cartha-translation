id: GEN.31.11
reference: Genesis 31:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלַ֜/י מַלְאַ֧ךְ הָ/אֱלֹהִ֛ים בַּ/חֲל֖וֹם יַֽעֲקֹ֑ב וָ/אֹמַ֖ר
    הִנֵּֽנִ/י׃
translation:
  text: Then the angel of God said to me in the dream, ‘Jacob,’ and I said, ‘Here
    I am.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a dream.' The Hebrew has 'in the dream.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר commonly advances the narrative. English 'Then ... said'
    preserves sequence while reading naturally; 'And ... said' is more formally possible.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus 1cs suffix.
- source_word: מַלְאַךְ הָאֱלֹהִים
  chosen: the angel of God
  alternatives:
  - God’s angel
  - the messenger of God
  lexicon: HALOT
  rationale: מַלְאָךְ ordinarily means 'messenger/angel.' In this narrative context
    a heavenly being is in view, so 'angel' is the clearest English choice. The construct
    with the article on אֱלֹהִים is naturally rendered 'the angel of God.'
- source_word: בַּחֲלוֹם
  chosen: in the dream
  alternatives:
  - in a dream
  lexicon: HALOT
  rationale: The prefixed article is present in Hebrew, so 'in the dream' best reflects
    the form. 'In a dream' is idiomatic English but less formally precise here.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal names are transliterated by standard convention.
- source_word: וָאֹמַר
  chosen: and I said
  alternatives:
  - so I said
  lexicon: HALOT
  rationale: Straightforward first-person wayyiqtol of אמר; 'and I said' preserves
    the simple narrative response.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  lexicon: HALOT
  rationale: Idiomatic self-presentation/response formula in Hebrew. 'Here I am' is
    the standard natural English equivalent and preserves the responsive force.
