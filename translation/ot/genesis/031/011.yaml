theological_decisions:
- issue: Rendering מַלְאַךְ הָאֱלֹהִים in a context that may invite identification
    with the divine
  chosen_reading: the angel of God
  alternative_readings:
  - the messenger of God
  rationale: The verse itself names the figure as מַלְאַךְ הָאֱלֹהִים without resolving
    broader theological questions about the identity of the angel. The translation
    preserves that designation without importing a stronger interpretive claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
