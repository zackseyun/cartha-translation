id: GEN.31.45
reference: Genesis 31:45
source:
  edition: WLC
  text: וַ/יִּקַּ֥ח יַעֲקֹ֖ב אָ֑בֶן וַ/יְרִימֶ֖/הָ מַצֵּבָֽה׃
translation:
  text: Then Jacob took a stone and set it up as a pillar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "standing stone" or "memorial stone." The Hebrew מַצֵּבָה denotes an
      erected stone marker or pillar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - picked up
  - took hold of
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח commonly means 'take.' 'Took' is the most natural
    and sufficiently formal narrative rendering in English.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: אָבֶן
  chosen: a stone
  alternatives:
  - stone
  lexicon: HALOT
  rationale: The singular noun denotes one stone. The English indefinite article is
    natural here.
- source_word: וַיְרִימֶהָ
  chosen: set it up
  alternatives:
  - raised it
  - erected it
  lexicon: HALOT
  rationale: From רום/רים with 3fs suffix referring to the stone. In context of establishing
    a memorial stone, 'set it up' communicates the action idiomatically in modern
    English better than the more wooden 'raised it,' while remaining faithful to the
    source.
- source_word: מַצֵּבָה
  chosen: as a pillar
  alternatives:
  - as a standing stone
  - as a memorial stone
  lexicon: HALOT
  rationale: מַצֵּבָה refers to an erected stone/pillar, often a marker or memorial.
    'Pillar' is concise and traditional, while 'as a pillar' reflects the predicative
    function of the final noun after the verb.
