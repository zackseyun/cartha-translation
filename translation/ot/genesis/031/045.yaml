theological_decisions:
- issue: Rendering of מַצֵּבָה in a context where such stones can have memorial or
    cultic associations
  chosen_reading: pillar
  alternative_readings:
  - standing stone
  - memorial stone
  rationale: The verse itself states the physical act of erecting a stone and does
    not explicitly define its later religious significance. 'Pillar' preserves the
    lexical sense without importing a stronger interpretive claim than the text makes.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
