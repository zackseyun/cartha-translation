id: GEN.31.14
reference: Genesis 31:14
source:
  edition: WLC
  text: וַ/תַּ֤עַן רָחֵל֙ וְ/לֵאָ֔ה וַ/תֹּאמַ֖רְנָה ל֑/וֹ הַ/ע֥וֹד לָ֛/נוּ חֵ֥לֶק
    וְ/נַחֲלָ֖ה בְּ/בֵ֥ית אָבִֽי/נוּ׃
translation:
  text: Then Rachel and Leah answered and said to him, “Do we still have any share
    or inheritance in our father’s house?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portion' for 'share.'
    reason: lexical_alternative
  - marker: b
    text: '''Our father’s house'' may refer not only to the physical household but
      to the family estate or patrimony.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתַּעַן
  chosen: Then ... answered
  alternatives:
  - And ... answered
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... answered' gives
    natural English narrative flow while preserving the sense of response.
- source_word: רָחֵל וְלֵאָה
  chosen: Rachel and Leah
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: וַתֹּאמַרְנָה לוֹ
  chosen: and said to him
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The verb אמר with indirect object explicitly marks speech directed to
    Jacob; 'to him' should be retained because it is present in the Hebrew.
- source_word: הַעוֹד
  chosen: still
  alternatives:
  - yet
  - any longer
  lexicon: HALOT
  rationale: The interrogative use asks whether any status remains. 'Still' is concise,
    natural, and preserves the temporal nuance of continued possession.
- source_word: לָנוּ
  chosen: do we ... have
  alternatives:
  - is there for us
  lexicon: HALOT
  rationale: English idiom expresses possession with 'have'; this naturally conveys
    the dative 'for us' without wooden phrasing.
- source_word: חֵלֶק
  chosen: share
  alternatives:
  - portion
  - part
  lexicon: HALOT
  rationale: In inheritance/property context, 'share' clearly conveys an allotted
    portion and reads naturally in modern English.
- source_word: וְנַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inherited property or hereditary possession. 'Inheritance'
    best fits the family-property dispute in context.
- source_word: בְּבֵית אָבִינוּ
  chosen: in our father’s house
  alternatives:
  - in the house of our father
  - in our father’s household
  lexicon: HALOT
  rationale: A formally close rendering that remains idiomatic. 'House' can include
    household/property sphere, which suits the context of family estate.
