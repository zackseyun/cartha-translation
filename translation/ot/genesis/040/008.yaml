id: GEN.40.8
reference: Genesis 40:8
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֔י/ו חֲל֣וֹם חָלַ֔מְנוּ וּ/פֹתֵ֖ר אֵ֣ין אֹת֑/וֹ וַ/יֹּ֨אמֶר
    אֲלֵ/הֶ֜ם יוֹסֵ֗ף הֲ/ל֤וֹא לֵֽ/אלֹהִים֙ פִּתְרֹנִ֔ים סַפְּרוּ נָ֖א לִֽ/י־׃
translation:
  text: They said to him, “We have dreamed a dream, and there is no one to interpret
    it.” Joseph said to them, “Do not interpretations belong to God? Please tell it
    to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “We dreamed a dream.” The Hebrew literally says, “A dream we dreamed.”
    reason: lexical_alternative
  - marker: b
    text: Or, “Is it not to God that interpretations belong?”
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲלוֹם חָלַמְנוּ
  chosen: We have dreamed a dream
  alternatives:
  - We dreamed a dream
  - We have had a dream
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('dream we dreamed'), which is naturally
    represented in English as 'dreamed a dream.' 'Have dreamed' fits the present relevance
    of the completed action in context, though simple past is also possible.
- source_word: וּפֹתֵר אֵין אֹתוֹ
  chosen: and there is no one to interpret it
  alternatives:
  - and there is no interpreter for it
  - and no one can interpret it
  lexicon: HALOT
  rationale: פֹתֵר is an active participle, literally 'interpreter/one interpreting.'
    Rendering it verbally ('to interpret it') is idiomatic English while preserving
    the sense that no interpreter is available.
- source_word: הֲלוֹא
  chosen: Do not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Do
    not' gives natural English in the construction 'Do not X belong to God?' while
    preserving the rhetorical force.
- source_word: לֵאלֹהִים פִּתְרֹנִים
  chosen: interpretations belong to God
  alternatives:
  - interpretations are God's
  - God has interpretations
  lexicon: HALOT
  rationale: The Hebrew expresses possession or source with ל plus אֱלֹהִים. 'Belong
    to God' preserves the sense that the capacity/right of interpretation is God's,
    without over-paraphrasing.
- source_word: פִּתְרֹנִים
  chosen: interpretations
  alternatives:
  - the interpretation
  - solutions
  lexicon: HALOT
  rationale: 'The noun is plural in Hebrew. Keeping the plural reflects the form and
    likely generic sense: interpretations as a category belong to God.'
- source_word: סַפְּרוּ נָא לִי
  chosen: Please tell it to me
  alternatives:
  - Please recount it to me
  - Tell me, please
  lexicon: HALOT
  rationale: סִפֵּר commonly means recount/tell. 'Please tell it to me' preserves
    both the polite particle נָא and the implied object referring back to the dream.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
