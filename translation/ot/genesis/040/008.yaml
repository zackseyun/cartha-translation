theological_decisions:
- issue: Reference of אֱלֹהִים in Joseph's statement
  chosen_reading: God
  alternative_readings:
  - a god/gods
  rationale: In the Joseph narrative, the reference is to the true God whom Joseph
    acknowledges as the source of interpretive ability. The context is not generic
    polytheistic speculation but Joseph's theological claim about divine sovereignty
    over dream interpretation.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension rather than resolve it only where the source is genuinely ambiguous'
