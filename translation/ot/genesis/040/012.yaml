id: GEN.40.12
reference: Genesis 40:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ יוֹסֵ֔ף זֶ֖ה פִּתְרֹנ֑/וֹ שְׁלֹ֨שֶׁת֙ הַ/שָּׂ֣רִגִ֔ים שְׁלֹ֥שֶׁת
    יָמִ֖ים הֵֽם׃
translation:
  text: 'Then Joseph said to him, “This is its interpretation: the three branches
    are three days.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “vine-branches” or “tendrils” for the Hebrew term rendered “branches.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to the cupbearer
  lexicon: HALOT
  rationale: The pronominal object is explicit in Hebrew; English keeps the pronoun
    rather than supplying the referent in the main text.
- source_word: פִּתְרֹנוֹ
  chosen: its interpretation
  alternatives:
  - its meaning
  - its solution
  lexicon: HALOT
  rationale: Refers to the interpretation of the dream imagery. 'Interpretation' is
    the most precise and idiomatic rendering in this context; the 3ms suffix is rendered
    as 'its' referring to the dream.
- source_word: שְׁלֹשֶׁת
  chosen: the three / three
  alternatives:
  - three of the
  lexicon: HALOT
  rationale: The repeated numeral is preserved in English to match the explanatory
    structure of the interpretation.
- source_word: הַשָּׂרִגִים
  chosen: branches
  alternatives:
  - tendrils
  - vine-branches
  lexicon: HALOT
  rationale: In the dream context this noun refers to the vine's branches/shoots.
    'Branches' is clear, natural, and fits the imagery without over-specifying.
- source_word: יָמִים
  chosen: days
  lexicon: HALOT
  rationale: Straightforward temporal noun; retained literally because the interpretation
    equates the dream symbol with a time period.
- source_word: הֵם
  chosen: are
  alternatives:
  - they are
  lexicon: HALOT
  rationale: The independent pronoun marks the predicate equation emphatically. English
    idiom normally expresses this simply with 'are' in this sentence.
