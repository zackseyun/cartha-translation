id: GEN.40.13
reference: Genesis 40:13
source:
  edition: WLC
  text: בְּ/ע֣וֹד שְׁלֹ֣שֶׁת יָמִ֗ים יִשָּׂ֤א פַרְעֹה֙ אֶת רֹאשֶׁ֔/ךָ וַ/הֲשִֽׁיבְ/ךָ֖
    עַל כַּנֶּ֑/ךָ וְ/נָתַתָּ֤ כוֹס פַּרְעֹה֙ בְּ/יָד֔/וֹ כַּ/מִּשְׁפָּט֙ הָֽ/רִאשׁ֔וֹן
    אֲשֶׁ֥ר הָיִ֖יתָ מַשְׁקֵֽ/הוּ׀־־־׃
translation:
  text: In three more days Pharaoh will lift up your head and restore you to your
    position, and you will place Pharaoh’s cup into his hand, according to the former
    custom when you were his cupbearer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''lift up your head,'' an idiom here indicating favorable restoration;
      the literal wording also sets up the contrasting use in verse 19.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעוֹד שְׁלֹשֶׁת יָמִים
  chosen: In three more days
  alternatives:
  - Within three days
  - In another three days
  lexicon: HALOT
  rationale: The idiom בְּעוֹד with a time expression indicates a remaining span of
    time before an event, naturally rendered 'in three more days' or 'in another three
    days.' This preserves the forward-looking temporal sense better than a bare 'within
    three days.'
- source_word: יִשָּׂא ... אֶת רֹאשֶׁךָ
  chosen: will lift up your head
  alternatives:
  - will lift up your head from upon you
  - will take account of you
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'lift up your head.' In this immediate
    context it signals favorable attention and reinstatement, in contrast with v.
    19 where the same idiom is used with a grim extension. Retaining the idiom in
    English preserves the literary connection while the following clause clarifies
    its positive meaning.
- source_word: וַהֲשִׁיבְךָ עַל כַּנֶּךָ
  chosen: and restore you to your position
  alternatives:
  - and return you to your station
  - and restore you to your office
  lexicon: HALOT
  rationale: כֵּן here refers to an established place, station, or office. 'Position'
    is clear modern English and fits the court setting without sounding overly technical.
- source_word: וְנָתַתָּ כוֹס פַּרְעֹה בְּיָדוֹ
  chosen: and you will place Pharaoh’s cup into his hand
  alternatives:
  - and you will give Pharaoh’s cup into his hand
  - and you will put Pharaoh’s cup in his hand
  lexicon: HALOT
  rationale: נתן is broadly 'give/put.' 'Place ... into his hand' fits the ceremonial
    action of a cupbearer and reads naturally in English while preserving the concrete
    imagery.
- source_word: כַּמִּשְׁפָּט הָרִאשׁוֹן
  chosen: according to the former custom
  alternatives:
  - according to the former manner
  - as before
  - according to the previous ordinance
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean custom, procedure, or prescribed practice in context.
    Here it refers to the prior established way he served Pharaoh. 'Former custom'
    is idiomatic and contextually precise.
- source_word: אֲשֶׁר הָיִיתָ מַשְׁקֵהוּ
  chosen: when you were his cupbearer
  alternatives:
  - as you used to be the one who gave him drink
  - when you served as his cupbearer
  lexicon: HALOT
  rationale: מַשְׁקֶה denotes the official role of cupbearer. Rendering it as the
    office title is more natural and specific than a literal participial paraphrase.
