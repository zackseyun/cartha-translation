id: GEN.40.17
reference: Genesis 40:17
source:
  edition: WLC
  text: וּ/בַ/סַּ֣ל הָֽ/עֶלְי֔וֹן מִ/כֹּ֛ל מַאֲכַ֥ל פַּרְעֹ֖ה מַעֲשֵׂ֣ה אֹפֶ֑ה וְ/הָ/ע֗וֹף
    אֹכֵ֥ל אֹתָ֛/ם מִן הַ/סַּ֖ל מֵ/עַ֥ל רֹאשִֽׁ/י־׃
translation:
  text: and in the top basket were all kinds of food for Pharaoh, the work of a baker,
    and the birds were eating them from the basket above my head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'baker's work,' that is, baked goods prepared for Pharaoh.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַסַּל הָעֶלְיוֹן
  chosen: and in the top basket
  alternatives:
  - and in the upper basket
  lexicon: HALOT
  rationale: עֶלְיוֹן means 'upper, topmost.' 'Top basket' is natural modern English
    in this dream description while preserving the spatial sense.
- source_word: מִכֹּל מַאֲכַל פַּרְעֹה
  chosen: were all kinds of food for Pharaoh
  alternatives:
  - was every sort of food for Pharaoh
  - were all Pharaoh's food items
  lexicon: HALOT
  rationale: 'מִכֹּל with a singular collective noun מַאֲכַל conveys variety: ''all
    kinds of food.'' Supplying ''were'' makes the verbless Hebrew clause idiomatic
    in English.'
- source_word: מַעֲשֵׂה אֹפֶה
  chosen: the work of a baker
  alternatives:
  - baker's work
  - bakery products
  - things baked by a baker
  lexicon: HALOT
  rationale: Literally 'work of a baker.' This likely denotes baked goods or items
    prepared by a baker. The chosen rendering stays close to the Hebrew while remaining
    understandable; a more interpretive alternative is preserved in a footnote.
- source_word: וְהָעוֹף
  chosen: and the birds
  alternatives:
  - and the bird
  lexicon: HALOT
  rationale: עוֹף can function collectively for flying creatures/birds. English plural
    'the birds' best matches the likely collective sense in context.
- source_word: אֹכֵל
  chosen: were eating
  alternatives:
  - was eating
  - ate
  lexicon: HALOT
  rationale: The participle expresses ongoing action in the dream scene. English past
    progressive captures this vivid aspect better than a simple past.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - it
  lexicon: HALOT
  rationale: The 3mp suffix points to plural referents, naturally the food items in
    the basket, so 'them' should be retained.
- source_word: מִן הַסַּל
  chosen: from the basket
  alternatives:
  - out of the basket
  lexicon: HALOT
  rationale: מן marks source. 'From the basket' is straightforward and idiomatic.
- source_word: מֵעַל רֹאשִׁי
  chosen: above my head
  alternatives:
  - on top of my head
  - over my head
  lexicon: HALOT
  rationale: מֵעַל indicates position above. 'Above my head' preserves the spatial
    relation without implying direct contact.
