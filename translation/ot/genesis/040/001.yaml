id: GEN.40.1
reference: Genesis 40:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה חָֽטְא֛וּ מַשְׁקֵ֥ה מֶֽלֶךְ מִצְרַ֖יִם
    וְ/הָ/אֹפֶ֑ה לַ/אֲדֹנֵי/הֶ֖ם לְ/מֶ֥לֶךְ מִצְרָֽיִם־׃
translation:
  text: After these things, the cupbearer of the king of Egypt and his baker sinned
    against their master, the king of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'After these events.' The Hebrew narrative formula can be rendered more
      formally as 'And it happened after these things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: After these things
  alternatives:
  - After these events
  - And it happened after these things
  lexicon: HALOT
  rationale: This is a common Hebrew narrative transition. 'After these things' preserves
    the formal structure while remaining natural English; the fuller 'And it happened...'
    is unnecessarily wooden in modern English.
- source_word: חָטְאוּ
  chosen: sinned against
  alternatives:
  - offended
  - did wrong to
  lexicon: HALOT
  rationale: The verb חטא commonly means 'to sin' or 'to miss/offend.' With ל marking
    the offended party, 'sinned against' best preserves the moral and relational force
    without weakening it to mere displeasure.
- source_word: מַשְׁקֵה
  chosen: the cupbearer
  alternatives:
  - the chief cupbearer
  - the wine steward
  lexicon: HALOT
  rationale: The noun denotes the royal drink-server/cupbearer. 'Cupbearer' is the
    standard, clear English equivalent. 'Chief cupbearer' adds rank not explicit in
    this verse, though context later may clarify office.
- source_word: הָאֹפֶה
  chosen: his baker
  alternatives:
  - the baker
  - the royal baker
  lexicon: HALOT
  rationale: The definite participial form means 'the baker.' Rendering it as 'his
    baker' reflects the relationship implied by the following 'their master' and makes
    the English coordination smoother, while still referring to the king's baker.
- source_word: לַאֲדֹנֵיהֶם
  chosen: against their master
  alternatives:
  - against their lord
  lexicon: HALOT
  rationale: אדון here refers to their human superior, not a divine title. 'Master'
    fits the court-servant context better than 'lord' in contemporary English and
    avoids confusion with a theological title.
- source_word: לְמֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: This appositional phrase identifies 'their master.' Repeating 'the king
    of Egypt' mirrors the Hebrew and preserves the formal emphasis on the offended
    royal figure.
