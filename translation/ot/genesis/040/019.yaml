theological_decisions:
- issue: Rendering the execution imagery and idiom without softening the judgment
    oracle
  chosen_reading: Preserve the Hebrew wordplay and brutality with 'lift up your head
    from upon you' and 'hang you on a tree.'
  alternative_readings:
  - Interpret the idiom more dynamically as 'Pharaoh will behead you and hang your
    body on a pole'
  rationale: This verse is not theologically contested in a doctrinal sense, but it
    contains a deliberate reversal of the favorable idiom in the previous interpretation.
    A more explicit rendering such as 'behead you' may capture the sense, yet it resolves
    the Hebrew idiom and removes the literary echo. The chosen wording preserves both
    the literal imagery and the narrative irony while remaining understandable.
  doctrine_reference: Translation philosophy §§1, 3, 5
