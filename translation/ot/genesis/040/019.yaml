id: GEN.40.19
reference: Genesis 40:19
source:
  edition: WLC
  text: בְּ/ע֣וֹד שְׁלֹ֣שֶׁת יָמִ֗ים יִשָּׂ֨א פַרְעֹ֤ה אֶת רֹֽאשְׁ/ךָ֙ מֵֽ/עָלֶ֔י/ךָ
    וְ/תָלָ֥ה אוֹתְ/ךָ֖ עַל עֵ֑ץ וְ/אָכַ֥ל הָ/ע֛וֹף אֶת בְּשָׂרְ/ךָ֖ מֵ/עָלֶֽי/ךָ׀־־־׃
translation:
  text: In three more days Pharaoh will lift up your head from upon you and hang you
    on a tree, and the birds will eat your flesh from upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'lift up your head from upon you,' likely a grim wordplay on the
      same expression used positively in the interpretation of the cupbearer's dream;
      here it implies removal of the head.
    reason: lexical_alternative
  - marker: b
    text: Or 'hang you on wood' / 'impale you on a pole'; Hebrew 'on a tree.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעוֹד שְׁלֹשֶׁת יָמִים
  chosen: In three more days
  alternatives:
  - Within three days
  - In yet three days
  lexicon: HALOT
  rationale: The idiom בְּעוֹד + time expression indicates a remaining interval before
    an event. 'In three more days' is natural modern English and preserves the temporal
    force without archaic phrasing.
- source_word: יִשָּׂא ... אֶת רֹאשְׁךָ
  chosen: will lift up your head
  alternatives:
  - will raise your head
  - will take up your head
  lexicon: HALOT
  rationale: The phrase נשׂא את־ראש can mean 'lift up the head' idiomatically. In
    this immediate context, because of the following מֵעָלֶיךָ ('from upon you') and
    the execution imagery, the expression is intentionally grim and likely plays on
    the same wording used positively in v. 13. Retaining 'lift up your head' preserves
    the Hebrew idiom and wordplay.
- source_word: מֵעָלֶיךָ
  chosen: from upon you
  alternatives:
  - off you
  - away from you
  lexicon: HALOT
  rationale: This phrase is awkward in English but significant here because it clarifies
    the negative sense of 'lift up your head'—that the head is removed from the body.
    A more idiomatic rendering like 'off you' is possible, but 'from upon you' better
    preserves the Hebrew imagery and the repeated phrase later in the verse.
- source_word: וְתָלָה אֹתְךָ עַל עֵץ
  chosen: and hang you on a tree
  alternatives:
  - and impale you on a pole
  - and hang you on wood
  lexicon: HALOT
  rationale: תלה means 'hang.' עֵץ literally means 'tree' or 'wood.' 'Tree' is the
    standard and transparent rendering in execution contexts in the Hebrew Bible,
    even if the implement may function as a wooden stake or gallows. 'On a tree' preserves
    the lexical form and intertextual resonance.
- source_word: וְאָכַל הָעוֹף
  chosen: and the birds will eat
  alternatives:
  - and the birds will consume
  - and the birds will devour
  lexicon: HALOT
  rationale: Though עוֹף is singular collective ('bird/flying creature'), English
    idiom prefers the plural collective 'the birds' in this context. 'Eat' is the
    plain sense of אכל and avoids over-dramatization.
- source_word: אֶת בְּשָׂרְךָ
  chosen: your flesh
  alternatives:
  - your body
  - your meat
  lexicon: HALOT
  rationale: בשר is literally 'flesh.' 'Body' would soften the concrete and gruesome
    force of the Hebrew. 'Flesh' is both accurate and suitably vivid.
- source_word: מֵעָלֶיךָ
  chosen: from upon you
  alternatives:
  - off you
  - from your body
  lexicon: HALOT
  rationale: Repeated as in the Hebrew to preserve the image of birds stripping flesh
    from the hanged body. The repetition contributes to the severity and should not
    be smoothed away.
