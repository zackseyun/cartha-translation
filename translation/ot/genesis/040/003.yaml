  from: in the house of the captain of the guard, into the prison house
  to: in the house of the captain of the guard, in the prison house
  rationale: The Hebrew text uses a series of prepositional phrases to specify the location, using both בְּ (in) and אֶל (to/into). The draft's literal rendering "in the house... into the prison..." is grammatically correct but slightly awkward in English due to the close proximity of 'in' and 'into'. Since the governing verb is 'put', English 'in' can serve the same function as 'into' without any loss of meaning. Changing to "in the house... in the prison..." creates a more parallel and natural-sounding English phrase, a choice adopted by several major modern translations for this verse (e.g., ESV, NIV).
