id: GEN.40.3
reference: Genesis 40:3
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן אֹתָ֜/ם בְּ/מִשְׁמַ֗ר בֵּ֛ית שַׂ֥ר הַ/טַבָּחִ֖ים אֶל בֵּ֣ית הַ/סֹּ֑הַר מְק֕וֹם אֲשֶׁ֥ר יוֹסֵ֖ף אָס֥וּר שָֽׁם־׃
translation:
  text: And he put them in custody in the house of the captain of the guard, in the prison house, the place where Joseph was confined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the prison,' or more formally 'into the house of confinement.'
    reason: lexical_alternative
  - marker: b
    text: The title 'captain of the guard' translates a Hebrew expression that could more literally be rendered 'chief of the executioners' or 'chief slaughterer.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the house of the captain of the guard, into the prison house'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: he put
  alternatives:
  - he placed
  - he committed
  lexicon: HALOT
  rationale: Though literally 'he gave,' in this custodial context נתן idiomatically means to place or commit someone into custody. 'Put' is natural modern English and preserves the action without over-interpretation.
- source_word: אֹתָם
  chosen: them
  rationale: Direct object pronoun referring to the two officials from the prior context.
- source_word: בְּמִשְׁמַר
  chosen: in custody
  alternatives:
  - under guard
  - in detention
  lexicon: HALOT
  rationale: מִשְׁמָר can denote guard, custody, or confinement. 'In custody' best captures the legal-custodial sense here in readable English.
- source_word: בֵּית שַׂר הַטַּבָּחִים
  chosen: the house of the captain of the guard
  alternatives:
  - the house of the chief of the executioners
  - the house of the chief slaughterer
  lexicon: HALOT
  rationale: שַׂר הַטַּבָּחִים is the established title used for Potiphar in Genesis. While טבחים is literally related to slaughterers/butchers and can imply executioners, 'captain of the guard' fits the Egyptian court-prison context and is the most idiomatic title in English.
- source_word: אֶל בֵּית הַסֹּהַר
  chosen: into the prison house
  alternatives:
  - to the prison
  - into the jail
  lexicon: HALOT
  rationale: בֵּית הַסֹּהַר is a specific expression for the prison. 'Prison house' preserves the Hebrew compound more closely than simply 'prison' while remaining understandable.
- source_word: מְקוֹם
  chosen: the place
  alternatives:
  - the place there
  - the location
  lexicon: HALOT
  rationale: Introduces an appositional clarification of the prison as the place where Joseph was held.
- source_word: אֲשֶׁר יוֹסֵף אָסוּר שָׁם
  chosen: where Joseph was confined
  alternatives:
  - where Joseph was imprisoned
  - where Joseph was bound there
  lexicon: HALOT
  rationale: אָסוּר literally means 'bound' or 'imprisoned/confined.' 'Confined' is a natural rendering that fits the prison setting and avoids awkward literalism. The adverb שָׁם is absorbed into English 'where' rather than translated woodenly as 'there.'
