id: GEN.40.6
reference: Genesis 40:6
source:
  edition: WLC
  text: וַ/יָּבֹ֧א אֲלֵי/הֶ֛ם יוֹסֵ֖ף בַּ/בֹּ֑קֶר וַ/יַּ֣רְא אֹתָ֔/ם וְ/הִנָּ֖/ם זֹעֲפִֽים׃
translation:
  text: When Joseph came to them in the morning, he saw them, and behold, they were
    troubled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dejected,' 'downcast,' or 'gloomy.' The Hebrew describes a visibly disturbed
      or troubled state.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: 'From בוא, the common narrative sense here is motion toward the prisoners:
    ''came to them.'' ''Entered'' would over-specify location, and ''went'' misses
    the deictic sense created by אֲלֵיהֶם (''to them'').'
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - unto them
  lexicon: HALOT
  rationale: Standard directional preposition with 3mp suffix. 'To them' is natural
    modern English and preserves the relational movement.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - at morning
  lexicon: HALOT
  rationale: Temporal phrase with article; 'in the morning' is idiomatic and accurate.
- source_word: וַיַּרְא אֹתָם
  chosen: he saw them
  alternatives:
  - he looked at them
  - he observed them
  lexicon: HALOT
  rationale: ראה with direct object is straightforward perception. 'Saw them' is the
    most direct rendering in narrative sequence.
- source_word: וְהִנָּם
  chosen: and behold
  alternatives:
  - and there they were
  - and indeed
  lexicon: HALOT
  rationale: הִנֵּה/הִנָּם is a presentative particle drawing attention to what Joseph
    noticed. 'And behold' preserves the discourse force better than flattening it
    away, while remaining understandable.
- source_word: זֹעֲפִים
  chosen: troubled
  alternatives:
  - dejected
  - downcast
  - angry
  - gloomy
  - sad
  lexicon: HALOT
  rationale: The participle describes their visibly disturbed facial/emotional state
    after troubling dreams. 'Troubled' best captures the broad distress implied by
    the context without narrowing it to anger alone or to mere sadness. Because the
    Hebrew can also suggest dejection or gloom, those alternatives are preserved in
    a footnote.
