id: GEN.40.7
reference: Genesis 40:7
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֞ל אֶת סְרִיסֵ֣י פַרְעֹ֗ה אֲשֶׁ֨ר אִתּ֧/וֹ בְ/מִשְׁמַ֛ר בֵּ֥ית
    אֲדֹנָ֖י/ו לֵ/אמֹ֑ר מַדּ֛וּעַ פְּנֵי/כֶ֥ם רָעִ֖ים הַ/יּֽוֹם־׃
translation:
  text: So he asked Pharaoh’s officials who were with him in custody in his master’s
    house, saying, “Why are your faces downcast today?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pharaoh’s eunuchs”; the Hebrew term can refer either to literal eunuchs
      or to royal court officials more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'in custody in his master’s house'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: So he asked
  alternatives:
  - And he asked
  - He asked
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'So he asked' gives natural English
    narrative flow while preserving the sequential sense.
- source_word: סְרִיסֵי פַרְעֹה
  chosen: Pharaoh’s officials
  alternatives:
  - Pharaoh’s eunuchs
  - Pharaoh’s court officers
  lexicon: HALOT
  rationale: סָרִיס can denote either literal eunuchs or high court officials. In
    this context the focus is their royal office, and English 'officials' is the least
    misleading main-text rendering; the more specific alternative is preserved in
    a footnote.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with Joseph
  lexicon: HALOT
  rationale: The pronoun refers to Joseph in context. 'With him' preserves the Hebrew
    pronominal form without over-specifying in the main text.
- source_word: בְמִשְׁמַר
  chosen: in custody
  alternatives:
  - in confinement
  - in prison guard
  lexicon: HALOT
  rationale: The noun denotes a place/state of custody or confinement. 'In custody'
    is idiomatic and fits the prison setting.
- source_word: בֵּית אֲדֹנָיו
  chosen: in his master’s house
  alternatives:
  - in the house of his lord
  - in his lord’s house
  lexicon: HALOT
  rationale: Refers to Joseph's master, i.e., Potiphar. 'Master' is the natural contextual
    rendering of אָדוֹן here, and 'house' likely includes the prison area attached
    to the household estate.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' preserves
    the Hebrew structure cleanly.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative best rendered by simple English 'Why'.
- source_word: פְּנֵיכֶם רָעִים
  chosen: your faces downcast
  alternatives:
  - your faces sad
  - your faces troubled
  - your faces bad
  lexicon: HALOT
  rationale: Literally 'your faces [are] bad,' an idiom for looking sad or troubled.
    'Downcast' captures the facial-expression idiom in natural English without flattening
    it to mere emotion.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the temporal expression.
