    two consecutive ''in'' phrases (''in custody in...'') is slightly repetitive and
    less fluid than it could be. Changing the second preposition to ''at'' creates
    a more natural English cadence by distinguishing the state (''in custody'') from
    the general location (''at his master''s house''), without altering the meaning.'
