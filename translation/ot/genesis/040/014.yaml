id: GEN.40.14
reference: Genesis 40:14
source:
  edition: WLC
  text: כִּ֧י אִם זְכַרְתַּ֣/נִי אִתְּ/ךָ֗ כַּ/אֲשֶׁר֙ יִ֣יטַב לָ֔/ךְ וְ/עָשִֽׂיתָ
    נָּ֥א עִמָּדִ֖/י חָ֑סֶד וְ/הִזְכַּרְתַּ֨/נִי֙ אֶל פַּרְעֹ֔ה וְ/הוֹצֵאתַ֖/נִי מִן
    הַ/בַּ֥יִת הַ/זֶּֽה־־־־׃
translation:
  text: But if you remember me when it goes well for you, please show kindness to
    me, and mention me to Pharaoh, and bring me out of this house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from this house.' The Hebrew uses 'house,' here referring to the place
      of confinement.
    reason: lexical_alternative
  - marker: b
    text: Or 'remember me with yourself'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי אִם
  chosen: But if
  alternatives:
  - Only if
  - Indeed if
  lexicon: HALOT
  rationale: The combination introduces a strong conditional appeal following Joseph's
    interpretation. 'But if' captures the adversative-plus-conditional force naturally
    in English without overcomplicating the clause.
- source_word: זְכַרְתַּנִי
  chosen: you remember me
  alternatives:
  - you keep me in mind
  - you call me to mind
  lexicon: HALOT
  rationale: The Qal of זכר with 1cs suffix means to remember or keep in mind. 'Remember
    me' is the most direct and idiomatic rendering here.
- source_word: אִתְּךָ
  chosen: with yourself
  alternatives:
  - with you
  - among your concerns
  lexicon: HALOT
  rationale: The preposition-plus-pronominal form is somewhat idiomatic after 'remember
    me.' Rendering it explicitly as 'with yourself' preserves the Hebrew flavor and
    sense of keeping Joseph in mind personally, though English could omit it. It is
    retained because it is present in the source and contributes nuance.
- source_word: כַּאֲשֶׁר יִיטַב לָךְ
  chosen: when it goes well for you
  alternatives:
  - when it is well with you
  - when things go well for you
  lexicon: HALOT
  rationale: This clause refers to the cupbearer's restoration and welfare. 'When
    it goes well for you' is natural modern English while preserving the temporal
    sense introduced by כַּאֲשֶׁר.
- source_word: וְעָשִׂיתָ נָּא עִמָּדִי חָסֶד
  chosen: please show kindness to me
  alternatives:
  - please deal kindly with me
  - please do covenant loyalty with me
  lexicon: HALOT
  rationale: חֶסֶד can denote kindness, loyal love, or covenant faithfulness depending
    on context. Here Joseph is making a personal plea for benevolent action, not invoking
    a formal covenant, so 'show kindness to me' best fits readable modern English.
    נָא is represented by 'please.'
- source_word: חָסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - mercy
  lexicon: HALOT
  rationale: In this interpersonal request, 'kindness' communicates the practical
    benevolence Joseph seeks. 'Steadfast love' would sound too elevated and covenantal
    in this setting; 'mercy' is possible but less precise.
- source_word: וְהִזְכַּרְתַּנִי אֶל פַּרְעֹה
  chosen: and mention me to Pharaoh
  alternatives:
  - and remember me before Pharaoh
  - and make mention of me to Pharaoh
  lexicon: HALOT
  rationale: 'The Hiphil of זכר here is causative/active in context: bring Joseph
    to Pharaoh''s attention. ''Mention me to Pharaoh'' is concise and idiomatic.'
- source_word: וְהוֹצֵאתַנִי
  chosen: and bring me out
  alternatives:
  - and get me out
  - and cause me to be brought out
  lexicon: HALOT
  rationale: The Hiphil of יצא is causative, 'cause me to go out.' 'Bring me out'
    is natural English and preserves the causative sense better than the more colloquial
    'get me out.'
- source_word: מִן הַבַּיִת הַזֶּה
  chosen: of this house
  alternatives:
  - from this house
  - out of this prison
  lexicon: HALOT
  rationale: The Hebrew says 'house,' likely referring to the prison-house. The main
    text keeps the literal 'house' rather than interpreting it as 'prison,' since
    the source does not use a more explicit prison term here.
