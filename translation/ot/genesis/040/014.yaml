  from: remember me with yourself
  to: remember me
  rationale: The phrase 'remember me with yourself' is a hyper-literal translation
    of the Hebrew 'זְכַרְתַּנִי אִתְּךָ'. While the prepositional phrase 'אִתְּךָ'
    ('with you') is present, rendering it this way creates an unidiomatic and confusing
    English phrase. The force of 'אִתְּךָ' is emphatic or idiomatic, a nuance already
    contained within the English 'remember me' or 'keep me in mind'. Omitting the
    literal 'with yourself' results in clearer, more natural English and is the standard
    practice in major translations.
