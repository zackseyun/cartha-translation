  from: who were confined in the prison house
  to: confined in the prison house
  rationale: 'The current text stacks two relative clauses: ''...the baker who belonged to the king of Egypt, who were confined...''. This is grammatically correct but stylistically cumbersome. The Hebrew uses a participle, אֲסוּרִים (''confined'' or ''imprisoned''). Translating this with an English participial phrase (''confined in the prison house'') is more elegant, avoids the repetitive ''who... who...'', and is a natural and faithful representation of the Hebrew participle''s function. The end of the verse would then read more smoothly: ''...the cupbearer and the baker who belonged to the king of Egypt, confined in the prison house.'''
