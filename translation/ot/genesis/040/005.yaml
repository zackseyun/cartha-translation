id: GEN.40.5
reference: Genesis 40:5
source:
  edition: WLC
  text: וַ/יַּֽחַלְמוּ֩ חֲל֨וֹם שְׁנֵי/הֶ֜ם אִ֤ישׁ חֲלֹמ/וֹ֙ בְּ/לַ֣יְלָה אֶחָ֔ד אִ֖ישׁ כְּ/פִתְר֣וֹן חֲלֹמ֑/וֹ הַ/מַּשְׁקֶ֣ה וְ/הָ/אֹפֶ֗ה אֲשֶׁר֙ לְ/מֶ֣לֶךְ מִצְרַ֔יִם אֲשֶׁ֥ר אֲסוּרִ֖ים בְּ/בֵ֥ית הַ/סֹּֽהַר׃
translation:
  text: And the two of them dreamed a dream, each man his own dream, in one night, each according to the interpretation of his dream—the cupbearer and the baker who belonged to the king of Egypt, confined in the prison house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'both of them had a dream ... on the same night.' The Hebrew uses a cognate expression, literally 'dreamed a dream,' and a temporal phrase literally 'in one night.'
    reason: lexical_alternative
  - marker: b
    text: Or 'each dream with its own interpretation.' The Hebrew emphasizes that each man's dream had a distinct interpretation corresponding to it.
    reason: lexical_alternative
  - marker: c
    text: Or 'who served the king of Egypt.' The phrase can denote official attachment to Pharaoh's service.
    reason: lexical_alternative
  - marker: d
    text: Or 'who were confined in the prison house'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּחַלְמוּ חֲלוֹם
  chosen: dreamed a dream
  alternatives:
  - had a dream
  - dreamed
  lexicon: HALOT
  rationale: Preserves the Hebrew cognate construction (verb + cognate noun), which is stylistically emphatic. 'Dreamed a dream' is natural enough in English and keeps the source texture better than flattening to 'had a dream.'
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: Makes the dual sense explicit and reads naturally in English. 'Both of them' is possible, but 'the two of them' more closely reflects the Hebrew numeral form.
- source_word: אִישׁ חֲלֹמוֹ
  chosen: each man his own dream
  alternatives:
  - each his own dream
  - each one his dream
  lexicon: HALOT
  rationale: Retains the distributive force of אִישׁ ... אִישׁ and follows the project's gender-accurate policy. 'Man' here is distributive for two specific male officials, not generic humanity.
- source_word: בְּלַיְלָה אֶחָד
  chosen: in one night
  alternatives:
  - on the same night
  - in a single night
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal phrase. 'On the same night' is interpretive; 'in one night' preserves the Hebrew wording while still being clear.
- source_word: אִישׁ כְּפִתְרוֹן חֲלֹמוֹ
  chosen: each according to the interpretation of his dream
  alternatives:
  - each with the interpretation of his dream
  - each dream with its own interpretation
  lexicon: HALOT
  rationale: Captures the distributive repetition and the sense of correspondence marked by כְּ. The phrase indicates that each dream had an interpretation fitting it.
- source_word: הַמַּשְׁקֶה
  chosen: the cupbearer
  alternatives:
  - the chief cupbearer
  - the wine steward
  lexicon: HALOT
  rationale: The noun denotes the royal official responsible for serving drink. 'Cupbearer' is the standard concise English equivalent; 'chief' is not explicit in this verse.
- source_word: הָאֹפֶה
  chosen: the baker
  alternatives:
  - the chief baker
  lexicon: HALOT
  rationale: A direct rendering of the participial noun. As with 'cupbearer,' 'chief' is not explicit here and should not be imported from context.
- source_word: אֲשֶׁר לְמֶלֶךְ מִצְרַיִם
  chosen: who belonged to the king of Egypt
  alternatives:
  - who served the king of Egypt
  - who were attached to the king of Egypt
  lexicon: HALOT
  rationale: The לְ marks relation or belonging. 'Belonged to' conveys official attachment to Pharaoh's service without over-specifying function.
- source_word: אֲסוּרִים
  chosen: were confined
  alternatives:
  - were imprisoned
  - were bound
  lexicon: HALOT
  rationale: The passive participle from אסר can mean bound/imprisoned. 'Were confined' fits the prison context and avoids redundancy with the following prison-house phrase, while still conveying custody.
- source_word: בֵּית הַסֹּהַר
  chosen: the prison house
  alternatives:
  - the prison
  - the jail
  lexicon: HALOT
  rationale: A relatively formal rendering that preserves the compound sense 'house of confinement/prison.' 'Jail' is too colloquial; 'prison' is acceptable but slightly less textured.
