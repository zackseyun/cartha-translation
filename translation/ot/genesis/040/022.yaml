id: GEN.40.22
reference: Genesis 40:22
source:
  edition: WLC
  text: וְ/אֵ֛ת שַׂ֥ר הָ/אֹפִ֖ים תָּלָ֑ה כַּ/אֲשֶׁ֥ר פָּתַ֛ר לָ/הֶ֖ם יוֹסֵֽף׃
translation:
  text: But he hanged the chief baker, just as Joseph had interpreted to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "hung." The Hebrew verb can denote hanging; in some contexts interpreters
      understand a form of impalement or post-execution display.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: But
  alternatives:
  - and
  - and ... [object marker left untranslated]
  lexicon: HALOT
  rationale: 'The conjunction with object marker introduces a contrast with the previous
    verse: the cupbearer was restored, but the baker was executed. English does not
    represent the object marker directly, so the contrastive force is conveyed with
    ''But'' for natural discourse flow.'
- source_word: שַׂר הָאֹפִים
  chosen: the chief baker
  alternatives:
  - the captain/prince of the bakers
  - the baker chief
  lexicon: HALOT
  rationale: שַׂר commonly denotes an official or chief; in this court context 'chief
    baker' is the established and accurate idiomatic rendering.
- source_word: תָּלָה
  chosen: hanged
  alternatives:
  - hung
  - impaled
  lexicon: HALOT
  rationale: The verb means to hang. 'Hanged' is the standard English form for execution.
    'Impaled' is possible in some contexts, but here 'hanged' best fits the narrative
    and common English usage without overstating the method.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: This introduces correspondence between the event and Joseph's prior interpretation.
    'Just as' clearly marks exact fulfillment.
- source_word: פָּתַר
  chosen: had interpreted
  alternatives:
  - interpreted
  - explained
  - solved
  lexicon: HALOT
  rationale: In dream contexts פתר means to interpret. The pluperfect 'had interpreted'
    fits the English narrative sequence, since Joseph's interpretation preceded the
    hanging.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The pronoun is plural, referring to the two officials together. 'To them'
    is the most natural rendering with 'interpreted' in English.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name יוֹסֵף.
