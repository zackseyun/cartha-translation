id: GEN.40.20
reference: Genesis 40:20
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֗י י֚וֹם הֻלֶּ֣דֶת אֶת פַּרְעֹ֔ה וַ/יַּ֥עַשׂ
    מִשְׁתֶּ֖ה לְ/כָל עֲבָדָ֑י/ו וַ/יִּשָּׂ֞א אֶת רֹ֣אשׁ שַׂ֣ר הַ/מַּשְׁקִ֗ים וְ/אֶת
    רֹ֛אשׁ שַׂ֥ר הָ/אֹפִ֖ים בְּ/ת֥וֹךְ עֲבָדָֽי/ו׀־־־׀־׃
translation:
  text: And on the third day, Pharaoh’s birthday, he made a feast for all his servants,
    and he lifted up the head of the chief cupbearer and the head of the chief baker
    among his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'he singled out' or 'he took account of.' The Hebrew
      literally says 'he lifted up the head of,' an idiom preserved here because the
      surrounding narrative plays on it with different outcomes for the two officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... it happened / And on ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing the next event in sequence. In natural
    English, the sense is carried by beginning the sentence with 'And on the third
    day' rather than a wooden 'and it happened.'
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  lexicon: HALOT
  rationale: Straightforward temporal phrase; retained formally.
- source_word: יוֹם הֻלֶּדֶת אֶת־פַּרְעֹה
  chosen: Pharaoh’s birthday
  alternatives:
  - the day of Pharaoh’s birth
  lexicon: HALOT
  rationale: Construct chain meaning 'the day of Pharaoh's being born.' 'Pharaoh’s
    birthday' is the natural modern English equivalent without loss of meaning.
- source_word: וַיַּעַשׂ מִשְׁתֶּה
  chosen: he made a feast
  alternatives:
  - he prepared a banquet
  - he held a feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking. 'Made a feast'
    closely reflects the Hebrew verb-noun pairing while remaining idiomatic.
- source_word: לְכָל עֲבָדָיו
  chosen: for all his servants
  alternatives:
  - for all his officials
  - for all his servants/slaves
  lexicon: HALOT
  rationale: עֲבָדָיו broadly means his servants/attendants/courtiers. In this royal
    court context, 'servants' is the most natural broad rendering and does not require
    the stronger 'slaves,' since bonded status is not the point of the verse.
- source_word: וַיִּשָּׂא אֶת־רֹאשׁ
  chosen: he lifted up the head of
  alternatives:
  - he singled out
  - he took account of
  lexicon: HALOT
  rationale: This idiom is intentionally preserved because the immediate context (vv.
    13, 19) plays on the phrase with opposite outcomes for the two officials. A more
    interpretive rendering would lose the literary connection.
- source_word: שַׂר הַמַּשְׁקִים
  chosen: the chief cupbearer
  alternatives:
  - the captain of the cupbearers
  - the chief of the drink-servers
  lexicon: HALOT
  rationale: Standard court title for the official over drink service. 'Chief cupbearer'
    is concise and idiomatic.
- source_word: שַׂר הָאֹפִים
  chosen: the chief baker
  alternatives:
  - the captain of the bakers
  lexicon: HALOT
  rationale: Parallel court title; 'chief baker' is the natural English equivalent.
- source_word: בְּתוֹךְ עֲבָדָיו
  chosen: among his servants
  alternatives:
  - in the midst of his servants
  lexicon: HALOT
  rationale: Locative phrase indicating this action occurred publicly in the presence
    of the royal servants. 'Among' is idiomatic modern English.
