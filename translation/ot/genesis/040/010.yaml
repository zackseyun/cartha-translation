id: GEN.40.10
reference: Genesis 40:10
source:
  edition: WLC
  text: וּ/בַ/גֶּ֖פֶן שְׁלֹשָׁ֣ה שָׂרִיגִ֑ם וְ/הִ֤יא כְ/פֹרַ֨חַת֙ עָלְתָ֣ה נִצָּ֔/הּ
    הִבְשִׁ֥ילוּ אַשְׁכְּלֹתֶ֖י/הָ עֲנָבִֽים׃
translation:
  text: and on the vine were three branches. As it was budding, its blossoms came
    up, and its clusters ripened into grapes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three tendrils' or 'three shoots' for 'three branches.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'and it, as budding, its blossom came up'; the line describes
      the vine's rapid progression from budding to blossom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַגֶּפֶן
  chosen: and on the vine
  alternatives:
  - and in the vine
  - now on the vine
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with definite article are best
    rendered smoothly as 'and on the vine' in English. 'On' fits the imagery of branches
    growing on a vine better than a more wooden 'in.'
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'branches.'
- source_word: שָׂרִיגִם
  chosen: branches
  alternatives:
  - tendrils
  - shoots
  lexicon: HALOT
  rationale: Refers to vine growths/branches. 'Branches' is the most natural and broadly
    understandable English term here, while 'tendrils' is too specific and 'shoots'
    slightly less idiomatic in this dream report.
- source_word: וְהִיא
  chosen: it was
  alternatives:
  - and it
  - and she
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the vine. English naturally uses
    'it' for the plant, and the clause is smoothed idiomatically as 'it was' before
    the participial expression.
- source_word: כְפֹרַחַת
  chosen: as it was budding
  alternatives:
  - when it budded
  - like one budding
  - as it blossomed
  lexicon: HALOT
  rationale: The prefixed כ with participle here introduces the stage of development
    in the dream sequence. 'As it was budding' captures the progressive sense and
    temporal nuance without over-literal awkwardness.
- source_word: עָלְתָה נִצָּהּ
  chosen: its blossoms came up
  alternatives:
  - its blossom came forth
  - its buds opened
  - its bloom shot up
  lexicon: HALOT
  rationale: The verb 'went up/came up' with נֵץ/flowering growth describes emergence
    of blossom. 'Its blossoms came up' preserves the imagery while remaining readable.
    Plural English 'blossoms' is idiomatic for the collective sense.
- source_word: הִבְשִׁילוּ
  chosen: ripened
  alternatives:
  - became ripe
  - matured
  lexicon: HALOT
  rationale: The Hiphil here denotes reaching ripeness. 'Ripened' is concise and natural
    in sequence with the vine imagery.
- source_word: אַשְׁכְּלֹתֶיהָ
  chosen: its clusters
  alternatives:
  - its grape clusters
  - its bunches
  lexicon: HALOT
  rationale: Refers to clusters/bunches on the vine. 'Clusters' is sufficiently clear,
    with 'grape' supplied by the following noun.
- source_word: עֲנָבִים
  chosen: into grapes
  alternatives:
  - grapes
  - with grapes
  lexicon: HALOT
  rationale: 'Used predicatively after ''ripened'': the clusters ripened into grapes.
    This reflects the Hebrew sequence naturally in English and avoids a stilted literalism
    such as ''its clusters ripened grapes.'''
