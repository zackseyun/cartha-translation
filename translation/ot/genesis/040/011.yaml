id: GEN.40.11
reference: Genesis 40:11
source:
  edition: WLC
  text: וְ/כ֥וֹס פַּרְעֹ֖ה בְּ/יָדִ֑/י וָ/אֶקַּ֣ח אֶת הָֽ/עֲנָבִ֗ים וָֽ/אֶשְׂחַ֤ט
    אֹתָ/ם֙ אֶל כּ֣וֹס פַּרְעֹ֔ה וָ/אֶתֵּ֥ן אֶת הַ/כּ֖וֹס עַל כַּ֥ף פַּרְעֹֽה־־־־׃
translation:
  text: Now Pharaoh’s cup was in my hand, and I took the grapes and squeezed them
    into Pharaoh’s cup, and I placed the cup into Pharaoh’s hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pressed them into Pharaoh’s cup.' The Hebrew verb refers to squeezing
      out liquid.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'upon Pharaoh’s palm/hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'placed the cup into Pharaoh’s hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: כּוֹס
  chosen: cup
  alternatives:
  - goblet
  lexicon: HALOT
  rationale: The common sense is a drinking vessel. 'Cup' is the natural modern English
    equivalent and fits the court setting without unnecessary elevation.
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - in my possession
  lexicon: HALOT
  rationale: A literal rendering preserves the vividness of the dream report and is
    idiomatic in English.
- source_word: וָאֶקַּח
  chosen: I took
  alternatives:
  - I picked up
  lexicon: HALOT
  rationale: Standard rendering of לקח in narrative sequence; simple and direct.
- source_word: הָעֲנָבִים
  chosen: the grapes
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; the article is retained.
- source_word: וָאֶשְׂחַט אֹתָם אֶל כּוֹס פַּרְעֹה
  chosen: squeezed them into Pharaoh’s cup
  alternatives:
  - pressed them into Pharaoh’s cup
  - wrung them out into Pharaoh’s cup
  lexicon: HALOT
  rationale: The verb שׂחט literally denotes squeezing/pressing out liquid. In context
    of grapes and a cup, 'squeezed them into' communicates the action clearly in natural
    English without over-paraphrase.
- source_word: וָאֶתֵּן
  chosen: I placed
  alternatives:
  - I gave
  - I put
  lexicon: HALOT
  rationale: Although נתן often means 'give,' the following phrase specifies physical
    placement before Pharaoh. 'Placed' captures the concrete action in context.
- source_word: עַל כַּף פַּרְעֹה
  chosen: into Pharaoh’s hand
  alternatives:
  - onto Pharaoh’s palm
  - upon Pharaoh’s hand
  lexicon: HALOT
  rationale: כַּף is literally 'palm,' but in English 'into Pharaoh’s hand' is the
    most natural equivalent for handing a cup to someone. This is an optimal-equivalence
    rendering of the idiom.
