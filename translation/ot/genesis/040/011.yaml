  from: placed the cup into Pharaoh’s hand
  to: placed the cup in Pharaoh’s hand
  rationale: The Hebrew phrase is `ʿal kap` ('on the palm'). The decision to render
    this idiomatically as 'in Pharaoh's hand' is sound. However, the English collocation
    'placed... into' is slightly less natural than 'placed... in'. Using 'in' is more
    idiomatic and also helps maintain a subtle distinction from the preceding preposition
    `ʾel` ('to, into'), which is correctly rendered as 'into Pharaoh's cup'.
