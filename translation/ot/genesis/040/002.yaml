id: GEN.40.2
reference: Genesis 40:2
source:
  edition: WLC
  text: וַ/יִּקְצֹ֣ף פַּרְעֹ֔ה עַ֖ל שְׁנֵ֣י סָרִיסָ֑י/ו עַ֚ל שַׂ֣ר הַ/מַּשְׁקִ֔ים
    וְ/עַ֖ל שַׂ֥ר הָ/אוֹפִֽים׃
translation:
  text: And Pharaoh was angry with his two officials, with the chief cupbearer and
    with the chief baker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his two court officers"; the Hebrew term can also mean "eunuchs" in
      some contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'with his two officials, with the chief cupbearer and with the chief
      baker'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְצֹף
  chosen: was angry
  alternatives:
  - became angry
  - was enraged
  - was wroth
  lexicon: HALOT
  rationale: The verb קצף denotes anger or wrath. 'Was angry' is natural modern English
    and fits the narrative wayyiqtol sequence without overstating the intensity.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name used in Genesis.
- source_word: שְׁנֵי סָרִיסָיו
  chosen: his two officials
  alternatives:
  - his two court officers
  - his two eunuchs
  lexicon: HALOT
  rationale: סָרִיס can mean court official and in some contexts eunuch. Here the
    roles named are royal functionaries, and 'officials' best fits the context without
    asserting physical status the text does not require.
- source_word: שַׂר הַמַּשְׁקִים
  chosen: the chief cupbearer
  alternatives:
  - the captain of the drink servers
  - the chief of the cupbearers
  lexicon: HALOT
  rationale: שַׂר is 'chief/official/prince' and הַמַּשְׁקִים refers to those who
    give drink. In context this established title is best rendered 'chief cupbearer,'
    the conventional and clear English equivalent.
- source_word: שַׂר הָאֹפִים
  chosen: the chief baker
  alternatives:
  - the chief of the bakers
  lexicon: HALOT
  rationale: שַׂר again denotes the head of a group, and הָאֹפִים refers to bakers.
    'Chief baker' is concise, idiomatic, and preserves the occupational title.
- source_word: עַל ... עַל ... וְעַל
  chosen: with ... with ... and with
  alternatives:
  - against ... against ... and against
  lexicon: HALOT
  rationale: The repeated עַל after a verb of anger marks the objects of Pharaoh's
    anger. English idiom prefers 'angry with' for persons rather than the more adversarial
    'angry against,' while preserving the repeated structure by repeating 'with'.
