id: GEN.40.9
reference: Genesis 40:9
source:
  edition: WLC
  text: וַ/יְסַפֵּ֧ר שַֽׂר הַ/מַּשְׁקִ֛ים אֶת חֲלֹמ֖/וֹ לְ/יוֹסֵ֑ף וַ/יֹּ֣אמֶר ל֔/וֹ
    בַּ/חֲלוֹמִ֕/י וְ/הִנֵּה גֶ֖פֶן לְ/פָנָֽ/י־־־׃
translation:
  text: So the chief cupbearer told his dream to Joseph and said to him, “In my dream,
    behold, a vine was before me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was a vine before me.' The Hebrew uses the attention marker 'behold'
      (וְהִנֵּה), which vividly introduces the dream image.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  chosen: told
  alternatives:
  - recounted
  - related
  lexicon: HALOT
  rationale: The verb ספר in the piel commonly means to recount or tell. 'Told' is
    natural modern English and fits the direct-object construction with the dream
    and indirect object 'to Joseph.'
- source_word: שַׂר הַמַּשְׁקִים
  chosen: the chief cupbearer
  alternatives:
  - the captain of the drinkers
  - the chief butler
  lexicon: HALOT
  rationale: The construct phrase denotes the official in charge of serving drink
    to Pharaoh. 'Chief cupbearer' is the clearest contemporary equivalent; 'chief
    butler' is traditional but less precise in modern English.
- source_word: אֶת חֲלֹמוֹ
  chosen: his dream
  lexicon: HALOT
  rationale: Direct object marker plus noun with 3ms suffix straightforwardly yields
    'his dream.'
- source_word: לְיוֹסֵף
  chosen: to Joseph
  rationale: Personal name is transliterated per project philosophy; the preposition
    ל marks the indirect object.
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the pronominal object 'to him,' so it
    is retained rather than left implicit.
- source_word: בַּחֲלוֹמִי
  chosen: In my dream
  alternatives:
  - In my dream there was
  - In my dreaming
  lexicon: HALOT
  rationale: The prepositional phrase introduces the dream report. 'In my dream' is
    idiomatic and sufficiently formal.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what appears in the
    dream. 'Behold' preserves the vividness and suddenness better than flattening
    it to 'there was,' while remaining understandable in narrative style.
- source_word: גֶפֶן
  chosen: a vine
  alternatives:
  - a grapevine
  lexicon: HALOT
  rationale: The noun denotes a vine, specifically in context a grapevine. 'A vine'
    is the more direct lexical equivalent; 'grapevine' is possible but slightly more
    interpretive than the Hebrew requires.
- source_word: לְפָנַי
  chosen: was before me
  alternatives:
  - was in front of me
  - stood before me
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before me.' English requires
    a copular verb for smoothness, so 'was before me' is supplied to reflect the scene
    described in the dream.
