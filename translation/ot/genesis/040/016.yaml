id: GEN.40.16
reference: Genesis 40:16
source:
  edition: WLC
  text: וַ/יַּ֥רְא שַׂר הָ/אֹפִ֖ים כִּ֣י ט֣וֹב פָּתָ֑ר וַ/יֹּ֨אמֶר֙ אֶל יוֹסֵ֔ף אַף
    אֲנִי֙ בַּ/חֲלוֹמִ֔/י וְ/הִנֵּ֗ה שְׁלֹשָׁ֛ה סַלֵּ֥י חֹרִ֖י עַל רֹאשִֽׁ/י־־־־׃
translation:
  text: When the chief baker saw that he had interpreted well, he said to Yoseph,
    “I also was in my dream, and behold, three baskets of white bread were on my head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three baskets of baked goods'; the Hebrew term חֹרִי is uncertain and
      may describe either the contents as white bread/cakes or the baskets as perforated/woven
      baskets.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר הָאֹפִים
  chosen: the chief baker
  alternatives:
  - the captain of the bakers
  - the prince of the bakers
  lexicon: HALOT
  rationale: שַׂר denotes a chief/official, and הָאֹפִים identifies the guild or role
    as bakers. 'Chief baker' is idiomatic modern English and matches the office sense
    without wooden literalism.
- source_word: כִּי טוֹב פָּתָר
  chosen: that he had interpreted well
  alternatives:
  - that he had given a good interpretation
  - that he had interpreted favorably
  lexicon: HALOT
  rationale: The clause means Joseph's interpretation was perceived as good/successful.
    'Interpreted well' preserves the adverbial force naturally in English. 'Favorably'
    is too interpretive, since the baker only sees that the interpretation was good,
    likely because it was clear or positive for the cupbearer.
- source_word: אַף אֲנִי
  chosen: I also
  alternatives:
  - even I
  - I too
  lexicon: HALOT
  rationale: This combination marks addition/emphasis. 'I also' is natural and preserves
    the baker's joining himself to the prior account.
- source_word: בַּחֲלֹמִי
  chosen: in my dream
  alternatives:
  - in my dream too
  - I was dreaming
  lexicon: HALOT
  rationale: A formally close rendering is preferable here. The verbless expression
    is elliptical; 'I also was in my dream' reflects the Hebrew structure, though
    slightly awkward. The phrase is retained with minimal smoothing as 'was in my
    dream' to preserve the dream-report style.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker introducing vivid dream imagery. 'Behold'
    preserves the narrative vividness and is still understandable in modern literary
    English.
- source_word: שְׁלֹשָׁה סַלֵּי
  chosen: three baskets
  alternatives:
  - three basketfuls
  lexicon: HALOT
  rationale: The construct phrase straightforwardly denotes three baskets. 'Basketfuls'
    is less literal and unnecessary.
- source_word: חֹרִי
  chosen: of white bread
  alternatives:
  - of baked goods
  - of wickerwork
  - perforated baskets
  lexicon: HALOT
  rationale: חֹרִי is difficult and has been understood either as describing the contents
    ('white bread/white cakes') or the baskets ('woven/perforated'). Given the traditional
    and contextually coherent sense in the baker narrative, 'white bread' is adopted
    in the main text, while basket-related alternatives are preserved in a footnote
    because the Hebrew is lexically uncertain.
- source_word: עַל רֹאשִׁי
  chosen: were on my head
  alternatives:
  - were upon my head
  lexicon: HALOT
  rationale: Simple locative phrase; 'on my head' is clear, natural, and sufficiently
    formal.
- source_word: יוֹסֵף
  chosen: Yoseph
  alternatives:
  - Joseph
  rationale: Per project philosophy, personal names are transliterated by standard
    conventions rather than translated through traditional English forms. 'Yoseph'
    more directly reflects the Hebrew name.
