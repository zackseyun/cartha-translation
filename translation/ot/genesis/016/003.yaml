id: GEN.16.3
reference: Genesis 16:3
source:
  edition: WLC
  text: וַ/תִּקַּ֞ח שָׂרַ֣י אֵֽשֶׁת אַבְרָ֗ם אֶת הָגָ֤ר הַ/מִּצְרִית֙ שִׁפְחָתָ֔/הּ
    מִ/קֵּץ֙ עֶ֣שֶׂר שָׁנִ֔ים לְ/שֶׁ֥בֶת אַבְרָ֖ם בְּ/אֶ֣רֶץ כְּנָ֑עַן וַ/תִּתֵּ֥ן
    אֹתָ֛/הּ לְ/אַבְרָ֥ם אִישָׁ֖/הּ ל֥/וֹ לְ/אִשָּֽׁה־־׃
translation:
  text: So Sarai, Abram’s wife, took Hagar the Egyptian, her female slave, after Abram
    had lived ten years in the land of Canaan, and gave her to Abram her husband as
    a wife for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the end of ten years after Abram had lived in the land of Canaan.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as a wife'; the text also identifies Hagar as Sarai’s female slave.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: took
  alternatives:
  - took hold of
  lexicon: HALOT
  rationale: Common narrative use of לקח in wayyiqtol; 'took' is the natural English
    narrative equivalent.
- source_word: שָׂרַי אֵשֶׁת אַבְרָם
  chosen: Sarai, Abram’s wife,
  alternatives:
  - Sarai the wife of Abram
  lexicon: HALOT
  rationale: Appositional construction identifies Sarai by relationship to Abram;
    English punctuation preserves the apposition naturally.
- source_word: הָגָר
  chosen: Hagar
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַמִּצְרִית
  chosen: the Egyptian
  alternatives:
  - the Egyptian woman
  lexicon: HALOT
  rationale: The gentilic adjective marks Hagar's ethnicity/national origin. 'The
    Egyptian' is concise and idiomatic.
- source_word: שִׁפְחָתָהּ
  chosen: her female slave
  alternatives:
  - her maidservant
  - her slave-girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant. In this context the bonded
    status is socially salient, so 'female slave' better reflects the source than
    the softer traditional 'maidservant.'
- source_word: מִקֵּץ עֶשֶׂר שָׁנִים
  chosen: after ... ten years
  alternatives:
  - at the end of ten years
  - after ten years
  lexicon: HALOT
  rationale: The phrase literally means 'from the end of ten years,' idiomatically
    marking the completion of a ten-year period. 'After ... ten years' communicates
    the temporal sense clearly in English.
- source_word: לְשֶׁבֶת אַבְרָם בְּאֶרֶץ כְּנָעַן
  chosen: after Abram had lived ten years in the land of Canaan
  alternatives:
  - since Abram had dwelt ten years in the land of Canaan
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses the circumstance/time reference
    tied to Abram's dwelling. Rendering with a finite clause is clearer modern English
    while preserving the temporal relation.
- source_word: וַתִּתֵּן אֹתָהּ
  chosen: and gave her
  alternatives:
  - and she gave her
  lexicon: HALOT
  rationale: Narrative continuation from Sarai as subject; English does not require
    repeating the pronoun subject.
- source_word: לְאַבְרָם אִישָׁהּ
  chosen: to Abram her husband
  alternatives:
  - to Abram, her husband
  lexicon: HALOT
  rationale: אִישׁ with pronominal suffix here means 'her husband,' clarifying the
    marital relation.
- source_word: לוֹ לְאִשָּׁה
  chosen: as a wife for him
  alternatives:
  - to be his wife
  - as wife
  lexicon: HALOT
  rationale: 'The double construction marks result/purpose: Sarai gave Hagar to Abram
    in the status of wife. ''As a wife for him'' preserves the formal force without
    overinterpreting legal nuance.'
