theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render מַלְאַךְ as 'angel' or 'messenger'
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: Although the Hebrew term can denote either a human or heavenly messenger,
    the narrative setting and conventional sense in this theophanic context support
    'angel.' This preserves the likely referent without importing extra doctrinal
    claims about the angel's identity.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
