id: GEN.16.1
reference: Genesis 16:1
source:
  edition: WLC
  text: וְ/שָׂרַי֙ אֵ֣שֶׁת אַבְרָ֔ם לֹ֥א יָלְדָ֖ה ל֑/וֹ וְ/לָ֛/הּ שִׁפְחָ֥ה מִצְרִ֖ית
    וּ/שְׁמָ֥/הּ הָגָֽר׃
translation:
  text: Now Sarai, Abram’s wife, had borne him no children, and she had an Egyptian
    slave woman whose name was Hagar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'maidservant' or 'female servant' for 'slave woman.'
      The Hebrew שִׁפְחָה denotes a female household slave/servant; 'slave woman'
      is used here to preserve the bonded social status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרַי
  chosen: Now Sarai
  alternatives:
  - And Sarai
  - Sarai
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but at the start of
    a new narrative movement 'now' is natural modern English and preserves the discourse
    transition without sounding wooden. The personal name is transliterated per project
    policy.
- source_word: אֵשֶׁת אַבְרָם
  chosen: Abram’s wife
  alternatives:
  - the wife of Abram
  lexicon: HALOT
  rationale: Construct chain meaning 'wife of Abram.' The possessive form is the most
    natural English equivalent while preserving the marital relation explicitly stated
    in Hebrew.
- source_word: לֹא יָלְדָה לוֹ
  chosen: had borne him no children
  alternatives:
  - had not borne to him
  - had not given birth for him
  - had borne him none
  lexicon: HALOT
  rationale: יָלַד in the Qal with indirect object 'to/for him' refers to childbearing
    for a husband. English idiom requires an explicit object; 'children' is supplied
    because the verb of bearing in this context naturally implies offspring. The pluperfect
    'had borne' fits the backgrounded narrative setup.
- source_word: וְלָהּ
  chosen: and she had
  alternatives:
  - and to her there was
  - and she possessed
  lexicon: HALOT
  rationale: The prepositional possession construction ('to her [was]') is idiomatically
    rendered in English as 'she had.' This preserves the sense without unnatural literalism.
- source_word: שִׁפְחָה
  chosen: slave woman
  alternatives:
  - maidservant
  - female servant
  - servant-girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant of lower social status. In
    this context the bonded status is significant for the ensuing narrative, so 'slave
    woman' better reflects the social reality than the softer 'servant.'
- source_word: מִצְרִית
  chosen: Egyptian
  alternatives:
  - an Egyptian woman
  lexicon: HALOT
  rationale: Adjectival descriptor modifying שִׁפְחָה. 'Egyptian' is concise and natural
    in attributive position in English.
- source_word: וּשְׁמָהּ הָגָר
  chosen: whose name was Hagar
  alternatives:
  - and her name was Hagar
  - named Hagar
  lexicon: HALOT
  rationale: The Hebrew clause explicitly identifies the woman's name. 'Whose name
    was Hagar' integrates smoothly into English while preserving the formal identification.
    'Hagar' is transliterated as a personal name.
