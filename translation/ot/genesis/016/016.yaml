id: GEN.16.16
reference: Genesis 16:16
source:
  edition: WLC
  text: וְ/אַבְרָ֕ם בֶּן שְׁמֹנִ֥ים שָׁנָ֖ה וְ/שֵׁ֣שׁ שָׁנִ֑ים בְּ/לֶֽדֶת הָגָ֥ר אֶת
    יִשְׁמָעֵ֖אל לְ/אַבְרָֽם־־־׃ס
translation:
  text: Abram was eighty-six years old when Hagar bore Ishmael to Abram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Abram.' The Hebrew preposition can be rendered either way in this
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְרָם
  chosen: Abram
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    per translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: was ... years old
  alternatives:
  - son of
  - a son of
  lexicon: HALOT
  rationale: In age formulas, בן idiomatically means 'was ... years old' rather than
    a literal filial expression. English requires restructuring for natural sense.
- source_word: שְׁמֹנִים שָׁנָה וְשֵׁשׁ שָׁנִים
  chosen: eighty-six years old
  alternatives:
  - eighty and six years old
  - a son of eighty years and six years
  lexicon: HALOT
  rationale: Combined Hebrew numerals and year terms form the standard age expression.
    'Eighty-six years old' is the clear modern English equivalent; 'and' is not retained
    because English compounds the number.
- source_word: בְּ/לֶדֶת
  chosen: when ... bore
  alternatives:
  - at the bearing of
  - in bearing
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of ילד introduces a temporal
    clause. In idiomatic English, 'when ... bore' best captures the temporal sense.
- source_word: הָגָר
  chosen: Hagar
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: אֶת יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Direct-object marker אֶת is not translated in English; the proper name
    is transliterated.
- source_word: לְ/אַבְרָם
  chosen: to Abram
  alternatives:
  - for Abram
  lexicon: HALOT
  rationale: The preposition ל marks the relation of the childbearing to Abram, idiomatically
    'bore ... to Abram' or 'for Abram.' 'To Abram' preserves the Hebrew preposition
    more closely while remaining natural in English.
