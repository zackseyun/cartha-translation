theological_decisions:
- issue: Rendering of Hagar's social status
  chosen_reading: female slave
  alternative_readings:
  - maidservant
  - servant
  rationale: The verse concerns a household power hierarchy, and the bonded nature
    of Hagar's status is contextually important. Following the translation philosophy,
    the wording should not soften the institution into generic service.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy of bonded-status language
- issue: Severity of Sarai's treatment in וַתְּעַנֶּהָ
  chosen_reading: afflicted her
  alternative_readings:
  - mistreated her
  - dealt harshly with her
  rationale: The Hebrew indicates real oppression or harsh treatment, but the exact
    form is not specified in this verse. 'Afflicted' preserves the gravity while avoiding
    interpretive overreach. A more idiomatic alternative is preserved in a footnote
    to maintain transparency.
  doctrine_reference: Translation philosophy §3
