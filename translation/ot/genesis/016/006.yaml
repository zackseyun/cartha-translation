id: GEN.16.6
reference: Genesis 16:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אַבְרָ֜ם אֶל שָׂרַ֗י הִנֵּ֤ה שִׁפְחָתֵ/ךְ֙ בְּ/יָדֵ֔/ךְ עֲשִׂי
    לָ֖/הּ הַ/טּ֣וֹב בְּ/עֵינָ֑יִ/ךְ וַ/תְּעַנֶּ֣/הָ שָׂרַ֔י וַ/תִּבְרַ֖ח מִ/פָּנֶֽי/הָ־־׃
translation:
  text: Then Abram said to Sarai, “Look, your female slave is in your hand; do to
    her what is good in your eyes.” Then Sarai afflicted her, and she fled from her
    presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “dealt harshly with her” / “mistreated her.” The Hebrew verb can denote
      afflicting, humiliating, or harsh treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses a natural modern discourse marker that still preserves the deictic
    force of Abram's statement without archaic tone.
- source_word: שִׁפְחָתֵךְ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your slave-girl
  - your servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant. 'Female slave' best preserves
    the bonded social status explicitly, in line with the project's preference not
    to soften slave language where salient.
- source_word: בְּיָדֵךְ
  chosen: in your hand
  alternatives:
  - under your authority
  - in your power
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom and its implication
    of control/authority. The idiomatic sense is clear enough in English in this context.
- source_word: עֲשִׂי לָהּ
  chosen: do to her
  alternatives:
  - deal with her
  - do for her
  lexicon: HALOT
  rationale: The preposition plus verb here points to action directed toward Hagar.
    'Do to her' is the most straightforward rendering and fits the following evaluative
    phrase.
- source_word: הַטּוֹב בְּעֵינַיִךְ
  chosen: what is good in your eyes
  alternatives:
  - what seems good to you
  - what is pleasing in your sight
  lexicon: HALOT
  rationale: Keeps the Hebrew idiom 'good in your eyes' rather than fully flattening
    it to an English paraphrase, while remaining understandable.
- source_word: וַתְּעַנֶּהָ
  chosen: afflicted her
  alternatives:
  - mistreated her
  - humbled her
  - oppressed her
  - dealt harshly with her
  lexicon: HALOT
  rationale: From ענה in the piel, the verb can denote afflicting, humiliating, or
    harsh treatment. 'Afflicted her' preserves the lexical connection to suffering
    without over-specifying the exact form of abuse. Because the term can also be
    rendered more concretely, an alternative is preserved in a footnote.
- source_word: וַתִּבְרַח
  chosen: she fled
  alternatives:
  - she ran away
  lexicon: HALOT
  rationale: '''Fled'' is concise and appropriately serious in tone, matching the
    narrative register.'
- source_word: מִפָּנֶיהָ
  chosen: from her presence
  alternatives:
  - from before her
  - away from her
  lexicon: HALOT
  rationale: Preserves the Hebrew expression literally enough to reflect the source
    while still sounding natural in English.
