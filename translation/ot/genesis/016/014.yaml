id: GEN.16.14
reference: Genesis 16:14
source:
  edition: WLC
  text: עַל כֵּן֙ קָרָ֣א לַ/בְּאֵ֔ר בְּאֵ֥ר לַחַ֖י רֹאִ֑י הִנֵּ֥ה בֵין קָדֵ֖שׁ וּ/בֵ֥ין
    בָּֽרֶד־־׃
translation:
  text: Therefore the well was called Beer-lahai-roi. Look, it is between Kadesh and
    Bered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer-lahai-roi likely means 'Well of the Living One who sees me,' though
      the name's exact nuance is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: The phrase marks a conclusion drawn from the preceding event. 'Therefore'
    is concise and natural in modern English while preserving the causal connection.
- source_word: קָרָא
  chosen: was called
  alternatives:
  - he called
  - one called
  lexicon: HALOT
  rationale: The Hebrew is 3ms singular ('he called'), but in English this idiom is
    commonly rendered passively when the subject is indefinite or contextually obvious.
    The focus is on the naming of the well, not on the namer.
- source_word: לַבְּאֵר
  chosen: the well
  alternatives:
  - to the well
  lexicon: HALOT
  rationale: 'With קרא in naming formulas, the preposition marks the object named.
    English idiom requires a direct object: ''the well was called,'' not ''was called
    to the well.'''
- source_word: בְּאֵר לַחַי רֹאִי
  chosen: Beer-lahai-roi
  alternatives:
  - Well of the Living One who sees me
  - Well of the Living One who sees
  - Well of Living Seeing
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    by standard conventions rather than translated in the main text. The underlying
    sense is significant but belongs in a footnote rather than the main line.
- source_word: הִנֵּה
  chosen: Look,
  alternatives:
  - Behold,
  - Indeed,
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    discourse function in readable modern English better than the archaic 'Behold.'
- source_word: בֵין ... וּבֵין
  chosen: between ... and ...
  alternatives:
  - between ... and also between ...
  lexicon: HALOT
  rationale: This is the standard correlative construction for spatial location. Smooth
    English collapses the repeated preposition into 'between ... and ...'.
- source_word: קָדֵשׁ
  chosen: Kadesh
  lexicon: HALOT
  rationale: Place name transliterated according to standard English convention.
- source_word: בָּרֶד
  chosen: Bered
  lexicon: HALOT
  rationale: Place name transliterated according to standard English convention.
