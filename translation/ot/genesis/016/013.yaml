id: GEN.16.13
reference: Genesis 16:13
source:
  edition: WLC
  text: וַ/תִּקְרָ֤א שֵׁם יְהוָה֙ הַ/דֹּבֵ֣ר אֵלֶ֔י/הָ אַתָּ֖ה אֵ֣ל רֳאִ֑י כִּ֣י אָֽמְרָ֗ה הֲ/גַ֥ם הֲלֹ֛ם רָאִ֖יתִי אַחֲרֵ֥י רֹאִֽ/י־׃
translation:
  text: 'So she gave a name to the LORD who spoke to her: “You are a God who sees me,” for she said, “Have I really here seen after the One who sees me?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You are the God who sees,” or “You are a God of seeing.”
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew. It may mean, “Have I even here seen him and remained alive after he saw me?”
    reason: alternative_reading
  - marker: c
    text: Or 'So she called the name of the LORD who spoke to her,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּקְרָא שֵׁם
  chosen: she called the name
  alternatives:
  - she named
  - she called
  lexicon: HALOT
  rationale: The Hebrew idiom קרא שם is more literally 'call the name.' Retaining 'called the name' preserves the formal structure while remaining understandable in English; 'named' is possible but slightly smooths over the idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following established reverential convention and the pattern reflected in ancient translation tradition.
- source_word: הַדֹּבֵר אֵלֶיהָ
  chosen: who spoke to her
  alternatives:
  - who was speaking to her
  - the one speaking to her
  lexicon: HALOT
  rationale: The participial construction identifies YHWH as the one addressing Hagar. English relative clause 'who spoke to her' is natural and contextually appropriate.
- source_word: אַתָּה אֵל רֳאִי
  chosen: You are a God who sees me
  alternatives:
  - You are God of seeing
  - You are a God of seeing
  - You are the God who sees
  lexicon: HALOT
  rationale: רֳאִי is difficult and likely means 'seeing' or 'one who sees me.' The clause is best rendered as Hagar's naming confession that God sees her. 'A God who sees me' preserves the predicative force without over-specifying definiteness beyond the Hebrew.
- source_word: כִּי אָֽמְרָה
  chosen: for she said
  alternatives:
  - because she said
  lexicon: HALOT
  rationale: Introduces the explanation for the naming. 'For' fits the explanatory sense in English biblical style.
- source_word: הֲגַם הֲלֹם
  chosen: Have I really here
  alternatives:
  - Have I even here
  - Even here have I
  lexicon: HALOT
  rationale: The particles express surprise and emphasis. 'Really here' communicates Hagar's astonishment at what has happened in this place.
- source_word: רָאִיתִי אַחֲרֵי רֹאִי
  chosen: seen after the One who sees me
  alternatives:
  - seen him and remained alive
  - looked after the one who saw me
  - seen here after he saw me
  lexicon: HALOT
  rationale: This is one of the verse's hardest phrases. Literally it involves 'I have seen' plus אַחֲרֵי ('after') and a participial/suffixed form from ראה. The chosen rendering stays close to the Hebrew wording and preserves the ambiguity rather than importing the interpretive expansion 'and lived.' The sense likely relates to seeing God after being seen by him, with astonishment at surviving the encounter.
