  category: awkward_english
  tier: 1
  from: So she called the name of the LORD who spoke to her,
  to: 'So she gave a name to the LORD who spoke to her:'
  rationale: The Hebrew idiom 'qara shem le-' (to call a name to/for) is rendered here as 'called the name of', which is a Hebraism that can be slightly awkward or ambiguous in English. It could be misread as 'she uttered the name of the LORD'. The suggested rewrite, 'she gave a name to the LORD who spoke to her:', clarifies that Hagar is bestowing a new title or descriptive name upon God, which is the sense of the passage. The colon then sets up the name itself as a direct quotation.
