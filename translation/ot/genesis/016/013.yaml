theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering for YHWH. This also preserves continuity with English Bible convention without denying the underlying proper name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of Hagar's divine title אֵל רֳאִי
  chosen_reading: You are a God who sees me
  alternative_readings:
  - You are the God who sees
  - You are a God of seeing
  rationale: The Hebrew permits more than one nuance. The chosen reading foregrounds God's attentive perception of Hagar, which fits the immediate narrative context, while avoiding a more interpretively loaded or less idiomatic English expression.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Interpretation of the final clause רָאִיתִי אַחֲרֵי רֹאִי
  chosen_reading: Have I really here seen after the One who sees me?
  alternative_readings:
  - Have I even here seen him and remained alive?
  - Have I really seen here the back of the one who sees me?
  rationale: The Hebrew is syntactically compressed and famously difficult. Rather than resolve it into the traditional paraphrase about surviving a vision of God, the main text preserves the wording's ambiguity. A footnote records the common interpretive alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
