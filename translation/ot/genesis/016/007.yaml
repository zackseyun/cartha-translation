theological_decisions:
- issue: Rendering of the divine name in the phrase מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the angel of Yahweh
  - the messenger of the LORD
  rationale: The verse identifies the figure as YHWH's angel/messenger without explicitly
    resolving broader theological questions about the identity of the angel of the
    LORD. The translation preserves the traditional title and does not import a christological
    or theophanic interpretation beyond the text itself.
