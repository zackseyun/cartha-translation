id: GEN.16.7
reference: Genesis 16:7
source:
  edition: WLC
  text: וַֽ/יִּמְצָאָ֞/הּ מַלְאַ֧ךְ יְהוָ֛ה עַל עֵ֥ין הַ/מַּ֖יִם בַּ/מִּדְבָּ֑ר עַל
    הָ/עַ֖יִן בְּ/דֶ֥רֶךְ שֽׁוּר־־׃
translation:
  text: And the angel of the LORD found her by a spring of water in the wilderness,
    by the spring on the way to Shur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'angel'
      or 'messenger.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּמְצָאָהּ
  chosen: found her
  alternatives:
  - came upon her
  - encountered her
  lexicon: HALOT
  rationale: The verb מצא in the waw-consecutive narrative form most naturally means
    'found.' The suffix marks a feminine singular object, referring to Hagar. 'Found
    her' is idiomatic and preserves the narrative sense without overinterpreting the
    encounter.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel.' In this narrative context,
    'angel' is the established and contextually appropriate rendering for a divine
    messenger. יְהוָה is rendered 'the LORD' per doctrine guidelines for the divine
    name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה and the longstanding reverential convention reflected
    in many English translations and the Septuagintal pattern.
- source_word: עַל עֵין הַמַּיִם
  chosen: by a spring of water
  alternatives:
  - by a water spring
  - by a fountain of water
  - at a spring of water
  lexicon: HALOT
  rationale: עַיִן can denote an eye or a spring/source of water. Here, with הַמַּיִם
    and the wilderness setting, 'spring' is clearly intended. 'By' renders עַל idiomatically
    in English for location near a water source.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or steppe rather than a sand desert
    specifically. 'Wilderness' is the broader and more accurate English choice in
    biblical narrative.
- source_word: עַל הָעַיִן
  chosen: by the spring
  alternatives:
  - at the spring
  - by the fountain
  lexicon: HALOT
  rationale: The repeated עַיִן refers back to the same water source. Rendering it
    again as 'spring' preserves lexical consistency and the localizing function of
    the phrase.
- source_word: בְּדֶרֶךְ שׁוּר
  chosen: on the way to Shur
  alternatives:
  - on the road to Shur
  - by the way of Shur
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way' or 'road.' 'On the way to Shur' is natural
    English and fits the directional/topographical sense. Shur is a place name and
    is transliterated.
