id: GEN.16.5
reference: Genesis 16:5
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר שָׂרַ֣י אֶל אַבְרָם֮ חֲמָסִ֣/י עָלֶי/ךָ֒ אָנֹכִ֗י נָתַ֤תִּי שִׁפְחָתִ/י֙ בְּ/חֵיקֶ֔/ךָ וַ/תֵּ֨רֶא֙ כִּ֣י הָרָ֔תָה וָ/אֵקַ֖ל בְּ/עֵינֶ֑י/הָ יִשְׁפֹּ֥ט יְהוָ֖ה בֵּינִ֥/י וּ/בֵינֶֽיׄ/ךָ־׃
translation:
  text: Then Sarai said to Abram, “The wrong done to me is on you. I gave my female slave into your embrace, and when she saw that she had conceived, I became contemptible in her eyes. May Yahweh judge between me and you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “My wrong be upon you,” preserving the more literal Hebrew wording; the sense is an accusation that Abram bears responsibility for the injustice Sarai has suffered.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into your bosom,” an idiom here for intimate reception.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמָסִי
  chosen: the wrong done to me
  alternatives:
  - my wrong
  - my violence
  - my grievance
  - the injustice done to me
  lexicon: HALOT
  rationale: חָמָס can denote violence, wrong, or injustice. In this complaint context, Sarai is not confessing her own wrongdoing but charging Abram with responsibility for the wrong she has suffered. 'The wrong done to me' captures the possessive sense without implying that the wrong originates from Sarai.
- source_word: עָלֶיךָ
  chosen: is on you
  alternatives:
  - be upon you
  - rests on you
  lexicon: HALOT
  rationale: The preposition עַל with second-person suffix here assigns responsibility or liability. 'Is on you' is idiomatic modern English and preserves the accusatory force.
- source_word: שִׁפְחָתִי
  chosen: my female slave
  alternatives:
  - my maidservant
  - my slave-girl
  - my servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant. In keeping with the project's preference to reflect bonded status where salient, 'female slave' makes the social reality explicit while remaining natural English.
- source_word: בְּחֵיקֶךָ
  chosen: into your embrace
  alternatives:
  - into your bosom
  - to your bed
  - into your lap
  lexicon: HALOT
  rationale: חֵיק literally means bosom/lap, but in this context it is a modest idiom for intimate marital/sexual reception. 'Into your embrace' preserves the metaphor without sounding archaic or overly explicit.
- source_word: הָרָתָה
  chosen: she had conceived
  alternatives:
  - she was pregnant
  - she conceived
  lexicon: HALOT
  rationale: The perfect verb marks completed conception. 'Had conceived' fits the sequence after 'she saw' and is slightly more precise than the stative 'was pregnant.'
- source_word: וָאֵקַל
  chosen: I became contemptible
  alternatives:
  - I was despised
  - I became insignificant
  - I was slighted
  lexicon: HALOT
  rationale: From קלל in the Niphal/Qal-related sense of being slight, cursed, or treated lightly. The clause describes Sarai's lowered status in Hagar's estimation. 'I became contemptible' preserves the passive/resultative nuance and the social-honor dimension.
- source_word: בְּעֵינֶיהָ
  chosen: in her eyes
  alternatives:
  - in her sight
  - to her
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or estimation. 'In her eyes' is transparent English and preserves the idiom.
- source_word: יִשְׁפֹּט יְהוָה
  chosen: May the LORD judge
  alternatives:
  - The LORD will judge
  - Let the LORD judge
  lexicon: HALOT
  rationale: The jussive expresses an appeal or wish. 'May the LORD judge' best conveys Sarai's invocation of divine adjudication. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: בֵּינִי וּבֵינֶיךָ
  chosen: between me and you
  alternatives:
  - between me and you two
  - between us
  lexicon: HALOT
  rationale: The phrase invokes the LORD as arbiter between the two parties specifically. 'Between me and you' keeps the directness of the Hebrew better than the more generalized 'between us'.
