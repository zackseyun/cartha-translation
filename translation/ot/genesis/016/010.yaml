theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default rendering
    for YHWH. This also preserves continuity with the conventional English representation
    of the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Identity nuance of מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the messenger of the LORD
  rationale: The translation preserves the textual expression without resolving broader
    theological debates about whether this figure is merely an angelic messenger or
    a special manifestation of the LORD. The wording keeps that tension intact rather
    than importing a doctrinal conclusion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
