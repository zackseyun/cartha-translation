id: GEN.16.10
reference: Genesis 16:10
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הּ֙ מַלְאַ֣ךְ יְהוָ֔ה הַרְבָּ֥ה אַרְבֶּ֖ה אֶת זַרְעֵ֑/ךְ וְ/לֹ֥א
    יִסָּפֵ֖ר מֵ/רֹֽב־׃
translation:
  text: Then the angel of the LORD said to her, “I will greatly multiply your offspring,
    so that it cannot be counted because of its multitude.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this recurring Genesis formula,
    'angel of the LORD' is the established and contextually fitting rendering. יְהוָה
    follows the doctrinal default 'the LORD' rather than 'Yahweh.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, יְהוָה is rendered 'the LORD' in the
    main text, preserving reverential convention and alignment with longstanding covenant-name
    practice.
- source_word: הַרְבָּה אַרְבֶּה
  chosen: I will greatly multiply
  alternatives:
  - I will surely multiply
  - multiplying I will multiply
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'I will
    greatly multiply' communicates the emphatic force in clear English without wooden
    literalism.
- source_word: זַרְעֵךְ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective
    sense better than the archaic 'seed' and avoids prematurely specifying a plural
    form like 'descendants.'
- source_word: וְלֹא יִסָּפֵר
  chosen: so that it cannot be counted
  alternatives:
  - and it will not be counted
  - and it cannot be numbered
  lexicon: HALOT
  rationale: The Niphal of ספר here expresses being counted/numbered. Rendering with
    'cannot be counted' captures the sense of innumerability in idiomatic English;
    'so that' makes explicit the result relation implied in context.
- source_word: מֵרֹב
  chosen: because of its multitude
  alternatives:
  - for multitude
  - because they are so many
  - from abundance
  lexicon: HALOT
  rationale: 'The preposition מִן with רֹב gives the reason: because of great number.
    ''Because of its multitude'' is concise and preserves the singular collective
    reference back to ''offspring.'''
