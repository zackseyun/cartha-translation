id: GEN.16.12
reference: Genesis 16:12
source:
  edition: WLC
  text: וְ/ה֤וּא יִהְיֶה֙ פֶּ֣רֶא אָדָ֔ם יָד֣/וֹ בַ/כֹּ֔ל וְ/יַ֥ד כֹּ֖ל בּ֑/וֹ וְ/עַל
    פְּנֵ֥י כָל אֶחָ֖י/ו יִשְׁכֹּֽן־־׃
translation:
  text: And he will be a wild donkey of a man; his hand will be against everyone,
    and everyone's hand against him, and he will dwell opposite all his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wild-ass man'; the Hebrew literally compares him to a wild donkey,
      an image of untamed freedom rather than simply saying he is 'wild.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the presence of' or 'over against.' The Hebrew expression may indicate
      living opposite, in front of, or in defiance of all his brothers.
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' may extend beyond literal siblings to close kin or related
      peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּרֶא אָדָם
  chosen: a wild donkey of a man
  alternatives:
  - a wild-ass man
  - a wild donkey man
  - a wild man
  lexicon: HALOT
  rationale: 'פֶּרֶא denotes the wild donkey/onager, not merely ''wild'' in the abstract.
    The construct-like juxtaposition with אָדָם yields an idiomatic characterization:
    a man like a wild donkey. ''A wild donkey of a man'' preserves the vivid metaphor
    in natural English better than flattening it to ''wild man.'''
- source_word: אָדָם
  chosen: man
  alternatives:
  - human
  - person
  lexicon: HALOT
  rationale: Here אָדָם refers to the individual Ishmael, not humanity in general.
    Per doctrine, gender-accurate rendering is preferred where the source is masculine
    and specific.
- source_word: יָדוֹ בַכֹּל
  chosen: his hand will be against everyone
  alternatives:
  - his hand against all
  - his hand in everything
  lexicon: HALOT
  rationale: In this context 'hand' functions idiomatically for hostile action or
    opposition. Rendering the implied adversative sense as 'against everyone' communicates
    the Hebrew idiom clearly in English while retaining 'hand' imagery.
- source_word: וְיַד כֹּל בּוֹ
  chosen: everyone's hand against him
  alternatives:
  - the hand of all against him
  - everyone against him
  lexicon: HALOT
  rationale: This mirrors the prior clause and preserves the reciprocal hostility.
    Keeping 'hand' maintains the Hebrew parallelism.
- source_word: וְעַל־פְּנֵי
  chosen: opposite
  alternatives:
  - before
  - in the presence of
  - over against
  - east of
  lexicon: HALOT
  rationale: The phrase literally means 'upon the face of,' but in locative contexts
    often means 'in front of' or 'opposite/over against.' 'Opposite' preserves the
    spatial-relational sense without overinterpreting it as mere visibility or a specific
    compass direction.
- source_word: כָּל־אֶחָיו
  chosen: all his brothers
  alternatives:
  - all his kinsmen
  - all his relatives
  lexicon: HALOT
  rationale: אָח commonly means 'brother' and can extend to kin-group members, but
    the more literal 'brothers' should stand in the main text. A broader kinship nuance
    is worth preserving in a footnote rather than replacing the primary gloss.
- source_word: יִשְׁכֹּן
  chosen: he will dwell
  alternatives:
  - he will live
  - he will settle
  - he will encamp
  lexicon: HALOT
  rationale: שׁכן commonly means 'dwell, settle, reside.' 'Dwell' is both natural
    and slightly weightier, fitting the predictive tone.
