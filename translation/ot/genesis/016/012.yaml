theological_decisions:
- issue: Characterization of Ishmael in the metaphor פֶּרֶא אָדָם
  chosen_reading: 'Retain the animal metaphor explicitly: ''a wild donkey of a man'''
  alternative_readings:
  - a wild man
  rationale: The text gives a vivid, non-doctrinal characterization and should not
    be softened into a generic personality description. Preserving the metaphor avoids
    importing moral judgments beyond the Hebrew image of untamed freedom and conflict.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
