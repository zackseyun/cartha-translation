theological_decisions:
- issue: Rendering Hagar’s social status
  chosen_reading: slave woman
  alternative_readings:
  - maidservant
  - servant
  rationale: The verse explicitly identifies Hagar by her subordinate bonded status
    under Sarai. In line with the project’s source-language primacy and its handling
    of bonded-status terms, the translation avoids euphemizing the relationship.
  doctrine_reference: Translation philosophy §1
- issue: Whether to make explicit that the speaker is the angel of the LORD
  chosen_reading: And he said
  alternative_readings:
  - And the angel of the LORD said
  rationale: Although the antecedent is clear from the previous verse, this verse’s
    Hebrew does not repeat the title. The translation preserves the wording of the
    verse itself rather than importing the fuller identification into the main text.
  doctrine_reference: Translation philosophy §1
