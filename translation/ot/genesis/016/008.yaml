id: GEN.16.8
reference: Genesis 16:8
source:
  edition: WLC
  text: וַ/יֹּאמַ֗ר הָגָ֞ר שִׁפְחַ֥ת שָׂרַ֛י אֵֽי מִ/זֶּ֥ה בָ֖את וְ/אָ֣נָה תֵלֵ֑כִי
    וַ/תֹּ֕אמֶר מִ/פְּנֵי֙ שָׂרַ֣י גְּבִרְתִּ֔/י אָנֹכִ֖י בֹּרַֽחַת־׃
translation:
  text: And he said, “Hagar, Sarai’s slave woman, where have you come from, and where
    are you going?” And she said, “I am fleeing from Sarai my mistress.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “maidservant” or “female servant”; the Hebrew denotes a female in servile
      status under Sarai.
    reason: lexical_alternative
  - marker: b
    text: Literally “from the presence of Sarai my mistress.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְחַת
  chosen: slave woman
  alternatives:
  - female slave
  - servant girl
  - maidservant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant. Given the translation philosophy’s
    preference to render bonded-status terms plainly where salient, 'slave woman'
    preserves both gender and social status better than the softer traditional 'maidservant'
    or 'servant.'
- source_word: אֵי מִזֶּה
  chosen: where have you come from
  alternatives:
  - from where have you come
  lexicon: HALOT
  rationale: The idiom asks about origin. 'Where have you come from' is natural modern
    English while remaining close to the Hebrew sense.
- source_word: וְאָנָה תֵלֵכִי
  chosen: and where are you going
  alternatives:
  - and where will you go
  - and to where are you going
  lexicon: HALOT
  rationale: אָנָה with הלך asks destination. The imperfect here works naturally as
    present-progressive/future in English; 'are you going' is idiomatic in direct
    speech.
- source_word: מִפְּנֵי
  chosen: from
  alternatives:
  - away from
  - from the presence of
  - because of
  lexicon: HALOT
  rationale: Literally 'from the face/presence of,' but in this context it marks separation/escape
    from a person. 'From' is the clearest concise rendering in English.
- source_word: גְּבִרְתִּי
  chosen: my mistress
  alternatives:
  - my lady
  - my master
  lexicon: HALOT
  rationale: The feminine form refers to a female superior/owner. 'My mistress' best
    matches the social relationship between Hagar and Sarai in context.
- source_word: בֹּרַחַת
  chosen: I am fleeing
  alternatives:
  - I am running away
  - I flee
  lexicon: HALOT
  rationale: The participle expresses ongoing action. 'I am fleeing' preserves the
    durative sense and the seriousness of escape.
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: The subject is the messenger of the LORD from the previous verse, but
    the Hebrew here simply says 'and he said.' The translation keeps the explicit
    pronoun without importing more than the immediate context warrants.
- source_word: שָׂרַי
  chosen: Sarai
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הָגָר
  chosen: Hagar
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
