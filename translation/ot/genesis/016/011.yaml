id: GEN.16.11
reference: Genesis 16:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הּ֙ מַלְאַ֣ךְ יְהוָ֔ה הִנָּ֥/ךְ הָרָ֖ה וְ/יֹלַ֣דְתְּ בֵּ֑ן וְ/קָרָ֤את שְׁמ/וֹ֙ יִשְׁמָעֵ֔אל כִּֽי שָׁמַ֥ע יְהוָ֖ה אֶל עָנְיֵֽ/ךְ־־׃
translation:
  text: Then the angel of Yahweh said to her, “Behold, you are pregnant and will bear a son, and you shall call his name Ishmael, because Yahweh has heard your affliction.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this narrative context the conventional and contextually appropriate sense is a heavenly messenger. יְהוָה is rendered 'the LORD' per doctrine policy for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנָּךְ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: The particle marks attention and solemn announcement. 'Behold' preserves the deictic force and elevated tone without adding content.
- source_word: הָרָה
  chosen: pregnant
  alternatives:
  - with child
  lexicon: HALOT
  rationale: The adjective plainly states Hagar's condition. 'Pregnant' is clear modern English and accurately reflects the Hebrew.
- source_word: וְיֹלַדְתְּ בֵּן
  chosen: will bear a son
  alternatives:
  - are about to bear a son
  - will give birth to a son
  lexicon: HALOT
  rationale: The construction announces the future birth. 'Will bear a son' is idiomatic, concise, and close to the Hebrew.
- source_word: וְקָרָאת שְׁמוֹ
  chosen: you shall call his name
  alternatives:
  - you will call his name
  - you shall name
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'call his name.' This is preserved in readable English because naming formulas are a recurring biblical pattern and carry literary weight.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. The name's meaning is contextually explained by the following clause rather than translated in the main text.
- source_word: כִּי שָׁמַע יְהוָה
  chosen: because the LORD has heard
  alternatives:
  - for the LORD has heard
  - because the LORD heard
  lexicon: HALOT
  rationale: כִּי here gives the reason for the name. The perfect verb can be rendered with present relevance in English; 'has heard' fits the naming explanation and the immediate divine response to Hagar's distress.
- source_word: עָנְיֵךְ
  chosen: your affliction
  alternatives:
  - your misery
  - your suffering
  - your humiliation
  lexicon: HALOT
  rationale: The noun denotes affliction, misery, or oppressed condition. 'Affliction' best preserves the breadth of suffering without narrowing it merely to emotion or social shame.
