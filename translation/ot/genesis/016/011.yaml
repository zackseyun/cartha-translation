theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: the angel of Yahweh
  alternative_readings:
  - the messenger of the LORD
  rationale: The translation preserves the Hebrew expression without importing a stronger theological identification (for example, a christophany) that the wording itself does not explicitly state in this verse.
