  from: So what then
  to: What then
  rationale: The phrase 'So what then' is slightly redundant in English, as both 'so' and 'then' can function to introduce a consequence. While the current rendering is defensible and captures the Hebrew `וּ...אֵפוֹא`, a more concise phrasing like 'What then' or 'So what' would be slightly more idiomatic and fluid for the English reader.
