id: GEN.27.37
reference: Genesis 27:37
source:
  edition: WLC
  text: וַ/יַּ֨עַן יִצְחָ֜ק וַ/יֹּ֣אמֶר לְ/עֵשָׂ֗ו הֵ֣ן גְּבִ֞יר שַׂמְתִּ֥י/ו לָ/ךְ֙ וְ/אֶת כָּל אֶחָ֗י/ו נָתַ֤תִּי ל/וֹ֙ לַ/עֲבָדִ֔ים וְ/דָגָ֥ן וְ/תִירֹ֖שׁ סְמַכְתִּ֑י/ו וּ/לְ/כָ֣ה אֵפ֔וֹא מָ֥ה אֶֽעֱשֶׂ֖ה בְּנִֽ/י־־׃
translation:
  text: Isaac answered and said to Esau, “Look, I have made him master over you, and I have given all his brothers to him as servants. I have sustained him with grain and new wine. What then can I do for you, my son?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have supported him with grain and new wine.' The Hebrew verb can emphasize support or provision.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have given all his brothers to him as slaves.' The Hebrew term can denote either servants or slaves depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'So what then'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a response in dialogue; 'answered' preserves the formal exchange.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Deictic/interjection marking emphasis. 'Look' is readable modern English and preserves the force without archaic tone.
- source_word: גְּבִיר
  chosen: master
  alternatives:
  - lord
  - ruler
  lexicon: HALOT
  rationale: Denotes one in authority or mastery. 'Master' best fits the familial/domestic dominance context here without importing divine-title associations that 'lord' may carry.
- source_word: שַׂמְתִּיו לָךְ
  chosen: I have made him master over you
  alternatives:
  - I have set him as lord over you
  - I have appointed him over you
  lexicon: HALOT
  rationale: The construction with שׂים plus predicate noun expresses appointment to status. 'Made him master over you' is idiomatic and preserves the relational hierarchy.
- source_word: כָּל אֶחָיו
  chosen: all his brothers
  alternatives:
  - all his kin
  lexicon: HALOT
  rationale: Literal familial term; no reason to broaden beyond 'brothers.'
- source_word: לַעֲבָדִים
  chosen: as servants
  alternatives:
  - as slaves
  lexicon: HALOT
  rationale: Although עבד can denote slaves/servants, here the focus is subordination within a household-blessing framework rather than the bonded condition itself. 'Servants' communicates subjection without over-specifying chattel slavery.
- source_word: דָגָן
  chosen: grain
  alternatives:
  - corn
  lexicon: HALOT
  rationale: Generic cereal produce; 'grain' is the standard modern rendering.
- source_word: תִּירֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: Refers specifically to fresh wine/must rather than wine in general; 'new wine' preserves the agricultural nuance.
- source_word: סְמַכְתִּיו
  chosen: I have sustained him
  alternatives:
  - I have supported him
  - I have supplied him
  lexicon: HALOT
  rationale: The verb סמך literally means support/uphold. In context with grain and new wine, it conveys provision or sustenance. 'Sustained' captures both support and provision.
- source_word: וּלְכָה אֵפוֹא
  chosen: So what then
  alternatives:
  - And for you then
  - Now then
  lexicon: HALOT
  rationale: This idiom transitions to the consequence for Esau. Rendering the connective sense together with אֵפוֹא as 'So what then' produces natural English while preserving the rhetorical turn.
- source_word: מָה אֶעֱשֶׂה לְךָ
  chosen: can I do for you
  alternatives:
  - shall I do for you
  - am I to do for you
  lexicon: HALOT
  rationale: Rhetorical question expressing inability after the blessing has been given. 'Can I do' communicates practical impossibility in context.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: Direct, affectionate filial address; retained plainly.
