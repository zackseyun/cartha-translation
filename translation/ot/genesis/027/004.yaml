id: GEN.27.4
reference: Genesis 27:4
source:
  edition: WLC
  text: וַ/עֲשֵׂה לִ֨/י מַטְעַמִּ֜ים כַּ/אֲשֶׁ֥ר אָהַ֛בְתִּי וְ/הָבִ֥יאָ/ה לִּ֖/י
    וְ/אֹכֵ֑לָה בַּ/עֲב֛וּר תְּבָרֶכְ/ךָ֥ נַפְשִׁ֖/י בְּ/טֶ֥רֶם אָמֽוּת־׃
translation:
  text: Prepare for me tasty food, just as I love, and bring it to me, that I may
    eat, so that my soul may bless you before I die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'savory food' or 'delicacies' for 'tasty food.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''my soul may bless you,'' an idiom expressing Isaac himself in
      his full personal being.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that I may eat, in order that'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַעֲשֵׂה
  chosen: Prepare
  alternatives:
  - Make
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this culinary context, 'prepare'
    is more natural modern English while remaining faithful to the action requested.
- source_word: מַטְעַמִּים
  chosen: tasty food
  alternatives:
  - savory food
  - delicacies
  lexicon: HALOT
  rationale: The noun refers to specially prepared, flavorful food. 'Tasty food' is
    clear, idiomatic modern English; 'savory food' is possible and traditional, but
    can sound narrower or stylistically marked in contemporary usage.
- source_word: כַּאֲשֶׁר אָהַבְתִּי
  chosen: just as I love
  alternatives:
  - such as I love
  - the way I like it
  lexicon: HALOT
  rationale: This preserves Isaac's personal preference with a natural English expression.
    'The way I like it' is idiomatic but slightly more interpretive; 'just as I love'
    stays closer to the Hebrew wording.
- source_word: וְהָבִיאָה לִּי
  chosen: and bring it to me
  alternatives:
  - and bring it for me
  lexicon: HALOT
  rationale: The directive is straightforward movement toward the speaker. 'Bring
    it to me' is the most natural equivalent in English.
- source_word: וְאֹכֵלָה
  chosen: so that I may eat
  alternatives:
  - that I may eat
  - and I will eat
  lexicon: HALOT
  rationale: The cohortative expresses Isaac's intended action following Esau's obedience.
    'So that I may eat' captures the purpose/result flow in smooth English. 'And I
    will eat' is possible but less clearly connected to the preceding command sequence.
- source_word: בַּעֲבוּר
  chosen: in order that
  alternatives:
  - so that
  - because of
  lexicon: HALOT
  rationale: Here the term introduces purpose. 'In order that' makes the purpose relation
    explicit and fits the solemnity of the blessing context.
- source_word: תְּבָרֶכְךָ נַפְשִׁי
  chosen: my soul may bless you
  alternatives:
  - I may bless you
  - my life may bless you
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'my soul' (נַפְשִׁי) as the subject. Retaining
    'my soul' preserves the source wording and the personal, whole-self force of the
    blessing. 'I may bless you' is smoother but omits a significant lexical feature.
- source_word: בְּטֶרֶם אָמוּת
  chosen: before I die
  alternatives:
  - before my death
  lexicon: HALOT
  rationale: This temporal clause is most naturally rendered with a finite verb in
    English. 'Before I die' is direct and faithful.
