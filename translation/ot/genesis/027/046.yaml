id: GEN.27.46
reference: Genesis 27:46
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר רִבְקָה֙ אֶל יִצְחָ֔ק קַ֣צְתִּי בְ/חַיַּ֔/י מִ/פְּנֵ֖י בְּנ֣וֹת
    חֵ֑ת אִם לֹקֵ֣חַ יַ֠עֲקֹב אִשָּׁ֨ה מִ/בְּנֽוֹת חֵ֤ת כָּ/אֵ֨לֶּה֙ מִ/בְּנ֣וֹת הָ/אָ֔רֶץ
    לָ֥/מָּה לִּ֖/י חַיִּֽים־־־׃
translation:
  text: Then Rebekah said to Isaac, “I am weary of my life because of the daughters
    of Heth. If Jacob takes a wife from the daughters of Heth like these, from the
    daughters of the land, what good is life to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Hittite women” / “the daughters of the Hittites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: קַצְתִּי
  chosen: I am weary
  alternatives:
  - I loathe
  - I am disgusted
  - I am fed up
  lexicon: HALOT
  rationale: The verb conveys being grieved, disgusted, or wearied to the point of
    revulsion. 'I am weary' fits the idiom with 'of my life' in natural English while
    preserving the emotional force without overstating it.
- source_word: בְחַיַּי
  chosen: of my life
  alternatives:
  - with my life
  - in my life
  lexicon: HALOT
  rationale: With קוץ in this idiom, the phrase expresses weariness regarding one's
    life itself. 'Of my life' is the most idiomatic English equivalent here.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - on account of
  - from before
  lexicon: HALOT
  rationale: Here the preposition marks cause rather than spatial sense. 'Because
    of' best communicates the causal force in contemporary English.
- source_word: בְּנוֹת חֵת
  chosen: the daughters of Heth
  alternatives:
  - Hittite women
  - the daughters of the Hittites
  lexicon: HALOT
  rationale: The Hebrew is literally 'daughters of Heth.' Because the translation
    philosophy prefers original-language primacy and transliterated names, the literal
    familial-ethnic expression is retained in the main text. The more interpretive
    ethnic equivalent is preserved as an alternative.
- source_word: אִם לֹקֵחַ יַעֲקֹב אִשָּׁה
  chosen: If Jacob takes a wife
  alternatives:
  - If Jacob marries a woman
  - If Jacob takes a woman as wife
  lexicon: HALOT
  rationale: The Hebrew construction is straightforward and idiomatic for marriage.
    'Takes a wife' preserves the source wording while remaining clear in English.
- source_word: כָּאֵלֶּה
  chosen: like these
  alternatives:
  - such as these
  - like those
  lexicon: HALOT
  rationale: The demonstrative points to women of the same sort as those already in
    view, likely Esau's wives. 'Like these' is the closest natural rendering.
- source_word: מִבְּנוֹת הָאָרֶץ
  chosen: from the daughters of the land
  alternatives:
  - from the women of the land
  - from local women
  lexicon: HALOT
  rationale: The phrase is retained fairly literally to preserve the social and covenantal
    contrast with kin-based marriage patterns in Genesis. 'Women of the land' is possible,
    but 'daughters of the land' better mirrors the Hebrew parallelism.
- source_word: לָמָּה לִּי חַיִּים
  chosen: what good is life to me?
  alternatives:
  - why should I live?
  - what are my lives to me?
  - what is life to me?
  lexicon: HALOT
  rationale: This idiom expresses that life would no longer be worth living under
    such circumstances. 'What good is life to me?' communicates the rhetorical force
    in natural English without adding more than the Hebrew implies.
