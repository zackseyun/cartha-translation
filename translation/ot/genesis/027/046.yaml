theological_decisions:
- issue: Ethnic designation of חֵת
  chosen_reading: Retain the literal 'daughters of Heth' in the main text
  alternative_readings:
  - Hittite women
  - daughters of the Hittites
  rationale: This is not a doctrinally contested term, but it bears on translation
    philosophy. The literal rendering preserves the Hebrew ethnonym and family-line
    framing, while the alternative ethnic gloss is understandable and worth preserving
    in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names'
