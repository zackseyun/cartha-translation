  category: awkward_english
  tier: 1
  from: speaking to Esau your brother, saying,”
  to: speak to Esau your brother:”
  rationale: The current rendering of the Hebrew `מְדַבֵּר ... לֵאמֹר` as "speaking..., saying," is redundant and unidiomatic in English. A more natural construction for reporting speech is "I heard [someone] speak." Using the bare infinitive "speak" and a colon creates a much smoother and clearer introduction to the nested quotation that follows in verse 7. The colon correctly signals that Rebekah's speech continues by quoting her husband, whereas the current comma and closing quotation mark are a less clear way to handle the transition.
