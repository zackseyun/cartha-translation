id: GEN.27.6
reference: Genesis 27:6
source:
  edition: WLC
  text: וְ/רִבְקָה֙ אָֽמְרָ֔ה אֶל יַעֲקֹ֥ב בְּנָ֖/הּ לֵ/אמֹ֑ר הִנֵּ֤ה שָׁמַ֨עְתִּי֙ אֶת אָבִ֔י/ךָ מְדַבֵּ֛ר אֶל עֵשָׂ֥ו אָחִ֖י/ךָ לֵ/אמֹֽר־־־׃
translation:
  text: And Rebekah said to Jacob her son, “Look, I heard your father speak to Esau your brother:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speaking to Esau your brother, saying,”'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/רִבְקָה
  chosen: And Rebekah
  alternatives:
  - Now Rebekah
  - Then Rebekah
  lexicon: HALOT
  rationale: The conjunction וְ is rendered simply as 'And' to preserve the narrative flow without over-interpreting sequence. The proper name is transliterated per translation philosophy.
- source_word: אָֽמְרָה
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אָמַר is most naturally 'said' in direct-speech introduction. 'Spoke' is possible but less idiomatic here.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition in modern English.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention.
- source_word: בְּנָהּ
  chosen: her son
  alternatives:
  - to her son Jacob
  lexicon: HALOT
  rationale: 'The appositional relationship is preserved explicitly: Jacob is identified as ''her son.'''
- source_word: לֵאמֹר
  chosen: “
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The first לֵאמֹר functions as a speech introducer. In English, direct quotation punctuation conveys this more naturally than retaining 'saying.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Listen
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what follows. 'Look' is a readable modern equivalent; 'Behold' is too archaic, and 'Listen' narrows the sense too much.
- source_word: שָׁמַעְתִּי
  chosen: I heard
  alternatives:
  - I have heard
  lexicon: HALOT
  rationale: The perfect verb reports a completed past event in narrative context; simple past is the most natural English rendering.
- source_word: אֶת אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct object marker אֶת is not translated; the noun phrase is rendered straightforwardly.
- source_word: מְדַבֵּר
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: The participle depicts ongoing action contemporaneous with the hearing. 'Speaking' preserves the verbal aspect and fits the formal register better than 'talking.'
- source_word: אֶל עֵשָׂו
  chosen: to Esau
  alternatives:
  - with Esau
  lexicon: HALOT
  rationale: אֶל normally indicates direction toward someone; 'to Esau' best matches the Hebrew.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: The appositional identification is retained explicitly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: The second לֵאמֹר introduces the content of Isaac's speech, which continues in the next verse. Retaining 'saying' clearly signals that the quotation is not yet complete.
