id: GEN.27.23
reference: Genesis 27:23
source:
  edition: WLC
  text: וְ/לֹ֣א הִכִּיר֔/וֹ כִּֽי הָי֣וּ יָדָ֗י/ו כִּ/ידֵ֛י עֵשָׂ֥ו אָחִ֖י/ו שְׂעִרֹ֑ת
    וַֽ/יְבָרְכֵֽ/הוּ־׃
translation:
  text: And he did not recognize him, because his hands were hairy like the hands
    of his brother Esau; so he blessed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he blessed him.' The Hebrew narrative form can be rendered simply
      as sequence, though here it also implies result.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכִּירוֹ
  chosen: did not recognize him
  alternatives:
  - did not know him
  - did not identify him
  lexicon: HALOT
  rationale: נכר in the Hifil commonly means to recognize or identify. In context
    Isaac fails to identify Jacob by touch, so 'recognize' is the most natural English
    rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason Isaac did not recognize him. 'Because'
    is the clearest modern English causal connector.
- source_word: יָדָיו
  chosen: his hands
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 3ms suffix, referring
    to Jacob's hands as felt by Isaac.
- source_word: כִּידֵי
  chosen: like the hands of
  alternatives:
  - as the hands of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like the hands of' preserves the simile
    naturally in English.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: Literal kinship term with 3ms suffix; no reason to expand or paraphrase.
- source_word: שְׂעִרֹת
  chosen: hairy
  alternatives:
  - covered with hair
  lexicon: HALOT
  rationale: Adjective describing the hands. 'Hairy' is concise, idiomatic, and accurately
    conveys the tactile feature central to the deception.
- source_word: וַיְבָרְכֵהוּ
  chosen: so he blessed him
  alternatives:
  - and he blessed him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he blessed him' brings
    out the consequential flow from Isaac's failure to recognize Jacob, while remaining
    faithful to the sequence.
