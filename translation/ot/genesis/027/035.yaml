id: GEN.27.35
reference: Genesis 27:35
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר בָּ֥א אָחִ֖י/ךָ בְּ/מִרְמָ֑ה וַ/יִּקַּ֖ח בִּרְכָתֶֽ/ךָ׃
translation:
  text: And he said, “Your brother came with deceit and took your blessing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by deceit” or “deceitfully.” The Hebrew phrase uses a noun ('deceit')
      with a preposition, which can be represented in English in several natural ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר introducing Isaac’s reply. 'And
    he said' preserves Hebrew narrative sequencing without overinterpreting discourse
    flow.
- source_word: בָּא
  chosen: came
  alternatives:
  - has come
  lexicon: HALOT
  rationale: Qal perfect of בוא in past narrative context is best rendered as simple
    past in English. 'Came' fits the recounting of a completed action.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Direct, literal rendering of the noun with 2ms suffix. No reason to substitute
    the proper name here, since the Hebrew uses the kinship term for rhetorical force.
- source_word: בְּמִרְמָה
  chosen: with deceit
  alternatives:
  - deceitfully
  - by deceit
  - with guile
  lexicon: HALOT
  rationale: 'The preposition ב plus מִרְמָה expresses manner/instrument: he came
    ''with/by deceit.'' ''With deceit'' is natural English and preserves the noun''s
    concrete moral weight better than the adverbial ''deceitfully.'''
- source_word: וַיִּקַּח
  chosen: and took
  alternatives:
  - and has taken
  - and seized
  lexicon: HALOT
  rationale: Wayyiqtol of לקח continues the narrative sequence. 'Took' is the normal
    gloss and avoids overstating force with 'seized.'
- source_word: בִּרְכָתֶךָ
  chosen: your blessing
  lexicon: HALOT
  rationale: Literal rendering of 'your blessing.' In context this refers specifically
    to the paternal blessing intended for Esau; the simple phrase preserves both the
    lexical sense and the narrative significance.
