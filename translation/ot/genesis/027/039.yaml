theological_decisions:
- issue: Sense of the preposition מִן in Isaac's word to Esau
  chosen_reading: 'privative/separative: ''away from'' the richness of the earth and
    the dew of heaven'
  alternative_readings:
  - 'partitive/source: ''from/of the richness of the earth ... from the dew of heaven'''
  rationale: Although the same imagery appears positively in Jacob's blessing, the
    broader context of Esau's diminished blessing and his later life supports reading
    מִן here as expressing deprivation or distance rather than participation. This
    preserves the tension between Jacob's blessing and Esau's fate without importing
    more than the Hebrew allows; the more traditional positive reading is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it without documentation)
