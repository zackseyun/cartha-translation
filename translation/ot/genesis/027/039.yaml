id: GEN.27.39
reference: Genesis 27:39
source:
  edition: WLC
  text: וַ/יַּ֛עַן יִצְחָ֥ק אָבִ֖י/ו וַ/יֹּ֣אמֶר אֵלָ֑י/ו הִנֵּ֞ה מִ/שְׁמַנֵּ֤י הָ/אָ֨רֶץ֙
    יִהְיֶ֣ה מֽוֹשָׁבֶ֔/ךָ וּ/מִ/טַּ֥ל הַ/שָּׁמַ֖יִם מֵ/עָֽל׃
translation:
  text: Then his father Isaac answered and said to him, “Behold, your dwelling shall
    be away from the richness of the earth, and away from the dew of heaven above.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your dwelling shall be of the richness of the earth, and of the dew
      of heaven above.' The Hebrew preposition can be read either positively ('from/of')
      or privatively ('away from').
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing speech; 'answered' preserves
    the formal dialogue structure.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his father Isaac
  lexicon: HALOT
  rationale: 'Rendered appositionally with Isaac''s name already present: ''his father
    Isaac.'' This preserves the relational emphasis in the Hebrew.'
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - Indeed
  lexicon: HALOT
  rationale: Retained as a discourse marker signaling solemn attention. 'Behold' is
    slightly formal but still clear and suits the gravity of the pronouncement.
- source_word: מִשְׁמַנֵּי הָאָרֶץ
  chosen: away from the richness of the earth
  alternatives:
  - from the fatness of the earth
  - from the fertile places of the earth
  lexicon: HALOT
  rationale: שְׁמַנִּים literally denotes 'fatness/richness,' often metaphorically
    for fertility. Because the preposition מִן here is best taken privatively in this
    context, the phrase is rendered 'away from the richness of the earth,' in contrast
    with Jacob's blessing in the preceding verse.
- source_word: מוֹשָׁבֶךָ
  chosen: your dwelling
  alternatives:
  - your habitation
  - your place to live
  lexicon: HALOT
  rationale: מוֹשָׁב refers to dwelling place or habitation. 'Dwelling' is natural
    modern English and preserves the locative sense.
- source_word: וּמִטַּל הַשָּׁמַיִם
  chosen: and away from the dew of heaven
  alternatives:
  - and from the dew of heaven
  lexicon: HALOT
  rationale: As with the previous מִן-phrase, the preposition is taken in a privative/separative
    sense here, yielding a negative counterpart to the blessing of Jacob in v. 28.
- source_word: מֵעָל
  chosen: above
  alternatives:
  - from above
  lexicon: HALOT
  rationale: מֵעָל modifies 'heaven' idiomatically as 'heaven above.' This keeps the
    Hebrew spatial expression without awkwardness.
