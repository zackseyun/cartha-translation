id: GEN.27.40
reference: Genesis 27:40
source:
  edition: WLC
  text: וְ/עַל חַרְבְּ/ךָ֣ תִֽחְיֶ֔ה וְ/אֶת אָחִ֖י/ךָ תַּעֲבֹ֑ד וְ/הָיָה֙ כַּ/אֲשֶׁ֣ר
    תָּרִ֔יד וּ/פָרַקְתָּ֥ עֻלּ֖/וֹ מֵ/עַ֥ל צַוָּארֶֽ/ךָ־־׃
translation:
  text: And by your sword you shall live, and you shall serve your brother; but when
    you break loose, you shall break his yoke from off your neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you grow restless.' The Hebrew verb תָּרִיד is difficult; the context
      of breaking a yoke supports 'break loose,' but a sense like 'grow restless'
      is also possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And by
  alternatives:
  - And on
  - And upon
  lexicon: HALOT
  rationale: With חַרְבְּךָ and תחיה, עַל is idiomatic for living by means of the
    sword, so 'by' best conveys instrumentality in natural English.
- source_word: חַרְבְּךָ
  chosen: your sword
  alternatives:
  - your weapon
  lexicon: HALOT
  rationale: חֶרֶב literally means 'sword.' The concrete image should be preserved
    rather than generalized.
- source_word: תִחְיֶה
  chosen: you shall live
  alternatives:
  - you will live
  - you will survive
  lexicon: HALOT
  rationale: Qal imperfect of חיה here predicts manner of life. 'You shall live' is
    both natural and close to the Hebrew.
- source_word: וְאֶת אָחִיךָ תַּעֲבֹד
  chosen: and you shall serve your brother
  alternatives:
  - and you shall be subject to your brother
  lexicon: HALOT
  rationale: עבד in the Qal commonly means 'serve.' This preserves the directness
    of Isaac's oracle without over-interpreting the exact political form of subjection.
- source_word: וְהָיָה כַּאֲשֶׁר
  chosen: but when
  alternatives:
  - and it shall be that when
  - and when
  lexicon: HALOT
  rationale: This combination introduces a future circumstance. 'But when' captures
    both the temporal sense and the adversative turn in the blessing's final clause.
- source_word: תָּרִיד
  chosen: you break loose
  alternatives:
  - you become restless
  - you roam
  - you grow restless
  lexicon: HALOT
  rationale: The Hiphil of רוד here is difficult and contextually tied to throwing
    off domination. 'Break loose' best fits the following clause about removing the
    yoke, while preserving the sense of forceful resistance. A lexical alternative
    is worth preserving in a footnote because 'grow restless' is also widely defended.
- source_word: וּפָרַקְתָּ
  chosen: you shall break
  alternatives:
  - you shall tear off
  - you shall cast off
  lexicon: HALOT
  rationale: פרק conveys breaking or snapping off. 'Break' keeps the forceful image
    and pairs well with 'yoke.'
- source_word: עֻלּוֹ
  chosen: his yoke
  alternatives:
  - his burden
  lexicon: HALOT
  rationale: עֹל is literally 'yoke' and commonly symbolizes domination or servitude.
    The metaphor should remain explicit.
- source_word: מֵעַל צַוָּארֶךָ
  chosen: from off your neck
  alternatives:
  - from your neck
  lexicon: HALOT
  rationale: The Hebrew is emphatic with מֵעַל, literally 'from upon/off.' 'From off
    your neck' preserves the vivid physical metaphor, though slightly idiomatic in
    English.
