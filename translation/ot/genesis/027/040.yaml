theological_decisions:
- issue: Nature of Esau's future relation to Jacob
  chosen_reading: Render the oracle as political/social subjection followed by eventual
    revolt, without importing later theological conclusions about Edom beyond the
    verse itself.
  alternative_readings:
  - Render more interpretively as permanent servitude
  - Render more weakly as mere family deference
  rationale: The Hebrew speaks of serving a brother and later breaking his yoke. The
    translation should preserve the tension of subjection and later release without
    resolving it into a broader doctrinal claim not explicit in the verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
