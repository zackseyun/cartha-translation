id: GEN.27.41
reference: Genesis 27:41
source:
  edition: WLC
  text: וַ/יִּשְׂטֹ֤ם עֵשָׂו֙ אֶֽת יַעֲקֹ֔ב עַל הַ֨/בְּרָכָ֔ה אֲשֶׁ֥ר בֵּרֲכ֖/וֹ אָבִ֑י/ו
    וַ/יֹּ֨אמֶר עֵשָׂ֜ו בְּ/לִבּ֗/וֹ יִקְרְבוּ֙ יְמֵי֙ אֵ֣בֶל אָבִ֔/י וְ/אַֽהַרְגָ֖ה
    אֶת יַעֲקֹ֥ב אָחִֽ/י־־־׃
translation:
  text: And Esau held a grudge against Jacob because of the blessing with which his
    father had blessed him, and Esau said in his heart, “The days of mourning for
    my father are drawing near; then I will kill Jacob my brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Esau hated Jacob.” The Hebrew verb denotes sustained hostility or enmity,
      not merely a passing feeling.
    reason: lexical_alternative
  - marker: b
    text: Literally, “said in his heart.”
    reason: lexical_alternative
  - marker: c
    text: Or, “The days of my father’s mourning are drawing near.” The Hebrew may
      be understood either as mourning for Isaac after his death or as Isaac’s own
      period of grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂטֹם
  chosen: held a grudge against
  alternatives:
  - hated
  - bore hostility toward
  - harbored animosity toward
  lexicon: HALOT
  rationale: The verb שׂטם denotes sustained hostility or enmity rather than a momentary
    emotional reaction. 'Held a grudge against' captures the durative, inwardly nursed
    resentment that fits the context and leads into Esau's internal resolve to kill
    Jacob.
- source_word: עַל הַבְּרָכָה
  chosen: because of the blessing
  alternatives:
  - over the blessing
  - on account of the blessing
  lexicon: HALOT
  rationale: The preposition עַל here expresses cause or occasion. 'Because of' is
    natural modern English and preserves the causal sense.
- source_word: אֲשֶׁר בֵּרֲכוֹ אָבִיו
  chosen: with which his father had blessed him
  alternatives:
  - that his father blessed him with
  - which his father had given him as a blessing
  lexicon: HALOT
  rationale: The Hebrew explicitly repeats the blessing verb. 'With which his father
    had blessed him' preserves that repetition and makes clear that the blessing bestowed
    on Jacob is the cause of Esau's resentment. The pluperfect 'had blessed' fits
    the narrative sequence.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'in his heart,' referring to inward speech
    or thought. Retaining the idiom is both readable and faithful, and it preserves
    the biblical anthropology of internal deliberation.
- source_word: יִקְרְבוּ יְמֵי אֵבֶל אָבִי
  chosen: The days of mourning for my father are drawing near
  alternatives:
  - The days of my father's mourning are near
  - My father's days of mourning are approaching
  lexicon: HALOT
  rationale: The construct chain can be understood as the mourning occasion connected
    with Esau's father, i.e., mourning for him at his death. 'The days of mourning
    for my father' best reflects Esau's expectation of Isaac's impending death and
    the mourning that will follow. 'Are drawing near' is a natural rendering of יקרבו.
- source_word: וְאַהַרְגָה
  chosen: then I will kill
  alternatives:
  - and I will kill
  - so I will kill
  lexicon: HALOT
  rationale: 'The cohortative form expresses Esau''s resolved intention. In English,
    ''I will kill'' conveys that determination. ''Then'' makes explicit the temporal
    implication from the preceding clause: after the mourning days arrive, he intends
    to act.'
- source_word: אָחִי
  chosen: my brother
  lexicon: HALOT
  rationale: The possessive is explicit in Hebrew and should be retained. It heightens
    the tragedy of the intended violence within the family.
