id: GEN.27.10
reference: Genesis 27:10
source:
  edition: WLC
  text: וְ/הֵבֵאתָ֥ לְ/אָבִ֖י/ךָ וְ/אָכָ֑ל בַּ/עֲבֻ֛ר אֲשֶׁ֥ר יְבָרֶכְ/ךָ֖ לִ/פְנֵ֥י
    מוֹתֽ/וֹ׃
translation:
  text: Then you shall bring it to your father, and he will eat, so that he may bless
    you before his death.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהֵבֵאתָ
  chosen: Then you shall bring
  alternatives:
  - and you shall bring
  - so you shall bring
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional sequence;
    rendered as an imperative-like future 'you shall bring' in English. 'Then' brings
    out the sequential force of the conjunction in context.
- source_word: לְאָבִיךָ
  chosen: to your father
  alternatives:
  - to your dad
  lexicon: HALOT
  rationale: Standard rendering of אָב with 2ms suffix. 'Father' fits the narrative
    register better than colloquial alternatives.
- source_word: וְאָכָל
  chosen: and he will eat
  alternatives:
  - that he may eat
  - and let him eat
  lexicon: HALOT
  rationale: Qal perfect/converted form functioning in sequence after the prior action;
    English future 'he will eat' best reflects the expected result in the plan being
    described.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - in order that
  - because of
  - for the sake of
  lexicon: HALOT
  rationale: 'Here the prepositional expression introduces purpose: the meal is brought
    with the aim that Isaac bless Jacob. ''So that'' is natural modern English and
    preserves the purposive sense.'
- source_word: אֲשֶׁר
  chosen: he may
  alternatives:
  - that he may
  - so that he may
  lexicon: HALOT
  rationale: The relative particle works with בַּעֲבוּר to complete the purpose clause.
    In idiomatic English the force is absorbed into 'so that he may' rather than translated
    woodenly as a standalone relative.
- source_word: יְבָרֶכְךָ
  chosen: bless you
  alternatives:
  - pronounce a blessing on you
  lexicon: HALOT
  rationale: Piel imperfect 3ms + 2ms suffix from ברך. 'Bless you' is the direct and
    standard rendering, especially appropriate in the patriarchal blessing context.
- source_word: לִפְנֵי מוֹתוֹ
  chosen: before his death
  alternatives:
  - before he dies
  - before his dying
  lexicon: HALOT
  rationale: Literally 'before his death.' This preserves the nominal expression and
    the solemnity of the scene better than the more colloquial verbal alternative.
