id: GEN.27.16
reference: Genesis 27:16
source:
  edition: WLC
  text: וְ/אֵ֗ת עֹרֹת֙ גְּדָיֵ֣י הָֽ/עִזִּ֔ים הִלְבִּ֖ישָׁה עַל יָדָ֑י/ו וְ/עַ֖ל חֶלְקַ֥ת
    צַוָּארָֽי/ו־׃
translation:
  text: And she put the skins of the young goats on his hands and on the smooth part
    of his neck.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֹרֹת
  chosen: skins
  alternatives:
  - hides
  lexicon: HALOT
  rationale: The plural construct refers to animal skins used as a covering. 'Skins'
    is the most natural modern English rendering in this context; 'hides' is possible
    but slightly less idiomatic here.
- source_word: גְּדָיֵי הָעִזִּים
  chosen: the young goats
  alternatives:
  - the kids of the goats
  - the goat kids
  lexicon: HALOT
  rationale: The phrase literally means 'young ones of the goats.' 'Young goats' is
    clear, natural English and preserves the referent without unnecessary literal
    awkwardness.
- source_word: הִלְבִּישָׁה
  chosen: put ... on
  alternatives:
  - clothed
  - dressed
  lexicon: HALOT
  rationale: The Hiphil of לבש means to clothe or put on someone. In this context,
    where skins are being applied to body parts, 'put ... on' is more idiomatic and
    precise than 'clothed' or 'dressed.'
- source_word: עַל יָדָיו
  chosen: on his hands
  alternatives:
  - upon his hands
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'On' is natural
    modern English; 'upon' would be more formal without adding meaning.
- source_word: חֶלְקַת צַוָּארָיו
  chosen: the smooth part of his neck
  alternatives:
  - the smoothness of his neck
  - the bare part of his neck
  lexicon: HALOT
  rationale: חֶלְקַת denotes smoothness/smooth part, and the phrase refers to the
    hairless area being covered to imitate Esau's hairiness. 'The smooth part of his
    neck' communicates the concrete sense clearly in English.
