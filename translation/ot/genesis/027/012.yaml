id: GEN.27.12
reference: Genesis 27:12
source:
  edition: WLC
  text: אוּלַ֤י יְמֻשֵּׁ֨/נִי֙ אָבִ֔/י וְ/הָיִ֥יתִי בְ/עֵינָ֖י/ו כִּ/מְתַעְתֵּ֑עַ
    וְ/הֵבֵאתִ֥י עָלַ֛/י קְלָלָ֖ה וְ/לֹ֥א בְרָכָֽה׃
translation:
  text: Perhaps my father will feel me, and I will seem to him like a deceiver, and
    I will bring a curse on myself and not a blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will touch me.' The Hebrew verb refers to feeling by touch, fitting
      Isaac's attempt to verify Jacob's identity physically.
    reason: lexical_alternative
  - marker: b
    text: Or 'like one mocking' or 'like a trickster.' The Hebrew expression denotes
      someone acting deceptively or making a fool of another.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  - It may be that
  lexicon: HALOT
  rationale: Introduces Jacob's apprehensive possibility. 'Perhaps' is natural modern
    English and preserves the uncertainty.
- source_word: יְמֻשֵּׁנִי
  chosen: will feel me
  alternatives:
  - will touch me
  - will handle me
  lexicon: HALOT
  rationale: From משש, to feel/touch by hand. 'Feel me' best fits the context of Isaac
    testing Jacob by touch and sounds idiomatic in English.
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Straightforward possessive rendering.
- source_word: וְהָיִיתִי בְעֵינָיו
  chosen: and I will seem to him
  alternatives:
  - and I will be in his eyes
  - and I will appear to him
  lexicon: HALOT
  rationale: The idiom 'in his eyes' means in his estimation or perception. 'Seem
    to him' communicates the sense naturally without wooden literalism.
- source_word: כִּמְתַעְתֵּעַ
  chosen: like a deceiver
  alternatives:
  - like one mocking
  - like a trickster
  lexicon: HALOT
  rationale: The participial form from תעה/תעתע in this context refers to someone
    who misleads or plays false. Since Jacob is worried about being discovered as
    practicing deception, 'deceiver' best captures the contextual force. 'Mocking'
    is possible lexically but weaker in this scene.
- source_word: וְהֵבֵאתִי עָלַי
  chosen: and I will bring on myself
  alternatives:
  - and I will bring upon myself
  lexicon: HALOT
  rationale: 'Causative sense of בוא in the Hiphil with עלי: to bring upon oneself.
    English idiom prefers ''bring on myself'' or ''bring upon myself.'''
- source_word: קְלָלָה
  chosen: a curse
  lexicon: HALOT
  rationale: Standard rendering; the opposite of the desired blessing in the immediate
    context.
- source_word: וְלֹא בְרָכָה
  chosen: and not a blessing
  alternatives:
  - rather than a blessing
  lexicon: HALOT
  rationale: Preserves the Hebrew contrast directly. 'And not a blessing' is clear
    and mirrors the source structure.
