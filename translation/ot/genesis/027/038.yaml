id: GEN.27.38
reference: Genesis 27:38
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר עֵשָׂ֜ו אֶל אָבִ֗י/ו הַֽ/בְרָכָ֨ה אַחַ֤ת הִֽוא לְ/ךָ֙ אָבִ֔/י
    בָּרֲכֵ֥/נִי גַם אָ֖נִי אָבִ֑/י וַ/יִּשָּׂ֥א עֵשָׂ֛ו קֹל֖/וֹ וַ/יֵּֽבְךְּ־־־׃
translation:
  text: Esau said to his father, “Do you have only one blessing, my father? Bless
    me too, my father!” Then Esau raised his voice and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Is the blessing one for you, my father?' The Hebrew expresses
      Esau's anguish that Isaac seems to have only a single blessing to bestow.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבְּרָכָה אַחַת הִוא לְךָ
  chosen: Do you have only one blessing
  alternatives:
  - Is the blessing one for you
  - Have you but one blessing
  lexicon: HALOT
  rationale: The Hebrew is a verbless clause, literally 'the blessing—one—is it for
    you?' In context it functions naturally as a rhetorical question expressing shock
    that Isaac has only one blessing left to give. 'Do you have only one blessing'
    conveys the sense in idiomatic modern English without adding content beyond the
    implied copula/question.
- source_word: אָבִי
  chosen: my father
  alternatives:
  - father
  lexicon: HALOT
  rationale: The 1cs suffix makes the possessive explicit. Retaining 'my father' in
    both occurrences preserves Esau's emotional appeal and the repetition of the Hebrew.
- source_word: בָּרֲכֵנִי
  chosen: Bless me
  alternatives:
  - give me your blessing
  lexicon: HALOT
  rationale: Direct imperative of ברך with 1cs suffix. 'Bless me' is the most direct
    and formally faithful rendering.
- source_word: גַּם אָֽנִי
  chosen: me too
  alternatives:
  - also me
  - even me
  - I too
  lexicon: HALOT
  rationale: The phrase emphasizes inclusion alongside Jacob as another son seeking
    blessing. 'Me too' is natural English and preserves the emotional force.
- source_word: וַיִּשָּׂא ... קֹלוֹ
  chosen: raised his voice
  alternatives:
  - lifted up his voice
  lexicon: HALOT
  rationale: The idiom literally means 'lifted his voice.' 'Raised his voice' is a
    standard modern English equivalent here, especially in parallel with weeping,
    and avoids archaic phrasing while preserving the image of audible lament.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: The verb denotes weeping. 'Wept' is slightly more precise than 'cried'
    because the latter can suggest merely calling out loudly; here the following action
    is emotional lament.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
