id: GEN.27.20
reference: Genesis 27:20
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִצְחָק֙ אֶל בְּנ֔/וֹ מַה זֶּ֛ה מִהַ֥רְתָּ לִ/מְצֹ֖א בְּנִ֑/י וַ/יֹּ֕אמֶר כִּ֥י הִקְרָ֛ה יְהוָ֥ה אֱלֹהֶ֖י/ךָ לְ/פָנָֽ/י־־׃
translation:
  text: Then Isaac said to his son, “How is it that you found it so quickly, my son?” And he said, “Because the LORD your God brought it to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD your God gave success before me” / “made it happen for me.”
    reason: lexical_alternative
  - marker: b
    text: Or 'caused it to happen before me'.
    reason: previous_rendering
lexical_decisions:
- source_word: מַה זֶּה
  chosen: How is it that
  alternatives:
  - What is this that
  - Why is it that
  lexicon: HALOT
  rationale: The idiom introduces Isaac’s surprised question. In English, 'How is it that' best captures the sense of astonishment and inquiry without woodenly reproducing the Hebrew demonstrative.
- source_word: מִהַרְתָּ
  chosen: you found it so quickly
  alternatives:
  - you hurried to find
  - you were quick to find
  lexicon: HALOT
  rationale: The verb means 'to hasten.' In context, English expresses the result naturally as 'found it so quickly,' preserving Isaac’s surprise at the speed.
- source_word: לִמְצֹא
  chosen: found it
  alternatives:
  - to find
  - to obtain
  lexicon: HALOT
  rationale: Although the infinitive is formally 'to find,' English idiom after 'How is it that' prefers the finite result clause 'you found it.' The object is implicit from context (the game/food), so 'it' is supplied for natural English.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: The 1cs suffix is possessive and affectionate; 'my son' is the natural direct-address rendering.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - That
  lexicon: HALOT
  rationale: Introduces Jacob’s explanation. 'Because' is the clearest modern English equivalent in direct speech.
- source_word: הִקְרָה
  chosen: caused it to happen
  alternatives:
  - made it happen
  - brought it about
  - gave success
  lexicon: HALOT
  rationale: The hiphil of קרה conveys causing something to occur or befall. 'Caused it to happen' preserves the causative force without overinterpreting it as explicit 'success,' though that is contextually related.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The 2ms suffix is significant in context: Jacob says ''your God'' rather than ''my God,'' which may reflect the narrative’s tension and should be preserved.'
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  - for me
  lexicon: HALOT
  rationale: Literally 'before me.' In this idiom it can suggest providential occurrence 'before' or 'for' someone, but 'before me' best preserves the Hebrew wording while remaining intelligible.
