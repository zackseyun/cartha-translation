id: GEN.27.45
reference: Genesis 27:45
source:
  edition: WLC
  text: עַד שׁ֨וּב אַף אָחִ֜י/ךָ מִמְּ/ךָ֗ וְ/שָׁכַח֙ אֵ֣ת אֲשֶׁר עָשִׂ֣יתָ לּ֔/וֹ
    וְ/שָׁלַחְתִּ֖י וּ/לְקַחְתִּ֣י/ךָ מִ/שָּׁ֑ם לָ/מָ֥ה אֶשְׁכַּ֛ל גַּם שְׁנֵי/כֶ֖ם
    י֥וֹם אֶחָֽד־־־־׃
translation:
  text: until your brother’s anger turns away from you, and he forgets what you have
    done to him. Then I will send and bring you back from there. Why should I be bereaved
    of both of you in one day?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'until your brother’s anger turns back from you.' The
      Hebrew uses the verb 'turn/return' with 'anger' idiomatically.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'take you'; rendered 'bring you back' to reflect the context of Jacob’s
      return from exile.
    reason: lexical_alternative
  - marker: c
    text: '''Be bereaved of both of you in one day'' likely reflects Rebekah’s fear
      of losing both sons through the consequences of their conflict, not necessarily
      by identical means.'
    reason: cultural_note
lexical_decisions:
- source_word: עַד שׁוּב
  chosen: until ... turns away
  alternatives:
  - until ... returns
  - until ... turns back
  lexicon: HALOT
  rationale: The construction עַד + infinitive construct of שוב marks a temporal limit,
    'until ... turns/returns.' With אַף ('anger'), idiomatic English is 'anger turns
    away' rather than the wooden 'anger returns.'
- source_word: אַף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose' but commonly denotes anger/wrath. In this
    context of Esau's hostility, 'anger' is the most natural and readable rendering.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Straightforward kinship term with 2ms suffix; no reason to paraphrase.
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition מן after 'anger turns away' is naturally rendered 'from
    you.' English readers will understand the relational sense without adding interpretation.
- source_word: וְשָׁכַח אֵת אֲשֶׁר עָשִׂיתָ לוֹ
  chosen: and he forgets what you have done to him
  alternatives:
  - and he forgets that which you did to him
  lexicon: HALOT
  rationale: This clause is semantically transparent. 'What you have done to him'
    gives idiomatic modern English while preserving the perfect's reference to Jacob's
    prior action.
- source_word: וְשָׁלַחְתִּי
  chosen: Then I will send
  alternatives:
  - and I will send
  lexicon: HALOT
  rationale: The waw-consecutive advances the sequence. 'Then I will send' makes the
    temporal progression clear in English.
- source_word: וּלְקַחְתִּיךָ
  chosen: and bring you back
  alternatives:
  - and take you
  - and fetch you
  lexicon: HALOT
  rationale: Although לקח is basically 'take,' in context Rebekah means she will have
    Jacob brought back from where he has fled. 'Bring you back' communicates the directional
    sense implicit in the context better than the bare 'take you.'
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: Simple adverbial expression referring to the place of refuge.
- source_word: לָמָה
  chosen: Why should
  alternatives:
  - Why
  lexicon: HALOT
  rationale: In combination with the following imperfect, English idiom prefers 'Why
    should I ... ?' to express Rebekah's lament/question.
- source_word: אֶשְׁכַּל
  chosen: I be bereaved
  alternatives:
  - I lose
  - I be deprived
  lexicon: HALOT
  rationale: שכל in the Qal commonly refers to being bereaved of children. 'Be bereaved'
    preserves the maternal and familial force better than the more generic 'lose.'
- source_word: גַּם שְׁנֵיכֶם
  chosen: both of you
  alternatives:
  - you both
  lexicon: HALOT
  rationale: Natural English rendering of the emphatic combination 'also/even the
    two of you,' here meaning both sons.
- source_word: יוֹם אֶחָד
  chosen: in one day
  alternatives:
  - the same day
  - one day
  lexicon: HALOT
  rationale: The phrase most naturally means 'in one day' or 'on the same day.' 'In
    one day' is direct and idiomatic, preserving the sense of a single day of double
    bereavement.
