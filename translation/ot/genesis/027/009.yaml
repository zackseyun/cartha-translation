id: GEN.27.9
reference: Genesis 27:9
source:
  edition: WLC
  text: לֶךְ נָא֙ אֶל הַ/צֹּ֔אן וְ/קַֽח לִ֣/י מִ/שָּׁ֗ם שְׁנֵ֛י גְּדָיֵ֥י עִזִּ֖ים
    טֹבִ֑ים וְ/אֶֽעֱשֶׂ֨ה אֹתָ֧/ם מַטְעַמִּ֛ים לְ/אָבִ֖י/ךָ כַּ/אֲשֶׁ֥ר אָהֵֽב־־־׃
translation:
  text: Please go to the flock and get for me from there two good young goats, and
    I will make them into tasty food for your father, just as he loves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'savory dishes' or 'delicacies' for מַטְעַמִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶךְ נָא
  chosen: Please go
  alternatives:
  - Go now
  - Go, please
  lexicon: HALOT
  rationale: לֶךְ is a 2ms imperative, and נָא softens or politely urges the command.
    'Please go' captures both the imperative and the particle's courteous/urgent nuance
    in natural modern English.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צֹאן broadly denotes small livestock, especially sheep and goats. Since
    the next phrase specifies goats, 'the flock' is the most natural and sufficiently
    broad rendering here.
- source_word: וְקַח לִי מִשָּׁם
  chosen: and get for me from there
  alternatives:
  - and take for me from there
  - and bring me from there
  lexicon: HALOT
  rationale: לקח commonly means 'take/get.' 'Get for me from there' fits the context
    of fetching animals from the flock without over-specifying motion toward the speaker
    as 'bring' might.
- source_word: שְׁנֵי גְּדָיֵי עִזִּים
  chosen: two young goats
  alternatives:
  - two kids of the goats
  - two goat kids
  lexicon: HALOT
  rationale: The construct phrase literally means 'two kids of goats,' i.e., two young
    goats. 'Young goats' is clear modern English and preserves the age/species distinction.
- source_word: טֹבִים
  chosen: good
  alternatives:
  - choice
  - fine
  lexicon: HALOT
  rationale: טוֹב here describes the quality/suitability of the animals. 'Good' is
    the plain lexical equivalent; 'choice' is possible but slightly more interpretive.
- source_word: וְאֶעֱשֶׂה אֹתָם מַטְעַמִּים
  chosen: and I will make them into tasty food
  alternatives:
  - and I will prepare them as delicacies
  - and I will make them into savory food
  lexicon: HALOT
  rationale: מַטְעַמִּים refers to tasty dishes/delicacies, especially savory food
    prepared to someone's liking. 'Tasty food' is readable modern English and avoids
    archaic phrasing while preserving the culinary sense.
- source_word: לְאָבִיךָ
  chosen: for your father
  alternatives:
  - for your dad
  lexicon: HALOT
  rationale: '''Your father'' preserves the familial relation with appropriate register
    for biblical narrative.'
- source_word: כַּאֲשֶׁר אָהֵב
  chosen: just as he loves
  alternatives:
  - such as he loves
  - the way he likes
  lexicon: HALOT
  rationale: The phrase means 'as/just as he loves,' referring to Isaac's preference
    for this kind of food. 'Just as he loves' is close to the Hebrew and idiomatic
    in English.
