id: GEN.27.29
reference: Genesis 27:29
source:
  edition: WLC
  text: יַֽעַבְד֣וּ/ךָ עַמִּ֗ים ו/ישתחו לְ/ךָ֙ לְאֻמִּ֔ים הֱוֵ֤ה גְבִיר֙ לְ/אַחֶ֔י/ךָ
    וְ/יִשְׁתַּחֲוּ֥וּ לְ/ךָ֖ בְּנֵ֣י אִמֶּ֑/ךָ אֹרְרֶ֣י/ךָ אָר֔וּר וּֽ/מְבָרֲכֶ֖י/ךָ
    בָּרֽוּךְ׃
translation:
  text: Let peoples serve you, and nations bow down to you. Be master over your brothers,
    and let your mother's sons bow down to you. Cursed be those who curse you, and
    blessed be those who bless you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pay homage to you' for the repeated 'bow down to you.' The Hebrew verb
      can denote prostration before a superior, whether human or divine; here the
      context favors homage rather than worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'Be lord over your brothers.' 'Master' is used in the main text to avoid
      confusion with the divine title 'Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַֽעַבְד֣וּ/ךָ
  chosen: serve you
  alternatives:
  - be subject to you
  - work for you
  lexicon: HALOT
  rationale: From עבד in the Qal, with 2ms object suffix. In this blessing context
    it denotes service/subjection rendered to the addressee, not merely employment.
    'Serve you' is the most natural and sufficiently broad English equivalent.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: עמים often means peoples/ethnic groups. 'Peoples' preserves the plural
    collective distinction and pairs well with the following לְאֻמִּים as a near-synonymous
    parallel term.
- source_word: ו/ישתחו לְ/ךָ
  chosen: bow down to you
  alternatives:
  - pay homage to you
  - worship you
  lexicon: HALOT
  rationale: The verb שחה/השתחוה commonly denotes prostration or bowing. Here the
    object is a human recipient in a patriarchal blessing, so 'bow down to you' fits
    better than 'worship you,' which would overstate the sense in English.
- source_word: לְאֻמִּים
  chosen: nations
  alternatives:
  - peoples
  - clans
  lexicon: HALOT
  rationale: A poetic parallel to עמים. Rendering it 'nations' gives readable variation
    while preserving the sense of larger people-groups.
- source_word: הֱוֵה גְבִיר
  chosen: Be master
  alternatives:
  - Be lord
  - Become ruler
  lexicon: HALOT
  rationale: הוה + predicate noun gives an imperative-like blessing, 'be/become X.'
    גביר denotes one in a position of mastery or lordship. 'Master' avoids confusion
    with the divine title 'Lord' and suits the familial dominance in view.
- source_word: לְ/אַחֶ֔י/ךָ
  chosen: over your brothers
  alternatives:
  - to your brothers
  lexicon: HALOT
  rationale: Although marked with ל, the construction with גביר idiomatically expresses
    rule or mastery over someone. 'Over your brothers' communicates the relational
    hierarchy intended.
- source_word: בְּנֵי אִמֶּךָ
  chosen: your mother's sons
  alternatives:
  - the sons of your mother
  - your kin
  lexicon: HALOT
  rationale: A literal familial expression. 'Your mother's sons' preserves the Hebrew
    wording and the narrowing from 'brothers' to maternal siblings/household relations.
- source_word: אֹרְרֶי/ךָ אָר֔וּר
  chosen: Cursed be those who curse you
  alternatives:
  - May those who curse you be cursed
  lexicon: HALOT
  rationale: The participle + adjective/passive participle construction expresses
    a reciprocal curse formula. 'Cursed be those who curse you' is idiomatic and preserves
    the formal blessing style.
- source_word: וּֽ/מְבָרֲכֶ֖י/ךָ בָּרֽוּךְ
  chosen: and blessed be those who bless you
  alternatives:
  - and may those who bless you be blessed
  lexicon: HALOT
  rationale: 'Parallel blessing formula matching the previous colon. The singular
    predicate adjective functions collectively with the plural participle; idiomatic
    English uses plural agreement: ''those who bless you'' ... ''be blessed.'''
