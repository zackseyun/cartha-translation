theological_decisions:
- issue: Rendering of homage language toward a human figure
  chosen_reading: bow down to you
  alternative_readings:
  - pay homage to you
  - worship you
  rationale: The Hebrew verb can describe reverential prostration before God or humans.
    In this context of Isaac's blessing over Jacob, the referent is human political/familial
    supremacy, so 'bow down' preserves the act without implying divine worship.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
