id: GEN.27.28
reference: Genesis 27:28
source:
  edition: WLC
  text: וְ/יִֽתֶּן לְ/ךָ֙ הָ/אֱלֹהִ֔ים מִ/טַּל֙ הַ/שָּׁמַ֔יִם וּ/מִ/שְׁמַנֵּ֖י הָ/אָ֑רֶץ
    וְ/רֹ֥ב דָּגָ֖ן וְ/תִירֹֽשׁ־׃
translation:
  text: May God give you some of the dew of heaven, and some of the richness of the
    earth, and an abundance of grain and new wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dew of heaven ... the fatness of the earth.' The Hebrew uses imagery
      of agricultural fertility and abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתֶּן
  chosen: May ... give
  alternatives:
  - and may ... give
  - let ... give
  lexicon: HALOT
  rationale: 'The prefixed waw with jussive/imperfect in this blessing context is
    best rendered as a volitive wish: ''May ... give.'' This communicates Isaac''s
    benedictory speech more naturally than a simple future ''will give.'''
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the Hebrew has the article, הָאֱלֹהִים commonly functions as
    a definite title meaning 'God' rather than requiring the more awkward English
    'the God' in this context.
- source_word: מִטַּל הַשָּׁמַיִם
  chosen: some of the dew of heaven
  alternatives:
  - the dew of heaven
  - dew from heaven
  lexicon: HALOT
  rationale: The preposition מִן here is naturally partitive in a blessing formula
    paired with the following phrase, indicating bestowal from heaven's dew. 'Of heaven'
    preserves the Hebrew genitive more closely than 'from heaven,' though the latter
    is possible.
- source_word: וּמִשְׁמַנֵּי הָאָרֶץ
  chosen: and some of the richness of the earth
  alternatives:
  - and of the fatness of the earth
  - and some of the fertile places of the earth
  lexicon: HALOT
  rationale: שְׁמַנִּים/שְׁמַנֵּי literally relates to 'fatness,' but in land-blessing
    contexts it denotes richness, fertility, or abundance. 'Richness of the earth'
    communicates the idiom in clear modern English while preserving the agricultural
    sense.
- source_word: וְרֹב
  chosen: and an abundance of
  alternatives:
  - and plenty of
  - and much
  lexicon: HALOT
  rationale: רֹב denotes abundance or plenty. 'An abundance of' fits the elevated
    blessing style and governs the following paired nouns smoothly.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  - cereal
  lexicon: HALOT
  rationale: דָּגָן is a general term for grain/cereal produce. 'Grain' is the clearest
    contemporary English equivalent; 'corn' would be misleading in modern usage.
- source_word: וְתִירֹשׁ
  chosen: and new wine
  alternatives:
  - and wine
  - and fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to fresh or new wine, distinct from the broader
    term for wine. 'New wine' preserves that lexical distinction and the agricultural
    blessing context.
