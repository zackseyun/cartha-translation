theological_decisions:
- issue: Nature of the utterance
  chosen_reading: A benedictory wish ('May God give you') rather than a bare prediction.
  alternative_readings:
  - A simple future statement ('God will give you')
  rationale: The verbal form and immediate context of Isaac's blessing favor rendering
    the line as a spoken blessing/wish. This preserves the performative force of the
    patriarchal blessing without adding theological claims beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense.'
