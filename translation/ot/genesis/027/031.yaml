id: GEN.27.31
reference: Genesis 27:31
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ גַּם הוּא֙ מַטְעַמִּ֔ים וַ/יָּבֵ֖א לְ/אָבִ֑י/ו וַ/יֹּ֣אמֶר לְ/אָבִ֗י/ו
    יָקֻ֤ם אָבִ/י֙ וְ/יֹאכַל֙ מִ/צֵּ֣יד בְּנ֔/וֹ בַּ/עֲב֖וּר תְּבָרֲכַ֥/נִּי נַפְשֶֽׁ/ךָ־׃
translation:
  text: He too prepared tasty food and brought it to his father, and he said to his
    father, “Let my father rise and eat from his son's game, so that your soul may
    bless me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'savory food.' The Hebrew term refers to specially prepared, flavorful
      dishes in this episode.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your soul may bless me,' an idiom that can mean 'you may bless me,'
      but the main text preserves the Hebrew expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטְעַמִּים
  chosen: tasty food
  alternatives:
  - savory food
  - delicacies
  lexicon: HALOT
  rationale: The noun refers to specially prepared, flavorful food in this narrative
    context. 'Tasty food' is natural modern English and fits the repeated motif in
    the chapter without sounding overly formal.
- source_word: גַּם הוּא
  chosen: He too
  alternatives:
  - He also
  - He himself too
  lexicon: HALOT
  rationale: This combination marks Esau in parallel with Jacob's prior action. 'He
    too' is concise and preserves the additive emphasis.
- source_word: יָקֻם
  chosen: Let my father rise
  alternatives:
  - May my father arise
  - Let my father get up
  lexicon: HALOT
  rationale: The jussive expresses a polite request. 'Let my father rise' preserves
    the elevated but still readable tone better than the more colloquial 'get up.'
- source_word: מִצֵּיד בְּנוֹ
  chosen: from his son's game
  alternatives:
  - from the game of his son
  - from his son's شکار/hunted game
  lexicon: HALOT
  rationale: צַיִד here denotes hunted game/prey, not merely generic food. 'His son's
    game' preserves the filial phrasing and the hunting context.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: The preposition introduces purpose. 'So that' is clear, idiomatic modern
    English and accurately conveys the intended result.
- source_word: תְּבָרֲכַנִּי
  chosen: may bless me
  alternatives:
  - would bless me
  lexicon: HALOT
  rationale: The verb is Piel imperfect with first person object suffix, expressing
    desired action following the meal. 'May bless me' fits the request structure in
    English.
- source_word: נַפְשֶׁךָ
  chosen: your soul
  alternatives:
  - you
  - your very self
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your soul.' While idiomatically it can stand
    for the person, retaining 'your soul' preserves the source wording and the solemnity
    of the blessing scene without obscuring meaning.
- source_word: וַיָּבֵא לְאָבִיו
  chosen: brought it to his father
  alternatives:
  - brought it in to his father
  lexicon: HALOT
  rationale: The object is implied from context ('tasty food'). Supplying 'it' is
    required in English and reflects the direct narrative sequence.
