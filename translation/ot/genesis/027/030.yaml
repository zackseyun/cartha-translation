id: GEN.27.30
reference: Genesis 27:30
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּ/אֲשֶׁ֨ר כִּלָּ֣ה יִצְחָק֮ לְ/בָרֵ֣ךְ אֶֽת יַעֲקֹב֒ וַ/יְהִ֗י
    אַ֣ךְ יָצֹ֤א יָצָא֙ יַעֲקֹ֔ב מֵ/אֵ֥ת פְּנֵ֖י יִצְחָ֣ק אָבִ֑י/ו וְ/עֵשָׂ֣ו אָחִ֔י/ו
    בָּ֖א מִ/צֵּידֽ/וֹ־׃
translation:
  text: And it happened, as soon as Isaac had finished blessing Jacob, that just as
    Jacob had barely gone out from the presence of Isaac his father, Esau his brother
    came in from his hunting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had just gone out.' The Hebrew uses an infinitive absolute with the
      finite verb ('going out had gone out') to intensify the immediacy of Jacob's
      departure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And
    it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כַּאֲשֶׁר
  chosen: as soon as
  alternatives:
  - when
  - just as
  lexicon: HALOT
  rationale: In context it introduces the immediate temporal relation between Isaac
    finishing the blessing and the next event. 'As soon as' brings out the urgency
    implied by the sequence.
- source_word: כִּלָּה
  chosen: had finished
  alternatives:
  - finished
  - completed
  lexicon: HALOT
  rationale: The verb כלה here marks completion of the act of blessing. English pluperfect
    fits the temporal flow before the following event.
- source_word: לְבָרֵךְ
  chosen: blessing
  alternatives:
  - to bless
  lexicon: HALOT
  rationale: Infinitive with כלה yields the idiom 'finished blessing.' This is the
    most natural English equivalent while preserving the verbal idea.
- source_word: אַךְ
  chosen: barely
  alternatives:
  - only
  - surely
  - indeed
  lexicon: HALOT
  rationale: 'Here אַךְ intensifies the narrowness of the timing: Jacob had only just
    left. ''Barely'' communicates the immediacy well in modern English.'
- source_word: יָצֹא יָצָא
  chosen: had barely gone out
  alternatives:
  - had just gone out
  - had only gone out
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of יצא intensifies the action.
    Rendering with 'had barely gone out' captures both the completed departure and
    the emphatic immediacy.
- source_word: מֵאֵת פְּנֵי
  chosen: from the presence of
  alternatives:
  - from before
  - from
  lexicon: HALOT
  rationale: The phrase literally involves 'from with/before the face of.' 'From the
    presence of' is idiomatic English that preserves the personal, face-to-face setting
    better than a bare 'from.'
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained for clarity and to mirror the
    Hebrew familial emphasis.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained because the Hebrew explicitly
    marks the family relationship and narrative tension.
- source_word: בָּא
  chosen: came in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: Given Jacob has just gone out from Isaac's presence, 'came in' best reflects
    the implied movement into Isaac's space.
- source_word: מִצֵּידוֹ
  chosen: from his hunting
  alternatives:
  - from the hunt
  - from his game
  lexicon: HALOT
  rationale: The noun ציד can denote hunting or game. Here the sense is Esau returning
    from the activity of hunting; 'from his hunting' is clear and natural.
