id: GEN.27.7
reference: Genesis 27:7
source:
  edition: WLC
  text: הָבִ֨יאָ/ה לִּ֥/י צַ֛יִד וַ/עֲשֵׂה לִ֥/י מַטְעַמִּ֖ים וְ/אֹכֵ֑לָה וַ/אֲבָרֶכְ/כָ֛ה לִ/פְנֵ֥י יְהוָ֖ה לִ/פְנֵ֥י מוֹתִֽ/י־׃
translation:
  text: Bring me game and make me tasty food, so that I may eat and bless you before Yahweh before I die.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before Yahweh.'' The main text follows the project''s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'savory food.' The Hebrew refers to specially prepared, tasty dishes.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאָה
  chosen: Bring
  alternatives:
  - Bring here
  - Bring in
  lexicon: HALOT
  rationale: Hiphil imperative masculine singular of בוא used causatively in the sense of bringing something to the speaker. Simple imperative 'Bring' is natural and sufficiently precise.
- source_word: צַיִד
  chosen: game
  alternatives:
  - venison
  - wild game
  - prey
  lexicon: HALOT
  rationale: Refers to hunted animals or what is taken in hunting. 'Game' is idiomatic modern English and avoids the overly narrow 'venison' while fitting the hunting context.
- source_word: וַעֲשֵׂה
  chosen: make
  alternatives:
  - prepare
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In context of food preparation, 'make' is a clear, natural rendering; 'prepare' is possible but slightly more interpretive.
- source_word: מַטְעַמִּים
  chosen: tasty food
  alternatives:
  - savory food
  - delicacies
  lexicon: HALOT
  rationale: The noun denotes tasty or specially prepared dishes. 'Tasty food' communicates the sense in accessible modern English; 'savory food' is traditional but can sound narrower or stylistically dated.
- source_word: וְאֹכֵלָה
  chosen: so that I may eat
  alternatives:
  - and I will eat
  - that I may eat
  lexicon: HALOT
  rationale: The cohortative expresses purpose or intended result following the imperatives. 'So that I may eat' captures the volitional nuance in smooth English.
- source_word: וַאֲבָרֶכְכָה
  chosen: and bless you
  alternatives:
  - so that I may bless you
  - then I will bless you
  lexicon: HALOT
  rationale: Piel cohortative of ברך with 2ms suffix. In sequence with the prior cohortative, it expresses Isaac's intended action after eating. English coordinates naturally as 'and bless you,' while retaining the volitional sense from the clause structure.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is concise and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative rather than used in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: לִפְנֵי מוֹתִי
  chosen: before I die
  alternatives:
  - before my death
  lexicon: HALOT
  rationale: The prepositional phrase with infinitive-like nominal construction is most naturally rendered in English as 'before I die,' which is more idiomatic than the nominal 'before my death.'
