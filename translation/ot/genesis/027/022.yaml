id: GEN.27.22
reference: Genesis 27:22
source:
  edition: WLC
  text: וַ/יִּגַּ֧שׁ יַעֲקֹ֛ב אֶל יִצְחָ֥ק אָבִ֖י/ו וַ/יְמֻשֵּׁ֑/הוּ וַ/יֹּ֗אמֶר הַ/קֹּל֙
    ק֣וֹל יַעֲקֹ֔ב וְ/הַ/יָּדַ֖יִם יְדֵ֥י עֵשָֽׂו־׃
translation:
  text: So Jacob went near to Isaac his father, and he felt him and said, “The voice
    is Jacob’s voice, but the hands are Esau’s hands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The voice is the voice of Jacob, but the hands are the hands of Esau.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: went near
  alternatives:
  - came near
  - approached
  lexicon: HALOT
  rationale: נגשׁ in the qal commonly denotes drawing near or approaching. 'Went near'
    preserves the narrative motion and the sequential wayyiqtol form in natural English.
- source_word: וַיְמֻשֵּׁהוּ
  chosen: he felt him
  alternatives:
  - touched him
  - groped him
  lexicon: HALOT
  rationale: מושׁ here refers to tactile examination by Isaac to verify identity.
    'Felt him' best captures deliberate touching for recognition in readable modern
    English; 'touched him' is possible but less specific.
- source_word: הַקֹּל
  chosen: The voice
  alternatives:
  - The sound
  lexicon: HALOT
  rationale: קול can mean 'voice' or 'sound.' In this context Isaac is distinguishing
    the speaker's vocal identity from the tactile evidence, so 'voice' is the most
    precise rendering.
- source_word: קוֹל יַעֲקֹב
  chosen: Jacob’s voice
  alternatives:
  - the voice of Jacob
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered possessively in English. 'Jacob’s
    voice' is idiomatic while preserving the sense of personal identification.
- source_word: וְהַיָּדַיִם יְדֵי עֵשָׂו
  chosen: but the hands are Esau’s hands
  alternatives:
  - and the hands are the hands of Esau
  - yet the hands are Esau’s hands
  lexicon: HALOT
  rationale: The Hebrew uses a verbless clause with repetition for emphasis. Rendering
    it as 'the hands are Esau’s hands' preserves the contrast and rhetorical force.
    'But' is supplied in English to make explicit the adversative sense between the
    two clauses, though Hebrew has simple waw.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly because the Hebrew
    includes it and it situates the encounter relationally.
