id: GEN.27.44
reference: Genesis 27:44
source:
  edition: WLC
  text: וְ/יָשַׁבְתָּ֥ עִמּ֖/וֹ יָמִ֣ים אֲחָדִ֑ים עַ֥ד אֲשֶׁר תָּשׁ֖וּב חֲמַ֥ת אָחִֽי/ךָ־׃
translation:
  text: And stay with him for a few days, until your brother's fury turns away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until your brother's anger subsides.' The Hebrew verb is literally 'turns
      back/returns,' used idiomatically here of fury abating.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁבְתָּ
  chosen: And stay
  alternatives:
  - and dwell
  - and remain
  - and live
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, remain, stay.' In this context
    Rebekah is instructing Jacob to reside temporarily with Laban, so 'stay' best
    captures the practical sense in natural English without over-literal awkwardness.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: The preposition עם with 3ms suffix straightforwardly means 'with him,'
    referring to Laban in the immediate context.
- source_word: יָמִים אֲחָדִים
  chosen: for a few days
  alternatives:
  - some days
  - a number of days
  - days, a few
  lexicon: HALOT
  rationale: The idiom literally reads 'days, a few.' In idiomatic English, 'for a
    few days' communicates the intended temporary duration. Although the narrative
    outcome is longer than expected, the speaker's wording here is modest and should
    be preserved.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until the time that
  - up to when
  lexicon: HALOT
  rationale: The combination functions as a standard temporal marker introducing the
    endpoint of the action.
- source_word: תָּשׁוּב
  chosen: turns away
  alternatives:
  - subsides
  - returns
  - turns back
  lexicon: HALOT
  rationale: שׁוב literally means 'return/turn back.' With an abstract subject such
    as wrath or fury, English commonly expresses the sense as 'turn away' or 'subside.'
    'Turns away' preserves the underlying imagery while remaining readable.
- source_word: חֲמַת
  chosen: fury
  alternatives:
  - wrath
  - anger
  - rage
  - heat
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denotes burning anger, wrath, or fury. 'Fury' conveys the
    intensity of Esau's emotional state better than the milder 'anger,' while avoiding
    overly formal diction.
- source_word: אָחִיךָ
  chosen: your brother's
  lexicon: HALOT
  rationale: 'The construct chain requires possession: ''the fury of your brother.''
    English expresses this naturally as ''your brother''s fury.'''
