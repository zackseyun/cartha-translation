id: GEN.27.36
reference: Genesis 27:36
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר הֲ/כִי֩ קָרָ֨א שְׁמ֜/וֹ יַעֲקֹ֗ב וַֽ/יַּעְקְבֵ֨/נִי֙ זֶ֣ה פַעֲמַ֔יִם
    אֶת בְּכֹרָתִ֣/י לָקָ֔ח וְ/הִנֵּ֥ה עַתָּ֖ה לָקַ֣ח בִּרְכָתִ֑/י וַ/יֹּאמַ֕ר הֲ/לֹא
    אָצַ֥לְתָּ לִּ֖/י בְּרָכָֽה־־׃
translation:
  text: 'And he said, “Is he rightly named Jacob? For he has supplanted me these two
    times: he took my birthright, and look, now he has taken my blessing.” Then he
    said, “Have you not reserved a blessing for me?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew uses a wordplay between the name 'Jacob' and the verb rendered
      'has supplanted me.' The verb can also be rendered 'has deceived me' or 'has
      overreached me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִי
  chosen: Is he rightly
  alternatives:
  - Is it because
  - Has he indeed
  lexicon: HALOT
  rationale: In this rhetorical question, the interrogative plus כי introduces Esau’s
    bitter wordplay and is best rendered idiomatically as 'Is he rightly...?' rather
    than a more wooden 'Is it because...?'.
- source_word: קָרָא שְׁמוֹ יַעֲקֹב
  chosen: named Jacob
  alternatives:
  - called Jacob
  lexicon: HALOT
  rationale: Standard naming expression. 'Named Jacob' is natural English and preserves
    the explicit connection to the personal name that sets up the pun.
- source_word: וַיַּעְקְבֵנִי
  chosen: he has supplanted me
  alternatives:
  - he has deceived me
  - he has overreached me
  - he has tripped me up
  lexicon: HALOT
  rationale: The verb from עקב is a deliberate paronomasia with יעקב. 'Supplanted'
    preserves both the idea of taking another’s place/advantage and the traditional
    association with Jacob’s name better than the flatter 'deceived.'
- source_word: זֶה פַעֲמַיִם
  chosen: these two times
  alternatives:
  - twice
  - this is the second time
  lexicon: HALOT
  rationale: The Hebrew idiom literally points to 'this/two times.' 'These two times'
    keeps the emphatic force while remaining readable.
- source_word: בְּכֹרָתִי
  chosen: my birthright
  alternatives:
  - my rights as firstborn
  lexicon: HALOT
  rationale: Established and accurate rendering for the legal/familial privilege of
    the firstborn.
- source_word: לָקָח
  chosen: he took / he has taken
  alternatives:
  - he seized
  lexicon: HALOT
  rationale: Simple verb 'take.' English perfect in context ('has taken') fits Esau’s
    present complaint about completed actions with ongoing effect.
- source_word: וְהִנֵּה עַתָּה
  chosen: and look, now
  alternatives:
  - and behold, now
  - and now, look
  lexicon: HALOT
  rationale: '''Look'' conveys הִנֵּה in contemporary readable English without losing
    the emotional force of Esau’s exclamation.'
- source_word: בִּרְכָתִי
  chosen: my blessing
  lexicon: HALOT
  rationale: Direct object of Isaac’s patriarchal blessing; 'blessing' is the straightforward
    and contextually loaded rendering.
- source_word: הֲלֹא אָצַלְתָּ לִּי בְּרָכָה
  chosen: Have you not reserved a blessing for me?
  alternatives:
  - Have you not kept back a blessing for me?
  - Have you not set aside a blessing for me?
  lexicon: HALOT
  rationale: אָצַל in this context conveys holding back or reserving something. 'Reserved'
    is idiomatic and fits Esau’s plea that Isaac might still have some blessing left
    for him.
