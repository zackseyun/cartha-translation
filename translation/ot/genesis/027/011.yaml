id: GEN.27.11
reference: Genesis 27:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יַעֲקֹ֔ב אֶל רִבְקָ֖ה אִמּ֑/וֹ הֵ֣ן עֵשָׂ֤ו אָחִ/י֙ אִ֣ישׁ שָׂעִ֔ר
    וְ/אָנֹכִ֖י אִ֥ישׁ חָלָֽק־׃
translation:
  text: But Jacob said to Rebekah his mother, “Look, Esau my brother is a hairy man,
    and I am a smooth man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold” or “See” for the particle introducing Jacob’s objection.
    reason: lexical_alternative
  - marker: b
    text: “Smooth” here refers to Jacob’s lack of bodily hair, in contrast to Esau
      being hairy.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Jacob said
  alternatives:
  - And Jacob said
  - Then Jacob said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the immediate
    context of Jacob's objection to Rebekah's plan better than a bare 'and,' while
    still reflecting the Hebrew conjunction without over-paraphrase.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is natural modern English.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: Appositional to Rebekah, identifying her relationship to Jacob. Keeping
    both name and relation matches the Hebrew.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: An attention-getting particle introducing Jacob's concern. 'Look' is
    readable modern English and preserves the discourse force better than the more
    archaic 'behold.'
- source_word: אִישׁ שָׂעִר
  chosen: a hairy man
  alternatives:
  - a hairy person
  - hairy
  lexicon: HALOT
  rationale: The Hebrew literally says 'a man hairy.' 'A hairy man' is the most natural
    English equivalent and preserves the masculine wording of the source.
- source_word: וְאָנֹכִי
  chosen: and I am
  alternatives:
  - while I am
  - but I am
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis and contrast with Esau. 'And I
    am' preserves the simple conjunction while allowing the contrast to be felt in
    context.
- source_word: אִישׁ חָלָק
  chosen: a smooth man
  alternatives:
  - smooth-skinned
  - hairless
  lexicon: HALOT
  rationale: The phrase contrasts directly with 'a hairy man.' 'Smooth man' is slightly
    literal but clear in context, referring to lack of bodily hair rather than personality
    or speech. More explicit alternatives interpret beyond the immediate wording.
