id: GEN.27.34
reference: Genesis 27:34
source:
  edition: WLC
  text: כִּ/שְׁמֹ֤עַ עֵשָׂו֙ אֶת דִּבְרֵ֣י אָבִ֔י/ו וַ/יִּצְעַ֣ק צְעָקָ֔ה גְּדֹלָ֥ה
    וּ/מָרָ֖ה עַד מְאֹ֑ד וַ/יֹּ֣אמֶר לְ/אָבִ֔י/ו בָּרֲכֵ֥/נִי גַם אָ֖נִי אָבִֽ/י־־־׃
translation:
  text: When Esau heard his father’s words, he cried out with an exceedingly great
    and bitter cry, and said to his father, “Bless me too, my father!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he cried out a great and bitter cry, exceedingly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/שְׁמֹעַ
  chosen: When ... heard
  alternatives:
  - As soon as ... heard
  - On hearing
  lexicon: HALOT
  rationale: The infinitive construct with כִּי introduces the temporal circumstance.
    'When' is natural modern English and preserves the sequence without overinterpreting
    immediacy.
- source_word: דִּבְרֵי אָבִיו
  chosen: his father’s words
  alternatives:
  - the words of his father
  - what his father said
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word(s), matter.' 'His father’s words' is a clear,
    moderately formal rendering that preserves the lexical sense better than the more
    interpretive 'what his father said.'
- source_word: וַיִּצְעַק צְעָקָה
  chosen: he cried out with a ... cry
  alternatives:
  - he let out a ... cry
  - he cried a ... cry
  lexicon: HALOT
  rationale: The verb-noun cognate construction intensifies the action. Rendering
    both elements in English ('cried out with a ... cry') preserves the Hebrew emphasis
    better than collapsing it to a single verb.
- source_word: גְּדֹלָה
  chosen: great
  alternatives:
  - loud
  - mighty
  lexicon: HALOT
  rationale: The adjective literally means 'great.' While 'loud' captures one implication,
    'great' better preserves the broader intensity of the Hebrew expression.
- source_word: וּמָרָה
  chosen: bitter
  alternatives:
  - grievous
  - distressed
  lexicon: HALOT
  rationale: מָר conveys bitterness, often emotional anguish. 'Bitter' is the most
    direct lexical equivalent and preserves the emotional force without paraphrase.
- source_word: עַד מְאֹד
  chosen: exceedingly
  alternatives:
  - very much
  - to an extreme degree
  lexicon: HALOT
  rationale: This idiom intensifies the preceding description. 'Exceedingly' is concise,
    idiomatic, and suitably weighty in English.
- source_word: בָּרֲכֵנִי
  chosen: Bless me
  alternatives:
  - Give me your blessing
  - Pronounce a blessing on me
  lexicon: HALOT
  rationale: The imperative with 1cs suffix is direct and urgent. 'Bless me' preserves
    the compact force of the Hebrew better than expanded paraphrases.
- source_word: גַם אָ֖נִי
  chosen: me too
  alternatives:
  - I too
  - even me
  lexicon: HALOT
  rationale: The phrase emphasizes Esau's plea that he also receive blessing. 'Me
    too' is natural in direct speech and conveys the emotional immediacy; 'I too'
    is possible but less idiomatic after 'Bless me.'
- source_word: אָבִי
  chosen: my father
  alternatives:
  - father
  lexicon: HALOT
  rationale: The possessive suffix is explicit in Hebrew. 'My father' preserves both
    the form and the pathos of Esau's address.
