id: GEN.27.14
reference: Genesis 27:14
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ֙ וַ/יִּקַּ֔ח וַ/יָּבֵ֖א לְ/אִמּ֑/וֹ וַ/תַּ֤עַשׂ אִמּ/וֹ֙ מַטְעַמִּ֔ים
    כַּ/אֲשֶׁ֖ר אָהֵ֥ב אָבִֽי/ו׃
translation:
  text: So he went and took them and brought them to his mother, and his mother prepared
    tasty food, just as his father loved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'savory foods' or 'delicacies'; rendered 'tasty food' for clear modern
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - And he went
  - Then he went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving sequence.
- source_word: וַיִּקַּח
  chosen: and took them
  alternatives:
  - and took
  lexicon: HALOT
  rationale: The verb itself is simply 'took,' but English idiom benefits from supplying
    the object as 'them' from the immediate context (the young goats in the previous
    verse). This is a minimal contextual completion, not paraphrase.
- source_word: וַיָּבֵא לְאִמּוֹ
  chosen: and brought them to his mother
  alternatives:
  - and brought to his mother
  lexicon: HALOT
  rationale: As with 'took,' the object is implicit from context and naturally supplied
    in English. 'Brought ... to' is the plain sense of בוא with ל.
- source_word: וַתַּעַשׂ אִמּוֹ
  chosen: and his mother prepared
  alternatives:
  - and his mother made
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but with food as object, 'prepared' is the
    most natural and precise English rendering.
- source_word: מַטְעַמִּים
  chosen: tasty food
  alternatives:
  - savory food
  - delicacies
  lexicon: HALOT
  rationale: The noun refers to specially prepared, flavorful food. 'Tasty food' is
    clear modern English; 'savory food' is possible and traditional, but can sound
    narrower or stylistically marked in contemporary usage.
- source_word: כַּאֲשֶׁר אָהֵב אָבִיו
  chosen: just as his father loved
  alternatives:
  - such as his father loved
  - as his father liked
  lexicon: HALOT
  rationale: This clause compares the food with Isaac's known preference. 'Loved'
    reflects the Hebrew verb אהב directly; 'just as' preserves the comparative force
    of כַאֲשֶׁר.
