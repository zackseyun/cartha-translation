id: GEN.27.19
reference: Genesis 27:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יַעֲקֹ֜ב אֶל אָבִ֗י/ו אָנֹכִי֙ עֵשָׂ֣ו בְּכֹרֶ֔/ךָ עָשִׂ֕יתִי כַּ/אֲשֶׁ֥ר דִּבַּ֖רְתָּ אֵלָ֑/י קֽוּם נָ֣א שְׁבָ֗/ה וְ/אָכְלָ/ה֙ מִ/צֵּידִ֔/י בַּ/עֲב֖וּר תְּבָרֲכַ֥/נִּי נַפְשֶֽׁ/ךָ־־׃
translation:
  text: And Jacob said to his father, “I am Esau your firstborn. I have done as you told me. Please get up, sit down, and eat from my game, so that you may bless me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'that your soul may bless me'; Hebrew נֶפֶשׁ ('soul/self') here functions idiomatically for the person.
    reason: lexical_alternative
  - marker: b
    text: Or 'sit'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural English narrative rendering that preserves the sequence without overinterpreting discourse force.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - to his father
  lexicon: HALOT
  rationale: With אֶל, the phrase is best rendered 'to his father'; in the full clause this is incorporated as 'Jacob said to his father.' The kinship term is literal and contextually important.
- source_word: אָנֹכִי עֵשָׂו בְּכֹרֶךָ
  chosen: I am Esau your firstborn
  alternatives:
  - I am Esau, your firstborn
  - I am your firstborn Esau
  lexicon: HALOT
  rationale: The verbless clause identifies the speaker as Esau and appositionally as Isaac's firstborn. 'I am Esau your firstborn' is direct and preserves Jacob's deceptive claim without smoothing it away.
- source_word: עָשִׂיתִי כַּאֲשֶׁר דִּבַּרְתָּ אֵלַי
  chosen: I have done as you told me
  alternatives:
  - I did as you spoke to me
  - I have done just as you said to me
  lexicon: HALOT
  rationale: Idiomatic English prefers 'told me' over the more wooden 'spoke to me' here, while retaining the sense of obedience to Isaac's prior instruction.
- source_word: קוּם נָא
  chosen: Please get up
  alternatives:
  - Rise, please
  - Please arise
  lexicon: HALOT
  rationale: קוּם is an imperative 'arise/get up'; נָא adds politeness/entreaty. 'Please get up' captures both meaning and tone in contemporary English.
- source_word: שְׁבָה
  chosen: sit
  alternatives:
  - sit down
  lexicon: HALOT
  rationale: The imperative means 'sit' or 'sit down.' 'Sit' is concise and works naturally in the sequence of commands.
- source_word: וְאָכְלָה מִצֵּידִי
  chosen: and eat from my game
  alternatives:
  - and eat of my game
  - and eat from my شکار/hunting
  lexicon: HALOT
  rationale: צַיִד refers to game/hunted food. 'Game' is the clearest natural English equivalent in this context. 'From my game' reflects the preposition מִן without awkwardness.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: The term introduces purpose. 'So that' is idiomatic modern English and preserves the intended result clause.
- source_word: תְּבָרֲכַנִּי נַפְשֶׁךָ
  chosen: you may bless me
  alternatives:
  - your soul may bless me
  - you yourself may bless me
  lexicon: HALOT
  rationale: נֶפֶשׁ in this idiom functions as an emphatic expression for the person/self rather than requiring a literal 'soul' in English. 'You may bless me' communicates the sense naturally; the emphatic nuance can be noted in a footnote.
