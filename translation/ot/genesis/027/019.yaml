theological_decisions:
- issue: Rendering of נַפְשֶׁךָ in the idiom תְּבָרֲכַנִּי נַפְשֶׁךָ
  chosen_reading: Render idiomatically as 'you may bless me' rather than literally 'your soul may bless me.'
  alternative_readings:
  - that your soul may bless me
  - that you yourself may bless me
  rationale: This is not a doctrinally loaded use of 'soul' but a Hebrew idiom for the person/self. A literal rendering in English could misleadingly suggest an anthropological claim the text is not making. The idiomatic translation preserves meaning while a footnote records the more literal form.
  doctrine_reference: Translation philosophy §§1, 3, 6
revisions:
- timestamp: '2026-04-21T00:25:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/027/019.json
  category: awkward_english
  tier: 1
  from: sit
  to: sit down
  rationale: While 'sit' is a direct translation of the Hebrew imperative שְׁבָה, the sequence 'get up, sit' is slightly abrupt in English. Using the more common phrasal verb 'sit down' creates a more natural and idiomatic flow in the series of commands ('get up, sit down, and eat') without changing the essential meaning.
