id: GEN.27.32
reference: Genesis 27:32
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר ל֛/וֹ יִצְחָ֥ק אָבִ֖י/ו מִי אָ֑תָּה וַ/יֹּ֕אמֶר אֲנִ֛י בִּנְ/ךָ֥
    בְכֹֽרְ/ךָ֖ עֵשָֽׂו־׃
translation:
  text: His father Isaac said to him, “Who are you?” And he said, “I am your son,
    your firstborn, Esau.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Isaac his father,'' rendered idiomatically as ''His father Isaac.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'your eldest son'; Hebrew 'your firstborn' preserves the birth-order
      emphasis that is important in the surrounding narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: The verb אמר is the standard verb for speaking, best rendered 'said'
    here. Although the content is interrogative, English can naturally carry the question
    with 'said' plus quotation marks, preserving the Hebrew wording without over-interpreting.
- source_word: לּוֹ
  chosen: to him
  lexicon: HALOT
  rationale: The preposition ל with 3ms suffix marks the indirect object of speech,
    straightforwardly 'to him.'
- source_word: יִצְחָק אָבִיו
  chosen: His father Isaac
  alternatives:
  - Isaac his father
  lexicon: HALOT
  rationale: The construct phrase literally reads 'Isaac his father.' 'His father
    Isaac' is idiomatic modern English while preserving the filial relationship and
    identifying the speaker.
- source_word: מִי אַתָּה
  chosen: Who are you?
  alternatives:
  - Who is it that you are?
  lexicon: HALOT
  rationale: This is the plain direct question formed by the interrogative מִי and
    pronoun אַתָּה. 'Who are you?' is the natural and accurate English equivalent.
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'Hebrew often omits the copula in nominal clauses. English requires ''am''
    for natural expression: ''I am.'''
- source_word: בִּנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: בן with 2ms suffix is directly 'your son.'
- source_word: בְכֹרְךָ
  chosen: your firstborn
  alternatives:
  - your eldest son
  lexicon: HALOT
  rationale: בכור denotes the firstborn son, often with inheritance significance.
    'Your firstborn' is the most direct and lexically precise rendering; 'eldest son'
    is possible but slightly flattens the birthright nuance.
- source_word: עֵשָׂו
  chosen: Esau
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
