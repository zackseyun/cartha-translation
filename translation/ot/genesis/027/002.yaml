id: GEN.27.2
reference: Genesis 27:2
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר הִנֵּה נָ֖א זָקַ֑נְתִּי לֹ֥א יָדַ֖עְתִּי י֥וֹם מוֹתִֽ/י־׃
translation:
  text: And he said, “Look now, I have grown old; I do not know the day of my death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “See now” or “Behold now.”
    reason: lexical_alternative
  - marker: b
    text: Or, “I am old.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “the day of my death”; that is, the day when I will die.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech. 'And he
    said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English
    and preserves the force better than archaic 'Behold.'
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: 'Here נָא softens or adds immediacy to the statement rather than functioning
    as a request. ''Now'' fits the discourse naturally in English: ''Look now.'''
- source_word: זָקַנְתִּי
  chosen: I have grown old
  alternatives:
  - I am old
  - I have become old
  lexicon: HALOT
  rationale: Perfect of זקן expresses attained state. 'I have grown old' captures
    the process-result nuance more fully than the flatter 'I am old.'
- source_word: לֹא יָדַעְתִּי
  chosen: I do not know
  alternatives:
  - I have not known
  lexicon: HALOT
  rationale: 'Hebrew perfect here expresses present state from prior experience; idiomatic
    English uses present tense: ''I do not know.'''
- source_word: יוֹם מוֹתִי
  chosen: the day of my death
  alternatives:
  - the day I will die
  - my dying day
  lexicon: HALOT
  rationale: Construct phrase literally 'day of my death.' This is natural enough
    in English and preserves the nominal expression without unnecessary paraphrase.
