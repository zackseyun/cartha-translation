id: GEN.27.21
reference: Genesis 27:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִצְחָק֙ אֶֽל יַעֲקֹ֔ב גְּשָׁ/ה נָּ֥א וַ/אֲמֻֽשְׁ/ךָ֖ בְּנִ֑/י
    הַֽ/אַתָּ֥ה זֶ֛ה בְּנִ֥/י עֵשָׂ֖ו אִם לֹֽא־־־׃
translation:
  text: Then Isaac said to Jacob, “Please come near, so that I may feel you, my son,
    whether you are really my son Esau or not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Please come near, and let me feel you, my son, whether you are indeed
      my son Esau or not.”
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּשָׁה נָּא
  chosen: Please come near
  alternatives:
  - Come near, please
  - Come closer, please
  lexicon: HALOT
  rationale: גְּשָׁה is an imperative meaning 'approach/come near'; נָא adds politeness
    or entreaty, best reflected by 'please.' 'Come near' is natural and sufficiently
    formal.
- source_word: וַאֲמֻשְׁךָ
  chosen: so that I may feel you
  alternatives:
  - and let me feel you
  - that I may touch/examine you
  lexicon: HALOT
  rationale: From מושׁ, 'to feel, grope, touch.' In context Isaac is testing identity
    by tactile examination. 'Feel you' is the most idiomatic concise rendering; 'so
    that' captures the purposive nuance following the imperative in English.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: Direct address with 1cs suffix; repeated vocative should be preserved
    for the relational tone of the scene.
- source_word: הַאַתָּה זֶה
  chosen: whether you are really
  alternatives:
  - whether you are indeed
  - are you really this one
  lexicon: HALOT
  rationale: The interrogative-plus-pronoun construction introduces the content of
    Isaac's test. English idiom requires smoothing; 'whether you are really' conveys
    the probing uncertainty without wooden literalism.
- source_word: בְּנִי עֵשָׂו
  chosen: my son Esau
  alternatives:
  - Esau my son
  lexicon: HALOT
  rationale: Construct-like apposition with possessive suffix is naturally rendered
    'my son Esau.' This preserves both the filial address and the specific identity
    under question.
- source_word: אִם לֹא
  chosen: or not
  alternatives:
  - or not indeed
  lexicon: HALOT
  rationale: 'Here אִם לֹא completes the indirect question: ''whether ... or not.''
    This is standard English for the Hebrew alternative construction.'
- source_word: וַיֹּאמֶר
  chosen: Then Isaac said
  alternatives:
  - And Isaac said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
