id: GEN.27.18
reference: Genesis 27:18
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אֶל אָבִ֖י/ו וַ/יֹּ֣אמֶר אָבִ֑/י וַ/יֹּ֣אמֶר הִנֶּ֔נִּ/י מִ֥י אַתָּ֖ה
    בְּנִֽ/י־׃
translation:
  text: So he went in to his father and said, “My father.” And he said, “Here I am.
    Who are you, my son?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “And he came to his father.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: So he went in
  alternatives:
  - And he came
  - And he went
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol advances the narrative. In this context
    Jacob is entering Isaac's presence, so 'went in' captures the motion into the
    father's space more naturally than the more generic 'came.' 'So' reflects the
    narrative progression idiomatically in English.
- source_word: אֶל אָבִיו
  chosen: to his father
  alternatives:
  - to his father Isaac
  lexicon: HALOT
  rationale: 'The preposition אֶל with the pronominally suffixed noun is straightforwardly
    directional: ''to his father.'' The name is not supplied in the Hebrew and should
    not be added in the main text.'
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative speech introduction. English can omit the repeated
    subject where clear, producing more natural style without loss of meaning.
- source_word: אָבִי
  chosen: My father
  alternatives:
  - Father
  lexicon: HALOT
  rationale: The noun with 1cs suffix is a direct address, literally 'my father.'
    Retaining the possessive reflects the Hebrew form and the filial address.
- source_word: הִנֶּנִּי
  chosen: Here I am
  alternatives:
  - Yes?
  - I am here
  lexicon: HALOT
  rationale: This common Hebrew response formula is best rendered 'Here I am,' preserving
    its recognizable idiomatic force and readiness/presence nuance.
- source_word: מִי אַתָּה
  chosen: Who are you
  alternatives:
  - Who is this
  lexicon: HALOT
  rationale: 'The interrogative plus 2ms pronoun directly asks the identity of the
    addressee: ''Who are you?'' This is more literal than smoothing to ''Who is this.'''
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The noun with 1cs suffix is vocative, 'my son.' Keeping the possessive
    preserves the Hebrew's personal address.
