id: GEN.27.42
reference: Genesis 27:42
source:
  edition: WLC
  text: וַ/יֻּגַּ֣ד לְ/רִבְקָ֔ה אֶת דִּבְרֵ֥י עֵשָׂ֖ו בְּנָ֣/הּ הַ/גָּדֹ֑ל וַ/תִּשְׁלַ֞ח
    וַ/תִּקְרָ֤א לְ/יַעֲקֹב֙ בְּנָ֣/הּ הַ/קָּטָ֔ן וַ/תֹּ֣אמֶר אֵלָ֔י/ו הִנֵּה֙ עֵשָׂ֣ו
    אָחִ֔י/ךָ מִתְנַחֵ֥ם לְ/ךָ֖ לְ/הָרְגֶֽ/ךָ־׃
translation:
  text: And the words of Esau, her older son, were told to Rebekah. So she sent and
    called Jacob, her younger son, and said to him, “Look, Esau your brother is consoling
    himself about you by planning to kill you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is comforting himself concerning you—to kill you,' preserving the more
      literal force of the Hebrew expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: were told
  alternatives:
  - was reported
  - was made known
  lexicon: HALOT
  rationale: Passive/Hophal form of נגד indicates that the information was conveyed
    to Rebekah without specifying the agent. 'Were told' is natural English and preserves
    the passive sense.
- source_word: דִּבְרֵי עֵשָׂו
  chosen: the words of Esau
  alternatives:
  - what Esau said
  - Esau's words
  lexicon: HALOT
  rationale: דברי literally means 'words/matters of.' Here it refers to Esau's spoken
    intent from the previous context. 'The words of Esau' keeps the lexical connection
    while remaining readable.
- source_word: בְּנָהּ הַגָּדֹל
  chosen: her older son
  alternatives:
  - her elder son
  - her great/older son
  lexicon: HALOT
  rationale: גדול in this familial contrast with הקטן refers to age/status as the
    older son, not physical size. 'Older son' is idiomatic modern English.
- source_word: וַתִּשְׁלַח וַתִּקְרָא
  chosen: she sent and called
  alternatives:
  - she sent for and called
  - she sent word and summoned
  lexicon: HALOT
  rationale: The two verbs are retained distinctly rather than collapsed. The sequence
    suggests she dispatched someone and then had Jacob called. 'Sent and called' preserves
    the Hebrew coordination.
- source_word: בְּנָהּ הַקָּטָן
  chosen: her younger son
  alternatives:
  - her younger child
  - her lesser/younger son
  lexicon: HALOT
  rationale: קטן here is the counterpart to גדול and denotes the younger son, not
    insignificance. 'Younger son' best fits the familial contrast.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הנה is a discourse marker drawing attention. 'Look' is readable modern
    English and preserves the immediacy without archaic tone.
- source_word: מִתְנַחֵם
  chosen: is consoling himself
  alternatives:
  - is comforting himself
  - is avenging himself
  - is finding comfort
  lexicon: HALOT
  rationale: The Hitpael of נחם commonly means 'to comfort oneself' or 'to be consoled.'
    In this context Esau takes comfort in the prospect of vengeance. The translation
    keeps the core lexical sense rather than replacing it with an interpretive paraphrase
    like 'is planning revenge.'
- source_word: לְךָ
  chosen: about you
  alternatives:
  - concerning you
  - because of you
  lexicon: HALOT
  rationale: The preposition marks the object/sphere of Esau's self-consolation. 'About
    you' is idiomatic and fits the context of hostile intent directed toward Jacob.
- source_word: לְהָרְגֶךָ
  chosen: by planning to kill you
  alternatives:
  - to kill you
  - with the intent to kill you
  lexicon: HALOT
  rationale: The infinitive with ל expresses the content or means of the self-consolation.
    In English, 'consoling himself ... by planning to kill you' makes explicit the
    relation between the clauses while preserving the Hebrew sense.
