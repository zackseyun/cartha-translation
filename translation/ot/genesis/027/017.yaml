id: GEN.27.17
reference: Genesis 27:17
source:
  edition: WLC
  text: וַ/תִּתֵּ֧ן אֶת הַ/מַּטְעַמִּ֛ים וְ/אֶת הַ/לֶּ֖חֶם אֲשֶׁ֣ר עָשָׂ֑תָה בְּ/יַ֖ד
    יַעֲקֹ֥ב בְּנָֽ/הּ־־׃
translation:
  text: Then she put the tasty food and the bread that she had made into the hand
    of Jacob her son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of Jacob her son,'' an idiom meaning she handed
      it to him directly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: Then she put
  alternatives:
  - Then she gave
  - And she placed
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and נתן with בְּיַד idiomatically
    means to place/give into someone's hand. 'Then she put' reads naturally in English
    while preserving the concrete action.
- source_word: הַמַּטְעַמִּים
  chosen: the tasty food
  alternatives:
  - the delicacies
  - the savory food
  - the dainties
  lexicon: HALOT
  rationale: The noun refers to specially prepared tasty dishes in this immediate
    context. 'Tasty food' is natural modern English and avoids the slightly archaic
    'savory meat' while not over-specifying beyond the Hebrew.
- source_word: הַלֶּחֶם
  chosen: the bread
  lexicon: HALOT
  rationale: Straightforward rendering of לֶחֶם as 'bread.'
- source_word: אֲשֶׁר עָשָׂתָה
  chosen: that she had made
  alternatives:
  - which she had prepared
  - that she made
  lexicon: HALOT
  rationale: English past perfect fits the sequence naturally, indicating prior preparation
    before handing it over. 'Made' is a direct rendering of עשה.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the hands of
  - to
  - in the hand of
  lexicon: HALOT
  rationale: This preserves the Hebrew idiom concretely and matches the singular יַד.
    'To Jacob' would be smoother but would omit the vivid bodily expression present
    in the source.
- source_word: יַעֲקֹב בְּנָהּ
  chosen: Jacob her son
  alternatives:
  - her son Jacob
  lexicon: HALOT
  rationale: Both orders are possible in English. 'Jacob her son' stays closer to
    the Hebrew sequence while remaining clear.
