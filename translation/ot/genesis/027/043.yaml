id: GEN.27.43
reference: Genesis 27:43
source:
  edition: WLC
  text: וְ/עַתָּ֥ה בְנִ֖/י שְׁמַ֣ע בְּ/קֹלִ֑/י וְ/ק֧וּם בְּרַח לְ/ךָ֛ אֶל לָבָ֥ן אָחִ֖/י
    חָרָֽנָ/ה־־׃
translation:
  text: Now, my son, listen to my voice, and get up—flee to my brother Laban at Haran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And now, my son, listen to me; arise, flee for yourself to my brother
      Laban in Haran.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing immediate instruction. 'Now' is natural
    modern English; the prefixed conjunction is not always best represented with a
    separate 'and' in English.
- source_word: בְנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Direct maternal address to Jacob; 'my son' preserves the familial and
    gender-specific force of the Hebrew.
- source_word: שְׁמַע בְּקֹלִי
  chosen: listen to my voice
  alternatives:
  - obey me
  - listen to me
  lexicon: HALOT
  rationale: Literally 'hear/listen to my voice.' This idiom can imply obedience,
    but here the wording itself is retained in readable English rather than making
    the implication explicit as 'obey me.'
- source_word: וְקוּם
  chosen: get up
  alternatives:
  - arise
  - rise
  lexicon: HALOT
  rationale: Imperative of קום. 'Get up' is idiomatic modern English and fits the
    urgent sequence of commands.
- source_word: בְּרַח לְךָ
  chosen: flee
  alternatives:
  - run away
  - escape for yourself
  lexicon: HALOT
  rationale: ברח means 'flee.' The לְךָ is an ethical/directional dative that need
    not be separately represented in English; 'flee' captures the command naturally.
- source_word: אֶל לָבָן אָחִי
  chosen: to my brother Laban
  alternatives:
  - to Laban, my brother
  lexicon: HALOT
  rationale: Both English orders are possible; 'to my brother Laban' is smooth and
    preserves the appositional relationship.
- source_word: חָרָנָה
  chosen: at Haran
  alternatives:
  - to Haran
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Haran. In
    English, because the motion is already carried by 'flee to my brother Laban,'
    'at Haran' most clearly identifies Laban's location without awkward repetition
    of 'to.'
