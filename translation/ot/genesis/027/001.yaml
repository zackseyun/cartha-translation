id: GEN.27.1
reference: Genesis 27:1
source:
  edition: WLC
  text: וַ/יְהִי֙ כִּֽי זָקֵ֣ן יִצְחָ֔ק וַ/תִּכְהֶ֥יןָ עֵינָ֖י/ו מֵ/רְאֹ֑ת וַ/יִּקְרָ֞א
    אֶת עֵשָׂ֣ו בְּנ֣/וֹ הַ/גָּדֹ֗ל וַ/יֹּ֤אמֶר אֵלָי/ו֙ בְּנִ֔/י וַ/יֹּ֥אמֶר אֵלָ֖י/ו
    הִנֵּֽנִ/י־־׀׃
translation:
  text: Now it happened that when Isaac was old and his eyes were too dim to see,
    he called Esau his older son and said to him, “My son,” and he said to him, “Here
    I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Esau his eldest son.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'Now it happened'
    preserves the discourse-marking function in readable modern English without archaic
    'it came to pass.'
- source_word: כִּי
  chosen: that when
  alternatives:
  - when
  - as
  lexicon: HALOT
  rationale: Here כִּי introduces the temporal circumstance following the narrative
    opener. In English, 'that when' best reflects the Hebrew sequence with ויהי כי
    while remaining natural.
- source_word: זָקֵן
  chosen: was old
  alternatives:
  - had become old
  - was elderly
  lexicon: HALOT
  rationale: Predicate participle/adjectival use describing Isaac's advanced age.
    'Was old' is the plain and idiomatic rendering.
- source_word: וַתִּכְהֶיןָ עֵינָיו מֵרְאֹת
  chosen: his eyes were too dim to see
  alternatives:
  - his eyes had grown dim from seeing
  - his eyesight was dim
  - his eyes were dim so that he could not see
  lexicon: HALOT
  rationale: כהה with עיניים denotes dimming of eyesight. The infinitive מראות expresses
    inability or impairment with respect to seeing. 'Were too dim to see' communicates
    the sense clearly in modern English while preserving the causal/result nuance.
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he summoned
  lexicon: HALOT
  rationale: קרא in this context means to call for/address. 'Called' is sufficiently
    natural and does not overstate the formality as 'summoned' might.
- source_word: אֶת עֵשָׂו בְּנוֹ הַגָּדֹל
  chosen: Esau his older son
  alternatives:
  - Esau his eldest son
  - Esau his great son
  lexicon: HALOT
  rationale: הגדל here distinguishes Esau as the elder in relation to Jacob, not merely
    'great.' 'Older son' is precise and avoids the possible absolute claim of 'eldest'
    if read too formally, though 'eldest' is a viable alternative.
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - Son
  lexicon: HALOT
  rationale: The possessive suffix is naturally represented in direct address as 'My
    son,' preserving the familial tone.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Yes?
  - I am here
  lexicon: HALOT
  rationale: Standard responsive formula indicating presence and readiness. 'Here
    I am' is the conventional and accurate English equivalent.
