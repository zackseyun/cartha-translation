id: GEN.27.5
reference: Genesis 27:5
source:
  edition: WLC
  text: וְ/רִבְקָ֣ה שֹׁמַ֔עַת בְּ/דַבֵּ֣ר יִצְחָ֔ק אֶל עֵשָׂ֖ו בְּנ֑/וֹ וַ/יֵּ֤לֶךְ עֵשָׂו֙ הַ/שָּׂדֶ֔ה לָ/צ֥וּד צַ֖יִד לְ/הָבִֽיא־׃
translation:
  text: Now Rebekah was listening when Isaac spoke to Esau his son, and Esau went to the field to hunt for game and bring it back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Rebekah heard as Isaac was speaking to Esau his son.' The Hebrew participle and infinitive construction can be rendered more formally, but the main text reflects the ongoing sense in smoother English.
    reason: lexical_alternative
  - marker: b
    text: Or 'to hunt game to bring back'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/רִבְקָה
  chosen: Now Rebekah
  alternatives:
  - And Rebekah
  lexicon: HALOT
  rationale: The conjunction וְ commonly means 'and,' but at the start of a narrative development it can be rendered 'now' in natural English to mark scene progression without overstating coordination.
- source_word: שֹׁמַעַת
  chosen: was listening
  alternatives:
  - heard
  - was hearing
  lexicon: HALOT
  rationale: 'The qatal-relative participial sense here is durative/backgrounded: Rebekah is in the act/state of listening as Isaac speaks. ''Was listening'' captures the ongoing aspect better than the simple past ''heard.'''
- source_word: בְּ/דַבֵּר
  chosen: when Isaac spoke
  alternatives:
  - as Isaac was speaking
  - while Isaac spoke
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct marks contemporaneous action. 'When Isaac spoke' is idiomatic English and preserves the temporal overlap with Rebekah's listening.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: 'The preposition straightforwardly marks direction of speech: Isaac spoke ''to'' Esau.'
- source_word: בְּנ֑/וֹ
  chosen: his son
  alternatives:
  - his own son
  lexicon: HALOT
  rationale: The suffix marks possession; 'his son' is the natural and sufficient rendering.
- source_word: וַ/יֵּלֶךְ
  chosen: went
  alternatives:
  - left
  - departed
  lexicon: HALOT
  rationale: הלך in narrative commonly means 'went.' 'Went' preserves the simple movement without adding nuance not explicit in the Hebrew.
- source_word: הַ/שָּׂדֶה
  chosen: the field
  alternatives:
  - the open country
  - the countryside
  lexicon: HALOT
  rationale: שׂדה is literally 'field/open country.' 'The field' is the most direct rendering and fits the hunting context.
- source_word: לָ/צ֥וּד
  chosen: to hunt
  alternatives:
  - to catch
  - to trap
  lexicon: HALOT
  rationale: The infinitive of צוד in this context refers to hunting game. 'To hunt' is the clearest idiomatic English equivalent.
- source_word: צַ֖יִד
  chosen: game
  alternatives:
  - venison
  - prey
  lexicon: HALOT
  rationale: ציד denotes hunted animals/game. 'Game' is broader and more textually precise than 'venison,' which would narrow the species beyond what the Hebrew states.
- source_word: לְ/הָבִיא
  chosen: to bring back
  alternatives:
  - to bring
  - to bring in
  lexicon: HALOT
  rationale: The infinitive expresses purpose following the hunt. 'Bring back' makes explicit in natural English that Esau is to return with the game, matching the narrative context without altering meaning.
