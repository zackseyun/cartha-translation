  from: to hunt game to bring back
  to: to hunt for game and bring it back
  rationale: The Hebrew presents two infinitives of purpose (לָצ֥וּד and לְהָבִֽיא). The current rendering makes the second subordinate to the first ('hunt in order to bring'), which is a possible interpretation but results in a slightly clunky English phrase. Rendering them as a coordinated pair ('to hunt... and bring...') is also a valid interpretation of the syntax, is common in other major translations, and produces a more natural English flow.
