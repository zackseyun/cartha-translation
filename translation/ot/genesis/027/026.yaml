id: GEN.27.26
reference: Genesis 27:26
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלָ֖י/ו יִצְחָ֣ק אָבִ֑י/ו גְּשָׁ/ה נָּ֥א וּ/שְׁקָ/ה לִּ֖/י בְּנִֽ/י־־׃
translation:
  text: Then his father Isaac said to him, “Come near, please, and kiss me, my son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Approach, please.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving the sequential sense of the Hebrew wayyiqtol.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Standard rendering of the preposition plus pronominal suffix, indicating
    the indirect object of speech.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his dad
  lexicon: HALOT
  rationale: Formal kinship term retained. 'His father Isaac' reflects the Hebrew
    apposition and preserves the relational emphasis in the narrative.
- source_word: גְּשָׁה
  chosen: Come near
  alternatives:
  - Come here
  - Approach
  lexicon: HALOT
  rationale: Imperative of נגשׁ with paragogic he. 'Come near' best captures the sense
    of drawing close physically, fitting Isaac's request in context.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  lexicon: HALOT
  rationale: Polite particle softening the imperative. In this context 'please' is
    the most natural modern English equivalent; 'now' would be misleading.
- source_word: וּשְׁקָה
  chosen: and kiss me
  alternatives:
  - and give me a kiss
  lexicon: HALOT
  rationale: Imperative from נשׁק with 1cs object suffix implied by לִּי. 'Kiss me'
    is direct and natural, without adding idiomatic expansion not present in the Hebrew.
- source_word: לִּי
  chosen: me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix functions idiomatically with the verb
    'kiss' to mark the object/beneficiary. English expresses this naturally as the
    direct object 'me' rather than the more wooden 'for me.'
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: Vocative of address preserved. This maintains both the familial relationship
    and the emotional tone of Isaac's speech.
