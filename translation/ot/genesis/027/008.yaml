id: GEN.27.8
reference: Genesis 27:8
source:
  edition: WLC
  text: וְ/עַתָּ֥ה בְנִ֖/י שְׁמַ֣ע בְּ/קֹלִ֑/י לַ/אֲשֶׁ֥ר אֲנִ֖י מְצַוָּ֥ה אֹתָֽ/ךְ׃
translation:
  text: Now, my son, listen to my voice in what I am commanding you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And now, my son, hear my voice according to what I command you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'listen to my voice—to what I am commanding you'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the next instruction. English 'Now' is natural and preserves the immediacy; 'And now' is possible but the conjunction is often absorbed in English style.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son of mine
  lexicon: HALOT
  rationale: Vocative with 1cs suffix. 'My son' is the natural English equivalent and preserves the maternal address.
- source_word: שְׁמַע
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: 'Imperative of שׁמע can mean hear/listen and, by implication, obey. Here, with ''to my voice'' following, the immediate sense is auditory heed: ''listen.'' ''Obey'' would over-interpret, though obedience is implied by context.'
- source_word: בְּקֹלִי
  chosen: to my voice
  alternatives:
  - to me
  - to what I say
  lexicon: HALOT
  rationale: Literally 'to/at my voice.' In Hebrew idiom this means to heed what someone says. Rendering 'to my voice' keeps the concrete Hebrew expression while remaining understandable in English.
- source_word: לַאֲשֶׁר
  chosen: to what
  alternatives:
  - according to what
  - that which
  lexicon: HALOT
  rationale: Introduces the content of the command. 'To what' fits the construction 'listen to my voice—to what I am commanding you' and preserves the linkage between hearing and the specific instruction.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun retained in translation because English naturally includes it in the verbal clause 'I am commanding.'
- source_word: מְצַוָּה
  chosen: am commanding
  alternatives:
  - command
  - am instructing
  lexicon: HALOT
  rationale: Participle expressing present/immediate action. 'Am commanding' best reflects the ongoing force in context. 'Am instructing' is softer than the Hebrew צוה, which commonly denotes command.
- source_word: אֹתָךְ
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker with 2ms suffix (the morphology table appears to list 2fs, but context and address to Jacob require masculine). Rendered simply as English object pronoun 'you'.
