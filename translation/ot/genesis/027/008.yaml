  from: listen to my voice—to what I am commanding you
  to: listen to my voice in what I am commanding you
  rationale: The draft cleverly uses an em-dash to represent the epexegetical relationship between 'my voice' and the command that follows. However, rendering 'לַאֲשֶׁר' as 'to what' creates a slightly awkward repetition ('listen to...—to what...'). While not incorrect, a smoother English phrasing could be achieved by rendering 'לַאֲשֶׁר' as 'in what' or 'according to what' (as the footnote suggests), which is also a more standard gloss for the phrase. This would improve naturalness without losing the essential meaning.
