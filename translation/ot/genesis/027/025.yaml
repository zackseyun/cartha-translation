id: GEN.27.25
reference: Genesis 27:25
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הַגִּ֤שָׁ/ה לִּ/י֙ וְ/אֹֽכְלָה֙ מִ/צֵּ֣יד בְּנִ֔/י לְמַ֥עַן תְּבָֽרֶכְ/ךָ֖
    נַפְשִׁ֑/י וַ/יַּגֶּשׁ ל/וֹ֙ וַ/יֹּאכַ֔ל וַ/יָּ֧בֵא ל֦/וֹ יַ֖יִן וַ/יֵּֽשְׁתְּ־׃
translation:
  text: And he said, “Bring it near to me, and I will eat from my son’s game, so that
    my soul may bless you.” So he brought it near to him, and he ate; and he brought
    him wine, and he drank.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, “that I may bless you”; Hebrew: “that my soul may
      bless you.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּשָׁה
  chosen: Bring it near
  alternatives:
  - Bring it here
  - Serve it to me
  lexicon: HALOT
  rationale: Imperative of נגשׁ in the causative stem means to bring near/present.
    'Bring it near' preserves the concrete movement toward Isaac better than the more
    idiomatic 'serve it.' The object is implicit from context and supplied in English
    as 'it.'
- source_word: וְאֹכְלָה
  chosen: and I will eat
  alternatives:
  - that I may eat
  lexicon: HALOT
  rationale: Cohortative first person singular expresses Isaac’s intention/desire.
    In English, 'and I will eat' is natural after the imperative and preserves the
    sequence without overinterpreting purpose.
- source_word: מִצֵּיד בְּנִי
  chosen: from my son’s game
  alternatives:
  - some of my son’s game
  - from the game of my son
  lexicon: HALOT
  rationale: צַיִד refers to game/venison obtained by hunting. 'Game' is the most
    natural general rendering. The preposition מִן is retained with 'from,' though
    English sense is partitive.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Marks purpose. 'So that' is clear modern English and preserves the purposive
    force.
- source_word: תְּבָרֶכְךָ נַפְשִׁי
  chosen: my soul may bless you
  alternatives:
  - I may bless you
  - my life may bless you
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'my soul' as the subject. Retaining 'my soul'
    preserves the idiom and solemn personal force, rather than flattening it to simply
    'I.'
- source_word: וַיַּגֶּשׁ לוֹ
  chosen: So he brought it near to him
  alternatives:
  - So he brought it to him
  lexicon: HALOT
  rationale: Narrative repetition of נגשׁ echoes Isaac’s command. 'Brought it near'
    preserves the verbal link and the physical action.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of יַיִן; no contextual reason to soften or paraphrase.
- source_word: וַיֵּשְׁתְּ
  chosen: and he drank
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of שׁתה, best rendered straightforwardly.
