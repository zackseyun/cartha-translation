id: GEN.27.33
reference: Genesis 27:33
source:
  edition: WLC
  text: וַ/יֶּחֱרַ֨ד יִצְחָ֣ק חֲרָדָה֮ גְּדֹלָ֣ה עַד מְאֹד֒ וַ/יֹּ֡אמֶר מִֽי אֵפ֡וֹא
    ה֣וּא הַ/צָּֽד צַיִד֩ וַ/יָּ֨בֵא לִ֜/י וָ/אֹכַ֥ל מִ/כֹּ֛ל בְּ/טֶ֥רֶם תָּב֖וֹא
    וָ/אֲבָרֲכֵ֑/הוּ גַּם בָּר֖וּךְ יִהְיֶֽה־־־־׃
translation:
  text: Then Isaac trembled with a very great trembling and said, “Who then was it
    who hunted game and brought it to me, so that I ate from all of it before you
    came and blessed him? Yes, and he will be blessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Indeed, he shall be blessed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱרַד
  chosen: trembled
  alternatives:
  - shuddered
  - was terrified
  lexicon: HALOT
  rationale: The verb חרד denotes trembling or shaking from strong emotion, here likely
    shock and alarm. 'Trembled' is natural English and preserves the physical-emotional
    force without overstating to 'was terrified.'
- source_word: חֲרָדָה גְּדֹלָה עַד מְאֹד
  chosen: with a very great trembling
  alternatives:
  - violently
  - with exceedingly great trembling
  lexicon: HALOT
  rationale: This cognate accusative intensifies the verb. Rendering it explicitly
    preserves the Hebrew emphasis rather than collapsing it into a simple adverb.
    'Very great trembling' is slightly formal but transparent and faithful.
- source_word: מִי אֵפוֹא הוּא
  chosen: Who then was it
  alternatives:
  - Who, then, is he
  - Who indeed was it
  lexicon: HALOT
  rationale: אֵפוֹא adds an inferential/emphatic nuance ('then,' 'in that case').
    Because the following verbs are past, 'was it' fits the discourse better than
    present 'is he.'
- source_word: הַצָּד צַיִד
  chosen: who hunted game
  alternatives:
  - the one who hunted venison
  - the one who caught game
  lexicon: HALOT
  rationale: The construction combines the verb 'hunt' with its cognate noun 'game.'
    'Hunted game' preserves the Hebrew idiom in natural English. 'Venison' is too
    specific for צַיִד.
- source_word: וַיָּבֵא לִי
  chosen: and brought it to me
  alternatives:
  - and brought me some
  lexicon: HALOT
  rationale: The object is implied from the previous phrase ('game'). Supplying 'it'
    is required in English and keeps the reference clear.
- source_word: וָאֹכַל מִכֹּל
  chosen: so that I ate from all of it
  alternatives:
  - and I ate of everything
  - and I ate from it all
  lexicon: HALOT
  rationale: מִכֹּל is literally 'from all.' In context it most naturally refers to
    the prepared food brought by Jacob/Esau. 'From all of it' preserves the partitive
    flavor better than the idiomatic but less precise 'everything.'
- source_word: בְּטֶרֶם תָּבוֹא
  chosen: before you came
  alternatives:
  - before you arrived
  lexicon: HALOT
  rationale: A straightforward temporal clause. 'Came' matches the common Hebrew verb
    בוא and keeps the narrative register simple.
- source_word: וָאֲבָרֲכֵהוּ
  chosen: and blessed him
  alternatives:
  - and I blessed him
  lexicon: HALOT
  rationale: The first-person subject is already clear from context; English can omit
    the explicit pronoun naturally. The action is completed prior to Esau's arrival.
- source_word: גַּם בָּרוּךְ יִהְיֶה
  chosen: Yes, and he will be blessed
  alternatives:
  - Indeed, he shall be blessed
  - Moreover, blessed he will be
  lexicon: HALOT
  rationale: גַּם here adds emphatic confirmation after Isaac realizes what has happened.
    'Yes, and he will be blessed' captures both the affirmation and the future/resultative
    force of יִהְיֶה in idiomatic English. 'Shall' is possible but less natural in
    modern English.
