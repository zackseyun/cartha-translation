theological_decisions:
- issue: Force of Isaac's final declaration after the blessing has been given
  chosen_reading: A firm affirmation that the blessing already pronounced on Jacob
    stands and will remain effective
  alternative_readings:
  - A mere resigned acknowledgment without emphasis
  rationale: The Hebrew גַּם בָּרוּךְ יִהְיֶה is best read as emphatic confirmation,
    not simple resignation. The translation preserves the narrative-theological weight
    of the irrevocable patriarchal blessing without importing later doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it
