id: GEN.27.27
reference: Genesis 27:27
source:
  edition: WLC
  text: וַ/יִּגַּשׁ֙ וַ/יִּשַּׁק ל֔/וֹ וַ/יָּ֛רַח אֶת רֵ֥יחַ בְּגָדָ֖י/ו וַֽ/יְבָרֲכֵ֑/הוּ
    וַ/יֹּ֗אמֶר רְאֵה֙ רֵ֣יחַ בְּנִ֔/י כְּ/רֵ֣יחַ שָׂדֶ֔ה אֲשֶׁ֥ר בֵּרֲכ֖/וֹ יְהוָֽה־־׃
translation:
  text: So he came near and kissed him, and he smelled the smell of his garments and
    blessed him and said, “See, the smell of my son is like the smell of a field that
    the LORD has blessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scent of my son.' The Hebrew repeats the same noun for 'smell/scent'
      throughout the verse for rhetorical effect.
    reason: lexical_alternative
  - marker: b
    text: Or 'he smelled the smell of his garments'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: So he came near
  alternatives:
  - Then he came near
  - And he came near
  lexicon: HALOT
  rationale: Narrative wayyiqtol of נגשׁ, indicating movement closer. 'So' gives natural
    English narrative flow while preserving sequence.
- source_word: וַיִּשַּׁק לוֹ
  chosen: and kissed him
  alternatives:
  - and kissed him affectionately
  lexicon: HALOT
  rationale: נשׁק with indirect object pronoun means 'kissed him.' No need to expand
    the gesture beyond the text.
- source_word: וַיָּרַח אֶת רֵיחַ בְּגָדָיו
  chosen: and he smelled the smell of his garments
  alternatives:
  - and he smelled his garments
  - and he caught the scent of his garments
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the cognate construction 'smelled the smell/scent.'
    Retaining 'smelled the smell' preserves the Hebrew emphasis better than flattening
    it to 'smelled his garments,' while remaining understandable.
- source_word: בְּגָדָיו
  chosen: his garments
  alternatives:
  - his clothes
  - his clothing
  lexicon: HALOT
  rationale: '''Garments'' is slightly more formal and fits the blessing scene; it
    also preserves the concrete plural noun.'
- source_word: וַיְבָרֲכֵהוּ
  chosen: and blessed him
  lexicon: HALOT
  rationale: Straightforward rendering of ברך with object suffix.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative used as an attention-getter. 'See' is natural modern English
    without the archaic tone of 'Behold.'
- source_word: רֵיחַ בְּנִי
  chosen: the smell of my son
  alternatives:
  - the scent of my son
  lexicon: HALOT
  rationale: Maintains lexical repetition with רֵיחַ earlier in the verse. 'Smell'
    is more direct and consistent than varying to 'scent' without contextual necessity.
- source_word: כְּרֵיחַ שָׂדֶה
  chosen: is like the smell of a field
  alternatives:
  - is as the smell of a field
  - is like the scent of open country
  lexicon: HALOT
  rationale: Simile marked by כ. 'Field' is the plain sense of שָׂדֶה and should not
    be paraphrased.
- source_word: אֲשֶׁר בֵּרֲכוֹ יְהוָה
  chosen: that the LORD has blessed
  alternatives:
  - which the LORD has blessed
  lexicon: HALOT
  rationale: Relative clause with passive/perfect sense in context. English present
    perfect communicates the resulting state of a field blessed by God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
