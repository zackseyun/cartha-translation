id: GEN.27.15
reference: Genesis 27:15
source:
  edition: WLC
  text: וַ/תִּקַּ֣ח רִ֠בְקָה אֶת בִּגְדֵ֨י עֵשָׂ֜ו בְּנָ֤/הּ הַ/גָּדֹל֙ הַ/חֲמֻדֹ֔ת
    אֲשֶׁ֥ר אִתָּ֖/הּ בַּ/בָּ֑יִת וַ/תַּלְבֵּ֥שׁ אֶֽת יַעֲקֹ֖ב בְּנָ֥/הּ הַ/קָּטָֽן־־׃
translation:
  text: Then Rebekah took the choice garments of Esau her older son, which were with
    her in the house, and put them on Jacob her younger son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the best garments of Esau.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that she had in the house'; the Hebrew more literally says 'which were
      with her in the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: Then ... took
  alternatives:
  - And ... took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    in modern English.
- source_word: בִּגְדֵי
  chosen: garments
  alternatives:
  - clothes
  - clothing
  lexicon: HALOT
  rationale: The construct plural refers to articles of clothing. 'Garments' is slightly
    more formal and fits the narrative setting better than the more casual 'clothes.'
- source_word: הַחֲמֻדֹת
  chosen: choice
  alternatives:
  - best
  - precious
  - desirable
  lexicon: HALOT
  rationale: The adjective/noun denotes desirability or preciousness. In context of
    clothing, 'choice garments' communicates valued or select clothing without overstating
    material luxury. 'Best garments' is traditional and possible, but 'choice' more
    directly reflects the semantic idea of desirability.
- source_word: בְּנוֹ הַגָּדֹל
  chosen: her older son
  alternatives:
  - her elder son
  - her great son
  lexicon: HALOT
  rationale: In family context גָּדוֹל contrasts with קָטָן in age/status, so 'older'
    is the natural English rendering, paired with 'younger' later in the verse.
- source_word: אֲשֶׁר אִתָּהּ בַּבָּיִת
  chosen: which were with her in the house
  alternatives:
  - that she had in the house
  - which she kept in the house
  lexicon: HALOT
  rationale: This clause states location/possession straightforwardly. 'Which were
    with her in the house' stays close to the Hebrew without adding the interpretive
    nuance 'kept,' though that is contextually plausible.
- source_word: וַתַּלְבֵּשׁ
  chosen: put them on
  alternatives:
  - clothed
  - dressed
  lexicon: HALOT
  rationale: The verb means to clothe or dress someone. Because the object is the
    garments just mentioned, English idiom prefers 'put them on Jacob' rather than
    the more formal 'clothed Jacob.'
- source_word: בְּנוֹ הַקָּטָן
  chosen: her younger son
  alternatives:
  - her younger child
  - her small son
  lexicon: HALOT
  rationale: Here קָטָן contrasts with Esau as the younger sibling, not physical size.
    'Younger son' is the clearest contextual rendering.
