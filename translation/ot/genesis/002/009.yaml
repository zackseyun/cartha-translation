theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of 'the knowledge of good and evil'
  chosen_reading: Preserve the literal phrase without interpretive expansion
  alternative_readings:
  - moral knowledge
  - knowledge of everything
  - knowledge of what is beneficial and harmful
  rationale: The Hebrew phrase is theologically significant and interpretively debated.
    The translation preserves the source wording rather than resolving the debate
