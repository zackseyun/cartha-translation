id: GEN.2.21
reference: Genesis 2:21
source:
  edition: WLC
  text: וַ/יַּפֵּל֩ יְהוָ֨ה אֱלֹהִ֧ים תַּרְדֵּמָ֛ה עַל הָ/אָדָ֖ם וַ/יִּישָׁ֑ן וַ/יִּקַּ֗ח אַחַת֙ מִ/צַּלְעֹתָ֔י/ו וַ/יִּסְגֹּ֥ר בָּשָׂ֖ר תַּחְתֶּֽ/נָּה׀־׃
translation:
  text: So Yahweh God caused a deep sleep to fall upon the man, and he slept; then he took one of his ribs and closed up the flesh in its place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of his sides.' The Hebrew word can refer to a side or side-part as well as a rib.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפֵּל
  chosen: caused ... to fall
  alternatives:
  - made ... fall
  - cast
  lexicon: HALOT
  rationale: Hiphil of נפל is causative; 'caused a deep sleep to fall' preserves the Hebrew construction naturally in English.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD'; the compound divine title is conventionally and accurately rendered 'the LORD God'.
- source_word: תַּרְדֵּמָה
  chosen: a deep sleep
  alternatives:
  - a trance-like sleep
  - sleep
  lexicon: HALOT
  rationale: The noun denotes a heavy, divinely induced sleep or stupor; 'deep sleep' is the standard clear English equivalent and fits the context.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - the human being
  lexicon: HALOT
  rationale: In this immediate narrative context, הָאָדָם refers to the individual man rather than humanity in general. This follows the doctrine's gender-accurate principle for אָדָם.
- source_word: וַיִּישָׁן
  chosen: and he slept
  alternatives:
  - and he fell asleep
  lexicon: HALOT
  rationale: A simple wayyiqtol of ישׁן; 'and he slept' is formally closer, while still natural in English.
- source_word: וַיִּקַּח
  chosen: then he took
  alternatives:
  - and he took
  lexicon: HALOT
  rationale: The waw-consecutive advances the sequence. 'Then he took' gives readable narrative flow without adding content.
- source_word: אַחַת מִצַּלְעֹתָיו
  chosen: one of his ribs
  alternatives:
  - one of his sides
  - one of his side-parts
  lexicon: HALOT
  rationale: צֵלָע can mean 'side' or 'rib.' In this context, the traditional and contextually plausible sense is a rib/body part removed and then covered with flesh. Because 'side' is a viable lexical alternative, it is preserved in a footnote.
- source_word: וַיִּסְגֹּר בָּשָׂר
  chosen: closed up the flesh
  alternatives:
  - closed the flesh
  - covered with flesh
  lexicon: HALOT
  rationale: The verb סגר means 'shut/close.' With בָּשָׂר as object, 'closed up the flesh' best conveys the idea of closing the opening with flesh.
- source_word: תַּחְתֶּנָּה
  chosen: in its place
  alternatives:
  - under it
  - beneath it
  lexicon: HALOT
  rationale: Though literally 'under it,' the idiom in context refers to the location from which the rib was taken. 'In its place' communicates the sense idiomatically in English.
