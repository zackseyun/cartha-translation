theological_decisions:
- issue: Rendering of אָדָם in context
  chosen_reading: the man
  alternative_readings:
  - the human
  - the human being
  rationale: The verse narrates a specific individual from whom the woman will be built in the following verse, so the singular personal sense is primary rather than a generic reference to humankind.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)''.'
- issue: Rendering of צֵלָע
  chosen_reading: rib
  alternative_readings:
  - side
  rationale: The immediate surgical imagery ('closed up the flesh in its place') supports an anatomical reading, and 'rib' is the most natural English rendering in this context. Because 'side' is lexically possible and interpretively significant, it is preserved in a footnote rather than suppressed.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document significant lexical alternatives.'
