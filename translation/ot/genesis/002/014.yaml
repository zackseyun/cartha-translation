id: GEN.2.14
reference: Genesis 2:14
source:
  edition: WLC
  text: וְ/שֵׁ֨ם הַ/נָּהָ֤ר הַ/שְּׁלִישִׁי֙ חִדֶּ֔קֶל ה֥וּא הַֽ/הֹלֵ֖ךְ קִדְמַ֣ת אַשּׁ֑וּר
    וְ/הַ/נָּהָ֥ר הָֽ/רְבִיעִ֖י ה֥וּא פְרָֽת׃
translation:
  text: And the name of the third river is Hiddekel; it is the one that goes east
    of Asshur. And the fourth river is the Euphrates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hiddekel is traditionally identified with the Tigris.
    reason: alternative_reading
  - marker: b
    text: Or "east of Assyria"; Hebrew "east of Asshur."
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם
  chosen: name
  alternatives:
  - designation
  lexicon: HALOT
  rationale: Standard sense 'name'; in the formula 'the name of the ... river' English
    naturally preserves 'name'.
- source_word: נָּהָר
  chosen: river
  alternatives:
  - stream
  lexicon: HALOT
  rationale: Common Hebrew term for a river; 'river' is the straightforward and contextually
    appropriate rendering.
- source_word: שְּׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: Ordinal adjective; rendered directly as 'third'.
- source_word: חִדֶּקֶל
  chosen: Hiddekel
  alternatives:
  - Tigris
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with traditional identifications. 'Hiddekel' reflects the Hebrew form, while the
    conventional identification 'Tigris' is worth preserving in a footnote.
- source_word: הוּא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: Independent pronoun used predicatively; 'it is' gives natural English
    while preserving the identificational force.
- source_word: הֹלֵךְ
  chosen: goes
  alternatives:
  - flows
  - runs
  lexicon: HALOT
  rationale: The participle of הלך literally means 'going/walking.' For a river in
    English, 'goes' is slightly formal but preserves the Hebrew imagery better than
    the more interpretive 'flows.'
- source_word: קִדְמַת
  chosen: east of
  alternatives:
  - in front of
  - before
  lexicon: HALOT
  rationale: The noun in construct can denote 'east of' in geographical usage. Here
    a directional/geographical sense best fits the river's location relative to Asshur.
- source_word: אַשּׁוּר
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: The Hebrew proper name is Asshur. It may denote the land/region Assyria,
    but transliterating the name follows the stated philosophy; the conventional geographical
    rendering 'Assyria' is preserved in a footnote.
- source_word: רְבִיעִי
  chosen: fourth
  lexicon: HALOT
  rationale: Ordinal adjective; rendered directly as 'fourth'.
- source_word: פְרָת
  chosen: the Euphrates
  alternatives:
  - Perath
  lexicon: HALOT
  rationale: Although names are normally transliterated, 'Euphrates' is the standard
    English form for this river and communicates clearly to modern readers. Because
    this is a well-established identification rather than a theological issue, using
    the conventional English river name is justified under optimal equivalence.
