id: GEN.2.3
reference: Genesis 2:3
source:
  edition: WLC
  text: וַ/יְבָ֤רֶךְ אֱלֹהִים֙ אֶת י֣וֹם הַ/שְּׁבִיעִ֔י וַ/יְקַדֵּ֖שׁ אֹת֑/וֹ כִּ֣י
    ב֤/וֹ שָׁבַת֙ מִ/כָּל מְלַאכְתּ֔/וֹ אֲשֶׁר בָּרָ֥א אֱלֹהִ֖ים לַ/עֲשֽׂוֹת־־־׃פ
translation:
  text: So God blessed the seventh day and made it holy, because on it he rested from
    all his work that God had created to make.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctified it' or 'set it apart as holy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'rested'; the verb can also mean 'ceased.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'that God had created to do.' The final phrase is difficult; some
      understand it as 'that God created and made' or 'that God had created by making.'
    reason: alternative_reading
  - marker: d
    text: Or 'that God had created to do'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: The piel of ברך here denotes bestowing blessing on the day. 'Blessed'
    is the standard and sufficiently clear English rendering without unnecessary expansion.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1–2 this noun with singular verbal agreement refers to the
    one God; 'God' is the natural English equivalent.
- source_word: יּוֹם הַשְּׁבִיעִי
  chosen: the seventh day
  lexicon: HALOT
  rationale: A straightforward formal rendering of the noun plus ordinal with article.
- source_word: וַיְקַדֵּשׁ אֹתוֹ
  chosen: made it holy
  alternatives:
  - sanctified it
  - set it apart as holy
  lexicon: HALOT
  rationale: קדש in the piel means to consecrate or set apart as holy. 'Made it holy'
    is readable modern English and preserves the resultative sense; alternatives are
    viable but either more ecclesiastical ('sanctified') or more interpretive ('set
    it apart as holy').
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the blessing and sanctifying of the day. 'Because'
    is clearer in contemporary English than 'for'.
- source_word: בּוֹ
  chosen: on it
  alternatives:
  - in it
  lexicon: HALOT
  rationale: With a day as antecedent, English idiom prefers 'on it/on that day' rather
    than the more wooden 'in it'.
- source_word: שָׁבַת
  chosen: rested
  alternatives:
  - ceased
  lexicon: HALOT
  rationale: The verb means to cease or desist, and in this creation context 'rested'
    is the established and contextually appropriate rendering. 'Ceased' is lexically
    possible but less natural here and can underplay the Sabbath connection.
- source_word: מִכָּל מְלַאכְתּוֹ
  chosen: from all his work
  alternatives:
  - from all his labor
  lexicon: HALOT
  rationale: מלאכה commonly denotes work, occupation, or craftsmanship. 'Work' is
    broad and natural in context.
- source_word: אֲשֶׁר בָּרָא אֱלֹהִים
  chosen: that God had created
  alternatives:
  - which God created
  lexicon: HALOT
  rationale: English past perfect fits the narrative retrospectively and smoothly
    links the relative clause to the completed creation activity.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  lexicon: HALOT
  rationale: The infinitive of עשה after ברא is syntactically difficult and has been
    rendered variously. 'To do' is the most direct lexical equivalent and preserves
    the Hebrew wording without over-resolving the construction. 'To make' is possible
    in English but would blur the distinction between ברא and עשה.
