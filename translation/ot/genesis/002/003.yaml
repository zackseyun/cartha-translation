theological_decisions:
- issue: Rendering of שָׁבַת in relation to Sabbath theology
  chosen_reading: rested
  alternative_readings:
  - ceased
  rationale: The text grounds the sanctity of the seventh day in God's שבת. Rendering
    it 'rested' preserves the canonical connection to Sabbath while not implying divine
    fatigue; the lexical alternative 'ceased' remains possible but is not preferred
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Rendering of וַיְקַדֵּשׁ אֹתוֹ
  chosen_reading: made it holy
  alternative_readings:
  - sanctified it
  - set it apart as holy
  rationale: This avoids archaic ecclesiastical diction while preserving the holiness
    language central to the verse. It does not flatten the theological significance
    of the day's consecration.
  doctrine_reference: Readable modern English, not archaic or academic
