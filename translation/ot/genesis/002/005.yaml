id: GEN.2.5
reference: Genesis 2:5
source:
  edition: WLC
  text: וְ/כֹ֣ל שִׂ֣יחַ הַ/שָּׂדֶ֗ה טֶ֚רֶם יִֽהְיֶ֣ה בָ/אָ֔רֶץ וְ/כָל עֵ֥שֶׂב הַ/שָּׂדֶ֖ה טֶ֣רֶם יִצְמָ֑ח כִּי֩ לֹ֨א הִמְטִ֜יר יְהוָ֤ה אֱלֹהִים֙ עַל הָ/אָ֔רֶץ וְ/אָדָ֣ם אַ֔יִן לַֽ/עֲבֹ֖ד אֶת הָֽ/אֲדָמָֽה׀־־־׃
translation:
  text: Now no shrub of the field was yet on the earth, and no plant of the field had yet sprung up, because Yahweh God had not caused it to rain on the earth, and there was no man to work the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bush of the field' for 'shrub of the field.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD God'; alternatively, 'Yahweh God.'
    reason: alternative_reading
  - marker: c
    text: Or 'there was no human to cultivate the soil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂיחַ הַשָּׂדֶה
  chosen: shrub of the field
  alternatives:
  - bush of the field
  - wild shrub of the field
  lexicon: HALOT
  rationale: שִׂיחַ denotes a shrub/bush rather than a general plant. 'Shrub of the field' preserves the lexical distinction from עֵשֶׂב in the next clause and keeps the genitive construction.
- source_word: טֶרֶם יִהְיֶה בָאָרֶץ
  chosen: was yet on the earth
  alternatives:
  - had not yet appeared on the earth
  - was not yet in the land
  lexicon: HALOT
  rationale: טֶרֶם marks prior non-occurrence ('not yet/before'), and יִהְיֶה with בָאָרֶץ is naturally rendered as existence/presence. 'On the earth' fits the broader creation context better than 'in the land.'
- source_word: עֵשֶׂב הַשָּׂדֶה
  chosen: plant of the field
  alternatives:
  - herb of the field
  - vegetation of the field
  - grass of the field
  lexicon: HALOT
  rationale: עֵשֶׂב can denote herbaceous vegetation broadly. 'Plant' is readable modern English and preserves distinction from 'shrub' without over-specifying edible herbs or grass.
- source_word: טֶרֶם יִצְמָח
  chosen: had yet sprung up
  alternatives:
  - had yet grown
  - had yet sprouted
  lexicon: HALOT
  rationale: צמח refers to sprouting/growing forth. The pluperfect-style English fits the explanatory setting of the verse and pairs naturally with the prior clause.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the absence of cultivated growth. 'Because' is the clearest modern English causal connector.
- source_word: הִמְטִיר
  chosen: had not caused it to rain
  alternatives:
  - had not sent rain
  - had not made it rain
  lexicon: HALOT
  rationale: 'The hiphil of מטר is causative: God caused rain to fall. ''Caused it to rain'' preserves that causative force more explicitly than simply ''sent rain.'''
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The compound divine name is conventionally and accurately rendered 'the LORD God.'
- source_word: וְאָדָם אַיִן
  chosen: there was no man
  alternatives:
  - there was no human
  - there was no humankind
  lexicon: HALOT
  rationale: אָדָם here refers to humanity in representative singular, but the immediate syntax points to the absence of a human cultivator. Per doctrine, gender-accurate rendering is preferred; 'man' best matches the representative singular while remaining natural in context.
- source_word: לַעֲבֹד אֶת הָאֲדָמָה
  chosen: to work the ground
  alternatives:
  - to cultivate the soil
  - to till the ground
  lexicon: HALOT
  rationale: עבד in this context means to work/cultivate, and אֲדָמָה is arable ground/soil. 'Work the ground' is clear, broad, and avoids prematurely narrowing to a specific agricultural technique.
- source_word: הָאָרֶץ / הָאֲדָמָה
  chosen: earth / ground
  alternatives:
  - land / soil
  lexicon: HALOT
  rationale: 'The verse intentionally uses two related but distinct nouns: אֶרֶץ for the earth/land broadly and אֲדָמָה for the ground/soil to be worked. Rendering them differently preserves the Hebrew distinction.'
