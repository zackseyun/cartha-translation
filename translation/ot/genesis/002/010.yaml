id: GEN.2.10
reference: Genesis 2:10
source:
  edition: WLC
  text: וְ/נָהָרּ֙ יֹצֵ֣א מֵ/עֵ֔דֶן לְ/הַשְׁק֖וֹת אֶת הַ/גָּ֑ן וּ/מִ/שָּׁם֙ יִפָּרֵ֔ד
    וְ/הָיָ֖ה לְ/אַרְבָּעָ֥ה רָאשִֽׁים־׃
translation:
  text: Now a river flowed out of Eden to water the garden, and from there it divided
    and became four headwaters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "four heads." The Hebrew literally says "heads," a term used here for
      the river's four principal divisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָהָר
  chosen: Now a river
  alternatives:
  - And a river
  - A river
  lexicon: HALOT
  rationale: נָהָר means 'river.' The prefixed וְ is rendered as 'Now' for natural
    English narrative progression; 'And' is possible but less idiomatic here.
- source_word: יֹצֵא
  chosen: flowed out
  alternatives:
  - was going out
  - comes out
  lexicon: HALOT
  rationale: The participle of יצא denotes ongoing action, literally 'going out.'
    In English narrative, 'flowed out' naturally expresses a river issuing from a
    source while preserving the sense.
- source_word: מֵעֵדֶן
  chosen: out of Eden
  alternatives:
  - from Eden
  lexicon: HALOT
  rationale: The preposition מִן marks source. 'Out of Eden' pairs naturally with
    the river imagery and the preceding verb.
- source_word: לְהַשְׁקוֹת
  chosen: to water
  alternatives:
  - to irrigate
  - to give drink to
  lexicon: HALOT
  rationale: 'The infinitive of שׁקה here expresses purpose: the river''s function
    is to water the garden. ''Irrigate'' is possible but sounds more technical than
    the context requires.'
- source_word: אֶת־הַגָּן
  chosen: the garden
  lexicon: HALOT
  rationale: 'Direct object marker plus noun with article: straightforwardly ''the
    garden.'' In context this is the garden previously mentioned.'
- source_word: וּמִשָּׁם
  chosen: and from there
  alternatives:
  - and from that place
  lexicon: HALOT
  rationale: The phrase marks a new stage in the river's course. 'From there' is the
    most natural and direct rendering.
- source_word: יִפָּרֵד
  chosen: it divided
  alternatives:
  - it was divided
  - it separated
  lexicon: HALOT
  rationale: The Niphal of פרד can be intransitive/passive, 'be divided' or 'separate.'
    Given the river as subject and the resulting branches, 'it divided' is concise
    and idiomatic.
- source_word: וְהָיָה
  chosen: and became
  alternatives:
  - and it became
  - and it was
  lexicon: HALOT
  rationale: היה here indicates resultant state after the division. 'Became' best
    captures the transition into four branches.
- source_word: לְאַרְבָּעָה
  chosen: four
  alternatives:
  - into four
  lexicon: HALOT
  rationale: 'The preposition לְ with numerals after היה can indicate resulting state:
    ''became four...'' English expresses this simply as ''became four...'' or ''became
    into four...'' The former is idiomatic.'
- source_word: רָאשִׁים
  chosen: headwaters
  alternatives:
  - heads
  - branches
  - sources
  lexicon: HALOT
  rationale: Literally 'heads.' In river context this refers to chief divisions or
    starting points of branches. 'Headwaters' communicates the hydrological sense
    more clearly for modern readers, while 'heads' would be obscure.
