theological_decisions:
- issue: Gendered representative language in marriage formulation
  chosen_reading: a man
  alternative_readings:
  - a person
  - one
  rationale: The Hebrew uses the masculine singular אִישׁ in a representative sense.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing
    where the source is explicitly masculine.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nature of the statement
  chosen_reading: Rendered as a general normative principle ('shall leave ... shall
    become') rather than a direct imperative
  alternative_readings:
  - direct command
  - purely descriptive past custom
  rationale: The Hebrew verbal forms present a general principle grounded in the creation
    narrative. The English should preserve that normative/proverbial force without
    turning it into an explicit command not present in the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
