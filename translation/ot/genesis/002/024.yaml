id: GEN.2.24
reference: Genesis 2:24
source:
  edition: WLC
  text: עַל כֵּן֙ יַֽעֲזָב אִ֔ישׁ אֶת אָבִ֖י/ו וְ/אֶת אִמּ֑/וֹ וְ/דָבַ֣ק בְּ/אִשְׁתּ֔/וֹ
    וְ/הָי֖וּ לְ/בָשָׂ֥ר אֶחָֽד־־־־׃
translation:
  text: Therefore a man shall leave his father and his mother and cling to his wife,
    and they shall become one flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hold fast to' or 'be joined to.' The Hebrew verb conveys strong attachment
      or adhesion.
    reason: lexical_alternative
  - marker: b
    text: '''One flesh'' is a Hebrew expression that includes bodily union and the
      formation of a new kinship bond.'
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Marks a conclusion/inference from the preceding narrative. 'Therefore'
    is natural modern English and preserves the explanatory force.
- source_word: יַֽעֲזָב
  chosen: shall leave
  alternatives:
  - leaves
  - will leave
  - forsake
  lexicon: HALOT
  rationale: The yiqtol here expresses a general future/generic principle. 'Shall
    leave' fits the proverbial/normative sense in English without overstating command.
    'Forsake' is too strong in modern English for the family-formation context.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - man
  - a husband
  lexicon: HALOT
  rationale: The singular generic refers representatively to the male partner in marriage.
    'A man' preserves the gendered singular of the Hebrew better than a neutral rendering,
    in keeping with the gender-accurate policy.
- source_word: אָבִיו ... אִמּוֹ
  chosen: his father and his mother
  alternatives:
  - his parents
  lexicon: HALOT
  rationale: The Hebrew names each parent explicitly; retaining both preserves the
    form and emphasis better than collapsing to 'parents'.
- source_word: וְדָבַק
  chosen: and cling to
  alternatives:
  - and be joined to
  - and hold fast to
  - and cleave to
  lexicon: HALOT
  rationale: דבק commonly conveys strong attachment. 'Cling to' is vivid, readable
    modern English and avoids the archaic feel of 'cleave' while preserving more force
    than the more passive 'be joined to.'
- source_word: בְּאִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: In this context אִשָּׁה with pronominal suffix refers to a man's wife,
    not merely a woman. 'His wife' is the idiomatic and contextually precise rendering.
- source_word: וְהָיוּ
  chosen: and they shall become
  alternatives:
  - and they shall be
  - so that they become
  lexicon: HALOT
  rationale: 'With the predicate phrase ''one flesh,'' the sense is resultative: the
    two come to be one unit. ''Become'' makes the transition/result explicit in natural
    English.'
- source_word: לְבָשָׂר אֶחָד
  chosen: one flesh
  alternatives:
  - one body
  - a single flesh
  lexicon: HALOT
  rationale: This is the established and most accurate rendering of the Hebrew idiom,
    preserving both its physical and covenantal-relational resonance without over-interpreting
    it.
