id: GEN.2.12
reference: Genesis 2:12
source:
  edition: WLC
  text: וּֽ/זֲהַ֛ב הָ/אָ֥רֶץ הַ/הִ֖וא ט֑וֹב שָׁ֥ם הַ/בְּדֹ֖לַח וְ/אֶ֥בֶן הַ/שֹּֽׁהַם׃
translation:
  text: And the gold of that land is good; bdellium and onyx stone are there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'aromatic resin' for 'bdellium'; the exact substance denoted
      by the Hebrew term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or possibly another precious stone, such as 'beryl'; the exact identification
      of the Hebrew שֹׁהַם is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזֲהַב
  chosen: And the gold
  alternatives:
  - Now the gold
  - And gold
  lexicon: HALOT
  rationale: The conjunction waw naturally links this sentence to the previous description
    of the land. 'Gold' is the straightforward sense of זָהָב. Including the article
    in English ('the gold') reflects the construct relationship with 'of that land'
    and yields natural English.
- source_word: הָאָרֶץ הַהִוא
  chosen: of that land
  alternatives:
  - of that country
  - of the land there
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' or 'country'; 'land' fits the Eden geography
    context best. הַהִוא is deictic, 'that,' pointing back to Havilah in the previous
    verse.
- source_word: טוֹב
  chosen: is good
  alternatives:
  - is fine
  - is of good quality
  lexicon: HALOT
  rationale: טוֹב here describes the quality of the gold. 'Is good' is both literal
    and idiomatic enough in English, preserving the simple evaluative force without
    over-interpreting.
- source_word: שָׁם
  chosen: are there
  alternatives:
  - is there
  - there is
  lexicon: HALOT
  rationale: שָׁם means 'there.' Because it governs two following nominal items in
    English, 'are there' is the most natural rendering for the clause as a whole.
- source_word: הַבְּדֹלַח
  chosen: bdellium
  alternatives:
  - aromatic resin
  - gum resin
  lexicon: HALOT
  rationale: בְּדֹלַח is traditionally rendered 'bdellium,' a specific substance whose
    exact identification is uncertain. Retaining the conventional transliterated term
    avoids false precision while preserving the lexical distinctness of the Hebrew.
- source_word: וְאֶבֶן הַשֹּׁהַם
  chosen: and onyx stone
  alternatives:
  - and onyx
  - and beryl stone
  lexicon: HALOT
  rationale: אֶבֶן is explicitly 'stone,' and שֹׁהַם names a precious stone, traditionally
    'onyx,' though the exact mineral identification is uncertain. 'Onyx stone' preserves
    both the Hebrew wording and the conventional identification without overstating
    certainty.
