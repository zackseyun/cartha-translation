theological_decisions:
- issue: Scope of creation in 'all their host'
  chosen_reading: A comprehensive reference to everything that populates or belongs
    to the heavens and the earth.
  alternative_readings:
  - A narrower reference primarily to the stars or heavenly bodies
  - A military metaphor emphasizing ordered ranks
  rationale: The phrase summarizes the completion of the created order. While 'host'
    can evoke heavenly bodies or an army-like arrangement, the immediate pairing with
    'the heavens and the earth' supports a comprehensive sense encompassing all their
    contents. The translation preserves the lexical image without narrowing the referent.
