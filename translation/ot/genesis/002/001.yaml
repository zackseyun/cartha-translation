id: GEN.2.1
reference: Genesis 2:1
source:
  edition: WLC
  text: וַ/יְכֻלּ֛וּ הַ/שָּׁמַ֥יִם וְ/הָ/אָ֖רֶץ וְ/כָל צְבָאָֽ/ם־׃
translation:
  text: Thus the heavens and the earth were finished, and all their host.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were completed.'
    reason: lexical_alternative
  - marker: b
    text: '''Host'' here means the full array of what fills the heavens and the earth.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְכֻלּוּ
  chosen: were finished
  alternatives:
  - were completed
  - were brought to an end
  lexicon: HALOT
  rationale: From כלה in the passive/wayyiqtol form, indicating that the heavens and
    the earth came to completion. 'Were finished' is natural English and preserves
    the passive/resultative sense better than an active paraphrase.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - the heavens/skies
  lexicon: HALOT
  rationale: שָׁמַיִם is conventionally plural in Hebrew and in Genesis 1–2 refers
    to the created heavens rather than merely the visible sky. 'The heavens' preserves
    the elevated cosmological sense.
- source_word: וְהָאָרֶץ
  chosen: and the earth
  alternatives:
  - and the land
  lexicon: HALOT
  rationale: In the creation context, אֶרֶץ denotes the earth as the terrestrial realm,
    not a localized 'land.' The article is retained in English for the paired expression
    'the heavens and the earth.'
- source_word: וְכָל
  chosen: and all
  alternatives:
  - with all
  lexicon: HALOT
  rationale: Simple conjunctive plus totalizing noun. 'And all' best reflects the
    coordination of a further element included in the completion.
- source_word: צְבָאָם
  chosen: their host
  alternatives:
  - their array
  - all that fills them
  - their multitude
  lexicon: HALOT
  rationale: צָבָא can denote an organized host, army, or assembled multitude. In
    this cosmological context it refers to the totality of what populates the heavens
    and the earth. 'Host' is concise, traditional, and still intelligible, preserving
    the sense of ordered multitude without over-paraphrasing.
