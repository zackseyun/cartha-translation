  from: And the LORD God built the rib that he had taken from the man into a woman
  to: And the rib that the LORD God had taken from the man, he built into a woman
  rationale: The current word order, while a direct and formal rendering of the Hebrew syntax (Verb-Object-Result), is slightly awkward in English. The construction 'built the rib... into a woman' can sound clunky. By fronting the object ('the rib... he built into a woman'), the sentence becomes more idiomatic and flows better. This syntactic adjustment is common in major modern translations (e.g., ESV, NRSVUE) and it preserves all the drafter's key lexical choices, including the deliberate use of 'built'.
