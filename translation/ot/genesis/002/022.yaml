id: GEN.2.22
reference: Genesis 2:22
source:
  edition: WLC
  text: וַ/יִּבֶן֩ יְהוָ֨ה אֱלֹהִ֧ים אֶֽת הַ/צֵּלָ֛ע אֲשֶׁר לָקַ֥ח מִן הָֽ/אָדָ֖ם לְ/אִשָּׁ֑ה וַ/יְבִאֶ֖/הָ אֶל הָֽ/אָדָֽם׀־־־־׃
translation:
  text: And the rib that Yahweh God had taken from the man he made into a woman, and he brought her to the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the side.' The Hebrew צֵלָע can mean 'side' as well as 'rib.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And the LORD God built the rib that he had taken from the man into a woman'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - fashioned
  - made
  lexicon: HALOT
  rationale: The verb בנה literally means 'build.' Retaining 'built' preserves the concrete imagery of construction in the Hebrew and avoids flattening it to the more generic 'made.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In the collocation יְהוָה אֱלֹהִים, the standard and natural English rendering is 'the LORD God.'
- source_word: הַצֵּלָע
  chosen: the rib
  alternatives:
  - the side
  lexicon: HALOT
  rationale: צֵלָע can denote 'side' more broadly, but in this immediate context the traditional and contextually specific sense 'rib' best fits the narrative of something taken from the man and then formed into the woman. The broader lexical possibility is preserved in a footnote.
- source_word: לָקַח מִן הָאָדָם
  chosen: had taken from the man
  alternatives:
  - took from the man
  lexicon: HALOT
  rationale: English past perfect ('had taken') naturally marks the prior action relative to the main verb 'built,' clarifying sequence without adding content.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  lexicon: HALOT
  rationale: In this verse אָדָם refers to the individual male from whom the rib was taken, not humanity in general, so 'the man' is the gender-accurate rendering required by context.
- source_word: לְאִשָּׁה
  chosen: into a woman
  alternatives:
  - as a woman
  - into woman
  lexicon: HALOT
  rationale: The preposition ל here marks the result of the building action. 'Into a woman' preserves the transformational sense more clearly than the flatter 'made ... a woman,' while remaining idiomatic English.
- source_word: וַיְבִאֶהָ אֶל הָאָדָם
  chosen: and he brought her to the man
  alternatives:
  - and he led her to the man
  lexicon: HALOT
  rationale: בוא in the hiphil commonly means 'bring.' 'Brought her to the man' is direct, natural, and preserves the narrative action.
