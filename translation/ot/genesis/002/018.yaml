id: GEN.2.18
reference: Genesis 2:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יְהוָ֣ה אֱלֹהִ֔ים לֹא ט֛וֹב הֱי֥וֹת הָֽ/אָדָ֖ם לְ/בַדּ֑/וֹ אֶֽעֱשֶׂהּ
    לּ֥/וֹ עֵ֖זֶר כְּ/נֶגְדּֽ/וֹ־־׃
translation:
  text: Then the LORD God said, “It is not good for the man to be alone. I will make
    a helper corresponding to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a helper fit for him,' 'a suitable helper for him,' or 'a helper matching
      him.' The Hebrew phrase suggests one who corresponds to him rather than merely
      an assistant of lower status.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In the collocation יְהוָה אֱלֹהִים, the natural English rendering is
    'the LORD God,' preserving both the covenant name and the generic divine title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - then said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Said' is the core lexical
    value; 'Then' is supplied in English to reflect narrative sequence naturally.
- source_word: לֹא טוֹב
  chosen: It is not good
  alternatives:
  - Not good
  lexicon: HALOT
  rationale: This preserves the predicative assessment straightforwardly in idiomatic
    English without weakening the evaluative force.
- source_word: הֱיוֹת
  chosen: to be
  alternatives:
  - for ... to be
  lexicon: HALOT
  rationale: The infinitive construct with the following subject is best represented
    by the English infinitive 'to be,' expanded idiomatically in the clause 'for the
    man to be alone.'
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - humankind
  lexicon: HALOT
  rationale: Per DOCTRINE.md, אָדָם is rendered according to context. Here the singular
    individual in the garden is in view, so 'the man' is more precise than 'humankind,'
    while still allowing representative significance.
- source_word: לְבַדּוֹ
  chosen: to be alone
  alternatives:
  - by himself
  - alone
  lexicon: HALOT
  rationale: The sense is solitary existence. 'To be alone' fits the infinitival construction
    smoothly and idiomatically.
- source_word: אֶעֱשֶׂה־לּוֹ
  chosen: I will make ... for him
  alternatives:
  - I will make ... him
  - I will make ... suitable for him
  lexicon: HALOT
  rationale: 'The first-person imperfect expresses divine intention. English naturally
    places the indirect object later in the clause: ''I will make a helper corresponding
    to him.'''
- source_word: עֵזֶר
  chosen: helper
  alternatives:
  - help
  - one who helps
  lexicon: HALOT
  rationale: The noun denotes one who provides help or aid. 'Helper' is the most direct
    nominal rendering in English and does not imply inferiority; that nuance is clarified
    by the paired phrase כְּנֶגְדּוֹ.
- source_word: כְּנֶגְדּוֹ
  chosen: corresponding to him
  alternatives:
  - fit for him
  - suitable for him
  - matching him
  - opposite him
  lexicon: HALOT
  rationale: The phrase conveys one who is in front of, corresponding to, or matching
    the man. 'Corresponding to him' preserves the relational symmetry more transparently
    than the traditional but less explicit 'fit for him,' while avoiding overinterpretive
    paraphrase.
