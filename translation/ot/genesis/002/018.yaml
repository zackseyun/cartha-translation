theological_decisions:
- issue: Rendering of אָדָם in context
  chosen_reading: the man
  alternative_readings:
  - humankind
  - the human
  rationale: The verse concerns the solitary male human previously formed, not humanity
    in the abstract alone. Using 'the man' follows the gender-accurate principle while
    preserving the narrative particularity of the text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
- issue: Potential hierarchical misunderstanding of עֵזֶר כְּנֶגְדּוֹ
  chosen_reading: a helper corresponding to him
  alternative_readings:
  - a helper fit for him
  - a suitable helper for him
  rationale: The Hebrew does not itself state inferiority or superiority. This rendering
    preserves the text's presentation of aid and correspondence without importing
    later doctrinal or social conclusions.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
