theological_decisions:
- issue: Rendering of אָדָם in context
  chosen_reading: the man
  alternative_readings:
  - the human
  - the human being
  rationale: Because the verse explicitly contrasts the male with 'his wife,' the
    contextual sense is the individual man rather than humankind in general. This
    preserves the narrative specificity without importing broader anthropological
    claims.
