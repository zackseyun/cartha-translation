id: GEN.2.25
reference: Genesis 2:25
source:
  edition: WLC
  text: וַ/יִּֽהְי֤וּ שְׁנֵי/הֶם֙ עֲרוּמִּ֔ים הָֽ/אָדָ֖ם וְ/אִשְׁתּ֑/וֹ וְ/לֹ֖א יִתְבֹּשָֽׁשׁוּ׃
translation:
  text: And the man and his wife were both naked, and they were not ashamed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the two of them ... naked'; the wording emphasizes that both members
      of the pair were unclothed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - and they became
  - and they were
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as simple past narrative
    linkage. English 'were' best fits the stative predicate construction in context.
- source_word: שְׁנֵיהֶם
  chosen: both
  alternatives:
  - the two of them
  lexicon: HALOT
  rationale: The dual expression emphasizes that the statement applies to the pair
    together. 'Both' is natural modern English and preserves the sense.
- source_word: עֲרוּמִּים
  chosen: naked
  alternatives:
  - bare
  lexicon: HALOT
  rationale: The adjective means unclothed/naked. 'Naked' is the standard and most
    transparent rendering, and it also preserves the literary connection with the
    near-homophone in the following verse ('crafty').
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - the human being
  lexicon: HALOT
  rationale: In this immediate context the referent is the male human paired with
    'his wife,' so 'the man' is more precise than 'the human.' This follows the doctrine
    guideline for gender-accurate rendering of אָדָם by context.
- source_word: וְאִשְׁתּוֹ
  chosen: and his wife
  alternatives:
  - and the woman
  lexicon: HALOT
  rationale: The noun with 3ms suffix naturally means 'his wife' here, reflecting
    the marital relationship established in the preceding verse.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation.
- source_word: יִתְבֹּשָׁשׁוּ
  chosen: were ashamed
  alternatives:
  - felt shame
  - were embarrassed
  lexicon: HALOT
  rationale: The hitpolel/imperfect form of בוש conveys experiencing shame. 'Were
    ashamed' is idiomatic with the preceding stative clause and avoids the weaker
    modern sense of mere embarrassment.
