id: GEN.2.13
reference: Genesis 2:13
source:
  edition: WLC
  text: וְ/שֵֽׁם הַ/נָּהָ֥ר הַ/שֵּׁנִ֖י גִּיח֑וֹן ה֣וּא הַ/סּוֹבֵ֔ב אֵ֖ת כָּל אֶ֥רֶץ
    כּֽוּשׁ־־׃
translation:
  text: And the name of the second river was Gihon; it is the one that goes around
    all the land of Cush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that surrounds all the land of Cush.'
    reason: lexical_alternative
  - marker: b
    text: Cush is a place name traditionally associated with regions south of Egypt;
      the Hebrew text preserves the ancient name itself.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/שֵׁם
  chosen: And the name
  alternatives:
  - Now the name
  lexicon: HALOT
  rationale: וְ here naturally continues the river description, so 'And' preserves
    the narrative linkage. שֵׁם is straightforwardly 'name.'
- source_word: הַ/נָּהָר
  chosen: of the ... river
  alternatives:
  - of the stream
  lexicon: HALOT
  rationale: נָהָר commonly denotes a river; 'river' is the standard and clearest
    rendering in this Eden context.
- source_word: הַ/שֵּׁנִי
  chosen: second
  lexicon: HALOT
  rationale: Ordinal adjective marking sequence among the rivers; 'second' is direct
    and formal.
- source_word: גִּיחוֹן
  chosen: Gihon
  rationale: Proper name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: הוּא
  chosen: it is the one
  alternatives:
  - it is
  - this is
  lexicon: HALOT
  rationale: The pronoun resumes the subject emphatically. 'It is the one' brings
    out the identificational force in natural English, linking the named river with
    its description.
- source_word: הַ/סּוֹבֵב
  chosen: that goes around
  alternatives:
  - that surrounds
  - that encircles
  lexicon: HALOT
  rationale: From סבב, 'to go around, surround, encircle.' 'Goes around' is a natural
    modern rendering that preserves the participial descriptive sense without overstating
    topographical precision.
- source_word: אֵת כָּל אֶרֶץ
  chosen: all the land of
  alternatives:
  - the whole land of
  - all the territory of
  lexicon: HALOT
  rationale: אֵת marks the direct object; כָּל אֶרֶץ is best rendered 'all the land
    of' in idiomatic English.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Proper place name should be transliterated. 'Ethiopia' is interpretive
    and potentially anachronistic in this primeval-geographical context, so 'Cush'
    is preferred.
