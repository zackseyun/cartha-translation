theological_decisions:
- issue: Rendering of אָדָם in Genesis 2:20
  chosen_reading: the man
  alternative_readings:
  - Adam
  - humankind
  rationale: The verse concerns the individual human being in the garden narrative,
    not humanity in the abstract. Using 'the man' follows the doctrine's guidance
    on אָדָם ('man / humankind' by context) and preserves the literary development
    before the woman is introduced. 'Adam' remains a plausible alternative and is
    preserved in a footnote because readers may understand the term as becoming name-like
    in this section.
  doctrine_reference: 'Contested terms: אָדָם adam | Default English: man / humankind
    (context)'
