id: GEN.2.20
reference: Genesis 2:20
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א הָֽ/אָדָ֜ם שֵׁמ֗וֹת לְ/כָל הַ/בְּהֵמָה֙ וּ/לְ/ע֣וֹף הַ/שָּׁמַ֔יִם
    וּ/לְ/כֹ֖ל חַיַּ֣ת הַ/שָּׂדֶ֑ה וּ/לְ/אָדָ֕ם לֹֽא מָצָ֥א עֵ֖זֶר כְּ/נֶגְדּֽ/וֹ־־׃
translation:
  text: And the man gave names to all the livestock, to the birds of the sky, and
    to every wild animal, but for the man no helper corresponding to him was found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Adam gave names ... but for Adam no helper corresponding to him was
      found.'
    reason: alternative_reading
  - marker: b
    text: Or 'no helper fit for him was found.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew ''he did not find''; English may also be rendered actively: ''but
      the man did not find a helper corresponding to him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָדָם / לְאָדָם
  chosen: the man / for the man
  alternatives:
  - humankind
  - Adam
  lexicon: HALOT
  rationale: Here אָדָם has the article in the first occurrence and refers to the
    individual human in the narrative rather than humanity in general. The final לְאָדָם
    likewise refers back to that same individual. Per doctrine, gender-accurate rendering
    is preferred, so 'the man' fits the immediate context better than 'humankind.'
    'Adam' is possible as a name-like rendering, but at this stage of the narrative
    the common-noun sense remains prominent.
- source_word: וַיִּקְרָא ... שֵׁמוֹת
  chosen: gave names
  alternatives:
  - called names
  - named
  lexicon: HALOT
  rationale: The idiom קרא שמות means assigning names. 'Gave names' preserves the
    concrete act and reads naturally in English. 'Named' is possible, but 'gave names'
    better reflects the plural object שֵׁמוֹת.
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the domestic animals
  lexicon: HALOT
  rationale: בְּהֵמָה here denotes domesticated animals as a class. 'Livestock' is
    natural modern English and distinguishes this group from birds and wild animals.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the sky
  alternatives:
  - the birds of the heavens
  - the fowl of the air
  lexicon: HALOT
  rationale: עוֹף refers to flying creatures, commonly birds in this context. 'Birds
    of the sky' is clear, modern, and close to the Hebrew imagery.
- source_word: כֹּל חַיַּת הַשָּׂדֶה
  chosen: every wild animal
  alternatives:
  - every beast of the field
  - every animal of the field
  lexicon: HALOT
  rationale: The phrase denotes undomesticated land animals. 'Wild animal' communicates
    the contrast with livestock in accessible English. 'Beast of the field' is more
    traditional but less natural for modern readers.
- source_word: עֵזֶר
  chosen: helper
  alternatives:
  - help
  - one who helps
  lexicon: HALOT
  rationale: עֵזֶר denotes help or one who provides help. In this context, because
    it refers to a corresponding partner, 'helper' is the most idiomatic nominal rendering.
    It should not be weakened into a subordinate role; the word itself does not imply
    inferiority.
- source_word: כְּנֶגְדּוֹ
  chosen: corresponding to him
  alternatives:
  - fit for him
  - suitable for him
  - matching him
  - opposite him
  lexicon: HALOT
  rationale: כְּנֶגְדּוֹ literally carries the sense of 'according to/opposite him,'
    expressing correspondence or complementarity. 'Corresponding to him' preserves
    that relational nuance without importing modern idiom too loosely. 'Fit for him'
    is traditional but more interpretive.
- source_word: לֹא מָצָא
  chosen: was found
  alternatives:
  - he did not find
  lexicon: HALOT
  rationale: The Hebrew form is 3ms ('he found'), but English often renders this idiom
    passively here to express the result of the search among the animals. 'Was found'
    is natural and keeps the focus on the absence of a suitable helper. The active
    alternative is viable and worth preserving.
