theological_decisions:
- issue: Function of humanity's task in Eden
  chosen_reading: The verse describes the man's vocation in the garden as working and keeping it, without importing later theological categories.
  alternative_readings:
  - The verse primarily emphasizes priestly service/guarding imagery
  - The verse primarily emphasizes agricultural cultivation
  rationale: Both agricultural and possibly sanctuary-like nuances have been argued from עבד and שמר, but the verse itself does not require a specialized theological interpretation. The translation therefore keeps the ordinary lexical sense in the main text and avoids resolving a debated typological question.
  doctrine_reference: Preserve theological tension rather than resolve it.
