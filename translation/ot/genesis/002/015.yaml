id: GEN.2.15
reference: Genesis 2:15
source:
  edition: WLC
  text: וַ/יִּקַּ֛ח יְהוָ֥ה אֱלֹהִ֖ים אֶת הָֽ/אָדָ֑ם וַ/יַּנִּחֵ֣/הוּ בְ/גַן עֵ֔דֶן לְ/עָבְדָ֖/הּ וּ/לְ/שָׁמְרָֽ/הּ־־׃
translation:
  text: Then Yahweh God took the man and placed him in the garden of Eden to work it and to keep it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'placed him there to cultivate it and to guard it.' The Hebrew verbs can carry the senses 'work/cultivate' and 'keep/guard/watch over.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'placed him' can also mean 'caused him to rest' or 'settled him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In the collocation יְהוָה אֱלֹהִים, standard English is 'the LORD God.' This preserves both the covenant name and the generic divine title without awkwardness.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - humankind
  lexicon: HALOT
  rationale: Here the referent is the individual human previously formed and placed, not humanity in general. Per doctrine, gender-accurate rendering is preferred where the Hebrew is masculine and contextually specific.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took hold of
  - received
  lexicon: HALOT
  rationale: The verb לקח in this narrative context straightforwardly means 'took.' A more expansive rendering would over-interpret the action.
- source_word: וַיַּנִּחֵהוּ
  chosen: placed him
  alternatives:
  - set him down
  - caused him to rest
  - settled him
  lexicon: HALOT
  rationale: The Hiphil of נוח can mean 'cause to rest' or 'set/place.' In this context of relocation into the garden, 'placed him' best fits the immediate action while remaining natural English. The nuance of rest is possible but secondary here.
- source_word: בְּגַן עֵדֶן
  chosen: in the garden of Eden
  alternatives:
  - in Eden's garden
  lexicon: HALOT
  rationale: This is the most natural and established English rendering of the construct phrase, preserving the proper name Eden.
- source_word: לְעָבְדָהּ
  chosen: to work it
  alternatives:
  - to cultivate it
  - to serve it
  - to tend it
  lexicon: HALOT
  rationale: The verb עבד can mean 'work,' 'serve,' or in agricultural settings 'cultivate.' Because the object is the garden, 'to work it' preserves the broader Hebrew sense without narrowing it only to farming, while still sounding natural in English.
- source_word: וּלְשָׁמְרָהּ
  chosen: and to keep it
  alternatives:
  - and to guard it
  - and to watch over it
  lexicon: HALOT
  rationale: שמר commonly means 'keep, guard, watch over.' 'Keep it' is concise and traditional, and in English can include both care and protection. 'Guard it' is possible but may sound overly militarized in this setting.
