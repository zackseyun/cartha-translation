id: GEN.2.16
reference: Genesis 2:16
source:
  edition: WLC
  text: וַ/יְצַו֙ יְהוָ֣ה אֱלֹהִ֔ים עַל הָֽ/אָדָ֖ם לֵ/אמֹ֑ר מִ/כֹּ֥ל עֵֽץ הַ/גָּ֖ן אָכֹ֥ל תֹּאכֵֽל־־׃
translation:
  text: And the LORD God commanded the man, saying, “From every tree of the garden you may surely eat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “you may freely eat.” The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'you may surely eat,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - charged
  - ordered
  lexicon: HALOT
  rationale: צוה denotes giving a command or charge. 'Commanded' best reflects the authoritative force in clear modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In the compound divine designation יְהוָה אֱלֹהִים, 'God' is the standard and natural rendering.
- source_word: עַל
  chosen: to
  alternatives:
  - concerning
  - upon
  lexicon: HALOT
  rationale: With צוה and a personal object, עַל marks the person receiving the command. English idiom prefers 'commanded the man' or 'commanded the man, saying'; the sense is effectively 'to' rather than a more literal but awkward 'upon/concerning.'
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - humankind
  lexicon: HALOT
  rationale: Here הָאָדָם refers to the individual human just formed and placed in the garden, not humanity in general. Per doctrine on אָדָם, 'the man' is the gender-accurate contextual rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing direct speech; 'saying' is concise and natural.
- source_word: מִכֹּל
  chosen: from every
  alternatives:
  - from all
  - of every
  lexicon: HALOT
  rationale: 'The preposition מן with כֹּל here expresses source/selection: permission extends to every tree in the garden. ''From every'' is idiomatic with the following verb ''eat.'''
- source_word: עֵץ הַגָּן
  chosen: tree of the garden
  alternatives:
  - tree in the garden
  - garden tree
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'tree of the garden.' This preserves the Hebrew structure while remaining natural in English.
- source_word: אָכֹל תֹּאכֵל
  chosen: you may surely eat
  alternatives:
  - you shall surely eat
  - you may freely eat
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. In this context the clause grants permission rather than issuing a command to eat, so 'you may surely eat' captures both modality and emphasis. 'Freely eat' is traditional and possible, but 'surely' more transparently reflects the intensification.
