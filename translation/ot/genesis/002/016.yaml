theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for YHWH. This preserves covenantal resonance without introducing a transliterated form into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of הָאָדָם
  chosen_reading: the man
  alternative_readings:
  - the human
  - humankind
  rationale: The verse addresses the individual אדם in the narrative, not humanity generically. The translation therefore keeps the masculine singular reference rather than neutralizing it.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context); Gender-accurate over gender-neutral'
