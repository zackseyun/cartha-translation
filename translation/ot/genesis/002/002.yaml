theological_decisions:
- issue: Whether the text implies God worked during the seventh day
  chosen_reading: The English main text renders the first clause as 'By the seventh
    day God had finished his work,' indicating completion by that day rather than
    activity continuing into it.
  alternative_readings:
  - '''On the seventh day God finished his work'' as a more formally literal rendering
    of the Hebrew wording'
  rationale: The Hebrew phrase can be rendered literally as 'on the seventh day,'
    but in context this can sound contradictory with the next clause stating that
    God rested on the seventh day. Rendering the verb in English pluperfect and the
    phrase as 'by the seventh day' preserves the sense without importing a doctrinal
    claim beyond the text. The more literal wording is preserved in a footnote for
    auditability.
  doctrine_reference: Translation philosophy §§1, 3, 6
