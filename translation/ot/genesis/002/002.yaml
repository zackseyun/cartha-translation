id: GEN.2.2
reference: Genesis 2:2
source:
  edition: WLC
  text: וַ/יְכַ֤ל אֱלֹהִים֙ בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֔י מְלַאכְתּ֖/וֹ אֲשֶׁ֣ר עָשָׂ֑ה
    וַ/יִּשְׁבֹּת֙ בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֔י מִ/כָּל מְלַאכְתּ֖/וֹ אֲשֶׁ֥ר עָשָֽׂה־׃
translation:
  text: By the seventh day God had finished his work that he had done, and he rested
    on the seventh day from all his work that he had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'On the seventh day God finished his work.' The Hebrew wording
      is often rendered this way; 'By the seventh day' in the main text expresses
      the likely sense in context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְכַל
  chosen: had finished
  alternatives:
  - finished
  - completed
  lexicon: HALOT
  rationale: The verb כלה means to complete or finish. Because the clause is followed
    by 'on the seventh day' and then 'he rested on the seventh day,' English pluperfect
    ('had finished') best conveys the sense that the work was complete by the time
    the seventh day arrived, avoiding the misleading implication that God was still
    working during the seventh day.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1–2 this plural form regularly takes singular verbal agreement
    and refers to the one true God; standard English singular 'God' is required by
    the syntax and context.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: By the seventh day
  alternatives:
  - on the seventh day
  lexicon: HALOT
  rationale: Literally 'on the seventh day.' Here 'by the seventh day' is an optimal-equivalence
    rendering that reflects the temporal sense in context and harmonizes with the
    following statement that God rested on the seventh day. The literal alternative
    is preserved in a footnote because it is a notable translational option.
- source_word: מְלַאכְתּוֹ
  chosen: his work
  alternatives:
  - his labor
  - his task
  lexicon: HALOT
  rationale: מְלָאכָה denotes work, occupation, or labor. 'Work' is the most natural
    and contextually fitting English equivalent in the creation account.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had done
  alternatives:
  - which he had made
  - that he had made
  lexicon: HALOT
  rationale: עשה is a broad verb meaning do/make. 'That he had done' preserves the
    Hebrew wording closely and reads naturally in English, while avoiding unnecessary
    narrowing to material manufacture alone.
- source_word: וַיִּשְׁבֹּת
  chosen: he rested
  alternatives:
  - he ceased
  - he stopped
  lexicon: HALOT
  rationale: The verb שבת fundamentally means to cease. In this context, where cessation
    from creative work marks the sanctity of the seventh day, 'rested' is the established
    and contextually appropriate English rendering, while still implying cessation
    from labor rather than recovery from fatigue.
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - from every part of
  lexicon: HALOT
  rationale: The preposition מן with כָּל is straightforwardly rendered 'from all,'
    indicating cessation with respect to the entirety of God's work.
