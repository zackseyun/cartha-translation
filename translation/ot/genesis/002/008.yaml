id: GEN.2.8
reference: Genesis 2:8
source:
  edition: WLC
  text: וַ/יִּטַּ֞ע יְהוָ֧ה אֱלֹהִ֛ים גַּן בְ/עֵ֖דֶן מִ/קֶּ֑דֶם וַ/יָּ֣שֶׂם שָׁ֔ם
    אֶת הָֽ/אָדָ֖ם אֲשֶׁ֥ר יָצָֽר־־׃
translation:
  text: And the LORD God planted a garden in Eden, in the east, and there he put the
    man whom he had formed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eastward.' The Hebrew phrase can indicate either location ('in the east')
      or orientation/direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטַּע
  chosen: planted
  alternatives:
  - planted out
  - established
  lexicon: HALOT
  rationale: The verb נטע in this context most naturally refers to planting vegetation.
    'Planted' is the plain, idiomatic English equivalent and fits the image of a garden.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  - the Lord GOD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The compound divine designation
    is conventionally and accurately rendered 'the LORD God.'
- source_word: גַּן
  chosen: garden
  alternatives:
  - park
  - enclosure
  lexicon: HALOT
  rationale: גן denotes a garden or enclosed cultivated area. 'Garden' is the standard
    and clearest rendering in context.
- source_word: בְעֵדֶן
  chosen: in Eden
  alternatives:
  - in Eden-land
  lexicon: HALOT
  rationale: עֵדֶן is a place name here, so it is transliterated as 'Eden' in keeping
    with the policy to transliterate names.
- source_word: מִקֶּדֶם
  chosen: in the east
  alternatives:
  - eastward
  - from the east
  lexicon: HALOT
  rationale: The phrase is somewhat flexible, but in this context it most naturally
    locates the garden geographically. 'In the east' is clear modern English and reflects
    a common understanding of מקדם here. The alternative 'eastward' is possible and
    worth preserving in a footnote because the Hebrew can denote orientation as well
    as location.
- source_word: וַיָּשֶׂם
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put, place, set.' 'Put' is simple, natural
    English and sufficient here.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: 'The adverb straightforwardly indicates location: ''there.'''
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - the human being
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here the definite
    singular refers to the individual human previously formed, so 'the man' best matches
    the Hebrew and preserves the narrative linkage.
- source_word: אֲשֶׁר יָצָר
  chosen: whom he had formed
  alternatives:
  - whom he formed
  - which he had fashioned
  lexicon: HALOT
  rationale: יצר means 'form, fashion.' English past perfect ('had formed') clarifies
    the sequence relative to the planting and placing without adding content beyond
    the Hebrew narrative flow.
