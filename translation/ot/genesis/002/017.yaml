id: GEN.2.17
reference: Genesis 2:17
source:
  edition: WLC
  text: וּ/מֵ/עֵ֗ץ הַ/דַּ֨עַת֙ ט֣וֹב וָ/רָ֔ע לֹ֥א תֹאכַ֖ל מִמֶּ֑/נּוּ כִּ֗י בְּ/י֛וֹם אֲכָלְ/ךָ֥ מִמֶּ֖/נּוּ מ֥וֹת תָּמֽוּת׃
translation:
  text: but from the tree of the knowledge of good and evil you shall not eat, for in the day you eat from it, you shall surely die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the day you eat from it.'' This idiom can also mean ''when you eat from it.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'from the tree of the knowledge of good and evil you shall not eat from it'.
    reason: previous_rendering
lexical_decisions:
- source_word: וּ/מֵ/עֵץ
  chosen: but from the tree
  alternatives:
  - and from the tree
  - except from the tree
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/from the tree,' but in context it marks contrast with the prior permission in v.16, so 'but from the tree' best reflects the discourse function without over-paraphrase.
- source_word: הַדַּעַת
  chosen: the knowledge
  alternatives:
  - knowledge
  - knowing
  lexicon: HALOT
  rationale: The noun דעת denotes knowledge/knowing. With the article and construct relation to 'good and evil,' 'the knowledge' is the most natural formal rendering.
- source_word: טוֹב וָרָע
  chosen: good and evil
  alternatives:
  - good and bad
  lexicon: HALOT
  rationale: This is the standard merism and moral/discernment pair in Hebrew. 'Evil' preserves the theological and moral weight better than the flatter 'bad.'
- source_word: לֹא תֹאכַל
  chosen: you shall not eat
  alternatives:
  - you must not eat
  - do not eat
  lexicon: HALOT
  rationale: The imperfect with negation in this prohibition is well represented by 'you shall not eat.' 'Must not' is possible, but 'shall not' preserves the solemn legal force and traditional cadence while remaining clear.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - of it
  lexicon: HALOT
  rationale: The preposition מן is explicitly present, so 'from it' is more formally accurate than the idiomatic English 'of it.' Retaining it also mirrors the repeated Hebrew phrasing.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - for indeed
  lexicon: HALOT
  rationale: Here כי introduces the ground for the prohibition. 'For' is concise and natural in English.
- source_word: בְּיוֹם
  chosen: in the day
  alternatives:
  - when
  - on the day
  lexicon: HALOT
  rationale: The Hebrew idiom can mean 'when,' but 'in the day' preserves the source wording and leaves the temporal force slightly open, which is important in light of later interpretive discussion.
- source_word: אֲכָלְךָ
  chosen: you eat
  alternatives:
  - your eating
  - when you eat
  lexicon: HALOT
  rationale: 'The infinitive construct with suffix after ביום functions temporally: ''in the day you eat.'' This is smoother and more idiomatic than a wooden nominal rendering.'
- source_word: מוֹת תָּמוּת
  chosen: you shall surely die
  alternatives:
  - dying you shall die
  - you will certainly die
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the certainty of death. 'You shall surely die' is the standard and accurate English equivalent, preserving both solemnity and emphasis.
