id: GEN.2.6
reference: Genesis 2:6
source:
  edition: WLC
  text: וְ/אֵ֖ד יַֽעֲלֶ֣ה מִן הָ/אָ֑רֶץ וְ/הִשְׁקָ֖ה אֶֽת כָּל פְּנֵֽי הָֽ/אֲדָמָֽה־־־־׃
translation:
  text: But a mist would rise from the earth and water the whole surface of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stream' or 'flow'; the Hebrew term is rare and may refer to water welling
      up from the earth rather than mist in the air.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵד
  chosen: But a mist
  alternatives:
  - and a mist
  - stream
  - flow
  lexicon: HALOT, BDB
  rationale: אֵד is rare and contextually debated. Traditional English often has 'mist,'
    which fits something rising from the earth. Some argue for 'stream' or subterranean
    flow because of the watering function, but the immediate verb 'would rise' naturally
    supports an atmospheric or vapor-like phenomenon. The conjunction וְ is rendered
    'But' to mark contrast with the previous statement that rain had not yet fallen.
- source_word: יַעֲלֶה
  chosen: would rise
  alternatives:
  - rose
  - went up
  - used to rise
  lexicon: HALOT, BDB
  rationale: Qal imperfect of עלה denotes ascending. 'Would rise' captures the imperfect
    in a past descriptive setting, expressing customary or characteristic action better
    than a simple preterite.
- source_word: מִן הָ/אָ֑רֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT, BDB
  rationale: אֶרֶץ can mean 'earth' or 'land.' Here 'earth' best matches the broad
    creation setting and pairs naturally with the rising of the mist.
- source_word: וְ/הִשְׁקָה
  chosen: and water
  alternatives:
  - and watered
  - and irrigate
  lexicon: HALOT, BDB
  rationale: Hiphil of שקה means 'give drink, water.' Rendering it as 'water' after
    'would rise' preserves the same descriptive/imperfective sense in English. 'Irrigate'
    is too technical.
- source_word: אֶת כָּל פְּנֵי
  chosen: the whole surface of
  alternatives:
  - all the face of
  - the entire face of
  lexicon: HALOT, BDB
  rationale: The idiom 'all the face of' refers to the visible extent or surface.
    'The whole surface of' is natural modern English while preserving the spatial
    sense.
- source_word: הָֽ/אֲדָמָֽה
  chosen: the ground
  alternatives:
  - the soil
  - the land
  lexicon: HALOT, BDB
  rationale: אֲדָמָה often denotes arable ground or soil, distinct from אֶרֶץ in the
    same verse. 'Ground' preserves that distinction better than repeating 'earth'
    or using the narrower 'soil'.
