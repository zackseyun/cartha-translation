theological_decisions:
- issue: Interpretation of אֵד
  chosen_reading: mist
  alternative_readings:
  - stream
  - flow
  rationale: The verse is descriptive of pre-rain watering in Eden. Because אֵד is
    lexically uncertain, the main text adopts 'mist' as the most straightforward reading
    with the upward motion of the verb, while preserving the hydrological alternative
    in a footnote rather than overstating certainty.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
