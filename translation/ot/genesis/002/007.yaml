id: GEN.2.7
reference: Genesis 2:7
source:
  edition: WLC
  text: וַ/יִּיצֶר֩ יְהוָ֨ה אֱלֹהִ֜ים אֶת הָֽ/אָדָ֗ם עָפָר֙ מִן הָ֣/אֲדָמָ֔ה וַ/יִּפַּ֥ח בְּ/אַפָּ֖י/ו נִשְׁמַ֣ת חַיִּ֑ים וַֽ/יְהִ֥י הָֽ/אָדָ֖ם לְ/נֶ֥פֶשׁ חַיָּֽה־־׃
translation:
  text: Then Yahweh God formed the man from the dust of the ground, and breathed into his nostrils the breath of life, and the man became a living being.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a living being'; traditionally, 'a living soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from dust taken from the ground'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name in conventional English small-caps style rather than transliteration.
- source_word: אֱלֹהִים
  chosen: God
  rationale: In apposition with יְהוָה, this functions as the common divine title, yielding the standard compound expression 'the LORD God'.
- source_word: וַיִּיצֶר
  chosen: formed
  alternatives:
  - fashioned
  - shaped
  lexicon: HALOT
  rationale: יצר commonly denotes forming or shaping, especially like a potter. 'Formed' is natural English and preserves the concrete, hands-on imagery without over-paraphrasing.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - the human
  - humankind
  lexicon: HALOT
  rationale: Here the term refers to the individual human being being fashioned in the narrative, not humanity in the abstract. Per doctrine, a gender-accurate rendering is preferred where the source intends it. The wordplay with אֲדָמָה is preserved by rendering the next term 'ground' rather than changing this to 'human'.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - loose soil
  - dry earth
  lexicon: HALOT
  rationale: The standard sense is dust or loose earth. 'Dust' preserves both the physical image and the broader biblical resonance of human frailty.
- source_word: מִן הָאֲדָמָה
  chosen: from the ground
  alternatives:
  - from the soil
  - from the earth
  lexicon: HALOT
  rationale: אֲדָמָה is best rendered 'ground' here. This keeps the wordplay with אָדָם partially visible ('man' / 'ground') and fits the immediate image of material taken from the earth.
- source_word: בְּאַפָּיו
  chosen: into his nostrils
  alternatives:
  - into his nose
  lexicon: HALOT
  rationale: Though singular/plural nuances can be discussed, idiomatic English for the Hebrew expression is 'into his nostrils,' preserving the bodily concreteness of the act.
- source_word: נִשְׁמַת חַיִּים
  chosen: the breath of life
  alternatives:
  - the breath of lives
  - life-breath
  lexicon: HALOT
  rationale: The construct phrase is idiomatically rendered 'breath of life.' The plural חַיִּים functions as an abstract/intensive expression in Hebrew; 'breath of life' is clear and faithful.
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - came to be
  - was
  lexicon: HALOT
  rationale: 'With לְ following, היה expresses transition into a state: ''became'' is the most natural and precise English rendering.'
- source_word: לְנֶפֶשׁ חַיָּה
  chosen: a living creature
  alternatives:
  - a living being
  - a living soul
  lexicon: HALOT
  rationale: נֶפֶשׁ does not here denote an immaterial soul as distinct from body; the phrase describes the whole animate being. 'Living creature' is faithful to Hebrew usage, including its use for animals elsewhere, and avoids importing later anthropological dualism. 'Living being' is also possible, but 'creature' better reflects the lexical range.
