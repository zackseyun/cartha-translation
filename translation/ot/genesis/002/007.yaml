  from: from dust taken from the ground
  to: of dust from the ground
  rationale: The current rendering adds the word 'taken,' which is not present in the Hebrew text and makes the phrasing slightly clunky. The Hebrew uses an appositional structure ('...the man, dust from the ground...') to describe the material of which he was made. A more direct rendering like 'of dust from the ground' or the common 'from the dust of the ground' better reflects this syntax without adding an interpretive verb.
