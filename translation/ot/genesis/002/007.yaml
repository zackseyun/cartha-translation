theological_decisions:
- issue: Rendering of הָאָדָם in relation to human representation and gender
  chosen_reading: the man
  alternative_readings:
  - the human
  - humankind
  rationale: At this point in the narrative the referent is the individual human formed by God, so 'the man' best matches the grammar and discourse context. This follows the project's gender-accurate principle while not denying that Adam can elsewhere carry representative force for humanity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Rendering of לְנֶפֶשׁ חַיָּה
  chosen_reading: a living creature
  alternative_readings:
  - a living being
  - a living soul
  rationale: The Hebrew phrase refers to an animate living being, not specifically to a separable immaterial component. Rendering it 'living soul' could suggest a theological anthropology not demanded by the text. The chosen wording preserves the text's concrete description and theological tension.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
