  from: that is eaten
  to: that is edible
  rationale: The Hebrew Niphal imperfect יֵאָכֵל describes a category of food suitable for consumption. The current rendering 'that is eaten' is slightly awkward in English, as it can imply a present continuous action. 'That is edible' or 'that can be eaten' (as noted in the footnote) more naturally and accurately conveys the sense of suitability for eating.
