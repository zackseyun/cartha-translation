id: GEN.6.21
reference: Genesis 6:21
source:
  edition: WLC
  text: וְ/אַתָּ֣ה קַח לְ/ךָ֗ מִ/כָּל מַֽאֲכָל֙ אֲשֶׁ֣ר יֵֽאָכֵ֔ל וְ/אָסַפְתָּ֖ אֵלֶ֑י/ךָ וְ/הָיָ֥ה לְ/ךָ֛ וְ/לָ/הֶ֖ם לְ/אָכְלָֽה־־׃
translation:
  text: And you, take for yourself some of every kind of food that is edible, and gather it to yourself; and it shall be food for you and for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that may be eaten' or 'that is edible.' The Hebrew relative clause can be understood as describing food suitable for eating.
    reason: lexical_alternative
  - marker: b
    text: Or 'that is eaten'.
    reason: previous_rendering
lexical_decisions:
- source_word: קַח
  chosen: take
  alternatives:
  - get
  - bring
  lexicon: HALOT
  rationale: Qal imperative of לקח commonly means 'take.' 'Take' preserves the directness of the command better than looser options like 'get.'
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - to yourself
  lexicon: HALOT
  rationale: The dative pronoun after the imperative is naturally reflexive/benefactive here. 'For yourself' brings out Noah's personal responsibility in the command.
- source_word: מִכָּל מַאֲכָל
  chosen: some of every kind of food
  alternatives:
  - of all food
  - from every food
  lexicon: HALOT
  rationale: מִן + כָּל with מַאֲכָל indicates selection from the full range of edible provisions. 'Some of every kind of food' communicates comprehensiveness without implying he must take absolutely all existing food.
- source_word: מַאֲכָל
  chosen: food
  alternatives:
  - provision
  - something to eat
  lexicon: HALOT
  rationale: The noun denotes food/that which is eaten. 'Food' is the most natural modern English equivalent.
- source_word: אֲשֶׁר יֵאָכֵל
  chosen: that is eaten
  alternatives:
  - which may be eaten
  - that is edible
  lexicon: HALOT
  rationale: The relative clause with Niphal of אכל is most straightforwardly rendered 'that is eaten.' This can imply edibility, but the Hebrew wording is closer to actual consumption than the abstract adjective 'edible.'
- source_word: וְאָסַפְתָּ אֵלֶיךָ
  chosen: and gather it to yourself
  alternatives:
  - and store it up with you
  - and collect it for yourself
  lexicon: HALOT
  rationale: אָסַף means gather/collect. 'Gather it to yourself' stays close to the Hebrew wording, including אֵלֶיךָ, while remaining understandable English.
- source_word: וְהָיָה
  chosen: and it shall be
  alternatives:
  - and it will be
  - so that it may be
  lexicon: HALOT
  rationale: The perfect with vav here carries a future/result sense in the sequence of commands. 'It shall be' fits the formal tone and the resulting state.
- source_word: לְךָ וְלָהֶם
  chosen: for you and for them
  alternatives:
  - for you and them
  lexicon: HALOT
  rationale: The repeated preposition is represented in English for clarity and rhythm, preserving the distinction between Noah and the animals.
- source_word: לְאָכְלָה
  chosen: food
  alternatives:
  - for eating
  - for consumption
  lexicon: HALOT
  rationale: Although literally 'for eating,' idiomatic English in this context is 'food.' This avoids awkwardness while preserving the purpose of the stored provisions.
