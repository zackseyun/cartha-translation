id: GEN.6.12
reference: Genesis 6:12
source:
  edition: WLC
  text: וַ/יַּ֧רְא אֱלֹהִ֛ים אֶת הָ/אָ֖רֶץ וְ/הִנֵּ֣ה נִשְׁחָ֑תָה כִּֽי הִשְׁחִ֧ית
    כָּל בָּשָׂ֛ר אֶת דַּרְכּ֖/וֹ עַל הָ/אָֽרֶץ־־־־־׃ס
translation:
  text: And God saw the earth, and behold, it was ruined, because all flesh had ruined
    its way on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it was corrupted'; the Hebrew verb can denote moral corruption as well
      as ruin or destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'all flesh had corrupted its way on the earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked upon
  - observed
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form is straightforwardly
    'saw.' 'Saw' preserves the narrative cadence and avoids adding evaluative nuance
    beyond the Hebrew.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context אֱלֹהִים refers to the one true God, so 'God' is the
    natural English rendering.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In the flood narrative, the scope is cosmic rather than local, so 'the
    earth' best fits the context. 'Land' is possible lexically but too narrow here.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and see
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention to what is seen. 'Behold' preserves the
    discourse force and solemnity better than flatter options.
- source_word: נִשְׁחָתָה
  chosen: was ruined
  alternatives:
  - was corrupted
  - was destroyed
  lexicon: HALOT
  rationale: The Niphal of שׁחת here describes the earth as having become spoiled/ruined.
    'Was ruined' captures the resultant state without prematurely narrowing it to
    moral corruption alone. 'Was corrupted' is traditional and plausible, but in English
    it can sound exclusively moral; the Hebrew likely includes both moral and creational
    ruin.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי introduces the reason for the preceding assessment. 'Because' is
    clear modern English.
- source_word: הִשְׁחִית
  chosen: had ruined
  alternatives:
  - had corrupted
  - had destroyed
  lexicon: HALOT
  rationale: 'Using ''had ruined'' maintains lexical consistency with נִשְׁחָתָה from
    the same root שׁחת while reflecting the causative Hiphil sense: humanity had brought
    ruin upon its way. The pluperfect fits the explanatory clause in English narrative
    style.'
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all humanity
  - every living creature
  lexicon: HALOT
  rationale: '''All flesh'' is the most transparent rendering and preserves the Hebrew
    idiom. In this immediate context it likely focuses on living creatures on earth,
    especially humankind in its corruption, but the idiom should be retained rather
    than interpreted away.'
- source_word: דַּרְכּוֹ
  chosen: its way
  alternatives:
  - its path
  - its conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ often means 'way' literally or figuratively. Here it refers to
    manner of life/conduct, but 'way' preserves the Hebrew metaphor while remaining
    intelligible. The singular suffix after כָּל־בָּשָׂר is naturally rendered distributively
    in English as collective 'its' with the collective singular 'all flesh'.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - in the land
  lexicon: HALOT
  rationale: '''On the earth'' is the natural rendering and matches the broader flood
    context.'
