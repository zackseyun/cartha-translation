theological_decisions:
- issue: Semantic force of שׁחת in both clauses
  chosen_reading: Render with 'ruined'/'had ruined' to preserve both moral corruption
    and resulting devastation.
  alternative_readings:
  - was corrupted ... had corrupted
  - was destroyed ... had destroyed
  rationale: The repeated root ties the condition of the earth to the action of all
    flesh. 'Ruined' keeps the lexical repetition visible in English and avoids reducing
    the term to either purely moral corruption or purely physical destruction. This
    preserves the theological connection between creaturely corruption and cosmic
    ruin without over-specifying.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §3
    (preserve tension rather than resolve it)
- issue: Scope of כָּל בָּשָׂר
  chosen_reading: Retain the idiom 'all flesh' in the main text.
  alternative_readings:
  - all humanity
  - every living creature
  rationale: The phrase can be interpreted more narrowly or broadly in context, but
    the Hebrew idiom itself should be preserved in translation rather than resolved
    interpretively. This maintains the text's breadth and leaves contextual interpretation
    open.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
