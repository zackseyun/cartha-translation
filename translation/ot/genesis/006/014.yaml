id: GEN.6.14
reference: Genesis 6:14
source:
  edition: WLC
  text: עֲשֵׂ֤ה לְ/ךָ֙ תֵּבַ֣ת עֲצֵי גֹ֔פֶר קִנִּ֖ים תַּֽעֲשֶׂ֣ה אֶת הַ/תֵּבָ֑ה וְ/כָֽפַרְתָּ֥
    אֹתָ֛/הּ מִ/בַּ֥יִת וּ/מִ/ח֖וּץ בַּ/כֹּֽפֶר־־׃
translation:
  text: Make yourself an ark of gopher wood; make rooms in the ark, and cover it inside
    and outside with pitch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cypress wood'; the Hebrew term 'gopher' occurs only here, so the exact
      kind of wood is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'compartments'; literally 'nests.'
    reason: lexical_alternative
  - marker: c
    text: Or 'coat it' or 'seal it' ... 'with bitumen/tar.' The Hebrew uses related
      words for the act of covering and the coating material.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּבַת
  chosen: ark
  alternatives:
  - box
  - chest
  lexicon: HALOT
  rationale: Though the noun can denote a box-like vessel, in Genesis 6 the established
    referent is the large vessel Noah is commanded to build. 'Ark' is the most natural
    English rendering here and preserves intertextual continuity with Genesis 6–9
    and Exodus 2, while still reflecting the distinct Hebrew term from ordinary 'ship.'
- source_word: עֲצֵי גֹפֶר
  chosen: gopher wood
  alternatives:
  - cypress wood
  - resinous wood
  lexicon: HALOT
  rationale: גֹפֶר is a rare term of uncertain identification. Because the exact species
    is unknown, transliterating as 'gopher' is more transparent and auditable than
    selecting a conjectural species such as 'cypress.' 'Wood' is supplied from עֲצֵי
    ('woods/wood of').
- source_word: קִנִּים
  chosen: rooms
  alternatives:
  - nests
  - compartments
  - cells
  lexicon: HALOT
  rationale: The plural literally relates to 'nests,' but in this construction it
    refers to partitioned spaces within the vessel. 'Rooms' gives clear modern English
    while staying close to the architectural sense; 'compartments' is possible but
    slightly more technical.
- source_word: וְכָפַרְתָּ
  chosen: cover it
  alternatives:
  - coat it
  - seal it
  lexicon: HALOT
  rationale: The verb כפר in this non-cultic context means to cover or coat. 'Cover
    it' is the most direct rendering, and the following phrase 'with pitch' clarifies
    the material and purpose. 'Seal it' captures function but is more interpretive.
- source_word: בַּכֹּפֶר
  chosen: with pitch
  alternatives:
  - with bitumen
  - with tar
  lexicon: HALOT
  rationale: In this context כֹּפֶר denotes a coating substance used to waterproof
    the ark. 'Pitch' is standard, readable English and fits the construction with
    the verb 'cover.' 'Bitumen' is possible but more technical; 'tar' may be too specific.
- source_word: מִבַּיִת וּמִחוּץ
  chosen: inside and outside
  alternatives:
  - from the inside and from the outside
  - within and without
  lexicon: HALOT
  rationale: The paired prepositional phrases indicate the ark is to be coated on
    both interior and exterior surfaces. 'Inside and outside' is idiomatic modern
    English and accurately conveys the scope.
- source_word: עֲשֵׂה לְךָ
  chosen: Make yourself
  alternatives:
  - Make for yourself
  - Build yourself
  lexicon: HALOT
  rationale: The imperative plus לְךָ has the sense 'make for yourself.' 'Make yourself'
    is concise and idiomatic in English. 'Build' would fit the context but narrows
    the broader Hebrew verb עשה beyond necessity.
- source_word: תַּעֲשֶׂה אֶת־הַתֵּבָה
  chosen: make rooms in the ark
  alternatives:
  - make the ark with rooms
  - make compartments in the ark
  lexicon: HALOT
  rationale: The Hebrew sequence is literally 'nests/rooms you shall make the ark.'
    In English, the sense is best expressed by attaching the object 'rooms' to the
    action within the ark. This is a modest restructuring for clarity consistent with
    optimal equivalence.
