theological_decisions:
- issue: Identity of 'the sons of God'
  chosen_reading: Retain the literal phrase 'the sons of God' without interpretive
    expansion.
  alternative_readings:
  - angelic beings
  - royal rulers
  - the godly line of Seth
  rationale: The Hebrew phrase is ambiguous in this context, and the translation should
    preserve theological tension rather than resolve a debated interpretation not
    unambiguously settled by the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of הַנְּפִלִים
  chosen_reading: Transliterate as 'Nephilim' in the main text.
  alternative_readings:
  - giants
  - fallen ones
  rationale: The term's meaning is uncertain and contested. Transliteration avoids
    importing a specific interpretation into the text while allowing traditional alternatives
    to be noted in a footnote.
  doctrine_reference: Translation philosophy §1 and §3 (original-language primacy;
    preserve ambiguity where genuine)
- issue: Rendering of אָדָם in 'daughters of man'
  chosen_reading: Use 'man' with collective sense rather than a gender-neutral paraphrase.
  alternative_readings:
  - humankind
  - men
  rationale: This follows the project's gender-accurate principle and preserves the
    singular collective force of the Hebrew while remaining understandable in context.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
