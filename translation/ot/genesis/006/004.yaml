id: GEN.6.4
reference: Genesis 6:4
source:
  edition: WLC
  text: הַ/נְּפִלִ֞ים הָי֣וּ בָ/אָרֶץ֮ בַּ/יָּמִ֣ים הָ/הֵם֒ וְ/גַ֣ם אַֽחֲרֵי כֵ֗ן
    אֲשֶׁ֨ר יָבֹ֜אוּ בְּנֵ֤י הָֽ/אֱלֹהִים֙ אֶל בְּנ֣וֹת הָֽ/אָדָ֔ם וְ/יָלְד֖וּ לָ/הֶ֑ם
    הֵ֧מָּה הַ/גִּבֹּרִ֛ים אֲשֶׁ֥ר מֵ/עוֹלָ֖ם אַנְשֵׁ֥י הַ/שֵּֽׁם־־׃פ
translation:
  text: The Nephilim were on the earth in those days—and also afterward—when the sons
    of God came in to the daughters of man, and they bore children to them. Those
    were the mighty men who were of old, men of renown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'the giants.' The Hebrew term 'Nephilim' is rare and its
      precise sense is uncertain.
    reason: alternative_reading
  - marker: b
    text: '''Sons of God'' may also be understood as ''divine beings'' or, in some
      interpretations, human rulers or the godly line of Seth.'
    reason: alternative_reading
  - marker: c
    text: '''Daughters of man'' uses ''man'' in a collective sense, that is, human
      women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּפִלִים
  chosen: the Nephilim
  alternatives:
  - the fallen ones
  - the giants
  lexicon: HALOT
  rationale: Transliterated because the term is rare and its precise sense is disputed;
    translating it as 'giants' overstates one interpretive tradition, while 'fallen
    ones' assumes an etymology not certain from context. A footnote preserves the
    traditional alternative.
- source_word: בָאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: '''Earth'' is the broader and more natural sense in the primeval-history
    context, though ''land'' is lexically possible.'
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  lexicon: HALOT
  rationale: Standard temporal idiom; straightforwardly rendered.
- source_word: וְגַם אַחֲרֵי כֵן
  chosen: and also afterward
  alternatives:
  - and even after that
  lexicon: HALOT
  rationale: Keeps the additive force of וְגַם and the temporal sense of אַחֲרֵי כֵן
    in natural English.
- source_word: אֲשֶׁר יָבֹאוּ
  chosen: when ... came in
  alternatives:
  - whenever ... came in
  - after ... came in
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces the circumstance/time in which the preceding statement
    applies. 'When' best captures the clause linkage in readable English. 'Came in
    to' preserves the idiomatic sexual sense without paraphrasing beyond the Hebrew.
- source_word: בְּנֵי הָאֱלֹהִים
  chosen: the sons of God
  alternatives:
  - the sons of the gods
  - divine beings
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew expression and its
    interpretive openness. It avoids prematurely resolving whether the referent is
    angelic, royal, or godly human. Alternatives are preserved in a footnote because
    the phrase is heavily contested.
- source_word: בְּנוֹת הָאָדָם
  chosen: the daughters of man
  alternatives:
  - the daughters of humankind
  - the daughters of men
  lexicon: HALOT
  rationale: Follows the singular collective force of אָדָם and the project's gender-accurate
    principle. 'Man' here functions collectively; a footnote notes the inclusive sense.
- source_word: וְיָלְדוּ לָהֶם
  chosen: they bore children to them
  alternatives:
  - they bore to them
  - they had children by them
  lexicon: HALOT
  rationale: Makes explicit the implied object 'children' in idiomatic English while
    retaining the Hebrew sense and the indirect object 'to them.'
- source_word: הֵמָּה
  chosen: Those were
  alternatives:
  - These were
  - They were
  lexicon: HALOT
  rationale: Resumptive pronoun introducing identification of the preceding group;
    'Those were' reads naturally in English narrative.
- source_word: הַגִּבֹּרִים
  chosen: the mighty men
  alternatives:
  - the mighty ones
  - the warriors
  - the heroes
  lexicon: HALOT
  rationale: '''Mighty men'' preserves the masculine plural and broad semantic range
    of גִּבּוֹר without narrowing it to military ''warriors'' or idealizing it as
    ''heroes.'''
- source_word: מֵעוֹלָם
  chosen: of old
  alternatives:
  - from ancient times
  - from long ago
  lexicon: HALOT
  rationale: Idiomatic English for an expression denoting antiquity in this context.
- source_word: אַנְשֵׁי הַשֵּׁם
  chosen: men of renown
  alternatives:
  - men of the name
  - famous men
  lexicon: HALOT
  rationale: An idiomatic rendering of a Hebrew expression for reputation or fame.
    'Men of renown' preserves the elevated tone better than the flatter 'famous men.'
