theological_decisions:
- issue: Anthropopathic language about God ('regretted' / 'was grieved')
  chosen_reading: Retain the text's direct portrayal of the LORD as regretting and grieving, without softening it into mere appearance-language.
  alternative_readings:
  - The LORD appeared to regret
  - The LORD relented
  rationale: Per the translation philosophy, theological tension should be preserved rather than resolved. The Hebrew explicitly attributes regret and grief to the LORD in human-relational terms. Rendering this directly respects the text while avoiding the doctrinally misleading English 'repented.'
  doctrine_reference: Translation philosophy §3; Affirmations (historic orthodoxy without flattening textual tension)
- issue: Collective sense of הָאָדָם
  chosen_reading: Render as 'man' in the representative/generic sense.
  alternative_readings:
  - humankind
  - humanity
  rationale: The context concerns the human race broadly. The project's policy prefers gender-accurate renderings matching the source's representative force rather than flattening to gender-neutral language by default.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
revisions:
