id: GEN.6.6
reference: Genesis 6:6
source:
  edition: WLC
  text: וַ/יִּנָּ֣חֶם יְהוָ֔ה כִּֽי עָשָׂ֥ה אֶת הָֽ/אָדָ֖ם בָּ/אָ֑רֶץ וַ/יִּתְעַצֵּ֖ב אֶל לִבּֽ/וֹ־־־׃
translation:
  text: And the LORD regretted that he had made man on the earth, and he was grieved in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'humanity.' Hebrew 'adam' here refers collectively to the human race.
    reason: lexical_alternative
  - marker: b
    text: Or 'was sorry.' The Hebrew expresses divine regret or sorrow, not moral repentance.
    reason: lexical_alternative
  - marker: c
    text: Or 'to his heart'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּנָּחֶם
  chosen: regretted
  alternatives:
  - was sorry
  - relented
  - repented
  lexicon: HALOT
  rationale: In the Niphal, נחם here expresses divine regret/sorrow over a prior action rather than a change of moral fault. 'Regretted' is idiomatic modern English and avoids the misleading implication in 'repented' that God sinned. 'Relented' fits contexts of withdrawing announced judgment better than this context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content/cause of the regret. English 'that' after 'regretted' reads naturally while preserving the sense.
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - had done
  lexicon: HALOT
  rationale: Refers to God's prior act of creating humanity; English past perfect clarifies the temporal relation after 'regretted.'
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the man
  - humanity
  lexicon: HALOT
  rationale: אָדָם here is collective for the human race, not the individual Adam alone. Per the project's gender-accurate policy, 'man' can represent humanity in English when the source has representative force. 'Humankind' is possible, but 'made man on the earth' preserves the cadence and traditional collective sense.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - in the land
  lexicon: HALOT
  rationale: In Genesis this commonly refers to the earth/world rather than a specific land. 'On the earth' is the most natural English rendering here.
- source_word: וַיִּתְעַצֵּב
  chosen: was grieved
  alternatives:
  - was pained
  - was hurt
  - was saddened
  lexicon: HALOT
  rationale: The Hitpael of עצב conveys deep emotional pain or grief. 'Was grieved' is clear, weighty, and fits the parallel with divine regret.
- source_word: אֶל־לִבּוֹ
  chosen: to his heart
  alternatives:
  - in his heart
  - at his heart
  lexicon: HALOT
  rationale: The Hebrew preposition אֶל is literally 'to,' and the phrase conveys inward, profound grief. 'To his heart' preserves the Hebrew imagery more closely than the smoother but less literal 'in his heart.'
