id: GEN.6.2
reference: Genesis 6:2
source:
  edition: WLC
  text: וַ/יִּרְא֤וּ בְנֵי הָֽ/אֱלֹהִים֙ אֶת בְּנ֣וֹת הָֽ/אָדָ֔ם כִּ֥י טֹבֹ֖ת הֵ֑נָּה
    וַ/יִּקְח֤וּ לָ/הֶם֙ נָשִׁ֔ים מִ/כֹּ֖ל אֲשֶׁ֥ר בָּחָֽרוּ־־׃
translation:
  text: the sons of God saw that the daughters of man were good-looking, and they
    took wives for themselves from any they chose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the divine beings'; the identity of 'the sons of God' is debated, with
      major interpretations including heavenly beings, human rulers, or the line of
      Seth.
    reason: alternative_reading
  - marker: b
    text: Or 'were beautiful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הָאֱלֹהִים
  chosen: the sons of God
  alternatives:
  - the divine beings
  - the sons of the gods
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew expression without resolving
    the debated identity of the referents. 'Sons of God' is the most transparent and
    auditable English equivalent of the construct phrase.
- source_word: בְּנוֹת הָאָדָם
  chosen: the daughters of man
  alternatives:
  - the daughters of humankind
  - the daughters of men
  lexicon: HALOT
  rationale: The phrase is the counterpart to 'sons of God.' Given the doctrine's
    guidance on אָדָם, 'man' is retained as a gender-accurate singular collective
    here rather than flattened to a more interpretive plural. This also preserves
    the literary contrast in the Hebrew.
- source_word: כִּי טֹבֹת הֵנָּה
  chosen: were good-looking
  alternatives:
  - were beautiful
  - were good
  lexicon: HALOT
  rationale: In this context טוֹב describes the attractiveness that motivates the
    taking of wives. 'Good-looking' communicates the likely sense in natural modern
    English while avoiding the broader and potentially misleading moral sense of 'good.'
    'Beautiful' is possible, but 'good-looking' stays closer to the lexical range
    of טוב.
- source_word: וַיִּקְחוּ לָהֶם נָשִׁים
  chosen: they took wives for themselves
  alternatives:
  - they took women for themselves
  - they married women for themselves
  lexicon: HALOT
  rationale: נָשִׁים can mean 'women' or 'wives'; in this collocation with לקח plus
    the following selection formula, 'took wives' is the standard and contextually
    appropriate sense. 'For themselves' preserves לָהֶם.
- source_word: מִכֹּל אֲשֶׁר בָּחָרוּ
  chosen: from any they chose
  alternatives:
  - whomever they chose
  - from all whom they chose
  lexicon: HALOT
  rationale: This rendering preserves the distributive force of מִכֹּל while remaining
    idiomatic in English. It conveys unrestricted selection without adding interpretive
    material.
