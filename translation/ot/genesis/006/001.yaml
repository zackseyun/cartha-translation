theological_decisions:
- issue: Rendering of הָאָדָם in a generic-humanity context
  chosen_reading: man
  alternative_readings:
  - humankind
  - mankind
  rationale: The Hebrew is grammatically singular with collective force, referring
    to humanity in general rather than a single male individual. Following the doctrine's
    gender-accurate principle and the contested-terms guidance for אָדָם, 'man' is
    retained in the main text as matching the source's representative sense, while
    an inclusive alternative is preserved in a footnote for clarity.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
