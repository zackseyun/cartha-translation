id: GEN.6.1
reference: Genesis 6:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כִּֽי הֵחֵ֣ל הָֽ/אָדָ֔ם לָ/רֹ֖ב עַל פְּנֵ֣י הָֽ/אֲדָמָ֑ה וּ/בָנ֖וֹת
    יֻלְּד֥וּ לָ/הֶֽם־־׃
translation:
  text: And it happened, when man began to multiply on the face of the ground, and
    daughters were born to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "humankind began to multiply." The Hebrew הָאָדָם is singular but collective
      here, referring to humanity in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development in the story.
    'And it happened' preserves the discourse function without archaic English.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - as
  lexicon: HALOT
  rationale: Here כִּי introduces a temporal clause following ויהי; 'when' best reflects
    the syntax in natural English.
- source_word: הֵחֵל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: Hiphil of חלל/החל in this construction means 'to begin.' 'Began' is standard
    and suitably formal.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  - the man
  lexicon: HALOT
  rationale: In this context האדם is collective/generic rather than referring to the
    individual Adam. Per doctrine, gender-accurate rendering is preferred; 'man' here
    carries representative humanity. Inclusive alternative is worth preserving in
    a footnote because modern readers may hear it as male-only.
- source_word: לָרֹב
  chosen: to multiply
  alternatives:
  - to become many
  - to increase
  lexicon: HALOT
  rationale: Infinitive construct of רבה after החל expresses the beginning of numerical
    increase. 'To multiply' is idiomatic and preserves the sense of population growth.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the ground
  alternatives:
  - upon the face of the earth
  - over the surface of the land
  lexicon: HALOT
  rationale: The idiom על פני means 'on the face/surface of.' אדמה is more specifically
    'ground' than the broader 'earth,' and this wording preserves the Hebrew imagery.
- source_word: וּבָנוֹת
  chosen: and daughters
  alternatives:
  - and female children
  lexicon: HALOT
  rationale: Straightforward nominal rendering. 'Daughters' is the natural equivalent
    and sets up the next verse's focus.
- source_word: יֻלְּדוּ לָהֶם
  chosen: were born to them
  alternatives:
  - were borne to them
  - were born to these people
  lexicon: HALOT
  rationale: Passive of ילד with ל marks children being born to the human population.
    'Were born to them' is natural and sufficiently literal.
