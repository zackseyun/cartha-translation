  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה as 'the LORD' in continuity with Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of אָדָם in a generic/collective sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The verse speaks of humanity collectively, but the doctrine calls for gender-accurate rendering over gender-neutral where the source uses masculine representative language. The inclusive alternative is preserved in a footnote because it is contextually relevant.
