id: GEN.6.5
reference: Genesis 6:5
source:
  edition: WLC
  text: וַ/יַּ֣רְא יְהוָ֔ה כִּ֥י רַבָּ֛ה רָעַ֥ת הָ/אָדָ֖ם בָּ/אָ֑רֶץ וְ/כָל יֵ֨צֶר֙ מַחְשְׁבֹ֣ת לִבּ֔/וֹ רַ֥ק רַ֖ע כָּל הַ/יּֽוֹם־־׃
translation:
  text: And Yahweh saw that the wickedness of man was great on the earth, and that every inclination of the thoughts of his heart was only evil all the day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wickedness of humankind was great on the earth.' Hebrew 'man' (אָדָם) here refers collectively to humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'was continually evil.' The Hebrew literally reads 'was only evil all the day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: And ... saw
  alternatives:
  - Then ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline; 'And ... saw' preserves Hebrew narrative sequencing without overinterpreting temporal nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רַבָּה
  chosen: was great
  alternatives:
  - was רבה/many
  - had become great
  - was abundant
  lexicon: HALOT
  rationale: With רָעַת, the adjective expresses magnitude/intensity. 'Was great' is idiomatic and preserves the Hebrew emphasis on the extent of human evil.
- source_word: רָעַת הָאָדָם
  chosen: the wickedness of man
  alternatives:
  - the evil of man
  - the wickedness of humankind
  lexicon: HALOT
  rationale: The noun phrase denotes moral evil/corruption rather than merely misfortune. 'Wickedness' best captures ethical depravity. 'Man' follows the doctrine's gender-accurate principle for אָדָם where representative humanity is in view; an inclusive alternative is worth preserving in a footnote.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Here אָדָם is collective/generic for the human race. 'Man' preserves the representative force of the Hebrew while remaining natural in English; inclusivity concerns are preserved in a footnote.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  - on the land
  lexicon: HALOT
  rationale: In the primeval context of Genesis 6, אֶרֶץ refers broadly to the earth/world rather than a specific land territory.
- source_word: וְכָל
  chosen: and that every
  alternatives:
  - and every
  - indeed every
  lexicon: HALOT
  rationale: Introduces the second clause with comprehensiveness. Adding 'that' in English clarifies the object of 'saw' across both clauses.
- source_word: יֵצֶר
  chosen: inclination
  alternatives:
  - formation
  - intent
  - frame
  lexicon: HALOT
  rationale: In this anthropological context, יֵצֶר refers to the shaping impulse or disposition of the inner person. 'Inclination' is idiomatic and semantically precise.
- source_word: מַחְשְׁבֹת לִבּוֹ
  chosen: the thoughts of his heart
  alternatives:
  - his heart's thoughts
  - the schemes of his heart
  - the intentions of his heart
  lexicon: HALOT
  rationale: The construct phrase denotes the cognitive products of the inner person. 'Thoughts of his heart' preserves the Hebrew anthropological expression without flattening 'heart' into merely 'mind'.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner self
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב often includes thought, will, and desire. Retaining 'heart' preserves the biblical anthropology and avoids reduction to intellect alone.
- source_word: רַק
  chosen: only
  alternatives:
  - merely
  - nothing but
  lexicon: HALOT
  rationale: רַק restricts the description absolutely; 'only' is the clearest natural equivalent.
- source_word: רַע
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: The adjective here denotes moral evil. 'Evil' is the most direct and weighty rendering.
- source_word: כָּל הַיּוֹם
  chosen: all the day
  alternatives:
  - continually
  - all day long
  - the whole time
  lexicon: HALOT
  rationale: Literally 'all the day.' This idiom conveys continual persistence. 'All the day' keeps the Hebrew flavor while remaining understandable; 'continually' is a viable dynamic alternative.
