theological_decisions:
- issue: Meaning of רוּחַ in רוּחַ חַיִּים
  chosen_reading: breath of life
  alternative_readings:
  - spirit of life
  rationale: The phrase most naturally refers to the animating life-breath of creatures
    in the flood context, echoing Genesis 2:7 and 7:22. Rendering it 'spirit of life'
    could suggest a more developed anthropological claim than the immediate context
    requires, so the more textually grounded 'breath of life' is preferred while preserving
    the alternative in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where
    ambiguity is genuine)
