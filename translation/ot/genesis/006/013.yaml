id: GEN.6.13
reference: Genesis 6:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֱלֹהִ֜ים לְ/נֹ֗חַ קֵ֤ץ כָּל בָּשָׂר֙ בָּ֣א לְ/פָנַ֔/י כִּֽי מָלְאָ֥ה
    הָ/אָ֛רֶץ חָמָ֖ס מִ/פְּנֵי/הֶ֑ם וְ/הִנְ/נִ֥י מַשְׁחִיתָ֖/ם אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: Then God said to Noah, “The end of all flesh has come before me, for the earth
    is filled with violence because of them. And behold, I am about to destroy them
    with the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an end of all flesh has come before me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the land is filled with violence because of them.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally, 'I am destroying them with the earth'; some understand
      'along with the earth' or take 'the earth' as a second object, 'I am destroying
      them and the earth.'
    reason: alternative_reading
  - marker: d
    text: Or 'with the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: קֵץ
  chosen: the end
  alternatives:
  - an end
  - the limit
  lexicon: HALOT
  rationale: קֵץ denotes an end or termination. 'The end' is idiomatic in English
    and fits the definite, solemn declaration of impending judgment.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all living creatures
  - all humanity
  lexicon: HALOT
  rationale: בָּשָׂר here is broader than humanity alone in the flood context and
    is traditionally and accurately rendered 'flesh.' This preserves the scope and
    intertextual resonance of the phrase while allowing readers to infer all living
    creatures/humanity from context.
- source_word: בָּא לְפָנַי
  chosen: has come before me
  alternatives:
  - has come into my presence
  - is before me
  lexicon: HALOT
  rationale: The idiom expresses that the matter has come before God for judgment.
    'Has come before me' preserves the Hebrew imagery and judicial nuance without
    over-paraphrasing.
- source_word: מָלְאָה הָאָרֶץ חָמָס
  chosen: the earth is filled with violence
  alternatives:
  - the land is full of violence
  - the earth is full of wrongdoing
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrong, or brutality. 'Violence' is the
    most direct and contextually fitting rendering in the pre-flood corruption narrative.
    'Earth' is preferred over 'land' because the flood context is cosmic rather than
    local.
- source_word: מִפְּנֵיהֶם
  chosen: because of them
  alternatives:
  - from before them
  - on account of them
  lexicon: HALOT
  rationale: 'The preposition with פָּנִים here functions causally: the earth is filled
    with violence on account of them. ''Because of them'' is natural English and reflects
    the causal sense.'
- source_word: וְהִנְנִי
  chosen: And behold, I am about to
  alternatives:
  - And behold, I am
  - See, I am
  lexicon: HALOT
  rationale: הִנְנִי is a deictic, emphatic self-presentation. Combined with the participle,
    it conveys imminent action. 'And behold, I am about to' preserves both emphasis
    and impending force in readable English.
- source_word: מַשְׁחִיתָם
  chosen: destroy them
  alternatives:
  - corrupt them
  - ruin them
  lexicon: HALOT
  rationale: The Hiphil of שׁחת often means 'destroy' in judgment contexts. 'Destroy
    them' best matches the flood announcement and avoids the ambiguity of 'corrupt,'
    though the verb's wordplay with prior corruption/destruction remains in the background.
- source_word: אֶת הָאָרֶץ
  chosen: with the earth
  alternatives:
  - along with the earth
  - together with the earth
  - the earth
  lexicon: HALOT
  rationale: The direct-object marker אֶת before 'the earth' creates a syntactic difficulty
    after 'destroy them.' Many understand it as 'destroy them with the earth' or 'together
    with the earth.' Rendering 'with the earth' preserves the Hebrew form and the
    sense that both humanity/creatures and the earth are subject to judgment.
