theological_decisions:
- issue: Meaning of God's 'Spirit' in relation to humanity
  chosen_reading: Rendered as 'My Spirit' referring to God's Spirit in a general OT
    sense.
  alternative_readings:
  - my breath
  - my life-breath
  rationale: The Hebrew רוּחַ can denote spirit, wind, or breath. Here the first-person
    possessive and divine speech favor 'My Spirit.' This preserves the text's theological
    weight without importing later Trinitarian specificity beyond what the verse itself
    states.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
- issue: Scope of אָדָם
  chosen_reading: Generic singular 'man' representing humankind.
  alternative_readings:
  - humankind
  - humanity
  rationale: DOCTRINE.md directs gender-accurate over gender-neutral where the source
    is grammatically masculine with representative force. 'Man' best matches the Hebrew
    singular generic usage here.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
