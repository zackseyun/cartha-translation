id: GEN.6.3
reference: Genesis 6:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֗ה לֹֽא יָד֨וֹן רוּחִ֤/י בָֽ/אָדָם֙ לְ/עֹלָ֔ם בְּ/שַׁ/גַּ֖ם
    ה֣וּא בָשָׂ֑ר וְ/הָי֣וּ יָמָ֔י/ו מֵאָ֥ה וְ/עֶשְׂרִ֖ים שָׁנָֽה־׃
translation:
  text: Then the LORD said, “My Spirit will not contend with man forever, because
    he also is flesh; therefore his days will be one hundred and twenty years.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My Spirit will not abide/remain in man forever'; the Hebrew verb is
      difficult and may carry the sense of remaining rather than contending.
    reason: alternative_reading
  - marker: b
    text: '''Man'' here translates Hebrew adam, a singular term used generically for
      humankind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: יָדוֹן
  chosen: will not contend
  alternatives:
  - will not abide
  - will not remain
  - will not strive
  - will not judge
  lexicon: HALOT, BDB
  rationale: The verb is difficult and debated. 'Contend' best preserves the sense
    of divine opposition/restraint toward humanity without overcommitting to the less
    likely sense 'abide/remain.' Because the meaning is genuinely contested, major
    alternatives are preserved in a footnote.
- source_word: רוּחִי
  chosen: My Spirit
  alternatives:
  - my breath
  - my spirit
  lexicon: HALOT, BDB
  rationale: In this context, the possessive with divine speaker naturally points
    to God's Spirit rather than merely 'breath.' Capitalization reflects reference
    to God's Spirit in English style, while not forcing a later doctrinal development
    into the Hebrew.
- source_word: בָאָדָם
  chosen: with man
  alternatives:
  - in man
  - with humankind
  - in humankind
  lexicon: HALOT, BDB
  rationale: The preposition ב can be rendered 'in' or 'with,' depending on how יָדוֹן
    is understood. With the chosen sense 'contend,' 'with man' is the most natural
    English expression. 'Man' preserves the singular/generic force of אָדָם per the
    gender-accurate policy.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for ever
  - indefinitely
  - perpetually
  lexicon: HALOT, BDB
  rationale: Standard rendering for עוֹלָם in this context; clear modern English.
- source_word: בְּשַׁגַּם
  chosen: because
  alternatives:
  - inasmuch as
  - for that
  - since indeed
  lexicon: HALOT, BDB
  rationale: This rare form is commonly understood as a causal conjunction. 'Because'
    gives the likely sense in readable modern English.
- source_word: הוּא בָשָׂר
  chosen: he also is flesh
  alternatives:
  - he is flesh
  - they are flesh
  - humankind is flesh
  lexicon: HALOT, BDB
  rationale: The Hebrew is singular and masculine, matching generic אָדָם. 'Also'
    reflects the force of בְּשַׁגַּם as commonly understood. 'Flesh' is retained rather
    than paraphrased as 'mortal' to preserve the Hebrew's theological and anthropological
    texture.
- source_word: וְהָיוּ יָמָיו
  chosen: therefore his days will be
  alternatives:
  - and his days shall be
  - yet his days will be
  lexicon: HALOT, BDB
  rationale: The clause gives the resulting limitation on human lifespan/time. 'Therefore'
    makes the inferential relationship explicit in natural English while staying close
    to the Hebrew sequence.
- source_word: מֵאָה וְעֶשְׂרִים שָׁנָה
  chosen: one hundred and twenty years
  alternatives:
  - 120 years
  lexicon: HALOT, BDB
  rationale: Fully spelled out for literary readability in Bible style.
