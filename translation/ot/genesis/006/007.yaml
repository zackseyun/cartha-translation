theological_decisions:
- issue: Rendering divine regret in נִחַמְתִּי
  chosen_reading: for I regret that I have made them
  alternative_readings:
  - for I am sorry that I have made them
  - for I repent that I have made them
  rationale: The verse attributes regret/sorrow to God in anthropopathic language.
    The translation preserves this tension rather than softening it to avoid theological
    difficulty, while avoiding 'repent,' which in contemporary English can imply moral
    fault. This aligns with the project's principle of preserving theological tension
    rather than resolving it.
  doctrine_reference: Translation philosophy §3
- issue: Collective sense of הָאָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - mankind
  rationale: Although collective, the project prefers gender-accurate renderings where
    the source uses masculine representative language. 'Man' also preserves the lexical
    connection with the repeated אָדָם in the following phrase.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
