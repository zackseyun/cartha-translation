id: GEN.6.7
reference: Genesis 6:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֗ה אֶמְחֶ֨ה אֶת הָ/אָדָ֤ם אֲשֶׁר בָּרָ֨אתִי֙ מֵ/עַל֙ פְּנֵ֣י
    הָֽ/אֲדָמָ֔ה מֵֽ/אָדָם֙ עַד בְּהֵמָ֔ה עַד רֶ֖מֶשׂ וְ/עַד ע֣וֹף הַ/שָּׁמָ֑יִם כִּ֥י
    נִחַ֖מְתִּי כִּ֥י עֲשִׂיתִֽ/ם־־־־־׃
translation:
  text: So the LORD said, “I will blot out man, whom I have created, from the face
    of the ground—from man to livestock to creeping things and to the birds of the
    heavens—for I regret that I have made them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “humankind.” Hebrew adam can denote humanity collectively; here “man”
      preserves the representative force and the repetition with the next phrase.
    reason: lexical_alternative
  - marker: b
    text: Or “I am sorry that I have made them.” The Hebrew expresses divine regret/sorrow;
      “I regret” is used to preserve the sense without implying moral wrongdoing in
      God.
    reason: alternative_reading
  - marker: c
    text: “Birds of the heavens” is a literal Hebrew expression, often rendered “birds
      of the sky.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional English convention for YHWH.
- source_word: אֶמְחֶה
  chosen: I will blot out
  alternatives:
  - I will wipe out
  - I will destroy
  lexicon: HALOT
  rationale: מחה in this context conveys wiping/blotting away from existence or from
    a surface. 'Blot out' preserves the concrete imagery and the prepositional phrase
    'from the face of the ground' better than the more generic 'destroy'.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  lexicon: HALOT
  rationale: Per project guidance on אָדָם, the term can mean either an individual
    man or humanity. Here it is collective, but the following distributive phrase
    'from man to livestock...' begins with the same lexical item אָדָם, so 'man' preserves
    the Hebrew wordplay and gender-accurate representative force better than 'humankind'.
- source_word: אֲשֶׁר בָּרָאתִי
  chosen: whom I have created
  alternatives:
  - that I created
  - which I created
  lexicon: HALOT
  rationale: Uses a relative clause with present perfect English to reflect completed
    divine action with present relevance. 'Whom' fits the personal object 'man' in
    English.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the ground
  alternatives:
  - from the face of the earth
  - from upon the ground
  lexicon: HALOT
  rationale: אֲדָמָה is more specifically 'ground/soil/land' than 'earth' here, and
    'face of the ground' preserves the Hebrew idiom with readable English.
- source_word: מֵאָדָם עַד בְּהֵמָה עַד רֶמֶשׂ וְעַד עוֹף הַשָּׁמַיִם
  chosen: from man to livestock to creeping things and to the birds of the heavens
  alternatives:
  - from man to beast to creeping things and to birds of the sky
  - from humans to animals to crawling things and to birds of the heavens
  lexicon: HALOT
  rationale: Retains the stepped Hebrew enumeration. 'Livestock' is more precise and
    modern than 'beast' for בְּהֵמָה in this context. 'Creeping things' is the conventional
    rendering of רֶמֶשׂ. 'Birds of the heavens' preserves the Hebrew genitive and
    echoes Genesis style.
- source_word: נִחַמְתִּי
  chosen: I regret
  alternatives:
  - I am sorry
  - I repent
  - I relent
  lexicon: HALOT
  rationale: In this context נחם expresses divine sorrow/regret over having made humanity,
    not moral repentance. 'I regret' is clear modern English and preserves the theological
    tension without implying wrongdoing in God.
- source_word: כִּי עֲשִׂיתִם
  chosen: that I have made them
  alternatives:
  - that I made them
  - that I have done this to them
  lexicon: HALOT
  rationale: The suffix refers back to the created beings in the preceding scope.
    'Have made them' naturally renders the completed action with present consequence
    and matches the plural suffix.
