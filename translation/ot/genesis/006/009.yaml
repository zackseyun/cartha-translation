id: GEN.6.9
reference: Genesis 6:9
source:
  edition: WLC
  text: אֵ֚לֶּה תּוֹלְדֹ֣ת נֹ֔חַ נֹ֗חַ אִ֥ישׁ צַדִּ֛יק תָּמִ֥ים הָיָ֖ה בְּ/דֹֽרֹתָ֑י/ו
    אֶת הָֽ/אֱלֹהִ֖ים הִֽתְהַלֶּךְ נֹֽחַ־־׃
translation:
  text: These are the generations of Noah. Noah was a righteous man, blameless in
    his generations. Noah walked with God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among his contemporaries' or 'in his time.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - This is
  lexicon: HALOT
  rationale: 'Standard deictic plural introducing a new section. English idiom naturally
    renders with a plural predicate: ''These are.'''
- source_word: תּוֹלְדֹת
  chosen: the generations of
  alternatives:
  - the account of
  - the family line of
  - the records of
  lexicon: HALOT
  rationale: Toledot is a key structural term in Genesis. 'Generations' preserves
    the formal linkage and allows the heading-like function to remain visible, even
    though in context it can denote account or family history.
- source_word: נֹחַ
  chosen: Noah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: Gender-accurate rendering per translation philosophy. The Hebrew is grammatically
    masculine singular and refers specifically to Noah as a male individual.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: '''Righteous'' is the standard and theologically weighty rendering, fitting
    Noah''s moral standing before God without flattening the covenantal-ethical nuance.'
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - integral
  - whole
  - upright
  lexicon: HALOT
  rationale: In descriptions of character, tamim commonly conveys integrity or blamelessness
    rather than sinless perfection. 'Blameless' is idiomatic and preserves the moral
    sense.
- source_word: הָיָה
  chosen: was
  alternatives:
  - proved to be
  lexicon: HALOT
  rationale: Simple past copula in context.
- source_word: בְּדֹרֹתָיו
  chosen: in his generations
  alternatives:
  - among his contemporaries
  - in his age
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew wording and its interpretive
    openness. It may mean within the successive generations of his life or among the
    people of his time; the more idiomatic alternative is preserved in a footnote.
- source_word: אֶת הָאֱלֹהִים
  chosen: with God
  alternatives:
  - with the true God
  lexicon: HALOT
  rationale: With the verb 'walk,' the preposition marker plus object yields the idiom
    'walked with God.' Rendering simply 'God' is natural English and matches the relational
    force of the Hebrew expression.
- source_word: הִתְהַלֶּךְ
  chosen: walked
  alternatives:
  - lived
  - conducted himself
  lexicon: HALOT
  rationale: The hitpael of הלך here is the established idiom for one's manner of
    life before God. 'Walked' preserves the metaphor and biblical intertextuality,
    while the ethical sense is clear in context.
