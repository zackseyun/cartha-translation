theological_decisions:
- issue: Nature of the covenant expression
  chosen_reading: 'future-oriented covenant promise: ''I will establish my covenant
    with you'''
  alternative_readings:
  - I will confirm my covenant with you
  rationale: The Hebrew permits either establishing or confirming, and interpreters
    debate whether this refers to initiating a covenant or upholding a prior divine
    commitment. The verse itself does not explicitly resolve that broader theological
    question, so the main text keeps the standard covenant wording without importing
    a stronger doctrinal claim. The alternative is preserved as a lexical possibility,
    not as a separate theological assertion.
  doctrine_reference: Preserve theological tension rather than resolve it.
