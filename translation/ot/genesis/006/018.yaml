id: GEN.6.18
reference: Genesis 6:18
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֥י אֶת בְּרִיתִ֖/י אִתָּ֑/ךְ וּ/בָאתָ֙ אֶל הַ/תֵּבָ֔ה אַתָּ֕ה וּ/בָנֶ֛י/ךָ
    וְ/אִשְׁתְּ/ךָ֥ וּ/נְשֵֽׁי בָנֶ֖י/ךָ אִתָּֽ/ךְ־־־׃
translation:
  text: But I will establish my covenant with you, and you shall enter the ark—you,
    your sons, your wife, and your sons’ wives with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will confirm my covenant with you.' The Hebrew verb can carry either
      nuance in covenant contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: But I will establish
  alternatives:
  - And I will establish
  - But I will confirm
  lexicon: HALOT
  rationale: The verb קום in the Hiphil with בְּרִית commonly means to establish or
    confirm a covenant. 'Establish' is the most natural English here and fits the
    forward-looking promise. 'But' reflects the discourse contrast with the preceding
    announcement of destruction, though 'and' is formally possible.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term and should be rendered consistently
    as 'covenant' to preserve its theological and canonical significance.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - with you personally
  lexicon: HALOT
  rationale: The preposition simply marks covenant relation and later accompaniment.
    Plain 'with you' is sufficient and idiomatic.
- source_word: וּבָאתָ
  chosen: and you shall enter
  alternatives:
  - and you will come into
  - and you shall go into
  lexicon: HALOT
  rationale: בוא literally means 'come/go/enter.' In English, with 'the ark' as destination,
    'enter' is the clearest and most natural rendering.
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: תֵּבָה in the Noah narrative is conventionally and accurately rendered
    'ark.' Although the term denotes a chest-like vessel, 'ark' is the established
    and contextually precise English equivalent.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis after the verb. English can reflect
    this naturally by apposition in the list rather than an overly heavy 'you yourself.'
- source_word: וּבָנֶיךָ
  chosen: your sons
  alternatives:
  - and your sons
  - your children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the gender-neutral 'children.'
    This follows the gender-accurate policy.
- source_word: וְאִשְׁתְּךָ
  chosen: your wife
  alternatives:
  - and your wife
  lexicon: HALOT
  rationale: Straightforward possessive rendering of אִשָּׁה in this familial context.
- source_word: וּנְשֵׁי בָנֶיךָ
  chosen: your sons’ wives
  alternatives:
  - the wives of your sons
  - your daughters-in-law
  lexicon: HALOT
  rationale: The construct phrase literally means 'the wives of your sons.' 'Your
    sons’ wives' is both accurate and natural. 'Daughters-in-law' is possible but
    slightly more interpretive than the Hebrew phrasing.
