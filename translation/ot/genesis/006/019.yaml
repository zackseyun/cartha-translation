id: GEN.6.19
reference: Genesis 6:19
source:
  edition: WLC
  text: וּ/מִ/כָּל הָ֠/חַי מִֽ/כָּל בָּשָׂ֞ר שְׁנַ֧יִם מִ/כֹּ֛ל תָּבִ֥יא אֶל הַ/תֵּבָ֖ה
    לְ/הַחֲיֹ֣ת אִתָּ֑/ךְ זָכָ֥ר וּ/נְקֵבָ֖ה יִֽהְיֽוּ־־־׃
translation:
  text: And from every living thing of all flesh, you shall bring two of each into
    the ark to keep them alive with you; they shall be male and female.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'living creature' for 'living thing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all flesh,' an idiom for living fleshly creatures.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִכָּל
  chosen: And from every
  alternatives:
  - And of every
  - From every
  lexicon: HALOT
  rationale: The conjunction plus preposition and noun literally gives 'and/from all.'
    In English, 'And from every' preserves the connective flow and distributive sense
    naturally.
- source_word: הַחַי
  chosen: living thing
  alternatives:
  - living creature
  - the living
  lexicon: HALOT
  rationale: The adjective/substantive refers broadly to what is alive. 'Living thing'
    is natural English and avoids prematurely narrowing to animals only, while fitting
    the following 'of all flesh.'
- source_word: מִכָּל בָּשָׂר
  chosen: of all flesh
  alternatives:
  - from all flesh
  - of every creature
  lexicon: HALOT
  rationale: בָּשָׂר here is the idiom 'all flesh,' referring to animate fleshly life.
    Retaining 'all flesh' preserves the Hebrew expression and its breadth better than
    replacing it with an interpretive gloss.
- source_word: שְׁנַיִם מִכֹּל
  chosen: two of each
  alternatives:
  - two from each
  - two of all
  lexicon: HALOT
  rationale: The phrase indicates a pair taken from every kind/category in view. 'Two
    of each' is idiomatic English that communicates the distributive force clearly.
- source_word: תָּבִיא
  chosen: you shall bring
  alternatives:
  - you must bring
  - you are to bring
  lexicon: HALOT
  rationale: The Hiphil imperfect in instruction context is well rendered as an imperative-like
    future. 'You shall bring' preserves the formal directive tone without over-paraphrase.
- source_word: אֶל הַתֵּבָה
  chosen: into the ark
  alternatives:
  - to the ark
  lexicon: HALOT
  rationale: With the verb 'bring,' English prefers 'into the ark' to express movement
    into the vessel, even though the preposition is formally 'to/into.' 'Ark' is the
    established and accurate rendering of תֵּבָה here.
- source_word: לְהַחֲיֹת
  chosen: to keep them alive
  alternatives:
  - to preserve alive
  - to let live
  - to keep alive
  lexicon: HALOT
  rationale: The Hiphil infinitive means to cause to live or preserve alive. 'To keep
    them alive' is clear modern English and captures the causative sense.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward accompaniment; 'with you' is the natural rendering.
- source_word: זָכָר וּנְקֵבָה
  chosen: male and female
  alternatives:
  - a male and a female
  lexicon: HALOT
  rationale: This pair denotes biological sex. 'Male and female' is the most direct
    and idiomatic rendering, preserving the binary pair stated in the Hebrew.
- source_word: יִהְיוּ
  chosen: they shall be
  alternatives:
  - they must be
  lexicon: HALOT
  rationale: The verb states the required composition of the pairs. 'They shall be'
    preserves the instructional force and matches the Hebrew syntax.
