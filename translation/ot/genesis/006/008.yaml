id: GEN.6.8
reference: Genesis 6:8
source:
  edition: WLC
  text: וְ/נֹ֕חַ מָ֥צָא חֵ֖ן בְּ/עֵינֵ֥י יְהוָֽה׃פ
translation:
  text: But Noah found favor in the eyes of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Noah found grace in the eyes of Yahweh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נֹחַ
  chosen: But Noah
  alternatives:
  - And Noah
  - Now Noah
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply as 'and,' but here an adversative nuance fits the immediate contrast with the surrounding corruption and judgment context. 'But Noah' is idiomatic English and preserves the discourse contrast without over-paraphrasing. 'Noah' is a personal name and is therefore transliterated per project philosophy.
- source_word: מָצָא
  chosen: found
  alternatives:
  - obtained
  - received
  lexicon: HALOT
  rationale: The verb מצא commonly means 'find.' In the idiom 'find favor,' English naturally uses 'found,' which preserves the Hebrew expression more closely than more interpretive options like 'received' or 'obtained.'
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: חן can mean 'favor,' 'grace,' or 'acceptance.' 'Favor' best fits the Hebrew idiom 'find favor in the eyes of' and avoids importing later theological associations of 'grace' more strongly than the immediate context requires, while still allowing that divine graciousness is in view.
- source_word: בְּ/עֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom meaning 'in the judgment/sight of.' 'In the eyes of' is a transparent and natural English rendering that preserves the metaphor of the source text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
