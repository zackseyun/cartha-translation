theological_decisions:
- issue: Rendering חֵן in relation to divine disposition toward Noah
  chosen_reading: favor
  alternative_readings:
  - grace
  rationale: The verse states that Noah found חֵן with YHWH. Rendering this as 'favor'
    preserves the Hebrew idiom and avoids unnecessarily narrowing the term to later
    doctrinal formulations, while still communicating God's positive disposition toward
    Noah.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly lists יְהוָה with the default English
    rendering 'the LORD.' The alternatives are worth preserving in documentation but
    not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
