- issue: Rendering חֵן in relation to divine disposition toward Noah
  chosen_reading: favor
  alternative_readings:
  - grace
  rationale: The verse states that Noah found חֵן with YHWH. Rendering this as 'favor' preserves the Hebrew idiom and avoids unnecessarily narrowing the term to later doctrinal formulations, while still communicating God's positive disposition toward Noah.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
