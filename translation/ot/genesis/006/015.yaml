id: GEN.6.15
reference: Genesis 6:15
source:
  edition: WLC
  text: וְ/זֶ֕ה אֲשֶׁ֥ר תַּֽעֲשֶׂ֖ה אֹתָ֑/הּ שְׁלֹ֧שׁ מֵא֣וֹת אַמָּ֗ה אֹ֚רֶךְ הַ/תֵּבָ֔ה
    חֲמִשִּׁ֤ים אַמָּה֙ רָחְבָּ֔/הּ וּ/שְׁלֹשִׁ֥ים אַמָּ֖ה קוֹמָתָֽ/הּ׃
translation:
  text: 'And this is how you shall make it: the length of the ark shall be three hundred
    cubits, its width fifty cubits, and its height thirty cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A cubit was an ancient unit of length, roughly the distance from the elbow
      to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/זֶה
  chosen: And this is how
  alternatives:
  - And this
  - Now this is
  lexicon: HALOT
  rationale: The demonstrative with conjunction introduces specification of the ark's
    construction. Rendering as 'And this is how' makes explicit the instructional
    force in natural English while staying close to the Hebrew.
- source_word: אֲשֶׁר תַּעֲשֶׂה אֹתָהּ
  chosen: you shall make it
  alternatives:
  - you are to make it
  - you shall do it
  lexicon: HALOT
  rationale: עשה commonly means 'make/do.' In this construction, with the feminine
    object referring to the ark, 'make it' best fits the building context. 'Shall'
    preserves the directive force of the imperfect.
- source_word: שְׁלֹשׁ מֵאוֹת אַמָּה
  chosen: three hundred cubits
  alternatives:
  - 300 cubits
  lexicon: HALOT
  rationale: A straightforward rendering of the measurement phrase. 'Cubits' preserves
    the ancient unit rather than converting to modern measurements, maintaining source-text
    specificity.
- source_word: אֹרֶךְ
  chosen: the length
  alternatives:
  - length
  lexicon: HALOT
  rationale: 'Rendered with the article in English for smoothness in the dimensional
    specification: ''the length of the ark.'''
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: תֵּבָה is the established term for Noah's ark in Genesis and refers to
    the vessel being constructed. 'Ark' is the clearest contextual equivalent in English.
- source_word: חֲמִשִּׁים אַמָּה רָחְבָּהּ
  chosen: its width fifty cubits
  alternatives:
  - its breadth fifty cubits
  - fifty cubits its width
  lexicon: HALOT
  rationale: רֹחַב/רָחַב in nominal form denotes width or breadth. 'Width' is more
    natural in contemporary English than 'breadth' while preserving the dimensional
    sense.
- source_word: וּשְׁלֹשִׁים אַמָּה קוֹמָתָהּ
  chosen: and its height thirty cubits
  alternatives:
  - and its stature thirty cubits
  - and thirty cubits its height
  lexicon: HALOT
  rationale: קוֹמָה can denote height or stature. In an architectural context, 'height'
    is the appropriate English rendering.
