id: GEN.6.22
reference: Genesis 6:22
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ נֹ֑חַ כְּ֠/כֹל אֲשֶׁ֨ר צִוָּ֥ה אֹת֛/וֹ אֱלֹהִ֖ים כֵּ֥ן עָשָֽׂה׃ס
translation:
  text: Thus Noah did; according to all that God commanded him, so he did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the verb ''did'' for emphasis: ''And Noah did ... so he
      did.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'And Noah did this;'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - made
  - acted
  lexicon: HALOT
  rationale: From עשה, a broad verb meaning 'do/make.' Here it summarizes Noah's obedient
    action in response to the prior instructions, so 'did' is the most natural English
    rendering.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name נֹחַ.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as all that
  - in accordance with everything that
  lexicon: HALOT
  rationale: The construction expresses conformity to the full extent of what was
    commanded. 'According to all that' preserves both the comparative force of כ and
    the comprehensiveness of כֹּל.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - instructed
  - ordered
  lexicon: HALOT
  rationale: צוה commonly denotes authoritative command. 'Commanded' best reflects
    the divine authority in the context.
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct-object marker with 3ms suffix, referring to Noah as the recipient
    of God's command.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, אֱלֹהִים here takes a singular verb
    and clearly refers to the one God of Israel; therefore 'God' is the correct English
    rendering.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - exactly so
  lexicon: HALOT
  rationale: כֵּן resumes and reinforces the preceding statement, emphasizing exact
    correspondence. 'So' is concise and idiomatic in English.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he acted
  - he made it so
  lexicon: HALOT
  rationale: The repetition of עשה at the end is retained in English to preserve the
    Hebrew emphasis on Noah's complete obedience.
