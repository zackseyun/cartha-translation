id: GEN.20.16
reference: Genesis 20:16
source:
  edition: WLC
  text: וּ/לְ/שָׂרָ֣ה אָמַ֗ר הִנֵּ֨ה נָתַ֜תִּי אֶ֤לֶף כֶּ֨סֶף֙ לְ/אָחִ֔י/ךְ הִנֵּ֤ה
    הוּא לָ/ךְ֙ כְּס֣וּת עֵינַ֔יִם לְ/כֹ֖ל אֲשֶׁ֣ר אִתָּ֑/ךְ וְ/אֵ֥ת כֹּ֖ל וְ/נֹכָֽחַת־׃
translation:
  text: And to Sarah he said, “Look, I have given a thousand pieces of silver to your
    brother. Look, it is for you a covering of the eyes before all who are with you;
    and before everyone, you are vindicated.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a covering for the eyes,' likely meaning a public compensation that
      covers the offense and restores Sarah's honor.
    reason: lexical_alternative
  - marker: b
    text: Or 'you are cleared' or 'it is settled before everyone.' The final Hebrew
      clause is difficult and has been understood in several ways.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶלֶף כֶּסֶף
  chosen: a thousand pieces of silver
  alternatives:
  - a thousand silver shekels
  - a thousand silver coins
  lexicon: HALOT
  rationale: Literally 'a thousand silver.' 'Pieces of silver' is a natural English
    way to express an unspecified silver payment without importing the more specific
    'shekels,' which is not explicit in the Hebrew here.
- source_word: לְאָחִיךְ
  chosen: to your brother
  alternatives:
  - to your kinsman
  lexicon: HALOT
  rationale: The Hebrew says 'to your brother,' referring to Abraham as Sarah had
    presented him. Retaining 'brother' preserves the irony and the narrative connection
    to the deception.
- source_word: כְּסוּת עֵינַיִם
  chosen: a covering of the eyes
  alternatives:
  - a vindication
  - a compensation that covers the offense
  - a veil for the eyes
  lexicon: HALOT
  rationale: This idiom is difficult. A relatively formal rendering preserves the
    metaphor in the main text rather than collapsing it into a single interpretation.
    The likely sense is that the payment publicly covers the offense and clears Sarah's
    honor.
- source_word: לְכֹל אֲשֶׁר אִתָּךְ
  chosen: before all who are with you
  alternatives:
  - for all who are with you
  - in the sight of all who are with you
  lexicon: HALOT
  rationale: The phrase marks the public scope of the gesture. 'Before all who are
    with you' brings out the social/public dimension in idiomatic English.
- source_word: וְאֵת כֹּל
  chosen: and before everyone
  alternatives:
  - and with all
  - and in the sight of all
  lexicon: HALOT
  rationale: This phrase is syntactically compressed and difficult, but it appears
    to broaden the public reference from Sarah's household/company to everyone generally.
    'Before everyone' fits the flow with the following verb.
- source_word: וְנֹכָחַת
  chosen: you are vindicated
  alternatives:
  - you are cleared
  - it is settled
  - you are reproved
  lexicon: HALOT
  rationale: From the root יכח in the Niphal, the sense here is best taken as being
    shown right, cleared, or vindicated in a public sense. Some have taken it as passive
    'you were rebuked/reproved,' but in context Abimelech is compensating Sarah and
    publicly acknowledging her innocence, so 'you are vindicated' best fits the discourse.
