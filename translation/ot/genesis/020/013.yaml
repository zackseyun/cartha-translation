theological_decisions:
- issue: Subject of Abraham's wandering
  chosen_reading: God caused Abraham to wander from his father's house
  alternative_readings:
  - God permitted Abraham to wander
  - the gods caused me to wander
  rationale: The Hebrew presents God as the grammatical subject of a causative verb.
    The translation preserves that statement without softening divine agency, while
    avoiding wording that implies moral wrongdoing by God. The plural reading 'gods'
    is grammatically possible in isolation but contextually implausible in Abraham's
    speech.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
