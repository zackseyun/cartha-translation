id: GEN.20.13
reference: Genesis 20:13
source:
  edition: WLC
  text: וַ/יְהִ֞י כַּ/אֲשֶׁ֧ר הִתְע֣וּ אֹתִ֗/י אֱלֹהִים֮ מִ/בֵּ֣ית אָבִ/י֒ וָ/אֹמַ֣ר
    לָ֔/הּ זֶ֣ה חַסְדֵּ֔/ךְ אֲשֶׁ֥ר תַּעֲשִׂ֖י עִמָּדִ֑/י אֶ֤ל כָּל הַ/מָּקוֹם֙ אֲשֶׁ֣ר
    נָב֣וֹא שָׁ֔מָּ/ה אִמְרִי לִ֖/י אָחִ֥/י הֽוּא־־׃
translation:
  text: 'And when God caused me to wander from my father’s house, I said to her, ‘This
    is the kindness you must show me: at every place we come to, say of me, “He is
    my brother.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caused me to go astray' / 'made me wander.' The Hebrew verb is causative
      and can denote wandering or straying; here the sense is departure and unsettled
      movement rather than necessarily moral error.
    reason: lexical_alternative
  - marker: b
    text: '''Kindness'' translates Hebrew hesed, which can also carry the sense of
      loyal love or faithful kindness depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעוּ
  chosen: caused me to wander
  alternatives:
  - led me to wander
  - made me wander
  - caused me to go astray
  lexicon: HALOT
  rationale: The Hiphil of תעה means to cause someone to wander or stray. 'Caused
    me to wander' preserves the causative force without importing moral error. 'Go
    astray' could suggest sin or deception too strongly in English, which the context
    does not require.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Although morphologically plural, the verb and context indicate the singular
    God of Abraham. English singular 'God' best reflects the referent here.
- source_word: מִבֵּית אָבִי
  chosen: from my father’s house
  alternatives:
  - from my father’s household
  - away from my father’s home
  lexicon: HALOT
  rationale: This idiom refers to Abraham’s familial home/household. 'Father’s house'
    is a standard and clear rendering that preserves the familial-social sense.
- source_word: חַסְדֵּךְ
  chosen: the kindness you must show me
  alternatives:
  - your kindness
  - your loyal love
  - your covenant loyalty
  lexicon: HALOT
  rationale: חסד often carries the sense of kindness, loyalty, or faithful love. In
    this immediate interpersonal request, 'kindness' is the most natural main-text
    rendering. The possessive and requested action are brought into idiomatic English
    as 'the kindness you must show me.'
- source_word: תַּעֲשִׂי עִמָּדִי
  chosen: you must show me
  alternatives:
  - you will do with me
  - you shall do for me
  lexicon: HALOT
  rationale: Literally 'you shall do with me,' but English idiom requires an object
    such as 'show me' when paired with 'kindness.' This is an optimal-equivalence
    adjustment for naturalness while preserving meaning.
- source_word: אֶל כָּל הַמָּקוֹם אֲשֶׁר נָבוֹא שָׁמָּה
  chosen: at every place we come to
  alternatives:
  - to every place where we come
  - wherever we go
  lexicon: HALOT
  rationale: The phrase is distributive and refers to each place they arrive. 'At
    every place we come to' stays close to the Hebrew while remaining readable. 'Wherever
    we go' is smoother but slightly more dynamic.
- source_word: אִמְרִי לִי
  chosen: say of me
  alternatives:
  - say for me
  - say concerning me
  lexicon: HALOT
  rationale: The Hebrew literally has 'say to/for me,' but in context the sense is
    to speak about Abraham to others. 'Say of me' communicates the intended force
    in idiomatic English.
- source_word: אָחִי הוּא
  chosen: He is my brother
  alternatives:
  - He is my kinsman
  lexicon: HALOT
  rationale: The direct speech is straightforward. 'Brother' should be retained rather
    than generalized to 'kinsman,' since the narrative explicitly hinges on that claim.
