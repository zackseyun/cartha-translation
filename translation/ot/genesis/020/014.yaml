id: GEN.20.14
reference: Genesis 20:14
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אֲבִימֶ֜לֶךְ צֹ֣אן וּ/בָקָ֗ר וַ/עֲבָדִים֙ וּ/שְׁפָחֹ֔ת וַ/יִּתֵּ֖ן
    לְ/אַבְרָהָ֑ם וַ/יָּ֣שֶׁב ל֔/וֹ אֵ֖ת שָׂרָ֥ה אִשְׁתּֽ/וֹ׃
translation:
  text: Then Abimelech took sheep and cattle, and male slaves and female slaves, and
    gave them to Abraham; and he returned Sarah his wife to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flocks' for 'sheep'; the Hebrew צֹאן can refer more broadly to small
      livestock.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'male slaves and female slaves.' Some translations use 'servants,'
      but the context of transfer as property favors 'slaves.'
    reason: lexical_alternative
  - marker: c
    text: Or 'restored Sarah, his wife, to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - brought
  - fetched
  lexicon: HALOT
  rationale: The waw-consecutive verb from לקח normally means 'took.' 'Took' preserves
    the straightforward narrative sequence without adding nuance not explicit in the
    Hebrew.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flocks
  - small livestock
  lexicon: HALOT
  rationale: Although צֹאן can denote small livestock collectively (sheep and goats),
    'sheep' is a common concise rendering in paired livestock lists with בָּקָר ('cattle').
    'Flocks' is broader but less concrete here.
- source_word: בָקָר
  chosen: cattle
  alternatives:
  - herd animals
  - oxen
  lexicon: HALOT
  rationale: בָּקָר refers to bovine livestock generally. 'Cattle' is the most natural
    collective English equivalent in this context.
- source_word: עֲבָדִים
  chosen: male slaves
  alternatives:
  - male servants
  - slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave depending on context. Here Abimelech
    is transferring persons as property alongside livestock, so the bonded status
    is salient. 'Male slaves' also preserves the gender distinction made by the paired
    feminine term that follows.
- source_word: שְׁפָחוֹת
  chosen: female slaves
  alternatives:
  - maidservants
  - female servants
  lexicon: HALOT
  rationale: The term denotes female household slaves/servants. In this gift-transfer
    context, 'female slaves' best reflects the social reality and matches the explicit
    gender pairing with עֲבָדִים.
- source_word: וַיִּתֵּן
  chosen: gave them
  alternatives:
  - gave
  - presented
  lexicon: HALOT
  rationale: The Hebrew verb simply means 'gave.' English idiom benefits from supplying
    'them' to refer back to the listed items and persons.
- source_word: וַיָּשֶׁב
  chosen: returned
  alternatives:
  - restored
  - gave back
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil, the sense is causative: ''caused to return''
    or ''restored.'' ''Returned'' is idiomatic and fits the direct-object construction
    with Sarah.'
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - wife
  lexicon: HALOT
  rationale: The suffix refers to Abraham, not Abimelech, in apposition to Sarah.
    'Sarah his wife' is the most natural English order and clarifies the relationship
    stated in Hebrew.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - to Abraham
  lexicon: HALOT
  rationale: The pronominal suffix refers back to Abraham. Retaining 'to him' mirrors
    the Hebrew while remaining clear because Abraham is the nearest and only plausible
    antecedent in context.
