id: GEN.20.5
reference: Genesis 20:5
source:
  edition: WLC
  text: הֲ/לֹ֨א ה֤וּא אָֽמַר לִ/י֙ אֲחֹ֣תִ/י הִ֔וא וְ/הִֽיא גַם הִ֥וא אָֽמְרָ֖ה אָחִ֣/י
    ה֑וּא בְּ/תָם לְבָבִ֛/י וּ/בְ/נִקְיֹ֥ן כַּפַּ֖/י עָשִׂ֥יתִי זֹֽאת־־־־׃
translation:
  text: Did he not himself say to me, ‘She is my sister’? And she herself also said,
    ‘He is my brother.’ In the integrity of my heart and the innocence of my hands
    I have done this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with integrity of heart and clean hands.' The Hebrew uses moral-legal
      idioms for sincerity and innocence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Did ... not
  alternatives:
  - Didn't
  - Was it not the case that
  lexicon: HALOT
  rationale: 'Rendered as an interrogative expecting an affirmative answer. English
    idiom requires splitting the negation around the verb: ''Did he not...?''.'
- source_word: הוּא
  chosen: he himself
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal form; 'himself'
    preserves that emphasis.
- source_word: אָמַר לִי
  chosen: say to me
  alternatives:
  - tell me
  - said to me
  lexicon: HALOT
  rationale: With the preceding interrogative, English reads naturally as 'Did he
    not ... say to me.' 'Say' stays close to אמר without overinterpreting as 'tell'.
- source_word: אֲחֹתִי הִוא
  chosen: She is my sister
  alternatives:
  - She is my own sister
  lexicon: HALOT
  rationale: Straightforward predication; no need to add emphasis not present in the
    Hebrew.
- source_word: וְהִיא גַם הִוא אָמְרָה
  chosen: And she herself also said
  alternatives:
  - And she too said
  - and she also said
  lexicon: HALOT
  rationale: Both גם and the independent pronoun contribute emphasis/addition. 'She
    herself also' preserves the cumulative force, though in natural English order.
- source_word: אָחִי הוּא
  chosen: He is my brother
  alternatives:
  - He is my own brother
  lexicon: HALOT
  rationale: Direct equivalent of the Hebrew kinship claim.
- source_word: בְּתָם לְבָבִי
  chosen: In the integrity of my heart
  alternatives:
  - with integrity of heart
  - in the blamelessness of my heart
  lexicon: HALOT
  rationale: תֹּם/תָּם conveys integrity, completeness, blamelessness. 'Integrity'
    is idiomatic and fits Abimelech's claim of moral sincerity.
- source_word: וּבְנִקְיֹן כַּפַּי
  chosen: and the innocence of my hands
  alternatives:
  - and the cleanness of my hands
  - and with clean hands
  lexicon: HALOT
  rationale: נִקָּיוֹן denotes cleanness/innocence; in this moral idiom 'innocence
    of my hands' preserves the metaphor while remaining readable. 'Hands' in Hebrew
    often signifies actions or culpability.
- source_word: עָשִׂיתִי זֹאת
  chosen: I have done this
  alternatives:
  - I did this
  lexicon: HALOT
  rationale: The perfect can be rendered simply as past, but English present perfect
    works well in Abimelech's immediate self-defense before God.
