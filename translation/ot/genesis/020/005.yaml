theological_decisions:
- issue: Moral-legal idiom in Abimelech's self-defense
  chosen_reading: Rendered the paired expressions as a claim of personal integrity
    and innocence without implying absolute sinlessness.
  alternative_readings:
  - Rendered more woodenly as 'blamelessness of heart' and 'cleanness of hands'
  rationale: The verse presents Abimelech's protest of innocence regarding this act,
    not a doctrinal statement of total moral perfection. The translation preserves
    the Hebrew idiom while keeping the scope tied to the event in context.
  doctrine_reference: Preserve theological tension rather than resolve it
