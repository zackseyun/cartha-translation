theological_decisions:
- issue: Rendering the divine warning מֵת
  chosen_reading: you are as good as dead
  alternative_readings:
  - you are dead
  - you will die
  rationale: The Hebrew participial construction communicates certain and imminent
    judgment. The chosen rendering preserves the warning's force in natural English
    without forcing either a strictly present or future sense.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Rendering בְּעֻלַת בָּעַל
  chosen_reading: she is married to a husband
  alternative_readings:
  - she is a married woman
  rationale: The chosen wording preserves the relational and covenantal fact emphasized
    by the Hebrew phrase rather than reducing it to a bare adjectival status. It avoids
    importing extra doctrinal claims while staying close to the source.
  doctrine_reference: Translation philosophy §1 and §5 (original-language primacy;
    consistency of key terms or documented exception)
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/020/003.json
  category: awkward_english
  tier: 1
  from: for she is married to a husband
  to: for she has a husband
  rationale: The Hebrew phrase 'בְּעֻלַת בָּעַל' is emphatic and somewhat redundant
    ('a husbanded one of a husband'). The current rendering 'married to a husband'
    captures this redundancy but sounds slightly unnatural in English, as 'married'
    typically implies 'to a husband/wife'. A smoother, more idiomatic rendering like
    'for she has a husband' conveys the essential legal and relational fact with greater
    clarity and naturalness for the English reader.
