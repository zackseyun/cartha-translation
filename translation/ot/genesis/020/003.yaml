id: GEN.20.3
reference: Genesis 20:3
source:
  edition: WLC
  text: וַ/יָּבֹ֧א אֱלֹהִ֛ים אֶל אֲבִימֶ֖לֶךְ בַּ/חֲל֣וֹם הַ/לָּ֑יְלָה וַ/יֹּ֣אמֶר
    ל֗/וֹ הִנְּ/ךָ֥ מֵת֙ עַל הָ/אִשָּׁ֣ה אֲשֶׁר לָקַ֔חְתָּ וְ/הִ֖וא בְּעֻ֥לַת בָּֽעַל־־־׃
translation:
  text: But God came to Abimelech in a dream by night and said to him, “Behold, you
    are a dead man because of the woman whom you have taken, for she is married.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Look, you are dead” or “Look, you will die.” The Hebrew
      expresses certain, imminent death.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “for she is possessed by a husband,” that is, she already has a
      husband.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for she is married to a husband'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא in narrative commonly advances the storyline with
    'came.' 'Entered' would over-specify, since the setting is a dream encounter rather
    than physical movement into a location.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - a god
  - gods
  lexicon: HALOT
  rationale: In this context the singular verbal forms and the broader Abraham narrative
    indicate the God of Israel, so singular 'God' is required.
- source_word: בַּחֲלוֹם הַלָּיְלָה
  chosen: in a dream by night
  alternatives:
  - in the dream of the night
  - in a night dream
  - in a dream at night
  lexicon: HALOT
  rationale: The Hebrew is idiomatic. 'In a dream by night' preserves the formal texture
    while remaining natural English. It signals nocturnal revelation without flattening
    the phrase.
- source_word: הִנְּךָ
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: This discourse marker introduces a solemn warning. 'Look' is readable
    modern English and preserves the force better than archaic 'Behold.'
- source_word: מֵת
  chosen: you are as good as dead
  alternatives:
  - you are dead
  - you will die
  - dead man
  lexicon: HALOT
  rationale: Predicate participle after הִנְּךָ expresses imminent doom rather than
    necessarily immediate completed death. 'As good as dead' captures the warning
    force in idiomatic English without overstating tense.
- source_word: עַל
  chosen: because of
  alternatives:
  - on account of
  - for
  - concerning
  lexicon: HALOT
  rationale: Here עַל gives the reason for the death sentence. 'Because of' is the
    clearest contemporary rendering.
- source_word: לָקַחְתָּ
  chosen: have taken
  alternatives:
  - took
  - have seized
  lexicon: HALOT
  rationale: '''Taken'' is the standard rendering in marital-acquisition contexts
    and avoids importing violence not explicit in the verb itself. Present perfect
    fits the current state resulting from Abimelech''s action.'
- source_word: בְּעֻלַת בָּעַל
  chosen: married to a husband
  alternatives:
  - a married woman
  - owned by a husband
  - under a husband's authority
  lexicon: HALOT
  rationale: The phrase literally denotes a woman possessed by/under a בעל, i.e.,
    having a husband. 'Married to a husband' keeps the Hebrew emphasis on her existing
    marital bond more transparently than the smoother but less explicit 'a married
    woman.'
