  rationale: Replaced the idiomatic and interpretive 'Look, you are as good as dead'
    with the more formally accurate 'Behold, you are a dead man.' Replaced 'for she
    has a husband' with 'for she is married' to reflect the Hebrew expression more
    directly and naturally.
