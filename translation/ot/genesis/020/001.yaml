id: GEN.20.1
reference: Genesis 20:1
source:
  edition: WLC
  text: וַ/יִּסַּ֨ע מִ/שָּׁ֤ם אַבְרָהָם֙ אַ֣רְצָ/ה הַ/נֶּ֔גֶב וַ/יֵּ֥שֶׁב בֵּין קָדֵ֖שׁ
    וּ/בֵ֣ין שׁ֑וּר וַ/יָּ֖גָר בִּ/גְרָֽר־׃
translation:
  text: From there Abraham journeyed toward the Negev and settled between Kadesh and
    Shur; he sojourned in Gerar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'southward.' The Hebrew can denote either the southern region called
      the Negev or movement generally toward the south; the main text preserves the
      likely geographic reference.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: journeyed
  alternatives:
  - set out
  - moved on
  - traveled
  lexicon: HALOT
  rationale: נסע in the qal wayyiqtol commonly denotes setting out or traveling from
    one place to another. 'Journeyed' preserves the narrative movement without sounding
    overly wooden.
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward deictic adverb referring back to Abraham's previous
    location; 'From there' is idiomatic modern English.
- source_word: אַרְצָה הַנֶּגֶב
  chosen: toward the Negev
  alternatives:
  - to the land of the Negev
  - southward
  lexicon: HALOT
  rationale: The directional he on אַרצה marks motion toward a region. Because הַנֶּגֶב
    can denote the southern region specifically, 'toward the Negev' preserves the
    geographic sense better than the more generic 'southward.'
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - dwelt
  - lived
  lexicon: HALOT
  rationale: ישב often means to dwell or settle. 'Settled' fits the context of taking
    up residence in a region between named locations and reads naturally in English.
- source_word: בֵּין קָדֵשׁ וּבֵין שׁוּר
  chosen: between Kadesh and Shur
  lexicon: HALOT
  rationale: A simple geographic locator. The place names are transliterated in keeping
    with the translation philosophy for personal and place names.
- source_word: וַיָּגָר
  chosen: sojourned
  alternatives:
  - stayed as a foreigner
  - lived temporarily
  lexicon: HALOT
  rationale: גור carries the nuance of residing as an alien or temporary resident,
    not merely living somewhere. 'Sojourned' preserves that nuance better than a flat
    'lived,' even if slightly elevated.
- source_word: בִּגְרָר
  chosen: in Gerar
  lexicon: HALOT
  rationale: Locative preposition with place name; 'in Gerar' is the natural English
    rendering.
