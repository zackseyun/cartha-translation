id: GEN.20.12
reference: Genesis 20:12
source:
  edition: WLC
  text: וְ/גַם אָמְנָ֗ה אֲחֹתִ֤/י בַת אָבִ/י֙ הִ֔וא אַ֖ךְ לֹ֣א בַת אִמִּ֑/י וַ/תְּהִי
    לִ֖/י לְ/אִשָּֽׁה־־־־׃
translation:
  text: Besides, she really is my sister—the daughter of my father, though not the
    daughter of my mother—and she became my wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And indeed she is my sister, my father's daughter, but
      not my mother's daughter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Besides
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: The conjunction plus additive particle introduces a further defense in
    Abraham's speech. 'Besides' captures the discourse function naturally in English
    better than the more wooden 'and also'.
- source_word: אָמְנָה
  chosen: really
  alternatives:
  - indeed
  - truly
  lexicon: HALOT
  rationale: This adverb affirms the truth of the claim. 'Really' gives idiomatic
    modern English within Abraham's explanatory speech; 'indeed' is possible but slightly
    stiffer.
- source_word: אֲחֹתִי
  chosen: my sister
  lexicon: HALOT
  rationale: Straightforward kinship term with 1cs suffix.
- source_word: בַת אָבִי
  chosen: the daughter of my father
  alternatives:
  - my father's daughter
  lexicon: HALOT
  rationale: This appositional phrase explains in what sense she is his sister. The
    fuller phrasing is slightly more explicit and balanced with the following clause.
- source_word: הִוא
  chosen: she is
  alternatives:
  - she was
  lexicon: HALOT
  rationale: The independent pronoun serves as the copular clause's subject/complement
    structure in nominal predication. Present tense is the natural English rendering
    for the Hebrew verbless clause.
- source_word: אַךְ לֹא
  chosen: though not
  alternatives:
  - only not
  - except not
  - but not
  lexicon: HALOT
  rationale: The particle אַךְ here marks limitation/qualification rather than exclusivity
    in a strict sense. 'Though not' communicates the concessive qualification smoothly
    in English.
- source_word: בַת אִמִּי
  chosen: the daughter of my mother
  alternatives:
  - my mother's daughter
  lexicon: HALOT
  rationale: Parallel to 'the daughter of my father'; preserves the familial specification.
- source_word: וַתְּהִי לִי לְאִשָּׁה
  chosen: and she became my wife
  alternatives:
  - and she became a wife to me
  - and she was my wife
  lexicon: HALOT
  rationale: The wayyiqtol of היה with ל + person and לְאִשָּׁה denotes entering the
    state of marriage. 'Became my wife' is the clearest idiomatic English and preserves
    the eventive sense better than the stative 'was my wife'.
