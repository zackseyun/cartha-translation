id: GEN.20.9
reference: Genesis 20:9
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אֲבִימֶ֜לֶךְ לְ/אַבְרָהָ֗ם וַ/יֹּ֨אמֶר ל֜/וֹ מֶֽה עָשִׂ֤יתָ לָּ֨/נוּ֙
    וּ/מֶֽה חָטָ֣אתִי לָ֔/ךְ כִּֽי הֵבֵ֧אתָ עָלַ֛/י וְ/עַל מַמְלַכְתִּ֖/י חֲטָאָ֣ה
    גְדֹלָ֑ה מַעֲשִׂים֙ אֲשֶׁ֣ר לֹא יֵֽעָשׂ֔וּ עָשִׂ֖יתָ עִמָּדִֽ/י־־־־־׃
translation:
  text: Then Abimelech called Abraham and said to him, “What have you done to us?
    And how have I sinned against you, that you have brought a great sin on me and
    on my kingdom? You have done to me things that should not be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what sin have I committed against you?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'things that ought not to be done.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with לְ plus person commonly means 'call to' or 'summon.'
    'Called' is natural English and preserves the narrative flow without overstating
    official force.
- source_word: מֶה עָשִׂיתָ לָּנוּ
  chosen: What have you done to us?
  alternatives:
  - What did you do to us?
  lexicon: HALOT
  rationale: A direct, idiomatic rendering of the interrogative plus perfect verb.
    Present perfect in English conveys the present impact of Abraham's action in context.
- source_word: וּמֶה חָטָאתִי לָךְ
  chosen: how have I sinned against you
  alternatives:
  - what sin have I committed against you
  - how have I wronged you
  lexicon: HALOT
  rationale: חטא here denotes offense or wrongdoing against another person. 'Sinned
    against you' preserves the moral-religious force better than the flatter 'wronged
    you.' The interrogative מֶה is rendered idiomatically as 'how' in English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content of the complaint: ''that you
    have brought...'' rather than a simple causal ''for.'' ''That'' reads most naturally
    in English after the rhetorical question.'
- source_word: הֵבֵאתָ עָלַי וְעַל מַמְלַכְתִּי
  chosen: you have brought ... on me and on my kingdom
  alternatives:
  - you have brought ... upon me and upon my kingdom
  lexicon: HALOT
  rationale: The hiphil of בוא can mean 'bring' in the sense of causing something
    to come upon someone. 'On' is contemporary English; 'upon' is possible but less
    natural.
- source_word: חֲטָאָה גְדֹלָה
  chosen: a great sin
  alternatives:
  - great guilt
  - a great offense
  lexicon: HALOT
  rationale: The noun חטאה denotes sin/offense/guilt. In this context Abimelech refers
    to a grave moral transgression that Abraham's deception nearly caused. 'A great
    sin' best preserves the ethical weight.
- source_word: מַמְלַכְתִּי
  chosen: my kingdom
  alternatives:
  - my realm
  lexicon: HALOT
  rationale: The noun refers to royal dominion or kingdom. 'Kingdom' is the standard
    and clearest rendering.
- source_word: מַעֲשִׂים אֲשֶׁר לֹא יֵעָשׂוּ
  chosen: things that should not be done
  alternatives:
  - deeds that are not done
  - things that ought not to be done
  lexicon: HALOT
  rationale: The passive/imperfect construction expresses what is not proper or acceptable
    practice. 'Should not be done' captures the normative force in idiomatic English.
- source_word: עָשִׂיתָ עִמָּדִי
  chosen: You have done to me
  alternatives:
  - You have dealt with me by doing
  - You have done with me
  lexicon: HALOT
  rationale: The idiom עשה עם/עמד can mean 'do/deal with.' Here 'done to me' fits
    the accusatory tone and links naturally with the following object 'things that
    should not be done.'
