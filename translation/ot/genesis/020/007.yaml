id: GEN.20.7
reference: Genesis 20:7
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הָשֵׁ֤ב אֵֽשֶׁת הָ/אִישׁ֙ כִּֽי נָבִ֣יא ה֔וּא וְ/יִתְפַּלֵּ֥ל בַּֽעַדְ/ךָ֖
    וֶֽ/חְיֵ֑ה וְ/אִם אֵֽינְ/ךָ֣ מֵשִׁ֗יב דַּ֚ע כִּי מ֣וֹת תָּמ֔וּת אַתָּ֖ה וְ/כָל
    אֲשֶׁר לָֽ/ךְ־־־־־־׃
translation:
  text: Now then, return the man's wife, for he is a prophet, and he will pray for
    you, and you will live. But if you do not return her, know that you will surely
    die—you and all who are yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you and all that is yours' / 'you and all you have.' The Hebrew expression
      is broad and may include household members as well as all that belongs to Abimelech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing an urgent transition and command. 'Now then'
    captures both temporal and inferential force more naturally than a bare 'And now.'
- source_word: הָשֵׁב
  chosen: return
  alternatives:
  - restore
  - give back
  lexicon: HALOT
  rationale: Imperative of שוב in the causative stem here means to return/restore
    someone to a prior rightful state. 'Return' is concise and idiomatic with 'the
    man's wife.'
- source_word: אֵשֶׁת הָאִישׁ
  chosen: the man's wife
  alternatives:
  - the wife of the man
  - his wife
  lexicon: HALOT
  rationale: Formal construct phrase. 'The man's wife' preserves the Hebrew wording
    and avoids prematurely shifting to a pronoun not explicit in this phrase.
- source_word: כִּי נָבִיא הוּא
  chosen: for he is a prophet
  alternatives:
  - because he is a prophet
  lexicon: HALOT
  rationale: כִּי gives the reason for the command. 'For' is natural in elevated narrative
    style and preserves the explanatory force. 'Prophet' is the straightforward rendering
    of נָבִיא.
- source_word: וְיִתְפַּלֵּל בַּעַדְךָ
  chosen: and he will pray for you
  alternatives:
  - so that he may pray for you
  - and let him pray for you
  - and he will intercede for you
  lexicon: HALOT
  rationale: 'The yiqtol after the explanatory clause is best taken as consequential/future:
    Abraham will pray on Abimelech''s behalf. ''Pray for you'' is more transparent
    than ''intercede,'' though intercessory force is present in בְּעַד.'
- source_word: וֶחְיֵה
  chosen: and you will live
  alternatives:
  - so that you may live
  - then live
  lexicon: HALOT
  rationale: Qal imperative/jussive-like form following the prior clause expresses
    the result of Abraham's prayer. In English, 'and you will live' communicates the
    intended outcome more naturally than a bare imperative 'and live.'
- source_word: וְאִם אֵינְךָ מֵשִׁיב
  chosen: But if you do not return her
  alternatives:
  - And if you are not returning
  - But if you do not restore
  lexicon: HALOT
  rationale: The participle with negative expresses ongoing/refused action. English
    idiom prefers finite verbal expression. 'Her' is supplied from context because
    the object is omitted but clearly refers to the wife.
- source_word: דַּע
  chosen: know
  alternatives:
  - be assured
  - you must know
  lexicon: HALOT
  rationale: Direct imperative of ידע introducing a solemn warning. 'Know' preserves
    the force without expansion.
- source_word: מוֹת תָּמוּת
  chosen: you will surely die
  alternatives:
  - you shall surely die
  - dying you shall die
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies certainty. 'You will
    surely die' is clear modern English; 'shall' is less natural for the target register.
- source_word: אַתָּה וְכָל אֲשֶׁר לָךְ
  chosen: you and all who are yours
  alternatives:
  - you and all that is yours
  - you and everything that belongs to you
  - you and all you have
  lexicon: HALOT
  rationale: The phrase can include household, dependents, and possessions. In this
    context of threatened death extending beyond Abimelech personally, 'all who are
    yours' foregrounds the people in his household while remaining broad enough to
    reflect the Hebrew.
