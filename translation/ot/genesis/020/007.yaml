theological_decisions:
- issue: Scope of the threatened judgment in 'you and all אשר לך'
  chosen_reading: 'Render broadly as extending to Abimelech and those belonging to
    his household: ''you and all who are yours.'''
  alternative_readings:
  - you and all that is yours
  - you and all you have
  rationale: The immediate narrative context concerns infertility and household-wide
    judgment, so a people-inclusive rendering best reflects the likely scope without
    excluding possessions categorically. This is a contextual judgment, not a doctrinal
    expansion.
  doctrine_reference: Translation philosophy §3, §5
