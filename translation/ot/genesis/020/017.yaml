id: GEN.20.17
reference: Genesis 20:17
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֥ל אַבְרָהָ֖ם אֶל הָ/אֱלֹהִ֑ים וַ/יִּרְפָּ֨א אֱלֹהִ֜ים אֶת אֲבִימֶ֧לֶךְ
    וְ/אֶת אִשְׁתּ֛/וֹ וְ/אַמְהֹתָ֖י/ו וַ/יֵּלֵֽדוּ־־־׃
translation:
  text: Then Abraham prayed to God, and God healed Abimelech, his wife, and his female
    servants, so that they gave birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his maidservants'; the Hebrew term can also denote female slaves.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and they gave birth'; the wording here brings out the result
      of God's healing in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  - prayed earnestly
  lexicon: HALOT
  rationale: Hitpael of פלל commonly means 'to pray.' 'Prayed' is the plain and natural
    English equivalent here; the context implies intercession for Abimelech, but that
    nuance is not explicit enough to require 'interceded' in the main text.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English idiom normally omits it
    before 'God' when referring to the true God. 'To God' is both accurate and natural.
- source_word: וַיִּרְפָּא
  chosen: healed
  alternatives:
  - restored
  - cured
  lexicon: HALOT
  rationale: רפא means 'to heal.' In context, God reverses the affliction described
    in the following verse. 'Healed' preserves the direct lexical sense without over-specifying
    the medical condition.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the true God, not 'gods' or a generic
    deity, so 'God' is the correct rendering.
- source_word: אֶת אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Direct object marker plus proper name; standard transliteration of the
    personal name is appropriate.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Straightforward possessive noun phrase referring to Abimelech's wife.
- source_word: אַמְהֹתָיו
  chosen: his female servants
  alternatives:
  - his maidservants
  - his slave women
  lexicon: HALOT
  rationale: אָמָה refers to a female servant/slave. 'Female servants' is clear modern
    English and fits optimal equivalence. 'Maidservants' is possible but somewhat
    archaic; 'slave women' may overemphasize status beyond what the immediate context
    requires.
- source_word: וַיֵּלֵדוּ
  chosen: so that they gave birth
  alternatives:
  - and they bore children
  - and they were able to bear children
  lexicon: HALOT
  rationale: ילד means 'to bear/give birth.' Given the preceding healing and the explanation
    in v.18 that the wombs had been closed, English benefits from making the result
    relation explicit with 'so that.' 'Gave birth' is idiomatic and faithful; the
    object 'children' is implied in English and need not be supplied.
