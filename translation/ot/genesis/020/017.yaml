theological_decisions:
- issue: Relation of the final verb to the healing
  chosen_reading: 'Render the final clause as a result of God''s healing: ''so that
    they gave birth.'''
  alternative_readings:
  - 'Keep a more formally sequential rendering: ''and they gave birth'''
  rationale: The Hebrew waw-consecutive can be rendered simply as sequence, but in
    context the clause expresses the effect of God's healing, clarified explicitly
    in v.18. Using 'so that' preserves the narrative logic without adding doctrinal
    content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Social-status nuance of אָמָה
  chosen_reading: Use 'female servants' in the main text.
  alternative_readings:
  - maidservants
  - slave women
  rationale: The term can denote female slaves/servants. Because the verse's focus
    is the restoration of fertility rather than the bonded status of these women,
    'female servants' best fits optimal equivalence while preserving the gendered
    reference. The stronger alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §5
