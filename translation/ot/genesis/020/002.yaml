id: GEN.20.2
reference: Genesis 20:2
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר אַבְרָהָ֛ם אֶל שָׂרָ֥ה אִשְׁתּ֖/וֹ אֲחֹ֣תִ/י הִ֑וא וַ/יִּשְׁלַ֗ח
    אֲבִימֶ֨לֶךְ֙ מֶ֣לֶךְ גְּרָ֔ר וַ/יִּקַּ֖ח אֶת שָׂרָֽה־־׃
translation:
  text: And Abraham said of Sarah his wife, “She is my sister.” So Abimelech king
    of Gerar sent and took Sarah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “said to Sarah his wife.” The Hebrew preposition can be read more literally
      that way, but the context favors the sense that Abraham spoke about Sarah, since
      the statement reported is “She is my sister.”
    reason: lexical_alternative
  - marker: b
    text: That is, Abimelech had Sarah brought to him; the Hebrew simply says “sent
      and took Sarah.”
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from אמר. 'Said' is the natural English
    narrative equivalent.
- source_word: אֶל שָׂרָה אִשְׁתּוֹ
  chosen: of Sarah his wife
  alternatives:
  - to Sarah his wife
  - concerning Sarah his wife
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with אמר it can introduce the person spoken
    about in contexts like this, as shown by the quoted statement 'She is my sister.'
    English 'said of' best captures the sense without implying Abraham addressed Sarah
    directly.
- source_word: אֲחֹתִי הִוא
  chosen: She is my sister
  alternatives:
  - She is a sister of mine
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the verbless clause. The 1cs suffix
    on 'sister' is naturally expressed in English as 'my sister.'
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: Basic sense of שלח is 'send.' In this context the object is omitted and
    followed by 'took Sarah,' so English can simply say 'sent,' leaving the implied
    agents unstated.
- source_word: מֶלֶךְ גְּרָר
  chosen: king of Gerar
  alternatives:
  - the king of Gerar
  lexicon: HALOT
  rationale: Construct chain identifying Abimelech's royal role and domain. English
    apposition without the article is idiomatic after a proper name.
- source_word: וַיִּקַּח אֶת שָׂרָה
  chosen: took Sarah
  alternatives:
  - took Sarah into his household
  - seized Sarah
  lexicon: HALOT
  rationale: לקח means 'take.' Here it refers to Abimelech's taking Sarah into his
    household, likely for marriage/concubinage, but the Hebrew itself states only
    'took Sarah,' so the main text stays restrained.
