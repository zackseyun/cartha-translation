theological_decisions:
- issue: Potentially interpretive expansion of Abimelech's action
  chosen_reading: took Sarah
  alternative_readings:
  - took Sarah into his household
  - took Sarah as wife
  rationale: The narrative context clarifies Abimelech intended to acquire Sarah,
    but this verse itself does not explicitly say 'as wife.' To avoid importing more
    than the Hebrew states, the translation keeps the simple verb and leaves fuller
    implications to context.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
