id: GEN.20.15
reference: Genesis 20:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲבִימֶ֔לֶךְ הִנֵּ֥ה אַרְצִ֖/י לְ/פָנֶ֑י/ךָ בַּ/טּ֥וֹב בְּ/עֵינֶ֖י/ךָ שֵֽׁב׃
translation:
  text: And Abimelech said, “Look, my land is before you; settle wherever seems good in your eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “dwell where it seems best to you.”
    reason: lexical_alternative
  - marker: b
    text: Or 'wherever it is good in your eyes'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is natural modern English and preserves the demonstrative force better than omitting it; 'Behold' is too archaic for the stated style.
- source_word: אַרְצִי
  chosen: my land
  alternatives:
  - my country
  - my territory
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, country, or territory. Here Abimelech offers place of residence within his domain; 'my land' is broad and natural, avoiding the more political nuance of 'country' and the more technical 'territory'.
- source_word: לְפָנֶיךָ
  chosen: is before you
  alternatives:
  - lies before you
  - is open to you
  lexicon: HALOT
  rationale: Literal idiom meaning available/presented to someone. 'Is before you' preserves the Hebrew image while remaining understandable in English.
- source_word: בַּטּוֹב
  chosen: wherever it is good
  alternatives:
  - in the best place
  - where it seems best
  lexicon: HALOT
  rationale: With the following בְּעֵינֶיךָ, the phrase expresses what appears good/pleasing to the addressee. Rendering with 'wherever it is good' keeps the evaluative sense tied to the next phrase rather than making it an abstract superlative.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - to you
  - as you see fit
  lexicon: HALOT
  rationale: Common Hebrew idiom for personal judgment or preference. 'In your eyes' preserves the idiom in readable English; the sense is then naturally understood as 'as seems good to you.'
- source_word: שֵׁב
  chosen: settle
  alternatives:
  - dwell
  - live
  - stay
  lexicon: HALOT
  rationale: Imperative of ישׁב can mean sit, dwell, remain, or settle. In context of granting residence in the land, 'settle' best captures permission to reside, more specifically than 'stay' and more idiomatically than 'dwell'.
