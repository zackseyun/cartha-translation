  from: wherever it is good in your eyes
  to: wherever seems good in your eyes
  rationale: The current rendering is a slightly stiff, literal translation of the Hebrew idiom `baṭṭôḇ bə‘êneyḵā`. Changing 'it is good' to 'seems good' results in a more natural English phrase ('wherever seems good in your eyes') while still preserving the drafter's choice to retain the 'in your eyes' component of the Hebraism. This change better captures the subjective nature of the judgment implied by the idiom.
