id: GEN.20.6
reference: Genesis 20:6
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ אֵלָ֨י/ו הָֽ/אֱלֹהִ֜ים בַּ/חֲלֹ֗ם גַּ֣ם אָנֹכִ֤י יָדַ֨עְתִּי֙
    כִּ֤י בְ/תָם לְבָבְ/ךָ֙ עָשִׂ֣יתָ זֹּ֔את וָ/אֶחְשֹׂ֧ךְ גַּם אָנֹכִ֛י אֽוֹתְ/ךָ֖
    מֵ/חֲטוֹ לִ֑/י עַל כֵּ֥ן לֹא נְתַתִּ֖י/ךָ לִ/נְגֹּ֥עַ אֵלֶֽי/הָ־־־־־׃
translation:
  text: Then God said to him in the dream, “Yes, I know that you did this in the integrity
    of your heart, and I also kept you from sinning against me. Therefore I did not
    let you touch her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a dream.” The Hebrew can be read indefinitely, though the article
      favors “in the dream” in this context.
    reason: lexical_alternative
  - marker: b
    text: “Touch her” is a restrained expression here referring to sexual contact.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲלוֹם
  chosen: in the dream
  alternatives:
  - in a dream
  lexicon: HALOT
  rationale: The prefixed article on חֲלוֹם supports a definite rendering in this
    narrative context, referring to the specific dream already underway.
- source_word: גַּם אָנֹכִי
  chosen: Yes, I
  alternatives:
  - also I
  - indeed I
  lexicon: HALOT
  rationale: The combination adds emphasis. 'Yes, I' gives natural English while preserving
    the emphatic force; the second occurrence is rendered 'I also' to reflect repetition
    without awkwardness.
- source_word: יָדַעְתִּי
  chosen: know
  alternatives:
  - have known
  - knew
  lexicon: HALOT
  rationale: A present-tense English rendering fits the direct speech context and
    conveys God's present acknowledgment of Abimelech's motive.
- source_word: בְתָם לְבָבְךָ
  chosen: in the integrity of your heart
  alternatives:
  - with integrity of heart
  - in the innocence of your heart
  - in the blamelessness of your heart
  lexicon: HALOT
  rationale: תֹּם denotes integrity/completeness/uprightness. 'Integrity of your heart'
    preserves the moral sense without overstating legal innocence.
- source_word: עָשִׂיתָ זֹּאת
  chosen: you did this
  alternatives:
  - you have done this
  lexicon: HALOT
  rationale: Simple past is the most natural narrative rendering in English direct
    speech.
- source_word: וָאֶחְשֹׂךְ ... אוֹתְךָ
  chosen: I also kept you
  alternatives:
  - I withheld you
  - I spared you
  - I restrained you
  lexicon: HALOT
  rationale: חָשַׂךְ here means to hold back or prevent. 'Kept you' is idiomatic with
    the following infinitive construction and clearly expresses divine prevention.
- source_word: מֵחֲטוֹא לִי
  chosen: from sinning against me
  alternatives:
  - from sinning to me
  - from offending me
  lexicon: HALOT
  rationale: The infinitive construct with מן expresses prevention from an action;
    לִי is best understood ethically as 'against me,' since the contemplated act would
    be a sin against God.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: This marks the consequence of God's restraint in the preceding clause.
- source_word: לֹא נְתַתִּיךָ
  chosen: I did not let you
  alternatives:
  - I did not give you
  - I did not allow you
  - I did not permit you
  lexicon: HALOT
  rationale: נָתַן with infinitive here functions idiomatically as allowing/letting.
    'Did not let you' is natural modern English.
- source_word: לִנְגֹּעַ אֵלֶיהָ
  chosen: touch her
  alternatives:
  - come near her
  - have contact with her
  lexicon: HALOT
  rationale: נגע can mean touch physically, but in this context it is a modest idiom
    for sexual contact. 'Touch her' preserves the source's restraint and narrative
    decorum.
