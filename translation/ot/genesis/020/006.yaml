theological_decisions:
- issue: Meaning of 'sinning against me' in divine speech
  chosen_reading: The offense is described as sin against God, not merely against
    Sarah or Abraham.
  alternative_readings:
  - sin against me = offend me generally
  - sin against me = incur guilt before me
  rationale: The Hebrew לִי in context identifies God as the one against whom the
    contemplated adultery would be committed in an ultimate moral sense. This preserves
    the theological dimension already explicit in the text without adding doctrinal
    content beyond it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
