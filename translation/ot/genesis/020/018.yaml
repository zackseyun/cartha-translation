id: GEN.20.18
reference: Genesis 20:18
source:
  edition: WLC
  text: כִּֽי עָצֹ֤ר עָצַר֙ יְהוָ֔ה בְּעַ֥ד כָּל רֶ֖חֶם לְ/בֵ֣ית אֲבִימֶ֑לֶךְ עַל
    דְּבַ֥ר שָׂרָ֖ה אֵ֥שֶׁת אַבְרָהָֽם־־־׃ס
translation:
  text: For the LORD had completely closed every womb in Abimelech’s household because
    of Sarah, Abraham’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had surely shut' or 'had utterly closed'; the Hebrew uses an infinitive
      absolute with the finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding verse; 'for' fits
    the discourse connection in English.
- source_word: עָצֹר עָצַר
  chosen: had completely closed
  alternatives:
  - had surely shut
  - had utterly restrained
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Had
    completely closed' captures both the emphatic construction and the context of
    wombs being shut.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: בְּעַד
  chosen: in
  alternatives:
  - for
  - on behalf of
  - within
  lexicon: HALOT
  rationale: 'With ''every womb'' and ''household,'' the sense is locative/sphere:
    the closure affected the women in Abimelech''s household. English idiom is best
    expressed as ''in Abimelech’s household.'''
- source_word: כָּל רֶחֶם
  chosen: every womb
  alternatives:
  - all wombs
  - every uterus
  lexicon: HALOT
  rationale: A literal but natural rendering of the collective expression; preserves
    the concrete bodily image rather than abstracting to infertility.
- source_word: לְבֵית אֲבִימֶלֶךְ
  chosen: in Abimelech’s household
  alternatives:
  - of the house of Abimelech
  - belonging to Abimelech's house
  lexicon: HALOT
  rationale: '''House'' here denotes the household or domestic sphere, not merely
    the physical building. ''Household'' is the clearest modern English equivalent.'
- source_word: עַל דְּבַר
  chosen: because of
  alternatives:
  - on account of
  - concerning
  lexicon: HALOT
  rationale: In this context the phrase gives the reason for the judgment. 'Because
    of' is the most natural causal rendering.
- source_word: אֵשֶׁת אַבְרָהָם
  chosen: Abraham’s wife
  alternatives:
  - the wife of Abraham
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English while preserving the identifying
    relationship central to the narrative.
