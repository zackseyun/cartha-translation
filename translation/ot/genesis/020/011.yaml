id: GEN.20.11
reference: Genesis 20:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַבְרָהָ֔ם כִּ֣י אָמַ֗רְתִּי רַ֚ק אֵין יִרְאַ֣ת אֱלֹהִ֔ים בַּ/מָּק֖וֹם
    הַ/זֶּ֑ה וַ/הֲרָג֖וּ/נִי עַל דְּבַ֥ר אִשְׁתִּֽ/י־־׃
translation:
  text: And Abraham said, “Because I said, ‘Surely there is no fear of God in this
    place, and they will kill me because of my wife.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “there is no reverence for God in this place.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Introduces Abraham's explanation for his prior deception. 'Because' best
    fits the causal sense in natural English.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  - I said to myself
  lexicon: HALOT
  rationale: The verb is the common 'say.' In context it can imply internal reasoning,
    but the plain lexical sense is retained.
- source_word: רַק
  chosen: Surely
  alternatives:
  - Only
  - Certainly
  lexicon: HALOT
  rationale: Here רַק functions idiomatically to emphasize Abraham's assumption. 'Surely'
    conveys the restrictive/emphatic force more naturally than the wooden 'only.'
- source_word: אֵין יִרְאַת אֱלֹהִים
  chosen: there is no fear of God
  alternatives:
  - there is no reverence for God
  - there is no fear of God at all
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'Fear of God' preserves
    the biblical idiom and its moral-religious weight better than smoothing to 'reverence.'
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this region
  - here
  lexicon: HALOT
  rationale: Formal but natural rendering of the locative phrase; no contextual pressure
    requires expansion.
- source_word: וַהֲרָגוּנִי
  chosen: and they will kill me
  alternatives:
  - so they will kill me
  - and they would kill me
  lexicon: HALOT
  rationale: The verb expresses Abraham's expected consequence. English future best
    captures his anticipation from the past standpoint within direct speech.
- source_word: עַל דְּבַר אִשְׁתִּי
  chosen: because of my wife
  alternatives:
  - on account of my wife
  - for the sake of my wife
  lexicon: HALOT
  rationale: The idiom means 'because of' or 'on account of.' 'Because of my wife'
    is the clearest modern English rendering in context.
