theological_decisions:
- issue: Rendering יִרְאַת אֱלֹהִים
  chosen_reading: fear of God
  alternative_readings:
  - reverence for God
  rationale: The phrase denotes religious-moral accountability before God. The translation
    preserves the canonical idiom rather than softening it, since the Hebrew explicitly
    uses 'fear.'
  doctrine_reference: Translation philosophy §1, §6
