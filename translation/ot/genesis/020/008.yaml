id: GEN.20.8
reference: Genesis 20:8
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם אֲבִימֶ֜לֶךְ בַּ/בֹּ֗קֶר וַ/יִּקְרָא֙ לְ/כָל עֲבָדָ֔י/ו וַ/יְדַבֵּ֛ר
    אֶת כָּל הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה בְּ/אָזְנֵי/הֶ֑ם וַ/יִּֽירְא֥וּ הָ/אֲנָשִׁ֖ים
    מְאֹֽד־־־׃
translation:
  text: So Abimelech rose early in the morning and called all his servants and spoke
    all these things in their hearing, and the men were very afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned all his servants.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the men feared greatly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of שׁכם commonly means to rise early. 'Rose early'
    is natural modern English and preserves the temporal urgency without unnecessary
    archaism.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - early in the morning
  lexicon: HALOT
  rationale: Literally 'in the morning.' Combined with וַיַּשְׁכֵּם, the English phrase
    'rose early in the morning' reflects the Hebrew idiom naturally.
- source_word: וַיִּקְרָא לְכָל עֲבָדָיו
  chosen: called all his servants
  alternatives:
  - summoned all his servants
  - called all his slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave depending on context. Here the text refers
    to royal household attendants/courtiers without emphasizing bonded status, so
    'servants' is the better contextual rendering under the project's servant/slave
    policy. 'Called' is straightforward for קרא, though 'summoned' is possible.
- source_word: וַיְדַבֵּר אֶת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: spoke all these things
  alternatives:
  - told them all these things
  - spoke all these words
  lexicon: HALOT
  rationale: דבר with אֵת here introduces the content spoken. 'Spoke all these things'
    stays close to the Hebrew while remaining idiomatic. 'Words' is more formal, but
    'things' better fits contemporary English for reported matters.
- source_word: בְּאָזְנֵיהֶם
  chosen: in their hearing
  alternatives:
  - in their ears
  - to them
  lexicon: HALOT
  rationale: Literally 'in their ears,' an idiom meaning openly in their hearing.
    'In their hearing' preserves the idiomatic force without wooden literalism.
- source_word: וַיִּירְאוּ
  chosen: were very afraid
  alternatives:
  - feared greatly
  - became very afraid
  lexicon: HALOT
  rationale: ירא can denote fear or reverence; here the context is alarm after Abimelech's
    report, so 'were very afraid' best captures the emotional sense. The stative English
    phrasing reads naturally after the narrative sequence.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'the men.' Per the gender-accurate
    policy, 'the men' should be retained rather than neutralized to 'people,' especially
    since it likely refers to the male members/officials of Abimelech's household.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the fear. 'Very' is simple, accurate, and natural in
    modern English.
