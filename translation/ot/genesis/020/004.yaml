theological_decisions:
- issue: Corporate scope of 'nation' in Abimelech's plea
  chosen_reading: Render גּוֹי as 'nation' and preserve the corporate sense without
    narrowing it to Abimelech alone.
  alternative_readings:
  - people
  - household
  rationale: The Hebrew uses a collective term, and the context in the surrounding
    passage shows judgment threatening more than the individual king. 'Nation' preserves
    that corporate dimension without overinterpreting the exact political scale.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
