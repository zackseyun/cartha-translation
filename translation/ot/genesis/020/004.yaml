id: GEN.20.4
reference: Genesis 20:4
source:
  edition: WLC
  text: וַ/אֲבִימֶ֕לֶךְ לֹ֥א קָרַ֖ב אֵלֶ֑י/הָ וַ/יֹּאמַ֕ר אֲדֹנָ֕/י הֲ/ג֥וֹי גַּם
    צַדִּ֖יק תַּהֲרֹֽג־׃
translation:
  text: Now Abimelech had not come near her, so he said, “Lord, will you kill even
    a righteous nation?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people.' The Hebrew גּוֹי is a collective term for a people-group or
      nation.
    reason: lexical_alternative
  - marker: b
    text: '''Had not come near her'' is a Hebrew idiom implying that Abimelech had
      not had sexual relations with Sarah.'
    reason: cultural_note
lexical_decisions:
- source_word: קָרַב אֵלֶיהָ
  chosen: had not come near her
  alternatives:
  - had not approached her
  - had not slept with her
  lexicon: HALOT
  rationale: The idiom literally means 'come near to her.' In this context it indicates
    Abimelech had not had sexual relations with Sarah, but the more literal 'come
    near her' preserves the Hebrew wording while allowing the implication to be understood
    from context.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord God
  lexicon: HALOT
  rationale: Here Abimelech addresses God in the dream. 'Lord' is the natural English
    rendering of the title and aligns with the project's default treatment of divine
    titles. 'My Lord' would be overly wooden in English here, and 'Lord God' adds
    wording not present in the Hebrew.
- source_word: הֲגוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גּוֹי ordinarily denotes a nation or people-group. 'Nation' best fits
    the singular collective sense here, likely referring to Abimelech's household
    or polity as a corporate entity.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'In this rhetorical question, גַּם heightens the force: ''even a righteous
    nation?'' ''Even'' communicates the emphatic sense better than the flatter ''also.'''
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - innocent
  - just
  lexicon: HALOT
  rationale: The adjective can describe moral innocence or righteousness. 'Righteous'
    preserves the lexical connection to broader biblical usage while fitting Abimelech's
    claim that he and his people are not guilty in this matter.
- source_word: תַּהֲרֹג
  chosen: will you kill
  alternatives:
  - would you kill
  - will you slay
  lexicon: HALOT
  rationale: The imperfect in this direct question is well represented by 'will you
    kill.' 'Slay' is more archaic, and 'would you kill' is possible but slightly less
    direct than the Hebrew rhetorical appeal.
- source_word: וַאֲבִימֶלֶךְ ... וַיֹּאמַר
  chosen: Now Abimelech ... so he said
  alternatives:
  - But Abimelech ... and he said
  - Then Abimelech ... said
  lexicon: HALOT
  rationale: 'The waw forms advance the narrative. ''Now ... so he said'' gives readable
    modern English while preserving the sequence and explanatory force: because he
    had not come near her, he protests his innocence.'
