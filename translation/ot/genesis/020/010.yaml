id: GEN.20.10
reference: Genesis 20:10
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲבִימֶ֖לֶךְ אֶל אַבְרָהָ֑ם מָ֣ה רָאִ֔יתָ כִּ֥י עָשִׂ֖יתָ אֶת
    הַ/דָּבָ֥ר הַ/זֶּֽה־־׃
translation:
  text: Then Abimelech said to Abraham, “What did you see, that you did this thing?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What had you in mind, that you did this thing?' The Hebrew literally
      says, 'What did you see...?' using 'see' idiomatically for what one perceived
      or had in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force better than a bare 'said.'
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: אֶל
  chosen: to
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee of speech.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Personal name is transliterated by standard English convention.
- source_word: מָה
  chosen: What
  alternatives:
  - Why
  lexicon: HALOT
  rationale: Interrogative 'what' is the plain lexical sense. Although the clause
    as a whole asks about motive, the Hebrew expresses it through 'what did you see,'
    not a direct 'why,' so the more literal interrogative is retained.
- source_word: רָאִיתָ
  chosen: did you see
  alternatives:
  - had you seen
  - were you thinking
  lexicon: HALOT
  rationale: The verb is literally 'see.' In this idiom it asks what Abraham perceived,
    considered, or had in view. 'Did you see' preserves the Hebrew imagery and leaves
    the implied motive question intact without paraphrasing.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  - so that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content related to the preceding question:
    ''what did you see, that you did...?'' ''That'' best reflects the linkage in idiomatic
    English.'
- source_word: עָשִׂיתָ
  chosen: you did
  alternatives:
  - you have done
  - you acted
  lexicon: HALOT
  rationale: Simple past fits the narrative dialogue naturally in English. 'Acted'
    would be interpretive; 'did' stays closer to the Hebrew verb.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this deed
  - this matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this context of Abraham's
    action, 'this thing' is a natural, close rendering. 'This deed' is possible but
    slightly more interpretive and morally weighted than the Hebrew requires.
