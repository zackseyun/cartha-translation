id: GEN.30.30
reference: Genesis 30:30
source:
  edition: WLC
  text: כִּ֡י מְעַט֩ אֲשֶׁר הָיָ֨ה לְ/ךָ֤ לְ/פָנַ/י֙ וַ/יִּפְרֹ֣ץ לָ/רֹ֔ב וַ/יְבָ֧רֶךְ יְהוָ֛ה אֹתְ/ךָ֖ לְ/רַגְלִ֑/י וְ/עַתָּ֗ה מָתַ֛י אֶֽעֱשֶׂ֥ה גַם אָנֹכִ֖י לְ/בֵיתִֽ/י־־׃
translation:
  text: For the little that you had before me has increased to abundance, and Yahweh has blessed you at my foot. And now, when shall I also provide for my own household?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'at my foot'; the idiom likely means 'at my coming' or 'because of me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when shall I also do something for my own house?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  chosen: the little
  alternatives:
  - little
  - few
  lexicon: HALOT
  rationale: Conveys small quantity idiomatically in English; with אֲשֶׁר הָיָה לְךָ it refers to the small amount of possessions Laban had.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - when I came
  - in my presence
  lexicon: HALOT
  rationale: Formally the phrase is 'before me.' In context Jacob contrasts Laban's holdings prior to Jacob's arrival/service with their later increase. Main text keeps the more literal wording while remaining intelligible.
- source_word: וַיִּפְרֹץ לָרֹב
  chosen: has increased into abundance
  alternatives:
  - burst forth into a multitude
  - spread abroad greatly
  - increased greatly
  lexicon: HALOT
  rationale: The verb פרץ has the sense of breaking out/increasing rapidly; לָרֹב marks great abundance. The chosen rendering captures both growth and resulting abundance in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: לְרַגְלִי
  chosen: at my coming
  alternatives:
  - at my feet
  - because of me
  - with me
  lexicon: HALOT
  rationale: Literally 'at my foot/feet,' an idiom meaning 'on my account' or 'with my coming/wherever I went.' 'At my coming' best fits the immediate contrast with Laban's prior state and preserves Jacob's claim that blessing accompanied his arrival.
- source_word: מָתַי
  chosen: when shall
  alternatives:
  - when
  - how long until
  lexicon: HALOT
  rationale: An interrogative of time introducing Jacob's appeal for the time to begin working for his own interests.
- source_word: אֶעֱשֶׂה ... לְבֵיתִי
  chosen: shall I also provide for my own household
  alternatives:
  - shall I also do for my house
  - shall I make something for my household
  lexicon: HALOT
  rationale: עשה with ל plus 'house' is idiomatic for acting to secure one's household's welfare. 'Provide for' makes the implied economic sense explicit without over-paraphrasing.
- source_word: גַם אָנֹכִי
  chosen: I also
  alternatives:
  - also I
  - I too
  lexicon: HALOT
  rationale: 'Emphasizes contrast: Jacob has benefited Laban; now he asks when he too may work for his own family.'
