id: GEN.30.33
reference: Genesis 30:33
source:
  edition: WLC
  text: וְ/עָֽנְתָה בִּ֤/י צִדְקָתִ/י֙ בְּ/י֣וֹם מָחָ֔ר כִּֽי תָב֥וֹא עַל שְׂכָרִ֖/י
    לְ/פָנֶ֑י/ךָ כֹּ֣ל אֲשֶׁר אֵינֶ/נּוּ֩ נָקֹ֨ד וְ/טָל֜וּא בָּֽ/עִזִּ֗ים וְ/חוּם֙
    בַּ/כְּשָׂבִ֔ים גָּנ֥וּב ה֖וּא אִתִּֽ/י־־־־׃
translation:
  text: 'So my righteousness will answer for me later, when you come concerning my
    wages before you: every goat that is not speckled and spotted, and every lamb
    that is not dark, is stolen if it is found with me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my righteousness' or 'my integrity will answer for me.' Here the Hebrew
      term refers to Jacob's demonstrable uprightness in the wage arrangement.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on the day tomorrow'; the phrase may mean 'tomorrow' or more
      generally 'at a later time' when Laban examines the flock.
    reason: lexical_alternative
  - marker: c
    text: Or 'brown' among the sheep/lambs; the Hebrew term denotes a dark-colored
      animal.
    reason: lexical_alternative
  - marker: d
    text: Or 'every one among the goats that is not speckled or spotted, and among
      the lambs that is not dark-colored'.
    reason: previous_rendering
  - marker: e
    text: Or 'when you come to inspect my wages before you'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעָנְתָה
  chosen: will answer for
  alternatives:
  - will testify for
  - will bear witness for
  lexicon: HALOT
  rationale: ענה in this context has the sense of giving an answering testimony or
    response. 'Will answer for' preserves the idiom while remaining natural in English.
- source_word: בִּי
  chosen: for me
  alternatives:
  - against me
  - concerning me
  lexicon: HALOT
  rationale: With ענה, the preposition can indicate the person on whose behalf the
    testimony answers. The context is Jacob's integrity being vindicated, so 'for
    me' best fits.
- source_word: צִדְקָתִי
  chosen: my honesty
  alternatives:
  - my righteousness
  - my integrity
  lexicon: HALOT
  rationale: In this wage-negotiation context, the term refers to demonstrable uprightness
    in dealing, not primarily covenantal or forensic righteousness. 'Honesty' communicates
    the practical ethical sense clearly in modern English.
- source_word: בְּיוֹם מָחָר
  chosen: later
  alternatives:
  - tomorrow
  - in the future
  lexicon: HALOT
  rationale: The phrase literally means 'on the day tomorrow,' but idiomatically here
    it points to a subsequent inspection rather than necessarily the next calendar
    day. 'Later' captures the sense naturally.
- source_word: כִּי תָבוֹא עַל שְׂכָרִי לְפָנֶיךָ
  chosen: when you come to inspect my wages before you
  alternatives:
  - when you come concerning my wages before you
  - when you come over my wages in your presence
  lexicon: HALOT
  rationale: The clause describes Laban's future examination of Jacob's pay. 'Inspect'
    makes explicit the practical force of תבוא על in this setting while retaining
    the directness of the Hebrew.
- source_word: נָקֹד
  chosen: speckled
  alternatives:
  - spotted
  lexicon: HALOT
  rationale: נקד commonly denotes marked with small spots or speckles. 'Speckled'
    distinguishes it from the following term.
- source_word: טָלוּא
  chosen: spotted
  alternatives:
  - patchy
  - mottled
  lexicon: HALOT
  rationale: This term refers to animals marked with patches or spots. 'Spotted' is
    a clear English counterpart and complements 'speckled' for נקד.
- source_word: חוּם
  chosen: dark-colored
  alternatives:
  - brown
  - dark
  lexicon: HALOT
  rationale: The adjective likely refers to a dark or brown coloration in the sheep.
    'Dark-colored' is slightly broader and avoids overprecision where the exact shade
    may be debated.
- source_word: בָּעִזִּים
  chosen: among the goats
  alternatives:
  - in the goats
  lexicon: HALOT
  rationale: The phrase identifies the class of animals under discussion. 'Among the
    goats' is idiomatic English.
- source_word: בַּכְּשָׂבִים
  chosen: among the lambs
  alternatives:
  - among the sheep
  lexicon: HALOT
  rationale: כשבים often refers to young sheep/lambs. 'Lambs' reflects the lexical
    value, though in context it functions as part of the flock classification.
- source_word: גָּנוּב הוּא אִתִּי
  chosen: will be considered stolen if it is found with me
  alternatives:
  - is stolen with me
  - is stolen if with me
  lexicon: HALOT
  rationale: 'The Hebrew is terse: any such animal found with Jacob counts as stolen.
    The expanded English makes the implied judicial sense explicit without changing
    the meaning.'
