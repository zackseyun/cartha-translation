  tier: 1
  from: when you come to inspect my wages before you
  to: when you come to inspect my wages
  rationale: The Hebrew phrase `לְפָנֶיךָ` ('before you') emphasizes that the inspection
    happens in Laban's presence and for his judgment. However, in the English construction
    'when you come to inspect...', adding 'before you' at the end is redundant and
    stylistically awkward, as Laban's presence is already established by 'you come'.
    Removing the final phrase improves the English flow without losing essential meaning,
    which is already conveyed by the act of personal inspection.
