id: GEN.30.24
reference: Genesis 30:24
source:
  edition: WLC
  text: וַ/תִּקְרָ֧א אֶת שְׁמ֛/וֹ יוֹסֵ֖ף לֵ/אמֹ֑ר יֹסֵ֧ף יְהוָ֛ה לִ֖/י בֵּ֥ן אַחֵֽר־׃
translation:
  text: And she called his name Joseph, saying, “May Yahweh add to me another son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Joseph sounds like the Hebrew verb meaning 'may he add' or 'he adds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  chosen: And she called
  alternatives:
  - Then she called
  - So she named
  lexicon: HALOT
  rationale: Wayyiqtol of קרא introduces the next narrative action. 'Called' preserves the verbal form closely; 'named' is possible in English but the direct object 'his name' already conveys naming.
- source_word: אֶת שְׁמוֹ
  chosen: his name
  alternatives:
  - him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' Retaining 'his name' preserves the naming formula and keeps the wordplay with Joseph explicit.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - saying to herself
  - with the words
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing Rachel's explanation of the name.
- source_word: יֹסֵף
  chosen: May ... add
  alternatives:
  - The LORD will add
  - The LORD has added
  lexicon: HALOT
  rationale: Hiphil of יסף means 'add/increase.' In this naming context it functions as a wish/prayer tied to the name Joseph, best rendered jussively in English as 'May ... add.' This also matches the following direct invocation of the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל marks advantage or reference. 'To me' fits the idiom 'add to me another son' and preserves the Hebrew structure.
- source_word: בֵּן אַחֵר
  chosen: another son
  alternatives:
  - one more son
  - an additional son
  lexicon: HALOT
  rationale: בן is specifically 'son,' not generic 'child'; אַחֵר means 'another/other.' 'Another son' is the most natural and accurate rendering.
