id: GEN.30.27
reference: Genesis 30:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ לָבָ֔ן אִם נָ֛א מָצָ֥אתִי חֵ֖ן בְּ/עֵינֶ֑י/ךָ נִחַ֕שְׁתִּי וַ/יְבָרֲכֵ֥/נִי יְהוָ֖ה בִּ/גְלָלֶֽ/ךָ־׃
translation:
  text: Then Laban said to him, “If I have found favor in your eyes, please stay. I have learned by divination that Yahweh has blessed me because of you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have divined” or “I have learned by experience.” The Hebrew verb can denote divination or omen-reading; the main text preserves that stronger lexical sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'If I have now found favor in your eyes, please stay.'.
    reason: previous_rendering
lexical_decisions:
- source_word: אִם נָא מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: If I have now found favor in your eyes, please stay
  alternatives:
  - If I have found favor in your sight
  - If I have found favor with you
  lexicon: HALOT
  rationale: The idiom מָצָא חֵן בְּעֵינֵי means 'to find favor in the eyes of' someone. 'In your eyes' preserves the Hebrew imagery, while 'favor' is the standard idiomatic equivalent. The particle נָא here softens the request; because the following imperative-like request is ellipsed in Hebrew, 'please stay' is supplied in English to make the sentence coherent from context without over-paraphrasing.
- source_word: נִחַשְׁתִּי
  chosen: I have learned by divination
  alternatives:
  - I have divined
  - I have learned by experience
  - I have practiced augury
  lexicon: HALOT
  rationale: The verb נחשׁ in the piel commonly refers to divination/omen-reading. 'I have learned by divination' communicates both the completed action and the means. 'Learned by experience' is possible in some contexts, but here the lexical sense of divination is stronger and should not be muted.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְבָרֲכֵנִי
  chosen: has blessed me
  alternatives:
  - blessed me
  lexicon: HALOT
  rationale: The verb ברך means 'to bless.' The English present perfect fits Laban's statement of a discovered ongoing state resulting from past action.
- source_word: בִּגְלָלֶךָ
  chosen: because of you
  alternatives:
  - on account of you
  - for your sake
  lexicon: HALOT
  rationale: The prepositional phrase indicates cause or occasion. 'Because of you' is the most natural modern English rendering and preserves the causal force.
- source_word: לָבָן
  chosen: Laban
  rationale: Personal name transliterated according to standard English convention, per translation philosophy.
