id: GEN.30.40
reference: Genesis 30:40
source:
  edition: WLC
  text: וְ/הַ/כְּשָׂבִים֮ הִפְרִ֣יד יַעֲקֹב֒ וַ֠/יִּתֵּן פְּנֵ֨י הַ/צֹּ֧אן אֶל עָקֹ֛ד
    וְ/כָל ח֖וּם בְּ/צֹ֣אן לָבָ֑ן וַ/יָּֽשֶׁת ל֤/וֹ עֲדָרִים֙ לְ/בַדּ֔/וֹ וְ/לֹ֥א
    שָׁתָ֖/ם עַל צֹ֥אן לָבָֽן־־־־׃
translation:
  text: And Jacob separated the lambs, and he set the faces of the flock toward the
    striped and all the dark-colored among Laban's flock. Then he set apart flocks
    for himself, and did not put them with Laban’s flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the streaked' for 'the striped'; the Hebrew term refers to animals marked
      with bands or stripes.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the brown' for 'all the dark-colored among Laban’s flock.'
    reason: lexical_alternative
  - marker: c
    text: Or 'among Laban’s flock'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַכְּשָׂבִים
  chosen: the lambs
  alternatives:
  - the sheep
  - the young rams
  lexicon: HALOT
  rationale: כְּשָׂבִים commonly refers to lambs/young sheep. 'Lambs' best reflects
    the specific term rather than the broader 'sheep.' 'Young rams' is possible in
    some contexts but is less likely here given the flock-management setting.
- source_word: הִפְרִיד
  chosen: separated
  alternatives:
  - divided
  - set apart
  lexicon: HALOT
  rationale: The Hiphil of פרד means to separate or divide. 'Separated' is the most
    direct and natural rendering here.
- source_word: פְּנֵי הַצֹּאן
  chosen: the faces of the flock
  alternatives:
  - the flock
  - the front of the flock
  lexicon: HALOT
  rationale: Literally 'the faces of the flock.' This idiom refers to orienting the
    animals so they faced a certain direction. Retaining 'faces' preserves the concrete
    Hebrew image while remaining understandable in English.
- source_word: עָקֹד
  chosen: the striped
  alternatives:
  - the streaked
  - the ring-streaked
  lexicon: HALOT
  rationale: עָקֹד refers to animals marked with bands or stripes. 'Striped' is clear
    modern English. 'Ring-streaked' is more traditional but less natural; 'streaked'
    is possible but slightly less specific.
- source_word: כָל חוּם
  chosen: all the dark-colored
  alternatives:
  - all the brown
  - every dark one
  lexicon: HALOT
  rationale: חוּם denotes a dark or brown coloration. 'Dark-colored' avoids overprecision
    while fitting the animal-color context; 'brown' is possible and traditional.
- source_word: בְּצֹאן לָבָן
  chosen: among Laban’s flock
  alternatives:
  - in Laban’s flock
  lexicon: HALOT
  rationale: 'The preposition ב here is locative: the dark-colored animals are those
    found within Laban''s flock. ''Among Laban’s flock'' expresses this naturally
    in English.'
- source_word: וַיָּשֶׁת לוֹ עֲדָרִים לְבַדּוֹ
  chosen: Then he set apart flocks for himself
  alternatives:
  - and he made separate droves for himself
  - and he placed flocks by themselves for himself
  lexicon: HALOT
  rationale: שׁית means to set/place, and לְבַדּוֹ conveys separation. The sense is
    that Jacob established distinct groups belonging to himself. 'Set apart flocks
    for himself' captures both the action and the separation without awkwardness.
- source_word: וְלֹא שָׁתָם עַל צֹאן לָבָן
  chosen: and did not put them with Laban’s flock
  alternatives:
  - and did not place them upon Laban’s flock
  - and did not set them near Laban’s flock
  lexicon: HALOT
  rationale: The pronoun suffix on שָׁתָם refers to the separated flocks. The preposition
    עַל here conveys association or placement alongside/with. 'Did not put them with'
    gives the intended sense in idiomatic English.
