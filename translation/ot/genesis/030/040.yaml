  from: among Laban’s flock
  to: from Laban's flock
  rationale: The current rendering uses the common locative sense of the preposition
    'בְּ' (in, among), which creates a direct narrative contradiction with Gen. 30:35-36,
    where Laban had already removed all non-solid colored animals. A well-attested,
    though less common, meaning of 'בְּ' is to indicate origin ('from, out of'). Translating
    the phrase as 'from Laban's flock' resolves the contradiction by clarifying that
    Jacob is making the breeding flock face the new lambs that had just been *born
    from* Laban's flock. This is a superior choice as it makes the passage coherent
    without violating the Hebrew.
