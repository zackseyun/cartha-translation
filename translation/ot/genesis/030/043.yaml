theological_decisions:
- issue: Rendering terms for household laborers as slave language versus servant language
  chosen_reading: female slaves and male slaves
  alternative_readings:
  - maidservants and servants
  - female servants and male servants
  rationale: Although this is an Old Testament verse and not one of the listed contested
    terms, the translation philosophy prioritizes source-language social reality over
    softened tradition where bonded status is salient. Because these persons are listed
    among Jacob's possessions, 'slaves' better reflects the text than the less specific
    'servants.'
  doctrine_reference: Translation philosophy §1, §5
