id: GEN.30.43
reference: Genesis 30:43
source:
  edition: WLC
  text: וַ/יִּפְרֹ֥ץ הָ/אִ֖ישׁ מְאֹ֣ד מְאֹ֑ד וַֽ/יְהִי ל/וֹ֙ צֹ֣אן רַבּ֔וֹת וּ/שְׁפָחוֹת֙
    וַ/עֲבָדִ֔ים וּ/גְמַלִּ֖ים וַ/חֲמֹרִֽים־׃
translation:
  text: And the man became exceedingly prosperous, and he came to have many flocks
    and female servants and male servants and camels and donkeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidservants and servants.' The Hebrew terms can be rendered more generally
      as household servants, but here they are listed among acquired property, so
      'female slaves and male slaves' was chosen.
    reason: lexical_alternative
  - marker: b
    text: Or 'many flocks, and female slaves and male slaves, and camels and donkeys'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּפְרֹץ
  chosen: became exceedingly prosperous
  alternatives:
  - increased greatly
  - spread out exceedingly
  - grew exceedingly
  lexicon: HALOT
  rationale: The verb פרץ literally conveys breaking out or bursting forth, and in
    this context idiomatically denotes dramatic increase or flourishing in wealth.
    'Became exceedingly prosperous' captures the resultative sense in natural English
    while preserving the intensity.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש = Jacob
  - the person
  lexicon: HALOT
  rationale: The Hebrew uses the common noun 'the man,' referring to Jacob in context.
    Retaining 'the man' follows the source wording and avoids unnecessary explicitation.
- source_word: מְאֹד מְאֹד
  chosen: exceedingly
  alternatives:
  - very, very much
  - greatly
  lexicon: HALOT
  rationale: The doubled adverb intensifies the statement strongly. 'Exceedingly'
    is concise, idiomatic, and preserves the emphatic force without awkward repetition.
- source_word: וַיְהִי לוֹ
  chosen: he came to have
  alternatives:
  - he had
  - there came to be for him
  lexicon: HALOT
  rationale: The construction marks resultant possession. 'He came to have' reflects
    the narrative development better than the flatter 'he had,' while remaining readable.
- source_word: צֹאן רַבּוֹת
  chosen: many flocks
  alternatives:
  - large flocks
  - much livestock of the flock
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep and goats.
    'Many flocks' is a natural rendering that reflects plurality and abundance; 'large
    flocks' would also fit, but 'many' aligns more directly with רַבּוֹת.
- source_word: שְׁפָחוֹת
  chosen: female slaves
  alternatives:
  - maidservants
  - female servants
  lexicon: HALOT
  rationale: This term denotes female household slaves/servants. In keeping with the
    translation philosophy, 'slaves' is preferred where bonded status is salient;
    the paired male/female household laborers here are part of Jacob's acquired property.
- source_word: עֲבָדִים
  chosen: male slaves
  alternatives:
  - servants
  - slaves
  lexicon: HALOT
  rationale: The masculine counterpart to שְׁפָחוֹת refers to male slaves/servants.
    'Male slaves' makes the gender distinction explicit and preserves the social reality
    of bonded labor in the text.
- source_word: גְמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Standard rendering of the animal term.
- source_word: חֲמֹרִים
  chosen: donkeys
  alternatives:
  - asses
  lexicon: HALOT
  rationale: '''Donkeys'' is the standard modern English equivalent; ''asses'' is
    archaic in contemporary usage.'
