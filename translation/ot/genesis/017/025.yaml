  from: when the flesh of his foreskin was circumcised
  to: when he was circumcised in the flesh of his foreskin
  rationale: The current rendering makes 'the flesh of his foreskin' the grammatical subject of the passive verb 'was circumcised.' This is awkward and shifts the focus from Ishmael, who is the logical subject of the action in the Hebrew (indicated by the suffix on the infinitive בְּהִמֹּלוֹ, 'in his being circumcised'). The suggested rewrite maintains Ishmael as the one being acted upon and correctly renders אֵת בְּשַׂר עָרְלָתוֹ as an accusative of respect ('in the flesh of his foreskin'), which is more syntactically faithful, clearer English, and aligns with the rendering in most formal equivalence translations.
