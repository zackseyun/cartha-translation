id: GEN.17.25
reference: Genesis 17:25
source:
  edition: WLC
  text: וְ/יִשְׁמָעֵ֣אל בְּנ֔/וֹ בֶּן שְׁלֹ֥שׁ עֶשְׂרֵ֖ה שָׁנָ֑ה בְּ/הִ֨מֹּל֔/וֹ אֵ֖ת בְּשַׂ֥ר עָרְלָתֽ/וֹ־׃
translation:
  text: And Ishmael his son was thirteen years old when he was circumcised in the flesh of his foreskin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the flesh of his foreskin was circumcised'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/יִשְׁמָעֵאל
  chosen: And Ishmael
  alternatives:
  - Now Ishmael
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as simple narrative 'And,' preserving Hebrew discourse flow without overinterpreting it. The proper name is transliterated per translation philosophy.
- source_word: בְּנ֔/וֹ
  chosen: his son
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix straightforwardly identifies Ishmael as Abraham's son; rendered directly and naturally in English.
- source_word: בֶּן שְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  chosen: was thirteen years old
  alternatives:
  - was a son of thirteen years
  lexicon: HALOT
  rationale: This is the standard Hebrew age expression. Idiomatic English requires 'was thirteen years old' rather than a more wooden rendering.
- source_word: בְּ/הִמֹּל/וֹ
  chosen: when ... was circumcised
  alternatives:
  - in his being circumcised
  - at his circumcision
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix gives a temporal sense, 'when he was circumcised.' The Niphal of מול is passive/reflexive in sense here, best represented by an English passive construction.
- source_word: אֵת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no independent English equivalent and is absorbed into normal English syntax.
- source_word: בְּשַׂר עָרְלָת/וֹ
  chosen: the flesh of his foreskin
  alternatives:
  - his foreskin's flesh
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the concrete covenantal wording of the Hebrew rather than reducing it simply to 'he was circumcised.' This matches the explicit object of the circumcision in the source text.
