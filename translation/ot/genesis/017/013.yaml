id: GEN.17.13
reference: Genesis 17:13
source:
  edition: WLC
  text: הִמּ֧וֹל יִמּ֛וֹל יְלִ֥יד בֵּֽיתְ/ךָ֖ וּ/מִקְנַ֣ת כַּסְפֶּ֑/ךָ וְ/הָיְתָ֧ה בְרִיתִ֛/י בִּ/בְשַׂרְ/כֶ֖ם לִ/בְרִ֥ית עוֹלָֽם׀׃
translation:
  text: The one born in your house and the one bought with your money must surely be circumcised, and my covenant shall be in your flesh as an everlasting covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall surely be circumcised.' The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house-born' and 'bought with money' refer to members of Abraham's household, including those born there and those acquired by purchase.
    reason: cultural_note
  - marker: c
    text: Or 'He who is born in your house and he who is bought with your money'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִמּוֹל יִמּוֹל
  chosen: must surely be circumcised
  alternatives:
  - shall surely be circumcised
  - must be circumcised
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of מול intensifies the verbal idea. English 'must surely be circumcised' captures both the obligation in context and the emphatic force without sounding wooden.
- source_word: יְלִיד בֵּיתְךָ
  chosen: he who is born in your house
  alternatives:
  - the one born in your house
  - your house-born slave
  lexicon: HALOT
  rationale: Literally 'one born of your house/house-born.' The phrase refers to a male member of the household born there. 'He who is born in your house' is clear and preserves the individual reference without over-specifying slave status, which is implied by context but not explicit in this phrase alone.
- source_word: וּמִקְנַת כַּסְפֶּךָ
  chosen: he who is bought with your money
  alternatives:
  - the one purchased with your silver
  - what is acquired by your money
  lexicon: HALOT
  rationale: The expression denotes a person acquired by purchase. 'Bought with your money' is idiomatic modern English and preserves the economic sense more naturally than the more literal 'silver.'
- source_word: בְרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of ברית with first-person suffix; covenant language is central and should remain explicit.
- source_word: בִּבְשַׂרְכֶם
  chosen: in your flesh
  alternatives:
  - on your flesh
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' here, expressing that the covenant is borne in the bodily mark of circumcision. 'On your flesh' is possible in English but less directly reflects the Hebrew preposition.
- source_word: לִבְרִית עוֹלָם
  chosen: as an everlasting covenant
  alternatives:
  - for an everlasting covenant
  - as a permanent covenant
  lexicon: HALOT
  rationale: 'The ל marks result/purpose: the covenant in their flesh functions ''as'' or ''for'' an everlasting covenant. ''Everlasting covenant'' is the established and accurate rendering of ברית עולם.'
