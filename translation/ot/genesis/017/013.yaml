theological_decisions:
- issue: Nature of the covenantal sign in relation to the body
  chosen_reading: The verse states that the covenant is present in the flesh through circumcision, without expanding beyond the text into later theological systems.
  alternative_readings:
  - The physical sign symbolizes rather than constitutes covenant membership
  - The phrase implies a stronger sacramental identification of sign and covenant
  rationale: The Hebrew says 'my covenant shall be in your flesh as an everlasting covenant.' The translation preserves this direct wording and its tension, avoiding doctrinal over-interpretation while keeping the bodily and covenantal connection explicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
