  from: He who is born in your house and he who is bought with your money
  to: The one born in your house and the one bought with your money
  rationale: The current rendering is correct but the repetition of 'he who is' feels slightly stilted in contemporary English. Using 'The one born... and the one bought...' maintains the meaning and the singular focus of the Hebrew nouns ('yəlîḏ' and 'miqnaṯ') while improving the natural flow of the sentence.
