id: GEN.17.16
reference: Genesis 17:16
source:
  edition: WLC
  text: וּ/בֵרַכְתִּ֣י אֹתָ֔/הּ וְ/גַ֨ם נָתַ֧תִּי מִמֶּ֛/נָּה לְ/ךָ֖ בֵּ֑ן וּ/בֵֽרַכְתִּ֨י/הָ֙ וְ/הָֽיְתָ֣ה לְ/גוֹיִ֔ם מַלְכֵ֥י עַמִּ֖ים מִמֶּ֥/נָּה יִהְיֽוּ׃
translation:
  text: I will bless her, and moreover I will give you a son by her. I will bless her, and she will give rise to nations; kings of peoples will come from her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she will be the mother of nations.' The Hebrew more literally says, 'she will be/become nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she will become nations'.
    reason: previous_rendering
lexical_decisions:
- source_word: וּבֵרַכְתִּי / וּבֵרַכְתִּיהָ
  chosen: I will bless her / I will bless her
  alternatives:
  - I will make her fruitful
  - I will prosper her
  lexicon: HALOT
  rationale: ברך in this covenant context is best rendered 'bless,' preserving the covenantal and theological weight of divine favor rather than paraphrasing the result. The repetition in Hebrew is retained in English for emphasis.
- source_word: וְגַם
  chosen: and moreover
  alternatives:
  - and also
  - yes, also
  lexicon: HALOT
  rationale: The particle adds emphasis beyond simple coordination. 'Moreover' captures the additive and emphatic force in natural modern English.
- source_word: נָתַתִּי מִמֶּנָּה לְךָ בֵּן
  chosen: I will give you a son by her
  alternatives:
  - I have given you a son from her
  - I will give you a son from her
  lexicon: HALOT
  rationale: Although the form is qatal, in this promise context it functions futurally. 'By her' idiomatically expresses maternal agency in English while preserving that the son comes from Sarah.
- source_word: וְהָיְתָה לְגוֹיִם
  chosen: she will become nations
  alternatives:
  - she will become a mother of nations
  - she will be for nations
  lexicon: HALOT
  rationale: The Hebrew literally says 'she will be/become for nations.' 'She will become nations' is concise and preserves the striking corporate sense that multiple nations will arise from her, without adding 'mother of,' which is implied but not explicit here.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentile nations
  lexicon: HALOT
  rationale: גוים is the standard term for nations/peoples. 'Nations' is the most direct and conventional rendering in patriarchal promise contexts.
- source_word: מַלְכֵי עַמִּים
  chosen: kings of peoples
  alternatives:
  - kings of nations
  - rulers of peoples
  lexicon: HALOT
  rationale: The construct phrase is literally 'kings of peoples.' Retaining 'peoples' reflects עמים rather than smoothing it to 'nations,' and preserves the parallel distinction with גוים in the previous clause.
- source_word: מִמֶּנָּה יִהְיוּ
  chosen: will come from her
  alternatives:
  - will be from her
  - will arise from her
  lexicon: HALOT
  rationale: The Hebrew is literally 'will be from her.' 'Will come from her' is a natural English rendering of descent/origin language without losing the genealogical sense.
