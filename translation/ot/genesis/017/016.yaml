theological_decisions:
- issue: Rendering the promise about Sarah's descendants
  chosen_reading: she will become nations; kings of peoples will come from her
  alternative_readings:
  - she will be the mother of nations; kings of peoples will come from her
  rationale: The verse speaks corporately of nations and royal lines arising from Sarah. The translation avoids adding 'mother of,' which is interpretively true but not explicit in the Hebrew, thereby preserving the text's wording and covenantal scope without paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/017/016.json
  category: awkward_english
  tier: 1
  from: she will become nations
  to: she will give rise to nations
  rationale: The current rendering 'she will become nations' is a very literal translation of the Hebrew `וְהָיְתָה לְגוֹיִם` and commendably preserves the focus on Sarah's state of being, distinct from the following clause. However, the English idiom is awkward, as a singular person does not typically 'become' a plural entity like 'nations'. This may cause a reader to stumble, even if the meaning is recoverable from context. A slightly more interpretive rendering like 'she will give rise to nations' would be smoother for the English reader, though at the cost of some of the original's starkness. The existing footnote already provides the common gloss 'mother of nations,' but the main text itself could be made more accessible.
