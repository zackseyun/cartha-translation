id: GEN.17.23
reference: Genesis 17:23
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אַבְרָהָ֜ם אֶת יִשְׁמָעֵ֣אל בְּנ֗/וֹ וְ/אֵ֨ת כָּל יְלִידֵ֤י בֵית/וֹ֙
    וְ/אֵת֙ כָּל מִקְנַ֣ת כַּסְפּ֔/וֹ כָּל זָכָ֕ר בְּ/אַנְשֵׁ֖י בֵּ֣ית אַבְרָהָ֑ם
    וַ/יָּ֜מָל אֶת בְּשַׂ֣ר עָרְלָתָ֗/ם בְּ/עֶ֨צֶם֙ הַ/יּ֣וֹם הַ/זֶּ֔ה כַּ/אֲשֶׁ֛ר
    דִּבֶּ֥ר אִתּ֖/וֹ אֱלֹהִֽים־־־־־׃
translation:
  text: So Abraham took Ishmael his son, and all those born in his house, and all
    those bought with his money, every male among the men of Abraham’s household,
    and circumcised the flesh of their foreskin on that very day, just as God had
    spoken to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those acquired with his silver'; the phrase refers to persons purchased
      into Abraham’s household.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on this very day,' an idiom emphasizing that Abraham acted immediately
      that same day.
    reason: lexical_alternative
  - marker: c
    text: Or, 'just as God had said to him.'
    reason: alternative_reading
  - marker: d
    text: Or 'every male among the men of Abraham’s house'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - gathered
  - received
  lexicon: HALOT
  rationale: The verb לקח in narrative commonly means 'take.' Here it introduces Abraham's
    immediate action in assembling the persons to be circumcised.
- source_word: יְלִידֵי בֵיתוֹ
  chosen: those born in his house
  alternatives:
  - homeborn slaves
  - members of his household born there
  lexicon: HALOT
  rationale: Literally 'those born of his house/household.' 'Those born in his house'
    preserves the source image without over-specifying status in the main text, though
    household dependents/slaves are likely in context.
- source_word: מִקְנַת כַּסְפּוֹ
  chosen: those bought with his money
  alternatives:
  - those acquired with his silver
  - purchased slaves
  lexicon: HALOT
  rationale: The phrase denotes persons acquired by purchase. 'Bought with his money'
    is a clear, natural rendering that preserves the economic sense of the Hebrew.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - all the males
  lexicon: HALOT
  rationale: The singular collective after the preceding groups is well represented
    by 'every male,' emphasizing the comprehensiveness of the command.
- source_word: בְּאַנְשֵׁי בֵּית אַבְרָהָם
  chosen: among the men of Abraham’s house
  alternatives:
  - among the members of Abraham's household
  - in Abraham's household
  lexicon: HALOT
  rationale: אֲנָשִׁים/אַנְשֵׁי often means 'men' in a concrete sense. Because the
    verse immediately specifies 'every male,' retaining 'men' is gender-accurate and
    reflects the Hebrew wording.
- source_word: וַיָּמָל
  chosen: circumcised
  alternatives:
  - cut off the foreskin of
  lexicon: HALOT
  rationale: This is the standard verb for performing circumcision. The conventional
    English verb is precise and natural.
- source_word: בְּשַׂר עָרְלָתָם
  chosen: the flesh of their foreskin
  alternatives:
  - their foreskin flesh
  - the flesh of their uncircumcision
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the concrete bodily wording of the
    Hebrew and matches covenantal terminology in the surrounding passage.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on that very day
  alternatives:
  - on this very day
  - on that same day
  lexicon: HALOT
  rationale: This idiom emphasizes exactness/immediacy. In English narrative referring
    back to the divine command just given, 'on that very day' is idiomatic and forceful.
- source_word: כַּאֲשֶׁר דִּבֶּר אִתּוֹ אֱלֹהִים
  chosen: just as God had spoken with him
  alternatives:
  - as God had said to him
  - just as God spoke to him
  lexicon: HALOT
  rationale: דבר with אֵת/עִם can mean 'speak with' or 'speak to.' 'Spoken with him'
    reflects the preposition and the dialogical setting of the chapter; the pluperfect
    'had spoken' fits the narrative sequence.
