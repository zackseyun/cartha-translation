theological_decisions:
- issue: Rendering of אֱלֹהִים in this narrative context
  chosen_reading: God
  rationale: In Genesis 17 the referent is clearly the one true God speaking covenantally
    with Abraham. No doctrinally contested issue is present here.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Gendered language in household description
  chosen_reading: every male among the men of Abraham’s house
  alternative_readings:
  - every male in Abraham's household
  - every male among Abraham's household members
  rationale: The Hebrew explicitly uses זָכָר ('male') and אַנְשֵׁי ('men of'). Per
    the doctrine's gender-accurate principle, the translation preserves the masculine
    wording rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
