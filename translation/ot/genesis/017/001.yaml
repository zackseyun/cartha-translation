id: GEN.17.1
reference: Genesis 17:1
source:
  edition: WLC
  text: וַ/יְהִ֣י אַבְרָ֔ם בֶּן תִּשְׁעִ֥ים שָׁנָ֖ה וְ/תֵ֣שַׁע שָׁנִ֑ים וַ/יֵּרָ֨א יְהוָ֜ה אֶל אַבְרָ֗ם וַ/יֹּ֤אמֶר אֵלָי/ו֙ אֲנִי אֵ֣ל שַׁדַּ֔י הִתְהַלֵּ֥ךְ לְ/פָנַ֖/י וֶ/הְיֵ֥ה תָמִֽים־־־׃
translation:
  text: When Abram was ninety-nine years old, Yahweh appeared to Abram and said to him, “I am God Almighty. Walk before me, and be blameless.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: El Shaddai. Traditionally transliterated rather than translated; the exact nuance of Shaddai is debated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: When ... was
  alternatives:
  - And it came to pass
  - Now ... was
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces a temporal setting. In natural modern English, 'When Abram was...' conveys the narrative transition without the archaic 'and it came to pass.'
- source_word: בֶּן תִּשְׁעִים שָׁנָה וְתֵשַׁע שָׁנִים
  chosen: ninety-nine years old
  alternatives:
  - a son of ninety years and nine years
  lexicon: HALOT
  rationale: This is the standard Hebrew age expression. English idiom requires 'ninety-nine years old' rather than a formally wooden rendering.
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: In this Niphal narrative context with YHWH as subject and Abram as recipient, 'appeared' is the natural and established sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵל שַׁדַּי
  chosen: God Almighty
  alternatives:
  - El Shaddai
  - God Shaddai
  - the Almighty God
  lexicon: HALOT
  rationale: Because the translation philosophy prefers translating titles rather than transliterating them, 'God Almighty' best communicates the divine title in clear English. 'El Shaddai' is preserved as an alternative in a footnote because the precise nuance of שַׁדַּי is debated and the Hebrew form is historically significant.
- source_word: הִתְהַלֵּךְ לְפָנַי
  chosen: Walk before me
  alternatives:
  - Walk in my presence
  - Live before me
  lexicon: HALOT
  rationale: The Hitpael imperative of הלך here carries the sense of conducting one's life. 'Walk before me' preserves the metaphor and covenantal tone while remaining understandable in English.
- source_word: וֶהְיֵה תָמִים
  chosen: and be blameless
  alternatives:
  - and be wholehearted
  - and be complete
  - and be perfect
  lexicon: HALOT
  rationale: תָמִים in covenantal and ethical contexts often denotes integrity, wholeness, or blamelessness rather than absolute sinless perfection. 'Blameless' best fits idiomatic English and avoids overstating the demand as metaphysical perfection, while preserving the moral force.
