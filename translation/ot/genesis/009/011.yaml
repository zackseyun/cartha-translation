id: GEN.9.11
reference: Genesis 9:11
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֤י אֶת בְּרִיתִ/י֙ אִתְּ/כֶ֔ם וְ/לֹֽא יִכָּרֵ֧ת כָּל בָּשָׂ֛ר ע֖וֹד
    מִ/מֵּ֣י הַ/מַּבּ֑וּל וְ/לֹֽא יִהְיֶ֥ה ע֛וֹד מַבּ֖וּל לְ/שַׁחֵ֥ת הָ/אָֽרֶץ־־־־׃
translation:
  text: 'And I will establish my covenant with you: never again will all flesh be
    cut off by the waters of the flood, and never again will there be a flood to destroy
    the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be destroyed' for 'be cut off'; the Hebrew verb is literally 'be cut
      off.'
    reason: lexical_alternative
  - marker: b
    text: '''All flesh'' refers broadly to living creatures, not only to humanity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: I will establish
  alternatives:
  - I have established
  - I confirm
  - I uphold
  lexicon: HALOT
  rationale: From קום in the Hifil, here with covenant language meaning to establish/confirm.
    Future English fits the immediate promissory context following God's speech. 'Establish'
    preserves covenantal solemnity better than the looser 'confirm' or 'uphold'.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in Genesis and should be rendered
    consistently as 'covenant' to preserve its theological and literary significance.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - with all of you
  lexicon: HALOT
  rationale: Directly marks the covenant's addressees. 'With you' is natural English
    and sufficiently reflects the plural audience without overexpansion.
- source_word: יִכָּרֵת
  chosen: be cut off
  alternatives:
  - be destroyed
  - be wiped out
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off.' Retaining this in English
    preserves the lexical link while still making sense idiomatically. Because the
    context is flood judgment, readers will understand it as destruction; a more interpretive
    rendering like 'be destroyed' is possible but less transparent to the Hebrew.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all living creatures
  - all humanity
  lexicon: HALOT
  rationale: The phrase in Genesis commonly refers broadly to living creatures, not
    merely humans. 'All flesh' preserves the source wording and its scope, while avoiding
    the narrowing effect of 'all humanity.'
- source_word: עוֹד
  chosen: never again
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: Though literally 'again/still,' in this negated promissory context it
    idiomatically means 'never again.' This is the clearest natural English rendering
    and matches the force of the repeated negation.
- source_word: מִמֵּי הַמַּבּוּל
  chosen: by the waters of the flood
  alternatives:
  - from the waters of the flood
  - by floodwaters
  lexicon: HALOT
  rationale: The preposition מן with 'waters' here expresses the destructive agency/source.
    'By the waters of the flood' is clear and close to the Hebrew. 'Floodwaters' is
    smoother but slightly less formally transparent.
- source_word: מַבּוּל
  chosen: flood
  alternatives:
  - deluge
  lexicon: HALOT
  rationale: Standard rendering for מַבּוּל in the Noah narrative. 'Deluge' is possible
    but less common in modern English.
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to devastate
  lexicon: HALOT
  rationale: שׁחת in this context denotes destructive judgment. 'To destroy' is the
    most direct and natural rendering.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In the flood context, the global sense 'earth' is more fitting than the
    localized 'land.' This also aligns with the universal scope of the covenant promise.
