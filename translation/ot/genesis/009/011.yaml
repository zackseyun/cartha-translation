theological_decisions:
- issue: Scope of 'all flesh' in the covenant promise
  chosen_reading: Rendered broadly as 'all flesh' rather than restricting it to humanity
    alone.
  alternative_readings:
  - all humanity
  - all living creatures
  rationale: The Genesis flood context includes both humans and animals in the covenantal
    aftermath. Keeping 'all flesh' preserves the text's breadth and avoids importing
    a narrower doctrinal claim than the Hebrew warrants.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Covenant formulation with קום
  chosen_reading: Used 'establish my covenant' rather than a more interpretive paraphrase.
  alternative_readings:
  - confirm my covenant
  - uphold my covenant
  rationale: This preserves the covenantal register without resolving debated nuances
    about whether the covenant is newly instituted or formally confirmed. 'Establish'
    is the best balanced rendering in context.
  doctrine_reference: Translation philosophy §1, §3, §5
