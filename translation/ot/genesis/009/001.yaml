theological_decisions:
- issue: Relation to the creation mandate in Genesis 1:28
  chosen_reading: Retain the traditional phrasing 'Be fruitful and multiply and fill
    the earth' to preserve the deliberate verbal echo.
  alternative_readings:
  - Use more idiomatic modern expansions such as 'Have many children and populate
    the earth'
  rationale: The Hebrew repeats the creation-blessing language, and preserving that
    wording maintains the theological continuity of post-flood humanity with the original
    creation commission without adding interpretive commentary.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without flattening theological weight.'
