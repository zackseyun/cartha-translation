id: GEN.9.1
reference: Genesis 9:1
source:
  edition: WLC
  text: וַ/יְבָ֣רֶךְ אֱלֹהִ֔ים אֶת נֹ֖חַ וְ/אֶת בָּנָ֑י/ו וַ/יֹּ֧אמֶר לָ/הֶ֛ם פְּר֥וּ
    וּ/רְב֖וּ וּ/מִלְא֥וּ אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: And God blessed Noah and his sons, and said to them, “Be fruitful and multiply
    and fill the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land,' though here 'the earth' best fits the post-flood context
      and the echo of Genesis 1:28.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: The piel of ברך here denotes bestowal of blessing, not merely speaking
    well of someone. 'Blessed' is the standard, natural English rendering and fits
    the covenantal context.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context אֱלֹהִים refers to the one true God, so 'God'
    is the appropriate English rendering.
- source_word: נֹחַ
  chosen: Noah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'his sons,' not the more general 'children.'
    This follows the gender-accurate principle and matches the immediate referents
    in the flood narrative.
- source_word: וַיֹּאמֶר לָהֶם
  chosen: and said to them
  alternatives:
  - and told them
  lexicon: HALOT
  rationale: A straightforward narrative formula. 'Said to them' preserves the speech
    introduction without adding interpretive force.
- source_word: פְּרוּ
  chosen: Be fruitful
  alternatives:
  - Bear fruit
  - Have offspring
  lexicon: HALOT
  rationale: This imperative is idiomatically rendered 'Be fruitful' in English, especially
    in Genesis, preserving the intertextual echo of Genesis 1:28.
- source_word: וּרְבוּ
  chosen: and multiply
  alternatives:
  - and become many
  - and increase
  lexicon: HALOT
  rationale: '''Multiply'' is the established and accurate rendering in this collocation,
    conveying numerical increase.'
- source_word: וּמִלְאוּ
  chosen: and fill
  alternatives:
  - and replenish
  - and fill up
  lexicon: HALOT
  rationale: The verb means 'fill.' 'Replenish' can misleadingly suggest refilling
    after depletion and is not required by the Hebrew.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In the post-flood context, the scope is the earth/world rather than a
    localized land, and this also preserves the echo of Genesis 1:28.
