theological_decisions:
- issue: Rendering קשת in the Noahic covenant context
  chosen_reading: the bow
  alternative_readings:
  - the rainbow
  rationale: The text uses the ordinary Hebrew word for a bow, preserving the covenant
    sign's imagery. Rendering it as 'the bow' maintains lexical transparency and avoids
    over-interpreting, while the contextual sense 'rainbow' is preserved in a footnote
    for clarity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve significant lexical decisions.'
