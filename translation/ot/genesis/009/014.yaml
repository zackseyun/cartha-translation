id: GEN.9.14
reference: Genesis 9:14
source:
  edition: WLC
  text: וְ/הָיָ֕ה בְּ/עַֽנְנִ֥/י עָנָ֖ן עַל הָ/אָ֑רֶץ וְ/נִרְאֲתָ֥ה הַ/קֶּ֖שֶׁת בֶּ/עָנָֽן־׃
translation:
  text: And when I bring clouds over the earth, the bow will be seen in the cloud,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rainbow.' Hebrew 'the bow' uses the ordinary word for a bow, here
      referring to the rainbow as the covenant sign.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - And it will happen when
  lexicon: HALOT
  rationale: The construction introduces a future-temporal circumstance rather than
    standing alone as a simple copular future. 'And when' gives natural English while
    preserving the temporal force of the clause.
- source_word: בְּעַנְנִי
  chosen: I bring
  alternatives:
  - I cloud
  - I cause to be cloudy
  - my covering with clouds
  lexicon: HALOT
  rationale: From ענן in the Piel/denominative sense, with 1cs suffix, the phrase
    means 'when I cloud over' or 'when I bring clouds.' 'I bring' is idiomatic in
    English and fits the following direct object עָנָן.
- source_word: עָנָן
  chosen: clouds
  alternatives:
  - a cloud
  lexicon: HALOT
  rationale: Although morphologically singular, Hebrew singular can function collectively.
    English plural 'clouds' best matches the verbal idea 'bring clouds over the earth'
    and sounds natural in context.
- source_word: עַל הָאָרֶץ
  chosen: over the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: '''Over the earth'' fits the cosmic scope of the flood covenant context
    better than the more localized ''land.'' ''Upon'' is more formal but less natural
    in contemporary English.'
- source_word: וְנִרְאֲתָה
  chosen: will be seen
  alternatives:
  - appears
  - will appear
  - becomes visible
  lexicon: HALOT
  rationale: 'The Niphal of ראה is passive/reflexive: ''be seen'' or ''appear.'' ''Will
    be seen'' preserves the passive nuance and future sense.'
- source_word: הַקֶּשֶׁת
  chosen: the bow
  alternatives:
  - the rainbow
  lexicon: HALOT
  rationale: Hebrew קשת literally means 'bow.' In this covenant context it refers
    to the rainbow, but 'the bow' preserves the lexical imagery of the Hebrew while
    remaining understandable from context.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in the clouds
  lexicon: HALOT
  rationale: The singular with article is best rendered straightforwardly as 'in the
    cloud.' This also creates a deliberate contrast with the earlier collective 'clouds'
    and reflects the Hebrew wording closely.
