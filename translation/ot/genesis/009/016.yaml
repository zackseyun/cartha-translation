theological_decisions:
- issue: Anthropomorphic divine remembrance
  chosen_reading: retain 'I will see it to remember' as stated
  alternative_readings:
  - paraphrase as 'I will see it and act in accordance with my covenant'
  rationale: The verse uses covenantal remembrance language for God. The translation
    preserves the anthropomorphic expression rather than explaining it away, in keeping
    with preserving the text's theological tension and plain sense.
  doctrine_reference: Translation philosophy §3
