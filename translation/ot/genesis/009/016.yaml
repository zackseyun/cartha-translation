id: GEN.9.16
reference: Genesis 9:16
source:
  edition: WLC
  text: וְ/הָיְתָ֥ה הַ/קֶּ֖שֶׁת בֶּֽ/עָנָ֑ן וּ/רְאִיתִ֗י/הָ לִ/זְכֹּר֙ בְּרִ֣ית עוֹלָ֔ם
    בֵּ֣ין אֱלֹהִ֔ים וּ/בֵין֙ כָּל נֶ֣פֶשׁ חַיָּ֔ה בְּ/כָל בָּשָׂ֖ר אֲשֶׁ֥ר עַל הָ/אָֽרֶץ־־־׃
translation:
  text: The bow will be in the cloud, and I will see it to remember the everlasting
    covenant between God and every living creature among all flesh that is on the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rainbow.' The Hebrew word literally means 'bow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will be
  alternatives:
  - shall be
  - will appear
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context continues the future-oriented
    divine speech; English future best reflects the sense in context.
- source_word: הַקֶּשֶׁת
  chosen: the bow
  alternatives:
  - the rainbow
  lexicon: HALOT
  rationale: The Hebrew noun literally means 'bow.' Since the covenant sign in context
    is the sky-bow, 'the bow' preserves the source image without over-paraphrasing;
    'rainbow' is a contextual interpretation worth preserving in a footnote.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in the clouds
  lexicon: HALOT
  rationale: Singular with article is best rendered 'in the cloud.' English singular
    is natural and matches the Hebrew form.
- source_word: וּרְאִיתִיהָ
  chosen: and I will see it
  alternatives:
  - and when I see it
  - and I will look at it
  lexicon: HALOT
  rationale: The verb is first person singular with 3fs suffix referring back to 'the
    bow.' A simple future coordinate clause best matches the Hebrew sequence without
    adding temporal subordination not explicit in the text.
- source_word: לִזְכֹּר
  chosen: to remember
  alternatives:
  - so as to remember
  - for remembering
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses purpose/result. 'To remember' is
    the most direct and idiomatic rendering.
- source_word: בְּרִית עוֹלָם
  chosen: the everlasting covenant
  alternatives:
  - the eternal covenant
  - a perpetual covenant
  lexicon: HALOT
  rationale: The phrase denotes a covenant enduring through the ages. 'Everlasting
    covenant' is standard, clear English and preserves the durative force of עוֹלָם.
- source_word: בֵּין אֱלֹהִים וּבֵין
  chosen: between God and
  alternatives:
  - between God and between
  lexicon: HALOT
  rationale: Hebrew repeats 'between ... and between ...' idiomatically; English normally
    compresses this to 'between ... and ...'.
- source_word: כָּל נֶפֶשׁ חַיָּה
  chosen: every living creature
  alternatives:
  - every living being
  - every living soul
  lexicon: HALOT
  rationale: The phrase refers broadly to animate life, not specifically to human
    'soul.' 'Every living creature' is natural English and fits the flood-covenant
    context.
- source_word: בְּכָל בָּשָׂר
  chosen: among all flesh
  alternatives:
  - of all flesh
  - in all flesh
  lexicon: HALOT
  rationale: The preposition ב plus 'all flesh' is somewhat appositional/specifying.
    'Among all flesh' preserves the relation while keeping readable English. 'All
    flesh' in this context means all embodied living creatures.
- source_word: אֲשֶׁר עַל הָאָרֶץ
  chosen: that is on the earth
  alternatives:
  - that is upon the earth
  - that is on the land
  lexicon: HALOT
  rationale: Relative clause specifying the sphere of the living creatures. 'On the
    earth' is the most straightforward rendering; 'land' is possible lexically but
    too narrow in this universal context.
