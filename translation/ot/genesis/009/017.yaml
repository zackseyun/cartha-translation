theological_decisions:
- issue: Scope of כָּל בָּשָׂר in the Noahic covenant
  chosen_reading: all flesh
  alternative_readings:
  - all living creatures
  - all humanity
  rationale: The phrase in Genesis 9 is intentionally broad and includes more than
    human beings. Rendering it 'all flesh' preserves that breadth and the canonical
    wording, while avoiding an interpretive narrowing to humanity alone.
  doctrine_reference: Translation philosophy §3, §5
