id: GEN.9.17
reference: Genesis 9:17
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֱלֹהִ֖ים אֶל נֹ֑חַ זֹ֤את אֽוֹת הַ/בְּרִית֙ אֲשֶׁ֣ר הֲקִמֹ֔תִי
    בֵּינִ֕/י וּ/בֵ֥ין כָּל בָּשָׂ֖ר אֲשֶׁ֥ר עַל הָ/אָֽרֶץ־־־־׃פ
translation:
  text: And God said to Noah, “This is the sign of the covenant that I have established
    between me and all flesh that is on the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all living creatures.” Hebrew “all flesh,” a broad expression for animate
      earthly life in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow in natural English without overinterpreting sequence.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the referent is the one true God speaking to Noah; 'God'
    is the standard and natural English rendering.
- source_word: אֶל נֹחַ
  chosen: to Noah
  alternatives:
  - to Noach
  lexicon: HALOT
  rationale: The preposition marks the addressee. 'Noah' follows standard English
    transliteration conventions for the personal name.
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: 'The demonstrative introduces an identificational clause in Hebrew. English
    idiom normally supplies ''is'': ''This is the sign...''.'
- source_word: אוֹת
  chosen: sign
  alternatives:
  - token
  - mark
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or visible token. 'Sign' is the clearest
    modern English choice and fits the rainbow-covenant context.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - the pact
  lexicon: HALOT
  rationale: בְּרִית is a major theological term regularly rendered 'covenant.' This
    preserves biblical-theological continuity and is standard English usage.
- source_word: הֲקִמֹתִי
  chosen: I have established
  alternatives:
  - I established
  - I have confirmed
  - I have set up
  lexicon: HALOT
  rationale: The Hiphil of קום with בְּרִית commonly means to establish or confirm
    a covenant. 'I have established' fits the completed action with present relevance
    and matches the covenant formula well.
- source_word: בֵּינִי וּבֵין
  chosen: between me and
  alternatives:
  - between myself and
  lexicon: HALOT
  rationale: This is the standard relational expression marking the two covenant parties.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all living creatures
  - every creature
  - all humanity
  lexicon: HALOT
  rationale: Literally 'all flesh.' In Genesis 9 it refers broadly to animate earthly
    life, not merely humanity. The translation keeps the biblical phrase 'all flesh'
    rather than narrowing or paraphrasing it.
- source_word: אֲשֶׁר עַל הָאָרֶץ
  chosen: that is on the earth
  alternatives:
  - that is upon the earth
  - on the land
  lexicon: HALOT
  rationale: The relative clause qualifies 'all flesh.' 'On the earth' is the most
    natural rendering here; 'land' would be too narrow in this universal covenant
    context.
