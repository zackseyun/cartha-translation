id: GEN.9.26
reference: Genesis 9:26
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר בָּר֥וּךְ יְהֹוָ֖ה אֱלֹ֣הֵי שֵׁ֑ם וִ/יהִ֥י כְנַ֖עַן עֶ֥בֶד לָֽ/מוֹ׃
translation:
  text: And he said, “Blessed be Yahweh, the God of Shem, and let Canaan be his slave.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “slave to them.” The Hebrew has a plural pronoun (“to them/for them”), likely referring to Shem and his line, or more broadly to the brothers in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative introduction; 'And he said' preserves the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  lexicon: HALOT
  rationale: Predicate adjective used in a benedictory/exclamatory sense. 'Blessed be' is idiomatic English for a blessing formula and fits the jussive-like force in context better than the flatter 'Blessed is.'
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following Jewish reverence tradition and longstanding English convention rooted in the LXX pattern.
- source_word: אֱלֹהֵי שֵׁם
  chosen: the God of Shem
  alternatives:
  - Shem's God
  lexicon: HALOT
  rationale: Construct chain best rendered straightforwardly as 'the God of Shem.' This preserves the covenantal/theological relationship expressed in the Hebrew without paraphrase.
- source_word: וִיהִי
  chosen: and let ... be
  alternatives:
  - and may ... be
  - and he shall be
  lexicon: HALOT
  rationale: 'Jussive form of היה expresses a wish/curse: ''let Canaan be.'' This is more precise than a simple future and preserves the volitional force.'
- source_word: כְנַעַן
  chosen: Canaan
  lexicon: HALOT
  rationale: Proper name retained by transliteration.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: Although עבד can mean either 'servant' or 'slave,' in this curse context the subordinated, bonded status is salient. Following the project's philosophy on bonded-service terms, 'slave' better conveys the severity of the pronouncement.
- source_word: לָמוֹ
  chosen: their
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The pronominal form is plural, referring back most naturally to Shem and his line in the immediate clause, or more broadly to the brothers in the surrounding context. In English, 'their slave' is the most natural rendering of the dative/possessive sense here.
