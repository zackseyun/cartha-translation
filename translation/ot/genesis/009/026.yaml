theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referent of the plural suffix in לָמוֹ
  chosen_reading: their slave
  alternative_readings:
  - his slave
  - slave to them
  rationale: The Hebrew suffix is plural, so singular renderings are disfavored. 'Their slave' preserves the plural while producing idiomatic English. The exact scope of the plural is somewhat contextually inferred, but the translation should not collapse it into a singular referent.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
