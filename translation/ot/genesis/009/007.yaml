id: GEN.9.7
reference: Genesis 9:7
source:
  edition: WLC
  text: וְ/אַתֶּ֖ם פְּר֣וּ וּ/רְב֑וּ שִׁרְצ֥וּ בָ/אָ֖רֶץ וּ/רְבוּ בָֽ/הּ־׃ס
translation:
  text: And as for you, be fruitful and multiply; swarm on the earth and multiply
    in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'teem on the earth.' The Hebrew verb conveys prolific swarming or teeming
      increase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  chosen: And as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun gives emphatic contrast/resumption
    after the preceding context. 'As for you' brings out the emphasis more clearly
    than a bare 'and you' while remaining natural English.
- source_word: פְּרוּ
  chosen: be fruitful
  alternatives:
  - bear fruit
  - increase
  lexicon: HALOT
  rationale: In this blessing-command context, פרה is the standard idiom 'be fruitful,'
    especially paired with רבה. 'Bear fruit' sounds too agricultural in English, and
    'increase' would blur the distinction from רבה.
- source_word: וּרְבוּ
  chosen: and multiply
  alternatives:
  - and become many
  - and increase
  lexicon: HALOT
  rationale: רבה in this collocation is conventionally and accurately rendered 'multiply.'
    It preserves the familiar creation/blessing language and matches the semantic
    force of numerical increase.
- source_word: שִׁרְצוּ
  chosen: swarm
  alternatives:
  - teem
  - abound
  lexicon: HALOT
  rationale: The verb שׁרץ denotes swarming/teeming proliferation. 'Swarm' is vivid
    and direct, and it preserves the strong imagery of abundant propagation. 'Teem'
    is also possible, but 'swarm' more closely reflects the verbal force.
- source_word: בָאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - throughout the earth
  - on the land
  lexicon: HALOT
  rationale: אֶרֶץ here most naturally refers to the earth/world as the sphere of
    human multiplication after the flood, not merely a local 'land.' With שׁרץ, English
    idiom favors 'on the earth.'
- source_word: וּרְבוּ בָהּ
  chosen: and multiply in it
  alternatives:
  - and become many in it
  - and multiply on it
  lexicon: HALOT
  rationale: The repeated רבה is retained for emphasis and verbal parallelism. The
    feminine pronominal suffix refers back to אֶרֶץ; 'in it' is the most natural English
    rendering with the suffix, while preserving the repetition of the command.
