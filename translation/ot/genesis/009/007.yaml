theological_decisions:
- issue: Relation of the verse to the creation mandate and post-flood blessing
  chosen_reading: Render as a renewed divine command/blessing to Noah and his sons
    without adding theological interpretation in the text.
  alternative_readings:
  - Treat primarily as a mere repetition of Genesis 1:28
  - Treat as an exclusively covenantal formula with expanded doctrinal wording
  rationale: The Hebrew presents imperative blessing language parallel to Genesis
    1:28, but the translation should preserve that resonance without importing interpretive
    conclusions beyond the wording itself.
  doctrine_reference: Translation philosophy items 1, 3, and 6
