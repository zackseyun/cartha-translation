id: GEN.9.3
reference: Genesis 9:3
source:
  edition: WLC
  text: כָּל רֶ֨מֶשׂ֙ אֲשֶׁ֣ר הוּא חַ֔י לָ/כֶ֥ם יִהְיֶ֖ה לְ/אָכְלָ֑ה כְּ/יֶ֣רֶק עֵ֔שֶׂב
    נָתַ֥תִּי לָ/כֶ֖ם אֶת כֹּֽל־־־׃
translation:
  text: Every moving thing that is alive shall be food for you. As I gave you the
    green plants, I have given you everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every creeping thing that lives shall be food for you.' The Hebrew noun
      רֶמֶשׂ often refers to creatures that creep or swarm, but here it likely functions
      broadly in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: Used distributively with the singular noun רֶמֶשׂ, so 'Every' gives natural
    English while preserving the comprehensive scope.
- source_word: רֶמֶשׂ
  chosen: moving thing
  alternatives:
  - creeping thing
  - swarming thing
  lexicon: HALOT
  rationale: The noun denotes creatures that move about close to the ground or in
    swarming motion. 'Moving thing' is broad enough for the post-flood dietary grant
    and avoids the overly narrow or archaic feel of 'creeping thing.'
- source_word: אֲשֶׁר הוּא חַי
  chosen: that is alive
  alternatives:
  - that lives
  - which is living
  lexicon: HALOT
  rationale: This relative clause qualifies רֶמֶשׂ and distinguishes living creatures
    from carcasses. 'That is alive' is clear, idiomatic, and preserves the adjectival
    force of חַי.
- source_word: לָכֶם יִהְיֶה לְאָכְלָה
  chosen: shall be food for you
  alternatives:
  - shall be for food to you
  - will be yours for food
  lexicon: HALOT
  rationale: Combines the dative and predicate construction into natural English.
    'Food for you' preserves the sense of divine permission/provision without unnecessary
    literal awkwardness.
- source_word: כְּיֶרֶק עֵשֶׂב
  chosen: As I gave you the green plants
  alternatives:
  - Like the green vegetation
  - Like green herb
  lexicon: HALOT
  rationale: The phrase refers to vegetation/plant growth previously given for food.
    'Green plants' is clear modern English and captures the collective sense better
    than the archaic 'green herb.'
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I gave
  lexicon: HALOT
  rationale: 'The perfect can be rendered as a present state resulting from a completed
    act. ''I have given'' fits the speech context well: God is declaring a grant now
    in force. The earlier clause supplies ''gave'' in English for smoother comparison,
    but the main finite verb here is represented as ''have given.'''
- source_word: אֶת כֹּל
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: HALOT
  rationale: The object is comprehensive and collective. 'Everything' is idiomatic
    modern English and preserves the totalizing force of כֹּל.
