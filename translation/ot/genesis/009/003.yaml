theological_decisions:
- issue: Scope of the dietary grant after the flood
  chosen_reading: A universal grant of animal life for human food is expressed without
    narrowing it to only certain classes of animals in this verse.
  alternative_readings:
  - A narrower reference limited to small or creeping creatures because of רֶמֶשׂ
  rationale: Although רֶמֶשׂ can in some contexts denote creeping or swarming creatures,
    in this context the clause 'every moving thing that is alive' functions comprehensively,
    especially reinforced by 'I have given you everything.' The translation therefore
    preserves the broad scope of the grant while rendering רֶמֶשׂ in a way that does
    not artificially restrict it.
