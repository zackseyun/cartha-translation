theological_decisions:
- issue: Human dominion over animals in the post-flood context
  chosen_reading: The verse states that animals are placed under human power and will
    fear humans, without expanding this into a broader doctrinal claim beyond the
    text.
  alternative_readings:
  - A stronger paraphrase such as 'they will be subject to you'
  - A softer ecological reading minimizing dominion language
  rationale: The idiom 'into your hand they are given' indicates real human authority
    over animals, but the translation should preserve the metaphor rather than interpretively
    expand it. This maintains the text's tension and avoids importing later theological
    or ethical systems.
  doctrine_reference: Translation philosophy §§1, 3, 5
