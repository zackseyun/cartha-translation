id: GEN.9.2
reference: Genesis 9:2
source:
  edition: WLC
  text: וּ/מוֹרַאֲ/כֶ֤ם וְ/חִתְּ/כֶם֙ יִֽהְיֶ֔ה עַ֚ל כָּל חַיַּ֣ת הָ/אָ֔רֶץ וְ/עַ֖ל
    כָּל ע֣וֹף הַ/שָּׁמָ֑יִם בְּ/כֹל֩ אֲשֶׁ֨ר תִּרְמֹ֧שׂ הָֽ/אֲדָמָ֛ה וּֽ/בְ/כָל דְּגֵ֥י
    הַ/יָּ֖ם בְּ/יֶדְ/כֶ֥ם נִתָּֽנוּ־־־׃
translation:
  text: And the fear of you and the dread of you shall be upon every beast of the
    earth and upon every bird of the heavens, on everything that creeps on the ground,
    and on all the fish of the sea; into your hand they are given.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fear and your dread.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heavens'; also translated 'the sky.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into your hand they are given,' an idiom expressing being placed
      under one's power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹרָאֲכֶם
  chosen: the fear of you
  alternatives:
  - your fear
  lexicon: HALOT
  rationale: מוֹרָא denotes fear or terror inspired by someone. 'The fear of you'
    preserves the genitival sense and the formal parallel with the following noun
    better than the more idiomatic but slightly less transparent 'your fear'.
- source_word: חִתְּכֶם
  chosen: the dread of you
  alternatives:
  - your dread
  - terror of you
  lexicon: HALOT
  rationale: חִתָּה/חַת commonly conveys dread or terror. 'Dread' distinguishes it
    from the preceding מוֹרָא while preserving the paired intensification.
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The imperfect here expresses the resulting state in this post-flood divine
    declaration. 'Shall be' fits the elevated register and covenantal tone.
- source_word: חַיַּת הָאָרֶץ
  chosen: every beast of the earth
  alternatives:
  - every wild animal of the earth
  - every living thing of the earth
  lexicon: HALOT
  rationale: חַיָּה in this collocation commonly refers to land animals/beasts. 'Beast
    of the earth' is a natural and fairly formal rendering that avoids over-narrowing
    to only wild animals.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: every bird of the heavens
  alternatives:
  - every bird of the sky
  - every flying creature of the heavens
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but 'bird' is the standard
    contextual rendering here. 'Heavens' reflects the Hebrew שָׁמַיִם more directly
    than 'sky,' though either is possible.
- source_word: בְּכֹל אֲשֶׁר תִּרְמֹשׂ הָאֲדָמָה
  chosen: on everything that creeps on the ground
  alternatives:
  - on everything that moves on the earth
  - among all that swarms on the ground
  lexicon: HALOT
  rationale: רמשׂ refers to creeping or small moving creatures. 'Creeps on the ground'
    captures the concrete imagery and fits the feminine singular verb with collective
    sense. 'Ground' for אֲדָמָה differentiates it from the earlier אֶרֶץ.
- source_word: דְּגֵי הַיָּם
  chosen: all the fish of the sea
  alternatives:
  - every fish of the sea
  lexicon: HALOT
  rationale: The construct phrase straightforwardly denotes sea fish. 'All the fish
    of the sea' matches the distributive sweep of the surrounding clauses.
- source_word: בְּיֶדְכֶם
  chosen: into your hand
  alternatives:
  - in your hand
  - under your power
  lexicon: HALOT
  rationale: The idiom with נתן commonly means to give into someone's hand, implying
    control or power. 'Into your hand' preserves the Hebrew metaphor without over-paraphrasing.
- source_word: נִתָּנוּ
  chosen: they are given
  alternatives:
  - they have been given
  - they are delivered
  lexicon: HALOT
  rationale: The passive perfect/passive form states the granted status of the animals.
    'They are given' is concise and idiomatic in English while preserving the passive
    voice.
