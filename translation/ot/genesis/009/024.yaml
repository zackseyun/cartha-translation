id: GEN.9.24
reference: Genesis 9:24
source:
  edition: WLC
  text: וַ/יִּ֥יקֶץ נֹ֖חַ מִ/יֵּינ֑/וֹ וַ/יֵּ֕דַע אֵ֛ת אֲשֶׁר עָ֥שָׂה ל֖/וֹ בְּנ֥/וֹ
    הַ/קָּטָֽן־־׃
translation:
  text: When Noah awoke from his wine, he knew what his youngest son had done to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his younger son.' The Hebrew adjective can mean 'small,' 'young,' or
      'youngest' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיקֶץ
  chosen: awoke
  alternatives:
  - woke up
  - became sober
  lexicon: HALOT
  rationale: The verb יקץ means to awake from sleep. In context Noah is emerging from
    drunken sleep, so 'awoke' is the plain sense. 'Became sober' is interpretive and
    goes beyond the lexical value.
- source_word: מִיֵּינוֹ
  chosen: from his wine
  alternatives:
  - from his drunkenness
  - from the effects of his wine
  lexicon: HALOT
  rationale: Literally 'from his wine.' This idiom refers to waking from a wine-induced
    stupor, but the translation preserves the Hebrew expression rather than paraphrasing
    it as drunkenness.
- source_word: וַיֵּדַע
  chosen: he knew
  alternatives:
  - he learned
  - he found out
  lexicon: HALOT
  rationale: ידע commonly means 'know.' Here it can imply coming to know, but 'he
    knew' is a natural English rendering that stays close to the Hebrew narrative
    style.
- source_word: אֵת אֲשֶׁר עָשָׂה לוֹ
  chosen: what ... had done to him
  alternatives:
  - what ... did to him
  lexicon: HALOT
  rationale: 'The clause is straightforwardly objective: Noah knew ''what'' had been
    done to him. English past perfect (''had done'') fits the sequence after Noah
    awoke and then came to know the prior action.'
- source_word: בְּנוֹ הַקָּטָן
  chosen: his youngest son
  alternatives:
  - his little son
  - his younger son
  - his youngest child
  lexicon: HALOT
  rationale: קָטָן can mean small, young, or youngest depending on context. In a familial
    comparative setting, 'youngest' is the most idiomatic and likely sense in English.
    'Little son' sounds diminutive rather than relational; 'younger son' is possible
    but less definite.
