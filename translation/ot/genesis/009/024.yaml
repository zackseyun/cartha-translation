theological_decisions:
- issue: Nature of the act done to Noah
  chosen_reading: Render the clause generically as 'what his youngest son had done
    to him' without specifying the act.
  alternative_readings:
  - Interpret the act as Ham's seeing and reporting Noah's nakedness
  - Interpret the act as a more severe sexual violation
  rationale: The Hebrew text states only that Noah knew what had been done to him.
    The verse itself does not define the act, and translation should preserve that
    ambiguity rather than importing a specific interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of 'his youngest son'
  chosen_reading: Translate בְּנוֹ הַקָּטָן as 'his youngest son' in the main text.
  alternative_readings:
  - his younger son
  rationale: The phrase most naturally refers to Noah's son in terms of age rank.
    Because the broader narrative raises interpretive questions about whether Ham
    or Canaan is especially in view, the translation keeps the Hebrew wording without
    adding clarification not present in the verse.
  doctrine_reference: Translation philosophy §1 and §3.
