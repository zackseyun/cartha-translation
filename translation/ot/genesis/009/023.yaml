theological_decisions:
- issue: Meaning of 'their father's nakedness' in this verse
  chosen_reading: Literal exposure of Noah's body, which Shem and Japheth respectfully
    cover
  alternative_readings:
  - A euphemistic sexual meaning carried over from later Levitical usage
  rationale: 'In Genesis 9:23 the immediate narrative action is concrete: a garment
    is taken, the sons walk backward, and they avoid seeing Noah while covering him.
    While ''uncover nakedness'' can function euphemistically elsewhere, this verse
    itself emphasizes visual exposure and filial respect. The translation therefore
    keeps the literal phrase ''their father''s nakedness'' without importing a more
    specific sexual interpretation into the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
