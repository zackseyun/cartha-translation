id: GEN.9.23
reference: Genesis 9:23
source:
  edition: WLC
  text: וַ/יִּקַּח֩ שֵׁ֨ם וָ/יֶ֜פֶת אֶת הַ/שִּׂמְלָ֗ה וַ/יָּשִׂ֨ימוּ֙ עַל שְׁכֶ֣ם
    שְׁנֵי/הֶ֔ם וַ/יֵּֽלְכוּ֙ אֲחֹ֣רַנִּ֔ית וַ/יְכַסּ֕וּ אֵ֖ת עֶרְוַ֣ת אֲבִי/הֶ֑ם
    וּ/פְנֵי/הֶם֙ אֲחֹ֣רַנִּ֔ית וְ/עֶרְוַ֥ת אֲבִי/הֶ֖ם לֹ֥א רָאֽוּ־־׃
translation:
  text: Then Shem and Japheth took the garment and laid it on both their shoulders,
    and they walked backward and covered their father's nakedness. Their faces were
    turned backward, so they did not see their father's nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cloak.' The Hebrew term refers to an outer garment used here to
      cover Noah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took up
  lexicon: HALOT
  rationale: Basic narrative verb לקח in wayyiqtol; simple past 'took' fits the sequence
    naturally in English.
- source_word: שֵׁם וָיֶפֶת
  chosen: Shem and Japheth
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: הַשִּׂמְלָה
  chosen: the garment
  alternatives:
  - the cloak
  - the covering
  lexicon: HALOT
  rationale: שׂמלה denotes an outer garment or cloak. 'Garment' is broad and natural
    English, avoiding over-specification while preserving the concrete object.
- source_word: וַיָּשִׂימוּ עַל שְׁכֶם שְׁנֵיהֶם
  chosen: laid it on both their shoulders
  alternatives:
  - put it on the shoulder of both of them
  - placed it on their shoulders
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic and literally 'put on the shoulder of
    both of them.' English plural 'on both their shoulders' best conveys that they
    jointly carried the garment across their shoulders.
- source_word: אֲחֹרַנִּית
  chosen: backward
  alternatives:
  - backwards
  - with their backs turned
  lexicon: HALOT
  rationale: Adverb indicating backward movement/orientation. 'Backward' is concise
    and works in both occurrences, preserving repetition.
- source_word: וַיְכַסּוּ
  chosen: covered
  lexicon: HALOT
  rationale: Straightforward rendering of כסה in this context.
- source_word: עֶרְוַת אֲבִיהֶם
  chosen: their father's nakedness
  alternatives:
  - the nakedness of their father
  lexicon: HALOT
  rationale: Formal but natural rendering of the construct phrase. In this narrative
    context it refers to Noah's exposed body; 'nakedness' preserves the Hebrew wording
    and its dignity/shame nuance.
- source_word: וּפְנֵיהֶם אֲחֹרַנִּית
  chosen: Their faces were turned backward
  alternatives:
  - their faces were backward
  - their faces were turned away
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew; English supplies 'were turned' for
    readability while preserving the sense that their faces were oriented away.
- source_word: לֹא רָאוּ
  chosen: they did not see
  alternatives:
  - they did not look upon
  lexicon: HALOT
  rationale: Simple negated perfect with plain sense 'did not see.' 'Look upon' would
    add nuance not explicit in the verb alone.
