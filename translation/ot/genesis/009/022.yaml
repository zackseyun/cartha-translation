theological_decisions:
- issue: Meaning of 'his father's nakedness' in this narrative
  chosen_reading: Rendered literally as 'his father's nakedness' without specifying
    a sexual act beyond seeing Noah exposed.
  alternative_readings:
  - an idiom implying a more serious sexual offense
  - a euphemism connected with maternal incest by later legal usage
  rationale: The Hebrew phrase can carry broader sexual connotations in some contexts,
    but this verse itself states that Ham 'saw' and then 'told' his brothers, and
    the immediate context centers on Noah's uncovered state. To preserve theological
    and interpretive tension rather than resolve it, the main text keeps the literal
    wording and a footnote preserves the broader interpretive possibility.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
