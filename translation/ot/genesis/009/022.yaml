id: GEN.9.22
reference: Genesis 9:22
source:
  edition: WLC
  text: וַ/יַּ֗רְא חָ֚ם אֲבִ֣י כְנַ֔עַן אֵ֖ת עֶרְוַ֣ת אָבִ֑י/ו וַ/יַּגֵּ֥ד לִ/שְׁנֵֽי
    אֶחָ֖י/ו בַּ/חֽוּץ־׃
translation:
  text: And Ham, the father of Canaan, saw his father's nakedness and told his two
    brothers outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the nakedness of his father.' In some Old Testament
      contexts, this expression can function as a sexual euphemism; here the translation
      preserves the literal wording and leaves that interpretive question open.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - observed
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form is straightforwardly
    'saw.' A stronger or more interpretive rendering is not warranted by the verb
    alone.
- source_word: חָם
  chosen: Ham
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: אֲבִי כְנַעַן
  chosen: the father of Canaan
  alternatives:
  - Canaan's father
  lexicon: HALOT
  rationale: Construct chain literally identifies Ham as 'the father of Canaan.' This
    appositional identification is retained in natural English.
- source_word: עֶרְוַת אָבִיו
  chosen: his father's nakedness
  alternatives:
  - the nakedness of his father
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew idiom without importing
    the more specific sexual sense that the phrase can bear in Levitical contexts.
    Here the immediate narrative context supports literal exposure, while leaving
    interpretive discussion open.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - announced
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means 'tell, declare, report.' 'Told' is the
    most natural narrative English equivalent here.
- source_word: לִשְׁנֵי אֶחָיו
  chosen: his two brothers
  alternatives:
  - the two brothers of his
  - his two brothers
  lexicon: HALOT
  rationale: The phrase explicitly specifies the number two; English naturally renders
    this as 'his two brothers.'
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - outdoors
  lexicon: HALOT
  rationale: The adverbial noun means 'outside' and likely contrasts with Noah's location
    inside the tent. 'Outside' is concise and contextually clear.
