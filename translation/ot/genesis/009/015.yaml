id: GEN.9.15
reference: Genesis 9:15
source:
  edition: WLC
  text: וְ/זָכַרְתִּ֣י אֶת בְּרִיתִ֗/י אֲשֶׁ֤ר בֵּינִ/י֙ וּ/בֵ֣ינֵי/כֶ֔ם וּ/בֵ֛ין כָּל נֶ֥פֶשׁ חַיָּ֖ה בְּ/כָל בָּשָׂ֑ר וְ/לֹֽא יִֽהְיֶ֨ה ע֤וֹד הַ/מַּ֨יִם֙ לְ/מַבּ֔וּל לְ/שַׁחֵ֖ת כָּל בָּשָֽׂר־־־־־׃
translation:
  text: and I will remember my covenant that is between me and you and every living creature of all flesh, and the waters will never again become a flood to destroy all flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every living being'; Hebrew 'every living creature among all flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among all flesh'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְזָכַרְתִּי
  chosen: and I will remember
  alternatives:
  - then I will remember
  - so I will remember
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in this context carries future sense within God's speech. 'Remember' is retained rather than paraphrased as 'keep in mind' or 'call to mind,' since covenantal remembrance in Hebrew is a significant theological-legal term.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית as 'covenant' preserves the formal relational and promissory sense central to the passage.
- source_word: אֲשֶׁר בֵּינִי וּבֵינֵיכֶם וּבֵין כָּל נֶפֶשׁ חַיָּה
  chosen: that is between me and you and every living creature
  alternatives:
  - which is between me and you and every living being
  - that is between me and you and every living soul
  lexicon: HALOT
  rationale: Rendered smoothly in English while preserving the three-party covenant relation. נֶפֶשׁ חַיָּה here refers to animate life, best expressed as 'living creature' in context.
- source_word: בְּכָל בָּשָׂר
  chosen: among all flesh
  alternatives:
  - of all flesh
  - in all flesh
  lexicon: HALOT
  rationale: The preposition בְ with כָּל־בָּשָׂר is taken in a classificatory/inclusive sense. 'Among all flesh' reads naturally while preserving the scope of all embodied living creatures. 'All flesh' is retained rather than reduced to 'all people,' since the covenant includes animals.
- source_word: וְלֹא יִהְיֶה עוֹד
  chosen: and ... will never again become
  alternatives:
  - and ... will no longer be
  - and ... will not again be
  lexicon: HALOT
  rationale: Combines negation with עוֹד to express permanent non-recurrence. 'Never again' is idiomatic and faithful.
- source_word: הַמַּיִם לְמַבּוּל
  chosen: the waters will never again become a flood
  alternatives:
  - the waters will never again be for a flood
  - the waters will never again become floodwaters
  lexicon: HALOT
  rationale: 'The lamed with מַבּוּל is rendered as result/function: the waters becoming a flood. This is more natural in English than a wooden ''be for a flood'' while preserving the sense.'
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to wipe out
  lexicon: HALOT
  rationale: Infinitive expresses purpose/result of the flood. 'Destroy' is the standard and suitably weighty rendering.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - every living thing
  - all living creatures
  lexicon: HALOT
  rationale: Retained consistently as 'all flesh' to preserve the broad embodied scope of the Hebrew expression and its repetition within the verse.
