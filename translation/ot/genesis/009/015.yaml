theological_decisions:
- issue: Anthropomorphic language of divine remembrance
  chosen_reading: Retain 'I will remember' without paraphrasing
  alternative_readings:
  - I will keep in mind
  - I will act on my covenant
  rationale: The Hebrew explicitly uses remembrance language. Preserving it maintains the covenantal idiom and avoids importing an explanatory paraphrase that resolves how divine remembrance functions.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T12:37:01Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/009/015.json
  category: awkward_english
  tier: 1
  from: among all flesh
  to: of all flesh
  rationale: The preposition בְּ in the phrase 'כָּל נֶפֶשׁ חַיָּה בְּכָל בָּשָׂר' functions to specify the larger category to which the 'living creatures' belong. In English, 'of all flesh' captures this partitive or specificational sense more naturally and accurately than 'among all flesh,' which can incorrectly suggest physical location. The rendering 'of all flesh' is also the standard in most major English translations for this common Hebrew idiom.
