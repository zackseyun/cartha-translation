id: GEN.9.19
reference: Genesis 9:19
source:
  edition: WLC
  text: שְׁלֹשָׁ֥ה אֵ֖לֶּה בְּנֵי נֹ֑חַ וּ/מֵ/אֵ֖לֶּה נָֽפְצָ֥ה כָל הָ/אָֽרֶץ־־׃
translation:
  text: These three were the sons of Noah, and from these the whole earth was populated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and from these the whole earth was scattered' or 'spread
      out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשָׁה אֵלֶּה
  chosen: These three
  alternatives:
  - These are the three
  lexicon: HALOT
  rationale: 'The Hebrew phrase is nominal and fronted for emphasis: literally, ''three
    these.'' ''These three'' is natural English and preserves the demonstrative emphasis.'
- source_word: בְּנֵי נֹחַ
  chosen: were the sons of Noah
  alternatives:
  - are the sons of Noah
  lexicon: HALOT
  rationale: No finite verb appears in Hebrew, so English supplies 'were' for smooth
    narration. 'Sons of Noah' is the straightforward construct rendering.
- source_word: וּמֵאֵלֶּה
  chosen: and from these
  alternatives:
  - and from them
  lexicon: HALOT
  rationale: The preposition מִן with the demonstrative means 'from these.' Retaining
    'these' links the second clause tightly to the three sons just mentioned.
- source_word: נָפְצָה
  chosen: was populated
  alternatives:
  - was scattered
  - spread out
  lexicon: HALOT
  rationale: The verb from נפץ can denote scattering or dispersal, but in this genealogical
    context it refers to the earth's population deriving from Noah's sons after the
    flood. 'Was populated' communicates the contextual sense in idiomatic English
    without implying mere chaotic dispersal. The more formal alternative 'was scattered'
    is preserved in a footnote because it reflects the verb's more literal core meaning.
- source_word: כָל הָאָרֶץ
  chosen: the whole earth
  alternatives:
  - all the earth
  - the whole land
  lexicon: HALOT
  rationale: כָל with הָאָרֶץ is best rendered 'the whole earth' here, referring to
    the inhabited world descended from Noah's sons. 'Land' is possible lexically for
    אֶרֶץ, but the universal post-flood context favors 'earth'.
