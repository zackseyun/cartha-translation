theological_decisions:
- issue: Scope of הָאָרֶץ in the post-flood table-of-nations context
  chosen_reading: the whole earth
  alternative_readings:
  - the whole land
  rationale: The verse summarizes humanity's repopulation after the flood, so a universal
    sense is more likely than a localized 'land.' This is a contextual lexical decision
    rather than a doctrinally contested one.
