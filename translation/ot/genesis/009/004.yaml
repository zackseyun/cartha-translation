theological_decisions:
- issue: Meaning of נֶפֶשׁ in relation to blood
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - Rendered as 'soul' in more literal/traditional translations
  rationale: In this context the verse explains the prohibition in terms of the creature's life being in its blood, not a developed anthropological claim about an immaterial soul. 'Life' best reflects the Hebrew sense and avoids importing later doctrinal categories the text does not require.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T00:17:41Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/009/004.json
  category: awkward_english
  tier: 1
  from: with its life, that is, its blood
  to: with its life—its blood
  rationale: The Hebrew uses a direct apposition (נַפְשׁוֹ דָמוֹ) to equate life and blood. While adding 'that is' correctly makes this relationship explicit, it functions more as an explanation than a direct translation, making the English slightly clunky. Using an em-dash ('—') is a common and more elegant English convention for appositives that better captures the concise force of the Hebrew syntax. This construction is already recognized as valid in the provided footnote.
