id: GEN.9.4
reference: Genesis 9:4
source:
  edition: WLC
  text: אַךְ בָּשָׂ֕ר בְּ/נַפְשׁ֥/וֹ דָמ֖/וֹ לֹ֥א תֹאכֵֽלוּ־׃
translation:
  text: But you shall not eat flesh with its life—its blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only, flesh with its life—its blood—you shall not eat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with its life, that is, its blood'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Only
  - However
  - Nevertheless
  lexicon: HALOT
  rationale: Here אַךְ introduces an exception/restriction to the preceding permission to eat animals (v. 3). 'But' gives natural English contrast in context better than the more wooden 'only,' while still signaling limitation.
- source_word: בָּשָׂר
  chosen: flesh
  alternatives:
  - meat
  lexicon: HALOT
  rationale: The Hebrew term literally means 'flesh.' 'Flesh' preserves the concrete wording and fits the legal/prohibitive context. 'Meat' is possible in idiomatic English, but 'flesh' better matches the source and the connection to blood/life.
- source_word: בְּנַפְשׁוֹ
  chosen: with its life
  alternatives:
  - in its life
  - with its soul
  - with its lifeblood
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes animating life rather than the later English theological sense 'soul.' The prefixed ב can be rendered instrumentally/associatively; 'with its life' is clear and preserves the Hebrew imagery. 'Lifeblood' is interpretive and would collapse the following apposition.
- source_word: דָמוֹ
  chosen: its blood
  alternatives:
  - its lifeblood
  lexicon: HALOT
  rationale: דָם is straightforwardly 'blood.' Because the verse itself identifies the life with the blood, retaining 'blood' avoids over-interpretation and preserves the explanatory force of the Hebrew sequence.
- source_word: בְּנַפְשׁוֹ דָמוֹ
  chosen: with its life, that is, its blood
  alternatives:
  - with its lifeblood
  - in its blood, its life
  lexicon: HALOT
  rationale: 'The juxtaposition is elliptical in Hebrew and commonly understood appositionally: the flesh must not be eaten with its life—namely, its blood. Adding ''that is'' makes the apposition explicit in readable English without materially expanding the sense.'
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - do not eat
  - you must not eat
  lexicon: HALOT
  rationale: The imperfect with negation in this legal context is well rendered as prohibition. 'You shall not eat' preserves the solemn legislative tone better than the more colloquial imperative 'do not eat.'
