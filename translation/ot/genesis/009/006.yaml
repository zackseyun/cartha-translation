theological_decisions:
- issue: Rendering of אָדָם in a generic singular legal statement
  chosen_reading: man
  alternative_readings:
  - humankind
  - human being
  rationale: Per doctrine, gender-accurate renderings are preferred over gender-neutral
    when the source uses grammatically masculine forms with representative force.
    Here אדם is generic but singular and rhetorically repeated; 'man' preserves both
    the form and the cadence of the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
- issue: Whether the verse states human administration of justice or merely predicts
    divine retribution
  chosen_reading: by man shall his blood be shed
  alternative_readings:
  - his blood shall be shed among mankind
  - his blood will be shed by humanity
  rationale: The instrumental/agentive reading of בָּאָדָם best fits the syntax and
    the traditional understanding of the verse as grounding human responsibility in
    the image of God. The translation states what the Hebrew most naturally conveys
    without expanding into a full doctrinal statement about capital punishment beyond
    the verse itself.
- issue: Imago Dei clause wording
  chosen_reading: for God made man in his image
  alternative_readings:
  - for in the image of God he made man
  rationale: The Hebrew literally says 'for in the image of God he made man.' The
    chosen English preserves the meaning while improving readability. The theological
    content—that human life has special dignity because humanity is made in God's
    image—is retained without interpretive expansion.
