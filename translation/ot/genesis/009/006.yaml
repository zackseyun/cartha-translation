id: GEN.9.6
reference: Genesis 9:6
source:
  edition: WLC
  text: שֹׁפֵךְ֙ דַּ֣ם הָֽ/אָדָ֔ם בָּֽ/אָדָ֖ם דָּמ֣/וֹ יִשָּׁפֵ֑ךְ כִּ֚י בְּ/צֶ֣לֶם
    אֱלֹהִ֔ים עָשָׂ֖ה אֶת הָ/אָדָֽם־׃
translation:
  text: Whoever sheds the blood of man, by man shall his blood be shed, for God made
    man in his image.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for in the image of God he made man.”
    reason: lexical_alternative
  - marker: b
    text: “Man” here renders Hebrew adam in a generic sense, referring to humanity
      or a human being, not males only.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפֵךְ
  chosen: Whoever sheds
  alternatives:
  - He who sheds
  - One who pours out
  lexicon: HALOT
  rationale: The Qal participle functions generically/proverbially. 'Whoever sheds'
    gives natural modern English while preserving the legal-wisdom force. 'Sheds'
    is preferred over the more wooden 'pours out' for bloodshed idiomatically.
- source_word: דַּם
  chosen: blood
  lexicon: HALOT
  rationale: Standard gloss; here it denotes lifeblood and violent killing in a juridical
    context.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a human being
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, 'man' best
    matches the representative/generic singular here and also preserves the wordplay
    with the following בָּאָדָם and final הָאָדָם.
- source_word: בָּאָדָם
  chosen: by man
  alternatives:
  - by humankind
  - by a human being
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken instrumentally/agentively in this
    judicial saying: the murderer’s blood is to be shed by man. ''By man'' preserves
    the terse parallelism and the repeated אדם.'
- source_word: דָּמוֹ
  chosen: his blood
  lexicon: HALOT
  rationale: Straightforward pronominal suffix; retained literally to preserve the
    lex talionis structure.
- source_word: יִשָּׁפֵךְ
  chosen: shall be shed
  alternatives:
  - will be shed
  - must be shed
  lexicon: HALOT
  rationale: The Niphal imperfect is rendered as a passive. 'Shall be shed' preserves
    the solemn legal/proverbial tone. 'Must be shed' would over-specify deontic force
    beyond the form itself.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the preceding rule. 'For' is concise and fits
    the elevated style.
- source_word: בְּצֶלֶם אֱלֹהִים
  chosen: in his image
  alternatives:
  - in the image of God
  lexicon: HALOT
  rationale: Because 'God' is the explicit subject of עָשָׂה, English can naturally
    render the phrase as 'in his image' without loss of meaning. This avoids awkward
    repetition while preserving the theological claim of the imago Dei.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Singular sense is required by the singular verb עָשָׂה and the context.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - created
  - fashioned
  lexicon: HALOT
  rationale: עשה commonly means 'make/do.' 'Made' is the most direct rendering here;
    'created' would import ברא-language not used in this clause.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the human being
  lexicon: HALOT
  rationale: Rendered consistently with the earlier occurrences of אדם in the verse
    to preserve the rhetorical linkage between the victim, the human agent of justice,
    and humanity as God's image-bearer.
