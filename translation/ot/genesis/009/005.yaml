id: GEN.9.5
reference: Genesis 9:5
source:
  edition: WLC
  text: וְ/אַ֨ךְ אֶת דִּמְ/כֶ֤ם לְ/נַפְשֹֽׁתֵי/כֶם֙ אֶדְרֹ֔שׁ מִ/יַּ֥ד כָּל חַיָּ֖ה
    אֶדְרְשֶׁ֑/נּוּ וּ/מִ/יַּ֣ד הָֽ/אָדָ֗ם מִ/יַּד֙ אִ֣ישׁ אָחִ֔י/ו אֶדְרֹ֖שׁ אֶת
    נֶ֥פֶשׁ הָֽ/אָדָֽם־־־׃
translation:
  text: And surely I will require your lifeblood for your lives. From the hand of
    every beast I will require it, and from the hand of man. From the hand of each
    man's brother I will require the life of the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your blood, for your lives.' The Hebrew speaks literally of blood in
      relation to life; 'lifeblood' makes the sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will call it to account.' The repeated verb carries a judicial sense
      of demanding an accounting for bloodshed.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the hand of each man, his brother.' The expression stresses
      human accountability for the life of another human.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַךְ
  chosen: And surely
  alternatives:
  - But surely
  - Surely
  lexicon: HALOT
  rationale: אַךְ adds emphatic restriction/assurance ('surely, indeed'). Rendering
    with 'And surely' preserves the connective וְ while conveying the emphatic force
    without sounding archaic.
- source_word: דִּמְכֶם לְנַפְשֹׁתֵיכֶם
  chosen: your lifeblood for your lives
  alternatives:
  - your blood, for your lives
  - your blood of your lives
  lexicon: HALOT
  rationale: דָּם is 'blood,' but in this context refers to blood as the bearer of
    life; 'lifeblood' communicates the idiomatic sense clearly. לְנַפְשֹׁתֵיכֶם is
    best taken in relation to the life represented by the blood, hence 'for your lives'
    rather than a wooden 'of your souls.'
- source_word: אֶדְרֹשׁ
  chosen: I will require
  alternatives:
  - I will demand
  - I will call to account
  lexicon: HALOT
  rationale: דרשׁ in this judicial context means to require or demand an accounting
    for bloodshed. 'Require' is concise and preserves the legal tone; the broader
    sense 'call to account' is interpretive and therefore kept as an alternative.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - at the hand of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of' and often denotes agency
    or accountability. Retaining 'hand' preserves the Hebrew legal idiom and the repeated
    structure of the verse.
- source_word: כָּל חַיָּה
  chosen: every beast
  alternatives:
  - every animal
  - every living creature
  lexicon: HALOT
  rationale: חַיָּה here refers to an animal, especially in contrast with האדם. 'Beast'
    preserves the solemn register and avoids the overly broad 'living creature,' which
    could blur the human/animal distinction in context.
- source_word: אֶדְרְשֶׁנּוּ
  chosen: I will require it
  alternatives:
  - I will require him
  - I will require this accounting
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers back to the lifeblood/blood
    just mentioned, hence 'it.' English requires an explicit object, and 'it' is the
    least interpretive choice.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the human
  lexicon: HALOT
  rationale: In this verse האדם first contrasts with beast and then appears again
    in a representative singular. Per doctrine, gender-accurate rendering is preferred;
    'man' fits the singular representative use and preserves the human/animal contrast.
- source_word: אִישׁ אָחִיו
  chosen: each man's brother
  alternatives:
  - his brother
  - a man's brother
  - his fellow man
  lexicon: HALOT
  rationale: Literally 'a man, his brother.' The phrase emphasizes interpersonal human
    accountability. 'Each man's brother' preserves the distributive sense and the
    kinship language better than the more interpretive 'fellow man.'
- source_word: נֶפֶשׁ הָאָדָם
  chosen: the life of the man
  alternatives:
  - the life of man
  - the soul of the man
  - the life of the human
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes life rather than an immaterial soul, especially in
    parallel with blood/lifeblood. 'The life of the man' keeps the singular representative
    force and avoids importing later soul-body dualism.
