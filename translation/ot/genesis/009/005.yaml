theological_decisions:
- issue: Meaning of נֶפֶשׁ in a bloodshed context
  chosen_reading: Render נֶפֶשׁ as 'life' rather than 'soul'
  alternative_readings:
  - soul
  rationale: The immediate context links blood and life, and the verse concerns accountability
    for taking human life. 'Soul' in modern English could suggest a metaphysical claim
    not foregrounded by the Hebrew here. Rendering as 'life' preserves the concrete
    judicial sense.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
- issue: Rendering of אָדָם
  chosen_reading: Use 'man' in representative singular contexts
  alternative_readings:
  - humankind
  - humanity
  - the human
  rationale: The doctrine excerpt specifies 'man / humankind (context)' for אָדָם
    and prefers gender-accurate renderings. Here the singular and the contrast with
    beast favor 'man' rather than an abstract collective.
  doctrine_reference: 'Contested terms table: אָדָם → man / humankind (context); Translation
    philosophy §4 gender-accurate over gender-neutral.'
