theological_decisions:
- issue: Meaning of נֶפֶשׁ in a bloodshed context
  chosen_reading: Render נֶפֶשׁ as 'life' rather than 'soul'
  alternative_readings:
  - soul
  rationale: The immediate context links blood and life, and the verse concerns accountability for taking human life. 'Soul' in modern English could suggest a metaphysical claim not foregrounded by the Hebrew here. Rendering as 'life' preserves the concrete judicial sense.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not import doctrinal claims the text does not make.'
- issue: Rendering of אָדָם
  chosen_reading: Use 'man' in representative singular contexts
  alternative_readings:
  - humankind
  - humanity
  - the human
  rationale: The doctrine excerpt specifies 'man / humankind (context)' for אָדָם and prefers gender-accurate renderings. Here the singular and the contrast with beast favor 'man' rather than an abstract collective.
  doctrine_reference: 'Contested terms table: אָדָם → man / humankind (context); Translation philosophy §4 gender-accurate over gender-neutral.'
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/009/005.json
  category: awkward_english
  tier: 1
  from: and from the hand of man. From the hand of each man's brother I will require the life of the man.
  to: and from the hand of man—from the hand of each man's brother—I will require the life of the man.
  rationale: The current rendering splits a single Hebrew clause ('ūmiyyad hā’ādām miyyad ’îš ’āḥîw ’edrōš...') into two separate English sentences. This obscures the relationship between the phrases, where 'from the hand of each man's brother' is in apposition to, and specifies, 'from the hand of man.' Structuring this as a single clause, using commas or an em-dash to set off the appositional phrase, would more accurately reflect the syntax and logical flow of the Hebrew.
- timestamp: '2026-04-21T00:29:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/009/005.json
  category: awkward_english
  tier: 1
  from: your lifeblood for your lives
  to: your blood, for your lives
  rationale: The current rendering is redundant. The term 'lifeblood' is a good translation of the Hebrew concept of 'blood' (`דָּם`) being intrinsically linked to 'life' (`נֶפֶשׁ`), but the phrase `לְנַפְשֹׁתֵיכֶם` ('for your lives') is then translated a second time. This makes the English phrase 'your lifeblood for your lives' say 'your blood-of-life for your lives.' The suggested rewrite, 'your blood, for your lives,' which is also offered in footnote 'a', avoids this redundancy. It is more literal, preserving the distinct Hebrew terms while still clearly communicating their relationship via the preposition 'for' (a valid translation of `לְ`).
