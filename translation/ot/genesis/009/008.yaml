id: GEN.9.8
reference: Genesis 9:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶל נֹ֔חַ וְ/אֶל בָּנָ֥י/ו אִתּ֖/וֹ לֵ/אמֹֽר־־׃
translation:
  text: Then God said to Noah and to his sons with him, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive preterite advances the narrative. 'Then ... said'
    gives natural modern English while preserving the sequential force; 'and ... said'
    is more formally literal but less idiomatic in English narrative.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context אֱלֹהִים refers to the one true God speaking to Noah.
    'God' is the standard and contextually unambiguous rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural
    modern equivalent.
- source_word: נֹחַ
  chosen: Noah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - also to
  lexicon: HALOT
  rationale: The conjunction plus preposition coordinates a second addressee. 'And
    to' preserves the structure clearly.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring. Per the gender-accurate
    principle, 'sons' is preferred over the more generic 'children'.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - who were with him
  lexicon: HALOT
  rationale: The phrase identifies Noah's sons as being with him. 'With him' is sufficiently
    clear and closely follows the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: This infinitive introduces the following speech. 'Saying' preserves the
    discourse marker; although sometimes omitted in smoother English, it is retained
    here because it is explicit in the Hebrew and introduces the covenant speech that
    follows.
