id: GEN.9.18
reference: Genesis 9:18
source:
  edition: WLC
  text: וַ/יִּֽהְי֣וּ בְנֵי נֹ֗חַ הַ/יֹּֽצְאִים֙ מִן הַ/תֵּבָ֔ה שֵׁ֖ם וְ/חָ֣ם וָ/יָ֑פֶת
    וְ/חָ֕ם ה֖וּא אֲבִ֥י כְנָֽעַן־־׃
translation:
  text: The sons of Noah who came out of the ark were Shem, Ham, and Japheth; and
    Ham was the father of Canaan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: 'The waw-consecutive form of היה here functions as a simple past/copular
    verb introducing the subject and predicate: ''were.'' ''Became'' would overstate
    a change-of-state nuance not required by the context.'
- source_word: בְנֵי נֹחַ
  chosen: the sons of Noah
  alternatives:
  - Noah's sons
  lexicon: HALOT
  rationale: Construct chain literally means 'sons of Noah.' This preserves the Hebrew
    familial expression and remains natural English. The definite sense is carried
    by context, hence 'the sons of Noah.'
- source_word: הַיֹּצְאִים
  chosen: who came out
  alternatives:
  - who went out
  - the ones coming out
  lexicon: HALOT
  rationale: The participle with article functions attributively, describing Noah's
    sons as those who exited the ark. 'Came out' is idiomatic in English for exiting
    an enclosed space; 'went out' is possible but less natural here.
- source_word: מִן הַתֵּבָה
  chosen: of the ark
  alternatives:
  - from the ark
  - out of the ark
  lexicon: HALOT
  rationale: In English, 'came out of the ark' best represents the full phrase with
    the preceding participle. The preposition מן is thus expressed together with the
    verb phrase rather than separately.
- source_word: שֵׁם וְחָם וָיָפֶת
  chosen: Shem, Ham, and Japheth
  lexicon: HALOT
  rationale: These are standard English transliterations of the personal names. The
    conjunction is rendered naturally as a serial list with 'and' before the final
    name.
- source_word: וְחָם הוּא אֲבִי כְנָעַן
  chosen: and Ham was the father of Canaan
  alternatives:
  - and Ham was Canaan's father
  - now Ham was the father of Canaan
  lexicon: HALOT
  rationale: The clause is parenthetical/background information identifying Ham in
    relation to Canaan, important for the following narrative. 'Was the father of'
    is a transparent rendering of the nominal clause with אבי. 'Canaan's father' is
    possible but slightly less formal and less directly mirrors the Hebrew structure.
