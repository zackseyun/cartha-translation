theological_decisions:
- issue: Genealogical note about Ham and Canaan
  chosen_reading: Retain the explicit clause 'and Ham was the father of Canaan' in
    the main text as a narrative identification.
  alternative_readings:
  - Treat the clause as merely incidental and de-emphasize it stylistically
  rationale: The Hebrew explicitly foregrounds Ham's relation to Canaan, preparing
    for the subsequent episode and its consequences. The translation preserves this
    narrative emphasis without importing later theological or ethnic claims beyond
    the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
