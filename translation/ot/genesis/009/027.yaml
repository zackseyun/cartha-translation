id: GEN.9.27
reference: Genesis 9:27
source:
  edition: WLC
  text: יַ֤פְתְּ אֱלֹהִים֙ לְ/יֶ֔פֶת וְ/יִשְׁכֹּ֖ן בְּ/אָֽהֳלֵי שֵׁ֑ם וִ/יהִ֥י כְנַ֖עַן
    עֶ֥בֶד לָֽ/מוֹ־׃
translation:
  text: May God enlarge Japheth, and may he dwell in the tents of Shem, and let Canaan
    be a slave to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and may God dwell in the tents of Shem'; alternatively, 'and may Japheth
      dwell in the tents of Shem.' The Hebrew leaves the subject of 'dwell' unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: יַפְתְּ
  chosen: enlarge
  alternatives:
  - make room for
  - extend
  lexicon: HALOT
  rationale: The jussive from פתה/יפה here is a wordplay with the name Japheth (יֶפֶת).
    'Enlarge' preserves the likely sense of making spacious while echoing the sound-play
    better than looser options.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, the verb context is singular and the
    referent is the one God; standard singular rendering is required.
- source_word: לְיֶפֶת
  chosen: Japheth
  rationale: Personal name is transliterated per project philosophy. The prefixed
    ל is represented idiomatically in English by making Japheth the object of 'enlarge'
    ('enlarge Japheth' = 'enlarge for Japheth').
- source_word: וְיִשְׁכֹּן
  chosen: may he dwell
  alternatives:
  - and let him dwell
  - and may it dwell
  lexicon: HALOT
  rationale: Jussive of שכן is best rendered with a volitive 'may he dwell.' The subject
    is grammatically singular masculine and contextually ambiguous between God and
    Japheth, so the English preserves the ambiguity with 'he' rather than resolving
    it.
- source_word: בְּאָהֳלֵי שֵׁם
  chosen: in the tents of Shem
  alternatives:
  - among the tents of Shem
  lexicon: HALOT
  rationale: A straightforward locative expression. 'Tents' is retained literally
    rather than generalized to 'dwelling places' to preserve the imagery and possible
    covenantal/social overtones.
- source_word: וִיהִי
  chosen: and let ... be
  alternatives:
  - and may ... be
  lexicon: HALOT
  rationale: Jussive of היה continues the blessing/curse style of the verse. 'Let
    ... be' is natural English in this sequence.
- source_word: כְנַעַן
  chosen: Canaan
  rationale: Proper name retained as 'Canaan,' referring to the person/line under
    Noah's pronouncement.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: Per project philosophy, where bonded status is salient, עבד/δοῦλος-family
    terms should be rendered 'slave' rather than softened to 'servant.' Here the subjugated
    status in Noah's pronouncement is central.
- source_word: לָמוֹ
  chosen: to them
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The pronominal form is plural in usage here, naturally referring to Shem
    and Japheth together in the flow of the blessing. This is the most common syntactic
    reading, though some construe the prior singular subject differently.
