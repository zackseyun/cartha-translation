theological_decisions:
- issue: Identity of the subject of 'may he dwell in the tents of Shem'
  chosen_reading: The main text preserves the ambiguity with 'may he dwell,' without
    specifying whether the subject is God or Japheth.
  alternative_readings:
  - May God dwell in the tents of Shem.
  - May Japheth dwell in the tents of Shem.
  rationale: The Hebrew singular verb permits either reading in context, and the verse
    has long been interpreted both ways. Per doctrine, genuine ambiguity should be
    preserved rather than resolved. The English pronoun keeps the tension intact while
    a footnote records the main alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
