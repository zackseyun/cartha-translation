id: GEN.9.28
reference: Genesis 9:28
source:
  edition: WLC
  text: וַֽ/יְחִי נֹ֖חַ אַחַ֣ר הַ/מַּבּ֑וּל שְׁלֹ֤שׁ מֵאוֹת֙ שָׁנָ֔ה וַֽ/חֲמִשִּׁ֖ים
    שָׁנָֽה־׃
translation:
  text: After the flood, Noah lived three hundred and fifty years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - continued to live
  - survived
  lexicon: HALOT
  rationale: From חיה in the wayyiqtol, narrating Noah's lifespan after the flood.
    'Lived' is the natural English rendering in genealogical/lifespan contexts; 'survived'
    would overemphasize deliverance rather than duration.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name נֹחַ, following
    the translation policy to transliterate names.
- source_word: אַחַר
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking subsequent time. 'After' is the plain and
    idiomatic choice.
- source_word: הַמַּבּוּל
  chosen: the flood
  alternatives:
  - the deluge
  lexicon: HALOT
  rationale: Definite noun referring to the well-known flood narrative. 'The flood'
    is the standard, clear rendering; 'deluge' is possible but less natural in contemporary
    English.
- source_word: שְׁלֹשׁ מֵאוֹת שָׁנָה
  chosen: three hundred years
  lexicon: HALOT
  rationale: Cardinal number construction with 'years.' English idiom requires plural
    'years' though Hebrew uses singular שָׁנָה after the compound number.
- source_word: וַחֲמִשִּׁים שָׁנָה
  chosen: and fifty years
  lexicon: HALOT
  rationale: Continuation of the compound number. Rendered straightforwardly as part
    of the total lifespan segment, yielding idiomatic English 'three hundred and fifty
    years.'
