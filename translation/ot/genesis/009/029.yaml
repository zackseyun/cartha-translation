id: GEN.9.29
reference: Genesis 9:29
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ כָּל יְמֵי נֹ֔חַ תְּשַׁ֤ע מֵאוֹת֙ שָׁנָ֔ה וַ/חֲמִשִּׁ֖ים שָׁנָ֑ה
    וַ/יָּמֹֽת־־׃פ
translation:
  text: So all the days of Noah were nine hundred and fifty years, and he died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a copular/existential summary
    in a genealogical lifespan formula. 'Were' is the most natural English rendering
    in this context.
- source_word: כָּל יְמֵי נֹחַ
  chosen: all the days of Noah
  alternatives:
  - the whole lifespan of Noah
  - all Noah's days
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for the total span of a person's life.
    Rendering it closely preserves the formulaic cadence of Genesis while remaining
    clear in English.
- source_word: תְּשַׁע מֵאוֹת שָׁנָה וַחֲמִשִּׁים שָׁנָה
  chosen: nine hundred and fifty years
  alternatives:
  - nine hundred fifty years
  lexicon: HALOT
  rationale: The Hebrew expresses the number in two coordinated parts, literally 'nine
    hundred year and fifty year.' Standard English combines them as 'nine hundred
    and fifty years.'
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The singular verb refers back to Noah. Including the pronoun 'he' is
    natural English and preserves the narrative closure of the formula.
