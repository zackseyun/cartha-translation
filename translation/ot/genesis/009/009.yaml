theological_decisions:
- issue: Covenant terminology in a divine-human context
  chosen_reading: my covenant
  alternative_readings:
  - my pact
  - my treaty
  rationale: Because the verse concerns God's formal relationship with Noah and his
    line, 'covenant' preserves the biblical-theological category without importing
    extra doctrinal detail beyond the Hebrew.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
