id: GEN.9.9
reference: Genesis 9:9
source:
  edition: WLC
  text: וַ/אֲנִ֕י הִנְנִ֥/י מֵקִ֛ים אֶת בְּרִיתִ֖/י אִתְּ/כֶ֑ם וְ/אֶֽת זַרְעֲ/כֶ֖ם
    אַֽחֲרֵי/כֶֽם־־׃
translation:
  text: And as for me, behold, I am establishing my covenant with you and with your
    offspring after you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your seed.' The Hebrew term is a collective noun that can refer to offspring
      or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And as for me
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun is slightly emphatic in context.
    'And as for me' preserves the discourse shift and contrastive emphasis better
    than a flat 'And I,' while remaining natural English.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - here I am
  - indeed
  lexicon: HALOT
  rationale: The particle signals emphasis and solemn attention. 'Behold' best preserves
    the elevated covenantal tone here without adding content; alternatives are either
    too colloquial ('look') or shift the sense toward self-presentation ('here I am').
- source_word: מֵקִים
  chosen: I am establishing
  alternatives:
  - I establish
  - I confirm
  - I uphold
  lexicon: HALOT
  rationale: The Hiphil participle of קום here conveys the act of setting up or establishing
    the covenant. The progressive English form fits the participial construction in
    context and reflects the solemn performative force. 'Confirm' is possible in covenant
    contexts but can imply reaffirmation more strongly than the Hebrew requires here.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for בְּרִית in divine-human relationship contexts. Alternatives like ''pact''
    or ''treaty'' are too secular or narrow.'
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - between me and you
  lexicon: HALOT
  rationale: The preposition straightforwardly marks the covenant's relation to Noah
    and his companions. 'With you' is the plain sense and idiomatic in English.
- source_word: וְאֶת זַרְעֲכֶם
  chosen: and with your offspring
  alternatives:
  - and your seed
  - and with your descendants
  lexicon: HALOT
  rationale: זֶרַע can mean 'seed,' 'offspring,' or 'descendants.' 'Offspring' preserves
    the collective singular nuance and is more natural in modern English than 'seed,'
    while being less interpretively expansive than 'descendants.' The repeated 'with'
    is supplied in English for clarity from the parallel construction.
- source_word: אַחֲרֵיכֶם
  chosen: after you
  alternatives:
  - following you
  - who come after you
  lexicon: HALOT
  rationale: The phrase indicates subsequent generations. 'After you' is concise and
    faithful; 'who come after you' is a valid expansion but not necessary in the main
    text.
