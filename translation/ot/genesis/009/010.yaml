id: GEN.9.10
reference: Genesis 9:10
source:
  edition: WLC
  text: וְ/אֵ֨ת כָּל נֶ֤פֶשׁ הַֽ/חַיָּה֙ אֲשֶׁ֣ר אִתְּ/כֶ֔ם בָּ/ע֧וֹף בַּ/בְּהֵמָ֛ה
    וּֽ/בְ/כָל חַיַּ֥ת הָ/אָ֖רֶץ אִתְּ/כֶ֑ם מִ/כֹּל֙ יֹצְאֵ֣י הַ/תֵּבָ֔ה לְ/כֹ֖ל חַיַּ֥ת
    הָ/אָֽרֶץ־־׃
translation:
  text: 'and with every living creature that is with you: the birds, the livestock,
    and every wild animal of the earth with you, from all that came out of the ark,
    every wild animal of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every living being.' The Hebrew phrase can be rendered more literally
      as 'every living soul/creature.'
    reason: lexical_alternative
  - marker: b
    text: Or 'every beast of the earth.'
    reason: lexical_alternative
  - marker: c
    text: The closing phrase is difficult in Hebrew; more formally, 'from all that
      came out of the ark, for every wild animal of the earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ הַחַיָּה
  chosen: living creature
  alternatives:
  - living being
  - living soul
  lexicon: HALOT
  rationale: The phrase denotes animate life broadly, especially animals in this context.
    'Living creature' is natural modern English and fits the covenant context better
    than the more wooden 'living soul.'
- source_word: אֲשֶׁר אִתְּכֶם
  chosen: that is with you
  alternatives:
  - which are with you
  lexicon: HALOT
  rationale: A straightforward relative clause; singular English agrees naturally
    with the collective singular 'every living creature.'
- source_word: בָּעוֹף
  chosen: the birds
  alternatives:
  - the flying creatures
  - the birds of the air
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures generally, but in this list 'birds'
    is the most idiomatic and sufficiently accurate rendering.
- source_word: בַּבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the domestic animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to domesticated land animals. 'Livestock' is clearer
    and more contemporary than 'cattle,' which can be too narrow.
- source_word: וּבְכָל חַיַּת הָאָרֶץ
  chosen: and every wild animal of the earth
  alternatives:
  - and every beast of the earth
  - and every living thing of the earth
  lexicon: HALOT
  rationale: חַיַּת הָאָרֶץ distinguishes wild land animals from birds and livestock.
    'Wild animal' captures the category better than the traditional but potentially
    misleading 'beast.'
- source_word: מִכֹּל יֹצְאֵי הַתֵּבָה
  chosen: from all that came out of the ark
  alternatives:
  - from all the ones that came out of the ark
  - namely all that came out of the ark
  lexicon: HALOT
  rationale: The preposition מִן here is best taken partitively/specifying the animals
    in view as those emerging from the ark. 'That came out' is smoother than a participial
    form in English.
- source_word: לְכֹל חַיַּת הָאָרֶץ
  chosen: every wild animal of the earth
  alternatives:
  - for every beast of the earth
  - indeed every wild animal of the earth
  lexicon: HALOT
  rationale: The final phrase is syntactically difficult and likely resumptive/appositional,
    restating the scope of the covenant partners among land animals. Rendering it
    appositionally in English preserves the sense without forcing an unnatural 'for/to'
    construction.
