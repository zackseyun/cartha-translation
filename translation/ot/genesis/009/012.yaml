theological_decisions:
- issue: Covenant verb with נֹתֵן
  chosen_reading: that I am making
  alternative_readings:
  - that I give
  - that I am giving
  rationale: The Hebrew participle נֹתֵן is formally 'giving,' but in English covenant
    discourse 'making' better communicates the establishment of the covenant sign
    without adding doctrinal content. The choice is stylistic and contextual, not
    theological innovation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of נֶפֶשׁ חַיָּה
  chosen_reading: every living creature
  alternative_readings:
  - every living being
  - every living soul
  rationale: The phrase includes animals in the Noahic covenant context. Rendering
    נֶפֶשׁ as 'soul' here could import theological assumptions about anthropology
    not intended by the passage. 'Living creature' preserves the broad created-life
    scope.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    doctrinal claims'
