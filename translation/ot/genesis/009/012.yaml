id: GEN.9.12
reference: Genesis 9:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים זֹ֤את אֽוֹת הַ/בְּרִית֙ אֲשֶׁר אֲנִ֣י נֹתֵ֗ן בֵּינִ/י֙
    וּ/בֵ֣ינֵי/כֶ֔ם וּ/בֵ֛ין כָּל נֶ֥פֶשׁ חַיָּ֖ה אֲשֶׁ֣ר אִתְּ/כֶ֑ם לְ/דֹרֹ֖ת עוֹלָֽם־־־׃
translation:
  text: And God said, “This is the sign of the covenant that I am making between me
    and you and every living creature that is with you, for perpetual generations:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that I am giving.” The Hebrew verb is literally “giving”; “making”
      is used in English because covenant language is more natural that way here.
    reason: lexical_alternative
  - marker: b
    text: Or, “for everlasting generations” or “throughout all generations.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural
    modern English rendering that preserves the sequence without overemphasizing temporality.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the referent is the one God speaking to Noah; standard
    English rendering is 'God.'
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: 'The demonstrative introduces and identifies what follows. English idiom
    naturally supplies the copula: ''This is the sign...''.'
- source_word: אוֹת
  chosen: sign
  alternatives:
  - token
  - mark
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or visible marker. 'Sign' is the clearest
    contemporary English equivalent and fits the rainbow context in the surrounding
    passage.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - the pact
  - the treaty
  lexicon: HALOT
  rationale: בְּרִית is a key covenant term in Genesis and should be rendered consistently
    as 'covenant.'
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  chosen: that I am making
  alternatives:
  - that I give
  - that I am giving
  lexicon: HALOT
  rationale: Although נֹתֵן is literally 'giving,' in covenantal context English more
    naturally says 'making' a covenant/sign arrangement. This is an optimal-equivalence
    choice to avoid awkward English while preserving the present/imperfective sense
    with 'am making.'
- source_word: בֵּינִי וּבֵינֵיכֶם וּבֵין
  chosen: between me and you and
  alternatives:
  - between myself and you and
  - between me and you, and between
  lexicon: HALOT
  rationale: The repeated בין structures the parties to the covenant. English can
    compress the final repetition smoothly while preserving all covenant participants.
- source_word: כָּל נֶפֶשׁ חַיָּה
  chosen: every living creature
  alternatives:
  - every living being
  - every living soul
  lexicon: HALOT
  rationale: The phrase refers broadly to animate life accompanying Noah. 'Living
    creature' is idiomatic and avoids the misleadingly anthropological sense 'soul'
    may carry in English.
- source_word: אֲשֶׁר אִתְּכֶם
  chosen: that is with you
  alternatives:
  - which is with you
  - with you
  lexicon: HALOT
  rationale: This relative clause identifies the creatures accompanying Noah and his
    family. 'That is with you' is natural and sufficiently formal.
- source_word: לְדֹרֹת עוֹלָם
  chosen: for perpetual generations
  alternatives:
  - for everlasting generations
  - throughout all generations
  - for generations forever
  lexicon: HALOT
  rationale: The phrase denotes enduring continuity across generations. 'For perpetual
    generations' preserves both the generational aspect (דֹרֹת) and the lasting force
    of עוֹלָם without sounding archaic.
