theological_decisions:
- issue: Moral/theological interpretation of Noah's state and exposure
  chosen_reading: Translate the verse descriptively without adding interpretive language
    beyond the Hebrew text.
  alternative_readings:
  - He lay naked in his tent
  - He was uncovered in his tent
  rationale: The Hebrew reports Noah's drinking, intoxication, and self-exposure,
    but does not explicitly add moral commentary in this verse. The translation should
    preserve the narrative facts without importing a stronger sexualized or softened
    interpretation. 'Uncovered himself' also leaves room for the following context
    to clarify the significance of Ham's seeing him.
  doctrine_reference: Preserve theological tension rather than resolve it.
