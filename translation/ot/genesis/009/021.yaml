id: GEN.9.21
reference: Genesis 9:21
source:
  edition: WLC
  text: וַ/יֵּ֥שְׁתְּ מִן הַ/יַּ֖יִן וַ/יִּשְׁכָּ֑ר וַ/יִּתְגַּ֖ל בְּ/ת֥וֹךְ אָהֳלֹֽ/ה־׃
translation:
  text: He drank some of the wine, became drunk, and uncovered himself inside his
    tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the wine.' The Hebrew expression is literally 'from the wine,'
      likely with a partitive sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'lay uncovered' or 'was uncovered.' The Hebrew verb can be rendered more
      statively, but the reflexive sense 'uncovered himself' best fits the form here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁתְּ
  chosen: He drank
  alternatives:
  - And he drank
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁתה, straightforward narrative preterite. English omits
    the repeated initial 'and' for natural style while preserving sequential action.
- source_word: מִן הַיַּיִן
  chosen: some of the wine
  alternatives:
  - from the wine
  - of the wine
  lexicon: HALOT
  rationale: 'The preposition מִן with the definite noun is naturally partitive here:
    he drank from/of the wine he had made. ''Some of the wine'' is idiomatic English
    that preserves the partitive sense better than the more wooden ''from the wine''.'
- source_word: וַיִּשְׁכָּר
  chosen: became drunk
  alternatives:
  - got drunk
  - was drunk
  lexicon: HALOT
  rationale: From שׁכר in the Qal, indicating entering a state of intoxication. 'Became
    drunk' best reflects the ingressive/resultative sense in a slightly more formal
    register than 'got drunk'.
- source_word: וַיִּתְגַּל
  chosen: uncovered himself
  alternatives:
  - lay uncovered
  - became uncovered
  - was uncovered
  lexicon: HALOT
  rationale: Hitpael of גלה is reflexive here, indicating that Noah exposed himself.
    'Uncovered himself' preserves the reflexive nuance better than the stative/passive
    alternatives.
- source_word: בְּתוֹךְ אָהֳלֹה
  chosen: inside his tent
  alternatives:
  - in the midst of his tent
  - within his tent
  lexicon: HALOT
  rationale: בְּתוֹךְ denotes being in the interior/middle of a space. 'Inside his
    tent' is clear modern English and accurately conveys location without unnecessary
    literalism.
