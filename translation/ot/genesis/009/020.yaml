id: GEN.9.20
reference: Genesis 9:20
source:
  edition: WLC
  text: וַ/יָּ֥חֶל נֹ֖חַ אִ֣ישׁ הָֽ/אֲדָמָ֑ה וַ/יִּטַּ֖ע כָּֽרֶם׃
translation:
  text: Noah, a man of the soil, began to plant a vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Noah, a man of the soil, was the first to plant a vineyard.' The Hebrew
      wording is compressed, and some understand 'began' in the sense of 'was the
      first.'
    reason: alternative_reading
  - marker: b
    text: Or 'began and planted a vineyard'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּחֶל
  chosen: began
  alternatives:
  - became profaned
  - was the first
  lexicon: HALOT, BDB
  rationale: 'From חלל in the Hiphil, the most natural sense here is ''began.'' The
    clause is elliptical, so English supplies no infinitive but carries the sense
    forward into the next verb: ''began and planted.'' Alternatives such as ''became
    profaned'' are lexically possible for the root in other stems/contexts but do
    not fit this narrative context well; ''was the first'' reflects an interpretive
    expansion found in some translations but goes beyond the plain wording.'
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a husbandman
  - a person
  lexicon: HALOT, BDB
  rationale: The noun means 'man' here, introducing Noah appositionally. This follows
    the gender-accurate policy and preserves the Hebrew expression rather than replacing
    it with a role title alone.
- source_word: הָאֲדָמָה
  chosen: of the soil
  alternatives:
  - of the ground
  - of the land
  lexicon: HALOT, BDB
  rationale: אֲדָמָה commonly denotes ground/soil. 'Of the soil' is idiomatic in English
    and preserves the agricultural sense better than the more abstract 'land.' It
    also avoids confusion with the contested term אָדָם, which is not used here.
- source_word: וַיִּטַּע
  chosen: planted
  lexicon: HALOT, BDB
  rationale: Straightforward rendering of נטע, the standard verb for planting.
- source_word: כָּרֶם
  chosen: a vineyard
  lexicon: HALOT, BDB
  rationale: Standard rendering for a cultivated grape-growing plot; contextually
    precise and idiomatic.
