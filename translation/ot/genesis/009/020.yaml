theological_decisions:
- issue: How to construe the elliptical sequence וַיָּחֶל ... וַיִּטַּע
  chosen_reading: Noah began and planted a vineyard.
  alternative_readings:
  - Noah, a man of the soil, was the first to plant a vineyard.
  - Noah, a man of the soil, began to be a man of the soil, and planted a vineyard.
  rationale: The Hebrew is syntactically compressed. Rendering וַיָּחֶל as 'began'
    and allowing the sense to run into the following finite verb best preserves the
    plain narrative flow without over-interpreting. 'Was the first to plant' is possible
    as an interpretive paraphrase but is not explicit in the text. 'Began to be a
    man of the soil' is more wooden but less natural in English and less likely in
    context.
  doctrine_reference: Translation philosophy §§1, 3, 6
