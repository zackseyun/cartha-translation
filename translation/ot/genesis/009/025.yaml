  from: a slave of slaves he shall be
  to: he shall be the lowest of slaves
  rationale: The current rendering preserves the Hebrew word order for emphasis, which
    is a valid choice. However, the construction 'a slave of slaves he shall be' is
    somewhat archaic and could be perceived as awkward by modern readers. An alternative
    that is both fluent and captures the superlative sense of the Hebrew idiom (as
    noted in footnote 'a') would be 'he shall be the lowest of slaves'. This would
    move the explanation from the footnote into the main text, increasing clarity.
