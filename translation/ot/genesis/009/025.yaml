theological_decisions:
- issue: Object of Noah's curse
  chosen_reading: The translation names Canaan as the one cursed, exactly as in the
    Hebrew text.
  alternative_readings:
  - Interpreting the curse as directly on Ham
  rationale: 'The verse explicitly says ''Canaan is cursed.'' The translation must
    not import broader interpretive traditions that shift the curse onto Ham. This
    is a textual and theological restraint issue: preserve what the text states and
    no more.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of servitude language
  chosen_reading: Use 'slave' in the main text.
  alternative_readings:
  - servant
  - bondservant
  rationale: The curse describes extreme subjugation, reinforced by 'slave of slaves.'
    Using 'slave' preserves the bonded nature and rhetorical severity better than
    'servant.'
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy
