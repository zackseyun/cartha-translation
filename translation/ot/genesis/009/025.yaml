id: GEN.9.25
reference: Genesis 9:25
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אָר֣וּר כְּנָ֑עַן עֶ֥בֶד עֲבָדִ֖ים יִֽהְיֶ֥ה לְ/אֶחָֽי/ו׃
translation:
  text: And he said, “Canaan is cursed; a slave of slaves he shall be to his brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the lowest of slaves”; the Hebrew expression “slave of slaves” intensifies
      the idea of extreme servitude.
    reason: lexical_alternative
  - marker: b
    text: The text explicitly says “Canaan,” not Ham.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר introducing direct speech. 'And
    he said' preserves the Hebrew narrative sequence without overinterpreting discourse
    flow.
- source_word: אָרוּר
  chosen: is cursed
  alternatives:
  - be cursed
  - cursed
  lexicon: HALOT
  rationale: Predicate adjective meaning 'cursed.' Rendering with English copula in
    direct speech gives natural modern English while preserving the declarative force
    of the Hebrew verbless clause.
- source_word: כְּנָעַן
  chosen: Canaan
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy. The text explicitly
    names Canaan, not Ham.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: HALOT
  rationale: The noun denotes a person in servile bondage. In this curse context,
    the bonded status is salient, so 'slave' better reflects the force than the softer
    'servant,' in line with the project's guidance on analogous servitude terms.
- source_word: עֲבָדִים
  chosen: of slaves
  alternatives:
  - of servants
  lexicon: HALOT
  rationale: 'The genitive plural intensifies the expression: ''slave of slaves,''
    a Hebrew superlative-like construction indicating the lowest servile status. Keeping
    the repetition preserves the rhetoric of the Hebrew.'
- source_word: יִהְיֶה
  chosen: he shall be
  alternatives:
  - he will be
  lexicon: HALOT
  rationale: Imperfect of היה here expresses future result within the curse oracle.
    'Shall be' fits the solemn register of the pronouncement.
- source_word: לְאֶחָיו
  chosen: to his brothers
  alternatives:
  - to his kinsmen
  lexicon: HALOT
  rationale: Masculine plural noun with 3ms suffix, literally 'to his brothers.' This
    should be kept gender-accurate rather than neutralized, while allowing the familial/tribal
    sense to be understood from context.
