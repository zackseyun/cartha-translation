theological_decisions:
- issue: Referent of קַשְׁתִּי in covenant context
  chosen_reading: Literal 'bow' retained in the main text, understood as the rainbow-sign
    in context
  alternative_readings:
  - my rainbow
  rationale: The Hebrew uses the ordinary word for 'bow,' and preserving that imagery
    reflects original-language primacy. Because modern readers may naturally understand
    the phenomenon as a rainbow, that alternative is preserved in a footnote rather
    than replacing the source image in the main text.
  doctrine_reference: Translation philosophy §1, §3, §5
