id: GEN.9.13
reference: Genesis 9:13
source:
  edition: WLC
  text: אֶת קַשְׁתִּ֕/י נָתַ֖תִּי בֶּֽ/עָנָ֑ן וְ/הָֽיְתָה֙ לְ/א֣וֹת בְּרִ֔ית בֵּינִ֖/י
    וּ/בֵ֥ין הָ/אָֽרֶץ־׃
translation:
  text: I have set my bow in the cloud, and it will be a sign of the covenant between
    me and the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my rainbow.' The Hebrew literally says 'my bow,' using the ordinary
      word for a bow; in context it refers to the rainbow in the cloud.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַשְׁתִּי
  chosen: my bow
  alternatives:
  - my rainbow
  lexicon: HALOT
  rationale: קֶשֶׁת literally denotes a bow, commonly a weapon; in this covenant context,
    with בֶּעָנָן ('in the cloud'), the referent is the rainbow. The main text keeps
    the more literal 'bow' to preserve the Hebrew imagery and avoid over-interpreting,
    while the contextual sense 'rainbow' is preserved in a footnote.
- source_word: נָתַתִּי
  chosen: I have set
  alternatives:
  - I have given
  - I set
  lexicon: HALOT
  rationale: נתן commonly means 'give/put/set.' In English, 'set' best fits placing
    the bow in the cloud. The perfect is rendered with present relevance ('have set')
    in natural English.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in the clouds
  lexicon: HALOT
  rationale: The noun is singular with the article assimilated in the preposition,
    so 'in the cloud' is the most direct rendering. English can use singular generically
    for the storm-cloud setting of the rainbow.
- source_word: וְהָיְתָה
  chosen: and it will be
  alternatives:
  - and it shall be
  - and it became
  lexicon: HALOT
  rationale: 'The qatal with prefixed conjunction here carries a future/result sense
    in context: the bow is appointed so that it will function as a sign. ''Will be''
    is clear modern English.'
- source_word: לְאוֹת
  chosen: a sign
  alternatives:
  - for a sign
  - as a sign
  lexicon: HALOT
  rationale: אוֹת denotes a sign or token. 'A sign' is idiomatic and preserves the
    covenantal marker sense.
- source_word: בְּרִית
  chosen: the covenant
  alternatives:
  - a covenant
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, the covenant is definite from the immediate
    context of God's established covenant after the flood; English idiom favors 'the
    covenant.'
- source_word: בֵּינִי וּבֵין הָאָרֶץ
  chosen: between me and the earth
  alternatives:
  - between me and the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In the flood narrative's cosmic scope,
    'earth' best matches the universal covenant context.
