id: GEN.28.3
reference: Genesis 28:3
source:
  edition: WLC
  text: וְ/אֵ֤ל שַׁדַּי֙ יְבָרֵ֣ךְ אֹֽתְ/ךָ֔ וְ/יַפְרְ/ךָ֖ וְ/יַרְבֶּ֑/ךָ וְ/הָיִ֖יתָ
    לִ/קְהַ֥ל עַמִּֽים׃
translation:
  text: And God Almighty may he bless you, and make you fruitful, and multiply you,
    so that you may become an assembly of peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''El Shaddai.'' Traditionally rendered ''God Almighty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל שַׁדַּי
  chosen: God Almighty
  alternatives:
  - El Shaddai
  - God Shaddai
  - the Almighty God
  lexicon: HALOT
  rationale: Translated the divine title rather than transliterating it, in keeping
    with the philosophy of translating titles. 'God Almighty' is the established and
    contextually fitting rendering for אֵל שַׁדַּי, preserving both the divine name
    element אֵל ('God') and the title שַׁדַּי.
- source_word: יְבָרֵךְ
  chosen: may he bless
  alternatives:
  - he will bless
  - let him bless
  lexicon: HALOT
  rationale: The imperfect here functions jussively in a blessing context. 'May he
    bless' best conveys Isaac's wish-prayer over Jacob, better than a simple future
    'he will bless.'
- source_word: וְיַפְרְךָ
  chosen: make you fruitful
  alternatives:
  - cause you to be fruitful
  - fruitify you
  lexicon: HALOT
  rationale: The Hiphil of פרה is causative; 'make you fruitful' is natural modern
    English and preserves the causative sense.
- source_word: וְיַרְבֶּךָ
  chosen: multiply you
  alternatives:
  - make you many
  - increase you greatly
  lexicon: HALOT
  rationale: The Hiphil of רבה in patriarchal blessing contexts commonly refers to
    increasing descendants or numbers. 'Multiply you' is concise and traditional without
    being archaic.
- source_word: וְהָיִיתָ
  chosen: so that you may become
  alternatives:
  - and you will be
  - and you shall become
  lexicon: HALOT
  rationale: Although formally a qatal with conjunction, in this blessing sequence
    it expresses result/purpose. 'So that you may become' makes the relation to the
    preceding blessings clear in idiomatic English.
- source_word: לִקְהַל עַמִּים
  chosen: an assembly of peoples
  alternatives:
  - a company of peoples
  - a congregation of peoples
  - a multitude of peoples
  lexicon: HALOT
  rationale: קהל denotes an assembled group or community. 'Assembly' is more transparent
    than 'company' in modern English, while 'peoples' preserves the plural עמים, suggesting
    multiple peoples/nations rather than merely many individuals.
