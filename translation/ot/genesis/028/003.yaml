theological_decisions:
- issue: Rendering of the divine title אֵל שַׁדַּי
  chosen_reading: God Almighty
  alternative_readings:
  - El Shaddai
  rationale: The translation philosophy prefers translating titles while transliterating
    personal names. Since this is a title for God rather than a personal name, 'God
    Almighty' is preferred in the main text. The transliterated form is preserved
    in a footnote as a recognizable alternative.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate
    names)'
