id: GEN.28.20
reference: Genesis 28:20
source:
  edition: WLC
  text: וַ/יִּדַּ֥ר יַעֲקֹ֖ב נֶ֣דֶר לֵ/אמֹ֑ר אִם יִהְיֶ֨ה אֱלֹהִ֜ים עִמָּדִ֗/י וּ/שְׁמָרַ֨/נִי֙ בַּ/דֶּ֤רֶךְ הַ/זֶּה֙ אֲשֶׁ֣ר אָנֹכִ֣י הוֹלֵ֔ךְ וְ/נָֽתַן לִ֥/י לֶ֛חֶם לֶ/אֱכֹ֖ל וּ/בֶ֥גֶד לִ/לְבֹּֽשׁ־־׃
translation:
  text: Then Jacob made a vow, saying, “If God will be with me and will keep me on this journey I am taking, and will give me bread to eat and clothing to wear,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watch over me' for 'keep me.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in/on this way'; here, in context, 'on this journey.'
    reason: lexical_alternative
  - marker: c
    text: '''Bread'' may also stand more broadly for food.'
    reason: lexical_alternative
  - marker: d
    text: Or 'on this journey that I am going'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּדַּר
  chosen: made a vow
  alternatives:
  - vowed
  lexicon: HALOT
  rationale: The verb נדר with the cognate noun נֶדֶר forms an idiomatic expression. 'Made a vow' is natural English and preserves the formal act without awkward repetition if rendered 'vowed a vow.'
- source_word: נֶדֶר
  chosen: a vow
  lexicon: HALOT
  rationale: Retained explicitly because the Hebrew includes the cognate noun, emphasizing the solemnity of Jacob's act.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the vow in readable English.
- source_word: אִם
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces the protasis of Jacob's vow. 'If' best reflects the conditional form here; any nuance of confidence is better inferred from context than imported into the translation.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the God who appeared to Jacob in the preceding context, so the singular English 'God' is appropriate despite the morphologically plural form.
- source_word: עִמָּדִי
  chosen: with me
  lexicon: HALOT
  rationale: Straightforward relational expression indicating divine presence.
- source_word: וּשְׁמָרַנִי
  chosen: and will keep me
  alternatives:
  - and will watch over me
  - and will guard me
  lexicon: HALOT
  rationale: שׁמר can mean keep, guard, or watch over. 'Keep me' is concise and idiomatic, while preserving the sense of protection.
- source_word: בַּדֶּרֶךְ הַזֶּה
  chosen: on this journey
  alternatives:
  - in this way
  - on this road
  lexicon: HALOT
  rationale: Though literally 'in/on this way,' the context is Jacob's travel. 'On this journey' communicates the intended sense in natural English.
- source_word: אֲשֶׁר אָנֹכִי הוֹלֵךְ
  chosen: that I am going
  alternatives:
  - which I am traveling
  - that I am walking
  lexicon: HALOT
  rationale: Preserves the relative clause and ongoing movement. 'Going' is the most natural broad English equivalent here.
- source_word: וְנָתַן לִי
  chosen: and will give me
  lexicon: HALOT
  rationale: Simple future sense within the conditional sequence.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The Hebrew literally says 'bread.' Although it can stand metonymically for food, the literal term is clear and idiomatic enough in English, especially paired with the infinitive 'to eat.'
- source_word: לֶאֱכֹל
  chosen: to eat
  lexicon: HALOT
  rationale: Infinitive of purpose/complement retained directly.
- source_word: וּבֶגֶד
  chosen: and clothing
  alternatives:
  - and a garment
  lexicon: HALOT
  rationale: Though singular, בגד can function collectively. 'Clothing' sounds more natural in English than 'a garment' in this provision context.
- source_word: לִלְבֹּשׁ
  chosen: to wear
  alternatives:
  - to put on
  lexicon: HALOT
  rationale: Idiomatic English for the infinitive complement after 'clothing.'
