theological_decisions:
- issue: Nature of Jacob's conditional vow
  chosen_reading: Render the condition straightforwardly with 'If' without softening it into certainty or hardening it into doubt.
  alternative_readings:
  - When God is with me
  - Since God will be with me
  rationale: The Hebrew conditional particle אִם naturally reads as 'if.' The translation preserves the textual tension of Jacob's vow rather than resolving whether he speaks from uncertainty or confidence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:19:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/028/020.json
  category: awkward_english
  tier: 1
  from: on this journey that I am going
  to: on this journey I am taking
  rationale: The current rendering is a very literal translation of the Hebrew phrase `בַּדֶּרֶךְ הַזֶּה אֲשֶׁר אָנֹכִי הוֹלֵךְ`. While accurate, the phrasing 'journey that I am going' is slightly redundant and less natural in English than 'journey I am taking.' This is a minor point of style, but the suggested rewrite improves the flow without losing any meaning.
