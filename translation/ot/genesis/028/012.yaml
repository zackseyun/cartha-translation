theological_decisions:
- issue: Imagery of סֻלָּם
  chosen_reading: stairway
  alternative_readings:
  - ladder
  rationale: The traditional 'ladder' is possible, but the Hebrew term is not specific
    enough to require a runged ladder, and the context of angels ascending and descending
    supports a broader ascent structure. This is a lexical-image decision, not a doctrinal
    one.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referent of בּוֹ
  chosen_reading: on it
  alternative_readings:
  - on him
  rationale: Some interpreters connect the pronoun to Jacob or another implied referent,
    but the nearest and most natural antecedent is the stairway. The translation preserves
    the straightforward sense without importing later theological associations into
    the main text.
  doctrine_reference: Translation philosophy §1, §3
