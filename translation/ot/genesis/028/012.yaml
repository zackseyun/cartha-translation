id: GEN.28.12
reference: Genesis 28:12
source:
  edition: WLC
  text: וַֽ/יַּחֲלֹ֗ם וְ/הִנֵּ֤ה סֻלָּם֙ מֻצָּ֣ב אַ֔רְצָ/ה וְ/רֹאשׁ֖/וֹ מַגִּ֣יעַ
    הַ/שָּׁמָ֑יְמָ/ה וְ/הִנֵּה֙ מַלְאֲכֵ֣י אֱלֹהִ֔ים עֹלִ֥ים וְ/יֹרְדִ֖ים בּֽ/וֹ׃
translation:
  text: And he dreamed, and behold, a stairway was set up on the earth, and its top
    reached to heaven; and behold, the angels of God were ascending and descending
    on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ladder.' The Hebrew term can refer more generally to a structure for
      ascent.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'on him,' though the most natural antecedent in context is the
      stairway.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּחֲלֹם
  chosen: And he dreamed
  alternatives:
  - Then he dreamed
  - And he had a dream
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline; 'And he dreamed' preserves
    the Hebrew narrative sequencing without unnecessary expansion.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The particle marks vivid presentation within the dream. 'Behold' preserves
    the rhetorical force better than flatter modern options.
- source_word: סֻלָּם
  chosen: stairway
  alternatives:
  - ladder
  - ramp
  lexicon: HALOT
  rationale: The Hebrew term denotes a structure for ascent/descent but does not require
    the image of a narrow runged ladder. 'Stairway' is a natural English rendering
    that fits the context of multiple angels ascending and descending.
- source_word: מֻצָּב
  chosen: was set up
  alternatives:
  - was stationed
  - was standing
  lexicon: HALOT
  rationale: Passive participle from נצב indicates something positioned or set in
    place. 'Was set up' captures the stative-resultative sense in idiomatic English.
- source_word: אַרְצָה
  chosen: on the earth
  alternatives:
  - on the ground
  - earthward
  lexicon: HALOT
  rationale: The noun with directional ending indicates relation to the earth/ground.
    'On the earth' best matches the cosmic contrast with 'heaven' in this verse.
- source_word: וְרֹאשׁוֹ
  chosen: and its top
  alternatives:
  - and its head
  lexicon: HALOT
  rationale: Hebrew 'head' commonly refers to the top or summit of an object. 'Its
    top' is the natural English equivalent here.
- source_word: מַגִּיעַ
  chosen: reached
  alternatives:
  - was reaching
  - touched
  lexicon: HALOT
  rationale: The participle describes the stairway's top as extending to heaven. 'Reached'
    is idiomatic and avoids over-literal awkwardness while preserving the sense.
- source_word: הַשָּׁמָיְמָה
  chosen: to heaven
  alternatives:
  - to the heavens
  - heavenward
  lexicon: HALOT
  rationale: The directional form indicates movement/extension toward heaven. Singular
    'heaven' is standard idiomatic English here and preserves the vertical imagery.
- source_word: מַלְאֲכֵי אֱלֹהִים
  chosen: the angels of God
  alternatives:
  - God's angels
  - messengers of God
  lexicon: HALOT
  rationale: In this visionary context, supernatural beings are clearly intended,
    so 'angels of God' is preferable to the broader 'messengers.'
- source_word: עֹלִים וְיֹרְדִים
  chosen: were ascending and descending
  alternatives:
  - went up and came down
  - ascending and descending
  lexicon: HALOT
  rationale: The participles portray ongoing motion in the vision. The English progressive
    reflects the scene's vividness.
- source_word: בּוֹ
  chosen: on it
  alternatives:
  - by it
  - on him
  lexicon: HALOT
  rationale: The preposition with masculine singular suffix most naturally refers
    back to the stairway. 'On it' fits the imagery of movement along the structure.
    'On him' is grammatically possible only if referred to another antecedent, but
    the immediate context favors the stairway.
