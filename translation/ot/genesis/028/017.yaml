theological_decisions:
- issue: Rendering of אֱלֹהִים in a singular referent context
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: Although morphologically plural, אֱלֹהִים here clearly refers to the
    singular God of Jacob's vision and covenant context. Rendering it as singular
    is required by the immediate narrative and standard Hebrew usage.
- issue: Nuance of נוֹרָא in a sacred setting
  chosen_reading: awe-inspiring
  alternative_readings:
  - awesome
  - fearful
  rationale: The verse expresses holy fear before divine presence, not mere terror
    and not casual admiration. 'Awe-inspiring' preserves the theological tension of
    fear and reverence without resolving it into either extreme.
  doctrine_reference: Translation philosophy §3
