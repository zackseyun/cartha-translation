id: GEN.28.17
reference: Genesis 28:17
source:
  edition: WLC
  text: וַ/יִּירָא֙ וַ/יֹּאמַ֔ר מַה נּוֹרָ֖א הַ/מָּק֣וֹם הַ/זֶּ֑ה אֵ֣ין זֶ֗ה כִּ֚י
    אִם בֵּ֣ית אֱלֹהִ֔ים וְ/זֶ֖ה שַׁ֥עַר הַ/שָּׁמָֽיִם־־׃
translation:
  text: And he was afraid and said, “How awe-inspiring this place is! This is none
    other than the house of God, and this is the gate of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How fearful is this place!” The Hebrew term can express fear, dread,
      or reverent awe.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the gate of the heavens.” English commonly uses “heaven” here
      for the divine realm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירָא
  chosen: he was afraid
  alternatives:
  - he feared
  - he became afraid
  lexicon: HALOT
  rationale: From ירא in the waw-consecutive imperfect, narrating Jacob's reaction.
    'Was afraid' is natural modern English and preserves the emotional response without
    overinterpreting it as reverence alone.
- source_word: מַה נּוֹרָא
  chosen: How awe-inspiring
  alternatives:
  - How awesome
  - How fearful
  - How dreadful
  lexicon: HALOT
  rationale: נוֹרָא, from ירא, can denote that which inspires fear, awe, or reverence.
    'Awe-inspiring' preserves the sense of holy dread better than the colloquial 'awesome,'
    while avoiding the misleadingly negative 'dreadful.' The exclamatory מַה is captured
    by 'How ...'.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this place here
  lexicon: HALOT
  rationale: Straightforward rendering of the demonstrative phrase; idiomatic English
    does not require repeating the article structure.
- source_word: אֵין זֶה כִּי אִם
  chosen: This is none other than
  alternatives:
  - This is nothing but
  - This is only
  lexicon: HALOT
  rationale: This idiom marks emphatic restriction or identification. 'None other
    than' conveys solemn emphasis in natural English better than the potentially flattening
    'nothing but.'
- source_word: בֵּית אֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. 'House of God' preserves the
    formal, sacred tone and echoes later biblical temple/tabernacle language without
    implying a developed sanctuary already exists here.
- source_word: שַׁעַר הַשָּׁמָיִם
  chosen: the gate of heaven
  alternatives:
  - the gate of the heavens
  lexicon: HALOT
  rationale: שָׁמַיִם is commonly rendered 'heaven' in singular English when referring
    to the divine realm. 'Gate of heaven' is idiomatic and preserves the imagery of
    access between earthly and heavenly realms.
