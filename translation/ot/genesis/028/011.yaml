id: GEN.28.11
reference: Genesis 28:11
source:
  edition: WLC
  text: וַ/יִּפְגַּ֨ע בַּ/מָּק֜וֹם וַ/יָּ֤לֶן שָׁם֙ כִּי בָ֣א הַ/שֶּׁ֔מֶשׁ וַ/יִּקַּח֙
    מֵ/אַבְנֵ֣י הַ/מָּק֔וֹם וַ/יָּ֖שֶׂם מְרַֽאֲשֹׁתָ֑י/ו וַ/יִּשְׁכַּ֖ב בַּ/מָּק֥וֹם
    הַ/הֽוּא־׃
translation:
  text: He came to a certain place and spent the night there, because the sun had
    set. He took one of the stones of the place, put it under his head, and lay down
    in that place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the place' on first mention; rendered 'a certain place' for natural
      English while preserving that the location is narratively significant.
    reason: lexical_alternative
  - marker: b
    text: Or 'He took some of the stones of the place.' The Hebrew expression can
      be understood as partitive from a plural noun, though the context is commonly
      taken to refer to a single stone used as a headrest.
    reason: alternative_reading
  - marker: c
    text: '''Under his head'' renders a Hebrew term referring to the place of the
      head or a headrest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְגַּע
  chosen: came to
  alternatives:
  - reached
  - happened upon
  - encountered
  lexicon: HALOT
  rationale: The verb פגע can mean 'meet, encounter, reach.' In this travel context
    with בַמָּקוֹם, the sense is arriving at or reaching a location rather than a
    personal encounter. 'Came to' is natural English and preserves the narrative movement
    without overstating chance.
- source_word: בַּמָּקוֹם
  chosen: a certain place
  alternatives:
  - the place
  - a place
  lexicon: HALOT
  rationale: Although the Hebrew has the article ('the place'), the first mention
    is indefinite in English style. Because the location becomes significant in the
    following context, 'a certain place' preserves the markedness better than a bare
    'a place' while avoiding awkwardness.
- source_word: וַיָּלֶן
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: לון denotes staying overnight. 'Spent the night' is idiomatic modern
    English and fits the narrative better than the more formal 'lodged.'
- source_word: כִּי בָא הַשֶּׁמֶשׁ
  chosen: because the sun had set
  alternatives:
  - for the sun had gone down
  - because the sun came
  lexicon: HALOT
  rationale: The clause gives the reason for stopping. In context בוא with 'the sun'
    is an idiom for sunset. Pluperfect 'had set' fits the causal relation in English
    narrative.
- source_word: וַיִּקַּח מֵאַבְנֵי הַמָּקוֹם
  chosen: He took one of the stones of the place
  alternatives:
  - He took some of the stones of the place
  - He took from the stones of the place
  lexicon: HALOT
  rationale: The partitive מִן with plural 'stones' can be rendered either 'from the
    stones' or more idiomatically 'one of the stones.' Given the singular object implied
    by the following singular pronoun in English ('put it'), 'one of the stones' is
    the clearest rendering, though some understand a plural sense.
- source_word: מְרַאֲשֹׁתָיו
  chosen: under his head
  alternatives:
  - at his head
  - for his headrest
  - at the place of his head
  lexicon: HALOT
  rationale: This noun refers to the area of the head or headrest. English idiom favors
    'under his head' in this context, conveying the stone's function as support while
    remaining faithful to the sense.
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - lay
  - slept
  lexicon: HALOT
  rationale: '''Lay down'' captures the act of reclining to sleep. ''Slept'' would
    move beyond the immediate action, and bare ''lay'' is less natural in contemporary
    English.'
- source_word: בַּמָּקוֹם הַהוּא
  chosen: in that place
  alternatives:
  - there
  - in that same place
  lexicon: HALOT
  rationale: The repeated phrase highlights the location's significance. 'In that
    place' preserves the repetition better than simply 'there.'
