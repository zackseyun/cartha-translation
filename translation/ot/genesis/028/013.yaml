id: GEN.28.13
reference: Genesis 28:13
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה יְהוָ֜ה נִצָּ֣ב עָלָי/ו֮ וַ/יֹּאמַר֒ אֲנִ֣י יְהוָ֗ה אֱלֹהֵי֙ אַבְרָהָ֣ם
    אָבִ֔י/ךָ וֵ/אלֹהֵ֖י יִצְחָ֑ק הָ/אָ֗רֶץ אֲשֶׁ֤ר אַתָּה֙ שֹׁכֵ֣ב עָלֶ֔י/הָ לְ/ךָ֥
    אֶתְּנֶ֖/נָּה וּ/לְ/זַרְעֶֽ/ךָ׃
translation:
  text: And behold, the LORD was standing above it, and he said, “I am the LORD, the
    God of Abraham your father and the God of Isaac. The land on which you are lying
    I will give to you and to your offspring.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “beside him” / “above him,” if the pronoun refers to Jacob rather than
      to the stairway.
    reason: alternative_reading
  - marker: b
    text: Hebrew “your seed”; rendered “your offspring” to preserve the collective
      singular sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the discourse-marking force and vividness of the Hebrew particle
    rather than omitting it. 'Behold' is still understandable in modern English and
    suits the elevated narrative moment.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name, preserving the traditional
    small-caps convention in plain-text form as 'the LORD' rather than transliterating
    the Tetragrammaton.
- source_word: נִצָּב
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: The participle conveys a durative or stative sense in the vision report;
    'was standing' reflects that better than the simple past 'stood'.
- source_word: עָלָיו
  chosen: above it
  alternatives:
  - beside him
  - over him
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and most naturally refers
    back to the ladder/stairway in the immediate context, yielding 'above it.' Because
    the referent has been debated, an alternative is preserved in a footnote.
- source_word: אֱלֹהֵי אַבְרָהָם אָבִיךָ
  chosen: the God of Abraham your father
  alternatives:
  - the God of Abraham, your father
  - the God of your father Abraham
  lexicon: HALOT
  rationale: This follows the Hebrew construct chain straightforwardly. The phrase
    can be understood either as Abraham being called Jacob's father in the broader
    ancestral sense or as apposition ('your father, Abraham'); the chosen rendering
    stays close to the Hebrew wording without over-resolving the syntax.
- source_word: וֵאלֹהֵי יִצְחָק
  chosen: and the God of Isaac
  lexicon: HALOT
  rationale: Direct and formal rendering of the coordinated construct phrase.
- source_word: הָאָרֶץ
  chosen: The land
  alternatives:
  - The ground
  - The הארץ/land
  lexicon: HALOT
  rationale: In the patriarchal promise context, 'land' is the natural covenantal
    sense, not merely the physical ground beneath him.
- source_word: שֹׁכֵב עָלֶיהָ
  chosen: on which you are lying
  alternatives:
  - upon which you lie
  - where you are lying
  lexicon: HALOT
  rationale: The participle again suggests present ongoing action. 'On which you are
    lying' is natural English and preserves the spatial sense of עַל.
- source_word: לְךָ אֶתְּנֶנָּה
  chosen: I will give to you
  alternatives:
  - I am giving to you
  - I will give it to you
  lexicon: HALOT
  rationale: The imperfect with suffixed object in this promise context is best rendered
    as future. The object 'it' is implicit from 'the land' and need not be repeated
    in English.
- source_word: וּלְזַרְעֶךָ
  chosen: and to your offspring
  alternatives:
  - and to your seed
  - and to your descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זֶרַע better
    than ''descendants'' while remaining more natural in modern English than ''seed.'''
