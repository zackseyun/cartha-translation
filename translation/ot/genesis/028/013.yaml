theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of עָלָיו in the vision scene
  chosen_reading: above it
  alternative_readings:
  - beside him
  - above him
  rationale: The immediate antecedent in context is the stairway/ladder, so 'above
    it' is the most textually grounded reading. Because some interpreters take the
    suffix to refer to Jacob, the alternative is preserved in a footnote rather than
    silently excluded.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
