id: GEN.28.5
reference: Genesis 28:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יִצְחָק֙ אֶֽת יַעֲקֹ֔ב וַ/יֵּ֖לֶךְ פַּדֶּ֣נָֽ/ה אֲרָ֑ם אֶל לָבָ֤ן
    בֶּן בְּתוּאֵל֙ הָֽ/אֲרַמִּ֔י אֲחִ֣י רִבְקָ֔ה אֵ֥ם יַעֲקֹ֖ב וְ/עֵשָֽׂו־־־׃
translation:
  text: So Isaac sent Jacob away, and he went to Paddan-aram, to Laban son of Bethuel
    the Aramean, the brother of Rebekah, the mother of Jacob and Esau.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following older English tradition, 'the Syrian.' The Hebrew more specifically
      denotes an Aramean.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent ... away
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in this context means to send someone off. 'Sent ... away'
    captures both the act of sending and the departure implied by the narrative context
    better than the flatter 'sent.'
- source_word: וַיֵּלֶךְ
  chosen: he went
  alternatives:
  - and he went
  - and he traveled
  lexicon: HALOT
  rationale: הלך is the standard verb 'to go.' English smoothness allows omission
    of the repeated conjunction in the clause while preserving the sequential action.
- source_word: פַּדֶּנָה אֲרָם
  chosen: to Paddan-aram
  alternatives:
  - to Paddan Aram
  - toward Paddan-aram
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated rather than translated,
    in keeping with the translation philosophy. The directional suffix on פַּדֶּנָה
    is naturally represented by 'to.'
- source_word: בֶּן בְּתוּאֵל
  chosen: son of Bethuel
  lexicon: HALOT
  rationale: Standard filial construction; 'son of Bethuel' is the natural formal
    rendering.
- source_word: הָאֲרַמִּי
  chosen: the Aramean
  alternatives:
  - the Syrian
  lexicon: HALOT
  rationale: אֲרַמִּי refers to an Aramean. 'Syrian' reflects older English tradition
    but is less precise historically and ethnically than 'Aramean,' so the source-oriented
    rendering is preferred.
- source_word: אֲחִי רִבְקָה
  chosen: the brother of Rebekah
  alternatives:
  - Rebekah's brother
  lexicon: HALOT
  rationale: Either rendering is possible. 'The brother of Rebekah' stays slightly
    closer to the Hebrew construct chain while remaining natural English.
- source_word: אֵם יַעֲקֹב וְעֵשָׂו
  chosen: the mother of Jacob and Esau
  alternatives:
  - mother of Jacob and Esau
  lexicon: HALOT
  rationale: The phrase identifies Rebekah explicitly. Including 'the' yields idiomatic
    English apposition and preserves the explanatory force of the Hebrew.
