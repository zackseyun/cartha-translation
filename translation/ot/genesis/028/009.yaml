id: GEN.28.9
reference: Genesis 28:9
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ עֵשָׂ֖ו אֶל יִשְׁמָעֵ֑אל וַ/יִּקַּ֡ח אֶֽת מָחֲלַ֣ת בַּת יִשְׁמָעֵ֨אל
    בֶּן אַבְרָהָ֜ם אֲח֧וֹת נְבָי֛וֹת עַל נָשָׁ֖י/ו ל֥/וֹ לְ/אִשָּֽׁה־־׀־־־׃ס
translation:
  text: So Esau went to Ishmael and took Mahalath, the daughter of Ishmael son of
    Abraham, the sister of Nebaioth, as a wife for himself in addition to his wives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides his wives.' The Hebrew phrase indicates that Mahalath was taken
      as an additional wife, not as a replacement for the wives Esau already had.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went off
  lexicon: HALOT
  rationale: Wayyiqtol of הלך narrates the next action in sequence. Simple past 'went'
    best fits the narrative flow without adding emphasis not explicit in the Hebrew.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement toward a person; 'to' is the most natural
    English rendering here.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: לקח literally means 'took.' Because the verse later specifies 'as a wife,'
    retaining 'took' preserves the Hebrew idiom while allowing the marital sense to
    be made explicit by the following phrase.
- source_word: מָחֲלַת
  chosen: Mahalath
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בַּת יִשְׁמָעֵאל בֶּן אַבְרָהָם
  chosen: the daughter of Ishmael son of Abraham
  alternatives:
  - Ishmael, Abraham's son
  lexicon: HALOT
  rationale: The construct chain identifies Mahalath by lineage. 'Daughter of Ishmael
    son of Abraham' closely follows the Hebrew while remaining readable.
- source_word: אֲחוֹת נְבָיֹות
  chosen: the sister of Nebaioth
  lexicon: HALOT
  rationale: The appositional phrase further identifies Mahalath. 'Sister of Nebaioth'
    is a direct and clear rendering.
- source_word: עַל נָשָׁיו
  chosen: in addition to his wives
  alternatives:
  - besides his wives
  - over his wives
  lexicon: HALOT
  rationale: The preposition עַל here conveys addition rather than spatial relation.
    'In addition to his wives' communicates that Esau took Mahalath as another wife
    alongside those he already had.
- source_word: לוֹ לְאִשָּׁה
  chosen: as a wife for himself
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This idiom marks the purpose/result of taking her in marriage. 'As a
    wife for himself' preserves both the marital sense and the reflexive nuance of
    לוֹ.
