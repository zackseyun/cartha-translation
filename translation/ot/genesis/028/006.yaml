id: GEN.28.6
reference: Genesis 28:6
source:
  edition: WLC
  text: וַ/יַּ֣רְא עֵשָׂ֗ו כִּֽי בֵרַ֣ךְ יִצְחָק֮ אֶֽת יַעֲקֹב֒ וְ/שִׁלַּ֤ח אֹת/וֹ֙
    פַּדֶּ֣נָֽ/ה אֲרָ֔ם לָ/קַֽחַת ל֥/וֹ מִ/שָּׁ֖ם אִשָּׁ֑ה בְּ/בָרֲכ֣/וֹ אֹת֔/וֹ וַ/יְצַ֤ו
    עָלָי/ו֙ לֵ/אמֹ֔ר לֹֽא תִקַּ֥ח אִשָּׁ֖ה מִ/בְּנ֥וֹת כְּנָֽעַן־־־־׃
translation:
  text: Now Esau saw that Isaac had blessed Jacob and sent him to Paddan-aram to take
    a wife for himself from there, and that when he blessed him, he commanded him,
    saying, “You shall not take a wife from the daughters of Canaan.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Canaanite women.” The Hebrew reads literally “from the daughters
      of Canaan.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: Now Esau saw
  alternatives:
  - And Esau saw
  - Esau saw
  lexicon: HALOT
  rationale: Wayyiqtol of ראה advances the narrative. 'Now' captures the discourse
    shift naturally in English while preserving the sequential sense.
- source_word: בֵרַךְ
  chosen: had blessed
  alternatives:
  - blessed
  lexicon: HALOT
  rationale: The blessing precedes Esau's seeing, so English past perfect clarifies
    the relative time without adding content.
- source_word: וְשִׁלַּח אֹתוֹ
  chosen: and sent him
  alternatives:
  - and had sent him
  lexicon: HALOT
  rationale: Coordinates with 'had blessed' as part of what Esau perceived. Simple
    English coordination is clear and idiomatic.
- source_word: פַּדֶּנָה אֲרָם
  chosen: to Paddan-aram
  alternatives:
  - to Paddan Aram
  lexicon: HALOT
  rationale: Place name is transliterated per translation philosophy. Hyphenated conventional
    English form improves readability.
- source_word: לָקַחַת לוֹ מִשָּׁם אִשָּׁה
  chosen: to take a wife for himself from there
  alternatives:
  - to get a wife from there
  - to take from there a wife for himself
  lexicon: HALOT
  rationale: Retains the infinitival purpose clause and the reflexive nuance of לוֹ.
    'Take a wife' is standard idiomatic English for marriage contexts.
- source_word: בְּבָרֲכוֹ אֹתוֹ
  chosen: when he blessed him
  alternatives:
  - in blessing him
  - as he blessed him
  lexicon: HALOT
  rationale: The prefixed ב marks the circumstance/time of the command. 'When he blessed
    him' is natural and preserves the temporal relation.
- source_word: וַיְצַו עָלָיו לֵאמֹר
  chosen: he commanded him, saying
  alternatives:
  - he charged him, saying
  - he instructed him, saying
  lexicon: HALOT
  rationale: צוה commonly means 'command.' The idiom עַל with the person is well represented
    by direct-object English 'commanded him.' 'Saying' preserves the Hebrew quotative
    structure.
- source_word: לֹא תִקַּח
  chosen: You shall not take
  alternatives:
  - Do not take
  - You must not take
  lexicon: HALOT
  rationale: Second masculine singular imperfect in direct speech can be rendered
    as a prohibition. 'You shall not take' preserves the formal force of the paternal
    command in this narrative setting.
- source_word: מִבְּנוֹת כְּנָעַן
  chosen: from the daughters of Canaan
  alternatives:
  - from Canaanite women
  - from the women of Canaan
  lexicon: HALOT
  rationale: More formally reflects the Hebrew expression while remaining understandable.
    It refers to women belonging to the people/land of Canaan.
