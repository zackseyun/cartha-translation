id: GEN.28.22
reference: Genesis 28:22
source:
  edition: WLC
  text: וְ/הָ/אֶ֣בֶן הַ/זֹּ֗את אֲשֶׁר שַׂ֨מְתִּי֙ מַצֵּבָ֔ה יִהְיֶ֖ה בֵּ֣ית אֱלֹהִ֑ים
    וְ/כֹל֙ אֲשֶׁ֣ר תִּתֶּן לִ֔/י עַשֵּׂ֖ר אֲעַשְּׂרֶ֥/נּוּ לָֽ/ךְ־־׃
translation:
  text: And this stone, which I have set up as a pillar, will be God’s house, and
    of all that you give me I will surely give a tenth to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will surely tithe it to you.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'will be a house of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצֵּבָה
  chosen: pillar
  alternatives:
  - memorial stone
  - standing stone
  lexicon: HALOT
  rationale: Refers to an erected stone monument or marker. 'Pillar' is concise and
    idiomatic, while preserving the concrete image better than the more interpretive
    'memorial stone.'
- source_word: יִהְיֶה בֵּית אֱלֹהִים
  chosen: will be God’s house
  alternatives:
  - will be a house of God
  - will become God’s house
  lexicon: HALOT
  rationale: The construct phrase בֵּית אֱלֹהִים naturally means 'house of God.' 'God’s
    house' is smoother modern English. No article on בֵּית does not require the indefinite
    'a' in English here.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  lexicon: HALOT
  rationale: In Jacob’s vow the referent is the true God encountered in the preceding
    context, so singular 'God' is required rather than a generic 'god.'
- source_word: תִּתֶּן לִי
  chosen: you give me
  alternatives:
  - you may give me
  - you grant me
  lexicon: HALOT
  rationale: Simple future/imperfect in the context of a vow. 'You give me' is the
    most direct rendering and fits the conditional sense established in the larger
    passage.
- source_word: עַשֵּׂר אֲעַשְּׂרֶנּוּ
  chosen: I will surely give a tenth
  alternatives:
  - I will tithe it
  - I will surely tithe it
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'I will
    surely give a tenth' preserves the emphasis and is more transparent for modern
    readers than the ecclesiastical verb 'tithe,' though the sense is the same.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Directly marks the recipient of the vowed tenth. 'To you' is the most
    straightforward rendering in English.
- source_word: הָאֶבֶן הַזֹּאת אֲשֶׁר שַׂמְתִּי
  chosen: this stone, which I have set up
  alternatives:
  - this stone that I have placed
  - this stone which I have set
  lexicon: HALOT
  rationale: '''Set up'' fits the context of erecting the stone as a cultic marker
    and works naturally with ''as a pillar.'''
