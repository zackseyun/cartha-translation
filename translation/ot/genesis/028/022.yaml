theological_decisions:
- issue: Nature of Jacob’s vow concerning the stone
  chosen_reading: The stone is rendered as becoming 'God’s house' in the sense of
    a sacred site/marker, without importing later temple theology.
  alternative_readings:
  - the stone itself becomes a shrine
  - this anticipates the later temple in a direct prophetic sense
  rationale: The Hebrew states that the stone Jacob set up 'will be God’s house.'
    The translation preserves the wording while avoiding interpretive expansion beyond
    the immediate context of a consecrated place associated with divine encounter.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Rendering of the tithe expression
  chosen_reading: The vow is translated as a promise to give a tenth to God, preserving
    the emphatic force without imposing later legal or ecclesiastical structures.
  alternative_readings:
  - formal cultic 'tithe' terminology as institutional practice
  rationale: The text expresses a vowed tenth from what God gives Jacob. The translation
    keeps the theological act of dedicating a tenth while not reading later Mosaic
    or church practice back into Genesis.
  doctrine_reference: 'Translation philosophy #1'
