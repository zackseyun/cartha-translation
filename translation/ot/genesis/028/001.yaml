id: GEN.28.1
reference: Genesis 28:1
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א יִצְחָ֛ק אֶֽל יַעֲקֹ֖ב וַ/יְבָ֣רֶךְ אֹת֑/וֹ וַ/יְצַוֵּ֨/הוּ֙
    וַ/יֹּ֣אמֶר ל֔/וֹ לֹֽא תִקַּ֥ח אִשָּׁ֖ה מִ/בְּנ֥וֹת כְּנָֽעַן־־׃
translation:
  text: Then Isaac called Jacob and blessed him and commanded him, saying, “You shall
    not take a wife from the daughters of Canaan.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the daughters of Canaan,'' an idiom meaning Canaanite women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with אֶל plus a person commonly means to call to or summon
    someone. 'Called' is natural modern English and fits the narrative sequence without
    overstating formality.
- source_word: וַיְבָרֶךְ
  chosen: blessed
  lexicon: HALOT
  rationale: ברך is the standard verb 'bless.' No contextual reason warrants expansion
    or paraphrase.
- source_word: וַיְצַוֵּהוּ
  chosen: commanded him
  alternatives:
  - charged him
  - instructed him
  lexicon: HALOT
  rationale: צוה denotes giving a command or charge. 'Commanded him' best preserves
    the father's authoritative instruction in this context.
- source_word: וַיֹּאמֶר לוֹ
  chosen: saying
  alternatives:
  - and said to him
  lexicon: HALOT
  rationale: Rendering with 'saying' avoids awkward repetition in English after a
    chain of wayyiqtol verbs while still representing the introduction to direct speech.
- source_word: לֹא תִקַּח
  chosen: You shall not take
  alternatives:
  - Do not take
  - You must not take
  lexicon: HALOT
  rationale: The imperfect under a negative in direct command is well represented
    by 'You shall not' in elevated but readable English. It preserves the force of
    prohibition without sounding colloquial.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In marriage contexts אִשָּׁה often means 'wife' rather than merely 'woman.'
    Since the prohibition concerns marriage, 'a wife' is the most precise rendering.
- source_word: מִבְּנוֹת כְּנָעַן
  chosen: from the daughters of Canaan
  alternatives:
  - from Canaanite women
  lexicon: HALOT
  rationale: The Hebrew is literally 'from the daughters of Canaan.' This idiom refers
    to women of the Canaanite population. The more literal rendering is retained because
    it is clear in English and preserves the source texture.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw in narrative sequence is idiomatically rendered 'Then'
    here to produce readable modern English while preserving the temporal progression.
