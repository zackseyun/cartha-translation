id: GEN.28.16
reference: Genesis 28:16
source:
  edition: WLC
  text: וַ/יִּיקַ֣ץ יַעֲקֹב֮ מִ/שְּׁנָת/וֹ֒ וַ/יֹּ֕אמֶר אָכֵן֙ יֵ֣שׁ יְהוָ֔ה בַּ/מָּק֖וֹם
    הַ/זֶּ֑ה וְ/אָנֹכִ֖י לֹ֥א יָדָֽעְתִּי׃
translation:
  text: Then Jacob awoke from his sleep and said, “Surely the LORD is in this place,
    and I did not know it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Surely the LORD is in this place.'' The statement expresses Jacob''s
      sudden realization of the LORD''s presence there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיקַץ
  chosen: awoke
  alternatives:
  - woke up
  - was awakened
  lexicon: HALOT
  rationale: The verb means to awake from sleep. 'Awoke' is natural, concise English
    and fits the narrative style better than the more colloquial 'woke up.'
- source_word: מִשְּׁנָתוֹ
  chosen: from his sleep
  alternatives:
  - from his slumber
  lexicon: HALOT
  rationale: The noun refers to sleep. 'From his sleep' is the most straightforward
    idiomatic rendering in modern English.
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - indeed
  - truly
  lexicon: HALOT
  rationale: The particle marks emphatic realization or affirmation. 'Surely' captures
    Jacob's startled recognition in idiomatic English.
- source_word: יֵשׁ
  chosen: is
  alternatives:
  - is present
  - there is
  lexicon: HALOT
  rationale: The existential particle indicates presence/existence. In English, 'the
    LORD is in this place' is more natural than 'there is the LORD in this place,'
    while preserving the sense of real presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX-influenced
    pattern.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - at this place
  - in this location
  lexicon: HALOT
  rationale: The phrase denotes the specific location where Jacob slept and received
    the dream. 'In this place' is the most natural and traditional English rendering.
- source_word: וְאָנֹכִי
  chosen: and I
  alternatives:
  - but I
  - while I
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: Jacob contrasts the LORD''s presence
    with his own prior ignorance. English can preserve this adequately with ''and
    I'' in context.'
- source_word: לֹא יָדָעְתִּי
  chosen: I did not know it
  alternatives:
  - I did not know
  - I was unaware
  lexicon: HALOT
  rationale: The perfect verb expresses Jacob's prior lack of awareness. Adding 'it'
    makes the English complete and clearly refers back to the LORD's presence in that
    place.
