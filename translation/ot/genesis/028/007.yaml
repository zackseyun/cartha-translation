id: GEN.28.7
reference: Genesis 28:7
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע יַעֲקֹ֔ב אֶל אָבִ֖י/ו וְ/אֶל אִמּ֑/וֹ וַ/יֵּ֖לֶךְ פַּדֶּ֥נָֽ/ה
    אֲרָֽם־־׃
translation:
  text: and that Jacob listened to his father and his mother, and went to Paddan-aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obeyed his father and his mother.' The Hebrew verb can mean both hearing
      and heeding in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - obeyed
  - heard
  lexicon: HALOT
  rationale: The verb שׁמע with אֶל commonly carries the sense of listening to or
    heeding someone. In this context, Jacob is responding to parental instruction,
    so 'listened to' preserves both the auditory and obedient nuance without overstating
    with 'obeyed' as the only sense.
- source_word: אֶל אָבִיו וְאֶל אִמּוֹ
  chosen: to his father and his mother
  alternatives:
  - his father and mother
  lexicon: HALOT
  rationale: The repeated preposition אֶל before each noun is naturally represented
    in English as a single coordinated phrase. Retaining both possessives reflects
    the Hebrew suffixes and keeps the parental pair explicit.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - departed
  lexicon: HALOT
  rationale: הלך is the standard verb 'go/walk.' 'Went' is the most direct and natural
    rendering here, avoiding unnecessary expansion.
- source_word: פַּדֶּנָה אֲרָם
  chosen: to Paddan-aram
  alternatives:
  - to Paddan Aram
  - to the plain of Aram
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    in keeping with the translation philosophy for names. The directional ending on
    פַּדֶּנָה is represented by 'to.' The hyphenated conventional English form 'Paddan-aram'
    clearly signals a proper place name.
- source_word: וַ
  chosen: and
  alternatives:
  - now
  lexicon: HALOT
  rationale: The prefixed waw here continues the narrative sequence. In English, 'and'
    best preserves the connective force, especially since this verse is syntactically
    dependent on the preceding statement.
