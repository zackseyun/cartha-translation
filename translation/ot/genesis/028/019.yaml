id: GEN.28.19
reference: Genesis 28:19
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א אֶת שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא בֵּֽית אֵ֑ל וְ/אוּלָ֛ם ל֥וּז שֵׁם
    הָ/עִ֖יר לָ/רִאשֹׁנָֽה־־־־׃
translation:
  text: And he called the name of that place Bethel, but formerly the name of the
    city was Luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bethel means 'house of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא with 'name' as object commonly means to call/name.
    'He called' preserves the Hebrew idiom, while the following object clarifies the
    naming action.
- source_word: אֶת שֵׁם
  chosen: the name
  alternatives:
  - '— (implicit in English: named)'
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'called the name of'; retaining 'the name'
    keeps the formal structure without becoming unnatural in English.
- source_word: הַמָּקוֹם הַהוּא
  chosen: that place
  alternatives:
  - that site
  - the place
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place.' 'That place' reflects the demonstrative
    and reads naturally.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - House of God
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated
    in the main text. 'Bethel' is the standard English transliteration of the place
    name, though its meaning is 'house of God.'
- source_word: וְאוּלָם
  chosen: but
  alternatives:
  - however
  - nevertheless
  lexicon: HALOT
  rationale: The particle marks a contrastive clarification. 'But' is concise and
    natural in modern English.
- source_word: לוּז
  chosen: Luz
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard convention.
- source_word: שֵׁם הָעִיר
  chosen: the name of the city
  alternatives:
  - the city's name
  lexicon: HALOT
  rationale: A direct rendering preserves the Hebrew genitival structure while remaining
    clear.
- source_word: לָרִאשֹׁנָה
  chosen: formerly
  alternatives:
  - at first
  - previously
  - before
  lexicon: HALOT
  rationale: In context this adverb refers to the city's earlier name. 'Formerly'
    is idiomatic and captures the temporal sense cleanly.
