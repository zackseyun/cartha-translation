id: GEN.28.4
reference: Genesis 28:4
source:
  edition: WLC
  text: וְ/יִֽתֶּן לְ/ךָ֙ אֶת בִּרְכַּ֣ת אַבְרָהָ֔ם לְ/ךָ֖ וּ/לְ/זַרְעֲ/ךָ֣ אִתָּ֑/ךְ
    לְ/רִשְׁתְּ/ךָ֙ אֶת אֶ֣רֶץ מְגֻרֶ֔י/ךָ אֲשֶׁר נָתַ֥ן אֱלֹהִ֖ים לְ/אַבְרָהָֽם־־־־׃
translation:
  text: May he give you the blessing of Abraham—to you and to your offspring with
    you—so that you may possess the land of your sojournings, which God gave to Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your seed with you"; the Hebrew noun is singular in form but collective
      in sense.
    reason: lexical_alternative
  - marker: b
    text: Or "inherit the land of your sojournings."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתֶּן
  chosen: May he give
  alternatives:
  - and may he give
  - that he may give
  lexicon: HALOT
  rationale: 'Jussive form in a blessing context is best rendered as a wish/prayer:
    ''May he give.'' The prefixed conjunction is not naturally carried into English
    here apart from the blessing flow.'
- source_word: בִּרְכַּת אַבְרָהָם
  chosen: the blessing of Abraham
  alternatives:
  - Abraham's blessing
  lexicon: HALOT
  rationale: Construct chain is rendered transparently. 'The blessing of Abraham'
    preserves the covenantal resonance and echoes the patriarchal promise tradition.
- source_word: לְךָ וּלְזַרְעֲךָ אִתָּךְ
  chosen: to you and to your offspring with you
  alternatives:
  - to you and your seed with you
  - to you and to your descendants with you
  lexicon: HALOT
  rationale: זֶרַע can be 'seed/offspring.' 'Offspring' is natural modern English
    while preserving collective singular force better than 'descendants.' 'With you'
    is retained rather than smoothed away because it is present in the Hebrew and
    emphasizes Jacob's line in relation to him.
- source_word: זַרְעֲךָ
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: '''Offspring'' balances formal accuracy and readability. ''Seed'' is
    more literal but less idiomatic in contemporary English outside explicitly theological
    contexts.'
- source_word: לְרִשְׁתְּךָ
  chosen: so that you may possess
  alternatives:
  - for you to inherit
  - that you may take possession of
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses purpose/result. Because the object
    is land, 'possess' is idiomatic and covenantally appropriate; 'inherit' is possible,
    but the immediate sense is taking/holding possession.
- source_word: אֶרֶץ מְגֻרֶיךָ
  chosen: the land of your sojournings
  alternatives:
  - the land of your wanderings
  - the land where you sojourn
  - the land of your temporary residence
  lexicon: HALOT
  rationale: מָגוּר refers to sojourning/resident-alien dwelling. 'Sojournings' preserves
    the patriarchal motif of living as a resident alien in the promised land better
    than the vaguer 'wanderings.'
- source_word: אֲשֶׁר נָתַן אֱלֹהִים לְאַבְרָהָם
  chosen: which God gave to Abraham
  alternatives:
  - that God gave to Abraham
  lexicon: HALOT
  rationale: Straightforward relative clause. 'God' reflects אֱלֹהִים here; no special
    covenant-name issue is present in this verse.
