theological_decisions:
- issue: Covenantal nuance of Abrahamic promise language
  chosen_reading: Retain explicit wording 'the blessing of Abraham' and land-possession
    language without paraphrasing into abstract prosperity.
  alternative_readings:
  - Render more dynamically as 'the blessing promised to Abraham'
  - Render לְרִשְׁתְּךָ as 'inherit' to foreground covenant inheritance
  rationale: The verse is part of Isaac's blessing over Jacob and directly invokes
    the Abrahamic covenant. The translation preserves that theological linkage while
    staying close to the Hebrew wording. 'Possess' was chosen over 'inherit' because
    the verbal form here most directly expresses coming into possession, though inheritance
    remains an interpretive nuance.
  doctrine_reference: Translation philosophy §§1, 3, 5
