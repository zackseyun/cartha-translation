theological_decisions:
- issue: Meaning of the patriarchal blessing formula with ברך in Niphal
  chosen_reading: 'passive: ''all the families of the earth will be blessed'''
  alternative_readings:
  - 'reflexive/middle: ''will bless themselves'''
  rationale: The Hebrew form permits discussion, but the passive rendering is the
    most straightforward in this covenant-promise context and aligns with the recurring
    patriarchal formula. The alternative is worth preserving because it affects how
    directly the verse speaks of mediated blessing.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in the main text and preserve the alternative in a footnote where ambiguity
    is genuine.
