id: GEN.28.14
reference: Genesis 28:14
source:
  edition: WLC
  text: וְ/הָיָ֤ה זַרְעֲ/ךָ֙ כַּ/עֲפַ֣ר הָ/אָ֔רֶץ וּ/פָרַצְתָּ֛ יָ֥מָּ/ה וָ/קֵ֖דְמָ/ה
    וְ/צָפֹ֣נָ/ה וָ/נֶ֑גְבָּ/ה וְ/נִבְרֲכ֥וּ בְ/ךָ֛ כָּל מִשְׁפְּחֹ֥ת הָ/אֲדָמָ֖ה
    וּ/בְ/זַרְעֶֽ/ךָ־׃
translation:
  text: Your offspring will be like the dust of the earth, and you will spread out
    to the west and to the east and to the north and to the south; and in you and
    in your offspring all the families of the earth will be blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the families of the earth will bless themselves in you and in your
      offspring.' The Hebrew verb may also be understood with a reflexive or middle
      sense.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: will be
  alternatives:
  - shall be
  - will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this promise context functions
    futurally. 'Will be' is natural modern English and fits the predictive force.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed literally or offspring/descendants collectively.
    'Offspring' preserves the collective singular and the Abrahamic/Jacob promise
    language better than the more archaic 'seed,' while avoiding the overly interpretive
    plural 'descendants'.
- source_word: כַּעֲפַר הָאָרֶץ
  chosen: like the dust of the earth
  alternatives:
  - as the dust of the land
  - like the dust of the ground
  lexicon: HALOT
  rationale: This is a simile for innumerability. 'Earth' is the most idiomatic rendering
    here and matches the broader patriarchal promise formula in English Bible usage.
- source_word: וּפָרַצְתָּ
  chosen: you will spread out
  alternatives:
  - you will break forth
  - you will burst forth
  - you will spread abroad
  lexicon: HALOT
  rationale: The verb פרץ literally carries the sense of breaking out/bursting forth.
    In this geographic expansion context, 'spread out' communicates territorial multiplication
    clearly in modern English without losing the image of expansion.
- source_word: יָמָּה וָקֵדְמָה וְצָפֹנָה וָנֶגְבָּה
  chosen: to the west and to the east and to the north and to the south
  alternatives:
  - westward and eastward and northward and southward
  lexicon: HALOT
  rationale: Directional he endings indicate movement/direction. 'To the west ...'
    is clear, readable modern English. נֶגֶב can denote the Negeb/southland, but in
    this directional series 'south' is plainly intended.
- source_word: וְנִבְרֲכוּ
  chosen: will be blessed
  alternatives:
  - will bless themselves
  - will find blessing
  lexicon: HALOT
  rationale: The Niphal of ברך in the patriarchal promises is traditionally and plausibly
    rendered as passive, 'will be blessed.' A reflexive nuance has been argued in
    some contexts, but the passive best fits the promise formula and standard sense
    here.
- source_word: בְךָ
  chosen: in you
  alternatives:
  - by you
  - through you
  lexicon: HALOT
  rationale: The preposition ב is retained as 'in' to stay close to the Hebrew promise
    formula. 'Through you' is interpretive and could be inferred, but 'in you' preserves
    the wording while remaining intelligible.
- source_word: כָּל מִשְׁפְּחֹת הָאֲדָמָה
  chosen: all the families of the earth
  alternatives:
  - all the clans of the ground
  - all the families of the land
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת refers to family groups/clans. 'Families' is the most natural
    English here. אֲדָמָה can mean ground/land, but in this universal blessing formula
    'earth' best conveys the scope.
- source_word: וּבְזַרְעֶךָ
  chosen: and in your offspring
  alternatives:
  - and through your offspring
  - and in your seed
  lexicon: HALOT
  rationale: The repeated ב preposition is preserved for formal transparency, and
    'offspring' again keeps the collective singular. This also leaves open both immediate
    and broader canonical dimensions without overtranslating.
