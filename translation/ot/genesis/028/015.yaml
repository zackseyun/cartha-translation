id: GEN.28.15
reference: Genesis 28:15
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה אָנֹכִ֜י עִמָּ֗/ךְ וּ/שְׁמַרְתִּ֨י/ךָ֙ בְּ/כֹ֣ל אֲשֶׁר תֵּלֵ֔ךְ
    וַ/הֲשִׁ֣בֹתִ֔י/ךָ אֶל הָ/אֲדָמָ֖ה הַ/זֹּ֑את כִּ֚י לֹ֣א אֶֽעֱזָבְ/ךָ֔ עַ֚ד אֲשֶׁ֣ר
    אִם עָשִׂ֔יתִי אֵ֥ת אֲשֶׁר דִּבַּ֖רְתִּי לָֽ/ךְ־־־־׃
translation:
  text: And behold, I am with you, and I will keep you wherever you go, and I will
    bring you back to this land. For I will not leave you until I have done what I
    have spoken to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will watch over you' for 'I will keep you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will not forsake you.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'what I have spoken to you'; some translations interpret this as
      'what I have promised you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the discourse-marking force and vividness of the Hebrew particle
    rather than omitting it. 'Behold' is slightly formal but still transparent and
    fitting in divine speech.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English normally conveys this
    adequately with simple 'I' in this context; overtranslating as 'I myself' would
    sound heavier than the Hebrew requires.
- source_word: עִמָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Standard rendering of the preposition with pronominal suffix; covenant-presence
    language is preserved straightforwardly.
- source_word: וּשְׁמַרְתִּיךָ
  chosen: I will keep you
  alternatives:
  - I will watch over you
  - I will guard you
  lexicon: HALOT
  rationale: שׁמר commonly carries the sense of keeping, guarding, or watching over.
    'Keep you' is concise and preserves both protective and covenantal nuance; alternatives
    are possible but slightly more interpretive.
- source_word: בְּכֹל אֲשֶׁר תֵּלֵךְ
  chosen: wherever you go
  alternatives:
  - in all that you go
  - everywhere you go
  lexicon: HALOT
  rationale: An idiomatic English rendering of the Hebrew expression meaning in every
    place or circumstance of Jacob's going. 'Wherever you go' best captures the sense
    in natural English.
- source_word: וַהֲשִׁבֹתִיךָ
  chosen: I will bring you back
  alternatives:
  - I will return you
  - I will cause you to return
  lexicon: HALOT
  rationale: Hiphil of שוב is causative. 'Bring you back' is natural English and accurately
    reflects the causative force better than the wooden 'cause you to return.'
- source_word: אֶל הָאֲדָמָה הַזֹּאת
  chosen: to this land
  alternatives:
  - to this ground
  - to this soil
  lexicon: HALOT
  rationale: Although אֲדָמָה often means 'ground/soil,' in patriarchal promise contexts
    it refers to the promised territory. 'Land' best fits the covenantal-geographical
    sense here.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or assurance for the preceding promise. 'For' preserves
    the explanatory connection cleanly.
- source_word: לֹא אֶעֱזָבְךָ
  chosen: I will not leave you
  alternatives:
  - I will not forsake you
  - I will not abandon you
  lexicon: HALOT
  rationale: עזב can mean leave, forsake, or abandon. 'Leave' is the broadest and
    most natural here, while still preserving the promise of divine presence. 'Forsake'
    is traditional but less contemporary.
- source_word: עַד אֲשֶׁר אִם
  chosen: until
  alternatives:
  - until indeed
  - until when
  lexicon: HALOT
  rationale: The combination functions idiomatically to mark the terminus of the promise.
    English 'until' captures the sense without reproducing Hebrew particles awkwardly.
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I do
  - I accomplish
  lexicon: HALOT
  rationale: 'Perfect after עַד is naturally rendered in English with a future-perfect
    sense: ''until I have done.'' This reflects the action''s completion relative
    to the future point.'
- source_word: אֵת אֲשֶׁר דִּבַּרְתִּי לָךְ
  chosen: what I have spoken to you
  alternatives:
  - what I have promised you
  - that which I have said to you
  lexicon: HALOT
  rationale: The Hebrew verb is 'spoken,' not explicitly 'promised.' Since the speech
    contains promises, 'promised' is interpretive; 'spoken to you' stays closer to
    the source while remaining clear.
