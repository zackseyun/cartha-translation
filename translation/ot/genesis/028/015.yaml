theological_decisions:
- issue: Covenantal presence and protection language
  chosen_reading: Render the promise in straightforward terms without heightening
    or narrowing its theological scope beyond the text.
  alternative_readings:
  - Use more traditional 'forsake' language to echo later biblical citations
  - Render more dynamically as 'watch over' and 'bring home'
  rationale: The verse presents God's personal presence, protection, return, and faithfulness
    to fulfill his word to Jacob. The translation preserves these themes without importing
    later doctrinal formulations or flattening the covenantal resonance.
  doctrine_reference: Translation philosophy §§1, 3, 6
