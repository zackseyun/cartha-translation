id: GEN.28.10
reference: Genesis 28:10
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א יַעֲקֹ֖ב מִ/בְּאֵ֣ר שָׁ֑בַע וַ/יֵּ֖לֶךְ חָרָֽנָ/ה׃
translation:
  text: Jacob departed from Beersheba and went toward Haran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to/toward Haran,' with a directional ending on 'Haran.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: departed
  alternatives:
  - went out
  - left
  lexicon: HALOT
  rationale: From יצא, denoting going out/departing from a place. 'Departed' is natural
    English and preserves the sense of leaving a location without unnecessary stiffness.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Standard English transliteration of the personal name יעקב, in keeping
    with the policy to transliterate names.
- source_word: מִבְּאֵר שָׁבַע
  chosen: from Beersheba
  alternatives:
  - from Beer-sheba
  rationale: The preposition מִן marks source/origin, and בְּאֵר שָׁבַע is the place
    name Beersheba. The closed spelling 'Beersheba' is standard in modern English
    Bible usage.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: HALOT
  rationale: הלך is the common verb 'to go/walk.' 'Went' is the most direct rendering;
    more interpretive options like 'journeyed' add nuance not explicit in the Hebrew.
- source_word: חָרָנָה
  chosen: toward Haran
  alternatives:
  - to Haran
  rationale: The directional he (locale/direction suffix) indicates motion toward
    a place. 'Toward Haran' preserves that directional nuance slightly more explicitly
    than simple 'to Haran,' while remaining natural English.
