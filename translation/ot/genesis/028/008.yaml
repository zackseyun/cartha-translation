id: GEN.28.8
reference: Genesis 28:8
source:
  edition: WLC
  text: וַ/יַּ֣רְא עֵשָׂ֔ו כִּ֥י רָע֖וֹת בְּנ֣וֹת כְּנָ֑עַן בְּ/עֵינֵ֖י יִצְחָ֥ק אָבִֽי/ו׃
translation:
  text: And Esau saw that the daughters of Canaan were displeasing in the eyes of
    Isaac his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were bad in the eyes of Isaac his father.' The Hebrew adjective can
      mean 'bad' or 'evil,' but here likely refers to Isaac's unfavorable view of
      the Canaanite women as marriage partners.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: And ... saw
  alternatives:
  - Then ... saw
  - So ... saw
  - realized
  lexicon: HALOT
  rationale: 'The waw-consecutive with ראה advances the narrative: ''and he saw.''
    ''Realized'' captures the sense inferentially, but the Hebrew verb is the ordinary
    ''saw,'' and the context allows English readers to infer understanding from perception.'
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Esau perceived, not a causal
    clause. 'That' best fits English after 'saw'.
- source_word: רָעוֹת
  chosen: were displeasing
  alternatives:
  - were evil
  - were bad
  - were unacceptable
  lexicon: HALOT
  rationale: The adjective רָעוֹת literally means 'bad/evil,' but in this relational
    context with 'in the eyes of' it denotes being viewed unfavorably. 'Were displeasing'
    communicates the idiomatic sense in natural English without overstating moral
    evil.
- source_word: בְּנוֹת כְּנָעַן
  chosen: the daughters of Canaan
  alternatives:
  - the women of Canaan
  - the daughters of the Canaanites
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew expression and its familial/ethnic
    framing. 'Women of Canaan' is smoother but less literal; 'daughters of the Canaanites'
    is interpretive since the Hebrew has the place-name 'Canaan'.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - to
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for evaluation or regard. 'In the eyes
    of' preserves the idiom transparently in understandable English.
- source_word: יִצְחָק אָבִיו
  chosen: Isaac his father
  alternatives:
  - his father Isaac
  rationale: Both are natural English. 'Isaac his father' follows the Hebrew order
    more closely while remaining readable.
