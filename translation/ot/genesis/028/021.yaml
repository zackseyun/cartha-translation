theological_decisions:
- issue: Whether Jacob's statement implies a conditional acceptance of the LORD ('if... then the LORD will be my God') or simply a vow acknowledging him
  chosen_reading: Retain the conditional/result force in English without softening it into an unconditional declaration.
  alternative_readings:
  - 'Render as an unconditional affirmation: ''and the LORD will be my God'' without emphasizing the conditional sequence'
  rationale: The Hebrew sequence continues Jacob's vow from the preceding verses and naturally reads as the apodosis of a condition. The translation should preserve that tension rather than resolve it into a stronger theological statement than the text itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
