id: GEN.28.21
reference: Genesis 28:21
source:
  edition: WLC
  text: וְ/שַׁבְתִּ֥י בְ/שָׁל֖וֹם אֶל בֵּ֣ית אָבִ֑/י וְ/הָיָ֧ה יְהוָ֛ה לִ֖/י לֵ/אלֹהִֽים־׃
translation:
  text: and I return in peace to my father's house, and Yahweh will be my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I come back safely to my father's house.' The Hebrew phrase 'in peace' can also emphasize safe return or well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתִּי
  chosen: and I return
  alternatives:
  - and I come back
  - and I have returned
  lexicon: HALOT
  rationale: From שוב, 'to return.' In the conditional sequence of Jacob's vow (continuing from the previous verse), English present 'return' after 'if'/'and' idiomatically conveys the future-oriented condition better than a wooden past/perfect form, while preserving the sense of personal return.
- source_word: בְשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - whole
  - well
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, well-being, and safety. 'In peace' is the most direct rendering and preserves the covenantal fullness of the Hebrew better than the narrower 'safely,' though safety is included in the sense.
- source_word: אֶל בֵּית אָבִי
  chosen: to my father's house
  alternatives:
  - to the house of my father
  - to my ancestral home
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'My father's house' is natural English and preserves the familial-household sense without unnecessary archaism.
- source_word: וְהָיָה
  chosen: then ... will be
  alternatives:
  - and ... shall be
  - and ... becomes
  lexicon: HALOT
  rationale: היה here introduces the result/apodosis of the vow. Rendering with 'then ... will be' makes the conditional relationship explicit in English, even though 'then' is not a separate Hebrew word; it is warranted by the syntax and improves readability.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִי
  chosen: my
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The Hebrew literally has 'to me,' but in the predicate expression 'will be to me God,' idiomatic English is 'will be my God.' This preserves the relational force without wooden phrasing.
- source_word: לֵאלֹהִים
  chosen: God
  alternatives:
  - for God
  - as God
  lexicon: HALOT
  rationale: In the expression 'YHWH will be my God,' אֱלֹהִים functions as the predicate noun denoting covenant relationship and allegiance. 'God' is the natural English rendering.
