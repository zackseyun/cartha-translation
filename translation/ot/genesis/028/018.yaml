theological_decisions:
- issue: Potential cultic significance of מַצֵּבָה and the oil-pouring act
  chosen_reading: Render descriptively without importing later theological evaluation
  alternative_readings:
  - Translate more interpretively as 'memorial stone' or 'anointed it'
  rationale: The verse narrates Jacob's action of erecting the stone and pouring oil
    on it. Because later biblical texts can treat standing stones polemically in some
    contexts, the translation should not prejudge this act positively or negatively
    beyond the Hebrew wording. A descriptive rendering preserves the narrative's own
    presentation.
  doctrine_reference: Translation philosophy §1, §3, §6
