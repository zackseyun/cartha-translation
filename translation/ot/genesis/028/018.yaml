id: GEN.28.18
reference: Genesis 28:18
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם יַעֲקֹ֜ב בַּ/בֹּ֗קֶר וַ/יִּקַּ֤ח אֶת הָ/אֶ֨בֶן֙ אֲשֶׁר שָׂ֣ם
    מְרַֽאֲשֹׁתָ֔י/ו וַ/יָּ֥שֶׂם אֹתָ֖/הּ מַצֵּבָ֑ה וַ/יִּצֹ֥ק שֶׁ֖מֶן עַל רֹאשָֽׁ/הּ־־־׃
translation:
  text: Jacob rose early in the morning, and he took the stone that he had placed
    at his head, and he set it up as a pillar and poured oil on its top.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing stone.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on its head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The verb denotes rising early or starting early. 'Rose early' is natural
    modern English and preserves the temporal emphasis without sounding archaic.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: 'A straightforward temporal phrase. Combined with ''rose early,'' it
    yields idiomatic English: ''rose early in the morning.'''
- source_word: הָאֶבֶן
  chosen: the stone
  lexicon: HALOT
  rationale: Definite singular noun; no reason to generalize or paraphrase.
- source_word: אֲשֶׁר שָׂם מְרַאֲשֹׁתָיו
  chosen: that he had placed at his head
  alternatives:
  - that he had put under his head
  - that he had placed for his head
  lexicon: HALOT
  rationale: The idiom refers to the stone used at Jacob's head while sleeping in
    the previous verse. 'At his head' is a close rendering of the Hebrew expression
    and avoids over-specifying 'under' where the Hebrew here does not explicitly say
    it.
- source_word: וַיָּשֶׂם אֹתָהּ מַצֵּבָה
  chosen: he set it up as a pillar
  alternatives:
  - he made it a pillar
  - he set it as a standing stone
  lexicon: HALOT
  rationale: מַצֵּבָה denotes a standing stone or pillar. 'Set it up as a pillar'
    captures both the action and the resulting cultic memorial object in clear English.
- source_word: מַצֵּבָה
  chosen: pillar
  alternatives:
  - standing stone
  - memorial stone
  lexicon: HALOT
  rationale: '''Pillar'' is concise and traditional, but still understandable. ''Standing
    stone'' is a viable alternative and is preserved in a footnote because it may
    better convey the physical object to modern readers.'
- source_word: וַיִּצֹק שֶׁמֶן
  chosen: poured oil
  alternatives:
  - poured olive oil
  - anointed with oil
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'poured oil.' 'Anointed' would import an interpretive
    gloss not stated by the verb itself, though the act has consecratory overtones.
- source_word: עַל רֹאשָׁהּ
  chosen: on its top
  alternatives:
  - on its head
  lexicon: HALOT
  rationale: Literally 'on its head,' referring to the top of the stone/pillar. 'On
    its top' is more idiomatic in English for an inanimate object while preserving
    the image.
