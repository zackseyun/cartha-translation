theological_decisions:
- issue: Abraham alone is said to return from the mountain, though Isaac is present
    earlier in the narrative
  chosen_reading: Translate the verse as written without supplying Isaac in the main
    text
  alternative_readings:
  - Some readers infer Isaac also returned and that the text simply focuses on Abraham
    as the principal figure
  rationale: The Hebrew explicitly names only Abraham as returning to his young men.
    The translation should preserve that wording and not harmonize by adding Isaac.
    Any interpretive tension should remain unresolved in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
