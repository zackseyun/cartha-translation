id: GEN.22.19
reference: Genesis 22:19
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב אַבְרָהָם֙ אֶל נְעָרָ֔י/ו וַ/יָּקֻ֛מוּ וַ/יֵּלְכ֥וּ יַחְדָּ֖ו
    אֶל בְּאֵ֣ר שָׁ֑בַע וַ/יֵּ֥שֶׁב אַבְרָהָ֖ם בִּ/בְאֵ֥ר שָֽׁבַע־־׃פ
translation:
  text: So Abraham returned to his young men, and they got up and went together to
    Beersheba, and Abraham lived in Beersheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Abraham returned to his young men.'' Isaac is not mentioned in
      this clause, though he is present in the preceding narrative.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - came back
  lexicon: HALOT
  rationale: The verb שוב in the qal wayyiqtol commonly means 'return.' 'Returned'
    is the most natural and direct English rendering in narrative sequence.
- source_word: נְעָרָיו
  chosen: his young men
  alternatives:
  - his servants
  - his attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to the servants who accompanied Abraham and Isaac (22:3, 5), but
    the lexical sense 'young men' is still appropriate and preserves the Hebrew wording
    without over-specifying status.
- source_word: וַיָּקֻמוּ
  chosen: they got up
  alternatives:
  - they arose
  - they stood up
  lexicon: HALOT
  rationale: קום in narrative often marks the beginning of action. 'Got up' is idiomatic
    modern English and preserves the sequential force without archaic tone.
- source_word: וַיֵּלְכוּ יַחְדָּו
  chosen: went together
  alternatives:
  - walked together
  - went on together
  lexicon: HALOT
  rationale: הלך plus יחדו indicates joint movement. 'Went together' is concise and
    natural; 'walked together' would add a manner nuance not required by the verb.
- source_word: בְּאֵר שָׁבַע
  chosen: Beersheba
  lexicon: HALOT
  rationale: As a place name, it should be transliterated rather than translated,
    in keeping with the translation philosophy for names.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - stayed
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'remain.' In this geographic narrative
    context, 'lived' communicates ongoing residence in clear modern English. 'Dwelt'
    is more formal/archaic; 'settled' may imply a new establishment not explicit in
    the verb itself.
