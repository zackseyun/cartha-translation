theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the place-name and proverb built on ראה
  chosen_reading: provide / be provided
  alternative_readings:
  - see / be seen
  - see to it / appear
  rationale: The Hebrew intentionally plays on ראה. In the Abraham-and-Isaac narrative,
    the thematic sense is God's provision, especially in light of Gen 22:8 and 22:13.
    To preserve theological tension rather than over-resolve ambiguity, the main text
    uses the contextual sense 'provide,' while a footnote preserves the more literal
    'see/be seen' alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
