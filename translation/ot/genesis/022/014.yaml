theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the place-name and proverb built on ראה
  chosen_reading: provide / be provided
  alternative_readings:
  - see / be seen
  - see to it / appear
  rationale: The Hebrew intentionally plays on ראה. In the Abraham-and-Isaac narrative, the thematic sense is God's provision, especially in light of Gen 22:8 and 22:13. To preserve theological tension rather than over-resolve ambiguity, the main text uses the contextual sense 'provide,' while a footnote preserves the more literal 'see/be seen' alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
