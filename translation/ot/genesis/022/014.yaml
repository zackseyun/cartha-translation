id: GEN.22.14
reference: Genesis 22:14
source:
  edition: WLC
  text: וַ/יִּקְרָ֧א אַבְרָהָ֛ם שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא יְהוָ֣ה יִרְאֶ֑ה אֲשֶׁר֙
    יֵאָמֵ֣ר הַ/יּ֔וֹם בְּ/הַ֥ר יְהוָ֖ה יֵרָאֶֽה־׀׃
translation:
  text: And Abraham called the name of that place, “The LORD will provide,” as it
    is said to this day, “On the mountain of the LORD it will be provided.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The LORD will see'' or ''The LORD will see to it''; the verb
      can also carry the sense ''provide.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'On the mountain of the LORD he will be seen' / 'it will be seen.' The
      Hebrew likely preserves a deliberate wordplay with 'The LORD will provide.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to call/name. 'Called' preserves
    the Hebrew idiom while remaining natural in English.
- source_word: שֵׁם הַמָּקוֹם הַהוּא
  chosen: the name of that place
  alternatives:
  - that place
  lexicon: HALOT
  rationale: Retaining 'the name of' reflects the explicit Hebrew construction rather
    than smoothing it to simply 'that place,' which would omit a significant element.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: יִרְאֶה
  chosen: will provide
  alternatives:
  - will see
  - will see to it
  lexicon: HALOT
  rationale: Although the root ראה literally means 'see,' in this context it carries
    the idiomatic sense of seeing to a need, hence 'provide.' This fits the immediate
    narrative context of God providing the ram (Gen 22:8, 13) and yields a coherent
    place-name in English.
- source_word: אֲשֶׁר יֵאָמֵר הַיּוֹם
  chosen: as it is said to this day
  alternatives:
  - so that it is said today
  - therefore it is said today
  lexicon: HALOT
  rationale: This clause introduces a proverb or ongoing saying. 'As it is said to
    this day' is idiomatic English and preserves the sense of a saying current up
    to the narrator's present.
- source_word: בְּהַר יְהוָה
  chosen: On the mountain of the LORD
  alternatives:
  - In the mount of the LORD
  - On the LORD's mountain
  lexicon: HALOT
  rationale: '''Mountain of the LORD'' is the most direct rendering of the construct
    phrase and is clear in modern English.'
- source_word: יֵרָאֶה
  chosen: it will be provided
  alternatives:
  - he will be seen
  - it will be seen
  - he will appear
  lexicon: HALOT
  rationale: The Niphal of ראה can mean 'be seen/appear,' but in this context the
    proverb likely echoes the earlier 'provide' sense. Rendering it 'it will be provided'
    preserves the wordplay with יִרְאֶה while making the proverb intelligible in context.
    Because the form is genuinely ambiguous, the more literal alternative is preserved
    in a footnote.
