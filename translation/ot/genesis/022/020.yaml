id: GEN.22.20
reference: Genesis 22:20
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵי֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/יֻּגַּ֥ד לְ/אַבְרָהָ֖ם לֵ/אמֹ֑ר
    הִ֠נֵּה יָלְדָ֨ה מִלְכָּ֥ה גַם הִ֛וא בָּנִ֖ים לְ/נָח֥וֹר אָחִֽי/ךָ־׃
translation:
  text: Now after these things, it was reported to Abraham, saying, “Look, Milcah
    also has borne sons to your brother Nahor:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, Milcah too has borne sons to your brother Nahor.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... it was
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. In
    modern English, 'Now' plus the clause communicates the discourse shift without
    archaic phrasing like 'it came to pass,' while still preserving the narrative
    function.
- source_word: אַחֲרֵי הַדְּבָרִים הָאֵלֶּה
  chosen: after these things
  alternatives:
  - after these events
  - after these matters
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the temporal link to the preceding
    narrative. 'Things' is natural and broad enough to reflect דְּבָרִים here.
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: 'The Hophal form is passive/causative-passive: news was conveyed to Abraham.
    ''It was reported'' captures the passive sense and the idea of communicated information
    in readable English.'
- source_word: לְאַבְרָהָם
  chosen: to Abraham
  lexicon: HALOT
  rationale: Standard prepositional indirect object.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - as follows
  lexicon: HALOT
  rationale: Retained as 'saying' to preserve the formal introduction to the reported
    message, a common Hebrew narrative feature.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention to the announcement. 'Look' is readable modern
    English and preserves the deictic force better than omitting it; 'Behold' would
    be too archaic for the stated philosophy.
- source_word: יָלְדָה
  chosen: has borne
  alternatives:
  - has given birth to
  - bore
  lexicon: HALOT
  rationale: The perfect reports a completed event with present relevance. 'Has borne'
    is idiomatic with 'sons' and fits the announcement style.
- source_word: מִלְכָּה
  chosen: Milcah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention.
- source_word: גַם הִוא
  chosen: also
  alternatives:
  - she too
  - also she
  lexicon: HALOT
  rationale: The combination adds emphasis that Milcah likewise has children. In English,
    the emphasis is naturally conveyed by 'also' without requiring a separate pronoun.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the generic 'children.' This
    follows the gender-accurate principle and prepares for the male genealogy that
    follows.
- source_word: לְנָחוֹר
  chosen: to ... Nahor
  alternatives:
  - for ... Nahor
  lexicon: HALOT
  rationale: With ילד, the preposition marks the father to whom children are born.
    'To Nahor' is the most direct and idiomatic rendering.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Direct address to Abraham identifying Nahor by family relation; retained
    explicitly as in the Hebrew.
