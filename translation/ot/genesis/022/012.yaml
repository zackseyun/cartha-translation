theological_decisions:
- issue: Anthropomorphic divine knowledge in 'now I know'
  chosen_reading: Retain the direct wording 'now I know' without softening.
  alternative_readings:
  - now I see
  - now it is evident
  rationale: The Hebrew text explicitly says 'now I know.' In keeping with the philosophy
    of preserving theological tension rather than resolving it, the translation does
    not paraphrase away the statement to protect a doctrine of divine omniscience.
    Historic orthodoxy is not denied by retaining the text's own anthropomorphic or
    relational expression.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
