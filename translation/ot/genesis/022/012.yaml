id: GEN.22.12
reference: Genesis 22:12
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אַל תִּשְׁלַ֤ח יָֽדְ/ךָ֙ אֶל הַ/נַּ֔עַר וְ/אַל תַּ֥עַשׂ ל֖/וֹ
    מְא֑וּמָּה כִּ֣י עַתָּ֣ה יָדַ֗עְתִּי כִּֽי יְרֵ֤א אֱלֹהִים֙ אַ֔תָּה וְ/לֹ֥א חָשַׂ֛כְתָּ
    אֶת בִּנְ/ךָ֥ אֶת יְחִידְ/ךָ֖ מִמֶּֽ/נִּי־־־׀־־־׃
translation:
  text: And he said, “Do not lay your hand on the boy, and do not do anything to him,
    for now I know that you fear God, since you have not withheld your son, your only
    one, from me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not spared your son.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your son, your only one'; that is, your one and only son in this
      covenantal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁלַח יָדְךָ אֶל
  chosen: lay your hand on
  alternatives:
  - stretch out your hand against
  - send your hand to
  lexicon: HALOT
  rationale: The Hebrew idiom 'send/stretch out the hand to/against' means to apply
    force or strike. 'Lay your hand on' is idiomatic modern English that preserves
    the prohibition against harming the boy without over-paraphrasing.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the lad
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, or young man depending on context. Here
    'the boy' fits the narrative voice and common English idiom in this scene, while
    avoiding archaic 'lad.'
- source_word: תַּעַשׂ לוֹ מְאוּמָּה
  chosen: do anything to him
  alternatives:
  - do nothing to him
  - do not do the slightest thing to him
  lexicon: HALOT
  rationale: מְאוּמָּה means 'anything/anything at all.' With the negation, the sense
    is a total prohibition. 'Do anything to him' is natural English and preserves
    the breadth of the ban.
- source_word: עַתָּה יָדַעְתִּי
  chosen: now I know
  alternatives:
  - now I have known
  - now I recognize
  lexicon: HALOT
  rationale: The perfect verb after עַתָּה is naturally rendered in English as present
    perfective/resultative sense. 'Now I know' is the standard and clearest idiomatic
    rendering.
- source_word: יְרֵא אֱלֹהִים
  chosen: you fear God
  alternatives:
  - you are God-fearing
  - you revere God
  lexicon: HALOT
  rationale: The adjective/participle plus אֱלֹהִים denotes one who fears God. 'You
    fear God' is more direct and formally closer than the adjectival paraphrase 'God-fearing.'
    'Revere' is possible but slightly interpretive.
- source_word: חָשַׂכְתָּ
  chosen: have not withheld
  alternatives:
  - have not spared
  - have not held back
  lexicon: HALOT
  rationale: The verb means to withhold, hold back, or spare. 'Withheld' best matches
    the direct object construction and preserves the sacrificial-testing context without
    importing later theological associations too strongly. 'Spared' is a viable alternative
    and is preserved in a footnote because of its intertextual significance.
- source_word: יְחִידְךָ
  chosen: your only one
  alternatives:
  - your only son
  - your unique one
  - your beloved one
  lexicon: HALOT
  rationale: The Hebrew adjective means 'only, only one, unique.' Because 'your son'
    already precedes it, rendering it as 'your only one' preserves the emphatic apposition
    without unnecessarily repeating 'son.' This also avoids overstating the lexical
    content as 'beloved,' though that nuance can be contextually associated.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix is straightforwardly 'from me.' Some
    English versions use 'for me' to smooth the sense, but 'from me' more directly
    reflects the Hebrew and the idea of withholding from God.
