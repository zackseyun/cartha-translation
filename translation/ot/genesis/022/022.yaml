id: GEN.22.22
reference: Genesis 22:22
source:
  edition: WLC
  text: וְ/אֶת כֶּ֣שֶׂד וְ/אֶת חֲז֔וֹ וְ/אֶת פִּלְדָּ֖שׁ וְ/אֶת יִדְלָ֑ף וְ/אֵ֖ת בְּתוּאֵֽל־־־־׃
translation:
  text: Kesed, Hazo, Pildash, Jidlaph, and Bethuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew personal names may also be transliterated more phonetically as 'Chesed'
      and 'Yidlaph.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּשֶׂד
  chosen: Kesed
  alternatives:
  - Chesed
  lexicon: HALOT
  rationale: Proper personal name in a genealogy/list context; per translation philosophy,
    names are transliterated rather than translated. 'Kesed' follows a standard English
    transliteration from Hebrew כ.
- source_word: חֲזוֹ
  chosen: Hazo
  alternatives:
  - Chazo
  lexicon: HALOT
  rationale: Proper personal name; transliterated into standard English form. 'Hazo'
    is a conventional rendering of the Hebrew name.
- source_word: פִּלְדָּשׁ
  chosen: Pildash
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly. No translation is appropriate
    for a personal name in this list.
- source_word: יִדְלָף
  chosen: Jidlaph
  alternatives:
  - Yidlaph
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Jidlaph' uses the common English
    convention of representing initial yod here with 'J' in traditional biblical name
    forms, while 'Yidlaph' is a possible more phonetic alternative.
- source_word: בְּתוּאֵל
  chosen: Bethuel
  lexicon: HALOT
  rationale: Proper personal name; transliterated in its standard English biblical
    form 'Bethuel.'
- source_word: וְאֶת / וְאֵת
  chosen: and
  alternatives:
  - with respect to (untranslated object marker)
  lexicon: HALOT
  rationale: The repeated conjunction waw plus object marker את introduces each item
    in the series. In idiomatic English genealogy/list style, the object marker is
    not represented, and the conjunction is conveyed by comma-separated coordination
    with a final 'and.'
