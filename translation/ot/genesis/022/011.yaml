id: GEN.22.11
reference: Genesis 22:11
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אֵלָ֜י/ו מַלְאַ֤ךְ יְהוָה֙ מִן הַ/שָּׁמַ֔יִם וַ/יֹּ֖אמֶר אַבְרָהָ֣ם אַבְרָהָ֑ם וַ/יֹּ֖אמֶר הִנֵּֽנִ/י־׀׃
translation:
  text: But the angel of Yahweh called to him from heaven and said, “Abraham, Abraham!” And he said, “Here I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.” The Hebrew word מַלְאָךְ can mean either “messenger” or “angel”; here the heavenly setting favors “angel.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the heavens”; rendered “from heaven” as standard English idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  - proclaimed
  lexicon: HALOT
  rationale: קרא in this narrative context most naturally means calling out vocally to someone. 'Called' is idiomatic and sufficiently formal without overstating volume.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - at him
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix indicates direction toward Abraham; 'to him' is the standard English equivalent.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  - the angel of Yahweh
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this recurring Genesis formula involving a heavenly speaker, 'angel' best fits. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh.' The construct phrase is preserved straightforwardly.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - out of heaven
  lexicon: HALOT
  rationale: Though morphologically plural, שָׁמַיִם commonly functions idiomatically as 'heaven' in English in such contexts. Singular 'heaven' is more natural while preserving the sense of the divine realm.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אָמַר is the standard verb of speech; 'said' is the most direct and natural rendering.
- source_word: אַבְרָהָם אַבְרָהָם
  chosen: Abraham, Abraham!
  alternatives:
  - Abraham, Abraham
  lexicon: HALOT
  rationale: The repeated name conveys urgency and personal address. An exclamation mark appropriately reflects the force of the call in English narrative dialogue.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  lexicon: HALOT
  rationale: הִנֵּנִי is a conventional responsive formula indicating presence and readiness. 'Here I am' is the established and most natural English equivalent.
