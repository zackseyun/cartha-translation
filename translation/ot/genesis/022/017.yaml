theological_decisions:
- issue: Collective singular of זֶרַע with singular pronominal suffix in the final
    clause
  chosen_reading: 'Render as singular collective: ''your offspring ... his enemies'''
  alternative_readings:
  - your descendants ... their enemies
  rationale: The Hebrew uses singular זַרְעֲךָ and singular suffix אֹיְבָיו. Preserving
    the singular maintains the corporate-singular tension present in the source text
    without forcing a later theological interpretation in either an individual-messianic
    or merely pluralizing direction.
  doctrine_reference: 'Translation philosophy #3, #5'
