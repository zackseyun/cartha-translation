id: GEN.22.17
reference: Genesis 22:17
source:
  edition: WLC
  text: כִּֽי בָרֵ֣ךְ אֲבָרֶכְ/ךָ֗ וְ/הַרְבָּ֨ה אַרְבֶּ֤ה אֶֽת זַרְעֲ/ךָ֙ כְּ/כוֹכְבֵ֣י
    הַ/שָּׁמַ֔יִם וְ/כַ/ח֕וֹל אֲשֶׁ֖ר עַל שְׂפַ֣ת הַ/יָּ֑ם וְ/יִרַ֣שׁ זַרְעֲ/ךָ֔ אֵ֖ת
    שַׁ֥עַר אֹיְבָֽי/ו־־־׃
translation:
  text: that I will surely bless you, and I will surely multiply your offspring like
    the stars of the heavens and like the sand that is on the seashore; and your offspring
    will possess the gate of his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your seed'; rendered 'your offspring' because the noun is a collective
      singular that can refer to descendants as a group.
    reason: lexical_alternative
  - marker: b
    text: Or 'will inherit the gate of their enemies.' The Hebrew keeps 'offspring/seed'
      grammatically singular and says 'his enemies.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: that
  alternatives:
  - indeed
  - surely
  - because
  lexicon: HALOT
  rationale: In this oath context following the previous verse, כִּי introduces the
    content of the divine declaration ('that/surely'). 'That' fits smooth English
    while allowing the emphatic force to be carried by the infinitive absolute constructions
    that follow.
- source_word: בָרֵךְ אֲבָרֶכְךָ
  chosen: I will surely bless you
  alternatives:
  - I will indeed bless you
  - blessing I will bless you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'I will
    surely bless you' preserves the emphatic force in idiomatic English without wooden
    repetition.
- source_word: וְהַרְבָּה אַרְבֶּה
  chosen: and I will surely multiply
  alternatives:
  - and I will greatly multiply
  - and multiplying I will multiply
  lexicon: HALOT
  rationale: Again, infinitive absolute plus finite verb marks emphasis/intensity.
    'Surely multiply' is concise and parallels the previous clause.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective
    sense better than 'descendants,' while remaining more natural in modern English
    than 'seed.'
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: like the stars of the heavens
  alternatives:
  - as the stars of heaven
  - like the stars in the sky
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the elevated style and the plural
    'heavens' behind שָּׁמַיִם. 'Of the heavens' is slightly more literal than 'in
    the sky' while still readable.
- source_word: וְכַחוֹל אֲשֶׁר עַל שְׂפַת הַיָּם
  chosen: and like the sand that is on the seashore
  alternatives:
  - and like the sand on the shore of the sea
  - and like the sand by the sea
  lexicon: HALOT
  rationale: שְׂפַת הַיָּם is the lip/edge of the sea, idiomatically 'seashore.' This
    gives natural English while preserving the image.
- source_word: וְיִרַשׁ
  chosen: will possess
  alternatives:
  - will inherit
  - will take possession of
  lexicon: HALOT
  rationale: יָרַשׁ can mean inherit, dispossess, or possess. Here with 'gate of his
    enemies' the sense is active possession/control rather than simple inheritance,
    so 'possess' is best.
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  - the gateway
  lexicon: HALOT
  rationale: '''Gate'' is the literal term and in context carries the metonymic sense
    of control over the enemy city. The literal rendering lets the biblical idiom
    stand.'
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - their enemies
  lexicon: HALOT
  rationale: The suffix is grammatically singular, matching the collective singular
    זַרְעֲךָ. English can preserve this as 'his enemies' while referring to the collective
    offspring as a singular corporate entity.
