id: GEN.22.21
reference: Genesis 22:21
source:
  edition: WLC
  text: אֶת ע֥וּץ בְּכֹר֖/וֹ וְ/אֶת בּ֣וּז אָחִ֑י/ו וְ/אֶת קְמוּאֵ֖ל אֲבִ֥י אֲרָֽם־־־׃
translation:
  text: Uz his firstborn, Buz his brother, and Kemuel the father of Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Kemuel the ancestor of Aram.' In genealogies, 'father' can sometimes
      denote a progenitor or founder rather than an immediate parent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֥וּץ
  chosen: Uz
  alternatives:
  - Uts
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention rather than
    translated.
- source_word: בְּכֹר֖וֹ
  chosen: his firstborn
  alternatives:
  - his eldest
  lexicon: HALOT
  rationale: בכור denotes the firstborn son in birth order, not merely an older child.
    'Firstborn' preserves the genealogical and potentially status-bearing sense.
- source_word: בּ֣וּז
  chosen: Buz
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: אָחִ֑יו
  chosen: his brother
  lexicon: HALOT
  rationale: Straightforward kinship term with 3ms suffix referring back to Nahor
    in the genealogy; 'his brother' is the natural English rendering.
- source_word: קְמוּאֵ֖ל
  chosen: Kemuel
  alternatives:
  - Qemuel
  lexicon: HALOT
  rationale: Proper name; transliterated in conventional English form.
- source_word: אֲבִ֥י
  chosen: the father of
  alternatives:
  - father of
  - ancestor of
  - begetter of
  lexicon: HALOT
  rationale: In genealogical contexts אבי can denote immediate fatherhood or progenitorial
    relationship. Here 'the father of' is the most direct and conventional rendering,
    while preserving the genealogical sense without overinterpreting.
- source_word: אֲרָֽם
  chosen: Aram
  lexicon: HALOT
  rationale: Proper name; transliterated. It may refer to the eponymous ancestor associated
    with Aram/Syria, but the text itself gives only the name.
