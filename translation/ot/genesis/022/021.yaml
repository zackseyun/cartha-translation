theological_decisions:
- issue: Genealogical sense of אֲבִי אֲרָם
  chosen_reading: Kemuel the father of Aram
  alternative_readings:
  - Kemuel the ancestor of Aram
  rationale: The Hebrew construct naturally reads 'father of Aram.' Because genealogical
    'father' can sometimes mean ancestor or founder, that nuance is preserved as an
    alternative, but the main text keeps the more direct rendering and does not import
    a broader ethnic or territorial interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §5
