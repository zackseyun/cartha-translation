id: GEN.22.24
reference: Genesis 22:24
source:
  edition: WLC
  text: וּ/פִֽילַגְשׁ֖/וֹ וּ/שְׁמָ֣/הּ רְאוּמָ֑ה וַ/תֵּ֤לֶד גַּם הִוא֙ אֶת טֶ֣בַח
    וְ/אֶת גַּ֔חַם וְ/אֶת תַּ֖חַשׁ וְ/אֶֽת מַעֲכָֽה־־־־־׃ס
translation:
  text: And his concubine, whose name was Reumah, also bore Tebah, Gaham, Tahash,
    and Maacah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and her name was Reumah'; the Hebrew is formally coordinate.
    reason: lexical_alternative
  - marker: b
    text: Or 'she too bore,' preserving the explicit pronoun and emphasis of the Hebrew
      גַּם הִוא.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִילַגְשׁוֹ
  chosen: And his concubine
  alternatives:
  - And his secondary wife
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ denotes a concubine/secondary wife. 'Concubine' is the standard
    concise English equivalent and best preserves the social-legal distinction without
    paraphrase. The prefixed conjunction is rendered 'And.'
- source_word: וּשְׁמָהּ
  chosen: whose name was
  alternatives:
  - and her name was
  lexicon: HALOT
  rationale: Literally 'and her name.' In English, 'whose name was' is smoother while
    preserving the possessive sense and relation to the woman just mentioned.
- source_word: רְאוּמָה
  chosen: Reumah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: ילד in this context means to bear/give birth. 'Bore' is concise, natural,
    and fits genealogical style.
- source_word: גַּם הִוא
  chosen: also
  alternatives:
  - she too
  lexicon: HALOT
  rationale: The combination adds emphasis that Reumah, in addition to Milcah, bore
    children to Nahor. English can express this naturally with 'also'; the explicit
    pronoun is absorbed into idiomatic English.
- source_word: אֶת טֶבַח וְאֶת גַּחַם וְאֶת תַּחַשׁ וְאֶת מַעֲכָה
  chosen: Tebah, Gaham, Tahash, and Maacah
  rationale: These are direct-object marked personal names in a birth list. They are
    transliterated and listed in natural English sequence, with a final serial conjunction.
