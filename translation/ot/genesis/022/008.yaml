theological_decisions:
- issue: Meaning of Abraham's statement about God's action
  chosen_reading: God himself will provide the lamb for a burnt offering
  alternative_readings:
  - God will see for himself the lamb for a burnt offering
  - God will see to the lamb for the burnt offering
  rationale: The Hebrew permits a more literal 'see' expression, but the idiomatic
    sense in context is provision. Retaining 'himself' preserves the emphatic/personal
    nuance of לּוֹ without forcing a doctrinal interpretation beyond the text. This
    also preserves the narrative tension rather than resolving whether Abraham is
    speaking evasively, prophetically, or both.
  doctrine_reference: Translation philosophy §§1, 3, 6
