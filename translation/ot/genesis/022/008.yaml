id: GEN.22.8
reference: Genesis 22:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַבְרָהָ֔ם אֱלֹהִ֞ים יִרְאֶה לּ֥/וֹ הַ/שֶּׂ֛ה לְ/עֹלָ֖ה בְּנִ֑/י
    וַ/יֵּלְכ֥וּ שְׁנֵי/הֶ֖ם יַחְדָּֽו־׃
translation:
  text: And Abraham said, “God himself will provide the lamb for a burnt offering,
    my son.” So the two of them went on together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “God will see for himself the lamb for a burnt offering.”
      The Hebrew verb can mean “see” or, idiomatically here, “provide.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting sequence.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the common Hebrew term for God refers to the true God in Abraham's
    speech; 'God' is the natural English equivalent.
- source_word: יִרְאֶה לּוֹ
  chosen: will provide ... for himself
  alternatives:
  - will see to ... for himself
  - will see/provide
  lexicon: HALOT
  rationale: ראה literally means 'see,' but in this idiom it carries the sense 'see
    to, provide.' English 'provide' best communicates the idiomatic meaning in context.
    The dative pronoun לּוֹ is reflected by 'for himself,' though idiomatic English
    often leaves it implicit; 'himself' is retained in the main text to preserve the
    Hebrew nuance and the theological force that God will personally see to the provision.
- source_word: הַשֶּׂה
  chosen: the lamb
  alternatives:
  - the sheep
  - the young animal
  lexicon: HALOT
  rationale: שֶׂה denotes a head of small livestock, sheep or goat, often a young
    one. 'Lamb' is the most natural rendering in this sacrificial context and matches
    the son's question in the immediate context, while remaining within the semantic
    range.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' is clear modern English and preserves the sacrificial terminology.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: Direct, affectionate address from Abraham to Isaac; 'my son' preserves
    both the familial relation and the emotional tone.
- source_word: וַיֵּלְכוּ שְׁנֵיהֶם יַחְדָּו
  chosen: So the two of them went on together
  alternatives:
  - And both of them walked together
  - And the two of them went together
  lexicon: HALOT
  rationale: This clause intentionally echoes the repeated Hebrew phrasing in the
    narrative. 'The two of them went on together' is natural English while preserving
    the emphasis on their joint movement.
