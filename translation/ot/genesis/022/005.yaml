id: GEN.22.5
reference: Genesis 22:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אַבְרָהָ֜ם אֶל נְעָרָ֗י/ו שְׁבוּ לָ/כֶ֥ם פֹּה֙ עִֽם הַ/חֲמ֔וֹר
    וַ/אֲנִ֣י וְ/הַ/נַּ֔עַר נֵלְכָ֖ה עַד כֹּ֑ה וְ/נִֽשְׁתַּחֲוֶ֖ה וְ/נָשׁ֥וּבָה אֲלֵי/כֶֽם־־־־׃
translation:
  text: And Abraham said to his young men, “Stay here with the donkey. I and the boy
    will go over there, and we will worship and then return to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will bow down'; the Hebrew verb can refer more literally to prostrating
      oneself in worship.
    reason: lexical_alternative
  - marker: b
    text: Abraham says, literally, 'we will return to you.' The text does not explain
      whether this is concealment, expectation, or confidence in God's provision.
    reason: alternative_reading
lexical_decisions:
- source_word: נְעָרָיו
  chosen: his young men
  alternatives:
  - his servants
  - his attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to the two accompanying males left behind (cf. v. 3), so 'young
    men' preserves the lexical link to נַעַר later in the verse while fitting the
    narrative context better than the more institutional 'servants.'
- source_word: שְׁבוּ לָכֶם פֹּה
  chosen: Stay here
  alternatives:
  - Sit here
  - Remain here
  lexicon: HALOT
  rationale: יָשַׁב literally means 'sit/dwell/remain.' In direct speech to companions
    being told not to proceed, idiomatic English 'Stay here' best captures the imperative
    force without sounding overly literal.
- source_word: עִם הַחֲמוֹר
  chosen: with the donkey
  alternatives:
  - with the ass
  lexicon: HALOT
  rationale: חֲמוֹר is the common term for a donkey. 'Donkey' is standard modern English
    and avoids archaic or potentially distracting wording.
- source_word: וַאֲנִי וְהַנַּעַר
  chosen: I and the boy
  alternatives:
  - I and the young man
  - the lad and I
  lexicon: HALOT
  rationale: נַעַר here refers specifically to Isaac. Although Isaac is older than
    a small child, 'boy' reflects Abraham's perspective and preserves the lexical
    connection with the broader semantic range of נַעַר. 'Young man' is possible but
    sounds too mature for the narrative tone.
- source_word: נֵלְכָה עַד כֹּה
  chosen: will go over there
  alternatives:
  - will go yonder
  - will go as far as there
  lexicon: HALOT
  rationale: The cohortative plus adverbial phrase indicates intended movement to
    a nearby but distinct place. 'Over there' is natural modern English and conveys
    the deictic sense without archaic 'yonder.'
- source_word: וְנִשְׁתַּחֲוֶה
  chosen: we will worship
  alternatives:
  - we will bow down
  - we will prostrate ourselves
  lexicon: HALOT
  rationale: שָׁחָה fundamentally means to bow down, often in worship. In this sacrificial
    context the religious sense is primary, so 'worship' communicates the intended
    meaning clearly; the more physical sense is preserved as an alternative.
- source_word: וְנָשׁוּבָה אֲלֵיכֶם
  chosen: and then return to you
  alternatives:
  - and return to you
  - and come back to you
  lexicon: HALOT
  rationale: 'שׁוּב means ''return.'' Adding ''then'' makes the sequence explicit
    in idiomatic English without adding new content. The 1cp form is retained as plural:
    Abraham says ''we will ... return.'''
