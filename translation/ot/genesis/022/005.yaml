theological_decisions:
- issue: Plural verb in Abraham's statement about returning
  chosen_reading: 'Retain the plain plural: ''we will ... return to you.'''
  alternative_readings:
  - Interpret as deliberate concealment by Abraham
  - Interpret as a statement of faith that both Abraham and Isaac will return
  rationale: The Hebrew uses first person plural cohortatives/volitives for both worshiping
    and returning. The translation should preserve this wording without resolving
    whether Abraham is concealing his intent, expressing confidence in God's provision,
    or speaking ambiguously. This follows the doctrine's principle of preserving theological
    tension rather than importing an interpretation into the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
