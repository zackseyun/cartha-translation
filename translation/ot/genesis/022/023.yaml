id: GEN.22.23
reference: Genesis 22:23
source:
  edition: WLC
  text: וּ/בְתוּאֵ֖ל יָלַ֣ד אֶת רִבְקָ֑ה שְׁמֹנָ֥ה אֵ֨לֶּה֙ יָלְדָ֣ה מִלְכָּ֔ה לְ/נָח֖וֹר
    אֲחִ֥י אַבְרָהָֽם־׃
translation:
  text: And Bethuel fathered Rebekah. These eight Milcah bore to Nahor, Abraham’s
    brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, "These were the eight whom Milcah bore to Nahor, Abraham’s
      brother."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְתוּאֵל
  chosen: And Bethuel
  alternatives:
  - Now Bethuel
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered simply as "And" to continue the
    genealogy smoothly. The proper name is transliterated per translation philosophy.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In this male-subject context, יָלַד is naturally rendered "fathered."
    "Begot" is more traditional but archaic; "became the father of" is accurate but
    less concise.
- source_word: אֶת רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rivkah
  lexicon: HALOT
  rationale: The direct-object marker אֶת is not translated in English. The name is
    given in standard English transliteration as "Rebekah."
- source_word: שְׁמֹנָה אֵלֶּה
  chosen: These eight
  alternatives:
  - These were the eight
  - These eight children
  lexicon: HALOT
  rationale: A concise rendering preserves the Hebrew emphasis and word order reasonably
    well. "Children" is implied by context and need not be supplied in the main text.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  - had
  lexicon: HALOT
  rationale: With Milcah as female subject, "bore" is the most natural concise equivalent
    for יָלַד. It preserves the genealogical register without archaic excess.
- source_word: מִלְכָּה
  chosen: Milcah
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: לְ/נָחוֹר
  chosen: to Nahor
  alternatives:
  - for Nahor
  lexicon: HALOT
  rationale: 'The preposition ל in genealogical formulas is idiomatically rendered
    "to" in English: Milcah bore these children to Nahor.'
- source_word: אֲחִי אַבְרָהָם
  chosen: Abraham’s brother
  alternatives:
  - the brother of Abraham
  lexicon: HALOT
  rationale: The construct phrase identifies Nahor appositionally. The possessive
    form is natural modern English and preserves the relationship clearly.
