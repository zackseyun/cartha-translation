id: GEN.22.4
reference: Genesis 22:4
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֗י וַ/יִּשָּׂ֨א אַבְרָהָ֧ם אֶת עֵינָ֛י/ו וַ/יַּ֥רְא
    אֶת הַ/מָּק֖וֹם מֵ/רָחֹֽק־־׃
translation:
  text: On the third day Abraham lifted up his eyes and saw the place from afar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a distance' / 'far off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: On the third day
  alternatives:
  - On the third day of the journey
  - On the third day then
  lexicon: HALOT
  rationale: Temporal prepositional phrase with definite article and ordinal; the
    straightforward idiomatic English rendering is 'On the third day.' Added material
    such as 'of the journey' is interpretive and not explicit in the Hebrew.
- source_word: וַיִּשָּׂא ... אֶת עֵינָיו
  chosen: lifted up his eyes
  alternatives:
  - looked up
  - raised his eyes
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'lifted up his eyes.' Retaining the idiom
    preserves the narrative style and is still natural enough in English. 'Looked
    up' is possible but slightly flattens the Hebrew expression.
- source_word: וַיַּרְא
  chosen: and saw
  alternatives:
  - and he saw
  - and looked and saw
  lexicon: HALOT
  rationale: 'Simple waw-consecutive verb from ראה, best rendered as sequential narrative
    past: ''and saw.'' The subject is already explicit with ''Abraham,'' so repeating
    ''he'' is unnecessary in English.'
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the site
  - that place
  lexicon: HALOT
  rationale: Definite noun meaning 'the place.' In context it refers to the divinely
    indicated destination, but the Hebrew itself uses the ordinary noun, so 'the place'
    is the most transparent rendering.
- source_word: מֵרָחֹק
  chosen: from afar
  alternatives:
  - from a distance
  - far off
  lexicon: HALOT
  rationale: The adverbial phrase denotes distance. 'From afar' is concise and literary
    without being archaic; 'from a distance' is also valid but less rhythmically fitting
    here.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation policy to transliterate names rather than translate them.
