theological_decisions:
- issue: Rendering of sacrificial term עֹלָה
  chosen_reading: burnt offering
  alternative_readings:
  - whole burnt offering
  rationale: The term refers to the specific sacrificial category later formalized
    in Torah. 'Burnt offering' is the standard clear English equivalent and does not
    import additional theological interpretation beyond the Hebrew term itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
