id: GEN.22.3
reference: Genesis 22:3
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם אַבְרָהָ֜ם בַּ/בֹּ֗קֶר וַֽ/יַּחֲבֹשׁ֙ אֶת חֲמֹר֔/וֹ וַ/יִּקַּ֞ח
    אֶת שְׁנֵ֤י נְעָרָי/ו֙ אִתּ֔/וֹ וְ/אֵ֖ת יִצְחָ֣ק בְּנ֑/וֹ וַ/יְבַקַּע֙ עֲצֵ֣י
    עֹלָ֔ה וַ/יָּ֣קָם וַ/יֵּ֔לֶךְ אֶל הַ/מָּק֖וֹם אֲשֶׁר אָֽמַר ל֥/וֹ הָ/אֱלֹהִֽים־־־־־׃
translation:
  text: Abraham rose early in the morning, saddled his donkey, took two of his young
    men with him and Isaac his son, split wood for a burnt offering, and arose and
    went to the place that God had told him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two of his servants' or 'two of his attendants'; the Hebrew נְעָרִים
      can refer to young men or male attendants depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: The verb denotes rising early, not merely waking. 'Rose early' is idiomatic
    English and preserves the narrative emphasis on Abraham's prompt obedience.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: Standard temporal expression paired with the previous verb. 'In the morning'
    keeps the Hebrew sense naturally in English.
- source_word: וַיַּחֲבֹשׁ אֶת־חֲמֹרוֹ
  chosen: saddled his donkey
  alternatives:
  - bound up his donkey
  - loaded his donkey
  lexicon: HALOT
  rationale: The verb חבש in this context refers to preparing the donkey for travel
    by saddling or binding on gear. 'Saddled his donkey' is the clearest natural rendering.
- source_word: שְׁנֵי נְעָרָיו
  chosen: two of his young men
  alternatives:
  - two of his servants
  - two of his attendants
  lexicon: HALOT
  rationale: נַעַר can mean youth, servant, or attendant depending on context. Here
    these are accompanying male attendants. 'Young men' preserves the lexical sense
    without over-specifying servile status, which the immediate context does not require.
- source_word: אִתּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward accompaniment marker.
- source_word: יִצְחָק בְּנוֹ
  chosen: Isaac his son
  alternatives:
  - his son Isaac
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional order and keeps the filial relationship
    prominent.
- source_word: וַיְבַקַּע עֲצֵי עֹלָה
  chosen: split wood for a burnt offering
  alternatives:
  - cut wood for the burnt offering
  - split the wood for the burnt offering
  lexicon: HALOT
  rationale: בקע means to split or cleave. עֹלָה is the standard sacrificial term
    'burnt offering.' The anarthrous construction in Hebrew does not require 'the'
    in English here.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: This is the established and accurate rendering for the sacrificial term,
    indicating an offering consumed by fire.
- source_word: וַיָּקָם וַיֵּלֶךְ
  chosen: and arose and went
  alternatives:
  - and set out
  - and got up and went
  lexicon: HALOT
  rationale: The Hebrew uses two sequential verbs. Retaining both reflects the narrative
    rhythm and avoids collapsing the actions into a single dynamic paraphrase.
- source_word: הַמָּקוֹם
  chosen: the place
  lexicon: HALOT
  rationale: Simple locative noun with article; no reason to expand beyond the Hebrew.
- source_word: אֲשֶׁר אָמַר לוֹ הָאֱלֹהִים
  chosen: that God had told him
  alternatives:
  - which God had spoken to him
  - that God had said to him
  lexicon: HALOT
  rationale: English past perfect fits the relative clause in narrative sequence.
    'Told him' is a natural rendering of אמר + indirect object in this context of
    prior instruction.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the noun has the article in Hebrew, when referring to the God
    of Israel in narrative prose it is idiomatically rendered simply 'God' in English.
