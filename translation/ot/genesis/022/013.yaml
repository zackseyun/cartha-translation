id: GEN.22.13
reference: Genesis 22:13
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א אַבְרָהָ֜ם אֶת עֵינָ֗י/ו וַ/יַּרְא֙ וְ/הִנֵּה אַ֔יִל אַחַ֕ר נֶאֱחַ֥ז
    בַּ/סְּבַ֖ךְ בְּ/קַרְנָ֑י/ו וַ/יֵּ֤לֶךְ אַבְרָהָם֙ וַ/יִּקַּ֣ח אֶת הָ/אַ֔יִל וַ/יַּעֲלֵ֥/הוּ
    לְ/עֹלָ֖ה תַּ֥חַת בְּנֽ/וֹ־־־׃
translation:
  text: Then Abraham lifted up his eyes and looked, and behold, behind him was a ram
    caught in the thicket by its horns. And Abraham went and took the ram and offered
    it up as a burnt offering instead of his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “behind,” without the explicit “him”; the Hebrew אַחַר here is understood
      by many translators as a locative adverb.
    reason: lexical_alternative
  - marker: b
    text: Or “in place of his son.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... אֶת עֵינָיו
  chosen: lifted up his eyes
  alternatives:
  - looked up
  lexicon: HALOT
  rationale: A Hebrew idiom meaning to raise one's gaze. Retaining 'lifted up his
    eyes' preserves the narrative texture while remaining understandable in English.
- source_word: וַיַּרְא
  chosen: looked
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Used with the preceding idiom and followed by 'behold'; 'looked' fits
    the sequence 'lifted up his eyes and looked' more naturally than 'saw,' which
    would compress the action.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - there was
  - suddenly
  lexicon: HALOT
  rationale: Preserves the deictic, attention-directing force of the Hebrew narrative
    marker without paraphrasing it away.
- source_word: אַיִל
  chosen: ram
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The standard and precise English equivalent for an adult male sheep in
    sacrificial context.
- source_word: אַחַר
  chosen: behind him
  alternatives:
  - behind
  - afterward
  lexicon: HALOT
  rationale: In this context the adverb most naturally indicates location. Because
    the consonantal text lacks an explicit pronoun here, some render simply 'behind';
    English idiom favors 'behind him' to make the scene clear.
- source_word: נֶאֱחַז
  chosen: caught
  alternatives:
  - held fast
  - entangled
  lexicon: HALOT
  rationale: Conveys the passive/resultative sense that the animal was trapped.
- source_word: בַּסְּבַךְ
  chosen: in the thicket
  alternatives:
  - in the bush
  - in the tangled brush
  lexicon: HALOT
  rationale: '''Thicket'' is a natural rendering for dense tangled vegetation and
    matches the trapping image.'
- source_word: בְּקַרְנָיו
  chosen: by its horns
  alternatives:
  - with its horns
  - in its horns
  lexicon: HALOT
  rationale: 'Expresses the instrumental/local sense clearly in English: the ram was
    caught by means of or at its horns.'
- source_word: וַיַּעֲלֵהוּ לְעֹלָה
  chosen: offered it up as a burnt offering
  alternatives:
  - brought it up as a burnt offering
  - offered it for a burnt offering
  lexicon: HALOT
  rationale: The verb עלה in sacrificial context plus עֹלָה refers to offering up
    the animal in whole burnt sacrifice. This rendering is both accurate and idiomatic.
- source_word: תַּחַת בְּנוֹ
  chosen: instead of his son
  alternatives:
  - in place of his son
  - under his son
  lexicon: HALOT
  rationale: Here תַּחַת has substitutionary force. 'Instead of' is the clearest modern
    English expression of that meaning.
