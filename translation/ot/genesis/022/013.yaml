theological_decisions:
- issue: Substitutionary wording in תַּחַת בְּנוֹ
  chosen_reading: instead of his son
  alternative_readings:
  - in place of his son
  rationale: The Hebrew preposition plainly expresses replacement/substitution in
    this narrative context. The translation preserves that sense without importing
    later doctrinal elaboration beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
