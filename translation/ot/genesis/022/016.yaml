id: GEN.22.16
reference: Genesis 22:16
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר בִּ֥/י נִשְׁבַּ֖עְתִּי נְאֻם יְהוָ֑ה כִּ֗י יַ֚עַן אֲשֶׁ֤ר עָשִׂ֨יתָ֙
    אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה וְ/לֹ֥א חָשַׂ֖כְתָּ אֶת בִּנְ/ךָ֥ אֶת יְחִידֶֽ/ךָ־־־־׃
translation:
  text: and said, “By myself I have sworn, declares the LORD, because you have done
    this thing and have not withheld your son, your only one,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your only son.” The Hebrew adjective means “only” or “unique,” and can
      be rendered either way in English here.
    reason: lexical_alternative
  - marker: b
    text: Or “did not spare.” The Hebrew verb can mean “withhold,” “hold back,” or
      in context “spare.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: The waw-consecutive verb continues the narrative. English can omit the
    explicit subject because it is clear from context, yielding natural narrative
    flow without loss of meaning.
- source_word: בִּי
  chosen: By myself
  alternatives:
  - By me
  lexicon: HALOT
  rationale: In oath formulas this idiom means 'by myself,' i.e., the speaker swears
    by his own person. 'By myself' is the established and plain English equivalent
    of the Hebrew idiom here.
- source_word: נִשְׁבַּעְתִּי
  chosen: I have sworn
  alternatives:
  - I swear
  - I have taken an oath
  lexicon: HALOT
  rationale: The perfect form is best rendered as a completed oath with present force
    in context. 'I have sworn' preserves the solemnity and verbal aspect better than
    a simple present.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic/declarative formula. 'Declares the LORD' is idiomatic
    modern English and preserves the formal divine pronouncement. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of the divine name
    as 'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: כִּי יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - because indeed
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: The combination intensifies causal force. In English, a single 'because'
    communicates the sense naturally without awkward redundancy.
- source_word: עָשִׂיתָ אֶת־הַדָּבָר הַזֶּה
  chosen: you have done this thing
  alternatives:
  - you have done this
  - you have done this matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers to Abraham's
    act of obedience. 'This thing' is natural and retains the concrete demonstrative
    emphasis.
- source_word: וְלֹא חָשַׂכְתָּ
  chosen: and have not withheld
  alternatives:
  - and did not spare
  - and have not held back
  lexicon: HALOT
  rationale: חָשַׂךְ in this context means to hold back or withhold. 'Withheld' fits
    the sacrificial-obedience context and avoids importing the stronger interpretive
    nuance of 'spare,' though that is a viable alternative.
- source_word: בִּנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Straightforward filial term; no contextual reason to vary the standard
    gloss.
- source_word: יְחִידְךָ
  chosen: your only one
  alternatives:
  - your only son
  - your unique one
  - your beloved one
  lexicon: HALOT
  rationale: The adjective denotes an only or unique child. Since 'your son' has already
    been stated explicitly, rendering it 'your only one' preserves the Hebrew's appositional
    emphasis without unnecessary repetition. 'Beloved' is interpretive and secondary
    here.
