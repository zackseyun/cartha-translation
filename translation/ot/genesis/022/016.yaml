theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves continuity with longstanding English Bible practice while
    signaling the covenant name through capitalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential christological/theological resonance of 'your only one'
  chosen_reading: your only one
  alternative_readings:
  - your only son
  rationale: The Hebrew emphasizes Isaac as Abraham's unique/only son in covenantal
    significance. The translation should preserve the lexical force of יָחִיד without
    heightening later theological resonance beyond what the Hebrew itself states.
    Because 'son' is already explicit in the previous phrase, 'your only one' best
    reflects the appositional structure.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
