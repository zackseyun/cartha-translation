theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Potential christological/theological resonance of 'your only one'
  chosen_reading: your only one
  alternative_readings:
  - your only son
  rationale: The Hebrew emphasizes Isaac as Abraham's unique/only son in covenantal significance. The translation should preserve the lexical force of יָחִיד without heightening later theological resonance beyond what the Hebrew itself states. Because 'son' is already explicit in the previous phrase, 'your only one' best reflects the appositional structure.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
