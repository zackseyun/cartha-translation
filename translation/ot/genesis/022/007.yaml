id: GEN.22.7
reference: Genesis 22:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יִצְחָ֜ק אֶל אַבְרָהָ֤ם אָבִי/ו֙ וַ/יֹּ֣אמֶר אָבִ֔/י וַ/יֹּ֖אמֶר
    הִנֶּ֣נִּֽ/י בְנִ֑/י וַ/יֹּ֗אמֶר הִנֵּ֤ה הָ/אֵשׁ֙ וְ/הָ֣/עֵצִ֔ים וְ/אַיֵּ֥ה הַ/שֶּׂ֖ה
    לְ/עֹלָֽה־׃
translation:
  text: And Isaac said to Abraham his father, “My father!” And he said, “Here I am,
    my son.” And he said, “Look, the fire and the wood—but where is the lamb for a
    burnt offering?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה can refer more broadly to a small animal from the flock, such
      as a lamb or a young goat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said'
    in English narrative.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his dad
  lexicon: HALOT
  rationale: Formal kinship term preserved; 'father' matches the register and gravity
    of the scene better than colloquial alternatives.
- source_word: אָבִי
  chosen: My father!
  alternatives:
  - Father!
  lexicon: HALOT
  rationale: The 1cs suffix marks direct address, and English idiom naturally supplies
    'my' here. Exclamation mark reflects vocative force in context.
- source_word: הִנֶּנִי
  chosen: Here I am
  alternatives:
  - Yes?
  - I am here
  lexicon: HALOT
  rationale: Conventional self-presentation formula in Hebrew narrative. 'Here I am'
    preserves both literal sense and literary resonance.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The suffix is possessive and affectionate; 'my son' best reflects the
    Hebrew form and the emotional tone.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to what is present. 'Look' is readable
    modern English; 'behold' is too archaic, while 'see' is slightly less natural
    in this construction.
- source_word: הָאֵשׁ
  chosen: the fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: The article is present in Hebrew and can be naturally retained in English
    in this listing of visible items.
- source_word: הָעֵצִים
  chosen: the wood
  alternatives:
  - the pieces of wood
  - the firewood
  lexicon: HALOT
  rationale: Though plural in Hebrew, English commonly uses the mass noun 'wood' in
    this context. This is a natural equivalent without loss of meaning.
- source_word: אַיֵּה
  chosen: where is
  alternatives:
  - where
  lexicon: HALOT
  rationale: Interrogative of location rendered idiomatically in English as a full
    clause.
- source_word: הַשֶּׂה
  chosen: the lamb
  alternatives:
  - the sheep
  - the animal from the flock
  lexicon: HALOT
  rationale: שה can denote a small livestock animal, including lamb or kid, but 'lamb'
    is the most natural sacrificial rendering in English and fits the singular context.
    The broader lexical possibility is worth preserving in a footnote.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the question naturally in English and preserves the sacrificial
    sense.
