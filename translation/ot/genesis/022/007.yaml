theological_decisions:
- issue: Rendering of sacrificial animal term הַשֶּׂה
  chosen_reading: the lamb
  alternative_readings:
  - the sheep
  - the animal from the flock
  rationale: The Hebrew term is somewhat broader than 'lamb,' but in this sacrificial
    context 'lamb' is the most idiomatic and contextually fitting English rendering.
    The broader sense is preserved in a footnote to avoid overstating lexical precision.
  doctrine_reference: Translation philosophy §3, §5
