theological_decisions:
- issue: Meaning of נסה with God as subject
  chosen_reading: God tested Abraham
  alternative_readings:
  - God tempted Abraham
  rationale: The Hebrew verb in this context denotes testing/proving rather than enticement
    to evil. Rendering it 'tempted' would mislead English readers and create unnecessary
    theological confusion. The narrative itself presents a proving of Abraham's faithfulness,
    not a solicitation to sin.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
