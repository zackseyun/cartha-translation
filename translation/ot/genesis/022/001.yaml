id: GEN.22.1
reference: Genesis 22:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וְ/הָ֣/אֱלֹהִ֔ים נִסָּ֖ה אֶת אַבְרָהָ֑ם
    וַ/יֹּ֣אמֶר אֵלָ֔י/ו אַבְרָהָ֖ם וַ/יֹּ֥אמֶר הִנֵּֽנִ/י־׃
translation:
  text: After these things, God tested Abraham and said to him, “Abraham!” And he
    said, “Here I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “put Abraham to the test.”
    reason: lexical_alternative
  - marker: b
    text: Or 'Now after these things,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה functions as a narrative transition. 'Now'
    preserves the discourse-shifting force in readable modern English without the
    archaic feel of 'it came to pass.'
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: after these things
  alternatives:
  - after these events
  - after these matters
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the temporal link to the preceding
    narrative. 'Things' is broad like the Hebrew דְּבָרִים; 'events' is possible but
    slightly more interpretive.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun here refers to the true God in narrative context. It is not
    the divine name YHWH, so it should be rendered 'God,' not 'the LORD.' The article
    does not require 'the God' in idiomatic English.
- source_word: נִסָּה
  chosen: tested
  alternatives:
  - put to the test
  - tried
  lexicon: HALOT
  rationale: The Piel of נסה means to test or prove. 'Tested' is the clearest modern
    English rendering and avoids the misleading sense of 'tempted' in English, especially
    in light of later theological reflection.
- source_word: אֶת אַבְרָהָם
  chosen: Abraham
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated; the personal name is transliterated
    per translation philosophy.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: and said to him
  alternatives:
  - and spoke to him
  lexicon: HALOT
  rationale: Standard rendering of אמר with indirect object. 'Said to him' is natural
    and sufficiently formal.
- source_word: אַבְרָהָם
  chosen: Abraham!
  lexicon: HALOT
  rationale: The vocative use is represented with direct address and punctuation in
    English.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold, I am here
  - Yes?
  lexicon: HALOT
  rationale: This idiom expresses attentive presence and readiness. 'Here I am' is
    the standard, natural English equivalent and preserves the relational and responsive
    tone better than a flattened 'Yes?'.
