theological_decisions:
- issue: Narrative specificity of the sacrificial structure
  chosen_reading: the altar
  alternative_readings:
  - an altar
  rationale: The Hebrew article favors definiteness. This is a translational rather
    than doctrinal choice, but it affects how concretely the scene is presented. The
    rendering does not import later theological symbolism beyond the text itself.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of the binding act
  chosen_reading: He bound Isaac his son
  alternative_readings:
  - He tied up Isaac his son
  rationale: The verse is the source of the traditional description of the Aqedah
    ('binding'). 'Bound' preserves the lexical force without softening the action
    or importing interpretive commentary.
  doctrine_reference: Translation philosophy §1, §6
