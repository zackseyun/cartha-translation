id: GEN.22.9
reference: Genesis 22:9
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ אֶֽל הַ/מָּקוֹם֮ אֲשֶׁ֣ר אָֽמַר ל֣/וֹ הָ/אֱלֹהִים֒ וַ/יִּ֨בֶן
    שָׁ֤ם אַבְרָהָם֙ אֶת הַ/מִּזְבֵּ֔חַ וַֽ/יַּעֲרֹ֖ךְ אֶת הָ/עֵצִ֑ים וַֽ/יַּעֲקֹד֙
    אֶת יִצְחָ֣ק בְּנ֔/וֹ וַ/יָּ֤שֶׂם אֹת/וֹ֙ עַל הַ/מִּזְבֵּ֔חַ מִ/מַּ֖עַל לָ/עֵצִֽים־־־־־־׃
translation:
  text: Then they came to the place that God had told him, and Abraham built the altar
    there and arranged the wood. He bound Isaac his son and placed him on the altar,
    on top of the wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they came to the place which God had said to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and Abraham built an altar there.' The Hebrew reads 'the altar,' which
      may present the structure as the specific altar being prepared for this sacrifice.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'above the wood,' that is, on top of the arranged wood.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline. 'Then' captures the
    sequential force in natural English, while 'they came' preserves the plural subject
    (Abraham and Isaac).
- source_word: הַמָּקוֹם
  chosen: the place
  lexicon: HALOT
  rationale: Straightforward locative noun with article; no need to specify beyond
    the Hebrew.
- source_word: אֲשֶׁר אָמַר לוֹ הָאֱלֹהִים
  chosen: that God had told him
  alternatives:
  - which God had said to him
  - that God had spoken to him
  lexicon: HALOT
  rationale: The clause identifies the place by prior divine instruction. English
    idiom prefers 'told him' for אמר with an indirect object in this context, and
    the pluperfect 'had told' reflects prior action relative to arrival.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the true God, not a generic 'god' or the divine
    name YHWH. 'God' is the plain contextual rendering.
- source_word: וַיִּבֶן שָׁם אַבְרָהָם אֶת הַמִּזְבֵּחַ
  chosen: and Abraham built the altar there
  alternatives:
  - and Abraham built an altar there
  lexicon: HALOT
  rationale: The Hebrew has the definite article on מִזְבֵּחַ. While English can sometimes
    use an indefinite article for first mention, 'the altar' better reflects the marked
    definiteness of the source and the specific sacrificial structure being prepared.
- source_word: וַיַּעֲרֹךְ אֶת הָעֵצִים
  chosen: and arranged the wood
  alternatives:
  - and laid out the wood
  - and set the wood in order
  lexicon: HALOT
  rationale: ערך in sacrificial contexts means to arrange or set in order. 'Arranged
    the wood' is clear, natural, and preserves the preparatory sense.
- source_word: וַיַּעֲקֹד
  chosen: He bound
  alternatives:
  - and he tied up
  - and he bound fast
  lexicon: HALOT
  rationale: The verb עקד specifically denotes binding. 'Bound' is the most direct
    and standard rendering and preserves the gravity of the act without paraphrase.
- source_word: יִצְחָק בְּנוֹ
  chosen: Isaac his son
  alternatives:
  - his son Isaac
  lexicon: HALOT
  rationale: Both English orders are possible. 'Isaac his son' stays closer to the
    Hebrew sequence while remaining readable.
- source_word: וַיָּשֶׂם אֹתוֹ עַל הַמִּזְבֵּחַ
  chosen: and placed him on the altar
  alternatives:
  - and laid him on the altar
  - and set him on the altar
  lexicon: HALOT
  rationale: שׂים is a broad placement verb. 'Placed' is natural modern English and
    avoids overinterpreting the manner of movement.
- source_word: מִמַּעַל לָעֵצִים
  chosen: on top of the wood
  alternatives:
  - above the wood
  - over the wood
  lexicon: HALOT
  rationale: The phrase indicates position above/upon the arranged wood. 'On top of
    the wood' expresses the spatial relation clearly in idiomatic English.
