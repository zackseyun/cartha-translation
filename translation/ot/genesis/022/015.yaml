id: GEN.22.15
reference: Genesis 22:15
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א מַלְאַ֥ךְ יְהוָ֖ה אֶל אַבְרָהָ֑ם שֵׁנִ֖ית מִן הַ/שָּׁמָֽיִם־־׃
translation:
  text: And the angel of the LORD called to Abraham a second time from heaven,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  - proclaimed
  lexicon: HALOT
  rationale: The wayyiqtol form advances the narrative with a simple past sense, and
    קרא in this context of direct address is best rendered 'called' rather than a
    louder or more formal option.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this recurring Genesis
    formula referring to a heavenly being, 'angel' is the most natural English rendering.
    יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of the divine
    name is 'the LORD,' preserving established reverential convention and aligning
    with the LXX/English Bible pattern.
- source_word: אֶל אַבְרָהָם
  chosen: to Abraham
  alternatives:
  - toward Abraham
  lexicon: HALOT
  rationale: אֶל marks the addressee of the call; 'to Abraham' is the idiomatic English
    equivalent. The personal name is transliterated, not translated, per translation
    philosophy.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: Though 'again' is possible, 'a second time' more precisely reflects שֵׁנִית
    and preserves the explicit ordinal nuance of the Hebrew.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: Hebrew שָׁמַיִם is formally plural, but in this idiom the singular 'heaven'
    is standard and natural in English, especially for divine speech. 'Sky' would
    flatten the theological register.
