theological_decisions:
- issue: Rendering of מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the messenger of the LORD
  rationale: The phrase is translated lexically without resolving broader theological
    debates about whether the angel is a created messenger or a special manifestation
    of God. This preserves the narrative's wording and theological tension rather
    than importing a doctrinal conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    default rendering 'the LORD'.
