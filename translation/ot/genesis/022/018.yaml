theological_decisions:
- issue: Meaning of the Abrahamic promise verb in the Hitpael of ברך
  chosen_reading: The nations are described as receiving blessing in Abraham's offspring
    ('will be blessed').
  alternative_readings:
  - The nations will use Abraham's offspring as a formula of self-blessing ('will
    bless themselves').
  rationale: 'The covenant context favors a passive/resultative sense: the nations
    come to share in blessing through Abraham''s line. This preserves the promissory
    force without importing later doctrinal conclusions into the verse itself. Because
    the Hebrew stem can be argued as reflexive, the alternative is preserved in a
    footnote rather than erased.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
