id: GEN.22.18
reference: Genesis 22:18
source:
  edition: WLC
  text: וְ/הִתְבָּרֲכ֣וּ בְ/זַרְעֲ/ךָ֔ כֹּ֖ל גּוֹיֵ֣י הָ/אָ֑רֶץ עֵ֕קֶב אֲשֶׁ֥ר שָׁמַ֖עְתָּ
    בְּ/קֹלִֽ/י׃
translation:
  text: And in your offspring all the nations of the earth will be blessed, because
    you have obeyed my voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will bless themselves.' The Hebrew verb can be understood reflexively
      here.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִתְבָּרֲכוּ
  chosen: will be blessed
  alternatives:
  - will bless themselves
  lexicon: HALOT
  rationale: The Hitpael of ברך in the patriarchal promise formula is commonly rendered
    as a passive/reflexive form. Here 'will be blessed' best fits the broader Abrahamic
    promise context and the ancient versions' sense, while preserving natural English.
    The reflexive-like alternative 'will bless themselves' is worth preserving in
    a footnote because the stem can be understood that way.
- source_word: בְזַרְעֲךָ
  chosen: in your offspring
  alternatives:
  - by your offspring
  - in your seed
  lexicon: HALOT
  rationale: זֶרַע is a collective noun meaning 'seed/offspring/descendants.' 'Offspring'
    is clearer in modern English than 'seed' while retaining the collective sense.
    The preposition ב is rendered 'in' to reflect the covenant formula and avoid over-specifying
    instrumentality, though 'by' is possible.
- source_word: כֹּל גּוֹיֵי הָאָרֶץ
  chosen: all the nations of the earth
  alternatives:
  - all the peoples of the earth
  lexicon: HALOT
  rationale: גּוֹיִם ordinarily means 'nations.' This is the most direct and contextually
    appropriate rendering in the Abrahamic promise tradition. 'Of the earth' preserves
    the global scope of הָאָרֶץ here.
- source_word: עֵקֶב אֲשֶׁר
  chosen: because
  alternatives:
  - because of the fact that
  - as a consequence of which
  lexicon: HALOT
  rationale: The phrase introduces the reason or ground for the promise's reaffirmation.
    'Because' is concise, natural English that accurately conveys the causal force.
- source_word: שָׁמַעְתָּ בְּקֹלִי
  chosen: you have obeyed my voice
  alternatives:
  - you have listened to my voice
  - you have heard my voice
  lexicon: HALOT
  rationale: The idiom שׁמע בקול means not merely auditory hearing but responsive
    obedience. 'Obeyed my voice' preserves the Hebrew idiom's force better than 'heard'
    and is more explicit than 'listened to.'
