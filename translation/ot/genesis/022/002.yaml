theological_decisions:
- issue: Rendering יְחִידְךָ in relation to Isaac despite Ishmael's existence
  chosen_reading: your only one
  alternative_readings:
  - your only son
  - your unique son
  rationale: The Hebrew emphasizes Isaac's singular status in the promise and in Abraham's
    relationship here, not a denial of Ishmael's existence. 'Your only one' preserves
    the tension without over-resolving whether the emphasis is biological, covenantal,
    or affective. The traditional 'your only son' is preserved in a footnote because
    many readers will expect it and because it remains a plausible contextual rendering.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
