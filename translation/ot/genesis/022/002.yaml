id: GEN.22.2
reference: Genesis 22:2
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר קַח נָ֠א אֶת בִּנְ/ךָ֨ אֶת יְחִֽידְ/ךָ֤ אֲשֶׁר אָהַ֨בְתָּ֙ אֶת
    יִצְחָ֔ק וְ/לֶךְ לְ/ךָ֔ אֶל אֶ֖רֶץ הַ/מֹּרִיָּ֑ה וְ/הַעֲלֵ֤/הוּ שָׁם֙ לְ/עֹלָ֔ה
    עַ֚ל אַחַ֣ד הֶֽ/הָרִ֔ים אֲשֶׁ֖ר אֹמַ֥ר אֵלֶֽי/ךָ־־־־־־־׃
translation:
  text: And he said, “Please take your son, your only one, whom you love—Isaac—and
    go to the land of Moriah, and offer him there as a burnt offering on one of the
    mountains that I will tell you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “your only son.” Hebrew יְחִידְךָ can emphasize an only or unique one;
      here it highlights Isaac’s singular status in the command.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: Particle of entreaty/politeness softening the imperative. 'Please' conveys
    the force in natural modern English better than archaic 'I pray you' or temporally
    misleading 'now'.
- source_word: בִּנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Direct, standard rendering of בן with 2ms suffix.
- source_word: יְחִידְךָ
  chosen: your only one
  alternatives:
  - your only son
  - your unique one
  - your beloved one
  lexicon: HALOT
  rationale: יחיד denotes an only/unique one. Because Abraham has another son biologically,
    'your only son' can sound overly flattened in English; 'your only one' preserves
    the Hebrew's emphatic, relational force while allowing the appositional identification
    'Isaac' to clarify the covenantal focus. The common alternative 'your only son'
    is preserved in a footnote because of its strong translation tradition and possible
    contextual sense.
- source_word: אֲשֶׁר אָהַבְתָּ
  chosen: whom you love
  alternatives:
  - whom you have loved
  lexicon: HALOT
  rationale: The perfect here naturally describes Abraham's known love for Isaac;
    present English 'whom you love' best conveys the stative sense in context.
- source_word: וְלֶךְ לְךָ
  chosen: go
  alternatives:
  - go yourself
  - go forth
  lexicon: HALOT
  rationale: The idiom הלך + לְךָ can add personal involvement or urgency, but in
    English a simple imperative 'go' is the clearest natural rendering. Overly literal
    expansions would sound awkward and add emphasis beyond what the context requires.
- source_word: אֶרֶץ הַמֹּרִיָּה
  chosen: the land of Moriah
  alternatives:
  - the region of Moriah
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/region. 'Land of Moriah' is the most direct and traditional
    rendering, while remaining clear in English.
- source_word: וְהַעֲלֵהוּ
  chosen: offer him
  alternatives:
  - bring him up
  - cause him to ascend
  lexicon: HALOT
  rationale: In sacrificial context with לְעֹלָה, the Hiphil of עלה means to offer
    up. 'Offer him' communicates the sacrificial command idiomatically without obscuring
    the connection to the burnt offering.
- source_word: לְעֹלָה
  chosen: as a burnt offering
  alternatives:
  - for a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term 'burnt offering.' 'As a burnt
    offering' fits the syntax naturally in English and makes the predicative force
    clear.
- source_word: עַל אַחַד הֶהָרִים
  chosen: on one of the mountains
  alternatives:
  - upon one of the hills
  lexicon: HALOT
  rationale: הַר is normally 'mountain' rather than 'hill.' The phrase indicates one
    mountain from among a set not yet specified.
- source_word: אֲשֶׁר אֹמַר אֵלֶיךָ
  chosen: that I will tell you
  alternatives:
  - which I will say to you
  - that I will show you
  lexicon: HALOT
  rationale: אמר with indirect object is literally 'say to you,' but in English 'tell
    you' is the natural equivalent. 'Show you' would import a different verb and should
    be avoided.
