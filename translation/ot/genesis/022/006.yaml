theological_decisions:
- issue: Sacrificial terminology in עֹלָה
  chosen_reading: burnt offering
  alternative_readings:
  - ascent offering
  rationale: While the root idea relates to 'going up,' the established sacrificial
    sense in this context is the offering wholly consumed by fire. 'Burnt offering'
    communicates the ritual category without importing extra theology beyond the text.
  doctrine_reference: Translation philosophy §1, §5
