id: GEN.22.6
reference: Genesis 22:6
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אַבְרָהָ֜ם אֶת עֲצֵ֣י הָ/עֹלָ֗ה וַ/יָּ֨שֶׂם֙ עַל יִצְחָ֣ק בְּנ֔/וֹ
    וַ/יִּקַּ֣ח בְּ/יָד֔/וֹ אֶת הָ/אֵ֖שׁ וְ/אֶת הַֽ/מַּאֲכֶ֑לֶת וַ/יֵּלְכ֥וּ שְׁנֵי/הֶ֖ם
    יַחְדָּֽו־־־־׃
translation:
  text: So Abraham took the wood for the burnt offering and laid it on Isaac his son,
    and he took in his hand the fire and the knife, and the two of them walked on
    together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wood of the burnt offering.' The Hebrew construction is literally
      'the wood of the burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the two of them went together.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצֵי הָעֹלָה
  chosen: the wood for the burnt offering
  alternatives:
  - the wood of the burnt offering
  - the wood for the ascent offering
  lexicon: HALOT
  rationale: עֲצֵי is the construct plural 'wood of,' and הָעֹלָה refers to the whole
    burnt offering. 'Wood for the burnt offering' is idiomatic English while preserving
    the sacrificial sense better than a bare 'firewood.'
- source_word: וַיָּשֶׂם עַל
  chosen: laid ... on
  alternatives:
  - placed ... on
  - put ... on
  lexicon: HALOT
  rationale: The verb שׂים with עַל commonly means to place or lay something on someone/something.
    'Laid ... on' is natural English and retains the physical burden imagery.
- source_word: יִצְחָק בְּנוֹ
  chosen: Isaac his son
  alternatives:
  - his son Isaac
  lexicon: HALOT
  rationale: Both are possible in English. 'Isaac his son' follows the Hebrew order
    more closely while remaining readable.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his hands
  - himself carried
  lexicon: HALOT
  rationale: The singular noun with suffix is best represented directly as 'in his
    hand.' English may use the singular idiomatically for what one carries personally.
- source_word: הָאֵשׁ
  chosen: the fire
  alternatives:
  - the firepot
  - the means of fire
  lexicon: HALOT
  rationale: The Hebrew says simply 'the fire.' Although this likely refers to a carried
    source of fire rather than abstract fire, the text does not specify a container,
    so the more literal rendering is preferred.
- source_word: הַמַּאֲכֶלֶת
  chosen: the knife
  alternatives:
  - the slaughtering knife
  - the cleaver
  lexicon: HALOT
  rationale: The noun denotes a knife used for slaughter. 'Knife' is the clearest
    natural rendering; the sacrificial nuance is supplied by context.
- source_word: שְׁנֵיהֶם יַחְדָּו
  chosen: the two of them walked on together
  alternatives:
  - both of them walked together
  - the two of them went together
  lexicon: HALOT
  rationale: The phrase emphasizes the pair acting in unity. 'The two of them' preserves
    the explicit dual idea, and 'walked on together' fits the narrative movement and
    the adverb יַחְדָּו.
- source_word: וַיֵּלְכוּ
  chosen: walked on
  alternatives:
  - went
  - walked
  lexicon: HALOT
  rationale: הלך is broadly 'go/walk.' 'Walked on' captures continued movement in
    the narrative and reads naturally with 'together.'
