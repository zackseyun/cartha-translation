id: GEN.22.10
reference: Genesis 22:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח אַבְרָהָם֙ אֶת יָד֔/וֹ וַ/יִּקַּ֖ח אֶת הַֽ/מַּאֲכֶ֑לֶת לִ/שְׁחֹ֖ט
    אֶת בְּנֽ/וֹ־־־׃
translation:
  text: Then Abraham reached out his hand and took the knife to slaughter his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretched out his hand.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb for 'slaughter' is more specific than a general word for
      'kill' and can carry sacrificial overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: reached out
  alternatives:
  - stretched out
  - sent forth
  lexicon: HALOT
  rationale: In this narrative context, the verb denotes extending the hand rather
    than sending. 'Reached out' is natural modern English and preserves the concrete
    action.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Literal rendering of the singular noun with pronominal suffix; no idiomatic
    adjustment is needed.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - grasped
  lexicon: HALOT
  rationale: The common verb 'take' fits the straightforward narrative sequence and
    avoids overstating the manner of the action.
- source_word: הַמַּאֲכֶלֶת
  chosen: the knife
  alternatives:
  - the cleaver
  - the slaughtering knife
  lexicon: HALOT
  rationale: The noun refers to a cutting implement used for slaughter. 'Knife' is
    the clearest natural English equivalent; more specific options are possible but
    less idiomatic in the flow of the verse.
- source_word: לִשְׁחֹט
  chosen: to slaughter
  alternatives:
  - to kill
  - to slay
  lexicon: HALOT
  rationale: This verb is more specific than a generic 'kill' and is commonly used
    for slaughtering sacrificial animals. 'To slaughter' preserves the sacrificial
    gravity of the scene without paraphrase.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Direct, literal rendering of the noun with pronominal suffix.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The waw-consecutive advances the narrative. 'Then' communicates sequential
    movement in readable modern English, while remaining faithful to the storyline.
