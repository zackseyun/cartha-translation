theological_decisions:
- issue: Whether to render שָׁחַט with a sacrificially charged term
  chosen_reading: to slaughter
  alternative_readings:
  - to kill
  - to slay
  rationale: Given the Akedah context and the verb's common use for slaughter, especially
    in sacrificial settings, 'to slaughter' preserves the text's ritual and emotional
    force without importing later doctrinal conclusions.
  doctrine_reference: Translation philosophy §§1, 3, 6
