id: GEN.7.20
reference: Genesis 7:20
source:
  edition: WLC
  text: חֲמֵ֨שׁ עֶשְׂרֵ֤ה אַמָּה֙ מִ/לְ/מַ֔עְלָ/ה גָּבְר֖וּ הַ/מָּ֑יִם וַ/יְכֻסּ֖וּ
    הֶ/הָרִֽים׃
translation:
  text: The waters rose fifteen cubits higher, and the mountains were covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'The waters prevailed fifteen cubits upward, and the
      mountains were covered.'
    reason: lexical_alternative
  - marker: b
    text: A cubit was an ancient unit of length, roughly the distance from the elbow
      to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: חֲמֵשׁ עֶשְׂרֵה
  chosen: fifteen
  alternatives:
  - fifteen [units]
  lexicon: HALOT
  rationale: The cardinal number phrase straightforwardly denotes 'fifteen.' No expansion
    is needed beyond supplying the measured unit with the following noun.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits
  - about 22 feet / about 6.7 meters (interpretive conversion)
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' The ancient unit is retained
    rather than converted in the main text to preserve source-language specificity
    and avoid importing a debated modern equivalent.
- source_word: מִלְמַעְלָה
  chosen: higher
  alternatives:
  - upward
  - from above
  - upward from above
  lexicon: HALOT
  rationale: In context with the measure and the verb גבר, the phrase indicates vertical
    extent above a reference point. 'Higher' gives natural English while preserving
    the comparative/upward sense. A more literal 'upward' is possible but less idiomatic
    here.
- source_word: גָּבְרוּ
  chosen: rose
  alternatives:
  - prevailed
  - were mighty
  - increased
  lexicon: HALOT
  rationale: The verb גבר often means 'be strong, prevail,' and in the flood narrative
    it describes the waters increasing in force/height. 'Rose' best captures the contextual
    sense in idiomatic English, while 'prevailed' would be more formal but less clear
    in this measurement clause.
- source_word: הַמָּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: The Hebrew plural is naturally rendered 'the waters,' which is also conventional
    and fitting in flood narrative.
- source_word: וַיְכֻסּוּ
  chosen: were covered
  alternatives:
  - and covered
  - and they covered
  lexicon: HALOT
  rationale: The verb is passive/reflexive in form here ('were covered'), with הֶהָרִים
    as the grammatical subject. Rendering it passively in English reflects the Hebrew
    morphology more accurately than making 'the waters' the explicit subject.
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הרים normally means 'mountains.' 'Hills' would understate the term and
    is not warranted by the source.
