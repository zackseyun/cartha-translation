id: GEN.7.7
reference: Genesis 7:7
source:
  edition: WLC
  text: וַ/יָּ֣בֹא נֹ֗חַ וּ֠/בָנָי/ו וְ/אִשְׁתּ֧/וֹ וּ/נְשֵֽׁי בָנָ֛י/ו אִתּ֖/וֹ אֶל
    הַ/תֵּבָ֑ה מִ/פְּנֵ֖י מֵ֥י הַ/מַּבּֽוּל־־׃
translation:
  text: And Noah entered the ark, with his sons, his wife, and his sons’ wives, because
    of the waters of the flood.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: entered
  alternatives:
  - came
  - went into
  lexicon: HALOT
  rationale: The verb בוא literally means 'come/go/enter' depending on context. With
    אֶל הַתֵּבָה ('to the ark'), English 'entered' best conveys the motion into the
    ark in natural modern English without over-paraphrase.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name נֹחַ.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes sons, not children generally. This follows
    the gender-accurate policy and preserves the familial structure named in the text.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: In this context אִשָּׁה with pronominal suffix clearly means 'wife.'
    'His wife' is the normal and precise English rendering.
- source_word: נְשֵׁי בָנָיו
  chosen: his sons’ wives
  alternatives:
  - the wives of his sons
  - his daughters-in-law
  lexicon: HALOT
  rationale: The construct phrase literally means 'the wives of his sons.' 'His sons’
    wives' is concise and accurate. 'Daughters-in-law' is semantically valid but less
    formally tied to the Hebrew wording.
- source_word: אִתּוֹ
  chosen: with
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The pronoun marks accompaniment. In English, 'with' naturally links the
    following family members to Noah's entering; 'with him' would be slightly more
    explicit but less smooth in this sentence.
- source_word: אֶל הַתֵּבָה
  chosen: the ark
  alternatives:
  - into the ark
  lexicon: HALOT
  rationale: Because 'entered' already carries the directional force, rendering אֶל
    here simply as 'the ark' avoids redundancy while preserving the sense. The noun
    תֵּבָה is the standard term for Noah's ark in Genesis.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - on account of
  - from before
  lexicon: HALOT
  rationale: 'Here the preposition expresses cause or occasion: Noah entered on account
    of the coming floodwaters. ''Because of'' is the clearest idiomatic English rendering
    in context.'
- source_word: מֵי הַמַּבּוּל
  chosen: the waters of the flood
  alternatives:
  - the floodwaters
  - the waters of the deluge
  lexicon: HALOT
  rationale: The Hebrew is literally 'the waters of the flood.' This preserves both
    nouns explicitly. 'Floodwaters' is possible, but the more transparent rendering
    better reflects the Hebrew structure.
