id: GEN.7.5
reference: Genesis 7:5
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ נֹ֑חַ כְּ/כֹ֥ל אֲשֶׁר צִוָּ֖/הוּ יְהוָֽה־׃
translation:
  text: And Noah did according to all that the LORD had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to all that Yahweh had commanded him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  - carried out
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this construction with כְּכֹל אֲשֶׁר
    plus a command, 'did according to' is the most natural and sufficiently formal
    English rendering, preserving Noah's obedience without over-interpreting the action.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name נֹחַ, following
    the translation policy to transliterate names.
- source_word: כְּכֹל
  chosen: according to all
  alternatives:
  - just as all
  - in accordance with all
  - everything that
  lexicon: HALOT
  rationale: 'The prefixed כ plus כֹּל expresses conformity or correspondence: ''according
    to all.'' This preserves the formal sense of complete conformity to the command.
    ''Everything that'' is smoother but slightly compresses the prepositional nuance.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the content of what was commanded.
    'That' is idiomatic modern English.
- source_word: צִוָּהוּ
  chosen: had commanded him
  alternatives:
  - commanded him
  - ordered him
  lexicon: HALOT
  rationale: The verb צוה means 'command.' 'Had commanded him' renders the prior action
    naturally in English relative to Noah's doing, while 'ordered' is possible but
    less fitting for the recurring biblical diction of divine command.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD.'
    This follows the project's stated policy and standard English Bible convention
    for the covenant name.
