id: GEN.7.12
reference: Genesis 7:12
source:
  edition: WLC
  text: וַֽ/יְהִ֥י הַ/גֶּ֖שֶׁם עַל הָ/אָ֑רֶץ אַרְבָּעִ֣ים י֔וֹם וְ/אַרְבָּעִ֖ים לָֽיְלָה־׃
translation:
  text: And the rain fell on the earth forty days and forty nights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And the rain was on the earth forty days and forty nights.'
      The Hebrew uses an idiomatic narrative construction that can be rendered more
      woodenly, but 'fell' best conveys the sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: fell
  alternatives:
  - was
  - came to be
  - continued
  lexicon: HALOT
  rationale: Although the verb is formally 'and it was/came to be,' in this clause
    with הַגֶּשֶׁם it idiomatically introduces the occurrence of the rain. Rendering
    it with the verbal idea 'fell' produces natural English while preserving the event
    sense of the Hebrew narrative wayyiqtol.
- source_word: הַגֶּשֶׁם
  chosen: the rain
  alternatives:
  - rainfall
  - downpour
  lexicon: HALOT
  rationale: The noun denotes rain. 'The rain' is the most direct and natural rendering,
    matching the definite Hebrew form.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: HALOT
  rationale: עַל is straightforwardly 'on/upon.' אֶרֶץ can mean 'earth' or 'land';
    here, in the flood context with cosmic scope, 'earth' is preferable.
- source_word: אַרְבָּעִים יוֹם
  chosen: forty days
  lexicon: HALOT
  rationale: Direct numerical expression; no idiomatic adjustment needed.
- source_word: וְאַרְבָּעִים לָיְלָה
  chosen: and forty nights
  lexicon: HALOT
  rationale: Standard paired duration formula with the preceding phrase; rendered
    literally in natural English.
