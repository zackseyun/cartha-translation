id: GEN.7.8
reference: Genesis 7:8
source:
  edition: WLC
  text: מִן הַ/בְּהֵמָה֙ הַ/טְּהוֹרָ֔ה וּ/מִן הַ֨/בְּהֵמָ֔ה אֲשֶׁ֥ר אֵינֶ֖נָּ/ה טְהֹרָ֑ה
    וּ/מִ֨ן הָ/ע֔וֹף וְ/כֹ֥ל אֲשֶׁר רֹמֵ֖שׂ עַל הָֽ/אֲדָמָֽה־־־־־׃
translation:
  text: From the clean animals and from the animals that are not clean, and from the
    birds and everything that creeps on the ground—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that are unclean.' The Hebrew reads more literally, 'that are not clean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן
  chosen: from
  lexicon: HALOT
  rationale: The preposition marks source/category membership in this list. Repeating
    'from' in English preserves the Hebrew structure and the rhythmic cataloging.
- source_word: בְּהֵמָה
  chosen: animals
  alternatives:
  - livestock
  - beasts
  lexicon: HALOT
  rationale: Here בְּהֵמָה functions as a broad category in contrast with birds and
    creeping things, not specifically domesticated livestock only. 'Animals' is natural
    modern English and fits the taxonomic listing.
- source_word: טְּהוֹרָה
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: In this pre-Mosaic cultic/ritual classification context, 'clean' is the
    standard and clearest rendering. 'Pure' is possible but less idiomatic for animal
    categories in English Bible usage.
- source_word: אֲשֶׁר אֵינֶנָּה טְהֹרָה
  chosen: that are not clean
  alternatives:
  - that are unclean
  lexicon: HALOT
  rationale: The Hebrew expresses negation analytically ('which are not clean') rather
    than with a single antonym. Rendering it as 'that are not clean' preserves the
    wording more closely. 'Unclean' is idiomatic and may be used elsewhere, but here
    the more transparent form better reflects the source.
- source_word: עוֹף
  chosen: birds
  alternatives:
  - flying creatures
  - fowl
  lexicon: HALOT
  rationale: Though the Hebrew term can denote flying creatures more broadly, in this
    context 'birds' is the most natural and sufficiently accurate English rendering.
    'Fowl' is archaic; 'flying creatures' is overly broad for readable modern English.
- source_word: כֹּל אֲשֶׁר רֹמֵשׂ
  chosen: everything that creeps
  alternatives:
  - every creeping thing
  - everything that moves about
  lexicon: HALOT
  rationale: The phrase denotes the class of small ground-creatures characterized
    by creeping movement. 'Everything that creeps' is readable modern English while
    staying close to the Hebrew verbal idea.
- source_word: עַל הָאֲדָמָה
  chosen: on the ground
  alternatives:
  - on the earth
  - upon the land
  lexicon: HALOT
  rationale: אֲדָמָה here refers to the ground/earth surface as the habitat of creeping
    things. 'On the ground' is the most idiomatic contextual rendering in English.
