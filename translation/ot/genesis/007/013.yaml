  from: and the three wives of his sons with them
  to: and the three wives of his sons as well
  rationale: The draft's structure is 'Noah entered... with [a list of people].' The Hebrew includes the word אִתָּם ('with them') at the end of this list. Rendering this literally as 'with them' creates a redundancy in English ('with... with them') that is stylistically awkward. A functional equivalent like 'as well' or 'also' preserves the Hebrew's sense of completing the list while being much more natural in English.
