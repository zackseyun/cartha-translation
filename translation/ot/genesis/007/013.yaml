id: GEN.7.13
reference: Genesis 7:13
source:
  edition: WLC
  text: בְּ/עֶ֨צֶם הַ/יּ֤וֹם הַ/זֶּה֙ בָּ֣א נֹ֔חַ וְ/שֵׁם וְ/חָ֥ם וָ/יֶ֖פֶת בְּנֵי נֹ֑חַ וְ/אֵ֣שֶׁת נֹ֗חַ וּ/שְׁלֹ֧שֶׁת נְשֵֽׁי בָנָ֛י/ו אִתָּ֖/ם אֶל הַ/תֵּבָֽה־־־־׃
translation:
  text: On that very day Noah entered the ark, with Shem, Ham, and Japheth, Noah’s sons, and Noah’s wife, and the three wives of his sons as well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came into the ark.' The Hebrew verb is literally 'came,' but in context it refers to entering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with them'; the plural most naturally refers to the family group already named.
    reason: lexical_alternative
  - marker: c
    text: Or 'and the three wives of his sons with them'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: On that very day
  alternatives:
  - On that same day
  - On that very same day
  lexicon: HALOT
  rationale: The idiom בְּעֶצֶם + 'day' intensifies specificity, meaning 'on that very day' rather than merely 'in that day.' 'Very' preserves the emphatic force in natural English.
- source_word: בָּא
  chosen: entered
  alternatives:
  - came
  - went in
  lexicon: HALOT
  rationale: Although the verb is literally 'came,' in context with אֶל הַתֵּבָה and the ark as destination, English 'entered' best conveys the motion into the ark without awkwardness. This is an optimal-equivalence rendering of the event.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name.
- source_word: וְשֵׁם וְחָם וָיֶפֶת
  chosen: with Shem, Ham, and Japheth
  alternatives:
  - and Shem and Ham and Japheth
  rationale: The Hebrew simply coordinates the names, but English idiom benefits from supplying 'with' to clarify that these persons accompany Noah into the ark. The conjunction sequence is preserved in sense, not mechanically repeated.
- source_word: בְּנֵי נֹחַ
  chosen: Noah’s sons
  alternatives:
  - the sons of Noah
  lexicon: HALOT
  rationale: Construct phrase identifying Shem, Ham, and Japheth. 'Noah’s sons' is the most natural modern English rendering.
- source_word: וְאֵשֶׁת נֹחַ
  chosen: and Noah’s wife
  alternatives:
  - and the wife of Noah
  lexicon: HALOT
  rationale: Construct phrase rendered in natural English. The definite sense is clear from the proper name relationship.
- source_word: וּשְׁלֹשֶׁת נְשֵׁי בָנָיו
  chosen: and the three wives of his sons
  alternatives:
  - and his sons’ three wives
  lexicon: HALOT
  rationale: The numeral plus construct phrase is straightforward. 'The three wives of his sons' preserves both the number and the family relationship clearly.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The pronominal form is masculine plural, referring most naturally to Noah and his sons as the larger group already named. 'With them' follows the Hebrew form directly and avoids collapsing the plural into singular.
- source_word: אֶל הַתֵּבָה
  chosen: the ark
  alternatives:
  - into the ark
  - to the ark
  lexicon: HALOT
  rationale: The destination phrase with אֶל means 'to/into the ark.' Because 'entered' already includes the sense of movement into, English can omit a second explicit preposition and simply say 'entered the ark.' 'Ark' is the standard rendering of תֵּבָה in the Noah narrative.
