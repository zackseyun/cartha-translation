theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of Noah's righteousness
  chosen_reading: that you are righteous before me
  alternative_readings:
  - that you alone are righteous before me
  - that I consider you righteous before me
  rationale: The Hebrew states God's evaluation of Noah as righteous in his generation. The translation preserves the text's claim without importing a fuller doctrinal explanation of the basis of that righteousness.
  doctrine_reference: DOCTRINE.md Affirmations / Preserve theological tension rather than resolve it
