id: GEN.7.1
reference: Genesis 7:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ לְ/נֹ֔חַ בֹּֽא אַתָּ֥ה וְ/כָל בֵּיתְ/ךָ֖ אֶל הַ/תֵּבָ֑ה כִּֽי אֹתְ/ךָ֥ רָאִ֛יתִי צַדִּ֥יק לְ/פָנַ֖/י בַּ/דּ֥וֹר הַ/זֶּֽה־־־־׃
translation:
  text: Then Yahweh said to Noah, “Enter the ark, you and all your household, because I have seen that you are righteous before me in this generation.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving the sequential force better than a bare 'and said' in this context.
- source_word: בֹּא
  chosen: Enter
  alternatives:
  - Come in
  - Go into
  lexicon: HALOT
  rationale: The imperative literally means 'come/enter.' 'Enter' is concise, idiomatic with 'the ark,' and fits optimal equivalence without over-paraphrase.
- source_word: בֵּיתְךָ
  chosen: your household
  alternatives:
  - your house
  - your family
  lexicon: HALOT
  rationale: Hebrew 'house' often denotes the members of one's household, not merely the building. 'Household' best captures the social unit intended here.
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: Though the noun can denote a chest-like vessel, 'ark' is the established and contextually precise rendering for Noah's תֵּבָה in English Bible usage.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in contemporary English than 'for' while preserving the causal sense.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I see
  - I have regarded
  lexicon: HALOT
  rationale: 'The perfect verb naturally renders as a present-result perfect in English: God has observed and judged Noah''s status. This preserves the completed assessment with present relevance.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: HALOT
  rationale: '''Righteous'' is the standard and theologically weighty rendering for צַדִּיק, fitting both lexical sense and biblical usage.'
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my sight
  - before my face
  lexicon: HALOT
  rationale: This idiom expresses evaluation in God's presence or sight. 'Before me' is both literal enough and natural in English.
- source_word: בַּדּוֹר הַזֶּה
  chosen: in this generation
  alternatives:
  - among this generation
  - in this age
  lexicon: HALOT
  rationale: דּוֹר here refers to Noah's contemporaneous generation. 'In this generation' is the most natural English rendering in context.
