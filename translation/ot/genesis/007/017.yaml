id: GEN.7.17
reference: Genesis 7:17
source:
  edition: WLC
  text: וַֽ/יְהִ֧י הַ/מַּבּ֛וּל אַרְבָּעִ֥ים י֖וֹם עַל הָ/אָ֑רֶץ וַ/יִּרְבּ֣וּ הַ/מַּ֗יִם
    וַ/יִּשְׂאוּ֙ אֶת הַ/תֵּבָ֔ה וַ/תָּ֖רָם מֵ/עַ֥ל הָ/אָֽרֶץ־־׃
translation:
  text: And the flood continued on the earth forty days, and the waters increased
    and lifted up the ark, so that it rose above the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the flood was on the earth forty days.' The Hebrew idiom can be
      rendered more formally with 'was,' but 'continued' better conveys duration in
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: continued
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: With a time expression ('forty days') and the subject 'the flood,' the
    verb functions idiomatically to indicate the duration or occurrence of the flood.
    'Continued' gives natural English while preserving the narrative sense better
    than the wooden 'was.'
- source_word: הַמַּבּוּל
  chosen: the flood
  alternatives:
  - the deluge
  lexicon: HALOT
  rationale: Standard rendering of the specific Noahic flood term; 'flood' is clear,
    natural, and contextually established.
- source_word: אַרְבָּעִים יוֹם
  chosen: forty days
  alternatives:
  - for forty days
  lexicon: HALOT
  rationale: Direct rendering of the duration phrase. The preposition is not explicit
    in Hebrew, so 'forty days' is retained, with duration conveyed by the English
    verb phrase.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: '''On the earth'' is the most straightforward rendering. Although אֶרֶץ
    can mean ''land,'' the flood context here favors the broader ''earth.'''
- source_word: וַיִּרְבּוּ הַמַּיִם
  chosen: the waters increased
  alternatives:
  - the waters multiplied
  - the waters grew great
  lexicon: HALOT
  rationale: The verb רבה here refers to increase in quantity/extent. 'Increased'
    is idiomatic and accurate.
- source_word: וַיִּשְׂאוּ אֶת הַתֵּבָה
  chosen: lifted up the ark
  alternatives:
  - bore up the ark
  - carried the ark
  lexicon: HALOT
  rationale: נשא here describes the waters raising the ark upward. 'Lifted up' best
    captures the physical action in clear English.
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: Conventional and contextually precise rendering for Noah's vessel.
- source_word: וַתָּרָם
  chosen: it rose
  alternatives:
  - it was raised
  - it was lifted high
  lexicon: HALOT
  rationale: 'From רום, feminine singular agreeing with ''ark.'' The form can be rendered
    intransitively in English as the result of the waters'' action: ''it rose.'' This
    avoids awkward repetition while preserving the sense.'
- source_word: מֵעַל הָאָרֶץ
  chosen: above the earth
  alternatives:
  - from upon the earth
  - high above the ground
  lexicon: HALOT
  rationale: Expresses elevation away from the earth's surface. 'Above the earth'
    is natural and sufficiently literal.
