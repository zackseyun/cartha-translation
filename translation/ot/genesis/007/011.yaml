theological_decisions:
- issue: Cosmic imagery of the floodwaters
  chosen_reading: Retain the phenomenological/cosmic language of 'the great deep'
    and 'the windows of the heavens' without naturalizing it into modern scientific
    description.
  alternative_readings:
  - Interpretive renderings such as 'underground waters erupted' and 'the sky's floodgates
    opened'
  rationale: The verse uses ancient cosmological imagery integral to the narrative's
    force. Optimal equivalence preserves that imagery rather than resolving it into
    a modern explanatory paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
