id: GEN.7.11
reference: Genesis 7:11
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת שֵׁשׁ מֵא֤וֹת שָׁנָה֙ לְ/חַיֵּי נֹ֔חַ בַּ/חֹ֨דֶשׁ֙ הַ/שֵּׁנִ֔י
    בְּ/שִׁבְעָֽה עָשָׂ֥ר י֖וֹם לַ/חֹ֑דֶשׁ בַּ/יּ֣וֹם הַ/זֶּ֗ה נִבְקְעוּ֙ כָּֽל מַעְיְנֹת֙
    תְּה֣וֹם רַבָּ֔ה וַ/אֲרֻבֹּ֥ת הַ/שָּׁמַ֖יִם נִפְתָּֽחוּ־־־־׃
translation:
  text: In the six hundredth year of Noah’s life, in the second month, on the seventeenth
    day of the month, on that day all the springs of the great deep burst open, and
    the windows of the heavens were opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fountains of the great deep.'
    reason: lexical_alternative
  - marker: b
    text: Or 'floodgates of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שֵׁשׁ מֵא֤וֹת שָׁנָה לְ/חַיֵּי נֹחַ
  chosen: In the six hundredth year of Noah’s life
  alternatives:
  - In Noah's six hundredth year
  - In the six hundredth year of the life of Noah
  lexicon: HALOT
  rationale: Construct chain with temporal ב marks the date by Noah's lifespan. 'Six
    hundredth year' is idiomatic English and preserves the Hebrew dating formula.
- source_word: בַּ/חֹדֶשׁ הַ/שֵּׁנִי
  chosen: in the second month
  alternatives:
  - in month two
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'second month' is the natural formal-equivalent
    rendering.
- source_word: בְּ/שִׁבְעָה עָשָׂר יֹום לַ/חֹדֶשׁ
  chosen: on the seventeenth day of the month
  alternatives:
  - on day seventeen of the month
  lexicon: HALOT
  rationale: Hebrew cardinal construction functions idiomatically as an ordinal date
    in English.
- source_word: בַּ/יּוֹם הַ/זֶּה
  chosen: on that day
  alternatives:
  - on this very day
  - on that very day
  lexicon: HALOT
  rationale: In narrative dating formulas this expression points emphatically to the
    specified day. 'On that day' is idiomatic and avoids overtranslation, while retaining
    the temporal emphasis.
- source_word: נִבְקְעוּ
  chosen: burst open
  alternatives:
  - were split open
  - were broken up
  lexicon: HALOT
  rationale: Nifal of בקע conveys being cleaved or split open. 'Burst open' is vivid,
    natural English and fits the catastrophic context better than the more archaic
    'broken up.'
- source_word: כָּל מַעְיְנֹת
  chosen: all the springs
  alternatives:
  - all the fountains
  - all the sources
  lexicon: HALOT
  rationale: מַעְיָן commonly denotes a spring or fountain. 'Springs' is more accessible
    modern English; 'fountains' is traditional but potentially misleading in contemporary
    usage.
- source_word: תְּהוֹם רַבָּה
  chosen: the great deep
  alternatives:
  - the great abyss
  - the vast deep
  lexicon: HALOT
  rationale: תְּהוֹם refers to the primeval/deep waters; 'the deep' is the established
    and accurate English equivalent. רַבָּה adjectivally intensifies it as 'great.'
- source_word: וַ/אֲרֻבֹּת הַ/שָּׁמַיִם
  chosen: and the windows of the heavens
  alternatives:
  - and the floodgates of the heavens
  - and the sluices of the heavens
  - and the windows of heaven
  lexicon: HALOT
  rationale: אֲרֻבּוֹת literally denotes windows/openings/lattices. 'Windows of the
    heavens' preserves the Hebrew image and plural form better than the more interpretive
    'floodgates.' 'Heavens' reflects the Hebrew plural שָׁמַיִם.
- source_word: נִפְתָּחוּ
  chosen: were opened
  alternatives:
  - opened
  lexicon: HALOT
  rationale: Nifal passive/simple reflexive is best represented by 'were opened,'
    matching the Hebrew verbal form and the parallel passive-like event description.
