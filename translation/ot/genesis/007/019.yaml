id: GEN.7.19
reference: Genesis 7:19
source:
  edition: WLC
  text: וְ/הַ/מַּ֗יִם גָּֽבְר֛וּ מְאֹ֥ד מְאֹ֖ד עַל הָ/אָ֑רֶץ וַ/יְכֻסּ֗וּ כָּל הֶֽ/הָרִים֙
    הַ/גְּבֹהִ֔ים אֲשֶׁר תַּ֖חַת כָּל הַ/שָּׁמָֽיִם־־־־׃
translation:
  text: And the waters prevailed more and more over the earth, and all the high mountains
    under all the heavens were covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land' for 'the earth' (Hebrew אָרֶץ), depending on how broadly one
      understands the flood's scope in context.
    reason: alternative_reading
  - marker: b
    text: Or 'under the whole heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּבְרוּ
  chosen: prevailed
  alternatives:
  - rose mightily
  - were mighty
  - increased
  lexicon: HALOT
  rationale: The verb גבר commonly conveys being strong, prevailing, or becoming mighty.
    In the flood context, 'prevailed' preserves the Hebrew imagery of the waters overpowering
    the land better than the flatter 'increased,' while remaining idiomatic English
    and echoing the repeated usage in this narrative.
- source_word: מְאֹד מְאֹד
  chosen: more and more
  alternatives:
  - very greatly
  - exceedingly
  - greatly, greatly
  lexicon: HALOT
  rationale: The doubled adverb intensifies the action. 'More and more' captures both
    intensity and the sense of continued escalation in context; 'very greatly' is
    possible but less natural in modern English.
- source_word: עַל הָאָרֶץ
  chosen: over the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: עַל is naturally 'over/upon.' אָרֶץ can mean 'earth' or 'land'; here
    'earth' fits the broad scope of the flood account and the following phrase 'under
    all the heavens.'
- source_word: וַיְכֻסּוּ
  chosen: were covered
  alternatives:
  - and they covered
  - and covered
  lexicon: HALOT
  rationale: The passive-like English rendering best reflects the result on the mountains
    in natural English. The Hebrew form with waters as implicit subject could be rendered
    actively, but 'were covered' communicates the event clearly without changing the
    sense.
- source_word: כָּל הֶהָרִים הַגְּבֹהִים
  chosen: all the high mountains
  alternatives:
  - every high mountain
  - all the lofty hills
  lexicon: HALOT
  rationale: הָרִים are mountains/hills, but 'mountains' is the standard and stronger
    rendering here. The adjective גְּבֹהִים is straightforwardly 'high.' 'All the
    high mountains' preserves the Hebrew structure and scope.
- source_word: תַּחַת כָּל הַשָּׁמָיִם
  chosen: under all the heavens
  alternatives:
  - under the whole heaven
  - beneath all the sky
  lexicon: HALOT
  rationale: שָׁמַיִם is morphologically plural and often rendered 'heavens.' Retaining
    'all the heavens' reflects the Hebrew form and the universal scope. 'Under the
    whole heaven' is idiomatic and traditional, but the chosen rendering stays closer
    to the source wording.
