theological_decisions:
- issue: Scope of אָרֶץ in the flood narrative
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse's language, especially 'under all the heavens,' presents the
    waters' scope in universal terms within the narrative. Rendering אָרֶץ as 'earth'
    best matches that scope without importing a modern scientific claim beyond the
    text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
