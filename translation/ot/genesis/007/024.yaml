id: GEN.7.24
reference: Genesis 7:24
source:
  edition: WLC
  text: וַ/יִּגְבְּר֥וּ הַ/מַּ֖יִם עַל הָ/אָ֑רֶץ חֲמִשִּׁ֥ים וּ/מְאַ֖ת יֽוֹם־׃
translation:
  text: And the waters prevailed over the earth for 150 days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the land' for 'over the earth'; Hebrew אֶרֶץ can mean either depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבְּרוּ
  chosen: prevailed
  alternatives:
  - were mighty
  - rose strongly
  - flooded mightily
  lexicon: HALOT
  rationale: From גבר in the Qal wayyiqtol, conveying becoming strong or prevailing.
    In the flood narrative this verb has already described the waters' overpowering
    dominance, so 'prevailed' preserves both the lexical sense and the narrative continuity
    better than a flatter 'increased.'
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, English idiom in this context
    commonly allows either singular or plural. 'The waters' better reflects the Hebrew
    form and the flood context.
- source_word: עַל הָאָרֶץ
  chosen: over the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: עַל is naturally 'over/upon.' אֶרֶץ can mean 'earth' or 'land'; here
    the cosmic flood setting favors 'earth' rather than a localized 'land.'
- source_word: חֲמִשִּׁים וּמְאַת יוֹם
  chosen: for 150 days
  alternatives:
  - one hundred fifty days
  - a hundred and fifty days
  lexicon: HALOT
  rationale: The Hebrew cardinal expression literally reads 'fifty and one hundred
    day,' idiomatically 'one hundred fifty days.' 'For' is supplied in English to
    express duration naturally.
