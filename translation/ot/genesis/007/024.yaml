theological_decisions:
- issue: Scope of אֶרֶץ in the flood narrative
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The immediate narrative presents the flood in universal terms, so 'earth'
    best matches the literary scope without adding interpretation beyond the text.
    'Land' remains lexically possible but is less fitting here.
