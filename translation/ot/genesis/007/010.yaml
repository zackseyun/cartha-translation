theological_decisions:
- issue: Scope of אֶרֶץ in the flood narrative
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The Hebrew noun can denote either a local land or the whole earth. In
    this narrative context, the traditional and contextually strongest reading is
    global in scope, so 'the earth' is used. This is a contextual lexical decision
    rather than an attempt to settle broader debates beyond the verse itself.
