id: GEN.7.10
reference: Genesis 7:10
source:
  edition: WLC
  text: וַֽ/יְהִ֖י לְ/שִׁבְעַ֣ת הַ/יָּמִ֑ים וּ/מֵ֣י הַ/מַּבּ֔וּל הָי֖וּ עַל הָ/אָֽרֶץ־׃
translation:
  text: And after seven days, the waters of the flood came upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land.' The Hebrew אֶרֶץ can mean either 'earth' or 'land,' depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it happened after seven days, and the waters of the flood
      were upon the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And after
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, a literal 'and it happened' is possible but wooden here; 'And after'
    captures the temporal transition when combined with the following phrase while
    remaining faithful to the narrative function.
- source_word: לְשִׁבְעַת הַיָּמִים
  chosen: seven days
  alternatives:
  - after seven days
  - at the end of seven days
  lexicon: HALOT
  rationale: The preposition ל with a time expression here marks the point reached
    after the specified period. In idiomatic English this is best represented as 'after
    seven days.' The bare phrase 'seven days' is retained in the lexical mapping,
    but the full clause sense is temporal completion.
- source_word: וּמֵי
  chosen: the waters
  alternatives:
  - and the waters
  - floodwaters
  lexicon: HALOT
  rationale: 'מַיִם in the construct plural is naturally ''waters.'' The conjunction
    is absorbed into smooth English clause flow, and the article is supplied in English
    because the construct with the following definite noun makes the phrase definite:
    ''the waters of the flood.'''
- source_word: הַמַּבּוּל
  chosen: the flood
  alternatives:
  - the deluge
  lexicon: HALOT
  rationale: מַבּוּל is the standard term for the Noahic flood. 'Flood' is the clearest
    and most conventional modern English rendering; 'deluge' is possible but less
    natural for the target style.
- source_word: הָיוּ עַל
  chosen: came upon
  alternatives:
  - were upon
  - were on
  lexicon: HALOT
  rationale: Literally, 'were upon the earth.' In context this describes the onset
    of the floodwaters covering the earth, so 'came upon' conveys the eventive force
    more naturally in English without adding content beyond the context.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In the flood narrative, the broader
    sense 'earth' best fits the scope of the account and aligns with the surrounding
    context.
