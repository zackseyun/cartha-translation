id: GEN.7.4
reference: Genesis 7:4
source:
  edition: WLC
  text: כִּי֩ לְ/יָמִ֨ים ע֜וֹד שִׁבְעָ֗ה אָֽנֹכִי֙ מַמְטִ֣יר עַל הָ/אָ֔רֶץ אַרְבָּעִ֣ים י֔וֹם וְ/אַרְבָּעִ֖ים לָ֑יְלָה וּ/מָחִ֗יתִי אֶֽת כָּל הַ/יְקוּם֙ אֲשֶׁ֣ר עָשִׂ֔יתִי מֵ/עַ֖ל פְּנֵ֥י הָֽ/אֲדָמָֽה־־־׃
translation:
  text: For in seven more days I will make it rain on the earth forty days and forty nights, and I will wipe out every living thing that I have made from the face of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after seven more days.' The Hebrew idiom indicates that seven days remain before the rain begins.
    reason: lexical_alternative
  - marker: b
    text: Or 'blot out.' The Hebrew verb evokes wiping away or erasing.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'from the face of the ground,' preserving a distinction from earlier 'earth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and I will wipe out from the face of the ground every living thing that I have made.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the command in the previous verse. 'For' preserves the explanatory connection in natural English.
- source_word: לְיָמִים עוֹד שִׁבְעָה
  chosen: in seven more days
  alternatives:
  - after seven more days
  - in yet seven days
  lexicon: HALOT
  rationale: The idiom literally involves 'for/to days, still seven' and denotes a short remaining interval before the action begins. 'In seven more days' is idiomatic modern English and preserves the temporal sense without awkwardness.
- source_word: אָנֹכִי
  chosen: I
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew; English naturally includes 'I' with the verb, and the emphasis is sufficiently conveyed by the clause structure.
- source_word: מַמְטִיר
  chosen: will make it rain
  alternatives:
  - will cause rain to fall
  - will send rain
  lexicon: HALOT
  rationale: Hiphil of מטר means 'cause to rain.' 'Will make it rain' is clear, idiomatic, and preserves divine agency better than the less explicit simple 'it will rain.'
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the land
  lexicon: HALOT
  rationale: '''Earth'' is the most straightforward rendering of אֶרֶץ here in the flood context. ''Land'' is possible, but the broader scope of the judgment favors ''earth.'''
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לָיְלָה
  chosen: forty days and forty nights
  lexicon: HALOT
  rationale: Standard temporal expression; retained directly and naturally in English.
- source_word: וּמָחִיתִי
  chosen: and I will wipe out
  alternatives:
  - and I will blot out
  - and I will destroy
  lexicon: HALOT
  rationale: The verb מחה often carries the sense of wiping or blotting out. 'Wipe out' preserves the vividness and totality of the image in accessible modern English. 'Blot out' is more traditional but less natural for many readers.
- source_word: כָּל הַיְקוּם
  chosen: every living thing
  alternatives:
  - all existence
  - every creature
  lexicon: HALOT
  rationale: In this context היקום refers to all that stands/lives as the created living order subject to the flood judgment. 'Every living thing' communicates the referent clearly; 'all existence' would overstate the scope, and 'every creature' could sound narrower or more interpretive.
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that I have made
  alternatives:
  - that I made
  lexicon: HALOT
  rationale: English present perfect suitably links God's prior creative act with the present judgment. Simple past is possible, but 'have made' better reflects the continuing relevance of the completed action.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the ground
  alternatives:
  - from the face of the earth
  - from upon the ground
  lexicon: HALOT
  rationale: אֲדָמָה is better rendered 'ground' here, distinguishing it from the earlier אֶרֶץ ('earth'). 'From the face of the ground' preserves the Hebrew idiom and the lexical distinction.
