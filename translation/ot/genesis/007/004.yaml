  from: and I will wipe out from the face of the ground every living thing that I have made.
  to: and I will wipe out every living thing that I have made from the face of the ground.
  rationale: The current word order places a prepositional phrase between the verb and its long direct object. While grammatically permissible in English, reversing the order to 'verb -> direct object -> prepositional phrase' provides a smoother reading and also happens to align more closely with the Hebrew syntax.
