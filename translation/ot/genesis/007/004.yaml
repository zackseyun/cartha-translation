theological_decisions:
- issue: Scope of the flood judgment in אֶרֶץ / היקום
  chosen_reading: Render with broad, creation-wide language ('earth,' 'every living thing') without narrowing the text to a merely local event.
  alternative_readings:
  - '''land'' implying a more regional scope'
  rationale: The verse presents a sweeping divine judgment on what God has made, and the paired expressions support a broad rendering. The translation preserves the text's force without importing a modern scientific or denominational argument about flood extent.
  doctrine_reference: 'Translation philosophy #1 and #3'
