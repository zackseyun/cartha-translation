id: GEN.7.15
reference: Genesis 7:15
source:
  edition: WLC
  text: וַ/יָּבֹ֥אוּ אֶל נֹ֖חַ אֶל הַ/תֵּבָ֑ה שְׁנַ֤יִם שְׁנַ֨יִם֙ מִ/כָּל הַ/בָּשָׂ֔ר
    אֲשֶׁר בּ֖/וֹ ר֥וּחַ חַיִּֽים־־־־׃
translation:
  text: They came to Noah, into the ark, two by two from all flesh in which was the
    breath of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of life.' The Hebrew word רוּחַ can mean 'breath,' 'wind,'
      or 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: They came
  alternatives:
  - they entered
  - they went
  lexicon: HALOT
  rationale: The wayyiqtol of בוא narrates simple past movement. 'They came' preserves
    the Hebrew verb naturally in English while allowing the following prepositional
    phrases to specify destination.
- source_word: אֶל נֹחַ
  chosen: to Noah
  alternatives:
  - toward Noah
  lexicon: HALOT
  rationale: אֶל commonly marks movement toward a person or place. 'To Noah' is the
    most natural rendering here and preserves the relation that the animals approached
    Noah.
- source_word: אֶל הַתֵּבָה
  chosen: into the ark
  alternatives:
  - to the ark
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this context of boarding the vessel,
    English idiom prefers 'into the ark.' This reflects the movement's endpoint more
    clearly without over-paraphrasing.
- source_word: שְׁנַיִם שְׁנַיִם
  chosen: two by two
  alternatives:
  - in pairs
  - two and two
  lexicon: HALOT
  rationale: The repeated numeral expresses distributive pairing. 'Two by two' is
    the standard and precise English equivalent.
- source_word: מִכָּל הַבָּשָׂר
  chosen: from all flesh
  alternatives:
  - of every living creature
  - from every creature
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In Genesis flood language it refers
    broadly to animate creatures. 'All flesh' preserves the Hebrew wording and its
    thematic resonance in the narrative.
- source_word: אֲשֶׁר בּוֹ
  chosen: in which was
  alternatives:
  - that had
  - in whom was
  lexicon: HALOT
  rationale: The relative clause modifies 'all flesh.' 'In which was' closely follows
    the Hebrew construction and avoids prematurely smoothing the idiom into a more
    interpretive phrase.
- source_word: רוּחַ חַיִּים
  chosen: the breath of life
  alternatives:
  - the spirit of life
  - the breath of lives
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In the flood narrative's description
    of living creatures, 'breath of life' is the most contextually fitting and idiomatic
    rendering in English. The plural חַיִּים functions idiomatically with singular
    sense 'life.'
