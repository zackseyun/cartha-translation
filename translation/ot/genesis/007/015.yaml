theological_decisions:
- issue: Meaning of רוּחַ in the phrase רוּחַ חַיִּים
  chosen_reading: breath of life
  alternative_readings:
  - spirit of life
  rationale: The phrase can bear either 'breath' or 'spirit,' but in this zoological
    and creational context the emphasis is on animate life possessed by creatures
    entering the ark, not on a developed anthropological doctrine. 'Breath of life'
    best preserves the narrative sense while avoiding unnecessary theological over-specification.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
