theological_decisions:
- issue: Meaning of the clean-animal number expression
  chosen_reading: seven pairs of clean animals
  alternative_readings:
  - seven clean animals
  rationale: The phrase שִׁבְעָה שִׁבְעָה followed by אִישׁ וְאִשְׁתּוֹ strongly suggests
    paired units, i.e., seven male-female pairs. This also coheres with the immediate
    contrast 'two, a male and its mate' for the unclean animals. Because some English
    traditions render the phrase more literally as 'seven and seven' or understand
    it as seven individuals, the alternative is preserved in a footnote rather than
    left undocumented.
  doctrine_reference: Translation philosophy §3, §5
