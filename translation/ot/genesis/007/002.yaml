id: GEN.7.2
reference: Genesis 7:2
source:
  edition: WLC
  text: מִ/כֹּ֣ל הַ/בְּהֵמָ֣ה הַ/טְּהוֹרָ֗ה תִּֽקַּח לְ/ךָ֛ שִׁבְעָ֥ה שִׁבְעָ֖ה אִ֣ישׁ
    וְ/אִשְׁתּ֑/וֹ וּ/מִן הַ/בְּהֵמָ֡ה אֲ֠שֶׁר לֹ֣א טְהֹרָ֥ה הִ֛וא שְׁנַ֖יִם אִ֥ישׁ
    וְ/אִשְׁתּֽ/וֹ׀־־׃
translation:
  text: From every clean animal you shall take for yourself seven pairs, a male and
    its mate; and from the animals that are not clean, two, a male and its mate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'seven seven, a male and its mate'; this likely means seven
      pairs, though some understand it as seven individual animals.
    reason: alternative_reading
  - marker: b
    text: Or 'unclean animals.' The Hebrew says 'the animals that are not clean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל
  chosen: From every
  alternatives:
  - Of every
  - From all
  lexicon: HALOT
  rationale: 'The preposition מִן with כֹּל introduces the source set: ''from every/all.''
    ''From every'' is idiomatic in English and fits the distributive sense with the
    following singular collective noun.'
- source_word: הַבְּהֵמָה
  chosen: animal / animals
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal, often domesticated quadrupeds broadly.
    'Animal' is the clearest modern English choice here and avoids the narrower sense
    of 'livestock' and the archaic tone of 'beast.' The first occurrence is rendered
    singular in a distributive construction ('every clean animal'); the second pluralizes
    naturally in English ('the animals that are not clean').
- source_word: הַטְּהוֹרָה
  chosen: clean
  alternatives:
  - pure
  - ceremonially clean
  lexicon: HALOT
  rationale: טָהוֹר here contrasts with 'not clean' and refers to the clean/unclean
    distinction. 'Clean' is the standard concise rendering; 'ceremonially clean' would
    over-specify in the main text.
- source_word: תִּקַּח לְךָ
  chosen: you shall take for yourself
  alternatives:
  - you shall take
  - take for yourself
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction. Including 'for yourself'
    reflects לְךָ, which is present in the Hebrew and should not be omitted, though
    it may be semantically light.
- source_word: שִׁבְעָה שִׁבְעָה
  chosen: seven pairs
  alternatives:
  - seven and seven
  - seven each
  - seven, male and female
  lexicon: HALOT
  rationale: The repeated numeral is idiomatic Hebrew indicating grouping/distribution.
    In context, followed by 'a male and its mate,' it most naturally means seven pairs
    rather than merely seven individuals. This is clearer modern English while staying
    close to the sense.
- source_word: אִישׁ וְאִשְׁתּוֹ
  chosen: a male and its mate
  alternatives:
  - male and female
  - a man and his wife
  lexicon: HALOT
  rationale: Though literally 'man and his woman/wife,' with animals this is an idiomatic
    way to indicate sex pairing. 'A male and its mate' is natural English for animals
    and avoids the misleading anthropomorphic 'man and his wife.'
- source_word: וּמִן הַבְּהֵמָה אֲשֶׁר לֹא טְהֹרָה הִוא
  chosen: and from the animals that are not clean
  alternatives:
  - and from the unclean animals
  - but from the animals that are not clean
  lexicon: HALOT
  rationale: The Hebrew expresses the negative analytically ('that is not clean')
    rather than with a single antonym. Rendering it as 'not clean' preserves that
    wording. The plural 'animals' is idiomatic after the collective singular in English.
- source_word: שְׁנַיִם
  chosen: two
  alternatives:
  - two animals
  - one pair
  lexicon: HALOT
  rationale: The numeral means 'two.' Because the following phrase specifies the sexed
    pair, 'two' is sufficient and mirrors the Hebrew closely.
