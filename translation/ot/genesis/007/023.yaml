id: GEN.7.23
reference: Genesis 7:23
source:
  edition: WLC
  text: וַ/יִּ֜מַח אֶֽת כָּל הַ/יְק֣וּם אֲשֶׁ֣ר עַל פְּנֵ֣י הָֽ/אֲדָמָ֗ה מֵ/אָדָ֤ם
    עַד בְּהֵמָה֙ עַד רֶ֨מֶשׂ֙ וְ/עַד ע֣וֹף הַ/שָּׁמַ֔יִם וַ/יִּמָּח֖וּ מִן הָ/אָ֑רֶץ
    וַ/יִשָּׁ֧אֶר אַךְ נֹ֛חַ וַֽ/אֲשֶׁ֥ר אִתּ֖/וֹ בַּ/תֵּבָֽה־־׀׀־־־־־־׃
translation:
  text: He blotted out every living thing that was on the face of the ground, from
    man to livestock to creeping things and to the birds of the heavens. They were
    blotted out from the earth, and only Noah was left, and those who were with him
    in the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wiped out' for the verb translated 'blotted out'; the Hebrew verb carries
      the imagery of wiping away or erasing.
    reason: lexical_alternative
  - marker: b
    text: '''From man'' translates Hebrew adam here in a representative sense for
      humanity; ''from humankind'' is also possible.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמַח / וַיִּמָּחוּ
  chosen: blotted out / were blotted out
  alternatives:
  - wiped out
  - destroyed
  - erased
  lexicon: HALOT
  rationale: The verb מחה commonly carries the sense of wiping or blotting out. 'Blotted
    out' preserves the imagery better than the flatter 'destroyed,' while still reading
    naturally in English. The passive-like second clause is rendered 'were blotted
    out' to reflect the Niphal form.
- source_word: כָּל הַיְקוּם
  chosen: every living thing
  alternatives:
  - all existence
  - every creature
  - all that lived
  lexicon: HALOT
  rationale: היקום here denotes that which stands/exists, in flood context referring
    to all living beings on land rather than abstract 'existence.' 'Every living thing'
    is idiomatic and contextually precise.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the ground
  alternatives:
  - from the face of the ground
  - on the surface of the ground
  lexicon: HALOT
  rationale: The phrase is a common Hebrew idiom. 'On the face of the ground' preserves
    the Hebrew image with acceptable English clarity. Here it modifies what was blotted
    out.
- source_word: מֵאָדָם
  chosen: from man
  alternatives:
  - from humankind
  - from mankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it begins
    a merism/listing of creature categories, and singular 'man' matches the Hebrew
    form and representative sense better than a pluralized abstraction.
- source_word: בְּהֵמָה
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: HALOT
  rationale: '''Livestock'' is clear modern English for domesticated land animals
    and avoids the narrower ''cattle'' and the archaic/broader ''beasts.'''
- source_word: רֶמֶשׂ
  chosen: creeping things
  alternatives:
  - creeping creatures
  - swarming things
  lexicon: HALOT
  rationale: This term refers to small ground-creatures that move close to the ground.
    'Creeping things' is a standard and understandable rendering in Genesis contexts.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - flying creatures of the heavens
  lexicon: HALOT
  rationale: '''Birds of the heavens'' keeps the Hebrew genitive and echoes Genesis
    style. ''Sky'' would also be possible, but ''heavens'' preserves the literary
    register without becoming archaic.'
- source_word: מִן הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In the flood narrative's global framing,
    'earth' is the better choice here.
- source_word: וַיִּשָּׁאֶר אַךְ נֹחַ
  chosen: only Noah was left
  alternatives:
  - Noah alone remained
  - only Noah remained
  lexicon: HALOT
  rationale: This rendering captures both the restrictive particle אַךְ ('only') and
    the verb שׁאר ('remain, be left') in natural English.
- source_word: וַאֲשֶׁר אִתּוֹ בַּתֵּבָה
  chosen: and those who were with him in the ark
  alternatives:
  - and what was with him in the ark
  - and whoever was with him in the ark
  lexicon: HALOT
  rationale: The relative clause refers to the companions with Noah in the ark. 'Those
    who were with him' makes the implied personal reference explicit and natural in
    English; 'ark' is the standard rendering of תֵּבָה in the Noah narrative.
