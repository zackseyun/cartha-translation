theological_decisions:
- issue: Scope of the destruction in flood language
  chosen_reading: Render the verse straightforwardly as describing the blotting out
    of all land-dwelling living things named in the text, without softening or expanding
    the claim beyond the verse's wording.
  alternative_readings:
  - Interpret as hyperbolic regional language
  - Interpret as an explicitly global scientific statement
  rationale: The translation should preserve the narrative force of the Hebrew without
    importing a harmonizing stance on debates about the flood's extent. 'From the
    earth' and the listed creature categories are translated directly, leaving interpretive
    conclusions to readers.
  doctrine_reference: Preserve theological tension rather than resolve it.
