id: GEN.7.16
reference: Genesis 7:16
source:
  edition: WLC
  text: וְ/הַ/בָּאִ֗ים זָכָ֨ר וּ/נְקֵבָ֤ה מִ/כָּל בָּשָׂר֙ בָּ֔אוּ כַּֽ/אֲשֶׁ֛ר צִוָּ֥ה אֹת֖/וֹ אֱלֹהִ֑ים וַ/יִּסְגֹּ֥ר יְהוָ֖ה בַּֽעֲדֽ/וֹ־׃
translation:
  text: And those that entered, male and female of all flesh, entered as God had commanded him; and Yahweh shut him in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those entering' or 'the ones that came in.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from all flesh,' a collective expression for living creatures.
    reason: cultural_note
  - marker: c
    text: Or 'the LORD shut behind him.' The Hebrew does not explicitly state 'the door,' though that is implied by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבָּאִים
  chosen: Those that entered
  alternatives:
  - those entering
  - the ones that came in
  lexicon: HALOT
  rationale: Substantival participle with article, referring to the animals entering the ark. 'Those that entered' is natural English and preserves the referential force without over-paraphrase.
- source_word: זָכָר וּנְקֵבָה
  chosen: male and female
  alternatives:
  - a male and a female
  lexicon: HALOT
  rationale: Standard pair denoting sex distinction. 'Male and female' is concise and idiomatic, matching the Hebrew categories.
- source_word: מִכָּל בָּשָׂר
  chosen: from all flesh
  alternatives:
  - of all flesh
  - from every living creature
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh' here as a collective for living creatures. 'From all flesh' preserves the Hebrew expression; 'living creature' would be interpretive expansion beyond the immediate wording.
- source_word: בָּאוּ
  chosen: entered
  alternatives:
  - came
  - went in
  lexicon: HALOT
  rationale: In ark context, English 'entered' communicates the motion clearly and idiomatically. 'Came' alone is too vague; 'went in' is possible but slightly less smooth with the substantival participle.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: 'Introduces manner/comparison: they entered in accordance with the divine command. ''As'' is sufficient and natural.'
- source_word: צִוָּה אֹתוֹ אֱלֹהִים
  chosen: God had commanded him
  alternatives:
  - God commanded him
  - God had instructed him
  lexicon: HALOT
  rationale: 'The verb denotes command. English past perfect fits the sequence naturally: the entry occurred in accordance with a prior command.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the common divine title refers to Israel's God in narrative prose; 'God' is the standard English equivalent.
- source_word: וַיִּסְגֹּר
  chosen: shut
  alternatives:
  - closed
  - shut up
  lexicon: HALOT
  rationale: The verb means to shut/close. 'Shut' preserves the vividness and traditional force without sounding archaic in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּעֲדוֹ
  chosen: him in
  alternatives:
  - behind him
  - around him
  - the door behind him
  lexicon: HALOT
  rationale: The preposition בעד with סגר in this context means to shut on behalf of/behind someone, idiomatically 'shut him in.' This captures the sense without adding an explicit object like 'the door,' which is not stated in the Hebrew.
