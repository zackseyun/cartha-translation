theological_decisions:
- issue: Rendering of הָאָדָם
  chosen_reading: all mankind
  alternative_readings:
  - all humanity
  - every man
  rationale: The Hebrew uses אָדָם collectively for the human race. The translation
    follows the doctrine's default of 'man / humankind' according to context, choosing
    'mankind' as a collective term that reflects the representative force without
    reducing the phrase to individual males only.
