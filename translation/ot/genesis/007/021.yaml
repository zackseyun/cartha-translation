id: GEN.7.21
reference: Genesis 7:21
source:
  edition: WLC
  text: וַ/יִּגְוַ֞ע כָּל בָּשָׂ֣ר הָ/רֹמֵ֣שׂ עַל הָ/אָ֗רֶץ בָּ/ע֤וֹף וּ/בַ/בְּהֵמָה֙
    וּ/בַ֣/חַיָּ֔ה וּ/בְ/כָל הַ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֣ץ עַל הָ/אָ֑רֶץ וְ/כֹ֖ל הָ/אָדָֽם־׀־־־׃
translation:
  text: 'And all flesh that moved on the earth died: birds, livestock, wild animals,
    every swarming thing that swarms on the earth, and all mankind.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity.' Hebrew 'all the adam,' meaning the human race collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְוַע
  chosen: died
  alternatives:
  - perished
  - expired
  lexicon: HALOT
  rationale: The verb גוע commonly denotes dying or expiring. In clear modern English,
    'died' best conveys the event without archaic coloring. 'Perished' is possible,
    but 'died' is the more direct lexical equivalent here.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - every living creature
  - all living beings
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew idiom while remaining
    understandable in context. Here it refers broadly to animate earthly life listed
    afterward. 'All flesh' also matches the repeated flood-context usage in Genesis.
- source_word: הָרֹמֵשׂ
  chosen: that moved
  alternatives:
  - that creeps
  - that moves
  lexicon: HALOT
  rationale: The participle from רמש can denote moving, creeping, or swarming depending
    on context. Because the following list includes birds, livestock, wild animals,
    and swarming things, a broader term is needed here; 'that moved' avoids narrowing
    the reference to only creeping creatures.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: HALOT
  rationale: '''On the earth'' is the most natural rendering and fits the global flood
    context. ''Land'' is possible in some contexts, but here ''earth'' better matches
    the scope of the narrative.'
- source_word: בָּעוֹף
  chosen: birds
  alternatives:
  - flying creatures
  - fowl
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this list 'birds' is
    the most idiomatic and sufficiently accurate English rendering.
- source_word: וּבַבְּהֵמָה
  chosen: livestock
  alternatives:
  - cattle
  - domestic animals
  lexicon: HALOT
  rationale: בְּהֵמָה in this classification refers to domesticated land animals.
    'Livestock' is modern, natural English and preserves the category distinction.
- source_word: וּבַחַיָּה
  chosen: wild animals
  alternatives:
  - beasts
  - living creatures
  lexicon: HALOT
  rationale: In contrast with livestock, חַיָּה here denotes undomesticated land animals.
    'Wild animals' communicates the category clearly in contemporary English; 'beasts'
    is less precise and more archaic.
- source_word: וּבְכָל הַשֶּׁרֶץ
  chosen: every swarming thing
  alternatives:
  - every creeping thing
  - every teeming creature
  lexicon: HALOT
  rationale: שֶׁרֶץ refers to small creatures that swarm or teem. 'Swarming thing'
    preserves the lexical link with the following participle and avoids the overly
    narrow English sense of 'creeping thing'.
- source_word: הַשֹּׁרֵץ
  chosen: that swarms
  alternatives:
  - that creeps
  - that teems
  lexicon: HALOT
  rationale: Rendering the cognate participle with 'that swarms' preserves the Hebrew
    wordplay and repetition between noun and participle.
- source_word: וְכֹל הָאָדָם
  chosen: and all mankind
  alternatives:
  - and every man
  - and all humanity
  lexicon: HALOT
  rationale: Per the doctrine guidance on אָדָם, the term may mean 'man' or 'humankind'
    depending on context. Here it refers collectively to human beings in general,
    not to an individual male, so 'all mankind' is gender-accurate to the representative
    sense and preserves the solemn register of the passage.
