theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The Hebrew noun can denote either 'land' or 'earth.' In the immediate
    flood narrative, the broader sense 'earth' best fits the context and traditional
    understanding without adding doctrinal interpretation beyond the text. This is
    a contextual lexical decision rather than a sectarian theological one.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
