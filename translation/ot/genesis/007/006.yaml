id: GEN.7.6
reference: Genesis 7:6
source:
  edition: WLC
  text: וְ/נֹ֕חַ בֶּן שֵׁ֥שׁ מֵא֖וֹת שָׁנָ֑ה וְ/הַ/מַּבּ֣וּל הָיָ֔ה מַ֖יִם עַל הָ/אָֽרֶץ־־׃
translation:
  text: Now Noah was six hundred years old when the floodwaters came upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Noah was six hundred years old, and the flood was waters upon the
      earth.' The Hebrew is more literally structured, but the main text gives the
      idiomatic sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land' instead of 'the earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/נֹחַ
  chosen: Now Noah
  alternatives:
  - And Noah
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply as 'and,' but in English narrative
    style here 'Now' smoothly marks a transition while preserving the discourse-linking
    force. 'Noah' is a personal name and is therefore transliterated, per translation
    philosophy.
- source_word: בֶּן שֵׁשׁ מֵאוֹת שָׁנָה
  chosen: was six hundred years old
  alternatives:
  - was a son of six hundred years
  - was six hundred years of age
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'a son of six hundred years,' a standard
    age expression. Idiomatic English requires 'was six hundred years old' or equivalent.
    This preserves the plain sense without wooden literalism.
- source_word: וְ/הַ/מַּבּוּל
  chosen: the floodwaters
  alternatives:
  - the flood
  - the deluge
  lexicon: HALOT
  rationale: מַבּוּל refers specifically to the great flood. Because the following
    predicate includes 'waters,' rendering the subject as 'the floodwaters' produces
    natural English and reflects the watery character explicit in the Hebrew clause.
    'The flood' is possible, but can sound slightly less connected to the following
    מַיִם.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: 'The verb is formally ''was,'' but the clause ''the flood was waters
    upon the earth'' is awkward in English. Rendering with ''came'' expresses the
    eventive force implied by the construction in context: the floodwaters arrived
    upon the earth. This is an optimal-equivalence adjustment for intelligibility.'
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: Though often a plural form with singular sense, here 'waters' is the
    more natural and vivid English rendering in flood context and aligns with the
    Hebrew form and imagery.
- source_word: עַל הָאָרֶץ
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the land
  lexicon: HALOT
  rationale: עַל is straightforwardly 'upon/on.' הָאָרֶץ can mean 'earth' or 'land';
    in the universal flood context of Genesis 6–9, 'earth' is the better contextual
    rendering. 'Upon' preserves a slightly elevated but still readable style suitable
    to the narrative.
