id: GEN.7.9
reference: Genesis 7:9
source:
  edition: WLC
  text: שְׁנַ֨יִם שְׁנַ֜יִם בָּ֧אוּ אֶל נֹ֛חַ אֶל הַ/תֵּבָ֖ה זָכָ֣ר וּ/נְקֵבָ֑ה כַּֽ/אֲשֶׁ֛ר צִוָּ֥ה אֱלֹהִ֖ים אֶת נֹֽחַ־־־׃
translation:
  text: Two by two, they came to Noah and into the ark, male and female, just as God had commanded Noah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in pairs' or more formally 'two and two.'
    reason: lexical_alternative
  - marker: b
    text: Or 'They came to Noah, two by two, into the ark'.
    reason: previous_rendering
lexical_decisions:
- source_word: שְׁנַיִם שְׁנַיִם
  chosen: two by two
  alternatives:
  - in pairs
  - two and two
  lexicon: HALOT
  rationale: The repeated numeral idiomatically expresses pairing. 'Two by two' is natural modern English and preserves the distributive force better than a wooden repetition.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - entered
  - went
  lexicon: HALOT
  rationale: The verb is the common 'come/go in' verb בוא. With the following prepositional phrases, 'came' best preserves the narrative perspective toward Noah; 'entered' would frontload the result rather than the motion.
- source_word: אֶל נֹחַ
  chosen: to Noah
  alternatives:
  - unto Noah
  lexicon: HALOT
  rationale: אֶל marks movement toward Noah. 'To Noah' is the plain modern equivalent.
- source_word: אֶל הַתֵּבָה
  chosen: into the ark
  alternatives:
  - to the ark
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this motion context with the ark as destination, English idiom prefers 'into the ark' to convey actual entry. This is an optimal-equivalence adjustment for clarity.
- source_word: זָכָר וּנְקֵבָה
  chosen: male and female
  alternatives:
  - a male and a female
  lexicon: HALOT
  rationale: This is the standard biological pair designation in the Hebrew text. 'Male and female' is concise, accurate, and preserves the source's wording without unnecessary expansion.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: The comparative particle introduces conformity to God's command. 'Just as' clearly expresses exact correspondence.
- source_word: צִוָּה אֱלֹהִים
  chosen: God had commanded
  alternatives:
  - God commanded
  lexicon: HALOT
  rationale: The Hebrew perfect refers to prior action relative to the animals' coming. English past perfect fits the sequence smoothly in context.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the one true God, not 'gods' or a divine council member. 'God' is the standard singular rendering in this narrative context.
