theological_decisions:
- issue: Agency in the animals' arrival
  chosen_reading: The verse states that the animals came to Noah in obedience to God's prior command, without specifying mechanism beyond divine command.
  alternative_readings:
  - The animals came by instinct alone
  - The animals were gathered solely by Noah's effort
  rationale: The wording emphasizes that they came to Noah and did so in accordance with God's command. The translation preserves that theological emphasis without adding explanation not present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/007/009.json
  category: awkward_english
  tier: 1
  from: They came to Noah, two by two, into the ark
  to: Two by two, they came to Noah and into the ark
  rationale: The current word order places the adverbial phrase 'two by two' between the two destinations ('to Noah' and 'into the ark'), creating a slightly disjointed and awkward sentence. The Hebrew text places 'two by two' (שְׁנַיִם שְׁנַיִם) at the beginning of the clause for emphasis. Moving it to the front in English ('Two by two, they came...') both improves the flow and mirrors the source text's emphasis. Adding 'and' better connects the two destinations, which are presented in parallel in the Hebrew.
