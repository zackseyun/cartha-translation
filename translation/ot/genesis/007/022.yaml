id: GEN.7.22
reference: Genesis 7:22
source:
  edition: WLC
  text: כֹּ֡ל אֲשֶׁר֩ נִשְׁמַת ר֨וּחַ חַיִּ֜ים בְּ/אַפָּ֗י/ו מִ/כֹּ֛ל אֲשֶׁ֥ר בֶּ/חָֽרָבָ֖ה
    מֵֽתוּ־׃
translation:
  text: Everything on the dry land in whose nostrils was the breath of the spirit
    of life died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the breath of life'; Hebrew literally, 'the breath of the spirit of
      life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the breath of the spirit of life'.
    reason: previous_rendering
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  chosen: Everything ... that
  alternatives:
  - All ... that
  - Everyone ... who
  lexicon: HALOT
  rationale: The construction is comprehensive and refers to all qualifying beings.
    'Everything ... that' fits the non-personal scope here, since the verse includes
    animals as well as humans.
- source_word: נִשְׁמַת
  chosen: breath
  alternatives:
  - breathing
  - blast
  lexicon: HALOT
  rationale: נשמה commonly denotes breath/breathing, especially life-breath. 'Breath'
    is the most natural English rendering in this collocation.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - wind
  lexicon: HALOT
  rationale: In the phrase נִשְׁמַת רוּחַ חַיִּים, רוּחַ can overlap semantically
    with 'breath,' but retaining 'spirit' preserves the fuller Hebrew expression and
    avoids flattening the doublet. The phrase thus becomes 'the breath of the spirit
    of life.'
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, the noun often functions idiomatically
    as 'life.' Singular English is most natural in this genitival chain.
- source_word: בְּאַפָּיו
  chosen: in its nostrils
  alternatives:
  - in his nostrils
  - in their nostrils
  lexicon: HALOT
  rationale: 'The Hebrew form is singular with 3ms suffix (''in his nostrils''), but
    distributive singular is being used collectively. English idiom prefers a collective
    singular with non-personal antecedent here: ''in its nostrils.'''
- source_word: מִכֹּל אֲשֶׁר בֶּחָרָבָה
  chosen: on the dry land
  alternatives:
  - from all that was on the dry ground
  - among all that were on the dry land
  lexicon: HALOT
  rationale: The phrase narrows the scope to land-dwelling creatures, contrasting
    them with aquatic life. 'On the dry land' is concise and idiomatic while preserving
    the sense.
- source_word: חָרָבָה
  chosen: dry land
  alternatives:
  - dry ground
  - land
  lexicon: HALOT
  rationale: The term denotes dry ground/land as opposed to water-covered areas. 'Dry
    land' echoes the flood context clearly.
- source_word: מֵתוּ
  chosen: died
  alternatives:
  - were dead
  - perished
  lexicon: HALOT
  rationale: The qatal verb straightforwardly states death as the result. 'Died' is
    the plain and direct rendering.
