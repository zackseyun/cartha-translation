id: GEN.7.3
reference: Genesis 7:3
source:
  edition: WLC
  text: גַּ֣ם מֵ/ע֧וֹף הַ/שָּׁמַ֛יִם שִׁבְעָ֥ה שִׁבְעָ֖ה זָכָ֣ר וּ/נְקֵבָ֑ה לְ/חַיּ֥וֹת
    זֶ֖רַע עַל פְּנֵ֥י כָל הָ/אָֽרֶץ־־׃
translation:
  text: Also from the birds of the sky, seven and seven, male and female, to keep
    offspring alive on the face of all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven pairs.' The Hebrew literally reads 'seven, seven,' a distributive
      expression that may be understood as seven of each kind or seven pairs; the
      main text preserves the Hebrew form more closely.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Adds this category to the previous command about animals; 'also' naturally
    conveys continuation without overtranslating.
- source_word: מֵעוֹף הַשָּׁמַיִם
  chosen: from the birds of the sky
  alternatives:
  - from the birds of the heavens
  - from the fowl of the sky
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures/birds; in this context 'birds' is the most
    natural English rendering. הַשָּׁמַיִם is literally 'the heavens/sky'; 'sky' is
    idiomatic in English here while preserving the sense.
- source_word: שִׁבְעָה שִׁבְעָה
  chosen: seven and seven
  alternatives:
  - seven pairs
  - by sevens
  lexicon: HALOT
  rationale: The Hebrew repeats the numeral for distributive force. 'Seven and seven'
    preserves the form closely and avoids prematurely resolving whether the phrase
    should be paraphrased as 'seven pairs' or simply 'by sevens.'
- source_word: זָכָר וּנְקֵבָה
  chosen: male and female
  alternatives:
  - a male and its female
  lexicon: HALOT
  rationale: This is the standard sex-pairing expression in Genesis. 'Male and female'
    is direct, natural, and preserves the binary pairing stated in the Hebrew.
- source_word: לְחַיּוֹת
  chosen: to keep ... alive
  alternatives:
  - to preserve alive
  - to let live
  lexicon: HALOT
  rationale: Infinitive of חיה in the Hiphil conveys causing/preserving life. 'To
    keep ... alive' is clear modern English and fits the purpose clause.
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: While literally 'seed,' in this context it refers to continuing animal
    life after the flood. 'Offspring' communicates the biological sense clearly without
    archaic ambiguity.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  chosen: on the face of all the earth
  alternatives:
  - over the face of all the earth
  - throughout all the earth
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. Retaining 'on the face of all the earth'
    preserves the imagery and familiar biblical cadence while remaining understandable.
