id: GEN.7.18
reference: Genesis 7:18
source:
  edition: WLC
  text: וַ/יִּגְבְּר֥וּ הַ/מַּ֛יִם וַ/יִּרְבּ֥וּ מְאֹ֖ד עַל הָ/אָ֑רֶץ וַ/תֵּ֥לֶךְ
    הַ/תֵּבָ֖ה עַל פְּנֵ֥י הַ/מָּֽיִם־־׃
translation:
  text: The waters prevailed and increased greatly over the earth, and the ark moved
    along on the surface of the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'floated on the face of the waters.' The Hebrew literally says 'went
      on the face of the waters,' an idiom for movement on the water's surface.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבְּרוּ
  chosen: prevailed
  alternatives:
  - grew mighty
  - rose powerfully
  - became strong
  lexicon: HALOT
  rationale: From גבר, conveying becoming strong or prevailing. 'Prevailed' preserves
    the sense of overpowering force often used in the flood narrative, more precise
    than simply 'rose.'
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew plural form is naturally rendered 'the waters' in English, especially
    in flood context.
- source_word: וַיִּרְבּוּ מְאֹד
  chosen: increased greatly
  alternatives:
  - multiplied exceedingly
  - became very many
  lexicon: HALOT
  rationale: רבה with מְאֹד intensifies the idea of increase. 'Increased greatly'
    is idiomatic modern English and preserves the emphatic force.
- source_word: עַל הָאָרֶץ
  chosen: over the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In the global flood narrative context,
    'earth' best matches the scope and standard usage here.
- source_word: וַתֵּלֶךְ
  chosen: moved along
  alternatives:
  - went
  - drifted
  - floated along
  lexicon: HALOT
  rationale: הלך literally means 'went,' but with the ark as subject on floodwaters,
    English requires a natural equivalent. 'Moved along' preserves motion without
    over-specifying mechanism beyond the text.
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: Established and contextually accurate rendering for תבה in the Noah narrative.
- source_word: עַל פְּנֵי הַמָּיִם
  chosen: on the surface of the waters
  alternatives:
  - upon the face of the waters
  - on the waters
  lexicon: HALOT
  rationale: פְּנֵי literally 'face of' is an idiom for surface. 'On the surface of
    the waters' communicates the Hebrew sense clearly in modern English.
