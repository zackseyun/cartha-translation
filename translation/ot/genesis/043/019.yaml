id: GEN.43.19
reference: Genesis 43:19
source:
  edition: WLC
  text: וַֽ/יִּגְּשׁוּ֙ אֶל הָ/אִ֔ישׁ אֲשֶׁ֖ר עַל בֵּ֣ית יוֹסֵ֑ף וַ/יְדַבְּר֥וּ אֵלָ֖י/ו
    פֶּ֥תַח הַ/בָּֽיִת־־׃
translation:
  text: So they approached the man who was over Joseph’s household and spoke to him
    at the entrance of the house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the doorway of the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: approached
  alternatives:
  - came near
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ in the wayyiqtol narrative form denotes moving near to
    someone. 'Approached' is natural modern English and preserves the directional
    sense without sounding archaic like 'drew near.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the steward
  - the servant
  lexicon: HALOT
  rationale: The Hebrew says simply 'the man.' Although context identifies him as
    Joseph's household manager, the text itself does not use a more specific occupational
    term here, so the translation preserves the plain wording.
- source_word: אֲשֶׁר עַל בֵּית יוֹסֵף
  chosen: who was over Joseph’s household
  alternatives:
  - who was in charge of Joseph’s house
  - who was over the house of Joseph
  lexicon: HALOT
  rationale: The construction with עַל conveys authority or oversight. 'Over Joseph’s
    household' is idiomatic English that preserves the sense of administrative responsibility.
    'Household' is preferable to bare 'house' here because the phrase refers to the
    domestic establishment, not merely the building.
- source_word: וַיְדַבְּרוּ אֵלָיו
  chosen: and spoke to him
  alternatives:
  - and said to him
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to.' Since the next verse gives the
    content of their speech, 'spoke to him' is the more precise narrative bridge here.
- source_word: פֶּתַח הַבָּיִת
  chosen: at the entrance of the house
  alternatives:
  - at the doorway of the house
  - at the entrance to the house
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening, entrance, or doorway. 'Entrance of the house'
    is clear and natural, and it fits the scene of speaking before going fully inside.
