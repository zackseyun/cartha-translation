id: GEN.43.18
reference: Genesis 43:18
source:
  edition: WLC
  text: וַ/יִּֽירְא֣וּ הָֽ/אֲנָשִׁ֗ים כִּ֣י הֽוּבְאוּ֮ בֵּ֣ית יוֹסֵף֒ וַ/יֹּאמְר֗וּ
    עַל דְּבַ֤ר הַ/כֶּ֨סֶף֙ הַ/שָּׁ֤ב בְּ/אַמְתְּחֹתֵ֨י/נוּ֙ בַּ/תְּחִלָּ֔ה אֲנַ֖חְנוּ
    מֽוּבָאִ֑ים לְ/הִתְגֹּלֵ֤ל עָלֵ֨י/נוּ֙ וּ/לְ/הִתְנַפֵּ֣ל עָלֵ֔י/נוּ וְ/לָ/קַ֧חַת
    אֹתָ֛/נוּ לַ/עֲבָדִ֖ים וְ/אֶת חֲמֹרֵֽי/נוּ־־׃
translation:
  text: The men were afraid because they had been brought into Joseph’s house, and
    they said, “It is because of the money that was returned in our sacks the first
    time that we are being brought in, so that he may make a pretext against us and
    fall upon us and take us as slaves, along with our donkeys.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that he may seek an occasion against us.' The Hebrew expression behind
      'make a pretext against us' is idiomatic and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: were afraid
  alternatives:
  - feared
  - became afraid
  lexicon: HALOT
  rationale: From ירא in the waw-consecutive imperfect, narrating their emotional
    response. 'Were afraid' is natural modern English and preserves the sense without
    archaic stiffness.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the menfolk
  - the people
  lexicon: HALOT
  rationale: Refers specifically to Joseph's brothers and companions as male persons,
    so 'the men' is gender-accurate and contextually precise.
- source_word: הוּבְאוּ
  chosen: had been brought
  alternatives:
  - were brought
  - had been taken
  lexicon: HALOT
  rationale: 'Hophal of בוא, passive/causative: they were caused to enter. English
    pluperfect fits the causal clause after ''because'' in narrative sequence.'
- source_word: בֵּית יוֹסֵף
  chosen: Joseph’s house
  alternatives:
  - the house of Joseph
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in English while preserving the
    possessive sense.
- source_word: עַל דְּבַר הַכֶּסֶף
  chosen: because of the money
  alternatives:
  - on account of the money
  - concerning the money
  lexicon: HALOT
  rationale: The idiom עַל דְּבַר here expresses cause or occasion, not mere topic.
    'Because of' best fits the brothers' fearful inference.
- source_word: הַשָּׁב
  chosen: that was returned
  alternatives:
  - that came back
  - that had been returned
  lexicon: HALOT
  rationale: Passive/resultative sense from שוב modifying 'money.' 'Returned' is the
    clearest idiomatic rendering in context.
- source_word: בְּאַמְתְּחֹתֵינוּ
  chosen: in our sacks
  alternatives:
  - in our bags
  - in our packs
  lexicon: HALOT
  rationale: אַמְתַּחַת denotes a grain/travel sack. 'Sacks' fits the Genesis travel
    context better than the more generic 'bags.'
- source_word: בַּתְּחִלָּה
  chosen: the first time
  alternatives:
  - at the beginning
  - initially
  lexicon: HALOT
  rationale: In this narrative context it refers to their earlier trip to Egypt, so
    'the first time' communicates the temporal reference more clearly than a literal
    'at the beginning.'
- source_word: מוּבָאִים
  chosen: we are being brought in
  alternatives:
  - we are brought in
  - we are being brought
  lexicon: HALOT
  rationale: Passive participle of בוא. 'Being brought in' preserves the ongoing/passive
    nuance and links naturally to entry into the house.
- source_word: לְהִתְגֹּלֵל עָלֵינוּ
  chosen: so that he may make a pretext against us
  alternatives:
  - to roll himself upon us
  - to seek an occasion against us
  - to accuse us
  lexicon: HALOT
  rationale: The hitpael of גלל with עַל in this idiom is difficult; in context it
    conveys hostile maneuvering or trumping up a case against them. 'Make a pretext
    against us' captures the likely forensic/strategic sense better than a wooden
    literalism.
- source_word: וּלְהִתְנַפֵּל עָלֵינוּ
  chosen: and fall upon us
  alternatives:
  - and attack us
  - and throw himself upon us
  lexicon: HALOT
  rationale: Hitpael of נפל with עַל conveys hostile action. 'Fall upon us' is both
    literal enough and idiomatic in English, with attack implied by context.
- source_word: וְלָקַחַת אֹתָנוּ לַעֲבָדִים
  chosen: and take us as slaves
  alternatives:
  - and seize us for slaves
  - and take us as servants
  lexicon: HALOT
  rationale: The phrase indicates enslavement, not mere service. In line with the
    translation philosophy, 'slaves' preserves the bonded status more accurately than
    'servants.'
- source_word: וְאֶת חֲמֹרֵינוּ
  chosen: along with our donkeys
  alternatives:
  - and our donkeys
  lexicon: HALOT
  rationale: The direct-object continuation adds their animals to what would be seized.
    'Along with' makes the coordination explicit in smooth English.
