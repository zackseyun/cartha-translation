id: GEN.43.2
reference: Genesis 43:2
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּ/אֲשֶׁ֤ר כִּלּוּ֙ לֶ/אֱכֹ֣ל אֶת הַ/שֶּׁ֔בֶר אֲשֶׁ֥ר הֵבִ֖יאוּ
    מִ/מִּצְרָ֑יִם וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ אֲבִי/הֶ֔ם שֻׁ֖בוּ שִׁבְרוּ לָ֥/נוּ מְעַט
    אֹֽכֶל־־־׃
translation:
  text: And when they had finished eating the grain that they had brought from Egypt,
    their father said to them, “Go back; buy us a little food.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Return; buy us a little grain.” The Hebrew uses a verb often associated
      in this context with purchasing grain, though the object here is the broader
      term “food.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - Now when
  - And it happened, when
  lexicon: HALOT
  rationale: The narrative formula introduces the next event. 'And when' preserves
    the Hebrew sequencing without sounding wooden; 'it happened' is more formal but
    less natural in modern English.
- source_word: כִּלּוּ לֶאֱכֹל
  chosen: they had finished eating
  alternatives:
  - they finished eating
  - they had consumed
  lexicon: HALOT
  rationale: The idiom combines כלה with an infinitive 'to eat,' expressing completion.
    The pluperfect-like English 'had finished eating' fits the narrative flow after
    the prior journey.
- source_word: הַשֶּׁבֶר
  chosen: the grain
  alternatives:
  - the food
  - the provisions
  - the corn
  lexicon: HALOT
  rationale: In the Joseph narrative שבר refers specifically to grain purchased during
    famine, not food in general. 'Grain' is the most precise modern rendering; 'corn'
    is archaic/regional in this context.
- source_word: הֵבִיאוּ מִמִּצְרָיִם
  chosen: they had brought from Egypt
  alternatives:
  - they brought from Egypt
  lexicon: HALOT
  rationale: English past perfect clarifies that the bringing preceded the finishing
    of the grain. 'Egypt' is the standard transliteration of מִצְרַיִם.
- source_word: אֲבִיהֶם
  chosen: their father
  lexicon: HALOT
  rationale: Straightforward possessive construction; no reason to substitute the
    proper name Jacob here since the Hebrew uses the relational term.
- source_word: שֻׁבוּ
  chosen: Go back
  alternatives:
  - Return
  - Go again
  lexicon: HALOT
  rationale: The imperative calls for a return trip. 'Go back' is natural modern English;
    'return' is slightly more formal.
- source_word: שִׁבְרוּ
  chosen: buy
  alternatives:
  - buy grain
  - purchase
  lexicon: HALOT
  rationale: The verb שבר in this context means to buy grain/provisions. Since the
    object is supplied afterward as 'a little food,' 'buy' is sufficient in English
    without over-specifying.
- source_word: לָנוּ
  chosen: us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: English idiom prefers 'buy us a little food,' though the dative sense
    'for us' is implicit.
- source_word: מְעַט אֹכֶל
  chosen: a little food
  alternatives:
  - a little something to eat
  - a small amount of food
  lexicon: HALOT
  rationale: מְעַט marks a small quantity, and אֹכֶל is general 'food.' 'A little
    food' is concise and faithful, preserving Jacob's modest request.
