id: GEN.43.15
reference: Genesis 43:15
source:
  edition: WLC
  text: וַ/יִּקְח֤וּ הָֽ/אֲנָשִׁים֙ אֶת הַ/מִּנְחָ֣ה הַ/זֹּ֔את וּ/מִשְׁנֶה כֶּ֛סֶף לָקְח֥וּ בְ/יָדָ֖/ם וְ/אֶת בִּנְיָמִ֑ן וַ/יָּקֻ֨מוּ֙ וַ/יֵּרְד֣וּ מִצְרַ֔יִם וַ/יַּֽעַמְד֖וּ לִ/פְנֵ֥י יוֹסֵֽף־־־׃
translation:
  text: So the men took this gift, and took double the money in their hand, and Benjamin. Then they arose and went down to Egypt and stood before Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'silver'; here used in the sense of money.
    reason: lexical_alternative
  - marker: b
    text: Or 'with them' for 'in their hand,' a Hebrew idiom for possession or carrying.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'went down to Egypt,' reflecting the standard geographical idiom from Canaan to Egypt.
    reason: cultural_note
  - marker: d
    text: Or 'and they took double the money'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִּנְחָה
  chosen: gift
  alternatives:
  - present
  - tribute
  - offering
  lexicon: HALOT
  rationale: In the Joseph narrative, מִנְחָה refers to the goods being brought to a superior as a conciliatory present, not a cultic offering. 'Gift' is natural modern English and fits the narrative context better than the more archaic 'present' or the more politically loaded 'tribute.'
- source_word: מִשְׁנֶה כֶּסֶף
  chosen: double the money
  alternatives:
  - a second amount of money
  - twice as much money
  lexicon: HALOT
  rationale: The construct phrase denotes a doubled amount of silver/money relative to the prior amount. 'Double the money' is concise and idiomatic while preserving the quantitative sense.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although the Hebrew term literally denotes 'silver,' in transactional contexts it commonly functions as 'money.' Here the brothers are carrying payment, so 'money' best conveys the sense in readable English.
- source_word: בְיָדָם
  chosen: in their hand
  alternatives:
  - with them
  - in their possession
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in their hand.' Retaining the singular 'hand' mirrors the Hebrew closely and remains understandable in English, while still conveying possession/carrying.
- source_word: וְאֶת בִּנְיָמִן
  chosen: and Benjamin
  alternatives:
  - along with Benjamin
  lexicon: HALOT
  rationale: The direct-object marker simply adds Benjamin to the list of what they took. 'And Benjamin' is the most direct rendering and preserves the Hebrew coordination.
- source_word: וַיָּקֻמוּ
  chosen: they arose
  alternatives:
  - they set out
  - they got up
  lexicon: HALOT
  rationale: The verb literally means 'rose/arose.' In travel narrative it can imply setting out, but 'they arose' preserves the sequence before 'went down to Egypt' without over-interpreting.
- source_word: וַיֵּרְדוּ מִצְרַיִם
  chosen: went down to Egypt
  alternatives:
  - traveled down to Egypt
  lexicon: HALOT
  rationale: '''Went down'' reflects the conventional Hebrew geographical idiom for travel from Canaan to Egypt and should be preserved in the main text.'
- source_word: וַיַּעַמְדוּ לִפְנֵי יוֹסֵף
  chosen: stood before Joseph
  alternatives:
  - presented themselves before Joseph
  - appeared before Joseph
  lexicon: HALOT
  rationale: The phrase is a standard expression for appearing in someone's presence. 'Stood before Joseph' is both literal and clear, preserving the formal posture before a ruler.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the brothers
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the men.' Although these are Joseph's brothers in context, the text's own designation should be retained.
