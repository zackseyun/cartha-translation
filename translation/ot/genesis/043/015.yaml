  from: and they took double the money
  to: and took double the money
  rationale: The Hebrew text uses the verb 'to take' (לקח) twice, which the draft mirrors with 'took... and they took...'. While this is a defensible formal correspondence, the inclusion of 'they' in the second phrase is redundant in English and makes the sentence slightly clunky. Since 'the men' is the established subject, removing the pronoun ('and took...') creates a more concise and parallel list of actions, improving the rhythm of the English sentence without altering the meaning.
