id: GEN.43.10
reference: Genesis 43:10
source:
  edition: WLC
  text: כִּ֖י לוּלֵ֣א הִתְמַהְמָ֑הְנוּ כִּֽי עַתָּ֥ה שַׁ֖בְנוּ זֶ֥ה פַעֲמָֽיִם־׃
translation:
  text: For if we had not delayed, by now we would have returned twice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if we had not lingered' or 'if we had not hesitated.' The Hebrew verb
      can denote delaying, lingering, or hesitating.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we would have returned this two times,' an idiom meaning 'we
      would have returned twice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - indeed
  - surely
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces Judah's explanation/reasoning to his father, so
    'For' best fits the discourse flow in English.
- source_word: לוּלֵא
  chosen: if ... not
  alternatives:
  - unless
  lexicon: HALOT
  rationale: לוּלֵא introduces a counterfactual condition. In idiomatic English with
    the following verb, 'if we had not' naturally conveys the unreal past condition.
- source_word: הִתְמַהְמָהְנוּ
  chosen: we had delayed
  alternatives:
  - we had lingered
  - we had hesitated
  - we had tarried
  lexicon: HALOT
  rationale: The hitmahmah form conveys delaying or lingering. 'Delayed' is clear
    modern English and fits the context of postponed departure.
- source_word: כִּי
  chosen: by now
  alternatives:
  - surely now
  - indeed now
  - for now
  lexicon: HALOT
  rationale: In the second clause כִּי works idiomatically with עַתָּה to mark the
    consequence of the unreal condition. Rather than a wooden repetition of 'for,'
    English is best served by expressing the sense as 'by now.'
- source_word: עַתָּה
  chosen: by now
  alternatives:
  - now
  - already by this time
  lexicon: HALOT
  rationale: Given the counterfactual context, עַתָּה points to the present moment
    viewed against what would already have happened; 'by now' captures that nuance
    better than simple 'now.'
- source_word: שַׁבְנוּ
  chosen: we would have returned
  alternatives:
  - we would have come back
  lexicon: HALOT
  rationale: Though morphologically a perfect, in this counterfactual construction
    it expresses the result that would have occurred. 'Would have returned' is the
    natural English equivalent.
- source_word: זֶה פַעֲמָיִם
  chosen: twice
  alternatives:
  - these two times
  - two times
  lexicon: HALOT
  rationale: The idiom זֶה פַעֲמָיִם means 'twice' or 'this second time.' In context
    Judah means they could already have completed two trips, so 'twice' is the most
    natural rendering.
