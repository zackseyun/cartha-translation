id: GEN.43.32
reference: Genesis 43:32
source:
  edition: WLC
  text: וַ/יָּשִׂ֥ימוּ ל֛/וֹ לְ/בַדּ֖/וֹ וְ/לָ/הֶ֣ם לְ/בַדָּ֑/ם וְ/לַ/מִּצְרִ֞ים הָ/אֹכְלִ֤ים
    אִתּ/וֹ֙ לְ/בַדָּ֔/ם כִּי֩ לֹ֨א יוּכְל֜וּ/ן הַ/מִּצְרִ֗ים לֶ/אֱכֹ֤ל אֶת הָֽ/עִבְרִים֙
    לֶ֔חֶם כִּי תוֹעֵבָ֥ה הִ֖וא לְ/מִצְרָֽיִם־־׃
translation:
  text: So they served him by himself, and them by themselves, and the Egyptians who
    ate with him by themselves, because the Egyptians could not eat bread with the
    Hebrews, for that is an abomination to the Egyptians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'eat bread with the Hebrews,' an idiom for sharing a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: they served
  alternatives:
  - they set
  - they placed
  lexicon: HALOT
  rationale: Although the verb is literally 'they placed/set,' in the dining context
    with indirect objects and repeated 'by themselves,' English idiom is better captured
    by 'they served,' referring to setting out the meal for each group.
- source_word: לְבַדּוֹ / לְבַדָּם
  chosen: by himself / by themselves
  alternatives:
  - alone
  - separately
  lexicon: HALOT
  rationale: The noun/adverbial expression conveys separateness. 'By himself/by themselves'
    preserves the repeated structure and the social separation emphasized in the Hebrew.
- source_word: הָאֹכְלִים אִתּוֹ
  chosen: who ate with him
  alternatives:
  - who were eating with him
  lexicon: HALOT
  rationale: The participle is rendered relatively in natural English. Simple past
    fits the narrative sequence without overcomplicating aspect.
- source_word: לֹא יוּכְלוּן
  chosen: could not
  alternatives:
  - were not able to
  lexicon: HALOT
  rationale: This expresses inability or social impossibility. 'Could not' is concise
    and natural while preserving the force.
- source_word: לֶאֱכֹל אֶת הָעִבְרִים לֶחֶם
  chosen: eat bread with the Hebrews
  alternatives:
  - eat with the Hebrews
  - share a meal with the Hebrews
  lexicon: HALOT
  rationale: Hebrew literally says 'eat bread' with the Hebrews, an idiom for taking
    a meal. Retaining 'eat bread' preserves the source wording and table-fellowship
    sense without paraphrasing too far.
- source_word: תוֹעֵבָה
  chosen: an abomination
  alternatives:
  - detestable thing
  - something detestable
  lexicon: HALOT
  rationale: This term regularly denotes something ritually or culturally detestable.
    'Abomination' is the established strong equivalent and fits the social taboo in
    context.
- source_word: מִצְרִים / הָעִבְרִים
  chosen: the Egyptians / the Hebrews
  alternatives:
  - Egyptians / Hebrews
  lexicon: HALOT
  rationale: The definite articles are represented in English where natural. These
    ethnonyms are important to the verse's contrast and social boundary.
