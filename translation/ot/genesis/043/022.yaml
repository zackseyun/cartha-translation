id: GEN.43.22
reference: Genesis 43:22
source:
  edition: WLC
  text: וְ/כֶ֧סֶף אַחֵ֛ר הוֹרַ֥דְנוּ בְ/יָדֵ֖/נוּ לִ/שְׁבָּר אֹ֑כֶל לֹ֣א יָדַ֔עְנוּ מִי שָׂ֥ם כַּסְפֵּ֖/נוּ בְּ/אַמְתְּחֹתֵֽי/נוּ־־׃
translation:
  text: And we have brought down other silver in our hands to buy food. We do not know who put our silver in our sacks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'money' for both occurrences of 'silver'; Hebrew כֶּסֶף can denote silver as metal or money as currency.
    reason: lexical_alternative
  - marker: b
    text: Or 'to buy grain'; the verb-object expression can refer specifically to purchasing grain, though 'food' reflects the broader noun used here.
    reason: lexical_alternative
  - marker: c
    text: Or 'in our hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/כֶסֶף
  chosen: And ... silver
  alternatives:
  - And ... money
  lexicon: HALOT
  rationale: כֶּסֶף literally denotes 'silver' and often functions as money. Here the brothers are speaking of payment for grain, but retaining 'silver' preserves the concrete Hebrew wording while remaining natural in English.
- source_word: אַחֵר
  chosen: other
  alternatives:
  - another
  - additional
  lexicon: HALOT
  rationale: אַחֵר marks this as a different/additional amount beyond the money previously discussed. 'Other' is concise and idiomatic with 'silver'.
- source_word: הוֹרַדְנוּ
  chosen: have brought down
  alternatives:
  - brought down
  - have taken down
  lexicon: HALOT
  rationale: The Hiphil of ירד means 'cause to go down, bring down.' In Genesis, travel from Canaan to Egypt is regularly described as 'going down,' so 'brought down' preserves the narrative geography. Present perfect English fits the brothers' report of completed action with present relevance.
- source_word: בְ/יָדֵ/נוּ
  chosen: in our hand
  alternatives:
  - with us
  - in our possession
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in our hand.' Singular 'hand' with a 1cp suffix is idiomatic in Hebrew. Keeping the singular preserves the idiom while remaining understandable in English.
- source_word: לִ/שְׁבָּר אֹכֶל
  chosen: to buy food
  alternatives:
  - to buy grain
  - to purchase food
  lexicon: HALOT
  rationale: The infinitive שׁבר in this context means buying provisions/grain. Because אֹכֶל is broader than 'grain' and the immediate concern is provisions, 'to buy food' is the best balanced rendering; 'grain' is possible but narrower than the Hebrew object.
- source_word: לֹא יָדַעְנוּ
  chosen: We do not know
  alternatives:
  - We did not know
  lexicon: HALOT
  rationale: A Hebrew perfect can express a present state resulting from prior ignorance. In direct speech here, 'We do not know' is the most natural English rendering of their present claim.
- source_word: מִי
  chosen: who
  alternatives:
  - who it was that
  lexicon: HALOT
  rationale: Simple interrogative pronoun introducing the indirect question.
- source_word: שָׂם
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place/set.' 'Put' is the most natural modern English choice in this context.
- source_word: כַּסְפֵּ/נוּ
  chosen: our silver
  alternatives:
  - our money
  lexicon: HALOT
  rationale: For consistency with the earlier כֶּסֶף in the verse, 'our silver' is retained rather than shifting to 'money.' This keeps the repeated Hebrew term visible in English.
- source_word: בְּ/אַמְתְּחֹתֵי/נוּ
  chosen: in our sacks
  alternatives:
  - in our bags
  - in our packs
  lexicon: HALOT
  rationale: אַמְתַּחַת refers to a sack or bag used for carrying grain/provisions. 'Sacks' best fits the Genesis Joseph narrative and common English Bible usage without sounding archaic.
