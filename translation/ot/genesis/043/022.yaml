  from: in our hand
  to: in our hands
  rationale: The Hebrew idiom בְּיָדֵנוּ uses a singular noun ('hand') with a plural suffix, a common construction for body parts. While the draft's 'in our hand' mirrors the Hebrew singular, it is unnatural in English, suggesting a single collective hand. The idiomatic English equivalent is the plural 'in our hands,' which correctly conveys 'in our possession' while retaining the 'hand' metaphor. This change improves fluency without altering the meaning.
