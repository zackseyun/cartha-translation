id: GEN.43.7
reference: Genesis 43:7
source:
  edition: WLC
  text: וַ/יֹּאמְר֡וּ שָׁא֣וֹל שָֽׁאַל הָ֠/אִישׁ לָ֣/נוּ וּ/לְ/מֽוֹלַדְתֵּ֜/נוּ לֵ/אמֹ֗ר
    הַ/ע֨וֹד אֲבִי/כֶ֥ם חַי֙ הֲ/יֵ֣שׁ לָ/כֶ֣ם אָ֔ח וַ/נַ֨גֶּד ל֔/וֹ עַל פִּ֖י הַ/דְּבָרִ֣ים
    הָ/אֵ֑לֶּה הֲ/יָד֣וֹעַ נֵדַ֔ע כִּ֣י יֹאמַ֔ר הוֹרִ֖ידוּ אֶת אֲחִי/כֶֽם־־־־׃
translation:
  text: They said, “The man questioned us closely about us and about our family, saying,
    ‘Is your father still alive? Do you have another brother?’ So we told him according
    to these words. How could we possibly know that he would say, ‘Bring your brother
    down’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'according to these words,' meaning in line with the matters he asked
      about.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאוֹל שָׁאַל
  chosen: questioned us closely
  alternatives:
  - asked repeatedly
  - carefully inquired
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action of שאל.
    English 'questioned us closely' captures the emphatic force more naturally than
    a wooden 'asking he asked.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש/man
  lexicon: HALOT
  rationale: Refers to Joseph as yet unidentified by the brothers. 'The man' preserves
    their perspective and the ordinary Hebrew designation.
- source_word: וּלְמוֹלַדְתֵּנוּ
  chosen: about our family
  alternatives:
  - about our kindred
  - about our relatives
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote kinship or family origin. In this context, where
    the questions concern father and brother, 'family' is the most natural and sufficiently
    precise rendering.
- source_word: הַעוֹד אֲבִיכֶם חַי
  chosen: Is your father still alive?
  alternatives:
  - Is your father yet alive?
  lexicon: HALOT
  rationale: הַעוֹד with חַי asks whether the father remains living. 'Still alive'
    is idiomatic modern English and preserves the temporal nuance.
- source_word: הֲיֵשׁ לָכֶם אָח
  chosen: Do you have another brother?
  alternatives:
  - Do you have a brother?
  lexicon: HALOT
  rationale: Although אָח lacks an explicit word for 'another,' the narrative context
    shows the question concerns an additional brother besides those present. 'Another
    brother' makes the implied sense explicit without overstepping the context.
- source_word: וַנַּגֶּד לוֹ
  chosen: So we told him
  alternatives:
  - and we reported to him
  - and we informed him
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell or declare. 'So we told him' fits the
    narrative flow and the explanatory tone of the brothers' defense.
- source_word: עַל פִּי הַדְּבָרִים הָאֵלֶּה
  chosen: according to these words
  alternatives:
  - in accordance with these things
  - on the basis of these statements
  lexicon: HALOT
  rationale: Literally 'according to the mouth of these words,' an idiom meaning in
    line with what was asked/said. 'According to these words' stays close to the Hebrew
    while remaining understandable.
- source_word: הֲיָדוֹעַ נֵדַע
  chosen: How could we possibly know
  alternatives:
  - Could we have known?
  - Did we know at all?
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb ידע. In context
    it is rhetorical, expressing strong denial of prior knowledge. 'How could we possibly
    know' conveys that force in natural English.
- source_word: הוֹרִידוּ
  chosen: Bring ... down
  alternatives:
  - send ... down
  - take ... down
  lexicon: HALOT
  rationale: ירד in the Hiphil means cause to go down. Because the movement is to
    Egypt, 'bring down' preserves the geographical idiom common in Genesis.
