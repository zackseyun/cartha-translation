id: GEN.43.5
reference: Genesis 43:5
source:
  edition: WLC
  text: וְ/אִם אֵינְ/ךָ֥ מְשַׁלֵּ֖חַ לֹ֣א נֵרֵ֑ד כִּֽי הָ/אִ֞ישׁ אָמַ֤ר אֵלֵ֨י/נוּ֙
    לֹֽא תִרְא֣וּ פָנַ֔/י בִּלְתִּ֖י אֲחִי/כֶ֥ם אִתְּ/כֶֽם־־־׃
translation:
  text: But if you will not send him, we will not go down, because the man said to
    us, ‘You will not see my face unless your brother is with you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'You will not see my face,' an idiom meaning to appear
      before someone or come into his presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction introduces a contrast with the prior conditional offer
    in v. 4. 'But if' captures the adversative force in context better than a simple
    'and if.'
- source_word: אֵינְךָ מְשַׁלֵּחַ
  chosen: you will not send him
  alternatives:
  - you are not sending him
  - you do not send him
  lexicon: HALOT
  rationale: The participle with negative after אֵין expresses an ongoing or intended
    refusal. In English, 'will not send him' best fits the conditional sense and the
    father's pending decision. 'Him' is supplied from context, referring to Benjamin,
    since Hebrew leaves the object implicit.
- source_word: לֹא נֵרֵד
  chosen: we will not go down
  alternatives:
  - we shall not go down
  lexicon: HALOT
  rationale: ירד is the standard verb for traveling down to Egypt from Canaan. 'Go
    down' preserves the geographical idiom and narrative consistency.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the refusal. 'Because' is clearer in modern
    English than 'for' while preserving the causal force.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Judah refers to Joseph, still unidentified to the brothers, simply as
    'the man.' Retaining this avoids importing knowledge not available within the
    speakers' perspective.
- source_word: אָמַר אֵלֵינוּ
  chosen: said to us
  alternatives:
  - told us
  lexicon: HALOT
  rationale: '''Said to us'' is a straightforward rendering of the Hebrew and preserves
    the direct-speech setup.'
- source_word: לֹא תִרְאוּ פָנַי
  chosen: You will not see my face
  alternatives:
  - You shall not see my face
  - You will not appear before me
  lexicon: HALOT
  rationale: Literally 'see my face' is an established Hebrew idiom for appearing
    before someone in audience. The literal wording is retained because it is natural
    enough in English and preserves the idiomatic force of the source.
- source_word: בִּלְתִּי
  chosen: unless
  alternatives:
  - except that
  - without
  lexicon: HALOT
  rationale: In this construction בִּלְתִּי introduces the necessary condition. 'Unless'
    is the most idiomatic and precise English equivalent.
- source_word: אֲחִיכֶם
  chosen: your brother
  alternatives:
  - your brother Benjamin
  lexicon: HALOT
  rationale: The Hebrew says 'your brother' without naming Benjamin. The translation
    preserves the source wording and lets the context identify him.
- source_word: אִתְּכֶם
  chosen: is with you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: English requires a finite verb to complete the clause naturally. 'Is
    with you' makes explicit the verbless Hebrew predicate.
