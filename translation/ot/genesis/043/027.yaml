id: GEN.43.27
reference: Genesis 43:27
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֤ל לָ/הֶם֙ לְ/שָׁל֔וֹם וַ/יֹּ֗אמֶר הֲ/שָׁל֛וֹם אֲבִי/כֶ֥ם הַ/זָּקֵ֖ן
    אֲשֶׁ֣ר אֲמַרְתֶּ֑ם הַ/עוֹדֶ֖/נּוּ חָֽי׃
translation:
  text: He asked them about their well-being and said, “Is your elderly father, whom
    you spoke of, well? Is he still alive?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He asked them concerning their welfare.” The Hebrew idiom uses shalom
      in the sense of well-being or welfare.
    reason: lexical_alternative
  - marker: b
    text: Or “your aged father.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: He asked
  alternatives:
  - He inquired
  - He asked after
  lexicon: HALOT
  rationale: The verb שׁאל in this context introduces Joseph's inquiry. 'He asked'
    is straightforward modern English; 'asked after' is possible but less natural
    today.
- source_word: לְשָׁלוֹם
  chosen: about their well-being
  alternatives:
  - concerning their welfare
  - peaceably
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes welfare/well-being rather than merely absence of
    conflict. The preposition ל with שָׁלוֹם in this idiom means asking after someone's
    welfare. 'About their well-being' captures the idiomatic sense in readable English.
- source_word: הֲשָׁלוֹם
  chosen: well
  alternatives:
  - at peace
  - in good health
  lexicon: HALOT
  rationale: The repeated שָׁלוֹם in interrogative form asks whether the father is
    well. 'Well' is concise and idiomatic; 'in good health' is narrower than the Hebrew,
    which can include general welfare.
- source_word: אֲבִיכֶם הַזָּקֵן
  chosen: your elderly father
  alternatives:
  - your old father
  - your aged father
  lexicon: HALOT
  rationale: הַזָּקֵן literally means 'the old/elderly one' modifying 'your father.'
    'Elderly father' is respectful, natural English and avoids the potentially harsh
    tone of 'old father' while preserving the age reference.
- source_word: אֲשֶׁר אֲמַרְתֶּם
  chosen: whom you spoke of
  alternatives:
  - whom you mentioned
  - of whom you spoke
  lexicon: HALOT
  rationale: This relative clause refers back to the father previously mentioned by
    the brothers. 'Whom you spoke of' is natural and sufficiently close to the Hebrew.
- source_word: הַעוֹדֶנּוּ
  chosen: still
  alternatives:
  - yet
  - is he still there
  lexicon: HALOT
  rationale: The form combines the adverb עוֹד ('still, yet') with a pronominal suffix.
    In English the sense is best conveyed adverbially in the question 'Is he still
    alive?' rather than by a separate pronoun.
- source_word: חָי
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: חָי means 'alive/living.' 'Alive' is the most idiomatic predicate in
    this question.
