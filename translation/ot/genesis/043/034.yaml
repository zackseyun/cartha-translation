id: GEN.43.34
reference: Genesis 43:34
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א מַשְׂאֹ֜ת מֵ/אֵ֣ת פָּנָי/ו֮ אֲלֵ/הֶם֒ וַ/תֵּ֜רֶב מַשְׂאַ֧ת בִּנְיָמִ֛ן
    מִ/מַּשְׂאֹ֥ת כֻּלָּ֖/ם חָמֵ֣שׁ יָד֑וֹת וַ/יִּשְׁתּ֥וּ וַֽ/יִּשְׁכְּר֖וּ עִמּֽ/וֹ׃
translation:
  text: He sent portions to them from before him, but Benjamin’s portion was five
    times as much as any of theirs. So they drank and became drunk with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from before him,' likely meaning from Joseph’s own place at
      the table.
    reason: cultural_note
  - marker: b
    text: Literally, 'five hands,' a Hebrew idiom meaning five times as much.
    reason: lexical_alternative
  - marker: c
    text: Or, more softly, 'became merry'; the Hebrew verb more directly means 'became
      drunk.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: He sent
  alternatives:
  - he lifted up
  - he carried
  lexicon: HALOT
  rationale: Although the verb literally means 'lifted/carried,' with מַשְׂאֹת in
    this banquet context it idiomatically refers to having portions brought or sent
    out to the diners.
- source_word: מַשְׂאֹת
  chosen: portions
  alternatives:
  - servings
  - helpings
  - gifts
  lexicon: HALOT
  rationale: In context of a meal, the noun refers to portions of food distributed
    from Joseph's table, not generic burdens or gifts.
- source_word: מֵאֵת פָּנָיו
  chosen: from before him
  alternatives:
  - from his presence
  - from in front of him
  - from his table
  lexicon: HALOT
  rationale: Literally 'from with/before his face.' 'From before him' preserves the
    Hebrew image while remaining intelligible; the sense is that the portions came
    from Joseph's own place at the meal.
- source_word: וַתֵּרֶב
  chosen: was ... as much
  alternatives:
  - increased
  - became greater
  - was larger
  lexicon: HALOT
  rationale: The verb marks that Benjamin's portion exceeded the others. English expresses
    this naturally with a comparative construction rather than a bare 'increased.'
- source_word: מַשְׂאַת בִּנְיָמִן
  chosen: Benjamin’s portion
  alternatives:
  - Benjamin's serving
  - Benjamin's helping
  lexicon: HALOT
  rationale: Same noun as earlier, here in singular with Benjamin as possessor; 'portion'
    is the most natural and consistent rendering in context.
- source_word: מִמַּשְׂאֹת כֻּלָּם
  chosen: as any of theirs
  alternatives:
  - than all their portions
  - than the portions of all of them
  lexicon: HALOT
  rationale: The Hebrew compares Benjamin's portion with the portions belonging to
    all the others. 'As any of theirs' gives idiomatic English while preserving the
    distributive sense.
- source_word: חָמֵשׁ יָדוֹת
  chosen: five times as much
  alternatives:
  - five hands
  - five portions
  lexicon: HALOT
  rationale: The idiom literally says 'five hands,' an ancient measure of portion
    or amount. 'Five times as much' communicates the comparative force clearly in
    modern English.
- source_word: וַיִּשְׁתּוּ
  chosen: they drank
  lexicon: HALOT
  rationale: Straightforward narrative verb for drinking at the feast.
- source_word: וַיִּשְׁכְּרוּ
  chosen: became drunk
  alternatives:
  - were merry
  - drank freely
  lexicon: HALOT
  rationale: The verb ordinarily means becoming intoxicated/drunk. Some translations
    soften it to 'were merry,' but the Hebrew more directly indicates drunkenness;
    this should not be paraphrased away.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - with Joseph
  lexicon: HALOT
  rationale: The pronoun refers to Joseph. 'With him' preserves the Hebrew wording;
    the antecedent is clear from context.
