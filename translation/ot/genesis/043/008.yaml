id: GEN.43.8
reference: Genesis 43:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוּדָ֜ה אֶל יִשְׂרָאֵ֣ל אָבִ֗י/ו שִׁלְחָ֥/ה הַ/נַּ֛עַר אִתִּ֖/י
    וְ/נָק֣וּמָה וְ/נֵלֵ֑כָה וְ/נִֽחְיֶה֙ וְ/לֹ֣א נָמ֔וּת גַּם אֲנַ֥חְנוּ גַם אַתָּ֖ה
    גַּם טַפֵּֽ/נוּ־־־־׃
translation:
  text: And Judah said to Israel his father, “Send the boy with me, and let us get
    up and go, so that we may live and not die—both we and you and our little ones.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the young man” for “the boy.” The Hebrew נער can refer to a youth or
      young man, not only a small child.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: יִשְׂרָאֵל אָבִיו
  chosen: Israel his father
  alternatives:
  - his father Israel
  lexicon: HALOT
  rationale: Retains the name 'Israel' as in the Hebrew text rather than substituting
    'Jacob,' and keeps the appositional relationship explicit.
- source_word: שִׁלְחָה
  chosen: Send
  alternatives:
  - Send now
  - Let ... go
  lexicon: HALOT
  rationale: Imperative of שלח with paragogic he; the sense is a direct request/command.
    English does not need to represent the paragogic ending.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the lad
  lexicon: HALOT
  rationale: Though Benjamin is not a small child, נער can denote a youth/young man.
    'The boy' reflects Judah's familial, protective framing and matches the immediate
    context naturally in English.
- source_word: אִתִּי
  chosen: with me
  alternatives:
  - along with me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating Judah's personal responsibility
    in accompanying Benjamin.
- source_word: וְנָקוּמָה וְנֵלֵכָה
  chosen: and let us get up and go
  alternatives:
  - and let us arise and go
  - and we will set out and go
  lexicon: HALOT
  rationale: The cohortatives express urged joint action. 'Get up and go' is idiomatic
    modern English that preserves the two-verb sequence and the sense of immediate
    departure.
- source_word: וְנִחְיֶה וְלֹא נָמוּת
  chosen: so that we may live and not die
  alternatives:
  - that we may live and not die
  - and we will live and not die
  lexicon: HALOT
  rationale: The sequence gives the purpose/result of going. 'So that we may' captures
    the pragmatic force in context better than a flat future.
- source_word: גַּם אֲנַחְנוּ גַּם אַתָּה גַּם טַפֵּנוּ
  chosen: both we and you and our little ones
  alternatives:
  - we also, you also, and our children also
  - both we, both you, and both our little ones
  lexicon: HALOT
  rationale: The repeated גם adds emphasis and inclusion. English compresses this
    naturally while preserving the three groups in view. 'Both' here functions idiomatically
    as inclusive emphasis, not strict duality.
- source_word: טַפֵּנוּ
  chosen: our little ones
  alternatives:
  - our children
  - our dependents
  lexicon: HALOT
  rationale: טף refers to little children/dependents, often the vulnerable members
    of the household. 'Our little ones' preserves the tenderness and vulnerability
    more clearly than the broader 'children'.
