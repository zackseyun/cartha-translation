id: GEN.43.4
reference: Genesis 43:4
source:
  edition: WLC
  text: אִם יֶשְׁ/ךָ֛ מְשַׁלֵּ֥חַ אֶת אָחִ֖י/נוּ אִתָּ֑/נוּ נֵרְדָ֕ה וְ/נִשְׁבְּרָ֥ה
    לְ/ךָ֖ אֹֽכֶל־־׃
translation:
  text: If you will send our brother with us, we will go down and buy food for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you are willing to send our brother with us.' The Hebrew idiom with
      יֵשׁ + participle can express willingness as well as the act itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - If only if
  lexicon: HALOT
  rationale: Introduces a conditional clause. Simple 'If' best fits the Hebrew conditional
    particle in this context without adding emphasis not explicit in the text.
- source_word: יֶשְׁךָ + מְשַׁלֵּחַ
  chosen: you will send
  alternatives:
  - you are willing to send
  - you send
  lexicon: HALOT
  rationale: The idiom combines יֵשׁ with a pronominal suffix and a participle to
    express a condition of willingness or actual action. 'You will send' gives natural
    English in the conditional context while preserving the father's agency. 'You
    are willing to send' is possible but slightly more interpretive.
- source_word: אֶת אָחִינוּ
  chosen: our brother
  lexicon: HALOT
  rationale: Direct object marker plus noun with 1cp suffix. 'Our brother' is the
    plain sense and preserves the familial emphasis.
- source_word: אִתָּנוּ
  chosen: with us
  lexicon: HALOT
  rationale: Straightforward accompaniment phrase indicating Benjamin must travel
    together with them.
- source_word: נֵרְדָה
  chosen: we will go down
  alternatives:
  - let us go down
  - we may go down
  lexicon: HALOT
  rationale: Cohortative 1cp can express resolve or intended action. In English conditional
    apodosis, 'we will go down' best conveys the sense naturally. 'Let us go down'
    would sound like an exhortation rather than a stated consequence.
- source_word: וְנִשְׁבְּרָה
  chosen: and buy
  alternatives:
  - and purchase
  - and obtain grain
  lexicon: HALOT
  rationale: From שבר in the provisioning context of Genesis, meaning to buy grain/food.
    'Buy' is concise and idiomatic. The broader object 'food' is supplied by the following
    noun, so 'buy' is preferable to the more specific 'obtain grain' here.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - for yourself
  - on your behalf
  lexicon: HALOT
  rationale: The preposition with 2ms suffix indicates benefit or advantage. 'For
    you' is the most direct rendering and fits Judah's promise to procure provisions
    on behalf of their father/household.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - provisions
  - grain
  lexicon: HALOT
  rationale: The noun broadly means food. Although the immediate narrative concerns
    grain, the Hebrew here is not the more specific term for grain, so 'food' best
    preserves the source wording without over-specification.
