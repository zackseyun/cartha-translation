id: GEN.43.23
reference: Genesis 43:23
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ שָׁל֨וֹם לָ/כֶ֜ם אַל תִּירָ֗אוּ אֱלֹ֨הֵי/כֶ֜ם וֵֽ/אלֹהֵ֤י אֲבִי/כֶם֙
    נָתַ֨ן לָ/כֶ֤ם מַטְמוֹן֙ בְּ/אַמְתְּחֹ֣תֵי/כֶ֔ם כַּסְפְּ/כֶ֖ם בָּ֣א אֵלָ֑/י וַ/יּוֹצֵ֥א
    אֲלֵ/הֶ֖ם אֶת שִׁמְעֽוֹן־־׃
translation:
  text: He said, “Peace to you. Do not be afraid. Your God and the God of your father
    has given you treasure in your sacks. Your silver came to me.” Then he brought
    Simeon out to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden treasure.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Your money came to me.' Hebrew 'silver' often refers to money.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - It is well
  - Peace be with you
  lexicon: HALOT
  rationale: שָׁלוֹם here functions as a reassuring greeting/blessing. 'Peace' preserves
    the lexical core and the concise force of the Hebrew better than a fuller paraphrase.
- source_word: אַל תִּירָאוּ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: A standard negative imperative with ירא. 'Do not be afraid' is natural
    modern English while remaining close to the Hebrew.
- source_word: אֱלֹהֵיכֶם וֵאלֹהֵי אֲבִיכֶם
  chosen: Your God and the God of your father
  alternatives:
  - your gods and the god of your father
  lexicon: HALOT
  rationale: Though אֱלֹהִים is morphologically plural, in this construction it clearly
    refers to the singular God worshiped by Joseph's family. 'Your father' is singular
    in Hebrew and should be preserved rather than generalized to 'ancestors' or pluralized
    to 'fathers'.
- source_word: נָתַן לָכֶם
  chosen: has given you
  alternatives:
  - gave you
  lexicon: HALOT
  rationale: 'The perfect can be rendered as simple past, but in English the present
    perfect fits the immediate result and explanatory tone: the treasure is now found
    in their sacks because God has given it.'
- source_word: מַטְמוֹן
  chosen: treasure
  alternatives:
  - hidden treasure
  - a treasure
  lexicon: HALOT
  rationale: מַטְמוֹן denotes something hidden/stored up. 'Treasure' is the most idiomatic
    concise rendering here; 'hidden treasure' would over-specify in the main text,
    though the nuance is worth preserving as an alternative.
- source_word: בְּאַמְתְּחֹתֵיכֶם
  chosen: in your sacks
  alternatives:
  - in your bags
  lexicon: HALOT
  rationale: The term refers to the brothers' grain sacks/bags. 'Sacks' fits the ancient
    transport context slightly better than the more generic 'bags'.
- source_word: כַּסְפְּכֶם בָּא אֵלָי
  chosen: Your silver came to me
  alternatives:
  - Your money came to me
  - I received your silver
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver,' commonly functioning as money. Because
    the narrative concerns returned payment, 'silver' preserves the concrete Hebrew
    wording while remaining understandable. 'Came to me' is retained rather than smoothing
    to 'I received'.
- source_word: וַיּוֹצֵא אֲלֵהֶם אֶת שִׁמְעוֹן
  chosen: Then he brought Simeon out to them
  alternatives:
  - And he brought out Simeon to them
  - Then he brought Simeon to them
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out.' Including 'out' preserves the directional
    nuance, likely from custody or an interior room, while 'Then' gives natural narrative
    flow for the waw-consecutive.
