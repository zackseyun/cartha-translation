theological_decisions:
- issue: Reference to God in the steward's speech
  chosen_reading: Render the steward's words straightforwardly as referring to the
    brothers' God and the God of their father, without implying the steward's personal
    confession or denying it.
  alternative_readings:
  - Treat the language as merely diplomatic accommodation
  - Treat the language as evidence of full personal faith
  rationale: The Hebrew reports the steward's speech without explaining his inner
    belief. The translation should preserve the wording and not import a theological
    judgment the text does not make.
  doctrine_reference: Preserve theological tension rather than resolve it.
