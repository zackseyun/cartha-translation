id: GEN.43.14
reference: Genesis 43:14
source:
  edition: WLC
  text: וְ/אֵ֣ל שַׁדַּ֗י יִתֵּ֨ן לָ/כֶ֤ם רַחֲמִים֙ לִ/פְנֵ֣י הָ/אִ֔ישׁ וְ/שִׁלַּ֥ח
    לָ/כֶ֛ם אֶת אֲחִי/כֶ֥ם אַחֵ֖ר וְ/אֶת בִּנְיָמִ֑ין וַ/אֲנִ֕י כַּ/אֲשֶׁ֥ר שָׁכֹ֖לְתִּי
    שָׁכָֽלְתִּי־־׃
translation:
  text: May God Almighty grant you mercy before the man, so that he may send back
    your other brother and Benjamin. And as for me, if I am bereaved, I am bereaved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grant you compassion before the man.' The Hebrew רַחֲמִים can denote
      mercy, compassion, or tender pity.
    reason: lexical_alternative
  - marker: b
    text: '''Your other brother'' refers to Simeon, who had been detained in Egypt.'
    reason: cross_reference
  - marker: c
    text: Or 'If I am bereaved of my children, I am bereaved.' The Hebrew repeats
      the same verb for emphasis, expressing Jacob's resignation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל שַׁדַּי
  chosen: God Almighty
  alternatives:
  - El Shaddai
  - God Shaddai
  lexicon: HALOT
  rationale: Translate the divine title rather than transliterate, in keeping with
    the philosophy of translating titles. 'Shaddai' is conventionally and plausibly
    rendered 'Almighty' in this title, and the phrase functions here as an invocation
    of God's power and blessing.
- source_word: יִתֵּן לָכֶם רַחֲמִים
  chosen: grant you mercy
  alternatives:
  - give you compassion
  - grant you compassion
  lexicon: HALOT
  rationale: רַחֲמִים denotes compassion, mercy, or tender pity. 'Grant you mercy'
    is natural English in a prayer/wish context and fits the sons' hoped-for favorable
    treatment.
- source_word: לִפְנֵי הָאִישׁ
  chosen: before the man
  alternatives:
  - in the presence of the man
  - with the man
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' 'Before the
    man' preserves the Hebrew idiom while remaining understandable; 'the man' refers
    to the Egyptian official already in view.
- source_word: וְשִׁלַּח לָכֶם
  chosen: so that he may send back
  alternatives:
  - and may he send back
  - and send back for you
  lexicon: HALOT
  rationale: 'The waw plus perfect after the jussive/wish sequence is naturally rendered
    as a continuation of the wish: Jacob prays that the man will release them. ''Send
    back'' makes explicit the return implied by the context.'
- source_word: אֶת אֲחִיכֶם אַחֵר
  chosen: your other brother
  alternatives:
  - your other brother of yours
  - your brother, the other one
  lexicon: HALOT
  rationale: אַחֵר modifies 'brother' as 'other/another.' In context this refers to
    the brother being detained, Simeon, distinguished from Benjamin. 'Your other brother'
    is concise and idiomatic.
- source_word: וְאֶת בִּנְיָמִין
  chosen: and Benjamin
  lexicon: HALOT
  rationale: Direct continuation of the object of 'send back'; Benjamin is named separately
    for emphasis.
- source_word: וַאֲנִי
  chosen: And as for me
  alternatives:
  - And I
  - As for me
  lexicon: HALOT
  rationale: The pronoun is fronted for emphasis. 'And as for me' reflects the shift
    from prayer for the sons to Jacob's personal resignation.
- source_word: כַּאֲשֶׁר שָׁכֹלְתִּי שָׁכָלְתִּי
  chosen: if I am bereaved, I am bereaved
  alternatives:
  - as I have been bereaved, I am bereaved
  - if I lose my children, I lose them
  lexicon: HALOT
  rationale: The repeated verb from שׁכל expresses resigned acceptance of possible
    loss. English idiom is best captured by the well-known pattern 'if I am bereaved,
    I am bereaved,' which preserves the repetition and emotional force without over-paraphrase.
