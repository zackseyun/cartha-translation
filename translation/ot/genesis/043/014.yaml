theological_decisions:
- issue: Rendering of the divine title אֵל שַׁדַּי
  chosen_reading: God Almighty
  alternative_readings:
  - El Shaddai
  rationale: The phrase is a divine title, and the translation philosophy prefers
    translating titles rather than transliterating them. 'God Almighty' is the standard
    meaningful rendering in English and avoids leaving the title opaque to readers.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate
    names)'
