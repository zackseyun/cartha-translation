id: GEN.43.24
reference: Genesis 43:24
source:
  edition: WLC
  text: וַ/יָּבֵ֥א הָ/אִ֛ישׁ אֶת הָ/אֲנָשִׁ֖ים בֵּ֣יתָ/ה יוֹסֵ֑ף וַ/יִּתֶּן מַ֨יִם֙
    וַ/יִּרְחֲצ֣וּ רַגְלֵי/הֶ֔ם וַ/יִּתֵּ֥ן מִסְפּ֖וֹא לַ/חֲמֹֽרֵי/הֶֽם־־׃
translation:
  text: The man brought the men into Joseph’s house, gave them water, and they washed
    their feet; then he gave fodder to their donkeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'led the men into Joseph’s house.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man' and 'the men'; the verse does not explicitly identify the
      man as Joseph’s steward or the men as Joseph’s brothers, though the context
      makes both clear.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - led
  lexicon: HALOT
  rationale: From בוא in the Hifil/causative sense, indicating that the man caused
    the men to enter Joseph's house. 'Brought' is natural English and preserves the
    causative movement.
- source_word: הָאִישׁ
  chosen: The man
  alternatives:
  - the steward
  - the servant
  lexicon: HALOT
  rationale: The Hebrew says simply 'the man.' Although context identifies him as
    Joseph's household official, the text does not specify that role here, so the
    translation preserves the plain wording.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the brothers
  lexicon: HALOT
  rationale: The noun is the ordinary plural 'men.' While these are Joseph's brothers
    in context, the verse itself uses the generic term, so 'the men' is retained.
- source_word: בֵּיתָה יוֹסֵף
  chosen: into Joseph’s house
  alternatives:
  - to Joseph’s house
  - into the house of Joseph
  lexicon: HALOT
  rationale: The directional ending on בֵּיתָה indicates motion into the house. 'Into
    Joseph’s house' captures the directional force more precisely than simply 'to
    Joseph’s house.'
- source_word: וַיִּתֶּן מַיִם
  chosen: gave them water
  alternatives:
  - provided water
  lexicon: HALOT
  rationale: The object 'them' is implicit from context in English though not explicit
    in Hebrew. Supplying it makes the sentence idiomatic without altering meaning.
- source_word: וַיִּרְחֲצוּ רַגְלֵיהֶם
  chosen: and they washed their feet
  alternatives:
  - and their feet were washed
  lexicon: HALOT
  rationale: The verb is active plural, so 'they washed their feet' is the most direct
    rendering. Although in hospitality contexts servants might wash guests' feet,
    this Hebrew form does not state that, so a passive rendering is avoided.
- source_word: מִסְפּוֹא
  chosen: fodder
  alternatives:
  - feed
  - provender
  lexicon: HALOT
  rationale: The noun refers to feed for animals. 'Fodder' is clear modern English
    and suitably specific for donkey feed; 'provender' is archaic.
- source_word: לַחֲמֹרֵיהֶם
  chosen: to their donkeys
  alternatives:
  - for their donkeys
  lexicon: HALOT
  rationale: The preposition marks the indirect object/beneficiary. 'To their donkeys'
    is a literal rendering; in English this naturally conveys that the fodder was
    given for the donkeys.
