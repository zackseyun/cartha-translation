id: GEN.43.26
reference: Genesis 43:26
source:
  edition: WLC
  text: וַ/יָּבֹ֤א יוֹסֵף֙ הַ/בַּ֔יְתָ/ה וַ/יָּבִ֥יאּוּ ל֛/וֹ אֶת הַ/מִּנְחָ֥ה אֲשֶׁר
    בְּ/יָדָ֖/ם הַ/בָּ֑יְתָ/ה וַ/יִּשְׁתַּחֲווּ ל֖/וֹ אָֽרְצָ/ה־־־׃
translation:
  text: When Joseph came into the house, they brought him the gift that was in their
    hands into the house, and they bowed down to the ground before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the present'; the Hebrew term can also mean 'tribute' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'into the house' twice in the verse, likely to mark both
      Joseph's entrance and the brothers' bringing in of the gift.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly means 'came' or 'entered.' 'Came' fits
    natural English narrative style, while the following phrase 'into the house' supplies
    the destination.
- source_word: הַבַּיְתָה
  chosen: into the house
  alternatives:
  - to the house
  - homeward
  lexicon: HALOT
  rationale: The noun בית with directive he indicates motion toward/into the house.
    'Into the house' best reflects the directional force in context.
- source_word: וַיָּבִיאוּ לוֹ
  chosen: they brought him
  alternatives:
  - they brought to him
  - they presented to him
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring.' English naturally allows the indirect object
    as 'brought him,' while preserving the sense that the brothers delivered something
    to Joseph.
- source_word: הַמִּנְחָה
  chosen: the gift
  alternatives:
  - the present
  - the tribute
  - the offering
  lexicon: HALOT
  rationale: מנחה can denote a gift, tribute, or offering depending on context. Here
    it refers to the brothers' diplomatic present for Joseph, not a cultic offering,
    so 'gift' is the clearest modern rendering.
- source_word: אֲשֶׁר בְּיָדָם
  chosen: that was in their hands
  alternatives:
  - which they had with them
  - that they were carrying
  lexicon: HALOT
  rationale: The phrase is literally 'which was in their hand(s).' 'That was in their
    hands' preserves the concrete Hebrew expression while remaining understandable
    in English.
- source_word: הַבָּיְתָה
  chosen: into the house
  alternatives:
  - to the house
  lexicon: HALOT
  rationale: Repeated directional form of בית. Retaining 'into the house' reflects
    the Hebrew repetition rather than smoothing it away.
- source_word: וַיִּשְׁתַּחֲווּ לוֹ
  chosen: they bowed down before him
  alternatives:
  - they prostrated themselves before him
  - they bowed themselves to him
  lexicon: HALOT
  rationale: Hishtaphel/Hishtafel form of שחה denotes bowing down in homage. 'Bowed
    down before him' is idiomatic and preserves the act of obeisance without over-formalizing.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: Directional form of ארץ indicates motion downward to the ground/earth.
    'To the ground' is the most natural English expression in this gesture context.
