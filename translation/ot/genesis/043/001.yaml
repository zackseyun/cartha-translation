id: GEN.43.1
reference: Genesis 43:1
source:
  edition: WLC
  text: וְ/הָ/רָעָ֖ב כָּבֵ֥ד בָּ/אָֽרֶץ׃
translation:
  text: Now the famine was severe in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And the famine was heavy in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרָעָב
  chosen: Now the famine
  alternatives:
  - And the famine
  - the famine
  lexicon: HALOT
  rationale: רָעָב means 'famine' or 'hunger'; in this narrative context 'famine'
    is the natural English rendering. The prefixed וְ is rendered as 'Now' rather
    than a bare 'And' to produce readable modern narrative flow while still signaling
    continuation.
- source_word: כָּבֵד
  chosen: was severe
  alternatives:
  - was heavy
  - was grievous
  lexicon: HALOT
  rationale: כָּבֵד literally means 'heavy,' but with famine it idiomatically conveys
    intensity or severity. 'Was severe' communicates the plain sense in natural English
    without wooden literalism.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - in the earth
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in a regional/narrative sense. Here it refers
    to the affected land/region, not the whole earth, so 'in the land' is the most
    contextually appropriate and idiomatic rendering.
