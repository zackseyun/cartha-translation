id: GEN.43.16
reference: Genesis 43:16
source:
  edition: WLC
  text: וַ/יַּ֨רְא יוֹסֵ֣ף אִתָּ/ם֮ אֶת בִּנְיָמִין֒ וַ/יֹּ֨אמֶר֙ לַֽ/אֲשֶׁ֣ר עַל
    בֵּית֔/וֹ הָבֵ֥א אֶת הָ/אֲנָשִׁ֖ים הַ/בָּ֑יְתָ/ה וּ/טְבֹ֤חַ טֶ֨בַח֙ וְ/הָכֵ֔ן
    כִּ֥י אִתִּ֛/י יֹאכְל֥וּ הָ/אֲנָשִׁ֖ים בַּֽ/צָּהֳרָֽיִם־־־׃
translation:
  text: When Joseph saw Benjamin with them, he said to the one over his household,
    “Bring the men into the house, slaughter an animal, and prepare it, because the
    men will eat with me at noon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the steward of his house.” The Hebrew literally says “to the one
      over his household.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “slaughter a slaughter,” meaning to butcher an animal for
      a meal.'
    reason: cultural_note
  - marker: c
    text: Or “at midday.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  lexicon: HALOT
  rationale: 'The Qal wayyiqtol of ראה here straightforwardly denotes perception:
    Joseph noticed Benjamin''s presence with them. ''Saw'' is the natural English
    equivalent.'
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates Benjamin was in the
    company of the brothers. 'With them' is the most direct rendering.
- source_word: לַאֲשֶׁר עַל בֵּיתוֹ
  chosen: to the one over his household
  alternatives:
  - to the steward of his house
  - to the man in charge of his house
  lexicon: HALOT
  rationale: The phrase literally identifies the person who was over Joseph's house/household.
    'The one over his household' preserves the Hebrew structure while remaining readable.
    'Steward' is possible but slightly more interpretive.
- source_word: הָבֵא ... הַבָּיְתָה
  chosen: Bring the men into the house
  alternatives:
  - Bring the men home
  - Bring the men to the house
  lexicon: HALOT
  rationale: The imperative plus directional ending on 'house' indicates movement
    into the house. 'Into the house' is more precise than the idiomatic but potentially
    ambiguous 'home.'
- source_word: וּטְבֹחַ טֶבַח
  chosen: slaughter an animal
  alternatives:
  - slaughter a slaughter
  - kill and butcher meat
  - prepare a slaughter
  lexicon: HALOT
  rationale: The verb-noun combination is an idiomatic Hebrew expression for butchering
    an animal for a meal. English requires an explicit object; 'an animal' conveys
    the sense without over-specifying the species.
- source_word: וְהָכֵן
  chosen: prepare it
  alternatives:
  - make ready
  - prepare the meal
  lexicon: HALOT
  rationale: The Hiphil imperative of כון means to make ready or prepare. Given the
    prior command to slaughter, 'prepare it' naturally refers to preparing the food
    for the meal.
- source_word: כִּי אִתִּי יֹאכְלוּ הָאֲנָשִׁים
  chosen: because the men will eat with me
  alternatives:
  - for the men shall dine with me
  lexicon: HALOT
  rationale: כִּי gives the reason for the commands. 'Eat with me' is a plain rendering
    of the clause and fits modern English better than 'dine,' which may sound elevated.
- source_word: בַּצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: The noun denotes midday/noon. 'At noon' is concise and idiomatic in contemporary
    English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the menfolk
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and refers specifically
    to Joseph's brothers and their party. 'The men' is gender-accurate and contextually
    specific.
