  from: return in your hand
  to: carry back in your hand
  rationale: The Hebrew uses the same phrase בְיֶדְכֶם ('in your hand') with both קְחוּ ('take') and תָּשִׁיבוּ ('return'). While repeating 'in your hand' in English laudably preserves this parallelism, the phrase 'return in your hand' is less natural than 'take in your hand.' The verb 'return' doesn't collocate as smoothly with the physical action. 'Carry back in your hand' is a more idiomatic phrasing in English, accurately renders the causative meaning of the Hiphil verb תָּשִׁיבוּ ('cause to return'/'bring back'), and successfully maintains the desired parallel of 'hand' from the first clause.
