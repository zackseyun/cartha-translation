id: GEN.43.12
reference: Genesis 43:12
source:
  edition: WLC
  text: וְ/כֶ֥סֶף מִשְׁנֶ֖ה קְח֣וּ בְ/יֶדְ/כֶ֑ם וְ/אֶת הַ/כֶּ֜סֶף הַ/מּוּשָׁ֨ב בְּ/פִ֤י אַמְתְּחֹֽתֵי/כֶם֙ תָּשִׁ֣יבוּ בְ/יֶדְ/כֶ֔ם אוּלַ֥י מִשְׁגֶּ֖ה הֽוּא־׃
translation:
  text: Take double money in your hand, and carry back in your hand the money that was put back in the mouth of your sacks; perhaps it was a mistake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the mouth of your sacks,' that is, at the opening of your sacks.
    reason: lexical_alternative
  - marker: b
    text: Or 'return in your hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: כֶסֶף מִשְׁנֶה
  chosen: double money
  alternatives:
  - twice as much money
  - a second amount of money
  lexicon: HALOT
  rationale: מִשְׁנֶה with כֶסֶף denotes a doubled amount of silver/money. 'Double money' is concise and natural enough in English while preserving the quantitative force without over-interpreting whether it means exactly twice the previous purchase price or simply an additional amount equal to it.
- source_word: קְחוּ בְיֶדְכֶם
  chosen: Take ... in your hand
  alternatives:
  - carry ... with you
  - take ... with you
  lexicon: HALOT
  rationale: The idiom literally uses 'hand' for possession/carrying. Retaining 'in your hand' preserves the Hebrew concreteness and matches the repeated phrase later in the verse.
- source_word: הַכֶּסֶף הַמּוּשָׁב
  chosen: the money that was put back
  alternatives:
  - the money that was returned
  - the money that was restored
  lexicon: HALOT
  rationale: 'The Hophal participle of שוב is passive: money caused to return/be put back. ''Was put back'' fits the narrative context of the money being found again in the sacks and avoids implying the brothers themselves had already returned it.'
- source_word: בְּפִי אַמְתְּחֹתֵיכֶם
  chosen: in the mouth of your sacks
  alternatives:
  - at the opening of your sacks
  - in the opening of your bags
  lexicon: HALOT
  rationale: '''Mouth'' is the literal Hebrew idiom for the opening of a container. Here ''mouth of your sacks'' is understandable in English and preserves the vividness of the source; the more idiomatic alternative is worth preserving in a footnote.'
- source_word: תָּשִׁיבוּ בְיֶדְכֶם
  chosen: return in your hand
  alternatives:
  - bring back with you
  - take back with you
  lexicon: HALOT
  rationale: Hiphil of שוב means 'bring back/return.' Keeping 'in your hand' mirrors the first clause and preserves the repeated Hebrew phrasing, though in English it functions idiomatically as carrying it with them.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - maybe
  lexicon: HALOT
  rationale: '''Perhaps'' suits the register of the passage better than the more colloquial ''maybe'' while accurately conveying uncertainty.'
- source_word: מִשְׁגֶּה
  chosen: a mistake
  alternatives:
  - an oversight
  - an error
  lexicon: HALOT
  rationale: The noun denotes an error or mistake. 'Mistake' is the clearest modern English rendering in this commercial context, without implying moral guilt or deception.
