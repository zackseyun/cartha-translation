id: GEN.43.33
reference: Genesis 43:33
source:
  edition: WLC
  text: וַ/יֵּשְׁב֣וּ לְ/פָנָ֔י/ו הַ/בְּכֹר֙ כִּ/בְכֹ֣רָת֔/וֹ וְ/הַ/צָּעִ֖יר כִּ/צְעִרָת֑/וֹ
    וַ/יִּתְמְה֥וּ הָ/אֲנָשִׁ֖ים אִ֥ישׁ אֶל רֵעֵֽ/הוּ־׃
translation:
  text: And they sat before him, the firstborn according to his birthright and the
    youngest according to his youth, and the men looked at one another in astonishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the firstborn according to his birth order and the youngest according
      to his youthfulness.' The Hebrew pairs firstborn status and youth in describing
      the seating arrangement.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the men marveled at one another.' The Hebrew verb denotes astonishment;
      the translation makes explicit the reciprocal reaction implied by 'each to his
      companion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: And they sat
  alternatives:
  - And they were seated
  - And they sat down
  lexicon: HALOT
  rationale: From ישׁב, here a wayyiqtol narrative form. 'Sat' is the plain narrative
    sense. 'Were seated' could suggest passive arrangement, but the Hebrew form itself
    is active; the context already implies they were arranged by another.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in front of him
  lexicon: HALOT
  rationale: Literal spatial expression with פני plus pronominal suffix. 'Before him'
    is natural English and preserves the formal relation to Joseph.
- source_word: הַבְּכֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  lexicon: HALOT
  rationale: בכור specifically denotes firstborn status, not merely greater age. 'The
    firstborn' preserves the birth-order and status nuance.
- source_word: כִּבְכֹרָתוֹ
  chosen: according to his birthright
  alternatives:
  - according to his birth order
  - by his birthright
  lexicon: HALOT
  rationale: The noun בכורה can denote firstborn status/right. In this seating context
    it refers to rank by birth order. 'According to his birthright' preserves the
    lexical link to firstborn status, though the practical sense is birth order.
- source_word: וְהַצָּעִיר
  chosen: and the youngest
  alternatives:
  - and the younger
  lexicon: HALOT
  rationale: In contrast with 'the firstborn,' the superlative sense 'youngest' best
    fits the full range of brothers being ordered from oldest to youngest.
- source_word: כִּצְעִרָתוֹ
  chosen: according to his youth
  alternatives:
  - according to his youthfulness
  - according to his rank as the youngest
  lexicon: HALOT
  rationale: The noun צעירה refers to youth/younger status. 'According to his youth'
    is a fairly literal rendering that mirrors the Hebrew pairing with 'according
    to his birthright.' It conveys placement by relative age.
- source_word: וַיִּתְמְהוּ
  chosen: looked at one another in astonishment
  alternatives:
  - marveled at one another
  - were astonished
  lexicon: HALOT
  rationale: The verb תמה expresses astonishment or amazement. Because the phrase
    is followed by איש אל רעהו, the astonishment is expressed mutually among the men.
    'Looked at one another in astonishment' makes the interpersonal force explicit
    and reads naturally in English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the brothers
  lexicon: HALOT
  rationale: The Hebrew says 'the men,' referring to Joseph's brothers. 'The men'
    preserves the source wording; identifying them as brothers would be interpretive
    expansion.
- source_word: אִישׁ אֶל־רֵעֵהוּ
  chosen: one another
  alternatives:
  - each man to his companion
  - each to the other
  lexicon: HALOT
  rationale: This idiom denotes reciprocal action. 'One another' is the idiomatic
    English equivalent. The mutuality is retained in the chosen rendering of the verb
    phrase.
