id: GEN.43.3
reference: Genesis 43:3
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר אֵלָ֛י/ו יְהוּדָ֖ה לֵ/אמֹ֑ר הָעֵ֣ד הֵעִד֩ בָּ֨/נוּ הָ/אִ֤ישׁ לֵ/אמֹר֙
    לֹֽא תִרְא֣וּ פָנַ֔/י בִּלְתִּ֖י אֲחִי/כֶ֥ם אִתְּ/כֶֽם־׃
translation:
  text: Then Judah said to him, “The man solemnly warned us, saying, ‘You shall not
    see my face unless your brother is with you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The man strictly warned us' or 'The man plainly warned us.' The Hebrew
      uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'You shall not see my face.' This idiom can also mean 'You shall
      not appear before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Direct object of speech, referring to Jacob in context.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English transliteration of the personal name.
- source_word: הָעֵד הֵעִד
  chosen: solemnly warned
  alternatives:
  - plainly warned
  - strictly warned
  - testified emphatically
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of עוד intensifies the verbal
    idea. In this context the sense is not courtroom 'testify' but emphatic warning
    or insistence. 'Solemnly warned' captures both the force and the seriousness.
- source_word: בָּנוּ
  chosen: us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: With the warning verb, English idiom prefers 'warned us' rather than
    the more wooden 'warned to us.'
- source_word: הָאִישׁ
  chosen: the man
  lexicon: HALOT
  rationale: Refers to the Egyptian official previously encountered; the Hebrew uses
    the ordinary designation 'the man,' which should be preserved.
- source_word: לֹא תִרְאוּ פָנַי
  chosen: You shall not see my face
  alternatives:
  - You must not appear before me
  - You will not see my face
  lexicon: HALOT
  rationale: Literally 'you shall not see my face.' This idiom can mean appearing
    before someone, but the Hebrew expression is vivid and natural enough in English
    to retain in the main text.
- source_word: בִּלְתִּי
  chosen: unless
  alternatives:
  - except with
  - without
  lexicon: HALOT
  rationale: Best contextual rendering introducing the condition for seeing his face.
- source_word: אֲחִיכֶם
  chosen: your brother
  lexicon: HALOT
  rationale: Singular noun with plural suffix; refers specifically to Benjamin, so
    singular 'brother' is required.
- source_word: אִתְּכֶם
  chosen: is with you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: English requires an explicit verb in this conditional clause; 'is' is
    implied by the Hebrew prepositional phrase.
