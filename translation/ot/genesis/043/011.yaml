id: GEN.43.11
reference: Genesis 43:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵ/הֶ֜ם יִשְׂרָאֵ֣ל אֲבִי/הֶ֗ם אִם כֵּ֣ן אֵפוֹא֮ זֹ֣את עֲשׂוּ֒
    קְח֞וּ מִ/זִּמְרַ֤ת הָ/אָ֨רֶץ֙ בִּ/כְלֵי/כֶ֔ם וְ/הוֹרִ֥ידוּ לָ/אִ֖ישׁ מִנְחָ֑ה
    מְעַ֤ט צֳרִי֙ וּ/מְעַ֣ט דְּבַ֔שׁ נְכֹ֣את וָ/לֹ֔ט בָּטְנִ֖ים וּ/שְׁקֵדִֽים־׀׃
translation:
  text: 'Then Israel their father said to them, “If it must be so, then do this: take
    some of the choice products of the land in your containers, and carry down to
    the man a gift—a little balm and a little honey, gum and myrrh, pistachio nuts
    and almonds.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of the best produce of the land.' The Hebrew expression refers
      broadly to select products of the land, not only fruit.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may in some contexts refer to a sweet syrup rather than bee honey.'
    reason: lexical_alternative
  - marker: c
    text: The identification of the Hebrew terms rendered 'gum' and 'myrrh' is uncertain;
      alternatives include various aromatic resins such as tragacanth gum or ladanum.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂרָאֵל אֲבִיהֶם
  chosen: Israel their father
  alternatives:
  - their father Israel
  lexicon: HALOT
  rationale: Retains the Hebrew appositional structure and the narrative use of 'Israel'
    for Jacob in this context, while remaining natural in English.
- source_word: אִם כֵּן אֵפוֹא
  chosen: If it must be so, then
  alternatives:
  - If it is so, then
  - If so, then
  lexicon: HALOT
  rationale: The idiom expresses reluctant concession to circumstances. 'If it must
    be so' captures the force better than a bare 'if so'.
- source_word: זֹאת עֲשׂוּ
  chosen: do this
  alternatives:
  - do this thing
  lexicon: HALOT
  rationale: Straightforward imperative; concise modern English best matches the Hebrew.
- source_word: מִזִּמְרַת הָאָרֶץ
  chosen: some of the choice products of the land
  alternatives:
  - some of the best fruits of the land
  - some of the finest produce of the land
  lexicon: HALOT
  rationale: The noun refers broadly to select produce or prized yield of the land,
    not necessarily fruit specifically. 'Choice products' preserves the broader sense.
- source_word: בִּכְלֵיכֶם
  chosen: in your containers
  alternatives:
  - in your vessels
  - in your bags
  lexicon: HALOT
  rationale: The term is generic for articles or containers. 'Containers' is accurate
    and readable without over-specifying the type.
- source_word: וְהוֹרִידוּ
  chosen: carry down
  alternatives:
  - take down
  - bring down
  lexicon: HALOT
  rationale: The verb literally means 'cause to go down'; in context of travel to
    Egypt, 'carry down' preserves both motion and transport.
- source_word: לָאִישׁ
  chosen: to the man
  alternatives:
  - to that man
  lexicon: HALOT
  rationale: Refers to the Egyptian official already in view. 'The man' reflects the
    Hebrew article and prior narrative reference.
- source_word: מִנְחָה
  chosen: a gift
  alternatives:
  - a present
  - an offering
  - tribute
  lexicon: HALOT
  rationale: In this diplomatic context, 'gift' is the most natural rendering. 'Offering'
    could sound cultic, and 'tribute' may overstate political subordination.
- source_word: מְעַט צֳרִי
  chosen: a little balm
  alternatives:
  - a little resin
  - a little balsam
  lexicon: HALOT
  rationale: צֳרִי commonly denotes balm/resin from Gilead; 'balm' is established
    and understandable English.
- source_word: וּמְעַט דְּבַשׁ
  chosen: and a little honey
  alternatives:
  - and a little syrup
  lexicon: HALOT
  rationale: While the term can sometimes denote a syrup, 'honey' is the default and
    most likely reading here; the broader possibility is worth preserving in a footnote.
- source_word: נְכֹאת
  chosen: gum
  alternatives:
  - tragacanth gum
  - spice gum
  - aromatic gum
  lexicon: HALOT
  rationale: The exact botanical identification is uncertain, but 'gum' is a standard
    and suitably broad rendering.
- source_word: לֹט
  chosen: myrrh
  alternatives:
  - ladanum
  - resin
  lexicon: HALOT
  rationale: Traditional renderings vary because the precise substance is uncertain.
    'Myrrh' is familiar, but the uncertainty should be preserved in a footnote.
- source_word: בָּטְנִים
  chosen: pistachio nuts
  alternatives:
  - pistachios
  lexicon: HALOT
  rationale: The term is commonly identified as pistachios; 'pistachio nuts' is explicit
    and natural in a list of goods.
- source_word: שְׁקֵדִים
  chosen: almonds
  lexicon: HALOT
  rationale: Standard lexical meaning with no significant ambiguity.
