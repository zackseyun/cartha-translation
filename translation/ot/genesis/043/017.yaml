id: GEN.43.17
reference: Genesis 43:17
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ הָ/אִ֔ישׁ כַּֽ/אֲשֶׁ֖ר אָמַ֣ר יוֹסֵ֑ף וַ/יָּבֵ֥א הָ/אִ֛ישׁ אֶת
    הָ/אֲנָשִׁ֖ים בֵּ֥יתָ/ה יוֹסֵֽף־׃
translation:
  text: So the man did as Joseph said, and the man brought the men into Joseph’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'led the men to Joseph’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: Common verb עשה here introduces compliance with an instruction. 'Did'
    is the most natural English equivalent in the idiom 'did as X said.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the steward
  - the servant
  lexicon: HALOT
  rationale: The Hebrew says simply 'the man' both times. Although context suggests
    Joseph's household steward, the text does not specify his role here, so the more
    literal 'the man' preserves the source wording without importing interpretation.
- source_word: כַּאֲשֶׁר אָמַר יוֹסֵף
  chosen: as Joseph said
  alternatives:
  - just as Joseph had said
  - according to what Joseph said
  lexicon: HALOT
  rationale: This clause expresses conformity to Joseph's command. 'As Joseph said'
    is idiomatic, accurate, and concise.
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: HALOT
  rationale: The hiphil of בוא is causative, 'bring.' 'Led' is possible in context,
    but 'brought' more directly reflects the causative sense.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the brothers
  lexicon: HALOT
  rationale: The Hebrew uses the generic term 'the men,' referring to Joseph's brothers
    but not naming them as such in this verse. 'The men' preserves the narrative wording.
- source_word: בֵּיתָה יוֹסֵף
  chosen: into Joseph’s house
  alternatives:
  - to Joseph’s house
  - Josephward house
  lexicon: HALOT
  rationale: The directional he on בֵּיתָה indicates motion toward/into the house.
    In English, 'into Joseph’s house' best conveys entry into the house rather than
    mere arrival at it.
