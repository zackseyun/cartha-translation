id: GEN.43.28
reference: Genesis 43:28
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ שָׁל֛וֹם לְ/עַבְדְּ/ךָ֥ לְ/אָבִ֖י/נוּ עוֹדֶ֣/נּוּ חָ֑י וַֽ/יִּקְּד֖וּ
    ו/ישתחו׃
translation:
  text: They said, “Your servant, our father, is well; he is still alive.” Then they
    bowed down and prostrated themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'peace' (shalom), used idiomatically here for welfare or well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  chosen: is well
  alternatives:
  - peace
  - well-being
  lexicon: HALOT
  rationale: In this context, the noun functions idiomatically in response to an inquiry
    about the father's condition. Rendering it as 'is well' communicates the sense
    of welfare/wholeness more naturally in English than the more wooden 'peace.'
- source_word: לְעַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: The brothers address Joseph deferentially. Although עבד can denote a
    slave, here it is a courtly self-reference of humility, so 'your servant' best
    reflects the social register without overstating chattel status.
- source_word: לְאָבִינוּ
  chosen: our father
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained directly in English.
- source_word: עוֹדֶנּוּ חָי
  chosen: he is still alive
  alternatives:
  - he is yet alive
  - he is still living
  lexicon: HALOT
  rationale: The combination of עוד with חי emphasizes continued life. 'He is still
    alive' is natural modern English and preserves the temporal force.
- source_word: וַיִּקְּדוּ
  chosen: they bowed down
  alternatives:
  - they bent low
  - they bowed
  lexicon: HALOT
  rationale: קדד refers to bowing or inclining the body. 'Bowed down' captures the
    physical act clearly.
- source_word: וישתחו
  chosen: prostrated themselves
  alternatives:
  - worshiped
  - bowed themselves
  lexicon: HALOT
  rationale: The verb שחה/השתחוה often denotes prostration before a superior. 'Prostrated
    themselves' preserves the bodily action and avoids implying religious worship
    in a context of homage before Joseph.
