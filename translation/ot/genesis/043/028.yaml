theological_decisions:
- issue: Rendering of homage verb וישתחו
  chosen_reading: prostrated themselves
  alternative_readings:
  - worshiped
  - bowed themselves
  rationale: The context is social deference before Joseph, not divine worship. The
    translation preserves the physical gesture without importing a theological claim
    not warranted by the narrative.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve source-text sense in readable modern English.'
