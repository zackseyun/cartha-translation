theological_decisions:
- issue: Rendering of the blessing formula with אֱלֹהִים rather than a covenant name
  chosen_reading: May God be gracious to you, my son
  alternative_readings:
  - God be gracious to you, my son
  rationale: The Hebrew is a jussive-like blessing. English idiom normally supplies
    'May' to express the benedictory force. No additional theological content is imported;
    the wording simply makes the prayer-wish explicit in natural English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrastic expansion.'
