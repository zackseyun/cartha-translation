id: GEN.43.29
reference: Genesis 43:29
source:
  edition: WLC
  text: וַ/יִּשָּׂ֣א עֵינָ֗י/ו וַ/יַּ֞רְא אֶת בִּנְיָמִ֣ין אָחִי/ו֮ בֶּן אִמּ/וֹ֒
    וַ/יֹּ֗אמֶר הֲ/זֶה֙ אֲחִי/כֶ֣ם הַ/קָּטֹ֔ן אֲשֶׁ֥ר אֲמַרְתֶּ֖ם אֵלָ֑/י וַ/יֹּאמַ֕ר
    אֱלֹהִ֥ים יָחְנְ/ךָ֖ בְּנִֽ/י־־׃
translation:
  text: He lifted up his eyes and saw Benjamin, his brother, his mother's son, and
    said, “Is this your youngest brother, whom you told me about?” Then he said, “May
    God be gracious to you, my son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his brother, his mother's son,' emphasizing that Benjamin
      was Joseph's full brother through the same mother.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא עֵינָיו
  chosen: He lifted up his eyes
  alternatives:
  - He looked up
  lexicon: HALOT
  rationale: The Hebrew idiom is preserved fairly literally because it is natural
    enough in English narrative and retains the vividness of the source. 'He looked
    up' is possible but slightly flattens the expression.
- source_word: וַיַּרְא
  chosen: and saw
  alternatives:
  - and looked at
  lexicon: HALOT
  rationale: The verb ראה here straightforwardly denotes seeing. 'Saw' is the plainest
    rendering in sequence with the previous idiom.
- source_word: אֶת בִּנְיָמִין
  chosen: Benjamin
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: אָחִיו בֶּן אִמּוֹ
  chosen: his brother, his mother's son
  alternatives:
  - his brother, the son of his mother
  - his full brother
  lexicon: HALOT
  rationale: The appositional phrase is rendered transparently and somewhat formally
    to preserve the emphasis that Benjamin is Joseph's full brother through the same
    mother. 'Full brother' captures the sense but imports an interpretive compression
    not stated in the Hebrew.
- source_word: הֲזֶה
  chosen: Is this
  alternatives:
  - Is this one
  lexicon: HALOT
  rationale: Simple interrogative demonstrative; 'Is this' is idiomatic and sufficient.
- source_word: אֲחִיכֶם הַקָּטֹן
  chosen: your youngest brother
  alternatives:
  - your little brother
  - your younger brother
  lexicon: HALOT
  rationale: In context הַקָּטֹן refers to the youngest/younger brother among the
    siblings, not merely small in stature. 'Youngest brother' best fits the narrative
    context established earlier.
- source_word: אֲשֶׁר אֲמַרְתֶּם אֵלָי
  chosen: whom you told me about
  alternatives:
  - of whom you spoke to me
  - whom you mentioned to me
  lexicon: HALOT
  rationale: The Hebrew literally says 'whom you said to me,' but in English the idiomatic
    sense is that they told Joseph about him. This is a modest dynamic adjustment
    for natural English while preserving meaning.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The common Hebrew term for God here is indefinite in form but clearly
    refers to God in a benedictory expression. 'God' is the standard rendering.
- source_word: יָחְנְךָ
  chosen: be gracious to you
  alternatives:
  - show you favor
  - grant you grace
  lexicon: HALOT
  rationale: From חנן, expressing gracious favor. 'Be gracious to you' is the most
    direct and biblically resonant English rendering in a blessing formula.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The masculine singular noun with first-person suffix is best rendered
    'my son.' This preserves the gendered and affectionate address without neutralization,
    in keeping with the gender-accurate policy.
