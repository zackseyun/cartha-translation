id: GEN.43.13
reference: Genesis 43:13
source:
  edition: WLC
  text: וְ/אֶת אֲחִי/כֶ֖ם קָ֑חוּ וְ/ק֖וּמוּ שׁ֥וּבוּ אֶל הָ/אִֽישׁ־־׃
translation:
  text: Take your brother also, and arise, return to the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your brother'; contextually this refers to Benjamin.
    reason: cross_reference
  - marker: b
    text: Or 'arise, return'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אֶת
  chosen: also
  alternatives:
  - and
  - with
  lexicon: HALOT
  rationale: 'The conjunction plus object marker introduces an additional object to
    be taken along. Since English does not translate the object marker directly, ''also''
    captures the additive force naturally: ''Take your brother also.'''
- source_word: אֲחִי/כֶם
  chosen: your brother
  alternatives:
  - your brother Benjamin
  - your brother with you
  lexicon: HALOT
  rationale: Literally 'your brother.' In context this refers to Benjamin, but the
    Hebrew expression itself is not expanded, so the translation preserves the direct
    wording rather than importing the name into the main text.
- source_word: קָחוּ
  chosen: take
  alternatives:
  - bring
  - fetch
  lexicon: HALOT
  rationale: Qal imperative plural of לקח, commonly 'take.' 'Bring' would be more
    interpretive from the destination's perspective; 'take' stays closer to the source
    wording.
- source_word: וְ/ק֖וּמוּ
  chosen: arise
  alternatives:
  - get up
  - go
  lexicon: HALOT
  rationale: Qal imperative plural of קום. 'Arise' preserves the formal imperative
    sequence and rhetorical urgency. 'Get up' is possible but less elevated; 'go'
    is too interpretive.
- source_word: שׁ֥וּבוּ
  chosen: return
  alternatives:
  - go back
  - turn back
  lexicon: HALOT
  rationale: Qal imperative plural of שוב, here in the travel sense 'return.' This
    is the most direct and idiomatic rendering in context.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard preposition meaning 'to' or 'toward.' 'To' is the most natural
    English rendering here.
- source_word: הָ/אִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Definite noun meaning 'the man,' referring contextually to the Egyptian
    official. The Hebrew uses the definite article, not a demonstrative, so 'the man'
    is preferred.
