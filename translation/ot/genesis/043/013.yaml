  from: arise, return
  to: arise and return
  rationale: The Hebrew uses two consecutive imperatives (`ק֖וּמוּ שׁ֥וּבוּ`) without
    a conjunction (asyndeton). While 'arise, return' literally mirrors this structure,
    it creates a stilted cadence in English. Adding 'and' ('arise and return') is
    a common and stylistically preferable way to render such asyndetic verb chains,
    resulting in a more natural and fluid command that still honors both Hebrew verbs.
