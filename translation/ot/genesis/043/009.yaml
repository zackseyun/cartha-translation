theological_decisions:
- issue: Rendering of וְחָטָאתִי לְךָ in a non-cultic interpersonal context
  chosen_reading: then I will bear the blame before you
  alternative_readings:
  - then I will have sinned against you
  rationale: The Hebrew verb is the ordinary verb for sinning, but here Judah is making
    a pledge of personal liability to his father, not making a doctrinal statement
    about sin in a theological abstraction. The chosen rendering preserves culpability
    while fitting the legal-relational context. The more literal alternative is preserved
    in a footnote for auditability.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
