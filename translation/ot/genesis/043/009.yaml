id: GEN.43.9
reference: Genesis 43:9
source:
  edition: WLC
  text: אָֽנֹכִי֙ אֶֽעֶרְבֶ֔/נּוּ מִ/יָּדִ֖/י תְּבַקְשֶׁ֑/נּוּ אִם לֹ֨א הֲבִיאֹתִ֤י/ו
    אֵלֶ֨י/ךָ֙ וְ/הִצַּגְתִּ֣י/ו לְ/פָנֶ֔י/ךָ וְ/חָטָ֥אתִֽי לְ/ךָ֖ כָּל הַ/יָּמִֽים־־׃
translation:
  text: I myself will guarantee him. From my hand you may require him. If I do not
    bring him to you and set him before you, then I will bear the blame before you
    all my days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'then I will have sinned against you all my days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I alone
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in context, with Judah personally
    taking responsibility. 'I myself' preserves the emphasis more clearly than simple
    'I'.
- source_word: אֶעֶרְבֶנּוּ
  chosen: will guarantee him
  alternatives:
  - will be surety for him
  - will pledge myself for him
  - will stand security for him
  lexicon: HALOT
  rationale: The verb ערב in this stem conveys acting as surety/guarantor. 'Guarantee
    him' is readable modern English and preserves the legal-responsibility sense without
    archaic 'be surety.'
- source_word: מִיָּדִי
  chosen: From my hand
  alternatives:
  - At my hand
  - From me
  lexicon: HALOT
  rationale: The idiom 'from my hand' is retained because it is natural enough in
    English and preserves the concrete accountability imagery of the Hebrew.
- source_word: תְּבַקְשֶׁנּוּ
  chosen: you may require him
  alternatives:
  - you shall require him
  - you may demand him back from me
  - you may hold me accountable for him
  lexicon: HALOT
  rationale: בקש here means to seek/require in the sense of exacting accountability.
    'Require him' fits the legal idiom with the preceding 'from my hand.' 'May' reflects
    the imperfect's modal force in this pledge context.
- source_word: אִם לֹא
  chosen: If I do not
  alternatives:
  - unless I
  - if not
  lexicon: HALOT
  rationale: This introduces the condition of Judah's self-imprecation. 'If I do not'
    is the most straightforward English equivalent.
- source_word: הֲבִיאֹתִיו
  chosen: bring him
  alternatives:
  - bring him back
  - cause him to come
  lexicon: HALOT
  rationale: The hiphil of בוא means 'bring.' 'Back' is contextually implied because
    Benjamin is to return, but not explicit in the Hebrew, so it is left unstated
    in the main text.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - back to you
  lexicon: HALOT
  rationale: Simple directional phrase; 'to you' is sufficient and avoids adding 'back,'
    which is interpretive.
- source_word: וְהִצַּגְתִּיו לְפָנֶיךָ
  chosen: and set him before you
  alternatives:
  - and present him before you
  - and place him before you
  lexicon: HALOT
  rationale: The verb יצג in hiphil means to set/place/present. 'Set him before you'
    is slightly more formal and preserves the concrete presentation scene.
- source_word: וְחָטָאתִי לְךָ
  chosen: then I will bear the blame before you
  alternatives:
  - then I will have sinned against you
  - then I will stand guilty before you
  - then I will be at fault to you
  lexicon: HALOT
  rationale: Although חטא commonly means 'sin,' in this interpersonal pledge context
    it carries the sense of incurring guilt or blame toward the father. 'Bear the
    blame before you' communicates enduring culpability in idiomatic English without
    flattening the moral seriousness.
- source_word: כָּל הַיָּמִים
  chosen: all my days
  alternatives:
  - all the days
  - forever
  lexicon: HALOT
  rationale: The phrase denotes lifelong duration. 'All my days' is natural English
    and preserves the personal, enduring force better than the more wooden 'all the
    days.'
