id: GEN.43.31
reference: Genesis 43:31
source:
  edition: WLC
  text: וַ/יִּרְחַ֥ץ פָּנָ֖י/ו וַ/יֵּצֵ֑א וַ/יִּ֨תְאַפַּ֔ק וַ/יֹּ֖אמֶר שִׂ֥ימוּ לָֽחֶם׃
translation:
  text: Then he washed his face, came out, controlled himself, and said, “Serve the
    food.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread'; here likely used more broadly for the food or meal being
      served.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְחַץ
  chosen: washed
  alternatives:
  - bathed
  - rinsed
  lexicon: HALOT
  rationale: The verb רחץ commonly means to wash. In context, after weeping privately,
    'washed' naturally conveys cleansing his face before returning.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his faces
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, פָּנִים is idiomatically rendered
    in English as the singular 'face' when referring to one person's face.
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: Both are possible for יצא. 'Came out' reads naturally from the narrative
    viewpoint as Joseph emerges from the private room back to the meal.
- source_word: וַיִּתְאַפַּק
  chosen: controlled himself
  alternatives:
  - restrained himself
  - composed himself
  lexicon: HALOT
  rationale: The hitpael of אפק here denotes self-restraint after strong emotion.
    'Controlled himself' is clear modern English; 'restrained himself' is slightly
    more formal, and 'composed himself' emphasizes emotional recovery. The chosen
    rendering best balances lexical force and readability.
- source_word: שִׂימוּ
  chosen: Serve
  alternatives:
  - Set out
  - Place
  lexicon: HALOT
  rationale: Literally 'put/place,' but in meal context the command is to set the
    meal before them. 'Serve' expresses the idiomatic sense in natural English without
    excessive paraphrase.
- source_word: לָחֶם
  chosen: the food
  alternatives:
  - bread
  - the meal
  lexicon: HALOT
  rationale: While לֶחֶם literally means 'bread,' it often stands metonymically for
    food or a meal. Since the scene concerns serving a banquet, 'the food' best reflects
    the contextual sense; 'bread' would sound too narrow in English.
