id: GEN.43.25
reference: Genesis 43:25
source:
  edition: WLC
  text: וַ/יָּכִ֨ינוּ֙ אֶת הַ/מִּנְחָ֔ה עַד בּ֥וֹא יוֹסֵ֖ף בַּֽ/צָּהֳרָ֑יִם כִּ֣י
    שָֽׁמְע֔וּ כִּי שָׁ֖ם יֹ֥אכְלוּ לָֽחֶם־־־׃
translation:
  text: So they prepared the gift until Yosef came at noon, because they had heard
    that they would eat bread there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'eat bread,' an idiom for sharing a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכִינוּ
  chosen: they prepared
  alternatives:
  - they made ready
  - they got ready
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of כון here means to make something ready or prepare
    it. 'Prepared' is natural modern English and keeps the object-focused sense.
- source_word: הַמִּנְחָה
  chosen: the gift
  alternatives:
  - the present
  - the offering
  lexicon: HALOT
  rationale: In the Joseph narrative, מִנְחָה refers to the brothers' present for
    Yosef, not a cultic offering. 'Gift' is clear and idiomatic; 'offering' would
    sound overly sacrificial in this context.
- source_word: עַד בּוֹא יוֹסֵף
  chosen: until Yosef came
  alternatives:
  - until Yosef arrived
  - for Yosef's coming
  lexicon: HALOT
  rationale: The preposition עַד with infinitive construct בּוֹא expresses duration
    up to the point of Yosef's arrival. 'Until Yosef came' is straightforward English.
- source_word: בַּצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: The noun denotes midday/noon. 'At noon' is the most natural concise rendering
    in contemporary English.
- source_word: כִּי שָׁמְעוּ
  chosen: because they had heard
  alternatives:
  - for they heard
  - since they heard
  lexicon: HALOT
  rationale: 'The first כִּי is causal. Rendering with past perfect (''had heard'')
    fits the narrative sequence in English: their preparation was based on prior information.'
- source_word: כִּי שָׁם
  chosen: that ... there
  alternatives:
  - that there
  - for there
  lexicon: HALOT
  rationale: The second כִּי introduces the content of what they heard, and שָׁם specifies
    location. English idiom requires restructuring as 'that they would eat ... there.'
- source_word: יֹאכְלוּ לָחֶם
  chosen: they would eat bread
  alternatives:
  - they would dine
  - they would have a meal
  lexicon: HALOT
  rationale: Literally 'eat bread.' In Hebrew this can function idiomatically for
    taking a meal, but retaining 'eat bread' preserves the source wording without
    obscuring meaning in context.
- source_word: יוֹסֵף
  chosen: Yosef
  alternatives:
  - Joseph
  rationale: Per project philosophy, personal names are transliterated rather than
    replaced by traditional Anglicized forms.
