theological_decisions:
- issue: Whether אֲדֹנָי here should be read as a divine title ('Lord') or a human/angelic
    plural address ('my lords')
  chosen_reading: 'human/angelic plural address: ''my lords'''
  alternative_readings:
  - my Lord
  rationale: The addressees are plural ('to them'), referring to the two visitors/angels.
    The immediate syntax therefore favors a plural address rather than a singular
    divine title. Because the form can be read in ways that English tradition sometimes
    capitalizes as a divine address, the alternative is preserved in a footnote rather
    than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    titles where context supports, but follow the source text's plain sense.
