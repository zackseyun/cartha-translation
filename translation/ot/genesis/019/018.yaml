id: GEN.19.18
reference: Genesis 19:18
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר ל֖וֹט אֲלֵ/הֶ֑ם אַל נָ֖א אֲדֹנָֽ/י־׃
translation:
  text: But Lot said to them, “No, please, my lords.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “No, please, my Lord.” The Hebrew form אֲדֹנָי can be understood as
      a singular respectful address in some readings, but the plural context ('to
      them') favors “my lords” here.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. English may render
    it as 'and,' 'then,' or 'but' depending on discourse flow. Here 'but' best reflects
    Lot's responsive objection to the angels' prior instruction in the immediate context.
- source_word: לוֹט
  chosen: Lot
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - to those men
  lexicon: HALOT
  rationale: The preposition אֶל with 3mp suffix straightforwardly means 'to them.'
    The referent is the two visitors/angels, but the pronoun should remain as in the
    Hebrew rather than being expanded in the main text.
- source_word: אַל
  chosen: 'No'
  alternatives:
  - not
  - do not
  lexicon: HALOT
  rationale: Although אַל is the standard negative particle used with jussive or imperative
    force ('do not'), in this verbless plea it functions idiomatically as a strong
    negation of the preceding proposal. 'No' is the most natural English equivalent
    here.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray you
  lexicon: HALOT
  rationale: נָא is a particle of entreaty or politeness. 'Please' conveys the force
    in readable modern English without archaic diction.
- source_word: אֲדֹנָי
  chosen: my lords
  alternatives:
  - my lord
  - sirs
  lexicon: HALOT
  rationale: The form here is best taken as plural in address to the two visitors,
    matching the immediate context ('to them'). Rendering it 'my lords' preserves
    the plural sense. 'Sirs' is possible idiomatically, but 'my lords' better reflects
    the lexical content of אֲדוֹן while remaining natural enough in context.
