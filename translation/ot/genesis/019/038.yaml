id: GEN.19.38
reference: Genesis 19:38
source:
  edition: WLC
  text: וְ/הַ/צְּעִירָ֤ה גַם הִוא֙ יָ֣לְדָה בֵּ֔ן וַ/תִּקְרָ֥א שְׁמ֖/וֹ בֶּן עַמִּ֑י
    ה֛וּא אֲבִ֥י בְנֵֽי עַמּ֖וֹן עַד הַ/יּֽוֹם־־־־׃ס
translation:
  text: The younger also bore a son and called his name Ben-ammi; he is the father
    of the sons of Ammon to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ben-ammi likely means 'son of my people' or 'son of my kinsman.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Ammonites'; literally, 'the sons of Ammon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַצְּעִירָה
  chosen: The younger
  alternatives:
  - the younger daughter
  - the younger one
  lexicon: HALOT
  rationale: The adjective with article functions substantivally, referring back to
    Lot's younger daughter in context. 'The younger' is concise and natural English
    while preserving the comparative sense.
- source_word: גַם הִוא
  chosen: also
  alternatives:
  - she also
  - even she
  lexicon: HALOT
  rationale: The combination adds emphasis that the younger daughter likewise did
    as the older had done. English can express this naturally with 'also' without
    needing to repeat 'she' explicitly.
- source_word: יָלְדָה בֵּן
  chosen: bore a son
  alternatives:
  - gave birth to a son
  - had a son
  lexicon: HALOT
  rationale: A standard idiomatic rendering of ילד + בן in narrative. 'Bore a son'
    is both accurate and suitably literary without being archaic.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: called his name
  alternatives:
  - named him
  - called him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is preserved in
    readable English to maintain the naming formula used in Genesis, though 'named
    him' would also be possible.
- source_word: בֶּן עַמִּי
  chosen: Ben-ammi
  alternatives:
  - Ben-ammi (son of my people/kinsman)
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated. The meaning of the name is significant to the narrative, so it
    is preserved in a footnote.
- source_word: הוּא אֲבִי
  chosen: he is the father
  alternatives:
  - he became the father
  - he was the ancestor
  lexicon: HALOT
  rationale: The verbless clause identifies Ben-ammi as progenitor of a people group.
    'He is the father' is the most direct rendering; in genealogical context 'father'
    carries the sense of ancestor.
- source_word: בְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the children of Ammon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' This preserves the genealogical
    framing of the verse. 'Ammonites' is a valid dynamic equivalent and is preserved
    in a footnote.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew temporal expression
    in narrative, indicating the continuing identity of the group up to the narrator's
    time.
