id: GEN.19.10
reference: Genesis 19:10
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֤וּ הָֽ/אֲנָשִׁים֙ אֶת יָדָ֔/ם וַ/יָּבִ֧יאוּ אֶת ל֛וֹט אֲלֵי/הֶ֖ם הַ/בָּ֑יְתָ/ה וְ/אֶת הַ/דֶּ֖לֶת סָגָֽרוּ־־־׃
translation:
  text: But the men reached out their hands and brought Lot into the house with them, and shut the door.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretched out their hands.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the men'; the broader context identifies them as angelic messengers.
    reason: alternative_reading
  - marker: c
    text: Or 'and they shut the door'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the visitors
  - the angels
  lexicon: HALOT
  rationale: The Hebrew noun literally means 'the men.' Although the broader narrative identifies them as angelic messengers, this verse refers to them with the ordinary term אֲנָשִׁים, so the main text preserves the source wording rather than importing the interpretation 'angels.'
- source_word: וַיִּשְׁלְחוּ אֶת יָדָם
  chosen: reached out their hands
  alternatives:
  - stretched out their hands
  - sent forth their hand
  lexicon: HALOT
  rationale: The idiom combines שׁלח with 'hand(s)' to express extending the hand physically. 'Reached out their hands' is natural modern English and accurately conveys the action.
- source_word: וַיָּבִיאוּ
  chosen: brought
  alternatives:
  - pulled in
  - brought in
  lexicon: HALOT
  rationale: The hiphil of בוא means 'bring' or 'cause to come.' 'Brought' is the most straightforward rendering; the context already implies urgency without needing the more interpretive 'pulled in.'
- source_word: אֲלֵיהֶם הַבָּיְתָה
  chosen: into the house with them
  alternatives:
  - to them into the house
  - into the house to them
  lexicon: HALOT
  rationale: The phrase indicates movement toward them into the house. English idiom is best served by 'into the house with them,' which preserves both the destination and Lot's movement into their company.
- source_word: הַבָּיְתָה
  chosen: the house
  alternatives:
  - the home
  lexicon: HALOT
  rationale: The directional ending on 'house' marks motion toward the house. In English this is naturally expressed by the preposition 'into' rather than by a special form of the noun.
- source_word: הַדֶּלֶת
  chosen: the door
  alternatives:
  - the entrance door
  lexicon: HALOT
  rationale: דֶּלֶת is the ordinary word for 'door.' No expansion is needed in the main text.
- source_word: סָגָרוּ
  chosen: they shut
  alternatives:
  - they closed
  lexicon: HALOT
  rationale: '''Shut'' fits the urgent narrative context slightly better than the more neutral ''closed,'' while remaining fully faithful to the Hebrew verb.'
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: HALOT
  rationale: The prefixed waw here advances the narrative with a mildly adversative sense against the mob's action in the previous verse. 'But' captures that contrast in natural English.
