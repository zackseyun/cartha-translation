theological_decisions:
- issue: Whether to identify הָאֲנָשִׁים explicitly as angels in the translation
  chosen_reading: Retain 'the men' in the main text
  alternative_readings:
  - the angels
  - the visitors
  rationale: The narrative context makes clear these figures are angelic, but the Hebrew wording in this verse itself says 'the men.' Following original-language primacy, the translation preserves the lexical form used by the text rather than making the identification explicit in the main line.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/010.json
  category: awkward_english
