theological_decisions:
- issue: Speaker identification
  chosen_reading: Rendered simply as 'he said' without specifying whether the speaker
    is one angel or the angelic party collectively.
  alternative_readings:
  - '''they said'' by sense, referring to the messengers collectively'
  - explicit identification as 'the angel said'
  rationale: The Hebrew verb is singular, so the translation preserves that grammatical
    detail. The text does not require resolving the narrative question beyond the
    singular form.
