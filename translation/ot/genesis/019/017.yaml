id: GEN.19.17
reference: Genesis 19:17
source:
  edition: WLC
  text: וַ/יְהִי֩ כְ/הוֹצִיאָ֨/ם אֹתָ֜/ם הַ/ח֗וּצָ/ה וַ/יֹּ֨אמֶר֙ הִמָּלֵ֣ט עַל נַפְשֶׁ֔/ךָ
    אַל תַּבִּ֣יט אַחֲרֶ֔י/ךָ וְ/אַֽל תַּעֲמֹ֖ד בְּ/כָל הַ/כִּכָּ֑ר הָ/הָ֥רָ/ה הִמָּלֵ֖ט
    פֶּן תִּסָּפֶֽה־־־־־׃
translation:
  text: And as they brought them outside, he said, “Escape for your life. Do not look
    behind you, and do not stop anywhere in the plain. Escape to the hills, lest you
    be swept away.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not look back.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the mountain' or 'to the hill country.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest you be destroyed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחוּצָה
  chosen: outside
  alternatives:
  - outdoors
  - to the outside
  lexicon: HALOT
  rationale: Directional adverb with article and locative ending, indicating movement
    out from the city/interior. 'Outside' is natural modern English and preserves
    the spatial sense.
- source_word: הִמָּלֵט
  chosen: Escape
  alternatives:
  - Flee
  - Save yourself
  lexicon: HALOT
  rationale: Niphal imperative of מלט conveys urgent deliverance/escape. 'Escape'
    fits both occurrences and preserves the repeated command without over-paraphrasing.
- source_word: עַל נַפְשֶׁךָ
  chosen: for your life
  alternatives:
  - for yourself
  - for the sake of your life
  lexicon: HALOT
  rationale: Idiomatic expression meaning to save one's life. 'For your life' is the
    most idiomatic English equivalent and keeps the urgency.
- source_word: אַל תַּבִּיט אַחֲרֶיךָ
  chosen: Do not look behind you
  alternatives:
  - Do not look back
  - Do not gaze after you
  lexicon: HALOT
  rationale: The Hebrew literally refers to looking after/behind oneself. 'Behind
    you' is slightly more literal than the common idiom 'back,' while remaining natural
    English.
- source_word: וְאַל תַּעֲמֹד
  chosen: and do not stop
  alternatives:
  - and do not stand still
  - and do not stay
  lexicon: HALOT
  rationale: עמד in this warning context means to halt or remain in place, not merely
    to stand upright. 'Do not stop' best conveys the intended urgency of continued
    flight.
- source_word: בְּכָל הַכִּכָּר
  chosen: anywhere in the plain
  alternatives:
  - in all the plain
  - anywhere in the valley
  lexicon: HALOT
  rationale: כִּכָּר here refers to the Jordan plain/circle region. 'Anywhere in the
    plain' captures the distributive force of בְּכָל in idiomatic English.
- source_word: הָהָרָה
  chosen: to the hills
  alternatives:
  - to the mountain
  - to the hill country
  lexicon: HALOT
  rationale: Directional form of 'mountain/hill country.' English often uses the plural
    'hills' or 'mountains' for flight to uplands. 'To the hills' is idiomatic and
    fits the topographical contrast with 'the plain.'
- source_word: פֶּן תִּסָּפֶה
  chosen: lest you be swept away
  alternatives:
  - lest you be destroyed
  - or you will be consumed
  lexicon: HALOT
  rationale: נספה in Niphal can mean to be swept away, destroyed, or perish, often
    with others in judgment. 'Be swept away' preserves the sense of being overtaken
    in the coming catastrophe rather than merely dying in general.
