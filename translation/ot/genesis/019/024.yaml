theological_decisions:
- issue: Repetition of the divine name in 'the LORD ... from the LORD'
  chosen_reading: Retain the repetition in the main text without harmonizing or paraphrasing it away.
  alternative_readings:
  - Then the LORD rained ... from heaven
  - Then the LORD rained ... from himself out of heaven
  rationale: The Hebrew text explicitly repeats YHWH, and the translation should preserve that wording rather than resolve possible interpretive questions about agency or intra-divine reference. This maintains theological tension rather than importing an explanatory reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
