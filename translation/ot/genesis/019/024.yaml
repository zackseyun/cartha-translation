id: GEN.19.24
reference: Genesis 19:24
source:
  edition: WLC
  text: וַֽ/יהוָ֗ה הִמְטִ֧יר עַל סְדֹ֛ם וְ/עַל עֲמֹרָ֖ה גָּפְרִ֣ית וָ/אֵ֑שׁ מֵ/אֵ֥ת יְהוָ֖ה מִן הַ/שָּׁמָֽיִם־־־׃
translation:
  text: Then Yahweh rained sulfur and fire on Sodom and Gomorrah from Yahweh out of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often read 'brimstone and fire.' The Hebrew גָּפְרִית more precisely denotes sulfur.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from the LORD out of the heavens.'' The repeated divine name is retained from the source text rather than simplified.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH rather than transliteration.
- source_word: הִמְטִיר
  chosen: rained
  alternatives:
  - caused to rain
  - poured down
  lexicon: HALOT
  rationale: The Hiphil verb means 'cause to rain' or 'rain down.' 'Rained' is natural modern English and preserves the image of divine judgment falling from above without unnecessary paraphrase.
- source_word: גָּפְרִית
  chosen: sulfur
  alternatives:
  - brimstone
  lexicon: HALOT
  rationale: The noun denotes sulfur. 'Sulfur' is the clearest modern English equivalent; 'brimstone' is traditional but archaic and less precise for contemporary readers.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; paired with 'sulfur' to reflect the twofold object of what the LORD rained down.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: '''On'' is the natural modern rendering of the preposition here, indicating the target of the judgment.'
- source_word: סְדֹם וְעֲמֹרָה
  chosen: Sodom and Gomorrah
  lexicon: HALOT
  rationale: Standard English transliterations of the place names.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from before the LORD
  - from Yahweh
  lexicon: HALOT
  rationale: The phrase explicitly states source/origin. It should be retained rather than smoothed away, even though the repetition of the divine name is stylistically unusual in English.
- source_word: מִן הַשָּׁמַיִם
  chosen: out of the heavens
  alternatives:
  - from heaven
  - from the sky
  lexicon: HALOT
  rationale: The Hebrew is plural ('the heavens'). 'Out of the heavens' preserves both the source imagery and the formal distinction better than the singular 'from heaven,' while remaining readable.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw advances the narrative. 'Then' communicates sequential narrative movement in idiomatic English better than a bare initial 'And' in this context.
