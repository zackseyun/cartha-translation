id: GEN.19.31
reference: Genesis 19:31
source:
  edition: WLC
  text: וַ/תֹּ֧אמֶר הַ/בְּכִירָ֛ה אֶל הַ/צְּעִירָ֖ה אָבִ֣י/נוּ זָקֵ֑ן וְ/אִ֨ישׁ אֵ֤ין
    בָּ/אָ֨רֶץ֙ לָ/ב֣וֹא עָלֵ֔י/נוּ כְּ/דֶ֖רֶךְ כָּל הָ/אָֽרֶץ־־׃
translation:
  text: And the firstborn said to the younger, “Our father is old, and there is not
    a man in the land to come in to us according to the way of all the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'to have relations with us.' The Hebrew uses the
      euphemistic expression 'to come in to us.'
    reason: lexical_alternative
  - marker: b
    text: '''According to the way of all the earth'' likely means according to the
      ordinary human custom or pattern, especially regarding sexual union and family
      continuation.'
    reason: cultural_note
lexical_decisions:
- source_word: הַבְּכִירָה
  chosen: the firstborn
  alternatives:
  - the older
  - the elder daughter
  lexicon: HALOT
  rationale: Literally denotes the firstborn/older one. 'The firstborn' preserves
    the familial birth-order emphasis of the Hebrew better than the more interpretive
    'older daughter.'
- source_word: הַצְּעִירָה
  chosen: the younger
  alternatives:
  - the younger daughter
  - the younger one
  lexicon: HALOT
  rationale: A comparative adjective meaning 'younger/smaller.' 'The younger' is natural
    English and matches the paired contrast with 'the firstborn.'
- source_word: אָבִינוּ זָקֵן
  chosen: Our father is old
  alternatives:
  - Our father has grown old
  lexicon: HALOT
  rationale: The verbless Hebrew clause with participial/adjectival predicate is well
    represented by simple English present tense. 'Is old' is direct and idiomatic.
- source_word: וְאִישׁ אֵין בָּאָרֶץ
  chosen: and there is not a man in the land
  alternatives:
  - and there is no man in the land
  - and there is no one in the land
  lexicon: HALOT
  rationale: אִישׁ specifically means 'man,' not the gender-neutral 'one.' Because
    the context concerns sexual union and potential procreation, the male reference
    should be preserved. 'In the land' reflects בָאָרֶץ straightforwardly.
- source_word: לָבוֹא עָלֵינוּ
  chosen: to come in to us
  alternatives:
  - to come to us
  - to have relations with us
  lexicon: HALOT
  rationale: This is a sexual euphemism in context. 'Come in to us' preserves the
    Hebrew idiom and narrative register without flattening it into an explicit paraphrase.
    'Come to us' would be too vague; 'have relations with us' is more interpretive
    than necessary.
- source_word: כְּדֶרֶךְ כָּל הָאָרֶץ
  chosen: according to the way of all the earth
  alternatives:
  - as is the custom throughout all the earth
  - in the manner of all the earth
  lexicon: HALOT
  rationale: The phrase refers to the common human pattern/custom, here specifically
    ordinary sexual union/marriage practice. 'According to the way of all the earth'
    stays close to the Hebrew while remaining understandable in English.
