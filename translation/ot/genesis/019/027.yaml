id: GEN.19.27
reference: Genesis 19:27
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֥ם אַבְרָהָ֖ם בַּ/בֹּ֑קֶר אֶל הַ֨/מָּק֔וֹם אֲשֶׁר עָ֥מַד שָׁ֖ם
    אֶת פְּנֵ֥י יְהוָֽה־־־׃
translation:
  text: Abraham rose early in the morning to the place where he had stood before the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the face of the LORD,'' an idiom meaning ''before the
      LORD'' or ''in the LORD’s presence.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - set out early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early. 'Rose early' is natural
    modern English and preserves the temporal emphasis without adding motion beyond
    the verb itself.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: בוקר denotes morning. Combined with וַיַּשְׁכֵּם, the phrase idiomatically
    emphasizes early morning action; 'in the morning' keeps the Hebrew temporal phrase
    explicit.
- source_word: אֶל הַמָּקוֹם
  chosen: to the place
  alternatives:
  - to the spot
  lexicon: HALOT
  rationale: מקום is the ordinary term for 'place.' 'To the place' is straightforward
    and fits the narrative's reference back to the earlier location.
- source_word: אֲשֶׁר עָמַד שָׁם
  chosen: where he had stood
  alternatives:
  - where he stood there
  - where he had been standing
  lexicon: HALOT
  rationale: The relative clause points to a prior event, so English past perfect
    ('had stood') best conveys the retrospective sense. שָׁם is absorbed idiomatically
    into 'where' rather than rendered woodenly as 'where there,' which would be unnatural
    in English.
- source_word: אֶת־פְּנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: The idiom עמד את־פני means to stand before someone, i.e., in their presence.
    'Before' is the most natural concise rendering; 'before the face of' would be
    overly literal in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation's stated policy.
