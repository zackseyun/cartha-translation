id: GEN.19.3
reference: Genesis 19:3
source:
  edition: WLC
  text: וַ/יִּפְצַר בָּ֣/ם מְאֹ֔ד וַ/יָּסֻ֣רוּ אֵלָ֔י/ו וַ/יָּבֹ֖אוּ אֶל בֵּית֑/וֹ
    וַ/יַּ֤עַשׂ לָ/הֶם֙ מִשְׁתֶּ֔ה וּ/מַצּ֥וֹת אָפָ֖ה וַ/יֹּאכֵֽלוּ־־׃
translation:
  text: But he urged them strongly, so they turned aside to him and entered his house.
    He prepared a feast for them, baked unleavened bread, and they ate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pressed them greatly' / 'insisted strongly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'unleavened breads' or 'unleavened cakes'; traditionally associated
      with bread made without yeast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְצַר
  chosen: urged
  alternatives:
  - pressed
  - insisted
  lexicon: HALOT
  rationale: The verb פצר here conveys strong urging or pressing someone to do something.
    'Urged' is natural modern English; 'strongly' from מְאֹד preserves the intensity.
    'Pressed' is possible but less idiomatic in this context.
- source_word: מְאֹד
  chosen: strongly
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: Used adverbially to intensify Lot's action. 'Strongly' fits the verbal
    idea of urging better than a more wooden 'very much.'
- source_word: וַיָּסֻרוּ אֵלָיו
  chosen: turned aside to him
  alternatives:
  - went with him
  - turned in to him
  lexicon: HALOT
  rationale: סור commonly means 'turn aside.' Retaining this imagery reflects the
    Hebrew while remaining readable. 'To him' preserves אֵלָיו rather than collapsing
    it into a simple 'with him.'
- source_word: וַיָּבֹאוּ אֶל־בֵּיתוֹ
  chosen: entered his house
  alternatives:
  - came into his house
  - went into his house
  lexicon: HALOT
  rationale: A straightforward rendering of the motion verb plus destination. 'Entered'
    is concise and idiomatic.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - a banquet
  - a drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast or banquet, often with drinking, but the context
    does not require foregrounding alcohol. 'Feast' is clear and suitably broad.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: The noun refers to bread made without leaven. 'Unleavened bread' is the
    clearest standard English rendering; 'matzot' would be transliteration rather
    than translation.
- source_word: אָפָה
  chosen: baked
  alternatives:
  - he baked
  lexicon: HALOT
  rationale: The Hebrew uses an explicit verb after the object, literally 'and unleavened
    bread he baked.' In English, 'baked unleavened bread' naturally conveys the action
    without awkwardness.
- source_word: וַיֹּאכֵלוּ
  chosen: they ate
  alternatives:
  - and they ate
  lexicon: HALOT
  rationale: Simple narrative conclusion. The conjunction is represented in the sentence
    flow; the clause states that the visitors ate the meal Lot prepared.
