id: GEN.19.20
reference: Genesis 19:20
source:
  edition: WLC
  text: הִנֵּה נָ֠א הָ/עִ֨יר הַ/זֹּ֧את קְרֹבָ֛ה לָ/נ֥וּס שָׁ֖מָּ/ה וְ/הִ֣יא מִצְעָ֑ר
    אִמָּלְטָ֨ה נָּ֜א שָׁ֗מָּ/ה הֲ/לֹ֥א מִצְעָ֛ר הִ֖וא וּ/תְחִ֥י נַפְשִֽׁ/י־׃
translation:
  text: Look, please, this city is near enough to flee to, and it is small. Please
    let me escape there—is it not small? Then my life will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'so that I may live.' The Hebrew reads literally,
      'and my life/soul will live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces urgent attention. 'Look' preserves the deictic force in readable
    modern English better than the more archaic 'Behold.'
- source_word: נָא (first occurrence)
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite/urgent particle in petitionary speech; 'please' best captures
    the tone in contemporary English.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city here
  - this town
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase. 'City' matches עִיר more consistently
    than 'town.'
- source_word: קְרֹבָה לָנוּס שָׁמָּה
  chosen: is near enough to flee to
  alternatives:
  - is near to flee there
  - is close enough to run to
  lexicon: HALOT
  rationale: Combines predicate adjective with infinitive of purpose/result. 'Near
    enough to flee to' is idiomatic English that preserves the sense of proximity
    for refuge.
- source_word: וְהִיא מִצְעָר
  chosen: and it is small
  alternatives:
  - and it is insignificant
  - and it is a little one
  lexicon: HALOT
  rationale: מִצְעָר denotes smallness/littleness. Here Lot argues the city's insignificance/small
    size as grounds for mercy. 'Small' is the clearest main-text rendering.
- source_word: אִמָּלְטָה נָּא שָׁמָּה
  chosen: Please let me escape there
  alternatives:
  - Please let me flee there
  - Let me be delivered there, please
  lexicon: HALOT
  rationale: Cohortative 1cs expresses request/desire. 'Let me escape there' captures
    the plea for refuge more naturally than a bare future-like form.
- source_word: הֲלֹא מִצְעָר הִוא
  chosen: is it not small?
  alternatives:
  - is it not a small one?
  - is it not insignificant?
  lexicon: HALOT
  rationale: Rhetorical question reinforcing the prior argument. 'Small' keeps the
    lexical repetition of מִצְעָר visible in English.
- source_word: וּתְחִי נַפְשִׁי
  chosen: Then my life will live
  alternatives:
  - that my life may live
  - and my soul will live
  - so that I may live
  lexicon: HALOT
  rationale: The Hebrew literally says 'and my נפש will live.' To preserve the lexical
    form without over-spiritualizing נפש as 'soul,' 'my life will live' keeps the
    concrete sense, though slightly marked in English. The more idiomatic alternative
    is preserved in a footnote.
