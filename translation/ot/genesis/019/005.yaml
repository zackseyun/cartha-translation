theological_decisions:
- issue: Whether to make the sexual intent of וְנֵדְעָה אֹתָם explicit in the main
    text
  chosen_reading: Retain the literal wording 'know them' in the main text and note
    the sexual sense in a footnote.
  alternative_readings:
  - Render explicitly as 'have sex with them'
  - Render as 'abuse them sexually'
  rationale: The Hebrew verb ידע ordinarily means 'know,' and optimal equivalence
    favors preserving the lexical form unless the context plainly demands an explicit
    idiomatic rendering. Here the narrative strongly suggests hostile sexual intent,
    but making that explicit in the main text would move from translation toward interpretation.
    Preserving the literal wording maintains auditability and literary texture, while
    the footnote documents the probable sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
