id: GEN.19.5
reference: Genesis 19:5
source:
  edition: WLC
  text: וַ/יִּקְרְא֤וּ אֶל לוֹט֙ וַ/יֹּ֣אמְרוּ ל֔/וֹ אַיֵּ֧ה הָ/אֲנָשִׁ֛ים אֲשֶׁר
    בָּ֥אוּ אֵלֶ֖י/ךָ הַ/לָּ֑יְלָה הוֹצִיאֵ֣/ם אֵלֵ֔י/נוּ וְ/נֵדְעָ֖ה אֹתָֽ/ם־־׃
translation:
  text: And they called to Lot and said to him, “Where are the men who came to you
    tonight? Bring them out to us so that we may know them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, “so that we may have sexual relations with
      them.” The Hebrew says “know them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they called
  alternatives:
  - they shouted
  - they cried out
  lexicon: HALOT
  rationale: The verb קרא in this narrative context most naturally means calling out
    to someone. 'Called' is sufficiently direct and preserves the simple narrative
    sequence without adding intensity not explicit in the verb itself.
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Interrogative of location. Because the subject is plural ('the men'),
    English requires 'Where are.'
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: אֲנָשִׁים is the masculine plural of 'man' and here refers specifically
    to male visitors. Per gender-accurate philosophy, 'the men' is preferable to a
    neutral rendering.
- source_word: בָּאוּ אֵלֶיךָ הַלָּיְלָה
  chosen: who came to you tonight
  alternatives:
  - who came to you this night
  lexicon: HALOT
  rationale: This phrase identifies the visitors by their arrival that night. 'Tonight'
    is natural modern English and accurately conveys the temporal sense of הַלַּיְלָה
    in context.
- source_word: הוֹצִיאֵם אֵלֵינוּ
  chosen: Bring them out to us
  alternatives:
  - Bring them forth to us
  - Take them out to us
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out, hence 'bring out.' This is
    idiomatic and preserves the force of the command.
- source_word: וְנֵדְעָה אֹתָם
  chosen: so that we may know them
  alternatives:
  - that we may know them
  - so that we may have relations with them
  lexicon: HALOT
  rationale: ידע literally means 'know.' In this context many interpreters understand
    a sexual sense, but the Hebrew expression itself is the ordinary verb 'know.'
    To preserve the source wording and its literary force without over-paraphrasing,
    the main text keeps 'know them,' while a footnote preserves the likely sexual
    sense.
