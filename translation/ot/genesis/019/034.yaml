id: GEN.19.34
reference: Genesis 19:34
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/תֹּ֤אמֶר הַ/בְּכִירָה֙ אֶל הַ/צְּעִירָ֔ה הֵן שָׁכַ֥בְתִּי
    אֶ֖מֶשׁ אֶת אָבִ֑/י נַשְׁקֶ֨/נּוּ יַ֜יִן גַּם הַ/לַּ֗יְלָה וּ/בֹ֨אִי֙ שִׁכְבִ֣י
    עִמּ֔/וֹ וּ/נְחַיֶּ֥ה מֵ/אָבִ֖י/נוּ זָֽרַע־־־־׃
translation:
  text: And it happened on the next day that the firstborn said to the younger, “Look,
    I lay with my father last night. Let us make him drink wine tonight also. Then
    come, lie with him, so that we may preserve offspring from our father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'seed from our father.' 'Offspring' renders the idiom in clear modern
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי מִמָּחֳרָת
  chosen: And it happened on the next day
  alternatives:
  - The next day
  - And it came to pass on the next day
  lexicon: HALOT
  rationale: Retains the narrative wayyiqtol opening while using readable modern English.
    'And it happened' preserves the Hebrew discourse marker better than omitting it
    entirely, while avoiding archaic 'came to pass.'
- source_word: הַבְּכִירָה
  chosen: the firstborn
  alternatives:
  - the older one
  - the elder daughter
  lexicon: HALOT
  rationale: The term denotes the older/firstborn daughter specifically. 'The firstborn'
    is concise and preserves the familial birth-order emphasis present in the Hebrew.
- source_word: הַצְּעִירָה
  chosen: the younger
  alternatives:
  - the younger one
  - the younger daughter
  lexicon: HALOT
  rationale: A comparative adjective used substantivally. 'The younger' matches the
    Hebrew's concise contrast with 'the firstborn.'
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: Introduces attention to what follows. 'Look' is natural modern English
    and preserves the deictic force without archaic tone.
- source_word: שָׁכַבְתִּי אֶת־אָבִי
  chosen: I lay with my father
  alternatives:
  - I slept with my father
  - I had intercourse with my father
  lexicon: HALOT
  rationale: שׁכב in this context is a sexual euphemism. 'Lay with' preserves the
    idiomatic and grave tone of the Hebrew without becoming either vague or clinically
    explicit.
- source_word: אֶמֶשׁ
  chosen: last night
  alternatives:
  - yesterday evening
  - last evening
  lexicon: HALOT
  rationale: In context, the reference is to the previous night. 'Last night' is the
    most natural English equivalent.
- source_word: נַשְׁקֶנּוּ יַיִן
  chosen: Let us make him drink wine
  alternatives:
  - Let us give him wine to drink
  - Let us cause him to drink wine
  lexicon: HALOT
  rationale: The Hiphil of שׁקה is causative. 'Make him drink wine' clearly conveys
    the causative sense in idiomatic English.
- source_word: גַּם הַלַּיְלָה
  chosen: tonight also
  alternatives:
  - again tonight
  - this night also
  lexicon: HALOT
  rationale: Preserves both the temporal reference and the additive particle גַּם.
    'Tonight also' is slightly more formal but keeps the Hebrew emphasis that this
    is a repetition.
- source_word: וּבֹאִי
  chosen: Then come
  alternatives:
  - And come
  - Come
  lexicon: HALOT
  rationale: The imperative advances the sequence of actions. 'Then come' makes the
    progression explicit in natural English.
- source_word: שִׁכְבִי עִמּוֹ
  chosen: lie with him
  alternatives:
  - sleep with him
  - have relations with him
  lexicon: HALOT
  rationale: As above, שׁכב is a sexual euphemism. 'Lie with him' best preserves the
    Hebrew idiom and register.
- source_word: וּנְחַיֶּה
  chosen: so that we may preserve
  alternatives:
  - and let us keep alive
  - that we may keep alive
  lexicon: HALOT
  rationale: The Piel of חיה here means to keep alive/preserve. In context, the object
    is 'offspring,' so 'preserve' communicates the intended sense smoothly in English.
- source_word: מֵאָבִינוּ זָרַע
  chosen: offspring from our father
  alternatives:
  - seed from our father
  - descendants by our father
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed,' but in this context refers to progeny/offspring.
    'Offspring' is the clearest modern rendering while preserving the reproductive
    sense. 'From our father' reflects the preposition מִן as source.
