id: GEN.19.1
reference: Genesis 19:1
source:
  edition: WLC
  text: וַ֠/יָּבֹאוּ שְׁנֵ֨י הַ/מַּלְאָכִ֤ים סְדֹ֨מָ/ה֙ בָּ/עֶ֔רֶב וְ/ל֖וֹט יֹשֵׁ֣ב
    בְּ/שַֽׁעַר סְדֹ֑ם וַ/יַּרְא לוֹט֙ וַ/יָּ֣קָם לִ/קְרָאתָ֔/ם וַ/יִּשְׁתַּ֥חוּ אַפַּ֖יִם
    אָֽרְצָ/ה־־׃
translation:
  text: The two angels came to Sodom in the evening, and Lot was sitting in the gate
    of Sodom. When Lot saw them, he rose to meet them and bowed with his face to the
    ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrated himself with his face to the ground.' The Hebrew describes
      a full act of bowing low before them.
    reason: lexical_alternative
  - marker: b
    text: '''In the gate of Sodom'' refers to the city-gate area, a public place associated
      with civic activity.'
    reason: cultural_note
  - marker: c
    text: Or 'bowed down with his face to the ground'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: The wayyiqtol of בוא narrates simple motion into/unto a place. 'Came'
    is natural English narrative style and fits the directional ending on 'Sodom.'
- source_word: שְׁנֵי הַמַּלְאָכִים
  chosen: the two angels
  alternatives:
  - the two messengers
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this context these are
    the heavenly visitors from the prior narrative, so 'angels' best reflects the
    referent for modern readers.
- source_word: סְדֹמָה
  chosen: to Sodom
  alternatives:
  - toward Sodom
  - into Sodom
  lexicon: HALOT
  rationale: The directional he indicates motion toward the place. 'To Sodom' is idiomatic
    and sufficiently precise in English.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  - toward evening
  lexicon: HALOT
  rationale: Temporal phrase marking time of arrival. 'In the evening' is clear modern
    English.
- source_word: יֹשֵׁב
  chosen: was sitting
  alternatives:
  - sat
  - was dwelling
  lexicon: HALOT
  rationale: The participle gives a durative/background sense in the scene setting.
    'Was sitting' preserves that ongoing posture better than the simple past.
- source_word: בְּשַׁעַר סְדֹם
  chosen: in the gate of Sodom
  alternatives:
  - at the gate of Sodom
  - in Sodom's gate
  lexicon: HALOT
  rationale: The phrase refers to the city gate area. 'In the gate of Sodom' is a
    fairly literal rendering, while still readable; it can denote the gate complex
    rather than merely the doorway.
- source_word: וַיַּרְא לוֹט
  chosen: When Lot saw them
  alternatives:
  - And Lot saw
  - Lot saw
  lexicon: HALOT
  rationale: The Hebrew says 'Lot saw,' with the object implied from context. English
    requires the object for clarity. 'When' smooths the narrative sequence naturally
    without altering meaning.
- source_word: וַיָּקָם לִקְרָאתָם
  chosen: he rose to meet them
  alternatives:
  - he got up to meet them
  - he stood up to meet them
  lexicon: HALOT
  rationale: The idiom combines rising and going to meet someone. 'Rose to meet them'
    is concise and preserves the respectful action.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - worshiped
  lexicon: HALOT
  rationale: The verb can denote bowing in homage or worship depending on context.
    Here Lot is showing deep respect/hospitality to the visitors, not necessarily
    offering worship, so 'bowed down' avoids overreading.
- source_word: אַפַּיִם אָרְצָה
  chosen: with his face to the ground
  alternatives:
  - face down to the ground
  - with his nostrils to the earth
  lexicon: HALOT
  rationale: This idiom expresses full prostration. 'With his face to the ground'
    communicates the sense clearly in natural English.
