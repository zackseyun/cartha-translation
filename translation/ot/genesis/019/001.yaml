theological_decisions:
- issue: Whether וַיִּשְׁתַּחוּ should be rendered as an act of worship or respectful
    prostration
  chosen_reading: respectful prostration ('bowed down')
  alternative_readings:
  - worshiped
  rationale: The Hebrew verb שׁחה can describe either worship of God or bowing before
    humans/angels. In this narrative setting, Lot's action is best understood as a
    culturally appropriate gesture of honor toward exalted visitors. Rendering it
    'worshiped' would import a stronger theological claim than the verse itself requires.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/001.json
  category: awkward_english
  tier: 1
  from: bowed down with his face to the ground
  to: bowed with his face to the ground
  rationale: The Hebrew phrase וַיִּשְׁתַּחוּ אַפַּיִם אָרְצָה functions as a single
    idiomatic unit for prostration. The current rendering breaks it down literally,
    resulting in a slightly redundant English phrase where both 'bowed down' and 'to
    the ground' indicate downward motion. Removing 'down' creates a more concise and
    fluid expression ('bowed with his face to the ground') that still captures the
    full meaning of the Hebrew.
