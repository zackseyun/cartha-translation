id: GEN.19.6
reference: Genesis 19:6
source:
  edition: WLC
  text: וַ/יֵּצֵ֧א אֲלֵ/הֶ֛ם ל֖וֹט הַ/פֶּ֑תְחָ/ה וְ/הַ/דֶּ֖לֶת סָגַ֥ר אַחֲרָֽי/ו׃
translation:
  text: Lot went out to them at the entrance and shut the door behind him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the doorway.' The Hebrew distinguishes between the entrance/opening
      (פֶּתַח) and the door itself (דֶּלֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: From יצא, the wayyiqtol advances the narrative with a simple past action.
    'Went out' is natural modern English and preserves the directional sense.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - out to them
  lexicon: HALOT
  rationale: The preposition אֶל with 3mp suffix indicates movement toward the men
    outside. English expresses this naturally as 'to them'; the outward motion is
    already conveyed by 'went out.'
- source_word: לוֹט
  chosen: Lot
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: הַפֶּתְחָה
  chosen: at the entrance
  alternatives:
  - to the doorway
  - to the door
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. The directional he indicates motion
    toward the entrance. 'At the entrance' captures both the location and the movement
    without awkwardness. 'Door' is avoided here because דֶּלֶת appears explicitly
    in the next clause and should be distinguished.
- source_word: וְהַדֶּלֶת
  chosen: the door
  alternatives:
  - the door-panel
  lexicon: HALOT
  rationale: דֶּלֶת refers specifically to the door itself, distinct from פֶּתַח ('entrance/opening').
    Rendering it 'the door' preserves that distinction in English.
- source_word: סָגַר
  chosen: shut
  alternatives:
  - closed
  lexicon: HALOT
  rationale: From סגר, 'shut' is a concise and vivid narrative equivalent in English.
    'Closed' is possible, but 'shut the door' is the more idiomatic collocation.
- source_word: אַחֲרָיו
  chosen: behind him
  alternatives:
  - after him
  lexicon: HALOT
  rationale: With spatial sense here, אַחַר + suffix means 'behind him,' indicating
    Lot shut the door once he had gone outside. 'After him' could be misunderstood
    temporally in English.
