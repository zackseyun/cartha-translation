id: GEN.19.16
reference: Genesis 19:16
source:
  edition: WLC
  text: וַֽ/יִּתְמַהְמָ֓הּ וַ/יַּחֲזִ֨קוּ הָ/אֲנָשִׁ֜ים בְּ/יָד֣/וֹ וּ/בְ/יַד אִשְׁתּ֗/וֹ
    וּ/בְ/יַד֙ שְׁתֵּ֣י בְנֹתָ֔י/ו בְּ/חֶמְלַ֥ת יְהוָ֖ה עָלָ֑י/ו וַ/יֹּצִאֻ֥/הוּ וַ/יַּנִּחֻ֖/הוּ
    מִ/ח֥וּץ לָ/עִֽיר׀־׃
translation:
  text: But he lingered, so the men seized his hand, his wife’s hand, and the hands
    of his two daughters, because of the LORD’s compassion for him; and they brought
    him out and set him outside the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the angelic visitors; the Hebrew text says 'the men.'
    reason: alternative_reading
  - marker: b
    text: Or 'his hand, and the hand of his wife, and the hands of his two daughters'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְמַהְמָהּ
  chosen: he lingered
  alternatives:
  - he delayed
  - he hesitated
  - he tarried
  lexicon: HALOT
  rationale: The verb conveys delaying or lingering rather than simple mental uncertainty.
    'Lingered' is natural modern English and fits the narrative urgency.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the angels
  - the messengers
  lexicon: HALOT
  rationale: The Hebrew here says 'the men.' In context these are angelic visitors,
    but the verse itself uses the ordinary narrative designation, which should be
    preserved rather than interpreted in the main text.
- source_word: וַיַּחֲזִקוּ
  chosen: seized
  alternatives:
  - grasped
  - took hold of
  lexicon: HALOT
  rationale: The verb חזק in this construction indicates taking firm hold. 'Seized'
    communicates urgency and force appropriate to the rescue scene, more vividly than
    the weaker 'took hold of.'
- source_word: בְּיָדוֹ ... וּבְיַד אִשְׁתּוֹ ... וּבְיַד שְׁתֵּי בְנֹתָיו
  chosen: his hand, and the hand of his wife, and the hands of his two daughters
  alternatives:
  - his hand, his wife's hand, and his two daughters' hands
  lexicon: HALOT
  rationale: The Hebrew repeats 'hand' with each object. English can preserve much
    of that repetition while smoothing the final phrase to plural 'hands' for idiomatic
    sense, since each daughter would be taken by the hand.
- source_word: בְּחֶמְלַת יְהוָה עָלָיו
  chosen: because of the LORD’s compassion for him
  alternatives:
  - in the LORD's mercy toward him
  - because the LORD had pity on him
  lexicon: HALOT
  rationale: חמלה denotes compassion, pity, or mercy. 'Because of the LORD’s compassion
    for him' captures the causal force of ב and keeps the divine motive explicit.
    Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name.
- source_word: וַיֹּצִאֻהוּ
  chosen: they brought him out
  alternatives:
  - they led him out
  - they took him out
  lexicon: HALOT
  rationale: The hiphil of יצא means to cause to go out. 'Brought him out' is idiomatic
    and fits the rescue action.
- source_word: וַיַּנִּחֻהוּ
  chosen: set him
  alternatives:
  - left him
  - placed him
  lexicon: HALOT
  rationale: The hiphil of נוח here means to place or set someone down in a location.
    'Set him outside the city' is more precise than 'left him,' which can imply abandonment.
- source_word: מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - from outside the city
  - beyond the city
  lexicon: HALOT
  rationale: The phrase denotes location outside the city limits. In English, 'set
    him outside the city' best conveys the result of the action.
