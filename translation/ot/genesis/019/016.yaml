theological_decisions:
- issue: Narrative identification of the rescuers
  chosen_reading: the men
  alternative_readings:
  - the angels
  rationale: Although the broader context identifies these figures as angelic messengers,
    the Hebrew wording in this verse retains the narrative label 'the men.' The translation
    preserves the source-text wording rather than importing the interpretation into
    the main text.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
