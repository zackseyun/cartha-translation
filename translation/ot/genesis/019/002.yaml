id: GEN.19.2
reference: Genesis 19:2
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר הִנֶּ֣ה נָּא אֲדֹנַ֗/י ס֣וּרוּ נָ֠א אֶל בֵּ֨ית עַבְדְּ/כֶ֤ם וְ/לִ֨ינוּ֙ וְ/רַחֲצ֣וּ רַגְלֵי/כֶ֔ם וְ/הִשְׁכַּמְתֶּ֖ם וַ/הֲלַכְתֶּ֣ם לְ/דַרְכְּ/כֶ֑ם וַ/יֹּאמְר֣וּ לֹּ֔א כִּ֥י בָ/רְח֖וֹב נָלִֽין־־׃
translation:
  text: And he said, “My lords, please turn aside to your servant’s house, and spend the night, and wash your feet. Then you may rise early and go on your way.” But they said, “No; we will spend the night in the square.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lord' if אֲדֹנַי is taken as a singular honorific; here the plural sense fits the immediate context of Lot addressing the two visitors.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term refers to an open public area of the city, such as a square or plaza.
    reason: cultural_note
  - marker: c
    text: Or 'Please, my lords, turn aside, please,'.
    reason: previous_rendering
  - marker: d
    text: Or 'please turn aside, to your servant’s house'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֶּה נָּא
  chosen: Please
  alternatives:
  - Look now
  - Behold, please
  lexicon: HALOT
  rationale: The combination functions as a polite attention-getter rather than a literal visual command in English. 'Please' captures the courteous urgency naturally.
- source_word: אֲדֹנַי
  chosen: my lords
  alternatives:
  - my masters
  - sirs
  lexicon: HALOT
  rationale: Here the referents are addressed by Lot as apparent human visitors, and the form is best taken as plural in context. 'My lords' preserves the respectful address without importing the divine title 'Lord.'
- source_word: סוּרוּ נָא
  chosen: turn aside, please
  alternatives:
  - please turn in
  - please come aside
  lexicon: HALOT
  rationale: The verb means to turn aside or turn in from the road. 'Turn aside' is slightly more formal but preserves the directional sense better than a looser invitation.
- source_word: בֵּית עַבְדְּכֶם
  chosen: your servant’s house
  alternatives:
  - the house of your servant
  - my servant-household
  lexicon: HALOT
  rationale: Lot refers to himself deferentially in the singular as 'your servant.' English idiom prefers 'your servant’s house' while retaining the humility formula.
- source_word: וְלִינוּ
  chosen: spend the night
  alternatives:
  - stay overnight
  - lodge
  lexicon: HALOT
  rationale: The verb denotes lodging for the night. 'Spend the night' is clear modern English and fits the hospitality context.
- source_word: וְרַחֲצוּ רַגְלֵיכֶם
  chosen: wash your feet
  alternatives:
  - bathe your feet
  lexicon: HALOT
  rationale: A literal rendering is appropriate and preserves the ancient hospitality practice.
- source_word: וְהִשְׁכַּמְתֶּם
  chosen: you may rise early
  alternatives:
  - you shall rise early
  - you can get up early
  lexicon: HALOT
  rationale: The form indicates rising early the next morning. 'You may rise early' fits the invitational sequence in English without overstating command force.
- source_word: וַהֲלַכְתֶּם לְדַרְכְּכֶם
  chosen: go on your way
  alternatives:
  - go to your way
  - continue on your journey
  lexicon: HALOT
  rationale: This is an idiomatic English equivalent for proceeding along one's route after departure.
- source_word: בָרְחוֹב
  chosen: in the square
  alternatives:
  - in the street
  - in the open plaza
  lexicon: HALOT
  rationale: The noun refers to an open public area of the city, not merely a roadway. 'Square' better conveys the likely civic space.
- source_word: נָלִין
  chosen: we will spend the night
  alternatives:
  - we will stay overnight
  - we will lodge
  lexicon: HALOT
  rationale: Using the same English expression as earlier preserves lexical consistency for the same Hebrew root לין in this verse.
