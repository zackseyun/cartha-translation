theological_decisions:
- issue: Whether אֲדֹנַי should be rendered as a divine title or a human address
  chosen_reading: 'human address: ''my lords'''
  alternative_readings:
  - '''my lord'' if read as singular and directed to a divine figure'
  rationale: In the narrative setting Lot is addressing the two visitors as honored guests. The plural verbs and pronouns throughout the verse support a plural human address. Rendering it as 'my lords' avoids implying a direct address to God in the main text while preserving the respectful tone.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not import doctrinal claims the text does not make.'
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/002.json
  category: awkward_english
  tier: 1
  from: Please, my lords, turn aside, please,
  to: My lords, please turn aside,
  rationale: The Hebrew text contains two particles of entreaty (נָּא), which the draft renders with two instances of 'please'. While faithful to the repetition in the source, this results in a slightly awkward and unnatural-sounding phrase in English. Combining the force of the entreaty into a single 'please' improves the flow while still conveying the intended tone of polite urgency.
- timestamp: '2026-04-21T00:37:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/002.json
  category: awkward_english
  tier: 1
  from: please turn aside, to your servant’s house
  to: please turn aside to your servant’s house
  rationale: The comma incorrectly separates the verb 'turn aside' from its essential prepositional phrase 'to your servant’s house,' creating an awkward pause and breaking the grammatical flow. The Hebrew 'סוּרוּ נָא אֶל־בֵּית עַבְדְּכֶם' functions as a single, coherent invitation, which is better rendered in English as an unbroken verb phrase.
