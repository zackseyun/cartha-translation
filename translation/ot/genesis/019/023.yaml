id: GEN.19.23
reference: Genesis 19:23
source:
  edition: WLC
  text: הַ/שֶּׁ֖מֶשׁ יָצָ֣א עַל הָ/אָ֑רֶץ וְ/ל֖וֹט בָּ֥א צֹֽעֲרָ/ה־׃
translation:
  text: The sun had risen over the land, and Lot had come to Zoar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'earth' is also possible for 'land' here.
    reason: lexical_alternative
  - marker: b
    text: Or 'The sun rose over the land, and Lot came to Zoar.' The Hebrew perfect
      verbs can be rendered with simple past in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  alternatives:
  - sun
  lexicon: HALOT
  rationale: Definite noun with article; standard rendering is 'the sun.'
- source_word: יָצָא
  chosen: had risen
  alternatives:
  - came out
  - rose
  lexicon: HALOT
  rationale: Qal perfect of יצא literally means 'went out/came out,' but with 'the
    sun' in context it idiomatically refers to sunrise. English 'had risen' conveys
    the natural sense.
- source_word: עַל הָאָרֶץ
  chosen: over the land
  alternatives:
  - upon the earth
  - over the earth
  lexicon: HALOT
  rationale: עַל is 'upon/over'; אֶרֶץ can mean 'land' or 'earth.' In this narrative
    setting, 'land' fits the local scene better than the global 'earth,' while still
    preserving the Hebrew sense.
- source_word: וְלוֹט
  chosen: and Lot
  rationale: Simple conjunction plus proper name; standard transliteration of the
    personal name.
- source_word: בָּא
  chosen: had come
  alternatives:
  - came
  - entered
  - arrived
  lexicon: HALOT
  rationale: 'Qal perfect of בוא means ''came/entered.'' Because the verse presents
    two completed actions in sequence at the moment before the next event, English
    past perfect smooths the temporal relation: by the time the sun had risen, Lot
    had come to Zoar.'
- source_word: צֹעֲרָה
  chosen: to Zoar
  alternatives:
  - Zoarward
  - into Zoar
  lexicon: HALOT
  rationale: Proper name with directional he, indicating motion toward a place. English
    idiom is best expressed as 'to Zoar.'
