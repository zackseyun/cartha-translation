id: GEN.19.29
reference: Genesis 19:29
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/שַׁחֵ֤ת אֱלֹהִים֙ אֶת עָרֵ֣י הַ/כִּכָּ֔ר וַ/יִּזְכֹּ֥ר אֱלֹהִ֖ים
    אֶת אַבְרָהָ֑ם וַ/יְשַׁלַּ֤ח אֶת לוֹט֙ מִ/תּ֣וֹךְ הַ/הֲפֵכָ֔ה בַּ/הֲפֹךְ֙ אֶת
    הֶ֣/עָרִ֔ים אֲשֶׁר יָשַׁ֥ב בָּ/הֵ֖ן לֽוֹט־־־־־׃
translation:
  text: And it happened, when God destroyed the cities of the plain, that God remembered
    Abraham and sent Lot out from the midst of the overthrow, when he overthrew the
    cities in which Lot had lived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of the destruction.' The Hebrew uses a noun related to 'overthrow,'
      echoing the following verb 'when he overthrew.'
    reason: lexical_alternative
  - marker: b
    text: '''God remembered Abraham'' is a Hebrew idiom for God acting with faithful
      regard toward Abraham, not a suggestion that God had forgotten him.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a temporal clause. 'And it happened'
    preserves the Hebrew discourse marker without archaic English.
- source_word: בְּשַׁחֵת
  chosen: when God destroyed
  alternatives:
  - in destroying
  - as God destroyed
  lexicon: HALOT
  rationale: Infinitive construct of שׁחת with prefixed ב marks temporal circumstance.
    Rendering as 'when ... destroyed' is natural English and preserves the temporal
    force.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the true God, not a plural or generic 'gods.' Standard
    singular rendering is required by context and syntax.
- source_word: עָרֵי הַכִּכָּר
  chosen: the cities of the plain
  alternatives:
  - the cities of the valley
  - the cities of the circle
  lexicon: HALOT
  rationale: כִּכָּר in Genesis 13 and 19 refers to the Jordan plain/district. 'Plain'
    is the most idiomatic and contextually established rendering.
- source_word: וַיִּזְכֹּר אֱלֹהִים אֶת אַבְרָהָם
  chosen: God remembered Abraham
  alternatives:
  - God called Abraham to mind
  - God acted with Abraham in mind
  lexicon: HALOT
  rationale: זכר with God often implies covenantal or relational regard issuing in
    action, but 'remembered' should be retained in the main text to preserve the biblical
    idiom and theological resonance.
- source_word: וַיְשַׁלַּח אֶת לוֹט
  chosen: and sent Lot out
  alternatives:
  - and brought Lot out
  - and let Lot go out
  lexicon: HALOT
  rationale: שׁלח is broadly 'send.' In this rescue context, 'sent ... out' captures
    the causative movement without overinterpreting as a different verb such as 'rescued'
    or 'brought out.'
- source_word: מִתּוֹךְ הַהֲפֵכָה
  chosen: out from the midst of the overthrow
  alternatives:
  - out of the catastrophe
  - out of the destruction
  lexicon: HALOT
  rationale: תּוֹךְ means 'midst/interior,' and הֲפֵכָה denotes the catastrophic overturning
    associated with Sodom. 'Overthrow' preserves the lexical link to the following
    verb from הפך.
- source_word: בַּהֲפֹךְ
  chosen: when he overthrew
  alternatives:
  - as he overthrew
  - in overthrowing
  lexicon: HALOT
  rationale: Infinitive construct of הפך with prefixed ב again marks temporal circumstance.
    'When he overthrew' is clear and keeps the verbal connection to הֲפֵכָה.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - those cities
  lexicon: HALOT
  rationale: Definite plural noun referring back to the urban centers of the plain,
    especially Sodom and its neighbors.
- source_word: אֲשֶׁר יָשַׁב בָּהֵן לוֹט
  chosen: in which Lot had lived
  alternatives:
  - where Lot lived
  - in which Lot dwelt
  lexicon: HALOT
  rationale: Relative clause with ישׁב describes Lot's residence in those cities.
    Past perfect 'had lived' fits the narrative sequence in English; 'dwelt' is possible
    but less natural in modern style.
