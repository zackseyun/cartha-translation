theological_decisions:
- issue: Meaning of 'God remembered Abraham'
  chosen_reading: Retain the idiom 'remembered Abraham' in the main text without expanding
    it to an interpretive paraphrase.
  alternative_readings:
  - God acted on account of Abraham
  - God kept Abraham in mind
  rationale: 'In Hebrew narrative, divine ''remembering'' often signals faithful regard
    expressed in action. Expanding the phrase in the main text would import interpretation
    beyond the wording. The following clause already shows the practical result: Lot
    is delivered because of Abraham.'
  doctrine_reference: Translation philosophy §§1, 3, 5
