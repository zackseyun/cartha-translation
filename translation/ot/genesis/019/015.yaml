theological_decisions:
- issue: Rendering עָוֹן in a judgment context
  chosen_reading: punishment of the city
  alternative_readings:
  - iniquity of the city
  - guilt of the city
  rationale: The Hebrew term can denote sin, guilt, or the punishment borne for guilt.
    In this context the angels warn Lot about the impending destruction falling on
    Sodom. Rendering it as 'punishment' communicates the immediate sense of judged
    consequence without making a theological claim beyond the text. The lexical alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3, §6
