id: GEN.19.15
reference: Genesis 19:15
source:
  edition: WLC
  text: וּ/כְמוֹ֙ הַ/שַּׁ֣חַר עָלָ֔ה וַ/יָּאִ֥יצוּ הַ/מַּלְאָכִ֖ים בְּ/ל֣וֹט לֵ/אמֹ֑ר
    קוּם֩ קַ֨ח אֶֽת אִשְׁתְּ/ךָ֜ וְ/אֶת שְׁתֵּ֤י בְנֹתֶ֨י/ךָ֙ הַ/נִּמְצָאֹ֔ת פֶּן
    תִּסָּפֶ֖ה בַּ/עֲוֺ֥ן הָ/עִֽיר־־־׃
translation:
  text: And as dawn was rising, the angels urged Lot, saying, “Get up, take your wife
    and your two daughters who are here, lest you be swept away in the punishment
    of the city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the iniquity of the city” or “because of the guilt of the city.”
      The Hebrew word can refer to iniquity, guilt, or the punishment resulting from
      guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְמוֹ הַשַּׁחַר עָלָה
  chosen: And as dawn was rising
  alternatives:
  - And when the dawn came up
  - And as the morning dawned
  lexicon: HALOT
  rationale: Combines the comparative-temporal particle with the noun 'dawn' and verb
    'go up/arise' into natural English. 'Dawn was rising' preserves the imagery of
    ascent without sounding wooden.
- source_word: וַיָּאִיצוּ
  chosen: urged
  alternatives:
  - pressed
  - hastened
  - insisted
  lexicon: HALOT
  rationale: The verb conveys pressing someone to act quickly. 'Urged' is idiomatic
    and fits the context of imminent danger better than the more literal but less
    natural 'pressed' or the potentially misleading 'hastened'.
- source_word: הַמַּלְאָכִים
  chosen: the angels
  alternatives:
  - the messengers
  lexicon: HALOT
  rationale: In Genesis 19 the beings are heavenly messengers, so 'angels' best communicates
    the referent in context, even though the underlying noun can more broadly mean
    'messengers'.
- source_word: בְּלוֹט
  chosen: Lot
  alternatives:
  - to Lot
  lexicon: HALOT
  rationale: The preposition marks the object of the urging. English normally expresses
    this directly with the verb 'urged Lot' rather than 'urged to Lot.'
- source_word: קוּם קַח
  chosen: Get up, take
  alternatives:
  - Arise, take
  - Up, take
  lexicon: HALOT
  rationale: Two imperatives are preserved distinctly. 'Get up' is readable modern
    English for קוּם, while retaining the urgency of the command.
- source_word: אֶת אִשְׁתְּךָ וְאֶת שְׁתֵּי בְנֹתֶיךָ
  chosen: your wife and your two daughters
  alternatives:
  - your wife and two of your daughters
  lexicon: HALOT
  rationale: A straightforward rendering of the direct objects. 'Your two daughters'
    reflects the specified number in the Hebrew.
- source_word: הַנִּמְצָאֹת
  chosen: who are here
  alternatives:
  - who are present
  - who are found
  lexicon: HALOT
  rationale: The participle literally means 'found/present.' In context it distinguishes
    the daughters currently with Lot from the married daughters/sons-in-law mentioned
    earlier. 'Who are here' is natural and contextually clear.
- source_word: פֶּן תִּסָּפֶה
  chosen: lest you be swept away
  alternatives:
  - lest you be destroyed
  - or you will be consumed
  lexicon: HALOT
  rationale: The Niphal of ספָה often carries the sense of being swept away or perishing
    along with others. 'Swept away' preserves the idea of being caught up in the city's
    fate.
- source_word: בַּעֲוֺן הָעִיר
  chosen: in the punishment of the city
  alternatives:
  - in the iniquity of the city
  - because of the guilt of the city
  lexicon: HALOT
  rationale: Although עָוֹן can mean 'iniquity/guilt,' in judgment contexts it can
    denote guilt together with its consequence or punishment. Here the warning concerns
    Lot's destruction in the city's judged state, so 'punishment of the city' best
    conveys the sense in idiomatic English while avoiding the awkward implication
    that Lot would perish 'in the city's sin' as participant rather than victim.
