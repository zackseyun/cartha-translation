id: GEN.19.13
reference: Genesis 19:13
source:
  edition: WLC
  text: כִּֽי מַשְׁחִתִ֣ים אֲנַ֔חְנוּ אֶת הַ/מָּק֖וֹם הַ/זֶּ֑ה כִּֽי גָֽדְלָ֤ה צַעֲקָתָ/ם֙
    אֶת פְּנֵ֣י יְהוָ֔ה וַ/יְשַׁלְּחֵ֥/נוּ יְהוָ֖ה לְ/שַׁחֲתָֽ/הּ־־־־׃
translation:
  text: For we are about to destroy this place, because their outcry has become great
    before the LORD, and the LORD has sent us to destroy it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the outcry against them has become great before the LORD.' The Hebrew
      form can be taken formally as 'their outcry,' but in context many understand
      it as the cry raised against the people of this place.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׁחִתִים
  chosen: are about to destroy
  alternatives:
  - are destroying
  - will destroy
  lexicon: HALOT
  rationale: Hiphil participle plural of שׁחת can denote an imminent or ongoing action.
    In direct speech announcing impending judgment, English 'are about to destroy'
    best captures the participial force with future-imminent sense.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this location
  lexicon: HALOT
  rationale: מָקוֹם is straightforwardly 'place'; 'this place' is natural and preserves
    the deictic force.
- source_word: גָדְלָה
  chosen: has become great
  alternatives:
  - is great
  - has grown great
  lexicon: HALOT
  rationale: Qal perfect 3fs of גדל describes a completed increase in magnitude. 'Has
    become great' preserves the resultative sense in context.
- source_word: צַעֲקָתָם
  chosen: their outcry
  alternatives:
  - their cry
  - the outcry against them
  lexicon: HALOT
  rationale: צעקה commonly denotes a cry of distress or protest. 'Outcry' fits the
    judicial-moral context of grievous complaint reaching God. The suffix is 3mp,
    so 'their outcry' is the most direct formal rendering, though contextually it
    refers to the outcry concerning the city's wickedness.
- source_word: אֶת־פְּנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - to the face of the LORD
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The idiom 'before the LORD' is standard English for את־פני + divine name
    and preserves the relational/judicial sense without wooden literalism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: וַיְשַׁלְּחֵנוּ
  chosen: has sent us
  alternatives:
  - sent us
  lexicon: HALOT
  rationale: Wayyiqtol narrates the completed commissioning. In English direct speech
    tied to present mission, 'has sent us' naturally links the prior sending with
    the current task.
- source_word: לְשַׁחֲתָהּ
  chosen: to destroy it
  alternatives:
  - to ruin it
  - to destroy her
  lexicon: HALOT
  rationale: Infinitive construct of שׁחת with 3fs suffix refers back to the feminine
    referent, likely the city/place. English idiom uses 'it' for a city in this context;
    'destroy' matches the earlier verbal root for coherence.
