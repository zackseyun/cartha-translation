theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of צַעֲקָתָם
  chosen_reading: their outcry
  alternative_readings:
  - the outcry against them
  rationale: The Hebrew suffix most directly yields 'their outcry,' and the translation preserves that form rather than resolving the debated question of whether the cry is uttered by the inhabitants or against them in the main text. Because the contextual alternative is interpretively significant, it is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
