theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrine
    and established translation policy, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of צַעֲקָתָם
  chosen_reading: their outcry
  alternative_readings:
  - the outcry against them
  rationale: The Hebrew suffix most directly yields 'their outcry,' and the translation
    preserves that form rather than resolving the debated question of whether the
    cry is uttered by the inhabitants or against them in the main text. Because the
    contextual alternative is interpretively significant, it is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
