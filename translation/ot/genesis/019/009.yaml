  from: pressed hard against the man, against Lot, very much
  to: pressed very hard against the man, against Lot
  rationale: The Hebrew adverb מְאֹד (me'od) intensifies the verb וַיִּפְצְרוּ (vayyiftsru).
    The draft's rendering, "pressed hard... very much," is redundant and stylistically
    awkward in English. Combining the verb and its intensifier into the more natural
    English phrase "pressed very hard" conveys the same meaning with better syntax
    and flow.
