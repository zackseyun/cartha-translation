id: GEN.19.9
reference: Genesis 19:9
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ גֶּשׁ הָ֗לְאָה וַ/יֹּֽאמְרוּ֙ הָ/אֶחָ֤ד בָּֽא לָ/גוּר֙ וַ/יִּשְׁפֹּ֣ט
    שָׁפ֔וֹט עַתָּ֕ה נָרַ֥ע לְ/ךָ֖ מֵ/הֶ֑ם וַ/יִּפְצְר֨וּ בָ/אִ֤ישׁ בְּ/לוֹט֙ מְאֹ֔ד
    וַֽ/יִּגְּשׁ֖וּ לִ/שְׁבֹּ֥ר הַ/דָּֽלֶת׀־־׃
translation:
  text: And they said, “Stand back!” Then they said, “This fellow came to sojourn,
    and now he acts as judge! Now we will treat you worse than them.” And they pressed
    hard against the man, against Lot, and came near to break down the door.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Stand back!”
    reason: lexical_alternative
  - marker: b
    text: Or “This fellow came to sojourn, and now he would play the judge!”
    reason: lexical_alternative
  - marker: c
    text: Literally, “we will do evil to you more than to them,” an idiom meaning
      they threatened Lot with worse harm than the visitors.
    reason: lexical_alternative
  - marker: d
    text: Or 'pressed hard against the man, against Lot, very much'.
    reason: previous_rendering
lexical_decisions:
- source_word: גֶּשׁ הָלְאָה
  chosen: Get back!
  alternatives:
  - Stand back!
  - Move aside!
  lexicon: HALOT
  rationale: The imperative גֶּשׁ from נגשׁ with the adverb הָלְאָה is an idiomatic
    command to move away/back. 'Get back' is natural modern English and preserves
    the hostile force. 'Stand back' is traditional and possible, but can sound less
    forceful or more static.
- source_word: הָאֶחָד
  chosen: This one
  alternatives:
  - This fellow
  - This man
  lexicon: HALOT
  rationale: The expression is dismissive and demeaning. 'This one' preserves the
    contempt without adding colloquial color beyond the Hebrew. 'This fellow' captures
    tone but is more interpretive.
- source_word: בָּא לָגוּר
  chosen: came to live as a foreigner
  alternatives:
  - came to sojourn
  - came to reside as an alien
  lexicon: HALOT
  rationale: גור denotes residing as a non-native outsider. 'Live as a foreigner'
    communicates the social status clearly in modern English. 'Sojourn' is more formal
    but less accessible.
- source_word: וַיִּשְׁפֹּט שָׁפוֹט
  chosen: he keeps acting as judge
  alternatives:
  - he would indeed judge
  - he has become a judge
  - he keeps judging
  lexicon: HALOT
  rationale: The finite verb with infinitive absolute intensifies the idea. In context
    it is a hostile complaint about Lot presuming to judge them. 'Keeps acting as
    judge' captures both the judicial nuance of שׁפט and the accusatory tone better
    than a flat 'judge'.
- source_word: נָרַע לְךָ מֵהֶם
  chosen: we will treat you worse than them
  alternatives:
  - we will do worse to you than to them
  - we will harm you more than them
  lexicon: HALOT
  rationale: The Hiphil of רעע here means to do evil/harm. 'Treat you worse than them'
    is idiomatic and preserves the comparative threat. 'Do worse to you' is slightly
    more literal and is preserved as an alternative sense.
- source_word: וַיִּפְצְרוּ
  chosen: pressed hard against
  alternatives:
  - urged violently against
  - crowded against
  lexicon: HALOT
  rationale: פצר can mean urge strongly or press hard. In this physical context, with
    the following approach to break the door, the sense is forceful physical pressure
    rather than mere verbal insistence.
- source_word: בָאִישׁ בְּלוֹט
  chosen: against the man, against Lot
  alternatives:
  - against the man Lot
  - against Lot, the man
  lexicon: HALOT
  rationale: The repeated preposition and apposition are awkward in English if rendered
    too literally. 'Against the man, against Lot' preserves the emphatic focus and
    the Hebrew structure more transparently than smoothing to a single phrase.
- source_word: מְאֹד
  chosen: very much
  alternatives:
  - greatly
  - violently
  lexicon: HALOT
  rationale: מְאֹד intensifies the preceding action. 'Very much' is somewhat literal
    and keeps the emphasis. The violence is inferred from context, so 'violently'
    would be more interpretive than the adverb itself warrants.
- source_word: וַיִּגְּשׁוּ לִשְׁבֹּר הַדָּלֶת
  chosen: came near to break down the door
  alternatives:
  - moved in to break the door
  - approached to break the door
  lexicon: HALOT
  rationale: נגשׁ plus infinitive expresses advancing with intent. 'Break down the
    door' makes explicit the force implied by שׁבר in this context and reads naturally
    in English.
