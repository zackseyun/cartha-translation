id: GEN.19.36
reference: Genesis 19:36
source:
  edition: WLC
  text: וַֽ/תַּהֲרֶ֛יןָ שְׁתֵּ֥י בְנֽוֹת ל֖וֹט מֵ/אֲבִי/הֶֽן־׃
translation:
  text: So both of Lot’s daughters became pregnant by their father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “conceived”; the Hebrew verb indicates that they came to be with child.
    reason: lexical_alternative
  - marker: b
    text: Literally “from their father.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהֲרֶיןָ
  chosen: became pregnant
  alternatives:
  - conceived
  lexicon: HALOT
  rationale: The verb from הרה in the wayyiqtol 3fp indicates that the two women came
    to be with child. 'Became pregnant' is clear modern English; 'conceived' is possible
    but slightly more formal and can sound more technical.
- source_word: שְׁתֵּי
  chosen: both
  alternatives:
  - the two
  lexicon: HALOT
  rationale: With the following construct phrase 'daughters of Lot,' this numeral
    marks that both daughters are in view. 'Both' is idiomatic English and preserves
    the distributive sense naturally.
- source_word: בְנוֹת לוֹט
  chosen: Lot’s daughters
  alternatives:
  - the daughters of Lot
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered with the English possessive.
    This keeps the meaning while using readable modern English.
- source_word: מֵאֲבִיהֶן
  chosen: by their father
  alternatives:
  - from their father
  lexicon: HALOT
  rationale: 'The preposition מִן here marks source/paternity: the pregnancies were
    from their father. In English, ''by their father'' communicates paternity more
    idiomatically in this context, while still reflecting the source sense.'
