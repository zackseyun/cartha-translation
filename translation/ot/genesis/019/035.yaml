id: GEN.19.35
reference: Genesis 19:35
source:
  edition: WLC
  text: וַ/תַּשְׁקֶ֜יןָ גַּ֣ם בַּ/לַּ֧יְלָה הַ/ה֛וּא אֶת אֲבִי/הֶ֖ן יָ֑יִן וַ/תָּ֤קָם
    הַ/צְּעִירָה֙ וַ/תִּשְׁכַּ֣ב עִמּ֔/וֹ וְ/לֹֽא יָדַ֥ע בְּ/שִׁכְבָ֖/הּ וּ/בְ/קֻמָֽ/הּ־־׃
translation:
  text: So they also gave their father wine to drink that night, and the younger arose
    and lay with him, and he did not know when she lay down or when she arose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he did not know of her lying down or of her rising.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁקֶיןָ
  chosen: they gave ... to drink
  alternatives:
  - they made ... drink
  - they got ... drunk
  lexicon: HALOT
  rationale: Hiphil of שׁקה means to give drink or cause to drink. 'Gave their father
    wine to drink' is natural English and preserves causative force without importing
    the stronger interpretive claim 'got drunk' into the verb itself.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - again
  lexicon: HALOT
  rationale: Marks continuation from the previous night; 'also' fits the narrative
    sequence clearly.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - on that night
  - during that night
  lexicon: HALOT
  rationale: Idiomatic temporal expression best rendered succinctly as 'that night'
    in modern English.
- source_word: אֶת אֲבִיהֶן יָיִן
  chosen: their father wine
  alternatives:
  - wine to their father
  lexicon: HALOT
  rationale: The Hebrew construction places the direct object 'their father' with
    'wine' as what was given to drink; in English this is best expressed as 'gave
    their father wine to drink.'
- source_word: וַתָּקָם הַצְּעִירָה
  chosen: the younger arose
  alternatives:
  - the younger daughter got up
  - the younger one arose
  lexicon: HALOT
  rationale: הַצְּעִירָה means 'the younger (female).' 'The younger' is concise and
    clear in context, while 'arose' preserves the narrative verb sequence.
- source_word: וַתִּשְׁכַּב עִמּוֹ
  chosen: lay with him
  alternatives:
  - slept with him
  lexicon: HALOT
  rationale: This is the standard idiom for sexual relations. 'Lay with him' is more
    formally aligned with the Hebrew while remaining understandable.
- source_word: וְלֹא יָדַע
  chosen: and he did not know
  alternatives:
  - but he was unaware
  lexicon: HALOT
  rationale: ידע here denotes awareness. 'Did not know' preserves the Hebrew wording
    and leaves the nature of his unawareness to the following phrases.
- source_word: בְּשִׁכְבָהּ
  chosen: when she lay down
  alternatives:
  - of her lying down
  - in her lying down
  lexicon: HALOT
  rationale: The prefixed ב plus infinitive/verb-noun with suffix is temporal here.
    'When she lay down' is idiomatic and preserves the sense.
- source_word: וּבְקֻמָהּ
  chosen: when she arose
  alternatives:
  - of her rising
  - when she got up
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'when she arose' keeps the formal symmetry
    of the Hebrew narrative.
