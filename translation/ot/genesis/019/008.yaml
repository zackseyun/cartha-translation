id: GEN.19.8
reference: Genesis 19:8
source:
  edition: WLC
  text: הִנֵּה נָ֨א לִ֜/י שְׁתֵּ֣י בָנ֗וֹת אֲשֶׁ֤ר לֹֽא יָדְעוּ֙ אִ֔ישׁ אוֹצִֽיאָה נָּ֤א אֶתְ/הֶן֙ אֲלֵי/כֶ֔ם וַ/עֲשׂ֣וּ לָ/הֶ֔ן כַּ/טּ֖וֹב בְּ/עֵינֵי/כֶ֑ם רַ֠ק לָֽ/אֲנָשִׁ֤ים הָ/אֵל֙ אַל תַּעֲשׂ֣וּ דָבָ֔ר כִּֽי עַל כֵּ֥ן בָּ֖אוּ בְּ/צֵ֥ל קֹרָתִֽ/י־־־־־־׃
translation:
  text: Look, please, I have two daughters who have not known a man. Please let me bring them out to you, and do to them as is good in your eyes. But to these men, do nothing, for they have come under the shadow of my roof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'who have not had relations with a man'; traditionally, 'who are virgins.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under the shadow of my roof,' an idiom expressing the protection owed to guests who have come into one's household.
    reason: cultural_note
  - marker: c
    text: Or 'Only do nothing to these men'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces urgent attention. 'Look' preserves the deictic force in readable modern English better than the archaic 'Behold.'
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: Particle of entreaty/politeness in this context. Rendering as 'please' captures Lot's urgent pleading.
- source_word: שְׁתֵּי בָנוֹת
  chosen: two daughters
  lexicon: HALOT
  rationale: Straightforward nominal phrase; no reason to expand or paraphrase.
- source_word: אֲשֶׁר לֹא יָדְעוּ אִישׁ
  chosen: who have not known a man
  alternatives:
  - who have not had relations with a man
  - who are virgins
  lexicon: HALOT
  rationale: יָדַע with 'man' is a Hebrew idiom for sexual relations. 'Known a man' preserves the source idiom while remaining understandable; the more explicit and interpretive alternatives are preserved as lexical possibilities.
- source_word: אוֹצִיאָה נָּא אֶתְהֶן אֲלֵיכֶם
  chosen: Please let me bring them out to you
  alternatives:
  - I will bring them out to you, please
  - let me bring them out to you, please
  lexicon: HALOT
  rationale: Cohortative form expresses Lot's offer/intention. 'Let me bring them out' captures the volitional nuance in natural English; the second נָא again contributes a pleading tone.
- source_word: וַעֲשׂוּ לָהֶן כַּטּוֹב בְּעֵינֵיכֶם
  chosen: and do to them as is good in your eyes
  alternatives:
  - do to them as seems good to you
  - treat them as you please
  lexicon: HALOT
  rationale: Keeps the Hebrew idiom 'good in your eyes' relatively transparent while still readable. This avoids softening the disturbing force of the statement.
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - Just
  lexicon: HALOT
  rationale: Marks strong limitation/exception to the preceding offer.
- source_word: לָאֲנָשִׁים הָאֵל
  chosen: to these men
  alternatives:
  - to these persons
  lexicon: HALOT
  rationale: Gender-accurate rendering of אֲנָשִׁים in context, referring specifically to the male visitors.
- source_word: אַל תַּעֲשׂוּ דָבָר
  chosen: do nothing
  alternatives:
  - do not do a thing
  - do not do anything
  lexicon: HALOT
  rationale: Concise English equivalent of the prohibition plus indefinite object; preserves the force of total prohibition.
- source_word: כִּי עַל כֵּן בָּאוּ
  chosen: for they have come
  alternatives:
  - for this is why they have come
  - for therefore they came
  lexicon: HALOT
  rationale: 'In this context עַל כֵּן points to the reason relevant to Lot''s obligation: they have come under his protection. ''For they have come'' is idiomatic and avoids an overly wooden rendering while preserving causal force.'
- source_word: בְּצֵל קֹרָתִי
  chosen: under the shadow of my roof
  alternatives:
  - under my roof
  - into the shelter of my roof
  lexicon: HALOT
  rationale: בְּצֵל literally means 'in/under the shadow of,' an idiom of protection/shelter; קֹרָה refers to the roof/beams. 'Under the shadow of my roof' preserves both the literal image and the hospitality-protection implication better than the flattened 'under my roof.'
