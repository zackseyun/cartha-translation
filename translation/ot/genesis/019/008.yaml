theological_decisions:
- issue: Whether to soften Lot's shocking offer for moral readability
  chosen_reading: Retain the plain force of the Hebrew without euphemistic mitigation
  alternative_readings:
  - Use a softened idiom such as 'treat them as you please' without explicit 'do to them'
  rationale: The verse presents Lot's proposal starkly and disturbingly. The translation should not import moral approval, but neither should it blunt the text's severity. Optimal equivalence here favors transparent rendering over smoothing.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/008.json
  category: awkward_english
  tier: 1
  from: Only do nothing to these men
  to: But to these men, do nothing
  rationale: The construction 'Only do nothing' is slightly unnatural in English. While grammatically correct, it can be momentarily confusing. A phrasing like 'But to these men, do nothing' or 'Just do not do anything to these men' better conveys the contrastive prohibition ('do what you want to my daughters, BUT not to these men') in more fluid English.
