id: GEN.19.25
reference: Genesis 19:25
source:
  edition: WLC
  text: וַֽ/יַּהֲפֹךְ֙ אֶת הֶ/עָרִ֣ים הָ/אֵ֔ל וְ/אֵ֖ת כָּל הַ/כִּכָּ֑ר וְ/אֵת֙ כָּל
    יֹשְׁבֵ֣י הֶ/עָרִ֔ים וְ/צֶ֖מַח הָ/אֲדָמָֽה־־־׃
translation:
  text: And he overthrew those cities, and all the plain, and all the inhabitants
    of the cities, and the vegetation of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overturned.' The Hebrew verb can emphasize a catastrophic overturning.
    reason: lexical_alternative
  - marker: b
    text: '''The plain'' refers to the district of the Jordan plain in this context.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  chosen: overthrew
  alternatives:
  - overturned
  - destroyed
  lexicon: HALOT
  rationale: The verb הפך in this context refers to catastrophic overthrow or overturning
    of the cities. 'Overthrew' preserves the concrete imagery and traditional sense
    better than the more generic 'destroyed,' while remaining natural English.
- source_word: הֶעָרִים הָאֵל
  chosen: those cities
  alternatives:
  - these cities
  lexicon: HALOT
  rationale: The demonstrative אֵל here points back to the specific cities under discussion.
    'Those cities' fits normal English narrative reference to previously mentioned
    locations.
- source_word: כָּל הַכִּכָּר
  chosen: all the plain
  alternatives:
  - the whole valley
  - all the circle
  lexicon: HALOT
  rationale: כִּכָּר in Genesis commonly denotes the Jordan plain/district. 'Plain'
    is the most idiomatic and contextually accurate rendering here; 'circle' would
    be overly literal and unclear in English.
- source_word: כָּל יֹשְׁבֵי הֶעָרִים
  chosen: all the inhabitants of the cities
  alternatives:
  - all who lived in the cities
  - all the dwellers of the cities
  lexicon: HALOT
  rationale: The participial construction from ישב denotes those dwelling in the cities.
    'Inhabitants' is concise, natural, and semantically precise.
- source_word: צֶמַח הָאֲדָמָה
  chosen: the vegetation of the ground
  alternatives:
  - what grew on the ground
  - the plants of the land
  - the growth of the ground
  lexicon: HALOT
  rationale: צֶמַח denotes sprouting growth or vegetation, and אֲדָמָה here is the
    ground/soil. 'Vegetation of the ground' preserves the agricultural and physical
    sense without unnecessary paraphrase.
