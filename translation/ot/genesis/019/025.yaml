theological_decisions:
- issue: Implicit subject of the singular verb
  chosen_reading: Rendered as 'he' without specifying the subject in the English text.
  alternative_readings:
  - God/the LORD as explicit subject
  rationale: The Hebrew verse itself uses a singular verb with no explicit subject
    stated in this clause; the prior context identifies God as the actor. To avoid
    importing more than this verse states while preserving coherence, the translation
    keeps the pronoun 'he.'
  doctrine_reference: Translation philosophy §1, §3
