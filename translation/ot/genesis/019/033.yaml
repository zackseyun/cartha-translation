id: GEN.19.33
reference: Genesis 19:33
source:
  edition: WLC
  text: וַ/תַּשְׁקֶ֧יןָ אֶת אֲבִי/הֶ֛ן יַ֖יִן בַּ/לַּ֣יְלָה ה֑וּא וַ/תָּבֹ֤א הַ/בְּכִירָה֙
    וַ/תִּשְׁכַּ֣ב אֶת אָבִ֔י/הָ וְ/לֹֽא יָדַ֥ע בְּ/שִׁכְבָ֖/הּ וּ/בְ/קׄוּמָֽ/הּ־־־׃
translation:
  text: So they gave their father wine to drink that night, and the firstborn went
    in and lay with her father. He did not know when she lay down or when she arose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he did not know in her lying down and in her arising.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁקֶיןָ
  chosen: they gave ... wine to drink
  alternatives:
  - they made ... drink
  - they gave ... to drink
  lexicon: HALOT
  rationale: Hiphil of שׁקה means to cause to drink or give drink. In idiomatic English,
    'gave their father wine to drink' preserves the causative sense without sounding
    wooden.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of יין; no contextual reason to vary.
- source_word: בַּלַּיְלָה הוּא
  chosen: that night
  alternatives:
  - on that night
  lexicon: HALOT
  rationale: The phrase is a common temporal expression. 'That night' is natural modern
    English and preserves the definite reference.
- source_word: הַבְּכִירָה
  chosen: the firstborn
  alternatives:
  - the older daughter
  - the elder one
  lexicon: HALOT
  rationale: Literally 'the firstborn [female].' 'The firstborn' is concise and preserves
    the birth-order emphasis present in the Hebrew.
- source_word: וַתָּבֹא
  chosen: went in
  alternatives:
  - came in
  - entered
  lexicon: HALOT
  rationale: In this context of entering to her father for intercourse, 'went in'
    is the standard idiomatic rendering and fits the narrative perspective better
    than the more literal but less natural 'came in.'
- source_word: וַתִּשְׁכַּב אֶת
  chosen: lay with
  alternatives:
  - slept with
  - lay down with
  lexicon: HALOT
  rationale: This construction is a standard sexual euphemism. 'Lay with' preserves
    the source's register better than the more colloquial 'slept with.'
- source_word: וְלֹא יָדַע
  chosen: He did not know
  alternatives:
  - he was unaware
  lexicon: HALOT
  rationale: ידע here denotes awareness. 'He did not know' is formally closer and
    leaves the object of awareness to be specified by the following phrases.
- source_word: בְּשִׁכְבָהּ
  chosen: when she lay down
  alternatives:
  - in her lying down
  - when she lay with him
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks the time/circumstance
    of her lying down. 'When she lay down' is natural English. The phrase does not
    explicitly repeat 'with him,' so the translation avoids adding it to the main
    text.
- source_word: וּבְקוּמָהּ
  chosen: when she arose
  alternatives:
  - in her rising
  - when she got up
  lexicon: HALOT
  rationale: Parallel temporal phrase to the previous clause. 'Arose' matches the
    narrative register and keeps the formal parallelism.
