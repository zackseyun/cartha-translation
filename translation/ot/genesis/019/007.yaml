id: GEN.19.7
reference: Genesis 19:7
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר אַל נָ֥א אַחַ֖/י תָּרֵֽעוּ־׃
translation:
  text: And he said, “Please, my brothers, do not do evil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my kinsmen” or “my friends,” since the Hebrew “my brothers” can function
      as a respectful social address rather than indicating literal sibling relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אַל
  chosen: do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Used with the following imperfect/jussive-like form to express prohibition.
    'Do not' best captures the force in idiomatic English.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray you
  - now
  lexicon: HALOT
  rationale: Polite particle softening the prohibition and appeal. 'Please' is clear
    modern English and preserves the pleading tone without archaism.
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my brothers, please
  - my kinsmen
  - my friends
  lexicon: HALOT
  rationale: Literally 'my brothers.' In context Lot addresses the men of the city
    with a kinship term of social appeal, but the Hebrew noun is explicitly masculine
    plural with 1cs suffix. Per gender-accurate policy, the familial term is retained
    rather than generalized to 'friends' or 'people.'
- source_word: תָּרֵעוּ
  chosen: do evil
  alternatives:
  - act wickedly
  - do wrong
  lexicon: HALOT
  rationale: Hiphil 2mp of רעע here means to do evil/wrong. 'Do evil' is concise and
    preserves the moral force; 'act wickedly' is possible but slightly more interpretive
    and elevated.
