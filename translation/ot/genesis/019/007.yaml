theological_decisions:
- issue: Rendering of אַחַי in a socially broad address
  chosen_reading: my brothers
  alternative_readings:
  - my friends
  - my kinsmen
  rationale: Although the term may function rhetorically rather than strictly biologically,
    the Hebrew explicitly uses the kinship term 'brothers.' Following the translation
    philosophy's gender-accurate principle and preference for source-language primacy,
    the main text keeps 'my brothers.'
  doctrine_reference: Translation philosophy §§1, 4
