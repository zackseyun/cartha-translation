theological_decisions:
- issue: Whether to identify הָאֲנָשִׁים as angels in the main text
  chosen_reading: Retain 'the men'
  alternative_readings:
  - the angels
  - the messengers
  rationale: The narrative context reveals these visitors to be angelic, but the verse itself uses the ordinary Hebrew term for 'men.' Following original-language primacy, the translation preserves the lexical form in the main text and does not import a theological identification not stated here.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/012.json
  category: awkward_english
  tier: 1
  from: A son-in-law
  to: Son-in-law
  rationale: The Hebrew `חָתָן` is an indefinite singular, which the draft renders as 'A son-in-law.' While formally correct, this is slightly awkward in an English list next to the definite possessives 'your sons, your daughters.' It could also be misread to imply Lot has only one son-in-law, which verse 14 shows is not the case. Removing the article ('Son-in-law') treats the word as a category, which better reflects the sense of the Hebrew singular here, avoids the misleading numerical implication, and improves the list's cadence.
