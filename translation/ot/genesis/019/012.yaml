id: GEN.19.12
reference: Genesis 19:12
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ הָ/אֲנָשִׁ֜ים אֶל ל֗וֹט עֹ֚ד מִֽי לְ/ךָ֣ פֹ֔ה חָתָן֙ וּ/בָנֶ֣י/ךָ וּ/בְנֹתֶ֔י/ךָ וְ/כֹ֥ל אֲשֶׁר לְ/ךָ֖ בָּ/עִ֑יר הוֹצֵ֖א מִן הַ/מָּקֽוֹם־־־־׃
translation:
  text: Then the men said to Lot, “Who else do you have here? Son-in-law, your sons, your daughters, and everyone who belongs to you in the city—bring them out of the place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “bridegroom”; here the sense is most likely “son-in-law,” referring to Lot’s daughters’ intended or actual husbands.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “all that is yours in the city”; in context this likely refers to all the people belonging to Lot’s household or family who are in the city.
    reason: lexical_alternative
  - marker: c
    text: Or 'A son-in-law'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the angels
  - the messengers
  lexicon: HALOT
  rationale: The Hebrew noun plainly means 'men.' Although the broader narrative identifies them as angelic visitors, this verse itself uses the ordinary term, so the main text preserves the source wording rather than importing the interpretation into the translation.
- source_word: עֹד מִי לְךָ פֹה
  chosen: Who else do you have here?
  alternatives:
  - Who else is yours here?
  - Do you still have anyone else here?
  lexicon: HALOT
  rationale: This idiom asks what other persons connected to Lot are present. 'Who else do you have here?' is natural modern English and preserves the relational sense of לְךָ without wooden literalism.
- source_word: חָתָן
  chosen: a son-in-law
  alternatives:
  - son-in-law
  - bridegroom
  lexicon: HALOT
  rationale: In context, the term most naturally refers to Lot's prospective or actual sons-in-law. English singular with an indefinite article works idiomatically in a list introduced by 'Who else...?' The alternative 'bridegroom' is lexically possible in some contexts, but here the family-relationship sense fits best.
- source_word: וּבָנֶיךָ
  chosen: your sons
  lexicon: HALOT
  rationale: Straightforward possessive plural; retained directly.
- source_word: וּבְנֹתֶיךָ
  chosen: your daughters
  lexicon: HALOT
  rationale: Straightforward possessive plural; retained directly.
- source_word: וְכֹל אֲשֶׁר לְךָ בָּעִיר
  chosen: everyone who belongs to you in the city
  alternatives:
  - everyone you have in the city
  - all that is yours in the city
  - everyone belonging to you in the city
  lexicon: HALOT
  rationale: Although כֹל אֲשֶׁר can be broad ('all that'), the immediate context is a list of people to be evacuated, so rendering it personally as 'everyone who belongs to you' best reflects the sense in context without sounding unnatural. The phrase 'in the city' is kept explicit.
- source_word: הוֹצֵא
  chosen: bring them out
  alternatives:
  - take out
  - bring out
  lexicon: HALOT
  rationale: The imperative is singular masculine addressed to Lot. English requires an object, supplied from the preceding list. 'Bring them out' is idiomatic and fits the urgent command.
- source_word: מִן הַמָּקוֹם
  chosen: of the place
  alternatives:
  - from this place
  - out of this place
  lexicon: HALOT
  rationale: The Hebrew has 'from the place.' In English, after 'bring them out,' 'of the place' is concise and natural. 'This place' would slightly heighten deixis not explicit in the Hebrew, though it is contextually implied.
