theological_decisions:
- issue: Nature of Lot's wife's transformation
  chosen_reading: 'Render the text straightforwardly as an actual becoming: ''she became a pillar of salt.'''
  alternative_readings:
  - she became like a pillar of salt
  - she was there as a pillar of salt
  rationale: The Hebrew narrative uses simple verbal and nominal forms without comparative markers. To weaken the statement into simile would import interpretation not warranted by the text. The translation preserves the narrative claim without adding explanatory theology.
  doctrine_reference: Translation philosophy §§1, 3
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/019/026.json
  category: awkward_english
  tier: 1
  from: looked back from behind him
  to: behind him, looked back
  rationale: The current rendering is a very literal translation of the Hebrew syntax (verb + prepositional phrase), which results in a slightly redundant and awkward English phrase. 'Looked back' already implies the direction of the action. The phrase 'from behind him' specifies her location relative to Lot. Separating these two elements, as in 'But his wife, behind him, looked back,' is more idiomatic and clearer in English while retaining all the information from the source text.
