id: GEN.19.26
reference: Genesis 19:26
source:
  edition: WLC
  text: וַ/תַּבֵּ֥ט אִשְׁתּ֖/וֹ מֵ/אַחֲרָ֑י/ו וַ/תְּהִ֖י נְצִ֥יב מֶֽלַח׃
translation:
  text: But his wife behind him, looked back, and she became a pillar of salt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked behind'; the Hebrew more literally says she looked 'from behind him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'looked back from behind him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתַּבֵּט
  chosen: looked back
  alternatives:
  - looked
  - glanced back
  - looked behind
  lexicon: HALOT, BDB
  rationale: The verb נבט means 'to look/regard.' In this context, with the following phrase מֵאַחֲרָיו ('from behind him'), English 'looked back' best conveys the action naturally and idiomatically without overinterpreting motive.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - the wife
  lexicon: HALOT, BDB
  rationale: The noun with 3ms suffix straightforwardly means 'his wife,' referring to Lot's wife in context.
- source_word: מֵאַחֲרָיו
  chosen: from behind him
  alternatives:
  - behind him
  - from behind
  lexicon: HALOT, BDB
  rationale: The preposition plus אַחַר with suffix is literally 'from behind him/after him.' 'From behind him' preserves the Hebrew form and indicates her position relative to Lot, while still allowing the sense that she turned to look back.
- source_word: וַתְּהִי
  chosen: she became
  alternatives:
  - she was
  - she came to be
  lexicon: HALOT, BDB
  rationale: The verb היה in this narrative sequence is best rendered 'became,' indicating transformation or resulting state rather than simple existence.
- source_word: נְצִיב
  chosen: a pillar
  alternatives:
  - a column
  - a mound
  lexicon: HALOT, BDB
  rationale: נְצִיב commonly denotes something stationed or set up, and in this context 'pillar' is the established and most natural English rendering for a standing formation.
- source_word: מֶלַח
  chosen: of salt
  alternatives:
  - salt
  lexicon: HALOT, BDB
  rationale: The construct relationship with נְצִיב is naturally rendered 'a pillar of salt.'
