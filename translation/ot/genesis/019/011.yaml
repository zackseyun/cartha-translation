id: GEN.19.11
reference: Genesis 19:11
source:
  edition: WLC
  text: וְֽ/אֶת הָ/אֲנָשִׁ֞ים אֲשֶׁר פֶּ֣תַח הַ/בַּ֗יִת הִכּוּ֙ בַּ/סַּנְוֵרִ֔ים מִ/קָּטֹ֖ן
    וְ/עַד גָּד֑וֹל וַ/יִּלְא֖וּ לִ/מְצֹ֥א הַ/פָּֽתַח־־־׃
translation:
  text: And they struck the men who were at the entrance of the house with blindness,
    from the least to the greatest, so that they wore themselves out trying to find
    the doorway.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a blinding daze' or 'with visual confusion'; the rare Hebrew term
      may suggest more than ordinary blindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכּוּ
  chosen: struck
  alternatives:
  - smote
  - hit
  - afflicted
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'strike' or 'smite.' 'Struck' is natural
    modern English and preserves the causative force without archaic diction.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the males
  lexicon: HALOT
  rationale: אֲנָשִׁים is the masculine plural of אִישׁ and here refers specifically
    to the male mob outside Lot's house. 'Men' is gender-accurate and contextually
    precise.
- source_word: אֲשֶׁר פֶּתַח הַבַּיִת
  chosen: who were at the entrance of the house
  alternatives:
  - who were at the doorway of the house
  - who were at the door of the house
  lexicon: HALOT
  rationale: The phrase identifies the men by location. 'Entrance of the house' is
    slightly broader than 'door' and fits the repeated פֶּתַח language in the verse
    while remaining natural English.
- source_word: בַּסַּנְוֵרִים
  chosen: with blindness
  alternatives:
  - with blinding blindness
  - with dazzlement
  - with temporary blindness
  lexicon: HALOT
  rationale: סַנְוֵרִים is a rare term used for a divinely inflicted inability to
    see properly (also 2 Kgs 6:18). 'Blindness' is the clearest English equivalent.
    The exact nature may involve dazzling or confusion, but 'blindness' best matches
    the plain sense without over-specifying.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from young to old
  lexicon: HALOT
  rationale: This idiom denotes the whole group inclusively, regardless of status
    or prominence. 'From the least to the greatest' is idiomatic English and preserves
    the merism.
- source_word: וַיִּלְאוּ
  chosen: they wore themselves out
  alternatives:
  - they became weary
  - they exhausted themselves
  lexicon: HALOT
  rationale: The verb לָאָה conveys weariness or exhaustion. 'Wore themselves out'
    vividly captures the result of their futile effort in readable modern English.
- source_word: לִמְצֹא
  chosen: trying to find
  alternatives:
  - to find
  lexicon: HALOT
  rationale: The infinitive expresses the goal of their exhausting effort. 'Trying
    to find' makes the connection explicit in natural English without adding meaning
    beyond the context.
- source_word: הַפָּתַח
  chosen: the doorway
  alternatives:
  - the entrance
  - the door
  lexicon: HALOT
  rationale: פֶּתַח can mean doorway, entrance, or opening. Here 'doorway' avoids
    repetition with the earlier 'entrance of the house' and highlights the specific
    opening they could no longer locate.
