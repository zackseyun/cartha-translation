theological_decisions:
- issue: Nature of the affliction in סַנְוֵרִים
  chosen_reading: a divinely inflicted blindness
  alternative_readings:
  - dazzlement
  - visual confusion
  rationale: The Hebrew term is rare and may denote more than ordinary blindness,
    but the narrative plainly presents a supernatural impairment of sight that prevents
    the mob from finding the entrance. 'Blindness' is the most transparent main-text
    rendering; alternatives are preserved in a footnote to avoid over-resolving the
    nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
