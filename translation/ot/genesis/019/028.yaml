id: GEN.19.28
reference: Genesis 19:28
source:
  edition: WLC
  text: וַ/יַּשְׁקֵ֗ף עַל פְּנֵ֤י סְדֹם֙ וַ/עֲמֹרָ֔ה וְ/עַֽל כָּל פְּנֵ֖י אֶ֣רֶץ הַ/כִּכָּ֑ר
    וַ/יַּ֗רְא וְ/הִנֵּ֤ה עָלָה֙ קִיטֹ֣ר הָ/אָ֔רֶץ כְּ/קִיטֹ֖ר הַ/כִּבְשָֽׁן־־־׃
translation:
  text: And he looked out over Sodom and Gomorrah and over all the land of the plain,
    and he saw, and behold, smoke was rising from the land like the smoke of a furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the smoke of a kiln.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁקֵף
  chosen: looked out over
  alternatives:
  - looked down upon
  - gazed toward
  lexicon: HALOT
  rationale: The verb שׁקף in this stem commonly conveys looking out/down from an
    elevated vantage point. 'Looked out over' is natural English and preserves the
    observational sense without over-specifying vertical direction.
- source_word: עַל פְּנֵי
  chosen: over
  alternatives:
  - upon
  - toward
  - across the face of
  lexicon: HALOT
  rationale: The idiom literally involves 'upon the face of,' but in English 'over'
    best conveys surveying an area. This avoids wooden phrasing while keeping the
    spatial sense.
- source_word: סְדֹם וַעֲמֹרָה
  chosen: Sodom and Gomorrah
  rationale: Standard English transliterations of the place names.
- source_word: כָּל פְּנֵי אֶרֶץ הַכִּכָּר
  chosen: all the land of the plain
  alternatives:
  - all the face of the land of the valley
  - all the region of the plain
  lexicon: HALOT
  rationale: כִּכָּר here denotes the Jordan plain/round district. 'Land of the plain'
    is clear, fairly literal, and preserves the geographic reference without importing
    more interpretation than necessary.
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he looked
  - he observed
  lexicon: HALOT
  rationale: A straightforward rendering of ראה. Retaining 'he saw' keeps the narrative
    sequence and emphasis.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The discourse marker signals sudden, vivid perception. 'Behold' preserves
    that force better than flattening it away, and remains readable in solemn narrative.
- source_word: עָלָה
  chosen: was rising
  alternatives:
  - went up
  - rose
  lexicon: HALOT
  rationale: The participial/perfective narrative sense here describes visible upward
    movement. 'Was rising' communicates the ongoing visual scene in idiomatic English.
- source_word: קִיטֹר
  chosen: smoke
  alternatives:
  - dense smoke
  - billowing smoke
  lexicon: HALOT
  rationale: The noun denotes smoke/vapor. 'Smoke' is the basic lexical value; added
    adjectives would over-interpret.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In this local context, 'land' fits better than the more global 'earth,'
    referring to the devastated region Abraham is viewing.
- source_word: כְּקִיטֹר הַכִּבְשָׁן
  chosen: like the smoke of a furnace
  alternatives:
  - like the smoke of a kiln
  lexicon: HALOT
  rationale: כִּבְשָׁן can denote a furnace or kiln. 'Furnace' is the more familiar
    English image and fits the comparison of heavy ascending smoke; the lexical alternative
    is worth preserving in a footnote.
