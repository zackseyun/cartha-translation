id: GEN.19.37
reference: Genesis 19:37
source:
  edition: WLC
  text: וַ/תֵּ֤לֶד הַ/בְּכִירָה֙ בֵּ֔ן וַ/תִּקְרָ֥א שְׁמ֖/וֹ מוֹאָ֑ב ה֥וּא אֲבִֽי
    מוֹאָ֖ב עַד הַ/יּֽוֹם־־׃
translation:
  text: The firstborn bore a son and called his name Moab; he is the father of Moab
    to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the father of the Moabites to this day.' The Hebrew reads literally
      'the father of Moab,' using the ancestor's name for the people descended from
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: The verb ילד in the Qal with a direct object commonly means 'bear' or
    'give birth to.' 'Bore' is concise, natural English in genealogical narrative
    and fits the subject 'the firstborn.'
- source_word: הַבְּכִירָה
  chosen: The firstborn
  alternatives:
  - the older daughter
  - the elder one
  lexicon: HALOT
  rationale: The feminine singular adjective/substantive means 'the firstborn/elder.'
    In this context it refers to Lot's older daughter. 'The firstborn' preserves the
    Hebrew designation more formally, while remaining understandable in context.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Indefinite English idiom requires 'a son' here. This is the straightforward
    object of the birth verb.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: called his name
  alternatives:
  - named him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is retained in
    a readable but still source-near way. 'Named him' is possible, but the chosen
    rendering preserves the narrative formula.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: הוּא
  chosen: he
  alternatives:
  - this one
  lexicon: HALOT
  rationale: The independent pronoun resumes the named son and is naturally rendered
    'he' in English.
- source_word: אֲבִי מוֹאָב
  chosen: the father of Moab
  alternatives:
  - the ancestor of Moab
  - the father of the Moabites
  lexicon: HALOT
  rationale: Literally 'father of Moab.' In context this denotes progenitor/founding
    ancestor of the Moabite people. The more literal 'father of Moab' is retained
    in the main text; the ethnic sense can be clarified in a footnote.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking continuation to the narrator's
    present. 'To this day' is the most idiomatic English equivalent.
