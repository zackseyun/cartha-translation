id: GEN.19.14
reference: Genesis 19:14
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א ל֜וֹט וַ/יְדַבֵּ֣ר אֶל חֲתָנָ֣י/ו לֹקְחֵ֣י בְנֹתָ֗י/ו וַ/יֹּ֨אמֶר֙ ק֤וּמוּ צְּאוּ֙ מִן הַ/מָּק֣וֹם הַ/זֶּ֔ה כִּֽי מַשְׁחִ֥ית יְהוָ֖ה אֶת הָ/עִ֑יר וַ/יְהִ֥י כִ/מְצַחֵ֖ק בְּ/עֵינֵ֥י חֲתָנָֽי/ו׀־׀־־־׃
translation:
  text: So Lot went out and spoke to his sons-in-law, who were to marry his daughters, and said, “Get up, get out of this place, because Yahweh is about to destroy the city.” But he seemed to his sons-in-law to be joking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his sons-in-law, who had married his daughters'; the Hebrew phrase can denote either men already married to Lot's daughters or those about to marry them.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'he was like one joking in the eyes of his sons-in-law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲתָנָיו
  chosen: his sons-in-law
  alternatives:
  - his sons-in-law / his daughters' bridegrooms
  - his relatives by marriage
  lexicon: HALOT
  rationale: The noun חָתָן commonly refers to a bridegroom or son-in-law. In this context, modified by לֹקְחֵי בְנֹתָיו ('those taking his daughters'), it most naturally refers to the men engaged to or in process of marrying Lot's daughters. 'Sons-in-law' is idiomatic English, while the participial phrase clarifies the relationship.
- source_word: לֹקְחֵי בְנֹתָיו
  chosen: who were to marry his daughters
  alternatives:
  - who had married his daughters
  - taking his daughters
  lexicon: HALOT
  rationale: The participle לֹקְחֵי ('taking') with 'his daughters' can denote those taking them in marriage. Given the narrative tension with the daughters apparently still in Lot's house in the next verse, an inchoative/future sense ('were to marry') best fits the context better than a completed 'had married.'
- source_word: קוּמוּ צְּאוּ
  chosen: Get up, get out
  alternatives:
  - Rise, go out
  - Get up, leave
  lexicon: HALOT
  rationale: The paired imperatives are urgent and abrupt. 'Get up, get out' preserves the force and rhythm in natural modern English.
- source_word: מִן־הַמָּקוֹם הַזֶּה
  chosen: of this place
  alternatives:
  - from this place
  - out of this place
  lexicon: HALOT
  rationale: With צְּאוּ, English idiom favors 'get out of this place.' This preserves the deictic force of 'this place' and the urgency of departure.
- source_word: מַשְׁחִית
  chosen: is about to destroy
  alternatives:
  - is destroying
  - will destroy
  - is going to destroy
  lexicon: HALOT
  rationale: The Hiphil participle of שׁחת can express imminent action. In context, the destruction has not yet occurred, so 'is about to destroy' captures the participial aspect and impending judgment more precisely than simple present 'is destroying.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - this city
  lexicon: HALOT
  rationale: The definite noun refers to the city under discussion, namely Sodom. 'The city' is the straightforward rendering of the Hebrew.
- source_word: כִּמְצַחֵק
  chosen: to be joking
  alternatives:
  - to be jesting
  - to be mocking
  - like one joking
  lexicon: HALOT
  rationale: The expression וַיְהִי כִמְצַחֵק בְּעֵינֵי means he appeared as one joking in their eyes. 'Seemed ... to be joking' is natural English and preserves the sense of perceived unseriousness without overinterpreting as mockery.
- source_word: בְּעֵינֵי
  chosen: to his sons-in-law
  alternatives:
  - in the eyes of his sons-in-law
  lexicon: HALOT
  rationale: The idiom 'in the eyes of' means 'in the estimation of' or 'to.' The shorter English phrasing is idiomatic while preserving the meaning.
