id: GEN.19.21
reference: Genesis 19:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֔י/ו הִנֵּה֙ נָשָׂ֣אתִי פָנֶ֔י/ךָ גַּ֖ם לַ/דָּבָ֣ר הַ/זֶּ֑ה
    לְ/בִלְתִּ֛י הָפְכִּ֥/י אֶת הָ/עִ֖יר אֲשֶׁ֥ר דִּבַּֽרְתָּ־׃
translation:
  text: 'And he said to him, “Look, I grant you this request also: I will not overthrow
    the city of which you have spoken.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''I have lifted up your face,'' meaning ''I have shown you
      favor'' or ''I grant your request.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: HALOT
  rationale: Introduces the response with attention-getting force. 'Look' preserves
    the discourse function in readable modern English better than archaic 'Behold.'
- source_word: נָשָׂאתִי פָנֶיךָ
  chosen: I grant you
  alternatives:
  - I have lifted up your face
  - I have shown favor to you
  - I have accepted your plea
  lexicon: HALOT
  rationale: The idiom literally involves 'lifting the face,' but in context it means
    showing favor or granting a request. 'I grant you' captures the idiomatic sense
    naturally in English while preserving the personal favor implied by the Hebrew.
- source_word: גַּם לַדָּבָר הַזֶּה
  chosen: this request also
  alternatives:
  - also in this matter
  - even concerning this thing
  lexicon: HALOT
  rationale: דָּבָר here refers to the matter Lot has just raised. 'This request also'
    makes the referent explicit in natural English while retaining the additive force
    of גַּם.
- source_word: לְבִלְתִּי הָפְכִּי
  chosen: I will not overthrow
  alternatives:
  - so as not to overthrow
  - to avoid overthrowing
  - I will not destroy
  lexicon: HALOT
  rationale: 'The construction expresses the content/result of the favor granted:
    the speaker will refrain from overturning the city. ''Overthrow'' preserves the
    connection to the root הפך, used for catastrophic overturning, and is more precise
    than the broader ''destroy.'''
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; singular matches the
    Hebrew.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  chosen: of which you have spoken
  alternatives:
  - that you have mentioned
  - about which you spoke
  lexicon: HALOT
  rationale: A relatively formal but clear rendering that preserves the reference
    to the city Lot named. 'Of which you have spoken' fits the solemn tone and tracks
    the Hebrew closely.
