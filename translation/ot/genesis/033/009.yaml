id: GEN.33.9
reference: Genesis 33:9
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר עֵשָׂ֖ו יֶשׁ לִ֣/י רָ֑ב אָחִ֕/י יְהִ֥י לְ/ךָ֖ אֲשֶׁר לָֽ/ךְ־־׃
translation:
  text: But Esau said, “I have plenty, my brother; let what is yours remain yours.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have enough, my brother; let what belongs to you be yours.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context because Esau's reply gently declines Jacob's gift, marking mild contrast
    with Jacob's offer; 'said' is the straightforward rendering of אמר.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: יֶשׁ לִי רָב
  chosen: I have plenty
  alternatives:
  - I have much
  - I have enough
  - There is much for me
  lexicon: HALOT
  rationale: 'The idiom יֵשׁ לִי + adjective expresses possession: ''there is to me
    much.'' ''I have plenty'' is natural modern English and preserves Esau''s claim
    of abundance without overstating it. ''Enough'' is possible in context, but רָב
    more directly denotes abundance/muchness than mere sufficiency.'
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - brother
  lexicon: HALOT
  rationale: The vocative with 1cs suffix is naturally rendered 'my brother.' It preserves
    the relational warmth in Esau's address to Jacob.
- source_word: יְהִי לְךָ
  chosen: let ... remain yours
  alternatives:
  - let ... be yours
  - may ... be yours
  lexicon: HALOT
  rationale: 'The jussive of היה here functions as a polite permissive: Esau tells
    Jacob to keep what belongs to him. In English, ''let ... remain yours'' best conveys
    the sense in context, since Jacob is offering possessions that Esau declines.'
- source_word: אֲשֶׁר לָךְ
  chosen: what is yours
  alternatives:
  - that which is yours
  - what belongs to you
  lexicon: HALOT
  rationale: This relative phrase identifies Jacob's possessions. 'What is yours'
    is concise, natural English; 'what belongs to you' is slightly more explicit but
    less elegant. The final suffix is orthographically marked feminine in the morphology
    table, but context and standard reading take it as 2ms referring to Jacob.
