id: GEN.33.15
reference: Genesis 33:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר עֵשָׂ֔ו אַצִּֽיגָה נָּ֣א עִמְּ/ךָ֔ מִן הָ/עָ֖ם אֲשֶׁ֣ר אִתִּ֑/י
    וַ/יֹּ֨אמֶר֙ לָ֣/מָּה זֶּ֔ה אֶמְצָא חֵ֖ן בְּ/עֵינֵ֥י אֲדֹנִֽ/י־־־׃
translation:
  text: Then Esau said, “Please let me leave with you some of the people who are with
    me.” But he said, “Why is this? Let me find favor in the eyes of my lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let me station” or “let me set in place” with you some of the people
      who are with me.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַצִּיגָה
  chosen: let me leave
  alternatives:
  - let me station
  - let me set in place
  - let me leave behind
  lexicon: HALOT
  rationale: The cohortative of יצג here expresses Esau’s offer to place or leave
    some of his men with Jacob. In context, 'let me leave' is the most natural English
    idiom for leaving an escort behind, while still reflecting the volitional nuance.
- source_word: נָּא
  chosen: Please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: נא commonly softens a request or proposal. 'Please' conveys the polite
    entreaty in clear modern English better than archaic 'I pray' or temporally misleading
    'now'.
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - beside you
  lexicon: HALOT
  rationale: The preposition עם with pronominal suffix naturally means accompaniment
    or association. 'With you' fits Esau’s offer to leave people in Jacob’s company.
- source_word: מִן הָעָם אֲשֶׁר אִתִּי
  chosen: some of the people who are with me
  alternatives:
  - some of the people with me
  - some of my people
  lexicon: HALOT
  rationale: The phrase denotes a subset of Esau’s accompanying group. 'Some of the
    people who are with me' preserves the partitive sense of מן and the relative clause.
- source_word: לָמָּה זֶּה
  chosen: Why is this?
  alternatives:
  - Why this?
  - Why do this?
  lexicon: HALOT
  rationale: The Hebrew idiom expresses polite refusal or questioning of the need
    for Esau’s offer. 'Why is this?' is a natural English rendering that preserves
    the elliptical force without over-interpreting.
- source_word: אֶמְצָא חֵן
  chosen: Let me find favor
  alternatives:
  - may I find favor
  - I will find favor
  lexicon: HALOT
  rationale: 'מצא חן is a standard idiom for receiving favor. Given the discourse
    context, the imperfect is best taken as a polite wish/jussive-like expression:
    ''Let me find favor,'' not a simple future.'
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for evaluation or regard. 'In the eyes
    of' preserves the idiom transparently in English.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: Here אֲדֹנִי is a deferential address from Jacob to Esau, not a divine
    title. 'My lord' preserves the social deference and matches the patriarchal setting
    better than the flatter 'sir' or the potentially misleading 'master'.
