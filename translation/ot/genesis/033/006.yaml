id: GEN.33.6
reference: Genesis 33:6
source:
  edition: WLC
  text: וַ/תִּגַּ֧שְׁןָ הַ/שְּׁפָח֛וֹת הֵ֥נָּה וְ/יַלְדֵי/הֶ֖ן וַ/תִּֽשְׁתַּחֲוֶֽיןָ׃
translation:
  text: Then the female servants came near, they and their children, and bowed down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached' for 'came near.'
    reason: lexical_alternative
  - marker: b
    text: Or 'maidservants'; the Hebrew specifically refers to female servants.
    reason: lexical_alternative
  - marker: c
    text: Or 'prostrated themselves,' expressing a fuller bodily act of homage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגַּשְׁןָ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: From נגשׁ in the wayyiqtol 3fp, indicating sequential narrative action.
    'Came near' is natural modern English and preserves the movement toward Esau without
    overformal wording.
- source_word: הַשְּׁפָחוֹת
  chosen: the female servants
  alternatives:
  - the maidservants
  - the slave women
  - the handmaids
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave woman. In this narrative setting,
    'female servants' is a clear, readable rendering that preserves the gendered reference
    without archaic 'handmaids.' 'Slave women' is possible but the bonded status is
    not the focus of this verse.
- source_word: הֵנָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis/apposition after 'the female servants.'
    In English, this is naturally conveyed by 'they' in the phrase 'they and their
    children,' without requiring a more wooden repetition.
- source_word: וְיַלְדֵיהֶן
  chosen: and their children
  alternatives:
  - with their children
  lexicon: HALOT
  rationale: יַלְדֵי with 3fp suffix means 'their children.' Rendering with simple
    coordination reflects the Hebrew structure; English readers will understand accompaniment
    from context.
- source_word: וַתִּשְׁתַּחֲוֶיןָ
  chosen: bowed down
  alternatives:
  - prostrated themselves
  - bowed themselves
  lexicon: HALOT
  rationale: From שׁחה/השתחוה, the standard gesture of bowing low in homage. 'Bowed
    down' is idiomatic and accurate; 'prostrated themselves' is more explicit but
    heavier than the context requires.
