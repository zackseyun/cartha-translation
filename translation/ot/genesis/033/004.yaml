theological_decisions:
- issue: Interpretation of Esau's actions toward Jacob
  chosen_reading: Render the sequence straightforwardly as genuine reconciliation
    language without adding suspicion or theological interpretation.
  alternative_readings:
  - Read the kiss suspiciously or ironically based on later interpretive traditions
  rationale: The Hebrew narrative presents Esau's actions in a rapid sequence of affectionate
    verbs. The translation should preserve the text's surface sense and not import
    later interpretive doubts into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
