id: GEN.33.4
reference: Genesis 33:4
source:
  edition: WLC
  text: וַ/יָּ֨רָץ עֵשָׂ֤ו לִ/קְרָאת/וֹ֙ וַֽ/יְחַבְּקֵ֔/הוּ וַ/יִּפֹּ֥ל עַל צַוָּארָ֖/ו
    וַׄ/יִּׄשָּׁׄקֵ֑ׄ/הׄוּׄ וַ/יִּבְכּֽוּ־׃
translation:
  text: Esau ran to meet him, embraced him, fell on his neck, kissed him, and they
    wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb translated 'kissed him' is marked unusually in the Masoretic Text
      with dots over the word. Some interpreters take this as signaling doubt or emphasis,
      but the plain sense of the Hebrew here is 'kissed him.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּרָץ
  chosen: ran
  alternatives:
  - hurried
  - rushed
  lexicon: HALOT
  rationale: The verb רוץ denotes running. 'Ran' is the plain, natural English equivalent
    and preserves the sudden, eager movement in the narrative.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - toward him
  - to encounter him
  lexicon: HALOT
  rationale: The idiom לקראת commonly means going out to meet someone. 'To meet him'
    is idiomatic English and captures the relational movement better than the more
    wooden 'toward him.'
- source_word: וַיְחַבְּקֵהוּ
  chosen: embraced him
  alternatives:
  - hugged him
  lexicon: HALOT
  rationale: חבק means to embrace. 'Embraced' is slightly more literary and fitting
    for narrative Scripture while remaining clear in modern English.
- source_word: וַיִּפֹּל עַל צַוָּארוֹ
  chosen: fell on his neck
  alternatives:
  - fell upon his neck
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression for an emotional embrace. 'Fell
    on his neck' preserves the vivid imagery of the source without paraphrasing it
    away.
- source_word: וַיִּשָּׁקֵהוּ
  chosen: kissed him
  lexicon: HALOT
  rationale: נשק in this stem means 'kiss.' The straightforward rendering is best.
    Because this verb in Genesis 33:4 is marked unusually in the Masoretic tradition,
    an explanatory footnote preserves that textual/canonical note without altering
    the main translation.
- source_word: וַיִּבְכּוּ
  chosen: they wept
  alternatives:
  - they cried
  lexicon: HALOT
  rationale: The plural verb indicates both men wept. 'Wept' better matches the emotional
    and literary tone than the more colloquial 'cried'.
