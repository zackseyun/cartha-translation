id: GEN.33.16
reference: Genesis 33:16
source:
  edition: WLC
  text: וַ/יָּשָׁב֩ בַּ/יּ֨וֹם הַ/ה֥וּא עֵשָׂ֛ו לְ/דַרְכּ֖/וֹ שֵׂעִֽירָ/ה׃
translation:
  text: So Esau returned that day on his way to Seir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'on that day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol form narrates a completed past action,
    naturally rendered 'returned.' 'Went back' is possible, but 'returned' is smoother
    modern English and fits the travel context.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  - the same day
  lexicon: HALOT
  rationale: The phrase literally means 'on that day.' English commonly compresses
    this to 'that day' without loss of meaning. This preserves the temporal notice
    while reading naturally.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: לְדַרְכּוֹ
  chosen: on his way
  alternatives:
  - to his way
  - by his way
  - along his route
  lexicon: HALOT
  rationale: Literally 'to his way/road.' In context of resuming travel, 'on his way'
    is the most idiomatic English expression and conveys that Esau resumed his journey.
- source_word: שֵׂעִירָה
  chosen: to Seir
  alternatives:
  - Seirward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Seir. English
    expresses this naturally as 'to Seir.'
