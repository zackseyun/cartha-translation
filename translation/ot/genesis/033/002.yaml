id: GEN.33.2
reference: Genesis 33:2
source:
  edition: WLC
  text: וַ/יָּ֧שֶׂם אֶת הַ/שְּׁפָח֛וֹת וְ/אֶת יַלְדֵי/הֶ֖ן רִֽאשֹׁנָ֑ה וְ/אֶת לֵאָ֤ה
    וִֽ/ילָדֶ֨י/הָ֙ אַחֲרֹנִ֔ים וְ/אֶת רָחֵ֥ל וְ/אֶת יוֹסֵ֖ף אַחֲרֹנִֽים־־־־־׃
translation:
  text: And he put the female servants and their children first, and Leah and her
    children behind them, and Rachel and Joseph last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the maidservants'; the Hebrew term can denote female household servants
      of lower status, and in some contexts may overlap with 'slave women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: he put
  alternatives:
  - he placed
  - he set
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, place, set.' 'Put' is natural modern
    English and fits the narrative description of arranging people in order.
- source_word: הַשְּׁפָחוֹת
  chosen: the female servants
  alternatives:
  - the maidservants
  - the slave women
  - the concubines
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. 'Female servants' is clear and
    readable in modern English. 'Maidservants' is traditional but dated; 'slave women'
    may over-specify the social status in this immediate context; 'concubines' is
    too interpretive here since the text itself names them by household status.
- source_word: יַלְדֵיהֶן
  chosen: their children
  alternatives:
  - their sons
  - their offspring
  lexicon: HALOT
  rationale: יֶלֶד/יַלְדֵי here refers broadly to children, not specifically sons.
    'Children' best matches the inclusive sense.
- source_word: רִאשֹׁנָה
  chosen: first
  alternatives:
  - in front
  - at the front
  lexicon: HALOT
  rationale: The feminine singular adverbial form functions to indicate first position
    in the arrangement. 'First' is the most direct English equivalent.
- source_word: לֵאָה
  chosen: Leah
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
- source_word: וִילָדֶיהָ
  chosen: and her children
  alternatives:
  - and her sons
  - with her children
  lexicon: HALOT
  rationale: Again, the noun is broad enough for 'children.' The conjunction is retained
    straightforwardly.
- source_word: אַחֲרֹנִים
  chosen: behind them
  alternatives:
  - afterward
  - later
  - second
  lexicon: HALOT
  rationale: Although literally 'last/behind,' in the middle position of a three-part
    arrangement it indicates placement after the first group but before the final
    group. 'Behind them' communicates the spatial ordering more precisely than 'last'
    at this point.
- source_word: רָחֵל
  chosen: Rachel
  rationale: Personal name transliterated by standard English convention.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention.
- source_word: אַחֲרֹנִים
  chosen: last
  alternatives:
  - behind all of them
  - at the rear
  lexicon: HALOT
  rationale: For the final group in the sequence, 'last' is the most idiomatic and
    accurate rendering of the ordering.
