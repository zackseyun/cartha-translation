  from: when he came from Paddan-aram
  to: on his coming from Paddan-aram
  rationale: The current rendering repeats the verb 'came' ('Jacob came... when he came...'), which is slightly awkward in English. While this literally reflects the Hebrew's use of the same root (וַיָּבֹא... בְּבֹאוֹ), a smoother English rendering like 'on his coming from' or 'upon arriving from' would be more natural while still accurately conveying the temporal sense of the infinitive construct.
