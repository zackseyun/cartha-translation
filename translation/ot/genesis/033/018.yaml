id: GEN.33.18
reference: Genesis 33:18
source:
  edition: WLC
  text: וַ/יָּבֹא֩ יַעֲקֹ֨ב שָׁלֵ֜ם עִ֣יר שְׁכֶ֗ם אֲשֶׁר֙ בְּ/אֶ֣רֶץ כְּנַ֔עַן בְּ/בֹא֖/וֹ מִ/פַּדַּ֣ן אֲרָ֑ם וַ/יִּ֖חַן אֶת פְּנֵ֥י הָ/עִֽיר־׃
translation:
  text: Jacob came safely to the city of Shechem, which is in the land of Canaan, on his coming from Paddan-aram, and he camped before the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jacob came to Salem, a city of Shechem.' The Hebrew שָׁלֵם (shalem) may be read either as 'safely/in peace' or as the place name 'Salem.'
    reason: alternative_reading
  - marker: b
    text: Or 'when he came from Paddan-aram'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of בוא, indicating Jacob's arrival. 'Came' is the most straightforward English narrative equivalent.
- source_word: שָׁלֵם
  chosen: safely
  alternatives:
  - in peace
  - whole
  - to Salem
  lexicon: HALOT
  rationale: 'The adjective/adverbial form most naturally modifies Jacob''s arrival state: he arrived safe/sound, i.e., in peace. This fits the context of his return after danger and corresponds to the sense reflected in many translations. Because the Hebrew can also be construed as a place name (''Salem''), that alternative is preserved in a footnote.'
- source_word: עִיר שְׁכֶם
  chosen: the city of Shechem
  alternatives:
  - Shechem city
  - Salem, a city of Shechem
  lexicon: HALOT
  rationale: Construct chain with עִיר followed by the proper name שׁכם is most naturally rendered 'the city of Shechem.' The article is supplied idiomatically in English.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנַעַן
  chosen: which is in the land of Canaan
  alternatives:
  - that is in the land of Canaan
  lexicon: HALOT
  rationale: Relative clause identifying Shechem geographically. 'Which is in' is natural modern English.
- source_word: בְּבֹאוֹ מִפַּדַּן אֲרָם
  chosen: when he came from Paddan-aram
  alternatives:
  - on his coming from Paddan-aram
  - after he came from Paddan-aram
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct plus suffix is temporal: ''when/on his coming.'' ''When he came from'' gives clear, readable English while preserving the temporal sense.'
- source_word: פַּדַּן אֲרָם
  chosen: Paddan-aram
  alternatives:
  - Paddan Aram
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. Hyphenated form is standard in English Bible usage.
- source_word: וַיִּחַן
  chosen: he camped
  alternatives:
  - he encamped
  - he pitched camp
  lexicon: HALOT
  rationale: חן in the Qal here means to camp/encamp. 'He camped' is readable modern English; 'encamped' is slightly more formal but less natural.
- source_word: אֶת־פְּנֵי הָעִיר
  chosen: before the city
  alternatives:
  - in front of the city
  - facing the city
  lexicon: HALOT
  rationale: The idiom 'the face of the city' means the area before or opposite the city. 'Before the city' preserves the spatial sense concisely.
