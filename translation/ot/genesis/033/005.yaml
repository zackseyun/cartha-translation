id: GEN.33.5
reference: Genesis 33:5
source:
  edition: WLC
  text: וַ/יִּשָּׂ֣א אֶת עֵינָ֗י/ו וַ/יַּ֤רְא אֶת הַ/נָּשִׁים֙ וְ/אֶת הַ/יְלָדִ֔ים
    וַ/יֹּ֖אמֶר מִי אֵ֣לֶּה לָּ֑/ךְ וַ/יֹּאמַ֕ר הַ/יְלָדִ֕ים אֲשֶׁר חָנַ֥ן אֱלֹהִ֖ים
    אֶת עַבְדֶּֽ/ךָ־־־־־־׃
translation:
  text: He lifted up his eyes and saw the women and the children, and he said, “Who
    are these with you?” And he said, “The children whom God has graciously given
    your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who are these to you?' The Hebrew expression is idiomatic and asks
      about the identity of those accompanying Jacob.
    reason: lexical_alternative
  - marker: b
    text: Or simply, 'The children whom God has given your servant.' The Hebrew verb
      also carries the sense of showing favor or being gracious.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא אֶת עֵינָיו
  chosen: He lifted up his eyes
  alternatives:
  - He looked up
  lexicon: HALOT
  rationale: A Hebrew idiom meaning to look up or raise one's gaze. Retaining 'lifted
    up his eyes' preserves the narrative texture and is still understandable in modern
    English.
- source_word: וַיַּרְא
  chosen: and saw
  alternatives:
  - and looked and saw
  lexicon: HALOT
  rationale: Standard rendering of ראה. 'Saw' is sufficient in English after the preceding
    idiom and avoids redundancy.
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - the wives
  lexicon: HALOT
  rationale: The lexical sense is 'women.' Although these are Jacob's wives/concubines
    in context, the source text uses the broader term, so 'women' best reflects the
    Hebrew without importing a more specific relation.
- source_word: הַיְלָדִים
  chosen: the children
  alternatives:
  - the young ones
  lexicon: HALOT
  rationale: A natural rendering of ילדים in context. 'Children' is idiomatic and
    fits both occurrences in the verse.
- source_word: מִי אֵלֶּה לָּךְ
  chosen: Who are these with you?
  alternatives:
  - Who are these to you?
  - Who are these belonging to you?
  lexicon: HALOT
  rationale: The dative pronoun literally yields 'who are these to/for you,' but in
    English the idiomatic sense in context is 'with you,' asking about the identity
    of those accompanying Jacob.
- source_word: חָנַן
  chosen: has graciously given
  alternatives:
  - has given
  - has shown favor by giving
  lexicon: HALOT
  rationale: The verb carries the sense of showing favor or being gracious. 'Has graciously
    given' preserves the theological nuance of divine favor better than a bare 'has
    given.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering here for the singular referent אלהים.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as a deferential
    self-reference in direct speech to Esau. 'Your servant' best captures the social
    politeness without overstating chattel status.
