theological_decisions:
- issue: Nuance of divine favor in Jacob's reply
  chosen_reading: The children are described as a gracious gift from God
  alternative_readings:
  - The children whom God has given your servant
  rationale: The verb חנן includes the notion of favor/grace, so the translation preserves
    that nuance without adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §1, §3
