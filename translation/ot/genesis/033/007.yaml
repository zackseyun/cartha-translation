id: GEN.33.7
reference: Genesis 33:7
source:
  edition: WLC
  text: וַ/תִּגַּ֧שׁ גַּם לֵאָ֛ה וִ/ילָדֶ֖י/הָ וַ/יִּֽשְׁתַּחֲו֑וּ וְ/אַחַ֗ר נִגַּ֥שׁ
    יוֹסֵ֛ף וְ/רָחֵ֖ל וַ/יִּֽשְׁתַּחֲוֽוּ־׃
translation:
  text: Leah also came near, and her children, and they bowed down. Afterward Joseph
    and Rachel came near, and they bowed down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached' for 'came near' in both clauses.
    reason: lexical_alternative
  - marker: b
    text: Or 'prostrated themselves'; the Hebrew verb can denote an act of deep obeisance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגַּשׁ / נִגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ denotes approaching or coming near. 'Came near' is natural
    modern English and preserves the movement toward Esau without overinterpreting
    the manner.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  lexicon: HALOT
  rationale: גַּם marks addition in the sequence of presentations before Esau. 'Also'
    fits the narrative progression cleanly.
- source_word: וִילָדֶיהָ
  chosen: and her children
  alternatives:
  - and her sons
  - and her offspring
  lexicon: HALOT
  rationale: יַלֶד/יְלָדִים can refer broadly to children. Although Leah's group in
    context includes sons and at least one daughter in the larger Jacob family, the
    immediate term is not restricted to males, so 'children' is the most accurate
    and natural rendering.
- source_word: וַיִּשְׁתַּחֲוּ
  chosen: they bowed down
  alternatives:
  - they bowed themselves
  - they prostrated themselves
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שׁחה here refers to an act of obeisance.
    'Bowed down' is idiomatic and sufficiently formal; 'prostrated themselves' is
    possible but too specific for the English main text unless the context demands
    emphasis on full bodily posture.
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - after that
  - then afterward
  lexicon: HALOT
  rationale: The adverb marks subsequent order in the procession. 'Afterward' preserves
    the temporal sequence smoothly.
- source_word: יוֹסֵף וְרָחֵל
  chosen: Joseph and Rachel
  alternatives:
  - Rachel and Joseph
  lexicon: HALOT
  rationale: The Hebrew order places Joseph before Rachel, and the translation preserves
    that order rather than conforming to expected age or maternal precedence in English.
