id: GEN.33.20
reference: Genesis 33:20
source:
  edition: WLC
  text: וַ/יַּצֶּב שָׁ֖ם מִזְבֵּ֑חַ וַ/יִּ֨קְרָא ל֔/וֹ אֵ֖ל אֱלֹהֵ֥י יִשְׂרָאֵֽל־־׃ס
translation:
  text: There he set up an altar and called it El-Elohe-Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There he set up an altar and called on him, "God, the God of Israel,"'
      or 'proclaimed over it, "God, the God of Israel."' The Hebrew can be understood
      either as naming the altar or as invoking/declaring concerning God.
    reason: alternative_reading
  - marker: b
    text: El-Elohe-Israel means 'God, the God of Israel' or 'El, God of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֶּב
  chosen: set up
  alternatives:
  - erected
  - placed
  lexicon: HALOT
  rationale: The verb נצב in the Hiphil commonly means to set up or erect. 'Set up'
    is natural modern English and fits the action of establishing an altar.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb straightforwardly indicates location. 'There' is the most
    direct rendering.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial structure denoted by מִזְבֵּחַ.
- source_word: וַיִּקְרָא לוֹ
  chosen: called it
  alternatives:
  - called on it
  - proclaimed over it
  - called on him
  lexicon: HALOT
  rationale: The construction קרא + ל can mean 'call/name' and in this context most
    naturally refers to naming the altar. Because the following phrase functions well
    as a name, 'called it' is preferred in the main text. The alternatives are preserved
    in a footnote because the Hebrew permits understanding the phrase as invocation
    rather than naming.
- source_word: אֵל אֱלֹהֵי יִשְׂרָאֵל
  chosen: El-Elohe-Israel
  alternatives:
  - God, the God of Israel
  - El, God of Israel
  lexicon: HALOT
  rationale: This phrase is best preserved as a transliterated altar-name in English
    because the immediate context is naming. This follows the principle of transliterating
    names while translating titles; here the whole phrase functions as a proper name.
    A translated alternative is worth preserving because the Hebrew words themselves
    mean 'God, the God of Israel' or 'El, God of Israel.'
