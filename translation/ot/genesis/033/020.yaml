theological_decisions:
- issue: Whether the final phrase is the name of the altar or a declaration/invocation
    addressed to God
  chosen_reading: Treat it as the name Jacob gave to the altar
  alternative_readings:
  - He called on God as 'God, the God of Israel'
  - He proclaimed over it, 'God is the God of Israel'
  rationale: The immediate syntax after 'he set up an altar' naturally supports naming
    the altar, and this reading aligns with similar naming formulas in Genesis. However,
    the Hebrew construction is compact enough that an invocation/declaration reading
    remains possible, so the alternative is preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
