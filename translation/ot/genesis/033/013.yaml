id: GEN.33.13
reference: Genesis 33:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֗י/ו אֲדֹנִ֤/י יֹדֵ֨עַ֙ כִּֽי הַ/יְלָדִ֣ים רַכִּ֔ים וְ/הַ/צֹּ֥אן
    וְ/הַ/בָּקָ֖ר עָל֣וֹת עָלָ֑/י וּ/דְפָקוּ/ם֙ י֣וֹם אֶחָ֔ד וָ/מֵ֖תוּ כָּל הַ/צֹּֽאן־־׃
translation:
  text: But he said to him, “My lord knows that the children are frail, and the flocks
    and herds nursing their young are under my care. If they are driven hard for one
    day, all the flock will die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the flocks and cattle with nursing young are my responsibility.” The
      Hebrew phrase is idiomatic and combines the idea that the animals are nursing
      and that their care rests on Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: My lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In this narrative address to Esau, אֲדֹנִי is a deferential human title,
    not a divine name. 'My lord' preserves the politeness and social hierarchy better
    than the more modern-sounding 'sir,' while avoiding theological confusion with
    the divine title.
- source_word: יֹדֵעַ
  chosen: knows
  alternatives:
  - is aware
  lexicon: HALOT
  rationale: The participle functions as a present-state assertion in direct speech.
    'Knows' is the most natural and direct English equivalent.
- source_word: הַיְלָדִים
  chosen: the children
  alternatives:
  - the young children
  - the little ones
  lexicon: HALOT
  rationale: Refers to Jacob's children traveling with him. 'The children' is accurate
    and readable; 'little ones' is possible but slightly more interpretive.
- source_word: רַכִּים
  chosen: frail
  alternatives:
  - tender
  - delicate
  - weak
  lexicon: HALOT
  rationale: The adjective denotes softness/tenderness and vulnerability. 'Frail'
    communicates their physical vulnerability in travel context more clearly in modern
    English than the traditional 'tender,' while avoiding overstatement.
- source_word: הַצֹּאן
  chosen: the flocks
  alternatives:
  - the sheep/flock
  lexicon: HALOT
  rationale: Collective noun for small livestock. Because it is paired with cattle
    and later resumed collectively, 'the flocks' works naturally in English for the
    animals under Jacob's care.
- source_word: הַבָּקָר
  chosen: herds
  alternatives:
  - cattle
  lexicon: HALOT
  rationale: Refers to larger livestock, especially cattle. 'Herds' pairs idiomatically
    with 'flocks' in English, though the underlying species is cattle.
- source_word: עָלוֹת עָלַי
  chosen: nursing their young are under my care
  alternatives:
  - are giving suck and are upon me
  - have young and depend on me
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult literally. עָלוֹת likely refers
    to animals with suckling young; עָלַי conveys responsibility resting on Jacob.
    The chosen rendering expresses both the maternal state of the animals and Jacob's
    obligation without wooden obscurity.
- source_word: וּדְפָקוּם
  chosen: If they are driven hard
  alternatives:
  - if one drives them
  - if they are overdriven
  lexicon: HALOT
  rationale: The verb דפק in this context means to drive animals harshly/overhard.
    Rendering with passive English captures the indefinite subject and the practical
    sense. 'Hard' makes explicit the excessive pace implied by context.
- source_word: יוֹם אֶחָד
  chosen: for one day
  alternatives:
  - a single day
  - one day
  lexicon: HALOT
  rationale: Temporal accusative indicating duration. 'For one day' fits the conditional
    statement smoothly in English.
- source_word: וָמֵתוּ כָּל הַצֹּאן
  chosen: all the flock will die
  alternatives:
  - all the sheep will die
  - the whole flock will die
  lexicon: HALOT
  rationale: Collective singular in Hebrew after mention of flocks/herds. 'All the
    flock' preserves the collective sense and the severity of the consequence.
