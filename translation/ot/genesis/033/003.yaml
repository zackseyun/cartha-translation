id: GEN.33.3
reference: Genesis 33:3
source:
  edition: WLC
  text: וְ/ה֖וּא עָבַ֣ר לִ/פְנֵי/הֶ֑ם וַ/יִּשְׁתַּ֤חוּ אַ֨רְצָ/ה֙ שֶׁ֣בַע פְּעָמִ֔ים
    עַד גִּשְׁתּ֖/וֹ עַד אָחִֽי/ו־־׃
translation:
  text: And he himself went on ahead of them and bowed down to the ground seven times,
    until he came near to his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "prostrated himself"; the Hebrew verb can denote a full act of obeisance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: And he himself
  alternatives:
  - And he
  - Now he
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal subject, so 'he
    himself' preserves the prominence of Jacob's personal action.
- source_word: עָבַר לִפְנֵיהֶם
  chosen: went on ahead of them
  alternatives:
  - passed before them
  - crossed in front of them
  lexicon: HALOT
  rationale: In context of Jacob moving before his family to meet Esau, the idiom
    means taking the lead or going ahead, not merely 'crossing.' 'Went on ahead of
    them' is natural English and contextually precise.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: The verb can denote prostration or obeisance. 'Bowed down' captures the
    physical act without over-specifying worship; the following 'to the ground' supplies
    the bodily posture.
- source_word: אַרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: Directional form indicating movement toward the ground. 'To the ground'
    is idiomatic modern English and preserves the concrete image.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Straightforward numerical expression; no reason to paraphrase.
- source_word: עַד גִּשְׁתּוֹ עַד אָחִיו
  chosen: until he came near to his brother
  alternatives:
  - until he approached his brother
  - until his reaching his brother
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עַד expresses the limit of
    the repeated bowing. 'Came near to his brother' is smooth English that preserves
    the sense of approach. The second עַד is best taken as part of the idiomatic construction
    leading into the object 'his brother,' not translated separately as a second 'until.'
