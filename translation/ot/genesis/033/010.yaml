theological_decisions:
- issue: Reference of אֱלֹהִים in the comparison 'like seeing the face of God'
  chosen_reading: God
  alternative_readings:
  - a god
  - divine beings
  rationale: Although אֱלֹהִים can in some contexts bear a broader semantic range,
    the immediate narrative context strongly favors the singular referent 'God,' especially
    after Jacob's encounter at Peniel/Penuel where seeing God and surviving is thematically
    prominent. The translation preserves Jacob's striking theological comparison without
    softening it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
