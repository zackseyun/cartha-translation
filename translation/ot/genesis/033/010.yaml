id: GEN.33.10
reference: Genesis 33:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יַעֲקֹ֗ב אַל נָא֙ אִם נָ֨א מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ וְ/לָקַחְתָּ֥
    מִנְחָתִ֖/י מִ/יָּדִ֑/י כִּ֣י עַל כֵּ֞ן רָאִ֣יתִי פָנֶ֗י/ךָ כִּ/רְאֹ֛ת פְּנֵ֥י
    אֱלֹהִ֖ים וַ/תִּרְצֵֽ/נִי־־־׃
translation:
  text: Jacob said, “No, please—if I have found favor in your eyes, then take my gift
    from my hand, because seeing your face is like seeing the face of God, and you
    have received me favorably.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my present.' The Hebrew מִנְחָה can denote a gift, tribute, or offering;
      here it refers to Jacob's conciliatory present to Esau.
    reason: lexical_alternative
  - marker: b
    text: Or 'you accepted me' / 'you were pleased with me.' The Hebrew verb conveys
      favorable reception.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'like seeing the face of a god,' but in context 'God' best fits
      Jacob's recent encounter at Peniel (Gen 32:30).
    reason: alternative_reading
lexical_decisions:
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: In the idiom 'find favor in your eyes,' 'favor' is the natural English
    equivalent and preserves the interpersonal sense of acceptance rather than importing
    the more theologically loaded 'grace'.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'eyes.' Retaining 'in your eyes' keeps
    the source imagery while remaining understandable in English.
- source_word: מִנְחָתִי
  chosen: my gift
  alternatives:
  - my present
  - my offering
  lexicon: HALOT
  rationale: Here Jacob refers to the conciliatory present he is urging Esau to accept.
    'Gift' is the clearest contextual rendering; 'offering' could misleadingly suggest
    a cultic act.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The phrase is retained more formally because the concrete expression
    fits the scene of personal presentation and is natural enough in English.
- source_word: עַל־כֵּן
  chosen: because
  alternatives:
  - for therefore
  - for this reason
  lexicon: HALOT
  rationale: In context this introduces Jacob's reason for urging acceptance. 'Because'
    gives the discourse force in smooth modern English without unnecessary stiffness.
- source_word: רָאִיתִי פָנֶיךָ
  chosen: seeing your face
  alternatives:
  - I have seen your face
  lexicon: HALOT
  rationale: An English gerund construction fits the following comparison ('is like
    seeing') and reflects the explanatory force of the clause in context.
- source_word: כִּרְאֹת פְּנֵי אֱלֹהִים
  chosen: is like seeing the face of God
  alternatives:
  - is like seeing God's face
  - is like seeing the face of a god
  lexicon: HALOT
  rationale: Given the broader Jacob narrative, especially his recent encounter with
    God and naming of Peniel, 'God' is the best reading. 'The face of God' preserves
    the Hebrew expression and its theological resonance.
- source_word: וַתִּרְצֵנִי
  chosen: you have received me favorably
  alternatives:
  - you were pleased with me
  - you accepted me
  lexicon: HALOT
  rationale: The verb conveys favorable acceptance. 'Received me favorably' captures
    both the relational welcome and the result of Esau's reconciliation, while linking
    naturally with the earlier 'favor' language.
- source_word: אַל נָא אִם נָא
  chosen: No, please—if
  alternatives:
  - Please, no—if
  - No, I beg you, if
  lexicon: HALOT
  rationale: This combination expresses polite but earnest refusal of Esau's prior
    statement and introduces Jacob's appeal. 'No, please—if' preserves the tone without
    sounding archaic.
