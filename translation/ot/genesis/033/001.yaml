id: GEN.33.1
reference: Genesis 33:1
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א יַעֲקֹ֜ב עֵינָ֗י/ו וַ/יַּרְא֙ וְ/הִנֵּ֣ה עֵשָׂ֣ו בָּ֔א וְ/עִמּ֕/וֹ
    אַרְבַּ֥ע מֵא֖וֹת אִ֑ישׁ וַ/יַּ֣חַץ אֶת הַ/יְלָדִ֗ים עַל לֵאָה֙ וְ/עַל רָחֵ֔ל
    וְ/עַ֖ל שְׁתֵּ֥י הַ/שְּׁפָחֽוֹת־־־׃
translation:
  text: Then Jacob lifted up his eyes and looked, and behold, Esau was coming, and
    with him were four hundred men. So he divided the children among Leah, Rachel,
    and the two female servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked up.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'behold,' a vivid marker drawing attention to Esau's approach.
    reason: lexical_alternative
  - marker: c
    text: Or 'the two maidservants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  chosen: lifted up his eyes
  alternatives:
  - looked up
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning to raise one's gaze. Retained in
    relatively formal English as a recognizable biblical idiom while remaining natural.
- source_word: וַיַּרְא
  chosen: looked
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Used with the preceding idiom to give the sequence 'lifted up his eyes
    and looked.' 'Saw' would be possible, but 'looked' better reflects the action
    following the idiom before the content of sight is introduced.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  - and there was
  lexicon: HALOT
  rationale: Marks vivid presentation and surprise. 'Behold' preserves the discourse
    force succinctly; although somewhat elevated, it remains understandable and fits
    narrative style.
- source_word: בָּא
  chosen: was coming
  alternatives:
  - came
  - was arriving
  lexicon: HALOT
  rationale: The participial form presents Esau as in the act of approaching. 'Was
    coming' captures the ongoing sense better than the simple past 'came.'
- source_word: וְעִמּוֹ אַרְבַּע מֵאוֹת אִישׁ
  chosen: and with him were four hundred men
  alternatives:
  - and four hundred men were with him
  lexicon: HALOT
  rationale: Natural English rendering of the prepositional phrase plus numeral expression,
    preserving the emphasis that Esau is accompanied by a large group.
- source_word: וַיַּחַץ
  chosen: divided
  alternatives:
  - apportioned
  - split up
  lexicon: HALOT
  rationale: Conveys the act of distributing into groups. 'Divided' is the most straightforward
    and idiomatic choice in context.
- source_word: הַיְלָדִים
  chosen: the children
  alternatives:
  - the young ones
  lexicon: HALOT
  rationale: Refers to the children of Jacob's household. 'Children' is the normal
    and clear English equivalent.
- source_word: עַל לֵאָה וְעַל רָחֵל וְעַל שְׁתֵּי הַשְּׁפָחוֹת
  chosen: among Leah, Rachel, and the two female servants
  alternatives:
  - with Leah, with Rachel, and with the two maidservants
  - over Leah, Rachel, and the two slave women
  lexicon: HALOT
  rationale: The repeated עַל here indicates distribution by grouping the children
    with these women. 'Among' communicates the sense clearly in English. שְׁפָחוֹת
    denotes female household servants/maids; 'female servants' is clear and avoids
    overstating the legal nuance in this immediate context, though 'maidservants'
    is also possible.
