id: GEN.33.19
reference: Genesis 33:19
source:
  edition: WLC
  text: וַ/יִּ֜קֶן אֶת חֶלְקַ֣ת הַ/שָּׂדֶ֗ה אֲשֶׁ֤ר נָֽטָה שָׁם֙ אָהֳל֔/וֹ מִ/יַּ֥ד
    בְּנֵֽי חֲמ֖וֹר אֲבִ֣י שְׁכֶ֑ם בְּ/מֵאָ֖ה קְשִׂיטָֽה־־־׃
translation:
  text: And he bought the portion of the field where he had pitched his tent, from
    the hand of the sons of Hamor, the father of Shechem, for a hundred qesitahs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew qesitah; an ancient unit or item of payment of uncertain exact value,
      traditionally rendered in various ways such as 'pieces of money.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֶן
  chosen: bought
  alternatives:
  - acquired
  - purchased
  lexicon: HALOT
  rationale: The verb קנה in this context of a land transaction most naturally means
    'buy/purchase.' 'Bought' is idiomatic modern English and fits the following price
    expression.
- source_word: חֶלְקַת הַשָּׂדֶה
  chosen: the portion of the field
  alternatives:
  - the piece of land
  - the parcel of the field
  lexicon: HALOT
  rationale: חֶלְקָה denotes a portion/parcel. Rendering it as 'portion' preserves
    the sense of a defined tract without over-specifying beyond the Hebrew.
- source_word: אֲשֶׁר נָטָה שָׁם אָהֳלוֹ
  chosen: where he had pitched his tent
  alternatives:
  - where he had spread his tent
  - where he had set up his tent
  lexicon: HALOT
  rationale: נטה with אֹהֶל is the standard idiom for pitching or stretching out a
    tent. 'Had pitched' reflects the prior action relative to the purchase.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - from the possession of
  lexicon: HALOT
  rationale: Literally 'from the hand of.' Retaining the idiom is understandable in
    English and preserves the transactional nuance of purchase from someone's control/ownership.
- source_word: בְּנֵי חֲמוֹר
  chosen: the sons of Hamor
  alternatives:
  - Hamor's sons
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct chain; either option
    is possible, but 'the sons of Hamor' stays closer to the Hebrew form.
- source_word: אֲבִי שְׁכֶם
  chosen: the father of Shechem
  alternatives:
  - Shechem's father
  lexicon: HALOT
  rationale: The phrase most naturally identifies Hamor as the father of the man Shechem
    in the narrative. The more formal wording preserves the Hebrew apposition.
- source_word: בְּמֵאָה קְשִׂיטָה
  chosen: for a hundred qesitahs
  alternatives:
  - for a hundred pieces of money
  - for a hundred kesitahs
  lexicon: HALOT
  rationale: קְשִׂיטָה is an ancient unit or item of payment whose exact value is
    uncertain. Transliteration avoids a false precision such as 'pieces of silver'
    while preserving the source term. 'For' expresses the purchase price naturally
    in English.
