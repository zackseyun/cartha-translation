id: GEN.33.17
reference: Genesis 33:17
source:
  edition: WLC
  text: וְ/יַעֲקֹב֙ נָסַ֣ע סֻכֹּ֔תָ/ה וַ/יִּ֥בֶן ל֖/וֹ בָּ֑יִת וּ/לְ/מִקְנֵ֨/הוּ֙
    עָשָׂ֣ה סֻכֹּ֔ת עַל כֵּ֛ן קָרָ֥א שֵׁם הַ/מָּק֖וֹם סֻכּֽוֹת־־׃ס
translation:
  text: And Jacob traveled to Succoth, and he built a house for himself and made shelters
    for his livestock. Therefore he called the name of the place Succoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Succoth sounds like the Hebrew word for 'shelters' or 'booths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסַע
  chosen: traveled
  alternatives:
  - journeyed
  - moved on
  lexicon: HALOT
  rationale: The verb denotes setting out or traveling from one place to another.
    'Traveled' is natural modern English and fits the narrative movement without sounding
    archaic like 'journeyed.'
- source_word: סֻכֹּתָה
  chosen: to Succoth
  alternatives:
  - toward Succoth
  lexicon: HALOT
  rationale: The directional he indicates motion toward a place name. In context,
    English idiom is best expressed as arrival/movement 'to Succoth.' The place name
    is transliterated rather than translated, per philosophy for names.
- source_word: וַיִּבֶן לוֹ בָּיִת
  chosen: he built a house for himself
  alternatives:
  - he built himself a house
  lexicon: HALOT
  rationale: The phrase straightforwardly states that Jacob constructed a dwelling
    for his own use. 'For himself' makes the dative explicit while remaining natural
    English.
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his cattle
  - his possessions
  lexicon: HALOT
  rationale: The noun refers to acquired animals/herds. 'Livestock' is broader and
    more accurate in modern English than 'cattle,' which can be too narrow; 'possessions'
    is too broad here.
- source_word: עָשָׂה סֻכֹּת
  chosen: made shelters
  alternatives:
  - made booths
  - made huts
  lexicon: HALOT
  rationale: The plural noun סֻכּוֹת refers to temporary shelters/booths. 'Shelters'
    communicates the function clearly in contemporary English, especially for animals,
    while preserving the wordplay with the place name in the following clause.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: This formula introduces the explanation for the place name. 'Therefore'
    is concise and preserves the causal connection.
- source_word: קָרָא שֵׁם הַמָּקוֹם
  chosen: he called the name of the place
  alternatives:
  - he named the place
  - he called the place
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called the name of the place.' Retaining
    more of the idiom preserves the formal texture of the naming formula, while still
    being understandable in English.
- source_word: סֻכּוֹת
  chosen: Succoth
  alternatives:
  - Booths
  - Shelters
  lexicon: HALOT
  rationale: As a place name it should be transliterated. The narrative intentionally
    links the name with the common noun 'shelters/booths'; this wordplay is best preserved
    by transliteration in the text and explanation in a footnote.
