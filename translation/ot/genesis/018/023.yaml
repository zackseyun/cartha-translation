id: GEN.18.23
reference: Genesis 18:23
source:
  edition: WLC
  text: וַ/יִּגַּ֥שׁ אַבְרָהָ֖ם וַ/יֹּאמַ֑ר הַ/אַ֣ף תִּסְפֶּ֔ה צַדִּ֖יק עִם רָשָֽׁע־׃
translation:
  text: Then Abraham came near and said, “Will you indeed sweep away the righteous
    with the wicked?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destroy' or 'consume' for 'sweep away'; the Hebrew verb conveys removing
      in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. 'Came near' preserves
    the physical and rhetorical movement of Abraham stepping forward to intercede,
    while remaining natural English.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common narrative verb אמר is most naturally rendered 'said' in English
    narrative style.
- source_word: הַאַף
  chosen: indeed
  alternatives:
  - really
  - even
  - actually
  lexicon: HALOT
  rationale: 'The interrogative particle with אַף intensifies the question. ''Indeed''
    captures the force of Abraham''s astonished appeal without over-paraphrasing.
    The interrogative force is also carried by English word order: ''Will you indeed...?''.'
- source_word: תִּסְפֶּה
  chosen: sweep away
  alternatives:
  - destroy
  - consume
  - wipe out
  lexicon: HALOT
  rationale: From ספה, the sense here is to sweep away or remove in judgment. 'Sweep
    away' preserves the vividness of the Hebrew and fits the coming discussion about
    the fate of Sodom.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous person
  - the innocent
  lexicon: HALOT
  rationale: Though singular in form, it functions generically in this judicial question.
    'The righteous' is idiomatic English and preserves the moral category without
    flattening it to mere innocence.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  - together with
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'with.' It is important for the
    sense of shared fate in judgment.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the guilty
  - the wicked person
  lexicon: HALOT
  rationale: Like צַדִּיק, this singular adjective functions generically. 'The wicked'
    is the standard and most transparent rendering for the moral category in contrast
    with 'the righteous'.
