theological_decisions:
- issue: Generic singular moral categories
  chosen_reading: 'Render צַדִּיק and רָשָׁע as generic class terms: ''the righteous''
    and ''the wicked.'''
  alternative_readings:
  - '''the righteous person'' and ''the wicked person'''
  - pluralizing to 'the righteous' and 'the wicked people'
  rationale: The Hebrew uses singular forms generically to frame a principle of divine
    justice, not merely one individual righteous person and one individual wicked
    person. The chosen rendering preserves the representative force while remaining
    natural English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (gender-accurate
    over gender-neutral) and point 3 (preserve tension rather than resolve it)
