theological_decisions:
- issue: Whether אֲדֹנָי should be rendered as a divine title ('Lord') or a respectful
    address ('my lord')
  chosen_reading: my lord
  alternative_readings:
  - Lord
  rationale: Genesis 18 presents the LORD appearing to Abraham, yet the immediate
    speech in v. 3 is framed as direct address to a singular addressee among the visitors.
    The Hebrew pointing and later interpretation often support a divine address, but
    the discourse-level ambiguity is significant. Following the translation philosophy
    to preserve theological tension rather than prematurely resolve it, the main text
    uses 'My lord' and preserves 'Lord' in a footnote.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος/Kyrios →
    Lord by default, but this verse is Hebrew אֲדֹנָי and contextually ambiguous.'
