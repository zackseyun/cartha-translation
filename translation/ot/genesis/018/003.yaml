id: GEN.18.3
reference: Genesis 18:3
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר אֲדֹנָ֗/י אִם נָ֨א מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ אַל נָ֥א תַעֲבֹ֖ר
    מֵ/עַ֥ל עַבְדֶּֽ/ךָ־־׃
translation:
  text: And he said, “My lord, if I have found favor in your eyes, please do not pass
    by your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lord,' taking Abraham’s address as directed specifically to God rather
      than as a respectful address to the visitor.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Abraham’s speech. 'And he said'
    preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אֲדֹנָי
  chosen: My lord
  alternatives:
  - Lord
  - sir
  lexicon: HALOT
  rationale: Here the form addresses the visitor directly with 2ms suffixes following
    ('your eyes,' 'your servant'). In context Abraham is speaking to one addressed
    as a superior. Because the verse itself does not yet require the reader to resolve
    whether this is a divine title or a respectful human address, 'My lord' preserves
    the ambiguity better than capitalized 'Lord,' while 'sir' is too flat for the
    elevated setting.
- source_word: אִם נָא
  chosen: if
  alternatives:
  - please, if
  lexicon: HALOT
  rationale: The conditional particle introduces a polite request formula. The politeness
    nuance of נָא is represented later with 'please' before the prohibition, avoiding
    awkward repetition while preserving the deferential tone of the whole sentence.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: I have found favor in your eyes
  alternatives:
  - I have found favor with you
  - I have found grace in your sight
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for receiving favorable regard. 'Favor
    in your eyes' keeps the imagery and remains understandable in modern English.
    'Grace' would import theological associations not demanded here.
- source_word: אַל נָא
  chosen: please do not
  alternatives:
  - do not, please
  lexicon: HALOT
  rationale: Combines the negative imperative/prohibition with the particle of entreaty
    into natural English while preserving the courteous urgency.
- source_word: תַעֲבֹר מֵעַל
  chosen: pass by
  alternatives:
  - pass on from
  - go on past
  lexicon: HALOT
  rationale: The verb with the preposition expresses moving on past someone. 'Pass
    by' is idiomatic and concise in English.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in deferential self-reference
    before a social superior or honored guest 'your servant' is the most natural English
    equivalent. The bonded-status nuance is not foregrounded here, unlike some NT
    uses of doulos.
