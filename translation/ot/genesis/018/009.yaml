id: GEN.18.9
reference: Genesis 18:9
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵׄלָׄ֔יׄ/וׄ אַיֵּ֖ה שָׂרָ֣ה אִשְׁתֶּ֑/ךָ וַ/יֹּ֖אמֶר הִנֵּ֥ה
    בָ/אֹֽהֶל׃
translation:
  text: Then they said to him, “Where is Sarah your wife?” And he said, “There, in
    the tent.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then they said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'Then they said'
    gives natural English narrative flow while preserving the consecutive sense; 'And
    they said' is more formally literal but less idiomatic.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: 'Preposition אֶל with 3ms suffix straightforwardly indicates direction
    toward Abraham: ''to him.'''
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where
  lexicon: HALOT
  rationale: 'Interrogative adverb asking location. English idiom normally supplies
    the copula: ''Where is Sarah...?''.'
- source_word: שָׂרָה
  chosen: Sarah
  lexicon: HALOT
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: אִשְׁתֶּךָ
  chosen: your wife
  lexicon: HALOT
  rationale: Construct form with 2ms suffix means 'your wife.' This is the plain relational
    sense, not merely 'woman.'
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר resumes Abraham's reply. 'And he said' is natural and
    sufficiently preserves the narrative sequence.
- source_word: הִנֵּה
  chosen: There
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. In this immediate locative
    reply, 'There' best conveys the sense in readable modern English. 'Behold' is
    too archaic; 'Look' is possible but more colloquial than the context requires.
- source_word: בָאֹהֶל
  chosen: in the tent
  alternatives:
  - inside the tent
  lexicon: HALOT
  rationale: Preposition ב plus noun אֹהֶל with article means 'in the tent.' 'Inside
    the tent' is interpretive expansion; the simpler phrase is sufficient.
