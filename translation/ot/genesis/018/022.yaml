theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Textual form of the final clause
  chosen_reading: before the LORD
  alternative_readings:
  - before Abraham
  rationale: The Masoretic Text reads 'before the LORD.' Some ancient witnesses and scribal traditions reflect 'before Abraham,' likely due to reverential concerns about depicting the LORD as standing before Abraham. Since the provided source text is the MT and no instruction overrides it, the main text follows MT while preserving the alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
