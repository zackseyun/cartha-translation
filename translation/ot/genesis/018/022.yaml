id: GEN.18.22
reference: Genesis 18:22
source:
  edition: WLC
  text: וַ/יִּפְנ֤וּ מִ/שָּׁם֙ הָֽ/אֲנָשִׁ֔ים וַ/יֵּלְכ֖וּ סְדֹ֑מָ/ה וְ/אַ֨בְרָהָ֔ם עוֹדֶ֥/נּוּ עֹמֵ֖ד לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: Then the men turned from there and went toward Sodom, but Abraham still stood before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some ancient witnesses read 'and the LORD still stood before Abraham.' The Hebrew Masoretic Text reads 'and Abraham still stood before the LORD.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: turned
  alternatives:
  - turned away
  - faced
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol form here denotes changing direction/departing from the current place. 'Turned' is natural English and preserves the narrative movement without over-specifying.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward locative adverb. 'From there' is idiomatic and sufficiently formal.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the menfolk
  - the visitors
  lexicon: HALOT
  rationale: Although these figures are more than ordinary humans in the broader context, the Hebrew noun is simply 'the men.' The translation preserves the surface narrative wording and avoids importing interpretation into the main text.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - walked
  - departed
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' 'Went' best fits normal English narrative style here.
- source_word: סְדֹמָה
  chosen: toward Sodom
  alternatives:
  - to Sodom
  lexicon: HALOT
  rationale: The directional he on the place name can be represented as motion toward a destination. 'Toward Sodom' slightly better reflects the directional nuance than a bare 'to Sodom,' though either is possible.
- source_word: עוֹדֶנּוּ
  chosen: still
  alternatives:
  - yet
  - was still
  lexicon: HALOT
  rationale: 'The adverb with pronominal suffix intensifies continuance: Abraham remained in that state. In English, ''still'' captures the sense cleanly when combined with ''stood.'''
- source_word: עֹמֵד
  chosen: stood
  alternatives:
  - was standing
  - remained standing
  lexicon: HALOT
  rationale: The participle describes Abraham's continuing posture/state. English simple past after 'still' communicates the ongoing state naturally in narrative prose.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of' and often carries the sense of being in someone's presence. 'Before' is concise and preserves both spatial and relational force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
