theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms guidance specifies 'the LORD' as the default
    rendering for YHWH. This preserves consistency with the stated doctrine and translation
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Textual form of the final clause
  chosen_reading: before the LORD
  alternative_readings:
  - before Abraham
  rationale: The Masoretic Text reads 'before the LORD.' Some ancient witnesses and
    scribal traditions reflect 'before Abraham,' likely due to reverential concerns
    about depicting the LORD as standing before Abraham. Since the provided source
    text is the MT and no instruction overrides it, the main text follows MT while
    preserving the alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
