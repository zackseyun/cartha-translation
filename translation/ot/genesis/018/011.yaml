id: GEN.18.11
reference: Genesis 18:11
source:
  edition: WLC
  text: וְ/אַבְרָהָ֤ם וְ/שָׂרָה֙ זְקֵנִ֔ים בָּאִ֖ים בַּ/יָּמִ֑ים חָדַל֙ לִ/הְי֣וֹת
    לְ/שָׂרָ֔ה אֹ֖רַח כַּ/נָּשִֽׁים׃
translation:
  text: Now Abraham and Sarah were old, advanced in days; the way of women had ceased
    to be with Sarah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the way of women,' a modest idiom meaning that Sarah no longer menstruated.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְקֵנִים
  chosen: old
  alternatives:
  - elderly
  - aged
  lexicon: HALOT
  rationale: The adjective denotes advanced age. 'Old' is the most natural modern
    English rendering and pairs well with the following idiom 'advanced in days' without
    sounding overly formal.
- source_word: בָּאִים בַּיָּמִים
  chosen: advanced in days
  alternatives:
  - well along in years
  - far gone in years
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'coming in days' and refers to being
    advanced in age. 'Advanced in days' preserves the idiomatic imagery more closely
    than a fully dynamic paraphrase while remaining understandable.
- source_word: חָדַל לִהְיוֹת
  chosen: had ceased to be
  alternatives:
  - had stopped being
  - was no longer
  lexicon: HALOT
  rationale: The verb חָדַל means 'cease, stop.' Rendering it as 'had ceased to be'
    preserves the formal structure with the infinitive 'to be' and fits the idiomatic
    expression that follows.
- source_word: אֹרַח
  chosen: the way
  alternatives:
  - the manner
  - the course
  lexicon: HALOT
  rationale: אֹרַח literally means 'way, path, manner.' In this context it is part
    of the idiom 'the way of women,' a modest Hebrew expression for the menstrual
    cycle. 'The way' preserves the source wording while allowing the idiom to stand.
- source_word: כַּנָּשִׁים
  chosen: of women
  alternatives:
  - of females
  - of womankind
  lexicon: HALOT
  rationale: The phrase with אֹרַח forms the idiom 'the way of women.' 'Of women'
    is the natural and literal rendering in English.
- source_word: לְשָׂרָה
  chosen: with Sarah
  alternatives:
  - for Sarah
  - to Sarah
  lexicon: HALOT
  rationale: The preposition ל here marks relation or reference within the idiom.
    'With Sarah' is the most idiomatic English expression for something no longer
    occurring in her case.
