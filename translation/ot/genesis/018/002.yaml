theological_decisions:
- issue: Whether Abraham's gesture should be rendered as worship toward a divine figure
  chosen_reading: Rendered as 'bowed down to the ground' rather than 'worshiped'
  alternative_readings:
  - worshiped
  rationale: The Hebrew verb can describe reverential prostration before humans or
    God. In this immediate narrative moment, the text presents 'three men,' and translating
    as 'worshiped' would prematurely resolve an interpretive question not yet explicit
    in the verse. This preserves theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
