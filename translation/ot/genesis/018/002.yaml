id: GEN.18.2
reference: Genesis 18:2
source:
  edition: WLC
  text: וַ/יִּשָּׂ֤א עֵינָי/ו֙ וַ/יַּ֔רְא וְ/הִנֵּה֙ שְׁלֹשָׁ֣ה אֲנָשִׁ֔ים נִצָּבִ֖ים
    עָלָ֑י/ו וַ/יַּ֗רְא וַ/יָּ֤רָץ לִ/קְרָאתָ/ם֙ מִ/פֶּ֣תַח הָ/אֹ֔הֶל וַ/יִּשְׁתַּ֖חוּ
    אָֽרְצָ/ה׃
translation:
  text: He lifted up his eyes and looked, and behold, three men were standing near
    him. When he saw them, he ran from the entrance of the tent to meet them and bowed
    down to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were standing by him'; the Hebrew preposition may indicate close proximity.
    reason: lexical_alternative
  - marker: b
    text: Or 'prostrated himself to the ground.' The verb describes a gesture of deep
      respect and does not by itself require the meaning 'worshiped.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא עֵינָיו
  chosen: He lifted up his eyes
  alternatives:
  - He looked up
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom while remaining
    natural in English. 'Looked up' is smoother but loses the vividness of the source
    expression.
- source_word: וַיַּרְא
  chosen: and looked
  alternatives:
  - and saw
  lexicon: HALOT
  rationale: The first occurrence is paired with 'lifted up his eyes,' so 'looked'
    avoids awkward repetition and reflects the act of visual attention. The later
    occurrence is rendered differently in context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there were
  - suddenly
  lexicon: HALOT
  rationale: This discourse marker signals vivid presentation. 'Behold' preserves
    the narrative force better than flatter alternatives, while remaining understandable
    in literary modern English.
- source_word: שְׁלֹשָׁה אֲנָשִׁים
  chosen: three men
  alternatives:
  - three persons
  lexicon: HALOT
  rationale: The Hebrew plainly says 'men.' This is gender-accurate and fits the narrative
    presentation; more neutral alternatives would weaken the source wording.
- source_word: נִצָּבִים עָלָיו
  chosen: were standing near him
  alternatives:
  - were standing by him
  - were standing over him
  lexicon: HALOT
  rationale: The preposition can suggest proximity or position relative to him. 'Near
    him' is the most natural English in context and avoids the misleading implication
    of physical looming that 'over him' might suggest.
- source_word: וַיַּרְא
  chosen: When he saw them
  alternatives:
  - and he saw
  - when he noticed them
  lexicon: HALOT
  rationale: The second occurrence advances the narrative toward Abraham's response.
    'When he saw them' captures the temporal sense naturally in English and avoids
    wooden repetition.
- source_word: וַיָּרָץ לִקְרָאתָם
  chosen: he ran ... to meet them
  alternatives:
  - he hurried to meet them
  lexicon: HALOT
  rationale: The verb specifically denotes running. Retaining 'ran' preserves Abraham's
    eagerness and the concrete action.
- source_word: מִפֶּתַח הָאֹהֶל
  chosen: from the entrance of the tent
  alternatives:
  - from the doorway of the tent
  lexicon: HALOT
  rationale: Both are possible, but 'entrance' is slightly broader and reads smoothly
    while accurately reflecting the noun for opening/entry.
- source_word: וַיִּשְׁתַּחוּ אָרְצָה
  chosen: bowed down to the ground
  alternatives:
  - prostrated himself to the ground
  - worshiped
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration and does not by itself require the
    specifically religious sense 'worshiped.' 'Bowed down to the ground' preserves
    the physical gesture without importing a theological conclusion.
