theological_decisions:
- issue: Identity of הָאֲנָשִׁים in context
  chosen_reading: Render as 'the men' in the main text
  alternative_readings:
  - the visitors
  - the angels
  rationale: The immediate Hebrew wording uses the ordinary noun 'men,' and the translation
    philosophy prioritizes original-language primacy and preserving narrative tension
    rather than resolving it prematurely. Since the verse itself does not explicitly
    identify them as angels, the main text should not import that conclusion.
  doctrine_reference: Translation philosophy §§1, 3
