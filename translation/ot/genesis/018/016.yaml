id: GEN.18.16
reference: Genesis 18:16
source:
  edition: WLC
  text: וַ/יָּקֻ֤מוּ מִ/שָּׁם֙ הָֽ/אֲנָשִׁ֔ים וַ/יַּשְׁקִ֖פוּ עַל פְּנֵ֣י סְדֹ֑ם וְ/אַ֨בְרָהָ֔ם
    הֹלֵ֥ךְ עִמָּ֖/ם לְ/שַׁלְּחָֽ/ם־׃
translation:
  text: Then the men rose up from there and looked down toward Sodom, and Abraham
    was walking with them to send them on their way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked out over Sodom.' The Hebrew verb suggests looking from an elevated
      vantage point.
    reason: lexical_alternative
  - marker: b
    text: Or 'to see them off.' The Hebrew expression refers to accompanying departing
      guests and sending them onward.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: rose up
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, literally 'rose' or 'stood up.' 'Rose up' preserves
    the narrative movement from the meal/conversation scene without overinterpreting
    it as departure alone.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: Straightforward locative adverb; 'from there' is natural modern English
    and keeps the spatial transition.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the visitors
  - the persons
  lexicon: HALOT
  rationale: Although the broader context reveals these figures are more than ordinary
    humans, the Hebrew here uses the ordinary term 'men.' 'The men' preserves the
    narrative wording and its tension better than an interpretive gloss like 'visitors'
    or 'angels.'
- source_word: וַיַּשְׁקִפוּ
  chosen: looked down toward
  alternatives:
  - looked out over
  - gazed toward
  lexicon: HALOT
  rationale: The verb שׁקף commonly conveys looking out/down from an elevated vantage
    point. 'Looked down toward' captures both the directional sense and the likely
    topographical nuance in relation to Sodom.
- source_word: עַל־פְּנֵי סְדֹם
  chosen: toward Sodom
  alternatives:
  - over against Sodom
  - in the direction of Sodom
  lexicon: HALOT
  rationale: The idiom literally involves 'upon the face of Sodom,' meaning toward/in
    the direction of it. 'Toward Sodom' is idiomatic English; the downward nuance
    is already carried by 'looked down.'
- source_word: הֹלֵךְ
  chosen: was walking
  alternatives:
  - went
  - walked
  lexicon: HALOT
  rationale: The participle gives an ongoing or accompanying action. 'Was walking'
    reflects the durative sense better than the simple past 'went.'
- source_word: עִמָּם
  chosen: with them
  lexicon: HALOT
  rationale: Direct rendering of the preposition with pronominal suffix.
- source_word: לְשַׁלְּחָם
  chosen: to send them on their way
  alternatives:
  - to escort them
  - to see them off
  lexicon: HALOT
  rationale: The infinitive of שׁלח in this context refers to accompanying departing
    guests and sending them onward. 'Send them on their way' preserves the hospitality
    nuance without reducing it merely to physical escort.
