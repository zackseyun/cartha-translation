id: GEN.18.10
reference: Genesis 18:10
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר שׁ֣וֹב אָשׁ֤וּב אֵלֶ֨י/ךָ֙ כָּ/עֵ֣ת חַיָּ֔ה וְ/הִנֵּה בֵ֖ן לְ/שָׂרָ֣ה אִשְׁתֶּ֑/ךָ וְ/שָׂרָ֥ה שֹׁמַ֛עַת פֶּ֥תַח הָ/אֹ֖הֶל וְ/ה֥וּא אַחֲרָֽי/ו־׃
translation:
  text: And he said, “I will surely return to you about this time next year, and behold, Sarah your wife will have a son.” And Sarah was listening at the tent entrance behind him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'about the time of life'; idiomatically, 'about this time next year.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'and he was behind him'; the Hebrew pronouns are terse, and the sense is that Sarah was at the tent entrance behind the speaker.
    reason: lexical_alternative
  - marker: c
    text: Or 'at the entrance of the tent, and it was behind him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And he said' preserves Hebrew narrative flow without overinterpreting discourse sequence.
- source_word: שׁוֹב אָשׁוּב
  chosen: I will surely return
  alternatives:
  - I will certainly return
  - returning I will return
  lexicon: HALOT
  rationale: Infinitive absolute + imperfect of שוב intensifies the verb. English adverb 'surely' best captures the emphatic force in natural modern English.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - to you, Abraham
  lexicon: HALOT
  rationale: Direct second masculine singular object of the return; no need to supply the addressee's name in translation.
- source_word: כָּעֵת חַיָּה
  chosen: about this time next year
  alternatives:
  - at this time of life
  - at the reviving time
  - when the time lives again
  lexicon: HALOT
  rationale: This idiom in context refers to the same season/time in the following year, not to 'time of life' in a literal biological sense. 'About this time next year' is idiomatic English and matches the contextual promise of Sarah's conception/birth timeline.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of the Hebrew particle. 'Behold' remains understandable here and preserves the solemn announcement.
- source_word: בֵן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: 'Indefinite in English idiom within a birth announcement: ''will have a son'' is the most natural rendering.'
- source_word: לְשָׂרָה אִשְׁתֶּךָ
  chosen: Sarah your wife will have
  alternatives:
  - there will be a son for Sarah your wife
  - a son to Sarah your wife
  lexicon: HALOT
  rationale: The Hebrew preposition ל marks possession/benefaction in the birth promise. Restructuring to 'Sarah your wife will have a son' conveys the sense clearly in English.
- source_word: שָׂרָה שֹׁמַעַת
  chosen: Sarah was listening
  alternatives:
  - Sarah was hearing
  - Sarah listened
  lexicon: HALOT
  rationale: Participle indicates ongoing action in the scene. 'Was listening' captures durative aspect better than simple past.
- source_word: פֶּתַח הָאֹהֶל
  chosen: at the entrance of the tent
  alternatives:
  - at the tent entrance
  - in the doorway of the tent
  lexicon: HALOT
  rationale: Construct phrase denoting location at the opening of the tent. 'Entrance' is clear modern English.
- source_word: וְהוּא אַחֲרָיו
  chosen: and it was behind him
  alternatives:
  - and he was behind him
  - and it was behind him/her
  lexicon: HALOT
  rationale: The pronoun likely refers to the tent entrance/opening rather than a second male person; English 'it' avoids creating an implausible male antecedent. The phrase indicates Sarah's position relative to the speaker, with the tent entrance behind him.
