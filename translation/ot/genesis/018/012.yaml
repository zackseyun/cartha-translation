id: GEN.18.12
reference: Genesis 18:12
source:
  edition: WLC
  text: וַ/תִּצְחַ֥ק שָׂרָ֖ה בְּ/קִרְבָּ֣/הּ לֵ/אמֹ֑ר אַחֲרֵ֤י בְלֹתִ/י֙ הָֽיְתָה
    לִּ֣/י עֶדְנָ֔ה וַֽ/אדֹנִ֖/י זָקֵֽן־׃
translation:
  text: So Sarah laughed to herself, saying, “After I am worn out, shall I have pleasure,
    and my lord is old?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “shall I have delight,” possibly with the sense of renewed sexual pleasure
      or youthful vigor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְחַק
  chosen: laughed
  alternatives:
  - smiled
  - mocked
  lexicon: HALOT
  rationale: The verb צחק in the qal commonly means 'laugh.' Here the context is Sarah's
    inward reaction to the promise, not open derision, so 'laughed' is the most direct
    and contextually appropriate rendering.
- source_word: בְּקִרְבָּהּ
  chosen: to herself
  alternatives:
  - within herself
  - inwardly
  lexicon: HALOT
  rationale: Literally 'within her.' In idiomatic English, 'to herself' naturally
    conveys internal speech/laughter while preserving the inward sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - saying to herself
  lexicon: HALOT
  rationale: The infinitive introduces quoted speech. 'Saying' is formally accurate;
    the inward setting is already conveyed by 'to herself.'
- source_word: אַחֲרֵי בְלֹתִי
  chosen: After I am worn out
  alternatives:
  - After I have become old
  - After I have withered
  lexicon: HALOT
  rationale: בלה conveys wearing out or becoming worn/used up. 'Worn out' preserves
    the physical sense better than the vaguer 'old,' especially since Abraham's age
    is mentioned separately.
- source_word: הָיְתָה לִּי עֶדְנָה
  chosen: shall I have pleasure
  alternatives:
  - shall I have delight
  - shall I have enjoyment
  lexicon: HALOT
  rationale: The clause expresses whether delight/pleasure will come to Sarah despite
    her aged condition. 'Pleasure' is natural English and preserves the likely nuance
    of renewed sexual/fertile vitality without over-specifying it.
- source_word: עֶדְנָה
  chosen: pleasure
  alternatives:
  - delight
  - sexual pleasure
  - youthful vigor
  lexicon: HALOT
  rationale: The noun is rare and contextually tied to Sarah's aged body and Abraham's
    age. 'Pleasure' best captures the broad sense while leaving room for both sensual
    and generative overtones. More explicit renderings are interpretive and better
    preserved as alternatives.
- source_word: וַאדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: With first-person suffix, this refers to Sarah's respectful designation
    for Abraham, not a divine title. Lowercase 'lord' preserves the social sense and
    avoids confusion with the divine name/title.
- source_word: זָקֵן
  chosen: is old
  alternatives:
  - has grown old
  - is elderly
  lexicon: HALOT
  rationale: A simple predicate adjective/verb expression. 'Is old' is the most direct
    rendering in contemporary English.
