theological_decisions:
- issue: Nuance of Sarah's statement about עֶדְנָה
  chosen_reading: 'A restrained rendering that leaves the term broad: ''shall I have
    pleasure'''
  alternative_readings:
  - shall I have sexual pleasure
  - shall I have youthful vigor again
  rationale: The Hebrew likely includes bodily and marital overtones, but the text
    does not narrowly define the term. To preserve theological and interpretive restraint,
    the main text keeps the broader wording while preserving more specific possibilities
    in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
