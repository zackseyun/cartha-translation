theological_decisions:
- issue: Identity of the speaker in וַיֹּאמֶר
  chosen_reading: Render generically as 'he said' rather than specifying 'the LORD
    said.'
  alternative_readings:
  - the LORD said
  - one of the men said
  rationale: The immediate clause uses an unmarked masculine singular verb without
    restating the subject. In the broader context the speaker is associated with the
    LORD, but this verse itself does not explicitly repeat the divine name. To avoid
    importing more specificity than the clause states, the translation keeps the pronoun
    while allowing the context to identify the speaker.
  doctrine_reference: Translation philosophy §1, §3
