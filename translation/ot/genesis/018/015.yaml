id: GEN.18.15
reference: Genesis 18:15
source:
  edition: WLC
  text: וַ/תְּכַחֵ֨שׁ שָׂרָ֧ה לֵ/אמֹ֛ר לֹ֥א צָחַ֖קְתִּי כִּ֣י יָרֵ֑אָה וַ/יֹּ֥אמֶר
    לֹ֖א כִּ֥י צָחָֽקְתְּ׀׀׀׃
translation:
  text: But Sarah denied it, saying, “I did not laugh,” because she was afraid. But
    he said, “No, but you did laugh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Sarah lied,' or simply, 'Sarah denied.' The Hebrew verb can carry the
      sense of denial or falsehood; here it refers to her denial of having laughed.
    reason: lexical_alternative
  - marker: b
    text: The speaker is not explicitly named in this clause; context identifies him
      with the LORD in the surrounding narrative.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּכַחֵשׁ
  chosen: denied it
  alternatives:
  - lied
  - denied
  lexicon: HALOT
  rationale: The verb כחשׁ in the piel can mean to deny or to deal falsely. In this
    context Sarah is denying the accusation/statement just made, so 'denied it' is
    the most natural English expression and avoids over-interpreting the moral force
    as 'lied' in the main text.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing Sarah's direct speech; 'saying'
    is idiomatic and sufficiently formal.
- source_word: לֹא צָחַקְתִּי
  chosen: I did not laugh
  alternatives:
  - I didn't laugh
  lexicon: HALOT
  rationale: A straightforward negated perfect 1cs. The fuller form 'did not' fits
    the narrative register better than the contraction.
- source_word: כִּי יָרֵאָה
  chosen: because she was afraid
  alternatives:
  - for she was afraid
  - since she was afraid
  lexicon: HALOT
  rationale: כִּי here gives the reason for Sarah's denial. 'Because she was afraid'
    is clear modern English and preserves the causal sense.
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' brings out the contrast
    between Sarah's denial and the speaker's correction more clearly in English.
- source_word: לֹא כִּי צָחָקְתְּ
  chosen: No, but you did laugh
  alternatives:
  - No; you laughed
  - No, for you laughed
  - No, but you laughed
  lexicon: HALOT
  rationale: The initial לֹא rejects Sarah's denial, and כִּי here is adversative/emphatic
    rather than causal. 'No, but you did laugh' best captures the rebuttal and the
    emphasis of the Hebrew in natural English.
