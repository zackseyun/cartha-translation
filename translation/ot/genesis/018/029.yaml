id: GEN.18.29
reference: Genesis 18:29
source:
  edition: WLC
  text: וַ/יֹּ֨סֶף ע֜וֹד לְ/דַבֵּ֤ר אֵלָי/ו֙ וַ/יֹּאמַ֔ר אוּלַ֛י יִמָּצְא֥וּ/ן שָׁ֖ם
    אַרְבָּעִ֑ים וַ/יֹּ֨אמֶר֙ לֹ֣א אֶֽעֱשֶׂ֔ה בַּ/עֲב֖וּר הָ/אַרְבָּעִֽים׃
translation:
  text: Then he spoke to him yet again and said, “Perhaps forty will be found there.”
    And he said, “I will not do it for the sake of the forty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will not destroy it for the sake of the forty.” The Hebrew says simply,
      “I will not do it,” leaving the action implicit from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד לְדַבֵּר
  chosen: Then he spoke ... yet again
  alternatives:
  - And he continued to speak
  - And he added still to speak
  lexicon: HALOT
  rationale: The idiom יסף + עוד + infinitive conveys continuation or repetition of
    speech. 'Spoke ... yet again' preserves the iterative sense in natural English
    without woodenly reproducing 'added.'
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The preposition אֶל normally indicates direction toward someone; 'to
    him' is the most direct rendering here.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Suppose
  - Maybe
  lexicon: HALOT
  rationale: אוּלַי introduces a tentative possibility in Abraham's intercession.
    'Perhaps' is idiomatic and suitably respectful in context.
- source_word: יִמָּצְאוּן
  chosen: will be found
  alternatives:
  - are found
  - might be found
  lexicon: HALOT
  rationale: The Niphal of מצא is passive/reflexive, 'be found.' Future English fits
    the ongoing hypothetical negotiation.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is sufficient and natural.
- source_word: אַרְבָּעִים
  chosen: forty
  lexicon: HALOT
  rationale: Cardinal number rendered directly.
- source_word: לֹא אֶעֱשֶׂה
  chosen: I will not do it
  alternatives:
  - I will not act
  - I will not do so
  lexicon: HALOT
  rationale: The verb עשה here is elliptical, referring back to the threatened act
    against the city. Adding 'it' is required in idiomatic English and preserves the
    implied object without over-specifying 'destroy.'
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: בעבור expresses causation on behalf of or because of someone. 'For the
    sake of' best matches the intercessory context.
