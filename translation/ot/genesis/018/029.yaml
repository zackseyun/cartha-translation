theological_decisions:
- issue: Implicit object of divine action in לֹא אֶעֱשֶׂה
  chosen_reading: Keep the object implicit as 'it' rather than specifying 'destroy
    the city' in the main text.
  alternative_readings:
  - I will not destroy it
  - I will not do this thing
  rationale: The Hebrew leaves the action elliptical, referring back to the prior
    exchange. Preserving the ellipsis avoids importing more than the verse itself
    states while remaining intelligible in English.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text states without paraphrastic expansion.'
