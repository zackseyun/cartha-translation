id: GEN.18.33
reference: Genesis 18:33
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ יְהוָ֔ה כַּ/אֲשֶׁ֣ר כִּלָּ֔ה לְ/דַבֵּ֖ר אֶל אַבְרָהָ֑ם וְ/אַבְרָהָ֖ם
    שָׁ֥ב לִ/מְקֹמֽ/וֹ־׃
translation:
  text: Then the LORD went on his way when he had finished speaking to Abraham, and
    Abraham returned to his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Alternative English renderings include ''Yahweh'' or
      ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went on his way
  alternatives:
  - went away
  - departed
  - went
  lexicon: HALOT
  rationale: הלך in narrative commonly denotes departure or going away. 'Went on his
    way' is idiomatic English that preserves the motion and the sense of concluding
    the encounter without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX-influenced pattern.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: Here the particle introduces the temporal circumstance of the departure.
    'When' gives natural English while preserving the temporal force.
- source_word: כִּלָּה
  chosen: had finished
  alternatives:
  - finished
  - completed
  - ended
  lexicon: HALOT
  rationale: כלה with an infinitive expresses completion of an action. The pluperfect
    'had finished' fits the English sequence with the following departure.
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  lexicon: HALOT
  rationale: 'With כִּלָּה, the infinitive is best rendered in English as a verbal
    complement: ''had finished speaking.'''
- source_word: אֶל אַבְרָהָם
  chosen: to Abraham
  alternatives:
  - with Abraham
  lexicon: HALOT
  rationale: אֶל most directly means 'to' or 'toward.' Although English can say 'speaking
    with,' the Hebrew preposition here is straightforwardly directional.
- source_word: שָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: שוב in this context denotes returning. 'Returned' is concise and natural
    in narrative English.
- source_word: לִמְקֹמוֹ
  chosen: to his place
  alternatives:
  - to his home
  - to where he was
  lexicon: HALOT
  rationale: מקום is literally 'place.' 'To his place' preserves the lexical sense
    without importing the more specific 'home,' which the Hebrew does not explicitly
    state.
