  from: rest yourselves
  to: rest
  rationale: The Niphal of שׁען does have a reflexive sense ('lean/support yourselves'), and the draft's 'rest yourselves' is a valid attempt to capture this. However, the English verb 'rest' is naturally intransitive and does not require a reflexive pronoun. 'Rest under the tree' is more idiomatic and flows more smoothly in English than 'rest yourselves under the tree,' which sounds slightly stilted. The gain in naturalness outweighs the minor loss of formal correspondence.
