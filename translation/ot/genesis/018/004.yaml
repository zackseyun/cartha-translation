id: GEN.18.4
reference: Genesis 18:4
source:
  edition: WLC
  text: יֻקַּֽח נָ֣א מְעַט מַ֔יִם וְ/רַחֲצ֖וּ רַגְלֵי/כֶ֑ם וְ/הִֽשָּׁעֲנ֖וּ תַּ֥חַת הָ/עֵֽץ־־׃
translation:
  text: Please let a little water be brought, and wash your feet, and rest under the tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recline under the tree.' The Hebrew verb can more literally mean 'lean' or 'recline,' here in the sense of resting in the shade as an act of hospitality.
    reason: lexical_alternative
  - marker: b
    text: Or 'rest yourselves'.
    reason: previous_rendering
lexical_decisions:
- source_word: יֻקַּח
  chosen: be brought
  alternatives:
  - be taken
  - be fetched
  lexicon: HALOT
  rationale: Passive/jussive form of לקח in a polite request context. 'Be brought' gives natural English while preserving the passive sense better than the more wooden 'be taken.'
- source_word: נָא
  chosen: Please let
  alternatives:
  - please
  - I pray you
  lexicon: HALOT
  rationale: Particle of entreaty/politeness. In English it is best represented in combination with the jussive as 'Please let...' rather than as a separate word alone.
- source_word: מְעַט מַיִם
  chosen: a little water
  alternatives:
  - a small amount of water
  - some water
  lexicon: HALOT
  rationale: Literal sense is a small quantity of water. 'A little water' is idiomatic and preserves Abraham's modest offer.
- source_word: וְרַחֲצוּ
  chosen: and wash
  alternatives:
  - and bathe
  - that you may wash
  lexicon: HALOT
  rationale: Qal imperative/request to the visitors. 'Wash' is the straightforward sense in context of foot-washing hospitality.
- source_word: רַגְלֵיכֶם
  chosen: your feet
  alternatives:
  - your foot
  lexicon: HALOT
  rationale: Plural construct with 2mp suffix; direct and literal in English.
- source_word: וְהִשָּׁעֲנוּ
  chosen: and rest yourselves
  alternatives:
  - and recline
  - and lean yourselves
  lexicon: HALOT
  rationale: Niphal imperative/request from שען, literally 'lean/recline.' In this hospitality setting, 'rest yourselves' communicates the intended action naturally, while preserving the reflexive nuance with 'yourselves.'
- source_word: תַּחַת הָעֵץ
  chosen: under the tree
  alternatives:
  - beneath the tree
  lexicon: HALOT
  rationale: 'Straightforward prepositional phrase. Definite article is retained: a specific tree near Abraham''s location.'
