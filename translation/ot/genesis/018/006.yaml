id: GEN.18.6
reference: Genesis 18:6
source:
  edition: WLC
  text: וַ/יְמַהֵ֧ר אַבְרָהָ֛ם הָ/אֹ֖הֱלָ/ה אֶל שָׂרָ֑ה וַ/יֹּ֗אמֶר מַהֲרִ֞י שְׁלֹ֤שׁ
    סְאִים֙ קֶ֣מַח סֹ֔לֶת ל֖וּשִׁי וַ/עֲשִׂ֥י עֻגֽוֹת־׃
translation:
  text: So Abraham hurried into the tent to Sarah and said, “Quickly, knead three
    seahs of fine flour and make cakes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A seah was an ancient dry measure; three seahs is roughly 20–22 liters (about
      5–6 gallons).
    reason: cultural_note
  - marker: b
    text: Or 'three measures' of fine flour.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: hurried
  alternatives:
  - hastened
  - went quickly
  lexicon: HALOT
  rationale: The verb denotes acting quickly. 'Hurried' is natural modern English
    and preserves the narrative urgency better than the more archaic 'hastened'.
- source_word: הָאֹהֱלָה
  chosen: into the tent
  alternatives:
  - to the tent
  - tentward
  lexicon: HALOT
  rationale: The directional he on 'tent' indicates motion toward/into the tent. In
    context Abraham is going inside to speak to Sarah, so 'into the tent' best conveys
    the sense in idiomatic English.
- source_word: מַהֲרִי
  chosen: Quickly
  alternatives:
  - Hurry
  - Be quick
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to Sarah. 'Quickly' works well
    as a direct urgent command in quoted speech without sounding overly abrupt in
    English.
- source_word: שְׁלֹשׁ סְאִים
  chosen: three seahs
  alternatives:
  - three measures
  - about three seahs
  lexicon: HALOT
  rationale: A seah is a specific ancient dry measure. Retaining 'seahs' preserves
    the concrete source-language unit more transparently than replacing it with the
    generic 'measures.'
- source_word: קֶמַח סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: The phrase refers to high-quality finely milled flour. 'Fine flour' is
    the standard clear English rendering and preserves the qualitative force of סֹלֶת.
- source_word: לוּשִׁי
  chosen: knead
  alternatives:
  - mix
  lexicon: HALOT
  rationale: The verb specifically refers to kneading dough, not merely mixing ingredients.
    'Knead' is therefore more precise.
- source_word: וַעֲשִׂי עֻגוֹת
  chosen: and make cakes
  alternatives:
  - and make bread cakes
  - and prepare loaves
  lexicon: HALOT
  rationale: עֻגוֹת refers to round cakes, likely simple bread cakes baked quickly.
    'Cakes' preserves the lexical sense without over-specifying the baking method.
