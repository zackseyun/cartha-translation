theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the rhetorical question
  chosen_reading: Is anything too difficult for the LORD?
  alternative_readings:
  - Is anything too wonderful for the LORD?
  - Is anything impossible for the LORD?
  rationale: The verse emphasizes the LORD's power to fulfill the promise to Sarah. 'Too difficult' preserves the theological point without overstating the lexical force into a philosophical absolute beyond the immediate context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text plain sense'
