id: GEN.18.14
reference: Genesis 18:14
source:
  edition: WLC
  text: הֲ/יִפָּלֵ֥א מֵ/יְהוָ֖ה דָּבָ֑ר לַ/מּוֹעֵ֞ד אָשׁ֥וּב אֵלֶ֛י/ךָ כָּ/עֵ֥ת חַיָּ֖ה וּ/לְ/שָׂרָ֥ה בֵֽן׃
translation:
  text: Is anything too difficult for Yahweh? At the appointed time I will return to you, about this time next year, and Sarah will have a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Is anything too wonderful for the LORD?' The Hebrew verb can carry the sense of being extraordinary or beyond human ability.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''about the time of life.'' This likely means the same season next year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיִפָּלֵא
  chosen: too difficult
  alternatives:
  - too wonderful
  - too extraordinary
  - be impossible
  lexicon: HALOT
  rationale: The Niphal of פלא can denote being extraordinary, wonderful, or beyond one's power. In this rhetorical question, idiomatic English is best served by 'too difficult,' which captures the sense of something being beyond the LORD's ability without over-literal awkwardness. 'Impossible' is interpretive and stronger than the Hebrew requires; 'too wonderful' is more formal but less clear in contemporary English.
- source_word: מֵיְהוָה
  chosen: for the LORD
  alternatives:
  - from the LORD
  - with the LORD
  lexicon: HALOT
  rationale: 'With פלא, the preposition מן marks comparison or limitation: ''too difficult for/from the LORD.'' Given English idiom and the rhetorical force, ''for the LORD'' communicates the intended sense most naturally. Per doctrine, יְהוָה is rendered ''the LORD'' rather than ''Yahweh'' or ''Jehovah''.'
- source_word: דָּבָר
  chosen: anything
  alternatives:
  - a thing
  - any matter
  - any word
  lexicon: HALOT
  rationale: Although literally 'thing/matter,' English idiom in this rhetorical question prefers 'anything.' This preserves the broad semantic scope of דָּבָר without sounding wooden.
- source_word: לַמּוֹעֵד
  chosen: At the appointed time
  alternatives:
  - At the set time
  - At the fixed time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed or fixed time. 'Appointed time' is both natural and semantically precise, preserving the sense of a divinely determined occasion.
- source_word: אָשׁוּב
  chosen: I will return
  alternatives:
  - I will come back
  - I will turn back
  lexicon: HALOT
  rationale: שׁוּב in this context refers to returning. 'I will return' is concise and suitably formal for divine speech.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - to you [Abraham]
  lexicon: HALOT
  rationale: Second masculine singular refers to Abraham. The English need not specify the name in the main text, since the addressee is clear from context.
- source_word: כָּעֵת חַיָּה
  chosen: about this time next year
  alternatives:
  - at this time of life
  - when the time revives
  - according to the time of life
  lexicon: HALOT
  rationale: This idiom is traditionally difficult. In context, it refers to the same season in the coming year, when Sarah's promised pregnancy and birth would be realized. 'About this time next year' is the clearest idiomatic rendering in modern English. A more literal rendering such as 'at this time of life' is obscure and potentially misleading in English.
- source_word: וּלְשָׂרָה בֵן
  chosen: and Sarah will have a son
  alternatives:
  - and a son will belong to Sarah
  - and Sarah shall have a son
  lexicon: HALOT
  rationale: The Hebrew is verbless in this final clause, but the sense is plainly predicative and future in context. 'Sarah will have a son' expresses the promised result naturally in English while preserving the meaning.
