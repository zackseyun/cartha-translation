theological_decisions:
- issue: Whether the visitors are described in a way that should foreground later
    theological interpretation of the scene
  chosen_reading: Translate the verse in ordinary narrative terms without importing
    a christological or trinitarian interpretation.
  alternative_readings:
  - Render attendance language more exaltedly to suggest divine status of the visitors
  rationale: The verse itself narrates Abraham's hospitality. Historic orthodoxy is
    preserved without loading the translation with theological conclusions not explicit
    in the Hebrew.
  doctrine_reference: Translation philosophy items 1 and 3
