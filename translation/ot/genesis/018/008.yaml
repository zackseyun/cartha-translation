id: GEN.18.8
reference: Genesis 18:8
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח חֶמְאָ֜ה וְ/חָלָ֗ב וּ/בֶן הַ/בָּקָר֙ אֲשֶׁ֣ר עָשָׂ֔ה וַ/יִּתֵּ֖ן
    לִ/פְנֵי/הֶ֑ם וְ/הֽוּא עֹמֵ֧ד עֲלֵי/הֶ֛ם תַּ֥חַת הָ/עֵ֖ץ וַ/יֹּאכֵֽלוּ־־׃
translation:
  text: Then he took curds and milk and the calf that he had prepared, and set it
    before them. He stood by them under the tree while they ate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'butter'; the Hebrew term refers to a thick dairy product and may denote
      curds, cream, or butter depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'stood over them.' The expression here likely means he stood
      nearby attending them as a host.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶמְאָה
  chosen: curds
  alternatives:
  - butter
  - cream
  lexicon: HALOT
  rationale: The term denotes a dairy product that in patriarchal pastoral context
    is better rendered 'curds' than modern table 'butter.' This fits the paired food
    items and common usage in similar contexts.
- source_word: חָלָב
  chosen: milk
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun for milk.
- source_word: וּבֶן הַבָּקָר
  chosen: the calf
  alternatives:
  - a young bull
  - the young animal from the herd
  lexicon: HALOT
  rationale: Literally 'son of the herd/cattle,' an idiom for a young bovine. 'The
    calf' is natural English and matches the specific animal prepared in the previous
    verse.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had prepared
  alternatives:
  - that he had made
  - that he had done
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' in food context 'prepared' best conveys
    the sense in idiomatic English without over-paraphrase.
- source_word: וַיִּתֵּן לִפְנֵיהֶם
  chosen: and set it before them
  alternatives:
  - and gave it to them
  - and placed it before them
  lexicon: HALOT
  rationale: The idiom 'gave before them' means to place food before guests. 'Set
    it before them' is natural and contextually precise.
- source_word: וְהוּא עֹמֵד עֲלֵיהֶם
  chosen: He stood by them
  alternatives:
  - he was standing over them
  - he stood beside them
  lexicon: HALOT
  rationale: The participial clause depicts Abraham attending his guests. 'By them'
    communicates service/attendance better than the potentially misleadingly dominant-sounding
    'over them,' while remaining faithful to the hospitality context.
- source_word: תַּחַת הָעֵץ
  chosen: under the tree
  alternatives:
  - beneath the tree
  lexicon: HALOT
  rationale: Direct and natural rendering of the prepositional phrase.
- source_word: וַיֹּאכֵלוּ
  chosen: while they ate
  alternatives:
  - and they ate
  lexicon: HALOT
  rationale: The waw-consecutive can be rendered simply 'and they ate,' but in English
    the temporal relation to Abraham's standing is clearer with 'while they ate,'
    which preserves the narrative sense.
