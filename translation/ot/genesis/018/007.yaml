id: GEN.18.7
reference: Genesis 18:7
source:
  edition: WLC
  text: וְ/אֶל הַ/בָּקָ֖ר רָ֣ץ אַבְרָהָ֑ם וַ/יִּקַּ֨ח בֶּן בָּקָ֜ר רַ֤ךְ וָ/טוֹב֙
    וַ/יִּתֵּ֣ן אֶל הַ/נַּ֔עַר וַ/יְמַהֵ֖ר לַ/עֲשׂ֥וֹת אֹתֽ/וֹ־־־׃
translation:
  text: And Abraham ran to the herd and took a tender and good calf and gave it to
    the young man, and he hurried to prepare it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the servant' or 'the boy' for 'the young man' (הַנַּעַר); the Hebrew
      term can denote a youth or a servant depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּקָר
  chosen: the herd
  alternatives:
  - the cattle
  - the oxen
  lexicon: HALOT
  rationale: בָּקָר here refers collectively to bovine livestock rather than a single
    animal. 'The herd' is natural modern English and fits the scene of Abraham going
    to select an animal.
- source_word: רָץ
  chosen: ran
  alternatives:
  - hurried
  lexicon: HALOT
  rationale: The verb straightforwardly denotes running. 'Ran' preserves the vividness
    and urgency of Abraham's hospitality.
- source_word: בֶּן־בָּקָר
  chosen: a calf
  alternatives:
  - a young bull
  - a head of cattle
  lexicon: HALOT
  rationale: The construct literally means 'son of cattle,' an idiom for a young bovine.
    In this hospitality and meal-preparation context, 'a calf' is the clearest idiomatic
    English rendering.
- source_word: רַךְ וָטוֹב
  chosen: tender and good
  alternatives:
  - tender and choice
  - tender and fine
  lexicon: HALOT
  rationale: רַךְ means 'tender,' and טוֹב here describes quality. 'Tender and good'
    stays close to the Hebrew while remaining readable; it conveys that the animal
    was suitable and of high quality.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the boy
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, or servant depending on context. Since the
    referent is someone tasked with preparing the calf, 'the young man' preserves
    the lexical sense without importing the more interpretive 'servant' into the main
    text.
- source_word: וַיְמַהֵר
  chosen: he hurried
  alternatives:
  - he hastened
  - he quickly
  lexicon: HALOT
  rationale: The verb denotes acting quickly. 'He hurried' is natural modern English
    and preserves the narrative emphasis on prompt hospitality.
- source_word: לַעֲשׂוֹת אֹתוֹ
  chosen: to prepare it
  alternatives:
  - to make it
  - to dress it
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' in food-preparation context it idiomatically
    means prepare. 'To prepare it' communicates the intended action clearly in English.
