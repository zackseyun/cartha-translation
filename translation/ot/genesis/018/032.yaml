theological_decisions:
- issue: Referent and capitalization of אֲדֹנָי in Abraham's address
  chosen_reading: my lord
  alternative_readings:
  - the Lord
  rationale: Although the broader narrative involves a divine appearance, this verse's address term itself is not the divine name YHWH. Rendering it 'my lord' preserves the Hebrew form of respectful direct address and avoids over-specifying capitalization where English convention could imply a stronger interpretive decision than the word alone requires.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; contested term guidance distinguishes YHWH from other lord-language.'
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/018/032.json
  category: awkward_english
  tier: 1
  from: Please do not let my lord be angry
  to: Please, my lord, do not be angry
  rationale: While grammatically possible, the phrase 'do not let my lord be angry' is a slightly stilted and indirect construction in English. A more natural and direct address, such as 'Please, my lord, do not be angry' or 'Please do not be angry, my lord,' would better reflect the direct plea in the Hebrew (אַל־נָא יִחַר לַאדֹנָי) and improve the flow of the dialogue.
