id: GEN.18.32
reference: Genesis 18:32
source:
  edition: WLC
  text: וַ֠/יֹּאמֶר אַל נָ֞א יִ֤חַר לַֽ/אדֹנָ/י֙ וַ/אֲדַבְּרָ֣ה אַךְ הַ/פַּ֔עַם אוּלַ֛י יִמָּצְא֥וּ/ן שָׁ֖ם עֲשָׂרָ֑ה וַ/יֹּ֨אמֶר֙ לֹ֣א אַשְׁחִ֔ית בַּ/עֲב֖וּר הָ/עֲשָׂרָֽה־־׃
translation:
  text: Then he said, “Please, my lord, do not be angry, and I will speak only this once more. Perhaps ten will be found there.” And he said, “I will not destroy it for the sake of the ten.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Please do not be angry, my lord, and let me speak just this once.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply says, “I will not destroy for the sake of the ten,” with the object understood from context.
    reason: lexical_alternative
  - marker: c
    text: Or 'Please do not let my lord be angry'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַל נָא יִחַר
  chosen: Please do not let ... be angry
  alternatives:
  - Please do not be angry
  - Let not ... burn with anger
  lexicon: HALOT
  rationale: The idiom with חרה expresses anger kindling/burning. 'Please do not let ... be angry' renders the polite plea naturally in modern English while preserving the emotional force. 'Please' reflects נָא.
- source_word: לַאדֹנָי
  chosen: my lord
  alternatives:
  - the Lord
  - my master
  lexicon: HALOT
  rationale: Here אֲדֹנָי/אדני in context is Abraham's respectful address to his interlocutor. The form can be read as a reverential title, but in this immediate dialogue 'my lord' best preserves the direct address and humility without importing the covenant name. Lowercase avoids confusion with the divine name YHWH, which is not used here.
- source_word: וַאֲדַבְּרָה
  chosen: and I will speak
  alternatives:
  - and let me speak
  - that I may speak
  lexicon: HALOT
  rationale: The cohortative expresses Abraham's request/intention to continue speaking. 'And I will speak' is a natural English equivalent in this plea context.
- source_word: אַךְ הַפַּעַם
  chosen: only this once more
  alternatives:
  - only this time
  - just this once
  lexicon: HALOT
  rationale: The phrase marks limitation to one final appeal. 'Only this once more' captures both the restrictive force of אַךְ and the temporal sense of הַפַּעַם in context.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Suppose
  - Maybe
  lexicon: HALOT
  rationale: אוּלַי introduces possibility rather than assumption. 'Perhaps' is the most straightforward rendering.
- source_word: יִמָּצְאוּן שָׁם
  chosen: will be found there
  alternatives:
  - are found there
  - can be found there
  lexicon: HALOT
  rationale: 'The Niphal of מצא is passive/reflexive in sense: ''be found.'' Future English fits the ongoing hypothetical negotiation.'
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal number rendered directly.
- source_word: לֹא אַשְׁחִית
  chosen: I will not destroy it
  alternatives:
  - I will not ruin it
  - I will not bring destruction
  lexicon: HALOT
  rationale: שׁחת in the Hiphil here means to destroy. The object 'it' is implicit from context, referring to the city/place under discussion, and is supplied for clear English.
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: The preposition indicates action taken on account of the ten righteous persons. 'For the sake of' best conveys the intercessory logic of the passage.
- source_word: הָעֲשָׂרָה
  chosen: the ten
  lexicon: HALOT
  rationale: 'The article is retained in English because the reference is now specific: the ten just mentioned.'
