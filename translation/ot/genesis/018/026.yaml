id: GEN.18.26
reference: Genesis 18:26
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה אִם אֶמְצָ֥א בִ/סְדֹ֛ם חֲמִשִּׁ֥ים צַדִּיקִ֖ם בְּ/ת֣וֹךְ הָ/עִ֑יר וְ/נָשָׂ֥אתִי לְ/כָל הַ/מָּק֖וֹם בַּ/עֲבוּרָֽ/ם־־׃
translation:
  text: And Yahweh said, “If I find fifty righteous people within the city of Sodom, then I will spare the whole place for their sake.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will forgive the whole place for their sake.' The Hebrew verb can carry the sense of bearing away guilt or withholding judgment; here 'spare' is used for clarity in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequencing is naturally rendered 'And ... said' in English narrative style.
- source_word: אִם אֶמְצָא
  chosen: If I find
  alternatives:
  - If I should find
  lexicon: HALOT
  rationale: This conditional construction introduces the LORD's response to Abraham; 'If I find' is clear, natural, and sufficiently formal.
- source_word: בִסְדֹם
  chosen: in/within the city of Sodom
  alternatives:
  - in Sodom
  lexicon: HALOT
  rationale: Because the verse later specifies 'within the city,' the English brings Sodom into apposition as 'the city of Sodom' for clarity without altering sense.
- source_word: חֲמִשִּׁים צַדִּיקִם
  chosen: fifty righteous people
  alternatives:
  - fifty righteous ones
  - fifty righteous men
  lexicon: HALOT
  rationale: צַדִּיקִם denotes righteous persons. 'People' avoids implying specifically male individuals where the Hebrew plural adjective/noun can be collective for persons generally.
- source_word: בְּתוֹךְ הָעִיר
  chosen: within the city
  alternatives:
  - in the midst of the city
  - inside the city
  lexicon: HALOT
  rationale: בְּתוֹךְ conveys location in the midst/interior. 'Within the city' is idiomatic modern English and preserves the spatial sense.
- source_word: וְנָשָׂאתִי
  chosen: I will spare
  alternatives:
  - I will forgive
  - I will bear away
  - I will pardon
  lexicon: HALOT
  rationale: The verb נָשָׂא literally means 'lift/carry/bear,' but in this context with לְכָל הַמָּקוֹם and בַּעֲבוּרָם it idiomatically expresses withholding judgment or pardoning. 'Spare' best captures the contextual force in natural English.
- source_word: לְכָל הַמָּקוֹם
  chosen: the whole place
  alternatives:
  - all the place
  - the entire place
  - the whole area
  lexicon: HALOT
  rationale: מָקוֹם here refers to the locale under judgment, not merely a spot. 'The whole place' is a natural rendering that preserves the collective scope.
- source_word: בַּעֲבוּרָם
  chosen: for their sake
  alternatives:
  - on account of them
  - because of them
  lexicon: HALOT
  rationale: This prepositional expression indicates benefit or consideration on behalf of the righteous. 'For their sake' is the most idiomatic and contextually precise English rendering.
