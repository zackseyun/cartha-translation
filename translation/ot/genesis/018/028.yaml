id: GEN.18.28
reference: Genesis 18:28
source:
  edition: WLC
  text: א֠וּלַי יַחְסְר֞וּ/ן חֲמִשִּׁ֤ים הַ/צַּדִּיקִם֙ חֲמִשָּׁ֔ה הֲ/תַשְׁחִ֥ית בַּ/חֲמִשָּׁ֖ה אֶת כָּל הָ/עִ֑יר וַ/יֹּ֨אמֶר֙ לֹ֣א אַשְׁחִ֔ית אִם אֶמְצָ֣א שָׁ֔ם אַרְבָּעִ֖ים וַ/חֲמִשָּֽׁה־־־׃
translation:
  text: Suppose the fifty righteous are lacking five—will you destroy the whole city for five? And he said, “I will not destroy it if I find forty-five there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What if five of the fifty righteous are missing?”
    reason: lexical_alternative
  - marker: b
    text: Or “will you sweep away the whole city because of five?”
    reason: lexical_alternative
  - marker: c
    text: Or 'five of the fifty righteous are lacking'.
    reason: previous_rendering
lexical_decisions:
- source_word: אוּלַי
  chosen: Suppose
  alternatives:
  - Perhaps
  - What if
  lexicon: HALOT
  rationale: Introduces Abraham’s hypothetical plea. 'Suppose' fits natural English in a negotiated question better than the more tentative 'perhaps,' while preserving the conditional sense.
- source_word: יַחְסְרוּן
  chosen: are lacking
  alternatives:
  - are missing
  - fall short by
  lexicon: HALOT
  rationale: From חסר, 'to lack/be lacking.' The passive-like English 'are lacking' best conveys that the number of righteous falls short by five without overparaphrasing.
- source_word: חֲמִשִּׁים הַצַּדִּיקִם
  chosen: the fifty righteous
  alternatives:
  - fifty righteous people
  - the fifty righteous ones
  lexicon: HALOT
  rationale: Keeps the definite, counted group in view from the prior context. 'Righteous' is the standard rendering of צַדִּיקִים and preserves the moral/judicial sense.
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: Straightforward cardinal number; repeated for emphasis as in the Hebrew.
- source_word: הֲתַשְׁחִית
  chosen: will you destroy
  alternatives:
  - would you destroy
  - will you sweep away
  lexicon: HALOT
  rationale: From שׁחת in the Hiphil, 'destroy/ruin.' 'Will you destroy' matches the direct question and aligns with the divine reply using the same verb. 'Sweep away' is possible in broader context but less exact here.
- source_word: בַּחֲמִשָּׁה
  chosen: for five
  alternatives:
  - because of five
  - on account of five
  lexicon: HALOT
  rationale: 'The preposition ב here expresses cause or account: destruction of the city on account of the shortfall of five. ''For five'' is concise and idiomatic in this rhetorical question.'
- source_word: אֶת כָּל הָעִיר
  chosen: the whole city
  alternatives:
  - all the city
  - the entire city
  lexicon: HALOT
  rationale: Natural English equivalent of 'all the city,' preserving the totality in view.
- source_word: לֹא אַשְׁחִית
  chosen: I will not destroy it
  alternatives:
  - I will not destroy
  - I will not ruin it
  lexicon: HALOT
  rationale: English requires an object for clarity; 'it' refers back to the city. This preserves the verbal repetition with תַשְׁחִית/אַשְׁחִית.
- source_word: אִם אֶמְצָא שָׁם
  chosen: if I find there
  alternatives:
  - if I find there in it
  - if I find there
  lexicon: HALOT
  rationale: Retains the conditional structure and the adverb 'there,' referring to the city. In the final English sentence, word order is smoothed to 'if I find forty-five there.'
- source_word: אַרְבָּעִים וַחֲמִשָּׁה
  chosen: forty-five
  alternatives:
  - forty and five
  lexicon: HALOT
  rationale: Modern English compounds the number; this is an idiomatic equivalent of the Hebrew coordination.
