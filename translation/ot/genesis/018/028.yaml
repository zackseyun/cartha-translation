theological_decisions:
- issue: Rendering צַדִּיקִים
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: '''Righteous'' best preserves the covenantal and moral weight of the Hebrew term in this intercessory context. ''Just'' is possible but can sound narrower or more forensic in contemporary English.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/018/028.json
  category: awkward_english
  tier: 1
  from: five of the fifty righteous are lacking
  to: the fifty righteous are lacking five
  rationale: The current phrasing makes 'five' the subject, which could be misread as five specific people being absent from a group of fifty. The Hebrew syntax (`יַחְסְרוּן חֲמִשִּׁים הַצַּדִּיקִם חֲמִשָּׁה`) has 'the fifty righteous' as the subject, indicating that the required number (50) is deficient by an amount (5). The suggested rewrite restores this subject-verb relationship, clarifying that the total number of righteous people is 45.
