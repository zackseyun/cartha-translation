theological_decisions:
- issue: Whether ידע in this verse should be rendered with elective force ('chosen')
    or relational cognition ('known')
  chosen_reading: I have known him
  alternative_readings:
  - I have chosen him
  rationale: The context certainly includes divine favor and purpose, but the lexical
    form itself is 'know.' Rendering it as 'chosen' risks resolving an interpretive/theological
    implication in the main text rather than translating the word directly. The alternative
    is preserved in a footnote because it is a longstanding and contextually plausible
    interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  rationale: The doctrine table specifies 'the LORD' as the default rendering for
    YHWH, while preserving alternatives only where useful.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
