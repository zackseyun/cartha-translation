id: GEN.18.19
reference: Genesis 18:19
source:
  edition: WLC
  text: כִּ֣י יְדַעְתִּ֗י/ו לְמַעַן֩ אֲשֶׁ֨ר יְצַוֶּ֜ה אֶת בָּנָ֤י/ו וְ/אֶת בֵּית/וֹ֙
    אַחֲרָ֔י/ו וְ/שָֽׁמְרוּ֙ דֶּ֣רֶךְ יְהוָ֔ה לַ/עֲשׂ֥וֹת צְדָקָ֖ה וּ/מִשְׁפָּ֑ט לְמַ֗עַן
    הָבִ֤יא יְהוָה֙ עַל אַבְרָהָ֔ם אֵ֥ת אֲשֶׁר דִּבֶּ֖ר עָלָֽי/ו־־־־׃
translation:
  text: For I have known him, so that he may command his sons and his household after
    him, and they may keep the way of the LORD by doing righteousness and justice,
    so that the LORD may bring upon Abraham what he has spoken concerning him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For I have chosen him.' The Hebrew verb ordinarily means 'know,' but
      in context it can carry the sense of special regard or choice.
    reason: alternative_reading
  - marker: b
    text: '''His sons'' is masculine in Hebrew; the phrase refers first to Abraham''s
      male descendants, though ''his household'' broadens the scope beyond sons alone.'
    reason: lexical_alternative
  - marker: c
    text: That is, the LORD's required manner of life.
    reason: cultural_note
  - marker: d
    text: Or, 'what he has promised him.' The Hebrew more literally says, 'what he
      has spoken concerning him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'For' preserves the
    explanatory force in natural English.
- source_word: יְדַעְתִּיו
  chosen: I have known him
  alternatives:
  - I have chosen him
  - I know him
  lexicon: HALOT
  rationale: The Hebrew verb ידע normally means 'know.' In context it can imply relational
    knowledge with elective overtones, leading some versions to render 'chosen.' To
    avoid importing a stronger theological interpretation than the lexical form itself
    requires, the main text keeps 'have known him,' while the alternative is preserved
    in a footnote.
- source_word: לְמַעַן אֲשֶׁר
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Expresses purpose/result. 'So that' is idiomatic modern English and preserves
    the purposive sense.
- source_word: יְצַוֶּה
  chosen: he may command
  alternatives:
  - he may instruct
  - he may direct
  lexicon: HALOT
  rationale: The piel of צוה commonly means 'command, charge.' 'Command' best preserves
    the strength of the verb.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The source is explicitly masculine plural, not a gender-neutral term.
    Per translation philosophy, gender-accurate rendering is preferred; 'sons' is
    therefore retained.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  lexicon: HALOT
  rationale: In this context בית refers to the members of Abraham's domestic sphere,
    not merely the physical structure. 'Household' communicates the social/familial
    sense.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - following him
  lexicon: HALOT
  rationale: A straightforward temporal/relational expression indicating succession
    under Abraham's example and authority.
- source_word: וְשָׁמְרוּ
  chosen: they may keep
  alternatives:
  - they may observe
  - they may guard
  lexicon: HALOT
  rationale: שׁמר with 'way' commonly means to keep/observe in the sense of faithful
    adherence. 'Keep' is concise and idiomatic.
- source_word: דֶּרֶךְ יְהוָה
  chosen: the way of the LORD
  alternatives:
  - the path of the LORD
  lexicon: HALOT
  rationale: A covenantal-ethical expression for the manner of life the LORD requires.
    'Way' is the standard and most natural rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: לַעֲשׂוֹת
  chosen: by doing
  alternatives:
  - to do
  lexicon: HALOT
  rationale: The infinitive explains how they keep the LORD's way. 'By doing' makes
    the instrumental nuance clear in English.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: In this pairing with משפט, צדקה often denotes uprightness/righteousness
    while משפט denotes justice/judgment. Rendering the pair as 'righteousness and
    justice' preserves both terms distinctly.
- source_word: וּמִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In ethical contexts משפט commonly refers to justice. 'Judgment' is possible
    but less natural here.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Marks the purpose/result of Abraham's ordered household obedience in
    relation to the fulfillment of the promise.
- source_word: הָבִיא יְהוָה עַל אַבְרָהָם
  chosen: the LORD may bring upon Abraham
  alternatives:
  - the LORD may bring to Abraham
  lexicon: HALOT
  rationale: The idiom with בוא + על can mean to bring upon someone, i.e., cause to
    come to pass for him. 'Upon Abraham' is slightly formal but preserves the Hebrew
    construction.
- source_word: אֵת אֲשֶׁר דִּבֶּר עָלָיו
  chosen: what he has spoken concerning him
  alternatives:
  - what he has promised him
  - what he has spoken about him
  lexicon: HALOT
  rationale: The Hebrew says 'spoken concerning him.' Since the content is promissory,
    'promised him' is interpretive and smoother, but the main text stays closer to
    the wording. The promissory nuance is contextually evident without being imported
    into the translation.
