id: GEN.18.1
reference: Genesis 18:1
source:
  edition: WLC
  text: וַ/יֵּרָ֤א אֵלָי/ו֙ יְהוָ֔ה בְּ/אֵלֹנֵ֖י מַמְרֵ֑א וְ/ה֛וּא יֹשֵׁ֥ב פֶּֽתַח הָ/אֹ֖הֶל כְּ/חֹ֥ם הַ/יּֽוֹם־׃
translation:
  text: And Yahweh appeared to him by the oaks of Mamre, while he was sitting at the entrance of the tent in the heat of the day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the terebinths of Mamre.' The Hebrew term may refer to large trees such as oaks or terebinths.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: 'The Niphal of ראה here denotes visible manifestation: ''appeared'' is the natural English rendering in narrative context. ''Revealed himself'' is possible interpretively, but ''appeared'' stays closer to the Hebrew and preserves the concrete sense.'
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Directly renders the preposition plus 3ms suffix, referring back to Abraham in the narrative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאֵלֹנֵי
  chosen: by the oaks of
  alternatives:
  - among the terebinths of
  - by the terebinths of
  lexicon: HALOT
  rationale: אֵלֹנֵי can denote large trees, often understood as terebinths or oaks. 'Oaks' is clear modern English and traditional in this place name expression. The exact species is not certain enough to force a more technical rendering in the main text.
- source_word: מַמְרֵא
  chosen: Mamre
  lexicon: HALOT
  rationale: Proper name, transliterated according to the translation philosophy.
- source_word: וְהוּא יֹשֵׁב
  chosen: while he was sitting
  alternatives:
  - and he was sitting
  - as he sat
  lexicon: HALOT
  rationale: The clause gives attendant circumstance/background to the appearance. 'While he was sitting' communicates the Hebrew participial scene-setting naturally in English.
- source_word: פֶּתַח הָאֹהֶל
  chosen: at the entrance of the tent
  alternatives:
  - in the doorway of the tent
  - at the opening of the tent
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance of the tent' is idiomatic and suitably concrete.
- source_word: כְּחֹם הַיּוֹם
  chosen: in the heat of the day
  alternatives:
  - at the heat of the day
  - during the hottest part of the day
  lexicon: HALOT
  rationale: This idiom refers to the day's heat, likely midday or early afternoon. 'In the heat of the day' is both faithful and natural, without over-interpreting the exact hour.
