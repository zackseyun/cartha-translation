theological_decisions:
- issue: Rendering אֲדֹנָי in Abraham's address
  chosen_reading: my Lord
  alternative_readings:
  - my lord
  rationale: Although the Hebrew form itself can function as a respectful human address,
    the immediate literary context presents Abraham speaking to the divine visitor
    associated with the LORD. Capitalizing 'Lord' reflects that contextual identification
    without replacing the actual word with the covenant name.
  doctrine_reference: 'Contested terms: κύριος/Kyrios → Lord; translation philosophy:
    preserve source meaning and theological tension where present'
