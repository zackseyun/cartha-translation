id: GEN.18.5
reference: Genesis 18:5
source:
  edition: WLC
  text: וְ/אֶקְחָ֨ה פַת לֶ֜חֶם וְ/סַעֲד֤וּ לִבְּ/כֶם֙ אַחַ֣ר תַּעֲבֹ֔רוּ כִּֽי עַל
    כֵּ֥ן עֲבַרְתֶּ֖ם עַֽל עַבְדְּ/כֶ֑ם וַ/יֹּ֣אמְר֔וּ כֵּ֥ן תַּעֲשֶׂ֖ה כַּ/אֲשֶׁ֥ר
    דִּבַּֽרְתָּ־־־־׃
translation:
  text: And let me bring a piece of bread, so that you may refresh your hearts; after
    that you may pass on, since this is why you have come by your servant. And they
    said, “Yes, do as you have said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a morsel of bread.' The Hebrew phrase פַת לֶחֶם is a modest expression
      in a hospitality setting.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'sustain/strengthen your heart.' The Hebrew idiom refers to being
      refreshed with food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶקְחָה
  chosen: And let me bring
  alternatives:
  - and I will take
  - and let me get
  lexicon: HALOT
  rationale: Qal cohortative 1cs of לקח expresses Abraham’s polite self-offer/request
    rather than a simple future. 'Let me bring' captures the volitional nuance in
    natural English.
- source_word: פַת לֶחֶם
  chosen: a piece of bread
  alternatives:
  - a morsel of bread
  - a bit of bread
  lexicon: HALOT
  rationale: The phrase denotes a small portion or morsel of bread. 'Piece of bread'
    is clear modern English while preserving Abraham’s modest, hospitable understatement.
- source_word: וְסַעֲדוּ לִבְּכֶם
  chosen: so that you may refresh your hearts
  alternatives:
  - and sustain your hearts
  - and strengthen your hearts
  lexicon: HALOT
  rationale: The idiom literally involves supporting/sustaining the heart, meaning
    to refresh or strengthen oneself with food. 'Refresh your hearts' preserves the
    Hebrew imagery better than a flattened paraphrase while remaining readable.
- source_word: אַחַר תַּעֲבֹרוּ
  chosen: after that you may pass on
  alternatives:
  - afterward you may go on
  - then you may pass by
  lexicon: HALOT
  rationale: עבר here refers to continuing one's journey. 'Pass on' fits the travel
    context better than the more spatially literal 'pass by' at this point in the
    sentence.
- source_word: כִּי עַל כֵּן
  chosen: since this is why
  alternatives:
  - for therefore
  - because for this reason
  lexicon: HALOT
  rationale: The combination gives the reason for Abraham’s offer. 'Since this is
    why' communicates the explanatory force idiomatically without wooden literalism.
- source_word: עֲבַרְתֶּם עַל עַבְדְּכֶם
  chosen: you have come by your servant
  alternatives:
  - you have passed by your servant
  - you have come to your servant
  lexicon: HALOT
  rationale: The idiom refers to the visitors’ coming by Abraham’s location. 'Your
    servant' reflects Abraham’s self-humbling address. 'Come by' is natural English
    and matches the hospitality setting.
- source_word: עַבְדְּכֶם
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a deferential self-reference
    in hospitality speech, not a statement about bonded status. 'Your servant' best
    matches the social register.
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol advancing the scene. 'And they said' preserves
    the Hebrew narrative flow.
- source_word: כֵּן תַּעֲשֶׂה
  chosen: Yes, do
  alternatives:
  - So do
  - Do so
  lexicon: HALOT
  rationale: The response is concise assent. 'Yes, do' makes the affirmative force
    explicit in idiomatic English.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  chosen: as you have said
  alternatives:
  - as you said
  - just as you have spoken
  lexicon: HALOT
  rationale: This confirms Abraham’s proposal. Present perfect in English fits the
    completed speech just uttered.
