theological_decisions:
- issue: Rendering אֲדֹנָי in Abraham's address
  chosen_reading: my Lord
  alternative_readings:
  - my lord
  rationale: Because the speaker is addressing the divine interlocutor in this theophanic
    context, the reverential capitalization 'Lord' best reflects the referent in English.
    This aligns with the project's default rendering of divine titles while avoiding
    importation of the covenant name, which is not used here.
  doctrine_reference: 'Contested terms: κύριος/Kyrios → Lord; translation philosophy
    on translating titles'
