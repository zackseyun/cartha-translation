id: GEN.18.30
reference: Genesis 18:30
source:
  edition: WLC
  text: וַ֠/יֹּאמֶר אַל נָ֞א יִ֤חַר לַֽ/אדֹנָ/י֙ וַ/אֲדַבֵּ֔רָה אוּלַ֛י יִמָּצְא֥וּ/ן
    שָׁ֖ם שְׁלֹשִׁ֑ים וַ/יֹּ֨אמֶר֙ לֹ֣א אֶֽעֱשֶׂ֔ה אִם אֶמְצָ֥א שָׁ֖ם שְׁלֹשִֽׁים־־׃
translation:
  text: Then he said, “Please, let not my Lord be angry, and I will speak. Perhaps
    thirty will be found there.” And he said, “I will not do it if I find thirty there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lord.' The Hebrew title can be read as a respectful address; here
      it is capitalized because the addressee is understood to be the Lord in context.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל נָא יִחַר
  chosen: Please, let not ... be angry
  alternatives:
  - please do not be angry
  - do not be angry, please
  lexicon: HALOT
  rationale: The sequence combines the negative particle אַל, the politeness particle
    נָא, and the verb חרה ('to burn/be kindled') idiomatically for anger. 'Please,
    let not ... be angry' preserves both the plea and the idiom's sense in natural
    English.
- source_word: לַאדֹנָי
  chosen: my Lord
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: The form is 'to my lord/Lord' with 1cs suffix. In this context Abraham
    addresses the divine visitor, so 'my Lord' appropriately reflects reverential
    address. Capitalization signals divine address in English, while preserving the
    Hebrew title rather than a proper name.
- source_word: וַאֲדַבֵּרָה
  chosen: and I will speak
  alternatives:
  - and let me speak
  - and I would speak
  lexicon: HALOT
  rationale: The cohortative expresses Abraham's deferential intention/request to
    continue speaking. 'And I will speak' is a natural English rendering that keeps
    the forward-looking force without over-paraphrasing.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - maybe
  - suppose
  lexicon: HALOT
  rationale: '''Perhaps'' best matches the tentative, respectful tone of Abraham''s
    intercession.'
- source_word: יִמָּצְאוּן
  chosen: will be found
  alternatives:
  - are found
  - can be found
  lexicon: HALOT
  rationale: The Niphal of מצא is passive/reflexive in sense here. 'Will be found'
    fits the hypothetical future condition Abraham proposes.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the most natural equivalent.
- source_word: שְׁלֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Cardinal number, straightforwardly rendered 'thirty.'
- source_word: לֹא אֶעֱשֶׂה
  chosen: I will not do it
  alternatives:
  - I will not act
  - I will not do so
  lexicon: HALOT
  rationale: 'The object is implicit from context: not destroying the city. English
    normally supplies ''it'' to avoid awkwardness while preserving the concise Hebrew
    response.'
- source_word: אִם אֶמְצָא
  chosen: if I find
  alternatives:
  - if I should find
  - should I find
  lexicon: HALOT
  rationale: Standard conditional construction. 'If I find' is clear and direct in
    modern English.
