theological_decisions:
- issue: Rendering Abraham's rhetorical challenge to God's character
  chosen_reading: Shall the Judge of all the earth not do justice?
  alternative_readings:
  - Will not the Judge of all the earth do what is just?
  - Shall not the judge of all the earth execute judgment?
  rationale: The Hebrew expects an affirmative answer and appeals to God's just character
    without softening Abraham's boldness. 'Do justice' preserves both the rhetorical
    force and the judicial-ethical emphasis of מִשְׁפָּט.
  doctrine_reference: Translation philosophy §3, §6
