id: GEN.18.25
reference: Genesis 18:25
source:
  edition: WLC
  text: חָלִ֨לָ/ה לְּ/ךָ֜ מֵ/עֲשֹׂ֣ת כַּ/דָּבָ֣ר הַ/זֶּ֗ה לְ/הָמִ֤ית צַדִּיק֙ עִם
    רָשָׁ֔ע וְ/הָיָ֥ה כַ/צַּדִּ֖יק כָּ/רָשָׁ֑ע חָלִ֣לָ/ה לָּ֔/ךְ הֲ/שֹׁפֵט֙ כָּל הָ/אָ֔רֶץ
    לֹ֥א יַעֲשֶׂ֖ה מִשְׁפָּֽט׀־־׃
translation:
  text: Far be it from you to do such a thing—to put the righteous to death with the
    wicked, so that the righteous would be like the wicked. Far be it from you! Shall
    the Judge of all the earth not do justice?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Shall the Judge of all the earth not do what is just?'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה
  chosen: Far be it from you
  alternatives:
  - Profane thing for you
  - Be it unthinkable for you
  - Never from you
  lexicon: HALOT
  rationale: An idiomatic interjection expressing strong repudiation or abhorrence.
    'Far be it from you' is natural modern English and preserves the force better
    than a wooden rendering.
- source_word: מֵעֲשׂוֹת כַּדָּבָר הַזֶּה
  chosen: to do such a thing
  alternatives:
  - from doing this thing
  - to do this kind of thing
  lexicon: HALOT
  rationale: The preposition with infinitive gives the sense 'from doing'; in English,
    'to do such a thing' best captures the idiomatic force after חָלִילָה.
- source_word: לְהָמִית
  chosen: to put ... to death
  alternatives:
  - to kill
  - to slay
  lexicon: HALOT
  rationale: Hiphil of מות is causative. 'Put to death' reflects the causative nuance
    more clearly than the simpler 'kill'.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the innocent
  - a righteous person
  - the just
  lexicon: HALOT
  rationale: In this judicial context, 'the righteous' preserves the moral-forensic
    sense and matches the contrast with 'the wicked.'
- source_word: עִם רָשָׁע
  chosen: with the wicked
  alternatives:
  - along with the wicked
  - with a wicked person
  lexicon: HALOT
  rationale: Though singular in Hebrew, it is representative/generic. English plural
    'the wicked' communicates the class contrast naturally.
- source_word: וְהָיָה כַצַּדִּיק כָּרָשָׁע
  chosen: so that the righteous would be like the wicked
  alternatives:
  - and the righteous would become like the wicked
  - with the result that the righteous is as the wicked
  lexicon: HALOT
  rationale: This clause states the intolerable result of the action. 'Would be like'
    is clear and idiomatic, preserving the comparison introduced by כ.
- source_word: הֲשֹׁפֵט כָּל הָאָרֶץ
  chosen: the Judge of all the earth
  alternatives:
  - the one judging all the earth
  - the judge of the whole land/earth
  lexicon: HALOT
  rationale: Used substantivally as a title for God. 'Judge of all the earth' is the
    most natural English rendering and preserves the universal scope of כָּל הָאָרֶץ.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - what is just
  - judgment
  lexicon: HALOT
  rationale: In the rhetorical question, the sense is not merely performing a judicial
    act but acting justly. 'Do justice' is idiomatic English and captures the ethical-judicial
    force.
