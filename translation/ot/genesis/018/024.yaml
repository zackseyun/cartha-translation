theological_decisions:
- issue: Meaning of נשא in the clause 'and not spare the place'
  chosen_reading: Render as 'spare' in the context of withholding judgment on the
    city because of the righteous.
  alternative_readings:
  - forgive the place
  - bear away the guilt of the place
  rationale: The immediate contrast is between destroying the city and refraining
    from that destruction on account of the righteous. 'Spare' best captures the judicial
    and narrative sense without importing a narrower doctrine of forgiveness.
  doctrine_reference: Translation philosophy §1, §3, §6
