id: GEN.18.24
reference: Genesis 18:24
source:
  edition: WLC
  text: אוּלַ֥י יֵ֛שׁ חֲמִשִּׁ֥ים צַדִּיקִ֖ם בְּ/ת֣וֹךְ הָ/עִ֑יר הַ/אַ֤ף תִּסְפֶּה֙
    וְ/לֹא תִשָּׂ֣א לַ/מָּק֔וֹם לְמַ֛עַן חֲמִשִּׁ֥ים הַ/צַּדִּיקִ֖ם אֲשֶׁ֥ר בְּ/קִרְבָּֽ/הּ־׃
translation:
  text: Suppose there are fifty righteous people within the city. Will you indeed
    sweep it away and not spare the place for the sake of the fifty righteous who
    are within it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Perhaps there are fifty righteous people within the city.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Will you really sweep it away and not forgive the place because of the
      fifty righteous who are within it?'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  chosen: Suppose
  alternatives:
  - Perhaps
  - What if
  lexicon: HALOT
  rationale: Introduces Abraham's hypothetical appeal. 'Suppose' reads naturally in
    English while preserving the tentative, conditional force better than a bare adverb
    like 'perhaps' in this context.
- source_word: יֵשׁ
  chosen: there are
  alternatives:
  - there exist
  - there may be
  lexicon: HALOT
  rationale: Idiomatic existential construction in English. Combined with אוּלַי,
    it yields a natural hypothetical statement.
- source_word: חֲמִשִּׁים צַדִּיקִם
  chosen: fifty righteous people
  alternatives:
  - fifty righteous ones
  - fifty righteous men
  lexicon: HALOT
  rationale: צַדִּיקִים denotes righteous persons generally, not specifically males.
    'People' is gender-accurate to the referent and natural in English.
- source_word: בְּתוֹךְ הָעִיר
  chosen: within the city
  alternatives:
  - in the midst of the city
  - inside the city
  lexicon: HALOT
  rationale: Conveys interior location clearly and idiomatically; 'within' preserves
    the sense of being inside the city's bounds.
- source_word: הַאַף
  chosen: indeed
  alternatives:
  - really
  - actually
  - then
  lexicon: HALOT
  rationale: Marks the rhetorical intensification of the question. Rendering it with
    'indeed' preserves the emphatic force without overtranslating.
- source_word: תִּסְפֶּה
  chosen: sweep it away
  alternatives:
  - consume it
  - destroy it utterly
  lexicon: HALOT
  rationale: The verb ספָה in this context carries the sense of sweeping away in judgment.
    'Sweep it away' is vivid and idiomatic, and anticipates the contrast with sparing.
- source_word: וְלֹא תִשָּׂא לַמָּקוֹם
  chosen: and not spare the place
  alternatives:
  - and not forgive the place
  - and not bear with the place
  lexicon: HALOT
  rationale: נשא with 'place' here means to spare/pardon on account of others. 'Spare
    the place' best fits the context of averting destruction of the city.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: Expresses the motivating basis for sparing the city because of the righteous
    within it.
- source_word: אֲשֶׁר בְּקִרְבָּהּ
  chosen: who are within it
  alternatives:
  - who are in its midst
  - who are inside it
  lexicon: HALOT
  rationale: Refers back to the righteous persons located in the city. 'Within it'
    avoids awkward repetition while preserving the locative sense.
