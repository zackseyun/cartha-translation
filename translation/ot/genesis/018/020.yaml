id: GEN.18.20
reference: Genesis 18:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה זַעֲקַ֛ת סְדֹ֥ם וַ/עֲמֹרָ֖ה כִּי רָ֑בָּה וְ/חַ֨טָּאתָ֔/ם
    כִּ֥י כָבְדָ֖ה מְאֹֽד־׃
translation:
  text: Then the LORD said, “The outcry against Sodom and Gomorrah is great, and their
    sin is very severe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The outcry of Sodom and Gomorrah is great.” The Hebrew may be rendered
      more literally this way; the main text makes explicit that the outcry is directed
      against them.
    reason: lexical_alternative
  - marker: b
    text: Or “their sin is very grave.” The Hebrew literally says it “is very heavy,”
      an idiom for great seriousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and ... said' is more formally
    literal but less idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential pattern reflected
    in the LXX's Kyrios.
- source_word: זַעֲקַת
  chosen: the outcry against
  alternatives:
  - the cry of
  - the outcry of
  lexicon: HALOT
  rationale: זַעֲקָה denotes an outcry or cry, often arising from grave wrongdoing
    or oppression. In context, the sense is not merely that Sodom and Gomorrah are
    crying out, but that an outcry has arisen concerning them; 'against' makes that
    implicit object clear in idiomatic English.
- source_word: סְדֹם וַעֲמֹרָה
  chosen: Sodom and Gomorrah
  lexicon: HALOT
  rationale: Standard English transliterations of the place names.
- source_word: כִּי רָבָּה
  chosen: is great
  alternatives:
  - is many
  - is abundant
  - is grievous
  lexicon: HALOT
  rationale: The feminine singular predicate agrees with זַעֲקַת. 'Great' is the most
    natural English rendering here for the magnitude of the outcry.
- source_word: וְחַטָּאתָם
  chosen: and their sin
  alternatives:
  - and their offense
  - and their guilt
  lexicon: HALOT
  rationale: חַטָּאת commonly means 'sin' in this context. Singular with plural suffix
    is well represented by 'their sin,' functioning collectively for the people's
    wrongdoing.
- source_word: כִּי כָבְדָה מְאֹד
  chosen: is very severe
  alternatives:
  - is very grave
  - is exceedingly heavy
  - is very grievous
  lexicon: HALOT
  rationale: כבד literally conveys heaviness, and in moral/judicial contexts denotes
    seriousness or gravity. 'Very severe' communicates the sense clearly in modern
    English; 'very grave' is also strong but slightly less accessible.
