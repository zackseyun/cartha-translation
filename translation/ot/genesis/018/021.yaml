  from: they have done altogether according to
  to: they have acted completely according to
  rationale: The phrase 'done altogether according to' is slightly wooden. While 'altogether'
    is a valid translation of the Hebrew 'kalah' (completion), 'completely' is a more
    common and natural-sounding adverb in this context. Additionally, 'acted' is a
    strong alternative to 'done' that pairs well with 'according to', improving the
    overall flow of this complex clause.
