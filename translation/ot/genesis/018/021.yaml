id: GEN.18.21
reference: Genesis 18:21
source:
  edition: WLC
  text: אֵֽרֲדָה נָּ֣א וְ/אֶרְאֶ֔ה הַ/כְּ/צַעֲקָתָ֛/הּ הַ/בָּ֥אָה אֵלַ֖/י עָשׂ֣וּ
    כָּלָ֑ה וְ/אִם לֹ֖א אֵדָֽעָה־׀־׃
translation:
  text: I will go down now and see whether they have done altogether according to
    its outcry that has come to me; and if not, I will know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether they have done completely according to the outcry that has come
      to me.' The Hebrew idiom with 'done' and 'completion' expresses whether the
      reported wickedness fully matches the outcry.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have done altogether according to'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֵרֲדָה
  chosen: I will go down
  alternatives:
  - Let me go down
  - I shall go down
  lexicon: HALOT
  rationale: Qal cohortative 1cs of ירד expresses the speaker's resolve/intention.
    In English, 'I will go down' best captures the volitional force in natural modern
    style without over-paraphrasing.
- source_word: נָּא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: Here נָא softens or marks immediacy with a cohortative rather than making
    a polite request to another party. 'Now' fits the discourse better than 'please'
    in English.
- source_word: וְאֶרְאֶה
  chosen: and see
  alternatives:
  - and inspect
  - and look
  lexicon: HALOT
  rationale: ראה in this context means to examine or ascertain. 'See' preserves the
    idiomatic Hebrew while remaining clear in English.
- source_word: הַכְּצַעֲקָתָהּ
  chosen: its outcry
  alternatives:
  - the outcry against it
  - its cry
  lexicon: HALOT
  rationale: The noun צעקה denotes an outcry, often a cry arising from grave injustice.
    The 3fs suffix refers to the city/region under discussion. 'Its outcry' is concise
    and preserves the Hebrew construction; the adversative sense ('against it') is
    contextually possible but not explicit in the suffix itself.
- source_word: הַבָּאָה אֵלַי
  chosen: that has come to me
  alternatives:
  - which has come to me
  lexicon: HALOT
  rationale: The participial phrase modifies 'outcry' and is naturally rendered as
    a relative clause in English.
- source_word: עָשׂוּ כָּלָה
  chosen: they have done altogether according to
  alternatives:
  - they have done completely according to
  - they have fully done according to it
  - it is complete
  lexicon: HALOT
  rationale: The idiom is difficult. With עשׂו plus כָּלָה, the sense is that the
    reported deeds match the outcry in full. 'They have done altogether according
    to' preserves the comparison without importing too much interpretation. The subject
    is an indefinite 'they,' reflecting the Hebrew plural verb.
- source_word: וְאִם לֹא
  chosen: and if not
  alternatives:
  - but if not
  lexicon: HALOT
  rationale: A straightforward conditional contrast. 'And if not' follows the Hebrew
    conjunction closely while reading naturally.
- source_word: אֵדָעָה
  chosen: I will know
  alternatives:
  - I shall know
  - I will find out
  lexicon: HALOT
  rationale: ידע here means to know/ascertain. 'I will know' keeps the Hebrew wording;
    'find out' is interpretive and less formal.
