theological_decisions:
- issue: Anthropomorphic divine investigation
  chosen_reading: Retain the language of God 'going down' and 'seeing' without paraphrasing
    it into mere omniscient awareness.
  alternative_readings:
  - Paraphrase as 'I will examine/judge' to avoid anthropomorphism
  rationale: The Hebrew presents God in accommodated human terms. Per translation
    philosophy, theological tension should be preserved rather than resolved. The
    wording should not flatten the narrative's anthropomorphic expression into a doctrinal
    explanation.
  doctrine_reference: Translation philosophy §3
