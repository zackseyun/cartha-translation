id: GEN.18.13
reference: Genesis 18:13
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל אַבְרָהָ֑ם לָ֣/מָּה זֶּה֩ צָחֲקָ֨ה שָׂרָ֜ה לֵ/אמֹ֗ר הַ/אַ֥ף אֻמְנָ֛ם אֵלֵ֖ד וַ/אֲנִ֥י זָקַֽנְתִּי־׃
translation:
  text: And Yahweh said to Abraham, “Why did Sarah laugh, saying, ‘Shall I indeed bear a child, now that I am old?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Will I indeed bear?'' The verb ''bear'' implies bearing a child.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative prose.
- source_word: לָמָּה זֶּה
  chosen: Why
  alternatives:
  - Why is this that
  - Why then
  lexicon: HALOT
  rationale: The idiom לָמָּה זֶּה functions as a natural interrogative, best rendered simply 'Why' in readable modern English without wooden expansion.
- source_word: צָחֲקָה
  chosen: did ... laugh
  alternatives:
  - laughed
  lexicon: HALOT
  rationale: The perfect verb in this quoted divine question refers to Sarah's prior action; English idiom prefers 'did ... laugh' in a direct question.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - to say
  lexicon: HALOT
  rationale: Introduces the content of Sarah's speech/thought as quoted discourse. 'Saying' preserves the Hebrew discourse marker without overinterpreting it as merely internal thought.
- source_word: הַאַף
  chosen: Will ... really
  alternatives:
  - Shall ... indeed
  - Is it really the case that I will
  lexicon: HALOT
  rationale: The interrogative particle with emphatic nuance introduces a surprised question. In idiomatic English, that force is conveyed by 'Will ... really'.
- source_word: אֻמְנָם
  chosen: really
  alternatives:
  - indeed
  - truly
  lexicon: HALOT
  rationale: Adds emphasis to Sarah's incredulous question. 'Really' is natural modern English and preserves the sense of astonishment.
- source_word: אֵלֵד
  chosen: bear a child
  alternatives:
  - give birth
  - bear
  lexicon: HALOT
  rationale: The verb ילד means 'bear/give birth.' 'Bear a child' makes the implied object explicit in natural English while remaining faithful to the sense.
- source_word: וַאֲנִי זָקַנְתִּי
  chosen: now that I am old
  alternatives:
  - and I am old
  - while I have grown old
  - though I am old
  lexicon: HALOT
  rationale: The clause gives the grounds for Sarah's incredulity. 'Now that I am old' communicates the explanatory force naturally in English, while preserving the first-person statement.
