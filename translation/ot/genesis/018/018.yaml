id: GEN.18.18
reference: Genesis 18:18
source:
  edition: WLC
  text: וְ/אַ֨בְרָהָ֔ם הָי֧וֹ יִֽהְיֶ֛ה לְ/ג֥וֹי גָּד֖וֹל וְ/עָצ֑וּם וְ/נִ֨בְרְכוּ
    ב֔/וֹ כֹּ֖ל גּוֹיֵ֥י הָ/אָֽרֶץ׃
translation:
  text: Abraham will surely become a great and mighty nation, and all the nations
    of the earth will be blessed in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''all the nations of the earth will bless themselves by him.'' The
      Hebrew form can be understood this way, though the main text takes it as passive:
      ''will be blessed in him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הָי֧וֹ יִֽהְיֶ֛ה
  chosen: will surely become
  alternatives:
  - will certainly become
  - shall surely become
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of היה intensifies the verbal
    idea. In English, 'will surely become' captures both futurity and emphasis more
    naturally than a wooden repetition such as 'becoming he will become.' 'Become'
    fits the predicate construction with לְגוֹי ('become a nation').
- source_word: לְ/ג֥וֹי
  chosen: a ... nation
  alternatives:
  - a ... people
  lexicon: HALOT
  rationale: גוי commonly denotes a nation/people group. 'Nation' is the standard
    and best fits the promise to Abraham in context, especially with the following
    universal reference to 'all the nations of the earth.'
- source_word: גָּד֖וֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: '''Great'' preserves both quantitative and qualitative force and matches
    covenant-promise language elsewhere in Genesis.'
- source_word: וְ/עָצ֑וּם
  chosen: mighty
  alternatives:
  - strong
  - numerous
  lexicon: HALOT
  rationale: עצום can denote strength, power, or impressiveness. 'Mighty' pairs naturally
    with 'great' without collapsing into mere size, and it preserves the elevated
    covenantal tone.
- source_word: וְ/נִ֨בְרְכוּ
  chosen: will be blessed
  alternatives:
  - will bless themselves
  - will find blessing
  lexicon: HALOT
  rationale: 'The Niphal of ברך in the Abrahamic promise formula is traditionally
    and plausibly read as passive/reflexive-passive: the nations receive blessing
    in relation to Abraham. ''Will be blessed'' is the clearest main-text rendering
    in English. Because the form has been discussed as possibly reflexive (''bless
    themselves''), that alternative is preserved in a footnote.'
- source_word: ב֔/וֹ
  chosen: in him
  alternatives:
  - by him
  - through him
  lexicon: HALOT
  rationale: 'The preposition ב with pronominal suffix here most naturally expresses
    sphere or association: blessing occurs ''in'' Abraham, that is, in connection
    with him. ''Through him'' is interpretively possible but more expansive than the
    Hebrew alone requires.'
- source_word: כֹּ֖ל גּוֹיֵ֥י הָ/אָֽרֶץ
  chosen: all the nations of the earth
  alternatives:
  - all the peoples of the earth
  - all the nations of the land
  lexicon: HALOT
  rationale: This is a standard universal formula in Genesis. 'Nations' maintains
    lexical consistency with גוי earlier in the verse. 'Earth' is preferable to 'land'
    here because the scope is universal, not merely local.
