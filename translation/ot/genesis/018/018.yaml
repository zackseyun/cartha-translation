theological_decisions:
- issue: Interpretation of the Abrahamic blessing formula
  chosen_reading: The nations are portrayed as recipients of divine blessing in relation
    to Abraham ('will be blessed in him').
  alternative_readings:
  - The nations will 'bless themselves' by Abraham as a formula of blessing.
  rationale: The Niphal form of ברך in these patriarchal promise texts is debated,
    but the passive reading best fits the broad covenantal context and the canonical
    development of blessing to the nations. The alternative is lexically possible
    and should be preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
