id: GEN.34.22
reference: Genesis 34:22
source:
  edition: WLC
  text: אַךְ בְּ֠/זֹאת יֵאֹ֨תוּ לָ֤/נוּ הָ/אֲנָשִׁים֙ לָ/שֶׁ֣בֶת אִתָּ֔/נוּ לִ/הְי֖וֹת
    לְ/עַ֣ם אֶחָ֑ד בְּ/הִמּ֥וֹל לָ֨/נוּ֙ כָּל זָכָ֔ר כַּ/אֲשֶׁ֖ר הֵ֥ם נִמֹּלִֽים־־׃
translation:
  text: 'Only on this condition will the men agree with us, to dwell with us and to
    become one people: that every male among us be circumcised, just as they are circumcised.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will consent to us' or 'will be willing toward us'; the Hebrew verb
      expresses agreement or consent.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - But
  - Only/except
  lexicon: HALOT
  rationale: אַךְ here restricts the proposal to a single condition rather than simply
    marking contrast. 'Only' best conveys the limiting force in idiomatic English.
- source_word: בְּזֹאת
  chosen: on this condition
  alternatives:
  - in this
  - by this
  lexicon: HALOT
  rationale: The preposition plus demonstrative functions idiomatically to introduce
    the condition under which agreement will occur. 'On this condition' makes the
    sense explicit in natural English.
- source_word: יֵאֹתוּ
  chosen: will ... agree
  alternatives:
  - will consent
  - will be willing
  lexicon: HALOT
  rationale: The Niphal of אוה conveys willingness or consent. 'Agree' fits the negotiation
    context and reads naturally with the following infinitives.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - these men
  - the people
  lexicon: HALOT
  rationale: The noun is specifically masculine plural, referring to the men of Shechem
    in the narrative. 'The men' preserves the gendered reference.
- source_word: לָשֶׁבֶת אִתָּנוּ
  chosen: to dwell with us
  alternatives:
  - to live with us
  - to settle with us
  lexicon: HALOT
  rationale: ישב commonly means dwell/live/settle. 'Dwell with us' preserves the formal
    sense of co-residence without sounding archaic in this context.
- source_word: לִהְיוֹת לְעַם אֶחָד
  chosen: to become one people
  alternatives:
  - to be one people
  - to become one nation
  lexicon: HALOT
  rationale: The infinitive of היה with לְעַם אֶחָד expresses entering into a unified
    social identity. 'Become one people' captures the resultative sense better than
    the more static 'be one people.' 'People' is preferable to 'nation' in this clan-level
    context.
- source_word: בְּהִמּוֹל
  chosen: that ... be circumcised
  alternatives:
  - by being circumcised
  - when ... is circumcised
  lexicon: HALOT
  rationale: The infinitive construct with ב marks the condition required for agreement.
    Rendering it with 'that ... be circumcised' communicates the stipulation clearly
    in English.
- source_word: לָנוּ כָּל זָכָר
  chosen: every male among us
  alternatives:
  - every male of ours
  - every male for us
  lexicon: HALOT
  rationale: The dative pronoun with the passive infinitive indicates the males belonging
    to or among the speaker's group. 'Among us' is the most idiomatic way to express
    the communal reference.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - all males
  lexicon: HALOT
  rationale: זָכָר denotes male sex broadly, not only adult men. 'Every male' is more
    precise than 'every man,' especially in circumcision contexts.
- source_word: כַּאֲשֶׁר הֵם נִמֹּלִים
  chosen: just as they are circumcised
  alternatives:
  - as they themselves are circumcised
  - as they have been circumcised
  lexicon: HALOT
  rationale: The comparison clause grounds the demand in the practice of the Shechemites.
    'Just as they are circumcised' preserves the comparative force and the passive/reflexive
    sense without overcomplicating the English.
