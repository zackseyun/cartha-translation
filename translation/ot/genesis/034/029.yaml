id: GEN.34.29
reference: Genesis 34:29
source:
  edition: WLC
  text: וְ/אֶת כָּל חֵילָ֤/ם וְ/אֶת כָּל טַפָּ/ם֙ וְ/אֶת נְשֵׁי/הֶ֔ם שָׁב֖וּ וַ/יָּבֹ֑זּוּ
    וְ/אֵ֖ת כָּל אֲשֶׁ֥ר בַּ/בָּֽיִת־־־־־־׃
translation:
  text: They took captive all their wealth and all their little ones and their wives,
    and plundered everything that was in the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their children' for 'their little ones'; the Hebrew טַף often refers
      specifically to young children or household dependents.
    reason: lexical_alternative
  - marker: b
    text: Or 'everything that was in the household'; the Hebrew 'house' can sometimes
      stand for the household and its possessions.
    reason: lexical_alternative
  - marker: c
    text: Or 'They took captive all their wealth, all their little ones, and their
      wives, and they plundered everything that was in the house.'.
    reason: previous_rendering
lexical_decisions:
- source_word: חֵילָם
  chosen: their wealth
  alternatives:
  - their goods
  - their possessions
  - their livestock/wealth
  lexicon: HALOT
  rationale: חַיִל/חֵיל can denote wealth, resources, or property. In this context
    of seizing persons and goods after the attack on Shechem, 'wealth' best captures
    movable property broadly without narrowing it only to animals or military force.
- source_word: טַפָּם
  chosen: their little ones
  alternatives:
  - their children
  - their dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents, often the vulnerable members
    of a household. 'Little ones' preserves the sense of young children more specifically
    than the broader 'children.'
- source_word: נְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: The noun אִשָּׁה can mean 'woman' or 'wife.' With the 3mp suffix in a
    household-plundering list, 'their wives' is the more natural relational sense.
- source_word: שָׁבוּ
  chosen: took captive
  alternatives:
  - captured
  - carried off
  lexicon: HALOT
  rationale: The verb שָׁבָה commonly means to take captive. 'Took captive' makes
    explicit that the women and children were seized as captives, not merely relocated.
- source_word: וַיָּבֹזּוּ
  chosen: they plundered
  alternatives:
  - they looted
  - they took as spoil
  lexicon: HALOT
  rationale: בזז denotes plundering or taking spoil. 'Plundered' is clear modern English
    and preserves the violent, warlike sense.
- source_word: כָּל אֲשֶׁר בַּבָּיִת
  chosen: everything that was in the house
  alternatives:
  - everything that was in the houses
  - everything in the household
  lexicon: HALOT
  rationale: The singular בַּבַּיִת can mean the house or household. Here it likely
    refers collectively to what was found in the house/household. 'Everything that
    was in the house' stays close to the Hebrew while remaining idiomatic.
