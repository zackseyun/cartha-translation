id: GEN.34.14
reference: Genesis 34:14
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֲלֵי/הֶ֗ם לֹ֤א נוּכַל֙ לַ/עֲשׂוֹת֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה לָ/תֵת֙
    אֶת אֲחֹתֵ֔/נוּ לְ/אִ֖ישׁ אֲשֶׁר ל֣/וֹ עָרְלָ֑ה כִּֽי חֶרְפָּ֥ה הִ֖וא לָֽ/נוּ־־־׃
translation:
  text: And they said to them, “We cannot do this thing, to give our sister to a man
    who has a foreskin, for that is a disgrace to us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to an uncircumcised man.” Literally, “to a man who has a foreskin.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֲלֵיהֶם
  chosen: And they said to them
  alternatives:
  - And they told them
  lexicon: HALOT
  rationale: The waw-consecutive with אמר introduces the next speech event straightforwardly.
    'Said' is the default narrative rendering; 'to them' preserves the plural indirect
    object.
- source_word: לֹא נוּכַל
  chosen: We cannot
  alternatives:
  - We are not able to
  - It is not possible for us to
  lexicon: HALOT
  rationale: יכל in the Qal expresses ability. 'We cannot' is idiomatic modern English
    and preserves the claimed inability without overformal wording.
- source_word: לַעֲשׂוֹת הַדָּבָר הַזֶּה
  chosen: do this thing
  alternatives:
  - do this
  - do this matter
  lexicon: HALOT
  rationale: עשה + דבר is a common Hebrew expression. 'Do this thing' keeps the concrete
    noun present in the Hebrew, though English could also omit 'thing.'
- source_word: לָתֵת אֶת אֲחֹתֵנוּ
  chosen: to give our sister
  alternatives:
  - to give away our sister
  - to give our sister in marriage
  lexicon: HALOT
  rationale: נתן literally means 'give.' In marriage contexts English may expand to
    'give in marriage,' but the Hebrew here simply says 'give our sister'; the marital
    context is already clear from the surrounding narrative, so the more literal wording
    is retained.
- source_word: לְאִישׁ
  chosen: to a man
  alternatives:
  - to a husband
  lexicon: HALOT
  rationale: איש is the ordinary word for 'man.' Although the context is marriage,
    'man' best matches the source wording without importing an interpretive gloss.
- source_word: אֲשֶׁר לוֹ עָרְלָה
  chosen: who has a foreskin
  alternatives:
  - who is uncircumcised
  - to an uncircumcised man
  lexicon: HALOT
  rationale: Literally, the clause says 'who has a foreskin.' This preserves the Hebrew
    expression rather than replacing it with the more interpretive adjectival rendering
    'uncircumcised.' Because modern English readers may expect 'uncircumcised,' that
    alternative is preserved in a footnote.
- source_word: כִּי חֶרְפָּה הִוא לָנוּ
  chosen: for that is a disgrace to us
  alternatives:
  - for it is a reproach to us
  - for it would be a shame for us
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or shame. 'Disgrace' communicates the
    social-honor dimension clearly in modern English while remaining close to the
    Hebrew sense.
