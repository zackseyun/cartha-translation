id: GEN.34.12
reference: Genesis 34:12
source:
  edition: WLC
  text: הַרְבּ֨וּ עָלַ֤/י מְאֹד֙ מֹ֣הַר וּ/מַתָּ֔ן וְ/אֶ֨תְּנָ֔ה כַּ/אֲשֶׁ֥ר תֹּאמְר֖וּ
    אֵלָ֑/י וּ/תְנוּ לִ֥/י אֶת הַֽ/נַּעֲרָ֖ לְ/אִשָּֽׁה־־׃
translation:
  text: Demand from me a very large bride-price and gift, and I will give whatever
    you say to me; only give me the young woman as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dowry'; Hebrew מֹהַר refers specifically to the payment made by the
      groom or his family to the bride's family.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְבּוּ
  chosen: Demand
  alternatives:
  - Increase
  - Make great
  lexicon: HALOT
  rationale: Imperative plural of רבה in the causative sense here addresses the hearers
    with the idea of making the requested amount large. In idiomatic English, 'Demand
    from me' best captures the transactional force in context.
- source_word: עָלַי
  chosen: from me
  alternatives:
  - upon me
  - of me
  lexicon: HALOT
  rationale: With the imperative of רבה, the preposition conveys what is imposed on
    the speaker. 'From me' is the most natural English expression for the demanded
    payment.
- source_word: מְאֹד
  chosen: a very large
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: The adverb intensifies the amount of the requested payment. Rendering
    it with 'very large' modifies the following payment terms naturally in English.
- source_word: מֹהַר
  chosen: bride-price
  alternatives:
  - dowry
  - marriage payment
  lexicon: HALOT
  rationale: מֹהַר refers to the payment made by the groom or his family to the bride's
    family, not the property brought by the bride. 'Bride-price' is more precise than
    the traditional but misleading 'dowry'.
- source_word: וּמַתָּן
  chosen: gift
  alternatives:
  - gifts
  - present
  lexicon: HALOT
  rationale: The noun denotes an additional gift or present accompanying the marriage
    payment. Singular 'gift' works as a collective complement to 'bride-price' in
    English.
- source_word: וְאֶתְּנָה
  chosen: and I will give
  alternatives:
  - and let me give
  lexicon: HALOT
  rationale: Cohortative form expresses the speaker's resolve or willingness. In English,
    a simple future 'I will give' communicates this naturally in direct speech.
- source_word: כַּאֲשֶׁר תֹּאמְרוּ אֵלַי
  chosen: whatever you say to me
  alternatives:
  - according to what you say to me
  - as you tell me
  lexicon: HALOT
  rationale: The phrase indicates compliance with whatever amount or terms they name.
    'Whatever you say to me' is clear and idiomatic while preserving the open-ended
    force.
- source_word: וּתְנוּ לִי
  chosen: only give me
  alternatives:
  - and give me
  - but give me
  lexicon: HALOT
  rationale: The conjunction here advances the main request after the offer of payment.
    'Only give me' brings out the climactic appeal in natural English without adding
    content beyond the discourse force.
- source_word: הַנַּעֲרָ
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: The term denotes a young woman of marriageable age. 'Young woman' is
    accurate and readable; 'girl' may sound too juvenile in English, while 'maiden'
    is archaic.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be my wife
  lexicon: HALOT
  rationale: This is the standard Hebrew marital expression. 'As a wife' is concise
    and idiomatic in contemporary English.
