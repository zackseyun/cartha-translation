id: GEN.34.25
reference: Genesis 34:25
source:
  edition: WLC
  text: וַ/יְהִי֩ בַ/יּ֨וֹם הַ/שְּׁלִישִׁ֜י בִּֽ/הְיוֹתָ֣/ם כֹּֽאֲבִ֗ים וַ/יִּקְח֣וּ
    שְׁנֵֽי בְנֵי יַ֠עֲקֹב שִׁמְע֨וֹן וְ/לֵוִ֜י אֲחֵ֤י דִינָה֙ אִ֣ישׁ חַרְבּ֔/וֹ וַ/יָּבֹ֥אוּ
    עַל הָ/עִ֖יר בֶּ֑טַח וַ/יַּֽהַרְג֖וּ כָּל זָכָֽר־־־־׃
translation:
  text: And it happened on the third day, when they were in pain, that two of Jacob’s
    sons, Simeon and Levi, Dinah’s brothers, each took his sword, came against the
    city while it felt secure, and killed every male.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came against the city confidently/securely'; the Hebrew בֶּטַח can modify
      either the attackers' manner or the city's unsuspecting state. The main text
      takes it as describing the city as secure and off guard in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of היה introducing the next event in sequence.
    'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on the third day afterward
  lexicon: HALOT
  rationale: Direct temporal expression; no need to add interpretive material beyond
    the Hebrew.
- source_word: בִּהְיוֹתָם כֹּאֲבִים
  chosen: when they were in pain
  alternatives:
  - while they were suffering
  - when they were sore
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks contemporaneous circumstance.
    כֹּאֲבִים denotes being in pain, here likely from circumcision in the context.
    'In pain' is clear modern English and avoids the archaic 'sore' while not over-specifying
    the cause.
- source_word: שְׁנֵי בְנֵי יַעֲקֹב
  chosen: two of Jacob’s sons
  alternatives:
  - the two sons of Jacob
  - two sons of Jacob
  lexicon: HALOT
  rationale: Construct phrase identifying a subset. 'Two of Jacob’s sons' is natural
    English and preserves the partitive sense.
- source_word: שִׁמְעוֹן וְלֵוִי
  chosen: Simeon and Levi
  rationale: Standard English transliterations of the personal names.
- source_word: אֲחֵי דִינָה
  chosen: Dinah’s brothers
  alternatives:
  - the brothers of Dinah
  lexicon: HALOT
  rationale: Appositional identification clarifying who Simeon and Levi are in relation
    to Dinah. Possessive form is idiomatic English.
- source_word: אִישׁ חַרְבּוֹ
  chosen: each took his sword
  alternatives:
  - each with his sword
  - a man his sword
  lexicon: HALOT
  rationale: The distributive איש with suffix means each man with/taking his own sword.
    Because the verb 'took' governs the phrase, English idiom is best captured by
    'each took his sword.'
- source_word: וַיָּבֹאוּ עַל הָעִיר
  chosen: came against the city
  alternatives:
  - came upon the city
  - attacked the city
  lexicon: HALOT
  rationale: בוא על can mean come against in hostile movement. 'Attacked' is possible
    but slightly more interpretive; 'came against' preserves the Hebrew image while
    implying aggression in context.
- source_word: בֶּטַח
  chosen: while it felt secure
  alternatives:
  - boldly
  - securely
  - in safety
  - unawares
  lexicon: HALOT
  rationale: בטח can describe security, confidence, or unsuspecting safety. Here it
    most naturally characterizes the city's condition at the moment of attack. 'While
    it felt secure' communicates that the city was off guard without importing too
    much interpretation. A lexical alternative is worth preserving because some take
    the adverb to modify the attackers ('boldly/securely').
- source_word: וַיַּהַרְגוּ כָּל זָכָר
  chosen: and killed every male
  alternatives:
  - and struck down every male
  - and killed all the men
  lexicon: HALOT
  rationale: הרג is the ordinary verb 'kill/slay.' כָּל זָכָר is literally 'every
    male,' which is more precise than 'all the men' because it reflects the Hebrew
    noun for male sex rather than adult males only.
