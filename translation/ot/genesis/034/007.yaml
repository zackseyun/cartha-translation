id: GEN.34.7
reference: Genesis 34:7
source:
  edition: WLC
  text: וּ/בְנֵ֨י יַעֲקֹ֜ב בָּ֤אוּ מִן הַ/שָּׂדֶה֙ כְּ/שָׁמְעָ֔/ם וַ/יִּֽתְעַצְּבוּ֙
    הָֽ/אֲנָשִׁ֔ים וַ/יִּ֥חַר לָ/הֶ֖ם מְאֹ֑ד כִּֽי נְבָלָ֞ה עָשָׂ֣ה בְ/יִשְׂרָאֵ֗ל
    לִ/שְׁכַּב֙ אֶת בַּֽת יַעֲקֹ֔ב וְ/כֵ֖ן לֹ֥א יֵעָשֶֽׂה־־־־׃
translation:
  text: And Jacob’s sons came in from the field when they heard it, and the men were
    grieved and very angry, because he had done an outrageous thing in Israel by lying
    with Jacob’s daughter, for such a thing must not be done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a disgraceful thing' or 'a vile thing' for 'an outrageous thing.' The
      Hebrew term denotes a morally shameful, scandalous act.
    reason: lexical_alternative
  - marker: b
    text: '''In Israel'' likely refers here to Jacob/Israel’s family or covenant community,
      not yet the later nation in its full historical sense.'
    reason: cultural_note
  - marker: c
    text: Or 'for this should not be done.' The Hebrew expresses a general norm about
      what is unacceptable.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי יַעֲקֹב
  chosen: And Jacob’s sons
  alternatives:
  - And the sons of Jacob
  lexicon: HALOT
  rationale: Construct phrase literally means 'sons of Jacob.' 'Jacob’s sons' is natural
    modern English while preserving the familial identification.
- source_word: בָּאוּ מִן הַשָּׂדֶה
  chosen: came in from the field
  alternatives:
  - came from the field
  lexicon: HALOT
  rationale: בוא with מן marks arrival from the field; 'came in from the field' conveys
    return from outdoor work and fits the narrative setting.
- source_word: כְּשָׁמְעָם
  chosen: when they heard it
  alternatives:
  - as soon as they heard
  - upon their hearing
  lexicon: HALOT
  rationale: Temporal כ plus infinitive/verb form with suffix indicates the time of
    hearing. 'When they heard it' is idiomatic and preserves the sequence.
- source_word: וַיִּתְעַצְּבוּ הָאֲנָשִׁים
  chosen: the men were grieved
  alternatives:
  - the men were distressed
  - the men were hurt
  lexicon: HALOT
  rationale: The verb עצב in the hitpael here denotes emotional pain/distress. 'Were
    grieved' captures sorrow without over-paraphrasing. הָאֲנָשִׁים refers to the
    male members just mentioned, hence 'the men.'
- source_word: וַיִּחַר לָהֶם מְאֹד
  chosen: and very angry
  alternatives:
  - and it burned to them greatly
  - and they became very angry
  lexicon: HALOT
  rationale: חרה idiomatically expresses burning anger. In English, 'were ... very
    angry' is the natural equivalent. The finite verb is carried by the clause sense
    from the Hebrew idiom.
- source_word: נְבָלָה
  chosen: an outrageous thing
  alternatives:
  - a disgraceful thing
  - a vile thing
  - folly
  lexicon: HALOT
  rationale: נבלה in this moral-social context denotes an outrageous, disgraceful
    act violating communal norms, not mere intellectual 'folly.' 'Outrageous thing'
    is clear modern English with moral force.
- source_word: עָשָׂה בְיִשְׂרָאֵל
  chosen: he had done ... in Israel
  alternatives:
  - one had done ... in Israel
  - he had committed ... against Israel
  lexicon: HALOT
  rationale: The subject is singular from context, referring to Shechem. 'In Israel'
    is retained literally; at this stage in Genesis it denotes the covenant family/community
    associated with Jacob/Israel, not necessarily the later nation-state.
- source_word: לִשְׁכַּב אֶת־בַּת יַעֲקֹב
  chosen: by lying with Jacob’s daughter
  alternatives:
  - by sleeping with Jacob’s daughter
  - to lie with Jacob’s daughter
  lexicon: HALOT
  rationale: שׁכב is the standard sexual euphemism. 'Lying with' preserves the source's
    register and avoids either clinical or overly colloquial phrasing. The prefixed
    ל here explains the nature of the outrageous act.
- source_word: וְכֵן לֹא יֵעָשֶׂה
  chosen: for such a thing must not be done
  alternatives:
  - and so it is not done
  - and thus one must not do this
  - for this should not be done
  lexicon: HALOT
  rationale: This clause expresses a normative prohibition/general principle. 'Such
    a thing must not be done' communicates the force of the impersonal/passive Hebrew
    in natural English.
