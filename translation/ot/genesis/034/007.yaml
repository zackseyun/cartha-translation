theological_decisions:
- issue: Meaning of 'Israel' in the phrase 'he had done an outrageous thing in Israel'
  chosen_reading: Rendered 'in Israel' literally, referring to the covenant family/community
    of Jacob rather than importing the later full national sense.
  alternative_readings:
  - among Jacob's family
  - in the clan of Israel
  rationale: The Hebrew text uses בְיִשְׂרָאֵל, and the translation preserves the
    canonical wording without anachronistically narrowing or expanding it. This keeps
    the text's social-covenantal force while avoiding interpretive overreach.
  doctrine_reference: Translation philosophy §1, §3
- issue: Moral force of the final clause
  chosen_reading: 'Translated as a general normative statement: ''for such a thing
    must not be done.'''
  alternative_readings:
  - for this is not done
  - and so it should not be done
  rationale: The Niphal imperfect here functions as an impersonal statement of what
    is unacceptable. 'Must not be done' preserves the ethical gravity without adding
    extra legal or doctrinal claims.
  doctrine_reference: Translation philosophy §6
