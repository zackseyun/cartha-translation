id: GEN.34.17
reference: Genesis 34:17
source:
  edition: WLC
  text: וְ/אִם לֹ֧א תִשְׁמְע֛וּ אֵלֵ֖י/נוּ לְ/הִמּ֑וֹל וְ/לָקַ֥חְנוּ אֶת בִּתֵּ֖/נוּ
    וְ/הָלָֽכְנוּ־־׃
translation:
  text: But if you will not listen to us by being circumcised, then we will take our
    daughter and go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you do not heed us to be circumcised.' The Hebrew infinitive can be
      rendered more formally as the content of what they are being asked to heed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction introduces a conditional contrast with the previous offer;
    'But if' captures both the connective and adversative force in natural English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation of the following verb.
- source_word: תִשְׁמְעוּ אֵלֵינוּ
  chosen: you will not listen to us
  alternatives:
  - you do not heed us
  - you will not obey us
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Listen to us' is
    the most direct rendering; 'obey us' is possible by implication but slightly stronger
    than the immediate wording.
- source_word: לְ/הִמּוֹל
  chosen: by being circumcised
  alternatives:
  - to be circumcised
  - with respect to circumcision
  lexicon: HALOT
  rationale: The infinitive construct of מול after שׁמע expresses the content or required
    action of heeding. 'By being circumcised' makes explicit the demanded response
    in idiomatic English while preserving the passive/reflexive sense.
- source_word: וְ/לָקַחְנוּ
  chosen: then we will take
  alternatives:
  - and we will take
  lexicon: HALOT
  rationale: The waw with qatal here continues the apodosis of the condition with
    future sense. 'Then we will take' communicates the consequential force in English.
- source_word: אֶת בִּתֵּנוּ
  chosen: our daughter
  lexicon: HALOT
  rationale: Direct object marker plus noun with 1cp suffix. 'Our daughter' is the
    plain sense; in context this refers to Dinah.
- source_word: וְ/הָלָכְנוּ
  chosen: and go
  alternatives:
  - and leave
  - and depart
  lexicon: HALOT
  rationale: הלך in this context means to go away/depart. 'Go' is simple and direct;
    'leave' or 'depart' are interpretive expansions. Because English coordinates naturally
    with a future auxiliary carried over from the prior verb, 'and go' is idiomatic.
