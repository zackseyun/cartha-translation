id: GEN.34.1
reference: Genesis 34:1
source:
  edition: WLC
  text: וַ/תֵּצֵ֤א דִינָה֙ בַּת לֵאָ֔ה אֲשֶׁ֥ר יָלְדָ֖ה לְ/יַעֲקֹ֑ב לִ/רְא֖וֹת בִּ/בְנ֥וֹת
    הָ/אָֽרֶץ־׃
translation:
  text: Now Dinah, the daughter of Leah, whom she had borne to Jacob, went out to
    see the daughters of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to visit the women of the land.' The Hebrew literally says 'to see the
      daughters of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - went out from there
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא commonly denotes going out. 'Went out' is the natural
    modern English equivalent and preserves the narrative movement without adding
    location not stated in the Hebrew.
- source_word: דִינָה
  chosen: Dinah
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בַּת לֵאָה
  chosen: the daughter of Leah
  alternatives:
  - Leah's daughter
  lexicon: HALOT
  rationale: Construct phrase identifying Dinah by maternal lineage. 'The daughter
    of Leah' is slightly more formal and mirrors the Hebrew apposition clearly.
- source_word: אֲשֶׁר יָלְדָה לְיַעֲקֹב
  chosen: whom she had borne to Jacob
  alternatives:
  - whom she bore to Jacob
  - whom Leah had borne for Jacob
  lexicon: HALOT
  rationale: The relative clause modifies Leah and specifies Dinah's birth. English
    pluperfect 'had borne' fits the backgrounding function in narrative. The preposition
    ל here is naturally rendered 'to' with the sense of childbearing for a man as
    father.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to visit
  - to look at
  lexicon: HALOT
  rationale: Infinitive construct of ראה literally means 'to see.' While context may
    imply social visiting, the Hebrew itself states seeing, so the main text keeps
    the more direct rendering.
- source_word: בִּבְנוֹת הָאָרֶץ
  chosen: the daughters of the land
  alternatives:
  - the women of the land
  - the girls of the land
  lexicon: HALOT
  rationale: בנות הארץ is a common idiom for the local women/girls. 'Daughters of
    the land' preserves the Hebrew expression and social setting; a more idiomatic
    alternative is worth preserving in a footnote.
