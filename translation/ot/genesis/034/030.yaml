id: GEN.34.30
reference: Genesis 34:30
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יַעֲקֹ֜ב אֶל שִׁמְע֣וֹן וְ/אֶל לֵוִי֮ עֲכַרְתֶּ֣ם אֹתִ/י֒ לְ/הַבְאִישֵׁ֨/נִי֙ בְּ/יֹשֵׁ֣ב הָ/אָ֔רֶץ בַּֽ/כְּנַעֲנִ֖י וּ/בַ/פְּרִזִּ֑י וַ/אֲנִי֙ מְתֵ֣י מִסְפָּ֔ר וְ/נֶאֶסְפ֤וּ עָלַ/י֙ וְ/הִכּ֔וּ/נִי וְ/נִשְׁמַדְתִּ֖י אֲנִ֥י וּ/בֵיתִֽ/י־־׃
translation:
  text: Then Jacob said to Simeon and Levi, “You have brought trouble on me, making me stink among the inhabitants of the land, among the Canaanites and the Perizzites. Since I am few in number, they will gather against me and strike me down, and I will be destroyed—I and my household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'making me odious' or 'making me offensive' among the inhabitants of the land. The Hebrew is literally 'making me stink.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will gather themselves against me'.
    reason: previous_rendering
lexical_decisions:
- source_word: עֲכַרְתֶּם
  chosen: have brought trouble on
  alternatives:
  - have troubled
  - have brought disaster on
  lexicon: HALOT
  rationale: The verb עכר in this stem commonly means to bring trouble/disaster upon someone. 'Have brought trouble on me' is idiomatic modern English and preserves Jacob's accusation without overinterpreting it.
- source_word: לְהַבְאִישֵׁנִי
  chosen: making me stink
  alternatives:
  - making me odious
  - making me offensive
  lexicon: HALOT
  rationale: The Hiphil of באש is literally 'to make stink.' Here it is metaphorical for causing someone to be detested. The vivid literal image is retained in the main text because it is the plain sense of the Hebrew; smoother idiomatic alternatives are preserved in a footnote.
- source_word: בְּיֹשֵׁב הָאָרֶץ
  chosen: among the inhabitants of the land
  alternatives:
  - among those who dwell in the land
  lexicon: HALOT
  rationale: The participle יֹשֵׁב functions collectively for the settled population. 'Inhabitants of the land' is natural English and accurately reflects the collective singular construction.
- source_word: בַּכְּנַעֲנִי וּבַפְּרִזִּי
  chosen: among the Canaanites and the Perizzites
  alternatives:
  - with the Canaanites and the Perizzites
  lexicon: HALOT
  rationale: The prefixed preposition continues the sphere in which Jacob's reputation is damaged. 'Among' fits the social sense established by the previous phrase.
- source_word: מְתֵי מִסְפָּר
  chosen: few in number
  alternatives:
  - men of number
  - few men
  lexicon: HALOT
  rationale: This idiom means being numerically small. 'Few in number' is the standard clear English equivalent.
- source_word: וְנֶאֶסְפוּ עָלַי
  chosen: they will gather themselves against me
  alternatives:
  - they will gather against me
  - they will assemble against me
  lexicon: HALOT
  rationale: 'The Niphal of אסף here is reflexive/passive in force: hostile groups banding together. ''Gather themselves against me'' preserves that nuance, though slightly more idiomatic alternatives are possible.'
- source_word: וְהִכּוּנִי
  chosen: strike me down
  alternatives:
  - attack me
  - smite me
  lexicon: HALOT
  rationale: נכה is broad ('strike, hit, defeat'). In this military-threat context, 'strike me down' conveys violent attack leading toward destruction, without being as vague as 'attack' or as archaic as 'smite'.
- source_word: וְנִשְׁמַדְתִּי
  chosen: I will be destroyed
  alternatives:
  - I will be annihilated
  - I will be wiped out
  lexicon: HALOT
  rationale: שׁמד denotes destruction/extermination. 'I will be destroyed' is direct and sufficiently strong; stronger colloquial alternatives are possible but less neutral.
- source_word: בֵּיתִי
  chosen: my household
  alternatives:
  - my house
  - my family
  lexicon: HALOT
  rationale: In this context בַּיִת refers not merely to a building but to Jacob's household unit. 'My household' best captures the social/familial scope.
