  from: they will gather themselves against me
  to: they will gather against me
  rationale: While the Niphal of אסף can have a reflexive sense, which the current rendering aims to capture, the English verb 'gather' in this context already implies the subjects are coming together. The reflexive pronoun 'themselves' is largely redundant in English and makes the phrasing slightly stiff. The more natural 'they will gather against me' conveys the same meaning more fluently.
