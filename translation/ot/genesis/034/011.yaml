id: GEN.34.11
reference: Genesis 34:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁכֶם֙ אֶל אָבִ֣י/ה וְ/אֶל אַחֶ֔י/הָ אֶמְצָא חֵ֖ן בְּ/עֵינֵי/כֶ֑ם
    וַ/אֲשֶׁ֥ר תֹּאמְר֛וּ אֵלַ֖/י אֶתֵּֽן־־־׃
translation:
  text: Then Shechem said to her father and to her brothers, “Let me find favor in
    your eyes, and whatever you say to me, I will give.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May I find favor in your sight.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whatever you ask of me, I will give.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and said' is more formally
    possible.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֶל אָבִיהָ וְאֶל אַחֶיהָ
  chosen: to her father and to her brothers
  alternatives:
  - to her father and her brothers
  lexicon: HALOT
  rationale: The repeated אֶל is represented with 'to ... and to ...' for clarity
    and to reflect the Hebrew structure. אַחֶיהָ is masculine plural 'her brothers,'
    not a gender-neutral term.
- source_word: אֶמְצָא חֵן
  chosen: Let me find favor
  alternatives:
  - May I find favor
  - Let me find grace
  lexicon: HALOT
  rationale: This idiom expresses a request for acceptance or goodwill. 'Find favor'
    is the most natural and established English equivalent; 'grace' would be possible
    lexically for חֵן but is less idiomatic here.
- source_word: בְּעֵינֵיכֶם
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom accompanying 'find favor.' 'In your
    eyes' preserves the metaphor and remains understandable in English.
- source_word: וַאֲשֶׁר
  chosen: and whatever
  alternatives:
  - and what
  - whatever
  lexicon: HALOT
  rationale: Introduces an indefinite relative clause. 'Whatever' best captures the
    open-ended sense; the prefixed conjunction is retained with 'and'.
- source_word: תֹּאמְרוּ אֵלַי
  chosen: you say to me
  alternatives:
  - you tell me
  - you ask of me
  lexicon: HALOT
  rationale: אָמַר with אֶל commonly means 'say to.' In this marriage-negotiation
    context, 'ask of me' is interpretive and is therefore preserved only as an alternative,
    not adopted in the main text.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will pay
  lexicon: HALOT
  rationale: The plain sense of נָתַן is 'give.' Although the context involves bride-price
    and gifts, 'pay' would narrow the meaning beyond the verb itself.
