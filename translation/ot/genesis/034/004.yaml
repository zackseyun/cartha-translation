id: GEN.34.4
reference: Genesis 34:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁכֶ֔ם אֶל חֲמ֥וֹר אָבִ֖י/ו לֵ/אמֹ֑ר קַֽח לִ֛/י אֶת הַ/יַּלְדָּ֥ה
    הַ/זֹּ֖את לְ/אִשָּֽׁה־־־׃
translation:
  text: And Shechem said to Hamor his father, “Get me this girl as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this young woman.” The Hebrew word can denote a girl or a young woman;
      here “girl” preserves the youthful sense and Shechem’s blunt manner of speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew storytelling flow without overinterpreting the conjunction.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Personal name is transliterated per project philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee of speech.
- source_word: חֲמוֹר אָבִיו
  chosen: Hamor his father
  alternatives:
  - his father Hamor
  lexicon: HALOT
  rationale: The Hebrew appositional construction names Hamor and then identifies
    him as Shechem's father. 'Hamor his father' is a natural, close rendering.
- source_word: לֵאמֹר
  chosen: omitted in English quotation formatting
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive 'saying' introduces direct speech in Hebrew; English normally
    marks this with punctuation rather than a separate word.
- source_word: קַח לִי
  chosen: Get me
  alternatives:
  - Take for me
  - Obtain for me
  lexicon: HALOT
  rationale: The imperative plus dative literally means 'take for me.' In this marriage-arrangement
    context, 'Get me' is idiomatic modern English that preserves the force of Shechem's
    request to his father without implying that Hamor is physically seizing her.
- source_word: אֶת הַיַּלְדָּה הַזֹּאת
  chosen: this girl
  alternatives:
  - this young woman
  - this maiden
  lexicon: HALOT
  rationale: יַלְדָּה denotes a female youth/young woman. Given the narrative's perspective
    and Shechem's speech, 'this girl' reflects the Hebrew term's youthful sense and
    the objectifying tone of the request. 'Maiden' is archaic; 'young woman' is possible
    but slightly less direct.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be my wife
  lexicon: HALOT
  rationale: This is the standard idiom for taking a woman in marriage. 'As a wife'
    is clear modern English and preserves the marital sense.
