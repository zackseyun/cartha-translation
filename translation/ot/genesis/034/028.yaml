id: GEN.34.28
reference: Genesis 34:28
source:
  edition: WLC
  text: אֶת צֹאנָ֥/ם וְ/אֶת בְּקָרָ֖/ם וְ/אֶת חֲמֹרֵי/הֶּ֑ם וְ/אֵ֧ת אֲשֶׁר בָּ/עִ֛יר
    וְ/אֶת אֲשֶׁ֥ר בַּ/שָּׂדֶ֖ה לָקָֽחוּ־־־־־׃
translation:
  text: They took their flocks, their herds, their donkeys, and whatever was in the
    city and whatever was in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that was in the city and all that was in the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאנָם
  chosen: their flocks
  alternatives:
  - their sheep and goats
  - their small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective noun for small livestock, especially sheep and goats.
    'Flocks' is natural English and preserves the collective sense without over-specifying
    species.
- source_word: בְּקָרָם
  chosen: their herds
  alternatives:
  - their cattle
  - their oxen
  lexicon: HALOT
  rationale: בָּקָר commonly denotes cattle/herd animals. 'Herds' pairs idiomatically
    with 'flocks' and keeps the collective sense. 'Cattle' is possible but slightly
    narrower in modern English usage.
- source_word: חֲמֹרֵיהֶם
  chosen: their donkeys
  alternatives:
  - their asses
  lexicon: HALOT
  rationale: The noun refers to donkeys. 'Donkeys' is the standard readable modern
    English rendering; 'asses' is archaic in contemporary usage.
- source_word: אֲשֶׁר בָּעִיר
  chosen: whatever was in the city
  alternatives:
  - what was in the city
  - all that was in the city
  lexicon: HALOT
  rationale: The relative construction with אֵת marks the object taken. 'Whatever
    was in the city' captures the broad, indefinite scope of the plunder in idiomatic
    English.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  chosen: whatever was in the field
  alternatives:
  - what was in the field
  - all that was in the open country
  lexicon: HALOT
  rationale: שָׂדֶה can mean field or open country/agricultural land. 'Field' is the
    most direct rendering here and matches the singular Hebrew while functioning collectively
    in English.
- source_word: לָקָחוּ
  chosen: They took
  alternatives:
  - they seized
  - they carried off
  lexicon: HALOT
  rationale: לָקַח is the standard verb 'take.' In this context of plunder, 'seized'
    or 'carried off' are interpretive expansions; 'took' stays closer to the Hebrew
    while still fitting the narrative.
