id: GEN.34.21
reference: Genesis 34:21
source:
  edition: WLC
  text: הָ/אֲנָשִׁ֨ים הָ/אֵ֜לֶּה שְֽׁלֵמִ֧ים הֵ֣ם אִתָּ֗/נוּ וְ/יֵשְׁב֤וּ בָ/אָ֨רֶץ֙
    וְ/יִסְחֲר֣וּ אֹתָ֔/הּ וְ/הָ/אָ֛רֶץ הִנֵּ֥ה רַֽחֲבַת יָדַ֖יִם לִ/פְנֵי/הֶ֑ם אֶת
    בְּנֹתָ/ם֙ נִקַּֽח לָ֣/נוּ לְ/נָשִׁ֔ים וְ/אֶת בְּנֹתֵ֖י/נוּ נִתֵּ֥ן לָ/הֶֽם־־־־׃
translation:
  text: These men are at peace with us. Let them dwell in the land and trade in it,
    for look, the land is broad enough for them. We will take their daughters for
    wives for ourselves, and we will give our daughters to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'friendly with us' / 'on good terms with us' for שְׁלֵמִים.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the land—look—is broad of hands before them,' an idiom meaning
      the land is spacious or has ample room for them.
    reason: cultural_note
  - marker: c
    text: Or 'trade through it'; the Hebrew may denote commercial activity within
      the land or through its territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֵמִים
  chosen: at peace
  alternatives:
  - friendly
  - peaceable
  - on good terms
  lexicon: HALOT
  rationale: The adjective from שלם here describes a state of peaceful relations or
    wholeness in relation to 'with us.' 'At peace with us' best captures the relational
    sense in natural English without overstating affection.
- source_word: וְיֵשְׁבוּ
  chosen: Let them dwell
  alternatives:
  - and let them live
  - and let them settle
  lexicon: HALOT
  rationale: 'Though morphologically an imperfect, in this speech context it functions
    jussively/exhortatively: the townsmen are being urged to permit settlement. ''Dwell''
    preserves the formal sense while remaining readable.'
- source_word: וְיִסְחֲרוּ
  chosen: trade
  alternatives:
  - do business
  - travel about for trade
  - engage in commerce
  lexicon: HALOT
  rationale: The verb סחר commonly refers to commercial activity. 'Trade' is concise
    and fits the context of economic integration; 'do business' is possible but slightly
    broader.
- source_word: אֹתָהּ
  chosen: in it
  alternatives:
  - through it
  - through the land
  lexicon: HALOT
  rationale: The feminine pronoun refers back to 'the land.' With סחר, the sense may
    be trade in/through the land. 'In it' is a natural English rendering that keeps
    the land as the sphere of commerce without over-specifying movement.
- source_word: רַחֲבַת יָדַיִם
  chosen: broad enough
  alternatives:
  - wide on both sides
  - roomy
  - ample
  lexicon: HALOT
  rationale: 'This idiom literally means ''broad of hands,'' conveying spaciousness
    or ample room. ''Broad enough'' communicates the idiomatic sense clearly in context:
    there is sufficient space/resources for them.'
- source_word: לִפְנֵיהֶם
  chosen: for them
  alternatives:
  - before them
  - available to them
  lexicon: HALOT
  rationale: Literally 'before them,' but idiomatically in this construction it means
    the land lies open/available to them. 'For them' gives the intended sense in smooth
    English.
- source_word: נִקַּח לָנוּ לְנָשִׁים
  chosen: We will take their daughters for wives for ourselves
  alternatives:
  - Let us take their daughters as wives
  - We may take their daughters as wives
  lexicon: HALOT
  rationale: The Qal imperfect 1cp can express intention/proposal in context. 'Take
    ... for wives' reflects the Hebrew marriage idiom; adding 'for ourselves' preserves
    לָנוּ, though English would often omit it.
- source_word: נִתֵּן לָהֶם
  chosen: we will give our daughters to them
  alternatives:
  - let us give our daughters to them
  lexicon: HALOT
  rationale: This parallels the previous clause and expresses reciprocal marriage
    arrangement. 'Give our daughters to them' is the standard idiom in this context
    and should not be paraphrased away.
- source_word: הִנֵּה
  chosen: for look
  alternatives:
  - behold
  - indeed
  - see
  lexicon: HALOT
  rationale: הִנֵּה marks attention to the supporting reason. 'For look' preserves
    the discourse force in contemporary English better than archaic 'behold.'
