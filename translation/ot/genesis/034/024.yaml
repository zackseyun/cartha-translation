id: GEN.34.24
reference: Genesis 34:24
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֤וּ אֶל חֲמוֹר֙ וְ/אֶל שְׁכֶ֣ם בְּנ֔/וֹ כָּל יֹצְאֵ֖י שַׁ֣עַר
    עִיר֑/וֹ וַ/יִּמֹּ֨לוּ֙ כָּל זָכָ֔ר כָּל יֹצְאֵ֖י שַׁ֥עַר עִירֽ/וֹ־־־־־׃
translation:
  text: And all who went out of the gate of his city listened to Hamor and to Shechem
    his son, and every male, all who went out of the gate of his city, was circumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all who went out of the gate of his city,' an idiom for
      the townsmen/citizens who participated in public life.
    reason: cultural_note
  - marker: b
    text: Or 'heeded' Hamor and Shechem. The Hebrew can imply not only hearing but
      responding favorably to their proposal.
    reason: lexical_alternative
  - marker: c
    text: Or 'every male, all who went out of the gate of his city, was circumcised'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ אֶל
  chosen: listened to
  alternatives:
  - heard
  - obeyed
  lexicon: HALOT
  rationale: The construction שׁמע אל commonly means to listen to or heed someone.
    In this context the townsmen are responding favorably to Hamor and Shechem's proposal,
    so 'listened to' preserves the immediate sense without overtranslating to 'obeyed,'
    which is interpretive.
- source_word: כָּל יֹצְאֵי שַׁעַר עִירוֹ
  chosen: all who went out of the gate of his city
  alternatives:
  - all who came out of the gate of his city
  - all the men of his city gate
  lexicon: HALOT
  rationale: Literally 'all the goers out of the gate of his city.' This idiom refers
    to the male townspeople/citizens participating in civic life. The more literal
    rendering is retained to preserve the Hebrew expression and its repetition in
    the verse.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: 'Straightforward filial designation modifying Shechem: ''Shechem his
    son.'' English idiom places it as ''Shechem his son'' or ''Shechem, his son'';
    in the verse it is smoothed as ''Shechem his son'' within the clause.'
- source_word: וַיִּמֹּלוּ
  chosen: was circumcised
  alternatives:
  - were circumcised
  - circumcised themselves
  lexicon: HALOT
  rationale: 'The Niphal form of מול is passive/reflexive in sense. Because the subject
    immediately following is singular collective ''every male,'' English agreement
    is best rendered as singular: ''every male ... was circumcised.'' ''Were circumcised''
    would follow the repeated plural phrase but obscures the force of כָּל זָכָר.'
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - all the males
  lexicon: HALOT
  rationale: זָכָר means 'male.' 'Every male' is more lexically precise than 'every
    man,' since the Hebrew emphasizes sex rather than age or social status. This also
    matches the collective singular construction.
- source_word: שַׁעַר עִירוֹ
  chosen: the gate of his city
  alternatives:
  - his city's gate
  lexicon: HALOT
  rationale: The city gate was the public place of assembly and decision-making. The
    translation keeps the concrete phrase rather than replacing it with an interpretive
    gloss like 'citizens' or 'leaders.'
