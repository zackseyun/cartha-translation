  from: every male, all who went out of the gate of his city, was circumcised
  to: all the males, all who went out of the gate of his city, were circumcised
  rationale: The Hebrew verb וַיִּמֹּלוּ is plural. The draft uses a singular subject
    ('every male') and verb ('was circumcised'), which creates grammatical awkwardness
    when paired with the plural appositive ('all who went out...'). Translating כָּל
    זָכָר as 'all the males' allows for a plural verb ('were circumcised'), which
    not only resolves the awkwardness in English but also more closely reflects the
    plural verb in the Hebrew source text.
