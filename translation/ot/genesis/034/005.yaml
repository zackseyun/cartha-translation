id: GEN.34.5
reference: Genesis 34:5
source:
  edition: WLC
  text: וְ/יַעֲקֹ֣ב שָׁמַ֗ע כִּ֤י טִמֵּא֙ אֶת דִּינָ֣ה בִתּ֔/וֹ וּ/בָנָ֛י/ו הָי֥וּ
    אֶת מִקְנֵ֖/הוּ בַּ/שָּׂדֶ֑ה וְ/הֶחֱרִ֥שׁ יַעֲקֹ֖ב עַד בֹּאָֽ/ם־־־׃
translation:
  text: Now Jacob heard that he had defiled his daughter Dinah. But his sons were
    with his livestock in the field, so Jacob kept silent until they came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had violated his daughter Dinah.' The Hebrew verb literally means 'defiled'
      or 'made unclean'; in this context it refers to the sexual dishonoring of Dinah.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - learned
  lexicon: HALOT
  rationale: The verb straightforwardly denotes hearing/report reception here. 'Heard'
    is the most natural and direct English rendering in narrative context.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Jacob heard, so 'that' best fits the clause.
- source_word: טִמֵּא
  chosen: had defiled
  alternatives:
  - had violated
  - had made unclean
  lexicon: HALOT
  rationale: The piel of טמא literally means 'defile/make unclean.' In this context
    of sexual violation, 'defiled' preserves the source term's moral and social force
    without over-specifying beyond the Hebrew. 'Violated' is interpretive and contextually
    plausible, but the Hebrew lexeme itself is not the ordinary verb for rape; 'made
    unclean' is too wooden in English.
- source_word: בִתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Simple construct with pronominal suffix; 'his daughter' is the natural
    rendering.
- source_word: וּבָנָיו
  chosen: But his sons
  alternatives:
  - And his sons
  - Now his sons
  lexicon: HALOT
  rationale: The conjunction links the next circumstance in mild contrast with Jacob's
    hearing. 'But' brings out the narrative tension that his sons were absent, explaining
    Jacob's silence.
- source_word: הָיוּ אֶת מִקְנֵהוּ בַּשָּׂדֶה
  chosen: were with his livestock in the field
  alternatives:
  - were in the field with his livestock
  - were tending his livestock in the field
  lexicon: HALOT
  rationale: The Hebrew states their location with the livestock rather than explicitly
    saying they were tending it. 'Were with his livestock in the field' stays close
    to the wording while remaining idiomatic.
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his cattle
  - his possessions
  lexicon: HALOT
  rationale: מִקְנֶה commonly refers to livestock/herds. 'Livestock' is broad and
    accurate; 'cattle' is too narrow, and 'possessions' is too broad here.
- source_word: וְהֶחֱרִשׁ
  chosen: kept silent
  alternatives:
  - was silent
  - said nothing
  lexicon: HALOT
  rationale: The hiphil here conveys refraining from speaking/responding. 'Kept silent'
    captures the deliberate restraint implied in context.
- source_word: עַד בֹּאָם
  chosen: until they came
  alternatives:
  - until their coming
  - until they returned
  lexicon: HALOT
  rationale: The infinitive construct with suffix means 'until their coming.' 'Until
    they came' is idiomatic English. 'Returned' is possible by context but not explicit
    in the Hebrew.
