id: GEN.34.8
reference: Genesis 34:8
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר חֲמ֖וֹר אִתָּ֣/ם לֵ/אמֹ֑ר שְׁכֶ֣ם בְּנִ֗/י חָֽשְׁקָ֤ה נַפְשׁ/וֹ֙
    בְּ/בִתְּ/כֶ֔ם תְּנ֨וּ נָ֥א אֹתָ֛/הּ ל֖/וֹ לְ/אִשָּֽׁה׃
translation:
  text: And Hamor spoke with them, saying, “My son Shechem longs for your daughter.
    Please give her to him as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “his soul is deeply attached to your daughter” / “he desires your daughter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר commonly denotes speaking or addressing. 'Spoke' fits the
    narrative introduction and preserves the distinction from the following infinitive
    'saying.'
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition את with pronominal suffix here most naturally means 'with
    them,' indicating Hamor addressed Jacob's family in conversation. English idiom
    could use 'to them,' but 'with them' more closely reflects the Hebrew.
- source_word: שְׁכֶם בְּנִי
  chosen: My son Shechem
  alternatives:
  - Shechem my son
  lexicon: HALOT
  rationale: Both English orders are possible. 'My son Shechem' is natural modern
    English while preserving the appositional relationship.
- source_word: חָשְׁקָה נַפְשׁוֹ
  chosen: longs
  alternatives:
  - is deeply attached
  - desires
  - has set his heart
  lexicon: HALOT
  rationale: Literally, 'his soul is attached to/longs for.' The idiom expresses strong
    desire or attachment. 'Longs for' captures the emotional force without over-paraphrasing;
    the singular English verb absorbs the idiomatic subject 'his soul.'
- source_word: בְּבִתְּכֶם
  chosen: for your daughter
  alternatives:
  - for your daughter among you
  - for your daughters
  lexicon: HALOT
  rationale: Though the suffix is plural ('your'), the noun is singular, referring
    collectively to the family's daughter Dinah. 'Your daughter' is the natural English
    rendering.
- source_word: תְּנוּ נָא
  chosen: Please give
  alternatives:
  - Give, please
  - I beg you, give
  lexicon: HALOT
  rationale: The imperative plus נא expresses a polite request or entreaty. 'Please
    give' is clear, natural, and preserves the courteous force.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This construction commonly means giving a woman in marriage. 'As a wife'
    is concise and idiomatic while preserving the marital sense.
