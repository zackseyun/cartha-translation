  from: by every male among you being circumcised
  to: by the circumcision of every male among you
  rationale: The current rendering uses a gerund phrase ('every male... being circumcised') that, while grammatically permissible, is stylistically awkward in English. Rephrasing with a nominalization ('by the circumcision of...') is smoother and more idiomatic, while still accurately conveying the Hebrew infinitive construct's function here as indicating the means by which the preceding condition is met.
