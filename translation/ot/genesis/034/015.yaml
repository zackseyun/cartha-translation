id: GEN.34.15
reference: Genesis 34:15
source:
  edition: WLC
  text: אַךְ בְּ/זֹ֖את נֵא֣וֹת לָ/כֶ֑ם אִ֚ם תִּהְי֣וּ כָמֹ֔/נוּ לְ/הִמֹּ֥ל לָ/כֶ֖ם כָּל זָכָֽר־־׃
translation:
  text: 'Only on this condition will we agree with you: if you become like us, by the circumcision of every male among you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Only in this will we consent to you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by every male among you being circumcised'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - But
  - However
  - Surely
  lexicon: HALOT
  rationale: Here אַךְ restricts the terms of agreement rather than marking contrast alone; 'Only' naturally conveys exclusivity in English.
- source_word: בְּזֹאת
  chosen: on this condition
  alternatives:
  - in this
  - by this
  lexicon: HALOT
  rationale: The preposition plus demonstrative is idiomatic in context, introducing the specific stipulation for consent. 'On this condition' expresses the sense more clearly than a wooden 'in this'.
- source_word: נֵאוֹת
  chosen: will we agree
  alternatives:
  - will we consent
  - will we comply
  lexicon: HALOT
  rationale: From אוה in the Niphal, the sense is willingness/consent. 'Agree' is idiomatic modern English in this negotiation context.
- source_word: לָכֶם
  chosen: with you
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: Although formally 'to/for you,' English idiom with 'agree' requires 'with you'; this reflects the relational sense in context.
- source_word: אִם
  chosen: if
  alternatives:
  - provided that
  lexicon: HALOT
  rationale: Standard conditional marker introducing the requirement.
- source_word: תִּהְיוּ כָמֹנוּ
  chosen: you become like us
  alternatives:
  - you are like us
  - you will be like us
  lexicon: HALOT
  rationale: With היה in a conditional clause, the sense is entering a state. 'Become like us' best fits the demanded change of status/practice.
- source_word: לְהִמֹּל
  chosen: by ... being circumcised
  alternatives:
  - to be circumcised
  - in being circumcised
  lexicon: HALOT
  rationale: The infinitive construct explains how they would become like 'us.' Rendering it instrumentally with 'by' makes the syntax clear in English.
- source_word: כָּל זָכָר
  chosen: every male among you
  alternatives:
  - every male
  - all your males
  lexicon: HALOT
  rationale: כָּל זָכָר is distributive, and the repeated לָכֶם indicates those belonging to their group. 'Every male among you' is natural and precise.
