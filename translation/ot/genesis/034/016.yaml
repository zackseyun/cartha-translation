id: GEN.34.16
reference: Genesis 34:16
source:
  edition: WLC
  text: וְ/נָתַ֤נּוּ אֶת בְּנֹתֵ֨י/נוּ֙ לָ/כֶ֔ם וְ/אֶת בְּנֹתֵי/כֶ֖ם נִֽקַּֽח לָ֑/נוּ
    וְ/יָשַׁ֣בְנוּ אִתְּ/כֶ֔ם וְ/הָיִ֖ינוּ לְ/עַ֥ם אֶחָֽד־־־׃
translation:
  text: then we will give our daughters to you, and we will take your daughters for
    ourselves, and we will live with you and become one people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and we will be one people.' The Hebrew is literally 'and we will be
      for one people,' which can be rendered either as a resulting state ('become
      one people') or more formally ('be one people').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַנּוּ
  chosen: then we will give
  alternatives:
  - and we will give
  lexicon: HALOT
  rationale: Qal perfect 1cp with prefixed waw in this conditional negotiation context
    carries a future/result sense after the prior condition, naturally rendered in
    English as 'then we will give' rather than a simple past.
- source_word: בְּנֹתֵינוּ
  chosen: our daughters
  lexicon: HALOT
  rationale: Literal familial term; no reason to generalize beyond 'daughters.'
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of giving; 'to you' is the
    most natural English equivalent here.
- source_word: בְּנֹתֵיכֶם
  chosen: your daughters
  lexicon: HALOT
  rationale: Literal familial term matching the reciprocal marriage arrangement in
    the verse.
- source_word: נִקַּח
  chosen: we will take
  alternatives:
  - we will take in marriage
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this context it refers to taking
    wives in marriage, but the marriage sense is sufficiently clear from context,
    so the simpler 'take' preserves the Hebrew wording without over-paraphrase.
- source_word: לָנוּ
  chosen: for ourselves
  alternatives:
  - for us
  lexicon: HALOT
  rationale: English idiom prefers 'take ... for ourselves' in this reciprocal-marriage
    context; it brings out the dative force naturally.
- source_word: וְיָשַׁבְנוּ
  chosen: we will live
  alternatives:
  - we will dwell
  - we will settle
  lexicon: HALOT
  rationale: ישב commonly means 'dwell, live, settle.' 'Live with you' is the most
    natural modern English in this social-settlement context.
- source_word: אִתְּכֶם
  chosen: with you
  lexicon: HALOT
  rationale: Straightforward comitative preposition.
- source_word: וְהָיִינוּ
  chosen: and become
  alternatives:
  - and we will be
  lexicon: HALOT
  rationale: Though literally 'and we will be,' English idiom after a process of intermarriage
    and cohabitation is better expressed as 'become,' highlighting the resultant state
    without departing from the sense of היה.
- source_word: לְעַם אֶחָד
  chosen: one people
  alternatives:
  - one nation
  - a single people
  lexicon: HALOT
  rationale: עם denotes a people-group rather than a modern political nation-state.
    'One people' best captures the social and ethnic union proposed.
