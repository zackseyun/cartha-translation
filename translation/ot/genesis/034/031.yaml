id: GEN.34.31
reference: Genesis 34:31
source:
  edition: WLC
  text: וַ/יֹּאמְר֑וּ הַ/כְ/זוֹנָ֕ה יַעֲשֶׂ֖ה אֶת אֲחוֹתֵֽ/נוּ־׃פ
translation:
  text: But they said, “Should he treat our sister like a prostitute?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Should he make our sister like a prostitute?' The Hebrew verb is literally
      'do/make,' but here likely carries the sense 'treat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: But they said
  alternatives:
  - And they said
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the brothers' reply. 'But' best captures
    the adversative force in context, responding sharply to Jacob's rebuke in the
    previous verse, while remaining within the narrative function of waw-consecutive.
- source_word: הַכְזוֹנָה
  chosen: like a prostitute
  alternatives:
  - as a prostitute
  - like a harlot
  lexicon: HALOT
  rationale: The prefixed interrogative ה plus preposition כ and noun זונה yields
    'like/as a prostitute?' The noun denotes a prostitute. 'Like a prostitute' is
    idiomatic modern English and preserves the comparative force of כ. 'Harlot' is
    archaic and less accessible.
- source_word: יַעֲשֶׂה
  chosen: Should he treat
  alternatives:
  - Should he do this to
  - Would he make
  lexicon: HALOT
  rationale: 'עשה is broad (''do, make''), but with את plus a person as object and
    in this context of sexual violation and dishonor, English ''treat'' best conveys
    the idiomatic sense without over-paraphrasing. The imperfect is rendered as a
    rhetorical question in English: ''Should he treat...?''.'
- source_word: אֶת
  chosen: our sister
  lexicon: HALOT
  rationale: Direct-object marker not translated independently in English; its function
    is reflected in the object phrase.
- source_word: אֲחוֹתֵנוּ
  chosen: our sister
  lexicon: HALOT
  rationale: Straightforward possessive noun phrase. 'Sister' preserves the familial
    and honor-related force central to the brothers' response.
