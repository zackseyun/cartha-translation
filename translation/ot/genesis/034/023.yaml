id: GEN.34.23
reference: Genesis 34:23
source:
  edition: WLC
  text: מִקְנֵ/הֶ֤ם וְ/קִנְיָנָ/ם֙ וְ/כָל בְּהֶמְתָּ֔/ם הֲ/ל֥וֹא לָ֖/נוּ הֵ֑ם אַ֚ךְ
    נֵא֣וֹתָה לָ/הֶ֔ם וְ/יֵשְׁב֖וּ אִתָּֽ/נוּ־׃
translation:
  text: Will not their livestock, their property, and all their animals be ours? Only
    let us agree with them, and they will dwell with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their possessions' for 'their property.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let us consent to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or acquired herd animals. 'Livestock'
    is broad, natural English and fits the economic sense here.
- source_word: קִנְיָנָם
  chosen: their property
  alternatives:
  - their possessions
  - their wealth
  lexicon: HALOT
  rationale: קִנְיָן refers to acquired property/possessions. 'Property' preserves
    the material-economic force without narrowing it to movable goods only.
- source_word: כָל בְּהֶמְתָּם
  chosen: all their animals
  alternatives:
  - all their beasts
  - all their cattle
  lexicon: HALOT
  rationale: בְּהֵמָה is a broad term for beasts/animals, often domesticated. Since
    livestock has already rendered מִקְנֶה, 'animals' avoids awkward repetition while
    preserving the comprehensive sense introduced by כָל.
- source_word: הֲלוֹא לָנוּ הֵם
  chosen: Will not ... be ours?
  alternatives:
  - Are they not ours?
  - Will they not belong to us?
  lexicon: HALOT
  rationale: The interrogative הֲלוֹא introduces a rhetorical question expecting agreement.
    'Will not ... be ours?' captures the persuasive rhetorical force in idiomatic
    English.
- source_word: אַךְ
  chosen: Only
  alternatives:
  - surely
  - just
  lexicon: HALOT
  rationale: 'אַךְ here marks limitation or focus: only/just on this condition. ''Only''
    best introduces the proposed condition in smooth English.'
- source_word: נֵאֹותָה
  chosen: let us agree with them
  alternatives:
  - let us consent to them
  - let us comply with them
  lexicon: HALOT
  rationale: From אוה in the Niphal/cohortative-like form, the sense is to consent,
    be willing, or agree. 'Let us agree with them' is idiomatic and fits the negotiation
    context.
- source_word: וְיֵשְׁבוּ אִתָּנוּ
  chosen: and they will dwell with us
  alternatives:
  - and they will live with us
  - and they will settle among us
  lexicon: HALOT
  rationale: יָשַׁב commonly means dwell/live/settle. 'Dwell with us' preserves the
    settlement nuance and echoes the social integration proposed in the narrative.
