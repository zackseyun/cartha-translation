theological_decisions:
- issue: Emotional language after the assault in the broader context
  chosen_reading: Retain the verse's own description of Shechem's attachment and love
    without softening or excusing the wrongdoing narrated in the surrounding context.
  alternative_readings:
  - Use more negative language in the translation itself to foreground moral judgment
  - Use more romantic language to harmonize the sequence
  rationale: The Hebrew text here reports Shechem's attachment, love, and speech in
    straightforward terms. The translation should neither sanitize the prior violence
    nor import an interpretive moral gloss into this verse beyond what the words themselves
    state.
  doctrine_reference: Translation philosophy §§1, 3, 6
