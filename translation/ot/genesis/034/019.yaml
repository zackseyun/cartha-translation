  from: and he was more honored than anyone in his father’s house
  to: and he was the most honored in all his father’s house
  rationale: The Hebrew construction '[adjective] + מִכֹּל' is a standard idiom for
    the superlative. While the current rendering as a comparative ('more honored than
    anyone') is semantically equivalent, it is less direct and slightly more cumbersome
    in English than the superlative ('the most honored'). The suggested rewrite, which
    is already present in footnote 'c', is a more natural and common rendering for
    this Hebrew grammatical form, as seen in most major English translations (ESV,
    NIV, NRSVUE).
