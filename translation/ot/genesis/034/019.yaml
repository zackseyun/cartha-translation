id: GEN.34.19
reference: Genesis 34:19
source:
  edition: WLC
  text: וְ/לֹֽא אֵחַ֤ר הַ/נַּ֨עַר֙ לַ/עֲשׂ֣וֹת הַ/דָּבָ֔ר כִּ֥י חָפֵ֖ץ בְּ/בַֽת יַעֲקֹ֑ב
    וְ/ה֣וּא נִכְבָּ֔ד מִ/כֹּ֖ל בֵּ֥ית אָבִֽי/ו־־׃
translation:
  text: And the young man did not delay to do the thing, because he delighted in Jacob’s
    daughter, and he was honored above all his father’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not hesitate to do this thing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he desired Jacob’s daughter' or 'he was pleased with Jacob’s daughter.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he was the most honored in all his father’s house.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and he was more honored than anyone in his father’s house'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֵחַר
  chosen: did not delay
  alternatives:
  - did not hesitate
  - was not late
  lexicon: HALOT
  rationale: The verb means to delay or tarry. In context, it indicates prompt action
    rather than emotional reluctance, so 'did not delay' best captures the temporal
    sense.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the youth
  - the boy
  lexicon: HALOT
  rationale: Refers to Shechem. 'Young man' fits the narrative context better than
    'boy' and is more natural than 'youth' in contemporary English.
- source_word: לַעֲשׂוֹת הַדָּבָר
  chosen: to do the thing
  alternatives:
  - to do this thing
  - to do what was asked
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom and refers back
    to the demanded action in the prior context. 'The thing' is slightly more formal
    but remains readable.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for his promptness. 'Because' is clearer in modern
    English than 'for' while preserving the causal force.
- source_word: חָפֵץ
  chosen: delighted in
  alternatives:
  - took pleasure in
  - desired
  - was pleased with
  lexicon: HALOT
  rationale: The verb conveys strong pleasure or desire. 'Delighted in' preserves
    the affective force without reducing it merely to sexual desire, though desire
    is certainly included by context.
- source_word: בְּבַת יַעֲקֹב
  chosen: in Jacob’s daughter
  alternatives:
  - in the daughter of Jacob
  - for Jacob’s daughter
  lexicon: HALOT
  rationale: With חפץ, the preposition is naturally rendered in English as 'in.' 'Jacob’s
    daughter' is idiomatic and clear.
- source_word: נִכְבָּד
  chosen: more honored than anyone
  alternatives:
  - the most honored
  - more respected than all
  - weightier than all
  lexicon: HALOT
  rationale: The Niphal participle from כבד denotes being honored, weighty, or esteemed.
    The comparative phrase מִכֹּל is best brought out explicitly as 'more honored
    than anyone' rather than a simple superlative.
- source_word: מִכֹּל בֵּית אָבִיו
  chosen: than anyone in his father’s house
  alternatives:
  - than all his father’s household
  - than anyone of his father’s house
  lexicon: HALOT
  rationale: This phrase denotes comparison with the members of his father's household/clan.
    'Than anyone in his father’s house' is natural English and preserves the comparative
    sense.
