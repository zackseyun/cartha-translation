id: GEN.34.26
reference: Genesis 34:26
source:
  edition: WLC
  text: וְ/אֶת חֲמוֹר֙ וְ/אֶת שְׁכֶ֣ם בְּנ֔/וֹ הָרְג֖וּ לְ/פִי חָ֑רֶב וַ/יִּקְח֧וּ
    אֶת דִּינָ֛ה מִ/בֵּ֥ית שְׁכֶ֖ם וַ/יֵּצֵֽאוּ־־־־׃
translation:
  text: They also killed Hamor and his son Shechem with the sword, and they took Dinah
    from Shechem’s house and went out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'by the mouth of the sword,' an idiom meaning death by
      the sword.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: They also
  alternatives:
  - And
  - Also
  lexicon: HALOT
  rationale: The conjunction plus object marker links this action to the previous
    verse and adds Hamor and Shechem as additional objects of the brothers' violence.
    English does not render the object marker directly, so the additive force is brought
    out with 'also'.
- source_word: חֲמוֹר
  chosen: Hamor
  lexicon: HALOT
  rationale: Proper name; transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: שְׁכֶם בְּנוֹ
  chosen: his son Shechem
  alternatives:
  - Shechem his son
  - Shechem, his son
  lexicon: HALOT
  rationale: The construct with pronominal suffix identifies Shechem as Hamor's son.
    'His son Shechem' is natural modern English while preserving the familial relation
    explicit in Hebrew.
- source_word: הָרְגוּ
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: Standard rendering of הרג in narrative prose. 'Killed' is clear, direct,
    and appropriately modern.
- source_word: לְפִי חָרֶב
  chosen: with the sword
  alternatives:
  - by the edge of the sword
  - with the edge of the sword
  lexicon: HALOT
  rationale: Literally 'to/by the mouth of the sword,' a Hebrew idiom for death by
    sword. 'With the sword' preserves the sense in readable English; the more literal
    idiom is worth preserving in a footnote.
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they seized
  lexicon: HALOT
  rationale: A straightforward narrative wayyiqtol of לקח. 'Took' is the broad default
    and avoids overstating the nuance beyond the source text.
- source_word: אֶת דִּינָה
  chosen: Dinah
  lexicon: HALOT
  rationale: Direct object marker omitted in English; proper name transliterated.
- source_word: מִבֵּית שְׁכֶם
  chosen: from Shechem’s house
  alternatives:
  - from the house of Shechem
  - out of Shechem's household
  lexicon: HALOT
  rationale: בית here most naturally denotes the physical house/dwelling from which
    Dinah was taken. 'From Shechem’s house' is idiomatic and preserves the possessive
    relation. 'Household' is possible but less concrete than the immediate narrative
    setting suggests.
- source_word: וַיֵּצֵאוּ
  chosen: and went out
  alternatives:
  - and left
  - and came out
  lexicon: HALOT
  rationale: The verb יצא means 'go out/come out.' 'Went out' preserves the movement
    away from the house without adding interpretive detail.
