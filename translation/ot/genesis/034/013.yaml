id: GEN.34.13
reference: Genesis 34:13
source:
  edition: WLC
  text: וַ/יַּעֲנ֨וּ בְנֵֽי יַעֲקֹ֜ב אֶת שְׁכֶ֨ם וְ/אֶת חֲמ֥וֹר אָבִ֛י/ו בְּ/מִרְמָ֖ה
    וַ/יְדַבֵּ֑רוּ אֲשֶׁ֣ר טִמֵּ֔א אֵ֖ת דִּינָ֥ה אֲחֹתָֽ/ם־־־׃
translation:
  text: Jacob’s sons answered Shechem and Hamor his father deceitfully, and they spoke
    because he had defiled Dinah their sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with deceit.' The Hebrew phrase uses a noun, 'in/with deceit,' functioning
      adverbially.
    reason: lexical_alternative
  - marker: b
    text: Or 'had violated Dinah their sister.' The Hebrew says 'had defiled,' preserving
      the text's moral and ritual language.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: ענה in this narrative context introduces a response to a prior proposal,
    so 'answered' is the most natural and sufficiently formal rendering.
- source_word: בְנֵי יַעֲקֹב
  chosen: Jacob’s sons
  alternatives:
  - the sons of Jacob
  lexicon: HALOT
  rationale: Construct phrase literally means 'sons of Jacob.' 'Jacob’s sons' is idiomatic
    modern English while preserving the familial identification.
- source_word: בְּמִרְמָה
  chosen: deceitfully
  alternatives:
  - with deceit
  - treacherously
  lexicon: HALOT
  rationale: The noun מִרְמָה denotes deceit or treachery. 'Deceitfully' fits the
    adverbial force of the prepositional phrase in smooth English. 'With deceit' is
    possible but less natural.
- source_word: וַיְדַבֵּרוּ
  chosen: and they spoke
  alternatives:
  - and they said
  lexicon: HALOT
  rationale: דבר is broader than אמר and commonly rendered 'speak.' Here it continues
    the narrative action after 'answered'; 'spoke' preserves the verbal distinction,
    though English could also use 'said.'
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - for
  - since
  - who
  lexicon: HALOT
  rationale: The relative particle here introduces the reason for their deceitful
    response, not a simple relative clause. 'Because' best captures the causal sense
    in context.
- source_word: טִמֵּא
  chosen: had defiled
  alternatives:
  - had violated
  - had dishonored
  lexicon: HALOT
  rationale: טמא in the piel means to make unclean/defile. In this sexual-violence
    context, 'defiled' preserves the source term's moral-ritual weight without softening
    the offense. 'Violated' is contextually apt but shifts from the Hebrew lexical
    field.
- source_word: אֲחֹתָם
  chosen: their sister
  lexicon: HALOT
  rationale: Straightforward possessive construct; 'their sister' preserves the familial
    relationship that motivates the brothers' response.
- source_word: אֶת שְׁכֶם וְאֶת חֲמוֹר אָבִיו
  chosen: Shechem and Hamor his father
  alternatives:
  - Shechem and his father Hamor
  lexicon: HALOT
  rationale: The direct objects are Shechem and Hamor, with the apposition 'his father'
    referring to Hamor. 'Hamor his father' is slightly more formal; the alternative
    is more idiomatic but equally accurate.
