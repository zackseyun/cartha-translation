id: GEN.34.20
reference: Genesis 34:20
source:
  edition: WLC
  text: וַ/יָּבֹ֥א חֲמ֛וֹר וּ/שְׁכֶ֥ם בְּנ֖/וֹ אֶל שַׁ֣עַר עִירָ֑/ם וַֽ/יְדַבְּר֛וּ
    אֶל אַנְשֵׁ֥י עִירָ֖/ם לֵ/אמֹֽר־־׃
translation:
  text: So Hamor and Shechem his son came to the gate of their city and spoke to the
    men of their city, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the city gate.' The Hebrew is literally 'to the gate of their city.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the men of their city'; this likely refers to the male townsmen
      assembled for civic deliberation at the gate.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly advances narrative with 'came' or 'went'
    depending on viewpoint. English idiom with the destination 'to the gate of their
    city' favors 'came.'
- source_word: חֲמוֹר
  chosen: Hamor
  rationale: Proper name; transliterated per translation philosophy rather than translated.
- source_word: וּשְׁכֶם בְּנוֹ
  chosen: and Shechem his son
  alternatives:
  - and his son Shechem
  rationale: Preserves the appositional relationship and natural English word order
    while keeping the filial identification explicit.
- source_word: אֶל שַׁעַר עִירָם
  chosen: to the gate of their city
  alternatives:
  - to the city gate
  - to the gate of the city
  lexicon: HALOT
  rationale: שַׁעַר is literally 'gate.' In ancient Near Eastern context the city
    gate is the public place of civic deliberation. The more literal 'the gate of
    their city' preserves the Hebrew construct and possessive suffix.
- source_word: וַיְדַבְּרוּ
  chosen: spoke
  alternatives:
  - said
  - addressed
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to/address.' 'Spoke' fits the formal
    public setting and pairs naturally with the following indirect speech marker.
- source_word: אֶל אַנְשֵׁי עִירָם
  chosen: to the men of their city
  alternatives:
  - to the people of their city
  - to the citizens of their city
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Given the civic setting and the likely
    male decision-makers at the gate, 'men' is more gender-accurate to the source
    than a neutral collective such as 'people,' in line with the stated philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard Hebrew speech introducer; 'saying' is the conventional and sufficiently
    natural rendering in narrative.
