id: GEN.34.27
reference: Genesis 34:27
source:
  edition: WLC
  text: בְּנֵ֣י יַעֲקֹ֗ב בָּ֚אוּ עַל הַ֣/חֲלָלִ֔ים וַ/יָּבֹ֖זּוּ הָ/עִ֑יר אֲשֶׁ֥ר טִמְּא֖וּ אֲחוֹתָֽ/ם־׃
translation:
  text: The sons of Jacob came upon the slain and plundered the city, because their sister had been defiled there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came against the slain.' The Hebrew construction can suggest movement upon or against those already killed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the city which they had defiled their sister.' The Hebrew relative clause is somewhat compressed; the translation expresses the likely causal sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'because they had defiled their sister'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּנֵי יַעֲקֹב
  chosen: The sons of Jacob
  alternatives:
  - Jacob's sons
  lexicon: HALOT
  rationale: Construct phrase literally means 'sons of Jacob.' Kept explicit familial wording rather than smoothing to a possessive, to preserve the Hebrew form and the narrative emphasis on Jacob's sons as a group.
- source_word: בָּאוּ עַל
  chosen: came upon
  alternatives:
  - came against
  - came upon them
  lexicon: HALOT
  rationale: The verb 'came' with עַל can indicate movement against or upon someone/something. 'Came upon' preserves the concise Hebrew sense without over-interpreting it as a military assault, since the immediate object is 'the slain.'
- source_word: הַחֲלָלִים
  chosen: the slain
  alternatives:
  - the dead
  - the wounded
  lexicon: HALOT
  rationale: חֲלָלִים commonly denotes those slain, especially in violent conflict. 'The slain' is more precise than the broader 'dead' and fits the immediate aftermath of the massacre.
- source_word: וַיָּבֹזּוּ
  chosen: plundered
  alternatives:
  - spoiled
  - looted
  lexicon: HALOT
  rationale: The verb בזז refers to taking spoil. 'Plundered' is clear modern English and appropriately conveys organized seizure of goods after violence; 'spoiled' is archaic and 'looted' can sound too colloquial.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עִיר is the standard term for 'city.' Retained the conventional rendering.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - which
  - where
  lexicon: HALOT
  rationale: 'Although אֲשֶׁר is formally a relative particle (''which/that''), in this context the clause explains the reason for the plundering: the city was the place whose men had defiled Dinah. Rendering it as ''because'' brings out the causal force implicit in the Hebrew syntax and narrative logic.'
- source_word: טִמְּאוּ
  chosen: had defiled
  alternatives:
  - had made unclean
  - had violated
  lexicon: HALOT
  rationale: טמא in the piel means to defile or make unclean. Here it refers to the sexual violation of Dinah in a way that carries both moral and ritual-social force. 'Had defiled' preserves that semantic range better than the narrower 'violated' or the overly literal 'made unclean.'
- source_word: אֲחוֹתָם
  chosen: their sister
  alternatives:
  - their own sister
  lexicon: HALOT
  rationale: Straightforward possessive rendering of the Hebrew. 'Their sister' preserves the familial offense that motivates the action.
