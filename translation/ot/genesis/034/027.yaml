  category: mistranslation
  tier: 2
  from: because they had defiled their sister
  to: because their sister had been defiled there
  rationale: The current rendering creates a severe ambiguity where the pronoun 'they' most naturally refers to the subject of the main clause, 'The sons of Jacob.' This incorrectly implies that Jacob's sons were the ones who defiled their sister, which is the opposite of the narrative's meaning. The Hebrew clause `אֲשֶׁר טִמְּאוּ אֲחוֹתָם` functions as the reason for plundering the city, indicating that the defilement was perpetrated by the city's inhabitants. The suggested rewrite, 'because their sister had been defiled there,' resolves this critical ambiguity by using the passive voice and the adverb 'there,' correctly linking the defilement to the city without misidentifying the perpetrators.
