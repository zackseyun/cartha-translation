id: GEN.34.2
reference: Genesis 34:2
source:
  edition: WLC
  text: וַ/יַּ֨רְא אֹתָ֜/הּ שְׁכֶ֧ם בֶּן חֲמ֛וֹר הַֽ/חִוִּ֖י נְשִׂ֣יא הָ/אָ֑רֶץ וַ/יִּקַּ֥ח
    אֹתָ֛/הּ וַ/יִּשְׁכַּ֥ב אֹתָ֖/הּ וַ/יְעַנֶּֽ/הָ־׃
translation:
  text: When Shechem son of Hamor the Hivite, the prince of the land, saw her, he
    took her and lay with her and violated her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humiliated her.' The Hebrew verb can denote affliction, humiliation,
      or violation; in this context it refers to sexual violation.
    reason: lexical_alternative
  - marker: b
    text: Many translations render the final clause more explicitly as 'raped her'
      to bring out the coercive force of the whole expression.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - noticed
  lexicon: HALOT
  rationale: Basic narrative sense of ראה in the wayyiqtol sequence; 'saw' is the
    plain and natural rendering.
- source_word: שְׁכֶם בֶּן־חֲמוֹר
  chosen: Shechem son of Hamor
  alternatives:
  - Shechem, the son of Hamor
  rationale: Personal names are transliterated by standard conventions; construct
    relationship rendered naturally in English.
- source_word: הַחִוִּי
  chosen: the Hivite
  lexicon: HALOT
  rationale: Ethnic designation rendered by the standard English people-name.
- source_word: נְשִׂיא הָאָרֶץ
  chosen: the prince of the land
  alternatives:
  - a prince of the land
  - the ruler of the land
  - the chief of the land
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a leader, chief, or prince. 'Prince' preserves
    the social-political status without over-specifying kingship; the article favors
    'the prince of the land' in apposition to Shechem.
- source_word: וַיִּקַּח אֹתָהּ
  chosen: he took her
  alternatives:
  - he seized her
  lexicon: HALOT
  rationale: לקח is literally 'take.' In this context it introduces an act of sexual
    violence, but the violence is more explicitly conveyed by the following verbs.
    Retaining 'took her' preserves the Hebrew sequence while allowing the final clause
    to state the violation.
- source_word: וַיִּשְׁכַּב אֹתָהּ
  chosen: lay with her
  alternatives:
  - slept with her
  lexicon: HALOT
  rationale: Standard idiom for sexual intercourse. 'Lay with her' is more literal
    and suitably grave for the context than the more colloquial 'slept with her.'
- source_word: וַיְעַנֶּהָ
  chosen: violated her
  alternatives:
  - humiliated her
  - raped her
  - afflicted her
  lexicon: HALOT
  rationale: ענה in the piel can mean to afflict, humble, or violate. In this sexual
    context (cf. Gen 34:2; Deut 22:24, 29; 2 Sam 13:12, 14), 'violated her' best captures
    the dishonoring and coercive force without importing more specificity than the
    Hebrew verb alone states. 'Raped her' is a strong contextual interpretation many
    translations adopt, but 'violated her' stays closer to the lexical range while
    still making clear that this was sexual violence.
