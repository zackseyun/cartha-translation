id: GEN.34.9
reference: Genesis 34:9
source:
  edition: WLC
  text: וְ/הִֽתְחַתְּנ֖וּ אֹתָ֑/נוּ בְּנֹֽתֵי/כֶם֙ תִּתְּנוּ לָ֔/נוּ וְ/אֶת בְּנֹתֵ֖י/נוּ
    תִּקְח֥וּ לָ/כֶֽם־־׃
translation:
  text: 'Intermarry with us: give your daughters to us, and take our daughters for
    yourselves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Make marriages with us.' The Hebrew verb expresses entering
      marriage alliances mutually.
    reason: lexical_alternative
  - marker: b
    text: That is, in marriage; the marriage sense governs both 'give' and 'take'
      in this verse.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְחַתְּנוּ אֹתָנוּ
  chosen: Intermarry with us
  alternatives:
  - Make marriages with us
  - Become related to us by marriage
  lexicon: HALOT
  rationale: The hitpael of חתן here denotes entering into marriage alliances mutually,
    not merely a single act of giving in marriage. 'Intermarry with us' is idiomatic
    modern English and captures the reciprocal sense better than a more wooden 'make
    marriages with us.'
- source_word: בְּנֹתֵיכֶם
  chosen: your daughters
  lexicon: HALOT
  rationale: Straightforward plural construct with 2mp suffix; rendered literally
    as 'your daughters.'
- source_word: תִּתְּנוּ לָנוּ
  chosen: give ... to us
  alternatives:
  - give in marriage to us
  lexicon: HALOT
  rationale: נתן plus indirect object here refers to giving daughters in marriage.
    The shorter 'give your daughters to us' is natural English and the marriage sense
    is already established by the opening imperative. The fuller alternative is possible
    but somewhat heavier.
- source_word: וְאֶת בְּנֹתֵינוּ תִּקְחוּ לָכֶם
  chosen: and take our daughters for yourselves
  alternatives:
  - and take our daughters for yourselves as wives
  - and marry our daughters
  lexicon: HALOT
  rationale: לקח with 'daughters' in this context means taking in marriage. 'Take
    our daughters for yourselves' preserves the Hebrew wording and reciprocal structure,
    while 'as wives' is interpretive though contextually correct.
