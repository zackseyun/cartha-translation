id: GEN.34.18
reference: Genesis 34:18
source:
  edition: WLC
  text: וַ/יִּֽיטְב֥וּ דִבְרֵי/הֶ֖ם בְּ/עֵינֵ֣י חֲמ֑וֹר וּ/בְ/עֵינֵ֖י שְׁכֶ֥ם בֶּן
    חֲמֽוֹר־׃
translation:
  text: Their words seemed good to Hamor and to Shechem son of Hamor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Their words were pleasing to Hamor and to Shechem son of Hamor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטְבוּ
  chosen: seemed good
  alternatives:
  - were pleasing
  - were good
  lexicon: HALOT
  rationale: From יטב in the waw-consecutive imperfect plural, here with דִבְרֵיהֶם
    as subject and the idiom בְּעֵינֵי ('in the eyes of'). In English, 'seemed good'
    naturally conveys the evaluative sense of 'was pleasing/acceptable' without sounding
    wooden.
- source_word: דִבְרֵיהֶם
  chosen: their words
  alternatives:
  - their proposal
  - their speech
  lexicon: HALOT
  rationale: Literal construct plural of דָּבָר with 3mp suffix. 'Words' preserves
    the lexical form; 'proposal' is interpretive and narrower than the Hebrew.
- source_word: בְּעֵינֵי
  chosen: to
  alternatives:
  - in the eyes of
  - in the opinion of
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in the eyes of,' expressing evaluation
    or approval. In smooth modern English after 'seemed good,' the dative-like 'to'
    best conveys the sense while avoiding awkward repetition.
- source_word: חֲמוֹר
  chosen: Hamor
  rationale: Proper personal name; transliterated according to the translation philosophy.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Proper personal name; transliterated according to the translation philosophy.
- source_word: בֶּן חֲמוֹר
  chosen: son of Hamor
  alternatives:
  - Hamor's son
  lexicon: HALOT
  rationale: Standard filial expression. 'Son of Hamor' is slightly more formal and
    keeps the Hebrew order and narrative identification.
