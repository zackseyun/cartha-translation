id: GEN.34.6
reference: Genesis 34:6
source:
  edition: WLC
  text: וַ/יֵּצֵ֛א חֲמ֥וֹר אֲבִֽי שְׁכֶ֖ם אֶֽל יַעֲקֹ֑ב לְ/דַבֵּ֖ר אִתּֽ/וֹ־־׃
translation:
  text: Then Hamor, the father of Shechem, went out to Jacob to speak with him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: The verb יצא in the wayyiqtol form narrates a simple past action, literally
    'went out.' 'Went out' preserves the directional nuance better than a flattened
    'came' or merely 'went.'
- source_word: חֲמוֹר
  chosen: Hamor
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: אֲבִי שְׁכֶם
  chosen: the father of Shechem
  alternatives:
  - Shechem's father
  lexicon: HALOT
  rationale: The construct chain is most directly rendered 'the father of Shechem.'
    'Shechem's father' is idiomatic English, but the fuller form preserves the Hebrew
    relationship clearly in this narrative context.
- source_word: אֶל יַעֲקֹב
  chosen: to Jacob
  alternatives:
  - toward Jacob
  lexicon: HALOT
  rationale: אֶל commonly marks movement toward a person; 'to Jacob' is the natural
    English equivalent here.
- source_word: לְדַבֵּר אִתּוֹ
  chosen: to speak with him
  alternatives:
  - to speak to him
  - to talk with him
  lexicon: HALOT
  rationale: 'The infinitive plus preposition expresses purpose: Hamor went out for
    the purpose of speaking. With דבר plus אֵת/אִם sense, ''speak with him'' captures
    a conversational encounter better than the more one-directional ''speak to him.''
    The pronoun most naturally refers to Jacob, the immediately preceding referent.'
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the wayyiqtol advances the narrative. 'Then' conveys
    sequential narrative movement in natural modern English while preserving the connective
    force.
