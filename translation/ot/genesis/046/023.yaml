id: GEN.46.23
reference: Genesis 46:23
source:
  edition: WLC
  text: וּ/בְנֵי דָ֖ן חֻשִֽׁים־׃
translation:
  text: 'And the sons of Dan: Hushim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is terse: literally, ''And the sons of Dan: Hushim.'' Although ''sons''
      is plural, Hushim is a proper name and elsewhere appears as Dan''s single descendant
      in this genealogy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: The conjunction ו is naturally carried as 'And' in this genealogical
    list, preserving the additive sequence. בְנֵי is the construct plural of 'son'
    and in genealogical contexts is best rendered 'sons of' rather than the broader
    'children of,' since the Hebrew form is specifically masculine plural and the
    verse lists a named descendant.
- source_word: דָן
  chosen: Dan
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    by standard English convention.
- source_word: חֻשִׁים
  chosen: Hushim
  alternatives:
  - Hushim was his son
  lexicon: HALOT
  rationale: Proper personal name, transliterated. Although the form appears plural
    in shape, in this context it functions as a personal name. The Hebrew text as
    given is terse and verbless, so the translation preserves the nominal style rather
    than expanding it interpretively to 'Hushim was his son.'
