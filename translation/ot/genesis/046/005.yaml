id: GEN.46.5
reference: Genesis 46:5
source:
  edition: WLC
  text: וַ/יָּ֥קָם יַעֲקֹ֖ב מִ/בְּאֵ֣ר שָׁ֑בַע וַ/יִּשְׂא֨וּ בְנֵֽי יִשְׂרָאֵ֜ל אֶת
    יַעֲקֹ֣ב אֲבִי/הֶ֗ם וְ/אֶת טַפָּ/ם֙ וְ/אֶת נְשֵׁי/הֶ֔ם בָּ/עֲגָל֕וֹת אֲשֶׁר שָׁלַ֥ח
    פַּרְעֹ֖ה לָ/שֵׂ֥את אֹתֽ/וֹ־־־־־׃
translation:
  text: Then Jacob set out from Beersheba, and the sons of Israel carried Jacob their
    father, their little ones, and their wives in the wagons that Pharaoh had sent
    to carry him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arose from Beersheba.' The Hebrew verb is literally 'rose,' but in travel
      context it functions idiomatically for departure.
    reason: lexical_alternative
  - marker: b
    text: Or 'the children of Israel.' Here the phrase refers specifically to Jacob's
      sons, so 'sons' is more precise.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: set out
  alternatives:
  - arose
  - got up
  - departed
  lexicon: HALOT
  rationale: Though the verb literally means 'arose' or 'got up,' in travel narrative
    with the following מן + place it idiomatically signals departure. 'Set out' conveys
    the movement naturally in modern English without over-paraphrasing.
- source_word: מִבְּאֵר שָׁבַע
  chosen: from Beersheba
  alternatives:
  - from Beer-sheba
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; 'from' directly reflects
    the prefixed preposition.
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - bore
  - lifted
  - transported
  lexicon: HALOT
  rationale: The verb נשׂא commonly means 'carry/bear.' Here, with persons loaded
    into wagons, 'carried' is the most natural and sufficiently literal rendering.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - Israel's sons
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by project philosophy. In this
    immediate context it refers specifically to Jacob's male offspring, not the nation
    generically, so 'sons' is more precise than traditional 'children.'
- source_word: אֲבִיהֶם
  chosen: their father
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to Jacob.
- source_word: טַפָּם
  chosen: their little ones
  alternatives:
  - their children
  - their dependents
  lexicon: HALOT
  rationale: טַף refers especially to small children or dependents. 'Little ones'
    preserves the nuance better than the broader 'children.'
- source_word: נְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: In this family-travel context, 'wives' is the clear and idiomatic sense.
- source_word: בָּעֲגָלוֹת
  chosen: in the wagons
  alternatives:
  - on the carts
  - in the carts
  lexicon: HALOT
  rationale: עגלה denotes a wagon/cart. 'Wagons' fits the Genesis narrative context
    and reads naturally in English.
- source_word: אֲשֶׁר שָׁלַח פַּרְעֹה
  chosen: that Pharaoh had sent
  alternatives:
  - which Pharaoh sent
  lexicon: HALOT
  rationale: English past perfect clarifies that Pharaoh's sending preceded the carrying
    action. This reflects narrative sequence rather than adding content.
- source_word: לָשֵׂאת אֹתוֹ
  chosen: to carry him
  alternatives:
  - to transport him
  - to bear him
  lexicon: HALOT
  rationale: Infinitive of purpose with object suffix most directly means 'to carry
    him.' The singular pronoun most naturally refers to Jacob, the principal subject
    just mentioned.
