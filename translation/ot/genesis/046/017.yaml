id: GEN.46.17
reference: Genesis 46:17
source:
  edition: WLC
  text: וּ/בְנֵ֣י אָשֵׁ֗ר יִמְנָ֧ה וְ/יִשְׁוָ֛ה וְ/יִשְׁוִ֥י וּ/בְרִיעָ֖ה וְ/שֶׂ֣רַח
    אֲחֹתָ֑/ם וּ/בְנֵ֣י בְרִיעָ֔ה חֶ֖בֶר וּ/מַלְכִּיאֵֽל׃
translation:
  text: 'The sons of Asher: Imnah, Ishvah, Ishvi, and Beriah; and Serah was their
    sister. And the sons of Beriah: Heber and Malchiel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Imnah is traditionally rendered 'Jimnah' in some English versions.
    reason: lexical_alternative
  - marker: b
    text: Serah may also be transliterated 'Serach.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - children of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In a genealogy, 'sons of' is
    the most natural and sufficiently formal rendering. The prefixed conjunction is
    not always best represented by initial 'and' in English when a heading-like list
    follows.
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Proper personal/tribal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: יִמְנָה
  chosen: Imnah
  alternatives:
  - Jimnah
  lexicon: HALOT
  rationale: Proper name transliterated from Hebrew. 'Imnah' reflects a straightforward
    modern transliteration; 'Jimnah' reflects some older English tradition influenced
    by the consonantal yod.
- source_word: וְיִשְׁוָה
  chosen: Ishvah
  alternatives:
  - Isuah
  lexicon: HALOT
  rationale: Proper name transliterated directly from Hebrew. The initial conjunction
    is absorbed into the list structure in English.
- source_word: וְיִשְׁוִי
  chosen: Ishvi
  alternatives:
  - Isui
  lexicon: HALOT
  rationale: Proper name transliterated directly from Hebrew. English list style handles
    the conjunction idiomatically.
- source_word: וּבְרִיעָה
  chosen: and Beriah
  lexicon: HALOT
  rationale: Proper name transliterated. Here the conjunction is retained before the
    final item in the series because English normally marks the last item with 'and.'
- source_word: וְשֶׂרַח
  chosen: and Serah
  alternatives:
  - Serach
  lexicon: HALOT
  rationale: Proper female name transliterated. 'Serah' is a standard English transliteration;
    'Serach' is a more phonetic alternative.
- source_word: אֲחֹתָם
  chosen: was their sister
  alternatives:
  - their sister
  lexicon: HALOT
  rationale: 'Literally ''their sister.'' English prose reads more naturally with
    an explicit copula: ''and Serah was their sister.'' This preserves the genealogical
    note that she is the sister of the named brothers.'
- source_word: וּבְנֵי בְרִיעָה
  chosen: And the sons of Beriah
  alternatives:
  - The sons of Beriah
  lexicon: HALOT
  rationale: A new genealogical subunit begins. Retaining 'And' is natural here because
    it links the sub-list to the previous clause while preserving the Hebrew sequence.
- source_word: חֶבֶר
  chosen: Heber
  alternatives:
  - Cheber
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention as 'Heber.'
- source_word: וּמַלְכִּיאֵל
  chosen: and Malchiel
  lexicon: HALOT
  rationale: Proper name transliterated. The conjunction is retained before the final
    name in the pair, matching normal English coordination.
