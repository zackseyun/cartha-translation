id: GEN.46.7
reference: Genesis 46:7
source:
  edition: WLC
  text: בָּנָ֞י/ו וּ/בְנֵ֤י בָנָי/ו֙ אִתּ֔/וֹ בְּנֹתָ֛י/ו וּ/בְנ֥וֹת בָּנָ֖י/ו וְ/כָל
    זַרְע֑/וֹ הֵבִ֥יא אִתּ֖/וֹ מִצְרָֽיְמָ/ה־׃ס
translation:
  text: His sons and his grandsons with him, his daughters and his granddaughters,
    and all his offspring—he brought with him to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the sons of his sons' and 'the daughters of his sons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all his descendants'; literally, 'all his seed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here is specifically male offspring, distinguished from daughters
    later in the verse, so 'sons' is more accurate than the broader 'children.'
- source_word: וּבְנֵי בָנָיו
  chosen: and his grandsons
  alternatives:
  - and the sons of his sons
  lexicon: HALOT
  rationale: Literally 'and the sons of his sons.' English idiom naturally renders
    this as 'grandsons' while preserving the genealogical sense.
- source_word: אִתּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Standard rendering of the preposition with pronominal suffix, indicating
    accompaniment.
- source_word: בְּנֹתָיו
  chosen: his daughters
  lexicon: HALOT
  rationale: Direct and specific rendering of female offspring, contrasted with sons.
- source_word: וּבְנוֹת בָּנָיו
  chosen: and his granddaughters
  alternatives:
  - and the daughters of his sons
  lexicon: HALOT
  rationale: Literally 'and the daughters of his sons.' 'Granddaughters' is the natural
    English equivalent.
- source_word: וְכָל זַרְעוֹ
  chosen: and all his offspring
  alternatives:
  - and all his descendants
  - and all his seed
  lexicon: HALOT
  rationale: זֶרַע can mean 'seed,' 'offspring,' or 'descendants.' In this family-migration
    context, 'offspring' is clear, natural English and preserves the collective sense
    without sounding overly technical or archaic.
- source_word: הֵבִיא
  chosen: he brought
  alternatives:
  - he took
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring.' Since Jacob is the subject gathering
    his family into Egypt, 'he brought' best matches the causative sense.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - toward Egypt
  - into Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is idiomatic
    English; the broader context makes entry into Egypt clear.
