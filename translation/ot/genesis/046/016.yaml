id: GEN.46.16
reference: Genesis 46:16
source:
  edition: WLC
  text: וּ/בְנֵ֣י גָ֔ד צִפְי֥וֹן וְ/חַגִּ֖י שׁוּנִ֣י וְ/אֶצְבֹּ֑ן עֵרִ֥י וַֽ/אֲרוֹדִ֖י
    וְ/אַרְאֵלִֽי׃
translation:
  text: 'And the sons of Gad: Ziphion, Haggi, Shuni, Ezbon, Eri, Arodi, and Areli.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צִפְיוֹן is rendered Ziphion here; many English translations have
      Zephon, reflecting a variant traditional form also seen in Numbers 26:15.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical lists, 'sons
    of' is the most direct and natural rendering. The prefixed conjunction וּ is carried
    as 'And' to preserve the list structure.
- source_word: גָד
  chosen: Gad
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: צִפְיוֹן
  chosen: Ziphion
  alternatives:
  - Zephon
  lexicon: HALOT
  rationale: Proper name transliterated from the Hebrew form in this verse. 'Zephon'
    reflects the form found in some English traditions and in Numbers 26:15, but here
    the MT form צִפְיוֹן is best represented as 'Ziphion' in the main text.
- source_word: וְחַגִּי
  chosen: Haggi
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction; transliterated straightforwardly
    as 'Haggi.'
- source_word: שׁוּנִי
  chosen: Shuni
  lexicon: HALOT
  rationale: Proper name; transliterated directly from the Hebrew.
- source_word: וְאֶצְבֹּן
  chosen: Ezbon
  alternatives:
  - Ezbun
  lexicon: HALOT
  rationale: Proper name; 'Ezbon' is a standard English transliteration of the consonantal
    form. Minor vowel-based variation is possible in English representation.
- source_word: עֵרִי
  chosen: Eri
  lexicon: HALOT
  rationale: Proper name; transliterated directly.
- source_word: וַאֲרוֹדִי
  chosen: Arodi
  alternatives:
  - Arodi
  lexicon: HALOT
  rationale: Proper name with conjunction. The conjunction is not separately repeated
    in English beyond the list punctuation; the name itself is transliterated as 'Arodi.'
- source_word: וְאַרְאֵלִי
  chosen: Areli
  lexicon: HALOT
  rationale: Proper name; transliterated directly from the Hebrew form.
