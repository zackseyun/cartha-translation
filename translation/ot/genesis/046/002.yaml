id: GEN.46.2
reference: Genesis 46:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֱלֹהִ֤ים לְ/יִשְׂרָאֵל֙ בְּ/מַרְאֹ֣ת הַ/לַּ֔יְלָה וַ/יֹּ֖אמֶר יַעֲקֹ֣ב יַעֲקֹ֑ב וַ/יֹּ֖אמֶר הִנֵּֽ/נִי׀׀׃
translation:
  text: And God said to Israel in visions of the night, “Jacob, Jacob.” And he said, “Here I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in night visions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spoke to Israel in visions of the night and said'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke / said
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb אמר broadly means 'say.' In English, rendering the first instance as 'spoke' smooths the clause 'God spoke to Israel in visions of the night,' while retaining 'said' for the direct-address clauses preserves natural style without changing sense.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one true God and takes singular verbal sense in context, so 'God' is the natural English rendering.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - to Jacob
  lexicon: HALOT
  rationale: The text explicitly uses the covenant name 'Israel' in narration, even though the address that follows uses 'Jacob.' The translation preserves this alternation rather than harmonizing the names.
- source_word: בְּמַרְאֹת הַלַּיְלָה
  chosen: in visions of the night
  alternatives:
  - in the visions of the night
  - in night visions
  lexicon: HALOT
  rationale: מַרְאָה/מַרְאוֹת denotes visionary appearance or vision. The plural construct with 'the night' is best rendered idiomatically as 'visions of the night,' preserving both the plural and the nocturnal setting.
- source_word: יַעֲקֹב יַעֲקֹב
  chosen: Jacob, Jacob
  lexicon: HALOT
  rationale: The repeated name is retained exactly, reflecting the emphatic and personal nature of the divine address.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  lexicon: HALOT
  rationale: הִנֵּנִי is a conventional response of readiness or availability. 'Here I am' is the standard natural English equivalent and preserves the relational and responsive force.
