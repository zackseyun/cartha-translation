theological_decisions:
- issue: Alternation between the names Israel and Jacob
  chosen_reading: Preserve 'Israel' in the narrative clause and 'Jacob' in the divine
    address
  alternative_readings:
  - Use 'Jacob' throughout for consistency
  - Use 'Israel' throughout for consistency
  rationale: The Hebrew intentionally shifts from 'Israel' to 'Jacob.' Preserving
    the shift maintains the literary and theological texture of the passage without
    importing an interpretive explanation.
  doctrine_reference: Translation philosophy §1, §5
