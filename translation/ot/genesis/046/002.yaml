theological_decisions:
- issue: Alternation between the names Israel and Jacob
  chosen_reading: Preserve 'Israel' in the narrative clause and 'Jacob' in the divine address
  alternative_readings:
  - Use 'Jacob' throughout for consistency
  - Use 'Israel' throughout for consistency
  rationale: The Hebrew intentionally shifts from 'Israel' to 'Jacob.' Preserving the shift maintains the literary and theological texture of the passage without importing an interpretive explanation.
  doctrine_reference: Translation philosophy §1, §5
revisions:
- timestamp: '2026-04-21T00:19:43Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/046/002.json
  category: awkward_english
  tier: 1
  from: spoke to Israel in visions of the night and said
  to: said to Israel in visions of the night
  rationale: The Hebrew construction uses the same verb, וַיֹּאמֶר, to both introduce the speech event and its content. The draft's rendering 'spoke... and said' is a traditional and literal way to handle this, but it creates a slight redundancy in English that is not felt in the Hebrew idiom. Collapsing the two verbs into a single 'said' is a common and effective strategy in optimal-equivalence translation to achieve a more natural English flow without losing any essential information, as the 'speaking' is wholly defined by the 'saying' that immediately follows.
