id: GEN.46.3
reference: Genesis 46:3
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אָנֹכִ֥י הָ/אֵ֖ל אֱלֹהֵ֣י אָבִ֑י/ךָ אַל תִּירָא֙ מֵ/רְדָ֣ה מִצְרַ֔יְמָ/ה
    כִּֽי לְ/ג֥וֹי גָּד֖וֹל אֲשִֽׂימְ/ךָ֥ שָֽׁם־־׃
translation:
  text: And he said, “I am God, the God of your father. Do not be afraid to go down
    to Egypt, for there I will make you into a great nation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not fear going down to Egypt.' The Hebrew expression uses 'fear'
      with an infinitive.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the God
  - El
  lexicon: HALOT
  rationale: With the article, הָאֵל identifies the speaker emphatically as the true
    God. In English, 'I am God' is the most natural rendering in direct speech; 'the
    God' is less idiomatic here, while 'El' would transliterate rather than translate
    a title.
- source_word: אֱלֹהֵי אָבִיךָ
  chosen: the God of your father
  alternatives:
  - your father's God
  lexicon: HALOT
  rationale: The construct chain is most directly rendered 'the God of your father.'
    This preserves the covenantal identification with Jacob's ancestral line. 'Your
    father's God' is possible but slightly less formal and less transparent to the
    Hebrew structure.
- source_word: אַל תִּירָא
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: The negative imperative/jussive construction gives a prohibition against
    fear. 'Do not be afraid' is natural modern English and preserves the sense without
    archaic stiffness.
- source_word: מֵרְדָה
  chosen: to go down
  alternatives:
  - from going down
  - to descend
  lexicon: HALOT
  rationale: The preposition מִן attached to the infinitive after a פחד/ירא expression
    yields the sense 'be afraid to do' or 'be afraid of doing.' Because Egypt is geographically
    'down' in Hebrew idiom, 'to go down' preserves the source wording better than
    flattening to 'to go.'
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - toward Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. In idiomatic English,
    'to Egypt' communicates the destination clearly.
- source_word: לְגוֹי גָּדוֹל
  chosen: into a great nation
  alternatives:
  - a great nation
  - for a great nation
  lexicon: HALOT
  rationale: 'With שׂים plus ל, the sense is resultative: God will constitute Jacob
    as a great nation. ''Make you into a great nation'' best captures the transformation/result
    implied by the Hebrew.'
- source_word: אֲשִׂימְךָ
  chosen: I will make you
  alternatives:
  - I will set you
  - I will appoint you
  lexicon: HALOT
  rationale: Although שׂים often means 'set' or 'place,' in this construction with
    לְגוֹי גָּדוֹל it means to make or constitute someone as something. 'I will make
    you' is the clearest English equivalent.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb points specifically to Egypt as the location where God will
    fulfill this promise. 'There' is concise and natural.
