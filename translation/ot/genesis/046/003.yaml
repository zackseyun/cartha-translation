theological_decisions:
- issue: Ancestral designation in divine self-identification
  chosen_reading: the God of your father
  alternative_readings:
  - your father's God
  rationale: The singular 'your father' is retained as in the Hebrew, preserving the
    immediate ancestral/covenantal link in God's reassurance to Jacob rather than
    broadening it interpretively to 'your fathers.'
  doctrine_reference: Translation philosophy §1, §5
