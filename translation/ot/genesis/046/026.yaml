id: GEN.46.26
reference: Genesis 46:26
source:
  edition: WLC
  text: כָּל הַ֠/נֶּפֶשׁ הַ/בָּאָ֨ה לְ/יַעֲקֹ֤ב מִצְרַ֨יְמָ/ה֙ יֹצְאֵ֣י יְרֵכ֔/וֹ
    מִ/לְּ/בַ֖ד נְשֵׁ֣י בְנֵי יַעֲקֹ֑ב כָּל נֶ֖פֶשׁ שִׁשִּׁ֥ים וָ/שֵֽׁשׁ־־־׃
translation:
  text: All the persons who came with Jacob to Egypt, who came from his loins, besides
    the wives of Jacob’s sons, were sixty-six persons in all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'those coming out of his thigh,' an idiom for biological
      descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the souls ... sixty-six.' Here 'soul' is a Hebrew way of counting
      persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַנֶּפֶשׁ
  chosen: All the persons
  alternatives:
  - Every person
  - All the souls
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul' or 'life,' but in census/genealogical contexts
    it idiomatically refers to individual persons. 'All the persons' is natural English
    and preserves the counting sense better than the more wooden 'all the souls.'
- source_word: הַבָּאָה לְיַעֲקֹב מִצְרַיְמָה
  chosen: who came with Jacob to Egypt
  alternatives:
  - who came to Jacob into Egypt
  - who came belonging to Jacob to Egypt
  lexicon: HALOT
  rationale: The phrase identifies those accompanying Jacob to Egypt. Although לְ
    can be rendered more literally as 'to Jacob,' in context the sense is those who
    came with him as part of his household. 'With Jacob' gives the plain relational
    sense in idiomatic English.
- source_word: יֹצְאֵי יְרֵכוֹ
  chosen: who came from his loins
  alternatives:
  - his direct descendants
  - those who came out of his thigh
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to those issuing from one's thigh/loins,
    meaning biological descendants. 'From his loins' preserves the idiom's concreteness
    while remaining understandable; 'direct descendants' is interpretive and less
    vivid.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - excluding
  - apart from
  lexicon: HALOT
  rationale: The preposition marks an exception to the count. 'Besides' is concise
    and idiomatic here.
- source_word: נְשֵׁי בְנֵי יַעֲקֹב
  chosen: the wives of Jacob’s sons
  alternatives:
  - Jacob's sons' wives
  lexicon: HALOT
  rationale: This phrase specifies the excluded group. 'The wives of Jacob’s sons'
    is clear modern English and preserves the genitival relationship.
- source_word: כָּל נֶפֶשׁ שִׁשִּׁים וָשֵׁשׁ
  chosen: were sixty-six persons in all
  alternatives:
  - all the persons were sixty-six
  - the total was sixty-six persons
  lexicon: HALOT
  rationale: The Hebrew gives the total count. 'Were sixty-six persons in all' is
    smooth English while retaining the repeated counting term נֶפֶשׁ as 'persons'
    for consistency within the verse.
