id: GEN.46.6
reference: Genesis 46:6
source:
  edition: WLC
  text: וַ/יִּקְח֣וּ אֶת מִקְנֵי/הֶ֗ם וְ/אֶת רְכוּשָׁ/ם֙ אֲשֶׁ֤ר רָֽכְשׁוּ֙ בְּ/אֶ֣רֶץ
    כְּנַ֔עַן וַ/יָּבֹ֖אוּ מִצְרָ֑יְמָ/ה יַעֲקֹ֖ב וְ/כָל זַרְע֥/וֹ אִתּֽ/וֹ־־־׃
translation:
  text: They took their livestock and their possessions that they had acquired in
    the land of Canaan, and they came to Egypt—Jacob and all his offspring with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants.' The Hebrew word can denote one's seed, offspring, or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: They took
  alternatives:
  - And they took
  - They took along
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, the standard narrative form meaning 'took.' English
    omits the conjunction for natural style while preserving sequential narrative
    force.
- source_word: מִקְנֵיהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or acquired animals. 'Livestock' is
    the broad modern English equivalent and fits the context of migration with flocks
    and herds.
- source_word: רְכוּשָׁם
  chosen: their possessions
  alternatives:
  - their goods
  - their property
  lexicon: HALOT
  rationale: רְכוּשׁ refers to movable property or goods. 'Possessions' is clear modern
    English and distinguishes it from the more specific 'livestock' in the previous
    phrase.
- source_word: אֲשֶׁר רָכְשׁוּ
  chosen: that they had acquired
  alternatives:
  - which they had gotten
  - that they had gathered
  lexicon: HALOT
  rationale: The relative clause specifies that these possessions were obtained in
    Canaan. English past perfect ('had acquired') best reflects prior acquisition
    relative to the journey.
- source_word: בְּאֶרֶץ כְּנַעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retaining 'the land of Canaan' preserves the Hebrew phrase's geographic
    and covenantal concreteness better than the shorter 'in Canaan.'
- source_word: וַיָּבֹאוּ מִצְרָיְמָה
  chosen: and they came to Egypt
  alternatives:
  - and they went to Egypt
  - and they entered Egypt
  lexicon: HALOT
  rationale: בוא with directional ending on מִצְרַיִם indicates movement to Egypt.
    'Came to Egypt' is a conventional narrative rendering; 'entered' would over-specify
    border crossing.
- source_word: יַעֲקֹב וְכָל זַרְעוֹ אִתּוֹ
  chosen: Jacob and all his offspring with him
  alternatives:
  - Jacob and all his descendants with him
  - Jacob and all his seed with him
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. Here it refers to Jacob's
    family line traveling with him. 'Offspring' is natural and sufficiently broad;
    'seed' is too literal in contemporary English, and 'descendants' can sound more
    remote than the immediate family context.
