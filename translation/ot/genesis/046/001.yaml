theological_decisions:
- issue: Reference to God as 'the God of his father Isaac' rather than a broader patriarchal
    formula
  chosen_reading: Retain the specific patriarchal designation exactly as given.
  alternative_readings:
  - the God of his fathers
  - God, the God of his father Isaac
  rationale: The Hebrew specifically names Isaac, highlighting continuity with the
    immediately preceding patriarchal line and the significance of Beersheba in Isaac's
    story. The translation should not generalize this to 'fathers' or expand it interpretively.
  doctrine_reference: Translation philosophy §1, §5
