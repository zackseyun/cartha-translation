id: GEN.46.1
reference: Genesis 46:1
source:
  edition: WLC
  text: וַ/יִּסַּ֤ע יִשְׂרָאֵל֙ וְ/כָל אֲשֶׁר ל֔/וֹ וַ/יָּבֹ֖א בְּאֵ֣רָ/ה שָּׁ֑בַע
    וַ/יִּזְבַּ֣ח זְבָחִ֔ים לֵ/אלֹהֵ֖י אָבִ֥י/ו יִצְחָֽק־־׃
translation:
  text: So Israel set out with all that belonged to him and came to Beersheba, and
    he offered sacrifices to the God of his father Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and all that he had.' The Hebrew phrase can refer broadly to all that
      belonged to him, including household and possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: set out
  alternatives:
  - journeyed
  - departed
  - traveled
  lexicon: HALOT
  rationale: The verb נסע in narrative commonly denotes breaking camp and setting
    out on a journey. 'Set out' is natural modern English and preserves the travel-initiation
    sense better than the more archaic 'journeyed.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses the covenant name 'Israel,' so it is retained rather
    than harmonized to 'Jacob.' This preserves the narrative's naming choice.
- source_word: וְכָל אֲשֶׁר לוֹ
  chosen: with all that belonged to him
  alternatives:
  - and all that he had
  - with all his possessions
  lexicon: HALOT
  rationale: The phrase includes both persons and possessions under Jacob/Israel's
    household, not merely material goods. 'With all that belonged to him' captures
    the broad scope without over-specifying.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: '''Came'' is the straightforward rendering of בוא here. In English it
    works idiomatically with the destination phrase ''to Beersheba.'''
- source_word: בְּאֵרָה שָּׁבַע
  chosen: to Beersheba
  alternatives:
  - to Beer-sheba
  lexicon: HALOT
  rationale: Standard English transliteration of the place name. The directional ending
    on the first element is represented by 'to Beersheba' rather than by a more wooden
    form.
- source_word: וַיִּזְבַּח זְבָחִים
  chosen: he offered sacrifices
  alternatives:
  - he sacrificed sacrifices
  - he made sacrifices
  lexicon: HALOT
  rationale: The cognate verb-object construction intensifies the sacrificial act.
    Idiomatic English expresses this as 'offered sacrifices' rather than the wooden
    'sacrificed sacrifices.'
- source_word: לֵאלֹהֵי
  chosen: to the God of
  alternatives:
  - for the God of
  lexicon: HALOT
  rationale: The lamed marks the recipient/object of worship in this context. 'To
    the God of' is the most natural rendering with sacrificial language.
- source_word: אָבִיו יִצְחָק
  chosen: his father Isaac
  alternatives:
  - his father, Isaac
  lexicon: HALOT
  rationale: The construct chain identifies Isaac as Israel's father. No comma is
    necessary in the main text, though the sense is appositional.
