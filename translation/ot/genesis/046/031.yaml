id: GEN.46.31
reference: Genesis 46:31
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יוֹסֵ֤ף אֶל אֶחָי/ו֙ וְ/אֶל בֵּ֣ית אָבִ֔י/ו אֶעֱלֶ֖ה וְ/אַגִּ֣ידָה
    לְ/פַרְעֹ֑ה וְ/אֹֽמְרָ֣ה אֵלָ֔י/ו אַחַ֧/י וּ/בֵית אָבִ֛/י אֲשֶׁ֥ר בְּ/אֶֽרֶץ כְּנַ֖עַן
    בָּ֥אוּ אֵלָֽ/י־־־־׃
translation:
  text: Then Joseph said to his brothers and to his father’s household, “I will go
    up and report to Pharaoh, and I will say to him, ‘My brothers and my father’s
    household, who were in the land of Canaan, have come to me.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “my father’s house” (Hebrew: ''house of my father''); here ''household''
      brings out the family-unit sense rather than the physical dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers/siblings
  lexicon: HALOT
  rationale: אַח with 3ms suffix refers specifically to Joseph's male brothers in
    context. 'Brothers' is gender-accurate and matches the source.
- source_word: וְאֶל בֵּית אָבִיו
  chosen: and to his father’s household
  alternatives:
  - and to his father’s house
  - and to the house of his father
  lexicon: HALOT
  rationale: בַּיִת in construct with 'father' here denotes the family/household unit,
    not merely the physical building. 'Household' communicates the social sense in
    readable English.
- source_word: אֶעֱלֶה
  chosen: I will go up
  alternatives:
  - I will go
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Even though the movement is toward Pharaoh,
    the Hebrew uses the conventional directional verb and it should be preserved unless
    awkward.
- source_word: וְאַגִּידָה
  chosen: and report
  alternatives:
  - and tell
  - and inform
  lexicon: HALOT
  rationale: נגד in Hiphil carries the sense of making known or reporting. 'Report'
    fits the courtly context of speaking to Pharaoh.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  lexicon: HALOT
  rationale: Direct indirect-object marking; standard rendering of the royal title/name.
- source_word: וְאֹמְרָה אֵלָיו
  chosen: and I will say to him
  alternatives:
  - and say to him
  lexicon: HALOT
  rationale: The cohortative-like form after waw expresses Joseph's intended next
    action. 'I will say to him' keeps the first-person resolve explicit.
- source_word: אַחַי
  chosen: My brothers
  alternatives:
  - My brothers/siblings
  lexicon: HALOT
  rationale: Refers to Joseph's actual brothers; 'brothers' is the precise contextual
    rendering.
- source_word: וּבֵית אָבִי
  chosen: and my father’s household
  alternatives:
  - and my father’s house
  lexicon: HALOT
  rationale: As above, בֵּית אָבִי denotes the family unit belonging to his father.
    Consistency favors 'household' here as well.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנַעַן
  chosen: who were in the land of Canaan
  alternatives:
  - who are in the land of Canaan
  - who were from the land of Canaan
  lexicon: HALOT
  rationale: 'Although no explicit finite verb appears in the relative clause, English
    idiom requires one. Because the next verb is ''have come,'' the prior location
    is best rendered as past: ''who were in the land of Canaan.'''
- source_word: בָּאוּ אֵלַי
  chosen: have come to me
  alternatives:
  - came to me
  lexicon: HALOT
  rationale: The perfect reports a completed action with present relevance in Joseph's
    speech to Pharaoh. English present perfect captures that nuance naturally.
