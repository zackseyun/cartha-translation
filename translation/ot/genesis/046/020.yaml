id: GEN.46.20
reference: Genesis 46:20
source:
  edition: WLC
  text: וַ/יִּוָּלֵ֣ד לְ/יוֹסֵף֮ בְּ/אֶ֣רֶץ מִצְרַיִם֒ אֲשֶׁ֤ר יָֽלְדָה לּ/וֹ֙ אָֽסְנַ֔ת
    בַּת פּ֥וֹטִי פֶ֖רַע כֹּהֵ֣ן אֹ֑ן אֶת מְנַשֶּׁ֖ה וְ/אֶת אֶפְרָֽיִם־־־־׃
translation:
  text: To Joseph were born in the land of Egypt Manasseh and Ephraim, whom Asenath
    daughter of Potiphera, priest of On, bore to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: On is the Egyptian city later known in Greek as Heliopolis.
    reason: cultural_note
  - marker: b
    text: Or 'were born in the land of Egypt Manasseh and Ephraim'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּוָּלֵד
  chosen: were born
  alternatives:
  - was born
  - there were born
  lexicon: HALOT
  rationale: Niphal wayyiqtol of ילד expresses passive birth. Although morphologically
    singular, it governs the two named sons that follow, so idiomatic English uses
    the plural 'were born.'
- source_word: לְיוֹסֵף
  chosen: to Joseph
  alternatives:
  - for Joseph
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/advantage with the passive verb: children
    were born ''to'' Joseph.'
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ explicitly as 'land' for a slightly more formal and source-near
    rendering while remaining natural English.
- source_word: אֲשֶׁר יָלְדָה לּוֹ
  chosen: whom ... bore to him
  alternatives:
  - which ... she bore to him
  - that ... were born to him by
  lexicon: HALOT
  rationale: The relative clause modifies the two sons. 'Whom ... bore to him' is
    natural English for personal referents and preserves the maternal action of ילד.
- source_word: אָסְנַת
  chosen: Asenath
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: בַּת פּוֹטִי פֶרַע
  chosen: daughter of Potiphera
  alternatives:
  - daughter of Poti-phera
  lexicon: HALOT
  rationale: Construct phrase identifying Asenath's father. Standard English biblical
    form is 'Potiphera.'
- source_word: כֹּהֵן אֹן
  chosen: priest of On
  alternatives:
  - priest of Heliopolis
  lexicon: HALOT
  rationale: כֹּהֵן is straightforwardly 'priest.' The place name אֹן is transliterated
    as 'On' in the main text because names are normally transliterated; the well-known
    Greek equivalent 'Heliopolis' is worth preserving in a footnote.
- source_word: אֶת מְנַשֶּׁה וְאֶת אֶפְרָיִם
  chosen: Manasseh and Ephraim
  alternatives:
  - Manasseh, and Ephraim
  lexicon: HALOT
  rationale: Direct-object markers are untranslated in English; the two sons are rendered
    by their standard transliterated names.
