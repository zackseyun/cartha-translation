id: GEN.46.14
reference: Genesis 46:14
source:
  edition: WLC
  text: וּ/בְנֵ֖י זְבוּלֻ֑ן סֶ֥רֶד וְ/אֵל֖וֹן וְ/יַחְלְאֵֽל׃
translation:
  text: 'And the sons of Zebulun: Sered, Elon, and Jahleel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jahleel may also be transliterated 'Yahleel' or 'Jachleel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'son' and in genealogical lists is
    most naturally rendered 'sons of.' The prefixed conjunction ו is carried over
    as 'And' to preserve the list structure in the surrounding genealogy.
- source_word: זְבוּלֻן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    by standard English convention rather than translated.
- source_word: סֶרֶד
  chosen: Sered
  alternatives:
  - Seredh
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration is 'Sered.'
- source_word: וְ/אֵלוֹן
  chosen: Elon
  alternatives:
  - Elon
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction; rendered 'and Elon.'
    The name is transliterated, not translated as the common noun 'oak,' because it
    functions here as a personal name.
- source_word: וְ/יַחְלְאֵל
  chosen: Jahleel
  alternatives:
  - Yahleel
  - Jachleel
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction; standard English biblical
    convention commonly gives 'Jahleel.' Alternative transliterations reflect different
    ways of representing the initial yod and guttural cluster in English.
