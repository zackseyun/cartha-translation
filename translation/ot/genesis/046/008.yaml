  from: 'who came to Egypt: Jacob and his sons.'
  to: who came to Egypt, Jacob and his sons.
  rationale: The Hebrew phrase 'יַעֲקֹב וּבָנָיו' (Jacob and his sons) functions as an appositive, clarifying the identity of 'the sons of Israel who came to Egypt.' The current rendering uses a colon, which typically introduces a list or an explanation. This makes 'Jacob and his sons' feel like the list itself, which is then followed by a new sentence starting the actual list with Reuben. This is slightly confusing. Replacing the colon with a comma correctly marks 'Jacob and his sons' as an appositive phrase within the introductory sentence, improving the grammatical flow and more accurately reflecting the Hebrew syntax.
