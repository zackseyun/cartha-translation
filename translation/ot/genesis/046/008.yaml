id: GEN.46.8
reference: Genesis 46:8
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה שְׁמ֧וֹת בְּנֵֽי יִשְׂרָאֵ֛ל הַ/בָּאִ֥ים מִצְרַ֖יְמָ/ה יַעֲקֹ֣ב וּ/בָנָ֑י/ו בְּכֹ֥ר יַעֲקֹ֖ב רְאוּבֵֽן־׃
translation:
  text: Now these are the names of the sons of Israel who came to Egypt, Jacob and his sons. Jacob’s firstborn was Reuben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And these are the names of the sons of Israel who came into Egypt.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''who came to Egypt: Jacob and his sons.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction וְ plus demonstrative naturally introduces a new section in narrative/genealogical style. 'Now these are' preserves the discourse-marking force in readable English; 'And these are' is more formally literal but less natural in modern English.
- source_word: שְׁמוֹת
  chosen: the names
  lexicon: HALOT
  rationale: Standard gloss for שֵׁם in the plural construct. In this genealogical context it introduces a list of named descendants.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the descendants of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by project philosophy. Here the immediate context lists Jacob's male offspring by name, so 'sons' is more precise than the traditional but broader 'children.' 'Israel' is retained as the personal/covenantal name, though the next clause clarifies with 'Jacob.'
- source_word: הַבָּאִים
  chosen: who came
  alternatives:
  - who were coming
  - who entered
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally/descriptively: ''those who came/were coming.'' In English, simple past fits the retrospective list introduction better than a progressive form.'
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is idiomatic English and adequately conveys the sense.
- source_word: יַעֲקֹב וּבָנָיו
  chosen: Jacob and his sons
  alternatives:
  - Jacob, with his sons
  lexicon: HALOT
  rationale: This appositional clarification identifies the 'sons of Israel' as Jacob together with his sons in the migration notice. Rendering as a complete clause after a colon preserves the Hebrew list-introduction style while remaining clear in English.
- source_word: בְּכֹר יַעֲקֹב
  chosen: Jacob’s firstborn
  alternatives:
  - the firstborn of Jacob
  lexicon: HALOT
  rationale: Construct phrase indicating birth order. The possessive form is natural English and preserves the genealogical emphasis.
- source_word: רְאוּבֵן
  chosen: Reuben
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per project philosophy.
