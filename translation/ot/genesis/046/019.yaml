id: GEN.46.19
reference: Genesis 46:19
source:
  edition: WLC
  text: בְּנֵ֤י רָחֵל֙ אֵ֣שֶׁת יַֽעֲקֹ֔ב יוֹסֵ֖ף וּ/בִנְיָמִֽן׃
translation:
  text: 'The sons of Rachel, Jacob’s wife: Joseph and Benjamin.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The children of
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In this genealogical listing,
    'sons of' is the most direct and natural rendering. 'Children of' would be broader
    than the Hebrew, and 'descendants of' is too expansive for the immediate context,
    which names Rachel's direct sons.
- source_word: רָחֵל
  chosen: Rachel
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy.
- source_word: אֵשֶׁת
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: In construct with Jacob, אֵשֶׁת clearly means 'wife of.' While the underlying
    noun can mean 'woman,' the relational sense 'wife' is required by context.
- source_word: יַעֲקֹב
  chosen: Jacob’s
  lexicon: HALOT
  rationale: Proper personal name; rendered in possessive form in English to reflect
    the Hebrew construct chain 'wife of Jacob.'
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וּ/בִנְיָמִן
  chosen: and Benjamin
  lexicon: HALOT
  rationale: Simple conjunction plus proper name. Rendered straightforwardly as the
    second item in the list of Rachel's sons.
