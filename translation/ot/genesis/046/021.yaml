id: GEN.46.21
reference: Genesis 46:21
source:
  edition: WLC
  text: וּ/בְנֵ֣י בִנְיָמִ֗ן בֶּ֤לַע וָ/בֶ֨כֶר֙ וְ/אַשְׁבֵּ֔ל גֵּרָ֥א וְ/נַעֲמָ֖ן
    אֵחִ֣י וָ/רֹ֑אשׁ מֻפִּ֥ים וְ/חֻפִּ֖ים וָ/אָֽרְדְּ׃
translation:
  text: 'And the sons of Benjamin: Bela, Beker, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim,
    Huppim, and Ard.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often spell בֶּכֶר as “Becher.”
    reason: lexical_alternative
  - marker: b
    text: In Numbers 26:38, a parallel Benjaminite genealogy has “Ahiram” where this
      verse reads “Ehi.”
    reason: cross_reference
  - marker: c
    text: Some parallel genealogical traditions have a variant such as “Shuppim” for
      “Muppim”; this translation follows the Masoretic Text here.
    reason: textual_variant
  - marker: d
    text: 1 Chronicles 8:3 has the related name-form “Addar” in a Benjaminite genealogy;
      this verse reads “Ard.”
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In a genealogical
    list, 'the sons of' is the natural English rendering; retaining 'And' reflects
    the Hebrew waw and the list-continuation style.
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּלַע
  chosen: Bela
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: בֶּכֶר
  chosen: Beker
  alternatives:
  - Becher
  lexicon: HALOT
  rationale: Proper name. 'Beker' more directly reflects the consonants of the Hebrew
    here, while 'Becher' is a familiar traditional English form influenced by established
    transliteration conventions. The more source-near form is chosen, with the traditional
    form preserved in a footnote.
- source_word: אַשְׁבֵּל
  chosen: Ashbel
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: גֵּרָא
  chosen: Gera
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: נַעֲמָן
  chosen: Naaman
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: אֵחִי
  chosen: Ehi
  alternatives:
  - Ahiram
  lexicon: HALOT
  rationale: Proper name. The MT here reads אֵחִי, best transliterated 'Ehi.' A different
    name appears in some parallel genealogical traditions (for example, Ahiram in
    Numbers 26:38), but this verse should reflect the present Hebrew text; the parallel
    is worth preserving in a footnote.
- source_word: רֹאשׁ
  chosen: Rosh
  lexicon: HALOT
  rationale: Here used as a proper name in a list of Benjamin's sons, so it is transliterated
    rather than translated as the common noun 'head' or 'chief.'
- source_word: מֻפִּים
  chosen: Muppim
  alternatives:
  - Shuppim
  lexicon: HALOT
  rationale: Proper name. The MT form here is מֻפִּים, best represented as 'Muppim.'
    Parallel genealogical passages attest variant forms such as 'Shuppim'; the main
    text follows the verse's Hebrew form, with the variant preserved in a footnote.
- source_word: חֻפִּים
  chosen: Huppim
  lexicon: HALOT
  rationale: Proper name; standard transliteration of the MT form.
- source_word: אָרְדְּ
  chosen: Ard
  alternatives:
  - Addar
  lexicon: HALOT
  rationale: Proper name. The MT here supports 'Ard.' A related variant appears in
    some parallel genealogical lists ('Addar' in 1 Chronicles 8:3), but the present
    verse should follow its own Hebrew text; the variant is preserved in a footnote.
