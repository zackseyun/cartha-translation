id: GEN.46.25
reference: Genesis 46:25
source:
  edition: WLC
  text: אֵ֚לֶּה בְּנֵ֣י בִלְהָ֔ה אֲשֶׁר נָתַ֥ן לָבָ֖ן לְ/רָחֵ֣ל בִּתּ֑/וֹ וַ/תֵּ֧לֶד
    אֶת אֵ֛לֶּה לְ/יַעֲקֹ֖ב כָּל נֶ֥פֶשׁ שִׁבְעָֽה־־־׃
translation:
  text: 'These are the sons of Bilhah, whom Laban gave to Rachel his daughter, and
    she bore these to Jacob: seven persons in all.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all the soul(s), seven''—an idiom meaning a total of seven persons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing a summary list; English idiom naturally supplies
    'are' in this identificational clause.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct with a female ancestor here refers specifically to male
    offspring in the genealogical listing. 'Sons' is gender-accurate and matches the
    Hebrew form and context.
- source_word: בִלְהָה
  chosen: Bilhah
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: אֲשֶׁר נָתַן
  chosen: whom Laban gave
  alternatives:
  - that Laban gave
  lexicon: HALOT
  rationale: Relative clause referring back to Bilhah. 'Whom' fits Bilhah as a person
    and preserves the syntax clearly in English.
- source_word: לְרָחֵל בִּתּוֹ
  chosen: to Rachel his daughter
  alternatives:
  - for Rachel his daughter
  lexicon: HALOT
  rationale: ל marks the indirect object of נתן, 'gave to.' 'His daughter' renders
    the pronominal suffix explicitly and naturally.
- source_word: וַתֵּלֶד
  chosen: and she bore
  alternatives:
  - and she gave birth to
  lexicon: HALOT
  rationale: Standard rendering of ילד in genealogical contexts. 'Bore' is concise,
    natural, and preserves the maternal subject.
- source_word: אֶת אֵלֶּה
  chosen: these
  alternatives:
  - these sons
  - these people
  lexicon: HALOT
  rationale: Direct-object marker plus demonstrative points to the listed individuals.
    English does not require repeating 'sons'; 'these' is sufficient and mirrors the
    Hebrew economy.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: In this birth formula, ל marks the father/recipient relation; 'to Jacob'
    is the standard genealogical rendering.
- source_word: כָּל נֶפֶשׁ
  chosen: persons in all
  alternatives:
  - all the persons
  - every person
  - all the souls
  lexicon: HALOT
  rationale: Idiomatic Hebrew for counting persons. 'Persons in all' communicates
    the total count naturally in modern English, while avoiding the misleadingly wooden
    'souls' in this census context.
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number giving the total count.
