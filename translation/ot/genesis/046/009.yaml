id: GEN.46.9
reference: Genesis 46:9
source:
  edition: WLC
  text: וּ/בְנֵ֖י רְאוּבֵ֑ן חֲנ֥וֹךְ וּ/פַלּ֖וּא וְ/חֶצְר֥וֹן וְ/כַרְמִֽי׃
translation:
  text: 'And the sons of Reuben: Hanoch, Pallu, Hezron, and Carmi.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hanoch; traditionally also rendered Enoch in some English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as 'And' to reflect the list-continuation
    style of the genealogy. בְנֵי is the construct plural of 'sons,' and in a genealogical
    register 'sons of' is the most natural and sufficiently formal rendering.
- source_word: רְאוּבֵן
  chosen: Reuben
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Reuben' is the established and accurate English form of the
    Hebrew name.
- source_word: חֲנוֹךְ
  chosen: Hanoch
  alternatives:
  - Hanok
  - Enoch
  lexicon: HALOT
  rationale: The Hebrew personal name is best represented by direct transliteration
    as 'Hanoch.' 'Enoch' is a traditional Anglicized form used for other occurrences
    of the same Hebrew name, but here a closer transliteration better reflects the
    source form and follows the stated preference to transliterate names.
- source_word: וּ/פַלּוּא
  chosen: Pallu
  alternatives:
  - Phallu
  lexicon: HALOT
  rationale: The conjunction is absorbed into the English list punctuation and final
    conjunction. The name is transliterated as 'Pallu,' the standard modern English
    form from the Hebrew personal name.
- source_word: וְ/חֶצְר֥וֹן
  chosen: Hezron
  alternatives:
  - Hetsron
  lexicon: HALOT
  rationale: The name is transliterated by standard convention as 'Hezron.' The prefixed
    conjunction is represented by the English list structure.
- source_word: וְ/כַרְמִי
  chosen: Carmi
  lexicon: HALOT
  rationale: The personal name is transliterated straightforwardly as 'Carmi.' The
    prefixed conjunction is rendered by the final English 'and' in the series.
