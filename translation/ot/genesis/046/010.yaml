id: GEN.46.10
reference: Genesis 46:10
source:
  edition: WLC
  text: וּ/בְנֵ֣י שִׁמְע֗וֹן יְמוּאֵ֧ל וְ/יָמִ֛ין וְ/אֹ֖הַד וְ/יָכִ֣ין וְ/צֹ֑חַר וְ/שָׁא֖וּל
    בֶּן הַֽ/כְּנַעֲנִֽית־׃
translation:
  text: 'And the sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul, the
    son of the Canaanite woman.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul,' the traditional English form of the Hebrew name Shaul.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: ו conjunction plus construct plural of בֵּן introduces the next item
    in the genealogy. 'And the sons of' preserves the list structure and the Hebrew
    coordination.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: יְמוּאֵל
  chosen: Jemuel
  alternatives:
  - Yemuel
  lexicon: HALOT
  rationale: Proper name rendered by conventional English biblical transliteration
    'Jemuel.'
- source_word: וְיָמִין
  chosen: Jamin
  alternatives:
  - Yamin
  lexicon: HALOT
  rationale: Proper name in a coordinated list; conventional English form 'Jamin'
    is retained.
- source_word: וְאֹהַד
  chosen: Ohad
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly.
- source_word: וְיָכִין
  chosen: Jachin
  alternatives:
  - Yachin
  lexicon: HALOT
  rationale: Proper name rendered in its familiar English biblical form 'Jachin.'
- source_word: וְצֹחַר
  chosen: Zohar
  alternatives:
  - Zohar/Zochar
  lexicon: HALOT
  rationale: Proper name transliterated; 'Zohar' is the standard English form for
    this spelling.
- source_word: וְשָׁאוּל
  chosen: and Shaul
  alternatives:
  - and Saul
  lexicon: HALOT
  rationale: The Hebrew name is שָׁאוּל. 'Shaul' more transparently reflects the Hebrew
    consonants and vowels, in keeping with original-language primacy and transliteration
    of names. 'Saul' is a familiar traditional alternative worth preserving.
- source_word: בֶּן הַכְּנַעֲנִית
  chosen: the son of the Canaanite woman
  alternatives:
  - son of the Canaanitess
  - son of the Canaanite
  lexicon: HALOT
  rationale: בֶּן means 'son of.' The feminine singular gentilic with article refers
    to a Canaanite woman. 'The son of the Canaanite woman' is clear, natural English
    and preserves the feminine reference better than the less natural 'Canaanitess'
    or the potentially ambiguous 'Canaanite' alone.
