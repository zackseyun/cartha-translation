id: GEN.46.28
reference: Genesis 46:28
source:
  edition: WLC
  text: וְ/אֶת יְהוּדָ֞ה שָׁלַ֤ח לְ/פָנָי/ו֙ אֶל יוֹסֵ֔ף לְ/הוֹרֹ֥ת לְ/פָנָ֖י/ו גֹּ֑שְׁנָ/ה
    וַ/יָּבֹ֖אוּ אַ֥רְצָ/ה גֹּֽשֶׁן־־׃
translation:
  text: He sent Judah ahead of him to Joseph, to show the way before him to Goshen;
    and they came into the land of Goshen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to direct him to Goshen' or 'to instruct before him toward Goshen.'
      The Hebrew verb can carry senses of directing or instructing, and the clause
      is somewhat compressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of the Qal verb 'to send.' 'Sent' is natural modern
    English and fits the narrative context without overformalizing.
- source_word: לְפָנָיו
  chosen: ahead of him
  alternatives:
  - before him
  - in front of him
  lexicon: HALOT
  rationale: The idiom with שלח indicates sending someone in advance. 'Ahead of him'
    communicates temporal and spatial precedence more idiomatically than the more
    literal 'before him.'
- source_word: לְהוֹרֹת
  chosen: to show the way
  alternatives:
  - to instruct
  - to direct
  - to point out
  lexicon: HALOT
  rationale: Hiphil infinitive of ירה can mean 'to instruct/direct/show.' In this
    travel context, the sense is practical guidance regarding arrival in Goshen. 'To
    show the way' captures that concrete directional nuance better than the more abstract
    'to instruct.'
- source_word: לְפָנָיו גֹּשְׁנָה
  chosen: before him to Goshen
  alternatives:
  - for him to Goshen
  - ahead of him to Goshen
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. It most naturally means Judah was
    sent in advance of Jacob with reference to Goshen. In the English sentence this
    is represented by 'to show the way before him to Goshen,' preserving the directional
    goal and the repeated 'before/ahead of him' motif.
- source_word: גֹּשְׁנָה
  chosen: to Goshen
  alternatives:
  - toward Goshen
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Goshen.
    English normally expresses this simply as 'to Goshen.'
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of בוא. 'They came' preserves the Hebrew verbal
    movement and narrative flow.
- source_word: אַרְצָה גֹּשֶׁן
  chosen: into the land of Goshen
  alternatives:
  - to the land of Goshen
  - into Goshen
  lexicon: HALOT
  rationale: The noun אֶרֶץ with directional ending suggests movement into the territory/land
    region of Goshen. 'Into the land of Goshen' preserves the territorial sense better
    than simply 'into Goshen.'
- source_word: יְהוּדָה / יוֹסֵף / גֹּשֶׁן
  chosen: Judah / Joseph / Goshen
  rationale: 'Personal and place names are transliterated according to the project''s
    philosophy: translate titles, transliterate names.'
