id: GEN.46.22
reference: Genesis 46:22
source:
  edition: WLC
  text: אֵ֚לֶּה בְּנֵ֣י רָחֵ֔ל אֲשֶׁ֥ר יֻלַּ֖ד לְ/יַעֲקֹ֑ב כָּל נֶ֖פֶשׁ אַרְבָּעָ֥ה
    עָשָֽׂר־׃
translation:
  text: 'These were the sons of Rachel who were born to Jacob: fourteen persons in
    all.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all the soul/person, fourteen''—an idiom meaning the total number
      of persons was fourteen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Introduces the summary statement. English past tense fits the narrative
    context and natural discourse flow, though a more formally present rendering is
    possible.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: HALOT
  rationale: The Hebrew construct literally means 'sons of.' In this genealogical
    context it refers to Rachel's offspring line; 'sons' preserves the source wording
    and gendered form better than the broader 'children.'
- source_word: רָחֵל
  chosen: Rachel
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - whom
  - that
  lexicon: HALOT
  rationale: Relative pronoun linking Rachel's sons with the following passive verb;
    'who' is the most natural English rendering for persons.
- source_word: יֻלַּד
  chosen: were born
  alternatives:
  - were begotten
  - were borne
  lexicon: HALOT
  rationale: Passive of ילד. 'Were born' is idiomatic modern English and accurately
    conveys the passive sense without archaic wording.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל marks relation/parentage here; 'born to Jacob' is standard
    English for genealogical descent.
- source_word: כָּל נֶפֶשׁ
  chosen: persons in all
  alternatives:
  - every person
  - all the persons
  - souls in all
  lexicon: HALOT
  rationale: In census/genealogical contexts נֶפֶשׁ idiomatically counts persons/lives.
    'Persons in all' communicates the counting function clearly in modern English.
    'Souls' is more literal but less natural here and can mislead readers into a more
    theological sense not foregrounded by the context.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Straightforward cardinal number.
