theological_decisions:
- issue: Interpretation of the promise to 'bring you up' from Egypt
  chosen_reading: The wording preserves the immediate promise to Jacob without specifying
    whether the reference is to Jacob personally, his body for burial, or his descendants
    in the exodus.
  alternative_readings:
  - A promise that Jacob himself would return alive from Egypt
  - A promise referring to Jacob's body being brought up for burial in Canaan
  - A representative promise encompassing Jacob's descendants being brought up in
    the exodus
  rationale: The Hebrew is concise and can bear more than one layer of fulfillment.
    To preserve theological tension rather than over-resolve it, the translation keeps
    the broad wording 'bring you up.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
