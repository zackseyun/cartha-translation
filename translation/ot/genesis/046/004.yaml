id: GEN.46.4
reference: Genesis 46:4
source:
  edition: WLC
  text: אָנֹכִ֗י אֵרֵ֤ד עִמְּ/ךָ֙ מִצְרַ֔יְמָ/ה וְ/אָנֹכִ֖י אַֽעַלְ/ךָ֣ גַם עָלֹ֑ה
    וְ/יוֹסֵ֕ף יָשִׁ֥ית יָד֖/וֹ עַל עֵינֶֽי/ךָ־־׃
translation:
  text: I myself will go down with you to Egypt, and I myself will also surely bring
    you up; and Joseph will place his hand over your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Joseph will close your eyes,' referring to Joseph
      being present at Jacob's death.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The independent pronoun is explicit and repeated for emphasis. 'I myself'
    preserves the emphatic force better than a simple 'I' in English.
- source_word: אֵרֵד
  chosen: will go down
  alternatives:
  - will descend
  lexicon: HALOT
  rationale: ירד commonly means 'go down/descend.' 'Go down' is natural English and
    preserves the directional idiom used for travel to Egypt.
- source_word: עִמְּךָ
  chosen: with you
  lexicon: HALOT
  rationale: Straightforward comitative preposition with second masculine singular
    suffix.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - toward Egypt
  lexicon: HALOT
  rationale: The directional he indicates motion toward Egypt. Standard English idiom
    is 'to Egypt.'
- source_word: אַעַלְךָ
  chosen: will bring you up
  alternatives:
  - will cause you to go up
  - will lead you up
  lexicon: HALOT
  rationale: The Hiphil of עלה is causative. 'Bring you up' is idiomatic and preserves
    the causative sense without awkwardness.
- source_word: גַם עָלֹה
  chosen: also surely
  alternatives:
  - surely also
  - indeed
  - yes, certainly
  lexicon: HALOT
  rationale: The combination intensifies the promise. Rendering it as 'also surely'
    preserves both the additive force of גַם and the emphatic infinitive absolute
    עָלֹה paired with the finite verb.
- source_word: וְיוֹסֵף
  chosen: and Joseph
  lexicon: HALOT
  rationale: Proper name transliterated according to translation philosophy.
- source_word: יָשִׁית יָדוֹ עַל עֵינֶיךָ
  chosen: will place his hand over your eyes
  alternatives:
  - will lay his hand on your eyes
  - will close your eyes
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of placing the hand on the eyes, commonly
    understood of closing the eyes at death. The main text keeps the concrete image;
    the idiomatic interpretation is preserved in a footnote.
