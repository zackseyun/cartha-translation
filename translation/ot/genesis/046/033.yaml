id: GEN.46.33
reference: Genesis 46:33
source:
  edition: WLC
  text: וְ/הָיָ֕ה כִּֽי יִקְרָ֥א לָ/כֶ֖ם פַּרְעֹ֑ה וְ/אָמַ֖ר מַה מַּעֲשֵׂי/כֶֽם־־׃
translation:
  text: And when Pharaoh calls you and says, ‘What is your occupation?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What is your work?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: The Hebrew idiom וְהָיָה כִּי commonly introduces a future contingency
    ('and when/now when'). Rendering it as 'And when' gives natural English while
    preserving the temporal force, rather than woodenly retaining 'it shall be.'
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - if
  lexicon: HALOT
  rationale: In the construction וְהָיָה כִּי, כִּי functions temporally, best rendered
    'when' in English.
- source_word: יִקְרָא לָכֶם
  chosen: calls you
  alternatives:
  - summons you
  - calls for you
  lexicon: HALOT
  rationale: קרא with ל can mean 'call to/call for/summon.' 'Calls you' is concise
    and idiomatic here, fitting the court setting without overstating formality.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: וְאָמַר
  chosen: and says
  alternatives:
  - and asks
  - and will say
  lexicon: HALOT
  rationale: Although formally a waw-consecutive perfect in a future sequence, the
    sense is straightforward future narration. 'And says' works naturally after 'when
    Pharaoh calls you.' 'Asks' is interpretive; 'says' stays closer to the Hebrew.
- source_word: מַה
  chosen: What
  alternatives:
  - What kind of
  - What is
  lexicon: HALOT
  rationale: Simple interrogative introducing Pharaoh's question.
- source_word: מַּעֲשֵׂיכֶם
  chosen: your occupation
  alternatives:
  - your work
  - your trade
  - your business
  lexicon: HALOT
  rationale: The noun from עשה refers to work/deed/occupation in context. Since Pharaoh
    is asking about their line of work, 'occupation' is the clearest idiomatic rendering
    in modern English.
