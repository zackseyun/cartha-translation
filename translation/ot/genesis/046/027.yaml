theological_decisions:
- issue: Rendering נֶפֶשׁ in a genealogical census context
  chosen_reading: persons
  alternative_readings:
  - souls
  - people
  rationale: The verse is counting members of Jacob's household, not making an anthropological
    statement about the soul. Rendering נֶפֶשׁ as 'persons' preserves the idiomatic
    census sense and avoids misleading theological overtones in English.
  doctrine_reference: Translation philosophy §1, §6
