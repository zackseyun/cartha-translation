id: GEN.46.27
reference: Genesis 46:27
source:
  edition: WLC
  text: וּ/בְנֵ֥י יוֹסֵ֛ף אֲשֶׁר יֻלַּד ל֥/וֹ בְ/מִצְרַ֖יִם נֶ֣פֶשׁ שְׁנָ֑יִם כָּל
    הַ/נֶּ֧פֶשׁ לְ/בֵֽית יַעֲקֹ֛ב הַ/בָּ֥אָה מִצְרַ֖יְמָ/ה שִׁבְעִֽים־־־־׃פ
translation:
  text: And the sons of Joseph who were born to him in Egypt were two persons. All
    the persons of the house of Jacob who came to Egypt were seventy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'souls'; here נֶפֶשׁ is an idiom for individual persons in a census
      or family count.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בֵּן in the plural construct commonly means 'sons of.' Here it refers
    specifically to Joseph's male offspring already named in context, so 'sons of'
    is more precise than the broader 'children of.' The prefixed conjunction is rendered
    simply 'And.'
- source_word: יֻלַּד לוֹ
  chosen: were born to him
  alternatives:
  - were born for him
  - he fathered
  lexicon: HALOT
  rationale: The passive of ילד with ל + pronominal suffix naturally means 'were born
    to him.' This preserves the Hebrew syntax better than the more active English
    'he fathered.'
- source_word: בְמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב.
- source_word: נֶפֶשׁ שְׁנָיִם
  chosen: two persons
  alternatives:
  - two souls
  - two people
  lexicon: HALOT
  rationale: נֶפֶשׁ in census/genealogical contexts functions idiomatically for an
    individual person. 'Two persons' preserves the counting idiom without importing
    the more theologically loaded English 'souls.' 'People' is possible, but 'persons'
    better matches the formal counting register.
- source_word: כָּל הַנֶּפֶשׁ
  chosen: All the persons
  alternatives:
  - All the souls
  - The whole number of persons
  lexicon: HALOT
  rationale: Again, נֶפֶשׁ is used as a counting term for persons. Although singular
    in Hebrew after כָּל, idiomatic English requires a plural expression here.
- source_word: לְבֵית יַעֲקֹב
  chosen: of the house of Jacob
  alternatives:
  - belonging to the house of Jacob
  - for the household of Jacob
  lexicon: HALOT
  rationale: The phrase denotes membership in Jacob's household/family line. 'House
    of Jacob' is a standard and transparent rendering that preserves the familial-corporate
    sense.
- source_word: הַבָּאָה
  chosen: who came
  alternatives:
  - who were coming
  - who had come
  lexicon: HALOT
  rationale: The participle with the article functions collectively for the household
    as a unit. English relative clause 'who came' is the most natural equivalent in
    this summary statement.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - Egyptward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Egypt. Natural English expresses
    this as 'to Egypt.'
- source_word: שִׁבְעִים
  chosen: were seventy
  alternatives:
  - numbered seventy
  - totaled seventy
  lexicon: HALOT
  rationale: The verbless Hebrew clause gives the total count. 'Were seventy' is concise
    and close to the source; 'totaled seventy' would also be acceptable but is slightly
    more interpretive.
