id: GEN.46.32
reference: Genesis 46:32
source:
  edition: WLC
  text: וְ/הָ/אֲנָשִׁים֙ רֹ֣עֵי צֹ֔אן כִּֽי אַנְשֵׁ֥י מִקְנֶ֖ה הָי֑וּ וְ/צֹאנָ֧/ם
    וּ/בְקָרָ֛/ם וְ/כָל אֲשֶׁ֥ר לָ/הֶ֖ם הֵבִֽיאוּ־־׃
translation:
  text: The men are shepherds, for they have been keepers of livestock, and they have
    brought their flocks and their herds and all that they have.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were keepers of livestock ... they brought.' The Hebrew perfects can
      be rendered with simple past in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  chosen: The men
  alternatives:
  - and the men
  lexicon: HALOT
  rationale: Definite plural noun with conjunction. In English, the conjunction is
    not always carried over at the start of a reported statement; 'The men' is natural
    and preserves the referent.
- source_word: רֹעֵי צֹאן
  chosen: shepherds
  alternatives:
  - keepers of sheep
  - pasturers of flocks
  lexicon: HALOT
  rationale: Construct phrase literally 'sheep-herders.' 'Shepherds' is the idiomatic
    and accurate English equivalent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the explanation for why they are called shepherds.
    'For' fits the explanatory sense in smooth English.
- source_word: אַנְשֵׁי מִקְנֶה
  chosen: keepers of livestock
  alternatives:
  - men of livestock
  - livestock men
  - cattlemen
  lexicon: HALOT
  rationale: The phrase denotes people occupied with animal husbandry. 'Keepers of
    livestock' is clear modern English and preserves the occupational sense without
    narrowing מִקְנֶה to only cattle.
- source_word: הָיוּ
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: The perfect here describes their established occupation up to the present
    context. 'Have been' conveys that continuing background slightly better in English
    than a simple past, though either is possible.
- source_word: וְצֹאנָם
  chosen: their flocks
  alternatives:
  - their sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, especially sheep and goats.
    'Their flocks' matches the collective sense and pairs naturally with 'their herds'.
- source_word: וּבְקָרָם
  chosen: their herds
  alternatives:
  - their cattle
  lexicon: HALOT
  rationale: בקר refers to cattle. 'Their herds' is slightly broader and works well
    in the collocation 'flocks and herds,' a standard English pairing for the Hebrew
    categories.
- source_word: וְכָל אֲשֶׁר לָהֶם
  chosen: all that they have
  alternatives:
  - all that belongs to them
  - everything they own
  lexicon: HALOT
  rationale: This phrase comprehensively includes their possessions. 'All that they
    have' is close to the Hebrew and natural in English.
- source_word: הֵבִיאוּ
  chosen: they have brought
  alternatives:
  - they brought
  lexicon: HALOT
  rationale: The perfect reports completed action relevant to the present audience
    with Pharaoh. 'They have brought' suits the immediate context of arrival and present
    possession.
