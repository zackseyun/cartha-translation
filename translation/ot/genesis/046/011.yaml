id: GEN.46.11
reference: Genesis 46:11
source:
  edition: WLC
  text: וּ/בְנֵ֖י לֵוִ֑י גֵּרְשׁ֕וֹן קְהָ֖ת וּ/מְרָרִֽי׃
translation:
  text: 'And the sons of Levi: Gershon, Kohath, and Merari.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered as "And" to preserve the list-like continuity
    of the genealogy. בְנֵי is the construct plural "sons of," the standard genealogical
    expression; "sons" is retained rather than a more generic term because the Hebrew
    is explicitly gendered and refers to male descendants.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Proper personal name, transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names rather than
    translate them.
- source_word: גֵּרְשׁוֹן
  chosen: Gershon
  alternatives:
  - Gershom
  lexicon: HALOT
  rationale: The Hebrew form here is גֵּרְשׁוֹן, conventionally transliterated "Gershon."
    "Gershom" is a distinct but similar biblical name and is not the form present
    in this verse.
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Qehath
  lexicon: HALOT
  rationale: Proper name transliterated by standard English biblical convention as
    "Kohath." A more strictly phonetic transliteration such as "Qehath" is possible
    but less natural in readable modern English.
- source_word: וּ/מְרָרִי
  chosen: and Merari
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered with "and" before the final name
    in the series. "Merari" is the standard English transliteration of the proper
    name.
