id: GEN.46.29
reference: Genesis 46:29
source:
  edition: WLC
  text: וַ/יֶּאְסֹ֤ר יוֹסֵף֙ מֶרְכַּבְתּ֔/וֹ וַ/יַּ֛עַל לִ/קְרַֽאת יִשְׂרָאֵ֥ל אָבִ֖י/ו
    גֹּ֑שְׁנָ/ה וַ/יֵּרָ֣א אֵלָ֗י/ו וַ/יִּפֹּל֙ עַל צַוָּארָ֔י/ו וַ/יֵּ֥בְךְּ עַל
    צַוָּארָ֖י/ו עֽוֹד־־־׃
translation:
  text: Then Joseph harnessed his chariot and went up to meet Israel his father in
    Goshen. He presented himself to him, fell on his neck, and wept on his neck for
    a long time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he appeared to him' / 'he showed himself to him.' The Hebrew verb can
      be rendered more formally, but here it likely means Joseph presented himself
      before his father at the reunion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'wept on his neck עוד'; the final word can be rendered 'still'
      or 'yet,' but in context it conveys prolonged weeping.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאְסֹר
  chosen: harnessed
  alternatives:
  - made ready
  - hitched
  lexicon: HALOT
  rationale: אָסַר literally means 'bind' or 'tie'; with 'chariot' as object, the
    idiom refers to preparing or harnessing the chariot for travel. 'Harnessed' is
    more concrete than 'made ready' and fits the source image.
- source_word: מֶרְכַּבְתּוֹ
  chosen: his chariot
  alternatives:
  - his chariot-team
  lexicon: HALOT
  rationale: The noun denotes chariot/ride; in context the straightforward rendering
    is 'his chariot.'
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - set out
  - went
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Even though the movement is toward Goshen,
    retaining 'went up' preserves the Hebrew narrative idiom without obscuring meaning.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to greet
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose: Joseph went in order
    to meet his father. ''To meet'' is the most natural and direct English equivalent.'
- source_word: יִשְׂרָאֵל אָבִיו
  chosen: Israel his father
  alternatives:
  - his father Israel
  - Jacob his father
  lexicon: HALOT
  rationale: The Hebrew uses the covenant name 'Israel,' so the translation preserves
    that name rather than substituting 'Jacob.' The appositional phrase is kept close
    to the Hebrew order while remaining readable.
- source_word: גֹּשְׁנָה
  chosen: in Goshen
  alternatives:
  - to Goshen
  lexicon: HALOT
  rationale: The directional suffix can indicate motion toward Goshen, but in this
    clause it functions naturally with the meeting scene located there. English idiom
    is best served by 'in Goshen' after 'to meet.'
- source_word: וַיֵּרָא אֵלָיו
  chosen: He presented himself to him
  alternatives:
  - he appeared to him
  - he showed himself to him
  lexicon: HALOT
  rationale: 'The Niphal of ראה here is reflexive/passive in sense: Joseph made himself
    visible to his father. ''Presented himself to him'' communicates the personal
    encounter more idiomatically than the potentially misleading ''appeared to him.'''
- source_word: וַיִּפֹּל עַל צַוָּארָיו
  chosen: fell on his neck
  alternatives:
  - embraced him around the neck
  - fell upon his neck
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for an emotional embrace. 'Fell on his
    neck' preserves the vividness of the source while remaining understandable in
    English.
- source_word: וַיֵּבְךְּ עַל צַוָּארָיו
  chosen: wept on his neck
  alternatives:
  - wept while embracing him
  - cried on his neck
  lexicon: HALOT
  rationale: The repeated phrase mirrors the Hebrew's emotional intensity. Keeping
    'on his neck' preserves the physical immediacy of the reunion scene.
- source_word: עוֹד
  chosen: for a long time
  alternatives:
  - still
  - yet
  - again
  lexicon: HALOT
  rationale: Here עוֹד adverbially intensifies the duration of Joseph's weeping in
    context. English 'for a long time' best captures the sense conveyed in this reunion
    scene, more clearly than the overly literal 'still' or 'yet'.
