id: GEN.46.12
reference: Genesis 46:12
source:
  edition: WLC
  text: וּ/בְנֵ֣י יְהוּדָ֗ה עֵ֧ר וְ/אוֹנָ֛ן וְ/שֵׁלָ֖ה וָ/פֶ֣רֶץ וָ/זָ֑רַח וַ/יָּ֨מָת
    עֵ֤ר וְ/אוֹנָן֙ בְּ/אֶ֣רֶץ כְּנַ֔עַן וַ/יִּהְי֥וּ בְנֵי פֶ֖רֶץ חֶצְר֥וֹן וְ/חָמֽוּל־׃
translation:
  text: 'And the sons of Judah: Er, Onan, Shelah, Perez, and Zerah. But Er and Onan
    died in the land of Canaan. And the sons of Perez were Hezron and Hamul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses a singular verb with the compound subject ''Er and Onan,''
      a normal Hebrew construction; the English sense is plural: ''Er and Onan died.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: Construct form of בנים with prefixed conjunction. 'And the sons of' preserves
    the genealogical linkage to the surrounding list while remaining natural English.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: עֵר
  chosen: Er
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: אוֹנָן
  chosen: Onan
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: שֵׁלָה
  chosen: Shelah
  alternatives:
  - Shilah
  lexicon: HALOT
  rationale: Personal name transliterated in its common English biblical form 'Shelah.'
- source_word: פֶרֶץ
  chosen: Perez
  alternatives:
  - Peretz
  - Pharez
  lexicon: HALOT
  rationale: Personal name transliterated in standard modern English biblical usage.
    'Peretz' is closer to Hebrew phonology, but 'Perez' is more familiar and readable.
- source_word: זָרַח
  chosen: Zerah
  alternatives:
  - Zarah
  lexicon: HALOT
  rationale: Personal name transliterated in standard English biblical form.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Although morphologically singular, the verb precedes a compound subject
    ('Er and Onan'), a common Hebrew construction. English idiom requires plural sense,
    so 'died' best conveys the meaning without awkwardness.
- source_word: בְּאֶרֶץ כְּנַעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retains the explicit noun 'land' present in Hebrew while remaining natural
    in English.
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: In this genealogical context היה introduces the identification of descendants;
    'were' is the most natural English equivalent.
- source_word: בְנֵי פֶרֶץ
  chosen: the sons of Perez
  alternatives:
  - Perez's sons
  - the descendants of Perez
  lexicon: HALOT
  rationale: Construct phrase in a genealogy is best rendered straightforwardly as
    'the sons of Perez.' 'Descendants' would be broader than the immediate filial
    sense here.
- source_word: חֶצְרוֹן
  chosen: Hezron
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: חָמוּל
  chosen: Hamul
  alternatives:
  - Hamul
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
