id: GEN.46.15
reference: Genesis 46:15
source:
  edition: WLC
  text: אֵ֣לֶּה בְּנֵ֣י לֵאָ֗ה אֲשֶׁ֨ר יָֽלְדָ֤ה לְ/יַעֲקֹב֙ בְּ/פַדַּ֣ן אֲרָ֔ם וְ/אֵ֖ת דִּינָ֣ה בִתּ֑/וֹ כָּל נֶ֧פֶשׁ בָּנָ֛י/ו וּ/בְנוֹתָ֖י/ו שְׁלֹשִׁ֥ים וְ/שָׁלֹֽשׁ׀־׃
translation:
  text: These are the sons of Leah, whom she bore to Jacob in Paddan-aram, along with Dinah his daughter. All the persons of his sons and his daughters were thirty-three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all the soul/person'—an idiom meaning the total number of persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'Altogether his sons and his daughters were thirty-three persons.'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural construct 'sons of Leah.' Although the list includes Dinah, the phrase is a conventional genealogical heading and is best rendered 'sons' rather than the broader 'children.'
- source_word: אֲשֶׁר יָלְדָה לְיַעֲקֹב
  chosen: whom she bore to Jacob
  alternatives:
  - whom she gave birth to for Jacob
  lexicon: HALOT
  rationale: יָלַד in the Qal with a female subject means 'to bear, give birth to.' 'Bore to Jacob' is idiomatic modern English and preserves the maternal sense.
- source_word: בְּפַדַּן אֲרָם
  chosen: in Paddan-aram
  alternatives:
  - in Paddan Aram
  - in the plain of Aram
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated, per project philosophy on names.
- source_word: וְאֵת דִּינָה בִתּוֹ
  chosen: along with Dinah his daughter
  alternatives:
  - and Dinah his daughter
  lexicon: HALOT
  rationale: The direct-object marker אֵת here adds Dinah to the reckoning after the heading 'sons of Leah.' 'Along with' makes the additive force clear in natural English without overstating it.
- source_word: כָּל נֶפֶשׁ
  chosen: Altogether ... were ... persons
  alternatives:
  - all the souls
  - the total number of persons
  lexicon: HALOT
  rationale: נֶפֶשׁ in census/genealogical contexts refers to persons/lives rather than the theological concept 'soul.' 'Persons' is the clearest English rendering here.
- source_word: בָּנָיו וּבְנוֹתָיו
  chosen: his sons and his daughters
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters, so the translation preserves both terms rather than collapsing them into 'children.'
- source_word: שְׁלֹשִׁים וְשָׁלֹשׁ
  chosen: thirty-three
  lexicon: HALOT
  rationale: Straightforward cardinal number. Hyphenated in standard English style.
