id: GEN.46.18
reference: Genesis 46:18
source:
  edition: WLC
  text: אֵ֚לֶּה בְּנֵ֣י זִלְפָּ֔ה אֲשֶׁר נָתַ֥ן לָבָ֖ן לְ/לֵאָ֣ה בִתּ֑/וֹ וַ/תֵּ֤לֶד
    אֶת אֵ֨לֶּה֙ לְ/יַעֲקֹ֔ב שֵׁ֥שׁ עֶשְׂרֵ֖ה נָֽפֶשׁ־־׃
translation:
  text: 'These are the sons of Zilpah, whom Laban gave to Leah his daughter, and she
    bore these to Jacob: sixteen persons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sixteen souls.” Hebrew nephesh here is an idiomatic way of counting
      persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing a summary list. Present-tense English is natural
    in genealogical enumeration and matches common Hebrew list style.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: HALOT
  rationale: The construct with a named mother here refers to her offspring line.
    'Sons' is the most direct rendering of בנים and preserves the gender-accurate
    form of the Hebrew, even though the total includes descendants through them.
- source_word: זִלְפָּה
  chosen: Zilpah
  rationale: Personal name transliterated per project philosophy.
- source_word: אֲשֶׁר נָתַן לָבָן לְלֵאָה בִתּוֹ
  chosen: whom Laban gave to Leah his daughter
  alternatives:
  - that Laban gave to Leah his daughter
  lexicon: HALOT
  rationale: The relative clause modifies Zilpah. 'Whom' is appropriate for a personal
    referent in standard English. The phrase states familial relation plainly without
    expansion.
- source_word: וַתֵּלֶד
  chosen: and she bore
  alternatives:
  - and she gave birth
  lexicon: HALOT
  rationale: ילד in the Qal with a female subject commonly means 'bore' in genealogical
    contexts. This is concise and idiomatic.
- source_word: אֶת אֵלֶּה
  chosen: these
  alternatives:
  - these sons
  - these people
  lexicon: HALOT
  rationale: The direct-object marker plus demonstrative points back to the listed
    group. English does not require repeating a noun; 'these' is sufficient and natural.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: In birth formulas, ל marks the father; 'to Jacob' is the standard literal
    rendering and reads well in English.
- source_word: שֵׁשׁ עֶשְׂרֵה
  chosen: sixteen
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: נָפֶשׁ
  chosen: persons
  alternatives:
  - souls
  - people
  lexicon: HALOT
  rationale: In census/genealogical contexts נֶפֶשׁ idiomatically counts persons rather
    than emphasizing the immaterial soul. 'Persons' is accurate and clear in modern
    English; 'souls' is a possible more literal alternative but can mislead contemporary
    readers.
