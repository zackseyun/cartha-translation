id: GEN.46.24
reference: Genesis 46:24
source:
  edition: WLC
  text: וּ/בְנֵ֖י נַפְתָּלִ֑י יַחְצְאֵ֥ל וְ/גוּנִ֖י וְ/יֵ֥צֶר וְ/שִׁלֵּֽם׃
translation:
  text: 'And the sons of Naphtali: Jahzeel, Guni, Jezer, and Shillem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew name spellings vary in English tradition: ''Jahzeel'' may also be
      rendered ''Jahziel'' or ''Jachzeel,'' and ''Jezer'' may appear as ''Jezer.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'son' and in genealogical lists is
    most naturally rendered 'sons of.' The prefixed conjunction ו is carried as 'And'
    to preserve the list structure in context.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English biblical
    convention, consistent with the translation philosophy to transliterate names.
- source_word: יַחְצְאֵל
  chosen: Jahzeel
  alternatives:
  - Jahziel
  - Jachzeel
  lexicon: HALOT
  rationale: Proper name. 'Jahzeel' follows a common English transliteration convention
    for this Hebrew name. Alternate spellings reflect differing conventions for representing
    ח and צ clusters in English.
- source_word: וְגוּנִי
  chosen: Guni
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction; rendered by transliteration, with
    the conjunction represented by the English list punctuation and final 'and' before
    the last item.
- source_word: וְיֵצֶר
  chosen: Jezer
  alternatives:
  - Jezer
  lexicon: HALOT
  rationale: Proper name. 'Jezer' is a standard English biblical transliteration;
    'Jezer' is a possible alternate spelling depending on how initial yod is represented
    in English.
- source_word: וְשִׁלֵּם
  chosen: Shillem
  alternatives:
  - Shilem
  lexicon: HALOT
  rationale: Proper name. 'Shillem' preserves the doubled consonant indicated in the
    Hebrew spelling more transparently than the simplified 'Shilem.'
