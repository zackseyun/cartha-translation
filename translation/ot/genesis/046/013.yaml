id: GEN.46.13
reference: Genesis 46:13
source:
  edition: WLC
  text: וּ/בְנֵ֖י יִשָׂשכָ֑ר תּוֹלָ֥ע וּ/פֻוָּ֖ה וְ/י֥וֹב וְ/שִׁמְרֽוֹן׃
translation:
  text: 'And the sons of Issachar: Tola, Puvah, Job, and Shimron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Puvah is also spelled Puah in some English traditions.
    reason: lexical_alternative
  - marker: b
    text: 1 Chronicles 7:1 reads Jashub instead of Job.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical lists, 'sons
    of' is the most direct and natural rendering. The prefixed conjunction וּ is retained
    as 'And' to reflect the list structure.
- source_word: יִשָׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: תּוֹלָע
  chosen: Tola
  lexicon: HALOT
  rationale: Proper personal name in a genealogical list; transliterated rather than
    translated.
- source_word: וּ/פֻוָּה
  chosen: Puvah
  alternatives:
  - Puah
  lexicon: HALOT
  rationale: Proper personal name. The consonantal form here supports 'Puvah' as a
    straightforward transliteration of פֻוָּה. 'Puah' is a familiar alternative English
    form found elsewhere and in some traditions, so it is preserved in a footnote
    as a lexical alternative.
- source_word: וְ/י֥וֹב
  chosen: Job
  alternatives:
  - Jashub
  lexicon: HALOT
  rationale: The MT here reads יוֹב, best represented by the standard English name
    'Job.' Because 1 Chronicles 7:1 has 'Jashub,' that alternative is worth preserving
    in a footnote, but the present verse should reflect the Hebrew text as given.
- source_word: וְ/שִׁמְרֽוֹן
  chosen: and Shimron
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. 'Shimron' is the standard
    transliteration.
