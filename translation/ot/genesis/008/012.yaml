id: GEN.8.12
reference: Genesis 8:12
source:
  edition: WLC
  text: וַ/יִּיָּ֣חֶל ע֔וֹד שִׁבְעַ֥ת יָמִ֖ים אֲחֵרִ֑ים וַ/יְשַׁלַּח֙ אֶת הַ/יּוֹנָ֔ה
    וְ/לֹֽא יָסְפָ֥ה שׁוּב אֵלָ֖י/ו עֽוֹד־־־׃
translation:
  text: Then he waited another seven days, and sent out the dove, and it did not return
    to him again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and it no longer returned to him.' The Hebrew negated expression with
      יָסְפָה + שׁוּב can be rendered either as 'did not return again' or 'no longer
      returned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיָּחֶל
  chosen: Then he waited
  alternatives:
  - Then he waited patiently
  - Then he remained for
  lexicon: HALOT
  rationale: From יחל in this context, the sense is to wait or tarry. 'Waited' is
    the plain contextual sense in the flood narrative sequence. 'Then' reflects the
    waw-consecutive narrative progression.
- source_word: עוֹד
  chosen: another
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: Here עוֹד modifies the time expression and is best rendered idiomatically
    as 'another' rather than the more wooden 'still/yet'.
- source_word: שִׁבְעַת יָמִים אֲחֵרִים
  chosen: seven days
  alternatives:
  - seven more days
  - another seven days
  lexicon: HALOT
  rationale: The full phrase means an additional period of seven days. In the main
    text, 'another seven days' is represented by combining this phrase with עוֹד idiomatically.
    This preserves the temporal repetition from the prior context.
- source_word: וַיְשַׁלַּח אֶת־הַיּוֹנָה
  chosen: and sent out the dove
  alternatives:
  - and he sent the dove
  - and released the dove
  lexicon: HALOT
  rationale: שׁלח commonly means 'send.' 'Sent out' fits the narrative setting of
    dispatching the bird from the ark better than the less specific 'sent' and avoids
    overinterpreting with 'released.'
- source_word: וְלֹא יָסְפָה
  chosen: it did not
  alternatives:
  - and she did not continue to
  - and she no longer
  lexicon: HALOT
  rationale: יסף with negation can mean 'not continue' or 'no longer.' Because it
    governs the infinitive שׁוּב, the idiomatic English result is 'did not ... again'
    or 'no longer ...' The feminine verbal form agrees with 'the dove'; English uses
    'it' for the animal.
- source_word: שׁוּב
  chosen: return
  alternatives:
  - come back
  - turn back
  lexicon: HALOT
  rationale: In this context of the dove's movement back to Noah, 'return' is the
    most natural and sufficiently formal rendering.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - back to him
  lexicon: HALOT
  rationale: The prepositional phrase straightforwardly indicates direction toward
    Noah. 'Back' is already implied by 'return,' so 'to him' avoids redundancy.
- source_word: עוֹד
  chosen: again
  alternatives:
  - any longer
  - any more
  lexicon: HALOT
  rationale: The final עוֹד, with the negated יסף + שוב construction, is best rendered
    idiomatically as 'again.' 'Any longer' is also possible, but 'again' is smoother
    in English and matches the eventive sense.
