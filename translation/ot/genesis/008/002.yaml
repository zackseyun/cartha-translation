id: GEN.8.2
reference: Genesis 8:2
source:
  edition: WLC
  text: וַ/יִּסָּֽכְרוּ֙ מַעְיְנֹ֣ת תְּה֔וֹם וַֽ/אֲרֻבֹּ֖ת הַ/שָּׁמָ֑יִם וַ/יִּכָּלֵ֥א
    הַ/גֶּ֖שֶׁם מִן הַ/שָּׁמָֽיִם־׃
translation:
  text: The springs of the deep and the windows of the heavens were shut, and the
    rain from the heavens was restrained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'floodgates of the heavens.' The Hebrew literally refers to openings
      or windows in the sky.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rain from the heavens ceased.' The Hebrew verb can emphasize the
      rain being held back, resulting in its cessation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּכְרוּ
  chosen: were shut
  alternatives:
  - were closed
  - were stopped up
  lexicon: HALOT
  rationale: Nifal wayyiqtol of סכר conveys being shut/closed up. Passive English
    best reflects the Hebrew form and fits both 'springs' and 'windows' as subjects.
- source_word: מַעְיְנֹת
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: HALOT
  rationale: Refers to water sources bursting forth. 'Springs' is natural modern English;
    'fountains' preserves tradition but sounds less natural and can mislead modern
    readers.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the primeval deep
  lexicon: HALOT
  rationale: Standard rendering for the cosmic watery deep in Genesis. 'The deep'
    is both readable and intertextually consistent with Genesis 1:2 and 7:11.
- source_word: אֲרֻבֹּת
  chosen: windows
  alternatives:
  - floodgates
  - sluices
  lexicon: HALOT
  rationale: Literally 'windows/openings.' In this cosmological idiom, 'windows of
    the heavens' preserves the imagery of openings in the sky. 'Floodgates' is interpretive
    and stronger than the lexical form, so it is preserved as an alternative rather
    than used in the main text.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Plural form often rendered 'heavens' in elevated or cosmological contexts.
    Here it matches the imagery of heavenly openings and avoids flattening the expression
    to mere weather language.
- source_word: וַיִּכָּלֵא
  chosen: was restrained
  alternatives:
  - was held back
  - ceased
  lexicon: HALOT
  rationale: From כלה in a passive/reflexive form meaning to be withheld/restrained.
    'Was restrained' captures the sense that the rain was stopped from continuing.
    'Ceased' expresses the result but loses the verbal nuance of being held back.
- source_word: הַגֶּשֶׁם
  chosen: the rain
  alternatives:
  - the downpour
  lexicon: HALOT
  rationale: Straightforward lexical equivalent. 'Rain' is the normal English rendering
    and suits the narrative context.
- source_word: מִן הַשָּׁמַיִם
  chosen: from the heavens
  alternatives:
  - from the sky
  lexicon: HALOT
  rationale: Retains the same cosmological diction as the earlier phrase and preserves
    the repetition present in Hebrew.
