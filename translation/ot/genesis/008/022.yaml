id: GEN.8.22
reference: Genesis 8:22
source:
  edition: WLC
  text: עֹ֖ד כָּל יְמֵ֣י הָ/אָ֑רֶץ זֶ֡רַע וְ֠/קָצִיר וְ/קֹ֨ר וָ/חֹ֜ם וְ/קַ֧יִץ וָ/חֹ֛רֶף
    וְ/י֥וֹם וָ/לַ֖יְלָה לֹ֥א יִשְׁבֹּֽתוּ־׃
translation:
  text: As long as all the days of the earth endure, seedtime and harvest, cold and
    heat, summer and winter, and day and night shall not cease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'all the days of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹד
  chosen: As long as
  alternatives:
  - still
  - yet
  - while
  lexicon: HALOT
  rationale: 'In this temporal construction with כָּל יְמֵי הָאָרֶץ, עֹד introduces
    duration into the future: ''as long as'' or ''while still.'' ''As long as'' best
    captures the idiomatic force in natural English.'
- source_word: כָּל יְמֵי הָאָרֶץ
  chosen: all the days of the earth endure
  alternatives:
  - all the days of the earth
  - throughout all the days of the earth
  lexicon: HALOT
  rationale: Literally 'all the days of the earth.' Adding 'endure' makes the temporal
    sense explicit and smooth in English without changing meaning. It conveys the
    duration of the present world order implied by the phrase.
- source_word: זֶרַע
  chosen: seedtime
  alternatives:
  - sowing
  - seed
  lexicon: HALOT
  rationale: In pairing with קָצִיר ('harvest'), זֶרַע here refers not to 'seed' as
    an object but to the agricultural season/activity of sowing. 'Seedtime' is concise
    and idiomatic in English.
- source_word: קָצִיר
  chosen: harvest
  alternatives:
  - reaping
  lexicon: HALOT
  rationale: Standard agricultural counterpart to 'seedtime/sowing.' 'Harvest' is
    the most natural and broadly understandable rendering.
- source_word: קֹר
  chosen: cold
  alternatives:
  - coolness
  lexicon: HALOT
  rationale: The noun denotes cold as the opposite of heat in this merism-like pairing.
- source_word: חֹם
  chosen: heat
  alternatives:
  - warmth
  lexicon: HALOT
  rationale: '''Heat'' is the direct antonym to ''cold'' and fits the climatic sequence.'
- source_word: קַיִץ
  chosen: summer
  alternatives:
  - dry season
  lexicon: HALOT
  rationale: The term commonly denotes summer; while in some contexts it can evoke
    the dry season, 'summer' is the standard and sufficient rendering here.
- source_word: חֹרֶף
  chosen: winter
  alternatives:
  - rainy season
  lexicon: HALOT
  rationale: The term denotes winter; although in the Levantine climate it overlaps
    with the rainy season, 'winter' is the clearest English equivalent in this paired
    contrast.
- source_word: יוֹם וָלַיְלָה
  chosen: day and night
  lexicon: HALOT
  rationale: A fixed pair denoting the ongoing cycle of time. Standard English rendering
    preserves the cadence and meaning.
- source_word: לֹא יִשְׁבֹּתוּ
  chosen: shall not cease
  alternatives:
  - shall not rest
  - shall not stop
  lexicon: HALOT
  rationale: From שׁבת, 'cease, stop, desist.' In context the subject is the recurring
    cycles named above, so 'shall not cease' is more idiomatic and semantically precise
    than 'shall not rest.'
