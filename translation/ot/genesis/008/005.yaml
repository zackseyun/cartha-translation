id: GEN.8.5
reference: Genesis 8:5
source:
  edition: WLC
  text: וְ/הַ/מַּ֗יִם הָיוּ֙ הָל֣וֹךְ וְ/חָס֔וֹר עַ֖ד הַ/חֹ֣דֶשׁ הָֽ/עֲשִׂירִ֑י בָּֽ/עֲשִׂירִי֙
    בְּ/אֶחָ֣ד לַ/חֹ֔דֶשׁ נִרְא֖וּ רָאשֵׁ֥י הֶֽ/הָרִֽים׃
translation:
  text: And the waters continued to recede until the tenth month. In the tenth month,
    on the first day of the month, the tops of the mountains became visible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were seen' / 'appeared' for 'became visible.' The Hebrew verb can be
      rendered more formally, but the chosen wording best reflects the emergence of
      the mountain tops into view as the waters subsided.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew מַיִם is morphologically plural and commonly rendered as a plural
    mass noun in English in flood contexts; 'the waters' is idiomatic and preserves
    the collective sense.
- source_word: הָיוּ הָלוֹךְ וְחָסוֹר
  chosen: continued to recede
  alternatives:
  - were going and decreasing
  - kept on diminishing
  - were steadily abating
  lexicon: HALOT
  rationale: This construction combines היה with infinitive absolute forms to express
    ongoing, progressive action. 'Continued to recede' captures the durative sense
    in natural English without over-paraphrasing. 'Recede' fits the floodwater context
    better than the more wooden 'decrease.'
- source_word: עַד הַחֹדֶשׁ הָעֲשִׂירִי
  chosen: until the tenth month
  alternatives:
  - until the tenth new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily denotes 'month' in narrative timekeeping. 'Until the
    tenth month' is the straightforward temporal marker.
- source_word: בָּעֲשִׂירִי בְּאֶחָד לַחֹדֶשׁ
  chosen: In the tenth month, on the first day of the month
  alternatives:
  - In the tenth, on the first of the month
  lexicon: HALOT
  rationale: This clause specifies the exact date. Expanding the elliptical Hebrew
    into standard English avoids awkwardness while preserving the formal dating structure.
- source_word: נִרְאוּ
  chosen: became visible
  alternatives:
  - were seen
  - appeared
  - came into view
  lexicon: HALOT
  rationale: 'The Niphal of ראה here is passive/inchoative: the mountain tops came
    to be seen. ''Became visible'' conveys that they emerged into sight as the waters
    lowered, without implying a specific observer.'
- source_word: רָאשֵׁי הֶהָרִים
  chosen: the tops of the mountains
  alternatives:
  - the heads of the mountains
  - the mountain peaks
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in topographical context 'tops' is
    the most natural English equivalent. 'Peaks' is possible, but 'tops' stays closer
    to the Hebrew imagery and avoids suggesting only pointed summits.
