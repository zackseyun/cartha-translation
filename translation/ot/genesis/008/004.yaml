theological_decisions:
- issue: Geographical expression הָרֵי אֲרָרָט
  chosen_reading: the mountains of Ararat
  alternative_readings:
  - Mount Ararat
  rationale: The Hebrew is plural ('mountains'), so the translation should not collapse
    it into the singular traditional expression 'Mount Ararat.' This is a lexical-geographical
    decision rather than a doctrinal one, but it avoids importing a more specific
    claim than the text makes.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
