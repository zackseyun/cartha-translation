id: GEN.8.4
reference: Genesis 8:4
source:
  edition: WLC
  text: וַ/תָּ֤נַח הַ/תֵּבָה֙ בַּ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֔י בְּ/שִׁבְעָה עָשָׂ֥ר י֖וֹם
    לַ/חֹ֑דֶשׁ עַ֖ל הָרֵ֥י אֲרָרָֽט־׃
translation:
  text: And in the seventh month, on the seventeenth day of the month, the ark came
    to rest on the mountains of Ararat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the mountains of Ararat''; the text refers to a mountainous region,
      not specifically to a single mountain peak such as Mount Ararat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּנַח
  chosen: came to rest
  alternatives:
  - rested
  - settled
  lexicon: HALOT
  rationale: From נוח in the wayyiqtol, describing the ark's coming to a resting place.
    'Came to rest' is natural English that preserves the eventive sense better than
    the flatter 'rested.'
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: Standard rendering for Noah's תֵּבָה in Genesis. Although the term can
    denote a chest-like container, 'ark' is the established and contextually precise
    English equivalent here.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  alternatives:
  - on the seventh month
  lexicon: HALOT
  rationale: Temporal ב with month is idiomatically rendered 'in the seventh month'
    in English.
- source_word: בְּשִׁבְעָה עָשָׂר יוֹם לַחֹדֶשׁ
  chosen: on the seventeenth day of the month
  alternatives:
  - on day seventeen of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew date formula. 'On the seventeenth day of
    the month' is clear, accurate, and idiomatic.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple locative preposition; 'on' is the most natural modern English
    equivalent.
- source_word: הָרֵי אֲרָרָט
  chosen: the mountains of Ararat
  alternatives:
  - the hills of Ararat
  - the mountains in Ararat
  lexicon: HALOT
  rationale: הָרֵי is plural construct, so 'mountains of Ararat' is the most direct
    rendering. This refers to the mountainous region associated with Ararat, not necessarily
    a single peak.
