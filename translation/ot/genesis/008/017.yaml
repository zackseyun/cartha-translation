id: GEN.8.17
reference: Genesis 8:17
source:
  edition: WLC
  text: כָּל הַ/חַיָּ֨ה אֲשֶֽׁר אִתְּ/ךָ֜ מִ/כָּל בָּשָׂ֗ר בָּ/ע֧וֹף וּ/בַ/בְּהֵמָ֛ה
    וּ/בְ/כָל הָ/רֶ֛מֶשׂ הָ/רֹמֵ֥שׂ עַל הָ/אָ֖רֶץ הוצא אִתָּ֑/ךְ וְ/שָֽׁרְצ֣וּ בָ/אָ֔רֶץ
    וּ/פָר֥וּ וְ/רָב֖וּ עַל הָ/אָֽרֶץ־־־־־־׃
translation:
  text: Bring out with you every living thing that is with you, from all flesh—birds
    and livestock and every creeping thing that creeps on the earth—so that they may
    swarm on the earth and be fruitful and multiply on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'teem on the earth.' The Hebrew verb carries the sense of abundant swarming
      or teeming.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַחַיָּה
  chosen: every living thing
  alternatives:
  - every animal
  - all the living creatures
  lexicon: HALOT
  rationale: חַיָּה can denote a living creature/animal. Here, because the following
    phrase broadens the scope to 'from all flesh' and then specifies birds, livestock,
    and creeping things, 'every living thing' best captures the comprehensive sense
    without narrowing it to wild animals only.
- source_word: אֲשֶׁר אִתְּךָ
  chosen: that is with you
  alternatives:
  - which is with you
  lexicon: HALOT
  rationale: A straightforward relative clause modifying 'every living thing'; modern
    English prefers 'that is with you.'
- source_word: מִכָּל בָּשָׂר
  chosen: from all flesh
  alternatives:
  - of all flesh
  - from every kind of creature
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh' and in Genesis flood contexts functions
    collectively for animate creatures. 'From all flesh' preserves the Hebrew idiom
    while remaining intelligible in context.
- source_word: בָּעוֹף
  chosen: birds
  alternatives:
  - flying creatures
  - birdkind
  lexicon: HALOT
  rationale: עוֹף can refer broadly to flying creatures, but in this triad with livestock
    and creeping things, 'birds' is the most natural and sufficiently accurate English
    rendering.
- source_word: וּבַבְּהֵמָה
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to land animals, especially domesticated animals
    in common English categorization. 'Livestock' is clearer and more natural than
    archaic 'beasts,' while avoiding the narrower 'cattle.'
- source_word: וּבְכָל הָרֶמֶשׂ
  chosen: and every creeping thing
  alternatives:
  - and every swarming thing
  - and every crawling thing
  lexicon: HALOT
  rationale: רֶמֶשׂ denotes small creatures that move close to the ground. 'Creeping
    thing' preserves the traditional semantic range and fits the paired participle
    that follows.
- source_word: הָרֹמֵשׂ עַל הָאָרֶץ
  chosen: that creeps on the earth
  alternatives:
  - that moves on the earth
  - that crawls on the earth
  lexicon: HALOT
  rationale: The participle רֹמֵשׂ echoes רֶמֶשׂ. Rendering both with the 'creep'
    word-family preserves the Hebrew wordplay and semantic linkage.
- source_word: הוֹצֵא אִתָּךְ
  chosen: Bring out with you
  alternatives:
  - Take out with you
  - Cause to go out with you
  lexicon: HALOT
  rationale: 'The Hiphil imperative of יצא is causative: Noah is commanded to bring
    the animals out. ''Bring out with you'' is idiomatic and preserves the causative
    force better than a bare ''go out.'''
- source_word: וְשָׁרְצוּ
  chosen: so that they may swarm
  alternatives:
  - and let them swarm
  - that they may teem
  lexicon: HALOT
  rationale: The verb שׁרץ recalls the creation/blessing language of abundant proliferation.
    'Swarm' is a strong, concrete rendering; the purposive 'so that they may' reflects
    the command's intended result in English.
- source_word: בָאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - throughout the land
  lexicon: HALOT
  rationale: אָרֶץ here is best taken as 'earth' in the broad post-flood sense, not
    merely a local 'land.' 'On the earth' fits the movement and multiplication imagery.
- source_word: וּפָרוּ
  chosen: be fruitful
  alternatives:
  - bear fruit
  - increase
  lexicon: HALOT
  rationale: This is standard creation-blessing language in Genesis. 'Be fruitful'
    preserves the intertextual echo with Genesis 1.
- source_word: וְרָבוּ
  chosen: and multiply
  alternatives:
  - and become many
  - and increase greatly
  lexicon: HALOT
  rationale: רבה in this collocation is conventionally and accurately rendered 'multiply,'
    again preserving the Genesis creation/blessing echo.
