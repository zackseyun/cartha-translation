theological_decisions:
- issue: Echo of creation blessing language after the flood
  chosen_reading: Retain the traditional phrasing 'be fruitful and multiply' and the
    proliferation verb 'swarm' to preserve the literary-theological connection to
    Genesis 1.
  alternative_readings:
  - Use more generic language such as 'increase greatly'
  rationale: The verse intentionally reuses creation vocabulary, signaling renewal
    after judgment. Preserving that wording reflects the text's theology without adding
    interpretation beyond the Hebrew.
  doctrine_reference: Translation philosophy §1, §5
