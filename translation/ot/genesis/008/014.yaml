id: GEN.8.14
reference: Genesis 8:14
source:
  edition: WLC
  text: וּ/בַ/חֹ֨דֶשׁ֙ הַ/שֵּׁנִ֔י בְּ/שִׁבְעָ֧ה וְ/עֶשְׂרִ֛ים י֖וֹם לַ/חֹ֑דֶשׁ יָבְשָׁ֖ה
    הָ/אָֽרֶץ׃ס
translation:
  text: And in the second month, on the twenty-seventh day of the month, the earth
    was dry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land was dry.' Hebrew אֶרֶץ can mean 'earth,' 'land,' or 'ground';
      'earth' is chosen here because the flood narrative presents the drying in broad,
      world-level terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַחֹדֶשׁ
  chosen: And in the ... month
  alternatives:
  - Now in the ... month
  - In the ... month
  lexicon: HALOT
  rationale: The conjunction ו plus preposition ב introduces the next temporal notice
    in sequence. Rendering with 'And in' preserves the narrative linkage and temporal
    setting without over-translating.
- source_word: הַשֵּׁנִי
  chosen: second
  alternatives:
  - the second
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'month.' English naturally expresses this
    as 'the second month.'
- source_word: בְּשִׁבְעָה וְעֶשְׂרִים יוֹם לַחֹדֶשׁ
  chosen: on the twenty-seventh day of the month
  alternatives:
  - on the seven and twentieth day of the month
  - on the twenty-seventh day in the month
  lexicon: HALOT
  rationale: 'This is the standard Hebrew date formula: preposition + cardinal numbers
    + ''day'' + ''of the month.'' Idiomatic modern English is ''on the twenty-seventh
    day of the month.'''
- source_word: יָבְשָׁה
  chosen: was dry
  alternatives:
  - had dried
  - became dry
  lexicon: HALOT
  rationale: Qal perfect 3fs of יבש describes the resulting state of the land at this
    point in the narrative. 'Was dry' best fits the stative sense in context and reads
    naturally in English.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth,' 'land,' or 'ground.' In the flood narrative,
    the scope is broad and cosmic in presentation, so 'the earth' best matches the
    narrative frame and maintains consistency with the surrounding context.
