id: GEN.8.9
reference: Genesis 8:9
source:
  edition: WLC
  text: וְ/לֹֽא מָצְאָה֩ הַ/יּוֹנָ֨ה מָנ֜וֹחַ לְ/כַף רַגְלָ֗/הּ וַ/תָּ֤שָׁב אֵלָי/ו֙
    אֶל הַ/תֵּבָ֔ה כִּי מַ֖יִם עַל פְּנֵ֣י כָל הָ/אָ֑רֶץ וַ/יִּשְׁלַ֤ח יָד/וֹ֙ וַ/יִּקָּחֶ֔/הָ
    וַ/יָּבֵ֥א אֹתָ֛/הּ אֵלָ֖י/ו אֶל הַ/תֵּבָֽה־־־־־־־׃
translation:
  text: But the dove found no resting place for the sole of her foot, so she returned
    to him, to the ark, because the waters were on the surface of all the earth. Then
    he stretched out his hand and took her and brought her to himself into the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'place of rest' for 'resting place.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the sole of her foot.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew, 'the waters were on the surface of all the earth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'brought her to himself into the ark'.
    reason: previous_rendering
lexical_decisions:
- source_word: מָצְאָה
  chosen: found
  alternatives:
  - came upon
  - discovered
  lexicon: HALOT
  rationale: The verb מצא in Qal commonly means 'find.' 'Found' is the plain English
    equivalent and fits the narrative context naturally.
- source_word: מָנוֹחַ
  chosen: resting place
  alternatives:
  - rest
  - place of rest
  lexicon: HALOT
  rationale: 'The noun denotes a place or condition of rest. ''Resting place'' best
    captures the concrete sense here: a spot where the dove could settle.'
- source_word: לְכַף רַגְלָהּ
  chosen: for the sole of her foot
  alternatives:
  - for her foot
  - for the palm of her foot
  lexicon: HALOT
  rationale: כַּף with 'foot' refers specifically to the sole. Rendering the phrase
    fully preserves the Hebrew imagery rather than flattening it to simply 'for her
    foot.'
- source_word: וַתָּשָׁב אֵלָיו
  chosen: so she returned to him
  alternatives:
  - and she returned to him
  - she came back to him
  lexicon: HALOT
  rationale: שׁוּב means 'return.' 'So she returned' reflects the narrative sequence
    and the result implied by the preceding clause.
- source_word: אֶל הַתֵּבָה
  chosen: to the ark
  alternatives:
  - into the ark
  lexicon: HALOT
  rationale: אֶל normally indicates motion toward. 'To the ark' is the most direct
    rendering here; the later clause explicitly states entry into the ark.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: כִּי here gives the reason the dove returned. 'Because' is clear modern
    English and preserves the causal force.
- source_word: מַיִם עַל־פְּנֵי כָל־הָאָרֶץ
  chosen: the waters were on the surface of all the earth
  alternatives:
  - water was over the face of the whole earth
  - the waters covered the whole earth
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/surface of.' 'On the surface of all the
    earth' preserves the Hebrew image more closely than the more interpretive 'covered.'
- source_word: וַיִּשְׁלַח יָדוֹ
  chosen: he stretched out his hand
  alternatives:
  - he sent out his hand
  - he reached out his hand
  lexicon: HALOT
  rationale: Although שׁלח is literally 'send,' in this idiom with 'hand' English
    naturally uses 'stretch out' or 'reach out.' 'Stretched out his hand' is both
    idiomatic and sufficiently formal.
- source_word: וַיִּקָּחֶהָ
  chosen: took her
  alternatives:
  - grasped her
  - received her
  lexicon: HALOT
  rationale: לקח broadly means 'take.' 'Took her' is the straightforward narrative
    rendering.
- source_word: וַיָּבֵא אֹתָהּ אֵלָיו אֶל הַתֵּבָה
  chosen: brought her to himself into the ark
  alternatives:
  - brought her in to himself, into the ark
  - brought her to him into the ark
  lexicon: HALOT
  rationale: The Hebrew includes both אֵלָיו ('to him/to himself') and אֶל הַתֵּבָה
    ('into/to the ark'). Rendering both avoids omission. 'To himself into the ark'
    sounds slightly marked in English, but it preserves both movements present in
    the Hebrew.
