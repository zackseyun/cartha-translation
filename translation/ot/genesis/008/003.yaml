  from: receded from upon the earth, continually receding
  to: continually receded from upon the earth
  rationale: The current phrasing 'receded..., continually receding' is redundant. The Hebrew infinitive absolute construction (הָלוֹךְ וָשׁוֹב) modifies the main verb (וַיָּשֻׁבוּ) to indicate a continuous action. Integrating this modification as an adverb ('continually receded' or 'steadily receded') creates more natural English and avoids the awkward repetition of the same verbal idea, which sounds like 'it walked, continually walking.'
