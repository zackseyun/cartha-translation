id: GEN.8.3
reference: Genesis 8:3
source:
  edition: WLC
  text: וַ/יָּשֻׁ֧בוּ הַ/מַּ֛יִם מֵ/עַ֥ל הָ/אָ֖רֶץ הָל֣וֹךְ וָ/שׁ֑וֹב וַ/יַּחְסְר֣וּ הַ/מַּ֔יִם מִ/קְצֵ֕ה חֲמִשִּׁ֥ים וּ/מְאַ֖ת יֽוֹם׃
translation:
  text: And the waters continually receded from upon the earth, and the waters diminished at the end of a hundred and fifty days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'going and returning,' an idiom expressing continual or progressive recession of the waters.
    reason: lexical_alternative
  - marker: b
    text: Or 'receded from upon the earth, continually receding'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: receded
  alternatives:
  - returned
  - went back
  lexicon: HALOT
  rationale: The verb שוב literally means 'return/turn back,' but with waters and the following phrase מֵעַל הָאָרֶץ, idiomatic English is 'receded.' This preserves the sense of the floodwaters withdrawing from the earth rather than implying personal motion.
- source_word: מֵעַל הָאָרֶץ
  chosen: from upon the earth
  alternatives:
  - from the earth
  - off the earth
  lexicon: HALOT
  rationale: מֵעַל is more specifically 'from upon' or 'from over.' 'From upon the earth' keeps the spatial imagery of waters lying over the land, while remaining readable.
- source_word: הָלוֹךְ וָשׁוֹב
  chosen: continually receding
  alternatives:
  - going and returning
  - more and more
  - back and forth
  lexicon: HALOT
  rationale: This infinitive absolute construction expresses ongoing, progressive action. 'Continually receding' captures the durative force in natural English better than a wooden 'going and returning,' which would sound like oscillation rather than steady abatement.
- source_word: וַיַּחְסְרוּ
  chosen: diminished
  alternatives:
  - decreased
  - abated
  - grew less
  lexicon: HALOT
  rationale: חסר here describes the waters becoming less. 'Diminished' is clear modern English and distinguishes this clause slightly from the earlier 'receded,' preserving the Hebrew's use of a second verb.
- source_word: מִקְצֵה
  chosen: at the end of
  alternatives:
  - from the end of
  - after
  lexicon: HALOT
  rationale: In temporal usage, מִקְצֵה commonly means 'at the end of' or 'after the completion of.' 'At the end of' is the most direct rendering here.
- source_word: חֲמִשִּׁים וּמְאַת יוֹם
  chosen: a hundred and fifty days
  alternatives:
  - one hundred fifty days
  lexicon: HALOT
  rationale: This is the straightforward cardinal expression. 'A hundred and fifty days' is idiomatic contemporary English.
