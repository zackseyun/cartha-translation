id: GEN.8.10
reference: Genesis 8:10
source:
  edition: WLC
  text: וַ/יָּ֣חֶל ע֔וֹד שִׁבְעַ֥ת יָמִ֖ים אֲחֵרִ֑ים וַ/יֹּ֛סֶף שַׁלַּ֥ח אֶת הַ/יּוֹנָ֖ה
    מִן הַ/תֵּבָֽה־־׃
translation:
  text: Then he waited another seven days, and again sent out the dove from the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then he began another seven days' wait'; the Hebrew verb can more literally
      mean 'began,' but in this context it functions idiomatically as 'waited.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחֶל
  chosen: he waited
  alternatives:
  - he began
  - he tarried
  lexicon: HALOT
  rationale: In this narrative context with a time expression ('another seven days'),
    the verb from יחל is best understood idiomatically as 'waited' rather than the
    more wooden 'began.' This matches the sense of delaying or waiting before the
    next action.
- source_word: עוֹד
  chosen: another
  alternatives:
  - still
  - again
  - yet
  lexicon: HALOT
  rationale: With the following measure of time, עוֹד naturally modifies the period
    as an additional span, yielding 'another seven days.'
- source_word: שִׁבְעַת יָמִים אֲחֵרִים
  chosen: seven days
  alternatives:
  - seven more days
  - another seven days
  lexicon: HALOT
  rationale: The phrase denotes an additional period of seven days. In the full English
    clause, this is represented as 'another seven days.' The adjective אֲחֵרִים reinforces
    that these are additional days beyond the prior waiting period.
- source_word: וַיֹּסֶף
  chosen: again
  alternatives:
  - and he added
  - and he continued
  lexicon: HALOT
  rationale: The idiom וַיֹּסֶף + infinitive/verb commonly means to do something again
    or continue doing it. Here 'again' is the most natural English rendering in sequence
    with the prior sending of the dove.
- source_word: שַׁלַּח
  chosen: sent out
  alternatives:
  - sent forth
  - released
  lexicon: HALOT
  rationale: שׁלח in this context refers to dispatching the dove from the ark. 'Sent
    out' is clear, natural English and preserves the directional force.
- source_word: הַיּוֹנָה
  chosen: the dove
  lexicon: HALOT
  rationale: Definite noun referring to the specific dove already introduced in the
    narrative.
- source_word: מִן הַתֵּבָה
  chosen: from the ark
  alternatives:
  - out of the ark
  lexicon: HALOT
  rationale: תֵּבָה in the Noah narrative is conventionally and accurately rendered
    'ark.' 'From the ark' fits the syntax and reads naturally in English.
