id: GEN.8.11
reference: Genesis 8:11
source:
  edition: WLC
  text: וַ/תָּבֹ֨א אֵלָ֤י/ו הַ/יּוֹנָה֙ לְ/עֵ֣ת עֶ֔רֶב וְ/הִנֵּ֥ה עֲלֵה זַ֖יִת טָרָ֣ף
    בְּ/פִ֑י/הָ וַ/יֵּ֣דַע נֹ֔חַ כִּי קַ֥לּוּ הַ/מַּ֖יִם מֵ/עַ֥ל הָ/אָֽרֶץ־־׃
translation:
  text: And the dove came to him at evening time, and behold, a freshly plucked olive
    leaf was in her mouth. So Noah knew that the waters had subsided from upon the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned to him' for 'came to him'; the Hebrew verb itself means 'came,'
      though the context implies a return.
    reason: lexical_alternative
  - marker: b
    text: '''Freshly plucked'' renders a Hebrew adjective meaning something torn or
      plucked off, implying the leaf had been newly taken from a living olive tree.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the waters had abated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: came
  alternatives:
  - returned
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא normally means 'came' or 'entered.' 'Came' is the
    plain sense; 'returned' is contextually possible but not explicit in the verb
    itself, so it is preserved only as an alternative nuance.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Directly marks motion toward Noah; standard rendering is straightforward
    and should be preserved.
- source_word: הַיּוֹנָה
  chosen: the dove
  lexicon: HALOT
  rationale: Definite noun referring to the bird Noah had sent out earlier; 'dove'
    is the standard lexical equivalent.
- source_word: לְעֵת עֶרֶב
  chosen: at evening time
  alternatives:
  - toward evening
  - at the time of evening
  lexicon: HALOT
  rationale: The phrase denotes the time of day when the dove arrived. 'At evening
    time' is natural modern English while remaining close to the Hebrew expression.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what follows. 'Behold'
    preserves the vividness and surprise of the Hebrew better than flatter alternatives.
- source_word: עֲלֵה זַיִת
  chosen: an olive leaf
  alternatives:
  - an olive branch leaf
  - an olive-tree leaf
  lexicon: HALOT
  rationale: Construct phrase literally 'leaf of olive.' English idiom naturally renders
    this as 'olive leaf.'
- source_word: טָרָף
  chosen: freshly plucked
  alternatives:
  - fresh
  - newly picked
  - torn off
  lexicon: HALOT
  rationale: The adjective conveys something torn/plucked off, hence fresh from the
    tree. 'Freshly plucked' captures both the physical sense and the narrative implication
    that vegetation had reemerged.
- source_word: בְּפִיהָ
  chosen: was in her mouth
  alternatives:
  - in its mouth
  lexicon: HALOT
  rationale: Hebrew uses a feminine suffix agreeing with 'dove.' English may use either
    natural-gender 'her' or impersonal 'its'; 'her' better reflects the grammatical
    gender and the narrative's concrete portrayal.
- source_word: וַיֵּדַע
  chosen: So Noah knew
  alternatives:
  - Then Noah knew
  - And Noah knew
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative to Noah's inference. 'So' communicates
    the inferential force from the sign of the leaf while remaining natural English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of Noah's knowledge rather than a causal
    clause in English style, so 'that' is best.
- source_word: קַלּוּ הַמַּיִם
  chosen: the waters had subsided
  alternatives:
  - the waters had abated
  - the waters had diminished
  - the waters had become slight
  lexicon: HALOT
  rationale: The verb from קלל here indicates that the waters had lessened/abated.
    'Had subsided' is idiomatic modern English and fits floodwaters naturally.
- source_word: מֵעַל הָאָרֶץ
  chosen: from upon the earth
  alternatives:
  - from the earth
  - off the earth
  lexicon: HALOT
  rationale: מֵעַל is more specific than simple 'from'; 'from upon the earth' preserves
    the spatial sense, though slightly formal, and reflects the Hebrew closely.
