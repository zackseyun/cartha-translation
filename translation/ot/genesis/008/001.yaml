id: GEN.8.1
reference: Genesis 8:1
source:
  edition: WLC
  text: וַ/יִּזְכֹּ֤ר אֱלֹהִים֙ אֶת נֹ֔חַ וְ/אֵ֤ת כָּל הַֽ/חַיָּה֙ וְ/אֶת כָּל הַ/בְּהֵמָ֔ה
    אֲשֶׁ֥ר אִתּ֖/וֹ בַּ/תֵּבָ֑ה וַ/יַּעֲבֵ֨ר אֱלֹהִ֥ים ר֨וּחַ֙ עַל הָ/אָ֔רֶץ וַ/יָּשֹׁ֖כּוּ
    הַ/מָּֽיִם־־־־־׃
translation:
  text: But God remembered Noah, and all the wild animals, and all the livestock that
    were with him in the ark. And God caused a wind to pass over the earth, and the
    waters subsided.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God was mindful of Noah.' The Hebrew 'remembered' often implies faithful
      action, not mere recollection.
    reason: lexical_alternative
  - marker: b
    text: Hebrew רוּחַ can mean 'wind,' 'breath,' or 'spirit.' Here 'wind' best fits
      the context, though some see an echo of the Spirit/wind over the waters in Genesis
      1:2.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְכֹּר
  chosen: remembered
  alternatives:
  - turned his attention to
  - was mindful of
  lexicon: HALOT
  rationale: זכר in covenantal/narrative contexts often means more than mental recollection,
    implying attentive action on behalf of the remembered party. 'Remembered' preserves
    the Hebrew idiom and its theological resonance without over-paraphrasing; the
    action that follows makes the effective sense clear.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering of אֱלֹהִים here as the singular God of Israel, with
    singular verbal agreement in context.
- source_word: כָּל הַחַיָּה
  chosen: all the wild animals
  alternatives:
  - every living thing
  - all the animals
  lexicon: HALOT
  rationale: חַיָּה commonly refers to animals, often specifically wild animals, especially
    when paired with בְּהֵמָה. Rendering it distinctly from the following term avoids
    collapsing the Hebrew pair into a single generic category.
- source_word: כָּל הַבְּהֵמָה
  chosen: all the livestock
  alternatives:
  - all the cattle
  - all the domestic animals
  lexicon: HALOT
  rationale: בְּהֵמָה here contrasts with חַיָּה and denotes domesticated land animals.
    'Livestock' is natural modern English and preserves the distinction.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: that were with him
  alternatives:
  - which were with him
  lexicon: HALOT
  rationale: Straightforward relative clause; 'that' is idiomatic modern English.
- source_word: בַּתֵּבָה
  chosen: in the ark
  alternatives:
  - in the box
  - in the vessel
  lexicon: HALOT
  rationale: תֵּבָה is the established term for Noah's ark and Moses' basket; in this
    context 'ark' is the clear and conventional English rendering.
- source_word: וַיַּעֲבֵר ... רוּחַ
  chosen: caused a wind to pass
  alternatives:
  - caused a spirit to pass
  - made a wind blow
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' In this flood context,
    with עַל הָאָרֶץ and the resulting abatement of waters, 'wind' best fits the immediate
    sense. 'Caused ... to pass' reflects the Hiphil of עבר more closely than simply
    'sent,' while remaining readable.
- source_word: עַל הָאָרֶץ
  chosen: over the earth
  alternatives:
  - over the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In the flood narrative's cosmic scope,
    'earth' is preferable.
- source_word: וַיָּשֹׁכּוּ הַמָּיִם
  chosen: the waters subsided
  alternatives:
  - the waters abated
  - the waters decreased
  lexicon: HALOT
  rationale: The verb denotes easing, quieting, or abating. 'Subsided' is clear modern
    English and fits the floodwaters naturally.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: Hebrew grammar
  rationale: The initial waw can be rendered simply 'and,' but 'But' appropriately
    signals the narrative turn from judgment to mercy at this point in the story without
    adding content beyond the discourse function.
