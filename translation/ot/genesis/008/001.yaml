theological_decisions:
- issue: Anthropomorphic language in 'God remembered Noah'
  chosen_reading: Retain the anthropomorphic idiom as 'God remembered Noah'
  alternative_readings:
  - God turned his attention to Noah
  - God was mindful of Noah
  rationale: The Hebrew idiom should be preserved rather than explained away. In context
    it signals divine faithfulness expressed in action, not prior forgetfulness. This
    preserves theological tension and the literary force of the narrative.
  doctrine_reference: Translation philosophy §3
- issue: Meaning of רוּחַ in the flood narrative
  chosen_reading: Render רוּחַ as 'wind' in the main text
  alternative_readings:
  - spirit
  rationale: 'While רוּחַ can denote ''Spirit,'' the immediate narrative function
    is meteorological: God acts upon the waters so that they subside. The possible
    echo of creation imagery is worth preserving in a footnote, but the main text
    should reflect the plain contextual sense.'
  doctrine_reference: Translation philosophy §3
