id: GEN.8.8
reference: Genesis 8:8
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֥ח אֶת הַ/יּוֹנָ֖ה מֵ/אִתּ֑/וֹ לִ/רְאוֹת֙ הֲ/קַ֣לּוּ הַ/מַּ֔יִם
    מֵ/עַ֖ל פְּנֵ֥י הָֽ/אֲדָמָֽה־׃
translation:
  text: Then he sent out the dove from him to see whether the waters had subsided
    from the surface of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had abated.' The Hebrew verb indicates that the floodwaters had lessened.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from upon the face of the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: Then he sent out
  alternatives:
  - And he sent
  - So he sent out
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative. 'Sent out' fits the context
    of releasing a bird from the ark better than the more generic 'sent.' 'Then' captures
    the sequential force naturally in English.
- source_word: הַיּוֹנָה
  chosen: the dove
  alternatives:
  - the pigeon
  lexicon: HALOT
  rationale: יוֹנָה commonly denotes a dove/pigeon. 'Dove' is the established and
    contextually fitting English choice in the flood narrative.
- source_word: מֵאִתּוֹ
  chosen: from him
  alternatives:
  - from with him
  - from himself
  lexicon: HALOT
  rationale: The preposition with pronominal suffix literally indicates movement away
    from Noah's person/presence. 'From him' is a transparent rendering, preserving
    the Hebrew wording more closely than simply omitting it or replacing it with 'from
    the ark.'
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to find out
  - to observe
  lexicon: HALOT
  rationale: Infinitive of ראה expresses purpose. 'To see' is the most direct rendering;
    more interpretive options like 'to find out' are possible but less formally tied
    to the Hebrew.
- source_word: הֲקַלּוּ
  chosen: had subsided
  alternatives:
  - had abated
  - had become lightened
  - had diminished
  lexicon: HALOT
  rationale: From קלל in this context the sense is that the waters had lessened/abated.
    'Had subsided' is idiomatic modern English and conveys reduction in floodwaters
    without archaic tone; 'abated' is possible but less current.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew plural is naturally rendered 'the waters' in flood contexts, matching
    English biblical usage and the distributive sense.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the surface of the ground
  alternatives:
  - from upon the face of the earth
  - from the face of the ground
  lexicon: HALOT
  rationale: The idiom literally means 'from upon the face of the ground/land.' 'Surface
    of the ground' communicates the spatial image in clear modern English. 'Ground'
    is preferred over 'earth' here because אֲדָמָה refers to the soil/land surface
    rather than the globe in this immediate context.
