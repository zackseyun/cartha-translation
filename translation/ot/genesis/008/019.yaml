id: GEN.8.19
reference: Genesis 8:19
source:
  edition: WLC
  text: כָּל הַֽ/חַיָּ֗ה כָּל הָ/רֶ֨מֶשׂ֙ וְ/כָל הָ/ע֔וֹף כֹּ֖ל רוֹמֵ֣שׂ עַל הָ/אָ֑רֶץ
    לְ/מִשְׁפְּחֹ֣תֵי/הֶ֔ם יָצְא֖וּ מִן הַ/תֵּבָֽה־־־־־׃
translation:
  text: Every beast, every creeping thing, and every bird—everything that moves on
    the earth—went out from the ark by their families.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their families.' The Hebrew expression preserves the idea
      of grouped descent or divisions among the animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַחַיָּה
  chosen: Every beast
  alternatives:
  - Every living thing
  - Every animal
  - All the wild animals
  lexicon: HALOT
  rationale: חַיָּה here denotes the land animals distinguished from creeping things
    and birds in the surrounding list. 'Beast' preserves the categorical sense without
    over-specifying domesticated or wild status. 'Every' reflects distributive כָּל.
- source_word: כָּל הָרֶמֶשׂ
  chosen: every creeping thing
  alternatives:
  - every creeping creature
  - every swarming thing
  lexicon: HALOT
  rationale: רֶמֶשׂ refers to small creatures that move close to the ground. 'Creeping
    thing' is a conventional but still understandable rendering that fits the Genesis
    taxonomy.
- source_word: וְכָל הָעוֹף
  chosen: and every bird
  alternatives:
  - and every flying creature
  - and every fowl
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this triad 'bird' is
    the most natural English rendering and matches the immediate context.
- source_word: כֹּל רוֹמֵשׂ עַל הָאָרֶץ
  chosen: everything that moves on the earth
  alternatives:
  - everything that creeps on the earth
  - everything that swarms on the earth
  lexicon: HALOT
  rationale: רוֹמֵשׂ is a participle from the same semantic field as רֶמֶשׂ. Rendering
    it as 'moves' avoids awkward repetition ('creeping thing ... everything that creeps')
    while preserving the broad sense of terrestrial movement. 'On the earth' is retained
    literally.
- source_word: לְמִשְׁפְּחֹתֵיהֶם
  chosen: by their families
  alternatives:
  - according to their families
  - by their kinds
  - family by family
  lexicon: HALOT
  rationale: מִשְׁפָּחָה ordinarily means 'family/clan.' In the animal context it
    indicates grouped descent or divisions. 'By their families' is a natural English
    rendering that preserves the Hebrew imagery better than the more interpretive
    'kinds.'
- source_word: יָצְאוּ מִן הַתֵּבָה
  chosen: went out from the ark
  alternatives:
  - came out of the ark
  - went forth from the ark
  lexicon: HALOT
  rationale: יָצְאוּ is the simple verb 'go out/come out.' 'Went out from the ark'
    is straightforward and preserves the directional sense. 'Ark' is the established
    rendering of תֵּבָה in the Noah narrative.
