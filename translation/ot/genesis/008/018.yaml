id: GEN.8.18
reference: Genesis 8:18
source:
  edition: WLC
  text: וַ/יֵּ֖צֵא נֹ֑חַ וּ/בָנָ֛י/ו וְ/אִשְׁתּ֥/וֹ וּ/נְשֵֽׁי בָנָ֖י/ו אִתּֽ/וֹ־־׃
translation:
  text: So Noah went out, and his sons and his wife and his sons’ wives with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Noah went out' or 'And Noah went out.' The Hebrew narrative form
      can be represented by several simple English connectors.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the wives of his sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: So Noah went out
  alternatives:
  - Then Noah went out
  - And Noah went out
  - Noah came out
  lexicon: HALOT
  rationale: The waw-consecutive on יָצָא advances the narrative. 'Went out' is the
    most natural rendering of יָצָא here; 'came out' is possible in English from the
    ark's perspective but less directly reflects the Hebrew verb. 'So' captures the
    immediate result of the prior command without over-paraphrasing.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בָּנִים specifically means 'sons' here, not a gender-inclusive 'children.'
    This follows the gender-accurate principle and matches the named male offspring
    in the narrative.
- source_word: וְאִשְׁתּוֹ
  chosen: and his wife
  alternatives:
  - and Noah's wife
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix straightforwardly means 'his wife.'
    Retaining the pronoun reflects the Hebrew structure and keeps the list compact.
- source_word: וּנְשֵׁי בָנָיו
  chosen: and his sons’ wives
  alternatives:
  - and the wives of his sons
  - and his daughters-in-law
  lexicon: HALOT
  rationale: Literally 'and the wives of his sons.' 'His sons’ wives' is clear, natural
    English and preserves the family relationship. 'Daughters-in-law' is semantically
    valid but less formally aligned to the Hebrew expression.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - with Noah
  lexicon: HALOT
  rationale: The preposition with 3ms suffix means 'with him.' Keeping the pronoun
    mirrors the Hebrew and naturally closes the list.
