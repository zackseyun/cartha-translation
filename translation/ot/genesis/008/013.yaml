id: GEN.8.13
reference: Genesis 8:13
source:
  edition: WLC
  text: וַֽ֠/יְהִי בְּ/אַחַ֨ת וְ/שֵׁשׁ מֵא֜וֹת שָׁנָ֗ה בָּֽ/רִאשׁוֹן֙ בְּ/אֶחָ֣ד לַ/חֹ֔דֶשׁ
    חָֽרְב֥וּ הַ/מַּ֖יִם מֵ/עַ֣ל הָ/אָ֑רֶץ וַ/יָּ֤סַר נֹ֨חַ֙ אֶת מִכְסֵ֣ה הַ/תֵּבָ֔ה
    וַ/יַּ֕רְא וְ/הִנֵּ֥ה חָֽרְב֖וּ פְּנֵ֥י הָֽ/אֲדָמָֽה־־׃
translation:
  text: And it came about in the six hundred and first year, in the first month, on
    the first day of the month, that the waters had dried up from upon the earth.
    Then Noah removed the covering of the ark and looked, and behold, the surface
    of the ground was dry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the six hundred and first year.' The Hebrew literally reads 'in
      one and six hundred year.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the roof of the ark.' The Hebrew term means 'covering' and does not
      require a more specific architectural sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the six hundred first year'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it came about
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a temporal notice. 'And it came
    about' preserves the Hebrew narrative progression without sounding overly archaic
    like 'came to pass.'
- source_word: בְּאַחַת וְשֵׁשׁ מֵאוֹת שָׁנָה
  chosen: in the six hundred first year
  alternatives:
  - in the six hundred and first year
  - in year six hundred and one
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'in one and six hundred year.' English
    ordinal style is best represented as 'the six hundred first year'; this likely
    refers to Noah's age/year count in context, but the verse itself leaves that implicit.
- source_word: בָּרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - in the first
  lexicon: HALOT
  rationale: With the article and temporal context, this is best understood elliptically
    as 'in the first month,' made explicit for natural English.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Hebrew idiom for a calendar date. Expanded slightly for clarity while
    remaining close to the source.
- source_word: חָרְבוּ הַמַּיִם מֵעַל הָאָרֶץ
  chosen: the waters had dried up from upon the earth
  alternatives:
  - the waters were dried up from the earth
  - the waters had dried off the earth
  lexicon: HALOT
  rationale: חרב here denotes drying up. 'Had dried up' fits the perfect aspect in
    past narrative context. 'From upon the earth' preserves מֵעַל more closely than
    simply 'from the earth.'
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took away
  - pulled back
  lexicon: HALOT
  rationale: סור in the hiphil commonly means remove/take away. 'Removed' is concise
    and natural.
- source_word: מִכְסֵה
  chosen: the covering
  alternatives:
  - the roof
  - the covering layer
  lexicon: HALOT
  rationale: The noun denotes a covering. 'Roof' is possible interpretively, but 'covering'
    stays closer to the lexical sense without over-specifying the ark's structure.
- source_word: הַתֵּבָה
  chosen: the ark
  alternatives:
  - the box
  - the vessel
  lexicon: HALOT
  rationale: Standard rendering for Noah's תבה in Genesis; contextually established
    and readily understood.
- source_word: וַיַּרְא
  chosen: looked
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Following the action of removing the covering, 'looked' better captures
    the observational force in English narrative than the more result-oriented 'saw.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: Preserves the deictic, attention-directing force of the Hebrew particle
    in a readable but still elevated narrative register.
- source_word: חָרְבוּ פְּנֵי הָאֲדָמָה
  chosen: the surface of the ground was dry
  alternatives:
  - the face of the ground was dry
  - the ground's surface had dried
  lexicon: HALOT
  rationale: פְּנֵי literally 'face/surface of'; 'surface' is the natural English
    equivalent here. הָאֲדָמָה is better rendered 'ground' rather than 'earth' in
    this clause to distinguish the land surface from the broader world and to avoid
    awkward repetition with הָאָרֶץ earlier in the verse.
