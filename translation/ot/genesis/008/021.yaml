theological_decisions:
- issue: Anthropomorphic language for God in sacrificial response
  chosen_reading: 'Retain the anthropomorphism: ''the LORD smelled the pleasing aroma'' and ''said to himself.'''
  alternative_readings:
  - Interpret more abstractly, e.g., 'accepted the offering' or 'resolved within himself'
  rationale: The Hebrew text uses concrete anthropomorphic expressions. Following optimal equivalence and original-language primacy, the translation preserves them rather than replacing them with theological abstractions. This does not imply creaturely limitation in God; it reflects the text's own mode of revelation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of אָדָם in generic singular statements
  chosen_reading: Use 'man' in the main text.
  alternative_readings:
  - humankind
  - humanity
  rationale: DOCTRINE.md directs gender-accurate rendering over gender-neutral where the source has grammatically masculine representative force. Here הָאָדָם is generic-singular and is mirrored by 'man,' while the sense remains representative of humanity as a whole.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
