id: GEN.8.21
reference: Genesis 8:21
source:
  edition: WLC
  text: וַ/יָּ֣רַח יְהוָה֮ אֶת רֵ֣יחַ הַ/נִּיחֹחַ֒ וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל לִבּ֗/וֹ לֹֽא אֹ֠סִף לְ/קַלֵּ֨ל ע֤וֹד אֶת הָֽ/אֲדָמָה֙ בַּ/עֲב֣וּר הָֽ/אָדָ֔ם כִּ֠י יֵ֣צֶר לֵ֧ב הָ/אָדָ֛ם רַ֖ע מִ/נְּעֻרָ֑י/ו וְ/לֹֽא אֹסִ֥ף ע֛וֹד לְ/הַכּ֥וֹת אֶת כָּל חַ֖י כַּֽ/אֲשֶׁ֥ר עָשִֽׂיתִי־־־־־־־׃
translation:
  text: And Yahweh smelled the pleasing aroma, and Yahweh said in his heart, “I will never again curse the ground because of man, for the inclination of man’s heart is evil from his youth. And I will never again strike down every living thing as I have done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the soothing aroma.' The Hebrew sacrificial expression can emphasize that the aroma is pleasing or calming.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to his heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of humankind.' The Hebrew 'man' here is generic, referring to humanity.
    reason: lexical_alternative
  - marker: d
    text: Or 'the inclination of man’s heart is evil from his youth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּרַח ... רֵיחַ הַנִּיחֹחַ
  chosen: smelled the pleasing aroma
  alternatives:
  - smelled the soothing aroma
  - smelled the sweet savor
  lexicon: HALOT
  rationale: 'The clause is anthropomorphic and straightforwardly sensory: ''smelled.'' רֵיחַ is ''smell/aroma,'' and נִיחֹחַ in sacrificial contexts denotes a pleasing/soothing odor. ''Pleasing aroma'' is natural modern English and preserves the sacrificial sense without archaic wording.'
- source_word: אֶל לִבּוֹ
  chosen: to himself
  alternatives:
  - in his heart
  - to his heart
  lexicon: HALOT
  rationale: Literally 'to his heart.' In English, 'said to himself' best conveys internal divine resolve. The more literal alternatives are possible, but this rendering communicates the idiom clearly while preserving the inwardness of the speech.
- source_word: לֹא אֹסִף ... עוֹד
  chosen: I will never again
  alternatives:
  - I will not again
  - I will no longer continue to
  lexicon: HALOT
  rationale: The idiom with יסף plus infinitive and עוֹד expresses not repeating an action. 'Never again' is the most idiomatic and forceful English equivalent here.
- source_word: לְקַלֵּל
  chosen: curse
  alternatives:
  - bring a curse on
  lexicon: HALOT
  rationale: קלל in the Piel here means 'to curse.' 'Curse' is the direct and standard rendering.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the land
  - the soil
  lexicon: HALOT
  rationale: אֲדָמָה in Genesis often refers to the ground/soil as the cultivated earth, and 'ground' fits the allusion to the earlier curse on the ground.
- source_word: בַּעֲבוּר הָאָדָם
  chosen: because of man
  alternatives:
  - on account of man
  - for the sake of man
  - because of humankind
  lexicon: HALOT
  rationale: בַּעֲבוּר here indicates cause or occasion. Per DOCTRINE.md, אָדָם should be rendered 'man' or 'humankind' according to context. Here the singular generic sense is preserved well by 'man,' matching the representative force of the Hebrew.
- source_word: יֵצֶר לֵב הָאָדָם
  chosen: the intention of man’s heart
  alternatives:
  - the inclination of man’s heart
  - the forming of man’s heart
  lexicon: HALOT
  rationale: יֵצֶר denotes formation, inclination, or intent. In this moral context, 'intention' communicates the inward bent or devising of the heart in clear English. 'Inclination' is also strong and traditional, but 'intention' reads more naturally for contemporary readers.
- source_word: רַע
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: רַע here is moral, not merely unpleasant. 'Evil' preserves the ethical weight.
- source_word: מִנְּעֻרָיו
  chosen: from his youth
  alternatives:
  - from his childhood
  - from his earliest years
  lexicon: HALOT
  rationale: The phrase denotes the period beginning in youth. 'From his youth' is concise and close to the Hebrew.
- source_word: לְהַכּוֹת
  chosen: strike down
  alternatives:
  - smite
  - strike
  - destroy
  lexicon: HALOT
  rationale: נכה in the Hiphil often means to strike, strike down, or smite. 'Strike down' preserves the force of judgment without archaic diction.
- source_word: כָּל חַי
  chosen: every living thing
  alternatives:
  - all life
  - every living creature
  lexicon: HALOT
  rationale: The phrase is broad and collective. 'Every living thing' is natural and comprehensive in context.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  chosen: as I have done
  alternatives:
  - as I did
  lexicon: HALOT
  rationale: The perfect can be rendered simply in English as a completed prior action with present relevance. 'As I have done' fits the solemn divine declaration and current aftermath of the flood.
