  from: And it happened, at the end of forty days, that Noah opened the window of
    the ark that he had made.
  to: At the end of forty days, Noah opened the window of the ark that he had made.
  rationale: The Hebrew `וַיְהִי` often introduces a narrative sequence and can be
    translated as 'And it happened... that...'. However, this construction is somewhat
    formal and cumbersome in contemporary English. A more natural and direct rendering,
    which is common in modern optimal-equivalence translations, is to subordinate
    the introductory temporal clause ('At the end of forty days') and proceed directly
    to the main action ('Noah opened...'). This improves readability without sacrificing
    accuracy.
