id: GEN.8.7
reference: Genesis 8:7
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֖ח אֶת הָֽ/עֹרֵ֑ב וַ/יֵּצֵ֤א יָצוֹא֙ וָ/שׁ֔וֹב עַד יְבֹ֥שֶׁת הַ/מַּ֖יִם
    מֵ/עַ֥ל הָ/אָֽרֶץ־־׃
translation:
  text: Then he sent out the raven, and it went out, going back and forth until the
    waters had dried up from upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and it went out, going out and returning.' The Hebrew
      expression conveys repeated movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: Then he sent out
  alternatives:
  - And he sent out
  - So he sent out
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative. 'Then' gives natural English
    narrative sequence while preserving the consecutive force; 'sent out' reflects
    the causative action of dispatching the bird.
- source_word: הָעֹרֵב
  chosen: the raven
  lexicon: HALOT
  rationale: Definite noun with article; straightforward zoological reference. 'Raven'
    is the standard and precise gloss for עֹרֵב.
- source_word: וַיֵּצֵא
  chosen: it went out
  alternatives:
  - it flew out
  - it went forth
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, referring to the raven. 'Went out' is the plain
    sense and avoids adding the more specific 'flew,' which the Hebrew does not explicitly
    state.
- source_word: יָצוֹא וָשׁוֹב
  chosen: going back and forth
  alternatives:
  - to and fro
  - going out and returning
  lexicon: HALOT
  rationale: Infinitive absolute construction with שוב expresses repeated or continuous
    motion. 'Going back and forth' communicates iterative movement in readable modern
    English. 'To and fro' is traditional but more archaic; 'going out and returning'
    is more formally literal but less idiomatic.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the point when
  lexicon: HALOT
  rationale: Standard temporal marker introducing the endpoint of the raven's repeated
    movement.
- source_word: יְבֹשֶׁת
  chosen: had dried up
  alternatives:
  - were dried up
  - dried up
  lexicon: HALOT
  rationale: Qal infinitive construct of יבשׁ after עַד gives the terminating circumstance.
    Rendering with English past perfect ('had dried up') fits the narrative frame
    and the plural subject 'waters.'
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew uses the plural form מַיִם conventionally; 'the waters' preserves
    the biblical idiom and suits the flood context.
- source_word: מֵעַל הָאָרֶץ
  chosen: from upon the earth
  alternatives:
  - from the surface of the earth
  - off the earth
  lexicon: HALOT
  rationale: מֵעַל literally means 'from upon/from over.' 'From upon the earth' preserves
    the spatial imagery more closely than the smoother but slightly interpretive 'from
    the surface of the earth.'
