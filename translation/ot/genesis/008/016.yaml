id: GEN.8.16
reference: Genesis 8:16
source:
  edition: WLC
  text: צֵ֖א מִן הַ/תֵּבָ֑ה אַתָּ֕ה וְ/אִשְׁתְּ/ךָ֛ וּ/בָנֶ֥י/ךָ וּ/נְשֵֽׁי בָנֶ֖י/ךָ
    אִתָּֽ/ךְ־־׃
translation:
  text: Come out of the ark, you and your wife, and your sons and your sons' wives
    with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the wives of your sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֵא
  chosen: Come out
  alternatives:
  - Go out
  - Exit
  lexicon: HALOT
  rationale: Imperative masculine singular of יצא, a direct command to leave. 'Come
    out' is idiomatic modern English for emerging from an enclosed space and fits
    divine speech from outside the ark; 'go out' is possible but less natural here.
- source_word: מִן הַתֵּבָה
  chosen: of the ark
  alternatives:
  - from the ark
  lexicon: HALOT
  rationale: The preposition מן marks movement out from the ark. English idiom prefers
    'come out of' rather than 'come out from' in this construction. תֵּבָה is the
    vessel Noah occupied, conventionally and accurately rendered 'ark'.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis or explicitness after the imperative.
    English normally includes 'you' in the coordinated list without needing an emphatic
    reflexive.
- source_word: וְאִשְׁתְּךָ
  chosen: and your wife
  alternatives:
  - and your woman
  lexicon: HALOT
  rationale: אִשָּׁה in this possessive context clearly means 'wife,' not merely 'woman.'
- source_word: וּבָנֶיךָ
  chosen: and your sons
  alternatives:
  - and your children
  lexicon: HALOT
  rationale: בָּנִים specifically denotes sons here, not children in general. This
    follows the gender-accurate principle and the immediate parallel with their wives.
- source_word: וּנְשֵׁי בָנֶיךָ
  chosen: and your sons' wives
  alternatives:
  - and the wives of your sons
  - and your daughters-in-law
  lexicon: HALOT
  rationale: Literally 'the wives of your sons.' 'Your sons' wives' is natural and
    transparent English. 'Daughters-in-law' is semantically correct but less formally
    aligned with the Hebrew phrasing.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: 'Marks accompaniment. Although the morphology table tags a feminine suffix,
    the consonantal form here functions in context as the standard prepositional phrase
    addressed to Noah: ''with you.'' The sense is straightforward accompaniment of
    the family group.'
