id: GEN.25.30
reference: Genesis 25:30
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר עֵשָׂ֜ו אֶֽל יַעֲקֹ֗ב הַלְעִיטֵ֤/נִי נָא֙ מִן הָ/אָדֹ֤ם הָ/אָדֹם֙ הַ/זֶּ֔ה כִּ֥י עָיֵ֖ף אָנֹ֑כִי עַל כֵּ֥ן קָרָֽא שְׁמ֖/וֹ אֱדֽוֹם־־־־׃
translation:
  text: Esau said to Jacob, “Let me gulp down, please, some of that red stuff, that red stuff there, because I am exhausted.” Therefore his name was called Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'the red, the red,' without naming the food explicitly; the wording likely reflects Esau's impulsive speech. Many translations supply 'stew.'
    reason: lexical_alternative
  - marker: b
    text: Edom sounds like the Hebrew word for 'red,' preserving the wordplay in the verse.
    reason: cross_reference
  - marker: c
    text: Or 'Please let me gulp down'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַלְעִיטֵנִי
  chosen: Please let me gulp down
  alternatives:
  - Please feed me
  - Let me swallow
  - Let me gulp some down
  lexicon: HALOT
  rationale: The Hiphil imperative of לעט carries the sense of greedily swallowing or gulping down rather than the more neutral 'feed me.' The form with 1cs suffix is a request directed to Jacob. 'Let me gulp down' preserves Esau's impulsive, coarse speech better than a smoother English equivalent.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: Polite/request particle best rendered in contemporary English as 'please.' 'Now' is possible but less natural here and can mislead as temporal.
- source_word: מִן הָאָדֹם הָאָדֹם הַזֶּה
  chosen: some of that red stuff, that red stuff there
  alternatives:
  - some of that red, that red there
  - some of that red stew
  - some of the red stuff
  lexicon: HALOT
  rationale: The Hebrew repeats the adjective 'red' without explicitly naming the food, likely reflecting Esau's crude, immediate focus on its appearance. Rendering it as 'red stuff' preserves the ellipsis and repetition better than supplying 'stew' in the main text. 'There' reflects הַזֶּה deictically.
- source_word: כִּי עָיֵף אָנֹכִי
  chosen: because I am exhausted
  alternatives:
  - for I am weary
  - because I am faint
  lexicon: HALOT
  rationale: עָיֵף denotes weariness/exhaustion. 'Exhausted' is natural modern English and fits the urgency of the request. 'Faint' is possible but slightly stronger and may overstate the condition.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - That is why
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential phrase introducing the naming explanation. 'Therefore' is concise and clear.
- source_word: קָרָא שְׁמוֹ אֱדוֹם
  chosen: his name was called Edom
  alternatives:
  - he was called Edom
  - they called his name Edom
  lexicon: HALOT
  rationale: The Hebrew uses a naming formula with 'his name' as subject. 'His name was called Edom' stays close to the source while remaining intelligible. 'He was called Edom' is smoother but slightly less formally reflective of the Hebrew idiom.
- source_word: אֱדוֹם
  chosen: Edom
  alternatives:
  - Red
  lexicon: HALOT
  rationale: As a proper name it should be transliterated, in keeping with the translation philosophy for names. The wordplay with 'red' is preserved by the repeated 'red stuff' earlier in the verse.
