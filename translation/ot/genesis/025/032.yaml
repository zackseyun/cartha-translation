theological_decisions:
- issue: Interpretive force of Esau's statement about dying
  chosen_reading: Rendered as a rhetorical claim of imminent death without specifying
    whether Esau was literally at the point of death or speaking hyperbolically.
  alternative_readings:
  - literal imminent death
  - exaggerated complaint from extreme hunger
  rationale: The Hebrew states only that Esau says he is 'going/about to die.' The
    translation preserves the statement as given and does not resolve the narrative
    or moral interpretation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
