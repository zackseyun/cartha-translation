id: GEN.25.32
reference: Genesis 25:32
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר עֵשָׂ֔ו הִנֵּ֛ה אָנֹכִ֥י הוֹלֵ֖ךְ לָ/מ֑וּת וְ/לָ/מָּה זֶּ֥ה לִ֖/י
    בְּכֹרָֽה־׃
translation:
  text: Esau said, “Look, I am about to die; so what use is this birthright to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am going to die; so why do I need this birthright?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. English narrative style normally
    omits the conjunction and renders simply 'said.'
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to the statement. 'Look' preserves
    the force in readable modern English better than archaic 'Behold.'
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent first-person pronoun adds emphasis, but normal English can
    convey this adequately with simple 'I' in context.
- source_word: הוֹלֵךְ לָמוּת
  chosen: am about to die
  alternatives:
  - am going to die
  - am on the way to die
  lexicon: HALOT
  rationale: הלך + infinitive expresses imminent movement toward an outcome. Here
    it is idiomatic for impending death, not literal motion; 'am about to die' captures
    the sense naturally.
- source_word: וְלָמָּה
  chosen: so what use
  alternatives:
  - and why
  - so why
  lexicon: HALOT
  rationale: Introduces Esau's rhetorical conclusion from his supposed imminent death.
    Rendering with 'so what use' brings out the pragmatic force of the question in
    idiomatic English.
- source_word: זֶּה
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: Demonstrative referring to the birthright as a present object of discussion;
    'this' is the natural proximal rendering.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: Dative of advantage/disadvantage. 'To me' fits the idiom 'what use is
    this ... to me?' while preserving the personal reference.
- source_word: בְּכֹרָה
  chosen: birthright
  alternatives:
  - right of the firstborn
  lexicon: HALOT
  rationale: Established and accurate rendering for the legal/social status and privileges
    of the firstborn son. 'Birthright' is concise and understandable in modern English.
