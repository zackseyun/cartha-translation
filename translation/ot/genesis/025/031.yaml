id: GEN.25.31
reference: Genesis 25:31
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר יַעֲקֹ֑ב מִכְרָ֥/ה כַ/יּ֛וֹם אֶת בְּכֹֽרָתְ/ךָ֖ לִֽ/י־׃
translation:
  text: Jacob said, “Sell me your birthright today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sell me your birthright as of today” or “this day,” emphasizing an immediate,
      binding transaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: The waw-consecutive wayyiqtol advances the narrative. In natural modern
    English, simple past 'said' conveys the sense without the overly wooden 'and he
    said.'
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: מִכְרָה
  chosen: Sell
  alternatives:
  - Sell over
  - Sell now
  lexicon: HALOT
  rationale: Imperative of מכר, 'to sell.' 'Sell' is the plain and direct equivalent.
    The paragogic he does not require a distinct English rendering here.
- source_word: כַיּוֹם
  chosen: today
  alternatives:
  - as of today
  - this day
  lexicon: HALOT
  rationale: The idiom can mean 'today' or 'as of today/this day.' In this context
    Jacob is demanding an immediate transaction, so 'today' is the most natural concise
    rendering. The more formal nuance is preserved in a footnote.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: אֶת marks the definite direct object and normally has no independent
    English equivalent.
- source_word: בְּכֹרָתְךָ
  chosen: your birthright
  alternatives:
  - your right as firstborn
  - your firstborn status
  lexicon: HALOT
  rationale: בְּכֹרָה denotes the rights/privileges of the firstborn son. 'Birthright'
    is the established and accurate English term, concise and contextually clear.
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: With 'sell,' English idiom prefers the indirect object form 'sell me
    your birthright' rather than the more wooden 'sell your birthright to me,' though
    both are possible.
