id: GEN.25.24
reference: Genesis 25:24
source:
  edition: WLC
  text: וַ/יִּמְלְא֥וּ יָמֶ֖י/הָ לָ/לֶ֑דֶת וְ/הִנֵּ֥ה תוֹמִ֖ם בְּ/בִטְנָֽ/הּ׃
translation:
  text: When her days to give birth were fulfilled, behold, there were twins in her
    womb.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּמְלְאוּ
  chosen: were fulfilled
  alternatives:
  - were completed
  - came to fullness
  lexicon: HALOT
  rationale: From מלא in the idiom 'days were fulfilled,' a standard Hebrew expression
    for the completion of a period. 'Were fulfilled' preserves the idiomatic sense
    in readable English better than a more wooden 'were filled.'
- source_word: יָמֶיהָ
  chosen: her days
  alternatives:
  - the days for her
  - her time
  lexicon: HALOT
  rationale: Literally 'her days.' Kept in translation because it participates in
    the Hebrew idiom with וימלאו. 'Her time' is smoother but less transparent to the
    source wording.
- source_word: לָלֶדֶת
  chosen: to give birth
  alternatives:
  - for bearing
  - for delivery
  lexicon: HALOT
  rationale: Infinitive of ילד in the sense of bearing a child. 'To give birth' is
    the most natural modern English equivalent.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: HALOT
  rationale: Retained as 'behold' to preserve the discourse marker's force of drawing
    attention to the surprising or significant fact that follows. Though slightly
    elevated, it remains understandable and reflects the Hebrew emphasis.
- source_word: תוֹמִם
  chosen: twins
  alternatives:
  - twin children
  lexicon: HALOT
  rationale: Plural noun meaning 'twins.' The concise English equivalent is straightforward
    and accurate.
- source_word: בְּבִטְנָהּ
  chosen: in her womb
  alternatives:
  - in her belly
  lexicon: HALOT
  rationale: בטן can mean belly/womb, but in a childbirth context 'womb' is the precise
    and natural English rendering.
