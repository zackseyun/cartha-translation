id: GEN.25.9
reference: Genesis 25:9
source:
  edition: WLC
  text: וַ/יִּקְבְּר֨וּ אֹת֜/וֹ יִצְחָ֤ק וְ/יִשְׁמָעֵאל֙ בָּנָ֔י/ו אֶל מְעָרַ֖ת הַ/מַּכְפֵּלָ֑ה
    אֶל שְׂדֵ֞ה עֶפְרֹ֤ן בֶּן צֹ֨חַר֙ הַֽ/חִתִּ֔י אֲשֶׁ֖ר עַל פְּנֵ֥י מַמְרֵֽא־־־־׃
translation:
  text: His sons Isaac and Ishmael buried him in the cave of Machpelah, in the field
    of Ephron son of Zohar the Hittite, which is opposite Mamre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which is before Mamre” or “which is facing Mamre.” The Hebrew expression
      can denote a location in front of or opposite a landmark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  chosen: buried
  alternatives:
  - and they buried
  lexicon: HALOT
  rationale: Wayyiqtol of קבר narrates the next event in sequence. English can omit
    the initial conjunction for natural narrative flow while preserving the past narrative
    sense.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object marker with 3ms suffix refers back to Abraham in the previous
    verse; standard English object pronoun is required.
- source_word: יִצְחָק וְיִשְׁמָעֵאל בָּנָיו
  chosen: His sons Isaac and Ishmael
  alternatives:
  - Isaac and Ishmael his sons
  lexicon: HALOT
  rationale: The appositional relationship is best represented in natural English
    by fronting 'His sons' while retaining the named sons. The 3ms suffix on 'sons'
    refers to Abraham.
- source_word: אֶל מְעָרַת הַמַּכְפֵּלָה
  chosen: in the cave of Machpelah
  alternatives:
  - to the cave of Machpelah
  - into the cave of Machpelah
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with burial context English idiom prefers
    'buried him in the cave.' 'Machpelah' is transliterated as a place name per translation
    philosophy.
- source_word: אֶל שְׂדֵה עֶפְרֹן
  chosen: in the field of Ephron
  alternatives:
  - to the field of Ephron
  lexicon: HALOT
  rationale: The second אֶל further specifies location. English idiom again prefers
    'in' rather than repeating 'to' after 'buried.' The construct phrase is rendered
    straightforwardly as possession/location.
- source_word: בֶּן צֹחַר
  chosen: son of Zohar
  lexicon: HALOT
  rationale: Standard genealogical rendering of בן plus personal name.
- source_word: הַחִתִּי
  chosen: the Hittite
  lexicon: HALOT
  rationale: Gentilic/ethnic designation rendered with the conventional English form.
- source_word: אֲשֶׁר עַל פְּנֵי מַמְרֵא
  chosen: which is opposite Mamre
  alternatives:
  - which is before Mamre
  - which is facing Mamre
  - which is east of Mamre
  lexicon: HALOT
  rationale: עַל־פְּנֵי in geographical description commonly means 'opposite' or 'facing/before.'
    'Opposite Mamre' is clear modern English and avoids over-specifying direction
    not explicit in the Hebrew.
