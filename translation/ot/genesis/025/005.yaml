id: GEN.25.5
reference: Genesis 25:5
source:
  edition: WLC
  text: וַ/יִּתֵּ֧ן אַבְרָהָ֛ם אֶת כָּל אֲשֶׁר ל֖/וֹ לְ/יִצְחָֽק־־־׃
translation:
  text: Abraham gave everything he had to Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all that was his.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - had given
  - assigned
  lexicon: HALOT
  rationale: From נתן, the basic sense is 'give.' In narrative wayyiqtol, simple past
    'gave' is the most natural English rendering.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name.
- source_word: אֶת
  chosen: '[not separately translated]'
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in the syntax of the clause.
- source_word: כָּל אֲשֶׁר לוֹ
  chosen: everything he had
  alternatives:
  - all that was his
  - all that he possessed
  lexicon: HALOT
  rationale: The phrase literally means 'all that belonged to him.' 'Everything he
    had' is idiomatic modern English and preserves the full scope of Abraham's possessions
    without sounding wooden.
- source_word: לְיִצְחָק
  chosen: to Isaac
  alternatives:
  - for Isaac
  rationale: The preposition ל marks the indirect object/recipient here; 'to Isaac'
    is the clearest English rendering.
