id: GEN.25.33
reference: Genesis 25:33
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יַעֲקֹ֗ב הִשָּׁ֤בְעָ/ה לִּ/י֙ כַּ/יּ֔וֹם וַ/יִּשָּׁבַ֖ע ל֑/וֹ
    וַ/יִּמְכֹּ֥ר אֶת בְּכֹרָת֖/וֹ לְ/יַעֲקֹֽב־׃
translation:
  text: And Jacob said, “Swear to me today.” So he swore to him and sold his birthright
    to Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Swear to me this day” or “as of today.”
    reason: lexical_alternative
  - marker: b
    text: “Birthright” refers to the rights and status belonging to the firstborn
      son.
    reason: cultural_note
lexical_decisions:
- source_word: הִשָּׁבְעָה
  chosen: Swear
  alternatives:
  - Take an oath
  - Swear an oath
  lexicon: HALOT
  rationale: Imperative of שבע in the Niphal/Hithpael-related oath formula sense;
    concise English imperative 'Swear' best matches the direct demand in context.
- source_word: לִּי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל with first person suffix here marks the person to whom
    the oath is made; 'to me' is the most natural English rendering.
- source_word: כַּיּוֹם
  chosen: today
  alternatives:
  - as of today
  - this day
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning 'today' or 'this very day.' 'Today'
    is clear modern English; the urgency is already conveyed by the command.
- source_word: וַיִּשָּׁבַע
  chosen: he swore
  alternatives:
  - he took an oath
  lexicon: HALOT
  rationale: Narrative wayyiqtol of שבע; 'he swore' preserves the verbal link with
    Jacob's command and keeps the sequence tight.
- source_word: וַיִּמְכֹּר
  chosen: sold
  alternatives:
  - gave up in exchange
  - transferred by sale
  lexicon: HALOT
  rationale: מכר plainly denotes selling. 'Sold' preserves the transactional force
    of Esau's act without paraphrase.
- source_word: בְּכֹרָתוֹ
  chosen: his birthright
  alternatives:
  - his right as firstborn
  - his firstborn status
  lexicon: HALOT
  rationale: The noun בכרה refers to the rights/status of the firstborn. 'Birthright'
    is the established and accurate English equivalent here, concise and contextually
    clear.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition marks the recipient of the sale; 'to Jacob' is the natural
    English rendering.
