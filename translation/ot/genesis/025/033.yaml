theological_decisions:
- issue: Nature of Esau's transfer of בכרה
  chosen_reading: sold his birthright
  alternative_readings:
  - sold his rights as firstborn
  rationale: The verse describes a concrete transactional relinquishment of firstborn
    privilege, not a later theological interpretation of its value. 'Birthright' preserves
    the legal-familial concept without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 5
