id: GEN.25.3
reference: Genesis 25:3
source:
  edition: WLC
  text: וְ/יָקְשָׁ֣ן יָלַ֔ד אֶת שְׁבָ֖א וְ/אֶת דְּדָ֑ן וּ/בְנֵ֣י דְדָ֔ן הָי֛וּ אַשּׁוּרִ֥ם
    וּ/לְטוּשִׁ֖ים וּ/לְאֻמִּֽים־־׃
translation:
  text: Jokshan fathered Sheba and Dedan. The sons of Dedan were Asshurim, Letushim,
    and Leummim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly clan names conventionally spelled “Ashurim,” “Lethushim,” and
      “Leumim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקְשָׁן
  chosen: Jokshan
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the project policy to transliterate names.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical context, 'fathered' is natural modern English and accurately
    conveys male descent. 'Begot' is more traditional but archaic; 'became the father
    of' is more explicit but less concise.
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
- source_word: דְּדָן
  chosen: Dedan
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural construct 'sons of.'
    In a genealogy this can denote male descendants or clan founders, but 'sons of'
    best matches the source form and the immediate listing of named groups.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: Simple copular use introducing the names of Dedan's sons/clans. 'Were'
    is the most straightforward rendering here.
- source_word: אַשּׁוּרִם
  chosen: Asshurim
  alternatives:
  - Ashurim
  lexicon: HALOT
  rationale: Likely ethnonym/clan name derived from a proper name; preserved by transliteration.
    'Asshurim' reflects the conventional representation of the Hebrew form.
- source_word: לְטוּשִׁים
  chosen: Letushim
  alternatives:
  - Lethushim
  lexicon: HALOT
  rationale: Clan or tribal name; transliterated rather than interpreted, since the
    referent is a proper ethnonym and the lexical derivation is uncertain for translation
    purposes.
- source_word: לְאֻמִּים
  chosen: Leummim
  alternatives:
  - Leumim
  lexicon: HALOT
  rationale: Proper clan/people name in this context, despite resemblance to a common
    noun root for 'peoples'; transliteration avoids over-interpreting the form as
    a generic noun.
