id: GEN.25.15
reference: Genesis 25:15
source:
  edition: WLC
  text: חֲדַ֣ד וְ/תֵימָ֔א יְט֥וּר נָפִ֖ישׁ וָ/קֵֽדְמָה׃
translation:
  text: Hadad, Tema, Jetur, Naphish, and Kedemah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Temah' as an alternate English transliteration of תֵימָא.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲדַד
  chosen: Hadad
  alternatives:
  - Hadar
  lexicon: HALOT
  rationale: Proper name in a genealogy/list of Ishmael's sons; transliterated rather
    than translated per project philosophy. 'Hadad' follows the consonantal Hebrew
    here. 'Hadar' is a known variant in some traditions for a different genealogical
    context, so preserved only as a possible alternative form, not adopted here.
- source_word: תֵימָא
  chosen: Tema
  alternatives:
  - Tema
  lexicon: HALOT
  rationale: Proper name/place-associated tribal name; transliterated. English convention
    may render either 'Tema' or 'Temah'; the Hebrew final aleph does not require an
    English final 'h', so 'Tema' is the cleaner standard transliteration.
- source_word: יְטוּר
  chosen: Jetur
  alternatives:
  - Yetur
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Jetur' reflects standard English convention
    for initial yod in many biblical names, aiding readability while remaining close
    to the Hebrew.
- source_word: נָפִישׁ
  chosen: Naphish
  alternatives:
  - Nafish
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Naphish' preserves the traditional English
    representation of the consonants and distinguishes the name clearly in genealogical
    context.
- source_word: קֵדְמָה
  chosen: Kedemah
  alternatives:
  - Qedemah
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Kedemah' uses the common English 'k' rather
    than 'q' for readability, while preserving the Hebrew name form.
- source_word: וְ / וָ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links the names in a simple list. English idiom
    renders the sequence with commas and a final 'and' before the last item.
