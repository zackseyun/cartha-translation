id: GEN.25.4
reference: Genesis 25:4
source:
  edition: WLC
  text: וּ/בְנֵ֣י מִדְיָ֗ן עֵיפָ֤ה וָ/עֵ֨פֶר֙ וַ/חֲנֹ֔ךְ וַ/אֲבִידָ֖ע וְ/אֶלְדָּעָ֑ה
    כָּל אֵ֖לֶּה בְּנֵ֥י קְטוּרָֽה־׃
translation:
  text: And the sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah. All these
    were the sons of Keturah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Hanoch'; traditionally 'Enoch' in some English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. 'Sons of' is the
    most direct and genealogically precise rendering in this lineage context; 'children
    of' would be less specific than the Hebrew.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Proper personal name, transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: עֵיפָה
  chosen: Ephah
  alternatives:
  - Eiphah
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. 'Ephah' is the established
    English form for this personal name.
- source_word: וָעֵפֶר
  chosen: Epher
  alternatives:
  - Epher
  lexicon: HALOT
  rationale: Proper name with conjunction. Standard transliteration yields 'Epher.'
- source_word: וַחֲנֹךְ
  chosen: Hanoch
  alternatives:
  - Hanokh
  - Enoch
  lexicon: HALOT
  rationale: Proper name with conjunction. 'Hanoch' more closely reflects the Hebrew
    form חֲנוֹךְ than the traditional anglicized 'Enoch,' and avoids conflation with
    other figures of that name.
- source_word: וַאֲבִידָע
  chosen: Abida
  alternatives:
  - Abidah
  lexicon: HALOT
  rationale: Proper name transliterated directly from the consonantal/vocalized Hebrew.
    'Abida' is the standard English form.
- source_word: וְאֶלְדָּעָה
  chosen: Eldaah
  alternatives:
  - Eldaa
  lexicon: HALOT
  rationale: Proper name transliterated directly. Retaining final 'h' reflects the
    Hebrew ending and standard English biblical convention.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  - These all
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase summing up the listed descendants.
    'All these' is natural modern English and preserves the collective force.
- source_word: בְּנֵי קְטוּרָה
  chosen: were the sons of Keturah
  alternatives:
  - were Keturah's sons
  - belonged to Keturah's line
  lexicon: HALOT
  rationale: Construct phrase identifying the listed descendants as belonging to Keturah's
    line. Repeating 'sons of' preserves the genealogical formula and mirrors the Hebrew
    structure more closely than a possessive paraphrase.
