theological_decisions:
- issue: Meaning of the death formula 'was gathered to his people'
  chosen_reading: Retain the idiomatic wording without resolving whether it refers
    strictly to burial with ancestors, to reunion with one's forebears after death,
    or to both.
  alternative_readings:
  - a burial/family-tomb formula
  - an indication of postmortem reunion with one's people
  rationale: The phrase carries interpretive and theological weight in Genesis, but
    the Hebrew itself does not require the translator to settle the question. Preserving
    the idiom maintains the text's theological tension rather than importing a more
    specific doctrine.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
