id: GEN.25.17
reference: Genesis 25:17
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה שְׁנֵי֙ חַיֵּ֣י יִשְׁמָעֵ֔אל מְאַ֥ת שָׁנָ֛ה וּ/שְׁלֹשִׁ֥ים שָׁנָ֖ה
    וְ/שֶׁ֣בַע שָׁנִ֑ים וַ/יִּגְוַ֣ע וַ/יָּ֔מָת וַ/יֵּאָ֖סֶף אֶל עַמָּֽי/ו־׃
translation:
  text: 'These were the years of Ishmael’s life: one hundred and thirty-seven years.
    Then he breathed his last and died, and was gathered to his people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'expired.' The Hebrew verb here is distinct from the following 'died,'
      so both are retained in translation.
    reason: lexical_alternative
  - marker: b
    text: '''Was gathered to his people'' is a Hebrew idiom used in death notices;
      it may refer to reunion with one''s forebears, burial among one''s kin, or both.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These were
  alternatives:
  - And these are
  lexicon: HALOT
  rationale: 'Introduces a summary statement. Although formally present-tense in form,
    in this narrative context idiomatic English prefers past tense: ''These were.'''
- source_word: שְׁנֵי חַיֵּי
  chosen: the years of ... life
  alternatives:
  - the days/years of the life of
  lexicon: HALOT
  rationale: This Hebrew idiom counts a person's lifespan by 'the years of the life
    of' someone. 'The years of Ishmael’s life' is natural English while preserving
    the idiom's sense.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: מְאַת שָׁנָה וּשְׁלֹשִׁים שָׁנָה וְשֶׁבַע שָׁנִים
  chosen: one hundred and thirty-seven years
  alternatives:
  - a hundred thirty-seven years
  lexicon: HALOT
  rationale: Combines the Hebrew number sequence into standard readable English while
    preserving the exact total.
- source_word: וַיִּגְוַע
  chosen: he breathed his last
  alternatives:
  - he expired
  - he perished
  lexicon: HALOT
  rationale: גוע often denotes expiring or breathing out one's last, especially in
    death notices. 'Breathed his last' preserves the distinct nuance from the following
    verb 'died' better than collapsing both into a single English term.
- source_word: וַיָּמָת
  chosen: and died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Retains the second death verb distinctly rather than smoothing it away,
    since the Hebrew uses both גוע and מות in sequence.
- source_word: וַיֵּאָסֶף אֶל־עַמָּיו
  chosen: and was gathered to his people
  alternatives:
  - and was gathered to his kin
  - and joined his people
  lexicon: HALOT
  rationale: This is a conventional Hebrew death formula. 'Gathered to his people'
    preserves the idiom and its possible resonance beyond mere burial, without over-interpreting
    it.
