id: GEN.25.14
reference: Genesis 25:14
source:
  edition: WLC
  text: וּ/מִשְׁמָ֥ע וְ/דוּמָ֖ה וּ/מַשָּֽׂא׃
translation:
  text: Mishma, Dumah, and Massa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mishmah.' The Hebrew name may be transliterated with a final 'h' to
      reflect the final consonant more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁמָע
  chosen: Mishma
  alternatives:
  - Mishmah
  lexicon: HALOT
  rationale: Proper name in a genealogical list; transliterated rather than translated
    per translation philosophy. English convention commonly shortens the final mater
    to 'Mishma,' though 'Mishmah' is a possible transliteration preserving the final
    Hebrew letter more explicitly.
- source_word: דוּמָה
  chosen: Dumah
  alternatives:
  - Duma
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention. The long
    vowel is represented with 'u'; 'Duma' is a possible simplified transliteration,
    but 'Dumah' better reflects the Hebrew form and common biblical English usage.
- source_word: מַשָּׂא
  chosen: Massa
  alternatives:
  - Massaʾ
  - Masha
  lexicon: HALOT
  rationale: Proper name in the Ishmaelite genealogy; transliterated rather than translated.
    Although the consonantal form can overlap with a common noun meaning 'burden/oracle,'
    the context here is clearly a personal/tribal name, so transliteration is required.
