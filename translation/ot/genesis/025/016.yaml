id: GEN.25.16
reference: Genesis 25:16
source:
  edition: WLC
  text: אֵ֣לֶּה הֵ֞ם בְּנֵ֤י יִשְׁמָעֵאל֙ וְ/אֵ֣לֶּה שְׁמֹתָ֔/ם בְּ/חַצְרֵי/הֶ֖ם וּ/בְ/טִֽירֹתָ֑/ם שְׁנֵים עָשָׂ֥ר נְשִׂיאִ֖ם לְ/אֻמֹּתָֽ/ם־׃
translation:
  text: 'These are the sons of Ishmael, and these are their names, in their settlements and in their encampments: twelve princes according to their tribes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'villages' for 'settlements,' and 'camps' for 'encampments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'twelve chiefs' or 'twelve leaders' according to their peoples.
    reason: alternative_reading
  - marker: c
    text: Or 'by their settlements and by their encampments'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֵלֶּה הֵם
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Standard demonstrative + pronoun construction introducing a list or summary. Present-tense English is natural in genealogical enumeration.
- source_word: בְּנֵי יִשְׁמָעֵאל
  chosen: the sons of Ishmael
  alternatives:
  - the descendants of Ishmael
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In this immediate context the verse concludes the named list of Ishmael's actual sons, so the more specific literal rendering is preferable to the broader 'descendants.'
- source_word: שְׁמֹתָם
  chosen: their names
  lexicon: HALOT
  rationale: Direct and conventional rendering of the noun with 3mp suffix.
- source_word: בְּחַצְרֵיהֶם
  chosen: by their settlements
  alternatives:
  - in their villages
  - by their villages
  - in their settlements
  lexicon: HALOT
  rationale: חָצֵר can denote a settlement, village, or enclosed habitation. 'Settlements' fits the broader tribal-geographical sense here and pairs well with the following term without sounding overly technical.
- source_word: וּבְטִירֹתָם
  chosen: by their encampments
  alternatives:
  - in their camps
  - by their camps
  - in their encampments
  lexicon: HALOT
  rationale: טִירָה can refer to an encampment or fortified camp/settlement. In parallel with חַצְרֵיהֶם, 'encampments' preserves the semi-nomadic flavor often associated with Ishmaelite groups. The preposition is rendered consistently as 'by' across both phrases for smooth English apposition to 'their names.'
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: נְשִׂיאִם
  chosen: princes
  alternatives:
  - chieftains
  - leaders
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a lifted-up one, leader, chief, or prince. 'Princes' is a well-established rendering in patriarchal tribal contexts and matches the elevated status of the twelve named sons. 'Chieftains' is possible but narrower and more interpretive.
- source_word: לְאֻמֹּתָם
  chosen: according to their tribes
  alternatives:
  - according to their peoples
  - for their nations
  - by their clans
  lexicon: HALOT
  rationale: אֻמָּה denotes a people-group or tribe. In this genealogical context, 'tribes' communicates organized descendant groups more naturally than 'nations,' which can sound too large-scale in English, while still reflecting the corporate identity of Ishmael's lines.
