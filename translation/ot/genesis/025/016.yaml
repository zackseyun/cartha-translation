  from: by their settlements and by their encampments
  to: in their settlements and in their encampments
  rationale: The preposition בְּ is most naturally read as locative ('in') here. While rendering it as 'by' has precedent in other translations (implying the names are categorized 'by' location), it creates an awkward English construction where a list of names is modified by places. Changing to 'in' results in a smoother reading, where the phrase describes where these named individuals lived, which is the more probable sense of the Hebrew.
