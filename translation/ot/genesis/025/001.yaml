id: GEN.25.1
reference: Genesis 25:1
source:
  edition: WLC
  text: וַ/יֹּ֧סֶף אַבְרָהָ֛ם וַ/יִּקַּ֥ח אִשָּׁ֖ה וּ/שְׁמָ֥/הּ קְטוּרָֽה׃
translation:
  text: Abraham took another wife, and her name was Keturah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Abraham took a wife again.' The Hebrew literally has an additive expression,
      'Abraham added and took a wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: took another
  alternatives:
  - again
  - continued
  - added
  lexicon: HALOT
  rationale: The verb יסף literally means 'to add' or 'to continue.' In the idiom
    וַיֹּסֶף ... וַיִּקַּח, English is best expressed as 'took another,' making explicit
    that Abraham added a further wife. This avoids an awkwardly literal 'added and
    took' while preserving the sense of repetition/addition.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: לקח with אִשָּׁה is the standard Hebrew idiom for taking a wife. 'Took'
    preserves the source wording more directly, while the object 'another wife' makes
    the marital sense clear in English.
- source_word: אִשָּׁה
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: Although אִשָּׁה can mean 'woman' or 'wife,' in construction with לקח
    here it clearly means 'wife.' This is the natural and contextually precise rendering.
- source_word: וּשְׁמָהּ
  chosen: and her name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: This renders the simple Hebrew naming clause straightforwardly and naturally
    in modern English while preserving the explicit identification formula.
- source_word: קְטוּרָה
  chosen: Keturah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
