theological_decisions:
- issue: Whether to make explicit the additive force of וַיֹּסֶף in relation to Abraham's
    taking a wife
  chosen_reading: Abraham took another wife
  alternative_readings:
  - Abraham took a wife again
  - Abraham added and took a wife
  rationale: The Hebrew presents an additive/repetitive nuance. Rendering it as 'another
    wife' communicates that nuance clearly in idiomatic English without over-paraphrasing.
    It does not import a theological claim beyond the text's plain sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    plain sense over translation-tradition inertia.'
