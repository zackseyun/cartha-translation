id: GEN.25.21
reference: Genesis 25:21
source:
  edition: WLC
  text: וַ/יֶּעְתַּ֨ר יִצְחָ֤ק לַֽ/יהוָה֙ לְ/נֹ֣כַח אִשְׁתּ֔/וֹ כִּ֥י עֲקָרָ֖ה הִ֑וא וַ/יֵּעָ֤תֶר ל/וֹ֙ יְהוָ֔ה וַ/תַּ֖הַר רִבְקָ֥ה אִשְׁתּֽ/וֹ׃
translation:
  text: And Isaac prayed to Yahweh for his wife, because she was barren. And Yahweh answered him, and Rebekah his wife conceived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses the same verb root for both clauses: Isaac ''entreated/prayed earnestly,'' and the LORD ''was entreated by'' him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'opposite his wife,' with the sense that Isaac prayed with reference to or on behalf of her.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּעְתַּר / וַיֵּעָתֶר (עתר)
  chosen: prayed earnestly / answered his prayer
  alternatives:
  - entreated
  - pleaded
  - was entreated by
  lexicon: HALOT
  rationale: 'The same Hebrew root occurs twice in a deliberate wordplay: Isaac ''entreats/prays earnestly'' and the LORD ''is entreated'' by him. In English, rendering the first as ''prayed earnestly'' and the second as ''answered his prayer'' preserves the sense naturally while reflecting the reciprocal relationship implied by the repeated root. A more formally identical rendering such as ''entreated ... was entreated'' is possible but sounds unnatural in modern English.'
- source_word: לַיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD' in keeping with established reverential convention and the stated default.
- source_word: לְנֹכַח אִשְׁתּוֹ
  chosen: for his wife
  alternatives:
  - opposite his wife
  - on behalf of his wife
  - concerning his wife
  lexicon: HALOT
  rationale: לְנֹכַח literally has the sense of 'in front of/opposite,' but in this prayer context it idiomatically conveys prayer with reference to or on behalf of his wife. 'For his wife' communicates the intended sense in clear English without over-literal awkwardness.
- source_word: עֲקָרָה
  chosen: barren
  alternatives:
  - infertile
  - childless
  lexicon: HALOT
  rationale: '''Barren'' is the standard and contextually precise rendering for a woman unable to conceive in biblical narrative. ''Infertile'' is medically modern; ''childless'' states the result rather than the condition.'
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: '''Conceived'' is concise, natural, and fits the narrative register. ''Became pregnant'' is possible but less literary.'
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  rationale: Personal names are transliterated by standard biblical English convention. 'Rebekah' closely reflects the Hebrew form רִבְקָה and is the common OT spelling in English Bibles.
