  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH. This preserves continuity with English Bible convention while signaling
    the covenant name through small-caps convention in publication formatting.
