id: GEN.25.22
reference: Genesis 25:22
source:
  edition: WLC
  text: וַ/יִּתְרֹֽצֲצ֤וּ הַ/בָּנִים֙ בְּ/קִרְבָּ֔/הּ וַ/תֹּ֣אמֶר אִם כֵּ֔ן לָ֥/מָּה
    זֶּ֖ה אָנֹ֑כִי וַ/תֵּ֖לֶךְ לִ/דְרֹ֥שׁ אֶת יְהוָֽה־־׃
translation:
  text: And the children struggled together within her, and she said, “If it is so,
    why am I like this?” So she went to inquire of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “why am I this way?” The Hebrew expression is elliptical and may also
      be understood more literally as “why am I?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְרֹצֲצוּ
  chosen: struggled together
  alternatives:
  - jostled
  - pushed against each other
  - crushed each other
  lexicon: HALOT
  rationale: The hitpael form conveys reciprocal/intensive movement, suggesting conflict
    between the unborn children. 'Struggled together' is natural English and preserves
    the sense of internal conflict better than the milder 'jostled,' while avoiding
    overstatement.
- source_word: הַבָּנִים
  chosen: the children
  alternatives:
  - the sons
  - the boys
  lexicon: HALOT
  rationale: Although בנים can mean 'sons,' at this prenatal stage 'children' is more
    idiomatic in English and does not deny their male identity, which is revealed
    in the following verse. 'Boys' would sound too colloquial.
- source_word: בְּקִרְבָּהּ
  chosen: within her
  alternatives:
  - in her womb
  - inside her
  lexicon: HALOT
  rationale: Literally 'in her inward part/midst.' 'Within her' is a clear, natural
    rendering that preserves the bodily sense without adding the more specific 'womb,'
    which is implied but not explicit in this noun.
- source_word: אִם כֵּן
  chosen: If it is so
  alternatives:
  - If so
  - If this is so
  lexicon: HALOT
  rationale: This conditional phrase introduces Rebekah's distressed response to her
    condition. 'If it is so' is slightly fuller and fits the direct-speech rhythm
    in English.
- source_word: לָמָּה זֶּה אָנֹכִי
  chosen: why am I like this?
  alternatives:
  - why am I this way?
  - why do I exist?
  - why is this happening to me?
  lexicon: HALOT
  rationale: The Hebrew is elliptical and difficult. In context, Rebekah is reacting
    to the violent struggle in her pregnancy, so 'why am I like this?' best captures
    the idiomatic force without importing a philosophical statement about existence.
    'Why do I exist?' is possible more formally, but in context is less likely and
    can mislead modern readers.
- source_word: לִדְרֹשׁ אֶת יְהוָה
  chosen: to inquire of the LORD
  alternatives:
  - to seek the LORD
  - to consult the LORD
  lexicon: HALOT
  rationale: דרש with a personal object often means to seek an oracle or inquire for
    guidance. 'Inquire of' best fits the narrative context of seeking a divine explanation.
    'Seek' is broader and less specific.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
