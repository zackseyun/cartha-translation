id: GEN.25.12
reference: Genesis 25:12
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה תֹּלְדֹ֥ת יִשְׁמָעֵ֖אל בֶּן אַבְרָהָ֑ם אֲשֶׁ֨ר יָלְדָ֜ה הָגָ֧ר
    הַ/מִּצְרִ֛ית שִׁפְחַ֥ת שָׂרָ֖ה לְ/אַבְרָהָֽם־׃
translation:
  text: Now these are the generations of Ishmael, Abraham’s son, whom Hagar the Egyptian,
    Sarah’s slave woman, bore to Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And these are the generations of Ishmael.' The Hebrew formula תּוֹלְדוֹת
      (toledot) is a recurring Genesis heading and can also be rendered 'descendants'
      or 'family line.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Sarah’s maidservant.' The Hebrew שִׁפְחָה refers to a female slave or
      servant; 'slave woman' is used here to preserve the bonded status more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply 'and,' but in English a new
    genealogical heading is often introduced more naturally as 'Now these are' while
    preserving the discourse-linking force.
- source_word: תֹּלְדֹת
  chosen: the generations
  alternatives:
  - the descendants
  - the account
  - the family line
  lexicon: HALOT
  rationale: Toledot is a key Genesis structuring term. 'Generations' preserves the
    recurring formula and its broader sense of lineage/history better than the narrower
    'descendants' or more interpretive 'account'.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: בֶּן אַבְרָהָם
  chosen: Abraham’s son
  alternatives:
  - son of Abraham
  lexicon: HALOT
  rationale: Construct relationship rendered idiomatically in modern English as 'Abraham’s
    son' without loss of meaning.
- source_word: אֲשֶׁר יָלְדָה
  chosen: whom ... bore
  alternatives:
  - who was born to Abraham by
  - whom ... gave birth to
  lexicon: HALOT
  rationale: 'The relative clause with ילד in the Qal 3fs naturally refers to Hagar
    as the mother: ''whom Hagar ... bore.'' This keeps the maternal subject explicit
    and avoids over-paraphrase.'
- source_word: הָגָר
  chosen: Hagar
  rationale: Personal name transliterated by standard English convention.
- source_word: הַמִּצְרִית
  chosen: the Egyptian
  alternatives:
  - the Egyptian woman
  lexicon: HALOT
  rationale: The gentilic adjective identifies Hagar ethnically/nationally. 'The Egyptian'
    is concise and natural in apposition to her name.
- source_word: שִׁפְחַת שָׂרָה
  chosen: Sarah’s slave woman
  alternatives:
  - Sarah’s maidservant
  - Sarah’s female slave
  - Sarah’s servant girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant of lower status. In keeping
    with original-language primacy, 'slave woman' better preserves the bonded status
    than the softer traditional 'maidservant,' while remaining readable.
- source_word: לְאַבְרָהָם
  chosen: to Abraham
  alternatives:
  - for Abraham
  - by Abraham
  lexicon: HALOT
  rationale: The preposition ל with ילד in this construction is naturally rendered
    'bore to Abraham,' indicating the childbearing relation with Abraham as father.
