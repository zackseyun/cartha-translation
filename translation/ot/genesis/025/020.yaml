id: GEN.25.20
reference: Genesis 25:20
source:
  edition: WLC
  text: וַ/יְהִ֤י יִצְחָק֙ בֶּן אַרְבָּעִ֣ים שָׁנָ֔ה בְּ/קַחְתּ֣/וֹ אֶת רִבְקָ֗ה בַּת
    בְּתוּאֵל֙ הָֽ/אֲרַמִּ֔י מִ/פַּדַּ֖ן אֲרָ֑ם אֲח֛וֹת לָבָ֥ן הָ/אֲרַמִּ֖י ל֥/וֹ
    לְ/אִשָּֽׁה־־־׃
translation:
  text: Isaac was forty years old when he took Rebekah, the daughter of Bethuel the
    Aramean from Paddan-aram, the sister of Laban the Aramean, to be his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'when he married Rebekah.' The Hebrew literally
      says 'when he took Rebekah ... to be his wife.'
    reason: lexical_alternative
  - marker: b
    text: '''Aramean'' is more precise than the older traditional rendering ''Syrian.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - came to be
  - became
  lexicon: HALOT
  rationale: In this age statement, the waw-consecutive form of היה functions idiomatically
    to introduce Isaac's age at the time of marriage. 'Was' is natural English and
    preserves the simple predication without woodenly reproducing the Hebrew narrative
    formula.
- source_word: בֶּן אַרְבָּעִים שָׁנָה
  chosen: forty years old
  alternatives:
  - a son of forty years
  - forty years of age
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for age. 'Forty years old' is the clear
    English equivalent.
- source_word: בְּקַחְתּוֹ
  chosen: when he took
  alternatives:
  - at his taking
  - when he married
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the time of the action.
    The verb לקח literally means 'take,' and in marriage contexts means taking a woman
    as wife. Rendering 'when he took' keeps closer to the Hebrew, while the marital
    sense is clarified by the later phrase 'to be his wife.'
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  rationale: Standard English transliteration of the Hebrew personal name, following
    the principle to transliterate names.
- source_word: בַּת בְּתוּאֵל
  chosen: the daughter of Bethuel
  alternatives:
  - Bethuel's daughter
  lexicon: HALOT
  rationale: A straightforward genealogical expression. 'The daughter of Bethuel'
    preserves the formal lineage notice.
- source_word: הָאֲרַמִּי
  chosen: the Aramean
  alternatives:
  - the Syrian
  lexicon: HALOT
  rationale: אֲרַמִּי denotes an Aramean. 'Syrian' reflects older tradition but is
    historically and linguistically less precise for the Hebrew ethnonym. 'Aramean'
    better reflects original-language primacy.
- source_word: מִפַּדַּן אֲרָם
  chosen: from Paddan-aram
  alternatives:
  - from Paddan Aram
  - from the plain of Aram
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated.
    The hyphenated conventional form 'Paddan-aram' is clear and recognizable.
- source_word: אֲחוֹת לָבָן
  chosen: the sister of Laban
  alternatives:
  - Laban's sister
  lexicon: HALOT
  rationale: Another kinship expression. The fuller form preserves the genealogical
    style of the verse.
- source_word: לְאִשָּׁה
  chosen: to be his wife
  alternatives:
  - as a wife
  - for a wife
  lexicon: HALOT
  rationale: This phrase marks the purpose/result of taking Rebekah in marriage. 'To
    be his wife' is idiomatic modern English and makes explicit the possessive sense
    carried by לו plus לְאִשָּׁה.
- source_word: לוֹ
  chosen: his
  alternatives:
  - for himself
  - to him
  lexicon: HALOT
  rationale: The pronominal suffix with the marriage formula indicates that Rebekah
    became Isaac's wife. In English this is best expressed possessively in 'his wife.'
