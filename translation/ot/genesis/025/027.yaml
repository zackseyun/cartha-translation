id: GEN.25.27
reference: Genesis 25:27
source:
  edition: WLC
  text: וַֽ/יִּגְדְּלוּ֙ הַ/נְּעָרִ֔ים וַ/יְהִ֣י עֵשָׂ֗ו אִ֛ישׁ יֹדֵ֥עַ צַ֖יִד אִ֣ישׁ
    שָׂדֶ֑ה וְ/יַעֲקֹב֙ אִ֣ישׁ תָּ֔ם יֹשֵׁ֖ב אֹהָלִֽים׃
translation:
  text: When the boys grew up, Esau became a skillful hunter, a man of the open country,
    but Jacob was a quiet man, dwelling in tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a blameless man,' 'a plain man,' or 'an innocent man' for the Hebrew
      term describing Jacob; the word can carry senses of wholeness, integrity, or
      simplicity depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a man of the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדְּלוּ
  chosen: grew up
  alternatives:
  - grew
  - became great
  lexicon: HALOT
  rationale: In context of children maturing, the verb plainly refers to growing up
    rather than becoming great. 'Grew up' is idiomatic modern English and captures
    the developmental sense.
- source_word: הַנְּעָרִים
  chosen: the boys
  alternatives:
  - the youths
  - the lads
  lexicon: HALOT
  rationale: Refers to Esau and Jacob as the twin sons in their younger stage transitioning
    to adulthood. 'Boys' is natural English and fits the narrative context better
    than the more formal 'youths.'
- source_word: אִישׁ יֹדֵעַ צַיִד
  chosen: a skillful hunter
  alternatives:
  - a man knowing hunting
  - an expert in hunting
  lexicon: HALOT
  rationale: The participle plus object expresses practiced competence. 'Skillful
    hunter' conveys both knowledge and ability in idiomatic English without wooden
    phrasing.
- source_word: אִישׁ שָׂדֶה
  chosen: a man of the open country
  alternatives:
  - a man of the field
  - an outdoorsman
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but here denotes the uncultivated outdoor
    environment associated with Esau's way of life. 'Open country' communicates the
    sense more clearly in contemporary English while preserving the contrast with
    tent-dwelling.
- source_word: אִישׁ תָּם
  chosen: a quiet man
  alternatives:
  - a blameless man
  - a wholesome man
  - a plain man
  - an innocent man
  lexicon: HALOT
  rationale: תָּם can denote completeness, integrity, innocence, or mildness depending
    on context. Here the contrast is with Esau's rugged outdoor life, so a temperament/lifestyle
    sense is most likely. 'Quiet man' fits the immediate contrast and avoids importing
    the stronger moral sense of 'blameless' too early.
- source_word: יֹשֵׁב אֹהָלִים
  chosen: dwelling in tents
  alternatives:
  - living in tents
  - staying among the tents
  lexicon: HALOT
  rationale: The participle indicates characteristic habitation. 'Dwelling in tents'
    is slightly more literary but still natural, and it preserves the habitual sense
    and the contrast with Esau's life in the open country.
