theological_decisions:
- issue: Sense of תָּם in describing Jacob
  chosen_reading: temperament/lifestyle descriptor ('quiet') rather than an explicit
    moral evaluation such as 'blameless'
  alternative_readings:
  - blameless
  - plain
  - innocent
  - whole/complete
  rationale: The immediate literary contrast is between Esau as hunter/man of the
    field and Jacob as tent-dweller. Rendering תָּם as 'quiet' preserves that narrative
    contrast without overstating Jacob's moral status in a way the verse itself does
    not require. This follows the translation philosophy of preserving what the text
    says without importing doctrinal or character judgments beyond the context.
  doctrine_reference: Translation philosophy items 1, 3, and 6
