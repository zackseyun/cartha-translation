  from: the field that Abraham bought from the sons of Heth. There
  to: the field that Abraham bought from the sons of Heth—there
  rationale: The Hebrew begins with a noun phrase (הַשָּׂדֶה, 'the field...') that functions as a topic (casus pendens), which is then elaborated upon by the following clause (שָׁמָּה, 'there...'). The draft renders this as two separate sentences, which makes the first part a sentence fragment. Connecting the two clauses with an em-dash or a semicolon creates a grammatically complete sentence in English and better reflects the dependent relationship between the two clauses in the original Hebrew.
