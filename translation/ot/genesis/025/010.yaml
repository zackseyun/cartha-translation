id: GEN.25.10
reference: Genesis 25:10
source:
  edition: WLC
  text: הַ/שָּׂדֶ֛ה אֲשֶׁר קָנָ֥ה אַבְרָהָ֖ם מֵ/אֵ֣ת בְּנֵי חֵ֑ת שָׁ֛מָּ/ה קֻבַּ֥ר
    אַבְרָהָ֖ם וְ/שָׂרָ֥ה אִשְׁתּֽ/וֹ־־׃
translation:
  text: the field that Abraham bought from the sons of Heth. There Abraham was buried,
    and Sarah his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Hittites' for 'the sons of Heth.' The Hebrew expression is literally
      familial/ethnic and may denote the Hittite people group.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the piece of land
  lexicon: HALOT
  rationale: Definite noun meaning 'field'; 'the field' is the plain and natural rendering
    in context, referring back to the burial property.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'field.' 'That' is
    idiomatic modern English.
- source_word: קָנָה
  chosen: bought
  alternatives:
  - acquired
  - purchased
  lexicon: HALOT
  rationale: In this context of a land transaction, 'bought' best captures the concrete
    commercial sense in readable English.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: The preposition marks source/origin of purchase. 'From' is sufficient
    in English; the fuller idiom would be unnecessarily wooden here.
- source_word: בְּנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  lexicon: HALOT
  rationale: Formally the Hebrew reads 'sons of Heth.' This preserves the source expression
    and the personal-name connection to Heth, while remaining understandable.
- source_word: שָׁמָּה
  chosen: There
  alternatives:
  - there
  lexicon: HALOT
  rationale: Locative adverb referring to that burial site. Capitalized at sentence
    start in English.
- source_word: קֻבַּר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: Passive of 'bury.' 'Was buried' is the direct and natural rendering.
- source_word: וְשָׂרָה אִשְׁתּוֹ
  chosen: and Sarah his wife
  alternatives:
  - and his wife Sarah
  lexicon: HALOT
  rationale: Both are accurate. 'Sarah his wife' follows the Hebrew order more closely
    while remaining natural enough in English.
