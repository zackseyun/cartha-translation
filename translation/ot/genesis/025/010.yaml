  from: Abraham was buried, and Sarah his wife
  to: Abraham and Sarah his wife were buried
  rationale: The Hebrew uses a singular verb (קֻבַּר, 'was buried') preceding a compound subject ('Abraham and Sarah his wife'), which is standard Hebrew grammar. The current English rendering mimics this structure, resulting in an awkward and slightly ambiguous phrase that could imply only Abraham was buried. A more natural and clear English translation would treat 'Abraham and Sarah his wife' as a compound subject requiring a plural verb ('were buried'), which accurately conveys that the act of burial applied to both individuals.
