  from: the sons of Abraham’s concubines
  to: the sons of his concubines
  rationale: The current rendering uses a double possessive ('sons of...' and 'Abraham’s...'), which is grammatically permissible but stylistically awkward. Replacing 'Abraham’s' with 'his' creates a smoother and more natural English phrase, especially since the antecedent is immediately supplied by the subject 'Abraham' in the main clause.
