id: GEN.25.6
reference: Genesis 25:6
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֤י הַ/פִּֽילַגְשִׁים֙ אֲשֶׁ֣ר לְ/אַבְרָהָ֔ם נָתַ֥ן אַבְרָהָ֖ם מַתָּנֹ֑ת וַֽ/יְשַׁלְּחֵ֞/ם מֵ/עַ֨ל יִצְחָ֤ק בְּנ/וֹ֙ בְּ/עוֹדֶ֣/נּוּ חַ֔י קֵ֖דְמָ/ה אֶל אֶ֥רֶץ קֶֽדֶם־׃
translation:
  text: But to the sons of his concubines, Abraham gave gifts, and while he was still alive he sent them away from his son Isaac, eastward to the land of the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to the east country.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sons of Abraham’s concubines'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְלִבְנֵי
  chosen: But to the sons of
  alternatives:
  - And to the sons of
  - As for the sons of
  lexicon: HALOT
  rationale: The conjunction with prefixed preposition introduces a contrast with the previous verse about Isaac as heir. 'But to' brings out the adversative force in context while preserving the dative relation.
- source_word: הַפִּילַגְשִׁים
  chosen: concubines
  alternatives:
  - secondary wives
  lexicon: HALOT
  rationale: The Hebrew refers to women of recognized but lesser marital status. 'Concubines' is the standard concise rendering and best matches the social-legal sense without paraphrase.
- source_word: אֲשֶׁר לְאַבְרָהָם
  chosen: of Abraham’s
  alternatives:
  - who belonged to Abraham
  - that Abraham had
  lexicon: HALOT
  rationale: This relative construction identifies the concubines as Abraham's. The possessive English form is natural and accurate.
- source_word: נָתַן ... מַתָּנֹת
  chosen: gave gifts
  alternatives:
  - granted presents
  lexicon: HALOT
  rationale: A straightforward rendering of the verb-object pair. 'Gifts' is the normal gloss for מַתָּנֹת and fits the inheritance context.
- source_word: וַיְשַׁלְּחֵם
  chosen: he sent them away
  alternatives:
  - he sent them off
  - he dismissed them
  lexicon: HALOT
  rationale: The verb means to send, here with separation from Isaac emphasized by the following phrase. 'Sent them away' captures both motion and removal.
- source_word: מֵעַל יִצְחָק בְּנוֹ
  chosen: from his son Isaac
  alternatives:
  - away from Isaac his son
  - from the presence of his son Isaac
  lexicon: HALOT
  rationale: מֵעַל can mean 'from upon/from beside/from the presence of.' In this context it marks separation from Isaac as the primary heir. 'From his son Isaac' is idiomatic and sufficient; the stronger nuance of separation is already conveyed by 'sent them away.'
- source_word: בְּעוֹדֶנּוּ חַי
  chosen: while he was still alive
  alternatives:
  - during his lifetime
  - while he yet lived
  lexicon: HALOT
  rationale: This temporal expression indicates Abraham acted before his death. 'While he was still alive' is clear modern English and preserves the timing.
- source_word: קֵדְמָה
  chosen: eastward
  alternatives:
  - to the east
  - east
  lexicon: HALOT
  rationale: The directional form with he locale indicates movement toward the east. 'Eastward' neatly reflects the directional nuance.
- source_word: אֶל אֶרֶץ קֶדֶם
  chosen: to the land of the east
  alternatives:
  - to the eastern land
  - to the east country
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic, denoting the eastern region. 'The land of the east' is a transparent rendering that preserves the Hebrew wording better than the more interpretive 'east country.'
