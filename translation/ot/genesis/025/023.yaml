theological_decisions:
- issue: Interpretation of וְרַב יַעֲבֹד צָעִיר
  chosen_reading: the older will serve the younger
  alternative_readings:
  - the greater will serve the lesser
  rationale: The Hebrew literally says 'and great/older will serve young/younger.'
    Because the context is twin sons in the womb, rendering the pair as 'older' and
    'younger' best communicates the referent in natural English. The alternative 'greater
    ... lesser' preserves the more literal adjectival contrast and is worth noting
    because it can broaden the statement beyond birth order to status.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contextual choice while preserving viable alternative.
