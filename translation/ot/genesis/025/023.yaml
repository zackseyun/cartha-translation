id: GEN.25.23
reference: Genesis 25:23
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה לָ֗/הּ שְׁנֵ֤י גיים בְּ/בִטְנֵ֔/ךְ וּ/שְׁנֵ֣י לְאֻמִּ֔ים
    מִ/מֵּעַ֖יִ/ךְ יִפָּרֵ֑דוּ וּ/לְאֹם֙ מִ/לְאֹ֣ם יֶֽאֱמָ֔ץ וְ/רַ֖ב יַעֲבֹ֥ד צָעִֽיר׃
translation:
  text: And the LORD said to her, “Two nations are in your womb, and two peoples will
    be separated from within you; and one people will be stronger than the other,
    and the older will serve the younger.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the greater will serve the lesser.”
    reason: alternative_reading
  - marker: b
    text: Or 'from within you will be separated'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD' rather than a transliteration.
- source_word: שְׁנֵי גיים
  chosen: two nations
  alternatives:
  - two peoples
  lexicon: HALOT
  rationale: גוי commonly denotes a nation or people-group. Here, in parallel with
    לְאֻמִּים, 'nations' fits the political-ethnic sense, while the second line can
    vary to 'peoples' to preserve the poetic parallelism in English.
- source_word: בְּבִטְנֵךְ
  chosen: in your womb
  alternatives:
  - in your belly
  lexicon: HALOT
  rationale: בטן literally refers to the belly/womb; in this pregnancy context, 'womb'
    is the natural and precise English rendering.
- source_word: שְׁנֵי לְאֻמִּים
  chosen: two peoples
  alternatives:
  - two nations
  - two clans
  lexicon: HALOT
  rationale: לְאֹם/לְאֻמִּים refers to a people-group or ethnic community. Rendering
    it as 'peoples' distinguishes it from the previous גויים while preserving the
    synonymous parallelism.
- source_word: מִמֵּעַיִךְ
  chosen: from within you
  alternatives:
  - from your inward parts
  - from your womb
  lexicon: HALOT
  rationale: The term literally refers to inward parts/inner organs, but in context
    of pregnancy it idiomatically points to what comes forth from her body. 'From
    within you' is clear modern English without over-literal awkwardness.
- source_word: יִפָּרֵדוּ
  chosen: will be separated
  alternatives:
  - will be divided
  - will separate
  lexicon: HALOT
  rationale: The Niphal of פרד conveys being separated/divided. 'Will be separated'
    preserves the passive/inchoative sense and fits the prophecy of divergence between
    the descendants.
- source_word: וּלְאֹם מִלְאֹם
  chosen: one people ... than the other
  alternatives:
  - people against people
  - one nation from another
  lexicon: HALOT
  rationale: The Hebrew sets one people-group over against another in a comparative
    relationship. English idiom is smoother with 'one people ... than the other' while
    retaining the contrast.
- source_word: יֶאֱמָץ
  chosen: will be stronger
  alternatives:
  - will prevail
  - will be mighty
  - will strengthen itself
  lexicon: HALOT
  rationale: The verb conveys strength or prevailing strength. In this comparative
    construction, 'will be stronger' most naturally expresses the sense in English.
- source_word: רַב
  chosen: the older
  alternatives:
  - the greater
  - the elder
  - the older one
  lexicon: HALOT
  rationale: Though רַב literally means 'great/many,' in this context contrasting
    siblings in the womb it is idiomatically understood as the greater/older one,
    traditionally Esau. 'The older' communicates the intended contrast with צָעִיר
    clearly.
- source_word: יַעֲבֹד
  chosen: will serve
  alternatives:
  - will be subject to
  - will work for
  lexicon: HALOT
  rationale: עבד in this construction means to serve. 'Will serve' is the standard
    and sufficiently broad rendering.
- source_word: צָעִיר
  chosen: the younger
  alternatives:
  - the younger one
  - the lesser
  lexicon: HALOT
  rationale: The adjective means small/young. In sibling contrast, 'the younger' is
    the most natural English rendering.
