id: GEN.25.28
reference: Genesis 25:28
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֥ב יִצְחָ֛ק אֶת עֵשָׂ֖ו כִּי צַ֣יִד בְּ/פִ֑י/ו וְ/רִבְקָ֖ה אֹהֶ֥בֶת
    אֶֽת יַעֲקֹֽב־־־׃
translation:
  text: Now Isaac loved Esau because game was in his mouth, but Rebekah loved Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'because game was in his mouth.' The expression likely means
      Isaac favored Esau because he enjoyed the game Esau provided.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  chosen: loved
  alternatives:
  - began to love
  - came to love
  lexicon: HALOT
  rationale: Qal wayyiqtol of אָהַב straightforwardly denotes past narrative action,
    'loved.' English simple past fits the storyline naturally.
- source_word: אֶת עֵשָׂו
  chosen: Esau
  rationale: Direct-object marker is not translated; personal name is transliterated
    per project philosophy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Isaac's affection. 'Because' is clearer
    in modern English than the more formal 'for.'
- source_word: צַיִד
  chosen: game
  alternatives:
  - venison
  - wild game
  - hunted food
  lexicon: HALOT
  rationale: צַיִד refers to hunted game/prey. 'Game' is concise, idiomatic, and broader
    than 'venison,' which would narrow the sense to deer.
- source_word: בְּפִיו
  chosen: was in his mouth
  alternatives:
  - was in his taste
  - was in his appetite
  - was in his possession
  lexicon: HALOT
  rationale: The Hebrew is literally 'in his mouth.' This likely means Isaac enjoyed
    eating Esau's game, but the translation preserves the concrete Hebrew expression
    rather than interpreting it more freely as 'he liked to eat' or 'Esau brought
    him game.'
- source_word: וְרִבְקָה
  chosen: but Rebekah
  alternatives:
  - and Rebekah
  lexicon: HALOT
  rationale: Though וְ is formally 'and,' the clause sets up a contrast between parental
    preferences. 'But' brings out the discourse contrast naturally in English without
    changing the sense.
- source_word: אֹהֶבֶת
  chosen: loved
  alternatives:
  - was loving
  - loves
  lexicon: HALOT
  rationale: The participle can express ongoing or characteristic action, but in this
    narrative context English simple past 'loved' is the most natural equivalent and
    matches the preceding clause.
- source_word: אֶת יַעֲקֹב
  chosen: Jacob
  rationale: Direct-object marker is not translated; personal name is transliterated
    per project philosophy.
