id: GEN.25.18
reference: Genesis 25:18
source:
  edition: WLC
  text: וַ/יִּשְׁכְּנ֨וּ מֵֽ/חֲוִילָ֜ה עַד שׁ֗וּר אֲשֶׁר֙ עַל פְּנֵ֣י מִצְרַ֔יִם בֹּאֲ/כָ֖ה
    אַשּׁ֑וּרָ/ה עַל פְּנֵ֥י כָל אֶחָ֖י/ו נָפָֽל־־־־׃פ
translation:
  text: They settled from Havilah to Shur, which is opposite Egypt as you go toward
    Asshur. He settled in defiance of all his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "He settled opposite all his brothers." The Hebrew phrase is idiomatic
      and may describe location rather than hostility.
    reason: alternative_reading
  - marker: b
    text: Asshur may also be rendered "Assyria."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכְּנוּ
  chosen: They settled
  alternatives:
  - They dwelt
  - They lived
  lexicon: HALOT
  rationale: Qal wayyiqtol plural of שׁכן denotes dwelling/settling. 'Settled' fits
    the territorial description and reads naturally in modern English.
- source_word: מֵחֲוִילָה עַד שׁוּר
  chosen: from Havilah to Shur
  lexicon: HALOT
  rationale: A straightforward range formula marking the extent of Ishmael's descendants'
    habitation.
- source_word: אֲשֶׁר עַל־פְּנֵי מִצְרַיִם
  chosen: which is opposite Egypt
  alternatives:
  - which is east of Egypt
  - which is before Egypt
  lexicon: HALOT
  rationale: עַל־פְּנֵי literally 'before/opposite the face of.' In geographic description,
    'opposite' is a clear and sufficiently literal rendering without over-specifying
    direction.
- source_word: בֹּאֲכָה אַשּׁוּרָה
  chosen: as you go toward Asshur
  alternatives:
  - on the way to Asshur
  - toward Assyria
  lexicon: HALOT
  rationale: The infinitive/verb form with directional he marks movement toward Asshur.
    'Asshur' is retained as the place-name transliteration rather than the later regional
    label 'Assyria,' though that is a possible interpretive equivalent.
- source_word: עַל־פְּנֵי כָּל־אֶחָיו
  chosen: in defiance of all his brothers
  alternatives:
  - opposite all his brothers
  - alongside all his brothers
  - before all his brothers
  lexicon: HALOT
  rationale: In combination with נפל here, the idiom likely conveys hostile or oppositional
    posture rather than mere location. This aligns with the earlier prediction in
    Gen 16:12 that Ishmael would live in conflict with/over against his kin.
- source_word: נָפָל
  chosen: He settled
  alternatives:
  - he fell
  - he lived
  - he encamped
  lexicon: HALOT
  rationale: Although נפל normally means 'fall,' in this context many understand it
    idiomatically of settling down or establishing oneself. Rendering it woodenly
    as 'fell' would obscure the sense in English. The singular likely resumes Ishmael
    as representative of his line.
