theological_decisions:
- issue: Interpretation of the idiom עַל־פְּנֵי כָּל־אֶחָיו נָפָל
  chosen_reading: He settled in defiance of all his brothers
  alternative_readings:
  - He settled opposite all his brothers
  - He fell before all his brothers
  rationale: The Hebrew is idiomatic and debated. Given the narrative context, especially
    the oracle of Gen 16:12 about Ishmael's relation to his brothers, an adversative
    sense is likely. The alternative more spatially literal reading is preserved in
    a footnote because the phrase is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
