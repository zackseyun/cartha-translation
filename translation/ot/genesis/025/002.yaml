id: GEN.25.2
reference: Genesis 25:2
source:
  edition: WLC
  text: וַ/תֵּ֣לֶד ל֗/וֹ אֶת זִמְרָן֙ וְ/אֶת יָקְשָׁ֔ן וְ/אֶת מְדָ֖ן וְ/אֶת מִדְיָ֑ן
    וְ/אֶת יִשְׁבָּ֖ק וְ/אֶת שֽׁוּחַ־־־־־־׃
translation:
  text: And she bore him Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: And she bore
  alternatives:
  - And she gave birth
  - And she bore children
  lexicon: HALOT
  rationale: From ילד in the Qal wayyiqtol 3fs, narrating a past event with a feminine
    singular subject. 'Bore' is concise, idiomatic in genealogical contexts, and preserves
    the maternal sense without adding 'children,' which is not explicit in the Hebrew.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix after ילד commonly indicates
    the father of the children. In natural English genealogy style, 'bore him' best
    conveys the relationship; 'to him' is possible but less idiomatic.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with each named son. It has no standalone English
    equivalent here and is represented by normal English object syntax.
- source_word: זִמְרָן
  chosen: Zimran
  lexicon: HALOT
  rationale: Personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: יָקְשָׁן
  chosen: Jokshan
  alternatives:
  - Yokshan
  lexicon: HALOT
  rationale: Personal name; standard English biblical transliteration is 'Jokshan.'
    An initial 'J' reflects conventional English representation of yod in established
    name forms.
- source_word: מְדָן
  chosen: Medan
  lexicon: HALOT
  rationale: Personal name; transliterated directly and conventionally.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Personal name/place-name known in English tradition as 'Midian.' Retaining
    the familiar transliteration aids readability and consistency.
- source_word: יִשְׁבָּק
  chosen: Ishbak
  alternatives:
  - Yishbak
  lexicon: HALOT
  rationale: Personal name; transliterated by standard English convention. 'Ishbak'
    is the established English form.
- source_word: שׁוּחַ
  chosen: Shuah
  alternatives:
  - Shuach
  lexicon: HALOT
  rationale: Personal name; transliterated conventionally as 'Shuah.' This matches
    common English biblical usage and avoids over-literal transliteration.
