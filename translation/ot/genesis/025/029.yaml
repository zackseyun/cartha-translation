id: GEN.25.29
reference: Genesis 25:29
source:
  edition: WLC
  text: וַ/יָּ֥זֶד יַעֲקֹ֖ב נָזִ֑יד וַ/יָּבֹ֥א עֵשָׂ֛ו מִן הַ/שָּׂדֶ֖ה וְ/ה֥וּא עָיֵֽף־׃
translation:
  text: Now Jacob was cooking a stew, and Esau came in from the field, and he was
    exhausted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jacob boiled a stew.' The Hebrew verb specifically refers to cooking
      by boiling.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''pottage'' instead of ''stew.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'weary' or 'faint.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּזֶד
  chosen: was cooking
  alternatives:
  - boiled
  - seethed
  - was boiling
  lexicon: HALOT
  rationale: The verb זיד in this context refers to preparing food by boiling/cooking.
    'Was cooking' is idiomatic modern English and fits the narrative scene better
    than the more wooden 'boiled,' while still preserving the concrete culinary action.
- source_word: נָזִיד
  chosen: a stew
  alternatives:
  - pottage
  - boiled dish
  lexicon: HALOT
  rationale: נָזִיד denotes a cooked dish, especially a stew. 'Stew' is clear modern
    English; 'pottage' is traditional but archaic.
- source_word: וַיָּבֹא
  chosen: came in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb בוא simply means 'come/enter.' 'Came in' naturally conveys arrival
    from outside ('from the field') into the domestic setting implied by the context.
- source_word: מִן הַשָּׂדֶה
  chosen: from the field
  alternatives:
  - from the open country
  - from the countryside
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field.' The singular with article is well represented
    by 'the field,' preserving the concrete setting.
- source_word: עָיֵף
  chosen: exhausted
  alternatives:
  - weary
  - faint
  - tired
  lexicon: HALOT
  rationale: עָיֵף indicates weariness or exhaustion. 'Exhausted' best captures the
    intensity that sets up Esau's request in the following verse, while remaining
    a straightforward lexical rendering.
- source_word: וְהוּא
  chosen: and he was
  alternatives:
  - and he
  - while he was
  lexicon: HALOT
  rationale: The pronoun plus adjective forms a simple predication. Rendering it explicitly
    as 'and he was' produces natural English and preserves the Hebrew clause structure.
