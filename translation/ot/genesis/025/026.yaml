id: GEN.25.26
reference: Genesis 25:26
source:
  edition: WLC
  text: וְ/אַֽחֲרֵי כֵ֞ן יָצָ֣א אָחִ֗י/ו וְ/יָד֤/וֹ אֹחֶ֨זֶת֙ בַּ/עֲקֵ֣ב עֵשָׂ֔ו וַ/יִּקְרָ֥א
    שְׁמ֖/וֹ יַעֲקֹ֑ב וְ/יִצְחָ֛ק בֶּן שִׁשִּׁ֥ים שָׁנָ֖ה בְּ/לֶ֥דֶת אֹתָֽ/ם־־׃
translation:
  text: Afterward his brother came out, with his hand grasping Esau’s heel, so his
    name was called Jacob. And Isaac was sixty years old when they were born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jacob sounds like a name associated with 'heel' and later with 'supplanting,'
      matching the detail that his hand was grasping Esau’s heel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  chosen: Afterward
  alternatives:
  - After this
  - After that
  lexicon: HALOT
  rationale: The phrase marks sequence following the previous birth. 'Afterward' is
    natural modern English and preserves the temporal progression without unnecessary
    expansion.
- source_word: יָצָא
  chosen: came out
  alternatives:
  - went out
  - was born
  lexicon: HALOT
  rationale: Literally 'went/came out.' In this birth context it refers to emergence
    from the womb. 'Came out' preserves the vividness of the Hebrew better than the
    more interpretive 'was born' in the first clause.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his twin brother
  lexicon: HALOT
  rationale: The Hebrew simply says 'his brother.' Although twinship is known from
    context, it is not explicit in this word and should not be imported into the translation.
- source_word: וְיָדוֹ אֹחֶזֶת
  chosen: with his hand grasping
  alternatives:
  - and his hand was holding
  - while his hand was grasping
  lexicon: HALOT
  rationale: The participial construction describes the manner accompanying his emergence.
    'With his hand grasping' is idiomatic English that preserves the ongoing action.
- source_word: בַּעֲקֵב
  chosen: Esau’s heel
  alternatives:
  - the heel of Esau
  lexicon: HALOT
  rationale: The noun means 'heel.' Rendering the construct relationship as 'Esau’s
    heel' is clear and natural in English.
- source_word: וַיִּקְרָא שְׁמוֹ
  chosen: so his name was called
  alternatives:
  - and he called his name
  - and his name was named
  lexicon: HALOT
  rationale: The Hebrew uses an impersonal naming formula. English commonly expresses
    this as passive. 'So' reflects the narrative connection between the heel-grasping
    and the naming.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'Jacob' is the established English form of יַעֲקֹב.
- source_word: וְיִצְחָק
  chosen: And Isaac
  alternatives:
  - Now Isaac
  lexicon: HALOT
  rationale: Simple conjunction plus proper name. 'And Isaac' preserves the Hebrew
    narrative flow.
- source_word: בֶּן שִׁשִּׁים שָׁנָה
  chosen: was sixty years old
  alternatives:
  - was a son of sixty years
  - was sixty years of age
  lexicon: HALOT
  rationale: This is the standard Hebrew age expression. Idiomatic English requires
    'was sixty years old.'
- source_word: בְּלֶדֶת אֹתָם
  chosen: when they were born
  alternatives:
  - at the bearing of them
  - when she bore them
  lexicon: HALOT
  rationale: The infinitive construct with pronominal object indicates the time of
    the twins' birth. 'When they were born' is the most natural English rendering
    and avoids adding an explicit subject not stated in Hebrew.
