id: GEN.25.8
reference: Genesis 25:8
source:
  edition: WLC
  text: וַ/יִּגְוַ֨ע וַ/יָּ֧מָת אַבְרָהָ֛ם בְּ/שֵׂיבָ֥ה טוֹבָ֖ה זָקֵ֣ן וְ/שָׂבֵ֑עַ
    וַ/יֵּאָ֖סֶף אֶל עַמָּֽי/ו־׃
translation:
  text: And Abraham breathed his last and died in a good old age, old and full of
    days, and he was gathered to his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'satisfied' or simply 'full'; the Hebrew says 'old and full,' with 'of
      days' supplied in English to express the idiom clearly.
    reason: lexical_alternative
  - marker: b
    text: '''Was gathered to his people'' is a traditional Hebrew death formula. It
      may imply reunion with one''s kin in death, but the wording itself does not
      specify the exact manner.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגְוַע
  chosen: breathed his last
  alternatives:
  - expired
  - drew his last breath
  - perished
  lexicon: HALOT
  rationale: גוע in death notices commonly denotes expiring or breathing out one's
    life. 'Breathed his last' preserves the idiomatic force in natural English and
    distinguishes it from the following וַיָּמָת rather than flattening both into
    'died'.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: מות is the standard verb for dying. 'Died' is the plain, direct equivalent
    and preserves the Hebrew's explicit statement without euphemism.
- source_word: בְּשֵׂיבָה טוֹבָה
  chosen: in a good old age
  alternatives:
  - at a good old age
  - in ripe old age
  lexicon: HALOT
  rationale: The preposition ב plus שֵׂיבָה with the adjective טוֹבָה describes the
    circumstance/state of death. 'In a good old age' is a natural rendering that keeps
    both the age element and the positive quality.
- source_word: זָקֵן
  chosen: old
  alternatives:
  - aged
  - elderly
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'old.' Retaining it separately
    reflects the Hebrew piling up descriptors rather than compressing them into a
    single English phrase.
- source_word: וְשָׂבֵעַ
  chosen: full of days
  alternatives:
  - satisfied
  - full
  - content
  lexicon: HALOT
  rationale: The adjective means 'sated/full,' and in this death-context it idiomatically
    conveys a life brought to fullness. Because English 'full' alone is too vague,
    'full of days' makes the idiomatic sense explicit while matching common biblical
    usage. The shorter Hebrew does not explicitly say 'days,' so this is an interpretive
    expansion for clarity.
- source_word: וַיֵּאָסֶף אֶל־עַמָּיו
  chosen: and he was gathered to his people
  alternatives:
  - and he was gathered to his kin
  - and he joined his ancestors
  lexicon: HALOT
  rationale: The Niphal of אסף plus 'to his people' is a conventional death formula.
    'Was gathered to his people' preserves the biblical idiom and its ambiguity, rather
    than resolving it into mere burial or an explicit doctrine of the afterlife.
- source_word: עַמָּיו
  chosen: his people
  alternatives:
  - his kin
  - his ancestors
  lexicon: HALOT
  rationale: The noun עם with pronominal suffix is most literally 'his people.' This
    keeps the familial/corporate sense without narrowing it to only ancestors or only
    ethnic group.
