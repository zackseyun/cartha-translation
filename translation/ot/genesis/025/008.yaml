theological_decisions:
- issue: Meaning of 'he was gathered to his people'
  chosen_reading: Retain the idiomatic death formula without specifying whether it
    refers primarily to burial, reunion with ancestors, or conscious postmortem existence.
  alternative_readings:
  - A reference to burial in the family tomb
  - A reference to reunion with deceased kin/ancestors beyond death
  rationale: The Hebrew formula carries theological and cultural resonance, but the
    verse itself does not force a single explanatory interpretation. In keeping with
    the translation philosophy, the rendering preserves the tension rather than resolving
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
