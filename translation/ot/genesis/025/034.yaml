theological_decisions:
- issue: Narrative emphasis on Esau's valuation of his firstborn status
  chosen_reading: So Esau despised the birthright
  alternative_readings:
  - Thus Esau showed contempt for the birthright
  - And Esau despised his birthright
  rationale: The Hebrew concludes with a summarizing statement. 'So' captures the
    inferential force in readable English, and retaining 'despised' preserves the
    moral evaluation without expanding it into interpretation beyond the text.
  doctrine_reference: Translation philosophy §3, §6
