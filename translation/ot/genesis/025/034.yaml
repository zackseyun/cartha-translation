id: GEN.25.34
reference: Genesis 25:34
source:
  edition: WLC
  text: וְ/יַעֲקֹ֞ב נָתַ֣ן לְ/עֵשָׂ֗ו לֶ֚חֶם וּ/נְזִ֣יד עֲדָשִׁ֔ים וַ/יֹּ֣אכַל וַ/יֵּ֔שְׁתְּ
    וַ/יָּ֖קָם וַ/יֵּלַ֑ךְ וַ/יִּ֥בֶז עֵשָׂ֖ו אֶת הַ/בְּכֹרָֽה־׃ס
translation:
  text: And Jacob gave Esau bread and lentil stew, and he ate and drank and rose and
    went away. So Esau despised the birthright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stew of lentils.'
    reason: lexical_alternative
  - marker: b
    text: Or 'showed contempt for the birthright.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  chosen: gave
  alternatives:
  - provided
  - handed
  lexicon: HALOT
  rationale: The common verb 'give' fits the straightforward narrative exchange without
    adding nuance not explicit in the Hebrew.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Although לֶחֶם can sometimes mean food more generally, here the pairing
    with stew favors the concrete sense 'bread'.
- source_word: נְזִיד עֲדָשִׁים
  chosen: lentil stew
  alternatives:
  - stew of lentils
  - lentil soup
  lexicon: HALOT
  rationale: This construct phrase denotes a cooked dish made of lentils. 'Lentil
    stew' is natural modern English and preserves the concrete food item.
- source_word: וַיֹּאכַל וַיֵּשְׁתְּ וַיָּקָם וַיֵּלַךְ
  chosen: and he ate and drank and rose and went away
  alternatives:
  - and he ate and drank and got up and left
  lexicon: HALOT
  rationale: The Hebrew uses a rapid sequence of wayyiqtol verbs. Rendering each with
    'and' preserves the terse, staccato narrative effect that underscores Esau's impulsiveness
    and indifference.
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: '''Rose'' is slightly more formal but still readable, and it matches
    the concise narrative rhythm.'
- source_word: וַיֵּלַךְ
  chosen: went away
  alternatives:
  - went
  - left
  lexicon: HALOT
  rationale: '''Went away'' makes the departure sense explicit in idiomatic English
    while remaining close to the Hebrew.'
- source_word: וַיִּבֶז
  chosen: despised
  alternatives:
  - treated with contempt
  - scorned
  lexicon: HALOT
  rationale: The verb conveys contempt or disdain. 'Despised' is concise, strong,
    and traditional without being archaic.
- source_word: הַבְּכֹרָה
  chosen: the birthright
  alternatives:
  - the right of the firstborn
  - his firstborn rights
  lexicon: HALOT
  rationale: '''Birthright'' is the standard concise rendering for the legal and familial
    privilege of the firstborn in this context.'
