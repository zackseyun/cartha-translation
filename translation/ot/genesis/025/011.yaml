id: GEN.25.11
reference: Genesis 25:11
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵי֙ מ֣וֹת אַבְרָהָ֔ם וַ/יְבָ֥רֶךְ אֱלֹהִ֖ים אֶת יִצְחָ֣ק בְּנ֑/וֹ
    וַ/יֵּ֣שֶׁב יִצְחָ֔ק עִם בְּאֵ֥ר לַחַ֖י רֹאִֽי־־׃ס
translation:
  text: And it happened after Abraham’s death that God blessed Isaac his son, and
    Isaac lived by Beer-lahai-roi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer-lahai-roi is the name of a well; the Hebrew name was introduced earlier
      in Genesis 16:14.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next narrative development.
    'And it happened' preserves the Hebrew narrative flow in readable modern English
    without the archaic feel of 'came to pass.'
- source_word: אַחֲרֵי מוֹת אַבְרָהָם
  chosen: after Abraham’s death
  alternatives:
  - after the death of Abraham
  lexicon: HALOT
  rationale: This construct phrase is most naturally rendered with an English possessive.
    It is concise and preserves the temporal sense of אַחֲרֵי.
- source_word: וַיְבָרֶךְ אֱלֹהִים
  chosen: God blessed
  alternatives:
  - God bestowed blessing on
  lexicon: HALOT
  rationale: ברך in this context straightforwardly means 'bless.' The subject אֱלֹהִים
    here clearly refers to the one true God, so 'God' is the natural English rendering.
- source_word: אֶת יִצְחָק בְּנוֹ
  chosen: Isaac his son
  alternatives:
  - his son Isaac
  - Isaac, his son
  lexicon: HALOT
  rationale: The Hebrew places 'Isaac' before 'his son.' 'Isaac his son' preserves
    that order and keeps the filial identification explicit, linking Isaac as Abraham's
    heir after Abraham's death.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - resided
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'settle/live.' In this narrative summary,
    'lived' is the most natural modern English choice, while still conveying residence.
- source_word: עִם
  chosen: by
  alternatives:
  - near
  - at
  - with
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in this locative expression before
    a place name it carries the sense of proximity. 'By' is idiomatic English for
    residence near a named well. 'With' would be misleading in English.
- source_word: בְּאֵר לַחַי רֹאִי
  chosen: Beer-lahai-roi
  alternatives:
  - Beer Lahai Roi
  lexicon: HALOT
  rationale: This is a place name previously established in Genesis. Per translation
    philosophy, names are transliterated rather than translated. Hyphenation helps
    reflect the compound Hebrew name.
