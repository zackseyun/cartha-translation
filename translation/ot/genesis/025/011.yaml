theological_decisions:
- issue: Rendering אֱלֹהִים in a non-polemical narrative context
  chosen_reading: God
  alternative_readings:
  - the Deity
  rationale: The verse simply states divine blessing on Isaac after Abraham's death.
    No doctrinally contested issue is present; 'God' is the standard and clearest
    rendering for אֱלֹהִים here.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English'
