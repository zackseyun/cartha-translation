theological_decisions:
- issue: Rendering the Genesis toledot formula
  chosen_reading: Translate תולדות with the formal structural term 'generations' rather
    than a more interpretive paraphrase.
  alternative_readings:
  - account
  - family history
  rationale: This verse is a heading in the recurring Genesis framework. Using 'generations'
    preserves the literary structure and avoids importing a narrower interpretive
    claim about whether the section is only biography or only descendants.
  doctrine_reference: Translation philosophy §§1, 5
