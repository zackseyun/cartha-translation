id: GEN.25.19
reference: Genesis 25:19
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה תּוֹלְדֹ֥ת יִצְחָ֖ק בֶּן אַבְרָהָ֑ם אַבְרָהָ֖ם הוֹלִ֥יד אֶת יִצְחָֽק־־׃
translation:
  text: 'Now these are the generations of Isaac, son of Abraham: Abraham fathered
    Isaac.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'account' or 'family line' for 'generations' (Hebrew toledot), a recurring
      Genesis heading term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative introduces a new section in narrative/genealogical
    style. 'Now these are' is natural modern English while preserving the discourse-marking
    force better than a bare 'These are.'
- source_word: תּוֹלְדֹת
  chosen: generations
  alternatives:
  - account
  - family line
  - descendants
  lexicon: HALOT
  rationale: In Genesis, תולדות is a recurring structural term introducing what proceeds
    from a person or line. 'Generations' preserves the established formula and its
    broad sense better than the narrower 'descendants.'
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: בֶּן אַבְרָהָם
  chosen: son of Abraham
  alternatives:
  - Abraham's son
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'son of Abraham.' This
    keeps the genealogical identification explicit and formal.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד here means to beget/father. 'Fathered' is clear, contemporary,
    and genealogically precise; 'begot' is archaic, while 'became the father of' is
    more cumbersome.
- source_word: אֶת יִצְחָק
  chosen: Isaac
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English; the object is rendered
    simply as 'Isaac.'
