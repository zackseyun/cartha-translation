id: GEN.25.25
reference: Genesis 25:25
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א הָ/רִאשׁוֹן֙ אַדְמוֹנִ֔י כֻּלּ֖/וֹ כְּ/אַדֶּ֣רֶת שֵׂעָ֑ר וַ/יִּקְרְא֥וּ
    שְׁמ֖/וֹ עֵשָֽׂו׃
translation:
  text: The first came out reddish, all of him like a hairy cloak, and they called
    his name Esau.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ruddy' or 'red.' The Hebrew adjective describes a reddish appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a garment of hair' or 'like a mantle of hair.' The Hebrew uses
      a simile with 'cloak/mantle' and 'hair.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'they called his name Esau,' a standard naming formula; that is,
      'they named him Esau.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - came forth
  - emerged
  lexicon: HALOT
  rationale: Narrates birth with the common verb 'go/come out.' 'Came out' is natural
    modern English and preserves the concrete imagery of delivery without paraphrase.
- source_word: הָרִאשׁוֹן
  chosen: the first
  alternatives:
  - the first one
  lexicon: HALOT
  rationale: Refers to the first twin in birth order. 'The first' is concise and idiomatic.
- source_word: אַדְמוֹנִי
  chosen: reddish
  alternatives:
  - red
  - ruddy
  lexicon: HALOT
  rationale: Describes a reddish complexion or appearance. 'Reddish' preserves the
    adjectival nuance better than the flatter 'red,' while avoiding the somewhat archaic
    'ruddy.' It also anticipates the later wordplay associated with Esau/Edom without
    overstating it here.
- source_word: כֻּלּוֹ
  chosen: all of him
  alternatives:
  - all over
  - entirely
  lexicon: HALOT
  rationale: Emphasizes that the description applies to his whole body. 'All of him'
    keeps the bodily reference explicit in English.
- source_word: כְּאַדֶּרֶת שֵׂעָר
  chosen: like a hairy cloak
  alternatives:
  - like a garment of hair
  - like a mantle of hair
  lexicon: HALOT
  rationale: אַדֶּרֶת denotes a cloak/mantle; with 'hair' it forms a vivid simile
    describing unusual hairiness at birth. 'Hairy cloak' is readable modern English
    and preserves the metaphor better than a more interpretive rendering such as 'covered
    with hair.'
- source_word: וַיִּקְרְאוּ שְׁמוֹ
  chosen: they called his name
  alternatives:
  - they named him
  - his name was called
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew naming formula. Slightly
    more literal than 'they named him,' while still natural enough in English.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
