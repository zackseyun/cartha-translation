id: GEN.25.13
reference: Genesis 25:13
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה שְׁמוֹת֙ בְּנֵ֣י יִשְׁמָעֵ֔אל בִּ/שְׁמֹתָ֖/ם לְ/תוֹלְדֹתָ֑/ם בְּכֹ֤ר
    יִשְׁמָעֵאל֙ נְבָיֹ֔ת וְ/קֵדָ֥ר וְ/אַדְבְּאֵ֖ל וּ/מִבְשָֽׂם׃
translation:
  text: 'And these are the names of the sons of Ishmael, by their names according
    to their generations: the firstborn of Ishmael, Nebaioth, and Kedar, and Adbeel,
    and Mibsam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their family lines.' The Hebrew term can denote lines of
      descent in a genealogical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: HALOT
  rationale: Introduces a new list in straightforward narrative style. Including 'And'
    preserves the Hebrew conjunction, while 'these are' reflects the demonstrative
    construction naturally in English.
- source_word: שְׁמוֹת
  chosen: the names
  alternatives:
  - names
  lexicon: HALOT
  rationale: The construct phrase שְׁמוֹת בְּנֵי is most naturally rendered 'the names
    of the sons of.' The article is supplied in English for idiomatic completeness.
- source_word: בְּנֵי יִשְׁמָעֵאל
  chosen: the sons of Ishmael
  alternatives:
  - Ishmael's sons
  lexicon: HALOT
  rationale: A direct and formal rendering of the construct chain, preserving genealogical
    style.
- source_word: בִּשְׁמֹתָם
  chosen: by their names
  alternatives:
  - according to their names
  - in their names
  lexicon: HALOT
  rationale: The preposition ב with 'their names' is retained in a relatively formal
    way because the verse is formulaic and genealogical. This also preserves the repetitive
    structure of the Hebrew.
- source_word: לְתוֹלְדֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - according to their family lines
  - in their genealogies
  lexicon: HALOT
  rationale: תוֹלְדוֹת in genealogical contexts refers to lines of descent or generations.
    'According to their generations' preserves the formal register and avoids over-interpreting
    as clans or tribes.
- source_word: בְּכֹר יִשְׁמָעֵאל
  chosen: the firstborn of Ishmael
  alternatives:
  - Ishmael's firstborn
  lexicon: HALOT
  rationale: This construct phrase identifies the first named son. The fuller form
    preserves the cadence of the genealogy.
- source_word: נְבָיֹת
  chosen: Nebaioth
  alternatives:
  - Nabayoth
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: קֵדָר
  chosen: Kedar
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אַדְבְּאֵל
  chosen: Adbeel
  alternatives:
  - Adb'el
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: מִבְשָׂם
  chosen: Mibsam
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
