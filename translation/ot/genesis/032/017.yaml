  from: He put them into the hand of his servants, each herd by itself
  to: He put each herd by itself into the hand of his servants
  rationale: The current phrasing introduces a pronoun, 'them,' whose antecedent, 'each herd,' appears later in the sentence. This forward reference, while understandable, is slightly unnatural in English. Reordering the clause to place the object ('each herd by itself') before the prepositional phrase ('into the hand of his servants') creates a smoother and more direct sentence structure without altering the meaning.
