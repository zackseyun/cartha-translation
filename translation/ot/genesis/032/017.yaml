id: GEN.32.17
reference: Genesis 32:17
source:
  edition: WLC
  text: וַ/יִּתֵּן֙ בְּ/יַד עֲבָדָ֔י/ו עֵ֥דֶר עֵ֖דֶר לְ/בַדּ֑/וֹ וַ֤/יֹּאמֶר אֶל עֲבָדָי/ו֙ עִבְר֣וּ לְ/פָנַ֔/י וְ/רֶ֣וַח תָּשִׂ֔ימוּ בֵּ֥ין עֵ֖דֶר וּ/בֵ֥ין עֵֽדֶר־־׃
translation:
  text: He put each herd by itself into the hand of his servants, and said to his servants, “Pass on ahead of me, and put a space between herd and herd.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the care of his servants.” The Hebrew literally says “into the hand of his servants,” an idiom for entrusting something to someone’s control.
    reason: lexical_alternative
  - marker: b
    text: Or “each drove by itself.” The repeated Hebrew phrase emphasizes that the animal groups were arranged separately, one group at a time.
    reason: lexical_alternative
  - marker: c
    text: Or “put an interval between one herd and another.”
    reason: lexical_alternative
  - marker: d
    text: Or 'He put them into the hand of his servants, each herd by itself'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He put
  alternatives:
  - he gave
  - he placed
  lexicon: HALOT
  rationale: נתן commonly means 'give,' but in this context with בְּיַד ('into the hand of') and the direct object being the animals, 'put' or 'placed' better reflects entrusting them to the servants' control in natural English.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the care of
  - under the charge of
  lexicon: HALOT
  rationale: Literally 'in/into the hand of.' The idiom denotes entrusting something to someone's control. The main text keeps the concrete imagery with idiomatic English; alternatives capture the sense more dynamically.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the bonded status is not theologically or narratively salient; the focus is on household attendants carrying out Jacob's instructions. 'Servants' is the more contextually fitting rendering under the project's servant/slave principle.
- source_word: עֵדֶר עֵדֶר לְבַדּוֹ
  chosen: each herd by itself
  alternatives:
  - herd by herd by itself
  - each drove by itself
  - each flock by itself
  lexicon: HALOT
  rationale: 'The repetition עֵדֶר עֵדֶר expresses distributive force: one herd after another, each separately. ''Each herd by itself'' conveys both the repetition and לְבַדּוֹ (''by itself/separately'') in clear English. ''Drove'' is possible for animals being driven, but ''herd'' matches the Hebrew more directly.'
- source_word: עִבְרוּ לְפָנַי
  chosen: Pass on ahead of me
  alternatives:
  - Cross over before me
  - Go on ahead of me
  lexicon: HALOT
  rationale: עבר basically means 'pass over/pass by/go across.' In this travel context, Jacob is instructing them to move in front of him. 'Pass on ahead of me' preserves the movement nuance without implying a specific crossing.
- source_word: וְרֶוַח
  chosen: a space
  alternatives:
  - an interval
  - a gap
  - breathing room
  lexicon: HALOT
  rationale: רֶוַח denotes space or interval. 'A space' is simple, natural English and fits the command to separate the groups. 'Breathing room' is too idiomatic for the register.
- source_word: תָּשִׂימוּ
  chosen: put
  alternatives:
  - set
  - place
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put/set/place.' 'Put' is the most natural collocation with 'a space between herd and herd.'
- source_word: בֵּין עֵדֶר וּבֵין עֵדֶר
  chosen: between herd and herd
  alternatives:
  - between one herd and another
  - between each herd
  lexicon: HALOT
  rationale: The Hebrew repeats 'between herd and between herd' for emphasis and distributive separation. The main text preserves the repetition's flavor with 'between herd and herd,' while remaining readable.
