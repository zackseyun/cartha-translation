id: GEN.32.32
reference: Genesis 32:32
source:
  edition: WLC
  text: וַ/יִּֽזְרַֽח ל֣/וֹ הַ/שֶּׁ֔מֶשׁ כַּ/אֲשֶׁ֥ר עָבַ֖ר אֶת פְּנוּאֵ֑ל וְ/ה֥וּא צֹלֵ֖עַ עַל יְרֵכֽ/וֹ־־־׃
translation:
  text: The sun rose upon him as he passed Penuel, and he was limping because of his thigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew spells the place name here as Penuel; elsewhere it also appears as Peniel.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of his hip.' The Hebrew reads more literally, 'on his thigh.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on his thigh'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּזְרַח
  chosen: rose
  alternatives:
  - shone forth
  - dawned
  lexicon: HALOT
  rationale: From זרח, referring to the sun's rising/shining. In context with הַשֶּׁמֶשׁ as subject, 'rose' is the most natural modern English rendering.
- source_word: לוֹ
  chosen: upon him
  alternatives:
  - for him
  - on him
  lexicon: HALOT
  rationale: The preposition ל with the verb and subject 'the sun' idiomatically indicates the sun rising upon someone. 'Upon him' preserves the Hebrew perspective better than the flatter 'for him.'
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Direct rendering of the common noun with article.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - when
  - just as
  lexicon: HALOT
  rationale: Introduces the temporal circumstance of the sun rising in relation to Jacob's passing Penuel. 'As' is concise and natural.
- source_word: עָבַר
  chosen: passed
  alternatives:
  - crossed over
  - went past
  lexicon: HALOT
  rationale: עבר commonly means 'pass over/by.' Here 'passed' fits the place-name object naturally in English without over-specifying a crossing.
- source_word: אֶת פְּנוּאֵל
  chosen: Penuel
  alternatives:
  - Peniel
  lexicon: HALOT
  rationale: Personal/place names are transliterated. The consonantal form here is פְּנוּאֵל (Penuel), so the main text follows the form present in this verse rather than harmonizing to the alternate spelling Peniel used elsewhere.
- source_word: וְהוּא
  chosen: and he was
  alternatives:
  - while he was
  - and he
  lexicon: HALOT
  rationale: The pronoun plus participle construction describes Jacob's continuing state. 'And he was' communicates the durative sense smoothly in English.
- source_word: צֹלֵעַ
  chosen: limping
  alternatives:
  - lame
  - hobbling
  lexicon: HALOT
  rationale: The participle denotes ongoing action/state. 'Limping' is vivid, idiomatic, and reflects the immediate physical consequence of the encounter.
- source_word: עַל יְרֵכוֹ
  chosen: on his thigh
  alternatives:
  - because of his hip
  - on account of his thigh/hip
  lexicon: HALOT
  rationale: Literally 'upon his thigh.' Although the broader context concerns the hip socket, this verse uses יָרֵךְ ('thigh/upper leg'). The translation keeps the more literal wording here rather than importing the anatomical specificity from the previous verse.
