  from: on his thigh
  to: because of his thigh
  rationale: The Hebrew preposition `עַל` (`al`) frequently indicates cause ('because of', 'on account of'). While 'on' is a primary meaning, the English phrase 'limping on his thigh' is semantically awkward, as one limps *because of* an injury, not spatially *on* the injured part. The literal rendering obscures the clear causal relationship. Translating `עַל` causally as 'because of' is a common and necessary choice for clarity in English and better reflects the sense of the Hebrew idiom in this context.
