theological_decisions:
- issue: Rendering כפר in an interpersonal rather than cultic context
  chosen_reading: I will appease his face
  alternative_readings:
  - I will make atonement before him
  - I will pacify him
  rationale: The root כפר can carry atonement language, but here the object is Esau's
    'face' and the means is a gift, indicating placation in a human encounter. The
    translation avoids importing formal sacrificial theology while preserving the
    lexical connection through a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
