id: GEN.32.21
reference: Genesis 32:21
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֕ם גַּ֗ם הִנֵּ֛ה עַבְדְּ/ךָ֥ יַעֲקֹ֖ב אַחֲרֵ֑י/נוּ כִּֽי אָמַ֞ר
    אֲכַפְּרָ֣ה פָנָ֗י/ו בַּ/מִּנְחָה֙ הַ/הֹלֶ֣כֶת לְ/פָנָ֔/י וְ/אַחֲרֵי כֵן֙ אֶרְאֶ֣ה
    פָנָ֔י/ו אוּלַ֖י יִשָּׂ֥א פָנָֽ/י־־׃
translation:
  text: And you shall also say, ‘Look, your servant Jacob is behind us,’ for he said,
    ‘I will appease his face with the gift that is going ahead of me, and afterward
    I will see his face; perhaps he will lift up my face.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I will appease his face''—the verb is related to the language
      of atonement, but here it refers to placating Esau with a gift.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''he will lift up my face,'' that is, ''he will accept me''
      or ''show me favor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: The term denotes one in a subordinate relationship. Here Jacob uses deferential
    self-abasement toward Esau in diplomatic speech. 'Servant' fits the social register
    better than 'slave' in this context, while preserving the humility of the address.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: A discourse particle drawing attention. 'Look' is natural modern English
    and preserves the immediacy better than the archaic 'behold.'
- source_word: אַחֲרֵינוּ
  chosen: is behind us
  alternatives:
  - is after us
  - is coming behind us
  lexicon: HALOT
  rationale: The preposition indicates position following the messengers. 'Is behind
    us' is the most straightforward idiomatic rendering in English.
- source_word: אֲכַפְּרָה
  chosen: I will appease
  alternatives:
  - I will make atonement for
  - I will pacify
  - I will cover
  lexicon: HALOT
  rationale: From כפר in a non-cultic interpersonal setting. Here Jacob seeks to placate
    Esau, not perform ritual atonement. 'Appease' captures the relational sense while
    avoiding importing sacrificial theology into the main text.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - him
  - his presence
  lexicon: HALOT
  rationale: The Hebrew repeats 'face' three times in this verse, creating a deliberate
    wordplay. Retaining 'face' preserves the literary texture and the idiomatic progression
    rather than flattening it to pronouns.
- source_word: מִנְחָה
  chosen: the gift
  alternatives:
  - the present
  - the offering
  - the tribute
  lexicon: HALOT
  rationale: In this narrative context the word refers to Jacob's conciliatory present
    to Esau. 'Gift' is clear modern English; 'offering' could sound cultic, and 'tribute'
    may overstate political subordination.
- source_word: הַהֹלֶכֶת לְפָנַי
  chosen: that is going ahead of me
  alternatives:
  - that goes before me
  - going before me
  lexicon: HALOT
  rationale: This participial phrase describes the gift moving in advance. 'That is
    going ahead of me' is readable and preserves the ongoing action.
- source_word: אֶרְאֶה פָנָיו
  chosen: I will see his face
  alternatives:
  - I will meet him
  - I will come into his presence
  lexicon: HALOT
  rationale: Again the idiom literally uses 'face.' Keeping the literal expression
    preserves the repeated motif and prepares for the final idiom in the verse.
- source_word: יִשָּׂא פָנַי
  chosen: he will lift up my face
  alternatives:
  - he will accept me
  - he will show me favor
  lexicon: HALOT
  rationale: This is a Hebrew idiom for favorable reception. Because the verse is
    built around repeated uses of 'face,' the main text preserves the idiom literally
    for transparency, while a footnote can explain the sense.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - maybe
  lexicon: HALOT
  rationale: Expresses uncertainty and hope. 'Perhaps' suits the tone better than
    the more casual 'maybe'.
