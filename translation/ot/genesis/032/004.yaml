id: GEN.32.4
reference: Genesis 32:4
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח יַעֲקֹ֤ב מַלְאָכִים֙ לְ/פָנָ֔י/ו אֶל עֵשָׂ֖ו אָחִ֑י/ו אַ֥רְצָ/ה
    שֵׂעִ֖יר שְׂדֵ֥ה אֱדֽוֹם־׃
translation:
  text: Jacob sent messengers ahead of him to Esau his brother, to the land of Seir,
    the field of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the country/territory of Edom.' The Hebrew reads literally 'the field
      of Edom,' likely a regional designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The waw-consecutive verb from שלח is straightforwardly narrative past.
    'Sent' is the natural modern English rendering and preserves the simple action
    without overtranslation.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: Although מלאכים can mean 'angels' or 'messengers,' the immediate context
    is Jacob sending representatives to Esau, so 'messengers' best fits the human
    referent. 'Envoys' is possible but slightly more formal than the Hebrew requires.
- source_word: לְפָנָיו
  chosen: ahead of him
  alternatives:
  - before him
  - in front of him
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' In English narrative idiom, 'ahead
    of him' clearly conveys that Jacob sent them in advance.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the destination/recipient of the sending. 'To'
    is the most direct equivalent here.
- source_word: עֵשָׂו אָחִיו
  chosen: Esau his brother
  alternatives:
  - his brother Esau
  lexicon: HALOT
  rationale: This preserves both the proper name and the appositional kinship term.
    The Hebrew order is retained naturally enough in English.
- source_word: אַרְצָה שֵׂעִיר
  chosen: to the land of Seir
  alternatives:
  - toward the land of Seir
  - to Seir
  lexicon: HALOT
  rationale: The directional ending on ארצה indicates motion toward the land. 'To
    the land of Seir' preserves the explicit noun 'land' rather than compressing it
    to simply 'to Seir.'
- source_word: שְׂדֵה אֱדֹם
  chosen: the field of Edom
  alternatives:
  - the country of Edom
  - the territory of Edom
  lexicon: HALOT
  rationale: The construct phrase is literally 'field of Edom.' In context it functions
    as a regional designation. The main text keeps the concrete wording 'field' for
    transparency to the Hebrew, while the broader territorial sense is worth preserving
    as an alternative.
