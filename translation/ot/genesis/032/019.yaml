id: GEN.32.19
reference: Genesis 32:19
source:
  edition: WLC
  text: וְ/אָֽמַרְתָּ֙ לְ/עַבְדְּ/ךָ֣ לְ/יַעֲקֹ֔ב מִנְחָ֥ה הִוא֙ שְׁלוּחָ֔ה לַֽ/אדֹנִ֖/י
    לְ/עֵשָׂ֑ו וְ/הִנֵּ֥ה גַם ה֖וּא אַחֲרֵֽי/נוּ־׃
translation:
  text: Then you shall say, ‘Your servant Jacob’s gift is sent to my lord, to Esau;
    and look, he also is behind us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''present'' or ''tribute'' for ''gift'' (Hebrew: minḥah), a term used
      here for a conciliatory offering to Esau.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he is coming after us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָֽמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: The waw + perfect with instructional force continues Jacob’s commands
    to the servants. 'Then you shall say' gives natural English sequence while preserving
    the imperative-like force.
- source_word: לְעַבְדְּךָ לְיַעֲקֹב
  chosen: Your servant Jacob’s
  alternatives:
  - to your servant Jacob
  - Jacob your servant’s
  lexicon: HALOT
  rationale: The phrase identifies Jacob in deferential self-reference before Esau.
    Rendering it possessively in English ('Your servant Jacob’s gift') best reflects
    the syntax in context and preserves the humility formula.
- source_word: מִנְחָה
  chosen: gift
  alternatives:
  - present
  - tribute
  - offering
  lexicon: HALOT
  rationale: In this narrative context the term denotes a conciliatory gift sent to
    Esau, not a cultic offering. 'Gift' is clear modern English; 'tribute' may overstate
    political subordination, while 'present' is possible but slightly less natural
    here.
- source_word: שְׁלוּחָה
  chosen: is sent
  alternatives:
  - has been sent
  - is being sent
  lexicon: HALOT
  rationale: The passive participial form describes the gift as dispatched. 'Is sent'
    is concise and idiomatic in English, preserving the passive sense.
- source_word: לַאדֹנִי לְעֵשָׂו
  chosen: to my lord, to Esau
  alternatives:
  - to my master, Esau
  - for my lord Esau
  lexicon: HALOT
  rationale: אָדוֹן here is a social title of respect used by Jacob toward Esau. 'My
    lord' preserves the deferential address and matches the narrative register better
    than 'master.' Apposition with 'Esau' is retained.
- source_word: וְהִנֵּה
  chosen: and look
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: The discourse marker draws attention to the following statement. 'And
    look' is readable modern English without the archaic tone of 'behold.'
- source_word: גַם הוּא
  chosen: he also
  alternatives:
  - he too
  - also he
  lexicon: HALOT
  rationale: This emphasizes that Jacob himself is coming in addition to the gift.
    'He also' is natural and preserves the additive emphasis.
- source_word: אַחֲרֵינוּ
  chosen: is behind us
  alternatives:
  - is coming after us
  - is behind us all
  lexicon: HALOT
  rationale: The phrase indicates Jacob’s position following behind the droves. 'Is
    behind us' is a direct rendering; 'is coming after us' is also possible but slightly
    more interpretive.
