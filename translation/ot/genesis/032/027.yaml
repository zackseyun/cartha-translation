theological_decisions:
- issue: Identity of the speakers
  chosen_reading: Retain generic pronouns ('he said') without specifying 'the man,'
    'Jacob,' or 'God/angel' in the verse itself.
  alternative_readings:
  - Explicitly identify the first speaker as the man/angel
  - Explicitly identify the encounter as God speaking
  rationale: The Hebrew of this verse uses only verbal forms with implied third masculine
    singular subjects. Supplying a specific identity in the translation would import
    interpretation from the broader context rather than this verse's wording. This
    preserves the narrative tension and ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
