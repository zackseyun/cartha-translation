id: GEN.32.27
reference: Genesis 32:27
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שַׁלְּחֵ֔/נִי כִּ֥י עָלָ֖ה הַ/שָּׁ֑חַר וַ/יֹּ֨אמֶר֙ לֹ֣א אֲשַֽׁלֵּחֲ/ךָ֔
    כִּ֖י אִם בֵּרַכְתָּֽ/נִי־׃
translation:
  text: And he said, “Let me go, for the dawn has risen.” But he said, “I will not
    let you go unless you bless me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Release me” or “Send me away.”
    reason: lexical_alternative
  - marker: b
    text: Or, “for day is breaking.”
    reason: lexical_alternative
  - marker: c
    text: The Hebrew does not explicitly identify the speakers in this verse; the
      identities are inferred from the surrounding narrative.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁלְּחֵנִי
  chosen: Let me go
  alternatives:
  - Release me
  - Send me away
  lexicon: HALOT
  rationale: Imperative of שׁלח with 1cs suffix literally means 'send/release me.'
    In this wrestling context, idiomatic English 'Let me go' best captures the request
    without overformal stiffness.
- source_word: כִּי עָלָה הַשָּׁחַר
  chosen: for the dawn has risen
  alternatives:
  - for day is breaking
  - for the dawn has come up
  lexicon: HALOT
  rationale: עָלָה ('has gone up/risen') with הַשָּׁחַר ('the dawn') is naturally
    rendered as dawn rising. 'For' preserves כִּי as causal. This keeps the imagery
    while sounding natural in English.
- source_word: לֹא אֲשַׁלֵּחֲךָ
  chosen: I will not let you go
  alternatives:
  - I will not release you
  - I will not send you away
  lexicon: HALOT
  rationale: The imperfect with negation expresses firm refusal. Repeating 'let ...
    go' mirrors the earlier verb and preserves the verbal interplay in the dialogue.
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - if not
  lexicon: HALOT
  rationale: The particle combination introduces an exception/condition. 'Unless'
    is the most natural concise English equivalent here.
- source_word: בֵּרַכְתָּנִי
  chosen: you bless me
  alternatives:
  - you have blessed me
  lexicon: HALOT
  rationale: 'The perfect after ''unless'' can be rendered with English present subjunctive-like
    force in context: Jacob refuses release pending the blessing. ''You bless me''
    communicates the demanded action more naturally than a strictly past/perfect English
    form.'
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: And he said ... But he said
  alternatives:
  - And he said ... and he said
  lexicon: HALOT
  rationale: Hebrew repeats 'and he said' for both speakers. In English, using 'But
    he said' for the second instance clarifies the adversative turn in the exchange
    while preserving the dialogue structure.
