theological_decisions:
- issue: Rendering of חסד and אמת in reference to God's dealings with Jacob
  chosen_reading: covenantal-relational language ('acts of covenant faithfulness' / 'faithfulness')
  alternative_readings:
  - lovingkindness and truth
  - steadfast love and faithfulness
  - mercies and truth
  rationale: The pair חסד ואמת often denotes God's loyal and reliable covenantal character in action. The chosen rendering avoids flattening the terms into either mere emotion or abstract truth, while remaining readable modern English.
  doctrine_reference: Translation philosophy §§1, 5, 6
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/032/011.json
  category: awkward_english
  tier: 1
  from: acts of covenant faithfulness and all the faithfulness
  to: acts of steadfast love and all the faithfulness
  rationale: The current rendering translates two distinct Hebrew words, חֶסֶד (ḥesed) and אֱמֶת (’emet), using variations of the same English word ('faithfulness'). This creates a stylistically awkward and potentially confusing repetition. While the lexical choice for חֶסֶד as 'covenant faithfulness' is strong in isolation, it functions poorly in this classic pairing. The suggested rewrite uses the standard and well-regarded pairing of 'steadfast love and faithfulness,' which maintains the distinction between the two Hebrew concepts. It also preserves the drafter's correct insight that the plural חֲסָדִים refers to concrete actions by keeping the word 'acts'.
