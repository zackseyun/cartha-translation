id: GEN.32.11
reference: Genesis 32:11
source:
  edition: WLC
  text: קָטֹ֜נְתִּי מִ/כֹּ֤ל הַ/חֲסָדִים֙ וּ/מִ/כָּל הָ֣/אֱמֶ֔ת אֲשֶׁ֥ר עָשִׂ֖יתָ אֶת עַבְדֶּ֑/ךָ כִּ֣י בְ/מַקְלִ֗/י עָבַ֨רְתִּי֙ אֶת הַ/יַּרְדֵּ֣ן הַ/זֶּ֔ה וְ/עַתָּ֥ה הָיִ֖יתִי לִ/שְׁנֵ֥י מַחֲנֽוֹת־־־׃
translation:
  text: I am unworthy of all the acts of steadfast love and all the faithfulness that you have shown to your servant, for with my staff I crossed this Jordan, and now I have become two camps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am less than all the steadfast love and all the faithfulness.' The Hebrew literally says 'I am small from all...,' an idiom expressing humility before God's generosity.
    reason: lexical_alternative
  - marker: b
    text: '''Acts of covenant faithfulness'' renders the plural of חסד to reflect repeated concrete expressions of God''s loyal kindness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'acts of covenant faithfulness and all the faithfulness'.
    reason: previous_rendering
lexical_decisions:
- source_word: קָטֹנְתִּי
  chosen: I am unworthy
  alternatives:
  - I am too small
  - I am less than
  - I am unworthy
  lexicon: HALOT
  rationale: The verb literally means 'I am small' or 'I have become small,' but in this idiom before divine beneficence it expresses humility and insufficiency relative to God's gifts. 'I am unworthy' best conveys the sense in natural English without over-paraphrasing.
- source_word: הַחֲסָדִים
  chosen: the acts of covenant faithfulness
  alternatives:
  - the lovingkindnesses
  - the steadfast loves
  - the mercies
  lexicon: HALOT
  rationale: חסד often denotes loyal, covenantal kindness rather than mere sentiment. The plural here points to concrete expressions of that loyalty, so 'acts of covenant faithfulness' preserves both the covenantal nuance and the plural force.
- source_word: הָאֱמֶת
  chosen: the faithfulness
  alternatives:
  - the truth
  - the reliability
  - the steadfastness
  lexicon: HALOT
  rationale: In pairing with חסדים, אמת commonly carries the sense of reliability or faithfulness rather than abstract propositional 'truth.' 'Faithfulness' fits the relational context of God's dealings with Jacob.
- source_word: עָשִׂיתָ אֶת עַבְדֶּךָ
  chosen: you have shown to your servant
  alternatives:
  - you have done for your servant
  - you have dealt with your servant
  lexicon: HALOT
  rationale: Literally 'you have done with/to your servant.' English idiom prefers 'shown to your servant' when the objects are covenant kindness and faithfulness. 'Servant' is retained as the standard rendering of עבד here, where bonded status is not the main emphasis.
- source_word: בְמַקְלִי
  chosen: with my staff
  alternatives:
  - with only my staff
  - with my walking stick
  lexicon: HALOT
  rationale: The preposition and noun are straightforwardly 'with my staff.' The context implies Jacob had little else, but 'only' is interpretive and so left out of the main text.
- source_word: עָבַרְתִּי אֶת הַיַּרְדֵּן הַזֶּה
  chosen: I crossed this Jordan
  alternatives:
  - I crossed over this Jordan
  - I passed over this Jordan
  lexicon: HALOT
  rationale: A simple past rendering is natural. 'This Jordan' preserves the demonstrative force of הַזֶּה and the immediacy of Jacob's reference.
- source_word: הָיִיתִי לִשְׁנֵי מַחֲנוֹת
  chosen: I have become two camps
  alternatives:
  - I have become two companies
  - I have become two camps of people
  lexicon: HALOT
  rationale: The Hebrew states that Jacob has become 'for two camps,' idiomatically meaning he now consists of two camps. 'Camps' preserves the concrete imagery and anticipates the surrounding narrative context.
