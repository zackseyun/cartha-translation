id: GEN.32.22
reference: Genesis 32:22
source:
  edition: WLC
  text: וַ/תַּעֲבֹ֥ר הַ/מִּנְחָ֖ה עַל פָּנָ֑י/ו וְ/ה֛וּא לָ֥ן בַּ/לַּֽיְלָה הַ/ה֖וּא
    בַּֽ/מַּחֲנֶֽה־־׃
translation:
  text: So the gift passed on ahead of him, but he himself stayed that night in the
    camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the present' for 'the gift.' The Hebrew מִנְחָה can denote a gift, tribute,
      or offering; here it refers to Jacob's gift sent ahead to Esau.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲבֹר
  chosen: passed on
  alternatives:
  - went on
  - crossed over
  - passed over
  lexicon: HALOT
  rationale: From עבר in the wayyiqtol, here indicating movement onward/forward in
    narrative sequence. 'Passed on' fits the context of the present moving ahead of
    Jacob better than the more literal 'crossed over,' which could suggest traversing
    a boundary or stream not explicit in this clause.
- source_word: הַמִּנְחָה
  chosen: the gift
  alternatives:
  - the present
  - the offering
  - the tribute
  lexicon: HALOT
  rationale: מִנְחָה in this context refers to Jacob's gift sent to Esau, not a cultic
    offering. 'Gift' is the clearest modern English rendering; 'present' is possible
    but slightly dated, and 'tribute' may overstate political subordination.
- source_word: עַל־פָּנָיו
  chosen: ahead of him
  alternatives:
  - before him
  - in front of him
  lexicon: HALOT
  rationale: The idiom literally means 'before his face' and in context denotes something
    going in advance of Jacob. 'Ahead of him' communicates the idiomatic sense naturally
    in English.
- source_word: וְהוּא
  chosen: but he himself
  alternatives:
  - and he
  - while he
  lexicon: HALOT
  rationale: The pronoun is explicitly stated and contrastive in context, setting
    Jacob over against the gift that went ahead. 'But he himself' brings out the contrast
    naturally.
- source_word: לָן
  chosen: stayed
  alternatives:
  - lodged
  - spent the night
  - remained overnight
  lexicon: HALOT
  rationale: From לון/לין, to lodge or spend the night. 'Stayed' is concise and natural
    when followed by 'that night in the camp'; 'lodged' is more formal.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'That night' is idiomatic English.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - in the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה denotes a camp/encampment. 'Camp' is the natural modern English
    equivalent.
