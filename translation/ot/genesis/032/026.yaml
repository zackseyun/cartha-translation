id: GEN.32.26
reference: Genesis 32:26
source:
  edition: WLC
  text: וַ/יַּ֗רְא כִּ֣י לֹ֤א יָכֹל֙ ל֔/וֹ וַ/יִּגַּ֖ע בְּ/כַף יְרֵכ֑/וֹ וַ/תֵּ֨קַע֙
    כַּף יֶ֣רֶךְ יַעֲקֹ֔ב בְּ/הֵֽאָבְק֖/וֹ עִמּֽ/וֹ־־׃
translation:
  text: When he saw that he could not prevail against him, he touched the socket of
    his thigh, and the socket of Jacob’s thigh was dislocated as he wrestled with
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he could not overpower him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the socket/hollow of his thigh'; traditionally 'the hollow of his
      thigh.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew pronouns remain ambiguous; the verse does not explicitly restate
      the identity of Jacob’s opponent.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When he saw
  alternatives:
  - And he saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'When he saw' captures the
    temporal force naturally in English while preserving the subject's perception.
- source_word: לֹא יָכֹל לוֹ
  chosen: he could not prevail against him
  alternatives:
  - he could not overpower him
  - he was not able against him
  lexicon: HALOT
  rationale: יכל + ל conveys inability in relation to the opponent. 'Prevail against'
    fits wrestling context better than a wooden 'was not able to him' and avoids overstating
    absolute incapacity.
- source_word: וַיִּגַּע
  chosen: he touched
  alternatives:
  - he struck
  - he reached and touched
  lexicon: HALOT
  rationale: נגע ordinarily means 'touch.' Though the effect is forceful, the text
    itself uses the lighter contact verb, so 'touched' should be retained.
- source_word: בְּכַף יְרֵכוֹ
  chosen: the socket of his thigh
  alternatives:
  - the hollow of his thigh
  - the hip socket
  lexicon: HALOT
  rationale: כף with ירך here refers to the concave joint area at the hip/thigh. 'Socket
    of his thigh' is clear modern English and matches the following clause.
- source_word: וַתֵּקַע
  chosen: was dislocated
  alternatives:
  - was put out of joint
  - was wrenched
  lexicon: HALOT
  rationale: The verb indicates being driven out of place or disjointed in this context.
    The passive English 'was dislocated' expresses the resulting injury clearly.
- source_word: כַּף יֶרֶךְ יַעֲקֹב
  chosen: the socket of Jacob’s thigh
  alternatives:
  - Jacob's hip socket
  - the hollow of Jacob's thigh
  lexicon: HALOT
  rationale: Maintains lexical consistency with the earlier phrase and preserves the
    Hebrew's explicit naming of Jacob.
- source_word: בְּהֵאָבְקוֹ עִמּוֹ
  chosen: as he wrestled with him
  alternatives:
  - while he wrestled with him
  - in his wrestling with him
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks contemporaneous action.
    'As he wrestled with him' is idiomatic and preserves the ambiguity of the pronouns
    present in Hebrew.
