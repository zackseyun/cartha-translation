theological_decisions:
- issue: Referent of the pronouns ('he' and 'him') in the wrestling scene
  chosen_reading: Retain the Hebrew narrative ambiguity in English pronouns rather
    than identifying the figure explicitly.
  alternative_readings:
  - Interpret the subject as the man/angelic figure touching Jacob
  - Interpret the scene with explicit divine identification in the verse itself
  rationale: The immediate Hebrew text uses pronouns without restating the subject's
    identity. Since the broader passage develops the figure's significance progressively,
    the translation should not resolve the ambiguity more than the verse itself does.
  doctrine_reference: Preserve theological tension rather than resolve it.
