id: GEN.32.10
reference: Genesis 32:10
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ יַעֲקֹב֒ אֱלֹהֵי֙ אָבִ֣/י אַבְרָהָ֔ם וֵ/אלֹהֵ֖י אָבִ֣/י יִצְחָ֑ק
    יְהוָ֞ה הָ/אֹמֵ֣ר אֵלַ֗/י שׁ֧וּב לְ/אַרְצְ/ךָ֛ וּ/לְ/מוֹלַדְתְּ/ךָ֖ וְ/אֵיטִ֥יבָה
    עִמָּֽ/ךְ׃
translation:
  text: And Jacob said, “O God of my father Abraham and God of my father Isaac, the
    LORD, who said to me, ‘Return to your land and to your kindred, and I will do
    good with you,’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and I will do good to/with you''; the expression can also be
      rendered ''I will deal well with you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting sequence.
- source_word: אֱלֹהֵי אָבִי אַבְרָהָם וֵאלֹהֵי אָבִי יִצְחָק
  chosen: O God of my father Abraham and God of my father Isaac
  alternatives:
  - God of my father Abraham, and God of my father Isaac
  lexicon: HALOT
  rationale: Construct phrases are rendered straightforwardly. 'O' reflects direct
    address in prayer, making the vocative force natural in English without adding
    content beyond the context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: הָאֹמֵר אֵלַי
  chosen: who said to me
  alternatives:
  - who was saying to me
  - the one saying to me
  lexicon: HALOT
  rationale: The participle with article functions substantivally/descriptively, referring
    to the LORD as the one who spoke. English idiom prefers the relative clause 'who
    said to me.'
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: The imperative of שוב commonly means 'return.' This preserves the covenantal
    and geographical sense without colloquial flattening.
- source_word: לְאַרְצְךָ
  chosen: to your land
  alternatives:
  - to your country
  lexicon: HALOT
  rationale: '''Land'' is the more biblically resonant and contextually appropriate
    rendering, especially in patriarchal narratives tied to promised land themes.'
- source_word: וּלְמוֹלַדְתְּךָ
  chosen: and to your kindred
  alternatives:
  - and to your relatives
  - and to your birthplace
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote kinship group or native place/origin. In this context,
    'kindred' best captures the familial/home-origin sense and aligns with common
    patriarchal usage, while 'birthplace' is too narrow and 'relatives' somewhat flattens
    the term.
- source_word: וְאֵיטִיבָה עִמָּךְ
  chosen: and I will do good with you
  alternatives:
  - and I will do good to you
  - and I will deal well with you
  - and I will make it go well with you
  lexicon: HALOT
  rationale: The Hiphil of יטב with עִם expresses beneficent dealing. 'Do good with
    you' stays close to the Hebrew preposition while remaining understandable. The
    more idiomatic 'do good to you' is possible, but 'with' better reflects the source
    wording.
