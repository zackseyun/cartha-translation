id: GEN.32.23
reference: Genesis 32:23
source:
  edition: WLC
  text: וַ/יָּ֣קָם בַּ/לַּ֣יְלָה ה֗וּא וַ/יִּקַּ֞ח אֶת שְׁתֵּ֤י נָשָׁי/ו֙ וְ/אֶת שְׁתֵּ֣י
    שִׁפְחֹתָ֔י/ו וְ/אֶת אַחַ֥ד עָשָׂ֖ר יְלָדָ֑י/ו וַֽ/יַּעֲבֹ֔ר אֵ֖ת מַעֲבַ֥ר יַבֹּֽק׀־־־׃
translation:
  text: That night he arose and took his two wives, his two female servants, and his
    eleven children, and crossed the ford of the Jabbok.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his two slave women.' The Hebrew שִׁפְחֹתָיו refers to women of subordinate
      household status; 'female servants' is used here as clear modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he rose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום denotes rising/getting up. 'Arose' preserves the
    narrative register while remaining natural English.
- source_word: בַּלַּיְלָה הוּא
  chosen: That night
  alternatives:
  - in that night
  - during the night
  lexicon: HALOT
  rationale: The phrase literally means 'in the night, he,' with the pronoun adding
    emphasis. 'That night' is idiomatic English and captures the temporal setting
    without awkwardness.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took with him
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In context it implies gathering and leading
    his family, but 'took' is sufficient and avoids over-interpretation.
- source_word: שְׁתֵּי נָשָׁיו
  chosen: his two wives
  alternatives:
  - his two women
  lexicon: HALOT
  rationale: נָשִׁים here clearly refers to Jacob's wives, not merely women. 'Wives'
    is the precise contextual rendering.
- source_word: שְׁתֵּי שִׁפְחֹתָיו
  chosen: his two female servants
  alternatives:
  - his two maidservants
  - his two slave women
  - his two handmaids
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. 'Female servants' is clear modern
    English and avoids archaic 'handmaids.' Because the social status may imply slavery,
    that alternative is worth preserving in a footnote.
- source_word: אַחַד עָשָׂר יְלָדָיו
  chosen: his eleven children
  alternatives:
  - his eleven sons
  lexicon: HALOT
  rationale: יְלָדִים means children/offspring. Although Jacob's daughter Dinah is
    not included in the count here, the Hebrew term itself is 'children,' not 'sons,'
    so the translation should reflect the lexical form rather than harmonize interpretively.
- source_word: וַיַּעֲבֹר
  chosen: crossed
  alternatives:
  - passed over
  - went across
  lexicon: HALOT
  rationale: עבר in this travel context means to cross over. 'Crossed' is the most
    natural concise rendering.
- source_word: אֵת מַעֲבַר יַבֹּק
  chosen: the ford of the Jabbok
  alternatives:
  - the crossing of the Jabbok
  - the ford of Jabbok
  lexicon: HALOT
  rationale: מַעֲבַר denotes a crossing place or ford. 'The ford of the Jabbok' is
    standard, precise English for a river crossing point.
- source_word: יַבֹּק
  chosen: the Jabbok
  alternatives:
  - Jabbok
  lexicon: HALOT
  rationale: Proper name of the stream/river. Standard English transliteration is
    'Jabbok'; the article is supplied in English idiom when paired with 'ford of the
    Jabbok.'
