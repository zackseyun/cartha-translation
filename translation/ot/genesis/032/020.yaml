id: GEN.32.20
reference: Genesis 32:20
source:
  edition: WLC
  text: וַ/יְצַ֞ו גַּ֣ם אֶת הַ/שֵּׁנִ֗י גַּ֚ם אֶת הַ/שְּׁלִישִׁ֔י גַּ֚ם אֶת כָּל הַ/הֹ֣לְכִ֔ים
    אַחֲרֵ֥י הָ/עֲדָרִ֖ים לֵ/אמֹ֑ר כַּ/דָּבָ֤ר הַ/זֶּה֙ תְּדַבְּר֣וּ/ן אֶל עֵשָׂ֔ו
    בְּ/מֹצַאֲ/כֶ֖ם אֹתֽ/וֹ־־־־־׃
translation:
  text: And he commanded the second also, and the third also, and all those going
    behind the droves, saying, “According to this word you shall speak to Esau when
    you find him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “In this way you shall say to Esau when you meet him.” The Hebrew phrase
      can be rendered more idiomatically, but the main text preserves the wording-oriented
      sense of Jacob’s prescribed message.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he instructed
  - he ordered
  lexicon: HALOT
  rationale: Piel of צוה commonly denotes giving a charge or command. 'Commanded'
    preserves the directive force better than the softer 'instructed'.
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - the second one
  - the second servant
  lexicon: HALOT
  rationale: The adjective is ordinal and substantivized. 'The second' is the most
    direct rendering; adding 'servant' would import an explicit noun not present in
    this verse, though the referent is one of the successive servants/drivers from
    context.
- source_word: הַשְּׁלִישִׁי
  chosen: the third
  alternatives:
  - the third one
  - the third servant
  lexicon: HALOT
  rationale: As with 'the second,' the Hebrew uses a substantivized ordinal. The concise
    English preserves the form of the source.
- source_word: כָּל הַהֹלְכִים
  chosen: all those going
  alternatives:
  - all who were going
  - everyone going
  - all the ones going
  lexicon: HALOT
  rationale: The participle with כל refers to the whole group following. 'All those
    going' is natural English while retaining the participial sense.
- source_word: אַחֲרֵי הָעֲדָרִים
  chosen: behind the droves
  alternatives:
  - after the herds
  - behind the herds
  lexicon: HALOT
  rationale: עדרים refers to groups of animals being driven. 'Droves' fits the context
    of animals sent in successive groups and is more precise than the broader 'herds'.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech or quoted instruction.
- source_word: כַּדָּבָר הַזֶּה
  chosen: According to this word
  alternatives:
  - In this way
  - According to this message
  - Like this
  lexicon: HALOT
  rationale: Literally 'according to this word/thing.' Here it refers back to the
    exact wording Jacob has prescribed. 'According to this word' preserves the formal
    link to the prior speech better than the more idiomatic 'in this way,' though
    the latter is a viable alternative.
- source_word: תְּדַבְּרוּן
  chosen: you shall speak
  alternatives:
  - you shall say
  - you are to speak
  lexicon: HALOT
  rationale: The verb דבר is 'speak.' 'You shall speak' keeps the directive future
    sense and mirrors the Hebrew more closely than simply 'say.'
- source_word: בְּמֹצַאֲכֶם אֹתוֹ
  chosen: when you find him
  alternatives:
  - when you meet him
  - upon your finding him
  lexicon: HALOT
  rationale: The infinitive construct of מצא with prefixed ב conveys temporal circumstance.
    'When you find him' is idiomatic and accurate; 'meet him' is possible in context
    but slightly more interpretive.
