id: GEN.32.13
reference: Genesis 32:13
source:
  edition: WLC
  text: וְ/אַתָּ֣ה אָמַ֔רְתָּ הֵיטֵ֥ב אֵיטִ֖יב עִמָּ֑/ךְ וְ/שַׂמְתִּ֤י אֶֽת זַרְעֲ/ךָ֙
    כְּ/ח֣וֹל הַ/יָּ֔ם אֲשֶׁ֥ר לֹא יִסָּפֵ֖ר מֵ/רֹֽב־־׃
translation:
  text: But you said, ‘I will surely do you good, and I will make your offspring like
    the sand of the sea, which cannot be counted because of its abundance.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will certainly do good to you.' The Hebrew uses an infinitive absolute
      with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'your descendants.' The Hebrew זֶרַע is a collective singular meaning
      offspring as a group.
    reason: lexical_alternative
  - marker: c
    text: Or 'which cannot be numbered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with independent pronoun is emphatic in Jacob's appeal,
    contrasting God's promise with the present danger. 'But you' captures the adversative
    force naturally in English while preserving the direct address.
- source_word: אָמַרְתָּ
  chosen: said
  alternatives:
  - have said
  lexicon: HALOT
  rationale: Qal perfect 2ms refers to God's prior statement. Simple past 'said' is
    idiomatic in English prayer/report discourse.
- source_word: הֵיטֵב אֵיטִיב
  chosen: I will surely do you good
  alternatives:
  - I will certainly do good to you
  - I will indeed prosper you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite Hiphil intensifies the verb, so 'surely'
    preserves the emphasis. The idiom with עִם conveys beneficent action toward someone;
    'do you good' is a natural and sufficiently formal rendering without over-specifying
    prosperity.
- source_word: עִמָּךְ
  chosen: you
  alternatives:
  - to you
  - with you
  lexicon: HALOT
  rationale: Though literally 'with you,' in this idiom after היטיב it means acting
    beneficially toward someone. English expresses this naturally as the indirect
    object 'you' in 'do you good.'
- source_word: וְשַׂמְתִּי
  chosen: and I will make
  alternatives:
  - and I will set
  - and I will appoint
  lexicon: HALOT
  rationale: In context of making descendants numerous, שׂים functions idiomatically
    as 'make' rather than the more wooden 'set.'
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זרע in contemporary
    English better than the archaic ''seed,'' while avoiding the more interpretive
    plural ''descendants.'''
- source_word: כְּחוֹל הַיָּם
  chosen: like the sand of the sea
  alternatives:
  - as the sand of the sea
  - like the seashore sand
  lexicon: HALOT
  rationale: This is the standard Hebrew simile for innumerable descendants. 'Like
    the sand of the sea' is both literal and idiomatic in English Bible style.
- source_word: אֲשֶׁר לֹא יִסָּפֵר
  chosen: which cannot be counted
  alternatives:
  - which will not be counted
  - which cannot be numbered
  lexicon: HALOT
  rationale: The Niphal imperfect expresses what is not countable in practice. 'Cannot
    be counted' communicates resultant impossibility more naturally than a bare future
    passive.
- source_word: מֵרֹב
  chosen: because of its abundance
  alternatives:
  - for multitude
  - from abundance
  - because they are so many
  lexicon: HALOT
  rationale: 'The preposition מן with רֹב gives the reason the sand cannot be counted:
    its great quantity. ''Because of its abundance'' is clear modern English and preserves
    the causal sense.'
