theological_decisions:
- issue: Referent of מַלְאֲכֵי אֱלֹהִים
  chosen_reading: heavenly angels
  alternative_readings:
  - messengers of God
  rationale: Although מלאכים can denote human messengers in some contexts, Jacob's
    naming of the place in the following verse as God's camp strongly supports a supernatural
    referent here. The translation therefore uses "angels" in the main text.
