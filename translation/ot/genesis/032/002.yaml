id: GEN.32.2
reference: Genesis 32:2
source:
  edition: WLC
  text: וְ/יַעֲקֹ֖ב הָלַ֣ךְ לְ/דַרְכּ֑/וֹ וַ/יִּפְגְּעוּ ב֖/וֹ מַלְאֲכֵ֥י אֱלֹהִֽים־׃
translation:
  text: And Jacob went on his way, and the angels of God met him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "God's angels"; the Hebrew phrase is literally "angels of God."
    reason: lexical_alternative
  - marker: b
    text: Or "encountered him" or "came upon him."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַעֲקֹב
  chosen: And Jacob
  alternatives:
  - Now Jacob
  lexicon: HALOT
  rationale: The conjunction וְ is rendered simply as "And" to preserve the narrative
    flow without overinterpreting it as a stronger discourse marker. The personal
    name is transliterated per translation philosophy.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - walked
  - traveled
  lexicon: HALOT
  rationale: הלך commonly means "go/walk." In idiomatic English with the following
    phrase "on his way," "went" is the most natural and accurate rendering.
- source_word: לְ/דַרְכּוֹ
  chosen: on his way
  alternatives:
  - to his way
  - along his way
  lexicon: HALOT
  rationale: Literally "to his way," but the idiomatic sense in English is "on his
    way." This preserves the Hebrew sense of continuing his journey without awkward
    literalism.
- source_word: וַ/יִּפְגְּעוּ בּוֹ
  chosen: met him
  alternatives:
  - encountered him
  - came upon him
  lexicon: HALOT
  rationale: פגע with ב can mean to meet or encounter. "Met him" is concise, natural,
    and fits the narrative context without implying hostility or mere accident more
    strongly than the Hebrew does.
- source_word: מַלְאֲכֵי אֱלֹהִים
  chosen: the angels of God
  alternatives:
  - God's angels
  - messengers of God
  lexicon: HALOT
  rationale: מלאכים can mean either human messengers or angels, but here the immediate
    context points to heavenly beings. "The angels of God" preserves the construct
    phrase transparently and matches standard biblical usage.
