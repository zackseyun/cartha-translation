  from: and asks you, saying,
  to: and asks you,
  rationale: The phrase 'asks you, saying,' is a literal translation of the Hebrew `וִשְׁאֵלְךָ לֵאמֹר`. While formally accurate, the word 'saying' is redundant in English when introducing a question after the verb 'to ask'. Removing it creates a more natural and fluid sentence without sacrificing meaning.
