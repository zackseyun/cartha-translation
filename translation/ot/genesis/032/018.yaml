id: GEN.32.18
reference: Genesis 32:18
source:
  edition: WLC
  text: וַ/יְצַ֥ו אֶת הָ/רִאשׁ֖וֹן לֵ/אמֹ֑ר כִּ֣י יִֽפְגָּשְׁ/ךָ֞ עֵשָׂ֣ו אָחִ֗/י וִ/שְׁאֵֽלְ/ךָ֙ לֵ/אמֹ֔ר לְ/מִי אַ֨תָּה֙ וְ/אָ֣נָה תֵלֵ֔ךְ וּ/לְ/מִ֖י אֵ֥לֶּה לְ/פָנֶֽי/ךָ־־׃
translation:
  text: And he commanded the first one, saying, “When Esau my brother meets you and asks you, ‘Whose are you, and where are you going, and whose are these before you?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If Esau my brother meets you.” The Hebrew particle can introduce either an expected or conditional circumstance; the main text uses “When” because Jacob anticipates the encounter.
    reason: alternative_reading
  - marker: b
    text: “Whose are you” expresses belonging or ownership; alternatively, “To whom do you belong?”
    reason: lexical_alternative
  - marker: c
    text: Or, “whose are these ahead of you?” The Hebrew literally says “before you.”
    reason: lexical_alternative
  - marker: d
    text: Or 'and asks you, saying,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְצַו
  chosen: And he commanded
  alternatives:
  - And he instructed
  - And he ordered
  lexicon: HALOT
  rationale: The verb צוה commonly means to command or give instructions. 'Commanded' preserves the directness of Jacob's charge to the servant and fits the narrative tone.
- source_word: הָרִאשׁוֹן
  chosen: the first one
  alternatives:
  - the first
  - the first servant
  lexicon: HALOT
  rationale: The adjective 'first' functions substantivally here, referring to the first member of the drove. 'The first one' is natural English while avoiding adding 'servant' explicitly, which is implied by context but not stated in this verse.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. 'Saying' reads naturally in English narrative.
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Although כִּי can be rendered in several ways, in this instruction context it introduces the anticipated circumstance of encounter. 'When' better reflects expected occurrence than the more conditional 'if'.
- source_word: יִפְגָּשְׁךָ
  chosen: meets you
  alternatives:
  - encounters you
  lexicon: HALOT
  rationale: The verb פגשׁ means to meet or encounter. 'Meets you' is idiomatic and sufficiently precise.
- source_word: עֵשָׂו אָחִי
  chosen: Esau my brother
  alternatives:
  - my brother Esau
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional order and keeps Jacob's identification of Esau explicit.
- source_word: וִשְׁאֵלְךָ
  chosen: and asks you
  alternatives:
  - and questions you
  lexicon: HALOT
  rationale: שׁאל in this context is straightforward inquiry. 'Asks you' is the most natural equivalent.
- source_word: לְמִי אַתָּה
  chosen: Whose are you
  alternatives:
  - To whom do you belong
  lexicon: HALOT
  rationale: The Hebrew literally asks possession or belonging. 'Whose are you' is concise and preserves the social sense of belonging/ownership in context.
- source_word: וְאָנָה תֵלֵךְ
  chosen: and where are you going
  alternatives:
  - and where are you headed
  lexicon: HALOT
  rationale: אָנָה asks destination, and הלך supplies motion. 'Where are you going' is direct and idiomatic.
- source_word: וּלְמִי אֵלֶּה לְפָנֶיךָ
  chosen: and whose are these before you
  alternatives:
  - and to whom do these before you belong
  - and whose are these ahead of you
  lexicon: HALOT
  rationale: The phrase asks ownership of the animals preceding the servant. 'Before you' closely reflects לְפָנֶיךָ while remaining understandable; it preserves the spatial imagery without over-paraphrasing to 'ahead of you' in the main text.
