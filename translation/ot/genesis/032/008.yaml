id: GEN.32.8
reference: Genesis 32:8
source:
  edition: WLC
  text: וַ/יִּירָ֧א יַעֲקֹ֛ב מְאֹ֖ד וַ/יֵּ֣צֶר ל֑/וֹ וַ/יַּ֜חַץ אֶת הָ/עָ֣ם אֲשֶׁר
    אִתּ֗/וֹ וְ/אֶת הַ/צֹּ֧אן וְ/אֶת הַ/בָּקָ֛ר וְ/הַ/גְּמַלִּ֖ים לִ/שְׁנֵ֥י מַחֲנֽוֹת־־־־׃
translation:
  text: Then Jacob was very afraid and distressed, and he divided the people who were
    with him, along with the flocks, the herds, and the camels, into two camps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into two companies.' The Hebrew word can refer to a camp or organized
      company.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירָא
  chosen: was very afraid
  alternatives:
  - feared greatly
  - was greatly afraid
  lexicon: HALOT
  rationale: From ירא, denoting fear. Rendered with an English verbal phrase natural
    in context; intensified by the following מְאֹד, so translated together as 'was
    very afraid.'
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Adverbial intensifier modifying Jacob's fear. 'Very' is clear modern
    English and preserves the force without sounding archaic.
- source_word: וַיֵּצֶר לוֹ
  chosen: and distressed
  alternatives:
  - and it was distressing to him
  - and he was in distress
  - and he was troubled
  lexicon: HALOT
  rationale: From צרר/יצר in this form and idiom, expressing inner distress or anguish.
    English idiom favors 'was ... distressed' rather than a more wooden 'it was distressing
    to him.'
- source_word: וַיַּחַץ
  chosen: he divided
  alternatives:
  - he split
  - he separated
  lexicon: HALOT
  rationale: From חצה, to divide or split. 'Divided' best fits the deliberate tactical
    action Jacob takes.
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  chosen: the people who were with him
  alternatives:
  - the company that was with him
  - the people with him
  lexicon: HALOT
  rationale: עָם here refers to the people in Jacob's traveling party, not a nation
    in the broader ethnic sense. 'People who were with him' is the most transparent
    rendering.
- source_word: הַצֹּאן
  chosen: the flocks
  alternatives:
  - the sheep and goats
  - the small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, especially sheep/goats. 'Flocks'
    is idiomatic and suitably broad.
- source_word: הַבָּקָר
  chosen: the herds
  alternatives:
  - the cattle
  - the oxen
  lexicon: HALOT
  rationale: בָּקָר refers to cattle. 'Herds' works well in parallel with 'flocks'
    and reflects the collective sense.
- source_word: הַגְּמַלִּים
  chosen: the camels
  lexicon: HALOT
  rationale: Straightforward lexical rendering of גמלים.
- source_word: לִשְׁנֵי מַחֲנוֹת
  chosen: into two camps
  alternatives:
  - into two companies
  - into two campsites
  lexicon: HALOT
  rationale: מַחֲנוֹת is the plural of 'camp' and in this narrative context refers
    to two encampments or traveling groups. 'Two camps' is concise and preserves the
    narrative terminology that continues in the following verse.
