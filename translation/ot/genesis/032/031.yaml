id: GEN.32.31
reference: Genesis 32:31
source:
  edition: WLC
  text: וַ/יִּקְרָ֧א יַעֲקֹ֛ב שֵׁ֥ם הַ/מָּק֖וֹם פְּנִיאֵ֑ל כִּֽי רָאִ֤יתִי אֱלֹהִים֙
    פָּנִ֣ים אֶל פָּנִ֔ים וַ/תִּנָּצֵ֖ל נַפְשִֽׁ/י־־׃
translation:
  text: And Jacob called the name of the place Peniel, for he said, “I have seen God
    face to face, and my life has been delivered.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Peniel sounds like 'face of God,' matching Jacob's explanation, 'I have
      seen God face to face.'
    reason: cultural_note
  - marker: b
    text: Or 'my soul has been delivered,' with 'soul' here meaning 'life' or 'self.'
    reason: lexical_alternative
  - marker: c
    text: '''God'' could also be understood more broadly as ''a divine being,'' but
      the context favors ''God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to call/name. 'Called' preserves
    the Hebrew idiom, while the following phrase 'the name of the place' makes the
    naming sense clear.
- source_word: שֵׁם הַמָּקוֹם
  chosen: the name of the place
  alternatives:
  - the place
  lexicon: HALOT
  rationale: Retaining 'the name of the place' reflects the Hebrew construction rather
    than smoothing it to simply 'the place,' preserving the formal texture of the
    naming formula.
- source_word: פְּנִיאֵל
  chosen: Peniel
  alternatives:
  - Penuel
  lexicon: HALOT
  rationale: As a place name, it is transliterated. 'Peniel' closely reflects the
    spelling given here and aligns with the explanatory wordplay on 'face' (פָּנִים)
    and 'God' (אֵל).
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: '''For'' naturally introduces Jacob''s explanation for the place name
    and preserves the causal force without over-expansion.'
- source_word: רָאִיתִי אֱלֹהִים
  chosen: I have seen God
  alternatives:
  - I have seen a divine being
  lexicon: HALOT
  rationale: Although אֱלֹהִים can in some contexts denote a divine being or heavenly
    being, in this narrative Jacob interprets the encounter in direct theological
    terms. 'God' is the most natural and contextually fitting rendering.
- source_word: פָּנִים אֶל פָּנִים
  chosen: face to face
  alternatives:
  - face-to-face
  - literally, faces to face
  lexicon: HALOT
  rationale: This is a standard idiom meaning direct personal encounter. 'Face to
    face' is the clear and established English equivalent and preserves the wordplay
    with Peniel.
- source_word: וַתִּנָּצֵל
  chosen: has been delivered
  alternatives:
  - was spared
  - was rescued
  - was preserved
  lexicon: HALOT
  rationale: From נצל, the sense is being delivered or rescued. The perfective result
    in context is that Jacob survived the encounter. 'Has been delivered' preserves
    both the passive/resultative sense and the theological weight of preservation.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - I myself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to Jacob's life/self in the concrete sense of surviving,
    not specifically to an immaterial 'soul.' 'My life' is the most accurate modern
    English rendering in context.
