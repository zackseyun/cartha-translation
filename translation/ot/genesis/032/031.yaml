theological_decisions:
- issue: Rendering אֱלֹהִים in Jacob's statement
  chosen_reading: God
  alternative_readings:
  - a divine being
  rationale: The immediate context of Jacob's naming explanation and the broader narrative
    of the wrestling encounter support a direct reference to God rather than an indefinite
    heavenly being. This preserves the text's theological force without importing
    later doctrinal precision beyond the Hebrew wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
