id: GEN.32.7
reference: Genesis 32:7
source:
  edition: WLC
  text: וַ/יָּשֻׁ֨בוּ֙ הַ/מַּלְאָכִ֔ים אֶֽל יַעֲקֹ֖ב לֵ/אמֹ֑ר בָּ֤אנוּ אֶל אָחִ֨י/ךָ֙
    אֶל עֵשָׂ֔ו וְ/גַם֙ הֹלֵ֣ךְ לִ/קְרָֽאתְ/ךָ֔ וְ/אַרְבַּע מֵא֥וֹת אִ֖ישׁ עִמּֽ/וֹ־־־־׃
translation:
  text: The messengers returned to Jacob, saying, “We came to your brother, to Esau,
    and he is also coming to meet you, and four hundred men are with him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely in this context, “the angels returned to Jacob.” The Hebrew
      מַלְאָכִים can mean either “messengers” or “angels,” but here it refers to the
      envoys Jacob sent to Esau.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: From שוב in the wayyiqtol, narrating a completed past action. 'Returned'
    is idiomatic and fits the context of messengers coming back to Jacob after being
    sent out.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the angels
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel.' In this immediate context
    these are the human envoys Jacob sent to Esau in the preceding verse, so 'messengers'
    is required by context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard infinitive construct introducing direct speech. 'Saying' preserves
    the Hebrew discourse structure naturally in English.
- source_word: בָּאנוּ
  chosen: We came
  alternatives:
  - We went
  - We arrived
  lexicon: HALOT
  rationale: The verb is first person plural perfect of בוא, reported in the messengers'
    speech. 'We came' is the most direct rendering; in English it works naturally
    from the speakers' perspective.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Straightforward possessive construction. Retained because the relationship
    is rhetorically important in the narrative.
- source_word: אֶל עֵשָׂו
  chosen: to Esau
  alternatives:
  - to your brother Esau
  lexicon: HALOT
  rationale: The second אֶל appositionally identifies 'your brother' as Esau. English
    expresses this naturally as 'to your brother, to Esau,' preserving the Hebrew
    emphasis and clarification.
- source_word: וְגַם
  chosen: and he is also
  alternatives:
  - and also
  - and indeed
  lexicon: HALOT
  rationale: גם adds the notable further detail that Esau himself is coming. Rendering
    with 'also' preserves the additive force.
- source_word: הֹלֵךְ
  chosen: is coming
  alternatives:
  - is going
  - is on his way
  lexicon: HALOT
  rationale: הלך literally means 'going/walking,' but with לִקְרָאתְךָ ('to meet you')
    English idiom prefers 'is coming to meet you.' This is an optimal-equivalence
    rendering of the participle's ongoing sense.
- source_word: לִקְרָאתְךָ
  chosen: to meet you
  alternatives:
  - to encounter you
  lexicon: HALOT
  rationale: From קרא/לקראת in the sense of moving toward someone for an encounter.
    'To meet you' is the natural and contextually neutral English rendering.
- source_word: וְאַרְבַּע מֵאוֹת אִישׁ
  chosen: and four hundred men
  alternatives:
  - with four hundred men
  lexicon: HALOT
  rationale: The Hebrew presents the number and noun plainly. 'Men' is gender-accurate
    and contextually appropriate for a traveling armed company; it should not be neutralized.
- source_word: עִמּוֹ
  chosen: are with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The prepositional phrase is rendered with an English copular expression
    to form a complete clause. This preserves the sense that the four hundred men
    accompany Esau.
