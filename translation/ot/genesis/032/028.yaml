id: GEN.32.28
reference: Genesis 32:28
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלָ֖י/ו מַה שְּׁמֶ֑/ךָ וַ/יֹּ֖אמֶר יַעֲקֹֽב־׃
translation:
  text: And he said to him, “What is your name?” And he said, “Jacob.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'And he said' preserves
    the Hebrew narrative flow in natural English without overinterpreting temporal
    nuance.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: The preposition אֶל with 3ms suffix straightforwardly indicates direction
    toward a male referent. 'To him' is the natural modern English equivalent.
- source_word: מַה
  chosen: What
  alternatives:
  - What is it that
  lexicon: HALOT
  rationale: Simple interrogative pronoun; 'What' is the direct and idiomatic rendering.
- source_word: שְּׁמֶךָ
  chosen: is your name
  alternatives:
  - your name
  lexicon: HALOT
  rationale: Literally 'your name'; English requires the copula for a complete question.
    'What is your name?' is the standard idiomatic rendering and does not add meaning
    beyond what the Hebrew implies.
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - And he answered
  lexicon: HALOT
  rationale: The second occurrence of אמר is rendered consistently as 'said.' Although
    contextually it functions as a reply, the Hebrew verb itself is the ordinary 'say,'
    and consistency is preferable here.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
