id: GEN.32.1
reference: Genesis 32:1
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם לָבָ֜ן בַּ/בֹּ֗קֶר וַ/יְנַשֵּׁ֧ק לְ/בָנָ֛י/ו וְ/לִ/בְנוֹתָ֖י/ו
    וַ/יְבָ֣רֶךְ אֶתְ/הֶ֑ם וַ/יֵּ֛לֶךְ וַ/יָּ֥שָׁב לָבָ֖ן לִ/מְקֹמֽ/וֹ׃
translation:
  text: Laban rose early in the morning, kissed his sons and his daughters, and blessed
    them. Then Laban departed and returned to his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his sons and his daughters'; these likely refer to Laban's descendants,
      that is, his grandchildren.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The verb שׁכם in the Hiphil commonly means to rise early or start early.
    'Rose early' is natural modern English and preserves the temporal emphasis without
    unnecessary archaism.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: The phrase literally means 'in the morning.' Retaining it with 'rose
    early' yields the idiomatic English expression 'rose early in the morning,' matching
    the Hebrew sequence and emphasis.
- source_word: וַיְנַשֵּׁק
  chosen: kissed
  alternatives:
  - gave a kiss to
  lexicon: HALOT
  rationale: The verb נשׁק here denotes a familial farewell kiss. 'Kissed' is the
    direct and sufficient rendering.
- source_word: לְבָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'his sons.' Although these are grandchildren
    in relation to Laban, the Hebrew idiom can use 'sons' and 'daughters' for descendants.
    The translation keeps the lexical form rather than flattening it to 'children.'
- source_word: וְלִבְנוֹתָיו
  chosen: his daughters
  alternatives:
  - his granddaughters
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'his daughters.' As with 'his sons,' this
    likely refers to descendants, but the translation preserves the source wording.
    This is also consistent with the text's gender-specific expression.
- source_word: וַיְבָרֶךְ אֶתְהֶם
  chosen: and blessed them
  alternatives:
  - and said farewell to them
  lexicon: HALOT
  rationale: ברך straightforwardly means 'bless.' In this farewell context it may
    include a parting blessing, but 'blessed them' best preserves the lexical content.
- source_word: וַיֵּלֶךְ
  chosen: departed
  alternatives:
  - went away
  - went
  lexicon: HALOT
  rationale: 'Because the next verb is ''returned,'' rendering this first motion verb
    as ''departed'' avoids awkward repetition in English while preserving the narrative
    sequence: he left and then returned home.'
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return.' This is the main semantic force of the
    clause and pairs naturally with 'to his place.'
- source_word: לִמְקֹמוֹ
  chosen: to his place
  alternatives:
  - to his home
  - to where he belonged
  lexicon: HALOT
  rationale: מקום literally means 'place.' While 'home' is possible by implication,
    'to his place' stays closer to the Hebrew and avoids adding specificity not explicit
    in the text.
