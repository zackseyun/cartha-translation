theological_decisions:
- issue: Gender-specific kinship terms
  chosen_reading: his sons and his daughters
  alternative_readings:
  - his children
  - his grandchildren
  rationale: The Hebrew uses explicit masculine and feminine kinship terms. In keeping
    with the translation philosophy's gender-accurate principle, the rendering preserves
    these forms rather than neutralizing them. Because the referents are likely descendants
    rather than only immediate children, an explanatory footnote preserves that possibility
    without altering the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
