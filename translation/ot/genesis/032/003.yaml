id: GEN.32.3
reference: Genesis 32:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יַעֲקֹב֙ כַּ/אֲשֶׁ֣ר רָאָ֔/ם מַחֲנֵ֥ה אֱלֹהִ֖ים זֶ֑ה וַ/יִּקְרָ֛א
    שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא מַֽחֲנָֽיִם־׃פ
translation:
  text: When Jacob saw them, he said, “This is God’s camp.” So he called the name
    of that place Mahanaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mahanaim sounds like “two camps” or “double camp,” echoing Jacob’s words,
      “This is God’s camp.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - he said to himself
  - he exclaimed
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר, introducing Jacob's spoken response. No object
    is supplied, so simple narrative 'he said' is preferred over more interpretive
    expansions.
- source_word: כַּאֲשֶׁר
  chosen: When
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: In context this conjunction introduces the circumstance/time of Jacob's
    response after seeing the angels in the previous verse. 'When' gives natural English
    while preserving the temporal force.
- source_word: רָאָם
  chosen: saw them
  alternatives:
  - saw him
  - saw it
  lexicon: HALOT
  rationale: The suffix is 3mp, referring back to the plural referent from the previous
    verse (the angels of God). 'Them' is therefore required by the immediate context.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - company
  - encampment
  lexicon: HALOT
  rationale: The noun denotes a camp or encampment. 'Camp' is the most natural and
    concise English rendering here and also preserves the wordplay with the place
    name Mahanaim.
- source_word: אֱלֹהִים
  chosen: God’s
  alternatives:
  - of God
  - divine
  lexicon: HALOT
  rationale: Here אֱלֹהִים is best taken as the singular God of Israel in a construct
    chain, 'camp of God.' The possessive form 'God’s' is idiomatic English and preserves
    the sense.
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  - This here is
  lexicon: HALOT
  rationale: 'The demonstrative functions predicatively in Jacob''s declaration. English
    requires the copula for natural sense: ''This is God''s camp.'''
- source_word: וַיִּקְרָא שֵׁם
  chosen: he called the name
  alternatives:
  - he named
  - he gave the name
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called the name.' Retaining it in English
    keeps a slightly more formal biblical style while remaining understandable. 'Named'
    is possible but less transparent to the source wording.
- source_word: הַמָּקוֹם הַהוּא
  chosen: that place
  alternatives:
  - the place
  - that location
  lexicon: HALOT
  rationale: The demonstrative phrase points to a specific site just encountered.
    'That place' is idiomatic and adequately reflects the Hebrew definiteness and
    deixis.
- source_word: מַחֲנָיִם
  chosen: Mahanaim
  alternatives:
  - Two Camps
  lexicon: HALOT
  rationale: As a place name, it should be transliterated per project philosophy.
    The form likely evokes a dual/plural sense related to 'two camps,' but the proper
    name belongs in the main text; the semantic nuance is worth preserving in a footnote.
