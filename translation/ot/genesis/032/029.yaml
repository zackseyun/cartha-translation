id: GEN.32.29
reference: Genesis 32:29
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לֹ֤א יַעֲקֹב֙ יֵאָמֵ֥ר עוֹד֙ שִׁמְ/ךָ֔ כִּ֖י אִם יִשְׂרָאֵ֑ל כִּֽי
    שָׂרִ֧יתָ עִם אֱלֹהִ֛ים וְ/עִם אֲנָשִׁ֖ים וַ/תּוּכָֽל־־־־׃
translation:
  text: And he said, “Your name shall no longer be called Jacob, but Israel, because
    you have striven with God and with men, and have prevailed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with divine beings'; Hebrew אֱלֹהִים can in some contexts refer to God,
      gods, or heavenly beings. Here the main text follows 'God' because of the narrative
      context.
    reason: alternative_reading
  - marker: b
    text: Or 'with people' or 'with humans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵאָמֵר
  chosen: shall ... be called
  alternatives:
  - shall be said
  - shall be named
  lexicon: HALOT
  rationale: Passive of אמר in naming formula is most naturally rendered 'be called'
    in English. This preserves the formal naming declaration without awkward literalism.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any more
  - again
  lexicon: HALOT
  rationale: In this context of renaming, עוד marks cessation of the former designation;
    'no longer' is idiomatic and precise.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except
  - rather
  lexicon: HALOT
  rationale: 'In contrastive renaming formulae, כי אם functions adversatively: not
    X, but Y.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Personal names are transliterated by project policy. The explanatory
    wordplay is carried by the following clause rather than by translating the name
    itself.
- source_word: שָׂרִיתָ
  chosen: have striven
  alternatives:
  - have struggled
  - have contended
  - have persevered
  lexicon: HALOT
  rationale: From שרה, the verb likely evokes striving/contending and explains the
    name Israel by wordplay. 'Have striven' preserves that elevated, compact sense
    better than the more physical 'struggled,' while remaining readable.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  - divine beings
  lexicon: HALOT
  rationale: In this narrative context the singular referent is intended, matching
    the encounter's theological force and standard syntactic sense here. The singular
    'God' best fits the naming explanation.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - humans
  lexicon: HALOT
  rationale: The Hebrew is the masculine plural of איש. Per gender-accurate policy,
    'men' best matches the source form and likely contrast with God; broader alternatives
    are possible but less textually specific.
- source_word: וַתּוּכָל
  chosen: have prevailed
  alternatives:
  - have overcome
  - have been able
  - have endured
  lexicon: HALOT
  rationale: From יכל, in this context it denotes successful outcome in the struggle.
    'Have prevailed' is the most idiomatic English rendering in this naming explanation
    and preserves the sense of success without overstating total conquest.
