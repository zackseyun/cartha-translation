theological_decisions:
- issue: Referent of אֱלֹהִים in the naming explanation
  chosen_reading: God
  alternative_readings:
  - divine being
  - angelic/divine beings
  rationale: The immediate narrative presents Jacob's wrestling encounter as an encounter
    with God, even while mediated in mysterious human form. Rendering אֱלֹהִים as
    'God' preserves the text's theological tension rather than reducing it to a lesser
    being. Alternative understandings are worth preserving because the broader passage
    includes ambiguity about the figure's identity.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering of אֲנָשִׁים
  chosen_reading: men
  alternative_readings:
  - people
  - humans
  rationale: The source uses a masculine plural noun and likely sets a rhetorical
    contrast 'with God and with men.' Following the project's gender-accurate policy,
    'men' is retained in the main text, while a more inclusive English alternative
    is noted.
  doctrine_reference: Gender-accurate over gender-neutral
