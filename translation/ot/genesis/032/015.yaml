id: GEN.32.15
reference: Genesis 32:15
source:
  edition: WLC
  text: עִזִּ֣ים מָאתַ֔יִם וּ/תְיָשִׁ֖ים עֶשְׂרִ֑ים רְחֵלִ֥ים מָאתַ֖יִם וְ/אֵילִ֥ים
    עֶשְׂרִֽים׃
translation:
  text: two hundred female goats and twenty male goats, two hundred ewes and twenty
    rams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she-goats ... he-goats.'
    reason: lexical_alternative
  - marker: b
    text: Or 'female sheep ... male sheep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִזִּים
  chosen: female goats
  alternatives:
  - goats
  - she-goats
  lexicon: HALOT
  rationale: The noun denotes goats, and in this breeding inventory context the sex
    distinction is important because it is paired with male goats. 'Female goats'
    is clear modern English; 'she-goats' is possible but less natural.
- source_word: מָאתַיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: תְיָשִׁים
  chosen: male goats
  alternatives:
  - he-goats
  - bucks
  lexicon: HALOT
  rationale: The term refers to male goats. 'Male goats' is the clearest contemporary
    rendering and matches the explicit sex pairing in the verse. 'He-goats' is more
    traditional; 'bucks' is possible but less transparent for some readers.
- source_word: עֶשְׂרִים
  chosen: twenty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: רְחֵלִים
  chosen: ewes
  alternatives:
  - female sheep
  - sheep
  lexicon: HALOT
  rationale: The noun denotes female sheep. Because the verse contrasts them with
    rams, the sex-specific term should be preserved. 'Ewes' is concise and standard
    English.
- source_word: אֵילִים
  chosen: rams
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The term denotes male sheep, especially rams. 'Rams' is the standard
    concise English equivalent and preserves the breeding-pair structure of the list.
