id: GEN.32.30
reference: Genesis 32:30
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֣ל יַעֲקֹ֗ב וַ/יֹּ֨אמֶר֙ הַגִּֽידָ/ה נָּ֣א שְׁמֶ֔/ךָ וַ/יֹּ֕אמֶר לָ֥/מָּה זֶּ֖ה תִּשְׁאַ֣ל לִ/שְׁמִ֑/י וַ/יְבָ֥רֶךְ אֹת֖/וֹ שָֽׁם־׃
translation:
  text: Then Jacob asked and said, “Please tell me your name.” But he said, “Why is it that you ask my name?” And he blessed him there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, “Why do you ask my name?”
    reason: lexical_alternative
  - marker: b
    text: Or 'Why is this that'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: asked
  alternatives:
  - inquired
  lexicon: HALOT
  rationale: The verb שׁאל commonly means 'ask, inquire.' 'Asked' is the most natural modern English rendering here and fits the direct request that follows.
- source_word: הַגִּידָה נָּא
  chosen: Please tell me
  alternatives:
  - Please declare to me
  - Tell me, please
  lexicon: HALOT
  rationale: The Hiphil imperative of נגד means 'tell, declare, make known.' With נָא, the request is softened/polite, so 'Please tell me' captures both sense and tone in readable English.
- source_word: שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: A straightforward rendering of 'your name.' In context, 'name' carries identity significance, but no expansion beyond the lexical sense is warranted in the main text.
- source_word: לָמָּה זֶּה
  chosen: Why is this that
  alternatives:
  - Why do you
  - Why is it that
  lexicon: HALOT
  rationale: The Hebrew idiom לָמָּה זֶּה is slightly fuller than a bare 'why.' 'Why is this that' preserves some of the Hebrew texture while remaining intelligible. A smoother alternative is preserved in a footnote.
- source_word: תִּשְׁאַל לִשְׁמִי
  chosen: you ask my name
  alternatives:
  - you inquire about my name
  lexicon: HALOT
  rationale: This directly mirrors the Hebrew wording and keeps the focus on the request for the speaker's identity.
- source_word: וַיְבָרֶךְ אֹתוֹ שָׁם
  chosen: And he blessed him there
  alternatives:
  - Then he blessed him there
  lexicon: HALOT
  rationale: ברך means 'bless.' The subject remains the unnamed man/God-figure from the prior context; the Hebrew leaves it implicit, so the English likewise keeps 'he.' 'There' renders שָׁם plainly and preserves the narrative location emphasis.
