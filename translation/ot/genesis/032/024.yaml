id: GEN.32.24
reference: Genesis 32:24
source:
  edition: WLC
  text: וַ/יִּקָּחֵ֔/ם וַ/יַּֽעֲבִרֵ֖/ם אֶת הַ/נָּ֑חַל וַֽ/יַּעֲבֵ֖ר אֶת אֲשֶׁר ל/וֹ־־־׃
translation:
  text: He took them and brought them across the stream, and he brought across what
    belonged to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wadi' or 'the brook.' The Hebrew נחל can refer to a stream, ravine,
      or seasonal watercourse.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'what was to him,' that is, what belonged to him or his possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחֵם
  chosen: He took them
  alternatives:
  - He took them along
  - He took them up
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form commonly means 'take.'
    Here it introduces Jacob's action toward the persons just mentioned in the previous
    verse. 'He took them' is the most direct rendering; 'took along' is possible contextually
    but adds nuance not explicit in the verb itself.
- source_word: וַיַּעֲבִרֵם
  chosen: brought them across
  alternatives:
  - caused them to cross
  - took them over
  lexicon: HALOT
  rationale: 'The Hiphil of עבר is causative: Jacob causes them to cross. ''Brought
    them across'' is natural English and preserves the causative sense better than
    the flatter ''crossed with them.'''
- source_word: הַנָּחַל
  chosen: the stream
  alternatives:
  - the wadi
  - the brook
  - the torrent valley
  lexicon: HALOT
  rationale: נחל can denote a streambed or wadi, often seasonal. In this narrative
    setting, 'stream' is clear modern English and fits the immediate action of crossing.
    'Wadi' is more topographically precise but less accessible; 'brook' is traditional
    but can sound too small or quaint.
- source_word: וַיַּעֲבֵר
  chosen: he brought across
  alternatives:
  - he sent across
  - he caused to cross
  lexicon: HALOT
  rationale: Again the Hiphil of עבר is causative. The object is not a person but
    Jacob's possessions, so 'brought across' works idiomatically in English while
    retaining the causative force. 'Sent across' is possible, but the Hebrew does
    not require distance or delegation.
- source_word: אֲשֶׁר לוֹ
  chosen: what belonged to him
  alternatives:
  - what was his
  - all that he had
  - his possessions
  lexicon: HALOT
  rationale: The relative phrase literally means 'that which was to him/of him.' In
    context it refers to Jacob's belongings. 'What belonged to him' is slightly more
    formal than 'his possessions' and stays closer to the Hebrew construction without
    becoming awkward.
