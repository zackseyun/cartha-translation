theological_decisions:
- issue: Identity of אִישׁ in the wrestling scene
  chosen_reading: Render as 'a man' in the main text without specifying angelic or
    divine identity.
  alternative_readings:
  - an angel
  - God/the LORD appearing as a man
  rationale: The verse itself identifies the figure only as 'a man.' Later biblical
    interpretation (e.g., Hos 12:4) and the wider context inform theological interpretation,
    but this verse should preserve the immediate narrative presentation and not import
    a resolved identification into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
