id: GEN.32.25
reference: Genesis 32:25
source:
  edition: WLC
  text: וַ/יִּוָּתֵ֥ר יַעֲקֹ֖ב לְ/בַדּ֑/וֹ וַ/יֵּאָבֵ֥ק אִישׁ֙ עִמּ֔/וֹ עַ֖ד עֲל֥וֹת
    הַ/שָּֽׁחַר׃
translation:
  text: And Jacob was left alone, and a man wrestled with him until the breaking of
    dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until daybreak'; literally, 'until the rising of the dawn.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'a man'; later context and Hosea 12:4 contribute to the
      figure's fuller identification.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּוָּתֵר
  chosen: was left
  alternatives:
  - remained
  - was left behind
  lexicon: HALOT
  rationale: 'The Niphal wayyiqtol of יתר here is best rendered passively: Jacob ''was
    left'' alone after the others crossed. ''Remained'' is possible, but ''was left''
    better preserves the passive nuance of the Hebrew form.'
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  lexicon: HALOT
  rationale: The phrase means Jacob was by himself. 'Alone' is the most natural concise
    English equivalent and preserves the narrative emphasis on his isolation.
- source_word: וַיֵּאָבֵק
  chosen: wrestled
  alternatives:
  - struggled
  lexicon: HALOT
  rationale: The verb אבק in this rare stem/form refers specifically to grappling
    or wrestling. 'Wrestled' is the standard and most precise contextual rendering;
    'struggled' is too broad.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'a man.' In context the figure is mysterious
    and later identified more fully, but this verse presents him simply as a man.
    This preserves the narrative tension rather than resolving it prematurely.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the man wrestled with
    Jacob.
- source_word: עַד עֲלוֹת הַשָּׁחַר
  chosen: until the breaking of dawn
  alternatives:
  - until dawn came up
  - until the rising of the dawn
  - until daybreak
  lexicon: HALOT
  rationale: Literally 'until the rising of the dawn.' 'The breaking of dawn' is a
    natural English rendering that preserves the imagery of dawn's arrival without
    sounding wooden. 'Daybreak' is also possible, but the chosen wording retains more
    of the Hebrew's vividness.
