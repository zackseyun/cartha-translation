id: GEN.32.33
reference: Genesis 32:33
source:
  edition: WLC
  text: עַל כֵּ֡ן לֹֽא יֹאכְל֨וּ בְנֵֽי יִשְׂרָאֵ֜ל אֶת גִּ֣יד הַ/נָּשֶׁ֗ה אֲשֶׁר֙
    עַל כַּ֣ף הַ/יָּרֵ֔ךְ עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֤י נָגַע֙ בְּ/כַף יֶ֣רֶךְ יַעֲקֹ֔ב
    בְּ/גִ֖יד הַ/נָּשֶֽׁה־־־־־־׃
translation:
  text: Therefore, to this day the sons of Israel do not eat the sinew of the hip
    that is on the socket of the thigh, because he touched the socket of Jacob’s thigh
    at the sinew of the hip.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites”; Hebrew “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression traditionally refers to a specific sinew near the
      hip/thigh area; some identify it more specifically as the sciatic nerve or tendon.
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Idiomatic causal-consecutive expression introducing the explanation of
    an ongoing custom.
- source_word: לֹא יֹאכְלוּ
  chosen: do not eat
  alternatives:
  - do not customarily eat
  - do not consume
  lexicon: HALOT
  rationale: Simple imperfect with negation states customary present practice in narrative
    explanation; English present best conveys the ongoing custom.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Kept the more literal familial expression to match the Hebrew while remaining
    natural enough in English. 'Israelites' is possible but less transparent to the
    source wording.
- source_word: גִּיד
  chosen: sinew
  alternatives:
  - tendon
  - nerve
  lexicon: HALOT
  rationale: Traditional and anatomically broad enough for the Hebrew term, which
    refers to a cord-like tissue. 'Nerve' is common in some translations but is more
    interpretive.
- source_word: הַנָּשֶׁה
  chosen: of the hip
  alternatives:
  - that was dislocated
  - of the sciatic nerve
  lexicon: HALOT
  rationale: The exact sense is difficult and traditionally linked to the hip area;
    'of the hip' gives a clear, minimally interpretive rendering in context. More
    technical identifications are possible but less certain.
- source_word: אֲשֶׁר עַל כַּף הַיָּרֵךְ
  chosen: that is on the socket of the thigh
  alternatives:
  - which is on the hollow of the thigh
  - which is on the hip socket
  lexicon: HALOT
  rationale: כַּף here denotes the hollow/socket region, and יָרֵךְ refers to the
    thigh/hip area. 'Socket of the thigh' preserves the concrete anatomical reference
    without over-specifying.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic English for the Hebrew temporal expression marking
    the persistence of the custom.
- source_word: כִּי נָגַע
  chosen: because he touched
  alternatives:
  - because he struck
  - because he came into contact with
  lexicon: HALOT
  rationale: נגע commonly means 'touch'; although the touch had disabling force in
    context, the verb itself should not be overstated here.
- source_word: בְּכַף יֶרֶךְ יַעֲקֹב
  chosen: the socket of Jacob’s thigh
  alternatives:
  - the hollow of Jacob’s thigh
  - Jacob's hip socket
  lexicon: HALOT
  rationale: Maintains the same rendering for כַּף and יָרֵךְ as earlier in the verse
    for consistency.
- source_word: בְּגִיד הַנָּשֶׁה
  chosen: at the sinew of the hip
  alternatives:
  - at the sinew that was strained
  - at the sciatic sinew
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently. The preposition בְ here is taken
    locatively/in reference to the point of contact.
