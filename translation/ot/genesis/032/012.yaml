theological_decisions:
- issue: Rendering of the violent idiom אֵם עַל בָּנִים
  chosen_reading: the mother with the children
  alternative_readings:
  - mother and children
  - mother upon children
  rationale: This is not a doctrinally contested phrase but an interpretive one. The
    chosen rendering aims for clear modern English while preserving the Hebrew image
    of family destruction without importing a more specific claim than the text states.
revisions:
- timestamp: '2026-04-21T01:09:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/032/012.json
  category: awkward_english
  tier: 1
  from: the mother with the children
  to: mother with children
  rationale: The Hebrew phrase 'אֵם עַל בָּנִים' is anarthrous (lacks a definite article)
    and functions as an adverbial phrase describing the manner of the feared attack
    (i.e., total, indiscriminate slaughter). The draft's rendering, 'the mother with
    the children,' includes a definite article that makes the phrase sound like a
    specific group. Placed after 'strike me,' this creates a confusing apposition,
    as if Jacob ('me') is being identified as 'the mother with the children.' Removing
    the article to 'mother with children' allows the phrase to function more naturally
    in English as a proverbial category of violence, which better reflects the Hebrew
    idiom's grammatical function and avoids the confusing syntax.
