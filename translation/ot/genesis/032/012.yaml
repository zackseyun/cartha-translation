id: GEN.32.12
reference: Genesis 32:12
source:
  edition: WLC
  text: הַצִּילֵ֥/נִי נָ֛א מִ/יַּ֥ד אָחִ֖/י מִ/יַּ֣ד עֵשָׂ֑ו כִּֽי יָרֵ֤א אָנֹכִי֙
    אֹת֔/וֹ פֶּן יָב֣וֹא וְ/הִכַּ֔/נִי אֵ֖ם עַל בָּנִֽים־־־׃
translation:
  text: Please deliver me from the hand of my brother, from the hand of Esau, for
    I am afraid of him, lest he come and strike me, the mother with the children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mother and children'; Hebrew 'mother upon children,' an idiom for striking
      down a mother together with her children.
    reason: lexical_alternative
  - marker: b
    text: Or 'the mother with the children'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַצִּילֵנִי
  chosen: Please deliver me
  alternatives:
  - Rescue me
  - Save me
  lexicon: HALOT
  rationale: Hiphil imperative of נצל with 1cs suffix means to snatch away or deliver.
    'Deliver me' is a natural English equivalent in prayer language; 'please' reflects
    the following particle נָא rather than making the imperative harsh.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: Polite entreaty particle softening the imperative. 'Please' is idiomatic
    modern English and preserves the supplicatory tone better than archaic 'I pray'
    or temporal 'now'.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common biblical Hebrew for deliverance
    from someone's power. It is preserved here because it is transparent in English
    and carries the concrete force of the Hebrew.
- source_word: אָחִי
  chosen: my brother
  lexicon: HALOT
  rationale: Straightforward kinship term with 1cs suffix. Retained to preserve the
    emotional tension that the threat comes from a brother.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated per translation philosophy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits the prayer register and
    links naturally to the preceding petition.
- source_word: יָרֵא אָנֹכִי אֹתוֹ
  chosen: I am afraid of him
  alternatives:
  - I fear him
  lexicon: HALOT
  rationale: Predicate adjective/participle-like form with explicit pronoun conveys
    Jacob's present fear. 'I am afraid of him' is idiomatic modern English; 'I fear
    him' is possible but slightly stiffer.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - for fear that
  lexicon: HALOT
  rationale: Introduces feared possibility. 'Lest' is concise and still readable in
    modern English in Bible style; it preserves the nuance better than a looser paraphrase.
- source_word: יָבֹא
  chosen: he come
  alternatives:
  - he may come
  lexicon: HALOT
  rationale: Qal imperfect after פֶּן expresses the feared event. English subjunctive-like
    'he come' after 'lest' is idiomatic and compact.
- source_word: וְהִכַּנִי
  chosen: and strike me
  alternatives:
  - and attack me
  - and kill me
  lexicon: HALOT
  rationale: Hiphil of נכה often means strike/smite. Here the object is Jacob himself,
    and the following phrase specifies the scope of the attack. 'Strike me' is broad
    enough to preserve the Hebrew without over-interpreting as 'kill,' though violent
    attack is clearly implied.
- source_word: אֵם עַל בָּנִים
  chosen: the mother with the children
  alternatives:
  - mother upon children
  - mother and children
  lexicon: HALOT
  rationale: Hebrew idiom for indiscriminate slaughter of mother together with children.
    'The mother with the children' communicates the sense in natural English while
    preserving the singular 'mother' and the familial horror of the phrase.
