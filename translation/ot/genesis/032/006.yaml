theological_decisions:
- issue: Rendering of עֶבֶד / שִׁפְחָה in a household-property list
  chosen_reading: male servants and female servants
  alternative_readings:
  - male slaves and female slaves
  - servants and maidservants
  rationale: The doctrine guidance allows 'servant / slave' context-dependently. Here
    the verse lists Jacob's possessions and household members, where servile status
    is present but not theologically foregrounded. The translation preserves the gender
    distinction and avoids flattening the terms into generic laborers, while not forcing
    'slaves' where the bonded nature is not the main point of the utterance.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος by analogy; Translation
    philosophy §1 and §5'
