id: GEN.32.6
reference: Genesis 32:6
source:
  edition: WLC
  text: וַֽ/יְהִי לִ/י֙ שׁ֣וֹר וַ/חֲמ֔וֹר צֹ֖אן וְ/עֶ֣בֶד וְ/שִׁפְחָ֑ה וָֽ/אֶשְׁלְחָ/ה֙
    לְ/הַגִּ֣יד לַֽ/אדֹנִ֔/י לִ/מְצֹא חֵ֖ן בְּ/עֵינֶֽי/ךָ־־׃
translation:
  text: I have oxen and donkeys, flocks, male servants and female servants, and I
    have sent to tell my lord, so that I may find favor in your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'male slaves and female slaves.' The Hebrew terms can denote bonded
      household servants; here they are rendered 'male servants and female servants'
      for readable English in this inventory context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לִי
  chosen: I have
  alternatives:
  - there came to be for me
  - I came to have
  lexicon: HALOT
  rationale: The idiom with היה + ל expresses possession. In English, simple present
    'I have' best conveys Jacob's statement of current possessions without awkward
    literalism.
- source_word: שׁוֹר
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox/bovine animal. 'Oxen' fits the collective
    sense here better than 'bulls,' and is more specific than the broader 'cattle.'
- source_word: חֲמוֹר
  chosen: donkeys
  alternatives:
  - asses
  lexicon: HALOT
  rationale: Modern readable English favors 'donkeys' over the archaic or potentially
    distracting 'asses.' The plural is supplied naturally in English because the list
    describes categories of possessions.
- source_word: צֹאן
  chosen: flocks
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flocks' preserves the collective sense without over-specifying animals not named
    individually.
- source_word: עֶבֶד
  chosen: male servants
  alternatives:
  - servants
  - slaves
  - male slaves
  lexicon: HALOT
  rationale: In this inventory of household property, bonded labor is in view, but
    the immediate emphasis is on categories of household members rather than legal
    status. 'Male servants' paired with 'female servants' is readable and preserves
    the gender distinction explicit in the Hebrew.
- source_word: שִׁפְחָה
  chosen: female servants
  alternatives:
  - maidservants
  - female slaves
  - slave girls
  lexicon: HALOT
  rationale: The Hebrew explicitly marks female household servants. 'Female servants'
    is clear modern English and pairs naturally with 'male servants.'
- source_word: וָאֶשְׁלְחָה
  chosen: I have sent
  alternatives:
  - I sent
  - I am sending
  lexicon: HALOT
  rationale: 'The wayyiqtol in this message report can be rendered as an English present
    perfect to fit the discourse situation: Jacob explains the action just taken in
    sending messengers. This is smoother than a simple past in the quoted message.'
- source_word: לְהַגִּיד
  chosen: to tell
  alternatives:
  - to report
  - to inform
  lexicon: HALOT
  rationale: '''To tell'' is straightforward and natural in modern English, adequately
    conveying the infinitive of declaration.'
- source_word: לַאדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In context this is a deferential address to Esau, not a divine title.
    'My lord' preserves the social politeness and humility of Jacob's message.
- source_word: לִמְצֹא חֵן בְּעֵינֶיךָ
  chosen: so that I may find favor in your eyes
  alternatives:
  - to find favor in your sight
  - that I may gain your favor
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for receiving favorable regard. The chosen
    rendering keeps the metaphor 'in your eyes' while remaining understandable in
    English.
