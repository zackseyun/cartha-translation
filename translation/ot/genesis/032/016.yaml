id: GEN.32.16
reference: Genesis 32:16
source:
  edition: WLC
  text: גְּמַלִּ֧ים מֵינִיק֛וֹת וּ/בְנֵי/הֶ֖ם שְׁלֹשִׁ֑ים פָּר֤וֹת אַרְבָּעִים֙ וּ/פָרִ֣ים
    עֲשָׂרָ֔ה אֲתֹנֹ֣ת עֶשְׂרִ֔ים וַ/עְיָרִ֖ם עֲשָׂרָֽה׃
translation:
  text: thirty nursing camels and their young, forty cows and ten bulls, twenty female
    donkeys and ten male donkeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten donkey colts' or 'ten foals'; the Hebrew term can refer to a young
      donkey, but in this livestock list it likely denotes male donkeys paired with
      the female donkeys.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for camels.
- source_word: מֵינִיקוֹת
  chosen: nursing
  alternatives:
  - milking
  - suckling
  lexicon: HALOT
  rationale: The participial form denotes females giving suck, i.e., nursing their
    young. 'Nursing' is natural modern English and fits the following phrase 'and
    their young.'
- source_word: וּבְנֵיהֶם
  chosen: and their young
  alternatives:
  - and their sons
  - and their offspring
  lexicon: HALOT
  rationale: Though literally 'and their sons/children,' in animal context English
    idiom prefers 'their young' to indicate offspring.
- source_word: שְׁלֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly.
- source_word: פָּרוֹת
  chosen: cows
  alternatives:
  - female cattle
  - heifers
  lexicon: HALOT
  rationale: Refers to female cattle. 'Cows' is the most natural and sufficiently
    precise English rendering here.
- source_word: אַרְבָּעִים
  chosen: forty
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly.
- source_word: וּפָרִים
  chosen: and ten bulls
  alternatives:
  - and ten oxen
  lexicon: HALOT
  rationale: פָרִים are male cattle, especially bulls. 'Bulls' best matches the sex
    distinction in the list.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly.
- source_word: אֲתֹנוֹת
  chosen: female donkeys
  alternatives:
  - she-donkeys
  - donkeys
  lexicon: HALOT
  rationale: The Hebrew specifically marks female donkeys. 'Female donkeys' is clear
    modern English; 'she-donkeys' is possible but less natural.
- source_word: עֶשְׂרִים
  chosen: twenty
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly.
- source_word: וַעְיָרִם
  chosen: and ten male donkeys
  alternatives:
  - and ten foals
  - and ten colts
  - and ten donkeys
  lexicon: HALOT
  rationale: עַיִר can denote a male donkey, donkey colt, or young donkey depending
    on context. Since paired with female donkeys in a livestock inventory, 'male donkeys'
    best conveys the likely breeding pair distinction without implying unusual youth.
