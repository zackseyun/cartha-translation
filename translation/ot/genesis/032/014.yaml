id: GEN.32.14
reference: Genesis 32:14
source:
  edition: WLC
  text: וַ/יָּ֥לֶן שָׁ֖ם בַּ/לַּ֣יְלָה הַ/ה֑וּא וַ/יִּקַּ֞ח מִן הַ/בָּ֧א בְ/יָד֛/וֹ
    מִנְחָ֖ה לְ/עֵשָׂ֥ו אָחִֽי/ו־׃
translation:
  text: 'So he spent that night there, and from what came into his hand he took a
    gift for Esau his brother:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'from what he had with him' or 'from what was at
      hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּלֶן
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: The verb לון in the wayyiqtol form denotes staying or lodging for the
    night. 'Spent the night' is natural modern English and preserves the temporal
    sense without archaic tone.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the direct equivalent.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - during that night
  - on that night
  lexicon: HALOT
  rationale: The phrase literally means 'in that night.' English idiom prefers 'that
    night,' which preserves the temporal reference smoothly.
- source_word: וַיִּקַּח
  chosen: he took
  alternatives:
  - he selected
  lexicon: HALOT
  rationale: לקח normally means 'take.' Here it introduces Jacob's action of setting
    aside items for Esau. 'Took' is sufficiently broad and faithful.
- source_word: מִן הַבָּא בְיָדוֹ
  chosen: from what came into his hand
  alternatives:
  - from what he had with him
  - from what was at hand
  lexicon: HALOT
  rationale: Literally, 'from the coming into his hand.' The idiom refers to what
    was available to him or in his possession at the time. The chosen rendering stays
    close to the Hebrew while remaining intelligible. A smoother idiomatic alternative
    is preserved in a footnote.
- source_word: מִנְחָה
  chosen: a gift
  alternatives:
  - an offering
  - a tribute
  - a present
  lexicon: HALOT
  rationale: In this interpersonal context, מִנְחָה refers to a present sent to appease
    or honor another person, not primarily a cultic offering. 'Gift' is clear and
    contextually appropriate; 'tribute' is possible but may overstate political subordination
    here.
- source_word: לְעֵשָׂו אָחִיו
  chosen: for Esau his brother
  alternatives:
  - for his brother Esau
  - to Esau his brother
  lexicon: HALOT
  rationale: The lamed marks the recipient. 'For Esau his brother' preserves the Hebrew
    order reasonably well and keeps the familial identification explicit.
