id: GEN.32.9
reference: Genesis 32:9
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אִם יָב֥וֹא עֵשָׂ֛ו אֶל הַ/מַּחֲנֶ֥ה הָ/אַחַ֖ת וְ/הִכָּ֑/הוּ וְ/הָיָ֛ה
    הַ/מַּחֲנֶ֥ה הַ/נִּשְׁאָ֖ר לִ/פְלֵיטָֽה־־׃
translation:
  text: He said, “If Esau comes to the one camp and strikes it, then the camp that
    remains will escape.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the remaining camp will be for escape,” that is, it will survive or
      escape destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - Then he said
  - And he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר. English often omits the conjunction
    in smooth narrative while retaining past tense.
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best preserves the contingency
    of Jacob's reasoning.
- source_word: יָבֹא
  chosen: comes
  alternatives:
  - should come
  - attacks
  lexicon: HALOT
  rationale: Basic sense of בוא is 'come/enter.' The hostile action is expressed by
    the following verb, so 'comes' should not be overloaded into 'attacks.'
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated per translation philosophy.
- source_word: אֶל־הַמַּחֲנֶה הָאַחַת
  chosen: to the one camp
  alternatives:
  - against the one camp
  - to one camp
  lexicon: HALOT
  rationale: מַחֲנֶה is 'camp.' The article plus numeral gives 'the one camp,' referring
    to one of the two camps Jacob had just formed. 'To' reflects אֶל straightforwardly;
    hostility is supplied by the next verb.
- source_word: וְהִכָּהוּ
  chosen: and strikes it
  alternatives:
  - and attacks it
  - and strikes him
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite.' The 3ms suffix most naturally refers
    back to the camp as a collective entity, hence 'it.' 'Attacks' is possible but
    less formally tied to the lexical sense.
- source_word: וְהָיָה
  chosen: then ... will
  alternatives:
  - and it will be
  - so it will be
  lexicon: HALOT
  rationale: Here היה links result to condition. In idiomatic English the consequential
    sense is best conveyed with 'then ... will' rather than a wooden 'and it will
    be.'
- source_word: הַמַּחֲנֶה הַנִּשְׁאָר
  chosen: the camp that remains
  alternatives:
  - the remaining camp
  - the camp left behind
  lexicon: HALOT
  rationale: נשאר denotes what is left or remains. Relative-clause wording is clear
    and natural while preserving the passive/resultative sense.
- source_word: לִפְלֵיטָה
  chosen: will escape
  alternatives:
  - for escape
  - as survivors
  - for deliverance
  lexicon: HALOT
  rationale: The noun פְלֵיטָה denotes escape/survival. English verbalizes the idiom
    naturally as 'will escape,' expressing the result that the remaining camp survives.
