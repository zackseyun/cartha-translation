theological_decisions:
- issue: Meaning of Jacob's action toward Pharaoh
  chosen_reading: Jacob actually blessed Pharaoh
  alternative_readings:
  - Jacob merely greeted Pharaoh courteously
  rationale: The verb ברך is best taken in its ordinary sense 'bless.' The text presents
    the patriarch as pronouncing blessing even over a great king, which should not
    be flattened into a generic greeting without lexical necessity.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
