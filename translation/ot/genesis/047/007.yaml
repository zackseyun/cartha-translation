id: GEN.47.7
reference: Genesis 47:7
source:
  edition: WLC
  text: וַ/יָּבֵ֤א יוֹסֵף֙ אֶת יַֽעֲקֹ֣ב אָבִ֔י/ו וַ/יַּֽעֲמִדֵ֖/הוּ לִ/פְנֵ֣י פַרְעֹ֑ה
    וַ/יְבָ֥רֶךְ יַעֲקֹ֖ב אֶת פַּרְעֹֽה־־׃
translation:
  text: Then Joseph brought in Jacob his father and presented him before Pharaoh,
    and Jacob blessed Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caused him to stand before Pharaoh.'
    reason: lexical_alternative
  - marker: b
    text: '''Blessed'' may include a formal spoken blessing, not merely a polite greeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: brought in
  alternatives:
  - brought
  - led in
  lexicon: HALOT
  rationale: 'From בוא in the Hiphil, the sense is causative: Joseph caused Jacob
    to come into Pharaoh''s presence. ''Brought in'' captures both the causative force
    and the court-setting more naturally than simply ''brought''.'
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his own father
  lexicon: HALOT
  rationale: Straightforward filial designation with 3ms suffix referring to Joseph.
    'His father' is the natural English rendering.
- source_word: וַיַּעֲמִדֵהוּ לִפְנֵי
  chosen: presented him before
  alternatives:
  - stood him before
  - set him before
  - caused him to stand before
  lexicon: HALOT
  rationale: The Hiphil of עמד is literally 'caused him to stand,' but in this audience
    context idiomatic English is 'presented him before.' This preserves the formal
    courtly sense without wooden phrasing.
- source_word: לִפְנֵי פַרְעֹה
  chosen: before Pharaoh
  alternatives:
  - in the presence of Pharaoh
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' or 'in the presence of.' 'Before Pharaoh'
    is concise and natural.
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - greeted with blessing
  lexicon: HALOT
  rationale: ברך normally means 'bless.' In this context Jacob, though socially inferior,
    pronounces a blessing on Pharaoh. The plain lexical sense should be retained rather
    than weakened to a mere greeting.
- source_word: פַרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard transliteration of the royal title/name in English Bible usage.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: Hebrew grammar
  rationale: The prefixed waw on consecutive verbs advances the narrative. 'Then'
    gives readable modern English while preserving sequential movement; repeated 'and'
    would be more formal but less natural in English narrative.
