id: GEN.47.14
reference: Genesis 47:14
source:
  edition: WLC
  text: וַ/יְלַקֵּ֣ט יוֹסֵ֗ף אֶת כָּל הַ/כֶּ֨סֶף֙ הַ/נִּמְצָ֤א בְ/אֶֽרֶץ מִצְרַ֨יִם֙
    וּ/בְ/אֶ֣רֶץ כְּנַ֔עַן בַּ/שֶּׁ֖בֶר אֲשֶׁר הֵ֣ם שֹׁבְרִ֑ים וַ/יָּבֵ֥א יוֹסֵ֛ף
    אֶת הַ/כֶּ֖סֶף בֵּ֥יתָ/ה פַרְעֹֽה־־־־־׃
translation:
  text: And Joseph gathered up all the silver found in the land of Egypt and in the
    land of Canaan, for the grain that they were buying, and Joseph brought the silver
    into Pharaoh’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the money.' The Hebrew literally says 'all the silver,' using the
      metal as the medium of payment.
    reason: lexical_alternative
  - marker: b
    text: '''Pharaoh’s house'' may refer not only to the royal residence but more
      broadly to Pharaoh’s household or treasury.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְלַקֵּט
  chosen: gathered up
  alternatives:
  - collected
  - gathered
  lexicon: HALOT
  rationale: The verb לקט commonly means to gather or collect. 'Gathered up' preserves
    the sense of accumulating money from many transactions and fits the narrative
    context better than a flatter 'took'.
- source_word: כָּל הַכֶּסֶף
  chosen: all the silver
  alternatives:
  - all the money
  lexicon: HALOT
  rationale: כֶּסֶף literally denotes 'silver' and by extension money. Since the Hebrew
    explicitly says 'silver,' the main text keeps the more concrete term while allowing
    readers to infer monetary function from context.
- source_word: הַנִּמְצָא
  chosen: found
  alternatives:
  - that was found
  - available
  lexicon: HALOT
  rationale: The participle from מצא is most naturally 'found' or 'present.' 'Found'
    is concise and preserves the passive/resultative sense of money present within
    those lands.
- source_word: בְאֶרֶץ מִצְרַיִם וּבְאֶרֶץ כְּנַעַן
  chosen: in the land of Egypt and in the land of Canaan
  alternatives:
  - throughout Egypt and Canaan
  lexicon: HALOT
  rationale: Retaining 'the land of' reflects the Hebrew phrasing and keeps the geographic
    emphasis without unnecessary paraphrase.
- source_word: בַּשֶּׁבֶר
  chosen: for the grain
  alternatives:
  - for the food
  - for the grain supply
  - in exchange for grain
  lexicon: HALOT
  rationale: שֶׁבֶר in the Joseph narrative refers to grain purchased during famine.
    'For the grain' captures the transactional sense introduced by ב and matches the
    immediate context.
- source_word: אֲשֶׁר הֵם שֹׁבְרִים
  chosen: that they were buying
  alternatives:
  - which they were purchasing
  - that they bought
  lexicon: HALOT
  rationale: The idiom שבר in this context means to buy grain. The participial form
    suggests ongoing action, so 'were buying' reflects the durative sense better than
    a simple past.
- source_word: וַיָּבֵא ... בֵּיתָה פַרְעֹה
  chosen: brought the silver into Pharaoh’s house
  alternatives:
  - brought the silver to Pharaoh’s house
  - brought the money into Pharaoh’s palace
  lexicon: HALOT
  rationale: בֵּיתָה with directional ending indicates movement into the house. 'Pharaoh’s
    house' is a literal rendering that can denote the royal household/treasury; 'into'
    preserves the directional nuance.
