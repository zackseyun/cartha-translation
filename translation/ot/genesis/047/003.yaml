id: GEN.47.3
reference: Genesis 47:3
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר פַּרְעֹ֛ה אֶל אֶחָ֖י/ו מַה מַּעֲשֵׂי/כֶ֑ם וַ/יֹּאמְר֣וּ אֶל פַּרְעֹ֗ה
    רֹעֵ֥ה צֹאן֙ עֲבָדֶ֔י/ךָ גַּם אֲנַ֖חְנוּ גַּם אֲבוֹתֵֽי/נוּ־־־־־׃
translation:
  text: And Pharaoh said to his brothers, “What is your occupation?” And they said
    to Pharaoh, “Your servants are shepherds of flocks, both we and our fathers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What is your work?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “shepherds of flocks”; that is, men who tend sheep and goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה מַּעֲשֵׂיכֶם
  chosen: What is your occupation?
  alternatives:
  - What is your work?
  - What do you do?
  lexicon: HALOT
  rationale: מַעֲשֶׂה literally relates to work/deed/activity. In this court setting,
    Pharaoh is asking about their line of work or trade. 'Occupation' is natural modern
    English and preserves the vocational sense without over-paraphrase.
- source_word: רֹעֵה צֹאן
  chosen: shepherds of flocks
  alternatives:
  - keepers of livestock
  - shepherds
  lexicon: HALOT
  rationale: The participial construction with צֹאן identifies their profession as
    tending small livestock, especially sheep/goats. 'Shepherds of flocks' is slightly
    more explicit than simply 'shepherds' and reflects both words in the Hebrew.
- source_word: עֲבָדֶיךָ
  chosen: Your servants
  alternatives:
  - your servants/slaves
  lexicon: HALOT
  rationale: In direct address to Pharaoh, עבד commonly functions as a deferential
    self-designation meaning 'servant.' Although the Hebrew term can denote slave/servant
    broadly, the bonded sense is not foregrounded here; the courtly politeness formula
    is. Therefore 'Your servants' best fits the context.
- source_word: גַּם אֲנַחְנוּ גַּם אֲבוֹתֵינוּ
  chosen: both we and our fathers
  alternatives:
  - we also, as also our fathers
  - we as well as our fathers
  lexicon: HALOT
  rationale: The repeated גַּם emphasizes continuity across generations. 'Both we
    and our fathers' is concise, idiomatic, and preserves the parallel emphasis.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers [i.e., Joseph's brothers]
  lexicon: HALOT
  rationale: The pronominal suffix refers contextually to Joseph. English can preserve
    the Hebrew wording 'his brothers' without inserting Joseph's name into the main
    text.
