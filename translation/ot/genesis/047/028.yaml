id: GEN.47.28
reference: Genesis 47:28
source:
  edition: WLC
  text: וַ/יְחִ֤י יַעֲקֹב֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם שְׁבַ֥ע עֶשְׂרֵ֖ה שָׁנָ֑ה וַ/יְהִ֤י
    יְמֵֽי יַעֲקֹב֙ שְׁנֵ֣י חַיָּ֔י/ו שֶׁ֣בַע שָׁנִ֔ים וְ/אַרְבָּעִ֥ים וּ/מְאַ֖ת שָׁנָֽה־׃
translation:
  text: Jacob lived in the land of Egypt seventeen years, and the days of Jacob—the
    years of his life—were one hundred forty-seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the days of Jacob, the years of his life,'' a Hebrew idiom for
      his lifespan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - dwelt
  - survived
  lexicon: HALOT
  rationale: From חיה in the wayyiqtol, the straightforward narrative sense is that
    Jacob continued to live for this span of time. 'Lived' is idiomatic and fits the
    temporal expression that follows.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ ('land') rather than reducing to simply 'in Egypt,' since
    the Hebrew explicitly includes it and it is natural English.
- source_word: שְׁבַע עֶשְׂרֵה שָׁנָה
  chosen: seventeen years
  lexicon: HALOT
  rationale: Standard English rendering of the numeral plus year expression.
- source_word: וַיְהִי
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: In this summarizing clause, English idiom prefers 'were' for the total
    lifespan statement.
- source_word: יְמֵי יַעֲקֹב
  chosen: the days of Jacob
  alternatives:
  - Jacob's days
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom 'the days of X' rather than flattening it
    immediately to 'Jacob's life,' while remaining clear in English.
- source_word: שְׁנֵי חַיָּיו
  chosen: the years of his life
  alternatives:
  - the years of his lives
  - his lifetime
  lexicon: HALOT
  rationale: This appositional phrase clarifies the idiom 'the days of Jacob.' 'The
    years of his life' is the natural English equivalent; 'his lifetime' would be
    smoother but less formally transparent.
- source_word: שֶׁבַע שָׁנִים וְאַרְבָּעִים וּמְאַת שָׁנָה
  chosen: one hundred forty-seven years
  alternatives:
  - a hundred and forty-seven years
  lexicon: HALOT
  rationale: English normally reorders the Hebrew number sequence into descending
    order. 'One hundred forty-seven years' is clear modern English and preserves the
    total exactly.
