id: GEN.47.5
reference: Genesis 47:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר פַּרְעֹ֔ה אֶל יוֹסֵ֖ף לֵ/אמֹ֑ר אָבִ֥י/ךָ וְ/אַחֶ֖י/ךָ בָּ֥אוּ
    אֵלֶֽי/ךָ־׃
translation:
  text: Then Pharaoh said to Joseph, “Your father and your brothers have come to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “And Pharaoh said to Joseph, saying, ‘Your father and
      your brothers came to you.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'Then ... said' gives
    natural modern English while preserving sequential force; 'and ... said' is more
    formally possible but less idiomatic here.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name used for the
    Egyptian king.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech; 'to' is the natural modern
    equivalent.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name יוֹסֵף.
- source_word: לֵאמֹר
  chosen: omitted in English as a speech introducer
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew often uses לֵאמֹר after a speech verb to introduce direct discourse.
    In natural English this is usually redundant after 'said' and is best left implicit.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct second-person possessive addressed to Joseph; straightforward
    rendering.
- source_word: וְאַחֶיךָ
  chosen: and your brothers
  alternatives:
  - and your brothers/family
  lexicon: HALOT
  rationale: The noun means 'brothers.' Per gender-accurate philosophy, the masculine
    familial term is retained rather than generalized to 'family.'
- source_word: בָּאוּ
  chosen: have come
  alternatives:
  - came
  lexicon: HALOT
  rationale: The perfect verb reports a completed action with present relevance in
    the dialogue. 'Have come' fits the immediate context slightly better than simple
    past 'came,' though both are possible.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - to you here
  lexicon: HALOT
  rationale: The preposition with second-person suffix indicates movement toward Joseph.
    'To you' is the plain sense; adding 'here' would overtranslate.
