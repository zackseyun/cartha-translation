id: GEN.47.10
reference: Genesis 47:10
source:
  edition: WLC
  text: וַ/יְבָ֥רֶךְ יַעֲקֹ֖ב אֶת פַּרְעֹ֑ה וַ/יֵּצֵ֖א מִ/לִּ/פְנֵ֥י פַרְעֹֽה־׃
translation:
  text: Then Jacob blessed Pharaoh and went out from Pharaoh’s presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greeted Pharaoh' / 'took leave of Pharaoh'; the Hebrew verb commonly
      means 'blessed,' but in royal-audience contexts it can overlap with formal salutation
      or farewell.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - took leave of
  - greeted
  lexicon: HALOT, BDB
  rationale: The verb ברך normally means 'to bless.' In this court setting some interpreters
    understand it as a formal greeting or farewell, but the plain lexical sense 'blessed'
    is preferable and matches both occurrences in the immediate context (vv. 7, 10).
    The alternatives are worth preserving because in audience-with-a-king contexts
    the act may overlap with courteous salutation.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Standard English transliteration of the personal name יעקב.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is not
    represented in the translation.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English form for the royal title/name פרעה.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: HALOT, BDB
  rationale: יצא commonly means 'go out' or 'come out.' 'Went out' preserves the concrete
    movement from the royal audience, while remaining natural in English.
- source_word: מִלִּפְנֵי
  chosen: from Pharaoh’s presence
  alternatives:
  - from before Pharaoh
  - from the presence of Pharaoh
  lexicon: HALOT, BDB
  rationale: The idiom מלפני literally means 'from before' someone, but in English
    'from Pharaoh’s presence' best conveys departure from an audience before the king
    without sounding wooden. A more formal rendering is preserved as an alternative.
