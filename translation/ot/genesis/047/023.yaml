id: GEN.47.23
reference: Genesis 47:23
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹסֵף֙ אֶל הָ/עָ֔ם הֵן֩ קָנִ֨יתִי אֶתְ/כֶ֥ם הַ/יּ֛וֹם וְ/אֶת
    אַדְמַתְ/כֶ֖ם לְ/פַרְעֹ֑ה הֵֽא לָ/כֶ֣ם זֶ֔רַע וּ/זְרַעְתֶּ֖ם אֶת הָ/אֲדָמָֽה־־־־׃
translation:
  text: Then Joseph said to the people, “Look, today I have acquired you and your
    land for Pharaoh. Here is seed for you; sow the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have bought you and your land for Pharaoh.” The Hebrew verb can denote
      buying/purchasing as well as acquiring more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם here refers to the Egyptian populace addressed collectively, best
    rendered by the common English 'the people.'
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: The particle introduces an emphatic announcement. 'Look' preserves the
    deictic force in readable modern English better than archaic 'Behold.'
- source_word: קָנִיתִי
  chosen: I have acquired
  alternatives:
  - I have bought
  - I have purchased
  lexicon: HALOT
  rationale: קנה commonly means acquire/buy. 'Acquired' fits the legal-economic context
    and avoids implying a simple market purchase detached from the famine arrangement,
    while still conveying ownership transfer.
- source_word: אֶתְכֶם
  chosen: you
  alternatives:
  - your persons
  lexicon: HALOT
  rationale: Direct object pronoun refers to the people themselves entering Pharaoh's
    service. Plain 'you' is idiomatic and sufficient.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb marking the present transaction; 'today' is natural modern
    English.
- source_word: אַדְמַתְכֶם
  chosen: your land
  alternatives:
  - your ground
  - your farmland
  lexicon: HALOT
  rationale: אדמה is land/ground/soil. In this administrative context it refers to
    their agricultural landholdings; 'your land' is the clearest idiomatic rendering.
- source_word: לְפַרְעֹה
  chosen: for Pharaoh
  alternatives:
  - to Pharaoh
  - belonging to Pharaoh
  lexicon: HALOT
  rationale: The lamed marks transfer/possession in the transaction. 'For Pharaoh'
    is concise and idiomatic in English, indicating acquisition on Pharaoh's behalf.
- source_word: הֵא
  chosen: Here is
  alternatives:
  - Behold
  - See, here is
  lexicon: HALOT
  rationale: Deictic particle presenting what Joseph provides. 'Here is' captures
    the immediate demonstrative sense in natural English.
- source_word: זֶרַע
  chosen: seed
  alternatives:
  - grain for sowing
  - seed grain
  lexicon: HALOT
  rationale: The noun denotes seed for planting. 'Seed' is the direct rendering; the
    agricultural function is clarified by the following verb 'sow.'
- source_word: וּזְרַעְתֶּם
  chosen: sow
  alternatives:
  - and you shall sow
  - plant
  lexicon: HALOT
  rationale: The perfect with prefixed waw in direct speech functions imperativally/injunctively
    in context. English imperative 'sow' best reflects Joseph's instruction following
    his provision of seed.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the soil
  lexicon: HALOT
  rationale: Same root as earlier אדמה; here it refers to the arable ground to be
    cultivated. 'The land' keeps consistency with the earlier phrase and reads naturally.
