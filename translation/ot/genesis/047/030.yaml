id: GEN.47.30
reference: Genesis 47:30
source:
  edition: WLC
  text: וְ/שָֽׁכַבְתִּי֙ עִם אֲבֹתַ֔/י וּ/נְשָׂאתַ֨/נִי֙ מִ/מִּצְרַ֔יִם וּ/קְבַרְתַּ֖/נִי
    בִּ/קְבֻרָתָ֑/ם וַ/יֹּאמַ֕ר אָנֹכִ֖י אֶֽעֱשֶׂ֥ה כִ/דְבָרֶֽ/ךָ־׃
translation:
  text: When I lie down with my fathers, carry me out of Egypt and bury me in their
    burial place.” And he said, “I will do as you have said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and I lie down with my fathers'; the Hebrew expression
      is a customary idiom associated with death and burial.
    reason: lexical_alternative
  - marker: b
    text: Or 'with my ancestors.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in their grave' or 'in their tomb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁכַבְתִּי
  chosen: When I lie down
  alternatives:
  - and I lie down
  - when I rest
  lexicon: HALOT
  rationale: שׁכב literally means 'lie down' and in burial contexts is an idiom for
    death. Rendering it as 'lie down' preserves the Hebrew imagery without over-interpreting
    it as 'die.' The prefixed conjunction is taken with temporal force in English
    ('when') to produce natural sense in Jacob's request.
- source_word: עִם אֲבֹתַי
  chosen: with my fathers
  alternatives:
  - with my ancestors
  lexicon: HALOT
  rationale: אָבוֹת with first-person suffix refers to forefathers/ancestors. 'Fathers'
    preserves the familial and idiomatic force of the Hebrew expression, especially
    in the burial/death formula.
- source_word: וּנְשָׂאתַנִי
  chosen: carry me
  alternatives:
  - take me
  - lift me
  lexicon: HALOT
  rationale: נשא in this context means to carry or transport a body. 'Carry me' fits
    the funerary setting more precisely than the broader 'take me.'
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The preposition מן can be rendered 'from,' but 'out of Egypt' better
    conveys removal from the land, matching the movement implied by the request.
- source_word: וּקְבַרְתַּנִי
  chosen: bury me
  lexicon: HALOT
  rationale: קבר straightforwardly means 'bury.' No expansion is needed.
- source_word: בִּקְבֻרָתָם
  chosen: in their burial place
  alternatives:
  - in their grave
  - in their tomb
  lexicon: HALOT
  rationale: The noun denotes a burial site/place of burial. 'Burial place' is broad
    enough to fit the patriarchal family tomb without specifying a form not explicit
    in the Hebrew. 'Their grave' could sound singular and less natural in English;
    'tomb' is possible but slightly more interpretive.
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Joseph's response. 'And he said'
    preserves the simple narrative flow.
- source_word: אָנֹכִי אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I myself will do
  - I shall do
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English can convey the sense
    adequately with 'I will do' in this context. A stronger emphatic rendering is
    possible but not necessary.
- source_word: כִדְבָרֶךָ
  chosen: as you have said
  alternatives:
  - according to your word
  - as you say
  lexicon: HALOT
  rationale: Literally 'according to your word.' 'As you have said' is idiomatic modern
    English that preserves the sense of compliance with Jacob's request.
