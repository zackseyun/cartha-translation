id: GEN.47.15
reference: Genesis 47:15
source:
  edition: WLC
  text: וַ/יִּתֹּ֣ם הַ/כֶּ֗סֶף מֵ/אֶ֣רֶץ מִצְרַיִם֮ וּ/מֵ/אֶ֣רֶץ כְּנַעַן֒ וַ/יָּבֹאוּ֩
    כָל מִצְרַ֨יִם אֶל יוֹסֵ֤ף לֵ/אמֹר֙ הָֽבָ/ה לָּ֣/נוּ לֶ֔חֶם וְ/לָ֥/מָּה נָמ֖וּת
    נֶגְדֶּ֑/ךָ כִּ֥י אָפֵ֖ס כָּֽסֶף־־־׃
translation:
  text: When the money from the land of Egypt and from the land of Canaan was gone,
    all the Egyptians came to Joseph, saying, "Give us bread. Why should we die before
    your eyes? For the money is gone."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the silver was gone"; Hebrew כֶּסֶף can mean either "silver" or "money."
    reason: lexical_alternative
  - marker: b
    text: Literally, "all Egypt came to Joseph."
    reason: lexical_alternative
  - marker: c
    text: '"Bread" here may stand more broadly for food in the famine context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֹּם
  chosen: was gone
  alternatives:
  - came to an end
  - was exhausted
  - ran out
  lexicon: HALOT
  rationale: The verb תמם in this form indicates completion/exhaustion. 'Was gone'
    is natural modern English and matches the sense that the supply of money had been
    used up.
- source_word: הַכֶּסֶף
  chosen: the money
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: כֶּסֶף can mean 'silver' or 'money.' In this famine-trade context it
    refers to currency/means of payment rather than the metal as such, so 'money'
    best conveys the sense.
- source_word: מֵאֶרֶץ מִצְרַיִם וּמֵאֶרֶץ כְּנַעַן
  chosen: from the land of Egypt and from the land of Canaan
  alternatives:
  - in the land of Egypt and in the land of Canaan
  lexicon: HALOT
  rationale: The preposition מן with 'land' is most straightforwardly rendered 'from
    the land of.' This reflects money being depleted out of those lands, while remaining
    idiomatic in English.
- source_word: וַיָּבֹאוּ כָל מִצְרַיִם
  chosen: all the Egyptians came
  alternatives:
  - all Egypt came
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'all Egypt,' the referent is the people
    of Egypt. Rendering it as 'all the Egyptians' communicates the collective sense
    clearly in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the infinitive construct introducing direct speech;
    'saying' preserves the Hebrew discourse flow.
- source_word: הָבָה לָּנוּ לֶחֶם
  chosen: Give us bread
  alternatives:
  - Provide us food
  - Give us food
  lexicon: HALOT
  rationale: The imperative-like הָבָה plus indirect object means 'give/provide to
    us.' לֶחֶם literally means 'bread' but can broadly denote food. Here 'bread' preserves
    the concrete Hebrew wording while still fitting the famine context.
- source_word: וְלָמָּה נָמוּת
  chosen: Why should we die
  alternatives:
  - Why would we die
  - Why must we die
  lexicon: HALOT
  rationale: This expresses an urgent rhetorical question. 'Why should we die' is
    idiomatic and preserves the appeal.
- source_word: נֶגְדֶּךָ
  chosen: before your eyes
  alternatives:
  - in your presence
  - before you
  lexicon: HALOT
  rationale: נֶגֶד commonly denotes being in front of or before someone. 'Before your
    eyes' captures the vividness of dying in Joseph's sight and is a common English
    equivalent.
- source_word: כִּי אָפֵס כָּסֶף
  chosen: For the money is gone
  alternatives:
  - for there is no money left
  - for the silver has run out
  lexicon: HALOT
  rationale: אָפֵס conveys cessation/nonexistence in context. 'The money is gone'
    is concise, natural, and echoes the opening statement, reinforcing the narrative
    logic.
