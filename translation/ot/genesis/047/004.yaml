id: GEN.47.4
reference: Genesis 47:4
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֶל פַּרְעֹ֗ה לָ/ג֣וּר בָּ/אָרֶץ֮ בָּאנוּ֒ כִּי אֵ֣ין מִרְעֶ֗ה
    לַ/צֹּאן֙ אֲשֶׁ֣ר לַ/עֲבָדֶ֔י/ךָ כִּֽי כָבֵ֥ד הָ/רָעָ֖ב בְּ/אֶ֣רֶץ כְּנָ֑עַן וְ/עַתָּ֛ה
    יֵֽשְׁבוּ נָ֥א עֲבָדֶ֖י/ךָ בְּ/אֶ֥רֶץ גֹּֽשֶׁן־־־־׃
translation:
  text: They said to Pharaoh, “We have come to sojourn in the land, because there
    is no pasture for the flock that belongs to your servants, for the famine is severe
    in the land of Canaan. And now, please let your servants dwell in the land of
    Goshen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to live as temporary residents in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָגוּר
  chosen: to sojourn
  alternatives:
  - to reside temporarily
  - to live as foreigners
  lexicon: HALOT
  rationale: גור commonly denotes residing as a foreigner or temporary resident rather
    than permanent settlement. 'Sojourn' preserves that nuance more precisely than
    simply 'live' or 'settle'.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory of Egypt in a broad geographic sense.
    'Land' is the standard and sufficiently natural rendering in Genesis.
- source_word: מִרְעֶה
  chosen: pasture
  alternatives:
  - grazing land
  - fodder
  lexicon: HALOT
  rationale: The noun denotes grazing place or pastureland for animals. 'Pasture'
    is concise and natural in English while preserving the agricultural sense.
- source_word: לַצֹּאן
  chosen: for the flock
  alternatives:
  - for the sheep/flocks
  lexicon: HALOT
  rationale: צֹאן can refer collectively to small livestock, especially sheep and
    goats. 'Flock' captures the collective sense without over-specifying species.
- source_word: אֲשֶׁר לַעֲבָדֶיךָ
  chosen: that belongs to your servants
  alternatives:
  - which is your servants'
  - of your servants
  lexicon: HALOT
  rationale: The phrase marks possession. 'That belongs to your servants' is idiomatic
    modern English and preserves the deferential self-reference to Pharaoh.
- source_word: כָבֵד הָרָעָב
  chosen: the famine is severe
  alternatives:
  - the famine is heavy
  - the famine is grievous
  lexicon: HALOT
  rationale: כָבֵד literally means 'heavy,' but with famine it idiomatically conveys
    severity or intensity. 'Severe' communicates the sense clearly in modern English.
- source_word: יֵשְׁבוּ נָא
  chosen: please let your servants dwell
  alternatives:
  - please let your servants settle
  - please let your servants live
  lexicon: HALOT
  rationale: The jussive/request form with נָא expresses a polite petition. English
    conveys this most naturally by supplying 'let' with 'please.' 'Dwell' fits ישב
    as residing in a place without overstating permanence.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in this courtly self-designation
    before Pharaoh the deferential sense is foregrounded rather than bonded-status
    emphasis. 'Your servants' is the most contextually appropriate rendering.
- source_word: אֶרֶץ גֹּשֶׁן
  chosen: the land of Goshen
  alternatives:
  - Goshen
  lexicon: HALOT
  rationale: Retaining 'land of Goshen' reflects the Hebrew construct and keeps the
    geographic designation explicit.
