id: GEN.47.22
reference: Genesis 47:22
source:
  edition: WLC
  text: רַ֛ק אַדְמַ֥ת הַ/כֹּהֲנִ֖ים לֹ֣א קָנָ֑ה כִּי֩ חֹ֨ק לַ/כֹּהֲנִ֜ים מֵ/אֵ֣ת פַּרְעֹ֗ה
    וְ/אָֽכְל֤וּ אֶת חֻקָּ/ם֙ אֲשֶׁ֨ר נָתַ֤ן לָ/הֶם֙ פַּרְעֹ֔ה עַל כֵּ֕ן לֹ֥א מָכְר֖וּ
    אֶת אַדְמָתָֽ/ם־־־׃
translation:
  text: Only the land of the priests he did not buy, because the priests had an allotment
    from Pharaoh, and they ate their allotment that Pharaoh gave them. Therefore they
    did not sell their land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fixed allowance,' 'portion,' or 'ration' from Pharaoh. The Hebrew
      חֹק / חֻקָּם here refers to an assigned provision rather than primarily to a
      legal statute.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Except
  - Only/alone
  lexicon: HALOT
  rationale: Marks an exception to the preceding summary; 'Only' is natural modern
    English and preserves the restrictive force.
- source_word: אַדְמַת הַכֹּהֲנִים
  chosen: the land of the priests
  alternatives:
  - the priests' land
  lexicon: HALOT
  rationale: Construct phrase referring to landed property belonging to the priests.
    'The land of the priests' is slightly more formal and clear in context.
- source_word: קָנָה
  chosen: buy
  alternatives:
  - acquire
  - purchase
  lexicon: HALOT
  rationale: In the famine/economic context Joseph is purchasing land from the Egyptians;
    'buy' is the plain and idiomatic English equivalent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason the priests' land was not bought. 'Because' is
    clearer in contemporary English than the more formal 'for.'
- source_word: חֹק
  chosen: allotment
  alternatives:
  - fixed allowance
  - portion
  - ration
  - statute
  - due
  lexicon: HALOT
  rationale: Here חֹק refers not to a legal statute in the abstract but to an assigned
    provision from Pharaoh. 'Allotment' captures an officially assigned share without
    over-specifying the form.
- source_word: מֵאֵת פַּרְעֹה
  chosen: from Pharaoh
  alternatives:
  - from the hand of Pharaoh
  lexicon: HALOT
  rationale: מֵאֵת indicates source/origin. 'From Pharaoh' is the natural English
    rendering.
- source_word: וְאָכְלוּ אֶת חֻקָּם
  chosen: and they ate their allotment
  alternatives:
  - and they lived on their allowance
  - and they ate their portion
  - and they consumed their ration
  lexicon: HALOT
  rationale: Retains the concrete verb 'ate' from the Hebrew while rendering חֻקָּם
    consistently with the earlier חֹק as an assigned provision.
- source_word: אֲשֶׁר נָתַן לָהֶם פַּרְעֹה
  chosen: that Pharaoh gave them
  alternatives:
  - which Pharaoh had given them
  lexicon: HALOT
  rationale: Simple relative clause explaining the source of the allotment. English
    past tense is sufficient in context.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - So
  - For that reason
  lexicon: HALOT
  rationale: Signals the resulting conclusion from the prior explanation.
- source_word: מָכְרוּ
  chosen: sell
  alternatives:
  - sold off
  lexicon: HALOT
  rationale: Straightforward commercial verb matching the narrative context.
- source_word: אַדְמָתָם
  chosen: their land
  alternatives:
  - their ground
  lexicon: HALOT
  rationale: Refers to their landed property; 'land' is the normal contextual equivalent.
