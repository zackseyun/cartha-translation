id: GEN.47.20
reference: Genesis 47:20
source:
  edition: WLC
  text: וַ/יִּ֨קֶן יוֹסֵ֜ף אֶת כָּל אַדְמַ֤ת מִצְרַ֨יִם֙ לְ/פַרְעֹ֔ה כִּֽי מָכְר֤וּ
    מִצְרַ֨יִם֙ אִ֣ישׁ שָׂדֵ֔/הוּ כִּֽי חָזַ֥ק עֲלֵ/הֶ֖ם הָ/רָעָ֑ב וַ/תְּהִ֥י הָ/אָ֖רֶץ
    לְ/פַרְעֹֽה־־־־׃
translation:
  text: So Joseph bought all the land of Egypt for Pharaoh, because every Egyptian
    sold his field, for the famine was severe upon them; and the land became Pharaoh’s.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acquired all the land of Egypt for Pharaoh.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the famine was strong upon them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֶן
  chosen: bought
  alternatives:
  - acquired
  - purchased
  lexicon: HALOT
  rationale: Qal wayyiqtol of קנה here denotes a commercial acquisition in the context
    of Egyptians selling their fields. 'Bought' is the most natural and direct English
    equivalent in this economic setting.
- source_word: אַדְמַת
  chosen: land
  alternatives:
  - ground
  - soil
  lexicon: HALOT
  rationale: אַדְמָה can mean ground/soil/land. In context of property ownership and
    sale, 'land' best conveys territory held as agricultural property rather than
    mere soil.
- source_word: מִצְרַיִם
  chosen: Egypt / Egyptian
  lexicon: HALOT
  rationale: The first occurrence refers to the country ('Egypt') in construct with
    'land'; the second refers to the people collectively. Rendering the collective
    singular distributively as 'every Egyptian' fits the following אִישׁ ('each man')
    and the English idiom.
- source_word: לְפַרְעֹה
  chosen: for Pharaoh
  alternatives:
  - on behalf of Pharaoh
  - belonging to Pharaoh
  lexicon: HALOT
  rationale: The preposition ל marks the beneficiary/recipient of the purchase. 'For
    Pharaoh' preserves that Joseph is acting in service of Pharaoh's ownership.
- source_word: מָכְרוּ ... אִישׁ שָׂדֵהוּ
  chosen: every Egyptian sold his field
  alternatives:
  - the Egyptians sold, each man his field
  - each Egyptian sold his own field
  lexicon: HALOT
  rationale: The Hebrew combines a collective subject with distributive אִישׁ and
    singular 'his field.' This is best represented in idiomatic English as 'every
    Egyptian sold his field,' preserving the distributive force.
- source_word: שָׂדֵהוּ
  chosen: his field
  alternatives:
  - his farmland
  lexicon: HALOT
  rationale: שָׂדֶה is specifically a field or cultivated tract. 'Field' is the straightforward
    equivalent and matches the agricultural context.
- source_word: חָזַק ... הָרָעָב
  chosen: the famine was severe
  alternatives:
  - the famine was strong
  - the famine prevailed
  lexicon: HALOT
  rationale: The verb חזק literally means 'was strong' or 'grew strong,' but in English
    with 'famine' the idiomatic sense is that it was severe or intense. 'Was severe'
    communicates the plain sense without woodenness.
- source_word: עֲלֵהֶם
  chosen: upon them
  alternatives:
  - over them
  - against them
  lexicon: HALOT
  rationale: The preposition עַל with a calamity conveys pressure resting on people.
    'Upon them' preserves the metaphor and gravity better than a flatter paraphrase.
- source_word: וַתְּהִי הָאָרֶץ לְפַרְעֹה
  chosen: the land became Pharaoh’s
  alternatives:
  - the land came to belong to Pharaoh
  - the land was Pharaoh's
  lexicon: HALOT
  rationale: This clause states the resulting transfer of ownership. 'Became Pharaoh’s'
    is concise, idiomatic, and accurately expresses the new legal status.
