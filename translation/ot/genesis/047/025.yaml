id: GEN.47.25
reference: Genesis 47:25
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ הֶחֱיִתָ֑/נוּ נִמְצָא חֵן֙ בְּ/עֵינֵ֣י אֲדֹנִ֔/י וְ/הָיִ֥ינוּ
    עֲבָדִ֖ים לְ/פַרְעֹֽה־׃
translation:
  text: And they said, “You have kept us alive. Let us find favor in the eyes of my
    lord, and we will be slaves to Pharaoh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May we find favor in my lord’s eyes.' The Hebrew expression is a deferential
      request using the idiom 'find favor in the eyes of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - So they said
  - Then they said
  lexicon: HALOT
  rationale: Standard narrative waw-consecutive introducing direct speech; 'And they
    said' preserves Hebrew discourse flow naturally in English.
- source_word: הֶחֱיִתָנוּ
  chosen: You have kept us alive
  alternatives:
  - You have saved our lives
  - You have let us live
  lexicon: HALOT
  rationale: Hiphil of חיה means to cause to live, preserve alive. 'Kept us alive'
    is a clear, natural rendering that preserves the causative sense without overstating
    to spiritual or military 'saved'.
- source_word: נִמְצָא חֵן
  chosen: Let us find favor
  alternatives:
  - May we find favor
  - We have found favor
  lexicon: HALOT
  rationale: 'The form is morphologically imperfect/yiqtol first common plural and
    functions here as a volitive/jussive-like request following gratitude: ''let us
    find favor'' or ''may we find favor.'' This fits the context better than a simple
    indicative ''we find/have found favor''.'
- source_word: בְּעֵינֵי אֲדֹנִי
  chosen: in the eyes of my lord
  alternatives:
  - in my lord's eyes
  - with my lord
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for gaining favor. Retaining 'in the eyes
    of' preserves the idiom transparently while remaining understandable in English.
    'My lord' reflects the singular pronominal suffix and deferential address, likely
    to Joseph.
- source_word: וְהָיִינוּ
  chosen: and we will be
  alternatives:
  - and let us be
  - and we would be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction can express resultant commitment
    in context. Future English best captures their pledge in response to Joseph's
    provision.
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: 'The noun denotes persons in bonded service. In this economic context,
    the bonded nature is salient: the Egyptians are offering themselves into Pharaoh''s
    servitude in exchange for survival. Per translation philosophy, ''slave'' is preferred
    where bonded status is prominent.'
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - for Pharaoh
  - belonging to Pharaoh
  lexicon: HALOT
  rationale: The preposition marks relation/direction of service. 'To Pharaoh' is
    concise and idiomatic with 'be slaves to Pharaoh.'
