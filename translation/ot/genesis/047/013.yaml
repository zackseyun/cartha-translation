id: GEN.47.13
reference: Genesis 47:13
source:
  edition: WLC
  text: וְ/לֶ֤חֶם אֵין֙ בְּ/כָל הָ/אָ֔רֶץ כִּֽי כָבֵ֥ד הָ/רָעָ֖ב מְאֹ֑ד וַ/תֵּ֜לַהּ
    אֶ֤רֶץ מִצְרַ֨יִם֙ וְ/אֶ֣רֶץ כְּנַ֔עַן מִ/פְּנֵ֖י הָ/רָעָֽב־־׃
translation:
  text: Now there was no food in all the land, because the famine was very severe;
    and the land of Egypt and the land of Canaan were exhausted because of the famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread'; here likely used more broadly for food in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'languished' / 'fainted' for 'were exhausted.' The Hebrew verb is figurative,
      describing the debilitating effect of the famine on Egypt and Canaan.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Though literally 'bread,' in famine contexts לֶחֶם commonly stands metonymically
    for food in general. 'Food' better conveys the sense in natural English without
    over-literal narrowing to baked bread.
- source_word: אֵין
  chosen: there was no
  alternatives:
  - there is no
  lexicon: HALOT
  rationale: The existential negative is rendered idiomatically in past narrative
    context as 'there was no.'
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the land
  alternatives:
  - in the whole הארץ
  - in all the country
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the affected territory/region in context, not
    the entire globe. 'Land' preserves the Hebrew term while remaining natural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the lack of food; 'because' is clearer in contemporary
    English than the more formal 'for.'
- source_word: כָבֵד
  chosen: very severe
  alternatives:
  - heavy
  - grievous
  - intense
  lexicon: HALOT
  rationale: The adjective literally means 'heavy,' but with famine it denotes severity
    or harshness. 'Very severe' captures the idiomatic force with מְאֹד.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: Standard contextual rendering for רָעָב in this narrative.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Simple intensifier in readable modern English.
- source_word: וַתֵּלַהּ
  chosen: were exhausted
  alternatives:
  - languished
  - fainted
  - were worn out
  lexicon: HALOT
  rationale: The verb conveys being spent, worn out, or faint from the effects of
    the famine. Because the subject is compound ('the land of Egypt and the land of
    Canaan'), English uses plural agreement. 'Were exhausted' communicates the figurative
    sense clearly.
- source_word: אֶרֶץ מִצְרַיִם וְאֶרֶץ כְּנַעַן
  chosen: the land of Egypt and the land of Canaan
  alternatives:
  - Egypt and Canaan
  - the country of Egypt and the country of Canaan
  lexicon: HALOT
  rationale: Retaining 'land of' mirrors the Hebrew construction and keeps the geographic
    emphasis.
- source_word: מִפְּנֵי הָרָעָב
  chosen: because of the famine
  alternatives:
  - from before the famine
  - on account of the famine
  lexicon: HALOT
  rationale: Idiomatic causal rendering of the prepositional phrase.
