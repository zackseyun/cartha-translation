id: GEN.47.9
reference: Genesis 47:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יַעֲקֹב֙ אֶל פַּרְעֹ֔ה יְמֵי֙ שְׁנֵ֣י מְגוּרַ֔/י שְׁלֹשִׁ֥ים וּ/מְאַ֖ת
    שָׁנָ֑ה מְעַ֣ט וְ/רָעִ֗ים הָיוּ֙ יְמֵי֙ שְׁנֵ֣י חַיַּ֔/י וְ/לֹ֣א הִשִּׂ֗יגוּ אֶת
    יְמֵי֙ שְׁנֵי֙ חַיֵּ֣י אֲבֹתַ֔/י בִּ/ימֵ֖י מְגוּרֵי/הֶֽם־־׃
translation:
  text: And Jacob said to Pharaoh, “The days of the years of my sojourning are one
    hundred thirty years. Few and evil have been the days of the years of my life,
    and they have not attained to the days of the years of the lives of my fathers
    in the days of their sojourning.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my pilgrimage … their pilgrimage.” The Hebrew term refers to living
      as a temporary resident or foreigner.
    reason: lexical_alternative
  - marker: b
    text: Or 'The days of the years of my life have been few and hard'.
    reason: previous_rendering
lexical_decisions:
- source_word: מְגוּרַי / מְגוּרֵיהֶם
  chosen: my sojourning / their sojourning
  alternatives:
  - my pilgrimage / their pilgrimage
  - my dwelling / their dwelling
  - my temporary residence / their temporary residence
  lexicon: HALOT
  rationale: מָגוּר/מְגוּרִים denotes temporary residence or sojourning as an alien.
    'Sojourning' preserves the patriarchal theme of living as resident foreigners
    better than the more interpretive 'pilgrimage' or the flatter 'dwelling.'
- source_word: יְמֵי שְׁנֵי
  chosen: the days of the years of
  alternatives:
  - the years of
  - the lifetime of
  lexicon: HALOT
  rationale: The Hebrew deliberately stacks 'days' and 'years,' a solemn idiom for
    lifespan. Retaining the fuller expression preserves the texture of Jacob's speech
    rather than compressing it.
- source_word: שְׁלֹשִׁים וּמְאַת שָׁנָה
  chosen: one hundred thirty years
  alternatives:
  - a hundred and thirty years
  lexicon: HALOT
  rationale: Standard contemporary English number expression; equivalent in sense
    and more natural than a hyper-literal ordering.
- source_word: מְעַט
  chosen: few
  alternatives:
  - few in number
  - short
  lexicon: HALOT
  rationale: In context Jacob evaluates the span of his life as comparatively small
    relative to his fathers. 'Few' reflects the adjective directly; 'short' is possible
    but less literal.
- source_word: רָעִים
  chosen: hard
  alternatives:
  - evil
  - bad
  - troubled
  lexicon: HALOT
  rationale: Here רַע describes the quality of Jacob's life experience, not moral
    evil. 'Hard' communicates adversity and suffering in idiomatic English without
    implying moral wickedness in the days themselves.
- source_word: חַיַּי / חַיֵּי אֲבֹתַי
  chosen: my life / the lives of my fathers
  alternatives:
  - my lifetime / the lifetime of my fathers
  lexicon: HALOT
  rationale: The construct forms refer to lifespan/life. 'My life' and 'the lives
    of my fathers' are natural English while preserving the Hebrew sense.
- source_word: הָיוּ
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: English present perfect fits Jacob's retrospective summary of his life
    up to the present audience with Pharaoh.
- source_word: הִשִּׂיגוּ
  chosen: have not reached
  alternatives:
  - have not attained
  - have not equaled
  - did not overtake
  lexicon: HALOT
  rationale: The verb means to reach, overtake, or attain. 'Have not reached' preserves
    the comparative idea that Jacob's lifespan falls short of his fathers' lifespans.
- source_word: אֲבֹתַי
  chosen: my fathers
  alternatives:
  - my ancestors
  - my forefathers
  lexicon: HALOT
  rationale: In context Jacob refers specifically to the patriarchal forefathers.
    'My fathers' is a transparent rendering of the Hebrew and preserves familial continuity.
