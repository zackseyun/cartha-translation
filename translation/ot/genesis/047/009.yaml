theological_decisions:
- issue: Patriarchal self-description as alien resident
  chosen_reading: sojourning
  alternative_readings:
  - pilgrimage
  rationale: The verse reflects the patriarchs' status as resident foreigners in the
    land rather than explicitly spiritualizing the term. 'Sojourning' preserves that
    theological-historical tension without importing later pilgrimage language into
    the main text.
  doctrine_reference: Translation philosophy §3, §5
revisions:
- timestamp: '2026-04-21T00:27:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/047/009.json
  category: awkward_english
  tier: 1
  from: The days of the years of my life have been few and hard
  to: Few and hard have been the days of the years of my life
  rationale: The suggested word order more closely follows the Hebrew syntax (מְעַט
    וְרָעִים הָיוּ...), which places the emphasis on the qualities of Jacob's life
    ('Few and hard'). This inversion creates a more elevated, formal tone in English
    that suits the solemnity of the occasion and the repetitive phrasing of the verse,
    slightly improving the rhetorical flow.
