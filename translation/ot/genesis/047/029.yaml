theological_decisions:
- issue: Rendering of חֶסֶד in a patriarchal oath context
  chosen_reading: covenant faithfulness
  alternative_readings:
  - steadfast love
  - kindness
  - loyalty
  rationale: The context is a solemn burial oath within covenantal family obligations,
    so a rendering that preserves loyal-obligational force is preferable to a softer
    relational term. This is a lexical-theological nuance rather than a doctrinal
    dispute.
  doctrine_reference: Translation philosophy §1, §5
- issue: Retention of the oath gesture 'hand under my thigh'
  chosen_reading: Translate literally in the main text and explain culturally in a
    footnote
  alternative_readings:
  - Paraphrase as 'swear to me'
  - Translate euphemistically without note
  rationale: The phrase is culturally marked but not obscure beyond recovery. Preserving
    it maintains source-text concreteness and avoids flattening the ritual dimension;
    the footnote supplies needed context.
  doctrine_reference: Translation philosophy §1, §6
