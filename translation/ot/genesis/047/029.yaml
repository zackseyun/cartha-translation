id: GEN.47.29
reference: Genesis 47:29
source:
  edition: WLC
  text: וַ/יִּקְרְב֣וּ יְמֵֽי יִשְׂרָאֵ֘ל לָ/מוּת֒ וַ/יִּקְרָ֣א לִ/בְנ֣/וֹ לְ/יוֹסֵ֗ף
    וַ/יֹּ֤אמֶר ל/וֹ֙ אִם נָ֨א מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ שִֽׂים נָ֥א יָדְ/ךָ֖
    תַּ֣חַת יְרֵכִ֑/י וְ/עָשִׂ֤יתָ עִמָּדִ/י֙ חֶ֣סֶד וֶ/אֱמֶ֔ת אַל נָ֥א תִקְבְּרֵ֖/נִי
    בְּ/מִצְרָֽיִם־׀־־־׃
translation:
  text: 'When the days of Israel drew near for him to die, he called his son Yosef
    and said to him, “If now I have found favor in your eyes, please put your hand
    under my thigh, and deal with me in covenant faithfulness and truth: please do
    not bury me in Egypt.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Put your hand under my thigh'' refers to a solemn oath gesture in the
      patriarchal narratives; compare Genesis 24:2.'
    reason: cultural_note
  - marker: b
    text: Or 'steadfast love and faithfulness.' The Hebrew pair חֶסֶד וֶאֱמֶת conveys
      loyal, dependable covenantal kindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ יְמֵי
  chosen: When the days ... drew near
  alternatives:
  - As the time ... approached
  - When the time ... came near
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of 'days drawing near.' Preserving
    'days' keeps the source imagery while making natural English with 'drew near.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses 'Israel,' not 'Jacob.' The translation preserves
    the named form present in the source.
- source_word: לָמוּת
  chosen: for him to die
  alternatives:
  - to die
  - that he should die
  lexicon: HALOT
  rationale: The infinitive expresses the approaching event of death. 'For him to
    die' makes the English syntax clear after 'the days ... drew near' without over-paraphrasing.
- source_word: לִבְנוֹ לְיוֹסֵף
  chosen: his son Yosef
  alternatives:
  - his son Joseph
  lexicon: HALOT
  rationale: Names are transliterated by standard conventions per project philosophy.
    'Yosef' reflects the Hebrew name more directly than the traditional Anglicized
    'Joseph.'
- source_word: אִם נָא מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: If now I have found favor in your eyes
  alternatives:
  - If I have found favor in your sight
  - If I have found grace in your eyes
  lexicon: HALOT
  rationale: This is a conventional Hebrew politeness formula. 'Favor' is the clearest
    modern equivalent for חֵן, while 'in your eyes' preserves the Hebrew idiom more
    closely than 'in your sight.'
- source_word: שִׂים נָא
  chosen: please put
  alternatives:
  - please place
  - put, please
  lexicon: HALOT
  rationale: The particle נָא adds politeness/entreaty. 'Please put' is natural modern
    English and preserves the requestive force.
- source_word: יָדְךָ תַּחַת יְרֵכִי
  chosen: your hand under my thigh
  alternatives:
  - your hand beneath my thigh
  lexicon: HALOT
  rationale: This expression is retained fairly literally because it refers to a known
    oath gesture in Genesis. A footnote explains the cultural significance rather
    than replacing the phrase in the main text.
- source_word: וְעָשִׂיתָ עִמָּדִי
  chosen: deal with me
  alternatives:
  - show me
  - act toward me
  lexicon: HALOT
  rationale: The verb 'do/make' with עִם idiomatically means to act toward someone
    in a certain way. 'Deal with me' is concise and natural in context.
- source_word: חֶסֶד וֶאֱמֶת
  chosen: covenant faithfulness and truth
  alternatives:
  - steadfast love and faithfulness
  - kindness and faithfulness
  - loyalty and faithfulness
  lexicon: HALOT
  rationale: חֶסֶד carries loyal, covenantal kindness rather than mere sentiment;
    'covenant faithfulness' makes that weight explicit. אֱמֶת here has the sense of
    reliability/truthfulness. The pair expresses loyal, dependable action. Because
    several English renderings are viable, an alternative is preserved in a footnote.
- source_word: אַל נָא תִקְבְּרֵנִי בְּמִצְרָיִם
  chosen: please do not bury me in Egypt
  alternatives:
  - do not, please, bury me in Egypt
  - please do not bury me in Mitsrayim
  lexicon: HALOT
  rationale: 'The negative request with נָא is best rendered as a polite plea: ''please
    do not bury me in Egypt.'' ''Egypt'' is the standard English place-name.'
