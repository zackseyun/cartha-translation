id: GEN.47.8
reference: Genesis 47:8
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר פַּרְעֹ֖ה אֶֽל יַעֲקֹ֑ב כַּ/מָּ֕ה יְמֵ֖י שְׁנֵ֥י חַיֶּֽי/ךָ־׃
translation:
  text: And Pharaoh said to Jacob, “How many are the days of the years of your life?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''How many are the days of the years of your life?'' That is, a
      question about Jacob’s age stated in a formal Hebrew idiom.'
    reason: cultural_note
  - marker: b
    text: Or more idiomatically, 'How old are you?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' preserves
    the simple Hebrew narrative flow without overinterpreting sequence.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name, consistent
    with established biblical usage.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee. 'To' is the natural modern English
    equivalent.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Standard English transliteration of the patriarch's name.
- source_word: כַּמָּה
  chosen: How many
  alternatives:
  - How much
  lexicon: HALOT
  rationale: Used in a quantitative question. With the following construct phrases
    referring to counted days/years, 'How many' is the most idiomatic and accurate
    rendering.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the number of days of
  lexicon: HALOT
  rationale: The construct plural of 'day' is retained. Hebrew idiom counts life by
    'days'; preserving 'the days of' reflects the source wording better than smoothing
    it away.
- source_word: שְׁנֵי
  chosen: the years of
  alternatives:
  - years of
  lexicon: HALOT
  rationale: Construct plural of 'year' in apposition/qualification with 'days' and
    'your life.' Rendering both nouns preserves the layered Hebrew expression rather
    than reducing it to simply 'How old are you?'
- source_word: חַיֶּיךָ
  chosen: your life
  alternatives:
  - your lifetime
  lexicon: HALOT
  rationale: Literally 'your lives' in Hebrew idiom, but singular 'your life' is the
    natural English equivalent in this expression.
