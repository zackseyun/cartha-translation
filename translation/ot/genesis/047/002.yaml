id: GEN.47.2
reference: Genesis 47:2
source:
  edition: WLC
  text: וּ/מִ/קְצֵ֣ה אֶחָ֔י/ו לָקַ֖ח חֲמִשָּׁ֣ה אֲנָשִׁ֑ים וַ/יַּצִּגֵ֖/ם לִ/פְנֵ֥י
    פַרְעֹֽה׃
translation:
  text: From among his brothers he took five men and presented them before Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from the outermost of his brothers'' / ''from the choicest of his
      brothers''; the Hebrew expression literally involves ''from the end/edge of,''
      but here likely functions partitively: Joseph selected five from among his brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/קְצֵה
  chosen: From among
  alternatives:
  - from the edge of
  - from the extremity of
  - from among the choicest of
  lexicon: HALOT
  rationale: The preposition מִן with קָצֶה literally denotes 'from the end/edge of,'
    but in context with 'his brothers' it idiomatically means selecting some from
    a larger group. 'From among' communicates the partitive sense in natural English
    without over-literal awkwardness. The alternative 'from the choicest of' reflects
    one interpretive tradition but is not demanded by the Hebrew here.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: The noun אָח in the plural with 3ms suffix most directly means 'his brothers.'
    Since the immediate context concerns Joseph's actual brothers, the concrete familial
    term is preferable to the broader 'kinsmen.'
- source_word: לָקַח
  chosen: he took
  alternatives:
  - he selected
  lexicon: HALOT
  rationale: The verb לָקַח ordinarily means 'take.' In context it refers to choosing
    five from among his brothers, but 'he took' preserves the Hebrew wording while
    remaining clear in English.
- source_word: חֲמִשָּׁה אֲנָשִׁים
  chosen: five men
  alternatives:
  - five of the men
  lexicon: HALOT
  rationale: This straightforward numeral + noun phrase is best rendered 'five men.'
    Because the referents are Joseph's brothers, 'men' is accurate and natural.
- source_word: וַיַּצִּגֵם
  chosen: presented them
  alternatives:
  - set them before
  - stationed them before
  - introduced them
  lexicon: HALOT
  rationale: The Hiphil of יָצַג means to set, place, or present someone before another.
    'Presented them' fits the court setting before Pharaoh and reads naturally in
    English while preserving the formal sense.
- source_word: לִפְנֵי פַרְעֹה
  chosen: before Pharaoh
  alternatives:
  - in Pharaoh's presence
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before Pharaoh'
    is the standard concise rendering and suits the narrative context.
