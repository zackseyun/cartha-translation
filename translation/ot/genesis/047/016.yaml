id: GEN.47.16
reference: Genesis 47:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹסֵף֙ הָב֣וּ מִקְנֵי/כֶ֔ם וְ/אֶתְּנָ֥ה לָ/כֶ֖ם בְּ/מִקְנֵי/כֶ֑ם
    אִם אָפֵ֖ס כָּֽסֶף־׃
translation:
  text: And Joseph said, “Bring your livestock, and I will give you food in exchange
    for your livestock, since the money is gone.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and I will give to you by/for your livestock'; the object
      'food' is supplied from the immediate famine context.
    reason: lexical_alternative
  - marker: b
    text: Or 'if the money is gone'; here 'if' carries the sense of 'since' or 'because'
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  chosen: Bring
  alternatives:
  - Give
  lexicon: HALOT
  rationale: Imperative plural from יהב/הבב in this context calls for presenting or
    handing over property. 'Bring' is natural English in Joseph's administrative setting,
    while still reflecting the command to deliver the animals.
- source_word: מִקְנֵיכֶם
  chosen: your livestock
  alternatives:
  - your cattle
  - your animals
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or acquired herd animals. 'Livestock'
    is the broad, modern English equivalent and fits the famine-exchange context better
    than the narrower 'cattle'.
- source_word: וְאֶתְּנָה לָכֶם
  chosen: and I will give you food
  alternatives:
  - and I will give to you
  - and I will provide for you
  lexicon: HALOT
  rationale: The Hebrew object is unstated, but the context from the preceding verse
    concerns obtaining bread/food during famine. English requires an object for clarity;
    'food' is supplied contextually rather than repeating 'bread' too woodenly. This
    is an optimal-equivalence clarification, not a paraphrastic expansion.
- source_word: בְּמִקְנֵיכֶם
  chosen: in exchange for your livestock
  alternatives:
  - for your livestock
  - with your livestock
  lexicon: HALOT
  rationale: 'The preposition ב here marks means or exchange: Joseph will give provisions
    in return for the livestock. ''In exchange for'' makes the transactional sense
    explicit in idiomatic English.'
- source_word: אִם
  chosen: since
  alternatives:
  - if
  lexicon: HALOT
  rationale: Although אִם often means 'if,' in this context with a completed condition
    ('money has ceased') it functions idiomatically as 'since' or 'because,' explaining
    why barter is necessary.
- source_word: אָפֵס כָּסֶף
  chosen: the money is gone
  alternatives:
  - the money has run out
  - there is no money left
  lexicon: HALOT
  rationale: אָפֵס conveys coming to an end or being exhausted. 'The money is gone'
    is concise, natural English that captures the sense of depletion.
