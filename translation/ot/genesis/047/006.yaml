id: GEN.47.6
reference: Genesis 47:6
source:
  edition: WLC
  text: אֶ֤רֶץ מִצְרַ֨יִם֙ לְ/פָנֶ֣י/ךָ הִ֔וא בְּ/מֵיטַ֣ב הָ/אָ֔רֶץ הוֹשֵׁ֥ב אֶת אָבִ֖י/ךָ
    וְ/אֶת אַחֶ֑י/ךָ יֵשְׁבוּ֙ בְּ/אֶ֣רֶץ גֹּ֔שֶׁן וְ/אִם יָדַ֗עְתָּ וְ/יֶשׁ בָּ/ם֙
    אַנְשֵׁי חַ֔יִל וְ/שַׂמְתָּ֛/ם שָׂרֵ֥י מִקְנֶ֖ה עַל אֲשֶׁר לִֽ/י־־־־־־־׃
translation:
  text: The land of Egypt is before you. Settle your father and your brothers in the
    best of the land; let them live in the land of Goshen. And if you know that there
    are capable men among them, then appoint them as overseers of the livestock that
    belongs to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'able men,' 'competent men,' or more literally 'men of strength/ability.'
      The phrase does not necessarily imply military valor here.
    reason: lexical_alternative
  - marker: b
    text: '''Is before you'' is a Hebrew idiom that can imply availability or freedom
      to choose within Egypt.'
    reason: cultural_note
lexical_decisions:
- source_word: אֶרֶץ מִצְרַיִם לְפָנֶיךָ הִוא
  chosen: The land of Egypt is before you
  alternatives:
  - The land of Egypt is at your disposal
  - Egypt is before you
  lexicon: HALOT
  rationale: לְפָנֶיךָ literally means 'before you.' In context Pharaoh is granting
    Joseph freedom to choose a place for his family, so the idiom implies availability,
    but the more literal 'is before you' preserves the Hebrew image without over-paraphrasing.
- source_word: בְּמֵיטַב הָאָרֶץ
  chosen: in the best of the land
  alternatives:
  - in the choicest part of the land
  - in the finest of the land
  lexicon: HALOT
  rationale: מֵיטַב denotes the best or choicest portion. 'Best of the land' is natural
    English and closely reflects the Hebrew construct.
- source_word: הוֹשֵׁב
  chosen: Settle
  alternatives:
  - Cause to dwell
  - Have ... dwell
  lexicon: HALOT
  rationale: 'The Hiphil imperative of ישׁב is causative: Joseph is to cause his family
    to dwell there. ''Settle'' captures the causative sense in idiomatic modern English.'
- source_word: יֵשְׁבוּ
  chosen: let them live
  alternatives:
  - let them dwell
  - they may live
  lexicon: HALOT
  rationale: Qal of ישׁב here refers to residing. 'Live' is idiomatic in English for
    residence, while still conveying habitation; 'dwell' is possible but less natural
    in contemporary style.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  chosen: in the land of Goshen
  alternatives:
  - in Goshen
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so it is retained for transparency
    and rhythm.
- source_word: וְאִם יָדַעְתָּ
  chosen: And if you know
  alternatives:
  - And if you know of
  - Now if you know
  lexicon: HALOT
  rationale: The clause introduces a condition based on Joseph's knowledge. 'And if
    you know' is a straightforward rendering of the Hebrew syntax.
- source_word: אַנְשֵׁי חַיִל
  chosen: capable men
  alternatives:
  - able men
  - competent men
  - men of ability
  - valiant men
  lexicon: HALOT
  rationale: The phrase can denote men of strength, competence, or proven ability.
    In this administrative and pastoral context, 'capable men' best fits the sense
    of qualified, effective workers rather than military valor.
- source_word: וְשַׂמְתָּם
  chosen: appoint them
  alternatives:
  - set them
  - place them
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place/set,' but in an office-assignment context
    'appoint' communicates the intended function clearly.
- source_word: שָׂרֵי מִקְנֶה
  chosen: overseers of the livestock
  alternatives:
  - chiefs over the livestock
  - officials over the cattle
  - supervisors of the herds
  lexicon: HALOT
  rationale: שָׂרִים are officials, leaders, or overseers; מִקְנֶה refers to livestock/property
    in animals. 'Overseers of the livestock' is clear and contextually precise.
- source_word: עַל אֲשֶׁר לִי
  chosen: of the livestock that belongs to me
  alternatives:
  - over what is mine
  - over my livestock
  lexicon: HALOT
  rationale: The phrase modifies Pharaoh's possessions. Expanding slightly to 'that
    belongs to me' makes the referent explicit in English while preserving the possessive
    force.
