id: GEN.47.12
reference: Genesis 47:12
source:
  edition: WLC
  text: וַ/יְכַלְכֵּ֤ל יוֹסֵף֙ אֶת אָבִ֣י/ו וְ/אֶת אֶחָ֔י/ו וְ/אֵ֖ת כָּל בֵּ֣ית אָבִ֑י/ו
    לֶ֖חֶם לְ/פִ֥י הַ/טָּֽף־־־׃
translation:
  text: And Joseph provided his father, his brothers, and all his father's household
    with food, according to the number of their little ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with bread.' The Hebrew word often means 'bread' literally, but here
      likely refers more broadly to food provisions.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the mouth of the little ones,' an idiom meaning
      according to the number or needs of the children.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַלְכֵּל
  chosen: provided
  alternatives:
  - sustained
  - supplied
  - supported
  lexicon: HALOT
  rationale: The verb כלכל in the piel commonly means to sustain or provide for materially.
    In this famine context, 'provided' is natural modern English and fits the direct
    object 'food' that follows, while still conveying ongoing support.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Although the noun literally means 'bread,' in context it functions broadly
    for provisions/food. Rendering it as 'food' avoids an overly narrow sense in English
    and matches the famine-supply setting.
- source_word: כָּל בֵּית אָבִיו
  chosen: all his father's household
  alternatives:
  - all his father's house
  - all the house of his father
  lexicon: HALOT
  rationale: '''House'' here denotes the household/family establishment rather than
    the physical building. ''Household'' communicates the social unit clearly in contemporary
    English.'
- source_word: לְפִי
  chosen: according to the number of
  alternatives:
  - according to
  - in proportion to
  - by the mouth of
  lexicon: HALOT
  rationale: The idiom לְפִי literally means 'according to the mouth of,' but idiomatically
    indicates measure or proportion. 'According to the number of' makes the distributive
    sense explicit in English.
- source_word: הַטָּף
  chosen: their little ones
  alternatives:
  - the little children
  - the dependents
  - the children
  lexicon: HALOT
  rationale: טַף refers to small children or little ones within the household. 'Their
    little ones' preserves the familial sense and reflects that the provision was
    apportioned with reference to the children in the family units.
- source_word: אָבִיו ... אֶחָיו
  chosen: his father, his brothers
  alternatives:
  - his father and his brothers
  lexicon: HALOT
  rationale: These are straightforward kinship terms. 'Brothers' is retained as gender-accurate
    to the Hebrew and the immediate referents are Joseph's male siblings.
