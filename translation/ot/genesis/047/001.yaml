id: GEN.47.1
reference: Genesis 47:1
source:
  edition: WLC
  text: וַ/יָּבֹ֣א יוֹסֵף֮ וַ/יַּגֵּ֣ד לְ/פַרְעֹה֒ וַ/יֹּ֗אמֶר אָבִ֨/י וְ/אַחַ֜/י וְ/צֹאנָ֤/ם וּ/בְקָרָ/ם֙ וְ/כָל אֲשֶׁ֣ר לָ/הֶ֔ם בָּ֖אוּ מֵ/אֶ֣רֶץ כְּנָ֑עַן וְ/הִנָּ֖/ם בְּ/אֶ֥רֶץ גֹּֽשֶׁן־׃
translation:
  text: Then Joseph went in and told Pharaoh:, “My father and my brothers, with their flocks and their herds and all that they have, have come from the land of Canaan; and behold, they are in the land of Goshen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “came from the land of Canaan.” The Hebrew perfect may be rendered as a simple past or as an English present perfect emphasizing their now-completed arrival.
    reason: lexical_alternative
  - marker: b
    text: Or “and here they are in the land of Goshen.”
    reason: lexical_alternative
  - marker: c
    text: Or 'and told Pharaoh, and said'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb בוא broadly means 'come/go/enter.' In this court setting with Pharaoh as destination, 'went in' naturally conveys Joseph's approach into Pharaoh's presence better than the less idiomatic 'came.'
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported to
  - declared to
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell or report. 'Told' is clear modern English; the formal sense of reporting is still conveyed by context.
- source_word: לְפַרְעֹה
  chosen: Pharaoh
  rationale: Proper royal title/name is transliterated in standard English form per translation philosophy.
- source_word: אָבִי וְאַחַי
  chosen: My father and my brothers
  alternatives:
  - My father and my brothers of mine
  lexicon: HALOT
  rationale: Straightforward possessive construction. 'Brothers' is gender-accurate and contextually correct, referring to Joseph's male siblings.
- source_word: וְצֹאנָם וּבְקָרָם
  chosen: with their flocks and their herds
  alternatives:
  - and their sheep and their cattle
  - and their small livestock and their cattle
  lexicon: HALOT
  rationale: צאן denotes small livestock, often sheep/goats; בקר denotes herd animals/cattle. 'Flocks and herds' is idiomatic English that preserves the distinction without over-specifying species.
- source_word: וְכָל אֲשֶׁר לָהֶם
  chosen: and all that they have
  alternatives:
  - and all that belongs to them
  - and everything they own
  lexicon: HALOT
  rationale: This phrase summarizes their possessions. 'All that they have' is close to the Hebrew and natural in English.
- source_word: בָּאוּ מֵאֶרֶץ כְּנָעַן
  chosen: have come from the land of Canaan
  alternatives:
  - came from the land of Canaan
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English because Joseph is announcing their recent arrival with present relevance. 'The land of Canaan' preserves the Hebrew construct.
- source_word: וְהִנָּם
  chosen: behold, they are
  alternatives:
  - and here they are
  - and indeed they are
  lexicon: HALOT
  rationale: הנה with pronominal suffix draws attention to a present state. 'Behold' preserves the deictic force, though slightly elevated; it fits the narrative register.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  chosen: in the land of Goshen
  alternatives:
  - in Goshen
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so it is retained for geographic specificity and narrative texture.
