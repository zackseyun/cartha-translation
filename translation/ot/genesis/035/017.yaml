id: GEN.35.17
reference: Genesis 35:17
source:
  edition: WLC
  text: וַ/יְהִ֥י בְ/הַקְשֹׁתָ֖/הּ בְּ/לִדְתָּ֑/הּ וַ/תֹּ֨אמֶר לָ֤/הּ הַ/מְיַלֶּ֨דֶת֙
    אַל תִּ֣ירְאִ֔י כִּֽי גַם זֶ֥ה לָ֖/ךְ בֵּֽן־־־׃
translation:
  text: And when her labor was hard, the midwife said to her, “Do not fear, for this
    also is a son for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do not be afraid, for you also have a son.”
    reason: lexical_alternative
  - marker: b
    text: Or 'this one also is a son for you'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when it happened / And when
  alternatives:
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the circumstance of the next clause.
    In modern English, 'And when' conveys the temporal transition naturally without
    archaic style.
- source_word: בְהַקְשֹׁתָהּ
  chosen: her labor was hard
  alternatives:
  - she was in hard labor
  - her struggle was severe
  lexicon: HALOT
  rationale: From קשׁה/קשׁה in the causative/infinitive construction, the phrase denotes
    difficulty or severity in childbirth. 'Her labor was hard' is idiomatic and keeps
    the focus on the birthing ordeal.
- source_word: בְלִדְתָּהּ
  chosen: her labor
  alternatives:
  - in her giving birth
  - in her childbirth
  lexicon: HALOT
  rationale: 'The infinitive construct of ילד with prefixed ב marks the time sphere:
    ''in her giving birth.'' In English, ''labor'' succinctly expresses the childbirth
    context together with the preceding phrase.'
- source_word: הַמְיַלֶּדֶת
  chosen: the midwife
  alternatives:
  - the woman assisting in childbirth
  lexicon: HALOT
  rationale: The participial form from ילד refers to the female birth attendant. 'Midwife'
    is the standard, precise English equivalent.
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A common prohibition with ירא. 'Do not fear' is slightly more formal
    but still natural and preserves the directness of the reassurance.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the reassurance. 'For' fits the explanatory
    sense in direct speech.
- source_word: גַּם זֶה
  chosen: this one also
  alternatives:
  - also this one
  - this too
  lexicon: HALOT
  rationale: The phrase points to the child being born and adds him to a previous
    son. 'This one also' preserves the demonstrative emphasis.
- source_word: לָךְ בֵּן
  chosen: is a son for you
  alternatives:
  - you have a son
  - you also have a son
  lexicon: HALOT
  rationale: Literally 'for you, a son.' The wording communicates possession/result
    without over-paraphrasing. 'Is a son for you' stays close to the Hebrew while
    remaining understandable.
