theological_decisions:
- issue: Rendering אֱלֹהִים in a singular sense
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: In context the referent is the God who appeared and spoke to Jacob; the
    syntax and narrative context require the singular sense. Rendering it as plural
    would misrepresent the passage.
