id: GEN.35.15
reference: Genesis 35:15
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א יַעֲקֹ֜ב אֶת שֵׁ֣ם הַ/מָּק֗וֹם אֲשֶׁר֩ דִּבֶּ֨ר אִתּ֥/וֹ שָׁ֛ם
    אֱלֹהִ֖ים בֵּֽית אֵֽל־־׃
translation:
  text: And Jacob called the name of the place where God had spoken with him there,
    Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bethel means 'house of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'where God had spoken with him there'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with 'the name' commonly means to call or name. 'Called'
    preserves the Hebrew idiom while remaining natural in English.
- source_word: שֵׁם
  chosen: the name
  alternatives:
  - name
  lexicon: HALOT
  rationale: Retained explicitly because the Hebrew says 'called the name of the place,'
    an idiom often smoothed in English but significant enough to preserve in optimal
    equivalence.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - that place
  lexicon: HALOT
  rationale: Straightforward rendering of המקום with the article.
- source_word: אֲשֶׁר דִּבֶּר אִתּוֹ שָׁם אֱלֹהִים
  chosen: where God had spoken with him there
  alternatives:
  - where God spoke with him
  - where God had spoken to him there
  lexicon: HALOT
  rationale: The clause is rendered with 'where' for natural English corresponding
    to the relative construction. 'Had spoken' reflects the prior action relative
    to Jacob's naming. 'With him' follows אִתּוֹ more closely than 'to him.' 'There'
    is retained because שָׁם is present in the Hebrew and should not be omitted.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים here clearly takes
    singular verbal sense and refers to the one true God; standard English rendering
    is 'God.'
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - House of God
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than translated. 'Bethel' is the standard English transliteration of the
    place name.
