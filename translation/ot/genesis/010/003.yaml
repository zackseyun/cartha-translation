id: GEN.10.3
reference: Genesis 10:3
source:
  edition: WLC
  text: וּ/בְנֵ֖י גֹּ֑מֶר אַשְׁכֲּנַ֥ז וְ/רִיפַ֖ת וְ/תֹגַרְמָֽה׃
translation:
  text: 'And the sons of Gomer: Ashkenaz, Riphath, and Togarmah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 1 Chronicles 1:6 has 'Diphath' instead of 'Riphath.'
    reason: textual_variant
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In genealogical context,
    'sons of' is the most natural and formally accurate English rendering, preserving
    the lineage structure better than the broader 'children of.' The conjunction is
    retained as 'And' to reflect the Hebrew narrative-genealogical chaining.
- source_word: גֹּמֶר
  chosen: Gomer
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: אַשְׁכֲּנַז
  chosen: Ashkenaz
  lexicon: HALOT
  rationale: Proper name; transliterated. As a descendant name in the Table of Nations,
    no translation is appropriate.
- source_word: וְ/רִיפַת
  chosen: and Riphath
  alternatives:
  - and Diphath
  lexicon: HALOT
  rationale: Proper name with conjunction. The MT/WLC reads רִיפַת (Riphath), which
    is followed in the main text. 'Diphath' is a known alternative from the parallel
    genealogy in 1 Chronicles 1:6 and is worth preserving in a footnote as a cross-text
    lexical/textual alternative.
- source_word: וְ/תֹגַרְמָה
  chosen: and Togarmah
  lexicon: HALOT
  rationale: Proper name with conjunction; transliterated by standard convention.
