id: GEN.10.20
reference: Genesis 10:20
source:
  edition: WLC
  text: אֵ֣לֶּה בְנֵי חָ֔ם לְ/מִשְׁפְּחֹתָ֖/ם לִ/לְשֹֽׁנֹתָ֑/ם בְּ/אַרְצֹתָ֖/ם בְּ/גוֹיֵ/הֶֽם־׃ס
translation:
  text: These are the sons of Ham, by their clans, by their languages, in their lands,
    in their nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their clans ... according to their languages'; the repeated
      preposition marks classification by groupings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'tongues,' that is, languages.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  - These were
  lexicon: HALOT
  rationale: Demonstrative introducing a summary statement; 'These are' is natural
    English and preserves the identificational force.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Formal construct phrase meaning 'sons of.' In genealogical context it
    can imply descendants, but 'sons of Ham' is the standard and sufficiently clear
    rendering.
- source_word: חָם
  chosen: Ham
  lexicon: HALOT
  rationale: Proper name; transliterated per translation philosophy.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: The לְ marks classification/distribution. 'By their clans' is concise
    modern English and fits the recurring formula in Genesis 10. 'Clans' better reflects
    kinship groups than the broader English 'families'.
- source_word: לִלְשֹׁנֹתָם
  chosen: by their languages
  alternatives:
  - according to their tongues
  lexicon: HALOT
  rationale: Though literally 'tongues,' the term idiomatically denotes languages
    here. 'By their languages' preserves the classificatory force while using clear
    modern English.
- source_word: בְּאַרְצֹתָם
  chosen: in their lands
  alternatives:
  - in their countries
  - in their territories
  lexicon: HALOT
  rationale: The preposition בְּ is locative. 'Lands' is the most natural plural rendering
    of ארץ here and avoids anachronistic nation-state connotations of 'countries.'
- source_word: בְּגוֹיֵהֶם
  chosen: in their nations
  alternatives:
  - among their nations
  - as their nations
  - by their nations
  lexicon: HALOT
  rationale: גוֹי denotes peoples/nations; with בְּ in this formula, 'in their nations'
    mirrors the source structure and parallels the preceding locative phrase. It conveys
    sociopolitical grouping distinct from clans and lands.
