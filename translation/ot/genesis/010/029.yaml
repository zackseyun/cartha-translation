id: GEN.10.29
reference: Genesis 10:29
source:
  edition: WLC
  text: וְ/אֶת אוֹפִ֥ר וְ/אֶת חֲוִילָ֖ה וְ/אֶת יוֹבָ֑ב כָּל אֵ֖לֶּה בְּנֵ֥י יָקְטָֽן־־־־׃
translation:
  text: Ophir, Havilah, and Jobab. All these were the sons of Joktan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Joktan.' The Hebrew 'sons of' can sometimes function
      more broadly in genealogies, but here it most naturally refers to the named
      sons just listed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: '[direct-object marker omitted in English coordination]'
  alternatives:
  - and
  - with
  lexicon: HALOT
  rationale: The repeated אֵת marks each named son as a direct object in the continuation
    of the genealogy list from the previous verse. English does not represent the
    marker, so it is naturally omitted while preserving the list structure with commas
    and 'and' before the final name.
- source_word: אוֹפִר
  chosen: Ophir
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal/place names are transliterated
    by standard English convention rather than translated.
- source_word: חֲוִילָה
  chosen: Havilah
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English biblical usage.
- source_word: יוֹבָב
  chosen: Jobab
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  - These all
  lexicon: HALOT
  rationale: A straightforward rendering of the summarizing phrase, introducing the
    conclusion to the list. 'All these' is idiomatic and concise in modern English.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: In genealogical contexts בְּנֵי can sometimes broaden to descendants,
    but here it introduces a direct list of named male offspring in the Table of Nations.
    'Sons of' best matches the lexical form and immediate context.
- source_word: יָקְטָן
  chosen: Joktan
  lexicon: HALOT
  rationale: Proper name; standard transliteration.
