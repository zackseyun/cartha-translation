id: GEN.10.5
reference: Genesis 10:5
source:
  edition: WLC
  text: מֵ֠/אֵלֶּה נִפְרְד֞וּ אִיֵּ֤י הַ/גּוֹיִם֙ בְּ/אַרְצֹתָ֔/ם אִ֖ישׁ לִ/לְשֹׁנ֑/וֹ לְ/מִשְׁפְּחֹתָ֖/ם בְּ/גוֹיֵ/הֶֽם׃
translation:
  text: From these the peoples of the coastlands spread out in their lands, each according to his language, by their clans, in their nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands of the nations.' The Hebrew term can denote islands or coastlands; here it likely refers broadly to maritime regions and peoples.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'man according to his language,' a distributive expression meaning 'each according to his language.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the coastlands of the nations were divided'.
    reason: previous_rendering
lexical_decisions:
- source_word: מֵאֵלֶּה
  chosen: From these
  alternatives:
  - From them
  lexicon: HALOT
  rationale: 'The preposition מִן with the demonstrative אֵלֶּה indicates source or origin: the following peoples/regions derive from these descendants just listed.'
- source_word: נִפְרְדוּ
  chosen: were divided
  alternatives:
  - separated
  - spread out
  lexicon: HALOT
  rationale: Niphal of פרד conveys being separated or divided. 'Were divided' fits the passive/reflexive sense and the table-of-nations context of distribution into distinct peoples and territories.
- source_word: אִיֵּי הַגּוֹיִם
  chosen: the coastlands of the nations
  alternatives:
  - the islands of the nations
  - the maritime lands of the nations
  - the peoples of the coastlands
  lexicon: HALOT
  rationale: אִיִּים often refers not only to literal islands but to coastlands/maritime regions. 'Coastlands of the nations' best captures the geographic sense in this ethnographic context, while preserving the construct relationship.
- source_word: בְּאַרְצֹתָם
  chosen: in their lands
  alternatives:
  - in their territories
  - in their countries
  lexicon: HALOT
  rationale: אֶרֶץ here refers to territorial lands occupied by the groups descended from Japheth. 'Lands' is natural and sufficiently broad.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: Although literally 'man,' in distributive constructions אִישׁ commonly means 'each' or 'each one.' This preserves the distributive force without awkward English while respecting the source intent.
- source_word: לִלְשֹׁנוֹ
  chosen: according to his language
  alternatives:
  - by his tongue
  - with his language
  lexicon: HALOT
  rationale: לָשׁוֹן can mean 'tongue' literally or 'language' idiomatically. In this catalog of peoples, 'language' is clearly intended. 'According to' expresses the classificatory force of לְ.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical and tribal contexts often denotes clan-grouping rather than the modern nuclear family. 'By their clans' fits the ethnographic structure of the verse.
- source_word: בְּגוֹיֵהֶם
  chosen: in their nations
  alternatives:
  - among their nations
  - as their nations
  lexicon: HALOT
  rationale: גּוֹי here denotes nation/people-group. The final phrase summarizes the political-ethnic grouping. 'In their nations' preserves the preposition and parallels 'in their lands' earlier in the verse.
