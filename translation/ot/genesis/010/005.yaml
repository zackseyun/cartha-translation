  from: the coastlands of the nations were divided
  to: the peoples of the coastlands spread out
  rationale: The current phrasing makes it sound as if the land itself was partitioned, which is awkward. The Hebrew verb נִפְרְדוּ is more naturally applied to people separating or spreading out (cf. Gen 13:9, 11). Translating the subject אִיֵּי הַגּוֹיִם as 'the peoples of the coastlands' (a valid interpretation) and the verb as 'spread out' clarifies that the verse describes the dispersion of peoples, not just a geographical division.
