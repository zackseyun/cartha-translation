id: GEN.10.19
reference: Genesis 10:19
source:
  edition: WLC
  text: וַֽ/יְהִ֞י גְּב֤וּל הַֽ/כְּנַעֲנִי֙ מִ/צִּידֹ֔ן בֹּאֲ/כָ֥ה גְרָ֖רָ/ה עַד עַזָּ֑ה
    בֹּאֲ/כָ֞ה סְדֹ֧מָ/ה וַ/עֲמֹרָ֛ה וְ/אַדְמָ֥ה וּ/צְבֹיִ֖ם עַד לָֽשַׁע־־׃
translation:
  text: And the border of the Canaanites was from Sidon, as you go toward Gerar, as
    far as Gaza; and as you go toward Sodom and Gomorrah and Admah and Zeboiim, as
    far as Lasha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Lesha.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the clause narratively. In English,
    the idiomatic rendering is simply 'And ... was,' supplying the copular sense without
    over-literal 'and it came to be.'
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this geographic context the noun denotes the territorial limit or
    boundary line. 'Border' is natural modern English and fits the following directional
    markers.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular gentilic, in context it functions collectively
    for the people group descended from Canaan. English commonly renders this collective
    as the plural 'the Canaanites.'
- source_word: מִצִּידֹן
  chosen: from Sidon
  alternatives:
  - from Zidon
  lexicon: HALOT
  rationale: Standard English transliteration is 'Sidon.' The preposition marks the
    starting point of the border description.
- source_word: בֹּאֲכָה
  chosen: as you go toward
  alternatives:
  - in the direction of
  - toward
  - at the entrance to
  lexicon: HALOT
  rationale: This infinitive/construct form with pronominal suffix is an idiom in
    boundary descriptions meaning movement or orientation toward a place. 'As you
    go toward' preserves the directional sense and matches common English for route
    descriptions.
- source_word: גְרָרָה
  chosen: Gerar
  lexicon: HALOT
  rationale: Place name transliterated by standard convention. The directional he
    is absorbed in the English prepositional phrase 'toward Gerar.'
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: In a border formula, 'as far as' clearly expresses the extent of the
    boundary.
- source_word: עַזָּה
  chosen: Gaza
  lexicon: HALOT
  rationale: Standard English form of the place name.
- source_word: סְדֹמָה וַעֲמֹרָה וְאַדְמָה וּצְבֹיִם
  chosen: Sodom and Gomorrah and Admah and Zeboiim
  lexicon: HALOT
  rationale: These are place names in a sequence marking the border's extension. They
    are transliterated by standard English conventions.
- source_word: לָשַׁע
  chosen: Lasha
  alternatives:
  - Lesha
  lexicon: HALOT
  rationale: The place name is traditionally rendered either 'Lasha' or 'Lesha.' 'Lasha'
    more directly reflects the Hebrew vocalization here, while the alternative is
    worth preserving in a footnote.
