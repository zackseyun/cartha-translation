id: GEN.10.2
reference: Genesis 10:2
source:
  edition: WLC
  text: בְּנֵ֣י יֶ֔פֶת גֹּ֣מֶר וּ/מָג֔וֹג וּ/מָדַ֖י וְ/יָוָ֣ן וְ/תֻבָ֑ל וּ/מֶ֖שֶׁךְ
    וְ/תִירָֽס׃
translation:
  text: 'The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly ethnic/geographic identifications in later usage: ''Madai''
      = ''the Medes,'' and ''Javan'' = ''Ionia'' or ''the Greeks.'' The main text
      preserves the Hebrew genealogical names by transliteration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. 'Sons of' is the most
    direct and conventional rendering in this context, preserving the male-line genealogical
    framing of the Hebrew rather than broadening to 'descendants' or 'children.'
- source_word: יֶפֶת
  chosen: Japheth
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: גֹּמֶר
  chosen: Gomer
  lexicon: HALOT
  rationale: Proper name in the list of Japheth's sons; transliterated rather than
    translated.
- source_word: מָגוֹג
  chosen: Magog
  lexicon: HALOT
  rationale: Proper name, likely ethnogeographic in later associations, but here functioning
    as a name in the genealogy; transliterated.
- source_word: מָדַי
  chosen: Madai
  alternatives:
  - the Medes
  lexicon: HALOT
  rationale: Although the name can be associated with the Medes, in this genealogical
    list it appears as a proper name. The translation preserves the Hebrew form 'Madai'
    rather than interpreting it ethnically in the main text.
- source_word: יָוָן
  chosen: Javan
  alternatives:
  - Ionia
  - the Greeks
  lexicon: HALOT
  rationale: Proper name in the table of nations. While the term can denote Ionia/Greeks
    in some contexts, here transliteration best preserves the genealogical presentation
    without importing a more interpretive ethnic label into the main text.
- source_word: תֻבָל
  chosen: Tubal
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
- source_word: מֶשֶׁךְ
  chosen: Meshech
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
- source_word: תִירָס
  chosen: Tiras
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
