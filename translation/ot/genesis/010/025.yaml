id: GEN.10.25
reference: Genesis 10:25
source:
  edition: WLC
  text: וּ/לְ/עֵ֥בֶר יֻלַּ֖ד שְׁנֵ֣י בָנִ֑ים שֵׁ֣ם הָֽ/אֶחָ֞ד פֶּ֗לֶג כִּ֤י בְ/יָמָי/ו֙
    נִפְלְגָ֣ה הָ/אָ֔רֶץ וְ/שֵׁ֥ם אָחִ֖י/ו יָקְטָֽן׃
translation:
  text: 'And to Eber two sons were born: the name of the one was Peleg, for in his
    days the earth was divided, and his brother''s name was Joktan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land was divided.' The Hebrew word can mean either 'earth' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/עֵבֶר
  chosen: And to Eber
  alternatives:
  - Now to Eber
  - To Eber
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition together naturally introduce
    the next genealogical notice. 'And to Eber' preserves the Hebrew structure while
    remaining idiomatic in English.
- source_word: יֻלַּד
  chosen: were born
  alternatives:
  - was born to
  - begot
  lexicon: HALOT
  rationale: The passive of ילד here means 'was born' in the idiom 'to X were born.'
    Because the subject is plural ('two sons'), English requires 'were born.' 'Begot'
    would misrepresent the passive form.
- source_word: שְׁנֵי בָנִים
  chosen: two sons
  alternatives:
  - two children
  lexicon: HALOT
  rationale: This is a straightforward construct phrase meaning 'two sons.' 'Sons'
    is gender-accurate and matches the source better than a neutral term.
- source_word: שֵׁם הָאֶחָד
  chosen: the name of the one
  alternatives:
  - the name of the first
  - one was named
  lexicon: HALOT
  rationale: Hebrew literally says 'the name of the one.' This is retained with light
    smoothing. 'First' is possible in context but less literal than 'one,' since the
    text contrasts 'the one' with 'his brother' rather than explicitly numbering them.
- source_word: פֶּלֶג
  chosen: Peleg
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the naming explanation. 'For' is concise and natural
    in English narrative.
- source_word: בְיָמָיו
  chosen: in his days
  alternatives:
  - during his lifetime
  lexicon: HALOT
  rationale: The phrase is idiomatic and commonly means 'in his days,' referring to
    Peleg's lifetime. This preserves the temporal expression without over-interpretation.
- source_word: נִפְלְגָה
  chosen: was divided
  alternatives:
  - was split
  - was apportioned
  lexicon: HALOT
  rationale: The Niphal of פלג denotes being divided. 'Was divided' is the most direct
    and contextually suitable rendering, and it also echoes the sound association
    with the name Peleg.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In the Table of Nations context, 'the
    earth' best fits the broad scope of peoples and dispersal, while 'land' remains
    a viable lexical alternative worth preserving.
- source_word: וְשֵׁם אָחִיו
  chosen: and his brother's name
  alternatives:
  - and the name of his brother
  lexicon: HALOT
  rationale: This keeps the Hebrew possessive structure while using natural English
    word order.
- source_word: יָקְטָן
  chosen: Joktan
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention.
