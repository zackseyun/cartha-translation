theological_decisions:
- issue: Scope of הָאָרֶץ in the explanation of Peleg's name
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The verse explains Peleg's name in the context of Genesis 10's worldwide
    genealogy of nations. Rendering אֶרֶץ as 'the earth' preserves that broader narrative
    scope without deciding the precise historical mechanism of the division. 'The
    land' is lexically possible and is preserved in a footnote because the Hebrew
    term can denote either a region or the whole earth depending on context.
  doctrine_reference: Translation philosophy §3, §5
