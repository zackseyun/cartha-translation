id: GEN.10.7
reference: Genesis 10:7
source:
  edition: WLC
  text: וּ/בְנֵ֣י כ֔וּשׁ סְבָא֙ וַֽ/חֲוִילָ֔ה וְ/סַבְתָּ֥ה וְ/רַעְמָ֖ה וְ/סַבְתְּכָ֑א
    וּ/בְנֵ֥י רַעְמָ֖ה שְׁבָ֥א וּ/דְדָֽן׃
translation:
  text: 'And the sons of Cush: Seba, Havilah, Sabtah, Raamah, and Sabteca. And the
    sons of Raamah: Sheba and Dedan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' in genealogies can denote descendants or clan/people-group
      origins, not only immediate biological sons.
    reason: cultural_note
  - marker: b
    text: Several names in this verse may refer to peoples, regions, or eponymous
      ancestors rather than only individuals.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts, 'sons
    of' is the most direct and conventional rendering, and it can denote descendants
    as well as immediate sons. 'And' reflects the prefixed conjunction.
- source_word: כּוּשׁ
  chosen: Cush
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names rather than
    translate them.
- source_word: סְבָא
  chosen: Seba
  lexicon: HALOT
  rationale: Proper name/place-name in the Table of Nations; transliterated rather
    than interpreted ethnographically.
- source_word: חֲוִילָה
  chosen: Havilah
  lexicon: HALOT
  rationale: Proper name; standard English transliteration retained.
- source_word: סַבְתָּה
  chosen: Sabtah
  alternatives:
  - Sabta
  lexicon: HALOT
  rationale: Proper name; 'Sabtah' follows common English transliteration from the
    Hebrew form. 'Sabta' is a possible simplified transliteration but less standard
    in English Bible tradition.
- source_word: רַעְמָה
  chosen: Raamah
  alternatives:
  - Ragmah
  lexicon: HALOT
  rationale: Proper name; 'Raamah' is the standard English transliteration reflecting
    the Hebrew vowels. Alternative spellings are less established.
- source_word: סַבְתְּכָא
  chosen: Sabteca
  alternatives:
  - Sabtechah
  lexicon: HALOT
  rationale: Proper name; 'Sabteca' is a readable modern transliteration. 'Sabtechah'
    more closely mirrors the final Hebrew consonant-he sequence but is less idiomatic
    in English.
- source_word: וּבְנֵי רַעְמָה
  chosen: And the sons of Raamah
  alternatives:
  - And the descendants of Raamah
  lexicon: HALOT
  rationale: The repeated genealogical formula is preserved for clarity and structural
    fidelity. 'Descendants' is possible semantically, but 'sons' better matches the
    Hebrew wording and the style of the genealogy.
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper name/place-name; standard English transliteration retained.
- source_word: דְדָן
  chosen: Dedan
  alternatives:
  - Dedanite
  lexicon: HALOT
  rationale: Proper name; transliterated directly. The text names the ancestor/group,
    not an adjectival ethnonym.
