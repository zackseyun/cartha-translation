id: GEN.10.13
reference: Genesis 10:13
source:
  edition: WLC
  text: וּ/מִצְרַ֡יִם יָלַ֞ד אֶת לוּדִ֧ים וְ/אֶת עֲנָמִ֛ים וְ/אֶת לְהָבִ֖ים וְ/אֶת
    נַפְתֻּחִֽים־־־־׃
translation:
  text: And Mizraim fathered the Ludim, the Anamim, the Lehabim, and the Naphtuhim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'begot' or 'became the father of'; the Hebrew verb is the standard genealogical
      term for producing descendants.
    reason: lexical_alternative
  - marker: b
    text: These names are rendered as transliterated people-group names rather than
      translated place names or later ethnic identifications.
    reason: cultural_note
lexical_decisions:
- source_word: מִצְרַיִם
  chosen: Mizraim
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Transliterated as a proper name in the Table of Nations context, following
    the philosophy to transliterate names rather than translate them. Although the
    name is associated with Egypt, here it functions as the eponymous ancestor.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts this verb commonly denotes male procreation/ancestry.
    'Fathered' is natural modern English and preserves the genealogical force better
    than the more wooden 'begot' or the less direct 'became the father of'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: לוּדִים
  chosen: the Ludim
  alternatives:
  - Ludites
  - Ludim people
  lexicon: HALOT
  rationale: Rendered as a transliterated ethnonym/plural people-group name. The article
    is supplied in English for natural coordination in a list of peoples descended
    from Mizraim.
- source_word: עֲנָמִים
  chosen: the Anamim
  alternatives:
  - Anamites
  - Anamim people
  lexicon: HALOT
  rationale: Rendered as a transliterated ethnonym/plural people-group name, preserving
    the proper-name character of the genealogy.
- source_word: לְהָבִים
  chosen: the Lehabim
  alternatives:
  - Lehabites
  - Lubim
  lexicon: HALOT
  rationale: Rendered as a transliterated ethnonym. 'Lehabim' closely reflects the
    Hebrew form; alternative identifications or traditional associations are not certain
    enough to place in the main text.
- source_word: נַפְתֻּחִים
  chosen: the Naphtuhim
  alternatives:
  - Naphtuhites
  lexicon: HALOT
  rationale: Rendered as a transliterated ethnonym/plural people-group name, preserving
    the Hebrew form in this genealogical list.
- source_word: וְ
  chosen: and
  lexicon: Hebrew grammar
  rationale: Standard conjunction linking the final coordinated elements in the genealogy.
