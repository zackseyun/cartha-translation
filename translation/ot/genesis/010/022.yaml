id: GEN.10.22
reference: Genesis 10:22
source:
  edition: WLC
  text: בְּנֵ֥י שֵׁ֖ם עֵילָ֣ם וְ/אַשּׁ֑וּר וְ/אַרְפַּכְשַׁ֖ד וְ/ל֥וּד וַֽ/אֲרָֽם׃
translation:
  text: 'The sons of Shem: Elam, Asshur, Arpachshad, Lud, and Aram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Arpachshad'; traditional English influenced by the Greek often reads
      'Arphaxad.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew names 'Asshur' and 'Aram' are often associated with the regions/peoples
      later known as Assyria and Syria.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן. In genealogical context, 'sons of' is the most
    direct and conventional rendering, preserving the male-line/genealogical framing
    of the Hebrew. 'Descendants of' would be more interpretive and broader than the
    immediate wording.
- source_word: שֵׁם
  chosen: Shem
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name/toponym used here as a genealogical descendant name; standard
    English transliteration is retained.
- source_word: אַשּׁוּר
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: The Hebrew form is the proper name Asshur. Although the name can be associated
    with the nation/region Assyria, in this genealogy the list presents named descendants,
    so the transliterated personal/genealogical form best matches the source structure.
- source_word: אַרְפַּכְשַׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  lexicon: HALOT
  rationale: Proper name; 'Arpachshad' closely reflects the Hebrew spelling. 'Arphaxad'
    reflects Greek/traditional English influence rather than the Hebrew form, so the
    Hebrew-based transliteration is preferred.
- source_word: לוּד
  chosen: Lud
  alternatives:
  - Ludim
  lexicon: HALOT
  rationale: Proper name in singular form here; 'Lud' directly represents the Hebrew.
    'Ludim' would be a different form/name and is not the reading of this verse.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Proper name; transliteration preserves the Hebrew name. 'Syria' would
    be a later geographical equivalent and less precise in a genealogical list.
