id: GEN.10.4
reference: Genesis 10:4
source:
  edition: WLC
  text: וּ/בְנֵ֥י יָוָ֖ן אֱלִישָׁ֣ה וְ/תַרְשִׁ֑ישׁ כִּתִּ֖ים וְ/דֹדָנִֽים׃
translation:
  text: 'And the sons of Javan: Elishah, Tarshish, Kittim, and Dodanim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and 1 Chronicles 1:7 read 'Rodanim' instead of 'Dodanim.'
    reason: textual_variant
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'son' and in genealogical contexts
    commonly introduces immediate sons or lineal descendants. 'Sons of' is the most
    direct rendering and preserves the genealogical form of the Hebrew; 'descendants
    of' is possible interpretively but less formally precise here.
- source_word: יָוָן
  chosen: Javan
  alternatives:
  - Iavan
  lexicon: HALOT
  rationale: Proper name referring to Javan, traditionally associated with the Ionian/Greek
    peoples. Per translation philosophy, personal names are transliterated rather
    than translated.
- source_word: אֱלִישָׁה
  chosen: Elishah
  lexicon: HALOT
  rationale: Proper name/toponym in the Table of Nations. Standard English transliteration
    is retained.
- source_word: וְ/תַרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: Proper name, likely a place or people-name in this genealogical list.
    Transliterated in keeping with the treatment of names.
- source_word: כִּתִּים
  chosen: Kittim
  alternatives:
  - Chittim
  lexicon: HALOT
  rationale: Ethnonym/place-name traditionally rendered 'Kittim.' 'Chittim' reflects
    older English spelling conventions, but 'Kittim' better matches modern transliteration
    practice and readability.
- source_word: וְ/דֹדָנִים
  chosen: Dodanim
  alternatives:
  - Rodanim
  lexicon: HALOT
  rationale: The MT reads דֹדָנִים, yielding 'Dodanim.' A well-known variant tradition
    reads 'Rodanim' (cf. 1 Chr 1:7 and some ancient witnesses). The main text follows
    the provided Hebrew source text (WLC/MT), while the alternative is preserved in
    a footnote as a textual variant.
