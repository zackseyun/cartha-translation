id: GEN.10.18
reference: Genesis 10:18
source:
  edition: WLC
  text: וְ/אֶת הָֽ/אַרְוָדִ֥י וְ/אֶת הַ/צְּמָרִ֖י וְ/אֶת הַֽ/חֲמָתִ֑י וְ/אַחַ֣ר נָפֹ֔צוּ
    מִשְׁפְּח֖וֹת הַֽ/כְּנַעֲנִֽי־־־׃
translation:
  text: and the Arvadites, the Zemarites, and the Hamathites. Afterward the clans
    of the Canaanites were scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the families of the Canaanite.” The Hebrew uses a collective gentilic
      singular (“the Canaanite”) to refer to the people group.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַרְוָדִי
  chosen: the Arvadites
  alternatives:
  - the Arvadite
  - the people of Arvad
  lexicon: HALOT
  rationale: In the Table of Nations context, these gentilics function collectively
    for peoples/clans descended from Canaan. English plural ethnonyms best reflect
    the sense.
- source_word: הַצְּמָרִי
  chosen: the Zemarites
  alternatives:
  - the Zemarite
  - the people of Zemar
  lexicon: HALOT
  rationale: Like the surrounding gentilics, this is best rendered as a collective
    ethnic/group name in plural English.
- source_word: הַחֲמָתִי
  chosen: the Hamathites
  alternatives:
  - the Hamathite
  - the people of Hamath
  lexicon: HALOT
  rationale: Collective gentilic in a list of peoples; plural English is the most
    natural equivalent.
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - and afterward
  - later
  lexicon: HALOT
  rationale: Temporal adverb marking what followed the listed descendants. 'Afterward'
    is natural English and preserves sequence.
- source_word: נָפֹצוּ
  chosen: were scattered
  alternatives:
  - spread out
  - dispersed
  lexicon: HALOT
  rationale: The Niphal form conveys passive/intransitive dispersal. 'Were scattered'
    preserves the likely passive/resultative sense better than the more neutral 'spread
    out'.
- source_word: מִשְׁפְּחוֹת
  chosen: the clans
  alternatives:
  - the families
  lexicon: HALOT
  rationale: In genealogical and ethnographic contexts, מִשְׁפָּחוֹת commonly denotes
    kinship groups larger than nuclear families. 'Clans' fits the Table of Nations
    context better than 'families'.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Though morphologically singular gentilic with article, in context it
    is a collective referring to the people group as a whole. English plural 'the
    Canaanites' communicates this clearly.
