id: GEN.10.23
reference: Genesis 10:23
source:
  edition: WLC
  text: וּ/בְנֵ֖י אֲרָ֑ם ע֥וּץ וְ/ח֖וּל וְ/גֶ֥תֶר וָ/מַֽשׁ׃
translation:
  text: 'The sons of Aram: Uz, Hul, Gether, and Mash.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Mash; 1 Chronicles 1:17 has Meshech.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In this genealogical
    context, 'sons of' is the most direct and conventional rendering, preserving the
    lineage formula. The conjunction is not separately represented in English because
    the verse naturally begins a new clause in the list.
- source_word: אֲרָם
  chosen: Aram
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal and ethnic names are
    transliterated rather than translated.
- source_word: עוּץ
  chosen: Uz
  alternatives:
  - Uts
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention as 'Uz.'
- source_word: חוּל
  chosen: Hul
  alternatives:
  - Chul
  lexicon: HALOT
  rationale: Proper name transliterated in a standard English form. 'Hul' is the conventional
    rendering in English Bible tradition and adequately reflects the Hebrew name.
- source_word: גֶּתֶר
  chosen: Gether
  lexicon: HALOT
  rationale: Proper name transliterated directly into English.
- source_word: מַשׁ
  chosen: Mash
  alternatives:
  - Meshech
  lexicon: HALOT
  rationale: The MT reads מַשׁ, best rendered 'Mash.' Some ancient versions and cross-tradition
    comparisons associate this name with 'Meshech' (cf. 1 Chr 1:17), but the Hebrew
    text here supports 'Mash' in the main text.
