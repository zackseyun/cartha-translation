id: GEN.10.31
reference: Genesis 10:31
source:
  edition: WLC
  text: אֵ֣לֶּה בְנֵי שֵׁ֔ם לְ/מִשְׁפְּחֹתָ֖/ם לִ/לְשֹׁנֹתָ֑/ם בְּ/אַרְצֹתָ֖/ם לְ/גוֹיֵ/הֶֽם־׃
translation:
  text: These are the sons of Shem, by their clans, by their languages, in their lands,
    by their nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their clans ... according to their languages ... according
      to their nations.' The Hebrew uses repeated prepositions to mark classification.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Introduces the summary statement deictically. English supplies 'are'
    naturally in a verbless clause.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Formal genealogical language is appropriate here. 'Sons of Shem' preserves
    the Hebrew construction and the male-line genealogical framing better than the
    broader 'descendants.'
- source_word: שֵׁם
  chosen: Shem
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-genealogical contexts is well rendered 'clan.'
    The prefixed לְ here marks categorization/distribution; 'by' is concise and idiomatic
    in this repeated formula.
- source_word: לִלְשֹׁנֹתָם
  chosen: by their languages
  alternatives:
  - according to their languages
  - by their tongues
  lexicon: HALOT
  rationale: Though literally 'tongues,' the sense in this table-of-nations context
    is linguistic groups. 'Languages' is clear modern English and matches the contextual
    meaning.
- source_word: בְּאַרְצֹתָם
  chosen: in their lands
  alternatives:
  - in their countries
  - in their territories
  lexicon: HALOT
  rationale: אֶרֶץ in the plural here refers to geographic lands/territories occupied
    by the groups. 'Lands' is broad and natural without implying modern nation-states
    as strongly as 'countries.'
- source_word: לְגוֹיֵהֶם
  chosen: by their nations
  alternatives:
  - according to their nations
  - among their nations
  lexicon: HALOT
  rationale: גּוֹי denotes peoples/nations. The repeated לְ is rendered consistently
    as 'by' in this formulaic list, giving a clear classificatory cadence.
