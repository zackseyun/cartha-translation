theological_decisions:
- issue: Rendering the Genesis formula תּוֹלְדֹת
  chosen_reading: the generations of
  alternative_readings:
  - the account of
  - the descendants of
  rationale: This formula structures Genesis and should be rendered consistently enough
    to preserve that literary feature. 'The generations of' keeps the traditional
    and source-proximate sense without forcing a narrower interpretive choice.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Gendered term בָּנִים
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew is grammatically and semantically masculine here, and the
    genealogical context concerns named male descendants. Rendering it 'children'
    would flatten a significant lexical feature of the source.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
