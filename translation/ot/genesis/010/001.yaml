id: GEN.10.1
reference: Genesis 10:1
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ תּוֹלְדֹ֣ת בְּנֵי נֹ֔חַ שֵׁ֖ם חָ֣ם וָ/יָ֑פֶת וַ/יִּוָּלְד֥וּ לָ/הֶ֛ם
    בָּנִ֖ים אַחַ֥ר הַ/מַּבּֽוּל־׃
translation:
  text: 'Now these are the generations of the sons of Noah: Shem, Ham, and Japheth.
    Sons were born to them after the flood.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'These are the descendants of the sons of Noah.' The Hebrew heading term
      'generations' can refer broadly to lineage or what issues from a person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative introduces a new section in narrative.
    'Now these are' is natural modern English and preserves the discourse-marking
    force better than a bare 'These are,' while avoiding overly wooden style.
- source_word: תּוֹלְדֹת
  chosen: the generations of
  alternatives:
  - the account of
  - the descendants of
  - the family records of
  lexicon: HALOT
  rationale: תּוֹלְדֹת is the recurring Genesis heading formula. 'Generations of'
    preserves the formal linkage with the book's structure and can encompass both
    lineage and what proceeds from a person. 'Descendants of' is possible but narrows
    the formula too much.
- source_word: בְּנֵי נֹחַ
  chosen: the sons of Noah
  alternatives:
  - Noah's sons
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The sons of Noah' is slightly more
    formal and fits the heading style of the verse.
- source_word: שֵׁם חָם וָיָפֶת
  chosen: Shem, Ham, and Japheth
  lexicon: HALOT
  rationale: These are personal names and are transliterated according to the project's
    policy to transliterate names rather than translate them.
- source_word: וַ/יִּוָּלְדוּ
  chosen: were born
  alternatives:
  - were fathered
  - were begotten
  lexicon: HALOT
  rationale: 'Nifal of ילד here is passive/intransitive: ''were born.'' This best
    reflects the Hebrew verbal form without importing a more active sense such as
    ''fathered.'''
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition ל marks relation/possession in this idiom. 'To them'
    is the most direct rendering in English with 'were born.'
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'sons,' not a gender-neutral
    term. Per the translation philosophy, gender-accurate rendering is preferred.
    In context this refers to male descendants in the genealogical table.
- source_word: אַחַר הַמַּבּוּל
  chosen: after the flood
  alternatives:
  - after the deluge
  lexicon: HALOT
  rationale: A temporal phrase marking the post-flood setting. 'The flood' is the
    standard clear English rendering for מַבּוּל in Genesis.
