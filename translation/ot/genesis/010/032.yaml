theological_decisions:
- issue: Scope of אֶרֶץ in the post-flood dispersion summary
  chosen_reading: global 'earth' rather than local 'land'
  alternative_readings:
  - local 'land'
  rationale: Genesis 10 functions as the table of nations and summarizes the distribution of peoples descended from Noah after the flood. Rendering אֶרֶץ as 'earth' preserves the universal scope of the narrative rather than narrowing it to a specific territory.
