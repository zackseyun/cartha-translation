id: GEN.10.32
reference: Genesis 10:32
source:
  edition: WLC
  text: אֵ֣לֶּה מִשְׁפְּחֹ֧ת בְּנֵי נֹ֛חַ לְ/תוֹלְדֹתָ֖/ם בְּ/גוֹיֵ/הֶ֑ם וּ/מֵ/אֵ֜לֶּה נִפְרְד֧וּ הַ/גּוֹיִ֛ם בָּ/אָ֖רֶץ אַחַ֥ר הַ/מַּבּֽוּל־׃פ
translation:
  text: These are the families of the sons of Noah, according to their genealogies, by their nations; and from these the nations were divided on the earth after the flood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clans' for 'families.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were separated' or 'spread out' for 'were divided.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their generations, in their nations'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  chosen: families
  alternatives:
  - clans
  lexicon: HALOT
  rationale: The noun denotes kinship groupings or family divisions. 'Families' is natural English and fits the genealogical summary; 'clans' is possible but slightly more anthropological and less transparent for modern readers.
- source_word: לְתוֹלְדֹתָם
  chosen: according to their generations
  alternatives:
  - by their descendants
  - according to their genealogies
  lexicon: HALOT
  rationale: תּוֹלְדוֹת can refer to generations, descendants, or genealogical lines. Here it summarizes the table of nations, so 'according to their generations' preserves the formal genealogical sense without over-paraphrasing.
- source_word: בְּגוֹיֵהֶם
  chosen: in their nations
  alternatives:
  - by their nations
  - among their nations
  lexicon: HALOT
  rationale: גוֹי here refers to nation-peoples. The preposition ב is rendered 'in' as a straightforward locative/associative summary of how these family lines existed as distinct nations.
- source_word: וּמֵאֵלֶּה
  chosen: and from these
  alternatives:
  - from these
  lexicon: HALOT
  rationale: The conjunction plus preposition naturally yields 'and from these,' linking the summary statement to the preceding genealogy.
- source_word: נִפְרְדוּ
  chosen: were divided
  alternatives:
  - spread out
  - separated
  lexicon: HALOT
  rationale: The Niphal of פרד conveys separation or division. 'Were divided' best matches the passive/reflexive sense in context of the nations branching out after the flood. 'Spread out' captures result but weakens the lexical idea of separation.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  lexicon: HALOT
  rationale: גוֹיִם in Genesis 10 refers to the distinct national groupings descended from Noah's sons. 'Nations' is the standard and contextually precise rendering.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - in the land
  lexicon: HALOT
  rationale: אֶרֶץ here is global rather than local, since the verse summarizes post-flood human dispersion. 'On the earth' best reflects that broad scope.
- source_word: אַחַר הַמַּבּוּל
  chosen: after the flood
  lexicon: HALOT
  rationale: A direct and idiomatic rendering of the temporal phrase, referring to the deluge narrative just concluded in the broader context.
