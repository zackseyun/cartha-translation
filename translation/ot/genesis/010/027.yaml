id: GEN.10.27
reference: Genesis 10:27
source:
  edition: WLC
  text: וְ/אֶת הֲדוֹרָ֥ם וְ/אֶת אוּזָ֖ל וְ/אֶת דִּקְלָֽה־־־׃
translation:
  text: and Hadoram, and Uzal, and Diklah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: These are proper names in the Table of Nations; English tradition varies
      only slightly in spelling, not in meaning.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - also left untranslated except as object marker coordination
  lexicon: HALOT
  rationale: Here אֵת is the direct-object marker introducing items in a genealogy
    list, preceded by conjunction וְ. In English such lists are naturally rendered
    by simple coordination, so 'and' conveys the list structure without awkwardly
    representing the untranslatable object marker.
- source_word: הֲדוֹרָם
  chosen: Hadoram
  alternatives:
  - Hadoram (variant spellings not preferred)
  lexicon: HALOT
  rationale: Proper personal/place name in a genealogy; per translation philosophy,
    names are transliterated rather than translated. 'Hadoram' is the standard English
    transliteration of the Hebrew form.
- source_word: אוּזָל
  chosen: Uzal
  alternatives:
  - Uzal (variant spellings not preferred)
  lexicon: HALOT
  rationale: Proper name; transliterated directly into standard English form.
- source_word: דִּקְלָה
  chosen: Diklah
  alternatives:
  - Diklah
  - Dיקלah
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated. 'Diklah' reflects
    the consonants and common English transliteration practice for this genealogical
    name.
