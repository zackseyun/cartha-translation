id: GEN.10.10
reference: Genesis 10:10
source:
  edition: WLC
  text: וַ/תְּהִ֨י רֵאשִׁ֤ית מַמְלַכְתּ/וֹ֙ בָּבֶ֔ל וְ/אֶ֖רֶךְ וְ/אַכַּ֣ד וְ/כַלְנֵ֑ה
    בְּ/אֶ֖רֶץ שִׁנְעָֽר׃
translation:
  text: The beginning of his kingdom was Babel, Erech, Accad, and Calneh, in the land
    of Shinar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Babylon' for Babel.
    reason: lexical_alternative
  - marker: b
    text: Erech is commonly identified with ancient Uruk; Accad with Akkad.
    reason: cultural_note
lexical_decisions:
- source_word: וַתְּהִי
  chosen: was
  alternatives:
  - came to be
  - became
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as a simple past copula
    introducing the description of Nimrod's realm. 'Was' is the most natural English
    rendering in this list-like clause.
- source_word: רֵאשִׁית
  chosen: The beginning of
  alternatives:
  - the first part of
  - the chief part of
  lexicon: HALOT
  rationale: רֵאשִׁית can denote beginning, first, or chief part. In this context
    with 'his kingdom' and a list of cities, 'the beginning of' best captures the
    sense of the initial center or earliest extent of his kingdom without overinterpreting
    it as 'chief city' or 'capital.'
- source_word: מַמְלַכְתּוֹ
  chosen: his kingdom
  alternatives:
  - his reign
  - his royal domain
  lexicon: HALOT
  rationale: The noun denotes kingdom, kingship, or royal rule. Because the verse
    lists cities comprising Nimrod's realm, 'kingdom' is the clearest and most idiomatic
    choice.
- source_word: בָּבֶל
  chosen: Babel
  alternatives:
  - Babylon
  lexicon: HALOT
  rationale: As a proper name, it is transliterated rather than translated, in keeping
    with project policy. 'Babel' also preserves the literary connection with Genesis
    11 more directly than 'Babylon.'
- source_word: אֶרֶךְ
  chosen: Erech
  alternatives:
  - Uruk
  lexicon: HALOT
  rationale: The Hebrew proper name is conventionally transliterated as 'Erech' in
    English Bible tradition. 'Uruk' reflects the city's broader ancient Near Eastern
    identification, but the translation follows the Hebrew form in the text.
- source_word: אַכַּד
  chosen: Accad
  alternatives:
  - Akkad
  lexicon: HALOT
  rationale: This is a proper name. 'Accad' is a standard English biblical transliteration
    from the Hebrew form; 'Akkad' is a historically informed alternative but less
    directly tied to the Hebrew spelling.
- source_word: כַלְנֵה
  chosen: Calneh
  alternatives:
  - Calno
  lexicon: HALOT
  rationale: The Masoretic Text here reads 'Calneh.' 'Calno' appears elsewhere as
    a related place-name and may be considered by some, but the present verse's form
    is best represented by 'Calneh.'
- source_word: בְּאֶרֶץ שִׁנְעָר
  chosen: in the land of Shinar
  alternatives:
  - in Shinar
  - in the country of Shinar
  lexicon: HALOT
  rationale: אֶרֶץ commonly means land/earth/country. 'In the land of Shinar' is a
    natural rendering that preserves the geographic designation without flattening
    it to a bare place-name.
