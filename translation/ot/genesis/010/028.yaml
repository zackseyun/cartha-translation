id: GEN.10.28
reference: Genesis 10:28
source:
  edition: WLC
  text: וְ/אֶת עוֹבָ֥ל וְ/אֶת אֲבִֽימָאֵ֖ל וְ/אֶת שְׁבָֽא־־־׃
translation:
  text: and Obal, and Abimael, and Sheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the object marker with each name: ''and [obj.] Obal, and
      [obj.] Abimael, and [obj.] Sheba.'' English normally leaves the object marker
      untranslated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - and ... [object marker left untranslated]
  lexicon: HALOT
  rationale: The conjunction וְ means 'and.' The particle אֶת marks a definite direct
    object in Hebrew but has no direct English equivalent here. In this genealogical
    list, natural English represents the repeated וְאֶת sequence simply by repeating
    'and' before each name.
- source_word: עוֹבָל
  chosen: Obal
  alternatives:
  - Oval
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated per project philosophy.
    'Obal' follows standard English convention for this Hebrew form.
- source_word: אֲבִימָאֵל
  chosen: Abimael
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention. No translation of
    the name's internal elements is appropriate in a genealogical list.
- source_word: שְׁבָא
  chosen: Sheba
  alternatives:
  - Seba
  lexicon: HALOT
  rationale: Proper name/place-name form; transliterated as 'Sheba,' the standard
    rendering for שׁבא in this context. 'Seba' would reflect a different Hebrew spelling/name
    elsewhere, so it is not preferred here.
