theological_decisions:
- issue: Subject and referent of אַשּׁוּר
  chosen_reading: 'Asshur is the subject: ''Asshur went out'''
  alternative_readings:
  - '''He went out into Assyria'' (with Nimrod as the implied subject from the previous
    verse)'
  rationale: The Hebrew consonantal text allows either reading because אַשּׁוּר can
    denote Asshur or Assyria. The immediate clause naturally reads with אַשּׁוּר as
    the explicit subject following the verb, and this avoids importing the previous
    verse's subject into this clause. Because the ambiguity is genuine and longstanding,
    the alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
