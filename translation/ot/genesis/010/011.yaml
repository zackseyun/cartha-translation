id: GEN.10.11
reference: Genesis 10:11
source:
  edition: WLC
  text: מִן הָ/אָ֥רֶץ הַ/הִ֖וא יָצָ֣א אַשּׁ֑וּר וַ/יִּ֨בֶן֙ אֶת נִ֣ינְוֵ֔ה וְ/אֶת
    רְחֹבֹ֥ת עִ֖יר וְ/אֶת כָּֽלַח־־־־׃
translation:
  text: From that land Asshur went out and built Nineveh, Rehoboth-Ir, and Calah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'From that land he went out into Assyria and built Nineveh, Rehoboth-Ir,
      and Calah,' taking the subject as Nimrod from the previous verse and אַשּׁוּר
      as the region Assyria rather than the person Asshur.
    reason: alternative_reading
lexical_decisions:
- source_word: מִן הָ/אָ֥רֶץ הַ/הִ֖וא
  chosen: From that land
  alternatives:
  - Out of that land
  - From that country
  lexicon: HALOT
  rationale: מִן marks source/origin, and אֶרֶץ here refers to a territorial region
    rather than soil. 'From that land' is natural English and preserves the geographic
    sense.
- source_word: יָצָ֣א
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: The verb יצא commonly means 'go out/come out.' 'Went out' fits the narrative
    movement from the previously mentioned land and avoids archaic 'went forth.'
- source_word: אַשּׁ֑וּר
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: As a proper noun, this may denote either the person Asshur or the region
    Assyria. Given the singular verb sequence ('went out' ... 'built') and the immediate
    syntax, the personal-name rendering 'Asshur' is retained in the main text. The
    regional reading is preserved in a footnote because the Hebrew is genuinely ambiguous
    and some translations construe Nimrod as the subject entering Assyria.
- source_word: וַ/יִּ֨בֶן֙
  chosen: built
  alternatives:
  - founded
  lexicon: HALOT
  rationale: בנה is the standard verb 'build.' 'Built' is the most direct rendering;
    'founded' is interpretive and narrower.
- source_word: נִ֣ינְוֵ֔ה
  chosen: Nineveh
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: רְחֹבֹ֥ת עִ֖יר
  chosen: Rehoboth-Ir
  alternatives:
  - Rehoboth of the city
  - city squares
  lexicon: HALOT
  rationale: In this genealogy/table-of-nations context, the expression is best taken
    as a place name, conventionally transliterated 'Rehoboth-Ir.' A more literal rendering
    such as 'broad places of the city' is possible lexically but less likely here
    because it appears in a list of cities marked by repeated אֶת.
- source_word: כָּֽלַח
  chosen: Calah
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
