theological_decisions:
- issue: Syntactic attachment of הַגָּדוֹל in relation to Shem and Japheth
  chosen_reading: 'It modifies Shem: ''the older brother of Japheth.'''
  alternative_readings:
  - 'It modifies Japheth: ''the brother of Japheth the elder.'''
  rationale: The Hebrew permits either attachment. This is not a doctrinal issue but
    a genealogical ambiguity. In keeping with the translation philosophy, the main
    text adopts one plausible reading while preserving the alternative in a footnote
    rather than overstating certainty.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it (applied here to genuine syntactic ambiguity).'
