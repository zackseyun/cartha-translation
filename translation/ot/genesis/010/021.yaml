id: GEN.10.21
reference: Genesis 10:21
source:
  edition: WLC
  text: וּ/לְ/שֵׁ֥ם יֻלַּ֖ד גַּם ה֑וּא אֲבִי֙ כָּל בְּנֵי עֵ֔בֶר אֲחִ֖י יֶ֥פֶת הַ/גָּדֽוֹל־־־׃
translation:
  text: And to Shem also, the father of all the sons of Eber, the older brother of
    Japheth, children were born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the brother of Japheth the elder.' The Hebrew adjective 'great/older'
      may modify either Shem or Japheth.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/לְ/שֵׁם
  chosen: And to Shem also
  alternatives:
  - And to Shem
  - Now to Shem also
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce Shem as another member
    of the genealogy. Rendering with fronted 'And to Shem also' preserves the Hebrew
    discourse flow and the additive sense in context.
- source_word: יֻלַּד
  chosen: children were born
  alternatives:
  - was born
  - were born
  lexicon: HALOT
  rationale: The passive of ילד with a singular verb can idiomatically introduce offspring
    being born to someone. English requires an explicit plural subject for natural
    style; 'children were born' captures the genealogical sense better than a wooden
    singular.
- source_word: גַּם הוּא
  chosen: also
  alternatives:
  - he also
  - also he
  lexicon: HALOT
  rationale: The combination adds emphasis that Shem too had descendants. In English,
    the emphasis is naturally carried by 'also' without needing an explicit 'he' in
    the main clause.
- source_word: אֲבִי כָּל בְּנֵי עֵבֶר
  chosen: the father of all the sons of Eber
  alternatives:
  - ancestor of all the sons of Eber
  - father of all the descendants of Eber
  lexicon: HALOT
  rationale: אָב in genealogical contexts can denote progenitor/ancestor, but 'father'
    is the direct and standard rendering. 'Sons of Eber' is retained formally rather
    than flattened to 'Hebrews' or 'descendants,' since the text names Eber specifically.
- source_word: אֲחִי יֶפֶת
  chosen: the older brother of Japheth
  alternatives:
  - the brother of Japheth
  lexicon: HALOT
  rationale: The construct phrase means 'brother of Japheth.' Because הַגָּדוֹל most
    naturally qualifies Shem in apposition here, the phrase is rendered 'the older
    brother of Japheth.' The simpler 'brother of Japheth' is possible if the adjective
    is taken with Japheth instead.
- source_word: הַגָּדוֹל
  chosen: older
  alternatives:
  - great
  - elder
  - Japheth the elder
  lexicon: HALOT
  rationale: In kinship context גדול commonly denotes age/seniority rather than greatness.
    The main syntactic question is whether it modifies Shem ('the older brother')
    or Japheth ('brother of Japheth the elder'). The main text follows the former
    as the more natural English and a common interpretation, while preserving the
    alternative in a footnote.
