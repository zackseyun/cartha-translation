theological_decisions:
- issue: Referent of 'that is the great city'
  chosen_reading: The clause is left as written without resolving whether 'the great
    city' refers specifically to Resen or more broadly to the Nineveh-Calah urban
    complex.
  alternative_readings:
  - It refers specifically to Resen.
  - It refers to the larger metropolitan region including Nineveh, Resen, and Calah.
  rationale: The Hebrew syntax permits debate about the precise referent of the final
    appositional clause. Because the text itself does not explicitly settle the question,
    the translation preserves the wording without interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
