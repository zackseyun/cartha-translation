id: GEN.10.12
reference: Genesis 10:12
source:
  edition: WLC
  text: וְֽ/אֶת רֶ֔סֶן בֵּ֥ין נִֽינְוֵ֖ה וּ/בֵ֣ין כָּ֑לַח הִ֖וא הָ/עִ֥יר הַ/גְּדֹלָֽה־׃
translation:
  text: and Resen, between Nineveh and Calah—that is the great city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Kalhu,' reflecting the Assyrian form of the place name traditionally
      rendered 'Calah.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'that is the great city' may refer specifically to Resen or to
      the larger urban region between Nineveh and Calah.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: In this city-building list, וְ plus the object marker אֵת introduces
    another item in the sequence. English does not require an explicit object marker,
    so the sense is carried by 'and' before the place name.
- source_word: רֶסֶן
  chosen: Resen
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  alternatives:
  - between ... and also
  lexicon: HALOT
  rationale: Standard rendering of the correlative prepositional construction marking
    Resen's location relative to Nineveh and Calah.
- source_word: נִינְוֵה
  chosen: Nineveh
  lexicon: HALOT
  rationale: Established English transliteration of the place name.
- source_word: כָּלַח
  chosen: Calah
  alternatives:
  - Kalhu
  lexicon: HALOT
  rationale: Traditional biblical English form 'Calah' is a standard transliteration
    of the Hebrew place name. 'Kalhu' reflects the Assyrian form and is worth preserving
    as a lexical alternative, but the Hebrew text itself supports the conventional
    biblical form in translation.
- source_word: הִוא
  chosen: that is
  alternatives:
  - it is
  - which is
  lexicon: HALOT
  rationale: The independent pronoun functions here as a resumptive/copular element.
    'That is' reads naturally in English while preserving the explanatory force.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - city
  lexicon: HALOT
  rationale: Definite noun with article; rendered straightforwardly as 'the city'.
- source_word: הַגְּדֹלָה
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: גדול commonly means 'great' or 'large.' 'Great' is the more idiomatic
    biblical English collocation with 'city' and can include prominence as well as
    size.
