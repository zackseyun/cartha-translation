id: GEN.10.17
reference: Genesis 10:17
source:
  edition: WLC
  text: וְ/אֶת הַֽ/חִוִּ֥י וְ/אֶת הַֽ/עַרְקִ֖י וְ/אֶת הַ/סִּינִֽי־־־׃
translation:
  text: and the Hivites, the Arkites, and the Sinites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Hivite clan,' 'the Arkite clan,' and 'the Sinite clan.' The Hebrew
      uses singular gentilic forms with the article, functioning collectively for
      peoples or clans.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and also
  - as well as
  lexicon: HALOT
  rationale: In this genealogical list, וְ plus the object marker אֶת introduces another
    item in the series. English does not require an object marker here, so only the
    conjunction sense is carried over.
- source_word: הַחִוִּי
  chosen: the Hivites
  alternatives:
  - the Hivite clan
  - the Hivite people
  lexicon: HALOT
  rationale: This is an ethnonym/designation for a people group descended from Canaan
    in the table of nations. The conventional plural ethnonym 'Hivites' communicates
    the collective sense naturally in English, while retaining the article as 'the
    Hivites' in list form.
- source_word: הָעַרְקִי
  chosen: the Arkites
  alternatives:
  - the Arkite clan
  - the people of Arka
  lexicon: HALOT
  rationale: This gentilic refers to the inhabitants/descendants associated with Arka.
    'Arkites' is the standard English ethnonym and fits the pattern of the surrounding
    names in the genealogy.
- source_word: הַסִּינִי
  chosen: the Sinites
  alternatives:
  - the Sinite clan
  - the people of Sin
  lexicon: HALOT
  rationale: This is a gentilic/ethnic designation in the list of Canaanite groups.
    'Sinites' preserves the proper-name character and matches the series of ethnonyms
    in the passage.
