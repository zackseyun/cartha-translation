id: GEN.10.30
reference: Genesis 10:30
source:
  edition: WLC
  text: וַֽ/יְהִ֥י מוֹשָׁבָ֖/ם מִ/מֵּשָׁ֑א בֹּאֲ/כָ֥ה סְפָ֖רָ/ה הַ֥ר הַ/קֶּֽדֶם׃
translation:
  text: And their settlement extended from Mesha as you go toward Sephar, the hill
    country of the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their dwelling was from Mesha toward Sephar, the mountain of the east.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... extended
  alternatives:
  - And ... was
  - And ... came to be
  lexicon: HALOT
  rationale: The wayyiqtol of היה introduces the clause and links it narratively.
    In English, the sense is best carried idiomatically with 'And' plus a predicate
    describing the extent of their dwelling area rather than a wooden 'and it was.'
- source_word: מוֹשָׁבָם
  chosen: their settlement
  alternatives:
  - their dwelling
  - their habitation
  - the place where they lived
  lexicon: HALOT
  rationale: מוֹשָׁב denotes dwelling place or settlement. 'Settlement' fits a territorial
    description in the Table of Nations better than the more individual 'dwelling.'
- source_word: מִמֵּשָׁא
  chosen: from Mesha
  alternatives:
  - from Masha
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated. 'Mesha' follows
    common English convention for the Hebrew proper noun.
- source_word: בֹּאֲכָה
  chosen: as you go toward
  alternatives:
  - in the direction of
  - toward the approach to
  - going toward
  lexicon: HALOT
  rationale: From בוא in an infinitive/construct-like directional expression, this
    idiom marks movement toward a place. 'As you go toward' is a natural English rendering
    of the geographic formula.
- source_word: סְפָרָה
  chosen: Sephar
  alternatives:
  - Sefar
  lexicon: HALOT
  rationale: Proper noun, transliterated by standard convention. The directional he
    is reflected in the motion phrase rather than separately translated.
- source_word: הַר
  chosen: the hill country
  alternatives:
  - the mountain
  - the mountains
  lexicon: HALOT
  rationale: In a geographic boundary description, הַר can denote mountainous region
    or hill country, not merely a single peak. 'Hill country' is more idiomatic and
    likely reflects the regional sense here.
- source_word: הַקֶּדֶם
  chosen: of the east
  alternatives:
  - of the east country
  - eastward
  - in the east
  lexicon: HALOT
  rationale: קֶדֶם here denotes the east/eastern region. The construct-like phrase
    with הַר is best rendered 'the hill country of the east' to preserve the territorial
    description.
