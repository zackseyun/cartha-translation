id: GEN.10.14
reference: Genesis 10:14
source:
  edition: WLC
  text: וְֽ/אֶת פַּתְרֻסִ֞ים וְ/אֶת כַּסְלֻחִ֗ים אֲשֶׁ֨ר יָצְא֥וּ מִ/שָּׁ֛ם פְּלִשְׁתִּ֖ים
    וְ/אֶת כַּפְתֹּרִֽים־־־׃ס
translation:
  text: and the Pathrusites, and the Casluhites (from whom the Philistines came),
    and the Caphtorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from there the Philistines came out.' The Hebrew may be understood
      as linking the Philistines' origin to the Casluhites named immediately before.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתְרֻסִים
  chosen: Pathrusites
  alternatives:
  - Pathrosites
  lexicon: HALOT
  rationale: A people-name derived from Pathros; transliterated as an ethnonym with
    the English people-group suffix -ites, following the philosophy of transliterating
    names rather than translating them.
- source_word: כַּסְלֻחִים
  chosen: Casluhites
  alternatives:
  - Kasluhites
  lexicon: HALOT
  rationale: An ethnonym of uncertain extra-biblical identification; transliteration
    best preserves the Hebrew form without overstating meaning.
- source_word: אֲשֶׁר יָצְאוּ מִשָּׁם
  chosen: from whom ... came
  alternatives:
  - from there ... came out
  - from whom ... descended
  lexicon: HALOT
  rationale: The relative clause literally reads 'from there they came out.' In English,
    attaching the clause to the immediately preceding people-group yields the natural
    sense 'from whom the Philistines came.' 'Came' is preferred over 'came out' for
    idiomatic genealogy-style English, while preserving origin language rather than
    making it more interpretive with 'descended.'
- source_word: פְּלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard English transliteration of the ethnonym.
- source_word: כַּפְתֹּרִים
  chosen: Caphtorites
  alternatives:
  - Kaphtorites
  lexicon: HALOT
  rationale: Ethnonym related to Caphtor; transliterated with -ites as a people-group
    name.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: In this genealogical list, the repeated object marker with conjunction
    is not represented woodenly in English; 'and' appropriately links the listed peoples.
