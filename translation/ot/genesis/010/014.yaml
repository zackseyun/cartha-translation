theological_decisions:
- issue: Referent of the clause 'from there/from whom the Philistines came'
  chosen_reading: 'The clause is rendered with the Casluhites as the immediate referent:
    ''the Casluhites (from whom the Philistines came)'''
  alternative_readings:
  - The clause could be taken more loosely as 'from there the Philistines came,' preserving
    the adverbial sense without specifying the immediate antecedent.
  rationale: The Hebrew uses a plural verb with the adverb 'from there,' and in the
    flow of the genealogy the most natural English construal is to connect the origin
    note to the immediately preceding group, the Casluhites. This also matches the
    traditional syntactic reading, while preserving the wording's origin sense rather
    than making a stronger ethnogenetic claim than the text states.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
