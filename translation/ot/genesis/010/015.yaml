id: GEN.10.15
reference: Genesis 10:15
source:
  edition: WLC
  text: וּ/כְנַ֗עַן יָלַ֛ד אֶת צִידֹ֥ן בְּכֹר֖/וֹ וְ/אֶת חֵֽת־־׃
translation:
  text: And Canaan fathered Sidon his firstborn, and Heth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Heth is the ancestor associated with the Hittites in the surrounding genealogy.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/כְנַעַן
  chosen: And Canaan
  alternatives:
  - Now Canaan
  - Canaan
  lexicon: HALOT
  rationale: ו conjunction is rendered as "And" to preserve the genealogical sequence.
    כנען is a proper name and is transliterated as "Canaan" in keeping with the policy
    to transliterate names.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  - sired
  lexicon: HALOT
  rationale: In a genealogy, ילד refers to begetting/producing offspring. "Fathered"
    is natural modern English and preserves the male genealogical sense better than
    the archaic "begot."
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: The direct-object marker has no direct English equivalent and is therefore
    left untranslated.
- source_word: צִידֹן
  chosen: Sidon
  alternatives:
  - Zidon
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention as "Sidon."
    "Zidon" reflects older English tradition but is less standard in modern usage.
- source_word: בְּכֹר/וֹ
  chosen: his firstborn
  alternatives:
  - his first-born
  - his eldest
  lexicon: HALOT
  rationale: The noun with 3ms suffix identifies Sidon as Canaan's firstborn. "His
    firstborn" is the most direct and idiomatic rendering.
- source_word: וְ/אֶת
  chosen: and
  lexicon: HALOT
  rationale: The conjunction plus direct-object marker introduces the second named
    descendant. English requires only "and" here.
- source_word: חֵת
  chosen: Heth
  alternatives:
  - the Hittite ancestor Heth
  lexicon: HALOT
  rationale: Proper name transliterated as "Heth." Although this figure is progenitor
    of the Hittites in the table of nations, the Hebrew here gives only the personal
    name, so no explanatory expansion is added to the main text.
