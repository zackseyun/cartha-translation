id: GEN.10.8
reference: Genesis 10:8
source:
  edition: WLC
  text: וְ/כ֖וּשׁ יָלַ֣ד אֶת נִמְרֹ֑ד ה֣וּא הֵחֵ֔ל לִֽ/הְי֥וֹת גִּבֹּ֖ר בָּ/אָֽרֶץ־׃
translation:
  text: And Cush fathered Nimrod; he began to be a mighty man on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he began to be a mighty one on the earth.'
    reason: lexical_alternative
  - marker: b
    text: '''Mighty man'' may also be rendered ''mighty one,'' ''hero,'' or ''warrior,''
      depending on how broadly גִּבּוֹר is understood here.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'in the land.' The Hebrew אֶרֶץ can mean either 'land' or 'earth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/כּוּשׁ
  chosen: And Cush
  alternatives:
  - Now Cush
  lexicon: HALOT
  rationale: וְ here is the simple conjunction linking the genealogy forward. 'Cush'
    is a personal name and is transliterated per translation philosophy.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts ילד commonly denotes begetting/fathering. 'Fathered'
    is natural modern English and preserves the male genealogical sense better than
    the archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected by the word order 'fathered Nimrod'.
- source_word: נִמְרֹד
  chosen: Nimrod
  lexicon: HALOT
  rationale: Personal name; transliterated by standard convention.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: Hebrew grammar
  rationale: Independent pronoun adds emphasis/resumption after naming Nimrod. English
    requires an explicit subject; simple 'he' carries the sense without overemphasis.
- source_word: הֵחֵל
  chosen: was the first to
  alternatives:
  - began to
  - started to
  lexicon: HALOT
  rationale: The Hiphil of חלל/החל with infinitive can mean 'begin.' In this context,
    with a characterization rather than a discrete action, English idiom is better
    served by 'was the first to become,' which captures the inception nuance and the
    likely sense that Nimrod inaugurated this status.
- source_word: לִ/הְיוֹת
  chosen: become
  alternatives:
  - be
  - to be
  lexicon: HALOT
  rationale: With הֵחֵל, the infinitive of היה yields 'began to be' or 'became.' 'Become'
    is smoother English and fits the ingressive sense.
- source_word: גִּבֹּר
  chosen: a mighty man
  alternatives:
  - a mighty one
  - a warrior
  - a hero
  lexicon: HALOT
  rationale: גִּבּוֹר denotes a strong, mighty, or valiant man. 'Mighty man' preserves
    the lexical breadth without prematurely narrowing to military 'warrior,' though
    that nuance may be present in context.
- source_word: בָּ/אָרֶץ
  chosen: in the earth
  alternatives:
  - in the land
  - on the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In the Table of Nations context, the
    broader sense 'earth' best fits the scope. 'In the earth' follows the Hebrew preposition
    closely, though idiomatically 'on the earth' is also possible.
