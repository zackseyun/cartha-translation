theological_decisions:
- issue: Scope of אֶרֶץ
  chosen_reading: earth (global scope)
  alternative_readings:
  - land (regional scope)
  rationale: Within Genesis 10's nations genealogy, the broader territorial/world
    sense is more likely than a local land reference. This is a contextual rather
    than doctrinal decision.
- issue: Force of הֵחֵל לִהְיוֹת
  chosen_reading: he was the first to become
  alternative_readings:
  - he began to be
  rationale: The Hebrew can be rendered more formally as 'began to be,' but in context
    this likely marks Nimrod as the first notable exemplar of this kind of might.
    The chosen rendering communicates that nuance in clear modern English while remaining
    textually grounded.
  doctrine_reference: Translation philosophy §6; preserve source sense in readable
    modern English
