id: GEN.10.9
reference: Genesis 10:9
source:
  edition: WLC
  text: הֽוּא הָיָ֥ה גִבֹּֽר צַ֖יִד לִ/פְנֵ֣י יְהוָ֑ה עַל כֵּן֙ יֵֽאָמַ֔ר כְּ/נִמְרֹ֛ד גִּבּ֥וֹר צַ֖יִד לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: He was a mighty hunter before Yahweh; therefore it is said, “Like Nimrod, a mighty hunter before Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “in defiance of the LORD,” if the phrase is taken in a hostile sense from the broader context.
    reason: alternative_reading
lexical_decisions:
- source_word: גִבֹּר
  chosen: mighty
  alternatives:
  - powerful
  - mighty man
  lexicon: HALOT
  rationale: In construct with צַיִד, the adjective describes exceptional prowess rather than introducing a separate noun phrase ('mighty man'). 'Mighty' is concise and idiomatic in English.
- source_word: צַיִד
  chosen: hunter
  alternatives:
  - hunting
  - game hunter
  lexicon: HALOT
  rationale: Although the noun can denote 'hunting' or 'game,' in the expression גִבֹּר צַיִד it functions idiomatically for a person characterized by hunting skill. 'Hunter' is the most natural English rendering.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - in defiance of
  lexicon: HALOT
  rationale: The basic spatial/relational sense is 'before, in the presence of.' Because the phrase may be understood either neutrally or negatively in context, the main text preserves the more literal rendering and leaves the stronger interpretive option to a footnote.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - that is why
  lexicon: HALOT
  rationale: This formula introduces the explanation for a proverb or saying. 'Therefore' is natural and sufficiently formal.
- source_word: יֵאָמַר
  chosen: it is said
  alternatives:
  - one says
  - people say
  lexicon: HALOT
  rationale: The Niphal imperfect is an impersonal passive introducing a proverbial saying. 'It is said' captures the idiom well in English.
- source_word: כְּנִמְרֹד
  chosen: Like Nimrod
  alternatives:
  - As Nimrod
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like Nimrod' is the most idiomatic way to introduce the proverb in English.
