id: GEN.10.16
reference: Genesis 10:16
source:
  edition: WLC
  text: וְ/אֶת הַ/יְבוּסִי֙ וְ/אֶת הָ֣/אֱמֹרִ֔י וְ/אֵ֖ת הַ/גִּרְגָּשִֽׁי־־׃
translation:
  text: and the Jebusites, and the Amorites, and the Girgashites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has singular gentilic forms ('the Jebusite,' 'the Amorite,' 'the
      Girgashite'), but in this genealogy they function collectively for the peoples,
      hence the English plurals.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Although the Hebrew form is singular gentilic with the article, in Genesis
    10 this genealogy/table lists peoples or clans descended from Canaan. English
    idiom normally renders these ethnonyms in the plural when enumerating nations,
    so 'the Jebusites' best conveys the referent.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: As with the surrounding ethnonyms in the Table of Nations, the singular
    gentilic functions collectively for a people group. English plural 'the Amorites'
    communicates the collective ethnic sense naturally.
- source_word: הַגִּרְגָּשִׁי
  chosen: the Girgashites
  alternatives:
  - the Girgashite
  lexicon: HALOT
  rationale: The singular gentilic is used collectively for the people group. English
    convention favors the plural ethnonym in such lists, hence 'the Girgashites.'
- source_word: וְאֶת / וְאֵת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: Here the conjunction ו plus the object marker אֵת links items in a continuing
    list from the previous verse. English does not represent the object marker directly,
    so only the conjunction 'and' is translated.
