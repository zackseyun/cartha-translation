id: GEN.10.6
reference: Genesis 10:6
source:
  edition: WLC
  text: וּ/בְנֵ֖י חָ֑ם כּ֥וּשׁ וּ/מִצְרַ֖יִם וּ/פ֥וּט וּ/כְנָֽעַן׃
translation:
  text: 'And the sons of Ham: Cush, Mizraim, Put, and Canaan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew "Mizraim"; many English versions render this as "Egypt." In this
      genealogy, the Hebrew form is treated as a personal/ancestral name.
    reason: alternative_reading
  - marker: b
    text: '"Put" is also traditionally rendered "Phut" in some English translations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered as "And" to preserve the genealogical list
    structure and narrative continuity. בְנֵי is the construct plural "sons of," which
    in genealogical contexts denotes descendants/lineage through named progenitors;
    "sons of" is retained as the formal and conventional rendering rather than flattening
    to "descendants of."
- source_word: חָם
  chosen: Ham
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Kush
  lexicon: HALOT
  rationale: Proper name/toponym rendered by the standard English biblical form "Cush."
    Although the Hebrew spelling could support "Kush" in a more phonetic transliteration,
    "Cush" is the established English form and remains transparent to readers.
- source_word: וּ/מִצְרַיִם
  chosen: Mizraim
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Rendered as the proper name "Mizraim" rather than "Egypt" because in
    this genealogy the term functions as a personal/ancestral name, not merely the
    later nation. This follows the principle of transliterating names. The alternative
    "Egypt" is worth preserving because many English versions use it due to the close
    association with the land/nation.
- source_word: וּ/פוּט
  chosen: Put
  alternatives:
  - Phut
  lexicon: HALOT
  rationale: Proper name transliterated as "Put," a common modern English form closer
    to the Hebrew consonants. "Phut" reflects older transliteration tradition and
    is preserved as an alternative.
- source_word: וּ/כְנָעַן
  chosen: and Canaan
  lexicon: HALOT
  rationale: Proper name rendered by the standard English form "Canaan." The conjunction
    is carried into the final item in the series for natural English coordination
    while preserving the Hebrew list structure.
