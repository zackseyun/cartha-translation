id: GEN.10.24
reference: Genesis 10:24
source:
  edition: WLC
  text: וְ/אַרְפַּכְשַׁ֖ד יָלַ֣ד אֶת שָׁ֑לַח וְ/שֶׁ֖לַח יָלַ֥ד אֶת עֵֽבֶר־־׃
translation:
  text: Arpachshad fathered Shelah, and Shelah fathered Eber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often read 'Arphaxad' and 'Salah' here, reflecting
      Greek-influenced name forms; the main text follows the Hebrew forms 'Arpachshad'
      and 'Shelah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְפַּכְשַׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention from the Hebrew
    form אַרְפַּכְשַׁד. 'Arphaxad' reflects the traditional form influenced by Greek/English
    tradition; the Hebrew-based transliteration is preferred under original-language
    primacy.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts יָלַד with a male subject commonly means 'fathered'
    or 'became the father of.' 'Fathered' is concise, natural modern English, and
    preserves the genealogical sense without archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function
    is represented by English word order.
- source_word: שָׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  lexicon: HALOT
  rationale: Proper name transliterated from the Hebrew שָׁלַח/שֶׁלַח. 'Salah' reflects
    another traditional/Greek-influenced form; 'Shelah' more directly reflects the
    Hebrew consonants and vowel pattern in this verse.
- source_word: וְ/שֶׁלַח
  chosen: and Shelah
  alternatives:
  - and Salah
  lexicon: HALOT
  rationale: Conjunction וְ rendered as 'and'; the repeated proper name is transliterated
    consistently as 'Shelah' from the Hebrew form.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  lexicon: HALOT
  rationale: Proper name transliterated from Hebrew עֵבֶר as 'Eber,' the standard
    rendering for this patriarch in Genesis genealogies. 'Heber' is a possible English
    form but less directly tied to the Hebrew initial ayin and may create confusion
    with other names.
