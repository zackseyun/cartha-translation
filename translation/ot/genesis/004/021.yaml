id: GEN.4.21
reference: Genesis 4:21
source:
  edition: WLC
  text: וְ/שֵׁ֥ם אָחִ֖י/ו יוּבָ֑ל ה֣וּא הָיָ֔ה אֲבִ֕י כָּל תֹּפֵ֥שׂ כִּנּ֖וֹר וְ/עוּגָֽב־׃
translation:
  text: And the name of his brother was Jubal; he was the father of all who play the
    lyre and the pipe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'handle the lyre and the pipe.' The Hebrew verb is literally 'grasp'
      or 'take hold of,' but in context it refers to playing musical instruments.
    reason: lexical_alternative
  - marker: b
    text: '''Pipe'' may also be rendered ''flute'' or ''reed pipe''; the precise ancient
      instrument denoted by Hebrew עוּגָב is uncertain.'
    reason: lexical_alternative
  - marker: c
    text: '''Father of'' here likely means progenitor, pioneer, or founder of those
      who play these instruments, not necessarily immediate biological father of every
      such musician.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשֵׁם
  chosen: And the name
  alternatives:
  - And his brother's name
  lexicon: HALOT
  rationale: The conjunction plus noun introduces the next family member in sequence.
    'And the name' preserves the Hebrew clause structure naturally in English when
    completed by 'was.'
- source_word: אָחִיו
  chosen: of his brother
  alternatives:
  - his brother's
  lexicon: HALOT
  rationale: Construct with 3ms suffix referring back to Jabal in the previous verse.
    'Of his brother' is slightly more formal but clear and close to the Hebrew relationship
    marking.
- source_word: יוּבָל
  chosen: Jubal
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הוּא הָיָה
  chosen: he was
  alternatives:
  - he became
  lexicon: HALOT
  rationale: The pronoun plus היה gives an emphatic predication. 'He was' is the most
    straightforward rendering here; 'became' is possible in some contexts but not
    required.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - ancestor of
  - founder of
  lexicon: HALOT
  rationale: In genealogical and culture-origin contexts, 'father of' can denote progenitor
    or originator. Retaining 'father of' preserves the Hebrew idiom while remaining
    understandable.
- source_word: כָּל
  chosen: all who
  alternatives:
  - everyone who
  - all those who
  lexicon: HALOT
  rationale: The phrase introduces a class of people characterized by the following
    participle. 'All who' is concise and natural.
- source_word: תֹּפֵשׂ
  chosen: play
  alternatives:
  - handle
  - grasp
  lexicon: HALOT
  rationale: Literally the participle means 'grasping/handling,' but with musical
    instruments the idiomatic sense is playing them. 'Play' best communicates the
    intended activity in natural English.
- source_word: כִּנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: '''Lyre'' is the more precise modern equivalent for כִּנּוֹר in many
    contexts, whereas ''harp'' is traditional but less exact organologically.'
- source_word: עוּגָב
  chosen: pipe
  alternatives:
  - flute
  - reed pipe
  lexicon: HALOT
  rationale: The exact instrument is uncertain, but it is a wind instrument. 'Pipe'
    is a broad, conventional rendering that avoids overprecision while fitting the
    context.
