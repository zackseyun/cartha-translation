theological_decisions:
- issue: Narrative portrayal of the brothers' occupations
  chosen_reading: Render the verse as a simple description of differing occupations
    without implying moral evaluation.
  alternative_readings:
  - Translate in a way that subtly elevates one occupation over the other.
  rationale: The Hebrew presents Abel and Cain's occupations descriptively. No theological
    or moral hierarchy is stated in this verse itself, so the translation should preserve
    that neutrality.
  doctrine_reference: Translation philosophy §1 and §3
