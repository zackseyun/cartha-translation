id: GEN.4.2
reference: Genesis 4:2
source:
  edition: WLC
  text: וַ/תֹּ֣סֶף לָ/לֶ֔דֶת אֶת אָחִ֖י/ו אֶת הָ֑בֶל וַֽ/יְהִי הֶ֨בֶל֙ רֹ֣עֵה צֹ֔אן
    וְ/קַ֕יִן הָיָ֖ה עֹבֵ֥ד אֲדָמָֽה־־־׃
translation:
  text: And she gave birth again, to his brother Abel. Abel became a shepherd of flocks,
    but Cain was a worker of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she continued to bear' / 'she bore again.' The Hebrew idiom literally
      uses 'added' with an infinitive to express repetition or continuation.
    reason: lexical_alternative
  - marker: b
    text: '''Flocks'' refers to small livestock, especially sheep and goats.'
    reason: cultural_note
  - marker: c
    text: Or 'a tiller of the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּסֶף לָלֶדֶת
  chosen: she gave birth again
  alternatives:
  - she continued to bear
  - she added to bear
  lexicon: HALOT
  rationale: The idiom with יסף + infinitive means to do something again or continue
    doing it. In this birth narrative, 'gave birth again' is the most natural modern
    English rendering and captures the sequential sense without woodenly reproducing
    the Hebrew idiom.
- source_word: אֶת אָחִיו אֶת הָבֶל
  chosen: to his brother Abel
  alternatives:
  - his brother, Abel
  - namely Abel, his brother
  lexicon: HALOT
  rationale: The double object marker introduces the child just born and appositionally
    identifies him as Cain's brother, Abel. 'To his brother Abel' fits the English
    syntax after 'gave birth again' and preserves the relational emphasis.
- source_word: הֶבֶל
  chosen: Abel
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: Here היה introduces Abel's role or occupation. 'Became' gives the narrative
    development naturally in English, though 'was' is possible. It avoids sounding
    overly static while staying within the semantic range.
- source_word: רֹעֵה צֹאן
  chosen: a shepherd of flocks
  alternatives:
  - a keeper of sheep
  - a shepherd
  lexicon: HALOT
  rationale: רעה denotes shepherding/pasturing, and צאן refers collectively to small
    livestock, especially sheep and goats. 'A shepherd of flocks' preserves the pastoral
    sense better than the narrower 'keeper of sheep' and is more explicit than simply
    'a shepherd'.
- source_word: קַיִן
  chosen: Cain
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הָיָה עֹבֵד אֲדָמָה
  chosen: was a worker of the ground
  alternatives:
  - was a tiller of the ground
  - worked the ground
  - was a farmer
  lexicon: HALOT
  rationale: עבד + אדמה means to work/cultivate the soil. 'Worker of the ground' is
    a fairly formal but readable rendering that preserves the lexical link with אֲדָמָה
    ('ground') from the surrounding Genesis context better than the more interpretive
    'farmer.'
- source_word: אֲדָמָה
  chosen: ground
  alternatives:
  - soil
  - land
  lexicon: HALOT
  rationale: '''Ground'' is the standard contextual rendering in early Genesis and
    preserves the thematic connection to the cursed ground and to Adam/adamah wordplay
    in the broader narrative.'
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English style and the contrast
    between the brothers' occupations are better conveyed with 'but.' This is a standard
    optimal-equivalence adjustment, not a theological contrast beyond the text.
