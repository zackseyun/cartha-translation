id: GEN.4.20
reference: Genesis 4:20
source:
  edition: WLC
  text: וַ/תֵּ֥לֶד עָדָ֖ה אֶת יָבָ֑ל ה֣וּא הָיָ֔ה אֲבִ֕י יֹשֵׁ֥ב אֹ֖הֶל וּ/מִקְנֶֽה־׃
translation:
  text: Adah bore Jabal; he was the father of those who dwell in tents and keep livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the father of tent-dwellers and livestock herders.' The Hebrew 'father
      of' can mean ancestor, founder, or archetypal originator of a way of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Qal wayyiqtol of ילד in genealogical narrative commonly means 'bore'
    in concise English. 'Gave birth to' is possible but less idiomatic in this formulaic
    context.
- source_word: עָדָה
  chosen: Adah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Marks יבל as the direct object; it has no standalone English equivalent
    here.
- source_word: יָבָל
  chosen: Jabal
  rationale: Personal name transliterated by standard convention.
- source_word: הוּא הָיָה
  chosen: he was
  alternatives:
  - he became
  lexicon: HALOT
  rationale: The pronoun plus היה identifies Jabal and states his role. 'Was' fits
    the predicative construction naturally; 'became' is possible but less direct in
    this genealogical notice.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - ancestor of
  - founder of
  lexicon: HALOT
  rationale: אָב in such cultural-genealogical notices can denote progenitor or originator
    of a class or way of life. 'Father of' preserves the Hebrew metaphor while remaining
    clear in English.
- source_word: יֹשֵׁב אֹהֶל
  chosen: those who dwell in tents
  alternatives:
  - tent-dwellers
  - those who live in tents
  lexicon: HALOT
  rationale: The participle יֹשֵׁב with singular collective force plus אֹהֶל denotes
    a class of people characterized by tent-dwelling. 'Those who dwell in tents' makes
    the collective sense explicit and reads naturally.
- source_word: וּמִקְנֶה
  chosen: and keep livestock
  alternatives:
  - and livestock
  - and cattle
  lexicon: HALOT
  rationale: מִקְנֶה denotes livestock/herds. Because the Hebrew links tent-dwelling
    with animal husbandry as a lifestyle, English benefits from supplying the implied
    verbal sense 'keep' rather than the less clear bare noun sequence 'tents and livestock.'
    'Livestock' is broader and more accurate than 'cattle'.
