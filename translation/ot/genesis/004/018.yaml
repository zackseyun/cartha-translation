id: GEN.4.18
reference: Genesis 4:18
source:
  edition: WLC
  text: וַ/יִּוָּלֵ֤ד לַֽ/חֲנוֹךְ֙ אֶת עִירָ֔ד וְ/עִירָ֕ד יָלַ֖ד אֶת מְחֽוּיָאֵ֑ל
    וּ/מְחִיּיָאֵ֗ל יָלַד֙ אֶת מְת֣וּשָׁאֵ֔ל וּ/מְתוּשָׁאֵ֖ל יָלַ֥ד אֶת לָֽמֶךְ־־־־׃
translation:
  text: To Hanok was born Irad, and Irad fathered Mehujael, and Mehujael fathered
    Methushael, and Methushael fathered Lamech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has two spellings of the same name in this verse: Mehujael and Mehijael.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּוָּלֵד
  chosen: was born
  alternatives:
  - was begotten
  - there was born
  lexicon: HALOT
  rationale: The verb is Niphal of ילד, passive/reflexive in form, so the clause is
    best rendered passively rather than with an active 'fathered.' English idiom requires
    'To Hanok was born Irad' rather than a wooden 'Hanok was born Irad.'
- source_word: לַחֲנוֹךְ
  chosen: To Hanok
  alternatives:
  - to Enoch
  - for Hanok
  lexicon: HALOT
  rationale: The prefixed ל marks the parent to whom the child was born. The name
    is transliterated rather than translated, following the project's policy for personal
    names. 'Hanok' reflects a direct Hebrew-based transliteration; 'Enoch' is the
    traditional anglicized form.
- source_word: עִירָד
  chosen: Irad
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention from the Hebrew.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In these genealogical clauses, the active Qal of ילד denotes begetting/fathering.
    'Fathered' is concise, natural modern English and preserves the male genealogical
    line without archaic 'begot.'
- source_word: מְחוּיָאֵל / מְחִיּיָאֵל
  chosen: Mehujael
  alternatives:
  - Mehijael
  lexicon: HALOT
  rationale: The verse presents two orthographic forms of the same name across the
    clause sequence. A single standard English form is used in the main text for readability,
    while the alternate transliteration is preserved in a footnote because the Hebrew
    spelling varies.
- source_word: מְתוּשָׁאֵל
  chosen: Methushael
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew form.
- source_word: לָמֶךְ
  chosen: Lamech
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew form.
