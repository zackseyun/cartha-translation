theological_decisions:
- issue: Scope of Cain's judgment
  chosen_reading: A concrete curse of agricultural frustration and social instability,
    without importing later doctrinal categories beyond the text.
  alternative_readings:
  - A purely psychological restlessness
  - A geographically limited exile only
  rationale: The verse states both the ground's refusal to yield and Cain's status
    as נָע וָנָד. The translation preserves both material and social dimensions of
    judgment without reducing one to the other.
  doctrine_reference: Preserve theological tension rather than resolve it.
