id: GEN.4.12
reference: Genesis 4:12
source:
  edition: WLC
  text: כִּ֤י תַֽעֲבֹד֙ אֶת הָ֣/אֲדָמָ֔ה לֹֽא תֹסֵ֥ף תֵּת כֹּחָ֖/הּ לָ֑/ךְ נָ֥ע וָ/נָ֖ד
    תִּֽהְיֶ֥ה בָ/אָֽרֶץ־־־׃
translation:
  text: When you work the ground, it will no longer yield its strength to you. You
    will be a wanderer and a fugitive on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For when you work the ground' or 'If you work the ground.' The Hebrew
      conjunction can be rendered in several ways depending on whether the clause
      is taken as causal or temporal/conditional.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it will not continue to give its strength to you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a restless wanderer.' The paired Hebrew terms overlap in meaning and
      intensify Cain's unsettled condition.
    reason: lexical_alternative
  - marker: d
    text: Or 'in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: 'Here כִּי introduces the circumstance under which the curse is experienced
    rather than giving a simple causal ''for.'' ''When'' reads naturally in English
    and fits the forward-looking sense: whenever Cain works the soil, the stated result
    follows.'
- source_word: תַעֲבֹד
  chosen: you work
  alternatives:
  - you till
  - you serve
  lexicon: HALOT
  rationale: From עבד in the sense of laboring/cultivating land. 'Work' is broad,
    natural English and suits אֶת הָאֲדָמָה in context; 'till' is possible but slightly
    narrower and more traditional.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the soil
  - the land
  lexicon: HALOT
  rationale: אֲדָמָה in Genesis commonly refers to the cultivated ground/soil. 'Ground'
    preserves the Genesis linkage with the cursed earth and with Cain's agricultural
    labor better than the broader 'land.'
- source_word: לֹא תֹסֵף תֵּת
  chosen: it will no longer yield
  alternatives:
  - it will not continue to give
  - it will never again give
  lexicon: HALOT
  rationale: 'The idiom יסף + infinitive expresses cessation/continuation: ''no longer
    continue to give.'' Rendering as ''will no longer yield'' is idiomatic English
    and captures the agricultural sense.'
- source_word: כֹּחָהּ
  chosen: its strength
  alternatives:
  - its produce
  - its power
  lexicon: HALOT
  rationale: Literally 'its strength.' In context this refers to the ground's productive
    power/fertility. Retaining 'strength' preserves the metaphor while remaining understandable.
- source_word: נָע
  chosen: wanderer
  alternatives:
  - restless one
  - vagrant
  lexicon: HALOT
  rationale: נָע denotes one who moves about without settled rest. 'Wanderer' is clear
    and idiomatic, preserving the instability of Cain's condition.
- source_word: וָנָד
  chosen: fugitive
  alternatives:
  - roamer
  - exile
  lexicon: HALOT
  rationale: נָד overlaps with נָע but adds the sense of being driven about or unsettled.
    'Fugitive' is the traditional pairing and preserves the force of the doubled description
    without collapsing the terms into one gloss.
- source_word: בָאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In this primeval Genesis context, 'earth'
    best fits the broader setting and avoids narrowing the judgment to one local territory.
