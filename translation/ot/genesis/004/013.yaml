id: GEN.4.13
reference: Genesis 4:13
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר קַ֖יִן אֶל יְהוָ֑ה גָּד֥וֹל עֲוֺנִ֖/י מִ/נְּשֹֽׂא־׃
translation:
  text: And Cain said to Yahweh, “My iniquity is too great to bear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My guilt is too great to bear'; alternatively, 'My iniquity is too great to forgive.' The Hebrew terms can refer either to guilt/iniquity or to its punishment, and the verb can mean 'bear' or, in some contexts, 'forgive.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form introducing the next event; 'And ... said' preserves Hebrew narrative flow in natural English.
- source_word: קַיִן
  chosen: Cain
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple preposition of address; 'to' is the natural modern English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גָּדוֹל
  chosen: greater
  alternatives:
  - too great
  - great
  lexicon: HALOT
  rationale: Predicate adjective expressing magnitude. In English, with the following comparative construction ('than I can bear'), 'greater' best captures the sense idiomatically.
- source_word: עֲוֺנִי
  chosen: my punishment
  alternatives:
  - my iniquity
  - my guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the punishment/consequence of guilt. In this context, Cain responds to the sentence just pronounced and speaks of what is 'too great to bear,' which naturally fits the sense of punishment or the burden of penalty. The ambiguity is significant, so alternatives are preserved in a footnote.
- source_word: מִנְּשֹׂא
  chosen: than I can bear
  alternatives:
  - to bear
  - to carry away
  - to forgive
  lexicon: HALOT
  rationale: From נָשָׂא, whose semantic range includes bear/carry and, in some contexts, forgive. With the comparative מן and Cain's first-person suffix on עֲוֺנִי, the idiomatic sense is 'too great to bear.' English supplies 'I can' for natural completeness.
