theological_decisions:
- issue: Ambiguity of עֲוֺנִי מִנְּשֹׂא
  chosen_reading: 'Cain laments the severity of his punishment: ''My punishment is
    greater than I can bear.'''
  alternative_readings:
  - 'Cain confesses the greatness of his guilt: ''My guilt/iniquity is too great to
    bear.'''
  - Addressed to God, the phrase could be understood as 'too great to forgive.'
  rationale: The Hebrew permits more than one sense because עָוֹן can mean iniquity,
    guilt, or punishment, and נָשָׂא can mean bear or forgive. In immediate context,
    Cain is reacting to the announced judgment and the burden it places on him, so
    'punishment ... bear' is the most contextually coherent main-text rendering. Per
    the translation philosophy, the lexical-theological tension is preserved in a
    footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
