id: GEN.4.23
reference: Genesis 4:23
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר לֶ֜מֶךְ לְ/נָשָׁ֗י/ו עָדָ֤ה וְ/צִלָּה֙ שְׁמַ֣עַן קוֹלִ֔/י נְשֵׁ֣י
    לֶ֔מֶךְ הַאְזֵ֖נָּה אִמְרָתִ֑/י כִּ֣י אִ֤ישׁ הָרַ֨גְתִּי֙ לְ/פִצְעִ֔/י וְ/יֶ֖לֶד
    לְ/חַבֻּרָתִֽ/י׃
translation:
  text: 'And Lamech said to his wives, “Adah and Zillah, hear my voice; wives of Lamech,
    listen to my word: for I have killed a man for wounding me, even a young man for
    striking me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I killed a man for my wound, a young man for my bruise.' The Hebrew
      may be read more literally with the nouns 'wound' and 'bruise' rather than the
      verbal expressions 'wounding me' and 'striking me.'
    reason: lexical_alternative
  - marker: b
    text: Some understand Lamech's words as a threat or general boast ('I would kill
      a man...') rather than a report of an actual killing.
    reason: alternative_reading
lexical_decisions:
- source_word: לְנָשָׁיו
  chosen: to his wives
  alternatives:
  - to his women
  lexicon: HALOT
  rationale: אִשָּׁה in the plural with 3ms suffix here clearly refers to Lamech's
    wives, not women generally; 'wives' is the natural and contextually precise English
    rendering.
- source_word: שְׁמַעַן
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the directness and poetic
    parallelism with the following imperative.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - what I say
  lexicon: HALOT
  rationale: קוֹל literally means 'voice' or 'sound.' 'My voice' keeps the concrete
    Hebrew expression and suits the poetic address.
- source_word: הַאְזֵנָּה
  chosen: listen
  alternatives:
  - give ear
  - hear attentively
  lexicon: HALOT
  rationale: The Hiphil of אזן means to give ear or listen attentively. 'Listen' is
    idiomatic modern English and preserves the intensification in parallel with 'hear.'
- source_word: אִמְרָתִי
  chosen: my word
  alternatives:
  - my speech
  - my saying
  lexicon: HALOT
  rationale: אִמְרָה can mean utterance, word, or speech. 'My word' is concise and
    preserves the poetic singular.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content or grounds of Lamech's speech. 'For'
    fits the poetic explanatory force without overinterpreting.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a male
  - someone
  lexicon: HALOT
  rationale: אִישׁ ordinarily means 'man.' The verse contrasts אִישׁ with יֶלֶד, so
    retaining 'man' preserves the age/status distinction.
- source_word: הָרַגְתִּי
  chosen: I have killed
  alternatives:
  - I killed
  - I slayed
  lexicon: HALOT
  rationale: The qatal form can be rendered as simple past or present perfect in English.
    'I have killed' fits the boastful, present-result force of the speech.
- source_word: לְפִצְעִי
  chosen: for wounding me
  alternatives:
  - for my wound
  - to my wounding
  - for injuring me
  lexicon: HALOT
  rationale: 'The preposition ל with the noun ''wound'' plus 1cs suffix is idiomatically
    difficult. In context it most naturally expresses cause or requital: the man was
    killed on account of wounding Lamech. ''For wounding me'' makes the relation clear
    in English.'
- source_word: יֶלֶד
  chosen: a young man
  alternatives:
  - a boy
  - a youth
  - a child
  lexicon: HALOT
  rationale: יֶלֶד can denote child, boy, or youth. In parallel with אִישׁ and in
    a violent boast, 'young man' best conveys a younger person without implying small
    child.
- source_word: לְחַבֻּרָתִי
  chosen: for striking me
  alternatives:
  - for my bruise
  - for bruising me
  - for my wound
  lexicon: HALOT
  rationale: חַבּוּרָה denotes stripe, bruise, or wound. As with לְפִצְעִי, the ל
    phrase is best rendered idiomatically as the cause or occasion for retaliation.
    'For striking me' communicates the sense naturally while distinguishing it slightly
    from 'wounding me' in the first colon.
