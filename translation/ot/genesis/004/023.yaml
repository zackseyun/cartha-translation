theological_decisions:
- issue: 'Sense of Lamech''s boast: retaliation or self-defense'
  chosen_reading: The line is rendered as retaliatory/casual language ('for wounding
    me ... for striking me') without adding explicit self-defense language.
  alternative_readings:
  - I killed a man because he wounded me, implying self-defense
  - I would kill a man for wounding me, taking the perfect as gnomic or modal
  rationale: The Hebrew qatal most straightforwardly reports an act ('I have killed/I
    killed'), and the ל phrases naturally express cause or occasion. The translation
    preserves the ambiguity of motive without importing moral justification.
  doctrine_reference: Preserve theological tension rather than resolve it.
