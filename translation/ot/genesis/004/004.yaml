id: GEN.4.4
reference: Genesis 4:4
source:
  edition: WLC
  text: וְ/הֶ֨בֶל הֵבִ֥יא גַם ה֛וּא מִ/בְּכֹר֥וֹת צֹאנ֖/וֹ וּ/מֵֽ/חֶלְבֵ/הֶ֑ן וַ/יִּ֣שַׁע יְהוָ֔ה אֶל הֶ֖בֶל וְ/אֶל מִנְחָתֽ/וֹ־־־׃
translation:
  text: And Abel also brought some of the firstborn of his flock, and of their fat portions. And Yahweh regarded Abel and his offering,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked with favor on Abel and his offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'of their fat portions'; this likely refers to the choicest fatty parts of the animals offered.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/הֶבֶל
  chosen: And Abel
  alternatives:
  - Now Abel
  lexicon: HALOT
  rationale: וְ here is the normal narrative conjunction. 'And Abel' preserves the Hebrew sequencing without overinterpreting discourse nuance.
- source_word: הֵבִיא
  chosen: brought
  alternatives:
  - presented
  lexicon: HALOT
  rationale: Hiphil of בוא in sacrificial/gift context commonly means 'bring.' 'Presented' is possible but slightly more interpretive.
- source_word: גַם הוּא
  chosen: also
  alternatives:
  - he too
  lexicon: HALOT
  rationale: The combination emphasizes that Abel, like Cain, brought an offering. English 'also' captures the sense smoothly; the pronoun's emphasis is adequately represented.
- source_word: מִבְּכֹרוֹת צֹאנוֹ
  chosen: some of the firstborn of his flock
  alternatives:
  - from the firstborn of his flock
  - the firstborn of his flock
  lexicon: HALOT
  rationale: 'The מן construction is partitive: Abel brought from among the firstborn of his flock. ''Some of the firstborn'' best reflects the Hebrew without implying every firstborn animal was offered.'
- source_word: וּמֵחֶלְבֵהֶן
  chosen: and of their fat portions
  alternatives:
  - and from their fat
  - and their choicest parts
  lexicon: HALOT
  rationale: חֵלֶב can denote literal fat and, in sacrificial contexts, the fat portions specially associated with the offering. 'Fat portions' preserves the cultic sense better than bare 'fat' while avoiding over-paraphrase.
- source_word: וַיִּשַׁע
  chosen: regarded
  alternatives:
  - looked with favor on
  - paid attention to
  lexicon: HALOT
  rationale: The verb means to look toward or regard, often with favorable acceptance in this context. 'Regarded' keeps the wording relatively formal and lets the context imply acceptance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל הֶבֶל וְאֶל מִנְחָתוֹ
  chosen: Abel and his offering
  alternatives:
  - toward Abel and toward his offering
  lexicon: HALOT
  rationale: After 'regarded,' English idiom naturally takes a direct object. The repeated אֶל marks both Abel and his offering as the objects of divine regard; this is preserved in smooth English.
- source_word: מִנְחָתוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his tribute
  lexicon: HALOT
  rationale: מִנְחָה is a gift/offering term used broadly, including sacrificial tribute. 'Offering' best fits the immediate worship context and standard English Bible usage.
