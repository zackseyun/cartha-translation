id: GEN.4.22
reference: Genesis 4:22
source:
  edition: WLC
  text: וְ/צִלָּ֣ה גַם הִ֗וא יָֽלְדָה֙ אֶת תּ֣וּבַל קַ֔יִן לֹטֵ֕שׁ כָּל חֹרֵ֥שׁ נְחֹ֖שֶׁת
    וּ/בַרְזֶ֑ל וַֽ/אֲח֥וֹת תּֽוּבַל קַ֖יִן נַֽעֲמָֽה־־־־׃
translation:
  text: Zillah also bore Tubal-cain, a forger of every tool of bronze and iron. And
    the sister of Tubal-cain was Naamah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sharpener/hammerer of every craftsman in bronze and iron'; the Hebrew
      wording after 'Tubal-cain' is difficult, and some understand it to describe
      him as a metalworker rather than as the maker of metal tools.
    reason: alternative_reading
  - marker: b
    text: '''Bronze'' may also be rendered ''copper.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: גַם הִוא
  chosen: also
  alternatives:
  - she also
  - indeed she
  lexicon: HALOT
  rationale: The combination adds Zillah to the genealogy as another wife who likewise
    bore a child. In English, 'also' naturally conveys the additive force without
    overtranslating the pronoun.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: In genealogical narrative, 'bore' is the standard concise English rendering
    for ילד and fits the register of Genesis.
- source_word: תּוּבַל קַיִן
  chosen: Tubal-cain
  alternatives:
  - Tubal-Cain
  rationale: This is a personal name and should be transliterated, not translated.
    The hyphen reflects the compound form customary in English.
- source_word: לֹטֵשׁ
  chosen: forger
  alternatives:
  - sharpener
  - hammerer
  - smith
  lexicon: HALOT
  rationale: The participle denotes one who hammers, sharpens, or forges metalwork.
    'Forger' best fits the immediate context of bronze and iron working and communicates
    a craftsperson engaged in metal production.
- source_word: כָּל חֹרֵשׁ
  chosen: every tool
  alternatives:
  - every craftsman
  - every artisan
  - every cutting instrument
  lexicon: HALOT
  rationale: The Hebrew construction is difficult. While חֹרֵשׁ can denote a craftsman,
    in combination with לֹטֵשׁ and the following metals, the sense is most naturally
    the objects fashioned from metal rather than all metalworkers. 'Every tool' yields
    coherent English and matches the likely sense of implements made of bronze and
    iron.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can refer to copper or bronze. 'Bronze' is the conventional
    rendering in lists of ancient metals and fits the likely alloyed-metal sense in
    this cultural context, while acknowledging that 'copper' is lexically possible.
- source_word: בַרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal term.
- source_word: אֲחוֹת
  chosen: sister
  lexicon: HALOT
  rationale: Straightforward kinship term; no contextual reason to broaden or paraphrase.
- source_word: נַעֲמָה
  chosen: Naamah
  rationale: Personal name, transliterated by standard convention.
