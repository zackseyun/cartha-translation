id: GEN.4.10
reference: Genesis 4:10
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מֶ֣ה עָשִׂ֑יתָ ק֚וֹל דְּמֵ֣י אָחִ֔י/ךָ צֹעֲקִ֥ים אֵלַ֖/י מִן הָֽ/אֲדָמָֽה־׃
translation:
  text: And he said, “What have you done? The voice of your brother’s blood is crying
    out to me from the ground.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bloods,' a plural form often used in contexts of bloodshed; English
      normally renders it as 'blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves the Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: מֶה עָשִׂיתָ
  chosen: What have you done?
  alternatives:
  - What did you do?
  lexicon: HALOT
  rationale: The idiom is a direct divine accusation. Present perfect in English conveys
    the completed act with present moral weight better than a simple past.
- source_word: קוֹל
  chosen: The voice
  alternatives:
  - The sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' Here the personified image of
    blood appealing to God is better preserved by 'voice' than by the more impersonal
    'sound'.
- source_word: דְּמֵי
  chosen: blood
  alternatives:
  - bloods
  lexicon: HALOT
  rationale: The Hebrew plural form 'bloods' is idiomatic in contexts of bloodshed/guilt.
    English normally uses the mass noun 'blood'; this communicates the sense naturally
    while preserving the referent.
- source_word: אָחִיךָ
  chosen: your brother’s
  alternatives:
  - of your brother
  lexicon: HALOT
  rationale: Construct relationship is rendered idiomatically in English as a possessive.
- source_word: צֹעֲקִים
  chosen: is crying out
  alternatives:
  - are crying out
  - cries out
  lexicon: HALOT
  rationale: Although the participle is morphologically plural, it agrees with the
    plural form 'bloods.' Since English renders דְּמֵי as singular mass noun 'blood,'
    singular verbal agreement is the most natural equivalent. Progressive aspect reflects
    the participial form and the ongoing appeal to God.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - out to me
  lexicon: HALOT
  rationale: Direct object of the cry is God himself; 'to me' is the straightforward
    rendering. The sense 'out' is carried by 'crying out' rather than the preposition
    alone.
- source_word: מִן הָאֲדָמָה
  chosen: from the ground
  alternatives:
  - from the soil
  - from the land
  lexicon: HALOT
  rationale: אֲדָמָה in Genesis often denotes the ground/soil, especially in the Cain
    narrative with its earth-bound imagery. 'Ground' is the most natural and contextually
    resonant choice here.
