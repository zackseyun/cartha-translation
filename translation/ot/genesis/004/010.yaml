theological_decisions:
- issue: Personification of Abel's shed blood
  chosen_reading: Retain the figurative language that the blood itself cries out to
    God.
  alternative_readings:
  - Interpret the phrase more abstractly as bloodguilt calling for justice
  rationale: The Hebrew presents vivid personification, and preserving it maintains
    the text's moral and theological force without importing a narrower doctrinal
    explanation. The figurative sense of bloodguilt is implicit but should not replace
    the imagery in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
