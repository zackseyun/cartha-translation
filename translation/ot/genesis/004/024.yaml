id: GEN.4.24
reference: Genesis 4:24
source:
  edition: WLC
  text: כִּ֥י שִׁבְעָתַ֖יִם יֻקַּם קָ֑יִן וְ/לֶ֖מֶךְ שִׁבְעִ֥ים וְ/שִׁבְעָֽה־׃
translation:
  text: For Cain is avenged sevenfold, and Lamech seventy-sevenfold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be avenged'; the Hebrew verb can be understood as expressing assured
      future vengeance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'seventy and seven'; that is, 'seventy-sevenfold.' Some English versions
      render 'seventy-seven times.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or ground for Lamech's boast in the preceding
    verse, so 'For' best preserves the connective force in natural English.
- source_word: שִׁבְעָתַיִם
  chosen: sevenfold
  alternatives:
  - seven times
  lexicon: HALOT
  rationale: The adverbial dual form expresses a sevenfold measure of vengeance. 'Sevenfold'
    is idiomatic and matches the intensifying sense better than a more wooden 'seven
    times'.
- source_word: יֻקַּם
  chosen: is avenged
  alternatives:
  - will be avenged
  - is requited
  lexicon: HALOT
  rationale: The Hophal of נקם is passive, 'be avenged' or 'be avenged upon/in behalf
    of.' In this poetic saying, the imperfect can express a gnomic or assured future
    sense; English present 'is avenged' conveys the proverbial certainty succinctly.
    The future nuance is preserved as an alternative.
- source_word: קָיִן
  chosen: Cain
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: וְלֶמֶךְ
  chosen: and Lamech
  rationale: The conjunction links the comparison between Cain and Lamech; the personal
    name is transliterated.
- source_word: שִׁבְעִים וְשִׁבְעָה
  chosen: seventy-sevenfold
  alternatives:
  - seventy and sevenfold
  - seventy-seven times
  lexicon: HALOT
  rationale: The phrase literally reads 'seventy and seven.' In this context of escalating
    vengeance, 'seventy-sevenfold' is the clearest idiomatic rendering and preserves
    the parallel with 'sevenfold.'
