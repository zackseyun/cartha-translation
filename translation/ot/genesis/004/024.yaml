theological_decisions:
- issue: Numerical rendering of Lamech's vengeance formula
  chosen_reading: seventy-sevenfold
  alternative_readings:
  - seventy times sevenfold
  - seventy-seven times
  rationale: The Hebrew construction שִׁבְעִים וְשִׁבְעָה most naturally means 'seventy-seven,'
    not 'seventy times seven.' Rendering it 'seventy-sevenfold' preserves the poetic
    parallel with Cain's 'sevenfold' and avoids importing the later wording of Matthew
    18:22 into Genesis.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
