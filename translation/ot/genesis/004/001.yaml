id: GEN.4.1
reference: Genesis 4:1
source:
  edition: WLC
  text: וְ/הָ֣/אָדָ֔ם יָדַ֖ע אֶת חַוָּ֣ה אִשְׁתּ֑/וֹ וַ/תַּ֨הַר֙ וַ/תֵּ֣לֶד אֶת קַ֔יִן וַ/תֹּ֕אמֶר קָנִ֥יתִי אִ֖ישׁ אֶת יְהוָֽה־־־׃
translation:
  text: Now the man knew Eve his wife, and she conceived and bore Cain, and said, “I have acquired a man with Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have acquired a man with the LORD.'' The phrase may also be understood as ''from the LORD'' or, less likely, ''I have acquired a man—the LORD.'' The main text takes it as Eve acknowledging the LORD''s help in Cain''s birth.'
    reason: alternative_reading
  - marker: b
    text: Cain sounds like the Hebrew verb for 'acquire' or 'get' (qaniti).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאָדָם
  chosen: Now the man
  alternatives:
  - And the man
  - The man
  lexicon: HALOT
  rationale: אָדָם here refers specifically to the male human previously introduced, not humankind in general. The prefixed conjunction can be rendered simply 'and,' but 'now' is a natural discourse marker in English narrative and fits optimal equivalence without adding content.
- source_word: יָדַע
  chosen: knew
  alternatives:
  - had relations with
  - lay with
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'knew' and is a standard euphemism for sexual relations in this context. Retaining 'knew' preserves the source-text idiom and literary register better than a more explicit paraphrase.
- source_word: אֶת חַוָּה אִשְׁתּוֹ
  chosen: Eve his wife
  alternatives:
  - his wife Eve
  lexicon: HALOT
  rationale: Direct object marker plus name and apposition/relationship term. 'Eve his wife' closely follows Hebrew order while remaining natural English.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - and she became pregnant
  lexicon: HALOT
  rationale: Standard rendering of the verb הרה in birth narratives; concise and idiomatic.
- source_word: וַתֵּלֶד אֶת קַיִן
  chosen: and bore Cain
  alternatives:
  - and gave birth to Cain
  lexicon: HALOT
  rationale: '''Bore'' is the conventional and accurate English rendering in genealogical and birth contexts, preserving narrative compactness.'
- source_word: קַיִן
  chosen: Cain
  rationale: Personal name is transliterated per translation philosophy. The following wordplay with קָנִיתִי is preserved by footnote rather than by altering the name.
- source_word: קָנִיתִי
  chosen: I have acquired
  alternatives:
  - I have gotten
  - I have obtained
  - I have created
  lexicon: HALOT
  rationale: The verb קנה commonly means 'acquire/get.' 'Acquired' preserves the lexical connection to Cain's name better than 'gotten,' while avoiding the misleading theological sense 'created' in this context.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a male child
  - a son
  lexicon: HALOT
  rationale: The noun normally means 'man.' Although the referent is a newborn male, the Hebrew uses אִישׁ, and the translation should preserve that wording rather than flatten it to 'son' or 'baby boy.' This also aligns with the gender-accurate principle.
- source_word: אֶת יְהוָה
  chosen: with the help of the LORD
  alternatives:
  - with the LORD
  - the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The particle אֶת here is notoriously difficult. In this clause it is best taken as marking accompaniment or association, yielding the sense that Eve attributes Cain's birth to divine aid. This avoids the theologically problematic and less likely reading that identifies the child as 'the LORD' while still reflecting the Hebrew compactly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
