theological_decisions:
- issue: Interpretation of אֶת יְהוָה in Eve's statement
  chosen_reading: with the help of Yahweh
  alternative_readings:
  - with the LORD
  - I have acquired a man—the LORD
  - from the LORD
  rationale: The Hebrew construction is ambiguous and has generated several interpretations. The chosen reading best fits the immediate context as an acknowledgment of divine assistance in childbirth, avoids importing a christological or ontological claim the text itself does not require, and reflects a widely defensible understanding of אֶת as accompaniment. Because the ambiguity is genuine, major alternatives are preserved in a footnote rather than erased.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
