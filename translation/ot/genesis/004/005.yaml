theological_decisions:
- issue: Nature of divine response to Cain's sacrifice
  chosen_reading: Render God's response as withheld regard/favor without specifying
    a doctrinal reason in the translation.
  alternative_readings:
  - Render more explicitly as 'did not accept'
  - Render more explicitly as 'did not look with favor'
  rationale: The Hebrew states that he did not 'regard' Cain and his offering. The
    verse itself does not explain why, so the translation should not import a theological
    explanation. 'Had no regard' preserves the text's restraint while still communicating
    rejection.
  doctrine_reference: Translation philosophy items 1 and 3
