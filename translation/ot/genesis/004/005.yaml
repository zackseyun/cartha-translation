id: GEN.4.5
reference: Genesis 4:5
source:
  edition: WLC
  text: וְ/אֶל קַ֥יִן וְ/אֶל מִנְחָת֖/וֹ לֹ֣א שָׁעָ֑ה וַ/יִּ֤חַר לְ/קַ֨יִן֙ מְאֹ֔ד
    וַֽ/יִּפְּל֖וּ פָּנָֽי/ו־־׃
translation:
  text: But for Cain and for his offering he had no regard. So Cain became very angry,
    and his face fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not look with favor on Cain and his offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his face fell,' an idiom for becoming downcast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  chosen: for
  alternatives:
  - toward
  - to
  lexicon: HALOT
  rationale: With שָׁעָה ('to look/gaze, pay regard') and repeated before both 'Cain'
    and 'his offering,' the preposition marks the object of regard. 'For' in English
    idiom best conveys favorable regard here without sounding wooden.
- source_word: מִנְחָה
  chosen: offering
  alternatives:
  - gift
  - tribute
  lexicon: HALOT
  rationale: In Genesis 4 the context is cultic presentation to God, so 'offering'
    is the clearest contextual rendering. 'Gift' or 'tribute' are lexically possible
    but less specific in English.
- source_word: לֹא שָׁעָה
  chosen: he had no regard
  alternatives:
  - he did not look with favor
  - he did not pay attention
  lexicon: HALOT
  rationale: 'The verb שָׁעָה here denotes looking with favorable regard or paying
    heed. ''He had no regard'' is concise, natural English and preserves the sense
    of withheld favor without over-paraphrasing. The subject is implicit from context:
    God/the LORD from the preceding verse.'
- source_word: וַיִּחַר
  chosen: became very angry
  alternatives:
  - burned with anger
  - was very angry
  lexicon: HALOT
  rationale: The idiom literally involves burning, but in English 'became very angry'
    communicates the emotional state clearly. 'Burned with anger' is vivid and possible,
    but slightly more interpretive as an English idiom.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard adverbial intensifier; 'very' is the most natural modern English
    equivalent.
- source_word: וַיִּפְּלוּ פָּנָיו
  chosen: his face fell
  alternatives:
  - his countenance fell
  - his face was downcast
  lexicon: HALOT
  rationale: This Hebrew idiom expresses visible dejection or sullen downcast emotion.
    'His face fell' is a natural English idiom that closely matches the Hebrew image.
    'Countenance' is too archaic; 'was downcast' is interpretive but possible.
