theological_decisions:
- issue: Whether the verse promises Cain mastery over sin, commands him to master
    it, or states his capacity to do so
  chosen_reading: 'The main text renders the final clause as exhortation: ''you must
    rule over it.'''
  alternative_readings:
  - '''you shall rule over it'' (predictive)'
  - '''you can rule over it'' (ability/possibility)'
  rationale: The Hebrew imperfect permits more than one nuance. In context, God is
    warning and admonishing Cain, so an exhortational rendering best preserves the
    moral force without importing a deterministic promise or a developed doctrine
    of human ability. Alternatives are preserved in a footnote to maintain the interpretive
    tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
