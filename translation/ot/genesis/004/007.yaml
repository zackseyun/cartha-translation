id: GEN.4.7
reference: Genesis 4:7
source:
  edition: WLC
  text: הֲ/ל֤וֹא אִם תֵּיטִיב֙ שְׂאֵ֔ת וְ/אִם֙ לֹ֣א תֵיטִ֔יב לַ/פֶּ֖תַח חַטָּ֣את רֹבֵ֑ץ
    וְ/אֵלֶ֨י/ךָ֙ תְּשׁ֣וּקָת֔/וֹ וְ/אַתָּ֖ה תִּמְשָׁל בּֽ/וֹ־־׃
translation:
  text: If you do well, will there not be acceptance? But if you do not do well, sin
    is crouching at the door; its desire is for you, but you must rule over it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'lifting up'; the sense may be that Cain's face would
      be lifted or that he would receive acceptance.
    reason: lexical_alternative
  - marker: b
    text: Or 'a sin offering is lying at the door,' though the immediate imagery more
      naturally suggests sin personified as a crouching beast.
    reason: alternative_reading
  - marker: c
    text: Or 'its longing' or 'its urge.' Compare the similar wording in Genesis 3:16.
    reason: cross_reference
  - marker: d
    text: Or 'you shall rule over it' or 'you can rule over it.' The Hebrew can be
      read as exhortation, prediction, or possibility.
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּיטִיב
  chosen: do well
  alternatives:
  - do what is good
  - act rightly
  lexicon: HALOT
  rationale: Hiphil of יטב here refers to doing what is right/good rather than merely
    feeling well. 'Do well' preserves the concise conditional structure and echoes
    the moral dimension of the Hebrew.
- source_word: שְׂאֵת
  chosen: acceptance
  alternatives:
  - lifting up
  - exaltation
  - forgiveness
  lexicon: HALOT
  rationale: The noun literally relates to 'lifting up,' but in this context the idiom
    most naturally refers to Cain's countenance or status being lifted/accepted by
    God. 'Acceptance' communicates the sense clearly in modern English while preserving
    the divine-response context. The more literal 'lifting up' is preserved in a footnote
    because the Hebrew is compact and debated.
- source_word: לַפֶּתַח
  chosen: at the door
  alternatives:
  - at the entrance
  - at the doorway
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'At the door' is idiomatic and vivid,
    fitting the image of sin as a threatening presence just outside or at the threshold.
- source_word: חַטָּאת
  chosen: sin
  alternatives:
  - sin offering
  lexicon: HALOT
  rationale: Although חַטָּאת can mean either 'sin' or 'sin offering,' the immediate
    imagery with 'crouching' strongly favors personified 'sin' as a predator. The
    alternative 'sin offering' is worth preserving in a footnote because it has been
    proposed in interpretation.
- source_word: רֹבֵץ
  chosen: is crouching
  alternatives:
  - lies down
  - is lurking
  lexicon: HALOT
  rationale: The participle evokes an animal crouching or lying in wait. 'Is crouching'
    best preserves the predatory metaphor and the ongoing, imminent threat.
- source_word: תְּשׁוּקָתוֹ
  chosen: its desire
  alternatives:
  - its longing
  - its urge
  lexicon: HALOT
  rationale: The noun denotes desire/longing. Because the antecedent here is best
    taken as 'sin,' the English pronoun is neuter. 'Desire' also preserves the verbal
    link with Genesis 3:16 without over-interpreting the exact nuance.
- source_word: תִּמְשָׁל בּוֹ
  chosen: you must rule over it
  alternatives:
  - you shall rule over it
  - you can rule over it
  lexicon: HALOT
  rationale: The imperfect can be read as modal or predictive. In this admonitory
    context, 'you must rule over it' best conveys divine exhortation without overstating
    a guaranteed outcome. The alternatives are preserved because the line is syntactically
    and theologically debated.
