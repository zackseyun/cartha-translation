theological_decisions:
- issue: How to render Cain's departure relative to God
  chosen_reading: Then Cain went out from before the LORD
  alternative_readings:
  - Then Cain went out from the presence of the LORD
  rationale: The Hebrew idiom can be rendered more dynamically as 'from the presence of,' but 'from before the LORD' better preserves the source wording and leaves intact the narrative-theological tension of alienation without adding interpretive explanation.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence.
