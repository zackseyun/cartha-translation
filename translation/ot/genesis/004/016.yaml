id: GEN.4.16
reference: Genesis 4:16
source:
  edition: WLC
  text: וַ/יֵּ֥צֵא קַ֖יִן מִ/לִּ/פְנֵ֣י יְהוָ֑ה וַ/יֵּ֥שֶׁב בְּ/אֶֽרֶץ נ֖וֹד קִדְמַת עֵֽדֶן־־׃
translation:
  text: Then Cain went out from before Yahweh and settled in the land of Nod, east of Eden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nod sounds like the Hebrew word for 'wandering,' echoing Cain's judgment earlier in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - went away
  lexicon: HALOT
  rationale: The wayyiqtol of יצא straightforwardly denotes movement outward. 'Went out' preserves the concrete verbal sense without overinterpreting the manner of departure.
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - away from before
  lexicon: HALOT
  rationale: Literally 'from before/from the face of.' 'From before' best preserves the Hebrew idiom and its spatial-relational force, while remaining natural in English when followed by 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - dwelt
  - lived
  - resided
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'settle.' In this narrative context, 'settled' communicates taking up habitation in a place and reads naturally in modern English.
- source_word: בְּאֶרֶץ נוֹד
  chosen: in the land of Nod
  alternatives:
  - in the land of wandering
  - in Nod
  lexicon: HALOT
  rationale: Because Nod functions here as a place name, it is transliterated rather than translated, in keeping with the policy to transliterate names. The possible wordplay with 'wandering' is significant but secondary and is preserved in a footnote.
- source_word: קִדְמַת עֵדֶן
  chosen: east of Eden
  alternatives:
  - to the east of Eden
  - in front of Eden on the east
  lexicon: HALOT
  rationale: קִדְמַת indicates an easterly/front-oriented location relative to Eden. 'East of Eden' is concise, idiomatic, and captures the directional sense without unnecessary expansion.
- source_word: עֵדֶן
  chosen: Eden
  lexicon: HALOT
  rationale: A proper place name, so transliteration is appropriate.
