theological_decisions:
- issue: Whether to include Cain's spoken words absent from the Masoretic Text
  chosen_reading: Include the clause 'Let us go out to the field' in the main text,
    while footnoting that the Hebrew Masoretic Text lacks these words.
  alternative_readings:
  - Retain the shorter MT in the main text without supplied speech
  - Include 'Let us go into the field' as a slightly different English form
  rationale: This is primarily a textual decision rather than a doctrinal one. The
    shorter MT is abrupt and likely reflects accidental omission, while multiple ancient
    witnesses preserve the speech. Including the clause yields a coherent narrative
    and likely original sense, but transparency requires preserving the MT omission
    in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension/alternatives in footnotes)
