id: GEN.4.8
reference: Genesis 4:8
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר קַ֖יִן אֶל הֶ֣בֶל אָחִ֑י/ו וַֽ/יְהִי֙ בִּ/הְיוֹתָ֣/ם בַּ/שָּׂדֶ֔ה
    וַ/יָּ֥קָם קַ֛יִן אֶל הֶ֥בֶל אָחִ֖י/ו וַ/יַּהַרְגֵֽ/הוּ־־׃
translation:
  text: And Cain said to Abel his brother, “Let us go out to the field.” Then, while
    they were in the field, Cain rose up against Abel his brother and killed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Masoretic Text reads only, 'And Cain said to Abel his brother,' without
      the words 'Let us go out to the field.' The added clause is supported by ancient
      witnesses such as the Septuagint, Samaritan Pentateuch, and Vulgate.
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And Cain said
  alternatives:
  - And Cain spoke
  lexicon: HALOT
  rationale: The verb אמר ordinarily means 'say.' Because the Masoretic Text as given
    lacks the content of Cain's speech, English still needs a natural introductory
    verb before the supplied quotation preserved in ancient versions; 'said' is the
    most direct rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition normally marks direction toward a person, hence 'to Abel.'
    Some English versions smooth to 'said to' or 'talked with'; 'to' best reflects
    the Hebrew.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: The construct with pronominal suffix is straightforward. Retaining 'his
    brother' preserves the narrative emphasis on fratricide, especially since the
    phrase recurs later in the verse.
- source_word: '[elliptical speech after וַיֹּאמֶר]'
  chosen: “Let us go out to the field.”
  alternatives:
  - '[no words supplied in main text]'
  - “Let us go into the field.”
  lexicon: Septuagint; Samaritan Pentateuch; Vulgate
  rationale: The MT is defective here, reading only 'And Cain said to Abel his brother'
    with no speech content. Ancient witnesses preserve a likely original clause equivalent
    to 'Let us go out to the field.' Because the immediate context centers on their
    being in the field and the omission is likely accidental, the supplied words are
    included in the main text, with the shorter MT preserved in a footnote for auditability.
- source_word: וַיְהִי בִּהְיוֹתָם
  chosen: Then, while they were
  alternatives:
  - And it happened when they were
  - When they were
  lexicon: HALOT
  rationale: This construction is a common narrative temporal frame. 'Then, while
    they were' gives readable modern English while preserving the temporal sense.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: שָׂדֶה most naturally means 'field/open country.' 'Field' is the standard
    and fits the narrative setting.
- source_word: וַיָּקָם ... אֶל
  chosen: rose up against
  alternatives:
  - attacked
  - rose against
  lexicon: HALOT
  rationale: The idiom 'rose up against' preserves the Hebrew imagery and hostility
    more closely than the more interpretive 'attacked,' while remaining natural English.
- source_word: וַיַּהַרְגֵהוּ
  chosen: killed him
  alternatives:
  - murdered him
  - struck him down
  lexicon: HALOT
  rationale: The verb הרג means 'kill/slay.' Although the act is morally murder, 'killed'
    is the more lexically direct rendering; 'murdered' would import a legal/moral
    categorization not explicit in the verb itself.
