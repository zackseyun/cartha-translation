theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set the default rendering of YHWH
    as 'the LORD.' This preserves reverential convention and aligns with the stated
    translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מִקֵּץ יָמִים
  chosen_reading: a non-eschatological temporal idiom ('in the course of time')
  alternative_readings:
  - at the end of days
  rationale: The phrase could be rendered more literally, but in Genesis 4:3 the context
    concerns elapsed time before Cain's offering, not a theological claim about the
    eschatological end. The translation preserves the plain narrative sense without
    importing later doctrinal associations.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve the source text''s plain sense'
