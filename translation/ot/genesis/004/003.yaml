id: GEN.4.3
reference: Genesis 4:3
source:
  edition: WLC
  text: וַֽ/יְהִ֖י מִ/קֵּ֣ץ יָמִ֑ים וַ/יָּבֵ֨א קַ֜יִן מִ/פְּרִ֧י הָֽ/אֲדָמָ֛ה מִנְחָ֖ה
    לַֽ/יהוָֽה׃
translation:
  text: And in the course of time, Cain brought to the LORD an offering from the fruit
    of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the end of days'; that is, after a period of time.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the produce of the ground.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''to the LORD'' represents the divine name YHWH; alternatively
      transliterated ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In natural modern English, its force is adequately represented by a simple connective
    rather than the more wooden 'it came to pass.'
- source_word: מִקֵּץ יָמִים
  chosen: in the course of time
  alternatives:
  - after some time
  - at the end of days
  lexicon: HALOT
  rationale: The idiom literally means 'from the end of days,' but in context it refers
    to the passing of a period of time rather than an eschatological 'end of days.'
    'In the course of time' preserves the temporal sense in idiomatic English.
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - came with
  - presented
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to bring/present something. 'Brought' is
    the most straightforward rendering and fits the offering context.
- source_word: קַיִן
  chosen: Cain
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: מִפְּרִי הָאֲדָמָה
  chosen: from the fruit of the ground
  alternatives:
  - some of the produce of the ground
  - from the produce of the soil
  lexicon: HALOT
  rationale: פְּרִי is literally 'fruit/produce,' and אֲדָמָה here is 'ground/soil.'
    'Fruit of the ground' is formally close and natural enough in English, while preserving
    the agricultural connection to Cain's vocation.
- source_word: מִנְחָה
  chosen: an offering
  alternatives:
  - a gift offering
  - a tribute
  lexicon: HALOT
  rationale: מִנְחָה is a broad term for a gift, tribute, or offering presented to
    a superior or to God. In this worship context, 'offering' is the clearest and
    most idiomatic choice without over-specifying the type.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated,
    following established covenant-name convention.
