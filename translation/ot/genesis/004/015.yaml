theological_decisions:
- issue: Nature of the protective sign on Cain
  chosen_reading: Rendered אוֹת as 'mark' without specifying its form or meaning beyond a protective sign.
  alternative_readings:
  - sign
  - token
  rationale: The Hebrew does not define the physical or symbolic nature of the אות. The translation preserves that ambiguity rather than importing later speculation about what the mark was.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Identity of the one receiving sevenfold vengeance
  chosen_reading: The English makes clear that the killer of Cain is the one on whom vengeance falls.
  alternative_readings:
  - A more literal but ambiguous 'he will be avenged sevenfold'
  rationale: The Hebrew passive can be rendered literally, but in English that wording can be misunderstood. The context indicates a warning against killing Cain, so the translation clarifies the target of divine vengeance without adding new theological content.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic or academic)
