id: GEN.4.15
reference: Genesis 4:15
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר ל֣/וֹ יְהוָ֗ה לָ/כֵן֙ כָּל הֹרֵ֣ג קַ֔יִן שִׁבְעָתַ֖יִם יֻקָּ֑ם וַ/יָּ֨שֶׂם יְהוָ֤ה לְ/קַ֨יִן֙ א֔וֹת לְ/בִלְתִּ֥י הַכּוֹת אֹת֖/וֹ כָּל מֹצְאֽ/וֹ־־־׃
translation:
  text: Then Yahweh said to him, “Therefore whoever kills Cain, vengeance will be taken on him sevenfold.” And Yahweh put a mark on Cain, lest anyone finding him should strike him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will be avenged sevenfold.' The Hebrew passive is compact and can be rendered more literally, but the main text clarifies that the one who kills Cain will face divine vengeance.
    reason: lexical_alternative
  - marker: b
    text: Or 'sign.' The Hebrew word can refer broadly to a sign or distinguishing mark; the text does not specify what form it took.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH rather than transliteration.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Signals the inferential force of God's response to Cain. 'Therefore' preserves the formal connection without sounding archaic in context.
- source_word: כָּל הֹרֵג קַיִן
  chosen: whoever kills Cain
  alternatives:
  - everyone killing Cain
  - anyone who kills Cain
  lexicon: HALOT
  rationale: The construction is generic and indefinite. 'Whoever kills Cain' is idiomatic English and preserves the universal scope.
- source_word: שִׁבְעָתַיִם
  chosen: sevenfold
  alternatives:
  - seven times
  - seven times over
  lexicon: HALOT
  rationale: The adverbial dual form expresses a sevenfold measure. 'Sevenfold' is the most compact and natural rendering in English.
- source_word: יֻקָּם
  chosen: vengeance will be taken on him
  alternatives:
  - he will be avenged
  - it will be avenged
  lexicon: HALOT
  rationale: The passive of נקם leaves the agent implicit. Because English 'will be avenged' can sound ambiguous about whether Cain or his killer is the beneficiary, 'vengeance will be taken on him' makes clear that the killer will incur divine retribution while preserving the passive sense.
- source_word: אוֹת
  chosen: mark
  alternatives:
  - sign
  - token
  lexicon: HALOT
  rationale: '''Mark'' is the established and contextually fitting rendering here, referring to some identifying or protective sign placed on Cain. ''Sign'' is possible but less concrete in English.'
- source_word: לְבִלְתִּי הַכּוֹת אֹתוֹ
  chosen: so that no one who found him would strike him
  alternatives:
  - lest anyone finding him should kill him
  - to prevent anyone who found him from attacking him
  lexicon: HALOT
  rationale: The infinitive construction expresses purpose/prevention. 'Strike him' reflects נכה more directly than 'kill him'; the verse states prevention of assault, not explicitly only homicide, though in context lethal violence is in view.
- source_word: כָּל מֹצְאוֹ
  chosen: no one who found him
  alternatives:
  - anyone who found him
  - whoever found him
  lexicon: HALOT
  rationale: 'Combined with the negative purpose clause, this yields natural English: ''so that no one who found him would strike him.'' It preserves the indefinite universal sense of the Hebrew participial expression.'
