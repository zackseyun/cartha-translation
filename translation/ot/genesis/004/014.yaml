id: GEN.4.14
reference: Genesis 4:14
source:
  edition: WLC
  text: הֵן֩ גֵּרַ֨שְׁתָּ אֹתִ֜/י הַ/יּ֗וֹם מֵ/עַל֙ פְּנֵ֣י הָֽ/אֲדָמָ֔ה וּ/מִ/פָּנֶ֖י/ךָ
    אֶסָּתֵ֑ר וְ/הָיִ֜יתִי נָ֤ע וָ/נָד֙ בָּ/אָ֔רֶץ וְ/הָיָ֥ה כָל מֹצְאִ֖/י יַֽהַרְגֵֽ/נִי־׃
translation:
  text: Look, today you have driven me away from the face of the ground, and I will
    be hidden from your face. I will be a wanderer and a fugitive on the earth, and
    whoever finds me will kill me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will hide from your presence' / 'I will be hidden from your presence.'
      The Hebrew reads literally 'from your face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the land.' The Hebrew אֶרֶץ can mean either 'earth' or 'land,' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse particle marking emphasis or drawing attention. 'Look' preserves
    the immediacy in natural modern English better than the more archaic 'Behold.'
- source_word: גֵּרַשְׁתָּ
  chosen: you have driven me away
  alternatives:
  - you have banished me
  - you have expelled me
  lexicon: HALOT
  rationale: גרשׁ commonly denotes driving out/expelling. 'Driven me away' preserves
    the force of expulsion while remaining idiomatic.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the ground
  alternatives:
  - from the surface of the ground
  - from the land
  lexicon: HALOT
  rationale: Literally 'from upon the face of the ground.' 'Face of the ground' preserves
    the Hebrew imagery and echoes the earlier curse on the ground in context. 'Ground'
    is preferable to 'land' here because אֲדָמָה in Genesis 4 is tied to cultivated
    soil and Cain's relation to it.
- source_word: וּמִפָּנֶיךָ אֶסָּתֵר
  chosen: I will be hidden from your face
  alternatives:
  - I will hide from your presence
  - I will be concealed from your presence
  lexicon: HALOT
  rationale: The Niphal form naturally yields a passive/reflexive sense, 'be hidden.'
    Retaining 'your face' reflects the Hebrew idiom closely; in English it communicates
    divine presence without over-paraphrasing. 'From your presence' is a valid interpretive
    alternative preserved in a footnote.
- source_word: נָע וָנָד
  chosen: a wanderer and a fugitive
  alternatives:
  - restless and wandering
  - wandering and homeless
  lexicon: HALOT
  rationale: The paired terms express unsettled, displaced existence. 'Wanderer and
    a fugitive' preserves the duality and matches the narrative judgment pronounced
    in the previous verse. 'Restless wanderer' is possible but compresses two terms
    into one phrase.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' Here the broader sense fits Cain's
    fear of roaming beyond a localized territory, while still allowing the narrative's
    primeval scope. The alternative 'land' is preserved in a footnote because context
    could support a more regional sense.
- source_word: כָל מֹצְאִי
  chosen: whoever finds me
  alternatives:
  - everyone who finds me
  - anyone finding me
  lexicon: HALOT
  rationale: 'The construction is an indefinite universal: ''whoever finds me.'' This
    is idiomatic English and preserves the open-ended force of כָל + participle.'
- source_word: יַהַרְגֵנִי
  chosen: will kill me
  alternatives:
  - will slay me
  lexicon: HALOT
  rationale: הרג is the common verb 'kill/slay.' 'Kill' is the clearest modern equivalent;
    'slay' is more literary and less natural here.
