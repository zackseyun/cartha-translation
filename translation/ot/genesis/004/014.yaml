theological_decisions:
- issue: Rendering of divine-presence idiom in וּמִפָּנֶיךָ אֶסָּתֵר
  chosen_reading: I will be hidden from your face
  alternative_readings:
  - I will hide from your presence
  - I will be hidden from your presence
  rationale: The Hebrew uses the concrete idiom 'from your face.' Preserving it maintains
    the relational and theological weight of alienation from God without importing
    a stronger doctrinal claim than the text states. Because English readers may naturally
    understand this as 'presence,' that alternative is preserved in a footnote rather
    than moved into the main text.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it'
