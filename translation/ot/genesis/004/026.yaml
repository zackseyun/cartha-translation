id: GEN.4.26
reference: Genesis 4:26
source:
  edition: WLC
  text: וּ/לְ/שֵׁ֤ת גַּם הוּא֙ יֻלַּד בֵּ֔ן וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ אֱנ֑וֹשׁ אָ֣ז הוּחַ֔ל לִ/קְרֹ֖א בְּ/שֵׁ֥ם יְהוָֽה־־־׃פ
translation:
  text: And to Seth also a son was born, and he called his name Enosh. At that time people began to call on the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Then it was begun to call on the name of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: A minority interpretation understands the verb as 'was profaned,' yielding something like 'Then people began to profane the name of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/לְ/שֵׁת
  chosen: And to Seth
  alternatives:
  - And for Seth
  - To Seth also
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition naturally introduce a new clause with Seth as the indirect object. 'And to Seth' preserves the Hebrew structure while remaining natural English.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - as well
  lexicon: HALOT
  rationale: גַּם marks addition in relation to the preceding genealogy notice; 'also' is the most straightforward rendering.
- source_word: יֻלַּד בֵּן
  chosen: a son was born
  alternatives:
  - a son was fathered
  - he had a son
  lexicon: HALOT
  rationale: The passive of ילד with 'son' is idiomatically rendered 'a son was born.' This keeps the Hebrew passive sense without awkward English.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ אֱנוֹשׁ
  chosen: and he called his name Enosh
  alternatives:
  - and named him Enosh
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' The main text keeps a relatively transparent rendering while remaining readable. 'Named him Enosh' is a valid smoother alternative.
- source_word: אֱנוֹשׁ
  chosen: Enosh
  lexicon: HALOT
  rationale: Personal names are transliterated by project policy. The name may echo the common noun for 'man/mortal man,' but here it functions as a proper name.
- source_word: אָז
  chosen: At that time
  alternatives:
  - Then
  lexicon: HALOT
  rationale: אָז is temporal. 'At that time' makes the temporal force explicit and avoids over-compressing the clause.
- source_word: הוּחַל
  chosen: began
  alternatives:
  - it was begun
  - one began
  - it was profaned
  lexicon: HALOT
  rationale: The Hophal of חלל here is commonly understood in the inceptive sense, 'it was begun' > idiomatic English 'began.' A minority reading takes the root in the sense 'profane,' yielding 'then people began to profane/call profanely by the name of the LORD'; this is preserved in a footnote because the clause is genuinely debated.
- source_word: לִקְרֹא בְּשֵׁם
  chosen: to call on the name
  alternatives:
  - to call by the name
  - to proclaim the name
  lexicon: HALOT
  rationale: In Genesis and elsewhere, קרא בשם often denotes invocation/worshipful appeal. 'Call on the name' best fits the idiom in context while preserving the wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
