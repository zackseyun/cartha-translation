id: GEN.4.17
reference: Genesis 4:17
source:
  edition: WLC
  text: וַ/יֵּ֤דַע קַ֨יִן֙ אֶת אִשְׁתּ֔/וֹ וַ/תַּ֖הַר וַ/תֵּ֣לֶד אֶת חֲנ֑וֹךְ וַֽ/יְהִי֙ בֹּ֣נֶה עִ֔יר וַ/יִּקְרָא֙ שֵׁ֣ם הָ/עִ֔יר כְּ/שֵׁ֖ם בְּנ֥/וֹ חֲנֽוֹךְ־־׃
translation:
  text: Cain knew his wife, and she conceived and bore Enoch. Then he was building a city, and he named the city after his son, Enoch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'he named the city after his son, Enoch.' The Hebrew more literally reads, 'he called the name of the city after the name of his son.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'knew his wife,' a common idiom for sexual relations.
    reason: cultural_note
  - marker: c
    text: 'The Hebrew construction can suggest ongoing action: ''he was building a city,'' rather than simply ''he built a city.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'he called the name of the city after the name of his son'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - had relations with
  - lay with
  lexicon: HALOT
  rationale: יָדַע literally means 'know,' and in this context is the standard Hebrew idiom for sexual relations. 'Knew' preserves the source-text idiom and literary register better than a more explicit paraphrase.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: The noun means 'woman/wife'; with the pronominal suffix and marital context, 'his wife' is the natural and accurate rendering.
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: A standard verb for becoming pregnant. 'Conceived' is concise, idiomatic, and fits the narrative sequence.
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: The verb יָלַד commonly means 'bear/give birth.' 'Bore' is slightly more formal but remains natural in English biblical narrative.
- source_word: חֲנוֹךְ
  chosen: Enoch
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: וַיְהִי בֹּנֶה עִיר
  chosen: Then he was building a city
  alternatives:
  - and he built a city
  - and he became a builder of a city
  lexicon: HALOT
  rationale: The construction combines היה with the participle בֹּנֶה, which naturally conveys ongoing or progressive action rather than a simple completed act. 'He was building a city' best reflects the Hebrew aspect. 'Then' helps the English flow of the waw-consecutive sequence without overstating temporal distance.
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: The standard sense is 'city'; 'town' would undertranslate the normal lexical value.
- source_word: וַיִּקְרָא שֵׁם הָעִיר
  chosen: he called the name of the city
  alternatives:
  - he named the city
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called the name of.' The translation keeps much of the form while remaining intelligible. A more idiomatic 'named the city' is possible but less transparent to the source wording.
- source_word: כְּשֵׁם בְּנוֹ
  chosen: after the name of his son
  alternatives:
  - according to the name of his son
  - by the name of his son
  lexicon: HALOT
  rationale: The preposition כְּ here indicates correspondence. 'After the name of his son' is idiomatic English for naming something in accordance with someone else's name.
