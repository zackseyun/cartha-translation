  from: he called the name of the city after the name of his son
  to: he named the city after his son
  rationale: The current rendering is a very literal translation of the Hebrew idiom (קָרָא שֵׁם... כְּשֵׁם), which preserves the repetition of 'name' (שֵׁם) found in the source text. However, the resulting English phrase 'called the name... after the name...' is slightly unnatural. A more idiomatic rendering like 'he named the city after his son' (as noted in footnote a) or the slightly more formal 'he called the city by the name of his son' would improve the English flow while still conveying the meaning accurately.
