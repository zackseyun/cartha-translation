theological_decisions:
- issue: Rendering Eve's explanation of Seth's name
  chosen_reading: God has appointed for me another offspring
  alternative_readings:
  - God has set for me another seed
  - God has granted me another child
  rationale: The Hebrew contains a wordplay between שֵׁת (Seth) and שָׁת ('has set/appointed').
    The main text preserves the theological point that God is the giver and replacer
    after Abel's death, while using natural English. 'Offspring' avoids over-literal
    'seed' without losing the procreative sense.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Whether to make the sexual euphemism explicit
  chosen_reading: And Adam knew his wife again
  alternative_readings:
  - And Adam had relations with his wife again
  rationale: The source uses a conventional euphemism. Preserving it respects the
    literary texture and avoids paraphrasing beyond what the Hebrew warrants.
  doctrine_reference: Translation philosophy §§1, 6
