id: GEN.4.25
reference: Genesis 4:25
source:
  edition: WLC
  text: וַ/יֵּ֨דַע אָדָ֥ם עוֹד֙ אֶת אִשְׁתּ֔/וֹ וַ/תֵּ֣לֶד בֵּ֔ן וַ/תִּקְרָ֥א אֶת
    שְׁמ֖/וֹ שֵׁ֑ת כִּ֣י שָֽׁת לִ֤/י אֱלֹהִים֙ זֶ֣רַע אַחֵ֔ר תַּ֣חַת הֶ֔בֶל כִּ֥י
    הֲרָג֖/וֹ קָֽיִן־־־׃
translation:
  text: And Adam knew his wife again, and she bore a son and called his name Seth,
    for she said, “God has appointed for me another offspring in place of Abel, because
    Cain killed him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'has set/placed'; the name 'Seth' sounds like the verb used here,
      creating a wordplay.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - had relations with
  - lay with
  lexicon: HALOT
  rationale: יָדַע with a wife is the standard Hebrew euphemism for sexual relations.
    'Knew' preserves the source idiom and literary register better than a more explicit
    paraphrase.
- source_word: אָדָם
  chosen: Adam
  alternatives:
  - the man
  lexicon: HALOT
  rationale: Here the proper name is intended, not generic humanity. Transliteration
    follows the policy to transliterate personal names.
- source_word: עוֹד
  chosen: again
  alternatives:
  - once more
  - further
  lexicon: HALOT
  rationale: In context it marks a repeated marital union after the prior birth narrative;
    'again' is the most natural English equivalent.
- source_word: וַתֵּלֶד בֵּן
  chosen: she bore a son
  alternatives:
  - she gave birth to a son
  lexicon: HALOT
  rationale: A straightforward rendering of ילד + בן. 'Bore a son' is concise and
    idiomatic.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  chosen: called his name
  alternatives:
  - named him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is preserved because
    it remains clear in English and keeps the naming formula visible.
- source_word: שֵׁת
  chosen: Seth
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: שָׁת
  chosen: has appointed
  alternatives:
  - has set
  - has placed
  - has granted
  lexicon: HALOT
  rationale: The verb שִׁית/שׁוּת means to set or place. 'Has appointed' best captures
    the wordplay with the name Seth in idiomatic English and reflects Eve's interpretation
    of the birth as God's provision.
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendant
  lexicon: HALOT
  rationale: '''Offspring'' communicates the collective/procreative sense naturally
    in modern English. ''Seed'' is more formal but less natural here; ''descendant''
    is too narrow for a newborn replacement child.'
- source_word: אַחֵר
  chosen: another
  alternatives:
  - other
  lexicon: HALOT
  rationale: Standard attributive sense modifying 'offspring.'
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In this context תַּחַת expresses substitution or replacement. 'In place
    of' is the clearest idiomatic rendering.
- source_word: הֶבֶל
  chosen: Abel
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: הֲרָגוֹ
  chosen: killed him
  alternatives:
  - slew him
  - murdered him
  lexicon: HALOT
  rationale: The verb הרג means 'kill/slay.' 'Killed him' is the most direct lexical
    equivalent. While the act was morally murder, the Hebrew verb here is the common
    verb for killing rather than the more specific רצח.
- source_word: כִּי
  chosen: for / because
  alternatives:
  - that
  lexicon: HALOT
  rationale: The first כִּי introduces Eve's explanation for the name ('for she said');
    the second gives the reason Abel needed replacement ('because Cain killed him').
    Rendering them with different English conjunctions reflects their contextual function
    while preserving the causal sense.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, with singular verbal sense here it refers
    to the one God and is properly rendered 'God.'
