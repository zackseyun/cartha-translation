id: GEN.4.9
reference: Genesis 4:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל קַ֔יִן אֵ֖י הֶ֣בֶל אָחִ֑י/ךָ וַ/יֹּ֨אמֶר֙ לֹ֣א יָדַ֔עְתִּי הֲ/שֹׁמֵ֥ר אָחִ֖/י אָנֹֽכִי־׃
translation:
  text: Then Yahweh said to Cain, “Where is Abel your brother?” And he said, “I do not know. Am I my brother’s keeper?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I did not know.” The Hebrew perfect may be rendered as a past denial, though in context it functions naturally as a present claim of ignorance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said / And he said
  alternatives:
  - said
  - asked
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Said' is the basic sense of אמר; 'Then' at the first clause and 'And' at the second preserve Hebrew narrative flow in readable English without over-paraphrase.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense in direct speech introduction.
- source_word: אֵי
  chosen: Where is
  alternatives:
  - Where
  - In what place is
  lexicon: HALOT
  rationale: 'Interrogative of location. English idiom naturally supplies the copula: ''Where is Abel your brother?'''
- source_word: הֶבֶל
  chosen: Abel
  lexicon: HALOT
  rationale: Personal name is transliterated by standard convention per translation philosophy.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your sibling
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine singular noun 'brother' with 2ms suffix. Per gender-accurate policy, 'brother' is retained rather than neutralized.
- source_word: לֹא יָדַעְתִּי
  chosen: I do not know
  alternatives:
  - I don't know
  - I did not know
  lexicon: HALOT
  rationale: Although the Hebrew perfect can be rendered 'I did not know,' in this dialogue it functions as Cain's present denial of knowledge. 'I do not know' is idiomatic modern English and best matches the discourse context.
- source_word: הֲשֹׁמֵר
  chosen: keeper
  alternatives:
  - guard
  - watchman
  - one who watches over
  lexicon: HALOT
  rationale: From שמר, 'to keep/watch/guard.' In this rhetorical question, 'keeper' is the most natural and established English rendering, conveying responsibility for oversight without adding interpretive detail.
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - my sibling
  lexicon: HALOT
  rationale: The 1cs suffix is explicit. 'Brother' preserves the source's masculine familial term in keeping with the gender-accurate policy.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis in Hebrew, but English conveys the rhetorical force adequately in 'Am I my brother’s keeper?' without an awkwardly over-explicit 'I myself.'
