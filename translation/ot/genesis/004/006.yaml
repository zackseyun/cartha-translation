id: GEN.4.6
reference: Genesis 4:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל קָ֑יִן לָ֚/מָּה חָ֣רָה לָ֔/ךְ וְ/לָ֖/מָּה נָפְל֥וּ פָנֶֽי/ךָ־׃
translation:
  text: Then Yahweh said to Cain, “Why are you angry, and why has your face fallen?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why is your face downcast?” The Hebrew literally says, “Why has your face fallen?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern English narrative flow while preserving sequence better than a bare 'and.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern equivalent.
- source_word: קָיִן
  chosen: Cain
  rationale: Personal names are transliterated by standard English convention.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative asking cause or reason; 'Why' is the idiomatic English equivalent.
- source_word: חָרָה לָךְ
  chosen: are you angry
  alternatives:
  - has it burned for you
  - are you burning with anger
  lexicon: HALOT
  rationale: The idiom literally involves burning, but in context clearly means anger. 'Are you angry' communicates the sense in clear modern English without over-literal awkwardness.
- source_word: וְלָמָּה
  chosen: and why
  alternatives:
  - and for what reason
  lexicon: HALOT
  rationale: Coordinates the second interrogative clause straightforwardly.
- source_word: נָפְלוּ פָנֶיךָ
  chosen: has your face fallen
  alternatives:
  - is your face downcast
  - have your countenance fallen
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'your face has fallen.' Retaining 'has your face fallen' preserves the metaphor and remains understandable in English. 'Downcast' is possible but interprets the idiom more explicitly.
