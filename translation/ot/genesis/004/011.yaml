id: GEN.4.11
reference: Genesis 4:11
source:
  edition: WLC
  text: וְ/עַתָּ֖ה אָר֣וּר אָ֑תָּה מִן הָֽ/אֲדָמָה֙ אֲשֶׁ֣ר פָּצְתָ֣ה אֶת פִּ֔י/הָ
    לָ/קַ֛חַת אֶת דְּמֵ֥י אָחִ֖י/ךָ מִ/יָּדֶֽ/ךָ־־־׃
translation:
  text: And now you are cursed from the ground, which has opened its mouth to receive
    your brother’s blood from your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'away from the ground'; the Hebrew may suggest either that the ground
      is the sphere/source of the curse or that Cain is driven from it.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'bloods,' an idiom for bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Introduces the immediate consequence of Cain's act. 'And now' preserves
    the conjunction plus temporal adverb and reads naturally in English.
- source_word: אָרוּר אָתָּה
  chosen: you are cursed
  alternatives:
  - cursed are you
  - you are under a curse
  lexicon: HALOT
  rationale: Predicate adjective plus pronoun expresses Cain's cursed state. 'You
    are cursed' is idiomatic modern English while retaining the force of the Hebrew.
- source_word: מִן הָאֲדָמָה
  chosen: from the ground
  alternatives:
  - away from the ground
  - by the ground
  lexicon: HALOT
  rationale: 'The preposition מִן with ''ground'' most naturally indicates separation/source:
    Cain is cursed in relation to the ground. ''From the ground'' preserves the ambiguity
    better than over-interpreting it as either strictly source (''by'') or banishment
    (''away from'').'
- source_word: אֲשֶׁר פָּצְתָה אֶת פִּיהָ
  chosen: which has opened its mouth
  alternatives:
  - that opened its mouth
  - which opened her mouth
  lexicon: HALOT
  rationale: The relative clause describes the ground personified as opening its mouth.
    Perfect verb can be rendered with English present perfect here to connect the
    prior act with the present curse. 'Its mouth' is natural English for the feminine
    noun without forcing gendered personification.
- source_word: לָקַחַת
  chosen: to receive
  alternatives:
  - to take
  - to accept
  lexicon: HALOT
  rationale: Though the verb is literally 'to take,' in this context of the ground
    taking in spilled blood, 'receive' is more idiomatic and preserves the image without
    sounding mechanical.
- source_word: דְּמֵי אָחִיךָ
  chosen: your brother’s blood
  alternatives:
  - the blood of your brother
  - your brother's bloodshed
  lexicon: HALOT
  rationale: The plural form of 'bloods' is a common Hebrew idiom for blood/bloodshed.
    In English singular 'blood' best conveys the sense here without unnecessary awkwardness.
- source_word: מִיָּדֶךָ
  chosen: from your hand
  alternatives:
  - at your hand
  - from your power
  lexicon: HALOT
  rationale: The phrase is literal and vivid, indicating Cain's direct responsibility.
    'From your hand' preserves the Hebrew image and moral agency.
