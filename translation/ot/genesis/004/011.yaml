theological_decisions:
- issue: Meaning of the curse relation to the ground
  chosen_reading: Cain is cursed in relation to or away from the ground, without specifying
    more than the Hebrew does.
  alternative_readings:
  - Cain is cursed by the ground
  - Cain is banished from the ground
  rationale: The Hebrew מִן can support nuances of source or separation. The translation
    preserves the tension rather than resolving it into either agricultural infertility
    alone or exile alone.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
