theological_decisions:
- issue: Whether to make explicit that this is a polygynous marriage arrangement
  chosen_reading: Rendered 'two wives' without added moral commentary
  alternative_readings:
  - two women
  - married two women
  rationale: The verse narrates Lamech's taking of two wives but does not itself comment
    on the morality of the act. The translation should state the marital fact clearly
    without importing evaluative language.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
