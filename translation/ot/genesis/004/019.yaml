  from: the second
  to: the other
  rationale: While 'the second' is a literal translation of הַשֵּׁנִית, in English,
    when referring to the remaining member of a pair, 'the other' is more idiomatic.
    Since the context establishes there are exactly two wives, 'the other' is a more
    natural and equally accurate rendering. This is the choice made by most modern
    English translations (e.g., ESV, NRSV, NASB).
