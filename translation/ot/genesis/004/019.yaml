id: GEN.4.19
reference: Genesis 4:19
source:
  edition: WLC
  text: וַ/יִּֽקַּֽח ל֥/וֹ לֶ֖מֶךְ שְׁתֵּ֣י נָשִׁ֑ים שֵׁ֤ם הָֽ/אַחַת֙ עָדָ֔ה וְ/שֵׁ֥ם
    הַ/שֵּׁנִ֖ית צִלָּֽה־׃
translation:
  text: Lamech took for himself two wives. The name of the one was Adah, and the name
    of the other was Zillah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Lamech married two women.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the second'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The verb לקח literally means 'took.' In marriage contexts it can idiomatically
    mean 'took as wife' or 'married,' but here the following phrase 'for himself two
    wives' already makes the marital sense explicit, so 'took' preserves the Hebrew
    wording without obscuring meaning.
- source_word: לוֹ
  chosen: for himself
  alternatives:
  - for him
  - to himself
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks personal interest or advantage.
    'For himself' brings out the reflexive nuance in idiomatic English.
- source_word: שְׁתֵּי נָשִׁים
  chosen: two wives
  alternatives:
  - two women
  lexicon: HALOT
  rationale: Although אִשָּׁה/נָשִׁים can mean 'woman/women' or 'wife/wives,' the
    construction with לקח in this context clearly refers to marriage. 'Two wives'
    is the most accurate contextual rendering.
- source_word: שֵׁם הָאַחַת
  chosen: The name of the one
  alternatives:
  - One was named
  - the name of the first
  lexicon: HALOT
  rationale: This reproduces the Hebrew naming formula closely while remaining natural
    English. 'One was named' is smoother but less formally transparent.
- source_word: עָדָה
  chosen: Adah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: וְשֵׁם הַשֵּׁנִית
  chosen: and the name of the second
  alternatives:
  - and the other was named
  - and the name of the other
  lexicon: HALOT
  rationale: The adjective means 'second.' Rendering it directly preserves the parallel
    structure of the Hebrew better than the more idiomatic 'the other.'
- source_word: צִלָּה
  chosen: Zillah
  rationale: Personal name transliterated according to the translation philosophy.
