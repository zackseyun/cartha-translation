id: GEN.38.27
reference: Genesis 38:27
source:
  edition: WLC
  text: וַ/יְהִ֖י בְּ/עֵ֣ת לִדְתָּ֑/הּ וְ/הִנֵּ֥ה תְאוֹמִ֖ים בְּ/בִטְנָֽ/הּ׃
translation:
  text: Now when it was time for her to give birth, behold, there were twins in her
    womb.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now when it was
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    'Now when it was' preserves the temporal transition in natural modern English
    without archaic phrasing.
- source_word: בְּעֵת
  chosen: time
  alternatives:
  - at the time
  - when
  lexicon: HALOT
  rationale: The preposition plus עֵת marks a temporal setting. Rendering with 'time'
    in the phrase 'when it was time' is idiomatic and accurately conveys the sense.
- source_word: לִדְתָּהּ
  chosen: for her to give birth
  alternatives:
  - for her bearing
  - in her giving birth
  - for her delivery
  lexicon: HALOT
  rationale: From ילד, this infinitive construct with 3fs suffix means 'for her to
    bear/give birth.' 'Give birth' is the clearest contemporary English equivalent.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה draws attention to a noteworthy development. 'Behold' preserves
    the discourse force and surprise of the Hebrew better than a flat omission.
- source_word: תְאוֹמִים
  chosen: twins
  alternatives:
  - two twins
  lexicon: HALOT
  rationale: The plural noun directly denotes twins. 'Twins' is the natural and precise
    English rendering.
- source_word: בְּבִטְנָהּ
  chosen: in her womb
  alternatives:
  - in her belly
  lexicon: HALOT
  rationale: בֶּטֶן can mean belly or womb depending on context; in a childbirth context,
    'womb' is the most accurate and natural English choice.
