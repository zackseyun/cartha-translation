id: GEN.38.30
reference: Genesis 38:30
source:
  edition: WLC
  text: וְ/אַחַר֙ יָצָ֣א אָחִ֔י/ו אֲשֶׁ֥ר עַל יָד֖/וֹ הַ/שָּׁנִ֑י וַ/יִּקְרָ֥א שְׁמ֖/וֹ
    זָֽרַח־׃ס
translation:
  text: Afterward his brother came out, the scarlet thread on his hand, and he called
    his name Zerah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally has 'the scarlet' on his hand; 'thread' is supplied from
      the immediate context in verse 28.
    reason: lexical_alternative
  - marker: b
    text: Or 'and he named him Zerah.' The Hebrew literally reads 'and he called his
      name Zerah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - After that
  - Then afterward
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking subsequent action. 'Afterward' is
    natural modern English and preserves the sequence from the prior verse.
- source_word: יָצָא
  chosen: came out
  alternatives:
  - came forth
  - emerged
  lexicon: HALOT
  rationale: Common verb 'go out/come out.' In this birth context, 'came out' is idiomatic
    and clear in English.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: Straightforward kinship term with 3ms suffix, referring to the other
    twin.
- source_word: אֲשֶׁר עַל יָדוֹ הַשָּׁנִי
  chosen: the scarlet thread on his hand
  alternatives:
  - with the scarlet thread on his hand
  - whose hand had the scarlet thread on it
  lexicon: HALOT
  rationale: The relative clause identifies the brother by the scarlet marker placed
    in the previous verse. English can render this appositionally after 'his brother
    came out.' 'Thread' is supplied from the immediate context (v. 28), since Hebrew
    here has only 'the scarlet' functioning elliptically.
- source_word: הַשָּׁנִי
  chosen: scarlet thread
  alternatives:
  - scarlet
  - crimson thread
  lexicon: HALOT
  rationale: Literally 'the scarlet/scarlet material.' Because the noun 'thread' is
    omitted here but explicit in the immediate context, supplying 'thread' makes the
    English intelligible without distorting the sense.
- source_word: וַיִּקְרָא שְׁמוֹ
  chosen: and he called his name
  alternatives:
  - and he named him
  - and his name was called
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is preserved in
    a readable form. The subject is singular masculine; context most naturally points
    to the attendant/midwife from the preceding verses, though English need not over-specify
    beyond 'he.'
- source_word: זָרַח
  chosen: Zerah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
