id: GEN.38.3
reference: Genesis 38:3
source:
  edition: WLC
  text: וַ/תַּ֖הַר וַ/תֵּ֣לֶד בֵּ֑ן וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ עֵֽר־׃
translation:
  text: She conceived and bore a son, and he called his name Er.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and he called his name Er,'' with a masculine singular verb;
      the subject is most naturally Judah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּהַר
  chosen: She conceived
  alternatives:
  - She became pregnant
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'She conceived' is
    concise, idiomatic, and slightly more formal, fitting the narrative style while
    preserving the sequence of events.
- source_word: וַתֵּלֶד
  chosen: and bore
  alternatives:
  - and gave birth to
  lexicon: HALOT
  rationale: ילד in the Qal commonly means 'to bear/give birth.' 'Bore' is the standard
    compact narrative rendering and pairs naturally with 'a son.'
- source_word: בֵּן
  chosen: a son
  alternatives:
  - a boy
  - a male child
  lexicon: HALOT
  rationale: בן here refers to a male child. 'A son' is the normal genealogical/narrative
    rendering in English and preserves the familial sense better than 'boy' or 'male
    child.'
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ
  chosen: and he called his name
  alternatives:
  - and he named him
  - and he called him
  lexicon: HALOT
  rationale: The Hebrew construction is literally 'called his name.' The subject is
    masculine singular, so 'he' should be preserved. 'Called his name' is somewhat
    more formal but remains understandable and keeps closer to the source than the
    more idiomatic 'named him.'
- source_word: עֵר
  chosen: Er
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. The conventional English form of עֵר is 'Er.'
