theological_decisions:
- issue: Subject of וַיִּקְרָא ('and he called')
  chosen_reading: 'The subject is rendered as Judah: ''and he called his name Er.'''
  alternative_readings:
  - Some translations smooth the clause to 'she called his name Er' or avoid specifying
    the subject by rendering 'he was named Er.'
  rationale: The Hebrew verb is clearly masculine singular, distinguishing this clause
    from the preceding feminine verbs ('she conceived,' 'she bore'). The translation
    preserves that grammatical shift rather than harmonizing it. This is a textual/grammatical
    decision, not a doctrinal one, but it affects the English rendering significantly.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §5 (consistency/documented
    exception)
