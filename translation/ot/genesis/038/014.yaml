id: GEN.38.14
reference: Genesis 38:14
source:
  edition: WLC
  text: וַ/תָּסַר֩ בִּגְדֵ֨י אַלְמְנוּתָ֜/הּ מֵֽ/עָלֶ֗י/הָ וַ/תְּכַ֤ס בַּ/צָּעִיף֙
    וַ/תִּתְעַלָּ֔ף וַ/תֵּ֨שֶׁב֙ בְּ/פֶ֣תַח עֵינַ֔יִם אֲשֶׁ֖ר עַל דֶּ֣רֶךְ תִּמְנָ֑תָ/ה
    כִּ֤י רָאֲתָה֙ כִּֽי גָדַ֣ל שֵׁלָ֔ה וְ/הִ֕וא לֹֽא נִתְּנָ֥ה ל֖/וֹ לְ/אִשָּֽׁה־־־׃
translation:
  text: So she took off her widow’s garments, covered herself with a veil, wrapped
    herself up, and sat at the entrance of Enaim, which is on the road to Timnah.
    For she saw that Shelah had grown up, yet she had not been given to him as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Enaim may reflect a place-name; the Hebrew form can also be understood more
      literally as 'eyes' or possibly 'springs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'covered herself with a veil, wrapped herself up'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתָּסַר
  chosen: took off
  alternatives:
  - removed
  lexicon: HALOT
  rationale: The verb סור in this causative/separative context means to remove or
    take away. 'Took off' is idiomatic in English for removing clothing and fits the
    object 'garments' naturally.
- source_word: בִּגְדֵי אַלְמְנוּתָהּ
  chosen: her widow’s garments
  alternatives:
  - the garments of her widowhood
  - her widow’s clothing
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'garments of her widowhood.' 'Her
    widow’s garments' preserves the social-signaling function of mourning/widow attire
    in readable English.
- source_word: מֵעָלֶיהָ
  chosen: from herself
  alternatives:
  - from upon her
  - off herself
  lexicon: HALOT
  rationale: Literally 'from upon her.' Included in translation as 'from herself'
    to preserve the explicit Hebrew expression rather than leaving it fully implicit.
- source_word: וַתְּכַס בַּצָּעִיף
  chosen: covered herself with a veil
  alternatives:
  - covered herself with the veil
  - put on a veil
  lexicon: HALOT
  rationale: The verb-object construction indicates covering with a veil. 'Covered
    herself with a veil' stays close to the Hebrew and preserves the action rather
    than reducing it to merely 'put on.'
- source_word: וַתִּתְעַלָּף
  chosen: wrapped herself up
  alternatives:
  - veiled herself
  - disguised herself
  lexicon: HALOT
  rationale: The reflexive form of עלף here likely denotes enveloping or wrapping
    oneself. 'Wrapped herself up' preserves the physical action without importing
    the interpretive conclusion 'disguised herself,' though disguise is implied by
    context.
- source_word: וַתֵּשֶׁב
  chosen: sat
  alternatives:
  - settled down
  lexicon: HALOT
  rationale: The simple narrative verb ישב is best rendered 'sat,' preserving the
    straightforward sequence of actions.
- source_word: בְּפֶתַח עֵינַיִם
  chosen: at the entrance to Enaim
  alternatives:
  - at the opening of Enaim
  - at the entrance of Enaim
  lexicon: HALOT
  rationale: Though עֵינַיִם can literally mean 'eyes' or 'springs,' in this context
    it is best taken as the place-name Enaim, as reflected by the following relative
    clause locating it on the road to Timnah. Transliteration avoids speculative etymological
    translation in the main text.
- source_word: אֲשֶׁר עַל דֶּרֶךְ תִּמְנָתָה
  chosen: which is on the road to Timnah
  alternatives:
  - which is by the way to Timnah
  - that is along the road to Timnah
  lexicon: HALOT
  rationale: This relative clause identifies the location. 'On the road to Timnah'
    is natural modern English and preserves the directional sense of the Hebrew.
- source_word: כִּי רָאֲתָה
  chosen: For she saw
  alternatives:
  - because she saw
  lexicon: HALOT
  rationale: כִּי here introduces the reason for her action. 'For' fits narrative
    explanation smoothly in English.
- source_word: כִּי גָדַל שֵׁלָה
  chosen: that Shelah had grown up
  alternatives:
  - that Shelah was grown
  - that Shelah had become an adult
  lexicon: HALOT
  rationale: The perfect of גדל indicates that Shelah had reached maturity. 'Had grown
    up' is idiomatic and sufficiently precise without over-specifying age.
- source_word: וְהִוא לֹא נִתְּנָה לוֹ לְאִשָּׁה
  chosen: yet she had not been given to him as a wife
  alternatives:
  - and she had not been given to him for a wife
  - but she had not been given to him as wife
  lexicon: HALOT
  rationale: The passive נתן + ל + אשה means being given in marriage to him. 'As a
    wife' is standard English and preserves the marital sense. 'Yet' brings out the
    adversative force of the clause in context.
