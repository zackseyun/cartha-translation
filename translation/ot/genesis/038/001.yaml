id: GEN.38.1
reference: Genesis 38:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בָּ/עֵ֣ת הַ/הִ֔וא וַ/יֵּ֥רֶד יְהוּדָ֖ה מֵ/אֵ֣ת אֶחָ֑י/ו וַ/יֵּ֛ט
    עַד אִ֥ישׁ עֲדֻלָּמִ֖י וּ/שְׁמ֥/וֹ חִירָֽה־׃
translation:
  text: At that time Judah went down from his brothers and turned aside to a certain
    Adullamite man whose name was Hirah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And it happened at that time.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an Adullamite man'; the Hebrew may simply identify him by origin, though
      the wording can also introduce him as a particular individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בָּעֵת הַהִוא
  chosen: At that time
  alternatives:
  - And it happened at that time
  - Now it came about at that time
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a new episode. 'At that time'
    preserves the temporal setting in natural modern English without over-literalizing
    the discourse marker 'and it happened.'
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: '''Went down'' is the standard idiomatic rendering of ירד in narrative,
    preserving the directional sense without sounding overly formal.'
- source_word: מֵאֵת אֶחָיו
  chosen: from his brothers
  alternatives:
  - away from his brothers
  - from among his brothers
  lexicon: HALOT
  rationale: The phrase indicates separation from Judah's brothers. 'From his brothers'
    is the most direct rendering and preserves the masculine familial term in line
    with gender-accurate policy.
- source_word: וַיֵּט
  chosen: turned aside
  alternatives:
  - went aside
  - stretched out/extended himself toward
  lexicon: HALOT
  rationale: In this context נטה carries the sense of turning aside or deviating toward
    someone/place. 'Turned aside' fits the idiom and avoids a misleadingly literal
    sense such as 'stretched out.'
- source_word: עַד
  chosen: to
  alternatives:
  - toward
  - as far as
  lexicon: HALOT
  rationale: With a person here, עַד functions idiomatically for movement toward or
    to someone. 'To' is the clearest English equivalent in context.
- source_word: אִישׁ עֲדֻלָּמִי
  chosen: a certain Adullamite man
  alternatives:
  - an Adullamite man
  - a man of Adullam
  lexicon: HALOT
  rationale: אִישׁ with an ethnicon can introduce a particular individual. 'A certain
    Adullamite man' captures the narrative introduction of a named person better than
    the more generic 'an Adullamite man.'
- source_word: וּשְׁמוֹ חִירָה
  chosen: whose name was Hirah
  alternatives:
  - and his name was Hirah
  lexicon: HALOT
  rationale: English style prefers embedding the naming clause into the preceding
    description. 'Whose name was Hirah' preserves the identification smoothly while
    remaining faithful to the Hebrew.
- source_word: חִירָה
  chosen: Hirah
  lexicon: standard transliteration
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
