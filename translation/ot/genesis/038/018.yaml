id: GEN.38.18
reference: Genesis 38:18
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר מָ֣ה הָֽ/עֵרָבוֹן֮ אֲשֶׁ֣ר אֶתֶּן לָּ/ךְ֒ וַ/תֹּ֗אמֶר חֹתָֽמְ/ךָ֙
    וּ/פְתִילֶ֔/ךָ וּ/מַטְּ/ךָ֖ אֲשֶׁ֣ר בְּ/יָדֶ֑/ךָ וַ/יִּתֶּן לָּ֛/הּ וַ/יָּבֹ֥א
    אֵלֶ֖י/הָ וַ/תַּ֥הַר לֽ/וֹ־־׃
translation:
  text: He said, “What pledge shall I give you?” And she said, “Your seal, your cord,
    and your staff that is in your hand.” So he gave them to her and went in to her,
    and she became pregnant by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your signet' for 'your seal.' The Hebrew does not specify the exact
      form of the sealing device.
    reason: lexical_alternative
  - marker: b
    text: '''Went in to her'' is a Hebrew euphemism for sexual intercourse.'
    reason: lexical_alternative
  - marker: c
    text: Or 'she conceived by him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵרָבוֹן
  chosen: pledge
  alternatives:
  - security
  - guarantee
  - deposit
  lexicon: HALOT
  rationale: Refers to an item given as security pending later payment. 'Pledge' is
    natural modern English and fits the narrative context better than the more abstract
    'guarantee' or commercial 'deposit'.
- source_word: חֹתָמְךָ
  chosen: your seal
  alternatives:
  - your signet
  - your signet ring
  lexicon: HALOT
  rationale: The noun denotes a seal or signet used for identification. 'Seal' is
    broad enough to match the Hebrew without over-specifying the object as a ring,
    since the text itself does not say ring.
- source_word: פְתִילֶךָ
  chosen: your cord
  alternatives:
  - your string
  - your necklace cord
  lexicon: HALOT
  rationale: Likely the cord associated with the seal. 'Cord' is the most straightforward
    rendering and avoids unnecessary interpretation while remaining idiomatic.
- source_word: מַטְּךָ
  chosen: your staff
  alternatives:
  - your rod
  - your walking stick
  lexicon: HALOT
  rationale: The term commonly means staff/rod. 'Staff' best fits a personal item
    carried in the hand and avoids the harsher connotations of 'rod' in English.
- source_word: אֲשֶׁר בְּיָדֶךָ
  chosen: that is in your hand
  alternatives:
  - that you have in your hand
  - that is with you
  lexicon: HALOT
  rationale: A relative clause modifying 'staff.' The more literal 'that is in your
    hand' is clear and preserves the concrete imagery of the Hebrew.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: went in to her
  alternatives:
  - came in to her
  - had relations with her
  - slept with her
  lexicon: HALOT
  rationale: This is the standard Hebrew euphemism for sexual intercourse. 'Went in
    to her' preserves the source idiom and narrative register better than more explicit
    or colloquial alternatives.
- source_word: וַתַּהַר לוֹ
  chosen: she became pregnant by him
  alternatives:
  - she conceived by him
  - she became pregnant for him
  lexicon: HALOT
  rationale: The verb means 'conceive/become pregnant.' 'Became pregnant by him' is
    clear modern English and accurately conveys the relationship marked by לוֹ.
- source_word: וַיִּתֶּן לָּהּ
  chosen: he gave them to her
  alternatives:
  - he gave to her
  lexicon: HALOT
  rationale: Although the verb is singular, the direct objects are the three requested
    items. English naturally supplies 'them' to reflect the plural referents.
