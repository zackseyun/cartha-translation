id: GEN.38.21
reference: Genesis 38:21
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֞ל אֶת אַנְשֵׁ֤י מְקֹמָ/הּ֙ לֵ/אמֹ֔ר אַיֵּ֧ה הַ/קְּדֵשָׁ֛ה הִ֥וא
    בָ/עֵינַ֖יִם עַל הַ/דָּ֑רֶךְ וַ/יֹּ֣אמְר֔וּ לֹא הָיְתָ֥ה בָ/זֶ֖ה קְדֵשָֽׁה־־־׃
translation:
  text: He asked the men of her place, saying, “Where is the cult prostitute who was
    at Enaim by the road?” But they said, “There has been no cult prostitute here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “temple prostitute.” The Hebrew term refers to a prostitute associated
      with cultic practice; “cult prostitute” is broader and avoids implying a specific
      temple structure.
    reason: lexical_alternative
  - marker: b
    text: Enaim is a place name; the Hebrew form is related to the word for “eyes”
      or possibly “springs.”
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: He asked
  alternatives:
  - He inquired
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of שׁאל, introducing Judah's inquiry. 'Asked'
    is natural modern English and sufficiently formal.
- source_word: אַנְשֵׁי מְקֹמָהּ
  chosen: the men of her place
  alternatives:
  - the men of that place
  - the local men
  lexicon: HALOT
  rationale: Literally 'the men of her place.' The 3fs suffix most naturally refers
    to the place associated with the woman/location in view. 'Men of her place' preserves
    the Hebrew form better than smoothing to 'local men,' while remaining intelligible.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  lexicon: HALOT
  rationale: Conventional infinitive introducing direct speech; 'saying' keeps the
    Hebrew discourse structure.
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where was
  lexicon: HALOT
  rationale: Direct interrogative of location in present-form English, matching the
    search question.
- source_word: הַקְּדֵשָׁה
  chosen: the cult prostitute
  alternatives:
  - the temple prostitute
  - the prostitute
  lexicon: HALOT
  rationale: קְדֵשָׁה denotes a woman associated with cultic/prostitutional practice.
    'Cult prostitute' is more precise and less misleading than 'temple prostitute,'
    since the text does not specify a temple building. It also distinguishes this
    term from זֹנָה elsewhere in the chapter.
- source_word: הִוא
  chosen: who was
  alternatives:
  - she was
  lexicon: HALOT
  rationale: The independent pronoun is naturally absorbed into English as a relative
    clause modifying 'cult prostitute.' This yields idiomatic English without losing
    referential force.
- source_word: בָעֵינַיִם
  chosen: at Enaim
  alternatives:
  - at Enayim
  - at the springs
  - at the eyes
  lexicon: HALOT
  rationale: Here the form functions as a place name in context (cf. 38:14). Following
    the philosophy to transliterate names, it is rendered as a toponym rather than
    translated literally.
- source_word: עַל הַדָּרֶךְ
  chosen: by the road
  alternatives:
  - beside the road
  - on the road
  lexicon: HALOT
  rationale: עַל with דרך in this context indicates location adjacent to the roadway.
    'By the road' is idiomatic and fits the scene.
- source_word: לֹא הָיְתָה בָזֶה קְדֵשָׁה
  chosen: There has been no cult prostitute here
  alternatives:
  - No cult prostitute has been here
  - There was no cult prostitute in this place
  lexicon: HALOT
  rationale: The reply denies the presence/existence of such a woman in that location.
    'Here' renders בָזֶה idiomatically. Present perfect English conveys the local
    denial naturally in dialogue.
