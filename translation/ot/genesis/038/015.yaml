id: GEN.38.15
reference: Genesis 38:15
source:
  edition: WLC
  text: וַ/יִּרְאֶ֣/הָ יְהוּדָ֔ה וַֽ/יַּחְשְׁבֶ֖/הָ לְ/זוֹנָ֑ה כִּ֥י כִסְּתָ֖ה פָּנֶֽי/הָ׃
translation:
  text: When Judah saw her, he thought she was a prostitute, because she had covered
    her face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he considered her to be a prostitute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאֶהָ
  chosen: When Judah saw her
  alternatives:
  - And Judah saw her
  - Judah saw her
  lexicon: HALOT
  rationale: The verb ראה means 'to see.' Rendering with 'When Judah saw her' brings
    out the narrative sequencing force of the waw-consecutive in natural English while
    preserving the temporal relation to the next clause.
- source_word: וַיַּחְשְׁבֶהָ
  chosen: he thought she was
  alternatives:
  - he considered her to be
  - he reckoned her as
  lexicon: HALOT
  rationale: חשב here expresses Judah's mental judgment about Tamar's identity. 'He
    thought she was' is idiomatic modern English and accurately conveys mistaken perception.
- source_word: לְזוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a sex worker
  lexicon: HALOT
  rationale: זונה denotes a prostitute. 'A prostitute' is the clearest readable modern
    English equivalent; 'harlot' is archaic, while 'sex worker' introduces modern
    sociological nuance not present in the Hebrew.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: כִּי introduces the reason for Judah's conclusion. 'Because' is the most
    straightforward causal rendering in contemporary English.
- source_word: כִסְּתָה פָּנֶיהָ
  chosen: she had covered her face
  alternatives:
  - she covered her face
  - her face was covered
  lexicon: HALOT
  rationale: כסה means 'to cover,' and פניָה means 'her face.' The perfect verb explains
    the prior circumstance leading to Judah's inference, so English past perfect ('had
    covered') best reflects the causal background in context.
