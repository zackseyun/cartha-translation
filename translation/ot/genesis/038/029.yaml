  from: And it happened, as he drew back his hand, that behold,
  to: And as he drew back his hand, behold,
  rationale: The current rendering attempts to translate both the introductory `וַיְהִי`
    ('And it happened') and the particle `וְהִנֵּה` ('that behold'), resulting in
    the syntactically awkward English phrase 'it happened that behold'. The suggested
    rewrite removes the formulaic and somewhat redundant 'And it happened,' which
    improves the narrative flow while still faithfully rendering the temporal clause
    ('as he drew back his hand') and the marker of surprise, 'behold' (`הִנֵּה`).
