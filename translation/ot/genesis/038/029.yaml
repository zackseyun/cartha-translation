id: GEN.38.29
reference: Genesis 38:29
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/מֵשִׁ֣יב יָד֗/וֹ וְ/הִנֵּה֙ יָצָ֣א אָחִ֔י/ו וַ/תֹּ֕אמֶר מַה
    פָּרַ֖צְתָּ עָלֶ֣י/ךָ פָּ֑רֶץ וַ/יִּקְרָ֥א שְׁמ֖/וֹ פָּֽרֶץ׀־׃
translation:
  text: And as he drew back his hand, behold, his brother came out. Then she said,
    “What a breach you have made for yourself!” So his name was called Perez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''What a breach you have breached for yourself!'' The wording is
      an exclamation built on the root פרץ, which also gives the name Perez.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And it happened, as he drew back his hand, that behold,'.
    reason: previous_rendering
lexical_decisions:
- source_word: כְּמֵשִׁיב יָדוֹ
  chosen: as he drew back his hand
  alternatives:
  - as he brought back his hand
  - when he withdrew his hand
  lexicon: HALOT
  rationale: The Hiphil participle of שוב with יָד idiomatically refers to pulling
    the hand back. 'Drew back' is natural English while preserving the concrete action.
- source_word: וְהִנֵּה
  chosen: that behold
  alternatives:
  - and behold
  - suddenly
  lexicon: HALOT
  rationale: הִנֵּה marks vivid surprise. Rendering it with 'behold' preserves the
    narrative immediacy; pairing with 'that' smooths the English syntax after 'it
    happened.'
- source_word: יָצָא אָחִיו
  chosen: his brother came out
  alternatives:
  - his brother came forth
  - his brother emerged
  lexicon: HALOT
  rationale: יָצָא in a birth context is naturally 'came out.' This keeps the physical
    sense without archaic diction.
- source_word: מַה פָּרַצְתָּ עָלֶיךָ פָּרֶץ
  chosen: What a breach you have made for yourself!
  alternatives:
  - How you have broken out!
  - What a breaking through you have made!
  - How you have burst forth!
  lexicon: HALOT
  rationale: The clause plays on the root פרץ, anticipating the name Perez. 'Breach'
    preserves the wordplay better than a smoother but less transparent rendering like
    'burst out.' עָלֶיךָ is difficult; 'for yourself' reflects the preposition in
    an idiomatic exclamation, indicating that he made this breakout on his own behalf.
- source_word: פָּרֶץ
  chosen: Perez
  alternatives:
  - Perets
  lexicon: HALOT
  rationale: As a personal name, it is transliterated per the translation philosophy.
    'Perez' is the standard English transliteration and also echoes the preceding
    noun 'breach' through the shared Hebrew root.
- source_word: וַיִּקְרָא שְׁמוֹ פָּרֶץ
  chosen: So his name was called Perez
  alternatives:
  - Therefore he named him Perez
  - and he called his name Perez
  lexicon: HALOT
  rationale: The Hebrew uses an impersonal naming formula. 'His name was called' preserves
    that formula without forcing an explicit subject not stated in the text.
