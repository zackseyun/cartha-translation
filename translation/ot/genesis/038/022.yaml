id: GEN.38.22
reference: Genesis 38:22
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב֙ אֶל יְהוּדָ֔ה וַ/יֹּ֖אמֶר לֹ֣א מְצָאתִ֑י/הָ וְ/גַ֨ם אַנְשֵׁ֤י
    הַ/מָּקוֹם֙ אָֽמְר֔וּ לֹא הָיְתָ֥ה בָ/זֶ֖ה קְדֵשָֽׁה־־׃
translation:
  text: So he returned to Judah and said, “I did not find her, and also the men of
    the place said, ‘There has not been a cult prostitute here.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “There was no cult prostitute here.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew qĕdēšâ, a woman associated with illicit cultic sexual practice; alternatively
      rendered “temple prostitute.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: So he returned
  alternatives:
  - And he returned
  - Then he returned
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So he returned' gives natural English
    narrative flow while preserving the sequential sense.
- source_word: אֶל יְהוּדָה
  chosen: to Judah
  alternatives:
  - to Yehudah
  lexicon: HALOT
  rationale: אֶל marks direction toward Judah. The personal name is transliterated
    by standard English convention as 'Judah.'
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech; English can omit the
    repeated subject because it is clear from context.
- source_word: לֹא מְצָאתִיהָ
  chosen: I did not find her
  alternatives:
  - I have not found her
  - I couldn't find her
  lexicon: HALOT
  rationale: The perfect with negation reports completed past action. 'Did not find'
    is straightforward and avoids adding modal nuance.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - and moreover
  - also
  lexicon: HALOT
  rationale: Adds a second supporting point to the report. 'And also' preserves the
    additive force without sounding overly formal.
- source_word: אַנְשֵׁי הַמָּקוֹם
  chosen: the men of the place
  alternatives:
  - the men of that place
  - the local men
  - the people of the place
  lexicon: HALOT
  rationale: Literally 'men of the place.' Because the Hebrew is specifically masculine
    plural and likely refers to local male residents questioned by the servant, 'men'
    is preferred over the more generic 'people,' in keeping with gender-accurate translation.
- source_word: אָמְרוּ
  chosen: said
  alternatives:
  - have said
  - told me
  lexicon: HALOT
  rationale: Simple past reporting speech. 'Told me' would make the indirect object
    explicit beyond the Hebrew wording.
- source_word: לֹא הָיְתָה בָזֶה
  chosen: There has not been a cult prostitute here
  alternatives:
  - There was no cult prostitute here
  - No cult prostitute has been in this place
  lexicon: HALOT
  rationale: The clause denies the presence/existence of such a woman in that location.
    'Here' idiomatically renders בָזֶה ('in this place'/'here'). The English existential
    construction is natural and faithful.
- source_word: קְדֵשָׁה
  chosen: cult prostitute
  alternatives:
  - temple prostitute
  - consecrated woman
  lexicon: HALOT
  rationale: קְדֵשָׁה refers to a woman associated with illicit cultic sexual practice,
    distinguished in context from a common prostitute (זֹנָה in the surrounding narrative).
    'Cult prostitute' best preserves the cultic association without overcommitting
    to a formal temple institution; 'temple prostitute' is possible but narrower and
    more interpretive.
