id: GEN.38.16
reference: Genesis 38:16
source:
  edition: WLC
  text: וַ/יֵּ֨ט אֵלֶ֜י/הָ אֶל הַ/דֶּ֗רֶךְ וַ/יֹּ֨אמֶר֙ הָֽבָ/ה נָּא֙ אָב֣וֹא אֵלַ֔יִ/ךְ
    כִּ֚י לֹ֣א יָדַ֔ע כִּ֥י כַלָּת֖/וֹ הִ֑וא וַ/תֹּ֨אמֶר֙ מַה תִּתֶּן לִּ֔/י כִּ֥י
    תָב֖וֹא אֵלָֽ/י־־־־׃
translation:
  text: So he turned aside to her by the road and said, “Please, let me come in to
    you,” for he did not know that she was his daughter-in-law. And she said, “What
    will you give me, that you may come in to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'come in to you / me,' a euphemistic expression for sexual relations.
    reason: lexical_alternative
  - marker: b
    text: Or 'What will you pay me, that you may come in to me?' The Hebrew more literally
      says, 'What will you give me...?'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּט
  chosen: turned aside
  alternatives:
  - turned
  - went aside
  lexicon: HALOT
  rationale: The verb נטה here conveys deviating from one's path toward someone. 'Turned
    aside' captures both the physical movement and the idiomatic sense better than
    the flatter 'turned.'
- source_word: אֵלֶיהָ
  chosen: to her
  lexicon: HALOT
  rationale: Direct prepositional phrase indicating movement toward Tamar.
- source_word: אֶל־הַדֶּרֶךְ
  chosen: by the road
  alternatives:
  - to the roadside
  - into the road
  lexicon: HALOT
  rationale: In context Judah approaches Tamar where she is sitting along the route.
    'By the road' is idiomatic English and fits the narrative setting better than
    a more wooden 'to the road.'
- source_word: הָבָה נָּא
  chosen: Please, let me
  alternatives:
  - Come now, let me
  - Please
  lexicon: HALOT
  rationale: This combination functions as an entreaty or urging particle. 'Please,
    let me' conveys the request naturally in modern English without unnecessary archaism.
- source_word: אָבוֹא אֵלַיִךְ
  chosen: come in to you
  alternatives:
  - come to you
  - have relations with you
  lexicon: HALOT
  rationale: בוא + אל can function as a sexual euphemism in this context. 'Come in
    to you' preserves the Hebrew euphemism and narrative register better than an explicit
    paraphrase.
- source_word: כִּי לֹא יָדַע
  chosen: for he did not know
  alternatives:
  - because he did not know
  lexicon: HALOT
  rationale: Here כִּי introduces the explanatory clause for Judah's action. 'For'
    is concise and natural in narrative English.
- source_word: כִּי כַלָּתוֹ הִוא
  chosen: that she was his daughter-in-law
  lexicon: HALOT
  rationale: Straightforward identification clause; 'daughter-in-law' is the precise
    kinship term for כַלָּה in this context.
- source_word: מַה תִּתֶּן לִּי
  chosen: What will you give me
  alternatives:
  - What will you pay me
  - What will you give to me
  lexicon: HALOT
  rationale: The Hebrew is literally 'What will you give me?' In context it implies
    payment, but the text itself uses the broader verb 'give,' which should be preserved
    in the main text.
- source_word: כִּי תָבוֹא אֵלַי
  chosen: that you may come in to me
  alternatives:
  - for coming in to me
  - that you may come to me
  lexicon: HALOT
  rationale: Again the sexual euphemism should be preserved. 'That you may come in
    to me' reflects the Hebrew clause structure and keeps the euphemistic tone.
