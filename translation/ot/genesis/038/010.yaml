id: GEN.38.10
reference: Genesis 38:10
source:
  edition: WLC
  text: וַ/יֵּ֛רַע בְּ/עֵינֵ֥י יְהוָ֖ה אֲשֶׁ֣ר עָשָׂ֑ה וַ/יָּ֖מֶת גַּם אֹתֽ/וֹ־׃
translation:
  text: What he did was evil in the sight of Yahweh, so he put him to death also.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּרַע
  chosen: was evil
  alternatives:
  - was displeasing
  - was wicked
  lexicon: HALOT
  rationale: From רעע in the stative sense, describing the action as evil/bad. 'Was evil' preserves the moral evaluation more directly than the softer 'was displeasing.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for divine evaluation. 'In the sight of the LORD' is natural English while preserving the metaphor. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md.
- source_word: אֲשֶׁר עָשָׂה
  chosen: What he did
  alternatives:
  - that which he did
  - what he had done
  lexicon: HALOT
  rationale: This relative clause refers back to Onan's action in the preceding context. 'What he did' is idiomatic modern English and accurately captures the clause without unnecessary archaism.
- source_word: וַיָּמֶת
  chosen: he put him to death
  alternatives:
  - he caused him to die
  - he killed him
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'He put him to death' preserves the causative force and the solemnity of divine judgment better than the blunter 'he killed him.'
- source_word: גַּם אֹתוֹ
  chosen: also
  alternatives:
  - too
  - as well
  lexicon: HALOT
  rationale: The phrase marks that Onan, like Er before him, was also put to death. 'Also' preserves the connection to the prior judgment succinctly.
