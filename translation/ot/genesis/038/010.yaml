theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Expression of divine judgment in וַיָּמֶת
  chosen_reading: so he put him to death also
  alternative_readings:
  - so he killed him too
  - and he caused him also to die
  rationale: The Hebrew verb is causative and attributes Onan's death directly to the LORD. The translation preserves that agency without softening it into a mere passive death.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1, #3'
