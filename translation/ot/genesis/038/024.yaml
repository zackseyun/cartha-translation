id: GEN.38.24
reference: Genesis 38:24
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/מִ/שְׁלֹ֣שׁ חֳדָשִׁ֗ים וַ/יֻּגַּ֨ד לִֽ/יהוּדָ֤ה לֵֽ/אמֹר֙ זָֽנְתָה֙
    תָּמָ֣ר כַּלָּתֶ֔/ךָ וְ/גַ֛ם הִנֵּ֥ה הָרָ֖ה לִ/זְנוּנִ֑ים וַ/יֹּ֣אמֶר יְהוּדָ֔ה
    הוֹצִיא֖וּ/הָ וְ/תִשָּׂרֵֽף׀׃
translation:
  text: And it happened about three months later that Judah was told, “Tamar your
    daughter-in-law has acted as a prostitute, and behold, she is also pregnant by
    prostitution.” Then Judah said, “Bring her out, and let her be burned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has played the prostitute'; more broadly, 'has committed sexual immorality.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'is pregnant from prostitution' or 'through acts of prostitution.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of היה introducing a new development. 'And
    it happened' preserves the Hebrew discourse function in readable modern English
    without archaic phrasing.
- source_word: כְּמִשְׁלֹשׁ חֳדָשִׁים
  chosen: about three months later
  alternatives:
  - after about three months
  - when about three months had passed
  lexicon: HALOT
  rationale: The preposition כ with the numeral phrase gives an approximate time reference.
    'About three months later' is natural English and preserves the approximation.
- source_word: וַיֻּגַּד לִיהוּדָה לֵאמֹר
  chosen: that Judah was told
  alternatives:
  - and it was reported to Judah, saying
  - and Judah was informed
  lexicon: HALOT
  rationale: Passive Hophal of נגד indicates a report being made to Judah. 'Was told'
    is concise and idiomatic; the content of the report follows in direct speech.
- source_word: זָנְתָה
  chosen: has acted as a prostitute
  alternatives:
  - has played the prostitute
  - has committed sexual immorality
  - has prostituted herself
  lexicon: HALOT
  rationale: The verb זנה denotes illicit sexual activity with prostitution imagery
    or accusation. 'Has acted as a prostitute' preserves the lexical force more clearly
    than the broader 'committed sexual immorality,' while avoiding overly archaic
    idiom.
- source_word: כַּלָּתֶךָ
  chosen: your daughter-in-law
  lexicon: HALOT
  rationale: Straightforward kinship term; no contextual reason to vary.
- source_word: וְגַם הִנֵּה
  chosen: and behold, she is also
  alternatives:
  - and indeed she is also
  - and moreover, look, she is also
  lexicon: HALOT
  rationale: The combination adds emphasis and surprise to the accusation. 'And behold'
    retains the rhetorical force of הִנֵּה in a readable way, while 'also' reflects
    וְגַם.
- source_word: הָרָה
  chosen: pregnant
  alternatives:
  - with child
  lexicon: HALOT
  rationale: Predicate adjective meaning 'pregnant.' 'Pregnant' is the clearest modern
    equivalent.
- source_word: לִזְנוּנִים
  chosen: by prostitution
  alternatives:
  - from prostitution
  - through acts of prostitution
  - as a result of sexual immorality
  lexicon: HALOT
  rationale: The noun זְנוּנִים refers to acts of prostitution/whoredom. 'By prostitution'
    captures the causal sense in concise English and keeps the lexical connection
    with זָנְתָה.
- source_word: הוֹצִיאוּהָ
  chosen: Bring her out
  alternatives:
  - Take her out
  - Bring her forth
  lexicon: HALOT
  rationale: Imperative plural with 3fs suffix. 'Bring her out' is direct and idiomatic.
- source_word: וְתִשָּׂרֵף
  chosen: and let her be burned
  alternatives:
  - so that she may be burned
  - and burn her
  lexicon: HALOT
  rationale: Niphal imperfect/jussive-like form expresses Judah's command for her
    to be burned. 'Let her be burned' preserves the passive sense better than the
    active 'burn her.'
