theological_decisions:
- issue: Rendering of sexual-sin terminology in a legal-accusatory context
  chosen_reading: Use prostitution language ('has acted as a prostitute' / 'by prostitution')
    rather than the broader 'sexual immorality.'
  alternative_readings:
  - has committed sexual immorality
  - is pregnant through immorality
  rationale: The Hebrew uses cognate forms from זנה/זנונים, which specifically evoke
    prostitution or harlotry language, whether as literal description or accusation.
    Preserving that wording keeps the narrative's lexical texture and Judah's charge
    without softening it into a generic moral category.
- issue: Force of Judah's sentence
  chosen_reading: 'Translate as a command for execution by burning: ''Bring her out,
    and let her be burned.'''
  alternative_readings:
  - Bring her out to be burned
  - Take her out and burn her
  rationale: The Hebrew presents Judah issuing an immediate directive. The passive
    'let her be burned' reflects the Niphal form and avoids over-specifying agency
    while preserving the severity of the judgment.
