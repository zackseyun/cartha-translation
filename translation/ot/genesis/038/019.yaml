id: GEN.38.19
reference: Genesis 38:19
source:
  edition: WLC
  text: וַ/תָּ֣קָם וַ/תֵּ֔לֶךְ וַ/תָּ֥סַר צְעִיפָ֖/הּ מֵ/עָלֶ֑י/הָ וַ/תִּלְבַּ֖שׁ בִּגְדֵ֥י אַלְמְנוּתָֽ/הּ׃
translation:
  text: Then she arose and went away, and she removed her veil and put on the garments of her widowhood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took off her veil ... and put on her widow's garments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she removed her veil from upon her'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתָּקָם
  chosen: she arose
  alternatives:
  - she got up
  - she stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks the next action in narrative sequence. 'Arose' preserves the formal narrative movement better than the more colloquial 'got up.'
- source_word: וַתֵּלֶךְ
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: HALOT
  rationale: הלך in sequence after 'arose' indicates departure from the place. 'Went away' makes the sense of leaving clearer in natural English while staying close to the Hebrew.
- source_word: וַתָּסַר
  chosen: removed
  alternatives:
  - took off
  - put aside
  lexicon: HALOT
  rationale: The Hiphil of סור here conveys causing the veil to be taken away from herself. 'Removed' is a clear and suitably formal rendering.
- source_word: צְעִיפָהּ
  chosen: her veil
  alternatives:
  - her shawl
  - her wrap
  lexicon: HALOT
  rationale: צָעִיף denotes a covering or veil, especially one worn over the face or head. 'Veil' best fits the immediate context of Tamar's disguise in the preceding verses.
- source_word: מֵעָלֶיהָ
  chosen: from upon her
  alternatives:
  - from herself
  - off herself
  lexicon: HALOT
  rationale: The prepositional phrase is literally 'from upon her.' Retaining 'from upon her' preserves the Hebrew image and clarifies that the veil was being removed from her person.
- source_word: וַתִּלְבַּשׁ
  chosen: put on
  alternatives:
  - dressed herself in
  - wore
  lexicon: HALOT
  rationale: לבש means to clothe oneself or put on clothing. 'Put on' is direct and idiomatic in English.
- source_word: בִּגְדֵי אַלְמְנוּתָהּ
  chosen: the garments of her widowhood
  alternatives:
  - her widow's garments
  - her widow's clothes
  lexicon: HALOT
  rationale: The construct phrase refers to the clothing associated with her status as a widow. 'The garments of her widowhood' preserves the formal nuance of the Hebrew and echoes the earlier description in the chapter.
