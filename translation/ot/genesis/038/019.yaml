  rationale: The phrase 'from upon her' is a literal translation of מֵעָלֶיהָ but is redundant in English. The combination of the verb 'removed' and the object 'her veil' sufficiently conveys the action of taking the veil off herself. Removing the prepositional phrase creates more natural and idiomatic English without losing any essential meaning.
