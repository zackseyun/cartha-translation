id: GEN.38.5
reference: Genesis 38:5
source:
  edition: WLC
  text: וַ/תֹּ֤סֶף עוֹד֙ וַ/תֵּ֣לֶד בֵּ֔ן וַ/תִּקְרָ֥א אֶת שְׁמ֖/וֹ שֵׁלָ֑ה וְ/הָיָ֥ה
    בִ/כְזִ֖יב בְּ/לִדְתָּ֥/הּ אֹתֽ/וֹ־׃
translation:
  text: She conceived again and bore a son, and she called his name Shelah. And he
    was at Chezib when she bore him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some ancient witnesses and interpreters, 'And she was at Chezib
      when she bore him.' The Hebrew text reads 'he was,' but the subject is debated.
    reason: alternative_reading
  - marker: b
    text: Chezib is also spelled Kezib in some passages; both refer to the same place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּסֶף עוֹד
  chosen: She conceived again
  alternatives:
  - She again
  - She continued and
  lexicon: HALOT
  rationale: The idiom with יסף + עוד introduces repeated action. In context, the
    implied repeated action is another conception/birth sequence. Rendering simply
    'She again' is incomplete in English; 'conceived again' makes the narrative progression
    clear without over-paraphrasing.
- source_word: וַתֵּלֶד בֵּן
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: HALOT
  rationale: Standard narrative wording for ילד + בן. 'Bore a son' is concise, natural,
    and close to the Hebrew.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ שֵׁלָה
  chosen: and she called his name Shelah
  alternatives:
  - and named him Shelah
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'called his name'; this is preserved in slightly
    formal but still readable English. 'Shelah' is transliterated as a personal name
    per translation philosophy.
- source_word: וְהָיָה
  chosen: And he was
  alternatives:
  - Now he was
  - And she was
  lexicon: HALOT
  rationale: The MT form is 3ms, naturally yielding 'he was.' This likely refers to
    Judah, the nearest suitable masculine antecedent in the broader context. Because
    some ancient versions and interpreters understand a feminine subject ('she was'),
    the alternative is preserved in a footnote rather than adopted in the main text.
- source_word: בִכְזִיב
  chosen: at Chezib
  alternatives:
  - in Chezib
  - at Kezib
  lexicon: HALOT
  rationale: The place name is transliterated. 'At' fits English idiom for location
    in narrative. The consonants support the place name Chezib/Kezib; 'Chezib' reflects
    the Hebrew spelling here, while 'Kezib' is a known variant form preserved in a
    footnote.
- source_word: בְּלִדְתָּהּ אֹתוֹ
  chosen: when she bore him
  alternatives:
  - at her bearing him
  - when she gave birth to him
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב conveys temporal sense: ''when/in
    giving birth to him.'' ''When she bore him'' is idiomatic and close to the Hebrew.'
