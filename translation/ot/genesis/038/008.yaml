theological_decisions:
- issue: Rendering the levirate-marriage terminology without importing later doctrinal
    or legal elaboration
  chosen_reading: perform the duty of a brother-in-law to her
  alternative_readings:
  - do the levirate duty to her
  - marry her as a brother-in-law
  rationale: The Hebrew uses the technical verb יִבֵּם, referring to the brother-in-law's
    obligation to produce offspring for a deceased brother. The chosen rendering preserves
    the legal/familial duty while remaining readable modern English. It avoids reducing
    the phrase merely to marriage or merely to sexual relations, since the command
    includes the covenantal family obligation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
