id: GEN.38.8
reference: Genesis 38:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוּדָה֙ לְ/אוֹנָ֔ן בֹּ֛א אֶל אֵ֥שֶׁת אָחִ֖י/ךָ וְ/יַבֵּ֣ם אֹתָ֑/הּ
    וְ/הָקֵ֥ם זֶ֖רַע לְ/אָחִֽי/ךָ־׃
translation:
  text: Then Judah said to Onan, “Go in to your brother’s wife, perform the duty of
    a brother-in-law to her, and raise up offspring for your brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more technically, “do the levirate duty to her.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' is possible but less idiomatic
    here.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English transliteration of the personal name יְהוּדָה.
- source_word: בֹּא אֶל
  chosen: Go in to
  alternatives:
  - Go to
  - Have relations with
  lexicon: HALOT
  rationale: This idiom commonly refers to sexual intercourse in a marital context.
    'Go in to' preserves the Hebrew idiom with sufficient clarity and avoids over-paraphrase.
- source_word: אֵשֶׁת אָחִיךָ
  chosen: your brother’s wife
  alternatives:
  - the wife of your brother
  lexicon: HALOT
  rationale: A straightforward construct rendering in natural English.
- source_word: וְיַבֵּם אֹתָהּ
  chosen: perform the duty of a brother-in-law to her
  alternatives:
  - marry her as a brother-in-law
  - do the levirate duty to her
  lexicon: HALOT
  rationale: The verb יִבֵּם is a technical term for fulfilling levirate obligation.
    'Perform the duty of a brother-in-law to her' is explicit and understandable without
    importing later legal wording too rigidly. 'Levirate' is accurate but less accessible.
- source_word: וְהָקֵם
  chosen: raise up
  alternatives:
  - establish
  - produce
  lexicon: HALOT
  rationale: In this idiom, קום with זֶרַע means to bring about or continue a descendant
    line for the deceased brother. 'Raise up' preserves the established idiomatic
    sense without flattening it to mere biological production.
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: '''Offspring'' communicates the sense clearly in modern English. ''Seed''
    is more formal/literal but can sound opaque here; ''descendants'' is too broad
    for the immediate context of producing an heir.'
- source_word: לְאָחִיךָ
  chosen: for your brother
  alternatives:
  - on behalf of your brother
  lexicon: HALOT
  rationale: 'The preposition ל marks benefit/purpose here: the offspring is reckoned
    for the deceased brother. ''For your brother'' is concise and faithful.'
