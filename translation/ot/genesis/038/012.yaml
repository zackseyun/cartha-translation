id: GEN.38.12
reference: Genesis 38:12
source:
  edition: WLC
  text: וַ/יִּרְבּוּ֙ הַ/יָּמִ֔ים וַ/תָּ֖מָת בַּת שׁ֣וּעַ אֵֽשֶׁת יְהוּדָ֑ה וַ/יִּנָּ֣חֶם
    יְהוּדָ֗ה וַ/יַּ֜עַל עַל גֹּֽזֲזֵ֤י צֹאנ/וֹ֙ ה֗וּא וְ/חִירָ֛ה רֵעֵ֥/הוּ הָ/עֲדֻלָּמִ֖י
    תִּמְנָֽתָ/ה־־־׃
translation:
  text: After many days had passed, the daughter of Shua, Judah’s wife, died. When
    Judah was comforted, he went up to Timnah to his sheep shearers—he and his friend
    Hirah the Adullamite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'After a long time.' Literally, 'the days became many.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the daughter of Shua'; some take this as the personal name 'Bath-shua.'
    reason: alternative_reading
  - marker: c
    text: Or 'After Judah was comforted' / 'And Judah was comforted.' The Hebrew verb
      here means he was consoled after mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְבּוּ הַיָּמִים
  chosen: After many days had passed
  alternatives:
  - And the days multiplied
  - After a long time
  lexicon: HALOT
  rationale: The idiom literally speaks of days becoming many. In natural English,
    'After many days had passed' preserves the temporal sense without wooden phrasing.
    'After a long time' is possible but slightly more interpretive.
- source_word: וַתָּמָת
  chosen: died
  lexicon: HALOT
  rationale: Standard rendering of מות in narrative context.
- source_word: בַּת שׁוּעַ
  chosen: the daughter of Shua
  alternatives:
  - Bath-shua
  lexicon: HALOT
  rationale: The Hebrew phrase is transparently relational ('daughter of Shua'), not
    necessarily a compounded personal name here. Translating the kinship expression
    is more source-transparent.
- source_word: אֵשֶׁת יְהוּדָה
  chosen: Judah’s wife
  alternatives:
  - the wife of Judah
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in English; possessive form is
    natural and accurate.
- source_word: וַיִּנָּחֶם יְהוּדָה
  chosen: When Judah was comforted
  alternatives:
  - And Judah was comforted
  - After Judah was comforted
  - Judah was consoled
  lexicon: HALOT
  rationale: The Niphal of נחם here denotes being comforted after bereavement, not
    repentance. 'When Judah was comforted' captures the temporal flow into the next
    action. The passive sense is preferable to an intransitive 'Judah recovered' because
    the Hebrew form is passive/reflexive.
- source_word: וַיַּעַל
  chosen: he went up
  alternatives:
  - he went
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Retaining 'up' preserves the Hebrew verb's
    directional nuance, likely reflecting travel to higher ground or simply conventional
    movement to a place.
- source_word: עַל גֹּזֲזֵי צֹאנוֹ
  chosen: to his sheep shearers
  alternatives:
  - to those shearing his flock
  - to shear his sheep
  lexicon: HALOT
  rationale: The preposition plus participle construction indicates going to/for the
    sheep-shearers associated with his flock. 'To his sheep shearers' is concise and
    fits the social setting. 'To shear his sheep' would shift the focus from the workers
    to Judah's destination among them.
- source_word: הוּא וְחִירָה רֵעֵהוּ
  chosen: he and his friend Hirah
  alternatives:
  - he, along with Hirah his friend
  lexicon: HALOT
  rationale: The pronoun plus companion phrase is naturally rendered appositionally
    in English. 'Friend' is the straightforward sense of רֵעַ here.
- source_word: הָעֲדֻלָּמִי
  chosen: the Adullamite
  lexicon: HALOT
  rationale: Gentilic adjective indicating Hirah's origin from Adullam.
- source_word: תִּמְנָתָה
  chosen: to Timnah
  alternatives:
  - Timnahward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Timnah.
    English normally expresses this as 'to Timnah.'
