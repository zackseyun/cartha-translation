id: GEN.38.20
reference: Genesis 38:20
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח יְהוּדָ֜ה אֶת גְּדִ֣י הָֽ/עִזִּ֗ים בְּ/יַד֙ רֵעֵ֣/הוּ הָֽ/עֲדֻלָּמִ֔י
    לָ/קַ֥חַת הָ/עֵרָב֖וֹן מִ/יַּ֣ד הָ/אִשָּׁ֑ה וְ/לֹ֖א מְצָאָֽ/הּ־׃
translation:
  text: Then Judah sent the young goat by the hand of his Adullamite friend to take
    back the pledge from the woman, but he did not find her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of,'' an idiom meaning ''through'' or ''by means
      of.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'to retrieve the security.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''from the hand of the woman.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - and ... sent
  - so ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow without losing the sequential sense.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English transliteration of the personal name.
- source_word: גְּדִי הָעִזִּים
  chosen: the young goat
  alternatives:
  - the kid of the goats
  - the goat kid
  lexicon: HALOT
  rationale: The phrase denotes a young goat. 'Young goat' is clear modern English
    and matches the animal previously promised.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - with
  lexicon: HALOT
  rationale: Literally 'by the hand of,' an idiom for agency or instrumentality. Retained
    here because it is still intelligible in English and preserves the concrete Hebrew
    expression.
- source_word: רֵעֵהוּ
  chosen: his ... friend
  alternatives:
  - his companion
  - his associate
  lexicon: HALOT
  rationale: The noun refers to a social associate or companion. 'Friend' is the most
    natural rendering in this narrative context.
- source_word: הָעֲדֻלָּמִי
  chosen: Adullamite
  lexicon: HALOT
  rationale: Gentilic adjective indicating origin from Adullam; rendered with the
    standard English form 'Adullamite.'
- source_word: לָקַחַת
  chosen: to take back
  alternatives:
  - to take
  - to retrieve
  lexicon: HALOT
  rationale: The infinitive expresses purpose. In context Judah is recovering what
    he had left as security, so 'take back' makes the implied recovery explicit without
    over-paraphrasing.
- source_word: הָעֵרָבוֹן
  chosen: the pledge
  alternatives:
  - the security
  - the deposit
  lexicon: HALOT
  rationale: The term refers to an item given as security or guarantee. 'Pledge' is
    concise, idiomatic, and fits the immediate context of collateral.
- source_word: מִיַּד הָאִשָּׁה
  chosen: from the woman
  alternatives:
  - from the hand of the woman
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the hand of the woman,' but English normally
    omits 'hand' here. The sense is source/possession, so 'from the woman' is the
    best idiomatic rendering.
- source_word: וְלֹא מְצָאָהּ
  chosen: but he did not find her
  alternatives:
  - and he did not find her
  lexicon: HALOT
  rationale: The clause reports failed result. 'But' appropriately marks the contrast
    between the mission and its failure in English narrative style.
