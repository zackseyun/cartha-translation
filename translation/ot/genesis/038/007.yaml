id: GEN.38.7
reference: Genesis 38:7
source:
  edition: WLC
  text: וַ/יְהִ֗י עֵ֚ר בְּכ֣וֹר יְהוּדָ֔ה רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יְמִתֵ֖/הוּ
    יְהוָֽה׃
translation:
  text: Now Er, Judah’s firstborn, was evil in the sight of the LORD, and the LORD
    put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and the LORD caused him to die.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - Then ... was
  lexicon: HALOT
  rationale: The waw-consecutive on היה advances the narrative. In English, 'Now'
    idiomatically introduces the next event/person in the storyline while preserving
    the simple existential/copular sense 'was'.
- source_word: עֵר
  chosen: Er
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בְּכוֹר יְהוּדָה
  chosen: Judah’s firstborn
  alternatives:
  - the firstborn of Judah
  lexicon: HALOT
  rationale: Construct chain indicates filial relationship and birth order. 'Judah’s
    firstborn' is the most natural modern English rendering and preserves the familial
    designation.
- source_word: רַע
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: רַע in moral evaluation before YHWH here denotes moral evil, not merely
    misfortune or poor quality. 'Evil' best preserves the gravity of divine judgment
    in the verse.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This Hebrew idiom expresses evaluation from YHWH's perspective. 'In the
    sight of the LORD' is clear, natural, and close to the source idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD' rather than a transliteration.
- source_word: וַיְמִתֵהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: 'The Hiphil of מות is causative: ''caused him to die.'' ''Put him to
    death'' communicates direct divine action with appropriate solemnity and avoids
    the slightly blunt or potentially ambiguous English ''killed him,'' while remaining
    more idiomatic than the overly wooden ''caused him to die''.'
