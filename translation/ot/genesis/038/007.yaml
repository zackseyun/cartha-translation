theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Portrayal of divine agency in Er's death
  chosen_reading: and the LORD put him to death
  alternative_readings:
  - and the LORD killed him
  - and the LORD caused him to die
  rationale: The Hebrew explicitly attributes Er's death to YHWH through a causative
    verb. The translation preserves that direct agency without softening it or importing
    explanation about means or justice beyond the text itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
