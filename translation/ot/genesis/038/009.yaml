theological_decisions:
- issue: Nature of Onan's act and the referent of זרע in the verse
  chosen_reading: Render the first זרע and the final זרע as 'offspring' in the main
    text, while translating וְשִׁחֵת אַרְצָה in a way that clearly indicates he prevented
    conception by wasting semen.
  alternative_readings:
  - Use 'seed' throughout for formal consistency
  - Use 'spilled his semen on the ground' for maximal explicitness
  rationale: 'The verse operates on two related but distinct levels: legal offspring
    for the deceased brother and the physical act by which Onan avoids producing that
    offspring. Rendering זרע as ''offspring'' in the legal clauses best communicates
    the levirate context, while ''wasted it on the ground'' preserves the sexual act
    without importing more explicit wording than the Hebrew states. This avoids doctrinal
    or moral over-interpretation while remaining clear.'
  doctrine_reference: Translation philosophy §§1, 3, 5
