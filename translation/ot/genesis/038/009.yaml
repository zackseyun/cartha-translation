id: GEN.38.9
reference: Genesis 38:9
source:
  edition: WLC
  text: וַ/יֵּ֣דַע אוֹנָ֔ן כִּ֛י לֹּ֥א ל֖/וֹ יִהְיֶ֣ה הַ/זָּ֑רַע וְ/הָיָ֞ה אִם בָּ֨א
    אֶל אֵ֤שֶׁת אָחִי/ו֙ וְ/שִׁחֵ֣ת אַ֔רְצָ/ה לְ/בִלְתִּ֥י נְתָן זֶ֖רַע לְ/אָחִֽי/ו־־־׃
translation:
  text: But Onan knew that the offspring would not be his; so whenever he went in
    to his brother’s wife, he wasted it on the ground, so as not to give offspring
    to his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'seed' in both clauses; here it refers to offspring or an heir in
      the levirate-marriage context.
    reason: lexical_alternative
  - marker: b
    text: Or 'he spilled it on the ground.' The Hebrew says literally 'he ruined/destroyed
      [it] to the ground,' describing Onan's act of preventing conception.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - realized
  lexicon: HALOT
  rationale: Standard rendering of ידע in narrative context; 'knew' is direct and
    natural.
- source_word: הַזָּרַע
  chosen: the offspring
  alternatives:
  - the seed
  - the descendants
  lexicon: HALOT
  rationale: Though literally 'the seed,' in this levirate context it refers to progeny/offspring
    rather than semen in the first clause. 'Offspring' communicates the intended heir.
- source_word: לֹּא לוֹ יִהְיֶה הַזָּרַע
  chosen: the offspring would not be his
  alternatives:
  - the seed would not belong to him
  - the child would not be counted as his
  lexicon: HALOT
  rationale: 'Captures the legal/familial sense in context: any resulting heir would
    be reckoned to the deceased brother, not to Onan.'
- source_word: וְהָיָה אִם־בָּא
  chosen: so whenever he went in
  alternatives:
  - and it happened, if he went in
  - and whenever he had relations
  lexicon: HALOT
  rationale: This construction expresses customary/repeated action in past narrative.
    'Whenever he went in' preserves the idiom while making the iterative sense clear.
- source_word: בָּא אֶל־אֵשֶׁת אָחִיו
  chosen: went in to his brother’s wife
  alternatives:
  - had relations with his brother’s wife
  - came to his brother’s wife
  lexicon: HALOT
  rationale: '''Went in to'' is a standard biblical euphemism for sexual intercourse
    and preserves the source idiom without becoming crude.'
- source_word: וְשִׁחֵת אַרְצָה
  chosen: he wasted it on the ground
  alternatives:
  - he spilled it on the ground
  - he let it go to waste on the ground
  lexicon: HALOT
  rationale: The verb שחת means 'ruin/destroy.' In this context it refers to preventing
    conception by ejaculating on the ground. 'Wasted it' reflects the Hebrew verb's
    sense without over-specifying beyond the text.
- source_word: אַרְצָה
  chosen: on the ground
  alternatives:
  - to the ground
  - to the earth
  lexicon: HALOT
  rationale: Idiomatic English for the directional form with locative ending.
- source_word: לְבִלְתִּי נְתָן זֶרַע לְאָחִיו
  chosen: so as not to give offspring to his brother
  alternatives:
  - in order not to provide seed for his brother
  - so that he would not give descendants to his brother
  lexicon: HALOT
  rationale: Purpose clause. 'Give offspring' fits the levirate context and keeps
    consistency with the earlier contextual rendering of זרע as progeny rather than
    literal 'seed.'
