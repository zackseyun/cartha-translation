id: GEN.38.6
reference: Genesis 38:6
source:
  edition: WLC
  text: וַ/יִּקַּ֧ח יְהוּדָ֛ה אִשָּׁ֖ה לְ/עֵ֣ר בְּכוֹר֑/וֹ וּ/שְׁמָ֖/הּ תָּמָֽר׃
translation:
  text: And Judah took a wife for Er his firstborn, and her name was Tamar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - got
  - obtained
  - arranged
  lexicon: HALOT
  rationale: The verb לָקַח commonly means 'take.' In this marital arrangement context,
    'took a wife for' is idiomatic English that preserves the Hebrew construction
    without over-paraphrasing to 'arranged a marriage,' though that is the implied
    sense.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In context of marriage for Er, אִשָּׁה clearly means 'wife' rather than
    the more general 'woman.' This best reflects the relational sense required by
    the narrative.
- source_word: לְעֵר
  chosen: for Er
  alternatives:
  - to Er
  lexicon: HALOT
  rationale: The preposition לְ here marks the beneficiary/recipient of Judah's action.
    'For Er' is the most natural English rendering in this context.
- source_word: בְּכוֹרוֹ
  chosen: his firstborn
  alternatives:
  - his eldest son
  lexicon: HALOT
  rationale: בְּכוֹר denotes the firstborn son. 'His firstborn' is more formally aligned
    with the Hebrew and preserves the familial and inheritance-related nuance often
    attached to the term.
- source_word: וּשְׁמָהּ
  chosen: and her name was
  alternatives:
  - and her name is called
  - whose name was
  lexicon: HALOT
  rationale: This is the standard Hebrew naming formula. 'And her name was' is natural
    modern English and closely reflects the source.
- source_word: תָּמָר
  chosen: Tamar
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
