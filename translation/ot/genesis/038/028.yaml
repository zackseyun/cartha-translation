  from: one put out a hand
  to: he put out a hand
  rationale: The current rendering 'one put out a hand' is slightly awkward and formal. The Hebrew verb וַיִּתֶּן is 3rd person masculine singular. Using 'he' is a more direct and natural translation of the Hebrew grammar and is common in English narrative for introducing a new, contextually-understood male subject. While 'one' was chosen to preserve an indefinite sense, 'he' is more faithful to the source's grammatical form without sacrificing clarity; the reader understands 'he' refers to one of the unborn twins.
