id: GEN.38.28
reference: Genesis 38:28
source:
  edition: WLC
  text: וַ/יְהִ֥י בְ/לִדְתָּ֖/הּ וַ/יִּתֶּן יָ֑ד וַ/תִּקַּ֣ח הַ/מְיַלֶּ֗דֶת וַ/תִּקְשֹׁ֨ר עַל יָד֤/וֹ שָׁנִי֙ לֵ/אמֹ֔ר זֶ֖ה יָצָ֥א רִאשֹׁנָֽה־־׃
translation:
  text: And when she was giving birth, he put out a hand, and the midwife took it and tied a scarlet thread on his hand, saying, “This one came out first.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a hand came out.” The Hebrew literally says “and he gave a hand,” an idiom describing the baby's hand emerging during birth.
    reason: lexical_alternative
  - marker: b
    text: Scarlet thread was used here as a visible marker to identify which twin appeared first.
    reason: cultural_note
  - marker: c
    text: Or 'one put out a hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּלִדְתָּהּ
  chosen: when she was giving birth
  alternatives:
  - in her giving birth
  - as she was giving birth
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of ילד with 3fs suffix expresses temporal circumstance. 'When she was giving birth' is natural modern English and preserves the ongoing birthing context.
- source_word: וַיִּתֶּן יָד
  chosen: one put out a hand
  alternatives:
  - he put out a hand
  - a hand came out
  lexicon: HALOT
  rationale: The verb נתן with 'hand' here idiomatically describes the emergence of a hand during childbirth. Because the subject is not explicitly named and refers to one of the twins, 'one put out a hand' preserves the indefinite sense better than the more interpretive 'a hand came out'.
- source_word: הַמְיַלֶּדֶת
  chosen: the midwife
  alternatives:
  - the woman helping in childbirth
  lexicon: HALOT
  rationale: The participial form from ילד denotes the woman assisting the birth. 'Midwife' is the standard concise English equivalent.
- source_word: וַתִּקְשֹׁר עַל יָדוֹ שָׁנִי
  chosen: tied a scarlet thread on his hand
  alternatives:
  - tied scarlet on his hand
  - bound a scarlet cord on his hand
  lexicon: HALOT
  rationale: שָׁנִי refers to scarlet material/thread. English normally supplies the object as 'thread' or 'cord' in this context. 'Thread' fits the childbirth marker scene and avoids overstatement.
- source_word: זֶה יָצָא רִאשֹׁנָה
  chosen: This one came out first
  alternatives:
  - This came out first
  - This one came out firstborn
  lexicon: HALOT
  rationale: The demonstrative plus יצא and adverbial/ordinal רִאשֹׁנָה identifies the child presumed to emerge first. 'This one came out first' is idiomatic and precise; 'firstborn' would import a status term not explicitly used here.
