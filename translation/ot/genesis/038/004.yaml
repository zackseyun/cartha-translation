id: GEN.38.4
reference: Genesis 38:4
source:
  edition: WLC
  text: וַ/תַּ֥הַר ע֖וֹד וַ/תֵּ֣לֶד בֵּ֑ן וַ/תִּקְרָ֥א אֶת שְׁמ֖/וֹ אוֹנָֽן־׃
translation:
  text: She conceived again and bore a son, and she named him Onan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתַּהַר
  chosen: She conceived
  alternatives:
  - She became pregnant
  lexicon: HALOT
  rationale: The verb הרה in the wayyiqtol form denotes becoming pregnant/conceiving.
    'Conceived' is concise, natural, and slightly more formal, fitting the narrative
    style.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: In this birth-sequence context, עוֹד marks repetition rather than continuance,
    so 'again' best conveys the sense.
- source_word: וַתֵּלֶד בֵּן
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: HALOT
  rationale: ילד + 'son' is the standard idiom for childbirth. 'Bore a son' is idiomatic
    English and preserves the compactness of the Hebrew narrative.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  chosen: and she named him
  alternatives:
  - and she called his name
  - and she called him by the name
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'called his name,' but standard English
    expresses this as 'named him.' This is an optimal-equivalence rendering that preserves
    meaning without wooden phrasing.
- source_word: אוֹנָן
  chosen: Onan
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
