id: GEN.38.13
reference: Genesis 38:13
source:
  edition: WLC
  text: וַ/יֻּגַּ֥ד לְ/תָמָ֖ר לֵ/אמֹ֑ר הִנֵּ֥ה חָמִ֛י/ךְ עֹלֶ֥ה תִמְנָ֖תָ/ה לָ/גֹ֥ז
    צֹאנֽ/וֹ׃
translation:
  text: And Tamar was told, “Look, your father-in-law is going up to Timnah to shear
    his sheep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “See, your father-in-law is going up to Timnah to shear his flock.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: was told
  alternatives:
  - it was told
  - someone told
  lexicon: HALOT
  rationale: 'Hophal wayyiqtol of נגד expresses passive/reportive action. English
    idiom naturally supplies the recipient: ''Tamar was told.'''
- source_word: לְתָמָר
  chosen: Tamar
  lexicon: HALOT
  rationale: Indirect object of the passive/reportive verb; transliterated personal
    name per translation philosophy.
- source_word: לֵאמֹר
  chosen: introduced direct speech with quotation
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard speech-introduction formula. In natural English it is best represented
    by punctuation rather than a wooden 'saying.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to the report. 'Look' is readable
    modern English and preserves the discourse force better than archaic 'Behold.'
- source_word: חָמִיךְ
  chosen: your father-in-law
  lexicon: HALOT
  rationale: Second feminine singular pronominal suffix matches Tamar as addressee;
    explicit kinship term should be retained.
- source_word: עֹלֶה
  chosen: is going up
  alternatives:
  - is coming up
  - goes up
  lexicon: HALOT
  rationale: Qal participle indicates ongoing/imminent movement. 'Going up' preserves
    the directional nuance of עלה without overinterpreting whether the motion is toward
    the speaker or simply uphill.
- source_word: תִמְנָתָה
  chosen: to Timnah
  alternatives:
  - toward Timnah
  lexicon: HALOT
  rationale: Place name with directional he. English normally renders this simply
    as 'to Timnah.'
- source_word: לָגֹז
  chosen: to shear
  alternatives:
  - for shearing
  lexicon: HALOT
  rationale: 'Infinitive construct with ל expresses purpose: Judah is going up for
    the purpose of shearing.'
- source_word: צֹאנוֹ
  chosen: his sheep
  alternatives:
  - his flock
  lexicon: HALOT
  rationale: Though צאן can denote small livestock collectively, in a shearing context
    'sheep' is the specific and natural sense.
