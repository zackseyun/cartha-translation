id: GEN.38.25
reference: Genesis 38:25
source:
  edition: WLC
  text: הִ֣וא מוּצֵ֗את וְ/הִ֨יא שָׁלְחָ֤ה אֶל חָמִ֨י/הָ֙ לֵ/אמֹ֔ר לְ/אִישׁ֙ אֲשֶׁר
    אֵ֣לֶּה לּ֔/וֹ אָנֹכִ֖י הָרָ֑ה וַ/תֹּ֨אמֶר֙ הַכֶּר נָ֔א לְ/מִ֞י הַ/חֹתֶ֧מֶת וְ/הַ/פְּתִילִ֛ים
    וְ/הַ/מַּטֶּ֖ה הָ/אֵֽלֶּה־־־׃
translation:
  text: As she was being brought out, she sent word to her father-in-law, saying,
    “I am pregnant by the man to whom these belong.” And she said, “Please identify
    whose signet seal, cords, and staff these are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Please recognize.” The Hebrew verb can mean either to recognize or to
      identify; here it carries a pointed forensic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּצֵאת
  chosen: was being brought out
  alternatives:
  - was brought out
  - was taken out
  lexicon: HALOT
  rationale: Passive participle of יצא in context of judicial removal for punishment;
    progressive English ('was being brought out') captures the participial, ongoing
    action naturally.
- source_word: שָׁלְחָה
  chosen: sent word
  alternatives:
  - sent
  - sent a message
  lexicon: HALOT
  rationale: The verb means 'sent,' but with indirect speech to her father-in-law
    the idiomatic sense is that she sent a message rather than physically sending
    an object alone.
- source_word: חָמִיהָ
  chosen: her father-in-law
  lexicon: HALOT
  rationale: Direct kinship term; explicit English rendering is required for clarity.
- source_word: לְאִישׁ אֲשֶׁר אֵלֶּה לּוֹ
  chosen: by the man to whom these belong
  alternatives:
  - to the man whose these are
  - by the man whose these things are
  lexicon: HALOT
  rationale: The lamed plus איש and relative clause identifies possession. 'By the
    man to whom these belong' is idiomatic English and makes explicit the implied
    paternity in the pregnancy statement.
- source_word: הָרָה
  chosen: pregnant
  alternatives:
  - with child
  lexicon: HALOT
  rationale: Adjective meaning 'pregnant.' 'Pregnant' is clear modern English; 'with
    child' is traditional but more archaic.
- source_word: הַכֶּר נָא
  chosen: Please identify
  alternatives:
  - Please recognize
  - Recognize, please
  lexicon: HALOT
  rationale: Imperative of נכר with particle נָא requests recognition/identification.
    'Identify' fits the forensic force in context, while preserving the polite appeal
    of נָא with 'please.'
- source_word: לְמִי
  chosen: whose
  alternatives:
  - to whom belong
  lexicon: HALOT
  rationale: English 'whose' is the most natural possessive equivalent for the Hebrew
    interrogative with lamed.
- source_word: חֹתֶמֶת
  chosen: signet seal
  alternatives:
  - seal
  - signet
  lexicon: HALOT
  rationale: The object is a personal seal used for identification. 'Signet seal'
    preserves both the sealing function and the personal-identifying nuance.
- source_word: פְּתִילִים
  chosen: cords
  alternatives:
  - cord
  - threads
  - string
  lexicon: HALOT
  rationale: Plural noun; likely the cords associated with the seal. 'Cords' is the
    most straightforward plural rendering.
- source_word: מַטֶּה
  chosen: staff
  alternatives:
  - rod
  - walking stick
  lexicon: HALOT
  rationale: In patriarchal narrative, 'staff' is the standard and contextually fitting
    rendering.
- source_word: הָאֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Demonstrative plural referring to the three presented items; simple deictic
    rendering is sufficient.
