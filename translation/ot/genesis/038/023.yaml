id: GEN.38.23
reference: Genesis 38:23
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוּדָה֙ תִּֽקַּֽח לָ֔/הּ פֶּ֖ן נִהְיֶ֣ה לָ/ב֑וּז הִנֵּ֤ה שָׁלַ֨חְתִּי֙
    הַ/גְּדִ֣י הַ/זֶּ֔ה וְ/אַתָּ֖ה לֹ֥א מְצָאתָֽ/הּ־׃
translation:
  text: And Judah said, “Let her keep it, lest we become a laughingstock. Look, I
    sent this young goat, but you did not find her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lest we become a disgrace” or “lest we be mocked.” The Hebrew expression
      speaks of becoming an object of contempt or derision.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקַּח לָהּ
  chosen: Let her keep it
  alternatives:
  - Let her take it for herself
  - Let her have it
  lexicon: HALOT
  rationale: 'The 3fs imperfect of לקח with לָהּ in context is permissive/jussive:
    Judah concedes that Tamar may retain the pledge items. English ''keep it'' communicates
    the idiomatic sense more naturally than the more wooden ''take it for herself.''
    The object is implicit from context (the pledged items), so singular ''it'' is
    a collective/idiomatic English rendering.'
- source_word: פֶּן נִהְיֶה לָבוּז
  chosen: lest we become a laughingstock
  alternatives:
  - lest we become a disgrace
  - lest we be mocked
  - lest we become contemptible
  lexicon: HALOT
  rationale: בּוּז denotes contempt, scorn, or derision. 'Laughingstock' captures
    the social shame Judah fears in this narrative setting, while remaining idiomatic.
    'Disgrace' is possible but slightly broader and less vivid.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to what follows. 'Look'
    is readable modern English and preserves the deictic force without archaic tone.
- source_word: שָׁלַחְתִּי הַגְּדִי הַזֶּה
  chosen: I sent this young goat
  alternatives:
  - I sent this goat kid
  - I sent this kid
  lexicon: HALOT
  rationale: גְּדִי refers to a young goat/kid. 'Young goat' is clear modern English
    and avoids possible ambiguity of 'kid.' The demonstrative 'this' is retained from
    the Hebrew.
- source_word: וְאַתָּה לֹא מְצָאתָהּ
  chosen: but you did not find her
  alternatives:
  - and you did not find her
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in context it marks
    contrast between Judah's sending the goat and his companion's failure to locate
    the woman, so 'but' better reflects the discourse relation. The feminine suffix
    on מְצָאתָהּ refers to the woman Judah sought.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
