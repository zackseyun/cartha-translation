id: GEN.38.17
reference: Genesis 38:17
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אָנֹכִ֛י אֲשַׁלַּ֥ח גְּדִֽי עִזִּ֖ים מִן הַ/צֹּ֑אן וַ/תֹּ֕אמֶר
    אִם תִּתֵּ֥ן עֵרָב֖וֹן עַ֥ד שָׁלְחֶֽ/ךָ־־־׃
translation:
  text: And he said, “I will send a young goat from the flock.” And she said, “If
    you will give a pledge until you send it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a deposit' or 'security' for 'a pledge' (עֵרָבוֹן).
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדִי עִזִּים
  chosen: a young goat
  alternatives:
  - a kid of the goats
  - a goat kid
  lexicon: HALOT
  rationale: The construct phrase literally denotes a kid/young one of the goats.
    'Young goat' is natural modern English and preserves the animal specified without
    archaic phrasing.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep/goats
  - from the herd
  lexicon: HALOT
  rationale: צֹאן commonly refers collectively to small livestock, especially sheep
    and goats. Since the specific animal is already identified as a goat, 'from the
    flock' is the most idiomatic rendering and avoids awkward redundancy.
- source_word: עֵרָבוֹן
  chosen: a pledge
  alternatives:
  - a deposit
  - security
  lexicon: HALOT
  rationale: The noun denotes something given as security or guarantee pending later
    fulfillment. 'Pledge' fits the narrative context and standard English Bible usage
    well.
- source_word: עַד שָׁלְחֶךָ
  chosen: until you send it
  alternatives:
  - until your sending
  - until you send
  lexicon: HALOT
  rationale: The suffix on the infinitive construct is second masculine singular ('your
    sending'), referring to Judah's act of sending the promised goat. English requires
    an object for clarity; 'it' is implied by context and makes the sentence natural.
- source_word: אִם תִּתֵּן
  chosen: If you will give
  alternatives:
  - If you give
  - Provided that you give
  lexicon: HALOT
  rationale: This introduces Tamar's condition in direct speech. 'If you will give'
    preserves the conditional force and the immediacy of the dialogue.
- source_word: אָנֹכִי אֲשַׁלַּח
  chosen: I will send
  alternatives:
  - I myself will send
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English normally does not
    require explicit rendering here. The future promise is adequately conveyed by
    'I will send.'
