theological_decisions:
- issue: Moral evaluation in Judah's confession
  chosen_reading: Judah acknowledges Tamar as more righteous than himself in this
    matter, without implying her absolute sinlessness or making a broader doctrinal
    claim.
  alternative_readings:
  - Judah merely admits Tamar was more justified procedurally
  - Judah declares Tamar wholly innocent
  rationale: The comparative wording is situational and narrative. The translation
    preserves the moral force of צדק without overstating it into an absolute theological
    verdict.
  doctrine_reference: Preserve theological tension rather than resolve it.
