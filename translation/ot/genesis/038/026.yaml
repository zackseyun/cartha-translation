id: GEN.38.26
reference: Genesis 38:26
source:
  edition: WLC
  text: וַ/יַּכֵּ֣ר יְהוּדָ֗ה וַ/יֹּ֨אמֶר֙ צָֽדְקָ֣ה מִמֶּ֔/נִּי כִּֽי עַל כֵּ֥ן לֹא
    נְתַתִּ֖י/הָ לְ/שֵׁלָ֣ה בְנִ֑/י וְ/לֹֽא יָסַ֥ף ע֖וֹד לְ/דַעְתָּֽ/ה־־־־׃
translation:
  text: Then Judah recognized them and said, “She is more righteous than I, because
    I did not give her to Shelah my son.” And he did not know her again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “She is more in the right than I am.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “know her,” a euphemism for sexual relations.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּכֵּר
  chosen: recognized them
  alternatives:
  - recognized
  - identified them
  lexicon: HALOT
  rationale: The verb נכר here refers to Judah's recognizing the pledged items previously
    shown to him (cf. v. 25). English supplies the object 'them' for clarity from
    the immediate context.
- source_word: צָדְקָה מִמֶּנִּי
  chosen: She is more righteous than I
  alternatives:
  - She is in the right rather than I
  - She is more in the right than I am
  lexicon: HALOT
  rationale: The comparative construction with מן indicates Tamar is more in the right
    relative to Judah. 'More righteous than I' preserves the lexical link to צדק while
    remaining natural English.
- source_word: כִּי עַל כֵּן
  chosen: because
  alternatives:
  - for this reason
  - because for this reason
  lexicon: HALOT
  rationale: The phrase introduces Judah's explanation for his statement. In English,
    'because' captures the causal force smoothly without unnecessary literalism.
- source_word: לֹא נְתַתִּיהָ לְשֵׁלָה בְנִי
  chosen: I did not give her to Shelah my son
  alternatives:
  - I did not give her in marriage to Shelah my son
  - I failed to give her to Shelah my son
  lexicon: HALOT
  rationale: The Hebrew literally says 'give her to Shelah my son,' with marriage
    implied by context. The more literal wording is retained in the main text; the
    marital sense is clear from the narrative.
- source_word: וְלֹא יָסַף עוֹד לְדַעְתָּהּ
  chosen: And he did not know her again
  alternatives:
  - And he did not continue to have relations with her
  - And he did not sleep with her again
  lexicon: HALOT
  rationale: ידע is a common Hebrew euphemism for sexual relations. 'Know her' preserves
    the source idiom, while 'again' reflects יָסַף עוֹד as cessation of further relations.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: שֵׁלָה
  chosen: Shelah
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
