id: GEN.38.11
reference: Genesis 38:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוּדָה֩ לְ/תָמָ֨ר כַּלָּת֜/וֹ שְׁבִ֧י אַלְמָנָ֣ה בֵית אָבִ֗י/ךְ
    עַד יִגְדַּל֙ שֵׁלָ֣ה בְנִ֔/י כִּ֣י אָמַ֔ר פֶּן יָמ֥וּת גַּם ה֖וּא כְּ/אֶחָ֑י/ו
    וַ/תֵּ֣לֶךְ תָּמָ֔ר וַ/תֵּ֖שֶׁב בֵּ֥ית אָבִֽי/הָ־־־־׃
translation:
  text: Then Judah said to Tamar his daughter-in-law, “Remain a widow in your father’s
    house until my son Shelah grows up,” for he said, “Lest he also die like his brothers.”
    So Tamar went and lived in her father’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for he thought,” since the Hebrew “said” can introduce internal reasoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבִי
  chosen: Remain
  alternatives:
  - Live
  - Stay
  lexicon: HALOT
  rationale: Imperative of ישׁב in context directs Tamar to continue residing in a
    state/location. 'Remain' fits the command naturally in English and pairs well
    with the following predicate 'a widow.'
- source_word: אַלְמָנָה
  chosen: a widow
  alternatives:
  - as a widow
  - widowed
  lexicon: HALOT
  rationale: The noun denotes widowhood status. 'Remain a widow' is idiomatic English
    and preserves the social state Judah imposes on Tamar.
- source_word: בֵית אָבִיךְ
  chosen: in your father’s house
  alternatives:
  - at your father’s house
  lexicon: HALOT
  rationale: Standard idiom for residence within the paternal household. 'In your
    father’s house' is the most natural and sufficiently literal rendering.
- source_word: עַד יִגְדַּל שֵׁלָה בְנִי
  chosen: until my son Shelah grows up
  alternatives:
  - until my son Shelah becomes grown
  - until Shelah my son is grown
  lexicon: HALOT
  rationale: יגדל means 'grow/become great'; in context it refers to reaching maturity
    for marriage. 'Grows up' is clear modern English without over-interpreting beyond
    the text.
- source_word: כִּי אָמַר
  chosen: for he said
  alternatives:
  - for he thought
  - because he said to himself
  lexicon: HALOT
  rationale: The clause gives Judah’s rationale. Hebrew 'said' can introduce internal
    speech; 'for he said' preserves the wording while allowing readers to infer inward
    reasoning from context.
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - Otherwise
  - for fear that
  lexicon: HALOT
  rationale: פֶּן introduces apprehension. 'Lest' is concise and accurate, though
    slightly elevated; it remains readable here and preserves the force of feared
    outcome.
- source_word: כְּאֶחָיו
  chosen: like his brothers
  alternatives:
  - as his brothers did
  lexicon: HALOT
  rationale: The comparison is to the fate of Er and Onan. 'Like his brothers' is
    formally close and clear in context.
- source_word: וַתֵּשֶׁב
  chosen: lived
  alternatives:
  - stayed
  - remained
  - dwelt
  lexicon: HALOT
  rationale: Though the same root as earlier שׁבי/ישׁב, English style benefits from
    variation here. In narrative sequence, 'went and lived in her father’s house'
    reads naturally while still conveying settled residence; the variance is documented
    per translation philosophy.
- source_word: כַּלָּתוֹ
  chosen: his daughter-in-law
  lexicon: HALOT
  rationale: Standard kinship term; no ambiguity in this context.
- source_word: בֵּית אָבִיהָ
  chosen: her father’s house
  alternatives:
  - her father’s household
  lexicon: HALOT
  rationale: Matches the earlier phrase and preserves the household-residence sense.
