id: GEN.38.2
reference: Genesis 38:2
source:
  edition: WLC
  text: וַ/יַּרְא שָׁ֧ם יְהוּדָ֛ה בַּת אִ֥ישׁ כְּנַעֲנִ֖י וּ/שְׁמ֣/וֹ שׁ֑וּעַ וַ/יִּקָּחֶ֖/הָ
    וַ/יָּבֹ֥א אֵלֶֽי/הָ־־׃
translation:
  text: There Judah saw the daughter of a Canaanite man named Shua, and he took her
    and went in to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and his name was Shua,'' referring to the Canaanite man, not
      the daughter.'
    reason: lexical_alternative
  - marker: b
    text: '''Went in to her'' is a Hebrew idiom for sexual relations.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - noticed
  - met
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative sequence is most naturally
    rendered 'saw.' 'Met' would overinterpret, and 'noticed' is possible but less
    direct.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverb of location; 'there' is the natural concise English equivalent
    in narrative.
- source_word: בַּת אִישׁ כְּנַעֲנִי
  chosen: the daughter of a Canaanite man
  alternatives:
  - a Canaanite's daughter
  - the daughter of a Canaanite
  lexicon: HALOT
  rationale: 'This preserves the construct chain explicitly: ''daughter of a man,
    a Canaanite.'' ''Canaanite''s daughter'' is smoother but slightly less transparent
    to the Hebrew structure.'
- source_word: וּשְׁמוֹ שׁוּעַ
  chosen: named Shua
  alternatives:
  - whose name was Shua
  lexicon: HALOT
  rationale: The Hebrew refers to the father's name ('and his name was Shua'), not
    the daughter's. 'Named Shua' is concise modern English while preserving that reference.
- source_word: וַיִּקָּחֶהָ
  chosen: he took her
  alternatives:
  - he took her as wife
  - he married her
  lexicon: HALOT
  rationale: לקח plus a woman can imply taking in marriage, but the verb itself is
    simply 'took.' To avoid importing more than the text states at this point in the
    verse, the more literal wording is retained.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: went in to her
  alternatives:
  - had relations with her
  - lay with her
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for sexual relations. 'Went in to her'
    preserves the idiomatic force and narrative register without euphemistic paraphrase.
