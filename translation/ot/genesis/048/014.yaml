id: GEN.48.14
reference: Genesis 48:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ יִשְׂרָאֵ֨ל אֶת יְמִינ֜/וֹ וַ/יָּ֨שֶׁת עַל רֹ֤אשׁ אֶפְרַ֨יִם֙
    וְ/ה֣וּא הַ/צָּעִ֔יר וְ/אֶת שְׂמֹאל֖/וֹ עַל רֹ֣אשׁ מְנַשֶּׁ֑ה שִׂכֵּל֙ אֶת יָדָ֔י/ו
    כִּ֥י מְנַשֶּׁ֖ה הַ/בְּכֽוֹר־־־־־׃
translation:
  text: Then Israel stretched out his right hand and placed it on Ephraim’s head,
    though he was the younger, and his left on Manasseh’s head, crossing his hands,
    for Manasseh was the firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'guiding his hands deliberately.' The Hebrew phrase can emphasize intentional,
      skillful positioning; the context indicates that this involved crossing them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: stretched out
  alternatives:
  - sent out
  - extended
  lexicon: HALOT
  rationale: In this physical gesture context, the verb means to extend the hand rather
    than 'send.' 'Stretched out' is idiomatic modern English and fits the blessing
    action.
- source_word: וַיָּשֶׁת
  chosen: placed
  alternatives:
  - set
  - put
  lexicon: HALOT
  rationale: The verb denotes setting or placing the hand upon the head. 'Placed'
    is natural English and preserves the deliberate action.
- source_word: יְמִינוֹ
  chosen: his right hand
  alternatives:
  - his right
  lexicon: HALOT
  rationale: Explicitly rendering 'hand' matches the Hebrew noun and clarifies the
    gesture.
- source_word: עַל רֹאשׁ
  chosen: on ... head
  alternatives:
  - upon ... head
  lexicon: HALOT
  rationale: This is the standard idiom for laying a hand on someone's head. 'On'
    is readable modern English; 'upon' would be more formal but unnecessary.
- source_word: וְהוּא הַצָּעִיר
  chosen: though he was the younger
  alternatives:
  - and he was the younger
  - he being the younger
  lexicon: HALOT
  rationale: 'The clause is concessive in sense within the narrative: Ephraim received
    the right hand despite being younger. ''Though'' brings out the contextual force
    without over-paraphrasing.'
- source_word: שְׂמֹאלוֹ
  chosen: his left
  alternatives:
  - his left hand
  lexicon: HALOT
  rationale: Because 'hand' has already been stated with the right hand and the parallel
    gesture is obvious, 'his left' is concise while still clear in English.
- source_word: שִׂכֵּל אֶת יָדָיו
  chosen: crossing his hands
  alternatives:
  - guiding his hands deliberately
  - acting wisely with his hands
  - interchanging his hands
  lexicon: HALOT
  rationale: The piel of שכל here is difficult, but in context it refers to the intentional
    crossing/positioning of Jacob's hands so that the right rests on Ephraim. 'Crossing
    his hands' best captures the narrative sense and is supported by the immediate
    context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: 'Introduces the explanatory reason for the unusual hand placement: Manasseh
    was the firstborn.'
- source_word: הַבְּכֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  lexicon: HALOT
  rationale: '''Firstborn'' preserves the lexical and cultural significance of birth
    order, which matters in the blessing context more than mere age ranking.'
