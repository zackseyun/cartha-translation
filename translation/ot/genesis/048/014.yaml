theological_decisions:
- issue: Interpretation of שִׂכֵּל אֶת יָדָיו
  chosen_reading: Jacob intentionally crossed his hands when blessing Ephraim and
    Manasseh.
  alternative_readings:
  - Jacob guided his hands skillfully/deliberately without explicit emphasis on crossing
  rationale: The immediate context explains that Ephraim, the younger, received the
    right hand while Manasseh, the firstborn, received the left. This strongly favors
    understanding the phrase as intentional crossing rather than a more generic statement
    about skillful movement. The rendering preserves the narrative's theological emphasis
    on deliberate reversal of expected primogeniture without importing later doctrinal
    claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
