id: GEN.48.17
reference: Genesis 48:17
source:
  edition: WLC
  text: וַ/יַּ֣רְא יוֹסֵ֗ף כִּי יָשִׁ֨ית אָבִ֧י/ו יַד יְמִינ֛/וֹ עַל רֹ֥אשׁ אֶפְרַ֖יִם
    וַ/יֵּ֣רַע בְּ/עֵינָ֑י/ו וַ/יִּתְמֹ֣ךְ יַד אָבִ֗י/ו לְ/הָסִ֥יר אֹתָ֛/הּ מֵ/עַ֥ל
    רֹאשׁ אֶפְרַ֖יִם עַל רֹ֥אשׁ מְנַשֶּֽׁה־־־־־־׃
translation:
  text: When Joseph saw that his father had placed his right hand on Ephraim’s head,
    it was displeasing in his eyes, and he took hold of his father’s hand to remove
    it from Ephraim’s head onto Manasseh’s head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'it displeased him.' The Hebrew literally says, 'it was
      bad/displeasing in his eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - And ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' captures
    the temporal force in English and smoothly introduces Joseph's reaction.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Joseph saw: ''that his father
    had placed...'' rather than a causal clause.'
- source_word: יָשִׁית
  chosen: had placed
  alternatives:
  - was placing
  - put
  lexicon: HALOT
  rationale: 'From שׂים/שׁית, ''set/place/put.'' English past perfect fits the sequence
    from Joseph''s perspective: he saw that his father had placed his hand.'
- source_word: יַד יְמִינוֹ
  chosen: his right hand
  alternatives:
  - the hand of his right
  - his right
  lexicon: HALOT
  rationale: Idiomatic rendering of the construct phrase; 'right hand' preserves the
    significance of the blessing gesture.
- source_word: עַל רֹאשׁ אֶפְרַיִם
  chosen: on Ephraim’s head
  alternatives:
  - upon the head of Ephraim
  lexicon: HALOT
  rationale: Natural modern English while preserving the concrete physical action.
- source_word: וַיֵּרַע בְּעֵינָיו
  chosen: it was displeasing in his eyes
  alternatives:
  - it displeased him
  - it was evil in his eyes
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to something being bad/evil in someone's
    eyes. 'It was displeasing in his eyes' preserves the idiomatic imagery more transparently
    than the smoother 'it displeased him,' while avoiding the misleading moral sense
    'evil' in this context.
- source_word: וַיִּתְמֹךְ
  chosen: he took hold of
  alternatives:
  - he grasped
  - he supported
  - he seized
  lexicon: HALOT
  rationale: The verb תמך can mean support/hold/grasp. In this context Joseph physically
    takes hold of Jacob's hand in order to redirect it, so 'took hold of' best fits
    the action without overstating force.
- source_word: יַד אָבִיו
  chosen: his father’s hand
  alternatives:
  - the hand of his father
  lexicon: HALOT
  rationale: Straightforward possessive rendering in natural English.
- source_word: לְהָסִיר אֹתָהּ
  chosen: to remove it
  alternatives:
  - to turn it away
  - to take it away
  lexicon: HALOT
  rationale: הסיר means remove/turn aside. 'Remove it' is concise and fits the physical
    relocation of the hand.
- source_word: מֵעַל רֹאשׁ אֶפְרַיִם עַל רֹאשׁ מְנַשֶּׁה
  chosen: from Ephraim’s head onto Manasseh’s head
  alternatives:
  - from upon Ephraim’s head to Manasseh’s head
  - off Ephraim’s head onto the head of Manasseh
  lexicon: HALOT
  rationale: This preserves the directional movement clearly in idiomatic English.
    'Onto' reflects the shift from one head to the other.
