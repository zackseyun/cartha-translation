id: GEN.48.16
reference: Genesis 48:16
source:
  edition: WLC
  text: הַ/מַּלְאָךְ֩ הַ/גֹּאֵ֨ל אֹתִ֜/י מִ/כָּל רָ֗ע יְבָרֵךְ֮ אֶת הַ/נְּעָרִים֒
    וְ/יִקָּרֵ֤א בָ/הֶם֙ שְׁמִ֔/י וְ/שֵׁ֥ם אֲבֹתַ֖/י אַבְרָהָ֣ם וְ/יִצְחָ֑ק וְ/יִדְגּ֥וּ
    לָ/רֹ֖ב בְּ/קֶ֥רֶב הָ/אָֽרֶץ־־׃
translation:
  text: The angel who has redeemed me from all evil, may he bless the boys; and may
    my name be called on them, and the name of my fathers Abraham and Isaac; and may
    they multiply greatly in the midst of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all harm' or 'from every trouble.' The Hebrew 'evil' can include
      calamity as well as moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'may they be called by my name.' The Hebrew idiom is literally 'may my
      name be called on them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may they grow into a multitude.' The Hebrew verb is rare and evokes
      abundant increase, possibly with fish-like imagery.
    reason: lexical_alternative
  - marker: d
    text: Or 'in the midst of the earth.' Hebrew 'land' can also mean 'earth' depending
      on context.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מַלְאָךְ ordinarily means 'messenger/angel.' In this patriarchal context,
    where Jacob refers to the divine messenger associated with God's protection, 'angel'
    is the most natural English rendering and preserves the traditional and contextual
    sense without over-interpreting identity.
- source_word: הַגֹּאֵל
  chosen: who has redeemed me
  alternatives:
  - who redeems me
  - who has delivered me
  lexicon: HALOT
  rationale: The participle of גאל denotes one acting as redeemer/deliverer/kinsman-redeemer.
    'Who has redeemed me' fits the retrospective context of Jacob's blessing and preserves
    the redemptive nuance better than the more generic 'delivered.'
- source_word: מִכָּל רָע
  chosen: from all evil
  alternatives:
  - from all harm
  - from every trouble
  lexicon: HALOT
  rationale: רָע can denote moral evil or calamity/harm. Here Jacob recounts preservation
    from adversity, so 'evil' retains the broader Hebrew scope while remaining idiomatic;
    alternatives narrow the sense more than the text requires.
- source_word: יְבָרֵךְ
  chosen: may he bless
  alternatives:
  - let him bless
  - he will bless
  lexicon: HALOT
  rationale: The yiqtol here functions jussively in the blessing context. 'May he
    bless' best conveys the optative force in natural English.
- source_word: הַנְּעָרִים
  chosen: the boys
  alternatives:
  - the lads
  - the youths
  lexicon: HALOT
  rationale: Refers specifically to Ephraim and Manasseh as young male descendants.
    'The boys' is natural modern English and appropriately concrete.
- source_word: וְיִקָּרֵא בָהֶם שְׁמִי
  chosen: may my name be called on them
  alternatives:
  - may they be called by my name
  - may my name be named in them
  lexicon: HALOT
  rationale: The Niphal of קרא with ב conveys the idiom of a name being invoked upon
    or attached to someone. 'May my name be called on them' preserves the Hebrew imagery
    more closely than the smoother but slightly interpretive 'called by my name.'
- source_word: וְשֵׁם אֲבֹתַי אַבְרָהָם וְיִצְחָק
  chosen: and the name of my fathers Abraham and Isaac
  alternatives:
  - and the names of my fathers Abraham and Isaac
  lexicon: HALOT
  rationale: The singular 'name' governs the compound phrase and can function collectively.
    Retaining singular reflects the Hebrew form and the idea of family identity/inheritance.
- source_word: וְיִדְגּוּ לָרֹב
  chosen: may they multiply greatly
  alternatives:
  - may they grow into a multitude
  - may they swarm in abundance
  lexicon: HALOT
  rationale: The rare verb דגה is related to fish-like increase and conveys prolific
    multiplication. 'Multiply greatly' communicates the sense clearly in modern English;
    the more literal fish imagery would sound opaque in the main text.
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the land
  alternatives:
  - in the midst of the earth
  - within the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In the patriarchal context of covenantal
    inheritance and descendants, 'land' is preferable, though the broader sense 'earth'
    is possible and worth preserving in a footnote.
