theological_decisions:
- issue: Identity of 'the angel' in Jacob's blessing
  chosen_reading: Retain 'the angel' without specifying a christological or theophanic
    identification.
  alternative_readings:
  - the angel as a manifestation of God
  - the angel as a created messenger acting for God
  rationale: The verse closely associates God and the angel in Jacob's blessing, but
    the Hebrew text itself does not explicitly define the angel's ontological identity.
    To preserve theological tension and avoid importing a doctrinal conclusion beyond
    the text, the translation leaves the expression as 'the angel' and documents the
    interpretive options here.
  doctrine_reference: Preserve theological tension rather than resolve it.
