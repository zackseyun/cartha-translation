theological_decisions:
- issue: Use of the patriarchal name
  chosen_reading: Israel
  alternative_readings:
  - Jacob
  rationale: The verse explicitly names the patriarch as 'Israel.' Preserving the
    source wording avoids interpretive smoothing and maintains the narrative/theological
    significance of the covenant name in the blessing context.
  doctrine_reference: Translation philosophy §1, §5
