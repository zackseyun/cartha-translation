id: GEN.48.13
reference: Genesis 48:13
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח יוֹסֵף֮ אֶת שְׁנֵי/הֶם֒ אֶת אֶפְרַ֤יִם בִּֽ/ימִינ/וֹ֙ מִ/שְּׂמֹ֣אל
    יִשְׂרָאֵ֔ל וְ/אֶת מְנַשֶּׁ֥ה בִ/שְׂמֹאל֖/וֹ מִ/ימִ֣ין יִשְׂרָאֵ֑ל וַ/יַּגֵּ֖שׁ
    אֵלָֽי/ו־־־׃
translation:
  text: And Joseph took the two of them—Ephraim in his right hand, at Israel’s left,
    and Manasseh in his left hand, at Israel’s right—and brought them near to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the left of Israel' and 'from the right of Israel,'
      describing the boys’ placement relative to Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took hold of
  - received
  lexicon: HALOT
  rationale: The common narrative sense of לקח here is simply 'took.' 'Took hold of'
    is too specific, and 'received' does not fit the action of positioning the boys.
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  - the two
  lexicon: HALOT
  rationale: This preserves the dual sense explicitly. 'The two of them' is natural
    English and keeps the focus on Joseph handling both sons together.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Personal name transliterated per translation philosophy.
- source_word: בִּימִינוֹ
  chosen: in his right hand
  alternatives:
  - with his right hand
  - at his right hand
  lexicon: HALOT
  rationale: The preposition plus 'right hand' most naturally indicates Joseph's hand
    as the means/location in which he held Ephraim. 'In his right hand' is idiomatic
    and precise.
- source_word: מִשְּׂמֹאל יִשְׂרָאֵל
  chosen: at Israel’s left
  alternatives:
  - from Israel's left
  - on Israel's left side
  lexicon: HALOT
  rationale: Although the preposition is literally 'from,' in this positioning context
    it indicates relative placement with reference to Israel's left side. 'At Israel’s
    left' is concise and communicates the spatial relation clearly.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal name transliterated per translation philosophy.
- source_word: בִשְׂמֹאלוֹ
  chosen: in his left hand
  alternatives:
  - with his left hand
  lexicon: HALOT
  rationale: Parallel to 'in his right hand,' preserving the balanced structure of
    the Hebrew.
- source_word: מִימִין יִשְׂרָאֵל
  chosen: at Israel’s right
  alternatives:
  - from Israel's right
  - on Israel's right side
  lexicon: HALOT
  rationale: As with the previous phrase, the sense is relative placement for the
    blessing scene. 'At Israel’s right' is the clearest natural English rendering.
- source_word: וַיַּגֵּשׁ אֵלָיו
  chosen: brought them near to him
  alternatives:
  - brought them to him
  - presented them to him
  lexicon: HALOT
  rationale: נגשׁ often means 'bring near/approach.' 'Brought them near to him' preserves
    the physical movement toward Israel without adding the more formal nuance of 'presented.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  rationale: The Hebrew text uses 'Israel,' and the translation should preserve that
    naming choice rather than harmonize to 'Jacob.'
