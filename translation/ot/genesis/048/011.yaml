id: GEN.48.11
reference: Genesis 48:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִשְׂרָאֵל֙ אֶל יוֹסֵ֔ף רְאֹ֥ה פָנֶ֖י/ךָ לֹ֣א פִלָּ֑לְתִּי וְ/הִנֵּ֨ה
    הֶרְאָ֥ה אֹתִ֛/י אֱלֹהִ֖ים גַּ֥ם אֶת זַרְעֶֽ/ךָ־־׃
translation:
  text: And Israel said to Joseph, “I did not expect to see your face, and behold,
    God has let me see even your offspring.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I had not expected to see your face.' The Hebrew idiom 'see your face'
      means to see you in person, but the more literal wording is retained in the
      main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow without overinterpreting sequence.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses the covenant name 'Israel,' so the translation preserves
    the named form rather than harmonizing to 'Jacob'.
- source_word: רְאֹה פָנֶיךָ
  chosen: to see your face
  alternatives:
  - to see you
  - to look on your face
  lexicon: HALOT
  rationale: The idiom literally refers to seeing someone's face. 'To see your face'
    keeps the Hebrew concreteness and emotional force better than the flatter 'to
    see you.'
- source_word: לֹא פִלָּלְתִּי
  chosen: I did not expect
  alternatives:
  - I had not prayed
  - I did not imagine
  - I did not think
  lexicon: HALOT
  rationale: In this context פלל conveys expectation or anticipation rather than prayer
    in the narrow sense. 'I did not expect' best fits the idiom and context of Jacob's
    surprise at seeing Joseph again.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - yet look
  - indeed
  lexicon: HALOT
  rationale: Retains the discourse marker of surprise and emphasis. 'And behold' is
    still readable modern English here and preserves the rhetorical turn.
- source_word: הֶרְאָה אֹתִי
  chosen: has let me see
  alternatives:
  - has shown me
  - has caused me to see
  lexicon: HALOT
  rationale: The hiphil of ראה is causative. 'Has let me see' expresses the causative
    sense naturally in English while fitting the context of granted privilege.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Generic divine title, not the covenant name YHWH. 'God' is the direct
    and standard rendering.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  - indeed also
  lexicon: HALOT
  rationale: Here גַּם heightens the unexpected blessing beyond merely seeing Joseph;
    'even' captures the sense of added astonishment.
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  - your children
  lexicon: HALOT
  rationale: '''Offspring'' preserves the singular collective sense of זרע and is
    more natural in modern English than ''seed.'' ''Children'' would be too narrow,
    while ''descendants'' could sound broader than the immediate context.'
