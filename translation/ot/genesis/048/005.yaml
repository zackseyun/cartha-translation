theological_decisions:
- issue: Nature of Jacob's claim over Ephraim and Manasseh
  chosen_reading: Render the statement straightforwardly as a claim of filial/adoptive
    status without importing later doctrinal or legal terminology into the main text.
  alternative_readings:
  - Render with explicit adoption language such as 'I adopt them as my own'
  rationale: The Hebrew states 'they are mine' and 'shall be mine, like Reuben and
    Simeon.' The verse clearly conveys incorporation into Jacob's line, but it does
    not use a technical adoption term. The translation preserves the text's force
    without over-specifying the mechanism.
  doctrine_reference: Translation philosophy items 1 and 3
