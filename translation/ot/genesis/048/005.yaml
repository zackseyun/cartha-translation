id: GEN.48.5
reference: Genesis 48:5
source:
  edition: WLC
  text: וְ/עַתָּ֡ה שְׁנֵֽי בָנֶי/ךָ֩ הַ/נּוֹלָדִ֨ים לְ/ךָ֜ בְּ/אֶ֣רֶץ מִצְרַ֗יִם עַד
    בֹּאִ֥/י אֵלֶ֛י/ךָ מִצְרַ֖יְמָ/ה לִ/י הֵ֑ם אֶפְרַ֨יִם֙ וּ/מְנַשֶּׁ֔ה כִּ/רְאוּבֵ֥ן
    וְ/שִׁמְע֖וֹן יִֽהְיוּ לִֽ/י־־־־׃
translation:
  text: And now, your two sons who were born to you in the land of Egypt before I
    came to you in Egypt are mine; Ephraim and Manasseh shall be mine, like Reuben
    and Simeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until I came to you in Egypt.' The Hebrew expression can be rendered
      more formally this way; in context it refers to the sons born prior to Jacob's
      arrival.
    reason: lexical_alternative
  - marker: b
    text: That is, Ephraim and Manasseh are counted as Jacob's own sons, with status
      comparable to Reuben and Simeon.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Introduces a new, emphatic development in Jacob's speech. 'And now' preserves
    the discourse connection and the immediacy of the statement.
- source_word: שְׁנֵי בָנֶיךָ
  chosen: your two sons
  alternatives:
  - the two sons of yours
  lexicon: HALOT
  rationale: Direct and natural rendering of the construct phrase, preserving both
    number and possession.
- source_word: הַנּוֹלָדִים לְךָ
  chosen: who were born to you
  alternatives:
  - who have been born to you
  - the ones born to you
  lexicon: HALOT
  rationale: The passive participle functions attributively describing the sons. 'Who
    were born to you' is idiomatic English and preserves the filial relation.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ ('land') rather than compressing to simply 'in Egypt,'
    since the phrase is explicit in Hebrew and contributes to the setting.
- source_word: עַד בֹּאִי אֵלֶיךָ מִצְרַיְמָה
  chosen: before I came to you in Egypt
  alternatives:
  - until I came to you in Egypt
  - before my coming to you in Egypt
  lexicon: HALOT
  rationale: In context Jacob is delimiting which sons are included—those born prior
    to his arrival. 'Before I came to you in Egypt' communicates the temporal force
    clearly in English better than the more wooden 'until I came.'
- source_word: לִי הֵם
  chosen: are mine
  alternatives:
  - they are mine
  - they belong to me
  lexicon: HALOT
  rationale: Expresses Jacob's claim of filial/adoptive status over Ephraim and Manasseh.
    'Are mine' is concise and natural.
- source_word: אֶפְרַיִם וּמְנַשֶּׁה
  chosen: Ephraim and Manasseh
  rationale: Standard English transliterations of the personal names, in keeping with
    the translation philosophy to transliterate names.
- source_word: כִּרְאוּבֵן וְשִׁמְעוֹן
  chosen: like Reuben and Simeon
  alternatives:
  - as Reuben and Simeon
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like' is clear modern English and indicates
    that Ephraim and Manasseh are to have status comparable to Jacob's sons Reuben
    and Simeon.
- source_word: יִהְיוּ לִי
  chosen: shall be mine
  alternatives:
  - will be mine
  - shall belong to me
  lexicon: HALOT
  rationale: Future statement of status and inheritance relation. 'Shall be mine'
    preserves the solemn declarative tone and echoes the earlier 'are mine' without
    unnecessary expansion.
