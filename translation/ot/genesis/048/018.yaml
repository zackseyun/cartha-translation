id: GEN.48.18
reference: Genesis 48:18
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יוֹסֵ֛ף אֶל אָבִ֖י/ו לֹא כֵ֣ן אָבִ֑/י כִּי זֶ֣ה הַ/בְּכֹ֔ר שִׂ֥ים
    יְמִינְ/ךָ֖ עַל רֹאשֽׁ/וֹ־־־־׃
translation:
  text: And Joseph said to his father, “Not so, my father, for this one is the firstborn.
    Put your right hand on his head.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - But ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֶל אָבִיו
  chosen: to his father
  alternatives:
  - to his own father
  lexicon: HALOT
  rationale: Standard directional use of אֶל with the noun plus 3ms suffix. 'His father'
    is idiomatic and clear.
- source_word: לֹא כֵן
  chosen: Not so
  alternatives:
  - 'No'
  - It should not be so
  - Not like that
  lexicon: HALOT
  rationale: This idiom expresses correction or protest. 'Not so' preserves the directness
    and respectful tone better than the blunter 'No' or the more expansive 'It should
    not be so.'
- source_word: אָבִי
  chosen: my father
  alternatives:
  - father
  lexicon: HALOT
  rationale: The 1cs suffix should be represented explicitly. Repeating 'my father'
    reflects Joseph's respectful address.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces Joseph's explanation for his correction. 'For' is
    concise and fits the discourse flow.
- source_word: זֶה
  chosen: this one
  alternatives:
  - this
  - he
  lexicon: HALOT
  rationale: The demonstrative points to the son being indicated physically. 'This
    one' preserves the deictic force more clearly than simple 'he.'
- source_word: הַבְּכֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  - the first-born son
  lexicon: HALOT
  rationale: בכור is a key familial/status term, not merely age rank. 'Firstborn'
    best preserves both birth order and inheritance/blessing significance.
- source_word: שִׂים
  chosen: Put
  alternatives:
  - Place
  - Set
  lexicon: HALOT
  rationale: Imperative of שׂים. 'Put' is natural modern English and adequately direct.
- source_word: יְמִינְךָ
  chosen: your right hand
  alternatives:
  - your right
  lexicon: HALOT
  rationale: The noun ימין here clearly means the right hand, not merely the right
    side. Explicitly rendering 'hand' avoids ambiguity and matches the blessing context.
- source_word: עַל רֹאשׁוֹ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: Standard prepositional phrase in a blessing gesture. 'On his head' is
    idiomatic modern English; 'upon' would be more formal but unnecessary.
