theological_decisions:
- issue: Status term in blessing context
  chosen_reading: the firstborn
  alternative_readings:
  - the eldest
  rationale: The verse concerns Jacob's hand placement in relation to primogeniture
    and blessing. Rendering בכור as 'firstborn' preserves the covenantal/familial
    significance without reducing it to mere age order.
