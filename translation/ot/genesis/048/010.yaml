  category: mistranslation
  tier: 2
  from: So he brought them near to him
  to: So Joseph brought them near to him
  rationale: The pronoun 'he' in the English draft is ambiguous, and its most natural antecedent is 'Israel' from the preceding clause ('he could not see'). However, the subject of the Hebrew verb וַיַּגֵּשׁ ('and he brought near') is Joseph, as established in the context of verse 9. The current rendering incorrectly implies that the blind Israel brought the boys to himself. Explicitly naming 'Joseph' as the subject is necessary to correct the meaning and avoid misleading the reader about who performed the action.
