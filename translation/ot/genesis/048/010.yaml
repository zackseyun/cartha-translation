id: GEN.48.10
reference: Genesis 48:10
source:
  edition: WLC
  text: וְ/עֵינֵ֤י יִשְׂרָאֵל֙ כָּבְד֣וּ מִ/זֹּ֔קֶן לֹ֥א יוּכַ֖ל לִ/רְא֑וֹת וַ/יַּגֵּ֤שׁ אֹתָ/ם֙ אֵלָ֔י/ו וַ/יִּשַּׁ֥ק לָ/הֶ֖ם וַ/יְחַבֵּ֥ק לָ/הֶֽם׃
translation:
  text: Now Israel’s eyes were dim with age; he could not see. So Joseph brought them near to him, and he kissed them and embraced them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Israel’s eyes were heavy from old age.' The idiom means that his eyesight had grown dim.
    reason: lexical_alternative
  - marker: b
    text: Or 'So he brought them near to him'.
    reason: previous_rendering
lexical_decisions:
- source_word: עֵינֵי יִשְׂרָאֵל
  chosen: Israel’s eyes
  alternatives:
  - the eyes of Israel
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English as a possessive. 'Israel' is retained as the personal name used in the Hebrew narrative, not replaced with 'Jacob,' since the source text explicitly says 'Israel.'
- source_word: כָּבְדוּ
  chosen: were dim
  alternatives:
  - were heavy
  - grew dull
  lexicon: HALOT
  rationale: The verb literally means 'were heavy,' but in the idiom of eyesight it denotes impaired vision. 'Were dim' communicates the plain sense in natural English without over-literal awkwardness.
- source_word: מִזֹּקֶן
  chosen: with age
  alternatives:
  - from old age
  - because of old age
  lexicon: HALOT
  rationale: The preposition marks cause/source. 'With age' is concise, idiomatic English that preserves the causal sense.
- source_word: לֹא יוּכַל לִרְאוֹת
  chosen: he could not see
  alternatives:
  - he was unable to see
  lexicon: HALOT
  rationale: Straightforward rendering of inability plus infinitive. 'Could not see' is the most natural modern English equivalent.
- source_word: וַיַּגֵּשׁ אֹתָם אֵלָיו
  chosen: So he brought them near to him
  alternatives:
  - And he brought them to him
  - And he drew them near to him
  lexicon: HALOT
  rationale: The verb נגשׁ in hiphil means to bring near. 'So' reflects the narrative progression in readable English; 'near to him' preserves the spatial nuance better than simply 'to him.' The subject is understood from context as Joseph, though Hebrew leaves it implicit in the verb form.
- source_word: וַיִּשַּׁק לָהֶם
  chosen: and he kissed them
  alternatives:
  - and he kissed each of them
  lexicon: HALOT
  rationale: Plural pronominal object rendered naturally in English. No need to over-specify distributive force beyond the Hebrew.
- source_word: וַיְחַבֵּק לָהֶם
  chosen: and embraced them
  alternatives:
  - and hugged them
  lexicon: HALOT
  rationale: '''Embraced'' fits the register of the narrative better than the more colloquial ''hugged,'' while accurately conveying the affectionate action.'
