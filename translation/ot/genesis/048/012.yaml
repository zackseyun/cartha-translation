id: GEN.48.12
reference: Genesis 48:12
source:
  edition: WLC
  text: וַ/יּוֹצֵ֥א יוֹסֵ֛ף אֹתָ֖/ם מֵ/עִ֣ם בִּרְכָּ֑י/ו וַ/יִּשְׁתַּ֥חוּ לְ/אַפָּ֖י/ו
    אָֽרְצָ/ה׃
translation:
  text: Then Joseph brought them out from between his knees, and he bowed with his
    face to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from beside his knees.' The Hebrew expression may describe the boys'
      close position near Jacob during the blessing scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  chosen: brought ... out
  alternatives:
  - took ... out
  - led ... out
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, the sense is causative: Joseph caused them to
    come out from their position near Jacob. ''Brought ... out'' is natural English
    and preserves the causative force without over-specifying movement.'
- source_word: אֹתָם
  chosen: them
  rationale: Direct object pronoun referring to Ephraim and Manasseh.
- source_word: מֵעִם בִּרְכָּיו
  chosen: from between his knees
  alternatives:
  - from beside his knees
  - from his knees
  lexicon: HALOT
  rationale: The idiom describes the boys' position in relation to Jacob as he blesses/adopts
    them. Although the preposition is literally 'from with/by,' in context 'from between
    his knees' best conveys the physical scene in idiomatic English and matches the
    likely sense of close placement before the patriarch.
- source_word: וַיִּשְׁתַּחוּ
  chosen: he bowed
  alternatives:
  - he prostrated himself
  - he bowed down
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שׁחה denotes bowing in reverence. 'He
    bowed' is concise and natural; the following phrase 'with his face to the ground'
    supplies the full posture.
- source_word: לְאַפָּיו
  chosen: with his face
  alternatives:
  - on his face
  - before him, face-down
  lexicon: HALOT
  rationale: Literally 'to his face(s).' In combination with אָרְצָה it expresses
    prostration with the face directed to the ground. 'With his face' yields smooth
    English when paired with 'to the ground.'
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: Directional form of 'earth/land,' here idiomatically 'to the ground'
    in a gesture of reverence.
