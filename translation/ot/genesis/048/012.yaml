theological_decisions:
- issue: Referent of the possessive in 'his knees'
  chosen_reading: Jacob's knees
  alternative_readings:
  - Joseph's knees
  rationale: In context Joseph is bringing his sons away from Jacob after Jacob has
    embraced and positioned them for blessing. The third masculine singular suffix
    most naturally refers to Jacob, the immediate elder figure receiving the gesture
    of honor. This is a contextual/pronominal decision rather than a doctrinal one.
