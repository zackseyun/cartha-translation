theological_decisions:
- issue: Use of both 'Jacob' and 'Israel' in the same verse
  chosen_reading: Preserve the name shift exactly as in Hebrew
  alternative_readings:
  - Use 'Jacob' throughout for stylistic consistency
  rationale: The alternation may carry literary or theological significance in Genesis,
    and the translation should not flatten it. Preserving the source wording maintains
    that tension without over-interpreting it.
  doctrine_reference: Translation philosophy §3, §5
