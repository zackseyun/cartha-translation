id: GEN.48.2
reference: Genesis 48:2
source:
  edition: WLC
  text: וַ/יַּגֵּ֣ד לְ/יַעֲקֹ֔ב וַ/יֹּ֕אמֶר הִנֵּ֛ה בִּנְ/ךָ֥ יוֹסֵ֖ף בָּ֣א אֵלֶ֑י/ךָ
    וַ/יִּתְחַזֵּק֙ יִשְׂרָאֵ֔ל וַ/יֵּ֖שֶׁב עַל הַ/מִּטָּֽה־׃
translation:
  text: When Jacob was told, “Look, your son Joseph has come to you,” Israel strengthened
    himself and sat up on the bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Israel strengthened himself.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: was told
  alternatives:
  - someone told
  - it was reported
  lexicon: HALOT
  rationale: The verb נגד in the Hiphil means 'tell, report, inform.' English idiom
    naturally supplies an impersonal passive here since the Hebrew leaves the subject
    unspecified.
- source_word: לְיַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: וַיֹּאמֶר
  chosen: “Look ...”
  alternatives:
  - and he said
  - saying
  lexicon: HALOT
  rationale: The speech-introducing verb is represented by direct discourse in English.
    An explicit 'and he said' is unnecessary once the passive 'was told' introduces
    the content of the report.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    force in readable modern English better than archaic 'Behold.'
- source_word: בִּנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Straightforward possessive nominal phrase.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: בָּא אֵלֶיךָ
  chosen: has come to you
  alternatives:
  - is coming to you
  - came to you
  lexicon: HALOT
  rationale: The qatal of בוא can denote completed action with present relevance in
    narrative report. 'Has come to you' fits the immediate context of Joseph's arrival
    and Jacob's response.
- source_word: וַיִּתְחַזֵּק
  chosen: strengthened himself
  alternatives:
  - gathered his strength
  - took courage
  lexicon: HALOT
  rationale: The Hitpael of חזק here conveys reflexive strengthening in response to
    weakness or illness. 'Strengthened himself' stays close to the Hebrew while remaining
    natural.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: The text intentionally shifts from 'Jacob' to 'Israel.' The translation
    preserves both names rather than harmonizing them, since the source uses each
    distinctly in this verse.
- source_word: וַיֵּשֶׁב
  chosen: sat up
  alternatives:
  - sat
  - took his seat
  lexicon: HALOT
  rationale: Although ישב basically means 'sit,' in context Jacob is ill and in bed;
    'sat up' makes explicit the movement implied by sitting on the bed without over-paraphrasing.
- source_word: עַל הַמִּטָּה
  chosen: on the bed
  alternatives:
  - upon the bed
  lexicon: HALOT
  rationale: מִטָּה is 'bed, couch.' 'On the bed' is the natural modern rendering.
