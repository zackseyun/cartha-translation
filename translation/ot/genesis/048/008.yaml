id: GEN.48.8
reference: Genesis 48:8
source:
  edition: WLC
  text: וַ/יַּ֥רְא יִשְׂרָאֵ֖ל אֶת בְּנֵ֣י יוֹסֵ֑ף וַ/יֹּ֖אמֶר מִי אֵֽלֶּה־־׃
translation:
  text: When Israel saw Joseph's sons, he said, “Who are these?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Joseph.'''
    reason: lexical_alternative
  - marker: b
    text: The text says 'Israel,' the covenant name of Jacob.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - and ... saw
  - then ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering it as 'When ...
    saw' fits natural English while preserving the temporal/sequential sense that
    introduces the following speech.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses 'Israel,' not 'Jacob.' Following original-language
    primacy, the patriarch's covenant name is retained.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: This is the direct-object marker and has no standalone English equivalent.
- source_word: בְּנֵי יוֹסֵף
  chosen: Joseph's sons
  alternatives:
  - the sons of Joseph
  lexicon: HALOT
  rationale: The construct chain literally means 'sons of Joseph.' 'Joseph's sons'
    is the most natural modern English rendering without loss of meaning.
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - and he said
  - then he said
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech. 'He said' is idiomatic
    and sufficiently reflects the Hebrew wayyiqtol sequence.
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is
  lexicon: HALOT
  rationale: Interrogative pronoun asking identity. English idiom supplies the copular
    sense in the full clause.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these ones
  lexicon: HALOT
  rationale: Demonstrative plural referring to the persons present. 'These' is the
    natural English equivalent in the question 'Who are these?'.
