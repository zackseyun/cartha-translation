id: GEN.48.1
reference: Genesis 48:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵי֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/יֹּ֣אמֶר לְ/יוֹסֵ֔ף הִנֵּ֥ה
    אָבִ֖י/ךָ חֹלֶ֑ה וַ/יִּקַּ֞ח אֶת שְׁנֵ֤י בָנָי/ו֙ עִמּ֔/וֹ אֶת מְנַשֶּׁ֖ה וְ/אֶת
    אֶפְרָֽיִם־־־׃
translation:
  text: Now after these things, someone said to Yoseph, “Look, your father is sick.”
    So he took his two sons with him, Manasseh and Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and he said to Yoseph''; the speaker is left unnamed, so the
      translation preserves the indefiniteness with ''someone said.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces a new narrative development. 'Now'
    conveys the discourse function in natural modern English without the archaic feel
    of 'it came to pass.'
- source_word: אַחֲרֵי הַדְּבָרִים הָאֵלֶּה
  chosen: after these things
  alternatives:
  - after these events
  - after these matters
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the narrative linkage to the preceding
    episode. 'Things' is broad enough to reflect דְּבָרִים here without over-specifying.
- source_word: וַיֹּאמֶר לְיוֹסֵף
  chosen: someone said to Yoseph
  alternatives:
  - it was said to Yoseph
  - he was told
  lexicon: HALOT
  rationale: The Hebrew uses an indefinite third masculine singular ('and he said
    to Joseph') without naming the speaker. English normally requires an explicit
    subject, so 'someone said' preserves the indefiniteness better than supplying
    a named speaker. 'Yoseph' transliterates the personal name in keeping with the
    stated philosophy.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is natural modern
    English and preserves the immediacy better than the archaic 'Behold.'
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct, standard rendering of the construct with second masculine singular
    suffix.
- source_word: חֹלֶה
  chosen: is sick
  alternatives:
  - is ill
  - is unwell
  lexicon: HALOT
  rationale: The participle describes Jacob's present condition. 'Is sick' is the
    most straightforward and idiomatic English equivalent.
- source_word: וַיִּקַּח
  chosen: So he took
  alternatives:
  - And he took
  - Then he took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he took' gives smooth
    English sequence while preserving the action.
- source_word: שְׁנֵי בָנָיו עִמּוֹ
  chosen: his two sons with him
  alternatives:
  - the two sons with him
  - his two sons along with him
  lexicon: HALOT
  rationale: The phrase identifies Joseph's sons accompanying him. 'His two sons with
    him' is both literal and idiomatic.
- source_word: מְנַשֶּׁה וְאֶת אֶפְרָיִם
  chosen: Manasseh and Ephraim
  lexicon: HALOT
  rationale: Standard English transliterations of the personal names; appositional
    clarification of 'his two sons.'
