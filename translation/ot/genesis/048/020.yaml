id: GEN.48.20
reference: Genesis 48:20
source:
  edition: WLC
  text: וַ/יְבָ֨רֲכֵ֜/ם בַּ/יּ֣וֹם הַ/הוּא֮ לֵ/אמוֹר֒ בְּ/ךָ֗ יְבָרֵ֤ךְ יִשְׂרָאֵל֙
    לֵ/אמֹ֔ר יְשִֽׂמְ/ךָ֣ אֱלֹהִ֔ים כְּ/אֶפְרַ֖יִם וְ/כִ/מְנַשֶּׁ֑ה וַ/יָּ֥שֶׂם אֶת
    אֶפְרַ֖יִם לִ/פְנֵ֥י מְנַשֶּֽׁה־׃
translation:
  text: So he blessed them that day, saying, “By you Israel will bless, saying, ‘May
    God make you like Ephraim and like Manasseh.’” Thus he set Ephraim before Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “In you Israel will bless,” that is, Israel will use your names as a
      formula of blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֲכֵם
  chosen: he blessed them
  alternatives:
  - he pronounced a blessing on them
  lexicon: HALOT
  rationale: Piel of ברך commonly means to bless. The direct object suffix is plural,
    referring to Ephraim and Manasseh together.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'That day' is natural English while preserving
    the temporal specificity.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with these words
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing direct speech.
- source_word: בְּךָ
  chosen: By you
  alternatives:
  - In you
  - With you
  lexicon: HALOT
  rationale: 'The preposition ב with singular pronominal suffix is best rendered here
    as instrument/reference: Israel will use Jacob''s naming formula in blessing others
    through reference to these sons. ''By you'' preserves the idiom more closely than
    a freer paraphrase.'
- source_word: יְבָרֵךְ יִשְׂרָאֵל
  chosen: Israel will bless
  alternatives:
  - Israel will pronounce blessing
  - Israel will bless others
  lexicon: HALOT
  rationale: Imperfect expresses customary/future action. 'Israel' here most naturally
    denotes the people descended from Jacob, though it can echo Jacob himself as ancestor;
    the wording preserves that corporate sense without overexplaining.
- source_word: יְשִׂמְךָ אֱלֹהִים
  chosen: May God make you
  alternatives:
  - God will make you
  - May God set you
  lexicon: HALOT
  rationale: Jussive-like wish formula in blessing context is best rendered with 'May
    God make you.' The verb שׂים literally means 'set/place/make'; in this idiom 'make
    you like' is standard and clear.
- source_word: כְּאֶפְרַיִם וְכִמְנַשֶּׁה
  chosen: like Ephraim and like Manasseh
  alternatives:
  - as Ephraim and as Manasseh
  lexicon: HALOT
  rationale: The repeated comparative כ is preserved in English for rhythm and emphasis.
- source_word: וַיָּשֶׂם אֶת אֶפְרַיִם לִפְנֵי מְנַשֶּׁה
  chosen: Thus he set Ephraim before Manasseh
  alternatives:
  - And he placed Ephraim before Manasseh
  - So he put Ephraim ahead of Manasseh
  lexicon: HALOT
  rationale: שׂים with לִפְנֵי indicates placing one before another, here signaling
    precedence in the blessing order. 'Set ... before' preserves both the literal
    image and the implied priority.
