theological_decisions:
- issue: Referent of 'Israel' in the blessing formula
  chosen_reading: Rendered as 'Israel' without expansion, allowing the term to carry
    both the ancestral and corporate-national sense.
  alternative_readings:
  - Jacob will bless
  - the people of Israel will bless
  rationale: The Hebrew simply says 'Israel.' In context Jacob is speaking prophetically
    about future Israelite usage of this blessing formula. Leaving 'Israel' untranslated
    preserves the textual ambiguity/tension rather than resolving it too narrowly.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
