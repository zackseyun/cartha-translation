- issue: Reference of אֱלֹהִים in Joseph's statement
  chosen_reading: Singular 'God' referring to the God of Israel as giver of Joseph's
    sons
  alternative_readings:
  - generic 'god/gods'
  rationale: In the patriarchal narrative and immediate context, Joseph attributes
    his sons to the covenant God. No doctrinally contested issue is being resolved
    beyond the plain contextual sense.
