id: GEN.48.9
reference: Genesis 48:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹסֵף֙ אֶל אָבִ֔י/ו בָּנַ֣/י הֵ֔ם אֲשֶׁר נָֽתַן לִ֥/י אֱלֹהִ֖ים
    בָּ/זֶ֑ה וַ/יֹּאמַ֕ר קָֽחֶ/ם נָ֥א אֵלַ֖/י וַ/אֲבָרֲכֵֽ/ם־־־־׃
translation:
  text: And Joseph said to his father, “They are my sons, whom God has given me here.”
    And he said, “Please bring them to me, and I will bless them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in this place.” The Hebrew expression can point more specifically to
      Joseph’s present location.
    reason: lexical_alternative
  - marker: b
    text: Or “Take them to me, please, that I may bless them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Rendered with simple past narrative 'said' and conjunction 'And' to reflect
    the Hebrew waw-consecutive in straightforward narrative sequence without overemphasizing
    temporal nuance.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his dad
  lexicon: HALOT
  rationale: Standard familial term; 'his father' preserves the formal narrative tone
    better than colloquial alternatives.
- source_word: בָּנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' not the more general
    'children.' This follows the gender-accurate principle.
- source_word: הֵם
  chosen: They are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Predicate construction identifying the boys. 'They are' is the most natural
    English equivalent here, though 'These are' is possible in context.
- source_word: אֲשֶׁר נָתַן לִי אֱלֹהִים
  chosen: whom God has given me
  alternatives:
  - that God gave me
  - whom God gave to me
  lexicon: HALOT
  rationale: Uses English present perfect 'has given' to convey a past act with present
    result, which reads naturally in English while preserving the sense of divine
    gift. 'Whom' fits the personal referent.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one true God in Joseph's speech,
    so 'God' is the natural singular rendering.
- source_word: בָּזֶה
  chosen: here
  alternatives:
  - in this place
  - by this
  lexicon: HALOT
  rationale: The phrase points to Joseph's present location/context in Egypt. 'Here'
    is idiomatic English and captures the deictic force without awkwardness.
- source_word: קָחֶם נָא אֵלַי
  chosen: Please bring them to me
  alternatives:
  - Take them to me, please
  - Bring them here to me, please
  lexicon: HALOT
  rationale: Though לקח often means 'take,' in this context Jacob is asking that the
    boys be brought near to him for blessing. 'Please' reflects נָא as a polite particle.
- source_word: וַאֲבָרֲכֵם
  chosen: and I will bless them
  alternatives:
  - that I may bless them
  lexicon: HALOT
  rationale: The cohortative-like sense after the request is well represented by a
    simple future in English. 'I will bless them' is direct and natural; 'that I may
    bless them' is possible but less idiomatic here.
