id: GEN.48.21
reference: Genesis 48:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִשְׂרָאֵל֙ אֶל יוֹסֵ֔ף הִנֵּ֥ה אָנֹכִ֖י מֵ֑ת וְ/הָיָ֤ה אֱלֹהִים֙
    עִמָּ/כֶ֔ם וְ/הֵשִׁ֣יב אֶתְ/כֶ֔ם אֶל אֶ֖רֶץ אֲבֹתֵי/כֶֽם־־׃
translation:
  text: Then Israel said to Joseph, “Look, I am dying, but God will be with you and
    will bring you back to the land of your fathers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and God will be with you.'' The Hebrew conjunction is simply ''and,''
      but here it likely carries a contrast: Jacob will die, yet God will remain with
      them.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew pronouns in 'with you' and 'bring you back' are plural, extending
      the promise beyond Joseph individually to his family or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'And ... said' is more formally
    literal but less idiomatic.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses the covenant name 'Israel,' so the translation preserves
    the named form rather than harmonizing to 'Jacob'.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' is readable modern
    English and preserves the deictic force better than archaic 'Behold.'
- source_word: אָנֹכִי מֵת
  chosen: I am dying
  alternatives:
  - I am about to die
  - I am dead
  lexicon: HALOT
  rationale: The participial expression with מוּת here refers to imminent death, not
    completed death. 'I am dying' is idiomatic and contextually appropriate. 'I am
    dead' would be misleadingly literal in English.
- source_word: וְהָיָה אֱלֹהִים עִמָּכֶם
  chosen: but God will be with you
  alternatives:
  - and God will be with you
  lexicon: HALOT
  rationale: The clause is formally conjunctive, but in context it contrasts Jacob's
    impending death with God's continuing presence. Rendering waw as 'but' brings
    out the discourse contrast without adding content beyond the context.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for the singular referent here; the verb forms and
    context indicate the one God of Israel.
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - with all of you
  lexicon: HALOT
  rationale: The suffix is plural, referring beyond Joseph individually to his family/descendants.
    English 'you' can naturally carry the plural here; the broader referent is preserved
    in the decision record.
- source_word: וְהֵשִׁיב אֶתְכֶם
  chosen: will bring you back
  alternatives:
  - will return you
  - will restore you
  lexicon: HALOT
  rationale: 'Hiphil of שוב here is causative: God will cause them to return. ''Bring
    you back'' is natural English and preserves the causative sense better than the
    less idiomatic ''return you.'''
- source_word: אֶל אֶרֶץ אֲבֹתֵיכֶם
  chosen: to the land of your fathers
  alternatives:
  - to your fathers' land
  - to the land of your ancestors
  lexicon: HALOT
  rationale: This phrase points to the ancestral land promised to the patriarchs.
    'Land of your fathers' is closer to the Hebrew wording; 'ancestors' is possible
    but less gender-accurate than the source wording.
