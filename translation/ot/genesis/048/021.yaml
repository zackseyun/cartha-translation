theological_decisions:
- issue: Referent of the plural pronouns in Jacob's promise
  chosen_reading: Retain the plural 'you' and translate the promise as extending beyond
    Joseph to his descendants/household.
  alternative_readings:
  - Treat the plural as a generalized address to Joseph alone in idiomatic English
  rationale: The Hebrew suffixes are plural throughout the latter clauses. Preserving
    the plural respects the source text and the covenantal horizon of return to the
    ancestral land.
  doctrine_reference: Translation philosophy §4, §5
- issue: Discourse force of waw before 'God will be with you'
  chosen_reading: Render as adversative 'but' in English.
  alternative_readings:
  - Render as simple connective 'and'
  rationale: 'Although waw is formally ''and,'' the sense is contrastive: Jacob is
    dying, but God remains with them. This is an optimal-equivalence decision for
    clear English discourse flow, not a theological alteration.'
  doctrine_reference: 'Translation philosophy: optimal equivalence'
