id: GEN.48.6
reference: Genesis 48:6
source:
  edition: WLC
  text: וּ/מוֹלַדְתְּ/ךָ֛ אֲשֶׁר הוֹלַ֥דְתָּ אַחֲרֵי/הֶ֖ם לְ/ךָ֣ יִהְי֑וּ עַ֣ל שֵׁ֧ם
    אֲחֵי/הֶ֛ם יִקָּרְא֖וּ בְּ/נַחֲלָתָֽ/ם־׃
translation:
  text: But your offspring whom you father after them will be yours; they will be
    called by the name of their brothers in their inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your children whom you beget after them.'
    reason: lexical_alternative
  - marker: b
    text: That is, they would not receive separate tribal inheritances but would be
      counted under Ephraim and Manasseh.
    reason: cross_reference
lexical_decisions:
- source_word: וּמוֹלַדְתְּךָ
  chosen: your offspring
  alternatives:
  - your children
  - your descendants
  - what is born to you
  lexicon: HALOT
  rationale: The noun מוֹלֶדֶת/מוֹלַדְתְּךָ refers to what is begotten/born to someone.
    'Offspring' is natural English and broad enough to cover children born later without
    over-specifying age or remoteness.
- source_word: הוֹלַדְתָּ
  chosen: you father
  alternatives:
  - you have begotten
  - you have borne
  lexicon: HALOT
  rationale: From ילד in the Hiphil, here addressed to Joseph, it denotes causing
    to be born, i.e., begetting/fathering. 'You father' is idiomatic and preserves
    the paternal perspective better than 'you have borne.'
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - after these
  - afterward
  lexicon: HALOT
  rationale: Refers to children born after Ephraim and Manasseh. 'After them' is the
    most direct contextual rendering.
- source_word: לְךָ יִהְיוּ
  chosen: will be yours
  alternatives:
  - shall belong to you
  - will remain yours
  lexicon: HALOT
  rationale: This expresses legal/familial belonging in contrast to Ephraim and Manasseh
    being reckoned as Jacob's. 'Will be yours' is concise and clear.
- source_word: עַל שֵׁם אֲחֵיהֶם
  chosen: by the name of their brothers
  alternatives:
  - under the name of their brothers
  - according to the name of their brothers
  lexicon: HALOT
  rationale: The phrase indicates that these later offspring will be reckoned under
    the tribal identity/name of Ephraim and Manasseh rather than receiving separate
    tribal status. 'By the name of their brothers' preserves the naming/register sense.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kin
  - their brothers Ephraim and Manasseh
  lexicon: HALOT
  rationale: The Hebrew is literally 'their brothers.' Although the referents are
    Ephraim and Manasseh, the literal familial term should be retained in the main
    text.
- source_word: יִקָּרְאוּ
  chosen: they will be called
  alternatives:
  - they will be named
  - they will be reckoned
  lexicon: HALOT
  rationale: Niphal of קרא commonly means 'be called/named.' In this inheritance context
    it also carries the sense of being reckoned under a name, but 'called' keeps the
    lexical link while remaining understandable.
- source_word: בְּנַחֲלָתָם
  chosen: in their inheritance
  alternatives:
  - in their allotment
  - with respect to their inheritance
  lexicon: HALOT
  rationale: נַחֲלָה denotes inherited property/allotment. 'In their inheritance'
    is a close rendering and fits the tribal-allotment context.
