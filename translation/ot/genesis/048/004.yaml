id: GEN.48.4
reference: Genesis 48:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י הִנְ/נִ֤י מַפְרְ/ךָ֙ וְ/הִרְבִּיתִ֔/ךָ וּ/נְתַתִּ֖י/ךָ
    לִ/קְהַ֣ל עַמִּ֑ים וְ/נָ֨תַתִּ֜י אֶת הָ/אָ֧רֶץ הַ/זֹּ֛את לְ/זַרְעֲ/ךָ֥ אַחֲרֶ֖י/ךָ
    אֲחֻזַּ֥ת עוֹלָֽם־׃
translation:
  text: And he said to me, ‘Look, I will make you fruitful and multiply you, and I
    will make you into an assembly of peoples, and I will give this land to your offspring
    after you as an everlasting possession.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a company of peoples.' The Hebrew phrase can denote a gathered collective
      made up of multiple peoples or groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - and he told me
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר with indirect object; 'said to me'
    is the natural English rendering and preserves the direct recollection format.
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - behold
  - here I am
  - see
  lexicon: HALOT
  rationale: Introduces a solemn divine declaration. 'Look' preserves the attention-getting
    force in readable modern English better than archaic 'behold.'
- source_word: מַפְרְךָ
  chosen: I will make you fruitful
  alternatives:
  - I am making you fruitful
  - I will cause you to be fruitful
  lexicon: HALOT
  rationale: From פרה in a causative participial form with first-person pronoun contextually
    expressing divine promise. 'Make you fruitful' is idiomatic and preserves the
    causative sense.
- source_word: וְהִרְבִּיתִךָ
  chosen: and multiply you
  alternatives:
  - and make you numerous
  - and increase you
  lexicon: HALOT
  rationale: From רבה in the Hiphil, continuing the promise formula. 'Multiply you'
    echoes covenant/patriarchal language in Genesis and pairs naturally with 'make
    you fruitful.'
- source_word: וּנְתַתִּיךָ לִקְהַל עַמִּים
  chosen: and I will make you into an assembly of peoples
  alternatives:
  - and I will make you a company of peoples
  - and I will set you as a congregation of peoples
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' the idiom 'give someone for/as' can
    mean appoint or constitute. Here the sense is not handing Jacob over but making
    him into a collective people-group reality. 'Assembly of peoples' renders קהל
    with a concrete collective nuance while avoiding overly ecclesial overtones of
    'congregation.'
- source_word: קְהַל עַמִּים
  chosen: assembly of peoples
  alternatives:
  - company of peoples
  - community of peoples
  lexicon: HALOT
  rationale: קהל denotes an assembled group; עמים is plural 'peoples.' The phrase
    points to a plurality emerging from Jacob, likely tribes/nations. 'Assembly of
    peoples' is transparent and suitably formal.
- source_word: וְנָתַתִּי אֶת הָאָרֶץ הַזֹּאת
  chosen: and I will give this land
  alternatives:
  - and I will grant this land
  lexicon: HALOT
  rationale: Straightforward covenantal gift language. 'Give this land' preserves
    the simplicity and covenant resonance of the Hebrew.
- source_word: לְזַרְעֲךָ אַחֲרֶיךָ
  chosen: to your offspring after you
  alternatives:
  - to your seed after you
  - to your descendants after you
  lexicon: HALOT
  rationale: זרע is a collective singular. 'Offspring' preserves the singular collective
    better than 'descendants' while remaining natural English. 'After you' keeps the
    temporal/genealogical sequence explicit.
- source_word: אֲחֻזַּת עוֹלָם
  chosen: as an everlasting possession
  alternatives:
  - for an everlasting possession
  - as a permanent holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes landed property/possession; עוֹלָם here carries enduring,
    perpetual covenantal force. 'Everlasting possession' is the established and accurate
    sense in this context.
