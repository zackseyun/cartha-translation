theological_decisions:
- issue: Rendering covenant land-promise language without over-interpreting its later
    theological implications
  chosen_reading: Retain the concrete promise of land to Jacob's offspring as 'this
    land ... as an everlasting possession'
  alternative_readings:
  - paraphrasing toward merely symbolic inheritance
  - softening 'everlasting' to 'long-lasting'
  rationale: The Hebrew explicitly speaks of the land and uses enduring-possession
    language. The translation should preserve that covenantal concreteness and temporal
    force without importing later doctrinal systems or reducing the promise to metaphor.
  doctrine_reference: Translation philosophy §§1, 3, 5
