id: GEN.48.7
reference: Genesis 48:7
source:
  edition: WLC
  text: וַ/אֲנִ֣י בְּ/בֹאִ֣/י מִ/פַּדָּ֗ן מֵ֩תָה֩ עָלַ֨/י רָחֵ֜ל בְּ/אֶ֤רֶץ כְּנַ֨עַן֙
    בַּ/דֶּ֔רֶךְ בְּ/ע֥וֹד כִּבְרַת אֶ֖רֶץ לָ/בֹ֣א אֶפְרָ֑תָה וָ/אֶקְבְּרֶ֤/הָ שָּׁם֙
    בְּ/דֶ֣רֶךְ אֶפְרָ֔ת הִ֖וא בֵּ֥ית לָֽחֶם׀־׃
translation:
  text: As for me, when I came from Paddan, Rachel died beside me in the land of Canaan
    on the way, while there was still some distance to go to Ephrath; and I buried
    her there on the way to Ephrath (that is, Bethlehem).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Paddan'; many English versions expand this to 'Paddan-aram' from
      related passages, but the Hebrew here has only 'Paddan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Rachel died upon me,' a Hebrew idiom that may emphasize either her dying
      near Jacob or the personal weight of her death on him.
    reason: lexical_alternative
  - marker: c
    text: The expression 'some distance' renders a Hebrew idiom for a remaining stretch
      of land; the exact distance is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲנִי
  chosen: As for me
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a topical shift and personal
    recollection by Jacob. 'As for me' brings out the contrastive/emphatic force more
    naturally than a bare 'and I.'
- source_word: בְּבֹאִי
  chosen: when I came
  alternatives:
  - in my coming
  - as I was coming
  lexicon: HALOT
  rationale: The infinitive construct with 1cs suffix after ב conveys a temporal sense.
    'When I came' is idiomatic English and preserves the temporal relation.
- source_word: מִפַּדָּן
  chosen: from Paddan
  alternatives:
  - from Paddan-aram
  lexicon: HALOT
  rationale: The Hebrew here reads simply 'Paddan,' not the fuller 'Paddan-aram.'
    The translation follows the source text directly rather than harmonizing to more
    familiar traditional forms.
- source_word: מֵתָה עָלַי
  chosen: died beside me
  alternatives:
  - died on me
  - died to my sorrow
  - died near me
  lexicon: HALOT
  rationale: The idiom literally reads 'died upon me.' In context it expresses Rachel's
    death occurring upon/near Jacob in a way that conveys personal impact. 'Died beside
    me' preserves the spatial-personal sense without over-interpreting it as purely
    emotional.
- source_word: בְּאֶרֶץ כְּנַעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The fuller phrase is retained because 'land of Canaan' reflects the Hebrew
    wording and maintains the narrative geography.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: HALOT
  rationale: A straightforward rendering of דרך in travel context. 'On the way' is
    natural and suitably formal.
- source_word: בְּעוֹד כִּבְרַת אֶרֶץ לָבֹא אֶפְרָתָה
  chosen: while there was still some distance to go to Ephrath
  alternatives:
  - when there was still a stretch of land to come to Ephrath
  - while there was still a little way to Ephrath
  lexicon: HALOT
  rationale: כברת ארץ is an idiom for a certain remaining distance. Because the exact
    measure is uncertain, 'some distance' communicates the sense without false precision.
    The clause is temporal/circumstantial, hence 'while there was still...'.
- source_word: וָאֶקְבְּרֶהָ
  chosen: and I buried her
  alternatives:
  - so I buried her
  lexicon: HALOT
  rationale: Simple waw-consecutive narrative sequence. 'And I buried her' preserves
    the flow and Jacob's personal action.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb retained plainly.
- source_word: בְּדֶרֶךְ אֶפְרָת
  chosen: on the way to Ephrath
  alternatives:
  - on the road to Ephrath
  - by the way of Ephrath
  lexicon: HALOT
  rationale: The construct phrase identifies the route/location relative to Ephrath.
    'On the way to Ephrath' is the clearest idiomatic English rendering.
- source_word: הִוא בֵּית לָחֶם
  chosen: that is, Bethlehem
  alternatives:
  - which is Bethlehem
  lexicon: HALOT
  rationale: The appositional clarification identifies Ephrath with Bethlehem for
    the reader. 'That is' is idiomatic modern English for this explanatory note.
