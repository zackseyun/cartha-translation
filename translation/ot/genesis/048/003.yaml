id: GEN.48.3
reference: Genesis 48:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יַעֲקֹב֙ אֶל יוֹסֵ֔ף אֵ֥ל שַׁדַּ֛י נִרְאָֽה אֵלַ֥/י בְּ/ל֖וּז
    בְּ/אֶ֣רֶץ כְּנָ֑עַן וַ/יְבָ֖רֶךְ אֹתִֽ/י־־׃
translation:
  text: And Jacob said to Joseph, “God Almighty appeared to me at Luz in the land
    of Canaan and blessed me,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “El Shaddai.” Traditionally rendered “God Almighty”; the exact
      nuance of Shaddai is debated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next event in narrative sequence.
    'And ... said' preserves the Hebrew narrative flow without overinterpreting temporal
    nuance.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is natural modern English and
    fully adequate.
- source_word: אֵל שַׁדַּי
  chosen: God Almighty
  alternatives:
  - El Shaddai
  - Mighty God
  lexicon: HALOT
  rationale: The phrase is a divine title, not a personal name, so it is translated
    rather than transliterated in keeping with the project's philosophy. 'God Almighty'
    is the established and contextually fitting rendering for אֵל שַׁדַּי, while 'El
    Shaddai' is preserved as an alternative in a footnote because of ongoing lexical
    discussion around שַׁדַּי.
- source_word: נִרְאָה
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here expresses visible manifestation. 'Appeared' is
    idiomatic and preserves the event of divine self-manifestation without adding
    reflexive wording not explicit in the Hebrew.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: The preposition with first-person suffix indicates the direction of the
    appearance toward Jacob; 'to me' is the normal English equivalent.
- source_word: בְּלוּז
  chosen: at Luz
  alternatives:
  - in Luz
  lexicon: HALOT
  rationale: For a named location where the appearance occurred, 'at Luz' reads naturally
    in English and fits the eventive context.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The construct phrase explicitly includes 'land,' which is worth preserving
    for geographic specificity and rhythm.
- source_word: וַיְבָרֶךְ אֹתִי
  chosen: and blessed me
  alternatives:
  - and he blessed me
  lexicon: HALOT
  rationale: The verb continues the same divine subject. English does not require
    the explicit pronoun, and omitting it keeps the sentence natural while preserving
    the action.
