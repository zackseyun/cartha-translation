theological_decisions:
- issue: Rendering the divine title אֵל שַׁדַּי
  chosen_reading: God Almighty
  alternative_readings:
  - El Shaddai
  - Mighty God
  rationale: The translation philosophy directs titles to be translated rather than
    transliterated. 'God Almighty' communicates the title's sense in standard English
    while avoiding unnecessary opacity. Because the precise nuance of שַׁדַּי is debated,
    a transliterated alternative is preserved in a footnote rather than elevated to
    the main text.
  doctrine_reference: Translation philosophy §2; Preserve theological tension where
    ambiguity is genuine (§3)
