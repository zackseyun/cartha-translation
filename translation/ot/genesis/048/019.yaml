theological_decisions:
- issue: Rendering of מְלֹא הַגּוֹיִם
  chosen_reading: a fullness of nations
  alternative_readings:
  - the fullness of the nations
  - a multitude of nations
  rationale: This phrase has possible intertextual/theological resonance, especially
    in later readings, but in Genesis the immediate sense concerns Ephraim's descendants
    becoming so numerous and influential that they amount to a fullness among the
    nations. The main text preserves the Hebrew noun 'fullness' rather than resolving
    it into the more interpretive 'multitude.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
