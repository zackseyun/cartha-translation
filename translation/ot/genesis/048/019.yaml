id: GEN.48.19
reference: Genesis 48:19
source:
  edition: WLC
  text: וַ/יְמָאֵ֣ן אָבִ֗י/ו וַ/יֹּ֨אמֶר֙ יָדַ֤עְתִּֽי בְנִ/י֙ יָדַ֔עְתִּי גַּם ה֥וּא
    יִֽהְיֶה לְּ/עָ֖ם וְ/גַם ה֣וּא יִגְדָּ֑ל וְ/אוּלָ֗ם אָחִ֤י/ו הַ/קָּטֹן֙ יִגְדַּ֣ל
    מִמֶּ֔/נּוּ וְ/זַרְע֖/וֹ יִהְיֶ֥ה מְלֹֽא הַ/גּוֹיִֽם־־־־׃
translation:
  text: But his father refused and said, “I know, my son, I know. He too will become
    a people, and he too will become great. Nevertheless, his younger brother will
    become greater than he, and his offspring will become a fullness of nations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a multitude of nations.” The Hebrew more literally reads “a fullness
      of nations.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן
  chosen: refused
  alternatives:
  - declined
  lexicon: HALOT
  rationale: The verb מאן denotes refusal rather than mere hesitation. 'Refused' fits
    Jacob's deliberate rejection of Joseph's attempted hand-switching in context.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward relational noun with 3ms suffix, referring to Jacob as
    Joseph's father.
- source_word: יָדַעְתִּי ... יָדַעְתִּי
  chosen: I know, my son, I know
  alternatives:
  - I know it, my son, I know it
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved. English idiom works
    naturally without supplying an object, though 'it' is implied.
- source_word: בְנִי
  chosen: my son
  lexicon: HALOT
  rationale: Direct address to Joseph; possessive retained.
- source_word: גַּם הוּא יִהְיֶה לְעָם
  chosen: He too will become a people
  alternatives:
  - He also will become a people
  - He too will become a nation
  lexicon: HALOT
  rationale: עָם most basically means 'people.' Although 'nation' is possible in English,
    'people' better reflects the Hebrew term here and preserves the collective sense.
- source_word: וְגַם הוּא יִגְדָּל
  chosen: and he too will become great
  alternatives:
  - and he too will be great
  lexicon: HALOT
  rationale: גדל in this context expresses becoming great in status or prominence.
    'Become great' mirrors the developmental/future nuance.
- source_word: וְאוּלָם
  chosen: Nevertheless
  alternatives:
  - However
  - But
  lexicon: HALOT
  rationale: Marks a strong contrast between Manasseh's future significance and Ephraim's
    greater prominence.
- source_word: אָחִיו הַקָּטֹן
  chosen: his younger brother
  alternatives:
  - his little brother
  - his smaller brother
  lexicon: HALOT
  rationale: הַקָּטֹן here is comparative in family order, so 'younger' is the natural
    English rendering.
- source_word: יִגְדַּל מִמֶּנּוּ
  chosen: will become greater than he
  alternatives:
  - will be greater than he
  - will become greater than him
  lexicon: HALOT
  rationale: Comparative מן indicates superiority over Manasseh. 'Than he' is slightly
    more formal but clear; 'become greater' keeps verbal consistency with earlier
    יגדל.
- source_word: וְזַרְעוֹ
  chosen: and his offspring
  alternatives:
  - and his seed
  - and his descendants
  lexicon: HALOT
  rationale: '''Offspring'' is a readable modern rendering of זרע that preserves collective
    singular force better than the archaic ''seed''.'
- source_word: יִהְיֶה מְלֹא הַגּוֹיִם
  chosen: will become a fullness of nations
  alternatives:
  - will become the fullness of the nations
  - will become a multitude of nations
  lexicon: HALOT
  rationale: מְלֹא is literally 'fullness/full amount of.' The phrase is somewhat
    idiomatic and should not be flattened too far. 'A fullness of nations' preserves
    the lexical sense while remaining intelligible. 'Multitude of nations' is interpretive
    and common in tradition, but less literal.
