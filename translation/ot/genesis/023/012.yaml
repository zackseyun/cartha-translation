id: GEN.23.12
reference: Genesis 23:12
source:
  edition: WLC
  text: וַ/יִּשְׁתַּ֨חוּ֙ אַבְרָהָ֔ם לִ/פְנֵ֖י עַ֥ם הָ/אָֽרֶץ׃
translation:
  text: Then Abraham bowed down before the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'prostrated himself before the people of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  - worshiped
  lexicon: HALOT
  rationale: The Hishtaphel form of שׁחה commonly denotes bowing oneself down in reverence
    or deference. In this social-negotiation context with the Hittites, 'bowed down'
    best captures the physical gesture of respect without implying divine worship.
    'Prostrated himself' is possible but slightly more specific and heavier than the
    context requires; 'worshiped' would mislead in English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' or 'in the
    presence of.' 'Before' is concise, natural English and preserves the relational
    sense.
- source_word: עַם
  chosen: people
  alternatives:
  - folk
  - assembly
  lexicon: HALOT
  rationale: עַם here refers to the local populace as a social body witnessing the
    transaction. 'People' is the most natural and contextually accurate rendering.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In the phrase עַם הָאָרֶץ, 'the land' is the standard and sufficiently
    literal rendering, referring to the inhabitants of the region/local land. 'Country'
    is possible but less idiomatic here.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: Hebrew grammar
  rationale: The prefixed waw on the wayyiqtol advances the narrative. 'Then' communicates
    sequential movement in readable modern English better than a mechanically repeated
    'And,' while remaining faithful to the discourse function.
- source_word: אַבְרָהָם
  chosen: Abraham
  lexicon: Proper name
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
