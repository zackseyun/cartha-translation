id: GEN.23.3
reference: Genesis 23:3
source:
  edition: WLC
  text: וַ/יָּ֨קָם֙ אַבְרָהָ֔ם מֵ/עַ֖ל פְּנֵ֣י מֵת֑/וֹ וַ/יְדַבֵּ֥ר אֶל בְּנֵי חֵ֖ת
    לֵ/אמֹֽר־־׃
translation:
  text: Then Abraham rose from before his dead and spoke to the sons of Heth, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Hittites'; Hebrew 'the sons of Heth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then ... rose
  alternatives:
  - And ... rose
  - got up
  lexicon: HALOT
  rationale: Wayyiqtol of קום advances the narrative. 'Then ... rose' gives natural
    English narrative sequence while preserving the action of standing up/rising.
- source_word: מֵעַל פְּנֵי
  chosen: from before
  alternatives:
  - from beside
  - from over
  lexicon: HALOT
  rationale: The idiom literally combines 'from upon' with 'face/presence' and commonly
    means 'from before' or 'from the presence of.' Here it describes Abraham moving
    away from the immediate presence of the body.
- source_word: מֵתוֹ
  chosen: his dead
  alternatives:
  - his dead one
  - his deceased wife
  lexicon: HALOT
  rationale: The Hebrew is literally 'his dead' with a 3ms suffix. Although the referent
    is Sarah, the text does not repeat her name here. 'His dead' preserves the starkness
    and compactness of the Hebrew better than the more interpretive 'his deceased
    wife.'
- source_word: וַיְדַבֵּר
  chosen: and spoke
  alternatives:
  - and said
  - and addressed
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to.' Since לֵאמֹר follows, 'spoke
    ... saying' reflects the Hebrew discourse pattern more closely than collapsing
    both into a single 'said.'
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: Standard directional marker with דבר, indicating the addressees of Abraham's
    speech.
- source_word: בְּנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  - the descendants of Heth
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'sons of Heth.' Because the translation
    philosophy prefers original-language primacy and names are transliterated, the
    more literal rendering is retained here rather than the ethnonym 'Hittites,' though
    that is the conventional identification.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'and said:'
  lexicon: HALOT
  rationale: This infinitive introduces the content of speech in the next verse. 'Saying,'
    preserves the formal linkage to what follows.
