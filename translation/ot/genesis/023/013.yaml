id: GEN.23.13
reference: Genesis 23:13
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר אֶל עֶפְר֜וֹן בְּ/אָזְנֵ֤י עַם הָ/אָ֨רֶץ֙ לֵ/אמֹ֔ר אַ֛ךְ אִם
    אַתָּ֥ה ל֖וּ שְׁמָעֵ֑/נִי נָתַ֜תִּי כֶּ֤סֶף הַ/שָּׂדֶה֙ קַ֣ח מִמֶּ֔/נִּי וְ/אֶקְבְּרָ֥ה
    אֶת מֵתִ֖/י שָֽׁמָּ/ה־־־־׃
translation:
  text: 'And he spoke to Ephron in the hearing of the people of the land, saying,
    “If only you would hear me: I have given the silver for the field; take it from
    me, so that I may bury my dead there.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “If only you would listen to me.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “I have given the silver for the field,” with the perfect likely
      expressing a formal or performative offer in the negotiation; alternatively,
      “I will give the silver for the field.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And he spoke
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: דבר commonly denotes speaking, often with a slightly more formal sense
    than אמר. 'Spoke' preserves the narrative flow and the direct-address setting.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: HALOT
  rationale: The idiom literally involves 'ears,' but in English 'in the hearing of'
    naturally conveys public audibility without wooden literalism.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the local people
  lexicon: HALOT
  rationale: A fairly formal expression for the local populace/community. 'People
    of the land' preserves the Hebrew phrasing and social-legal setting better than
    a looser paraphrase.
- source_word: אַךְ אִם אַתָּה לוּ שְׁמָעֵנִי
  chosen: If only you would hear me
  alternatives:
  - But if you will, please hear me
  - If only you would listen to me
  lexicon: HALOT
  rationale: This cluster is idiomatic and somewhat elliptical. 'If only you would
    hear me' captures the polite entreaty force of לוּ with the imperative/volitive
    sense of שׁמע. 'Hear' is retained rather than 'listen' to stay closer to the Hebrew
    while remaining natural.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I will give
  - I have paid
  lexicon: HALOT
  rationale: The perfect can function performatively in transactional speech. 'I have
    given' reflects the Hebrew form and the sense of a settled offer/payment in the
    negotiation. 'Have paid' is interpretive and therefore avoided in the main text.
- source_word: כֶּסֶף הַשָּׂדֶה
  chosen: the silver for the field
  alternatives:
  - the money for the field
  - the price of the field
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver,' often functioning as money. 'Silver' preserves
    the concrete economic language of the text; 'for the field' expresses the genitival
    relationship idiomatically.
- source_word: קַח מִמֶּנִּי
  chosen: take it from me
  alternatives:
  - accept it from me
  - take from me
  lexicon: HALOT
  rationale: The object 'it' is implicit from context (the silver). Supplying it is
    natural English and clarifies the transaction. 'Accept it from me' is possible
    but slightly more interpretive than the simple verb 'take.'
- source_word: וְאֶקְבְּרָה
  chosen: so that I may bury
  alternatives:
  - and I will bury
  - that I may bury
  lexicon: HALOT
  rationale: The cohortative expresses Abraham's intended purpose/result in the transaction.
    'So that I may bury' makes the volitional nuance clear in natural English.
- source_word: מֵתִי
  chosen: my dead
  alternatives:
  - my dead one
  - my deceased wife
  lexicon: HALOT
  rationale: The Hebrew is literally 'my dead,' a common idiom for a deceased family
    member. 'My dead' preserves the source wording and solemn tone without importing
    the specific referent into the translation, though context identifies Sarah.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: A straightforward locative adverb; 'there' is the natural equivalent.
