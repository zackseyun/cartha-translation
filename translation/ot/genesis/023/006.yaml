id: GEN.23.6
reference: Genesis 23:6
source:
  edition: WLC
  text: שְׁמָעֵ֣/נוּ אֲדֹנִ֗/י נְשִׂ֨יא אֱלֹהִ֤ים אַתָּה֙ בְּ/תוֹכֵ֔/נוּ בְּ/מִבְחַ֣ר
    קְבָרֵ֔י/נוּ קְבֹ֖ר אֶת מֵתֶ֑/ךָ אִ֣ישׁ מִמֶּ֔/נּוּ אֶת קִבְר֛/וֹ לֹֽא יִכְלֶ֥ה
    מִמְּ/ךָ֖ מִ/קְּבֹ֥ר מֵתֶֽ/ךָ׀־־־׃
translation:
  text: 'Hear us, my lord: you are a prince of God among us. Bury your dead in the
    choicest of our tombs. None of us will withhold his tomb from you, from burying
    your dead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a mighty prince among us.' The Hebrew phrase 'prince of God' can function
      idiomatically as a superlative.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָעֵנוּ
  chosen: Hear us
  alternatives:
  - Listen to us
  lexicon: HALOT
  rationale: Imperative of שׁמע with 1cp suffix; 'Hear us' is a natural direct appeal
    in English and preserves the formal address.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: A respectful form of address to Abraham. 'My lord' preserves the social
    deference of the Hebrew better than the flatter 'sir.'
- source_word: נְשִׂיא אֱלֹהִים
  chosen: a prince of God
  alternatives:
  - a mighty prince
  - a prince favored by God
  lexicon: HALOT
  rationale: Construct phrase literally 'prince of God.' In Hebrew this can function
    as a superlative or denote one marked by God. The main text keeps the source-oriented
    expression rather than collapsing it into the interpretive 'mighty prince'; the
    idiomatic alternative is preserved in a footnote.
- source_word: בְּתוֹכֵנוּ
  chosen: among us
  alternatives:
  - in our midst
  lexicon: HALOT
  rationale: Both are possible; 'among us' is smoother modern English while preserving
    the communal setting.
- source_word: בְּמִבְחַר קְבָרֵינוּ
  chosen: in the choicest of our tombs
  alternatives:
  - in the best of our graves
  - in our finest burial places
  lexicon: HALOT
  rationale: מבחר denotes choice/best quality. 'Choicest' preserves the elevated,
    courteous offer. 'Tombs' fits the burial context better than the more generic
    'graves' in this negotiation over burial sites.
- source_word: קְבֹר אֶת־מֵתֶךָ
  chosen: Bury your dead
  alternatives:
  - Bury your deceased
  lexicon: HALOT
  rationale: Direct imperative plus object; 'your dead' is the most natural and sufficiently
    literal rendering.
- source_word: אִישׁ מִמֶּנּוּ
  chosen: None of us
  alternatives:
  - No man among us
  - Each man of us
  lexicon: HALOT
  rationale: Though literally 'a man from us,' in this negated distributive construction
    it means 'not one of us.' This communicates the collective assurance clearly in
    English.
- source_word: אֶת־קִבְרוֹ
  chosen: his tomb
  alternatives:
  - his grave
  - his burial place
  lexicon: HALOT
  rationale: Singular possessive referring distributively to each Hittite's burial
    site. 'Tomb' maintains consistency with earlier 'tombs' and suits the context.
- source_word: לֹא יִכְלֶה מִמְּךָ
  chosen: will withhold from you
  alternatives:
  - will refuse you
  - will keep back from you
  lexicon: HALOT
  rationale: כלה here carries the sense of holding back/refusing. 'Withhold from you'
    best captures the nuance in the burial-rights context.
- source_word: מִקְּבֹר מֵתֶךָ
  chosen: from burying your dead
  alternatives:
  - so that you may not bury your dead
  - for burying your dead
  lexicon: HALOT
  rationale: 'The preposition מן with infinitive expresses prevention: no one will
    withhold his tomb from Abraham so as to prevent him from burying his dead. The
    English keeps that force explicitly.'
