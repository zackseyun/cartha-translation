id: GEN.23.19
reference: Genesis 23:19
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵן֩ קָבַ֨ר אַבְרָהָ֜ם אֶת שָׂרָ֣ה אִשְׁתּ֗/וֹ אֶל מְעָרַ֞ת שְׂדֵ֧ה
    הַ/מַּכְפֵּלָ֛ה עַל פְּנֵ֥י מַמְרֵ֖א הִ֣וא חֶבְר֑וֹן בְּ/אֶ֖רֶץ כְּנָֽעַן־־־־׃
translation:
  text: After this, Abraham buried Sarah his wife in the cave of the field of Machpelah,
    facing Mamre (that is, Hebron), in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite Mamre.' The Hebrew expression denotes a location before or
      facing Mamre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And after this
  - After these things
  lexicon: HALOT
  rationale: The phrase is a common temporal transition meaning 'after this/afterward.'
    'After this' is natural modern English and preserves the narrative sequence without
    adding specificity not present in the Hebrew.
- source_word: קָבַר
  chosen: buried
  alternatives:
  - interred
  lexicon: HALOT
  rationale: The qal verb plainly means 'bury.' 'Buried' is the standard, clear English
    equivalent and fits the narrative register.
- source_word: אֶת שָׂרָה אִשְׁתּוֹ
  chosen: Sarah his wife
  alternatives:
  - his wife Sarah
  lexicon: HALOT
  rationale: Both English orders are possible. 'Sarah his wife' follows the Hebrew
    order more closely while remaining idiomatic.
- source_word: אֶל
  chosen: in
  alternatives:
  - to
  - into
  lexicon: HALOT
  rationale: 'Although the preposition is literally ''to/into,'' with burial and a
    location noun in English the idiomatic sense is expressed by ''in'': Abraham buried
    her in the cave. This is an optimal-equivalence adjustment for natural English.'
- source_word: מְעָרַת שְׂדֵה הַמַּכְפֵּלָה
  chosen: the cave of the field of Machpelah
  alternatives:
  - the cave in the field of Machpelah
  - the cave of Machpelah's field
  lexicon: HALOT
  rationale: The construct chain is preserved most transparently as 'the cave of the
    field of Machpelah.' This keeps the Hebrew relationship between cave and field
    without over-paraphrasing.
- source_word: הַמַּכְפֵּלָה
  chosen: Machpelah
  alternatives:
  - the Machpelah
  lexicon: HALOT
  rationale: As a place name, it is best transliterated per translation philosophy.
    The article in Hebrew is naturally absorbed in English place-name usage rather
    than rendered woodenly.
- source_word: עַל פְּנֵי מַמְרֵא
  chosen: facing Mamre
  alternatives:
  - opposite Mamre
  - before Mamre
  - east of Mamre
  lexicon: HALOT
  rationale: The expression commonly denotes a location in front of or opposite another
    place. 'Facing Mamre' is concise and natural, preserving the spatial relation
    without importing a more specific directional sense such as 'east of.'
- source_word: הִוא חֶבְרוֹן
  chosen: that is, Hebron
  alternatives:
  - which is Hebron
  - the same is Hebron
  lexicon: HALOT
  rationale: The pronoun plus place name identifies Mamre with Hebron. 'That is, Hebron'
    is idiomatic modern English for an appositional clarification.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'in the land of Canaan,' and retaining 'land'
    preserves the formal geographic expression used in Genesis.
