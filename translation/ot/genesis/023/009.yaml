  from: his field. For the full price in silver, let him give it to me
  to: his field; for the full price in silver, let him give it to me
  rationale: The Hebrew verse constitutes a single, continuous request. The draft's use of a full stop breaks this into two sentences, which feels slightly disjointed, particularly with the repetition of 'let him give'. A semicolon would better connect these closely related clauses, preserving the unity of Abraham's request while maintaining the emphasis on the 'full price'.
