id: GEN.23.9
reference: Genesis 23:9
source:
  edition: WLC
  text: וְ/יִתֶּן לִ֗/י אֶת מְעָרַ֤ת הַ/מַּכְפֵּלָה֙ אֲשֶׁר ל֔/וֹ אֲשֶׁ֖ר בִּ/קְצֵ֣ה שָׂדֵ֑/הוּ בְּ/כֶ֨סֶף מָלֵ֜א יִתְּנֶ֥/נָּה לִ֛/י בְּ/תוֹכְ/כֶ֖ם לַ/אֲחֻזַּת קָֽבֶר־־־־׃
translation:
  text: and let him give me the cave of Machpelah, which belongs to him, which is at the end of his field; for the full price in silver, let him give it to me among you as a burial property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is at the edge of his field.' The Hebrew phrase can denote either the end or the edge/extremity of the field.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for full silver,' an idiom meaning payment of the full price.
    reason: lexical_alternative
  - marker: c
    text: Or 'for a burial possession.' The Hebrew emphasizes legal possession, not merely use of the site for burial.
    reason: lexical_alternative
  - marker: d
    text: Or 'his field. For the full price in silver, let him give it to me'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְיִתֶּן
  chosen: and let him give
  alternatives:
  - that he may give
  - and he shall give
  lexicon: HALOT
  rationale: Jussive/imperfect in a request context following Abraham's appeal; English idiom is best captured with 'let him give' rather than a simple future.
- source_word: מְעָרַת הַמַּכְפֵּלָה
  chosen: the cave of Machpelah
  alternatives:
  - the cave at Machpelah
  - Machpelah cave
  lexicon: HALOT
  rationale: Construct chain with a proper name; standard English form is 'the cave of Machpelah.' Personal/place name is transliterated per philosophy.
- source_word: אֲשֶׁר לוֹ
  chosen: which belongs to him
  alternatives:
  - which is his
  - that he owns
  lexicon: HALOT
  rationale: Expresses possession clearly in natural English while preserving the legal/property nuance in the negotiation.
- source_word: אֲשֶׁר בִּקְצֵה שָׂדֵהוּ
  chosen: which is at the end of his field
  alternatives:
  - which is at the edge of his field
  - which is at the far end of his field
  lexicon: HALOT
  rationale: קצה can mean end/edge/extremity. 'At the end of his field' preserves the spatial sense without over-specifying; 'edge' is viable and preserved as an alternative.
- source_word: בְּכֶסֶף מָלֵא
  chosen: for the full price in silver
  alternatives:
  - for full silver
  - for the full amount of silver
  - for full payment in silver
  lexicon: HALOT
  rationale: Idiomatic expression for full monetary payment, not a gift or discount. 'For the full price in silver' makes the commercial sense explicit in clear English.
- source_word: יִתְּנֶנָּה
  chosen: let him give it
  alternatives:
  - let him transfer it
  - let him sell it to me
  lexicon: HALOT
  rationale: The verb remains נתן, 'give,' even in a purchase context. 'Give it' preserves the Hebrew wording, while the payment phrase already conveys that this is a sale-like transfer.
- source_word: בְּתוֹכְכֶם
  chosen: among you
  alternatives:
  - in your presence
  - in your midst
  lexicon: HALOT
  rationale: Refers to the transaction being recognized within the Hittite community. 'Among you' is concise and preserves both social and legal setting.
- source_word: לַאֲחֻזַּת קָבֶר
  chosen: as a burial property
  alternatives:
  - for a burial possession
  - as property for a burial place
  - for a gravesite holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession/holding, often with legal force. 'Burial property' communicates a legally held burial site in natural modern English, better than the wooden 'burial possession.'
