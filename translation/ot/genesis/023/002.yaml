id: GEN.23.2
reference: Genesis 23:2
source:
  edition: WLC
  text: וַ/תָּ֣מָת שָׂרָ֗ה בְּ/קִרְיַ֥ת אַרְבַּ֛ע הִ֥וא חֶבְר֖וֹן בְּ/אֶ֣רֶץ כְּנָ֑עַן
    וַ/יָּבֹא֙ אַבְרָהָ֔ם לִ/סְפֹּ֥ד לְ/שָׂרָ֖ה וְ/לִ/בְכֹּתָֽ/הּ׃
translation:
  text: And Sarah died in Kiriath-arba (that is, Hebron) in the land of Canaan, and
    Abraham came to mourn for Sarah and to weep for her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kiriath-arba is identified here with Hebron.
    reason: cross_reference
  - marker: b
    text: Or 'to lament for Sarah and to weep over her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות plainly denotes death. 'Died' is the most direct and natural
    English equivalent; 'passed away' would soften the statement beyond the Hebrew's
    straightforward force.
- source_word: בְּקִרְיַת אַרְבַּע
  chosen: in Kiriath-arba
  alternatives:
  - in Kiriath Arba
  lexicon: HALOT
  rationale: A place name is best transliterated rather than translated, following
    the project's policy to transliterate names. The hyphen reflects the construct
    relationship in conventional English representation.
- source_word: הִוא חֶבְרוֹן
  chosen: that is, Hebron
  alternatives:
  - which is Hebron
  - the same is Hebron
  lexicon: HALOT
  rationale: The Hebrew apposition identifies Kiriath-arba with Hebron. 'That is,
    Hebron' communicates the explanatory force in readable modern English without
    archaic stiffness.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The noun אֶרֶץ is explicit in the Hebrew, so 'the land of Canaan' preserves
    the fuller expression rather than compressing it to simply 'in Canaan.'
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'go' depending on viewpoint. English translation
    tradition and the narrative perspective support 'came' here; 'entered' would be
    too spatially specific.
- source_word: לִסְפֹּד
  chosen: to mourn
  alternatives:
  - to lament
  - to wail
  lexicon: HALOT
  rationale: ספד refers to mourning, often with lamentation. 'To mourn' is broad,
    natural English that fits the context; 'lament' is possible but slightly narrower
    and more stylized.
- source_word: לְשָׂרָה
  chosen: for Sarah
  alternatives:
  - over Sarah
  lexicon: HALOT
  rationale: The preposition ל with mourning language is naturally rendered 'for'
    in English. 'Over Sarah' is possible but less idiomatic here.
- source_word: וְלִבְכֹּתָהּ
  chosen: and to weep for her
  alternatives:
  - and to cry for her
  - and to weep over her
  lexicon: HALOT
  rationale: בכה means 'weep/cry.' 'Weep' better matches the solemn register of bereavement.
    The pronominal suffix is preserved explicitly as 'for her,' maintaining the personal
    object of Abraham's grief.
