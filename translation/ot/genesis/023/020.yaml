id: GEN.23.20
reference: Genesis 23:20
source:
  edition: WLC
  text: וַ/יָּ֨קָם הַ/שָּׂדֶ֜ה וְ/הַ/מְּעָרָ֧ה אֲשֶׁר בּ֛/וֹ לְ/אַבְרָהָ֖ם לַ/אֲחֻזַּת קָ֑בֶר מֵ/אֵ֖ת בְּנֵי חֵֽת־־־׃ס
translation:
  text: So the field and the cave within it were transferred to Abraham as a burial property from the sons of Heth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Hittites' for 'the sons of Heth.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'was established to Abraham as a burial possession.' The Hebrew verb can be rendered more formally, but here it refers to legal transfer of ownership.
    reason: lexical_alternative
  - marker: c
    text: Or 'and the cave that was in it'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּקָם
  chosen: were transferred
  alternatives:
  - was established
  - passed
  - became
  lexicon: HALOT
  rationale: In this legal-purchase context, קום with the field as subject indicates the property passing into legally recognized possession. English 'were transferred' makes the transactional/legal force clear better than a wooden 'rose' or ambiguous 'was established.' Because the compound subject is 'the field and the cave,' the English verb is plural.
- source_word: הַשָּׂדֶה
  chosen: the field
  lexicon: HALOT
  rationale: Straightforward rendering of the parcel being purchased.
- source_word: וְהַמְּעָרָה אֲשֶׁר בּוֹ
  chosen: and the cave that was in it
  alternatives:
  - and the cave in it
  - and the cave that was there
  lexicon: HALOT
  rationale: Retains the relative clause and the masculine pronominal suffix referring back to the field. 'In it' is the most natural English rendering.
- source_word: לְאַבְרָהָם
  chosen: to Abraham
  alternatives:
  - for Abraham
  lexicon: HALOT
  rationale: Marks Abraham as the recipient/owner in the legal transfer.
- source_word: לַאֲחֻזַּת קָבֶר
  chosen: as a burial property
  alternatives:
  - for a burial holding
  - as a possession for a grave
  - as a burial site
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession/holding, often with legal nuance. 'Burial property' preserves both the possessory and funerary sense better than the looser 'burial site.'
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: Standard source marker in a transaction. 'From the hand of' would be overly literal here.
- source_word: בְּנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  lexicon: HALOT
  rationale: A more formally transparent rendering of the Hebrew ethnonym phrase. 'The Hittites' is a valid contextual equivalent, but 'sons of Heth' better preserves the wording of the source in this legal narrative.
