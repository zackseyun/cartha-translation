id: GEN.23.5
reference: Genesis 23:5
source:
  edition: WLC
  text: וַ/יַּעֲנ֧וּ בְנֵי חֵ֛ת אֶת אַבְרָהָ֖ם לֵ/אמֹ֥ר לֽ/וֹ־־׃
translation:
  text: The sons of Heth answered Abraham, saying to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Hittites.'' Hebrew: ''the sons of Heth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: From ענה in the Qal wayyiqtol, introducing the next speech. 'Answered'
    is the standard narrative rendering and fits the dialog context.
- source_word: בְנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  - the descendants of Heth
  lexicon: HALOT
  rationale: Literally 'sons of Heth.' This preserves the Hebrew kinship expression
    and the personal name Heth. 'Hittites' is a possible contextual equivalent, but
    the Hebrew here names the group by descent, so the more formal rendering is preferred.
- source_word: אֶת אַבְרָהָם
  chosen: Abraham
  rationale: אֶת marks Abraham as the definite direct object; it is not translated
    separately in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Infinitive construct of אמר used to introduce direct speech. 'Saying'
    preserves the Hebrew discourse structure naturally in English.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - him
  lexicon: HALOT
  rationale: The preposition ל with 3ms suffix is best represented explicitly as 'to
    him,' clarifying the addressee of the following speech.
