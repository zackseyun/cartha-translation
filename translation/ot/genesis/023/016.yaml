id: GEN.23.16
reference: Genesis 23:16
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע אַבְרָהָם֮ אֶל עֶפְרוֹן֒ וַ/יִּשְׁקֹ֤ל אַבְרָהָם֙ לְ/עֶפְרֹ֔ן
    אֶת הַ/כֶּ֕סֶף אֲשֶׁ֥ר דִּבֶּ֖ר בְּ/אָזְנֵ֣י בְנֵי חֵ֑ת אַרְבַּ֤ע מֵאוֹת֙ שֶׁ֣קֶל
    כֶּ֔סֶף עֹבֵ֖ר לַ/סֹּחֵֽר־־־׃
translation:
  text: 'So Abraham listened to Ephron, and Abraham weighed out for Ephron the silver
    that he had named in the hearing of the sons of Heth: four hundred shekels of
    silver, current with the merchant.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Hittites'; literally 'the sons of Heth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'acceptable to the merchant' or 'according to standard merchant weight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע אֶל
  chosen: listened to
  alternatives:
  - heard
  - agreed with
  lexicon: HALOT
  rationale: The idiom שׁמע אל commonly means to listen to or heed someone. In this
    transaction context, 'listened to' naturally conveys that Abraham accepted Ephron's
    stated price without over-interpreting the verb as explicit agreement.
- source_word: וַיִּשְׁקֹל
  chosen: weighed out
  alternatives:
  - weighed
  - paid out
  lexicon: HALOT
  rationale: The verb שקל literally refers to weighing, especially money in bullion
    form before coinage. 'Weighed out' preserves the concrete commercial action and
    reads naturally in English.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver' and in context refers to silver used as
    payment. Retaining 'silver' preserves the material and historical specificity
    of the transaction better than the more generalized 'money'.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he had named
  alternatives:
  - that he had spoken
  - that he had stated
  lexicon: HALOT
  rationale: Although דבר is literally 'spoke,' in this bargaining context it refers
    to the amount Ephron had specified. 'Had named' idiomatically conveys the stated
    price while remaining close to the sense.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: Literally 'in the ears of.' 'In the hearing of' preserves the public,
    witnessed nature of the statement more closely than the broader 'before' or 'in
    the presence of.'
- source_word: בְנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  - the descendants of Heth
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'sons of Heth.' Since this is an ethnically
    and genealogically marked phrase in Genesis, the more literal rendering is preferred
    in the main text; the more familiar ethnic equivalent is worth preserving in a
    footnote.
- source_word: אַרְבַּע מֵאוֹת שֶׁקֶל כֶּסֶף
  chosen: four hundred shekels of silver
  alternatives:
  - four hundred silver shekels
  lexicon: HALOT
  rationale: This is a straightforward weight-and-material expression. 'Four hundred
    shekels of silver' is clear, idiomatic, and preserves the ancient monetary form.
- source_word: עֹבֵר לַסֹּחֵר
  chosen: current with the merchant
  alternatives:
  - acceptable to the merchant
  - standard commercial weight
  - according to the merchants
  lexicon: HALOT
  rationale: The phrase likely denotes silver of standard merchantable weight or currency
    in trade. 'Current with the merchant' is a traditional but still intelligible
    rendering that preserves the commercial idiom without flattening it into interpretation.
    Because the phrase is somewhat idiomatic, an explanatory alternative is preserved
    in a footnote.
