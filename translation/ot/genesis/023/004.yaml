id: GEN.23.4
reference: Genesis 23:4
source:
  edition: WLC
  text: גֵּר וְ/תוֹשָׁ֥ב אָנֹכִ֖י עִמָּ/כֶ֑ם תְּנ֨וּ לִ֤/י אֲחֻזַּת קֶ֨בֶר֙ עִמָּ/כֶ֔ם
    וְ/אֶקְבְּרָ֥ה מֵתִ֖/י מִ/לְּ/פָנָֽ/י־־׃
translation:
  text: I am a foreigner and a sojourner among you. Give me a burial property among
    you, so that I may bury my dead out of my sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a burial site'; the Hebrew phrase includes the sense of a property holding
      or possession, not merely a place to dig a grave.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּר
  chosen: foreigner
  alternatives:
  - resident alien
  - stranger
  lexicon: HALOT
  rationale: גֵּר denotes one living outside his native kin-land and without full
    landed status. 'Foreigner' is natural modern English and preserves Abraham's outsider
    status better than the archaic 'stranger.'
- source_word: וְתוֹשָׁב
  chosen: sojourner
  alternatives:
  - temporary resident
  - settler
  lexicon: HALOT
  rationale: תוֹשָׁב complements גֵּר by stressing residence without full possession
    or native status. 'Sojourner' preserves the social-legal nuance and the pairing's
    traditional force without sounding overly technical.
- source_word: עִמָּכֶם
  chosen: among you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Though literally 'with you,' in this social setting the sense is relational
    and communal presence. 'Among you' reads more idiomatically in English and fits
    both occurrences in the verse.
- source_word: תְּנוּ לִי
  chosen: Give me
  alternatives:
  - grant me
  - provide me
  lexicon: HALOT
  rationale: The imperative of נתן is straightforward. 'Give me' is direct and natural;
    'grant me' is possible but slightly more interpretive and formal.
- source_word: אֲחֻזַּת קֶבֶר
  chosen: a burial property
  alternatives:
  - a burial site
  - a grave holding
  - a possession for a grave
  lexicon: HALOT
  rationale: אֲחֻזָּה often refers to a landed holding or property, not merely a spot.
    'Burial property' preserves the legal/property nuance that is important in the
    chapter, more than the flatter 'burial site.'
- source_word: וְאֶקְבְּרָה
  chosen: so that I may bury
  alternatives:
  - that I may bury
  - and I will bury
  lexicon: HALOT
  rationale: The cohortative after the request expresses purpose/result. 'So that
    I may bury' captures the volitional nuance in smooth English.
- source_word: מֵתִי
  chosen: my dead
  alternatives:
  - my deceased
  - my dead one
  lexicon: HALOT
  rationale: The Hebrew uses the singular participial form with first-person suffix,
    a common idiom for a deceased family member. 'My dead' is concise and literal
    enough, preserving the Hebrew idiom without over-specifying Sarah by name.
- source_word: מִלְּפָנַי
  chosen: out of my sight
  alternatives:
  - from before me
  - from my presence
  lexicon: HALOT
  rationale: Literally 'from before me,' but in context Abraham seeks burial to remove
    the corpse from before him. 'Out of my sight' is idiomatic English that conveys
    the practical sense without denying the literal imagery.
