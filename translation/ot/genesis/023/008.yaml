id: GEN.23.8
reference: Genesis 23:8
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר אִתָּ֖/ם לֵ/אמֹ֑ר אִם יֵ֣שׁ אֶֽת נַפְשְׁ/כֶ֗ם לִ/קְבֹּ֤ר אֶת
    מֵתִ/י֙ מִ/לְּ/פָנַ֔/י שְׁמָע֕וּ/נִי וּ/פִגְעוּ לִ֖/י בְּ/עֶפְר֥וֹן בֶּן צֹֽחַר־־־־־׃
translation:
  text: And he spoke with them, saying, “If it is your desire that I bury my dead
    out of my sight, listen to me and approach Ephron son of Zohar for me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “intercede for me with Ephron son of Zohar,” reflecting a nuance of making
      an appeal on someone’s behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתָּם
  chosen: And he spoke with them
  alternatives:
  - And he said to them
  lexicon: HALOT
  rationale: The verb דבר with אֵת/עִם commonly denotes speaking with someone. 'Spoke
    with them' preserves the narrative wording, while 'said to them' is possible but
    slightly less reflective of the preposition.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard infinitive introducing direct speech. 'Saying' keeps the Hebrew
    discourse structure naturally in English.
- source_word: אִם יֵשׁ אֶת־נַפְשְׁכֶם
  chosen: If it is your desire
  alternatives:
  - If it is in your soul
  - If you are willing
  - If you desire
  lexicon: HALOT
  rationale: The idiom literally involves 'your soul/self,' but in context it expresses
    desire or willingness. 'If it is your desire' is idiomatic English that preserves
    the volitional sense without wooden literalism.
- source_word: לִקְבֹּר
  chosen: that I bury
  alternatives:
  - to bury
  lexicon: HALOT
  rationale: 'English smooths the infinitive construction by making explicit the subject
    implied by context: Abraham seeks permission/action for his own burial of Sarah.'
- source_word: אֶת־מֵתִי
  chosen: my dead
  alternatives:
  - my deceased
  - my dead one
  lexicon: HALOT
  rationale: The Hebrew singular with first-person suffix is literally 'my dead.'
    Though English can sound unusual, it is a faithful and dignified rendering in
    burial contexts, avoiding over-interpretation such as supplying 'wife' in the
    main text.
- source_word: מִלְּפָנַי
  chosen: out of my sight
  alternatives:
  - from before me
  - from my presence
  lexicon: HALOT
  rationale: The phrase literally means 'from before me.' In burial context it idiomatically
    refers to removing the deceased from one's presence/sight for burial. 'Out of
    my sight' is natural English and contextually appropriate.
- source_word: שְׁמָעוּנִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: '''Hear me'' is more formal and traditional, but ''listen to me'' communicates
    the imperative clearly in modern English.'
- source_word: וּפִגְעוּ לִי
  chosen: and approach ... for me
  alternatives:
  - and intercede for me with
  - and entreat for me with
  - and speak to ... on my behalf
  lexicon: HALOT
  rationale: פגע with ב can mean to meet, encounter, or make entreaty to someone.
    In this negotiation setting Abraham asks them to make contact/appeal to Ephron
    on his behalf. 'Approach ... for me' keeps the request broad without overstating
    formal intercession.
- source_word: בְּעֶפְרוֹן בֶּן־צֹחַר
  chosen: Ephron son of Zohar
  alternatives:
  - Ephron, the son of Zohar
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard transparent rendering of בן.
