id: GEN.23.7
reference: Genesis 23:7
source:
  edition: WLC
  text: וַ/יָּ֧קָם אַבְרָהָ֛ם וַ/יִּשְׁתַּ֥חוּ לְ/עַם הָ/אָ֖רֶץ לִ/בְנֵי חֵֽת־־׃
translation:
  text: Then Abraham rose and bowed down before the people of the land, the sons of
    Heth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Hittites.'' Hebrew: ''the sons of Heth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then Abraham rose
  alternatives:
  - And Abraham rose
  - Abraham stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום denotes rising/standing up. 'Rose' is a natural
    narrative rendering in English; 'Then' reflects the sequential waw in smooth modern
    style.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: Hishtaphel/Hishtafel form of שׁחה commonly denotes bowing low or prostration.
    'Bowed down' preserves the physical gesture without overstating it as full prostration
    where the context simply shows respectful deference.
- source_word: לְעַם הָאָרֶץ
  chosen: before the people of the land
  alternatives:
  - to the people of the land
  - before the local people
  lexicon: HALOT
  rationale: The preposition ל here marks the object/recipient of the gesture of bowing;
    in idiomatic English with 'bowed down,' 'before' best conveys the relational sense.
    עַם הָאָרֶץ is rendered literally as 'people of the land,' referring here to the
    local inhabitants.
- source_word: לִבְנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  - the descendants of Heth
  lexicon: HALOT
  rationale: Literally 'sons of Heth.' Because the Hebrew names the group genealogically,
    the main text preserves that form. 'The Hittites' is a common contextual equivalent,
    but the more literal rendering keeps the ethnic designation transparent and auditable.
- source_word: חֵת
  chosen: Heth
  lexicon: HALOT
  rationale: Proper name transliterated in keeping with the translation philosophy
    to transliterate names rather than translate them.
