id: GEN.23.11
reference: Genesis 23:11
source:
  edition: WLC
  text: לֹֽא אֲדֹנִ֣/י שְׁמָעֵ֔/נִי הַ/שָּׂדֶה֙ נָתַ֣תִּי לָ֔/ךְ וְ/הַ/מְּעָרָ֥ה אֲשֶׁר
    בּ֖/וֹ לְ/ךָ֣ נְתַתִּ֑י/הָ לְ/עֵינֵ֧י בְנֵי עַמִּ֛/י נְתַתִּ֥י/הָ לָּ֖/ךְ קְבֹ֥ר
    מֵתֶֽ/ךָ־־־׃
translation:
  text: 'No, my lord, listen to me: I give you the field, and I give you the cave
    that is in it. In the sight of the sons of my people I give it to you. Bury your
    dead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Not so, my lord; hear me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the sight of the sons of my people,' meaning publicly and in
      the presence of witnesses from his community.
    reason: cultural_note
  - marker: c
    text: Or 'and the cave that is in it I give to you'.
    reason: previous_rendering
lexical_decisions:
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - Not so
  lexicon: HALOT
  rationale: Here לֹא functions idiomatically as a polite refusal or correction to
    Abraham's offer, not merely a bare negation. 'No' is natural modern English; 'Not
    so' is possible but more archaic.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: A respectful address to Abraham. 'My lord' preserves the social deference
    of the Hebrew better than the flatter 'sir'; 'my master' would overstate servile
    nuance in this negotiation context.
- source_word: שְׁמָעֵנִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: Imperative of שׁמע in direct address. 'Listen to me' is clear modern
    English while retaining the force of the appeal; 'hear me' is more formal but
    slightly less idiomatic today.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the land
  lexicon: HALOT
  rationale: שָׂדֶה normally denotes a field/open tract. 'Field' is the most direct
    rendering in this property-transfer setting.
- source_word: נָתַתִּי לָךְ
  chosen: I give you
  alternatives:
  - I have given you
  - I grant to you
  lexicon: HALOT
  rationale: The perfect is used in performative speech, effectively conveying a present
    act of transfer. English present 'I give you' best matches the transactional force
    in context.
- source_word: הַמְּעָרָה אֲשֶׁר בּוֹ
  chosen: the cave that is in it
  alternatives:
  - the cave that is there
  - the cave in it
  lexicon: HALOT
  rationale: This specifies the cave located within the field. 'That is in it' preserves
    the spatial relation explicitly without overexpansion.
- source_word: נְתַתִּיהָ
  chosen: I give it
  alternatives:
  - I have given it
  lexicon: HALOT
  rationale: As with the earlier נתתי, the perfect is performative in direct speech.
    Present English reflects the immediate offer more naturally.
- source_word: לְעֵינֵי בְנֵי עַמִּי
  chosen: In the sight of the sons of my people
  alternatives:
  - Before the sons of my people
  - In the presence of the people of my community
  lexicon: HALOT
  rationale: Literally 'before the eyes of the sons of my people,' an idiom for public
    witness. The chosen rendering stays close to the Hebrew while remaining readable.
    'Sons of my people' is retained for gender-accurate fidelity to the source expression.
- source_word: קְבֹר
  chosen: Bury
  alternatives:
  - bury
  lexicon: HALOT
  rationale: Direct imperative concluding the offer. Capitalization follows English
    sentence style; the sense is straightforward.
- source_word: מֵתֶךָ
  chosen: your dead
  alternatives:
  - your deceased
  - your dead one
  lexicon: HALOT
  rationale: The singular form likely refers specifically to Sarah, but Hebrew often
    uses this expression idiomatically. 'Your dead' is the most natural and sufficiently
    literal English rendering.
