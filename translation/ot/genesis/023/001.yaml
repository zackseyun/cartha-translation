id: GEN.23.1
reference: Genesis 23:1
source:
  edition: WLC
  text: וַ/יִּהְיוּ֙ חַיֵּ֣י שָׂרָ֔ה מֵאָ֥ה שָׁנָ֛ה וְ/עֶשְׂרִ֥ים שָׁנָ֖ה וְ/שֶׁ֣בַע
    שָׁנִ֑ים שְׁנֵ֖י חַיֵּ֥י שָׂרָֽה׃
translation:
  text: Sarah lived one hundred twenty-seven years; these were the years of Sarah’s
    life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''one hundred year and twenty year and seven years,'' a stylized
      way of totaling Sarah’s lifespan.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: lived
  alternatives:
  - were
  lexicon: HALOT
  rationale: Although the verb is formally 'and they were,' in this idiom with חַיֵּי
    ('the life/years of life of') it introduces the total lifespan. Rendering it as
    'lived' gives natural English while preserving the sense of duration.
- source_word: חַיֵּי
  chosen: life / lived
  alternatives:
  - lifetime
  - years of life
  lexicon: HALOT
  rationale: The construct plural literally means 'the life of' or 'the years of life
    of.' In the first clause it is absorbed idiomatically into 'Sarah lived... years';
    in the closing resumptive phrase it is represented more explicitly as 'the years
    of Sarah’s life' to reflect the Hebrew repetition.
- source_word: שָׂרָה
  chosen: Sarah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
- source_word: מֵאָה שָׁנָה וְעֶשְׂרִים שָׁנָה וְשֶׁבַע שָׁנִים
  chosen: one hundred twenty-seven years
  alternatives:
  - a hundred and twenty-seven years
  - one hundred and twenty seven years
  lexicon: HALOT
  rationale: The Hebrew counts the years in a distributive style ('one hundred year
    and twenty year and seven years'). English normally compresses this to a single
    cardinal expression. 'Twenty-seven' is hyphenated per standard English style.
- source_word: שְׁנֵי חַיֵּי שָׂרָה
  chosen: these were the years of Sarah’s life
  alternatives:
  - the years of Sarah’s life
  - these are the years of Sarah’s life
  lexicon: HALOT
  rationale: This closing phrase is a Hebrew resumptive/appositional formula emphasizing
    the completed lifespan. Supplying 'these were' makes the clause complete and natural
    in English while preserving the emphatic repetition rather than omitting it as
    redundant.
