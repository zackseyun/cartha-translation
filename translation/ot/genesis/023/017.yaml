id: GEN.23.17
reference: Genesis 23:17
source:
  edition: WLC
  text: וַ/יָּ֣קָם שְׂדֵ֣ה עֶפְר֗וֹן אֲשֶׁר֙ בַּ/מַּכְפֵּלָ֔ה אֲשֶׁ֖ר לִ/פְנֵ֣י מַמְרֵ֑א
    הַ/שָּׂדֶה֙ וְ/הַ/מְּעָרָ֣ה אֲשֶׁר בּ֔/וֹ וְ/כָל הָ/עֵץ֙ אֲשֶׁ֣ר בַּ/שָּׂדֶ֔ה
    אֲשֶׁ֥ר בְּ/כָל גְּבֻל֖/וֹ סָבִֽיב׀־־־׃
translation:
  text: So Ephron’s field at Machpelah, which was before Mamre—the field, the cave
    that was in it, and every tree in the field, throughout its whole surrounding
    boundary—was confirmed
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was established' or 'was transferred'; the Hebrew verb here likely carries
      a legal sense of property confirmation in the sale context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: was confirmed
  alternatives:
  - was established
  - was transferred
  - stood
  lexicon: HALOT
  rationale: In this purchase context, קום in the wayyiqtol functions idiomatically
    for legal confirmation/establishment of property ownership rather than simple
    physical rising. 'Was confirmed' best captures the transactional sense in natural
    English while staying close to the Hebrew.
- source_word: שְׂדֵה עֶפְרוֹן
  chosen: Ephron’s field
  alternatives:
  - the field of Ephron
  lexicon: HALOT
  rationale: The construct chain is naturally rendered as possession in English. 'Ephron’s
    field' is concise and accurate.
- source_word: בַּמַּכְפֵּלָה
  chosen: at Machpelah
  alternatives:
  - in Machpelah
  - in the Machpelah area
  lexicon: HALOT
  rationale: As a place name, Machpelah is transliterated. 'At' fits English idiom
    for a field located at a named site.
- source_word: לִפְנֵי מַמְרֵא
  chosen: before Mamre
  alternatives:
  - facing Mamre
  - east of Mamre
  - near Mamre
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' 'Before Mamre' preserves
    the spatial wording without over-interpreting the exact directional nuance.
- source_word: הַשָּׂדֶה וְהַמְּעָרָה אֲשֶׁר בּוֹ
  chosen: the field, the cave that was in it
  alternatives:
  - the field and the cave that was in it
  - the field, including the cave in it
  lexicon: HALOT
  rationale: The Hebrew apposition-like listing itemizes the components of the property.
    Repeating 'the field' reflects the formal inventory style of the legal description.
- source_word: וְכָל הָעֵץ אֲשֶׁר בַּשָּׂדֶה
  chosen: and every tree in the field
  alternatives:
  - and all the trees in the field
  lexicon: HALOT
  rationale: כָל + singular collective noun can be rendered distributively as 'every
    tree,' which suits the legal enumeration of all included assets.
- source_word: אֲשֶׁר בְּכָל גְּבֻלוֹ סָבִיב
  chosen: throughout its whole surrounding boundary
  alternatives:
  - within all its surrounding borders
  - all around its boundary
  - within its entire border all around
  lexicon: HALOT
  rationale: The phrase emphasizes the full perimeter of the property. 'Throughout
    its whole surrounding boundary' preserves the comprehensive legal force, though
    somewhat formal, matching the source's cadastral style.
