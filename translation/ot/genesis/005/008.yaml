id: GEN.5.8
reference: Genesis 5:8
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ כָּל יְמֵי שֵׁ֔ת שְׁתֵּ֤ים עֶשְׂרֵה֙ שָׁנָ֔ה וּ/תְשַׁ֥ע מֵא֖וֹת
    שָׁנָ֑ה וַ/יָּמֹֽת־־׃ס
translation:
  text: So all the days of Seth were nine hundred and twelve years, and he died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a copular summary in a genealogical
    formula. 'Were' is natural English and preserves the straightforward sense without
    overtranslating.
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - the whole lifetime of
  lexicon: HALOT
  rationale: This construct phrase is a standard idiom in Genesis 5 for the total
    lifespan. 'All the days of' keeps the Hebrew wording while remaining clear in
    English.
- source_word: שֵׁת
  chosen: Seth
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: שְׁתֵּים עֶשְׂרֵה ... וּתְשַׁע מֵאוֹת שָׁנָה
  chosen: nine hundred and twelve years
  alternatives:
  - twelve years and nine hundred years
  lexicon: HALOT
  rationale: The Hebrew expresses the number as 'twelve year and nine hundred year,'
    idiomatically meaning 912 years. English reverses the order for natural number
    expression while preserving the total.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: This is the recurring closing formula in the genealogy. 'And he died'
    preserves the solemn repetition and the simple narrative force of the wayyiqtol.
