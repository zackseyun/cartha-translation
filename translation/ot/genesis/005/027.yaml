id: GEN.5.27
reference: Genesis 5:27
source:
  edition: WLC
  text: וַ/יִּהְיוּ֙ כָּל יְמֵ֣י מְתוּשֶׁ֔לַח תֵּ֤שַׁע וְ/שִׁשִּׁים֙ שָׁנָ֔ה וּ/תְשַׁ֥ע
    מֵא֖וֹת שָׁנָ֑ה וַ/יָּמֹֽת־׃פ
translation:
  text: So all the days of Methuselah were nine hundred sixty-nine years, and he died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  lexicon: HALOT
  rationale: 'The wayyiqtol of היה here functions as a simple narrative copula/summation:
    ''were.'' ''Came to be'' would be overly wooden in this genealogical formula.'
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: In the fixed genealogical expression כָּל יְמֵי, 'all' is the natural
    and idiomatic rendering.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  lexicon: HALOT
  rationale: Literally 'days of.' Although 'lifetime' captures the sense, 'days of'
    preserves the recurring formula in Genesis 5 while remaining clear in English
    when combined with the total years.
- source_word: מְתוּשֶׁלַח
  chosen: Methuselah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: תֵּשַׁע וְשִׁשִּׁים
  chosen: sixty-nine
  alternatives:
  - nine and sixty
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew order for compound numbers. 'Sixty-nine'
    is the natural modern rendering.
- source_word: וּתְשַׁע מֵאוֹת
  chosen: nine hundred
  alternatives:
  - and nine hundreds
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number phrase.
- source_word: שָׁנָה ... שָׁנָה
  chosen: years
  alternatives:
  - year
  lexicon: HALOT
  rationale: Although Hebrew uses singular שנה after numerals in this construction,
    idiomatic English requires the plural 'years.'
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The standard concluding formula in Genesis 5 is preserved straightforwardly.
    Including the pronoun 'he' makes the English sentence complete and natural.
