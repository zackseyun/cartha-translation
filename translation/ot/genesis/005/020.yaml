id: GEN.5.20
reference: Genesis 5:20
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ כָּל יְמֵי יֶ֔רֶד שְׁתַּ֤יִם וְ/שִׁשִּׁים֙ שָׁנָ֔ה וּ/תְשַׁ֥ע
    מֵא֖וֹת שָׁנָ֑ה וַ/יָּמֹֽת־־׃פ
translation:
  text: So all the days of Yered were nine hundred and sixty-two years, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Yered; traditionally rendered 'Jared' in many English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: So ... were
  alternatives:
  - And ... were
  - Thus ... were
  lexicon: HALOT
  rationale: Wayyiqtol of היה introduces the summary statement in the genealogy. 'So'
    captures the narrative-sequential force in readable English; 'and' is possible
    but less natural here.
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - the whole lifetime of
  lexicon: HALOT
  rationale: A standard genealogical idiom meaning the total span of life. 'All the
    days of' preserves the Hebrew expression closely while remaining clear.
- source_word: יֶרֶד
  chosen: Yered
  alternatives:
  - Jared
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Yered' reflects the Hebrew form more directly, while the traditional
    English 'Jared' is a familiar alternative.
- source_word: שְׁתַּיִם וְשִׁשִּׁים שָׁנָה
  chosen: sixty-two years
  alternatives:
  - two and sixty years
  lexicon: HALOT
  rationale: Hebrew numbers are rendered in standard modern English order. 'Years'
    is retained explicitly from שָׁנָה.
- source_word: וּתְשַׁע מֵאוֹת שָׁנָה
  chosen: nine hundred
  alternatives:
  - and nine hundred years
  lexicon: HALOT
  rationale: 'Combined with the preceding number phrase to produce idiomatic English
    total age: ''nine hundred and sixty-two years.'' The second occurrence of ''years''
    is represented once in the final English expression.'
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The standard closing formula in Genesis 5 is preserved plainly. Including
    the pronoun makes the English sentence complete and natural.
