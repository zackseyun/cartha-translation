id: GEN.5.26
reference: Genesis 5:26
source:
  edition: WLC
  text: וַֽ/יְחִ֣י מְתוּשֶׁ֗לַח אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת לֶ֔מֶךְ שְׁתַּ֤יִם וּ/שְׁמוֹנִים֙
    שָׁנָ֔ה וּ/שְׁבַ֥ע מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־׃
translation:
  text: After he fathered Lamech, Methuselah lived 782 years and fathered sons and
    daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical narrative is idiomatically rendered
    'lived,' introducing the span of life after the named son's birth.
- source_word: מְתוּשֶׁלַח
  chosen: Methuselah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking the period subsequent to the birth of Lamech.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - his begetting
  - he became the father of
  lexicon: HALOT
  rationale: Hiphil of ילד with 3ms suffix refers to Methuselah's begetting of Lamech.
    'Fathered' is concise, natural English and preserves the male-specific sense.
- source_word: אֶת לֶמֶךְ
  chosen: Lamech
  rationale: Direct-object marker is not translated; the personal name is transliterated
    conventionally as 'Lamech.'
- source_word: שְׁתַּיִם וּשְׁמוֹנִים שָׁנָה וּשְׁבַע מֵאוֹת שָׁנָה
  chosen: 782 years
  alternatives:
  - seven hundred eighty-two years
  - seven hundred and eighty-two years
  lexicon: HALOT
  rationale: The Hebrew number sequence literally reads 'two and eighty years and
    seven hundred years.' In English this is best rendered as the standard total,
    782 years, without loss of meaning.
- source_word: וַיּוֹלֶד
  chosen: and fathered
  alternatives:
  - and became the father of
  - and had
  lexicon: HALOT
  rationale: Repeated ילד in the genealogical formula is best kept consistent as 'fathered.'
    'Had' is possible but less formally tied to the Hebrew verb.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring; 'sons and
    daughters' preserves that detail better than the generic 'children.'
