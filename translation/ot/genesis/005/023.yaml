id: GEN.5.23
reference: Genesis 5:23
source:
  edition: WLC
  text: וַ/יְהִ֖י כָּל יְמֵ֣י חֲנ֑וֹךְ חָמֵ֤שׁ וְ/שִׁשִּׁים֙ שָׁנָ֔ה וּ/שְׁלֹ֥שׁ מֵא֖וֹת
    שָׁנָֽה־׃
translation:
  text: So all the days of Enoch were three hundred sixty-five years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: So ... were
  alternatives:
  - And ... were
  - Now ... were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the summary statement in the genealogy.
    English idiom does not require a separate verb-first structure, so it is carried
    by 'So ... were,' which preserves the narrative-sequential sense without sounding
    wooden.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Standard rendering meaning totality; here it modifies 'the days' to summarize
    Enoch's full lifespan.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  lexicon: HALOT
  rationale: Literally 'days of.' In genealogical formulas this idiom denotes lifespan.
    'The days of' is retained because it is natural enough in English and preserves
    the Hebrew expression.
- source_word: חֲנוֹךְ
  chosen: Enoch
  rationale: Personal name is transliterated according to the translation philosophy's
    rule to transliterate names rather than translate them.
- source_word: חָמֵשׁ וְשִׁשִּׁים
  chosen: sixty-five
  alternatives:
  - five and sixty
  lexicon: HALOT
  rationale: Hebrew gives the smaller number before the tens, but standard modern
    English reverses the order. 'Sixty-five' is the natural equivalent.
- source_word: וּשְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
- source_word: שָׁנָה ... שָׁנָה
  chosen: years
  alternatives:
  - year
  lexicon: HALOT
  rationale: 'Although Hebrew uses singular שנה after numerals in this construction,
    idiomatic English requires the plural ''years.'' The total expression is rendered
    as a single lifespan formula: ''three hundred sixty-five years.'''
