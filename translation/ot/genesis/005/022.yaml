id: GEN.5.22
reference: Genesis 5:22
source:
  edition: WLC
  text: וַ/יִּתְהַלֵּ֨ךְ חֲנ֜וֹךְ אֶת הָֽ/אֱלֹהִ֗ים אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת מְתוּשֶׁ֔לַח
    שְׁלֹ֥שׁ מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃
translation:
  text: Enoch walked with God three hundred years after he fathered Methuselah, and
    he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived in fellowship with God.' The Hebrew idiom is literally 'walked
      with God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'walked with God after he fathered Methuselah three hundred years'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְהַלֵּךְ
  chosen: walked with
  alternatives:
  - walked before
  - lived in fellowship with
  lexicon: HALOT
  rationale: The hitpael of הלך here is idiomatic in Genesis for one's manner of life
    in relation to God. Because it is followed by אֶת הָאֱלֹהִים, the natural English
    rendering is 'walked with God,' preserving the relational nuance without over-paraphrasing.
- source_word: אֶת הָאֱלֹהִים
  chosen: with God
  alternatives:
  - before God
  lexicon: HALOT
  rationale: Although אֶת is not the usual preposition for 'with' in later prose,
    in this idiom ('walked with God') it functions relationally. 'God' is preferable
    to 'the God' in idiomatic English, since the article is not normally carried over
    in English with אֱלֹהִים as a divine title here.
- source_word: אַֽחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: 'Temporal sense is straightforward: Enoch''s walking with God is dated
    from the birth of Methuselah onward.'
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - his begetting
  lexicon: HALOT
  rationale: From ילד in the causative stem, referring to a male parent. 'Fathered'
    is clear modern English and more natural than the archaic 'begot,' while preserving
    the paternal sense.
- source_word: מְתוּשֶׁלַח
  chosen: Methuselah
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁלֹשׁ מֵאוֹת שָׁנָה
  chosen: three hundred years
  lexicon: HALOT
  rationale: Direct numerical expression; English idiom places the number before 'years'
    without needing 'for' in this construction.
- source_word: וַיּוֹלֶד
  chosen: and he fathered
  alternatives:
  - and he begot
  lexicon: HALOT
  rationale: Same verb ילד as earlier in the verse; rendered consistently as 'fathered'
    for readability and lexical consistency.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring. Per translation
    philosophy, gender-accurate wording is preferred over the more generic 'children'.
