theological_decisions:
- issue: Nature of Enoch's relationship to God in the idiom 'walked with God'
  chosen_reading: Retain the relational metaphor 'walked with God' in the main text
  alternative_readings:
  - lived faithfully before God
  - lived in close fellowship with God
  rationale: The Hebrew idiom carries theological weight and should be preserved rather
    than interpreted away. A more explanatory rendering would narrow the text's evocative
    force. This also aligns with preserving theological tension rather than resolving
    it unnecessarily.
  doctrine_reference: Translation philosophy §3
