id: GEN.5.10
reference: Genesis 5:10
source:
  edition: WLC
  text: וַֽ/יְחִ֣י אֱנ֗וֹשׁ אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת קֵינָ֔ן חֲמֵ֤שׁ עֶשְׂרֵה֙ שָׁנָ֔ה
    וּ/שְׁמֹנֶ֥ה מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־׃
translation:
  text: And Enosh lived, after he fathered Kenan, eight hundred and fifteen years,
    and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or traditional English: ''begot'' for ''fathered.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Kenan'; traditional forms influenced by Greek often read 'Cainan.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in this genealogy formula is idiomatically rendered
    'lived' in English. 'Was alive' is more wooden and less natural.
- source_word: אֱנוֹשׁ
  chosen: Enosh
  alternatives:
  - Enos
  rationale: Personal names are transliterated by standard conventions. 'Enosh' reflects
    the Hebrew form more directly than the traditional 'Enos'.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition here introducing the period after the birth
    of Kenan.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means to father/beget. 'He
    fathered' is clear modern English and preserves the male genealogical perspective
    better than the archaic 'begot'.
- source_word: אֶת קֵינָן
  chosen: Kenan
  alternatives:
  - Cainan
  rationale: Direct-object marker אֶת is not translated. The name is transliterated
    from Hebrew as 'Kenan'; 'Cainan' reflects Greek/traditional forms rather than
    the Hebrew source.
- source_word: חֲמֵשׁ עֶשְׂרֵה ... וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  chosen: eight hundred and fifteen years
  alternatives:
  - 815 years
  - fifteen years and eight hundred years
  lexicon: HALOT
  rationale: The Hebrew expresses 15 + 800 years. English idiom naturally reverses
    to 'eight hundred and fifteen years' while preserving the total duration.
- source_word: וַיּוֹלֶד
  chosen: and he fathered
  alternatives:
  - and begot
  - and had
  lexicon: HALOT
  rationale: Repeated genealogical verb ילד is rendered consistently as 'fathered.'
    'Had' is too vague; 'begot' is archaic.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring. 'Sons and
    daughters' preserves that detail better than the generic 'children'.
