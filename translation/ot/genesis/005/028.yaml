id: GEN.5.28
reference: Genesis 5:28
source:
  edition: WLC
  text: וַֽ/יְחִי לֶ֕מֶךְ שְׁתַּ֧יִם וּ/שְׁמֹנִ֛ים שָׁנָ֖ה וּ/מְאַ֣ת שָׁנָ֑ה וַ/יּ֖וֹלֶד
    בֵּֽן־׃
translation:
  text: And Lamech lived one hundred and eighty-two years, and fathered a son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulae is idiomatically rendered
    'lived,' indicating the span of years attained before the next event.
- source_word: לֶמֶךְ
  chosen: Lamech
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: שְׁתַּיִם וּשְׁמֹנִים ... וּמְאַת שָׁנָה
  chosen: one hundred and eighty-two years
  alternatives:
  - a hundred and eighty-two years
  - one hundred eighty-two years
  lexicon: HALOT
  rationale: The Hebrew number sequence literally reads 'two and eighty year and a
    hundred year,' an idiomatic cardinal construction best rendered in standard English
    order as 'one hundred and eighty-two years.' 'Years' is plural in English though
    Hebrew uses singular שָׁנָה in this construction.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in the Hiphil with a male subject means 'to father, beget.' 'Fathered'
    is more readable modern English than 'begot' while remaining more concise and
    genealogically appropriate than 'became the father of.'
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The noun means 'son.' The indefinite article is natural in English because
    the son is not yet named in this verse.
