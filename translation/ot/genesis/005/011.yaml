id: GEN.5.11
reference: Genesis 5:11
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ כָּל יְמֵ֣י אֱנ֔וֹשׁ חָמֵ֣שׁ שָׁנִ֔ים וּ/תְשַׁ֥ע מֵא֖וֹת שָׁנָ֑ה
    וַ/יָּמֹֽת־׃ס
translation:
  text: So all the days of Enosh were nine hundred and five years, and he died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  lexicon: HALOT
  rationale: 'The wayyiqtol of היה in this genealogical summary functions idiomatically
    to state total lifespan: ''were.'' ''Came to be'' would be overly wooden in English
    here.'
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - the whole lifetime of
  lexicon: HALOT
  rationale: This construct phrase is the standard genealogical expression for the
    total span of a person's life. 'All the days of' preserves the Hebrew form while
    remaining natural English.
- source_word: אֱנוֹשׁ
  chosen: Enosh
  alternatives:
  - Enos
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Enosh' reflects the Hebrew form more directly than the traditional
    'Enos.'
- source_word: חָמֵשׁ שָׁנִים וּתְשַׁע מֵאוֹת שָׁנָה
  chosen: nine hundred and five years
  alternatives:
  - five years and nine hundred years
  lexicon: HALOT
  rationale: The Hebrew number expression totals the lifespan as 905 years. English
    idiom reverses the order to 'nine hundred and five years.' A formally mirrored
    rendering would sound unnatural and obscure the sense.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The standard closing formula in Genesis 5 is preserved straightforwardly.
    Including the pronoun 'he' makes the English sentence complete and clear.
