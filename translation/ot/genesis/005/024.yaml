theological_decisions:
- issue: Whether to make explicit that Enoch did not die or was translated to heaven
  chosen_reading: 'Retain the text''s restrained wording: ''he was no more, because
    God took him.'''
  alternative_readings:
  - he did not die
  - God took him to heaven
  - God translated him
  rationale: The verse strongly suggests extraordinary divine removal, and later biblical
    interpretation develops this, but the Hebrew itself does not explicitly state
    'to heaven' or directly negate death in this verse. To preserve theological tension
    and avoid importing later interpretation into the main text, the translation keeps
    the Hebrew's concise formulation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
