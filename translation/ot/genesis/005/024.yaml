id: GEN.5.24
reference: Genesis 5:24
source:
  edition: WLC
  text: וַ/יִּתְהַלֵּ֥ךְ חֲנ֖וֹךְ אֶת הָֽ/אֱלֹהִ֑ים וְ/אֵינֶ֕/נּוּ כִּֽי לָקַ֥ח אֹת֖/וֹ
    אֱלֹהִֽים־־׃פ
translation:
  text: Enoch walked with God, and he was no more, because God took him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and he was not.' The Hebrew expression indicates that
      Enoch was no longer present.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלֵּךְ
  chosen: walked
  alternatives:
  - went about
  - walked about
  - lived
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys ongoing manner of life or conduct, not
    merely physical movement. 'Walked' preserves the Hebrew idiom and its relational/moral
    nuance, especially in the repeated phrase 'walked with God' in this context.
- source_word: אֶת הָאֱלֹהִים
  chosen: with God
  alternatives:
  - before God
  lexicon: HALOT
  rationale: 'With הלך, the particle אֶת marks accompaniment: Enoch walked ''with''
    God. ''With God'' is the plain sense and preserves the intimate relational force
    of the idiom.'
- source_word: וְאֵינֶנּוּ
  chosen: and he was no more
  alternatives:
  - and he was not
  - and he was gone
  lexicon: HALOT
  rationale: The idiom literally means 'and he is not/was not,' but in English 'he
    was no more' communicates disappearance/absence without over-interpreting the
    manner. It preserves the text's restraint better than the more interpretive 'he
    was gone.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Enoch's absence. 'Because' is natural
    modern English and clearly expresses the causal relationship.
- source_word: לָקַח אֹתוֹ
  chosen: took him
  alternatives:
  - received him
  - removed him
  lexicon: HALOT
  rationale: לקח ordinarily means 'take.' In this context it likely implies divine
    removal from ordinary human life, but 'took him' best preserves the Hebrew wording
    without specifying more than the text states.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun refers to the one true God in this narrative context, so 'God'
    is the appropriate English rendering.
