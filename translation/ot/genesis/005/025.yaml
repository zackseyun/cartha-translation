id: GEN.5.25
reference: Genesis 5:25
source:
  edition: WLC
  text: וַ/יְחִ֣י מְתוּשֶׁ֔לַח שֶׁ֧בַע וּ/שְׁמֹנִ֛ים שָׁנָ֖ה וּ/מְאַ֣ת שָׁנָ֑ה וַ/יּ֖וֹלֶד
    אֶת לָֽמֶךְ־׃
translation:
  text: Methuselah lived one hundred and eighty-seven years and fathered Lamech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'became the father of Lamech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is idiomatically rendered
    'lived,' introducing the lifespan before begetting.
- source_word: מְתוּשֶׁלַח
  chosen: Methuselah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: שֶׁבַע וּשְׁמֹנִים ... וּמְאַת שָׁנָה
  chosen: one hundred and eighty-seven years
  alternatives:
  - a hundred and eighty-seven years
  lexicon: HALOT
  rationale: The Hebrew number sequence literally reads 'seven and eighty year and
    hundred year,' which in idiomatic English is 'one hundred and eighty-seven years.'
    'One hundred' is preferred for a slightly more formal narrative register.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in the Hiphil in genealogies commonly means 'fathered' or 'became
    the father of.' 'Fathered' is concise, natural modern English, and preserves the
    male genealogical sense better than archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no direct English equivalent; its function
    is represented by normal English syntax.
- source_word: לָמֶךְ
  chosen: Lamech
  rationale: Personal name transliterated by standard English convention.
