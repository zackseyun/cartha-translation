id: GEN.5.9
reference: Genesis 5:9
source:
  edition: WLC
  text: וַֽ/יְחִ֥י אֱנ֖וֹשׁ תִּשְׁעִ֣ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת קֵינָֽן־׃
translation:
  text: Enosh lived ninety years and fathered Kenan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often read 'begot Kenan'; the Hebrew verb here
      is more naturally rendered in contemporary English as 'fathered.'
    reason: lexical_alternative
  - marker: b
    text: The name is traditionally spelled 'Cainan' in some English traditions, reflecting
      Greek forms; the Hebrew text reads Kenan.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - came to life
  lexicon: HALOT
  rationale: In genealogical formulae with age statements, חיה in the wayyiqtol commonly
    means 'lived' or 'lived to the age of.' 'Lived' is the natural English rendering
    in this context.
- source_word: אֱנוֹשׁ
  chosen: Enosh
  alternatives:
  - Enos
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Enosh' reflects the Hebrew form more directly than the traditional
    'Enos.'
- source_word: תִּשְׁעִים שָׁנָה
  chosen: ninety years
  alternatives:
  - ninety year(s)
  lexicon: HALOT
  rationale: This age expression is idiomatically rendered in English as 'ninety years.'
    Although Hebrew uses singular שָׁנָה after numerals in some constructions, English
    requires the plural here.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in the Hiphil in genealogies denotes causing offspring to be born,
    idiomatically 'fathered' when the male subject is explicit. 'Begot' is traditional
    but archaic; 'became the father of' is accurate but less concise.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent lexical meaning in English;
    its function is represented by English word order.
- source_word: קֵינָן
  chosen: Kenan
  alternatives:
  - Cainan
  rationale: Personal name transliterated from the Hebrew form. 'Kenan' follows the
    MT spelling directly; 'Cainan' reflects Greek/English tradition.
