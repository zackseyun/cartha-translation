theological_decisions:
- issue: Genealogical lifespan formula in Genesis 5
  chosen_reading: Render the age statement plainly as a historical lifespan summary
    without interpretive qualification.
  alternative_readings:
  - Treat the numbers symbolically in translation
  rationale: The Hebrew text presents a direct numerical lifespan and death notice.
    The translation should reflect the text's plain sense and not import a symbolic
    or skeptical interpretation into the wording.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
