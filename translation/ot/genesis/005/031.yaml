id: GEN.5.31
reference: Genesis 5:31
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כָּל יְמֵי לֶ֔מֶךְ שֶׁ֤בַע וְ/שִׁבְעִים֙ שָׁנָ֔ה וּ/שְׁבַ֥ע מֵא֖וֹת
    שָׁנָ֑ה וַ/יָּמֹֽת־־׃ס
translation:
  text: So all the days of Lamech were seven hundred seventy-seven years, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally orders the number as 'seven and seventy years, and seven
      hundred years,' that is, 777 years.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: So ... were
  alternatives:
  - And ... were
  - Now ... were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the summary statement of Lamech's
    lifespan. English idiom does not require a separate finite verb before the predicate,
    so it is carried as 'were.' 'So' preserves the narrative-sequential force naturally
    in context.
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - the whole lifetime of
  - all the years of
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for the total span of a person's life.
    'All the days of' preserves the source wording while remaining clear in English.
- source_word: לֶמֶךְ
  chosen: Lamech
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: שֶׁבַע וְשִׁבְעִים ... וּשְׁבַע מֵאוֹת
  chosen: seven hundred seventy-seven
  alternatives:
  - seven hundred and seventy-seven
  lexicon: HALOT
  rationale: The Hebrew gives the number as units + tens + 'year,' then units + hundreds
    + 'year,' an idiomatic enumeration totaling 777. Modern English expresses this
    most naturally as 'seven hundred seventy-seven.'
- source_word: שָׁנָה
  chosen: years
  alternatives:
  - year
  lexicon: HALOT
  rationale: Although Hebrew uses singular שנה after numerals in this construction,
    idiomatic English requires the plural 'years' for the total age.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The standard concluding formula in Genesis 5 is preserved straightforwardly.
    'And he died' maintains the repetitive cadence and theological weight of the genealogy.
