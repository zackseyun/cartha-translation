id: GEN.5.6
reference: Genesis 5:6
source:
  edition: WLC
  text: וַֽ/יְחִי שֵׁ֕ת חָמֵ֥שׁ שָׁנִ֖ים וּ/מְאַ֣ת שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת אֱנֽוֹשׁ־־׃
translation:
  text: Seth lived 105 years and fathered Enosh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'became the father of Enosh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical age formulas is idiomatically rendered
    'lived,' indicating the span of years attained before the next event in the genealogy.
- source_word: שֵׁת
  chosen: Seth
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: חָמֵשׁ שָׁנִים וּמְאַת שָׁנָה
  chosen: 105 years
  alternatives:
  - a hundred and five years
  - five years and a hundred years
  lexicon: HALOT
  rationale: The Hebrew number expression literally reads 'five years and a hundred
    year,' a standard construction meaning 105 years. Rendering with Arabic numerals
    gives clear modern English while preserving the sense exactly.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in genealogical contexts commonly denotes begetting/fathering. 'Fathered'
    is accurate and readable modern English; 'begot' is archaic, while 'became the
    father of' is more expansive than needed.
- source_word: אֶת אֱנוֹשׁ
  chosen: Enosh
  alternatives:
  - Enos
  rationale: The direct-object marker אֶת is not represented in English. The personal
    name is transliterated from Hebrew as 'Enosh'; 'Enos' reflects later traditional
    forms but is less directly tied to the Hebrew.
