id: GEN.5.4
reference: Genesis 5:4
source:
  edition: WLC
  text: וַ/יִּֽהְי֣וּ יְמֵי אָדָ֗ם אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת שֵׁ֔ת שְׁמֹנֶ֥ה מֵאֹ֖ת
    שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃
translation:
  text: After he fathered Seth, Adam lived eight hundred years and fathered sons and
    daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the days of Adam ... were eight hundred years' after
      he fathered Seth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: lived
  alternatives:
  - were
  lexicon: HALOT
  rationale: Although the verb is formally 'were,' in the idiom 'the days of Adam
    ... were,' English naturally expresses lifespan duration with 'lived.' This preserves
    the sense without woodenly reproducing the Hebrew copular construction.
- source_word: יְמֵי אָדָם
  chosen: Adam lived
  alternatives:
  - the days of Adam were
  lexicon: HALOT
  rationale: The construct phrase literally means 'the days of Adam,' a common Hebrew
    way of speaking about a person's lifetime. Rendering it as 'Adam lived' communicates
    the idiomatic meaning in clear modern English.
- source_word: אָדָם
  chosen: Adam
  alternatives:
  - man
  lexicon: HALOT
  rationale: Here the term is the personal name of the individual in the genealogy,
    not a generic reference to humankind. Per translation philosophy, personal names
    are transliterated.
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition indicating subsequent time.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד here means 'to beget/father.' 'Fathered' is natural
    modern English and preserves the male-specific sense better than the archaic 'begot.'
- source_word: אֶת שֵׁת
  chosen: Seth
  lexicon: HALOT
  rationale: Direct-object marker plus personal name; English does not represent the
    object marker, so only the name is translated.
- source_word: שְׁמֹנֶה מֵאֹת שָׁנָה
  chosen: eight hundred years
  lexicon: HALOT
  rationale: Straightforward cardinal-number expression for duration of years.
- source_word: וַיּוֹלֶד
  chosen: and fathered
  alternatives:
  - and begot
  - and had
  lexicon: HALOT
  rationale: Same ילד root as earlier in the verse. 'Fathered' maintains lexical consistency
    and preserves the genealogical sense more precisely than the broader 'had.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring. 'Sons and
    daughters' is gender-accurate and should not be flattened to 'children'.
