theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: Adam as a personal name
  alternative_readings:
  - man
  rationale: In this genealogical context, the referent is the named individual Adam,
    not humanity in general. This aligns with the immediate literary context and the
    translation philosophy's distinction between personal names and generic nouns.
