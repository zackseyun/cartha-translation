id: GEN.5.14
reference: Genesis 5:14
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ כָּל יְמֵ֣י קֵינָ֔ן עֶ֣שֶׂר שָׁנִ֔ים וּ/תְשַׁ֥ע מֵא֖וֹת שָׁנָ֑ה
    וַ/יָּמֹֽת־׃ס
translation:
  text: So all the days of Kenan were nine hundred and ten years, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the days of Kenan,' a recurring genealogical formula meaning his
      full lifespan.
    reason: lexical_alternative
  - marker: b
    text: Traditional English forms sometimes spell the name 'Cainan.' The Hebrew
      form here is 'Kenan.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: So ... were
  alternatives:
  - And ... were
  - Now ... were
  lexicon: HALOT
  rationale: The waw-consecutive advances the genealogy formula. 'So' gives natural
    English continuity while preserving the sequential sense without sounding overly
    wooden.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Standard rendering meaning totality; it modifies 'the days' in the genealogical
    summary formula.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  lexicon: HALOT
  rationale: Literally 'days of.' In this formula it denotes the span of life. The
    more literal 'the days of' is retained to preserve the recurring cadence of Genesis
    5 while remaining intelligible.
- source_word: קֵינָן
  chosen: Kenan
  alternatives:
  - Cainan
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Kenan' reflects the Hebrew form more directly; 'Cainan' is a traditional
    form influenced by Greek/English tradition.
- source_word: עֶשֶׂר שָׁנִים וּתְשַׁע מֵאוֹת שָׁנָה
  chosen: nine hundred and ten years
  alternatives:
  - ten years and nine hundred years
  lexicon: HALOT
  rationale: Hebrew number order is idiomatically reversed in English. The singular
    'year' after larger numerals in Hebrew is rendered by normal English plural 'years'.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The standard genealogical closure is rendered directly and simply. Including
    'he' makes the English explicit and natural.
