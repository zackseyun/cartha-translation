id: GEN.5.17
reference: Genesis 5:17
source:
  edition: WLC
  text: וַ/יִּהְיוּ֙ כָּל יְמֵ֣י מַהֲלַלְאֵ֔ל חָמֵ֤שׁ וְ/תִשְׁעִים֙ שָׁנָ֔ה וּ/שְׁמֹנֶ֥ה
    מֵא֖וֹת שָׁנָ֑ה וַ/יָּמֹֽת־׃ס
translation:
  text: So all the days of Mahalalel were eight hundred ninety-five years, and he
    died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a summary statement of total lifespan.
    'Were' is the most natural English equivalent in this genealogical formula.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew in the stock genealogical
    expression 'all the days of ...'.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  lexicon: HALOT
  rationale: A formally close rendering that preserves the repeated genealogy formula.
    'Lifetime' would be smoother but less transparent to the Hebrew idiom.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  rationale: Personal names are transliterated by project policy. 'Mahalalel' is the
    standard English transliteration of the Hebrew name.
- source_word: חָמֵשׁ וְתִשְׁעִים שָׁנָה
  chosen: ninety-five years
  alternatives:
  - five and ninety years
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew number order. Rendering as 'ninety-five
    years' communicates the value accurately in natural modern English.
- source_word: וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  chosen: eight hundred
  alternatives:
  - and eight hundred years
  lexicon: HALOT
  rationale: 'Combined with the previous number phrase to produce standard English
    numbering: ''eight hundred ninety-five years.'' The repeated ''years'' is not
    separately repeated in English because the total number phrase already includes
    it naturally.'
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: This is the standard concluding formula in Genesis 5. 'And he died' preserves
    the solemn repetition and narrative rhythm without adding interpretive nuance.
