id: GEN.5.12
reference: Genesis 5:12
source:
  edition: WLC
  text: וַֽ/יְחִ֥י קֵינָ֖ן שִׁבְעִ֣ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת מַֽהֲלַלְאֵֽל־׃
translation:
  text: Kenan lived seventy years and fathered Mahalalel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Kenan lived seventy years and begot Mahalalel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The waw-consecutive form of חיה in this genealogical formula is most
    naturally rendered 'lived.' English idiom does not require reproducing the narrative
    conjunction separately at the start of the verse.
- source_word: קֵינָן
  chosen: Kenan
  alternatives:
  - Cainan
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Kenan' reflects the Hebrew form directly; 'Cainan' reflects a Greek/traditional
    form.
- source_word: שִׁבְעִים שָׁנָה
  chosen: seventy years
  alternatives:
  - seventy years old
  lexicon: HALOT
  rationale: This accusative of time gives Kenan's age at the begetting. 'Seventy
    years' is concise and natural in English; 'years old' is possible but not required
    because the following verb makes the age reference clear.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  - had
  lexicon: HALOT
  rationale: ילד in genealogical contexts commonly denotes begetting/fathering. 'Fathered'
    preserves the male genealogical sense in clear modern English. 'Begot' is more
    formal/archaic; 'had' is too weak; 'became the father of' is accurate but less
    concise.
- source_word: אֶת
  chosen: '[not separately translated]'
  alternatives:
  - direct-object marker
  lexicon: HALOT
  rationale: אֶת marks the definite direct object in Hebrew and normally has no direct
    English equivalent, so it is represented implicitly in the syntax.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  alternatives:
  - Mahalaleel
  rationale: Personal name transliterated from the Hebrew consonantal form. 'Mahalalel'
    is a standard direct transliteration; the longer traditional English spelling
    'Mahalaleel' is an alternative.
