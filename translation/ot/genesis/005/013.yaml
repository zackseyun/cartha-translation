id: GEN.5.13
reference: Genesis 5:13
source:
  edition: WLC
  text: וַ/יְחִ֣י קֵינָ֗ן אַחֲרֵי֙ הוֹלִיד֣/וֹ אֶת מַֽהֲלַלְאֵ֔ל אַרְבָּעִ֣ים שָׁנָ֔ה
    וּ/שְׁמֹנֶ֥ה מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־׃
translation:
  text: And Kenan lived, after he fathered Mahalalel, eight hundred and forty years,
    and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'begot' for 'fathered' in both occurrences of the
      verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  lexicon: HALOT
  rationale: In Genesis genealogies חיה in the wayyiqtol commonly introduces lifespan
    statements; 'lived' is the natural English rendering.
- source_word: קֵינָן
  chosen: Kenan
  alternatives:
  - Cainan
  rationale: Standard English transliteration from the Hebrew form קֵינָן. 'Cainan'
    reflects Greek/Latin tradition rather than the Hebrew spelling.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking the period subsequent to the birth of Mahalalel.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - his begetting
  lexicon: HALOT
  rationale: ילד in the Hiphil with a male subject means to beget/father. 'Fathered'
    is clear modern English and preserves the male-specific sense better than the
    archaic 'begot'.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Marks Mahalalel as the direct object; it has no direct English equivalent.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  alternatives:
  - Mahalaleel
  rationale: Standard transliteration of the Hebrew personal name.
- source_word: אַרְבָּעִים שָׁנָה וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  chosen: eight hundred and forty years
  alternatives:
  - forty years and eight hundred years
  lexicon: HALOT
  rationale: English idiom naturally reverses the Hebrew order into a single summed
    number while preserving the total lifespan segment stated in the text.
- source_word: וַיּוֹלֶד
  chosen: and he fathered
  alternatives:
  - and he begot
  - and he had
  lexicon: HALOT
  rationale: Repeated use of ילד with male subject. 'Fathered' maintains lexical consistency
    with the earlier occurrence and is more precise than 'had'.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring; 'sons and
    daughters' preserves that detail better than the generic 'children'.
