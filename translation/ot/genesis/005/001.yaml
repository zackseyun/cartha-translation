id: GEN.5.1
reference: Genesis 5:1
source:
  edition: WLC
  text: זֶ֣ה סֵ֔פֶר תּוֹלְדֹ֖ת אָדָ֑ם בְּ/י֗וֹם בְּרֹ֤א אֱלֹהִים֙ אָדָ֔ם בִּ/דְמ֥וּת
    אֱלֹהִ֖ים עָשָׂ֥ה אֹתֽ/וֹ׃
translation:
  text: This is the book of the generations of Adam. In the day God created man, he
    made him in the likeness of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When God created man.' The Hebrew idiom 'in the day' can function temporally
      as 'when.'
    reason: lexical_alternative
  - marker: b
    text: The first 'Adam' is the personal name; the second occurrence of the Hebrew
      word can also be rendered 'humankind' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Introduces the heading demonstratively; English idiom naturally supplies
    'is' in this nominal clause.
- source_word: סֵפֶר
  chosen: book
  alternatives:
  - record
  - account
  - scroll
  lexicon: HALOT
  rationale: The noun denotes a written document or record. 'Book' preserves the formal
    heading style and matches the concrete sense without over-interpreting the medium.
- source_word: תּוֹלְדֹת
  chosen: generations
  alternatives:
  - account of the descendants
  - family history
  - genealogical record
  lexicon: HALOT
  rationale: Toledot is a key Genesis term that can denote generations, descendants,
    or the account arising from them. 'Generations' preserves the established structural
    term in Genesis while remaining transparent enough in context.
- source_word: אָדָם
  chosen: Adam
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Here the phrase 'book of the generations of Adam' functions as a genealogical
    heading tied to the named ancestor in the following genealogy, so the proper-name
    sense is best.
- source_word: בְּיוֹם
  chosen: In the day
  alternatives:
  - When
  - On the day
  lexicon: HALOT
  rationale: The Hebrew idiom can mean 'when,' but 'In the day' preserves the formal
    resonance with Genesis 1–2 and remains intelligible in modern English.
- source_word: בְּרֹא
  chosen: created
  alternatives:
  - when ... created
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed preposition expresses temporal circumstance:
    ''in the day [of] creating.'' Rendered smoothly in English as part of the temporal
    clause.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: With singular verbal sense in this context, the standard rendering is
    'God.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  lexicon: HALOT
  rationale: This second occurrence is common noun rather than proper name, referring
    to humanity represented in the male singular. Per doctrine, gender-accurate rendering
    is preferred over flattening to a neutral term where the source uses masculine
    representative language.
- source_word: בִּדְמוּת
  chosen: in the likeness of
  alternatives:
  - according to the likeness of
  - in the image of
  lexicon: HALOT
  rationale: The noun דְּמוּת means likeness, resemblance, or form. 'Likeness' is
    the direct lexical match and preserves the echo of Genesis 1:26 without conflating
    it with 'image' (צֶלֶם), which is not used here.
- source_word: עָשָׂה אֹתוֹ
  chosen: he made him
  alternatives:
  - he made man
  - he fashioned him
  lexicon: HALOT
  rationale: עשה is broader than 'create' and is well rendered 'made.' The pronominal
    object is singular masculine, so 'him' preserves the representative singular of
    the Hebrew.
