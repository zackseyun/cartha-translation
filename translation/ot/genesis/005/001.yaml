theological_decisions:
- issue: Rendering of אָדָם in two different senses within the same verse
  chosen_reading: Proper name 'Adam' in the heading; common noun 'man' in the creation
    clause
  alternative_readings:
  - '''humankind'' in the creation clause'
  - '''Adam'' in both occurrences'
  rationale: The first occurrence is best read as the named ancestor because the verse
    heads a genealogy. The second occurrence echoes the creation account and uses
    אדם generically/representatively. Rendering it 'man' preserves the Hebrew's gendered
    representative singular per the doctrine's gender-accurate principle, while avoiding
    the confusion of making both occurrences proper names.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)''.'
- issue: Relation of 'likeness of God' to Genesis creation language
  chosen_reading: Retain 'likeness' rather than harmonizing to 'image'
  alternative_readings:
  - '''image of God'''
  rationale: The Hebrew here uses דְּמוּת, not צֶלֶם. Preserving 'likeness' avoids
    importing wording from adjacent passages and keeps the textual nuance visible.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve theological tension rather than resolve it.'
