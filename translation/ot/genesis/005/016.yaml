id: GEN.5.16
reference: Genesis 5:16
source:
  edition: WLC
  text: וַֽ/יְחִ֣י מַֽהֲלַלְאֵ֗ל אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת יֶ֔רֶד שְׁלֹשִׁ֣ים שָׁנָ֔ה
    וּ/שְׁמֹנֶ֥ה מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־׃
translation:
  text: After he fathered Jared, Mahalalel lived eight hundred and thirty years and
    fathered sons and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in this genealogy formula denotes continued lifespan
    after the birth of the named son. 'Lived' is the standard natural English rendering.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking the period subsequent to the begetting of
    Jared.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - his fathering of
  lexicon: HALOT
  rationale: ילד in the Hiphil with a masculine subject means 'to father, beget.'
    'Fathered' is clear modern English and preserves the male parental role better
    than the archaic 'begot.'
- source_word: יֶרֶד
  chosen: Jared
  alternatives:
  - Jered
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁלֹשִׁים שָׁנָה וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  chosen: eight hundred and thirty years
  alternatives:
  - thirty years and eight hundred years
  lexicon: HALOT
  rationale: The Hebrew presents the number as 'thirty year and eight hundred year.'
    English idiom reverses to 'eight hundred and thirty years' while preserving the
    total.
- source_word: וַיּוֹלֶד
  chosen: and fathered
  alternatives:
  - and begot
  - and had
  lexicon: HALOT
  rationale: Repeated genealogical verb from ילד. 'Fathered' maintains lexical consistency
    with the earlier occurrence and is more precise than 'had.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring; 'sons and
    daughters' preserves that detail better than the more general 'children'.
