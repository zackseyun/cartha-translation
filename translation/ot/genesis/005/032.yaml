theological_decisions:
- issue: Birth-order implication in the sequence 'Shem, Ham, and Japheth'
  chosen_reading: Retain the Hebrew order of names without implying that all three were born when Noah turned five hundred.
  alternative_readings:
  - Reorder the names to reflect probable birth order
  - Translate in a way that suggests all three sons were born in Noah's five-hundredth year
  rationale: The verse states that Noah was five hundred years old and then fathered these sons, but in the broader narrative the listed order is not necessarily strict birth order, nor does the wording require that all three were born in the same year. Preserving the Hebrew order without explanatory expansion avoids importing a harmonization into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/005/032.json
  category: awkward_english
  tier: 1
  from: Noah fathered
  to: he fathered
  rationale: The repetition of 'Noah' is a feature of Hebrew narrative style but is slightly redundant in English when the subject of the main clause is clear from the preceding subordinate clause. Using the pronoun 'he' would create a more natural and fluid English sentence without any loss of meaning.
