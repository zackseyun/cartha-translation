id: GEN.5.32
reference: Genesis 5:32
source:
  edition: WLC
  text: וַֽ/יְהִי נֹ֕חַ בֶּן חֲמֵ֥שׁ מֵא֖וֹת שָׁנָ֑ה וַ/יּ֣וֹלֶד נֹ֔חַ אֶת שֵׁ֖ם אֶת חָ֥ם וְ/אֶת יָֽפֶת־־־־־׃
translation:
  text: When Noah was five hundred years old, he fathered Shem, Ham, and Japheth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The order 'Shem, Ham, and Japheth' follows the Hebrew text; this sequence does not necessarily indicate birth order or that all three were born in the same year.
    reason: cross_reference
  - marker: b
    text: Or 'Noah fathered'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: When ... was
  alternatives:
  - And it came to pass
  - And Noah was
  lexicon: HALOT
  rationale: The waw-consecutive of היה here introduces a temporal circumstance rather than needing a wooden narrative formula. 'When Noah was' is natural English and preserves the clause's function.
- source_word: בֶּן חֲמֵשׁ מֵאוֹת שָׁנָה
  chosen: five hundred years old
  alternatives:
  - a son of five hundred years
  - five hundred years
  lexicon: HALOT
  rationale: The idiom בן + number + שנה expresses age. 'Five hundred years old' is the standard natural equivalent in English.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  - had
  lexicon: HALOT
  rationale: ילד in the Hiphil with a male subject means 'to father, beget.' 'Fathered' is accurate, readable modern English. 'Begot' is archaic; 'had' is too weak and less precise.
- source_word: אֶת שֵׁם אֶת חָם וְאֶת יָפֶת
  chosen: Shem, Ham, and Japheth
  alternatives:
  - Shem and Ham and Japheth
  lexicon: HALOT
  rationale: The direct-object markers are not translated in English. The coordinated list is rendered with standard English punctuation and conjunction.
- source_word: נֹחַ
  chosen: Noah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: שֵׁם
  chosen: Shem
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
- source_word: חָם
  chosen: Ham
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
- source_word: יָפֶת
  chosen: Japheth
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
