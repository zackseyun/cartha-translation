id: GEN.5.5
reference: Genesis 5:5
source:
  edition: WLC
  text: וַ/יִּֽהְי֞וּ כָּל יְמֵ֤י אָדָם֙ אֲשֶׁר חַ֔י תְּשַׁ֤ע מֵאוֹת֙ שָׁנָ֔ה וּ/שְׁלֹשִׁ֖ים
    שָׁנָ֑ה וַ/יָּמֹֽת־־׃ס
translation:
  text: So all the days of Adam that he lived were nine hundred and thirty years,
    and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Adam can mean 'man' or 'humankind' in some contexts, but here it
      refers to the individual Adam in the genealogy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  lexicon: HALOT
  rationale: 'In this genealogical summary formula, the waw-consecutive form of היה
    functions idiomatically to state the total lifespan: ''were.'' ''Came to be''
    would be overly wooden in English.'
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - the whole lifespan of
  lexicon: HALOT
  rationale: A formal rendering preserves the recurring genealogy formula and the
    Hebrew idiom that counts a person's life in 'days.'
- source_word: אָדָם
  chosen: Adam
  alternatives:
  - man
  lexicon: HALOT
  rationale: Here the term is the personal name of the individual in the genealogy,
    not a generic reference to humankind. Per translation philosophy, personal names
    are transliterated. Although אָדָם can mean 'man/humankind' in other contexts,
    here the proper-name sense is primary.
- source_word: אֲשֶׁר חַי
  chosen: that he lived
  alternatives:
  - which he lived
  - during which he lived
  lexicon: HALOT
  rationale: This relative clause modifies 'days' and is best rendered in natural
    English as 'that he lived.' It preserves the Hebrew sense without awkwardness.
- source_word: תְּשַׁע מֵאוֹת ... וּשְׁלֹשִׁים שָׁנָה
  chosen: nine hundred and thirty years
  alternatives:
  - 930 years
  lexicon: HALOT
  rationale: The full written-out number matches the literary register of the genealogy
    and reflects the Hebrew cardinal construction.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: This is the standard concluding formula in Genesis 5. 'And he died' preserves
    the stark repetition and theological weight of mortality after the fall. 'Then
    he died' is possible but adds a temporal nuance not required by the Hebrew.
