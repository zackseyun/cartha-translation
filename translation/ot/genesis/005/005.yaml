theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: Adam as a personal name
  alternative_readings:
  - man
  rationale: Although אָדָם is a contested term in the project glossary and can mean
    'man' or 'humankind' by context, Genesis 5:5 is within a genealogy and refers
    to the named individual Adam. Translating it as 'man' here would obscure the genealogical
    reference.
  doctrine_reference: 'DOCTRINE.md: ''אָדָם adam | man / humankind (context)'' and
    ''Translate titles; transliterate names.'''
- issue: Preservation of mortality formula
  chosen_reading: and he died
  rationale: The verse closes with the repeated genealogy refrain emphasizing human
    mortality. The translation preserves this without softening or paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
