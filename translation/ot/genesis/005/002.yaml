theological_decisions:
- issue: Rendering of אָדָם in a collective human-identity context
  chosen_reading: Man
  alternative_readings:
  - Adam
  - humankind
  - mankind
  rationale: The verse states that God gave the human pair one collective name. The
    Hebrew אָדָם can denote humanity collectively or function as the proper name Adam.
    Because the immediate context includes both male and female together, the collective
    sense is primary in the main text. A footnote preserves 'Adam' as a viable alternative
    because the Hebrew form is identical and the surrounding genealogy uses Adam as
    a personal name.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
