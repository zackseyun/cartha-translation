id: GEN.5.2
reference: Genesis 5:2
source:
  edition: WLC
  text: זָכָ֥ר וּ/נְקֵבָ֖ה בְּרָאָ֑/ם וַ/יְבָ֣רֶךְ אֹתָ֗/ם וַ/יִּקְרָ֤א אֶת שְׁמָ/ם֙
    אָדָ֔ם בְּ/י֖וֹם הִבָּֽרְאָֽ/ם־׃ס
translation:
  text: Male and female he created them, and he blessed them and called their name
    Man on the day they were created.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Adam. The word can mean 'man' or 'humankind' collectively, and it
      is also the personal name Adam.
    reason: alternative_reading
lexical_decisions:
- source_word: זָכָר
  chosen: Male
  alternatives:
  - a male
  - man
  lexicon: HALOT
  rationale: Predicate term paired with נְקֵבָה; 'male' is the most direct and gender-accurate
    rendering in this creation context.
- source_word: נְקֵבָה
  chosen: female
  alternatives:
  - a female
  - woman
  lexicon: HALOT
  rationale: Paired biological/sexed counterpart to זָכָר; 'female' preserves the
    lexical symmetry of the Hebrew better than 'woman'.
- source_word: בְּרָאָם
  chosen: he created them
  alternatives:
  - he had created them
  lexicon: HALOT
  rationale: Qal perfect of ברא with 3mp suffix refers to God's creating the pair.
    Simple past fits the narrative summary.
- source_word: וַיְבָרֶךְ אֹתָם
  chosen: and he blessed them
  alternatives:
  - and he pronounced blessing on them
  lexicon: HALOT
  rationale: Standard rendering of ברך in this context; concise and natural while
    preserving the divine action.
- source_word: וַיִּקְרָא אֶת־שְׁמָם
  chosen: and called their name
  alternatives:
  - and named them
  - and called them
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'called their name'; this slightly formal
    English preserves the singular 'name' with plural suffix, which is significant
    for the following term אָדָם.
- source_word: אָדָם
  chosen: Man
  alternatives:
  - Adam
  - humankind
  - mankind
  lexicon: HALOT
  rationale: In this verse the term functions collectively for the human pair, not
    merely as the male individual. Per doctrine, אָדָם is rendered 'man / humankind'
    by context. 'Man' preserves the singular collective force and echoes the naming
    formula, while the alternative 'Adam' is worth preserving because the Hebrew form
    is identical and some readers take it as a proper name here.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  - in the day
  lexicon: HALOT
  rationale: Literal enough to preserve the temporal framing, while remaining idiomatic
    English.
- source_word: הִבָּרְאָם
  chosen: they were created
  alternatives:
  - their creation
  - he created them
  lexicon: HALOT
  rationale: Niphal infinitive construct with suffix is naturally rendered as a passive
    verbal clause in English; this preserves the passive sense of the Hebrew.
