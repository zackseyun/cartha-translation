id: GEN.5.19
reference: Genesis 5:19
source:
  edition: WLC
  text: וַֽ/יְחִי יֶ֗רֶד אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת חֲנ֔וֹךְ שְׁמֹנֶ֥ה מֵא֖וֹת שָׁנָ֑ה
    וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃
translation:
  text: And Yered lived eight hundred years after he fathered Hanokh, and he fathered
    sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English forms of the names are 'Jared' and 'Enoch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - continued to live
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulae is idiomatically rendered
    'lived,' indicating the span of life during the period specified.
- source_word: יֶרֶד
  chosen: Yered
  alternatives:
  - Jared
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Yered' reflects the Hebrew form more directly, while 'Jared' is the
    traditional English form.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition marking the period subsequent to the birth
    of the named son.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - the birth of his son
  lexicon: HALOT
  rationale: Hiphil of ילד with a masculine subject in genealogies is best rendered
    'fathered' in clear modern English. 'Begot' is more traditional but archaic.
- source_word: אֶת חֲנוֹךְ
  chosen: Hanokh
  alternatives:
  - Enoch
  lexicon: HALOT
  rationale: Direct-object marker plus personal name. The name is transliterated from
    Hebrew as 'Hanokh' rather than using the traditional Anglicized form 'Enoch,'
    in keeping with original-language primacy and the policy to transliterate names.
- source_word: שְׁמֹנֶה מֵאוֹת שָׁנָה
  chosen: eight hundred years
  alternatives:
  - eight hundred year(s)
  lexicon: HALOT
  rationale: This numeral phrase denotes duration of life. English idiom requires
    the plural 'years' with round numbers of this kind.
- source_word: וַיּוֹלֶד
  chosen: and he fathered
  alternatives:
  - and he begot
  - and he had
  lexicon: HALOT
  rationale: Repeated genealogical verb from ילד. 'Fathered' preserves the male parental
    role explicitly and is more precise than the broader 'had.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female offspring. 'Sons and
    daughters' preserves that specificity better than the generic 'children'.
