id: GEN.5.15
reference: Genesis 5:15
source:
  edition: WLC
  text: וַֽ/יְחִ֣י מַֽהֲלַלְאֵ֔ל חָמֵ֥שׁ שָׁנִ֖ים וְ/שִׁשִּׁ֣ים שָׁנָ֑ה וַ/יּ֖וֹלֶד
    אֶת יָֽרֶד־׃
translation:
  text: Mahalalel lived sixty-five years and fathered Jared.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulae is idiomatically rendered
    'lived,' indicating the span of years attained before the next event.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  alternatives:
  - Mahalaleel
  rationale: Personal names are transliterated rather than translated, following the
    project's policy. 'Mahalalel' is a standard English transliteration of the Hebrew
    name.
- source_word: חָמֵשׁ שָׁנִים וְשִׁשִּׁים שָׁנָה
  chosen: sixty-five years
  alternatives:
  - five and sixty years
  lexicon: HALOT
  rationale: Hebrew expresses the number as 'five years and sixty year'; idiomatic
    modern English reverses the order to 'sixty-five years' while preserving the exact
    value.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in genealogies commonly denotes siring or begetting. 'Fathered' is
    clear modern English, more readable than 'begot,' and more concise than 'became
    the father of,' while preserving the male genealogical sense.
- source_word: אֶת יָרֶד
  chosen: Jared
  alternatives:
  - Yered
  rationale: The direct-object marker אֶת is untranslated in English. The personal
    name is transliterated by standard convention as 'Jared.'
