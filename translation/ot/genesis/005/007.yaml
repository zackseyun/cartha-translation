id: GEN.5.7
reference: Genesis 5:7
source:
  edition: WLC
  text: וַֽ/יְחִי שֵׁ֗ת אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת אֱנ֔וֹשׁ שֶׁ֣בַע שָׁנִ֔ים וּ/שְׁמֹנֶ֥ה
    מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃
translation:
  text: After he fathered Enosh, Seth lived eight hundred and seven years and fathered
    sons and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in this genealogy reports the duration of Seth's
    life after a specified event. 'Lived' is the natural English equivalent in genealogical
    formulae.
- source_word: אֲחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal marker introducing the period subsequent to the birth of Enosh.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - his begetting
  - he became the father of
  lexicon: HALOT
  rationale: Hiphil of ילד with 3ms suffix means 'his fathering/begetting.' In smooth
    English, 'after he fathered Enosh' preserves the male subject and genealogical
    sense better than the more wooden 'after his begetting Enosh.'
- source_word: אֶת אֱנוֹשׁ
  chosen: Enosh
  lexicon: HALOT
  rationale: Direct object marker plus proper name; the name is transliterated per
    project policy.
- source_word: שֶׁבַע שָׁנִים וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  chosen: eight hundred and seven years
  alternatives:
  - seven years and eight hundred years
  lexicon: HALOT
  rationale: Hebrew gives the smaller number before the hundreds, but idiomatic English
    reverses this to 'eight hundred and seven years' while preserving the total. 'Years'
    is supplied once in natural English for the full numeral expression.
- source_word: וַיּוֹלֶד
  chosen: and fathered
  alternatives:
  - and became the father of
  - and begot
  lexicon: HALOT
  rationale: Repeated genealogical verb ילד is rendered consistently with 'fathered.'
    'Begot' is traditional but archaic for the target audience.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring; 'sons and
    daughters' is more precise than the generic 'children' and preserves the source
    wording.
