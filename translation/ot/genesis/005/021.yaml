id: GEN.5.21
reference: Genesis 5:21
source:
  edition: WLC
  text: וַֽ/יְחִ֣י חֲנ֔וֹךְ חָמֵ֥שׁ וְ/שִׁשִּׁ֖ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת מְתוּשָֽׁלַח־׃
translation:
  text: Enoch lived sixty-five years and fathered Methuselah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in the genealogy formula denotes the span of life
    up to the begetting event. 'Lived' is the standard, natural English rendering
    in this context.
- source_word: חֲנוֹךְ
  chosen: Enoch
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: חָמֵשׁ וְשִׁשִּׁים שָׁנָה
  chosen: sixty-five years
  alternatives:
  - sixty and five years
  rationale: English idiom reverses the Hebrew number order. 'Sixty-five years' is
    clear modern English while preserving the age statement.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts ילד with a male subject means to beget/father
    a child. 'Fathered' is concise, natural modern English, and more readable than
    archaic 'begot' while remaining more direct than the expanded 'became the father
    of'.
- source_word: אֶת
  chosen: '[not separately translated]'
  rationale: This is the direct-object marker in Hebrew and has no direct English
    equivalent, so it is represented implicitly by English word order.
- source_word: מְתוּשָׁלַח
  chosen: Methuselah
  rationale: Personal name is transliterated by standard English convention.
