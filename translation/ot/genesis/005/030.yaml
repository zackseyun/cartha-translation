  from: lived, after he fathered Noah, five hundred and ninety-five years
  to: lived five hundred and ninety-five years after he fathered Noah
  rationale: The current word order follows the Hebrew syntax closely but is awkward in English, as it separates the verb 'lived' from its duration ('five hundred and ninety-five years') with an intervening clause. Reordering the phrases to place the duration immediately after the verb creates a more natural and readable English sentence without changing the meaning.
