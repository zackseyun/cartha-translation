id: GEN.5.30
reference: Genesis 5:30
source:
  edition: WLC
  text: וַֽ/יְחִי לֶ֗מֶךְ אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת נֹ֔חַ חָמֵ֤שׁ וְ/תִשְׁעִים֙ שָׁנָ֔ה וַ/חֲמֵ֥שׁ מֵאֹ֖ת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃
translation:
  text: And Lamech lived five hundred and ninety-five years after he fathered Noah, and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived, after he fathered Noah, five hundred and ninety-five years'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  lexicon: HALOT
  rationale: In the genealogical formula of Genesis 5, חיה in the wayyiqtol commonly denotes the span of life lived after a named event. 'Lived' is the standard, natural English rendering in this context.
- source_word: אַֽחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking the period subsequent to Noah's birth; 'after' is the plain and idiomatic choice.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - the birth of his son
  lexicon: HALOT
  rationale: ילד in the Hiphil with a masculine subject in genealogies means 'to father/beget.' 'He fathered' is more readable modern English than 'begot' while preserving the male parental sense.
- source_word: נֹחַ
  chosen: Noah
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: חָמֵשׁ וְתִשְׁעִים ... וַחֲמֵשׁ מֵאוֹת שָׁנָה
  chosen: five hundred and ninety-five years
  alternatives:
  - five and ninety years and five hundred years
  lexicon: HALOT
  rationale: 'The Hebrew expresses 95 + 500 years. English idiom reverses the order into a single cardinal expression: ''five hundred and ninety-five years.'' This preserves the total while avoiding wooden phrasing.'
- source_word: שָׁנָה
  chosen: years
  alternatives:
  - year
  lexicon: HALOT
  rationale: Though singular in form after numerals in Hebrew usage, the sense in English is plural here.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: Same genealogical verb as earlier in the verse. 'Fathered' keeps lexical consistency and preserves the specifically paternal nuance better than the broader 'had.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names male and female offspring. 'Sons and daughters' is gender-accurate and should not be flattened to 'children'.
