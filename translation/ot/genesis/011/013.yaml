  to: Arpachshad lived 403 years after he fathered Shelah, and he fathered sons and daughters.
  rationale: The current word order, while closely following the Hebrew syntax, is awkward in English. It separates the verb 'lived' from its duration '403 years' with the intervening clause 'after he fathered Shelah'. This makes the sentence slightly difficult to parse. Reordering the clauses to place the duration immediately after the verb ('lived 403 years') creates a more natural and clear English sentence without changing the meaning.
