id: GEN.11.13
reference: Genesis 11:13
source:
  edition: WLC
  text: וַֽ/יְחִ֣י אַרְפַּכְשַׁ֗ד אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת שֶׁ֔לַח שָׁלֹ֣שׁ שָׁנִ֔ים וְ/אַרְבַּ֥ע מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־׃ס
translation:
  text: Arpachshad lived 403 years after he fathered Shelah, and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Arpachshad lived, after he fathered Shelah, 403 years, and he fathered sons and daughters.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: In genealogical formulae חיה commonly denotes continued lifespan. 'Lived' is the standard, natural English rendering here.
- source_word: אַרְפַּכְשַׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  rationale: Personal names are transliterated by standard conventions. 'Arpachshad' reflects the Hebrew form more directly than the traditional Greek-influenced 'Arphaxad.'
- source_word: אַֽחֲרֵי הוֹלִידוֹ
  chosen: after he fathered
  alternatives:
  - after he became the father of
  - after he begot
  lexicon: HALOT
  rationale: The construction marks time subsequent to the begetting of the named son. 'Fathered' is concise, natural modern English and preserves the male-specific sense of the Hiphil of ילד.
- source_word: אֶת שֶׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  rationale: Direct-object marker is untranslated in English. The name is transliterated from the Hebrew as 'Shelah.'
- source_word: שָׁלֹשׁ שָׁנִים וְאַרְבַּע מֵאוֹת שָׁנָה
  chosen: 403 years
  alternatives:
  - four hundred and three years
  - three years and four hundred years
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew number order into '403 years' (or 'four hundred and three years'). Using numerals improves readability while preserving the exact figure.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: In this genealogical context ילד refers to procreation from the male subject. 'Fathered' is more precise than 'had' and more readable than 'begot.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies both male and female offspring; 'sons and daughters' preserves that detail better than the generic 'children.'
