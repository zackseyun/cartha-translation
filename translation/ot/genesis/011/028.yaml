id: GEN.11.28
reference: Genesis 11:28
source:
  edition: WLC
  text: וַ/יָּ֣מָת הָרָ֔ן עַל פְּנֵ֖י תֶּ֣רַח אָבִ֑י/ו בְּ/אֶ֥רֶץ מוֹלַדְתּ֖/וֹ בְּ/א֥וּר
    כַּשְׂדִּֽים־׃
translation:
  text: And Haran died in the presence of Terah his father, in the land of his birth,
    in Ur of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before Terah his father,' that is, while his father was still alive.
      The Hebrew idiom literally reads 'upon the face of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - came to die
  - was dead
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates a past event straightforwardly; 'died' is the
    natural English narrative equivalent.
- source_word: עַל־פְּנֵי
  chosen: in the presence of
  alternatives:
  - before
  - while his father was still alive
  lexicon: HALOT
  rationale: The idiom literally means 'upon the face of' and in this context indicates
    dying before or in the sight/presence of his father. 'In the presence of' preserves
    the concrete Hebrew idiom without over-interpreting it as merely temporal.
- source_word: תֶּרַח אָבִיו
  chosen: Terah his father
  alternatives:
  - his father Terah
  lexicon: HALOT
  rationale: The construct with pronominal suffix identifies Terah as Haran's father.
    'Terah his father' follows the Hebrew order smoothly enough in English.
- source_word: בְּאֶרֶץ מוֹלַדְתּוֹ
  chosen: in the land of his birth
  alternatives:
  - in his native land
  - in the land where he was born
  lexicon: HALOT
  rationale: מוֹלֶדֶת refers to birthplace/native origin. 'Land of his birth' is clear,
    fairly literal, and preserves the genitival sense.
- source_word: בְּאוּר כַּשְׂדִּים
  chosen: in Ur of the Chaldeans
  alternatives:
  - in Ur Chaldea
  - in Ur of the Chaldees
  lexicon: HALOT
  rationale: אוּר is a place name and is transliterated; כַּשְׂדִּים is the ethnonym
    'Chaldeans.' 'Ur of the Chaldeans' is the standard and accurate English rendering
    of the place designation.
