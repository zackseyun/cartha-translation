id: GEN.11.31
reference: Genesis 11:31
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח תֶּ֜רַח אֶת אַבְרָ֣ם בְּנ֗/וֹ וְ/אֶת ל֤וֹט בֶּן הָרָן֙ בֶּן בְּנ֔/וֹ
    וְ/אֵת֙ שָׂרַ֣י כַּלָּת֔/וֹ אֵ֖שֶׁת אַבְרָ֣ם בְּנ֑/וֹ וַ/יֵּצְא֨וּ אִתָּ֜/ם מֵ/א֣וּר
    כַּשְׂדִּ֗ים לָ/לֶ֨כֶת֙ אַ֣רְצָ/ה כְּנַ֔עַן וַ/יָּבֹ֥אוּ עַד חָרָ֖ן וַ/יֵּ֥שְׁבוּ
    שָֽׁם־־־־־׃
translation:
  text: Terah took Abram his son, Lot the son of Haran, his grandson, and Sarai his
    daughter-in-law, the wife of Abram his son, and they went out with them from Ur
    of the Chaldeans to go to the land of Canaan. They came as far as Haran and settled
    there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lot son of Haran, son of his son''; that is, Lot was Terah''s
      grandson.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and they came to Haran and lived there.' The Hebrew more literally says,
      'and they came as far as Haran and settled there.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and they went out with them'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took along
  - took with him
  lexicon: HALOT
  rationale: Basic sense of לקח is 'take.' 'Took' preserves the narrative simplicity;
    the accompanying objects and later plural verb make clear he gathered these family
    members for departure.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation for Abram in relation to Terah; gender-accurate
    and formally close.
- source_word: לוֹט בֶּן הָרָן בֶּן בְּנוֹ
  chosen: Lot the son of Haran, his grandson
  alternatives:
  - Lot son of Haran, the son of his son
  - Lot son of Haran, his son's son
  lexicon: HALOT
  rationale: The Hebrew apposition literally identifies Lot as 'son of Haran, son
    of his son.' In idiomatic English, 'his grandson' communicates the relationship
    clearly while retaining the intermediate identification 'son of Haran.'
- source_word: כַּלָּתוֹ
  chosen: his daughter-in-law
  lexicon: HALOT
  rationale: כלה here denotes Terah's daughter-in-law. 'Daughter-in-law' is the natural
    and precise English equivalent.
- source_word: אֵשֶׁת אַבְרָם בְּנוֹ
  chosen: the wife of Abram his son
  alternatives:
  - Abram his son's wife
  lexicon: HALOT
  rationale: This apposition clarifies Sarai's relation within the family. The chosen
    wording is clear modern English and close to the Hebrew structure.
- source_word: וַיֵּצְאוּ
  chosen: they went out
  alternatives:
  - he went out
  - they set out
  lexicon: HALOT
  rationale: The verb is plural in the Masoretic Text, so the subject is the traveling
    group rather than Terah alone. 'Went out' reflects יצא well in travel context.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The 3mp pronominal suffix yields 'with them.' Though the referent is
    somewhat awkward in English after a list of direct objects, it should be preserved
    rather than emended away. It likely marks accompaniment within the family group.
- source_word: מֵאוּר כַּשְׂדִּים
  chosen: from Ur of the Chaldeans
  alternatives:
  - from Ur of the Chaldees
  lexicon: HALOT
  rationale: Standard rendering of the place name and gentilic. 'Chaldeans' is contemporary
    English; 'Chaldees' is archaic.
- source_word: לָלֶכֶת אַרְצָה כְּנַעַן
  chosen: to go to the land of Canaan
  alternatives:
  - to go toward the land of Canaan
  - to go into the land of Canaan
  lexicon: HALOT
  rationale: The infinitive plus directional ending on אֶרֶץ expresses purpose/destination.
    'To go to the land of Canaan' is natural and sufficiently formal.
- source_word: וַיָּבֹאוּ עַד חָרָן
  chosen: when they came as far as Haran
  alternatives:
  - they came to Haran
  - they arrived at Haran
  lexicon: HALOT
  rationale: עַד suggests 'as far as' rather than simply arrival at a destination.
    The temporal connective 'when' smooths the transition into the next clause in
    English.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: they settled there
  alternatives:
  - they dwelt there
  - they lived there
  - they stayed there
  lexicon: HALOT
  rationale: ישב in settlement context often means to dwell or settle. 'Settled there'
    fits the migration narrative better than the more temporary 'stayed there.'
- source_word: וַ
  chosen: But when
  alternatives:
  - and
  - then
  lexicon: HALOT
  rationale: 'The waw before וַיָּבֹאוּ is formally ''and,'' but in English a mild
    adversative/transition captures the narrative turn: they intended Canaan, yet
    stopped in Haran. This is an optimal-equivalence adjustment, not a theological
    addition.'
