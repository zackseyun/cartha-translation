  from: and they went out with them
  to: and they set out together
  rationale: The MT wa-yeṣʾu ittam is a known textual crux — subject 'they' and object
    'them' refer to overlapping people. 'They set out together' captures the sense
    without the confusing self-reference. (SP and LXX reflect a variant with single-subject
    phrasing.)
