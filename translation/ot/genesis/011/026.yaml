id: GEN.11.26
reference: Genesis 11:26
source:
  edition: WLC
  text: וַֽ/יְחִי תֶ֖רַח שִׁבְעִ֣ים שָׁנָ֑ה וַ/יּ֨וֹלֶד֙ אֶת אַבְרָ֔ם אֶת נָח֖וֹר
    וְ/אֶת הָרָֽן־־־־׃
translation:
  text: Terah lived seventy years and fathered Abram, Nahor, and Haran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more woodenly, 'became the father of.' The Hebrew genealogical verb
      does not require that the sons were born in the exact order listed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - came to live
  lexicon: HALOT
  rationale: From חיה in the wayyiqtol, the idiomatic genealogical sense is that Terah
    reached or lived to the stated age. 'Lived' is natural modern English and preserves
    the temporal force before the begetting notice.
- source_word: שִׁבְעִים שָׁנָה
  chosen: seventy years
  alternatives:
  - seventy years old
  lexicon: HALOT
  rationale: The Hebrew literally gives 'seventy years.' English can supply 'old,'
    but 'lived seventy years' already conveys age reached, so 'seventy years' is sufficiently
    clear and slightly closer to the source wording.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  - had
  lexicon: HALOT
  rationale: ילד in genealogical contexts commonly means 'became the father of' rather
    than focusing on the birthing act. 'Fathered' is concise, accurate, and more readable
    than archaic 'begot,' while more precise than simply 'had.'
- source_word: אֶת ... אֶת ... וְאֶת
  chosen: Abram, Nahor, and Haran
  alternatives:
  - Abram and Nahor and Haran
  lexicon: HALOT
  rationale: The repeated object marker marks each named son individually. Standard
    English list style renders this naturally with commas and a final 'and' without
    loss of meaning.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: נָחוֹר
  chosen: Nahor
  rationale: Personal name transliterated by standard English convention.
- source_word: הָרָן
  chosen: Haran
  rationale: Personal name transliterated by standard English convention. The prefixed
    article is part of the orthography of the name here and is not translated as a
    separate English article.
