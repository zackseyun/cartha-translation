theological_decisions:
- issue: Genealogical sequencing and age implication
  chosen_reading: 'The verse is rendered straightforwardly as a genealogical notice:
    at age seventy Terah fathered Abram, Nahor, and Haran, without specifying birth
    order beyond the literary listing.'
  alternative_readings:
  - The listed names reflect strict birth order
  - The verse means Terah began fathering sons at seventy, with the three named as
    principal descendants rather than necessarily triplets or immediate sequence
  rationale: The Hebrew states that Terah lived seventy years and fathered these sons,
    but does not itself settle all chronological questions raised by comparison with
    later verses. The translation preserves the wording without importing a harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it.
