id: GEN.11.9
reference: Genesis 11:9
source:
  edition: WLC
  text: עַל כֵּ֞ן קָרָ֤א שְׁמָ/הּ֙ בָּבֶ֔ל כִּי שָׁ֛ם בָּלַ֥ל יְהוָ֖ה שְׂפַ֣ת כָּל
    הָ/אָ֑רֶץ וּ/מִ/שָּׁם֙ הֱפִיצָ֣/ם יְהוָ֔ה עַל פְּנֵ֖י כָּל הָ/אָֽרֶץ־־־־־׃פ
translation:
  text: Therefore its name was called Babel, because there the LORD confused the language
    of all the earth, and from there the LORD scattered them over the face of all
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Babel sounds like the Hebrew verb for 'confused' or 'mixed' (balal), which
      explains the name in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: A standard inferential phrase introducing the explanation of the name.
    'Therefore' is concise and natural while preserving the causal force.
- source_word: קָרָא שְׁמָהּ
  chosen: its name was called
  alternatives:
  - he called its name
  - it was named
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'he called its name.' English commonly
    uses a passive equivalent for naming formulas. 'Its name was called' preserves
    the formal flavor more closely than the smoother 'it was named' while avoiding
    an unspecified subject.
- source_word: בָּבֶל
  chosen: Babel
  lexicon: HALOT
  rationale: A proper name, so transliteration is preferred per translation philosophy.
    The verse itself explains the name by wordplay with בלל, which English cannot
    fully reproduce in the main text.
- source_word: כִּי שָׁם
  chosen: because there
  alternatives:
  - for there
  lexicon: HALOT
  rationale: Introduces the reason for the naming. 'Because there' is clear modern
    English and preserves the explanatory force.
- source_word: בָּלַל
  chosen: confused
  alternatives:
  - mixed
  - confounded
  lexicon: HALOT
  rationale: In this context the verb refers to the disruption and mixing of human
    speech. 'Confused' is the most idiomatic English rendering and matches the narrative
    sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: שְׂפַת כָּל הָאָרֶץ
  chosen: the language of all the earth
  alternatives:
  - the lip of all the earth
  - the speech of the whole earth
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip,' but in this context it is an idiom for
    language or speech. 'Language' best communicates the intended sense in natural
    English.
- source_word: וּמִשָּׁם
  chosen: and from there
  alternatives:
  - and from that place
  lexicon: HALOT
  rationale: Retains the narrative linkage to the location just mentioned.
- source_word: הֱפִיצָם
  chosen: scattered them
  alternatives:
  - dispersed them
  lexicon: HALOT
  rationale: The Hiphil of פוץ here denotes causing people to spread out geographically.
    'Scattered them' is the standard and clearest rendering.
- source_word: עַל פְּנֵי כָּל הָאָרֶץ
  chosen: over the face of all the earth
  alternatives:
  - over the whole earth
  - across all the earth
  lexicon: HALOT
  rationale: This preserves the concrete Hebrew idiom 'upon the face of' while remaining
    understandable in English. It also maintains the repetition with the earlier 'all
    the earth.'
