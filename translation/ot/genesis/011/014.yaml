id: GEN.11.14
reference: Genesis 11:14
source:
  edition: WLC
  text: וְ/שֶׁ֥לַח חַ֖י שְׁלֹשִׁ֣ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת עֵֽבֶר־׃
translation:
  text: Shelah lived thirty years and fathered Eber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Salah' for Shelah; the Hebrew here reads 'Shelah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Heber' for Eber; 'Eber' more directly reflects the Hebrew name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֶׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. 'Shelah' reflects
    the Hebrew form שֶׁלַח; 'Salah' is associated with Greek/English tradition in
    some genealogical contexts but is not the direct transliteration of the Hebrew
    here.
- source_word: חַי
  chosen: lived
  alternatives:
  - was alive
  lexicon: HALOT
  rationale: Qal perfect of חיה in genealogical formulae is idiomatically rendered
    'lived,' expressing age attained before the next event. 'Was alive' is overly
    wooden in English.
- source_word: שְׁלֹשִׁים שָׁנָה
  chosen: thirty years
  alternatives:
  - thirty years old
  lexicon: HALOT
  rationale: The Hebrew gives the duration/age expression literally 'thirty year.'
    In English genealogical style, 'thirty years' is natural and sufficiently conveys
    age at the time of fathering. 'Years old' is possible but slightly more expansive
    than the Hebrew wording requires.
- source_word: וַ/יּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in the Hiphil in genealogies commonly means 'fathered/became the
    father of.' 'Fathered' is concise, natural modern English, and preserves the male
    genealogical perspective. 'Begot' is traditional but archaic; 'became the father
    of' is accurate but less concise.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew עֵבֶר as 'Eber.'
    'Heber' reflects a more traditional Anglicized form but is less directly tied
    to the Hebrew consonants in this context.
