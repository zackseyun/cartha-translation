id: GEN.11.22
reference: Genesis 11:22
source:
  edition: WLC
  text: וַ/יְחִ֥י שְׂר֖וּג שְׁלֹשִׁ֣ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת נָחֽוֹר־׃
translation:
  text: Serug lived thirty years and fathered Nahor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: From חיה in the wayyiqtol narrative form, here introducing the age statement
    in a genealogy. 'Lived' is the natural English rendering in this formulaic context.
- source_word: שְׂרוּג
  chosen: Serug
  rationale: Personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: שְׁלֹשִׁים שָׁנָה
  chosen: thirty years
  alternatives:
  - thirty years old
  lexicon: HALOT
  rationale: The Hebrew literally gives 'thirty year,' an idiomatic age expression.
    'Thirty years' is concise and natural in English, with the age sense supplied
    by context.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: From ילד in the Hiphil, commonly used in genealogies for male descent.
    'Fathered' is accurate, readable modern English, and avoids the archaic 'begot'
    while preserving the genealogical sense better than the more expansive 'became
    the father of.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in the syntax of 'fathered Nahor.'
- source_word: נָחוֹר
  chosen: Nahor
  rationale: Personal name; transliterated by standard English convention.
