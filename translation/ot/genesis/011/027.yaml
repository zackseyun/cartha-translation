id: GEN.11.27
reference: Genesis 11:27
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ תּוֹלְדֹ֣ת תֶּ֔רַח תֶּ֚רַח הוֹלִ֣יד אֶת אַבְרָ֔ם אֶת נָח֖וֹר וְ/אֶת
    הָרָ֑ן וְ/הָרָ֖ן הוֹלִ֥יד אֶת לֽוֹט־־־־׃
translation:
  text: 'Now these are the generations of Terah: Terah fathered Abram, Nahor, and
    Haran; and Haran fathered Lot.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section in the genealogy
    narrative. 'Now these are' is natural modern English and preserves the discourse-shift
    force better than a bare 'And these are,' while remaining close to the Hebrew.
- source_word: תּוֹלְדֹת
  chosen: the generations of
  alternatives:
  - the family line of
  - the account of
  - the descendants of
  lexicon: HALOT
  rationale: In Genesis, תּוֹלְדֹת is a recurring structural term introducing what
    proceeds from a person or line. 'Generations of' preserves the established formula
    and its broad scope better than the narrower 'descendants of' or more interpretive
    'account of.'
- source_word: תֶּרַח
  chosen: Terah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means to beget or father.
    'Fathered' is concise, readable modern English and suitably genealogical without
    archaic tone.
- source_word: אֶת אַבְרָם אֶת נָחוֹר וְאֶת הָרָן
  chosen: Abram, Nahor, and Haran
  rationale: The direct-object markers are not translated in English. The coordinated
    list is rendered straightforwardly with commas and 'and.' Names are transliterated.
- source_word: וְ/הָרָן
  chosen: and Haran
  alternatives:
  - Now Haran
  lexicon: HALOT
  rationale: The conjunction links the next clause to the previous genealogy statement.
    'And Haran' is the most direct rendering; 'Now Haran' would over-interpret the
    discourse function.
- source_word: הוֹלִיד אֶת לֽוֹט
  chosen: fathered Lot
  alternatives:
  - became the father of Lot
  - begot Lot
  lexicon: HALOT
  rationale: The same genealogical verb is rendered consistently as 'fathered.' 'Lot'
    is transliterated as a personal name.
