id: GEN.11.20
reference: Genesis 11:20
source:
  edition: WLC
  text: וַ/יְחִ֣י רְע֔וּ שְׁתַּ֥יִם וּ/שְׁלֹשִׁ֖ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת שְׂרֽוּג־׃
translation:
  text: And Reu lived thirty-two years and fathered Serug.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulae is idiomatically rendered
    'lived,' indicating lifespan up to the stated age.
- source_word: רְעוּ
  chosen: Reu
  alternatives:
  - Reuʿ
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: שְׁתַּיִם וּשְׁלֹשִׁים שָׁנָה
  chosen: thirty-two years
  alternatives:
  - two and thirty years
  lexicon: HALOT
  rationale: Hebrew expresses the compound number as 'two and thirty'; idiomatic modern
    English reverses the order to 'thirty-two years' while preserving the exact value.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in genealogies commonly denotes begetting/fathering. 'Fathered' is
    accurate and readable modern English; 'begot' is archaic, and 'became the father
    of' is more verbose than needed.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: This is the direct-object marker in Hebrew and has no direct English
    equivalent, so it is represented implicitly in the syntax.
- source_word: שְׂרוּג
  chosen: Serug
  alternatives:
  - Śerug
  rationale: Personal name transliterated by standard English convention.
