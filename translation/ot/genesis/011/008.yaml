id: GEN.11.8
reference: Genesis 11:8
source:
  edition: WLC
  text: וַ/יָּ֨פֶץ יְהוָ֥ה אֹתָ֛/ם מִ/שָּׁ֖ם עַל פְּנֵ֣י כָל הָ/אָ֑רֶץ וַֽ/יַּחְדְּל֖וּ
    לִ/בְנֹ֥ת הָ/עִֽיר־־׃
translation:
  text: So the LORD scattered them from there over the face of all the earth, and
    they stopped building the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across all the earth' or 'throughout the whole earth'; Hebrew literally,
      'over the face of all the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּפֶץ
  chosen: scattered
  alternatives:
  - dispersed
  - spread out
  lexicon: HALOT
  rationale: The verb from פוץ in this context denotes causing people to be dispersed.
    'Scattered' is natural English and fits the judgment context better than the more
    neutral 'spread out.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated, following established reverential convention and the stated
    default for יְהוָה.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward locative adverb referring back to Babel; 'from there'
    is the plain and idiomatic rendering.
- source_word: עַל־פְּנֵי כָל־הָאָרֶץ
  chosen: over the face of all the earth
  alternatives:
  - across all the earth
  - throughout the whole earth
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'upon the face of all the earth/land.'
    Retaining 'face' preserves the Hebrew imagery while remaining understandable in
    English. 'Earth' fits the broad scope of the narrative better than 'land.'
- source_word: וַיַּחְדְּלוּ
  chosen: they stopped
  alternatives:
  - they ceased
  - they quit
  lexicon: HALOT
  rationale: The verb חדל means to cease or stop. 'They stopped' is clear modern English
    and pairs naturally with the following infinitive.
- source_word: לִבְנֹת
  chosen: building
  alternatives:
  - to build
  lexicon: HALOT
  rationale: After 'stopped,' English idiom prefers the gerund 'building,' though
    the Hebrew uses an infinitive construct. This is a minimal smoothing consistent
    with optimal equivalence.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun referring to the city under construction in the immediate
    context. 'The city' is the direct and sufficient rendering.
