id: GEN.11.6
reference: Genesis 11:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֗ה הֵ֣ן עַ֤ם אֶחָד֙ וְ/שָׂפָ֤ה אַחַת֙ לְ/כֻלָּ֔/ם וְ/זֶ֖ה
    הַחִלָּ֣/ם לַ/עֲשׂ֑וֹת וְ/עַתָּה֙ לֹֽא יִבָּצֵ֣ר מֵ/הֶ֔ם כֹּ֛ל אֲשֶׁ֥ר יָזְמ֖וּ
    לַֽ/עֲשֽׂוֹת־׃
translation:
  text: And the LORD said, "Look, they are one people, and they all have one language,
    and this is only the beginning of what they will do. And now nothing that they
    plan to do will be impossible for them."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "nothing that they plan to do will be withheld from them."
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal form rather than transliteration.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces divine observation with natural modern English. 'Behold' is
    more formal/archaic; 'Look' preserves the deictic force accessibly.
- source_word: עַם אֶחָד
  chosen: one people
  alternatives:
  - one nation
  - a single people
  lexicon: HALOT
  rationale: עַם denotes a people-group rather than specifically a political nation.
    'One people' is the most direct and idiomatic rendering.
- source_word: וְשָׂפָה אַחַת לְכֻלָּם
  chosen: they all have one language
  alternatives:
  - and one lip for all of them
  - and one speech for them all
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip' but idiomatically refers to language/speech
    in this context. Rendering the clause verbally in English communicates the sense
    clearly while preserving the collective emphasis of לְכֻלָּם.
- source_word: וְזֶה הַחִלָּם לַעֲשׂוֹת
  chosen: this is only the beginning of what they will do
  alternatives:
  - this they have begun to do
  - this is what they began to do
  lexicon: HALOT
  rationale: The Hiphil of חלל here means 'begin.' The clause points to the present
    action as an initial stage. 'Only the beginning' makes explicit the forward-looking
    force that motivates the next clause.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Maintains the discourse progression from observation to consequence.
- source_word: לֹא יִבָּצֵר מֵהֶם
  chosen: nothing ... will be impossible for them
  alternatives:
  - nothing will be withheld from them
  - nothing will be inaccessible to them
  lexicon: HALOT
  rationale: The Niphal of בצר can convey being withheld or impossible/inaccessible.
    In this context of human capability and ambition, 'will be impossible for them'
    best captures the idiomatic sense in natural English.
- source_word: כֹּל אֲשֶׁר יָזְמוּ לַעֲשׂוֹת
  chosen: nothing that they plan to do
  alternatives:
  - all that they purpose to do
  - anything they devise to do
  lexicon: HALOT
  rationale: יזם conveys planning, devising, or purposing. 'Plan' is clear modern
    English and fits the evaluative statement about their intended action.
