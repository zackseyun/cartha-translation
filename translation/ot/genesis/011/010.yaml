id: GEN.11.10
reference: Genesis 11:10
source:
  edition: WLC
  text: אֵ֚לֶּה תּוֹלְדֹ֣ת שֵׁ֔ם שֵׁ֚ם בֶּן מְאַ֣ת שָׁנָ֔ה וַ/יּ֖וֹלֶד אֶת אַרְפַּכְשָׁ֑ד
    שְׁנָתַ֖יִם אַחַ֥ר הַ/מַּבּֽוּל־־׃
translation:
  text: These are the generations of Shem. Shem was one hundred years old, and he
    fathered Arpachshad two years after the flood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Arpachshad is traditionally rendered 'Arphaxad' in some English versions,
      reflecting the Greek form rather than the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Plural demonstrative introducing a genealogical heading; 'These are'
    is the standard and natural rendering in this formula.
- source_word: תּוֹלְדֹת
  chosen: the generations of
  alternatives:
  - the family line of
  - the account of
  lexicon: HALOT
  rationale: In Genesis, תּוֹלְדֹת functions as a recurring structural formula introducing
    what proceeds from a person or line. 'Generations of' preserves the established
    genealogical sense without over-paraphrase.
- source_word: שֵׁם
  chosen: Shem
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: בֶּן מְאַת שָׁנָה
  chosen: was one hundred years old
  alternatives:
  - was a son of one hundred years
  lexicon: HALOT
  rationale: Hebrew age idiom literally 'a son of one hundred years'; idiomatic English
    requires 'was one hundred years old.'
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogies denotes begetting/fathering. 'Fathered'
    is concise, natural modern English and preserves the male genealogical role better
    than the archaic 'begot.'
- source_word: אֶת אַרְפַּכְשָׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  rationale: Direct-object marker plus personal name. 'Arpachshad' follows a straightforward
    transliteration from the Hebrew; 'Arphaxad' reflects Greek/traditional English
    forms and is worth preserving as an alternative.
- source_word: שְׁנָתַיִם
  chosen: two years
  lexicon: HALOT
  rationale: Dual form of 'year'; straightforwardly rendered 'two years.'
- source_word: אַחַר הַמַּבּוּל
  chosen: after the flood
  alternatives:
  - after the deluge
  lexicon: HALOT
  rationale: Temporal phrase with definite article. 'The flood' is the natural English
    rendering in Genesis and clearly refers to the Noahic flood.
