id: GEN.11.21
reference: Genesis 11:21
source:
  edition: WLC
  text: וַ/יְחִ֣י רְע֗וּ אַחֲרֵי֙ הוֹלִיד֣/וֹ אֶת שְׂר֔וּג שֶׁ֥בַע שָׁנִ֖ים וּ/מָאתַ֣יִם שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־׃ס
translation:
  text: And Reu lived after he fathered Serug two hundred and seven years, and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Reu lived, after he fathered Serug, two hundred and seven years,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - continued to live
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is idiomatically rendered 'lived.' 'Continued to live' is possible contextually after the birth notice, but standard English genealogy style is 'lived.'
- source_word: רְעוּ
  chosen: Reu
  alternatives:
  - Reuʿ
  rationale: Personal names are transliterated by standard English convention per project philosophy. 'Reu' is the conventional English transliteration of the Hebrew name.
- source_word: אַחֲרֵי הוֹלִידוֹ
  chosen: after he fathered
  alternatives:
  - after he begot
  - after he became the father of
  lexicon: HALOT
  rationale: The construction means 'after his begetting/fathering.' 'Fathered' is natural modern English and preserves the male parental sense of ילד in the Hiphil without archaic 'begot.'
- source_word: אֶת שְׂרוּג
  chosen: Serug
  rationale: Direct-object marker אֶת is not translated; the personal name is transliterated conventionally as 'Serug.'
- source_word: שֶׁבַע שָׁנִים וּמָאתַיִם שָׁנָה
  chosen: two hundred and seven years
  alternatives:
  - seven years and two hundred years
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew number order. The singular שָׁנָה after a compound number is a normal Hebrew construction and is rendered with plural 'years' in English.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: In this genealogy formula, ילד with a male subject means 'fathered/begot.' 'Fathered' is preferred as readable modern English; 'had' is too vague and weakens the genealogical formula.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies both male and female offspring. 'Sons and daughters' is gender-accurate and more precise than the generic 'children,' in keeping with project philosophy.
