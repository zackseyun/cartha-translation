id: GEN.11.24
reference: Genesis 11:24
source:
  edition: WLC
  text: וַ/יְחִ֣י נָח֔וֹר תֵּ֥שַׁע וְ/עֶשְׂרִ֖ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת תָּֽרַח־׃
translation:
  text: Nahor lived twenty-nine years and fathered Terah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is idiomatically rendered
    'lived,' indicating the span of years attained before the next event.
- source_word: נָחוֹר
  chosen: Nahor
  rationale: Personal name is transliterated by standard English convention, following
    the translation policy to transliterate names.
- source_word: תֵּשַׁע וְעֶשְׂרִים שָׁנָה
  chosen: twenty-nine years
  alternatives:
  - nine and twenty years
  lexicon: HALOT
  rationale: Hebrew cardinal construction literally reads 'nine and twenty year,'
    but idiomatic modern English reverses the order to 'twenty-nine years.' Singular
    שָׁנָה after a compound number is a normal Hebrew usage and is translated with
    English plural 'years' for naturalness.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in the Hiphil in genealogies commonly means 'fathered' or 'became
    the father of.' 'Fathered' is concise, natural modern English, and preserves the
    genealogical sense better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no independent English equivalent and is represented
    by normal English word order.
- source_word: תָּרַח
  chosen: Terah
  rationale: Personal name is transliterated by standard English convention.
