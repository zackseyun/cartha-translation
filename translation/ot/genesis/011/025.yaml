id: GEN.11.25
reference: Genesis 11:25
source:
  edition: WLC
  text: וַ/יְחִ֣י נָח֗וֹר אַחֲרֵי֙ הוֹלִיד֣/וֹ אֶת תֶּ֔רַח תְּשַֽׁע עֶשְׂרֵ֥ה שָׁנָ֖ה
    וּ/מְאַ֣ת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃ס
translation:
  text: Nahor lived one hundred nineteen years after he fathered Terah, and he fathered
    sons and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - lived on
  - was alive
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical notices regularly denotes continued
    lifespan. 'Lived' is the standard natural English rendering in this formula.
- source_word: אַחֲרֵי הוֹלִידוֹ
  chosen: after he fathered
  alternatives:
  - after he became the father of
  - after he begot
  lexicon: HALOT
  rationale: The construction marks the period following the birth of the named son.
    'Fathered' is clear modern English and preserves the active sense of ילד without
    archaic 'begot'.
- source_word: תֶּרַח
  chosen: Terah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: תְּשַׁע עֶשְׂרֵה שָׁנָה וּמְאַת שָׁנָה
  chosen: one hundred nineteen years
  alternatives:
  - a hundred and nineteen years
  - 119 years
  lexicon: HALOT
  rationale: 'The Hebrew expresses 19 + 100 years. English idiom normally orders the
    larger number first: ''one hundred nineteen years.'' Spelling out the number suits
    Bible style and readability.'
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: Repeats ילד in the genealogical formula. 'Fathered' maintains lexical
    consistency with the earlier occurrence and avoids archaic diction.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female offspring; 'sons and
    daughters' preserves that specificity better than the generalized 'children'.
