id: GEN.11.1
reference: Genesis 11:1
source:
  edition: WLC
  text: וַֽ/יְהִ֥י כָל הָ/אָ֖רֶץ שָׂפָ֣ה אֶחָ֑ת וּ/דְבָרִ֖ים אֲחָדִֽים־׃
translation:
  text: Now the whole earth had one language and the same words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and one set of words' / 'and the same speech.' The Hebrew literally
      reads 'and words, the same/one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... had
  alternatives:
  - And it came to pass
  - And ... was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative situation. In idiomatic
    modern English, 'Now ... had' conveys the transition and stative sense without
    archaic wording like 'it came to pass.'
- source_word: כָל הָאָרֶץ
  chosen: the whole earth
  alternatives:
  - all the earth
  - the whole land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In the Babel context, the scope is
    humanity broadly rather than a local territory, so 'the whole earth' best fits.
    'Whole' reflects כָל with natural English style.
- source_word: שָׂפָה אֶחָת
  chosen: one language
  alternatives:
  - one lip
  - one speech
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip,' but in this idiom it denotes language/speech.
    'One language' is the clearest natural equivalent in English while preserving
    the singularity marked by אֶחָת.
- source_word: וּדְבָרִים אֲחָדִים
  chosen: and the same words
  alternatives:
  - and one set of words
  - and the same speech
  - and common words
  lexicon: HALOT
  rationale: דְּבָרִים ordinarily means 'words' or 'matters.' Here, paired with 'one
    language,' it likely emphasizes shared vocabulary or uniform expression. 'The
    same words' preserves the lexical sense of דְּבָרִים and the unity conveyed by
    אֲחָדִים better than collapsing it into a duplicate of 'language.'
