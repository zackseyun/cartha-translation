id: GEN.11.32
reference: Genesis 11:32
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ יְמֵי תֶ֔רַח חָמֵ֥שׁ שָׁנִ֖ים וּ/מָאתַ֣יִם שָׁנָ֑ה וַ/יָּ֥מָת
    תֶּ֖רַח בְּ/חָרָֽן־׃ס
translation:
  text: The days of Terah were two hundred and five years, and Terah died in Haran.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces a summary statement of lifespan.
    English 'were' is the most natural and sufficiently formal rendering in this genealogical
    notice.
- source_word: יְמֵי
  chosen: The days of
  alternatives:
  - the lifetime of
  - the years of
  lexicon: HALOT
  rationale: The construct phrase 'days of X' is a standard Hebrew idiom for a person's
    lifespan. 'The days of' preserves the Hebrew form while remaining clear in English.
- source_word: תֶּרַח
  chosen: Terah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: חָמֵשׁ שָׁנִים וּמָאתַיִם שָׁנָה
  chosen: two hundred and five years
  alternatives:
  - five years and two hundred years
  lexicon: HALOT
  rationale: Hebrew numbers here are idiomatically rendered in standard English order.
    The singular 'year' after larger numerals in Hebrew is normalized to plural 'years'
    in English.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: מות straightforwardly means 'die.' 'Died' is direct and avoids euphemism
    not present in the source text.
- source_word: בְּחָרָן
  chosen: in Haran
  alternatives:
  - at Haran
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' with a place name here,
    indicating location of death.
