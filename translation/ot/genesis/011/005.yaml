theological_decisions:
- issue: Anthropomorphic description of the LORD descending
  chosen_reading: Retain the concrete wording 'came down' without paraphrasing.
  alternative_readings:
  - looked down
  - turned his attention to
  rationale: The Hebrew presents the LORD in anthropomorphic narrative terms. The
    translation preserves this literary-theological feature rather than softening
    it into abstraction, in keeping with original-language primacy and preserving
    textual tension.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of בְּנֵי הָאָדָם
  chosen_reading: Use 'the sons of man' in the main text.
  alternative_readings:
  - humankind
  - the human race
  - people
  rationale: The phrase is masculine in form but representative in force. Per doctrine,
    gender-accurate rendering is preferred, while an inclusive sense can be clarified
    in a footnote rather than replacing the source-shaped expression in the main text.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם *adam*'
