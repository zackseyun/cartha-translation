id: GEN.11.5
reference: Genesis 11:5
source:
  edition: WLC
  text: וַ/יֵּ֣רֶד יְהוָ֔ה לִ/רְאֹ֥ת אֶת הָ/עִ֖יר וְ/אֶת הַ/מִּגְדָּ֑ל אֲשֶׁ֥ר בָּנ֖וּ
    בְּנֵ֥י הָ/אָדָֽם־־׃
translation:
  text: Then the LORD came down to see the city and the tower that the sons of man
    had built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of humankind'—the Hebrew phrase refers to human beings collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Came down' is idiomatic
    in English narrative and preserves the anthropomorphic movement without sounding
    overly formal. It also matches the vav-consecutive narrative sequence with 'Then.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: לִרְאֹת
  chosen: to see
  alternatives:
  - to look at
  - to inspect
  lexicon: HALOT
  rationale: The infinitive of ראה is straightforwardly 'to see.' 'Inspect' would
    over-interpret the purpose nuance; 'to see' preserves the plain sense while allowing
    the narrative irony to stand.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Direct, standard rendering of עִיר.
- source_word: הַמִּגְדָּל
  chosen: the tower
  lexicon: HALOT
  rationale: Standard rendering of מִגְדָּל; in context this is the tower of Babel
    project.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: '''That'' is the most natural restrictive relative in modern English.'
- source_word: בָּנוּ
  chosen: had built
  alternatives:
  - built
  lexicon: HALOT
  rationale: English past perfect fits the relative clause naturally, indicating the
    building was already underway/completed relative to the LORD's descent. Simple
    past would also be possible, but 'had built' reads more smoothly in context.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - the sons of humankind
  - the children of man
  - the people
  lexicon: HALOT
  rationale: Literally 'sons of the man/man.' In Hebrew this idiom denotes human beings.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language when the source is masculine with representative force. 'The sons of
    man' preserves the Hebrew form and the contrast between the LORD and humanity.
    A more idiomatic alternative is preserved in a footnote.
