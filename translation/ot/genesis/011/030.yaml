id: GEN.11.30
reference: Genesis 11:30
source:
  edition: WLC
  text: וַ/תְּהִ֥י שָׂרַ֖י עֲקָרָ֑ה אֵ֥ין לָ֖/הּ וָלָֽד׃
translation:
  text: Now Sarai was barren; she had no child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Sarai was barren; she had no offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  lexicon: HALOT
  rationale: The waw-consecutive with היה advances the narrative. In English, 'Now'
    idiomatically introduces the circumstantial statement, while 'was' carries the
    stative sense. 'And' is possible but less natural here.
- source_word: שָׂרַי
  chosen: Sarai
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: עֲקָרָה
  chosen: barren
  alternatives:
  - infertile
  - childless
  lexicon: HALOT
  rationale: The adjective denotes barrenness/infertility, especially of a woman unable
    to bear children. 'Barren' is the standard concise rendering and fits the immediate
    explanatory clause. 'Infertile' is medically modern; 'childless' overlaps too
    much with the following phrase.
- source_word: אֵין לָהּ
  chosen: she had no
  alternatives:
  - there was not to her
  - she did not have
  lexicon: HALOT
  rationale: 'The existential negative plus preposition/pronominal suffix is most
    naturally rendered in idiomatic English as possession: ''she had no''.'
- source_word: וָלָד
  chosen: child
  alternatives:
  - offspring
  lexicon: HALOT
  rationale: The noun refers to what is born, here a child/offspring. Singular 'child'
    is the most natural English in this context and preserves the concrete sense.
    'Offspring' is possible but less idiomatic in this brief narrative notice.
