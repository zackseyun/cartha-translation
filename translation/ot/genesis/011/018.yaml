id: GEN.11.18
reference: Genesis 11:18
source:
  edition: WLC
  text: וַֽ/יְחִי פֶ֖לֶג שְׁלֹשִׁ֣ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת רְעֽוּ־־׃
translation:
  text: Peleg lived thirty years and fathered Reu.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulae is idiomatically rendered
    'lived,' indicating the span of years reached before the next event. 'Was alive'
    is too wooden in English.
- source_word: פֶלֶג
  chosen: Peleg
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: שְׁלֹשִׁים שָׁנָה
  chosen: thirty years
  alternatives:
  - thirty years old
  lexicon: HALOT
  rationale: The Hebrew literally gives 'thirty year,' functioning adverbially for
    age. 'Thirty years' is natural English in this genealogy and avoids adding 'old,'
    though that sense is implicit.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in genealogies commonly denotes begetting/fathering. 'Fathered' is
    clear modern English and preserves the male genealogical sense better than the
    archaic 'begot.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: The particle marks the definite direct object in Hebrew and has no direct
    English equivalent.
- source_word: רְעוּ
  chosen: Reu
  alternatives:
  - Reu/Re'u
  rationale: The personal name is transliterated in its conventional English form
    'Reu.'
