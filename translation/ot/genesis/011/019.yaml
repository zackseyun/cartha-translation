id: GEN.11.19
reference: Genesis 11:19
source:
  edition: WLC
  text: וַֽ/יְחִי פֶ֗לֶג אַחֲרֵי֙ הוֹלִיד֣/וֹ אֶת רְע֔וּ תֵּ֥שַׁע שָׁנִ֖ים וּ/מָאתַ֣יִם
    שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃ס
translation:
  text: And Peleg lived two hundred and nine years after he fathered Reu, and he fathered
    sons and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is most naturally rendered
    'lived,' indicating the span of life after the named event.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition marking the period subsequent to Peleg's
    begetting of Reu.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogies denotes begetting/fathering. 'Fathered'
    is preferred over the archaic 'begot' for readable modern English while preserving
    the paternal sense.
- source_word: אֶת רְעוּ
  chosen: Reu
  rationale: Direct-object marker plus personal name; the name is transliterated per
    project policy.
- source_word: תֵּשַׁע שָׁנִים וּמָאתַיִם שָׁנָה
  chosen: two hundred and nine years
  alternatives:
  - nine years and two hundred years
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew number order. The singular שָׁנָה after
    a compound number is a normal Hebrew construction and is rendered idiomatically
    as plural 'years' in English.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: Repeated genealogical verb ילד. 'Fathered' maintains consistency with
    the earlier occurrence and preserves the male parental role more precisely than
    'had'.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female offspring; 'sons and
    daughters' is more accurate than the generalized 'children'.
