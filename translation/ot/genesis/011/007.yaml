theological_decisions:
- issue: Divine first person plural cohortatives ('let us go down ... and confuse')
  chosen_reading: Retain the plural as direct speech without explaining it
  alternative_readings:
  - plural of majesty
  - divine council address
  - adumbration of Trinitarian plurality
  rationale: The Hebrew text uses first person plural cohortatives. The translation
    should preserve this grammatical feature and not resolve the interpretive/theological
    question in the main text. This maintains the textual tension rather than importing
    a doctrinal explanation not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
