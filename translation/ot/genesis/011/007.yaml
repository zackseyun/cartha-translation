id: GEN.11.7
reference: Genesis 11:7
source:
  edition: WLC
  text: הָ֚בָ/ה נֵֽרְדָ֔ה וְ/נָבְלָ֥ה שָׁ֖ם שְׂפָתָ֑/ם אֲשֶׁר֙ לֹ֣א יִשְׁמְע֔וּ אִ֖ישׁ
    שְׂפַ֥ת רֵעֵֽ/הוּ׃
translation:
  text: Come, let us go down there and confuse their language, so that one man will
    not understand the language of his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'lip'; here an idiom for 'language.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that one man may not hear/understand the language of his fellow.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָבָה
  chosen: Come
  alternatives:
  - Come now
  - Come, then
  lexicon: HALOT
  rationale: Idiomatic interjection inviting immediate joint action. 'Come' is concise
    modern English and preserves the hortatory force without archaic expansion.
- source_word: נֵרְדָה
  chosen: let us go down
  alternatives:
  - let us descend
  lexicon: HALOT
  rationale: First person plural cohortative of ירד. 'Let us go down' is natural English
    and preserves the deliberative/plural form; 'descend' is more formal but less
    readable.
- source_word: וְנָבְלָה
  chosen: and confuse
  alternatives:
  - and mix up
  - and confound
  lexicon: HALOT
  rationale: From בלל in the Babel context, referring to the disruption/mingling of
    speech. 'Confuse' best captures the resulting incomprehensibility in clear modern
    English; 'confound' is traditional but archaic.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the direct and natural rendering.
- source_word: שְׂפָתָם
  chosen: their language
  alternatives:
  - their lip
  - their speech
  lexicon: HALOT
  rationale: Although שפה literally means 'lip,' in this context it is a well-established
    idiom for language/speech. 'Their language' communicates the sense clearly in
    English.
- source_word: אֲשֶׁר לֹא יִשְׁמְעוּ
  chosen: so that ... will not understand
  alternatives:
  - so that ... may not hear
  - so that ... will not listen to
  lexicon: HALOT
  rationale: 'שמע can mean hear, listen, or understand depending on context. Here
    the object is another''s language, so the sense is comprehension rather than mere
    auditory hearing. The clause expresses purpose/result: the confusion prevents
    mutual understanding.'
- source_word: אִישׁ
  chosen: one man
  alternatives:
  - each one
  - one person
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by project doctrine. אִישׁ here
    is distributive singular ('each man/one man'). 'One man' preserves the singular
    masculine form while remaining intelligible in context.
- source_word: שְׂפַת רֵעֵהוּ
  chosen: the language of his neighbor
  alternatives:
  - his companion's speech
  - the speech of his fellow
  lexicon: HALOT
  rationale: Again שפה is idiomatic for language/speech. רֵעַ denotes a fellow, companion,
    or neighbor. 'Neighbor' is a familiar and accurate English equivalent that preserves
    interpersonal reference without overinterpreting social proximity.
