id: GEN.11.29
reference: Genesis 11:29
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אַבְרָ֧ם וְ/נָח֛וֹר לָ/הֶ֖ם נָשִׁ֑ים שֵׁ֤ם אֵֽשֶׁת אַבְרָם֙ שָׂרָ֔י
    וְ/שֵׁ֤ם אֵֽשֶׁת נָחוֹר֙ מִלְכָּ֔ה בַּת הָרָ֥ן אֲבִֽי מִלְכָּ֖ה וַֽ/אֲבִ֥י יִסְכָּֽה־־־־׃
translation:
  text: Abram and Nahor took wives for themselves. The name of Abram’s wife was Sarai,
    and the name of Nahor’s wife was Milcah, the daughter of Haran, the father of
    Milcah and Iscah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Abram and Nahor married wives.' The Hebrew literally
      says 'took wives for themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The verb לקח literally means 'took.' In marriage contexts English can
    idiomatically say 'married,' but here the object is 'wives,' so 'took wives' preserves
    the Hebrew expression while remaining natural enough in context.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition plus pronoun marks personal interest/reflexive sense
    in this idiom. 'For themselves' best captures that Abram and Nahor each took wives
    for themselves, not for some third party.
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: Although the noun can mean 'women' or 'wives,' the marital context established
    by 'took' requires 'wives.'
- source_word: שֵׁם
  chosen: the name of
  alternatives:
  - named
  lexicon: HALOT
  rationale: The Hebrew construction repeats 'name of' formally. Rendering it as 'the
    name of' preserves the structure and cadence of the source better than collapsing
    it to 'was named,' though either would be acceptable English.
- source_word: אֵשֶׁת
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: In construct with a husband's name, the noun clearly means 'wife of.'
- source_word: שָׂרָי
  chosen: Sarai
  rationale: Personal names are transliterated by standard convention.
- source_word: מִלְכָּה
  chosen: Milcah
  rationale: Personal names are transliterated by standard convention.
- source_word: בַּת
  chosen: daughter
  lexicon: HALOT
  rationale: Standard filial term; no contextual pressure for a more dynamic rendering.
- source_word: הָרָן
  chosen: Haran
  rationale: Personal name transliterated by standard convention.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - ancestor of
  lexicon: HALOT
  rationale: אב normally means 'father.' While broader ancestral senses are possible
    in Hebrew genealogies, the immediate context favors the straightforward biological/genealogical
    sense.
- source_word: יִסְכָּה
  chosen: Iscah
  rationale: Personal name transliterated by standard convention; traditional English
    form 'Iscah' is standard.
