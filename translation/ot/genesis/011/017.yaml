id: GEN.11.17
reference: Genesis 11:17
source:
  edition: WLC
  text: וַֽ/יְחִי עֵ֗בֶר אַחֲרֵי֙ הוֹלִיד֣/וֹ אֶת פֶּ֔לֶג שְׁלֹשִׁ֣ים שָׁנָ֔ה וְ/אַרְבַּ֥ע מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃ס
translation:
  text: And Eber lived after he fathered Peleg four hundred and thirty years, and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived, after he fathered Peleg, four hundred and thirty years,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is most naturally rendered 'lived.' 'Lived on' is possible because the clause is subsequent to the begetting, but standard English genealogy style is adequately conveyed by 'lived' with the temporal phrase following.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Eber' is the conventional English transliteration for עֵבֶר in Genesis genealogies.
- source_word: אַחֲרֵי הוֹלִידוֹ אֶת־פֶּלֶג
  chosen: after he fathered Peleg
  alternatives:
  - after he became the father of Peleg
  - after he begot Peleg
  lexicon: HALOT
  rationale: הוליד in genealogical contexts denotes begetting/fathering. 'Fathered' is clear modern English and preserves the male parental sense without archaic 'begot.'
- source_word: שְׁלֹשִׁים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  chosen: four hundred and thirty years
  alternatives:
  - thirty years and four hundred years
  lexicon: HALOT
  rationale: English idiom normally reverses the Hebrew order into 'four hundred and thirty years.' This preserves the total duration while producing natural modern English.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: Repeated genealogical verb from ילד is best rendered consistently as 'fathered.' 'Had' is too weak, and 'begot' is archaic.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies both male and female offspring. In keeping with gender-accurate translation, 'sons and daughters' is preferable to the more generic 'children'.
