  from: lived, after he fathered Peleg, four hundred and thirty years,
  to: lived after he fathered Peleg four hundred and thirty years,
  rationale: The commas around the temporal clause 'after he fathered Peleg' interrupt the sentence flow, making the clause feel parenthetical. This information is essential to the meaning of the duration that follows, not an aside. Removing the commas creates a more natural and direct English sentence that is still faithful to the Hebrew word order and is more grammatically precise in English.
