id: GEN.11.15
reference: Genesis 11:15
source:
  edition: WLC
  text: וַֽ/יְחִי שֶׁ֗לַח אַחֲרֵי֙ הוֹלִיד֣/וֹ אֶת עֵ֔בֶר שָׁלֹ֣שׁ שָׁנִ֔ים וְ/אַרְבַּ֥ע
    מֵא֖וֹת שָׁנָ֑ה וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃ס
translation:
  text: And Shelah lived, after he fathered Eber, 403 years, and he fathered sons
    and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is most naturally rendered
    'lived.' 'Lived on' is possible because the clause is followed by a post-begetting
    lifespan, but simple 'lived' is idiomatic and sufficient in English.
- source_word: שֶׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  lexicon: HALOT
  rationale: The personal name is transliterated per project philosophy. 'Shelah'
    follows the Hebrew form more directly; 'Salah' reflects other traditions but not
    the consonantal form here.
- source_word: אַחֲרֵי הוֹלִידוֹ
  chosen: after he fathered
  alternatives:
  - after he became the father of
  - after he begot
  lexicon: HALOT
  rationale: הוליד in genealogical contexts denotes begetting/fathering. 'Fathered'
    is clear modern English and preserves the male genealogical sense without archaic
    'begot.'
- source_word: אֶת עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  lexicon: HALOT
  rationale: The direct-object marker is untranslated. The name עֵבֶר is transliterated
    as 'Eber,' which closely reflects the Hebrew form.
- source_word: שָׁלֹשׁ שָׁנִים וְאַרְבַּע מֵאוֹת שָׁנָה
  chosen: 403 years
  alternatives:
  - three years and four hundred years
  - four hundred and three years
  lexicon: HALOT
  rationale: The Hebrew number phrase literally reads 'three years and four hundred
    year,' an idiomatic cardinal expression meaning 403 years. Rendering it as a standard
    English number phrase communicates the sense naturally.
- source_word: וַיּוֹלֶד
  chosen: and he fathered
  alternatives:
  - and he begot
  - and he had
  lexicon: HALOT
  rationale: In genealogical summary statements, ילד with a male subject means 'fathered.'
    'Had' is too vague, and 'begot' is accurate but archaic for the target audience.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies both sexes; 'sons and daughters' preserves
    that detail better than the generalized 'children.'
