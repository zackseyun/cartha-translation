id: GEN.11.12
reference: Genesis 11:12
source:
  edition: WLC
  text: וְ/אַרְפַּכְשַׁ֣ד חַ֔י חָמֵ֥שׁ וּ/שְׁלֹשִׁ֖ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת שָֽׁלַח־׃
translation:
  text: And Arpachshad lived thirty-five years and fathered Shelah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''five and thirty years.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''became the father of Shelah''; traditional English: ''begot Shelah.'''
    reason: lexical_alternative
  - marker: c
    text: Some traditions render the name as 'Salah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַרְפַּכְשַׁד
  chosen: And Arpachshad
  alternatives:
  - Now Arpachshad
  - Arpachshad
  lexicon: HALOT
  rationale: The conjunction וְ is retained as 'And' to preserve the genealogical
    sequence and narrative linkage. The proper name is transliterated, following the
    philosophy of transliterating personal names rather than translating them.
- source_word: חַי
  chosen: lived
  alternatives:
  - was alive
  lexicon: HALOT
  rationale: In genealogical age formulas, חיה commonly denotes having lived to a
    specified age. 'Lived' is idiomatic and accurately reflects the Hebrew construction.
- source_word: חָמֵשׁ וּ/שְׁלֹשִׁים שָׁנָה
  chosen: thirty-five years
  alternatives:
  - five and thirty years
  lexicon: HALOT
  rationale: The Hebrew number is literally 'five and thirty years,' but standard
    modern English expresses this as 'thirty-five years.' This preserves the meaning
    while using readable contemporary English.
- source_word: וַ/יּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  - had
  lexicon: HALOT
  rationale: יַלַד in genealogies commonly means 'to father/beget.' 'Fathered' is
    more natural modern English than 'begot' while remaining more precise than the
    weaker 'had.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: אֶת marks the definite direct object in Hebrew and normally has no direct
    English equivalent; its function is represented by English word order.
- source_word: שָׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  lexicon: HALOT
  rationale: The proper name is transliterated from the Hebrew as 'Shelah.' 'Salah'
    reflects another traditional form influenced by other textual traditions, but
    the Hebrew consonantal form supports 'Shelah' here.
