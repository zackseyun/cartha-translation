id: GEN.11.23
reference: Genesis 11:23
source:
  edition: WLC
  text: וַ/יְחִ֣י שְׂר֗וּג אַחֲרֵ֛י הוֹלִיד֥/וֹ אֶת נָח֖וֹר מָאתַ֣יִם שָׁנָ֑ה וַ/יּ֥וֹלֶד
    בָּנִ֖ים וּ/בָנֽוֹת־׃ס
translation:
  text: And Serug lived two hundred years after he fathered Nahor, and he fathered
    sons and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulas is idiomatically rendered
    'lived.' 'Lived on' is possible because the clause is followed by 'after he fathered,'
    but standard English genealogy style is best served by 'lived.'
- source_word: שְׂרוּג
  chosen: Serug
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking subsequent time; 'after' is the natural
    English equivalent.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogies denotes causing birth in the paternal sense.
    'Fathered' is clear modern English and preserves the male subject better than
    the more formal 'begot.'
- source_word: אֶת
  chosen: '[direct object marker not translated]'
  lexicon: Hebrew grammar
  rationale: The particle marks Nahor as the definite direct object and has no standalone
    English equivalent.
- source_word: נָחוֹר
  chosen: Nahor
  rationale: Personal name transliterated by standard convention.
- source_word: מָאתַיִם שָׁנָה
  chosen: two hundred years
  alternatives:
  - two hundred year(s)
  lexicon: HALOT
  rationale: Cardinal number plus singular noun is a standard Hebrew construction
    for duration; idiomatic English requires plural 'years.'
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: Same genealogical verb ילד. 'Fathered' maintains consistency within the
    verse and avoids archaic diction. 'Had' is too weak and less precise.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies both male and female offspring; 'sons
    and daughters' preserves that detail better than the generic 'children.'
