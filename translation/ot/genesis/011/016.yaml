id: GEN.11.16
reference: Genesis 11:16
source:
  edition: WLC
  text: וַֽ/יְחִי עֵ֕בֶר אַרְבַּ֥ע וּ/שְׁלֹשִׁ֖ים שָׁנָ֑ה וַ/יּ֖וֹלֶד אֶת פָּֽלֶג־־׃
translation:
  text: Eber lived thirty-four years and fathered Peleg.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical formulae is idiomatically rendered
    'lived,' indicating the span of years attained before the next event.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  rationale: Personal names are transliterated by standard English convention. 'Eber'
    reflects the Hebrew name directly and is common in modern translations.
- source_word: אַרבע וּשלשים שנה
  chosen: thirty-four years
  alternatives:
  - four and thirty years
  lexicon: HALOT
  rationale: The Hebrew cardinal construction literally reads 'four and thirty year,'
    but natural modern English reverses the order to 'thirty-four years' while preserving
    the exact number.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts ילד with a male subject denotes begetting/fathering
    offspring. 'Fathered' is accurate and readable modern English; 'begot' is more
    traditional but archaic.
- source_word: אֶת
  chosen: '[not separately translated]'
  rationale: This is the direct-object marker in Hebrew and has no direct English
    equivalent; its function is represented by normal English syntax.
- source_word: פָּלֶג
  chosen: Peleg
  rationale: Personal name transliterated directly from Hebrew according to standard
    convention.
