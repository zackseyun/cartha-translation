id: GEN.1.29
reference: Genesis 1:29
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים הִנֵּה֩ נָתַ֨תִּי לָ/כֶ֜ם אֶת כָּל עֵ֣שֶׂב זֹרֵ֣עַ זֶ֗רַע אֲשֶׁר֙ עַל פְּנֵ֣י כָל הָ/אָ֔רֶץ וְ/אֶת כָּל הָ/עֵ֛ץ אֲשֶׁר בּ֥/וֹ פְרִי עֵ֖ץ זֹרֵ֣עַ זָ֑רַע לָ/כֶ֥ם יִֽהְיֶ֖ה לְ/אָכְלָֽה־־׀־־־־־־׃
translation:
  text: And God said, “Look, I have given you every seed-bearing plant that is on the face of all the earth, and every tree that has seed-bearing fruit in it. They will be for you as food.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold,” preserving a more formal attention-getting particle for הִנֵּה.
    reason: lexical_alternative
  - marker: b
    text: Or “every herb yielding seed.” The Hebrew עֵשֶׂב can denote vegetation broadly; “plant” is used here for clearer modern English.
    reason: lexical_alternative
  - marker: c
    text: Or 'that has in it fruit bearing seed'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses a natural modern English discourse marker that still preserves the demonstrative force of drawing attention to what follows. 'Behold' is more traditional but archaic for the stated translation philosophy.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I have now given
  lexicon: HALOT
  rationale: The Hebrew perfect naturally conveys a completed act with present relevance in context; 'I have given' fits the creation-grant setting better than a simple present.
- source_word: כָּל עֵשֶׂב זֹרֵעַ זֶרַע
  chosen: every seed-bearing plant
  alternatives:
  - every herb yielding seed
  - every plant producing seed
  - every green plant bearing seed
  lexicon: HALOT
  rationale: עֵשֶׂב refers broadly to vegetation/plant growth, not specifically culinary 'herb' in modern English. 'Seed-bearing plant' captures the participial phrase זֹרֵעַ זֶרַע idiomatically and clearly.
- source_word: אֲשֶׁר עַל פְּנֵי כָל הָאָרֶץ
  chosen: that is on the face of all the earth
  alternatives:
  - that is upon the face of the whole earth
  - that is over all the earth
  lexicon: HALOT
  rationale: Retains the Hebrew spatial idiom 'on the face of' with only minimal smoothing. 'All the earth' is kept rather than reducing to 'the whole world'.
- source_word: כָּל הָעֵץ
  chosen: every tree
  alternatives:
  - all the trees
  lexicon: HALOT
  rationale: Although singular in Hebrew, כָּל + singular commonly has a distributive sense; 'every tree' best reflects that force in English.
- source_word: אֲשֶׁר בּוֹ פְרִי עֵץ זֹרֵעַ זָרַע
  chosen: that has in it fruit bearing seed
  alternatives:
  - in which is the fruit of a tree yielding seed
  - that has seed-bearing tree fruit in it
  - with fruit that bears seed
  lexicon: HALOT
  rationale: Preserves the Hebrew emphasis that the tree contains fruit characterized by seed-bearing. The wording is smoothed enough for readability while staying close to the source structure.
- source_word: לָכֶם יִהְיֶה לְאָכְלָה
  chosen: They will be for you as food
  alternatives:
  - it will be for food to you
  - it shall be yours for food
  lexicon: HALOT
  rationale: The Hebrew singular verb with collective subjects is rendered with natural English plural agreement ('They will be'). 'As food' clearly expresses purpose/use without archaic phrasing.
