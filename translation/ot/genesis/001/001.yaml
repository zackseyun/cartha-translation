theological_decisions:
- issue: Syntax of the opening clause
  chosen_reading: 'Dependent temporal clause: ''When God began to create the heavens
    and the earth—'''
  alternative_readings:
  - 'Independent main clause: ''In the beginning, God created the heavens and the earth.'''
  rationale: Three converging signals from the Hebrew side — the anarthrous form of
    בְּרֵאשִׁית, the immediate finite verb בָּרָא forming a construct-temporal pattern,
    and the parallel openings of Gen 2:4b and Hos 1:2 — favor the dependent-clause
    reading. ANE creation accounts (Enuma Elish, Atrahasis) follow the same protasis-apodosis
    convention. The independent-clause reading rests primarily on later reception
    (LXX, Vulgate, Masoretic accentuation, KJV/NIV/ESV tradition) rather than on
    the consonantal Hebrew. The alternative reading is preserved in the footnote
    with full provenance, and creatio ex nihilo is grounded elsewhere in Scripture
    (Heb 11:3, Rom 4:17, John 1:3) so the doctrine does not turn on this choice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
