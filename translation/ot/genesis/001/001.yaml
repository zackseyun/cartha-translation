id: GEN.1.1
reference: Genesis 1:1
source:
  edition: WLC
  text: בְּ/רֵאשִׁ֖ית בָּרָ֣א אֱלֹהִ֑ים אֵ֥ת הַ/שָּׁמַ֖יִם וְ/אֵ֥ת הָ/אָֽרֶץ׃
translation:
  text: When God began to create the heavens and the earth[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: |-
      Or, traditionally, 'In the beginning, God created the heavens and the earth.'
      The independent-clause reading follows the Septuagint (ca. 300 BCE),
      Vulgate, the Masoretic accentuation (the disjunctive tiphcha under
      בְּרֵאשִׁית), and the major Christian translation tradition (KJV, NIV,
      ESV, NASB, CSB). The temporal/dependent-clause reading adopted here
      reflects Hebrew grammar more strictly: anarthrous בְּרֵאשִׁית followed
      by a finite verb (בָּרָא) parallels the construct-temporal opening of
      Gen 2:4 ('When YHWH God made earth and heavens…'), and matches the
      protasis-apodosis convention of Ancient Near Eastern creation accounts
      (e.g., Enuma Elish, 'When on high…'). It is the reading of Rashi (11th
      c.), Ibn Ezra (12th c.), the JPS Tanakh (1985), Robert Alter (2004), and
      NRSV-UE (2021). Under this reading, verse 2 describes the pre-existing
      state ('the earth was formless and void…') as a circumstantial parenthesis,
      with verse 3 ('God said, "Let there be light"') as the apodosis — the
      first creative act narrated in the chapter. Creatio ex nihilo is taught
      independently in Hebrews 11:3, Romans 4:17, 2 Maccabees 7:28, and John
      1:3 — the doctrine does not hinge on how this verse is syntactically parsed.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרֵאשִׁית
  chosen: When … began to create
  alternatives:
  - In the beginning
  - At the beginning of
  lexicon: HALOT
  rationale: Anarthrous בְּרֵאשִׁית followed by a finite verb (בָּרָא) most naturally
    forms a construct-temporal phrase ('when … began to'), paralleling Gen 2:4b ('on
    the day YHWH God made…') and Hos 1:2 ('when YHWH first spoke…'). The absolute
    reading 'in the beginning' is grammatically possible but would normally take the
    article (בָּרִאשׁוֹנָה or הָרִאשׁוֹנָה). The dependent reading is preserved here;
    the absolute reading is recorded as an alternative in the footnote.
- source_word: בָּרָא
  chosen: created
  alternatives:
  - fashioned
  - brought into being
  lexicon: HALOT
  rationale: בָּרָא is the standard verb for divine creating in the Hebrew Bible.
    'Created' is the most direct and established English equivalent and avoids over-interpreting
    the mechanism of creation.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים takes a singular verb
    here (בָּרָא), indicating the singular referent 'God.' The context is unequivocally
    Israel's God, not a plural of deities.
- source_word: אֵת
  chosen: '[not translated; direct-object marker]'
  lexicon: HALOT
  rationale: אֵת marks the definite direct object in Hebrew and has no direct English
    equivalent. Its function is represented by English word order.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The Hebrew plural form is best reflected by 'the heavens.' In Genesis
    1:1 the phrase 'the heavens and the earth' is a merism for the totality of the
    created order, and 'the heavens' preserves the source form better than singular
    'heaven.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth' depending on context. In the cosmic
    merism with 'the heavens,' 'the earth' is clearly intended.
