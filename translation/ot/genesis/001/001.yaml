theological_decisions:
- issue: Syntax of the opening clause
  chosen_reading: 'Independent main clause: ''In the beginning, God created the heavens
    and the earth.'''
  alternative_readings:
  - 'Dependent clause: ''When God began to create the heavens and the earth...'''
  rationale: The Hebrew permits discussion over whether בְּרֵאשִׁית introduces an
    absolute beginning statement or a dependent temporal clause. The main-clause reading
    is adopted because it is syntactically viable, reads naturally with the finite
    verb בָּרָא, and best fits the verse as the programmatic opening of Scripture.
    The alternative is preserved in a footnote to maintain transparency where the
    syntax is genuinely debated.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
