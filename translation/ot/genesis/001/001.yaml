  unchanged: false
  changes_summary: Adopted the NRSV-UE-style hybrid rendering 'In the beginning, when
    God created the heavens and the earth—' which preserves רֵאשִׁית (the lexical
    content the book of Bereshit is named for) while still reading the clause as
    dependent. Footnote 'a' tightened to four lines naming the traditional alternative,
    the grammatical case, and where the main clause lands (v.3).