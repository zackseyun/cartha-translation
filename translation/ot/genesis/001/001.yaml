id: GEN.1.1
reference: Genesis 1:1
source:
  edition: WLC
  text: בְּ/רֵאשִׁ֖ית בָּרָ֣א אֱלֹהִ֑ים אֵ֥ת הַ/שָּׁמַ֖יִם וְ/אֵ֥ת הָ/אָֽרֶץ׃
translation:
  text: In the beginning[a], God created the heavens and the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: |-
      Or, 'When God began to create the heavens and the earth — the earth being
      formless and void, with darkness over the deep and the Spirit of God hovering
      over the waters — God said, "Let there be light."' Hebrew בְּרֵאשִׁית lacks
      the definite article, which can mark a dependent temporal clause (cf. Gen 2:4).
      The dependent-clause reading is adopted by Rashi (11th c.), the JPS Tanakh
      (1985), Robert Alter (2004), and NRSV-UE (2021). The independent-clause
      reading here follows the Septuagint (ca. 300 BCE), Vulgate, the Masoretic
      accentuation, and most Christian translations (KJV, NIV, ESV, NASB, CSB).
      Creatio ex nihilo is taught independently in Hebrews 11:3, Romans 4:17,
      2 Maccabees 7:28, and John 1:3 — the doctrine does not hinge on how this
      verse is syntactically parsed.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרֵאשִׁית
  chosen: In the beginning
  alternatives:
  - When God began to create
  - At the beginning of
  lexicon: HALOT
  rationale: The preposition ב plus רֵאשִׁית is most naturally rendered temporally
    as 'in the beginning.' Although some construe the phrase as a construct-like opening
    ('when God began to create'), the absence of an explicit following genitive and
    the traditional absolute reading fit the syntax well here. The phrase functions
    as a temporal heading for the creation account.
- source_word: בָּרָא
  chosen: created
  alternatives:
  - fashioned
  - brought into being
  lexicon: HALOT
  rationale: בָּרָא is the standard verb for divine creating in the Hebrew Bible.
    'Created' is the most direct and established English equivalent and avoids over-interpreting
    the mechanism of creation.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים takes a singular verb
    here (בָּרָא), indicating the singular referent 'God.' The context is unequivocally
    Israel's God, not a plural of deities.
- source_word: אֵת
  chosen: '[not translated; direct-object marker]'
  lexicon: HALOT
  rationale: אֵת marks the definite direct object in Hebrew and has no direct English
    equivalent. Its function is represented by English word order.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The Hebrew plural form is best reflected by 'the heavens.' In Genesis
    1:1 the phrase 'the heavens and the earth' is a merism for the totality of the
    created order, and 'the heavens' preserves the source form better than singular
    'heaven.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth' depending on context. In the cosmic
    merism with 'the heavens,' 'the earth' is clearly intended.
