  changes_summary: Switched main reading from independent clause ('In the beginning,
    God created…') to dependent temporal clause ('When God began to create…') based
    on Hebrew grammar (anarthrous בְּרֵאשִׁית + finite verb), internal Hebrew parallels
    (Gen 2:4b, Hos 1:2), and ANE literary convention. Independent reading retained
    as alternative in footnote with full reception-history provenance (LXX, Vulgate,
    Masoretic accents, KJV/NIV/ESV tradition).
