id: GEN.1.1
reference: Genesis 1:1
source:
  edition: WLC
  text: בְּ/רֵאשִׁ֖ית בָּרָ֣א אֱלֹהִ֑ים אֵ֥ת הַ/שָּׁמַ֖יִם וְ/אֵ֥ת הָ/אָֽרֶץ׃
translation:
  text: In the beginning, when God created the heavens and the earth[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: |-
      Traditionally rendered as a complete sentence: 'In the beginning, God created
      the heavens and the earth.' The Hebrew (anarthrous בְּרֵאשִׁית + finite verb
      בָּרָא) reads more naturally as a dependent temporal clause, paralleling Gen 2:4b.
      The main clause is verse 3 ('God said, "Let there be light"').
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרֵאשִׁית
  chosen: In the beginning, when … created
  alternatives:
  - In the beginning, God created
  - When God began to create
  lexicon: HALOT
  rationale: Anarthrous בְּרֵאשִׁית followed by a finite verb (בָּרָא) most naturally
    forms a construct-temporal phrase, paralleling Gen 2:4b ('on the day YHWH God
    made…') and Hos 1:2 ('when YHWH first spoke…'). The hybrid rendering 'In the
    beginning, when God created…' preserves the lexical force of רֵאשִׁית (the word
    that titles the Hebrew book, Bereshit) while honoring the dependent-clause syntax.
    The fully independent reading ('In the beginning, God created the heavens and
    the earth.') is recorded as an alternative in the footnote.
- source_word: בָּרָא
  chosen: created
  alternatives:
  - fashioned
  - brought into being
  lexicon: HALOT
  rationale: בָּרָא is the standard verb for divine creating in the Hebrew Bible.
    'Created' is the most direct and established English equivalent and avoids over-interpreting
    the mechanism of creation.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים takes a singular verb
    here (בָּרָא), indicating the singular referent 'God.' The context is unequivocally
    Israel's God, not a plural of deities.
- source_word: אֵת
  chosen: '[not translated; direct-object marker]'
  lexicon: HALOT
  rationale: אֵת marks the definite direct object in Hebrew and has no direct English
    equivalent. Its function is represented by English word order.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The Hebrew plural form is best reflected by 'the heavens.' In Genesis
    1:1 the phrase 'the heavens and the earth' is a merism for the totality of the
    created order, and 'the heavens' preserves the source form better than singular
    'heaven.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth' depending on context. In the cosmic
    merism with 'the heavens,' 'the earth' is clearly intended.
