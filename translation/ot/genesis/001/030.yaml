id: GEN.1.30
reference: Genesis 1:30
source:
  edition: WLC
  text: וּֽ/לְ/כָל חַיַּ֣ת הָ֠/אָרֶץ וּ/לְ/כָל ע֨וֹף הַ/שָּׁמַ֜יִם וּ/לְ/כֹ֣ל רוֹמֵ֣שׂ עַל הָ/אָ֗רֶץ אֲשֶׁר בּ/וֹ֙ נֶ֣פֶשׁ חַיָּ֔ה אֶת כָּל יֶ֥רֶק עֵ֖שֶׂב לְ/אָכְלָ֑ה וַֽ/יְהִי כֵֽן־־׀־־־־־׃
translation:
  text: And to every beast of the earth, and to every bird of the heavens, and to everything that creeps on the earth in which there is a living creature, I give every green plant for food. And it was so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'in which there is a living creature' or 'in which is a living soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in which there is the breath of life'.
    reason: previous_rendering
  - marker: c
    text: Or 'I have given every green plant for food.'.
    reason: previous_rendering
lexical_decisions:
- source_word: חַיַּת הָאָרֶץ
  chosen: beast of the earth
  alternatives:
  - wild animal of the earth
  - living creature of the earth
  - animal of the earth
  lexicon: HALOT
  rationale: חַיָּה in construct with הארץ denotes land animals/beasts. 'Beast of the earth' is a natural, fairly formal rendering that preserves the category distinction in the creation account without over-specifying 'wild.'
- source_word: עוֹף הַשָּׁמַיִם
  chosen: bird of the heavens
  alternatives:
  - flying creature of the heavens
  - bird of the sky
  - bird of heaven
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in Genesis 1 English 'bird' is the clearest idiomatic rendering. 'Of the heavens' preserves the Hebrew plural שָׁמַיִם more closely than 'of the sky,' while remaining readable.
- source_word: כֹל רוֹמֵשׂ עַל הָאָרֶץ
  chosen: everything that creeps on the earth
  alternatives:
  - every creeping thing on the earth
  - everything that moves on the earth
  lexicon: HALOT
  rationale: רוֹמֵשׂ refers to creeping/moving small creatures. 'Everything that creeps on the earth' is idiomatic and keeps the concrete imagery of the Hebrew better than the broader 'moves.'
- source_word: אֲשֶׁר בּוֹ נֶפֶשׁ חַיָּה
  chosen: in which there is the breath of life
  alternatives:
  - in which is a living soul
  - in which there is living life
  - in which there is a living creature/life
  lexicon: HALOT
  rationale: נֶפֶשׁ חַיָּה is literally 'living soul/creature,' but in this context the clause identifies animate life in animals. 'Breath of life' communicates the sense naturally in English and aligns with the life-principle in the context, though it is somewhat interpretive; the more literal alternative is preserved in a footnote.
- source_word: אֶת כָּל יֶרֶק עֵשֶׂב
  chosen: every green plant
  alternatives:
  - all green vegetation
  - every green herb
  - all the green plants
  lexicon: HALOT
  rationale: יֶרֶק denotes greenness/green vegetation and עֵשֶׂב denotes herbage/plant growth. Together they refer to green vegetation as food. 'Every green plant' is clear modern English and avoids the archaic 'herb.'
- source_word: לְאָכְלָה
  chosen: for food
  alternatives:
  - for eating
  - as food
  lexicon: HALOT
  rationale: 'The lamed plus noun expresses purpose: for consumption. ''For food'' is concise and idiomatic.'
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - and so it was
  - and it came to be so
  lexicon: HALOT
  rationale: This is the standard fulfillment formula in Genesis 1. 'And it was so' is both accurate and stylistically fitting.
