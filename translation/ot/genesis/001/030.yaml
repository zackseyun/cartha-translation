theological_decisions:
- issue: Rendering נֶפֶשׁ חַיָּה in animal context
  chosen_reading: rendered functionally as 'the breath of life' in the main text
  alternative_readings:
  - '''a living creature'''
  - '''a living soul'''
  rationale: The phrase can be rendered more literally as 'living creature,' but in this clause the emphasis is on creatures possessing animate life. 'Breath of life' communicates that sense in natural English without importing a claim about human uniqueness or animal personhood. Because this is somewhat interpretive, the more literal alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §3, §6
revisions:
- timestamp: '2026-04-20T08:29:57Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/001/030.json
  category: mistranslation
  from: in which there is the breath of life
  to: in which there is a living creature
  rationale: Hebrew is נֶפֶשׁ חַיָּה (nephesh chayyah), which means 'living creature/being' and is consistently rendered so in Gen 1:20, 1:21, 1:24. 'Breath of life' is the standard English for a DIFFERENT Hebrew phrase, נִשְׁמַת חַיִּים (nishmat chayyim), found in Gen 2:7. GPT-5.4's rendering conflated the two phrases.
- timestamp: '2026-04-21T00:17:05Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/001/030.json
  category: awkward_english
  tier: 1
  from: I have given every green plant for food.
  to: I give every green plant for food.
  rationale: The verb 'I have given' is supplied from the context of verse 29 (נָתַתִּי). While 'I have given' (perfect tense) is a valid rendering of the Hebrew qatal, in this context of a divine decree, the English simple present 'I give' often carries a more immediate, performative, and timeless sense that fits the genre of creation commands well. This is a stylistic suggestion for improving the force of the statement.
