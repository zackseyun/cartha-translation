id: GEN.1.14
reference: Genesis 1:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים יְהִ֤י מְאֹרֹת֙ בִּ/רְקִ֣יעַ הַ/שָּׁמַ֔יִם לְ/הַבְדִּ֕יל
    בֵּ֥ין הַ/יּ֖וֹם וּ/בֵ֣ין הַ/לָּ֑יְלָה וְ/הָי֤וּ לְ/אֹתֹת֙ וּ/לְ/מ֣וֹעֲדִ֔ים וּ/לְ/יָמִ֖ים
    וְ/שָׁנִֽים׃
translation:
  text: And God said, “Let there be lights in the expanse of the heavens to separate
    the day from the night, and let them be for signs and for appointed times, and
    for days and years.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for seasons.” The Hebrew מוֹעֲדִים often means appointed times and can
      include festal times in other contexts.
    reason: lexical_alternative
  - marker: b
    text: Or “luminaries” for “lights.”
    reason: lexical_alternative
  - marker: c
    text: Or “firmament” or “vault” for “expanse.”
    reason: lexical_alternative
  - marker: d
    text: Or 'for signs and for appointed times, and for days and years'.
    reason: previous_rendering
lexical_decisions:
- source_word: מְאֹרֹת
  chosen: lights
  alternatives:
  - luminaries
  lexicon: HALOT
  rationale: The noun refers to light-bearers or sources of light. 'Lights' is natural
    modern English and fits the creation context; 'luminaries' is possible but less
    accessible and more elevated than the source requires.
- source_word: רָקִיעַ
  chosen: expanse
  alternatives:
  - firmament
  - vault
  lexicon: HALOT
  rationale: '''Expanse'' preserves the sense of a spread-out heavenly space without
    importing the archaic feel of ''firmament.'' ''Vault'' is possible but can over-specify
    a dome image beyond what optimal equivalence requires.'
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The Hebrew is plural in form and in Genesis 1 commonly denotes the heavens/sky
    realm. 'The heavens' preserves the literary register and canonical resonance better
    than the flatter 'sky.'
- source_word: לְהַבְדִּיל
  chosen: to separate
  alternatives:
  - to divide
  - to distinguish
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To separate' is the clearest idiomatic
    rendering in English and matches the repeated separation motif in Genesis 1.
- source_word: בֵּין הַיּוֹם וּבֵין הַלַּיְלָה
  chosen: the day from the night
  alternatives:
  - between the day and the night
  lexicon: HALOT
  rationale: English idiom prefers 'separate X from Y' rather than repeating 'between
    ... and between ...'. The articles are retained in sense with 'the day' and 'the
    night.'
- source_word: לְאֹתֹת
  chosen: for signs
  alternatives:
  - as signs
  lexicon: HALOT
  rationale: אות here denotes markers or indicators. 'For signs' follows the Hebrew
    lamed construction smoothly and leaves the term broad enough to include observable
    heavenly markers without narrowing it.
- source_word: לְמוֹעֲדִים
  chosen: for appointed times
  alternatives:
  - for seasons
  - for appointed seasons
  - for festivals
  lexicon: HALOT
  rationale: מוֹעֲדִים can denote appointed times, including festal times in later
    usage. Here 'appointed times' best preserves the broader temporal sense without
    restricting it to climatic seasons or explicitly cultic festivals.
- source_word: לְיָמִים וְשָׁנִים
  chosen: for days and years
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal units named in the Hebrew;
    no contextual pressure suggests a more dynamic paraphrase.
- source_word: יְהִי ... וְהָיוּ
  chosen: Let there be ... and let them be
  alternatives:
  - Let there be ... and they will be
  - Let there be ... and they shall be
  lexicon: HALOT
  rationale: The jussive plus following verb in context is well represented by English
    volitive language. Repeating 'let them be' preserves the divine fiat style of
    the passage better than a predictive future.
