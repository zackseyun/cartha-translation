theological_decisions:
- issue: Meaning of מוֹעֲדִים in the creation context
  chosen_reading: broad temporal 'appointed times' rather than specifically liturgical
    festivals or merely climatic seasons
  alternative_readings:
  - seasons
  - festivals
  rationale: The term can later refer to Israel's appointed feasts, but in Genesis
    1:14 the context is cosmic ordering of time. 'Appointed times' preserves possible
    later theological resonance without importing a narrower cultic meaning into the
    creation account.
  doctrine_reference: Translation philosophy §3, §5
