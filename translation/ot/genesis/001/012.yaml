id: GEN.1.12
reference: Genesis 1:12
source:
  edition: WLC
  text: וַ/תּוֹצֵ֨א הָ/אָ֜רֶץ דֶּ֠שֶׁא עֵ֣שֶׂב מַזְרִ֤יעַ זֶ֨רַע֙ לְ/מִינֵ֔/הוּ וְ/עֵ֧ץ עֹֽשֶׂה פְּרִ֛י אֲשֶׁ֥ר זַרְע/וֹ ב֖/וֹ לְ/מִינֵ֑/הוּ וַ/יַּ֥רְא אֱלֹהִ֖ים כִּי טֽוֹב־־־׃
translation:
  text: 'And the earth brought forth vegetation: plants yielding seed according to their kinds, and trees bearing fruit with their seed in it, according to their kinds. And God saw that it was good.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after their kind.' The Hebrew expression means 'according to its/their kind(s),' referring to created categories rather than using a modern technical term like 'species.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in which their seed is'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתּוֹצֵא
  chosen: brought forth
  alternatives:
  - produced
  - brought out
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of יצא here describes the earth causing vegetation to come forth. 'Brought forth' is idiomatic, preserves the generative nuance, and matches the elevated but readable style of the creation account better than the flatter 'produced'.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In Genesis 1 the cosmic setting favors 'earth' rather than 'land.' This maintains coherence with the broader creation narrative.
- source_word: דֶּשֶׁא
  chosen: vegetation
  alternatives:
  - green growth
  - sprouting greenery
  - grass
  lexicon: HALOT
  rationale: דֶּשֶׁא is a broad term for fresh plant growth, not merely 'grass.' 'Vegetation' best captures the collective category and avoids narrowing the sense.
- source_word: עֵשֶׂב
  chosen: plants
  alternatives:
  - herbs
  - vegetation
  - green plants
  lexicon: HALOT
  rationale: עֵשֶׂב often denotes herbage or seed-bearing plants. 'Plants' is natural modern English and fits the following participial qualifier 'yielding seed.' 'Herbs' would sound too narrow or archaic.
- source_word: מַזְרִיעַ זֶרַע
  chosen: yielding seed
  alternatives:
  - seeding seed
  - producing seed
  - bearing seed
  lexicon: HALOT
  rationale: The participle plus object expresses ongoing reproductive capacity. 'Yielding seed' is concise, idiomatic, and close to the Hebrew wording.
- source_word: לְמִינֵהוּ
  chosen: according to their kinds
  alternatives:
  - after their kind
  - by its kind
  lexicon: HALOT
  rationale: מין refers to a kind or category. Because the English referent is rendered with plural collectives ('plants,' 'trees'), 'their kinds' gives smooth agreement while preserving the classificatory sense. 'After their kind' is traditional but archaic.
- source_word: וְעֵץ עֹשֶׂה פְּרִי
  chosen: and trees bearing fruit
  alternatives:
  - and fruit trees making fruit
  - and tree producing fruit
  lexicon: HALOT
  rationale: Although עֵץ is singular in form, it functions collectively here. 'Trees bearing fruit' is idiomatic English and reflects the participial description of fruit production.
- source_word: אֲשֶׁר זַרְעוֹ בוֹ
  chosen: in which their seed is
  alternatives:
  - with seed in it
  - whose seed is in them
  lexicon: HALOT
  rationale: The clause specifies that the seed is contained within the fruit/tree product. Because the English subject is collective plural, 'their seed' gives natural agreement. 'In which' preserves the relative construction without overcomplicating the sentence.
- source_word: וַיַּרְא אֱלֹהִים כִּי טוֹב
  chosen: And God saw that it was good
  alternatives:
  - And God saw that this was good
  lexicon: HALOT
  rationale: This is the standard evaluative refrain in Genesis 1. 'It was good' is the most natural and faithful rendering of the clause.
