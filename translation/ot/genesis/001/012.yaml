theological_decisions:
- issue: Rendering the creation categories without importing modern biological taxonomy
  chosen_reading: according to their kinds
  alternative_readings:
  - according to species
  - after their kind
  rationale: The Hebrew מין denotes a category or kind in the ancient text, not a technical modern scientific species concept. 'According to their kinds' preserves the text's own classification language without forcing later scientific or anti-scientific debates into the verse.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not import doctrinal claims the text does not make.'
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/001/012.json
  category: awkward_english
  tier: 1
  from: in which their seed is
  to: with their seed in it
  rationale: The current rendering, while grammatically precise in linking 'their seed' back to 'trees', is stylistically awkward and formal in English. The Hebrew relative clause 'אֲשֶׁר זַרְעוֹ בוֹ' (which its seed is in it) can be rendered more naturally and idiomatically as 'with their seed in it', where 'it' clearly refers to the fruit. This change improves the flow of the verse without sacrificing accuracy.
