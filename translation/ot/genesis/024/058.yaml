id: GEN.24.58
reference: Genesis 24:58
source:
  edition: WLC
  text: וַ/יִּקְרְא֤וּ לְ/רִבְקָה֙ וַ/יֹּאמְר֣וּ אֵלֶ֔י/הָ הֲ/תֵלְכִ֖י עִם הָ/אִ֣ישׁ
    הַ/זֶּ֑ה וַ/תֹּ֖אמֶר אֵלֵֽךְ־׃
translation:
  text: So they called Rebekah and said to her, “Will you go with this man?” And she
    said, “I will go.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they called
  alternatives:
  - they summoned
  lexicon: HALOT
  rationale: The verb קרא in this context means to call for or summon someone into
    the discussion. 'Called' is natural modern English and sufficiently formal; 'summoned'
    is possible but sounds more forceful than the context requires.
- source_word: לְרִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Rebekah'
    closely reflects the Hebrew רִבְקָה and is a common English biblical form.
- source_word: וַיֹּאמְרוּ אֵלֶיהָ
  chosen: said to her
  alternatives:
  - asked her
  lexicon: HALOT
  rationale: The Hebrew uses the common verb 'say' with indirect object. Because the
    content is a direct question, English could idiomatically use 'asked her,' but
    'said to her' preserves the source wording more transparently.
- source_word: הֲתֵלְכִי
  chosen: Will you go
  alternatives:
  - Are you willing to go
  - Will you leave
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' In this interrogative form addressed
    to a woman, 'Will you go' best captures the straightforward question without adding
    volitional nuance beyond what the Hebrew explicitly states.
- source_word: עִם הָאִישׁ הַזֶּה
  chosen: with this man
  alternatives:
  - with this האיש
  - with this האיש הזה
  - with this servant
  lexicon: HALOT
  rationale: אִישׁ normally means 'man.' Although the referent is Abraham's servant,
    the Hebrew here does not use 'servant' but 'this man,' so the translation should
    preserve that wording.
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - And she answered
  lexicon: HALOT
  rationale: Again the common verb 'say' is used. 'Answered' would fit the dialogue
    context, but 'said' more directly reflects the Hebrew.
- source_word: אֵלֵךְ
  chosen: I will go
  alternatives:
  - I will come
  - I am willing to go
  lexicon: HALOT
  rationale: The first-person singular of הלך is a simple future-like declaration.
    'I will go' is the plain sense. 'I will come' would reflect viewpoint shift in
    some English contexts but not the Hebrew wording here.
