id: GEN.24.23
reference: Genesis 24:23
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ בַּת מִ֣י אַ֔תְּ הַגִּ֥ידִי נָ֖א לִ֑/י הֲ/יֵ֧שׁ בֵּית אָבִ֛י/ךְ
    מָק֥וֹם לָ֖/נוּ לָ/לִֽין־־׃
translation:
  text: And he said, “Whose daughter are you? Please tell me. Is there room in your
    father’s house for us to spend the night?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Is there place in your father’s house for us to lodge?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: בַּת מִי אַתְּ
  chosen: Whose daughter are you?
  alternatives:
  - You are the daughter of whom?
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew kinship question, preserving
    the focus on family identity.
- source_word: הַגִּידִי נָא לִי
  chosen: Please tell me
  alternatives:
  - Tell me, please
  lexicon: HALOT
  rationale: Imperative with particle נָא expresses polite request rather than command;
    'please' captures the softening force naturally in English.
- source_word: הֲיֵשׁ
  chosen: Is there
  alternatives:
  - Is there indeed
  - Does there exist
  lexicon: HALOT
  rationale: Existential particle introducing a yes/no question; simple English existential
    construction is the most natural equivalent.
- source_word: בֵּית אָבִיךְ
  chosen: your father’s house
  alternatives:
  - the house of your father
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically; 'father’s house' preserves the
    household/family setting better than a flattened 'home'.
- source_word: מָקוֹם
  chosen: room
  alternatives:
  - place
  - space
  lexicon: HALOT
  rationale: In lodging context, מָקוֹם refers to available space/accommodation. 'Room'
    is natural English for hospitality context, while still reflecting the concrete
    sense.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - for me and my company
  lexicon: HALOT
  rationale: First person plural should be preserved; the servant speaks for himself
    and those with him.
- source_word: לָלִין
  chosen: to spend the night
  alternatives:
  - to lodge
  - to stay overnight
  lexicon: HALOT
  rationale: Infinitive of לון/לין in hospitality context means staying overnight.
    'Spend the night' is clear modern English; 'lodge' is possible but less natural
    for the target audience.
