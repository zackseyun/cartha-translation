theological_decisions:
- issue: Rendering of אָדוֹן in reference to Abraham
  chosen_reading: my master
  alternative_readings:
  - my lord
  rationale: Because the referent is Abraham as the servant's human superior, 'master'
    communicates the social relationship more clearly in contemporary English and
    avoids accidental theological overtones associated with 'Lord.'
