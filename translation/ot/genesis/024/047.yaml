  from: asked her and said
  to: asked her, saying,
  rationale: The Hebrew construction וָאֶשְׁאַל... וָאֹמַר ('and I asked... and I
    said') is a common idiom, almost a hendiadys, where the asking is accomplished
    through speaking. The literal rendering 'asked her and said' is slightly pleonastic
    in English. A more natural phrasing like 'asked her, saying,' or even just 'asked
    her,' would convey the same meaning more smoothly without losing accuracy.
