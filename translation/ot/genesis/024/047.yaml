id: GEN.24.47
reference: Genesis 24:47
source:
  edition: WLC
  text: וָ/אֶשְׁאַ֣ל אֹתָ֗/הּ וָ/אֹמַר֮ בַּת מִ֣י אַתְּ֒ וַ/תֹּ֗אמֶר בַּת בְּתוּאֵל֙
    בֶּן נָח֔וֹר אֲשֶׁ֥ר יָֽלְדָה לּ֖/וֹ מִלְכָּ֑ה וָ/אָשִׂ֤ם הַ/נֶּ֨זֶם֙ עַל אַפָּ֔/הּ
    וְ/הַ/צְּמִידִ֖ים עַל יָדֶֽי/הָ־־־־־־׃
translation:
  text: Then I asked her, saying, ‘Whose daughter are you?’ And she said, ‘The daughter
    of Bethuel son of Nahor, whom Milcah bore to him.’ Then I put the ring on her
    nose and the bracelets on her hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nose ring' for 'the ring'; the Hebrew term can denote a ring generally,
      and the following phrase 'on her nose' specifies its use here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on her hands'; this may refer more specifically to the wrists in
      context.
    reason: lexical_alternative
  - marker: c
    text: Or 'asked her and said'.
    reason: previous_rendering
lexical_decisions:
- source_word: וָאֶשְׁאַל
  chosen: Then I asked
  alternatives:
  - And I asked
  - So I asked
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I asked' gives natural
    English sequence while preserving the past narrative force of שאל.
- source_word: בַּת מִי אַתְּ
  chosen: Whose daughter are you?
  alternatives:
  - You are the daughter of whom?
  - Whose daughter are you
  lexicon: HALOT
  rationale: This is the idiomatic English equivalent of the Hebrew kinship question,
    preserving both the filial term בַּת and the interrogative מִי.
- source_word: בַּת בְּתוּאֵל בֶּן נָחוֹר
  chosen: The daughter of Bethuel son of Nahor
  alternatives:
  - I am the daughter of Bethuel, Nahor's son
  lexicon: HALOT
  rationale: Retains the Hebrew genealogical structure with apposition. The supplied
    English article helps natural speech.
- source_word: אֲשֶׁר יָלְדָה לּוֹ מִלְכָּה
  chosen: whom Milcah bore to him
  alternatives:
  - whom Milcah gave birth to for him
  - whom Milcah bore
  lexicon: HALOT
  rationale: Preserves the relative clause and the explicit maternal identification.
    'To him' reflects לּוֹ, indicating Bethuel was borne to Nahor.
- source_word: וָאָשִׂם
  chosen: Then I put
  alternatives:
  - And I placed
  - So I put
  lexicon: HALOT
  rationale: Simple narrative continuation; 'put' is the most natural rendering of
    שׂים here.
- source_word: הַנֶּזֶם
  chosen: the ring
  alternatives:
  - the nose ring
  lexicon: HALOT
  rationale: נזם can denote a ring generally, but the following phrase specifies its
    location. Rendering it as 'the ring' avoids redundancy while allowing the location
    phrase to define it.
- source_word: עַל אַפָּהּ
  chosen: on her nose
  alternatives:
  - in her nose
  - on her nostril
  lexicon: HALOT
  rationale: The Hebrew noun אַף literally means 'nose' here. 'On her nose' is the
    plain sense and avoids euphemizing the ornament's placement.
- source_word: וְהַצְּמִידִים
  chosen: and the bracelets
  alternatives:
  - and the armlets
  lexicon: HALOT
  rationale: צמידים refers to bracelets or bands worn on the arms/hands. 'Bracelets'
    is the clearest modern English term.
- source_word: עַל יָדֶיהָ
  chosen: on her hands
  alternatives:
  - on her wrists
  - on her arms
  lexicon: HALOT
  rationale: The Hebrew יָד can cover hand/arm more broadly, but with bracelets the
    idiomatic English could be 'wrists.' Here 'hands' stays closer to the Hebrew wording
    while remaining understandable.
