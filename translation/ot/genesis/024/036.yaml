id: GEN.24.36
reference: Genesis 24:36
source:
  edition: WLC
  text: וַ/תֵּ֡לֶד שָׂרָה֩ אֵ֨שֶׁת אֲדֹנִ֥/י בֵן֙ לַֽ/אדֹנִ֔/י אַחֲרֵ֖י זִקְנָתָ֑/הּ
    וַ/יִּתֶּן לּ֖/וֹ אֶת כָּל אֲשֶׁר לֽ/וֹ־־־־׃
translation:
  text: And Sarah, my master's wife, bore a son to my master after she had grown old,
    and he gave him all that he had.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'after her old age.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Qal wayyiqtol of ילד, standard narrative past. 'Bore' is concise, idiomatic
    English for a woman bearing a child, fitting the formal narrative style.
- source_word: אֵשֶׁת אֲדֹנִי
  chosen: my master's wife
  alternatives:
  - the wife of my master
  lexicon: HALOT
  rationale: Construct phrase meaning 'wife of my master.' 'My master's wife' is the
    most natural English rendering while preserving the servant's deferential speech.
- source_word: בֵן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Indefinite in English though context identifies Isaac; Hebrew lacks the
    article here. 'A son' reflects the birth announcement naturally.
- source_word: לַאדֹנִי
  chosen: to my master
  alternatives:
  - for my master
  lexicon: HALOT
  rationale: The preposition ל marks relation/benefaction in the idiom 'bore a son
    to.' 'To my master' preserves the Hebrew construction and remains idiomatic in
    English.
- source_word: אַחֲרֵי זִקְנָתָהּ
  chosen: after she had grown old
  alternatives:
  - after her old age
  - in her old age
  - after she became old
  lexicon: HALOT
  rationale: Literally 'after her old age,' an idiom indicating advanced age. 'After
    she had grown old' communicates the temporal sense clearly in modern English without
    flattening the emphasis on Sarah's aged condition.
- source_word: וַיִּתֶּן לוֹ
  chosen: and he gave him
  alternatives:
  - and he has given him
  lexicon: HALOT
  rationale: Wayyiqtol of נתן continues the past narrative sequence. Subject is Abraham;
    indirect object is the son just mentioned. Simple past is appropriate.
- source_word: אֶת כָּל אֲשֶׁר לוֹ
  chosen: all that he had
  alternatives:
  - everything that belonged to him
  - all that was his
  lexicon: HALOT
  rationale: A comprehensive possession formula. 'All that he had' is a clear, natural
    rendering that preserves the totality of Abraham's transfer of estate.
