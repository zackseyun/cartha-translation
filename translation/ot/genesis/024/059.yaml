id: GEN.24.59
reference: Genesis 24:59
source:
  edition: WLC
  text: וַֽ/יְשַׁלְּח֛וּ אֶת רִבְקָ֥ה אֲחֹתָ֖/ם וְ/אֶת מֵנִקְתָּ֑/הּ וְ/אֶת עֶ֥בֶד
    אַבְרָהָ֖ם וְ/אֶת אֲנָשָֽׁי/ו־־־־׃
translation:
  text: So they sent away Rebekah their sister, and her nurse, and Abraham’s servant,
    and his men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically, 'her wet nurse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלְּחוּ
  chosen: sent away
  alternatives:
  - sent
  - let go
  - dismissed
  lexicon: HALOT
  rationale: The piel of שׁלח here denotes causing someone to depart. 'Sent away'
    captures the formal act of dispatching Rebekah and the others on their journey
    better than the flatter 'sent.'
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  rationale: Standard English transliteration from Hebrew is retained, following the
    policy to transliterate personal names rather than translate them.
- source_word: אֲחֹתָם
  chosen: their sister
  alternatives:
  - their kinswoman
  lexicon: HALOT
  rationale: The noun אָחוֹת means 'sister.' Although kinship terms can sometimes
    broaden in sense, the immediate family context supports the straightforward rendering
    'their sister.'
- source_word: מֵנִקְתָּהּ
  chosen: her nurse
  alternatives:
  - her wet nurse
  - her nursing attendant
  lexicon: HALOT
  rationale: The participial form from ינק refers to a woman who nurses a child. 'Her
    nurse' is natural modern English and fits the narrative; 'wet nurse' is more specific
    and possible, but less idiomatic here. The more specific sense is preserved in
    a footnote.
- source_word: עֶבֶד אַבְרָהָם
  chosen: Abraham’s servant
  alternatives:
  - the servant of Abraham
  - Abraham’s slave
  lexicon: HALOT
  rationale: Construct syntax naturally yields 'Abraham’s servant.' While עֶבֶד can
    mean 'slave,' in this narrative context the bonded status is not the focus; 'servant'
    is the better optimal-equivalence rendering and aligns with the project's context-dependent
    policy for this term.
- source_word: אֲנָשָׁיו
  chosen: his men
  alternatives:
  - his servants
  - the men with him
  lexicon: HALOT
  rationale: אַנְשֵׁי/אֲנָשִׁים commonly means 'men.' Here the suffix refers back
    to Abraham's servant, so 'his men' most directly reflects the Hebrew without over-interpreting
    their exact role.
