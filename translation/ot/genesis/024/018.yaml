id: GEN.24.18
reference: Genesis 24:18
source:
  edition: WLC
  text: וַ/תֹּ֖אמֶר שְׁתֵ֣ה אֲדֹנִ֑/י וַ/תְּמַהֵ֗ר וַ/תֹּ֧רֶד כַּדָּ֛/הּ עַל יָדָ֖/הּ
    וַ/תַּשְׁקֵֽ/הוּ־׃
translation:
  text: She said, “Drink, my lord,” and she quickly lowered her jar onto her hand
    and gave him a drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sir.” The Hebrew address is literally “my lord,” used here as a respectful
      form of address to a man.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵה
  chosen: Drink
  alternatives:
  - Have a drink
  lexicon: HALOT
  rationale: Imperative 2ms of שׁתה, a direct invitation/command to drink. 'Drink'
    is the most straightforward English equivalent and preserves the concise force
    of the Hebrew.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: In this narrative setting the term is a polite address to a human superior/stranger,
    not a divine title. 'My lord' preserves the literal sense and social deference
    better than the more interpretive 'sir'; 'my master' would sound too strong in
    English for this encounter.
- source_word: וַתְמַהֵר
  chosen: she quickly
  alternatives:
  - she hurried
  - she hastened
  lexicon: HALOT
  rationale: The verb conveys haste. Rendering it adverbially with the following action
    ('she quickly lowered') produces natural English while preserving the narrative
    emphasis on promptness.
- source_word: וַתֹּרֶד כַּדָּהּ
  chosen: lowered her jar
  alternatives:
  - let down her jar
  - brought down her jar
  lexicon: HALOT
  rationale: ירד with the jar indicates moving it downward from a carried position.
    'Lowered her jar' is idiomatic and fits the physical action in context.
- source_word: עַל יָדָהּ
  chosen: onto her hand
  alternatives:
  - upon her hand
  - to her hand
  - from her shoulder
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'upon her hand.' This likely describes shifting
    the jar into position for pouring. 'Onto her hand' keeps the concrete wording
    without importing the shoulder detail from context not stated in this verse.
- source_word: וַתַּשְׁקֵהוּ
  chosen: gave him a drink
  alternatives:
  - watered him
  - let him drink
  - gave him water to drink
  lexicon: HALOT
  rationale: The Hiphil of שׁקה means to give drink/cause to drink. 'Gave him a drink'
    is natural modern English and accurately conveys the causative sense.
