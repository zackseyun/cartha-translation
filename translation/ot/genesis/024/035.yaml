theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה. This verse contains the covenant name, so the default is followed without
    introducing a transliteration into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֲבָדִם / שְׁפָחֹת in a property list
  chosen_reading: male servants and female servants
  alternative_readings:
  - male slaves and female slaves
  - servants and maidservants
  rationale: The translation philosophy allows 'servant / slave' context-dependently.
    Although these persons are listed among possessions, the verse itself is an inventory
    report rather than a theological statement about bondage, so 'servants' is retained
    in the main text while preserving the stronger alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent);
    applied analogically to Hebrew service terminology'
