id: GEN.24.16
reference: Genesis 24:16
source:
  edition: WLC
  text: וְ/הַֽ/נַּעֲרָ֗ טֹבַ֤ת מַרְאֶה֙ מְאֹ֔ד בְּתוּלָ֕ה וְ/אִ֖ישׁ לֹ֣א יְדָעָ֑/הּ
    וַ/תֵּ֣רֶד הָ/עַ֔יְנָ/ה וַ/תְּמַלֵּ֥א כַדָּ֖/הּ וַ/תָּֽעַל׃
translation:
  text: Now the young woman was very beautiful in appearance, a virgin; no man had
    known her. She went down to the spring, filled her jar, and came up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no man had had sexual relations with her.' The Hebrew says literally,
      'no man had known her.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the spring'; some translations render 'to the well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָ
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female, often of marriageable age. 'Young woman'
    is natural modern English and fits the narrative context better than the more
    archaic 'maiden' or the potentially too juvenile 'girl'.
- source_word: טֹבַת מַרְאֶה מְאֹד
  chosen: very beautiful in appearance
  alternatives:
  - very attractive in appearance
  - very good-looking
  lexicon: HALOT
  rationale: The phrase literally describes goodness/beauty of appearance intensified
    by מְאֹד. 'Very beautiful in appearance' preserves the Hebrew idiom's focus on
    visible beauty without sounding wooden.
- source_word: בְּתוּלָה
  chosen: a virgin
  alternatives:
  - a maiden
  lexicon: HALOT
  rationale: בְּתוּלָה ordinarily denotes a virgin in Hebrew narrative. 'Virgin' is
    the most direct and contextually appropriate rendering here.
- source_word: וְאִישׁ לֹא יְדָעָהּ
  chosen: no man had known her
  alternatives:
  - no man had had sexual relations with her
  - no man had been intimate with her
  lexicon: HALOT
  rationale: יָדַע 'to know' is a standard Hebrew euphemism for sexual relations.
    Rendering it as 'had known her' preserves the idiom's literary restraint while
    remaining understandable in context; the preceding 'a virgin' clarifies the sense.
- source_word: הָעַיְנָה
  chosen: to the spring
  alternatives:
  - to the fountain
  - to the well
  lexicon: HALOT
  rationale: עַיִן commonly refers to a spring or source of water. 'Spring' is more
    precise than 'well' here, since the Hebrew term is not בְּאֵר.
- source_word: כַדָּהּ
  chosen: her jar
  alternatives:
  - her water jar
  - her pitcher
  lexicon: HALOT
  rationale: כַּד is a jar or pitcher used for drawing water. 'Jar' is concise and
    natural; 'pitcher' is possible but slightly more dated in many contexts.
- source_word: וַתָּעַל
  chosen: and came up
  alternatives:
  - and went up
  - and returned
  lexicon: HALOT
  rationale: עָלָה means 'go up/come up.' Since she had gone down to the spring, 'came
    up' reflects the spatial contrast in idiomatic English.
