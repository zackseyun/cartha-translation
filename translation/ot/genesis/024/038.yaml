id: GEN.24.38
reference: Genesis 24:38
source:
  edition: WLC
  text: אִם לֹ֧א אֶל בֵּית אָבִ֛/י תֵּלֵ֖ךְ וְ/אֶל מִשְׁפַּחְתִּ֑/י וְ/לָקַחְתָּ֥
    אִשָּׁ֖ה לִ/בְנִֽ/י־־־־׃
translation:
  text: No, rather, you shall go to my father's house and to my clan, and you shall
    take a wife for my son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my family' or 'my kin' for 'my clan.' The Hebrew term refers to an extended
      family group, not merely an immediate household.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: No, rather
  alternatives:
  - surely
  - instead
  - but rather
  lexicon: HALOT
  rationale: In this oath-setting context, אִם לֹא functions idiomatically not as
    a simple conditional ('if not') but as an emphatic corrective/exceptive expression,
    contrasting with the previous prohibition. 'No, rather' captures the force in
    natural English while preserving the adversative emphasis.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction toward a destination. 'To' is the most
    natural English equivalent here.
- source_word: בֵּית אָבִי
  chosen: my father's house
  alternatives:
  - the house of my father
  - my father's household
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of my father.' 'My father's
    house' is both accurate and idiomatic. 'Household' is possible, but the immediate
    parallel with 'my clan' favors retaining the more literal 'house' while allowing
    the broader kinship sense.
- source_word: תֵּלֵךְ
  chosen: you shall go
  alternatives:
  - you must go
  - you will go
  lexicon: HALOT
  rationale: The imperfect here expresses instruction/obligation within Abraham's
    charge to the servant. 'You shall go' preserves both the directive force and the
    formal tone.
- source_word: וְאֶל מִשְׁפַּחְתִּי
  chosen: and to my clan
  alternatives:
  - and to my family
  - and to my kin
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes family group or clan. 'Clan' best preserves the extended-kinship
    sense, broader than immediate family. 'Family' is possible but can sound too narrow
    in modern English.
- source_word: וְלָקַחְתָּ
  chosen: and you shall take
  alternatives:
  - and get
  - and obtain
  lexicon: HALOT
  rationale: לקח is the standard verb 'take.' In marriage arrangements it can mean
    'take/acquire' a wife for someone. 'Take' is the most direct and conventional
    rendering here.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Although אִשָּׁה can mean 'woman' or 'wife,' the marriage context requires
    'wife' here.
- source_word: לִבְנִי
  chosen: for my son
  alternatives:
  - to my son
  lexicon: HALOT
  rationale: The preposition ל here indicates advantage/purpose in the marriage arrangement.
    'For my son' is more idiomatic and contextually precise than 'to my son'.
