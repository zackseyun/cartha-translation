id: GEN.24.2
reference: Genesis 24:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אַבְרָהָ֗ם אֶל עַבְדּ/וֹ֙ זְקַ֣ן בֵּית֔/וֹ הַ/מֹּשֵׁ֖ל בְּ/כָל
    אֲשֶׁר ל֑/וֹ שִֽׂים נָ֥א יָדְ/ךָ֖ תַּ֥חַת יְרֵכִֽ/י־־־־׃
translation:
  text: And Abraham said to his servant, the elder of his household, who ruled over
    all that belonged to him, “Please put your hand under my thigh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Placing the hand under the thigh was an ancient oath-taking gesture, likely
      signaling solemn covenantal commitment.
    reason: cultural_note
  - marker: b
    text: Or, more idiomatically, “who was in charge of all that he had.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite. 'And ... said' preserves
    Hebrew narrative flow without overinterpreting sequence.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in this context the focus is
    on Abraham's trusted household official rather than bonded status. 'Servant' is
    the more natural optimal-equivalence rendering here.
- source_word: זְקַן בֵּיתוֹ
  chosen: the elder of his household
  alternatives:
  - the oldest of his house
  - the senior servant of his household
  lexicon: HALOT
  rationale: זָקֵן can mean old/elder. Here it functions appositionally to identify
    the servant by senior status within Abraham's household. 'Elder of his household'
    preserves both age/seniority and role.
- source_word: הַמֹּשֵׁל בְּכָל אֲשֶׁר־לוֹ
  chosen: who ruled over all that belonged to him
  alternatives:
  - who was in charge of all that he had
  - the one governing all that was his
  lexicon: HALOT
  rationale: מֹשֵׁל denotes exercising rule/governance. 'Ruled over' is a direct rendering;
    'all that belonged to him' makes explicit the possessive sense of אֲשֶׁר־לוֹ in
    idiomatic English.
- source_word: שִׂים נָא
  chosen: Please put
  alternatives:
  - Put, please
  - Kindly place
  lexicon: HALOT
  rationale: Imperative plus particle נָא expresses a polite or earnest request. 'Please
    put' is natural modern English and preserves the request tone.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Direct, literal rendering.
- source_word: תַּחַת יְרֵכִי
  chosen: under my thigh
  alternatives: []
  lexicon: HALOT
  rationale: Literal rendering is preferable because the phrase refers to a culturally
    specific oath gesture. Euphemistic expansion in the main text would go beyond
    the Hebrew; explanation is better placed in a footnote.
