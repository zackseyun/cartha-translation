id: GEN.24.19
reference: Genesis 24:19
source:
  edition: WLC
  text: וַ/תְּכַ֖ל לְ/הַשְׁקֹת֑/וֹ וַ/תֹּ֗אמֶר גַּ֤ם לִ/גְמַלֶּ֨י/ךָ֙ אֶשְׁאָ֔ב עַ֥ד
    אִם כִּלּ֖וּ לִ/שְׁתֹּֽת־׃
translation:
  text: When she had finished giving him a drink, she said, “I will draw water for
    your camels also, until they have finished drinking.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And when she had finished giving him a drink, she said,
      “I will draw also for your camels until they have finished drinking.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּכַל
  chosen: When she had finished
  alternatives:
  - And she finished
  - After she finished
  lexicon: HALOT
  rationale: From כלה, 'to finish, complete.' With the following infinitive phrase,
    it marks completion of the prior action before the next narrative event. 'When
    she had finished' gives natural English sequence while preserving the temporal
    sense of the waw-consecutive narrative.
- source_word: לְהַשְׁקֹתוֹ
  chosen: giving him a drink
  alternatives:
  - making him drink
  - watering him
  lexicon: HALOT
  rationale: Hiphil infinitive of שקה with 3ms suffix means 'to give him drink / cause
    him to drink.' 'Giving him a drink' is idiomatic modern English and fits a human
    recipient better than 'watering him,' which would sound demeaning or misleading
    in English.
- source_word: וַתֹּאמֶר
  chosen: she said
  alternatives:
  - and she said
  lexicon: HALOT
  rationale: Standard narrative verb אמר. English often omits repeated initial 'and'
    for smoother style while retaining the sequence.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - as well
  lexicon: HALOT
  rationale: Adds what she will do beyond giving the man a drink. 'Also' is concise
    and preserves the additive force.
- source_word: לִגְמַלֶּיךָ
  chosen: for your camels
  alternatives:
  - for your camels too
  lexicon: HALOT
  rationale: 'Dative/prepositional phrase indicating beneficiary: she will draw water
    for his camels. The possessive suffix is preserved with ''your.'''
- source_word: אֶשְׁאָב
  chosen: I will draw water
  alternatives:
  - I will draw
  - let me draw water
  lexicon: HALOT
  rationale: From שאב, commonly used of drawing water. Supplying 'water' in English
    is warranted by context and avoids awkward ellipsis.
- source_word: עַד אִם
  chosen: until
  alternatives:
  - until when
  - until if
  lexicon: HALOT
  rationale: This combination functions idiomatically as a terminative clause, 'until.'
    A literal rendering would be obscure in English.
- source_word: כִּלּוּ
  chosen: they have finished
  alternatives:
  - they finish
  - they are done
  lexicon: HALOT
  rationale: Piel perfect plural of כלה, referring to the camels. In English after
    'until,' present perfect communicates the completed endpoint naturally.
- source_word: לִשְׁתֹּת
  chosen: drinking
  alternatives:
  - to drink
  lexicon: HALOT
  rationale: 'Infinitive complement of completion: ''finished drinking.'' English
    prefers the gerund after ''finished.'''
