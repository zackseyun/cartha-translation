id: GEN.24.10
reference: Genesis 24:10
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח הָ֠/עֶבֶד עֲשָׂרָ֨ה גְמַלִּ֜ים מִ/גְּמַלֵּ֤י אֲדֹנָי/ו֙ וַ/יֵּ֔לֶךְ
    וְ/כָל ט֥וּב אֲדֹנָ֖י/ו בְּ/יָד֑/וֹ וַ/יָּ֗קָם וַ/יֵּ֛לֶךְ אֶל אֲרַ֥ם נַֽהֲרַ֖יִם
    אֶל עִ֥יר נָחֽוֹר־־־׃
translation:
  text: Then the servant took ten camels from his master's camels and went, with all
    kinds of good things from his master in his hand. And he arose and went to Aram-naharaim,
    to the city of Nahor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Aram-naharaim; traditionally 'Mesopotamia' or 'Aram of the Two Rivers.'
    reason: alternative_reading
  - marker: b
    text: Or 'and all his master's goods were in his hand'; the Hebrew idiom can denote
      possession or control, likely referring here to valuable gifts he carried.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֶבֶד
  chosen: the servant
  alternatives:
  - the slave
  lexicon: HALOT
  rationale: עֶבֶד commonly denotes a servant/slave. In this narrative context the
    bonded status is not theologically foregrounded, so 'servant' fits the project's
    context-dependent handling while remaining natural English.
- source_word: עֲשָׂרָה גְמַלִּים
  chosen: ten camels
  lexicon: HALOT
  rationale: Straightforward numeral + noun construction.
- source_word: מִגְּמַלֵּי אֲדֹנָיו
  chosen: from his master's camels
  alternatives:
  - of his master's camels
  lexicon: HALOT
  rationale: The מן construction indicates selection from among the master's camels,
    not merely apposition. 'From his master's camels' preserves that nuance.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: In this household setting, 'master' is the natural English rendering
    of אָדוֹן with pronominal suffix, avoiding an overly exalted 'lord' that would
    miscue readers.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך. 'Went' is sufficiently clear; the travel
    sense is reinforced by the destination clauses.
- source_word: וְכָל טוּב אֲדֹנָיו בְּיָדוֹ
  chosen: with all kinds of good things from his master in his hand
  alternatives:
  - and all his master's goods were in his hand
  - with all his master's bounty in his possession
  lexicon: HALOT
  rationale: טוּב here refers broadly to valuable goods/gifts rather than abstract
    'goodness.' בְּיָדוֹ is an idiom for possession/control, but because the Hebrew
    image is concrete and likely anticipates carried gifts, 'in his hand' is retained.
    'With all kinds of good things' makes the sense idiomatic in English without flattening
    the imagery.
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he set out
  - he got up
  lexicon: HALOT
  rationale: קוּם in sequence before הלך often marks the beginning of purposeful action.
    'He arose' preserves the Hebrew narrative rhythm; 'set out' would over-merge it
    with the following verb.
- source_word: אֶל אֲרַם נַהֲרַיִם
  chosen: to Aram-naharaim
  alternatives:
  - to Aram of the Two Rivers
  - to Mesopotamia
  lexicon: HALOT
  rationale: Per project philosophy, names are transliterated rather than translated.
    'Mesopotamia' reflects traditional interpretation but not the Hebrew form itself.
- source_word: אֶל עִיר נָחוֹר
  chosen: to the city of Nahor
  alternatives:
  - to Nahor's city
  lexicon: HALOT
  rationale: Construct chain naturally rendered 'the city of Nahor.' This may denote
    the city associated with Nahor rather than necessarily founded by him; the translation
    leaves that open.
