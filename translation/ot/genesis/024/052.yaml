theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project’s contested-terms guidance specifies 'the LORD' as the default
    rendering for YHWH, following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether וַיִּשְׁתַּחוּ should be rendered explicitly as worship
  chosen_reading: he bowed himself to the ground before the LORD
  alternative_readings:
  - he worshiped the LORD
  - he prostrated himself before the LORD
  rationale: The Hebrew verb can include worshipful reverence, especially when directed
    toward the LORD, but the text foregrounds the bodily act with 'to the ground.'
    The translation preserves that physical expression and lets the reverential/theological
    force remain implicit rather than over-resolved.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
