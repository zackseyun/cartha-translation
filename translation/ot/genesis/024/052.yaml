theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project’s contested-terms guidance specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether וַיִּשְׁתַּחוּ should be rendered explicitly as worship
  chosen_reading: he bowed himself to the ground before the LORD
  alternative_readings:
  - he worshiped the LORD
  - he prostrated himself before the LORD
  rationale: The Hebrew verb can include worshipful reverence, especially when directed toward the LORD, but the text foregrounds the bodily act with 'to the ground.' The translation preserves that physical expression and lets the reverential/theological force remain implicit rather than over-resolved.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
revisions:
- timestamp: '2026-04-21T00:25:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/024/052.json
  category: awkward_english
  tier: 1
  from: he bowed himself
  to: he bowed down
  rationale: While 'he bowed himself' is a very precise rendering of the reflexive Hishaphel stem of שׁחה, the phrase 'he bowed down' is a more common and natural English idiom for this action. The current rendering is slightly formal. Since the direction of the action is already made explicit by 'to the ground,' switching to the more idiomatic 'bowed down' would improve English fluency without losing any essential meaning.
