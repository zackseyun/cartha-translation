id: GEN.24.52
reference: Genesis 24:52
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֥ר שָׁמַ֛ע עֶ֥בֶד אַבְרָהָ֖ם אֶת דִּבְרֵי/הֶ֑ם וַ/יִּשְׁתַּ֥חוּ אַ֖רְצָ/ה לַֽ/יהוָֽה־׃
translation:
  text: And when Abraham’s servant heard their words, he bowed down to the ground before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he prostrated himself before the LORD'; the Hebrew verb can also carry the sense of worshipful bowing.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to the LORD.'' Rendered ''before the LORD'' to express the reverential posture naturally in English.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he bowed himself'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - Now when
  - And it happened, when
  - As soon as
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. 'And when' preserves the sequential force without woodenly reproducing the idiom 'and it happened.'
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb plainly denotes hearing what was said. 'Heard' is the most natural and direct English equivalent in this context.
- source_word: עֶבֶד אַבְרָהָם
  chosen: Abraham’s servant
  alternatives:
  - the servant of Abraham
  - Abraham’s slave
  lexicon: HALOT
  rationale: The construct phrase is rendered naturally in English as 'Abraham’s servant.' Although עֶבֶד can mean 'slave,' the bonded status is not the focus here; the narrative identifies the household representative, so 'servant' best fits the context while remaining accurate.
- source_word: דִּבְרֵיהֶם
  chosen: their words
  alternatives:
  - what they said
  - their speech
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the lexical sense of 'words' while remaining idiomatic English.
- source_word: וַיִּשְׁתַּחוּ
  chosen: he bowed himself
  alternatives:
  - he prostrated himself
  - he worshiped
  - he bowed down
  lexicon: HALOT
  rationale: The verb can denote bowing low or prostration, sometimes in worship. Here the following phrase 'to the ground' specifies the physical action, so 'bowed himself' captures both posture and reverence without overtranslating to 'worshiped' in the main text.
- source_word: אַרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: This directional form indicates movement downward to the ground. 'To the ground' is clear, idiomatic, and preserves the physical vividness.
- source_word: לַיהוָה
  chosen: before the LORD
  alternatives:
  - to the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' With השתחוה, English often uses 'before' to express the dative of reverential posture naturally; this avoids implying mere direction and conveys that the act is done in the LORD's presence.
