id: GEN.24.61
reference: Genesis 24:61
source:
  edition: WLC
  text: וַ/תָּ֨קָם רִבְקָ֜ה וְ/נַעֲרֹתֶ֗י/הָ וַ/תִּרְכַּ֨בְנָה֙ עַל הַ/גְּמַלִּ֔ים
    וַ/תֵּלַ֖כְנָה אַחֲרֵ֣י הָ/אִ֑ישׁ וַ/יִּקַּ֥ח הָ/עֶ֛בֶד אֶת רִבְקָ֖ה וַ/יֵּלַֽךְ־־׃
translation:
  text: Then Rebekah and her young women arose, mounted the camels, and went after
    the man. So the servant took Rebekah and went on his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her maids' or 'her young women attendants.' The Hebrew term refers to
      young women and in context likely to Rebekah's female attendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום literally denotes rising/standing up. 'Arose' preserves
    the narrative sequence and formal sense better than the more colloquial 'got up';
    'set out' would over-interpret the following motion verb.
- source_word: נַעֲרֹתֶיהָ
  chosen: her young women
  alternatives:
  - her maids
  - her servant girls
  - her young women attendants
  lexicon: HALOT
  rationale: From נַעֲרָה, here plural with 3fs suffix. The term denotes young women;
    the context suggests female attendants accompanying Rebekah, but the lexical core
    is age/sex rather than explicit servile status. 'Her young women' keeps the source
    wording while remaining natural English.
- source_word: וַתִּרְכַּבְנָה עַל הַגְּמַלִּים
  chosen: mounted the camels
  alternatives:
  - rode on the camels
  - got on the camels
  lexicon: HALOT
  rationale: רכב with עַל means to mount/ride. 'Mounted the camels' captures the ingressive
    action before travel; 'rode' can suggest the journey as a whole rather than the
    act of getting on.
- source_word: אַחֲרֵי הָאִישׁ
  chosen: after the man
  alternatives:
  - following the man
  - behind the man
  lexicon: HALOT
  rationale: אַחֲרֵי commonly means 'after/behind.' 'After the man' is a close rendering
    and fits the travel context, indicating they followed his lead.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש = the servant
  - him
  lexicon: HALOT
  rationale: Although the referent is Abraham's servant in context, the Hebrew says
    'the man.' Retaining 'the man' preserves the narrative style and avoids replacing
    the source noun with a pronoun or interpretive gloss.
- source_word: וַיִּקַּח הָעֶבֶד אֶת רִבְקָה
  chosen: So the servant took Rebekah
  alternatives:
  - Then the servant took Rebekah
  - And the servant took Rebekah along
  lexicon: HALOT
  rationale: לקח literally means 'take.' In travel context it can imply taking along
    or escorting, but the simple 'took Rebekah' best preserves the Hebrew while allowing
    the context to supply the sense of accompanying her.
- source_word: הָעֶבֶד
  chosen: the servant
  alternatives:
  - the slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, here Abraham's trusted household
    agent is in view, and the bonded status is not theologically salient. Per translation
    philosophy, 'servant' is appropriate in this context.
- source_word: וַיֵּלַךְ
  chosen: went on his way
  alternatives:
  - went
  - departed
  lexicon: HALOT
  rationale: הלך simply means 'went/walked.' 'Went on his way' makes idiomatic English
    sense in this travel narrative and reflects the continuation of the journey without
    adding new content.
