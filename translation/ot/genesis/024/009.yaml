theological_decisions:
- issue: Rendering the oath gesture literally versus interpreting its symbolism
  chosen_reading: Translate the gesture literally as 'under the thigh' and leave symbolic
    interpretation to a footnote.
  alternative_readings:
  - Translate interpretively as a gesture related to the genitals, loins, or covenant
    offspring
  rationale: The Hebrew text states the physical action without explicit explanation.
    Preserving the literal wording maintains transparency and avoids importing a specific
    interpretation into the main text.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
