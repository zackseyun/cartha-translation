id: GEN.24.9
reference: Genesis 24:9
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם הָ/עֶ֨בֶד֙ אֶת יָד֔/וֹ תַּ֛חַת יֶ֥רֶךְ אַבְרָהָ֖ם אֲדֹנָ֑י/ו וַ/יִּשָּׁ֣בַֽע
    ל֔/וֹ עַל הַ/דָּבָ֖ר הַ/זֶּֽה־־׃
translation:
  text: So the servant put his hand under the thigh of Abraham his master and swore
    to him concerning this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Under the thigh'' is a literal rendering of the Hebrew expression for
      a solemn oath gesture; some understand it as symbolically related to the loins
      or to covenant offspring.'
    reason: cultural_note
lexical_decisions:
- source_word: הָעֶבֶד
  chosen: the servant
  alternatives:
  - the slave
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave. In this narrative context, the bonded
    status is not the main emphasis; the role within Abraham's household is foregrounded,
    so 'servant' best fits readable modern English while preserving the social hierarchy.
- source_word: וַיָּשֶׂם ... אֶת יָדוֹ
  chosen: put his hand
  alternatives:
  - placed his hand
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put, place, set.' 'Put his hand' is natural English
    and sufficiently literal.
- source_word: תַּחַת יֶרֶךְ
  chosen: under the thigh
  alternatives:
  - under the upper leg
  - under the loins
  lexicon: HALOT
  rationale: יָרֵךְ literally means 'thigh.' Although the gesture may carry covenantal
    or procreative symbolism, the translation should preserve the concrete wording
    rather than interpret it in the main text.
- source_word: אַבְרָהָם אֲדֹנָיו
  chosen: Abraham his master
  alternatives:
  - Abraham his lord
  lexicon: HALOT
  rationale: אֲדוֹן in this human social context is best rendered 'master,' indicating
    authority within the household. 'Lord' would sound overly elevated in English
    and could create confusion with divine usage.
- source_word: וַיִּשָּׁבַע לוֹ
  chosen: and swore to him
  alternatives:
  - and took an oath to him
  lexicon: HALOT
  rationale: שׁבע in the Niphal means 'swear, take an oath.' 'Swore to him' is concise
    and idiomatic while preserving the personal direction marked by לוֹ.
- source_word: עַל הַדָּבָר הַזֶּה
  chosen: concerning this matter
  alternatives:
  - about this matter
  - regarding this word/thing
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including 'word,' 'matter,' or 'thing.'
    Here it refers to the specific charge Abraham had just given, so 'matter' communicates
    the sense clearly in context.
