id: GEN.24.30
reference: Genesis 24:30
source:
  edition: WLC
  text: וַ/יְהִ֣י כִּ/רְאֹ֣ת אֶת הַ/נֶּ֗זֶם וְֽ/אֶת הַ/צְּמִדִים֮ עַל יְדֵ֣י אֲחֹת/וֹ֒
    וּ/כְ/שָׁמְע֗/וֹ אֶת דִּבְרֵ֞י רִבְקָ֤ה אֲחֹת/וֹ֙ לֵ/אמֹ֔ר כֹּֽה דִבֶּ֥ר אֵלַ֖/י
    הָ/אִ֑ישׁ וַ/יָּבֹא֙ אֶל הָ/אִ֔ישׁ וְ/הִנֵּ֛ה עֹמֵ֥ד עַל הַ/גְּמַלִּ֖ים עַל הָ/עָֽיִן׀־־־־־־־־׃
translation:
  text: And it happened, when he saw the nose ring and the bracelets on his sister’s
    hands, and when he heard the words of Rebekah his sister, saying, “This is what
    the man said to me,” that he went to the man. And behold, he was standing by the
    camels at the spring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the ring.” The Hebrew נֶזֶם can mean a ring generally; here “nose ring”
      is chosen because Genesis 24:47 specifies that it was placed on Rebekah’s nose.
    reason: lexical_alternative
  - marker: b
    text: Or “beside the camels.” The Hebrew preposition can denote location near
      something, not necessarily on top of it.
    reason: lexical_alternative
  - marker: c
    text: Or “at the well.” The Hebrew עַיִן more specifically means “spring” or “water
      source.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew discourse function without archaic phrasing
    like 'came to pass.'
- source_word: כִּרְאֹת
  chosen: when he saw
  alternatives:
  - upon seeing
  - as soon as he saw
  lexicon: HALOT
  rationale: Infinitive construct with כ expresses temporal circumstance. 'When he
    saw' is natural English and preserves the temporal sense.
- source_word: הַנֶּזֶם
  chosen: the nose ring
  alternatives:
  - the ring
  lexicon: HALOT
  rationale: נזם can denote a ring generally, but in Genesis 24 context it refers
    to the ornament given for Rebekah's nose (cf. v. 47). 'Nose ring' is more precise
    to the immediate context and avoids ambiguity.
- source_word: הַצְּמִדִים
  chosen: the bracelets
  alternatives:
  - the armlets
  lexicon: HALOT
  rationale: Plural ornament term for paired wrist/arm jewelry. 'Bracelets' is the
    most idiomatic and contextually fitting English rendering.
- source_word: עַל יְדֵי אֲחֹתוֹ
  chosen: on his sister’s hands
  alternatives:
  - on his sister’s wrists
  - on the hands of his sister
  lexicon: HALOT
  rationale: Hebrew ידים literally 'hands,' though bracelets are worn on wrists/forearms.
    'On his sister’s hands' stays close to the Hebrew while remaining understandable.
- source_word: וּכְשָׁמְעוֹ
  chosen: and when he heard
  alternatives:
  - and upon hearing
  lexicon: HALOT
  rationale: Parallel temporal construction to כראות. The suffix indicates his hearing
    of her report.
- source_word: דִּבְרֵי רִבְקָה
  chosen: the words of Rebekah
  alternatives:
  - Rebekah’s words
  - the report of Rebekah
  lexicon: HALOT
  rationale: דברי is best rendered straightforwardly as 'words' here, since the verse
    then quotes the substance of what she said.
- source_word: כֹּה דִבֶּר אֵלַי הָאִישׁ
  chosen: This is what the man said to me
  alternatives:
  - Thus the man spoke to me
  - The man spoke to me like this
  lexicon: HALOT
  rationale: 'כֹּה introduces quoted content: ''thus/like this.'' ''This is what...''
    is idiomatic modern English that preserves the demonstrative force.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Generic definite noun referring to Abraham's servant, not yet named.
    'The man' is the plain sense in both occurrences.
- source_word: וַיָּבֹא אֶל הָאִישׁ
  chosen: that he went to the man
  alternatives:
  - and he came to the man
  lexicon: HALOT
  rationale: בוא with אל can be 'come to' or 'go to' depending on viewpoint. In English
    narrative from Laban's perspective, 'went to the man' is clearer.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - there he was
  lexicon: HALOT
  rationale: Deictic particle marking vivid presentation. 'And behold' preserves the
    narrative vividness better than flattening it entirely.
- source_word: עֹמֵד
  chosen: he was standing
  alternatives:
  - standing
  - he stood
  lexicon: HALOT
  rationale: Participle describing ongoing posture/state at the moment Laban arrived.
    'He was standing' captures the durative sense.
- source_word: עַל הַגְּמַלִּים
  chosen: by the camels
  alternatives:
  - beside the camels
  - at the camels
  lexicon: HALOT
  rationale: עַל can have a broader locative sense than strict 'on/upon.' Since the
    man is not standing on the camels, idiomatic English requires 'by/beside.' 'By'
    is concise and natural.
- source_word: עַל הָעָיִן
  chosen: at the spring
  alternatives:
  - by the spring
  - at the well
  lexicon: HALOT
  rationale: עין commonly denotes a spring or water source. In this context of drawing
    water, 'spring' is more lexically precise than 'well,' though the location functions
    as a watering place.
