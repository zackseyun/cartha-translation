  from: And let it be that the young woman to whom I say, ‘Please lower your jar so
    that I may drink,’ and who says, ‘Drink, and I will also water your camels’—let
    her be the one you have appointed for your servant, for Isaac.
  to: Let the young woman to whom I say, ‘Please lower your jar so that I may drink,’
    and who says, ‘Drink, and I will also water your camels,’ be the one you have
    appointed for your servant, for Isaac.
  rationale: The current structure, which begins with 'And let it be that...' and
    then resumes after a long clause with '—let her be...', is syntactically cumbersome
    and redundant. The repetition of the volitional 'let' is awkward. A more integrated
    English sentence that combines the introductory Hebrew volitional (וְהָיָה) with
    the main clause into a single prayerful request ('Let the young woman... be the
    one...') is clearer, more elegant, and equally faithful to the sense of the original.
