theological_decisions:
- issue: Referent of 'your servant' in לְעַבְדְּךָ
  chosen_reading: Refers to the speaker (Abraham's servant) in relation to God, followed
    by a separate dative 'for Isaac.'
  alternative_readings:
  - 'Appositional: ''for your servant Isaac'''
  rationale: The first-person prayer throughout the passage makes it natural for the
    speaker to call himself God's servant. Retaining a separate 'for Isaac' avoids
    confusion and best matches the Hebrew sequence. This is not a doctrinally contested
    issue but affects translation clarity and speaker perspective.
- issue: Rendering of חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - kindness
  - faithful love
  - covenant loyalty
  rationale: The translation preserves the theological richness and relational loyalty
    implied by חֶסֶד without narrowing it to a technical covenant formula or flattening
    it to mere politeness.
