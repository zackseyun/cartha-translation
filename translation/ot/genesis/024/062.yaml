id: GEN.24.62
reference: Genesis 24:62
source:
  edition: WLC
  text: וְ/יִצְחָק֙ בָּ֣א מִ/בּ֔וֹא בְּאֵ֥ר לַחַ֖י רֹאִ֑י וְ/ה֥וּא יוֹשֵׁ֖ב בְּ/אֶ֥רֶץ
    הַ/נֶּֽגֶב׃
translation:
  text: Now Isaac had come from Beer-lahai-roi, and he was dwelling in the land of
    the Negev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Isaac came from Beer-lahai-roi.” The Hebrew construction may be rendered
      more simply with a past tense rather than a past perfect.
    reason: lexical_alternative
  - marker: b
    text: Beer-lahai-roi is a place-name previously associated with Hagar (see Gen
      16:14).
    reason: cross_reference
lexical_decisions:
- source_word: בָּא
  chosen: had come
  alternatives:
  - came
  - was coming
  lexicon: HALOT
  rationale: Qal perfect 3ms of בוא denotes completed motion. In this narrative setting,
    English past perfect fits the discourse flow before the following scene, though
    simple past is possible.
- source_word: מִבּוֹא
  chosen: from
  alternatives:
  - after coming from
  - on his way from
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive construct of בוא is idiomatic
    and compressed. Here it most naturally marks source/origin of movement: Isaac
    had come from Beer-lahai-roi.'
- source_word: בְּאֵר לַחַי רֹאִי
  chosen: Beer-lahai-roi
  alternatives:
  - Beer Lahai Roi
  lexicon: HALOT
  rationale: This is a place-name and should be transliterated rather than translated,
    per project philosophy on names. Hyphenation helps reflect the compound Hebrew
    name.
- source_word: יוֹשֵׁב
  chosen: was dwelling
  alternatives:
  - lived
  - was living
  - dwelt
  lexicon: HALOT
  rationale: The participle expresses ongoing state or customary residence. 'Was dwelling'
    preserves the durative sense while remaining natural English.
- source_word: בְּאֶרֶץ הַנֶּגֶב
  chosen: in the land of the Negev
  alternatives:
  - in the Negev region
  - in the south country
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern dry region and also functions as a geographic
    proper designation. 'The Negev' is the clearest modern rendering; 'land of the
    Negev' preserves the explicit אֶרֶץ.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - now he
  - while he
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and marks a slight shift or backgrounding
    statement. 'And he' preserves the coordination without overinterpreting the nuance.
