id: GEN.24.46
reference: Genesis 24:46
source:
  edition: WLC
  text: וַ/תְּמַהֵ֗ר וַ/תּ֤וֹרֶד כַּדָּ/הּ֙ מֵֽ/עָלֶ֔י/הָ וַ/תֹּ֣אמֶר שְׁתֵ֔ה וְ/גַם
    גְּמַלֶּ֖י/ךָ אַשְׁקֶ֑ה וָ/אֵ֕שְׁתְּ וְ/גַ֥ם הַ/גְּמַלִּ֖ים הִשְׁקָֽתָה־׃
translation:
  text: She quickly lowered her jar from upon her and said, ‘Drink, and I will also
    give water to your camels.’ So I drank, and she also gave water to the camels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from upon her.' The broader context suggests the jar was carried
      on her shoulder, but the body part is not explicit here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  chosen: She quickly
  alternatives:
  - She hurried
  - She hastened
  lexicon: HALOT
  rationale: The verb from מהר denotes acting quickly or hastening. Rendering it adverbially
    with the following verb produces natural English while preserving the narrative
    emphasis on Rebekah's promptness.
- source_word: וַתּוֹרֶד
  chosen: lowered
  alternatives:
  - let down
  - took down
  lexicon: HALOT
  rationale: The verb ירד in Hiphil here means to cause to go down. 'Lowered' fits
    the physical action of bringing the jar down from her shoulder/body and is more
    precise than the broader 'took down.'
- source_word: כַּדָּהּ
  chosen: her jar
  alternatives:
  - her water jar
  - her pitcher
  lexicon: HALOT
  rationale: כד refers to a jar or pitcher used for drawing water. 'Jar' is clear
    modern English; 'water' is implied by context and need not be added in the main
    text.
- source_word: מֵעָלֶיהָ
  chosen: from upon her
  alternatives:
  - from her shoulder
  - from on her
  lexicon: HALOT
  rationale: The Hebrew literally says 'from upon her.' Since the body part is not
    explicit in this verse, the translation preserves the source wording rather than
    specifying 'shoulder,' though that is contextually likely from the broader narrative.
- source_word: שְׁתֵה
  chosen: Drink
  alternatives:
  - Have a drink
  lexicon: HALOT
  rationale: A direct imperative best reflects the concise Hebrew speech.
- source_word: וְגַם גְּמַלֶּיךָ אַשְׁקֶה
  chosen: and I will also give water to your camels
  alternatives:
  - and I will also water your camels
  - and your camels too I will give drink
  lexicon: HALOT
  rationale: The Hiphil of שקה means to give drink/provide water. 'Give water to'
    is slightly more explicit for modern readers, while still close to the Hebrew.
    'Water your camels' is idiomatic but can sound more agricultural than personal
    service in this context.
- source_word: וָאֵשְׁתְּ
  chosen: So I drank
  alternatives:
  - And I drank
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So I drank' reads naturally
    in English and reflects the result of her invitation.
- source_word: וְגַם הַגְּמַלִּים הִשְׁקָתָה
  chosen: and she also gave water to the camels
  alternatives:
  - and she also watered the camels
  - and she also gave the camels drink
  lexicon: HALOT
  rationale: Again, שקה in Hiphil means to provide drink. 'Gave water to the camels'
    keeps verbal consistency with the earlier clause and avoids possible ambiguity
    in 'watered.'
