id: GEN.24.24
reference: Genesis 24:24
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֵלָ֔י/ו בַּת בְּתוּאֵ֖ל אָנֹ֑כִי בֶּן מִלְכָּ֕ה אֲשֶׁ֥ר יָלְדָ֖ה
    לְ/נָחֽוֹר־־׃
translation:
  text: She said to him, “I am the daughter of Bethuel, the son of Milcah, whom she
    bore to Nahor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “whom she gave birth to for Nahor.” The Hebrew birth formula commonly
      uses “bore to” to identify the father.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: She said
  alternatives:
  - Then she said
  - And she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. English often
    omits an explicit connective here for natural narrative flow while preserving
    the simple past sense.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: Preposition אֶל with 3ms suffix straightforwardly indicates direction
    of speech toward the male interlocutor.
- source_word: בַּת ... אָנֹכִי
  chosen: I am the daughter of
  alternatives:
  - I am daughter of
  - I am a daughter of
  lexicon: HALOT
  rationale: Hebrew predicate structure literally reads 'daughter of Bethuel I [am].'
    English idiom requires 'I am the daughter of' for clarity and naturalness.
- source_word: בְּתוּאֵל
  chosen: Bethuel
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  lexicon: HALOT
  rationale: 'Construct relation identifies Bethuel as Milcah''s son. The article
    is supplied in English for smooth appositional genealogy: ''the daughter of Bethuel,
    the son of Milcah.'''
- source_word: מִלְכָּה
  chosen: Milcah
  rationale: Personal name is transliterated.
- source_word: אֲשֶׁר יָלְדָה
  chosen: whom she bore
  alternatives:
  - whom she gave birth to
  - that she bore
  lexicon: HALOT
  rationale: Relative clause with ילד in Qal 3fs refers back to Bethuel as the object
    of Milcah's bearing. 'Whom she bore' is concise, natural, and preserves the maternal
    subject.
- source_word: לְנָחוֹר
  chosen: to Nahor
  alternatives:
  - for Nahor
  lexicon: HALOT
  rationale: 'The preposition ל with ילד commonly marks the father in birth formulas:
    ''bore to Nahor.'' ''To'' is the most literal and idiomatic rendering in this
    genealogical context.'
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: Independent pronoun is explicit in Hebrew and is naturally represented
    by the English copular clause 'I am' in this verbless identification statement.
