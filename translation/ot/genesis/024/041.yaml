theological_decisions:
- issue: Rendering of אָלָה in oath context
  chosen_reading: oath
  alternative_readings:
  - curse
  rationale: The term can include the sanction attached to an oath, but the narrative
    emphasis is on release from the sworn obligation Abraham placed on his servant.
    Rendering it as 'oath' avoids overstating the curse nuance while preserving the
    legal force of the passage.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
