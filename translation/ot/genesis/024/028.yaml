id: GEN.24.28
reference: Genesis 24:28
source:
  edition: WLC
  text: וַ/תָּ֨רָץ֙ הַֽ/נַּעֲרָ֔ וַ/תַּגֵּ֖ד לְ/בֵ֣ית אִמָּ֑/הּ כַּ/דְּבָרִ֖ים הָ/אֵֽלֶּה׃
translation:
  text: Then the young woman ran and told her mother's household about these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her mother's house.' The Hebrew phrase can refer either to the physical
      house or to the household/family associated with her mother.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּרָץ
  chosen: ran
  alternatives:
  - hurried
  lexicon: HALOT
  rationale: From רוץ, denoting swift movement. 'Ran' is the plain and natural English
    equivalent in narrative sequence.
- source_word: הַנַּעֲרָ
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה refers to a young female. 'Young woman' is clear modern English
    and fits Rebekah in context better than the potentially childish 'girl' or archaic
    'maiden'.
- source_word: וַתַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: From נגד in the Hiphil, meaning to make known or tell. 'Told' is the
    most natural narrative rendering in contemporary English.
- source_word: לְבֵית אִמָּהּ
  chosen: her mother's household
  alternatives:
  - her mother's house
  - the house of her mother
  lexicon: HALOT
  rationale: בַּיִת can mean both the physical house and the household/family unit.
    Here the sense is likely those in her mother's domestic sphere, so 'household'
    best captures the idiom in English while remaining faithful.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: about these things
  alternatives:
  - these words
  - according to these matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things.' In context Rebekah
    is recounting what happened, so 'these things' communicates the event-content
    naturally. 'About' smooths the English idiom after 'told.'
