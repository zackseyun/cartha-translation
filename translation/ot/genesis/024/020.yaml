id: GEN.24.20
reference: Genesis 24:20
source:
  edition: WLC
  text: וַ/תְּמַהֵ֗ר וַ/תְּעַ֤ר כַּדָּ/הּ֙ אֶל הַ/שֹּׁ֔קֶת וַ/תָּ֥רָץ ע֛וֹד אֶֽל הַ/בְּאֵ֖ר
    לִ/שְׁאֹ֑ב וַ/תִּשְׁאַ֖ב לְ/כָל גְּמַלָּֽי/ו־־־׃
translation:
  text: She quickly emptied her jar into the trough, and ran again to the well to
    draw water, and she drew for all his camels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'poured out her jar into the watering trough.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  chosen: She quickly
  alternatives:
  - She hurried
  - She hastened
  lexicon: HALOT
  rationale: The verb means to hasten or act quickly. Rendering with the adverbial
    phrase 'She quickly' gives natural English while preserving the sense of prompt
    action.
- source_word: וַתְּעַר
  chosen: emptied
  alternatives:
  - poured out
  lexicon: HALOT
  rationale: The verb ערה here refers to emptying or pouring out the contents of the
    jar. 'Emptied' fits the direct object 'her jar' naturally in English and implies
    pouring out its contents into the trough.
- source_word: כַּדָּהּ
  chosen: her jar
  alternatives:
  - her pitcher
  lexicon: HALOT
  rationale: כַּד denotes a water jar or pitcher. 'Jar' is more natural modern English
    and suits the domestic water-drawing context.
- source_word: הַשֹּׁקֶת
  chosen: the trough
  alternatives:
  - the watering trough
  lexicon: HALOT
  rationale: This noun refers to a trough or receptacle for water, especially for
    animals. 'The trough' is concise and contextually clear because camels are mentioned
    in the verse.
- source_word: וַתָּרָץ עוֹד
  chosen: ran again
  alternatives:
  - ran back
  - ran once more
  lexicon: HALOT
  rationale: The verb means 'ran,' and עוֹד adds the sense of repetition or continuation.
    'Ran again' captures that she returned for repeated drawing.
- source_word: הַבְּאֵר
  chosen: the well
  alternatives:
  - the spring
  lexicon: HALOT
  rationale: בְּאֵר ordinarily denotes a well. 'Well' is the standard and most likely
    sense in this narrative setting.
- source_word: לִשְׁאֹב
  chosen: to draw water
  alternatives:
  - to draw
  lexicon: HALOT
  rationale: The infinitive means 'to draw' in the context of water from a well. Supplying
    'water' makes the action explicit in idiomatic English without adding foreign
    meaning.
- source_word: וַתִּשְׁאַב
  chosen: she drew
  alternatives:
  - she kept drawing
  lexicon: HALOT
  rationale: The verb repeats the drawing action. 'She drew' preserves the narrative
    sequence; the repeated action is already implied by the context and by 'for all
    his camels.'
- source_word: לְכָל גְּמַלָּיו
  chosen: for all his camels
  alternatives:
  - for each of his camels
  lexicon: HALOT
  rationale: The phrase indicates the beneficiaries of her drawing. 'For all his camels'
    is the most straightforward rendering and preserves the totality expressed by
    כָּל.
