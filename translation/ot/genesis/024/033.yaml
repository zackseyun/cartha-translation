id: GEN.24.33
reference: Genesis 24:33
source:
  edition: WLC
  text: ו/יישם לְ/פָנָי/ו֙ לֶ/אֱכֹ֔ל וַ/יֹּ֨אמֶר֙ לֹ֣א אֹכַ֔ל עַ֥ד אִם דִּבַּ֖רְתִּי
    דְּבָרָ֑/י וַ/יֹּ֖אמֶר דַּבֵּֽר־׃
translation:
  text: Food was set before him to eat, but he said, “I will not eat until I have
    spoken my words.” And he said, “Speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'until I have said what I have to say.' The Hebrew
      reads literally, 'until I have spoken my words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: was set
  alternatives:
  - he set
  - they set
  lexicon: HALOT
  rationale: The verb from שׂים means 'to set/place/put.' In context the subject is
    not explicitly important in English, and an impersonal passive ('was set') is
    natural and reflects that food was placed before the servant. Active alternatives
    are possible, but the passive best matches idiomatic English without overstating
    the subject.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in front of him
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' 'Before him' is the standard idiomatic
    English equivalent.
- source_word: לֶאֱכֹל
  chosen: to eat
  alternatives:
  - for eating
  lexicon: HALOT
  rationale: 'Infinitive construct with ל expresses purpose: the food was set before
    him ''to eat.'''
- source_word: לֹא אֹכַל
  chosen: I will not eat
  alternatives:
  - I am not going to eat
  lexicon: HALOT
  rationale: The imperfect in direct speech expresses volition/future resolve. 'I
    will not eat' preserves the firmness and simplicity of the Hebrew.
- source_word: עַד אִם
  chosen: until
  alternatives:
  - unless
  - before
  lexicon: HALOT
  rationale: 'The combination here introduces the limit before which he will not eat:
    ''until I have spoken.'' ''Unless'' would misstate the sense in English.'
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I speak
  - I have said
  lexicon: HALOT
  rationale: 'The perfect after ''until'' is naturally rendered in English as a completed
    action relative to the refusal: ''until I have spoken.'''
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - what I have to say
  - my matter
  lexicon: HALOT
  rationale: Literally 'my words.' Although 'what I have to say' is smoother, 'my
    words' stays closer to the Hebrew while remaining understandable. The phrase conveys
    his intended message or business.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Go ahead, speak
  - Say it
  lexicon: HALOT
  rationale: Imperative of דבר. 'Speak' is concise and faithful; expanded English
    alternatives add nuance not explicit in the Hebrew.
