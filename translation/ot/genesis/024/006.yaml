id: GEN.24.6
reference: Genesis 24:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלָ֖י/ו אַבְרָהָ֑ם הִשָּׁ֣מֶר לְ/ךָ֔ פֶּן תָּשִׁ֥יב אֶת בְּנִ֖/י
    שָֽׁמָּ/ה־־׃
translation:
  text: Abraham said to him, “Be careful that you do not take my son back there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “bring my son back there.” The Hebrew verb is causative: “cause to return.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - said in reply
  - told
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר, best rendered with simple past 'said'
    in English narrative style.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: Preposition plus 3ms suffix indicates indirect object; 'to him' is natural
    modern English.
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful
  alternatives:
  - Take care
  - Guard yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר with ethical dative gives a warning/reflexive
    sense. 'Be careful' communicates the idiomatic force clearly in modern English.
- source_word: פֶּן
  chosen: that ... not
  alternatives:
  - lest
  lexicon: HALOT
  rationale: Introduces a negative warning clause. 'Lest' is formally precise but
    archaic; 'that you do not' preserves the sense in readable modern English.
- source_word: תָּשִׁיב
  chosen: take ... back
  alternatives:
  - bring ... back
  - return
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, 'cause to return/bring back.' With the servant
    as subject and the son as object, 'take my son back' is idiomatic English and
    fits the travel context.
- source_word: אֶת־בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: Direct object marker plus noun with 1cs suffix; straightforwardly 'my
    son.'
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Directional adverb meaning 'there/to there.' In English after 'take back,'
    simple 'there' is the most natural rendering while retaining the locative sense.
