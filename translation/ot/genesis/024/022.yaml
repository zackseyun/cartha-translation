id: GEN.24.22
reference: Genesis 24:22
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּ/אֲשֶׁ֨ר כִּלּ֤וּ הַ/גְּמַלִּים֙ לִ/שְׁתּ֔וֹת וַ/יִּקַּ֤ח הָ/אִישׁ֙
    נֶ֣זֶם זָהָ֔ב בֶּ֖קַע מִשְׁקָל֑/וֹ וּ/שְׁנֵ֤י צְמִידִים֙ עַל יָדֶ֔י/הָ עֲשָׂרָ֥ה
    זָהָ֖ב מִשְׁקָלָֽ/ם־׃
translation:
  text: And when the camels had finished drinking, the man took a gold ring weighing
    a beka, and two bracelets for her hands weighing ten shekels of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'a gold nose-ring'; the Hebrew term can refer to a ring worn
      in the nose or ear.
    reason: lexical_alternative
  - marker: b
    text: A beka was a unit of weight equal to half a shekel.
    reason: cultural_note
lexical_decisions:
- source_word: כַּאֲשֶׁר כִּלּוּ
  chosen: when ... had finished
  alternatives:
  - after ... had finished
  - as soon as ... finished
  lexicon: HALOT
  rationale: The construction marks the time at which the next action occurred. 'When
    ... had finished' is natural English and preserves the sequential sense without
    over-specifying immediacy.
- source_word: הַגְּמַלִּים לִשְׁתּוֹת
  chosen: the camels had finished drinking
  alternatives:
  - the camels had done drinking
  - the camels had finished to drink
  lexicon: HALOT
  rationale: The infinitive with כלה expresses completion of the camels' drinking.
    Smooth English requires 'finished drinking.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the servant
  lexicon: HALOT
  rationale: The Hebrew says simply 'the man.' Although context identifies Abraham's
    servant, the text here does not use a servant term, so the translation preserves
    the source wording.
- source_word: נֶזֶם זָהָב
  chosen: a gold ring
  alternatives:
  - a gold nose-ring
  - a gold earring
  lexicon: HALOT
  rationale: נזם can denote a ring worn in the nose or ear. In Rebekah narratives
    it is often understood as a nose-ring, but the term itself is not explicit here.
    'Ring' preserves the lexical breadth in the main text; the more specific traditional
    understanding is preserved in a footnote.
- source_word: בֶּקַע מִשְׁקָלוֹ
  chosen: weighing a beka
  alternatives:
  - its weight was a beka
  - half a shekel by weight
  lexicon: HALOT
  rationale: בקע is a weight measure. Retaining 'beka' preserves the ancient unit
    directly; 'weighing a beka' is idiomatic English. A modernizing equivalent such
    as 'half a shekel' is interpretive and better suited for a footnote.
- source_word: וּשְׁנֵי צְמִידִים
  chosen: and two bracelets
  alternatives:
  - and a pair of bracelets
  lexicon: HALOT
  rationale: The Hebrew explicitly numbers them as two. 'Two bracelets' is straightforward
    and formally close.
- source_word: עַל יָדֶיהָ
  chosen: for her hands
  alternatives:
  - on her hands
  - for her wrists
  - on her arms
  lexicon: HALOT
  rationale: Literally 'on her hands,' but in context bracelets are worn on the wrists/arms.
    'For her hands' preserves the Hebrew idiom while remaining understandable. 'For
    her wrists' is a plausible contextual clarification but slightly more interpretive.
- source_word: עֲשָׂרָה זָהָב מִשְׁקָלָם
  chosen: weighing ten shekels of gold
  alternatives:
  - their weight was ten gold shekels
  - weighing ten of gold
  lexicon: HALOT
  rationale: The phrase gives the weight of the two bracelets. Since 'shekels' is
    the natural implied unit in English for this idiom, supplying it clarifies the
    measure without materially altering the sense.
