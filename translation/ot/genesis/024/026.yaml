id: GEN.24.26
reference: Genesis 24:26
source:
  edition: WLC
  text: וַ/יִּקֹּ֣ד הָ/אִ֔ישׁ וַ/יִּשְׁתַּ֖חוּ לַֽ/יהוָֽה׃
translation:
  text: Then the man bowed down and worshiped Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrated himself before the LORD.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the man,'' referring to Abraham''s servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֹּד
  chosen: bowed down
  alternatives:
  - bowed
  - inclined himself
  lexicon: HALOT
  rationale: The verb קָדַד denotes bowing or bending low. 'Bowed down' captures the physical act naturally in English and distinguishes it from the following verb of worship/prostration.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the servant
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the man.' Although the referent is Abraham's servant in context, the text here uses the common noun אִישׁ, so the translation preserves that wording rather than interpreting it as 'the servant.'
- source_word: וַיִּשְׁתַּחוּ
  chosen: worshiped
  alternatives:
  - prostrated himself
  - bowed himself down
  lexicon: HALOT
  rationale: The Hishtaphel form of שׁחה commonly denotes bowing/prostrating oneself in reverence, often as an act of worship toward God. Since the object is the LORD, 'worshiped' best conveys the act's religious significance in clear English, while the prior verb already expresses the bodily bowing.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following established reverential convention and the translation's stated policy for the divine name.
