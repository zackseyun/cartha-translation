- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render וַיִּשְׁתַּחוּ formally as bodily prostration or dynamically as worship
  chosen_reading: worshiped
  alternative_readings:
  - prostrated himself
  - bowed himself down
  rationale: Because the action is directed to the LORD, the verb carries explicit worshipful force, not merely social obeisance. Using 'worshiped' communicates the theological sense while the preceding verb preserves the physical bowing action.
