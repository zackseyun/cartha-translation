theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default for
    YHWH. This preserves reverential convention without altering the referent.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of מַלְאָכוֹ in this context
  chosen_reading: his angel
  alternative_readings:
  - his messenger
  rationale: The Hebrew term can denote either a human messenger or a supernatural
    messenger, but in a statement about the LORD's providential leading, 'angel' best
    fits the context. The alternative is preserved in a footnote because the lexical
    ambiguity is real.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension where ambiguity is genuine
