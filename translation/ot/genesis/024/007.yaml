id: GEN.24.7
reference: Genesis 24:7
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהֵ֣י הַ/שָּׁמַ֗יִם אֲשֶׁ֨ר לְקָחַ֜/נִי מִ/בֵּ֣ית אָבִ/י֮ וּ/מֵ/אֶ֣רֶץ
    מֽוֹלַדְתִּ/י֒ וַ/אֲשֶׁ֨ר דִּבֶּר לִ֜/י וַ/אֲשֶׁ֤ר נִֽשְׁבַּֽע לִ/י֙ לֵ/אמֹ֔ר
    לְ/זַ֨רְעֲ/ךָ֔ אֶתֵּ֖ן אֶת הָ/אָ֣רֶץ הַ/זֹּ֑את ה֗וּא יִשְׁלַ֤ח מַלְאָכ/וֹ֙ לְ/פָנֶ֔י/ךָ
    וְ/לָקַחְתָּ֥ אִשָּׁ֛ה לִ/בְנִ֖/י מִ/שָּֽׁם׀־־־׃
translation:
  text: The LORD, the God of heaven, who took me from my father's house and from the
    land of my birth, and who spoke to me and who swore to me, saying, ‘To your offspring
    I will give this land’—he will send his angel before you, and you shall take a
    wife for my son from there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his messenger.' The Hebrew מַלְאָךְ can mean either 'messenger' or 'angel';
      in this context, a heavenly messenger is the more likely sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  chosen: the God of heaven
  alternatives:
  - God of the heavens
  lexicon: HALOT
  rationale: Construct phrase with singular English 'heaven' is idiomatic and standard
    in English while preserving the genitival sense.
- source_word: לְקָחַנִי
  chosen: took me
  alternatives:
  - brought me
  - fetched me
  lexicon: HALOT
  rationale: לקח commonly means 'take'; here it refers to God's act of removing Abraham
    from his former setting. 'Took me' is both faithful and natural.
- source_word: מִבֵּית אָבִי
  chosen: from my father's house
  alternatives:
  - from my ancestral household
  lexicon: HALOT
  rationale: Literal familial-household expression; 'father's house' preserves the
    covenantal/familial setting better than a more interpretive paraphrase.
- source_word: וּמֵאֶרֶץ מוֹלַדְתִּי
  chosen: and from the land of my birth
  alternatives:
  - and from my native land
  - and from the land of my kindred
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote birthplace/native land/kin-group contextually. Here
    'land of my birth' stays close to the Hebrew and avoids over-specifying kinship.
- source_word: דִּבֶּר לִי
  chosen: spoke to me
  alternatives:
  - promised me
  lexicon: HALOT
  rationale: The verb is simply 'spoke'; the content of promise follows. Rendering
    it as 'promised' would collapse two clauses into one and over-interpret.
- source_word: נִשְׁבַּע לִי
  chosen: swore to me
  alternatives:
  - made an oath to me
  - swore an oath to me
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the Niphal of שבע in oath contexts.
- source_word: לְזַרְעֲךָ
  chosen: to your offspring
  alternatives:
  - to your seed
  - to your descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular force of זֶרַע better
    than ''descendants,'' while remaining natural modern English. ''Seed'' is more
    formal but less accessible.'
- source_word: אֶתֵּן אֶת הָאָרֶץ הַזֹּאת
  chosen: I will give this land
  alternatives:
  - I will give this הארץ to you/your offspring
  - I will give this country
  lexicon: HALOT
  rationale: Straightforward future promise formula; 'land' is preferable to 'country'
    in covenant contexts.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is emphatic, but standard English can convey the emphasis
    adequately in context without adding 'himself.' The dash before the final clause
    helps mark the emphasis and transition.
- source_word: יִשְׁלַח מַלְאָכוֹ לְפָנֶיךָ
  chosen: he will send his angel before you
  alternatives:
  - he will send his messenger before you
  - he will send his angel ahead of you
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel.' In this divine-guidance context,
    'angel' is the most likely sense and matches common biblical usage. 'Before you'
    closely reflects לְפָנֶיךָ.
- source_word: וְלָקַחְתָּ אִשָּׁה לִבְנִי
  chosen: and you shall take a wife for my son
  alternatives:
  - and you shall get a wife for my son
  - and you must take a wife for my son
  lexicon: HALOT
  rationale: Keeps the formal, commission-like tone of Abraham's charge. 'Take a wife'
    is idiomatic biblical English and not misleading in this context.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'from there' is the most direct rendering.
