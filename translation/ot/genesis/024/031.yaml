id: GEN.24.31
reference: Genesis 24:31
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר בּ֖וֹא בְּר֣וּךְ יְהוָ֑ה לָ֤/מָּה תַעֲמֹד֙ בַּ/ח֔וּץ וְ/אָנֹכִי֙ פִּנִּ֣יתִי הַ/בַּ֔יִת וּ/מָק֖וֹם לַ/גְּמַלִּֽים׃
translation:
  text: And he said, “Come in, blessed of Yahweh. Why do you stand outside? I have prepared the house, and a place for the camels.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “blessed by the LORD” or “O blessed one of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: בּוֹא
  chosen: Come in
  alternatives:
  - Come
  lexicon: HALOT
  rationale: Imperative of בוא in this hospitality context naturally means entering the dwelling, so 'Come in' makes the implied motion explicit in idiomatic English.
- source_word: בְּרוּךְ יְהוָה
  chosen: blessed of the LORD
  alternatives:
  - blessed by the LORD
  - O blessed one of the LORD
  lexicon: HALOT
  rationale: The passive participle with the divine name functions as a form of address. 'Blessed of the LORD' is concise and close to the Hebrew; 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָמָּה תַעֲמֹד בַּחוּץ
  chosen: Why do you stand outside?
  alternatives:
  - Why are you standing outside?
  - Why do you remain outside?
  lexicon: HALOT
  rationale: This preserves the direct question and the posture/location sense of עמד + בחוץ in natural English.
- source_word: וְאָנֹכִי
  chosen: I
  alternatives:
  - and I
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis, but English does not require repeating the conjunction with equal force here; the sense is retained in the following clause.
- source_word: פִּנִּיתִי
  chosen: have prepared
  alternatives:
  - have cleared out
  - have made ready
  lexicon: HALOT
  rationale: The verb literally means to clear or make room, but in this hospitality setting the idiomatic sense is preparing space. 'Have prepared' communicates the intended result clearly.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the home
  lexicon: HALOT
  rationale: בית here refers to the household dwelling/place of lodging. 'House' is the most direct rendering.
- source_word: וּמָקוֹם לַגְּמַלִּים
  chosen: and a place for the camels
  alternatives:
  - and room for the camels
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place.' This likely implies space prepared for lodging or tethering the camels; the simple rendering leaves that implicit as in the Hebrew.
