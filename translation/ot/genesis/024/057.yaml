id: GEN.24.57
reference: Genesis 24:57
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ נִקְרָ֣א לַֽ/נַּעֲרָ֑ וְ/נִשְׁאֲלָ֖ה אֶת פִּֽי/הָ־׃
translation:
  text: And they said, “Let us call the young woman and ask her what she says.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'ask her mouth,' that is, hear her own answer directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - So they said
  - Then they said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, introducing the speakers' response.
    'And they said' preserves the Hebrew narrative flow without overinterpreting discourse
    nuance.
- source_word: נִקְרָא
  chosen: Let us call
  alternatives:
  - We will call
  - Let us summon
  lexicon: HALOT
  rationale: 'Qal cohortative/common plural of קרא expresses a volitional proposal:
    ''let us call.'' ''Summon'' is possible, but ''call'' is the more direct and natural
    equivalent here.'
- source_word: לַנַּעֲרָ
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה refers to a young female. In context this is Rebekah, of marriageable
    age. 'Young woman' is natural modern English and avoids the potentially too-childlike
    sense of 'girl' and the archaic tone of 'maiden'.
- source_word: וְנִשְׁאֲלָה
  chosen: and ask
  alternatives:
  - and inquire of
  - and consult
  lexicon: HALOT
  rationale: Qal cohortative/common plural of שאל continues the proposal. 'Ask' is
    the clearest modern rendering; 'inquire of' is more formal but less natural.
- source_word: אֶת פִּיהָ
  chosen: what she says
  alternatives:
  - her mouth
  - her opinion
  - from her own mouth
  lexicon: HALOT
  rationale: Literally 'her mouth,' an idiom for her own spoken response or decision.
    Rendering it woodenly as 'her mouth' would be unclear in English. 'What she says'
    preserves the sense that they want to hear her own answer directly.
