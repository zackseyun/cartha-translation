id: GEN.24.37
reference: Genesis 24:37
source:
  edition: WLC
  text: וַ/יַּשְׁבִּעֵ֥/נִי אֲדֹנִ֖/י לֵ/אמֹ֑ר לֹא תִקַּ֤ח אִשָּׁה֙ לִ/בְנִ֔/י מִ/בְּנוֹת֙
    הַֽ/כְּנַעֲנִ֔י אֲשֶׁ֥ר אָנֹכִ֖י יֹשֵׁ֥ב בְּ/אַרְצֽ/וֹ־׃
translation:
  text: And my master made me swear, saying, ‘You shall not take a wife for my son
    from the daughters of the Canaanites, in whose land I am dwelling.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'among whom I dwell.' The Hebrew reads literally,
      'the Canaanite, in whose land I am dwelling,' using a singular collective expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבִּעֵנִי
  chosen: made me swear
  alternatives:
  - put me under oath
  - adjured me
  lexicon: HALOT
  rationale: Hiphil of שׁבע here means to cause someone to swear or place under oath.
    'Made me swear' is natural modern English and preserves the oath-setting force
    better than a weaker paraphrase.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: In this narrative context the speaker is Abraham's servant referring
    to his human superior, not to God. 'My master' communicates social relationship
    clearly in contemporary English; 'my lord' could sound archaic or misleading.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. 'Saying'
    is idiomatic in English narrative.
- source_word: לֹא תִקַּח
  chosen: You shall not take
  alternatives:
  - Do not take
  - You must not take
  lexicon: HALOT
  rationale: Second masculine singular imperfect in oath/instruction context carries
    prohibitive force. 'You shall not take' preserves the solemnity of the charge
    in direct speech.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In marriage-taking contexts אִשָּׁה specifically means 'wife,' not merely
    'woman.' This is the plain contextual sense.
- source_word: לִבְנִי
  chosen: for my son
  alternatives:
  - for my son Isaac
  lexicon: HALOT
  rationale: The Hebrew says simply 'for my son.' Supplying 'Isaac' would add information
    from context not present in this verse.
- source_word: מִבְּנוֹת הַכְּנַעֲנִי
  chosen: from the daughters of the Canaanites
  alternatives:
  - from among the daughters of the Canaanites
  - from Canaanite women
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the familial and ethnic expression
    of the Hebrew. 'Canaanite women' is smoother but less formally transparent than
    'daughters of the Canaanites.'
- source_word: אֲשֶׁר אָנֹכִי יֹשֵׁב בְּאַרְצוֹ
  chosen: in whose land I am dwelling
  alternatives:
  - among whom I dwell
  - in whose land I live
  lexicon: HALOT
  rationale: The relative clause is singular in Hebrew ('the Canaanite ... his land'),
    functioning collectively. 'In whose land I am dwelling' preserves the land-focused
    wording of בְאַרְצוֹ better than the more interpretive 'among whom I dwell.'
- source_word: יֹשֵׁב
  chosen: am dwelling
  alternatives:
  - dwell
  - am living
  lexicon: HALOT
  rationale: The participle expresses ongoing residence. 'Am dwelling' captures the
    durative sense in natural English.
