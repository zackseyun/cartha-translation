  from: at evening time, at the time when the women who draw water go out
  to: in the evening, the time when women go out to draw water.
  rationale: The Hebrew uses two parallel phrases beginning with 'לְעֵת' ('at the time of'). The draft's direct rendering of this parallelism is faithful to the source structure but results in a slightly cumbersome and redundant English phrase ('evening time'). Recasting the second phrase as an appositive ('...the time when...') is a more natural English construction for this type of clarification and improves the overall flow of the verse without losing any meaning.
