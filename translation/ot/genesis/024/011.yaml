id: GEN.24.11
reference: Genesis 24:11
source:
  edition: WLC
  text: וַ/יַּבְרֵ֧ךְ הַ/גְּמַלִּ֛ים מִ/ח֥וּץ לָ/עִ֖יר אֶל בְּאֵ֣ר הַ/מָּ֑יִם לְ/עֵ֣ת עֶ֔רֶב לְ/עֵ֖ת צֵ֥את הַ/שֹּׁאֲבֹֽת־׃
translation:
  text: And he made the camels kneel down outside the city by the well of water in the evening, the time when women go out to draw water..
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the time when the women who draw water go out.'' The participle is feminine plural, specifying women rather than a mixed group.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at evening time, at the time when the women who draw water go out'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּבְרֵךְ
  chosen: made ... kneel down
  alternatives:
  - caused ... to kneel
  - had ... crouch
  lexicon: HALOT
  rationale: 'From ברך in the Hiphil, here used of camels, the sense is causative: making the animals kneel. ''Made ... kneel down'' is idiomatic modern English and preserves the concrete action better than a more wooden ''caused to kneel.'''
- source_word: הַגְּמַלִּים
  chosen: the camels
  lexicon: HALOT
  rationale: Straightforward plural noun with article; refers to the caravan animals already in context.
- source_word: מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - outside the town
  lexicon: HALOT
  rationale: מִחוּץ means 'outside,' and עִיר is commonly 'city' or 'town.' 'City' is retained as the more standard rendering, though 'town' would also fit the setting.
- source_word: אֶל בְּאֵר הַמָּיִם
  chosen: by the well of water
  alternatives:
  - to the well of water
  - by the water well
  lexicon: HALOT
  rationale: אֶל marks movement toward, but in English the resulting location after making the camels kneel is best expressed as 'by the well of water.' This preserves the concrete Hebrew phrase without over-literal awkwardness.
- source_word: לְעֵת עֶרֶב
  chosen: at evening time
  alternatives:
  - toward evening
  - at the time of evening
  lexicon: HALOT
  rationale: The phrase denotes the time of evening. 'At evening time' is natural English and keeps the temporal marker explicit.
- source_word: לְעֵת צֵאת הַשֹּׁאֲבֹת
  chosen: at the time when the women who draw water go out
  alternatives:
  - at the time when the female water-drawers go out
  - when the women go out to draw water
  lexicon: HALOT
  rationale: The participle הַשֹּׁאֲבֹת is feminine plural, indicating women. The infinitive צֵאת gives the temporal sense 'when ... go out.' The chosen rendering preserves the gendered detail in line with the gender-accurate policy and makes explicit that these women are the ones drawing water.
