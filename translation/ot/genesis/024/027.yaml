theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of חֶסֶד וֶאֱמֶת
  chosen_reading: steadfast love and faithfulness
  alternative_readings:
  - lovingkindness and truth
  - covenant loyalty and faithfulness
  rationale: The pair often expresses covenant reliability and loyal love. The chosen rendering preserves that theological resonance in accessible English without over-paraphrasing.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
- issue: Rendering אֲחֵי literally
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - relatives
  rationale: Gender-accurate policy favors retaining the masculine kinship term where the Hebrew uses it. Although the broader referent is Abraham's family line, the source wording is masculine plural and is preserved in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
