  category: mistranslation
  tier: 2
  from: and unloaded the camels, and he gave
  to: and Laban unloaded the camels and gave
  rationale: The current rendering implies that 'the man' (Abraham's servant) performed the acts of hospitality for himself and his party. The Hebrew verbs וַיְפַתַּח (and he unloaded) and וַיִּתֵּן (and he gave) are 3ms and, while they could grammatically continue the subject 'the man', contextually they refer to the host, Laban (who in v. 31 says 'I have prepared the house'). The draft's rendering misrepresents the crucial host-guest dynamic of the narrative by making the guest the agent. Supplying 'Laban' as the subject, as many major translations do (e.g., ESV, NASB), is the clearest way to convey the correct meaning and avoid misleading the reader, which is a key goal of an 'optimal-equivalence' philosophy.
