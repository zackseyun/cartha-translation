id: GEN.24.49
reference: Genesis 24:49
source:
  edition: WLC
  text: וְ֠/עַתָּה אִם יֶשְׁ/כֶ֨ם עֹשִׂ֜ים חֶ֧סֶד וֶֽ/אֱמֶ֛ת אֶת אֲדֹנִ֖/י הַגִּ֣ידוּ
    לִ֑/י וְ/אִם לֹ֕א הַגִּ֣ידוּ לִ֔/י וְ/אֶפְנֶ֥ה עַל יָמִ֖ין א֥וֹ עַל שְׂמֹֽאל־־־־־׃
translation:
  text: Now if you are going to show kindness and faithfulness to my master, tell
    me; but if not, tell me, so that I may turn to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love and faithfulness.' The Hebrew pair often carries the
      sense of loyal, dependable covenantal kindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces the immediate practical conclusion of the servant's speech.
    'Now' is natural modern English; 'And now' is possible but not necessary in English
    discourse.
- source_word: אִם יֶשְׁכֶם עֹשִׂים
  chosen: if you are going to show
  alternatives:
  - if you are doing
  - if you will do
  - if there is in you to do
  lexicon: HALOT
  rationale: The Hebrew idiom literally combines 'if there is you' with a participle,
    expressing intended or actual willingness/action. 'If you are going to show' captures
    the forward-looking sense in context, since the servant is asking for their decision
    regarding Rebekah.
- source_word: חֶסֶד וֶאֱמֶת
  chosen: kindness and faithfulness
  alternatives:
  - steadfast love and faithfulness
  - kindness and truth
  - loyalty and reliability
  lexicon: HALOT
  rationale: This common Hebrew pair conveys covenantal or relational loyalty expressed
    in dependable action. Here the family is being asked to act benevolently and reliably
    toward Abraham's household. 'Kindness and faithfulness' is clear, natural, and
    preserves both elements without overloading the phrase with more technical covenant
    language.
- source_word: אֶת אֲדֹנִי
  chosen: to my master
  alternatives:
  - toward my master
  - with my master
  lexicon: HALOT
  rationale: 'The prepositionless object marker with the verb phrase is best represented
    idiomatically in English as the direction of the action: showing kindness and
    faithfulness ''to'' or ''toward'' someone. ''To my master'' is the most natural
    English rendering.'
- source_word: הַגִּידוּ לִי
  chosen: tell me
  alternatives:
  - declare to me
  - inform me
  lexicon: HALOT
  rationale: The imperative asks for a direct answer. 'Tell me' is straightforward
    modern English and fits the conversational setting.
- source_word: וְאִם לֹא
  chosen: but if not
  alternatives:
  - and if not
  - or if not
  lexicon: HALOT
  rationale: 'The contrastive sense is prominent: either they will act favorably or
    they will not. ''But if not'' communicates the contrast more clearly in English
    than a simple ''and if not.'''
- source_word: וְאֶפְנֶה
  chosen: so that I may turn
  alternatives:
  - and I will turn
  - then I will turn
  lexicon: HALOT
  rationale: The cohortative form expresses intended consequent action. 'So that I
    may turn' conveys purpose/result in smooth English while preserving the speaker's
    resolve.
- source_word: עַל יָמִין אוֹ עַל שְׂמֹאל
  chosen: to the right or to the left
  alternatives:
  - right or left
  - in one direction or another
  lexicon: HALOT
  rationale: This idiom refers to taking another course of action if the proposal
    is refused. The literal directional language should be preserved because it is
    intelligible in English and reflects the Hebrew imagery.
