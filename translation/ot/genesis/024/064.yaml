id: GEN.24.64
reference: Genesis 24:64
source:
  edition: WLC
  text: וַ/תִּשָּׂ֤א רִבְקָה֙ אֶת עֵינֶ֔י/הָ וַ/תֵּ֖רֶא אֶת יִצְחָ֑ק וַ/תִּפֹּ֖ל מֵ/עַ֥ל
    הַ/גָּמָֽל־־׃
translation:
  text: Rebekah lifted up her eyes and saw Isaac, and she got down from the camel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and she fell from upon the camel.' The Hebrew likely
      uses 'fell' idiomatically for dismounting here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂא ... אֶת עֵינֶיהָ
  chosen: lifted up her eyes
  alternatives:
  - looked up
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'lifted up her eyes.' Retaining the idiom
    in natural English preserves the narrative style while remaining understandable.
    'Looked up' is possible but slightly flattens the Hebrew expression.
- source_word: וַתֵּרֶא
  chosen: saw
  alternatives:
  - caught sight of
  lexicon: HALOT
  rationale: The basic sense of ראה here is simple visual perception. 'Saw' is the
    most direct rendering and fits the sequential narrative.
- source_word: אֶת יִצְחָק
  chosen: Isaac
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וַתִּפֹּל מֵעַל הַגָּמָל
  chosen: got down from the camel
  alternatives:
  - fell from the camel
  - alighted from the camel
  lexicon: HALOT
  rationale: Although נפל commonly means 'fall,' in this context and in light of the
    following verse's decorous action, the phrase is widely understood idiomatically
    as dismounting. 'Got down' communicates the likely sense in clear modern English.
    'Fell from the camel' is more literal but misleading in English, suggesting an
    accident; 'alighted' is accurate but too archaic for the project's style.
