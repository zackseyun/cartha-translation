id: GEN.24.50
reference: Genesis 24:50
source:
  edition: WLC
  text: וַ/יַּ֨עַן לָבָ֤ן וּ/בְתוּאֵל֙ וַ/יֹּ֣אמְר֔וּ מֵ/יְהוָ֖ה יָצָ֣א הַ/דָּבָ֑ר לֹ֥א נוּכַ֛ל דַּבֵּ֥ר אֵלֶ֖י/ךָ רַ֥ע אוֹ טֽוֹב־׃
translation:
  text: Then Laban and Bethuel answered and said, “The matter has come from the LORD; we cannot say to you either good or bad.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “we cannot speak to you either bad or good,” an idiom meaning they could not oppose or alter what the LORD had determined.
    reason: lexical_alternative
  - marker: b
    text: Or 'speak to you bad or good'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the wayyiqtol commonly introduces a reply in dialogue. 'Answered' preserves the conventional discourse function without unnecessary expansion.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The paired formula 'answered and said' reflects standard Hebrew narrative speech introduction. Retaining both verbs preserves the source texture.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The preposition מִן marks source/origin: the matter proceeds from the LORD.'
- source_word: יָצָא
  chosen: has come
  alternatives:
  - has gone out
  - has proceeded
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out,' but in this idiom with 'the matter' and a source phrase, 'has come from' is natural English that preserves origin without awkwardness.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - this matter
  - the word
  lexicon: HALOT
  rationale: דבר here refers to the affair/proposal under discussion, not merely a spoken word. 'The matter' best fits the context of marriage negotiations.
- source_word: לֹא נוּכַל
  chosen: we cannot
  alternatives:
  - we are not able to
  lexicon: HALOT
  rationale: יכל expresses ability. 'We cannot' is the most natural concise rendering in English.
- source_word: דַּבֵּר אֵלֶיךָ
  chosen: speak to you
  alternatives:
  - say to you
  lexicon: HALOT
  rationale: The infinitive with אליך indicates speaking directed toward the servant. 'Speak to you' preserves the verbal force and idiomatic English.
- source_word: רַע אוֹ טוֹב
  chosen: bad or good
  alternatives:
  - evil or good
  - anything bad or good
  - either bad or good
  lexicon: HALOT
  rationale: The idiom expresses inability to oppose or alter the divinely determined matter. 'Bad or good' is a close rendering of the Hebrew polarity pair without over-interpreting it as formal consent or refusal.
