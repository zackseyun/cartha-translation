theological_decisions:
- issue: Collective singular offspring language
  chosen_reading: your offspring ... those who hate him
  alternative_readings:
  - your descendants ... those who hate them
  rationale: The Hebrew uses a collective singular noun זַרְעֵךְ with singular pronominal
    reference in שֹׂנְאָיו. Preserving the singular maintains the literary and covenantal
    resonance with patriarchal promise language without forcing a pluralized interpretation.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
