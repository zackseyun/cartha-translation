id: GEN.24.60
reference: Genesis 24:60
source:
  edition: WLC
  text: וַ/יְבָרֲכ֤וּ אֶת רִבְקָה֙ וַ/יֹּ֣אמְרוּ לָ֔/הּ אֲחֹתֵ֕/נוּ אַ֥תְּ הֲיִ֖י
    לְ/אַלְפֵ֣י רְבָבָ֑ה וְ/יִירַ֣שׁ זַרְעֵ֔/ךְ אֵ֖ת שַׁ֥עַר שֹׂנְאָֽי/ו־׃
translation:
  text: And they blessed Rebekah and said to her, “Our sister, may you become thousands
    of ten thousands, and may your offspring possess the gate of those who hate him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “myriads” or “countless multitudes”; literally “thousands of ten thousands.”
    reason: lexical_alternative
  - marker: b
    text: Or “inherit the gate of his enemies.” The Hebrew literally says “possess
      the gate of those who hate him,” using “gate” as an image of a city’s strength
      and control.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֲכוּ
  chosen: they blessed
  alternatives:
  - they pronounced a blessing over
  - they bid farewell with a blessing
  lexicon: HALOT
  rationale: The piel of ברך here denotes speaking a blessing over Rebekah. 'They
    blessed' is the most direct and natural rendering, preserving the formal action
    without unnecessary expansion.
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  rationale: Personal names are transliterated by standard conventions. 'Rebekah'
    more closely reflects the Hebrew form רִבְקָה.
- source_word: אֲחֹתֵנוּ
  chosen: Our sister
  alternatives:
  - Sister of ours
  lexicon: HALOT
  rationale: The vocative sense is clear in context. 'Our sister' is idiomatic English
    and preserves the familial address.
- source_word: הֲיִי
  chosen: may you become
  alternatives:
  - become
  - be
  lexicon: HALOT
  rationale: The imperative/jussive-like blessing formula is best conveyed in English
    with 'may you become,' expressing wish rather than command.
- source_word: לְאַלְפֵי רְבָבָה
  chosen: thousands of ten thousands
  alternatives:
  - myriads
  - countless multitudes
  - thousands upon ten thousands
  lexicon: HALOT
  rationale: Literally the phrase combines 'thousands' and 'ten thousand.' 'Thousands
    of ten thousands' preserves the Hebrew numerical idiom and its hyperbolic fertility
    blessing better than flattening it to 'myriads.'
- source_word: וְיִירַשׁ
  chosen: may ... possess
  alternatives:
  - inherit
  - take possession of
  lexicon: HALOT
  rationale: ירש commonly means inherit or possess. With 'gate of those who hate him,'
    the sense is victorious possession or control, so 'possess' is the clearest English
    choice.
- source_word: זַרְעֵךְ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: '''Offspring'' is a natural collective singular in English that preserves
    the singular Hebrew noun while avoiding the archaic ambiguity of ''seed.'' ''Descendants''
    is possible but less closely reflects the singular collective form.'
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  - the gateway
  lexicon: HALOT
  rationale: In ancient Near Eastern usage, the gate represents the defended entrance
    and, by extension, civic control. 'The gate' keeps the concrete image while allowing
    the idiomatic force to stand.
- source_word: שֹׂנְאָיו
  chosen: those who hate him
  alternatives:
  - his enemies
  - those hostile to him
  lexicon: HALOT
  rationale: The participial form literally means 'his haters' or 'those who hate
    him.' This is more transparent than the interpretive shorthand 'his enemies,'
    though the latter captures the sense.
