theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the covenant name and avoids introducing a denominationally loaded preference for vocalization.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding the phrase 'before whom I have walked'
  chosen_reading: retain the covenantal idiom without over-interpreting it
  alternative_readings:
  - before whom I have lived faithfully
  - in whose presence I have walked
  rationale: The phrase expresses Abraham's life lived in accountable relationship before God. The translation preserves the theological texture of faithful conduct before the LORD without expanding it into an interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
