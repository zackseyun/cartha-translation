id: GEN.24.48
reference: Genesis 24:48
source:
  edition: WLC
  text: וָ/אֶקֹּ֥ד וָֽ/אֶשְׁתַּחֲוֶ֖ה לַ/יהוָ֑ה וָ/אֲבָרֵ֗ךְ אֶת יְהוָה֙ אֱלֹהֵי֙
    אֲדֹנִ֣/י אַבְרָהָ֔ם אֲשֶׁ֤ר הִנְחַ֨/נִי֙ בְּ/דֶ֣רֶךְ אֱמֶ֔ת לָ/קַ֛חַת אֶת בַּת
    אֲחִ֥י אֲדֹנִ֖/י לִ/בְנֽ/וֹ־־־׃
translation:
  text: Then I bowed down and worshiped the LORD, and I blessed the LORD, the God
    of my master Abraham, who had led me on the true way to take the daughter of my
    master's brother for his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the way of truth.'' The phrase can also mean ''on a faithful/reliable
      path,'' emphasizing the LORD''s trustworthy guidance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקֹּד
  chosen: I bowed down
  alternatives:
  - I knelt
  - I bowed
  lexicon: HALOT
  rationale: The verb denotes a physical act of bowing or stooping low. 'Bowed down'
    preserves the bodily gesture without over-specifying kneeling.
- source_word: וָאֶשְׁתַּחֲוֶה לַיהוָה
  chosen: and worshiped the LORD
  alternatives:
  - and bowed myself to the LORD
  - and prostrated myself before the LORD
  lexicon: HALOT
  rationale: The verb often refers to prostration in reverence and in English is naturally
    rendered 'worshiped' when directed to God. 'The LORD' follows the project's default
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name is rendered 'the LORD' rather than
    transliterated forms.
- source_word: וָאֲבָרֵךְ אֶת יְהוָה
  chosen: and I blessed the LORD
  alternatives:
  - and I praised the LORD
  lexicon: HALOT
  rationale: ברך with God as object can mean to bless in the sense of speaking well
    of or praising. 'Blessed' keeps the lexical connection and traditional biblical
    idiom.
- source_word: אֱלֹהֵי אֲדֹנִי אַבְרָהָם
  chosen: the God of my master Abraham
  alternatives:
  - the God of my lord Abraham
  lexicon: HALOT
  rationale: אֲדֹנִי here refers to Abraham as the servant's human superior, not a
    divine title. 'My master' communicates the social relationship clearly in modern
    English.
- source_word: הִנְחַנִי
  chosen: had led me
  alternatives:
  - guided me
  - caused me to go
  lexicon: HALOT
  rationale: The Hiphil of נחה conveys guiding or leading. 'Had led me' fits the retrospective
    narration and reads naturally with the following phrase.
- source_word: בְּדֶרֶךְ אֱמֶת
  chosen: on the true way
  alternatives:
  - in the way of truth
  - on a faithful path
  lexicon: HALOT
  rationale: Literally 'in a way/path of truth.' In context it describes God's faithful,
    reliable guidance to the correct destination. 'On the true way' is idiomatic while
    preserving the truth/reliability nuance.
- source_word: לָקַחַת
  chosen: to take
  alternatives:
  - to get
  - to obtain
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To take' is the straightforward rendering
    and fits marriage-arrangement context without paraphrase.
- source_word: בַּת אֲחִי אֲדֹנִי
  chosen: the daughter of my master's brother
  alternatives:
  - my master's brother's daughter
  - the daughter of my lord's brother
  lexicon: HALOT
  rationale: This construct chain identifies Rebekah as the daughter of Abraham's
    brother. The chosen wording is clear and preserves the familial relation.
- source_word: לִבְנוֹ
  chosen: for his son
  alternatives:
  - for Abraham's son
  lexicon: HALOT
  rationale: The pronominal suffix refers back to 'my master Abraham.' 'For his son'
    is concise and unambiguous in context.
