theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse is a direct prayer to Israel's covenant God. The project default
    is to render YHWH as “the LORD,” preserving both reverence convention and continuity
    with broad English Bible usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of חֶסֶד in a prayer for divine favor toward Abraham
  chosen_reading: steadfast love
  alternative_readings:
  - kindness
  - covenant faithfulness
  rationale: The term denotes more than generic kindness; “steadfast love” preserves
    the covenantal and loyal dimension without over-specifying a technical theological
    category in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
