  rationale: The construction 'that behold' is slightly awkward in contemporary English.
    It arises from combining the introductory formula 'And it happened... that' with
    the deictic 'behold'. A more natural rendering would be 'and behold', which directly
    translates the Hebrew `וְהִנֵּה` and maintains the narrative flow without the
    slight syntactic friction.
