id: GEN.24.15
reference: Genesis 24:15
source:
  edition: WLC
  text: וַֽ/יְהִי ה֗וּא טֶרֶם֮ כִּלָּ֣ה לְ/דַבֵּר֒ וְ/הִנֵּ֧ה רִבְקָ֣ה יֹצֵ֗את אֲשֶׁ֤ר
    יֻלְּדָה֙ לִ/בְתוּאֵ֣ל בֶּן מִלְכָּ֔ה אֵ֥שֶׁת נָח֖וֹר אֲחִ֣י אַבְרָהָ֑ם וְ/כַדָּ֖/הּ
    עַל שִׁכְמָֽ/הּ־־־׃
translation:
  text: And it happened, before he had finished speaking, that behold, Rebekah was
    coming out—she who had been born to Bethuel son of Milcah, the wife of Nahor,
    Abraham’s brother—with her jar on her shoulder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came out'; the Hebrew participle can be rendered as a simple past in
      English narrative.
    reason: lexical_alternative
  - marker: b
    text: Or 'that behold'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: טֶרֶם כִּלָּה לְדַבֵּר
  chosen: before he had finished speaking
  alternatives:
  - before he finished speaking
  - before he had done speaking
  lexicon: HALOT
  rationale: טֶרֶם marks prior time ('before'), and כִּלָּה + infinitive expresses
    completion of the action. Pluperfect English fits the sequence naturally.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: Marks vivid, attention-directing immediacy in narrative. 'Behold' best
    preserves the discourse force, though slightly elevated.
- source_word: יֹצֵאת
  chosen: was coming out
  alternatives:
  - came out
  - was going out
  lexicon: HALOT
  rationale: Feminine singular participle presents the action as in progress at the
    moment of discovery. 'Was coming out' captures the vividness better than a simple
    past.
- source_word: אֲשֶׁר יֻלְּדָה לִבְתוּאֵל
  chosen: she who had been born to Bethuel
  alternatives:
  - who was born to Bethuel
  - who had been borne to Bethuel
  lexicon: HALOT
  rationale: Passive form of ילד identifies Rebekah by lineage. 'Had been born to'
    is idiomatic and preserves the passive sense.
- source_word: בֶּן מִלְכָּה אֵשֶׁת נָחוֹר אֲחִי אַבְרָהָם
  chosen: son of Milcah, the wife of Nahor, Abraham’s brother
  alternatives:
  - the son of Milcah, wife of Nahor, Abraham's brother
  lexicon: HALOT
  rationale: Retains the full genealogical apposition of the Hebrew, clarifying Bethuel's
    relation through Milcah and Nahor.
- source_word: כַּד
  chosen: jar
  alternatives:
  - water jar
  - pitcher
  lexicon: HALOT
  rationale: A general vessel for drawing/carrying water. 'Jar' is natural modern
    English; 'water' is implied by context and need not be added here.
- source_word: עַל שִׁכְמָהּ
  chosen: on her shoulder
  alternatives:
  - upon her shoulder
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on her shoulder' is clear modern English.
