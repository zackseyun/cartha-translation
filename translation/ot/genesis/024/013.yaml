id: GEN.24.13
reference: Genesis 24:13
source:
  edition: WLC
  text: הִנֵּ֛ה אָנֹכִ֥י נִצָּ֖ב עַל עֵ֣ין הַ/מָּ֑יִם וּ/בְנוֹת֙ אַנְשֵׁ֣י הָ/עִ֔יר
    יֹצְאֹ֖ת לִ/שְׁאֹ֥ב מָֽיִם־׃
translation:
  text: Look, I am standing by the spring of water, and the daughters of the men of
    the city are coming out to draw water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fountain' or 'the spring'; Hebrew עֵין הַמָּיִם refers to a water
      source, not the more usual word for 'well.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the daughters of the men of the city,' a social/familial expression
      for the city's young women.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the immediate scene. 'Look' preserves
    the vividness in readable modern English better than the more archaic 'Behold.'
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent first-person pronoun gives explicit self-reference. English
    normally requires only 'I'; added emphasis is sufficiently conveyed by the clause
    as a whole without overtranslating.
- source_word: נִצָּב
  chosen: am standing
  alternatives:
  - stand
  - am stationed
  lexicon: HALOT
  rationale: Niphal participle expresses a present stative posture in context. 'Am
    standing' is natural English and fits the servant's present situation.
- source_word: עַל
  chosen: by
  alternatives:
  - upon
  - at
  - beside
  lexicon: HALOT
  rationale: Though literally 'upon/on,' with a water source in context the idiomatic
    sense is location near it. 'By' is the most natural English equivalent here.
- source_word: עֵין הַמָּיִם
  chosen: the spring of water
  alternatives:
  - the spring
  - the fountain
  - the well
  lexicon: HALOT
  rationale: עַיִן can denote a spring or fountain, literally an eye/source of water.
    'Spring of water' preserves the Hebrew image more closely than 'well,' which would
    suggest בְּאֵר.
- source_word: וּבְנוֹת
  chosen: and the daughters
  alternatives:
  - and the young women
  - and the girls
  lexicon: HALOT
  rationale: Formal construct with 'men of the city' is best preserved as 'daughters.'
    This keeps the familial/social idiom of the Hebrew without flattening it to a
    generic term.
- source_word: אַנְשֵׁי הָעִיר
  chosen: of the men of the city
  alternatives:
  - of the people of the city
  - of the townsmen
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of.' In this context it refers to the city's
    male inhabitants/fathers. Per gender-accurate philosophy, the masculine form is
    retained rather than neutralized.
- source_word: יֹצְאֹת
  chosen: are coming out
  alternatives:
  - come out
  - are going out
  lexicon: HALOT
  rationale: Qal participle feminine plural indicates ongoing or imminent action.
    'Are coming out' fits the narrative viewpoint from the speaker waiting at the
    water source.
- source_word: לִשְׁאֹב מָיִם
  chosen: to draw water
  alternatives:
  - to fetch water
  lexicon: HALOT
  rationale: Standard idiom for drawing water from a source. 'Draw water' is both
    accurate and idiomatic in English.
