  to: for my son Isaac
  rationale: The Hebrew uses an appositional structure with a repeated preposition
    (לִבְנִי לְיִצְחָק), which the draft renders literally. While formally accurate,
    the repetition of 'for' is slightly unnatural in English. A more idiomatic rendering
    that preserves the exact same meaning is 'for my son Isaac.' This is a common
    solution in English translations and fits the optimal-equivalence goal by improving
    target language fluency without any loss of source meaning.
