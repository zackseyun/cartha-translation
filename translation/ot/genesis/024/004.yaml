id: GEN.24.4
reference: Genesis 24:4
source:
  edition: WLC
  text: כִּ֧י אֶל אַרְצִ֛/י וְ/אֶל מוֹלַדְתִּ֖/י תֵּלֵ֑ךְ וְ/לָקַחְתָּ֥ אִשָּׁ֖ה לִ/בְנִ֥/י
    לְ/יִצְחָֽק־־׃
translation:
  text: but you shall go to my land and to my kindred, and take a wife for my son
    Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to my birthplace' for 'to my relatives'; the Hebrew term can refer either
      to place of origin or to one's kin group. The context here favors kinship.
    reason: lexical_alternative
  - marker: b
    text: Or 'for my son, for Isaac'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: In context this introduces a contrast with the prohibition of v. 3 against
    taking a wife from the Canaanites. English 'but' best conveys the adversative
    force here, though the particle can also mean 'for' or mark emphasis in other
    contexts.
- source_word: אֶל אַרְצִי
  chosen: to my land
  alternatives:
  - to my country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'country.' 'Land' is slightly more literal and
    preserves the geographic sense without implying a modern nation-state.
- source_word: וְאֶל מוֹלַדְתִּי
  chosen: and to my relatives
  alternatives:
  - and to my kindred
  - and to my birthplace
  - and to my family line
  lexicon: HALOT
  rationale: מוֹלֶדֶת/מוֹלַדְתִּי can denote kinship group or place of origin. In
    this context, because the servant is to obtain a wife from Abraham's own people,
    'my relatives' best captures the intended referent. The more spatial sense 'birthplace'
    is possible lexically but is less fitting as the object from whom a wife would
    be taken.
- source_word: תֵּלֵךְ
  chosen: you shall go
  alternatives:
  - you will go
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction or obligation in direct
    speech. 'You shall go' preserves the directive force in natural English.
- source_word: וְלָקַחְתָּ
  chosen: and take
  alternatives:
  - and get
  - and obtain
  lexicon: HALOT
  rationale: לקח is the standard verb 'take.' In marriage contexts it can mean 'take
    [as wife],' but here that nuance is already made clear by the object 'a wife,'
    so 'take' is sufficient and idiomatic.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Though אִשָּׁה can mean 'woman' or 'wife,' the marriage context requires
    'wife.'
- source_word: לִבְנִי
  chosen: for my son
  alternatives:
  - for my child
  lexicon: HALOT
  rationale: בֵּן specifically means 'son' here, not a gender-neutral child. This
    follows the gender-accurate principle.
- source_word: לְיִצְחָק
  chosen: for Isaac
  alternatives:
  - to Isaac
  lexicon: HALOT
  rationale: The second ל marks the beneficiary/apposition more than a separate motion
    or indirect object. 'For Isaac' reads naturally in English and clarifies that
    Isaac is the son just mentioned.
