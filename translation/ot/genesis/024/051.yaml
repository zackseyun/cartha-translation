id: GEN.24.51
reference: Genesis 24:51
source:
  edition: WLC
  text: הִנֵּֽה רִבְקָ֥ה לְ/פָנֶ֖י/ךָ קַ֣ח וָ/לֵ֑ךְ וּ/תְהִ֤י אִשָּׁה֙ לְ/בֶן אֲדֹנֶ֔י/ךָ כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־׃
translation:
  text: Look, Rebekah is before you. Take her and go, and let her be the wife of your master's son, just as Yahweh has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and let her be the wife of your master's son.' The Hebrew jussive may be expressed as either 'be' or 'become' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the immediate situation. 'Look' preserves the vividness in readable modern English better than the more archaic 'Behold.'
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  rationale: Standard English transliteration of the Hebrew personal name, following the principle to transliterate names rather than translate titles.
- source_word: לְפָנֶיךָ
  chosen: is before you
  alternatives:
  - is here before you
  - is in front of you
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before you' and idiomatically indicates availability/presence. 'Is before you' keeps the formal sense while remaining natural in English.
- source_word: קַח וָלֵךְ
  chosen: Take her and go
  alternatives:
  - Take and go
  - Take her and leave
  lexicon: HALOT
  rationale: Two sequential imperatives. Supplying 'her' in English is required by context for clarity, since Rebekah is the explicit object under discussion.
- source_word: וּתְהִי אִשָּׁה
  chosen: and let her become the wife
  alternatives:
  - and let her be the wife
  - and she shall be wife
  lexicon: HALOT
  rationale: 'Jussive 3fs of היה expresses permission/wish: ''let her become/be.'' Including the article in English (''the wife'') is idiomatic with the following genitive phrase and reflects marital designation.'
- source_word: לְבֶן אֲדֹנֶיךָ
  chosen: of your master's son
  alternatives:
  - for your master's son
  - to your master's son
  lexicon: HALOT
  rationale: The lamed marks relation/destination in the marriage formula. English idiom prefers 'the wife of your master's son' rather than a more wooden 'for/to your master's son.' 'Master' accurately reflects אֲדֹנֶיךָ in this servant-master context.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... has spoken
  alternatives:
  - as ... has said
  - according as ... spoke
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר introduces conformity: ''just as/as.'' The perfect verb can be rendered with English present perfect here to express a completed divine word with present relevance.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
