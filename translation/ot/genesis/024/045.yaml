id: GEN.24.45
reference: Genesis 24:45
source:
  edition: WLC
  text: אֲנִי֩ טֶ֨רֶם אֲכַלֶּ֜ה לְ/דַבֵּ֣ר אֶל לִבִּ֗/י וְ/הִנֵּ֨ה רִבְקָ֤ה יֹצֵאת֙
    וְ/כַדָּ֣/הּ עַל שִׁכְמָ֔/הּ וַ/תֵּ֥רֶד הָ/עַ֖יְנָ/ה וַ/תִּשְׁאָ֑ב וָ/אֹמַ֥ר אֵלֶ֖י/הָ
    הַשְׁקִ֥י/נִי נָֽא־־׃
translation:
  text: Before I had finished speaking in my heart, behold, Rebekah came out with
    her jar on her shoulder, and she went down to the spring and drew water. Then
    I said to her, ‘Please give me a drink.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''speaking to my heart,'' an idiom for inward speech or prayer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fountain'; the Hebrew word refers to a spring, not the more usual word
      for 'well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶם אֲכַלֶּה
  chosen: Before I had finished
  alternatives:
  - Before I finished
  - I had not yet finished
  lexicon: HALOT
  rationale: טֶרֶם marks an action not yet completed at the reference point; with
    the imperfect of כלה it yields 'before I had finished' in natural English, preserving
    the temporal nuance.
- source_word: לְדַבֵּר אֶל־לִבִּי
  chosen: speaking in my heart
  alternatives:
  - speaking to myself
  - speaking in my mind
  lexicon: HALOT
  rationale: Literally 'to speak to my heart.' In this context Eliezer is recounting
    inward prayer/thought. 'Speaking in my heart' preserves the Hebrew idiom more
    transparently than the more interpretive 'to myself' or 'in my mind'.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: The discourse particle marks suddenness or vivid presentation. 'Behold'
    preserves that rhetorical force in a readable but still elevated narrative register.
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  rationale: Standard English transliteration from Hebrew favors 'Rebekah' in many
    modern translations and more closely reflects the final consonant.
- source_word: יֹצֵאת
  chosen: came out
  alternatives:
  - was coming out
  - came forth
  lexicon: HALOT
  rationale: The participle in narrative after הִנֵּה often has an immediate vivid
    sense. 'Came out' fits idiomatic English narrative while preserving the action.
- source_word: כַדָּהּ
  chosen: her jar
  alternatives:
  - her water jar
  - her pitcher
  lexicon: HALOT
  rationale: כד denotes a jar or pitcher used for drawing water. 'Jar' is concise
    and modern; 'water jar' is possible but not necessary because the context supplies
    the function.
- source_word: עַל־שִׁכְמָהּ
  chosen: on her shoulder
  alternatives:
  - upon her shoulder
  lexicon: HALOT
  rationale: A straightforward spatial phrase; 'on her shoulder' is natural modern
    English.
- source_word: וַתֵּרֶד הָעַיְנָה
  chosen: she went down to the spring
  alternatives:
  - she went down to the fountain
  - she went down to the well
  lexicon: HALOT
  rationale: עַיִן commonly denotes a spring or fountain, distinct from בְּאֵר 'well.'
    'Spring' best reflects the Hebrew source rather than harmonizing to 'well' from
    broader context.
- source_word: וַתִּשְׁאָב
  chosen: drew water
  alternatives:
  - drew
  - drew from it
  lexicon: HALOT
  rationale: The verb means to draw water. Supplying 'water' is idiomatic in English
    and makes the action explicit without adding foreign content.
- source_word: הַשְׁקִינִי נָא
  chosen: Please give me a drink
  alternatives:
  - Please let me drink
  - Please give me some water to drink
  lexicon: HALOT
  rationale: The Hiphil imperative of שׁקה means 'give to drink' or 'cause to drink.'
    'Please give me a drink' is idiomatic and concise, while נָא is represented by
    'Please'.
