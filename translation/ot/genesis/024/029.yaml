id: GEN.24.29
reference: Genesis 24:29
source:
  edition: WLC
  text: וּ/לְ/רִבְקָ֥ה אָ֖ח וּ/שְׁמ֣/וֹ לָבָ֑ן וַ/יָּ֨רָץ לָבָ֧ן אֶל הָ/אִ֛ישׁ הַ/ח֖וּצָ/ה
    אֶל הָ/עָֽיִן־־׃
translation:
  text: Now Rebekah had a brother, and his name was Laban; and Laban ran out to the
    man, to the spring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the fountain.' The Hebrew word here is more precisely 'spring' than
      'well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/רִבְקָה
  chosen: Now Rebekah had
  alternatives:
  - And Rebekah had
  - Now for Rebekah there was
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus preposition literally reads ''and/to Rebekah,''
    an idiom introducing possession/existence: ''Rebekah had.'' ''Now'' smoothly renders
    the discourse-linking waw in readable English without over-literal awkwardness.'
- source_word: אָח
  chosen: a brother
  alternatives:
  - brother
  lexicon: HALOT
  rationale: Common noun meaning 'brother.' The indefinite article is natural in English
    because this is the first mention of him in the clause.
- source_word: וּ/שְׁמ/וֹ
  chosen: and his name was
  alternatives:
  - and his name
  lexicon: HALOT
  rationale: Standard Hebrew naming formula; English requires the copula for natural
    expression.
- source_word: לָבָן
  chosen: Laban
  rationale: Personal name transliterated per translation philosophy.
- source_word: וַ/יָּרָץ
  chosen: ran
  alternatives:
  - hurried
  - ran out
  lexicon: HALOT
  rationale: Basic sense is 'ran.' The motion outward is supplied by the following
    הַחוּצָה, so the verb itself is kept simple.
- source_word: אֶל הָ/אִישׁ
  chosen: to the man
  alternatives:
  - toward the man
  lexicon: HALOT
  rationale: אֶל commonly marks movement toward a person. 'The man' refers to Abraham's
    servant, but the Hebrew uses the generic noun, so the translation preserves that.
- source_word: הַ/ח֖וּצָ/ה
  chosen: out
  alternatives:
  - outside
  - outward
  lexicon: HALOT
  rationale: Directional form meaning 'outside/outward.' In English it works adverbially
    with 'ran' as 'ran out.'
- source_word: אֶל הָ/עָיִן
  chosen: to the spring
  alternatives:
  - to the fountain
  - to the well
  lexicon: HALOT
  rationale: עַיִן commonly denotes a spring or fountain, distinct from בְּאֵר 'well.'
    Since the narrative location is a water source, 'spring' best preserves the lexical
    distinction while remaining natural English.
