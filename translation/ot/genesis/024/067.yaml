id: GEN.24.67
reference: Genesis 24:67
source:
  edition: WLC
  text: וַ/יְבִאֶ֣/הָ יִצְחָ֗ק הָ/אֹ֨הֱלָ/ה֙ שָׂרָ֣ה אִמּ֔/וֹ וַ/יִּקַּ֧ח אֶת רִבְקָ֛ה
    וַ/תְּהִי ל֥/וֹ לְ/אִשָּׁ֖ה וַ/יֶּאֱהָבֶ֑/הָ וַ/יִּנָּחֵ֥ם יִצְחָ֖ק אַחֲרֵ֥י אִמּֽ/וֹ־־׃פ
translation:
  text: And Isaac brought her into the tent of Sarah his mother, and he took Rebekah,
    and she became his wife, and he loved her. So Isaac was comforted after his mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the tent of his mother Sarah.' The Hebrew word order allows either
      English arrangement, with the same basic sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'after his mother'; the sense is after the loss/death of his mother,
      though 'death' is not stated explicitly in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִאֶהָ
  chosen: brought her
  alternatives:
  - led her in
  - brought her in
  lexicon: HALOT
  rationale: Hiphil of בוא with 3fs suffix means to cause her to come/bring her. 'Brought
    her' is natural English and preserves the direct action.
- source_word: הָאֹהֱלָה
  chosen: into the tent
  alternatives:
  - to the tent
  lexicon: HALOT
  rationale: The directional he on אֹהֶל indicates motion toward/into the tent. 'Into
    the tent' best reflects the sense of entry.
- source_word: שָׂרָה אִמּוֹ
  chosen: of Sarah his mother
  alternatives:
  - Sarah's tent, his mother’s
  - the tent of his mother Sarah
  lexicon: HALOT
  rationale: The appositional construction identifies the tent as belonging to Sarah,
    who is Isaac's mother. 'The tent of Sarah his mother' stays close to the Hebrew
    while remaining readable.
- source_word: וַיִּקַּח אֶת־רִבְקָה
  chosen: he took Rebekah
  alternatives:
  - he married Rebekah
  lexicon: HALOT
  rationale: לקח literally means 'take.' In marriage contexts it can imply taking
    as wife, but because the next clause explicitly states 'she became his wife,'
    retaining 'took' avoids collapsing the two clauses into one.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  chosen: she became his wife
  alternatives:
  - she became a wife to him
  - she was his wife
  lexicon: HALOT
  rationale: The idiom היה + ל + אשה marks marital status. 'She became his wife' is
    idiomatic English and preserves the progression of the narrative.
- source_word: וַיֶּאֱהָבֶהָ
  chosen: he loved her
  lexicon: HALOT
  rationale: אהב is the standard verb 'love.' No stronger or weaker English term is
    warranted here.
- source_word: וַיִּנָּחֵם
  chosen: was comforted
  alternatives:
  - was consoled
  - found comfort
  lexicon: HALOT
  rationale: Niphal of נחם here expresses receiving comfort/being consoled rather
    than repentance. 'Was comforted' is the clearest concise rendering in context.
- source_word: אַחֲרֵי אִמּוֹ
  chosen: after his mother
  alternatives:
  - after the death of his mother
  - concerning his mother
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after.' In context it refers to the period following
    Sarah's death, but the Hebrew does not explicitly say 'death,' so the main text
    should not add it.
