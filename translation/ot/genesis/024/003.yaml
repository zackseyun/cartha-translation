id: GEN.24.3
reference: Genesis 24:3
source:
  edition: WLC
  text: וְ/אַשְׁבִּ֣יעֲ/ךָ֔ בַּֽ/יהוָה֙ אֱלֹהֵ֣י הַ/שָּׁמַ֔יִם וֵֽ/אלֹהֵ֖י הָ/אָ֑רֶץ אֲשֶׁ֨ר לֹֽא תִקַּ֤ח אִשָּׁה֙ לִ/בְנִ֔/י מִ/בְּנוֹת֙ הַֽ/כְּנַעֲנִ֔י אֲשֶׁ֥ר אָנֹכִ֖י יוֹשֵׁ֥ב בְּ/קִרְבּֽ/וֹ־׃
translation:
  text: and I will make you swear by Yahweh, the God of heaven and the God of the earth, that you shall not take a wife for my son from the daughters of the Canaanites, among whom I dwell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by Yahweh.'' The main text follows the project’s standard rendering ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַשְׁבִּיעֲךָ
  chosen: and I will make you swear
  alternatives:
  - and I will put you under oath
  - and I will adjure you
  lexicon: HALOT
  rationale: Hiphil of שׁבע means to cause someone to swear, not merely 'swear' oneself. 'Make you swear' is clear modern English and preserves the causative force.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: The preposition marks the one by whom the oath is sworn. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי הַשָּׁמַיִם וֵאלֹהֵי הָאָרֶץ
  chosen: the God of heaven and the God of the earth
  alternatives:
  - God of heaven and earth
  lexicon: HALOT
  rationale: The construct phrases are repeated in Hebrew, so the English keeps both occurrences of 'the God of' rather than compressing them. 'Earth' is retained rather than 'land' because the paired cosmic scope with 'heaven' indicates the whole world.
- source_word: אֲשֶׁר לֹא תִקַּח
  chosen: that you shall not take
  alternatives:
  - that you must not take
  - that you are not to take
  lexicon: HALOT
  rationale: After an oath formula, the clause expresses the content of the oath. 'Shall not take' preserves the solemn legal tone without sounding archaic in context.
- source_word: אִשָּׁה לִבְנִי
  chosen: a wife for my son
  alternatives:
  - a woman for my son
  lexicon: HALOT
  rationale: In marriage context אִשָּׁה is best rendered 'wife,' not merely 'woman.'
- source_word: מִבְּנוֹת הַכְּנַעֲנִי
  chosen: from the daughters of the Canaanites
  alternatives:
  - from the daughters of Canaan
  - from the Canaanite women
  lexicon: HALOT
  rationale: The idiom 'daughters of' refers to women of a people group. 'Canaanites' makes the ethnic reference explicit and natural in English while preserving the Hebrew imagery.
- source_word: אֲשֶׁר אָנֹכִי יוֹשֵׁב בְּקִרְבּוֹ
  chosen: among whom I am dwelling
  alternatives:
  - in whose midst I dwell
  - among whom I live
  lexicon: HALOT
  rationale: יוֹשֵׁב with בְּקִרְבּוֹ expresses residing among a people. 'Among whom I am dwelling' preserves the participial ongoing sense and the social setting better than a more wooden 'in whose midst.'
