id: GEN.24.8
reference: Genesis 24:8
source:
  edition: WLC
  text: וְ/אִם לֹ֨א תֹאבֶ֤ה הָֽ/אִשָּׁה֙ לָ/לֶ֣כֶת אַחֲרֶ֔י/ךָ וְ/נִקִּ֕יתָ מִ/שְּׁבֻעָתִ֖/י
    זֹ֑את רַ֣ק אֶת בְּנִ֔/י לֹ֥א תָשֵׁ֖ב שָֽׁמָּ/ה־־׃
translation:
  text: But if the woman is not willing to go after you, then you will be free from
    this oath of mine; only you must not take my son back there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to go with you' or 'to follow you'; literally 'to go after you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be released from this oath of mine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the prior instruction. 'But if'
    captures the adversative force in context more naturally than bare 'if'.
- source_word: תֹאבֶה
  chosen: is not willing
  alternatives:
  - does not consent
  - refuses
  lexicon: HALOT
  rationale: The verb אבה denotes willingness/consent or refusal. With לֹא, 'is not
    willing' preserves the volitional nuance without overstating it as active defiance.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: At this stage she is an unidentified prospective bride, so 'the woman'
    is the plain contextual sense; 'wife' would be premature.
- source_word: לָלֶכֶת אַחֲרֶיךָ
  chosen: to go after you
  alternatives:
  - to go with you
  - to follow you
  lexicon: HALOT
  rationale: Literally 'to go after you.' 'Go after you' preserves the Hebrew imagery
    and remains understandable in English; 'follow you' is possible but can sound
    more discipleship-like than the travel context requires.
- source_word: וְנִקִּיתָ
  chosen: you will be free
  alternatives:
  - you will be released
  - you will be clear/innocent
  lexicon: HALOT
  rationale: The Niphal of נקה here conveys being cleared or released from obligation.
    'You will be free' is idiomatic modern English for release from the oath's binding
    force.
- source_word: מִשְּׁבֻעָתִי זֹאת
  chosen: from this oath of mine
  alternatives:
  - from my oath
  - from this sworn obligation of mine
  lexicon: HALOT
  rationale: Keeps both the demonstrative זֹאת ('this') and the first-person suffix.
    'Oath' is the straightforward rendering for שְׁבוּעָה in this legal-solemn context.
- source_word: רַק
  chosen: only
  alternatives:
  - except that
  - provided only that
  lexicon: HALOT
  rationale: Marks a strong limitation on the servant's release. 'Only' is concise
    and natural, preserving the exception-like force.
- source_word: אֶת־בְּנִי לֹא תָשֵׁב שָׁמָּה
  chosen: you must not take my son back there
  alternatives:
  - do not return my son there
  - you shall not bring my son back there
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, 'cause to return/bring back.' 'Take ... back
    there' is natural English and preserves the causative sense and the adverb 'there.'
    'Must not' appropriately conveys the prohibitive force in context.
