theological_decisions:
- issue: Semantic force of קֹנֵה in the divine title
  chosen_reading: possessor of heaven and earth
  alternative_readings:
  - creator of heaven and earth
  - maker of heaven and earth
  rationale: The Hebrew verb קנה can carry the sense 'possess/acquire' and in some
    contexts 'create.' Because the immediate phrase functions as a title for El Elyon,
    either reading is possible. To preserve lexical transparency and avoid importing
    a narrower theological conclusion than the word itself demands, the main text
    uses 'possessor,' while the common interpretive alternative 'creator' is preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
