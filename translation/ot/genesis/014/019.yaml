id: GEN.14.19
reference: Genesis 14:19
source:
  edition: WLC
  text: וַֽ/יְבָרְכֵ֖/הוּ וַ/יֹּאמַ֑ר בָּר֤וּךְ אַבְרָם֙ לְ/אֵ֣ל עֶלְי֔וֹן קֹנֵ֖ה
    שָׁמַ֥יִם וָ/אָֽרֶץ׃
translation:
  text: And he blessed him and said, “Blessed be Abram by God Most High, possessor
    of heaven and earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “creator of heaven and earth.” The Hebrew participle can mean “possessor,”
      “owner,” or in context “creator.”
    reason: lexical_alternative
  - marker: b
    text: Or “the heavens and the earth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרְכֵהוּ
  chosen: And he blessed him
  alternatives:
  - Then he blessed him
  lexicon: HALOT
  rationale: Wayyiqtol narrative form with 3ms object suffix; straightforwardly rendered
    as sequential past narrative. 'And' preserves Hebrew narrative flow better than
    omitting the conjunction.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Common narrative introducer following wayyiqtol. 'And said' is natural
    English while preserving the coordination of the Hebrew.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - May ... be blessed
  lexicon: HALOT
  rationale: Predicative passive participle used in a blessing formula. 'Blessed be'
    best captures the elevated benedictory force in idiomatic English without over-paraphrasing.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name is transliterated according to the translation philosophy;
    at this point in Genesis the name has not yet changed to Abraham.
- source_word: לְאֵל
  chosen: by God
  alternatives:
  - to God
  - of God
  lexicon: HALOT
  rationale: The preposition ל in blessing formulas can mark relation to the one from
    whom blessing comes. In English, 'blessed be Abram by God' most clearly conveys
    God as the source of the blessing in this context.
- source_word: אֵל עֶלְיוֹן
  chosen: God Most High
  alternatives:
  - God, the Most High
  - the Most High God
  lexicon: HALOT
  rationale: A divine title consisting of noun plus adjective. 'God Most High' is
    a natural, established English rendering that preserves the title's sense without
    adding interpretation.
- source_word: קֹנֵה
  chosen: possessor
  alternatives:
  - creator
  - maker
  - owner
  lexicon: HALOT
  rationale: The participle of קנה can denote acquiring, possessing, or creating depending
    on context. Here, with 'heaven and earth' as the object and in a divine-title
    context, both 'creator' and 'possessor' are possible. 'Possessor' stays closer
    to the lexical core and avoids resolving the semantic range too narrowly; the
    alternative is preserved in a footnote.
- source_word: שָׁמַיִם וָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: HALOT
  rationale: Standard merism for the totality of creation. Singular 'heaven' is idiomatic
    in English in this collocation, though the Hebrew form is morphologically plural;
    the more formal alternative is worth preserving in a footnote.
