id: GEN.14.2
reference: Genesis 14:2
source:
  edition: WLC
  text: עָשׂ֣וּ מִלְחָמָ֗ה אֶת בֶּ֨רַע֙ מֶ֣לֶךְ סְדֹ֔ם וְ/אֶת בִּרְשַׁ֖ע מֶ֣לֶךְ עֲמֹרָ֑ה
    שִׁנְאָ֣ב מֶ֣לֶךְ אַדְמָ֗ה וְ/שֶׁמְאֵ֨בֶר֙ מֶ֣לֶךְ צביים וּ/מֶ֥לֶךְ בֶּ֖לַע הִיא
    צֹֽעַר־־׀־׃
translation:
  text: they made war against Bera king of Sodom, and against Birsha king of Gomorrah,
    Shinab king of Admah, and Shemeber king of Zeboiim, and the king of Bela (that
    is, Zoar).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they waged war against.”
    reason: lexical_alternative
  - marker: b
    text: Zeboiim is also spelled “Zeboim” in some English forms.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשׂוּ מִלְחָמָה
  chosen: they made war
  alternatives:
  - they waged war
  - they went to war
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'did/made war.' 'Made war' preserves
    the formal structure while remaining intelligible in modern English. 'Waged war'
    is also possible, but the more literal rendering better reflects the source without
    awkwardness.
- source_word: אֶת ... וְאֶת
  chosen: against
  alternatives:
  - with
  lexicon: HALOT
  rationale: Here the object marker introduces the parties against whom war was made.
    In English, 'made war against' expresses the adversative sense naturally. Rendering
    it as simple direct object without 'against' would be unclear.
- source_word: בֶּרַע
  chosen: Bera
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: מֶלֶךְ סְדֹם
  chosen: king of Sodom
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly and consistently as title
    plus place name.
- source_word: בִּרְשַׁע
  chosen: Birsha
  rationale: Personal name transliterated.
- source_word: עֲמֹרָה
  chosen: Gomorrah
  rationale: Standard English form of the place name, reflecting established transliteration
    convention.
- source_word: שִׁנְאָב
  chosen: Shinab
  rationale: Personal name transliterated.
- source_word: אַדְמָה
  chosen: Admah
  rationale: Place name transliterated by standard English convention.
- source_word: שֶׁמְאֵבֶר
  chosen: Shemeber
  rationale: Personal name transliterated.
- source_word: צביים
  chosen: Zeboiim
  alternatives:
  - Zeboim
  rationale: Standard English biblical place-name form is 'Zeboiim.' 'Zeboim' is a
    common variant in English and worth preserving as a lexical alternative, but the
    fuller form better reflects the Hebrew vocalization.
- source_word: מֶלֶךְ בֶּלַע
  chosen: the king of Bela
  alternatives:
  - the king of Belah
  rationale: The final member of the list lacks a personal name and identifies the
    ruler by city. 'Bela' is the standard English form for the place name.
- source_word: הִיא צֹעַר
  chosen: that is, Zoar
  alternatives:
  - which is Zoar
  lexicon: HALOT
  rationale: The pronoun plus place name functions as a parenthetical identification
    of Bela with Zoar. 'That is, Zoar' is natural modern English and preserves the
    explanatory force.
