  from: against Bera king of Sodom, and against Birsha king of Gomorrah, Shinab king of Admah, and Shemeber king of Zeboiim, and the king of Bela
  to: against Bera king of Sodom, Birsha king of Gomorrah, Shinab king of Admah, Shemeber king of Zeboiim, and the king of Bela
  rationale: The Hebrew text uses the object marker 'et' for the first two kings in the list and omits it for the subsequent ones, a common feature of Hebrew syntax. The current English rendering mirrors this by using 'against' for the first two kings and then dropping it. This creates ambiguity in English, suggesting the war might have been waged only against the first two parties. A clearer rendering would treat all five as a single, parallel list governed by one 'against' to reflect the underlying grammar that all are objects of the action.
