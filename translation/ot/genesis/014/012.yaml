id: GEN.14.12
reference: Genesis 14:12
source:
  edition: WLC
  text: וַ/יִּקְח֨וּ אֶת ל֧וֹט וְ/אֶת רְכֻשׁ֛/וֹ בֶּן אֲחִ֥י אַבְרָ֖ם וַ/יֵּלֵ֑כוּ
    וְ/ה֥וּא יֹשֵׁ֖ב בִּ/סְדֹֽם־־־׃
translation:
  text: They took Lot and his possessions, Abram’s brother’s son, and went away. Now
    he was dwelling in Sodom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Abram’s brother’s son.'' That is, Lot was Abram’s nephew.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: They took
  alternatives:
  - And they took
  - They seized
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, the standard narrative form meaning 'took.' 'They
    took' is natural modern English; 'seized' is possible in context of plunder but
    is stronger than the verb itself warrants.
- source_word: רְכֻשׁוֹ
  chosen: his possessions
  alternatives:
  - his goods
  - his property
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property/possessions. 'Possessions' is clear
    modern English and fits the context of captured goods.
- source_word: בֶּן אֲחִי אַבְרָם
  chosen: Abram’s brother’s son
  alternatives:
  - the son of Abram's brother
  - Abram's nephew
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'son of Abram's brother.' 'Nephew' is idiomatic
    English, but the more literal rendering preserves the kinship wording of the source
    while remaining readable.
- source_word: וַיֵּלֵכוּ
  chosen: and went away
  alternatives:
  - and went
  - and departed
  lexicon: HALOT
  rationale: הלך in narrative commonly means 'went.' In this context, after taking
    captives and goods, 'went away' conveys departure from the scene more naturally
    than bare 'went' without adding much interpretation.
- source_word: וְהוּא יֹשֵׁב בִּסְדֹם
  chosen: Now he was dwelling in Sodom
  alternatives:
  - and he was living in Sodom
  - while he was dwelling in Sodom
  lexicon: HALOT
  rationale: The clause gives explanatory background about Lot's location. יֹשֵׁב
    can mean 'dwelling/living.' 'Now he was dwelling in Sodom' captures the parenthetical
    explanatory force in smooth English.
