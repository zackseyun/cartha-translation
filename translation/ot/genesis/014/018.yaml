id: GEN.14.18
reference: Genesis 14:18
source:
  edition: WLC
  text: וּ/מַלְכִּי צֶ֨דֶק֙ מֶ֣לֶךְ שָׁלֵ֔ם הוֹצִ֖יא לֶ֣חֶם וָ/יָ֑יִן וְ/ה֥וּא כֹהֵ֖ן
    לְ/אֵ֥ל עֶלְיֽוֹן־׃
translation:
  text: And Melchizedek king of Salem brought out bread and wine. He was priest of
    God Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought forth bread and wine.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''El Elyon,'' that is, ''God Most High.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכִּי צֶדֶק
  chosen: Melchizedek
  alternatives:
  - Malki-zedek
  lexicon: HALOT
  rationale: Personal name is transliterated rather than translated, following the
    translation philosophy to transliterate names. Although the name likely carries
    the sense 'my king is righteousness' or 'king of righteousness,' that meaning
    is not brought into the main text because it functions here as a proper name.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard rendering for the common noun denoting a royal ruler; straightforward
    in apposition to Melchizedek.
- source_word: שָׁלֵם
  chosen: Salem
  alternatives:
  - Shalem
  lexicon: HALOT
  rationale: Rendered as a place name by standard transliteration. The traditional
    English form 'Salem' is well established and natural in English.
- source_word: הוֹצִיא
  chosen: brought out
  alternatives:
  - brought forth
  - brought
  lexicon: HALOT
  rationale: The Hiphil of יצא here means to cause to come out or bring out. 'Brought
    out' is idiomatic modern English and preserves the concrete action better than
    the more archaic 'brought forth.'
- source_word: לֶחֶם
  chosen: bread
  lexicon: HALOT
  rationale: Standard rendering of the noun for bread/food; here the literal sense
    'bread' is clearly intended.
- source_word: יָיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of the noun for wine; no contextual reason to soften
    or paraphrase it.
- source_word: כֹהֵן
  chosen: priest
  lexicon: HALOT
  rationale: Standard rendering for a cultic officiant. This preserves the religious
    office without importing later Israelite priestly structures beyond what the text
    states.
- source_word: אֵל עֶלְיוֹן
  chosen: God Most High
  alternatives:
  - God Most High
  - El Most High
  - God, the Most High
  lexicon: HALOT
  rationale: אֵל is rendered 'God' rather than transliterated 'El' because here it
    functions as a divine designation in English translation, while עֶלְיוֹן is rendered
    'Most High' as a title. The phrase is kept compact and traditional without obscuring
    its theological force.
- source_word: וְהוּא
  chosen: He was
  alternatives:
  - and he was
  - now he was
  lexicon: HALOT
  rationale: 'The pronoun with conjunction marks a new clause and highlights Melchizedek''s
    identity. English reads most naturally with a new sentence: ''He was priest of
    God Most High.'' The copula is supplied idiomatically.'
