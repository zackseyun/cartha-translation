theological_decisions:
- issue: Whether the bread and wine should be rendered in a way that foregrounds later
    sacramental associations
  chosen_reading: Retain the simple historical wording 'brought out bread and wine'
    without sacramental expansion
  alternative_readings:
  - Render with wording suggestive of Eucharistic foreshadowing
  rationale: While later biblical theology, especially Hebrews, gives Melchizedek
    typological significance, Genesis 14:18 itself simply narrates that he brought
    out bread and wine and identifies him as priest of God Most High. The translation
    should not import later doctrinal interpretation into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Whether אֵל עֶלְיוֹן should be treated as a proper name ('El Elyon') or translated
    as a title
  chosen_reading: Translate as 'God Most High'
  alternative_readings:
  - El Elyon
  - God, the Most High
  rationale: The phrase is a divine title/designation and is best translated for English
    readability and theological clarity. Translating the title preserves meaning rather
    than leaving a Semitic form opaque to many readers.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
