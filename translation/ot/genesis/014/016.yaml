id: GEN.14.16
reference: Genesis 14:16
source:
  edition: WLC
  text: וַ/יָּ֕שֶׁב אֵ֖ת כָּל הָ/רְכֻ֑שׁ וְ/גַם֩ אֶת ל֨וֹט אָחִ֤י/ו וּ/רְכֻשׁ/וֹ֙ הֵשִׁ֔יב וְ/גַ֥ם אֶת הַ/נָּשִׁ֖ים וְ/אֶת הָ/עָֽם־־־־׃
translation:
  text: He brought back all the possessions; he also brought back Lot his relative, and his possessions, and also the women and the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Lot his brother.' Here 'brother' carries the broader sense of a close relative or kinsman; Lot is Abram's nephew in the narrative.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the goods' / 'all the property' for 'all the possessions.'
    reason: lexical_alternative
  - marker: c
    text: '''The women'' could in context include wives, but the Hebrew term itself is broader.'
    reason: lexical_alternative
  - marker: d
    text: Or 'And he brought back all the possessions, and also brought back'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: he brought back
  alternatives:
  - he returned
  - he restored
  lexicon: HALOT
  rationale: From שוב in the Hiphil/waw-consecutive narrative form, here meaning to cause to return or bring back recovered persons/goods. 'Brought back' is natural modern English and fits the rescue context better than the less idiomatic 'returned' with a direct object.
- source_word: כָּל הָרְכֻשׁ
  chosen: all the possessions
  alternatives:
  - all the goods
  - all the property
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property, goods, or possessions. 'Possessions' is broad and readable, covering plundered goods without sounding overly commercial.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and
  lexicon: HALOT
  rationale: The particle adds emphasis and continuation. Rendering it as 'and also' preserves the additive force present twice in the verse.
- source_word: לוֹט אָחִיו
  chosen: Lot his relative
  alternatives:
  - Lot his brother
  - Lot his kinsman
  lexicon: HALOT
  rationale: Although אָח can mean literal brother, in Hebrew it also commonly denotes a broader kinship relation. Since Lot is Abram's nephew in context, 'his relative' communicates the actual relationship without forcing the narrower English 'brother.'
- source_word: וּרְכֻשׁוֹ
  chosen: and his possessions
  alternatives:
  - and his goods
  - and his property
  lexicon: HALOT
  rationale: Same noun as earlier in the verse; consistency favors 'possessions.' The suffix refers to Lot's possessions.
- source_word: הֵשִׁיב
  chosen: brought back
  alternatives:
  - restored
  - returned
  lexicon: HALOT
  rationale: A second form of שוב in Hiphil. Repeating 'brought back' reflects the Hebrew repetition and keeps the narrative cadence.
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - the wives
  lexicon: HALOT
  rationale: The noun normally means 'women' and the immediate context does not require the narrower 'wives.' The broader rendering avoids importing a specification not explicit in the text.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the men
  - the populace
  lexicon: HALOT
  rationale: עָם here refers to the people taken captive along with the goods. 'The people' is the most natural broad rendering and avoids narrowing the group to males only.
