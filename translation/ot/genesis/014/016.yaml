  from: And he brought back all the possessions, and also brought back
  to: He brought back all the possessions; he also brought back
  rationale: The Hebrew structures the verse around two distinct verb forms (wayyāšeḇ... hēšîḇ), creating two main clauses. The current English rendering with 'And..., and also...' connected by a comma is grammatically correct but creates a slightly run-on feel. Using a semicolon provides a stronger separation that better reflects the bipartite structure of the source text, improving the rhythm and clarity of the list of recovered people and goods.
