id: GEN.14.1
reference: Genesis 14:1
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/ימֵי֙ אַמְרָפֶ֣ל מֶֽלֶךְ שִׁנְעָ֔ר אַרְי֖וֹךְ מֶ֣לֶךְ אֶלָּסָ֑ר
    כְּדָרְלָעֹ֨מֶר֙ מֶ֣לֶךְ עֵילָ֔ם וְ/תִדְעָ֖ל מֶ֥לֶךְ גּוֹיִֽם־׃
translation:
  text: 'And it happened in the days of Amraphel king of Shinar, Arioch king of Ellasar,
    Chedorlaomer king of Elam, and Tidal king of Goiim:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "king of nations." The Hebrew goyim commonly means "nations," but here
      it may function as a place-name, matching the pattern of the other royal titles
      in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces the narrative setting. 'And
    it happened' preserves the Hebrew narrative opening without using the archaic
    'came to pass.' 'Now it happened' is possible, but 'And' better reflects the conjunction.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: The construct phrase literally means 'in the days of' and is a standard
    temporal formula. Retaining it preserves the formal narrative style while remaining
    natural in English.
- source_word: אַמְרָפֶל
  chosen: Amraphel
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: מֶלֶךְ שִׁנְעָר
  chosen: king of Shinar
  lexicon: HALOT
  rationale: מֶלֶךְ is straightforwardly 'king,' and שִׁנְעָר is the place-name Shinar.
    The construct relationship is naturally rendered 'king of Shinar.'
- source_word: אַרְיֹוךְ
  chosen: Arioch
  rationale: Personal name transliterated by standard convention.
- source_word: מֶלֶךְ אֶלָּסָר
  chosen: king of Ellasar
  lexicon: HALOT
  rationale: Straightforward construct chain with place-name transliterated.
- source_word: כְּדָרְלָעֹמֶר
  chosen: Chedorlaomer
  alternatives:
  - Kedorlaomer
  rationale: Traditional English transliteration 'Chedorlaomer' is widely recognized
    and reflects established convention for this proper name; a more phonetic 'Kedorlaomer'
    is possible but less familiar.
- source_word: מֶלֶךְ עֵילָם
  chosen: king of Elam
  lexicon: HALOT
  rationale: Standard rendering of title plus place-name.
- source_word: וְתִדְעָל
  chosen: and Tidal
  rationale: Conjunction plus proper name; rendered directly.
- source_word: מֶלֶךְ גּוֹיִם
  chosen: king of Goiim
  alternatives:
  - king of nations
  lexicon: HALOT
  rationale: Although גּוֹיִם commonly means 'nations,' here it functions as a proper
    name or territorial designation in apposition to 'king,' parallel to the other
    kingdom names in the verse. Rendering it as 'Goiim' preserves that likely toponymic
    function in the main text while the lexical sense 'nations' is worth preserving
    in a footnote.
