id: GEN.14.8
reference: Genesis 14:8
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א מֶֽלֶךְ סְדֹ֜ם וּ/מֶ֣לֶךְ עֲמֹרָ֗ה וּ/מֶ֤לֶךְ אַדְמָה֙ וּ/מֶ֣לֶךְ
    צביים וּ/מֶ֥לֶךְ בֶּ֖לַע הִוא צֹ֑עַר וַ/יַּֽעַרְכ֤וּ אִתָּ/ם֙ מִלְחָמָ֔ה בְּ/עֵ֖מֶק
    הַ/שִּׂדִּֽים־־׃
translation:
  text: Then the king of Sodom, the king of Gomorrah, the king of Admah, the king
    of Zeboiim, and the king of Bela (that is, Zoar) went out, and they drew up for
    battle with them in the Valley of Siddim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with them in battle'; the Hebrew expression is literally 'with them
      battle,' and some translations render the sense more explicitly as 'against
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: Then ... went out
  alternatives:
  - and ... went out
  - came out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Although the verb is singular
    in form, the following compound subject is a list of kings; idiomatic English
    renders the action collectively. 'Then' captures narrative progression naturally.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard rendering for the title of each ruler; repeated in English to
    reflect the Hebrew repetition and formal cadence.
- source_word: סְדֹם
  chosen: Sodom
  rationale: Standard English transliteration of the place name.
- source_word: עֲמֹרָה
  chosen: Gomorrah
  rationale: Standard English transliteration of the place name.
- source_word: אַדְמָה
  chosen: Admah
  rationale: Standard English transliteration of the place name.
- source_word: צביים
  chosen: Zeboiim
  alternatives:
  - Zeboim
  rationale: A standard English transliteration of the place name. 'Zeboim' is also
    common in English versions; 'Zeboiim' more closely reflects the Hebrew vocalization.
- source_word: בֶּלַע הִוא צֹעַר
  chosen: Bela (that is, Zoar)
  alternatives:
  - Bela, that is Zoar
  lexicon: HALOT
  rationale: The appositional clause identifies Bela with Zoar. Parentheses communicate
    the explanatory aside clearly in modern English while preserving the identification.
- source_word: וַיַּעַרְכוּ
  chosen: they drew up for battle
  alternatives:
  - they arrayed themselves for battle
  - they prepared for battle
  - they set the battle line
  lexicon: HALOT
  rationale: The verb ערך in military context refers to arranging or drawing up forces
    in battle order. 'Drew up for battle' is natural modern English and preserves
    the military nuance better than the more generic 'prepared'.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - against them
  lexicon: HALOT
  rationale: The preposition את with pronominal suffix here most naturally means 'with
    them' in the sense of engaging them in battle. English readers may infer hostility
    from the context and the noun 'battle'; 'against them' is interpretive and less
    formally aligned with the Hebrew wording.
- source_word: מִלְחָמָה
  chosen: for battle
  alternatives:
  - war
  - battle
  lexicon: HALOT
  rationale: Combined with ערך, the phrase denotes arranging for combat. 'For battle'
    yields idiomatic English in conjunction with 'drew up'.
- source_word: בְּעֵמֶק הַשִּׂדִּים
  chosen: in the Valley of Siddim
  alternatives:
  - in the vale of Siddim
  lexicon: HALOT
  rationale: עֵמֶק is best rendered 'valley' in contemporary English. 'Siddim' is
    transliterated as a place name.
