theological_decisions:
- issue: Implied continuation from previous verse's oath/refusal
  chosen_reading: Supply the implied verb in English ('I will take nothing') to make
    the sentence complete.
  alternative_readings:
  - A verbless fragment such as 'except only what the young men have eaten...'
  rationale: The Hebrew begins with an exceptive expression that depends on the prior
    clause. English style strongly favors carrying over the implied refusal from v.
    23. This is a translational, not doctrinal, decision and avoids obscuring Abram's
    ethical stance regarding the spoils.
