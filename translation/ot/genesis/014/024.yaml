id: GEN.14.24
reference: Genesis 14:24
source:
  edition: WLC
  text: בִּלְעָדַ֗/י רַ֚ק אֲשֶׁ֣ר אָֽכְל֣וּ הַ/נְּעָרִ֔ים וְ/חֵ֨לֶק֙ הָֽ/אֲנָשִׁ֔ים
    אֲשֶׁ֥ר הָלְכ֖וּ אִתִּ֑/י עָנֵר֙ אֶשְׁכֹּ֣ל וּ/מַמְרֵ֔א הֵ֖ם יִקְח֥וּ חֶלְקָֽ/ם׃ס
translation:
  text: I will take nothing except only what the young men have eaten, and the share
    of the men who went with me—Aner, Eshcol, and Mamre. Let them take their share.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what the servants/retainers have eaten.' The Hebrew נְּעָרִים can refer
      to youths or attendants depending on context.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''they shall take their share.'' The Hebrew form may be read as a simple
      future, though the context favors permission: ''Let them take.'''
    reason: alternative_reading
  - marker: c
    text: Or 'except only'.
    reason: previous_rendering
lexical_decisions:
- source_word: בִּלְעָדַי
  chosen: I will take nothing except
  alternatives:
  - apart from me
  - besides me
  - except
  lexicon: HALOT
  rationale: In context Abram is continuing his refusal to take goods from the king
    of Sodom. Though the word literally means 'apart from/except,' English requires
    supplying the implied verbal idea from the previous verse. 'I will take nothing
    except' makes the exclusion sense explicit without over-paraphrasing.
- source_word: רַק
  chosen: only
  alternatives:
  - surely
  - merely
  lexicon: HALOT
  rationale: 'רַק adds restriction/emphasis to the exception. Rendering it as ''only''
    preserves the emphatic limitation: the sole exception is what has already been
    consumed and the allies'' portion.'
- source_word: אֲשֶׁר אָכְלוּ הַנְּעָרִים
  chosen: what the young men have eaten
  alternatives:
  - what the servants have eaten
  - what the retainers have eaten
  lexicon: HALOT
  rationale: נְּעָרִים can denote youths or attendants/servants. Here it refers to
    Abram's men who consumed provisions during the campaign. 'Young men' is a transparent,
    conventional rendering that preserves the Hebrew term without forcing a more interpretive
    social label.
- source_word: וְחֵלֶק
  chosen: and the share
  alternatives:
  - and the portion
  lexicon: HALOT
  rationale: חֵלֶק commonly means 'share, portion.' 'Share' is natural modern English
    and fits the distribution of spoils context.
- source_word: הָאֲנָשִׁים אֲשֶׁר הָלְכוּ אִתִּי
  chosen: of the men who went with me
  alternatives:
  - of the men who accompanied me
  lexicon: HALOT
  rationale: This phrase identifies Abram's allies. 'Went with me' is slightly more
    formal-equivalent than 'accompanied me' and preserves the movement imagery of
    הלך.
- source_word: עָנֵר אֶשְׁכֹּל וּמַמְרֵא
  chosen: Aner, Eshcol, and Mamre
  rationale: Personal names are transliterated per project philosophy.
- source_word: הֵם יִקְחוּ חֶלְקָם
  chosen: Let them take their share
  alternatives:
  - they shall take their share
  - they may take their portion
  lexicon: HALOT
  rationale: The imperfect here expresses permission/allowance in context rather than
    simple future prediction. 'Let them take' communicates Abram's concession that
    his allies may receive their due portion.
