id: GEN.14.17
reference: Genesis 14:17
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א מֶֽלֶךְ סְדֹם֮ לִ/קְרָאת/וֹ֒ אַחֲרֵ֣י שׁוּב֗/וֹ מֵֽ/הַכּוֹת֙ אֶת
    כְּדָרלָעֹ֔מֶר וְ/אֶת הַ/מְּלָכִ֖ים אֲשֶׁ֣ר אִתּ֑/וֹ אֶל עֵ֣מֶק שָׁוֵ֔ה ה֖וּא
    עֵ֥מֶק הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: Then the king of Sodom went out to meet him after his return from defeating
    Kedorlaomer and the kings who were with him, at the Valley of Shaveh (that is,
    the King's Valley).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Valley of Shaveh''; that is, ''the King''s Valley.'''
    reason: cultural_note
  - marker: b
    text: Traditional English often has 'Chedorlaomer'; the Hebrew name is rendered
      here more directly as 'Kedorlaomer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: Then ... went out
  alternatives:
  - And ... went out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: מֶלֶךְ סְדֹם
  chosen: the king of Sodom
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly; 'Sodom' is transliterated
    as a place name per translation philosophy.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to encounter him
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for going out in order to meet someone; 'to
    meet him' is the standard natural equivalent.
- source_word: אַחֲרֵי שׁוּבוֹ
  chosen: after his return
  alternatives:
  - after he returned
  lexicon: HALOT
  rationale: The preposition plus infinitive/nominal form with suffix is well represented
    by the English nominal phrase 'after his return,' which is concise and formal
    enough.
- source_word: מֵהַכּוֹת
  chosen: from defeating
  alternatives:
  - from striking down
  - after defeating
  lexicon: HALOT
  rationale: The Hiphil of נכה here refers to military victory. 'Defeating' communicates
    the sense clearly in modern English better than the more wooden 'striking'.
- source_word: כְּדָרלָעֹמֶר
  chosen: Kedorlaomer
  alternatives:
  - Chedorlaomer
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Kedorlaomer' reflects a direct transliteration
    from the Hebrew consonantal form more transparently than the traditional English
    'Chedorlaomer.'
- source_word: וְאֶת־הַמְּלָכִים אֲשֶׁר אִתּוֹ
  chosen: and the kings who were with him
  alternatives:
  - and the kings with him
  lexicon: HALOT
  rationale: The relative clause is made explicit in natural English. The referent
    of 'him' is Kedorlaomer in context.
- source_word: אֶל עֵמֶק שָׁוֵה
  chosen: at the Valley of Shaveh
  alternatives:
  - to the Valley of Shaveh
  - into the Valley of Shaveh
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this context English idiom prefers
    'at' with a meeting location. 'Shaveh' is transliterated as a place name.
- source_word: הוּא עֵמֶק הַמֶּלֶךְ
  chosen: (that is, the King's Valley)
  alternatives:
  - which is the King's Valley
  lexicon: HALOT
  rationale: The appositional explanatory clause identifies the location. Parentheses
    and 'that is' communicate the explanatory aside naturally without loss of meaning.
