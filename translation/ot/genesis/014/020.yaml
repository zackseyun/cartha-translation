id: GEN.14.20
reference: Genesis 14:20
source:
  edition: WLC
  text: וּ/בָרוּךְ֙ אֵ֣ל עֶלְי֔וֹן אֲשֶׁר מִגֵּ֥ן צָרֶ֖י/ךָ בְּ/יָדֶ֑/ךָ וַ/יִּתֶּן
    ל֥/וֹ מַעֲשֵׂ֖ר מִ/כֹּֽל־־׃
translation:
  text: And blessed be God Most High, who delivered your enemies into your hand. And
    he gave him a tenth of everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'a tithe of everything.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not repeat the subject of 'gave'; context most naturally
      indicates Abram gave Melchizedek a tenth of everything.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָרוּךְ
  chosen: And blessed be
  alternatives:
  - And blessed is
  - Blessed be
  lexicon: HALOT
  rationale: Passive participial blessing formula used predicatively in a benedictory
    statement. 'Blessed be' is idiomatic English for this liturgical/blessing construction;
    'And' preserves the conjunction.
- source_word: אֵל עֶלְיוֹן
  chosen: God Most High
  alternatives:
  - God Most Exalted
  - El Most High
  lexicon: HALOT
  rationale: אֵל is rendered 'God' rather than transliterated 'El' because this is
    a divine title, and עֶלְיוֹן functions as the epithet 'Most High.' This preserves
    the sense of the title in natural English.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Relative pronoun introducing the clause describing God Most High. 'Who'
    fits the personal referent in English.
- source_word: מִגֵּן
  chosen: delivered
  alternatives:
  - gave over
  - handed over
  lexicon: HALOT
  rationale: From מגן in the sense 'to deliver over, hand over' rather than 'shield'
    in this verbal form. 'Delivered' is idiomatic in military context and matches
    the object 'your enemies into your hand.'
- source_word: צָרֶיךָ
  chosen: your enemies
  alternatives:
  - your foes
  - your adversaries
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix from צרר/צר, referring to hostile opponents.
    'Enemies' is the clearest contemporary rendering.
- source_word: בידך
  chosen: into your hand
  alternatives:
  - into your power
  - by your hand
  lexicon: HALOT
  rationale: Hebrew idiom for giving someone into another's power. 'Into your hand'
    preserves the concrete biblical idiom while remaining understandable.
- source_word: ויתן
  chosen: And he gave
  alternatives:
  - Then he gave
  lexicon: HALOT
  rationale: Wayyiqtol narrative form. 'And he gave' preserves the simple narrative
    sequence without overinterpreting discourse flow.
- source_word: לו
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: Indirect object referring most naturally to Melchizedek in context. English
    can express this as 'gave him' naturally.
- source_word: מעשר
  chosen: a tenth
  alternatives:
  - a tithe
  lexicon: HALOT
  rationale: Literally 'a tenth.' Chosen for accessibility and transparency to the
    Hebrew; 'tithe' is a valid traditional alternative but carries later institutional
    associations not explicit in the verse.
- source_word: מכל
  chosen: of everything
  alternatives:
  - from all
  - of all
  lexicon: HALOT
  rationale: The phrase indicates the tenth was taken from the whole of the goods/spoils.
    'Of everything' is natural modern English and adequately represents the comprehensive
    sense.
