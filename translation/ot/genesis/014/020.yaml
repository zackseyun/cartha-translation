theological_decisions:
- issue: Referent of the subject in ויתן
  chosen_reading: 'Abram is the implied subject: ''And he gave him a tenth of everything.'''
  alternative_readings:
  - Melchizedek is the subject, though this is less likely in context
  rationale: The immediate narrative context most naturally takes Abram as the subject
    giving a tenth to Melchizedek, a reading also reflected in later biblical interpretation
    (e.g., Heb 7). The Hebrew clause itself does not restate the subject explicitly,
    so the translation keeps the pronouns but follows the contextual default.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine; here the contextual evidence sufficiently favors Abram as subject,
    while preserving the alternative in a footnote.
