theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Semantic force of קֹנֵה שָׁמַיִם וָאָרֶץ
  chosen_reading: possessor of heaven and earth
  alternative_readings:
  - creator of heaven and earth
  - maker of heaven and earth
  - owner of heaven and earth
  rationale: The Hebrew permits a range including possession and creation. To preserve
    theological tension rather than resolve it, the main text keeps 'possessor,' while
    a footnote preserves 'creator' as a significant alternative with contextual support
    from the title's meaning.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
revisions:
- timestamp: '2026-04-21T00:25:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/014/022.json
  category: awkward_english
  tier: 1
  from: earth,”
  to: earth.”
  rationale: The Hebrew verse ends with a Sof Pasuq, indicating a full stop. In the
    English rendering, the reporting clause ('But Abram said...') precedes the direct
    quotation. Therefore, the quotation, which is a complete declarative sentence,
    should end with a period inside the quotation marks, not a comma. The current
    comma suggests the sentence continues with a reporting tag (e.g., '...earth,'
    he swore), which is not the case here.
