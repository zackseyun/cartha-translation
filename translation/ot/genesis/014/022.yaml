id: GEN.14.22
reference: Genesis 14:22
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אַבְרָ֖ם אֶל מֶ֣לֶךְ סְדֹ֑ם הֲרִימֹ֨תִי יָדִ֤/י אֶל יְהוָה֙ אֵ֣ל
    עֶלְי֔וֹן קֹנֵ֖ה שָׁמַ֥יִם וָ/אָֽרֶץ־־׃
translation:
  text: But Abram said to the king of Sodom, “I have raised my hand to the LORD, God
    Most High, possessor of heaven and earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Raised my hand: a Hebrew oath gesture; that is, Abram is swearing an oath.'
    reason: cultural_note
  - marker: b
    text: Or 'creator of heaven and earth.' The Hebrew participle can be understood
      as 'possessor,' 'owner,' or in context 'creator.'
    reason: lexical_alternative
  - marker: c
    text: Or 'earth,”'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - and ... said
  - then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English idiom can render
    it as 'and,' 'then,' or 'but' depending on discourse flow. Here 'But' fits Abram's
    contrastive response to the king of Sodom in the immediate context.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name is transliterated by standard convention.
- source_word: מֶלֶךְ סְדֹם
  chosen: the king of Sodom
  lexicon: HALOT
  rationale: Straightforward construct chain; definite in context.
- source_word: הֲרִימֹתִי יָדִי
  chosen: I have raised my hand
  alternatives:
  - I lift up my hand
  - I have sworn
  lexicon: HALOT
  rationale: Literally 'I have raised my hand.' In context this is an oath gesture,
    but the translation keeps the concrete idiom rather than paraphrasing it as 'I
    have sworn.' The oath sense is clear from context and can be noted in a footnote.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: אֵל עֶלְיוֹן
  chosen: God Most High
  alternatives:
  - God Most Exalted
  - El Elyon
  lexicon: HALOT
  rationale: Title translated rather than transliterated. 'Most High' is the established
    and accurate rendering of עֶלְיוֹן here.
- source_word: קֹנֵה
  chosen: possessor of
  alternatives:
  - creator of
  - maker of
  - owner of
  lexicon: HALOT
  rationale: The participle of קנה can denote acquiring/possessing and in some contexts
    creating. In Genesis 14:19, 22 the sense may include creator by implication, but
    the lexical core more directly supports 'possessor/owner.' 'Possessor of heaven
    and earth' preserves the Hebrew wording without overresolving the semantic debate.
- source_word: שָׁמַיִם וָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: HALOT
  rationale: This is the standard merism for the totality of creation. Singular 'heaven'
    is natural modern English in this collocation, though 'heavens' is possible.
