id: GEN.14.11
reference: Genesis 14:11
source:
  edition: WLC
  text: וַ֠/יִּקְחוּ אֶת כָּל רְכֻ֨שׁ סְדֹ֧ם וַ/עֲמֹרָ֛ה וְ/אֶת כָּל אָכְלָ֖/ם וַ/יֵּלֵֽכוּ־־־־׃
translation:
  text: Then they took all the possessions of Sodom and Gomorrah, and all their food,
    and went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their provisions.' The Hebrew term can denote food in general or supplies
      for a journey or campaign.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they seized
  - they carried off
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, the standard narrative form meaning 'took.' 'Took'
    is the most direct and natural rendering in context; 'seized' or 'carried off'
    are possible contextual expansions but slightly more interpretive.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: The quantifier is repeated for emphasis over both possessions and food;
    'all' preserves the comprehensiveness of the plunder.
- source_word: רְכֻשׁ
  chosen: possessions
  alternatives:
  - goods
  - property
  - wealth
  lexicon: HALOT
  rationale: Refers to movable property or goods. 'Possessions' is clear modern English
    and broad enough to include the city's plundered goods without implying only wealth
    in the abstract.
- source_word: סְדֹם וַעֲמֹרָה
  chosen: Sodom and Gomorrah
  rationale: Standard English transliterations of the place names; names are transliterated
    per project philosophy.
- source_word: אָכְלָם
  chosen: their food
  alternatives:
  - their provisions
  - all they had to eat
  lexicon: HALOT
  rationale: From אכל in nominal form, meaning food or provisions, with 3mp suffix
    'their.' 'Their food' is the most straightforward rendering; 'provisions' is possible
    but slightly more specific.
- source_word: וַיֵּלֵכוּ
  chosen: went away
  alternatives:
  - departed
  - went on their way
  lexicon: HALOT
  rationale: Qal wayyiqtol of הלך. In this military-plunder context, 'went away' communicates
    departure after taking spoil more naturally than the bare 'went,' while remaining
    close to the source.
