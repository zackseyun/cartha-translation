id: GEN.14.3
reference: Genesis 14:3
source:
  edition: WLC
  text: כָּל אֵ֨לֶּה֙ חָֽבְר֔וּ אֶל עֵ֖מֶק הַ/שִּׂדִּ֑ים ה֖וּא יָ֥ם הַ/מֶּֽלַח־־׃
translation:
  text: All these joined together in the Valley of Siddim (that is, the Salt Sea).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, by later name, the Dead Sea.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  - All these kings
  lexicon: HALOT
  rationale: כָּל with the demonstrative אֵלֶּה yields a collective expression, naturally
    rendered 'All these.' 'All these kings' is contextually possible from the surrounding
    verses but adds a noun not present in the Hebrew, so it is not used in the main
    text.
- source_word: חָבְרוּ
  chosen: joined together
  alternatives:
  - assembled
  - allied themselves
  - came together
  lexicon: HALOT
  rationale: The verb חבר in the Qal conveys joining or associating together. 'Joined
    together' preserves the basic lexical sense while fitting the military-political
    context. 'Allied themselves' is interpretive and slightly stronger than the Hebrew
    requires.
- source_word: אֶל
  chosen: in
  alternatives:
  - to
  - at
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' in this context with a gathering verb
    and location it is idiomatically rendered 'in' to express the place where they
    joined together. This is an optimal-equivalence adjustment for natural English.
- source_word: עֵמֶק
  chosen: Valley
  alternatives:
  - valley
  - plain
  lexicon: HALOT
  rationale: עֵמֶק usually denotes a valley. 'Valley' is the most straightforward
    rendering here. 'Plain' appears in some older translations but is less precise
    lexically.
- source_word: הַשִּׂדִּים
  chosen: Siddim
  alternatives:
  - the Siddim Valley
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated per translation
    philosophy. The definite article is naturally absorbed into the English construction
    'the Valley of Siddim.'
- source_word: הוּא
  chosen: that is
  alternatives:
  - it is
  - which is
  lexicon: HALOT
  rationale: 'The pronoun introduces an explanatory identification: the Valley of
    Siddim is identified with another known location. ''That is'' communicates the
    appositional force clearly in modern English.'
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Dead Sea
  - the Sea of Salt
  lexicon: HALOT
  rationale: The Hebrew expression literally means 'the Salt Sea.' This follows original-language
    primacy over later traditional identification. 'Dead Sea' is the familiar modern
    name and worth preserving in a footnote; 'Sea of Salt' is more wooden and less
    natural in English.
