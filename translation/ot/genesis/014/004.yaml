id: GEN.14.4
reference: Genesis 14:4
source:
  edition: WLC
  text: שְׁתֵּ֤ים עֶשְׂרֵה֙ שָׁנָ֔ה עָבְד֖וּ אֶת כְּדָרְלָעֹ֑מֶר וּ/שְׁלֹשׁ עֶשְׂרֵ֥ה
    שָׁנָ֖ה מָרָֽדוּ־־׃
translation:
  text: For twelve years they had served Kedorlaomer, but in the thirteenth year they
    rebelled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional English: ''Chedorlaomer.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: for twelve years
  alternatives:
  - twelve years
  lexicon: HALOT
  rationale: The Hebrew gives a duration expression, literally 'twelve years.' English
    idiom is smoother with 'for twelve years' when paired with the following clause.
- source_word: עָבְדוּ
  chosen: they had served
  alternatives:
  - they served
  - they were subject to
  lexicon: HALOT
  rationale: עבד commonly means 'serve' or 'work for.' In this political context it
    denotes vassal service/subjection to an overlord. 'Had served' fits the narrative
    sequence leading up to the rebellion in the next clause.
- source_word: אֶת כְּדָרְלָעֹמֶר
  chosen: Kedorlaomer
  alternatives:
  - Chedorlaomer
  rationale: Personal names are transliterated rather than translated. 'Kedorlaomer'
    reflects a direct transliteration choice from the Hebrew consonantal form, while
    the traditional English 'Chedorlaomer' is preserved as an alternative.
- source_word: וּשְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  chosen: but in the thirteenth year
  alternatives:
  - and thirteen years
  - and for thirteen years
  lexicon: HALOT
  rationale: 'Although literally ''and thirteen years,'' the sense in context is temporal
    contrast: after twelve years of service, rebellion occurred in year thirteen.
    ''But in the thirteenth year'' communicates the narrative turn clearly in natural
    English.'
- source_word: מָרָדוּ
  chosen: they rebelled
  alternatives:
  - they revolted
  lexicon: HALOT
  rationale: מרד means 'rebel, revolt.' 'Rebelled' is the most straightforward and
    idiomatic rendering in this political-military context.
