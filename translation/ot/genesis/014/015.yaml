id: GEN.14.15
reference: Genesis 14:15
source:
  edition: WLC
  text: וַ/יֵּחָלֵ֨ק עֲלֵי/הֶ֧ם לַ֛יְלָה ה֥וּא וַ/עֲבָדָ֖י/ו וַ/יַּכֵּ֑/ם וַֽ/יִּרְדְּפֵ/ם֙
    עַד חוֹבָ֔ה אֲשֶׁ֥ר מִ/שְּׂמֹ֖אל לְ/דַמָּֽשֶׂק׀־׃
translation:
  text: By night he and his servants divided themselves against them, struck them
    down, and pursued them as far as Hobah, which is north of Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided his forces against them by night.' The Hebrew verb can describe
      tactical division for a surprise attack.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the left of Damascus,' an idiom meaning 'north of Damascus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּחָלֵק
  chosen: divided themselves
  alternatives:
  - divided his forces
  - split up
  lexicon: HALOT
  rationale: The Niphal form of חלק here is reflexive/passive in sense. In military
    context it refers to dividing oneself/one's company for attack. 'Divided themselves'
    preserves the Hebrew verbal idea without over-specifying 'forces,' though the
    context makes the tactical sense clear.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: With a hostile military verb, על commonly carries the sense of movement
    or action against an opponent. 'Against them' is idiomatic and contextually precise.
- source_word: לַיְלָה הוּא
  chosen: By night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: The phrase marks the time of the attack. 'By night' is concise, natural
    English and preserves the nocturnal tactical setting.
- source_word: וַעֲבָדָיו
  chosen: he and his servants
  alternatives:
  - he and his men
  lexicon: HALOT
  rationale: עבדים literally means 'servants.' Although in context these are Abram's
    retainers engaged in battle, the Hebrew term is not the ordinary word for 'men'
    or 'soldiers.' Following the translation philosophy, the bonded/household sense
    should not be erased where the text itself uses 'servants.'
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - defeated them
  - smote them
  - attacked them
  lexicon: HALOT
  rationale: נכה is a broad verb meaning to strike, smite, or defeat. 'Struck them
    down' keeps the concrete force of the Hebrew while fitting the battle context
    better than the archaic 'smote' and more literally than the abstract 'defeated.'
- source_word: וַיִּרְדְּפֵם
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף in narrative commonly means 'pursue.' This is the standard and most
    accurate military-travel sense here.
- source_word: עַד חוֹבָה
  chosen: as far as Hobah
  alternatives:
  - to Hobah
  lexicon: HALOT
  rationale: עד marks extent. 'As far as Hobah' clearly conveys the limit of pursuit.
- source_word: אֲשֶׁר מִשְּׂמֹאל לְדַמָּשֶׂק
  chosen: which is north of Damascus
  alternatives:
  - which is to the left of Damascus
  lexicon: HALOT
  rationale: שׂמאל literally means 'left,' but in geographic orientation it idiomatically
    means 'north.' 'North of Damascus' communicates the intended spatial reference
    in natural English.
