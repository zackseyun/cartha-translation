id: GEN.14.13
reference: Genesis 14:13
source:
  edition: WLC
  text: וַ/יָּבֹא֙ הַ/פָּלִ֔יט וַ/יַּגֵּ֖ד לְ/אַבְרָ֣ם הָ/עִבְרִ֑י וְ/הוּא֩ שֹׁכֵ֨ן
    בְּ/אֵֽלֹנֵ֜י מַמְרֵ֣א הָ/אֱמֹרִ֗י אֲחִ֤י אֶשְׁכֹּל֙ וַ/אֲחִ֣י עָנֵ֔ר וְ/הֵ֖ם
    בַּעֲלֵ֥י בְרִית אַבְרָֽם־׃
translation:
  text: Then a fugitive came and told Abram the Hebrew. Now he was dwelling by the
    oaks of Mamre the Amorite, brother of Eshcol and brother of Aner; these were allies
    of Abram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the terebinths of Mamre.' The Hebrew term can denote large trees,
      often identified as oaks or terebinths.
    reason: lexical_alternative
  - marker: b
    text: Or 'kinsman of Eshcol and kinsman of Aner.' The Hebrew word for 'brother'
      can also refer to a broader family relation.
    reason: lexical_alternative
  - marker: c
    text: Literally 'owners/masters of a covenant' with Abram, that is, men bound
      to him by treaty.
    reason: cultural_note
lexical_decisions:
- source_word: הַפָּלִיט
  chosen: a fugitive
  alternatives:
  - the survivor
  - the escaped one
  lexicon: HALOT
  rationale: The noun denotes one who has escaped from danger or battle. 'Fugitive'
    is concise and idiomatic in context, while 'survivor' is possible but slightly
    less tied to the act of escape.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: The verb means to tell or report. 'Told' fits natural English and preserves
    the straightforward narrative style.
- source_word: הָעִבְרִי
  chosen: the Hebrew
  alternatives:
  - the Eberite
  lexicon: HALOT
  rationale: This is the standard ethnic/social designation for Abram here. 'The Hebrew'
    is the natural English rendering and preserves the label used in the source text.
- source_word: שֹׁכֵן
  chosen: was dwelling
  alternatives:
  - was living
  - dwelt
  lexicon: HALOT
  rationale: The participle indicates Abram's settled residence at that time. 'Was
    dwelling' preserves the durative sense while remaining readable.
- source_word: בְּאֵלֹנֵי מַמְרֵא
  chosen: by the oaks of Mamre
  alternatives:
  - by the terebinths of Mamre
  - among the great trees of Mamre
  lexicon: HALOT
  rationale: אֵלֹנֵי can refer to large trees, often rendered 'oaks' or 'terebinths.'
    'Oaks' is the most familiar English choice; the more botanically specific 'terebinths'
    is worth preserving in a footnote.
- source_word: הָאֱמֹרִי
  chosen: the Amorite
  lexicon: HALOT
  rationale: A standard ethnic designation modifying Mamre. The appositional structure
    is best preserved directly.
- source_word: אֲחִי אֶשְׁכֹּל וַאֲחִי עָנֵר
  chosen: brother of Eshcol and brother of Aner
  alternatives:
  - kinsman of Eshcol and kinsman of Aner
  lexicon: HALOT
  rationale: אָח can mean literal brother or broader kinship relation. The default
    rendering 'brother' best matches the Hebrew form; the broader possibility is preserved
    in a footnote because the exact familial relationship is not specified.
- source_word: בַּעֲלֵי בְרִית
  chosen: allies
  alternatives:
  - lords of a covenant
  - partners in a covenant
  - confederates
  lexicon: HALOT
  rationale: Literally 'masters/possessors of a covenant,' an idiom for those bound
    by treaty or alliance. 'Allies' communicates the covenantal-political relationship
    clearly in modern English without wooden phrasing.
