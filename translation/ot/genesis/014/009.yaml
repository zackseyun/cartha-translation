id: GEN.14.9
reference: Genesis 14:9
source:
  edition: WLC
  text: אֵ֣ת כְּדָרְלָעֹ֜מֶר מֶ֣לֶךְ עֵילָ֗ם וְ/תִדְעָל֙ מֶ֣לֶךְ גּוֹיִ֔ם וְ/אַמְרָפֶל֙
    מֶ֣לֶךְ שִׁנְעָ֔ר וְ/אַרְי֖וֹךְ מֶ֣לֶךְ אֶלָּסָ֑ר אַרְבָּעָ֥ה מְלָכִ֖ים אֶת הַ/חֲמִשָּֽׁה־׃
translation:
  text: Chedorlaomer king of Elam, Tidal king of Goiim, Amraphel king of Shinar, and
    Arioch king of Ellasar—four kings against the five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Tidal king of nations.' The Hebrew גּוֹיִם can be read as the common
      noun 'nations,' but here it is also plausibly a place-name ('Goiim').
    reason: alternative_reading
lexical_decisions:
- source_word: אֵת ... אֶת
  chosen: against
  alternatives:
  - with
  - (direct-object marker left untranslated)
  lexicon: HALOT
  rationale: Although אֵת is ordinarily the direct-object marker, in this battle-list
    construction ('four kings אֶת the five') it functions idiomatically to mark opposition
    in combat. English requires an explicit relational term; 'against' best captures
    the sense in context.
- source_word: כְּדָרְלָעֹמֶר
  chosen: Chedorlaomer
  alternatives:
  - Kedorlaomer
  rationale: Personal name is transliterated rather than translated, following the
    project's policy for names. 'Chedorlaomer' reflects a standard English convention.
- source_word: מֶלֶךְ עֵילָם
  chosen: king of Elam
  lexicon: HALOT
  rationale: Straightforward construct chain; 'king of Elam' is the natural formal
    rendering.
- source_word: תִדְעָל
  chosen: Tidal
  alternatives:
  - Tid'al
  rationale: Personal name transliterated by standard English convention.
- source_word: גּוֹיִם
  chosen: Goiim
  alternatives:
  - nations
  lexicon: HALOT
  rationale: Here גּוֹיִם appears as part of a royal title and is morphologically
    tagged as a proper noun in the supplied text. Rendering it as the place-name 'Goiim'
    preserves the likely toponymic force and avoids overinterpreting it as the common
    noun 'nations' in the main text.
- source_word: אַמְרָפֶל
  chosen: Amraphel
  rationale: Personal name transliterated by standard English convention.
- source_word: שִׁנְעָר
  chosen: Shinar
  alternatives:
  - Babylonia
  lexicon: HALOT
  rationale: The Hebrew proper name is retained as 'Shinar' rather than replaced with
    a historical interpretation such as 'Babylonia.' This preserves the source wording.
- source_word: אַרְיֹוךְ
  chosen: Arioch
  rationale: Personal name transliterated by standard English convention.
- source_word: אֶלָּסָר
  chosen: Ellasar
  lexicon: HALOT
  rationale: Proper place-name transliterated rather than conjecturally identified
    with another region.
- source_word: אַרְבָּעָה מְלָכִים
  chosen: four kings
  lexicon: HALOT
  rationale: Simple numeral + noun phrase; rendered directly.
- source_word: הַחֲמִשָּׁה
  chosen: the five
  alternatives:
  - five kings
  lexicon: HALOT
  rationale: The Hebrew says literally 'the five,' with 'kings' implied from the preceding
    phrase and broader context. English can preserve the terseness naturally as 'the
    five.'
