id: GEN.14.14
reference: Genesis 14:14
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע אַבְרָ֔ם כִּ֥י נִשְׁבָּ֖ה אָחִ֑י/ו וַ/יָּ֨רֶק אֶת חֲנִיכָ֜י/ו
    יְלִידֵ֣י בֵית֗/וֹ שְׁמֹנָ֤ה עָשָׂר֙ וּ/שְׁלֹ֣שׁ מֵא֔וֹת וַ/יִּרְדֹּ֖ף עַד דָּֽן־־׃
translation:
  text: When Abram heard that his brother had been taken captive, he mustered his
    trained men, born in his household, three hundred and eighteen, and pursued them
    as far as Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kinsman'; Hebrew 'his brother' can refer to a close male relative
      such as a nephew.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'mustered' may also be understood as 'led out,' 'drew
      out,' or possibly 'armed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁבָּה
  chosen: had been taken captive
  alternatives:
  - had been captured
  - had been taken prisoner
  lexicon: HALOT
  rationale: The Niphal of שׁבה denotes being taken captive in war. 'Taken captive'
    is clear modern English and preserves the military sense better than the more
    general 'captured'.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: Although Lot is Abram's nephew, Hebrew אָח can denote a broader male
    relative. The text itself says 'his brother,' and this should be preserved in
    the main text rather than interpreted away. The broader kinship sense can be noted
    as an alternative.
- source_word: וַיָּרֶק
  chosen: mustered
  alternatives:
  - led out
  - drew out
  - armed
  lexicon: HALOT
  rationale: This verb is difficult and contextually refers to preparing or deploying
    Abram's men for pursuit. 'Mustered' fits the military context and avoids overcommitting
    to the debated nuance of either 'armed' or 'led out.'
- source_word: חֲנִיכָיו
  chosen: his trained men
  alternatives:
  - his trained servants
  - his retainers
  - his trained ones
  lexicon: HALOT
  rationale: The noun refers to those trained or initiated under Abram's authority.
    'Trained men' is natural English and fits the military setting. 'Servants' is
    possible but less explicit in this immediate context than the following household
    phrase already supplies.
- source_word: יְלִידֵי בֵיתוֹ
  chosen: born in his household
  alternatives:
  - born in his house
  - homeborn
  lexicon: HALOT
  rationale: This phrase identifies them as household-born dependents. 'Born in his
    household' is idiomatic modern English and preserves the social setting without
    archaic wording like 'homeborn'.
- source_word: שְׁמֹנָה עָשָׂר וּשְׁלֹשׁ מֵאוֹת
  chosen: three hundred and eighteen
  alternatives:
  - '318'
  lexicon: HALOT
  rationale: The Hebrew gives the full cardinal number. Spelling it out in English
    matches normal Bible style and preserves the formal narrative tone.
- source_word: וַיִּרְדֹּף
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף in this context is military pursuit. 'Pursued' is the standard and
    suitably formal rendering. The object 'them' is supplied naturally in English
    from the context.
- source_word: עַד דָּן
  chosen: as far as Dan
  alternatives:
  - to Dan
  lexicon: HALOT
  rationale: עַד marks extent. 'As far as Dan' clearly expresses the limit of Abram's
    pursuit.
