id: GEN.14.5
reference: Genesis 14:5
source:
  edition: WLC
  text: וּ/בְ/אַרְבַּע֩ עֶשְׂרֵ֨ה שָׁנָ֜ה בָּ֣א כְדָרְלָעֹ֗מֶר וְ/הַ/מְּלָכִים֙ אֲשֶׁ֣ר
    אִתּ֔/וֹ וַ/יַּכּ֤וּ אֶת רְפָאִים֙ בְּ/עַשְׁתְּרֹ֣ת קַרְנַ֔יִם וְ/אֶת הַ/זּוּזִ֖ים
    בְּ/הָ֑ם וְ/אֵת֙ הָֽ/אֵימִ֔ים בְּ/שָׁוֵ֖ה קִרְיָתָֽיִם־־׃
translation:
  text: In the fourteenth year, Kedorlaomer came, along with the kings who were with
    him, and they defeated the Rephaim at Ashteroth-karnaim, the Zuzim at Ham, and
    the Emim at Shaveh-kiriathaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tradition often spells this name as 'Chedorlaomer' in older English
      versions; 'Kedorlaomer' more directly reflects the Hebrew form.
    reason: lexical_alternative
  - marker: b
    text: The Rephaim are rendered by some as 'giants,' but the Hebrew here is preserved
      as the name of a people group.
    reason: lexical_alternative
  - marker: c
    text: Shaveh-kiriathaim may also be understood as 'the plain of Kiriathaim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/אַרְבַּע עֶשְׂרֵה שָׁנָה
  chosen: In the fourteenth year
  alternatives:
  - And in the fourteenth year
  - In year fourteen
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition and numeral phrase is most
    naturally rendered as a temporal clause. English reads smoothly without preserving
    the initial 'and,' though it remains implicit in the narrative flow.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  - marched
  lexicon: HALOT
  rationale: The Qal of בוא ordinarily means 'come' or 'arrive.' Although the military
    context could suggest 'marched,' the Hebrew verb itself is broader, so 'came'
    best preserves the source without over-interpreting.
- source_word: כְדָרְלָעֹמֶר
  chosen: Kedorlaomer
  alternatives:
  - Chedorlaomer
  rationale: This is a personal name and should be transliterated. 'Kedorlaomer' reflects
    a direct transliteration from the Hebrew consonantal form more transparently than
    the traditional English 'Chedorlaomer.'
- source_word: וְהַמְּלָכִים אֲשֶׁר אִתּוֹ
  chosen: along with the kings who were with him
  alternatives:
  - and the kings who were with him
  - with the kings who were with him
  lexicon: HALOT
  rationale: The phrase identifies Kedorlaomer's allied rulers. 'Along with' makes
    the coordination natural in English while preserving the sense of accompaniment
    expressed by אִתּוֹ.
- source_word: וַיַּכּוּ
  chosen: they defeated
  alternatives:
  - they struck
  - they smote
  lexicon: HALOT
  rationale: נכה literally means 'strike' or 'smite,' but in a military list of peoples
    overcome, 'defeated' communicates the event idiomatically in modern English without
    losing the force of conquest.
- source_word: רְפָאִים
  chosen: Rephaim
  alternatives:
  - the Rephaim
  - giants
  lexicon: HALOT
  rationale: This is an ethnonym/group name and is best transliterated. Rendering
    it as 'giants' would import an interpretive tradition not demanded by the immediate
    syntax. The article is omitted in English because proper ethnonyms commonly appear
    without it.
- source_word: בְּעַשְׁתְּרֹת קַרְנַיִם
  chosen: at Ashteroth-karnaim
  alternatives:
  - in Ashteroth-karnaim
  - at Ashtaroth Karnaim
  lexicon: HALOT
  rationale: The preposition marks location. 'At' fits a battle-site context. The
    place name is transliterated and hyphenated for readability as a compound toponym.
- source_word: הַזּוּזִים
  chosen: the Zuzim
  alternatives:
  - Zuzim
  lexicon: HALOT
  rationale: This is another people-group name. The Hebrew article is retained here
    because English can naturally say 'the Zuzim' in a list of peoples.
- source_word: בְּהָם
  chosen: at Ham
  alternatives:
  - in Ham
  lexicon: HALOT
  rationale: Likely a place name; transliteration is preferable. 'At' suits the military-geographical
    listing.
- source_word: הָאֵימִים
  chosen: the Emim
  alternatives:
  - Emim
  lexicon: HALOT
  rationale: Another ethnonym. The article is retained as in the previous item for
    consistency within the list of peoples.
- source_word: בְּשָׁוֵה קִרְיָתָיִם
  chosen: at Shaveh-kiriathaim
  alternatives:
  - in the plain of Kiriathaim
  - at Shaveh Kiriathaim
  lexicon: HALOT
  rationale: The phrase is best taken as a place name in apposition/compound form
    here, matching the pattern of named locations in the verse. Transliteration avoids
    overcommitting to the lexical sense of שָׁוֵה ('plain') when functioning as part
    of a toponym.
