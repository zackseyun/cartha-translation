id: GEN.14.10
reference: Genesis 14:10
source:
  edition: WLC
  text: וְ/עֵ֣מֶק הַ/שִׂדִּ֗ים בֶּֽאֱרֹ֤ת בֶּאֱרֹת֙ חֵמָ֔ר וַ/יָּנֻ֛סוּ מֶֽלֶךְ סְדֹ֥ם
    וַ/עֲמֹרָ֖ה וַ/יִּפְּלוּ שָׁ֑מָּ/ה וְ/הַ/נִּשְׁאָרִ֖ים הֶ֥רָ/ה נָּֽסוּ־־׃
translation:
  text: Now the Valley of Siddim was full of bitumen pits, and the kings of Sodom
    and Gomorrah fled and fell there, while the rest fled to the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tar pits' or 'asphalt pits'; the Hebrew refers to pits of bitumen.
    reason: lexical_alternative
  - marker: b
    text: That is, they fell there in the Valley of Siddim, likely into the bitumen
      pits.
    reason: lexical_alternative
  - marker: c
    text: Or 'to the mountains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵמֶק הַשִּׂדִּים
  chosen: the Valley of Siddim
  alternatives:
  - the valley of Siddim
  lexicon: HALOT
  rationale: 'Proper place name construction: עֵמֶק means ''valley,'' and הַשִּׂדִּים
    identifies the specific valley. Capitalized as a toponym in English.'
- source_word: בֶּאֱרֹת בֶּאֱרֹת חֵמָר
  chosen: was full of bitumen pits
  alternatives:
  - was full of tar pits
  - was full of asphalt pits
  - had pits, pits of bitumen
  lexicon: HALOT
  rationale: The repeated noun בֶּאֱרֹת intensifies/pluralizes the presence of pits;
    idiomatic English renders this as 'full of ... pits.' חֵמָר denotes bitumen/asphalt/tar-like
    material. 'Bitumen' is the most precise modern term, while still readable.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: Standard rendering of נוס in narrative context; concise and natural.
- source_word: מֶלֶךְ סְדֹם וַעֲמֹרָה
  chosen: the kings of Sodom and Gomorrah
  alternatives:
  - the king of Sodom and Gomorrah
  lexicon: HALOT
  rationale: Although מֶלֶךְ appears singular in form, the coordinated city names
    and plural verbs indicate a collective sense, best rendered 'the kings of Sodom
    and Gomorrah.' This matches the narrative context, where each city has its own
    king.
- source_word: וַיִּפְּלוּ שָׁמָּה
  chosen: fell there
  alternatives:
  - fell into them there
  - were defeated there
  lexicon: HALOT
  rationale: The verb נפל normally means 'fall.' In context of pits, it likely means
    they fell into them, but the object is not explicit in Hebrew. 'Fell there' preserves
    the wording without over-specifying.
- source_word: וְהַנִּשְׁאָרִים
  chosen: the rest
  alternatives:
  - the survivors
  - those who remained
  lexicon: HALOT
  rationale: Refers to those remaining after the others fell. 'The rest' is natural
    English and contextually sufficient.
- source_word: הֶרָה
  chosen: to the hill country
  alternatives:
  - to the mountains
  - mountainward
  lexicon: HALOT
  rationale: From הַר ('mountain/hill country') with directional ending. 'To the hill
    country' is idiomatic and geographically natural; 'to the mountains' is also possible.
- source_word: נָסוּ
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: HALOT
  rationale: Same root as earlier verb; consistent rendering is appropriate here.
