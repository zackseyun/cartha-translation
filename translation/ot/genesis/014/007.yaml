id: GEN.14.7
reference: Genesis 14:7
source:
  edition: WLC
  text: וַ֠/יָּשֻׁבוּ וַ/יָּבֹ֜אוּ אֶל עֵ֤ין מִשְׁפָּט֙ הִ֣וא קָדֵ֔שׁ וַ/יַּכּ֕וּ
    אֶֽת כָּל שְׂדֵ֖ה הָ/עֲמָלֵקִ֑י וְ/גַם֙ אֶת הָ֣/אֱמֹרִ֔י הַ/יֹּשֵׁ֖ב בְּ/חַֽצְצֹ֥ן
    תָּמָֽר־־־־׃
translation:
  text: Then they turned back and came to En-mishpat (that is, Kadesh), and struck
    all the territory of the Amalekites, and also the Amorites who were living in
    Hazazon-tamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-mishpat means 'spring of judgment.'
    reason: cultural_note
  - marker: b
    text: Or 'all the field/country of the Amalekites.' The Hebrew literally reads
      'all the field of the Amalekite,' likely meaning the region occupied by the
      Amalekites.
    reason: lexical_alternative
  - marker: c
    text: Hazazon-tamar is identified with En-gedi in 2 Chronicles 20:2.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: Then they turned back
  alternatives:
  - And they returned
  - Then they returned
  lexicon: HALOT
  rationale: Wayyiqtol narrative form from שוב indicates sequential action. 'Turned
    back' captures the directional sense in context; 'then' reflects the narrative
    progression.
- source_word: וַיָּבֹאוּ
  chosen: and came to
  alternatives:
  - and went to
  - and arrived at
  lexicon: HALOT
  rationale: Common motion verb בוא with אֶל is naturally rendered 'came to' in English
    narrative. It follows the prior reversal of direction.
- source_word: עֵין מִשְׁפָּט
  chosen: En-mishpat
  alternatives:
  - Spring of Judgment
  - Ain-mishpat
  lexicon: HALOT
  rationale: This is a place name, and the translation philosophy prefers transliterating
    names rather than translating them. The meaning 'spring/fountain of judgment'
    is not carried into the main text because the phrase functions as a toponym.
- source_word: הִוא קָדֵשׁ
  chosen: (that is, Kadesh)
  alternatives:
  - which is Kadesh
  - it is Kadesh
  lexicon: HALOT
  rationale: The pronoun plus proper noun identifies En-mishpat with Kadesh. Parenthetical
    'that is' gives clear modern English while preserving the appositional explanatory
    force.
- source_word: וַיַּכּוּ
  chosen: and struck
  alternatives:
  - and defeated
  - and attacked
  lexicon: HALOT
  rationale: נכה broadly means to strike/smite/defeat. 'Struck' is closer to the Hebrew
    and avoids overstating the result as total conquest where the text only states
    the blow inflicted.
- source_word: כָּל שְׂדֵה הָעֲמָלֵקִי
  chosen: all the territory of the Amalekites
  alternatives:
  - all the field of the Amalekites
  - all the country of the Amalekites
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but in this construction with כָּל and
    an ethnonym it likely denotes the land/region occupied by that people. 'Territory'
    gives idiomatic English while preserving geographic reference. The ethnonym is
    pluralized in English because it refers to the people group.
- source_word: הָעֲמָלֵקִי
  chosen: the Amalekites
  alternatives:
  - the Amalekite
  lexicon: HALOT
  rationale: Though morphologically singular as a gentilic, English normally renders
    such collective ethnic references in the plural when referring to the people as
    a group.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and
  lexicon: HALOT
  rationale: The conjunction plus adverb adds an additional object of attack. 'And
    also' preserves the additive emphasis.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: As with 'Amalekites,' the gentilic is best rendered as a collective plural
    in English.
- source_word: הַיֹּשֵׁב
  chosen: who were living
  alternatives:
  - who dwelt
  - who lived
  - inhabiting
  lexicon: HALOT
  rationale: The participle describes the Amorites as inhabitants of the named location.
    'Who were living' is readable modern English and reflects ongoing residence.
- source_word: בְּחַצְצֹן תָּמָר
  chosen: in Hazazon-tamar
  alternatives:
  - at Hazazon-tamar
  lexicon: HALOT
  rationale: Proper place name is transliterated. 'In' works naturally with κατοικέω-like
    residence language in English and matches the Hebrew preposition בְּ.
