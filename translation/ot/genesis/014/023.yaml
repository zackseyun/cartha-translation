theological_decisions:
- issue: Elliptical oath formulation
  chosen_reading: 'Render the verse as a sworn refusal: ''that I would not take...,''
    tied to Abram''s oath in the previous verse.'
  alternative_readings:
  - 'Translate woodenly as a conditional: ''if from a thread ... and if I take ...'''
  rationale: The Hebrew uses an elliptical אם-oath formula. In context Abram is swearing
    that he will take nothing from the king of Sodom, and the English should make
    the oath sense explicit enough to be understood without distorting the content.
  doctrine_reference: Translation philosophy §1, §6
