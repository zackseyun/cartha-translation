id: GEN.14.23
reference: Genesis 14:23
source:
  edition: WLC
  text: אִם מִ/חוּט֙ וְ/עַ֣ד שְׂרֽוֹךְ נַ֔עַל וְ/אִם אֶקַּ֖ח מִ/כָּל אֲשֶׁר לָ֑/ךְ
    וְ/לֹ֣א תֹאמַ֔ר אֲנִ֖י הֶעֱשַׁ֥רְתִּי אֶת אַבְרָֽם־־־־־־׃
translation:
  text: that I would not take from a thread to a sandal strap, or anything that is
    yours, so that you may not say, ‘I have made Abram rich.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses an elliptical oath formula: literally, ''if from a thread and
      up to a sandal strap, and if I take anything that is yours...'' The sense is
      a sworn refusal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם ... וְאִם
  chosen: that I would not ... or
  alternatives:
  - if ... and if
  - whether ... or
  lexicon: HALOT
  rationale: 'In oath context following Abram''s lifted hand to the LORD (v. 22),
    אִם introduces an elliptical oath of refusal rather than a simple conditional.
    English supplies the implied negation naturally: ''that I would not take ... or
    ...'' rather than a wooden ''if from a thread ... and if I take.'''
- source_word: מִחוּט
  chosen: from a thread
  alternatives:
  - even a thread
  - so much as a thread
  lexicon: HALOT
  rationale: חוּט denotes a thread/string. Retaining 'thread' preserves the concrete
    minimal-item expression in the Hebrew idiom.
- source_word: וְעַד שְׂרֹוךְ נַעַל
  chosen: to a sandal strap
  alternatives:
  - to a sandal thong
  - to a shoelace
  lexicon: HALOT
  rationale: 'The phrase marks the range from the smallest item upward: ''from a thread
    to a sandal strap.'' ''Sandal strap'' is clear modern English and fits the ancient
    footwear better than ''shoelace.'''
- source_word: אֶקַּח
  chosen: I would take
  alternatives:
  - I take
  - I will take
  lexicon: HALOT
  rationale: Because the clause is governed by the oath formula, English idiom prefers
    a modal sense ('would take') to express sworn refusal.
- source_word: מִכָּל אֲשֶׁר לָךְ
  chosen: anything that is yours
  alternatives:
  - anything from all that is yours
  - anything belonging to you
  lexicon: HALOT
  rationale: This renders the possessive force naturally in English while preserving
    the comprehensive sense of כָּל.
- source_word: וְלֹא תֹאמַר
  chosen: so that you may not say
  alternatives:
  - lest you say
  - and you will not say
  lexicon: HALOT
  rationale: The clause gives Abram's purpose/result in refusing the goods. 'So that
    you may not say' is readable modern English; 'lest you say' is possible but more
    archaic.
- source_word: הֶעֱשַׁרְתִּי
  chosen: I have made ... rich
  alternatives:
  - I enriched
  - I made wealthy
  lexicon: HALOT
  rationale: The Hiphil of עשר means to make rich/enrich. 'I have made Abram rich'
    is idiomatic and preserves the king of Sodom's potential boast.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
