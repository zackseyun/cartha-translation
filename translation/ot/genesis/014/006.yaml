id: GEN.14.6
reference: Genesis 14:6
source:
  edition: WLC
  text: וְ/אֶת הַ/חֹרִ֖י בְּ/הַרְרָ֣/ם שֵׂעִ֑יר עַ֚ד אֵ֣יל פָּארָ֔ן אֲשֶׁ֖ר עַל הַ/מִּדְבָּֽר־־׃
translation:
  text: and the Horites in their hill country of Seir, as far as El-paran, which is
    by the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'El Paran'; possibly 'the oak/terebinth of Paran' if the name is understood
      etymologically rather than as a fixed place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and ...
  alternatives:
  - and also
  - and [they struck]
  lexicon: HALOT
  rationale: The conjunction with object marker continues the series of peoples defeated
    from the previous verse. English does not normally render the object marker directly,
    so the sense is carried by 'and' with the implied verb supplied from context.
- source_word: הַחֹרִי
  chosen: the Horites
  alternatives:
  - the Horite people
  lexicon: HALOT
  rationale: A gentilic/plural collective referring to the inhabitants known as Horites.
    'Horites' is the standard transliterated people-name and fits the narrative style.
- source_word: בְּהַרְרָם
  chosen: in their hill country
  alternatives:
  - in their mountains
  - in the mountains belonging to them
  lexicon: HALOT
  rationale: The plural of 'mountain' with 3mp suffix can be rendered literally as
    'their mountains,' but idiomatic English prefers 'their hill country' for a mountainous
    region inhabited by a people.
- source_word: שֵׂעִיר
  chosen: of Seir
  alternatives:
  - in Seir
  lexicon: HALOT
  rationale: Seir is a proper place name. In English, 'their hill country of Seir'
    best reflects the appositional/genitival relationship of the Hebrew phrase.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: Marks the extent of the campaign. 'As far as' clearly conveys geographic
    limit in natural English.
- source_word: אֵיל פָּארָן
  chosen: El-paran
  alternatives:
  - El Paran
  - the oak of Paran
  - terebinth of Paran
  lexicon: HALOT
  rationale: The phrase is a place name. Because אֵיל can denote a large tree or may
    function as part of a toponym, transliterating the compound as 'El-paran' avoids
    over-interpreting the etymology in the main text while preserving readability.
- source_word: אֲשֶׁר עַל הַמִּדְבָּר
  chosen: which is by the wilderness
  alternatives:
  - which is beside the wilderness
  - which is on the edge of the wilderness
  - which is in the direction of the wilderness
  lexicon: HALOT
  rationale: The relative clause locates El-paran geographically. 'By the wilderness'
    is concise and natural, while preserving the broad spatial sense of עַל in this
    context.
