id: GEN.14.21
reference: Genesis 14:21
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֶֽלֶךְ סְדֹ֖ם אֶל אַבְרָ֑ם תֶּן לִ֣/י הַ/נֶּ֔פֶשׁ וְ/הָ/רְכֻ֖שׁ
    קַֽח לָֽ/ךְ־־־־׃
translation:
  text: Then the king of Sodom said to Abram, “Give me the people, and take the possessions
    for yourself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the soul' (singular), used here collectively for the people/persons
      recovered.
    reason: lexical_alternative
  - marker: b
    text: Or 'the goods' or 'the property' for 'the possessions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and said' is more formally
    literal but less idiomatic here.
- source_word: מֶלֶךְ סְדֹם
  chosen: the king of Sodom
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Sodom' is transliterated
    as a place name per translation philosophy.
- source_word: אֶל אַבְרָם
  chosen: to Abram
  alternatives:
  - to Avram
  lexicon: HALOT
  rationale: Standard English transliteration is 'Abram.' The preposition אֶל is naturally
    rendered 'to.'
- source_word: תֶּן לִי
  chosen: Give me
  alternatives:
  - Give to me
  lexicon: HALOT
  rationale: Imperative plus pronominal suffix is best rendered idiomatically in English
    as 'Give me.'
- source_word: הַנֶּפֶשׁ
  chosen: the people
  alternatives:
  - the persons
  - the souls
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul/self/life/person,' but in this context of
    recovering captives and goods it refers collectively to the persons/captives.
    'The people' is natural English and fits the distributive collective sense better
    than the overly literal 'the soul' or the awkward 'the persons.'
- source_word: וְהָרְכֻשׁ
  chosen: and ... the possessions
  alternatives:
  - and ... the goods
  - and ... the property
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property, goods, or possessions. 'Possessions'
    is broad and natural, fitting the contrast with the recovered people. The conjunction
    is retained.
- source_word: קַח לָךְ
  chosen: take ... for yourself
  alternatives:
  - take for yourself
  - take them for yourself
  - take for yourself the possessions
  lexicon: HALOT
  rationale: The imperative plus לָךְ expresses personal benefit or possession. 'For
    yourself' brings out the dative nuance. 'Them' is not explicit in Hebrew, so the
    English keeps the object as 'the possessions' rather than adding a pronoun.
