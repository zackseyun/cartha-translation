id: GEN.26.8
reference: Genesis 26:8
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ֣י אָֽרְכוּ ל֥/וֹ שָׁם֙ הַ/יָּמִ֔ים וַ/יַּשְׁקֵ֗ף אֲבִימֶ֨לֶךְ֙
    מֶ֣לֶךְ פְּלִשְׁתִּ֔ים בְּעַ֖ד הַֽ/חַלּ֑וֹן וַ/יַּ֗רְא וְ/הִנֵּ֤ה יִצְחָק֙ מְצַחֵ֔ק
    אֵ֖ת רִבְקָ֥ה אִשְׁתּֽ/וֹ־׃
translation:
  text: And it happened, when he had been there a long time, that Abimelech king of
    the Philistines looked out through the window and saw, and behold, Isaac was caressing
    Rebekah his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was sporting with,' 'was laughing with,' or 'was fondling.' The Hebrew
      verb is related to Isaac's name and can denote playful or intimate behavior;
      here it implies conduct that revealed Rebekah was his wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new development in the story. 'And
    it happened' preserves the Hebrew discourse function in readable modern English
    without archaic phrasing.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - after
  lexicon: HALOT
  rationale: Here כִּי introduces the temporal circumstance for the main clause, best
    rendered 'when' in English.
- source_word: אָרְכוּ לוֹ שָׁם הַיָּמִים
  chosen: he had been there a long time
  alternatives:
  - the days were prolonged for him there
  - his days there became many
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning an extended stay. A more literal
    rendering would sound unnatural in English; this wording preserves the sense with
    optimal equivalence.
- source_word: וַיַּשְׁקֵף
  chosen: looked out
  alternatives:
  - looked down
  - gazed out
  lexicon: HALOT
  rationale: The verb denotes looking out from a vantage point. 'Looked out' fits
    the following phrase 'through the window' naturally.
- source_word: בְּעַד הַחַלּוֹן
  chosen: through the window
  alternatives:
  - out of the window
  - through the lattice
  lexicon: HALOT
  rationale: בְּעַד with 'window' conveys looking through/out of it. 'Through the
    window' is the most natural modern English rendering. 'Lattice' is possible in
    some contexts but not demanded by חַלּוֹן here.
- source_word: וַיַּרְא וְהִנֵּה
  chosen: and saw, and behold
  alternatives:
  - and saw—behold
  - and saw, and there was
  lexicon: HALOT
  rationale: Retains the vividness of the Hebrew narrative sequence. 'Behold' is kept
    because הִנֵּה marks sudden realization important to the scene.
- source_word: מְצַחֵק
  chosen: was caressing
  alternatives:
  - was laughing with
  - was sporting with
  - was fondling
  lexicon: HALOT
  rationale: The participle from צחק can denote playful or intimate behavior. In this
    context Abimelech infers marital intimacy, so 'was caressing' communicates affectionate
    conduct sufficient to reveal that Rebekah is Isaac's wife, without overstating
    the text.
- source_word: אֵת רִבְקָה אִשְׁתּוֹ
  chosen: Rebekah his wife
  alternatives:
  - with Rebekah his wife
  lexicon: HALOT
  rationale: Direct-object marker plus apposition. English naturally renders the object
    followed by the identifying apposition 'his wife.'
