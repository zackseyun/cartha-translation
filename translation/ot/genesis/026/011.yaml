id: GEN.26.11
reference: Genesis 26:11
source:
  edition: WLC
  text: וַ/יְצַ֣ו אֲבִימֶ֔לֶךְ אֶת כָּל הָ/עָ֖ם לֵ/אמֹ֑ר הַ/נֹּגֵ֜עַ בָּ/אִ֥ישׁ הַ/זֶּ֛ה
    וּ/בְ/אִשְׁתּ֖/וֹ מ֥וֹת יוּמָֽת־־׃
translation:
  text: Then Abimelech commanded all the people, saying, “Whoever touches this man
    or his wife shall surely be put to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the one who touches this man or his wife.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - charged
  lexicon: HALOT
  rationale: The piel of צוה denotes issuing an authoritative command. 'Commanded'
    is clear modern English and preserves the force better than the softer 'told'.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  - all the nation
  lexicon: HALOT
  rationale: עם here refers to the people under Abimelech's authority generally, not
    necessarily an ethnic 'nation.' 'All the people' is natural and sufficiently comprehensive.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the content
    of the command.
- source_word: הַנֹּגֵעַ
  chosen: whoever touches
  alternatives:
  - the one who touches
  - whoever lays a hand on
  lexicon: HALOT
  rationale: 'The participle with article functions generically: ''the one who touches
    / whoever touches.'' ''Touches'' is the plain lexical sense of נגע; ''lays a hand
    on'' is interpretive and stronger than the Hebrew warrants.'
- source_word: בָּאִישׁ הַזֶּה
  chosen: this man
  alternatives:
  - the man here
  - this האיש
  lexicon: HALOT
  rationale: The preposition ב with נגע commonly marks the object touched. In idiomatic
    English the preposition is not repeated after 'touches,' so 'this man' best conveys
    the sense.
- source_word: וּבְאִשְׁתּוֹ
  chosen: or his wife
  alternatives:
  - or his woman
  - or his spouse
  lexicon: HALOT
  rationale: The conjunction joins a second protected person. English idiom prefers
    'touches this man or his wife' rather than repeating the preposition. 'Wife' is
    the correct contextual sense of אשה with pronominal suffix here.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must certainly be executed
  - shall surely die
  lexicon: HALOT
  rationale: The infinitive absolute plus passive/imperfect intensifies the penalty.
    Because יוּמָת is passive/hophal, 'be put to death' is more precise than simply
    'die,' making explicit that this is a judicial death sentence.
