id: GEN.26.6
reference: Genesis 26:6
source:
  edition: WLC
  text: וַ/יֵּ֥שֶׁב יִצְחָ֖ק בִּ/גְרָֽר׃
translation:
  text: So Isaac stayed in Gerar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - lived
  - dwelt
  - settled
  - remained
  lexicon: HALOT
  rationale: From ישׁב in the waw-consecutive imperfect, narrating a past action.
    In this context the sense is that Isaac remained/resided there following the preceding
    instruction. 'Stayed' is natural modern English and preserves the simple narrative
    force without sounding archaic like 'dwelt' or overly permanent like 'settled'.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בִּגְרָר
  chosen: in Gerar
  alternatives:
  - at Gerar
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Gerar' is the most straightforward
    locative rendering in English for the place name Gerar.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  - ''
  rationale: The prefixed waw here advances the narrative. Rendering it as 'So' captures
    the consequential flow from the previous verse in readable modern English. 'And'
    would also be possible, but 'So' better reflects the immediate response to God's
    command.
