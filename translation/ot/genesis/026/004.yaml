theological_decisions:
- issue: Meaning of the blessing formula וְהִתְבָּרֲכוּ בְזַרְעֲךָ
  chosen_reading: all the nations of the earth will be blessed in your offspring
  alternative_readings:
  - all the nations of the earth will bless themselves by your offspring
  rationale: The promise echoes the Abrahamic covenant formula and is traditionally
    understood as a divine blessing mediated in relation to Abraham's line. Because
    the stem can also be taken reflexively, the alternative is preserved in a footnote
    rather than excluded. This follows the instruction to preserve theological tension
    where the source permits more than one viable reading.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
