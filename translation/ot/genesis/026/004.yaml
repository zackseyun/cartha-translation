id: GEN.26.4
reference: Genesis 26:4
source:
  edition: WLC
  text: וְ/הִרְבֵּיתִ֤י אֶֽת זַרְעֲ/ךָ֙ כְּ/כוֹכְבֵ֣י הַ/שָּׁמַ֔יִם וְ/נָתַתִּ֣י לְ/זַרְעֲ/ךָ֔
    אֵ֥ת כָּל הָ/אֲרָצֹ֖ת הָ/אֵ֑ל וְ/הִתְבָּרֲכ֣וּ בְ/זַרְעֲ/ךָ֔ כֹּ֖ל גּוֹיֵ֥י הָ/אָֽרֶץ־־׃
translation:
  text: And I will multiply your offspring like the stars of the heavens, and I will
    give to your offspring all these lands, and in your offspring all the nations
    of the earth will be blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the nations of the earth will bless themselves by your offspring.'
      The Hebrew verb can be understood reflexively, though the passive sense fits
      the covenant promise context well.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  chosen: And I will multiply
  alternatives:
  - And I will make numerous
  - And I will increase
  lexicon: HALOT
  rationale: Hiphil of רבה expresses causative increase in number. 'Multiply' is idiomatic
    in covenant-promise contexts and preserves the direct divine action.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can be collective singular, referring either to seed or descendants.
    'Offspring' preserves the collective sense without sounding archaic like 'seed'
    or overly pluralized like 'descendants.'
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: like the stars of the heavens
  alternatives:
  - as the stars of heaven
  - like the stars in the sky
  lexicon: HALOT
  rationale: The simile is explicit with כ. 'The heavens' is closer to the Hebrew
    plural form and fits the elevated covenantal style better than the flatter 'sky.'
- source_word: וְנָתַתִּי
  chosen: and I will give
  alternatives:
  - and I will grant
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' 'Grant' is possible but less direct;
    'give' best preserves the plain covenantal promise.
- source_word: לְזַרְעֲךָ
  chosen: to your offspring
  alternatives:
  - to your seed
  - to your descendants
  lexicon: HALOT
  rationale: Repeated use of זֶרַע should be rendered consistently in the verse unless
    context demands otherwise. 'To your offspring' maintains that consistency.
- source_word: כָּל הָאֲרָצֹת הָאֵל
  chosen: all these lands
  alternatives:
  - all these countries
  - all these territories
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural of 'land/earth.' In this context of territorial promise,
    'lands' is more natural and precise than 'earth' and less politically loaded than
    'countries.' הָאֵל is deictic, hence 'these.'
- source_word: וְהִתְבָּרֲכוּ
  chosen: will be blessed
  alternatives:
  - will bless themselves
  - will find blessing
  lexicon: HALOT
  rationale: The Hitpael/Niphal-like form in patriarchal blessing formulas is debated,
    but the passive sense 'will be blessed' is the standard and most contextually
    coherent rendering in the Abrahamic promise tradition. The reflexive alternative
    is worth preserving in a footnote because the Hebrew stem can be understood that
    way.
- source_word: בְזַרְעֲךָ
  chosen: in your offspring
  alternatives:
  - by your offspring
  - through your offspring
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in,' and this preserves the Hebrew
    wording while allowing the covenantal/instrumental nuance to remain implicit.
    'Through' is interpretive and possible, but 'in' better preserves the theological
    tension.
- source_word: כֹּל גּוֹיֵי הָאָרֶץ
  chosen: all the nations of the earth
  alternatives:
  - all the peoples of the earth
  lexicon: HALOT
  rationale: גּוֹיִם normally denotes nations/peoples in a collective ethnic-political
    sense. 'Nations' is the most standard and contextually fitting rendering here.
