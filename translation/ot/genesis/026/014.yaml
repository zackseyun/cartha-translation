id: GEN.26.14
reference: Genesis 26:14
source:
  edition: WLC
  text: וַֽ/יְהִי ל֤/וֹ מִקְנֵה צֹאן֙ וּ/מִקְנֵ֣ה בָקָ֔ר וַ/עֲבֻדָּ֖ה רַבָּ֑ה וַ/יְקַנְא֥וּ
    אֹת֖/וֹ פְּלִשְׁתִּֽים־־׃
translation:
  text: He had flocks, herds, and many servants, and the Philistines envied him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were jealous of him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and abundant service/labor'; the phrase likely refers to a large
      body of servants or workers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  chosen: He had
  alternatives:
  - And there was to him
  - And he came to have
  lexicon: HALOT
  rationale: The Hebrew existential construction with היה + ל expresses possession
    idiomatically. In English, 'He had' is the natural equivalent.
- source_word: מִקְנֵה צֹאן
  chosen: flocks
  alternatives:
  - livestock of sheep
  - sheep
  lexicon: HALOT
  rationale: מִקְנֶה denotes acquired livestock/property, and with צֹאן specifies
    small livestock, especially sheep/goats. 'Flocks' is concise and idiomatic.
- source_word: וּמִקְנֵה בָקָר
  chosen: herds
  alternatives:
  - livestock of cattle
  - cattle
  lexicon: HALOT
  rationale: With בָקָר, the phrase refers to bovine livestock. 'Herds' pairs naturally
    with 'flocks' and reflects collective animal holdings.
- source_word: וַעֲבֻדָּה רַבָּה
  chosen: many servants
  alternatives:
  - a large household
  - much service
  - many laborers
  lexicon: HALOT
  rationale: עֲבֻדָּה can denote service, labor, or a body of servants/retainers in
    context. Here, alongside livestock holdings, it most likely refers to a substantial
    labor force or household staff. 'Many servants' communicates the concrete social-economic
    sense better than the abstract 'much service.'
- source_word: וַיְקַנְאוּ אֹתוֹ
  chosen: envied him
  alternatives:
  - were jealous of him
  lexicon: HALOT
  rationale: קנא in this stem here expresses envy/jealousy directed toward Isaac because
    of his prosperity. 'Envied him' is the most natural English rendering in this
    context.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English transliteration for the people group פלשתים.
