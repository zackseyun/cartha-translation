  from: and have sent you away in peace
  to: and sent you away in peace
  rationale: 'The Hebrew verbs ''עָשִׂינוּ'' (we did/have done) and ''וַנְּשַׁלֵּחֲךָ'' (and we sent) form a tight sequence. In English, this is most naturally rendered as a compound predicate governed by a single auxiliary verb: ''we have done... and sent...''. Repeating ''have'' is grammatically correct but slightly clunky and less fluid than the Hebrew construction it represents. Removing the second ''have'' creates a smoother, more idiomatic English sentence.'
