id: GEN.26.29
reference: Genesis 26:29
source:
  edition: WLC
  text: אִם תַּעֲשֵׂ֨ה עִמָּ֜/נוּ רָעָ֗ה כַּ/אֲשֶׁר֙ לֹ֣א נְגַֽעֲנ֔וּ/ךָ וְ/כַ/אֲשֶׁ֨ר עָשִׂ֤ינוּ עִמְּ/ךָ֙ רַק ט֔וֹב וַ/נְּשַׁלֵּֽחֲ/ךָ֖ בְּ/שָׁל֑וֹם אַתָּ֥ה עַתָּ֖ה בְּר֥וּךְ יְהוָֽה־־׃
translation:
  text: that you will do us no harm, just as we have not touched you and just as we have done to you only good and sent you away in peace. You are now blessed by Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if you do us harm.' The Hebrew אִם can be read more literally as 'if,' but here it likely introduces the content of the oath they are requesting from Isaac.
    reason: lexical_alternative
  - marker: b
    text: '''Touched'' may also carry the sense ''harmed'' in this context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and have sent you away in peace'.
    reason: previous_rendering
lexical_decisions:
- source_word: אִם
  chosen: that
  alternatives:
  - if
  lexicon: HALOT
  rationale: In context this follows an implied oath/covenant request from the previous verse ('that you will not...'), so אִם functions idiomatically to introduce the content of the oath rather than a simple conditional. Rendering 'that' gives the natural English sense without obscuring the Hebrew idiom.
- source_word: תַּעֲשֵׂה עִמָּנוּ רָעָה
  chosen: you will do us no harm
  alternatives:
  - you will do us no evil
  - you will do us no wrong
  lexicon: HALOT
  rationale: עָשָׂה with רָעָה means 'do harm/evil.' 'No harm' is idiomatic modern English and fits the covenantal/nonaggression context better than the more abstract 'evil.'
- source_word: נְגַעֲנוּךָ
  chosen: we have not touched you
  alternatives:
  - we have not harmed you
  - we have not struck you
  lexicon: HALOT
  rationale: נגע literally means 'touch,' but can imply harmful contact. The main text keeps the concrete verb 'touched' because it is the plain lexical sense and preserves the rhetorical parallel; the harmful nuance is already supplied by the larger context.
- source_word: עָשִׂינוּ עִמְּךָ רַק טוֹב
  chosen: we have done to you only good
  alternatives:
  - we have treated you only well
  - we have done only good to you
  lexicon: HALOT
  rationale: רַק טוֹב is emphatic ('only good'). The chosen wording preserves the Hebrew emphasis and straightforward syntax.
- source_word: וַנְּשַׁלֵּחֲךָ בְּשָׁלוֹם
  chosen: and have sent you away in peace
  alternatives:
  - and sent you away in peace
  - and let you go in peace
  lexicon: HALOT
  rationale: The waw-consecutive continues their retrospective claim about past actions. 'Sent you away in peace' is a standard idiomatic rendering of the Hebrew and preserves the formal tone.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes peaceful relations and safe departure. 'In peace' preserves the covenantal and relational resonance better than a flattened adverb.
- source_word: בְּרוּךְ יְהוָה
  chosen: blessed by the LORD
  alternatives:
  - the blessed of the LORD
  - blessed of the LORD
  lexicon: HALOT
  rationale: בָּרוּךְ as a passive participle is naturally rendered 'blessed.' The prepositional sense is implicit in English as 'by the LORD.' Per doctrine, יְהוָה is rendered 'the LORD.'
