id: GEN.26.21
reference: Genesis 26:21
source:
  edition: WLC
  text: וַֽ/יַּחְפְּרוּ֙ בְּאֵ֣ר אַחֶ֔רֶת וַ/יָּרִ֖יבוּ גַּם עָלֶ֑י/הָ וַ/יִּקְרָ֥א
    שְׁמָ֖/הּ שִׂטְנָֽה־׃
translation:
  text: Then they dug another well, and they also quarreled over it, so he called
    its name Sitnah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sitnah sounds like a Hebrew term associated with hostility or opposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְפְּרוּ
  chosen: they dug
  alternatives:
  - they excavated
  lexicon: HALOT
  rationale: Qal wayyiqtol plural of חפר, the ordinary verb for digging. 'They dug'
    is the natural English equivalent and fits the narrative sequence.
- source_word: בְּאֵר אַחֶרֶת
  chosen: another well
  alternatives:
  - a different well
  lexicon: HALOT
  rationale: בְּאֵר means 'well'; אַחֶרֶת modifies it as 'another' or 'other.' 'Another
    well' is idiomatic and preserves the sense of a subsequent well distinct from
    the previous one.
- source_word: וַיָּרִיבוּ גַּם עָלֶיהָ
  chosen: they also quarreled over it
  alternatives:
  - they also contended over it
  - they disputed over it
  lexicon: HALOT
  rationale: ריב in this stem commonly denotes contending or quarreling. 'Quarreled'
    is readable modern English and conveys interpersonal conflict. גַּם is represented
    by 'also,' and עַל with the pronoun is naturally rendered 'over it' in this context.
- source_word: וַיִּקְרָא שְׁמָהּ
  chosen: he called its name
  alternatives:
  - he named it
  lexicon: HALOT
  rationale: Literally 'he called its name.' This formula is common in Hebrew naming
    scenes. Retaining 'called its name' preserves the naming formula more transparently
    than the smoother but less formal 'named it.'
- source_word: שִׂטְנָה
  chosen: Sitnah
  alternatives:
  - Hostility
  - Accusation
  lexicon: HALOT
  rationale: As the given name of the well, it should be transliterated per project
    policy on names. The noun is related to hostility/opposition, which explains the
    naming, but the main text should preserve the proper name.
