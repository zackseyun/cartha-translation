id: GEN.26.32
reference: Genesis 26:32
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/ה֗וּא וַ/יָּבֹ֨אוּ֙ עַבְדֵ֣י יִצְחָ֔ק וַ/יַּגִּ֣דוּ
    ל֔/וֹ עַל אֹד֥וֹת הַ/בְּאֵ֖ר אֲשֶׁ֣ר חָפָ֑רוּ וַ/יֹּ֥אמְרוּ ל֖/וֹ מָצָ֥אנוּ מָֽיִם׀־׃
translation:
  text: And it happened on that day that Isaac’s servants came and told him about
    the well that they had dug, and they said to him, “We have found water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the same day,” emphasizing that the report came on the very day of
      the preceding covenant events.
    reason: lexical_alternative
  - marker: b
    text: “Servants” could also be rendered “slaves,” since the Hebrew term can denote
      bonded household laborers; here the context does not foreground that social
      nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And
    it happened' preserves the Hebrew narrative formula without archaic English.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  - on the same day
  lexicon: HALOT
  rationale: Temporal phrase marking the specific day of the preceding events. 'On
    that day' is natural English and retains the demonstrative force.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple motion verb בוא in narrative context; 'came' is the most direct
    rendering.
- source_word: עַבְדֵי יִצְחָק
  chosen: Isaac’s servants
  alternatives:
  - Isaac’s slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it refers to Isaac's household
    workers in a non-theologically salient narrative setting. 'Servants' is idiomatic
    and contextually sufficient; the bonded nuance is not foregrounded in this verse.
- source_word: וַיַּגִּדוּ לוֹ
  chosen: told him
  alternatives:
  - reported to him
  - informed him
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell or report. 'Told him' is concise
    and natural, while still accurate.
- source_word: עַל אֹדוֹת הַבְּאֵר
  chosen: about the well
  alternatives:
  - concerning the well
  - regarding the well
  lexicon: HALOT
  rationale: The prepositional expression עַל אֹדוֹת means 'about/concerning/regarding.'
    'About the well' is the clearest modern English equivalent.
- source_word: אֲשֶׁר חָפָרוּ
  chosen: that they had dug
  alternatives:
  - which they dug
  lexicon: HALOT
  rationale: Relative clause identifying the well. English past perfect fits the sequence
    naturally, since the digging preceded the report.
- source_word: וַיֹּאמְרוּ לוֹ
  chosen: and they said to him
  alternatives:
  - and said to him
  - telling him
  lexicon: HALOT
  rationale: Retains the explicit speech introduction present in Hebrew narrative.
- source_word: מָצָאנוּ מָיִם
  chosen: We have found water
  alternatives:
  - We found water
  - We have found some water
  lexicon: HALOT
  rationale: מצא with מים announces successful discovery of water in the well. Present
    perfect in English conveys the newly relevant result. 'Water' is preferable to
    'some water' unless quantity is emphasized, which the Hebrew does not do.
