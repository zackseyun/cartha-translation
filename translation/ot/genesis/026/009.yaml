id: GEN.26.9
reference: Genesis 26:9
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אֲבִימֶ֜לֶךְ לְ/יִצְחָ֗ק וַ/יֹּ֨אמֶר֙ אַ֣ךְ הִנֵּ֤ה אִשְׁתְּ/ךָ֙
    הִ֔וא וְ/אֵ֥יךְ אָמַ֖רְתָּ אֲחֹ֣תִ/י הִ֑וא וַ/יֹּ֤אמֶר אֵלָי/ו֙ יִצְחָ֔ק כִּ֣י
    אָמַ֔רְתִּי פֶּן אָמ֖וּת עָלֶֽי/הָ־׃
translation:
  text: So Abimelech called Isaac and said, “Surely, she is your wife! So how could
    you say, ‘She is my sister’?” And Isaac said to him, “Because I said, ‘Lest I
    die because of her.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “lest I die on account of her,” that is, lest men kill
      me because of her.
    reason: lexical_alternative
  - marker: b
    text: Or 'Surely, look, she is your wife.'.
    reason: previous_rendering
  - marker: c
    text: Or 'Why, she is your wife!'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with לְ plus person commonly means 'call to' or 'summon.'
    'Called' is natural modern English and preserves the narrative simplicity.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - indeed
  - truly
  lexicon: HALOT
  rationale: אַךְ here adds emphatic force to Abimelech's realization. 'Surely' captures
    the exclamatory emphasis better than a flat connective.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    force in readable modern English; 'behold' would sound archaic.
- source_word: אִשְׁתְּךָ הִוא
  chosen: she is your wife
  alternatives:
  - she is indeed your wife
  lexicon: HALOT
  rationale: This clause states the obvious conclusion Abimelech has reached. 'She
    is your wife' is direct and idiomatic; the emphatic force is already represented
    by 'Surely, look'.
- source_word: וְאֵיךְ
  chosen: So how could
  alternatives:
  - and how
  - how then
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces a reproachful question.
    'So how could' conveys both the connective force and the incredulity in context.
- source_word: אֲחֹתִי הִוא
  chosen: She is my sister
  alternatives:
  - She is my kinswoman
  lexicon: HALOT
  rationale: The plain lexical sense of אחות is 'sister.' No contextual reason warrants
    broadening it here.
- source_word: כִּי
  chosen: Because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי introduces Isaac's explanation. 'Because' is clearer in contemporary
    English than 'for'.
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - otherwise
  - for fear that
  lexicon: HALOT
  rationale: פֶּן expresses apprehension about a possible outcome. 'Lest' is concise
    and accurate, though slightly elevated; it fits the gravity of the statement.
- source_word: אָמ֖וּת
  chosen: I die
  alternatives:
  - I would die
  - I might die
  lexicon: HALOT
  rationale: The imperfect after פֶּן expresses feared result. 'I die' keeps close
    to the Hebrew wording inside the quoted explanation; English readers will understand
    it as potential result because of 'lest'.
- source_word: עָלֶיהָ
  chosen: because of her
  alternatives:
  - on account of her
  - for her sake
  lexicon: HALOT
  rationale: The preposition עַל with this idiom indicates cause or occasion. 'Because
    of her' is the clearest idiomatic English in this context, implying fear of being
    killed on account of Rebekah.
