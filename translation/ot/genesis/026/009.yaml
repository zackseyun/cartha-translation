revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/026/009.json
  category: awkward_english
  tier: 1
  from: Surely, look, she is your wife.
  to: Why, she is your wife!
  rationale: While `אַךְ` ('Surely') and `הִנֵּה` ('look') are rendered literally,
    stacking two such interjections is somewhat unnatural in English. A more integrated
    phrasing like 'Why, she is your wife!' or 'So she is your wife after all!' would
    capture Abimelech's surprised realization more smoothly.
- timestamp: '2026-04-21T00:47:47Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/026/009.json
  category: mistranslation
  tier: 2
  from: Why, she is your wife!
  to: Surely, she is your wife!
  rationale: The draft renders the emphatic particles `אַךְ הִנֵּ֤ה` ('surely, behold')
    as the interrogative 'Why'. While this attempts to capture Abimelech's incredulous
    tone, it is a mistranslation. The particle `אַךְ` is asseverative, meaning 'surely'
    or 'indeed' (HALOT, BDB), not a question word. The phrase is a strong declaration
    of fact, which is then followed by the actual question beginning with `וְאֵיךְ`
    ('and how'). The current rendering incorrectly introduces a question where the
    Hebrew has an emphatic statement. A more faithful rendering would be 'Surely,
    she is your wife!' or 'So, she is your wife!'.
