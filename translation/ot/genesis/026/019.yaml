id: GEN.26.19
reference: Genesis 26:19
source:
  edition: WLC
  text: וַ/יַּחְפְּר֥וּ עַבְדֵֽי יִצְחָ֖ק בַּ/נָּ֑חַל וַ/יִּ֨מְצְאוּ שָׁ֔ם בְּאֵ֖ר
    מַ֥יִם חַיִּֽים־־׃
translation:
  text: Then Isaac’s servants dug in the wadi and found there a well of living water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “valley” or “streambed”; the Hebrew term often refers to a wadi, a seasonal
      watercourse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “living water,” that is, fresh or flowing water from a spring rather
      than stagnant water.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְפְּרוּ
  chosen: dug
  alternatives:
  - excavated
  lexicon: HALOT
  rationale: Qal wayyiqtol of חפר, the ordinary verb for digging. 'Dug' is the natural,
    direct English equivalent.
- source_word: עַבְדֵי יִצְחָק
  chosen: Isaac’s servants
  alternatives:
  - Isaac’s slaves
  lexicon: HALOT
  rationale: Construct phrase meaning those in Isaac's service. Although עבד can denote
    slave/servant, here the bonded status is not theologically salient; 'servants'
    is idiomatic and fits the narrative context.
- source_word: בַּנָּחַל
  chosen: in the wadi
  alternatives:
  - in the valley
  - in the streambed
  lexicon: HALOT
  rationale: נחל often denotes a wadi or seasonal watercourse rather than a generic
    valley. 'Wadi' best preserves the geographical sense, though 'valley' is a common
    traditional rendering.
- source_word: וַיִּמְצְאוּ שָׁם
  chosen: found there
  alternatives:
  - found there in it
  lexicon: HALOT
  rationale: Straightforward narrative sequence; שָׁם is retained as 'there' for location
    emphasis.
- source_word: בְּאֵר
  chosen: a well
  alternatives:
  - a spring-well
  lexicon: HALOT
  rationale: The noun denotes a well. The following phrase specifies the kind of water,
    so 'well' should remain the head term.
- source_word: מַיִם חַיִּים
  chosen: living water
  alternatives:
  - fresh water
  - flowing water
  - spring water
  lexicon: HALOT
  rationale: Literally 'living water,' an established Hebrew idiom for fresh, flowing
    water as opposed to stagnant water. The literal rendering is clear in English
    and preserves later biblical resonance.
