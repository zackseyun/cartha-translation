id: GEN.26.23
reference: Genesis 26:23
source:
  edition: WLC
  text: וַ/יַּ֥עַל מִ/שָּׁ֖ם בְּאֵ֥ר שָֽׁבַע׃
translation:
  text: From there he went up to Beersheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''went up,'' a common idiom for travel that may also imply ascent
      in elevation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: he went up
  alternatives:
  - he ascended
  - he came up
  lexicon: HALOT
  rationale: The verb עלה commonly means 'go up/ascend.' In narrative travel contexts
    it often denotes movement to a higher place or simply onward travel. 'Went up'
    preserves the Hebrew idiom and the directional nuance better than the more formal
    'ascended.'
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - thence
  lexicon: HALOT
  rationale: The adverbial phrase straightforwardly indicates departure from the previous
    location. 'From there' is natural modern English and closely matches the Hebrew
    sense.
- source_word: בְּאֵר שָׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy names are transliterated
    rather than translated. 'Beersheba' is the standard English transliteration.
