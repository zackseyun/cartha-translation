id: GEN.26.16
reference: Genesis 26:16
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲבִימֶ֖לֶךְ אֶל יִצְחָ֑ק לֵ֚ךְ מֵֽ/עִמָּ֔/נוּ כִּֽי עָצַֽמְתָּ
    מִמֶּ֖/נּוּ מְאֹֽד־־־׃
translation:
  text: Then Abimelech said to Isaac, “Go away from us, because you have become much
    stronger than we are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you have grown very mighty compared with us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare 'and said'
    in this context.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  lexicon: HALOT
  rationale: Standard directional preposition introducing the indirect object of speech.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Personal name transliterated by standard English convention.
- source_word: לֵךְ
  chosen: Go away
  alternatives:
  - Go
  - Leave
  lexicon: HALOT
  rationale: Imperative of הלך means 'go'; with מֵעִמָּנוּ ('from with us' = 'away
    from us'), English idiom is best expressed as 'Go away from us.' 'Leave' is possible
    but slightly less formally tied to the verbal structure.
- source_word: מֵעִמָּנוּ
  chosen: from us
  alternatives:
  - away from us
  - from being with us
  lexicon: HALOT
  rationale: The phrase literally means 'from with us.' In English, 'from us' is the
    natural complement to 'go away'; the sense of separation from their vicinity/community
    is preserved.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Abimelech's command. 'Because' is clearer in
    contemporary English than 'for.'
- source_word: עָצַמְתָּ
  chosen: you have become much stronger
  alternatives:
  - you have become too powerful
  - you have grown mighty
  lexicon: HALOT
  rationale: The verb עצם here conveys becoming strong/mighty/powerful. 'Have become
    much stronger' preserves the comparative sense created by the following מִמֶּנּוּ
    and avoids overstating political domination. 'Too powerful' is interpretive and
    imports 'too' from context rather than the verb itself.
- source_word: מִמֶּנּוּ
  chosen: than we are
  alternatives:
  - than us
  - more than we
  lexicon: HALOT
  rationale: Comparative use of מן after עצם. 'Than we are' is idiomatic English completing
    the comparative idea; it makes explicit the implied predicate without changing
    the sense.
- source_word: מְאֹד
  chosen: much
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: Adverb intensifying the comparison. 'Much' fits naturally with 'stronger'
    in English ('much stronger').
