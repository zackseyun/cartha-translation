id: GEN.26.34
reference: Genesis 26:34
source:
  edition: WLC
  text: וַ/יְהִ֤י עֵשָׂו֙ בֶּן אַרְבָּעִ֣ים שָׁנָ֔ה וַ/יִּקַּ֤ח אִשָּׁה֙ אֶת יְהוּדִ֔ית
    בַּת בְּאֵרִ֖י הַֽ/חִתִּ֑י וְ/אֶת בָּ֣שְׂמַ֔ת בַּת אֵילֹ֖ן הַֽ/חִתִּֽי־־־־־׃
translation:
  text: When Esau was forty years old, he took as wives Judith daughter of Beeri the
    Hittite, and Basemath daughter of Elon the Hittite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''he took a wife: Judith ... and Basemath ...'' The
      Hebrew uses the singular ''wife/woman'' before naming two women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: When ... was
  alternatives:
  - And it happened that ... was
  - Now ... was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a temporal setting. In idiomatic
    modern English, 'When Esau was...' best conveys the narrative transition without
    woodenly reproducing 'and it happened.'
- source_word: בֶּן אַרְבָּעִים שָׁנָה
  chosen: forty years old
  alternatives:
  - a son of forty years
  lexicon: HALOT
  rationale: This is the standard Hebrew age expression. 'Forty years old' is the
    natural English equivalent.
- source_word: וַיִּקַּח אִשָּׁה
  chosen: he took as wives
  alternatives:
  - he took a wife
  - he married
  lexicon: HALOT
  rationale: Literally the singular is 'he took a wife/woman,' but the verse immediately
    names two women joined by וְאֶת. English should reflect the resulting sense that
    he took these women in marriage. 'As wives' preserves the marital force more explicitly
    than the bare 'took women,' while avoiding awkward literalism.
- source_word: יְהוּדִית
  chosen: Judith
  alternatives:
  - Yehudith
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - the daughter of
  lexicon: HALOT
  rationale: The construct relation is naturally rendered 'daughter of' in English
    genealogy-style identification.
- source_word: בְּאֵרִי
  chosen: Beeri
  rationale: Proper name transliterated by standard convention.
- source_word: הַחִתִּי
  chosen: the Hittite
  alternatives:
  - a Hittite
  lexicon: HALOT
  rationale: With the article, the gentilic is most naturally rendered 'the Hittite'
    in apposition to Beeri and Elon, matching common biblical English usage for ethnic
    identification.
- source_word: בָּשְׂמַת
  chosen: Basemath
  alternatives:
  - Basemat
  rationale: Proper name transliterated by standard convention.
- source_word: אֵילֹן
  chosen: Elon
  rationale: Proper name transliterated by standard convention.
