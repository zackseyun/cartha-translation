id: GEN.26.2
reference: Genesis 26:2
source:
  edition: WLC
  text: וַ/יֵּרָ֤א אֵלָי/ו֙ יְהוָ֔ה וַ/יֹּ֖אמֶר אַל תֵּרֵ֣ד מִצְרָ֑יְמָ/ה שְׁכֹ֣ן בָּ/אָ֔רֶץ אֲשֶׁ֖ר אֹמַ֥ר אֵלֶֽי/ךָ־׃
translation:
  text: Then Yahweh appeared to him and said, “Do not go down to Egypt. Dwell in the land that I will tell you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Stay in the land that I say to you,” preserving the more literal wording of the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: From ראה in the Niphal, here denoting visible or manifest appearance. 'Appeared' is the standard natural English rendering and fits a divine self-manifestation without over-specifying the mode.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל תֵּרֵד
  chosen: Do not go down
  alternatives:
  - You must not go down
  - Do not descend
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not go down' preserves both the negative command and the common idiom of travel 'down' to Egypt.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - Egyptward
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. In idiomatic English this is best rendered simply 'to Egypt.'
- source_word: שְׁכֹן
  chosen: Dwell
  alternatives:
  - Live
  - Stay
  - Settle
  lexicon: HALOT
  rationale: Imperative of שכן, meaning to dwell or reside. 'Dwell' preserves the sense of residing in a place and carries slightly more weight than the flatter 'stay' or 'live.'
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land/territory where Isaac is to reside, not the earth generally. 'Land' is the most contextually appropriate and biblically consistent rendering.
- source_word: אֲשֶׁר אֹמַר אֵלֶיךָ
  chosen: that I will tell you
  alternatives:
  - which I will say to you
  - that I will speak to you about
  lexicon: HALOT
  rationale: Although the Hebrew verb is present/imperfect 'I say/will say,' in context it points forward to divine direction. 'That I will tell you' is idiomatic English that preserves the future sense of forthcoming instruction.
