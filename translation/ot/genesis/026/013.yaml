id: GEN.26.13
reference: Genesis 26:13
source:
  edition: WLC
  text: וַ/יִּגְדַּ֖ל הָ/אִ֑ישׁ וַ/יֵּ֤לֶךְ הָלוֹךְ֙ וְ/גָדֵ֔ל עַ֥ד כִּֽי גָדַ֖ל מְאֹֽד־׃
translation:
  text: And the man became great, and he continued going and growing until he became
    very great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went on, growing more and more.' The Hebrew idiom literally stacks verbs
      to express continuing increase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: became great
  alternatives:
  - grew
  - prospered
  - became wealthy
  lexicon: HALOT
  rationale: גדל commonly denotes becoming great or growing in status, size, or importance.
    Here it begins a progression intensified by the following infinitive construction
    and final מאוד, so 'became great' preserves the repeated lexical pattern better
    than the more interpretive 'prospered' or the narrower 'became wealthy'.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: איש straightforwardly means 'man' here, referring specifically to Isaac.
    This matches the masculine singular source and the doctrine's gender-accurate
    principle.
- source_word: וַיֵּלֶךְ הָלוֹךְ וְגָדֵל
  chosen: continued going and growing
  alternatives:
  - went on, growing more and more
  - kept becoming greater
  - went on and became greater
  lexicon: HALOT
  rationale: The combination of finite verb + infinitive absolute + participle is
    an idiom of ongoing or progressive action. 'Continued going and growing' preserves
    both the Hebrew's verbal sequence and its rhetorical force, while signaling sustained
    increase. 'Going' is retained rather than collapsed entirely into an adverb so
    the source texture remains visible.
- source_word: עַד כִּי
  chosen: until
  alternatives:
  - until indeed
  - so that
  lexicon: HALOT
  rationale: The phrase marks the culmination of the progressive increase. In idiomatic
    English, 'until' best conveys the result without overtranslating כי.
- source_word: גָדַל מְאֹד
  chosen: he became very great
  alternatives:
  - he grew exceedingly great
  - he became exceedingly wealthy
  lexicon: HALOT
  rationale: This repeats גדל with the intensifier מאוד. 'Very great' preserves the
    lexical repetition across the verse and avoids narrowing the sense to wealth alone,
    though material prosperity is part of the context.
