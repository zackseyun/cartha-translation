theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of וַיִּקְרָא בְּשֵׁם יְהוָה
  chosen_reading: called on the name of the LORD
  alternative_readings:
  - proclaimed the name of the LORD
  rationale: The phrase can in some contexts suggest proclamation, but in Genesis altar-building scenes it most naturally denotes worshipful invocation. This preserves the religious act without importing more specificity than the idiom warrants.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/026/025.json
  category: awkward_english
  tier: 1
  from: So he built an altar there and called on the name of the LORD, and he pitched his tent there.
  to: So he built an altar there, called on the name of the LORD, and pitched his tent there.
  rationale: The Hebrew text presents three sequential actions by Isaac using parallel verb forms (wayyiqtol). The current English rendering breaks this parallel structure by reintroducing the pronoun 'he' for the third action, which is slightly cumbersome. A simple series ('he built..., called..., and pitched...') would be more concise, improve the narrative flow, and more closely mirror the parallelism of the source text.
