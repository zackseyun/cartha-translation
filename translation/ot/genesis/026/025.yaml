id: GEN.26.25
reference: Genesis 26:25
source:
  edition: WLC
  text: וַ/יִּ֧בֶן שָׁ֣ם מִזְבֵּ֗חַ וַ/יִּקְרָא֙ בְּ/שֵׁ֣ם יְהוָ֔ה וַ/יֶּט שָׁ֖ם אָהֳל֑/וֹ וַ/יִּכְרוּ שָׁ֥ם עַבְדֵי יִצְחָ֖ק בְּאֵֽר־־־׃
translation:
  text: So he built an altar there, called on the name of the LORD, and pitched his tent there. And Isaac’s servants dug a well there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proclaimed the name of the LORD.' The Hebrew idiom can denote invocation or proclamation; here the altar context favors invocation.
    reason: alternative_reading
  - marker: b
    text: Or 'So he built an altar there and called on the name of the LORD, and he pitched his tent there.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: Standard rendering of בנה in narrative context; 'built' is natural and sufficiently formal.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Regular gloss for sacrificial/worship structure; no contextual reason to vary.
- source_word: וַיִּקְרָא בְּשֵׁם יְהוָה
  chosen: called on the name of the LORD
  alternatives:
  - called in the name of the LORD
  - proclaimed the name of the LORD
  lexicon: HALOT
  rationale: This idiom in Genesis commonly denotes invocation/worship directed to YHWH. 'Called on the name of the LORD' preserves the established idiomatic sense without over-paraphrasing. 'Proclaimed' is possible in some contexts but here invocation fits the altar-setting best.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD' rather than a transliteration.
- source_word: וַיֶּט
  chosen: pitched
  alternatives:
  - stretched out
  - set up
  lexicon: HALOT
  rationale: With אֹהֶל ('tent'), נטה idiomatically means to pitch or set up a tent. 'Pitched' is the most idiomatic English equivalent.
- source_word: אָהֳלוֹ
  chosen: his tent
  lexicon: HALOT
  rationale: Direct possessive rendering of the noun with 3ms suffix.
- source_word: וַיִּכְרוּ
  chosen: dug
  alternatives:
  - excavated
  lexicon: HALOT
  rationale: Common verb for digging, especially of wells; 'dug' is the plain narrative equivalent.
- source_word: עַבְדֵי יִצְחָק
  chosen: Isaac’s servants
  alternatives:
  - Isaac's slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the bonded status is not theologically salient; the phrase refers to household workers carrying out a task. 'Servants' fits the context and the project's context-dependent policy.
- source_word: בְּאֵר
  chosen: a well
  lexicon: HALOT
  rationale: Standard gloss for באר in patriarchal narratives; indefinite article is natural in English narrative.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Repeated adverb retained throughout the verse to preserve the Hebrew narrative emphasis on location.
