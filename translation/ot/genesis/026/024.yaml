id: GEN.26.24
reference: Genesis 26:24
source:
  edition: WLC
  text: וַ/יֵּרָ֨א אֵלָ֤י/ו יְהוָה֙ בַּ/לַּ֣יְלָה הַ/ה֔וּא וַ/יֹּ֕אמֶר אָנֹכִ֕י אֱלֹהֵ֖י
    אַבְרָהָ֣ם אָבִ֑י/ךָ אַל תִּירָא֙ כִּֽי אִתְּ/ךָ֣ אָנֹ֔כִי וּ/בֵֽרַכְתִּ֨י/ךָ֙
    וְ/הִרְבֵּיתִ֣י אֶֽת זַרְעֲ/ךָ֔ בַּ/עֲב֖וּר אַבְרָהָ֥ם עַבְדִּֽ/י־־־׃
translation:
  text: And the LORD appeared to him that night and said, “I am the God of Abraham
    your father. Do not fear, for I am with you, and I will bless you and multiply
    your offspring for the sake of Abraham my servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not be afraid.”
    reason: lexical_alternative
  - marker: b
    text: Or “multiply your seed”; “offspring” renders the collective sense of the
      Hebrew term.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagint pattern.
- source_word: וַיֵּרָא אֵלָיו
  chosen: appeared to him
  alternatives:
  - was seen by him
  - revealed himself to him
  lexicon: HALOT
  rationale: The Niphal of ראה commonly denotes visible appearance or manifestation.
    'Appeared to him' is idiomatic English and preserves the directness of the theophanic
    encounter.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: A natural English rendering of the temporal phrase; 'that night' preserves
    the demonstrative force without wooden phrasing.
- source_word: אָנֹכִי אֱלֹהֵי אַבְרָהָם אָבִיךָ
  chosen: I am the God of Abraham your father
  alternatives:
  - I am God, the God of Abraham your father
  - I am the God of your father Abraham
  lexicon: HALOT
  rationale: This closely follows the Hebrew word order and covenantal identification.
    'Your father Abraham' is possible, but the construct chain more naturally yields
    'Abraham your father' in English here.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Both are valid; 'Do not fear' is slightly more formal and concise, fitting
    divine reassurance language while remaining readable.
- source_word: כִּי אִתְּךָ אָנֹכִי
  chosen: for I am with you
  alternatives:
  - because I am with you
  lexicon: HALOT
  rationale: כִּי here introduces the ground for the command not to fear. 'For' preserves
    that explanatory force in a natural literary register.
- source_word: וּבֵרַכְתִּיךָ
  chosen: I will bless you
  alternatives:
  - I will indeed bless you
  lexicon: HALOT
  rationale: The perfect with prefixed waw in this promise context is naturally rendered
    futurally in English. 'I will bless you' communicates the promissory force clearly.
- source_word: וְהִרְבֵּיתִי אֶת זַרְעֲךָ
  chosen: and multiply your offspring
  alternatives:
  - and make your offspring numerous
  - and increase your seed
  lexicon: HALOT
  rationale: The Hiphil of רבה means to make numerous or multiply. 'Offspring' is
    preferable to the more literal 'seed' in contemporary English, while still preserving
    the collective descendant sense.
- source_word: זַרְעֲךָ
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: '''Offspring'' best captures the collective singular sense in readable
    modern English. ''Seed'' is more literal but less natural for many readers; ''descendants''
    is possible but slightly more interpretive.'
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: This preposition expresses causative or benefactive grounds. 'For the
    sake of' fits the covenantal context well and sounds natural in English.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the emphasis is covenantal
    relationship and commissioned status rather than bonded social condition. 'My
    servant' is the most contextually fitting rendering under the project's servant/slave
    principle.
