theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidance explicitly sets 'the
    LORD' as the default for YHWH. This also aligns with longstanding reverential
    convention in English Bible translation.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenantal basis of the promise in בַּעֲבוּר אַבְרָהָם עַבְדִּי
  chosen_reading: for the sake of Abraham my servant
  alternative_readings:
  - because of Abraham my servant
  - on account of Abraham my servant
  rationale: The phrase grounds God's blessing of Isaac in his prior covenantal commitment
    to Abraham. The translation preserves that theological linkage without expanding
    it beyond the text.
  doctrine_reference: Translation philosophy §1, §3
