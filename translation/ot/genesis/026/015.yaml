id: GEN.26.15
reference: Genesis 26:15
source:
  edition: WLC
  text: וְ/כָל הַ/בְּאֵרֹ֗ת אֲשֶׁ֤ר חָֽפְרוּ֙ עַבְדֵ֣י אָבִ֔י/ו בִּ/ימֵ֖י אַבְרָהָ֣ם אָבִ֑י/ו סִתְּמ֣וּ/ם פְּלִשְׁתִּ֔ים וַ/יְמַלְא֖וּ/ם עָפָֽר־׃
translation:
  text: Now all the wells that his father's servants had dug in the days of Abraham his father, the Philistines stopped up and filled them with dirt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'filled them with earth.' The Hebrew עָפָר can denote dirt, dust, or earth/soil depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'his father's slaves.' The Hebrew עֶבֶד can refer to a servant or a slave; here the context does not require emphasizing bonded status.
    reason: lexical_alternative
  - marker: c
    text: Or 'and filled with dirt'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְכָל
  chosen: Now all
  alternatives:
  - And all
  - All
  lexicon: HALOT
  rationale: וְ here links the verse to the preceding narrative, and 'Now' gives natural English discourse flow while preserving the connective force. כָל is rendered 'all' to retain the totalizing sense.
- source_word: הַבְּאֵרֹת
  chosen: the wells
  alternatives:
  - the water wells
  lexicon: HALOT
  rationale: בְּאֵרֹת straightforwardly denotes wells. 'The wells' is the natural and sufficiently precise English rendering.
- source_word: אֲשֶׁר חָפְרוּ
  chosen: that ... had dug
  alternatives:
  - which ... dug
  lexicon: HALOT
  rationale: The relative clause modifies 'wells.' English past perfect ('had dug') appropriately situates the digging prior to the Philistines' later action in the narrative.
- source_word: עַבְדֵי אָבִיו
  chosen: his father's servants
  alternatives:
  - his father's slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave depending on context. Here the bonded status is not theologically or socially foregrounded, so 'servants' is the smoother optimal-equivalence choice while preserving the basic sense of dependents belonging to his father.
- source_word: בִּימֵי אַבְרָהָם אָבִיו
  chosen: in the days of Abraham his father
  alternatives:
  - during the lifetime of Abraham his father
  lexicon: HALOT
  rationale: This idiom is commonly rendered 'in the days of.' It preserves the temporal frame and the repeated filial identification present in the Hebrew.
- source_word: סִתְּמוּם
  chosen: stopped up
  alternatives:
  - blocked
  - closed up
  lexicon: HALOT
  rationale: The verb means to stop or block up, especially of wells. 'Stopped up' is idiomatic English for obstructing wells and matches the concrete action.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English transliteration for the people group.
- source_word: וַיְמַלְאוּם עָפָר
  chosen: and filled with dirt
  alternatives:
  - and filled them with dirt
  - and filled them with earth
  - and filled them with dust
  lexicon: HALOT
  rationale: The object suffix on the verb refers back to the wells; English can omit the repeated object naturally after 'stopped up.' עָפָר denotes loose earth/soil/dust. 'Dirt' is clear, natural modern English in this context.
