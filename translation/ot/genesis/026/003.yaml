id: GEN.26.3
reference: Genesis 26:3
source:
  edition: WLC
  text: גּ֚וּר בָּ/אָ֣רֶץ הַ/זֹּ֔את וְ/אֶֽהְיֶ֥ה עִמְּ/ךָ֖ וַ/אֲבָרְכֶ֑/ךָּ כִּֽי
    לְ/ךָ֣ וּֽ/לְ/זַרְעֲ/ךָ֗ אֶתֵּן֙ אֶת כָּל הָֽ/אֲרָצֹ֣ת הָ/אֵ֔ל וַ/הֲקִֽמֹתִי֙
    אֶת הַ/שְּׁבֻעָ֔ה אֲשֶׁ֥ר נִשְׁבַּ֖עְתִּי לְ/אַבְרָהָ֥ם אָבִֽי/ךָ־־־־׃
translation:
  text: Stay in this land, and I will be with you and bless you, for to you and to
    your offspring I will give all these lands, and I will establish the oath that
    I swore to Abraham your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sojourn in this land.' The Hebrew verb can denote residing as a temporary
      resident or foreigner.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'seed'; the term is collective here, hence 'offspring.'
    reason: lexical_alternative
  - marker: c
    text: Or 'confirm' or 'fulfill' the oath.
    reason: alternative_reading
lexical_decisions:
- source_word: גּוּר
  chosen: Stay
  alternatives:
  - Sojourn
  - Dwell as a foreigner
  - Reside
  lexicon: HALOT
  rationale: The verb גור commonly denotes residing as a sojourner or temporary resident.
    In this context God is telling Isaac to remain in the land rather than go to Egypt.
    'Stay' is natural modern English and fits optimal equivalence, while the more
    formal nuance 'sojourn' is preserved as an alternative.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or country. Here the promise context and
    the later phrase 'all these lands' favor 'land' as the covenantal-geographical
    sense.
- source_word: וְאֶהְיֶה עִמְּךָ
  chosen: and I will be with you
  lexicon: HALOT
  rationale: A straightforward covenant-presence formula. 'Be with you' preserves
    the relational and covenantal force without expansion.
- source_word: וַאֲבָרֶכְךָ
  chosen: and bless you
  alternatives:
  - and I will bless you
  lexicon: HALOT
  rationale: The prefixed conjunction plus imperfect continues the divine promise
    sequence. English omits the repeated subject naturally after 'I will be with you'
    while retaining the same meaning.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the command and promise. 'For' best
    captures the explanatory force in elevated but readable English.
- source_word: לְךָ וּלְזַרְעֲךָ
  chosen: to you and to your offspring
  alternatives:
  - to you and to your seed
  - to you and to your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective noun meaning seed/offspring. 'Offspring' preserves
    the collective sense better than 'descendants' and avoids the overly literal but
    potentially misleading singular 'seed' in contemporary English.
- source_word: אֶתֵּן
  chosen: I will give
  lexicon: HALOT
  rationale: Simple future promise; no reason to depart from the standard rendering.
- source_word: כָּל הָאֲרָצֹת הָאֵל
  chosen: all these lands
  alternatives:
  - all these countries
  - all these regions
  lexicon: HALOT
  rationale: The plural אֲרָצוֹת refers to the various territories in view. 'Lands'
    preserves the lexical link with אֶרֶץ while sounding natural in English.
- source_word: וַהֲקִמֹתִי
  chosen: and I will establish
  alternatives:
  - and I will confirm
  - and I will fulfill
  lexicon: HALOT
  rationale: The Hiphil of קום here means to establish or confirm something previously
    pledged. 'Establish' best reflects the covenantal solemnity and the verbal connection
    to making good on an oath.
- source_word: הַשְּׁבֻעָה
  chosen: the oath
  alternatives:
  - the sworn promise
  lexicon: HALOT
  rationale: The noun specifically denotes an oath. 'Oath' is more precise than the
    broader 'promise' and preserves the solemn legal-covenantal sense.
- source_word: אֲשֶׁר נִשְׁבַּעְתִּי
  chosen: that I swore
  alternatives:
  - which I swore
  - that I solemnly swore
  lexicon: HALOT
  rationale: A direct relative clause modifying 'oath.' 'That I swore' is idiomatic
    and sufficiently weighty without adding interpretive emphasis.
- source_word: לְאַבְרָהָם אָבִיךָ
  chosen: to Abraham your father
  alternatives:
  - to Abraham, your father
  lexicon: HALOT
  rationale: The phrase identifies Abraham as Isaac's father and grounds the continuity
    of the covenant promise. No expansion is needed.
