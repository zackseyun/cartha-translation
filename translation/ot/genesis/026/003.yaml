theological_decisions:
- issue: Rendering covenantal promise language without over-interpreting
  chosen_reading: I will establish the oath that I swore to Abraham your father
  alternative_readings:
  - I will confirm the oath that I swore to Abraham your father
  - I will fulfill the oath that I swore to Abraham your father
  rationale: The Hebrew speaks of establishing the oath, not explicitly of covenant
    renewal in technical terms, though that idea is implied by context. The chosen
    wording preserves the text's own formulation and theological weight without importing
    extra covenant terminology.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition
- issue: Collective sense of זֶרַע
  chosen_reading: offspring
  alternative_readings:
  - seed
  - descendants
  rationale: The term can carry both collective and, in broader canonical contexts,
    potentially singular typological significance. In this immediate verse the collective
    promise to Isaac's line is primary, so 'offspring' is used in the main text while
    more literal 'seed' is preserved as an alternative.
  doctrine_reference: Consistency of key terms, or documented exception; Preserve
    theological tension rather than resolve it
