  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as the one evidently favoring Isaac. Following the project's doctrine, the Tetragrammaton is rendered 'the LORD' in the main text.
