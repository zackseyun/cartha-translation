id: GEN.26.28
reference: Genesis 26:28
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ רָא֣וֹ רָאִינוּ֮ כִּֽי הָיָ֣ה יְהוָ֣ה עִמָּ/ךְ֒ וַ/נֹּ֗אמֶר תְּהִ֨י נָ֥א אָלָ֛ה בֵּינוֹתֵ֖י/נוּ בֵּינֵ֣י/נוּ וּ/בֵינֶ֑/ךָ וְ/נִכְרְתָ֥ה בְרִ֖ית עִמָּֽ/ךְ־׀׃
translation:
  text: And they said, “We have clearly seen that the LORD has been with you. So we said, ‘Please let there be an oath between our two parties—between you and us, and let us make a covenant with you,’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “a curse-oath,” since the Hebrew term can denote an oath accompanied by an invoked curse for violation.
    reason: lexical_alternative
  - marker: b
    text: Or 'between us, between us and you'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative advance; 'And they said' preserves the Hebrew flow without overinterpreting temporal sequence.
- source_word: רָאוֹ רָאִינוּ
  chosen: We have clearly seen
  alternatives:
  - We have surely seen
  - Seeing, we have seen
  - We plainly saw
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the assertion. 'Clearly seen' captures the emphatic force in natural modern English.
- source_word: כִּי הָיָה יְהוָה עִמָּךְ
  chosen: that the LORD has been with you
  alternatives:
  - that the LORD was with you
  - that the LORD is with you
  lexicon: HALOT
  rationale: The perfect הָיָה can be rendered as a past state with present relevance. 'Has been with you' fits the speakers' inference from Isaac's evident blessing and reads naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD' rather than a transliteration.
- source_word: וַנֹּאמֶר
  chosen: So we said
  alternatives:
  - and we said
  - then we said
  lexicon: HALOT
  rationale: Links their conclusion to their proposal. 'So' brings out the inferential sense in readable English while remaining close to the Hebrew discourse flow.
- source_word: תְּהִי נָא
  chosen: Please let there be
  alternatives:
  - Let there please be
  - May there now be
  lexicon: HALOT
  rationale: Jussive plus particle נָא expresses a polite request or appeal. 'Please let there be' is idiomatic and preserves the volitional nuance.
- source_word: אָלָה
  chosen: an oath
  alternatives:
  - a sworn pledge
  - a curse-oath
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often with self-maledictory force. In this treaty context, 'oath' is the clearest main-text rendering; the stronger nuance is worth preserving in a footnote.
- source_word: בֵּינוֹתֵינוּ בֵּינֵינוּ וּבֵינֶךָ
  chosen: between us, between us and you
  alternatives:
  - between us and you
  - between our parties, between us and you
  lexicon: HALOT
  rationale: The Hebrew is somewhat repetitive for emphasis. Retaining both phrases reflects the source texture better than collapsing them entirely, while still reading intelligibly in English.
- source_word: וְנִכְרְתָה בְרִית
  chosen: and let us make a covenant
  alternatives:
  - and let us cut a covenant
  - and let us conclude a covenant
  lexicon: HALOT
  rationale: The idiom literally means 'cut a covenant.' 'Make a covenant' is the best optimal-equivalence rendering in main text; the literal idiom may be noted in a footnote if desired, but is not necessary for comprehension.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - with you personally
  lexicon: HALOT
  rationale: Straightforward prepositional phrase addressed to Isaac in the singular.
