  from: between us, between us and you
  to: between our two parties—between you and us
  rationale: The Hebrew `בֵּינוֹתֵינוּ בֵּינֵינוּ וּבֵינֶךָ` uses a somewhat redundant construction for formal emphasis. While the current rendering is a literal representation, it reads as clunky in English. A phrasing like "between our two parties—between you and us" or even collapsing it to "between us and you" could capture the formal, bilateral nature of the Hebrew more idiomatically without sacrificing meaning.
