id: GEN.26.1
reference: Genesis 26:1
source:
  edition: WLC
  text: וַ/יְהִ֤י רָעָב֙ בָּ/אָ֔רֶץ מִ/לְּ/בַד֙ הָ/רָעָ֣ב הָ/רִאשׁ֔וֹן אֲשֶׁ֥ר הָיָ֖ה
    בִּ/ימֵ֣י אַבְרָהָ֑ם וַ/יֵּ֧לֶךְ יִצְחָ֛ק אֶל אֲבִימֶּ֥לֶךְ מֶֽלֶךְ פְּלִשְׁתִּ֖ים
    גְּרָֽרָ/ה־־׃
translation:
  text: Now there was a famine in the land, besides the first famine that had been
    in the days of Abraham. So Isaac went to Abimelech king of the Philistines at
    Gerar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to Gerar." The Hebrew form Gerarah includes a directional ending, which
      can explicitly mark movement toward Gerar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: HALOT
  rationale: Wayyiqtol of היה introduces a new narrative circumstance. 'Now there
    was' gives natural English scene-setting while preserving the sequential/narrative
    force better than a bare existential.
- source_word: רָעָב
  chosen: a famine
  alternatives:
  - famine
  lexicon: HALOT
  rationale: Standard rendering for scarcity of food; indefinite in English fits the
    first mention in this verse.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/earth
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the local land/region, not the whole earth. 'Land'
    is the most natural and biblically consistent rendering in Genesis narrative.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks exception/comparison with an earlier famine. 'Besides' is concise
    and idiomatic.
- source_word: הָרָעָב הָרִאשׁוֹן
  chosen: the first famine
  alternatives:
  - the earlier famine
  - the former famine
  lexicon: HALOT
  rationale: The adjective רִאשׁוֹן is ordinal here. 'The first famine' preserves
    the Hebrew wording straightforwardly.
- source_word: אֲשֶׁר הָיָה בִּימֵי אַבְרָהָם
  chosen: that had been in the days of Abraham
  alternatives:
  - which occurred in Abraham's days
  - that was in the days of Abraham
  lexicon: HALOT
  rationale: Relative clause identifies the earlier famine by reference to Abraham's
    lifetime. Pluperfect 'had been' fits English narrative reference to an earlier
    past event.
- source_word: וַיֵּלֶךְ
  chosen: So Isaac went
  alternatives:
  - And Isaac went
  - Then Isaac went
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So' communicates consequential movement
    from the famine circumstance without overinterpreting causation.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition with a personal object.
- source_word: אֲבִימֶּלֶךְ
  chosen: Abimelech
  rationale: Personal name is transliterated per project philosophy.
- source_word: מֶלֶךְ פְּלִשְׁתִּים
  chosen: king of the Philistines
  alternatives:
  - Philistine king
  lexicon: HALOT
  rationale: Construct chain is most transparently rendered with 'king of the Philistines.'
- source_word: גְּרָרָה
  chosen: at Gerar
  alternatives:
  - to Gerar
  lexicon: HALOT
  rationale: The directional he on גְּרָרָה can be rendered 'to Gerar,' but in English
    with אֶל Abimelech as the primary complement, 'at Gerar' naturally identifies
    Abimelech's location. The destination sense remains implicit in 'went to Abimelech
    ... at Gerar.'
