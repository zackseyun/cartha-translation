- issue: Historical/ethnic designation פְּלִשְׁתִּים
  chosen_reading: Philistines
  alternative_readings:
  - Philistine people
  rationale: This is a straightforward ethnic-political designation in the narrative,
    not a theological title. The conventional transliteration 'Philistines' is clear
    and accurate.
