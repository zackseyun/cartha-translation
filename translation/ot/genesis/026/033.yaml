id: GEN.26.33
reference: Genesis 26:33
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א אֹתָ֖/הּ שִׁבְעָ֑ה עַל כֵּ֤ן שֵׁם הָ/עִיר֙ בְּאֵ֣ר שֶׁ֔בַע עַ֖ד
    הַ/יּ֥וֹם הַ/זֶּֽה־־׃ס
translation:
  text: And he called it Shibah; therefore the name of the city is Beersheba to this
    day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shibah sounds like the Hebrew word for 'seven' and is related to the wordplay
      behind Beersheba, which can be understood as 'Well of Seven' or 'Well of the
      Oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: The verb קרא with a direct object in naming contexts commonly means 'call/name.'
    'Called' preserves the Hebrew wording while remaining natural English.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The feminine singular object pronoun refers to the well just mentioned
    in context. English idiom uses 'it' for an inanimate object.
- source_word: שִׁבְעָה
  chosen: Shibah
  alternatives:
  - Seven
  - Oath
  lexicon: HALOT
  rationale: As a naming formula, this is best transliterated as a place/well name
    rather than translated. The Hebrew form echoes 'seven' and likely 'oath,' which
    is important for the wordplay with Beersheba but should not be flattened in the
    main text.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - thereupon
  lexicon: HALOT
  rationale: This idiom introduces the explanatory conclusion linking the naming of
    the well to the city's name. 'Therefore' is concise and natural.
- source_word: שֵׁם הָעִיר
  chosen: the name of the city
  alternatives:
  - the city's name
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct phrase, preserving
    the explanatory style of the Hebrew.
- source_word: בְּאֵר שֶׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  - Well of Seven
  - Well of the Oath
  lexicon: HALOT
  rationale: This is a proper place name and should be transliterated per project
    philosophy. Because the Hebrew name carries a likely double sense ('well of seven'
    / 'well of oath'), the alternatives are preserved in a footnote rather than translated
    in the main text.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English rendering of the Hebrew temporal
    expression and fits the narrative register well.
