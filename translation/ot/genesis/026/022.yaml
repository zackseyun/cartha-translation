id: GEN.26.22
reference: Genesis 26:22
source:
  edition: WLC
  text: וַ/יַּעְתֵּ֣ק מִ/שָּׁ֗ם וַ/יַּחְפֹּר֙ בְּאֵ֣ר אַחֶ֔רֶת וְ/לֹ֥א רָב֖וּ עָלֶ֑י/הָ וַ/יִּקְרָ֤א שְׁמָ/הּ֙ רְחֹב֔וֹת וַ/יֹּ֗אמֶר כִּֽי עַתָּ֞ה הִרְחִ֧יב יְהוָ֛ה לָ֖/נוּ וּ/פָרִ֥ינוּ בָ/אָֽרֶץ־׃
translation:
  text: He moved from there and dug another well, and they did not quarrel over it. So he called its name Rehoboth, and said, “For now Yahweh has made room for us, and we will be fruitful in the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Rehoboth sounds like the Hebrew for ''broad places'' or ''wide spaces''; Isaac''s explanation plays on that meaning: ''the LORD has made room for us.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעְתֵּק
  chosen: He moved
  alternatives:
  - He moved away
  - He relocated
  - He pulled up from there
  lexicon: HALOT
  rationale: The verb from עתק in this context refers to Isaac's moving on from one location to another. 'He moved' is natural modern English and preserves the narrative action without over-specifying the manner.
- source_word: בְּאֵר אַחֶרֶת
  chosen: another well
  alternatives:
  - a different well
  lexicon: HALOT
  rationale: Straightforward nominal phrase; 'another well' is the most idiomatic equivalent.
- source_word: וְלֹא רָבוּ עָלֶיהָ
  chosen: they did not quarrel over it
  alternatives:
  - they did not contend over it
  - they did not strive over it
  - they did not dispute about it
  lexicon: HALOT
  rationale: ריב commonly denotes contention or quarrelling. 'Quarrel over it' fits the immediate context of disputes over wells and reads naturally in English.
- source_word: וַיִּקְרָא שְׁמָהּ רְחֹבוֹת
  chosen: he called its name Rehoboth
  alternatives:
  - he named it Rehoboth
  lexicon: HALOT
  rationale: The more formal Hebrew naming formula is preserved in a readable way. 'Its' refers to the well, matching the feminine suffix in Hebrew by English idiom rather than grammatical gender.
- source_word: רְחֹבוֹת
  chosen: Rehoboth
  alternatives:
  - Broad Places
  - Wide Spaces
  lexicon: HALOT
  rationale: As a place-name, it should be transliterated per project philosophy. Its meaning is reflected in Isaac's explanation, so the name itself need not be translated in the main text.
- source_word: כִּי עַתָּה הִרְחִיב יְהוָה לָנוּ
  chosen: For now the LORD has made room for us
  alternatives:
  - For now the LORD has broadened things for us
  - For now the LORD has given us spaciousness
  - For now the LORD has enlarged us
  lexicon: HALOT
  rationale: The hiphil of רחב here conveys making space or giving room. 'Has made room for us' is idiomatic English and preserves the wordplay with Rehoboth. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: וּפָרִינוּ בָאָרֶץ
  chosen: and we will be fruitful in the land
  alternatives:
  - and we will multiply in the land
  - and we will prosper in the land
  lexicon: HALOT
  rationale: פרה means to be fruitful, often with connotations of increase. 'Be fruitful' best preserves the lexical sense and possible resonance with covenant blessing language, while 'in the land' keeps the concrete territorial sense of אָרֶץ in context.
- source_word: בָאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: In Genesis, 'the land' often carries covenant-land resonance and is more specific than the generic 'earth.' Here it refers to the land where Isaac dwells.
