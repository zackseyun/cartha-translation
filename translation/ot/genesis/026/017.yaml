id: GEN.26.17
reference: Genesis 26:17
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ מִ/שָּׁ֖ם יִצְחָ֑ק וַ/יִּ֥חַן בְּ/נַֽחַל גְּרָ֖ר וַ/יֵּ֥שֶׁב שָֽׁם־׃
translation:
  text: So Isaac went away from there and camped in the Valley of Gerar, and settled
    there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “wadi of Gerar.” The Hebrew term can refer to a seasonal streambed, ravine,
      or valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: HALOT
  rationale: הלך in the waw-consecutive narrative form denotes movement/departure.
    'Went away' brings out the sense of leaving the previous location in response
    to the preceding context, while remaining natural English.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: The adverbial phrase straightforwardly marks departure from the prior
    location. 'From there' is the most natural and direct rendering.
- source_word: וַיִּחַן
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: חנה commonly refers to setting up camp. 'Camped' is modern and readable;
    'encamped' is more formal/archaic, and 'pitched camp' is slightly more expansive
    than the Hebrew verb alone.
- source_word: בְּנַחַל גְּרָר
  chosen: in the Valley of Gerar
  alternatives:
  - in the wadi of Gerar
  - in the ravine of Gerar
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, or valley. For accessible modern
    English, 'Valley of Gerar' best communicates a geographic region without requiring
    specialized knowledge. The article is not explicit in Hebrew, but English idiom
    favors 'the Valley of Gerar' for a named locale.
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - dwelt
  - lived
  - stayed
  lexicon: HALOT
  rationale: ישב often means to sit, dwell, or settle. In sequence after 'camped,'
    'settled' conveys taking up residence there, preserving the narrative progression
    better than the more static 'stayed' and the more archaic 'dwelt'.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: A simple locative adverb referring back to the Valley of Gerar; 'there'
    is the direct equivalent.
