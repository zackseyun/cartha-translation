theological_decisions:
- issue: Nature of אָשָׁם in this context
  chosen_reading: guilt
  alternative_readings:
  - blame
  - offense
  rationale: The verse concerns objective culpability that would have fallen on Abimelech's
    household/people through unwitting sexual sin, not merely reputational blame.
    'Guilt' best preserves the moral-religious force of the Hebrew without importing
    later sacrificial terminology into the main text.
  doctrine_reference: Translation philosophy §1, §5
