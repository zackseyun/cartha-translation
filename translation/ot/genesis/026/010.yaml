id: GEN.26.10
reference: Genesis 26:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲבִימֶ֔לֶךְ מַה זֹּ֖את עָשִׂ֣יתָ לָּ֑/נוּ כִּ֠/מְעַט שָׁכַ֞ב
    אַחַ֤ד הָ/עָם֙ אֶת אִשְׁתֶּ֔/ךָ וְ/הֵבֵאתָ֥ עָלֵ֖י/נוּ אָשָֽׁם־־׃
translation:
  text: And Abimelech said, “What is this you have done to us? One of the people might
    easily have lain with your wife, and you would have brought guilt upon us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “almost”: “One of the people almost lay with your wife.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה זֹּאת עָשִׂיתָ לָּנוּ
  chosen: What is this you have done to us?
  alternatives:
  - What have you done to us?
  - What is this you have done to us?
  lexicon: HALOT
  rationale: Retains the Hebrew exclamatory construction with מַה זֹּאת while producing
    natural English. Including 'to us' preserves the communal object לָּנוּ.
- source_word: כִּמְעַט
  chosen: might easily have
  alternatives:
  - almost
  - nearly
  lexicon: HALOT
  rationale: 'In context כִּמְעַט introduces a near-occurrence: Abimelech warns that
    the act was close to happening. ''Might easily have'' captures both the near miss
    and the danger in idiomatic English better than the more wooden ''almost,'' while
    staying within the source sense.'
- source_word: שָׁכַב ... אֶת אִשְׁתֶּךָ
  chosen: have lain with your wife
  alternatives:
  - have slept with your wife
  - have had intercourse with your wife
  lexicon: HALOT
  rationale: שָׁכַב with אֶת plus a sexual partner is a standard idiom for sexual
    relations. 'Lain with' is clear, dignified, and closer to the Hebrew idiom than
    the more colloquial 'slept with.'
- source_word: אַחַד הָעָם
  chosen: one of the people
  alternatives:
  - one of the men
  - someone among the people
  lexicon: HALOT
  rationale: Literally 'one of the people.' This preserves the indefinite singular
    plus collective noun without narrowing הָעָם to 'men' beyond what the Hebrew explicitly
    states, even though the sexual context implies a male individual.
- source_word: וְהֵבֵאתָ עָלֵינוּ אָשָׁם
  chosen: and you would have brought guilt upon us
  alternatives:
  - and you would have brought blame upon us
  - and you would have brought trespass upon us
  lexicon: HALOT
  rationale: אָשָׁם here denotes incurred guilt/liability rather than merely social
    blame. 'Brought guilt upon us' communicates moral and covenantal culpability in
    accessible English.
- source_word: וַיֹּאמֶר אֲבִימֶלֶךְ
  chosen: And Abimelech said
  alternatives:
  - Then Abimelech said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol rendered simply as 'And ... said' to preserve
    Hebrew narrative flow without overinterpreting sequence.
