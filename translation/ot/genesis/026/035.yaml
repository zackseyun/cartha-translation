id: GEN.26.35
reference: Genesis 26:35
source:
  edition: WLC
  text: וַ/תִּהְיֶ֖יןָ מֹ֣רַת ר֑וּחַ לְ/יִצְחָ֖ק וּ/לְ/רִבְקָֽה׃ס
translation:
  text: And they were a bitterness of spirit to Isaac and Rebekah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they became bitterness of spirit to Isaac and Rebekah.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew idiom 'bitterness of spirit' expresses deep vexation or grief.
    reason: cultural_note
  - marker: c
    text: Or 'to Isaac and to Rebekah'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּהְיֶיןָ
  chosen: And they were
  alternatives:
  - and they became
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fp of היה introduces the narrative continuation and predicates
    a state of the feminine plural subject from the previous verse (Esau's wives).
    English 'were' is the most natural rendering here, though 'became' is possible.
- source_word: מֹרַת
  chosen: a bitterness
  alternatives:
  - bitterness
  - a source of bitterness
  - grief
  lexicon: HALOT
  rationale: Construct form from מר/מֹרָה denotes bitterness or vexation. 'A bitterness'
    preserves the nominal expression and its concrete force better than the more interpretive
    'grief.'
- source_word: רוּחַ
  chosen: of spirit
  alternatives:
  - of mind
  - of heart
  lexicon: HALOT
  rationale: רוּחַ here refers to the inner disposition or spirit. 'Of spirit' keeps
    the Hebrew idiom intact; alternatives such as 'mind' or 'heart' are interpretive
    and less formally aligned.
- source_word: לְיִצְחָק
  chosen: to Isaac
  alternatives:
  - for Isaac
  lexicon: HALOT
  rationale: The preposition ל marks the affected party. 'To Isaac' is idiomatic in
    English with this predicate construction and preserves the relational sense.
- source_word: וּלְרִבְקָה
  chosen: and to Rebekah
  alternatives:
  - and for Rebekah
  lexicon: HALOT
  rationale: Same prepositional function as with Isaac. 'Rebekah' follows standard
    English transliteration of the personal name.
