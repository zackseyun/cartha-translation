id: GEN.26.30
reference: Genesis 26:30
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ לָ/הֶם֙ מִשְׁתֶּ֔ה וַ/יֹּאכְל֖וּ וַ/יִּשְׁתּֽוּ׃
translation:
  text: And he prepared a feast for them, and they ate and drank.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'banquet'; the Hebrew term can denote a feast with drinking as a notable
      element.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: prepared
  alternatives:
  - made
  lexicon: HALOT
  rationale: The verb עשה literally means 'made/did,' but with מִשְׁתֶּה as its object,
    idiomatic English is better served by 'prepared' rather than the wooden 'made.'
    This preserves the sense of arranging or providing a meal occasion.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition ל here marks the beneficiaries of the action. 'For them'
    is the natural English rendering in this context.
- source_word: מִשְׁתֶּה
  chosen: feast
  alternatives:
  - banquet
  - drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a banquet or feast, often with drinking as a prominent
    feature. 'Feast' is natural modern English and fits the following verbs 'ate and
    drank.' 'Drinking feast' is more literal in nuance but awkward in English; the
    drinking element is already explicit in the verse.
- source_word: וַיֹּאכְלוּ
  chosen: they ate
  alternatives:
  - and they ate
  lexicon: HALOT
  rationale: Straightforward rendering of the wayyiqtol verb אכל. The conjunction
    is represented in the sentence structure.
- source_word: וַיִּשְׁתּוּ
  chosen: and drank
  alternatives:
  - and they drank
  lexicon: HALOT
  rationale: Straightforward rendering of the wayyiqtol verb שתה. English style naturally
    omits the repeated subject while preserving the coordinated action.
