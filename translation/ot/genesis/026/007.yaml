id: GEN.26.7
reference: Genesis 26:7
source:
  edition: WLC
  text: וַֽ/יִּשְׁאֲל֞וּ אַנְשֵׁ֤י הַ/מָּקוֹם֙ לְ/אִשְׁתּ֔/וֹ וַ/יֹּ֖אמֶר אֲחֹ֣תִ/י
    הִ֑וא כִּ֤י יָרֵא֙ לֵ/אמֹ֣ר אִשְׁתִּ֔/י פֶּן יַֽהַרְגֻ֜/נִי אַנְשֵׁ֤י הַ/מָּקוֹם֙
    עַל רִבְקָ֔ה כִּֽי טוֹבַ֥ת מַרְאֶ֖ה הִֽיא־־־׃
translation:
  text: When the men of the place asked about his wife, he said, “She is my sister,”
    because he was afraid to say, “She is my wife,” lest the men of the place kill
    me because of Rebekah, because she was beautiful in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for fear that the men of the place would kill me because of Rebekah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאֲלוּ
  chosen: asked
  alternatives:
  - inquired
  - questioned
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁאל here introduces a straightforward inquiry. 'Asked'
    is natural modern English and sufficiently formal.
- source_word: אַנְשֵׁי הַמָּקוֹם
  chosen: the men of the place
  alternatives:
  - the men of that place
  - the local men
  - the people of the place
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of,' not the more general 'people.' This
    preserves the masculine reference in line with the gender-accurate policy. 'Of
    the place' is slightly more literal than 'of that place' and reads naturally.
- source_word: לְאִשְׁתּוֹ
  chosen: about his wife
  alternatives:
  - concerning his wife
  lexicon: HALOT
  rationale: The preposition ל with שׁאל in this context indicates the subject matter
    of inquiry. English idiom prefers 'asked about his wife.'
- source_word: אֲחֹתִי הִוא
  chosen: She is my sister
  alternatives:
  - My sister is she
  lexicon: HALOT
  rationale: Direct speech rendered in natural English while preserving the predicative
    identification.
- source_word: כִּי יָרֵא
  chosen: because he was afraid
  alternatives:
  - for he feared
  lexicon: HALOT
  rationale: כִּי gives the reason for Isaac's statement. 'Was afraid' is clear modern
    English; 'feared' is possible but slightly stiffer.
- source_word: לֵאמֹר
  chosen: to say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Infinitive of אמר after ירא expresses what he was afraid to say. 'To
    say' is the most natural English equivalent.
- source_word: אִשְׁתִּי
  chosen: She is my wife
  alternatives:
  - my wife
  lexicon: HALOT
  rationale: Though the Hebrew only gives 'my wife' after 'to say,' English requires
    the implied predicate for smooth direct discourse.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - for fear that
  lexicon: HALOT
  rationale: פֶּן introduces a feared consequence. 'Lest' is concise and accurate,
    though somewhat elevated; it remains readable here and preserves the nuance well.
- source_word: יַהַרְגֻנִי
  chosen: kill me
  alternatives:
  - slay me
  - murder me
  lexicon: HALOT
  rationale: הרג is the common verb 'kill.' 'Murder me' would over-specify legal/moral
    nuance not explicit in the verb itself.
- source_word: עַל רִבְקָה
  chosen: because of Rebekah
  alternatives:
  - on account of Rebekah
  - for Rebekah
  lexicon: HALOT
  rationale: עַל here marks the cause or occasion. 'Because of Rebekah' is idiomatic
    and clear.
- source_word: טוֹבַת מַרְאֶה
  chosen: beautiful in appearance
  alternatives:
  - good-looking
  - fair to look upon
  - attractive in appearance
  lexicon: HALOT
  rationale: The phrase literally denotes pleasing appearance. 'Beautiful in appearance'
    preserves the Hebrew sense without archaic phrasing like 'fair to look upon.'
- source_word: רִבְקָה
  chosen: Rebekah
  alternatives:
  - Rebecca
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Rebekah'
    closely reflects the Hebrew form רִבְקָה.
