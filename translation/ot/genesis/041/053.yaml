id: GEN.41.53
reference: Genesis 41:53
source:
  edition: WLC
  text: וַ/תִּכְלֶ֕ינָה שֶׁ֖בַע שְׁנֵ֣י הַ/שָּׂבָ֑ע אֲשֶׁ֥ר הָיָ֖ה בְּ/אֶ֥רֶץ מִצְרָֽיִם׃
translation:
  text: Then the seven years of abundance that had been in the land of Egypt came
    to an end.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּכְלֶינָה
  chosen: came to an end
  alternatives:
  - were finished
  - ended
  lexicon: HALOT
  rationale: From כלה in the wayyiqtol, feminine plural agreeing with 'years.' 'Came
    to an end' is natural modern English and preserves the sense of completion without
    sounding wooden.
- source_word: שֶׁבַע
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'years.'
- source_word: שְׁנֵי
  chosen: years of
  alternatives:
  - years
  lexicon: HALOT
  rationale: Construct form of 'years' governing the following noun phrase. In English,
    'years of abundance' best reflects the Hebrew construct relationship.
- source_word: הַשָּׂבָע
  chosen: abundance
  alternatives:
  - plenty
  - fullness
  lexicon: HALOT
  rationale: Refers to the period of plentiful harvests in Joseph's interpretation.
    'Abundance' is clear and suitably formal; 'plenty' is possible but slightly less
    elevated.
- source_word: אֲשֶׁר הָיָה
  chosen: that had been
  alternatives:
  - which was
  - that was
  lexicon: HALOT
  rationale: Relative clause describing the completed period. English past perfect
    fits the narrative sequence, since the years are now ending.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ explicitly as 'land,' which is a meaningful element of
    the Hebrew phrasing and idiomatic in English narrative.
