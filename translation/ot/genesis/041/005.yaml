id: GEN.41.5
reference: Genesis 41:5
source:
  edition: WLC
  text: וַ/יִּישָׁ֕ן וַֽ/יַּחֲלֹ֖ם שֵׁנִ֑ית וְ/הִנֵּ֣ה שֶׁ֣בַע שִׁבֳּלִ֗ים עֹל֛וֹת
    בְּ/קָנֶ֥ה אֶחָ֖ד בְּרִיא֥וֹת וְ/טֹבֽוֹת׀׃
translation:
  text: Then he slept and dreamed a second time, and behold, seven ears of grain were
    coming up on one stalk, plump and good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven heads of grain.' The Hebrew term can refer to the grain-bearing
      head or ear.
    reason: lexical_alternative
  - marker: b
    text: Or 'healthy and good' or 'full and good.' The first adjective describes
      the ears as well-filled.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּישָׁן
  chosen: Then he slept
  alternatives:
  - And he slept
  - So he slept
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then he slept' gives natural English
    sequence while preserving the simple verbal sense of sleeping.
- source_word: וַיַּחֲלֹם שֵׁנִית
  chosen: dreamed a second time
  alternatives:
  - dreamed again
  - had a second dream
  lexicon: HALOT
  rationale: שֵׁנִית is an adverbial feminine form meaning 'a second time.' 'Dreamed
    a second time' closely reflects the Hebrew while remaining idiomatic.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation within the dream report. 'Behold' preserves
    the discourse force better than a flattened omission, and remains acceptable in
    narrative style.
- source_word: שֶׁבַע שִׁבֳּלִים
  chosen: seven ears of grain
  alternatives:
  - seven heads of grain
  - seven ears
  lexicon: HALOT
  rationale: שִׁבֳּלִים refers to grain heads/ears. 'Ears of grain' is clear modern
    English and fits the agricultural imagery. 'Heads' is possible, but 'ears' is
    a standard and precise rendering in this context.
- source_word: עֹלֹת
  chosen: were coming up
  alternatives:
  - came up
  - sprouting up
  - growing up
  lexicon: HALOT
  rationale: The participle conveys ongoing or vivid action in the dream scene. 'Were
    coming up' preserves that progressive sense better than the simple past 'came
    up.'
- source_word: בְּקָנֶה אֶחָד
  chosen: on one stalk
  alternatives:
  - from one stalk
  - on a single stalk
  - in one stalk
  lexicon: HALOT
  rationale: קָנֶה is a stalk/reed-like stem. With the preposition בְּ, English idiom
    is best expressed as 'on one stalk,' describing multiple ears growing from a single
    stem.
- source_word: בְּרִיאוֹת
  chosen: plump
  alternatives:
  - healthy
  - fat
  - full
  lexicon: HALOT
  rationale: The adjective denotes fatness or well-filled condition. For grain, 'plump'
    is the most natural English equivalent, avoiding the awkwardness of 'fat' for
    ears of grain while preserving the sense of fullness.
- source_word: וְטֹבוֹת
  chosen: and good
  alternatives:
  - and fine
  - and beautiful
  lexicon: HALOT
  rationale: טוֹב is broad, meaning good, pleasing, or fine. 'Good' is the most direct
    rendering and leaves the evaluative breadth intact; in context it describes the
    quality of the grain.
