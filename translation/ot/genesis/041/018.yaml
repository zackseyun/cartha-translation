id: GEN.41.18
reference: Genesis 41:18
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה מִן הַ/יְאֹ֗ר עֹלֹת֙ שֶׁ֣בַע פָּר֔וֹת בְּרִיא֥וֹת בָּשָׂ֖ר וִ/יפֹ֣ת
    תֹּ֑אַר וַ/תִּרְעֶ֖ינָה בָּ/אָֽחוּ־׃
translation:
  text: And behold, seven cows were coming up from the Nile, healthy in flesh and
    beautiful in form, and they grazed in the reeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the river'; in this Egyptian context, the Hebrew יְאֹר most naturally
      refers to the Nile.
    reason: lexical_alternative
  - marker: b
    text: Or 'fat-fleshed' or 'well-fed'; the Hebrew literally describes them as sound
      or full in flesh.
    reason: lexical_alternative
  - marker: c
    text: Or 'among the rushes' or 'in the marsh grass'; the Hebrew refers to Nile-side
      wetland vegetation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Then behold
  lexicon: HALOT
  rationale: Retains the vivid discourse marker introducing the dream scene. 'Behold'
    is slightly formal but still readable and preserves the suddenness better than
    omitting it.
- source_word: מִן הַיְאֹר
  chosen: from the Nile
  alternatives:
  - from the river
  lexicon: HALOT
  rationale: יְאֹר in Genesis' Egyptian setting refers specifically to the Nile rather
    than a generic river. Using 'the Nile' reflects source-context primacy over a
    more wooden 'the river'.
- source_word: עֹלֹת
  chosen: were coming up
  alternatives:
  - came up
  - were ascending
  lexicon: HALOT
  rationale: The participle conveys ongoing action in the dream report; 'were coming
    up' captures the scene more naturally in English than the more literal but stiffer
    'ascending.'
- source_word: שֶׁבַע פָּרוֹת
  chosen: seven cows
  alternatives:
  - seven cattle
  lexicon: HALOT
  rationale: פָּרוֹת specifically denotes female bovines. 'Cows' is more precise and
    natural than the broader 'cattle'.
- source_word: בְּרִיאוֹת בָּשָׂר
  chosen: healthy in flesh
  alternatives:
  - fat-fleshed
  - well-fed
  - robust in body
  lexicon: HALOT
  rationale: Literally the phrase describes bodily soundness/fullness. 'Healthy in
    flesh' preserves the Hebrew imagery without overinterpreting it as merely 'fat'
    or 'well-fed.'
- source_word: וִיפֹת תֹּאַר
  chosen: beautiful in form
  alternatives:
  - fine in appearance
  - beautiful in appearance
  lexicon: HALOT
  rationale: A common Hebrew expression for attractive appearance or shapely form.
    'Beautiful in form' is concise and close to the Hebrew wording.
- source_word: וַתִּרְעֶינָה
  chosen: and they grazed
  alternatives:
  - and they fed
  - and they pastured
  lexicon: HALOT
  rationale: From רעה in the sense of grazing/pasturing. 'Grazed' is the most natural
    English rendering for animals feeding in a marsh setting.
- source_word: בָּאָחוּ
  chosen: in the reeds
  alternatives:
  - in the marsh grass
  - in the meadow
  - among the rushes
  lexicon: HALOT
  rationale: The term refers to marsh vegetation by the Nile. 'In the reeds' is clear,
    natural, and fits the Egyptian riverbank context; 'meadow' is too generic and
    can lose the wetland nuance.
