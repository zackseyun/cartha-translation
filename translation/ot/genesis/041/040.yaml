id: GEN.41.40
reference: Genesis 41:40
source:
  edition: WLC
  text: אַתָּה֙ תִּהְיֶ֣ה עַל בֵּיתִ֔/י וְ/עַל פִּ֖י/ךָ יִשַּׁ֣ק כָּל עַמִּ֑/י רַ֥ק
    הַ/כִּסֵּ֖א אֶגְדַּ֥ל מִמֶּֽ/ךָּ־־־׃
translation:
  text: You shall be over my house, and all my people shall obey your command. Only
    with respect to the throne will I be greater than you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and at your mouth all my people shall kiss.' The expression
      is commonly understood here as obeying or rendering homage at Joseph's command.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל בֵּיתִי
  chosen: over my house
  alternatives:
  - in charge of my house
  - over my household
  lexicon: HALOT
  rationale: The preposition עַל with בית here indicates authority or oversight. 'House'
    is retained in the main text as a natural but still formally close rendering that
    can include both palace administration and household domain.
- source_word: פִּיךָ
  chosen: your command
  alternatives:
  - your mouth
  - your word
  lexicon: HALOT
  rationale: Literally 'your mouth,' but in the idiom וְעַל־פִּיךָ ... the sense is
    governance according to Joseph's spoken directive. 'Your command' communicates
    the idiomatic force in clear English better than the overly literal 'your mouth,'
    while 'your word' is possible but slightly less explicit in an administrative
    context.
- source_word: יִשַּׁק
  chosen: shall obey
  alternatives:
  - shall kiss
  - shall submit themselves
  lexicon: HALOT
  rationale: The verb נָשַׁק normally means 'kiss,' but in this construction many
    understand an idiomatic sense of rendering homage or obedience. Given the context
    of Pharaoh delegating authority, 'shall obey' best captures the practical meaning.
    The more literal alternative is preserved in a footnote because the Hebrew form
    can be read that way.
- source_word: כָּל עַמִּי
  chosen: all my people
  alternatives:
  - all my nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the collective sense. 'All my people'
    is the most direct and natural rendering in context.
- source_word: רַק
  chosen: Only
  alternatives:
  - except that
  - merely
  lexicon: HALOT
  rationale: רַק marks an exception or limitation. 'Only' is concise and idiomatic
    in English.
- source_word: הַכִּסֵּא
  chosen: the throne
  alternatives:
  - the royal throne
  lexicon: HALOT
  rationale: כִּסֵּא is literally 'throne.' The definite form points to Pharaoh's
    royal office. 'The throne' is sufficient without adding interpretive expansion.
- source_word: אֶגְדַּל מִמֶּךָּ
  chosen: will I be greater than you
  alternatives:
  - I will outrank you
  - I will be above you
  lexicon: HALOT
  rationale: גדל with מן expresses superiority. The phrase refers to Pharaoh's sole
    remaining superiority over Joseph. 'Will I be greater than you' stays close to
    the Hebrew while remaining understandable; the throne phrase clarifies that this
    greatness is positional, not moral.
