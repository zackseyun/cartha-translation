theological_decisions:
- issue: Reference of אֱלֹהִים in Pharaoh's speech
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: Although אֱלֹהִים can be morphologically plural in some contexts, here
    the immediate context presents Pharaoh acknowledging the deity who revealed the
    interpretation to Joseph. English singular 'God' best reflects the contextual
    sense and the Hebrew usage here.
