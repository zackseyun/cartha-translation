id: GEN.41.6
reference: Genesis 41:6
source:
  edition: WLC
  text: וְ/הִנֵּה֙ שֶׁ֣בַע שִׁבֳּלִ֔ים דַּקּ֖וֹת וּ/שְׁדוּפֹ֣ת קָדִ֑ים צֹמְח֖וֹת אַחֲרֵי/הֶֽן׃
translation:
  text: And behold, seven thin ears of grain, scorched by the east wind, were sprouting
    after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blasted by the east wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Then behold
  lexicon: HALOT
  rationale: Retains the vivid narrative marker introducing a new dream image. 'Behold'
    is slightly formal but still readable and preserves the suddenness better than
    omitting it.
- source_word: שֶׁבַע
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: שִׁבֳּלִים
  chosen: ears of grain
  alternatives:
  - heads of grain
  - stalks of grain
  lexicon: HALOT
  rationale: Refers to grain heads/ears in Pharaoh's dream. 'Ears of grain' is idiomatic
    English and more precise than 'stalks,' which would refer to the whole plant.
- source_word: דַּקּוֹת
  chosen: thin
  alternatives:
  - lean
  - scrawny
  lexicon: HALOT
  rationale: Describes the ears as thin or meager. 'Thin' is the most direct and natural
    rendering in this agricultural image.
- source_word: וּשְׁדוּפֹת קָדִים
  chosen: scorched by the east wind
  alternatives:
  - blasted by the east wind
  - blighted by the east wind
  lexicon: HALOT
  rationale: The participle denotes being blasted/scorched, and קָדִים is the east
    wind, often hot and destructive in the region. 'Scorched' communicates the physical
    effect clearly in modern English.
- source_word: צֹמְחֹת
  chosen: were sprouting
  alternatives:
  - sprouted
  - were growing
  lexicon: HALOT
  rationale: A participle describing the action in progress within the dream scene.
    'Were sprouting' preserves the visual immediacy better than the simple past.
- source_word: אַחֲרֵיהֶן
  chosen: after them
  alternatives:
  - behind them
  lexicon: HALOT
  rationale: Refers to the seven healthy ears in the previous verse. 'After them'
    fits both temporal sequence in the dream and spatial succession in the image.
