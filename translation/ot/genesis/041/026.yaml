id: GEN.41.26
reference: Genesis 41:26
source:
  edition: WLC
  text: שֶׁ֧בַע פָּרֹ֣ת הַ/טֹּבֹ֗ת שֶׁ֤בַע שָׁנִים֙ הֵ֔נָּה וְ/שֶׁ֤בַע הַֽ/שִּׁבֳּלִים֙
    הַ/טֹּבֹ֔ת שֶׁ֥בַע שָׁנִ֖ים הֵ֑נָּה חֲל֖וֹם אֶחָ֥ד הֽוּא׃
translation:
  text: The seven good cows are seven years, and the seven good ears of grain are
    seven years; it is one dream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heads of grain.' The Hebrew term refers to the grain-bearing top part
      of the stalk.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרֹת
  chosen: cows
  alternatives:
  - cattle
  lexicon: HALOT
  rationale: Refers specifically to female bovines in Pharaoh's dream. 'Cows' is the
    natural and precise English equivalent, more specific than 'cattle.'
- source_word: הַטֹּבֹת
  chosen: good
  alternatives:
  - fine
  - healthy
  lexicon: HALOT
  rationale: The adjective means 'good' broadly. In this explanatory statement, 'good'
    preserves the direct correspondence with the dream imagery without over-interpreting
    it as merely physical appearance.
- source_word: שָׁנִים
  chosen: years
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; the dream symbols are explicitly
    interpreted as years.
- source_word: שִׁבֳּלִים
  chosen: ears of grain
  alternatives:
  - heads of grain
  - ears
  lexicon: HALOT
  rationale: The Hebrew denotes grain heads/ears. 'Ears of grain' is clear in modern
    English and avoids ambiguity that bare 'ears' could create.
- source_word: חֲלוֹם אֶחָד הוּא
  chosen: it is one dream
  alternatives:
  - they are one dream
  - the dream is one
  lexicon: HALOT
  rationale: The Hebrew singular predicate emphasizes that the two symbolic sequences
    belong to a single unified dream-message. 'It is one dream' is idiomatic English
    that preserves the singular emphasis.
- source_word: הֵנָּה
  chosen: are
  alternatives:
  - they are
  lexicon: HALOT
  rationale: The feminine plural pronoun functions as the copular element in Hebrew.
    English expresses this naturally with 'are' rather than repeating an explicit
    pronoun each time.
