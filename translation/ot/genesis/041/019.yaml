id: GEN.41.19
reference: Genesis 41:19
source:
  edition: WLC
  text: וְ/הִנֵּ֞ה שֶֽׁבַע פָּר֤וֹת אֲחֵרוֹת֙ עֹל֣וֹת אַחֲרֵי/הֶ֔ן דַּלּ֨וֹת וְ/רָע֥וֹת
    תֹּ֛אַר מְאֹ֖ד וְ/רַקּ֣וֹת בָּשָׂ֑ר לֹֽא רָאִ֧יתִי כָ/הֵ֛נָּה בְּ/כָל אֶ֥רֶץ מִצְרַ֖יִם
    לָ/רֹֽעַ־־־׃
translation:
  text: And behold, seven other cows came up after them, poor and very ugly in appearance
    and thin in flesh. I had not seen any like them in all the land of Egypt for badness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for ugliness' or 'for wretchedness'; the Hebrew expression summarizes
      how exceptionally bad-looking and miserable the cows were.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Then behold
  lexicon: HALOT
  rationale: Retains the vivid discourse marker introducing the next element of the
    dream report. 'Behold' is slightly formal but still readable and preserves the
    narrative force better than omitting it.
- source_word: פָּרוֹת
  chosen: cows
  alternatives:
  - cattle
  lexicon: HALOT
  rationale: In context of Pharaoh's dream, the specific female bovines are in view,
    not generic cattle. 'Cows' is the most natural and precise English rendering.
- source_word: אֲחֵרוֹת
  chosen: other
  alternatives:
  - another
  lexicon: HALOT
  rationale: Plural adjective modifying 'cows'; 'other' correctly reflects the plural
    set.
- source_word: עֹלֹת אַחֲרֵיהֶן
  chosen: came up after them
  alternatives:
  - were coming up after them
  - rose after them
  lexicon: HALOT
  rationale: The participle in dream narration is naturally rendered with an English
    finite verb. 'Came up after them' matches the movement imagery from the Nile scene
    in the broader context without over-literal stiffness.
- source_word: דַּלּוֹת
  chosen: poor
  alternatives:
  - gaunt
  - scrawny
  - thin
  lexicon: HALOT
  rationale: The adjective denotes a weak, meager condition. 'Poor' here conveys wretched
    physical condition and pairs well with the following descriptors. 'Thin' is reserved
    for the later phrase about flesh to avoid redundancy.
- source_word: וְרָעוֹת תֹּאַר מְאֹד
  chosen: very ugly in appearance
  alternatives:
  - very bad in appearance
  - very ugly of form
  lexicon: HALOT
  rationale: רָעוֹת with תֹאַר in this context describes unpleasant appearance rather
    than moral evil. 'Very ugly in appearance' communicates the visual sense clearly
    in modern English.
- source_word: וְרַקּוֹת בָּשָׂר
  chosen: thin in flesh
  alternatives:
  - lean-fleshed
  - gaunt in body
  lexicon: HALOT
  rationale: A fairly literal rendering that remains intelligible. It preserves the
    bodily emaciation emphasized by the Hebrew.
- source_word: לֹא רָאִיתִי כָהֵנָּה
  chosen: I had not seen any like them
  alternatives:
  - I had never seen the like of them
  - I had not seen such as these
  lexicon: HALOT
  rationale: English pluperfect fits the retrospective dream report. 'Any like them'
    idiomatically renders the comparison.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: in all the land of Egypt
  alternatives:
  - throughout the whole land of Egypt
  lexicon: HALOT
  rationale: Standard geographic expression; 'land of Egypt' is the natural biblical
    phrasing.
- source_word: לָרֹעַ
  chosen: for badness
  alternatives:
  - for ugliness
  - for wretchedness
  lexicon: HALOT
  rationale: 'This final infinitive-like/prepositional expression intensifies the
    preceding statement: they were unmatched in Egypt with respect to how bad they
    were. ''For badness'' is somewhat literal but preserves the broad evaluative force
    without narrowing it only to beauty or morality.'
