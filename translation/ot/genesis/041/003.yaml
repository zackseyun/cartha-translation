id: GEN.41.3
reference: Genesis 41:3
source:
  edition: WLC
  text: וְ/הִנֵּ֞ה שֶׁ֧בַע פָּר֣וֹת אֲחֵר֗וֹת עֹל֤וֹת אַחֲרֵי/הֶן֙ מִן הַ/יְאֹ֔ר רָע֥וֹת
    מַרְאֶ֖ה וְ/דַקּ֣וֹת בָּשָׂ֑ר וַֽ/תַּעֲמֹ֛דְנָה אֵ֥צֶל הַ/פָּר֖וֹת עַל שְׂפַ֥ת
    הַ/יְאֹֽר־־׃
translation:
  text: And behold, seven other cows came up after them from the Nile, ugly in appearance
    and thin in flesh, and they stood beside the cows on the bank of the Nile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river'' (יְאֹר), here referring specifically to the Nile
      in the Egyptian setting.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bad in appearance and thin of flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Then behold
  lexicon: HALOT
  rationale: Retains the vivid deictic/discourse-marking force of הִנֵּה in narrative.
    'Behold' is slightly elevated but still transparent and preserves the suddenness
    of the dream scene better than omitting it.
- source_word: פָּרוֹת
  chosen: cows
  alternatives:
  - cattle
  - heifers
  lexicon: HALOT
  rationale: The feminine plural refers specifically to female bovines, so 'cows'
    is more precise than the broader 'cattle.' 'Heifers' would be too specific, since
    age is not stated.
- source_word: אֲחֵרוֹת
  chosen: other
  alternatives:
  - another
  lexicon: HALOT
  rationale: Plural adjective modifying 'cows'; 'other' naturally conveys a second
    group distinct from the first seven.
- source_word: עֹלוֹת
  chosen: came up
  alternatives:
  - were coming up
  - ascended
  lexicon: HALOT
  rationale: In context of animals emerging from the river, 'came up' is idiomatic
    English and reflects the participial sense without awkwardness.
- source_word: אַחֲרֵיהֶן
  chosen: after them
  alternatives:
  - behind them
  lexicon: HALOT
  rationale: 'Temporal/sequential sense fits the dream sequence: the second set appears
    after the first.'
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: יְאֹר in Genesis' Egyptian setting refers specifically to the Nile. Translating
    it as 'the Nile' communicates the referent directly rather than preserving a generic
    'river' that obscures the setting.
- source_word: רָעוֹת מַרְאֶה
  chosen: ugly in appearance
  alternatives:
  - bad in appearance
  - evil-looking
  lexicon: HALOT
  rationale: The phrase describes unattractive appearance, not moral evil. 'Ugly in
    appearance' is natural modern English and matches the visual emphasis of the dream.
- source_word: דַקּוֹת בָּשָׂר
  chosen: thin in flesh
  alternatives:
  - gaunt
  - lean-fleshed
  - thin-bodied
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew imagery of bodily
    thinness. 'Gaunt' is possible, but 'thin in flesh' stays closer to the source
    wording and pairs well with the previous descriptive phrase.
- source_word: וַתַּעֲמֹדְנָה
  chosen: and they stood
  alternatives:
  - and they took their stand
  - and they remained standing
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol; 'stood' is the straightforward English equivalent.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - by
  lexicon: HALOT
  rationale: Conveys proximity clearly and naturally in English.
- source_word: שְׂפַת
  chosen: bank
  alternatives:
  - shore
  - edge
  - lip
  lexicon: HALOT
  rationale: For a river setting, 'bank' is the most idiomatic English rendering.
