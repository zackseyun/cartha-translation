id: GEN.41.23
reference: Genesis 41:23
source:
  edition: WLC
  text: וְ/הִנֵּה֙ שֶׁ֣בַע שִׁבֳּלִ֔ים צְנֻמ֥וֹת דַּקּ֖וֹת שְׁדֻפ֣וֹת קָדִ֑ים צֹמְח֖וֹת אַחֲרֵי/הֶֽם׃
translation:
  text: And behold, seven ears, withered and thin and scorched by the east wind, were sprouting after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven heads of grain ... blasted by the east wind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'thin'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Then behold
  lexicon: HALOT
  rationale: Preserves the vivid deictic/interjective force introducing a new element in the dream report. 'Behold' is slightly formal but still readable and matches the narrative emphasis better than omitting it.
- source_word: שֶׁבַע
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: שִׁבֳּלִים
  chosen: ears
  alternatives:
  - heads of grain
  - stalks
  lexicon: HALOT
  rationale: In this agricultural dream context, the noun refers to ears/heads of grain. 'Ears' is concise and traditional; 'heads of grain' is possible but less natural here. 'Stalks' is less precise because the focus is the grain head.
- source_word: צְנֻמוֹת
  chosen: thin
  alternatives:
  - withered
  - shrivelled
  - blighted
  lexicon: HALOT
  rationale: The term conveys being lean, meager, or shriveled. 'Thin' works well in parallel with the earlier dream imagery and pairs naturally with 'scorched by the east wind.'
- source_word: דַּקּוֹת
  chosen: thin
  alternatives:
  - fine
  - small
  - meager
  lexicon: HALOT
  rationale: This adjective literally denotes thin/fine. Because English can coordinate near-synonyms for emphasis, 'thin' captures the physical appearance. The Hebrew stacks descriptors; the translation preserves the sense without forcing an awkward distinction.
- source_word: שְׁדֻפוֹת קָדִים
  chosen: scorched by the east wind
  alternatives:
  - blasted by the east wind
  - blighted by the east wind
  lexicon: HALOT
  rationale: The passive participle with 'east wind' denotes damage caused by the hot east wind. 'Scorched' is vivid and accessible; 'blasted' is traditional and possible, but 'scorched' communicates the agricultural effect more clearly to modern readers.
- source_word: צֹמְחֹת
  chosen: were sprouting
  alternatives:
  - sprouted
  - were growing up
  lexicon: HALOT
  rationale: The participle presents the action as in progress within the dream scene. 'Were sprouting' preserves that aspect better than the simple past 'sprouted.'
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - behind them
  lexicon: HALOT
  rationale: Refers to the seven healthy ears previously mentioned. 'After them' is the natural temporal/spatial rendering in English for sequential emergence in the dream.
