  source_review: state/reviews/gemini/ot/genesis/041/023.json
  category: mistranslation
  tier: 2
  from: thin
  to: withered and thin
  rationale: 'The Hebrew text uses two distinct adjectives to describe the ears of grain: `צְנֻמוֹת` (from `צָנַם`, ''to be withered, shriveled,'' per HALOT/BDB) and `דַּקּוֹת` (''thin, meager''). The draft translates this pair with the single English word ''thin,'' completely omitting the meaning of `צְנֻמוֹת`. This loses the emphatic stacking of descriptors present in the original Hebrew, which parallels the three negative descriptors for the cows in v. 19. A faithful translation must render both adjectives, for example: ''...seven ears, withered, thin, and scorched by the east wind...'''
