id: GEN.41.54
reference: Genesis 41:54
source:
  edition: WLC
  text: וַ/תְּחִלֶּ֜ינָה שֶׁ֣בַע שְׁנֵ֤י הָ/רָעָב֙ לָ/ב֔וֹא כַּ/אֲשֶׁ֖ר אָמַ֣ר יוֹסֵ֑ף
    וַ/יְהִ֤י רָעָב֙ בְּ/כָל הָ֣/אֲרָצ֔וֹת וּ/בְ/כָל אֶ֥רֶץ מִצְרַ֖יִם הָ֥יָה לָֽחֶם־־׃
translation:
  text: And the seven years of famine began to come, just as Joseph had said. And
    there was famine in all the lands, but in all the land of Egypt there was bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was food'; Hebrew 'bread' can function more broadly for food or
      provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּחִלֶּינָה
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: From חלל/תחלינה in this context, the verb marks the onset of the famine
    years. 'Began' is natural modern English and preserves the inceptive sense.
- source_word: שֶׁבַע שְׁנֵי הָרָעָב
  chosen: the seven years of famine
  alternatives:
  - seven famine years
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Years of famine' is idiomatic
    and clear in English while preserving the genitival relationship.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to arrive
  lexicon: HALOT
  rationale: The infinitive with the preceding verb expresses the beginning of the
    famine years' arrival. 'To come' is the most direct equivalent and fits the Hebrew
    idiom.
- source_word: כַּאֲשֶׁר אָמַר יוֹסֵף
  chosen: just as Joseph had said
  alternatives:
  - as Joseph said
  - just as Joseph said
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks correspondence. English past perfect ('had said') fits
    the narrative sequence, since Joseph's statement preceded the event.
- source_word: וַיְהִי רָעָב
  chosen: there was famine
  alternatives:
  - famine came
  - a famine occurred
  lexicon: HALOT
  rationale: Existential היה is best rendered 'there was' here. This avoids over-dramatizing
    and matches the Hebrew narrative style.
- source_word: בְּכָל הָאֲרָצוֹת
  chosen: in all the lands
  alternatives:
  - in all the countries
  - throughout all the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural and broader than a single territory. 'Lands' preserves
    the plural and avoids anachronistic political overtones that 'countries' may suggest.
- source_word: וּבְכָל אֶרֶץ מִצְרַיִם
  chosen: but in all the land of Egypt
  alternatives:
  - and in all the land of Egypt
  lexicon: HALOT
  rationale: 'The conjunction is formally ''and,'' but English style and the contrastive
    sense of the clause favor ''but'' to reflect the narrative contrast: famine elsewhere,
    yet food in Egypt. This is an optimal-equivalence adjustment, not a change in
    propositional content.'
- source_word: הָיָה לָחֶם
  chosen: there was bread
  alternatives:
  - there was food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' though it can stand metonymically for
    food. Main text keeps the concrete term 'bread' to stay close to the Hebrew; the
    broader sense is worth preserving in a footnote.
