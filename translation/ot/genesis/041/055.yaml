id: GEN.41.55
reference: Genesis 41:55
source:
  edition: WLC
  text: וַ/תִּרְעַב֙ כָּל אֶ֣רֶץ מִצְרַ֔יִם וַ/יִּצְעַ֥ק הָ/עָ֛ם אֶל פַּרְעֹ֖ה לַ/לָּ֑חֶם
    וַ/יֹּ֨אמֶר פַּרְעֹ֤ה לְ/כָל מִצְרַ֨יִם֙ לְכ֣וּ אֶל יוֹסֵ֔ף אֲשֶׁר יֹאמַ֥ר לָ/כֶ֖ם
    תַּעֲשֽׂוּ־־־־־׃
translation:
  text: And all the land of Egypt became hungry, and the people cried out to Pharaoh
    for bread. Pharaoh said to all Egypt, “Go to Joseph. What he says to you, do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Do what he says to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּרְעַב
  chosen: became hungry
  alternatives:
  - was hungry
  - suffered famine
  lexicon: HALOT
  rationale: From רעב, indicating the onset or experience of hunger/famine. 'Became
    hungry' preserves the verbal sense and the narrative progression better than the
    stative 'was hungry.' 'Suffered famine' is possible but more interpretive and
    less directly tied to the verb.
- source_word: כָּל אֶרֶץ מִצְרַיִם
  chosen: all the land of Egypt
  alternatives:
  - the whole land of Egypt
  - all Egypt
  lexicon: HALOT
  rationale: A fairly formal rendering of the construct phrase. 'All Egypt' would
    be smoother but would omit the explicit 'land' present in the Hebrew.
- source_word: וַיִּצְעַק הָעָם
  chosen: the people cried out
  alternatives:
  - the people cried
  - the people called out
  lexicon: HALOT
  rationale: צעק commonly conveys a strong cry for help or distress. 'Cried out' best
    captures the urgency without overtranslating.
- source_word: לַלָּחֶם
  chosen: for bread
  alternatives:
  - for food
  lexicon: HALOT
  rationale: לחם is literally 'bread.' In context it can stand metonymically for food/grain
    provisions, but 'bread' is the more textually transparent choice and remains natural
    in English.
- source_word: לְכָל מִצְרַיִם
  chosen: to all Egypt
  alternatives:
  - to all the Egyptians
  lexicon: HALOT
  rationale: The Hebrew uses the place-name collectively. 'To all Egypt' preserves
    that collective national address; 'to all the Egyptians' is a valid unpacking
    but less direct.
- source_word: לְכוּ אֶל יוֹסֵף
  chosen: Go to Joseph
  alternatives:
  - Go to Yosef
  lexicon: HALOT
  rationale: Imperative plus preposition is straightforward. The standard English
    transliteration 'Joseph' is retained for readability and convention.
- source_word: אֲשֶׁר יֹאמַר לָכֶם תַּעֲשׂוּ
  chosen: What he says to you, do
  alternatives:
  - Do what he says to you
  - Whatever he tells you, do
  lexicon: HALOT
  rationale: The Hebrew fronting with אֲשֶׁר is preserved with a slightly formal English
    structure that reflects the emphasis. 'Do what he says to you' is smoother, but
    'What he says to you, do' better mirrors the source while remaining intelligible.
