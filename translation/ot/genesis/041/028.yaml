theological_decisions:
- issue: Rendering הָאֱלֹהִים in Joseph's speech
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: The verse presents Joseph attributing future events and their revelation
    to the one true God. Rendering as 'God' reflects normal English usage for this
    referent without adding doctrinal content beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
