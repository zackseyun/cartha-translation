id: GEN.41.27
reference: Genesis 41:27
source:
  edition: WLC
  text: וְ/שֶׁ֣בַע הַ֠/פָּרוֹת הָֽ/רַקּ֨וֹת וְ/הָ/רָעֹ֜ת הָ/עֹלֹ֣ת אַחֲרֵי/הֶ֗ן שֶׁ֤בַע
    שָׁנִים֙ הֵ֔נָּה וְ/שֶׁ֤בַע הַֽ/שִׁבֳּלִים֙ הָ/רֵק֔וֹת שְׁדֻפ֖וֹת הַ/קָּדִ֑ים
    יִהְי֕וּ שֶׁ֖בַע שְׁנֵ֥י רָעָֽב׃
translation:
  text: And the seven thin and bad cows that came up after them are seven years, and
    the seven empty heads of grain, scorched by the east wind, will be seven years
    of famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ears of grain' for 'heads of grain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'blasted by the east wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרַקּוֹת
  chosen: thin
  alternatives:
  - gaunt
  - lean
  lexicon: HALOT
  rationale: In the dream context describing cows, the adjective denotes emaciation/thinness.
    'Thin' is natural modern English and matches the imagery established earlier in
    the chapter better than the more formal 'lean' or stronger 'gaunt'.
- source_word: וְהָרָעוֹת
  chosen: bad
  alternatives:
  - ugly
  - evil
  lexicon: HALOT
  rationale: The adjective רַע here describes the cows' poor/undesirable condition,
    not moral evil. 'Bad' is broad and idiomatic in English; 'ugly' is too narrow,
    though appearance is involved in the larger narrative.
- source_word: הָעֹלֹת אַחֲרֵיהֶן
  chosen: that came up after them
  alternatives:
  - coming up after them
  - that came up behind them
  lexicon: HALOT
  rationale: The participle plus prepositional phrase refers to the cows appearing
    subsequently in the dream. 'Came up after them' is clear, natural, and preserves
    the sequence.
- source_word: שֶׁבַע שָׁנִים הֵנָּה
  chosen: are seven years
  alternatives:
  - they are seven years
  lexicon: HALOT
  rationale: This is Joseph's symbolic identification of dream elements with years.
    English normally omits the explicit pronoun 'they' here.
- source_word: הַשִׁבֳּלִים
  chosen: heads of grain
  alternatives:
  - ears of grain
  - grain stalks
  lexicon: HALOT
  rationale: The noun refers to grain heads/ears. 'Heads of grain' is clear contemporary
    English; 'ears' is traditional but less immediately transparent for many readers.
- source_word: הָרֵקוֹת
  chosen: empty
  alternatives:
  - blighted
  - thin
  lexicon: HALOT
  rationale: For grain, the adjective conveys emptiness/lack of fullness rather than
    mere thinness. 'Empty' best captures the agricultural image.
- source_word: שְׁדֻפוֹת הַקָּדִים
  chosen: scorched by the east wind
  alternatives:
  - blasted by the east wind
  - blighted by the east wind
  lexicon: HALOT
  rationale: The passive participle describes damage caused by the hot east wind.
    'Scorched' is vivid and accessible; 'blasted' is traditional but less transparent
    in modern usage.
- source_word: יִהְיוּ
  chosen: will be
  alternatives:
  - are
  lexicon: HALOT
  rationale: 'The imperfect here naturally points forward in Joseph''s explanation:
    these dream symbols will amount to seven years of famine. ''Will be'' reads smoothly
    in English while preserving the predictive force.'
- source_word: שְׁנֵי רָעָב
  chosen: years of famine
  alternatives:
  - years of hunger
  lexicon: HALOT
  rationale: The construct phrase means 'years of famine.' 'Famine' is the standard
    and contextually precise rendering for רָעָב in this narrative.
