id: GEN.41.50
reference: Genesis 41:50
source:
  edition: WLC
  text: וּ/לְ/יוֹסֵ֤ף יֻלַּד֙ שְׁנֵ֣י בָנִ֔ים בְּ/טֶ֥רֶם תָּב֖וֹא שְׁנַ֣ת הָ/רָעָ֑ב
    אֲשֶׁ֤ר יָֽלְדָה לּ/וֹ֙ אָֽסְנַ֔ת בַּת פּ֥וֹטִי פֶ֖רַע כֹּהֵ֥ן אֽוֹן־־׃
translation:
  text: Before the year of famine came, two sons were born to Joseph, whom Asenath
    daughter of Potiphera, priest of On, bore to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the year of the famine came.' The Hebrew has the singular 'year' here,
      referring to the onset of the famine period.
    reason: lexical_alternative
  - marker: b
    text: On was an Egyptian city, later known in Greek as Heliopolis.
    reason: cultural_note
lexical_decisions:
- source_word: יֻלַּד
  chosen: were born
  alternatives:
  - was born to
  - begot (passive sense avoided)
  lexicon: HALOT
  rationale: Passive of ילד with plural subject 'two sons' is most naturally rendered
    'were born.' English idiom prefers plural agreement and avoids overly wooden 'was
    born to Joseph two sons.'
- source_word: וּ/לְ/יוֹסֵף
  chosen: to Joseph
  alternatives:
  - for Joseph
  lexicon: HALOT
  rationale: The lamed marks relation/advantage with the passive birth expression;
    'to Joseph' is the most natural English equivalent in genealogical/birth contexts.
- source_word: בְּ/טֶרֶם
  chosen: Before
  alternatives:
  - before that
  - not yet when
  lexicon: HALOT
  rationale: Temporal particle introducing an event prior to the famine year; simple
    'Before' is clear and accurate.
- source_word: תָּב֖וֹא שְׁנַ֣ת הָ/רָעָ֑ב
  chosen: the year of famine came
  alternatives:
  - the year of the famine arrived
  - the famine year came
  lexicon: HALOT
  rationale: The singular 'year' is the Hebrew wording here, referring to the onset
    of the famine period. 'Came' preserves the verbal imagery without awkwardness.
- source_word: שְׁנֵי בָנִים
  chosen: two sons
  alternatives:
  - two boys
  - a pair of sons
  lexicon: HALOT
  rationale: Standard literal rendering for counted male children; 'sons' fits genealogical
    register better than 'boys.'
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: The relative clause refers to 'two sons' as persons, so idiomatic English
    uses 'whom' as the object of 'bore.'
- source_word: יָלְדָה לּוֹ
  chosen: bore to him
  alternatives:
  - gave birth to for him
  - bore him
  lexicon: HALOT
  rationale: This preserves both the birth verb and the lamed pronoun. 'Bore him'
    in English can ambiguously suggest Joseph himself was born, so 'bore to him' is
    clearer.
- source_word: אָֽסְנַת
  chosen: Asenath
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy.
- source_word: בַּת פּ֥וֹטִי פֶ֖רַע
  chosen: daughter of Potiphera
  alternatives:
  - daughter of Poti-phera
  lexicon: HALOT
  rationale: Construct chain identifies Asenath by parentage. Standard English transliteration
    is 'Potiphera.'
- source_word: כֹּהֵן אֽוֹן
  chosen: priest of On
  alternatives:
  - priest at On
  lexicon: HALOT
  rationale: כֹּהֵן is the ordinary term for 'priest.' On is a place name, conventionally
    transliterated rather than translated.
