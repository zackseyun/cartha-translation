theological_decisions:
- issue: Interpretation of Joseph's naming explanation
  chosen_reading: Joseph attributes his fruitfulness to God's action while still describing
    Egypt as 'the land of my affliction.'
  alternative_readings:
  - Joseph means only his earlier sufferings before arriving in Egypt
  - Joseph speaks of affliction more broadly, including exile from his family
  rationale: The verse itself states both divine fruitfulness and ongoing memory of
    affliction. The translation preserves this tension rather than narrowing the referent
    of 'my affliction.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
