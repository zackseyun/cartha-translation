id: GEN.41.45
reference: Genesis 41:45
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א פַרְעֹ֣ה שֵׁם יוֹסֵף֮ צָֽפְנַ֣ת פַּעְנֵחַ֒ וַ/יִּתֶּן ל֣/וֹ אֶת אָֽסְנַ֗ת בַּת פּ֥וֹטִי פֶ֛רַע כֹּהֵ֥ן אֹ֖ן לְ/אִשָּׁ֑ה וַ/יֵּצֵ֥א יוֹסֵ֖ף עַל אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: And Pharaoh called Joseph’s name Zaphenath-paneah, and he gave him Asenath, the daughter of Potiphera, the priest of On, as a wife. And Joseph went out over the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Zaphenath-paaneah.' The meaning of the Egyptian name is uncertain, and proposed translations vary.
    reason: lexical_alternative
  - marker: b
    text: On is the Egyptian city later known in Greek as Heliopolis.
    reason: cultural_note
  - marker: c
    text: Or 'throughout the land of Egypt.'
    reason: alternative_reading
  - marker: d
    text: Or 'Potiphera priest of On'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with 'name' commonly means to call or name someone. 'Called Joseph’s name' preserves the Hebrew idiom more closely than simply 'named Joseph,' while remaining understandable in English.
- source_word: שֵׁם יוֹסֵף
  chosen: Joseph’s name
  alternatives:
  - Joseph
  - the name of Joseph
  lexicon: HALOT
  rationale: Rendered literally to preserve the Hebrew construction 'called the name of Joseph.' This keeps the formal naming act explicit.
- source_word: צָפְנַת פַּעְנֵחַ
  chosen: Zaphenath-paneah
  alternatives:
  - Zaphenath-paaneah
  lexicon: HALOT
  rationale: This is an Egyptian personal name/titular designation of uncertain etymology. Per translation philosophy, personal names are transliterated rather than translated. The hyphenated transliteration reflects the two-part form in Hebrew.
- source_word: וַיִּתֶּן לוֹ
  chosen: he gave him
  alternatives:
  - he gave to him
  lexicon: HALOT
  rationale: Standard rendering of נתן with indirect object suffix. English smoothness favors 'gave him'.
- source_word: אָסְנַת
  chosen: Asenath
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בַּת פּוֹטִי פֶרַע
  chosen: the daughter of Potiphera
  alternatives:
  - daughter of Poti-phera
  lexicon: HALOT
  rationale: Proper name phrase rendered straightforwardly. 'Potiphera' follows common English transliteration of the Egyptian name represented in Hebrew.
- source_word: כֹּהֵן אֹן
  chosen: priest of On
  alternatives:
  - priest of Heliopolis
  lexicon: HALOT
  rationale: כֹּהֵן is the ordinary term for 'priest.' אֹן is a place name and is transliterated as 'On' in the main text to preserve the Hebrew form; the more familiar Greek-derived place name 'Heliopolis' is worth preserving in a footnote.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This idiom commonly marks marriage arrangement. 'As a wife' is natural modern English and preserves the formal sense.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  lexicon: HALOT
  rationale: A direct and natural rendering of יצא.
- source_word: עַל אֶרֶץ מִצְרַיִם
  chosen: over the land of Egypt
  alternatives:
  - throughout the land of Egypt
  - across the land of Egypt
  lexicon: HALOT
  rationale: The preposition עַל here likely conveys movement in relation to the territory under Joseph’s new authority. 'Over the land of Egypt' preserves the Hebrew preposition and can suggest both travel and oversight; 'throughout' is possible but slightly more interpretive.
