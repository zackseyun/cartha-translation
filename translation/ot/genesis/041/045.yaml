  from: Potiphera priest of On
  to: Potiphera, the priest of On
  rationale: The Hebrew phrase 'פּוֹטִי פֶרַע כֹּהֵן אֹן' (Poti Phera, priest of On) uses apposition. The English rendering 'Potiphera priest of On' omits punctuation, making it read like a single long title rather than a name followed by a description. Adding a comma and an article ('Potiphera, the priest of On') clarifies the relationship between the name and the title, adhering to standard English syntax for appositives and improving clarity.
