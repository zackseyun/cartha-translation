id: GEN.41.4
reference: Genesis 41:4
source:
  edition: WLC
  text: וַ/תֹּאכַ֣לְנָה הַ/פָּר֗וֹת רָע֤וֹת הַ/מַּרְאֶה֙ וְ/דַקֹּ֣ת הַ/בָּשָׂ֔ר אֵ֚ת
    שֶׁ֣בַע הַ/פָּר֔וֹת יְפֹ֥ת הַ/מַּרְאֶ֖ה וְ/הַ/בְּרִיאֹ֑ת וַ/יִּיקַ֖ץ פַּרְעֹֽה׃
translation:
  text: Then the cows ugly in appearance and thin in flesh ate the seven cows beautiful
    in appearance and fat, and Pharaoh awoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bad in appearance ... and healthy'; the Hebrew uses terms that can be
      rendered more literally as 'bad' and 'healthy/plump,' but the context favors
      the physical contrast of ugly/thin versus beautiful/fat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאכַלְנָה
  chosen: Then ... ate
  alternatives:
  - and ... ate
  - devoured
  lexicon: HALOT
  rationale: Wayyiqtol feminine plural of אכל introduces the next event in the dream
    sequence. 'Ate' is the plain lexical sense; 'Then' captures the narrative progression
    naturally in English without over-paraphrasing. 'Devoured' is possible contextually
    but stronger than the verb itself warrants.
- source_word: הַפָּרוֹת
  chosen: the cows
  alternatives:
  - the cattle
  lexicon: HALOT
  rationale: פָּרוֹת is the feminine plural of 'cow.' 'Cows' is more specific and
    natural than the broader 'cattle,' fitting the dream imagery.
- source_word: רָעוֹת הַמַּרְאֶה
  chosen: ugly in appearance
  alternatives:
  - bad in appearance
  - ugly-looking
  lexicon: HALOT
  rationale: רָעוֹת literally means 'bad/evil,' but with הַמַּרְאֶה ('appearance')
    it idiomatically describes unattractive appearance. 'Ugly in appearance' preserves
    the Hebrew construction while sounding natural in English.
- source_word: וְדַקֹּת הַבָּשָׂר
  chosen: and thin in flesh
  alternatives:
  - and gaunt
  - and thin-fleshed
  lexicon: HALOT
  rationale: דַקּוֹת means 'thin' and בָּשָׂר here refers to bodily flesh. 'Thin in
    flesh' stays close to the Hebrew wording and preserves the vivid physical description.
    'Gaunt' is idiomatic but slightly more interpretive.
- source_word: אֵת שֶׁבַע הַפָּרוֹת
  chosen: the seven cows
  lexicon: HALOT
  rationale: Direct-object marker plus numeral and noun straightforwardly yield 'the
    seven cows.'
- source_word: יְפֹת הַמַּרְאֶה
  chosen: beautiful in appearance
  alternatives:
  - fine-looking
  - good-looking
  lexicon: HALOT
  rationale: This phrase stands in direct contrast to 'ugly in appearance.' 'Beautiful
    in appearance' preserves the Hebrew parallelism and elevated narrative style.
- source_word: וְהַבְּרִיאֹת
  chosen: and fat
  alternatives:
  - and healthy
  - and well-fed
  lexicon: HALOT
  rationale: בָּרִיא can denote fat/plump/healthy. In this dream pair, the contrast
    with 'thin in flesh' favors the concrete physical sense 'fat' rather than the
    broader 'healthy.'
- source_word: וַיִּיקַץ פַּרְעֹה
  chosen: and Pharaoh awoke
  alternatives:
  - and Pharaoh woke up
  lexicon: HALOT
  rationale: The verb means 'awoke.' 'And Pharaoh awoke' is concise, formal enough
    for narrative prose, and preserves the Hebrew clause order naturally.
