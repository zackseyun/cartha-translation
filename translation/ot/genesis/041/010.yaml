id: GEN.41.10
reference: Genesis 41:10
source:
  edition: WLC
  text: פַּרְעֹ֖ה קָצַ֣ף עַל עֲבָדָ֑י/ו וַ/יִּתֵּ֨ן אֹתִ֜/י בְּ/מִשְׁמַ֗ר בֵּ֚ית שַׂ֣ר
    הַ/טַּבָּחִ֔ים אֹתִ֕/י וְ/אֵ֖ת שַׂ֥ר הָ/אֹפִֽים־׃
translation:
  text: Pharaoh was angry with his servants, and he put me in custody in the house
    of the captain of the guard, me and the chief baker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under guard'; the Hebrew term denotes guarded confinement and need not
      specify a formal prison building.
    reason: lexical_alternative
  - marker: b
    text: '''Captain of the guard'' renders a court title that is more literally ''chief
      of the slaughterers/executioners.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קָצַף
  chosen: was angry
  alternatives:
  - was furious
  - was enraged
  lexicon: HALOT
  rationale: The verb denotes anger or wrath. 'Was angry' is natural modern English
    and adequately conveys the sense without overstating the intensity.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: In this court setting, the referents are royal functionaries (the cupbearer
    and baker). 'Servants' preserves the relational sense to Pharaoh without importing
    the stronger bonded nuance of 'slaves,' which is not foregrounded here; 'officials'
    is possible but less directly tied to the Hebrew term עבד.
- source_word: בְּמִשְׁמַר
  chosen: in custody
  alternatives:
  - in prison
  - under guard
  lexicon: HALOT
  rationale: The noun refers to confinement/guarded keeping. 'In custody' is a good
    optimal-equivalence rendering that preserves the idea of detention without over-specifying
    the institution as a formal prison.
- source_word: בֵּית שַׂר הַטַּבָּחִים
  chosen: the house of the captain of the guard
  alternatives:
  - the house of the chief of the executioners
  - the house of the chief steward of the bodyguard
  lexicon: HALOT
  rationale: This expression in the Joseph narrative refers to the official over Pharaoh's
    guard, traditionally rendered 'captain of the guard.' While טבחים can more literally
    suggest slaughterers/executioners, the idiomatic court title is best captured
    by the established but still accurate rendering.
- source_word: שַׂר הָאֹפִים
  chosen: the chief baker
  alternatives:
  - the captain of the bakers
  lexicon: HALOT
  rationale: The construction denotes the head of the bakers. 'Chief baker' is concise,
    idiomatic, and contextually precise.
- source_word: אֹתִי ... וְאֵת שַׂר הָאֹפִים
  chosen: me and the chief baker
  alternatives:
  - me, along with the chief baker
  lexicon: HALOT
  rationale: The Hebrew repeats the object marker with 'me' and then adds 'and the
    chief baker.' English smooths this naturally as a coordinated object while preserving
    both persons as the ones confined.
