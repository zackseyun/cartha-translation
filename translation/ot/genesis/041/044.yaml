id: GEN.41.44
reference: Genesis 41:44
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר פַּרְעֹ֛ה אֶל יוֹסֵ֖ף אֲנִ֣י פַרְעֹ֑ה וּ/בִלְעָדֶ֗י/ךָ לֹֽא יָרִ֨ים
    אִ֧ישׁ אֶת יָד֛/וֹ וְ/אֶת רַגְל֖/וֹ בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: Then Pharaoh said to Joseph, “I am Pharaoh, and without you no man will lift
    up his hand or his foot in all the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “apart from you,” emphasizing that no one in Egypt could act independently
      of Joseph’s authority.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “lift up his hand or his foot,” an idiom for taking any action or
      making any move.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name used throughout
    the Joseph narrative.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Normal directional preposition introducing the addressee.
- source_word: אֲנִי פַרְעֹה
  chosen: I am Pharaoh
  alternatives:
  - I am Pharaoh himself
  - I am Pharaoh indeed
  lexicon: HALOT
  rationale: A verbless clause with emphatic self-identification. 'I am Pharaoh' is
    the most direct rendering and preserves the force of Pharaoh's sovereign declaration
    without overinterpreting the emphasis.
- source_word: וּבִלְעָדֶיךָ
  chosen: without you
  alternatives:
  - apart from you
  - except by your authority
  lexicon: HALOT
  rationale: The phrase denotes exclusion or absence of Joseph's authorization. 'Without
    you' is concise and idiomatic; the governance nuance is made clear by the following
    prohibition.
- source_word: לֹא יָרִים
  chosen: will lift up
  alternatives:
  - shall raise
  - may lift up
  lexicon: HALOT
  rationale: Hiphil of רום here means to raise/lift. Future-like English fits the
    decree context. 'Will lift up' preserves the concrete idiom.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew singular masculine has generic force. Per translation philosophy,
    gender-accurate rendering is preferred where representative/generic force is intended;
    'man' preserves the source form and sense here.
- source_word: אֶת יָדוֹ וְאֶת רַגְלוֹ
  chosen: his hand or his foot
  alternatives:
  - hand or foot
  - his hand and his foot
  lexicon: HALOT
  rationale: The idiom expresses taking action or making a move. English commonly
    uses 'hand or foot' in negative expressions of permission or authority. 'His'
    preserves the singular distributive sense. 'Or' communicates the idiomatic force
    more naturally than a wooden 'and' in English.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: in all the land of Egypt
  alternatives:
  - throughout all the land of Egypt
  - in the whole land of Egypt
  lexicon: HALOT
  rationale: Standard territorial expression. 'In all the land of Egypt' is both natural
    and close to the Hebrew wording.
