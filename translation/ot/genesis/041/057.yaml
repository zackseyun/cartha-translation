id: GEN.41.57
reference: Genesis 41:57
source:
  edition: WLC
  text: וְ/כָל הָ/אָ֨רֶץ֙ בָּ֣אוּ מִצְרַ֔יְמָ/ה לִ/שְׁבֹּ֖ר אֶל יוֹסֵ֑ף כִּֽי חָזַ֥ק
    הָ/רָעָ֖ב בְּ/כָל הָ/אָֽרֶץ־־־־׃
translation:
  text: And all the earth came to Egypt to Joseph to buy grain, because the famine
    was severe in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the land' / 'the whole world.' Hebrew אֶרֶץ can denote 'earth,'
      'land,' or 'country'; here it likely refers broadly to the lands affected by
      the famine.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - people from all the earth
  - the whole world
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth,' 'land,' or 'country.' In this Joseph narrative
    context, the phrase is broad and hyperbolic for the surrounding world affected
    by famine, not merely Egypt's land. 'All the earth' preserves the Hebrew expression
    and its narrative scope better than narrowing it to 'land.'
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: HALOT
  rationale: The verb בוא normally means 'come/enter.' From the narrator's perspective
    with Egypt as destination, 'came' is the most natural English rendering.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is idiomatic
    modern English and sufficiently reflects the directional force.
- source_word: לִשְׁבֹּר
  chosen: to buy grain
  alternatives:
  - to buy
  - to purchase grain
  lexicon: HALOT
  rationale: In famine contexts שׁבר is an idiom for procuring grain, not merely generic
    buying. Supplying 'grain' in English makes explicit what the Hebrew verb implies
    in this context and matches the surrounding narrative.
- source_word: אֶל יוֹסֵף
  chosen: to Joseph
  alternatives:
  - from Joseph
  - before Joseph
  lexicon: HALOT
  rationale: Literally 'to Joseph.' In context people came to Joseph as the administrator
    controlling grain distribution. English can retain 'to Joseph' without obscuring
    the sense; 'from Joseph' would over-interpret the preposition.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the international movement to Egypt.
    'Because' is the clearest causal connector in modern English.
- source_word: חָזַק
  chosen: was severe
  alternatives:
  - was strong
  - prevailed
  - grew intense
  lexicon: HALOT
  rationale: The verb literally means 'was strong' or 'became strong,' but with famine
    as subject idiomatic English prefers 'was severe.' This preserves the sense without
    wooden phrasing.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: רָעָב in this narrative denotes famine conditions, not merely personal
    hunger. 'The famine' is the standard and contextually precise rendering.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the land
  - in the whole world
  lexicon: HALOT
  rationale: Repeats the broad phrase from the verse opening. Rendering it consistently
    as 'in all the earth' preserves the Hebrew repetition and rhetorical emphasis.
