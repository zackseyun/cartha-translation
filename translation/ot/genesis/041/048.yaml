id: GEN.41.48
reference: Genesis 41:48
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֞ץ אֶת כָּל אֹ֣כֶל שֶׁ֣בַע שָׁנִ֗ים אֲשֶׁ֤ר הָיוּ֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם
    וַ/יִּתֶּן אֹ֖כֶל בֶּ/עָרִ֑ים אֹ֧כֶל שְׂדֵה הָ/עִ֛יר אֲשֶׁ֥ר סְבִיבֹתֶ֖י/הָ נָתַ֥ן
    בְּ/תוֹכָֽ/הּ־־׀־־׃
translation:
  text: And he gathered all the food of the seven years that occurred in the land
    of Egypt, and he put the food in the cities. In each city he put the food from
    the fields around it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the food of the field of the city that was around it
      he put within it.' The Hebrew repeats 'food' and uses a resumptive construction
      for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: he gathered
  alternatives:
  - he collected
  - he amassed
  lexicon: HALOT
  rationale: The verb קבץ denotes gathering or collecting together. 'Gathered' is
    the most natural and sufficiently formal rendering in narrative context.
- source_word: כָּל אֹכֶל
  chosen: all the food
  alternatives:
  - all the produce
  - all the grain
  lexicon: HALOT
  rationale: אֹכֶל literally refers to food. Although the context is agricultural
    storage and may especially involve grain, the Hebrew term itself is broader than
    'grain,' so 'food' best preserves the source wording without over-specification.
- source_word: שֶׁבַע שָׁנִים
  chosen: the seven years
  alternatives:
  - seven years
  lexicon: HALOT
  rationale: The phrase refers back to the previously mentioned seven plentiful years;
    English idiom naturally uses the definite article here.
- source_word: אֲשֶׁר הָיוּ בְּאֶרֶץ מִצְרַיִם
  chosen: that occurred in the land of Egypt
  alternatives:
  - that were in the land of Egypt
  - that came in the land of Egypt
  lexicon: HALOT
  rationale: The Hebrew literally says 'that were in the land of Egypt,' but with
    years as subject, English idiom prefers 'occurred' to express temporal occurrence
    while preserving the sense.
- source_word: וַיִּתֶּן אֹכֶל בֶּעָרִים
  chosen: he put the food in the cities
  alternatives:
  - he placed food in the cities
  - he stored food in the cities
  lexicon: HALOT
  rationale: נתן literally means 'gave/put.' In this storage context, 'put' is a straightforward
    rendering. 'Stored' is interpretive; the storage idea is clear from context but
    not required in the main gloss.
- source_word: אֹכֶל שְׂדֵה הָעִיר
  chosen: the food from the fields of each city
  alternatives:
  - the produce of the field of each city
  - the food of the city's fieldland
  lexicon: HALOT
  rationale: The construct phrase refers to the food/produce associated with the fields
    belonging to or surrounding each city. 'Fields of each city' communicates the
    relationship clearly in modern English.
- source_word: אֲשֶׁר סְבִיבֹתֶיהָ
  chosen: around it
  alternatives:
  - surrounding it
  - that were around it
  lexicon: HALOT
  rationale: The phrase modifies the city's fields. 'Around it' is concise and natural
    English.
- source_word: נָתַן בְּתוֹכָהּ
  chosen: he put ... in each city
  alternatives:
  - he placed it within it
  - he deposited it in its midst
  lexicon: HALOT
  rationale: The Hebrew concludes emphatically that he put that surrounding-field
    produce 'in its midst,' i.e., into the city itself. English smooths the resumptive
    structure as 'In each city he put...' to avoid awkward repetition while preserving
    the distributive sense.
