id: GEN.41.20
reference: Genesis 41:20
source:
  edition: WLC
  text: וַ/תֹּאכַ֨לְנָה֙ הַ/פָּר֔וֹת הָ/רַקּ֖וֹת וְ/הָ/רָע֑וֹת אֵ֣ת שֶׁ֧בַע הַ/פָּר֛וֹת
    הָ/רִאשֹׁנ֖וֹת הַ/בְּרִיאֹֽת׃
translation:
  text: And the thin and ugly cows ate up the first seven healthy cows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lean and bad-looking cows ... the first seven fat cows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאכַלְנָה
  chosen: ate up
  alternatives:
  - ate
  - devoured
  lexicon: HALOT
  rationale: From אכל, 'to eat.' In this dream context, 'ate up' conveys the complete
    consumption implied by the action more naturally than bare 'ate,' without becoming
    overly vivid like 'devoured.'
- source_word: הַפָּרוֹת
  chosen: cows
  alternatives:
  - cattle
  lexicon: HALOT
  rationale: The feminine plural specifically refers to female bovines, so 'cows'
    is more precise than the broader 'cattle.'
- source_word: הָרַקּוֹת
  chosen: thin
  alternatives:
  - lean
  - gaunt
  lexicon: HALOT
  rationale: The adjective describes emaciated appearance. 'Thin' is clear modern
    English; 'lean' is also possible and traditional, but 'thin' is slightly more
    natural for contemporary readers.
- source_word: וְהָרָעוֹת
  chosen: ugly
  alternatives:
  - bad-looking
  - evil
  lexicon: HALOT
  rationale: Here רעות describes poor appearance in the dream, not moral evil. 'Ugly'
    captures the visual sense idiomatically in English. 'Bad-looking' is more literal
    but less natural.
- source_word: אֵת שֶׁבַע הַפָּרוֹת
  chosen: the seven cows
  lexicon: HALOT
  rationale: Direct-object marker plus numeral and noun are rendered straightforwardly
    as 'the seven cows.'
- source_word: הָרִאשֹׁנוֹת
  chosen: the first
  alternatives:
  - former
  - earlier
  lexicon: HALOT
  rationale: In sequence within the dream, 'the first' is the most natural rendering,
    marking these cows as the earlier set.
- source_word: הַבְּרִיאֹת
  chosen: healthy
  alternatives:
  - fat
  - well-fed
  lexicon: HALOT
  rationale: The adjective denotes healthy, robust condition. 'Healthy' fits the immediate
    contrast with the thin cows and avoids overcommitting to body size alone, though
    'fat' is possible in context.
