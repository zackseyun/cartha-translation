id: GEN.41.12
reference: Genesis 41:12
source:
  edition: WLC
  text: וְ/שָׁ֨ם אִתָּ֜/נוּ נַ֣עַר עִבְרִ֗י עֶ֚בֶד לְ/שַׂ֣ר הַ/טַּבָּחִ֔ים וַ/נְּ֨סַפֶּר
    ל֔/וֹ וַ/יִּפְתָּר לָ֖/נוּ אֶת חֲלֹמֹתֵ֑י/נוּ אִ֥ישׁ כַּ/חֲלֹמ֖/וֹ פָּתָֽר־־־׃
translation:
  text: And there with us was a young Hebrew man, a slave of the captain of the guard,
    and we told him, and he interpreted our dreams for us; he interpreted each man's
    dream according to his dream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a young Hebrew, a slave belonging to the captain of
      the guard.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''a man according to his dream he interpreted,'' meaning he gave
      an interpretation suited to each individual''s dream.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  chosen: young ... man
  alternatives:
  - youth
  - young man
  - boy
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth or young man. In English, 'young man'
    best fits Joseph's status here without sounding childish as 'boy' might.
- source_word: עִבְרִי
  chosen: Hebrew
  alternatives:
  - Hebraean
  lexicon: HALOT
  rationale: The ethnic designation is straightforwardly rendered 'Hebrew,' the standard
    English equivalent.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: Following the translation philosophy, 'slave' is preferred where bonded
    status is salient. Here Joseph is identified as belonging to the captain of the
    guard, so the bonded nature is explicit.
- source_word: שַׂר הַטַּבָּחִים
  chosen: captain of the guard
  alternatives:
  - chief of the executioners
  - captain of the bodyguard
  lexicon: HALOT
  rationale: This Egyptian court title is traditionally rendered 'captain of the guard'
    in Genesis and fits the official in charge of prison custody. A more literal rendering
    from טבחים ('slaughterers/butchers') is possible, but in context it denotes an
    official guard/executioner corps.
- source_word: וַנְּסַפֶּר לוֹ
  chosen: we told him
  alternatives:
  - we recounted to him
  - we related to him
  lexicon: HALOT
  rationale: The verb ספר here means to recount or tell. 'We told him' is natural
    modern English and adequately conveys the act of reporting the dreams to Joseph.
- source_word: וַיִּפְתָּר לָנוּ
  chosen: he interpreted ... for us
  alternatives:
  - he solved ... for us
  - he explained ... to us
  lexicon: HALOT
  rationale: פתר in dream contexts means to interpret. 'Interpreted' is the standard
    and clearest English rendering for dream interpretation.
- source_word: חֲלֹמֹתֵינוּ
  chosen: our dreams
  lexicon: HALOT
  rationale: Direct and literal rendering of the plural construct with first person
    plural suffix.
- source_word: אִישׁ כַּחֲלֹמוֹ פָּתָר
  chosen: he interpreted each man's dream according to his dream
  alternatives:
  - he interpreted to each according to his dream
  - he interpreted each one according to his dream
  lexicon: HALOT
  rationale: 'The Hebrew emphasizes individualized interpretation: ''a man according
    to his dream he interpreted.'' Rendering ''each man''s dream according to his
    dream'' preserves the distributive force and the masculine singular אִישׁ without
    flattening it into an abstract plural.'
