id: GEN.41.22
reference: Genesis 41:22
source:
  edition: WLC
  text: וָ/אֵ֖רֶא בַּ/חֲלֹמִ֑/י וְ/הִנֵּ֣ה שֶׁ֣בַע שִׁבֳּלִ֗ים עֹלֹ֛ת בְּ/קָנֶ֥ה אֶחָ֖ד
    מְלֵאֹ֥ת וְ/טֹבֽוֹת׀׃
translation:
  text: And I saw in my dream, and behold, seven ears of grain were coming up on one
    stalk, full and good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven heads of grain.' The Hebrew term can refer to the ear/head of
      grain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: And I saw
  alternatives:
  - Then I saw
  - I looked
  lexicon: HALOT
  rationale: Qal wayyiqtol of ראה, continuing Pharaoh's first-person narration. 'And
    I saw' preserves the sequential narrative force without over-paraphrasing.
- source_word: בַּחֲלֹמִי
  chosen: in my dream
  alternatives:
  - in my dream-vision
  lexicon: HALOT
  rationale: The preposition plus noun with 1cs suffix naturally means 'in my dream.'
    Simple modern English fits the context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation. 'Behold' preserves the discourse force
    and heightened immediacy better than flattening it to 'there were.'
- source_word: שֶׁבַע שִׁבֳּלִים
  chosen: seven ears of grain
  alternatives:
  - seven heads of grain
  - seven ears
  lexicon: HALOT
  rationale: שִׁבֹּלֶת here refers to grain heads/ears in the dream imagery. 'Ears
    of grain' is clear idiomatic English and avoids ambiguity.
- source_word: עֹלֹת
  chosen: were coming up
  alternatives:
  - came up
  - sprouting up
  - rising
  lexicon: HALOT
  rationale: The participle conveys ongoing or vivid action in the dream report. 'Were
    coming up' reflects that aspect better than a simple past.
- source_word: בְּקָנֶה אֶחָד
  chosen: on one stalk
  alternatives:
  - from one stalk
  - on a single stem
  lexicon: HALOT
  rationale: קָנֶה denotes a stalk/reed-like stem. In grain imagery, 'stalk' is the
    most natural English equivalent. 'On one stalk' fits the image of multiple ears
    growing from a single stalk.
- source_word: מְלֵאֹת
  chosen: full
  alternatives:
  - plump
  - filled
  lexicon: HALOT
  rationale: The adjective means 'full.' While 'plump' is possible in agricultural
    context, 'full' stays closer to the Hebrew and pairs well with the following adjective.
- source_word: וְטֹבוֹת
  chosen: and good
  alternatives:
  - and healthy
  - and fine
  lexicon: HALOT
  rationale: טוֹב broadly means 'good.' In this dream context it describes the favorable
    quality of the grain. 'Good' preserves the lexical breadth and echoes the Hebrew
    directly.
