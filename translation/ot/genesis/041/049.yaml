id: GEN.41.49
reference: Genesis 41:49
source:
  edition: WLC
  text: וַ/יִּצְבֹּ֨ר יוֹסֵ֥ף בָּ֛ר כְּ/ח֥וֹל הַ/יָּ֖ם הַרְבֵּ֣ה מְאֹ֑ד עַ֛ד כִּי חָדַ֥ל לִ/סְפֹּ֖ר כִּי אֵ֥ין מִסְפָּֽר־־׃
translation:
  text: And Yoseph stored up grain in great abundance, like the sand of the sea, until he stopped counting, because it was without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Joseph,' using the traditional English form of the name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for there is no number,' an idiom meaning it was beyond counting.
    reason: lexical_alternative
  - marker: c
    text: Or 'like the sand of the sea, very much'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּצְבֹּר
  chosen: stored up
  alternatives:
  - gathered
  - heaped up
  - accumulated
  lexicon: HALOT
  rationale: The verb צבר denotes piling up or accumulating in storage. 'Stored up' fits the administrative context of collecting produce during the years of abundance better than the more generic 'gathered.'
- source_word: יוֹסֵף
  chosen: Yoseph
  alternatives:
  - Joseph
  rationale: Personal names are transliterated by standard conventions per project philosophy. 'Yoseph' reflects the Hebrew name directly; 'Joseph' is the traditional Anglicized form.
- source_word: בָּר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: בָּר here refers generically to grain/cereal produce, not specifically wheat. 'Corn' is archaic or regionally misleading in modern English, so 'grain' is the clearest rendering.
- source_word: כְּחוֹל הַיָּם
  chosen: like the sand of the sea
  alternatives:
  - as the sand of the sea
  - like the seashore sand
  lexicon: HALOT
  rationale: This is a common Hebrew simile for immense quantity. 'Like the sand of the sea' preserves the familiar biblical image with natural English.
- source_word: הַרְבֵּה מְאֹד
  chosen: very much
  alternatives:
  - in great abundance
  - exceedingly much
  - a great deal
  lexicon: HALOT
  rationale: The phrase intensifies the quantity already described. 'Very much' is a fairly literal rendering; the surrounding simile already carries the force of abundance.
- source_word: עַד כִּי
  chosen: until
  alternatives:
  - so that
  - to the point that
  lexicon: HALOT
  rationale: In context the phrase marks the result or limit of the accumulation. English 'until' naturally introduces the point reached.
- source_word: חָדַל לִסְפֹּר
  chosen: he stopped counting
  alternatives:
  - he ceased to count
  - one stopped counting it
  lexicon: HALOT
  rationale: The singular verb most naturally refers back to Yoseph. 'He stopped counting' is idiomatic modern English and preserves the sense that the quantity became unmanageable to enumerate.
- source_word: כִּי אֵין מִסְפָּר
  chosen: because it was without number
  alternatives:
  - for there was no number
  - because it could not be counted
  - for it was beyond counting
  lexicon: HALOT
  rationale: The clause explains why counting ceased. 'Without number' preserves the Hebrew idiom while remaining understandable in modern English.
