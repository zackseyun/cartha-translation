  from: like the sand of the sea, very much
  to: in great abundance, like the sand of the sea
  rationale: The Hebrew uses both a simile (כְּחוֹל הַיָּם) and an intensifier (הַרְבֵּה מְאֹד) to describe the quantity of grain. The current rendering, '...grain like the sand of the sea, very much...', is syntactically awkward in English, making 'very much' feel like a tacked-on afterthought. Rephrasing this part to '...grain in great abundance, like the sand of the sea...' integrates the intensifier more naturally and elegantly, better reflecting the layered emphasis in the source text.
