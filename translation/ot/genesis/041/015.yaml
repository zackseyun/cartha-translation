id: GEN.41.15
reference: Genesis 41:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר פַּרְעֹה֙ אֶל יוֹסֵ֔ף חֲל֣וֹם חָלַ֔מְתִּי וּ/פֹתֵ֖ר אֵ֣ין אֹת֑/וֹ
    וַ/אֲנִ֗י שָׁמַ֤עְתִּי עָלֶ֨י/ךָ֙ לֵ/אמֹ֔ר תִּשְׁמַ֥ע חֲל֖וֹם לִ/פְתֹּ֥ר אֹתֽ/וֹ־׃
translation:
  text: And Pharaoh said to Joseph, “I have dreamed a dream, and there is no one to
    interpret it. But I have heard it said about you that when you hear a dream, you
    can interpret it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I have heard about you, saying, ‘You hear a dream to
      interpret it.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next narrative event. 'And ... said'
    preserves Hebrew narrative flow in natural English.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard transliteration of the royal title/name in English Bible usage;
    this is a proper designation, so transliteration is preferred.
- source_word: אֶל יוֹסֵף
  chosen: to Joseph
  alternatives:
  - to Yosef
  lexicon: HALOT
  rationale: The preposition marks the addressee. 'Joseph' follows standard English
    transliteration conventions for the personal name.
- source_word: חֲלוֹם חָלַמְתִּי
  chosen: I have dreamed a dream
  alternatives:
  - I dreamed a dream
  - I had a dream
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('dream I dreamed'), which is best
    represented explicitly. 'I have dreamed a dream' preserves the form while remaining
    readable; 'I had a dream' is smoother but loses the Hebrew emphasis.
- source_word: וּפֹתֵר אֵין אֹתוֹ
  chosen: and there is no one to interpret it
  alternatives:
  - and no interpreter for it exists
  - and there is no interpreter of it
  lexicon: HALOT
  rationale: פֹּתֵר is an active participle, 'one who interprets/solves.' The clause
    states the absence of any such person. 'Interpret' is the natural English rendering
    in dream context.
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  lexicon: HALOT
  rationale: Although waw can be rendered simply 'and,' here the clause contrasts
    Pharaoh's inability to find an interpreter with what he has heard about Joseph.
    'But I' brings out that discourse contrast naturally.
- source_word: שָׁמַעְתִּי עָלֶיךָ
  chosen: I have heard it said about you
  alternatives:
  - I have heard about you
  - I have heard concerning you
  lexicon: HALOT
  rationale: The idiom with שׁמע + עַל conveys hearing a report concerning someone.
    Adding 'it said' prepares for the following לֵאמֹר clause in idiomatic English.
- source_word: לֵאמֹר
  chosen: that
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew לֵאמֹר often introduces reported content. In English, 'that' is
    the most natural equivalent here.
- source_word: תִּשְׁמַע חֲלוֹם
  chosen: when you hear a dream
  alternatives:
  - you hear a dream
  - you listen to a dream
  lexicon: HALOT
  rationale: שׁמע literally means 'hear.' In context of recounting dreams, 'hear a
    dream' is understandable and close to the source. 'When' makes the clause idiomatic
    in English as a general statement of ability.
- source_word: לִפְתֹּר אֹתוֹ
  chosen: you can interpret it
  alternatives:
  - to interpret it
  - to solve it
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result after hearing the dream. English
    commonly makes the implied ability explicit: ''you can interpret it.'' ''Interpret''
    fits dream language better than the more generic ''solve.'''
