id: GEN.41.56
reference: Genesis 41:56
source:
  edition: WLC
  text: וְ/הָ/רָעָ֣ב הָיָ֔ה עַ֖ל כָּל פְּנֵ֣י הָ/אָ֑רֶץ וַ/יִּפְתַּ֨ח יוֹסֵ֜ף אֶֽת
    כָּל אֲשֶׁ֤ר בָּ/הֶם֙ וַ/יִּשְׁבֹּ֣ר לְ/מִצְרַ֔יִם וַ/יֶּחֱזַ֥ק הָֽ/רָעָ֖ב בְּ/אֶ֥רֶץ
    מִצְרָֽיִם־־־׃
translation:
  text: And the famine was over all the face of the earth, and Joseph opened all that
    was in them and sold grain to Egypt, and the famine grew severe in the land of
    Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'opened all that was in them.' The text leaves the containers
      implicit; the sense is that Joseph opened the storehouses or granaries.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: רָעָב denotes famine or severe hunger; 'famine' is the standard contextual
    rendering in this Joseph narrative and best fits the regional crisis described.
- source_word: עַל כָּל פְּנֵי הָאָרֶץ
  chosen: over all the face of the earth
  alternatives:
  - over the whole land
  - over the whole earth
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom פְּנֵי הָאָרֶץ
    ('face/surface of the earth/land'). In context it refers broadly to the inhabited
    region affected by famine; 'earth' keeps the source wording, while the idiom remains
    intelligible in English.
- source_word: וַיִּפְתַּח
  chosen: opened
  alternatives:
  - unlocked
  - opened up
  lexicon: HALOT
  rationale: פתח is literally 'open.' Here it refers to Joseph opening storehouses
    or granaries for distribution. The verb itself should remain 'opened'; the implied
    object can be clarified in a footnote rather than over-specifying in the main
    text.
- source_word: אֶת כָּל אֲשֶׁר בָּהֶם
  chosen: all that was in them
  alternatives:
  - all the storehouses
  - all in which there was grain
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''all that was in them,'' with the
    antecedent implied from context as storage places/granaries. Rendering the phrase
    more literally preserves the Hebrew wording while allowing a footnote to explain
    the implied sense.'
- source_word: וַיִּשְׁבֹּר לְמִצְרַיִם
  chosen: sold grain to Egypt
  alternatives:
  - sold to the Egyptians
  - distributed grain to Egypt
  lexicon: HALOT
  rationale: The idiom שׁבר in this context means to sell grain/provisions. Supplying
    'grain' is necessary in English because the idiom is otherwise opaque. 'To Egypt'
    reflects the collective/national sense of לְמִצְרַיִם in context.
- source_word: וַיֶּחֱזַק
  chosen: grew severe
  alternatives:
  - became strong
  - intensified
  - prevailed
  lexicon: HALOT
  rationale: חזק literally means 'be strong,' but with famine as subject it idiomatically
    means it intensified or became severe. 'Grew severe' is natural modern English
    and preserves the progressive worsening.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: '''In the land of Egypt'' reflects the Hebrew phrase fully and matches
    the narrative style of Genesis.'
