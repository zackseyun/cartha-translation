id: GEN.41.1
reference: Genesis 41:1
source:
  edition: WLC
  text: וַ/יְהִ֕י מִ/קֵּ֖ץ שְׁנָתַ֣יִם יָמִ֑ים וּ/פַרְעֹ֣ה חֹלֵ֔ם וְ/הִנֵּ֖ה עֹמֵ֥ד
    עַל הַ/יְאֹֽר־׃
translation:
  text: At the end of two full years, Pharaoh was dreaming, and behold, he was standing
    by the Nile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'two years of days,' a Hebrew idiom meaning a full two-year period.
    reason: lexical_alternative
  - marker: b
    text: Or 'the river'; in this Egyptian setting, the term refers to the Nile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: At the end of
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces a new narrative development.
    In English, the idiomatic temporal construction is best carried by folding the
    narrative opener into the following prepositional phrase rather than preserving
    a wooden 'and it happened.'
- source_word: מִקֵּץ
  chosen: at the end of
  alternatives:
  - after
  lexicon: HALOT
  rationale: The noun קֵץ with prefixed מִן marks the termination point of a period.
    'At the end of' is more precise than the looser 'after,' while remaining natural
    English.
- source_word: שְׁנָתַיִם יָמִים
  chosen: two full years
  alternatives:
  - two years
  - two years' time
  lexicon: HALOT
  rationale: The expression literally reads 'two years of days,' an idiom emphasizing
    completeness of the period. 'Two full years' captures the force of יָמִים without
    awkward literalism.
- source_word: פַרְעֹה
  chosen: Pharaoh
  rationale: Proper royal title/name is transliterated according to standard English
    convention, consistent with the translation philosophy for names.
- source_word: חֹלֵם
  chosen: was dreaming
  alternatives:
  - dreamed
  - was having a dream
  lexicon: HALOT
  rationale: The participle presents the action in progress within the narrative scene.
    'Was dreaming' preserves that durative sense better than the simple past 'dreamed.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - when suddenly
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing vivid attention to what appears
    in the dream. 'Behold' preserves the markedness and literary force, though slightly
    elevated.
- source_word: עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: The participle again conveys a scene in progress. 'Was standing' matches
    the aspect and keeps the dream imagery vivid.
- source_word: עַל
  chosen: by
  alternatives:
  - 'on'
  - beside
  - at
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with a riverbank setting and standing
    relation it idiomatically means being at or beside the river. 'By' is natural
    English and fits the scene.
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Genesis, יְאֹר in Egyptian context refers specifically to the Nile.
    Translating it as 'the Nile' communicates the referent clearly rather than leaving
    the generic 'river.'
