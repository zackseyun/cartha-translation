id: GEN.41.21
reference: Genesis 41:21
source:
  edition: WLC
  text: וַ/תָּבֹ֣אנָה אֶל קִרְבֶּ֗/נָה וְ/לֹ֤א נוֹדַע֙ כִּי בָ֣אוּ אֶל קִרְבֶּ֔/נָה
    וּ/מַרְאֵי/הֶ֣ן רַ֔ע כַּ/אֲשֶׁ֖ר בַּ/תְּחִלָּ֑ה וָ/אִיקָֽץ־־־׃
translation:
  text: And they went into their bellies, but it was not known that they had gone
    into their bellies, and their appearance was bad, just as at the beginning. Then
    I awoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'into their inward part/midst'; in context, 'into their bellies'
      makes the dream image explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'And they went into their bellies'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתָּבֹאנָה
  chosen: they went in
  alternatives:
  - they came in
  - they entered
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fp of בוא in narrative sequence. With אֶל קִרְבֶּנָה,
    the sense is entry into the interior of the cows, so 'went in' is natural English.
- source_word: אֶל קִרְבֶּנָה
  chosen: into their bellies
  alternatives:
  - into their midst
  - into them
  - into their inward parts
  lexicon: HALOT
  rationale: קֶרֶב literally denotes the inner part/midst. In the dream context of
    cows swallowing cows, English idiom favors 'bellies' to express physical interior
    rather than the more abstract 'midst.'
- source_word: וְלֹא נוֹדַע
  chosen: it was not known
  alternatives:
  - it could not be known
  - it was not apparent
  lexicon: HALOT
  rationale: Niphal perfect/passive of ידע expresses that the fact was not perceptible.
    'It was not known' preserves the passive form while remaining readable.
- source_word: כִּי בָאוּ אֶל קִרְבֶּנָה
  chosen: that they had gone into their bellies
  alternatives:
  - that they had entered them
  - that they had gone into them
  lexicon: HALOT
  rationale: כִּי introduces the content of what was not known. Repeating 'their bellies'
    mirrors the Hebrew repetition and keeps the image concrete.
- source_word: וּמַרְאֵיהֶן רַע
  chosen: and their appearance was bad
  alternatives:
  - and they looked bad
  - and their appearance was ugly
  - and their appearance was as bad
  lexicon: HALOT
  rationale: מַרְאֶה refers to visible appearance; רַע here describes poor/ugly appearance.
    'Appearance was bad' is a close rendering without overinterpreting the exact nuance
    as 'ugly' or 'gaunt.'
- source_word: כַּאֲשֶׁר בַּתְּחִלָּה
  chosen: just as at the beginning
  alternatives:
  - as at first
  - just as before
  lexicon: HALOT
  rationale: The phrase compares their appearance after eating with their initial
    state in the dream. 'At the beginning' is clear modern English and preserves the
    temporal comparison.
- source_word: וָאִיקָץ
  chosen: Then I awoke
  alternatives:
  - and I awoke
  - so I awoke
  lexicon: HALOT
  rationale: Wayyiqtol 1cs of יקץ concludes the dream report. 'Then I awoke' fits
    English narrative flow while preserving sequence.
