theological_decisions:
- issue: Potential implication of Joseph 'forgetting' his father's house
  chosen_reading: Render the statement straightforwardly as Joseph's own explanation
    of the name, without softening or theological harmonization.
  alternative_readings:
  - Interpret as 'God has made the pain associated with my father's house fade'
  - Interpret as hyperbolic relief rather than literal forgetting
  rationale: The Hebrew states plainly that God made Joseph forget 'all my hardship
    and all my father's house.' The translation preserves that tension rather than
    resolving it by paraphrase, while the lexical choice 'father’s house' avoids unnecessarily
    reducing it to individual persons alone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
