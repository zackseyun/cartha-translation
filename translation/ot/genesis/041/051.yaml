id: GEN.41.51
reference: Genesis 41:51
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א יוֹסֵ֛ף אֶת שֵׁ֥ם הַ/בְּכ֖וֹר מְנַשֶּׁ֑ה כִּֽי נַשַּׁ֤/נִי אֱלֹהִים֙
    אֶת כָּל עֲמָלִ֔/י וְ/אֵ֖ת כָּל בֵּ֥ית אָבִֽ/י־־־־־׃
translation:
  text: Joseph called the name of the firstborn Manasseh, for he said, “God has made
    me forget all my hardship and all my father’s house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Manasseh sounds like the Hebrew for 'causing to forget' or 'making forget.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all my trouble' / 'all my toil' for 'all my hardship.'
    reason: lexical_alternative
  - marker: c
    text: '''My father’s house'' is a Hebrew expression for one’s paternal family
      or household.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to call/name. 'Called' preserves
    the Hebrew construction ('called the name of'), while remaining natural enough
    in English.
- source_word: אֶת שֵׁם הַבְּכוֹר
  chosen: the name of the firstborn
  alternatives:
  - his firstborn son
  - the firstborn
  lexicon: HALOT
  rationale: This reflects the Hebrew object marker plus 'name' construction more
    closely than the smoother English idiom 'named his firstborn son.' 'Firstborn'
    is retained because it is explicit in the source and may carry narrative significance.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal names are transliterated by standard convention. The name also
    echoes the following verb נַשַּׁנִי ('has made me forget'), which is explained
    in the narrative rather than reproduced in English.
- source_word: כִּי
  chosen: for he said
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The conjunction introduces the explanation for the name. Supplying 'he
    said' makes explicit the implied naming explanation in idiomatic English and matches
    the quoted rationale that follows.
- source_word: נַשַּׁנִי
  chosen: has made me forget
  alternatives:
  - has caused me to forget
  - has made me forgetfulness
  lexicon: HALOT
  rationale: From נשׁה, 'to forget.' The causative sense is best represented by 'has
    made me forget.' This also preserves the wordplay with the name Manasseh as much
    as possible in English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, the singular sense is clear
    from the singular verb and context; 'God' is the standard English rendering here.
- source_word: כָּל עֲמָלִי
  chosen: all my hardship
  alternatives:
  - all my trouble
  - all my toil
  - all my affliction
  lexicon: HALOT
  rationale: עָמָל can denote trouble, toil, or hardship. 'Hardship' best captures
    Joseph's suffering broadly, including both labor and affliction, in this context.
- source_word: וְאֵת כָּל בֵּית אָבִי
  chosen: and all my father’s house
  alternatives:
  - and all my father's household
  - and everyone in my father's house
  lexicon: HALOT
  rationale: '''Father''s house'' is a standard Hebrew kinship expression. Retaining
    ''house'' preserves the familial-household sense and the emotional force of Joseph''s
    statement without over-interpreting it as literal forgetting of persons.'
