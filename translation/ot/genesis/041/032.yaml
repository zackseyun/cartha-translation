theological_decisions:
- issue: Rendering of הָאֱלֹהִים in Joseph's explanation
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: Although אֱלֹהִים is morphologically plural in form, the syntax and context
    clearly refer to Israel's God speaking through Joseph. Singular 'God' is required
    by the immediate context.
