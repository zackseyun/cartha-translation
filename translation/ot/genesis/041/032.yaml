id: GEN.41.32
reference: Genesis 41:32
source:
  edition: WLC
  text: וְ/עַ֨ל הִשָּׁנ֧וֹת הַ/חֲל֛וֹם אֶל פַּרְעֹ֖ה פַּעֲמָ֑יִם כִּֽי נָכ֤וֹן הַ/דָּבָר֙
    מֵ/עִ֣ם הָ/אֱלֹהִ֔ים וּ/מְמַהֵ֥ר הָ/אֱלֹהִ֖ים לַ/עֲשֹׂתֽ/וֹ־־׃
translation:
  text: And as for the dream being repeated to Pharaoh twice, it is because the matter
    is fixed by God, and God is hastening to do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter is established from God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God will quickly do it' or 'God is about to do it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And as for
  alternatives:
  - And concerning
  - Now because of
  lexicon: HALOT
  rationale: Introduces an explanatory comment about the repeated dream. 'As for'
    captures the discourse-marking force more naturally than a bare 'and on account
    of'.
- source_word: הִשָּׁנוֹת
  chosen: being repeated
  alternatives:
  - the repeating
  - being doubled
  lexicon: HALOT
  rationale: Infinitive construct of שנה in the passive/reflexive sense here refers
    to the dream's repetition. 'Being repeated' is idiomatic and preserves the verbal
    idea.
- source_word: הַחֲלוֹם
  chosen: the dream
  lexicon: HALOT
  rationale: Straightforward nominal rendering.
- source_word: אֶל־פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - for Pharaoh
  lexicon: HALOT
  rationale: The preposition marks direction/reference of the dream's repetition toward
    Pharaoh; 'to Pharaoh' is the most natural English rendering.
- source_word: פַּעֲמָיִם
  chosen: twice
  alternatives:
  - two times
  lexicon: HALOT
  rationale: Idiomatic English adverb for the dual form.
- source_word: כִּי
  chosen: it is because
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the repetition. 'It is because' makes
    the causal force explicit in smooth English.
- source_word: נָכוֹן
  chosen: is fixed
  alternatives:
  - is established
  - is certain
  - is determined
  lexicon: HALOT
  rationale: Conveys firmness/established certainty. 'Fixed' communicates that the
    matter is settled and not tentative, fitting Joseph's explanation.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the word
  - the event
  lexicon: HALOT
  rationale: In context, דָּבָר refers to the announced matter/affair rather than
    merely a spoken word. 'Matter' is natural and sufficiently broad.
- source_word: מֵעִם הָאֱלֹהִים
  chosen: by God
  alternatives:
  - from God
  - with God
  lexicon: HALOT
  rationale: The phrase indicates source and authorization from God. 'By God' best
    fits English with 'is fixed,' expressing divine determination without over-paraphrase.
- source_word: וּמְמַהֵר
  chosen: is hastening
  alternatives:
  - is hurrying
  - will quickly
  lexicon: HALOT
  rationale: Participle of מהר presents imminent action. 'Is hastening' preserves
    the verbal aspect and the sense of promptness better than a simple adverb.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Definite האלהים here refers to the true God in Joseph's speech.
- source_word: לַעֲשֹׂתוֹ
  chosen: to do it
  alternatives:
  - to accomplish it
  - to bring it about
  lexicon: HALOT
  rationale: Infinitive with pronominal suffix refers to carrying out the announced
    matter. 'To do it' is direct and faithful; more interpretive alternatives are
    possible but less formally aligned.
