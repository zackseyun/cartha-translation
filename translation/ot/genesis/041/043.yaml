id: GEN.41.43
reference: Genesis 41:43
source:
  edition: WLC
  text: וַ/יַּרְכֵּ֣ב אֹת֗/וֹ בְּ/מִרְכֶּ֤בֶת הַ/מִּשְׁנֶה֙ אֲשֶׁר ל֔/וֹ וַ/יִּקְרְא֥וּ
    לְ/פָנָ֖י/ו אַבְרֵ֑ךְ וְ/נָת֣וֹן אֹת֔/וֹ עַ֖ל כָּל אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: He had him ride in the second chariot that he had, and they cried out before
    him, “Abrek!” So he set him over all the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Abrek” is a difficult term of uncertain meaning, possibly an Egyptian or
      Hebrew acclamation. Many understand it as something like “Bow the knee!”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְכֵּב
  chosen: He had him ride
  alternatives:
  - He made him ride
  - He caused him to ride
  lexicon: HALOT
  rationale: 'Hiphil of רכב expresses causation: Pharaoh caused Joseph to ride. ''Had
    him ride'' is natural modern English while preserving the causative sense.'
- source_word: בְּמִרְכֶּבֶת הַמִּשְׁנֶה אֲשֶׁר־לוֹ
  chosen: in the second chariot that he had
  alternatives:
  - in his second chariot
  - in the chariot of the second rank that belonged to him
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes second rank/second place. The phrase most naturally
    refers to Pharaoh's second chariot, i.e., the chariot next in rank after his own.
    'That he had' keeps the relative clause explicit.
- source_word: וַיִּקְרְאוּ לְפָנָיו
  chosen: and they cried out before him
  alternatives:
  - and they proclaimed before him
  - and they called out ahead of him
  lexicon: HALOT
  rationale: קרא in this context is a public cry or proclamation made in front of
    Joseph's procession. 'Cried out before him' preserves the vividness and public
    setting.
- source_word: אַבְרֵךְ
  chosen: Abrek
  alternatives:
  - Bow the knee
  - Attention!
  - an Egyptian acclamation of honor
  lexicon: HALOT
  rationale: אַבְרֵךְ is obscure and likely a loanword or technical acclamation. Because
    its meaning is uncertain, transliteration is the most auditable main-text choice;
    a likely interpretive alternative is preserved in a footnote.
- source_word: וְנָתוֹן אֹתוֹ
  chosen: So he set him
  alternatives:
  - Thus he placed him
  - and he appointed him
  lexicon: HALOT
  rationale: The infinitive absolute plus finite sense is compressed in English as
    a consequential statement. 'Set him' is concise and fits the appointment context.
- source_word: עַל כָּל אֶרֶץ מִצְרָיִם
  chosen: over all the land of Egypt
  alternatives:
  - over the whole land of Egypt
  - over all Egypt
  lexicon: HALOT
  rationale: עַל marks authority over; אֶרֶץ is best kept as 'land' here, preserving
    the territorial sense rather than reducing it to the nation-name alone.
