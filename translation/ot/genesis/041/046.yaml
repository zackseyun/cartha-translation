id: GEN.41.46
reference: Genesis 41:46
source:
  edition: WLC
  text: וְ/יוֹסֵף֙ בֶּן שְׁלֹשִׁ֣ים שָׁנָ֔ה בְּ/עָמְד֕/וֹ לִ/פְנֵ֖י פַּרְעֹ֣ה מֶֽלֶךְ
    מִצְרָ֑יִם וַ/יֵּצֵ֤א יוֹסֵף֙ מִ/לִּ/פְנֵ֣י פַרְעֹ֔ה וַֽ/יַּעְבֹ֖ר בְּ/כָל אֶ֥רֶץ
    מִצְרָֽיִם־־־׃
translation:
  text: Now Joseph was thirty years old when he stood before Pharaoh king of Egypt.
    And Joseph went out from before Pharaoh and traveled through all the land of Egypt.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁים שָׁנָה
  chosen: was thirty years old
  alternatives:
  - was a son of thirty years
  lexicon: HALOT
  rationale: This Hebrew age expression is idiomatically rendered in English as 'was
    thirty years old' rather than a wooden literalism.
- source_word: בְּעָמְדוֹ
  chosen: when he stood
  alternatives:
  - at his standing
  - when he took his stand
  lexicon: HALOT
  rationale: The preposition with infinitive construct plus pronominal suffix marks
    the time of Joseph's appearance before Pharaoh; 'when he stood' is natural and
    sufficiently formal.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is the standard concise rendering for spatial/courtly presence
    and fits both occurrences in the verse.'
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: מֶלֶךְ מִצְרָיִם
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: HALOT
  rationale: The construct phrase identifies Pharaoh appositionally. English idiom
    naturally renders this as 'Pharaoh king of Egypt' without requiring the article.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - went forth
  lexicon: HALOT
  rationale: A straightforward rendering of יצא that preserves the narrative movement
    from Pharaoh's presence.
- source_word: מִלִּפְנֵי פַרְעֹה
  chosen: from before Pharaoh
  alternatives:
  - from Pharaoh's presence
  - away from Pharaoh
  lexicon: HALOT
  rationale: This keeps the Hebrew idiom visible while remaining understandable in
    English. 'From Pharaoh's presence' is possible, but the chosen wording preserves
    the repeated לפני pattern.
- source_word: וַיַּעְבֹר
  chosen: traveled through
  alternatives:
  - passed through
  - went throughout
  lexicon: HALOT
  rationale: In context Joseph is moving throughout Egypt in administrative inspection/preparation.
    'Traveled through' is natural modern English and conveys movement across the land
    better than the more ambiguous 'passed through.'
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: through all the land of Egypt
  alternatives:
  - throughout all the land of Egypt
  - in all the land of Egypt
  lexicon: HALOT
  rationale: The phrase indicates comprehensive movement across Egypt. 'Through all
    the land of Egypt' matches the sense of breadth without over-paraphrasing.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  - ''
  lexicon: HALOT
  rationale: The initial conjunction introduces a new narrative notice. 'Now' is a
    common English discourse marker here and reads more naturally than beginning with
    'And,' while still signaling continuity.
