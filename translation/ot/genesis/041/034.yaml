id: GEN.41.34
reference: Genesis 41:34
source:
  edition: WLC
  text: יַעֲשֶׂ֣ה פַרְעֹ֔ה וְ/יַפְקֵ֥ד פְּקִדִ֖ים עַל הָ/אָ֑רֶץ וְ/חִמֵּשׁ֙ אֶת אֶ֣רֶץ
    מִצְרַ֔יִם בְּ/שֶׁ֖בַע שְׁנֵ֥י הַ/שָּׂבָֽע־־׃
translation:
  text: 'Let Pharaoh do this: let him appoint overseers over the land and take a fifth
    of the land of Egypt during the seven years of abundance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'collect one-fifth from the land of Egypt.' The Hebrew verb can be understood
      as levying or taking a fifth portion during the years of abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲשֶׂה
  chosen: Let Pharaoh do this
  alternatives:
  - Let Pharaoh act
  - Pharaoh should do this
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In context Joseph is giving counsel,
    so an English jussive-like exhortation is best. 'Do this' supplies the implied
    object from context and reads naturally in English without over-paraphrasing.
- source_word: וְיַפְקֵד
  chosen: let him appoint
  alternatives:
  - and let him set
  - and let him commission
  lexicon: HALOT
  rationale: The Hiphil of פקד here carries the sense of appointing or assigning persons
    to responsibility. 'Appoint' fits the administrative context.
- source_word: פְּקִדִים
  chosen: overseers
  alternatives:
  - officers
  - commissioners
  - officials
  lexicon: HALOT
  rationale: The noun refers to appointed officials. 'Overseers' communicates delegated
    supervisory authority clearly in modern English; 'officers' is possible but can
    sound overly generic or militarized.
- source_word: עַל הָאָרֶץ
  chosen: over the land
  alternatives:
  - over the country
  - throughout the land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the territory/land under Pharaoh's administration,
    not the whole earth. 'Over the land' preserves the administrative force of עַל.
- source_word: וְחִמֵּשׁ
  chosen: take a fifth
  alternatives:
  - exact a fifth
  - collect one-fifth
  - organize into fifths
  lexicon: HALOT
  rationale: The Piel of חמשׁ in this context is commonly understood as taking or
    levying a fifth part of produce during the abundant years. 'Take a fifth' is concise
    and idiomatic. The alternative 'organize into fifths' is less likely here given
    the broader context of storing grain and the later mention of a fifth in taxation/collection.
- source_word: אֶת אֶרֶץ מִצְרַיִם
  chosen: of the land of Egypt
  alternatives:
  - from the land of Egypt
  - Egypt
  lexicon: HALOT
  rationale: The direct-object marker with 'land of Egypt' is rendered idiomatically
    in English as the domain from which the fifth is taken. 'Of the land of Egypt'
    keeps the focus on the produce/resources of the land rather than the territory
    abstractly.
- source_word: בְּשֶׁבַע שְׁנֵי הַשָּׂבָע
  chosen: during the seven years of abundance
  alternatives:
  - in the seven years of plenty
  - through the seven abundant years
  lexicon: HALOT
  rationale: שָׂבָע denotes fullness/satiety and in this narrative refers to years
    of plentiful harvest. 'Abundance' is natural modern English and matches the economic
    context.
