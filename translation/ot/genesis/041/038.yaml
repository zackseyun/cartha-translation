theological_decisions:
- issue: Whether רוּחַ אֱלֹהִים should be rendered as a specific reference to the
    Spirit of God or a more indefinite 'divine spirit'
  chosen_reading: the Spirit of God
  alternative_readings:
  - a spirit of God
  - the spirit of God
  - a divine spirit
  rationale: The Hebrew phrase is formally ambiguous because it lacks the article
    and may be heard from Pharaoh's perspective in a less defined way. However, within
    the canonical narrative Joseph's wisdom is presented as coming from God, and 'the
    Spirit of God' is a well-established biblical expression for divine empowerment.
    To preserve the ambiguity without flattening the theological force, the main text
    uses 'the Spirit of God' and the alternatives are retained in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
