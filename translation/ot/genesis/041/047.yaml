id: GEN.41.47
reference: Genesis 41:47
source:
  edition: WLC
  text: וַ/תַּ֣עַשׂ הָ/אָ֔רֶץ בְּ/שֶׁ֖בַע שְׁנֵ֣י הַ/שָּׂבָ֑ע לִ/קְמָצִֽים׃
translation:
  text: During the seven years of abundance, the land produced in handfuls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by handfuls.' The Hebrew לִקְמָצִים uses a noun meaning 'handfuls' or
      'fistfuls' to describe the abundance of the land's yield.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַשׂ
  chosen: produced
  alternatives:
  - yielded
  - made
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but with הארץ as subject in an
    agricultural context it idiomatically refers to the land's production. 'Produced'
    gives natural English while preserving the concrete sense of agricultural yield.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In the Joseph narrative the reference is to the agricultural land of
    Egypt rather than the whole earth. 'The land' is the most contextually appropriate
    and idiomatic rendering.
- source_word: בְּשֶׁבַע שְׁנֵי הַשָּׂבָע
  chosen: during the seven years of abundance
  alternatives:
  - in the seven years of plenty
  - throughout the seven years of abundance
  lexicon: HALOT
  rationale: This phrase specifies the time period previously announced in Pharaoh's
    dreams. 'Abundance' closely reflects שׂבע ('plenty, abundance') in clear modern
    English.
- source_word: לִקְמָצִים
  chosen: in handfuls
  alternatives:
  - by handfuls
  - in heaps
  lexicon: HALOT
  rationale: The noun קְמָץ denotes a handful or fistful. The prefixed ל here is best
    taken adverbially, describing the extraordinary quantity produced. 'In handfuls'
    preserves the image without overinterpreting it as stored heaps.
