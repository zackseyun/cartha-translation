id: GEN.41.2
reference: Genesis 41:2
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה מִן הַ/יְאֹ֗ר עֹלֹת֙ שֶׁ֣בַע פָּר֔וֹת יְפ֥וֹת מַרְאֶ֖ה וּ/בְרִיאֹ֣ת
    בָּשָׂ֑ר וַ/תִּרְעֶ֖ינָה בָּ/אָֽחוּ־׃
translation:
  text: And behold, seven cows were coming up from the Nile, attractive in appearance
    and fat in flesh, and they were grazing in the reed grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the river'; in this Egyptian context, the Hebrew term commonly refers
      specifically to the Nile.
    reason: lexical_alternative
  - marker: b
    text: Or 'beautiful to look at.'
    reason: lexical_alternative
  - marker: c
    text: Or 'among the reeds' or 'in the marsh grass.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Suddenly
  lexicon: HALOT
  rationale: Retains the vivid, attention-directing discourse marker of the dream
    narrative. 'Behold' is slightly formal but still readable and preserves the immediacy
    better than a fully dynamic substitute.
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Genesis' Egyptian setting, יְאֹר refers specifically to the Nile rather
    than a generic river. Using 'the Nile' makes the referent explicit in natural
    English and reflects source-context primacy over a more wooden 'the river'.
- source_word: עֹלֹת
  chosen: were coming up
  alternatives:
  - came up
  - were ascending
  lexicon: HALOT
  rationale: The participle conveys ongoing action within the dream scene. 'Were coming
    up' captures the progressive sense more naturally than the more literal but stiffer
    'were ascending.'
- source_word: פָּרוֹת
  chosen: cows
  alternatives:
  - cattle
  - heifers
  lexicon: HALOT
  rationale: The noun denotes female bovines. 'Cows' is the most direct and natural
    rendering; 'cattle' is too broad, and 'heifers' is too specific.
- source_word: יְפוֹת מַרְאֶה
  chosen: attractive in appearance
  alternatives:
  - beautiful to look at
  - fine-looking
  lexicon: HALOT
  rationale: This phrase describes pleasing outward appearance. 'Attractive in appearance'
    is clear modern English and preserves the descriptive force without sounding archaic.
- source_word: וּבְרִיאֹת בָּשָׂר
  chosen: fat in flesh
  alternatives:
  - well-fed
  - healthy and fleshy
  - plump
  lexicon: HALOT
  rationale: The Hebrew emphasizes bodily fullness/fatness, not merely general health.
    'Fat in flesh' is somewhat literal but still understandable and preserves the
    imagery important to the dream's symbolism.
- source_word: וַתִּרְעֶינָה
  chosen: they were grazing
  alternatives:
  - they grazed
  - they fed
  lexicon: HALOT
  rationale: The verb refers to pasturing/grazing. 'Were grazing' fits the scene-setting
    narrative flow and matches the ongoing visual quality of the dream.
- source_word: בָּאָחוּ
  chosen: in the reed grass
  alternatives:
  - among the reeds
  - in the marsh grass
  - in the meadow
  lexicon: HALOT
  rationale: The term refers to marsh vegetation/reed grass associated with the Nile.
    'Reed grass' is more precise to the Egyptian riverbank setting than the overly
    generic 'meadow.'
