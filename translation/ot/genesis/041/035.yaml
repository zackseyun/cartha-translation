id: GEN.41.35
reference: Genesis 41:35
source:
  edition: WLC
  text: וְ/יִקְבְּצ֗וּ אֶת כָּל אֹ֨כֶל֙ הַ/שָּׁנִ֣ים הַ/טֹּבֹ֔ת הַ/בָּאֹ֖ת הָ/אֵ֑לֶּה
    וְ/יִצְבְּרוּ בָ֞ר תַּ֧חַת יַד פַּרְעֹ֛ה אֹ֥כֶל בֶּ/עָרִ֖ים וְ/שָׁמָֽרוּ־־־־׃
translation:
  text: Let them gather all the food of these coming good years, and let them store
    up grain under Pharaoh’s authority as food in the cities, and let them keep it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the hand of Pharaoh,' a more literal rendering of the Hebrew idiom
      for authority or control.
    reason: lexical_alternative
  - marker: b
    text: Or 'and let them guard/preserve it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִקְבְּצוּ
  chosen: Let them gather
  alternatives:
  - and let them collect
  - and they shall gather
  lexicon: HALOT
  rationale: Qal imperfect/jussive-like in Joseph's proposal context; English cohortative/jussive
    sense is best conveyed with 'Let them gather' rather than a simple future.
- source_word: כָּל אֹכֶל
  chosen: all the food
  alternatives:
  - all the provisions
  - all the edible produce
  lexicon: HALOT
  rationale: אֹכֶל commonly denotes food/provisions. 'Food' is the most natural broad
    rendering here, covering the produce to be collected during the plentiful years.
- source_word: הַשָּׁנִים הַטֹּבוֹת הַבָּאֹת הָאֵלֶּה
  chosen: these coming good years
  alternatives:
  - these good years that are coming
  - the coming good years
  lexicon: HALOT
  rationale: The Hebrew stacks article + noun + adjective + participle + demonstrative.
    'These coming good years' preserves the deictic force of הָאֵלֶּה while remaining
    idiomatic English.
- source_word: וְיִצְבְּרוּ
  chosen: let them store up
  alternatives:
  - let them heap up
  - let them accumulate
  lexicon: HALOT
  rationale: The verb denotes piling up or storing in quantity. 'Store up' fits the
    administrative context and reads naturally in modern English.
- source_word: בָר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: בָר refers to grain, especially threshed grain. 'Corn' is archaic/regionally
    misleading in modern English, and 'wheat' is too narrow.
- source_word: תַּחַת יַד פַּרְעֹה
  chosen: under Pharaoh’s authority
  alternatives:
  - under the hand of Pharaoh
  - under Pharaoh's control
  lexicon: HALOT
  rationale: The idiom 'under the hand of' denotes control/authority. 'Under Pharaoh’s
    authority' communicates the idiomatic sense clearly without wooden literalism.
- source_word: אֹכֶל בֶּעָרִים
  chosen: as food in the cities
  alternatives:
  - food in the cities
  - provisions in the cities
  lexicon: HALOT
  rationale: 'This phrase is somewhat appositional to the stored grain: it is to serve
    as food/provisions located in the cities. ''As food in the cities'' preserves
    that functional nuance.'
- source_word: וְשָׁמָרוּ
  chosen: and let them keep it
  alternatives:
  - and let them guard it
  - and let them preserve it
  lexicon: HALOT
  rationale: שׁמר can mean keep, guard, or preserve. Here the sense is to keep/guard
    the stored grain for future use. 'Keep it' is concise and idiomatic; the object
    is implied from context.
