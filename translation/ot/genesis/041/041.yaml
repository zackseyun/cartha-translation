id: GEN.41.41
reference: Genesis 41:41
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר פַּרְעֹ֖ה אֶל יוֹסֵ֑ף רְאֵה֙ נָתַ֣תִּי אֹֽתְ/ךָ֔ עַ֖ל כָּל אֶ֥רֶץ
    מִצְרָֽיִם־־׃
translation:
  text: And Pharaoh said to Joseph, “See, I have set you over all the land of Egypt.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting sequence.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name used in Genesis.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition introducing the addressee of speech.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה used discourse-pragmatically to draw attention to the
    solemn declaration. 'See' is natural modern English and preserves the force better
    than the more archaic 'Behold.'
- source_word: נָתַתִּי
  chosen: I have set
  alternatives:
  - I have placed
  - I have appointed
  - I have given
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given,' in this administrative
    context with עַל ('over') it means appointing/installing someone in authority.
    'I have set you over' is idiomatic English that preserves the governing sense.
- source_word: אֹתְךָ
  chosen: you
  lexicon: HALOT
  rationale: Direct object marker plus 2ms suffix; rendered naturally in English as
    the object 'you.'
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  - upon
  lexicon: HALOT
  rationale: With נתן in an appointment context, עַל marks authority over a domain.
    'Over' best preserves the hierarchical sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensive scope of Joseph's authority.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - all Egypt
  - the whole land of Egypt
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' here, referring to the territory/realm of
    Egypt. 'The land of Egypt' is the most direct rendering; 'all Egypt' is possible
    but less formally tied to the Hebrew noun.
