id: GEN.41.30
reference: Genesis 41:30
source:
  edition: WLC
  text: וְ֠/קָמוּ שֶׁ֜בַע שְׁנֵ֤י רָעָב֙ אַחֲרֵי/הֶ֔ן וְ/נִשְׁכַּ֥ח כָּל הַ/שָּׂבָ֖ע
    בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/כִלָּ֥ה הָ/רָעָ֖ב אֶת הָ/אָֽרֶץ־־׃
translation:
  text: Then seven years of famine will arise after them, and all the abundance in
    the land of Egypt will be forgotten, and the famine will consume the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the plenty.' The Hebrew term denotes fullness or abundance, especially
      in contrast with famine.
    reason: lexical_alternative
  - marker: b
    text: Or 'the famine will destroy the land.' The verb can carry the sense of bringing
      to ruin or consuming completely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָמוּ
  chosen: Then ... will arise
  alternatives:
  - and ... will arise
  - will come
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in narrative/future predictive context
    following Joseph's interpretation; rendered with future sense in English. 'Arise'
    preserves the imagery of something coming up after the previous years; 'Then'
    captures the sequential waw naturally.
- source_word: שֶׁבַע שְׁנֵי רָעָב
  chosen: seven years of famine
  alternatives:
  - seven famine years
  - seven years of hunger
  lexicon: HALOT
  rationale: Construct chain naturally rendered in English as 'seven years of famine.'
    'Famine' is the standard and contextually precise term for רָעָב here.
- source_word: אַחֲרֵיהֶן
  chosen: after them
  alternatives:
  - after those
  - after these
  lexicon: HALOT
  rationale: Feminine plural pronominal suffix refers back to the seven years of abundance
    in the preceding verse. 'After them' is a straightforward, natural rendering.
- source_word: וְנִשְׁכַּח
  chosen: will be forgotten
  alternatives:
  - will be disregarded
  - will be no longer remembered
  lexicon: HALOT
  rationale: Nifal of שׁכח is best rendered as passive/reflexive 'be forgotten.' This
    conveys that the prior abundance will fade from memory because of the severity
    of the famine.
- source_word: כָּל הַשָּׂבָע
  chosen: all the abundance
  alternatives:
  - all the plenty
  - all the food supply
  lexicon: HALOT
  rationale: שָׂבָע denotes fullness/plenty/satiety. In this agricultural-economic
    context, 'abundance' best captures the broad sense without narrowing it only to
    stored grain or food.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - throughout the land of Egypt
  - in Egypt
  lexicon: HALOT
  rationale: Formal geographic phrase preserved. 'In the land of Egypt' reflects the
    Hebrew wording more fully than simply 'in Egypt.'
- source_word: וְכִלָּה
  chosen: will consume
  alternatives:
  - will destroy
  - will finish off
  - will bring to an end
  lexicon: HALOT
  rationale: כלה in this context expresses devastating consumption by famine. 'Consume'
    fits famine idiomatically in English and preserves the image of the land being
    eaten up by scarcity.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: Definite noun refers to the previously mentioned famine; 'the famine'
    maintains cohesion and is the standard English equivalent.
- source_word: אֶת הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: אָרֶץ can mean land/earth/country. Here 'the land' is preferable because
    it echoes the earlier 'land of Egypt' and allows the famine's effect on the whole
    region to remain broad.
