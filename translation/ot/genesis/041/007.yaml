id: GEN.41.7
reference: Genesis 41:7
source:
  edition: WLC
  text: וַ/תִּבְלַ֨עְנָה֙ הַ/שִּׁבֳּלִ֣ים הַ/דַּקּ֔וֹת אֵ֚ת שֶׁ֣בַע הַֽ/שִּׁבֳּלִ֔ים
    הַ/בְּרִיא֖וֹת וְ/הַ/מְּלֵא֑וֹת וַ/יִּיקַ֥ץ פַּרְעֹ֖ה וְ/הִנֵּ֥ה חֲלֽוֹם׃
translation:
  text: And the thin ears swallowed up the seven healthy and full ears. Then Pharaoh
    awoke, and behold, it was a dream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heads of grain' for 'ears.' The Hebrew term refers to the grain-bearing
      head rather than the whole stalk.
    reason: lexical_alternative
  - marker: b
    text: Or 'the seven plump and full ears.' The adjective rendered 'healthy' can
      also convey a well-fed or robust condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְלַעְנָה
  chosen: swallowed up
  alternatives:
  - swallowed
  - devoured
  lexicon: HALOT
  rationale: From בלע, literally 'swallow.' 'Swallowed up' is idiomatic English and
    preserves the vivid, unnatural imagery of the dream better than a flatter 'swallowed.'
    'Devoured' is possible but adds a predatory nuance not required by the verb itself.
- source_word: הַשִּׁבֳּלִים
  chosen: ears
  alternatives:
  - heads of grain
  - stalks
  lexicon: HALOT
  rationale: שִׁבֹּלֶת in this context refers to an ear/head of grain, not the whole
    stalk. 'Ears' is concise and traditional English for grain heads; 'heads of grain'
    is possible but more cumbersome.
- source_word: הַדַּקּוֹת
  chosen: thin
  alternatives:
  - scrawny
  - lean
  lexicon: HALOT
  rationale: The adjective means thin/fine. 'Thin' is the most direct and natural
    rendering here. 'Lean' could work by analogy with the cows in the earlier dream,
    but the Hebrew here specifically describes the ears as thin.
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: This marks the definite direct object in Hebrew and has no direct English
    equivalent, so it is represented syntactically rather than translated.
- source_word: שֶׁבַע
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַבְּרִיאוֹת
  chosen: healthy
  alternatives:
  - fat
  - plump
  - robust
  lexicon: HALOT
  rationale: The adjective denotes healthiness or well-fed condition. For grain, 'healthy'
    communicates the positive condition naturally in modern English. 'Fat' is less
    idiomatic for ears of grain, though suitable for animals.
- source_word: וְהַמְּלֵאוֹת
  chosen: and full
  alternatives:
  - and ripe
  - and well-filled
  lexicon: HALOT
  rationale: From מלא, 'full.' In context it describes ears full of grain. 'And full'
    is formally close and understandable; 'well-filled' is interpretive and 'ripe'
    shifts the sense.
- source_word: וַיִּיקַץ
  chosen: awoke
  alternatives:
  - woke up
  lexicon: HALOT
  rationale: A standard narrative verb for waking from sleep. 'Awoke' fits the elevated
    but readable narrative style.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Behold' preserves the
    sudden realization and literary force better than colloquial alternatives.
- source_word: חֲלוֹם
  chosen: it was a dream
  alternatives:
  - a dream
  - this was a dream
  lexicon: HALOT
  rationale: The Hebrew is tersely 'and behold, a dream.' English normally supplies
    the copula for sense. 'It was a dream' captures Pharaoh's realization naturally
    while preserving the abruptness of the Hebrew.
