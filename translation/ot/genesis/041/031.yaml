id: GEN.41.31
reference: Genesis 41:31
source:
  edition: WLC
  text: וְ/לֹֽא יִוָּדַ֤ע הַ/שָּׂבָע֙ בָּ/אָ֔רֶץ מִ/פְּנֵ֛י הָ/רָעָ֥ב הַ/ה֖וּא אַחֲרֵי
    כֵ֑ן כִּֽי כָבֵ֥ד ה֖וּא מְאֹֽד־־־׃
translation:
  text: And the abundance in the land will not be recognized because of that famine
    afterward, for it will be very severe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be known'; the Hebrew verb can denote being known, recognized,
      or noticed.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִוָּדַע
  chosen: will not be recognized
  alternatives:
  - will not be known
  - will not be noticeable
  lexicon: HALOT
  rationale: Niphal of ידע here is passive/reflexive, indicating that the prior abundance
    will no longer be perceptible or acknowledged. 'Recognized' communicates that
    the years of plenty will effectively disappear from view in light of the later
    famine.
- source_word: הַשָּׂבָע
  chosen: the abundance
  alternatives:
  - the plenty
  - the fullness
  lexicon: HALOT
  rationale: In the Joseph narrative this noun refers to the years of plentiful harvest.
    'Abundance' is natural modern English and fits the agricultural-economic context
    better than the more wooden 'fullness.'
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/earth
  - throughout the land
  lexicon: HALOT
  rationale: '''Land'' best fits the regional sense in Genesis 41, referring to the
    territory affected by the coming famine rather than the whole earth in an absolute
    sense.'
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: 'The preposition here gives cause: the abundance will not be recognized
    on account of the famine. ''Because of'' is idiomatic and accurate.'
- source_word: הָרָעָב הַהוּא אַחֲרֵי כֵן
  chosen: that famine afterward
  alternatives:
  - that famine after that
  - the famine that follows
  lexicon: HALOT
  rationale: This phrase points to the famine that comes later, after the years of
    abundance. 'That famine afterward' preserves the demonstrative force and temporal
    sequence with readable English.
- source_word: כִּי כָבֵד הוּא מְאֹד
  chosen: for it will be very severe
  alternatives:
  - for it is very heavy
  - for it will be exceedingly grievous
  lexicon: HALOT
  rationale: כבד literally means 'heavy,' but with famine it idiomatically means severe
    or grievous. 'Very severe' conveys the sense clearly in contemporary English without
    flattening the intensity.
