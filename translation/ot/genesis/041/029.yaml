  from: are coming of great abundance
  to: of great abundance are coming
  rationale: The current phrasing, 'seven years are coming of great abundance,' is unidiomatic English. The preposition 'of' does not function correctly to link the verb phrase 'are coming' with the noun 'abundance' in this construction. A more natural and clear rendering would be 'seven years of great abundance are coming,' which makes 'of great abundance' a standard adjectival phrase modifying 'years'. This small change significantly improves readability without altering the core meaning or lexical choices.
