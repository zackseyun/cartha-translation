id: GEN.41.29
reference: Genesis 41:29
source:
  edition: WLC
  text: הִנֵּ֛ה שֶׁ֥בַע שָׁנִ֖ים בָּא֑וֹת שָׂבָ֥ע גָּד֖וֹל בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: Look, seven years are coming of great abundance throughout all the land of
    Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Behold, seven years are coming—great abundance in all the land of
      Egypt.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces the statement with attention-getting force. 'Look' preserves
    the deictic immediacy in readable modern English better than the more archaic
    'Behold.'
- source_word: שֶׁבַע שָׁנִים
  chosen: seven years
  lexicon: HALOT
  rationale: Straightforward numerical time expression; no idiomatic adjustment needed.
- source_word: בָּאוֹת
  chosen: are coming
  alternatives:
  - are about to come
  - will come
  lexicon: HALOT
  rationale: The feminine plural participle agrees with 'years' and conveys imminent/future
    approach. 'Are coming' preserves the participial vividness better than a simple
    future.
- source_word: שָׂבָע
  chosen: abundance
  alternatives:
  - plenty
  - fullness
  - satiation
  lexicon: HALOT
  rationale: In the Joseph narrative this noun refers to plentiful produce/food supply,
    not merely the abstract state of being satisfied. 'Abundance' is natural English
    and fits the economic context.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - vast
  - severe in degree
  - extraordinary
  lexicon: HALOT
  rationale: The adjective intensifies the abundance. 'Great' is a direct and idiomatic
    rendering; 'vast abundance' is possible but slightly more interpretive.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  - through all the land of Egypt
  lexicon: HALOT
  rationale: The preposition with 'all the land of Egypt' indicates extent across
    the whole territory. 'Throughout all the land of Egypt' makes the distributive
    force clear in natural English.
