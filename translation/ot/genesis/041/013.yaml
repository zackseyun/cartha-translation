id: GEN.41.13
reference: Genesis 41:13
source:
  edition: WLC
  text: וַ/יְהִ֛י כַּ/אֲשֶׁ֥ר פָּֽתַר לָ֖/נוּ כֵּ֣ן הָיָ֑ה אֹתִ֛/י הֵשִׁ֥יב עַל כַּנִּ֖/י
    וְ/אֹת֥/וֹ תָלָֽה־־׃
translation:
  text: 'And it happened just as he interpreted for us; so it happened: me he restored
    to my office, but him he hanged.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to my post' or 'to my station'; the Hebrew idiom refers to restoration
      to his former official position.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the outcome. 'And it happened'
    preserves the Hebrew narrative force in readable modern English without archaic
    diction.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks correspondence between the interpretation and the outcome. 'Just
    as' clearly conveys exactness.
- source_word: פָּתַר לָנוּ
  chosen: he interpreted for us
  alternatives:
  - he solved for us
  - he explained to us
  lexicon: HALOT
  rationale: פתר in dream contexts means to interpret/solve a dream. 'Interpreted'
    is the standard and contextually precise rendering.
- source_word: כֵּן הָיָה
  chosen: so it happened
  alternatives:
  - so it was
  - thus it happened
  lexicon: HALOT
  rationale: The phrase emphasizes exact fulfillment. 'So it happened' mirrors the
    Hebrew structure while sounding natural in English.
- source_word: אֹתִי הֵשִׁיב
  chosen: me he restored
  alternatives:
  - he restored me
  - me he brought back
  lexicon: HALOT
  rationale: Fronting of the object in Hebrew gives contrast with the following clause.
    English preserves some of that emphasis by fronting 'me' before the verb.
- source_word: עַל כַּנִּי
  chosen: to my office
  alternatives:
  - to my post
  - to my station
  - upon my stand
  lexicon: HALOT
  rationale: כֵּן here refers to an established place or office, especially an official
    position. In context the cupbearer means reinstatement to his former role, so
    'to my office' communicates the idiom clearly.
- source_word: וְאֹתוֹ תָלָה
  chosen: but him he hanged
  alternatives:
  - and him he hanged
  - but he hanged him
  lexicon: HALOT
  rationale: The conjunction marks continuation, but in English 'but' better brings
    out the sharp contrast between the two outcomes. Object fronting is partially
    preserved with 'him he hanged.' 'Hanged' reflects תלה in this judicial context.
