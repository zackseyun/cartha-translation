id: GEN.41.42
reference: Genesis 41:42
source:
  edition: WLC
  text: וַ/יָּ֨סַר פַּרְעֹ֤ה אֶת טַבַּעְתּ/וֹ֙ מֵ/עַ֣ל יָד֔/וֹ וַ/יִּתֵּ֥ן אֹתָ֖/הּ
    עַל יַ֣ד יוֹסֵ֑ף וַ/יַּלְבֵּ֤שׁ אֹת/וֹ֙ בִּגְדֵי שֵׁ֔שׁ וַ/יָּ֛שֶׂם רְבִ֥ד הַ/זָּהָ֖ב
    עַל צַוָּארֽ/וֹ־־־־׃
translation:
  text: Then Pharaoh removed his signet ring from his hand and put it on Joseph’s
    hand, and he clothed him in garments of fine linen and put a gold chain around
    his neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ring'; the Hebrew term can denote a ring generally, but in this royal
      context it likely refers to Pharaoh’s signet ring, symbolizing delegated authority.
    reason: lexical_alternative
  - marker: b
    text: '''Fine linen'' translates Hebrew שֵׁשׁ, a term for high-quality linen associated
      with wealth and honor.'
    reason: cultural_note
  - marker: c
    text: Or 'gold necklace' or 'gold collar.' The exact form of the neck ornament
      denoted by the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took off
  lexicon: HALOT
  rationale: The verb means to remove or take away. 'Removed' is natural modern English
    and fits the ceremonial action of taking off the ring.
- source_word: טַבַּעְתּוֹ
  chosen: his signet ring
  alternatives:
  - his ring
  lexicon: HALOT
  rationale: While the noun can mean 'ring,' in this royal-administrative context
    it is specifically the signet ring that conveys delegated authority. 'Signet ring'
    makes the function explicit without overtranslation.
- source_word: מֵעַל יָדוֹ
  chosen: from his hand
  alternatives:
  - from upon his hand
  lexicon: HALOT
  rationale: Idiomatic English prefers 'from his hand.' The Hebrew preposition-plus-noun
    is spatially straightforward.
- source_word: וַיִּתֵּן אֹתָהּ עַל יַד יוֹסֵף
  chosen: and put it on Joseph’s hand
  alternatives:
  - and gave it onto Joseph's hand
  - and placed it on Joseph's hand
  lexicon: HALOT
  rationale: Although נתן often means 'give,' here with the object ring and the phrase
    'on Joseph's hand' the sense is physical placement. 'Put it on Joseph's hand'
    best captures the action in English.
- source_word: וַיַּלְבֵּשׁ אֹתוֹ
  chosen: and he clothed him
  alternatives:
  - and dressed him
  lexicon: HALOT
  rationale: '''Clothed'' preserves the formal, investiture-like sense of the Hebrew
    better than the more casual ''dressed.'''
- source_word: בִּגְדֵי שֵׁשׁ
  chosen: in garments of fine linen
  alternatives:
  - in linen garments
  - in garments of byssus
  lexicon: HALOT
  rationale: שֵׁשׁ refers to fine linen, especially high-quality linen associated
    with status. 'Garments of fine linen' is both accurate and readable.
- source_word: רְבִד הַזָּהָב
  chosen: a gold chain
  alternatives:
  - a gold necklace
  - a collar of gold
  lexicon: HALOT
  rationale: The noun refers to an ornament worn around the neck, likely a chain or
    necklace as a mark of honor. 'Gold chain' is the most idiomatic and contextually
    fitting rendering.
- source_word: עַל צַוָּארוֹ
  chosen: around his neck
  alternatives:
  - on his neck
  lexicon: HALOT
  rationale: English idiom for jewelry is 'around his neck,' though the Hebrew literally
    says 'on his neck.' This is a minor dynamic adjustment for naturalness.
