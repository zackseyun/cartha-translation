  from: sent and called for Joseph
  to: sent for Joseph
  rationale: The Hebrew construction 'sent and called' (וַיִּשְׁלַח... וַיִּקְרָא) functions as an idiomatic unit for 'summoned.' The literal rendering 'sent and called for' is slightly redundant in English and can sound like two separate actions. A more natural and idiomatic rendering like 'sent for Joseph' or 'summoned Joseph' would convey the single action of summoning more smoothly.
