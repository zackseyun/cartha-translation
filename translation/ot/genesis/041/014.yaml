id: GEN.41.14
reference: Genesis 41:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח פַּרְעֹה֙ וַ/יִּקְרָ֣א אֶת יוֹסֵ֔ף וַ/יְרִיצֻ֖/הוּ מִן הַ/בּ֑וֹר וַ/יְגַלַּח֙ וַ/יְחַלֵּ֣ף שִׂמְלֹתָ֔י/ו וַ/יָּבֹ֖א אֶל פַּרְעֹֽה־־־׃
translation:
  text: Then Pharaoh sent for Joseph, and they quickly brought him out of the pit. He shaved, changed his clothes, and came to Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they hurried him out of the pit.' The Hebrew verb conveys urgency in bringing Joseph from confinement.
    reason: lexical_alternative
  - marker: b
    text: Or 'out of the dungeon.' The Hebrew word literally means 'pit' and can refer to a prison pit or cistern-like confinement.
    reason: lexical_alternative
  - marker: c
    text: Or 'sent and called for Joseph'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent.' In this context, with the following 'called for Joseph,' English can sound natural with either 'sent' or 'sent for.' I retained 'sent' to reflect the Hebrew sequence more transparently, while the next verb supplies the object of the summons.
- source_word: וַיִּקְרָא אֶת יוֹסֵף
  chosen: called for Joseph
  alternatives:
  - called Joseph
  - summoned Joseph
  lexicon: HALOT
  rationale: קרא with a personal object here denotes summoning rather than merely speaking a name. 'Called for Joseph' is idiomatic English and preserves the sense that Pharaoh ordered Joseph to be brought.
- source_word: וַיְרִיצֻהוּ
  chosen: they quickly brought him
  alternatives:
  - they hurried him
  - they made him run
  - they rushed him
  lexicon: HALOT
  rationale: From רוץ/רץ in a causative sense, the form conveys causing Joseph to move quickly. 'They quickly brought him' captures both the implied attendants as subject and the urgency, without the awkwardness of 'made him run.'
- source_word: מִן הַבּוֹר
  chosen: out of the pit
  alternatives:
  - out of the dungeon
  - from the cistern
  lexicon: HALOT
  rationale: בּוֹר literally means 'pit,' often a cistern or prison pit. Since Joseph has been confined, some versions use 'dungeon,' but 'pit' is the more text-transparent rendering and preserves the narrative link with earlier uses of the term.
- source_word: וַיְגַלַּח
  chosen: He shaved
  alternatives:
  - he shaved himself
  - he was shaved
  lexicon: HALOT
  rationale: The Hebrew verb is active and concise. English 'He shaved' is natural and sufficient; the reflexive sense is implicit. It likely refers to grooming for appearance before Pharaoh.
- source_word: וַיְחַלֵּף שִׂמְלֹתָיו
  chosen: changed his clothes
  alternatives:
  - changed his garments
  - changed his clothing
  lexicon: HALOT
  rationale: חלף with שׂמלה means to change one's clothing. 'Changed his clothes' is clear modern English; 'garments' is more formal but less natural.
- source_word: וַיָּבֹא אֶל פַּרְעֹה
  chosen: came to Pharaoh
  alternatives:
  - went in to Pharaoh
  - entered Pharaoh's presence
  lexicon: HALOT
  rationale: בוא אל is straightforwardly 'came to.' 'Went in to Pharaoh' is possible and slightly more courtly, but 'came to Pharaoh' best matches the Hebrew without over-interpreting the setting.
