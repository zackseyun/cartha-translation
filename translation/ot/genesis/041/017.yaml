id: GEN.41.17
reference: Genesis 41:17
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר פַּרְעֹ֖ה אֶל יוֹסֵ֑ף בַּ/חֲלֹמִ֕/י הִנְ/נִ֥י עֹמֵ֖ד עַל שְׂפַ֥ת
    הַ/יְאֹֽר־־׃
translation:
  text: Then Pharaoh said to Joseph, “In my dream, behold, I was standing on the bank
    of the Nile.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river.'' In the Egyptian context of Genesis, this term commonly
      refers to the Nile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Though the verb is formally 'spoke,' in English narrative with direct
    address 'said' is the most natural equivalent and preserves the discourse function
    without unnecessary stiffness.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard transliteration of the royal title/name in English Bible usage.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech; 'to' is the straightforward
    rendering.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Standard English transliteration of the personal name.
- source_word: בַּחֲלֹמִי
  chosen: In my dream
  alternatives:
  - In the dream I had
  - In my dream-vision
  lexicon: HALOT
  rationale: The prefixed preposition and 1cs suffix yield 'in my dream.' This is
    idiomatic and preserves Pharaoh's recounting of the dream setting.
- source_word: הִנְנִי
  chosen: behold, I was
  alternatives:
  - behold, I am
  - look, I was
  lexicon: HALOT
  rationale: הִנְנִי is a presentative particle meaning 'behold/here I am.' In English
    dream-reporting, 'behold, I was' best fits the following participle in past narrative
    context. 'Behold' preserves the vividness of the Hebrew.
- source_word: עֹמֵד
  chosen: standing
  alternatives:
  - stationed
  - standing there
  lexicon: HALOT
  rationale: The participle of עמד denotes being in a standing position. Combined
    with the dream-report frame, 'I was standing' is the natural English expression.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - by
  - upon
  lexicon: HALOT
  rationale: The preposition literally means 'on/upon,' but with 'bank/edge' in English,
    'on the bank' is idiomatic and faithful.
- source_word: שְׂפַת
  chosen: bank
  alternatives:
  - edge
  - shore
  - lip
  lexicon: HALOT
  rationale: Literally 'lip/edge,' but in geographical context with a river it refers
    to the riverbank. 'Bank' is the clearest contextual equivalent.
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Genesis' Egyptian setting, יְאֹר commonly refers specifically to the
    Nile rather than a generic river. Rendering it 'the Nile' communicates the referent
    clearly in English while remaining contextually precise.
