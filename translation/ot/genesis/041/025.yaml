id: GEN.41.25
reference: Genesis 41:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹסֵף֙ אֶל פַּרְעֹ֔ה חֲל֥וֹם פַּרְעֹ֖ה אֶחָ֣ד ה֑וּא אֵ֣ת אֲשֶׁ֧ר
    הָ/אֱלֹהִ֛ים עֹשֶׂ֖ה הִגִּ֥יד לְ/פַרְעֹֽה־׃
translation:
  text: Then Joseph said to Pharaoh, “Pharaoh’s dreams are one. What God is about
    to do he has declared to Pharaoh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pharaoh’s dream is one.” The Hebrew uses singular “dream,” but in context
      Joseph refers to Pharaoh’s two dreams as a single message.
    reason: lexical_alternative
  - marker: b
    text: Or “what God is doing” or “what God does.” The Hebrew participle may be
      rendered more literally, but here it likely points to what God is about to bring
      about.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Normal directional preposition in direct speech introduction.
- source_word: חֲלוֹם ... אֶחָד הוּא
  chosen: dreams are one
  alternatives:
  - dream is one
  - the dream is one
  lexicon: HALOT
  rationale: Although חֲלוֹם is singular in construct with Pharaoh, the statement
    refers to the two dream reports as a single message. English plural 'dreams are
    one' best conveys the sense in context without woodenly obscuring the point. The
    predicate 'one' is retained rather than paraphrased as 'mean the same thing.'
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration/title for the Egyptian ruler; repeated
    for clarity as in Hebrew.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - that
  lexicon: HALOT
  rationale: This combination introduces the content of what follows. 'What' is idiomatic
    English and accurately represents the object clause.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, Hebrew can still function as a definite reference to
    God. In English, 'God' is the natural rendering here, not 'the God.'
- source_word: עֹשֶׂה
  chosen: is about to do
  alternatives:
  - is doing
  - does
  lexicon: HALOT
  rationale: The participle with this context of impending revelation points to imminent
    action rather than ongoing process. 'Is about to do' captures the prospective
    nuance in Joseph's interpretation.
- source_word: הִגִּיד
  chosen: has declared
  alternatives:
  - has told
  - has made known
  - declared
  lexicon: HALOT
  rationale: The Hiphil of נגד means to tell or make known. 'Has declared' preserves
    the formal revelatory tone appropriate to divine disclosure to Pharaoh.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  lexicon: HALOT
  rationale: Standard rendering of the preposition with indirect object.
