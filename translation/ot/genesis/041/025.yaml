theological_decisions:
- issue: Rendering of הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: The verse refers to the true God revealing future events to Pharaoh through
    dreams. English idiom strongly favors 'God' here, and this does not import additional
    doctrinal content beyond the Hebrew reference.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
