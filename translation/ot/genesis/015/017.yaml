id: GEN.15.17
reference: Genesis 15:17
source:
  edition: WLC
  text: וַ/יְהִ֤י הַ/שֶּׁ֨מֶשׁ֙ בָּ֔אָה וַ/עֲלָטָ֖ה הָיָ֑ה וְ/הִנֵּ֨ה תַנּ֤וּר עָשָׁן֙
    וְ/לַפִּ֣יד אֵ֔שׁ אֲשֶׁ֣ר עָבַ֔ר בֵּ֖ין הַ/גְּזָרִ֥ים הָ/אֵֽלֶּה׃
translation:
  text: And when the sun had gone down and it was dark, behold, a smoking firepot
    and a flaming torch passed between these pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a smoking oven' or 'a smoking furnace.' The Hebrew term denotes an oven
      or fire-container; 'firepot' is chosen for natural English in this scene.
    reason: lexical_alternative
  - marker: b
    text: The 'pieces' are the divided animal parts prepared earlier in the covenant
      ritual (see Gen 15:10).
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the next event in narrative sequence.
    In English, 'And when ...' naturally carries the temporal transition created by
    the following clauses without archaic stiffness.
- source_word: הַשֶּׁמֶשׁ בָּאָה
  chosen: the sun had gone down
  alternatives:
  - the sun went down
  - the sun had set
  lexicon: HALOT
  rationale: בוא with 'sun' is an idiom for sunset. 'Had gone down' fits the narrative
    progression and preserves the concrete imagery better than the more interpretive
    'had set.'
- source_word: וַעֲלָטָה הָיָה
  chosen: and it was dark
  alternatives:
  - and darkness came
  - and thick darkness was
  lexicon: HALOT
  rationale: The noun עֲלָטָה denotes darkness/gloom. 'It was dark' is clear modern
    English and avoids over-specifying 'thick darkness' where the verse itself does
    not explicitly intensify beyond darkness/gloom.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation and draws attention to the vision-like
    scene. 'Behold' preserves the solemn, literary force better than colloquial alternatives.
- source_word: תַנּוּר עָשָׁן
  chosen: a smoking firepot
  alternatives:
  - a smoking oven
  - a smoking furnace
  lexicon: HALOT
  rationale: 'תַנּוּר refers to an oven/fire-container; in this covenant scene, ''firepot''
    communicates a portable vessel-like object more naturally in English than ''oven,''
    while ''furnace'' can sound too industrial or large. The construct with עָשָׁן
    is rendered adjectivally: ''smoking.'''
- source_word: לַפִּיד אֵשׁ
  chosen: a flaming torch
  alternatives:
  - a torch of fire
  - a firebrand
  lexicon: HALOT
  rationale: לַפִּיד is a torch; with אֵשׁ the phrase emphasizes its fiery character.
    'Flaming torch' is idiomatic and preserves the image without wooden literalism.
- source_word: אֲשֶׁר עָבַר
  chosen: passed
  alternatives:
  - which passed
  - went through
  lexicon: HALOT
  rationale: 'The relative clause refers back to the two fiery symbols together as
    a composite scene. English can smoothly render the clause as the main predication
    after the appositional phrase: ''passed between...''.'
- source_word: בֵּין הַגְּזָרִים הָאֵלֶּה
  chosen: between these pieces
  alternatives:
  - between these cut pieces
  - between these portions
  lexicon: HALOT
  rationale: גְּזָרִים are the divided pieces of the sacrificial animals from the
    preceding context. 'Pieces' is concise and natural; 'cut pieces' is more explicit
    but unnecessary because the context already establishes division.
