theological_decisions:
- issue: Nature of the fiery objects in the covenant-cutting scene
  chosen_reading: Render the imagery descriptively without explicitly identifying
    the objects as God himself in the translation line.
  alternative_readings:
  - Interpret the smoking firepot and flaming torch as a manifestation of the LORD's
    presence passing between the pieces.
  rationale: The broader context strongly suggests a divine covenant manifestation,
    but the Hebrew of this verse itself names only the visible symbols. To preserve
    theological tension and avoid importing interpretation into the main text, the
    translation remains descriptive.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
