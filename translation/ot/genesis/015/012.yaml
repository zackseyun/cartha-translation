id: GEN.15.12
reference: Genesis 15:12
source:
  edition: WLC
  text: וַ/יְהִ֤י הַ/שֶּׁ֨מֶשׁ֙ לָ/ב֔וֹא וְ/תַרְדֵּמָ֖ה נָפְלָ֣ה עַל אַבְרָ֑ם וְ/הִנֵּ֥ה
    אֵימָ֛ה חֲשֵׁכָ֥ה גְדֹלָ֖ה נֹפֶ֥לֶת עָלָֽי/ו־׃
translation:
  text: Now as the sun was going down, a deep sleep fell upon Abram. And behold, a
    great dark dread was falling upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a trance fell upon Abram.' The Hebrew term can denote an unusually deep,
      possibly divinely induced sleep.
    reason: lexical_alternative
  - marker: b
    text: Or 'a great terror of darkness' or 'a great dark terror.' The Hebrew compresses
      the ideas of dread and darkness into a vivid phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now as
  alternatives:
  - And it happened
  - And it came to pass
  - When
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the scene transition. In idiomatic
    modern English, 'Now as' captures the narrative progression and temporal setup
    without archaic formulae like 'it came to pass.'
- source_word: הַשֶּׁמֶשׁ לָבוֹא
  chosen: the sun was going down
  alternatives:
  - the sun was about to set
  - the sun was setting
  - at sunset
  lexicon: HALOT
  rationale: The infinitive construct of בוא with the sun expresses the approach of
    sunset. 'Was going down' is natural English and preserves the ongoing temporal
    sense.
- source_word: תַרְדֵּמָה
  chosen: a deep sleep
  alternatives:
  - a trance
  - deep slumber
  lexicon: HALOT
  rationale: תַּרְדֵּמָה commonly denotes a divinely induced deep sleep or heavy slumber.
    'Deep sleep' is the clearest default; 'trance' is possible in context but is more
    interpretive and less lexically direct.
- source_word: נָפְלָה עַל אַבְרָם
  chosen: fell upon Abram
  alternatives:
  - came over Abram
  - fell on Abram
  lexicon: HALOT
  rationale: The idiom נפל על conveys something descending or coming upon someone.
    'Fell upon Abram' preserves the Hebrew imagery and solemn tone.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - suddenly
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention and dramatic presentation. 'And behold'
    retains the literary force better than flatter alternatives.
- source_word: אֵימָה
  chosen: dread
  alternatives:
  - terror
  - fear
  lexicon: HALOT
  rationale: אֵימָה denotes terror or dread. 'Dread' fits the solemn, numinous context
    without overstating panic; 'terror' remains a viable alternative.
- source_word: חֲשֵׁכָה
  chosen: dark
  alternatives:
  - darkness
  - gloom
  lexicon: HALOT
  rationale: As an attributive noun/adjectival element modifying אֵימָה, חֲשֵׁכָה
    conveys darkness/gloom. Rendering it as 'dark' in the phrase 'dark dread' preserves
    the compact Hebrew apposition-like construction in readable English.
- source_word: גְדֹלָה
  chosen: great
  alternatives:
  - greatly intense
  - severe
  lexicon: HALOT
  rationale: The adjective straightforwardly intensifies the dread. 'Great' is simple,
    direct, and consistent with biblical style.
- source_word: נֹפֶלֶת עָלָיו
  chosen: was falling upon him
  alternatives:
  - fell upon him
  - came over him
  lexicon: HALOT
  rationale: The participle gives an ongoing or vivid aspect distinct from the earlier
    perfect 'fell.' 'Was falling upon him' preserves the Hebrew's progressive vividness
    and avoids flattening the clause into a simple past.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
