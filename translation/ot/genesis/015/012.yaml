theological_decisions:
- issue: Nature of תַּרְדֵּמָה in this revelatory context
  chosen_reading: a deep sleep
  alternative_readings:
  - a trance
  rationale: The context is visionary and covenantal, but the Hebrew noun itself most
    directly denotes deep sleep/slumber. Rendering it 'trance' would import a stronger
    interpretive claim than the word alone requires. The more interpretive option
    is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
