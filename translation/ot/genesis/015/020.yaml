id: GEN.15.20
reference: Genesis 15:20
source:
  edition: WLC
  text: וְ/אֶת הַ/חִתִּ֥י וְ/אֶת הַ/פְּרִזִּ֖י וְ/אֶת הָ/רְפָאִֽים־־־׃
translation:
  text: and the Hittites, and the Perizzites, and the Rephaim,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the giants." The Hebrew Rephaim can in some contexts be understood descriptively,
      but here it most likely refers to a people group in the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  - namely
  lexicon: HALOT
  rationale: Here וְ plus the object marker אֵת introduces another item in a continuing
    list of peoples/territories from the previous verse. In English, the object marker
    is not represented, and the conjunction is naturally rendered simply as "and."
- source_word: הַחִתִּי
  chosen: the Hittites
  alternatives:
  - the Hittite
  lexicon: HALOT
  rationale: 'Although morphologically singular in Hebrew, this gentilic with the
    article functions collectively for the people group. English idiom prefers the
    plural ethnonym in a list of nations: "the Hittites."'
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  alternatives:
  - the Perizzite
  lexicon: HALOT
  rationale: As with the preceding gentilic, the singular form is used collectively
    in Hebrew. The plural ethnonym best communicates that a people group is meant.
- source_word: הָרְפָאִים
  chosen: the Rephaim
  alternatives:
  - the Raphaim
  - the giants
  lexicon: HALOT
  rationale: רְפָאִים can denote the Rephaim as an ethnic group in land lists, distinct
    from later uses referring to shades of the dead. In this context of named peoples,
    transliterating as "Rephaim" preserves the proper-name force and avoids importing
    the interpretive gloss "giants" into the main text.
