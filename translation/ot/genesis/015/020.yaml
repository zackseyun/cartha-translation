theological_decisions:
- issue: Whether רְפָאִים should be rendered as an ethnic name or interpreted descriptively
  chosen_reading: Rendered as the proper ethnic name "Rephaim"
  alternative_readings:
  - giants
  rationale: Genesis 15:19–21 lists peoples inhabiting the land promised to Abram.
    In that setting, reading רְפָאִים as a named people group is contextually strongest.
    The alternative "giants" reflects a traditional interpretive association in some
    passages, but here it is better preserved as a footnote rather than placed in
    the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
