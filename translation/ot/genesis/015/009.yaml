id: GEN.15.9
reference: Genesis 15:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֗י/ו קְחָ֥/ה לִ/י֙ עֶגְלָ֣ה מְשֻׁלֶּ֔שֶׁת וְ/עֵ֥ז מְשֻׁלֶּ֖שֶׁת
    וְ/אַ֣יִל מְשֻׁלָּ֑שׁ וְ/תֹ֖ר וְ/גוֹזָֽל׃
translation:
  text: And he said to him, “Bring me a three-year-old heifer, a three-year-old female
    goat, a three-year-old ram, a turtledove, and a young pigeon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'take for me.' The sense in context is to bring or procure
      the animals for the covenant rite.
    reason: lexical_alternative
  - marker: b
    text: The repeated Hebrew term rendered 'three-year-old' is traditionally understood
      here to indicate animals three years of age.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form introducing the next event. 'And he
    said' preserves Hebrew narrative sequencing without overinterpreting temporal
    nuance.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Directly renders the preposition plus 3ms suffix; the antecedent in context
    is Abram.
- source_word: קְחָה לִי
  chosen: Bring me
  alternatives:
  - Take for me
  - Get me
  lexicon: HALOT
  rationale: The imperative of לקח with לִי is literally 'take for me,' but in idiomatic
    English, when requesting that specified animals be procured and presented, 'bring
    me' best captures the sense while remaining close to the Hebrew.
- source_word: עֶגְלָה
  chosen: heifer
  alternatives:
  - young cow
  lexicon: HALOT
  rationale: Refers to a young female bovine. 'Heifer' is the standard concise English
    equivalent in sacrificial/covenantal contexts.
- source_word: מְשֻׁלֶּשֶׁת
  chosen: three-year-old
  alternatives:
  - threefold
  - three years old
  lexicon: HALOT
  rationale: In this context of listing sacrificial animals, the participial/adjectival
    form is best understood as indicating age, not a geometric or numerical shape.
    'Three-year-old' is idiomatic modern English.
- source_word: עֵז
  chosen: female goat
  alternatives:
  - goat
  - she-goat
  lexicon: HALOT
  rationale: The noun is grammatically feminine and denotes a she-goat. 'Female goat'
    is clear modern English; 'she-goat' is possible but less natural.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for a male sheep, especially in sacrificial contexts.
- source_word: תֹר
  chosen: turtledove
  alternatives:
  - dove
  lexicon: HALOT
  rationale: The specific bird is a turtledove, not a generic dove; the more precise
    rendering should be preserved.
- source_word: גוֹזָל
  chosen: young pigeon
  alternatives:
  - young bird
  - fledgling
  lexicon: HALOT
  rationale: In this sacrificial pairing with תֹר, the term conventionally refers
    to a young pigeon. This is more contextually precise than the broader 'young bird'
    or 'fledgling'.
