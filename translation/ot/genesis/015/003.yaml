id: GEN.15.3
reference: Genesis 15:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אַבְרָ֔ם הֵ֣ן לִ֔/י לֹ֥א נָתַ֖תָּה זָ֑רַע וְ/הִנֵּ֥ה בֶן בֵּיתִ֖/י
    יוֹרֵ֥שׁ אֹתִֽ/י־׃
translation:
  text: Then Abram said, “Look, you have given me no offspring, and behold, a son
    of my household is to inherit me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will inherit me” or more interpretively, “will be my heir.” The Hebrew
      reads literally, “a son of my household is inheriting me.”
    reason: lexical_alternative
  - marker: b
    text: “Offspring” translates Hebrew zeraʿ, literally “seed,” here meaning progeny
      or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: The particle marks emphasis or attention. 'Look' is readable modern English;
    'behold' is more traditional but less natural for the target style.
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: In English the indirect object is naturally incorporated into 'you have
    given me,' preserving the sense without wooden phrasing.
- source_word: לֹא נָתַתָּה
  chosen: you have given ... no
  alternatives:
  - you did not give
  - you have not given
  lexicon: HALOT
  rationale: The perfect addresses God's completed action up to this point. 'You have
    given me no...' fits Abram's present complaint in idiomatic English.
- source_word: זָרַע
  chosen: offspring
  alternatives:
  - seed
  - descendant(s)
  lexicon: HALOT
  rationale: In context זרע refers to progeny, not literal seed. 'Offspring' is natural,
    singular-collective English and avoids overly literal 'seed' while preserving
    the covenantal sense.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: A second deictic particle heightens Abram's point. 'And behold' preserves
    the emphatic force and rhetorical parallel with the first clause.
- source_word: בֶן בֵּיתִי
  chosen: a son of my household
  alternatives:
  - a member of my household
  - a household son
  - one born in my house
  lexicon: HALOT
  rationale: Literally 'son of my house,' an idiom for a household member/heir attached
    to Abram's estate. 'A son of my household' keeps the familial-household imagery
    more transparently than the flatter 'member of my household.'
- source_word: יוֹרֵשׁ אֹתִי
  chosen: is to inherit me
  alternatives:
  - will inherit me
  - is my heir
  - will be my heir
  lexicon: HALOT
  rationale: The participle expresses the one acting as heir. The Hebrew object is
    'me,' likely by metonymy for Abram's estate/line. 'Is to inherit me' preserves
    the Hebrew structure more closely than the interpretive 'is my heir,' while remaining
    intelligible.
