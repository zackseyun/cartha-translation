theological_decisions:
- issue: Rendering of Abram's complaint about childlessness and inheritance
  chosen_reading: Abram laments that God has given him no offspring and that a household-born
    dependent stands as his heir.
  alternative_readings:
  - Abram refers specifically to a slave born in his house as heir
  - Abram means simply that his estate will pass to a household member
  rationale: The verse itself does not explicitly use the term 'slave'; it says 'son
    of my household.' The translation therefore avoids importing a more specific social
    status than the Hebrew states here, while preserving the household-heir idea.
    This maintains textual restraint and leaves fuller identification to the surrounding
    context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
