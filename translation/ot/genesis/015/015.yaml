id: GEN.15.15
reference: Genesis 15:15
source:
  edition: WLC
  text: וְ/אַתָּ֛ה תָּב֥וֹא אֶל אֲבֹתֶ֖י/ךָ בְּ/שָׁל֑וֹם תִּקָּבֵ֖ר בְּ/שֵׂיבָ֥ה טוֹבָֽה־׃
translation:
  text: As for you, you will go to your fathers in peace; you will be buried at a
    good old age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your ancestors.' The Hebrew reads literally 'to your fathers,' an
      idiom for dying and joining prior generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: As for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrastive or topical
    shift from Abram's descendants to Abram himself. 'As for you' brings out the discourse
    emphasis more naturally than a bare 'and you.'
- source_word: תָּב֥וֹא
  chosen: you will go
  alternatives:
  - you will come
  lexicon: HALOT
  rationale: הלך/בוא motion language here is idiomatic for death when paired with
    'to your fathers.' English idiom prefers 'go' in this construction.
- source_word: אֶל אֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'to your fathers.' This preserves the familial
    idiom and its connection to death and joining prior generations. 'Ancestors' is
    possible but less formally aligned with the source.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - in well-being
  lexicon: HALOT
  rationale: שָׁלוֹם carries peace, wholeness, and well-being. 'In peace' is the standard
    concise rendering and fits the idiom of dying without violent judgment.
- source_word: תִּקָּבֵר
  chosen: you will be buried
  alternatives:
  - you will be interred
  lexicon: HALOT
  rationale: The Niphal of קבר is straightforward passive/reflexive burial language.
    'Buried' is the natural modern English equivalent.
- source_word: בְּשֵׂיבָה טוֹבָה
  chosen: at a good old age
  alternatives:
  - in a good old age
  - in ripe old age
  lexicon: HALOT
  rationale: The phrase denotes advanced age with positive connotations. 'At a good
    old age' is idiomatic modern English and preserves both the temporal sense and
    the favorable quality expressed by טוֹבָה.
