theological_decisions:
- issue: Meaning of 'go to your fathers'
  chosen_reading: An idiom for Abram's death and joining prior generations, without
    specifying a detailed doctrine of the afterlife beyond the text.
  alternative_readings:
  - A more concrete reference to burial with ancestors
  - A stronger claim about conscious postmortem fellowship with ancestors
  rationale: The expression functions as a conventional death formula. Since Abram's
    burial place will not literally be with his immediate fathers, the phrase is broader
    than physical interment alone; however, the verse does not require importing a
    fully developed theology of the intermediate state. The translation preserves
    the idiom and avoids overinterpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
