id: GEN.15.19
reference: Genesis 15:19
source:
  edition: WLC
  text: אֶת הַ/קֵּינִי֙ וְ/אֶת הַ/קְּנִזִּ֔י וְ/אֵ֖ת הַ/קַּדְמֹנִֽי־־׃
translation:
  text: the Kenites, the Kenizzites, and the Kadmonites—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew קַדְמֹנִי (qadmoni) is related to 'east' or 'eastern'; here it is
      rendered as the ethnic name 'Kadmonites' because it appears in a list of peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected by presenting the listed peoples as objects in the larger sentence.
- source_word: הַקֵּינִי
  chosen: the Kenites
  alternatives:
  - the Kenite
  lexicon: HALOT
  rationale: Ethnonym with the article, functioning collectively for a people group.
    English idiom normally renders such collective ethnonyms in the plural ('the Kenites')
    rather than singular ('the Kenite').
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: The conjunction joins items in a list; the object marker itself is not
    separately represented in English.
- source_word: הַקְּנִזִּי
  chosen: the Kenizzites
  alternatives:
  - the Kenizzite
  lexicon: HALOT
  rationale: Collective ethnonym in a territorial list; plural English form best communicates
    a people group.
- source_word: וְאֵת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: Conjunction linking the final item in the series; the object marker is
    absorbed in normal English syntax.
- source_word: הַקַּדְמֹנִי
  chosen: the Kadmonites
  alternatives:
  - the easterners
  - the people of the east
  lexicon: HALOT
  rationale: Although the root is related to 'east' or 'eastern,' in this context
    it functions as an ethnonym in parallel with other named peoples. Transliteration
    as 'Kadmonites' best preserves the proper-name force and list structure.
