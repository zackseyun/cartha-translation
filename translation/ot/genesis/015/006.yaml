id: GEN.15.6
reference: Genesis 15:6
source:
  edition: WLC
  text: וְ/הֶאֱמִ֖ן בַּֽ/יהוָ֑ה וַ/יַּחְשְׁבֶ֥/הָ לּ֖/וֹ צְדָקָֽה׃
translation:
  text: And he believed the LORD, and he counted it to him as righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trusted the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'reckoned it' or 'credited it to him as righteousness.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew syntax is commonly understood to mean that the LORD counted Abram's
      believing as righteousness; a less likely alternative takes Abram as the subject
      of 'counted.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/הֶאֱמִן
  chosen: And he believed
  alternatives:
  - And he trusted
  - And he put his faith in
  lexicon: HALOT
  rationale: Hiphil of אמן here denotes placing trust/belief in someone. 'Believed'
    is the most direct and idiomatic rendering in this covenant context, while preserving
    the verbal link to later biblical theology. 'Trusted' is possible, but 'believed'
    better matches the clause structure and established intertextual usage.
- source_word: בַּ/יהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: 'The preposition marks the object of belief: ''in/by the LORD.'' Following
    the doctrine''s contested-terms guidance, יְהוָה is rendered ''the LORD'' rather
    than transliterated.'
- source_word: וַ/יַּחְשְׁבֶהָ
  chosen: and he counted it
  alternatives:
  - and he reckoned it
  - and he credited it
  lexicon: HALOT
  rationale: חשב commonly means to reckon, account, or count. 'Counted' is clear modern
    English and preserves the accounting/imputation sense without sounding overly
    technical. The 3fs suffix refers back to Abram's believing/faith as the thing
    counted.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix indicates the person to whose
    account something is reckoned. 'To him' best preserves the directional/accounting
    nuance.
- source_word: צְדָקָה
  chosen: as righteousness
  alternatives:
  - as justice
  - as a righteous status
  lexicon: HALOT
  rationale: צְדָקָה here denotes righteousness rather than distributive justice.
    'Righteousness' is the standard and most theologically precise rendering in this
    covenantal and later canonical context. The anarthrous noun works naturally in
    English with 'as righteousness.'
