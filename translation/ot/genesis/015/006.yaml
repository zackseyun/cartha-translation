theological_decisions:
- issue: Subject of 'counted'
  chosen_reading: 'The LORD is the subject: Abram believed the LORD, and the LORD
    counted it to Abram as righteousness.'
  alternative_readings:
  - 'Abram is the subject: Abram believed in the LORD, and Abram counted Him/it as
    righteousness'
  rationale: The most natural reading in context takes the subject of וַיַּחְשְׁבֶהָ
    as the immediately preceding referent, the LORD, yielding the sense reflected
    in the wider biblical reception of this verse (e.g., Romans 4; Galatians 3; James
    2). The alternative is grammatically discussed but contextually and canonically
    less likely. The translation preserves the mainstream syntactic reading without
    over-expanding the text.
  doctrine_reference: Preserve theological tension rather than resolve it; where ambiguity
    is limited, choose the plain-sense reading and document alternatives.
- issue: Referent of the feminine suffix in 'counted it'
  chosen_reading: The suffix refers to Abram's believing/faith, rendered simply as
    'it.'
  alternative_readings:
  - The suffix refers more broadly to Abram's response/trust
  - The clause is left more interpretively open by rendering 'this'
  rationale: Although the antecedent is not an explicit feminine noun in the immediate
    clause, Hebrew can use a feminine suffix to refer to an abstract action or event.
    Rendering 'it' is natural English and avoids importing a more interpretive noun
    such as 'faith' into the main text, while still conveying the sense.
  doctrine_reference: Optimal equivalence; do not paraphrase beyond what the source
    warrants.
