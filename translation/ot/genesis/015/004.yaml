theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for the Tetragrammaton,
    preserving covenantal resonance and established English Bible convention without
    transliterating the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Reference of the promised heir
  chosen_reading: one who comes from your own body
  alternative_readings:
  - one from your loins
  - one from your inward parts
  rationale: The verse emphasizes biological descent from Abram himself, in contrast
    to a non-biological household heir. The chosen wording preserves that theological/narrative
    point in accessible English without importing later doctrinal claims.
