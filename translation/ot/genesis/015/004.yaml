id: GEN.15.4
reference: Genesis 15:4
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה דְבַר יְהוָ֤ה אֵלָי/ו֙ לֵ/אמֹ֔ר לֹ֥א יִֽירָשְׁ/ךָ֖ זֶ֑ה כִּי אִם֙
    אֲשֶׁ֣ר יֵצֵ֣א מִ/מֵּעֶ֔י/ךָ ה֖וּא יִֽירָשֶֽׁ/ךָ־־׃
translation:
  text: And behold, the word of the LORD came to him, saying, “This man will not be
    your heir; rather, one who comes from your own body will be your heir.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''This one will not inherit you ... the one who comes from your
      inward parts/loins, he will inherit you.'' The main text renders the idiom as
      ''be your heir'' and ''your own body'' for natural English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the discourse-marking force and vividness of the Hebrew particle
    rather than omitting it. 'Behold' is still understandable in modern English and
    preserves the narrative emphasis.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the LORD's word
  lexicon: HALOT
  rationale: Standard prophetic/narrative formula. 'The LORD' follows the doctrinal
    default for יְהוָה. Keeping 'word' rather than paraphrasing as 'message' preserves
    the formulaic biblical expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the stated default rendering for the divine name in DOCTRINE.md.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition here marks direction of the divine word toward Abram;
    'to him' is the natural English equivalent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Preserves the Hebrew quotative construction in a natural but still fairly
    formal English way.
- source_word: לֹא יִירָשְׁךָ זֶה
  chosen: This man will not be your heir
  alternatives:
  - This one will not inherit you
  - This one will not be the one to inherit you
  lexicon: HALOT
  rationale: The verb ירשׁ with object suffix can be rendered literally as 'inherit
    you,' but in English the idiomatic sense in this context is 'be your heir.' 'This
    man' makes explicit the personal reference to Abram's proposed household heir
    (cf. context) while remaining faithful to the masculine singular demonstrative
    זֶה.
- source_word: זֶה
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: HALOT
  rationale: The demonstrative is masculine singular and refers to a person in context,
    not an abstract thing. 'This man' is more natural and specific in English than
    bare 'this one.'
- source_word: כִּי אִם
  chosen: rather
  alternatives:
  - but
  - except that
  lexicon: HALOT
  rationale: 'In this contrastive construction, the sense is corrective: not this
    person, but another. ''Rather'' captures the force smoothly in English.'
- source_word: אֲשֶׁר יֵצֵא
  chosen: one who comes from
  alternatives:
  - he who will come out from
  - who will issue from
  lexicon: HALOT
  rationale: This relative clause identifies the true heir. 'Comes from' is idiomatic
    English for physical descent without becoming overly anatomical or archaic.
- source_word: מִמֵּעֶיךָ
  chosen: your own body
  alternatives:
  - your loins
  - your inward parts
  lexicon: HALOT
  rationale: מֵעֶה can denote inward parts/womb/bowels, but here in a male addressee
    it refers to physical offspring from Abram himself. 'Your own body' communicates
    biological descent clearly in modern English; 'your loins' is traditional but
    archaic.
- source_word: הוּא יִירָשֶׁךָ
  chosen: will be your heir
  alternatives:
  - will inherit you
  lexicon: HALOT
  rationale: Repeats the same verb as earlier in the verse. Rendering it consistently
    as 'be your heir' preserves the sense and avoids awkward English.
