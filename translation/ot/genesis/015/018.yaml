id: GEN.15.18
reference: Genesis 15:18
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא כָּרַ֧ת יְהוָ֛ה אֶת אַבְרָ֖ם בְּרִ֣ית לֵ/אמֹ֑ר לְ/זַרְעֲ/ךָ֗ נָתַ֨תִּי֙ אֶת הָ/אָ֣רֶץ הַ/זֹּ֔את מִ/נְּהַ֣ר מִצְרַ֔יִם עַד הַ/נָּהָ֥ר הַ/גָּדֹ֖ל נְהַר פְּרָֽת־־־־׃
translation:
  text: On that day Yahweh made a covenant with Abram, saying, “To your offspring I have given this land, from the river of Egypt as far as the great river, the Euphrates.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “cut a covenant,” an idiom for making a covenant, likely reflecting the covenant-cutting ritual in the surrounding passage.
    reason: lexical_alternative
  - marker: b
    text: Or “from the brook/wadi of Egypt.” The Hebrew says “river of Egypt,” but the precise geographical reference is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Temporal expression marking a specific occasion. 'On that day' is the most natural modern English equivalent while remaining formally close.
- source_word: כָּרַת ... בְּרִית
  chosen: made a covenant
  alternatives:
  - cut a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cut a covenant.' In English, 'made a covenant' communicates the sense clearly in the main text. The more literal idiom is worth preserving as a lexical alternative because of its sacrificial background in the immediate context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת אַבְרָם
  chosen: with Abram
  alternatives:
  - with Abram as object marker retained only implicitly
  lexicon: HALOT
  rationale: Although Abram is marked with אֶת as the direct object of 'made/cut,' idiomatic English expresses covenant-making with 'with Abram.' This reflects the relational sense of covenant establishment.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing the covenant speech that follows.
- source_word: לְזַרְעֲךָ
  chosen: to your offspring
  alternatives:
  - to your seed
  - to your descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular force of זֶרַע better than ''descendants'' while sounding more natural than ''seed'' in contemporary English.'
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I gave
  lexicon: HALOT
  rationale: The perfect can express a completed act with present force in covenantal declaration. 'I have given' preserves the solemn certainty of the grant better than a simple present or past.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ/land
  lexicon: HALOT
  rationale: '''Land'' is the natural rendering in this territorial promise context.'
- source_word: מִנְּהַר מִצְרַיִם
  chosen: from the river of Egypt
  alternatives:
  - from the brook of Egypt
  - from the wadi of Egypt
  lexicon: HALOT
  rationale: נָהָר normally means 'river,' so the main text keeps that straightforward sense. Because the geographical identification is debated and some render it 'brook' or 'wadi,' the alternative is preserved in a footnote.
- source_word: עַד הַנָּהָר הַגָּדֹל
  chosen: as far as the great river
  alternatives:
  - to the great river
  lexicon: HALOT
  rationale: '''As far as'' naturally conveys the boundary sense of עַד in English.'
- source_word: נְהַר פְּרָת
  chosen: the Euphrates
  alternatives:
  - the river Euphrates
  - Euphrates River
  lexicon: HALOT
  rationale: Standard English designation of the named river; appositional relation to 'the great river' is preserved by punctuation.
