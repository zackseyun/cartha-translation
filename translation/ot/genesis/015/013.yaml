theological_decisions:
- issue: Referent of the plural subject in 'they will enslave them and afflict them'
  chosen_reading: The subject is the people of the foreign land, not Abram's offspring.
  alternative_readings:
  - An impersonal 'one/they' construction with unspecified oppressors
  rationale: Hebrew shifts from the singular collective 'your offspring' to plural
    pronominal references. In context, the most coherent reading is that the inhabitants
    of the foreign land will enslave and afflict Abram's offspring. This avoids obscuring
    the sense while not over-specifying beyond the text.
