id: GEN.15.13
reference: Genesis 15:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לְ/אַבְרָ֗ם יָדֹ֨עַ תֵּדַ֜ע כִּי גֵ֣ר יִהְיֶ֣ה זַרְעֲ/ךָ֗ בְּ/אֶ֨רֶץ֙
    לֹ֣א לָ/הֶ֔ם וַ/עֲבָד֖וּ/ם וְ/עִנּ֣וּ אֹתָ֑/ם אַרְבַּ֥ע מֵא֖וֹת שָׁנָֽה־׀׃
translation:
  text: Then he said to Abram, “Know for certain that your offspring will be sojourners
    in a land not theirs, and they will enslave them and afflict them four hundred
    years.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strangers' or 'resident aliens.' The Hebrew term refers to people living
      in a land that is not their own.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will make them serve.' The Hebrew verb can denote forced service;
      here the context supports 'enslave them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֹעַ תֵּדַע
  chosen: Know for certain
  alternatives:
  - You shall surely know
  - Know surely
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect of ידע intensifies the command/assurance.
    'Know for certain' is idiomatic modern English that preserves the emphatic force
    without archaic stiffness.
- source_word: גֵר
  chosen: sojourners
  alternatives:
  - strangers
  - resident aliens
  - foreigners
  lexicon: HALOT
  rationale: גֵר denotes one residing temporarily or as a non-native among others.
    'Sojourners' best captures temporary alien residence in a biblical register without
    importing modern legal categories too strongly.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective
    sense better than 'descendants,' while avoiding the overly literal but less natural
    'seed' in English.
- source_word: בְּאֶרֶץ לֹא לָהֶם
  chosen: in a land not theirs
  alternatives:
  - in a land that is not theirs
  - in a land belonging to others
  lexicon: HALOT
  rationale: The phrase states non-possession/foreignness succinctly. 'A land not
    theirs' is natural and close to the Hebrew wording.
- source_word: וַעֲבָדוּם
  chosen: they will enslave them
  alternatives:
  - they will make them serve
  - they will subject them to slavery
  lexicon: HALOT
  rationale: The 3mp subject is most naturally the inhabitants of the foreign land,
    with Abram's offspring as object. Given the coercive context and parallel with
    affliction, 'enslave' makes the bonded force explicit and fits the translation
    philosophy's preference for clarity where servitude is salient.
- source_word: וְעִנּוּ אֹתָם
  chosen: and afflict them
  alternatives:
  - and oppress them
  - and humble them
  lexicon: HALOT
  rationale: ענה in the piel commonly conveys affliction or oppression. 'Afflict'
    is broad enough to include harsh treatment without narrowing to one social mechanism.
- source_word: אַרְבַּע מֵאוֹת שָׁנָה
  chosen: four hundred years
  alternatives:
  - for four hundred years
  lexicon: HALOT
  rationale: The Hebrew gives the duration at the end without an explicit preposition.
    English normally supplies the temporal sense naturally; the duration is represented
    in the clause as the period of affliction/enslavement.
- source_word: וַיֹּאמֶר לְאַבְרָם
  chosen: Then he said to Abram
  alternatives:
  - And he said to Abram
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
