theological_decisions:
- issue: Rendering of זַרְעֶךָ in a promise text with possible singular/collective
    resonance
  chosen_reading: your offspring
  alternative_readings:
  - your seed
  - your descendants
  rationale: The Hebrew noun is morphologically singular but often collective. 'Offspring'
    preserves that ambiguity and avoids prematurely resolving later theological readings
    tied to the Abrahamic promise. 'Seed' is more formally literal but less natural
    in contemporary English; 'descendants' makes the plurality more explicit than
    the Hebrew requires.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
