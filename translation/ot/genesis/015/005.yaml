id: GEN.15.5
reference: Genesis 15:5
source:
  edition: WLC
  text: וַ/יּוֹצֵ֨א אֹת֜/וֹ הַ/ח֗וּצָ/ה וַ/יֹּ֨אמֶר֙ הַבֶּט נָ֣א הַ/שָּׁמַ֗יְמָ/ה
    וּ/סְפֹר֙ הַ/כּ֣וֹכָבִ֔ים אִם תּוּכַ֖ל לִ/סְפֹּ֣ר אֹתָ֑/ם וַ/יֹּ֣אמֶר ל֔/וֹ כֹּ֥ה
    יִהְיֶ֖ה זַרְעֶֽ/ךָ־־׃
translation:
  text: Then he brought him outside and said, “Please look toward the heavens and
    count the stars, if you are able to count them.” Then he said to him, “So shall
    your offspring be.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your seed”; the Hebrew noun is singular in form but collective in sense,
      and can refer to offspring collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  chosen: brought ... outside
  alternatives:
  - led ... outside
  - took ... outside
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause someone to go out. 'Brought him outside'
    is natural modern English and preserves the causative sense without sounding wooden.
- source_word: הַחוּצָה
  chosen: outside
  alternatives:
  - outdoors
  - to the outside
  lexicon: HALOT
  rationale: The directional form indicates movement to the outside. 'Outside' is
    the most idiomatic concise rendering.
- source_word: הַבֶּט נָא
  chosen: Please look
  alternatives:
  - Look now
  - Look, please
  - Gaze now
  lexicon: HALOT
  rationale: הבט is an imperative 'look' and נא softens or adds urgency/politeness.
    'Please look' captures the particle's force in readable English better than the
    archaic-sounding 'look now.'
- source_word: הַשָּׁמַיְמָה
  chosen: toward the heavens
  alternatives:
  - toward heaven
  - to the sky
  - heavenward
  lexicon: HALOT
  rationale: The directional ending marks motion/orientation toward the sky/heavens.
    'The heavens' preserves the Hebrew plural form and biblical register better than
    'sky,' while 'toward' reflects the directional nuance.
- source_word: וּסְפֹר
  chosen: and count
  alternatives:
  - and number
  lexicon: HALOT
  rationale: ספר here means to count or enumerate. 'Count' is the standard clear English
    equivalent.
- source_word: הַכּוֹכָבִים
  chosen: the stars
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: אִם תּוּכַל לִסְפֹּר אֹתָם
  chosen: if you are able to count them
  alternatives:
  - if you can count them
  lexicon: HALOT
  rationale: This conditional clause expresses ability. 'If you are able to count
    them' is slightly fuller and preserves the emphasis on ability; 'if you can count
    them' would also be acceptable.
- source_word: כֹּה יִהְיֶה
  chosen: So shall ... be
  alternatives:
  - Thus will ... be
  - This is how ... will be
  lexicon: HALOT
  rationale: A formulaic comparison/result statement. 'So shall ... be' is idiomatic,
    dignified, and closely reflects the Hebrew.
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular that can denote seed or descendants. 'Your
    offspring' preserves the collective sense in natural English better than the overly
    literal 'seed' and is less interpretively expansive than 'descendants.'
