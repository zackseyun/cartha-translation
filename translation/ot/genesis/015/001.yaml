id: GEN.15.1
reference: Genesis 15:1
source:
  edition: WLC
  text: אַחַ֣ר הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה הָיָ֤ה דְבַר יְהוָה֙ אֶל אַבְרָ֔ם בַּֽ/מַּחֲזֶ֖ה
    לֵ/אמֹ֑ר אַל תִּירָ֣א אַבְרָ֗ם אָנֹכִי֙ מָגֵ֣ן לָ֔/ךְ שְׂכָרְ/ךָ֖ הַרְבֵּ֥ה מְאֹֽד׀־־־׃
translation:
  text: After these things, the word of the LORD came to Abram in a vision, saying,
    “Do not fear, Abram. I am a shield for you; your reward will be very great.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I am your shield; your reward is exceedingly great.”
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  chosen: After these things
  alternatives:
  - After these events
  - After these words
  lexicon: HALOT
  rationale: A conventional temporal formula. 'Things' preserves the broad sense of
    דְּבָרִים here without over-specifying either spoken words or events; contextually
    it refers to the preceding narrative happenings.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the LORD's word
  - a word from the LORD
  lexicon: HALOT
  rationale: A standard prophetic/revelatory expression. 'The word of the LORD' preserves
    the Hebrew construct phrase and its recognizable theological force. Per doctrine,
    יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine policy.
- source_word: הָיָה ... אֶל אַבְרָם
  chosen: came to Abram
  alternatives:
  - was to Abram
  - happened to Abram
  lexicon: HALOT
  rationale: English idiom normally renders 'the word of X was/came to Y' as 'came
    to.' This is a natural equivalent that preserves the revelatory event without
    wooden phrasing.
- source_word: בַּמַּחֲזֶה
  chosen: in a vision
  alternatives:
  - in the vision
  - by a vision
  lexicon: HALOT
  rationale: 'The noun denotes a visionary revelation. The article is best rendered
    idiomatically in English as indefinite here: ''in a vision.'''
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech; 'saying'
    keeps the formal linkage to the quoted words.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  - Fear not
  lexicon: HALOT
  rationale: A direct prohibition. 'Do not fear' is clear modern English and slightly
    more formally aligned to the Hebrew than 'Do not be afraid,' while avoiding archaic
    'Fear not.'
- source_word: מָגֵן לָךְ
  chosen: a shield for you
  alternatives:
  - your shield
  - a shield to you
  lexicon: HALOT
  rationale: Because the Hebrew lacks an explicit pronominal suffix on 'shield,' the
    predicate is more literally 'a shield for you' rather than 'your shield.' This
    preserves the syntax while remaining natural English.
- source_word: שְׂכָרְךָ
  chosen: your reward
  alternatives:
  - your wages
  - your recompense
  lexicon: HALOT
  rationale: The noun can denote payment, wages, or reward. In this covenantal context,
    'reward' best fits idiomatic English without reducing the sense to mere wages.
- source_word: הַרְבֵּה מְאֹד
  chosen: will be very great
  alternatives:
  - is very great
  - greatly abundant
  lexicon: HALOT
  rationale: This phrase is elliptical in Hebrew after 'your reward.' English commonly
    supplies a copular or verbal sense. 'Will be very great' fits the promissory context
    and avoids the awkwardness of a verbless clause in English.
