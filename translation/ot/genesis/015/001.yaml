theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding the promise clause שְׂכָרְךָ הַרְבֵּה מְאֹד
  chosen_reading: your reward will be very great
  alternative_readings:
  - I am your shield, your exceedingly great reward
  - I am a shield for you; your reward is very great
  rationale: 'The Hebrew most naturally reads as two predications: ''I am a shield
    for you'' and ''your reward [will be] very great.'' This avoids collapsing ''shield''
    and ''reward'' into a single predicate of God, while preserving the promise''s
    force. The future nuance is supplied in English because the clause is promissory
    in context.'
