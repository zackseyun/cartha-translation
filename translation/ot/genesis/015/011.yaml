id: GEN.15.11
reference: Genesis 15:11
source:
  edition: WLC
  text: וַ/יֵּ֥רֶד הָ/עַ֖יִט עַל הַ/פְּגָרִ֑ים וַ/יַּשֵּׁ֥ב אֹתָ֖/ם אַבְרָֽם־׃
translation:
  text: And the birds of prey came down on the carcasses, but Abram drove them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the bird of prey came down on the carcasses.'' The Hebrew noun can
      be read as a singular collective, but the sense is likely collective here: scavenging
      birds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb ירד means 'go down/come down, descend.' In narrative English,
    'came down' is natural and preserves the motion toward the carcasses better than
    the more formal 'descended.'
- source_word: הָעַיִט
  chosen: the birds of prey
  alternatives:
  - the bird of prey
  - the vultures
  - the raptors
  lexicon: HALOT
  rationale: עַיִט can function as a collective noun for birds of prey rather than
    a single bird. Because the following object is plural and the scene naturally
    envisions scavenging birds, 'the birds of prey' is the clearest idiomatic rendering.
    'Vultures' is too specific for the Hebrew term.
- source_word: הַפְּגָרִים
  chosen: the carcasses
  alternatives:
  - the pieces
  - the corpses
  - the dead animals
  lexicon: HALOT
  rationale: פֶּגֶר refers to a carcass/corpse. In this covenant-sacrifice context,
    'carcasses' fits the slaughtered animals specifically and is more precise than
    'pieces,' which would undertranslate the noun.
- source_word: וַיַּשֵּׁב אֹתָם
  chosen: drove them away
  alternatives:
  - chased them away
  - made them return
  - kept them off
  lexicon: HALOT
  rationale: The Hiphil of שוב here has the sense of causing to turn back. 'Drove
    them away' is idiomatic English that captures Abram's active repelling of the
    birds.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal names are transliterated by standard convention; at this point
    in Genesis the patriarch's name is still Abram, not Abraham.
