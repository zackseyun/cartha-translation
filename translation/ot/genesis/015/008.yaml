theological_decisions:
- issue: Rendering the divine name in the compound address אֲדֹנָי יֱהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord the LORD
  - Lord YHWH
  rationale: The doctrine excerpt sets the default for YHWH as 'the LORD.' In this
    special compound, however, a strictly mechanical rendering would produce awkward
    English ('Lord the LORD' or 'Lord LORD'). 'Lord GOD' preserves reverence, distinguishes
    the two elements, and aligns with established English practice without introducing
    a transliteration the doctrine does not prefer.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
