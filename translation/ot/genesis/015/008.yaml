id: GEN.15.8
reference: Genesis 15:8
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר אֲדֹנָ֣/י יֱהוִ֔ה בַּ/מָּ֥ה אֵדַ֖ע כִּ֥י אִֽירָשֶֽׁ/נָּה׃
translation:
  text: And he said, “Lord GOD, how will I know that I will possess it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “how may I know that I will inherit it?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, advancing the storyline. 'And
    he said' preserves Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: אֲדֹנָי יֱהוִה
  chosen: Lord GOD
  alternatives:
  - Lord the LORD
  - Lord YHWH
  lexicon: HALOT
  rationale: The phrase combines אֲדֹנָי with the divine name YHWH. Because the project
    default renders YHWH as 'the LORD,' but English convention avoids 'Lord LORD,'
    'Lord GOD' is the clearest equivalent and reflects longstanding handling of this
    compound address. 'YHWH' is not used in the main text per doctrine guidance.
- source_word: בַּמָּה
  chosen: how
  alternatives:
  - by what
  - whereby
  lexicon: HALOT
  rationale: Literally 'by what?' but idiomatically introduces the means by which
    Abram will know. 'How' is natural modern English and preserves the sense of requested
    assurance.
- source_word: אֵדַע
  chosen: will I know
  alternatives:
  - may I know
  - can I know
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ידע in context expresses future/resultative sense
    within the question. 'Will I know' fits the expected English idiom after 'how'
    and keeps the focus on certainty.
- source_word: כִּי
  chosen: that
  alternatives:
  - for that
  - indeed that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Abram seeks to know: that he
    will inherit/possess the land. ''That'' is the most straightforward English complementizer.'
- source_word: אִירָשֶׁנָּה
  chosen: I will possess it
  alternatives:
  - I will inherit it
  - I will take possession of it
  lexicon: HALOT
  rationale: From ירשׁ, which can mean inherit, possess, or dispossess/take possession
    depending on context. Since the referent is the land promised in the previous
    verse, 'possess it' communicates actual possession clearly in modern English.
    'Inherit it' is possible and preserves covenantal nuance, so it is retained in
    a footnote.
