id: GEN.15.16
reference: Genesis 15:16
source:
  edition: WLC
  text: וְ/ד֥וֹר רְבִיעִ֖י יָשׁ֣וּבוּ הֵ֑נָּה כִּ֧י לֹא שָׁלֵ֛ם עֲוֺ֥ן הָ/אֱמֹרִ֖י
    עַד הֵֽנָּה־־׃
translation:
  text: And in the fourth generation they will return here, for the iniquity of the
    Amorites is not yet complete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the iniquity of the Amorite,' with 'Amorite' used collectively for the
      people group.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'until here'; the sense is that the Amorites' iniquity has not
      yet reached its full measure up to that time.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/ד֥וֹר
  chosen: And in the ... generation
  alternatives:
  - And the ... generation
  - Then in the ... generation
  lexicon: HALOT
  rationale: דּוֹר means 'generation.' The prefixed conjunction is rendered smoothly
    with 'And,' and English idiom requires 'in the fourth generation' rather than
    a more wooden 'and a fourth generation.'
- source_word: רְבִיעִי
  chosen: fourth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'generation'; straightforwardly rendered
    'fourth.'
- source_word: יָשׁוּבוּ
  chosen: they will return
  alternatives:
  - they will come back
  - they will turn back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' In this context of Abram's descendants
    coming back to the land, 'return' best preserves both literal movement and covenant
    context.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - to here
  - to this place
  lexicon: HALOT
  rationale: Deictic adverb indicating destination/location. 'Here' is natural English
    and fits the promise of return to the land being shown.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the delayed return. 'For' preserves the explanatory
    force in a concise, biblical style.
- source_word: לֹא שָׁלֵם
  chosen: is not yet complete
  alternatives:
  - is not complete
  - has not yet reached its full measure
  - is not yet full
  lexicon: HALOT
  rationale: שָׁלֵם here conveys completeness/full measure. Adding 'yet' brings out
    the temporal sense implied by the following 'until now/then' without over-paraphrasing.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here it refers
    to the moral evil of the Amorites that has not reached its full measure. 'Iniquity'
    best captures the ethical sense without narrowing it merely to subjective guilt.
- source_word: הָ/אֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Though morphologically singular, 'the Amorite' can function collectively.
    English idiom prefers the plural ethnonym 'the Amorites' for the people group
    inhabiting the land.
- source_word: עַד הֵנָּה
  chosen: yet
  alternatives:
  - until now
  - until then
  lexicon: HALOT
  rationale: The phrase marks that the Amorites' iniquity has not reached completion
    up to the divinely appointed time. In English, 'not yet complete' naturally incorporates
    this temporal idea. The fuller alternatives are preserved in a footnote because
    the phrase can be understood as 'until now' or, prospectively in context, 'until
    then.'
