theological_decisions:
- issue: Divine delay of judgment and Israel's return
  chosen_reading: The verse states that Israel's return is delayed until the Amorites'
    iniquity reaches its full measure, without specifying a broader theory of providence
    beyond this stated reason.
  alternative_readings:
  - The delay emphasizes God's patience toward the Amorites
  - The delay primarily serves Israel's formation in Egypt
  rationale: The text explicitly grounds the timing in the Amorites' not-yet-complete
    iniquity. The translation preserves that rationale without importing a more developed
    doctrinal explanation not stated in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
