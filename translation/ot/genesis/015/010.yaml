id: GEN.15.10
reference: Genesis 15:10
source:
  edition: WLC
  text: וַ/יִּֽקַּֽח ל֣/וֹ אֶת כָּל אֵ֗לֶּה וַ/יְבַתֵּ֤ר אֹתָ/ם֙ בַּ/תָּ֔וֶךְ וַ/יִּתֵּ֥ן
    אִישׁ בִּתְר֖/וֹ לִ/קְרַ֣את רֵעֵ֑/הוּ וְ/אֶת הַ/צִפֹּ֖ר לֹ֥א בָתָֽר־־־־־׃
translation:
  text: So he took all these for himself, cut them in two, and placed each half opposite
    its mate; but he did not cut the birds in two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut them down the middle.' The Hebrew verb refers to dividing the animals
      into pieces, a covenant-making ritual.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'placed each piece opposite its fellow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח לוֹ
  chosen: So he took all these for himself
  alternatives:
  - Then he took all these for him
  - And he took all these
  lexicon: HALOT
  rationale: וַיִּקַּח is the narrative wayyiqtol 'and/then he took.' The prepositional
    pronoun לוֹ is retained as 'for himself' to reflect the dative nuance rather than
    omitting it entirely, though in English it may function idiomatically.
- source_word: כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all these things
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase referring back to the animals named
    in the previous verse.
- source_word: וַיְבַתֵּר אֹתָם בַּתָּוֶךְ
  chosen: cut them in two
  alternatives:
  - divided them in the middle
  - split them down the middle
  lexicon: HALOT
  rationale: בתר means to cut or divide, especially carcasses in covenantal contexts.
    'Cut them in two' is natural English and fits the ritual setting; בַּתָּוֶךְ is
    expressed idiomatically by 'in two' rather than a more wooden 'in the middle.'
- source_word: וַיִּתֵּן אִישׁ בִּתְרוֹ לִקְרַאת רֵעֵהוּ
  chosen: and placed each half opposite its mate
  alternatives:
  - and set each piece opposite the other
  - and put each part facing its counterpart
  lexicon: HALOT
  rationale: אִישׁ ... רֵעֵהוּ is distributive idiom ('each ... its fellow'). בִּתְרוֹ
    refers to each severed piece/half. 'Opposite its mate' captures the spatial arrangement
    and the idiomatic relational language in readable English.
- source_word: וְאֶת הַצִּפֹּר לֹא בָתָר
  chosen: but he did not cut the birds in two
  alternatives:
  - but the bird he did not divide
  - but he did not cut up the birds
  lexicon: HALOT
  rationale: The singular collective הַצִּפֹּר refers to the birds mentioned previously;
    English plural 'the birds' communicates the referent clearly. Repeating 'in two'
    makes explicit the same action denied here and matches the prior clause.
