theological_decisions:
- issue: Covenant-cutting ritual language
  chosen_reading: Rendered the action concretely as animal halves arranged opposite
    each other without importing later theological explanation into the verse itself.
  alternative_readings:
  - More formal 'cut them in the middle'
  - Interpretive expansion about covenant ceremony
  rationale: The verse describes ritual preparation for the covenant scene. The translation
    preserves the concrete imagery and covenantal resonance of בתר while avoiding
    explanatory paraphrase not stated in the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 6
