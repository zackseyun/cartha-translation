id: GEN.15.21
reference: Genesis 15:21
source:
  edition: WLC
  text: וְ/אֶת הָֽ/אֱמֹרִי֙ וְ/אֶת הַֽ/כְּנַעֲנִ֔י וְ/אֶת הַ/גִּרְגָּשִׁ֖י וְ/אֶת
    הַ/יְבוּסִֽי־־־־׃ס
translation:
  text: and the Amorites, and the Canaanites, and the Girgashites, and the Jebusites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  - with
  lexicon: HALOT
  rationale: Here וְ introduces continuation in a list, while אֶת marks each definite
    direct object. English does not normally repeat an object marker, so the natural
    equivalent is simply the coordinating conjunction 'and' before each people group,
    preserving the list structure.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular as an ethnonym, in English such collective
    people-group names are idiomatically rendered as plurals in this context of listing
    the inhabitants of the land. 'Amorites' best communicates the ethnic group.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: As with the other ethnonyms in the list, the collective singular in Hebrew
    is most naturally rendered by the English plural for the people group.
- source_word: הַגִּרְגָּשִׁי
  chosen: the Girgashites
  alternatives:
  - the Girgashite
  lexicon: HALOT
  rationale: Rendered as the standard English plural ethnonym to match normal English
    usage for a listed nation or people.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Rendered as the plural ethnonym in English for consistency with the surrounding
    list and standard usage.
