id: GEN.15.14
reference: Genesis 15:14
source:
  edition: WLC
  text: וְ/גַ֧ם אֶת הַ/גּ֛וֹי אֲשֶׁ֥ר יַעֲבֹ֖דוּ דָּ֣ן אָנֹ֑כִי וְ/אַחֲרֵי כֵ֥ן יֵצְא֖וּ
    בִּ/רְכֻ֥שׁ גָּדֽוֹל־־׃
translation:
  text: But I will also judge the nation that they serve, and afterward they will
    come out with great possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that they will be enslaved to'; the Hebrew verb is literally 'serve,'
      but in context it refers to forced service under a foreign nation.
    reason: lexical_alternative
  - marker: b
    text: Or 'with great wealth' or 'with abundant goods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: But I will also
  alternatives:
  - And also
  - And indeed I will also
  lexicon: HALOT
  rationale: וְ plus גַם adds continuation with emphasis. In English, 'But I will
    also' fits the discourse contrast with the prior statement about Abram's offspring
    being afflicted, while preserving the additive force of גַם.
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - that nation
  - the people
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation' or 'people.' Here it refers to the foreign
    national power that will enslave Abram's descendants. 'The nation' is the most
    direct and natural rendering.
- source_word: אֲשֶׁר יַעֲבֹדוּ
  chosen: that they serve
  alternatives:
  - whom they will serve
  - that they will be enslaved to
  lexicon: HALOT
  rationale: עבד in the qal means 'serve/work for.' The object is the nation, so 'that
    they serve' is formally close. 'Be enslaved to' captures implication but goes
    beyond the explicit verbal form, so it is kept as an alternative rather than the
    main text.
- source_word: דָּן אָנֹכִי
  chosen: I will judge
  alternatives:
  - I am judging
  - I will punish
  lexicon: HALOT
  rationale: The participle דָּן with independent pronoun אָנֹכִי expresses emphatic
    first-person action, often with future sense in context. 'I will judge' preserves
    both the legal/judicial nuance and the forward-looking sense. 'Punish' is interpretive
    and narrower.
- source_word: וְאַחֲרֵי כֵן
  chosen: and afterward
  alternatives:
  - and after that
  - and then afterward
  lexicon: HALOT
  rationale: This temporal phrase marks sequence. 'And afterward' is concise, natural,
    and preserves the progression.
- source_word: יֵצְאוּ
  chosen: they will come out
  alternatives:
  - they will go out
  - they will depart
  lexicon: HALOT
  rationale: יצא means 'go out/come out.' In English, from the perspective of leaving
    bondage, 'come out' is idiomatic and common, while still faithful to the source.
- source_word: בִּרְכֻשׁ גָּדוֹל
  chosen: with great possessions
  alternatives:
  - with much property
  - with abundant goods
  - with great wealth
  lexicon: HALOT
  rationale: רְכוּשׁ denotes property, goods, or possessions. 'With great possessions'
    is a natural rendering that preserves the concrete sense of acquired goods without
    reducing it merely to abstract 'wealth'.
