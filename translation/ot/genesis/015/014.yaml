theological_decisions:
- issue: Nature of divine judgment on the oppressing nation
  chosen_reading: judge
  alternative_readings:
  - punish
  rationale: The Hebrew דָּן is judicial language. Rendering it as 'judge' preserves
    the text's legal and moral framing without narrowing it to the outcome alone.
    This avoids importing more specific theological claims than the verse states.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
