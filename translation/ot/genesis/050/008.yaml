id: GEN.50.8
reference: Genesis 50:8
source:
  edition: WLC
  text: וְ/כֹל֙ בֵּ֣ית יוֹסֵ֔ף וְ/אֶחָ֖י/ו וּ/בֵ֣ית אָבִ֑י/ו רַ֗ק טַפָּ/ם֙ וְ/צֹאנָ֣/ם וּ/בְקָרָ֔/ם עָזְב֖וּ בְּ/אֶ֥רֶץ גֹּֽשֶׁן׃
translation:
  text: and all the household of Joseph, and his brothers, and his father's household; they left only their little ones, their flocks, and their herds in the land of Goshen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of Joseph ... his father's house.' The Hebrew word 'house' here refers to the family or household, not merely a building.
    reason: lexical_alternative
  - marker: b
    text: '''Little ones'' refers to young children.'
    reason: lexical_alternative
  - marker: c
    text: Or "and all the household of Joseph, and his brothers, and his father's household. Only their little ones, and their flocks, and their herds they left in the land of Goshen.".
    reason: previous_rendering
lexical_decisions:
- source_word: וְכֹל
  chosen: and all
  alternatives:
  - and the whole of
  lexicon: HALOT
  rationale: כֹּל with prefixed conjunction introduces an additive element from the previous verse and denotes totality. 'And all' is natural English and preserves the comprehensive scope.
- source_word: בֵּית יוֹסֵף
  chosen: the household of Joseph
  alternatives:
  - the house of Joseph
  lexicon: HALOT
  rationale: בַּיִת in construct with a personal name commonly refers to a household or family unit, not merely a physical building. 'Household' best fits the context of persons traveling for burial.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his brothers/siblings
  lexicon: HALOT
  rationale: אָח in the plural here refers to Joseph's male siblings. 'Brothers' is gender-accurate and matches the source.
- source_word: וּבֵית אָבִיו
  chosen: and his father's household
  alternatives:
  - and his father's house
  lexicon: HALOT
  rationale: As with בֵּית יוֹסֵף, the phrase denotes the family/household associated with his father rather than a structure. 'Household' communicates the social unit.
- source_word: רַק
  chosen: Only
  alternatives:
  - except that
  - however only
  lexicon: HALOT
  rationale: רַק marks an exception or limitation. 'Only' is concise and idiomatic in English.
- source_word: טַפָּם
  chosen: their little ones
  alternatives:
  - their children
  - their dependents
  lexicon: HALOT
  rationale: טַף refers to small children or little ones, often those not traveling in such contexts. 'Little ones' preserves the nuance of young children better than the broader 'children.'
- source_word: וְצֹאנָם
  chosen: and their flocks
  alternatives:
  - and their sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats. 'Flocks' is the standard concise rendering.
- source_word: וּבְקָרָם
  chosen: and their herds
  alternatives:
  - and their cattle
  lexicon: HALOT
  rationale: בָּקָר refers to cattle/large livestock. 'Herds' pairs naturally with 'flocks' and reflects the collective sense in readable modern English.
- source_word: עָזְבוּ
  chosen: they left
  alternatives:
  - they left behind
  - they abandoned
  lexicon: HALOT
  rationale: The verb means to leave or leave behind. 'They left' is sufficient here; 'abandoned' would overstate the sense, since the animals and children were intentionally remaining in Goshen.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  chosen: in the land of Goshen
  alternatives:
  - in Goshen
  lexicon: HALOT
  rationale: The phrase explicitly includes אֶרֶץ, so 'in the land of Goshen' preserves the full wording and geographic sense.
