id: GEN.50.11
reference: Genesis 50:11
source:
  edition: WLC
  text: וַ/יַּ֡רְא יוֹשֵׁב֩ הָ/אָ֨רֶץ הַֽ/כְּנַעֲנִ֜י אֶת הָ/אֵ֗בֶל בְּ/גֹ֨רֶן֙ הָֽאָטָ֔ד וַ/יֹּ֣אמְר֔וּ אֵֽבֶל כָּבֵ֥ד זֶ֖ה לְ/מִצְרָ֑יִם עַל כֵּ֞ן קָרָ֤א שְׁמָ/הּ֙ אָבֵ֣ל מִצְרַ֔יִם אֲשֶׁ֖ר בְּ/עֵ֥בֶר הַ/יַּרְדֵּֽן־־־׃
translation:
  text: When the Canaanite inhabitants of the land, saw the mourning at the threshing floor of Atad, they said, “This is a severe mourning for the Egyptians.” Therefore its name was called Abel-mizraim, which is beyond the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abel-mizraim sounds like 'mourning of Egypt,' reflecting the Canaanites’ description of the event.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan'; the expression is geographically perspective-dependent.
    reason: lexical_alternative
  - marker: c
    text: Or 'the inhabitants of the land, the Canaanites'.
    reason: previous_rendering
lexical_decisions:
- source_word: יוֹשֵׁב הָאָרֶץ הַכְּנַעֲנִי
  chosen: the inhabitants of the land, the Canaanites
  alternatives:
  - the inhabitants of the land of Canaan
  - the Canaanite inhabitants of the land
  lexicon: HALOT
  rationale: The singular participle יוֹשֵׁב functions collectively, referring to those dwelling in the land. Apposition with הַכְּנַעֲנִי identifies them as Canaanites. Rendering as 'inhabitants of the land, the Canaanites' preserves both the collective sense and the appositional identification.
- source_word: הָאֵבֶל
  chosen: the mourning
  alternatives:
  - the grief
  - the lamentation
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially mourning rites for the dead. 'Mourning' best fits the funerary context and allows the later wordplay with Abel-mizraim to remain visible in translation notes.
- source_word: בְּגֹרֶן הָאָטָד
  chosen: at the threshing floor of Atad
  alternatives:
  - in the threshing floor of Atad
  lexicon: HALOT
  rationale: גֹּרֶן is 'threshing floor.' The preposition בְּ here is naturally rendered 'at' in English for location at a named site.
- source_word: אֵבֶל כָּבֵד
  chosen: a severe mourning
  alternatives:
  - a great mourning
  - a heavy mourning
  - a grievous mourning
  lexicon: HALOT
  rationale: כָּבֵד literally means 'heavy,' but in idiomatic English 'severe' or 'great' better conveys the intensity of the mourning. 'Severe mourning' preserves the weight of the Hebrew without sounding unnatural.
- source_word: לְמִצְרָיִם
  chosen: for the Egyptians
  alternatives:
  - for Egypt
  - belonging to Egypt
  lexicon: HALOT
  rationale: Although the form is the place-name Egypt, the context concerns the mourning being associated with the Egyptian party. 'For the Egyptians' communicates the sense idiomatically in English.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Standard inferential phrase introducing the naming explanation. 'Therefore' is concise and natural.
- source_word: קָרָא שְׁמָהּ
  chosen: its name was called
  alternatives:
  - it was named
  - one called its name
  lexicon: HALOT
  rationale: The Hebrew uses a common naming formula. 'Its name was called' is somewhat more formal but preserves the source structure; the passive avoids supplying an unspecified subject.
- source_word: אָבֵל מִצְרַיִם
  chosen: Abel-mizraim
  alternatives:
  - Abel-mizraim (Mourning of Egypt)
  lexicon: HALOT
  rationale: This is a place-name formed as a wordplay on אֵבֶל ('mourning') and מִצְרַיִם ('Egypt'). Per translation philosophy, names are transliterated in the main text, with the meaning preserved in a footnote.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: עֵבֶר with the Jordan denotes the far side/across. 'Beyond the Jordan' is a conventional and sufficiently transparent rendering, though perspective-dependent; an alternative is worth noting in a footnote.
