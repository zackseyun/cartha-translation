id: GEN.50.14
reference: Genesis 50:14
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב יוֹסֵ֤ף מִצְרַ֨יְמָ/ה֙ ה֣וּא וְ/אֶחָ֔י/ו וְ/כָל הָ/עֹלִ֥ים אִתּ֖/וֹ לִ/קְבֹּ֣ר אֶת אָבִ֑י/ו אַחֲרֵ֖י קָבְר֥/וֹ אֶת אָבִֽי/ו־־־׃
translation:
  text: Then Joseph returned to Egypt, he and his brothers and all who had gone up with him to bury his father, after he had buried him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the ones going up with him,' using the common biblical idiom of 'going up' for travel from Egypt to Canaan.
    reason: cultural_note
  - marker: b
    text: Or 'to bury his father, after he had buried his father'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  lexicon: HALOT
  rationale: The waw-consecutive verb from שוב narrates a completed past action. 'Returned' is the most natural concise English rendering in context, since the destination Egypt has already been left earlier in the narrative.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - Egyptward
  - toward Egypt
  lexicon: HALOT
  rationale: The directional he indicates motion toward Egypt. In idiomatic English after 'returned,' this is best rendered 'to Egypt.'
- source_word: הוּא וְאֶחָיו
  chosen: he and his brothers
  alternatives:
  - he and his brothers with him
  lexicon: HALOT
  rationale: The pronoun adds emphasis/apposition to Joseph as the principal subject. English naturally expresses this as 'he and his brothers.' 'Brothers' accurately reflects אֶחָיו and follows the gender-accurate policy.
- source_word: וְכָל הָעֹלִים אִתּוֹ
  chosen: and all who had gone up with him
  alternatives:
  - and all those going up with him
  - and everyone who went up with him
  lexicon: HALOT
  rationale: The participle עֹלִים literally means 'going up,' but in this retrospective context it refers to those who accompanied him on the earlier journey from Egypt to Canaan. 'Had gone up' captures the relative temporal sense in smooth English while preserving the Hebrew ascent idiom.
- source_word: לִקְבֹּר אֶת אָבִיו
  chosen: to bury his father
  alternatives:
  - for burying his father
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose: they had gone up for the purpose of burying his father.'
- source_word: אַחֲרֵי קָבְרוֹ אֶת אָבִיו
  chosen: after he had buried his father
  alternatives:
  - after burying his father
  - after his burying of his father
  lexicon: HALOT
  rationale: אַחֲרֵי marks subsequent time. The infinitive construct with pronominal suffix most naturally refers back to Joseph in context. 'After he had buried his father' makes the temporal sequence explicit and reads naturally in English.
