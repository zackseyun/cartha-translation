  from: to bury his father, after he had buried his father
  to: to bury his father, after he had buried him
  rationale: The Hebrew text repeats 'his father' ('et 'āḇîw), which the current draft faithfully reproduces. However, this literal repetition is slightly cumbersome in English. Using the pronoun 'him' for the second occurrence is more natural idiomatic English, improves the flow of the sentence, and does so without any loss of clarity, as the antecedent is unambiguous. This is a minor stylistic refinement.
