id: GEN.50.9
reference: Genesis 50:9
source:
  edition: WLC
  text: וַ/יַּ֣עַל עִמּ֔/וֹ גַּם רֶ֖כֶב גַּם פָּרָשִׁ֑ים וַ/יְהִ֥י הַֽ/מַּחֲנֶ֖ה כָּבֵ֥ד
    מְאֹֽד־־׃
translation:
  text: Chariots and horsemen also went up with him, and the camp was very large.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the camp became very heavy,' that is, very substantial or impressive.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'chariot' in the singular, used collectively for a chariot force.
    reason: lexical_alternative
  - marker: c
    text: Or 'Chariots also went up with him, and horsemen'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went along
  - ascended
  lexicon: HALOT
  rationale: The verb עלה commonly means 'go up.' In narrative travel contexts it
    can denote setting out or proceeding, but 'went up' preserves the Hebrew wording
    and the directional/travel nuance without unnecessary paraphrase.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix referring to Joseph
    in context.
- source_word: גַּם ... גַּם
  chosen: also ... and
  alternatives:
  - both ... and
  - also ... also
  lexicon: HALOT
  rationale: The repeated גַּם marks addition/emphasis. English smoothness is best
    served by rendering the first as 'also' and the second coordinately as 'and,'
    while still conveying that additional forces accompanied him.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  - chariot force
  lexicon: HALOT
  rationale: Although the singular form can function collectively, in English 'chariots'
    naturally conveys the military contingent intended here better than the less common
    'chariotry.'
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - horse soldiers
  - cavalry
  lexicon: HALOT
  rationale: The term denotes mounted riders. 'Horsemen' is clear and fairly formal;
    'cavalry' is possible but somewhat more interpretive and modern-military in tone.
- source_word: הַמַּחֲנֶה
  chosen: the company
  alternatives:
  - the camp
  - the procession
  lexicon: HALOT
  rationale: מַחֲנֶה often means 'camp,' but in this funeral-travel setting it refers
    to the whole traveling body. 'Company' communicates the group as a large accompanying
    party without implying a stationary encampment. 'Camp' remains a viable formal
    alternative.
- source_word: כָּבֵד מְאֹד
  chosen: became very large
  alternatives:
  - was very heavy
  - was very impressive
  lexicon: HALOT
  rationale: Literally 'was very heavy,' but with a group or force this idiom conveys
    weight in the sense of size, impressiveness, or substantiality. 'Very large' communicates
    the natural sense in modern English without obscuring the idiomatic force.
