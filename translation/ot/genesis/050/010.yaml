  from: great and very heavy
  to: very great and heavy
  rationale: The Hebrew intensifier מְאֹד ('very, exceedingly') likely modifies the entire adjectival phrase גָּדוֹל וְכָבֵד ('great and heavy'). While the current rendering is not incorrect, placing the intensifier at the start of the English phrase ('very great and heavy') creates a more natural cadence and arguably distributes the emphasis more evenly across both adjectives, better reflecting the force of the Hebrew.
