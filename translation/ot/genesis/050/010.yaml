theological_decisions:
- issue: Subject of the singular verb וַיַּעַשׂ after plural verbs
  chosen_reading: 'The subject is Joseph individually: ''he observed mourning for his father seven days.'''
  alternative_readings:
  - The collective company is intended, rendered idiomatically as 'they observed mourning...'
  rationale: The Hebrew shifts from plural verbs ('they came,' 'they lamented') to a singular verb ('he observed/made'). Retaining the singular best reflects the Masoretic text and likely highlights Joseph as the principal son. The alternative is interpretively possible as a collective singular or contextual smoothing, but the source text favors the singular and no doctrinal issue is at stake.
