id: GEN.50.10
reference: Genesis 50:10
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ עַד גֹּ֣רֶן הָאָטָ֗ד אֲשֶׁר֙ בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֔ן וַ/יִּ֨סְפְּדוּ שָׁ֔ם מִסְפֵּ֛ד גָּד֥וֹל וְ/כָבֵ֖ד מְאֹ֑ד וַ/יַּ֧עַשׂ לְ/אָבִ֛י/ו אֵ֖בֶל שִׁבְעַ֥ת יָמִֽים־־׃
translation:
  text: When they came to the threshing floor of Atad, which is beyond the Jordan, they lamented there with a very great and heavy lamentation, and he observed mourning for his father seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Atad may reflect a name meaning 'bramble' or 'thornbush,' but here it functions as a place name.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan' / 'on the other side of the Jordan.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'a great and very heavy lamentation,' an idiom expressing intense mourning.
    reason: cultural_note
  - marker: d
    text: The Hebrew verb is singular ('he observed mourning'), likely referring specifically to Joseph; some translations smooth it to 'they.'
    reason: alternative_reading
  - marker: e
    text: Or 'great and very heavy'.
    reason: previous_rendering
lexical_decisions:
- source_word: גֹּרֶן
  chosen: threshing floor
  alternatives:
  - threshing place
  lexicon: HALOT
  rationale: The standard sense is an agricultural threshing site. 'Threshing floor' is the conventional and clear English equivalent.
- source_word: הָאָטָד
  chosen: Atad
  alternatives:
  - the bramble
  - thornbush
  lexicon: HALOT
  rationale: As part of the place name גֹּרֶן הָאָטָד, the term functions as a proper name in context. Following the philosophy to transliterate names, 'Atad' is preferred in the main text; the lexical sense may be noted in a footnote.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side/region across. 'Beyond the Jordan' preserves the Hebrew idiom and remains natural English, while leaving the geographical perspective somewhat open as in the source.
- source_word: וַיִּסְפְּדוּ
  chosen: they lamented
  alternatives:
  - they mourned
  - they wailed
  lexicon: HALOT
  rationale: The verb ספד commonly refers to lamenting, especially formal mourning for the dead. 'Lamented' captures the public funerary sense better than the broader 'mourned.'
- source_word: מִסְפֵּד גָּדוֹל וְכָבֵד מְאֹד
  chosen: with a great and very heavy lamentation
  alternatives:
  - with a great and exceedingly grievous mourning
  - with loud and intense mourning
  lexicon: HALOT
  rationale: The noun plus adjectives intensifies the mourning. 'Heavy' is somewhat literal for כָבֵד and preserves the Hebrew imagery of weight/severity; 'lamentation' keeps the formal mourning register.
- source_word: וַיַּעַשׂ
  chosen: he observed
  alternatives:
  - he made
  - he held
  - he kept
  lexicon: HALOT
  rationale: עשה with אֵבֶל idiomatically means to hold or observe mourning. 'Observed' is idiomatic in English for a mourning period and avoids wooden literalism.
- source_word: לְאָבִיו
  chosen: for his father
  alternatives:
  - for his own father
  lexicon: HALOT
  rationale: The suffix is singular masculine. In context the singular subject of וַיַּעַשׂ is best taken as Joseph, so 'for his father' is the natural rendering.
- source_word: אֵבֶל
  chosen: mourning
  alternatives:
  - a mourning period
  - grief
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, often in a formal or ritual sense. 'Mourning' fits the context and pairs naturally with the seven-day duration.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  alternatives:
  - for seven days
  lexicon: HALOT
  rationale: The phrase gives the duration of the mourning observance. English naturally expresses this as 'seven days,' with the preposition implied by the governing verb.
