  from: which Abraham had bought with the field
  to: the field that Abraham had bought
  rationale: 'The current rendering ''which Abraham had bought with the field'' is
    grammatically awkward and misrepresents the Hebrew. It could be misinterpreted
    to mean ''the field'' was the currency used for the purchase. The Hebrew syntax,
    with a relative pronoun (''which'') followed by a clause that restates the object
    (''the field''), is a resumptive construction. The object of ''bought'' (קָנָה)
    is explicitly ''the field'' (אֶת הַשָּׂדֶה). The draft''s attempt to resolve this
    creates confusion. A clearer and more accurate rendering uses an appositive phrase:
    ''...the field of Machpelah, the field that Abraham had bought...'' This correctly
    identifies what was purchased and resolves the Hebrew construction into natural
    English.'
