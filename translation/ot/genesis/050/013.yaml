id: GEN.50.13
reference: Genesis 50:13
source:
  edition: WLC
  text: וַ/יִּשְׂא֨וּ אֹת֤/וֹ בָנָי/ו֙ אַ֣רְצָ/ה כְּנַ֔עַן וַ/יִּקְבְּר֣וּ אֹת֔/וֹ
    בִּ/מְעָרַ֖ת שְׂדֵ֣ה הַ/מַּכְפֵּלָ֑ה אֲשֶׁ֣ר קָנָה֩ אַבְרָהָ֨ם אֶת הַ/שָּׂדֶ֜ה
    לַ/אֲחֻזַּת קֶ֗בֶר מֵ/אֵ֛ת עֶפְרֹ֥ן הַ/חִתִּ֖י עַל פְּנֵ֥י מַמְרֵֽא־־־׃
translation:
  text: His sons carried him to the land of Canaan and buried him in the cave of the
    field of Machpelah, which Abraham had bought with the field as a burial property
    from Ephron the Hittite, opposite Mamre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a burial possession.' The Hebrew emphasizes that Abraham acquired
      the field as a permanent holding for burial.
    reason: lexical_alternative
  - marker: b
    text: Or 'facing Mamre.' The Hebrew phrase indicates location relative to Mamre.
    reason: lexical_alternative
  - marker: c
    text: Or 'which Abraham had bought with the field'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - bore
  - took up
  lexicon: HALOT
  rationale: The verb נשׂא in this narrative context refers to physically transporting
    Jacob's body. 'Carried' is natural modern English and preserves the concrete action
    better than the more archaic 'bore'.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'sons,' not a gender-neutral
    term. This follows the gender-accurate principle and matches the immediate context
    of Jacob's sons transporting him.
- source_word: אַרְצָה כְּנַעַן
  chosen: to the land of Canaan
  alternatives:
  - to Canaan
  - Canaanward
  lexicon: HALOT
  rationale: The directional ending on אֶרֶץ plus the proper name yields 'to the land
    of Canaan.' Including 'land of' reflects the Hebrew wording more fully than the
    shorter 'to Canaan.'
- source_word: וַיִּקְבְּרוּ
  chosen: buried
  alternatives:
  - interred
  lexicon: HALOT
  rationale: A straightforward rendering of קבר in narrative prose. 'Buried' is clear,
    idiomatic, and sufficiently formal.
- source_word: בִּמְעָרַת שְׂדֵה הַמַּכְפֵּלָה
  chosen: in the cave of the field of Machpelah
  alternatives:
  - in the cave at the field of Machpelah
  - in the cave of Machpelah's field
  lexicon: HALOT
  rationale: 'The construct chain is preserved fairly closely: cave + field + Machpelah.
    This avoids collapsing the phrase too much while remaining readable.'
- source_word: אֲשֶׁר קָנָה אַבְרָהָם אֶת הַשָּׂדֶה
  chosen: which Abraham had bought with the field
  alternatives:
  - which Abraham bought the field
  - where Abraham had bought the field
  lexicon: HALOT
  rationale: The relative clause modifies the burial site, but the direct object is
    'the field.' 'Had bought with the field' makes explicit in English that the cave
    belonged to the purchased field, preserving the Hebrew sense without awkwardness.
- source_word: לַאֲחֻזַּת קֶבֶר
  chosen: as a burial property
  alternatives:
  - for a burial possession
  - as a gravesite holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or property holding, and קֶבֶר specifies
    its purpose. 'Burial property' communicates both ownership and funerary use in
    accessible English. 'Burial possession' is more literal but less natural.
- source_word: מֵאֵת עֶפְרֹן הַחִתִּי
  chosen: from Ephron the Hittite
  alternatives:
  - from Ephron the Hethite
  lexicon: HALOT
  rationale: Standard modern translational convention renders הַחִתִּי as 'the Hittite.'
    'Hethite' reflects older tradition but is less transparent to modern readers.
- source_word: עַל פְּנֵי מַמְרֵא
  chosen: opposite Mamre
  alternatives:
  - facing Mamre
  - before Mamre
  - near Mamre
  lexicon: HALOT
  rationale: The prepositional phrase commonly indicates a location in front of or
    opposite another landmark. 'Opposite Mamre' is a concise and defensible rendering
    that preserves the spatial relation without overinterpreting it as mere proximity.
