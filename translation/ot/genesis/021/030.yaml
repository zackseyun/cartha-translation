id: GEN.21.30
reference: Genesis 21:30
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר כִּ֚י אֶת שֶׁ֣בַע כְּבָשֹׂ֔ת תִּקַּ֖ח מִ/יָּדִ֑/י בַּ/עֲבוּר֙
    תִּֽהְיֶה לִּ֣/י לְ/עֵדָ֔ה כִּ֥י חָפַ֖רְתִּי אֶת הַ/בְּאֵ֥ר הַ/זֹּֽאת־־־׃
translation:
  text: And he said, “You are to take these seven ewe lambs from my hand, so that
    it may serve as a witness for me that I dug this well.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they may be a witness for me.' The Hebrew verb is singular, while the
      immediate referent is the seven ewe lambs; the singular may treat them collectively
      or refer to the act/arrangement as the witness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: כִּי
  chosen: You are to
  alternatives:
  - for
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the content of Abraham's explanation rather than
    a simple causal clause. In idiomatic English, the direct instruction 'You are
    to take' best conveys the force of the speech.
- source_word: אֶת שֶׁבַע כְּבָשֹׂת
  chosen: these seven ewe lambs
  alternatives:
  - the seven ewe lambs
  - seven female lambs
  lexicon: HALOT
  rationale: כְּבָשֹׂת is specifically female sheep; 'ewe lambs' is more precise than
    generic 'lambs.' 'These' is supplied naturally in English because the animals
    are present in the scene and were just mentioned in context.
- source_word: תִּקַּח
  chosen: you are to take
  alternatives:
  - you shall take
  - take
  lexicon: HALOT
  rationale: Second masculine singular imperfect in direct speech can express expected
    action. 'You are to take' is natural modern English and preserves directive force
    without sounding overly legalistic.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'from my hand.' Retaining 'hand' preserves
    the concrete transactional imagery of formal transfer.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - for the sake of
  - in order that
  - because of
  lexicon: HALOT
  rationale: This preposition marks purpose here. 'So that' gives clear modern English
    purpose sense.
- source_word: תִּהְיֶה לִּי לְעֵדָה
  chosen: it may serve as a witness for me
  alternatives:
  - they may be a witness to me
  - it may be a testimony for me
  lexicon: HALOT
  rationale: The feminine singular verb agrees naturally with the collective arrangement/testimony
    implied by the accepted lambs, though English can also construe the seven lambs
    collectively. 'Serve as a witness' is idiomatic and preserves evidentiary force;
    'for me' reflects לִּי as testimony on Abraham's behalf.
- source_word: לְעֵדָה
  chosen: as a witness
  alternatives:
  - as testimony
  - as evidence
  lexicon: HALOT
  rationale: The noun denotes witness/testimony. 'Witness' fits the covenantal-legal
    setting and aligns with the singular predicate in Hebrew.
- source_word: כִּי חָפַרְתִּי
  chosen: that I dug
  alternatives:
  - that I myself dug
  - because I dug
  lexicon: HALOT
  rationale: 'This כִּי introduces the content of the testimony: Abraham is affirming
    his prior action in digging the well. Simple ''that I dug'' is sufficient.'
- source_word: הַבְּאֵר הַזֹּאת
  chosen: this well
  alternatives:
  - this water well
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase; 'this well' is natural and precise.
