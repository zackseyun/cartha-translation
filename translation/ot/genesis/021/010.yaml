id: GEN.21.10
reference: Genesis 21:10
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ לְ/אַבְרָהָ֔ם גָּרֵ֛שׁ הָ/אָמָ֥ה הַ/זֹּ֖את וְ/אֶת בְּנָ֑/הּ כִּ֣י
    לֹ֤א יִירַשׁ֙ בֶּן הָ/אָמָ֣ה הַ/זֹּ֔את עִם בְּנִ֖/י עִם יִצְחָֽק־־־־׃
translation:
  text: So she said to Abraham, “Drive out this slave woman and her son, because the
    son of this slave woman will not inherit with my son, with Isaac.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Cast out this slave woman and her son.”
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּרֵשׁ
  chosen: Drive out
  alternatives:
  - Cast out
  - Send away
  lexicon: HALOT
  rationale: Imperative of גרשׁ denotes expulsion or driving away. 'Drive out' preserves
    the force better than the softer 'send away' while remaining natural English.
- source_word: הָאָמָה
  chosen: slave woman
  alternatives:
  - maidservant
  - servant woman
  lexicon: HALOT
  rationale: אָמָה refers to a female slave/servant of lower status. In this context
    the bonded status is socially and legally salient, so 'slave woman' best fits
    the project's guidance on bonded terms.
- source_word: בְּנָהּ
  chosen: her son
  lexicon: HALOT
  rationale: Straightforward possessive construction; no reason to expand or paraphrase.
- source_word: כִּי לֹא יִירַשׁ
  chosen: because ... will not inherit
  alternatives:
  - for ... shall not inherit
  lexicon: HALOT
  rationale: כִּי gives the reason for Sarah's demand, and יירשׁ means 'inherit' or
    'be an heir.' Future English with 'will not inherit' is clear and faithful.
- source_word: בֶּן הָאָמָה הַזֹּאת
  chosen: the son of this slave woman
  alternatives:
  - this slave woman's son
  lexicon: HALOT
  rationale: The repeated demonstrative and noun phrase are rhetorically pointed.
    This rendering preserves Sarah's distancing and contemptuous emphasis.
- source_word: עִם בְּנִי עִם יִצְחָק
  chosen: with my son, with Isaac
  alternatives:
  - along with my son Isaac
  - with my son Isaac
  lexicon: HALOT
  rationale: The Hebrew repeats עִם before 'Isaac,' which is somewhat emphatic/appositional.
    Retaining both phrases in English preserves the emphasis better than collapsing
    them entirely.
- source_word: וַתֹּאמֶר לְאַבְרָהָם
  chosen: So she said to Abraham
  alternatives:
  - And she said to Abraham
  lexicon: HALOT
  rationale: Narrative waw can be rendered 'and' or 'so.' 'So' reads naturally in
    English narrative while preserving sequence.
