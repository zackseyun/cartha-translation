theological_decisions:
- issue: Interpretation of Ishmael's action in מְצַחֵק
  chosen_reading: Render neutrally as 'laughing' in the main text
  alternative_readings:
  - mocking
  - playing
  rationale: The verse itself uses the participle of צחק without an explicit object,
    leaving the precise nuance open. A more negative rendering such as 'mocking' may
    fit the broader narrative and later canonical interpretation, but the Hebrew alone
    does not require it. Following the doctrine's principle of preserving theological
    and interpretive tension rather than resolving genuine ambiguity, the main text
    keeps the broader lexical sense and the more specific alternative is footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
