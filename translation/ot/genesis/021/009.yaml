id: GEN.21.9
reference: Genesis 21:9
source:
  edition: WLC
  text: וַ/תֵּ֨רֶא שָׂרָ֜ה אֶֽת בֶּן הָגָ֧ר הַ/מִּצְרִ֛ית אֲשֶׁר יָלְדָ֥ה לְ/אַבְרָהָ֖ם
    מְצַחֵֽק־־־׃
translation:
  text: And Sarah saw the son of Hagar the Egyptian, whom she had borne to Abraham,
    laughing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocking.' The Hebrew participle can denote laughing or playful/scornful
      behavior; context may suggest a hostile nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: And Sarah saw
  alternatives:
  - Now Sarah saw
  - But Sarah saw
  lexicon: HALOT
  rationale: Wayyiqtol of ראה introduces the narrative event. 'And Sarah saw' preserves
    the straightforward narrative sequence without overinterpreting discourse contrast.
- source_word: בֶּן הָגָר הַמִּצְרִית
  chosen: the son of Hagar the Egyptian
  alternatives:
  - Hagar the Egyptian's son
  - the son of Hagar the Egyptian woman
  lexicon: HALOT
  rationale: Construct chain plus apposition identifies Ishmael through his mother.
    'The Egyptian' is a natural English rendering of the gentilic הַמִּצְרִית and
    preserves the source's identification.
- source_word: אֲשֶׁר יָלְדָה לְאַבְרָהָם
  chosen: whom she had borne to Abraham
  alternatives:
  - whom she bore to Abraham
  - that she had borne for Abraham
  lexicon: HALOT
  rationale: The relative clause modifies Hagar and her son by recalling the birth.
    English pluperfect ('had borne') fits the prior action relative to Sarah's seeing.
    'To Abraham' is the most idiomatic rendering of ל here.
- source_word: מְצַחֵק
  chosen: laughing
  alternatives:
  - mocking
  - playing
  - jesting
  lexicon: HALOT
  rationale: The participle of צחק literally denotes laughing/play. In this context
    many interpreters understand hostile mockery, influenced by later interpretation
    (cf. Gal 4:29), but the Hebrew form itself does not specify the object or clearly
    encode persecution. To preserve the lexical openness and avoid importing an interpretive
    conclusion into the main text, 'laughing' is retained, with 'mocking' preserved
    in a footnote as a contextual alternative.
