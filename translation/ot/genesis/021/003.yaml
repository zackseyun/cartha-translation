id: GEN.21.3
reference: Genesis 21:3
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אַבְרָהָ֜ם אֶֽת שֶׁם בְּנ֧/וֹ הַ/נּֽוֹלַד ל֛/וֹ אֲשֶׁר יָלְדָה
    לּ֥/וֹ שָׂרָ֖ה יִצְחָֽק־־־־־׃
translation:
  text: And Abraham called the name of his son who was born to him, whom Sarah bore
    to him, Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'And Abraham named his son who was born to him, whom
      Sarah bore to him, Isaac.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to call/name. 'Called the name
    of' preserves the Hebrew idiom more transparently than the smoother English 'named,'
    while remaining understandable.
- source_word: שֵׁם
  chosen: the name of
  alternatives:
  - name
  lexicon: HALOT
  rationale: Included explicitly because the Hebrew construction is 'called the name
    of.' Retaining 'the name of' reflects the source wording and avoids over-smoothing.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - the son
  lexicon: HALOT
  rationale: 'The pronominal suffix clearly marks possession: Abraham''s son.'
- source_word: הַנּוֹלַד לוֹ
  chosen: who was born to him
  alternatives:
  - the one born to him
  - who had been born to him
  lexicon: HALOT
  rationale: This passive participial phrase modifies 'his son.' 'Who was born to
    him' is natural English and preserves the relational dative 'to him.'
- source_word: אֲשֶׁר יָלְדָה לּוֹ שָׂרָה
  chosen: whom Sarah bore to him
  alternatives:
  - whom Sarah gave birth to for him
  - whom Sarah bore
  lexicon: HALOT
  rationale: The clause identifies the mother and repeats the dative 'to him.' 'Bore
    to him' is concise, natural, and preserves the Hebrew emphasis on Sarah's bearing
    a son for Abraham.
- source_word: יִצְחָק
  chosen: Isaac
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name יִצְחָק.
