id: GEN.21.2
reference: Genesis 21:2
source:
  edition: WLC
  text: וַ/תַּהַר֩ וַ/תֵּ֨לֶד שָׂרָ֧ה לְ/אַבְרָהָ֛ם בֵּ֖ן לִ/זְקֻנָ֑י/ו לַ/מּוֹעֵ֕ד
    אֲשֶׁר דִּבֶּ֥ר אֹת֖/וֹ אֱלֹהִֽים־׃
translation:
  text: So Sarah conceived and bore a son to Abraham in his old age, at the appointed
    time that God had spoken to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “at the set time of which God had spoken to him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'Conceived' is concise,
    idiomatic, and fits the narrative sequence.
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth
  lexicon: HALOT
  rationale: ילד in the Qal wayyiqtol here narrates childbirth. 'Bore' is natural
    in English biblical narrative and pairs well with 'conceived'.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The indefinite English article is idiomatic after 'bore'; the Hebrew
    singular noun identifies the child as male.
- source_word: לִזְקֻנָיו
  chosen: in his old age
  alternatives:
  - to his old age
  - for his old age
  lexicon: HALOT
  rationale: The phrase idiomatically indicates the time/circumstance of Abraham's
    advanced age, not purpose. 'In his old age' is the standard and clearest English
    rendering.
- source_word: לַמּוֹעֵד
  chosen: at the appointed time
  alternatives:
  - at the set time
  - at the fixed time
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed or fixed time. 'Appointed time'
    preserves the sense of divine timing established earlier in the narrative.
- source_word: אֲשֶׁר דִּבֶּר אֹתוֹ אֱלֹהִים
  chosen: that God had spoken to him
  alternatives:
  - of which God had spoken to him
  - that God had told him
  lexicon: HALOT
  rationale: The clause refers back to the appointed time previously announced by
    God. 'Had spoken to him' preserves the verbal connection without over-specifying
    the content.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The common Hebrew designation for God here is straightforwardly rendered
    'God.' No contested divine-name issue is involved in this verse.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  rationale: The initial waw continues the narrative from the prior promise-fulfillment
    context. 'So' slightly clarifies consequential flow in natural modern English
    while remaining faithful to the discourse function.
