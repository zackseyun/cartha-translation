theological_decisions:
- issue: Rendering the fulfillment language of divine promise without adding interpretive
    emphasis
  chosen_reading: at the appointed time that God had spoken to him
  alternative_readings:
  - at the set time of which God had spoken to him
  rationale: The verse emphasizes God's faithfulness to his prior word and timing.
    The translation preserves that fulfillment motif without importing extra theological
    commentary beyond the Hebrew syntax.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
