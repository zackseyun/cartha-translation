id: GEN.21.28
reference: Genesis 21:28
source:
  edition: WLC
  text: וַ/יַּצֵּ֣ב אַבְרָהָ֗ם אֶת שֶׁ֛בַע כִּבְשֹׂ֥ת הַ/צֹּ֖אן לְ/בַדְּ/הֶֽן־׃
translation:
  text: And Abraham set seven ewe lambs of the flock by themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "set apart seven ewe lambs of the flock." The Hebrew verb can suggest
      placing them in a distinct position, which the context of covenant witness makes
      significant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּב
  chosen: set
  alternatives:
  - placed
  - stationed
  - set apart
  lexicon: HALOT
  rationale: The verb from נצב in the Hiphil/waw-consecutive narrative form denotes
    causing something to stand or be set in position. 'Set' is natural modern English
    and fits the concrete action here without overinterpreting the purpose. 'Set apart'
    is possible in context but is more interpretive, so it is not preferred in the
    main text.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is represented
    by English word order.
- source_word: שֶׁבַע
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying the following noun.
- source_word: כִּבְשֹׂת
  chosen: ewe lambs
  alternatives:
  - female lambs
  - ewes
  lexicon: HALOT
  rationale: The noun refers specifically to female lambs. 'Ewe lambs' preserves both
    the sex and the likely youthful sense better than the broader 'ewes'.
- source_word: הַצֹּאן
  chosen: of the flock
  alternatives:
  - of the sheep
  - from the flock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, often sheep/goats. In
    this immediate phrase, 'of the flock' is idiomatic and avoids narrowing the collective
    more than the Hebrew requires, while still making sense with 'ewe lambs'.
- source_word: לְבַדְּהֶן
  chosen: by themselves
  alternatives:
  - separately
  - apart
  lexicon: HALOT
  rationale: The phrase indicates separation of these seven from the rest. 'By themselves'
    is clear, idiomatic English and preserves the feminine plural reference to the
    lambs without awkwardness.
