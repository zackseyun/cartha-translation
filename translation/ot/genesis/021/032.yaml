id: GEN.21.32
reference: Genesis 21:32
source:
  edition: WLC
  text: וַ/יִּכְרְת֥וּ בְרִ֖ית בִּ/בְאֵ֣ר שָׁ֑בַע וַ/יָּ֣קָם אֲבִימֶ֗לֶךְ וּ/פִיכֹל֙
    שַׂר צְבָא֔/וֹ וַ/יָּשֻׁ֖בוּ אֶל אֶ֥רֶץ פְּלִשְׁתִּֽים־־׃
translation:
  text: So they made a covenant at Beer-sheba, and Abimelech rose up with Phicol,
    the commander of his army, and they returned to the land of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''cut a covenant,'' an idiom for making a covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרְתוּ בְרִית
  chosen: they made a covenant
  alternatives:
  - they cut a covenant
  - they entered into a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'cut a covenant,' but in clear modern
    English 'made a covenant' best preserves the sense without unnecessary opacity.
    'Cut a covenant' is a viable formal alternative but is less natural for the target
    audience.
- source_word: בִּבְאֵר שָׁבַע
  chosen: at Beer-sheba
  alternatives:
  - in Beer-sheba
  - at Beersheba
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'at' depending on context.
    'At Beer-sheba' fits the scene of covenant-making at a named location. The place
    name is transliterated per project policy; the hyphenated form reflects common
    English convention and preserves the compound name.
- source_word: וַיָּקָם
  chosen: rose up
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: The verb קום commonly means 'arise/stand up.' 'Rose up' is natural, slightly
    elevated, and fits the narrative sequence. 'Arose' is more formal; 'got up' is
    too colloquial for the register.
- source_word: שַׂר צְבָאוֹ
  chosen: the commander of his army
  alternatives:
  - the captain of his army
  - the chief of his army
  - the commander of his forces
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, or commander; צָבָא here refers to military
    force/army. 'Commander of his army' is clear modern English and conveys military
    rank without archaic coloring.
- source_word: וַיָּשֻׁבוּ
  chosen: they returned
  alternatives:
  - they went back
  lexicon: HALOT
  rationale: שׁוּב in this context means to return. 'They returned' is the standard
    narrative rendering and matches the formal level of the verse.
- source_word: אֶל אֶרֶץ פְּלִשְׁתִּים
  chosen: to the land of the Philistines
  alternatives:
  - to Philistine territory
  - to the land of Philistia
  lexicon: HALOT
  rationale: The phrase is literally 'to the land of the Philistines.' This rendering
    preserves the ethnogeographic expression of the Hebrew. 'Philistine territory'
    is smoother but less formally aligned; 'Philistia' is possible but not the wording
    of the Hebrew here.
- source_word: וּפִיכֹל
  chosen: with Phicol
  alternatives:
  - and Phicol
  lexicon: HALOT
  rationale: Although the conjunction is simply 'and,' English idiom after 'Abimelech
    rose up' is smoother with 'with Phicol,' making clear that both men are associated
    with the action before the plural verb 'they returned.' This is an optimal-equivalence
    adjustment for readability while preserving the sense.
