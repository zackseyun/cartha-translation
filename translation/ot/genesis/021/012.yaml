id: GEN.21.12
reference: Genesis 21:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֱלֹהִ֜ים אֶל אַבְרָהָ֗ם אַל יֵרַ֤ע בְּ/עֵינֶ֨י/ךָ֙ עַל הַ/נַּ֣עַר וְ/עַל אֲמָתֶ֔/ךָ כֹּל֩ אֲשֶׁ֨ר תֹּאמַ֥ר אֵלֶ֛י/ךָ שָׂרָ֖ה שְׁמַ֣ע בְּ/קֹלָ֑/הּ כִּ֣י בְ/יִצְחָ֔ק יִקָּרֵ֥א לְ/ךָ֖ זָֽרַע־־־־׃
translation:
  text: But God said to Abraham, “Do not let it be grievous in your sight because of the boy and because of your slave woman. Whatever Sarah says to you, listen to her voice, for through Isaac your offspring will be called.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not be displeased because of the boy and because of your maidservant.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'listen to her voice'; that is, heed what Sarah says.
    reason: lexical_alternative
  - marker: c
    text: Or, 'for in Isaac your offspring will be called,' meaning Abraham's covenant line is identified through Isaac.
    reason: alternative_reading
  - marker: d
    text: Or 'offspring will be named for you'.
    reason: previous_rendering
lexical_decisions:
- source_word: יֵרַע בְּעֵינֶיךָ
  chosen: do not let it be grievous in your sight
  alternatives:
  - do not let it be evil in your eyes
  - do not be displeased
  lexicon: HALOT
  rationale: The idiom combines רעע with 'in your eyes' to express something being distressing or displeasing to someone. 'Grievous in your sight' preserves the Hebrew imagery while remaining natural English. 'Do not be displeased' is smoother but less formally tied to the idiom.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the lad
  - the young man
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy or youth. Here it refers to Ishmael and 'the boy' is the most natural modern rendering without archaic tone.
- source_word: אֲמָתֶךָ
  chosen: your slave woman
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. In keeping with the translation philosophy's preference to preserve bonded status where salient, 'slave woman' best reflects the social reality and distinguishes Hagar's status from a free wife.
- source_word: שְׁמַע בְּקֹלָהּ
  chosen: listen to her voice
  alternatives:
  - obey her
  - listen to her
  lexicon: HALOT
  rationale: The Hebrew literally says 'listen to her voice,' an idiom meaning to heed what she says. The chosen rendering preserves the Hebrew expression while remaining intelligible. 'Obey her' is interpretive and stronger than necessary.
- source_word: בְּיִצְחָק
  chosen: through Isaac
  alternatives:
  - in Isaac
  - by Isaac
  lexicon: HALOT
  rationale: 'The preposition ב here is best rendered instrumentally or with reference to line/means: the promised line is reckoned through Isaac. ''Through Isaac'' communicates this clearly in English.'
- source_word: יִקָּרֵא לְךָ זָרַע
  chosen: offspring will be named for you
  alternatives:
  - seed will be called to you
  - offspring will be reckoned to you
  - offspring will be called yours
  lexicon: HALOT
  rationale: The Niphal of קרא with לְךָ and זֶרַע expresses designation or reckoning of Abraham's covenant line. 'Offspring will be named for you' stays close to the verbal idea of 'called/named' while conveying that Abraham's line is identified through Isaac. 'Offspring will be reckoned to you' is interpretive; 'seed' is more formal but less natural in contemporary English.
- source_word: זָרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the collective sense in natural English better than 'seed,' while avoiding the pluralizing effect of 'descendants'.
- source_word: וַיֹּאמֶר אֱלֹהִים
  chosen: But God said
  alternatives:
  - And God said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' appropriately reflects the contrast with Abraham's distress in the preceding context, while remaining faithful to the discourse flow.
