theological_decisions:
- issue: Status term for Hagar
  chosen_reading: your slave woman
  alternative_readings:
  - your maidservant
  - your servant-girl
  rationale: The text identifies Hagar by subordinate social status. Rendering the term with bonded force avoids softening the social reality and aligns with the project's stated preference to preserve such force where salient.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by analogy of bonded-status rendering
- issue: Meaning of the promise clause
  chosen_reading: for through Isaac offspring will be named for you
  alternative_readings:
  - for in Isaac your offspring will be called
  - for it is through Isaac that descendants will be reckoned as yours
  rationale: The clause concerns covenant lineage being identified through Isaac without denying Abraham's biological relation to Ishmael. The chosen wording preserves that theological tension by keeping the naming/calling language rather than resolving it into a narrower doctrinal paraphrase.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/021/012.json
  category: awkward_english
  tier: 1
  from: offspring will be named for you
  to: your offspring will be called
  rationale: The phrase 'named for you' is ambiguous in English, as it can mean 'named in your honor.' The Hebrew 'יִקָּרֵא לְךָ זָרַע' indicates that the covenant line designated as Abraham's will be reckoned through Isaac. Translating the dative 'לְךָ' as a possessive ('your') and using 'called' (in the sense of 'designated' or 'reckoned') makes the meaning clearer and aligns with the phrasing in NT quotations of this verse (e.g., Rom. 9:7).
