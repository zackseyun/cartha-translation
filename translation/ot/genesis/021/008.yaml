id: GEN.21.8
reference: Genesis 21:8
source:
  edition: WLC
  text: וַ/יִּגְדַּ֥ל הַ/יֶּ֖לֶד וַ/יִּגָּמַ֑ל וַ/יַּ֤עַשׂ אַבְרָהָם֙ מִשְׁתֶּ֣ה גָד֔וֹל
    בְּ/י֖וֹם הִגָּמֵ֥ל אֶת יִצְחָֽק־׃
translation:
  text: The boy grew and was weaned, and Abraham made a great feast on the day Isaac
    was weaned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the child grew and was weaned.'
    reason: lexical_alternative
  - marker: b
    text: '''Feast'' may also be rendered ''banquet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: grew
  alternatives:
  - became great
  - grew up
  lexicon: HALOT
  rationale: From גדל, in context of a child's development, the natural sense is physical
    growth/maturing rather than status ('became great'). 'Grew' is concise and idiomatic.
- source_word: הַיֶּלֶד
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: יֶלֶד denotes a child/boy. Since Isaac has now reached weaning age, 'boy'
    fits the stage of life slightly better than the more generic 'child,' while remaining
    natural English.
- source_word: וַיִּגָּמַל
  chosen: was weaned
  alternatives:
  - came to be weaned
  lexicon: HALOT
  rationale: From גמל in the passive/nifal sense, the standard meaning here is cessation
    of nursing. 'Was weaned' is the plain English equivalent.
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - prepared
  - held
  lexicon: HALOT
  rationale: עשה broadly means 'do/make.' With מִשְׁתֶּה as object, 'made' is formally
    close and still idiomatic in English.
- source_word: מִשְׁתֶּה גָדוֹל
  chosen: a great feast
  alternatives:
  - a large banquet
  - a great banquet
  lexicon: HALOT
  rationale: מִשְׁתֶּה is a feast/banquet, often involving drinking and celebration.
    'Great feast' preserves both the celebratory sense and the adjective גָדוֹל without
    sounding overly formal.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: HALOT
  rationale: The preposition with יוֹם is most naturally rendered temporally as 'on
    the day,' preserving the Hebrew construction more closely than the more interpretive
    'when.'
- source_word: הִגָּמֵל אֶת יִצְחָק
  chosen: Isaac was weaned
  alternatives:
  - of Isaac's being weaned
  - when he weaned Isaac
  lexicon: HALOT
  rationale: The infinitive construct of גמל with object marker אֶת and Isaac as object
    denotes the event of Isaac's weaning. Rendering it as a passive clause in English
    is smooth and accurately conveys the sense.
