id: GEN.21.26
reference: Genesis 21:26
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲבִימֶ֔לֶךְ לֹ֣א יָדַ֔עְתִּי מִ֥י עָשָׂ֖ה אֶת הַ/דָּבָ֣ר הַ/זֶּ֑ה
    וְ/גַם אַתָּ֞ה לֹא הִגַּ֣דְתָּ לִּ֗/י וְ/גַ֧ם אָנֹכִ֛י לֹ֥א שָׁמַ֖עְתִּי בִּלְתִּ֥י
    הַ/יּֽוֹם־־־׃
translation:
  text: And Abimelech said, “I did not know who had done this thing. You also did
    not tell me, and I myself had not heard of it until today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this matter” or “this deed.” The Hebrew davar can denote a thing, matter,
      or event.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: לֹא יָדַעְתִּי
  chosen: I did not know
  alternatives:
  - I have not known
  lexicon: HALOT
  rationale: The qatal here refers to Abimelech's prior lack of knowledge in straightforward
    past narration; English simple past is the most natural equivalent.
- source_word: מִי עָשָׂה
  chosen: who had done
  alternatives:
  - who did
  - who was the one who did
  lexicon: HALOT
  rationale: The clause identifies the unknown agent of the action. Past perfect in
    English fits the reported prior event relative to Abimelech's present speech.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this deed
  lexicon: HALOT
  rationale: דבר can mean 'word, matter, thing.' Here it refers to the incident under
    dispute. 'This thing' is transparent and close to the Hebrew; 'matter' is possible
    but slightly more idiomatic than necessary.
- source_word: וְגַם אַתָּה
  chosen: You also
  alternatives:
  - And you too
  - Besides, you
  lexicon: HALOT
  rationale: 'גם adds emphasis/inclusion: Abraham likewise failed to inform Abimelech.
    ''You also'' preserves that force in natural English.'
- source_word: לֹא הִגַּדְתָּ לִּי
  chosen: did not tell me
  alternatives:
  - did not report it to me
  - did not inform me
  lexicon: HALOT
  rationale: הגיד commonly means 'tell, declare, report.' 'Tell me' is the most natural
    modern English in this dialogue.
- source_word: וְגַם אָנֹכִי
  chosen: and I myself
  alternatives:
  - and I also
  - nor had I
  lexicon: HALOT
  rationale: אָנֹכִי is the fuller first-person pronoun and can carry emphasis. 'I
    myself' reflects that emphasis better than a bare 'I.'
- source_word: לֹא שָׁמַעְתִּי
  chosen: had not heard of it
  alternatives:
  - did not hear
  - had not heard
  lexicon: HALOT
  rationale: In context, 'hear' means receive report/information about the incident.
    Adding 'of it' makes the implied object explicit in idiomatic English without
    over-paraphrasing.
- source_word: בִּלְתִּי הַיּוֹם
  chosen: until today
  alternatives:
  - except today
  - before today
  lexicon: HALOT
  rationale: 'The construction expresses exception up to the present point: Abimelech
    had not heard about it prior to this day. ''Until today'' is the clearest idiomatic
    rendering.'
