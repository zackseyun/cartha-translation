id: GEN.21.7
reference: Genesis 21:7
source:
  edition: WLC
  text: וַ/תֹּ֗אמֶר מִ֤י מִלֵּל֙ לְ/אַבְרָהָ֔ם הֵינִ֥יקָה בָנִ֖ים שָׂרָ֑ה כִּֽי יָלַ֥דְתִּי
    בֵ֖ן לִ/זְקֻנָֽי/ו־׃
translation:
  text: And she said, “Who would have said to Abraham that Sarah would nurse children?
    Yet I have borne a son in his old age.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons.' The plural is rendered 'children' here because the expression
      'nurse sons' functions idiomatically in context, while the next clause specifies
      that the child born was 'a son.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Who had told Abraham that Sarah would suckle sons?'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And she said' preserves the Hebrew
    narrative flow without overinterpreting temporal nuance.
- source_word: מִי מִלֵּל לְאַבְרָהָם
  chosen: Who would have said to Abraham
  alternatives:
  - Who had told Abraham
  - Who could have said to Abraham
  lexicon: HALOT
  rationale: The idiom expresses astonishment at an unexpected outcome. 'Would have
    said' captures the rhetorical, incredulous sense better than a simple past, while
    staying close to the Hebrew.
- source_word: הֵינִיקָה
  chosen: would nurse
  alternatives:
  - would suckle
  - has nursed
  lexicon: HALOT
  rationale: The Hiphil of ינק means to give suck, nurse. 'Nurse' is natural modern
    English and preserves the maternal image.
- source_word: בָנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although literally 'sons,' the plural here functions idiomatically after
    'nurse' to refer to childbearing/nursing offspring generally. 'Children' is more
    idiomatic in English in this exclamatory statement, while the specific male child
    is clarified in the next clause with 'a son'.
- source_word: שָׂרָה
  chosen: Sarah
  lexicon: HALOT
  rationale: Personal name transliterated according to standard convention, in keeping
    with project policy.
- source_word: כִּי
  chosen: Yet
  alternatives:
  - For
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the surprising ground or explanation for the preceding
    exclamation. 'Yet' brings out the sense of astonished contrast in smooth English;
    the sense is explanatory but also emphatic.
- source_word: יָלַדְתִּי
  chosen: I have borne
  alternatives:
  - I have given birth to
  - I bore
  lexicon: HALOT
  rationale: '''Have borne'' is concise, natural, and slightly elevated in a way fitting
    the register, while accurately rendering the perfect verb.'
- source_word: בֵן
  chosen: a son
  alternatives:
  - a boy
  lexicon: HALOT
  rationale: Direct and literal rendering of בן; 'son' is the normal English equivalent
    in this familial context.
- source_word: לִזְקֻנָיו
  chosen: in his old age
  alternatives:
  - to his old age
  - for his old age
  lexicon: HALOT
  rationale: The phrase refers to Abraham's advanced age. 'In his old age' is the
    idiomatic English rendering of the Hebrew construction.
