id: GEN.21.6
reference: Genesis 21:6
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר שָׂרָ֔ה צְחֹ֕ק עָ֥שָׂה לִ֖/י אֱלֹהִ֑ים כָּל הַ/שֹּׁמֵ֖עַ יִֽצְחַק
    לִֽ/י־־׃
translation:
  text: And Sarah said, “God has made laughter for me; everyone who hears will laugh
    with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'everyone who hears will laugh at me' or 'for me.' The Hebrew permits
      several nuances, but in context the sense is most likely shared joy with Sarah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative advance. 'And Sarah said' is natural
    English and preserves the Hebrew narrative flow without overtranslating the conjunction.
- source_word: שָׂרָה
  chosen: Sarah
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: צְחֹק
  chosen: laughter
  alternatives:
  - laughing
  - a laugh
  lexicon: HALOT
  rationale: The noun denotes laughter. 'Laughter' best preserves the nominal form
    and the wordplay with Isaac's name/verb יִצְחַק in the second clause.
- source_word: עָשָׂה לִי
  chosen: has made ... for me
  alternatives:
  - has made ... for me to have
  - has brought me
  lexicon: HALOT
  rationale: The Hebrew is literally 'has made for me.' Rendering it this way keeps
    the concrete verbal expression while remaining idiomatic. More interpretive options
    like 'has brought me laughter' are possible but move farther from the source wording.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one God acting on Sarah's behalf;
    singular English 'God' is the natural rendering.
- source_word: כָּל הַשֹּׁמֵעַ
  chosen: everyone who hears
  alternatives:
  - all who hear
  - everyone hearing this
  lexicon: HALOT
  rationale: The phrase is singular in form but distributive in sense. 'Everyone who
    hears' is idiomatic modern English and preserves the generic force.
- source_word: יִצְחַק
  chosen: will laugh
  alternatives:
  - will rejoice
  - will laugh for joy
  lexicon: HALOT
  rationale: The verb from the same root as צְחֹק and Isaac's name primarily means
    'laugh.' Keeping 'laugh' preserves the deliberate wordplay in the verse. Broader
    renderings like 'rejoice' capture sense but lose the lexical connection.
- source_word: לִי
  chosen: with me
  alternatives:
  - at me
  - for me
  lexicon: HALOT
  rationale: Although literally 'to/for me,' in this context the dative after 'laugh'
    is best understood as sharing Sarah's joy rather than mocking her. 'With me' communicates
    the likely sense in idiomatic English while avoiding the misleading implication
    'laugh at me.'
