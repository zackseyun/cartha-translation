theological_decisions:
- issue: Sense of the final clause יִצְחַק לִי
  chosen_reading: 'shared joyful laughter: ''will laugh with me'''
  alternative_readings:
  - will laugh at me
  - will laugh for me
  rationale: The context is Sarah's celebration at Isaac's birth, so the clause most
    naturally expresses participation in her joy, not derision. This also fits the
    positive force of the preceding statement about God making laughter for her. The
    ambiguity is lexical/contextual rather than doctrinal, so the preferred reading
    is placed in the main text and alternatives preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
