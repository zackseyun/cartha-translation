theological_decisions:
- issue: Nuance of חסד in an oath/covenant setting
  chosen_reading: kindness
  alternative_readings:
  - loyal love
  - covenant faithfulness
  rationale: The verse concerns reciprocal faithful treatment under oath, so חסד has
    relational loyalty overtones. However, 'kindness' is the most accessible main-text
    rendering and does not over-theologize the term beyond what the immediate context
    requires.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of נין and נכד
  chosen_reading: my children, or my descendants
  alternative_readings:
  - my son and my grandson
  - my offspring and my posterity
  rationale: The paired terms indicate successive generations without requiring a
    strictly literal 'son/grandson' in this context. The chosen rendering preserves
    the generational extension in idiomatic English.
  doctrine_reference: Translation philosophy §§1, 6
