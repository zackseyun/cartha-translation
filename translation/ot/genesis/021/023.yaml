id: GEN.21.23
reference: Genesis 21:23
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִשָּׁ֨בְעָ/ה לִּ֤/י בֵֽ/אלֹהִים֙ הֵ֔נָּה אִם תִּשְׁקֹ֣ר לִ֔/י
    וּ/לְ/נִינִ֖/י וּ/לְ/נֶכְדִּ֑/י כַּ/חֶ֜סֶד אֲשֶׁר עָשִׂ֤יתִי עִמְּ/ךָ֙ תַּעֲשֶׂ֣ה
    עִמָּדִ֔/י וְ/עִם הָ/אָ֖רֶץ אֲשֶׁר גַּ֥רְתָּה בָּֽ/הּ־־־־׃
translation:
  text: Now swear to me here by God that you will not deal falsely with me, or with
    my children, or with my descendants. According to the kindness that I have shown
    to you, you shall show to me and to the land where you have lived as a foreigner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not lie to me' / 'you will not break faith with me.' The Hebrew
      verb can denote false dealing in a broader relational sense, especially in oath
      contexts.
    reason: lexical_alternative
  - marker: b
    text: '''Kindness'' translates Hebrew hesed, which can also carry the sense of
      loyal love or covenant faithfulness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'where you have sojourned.' The Hebrew refers to living in a place as
      a resident foreigner.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁבְעָה
  chosen: swear
  alternatives:
  - take an oath
  lexicon: HALOT
  rationale: Imperative/request form from שבע in oath-taking context. 'Swear' is natural
    modern English; 'take an oath' is possible but less direct.
- source_word: בֵאלֹהִים
  chosen: by God
  alternatives:
  - before God
  lexicon: HALOT
  rationale: The preposition ב with אלהים in oath context most naturally marks the
    one by whom the oath is sworn. 'By God' best reflects the oath formula.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - thus
  - now
  lexicon: HALOT
  rationale: Deictic adverb pointing to the present place/situation. 'Here' fits the
    immediate covenant scene better than the more abstract 'thus'.
- source_word: אִם תִּשְׁקֹר לִי
  chosen: that you will not deal falsely with me
  alternatives:
  - that you will not lie to me
  - that you will not break faith with me
  lexicon: HALOT
  rationale: In oath/covenant context, שקר carries the sense of acting falsely or
    deceitfully, not merely uttering a lie. 'Deal falsely' captures relational/covenantal
    force.
- source_word: נִין
  chosen: children
  alternatives:
  - offspring
  - posterity
  lexicon: HALOT
  rationale: The pair נין ונכד denotes successive generations. 'Children' is idiomatic
    here for the first generation after the speaker, while the next term covers later
    descendants.
- source_word: נֶכֶד
  chosen: descendants
  alternatives:
  - grandchildren
  - posterity
  lexicon: HALOT
  rationale: Though often more specifically 'grandchild/grandson,' in this paired
    expression it broadens to later descendants. 'Descendants' avoids over-specifying
    while preserving generational extension.
- source_word: כחסד
  chosen: According to the kindness
  alternatives:
  - With the loyalty
  - According to the covenant faithfulness
  lexicon: HALOT
  rationale: חסד can denote kindness, loyal love, or covenant loyalty. Here Abimelech
    appeals to benevolent loyalty shown in relationship. 'Kindness' is clear English,
    while the covenantal nuance is preserved by context and noted as an alternative.
- source_word: תעשה עמדי
  chosen: you shall show to me
  alternatives:
  - you shall do for me
  - you shall deal with me
  lexicon: HALOT
  rationale: 'Echoes the earlier עשה with חסד: ''show kindness'' is the implied English
    idiom. Rendering the verb with ''show'' makes the object ''kindness'' explicit
    and natural.'
- source_word: ועם הארץ
  chosen: and to the land
  alternatives:
  - and with the land
  - and to the people of the land
  lexicon: HALOT
  rationale: The Hebrew says 'with the land,' a metonymic expression for the territory/community
    in which Abraham resides. 'To the land' keeps the metonym while reading naturally
    in English.
- source_word: גרתה בה
  chosen: where you have lived as a foreigner
  alternatives:
  - where you have sojourned
  - where you have resided as an alien
  lexicon: HALOT
  rationale: גור denotes residing as a non-native/sojourner. 'Lived as a foreigner'
    communicates the social status clearly in modern English better than the less
    common 'sojourned'.
