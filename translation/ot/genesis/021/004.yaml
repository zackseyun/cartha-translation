theological_decisions:
- issue: Temporal rendering of the prior divine command
  chosen_reading: had commanded him
  alternative_readings:
  - commanded him
  rationale: The Hebrew narrative form can be rendered with simple past, but English
    past perfect better reflects that the command preceded the action and aligns with
    the narrative context in Genesis 17 without adding theological content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
