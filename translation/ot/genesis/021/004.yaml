id: GEN.21.4
reference: Genesis 21:4
source:
  edition: WLC
  text: וַ/יָּ֤מָל אַבְרָהָם֙ אֶת יִצְחָ֣ק בְּנ֔/וֹ בֶּן שְׁמֹנַ֖ת יָמִ֑ים כַּ/אֲשֶׁ֛ר
    צִוָּ֥ה אֹת֖/וֹ אֱלֹהִֽים־־׃
translation:
  text: And Abraham circumcised Isaac his son when he was eight days old, just as
    God had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a son of eight days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָל
  chosen: circumcised
  alternatives:
  - cut off the foreskin
  lexicon: HALOT
  rationale: The verb מול refers specifically to circumcision. 'Circumcised' is the
    standard precise English equivalent and is clearer and more natural than a more
    literal anatomical paraphrase.
- source_word: אֶת יִצְחָק
  chosen: Isaac
  rationale: Direct-object marker plus the personal name. The name is transliterated
    per translation philosophy.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: The construct with pronominal suffix identifies Isaac as Abraham's son.
    Retaining 'his son' preserves the familial emphasis present in the Hebrew.
- source_word: בֶּן שְׁמֹנַת יָמִים
  chosen: when he was eight days old
  alternatives:
  - a son of eight days
  - at eight days
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'a son of eight days.' In natural modern
    English, 'when he was eight days old' best conveys the age idiom without loss
    of meaning.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: This comparative conjunction links Abraham's action to divine command.
    'Just as' clearly conveys exact conformity.
- source_word: צִוָּה אֹתוֹ
  chosen: had commanded him
  alternatives:
  - commanded him
  lexicon: HALOT
  rationale: The clause refers to God's prior command in Genesis 17. English past
    perfect naturally marks the action as prior to Abraham's circumcising Isaac.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the singular God of Israel, governing a singular
    verb. 'God' is the straightforward and contextually correct rendering.
