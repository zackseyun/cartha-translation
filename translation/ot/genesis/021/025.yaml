id: GEN.21.25
reference: Genesis 21:25
source:
  edition: WLC
  text: וְ/הוֹכִ֥חַ אַבְרָהָ֖ם אֶת אֲבִימֶ֑לֶךְ עַל אֹדוֹת֙ בְּאֵ֣ר הַ/מַּ֔יִם אֲשֶׁ֥ר
    גָּזְל֖וּ עַבְדֵ֥י אֲבִימֶֽלֶךְ־־׃
translation:
  text: Then Abraham reproved Abimelech about the well of water that Abimelech’s servants
    had seized.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confronted' or 'complained to' Abimelech; the Hebrew verb can denote
      bringing a reproof or complaint.
    reason: lexical_alternative
  - marker: b
    text: Or 'had taken by force' or 'had stolen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הוֹכִיחַ
  chosen: reproved
  alternatives:
  - confronted
  - complained to
  - argued with
  lexicon: HALOT
  rationale: The Hiphil of יכח commonly carries the sense of proving, deciding, reproving,
    or bringing a complaint/case against someone. In this narrative context Abraham
    raises a grievance with Abimelech over a wrong done by his servants. 'Reproved'
    preserves the interpersonal and corrective force without overlegalizing the clause.
- source_word: עַל אֹדוֹת
  chosen: about
  alternatives:
  - concerning
  - because of
  - on account of
  lexicon: HALOT
  rationale: This prepositional expression introduces the matter under discussion.
    'About' is natural modern English and accurately conveys the topic of Abraham's
    reproof.
- source_word: בְּאֵר הַמַּיִם
  chosen: the well of water
  alternatives:
  - the water well
  - the well
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'well of the water.' 'The well of water' keeps
    the concrete wording better than simply 'the well,' while remaining intelligible
    in English.
- source_word: גָּזְלוּ
  chosen: had seized
  alternatives:
  - had taken by force
  - had robbed
  - had stolen
  lexicon: HALOT
  rationale: גזל denotes taking wrongfully, often by force or unjust appropriation.
    'Had seized' fits the context of servants appropriating a well and avoids the
    narrower commercial sense of 'stolen' while preserving the wrongful force of the
    verb.
- source_word: עַבְדֵי אֲבִימֶלֶךְ
  chosen: Abimelech’s servants
  alternatives:
  - Abimelech’s slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the text refers to royal
    household workers/retainers acting on Abimelech's behalf. The bonded nature is
    not the focus, so 'servants' is the better contextual rendering under the project's
    stated philosophy.
