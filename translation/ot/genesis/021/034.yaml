id: GEN.21.34
reference: Genesis 21:34
source:
  edition: WLC
  text: וַ/יָּ֧גָר אַבְרָהָ֛ם בְּ/אֶ֥רֶץ פְּלִשְׁתִּ֖ים יָמִ֥ים רַבִּֽים׃פ
translation:
  text: And Abraham stayed in the land of the Philistines for many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourned in the land of the Philistines for many days.' The Hebrew
      verb can emphasize residing as a foreigner.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּגָר
  chosen: stayed
  alternatives:
  - sojourned
  - lived as a foreigner
  - resided
  lexicon: HALOT
  rationale: The verb גור commonly denotes residing as a sojourner or foreign resident.
    In smooth modern English here, 'stayed' best captures the narrative sense without
    unnecessary archaism, while the location phrase and broader Abraham narrative
    preserve the idea that he was not native to the land.
- source_word: בְּאֶרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - in the territory
  lexicon: HALOT
  rationale: אֶרֶץ is broadly 'land/earth/country.' In this context, 'land' is the
    most natural and biblically consistent rendering for a regional territory.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name; with אֶרֶץ it yields
    the idiomatic phrase 'the land of the Philistines.'
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - a long time
  - many days
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'many days.' Rendering it as 'for many
    days' preserves the form while remaining natural English. 'A long time' is possible
    but less formally transparent.
- source_word: וַ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: Hebrew grammar
  rationale: The prefixed waw continues the narrative sequence. 'And' preserves the
    straightforward Hebrew narrative linkage without overinterpreting temporal nuance.
