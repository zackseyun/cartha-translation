theological_decisions:
- issue: Rendering of אָמָה in relation to social status
  chosen_reading: slave woman
  alternative_readings:
  - maidservant
  - servant woman
  rationale: The Hebrew term denotes a female servant of low status and in this context
    Hagar's bonded condition is narratively significant. Following the translation
    philosophy, the rendering should not soften the social reality unnecessarily.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος analogously
    favoring explicit bonded-status renderings where salient.
