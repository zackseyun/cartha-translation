id: GEN.21.13
reference: Genesis 21:13
source:
  edition: WLC
  text: וְ/גַ֥ם אֶת בֶּן הָ/אָמָ֖ה לְ/ג֣וֹי אֲשִׂימֶ֑/נּוּ כִּ֥י זַרְעֲ/ךָ֖ הֽוּא־־׃
translation:
  text: And I will also make the son of the slave woman into a nation, because he
    is your offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the slave woman’s son” or “the son of the maidservant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And I will also
  alternatives:
  - And also
  - But also
  lexicon: HALOT
  rationale: וְ plus גַם adds continuation and emphasis. In English, placing 'also'
    with the verb yields natural style while preserving the additive force.
- source_word: אֶת בֶּן הָאָמָה
  chosen: the son of the slave woman
  alternatives:
  - the slave woman's son
  - the son of the maidservant
  lexicon: HALOT
  rationale: בֶּן means 'son,' and אָמָה denotes a female slave/servant. 'Slave woman'
    best preserves the social status more explicitly than 'maidservant,' in line with
    the project's preference to reflect bonded status where salient.
- source_word: לְגוֹי
  chosen: into a nation
  alternatives:
  - as a nation
  - for a nation
  lexicon: HALOT
  rationale: 'With שׂים, לְגוֹי expresses result: God will constitute him as/becoming
    a nation. ''Into a nation'' communicates transformation/result clearly in idiomatic
    English.'
- source_word: אֲשִׂימֶנּוּ
  chosen: I will make
  alternatives:
  - I will set
  - I will appoint
  lexicon: HALOT
  rationale: שׂים has a broad semantic range including 'set, place, make.' In this
    context of constituting Ishmael's future status, 'make' is the most natural and
    accurate English rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: כִּי here gives the reason for God's promise regarding the son of Hagar.
    'Because' makes the causal sense explicit in contemporary English.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendant
  lexicon: HALOT
  rationale: זֶרַע can mean seed/offspring/descendants. Here it refers to Abraham's
    progeny in a singular representative sense. 'Offspring' is natural modern English
    and preserves the familial sense without archaic wording.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he himself is
  lexicon: HALOT
  rationale: 'The pronoun is explicit for emphasis: ''he is your offspring.'' English
    normally includes the pronoun and copula; adding ''himself'' would overstate the
    emphasis.'
