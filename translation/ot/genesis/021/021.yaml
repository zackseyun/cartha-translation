id: GEN.21.21
reference: Genesis 21:21
source:
  edition: WLC
  text: וַ/יֵּ֖שֶׁב בְּ/מִדְבַּ֣ר פָּארָ֑ן וַ/תִּֽקַּֽח ל֥/וֹ אִמּ֛/וֹ אִשָּׁ֖ה מֵ/אֶ֥רֶץ
    מִצְרָֽיִם־׃פ
translation:
  text: He lived in the wilderness of Paran, and his mother took a wife for him from
    the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He dwelt in the wilderness of Paran.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'his mother got a woman for him from the land of Egypt'; the context
      indicates a marriage arrangement, so 'wife' is used in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: He lived
  alternatives:
  - he dwelt
  - he settled
  - he stayed
  lexicon: HALOT
  rationale: The verb ישׁב commonly means to sit, dwell, remain, or live. In this
    narrative summary, 'lived' gives natural modern English while preserving the sense
    of residence without implying permanent settlement more strongly than the Hebrew
    requires.
- source_word: בְּמִדְבַּר פָּארָן
  chosen: in the wilderness of Paran
  alternatives:
  - in the desert of Paran
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' is a
    standard and suitably broad rendering in biblical narrative, and Paran is transliterated
    as a place name per translation philosophy.
- source_word: וַתִּקַּח
  chosen: took
  alternatives:
  - obtained
  - chose
  lexicon: HALOT
  rationale: לקח has a broad semantic range including 'take.' Here it introduces the
    mother's action in securing a marriage partner. 'Took' is idiomatic in biblical
    marriage contexts and remains close to the Hebrew.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - for Ishmael
  - to him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix indicates advantage or relation.
    'For him' best fits the context of arranging a marriage, whereas 'to him' is less
    idiomatic in English.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained explicitly for clarity and
    fidelity.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Although אִשָּׁה can mean 'woman' or 'wife,' in this context of obtaining
    a marriage partner for him, 'wife' is clearly intended.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אֶרֶץ, 'land.' Retaining 'the land of
    Egypt' preserves the fuller expression while remaining natural English.
