id: GEN.21.29
reference: Genesis 21:29
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲבִימֶ֖לֶךְ אֶל אַבְרָהָ֑ם מָ֣ה הֵ֗נָּה שֶׁ֤בַע כְּבָשֹׂת֙ הָ/אֵ֔לֶּה
    אֲשֶׁ֥ר הִצַּ֖בְתָּ לְ/בַדָּֽ/נָה־׃
translation:
  text: And Abimelech said to Abraham, “What are these seven ewe lambs that you have
    set apart by themselves?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “that you have placed by themselves.” The Hebrew verb can mean simply
      “set/placed,” while the context suggests they were distinguished from the rest
      as a separate group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name transliterated per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee of speech.
- source_word: מָה
  chosen: What
  alternatives:
  - Why
  lexicon: HALOT
  rationale: In this context Abimelech asks about the identity/significance of the
    animals, not primarily the reason; 'What are these...' best matches the plain
    sense.
- source_word: הֵנָּה
  chosen: are these
  alternatives:
  - are those
  lexicon: HALOT
  rationale: The feminine plural pronoun points to the nearby feminine plural noun
    'ewe lambs'; in idiomatic English it is absorbed into 'What are these...'.
- source_word: שֶׁבַע כְּבָשֹׂת הָאֵלֶּה
  chosen: these seven ewe lambs
  alternatives:
  - these seven lambs
  - these seven female sheep
  lexicon: HALOT
  rationale: כְּבָשֹׂת is specifically female lambs/young ewes, not generic sheep.
    'Ewe lambs' preserves the feminine specificity and fits the narrative context.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Simple relative pronoun linking the clause to the animals.
- source_word: הִצַּבְתָּ
  chosen: you have set apart
  alternatives:
  - you have placed
  - you have stationed
  - you have set
  lexicon: HALOT
  rationale: The Hiphil of נצב means to set/place/stand. In context, because the animals
    are distinguished from the others as a special group, 'set apart' brings out the
    functional nuance without over-paraphrasing.
- source_word: לְבַדָּנָה
  chosen: by themselves
  alternatives:
  - alone
  - separately
  - apart
  lexicon: HALOT
  rationale: The phrase indicates separation from the rest. 'By themselves' is natural
    English and preserves the idea of being set separately.
