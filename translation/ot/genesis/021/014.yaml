theological_decisions:
- issue: Syntactic relation of 'the boy' to 'putting them on her shoulder'
  chosen_reading: The provisions were placed on Hagar's shoulder, and the boy accompanied
    her when Abraham sent her away.
  alternative_readings:
  - Abraham placed both the provisions and the boy on Hagar's shoulder
  - Abraham gave Hagar the provisions and also entrusted the boy to her before sending
    her away
  rationale: The Hebrew sequence is compressed and has generated discussion because
    'the boy' follows the phrase about Hagar's shoulder. Given the boy's age in the
    broader narrative, rendering the text as if Abraham physically placed him on her
    shoulder would likely mislead modern readers. The translation preserves the Hebrew
    sequence while making clear that the shoulder phrase most naturally modifies the
    provisions, not the boy's physical placement.
  doctrine_reference: Translation philosophy §1, §3, §6
