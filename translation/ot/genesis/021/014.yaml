id: GEN.21.14
reference: Genesis 21:14
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֣ם אַבְרָהָ֣ם בַּ/בֹּ֡קֶר וַ/יִּֽקַּֽח לֶחֶם֩ וְ/חֵ֨מַת מַ֜יִם
    וַ/יִּתֵּ֣ן אֶל הָ֠גָר שָׂ֧ם עַל שִׁכְמָ֛/הּ וְ/אֶת הַ/יֶּ֖לֶד וַֽ/יְשַׁלְּחֶ֑/הָ
    וַ/תֵּ֣לֶךְ וַ/תֵּ֔תַע בְּ/מִדְבַּ֖ר בְּאֵ֥ר שָֽׁבַע׀־־־־׃
translation:
  text: So Abraham rose early in the morning and took bread and a skin of water and
    gave them to Hagar, putting them on her shoulder, along with the boy, and sent
    her away. And she went and wandered in the wilderness of Beersheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'putting [it/them] on her shoulder, and the boy.' The
      syntax is compressed; some translations construe the wording more closely as
      'placing them on her shoulder, and [giving her] the boy.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly conveys rising early. 'Rose early' is natural
    modern English and preserves the temporal emphasis.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: Standard temporal expression; paired with 'rose early' it yields the
    idiomatic English phrase 'rose early in the morning' without loss of meaning.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The noun literally means 'bread.' Although it can function more broadly
    for food, there is no need here to generalize beyond the Hebrew.
- source_word: חֵמַת מַיִם
  chosen: a skin of water
  alternatives:
  - a waterskin
  - a bottle of water
  lexicon: HALOT
  rationale: חֵמֶת denotes a skin container, especially for liquids. 'A skin of water'
    is clear and close to the Hebrew; 'bottle' would be too modern/materially specific.
- source_word: וַיִּתֵּן אֶל הָגָר
  chosen: gave them to Hagar
  alternatives:
  - gave to Hagar
  lexicon: HALOT
  rationale: English requires the implied plural object from 'bread and a skin of
    water' to be made explicit for smoothness.
- source_word: שָׂם עַל שִׁכְמָהּ
  chosen: putting them on her shoulder
  alternatives:
  - placing them on her shoulder
  - having set them on her shoulder
  lexicon: HALOT
  rationale: The participle שָׂם is best taken circumstantially, describing how Abraham
    gave the provisions. 'Putting them on her shoulder' preserves the action and relation
    to the supplies.
- source_word: וְאֶת הַיֶּלֶד
  chosen: along with the boy
  alternatives:
  - and the boy
  - with the boy
  lexicon: HALOT
  rationale: The Hebrew simply adds 'and the boy.' In English, 'along with the boy'
    clarifies that the child also accompanied Hagar when Abraham sent her away, while
    avoiding the misleading sense that the boy was physically placed on her shoulder.
- source_word: וַיְשַׁלְּחֶהָ
  chosen: sent her away
  alternatives:
  - sent her off
  - dismissed her
  lexicon: HALOT
  rationale: This is the standard sense of שלח in this context. 'Sent her away' is
    idiomatic and preserves the solemnity of the action.
- source_word: וַתֵּתַע
  chosen: wandered
  alternatives:
  - went astray
  - lost her way
  lexicon: HALOT
  rationale: The verb תעה denotes wandering or straying. 'Wandered' fits the wilderness
    context and avoids overinterpreting whether the action was accidental or prolonged.
- source_word: בְּמִדְבַּר בְּאֵר שָׁבַע
  chosen: in the wilderness of Beersheba
  alternatives:
  - in the desert of Beersheba
  lexicon: HALOT
  rationale: מִדְבָּר is commonly 'wilderness' in biblical narrative; this avoids
    the narrower modern image of sand desert. 'Beersheba' is the standard transliteration
    of the place name.
