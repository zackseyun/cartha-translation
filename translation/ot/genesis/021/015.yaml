id: GEN.21.15
reference: Genesis 21:15
source:
  edition: WLC
  text: וַ/יִּכְל֥וּ הַ/מַּ֖יִם מִן הַ/חֵ֑מֶת וַ/תַּשְׁלֵ֣ךְ אֶת הַ/יֶּ֔לֶד תַּ֖חַת
    אַחַ֥ד הַ/שִּׂיחִֽם־־׃
translation:
  text: When the water in the skin was gone, she cast the boy under one of the bushes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'waterskin' for 'skin.' The Hebrew refers to a container made from animal
      skin.
    reason: lexical_alternative
  - marker: b
    text: Or 'she threw the boy under one of the bushes.' The verb is stronger than
      simple 'placed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְלוּ
  chosen: was gone
  alternatives:
  - was finished
  - was used up
  - ran out
  lexicon: HALOT
  rationale: 'כלה here denotes coming to an end or being exhausted. With ''the water''
    as subject, idiomatic English is singular: ''the water ... was gone.'' This preserves
    the sense of depletion without awkward literalism.'
- source_word: הַמַּיִם
  chosen: the water
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: Though morphologically plural, מַיִם commonly functions as a mass noun
    meaning 'water.' English singular is the natural equivalent in this context.
- source_word: מִן הַחֵמֶת
  chosen: in the skin
  alternatives:
  - from the skin bottle
  - from the waterskin
  - from the bottle
  lexicon: HALOT
  rationale: 'The preposition marks source: the water was exhausted from the container.
    חֵמֶת refers to a skin container, likely a waterskin. ''In the skin'' is concise
    and natural in English while preserving the image; the more specific ''waterskin''
    is a viable alternative.'
- source_word: וַתַּשְׁלֵךְ
  chosen: she cast
  alternatives:
  - she threw
  - she placed
  - she put down
  lexicon: HALOT
  rationale: The verb שלך normally means 'throw/cast/send.' In this distress context,
    a stronger verb than 'placed' is warranted by the Hebrew, but 'cast' avoids sounding
    flippant while retaining the abruptness of the action.
- source_word: אֶת הַיֶּלֶד
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: יֶלֶד is a general term for a child or boy. Given Ishmael's age in the
    narrative, 'boy' is a natural English rendering and matches the masculine reference
    without archaic tone.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'under/beneath.' 'Under' is the
    clearest modern English equivalent.
- source_word: אַחַד הַשִּׂיחִם
  chosen: one of the bushes
  alternatives:
  - one of the shrubs
  - one of the desert bushes
  lexicon: HALOT
  rationale: The construction means 'one of the bushes/shrubs.' שִׂיחַ denotes a bush
    or shrub. 'Bushes' is more idiomatic and accessible than 'shrubs' in narrative
    English.
