id: GEN.21.16
reference: Genesis 21:16
source:
  edition: WLC
  text: וַ/תֵּלֶךְ֩ וַ/תֵּ֨שֶׁב לָ֜/הּ מִ/נֶּ֗גֶד הַרְחֵק֙ כִּ/מְטַחֲוֵ֣י קֶ֔שֶׁת
    כִּ֣י אָֽמְרָ֔ה אַל אֶרְאֶ֖ה בְּ/מ֣וֹת הַ/יָּ֑לֶד וַ/תֵּ֣שֶׁב מִ/נֶּ֔גֶד וַ/תִּשָּׂ֥א
    אֶת קֹלָ֖/הּ וַ/תֵּֽבְךְּ־־׃
translation:
  text: Then she went and sat down by herself at a distance, about a bowshot away,
    for she said, “Let me not look on the death of the boy.” So she sat opposite him
    and lifted up her voice and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Let me not see the boy die.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֶּגֶד
  chosen: opposite him / at a distance
  alternatives:
  - across from him
  - some distance away
  - in front of him
  lexicon: HALOT
  rationale: The preposition denotes being opposite or at some distance facing the
    object. In the first instance, the phrase is expanded by הַרְחֵק and the bowshot
    expression, so 'at a distance' fits idiomatic English; in the second, 'opposite
    him' preserves the spatial sense more directly.
- source_word: הַרְחֵק
  chosen: at a distance
  alternatives:
  - far away
  - afar off
  lexicon: HALOT
  rationale: Infinitive absolute/adverbial form from רחק intensifies the idea of distance.
    'At a distance' is natural modern English and avoids archaic 'afar off'.
- source_word: כִּמְטַחֲוֵי קֶשֶׁת
  chosen: about a bowshot away
  alternatives:
  - about the distance of a bowshot
  - as far as a bow can shoot
  lexicon: HALOT
  rationale: An idiom for approximate distance. 'About a bowshot away' is concise,
    idiomatic, and preserves the simile of archery range.
- source_word: הַיָּלֶד
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: Although Ishmael is older than a small child, ילד can denote a boy/youth.
    'Boy' fits the immediate emotional scene and avoids the archaic tone of 'lad.'
    'Child' is possible but less specific.
- source_word: אַל אֶרְאֶה בְּמוֹת הַיָּלֶד
  chosen: Let me not look on the death of the boy
  alternatives:
  - Let me not see the boy die
  - Do not let me see the death of the boy
  lexicon: HALOT
  rationale: The Hebrew is first-person volitional with negative particle אַל and
    a nominal expression 'in/at the death of the boy.' 'Let me not look on the death
    of the boy' preserves the formality and pathos without over-paraphrasing. 'See
    the boy die' is idiomatic but slightly more interpretive.
- source_word: וַתִּשָּׂא אֶת־קֹלָהּ
  chosen: lifted up her voice
  alternatives:
  - raised her voice
  - cried out
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for audible lament or speech. 'Lifted up
    her voice' preserves the idiom; the following 'and wept' clarifies the emotional
    action.
- source_word: וַתֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: '''Wept'' distinguishes the verb of crying from the preceding idiom about
    lifting the voice and better conveys lament.'
- source_word: לָהּ
  chosen: by herself
  alternatives:
  - for herself
  - alone
  lexicon: HALOT
  rationale: The pronoun after 'sat down' is ethically/datively used and indicates
    she sat apart. 'By herself' brings out the sense in natural English.
