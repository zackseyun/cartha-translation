id: GEN.21.18
reference: Genesis 21:18
source:
  edition: WLC
  text: ק֚וּמִי שְׂאִ֣י אֶת הַ/נַּ֔עַר וְ/הַחֲזִ֥יקִי אֶת יָדֵ֖/ךְ בּ֑/וֹ כִּֽי לְ/ג֥וֹי
    גָּד֖וֹל אֲשִׂימֶֽ/נּוּ־־־׃
translation:
  text: Get up, lift up the boy, and hold him fast with your hand, for I will make
    him into a great nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take hold of him with your hand.' The Hebrew expression emphasizes firm
      support or grasp.
    reason: lexical_alternative
  - marker: b
    text: Or 'and hold him by your hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: ק֚וּמִי
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: HALOT
  rationale: Imperative feminine singular of קום addressed to Hagar. 'Get up' is natural
    modern English and preserves the command force without archaic tone.
- source_word: שְׂאִ֣י
  chosen: lift up
  alternatives:
  - carry
  - pick up
  lexicon: HALOT
  rationale: From נשׂא, here likely meaning to raise or lift the boy from his collapsed
    state. 'Lift up' preserves the verbal imagery and avoids overcommitting to continuous
    carrying.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the lad
  - the youth
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy or youth. In this narrative context, 'the
    boy' is the most natural and age-appropriate English rendering.
- source_word: וְהַחֲזִיקִי אֶת יָדֵךְ בּוֹ
  chosen: hold him by your hand
  alternatives:
  - take hold of him with your hand
  - strengthen your hand on him
  - grasp him with your hand
  lexicon: HALOT
  rationale: החזיק means to seize, hold fast, or support strongly. The idiom with
    'your hand' and 'in/on him' conveys firm supportive grasp. 'Hold him by your hand'
    is concise, readable, and reflects the concrete Hebrew expression.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the explanatory force
    in elevated but still readable English.
- source_word: לְגוֹי גָּדוֹל
  chosen: into a great nation
  alternatives:
  - as a great nation
  - a great nation
  lexicon: HALOT
  rationale: The preposition ל with שׂים often marks result or appointment. 'Make
    him into a great nation' expresses the transformation/result sense clearly in
    English.
- source_word: אֲשִׂימֶנּוּ
  chosen: I will make him
  alternatives:
  - I will set him
  - I will appoint him
  lexicon: HALOT
  rationale: From שׂים, whose broad sense includes set, place, make. In context of
    becoming a nation, 'make him' is the idiomatic English equivalent.
