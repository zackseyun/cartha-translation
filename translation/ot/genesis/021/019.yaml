theological_decisions:
- issue: Whether 'God opened her eyes' should be rendered as a literal divine action
    or interpreted as merely noticing an already-present well
  chosen_reading: 'Literal divine action: ''God opened her eyes'''
  alternative_readings:
  - God enabled her to notice the well
  - God caused her to see
  rationale: The Hebrew explicitly attributes the action to God with the idiom of
    opening her eyes. The translation preserves the theological tension of divine
    action without explaining the mechanism.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
