id: GEN.21.19
reference: Genesis 21:19
source:
  edition: WLC
  text: וַ/יִּפְקַ֤ח אֱלֹהִים֙ אֶת עֵינֶ֔י/הָ וַ/תֵּ֖רֶא בְּאֵ֣ר מָ֑יִם וַ/תֵּ֜לֶךְ
    וַ/תְּמַלֵּ֤א אֶת הַ/חֵ֨מֶת֙ מַ֔יִם וַ/תַּ֖שְׁקְ אֶת הַ/נָּֽעַר־־־׃
translation:
  text: Then God opened her eyes, and she saw a well of water. She went and filled
    the skin with water and gave the boy a drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the waterskin.' The Hebrew term refers to a skin container used for
      carrying liquid.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקַח
  chosen: opened
  alternatives:
  - uncovered
  - made able to see
  lexicon: HALOT
  rationale: The verb פקח commonly means 'open,' especially of eyes. 'Opened' preserves
    the concrete Hebrew idiom while allowing the implied result of perception.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the singular God of the narrative, governing
    a singular verb.
- source_word: עֵינֶיהָ
  chosen: her eyes
  lexicon: HALOT
  rationale: Literal rendering of the direct object; the plural 'eyes' is natural
    in English and preserves the Hebrew expression.
- source_word: וַתֵּרֶא
  chosen: she saw
  alternatives:
  - she looked and saw
  - she perceived
  lexicon: HALOT
  rationale: A straightforward rendering of ראה. 'Saw' fits the narrative sequence
    after God opened her eyes.
- source_word: בְּאֵר מָיִם
  chosen: a well of water
  alternatives:
  - a water well
  - a well
  lexicon: HALOT
  rationale: The construct phrase literally means 'a well of water.' Retaining 'of
    water' preserves the Hebrew wording and emphasizes the life-giving discovery in
    context.
- source_word: וַתֵּלֶךְ
  chosen: She went
  alternatives:
  - Then she went
  lexicon: HALOT
  rationale: Simple narrative movement verb; rendered naturally in English while preserving
    the sequence.
- source_word: וַתְּמַלֵּא
  chosen: filled
  alternatives:
  - filled up
  lexicon: HALOT
  rationale: Standard rendering of מלא. No expansion beyond the text is needed.
- source_word: הַחֵמֶת
  chosen: the skin
  alternatives:
  - the waterskin
  - the bottle
  lexicon: HALOT
  rationale: חֵמֶת denotes a skin container, likely a waterskin. 'The skin' is concise
    and close to the Hebrew; 'waterskin' is a viable interpretive alternative but
    slightly more explicit than the text.
- source_word: מַיִם
  chosen: with water
  lexicon: HALOT
  rationale: 'Rendered idiomatically with the verb ''filled'' in English: one fills
    a container ''with water.'''
- source_word: וַתַּשְׁקְ
  chosen: gave the boy a drink
  alternatives:
  - gave him water to drink
  - made the boy drink
  lexicon: HALOT
  rationale: The Hiphil of שׁקה means 'give to drink' or 'cause to drink.' 'Gave the
    boy a drink' is natural modern English and accurately conveys the causative sense.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the lad
  - the youth
  lexicon: HALOT
  rationale: נַעַר refers here to Hagar's son Ishmael. 'The boy' is clear, natural,
    and contextually appropriate; 'lad' is archaic.
