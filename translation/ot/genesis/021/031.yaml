id: GEN.21.31
reference: Genesis 21:31
source:
  edition: WLC
  text: עַל כֵּ֗ן קָרָ֛א לַ/מָּק֥וֹם הַ/ה֖וּא בְּאֵ֣ר שָׁ֑בַע כִּ֛י שָׁ֥ם נִשְׁבְּע֖וּ
    שְׁנֵי/הֶֽם־׃
translation:
  text: Therefore he called that place Beersheba, because there the two of them swore
    an oath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beersheba sounds like the Hebrew for both 'well of seven' and 'well of oath';
      the explanation here connects the name especially with the oath sworn there.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Idiomatic causal-consecutive expression introducing the explanation for
    the place name. 'Therefore' is concise and natural in modern English while preserving
    the logical connection.
- source_word: קָרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: The verb commonly means 'call/name.' 'He called' stays closer to the
    Hebrew wording while still conveying naming in context.
- source_word: לַמָּקוֹם הַהוּא
  chosen: that place
  alternatives:
  - the place
  - that location
  lexicon: HALOT
  rationale: Definite phrase referring to a specific site already in view. 'That place'
    is natural English and preserves the demonstrative force of הַהוּא.
- source_word: בְּאֵר שָׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  lexicon: HALOT
  rationale: As a place name, it should be transliterated per project philosophy.
    Standard English form is 'Beersheba.' The Hebrew also carries a wordplay with
    'well' and 'seven/oath,' which is explained by the following clause rather than
    forced into the main text.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the naming. 'Because' is clearer in contemporary
    English than the more formal 'for.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb best rendered directly as 'there.'
- source_word: נִשְׁבְּעוּ
  chosen: swore an oath
  alternatives:
  - swore
  - took an oath
  lexicon: HALOT
  rationale: From שבע in the Niphal, meaning 'to swear, take an oath.' 'Swore an oath'
    makes the covenantal action explicit in idiomatic English and helps preserve the
    wordplay with שָׁבַע in the place name.
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: Both are possible; 'the two of them' more directly reflects the dual
    idea in the Hebrew and keeps the emphasis on the two parties involved.
