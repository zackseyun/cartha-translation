theological_decisions:
- issue: Divine presence formula with Ishmael
  chosen_reading: God was with the boy
  alternative_readings:
  - God helped the boy
  - God was for the boy
  rationale: The verse states divine presence/support without expanding its theological
    implications. The translation preserves the text's affirmation of God's care for
    Ishmael without importing broader doctrinal conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
