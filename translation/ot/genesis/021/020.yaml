id: GEN.21.20
reference: Genesis 21:20
source:
  edition: WLC
  text: וַ/יְהִ֧י אֱלֹהִ֛ים אֶת הַ/נַּ֖עַר וַ/יִּגְדָּ֑ל וַ/יֵּ֨שֶׁב֙ בַּ/מִּדְבָּ֔ר
    וַ/יְהִ֖י רֹבֶ֥ה קַשָּֽׁת־׃
translation:
  text: God was with the boy, and he grew. He lived in the wilderness and became an
    archer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became a bowman.' The Hebrew literally describes him as one who shoots
      the bow.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אֱלֹהִים אֶת
  chosen: God was with
  alternatives:
  - God was with/for
  - God was with the help of
  lexicon: HALOT
  rationale: The idiom היה את commonly expresses presence or support ('be with').
    'God was with the boy' is the natural English rendering and matches the contextual
    sense of divine favor and protection.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the lad
  - the youth
  lexicon: HALOT
  rationale: נַעַר refers to a boy or youth. 'Boy' is clear modern English and fits
    Ishmael's portrayal here better than the archaic 'lad'.
- source_word: וַיִּגְדָּל
  chosen: he grew
  alternatives:
  - he became great
  - he grew up
  lexicon: HALOT
  rationale: From גדל, in this context referring to physical maturation/development.
    'He grew' is concise and natural; 'grew up' is possible but slightly more interpretive.
- source_word: וַיֵּשֶׁב
  chosen: he lived
  alternatives:
  - he dwelt
  - he settled
  lexicon: HALOT
  rationale: ישב literally means 'sit, dwell, live.' In context of ongoing residence
    in the wilderness, 'lived' is idiomatic modern English. 'Dwelt' is more formal/archaic.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר can denote wilderness or desert. 'Wilderness' preserves the
    broader biblical sense of sparsely inhabited wild land and aligns with common
    OT usage.
- source_word: וַיְהִי רֹבֶה קַשָּׁת
  chosen: became an archer
  alternatives:
  - became a bowman
  - became one who shot the bow
  lexicon: HALOT
  rationale: The phrase combines היה with רֹבֶה and קַשָּׁת, indicating becoming/practicing
    as a bowman. 'Archer' is the most natural concise English equivalent. 'Bowman'
    is possible but less current.
- source_word: רֹבֶה
  chosen: archer
  alternatives:
  - shooter
  - one who shoots
  lexicon: HALOT
  rationale: The participial form here denotes one who shoots, especially with the
    following קַשָּׁת ('bow'). The sense is occupational or characteristic, well captured
    by 'archer'.
- source_word: קַשָּׁת
  chosen: archer
  alternatives:
  - bow
  - with the bow
  lexicon: HALOT
  rationale: Though literally related to 'bow,' in this collocation it specifies the
    instrument and yields the idiomatic sense 'archer/bowman.' Rendering the whole
    phrase smoothly in English avoids wooden repetition.
