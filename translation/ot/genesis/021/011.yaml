id: GEN.21.11
reference: Genesis 21:11
source:
  edition: WLC
  text: וַ/יֵּ֧רַע הַ/דָּבָ֛ר מְאֹ֖ד בְּ/עֵינֵ֣י אַבְרָהָ֑ם עַ֖ל אוֹדֹ֥ת בְּנֽ/וֹ׃
translation:
  text: The matter was very displeasing in Abraham’s eyes because of his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The thing was very bad in Abraham’s eyes concerning his son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  chosen: was very displeasing
  alternatives:
  - was evil
  - was bad
  - was grievous
  lexicon: HALOT
  rationale: From רעע in the Qal wayyiqtol, here functioning idiomatically with בְּעֵינֵי
    ('in the eyes of') to express that something seemed bad or displeasing to someone.
    'Was very displeasing' captures the evaluative sense in natural English better
    than the more wooden 'was evil' or archaic 'was grievous'.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - this matter
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). In this context it refers to Sarah's
    proposal/request in the preceding verse, so 'the matter' is idiomatic and sufficiently
    specific without over-paraphrasing.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier. 'Very' is clear modern English and preserves the
    force without sounding elevated.
- source_word: בְּעֵינֵי
  chosen: in Abraham’s eyes
  alternatives:
  - to Abraham
  - in the sight of Abraham
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'in the eyes of.' Retaining it in English
    preserves the source imagery while remaining natural. It also explains the evaluative
    nuance of וַיֵּרַע.
- source_word: עַל אֹדוֹת
  chosen: because of
  alternatives:
  - concerning
  - on account of
  - with regard to
  lexicon: HALOT
  rationale: The phrase introduces the reason for Abraham's displeasure. 'Because
    of' best fits the causal sense in context, where Abraham is distressed specifically
    over the issue involving his son.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his child
  lexicon: HALOT
  rationale: בן specifically means 'son.' 'His son' preserves the gendered and relational
    specificity of the Hebrew, in keeping with the translation philosophy's gender-accurate
    principle.
