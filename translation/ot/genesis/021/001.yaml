id: GEN.21.1
reference: Genesis 21:1
source:
  edition: WLC
  text: וַֽ/יהוָ֛ה פָּקַ֥ד אֶת שָׂרָ֖ה כַּ/אֲשֶׁ֣ר אָמָ֑ר וַ/יַּ֧עַשׂ יְהוָ֛ה לְ/שָׂרָ֖ה כַּ/אֲשֶׁ֥ר דִּבֵּֽר־׃
translation:
  text: Now Yahweh visited Sarah as he had said, and Yahweh did for Sarah as he had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visited Sarah.' The Hebrew verb can denote God turning his attention to someone in order to act on their behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: פָּקַד
  chosen: attended to
  alternatives:
  - visited
  - took note of
  - came to
  - intervened for
  lexicon: HALOT
  rationale: In this context of fulfilled promise and Sarah's conception in the following verse, the verb carries the sense of gracious divine attention resulting in action. 'Attended to' preserves the personal, effective sense without the potentially misleading English idiom 'visited,' which can sound merely spatial.
- source_word: אֶת שָׂרָה
  chosen: Sarah
  lexicon: HALOT
  rationale: Direct-object marking is not represented in English; the personal name is transliterated by standard convention.
- source_word: כַּאֲשֶׁר אָמָר
  chosen: as he had said
  alternatives:
  - just as he said
  - as he said
  lexicon: HALOT
  rationale: The comparative particle plus perfect verb points back to the prior divine promise. Pluperfect English ('had said') fits the narrative sequence and highlights fulfillment.
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - worked
  - dealt
  lexicon: HALOT
  rationale: A broad verb retained with simple English to mirror the Hebrew's generality. 'Did for Sarah' preserves the idiomatic sense of effective action on her behalf without over-specifying the result in this verse alone.
- source_word: לְשָׂרָה
  chosen: for Sarah
  alternatives:
  - to Sarah
  - with respect to Sarah
  lexicon: HALOT
  rationale: 'The preposition ל here is best represented as benefactive: the LORD acted for Sarah''s benefit.'
- source_word: כַּאֲשֶׁר דִּבֵּר
  chosen: as he had spoken
  alternatives:
  - as he had promised
  - as he had said
  lexicon: HALOT
  rationale: Kept distinct from the previous אָמַר by rendering דִּבֵּר as 'spoken,' preserving the Hebrew's stylistic parallelism without collapsing both clauses into identical English.
