id: GEN.21.5
reference: Genesis 21:5
source:
  edition: WLC
  text: וְ/אַבְרָהָ֖ם בֶּן מְאַ֣ת שָׁנָ֑ה בְּ/הִוָּ֣לֶד ל֔/וֹ אֵ֖ת יִצְחָ֥ק בְּנֽ/וֹ־׃
translation:
  text: And Abraham was a hundred years old when Isaac his son was born to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'And Abraham was a son of a hundred years at the being-born
      to him of Isaac his son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְרָהָם
  chosen: And Abraham
  alternatives:
  - Now Abraham
  lexicon: HALOT
  rationale: The conjunction וְ is rendered simply as 'And' to preserve the Hebrew
    narrative linkage without overinterpreting it as a stronger discourse marker.
    The personal name is transliterated per translation philosophy.
- source_word: בֶּן מְאַת שָׁנָה
  chosen: was a hundred years old
  alternatives:
  - was the son of a hundred years
  - was one hundred years old
  lexicon: HALOT
  rationale: The idiom 'son of a hundred years' means age. English idiom requires
    'was a hundred years old.' 'A hundred' is natural modern English and accurately
    reflects מְאַת in context.
- source_word: בְּ/הִוָּלֶד
  chosen: when ... was born
  alternatives:
  - at the being born of
  - in the birth of
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of ילד expresses temporal
    circumstance: ''when ... was born.'' This is the most natural equivalent in English
    while preserving the passive sense of the Niphal form.'
- source_word: ל֔/וֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronominal phrase marks Abraham as the one to whom the son was born.
    'To him' is the most direct rendering; 'for him' is possible but less literal
    and slightly more interpretive.
- source_word: אֵת יִצְחָק
  chosen: Isaac
  lexicon: HALOT
  rationale: אֵת marks Isaac as the direct object of the infinitive construction and
    is not translated independently in English. The name is transliterated as 'Isaac.'
- source_word: בְּנֽ/וֹ
  chosen: his son
  alternatives:
  - his own son
  lexicon: HALOT
  rationale: The suffix marks filial relationship to Abraham. 'His son' preserves
    the Hebrew apposition to Isaac without adding emphasis not explicit in the text.
