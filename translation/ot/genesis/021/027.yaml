id: GEN.21.27
reference: Genesis 21:27
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח אַבְרָהָם֙ צֹ֣אן וּ/בָקָ֔ר וַ/יִּתֵּ֖ן לַ/אֲבִימֶ֑לֶךְ וַ/יִּכְרְת֥וּ
    שְׁנֵי/הֶ֖ם בְּרִֽית׃
translation:
  text: So Abraham took sheep and cattle and gave them to Abimelech, and the two of
    them made a covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'cut a covenant,' a standard Hebrew idiom for formally making
      a covenant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took up
  - fetched
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח commonly means 'take.' 'Took' is the most natural
    narrative rendering in English and preserves the simple sequential action.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock
  - small livestock
  lexicon: HALOT
  rationale: צֹאן refers to small livestock, especially sheep and goats. Since בָּקָר
    follows as a contrasting category of larger herd animals, 'sheep' gives a clear,
    natural pairing in English without overcomplicating the line.
- source_word: וּבָקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: בָּקָר denotes herd animals, especially cattle. 'Cattle' is the standard
    broad English equivalent and pairs idiomatically with 'sheep.'
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - presented
  - gave over
  lexicon: HALOT
  rationale: נתן in this context is the ordinary verb 'give.' 'Gave' preserves the
    straightforward narrative sense without implying more ceremony than the Hebrew
    states.
- source_word: לַאֲבִימֶלֶךְ
  chosen: to Abimelech
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The prefixed ל is naturally rendered 'to.'
- source_word: וַיִּכְרְתוּ
  chosen: made
  alternatives:
  - cut
  - cut/made
  lexicon: HALOT
  rationale: The idiom כרת ברית is literally 'cut a covenant.' In readable modern
    English, 'made a covenant' best communicates the idiom's meaning in the main text.
    The more literal 'cut' is worth preserving in a footnote because it reflects the
    Hebrew expression and covenant-making background.
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies the two parties. 'The two of them' is
    slightly more explicit than 'both of them' and fits the narrative cadence.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: בְּרִית is a key biblical term and should normally be rendered 'covenant.'
    Although in this context it has treaty-like features, 'covenant' preserves the
    term's broader biblical resonance and consistency.
