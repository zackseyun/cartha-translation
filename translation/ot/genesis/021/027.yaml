- issue: Rendering of covenant idiom כרת ברית
  chosen_reading: made a covenant
  alternative_readings:
  - cut a covenant
  rationale: The verse uses a standard Hebrew covenant idiom. The main text favors
    readable modern English under optimal equivalence, while preserving the literal
    idiom in a footnote for transparency and auditability. This does not alter doctrine
    but preserves the covenantal nuance.
