id: GEN.21.33
reference: Genesis 21:33
source:
  edition: WLC
  text: וַ/יִּטַּ֥ע אֶ֖שֶׁל בִּ/בְאֵ֣ר שָׁ֑בַע וַ/יִּ֨קְרָא שָׁ֔ם בְּ/שֵׁ֥ם יְהוָ֖ה אֵ֥ל עוֹלָֽם־׃
translation:
  text: And he planted a tamarisk tree in Beersheba, and there he called on the name of Yahweh, the Everlasting God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there he proclaimed the name of the LORD' or 'there he invoked the name of the LORD.' The Hebrew idiom can carry both proclamation and invocation in a worship context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Eternal God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטַּע
  chosen: planted
  alternatives:
  - set
  - planted
  lexicon: HALOT
  rationale: The verb נטע in the Qal commonly means to plant. 'Planted' is the natural English equivalent in this context of establishing a tree.
- source_word: אֶשֶׁל
  chosen: tamarisk tree
  alternatives:
  - tree
  - grove
  lexicon: HALOT
  rationale: אשל is traditionally understood as a tamarisk. Because the specific species is likely intended, 'tamarisk tree' preserves the lexical specificity better than the generic 'tree.' 'Grove' reflects older interpretive tradition but is less likely for the singular noun.
- source_word: בִּבְאֵר שָׁבַע
  chosen: in Beersheba
  alternatives:
  - at Beersheba
  lexicon: HALOT
  rationale: The preposition ב plus place name is naturally rendered 'in' for location. 'Beersheba' is the standard English transliteration of the place name.
- source_word: וַיִּקְרָא שָׁם בְּשֵׁם
  chosen: there he called on the name of
  alternatives:
  - there he proclaimed the name of
  - there he invoked the name of
  lexicon: HALOT
  rationale: The idiom קרא בשם יהוה in Genesis regularly denotes invocation/worship directed to God. 'Called on the name of' preserves the established Hebrew idiom while remaining understandable in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵל עוֹלָם
  chosen: the Everlasting God
  alternatives:
  - God Eternal
  - the Eternal God
  - God of eternity
  lexicon: HALOT
  rationale: אֵל is 'God,' and עוֹלָם here functions attributively, denoting enduring perpetuity. 'The Everlasting God' is idiomatic, preserves the title-like force, and communicates duration without unnecessary abstraction.
