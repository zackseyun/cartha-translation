theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: 'The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered ''Yahweh'' rather than ''the LORD'', preserving the covenant name God revealed at Sinai.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the worship formula קרא בשם יהוה
  chosen_reading: called on the name of the LORD
  alternative_readings:
  - proclaimed the name of the LORD
  - invoked the name of the LORD
  rationale: The phrase can involve proclamation and invocation, but in Genesis it commonly marks worshipful appeal to God. The chosen rendering preserves the theological and idiomatic tension without over-interpreting it as either purely proclamation or purely prayer.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
