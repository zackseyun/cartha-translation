theological_decisions:
- issue: Reference of אֱלֹהִים in Abimelech's speech
  chosen_reading: God
  alternative_readings:
  - a god
  - gods
  rationale: Although אֱלֹהִים can be formally plural or, in some contexts, indefinite, the immediate narrative context concerns Abraham's relationship with the true God, and Abimelech recognizes divine favor resting on Abraham. Rendering 'God' best matches the contextual sense without adding further doctrinal claims.
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/021/022.json
  category: awkward_english
  tier: 1
  from: said to Abraham, saying
  to: said to Abraham
  rationale: The Hebrew infinitive לֵאמֹר (lē'mor) is a common formula for introducing direct speech. While 'saying' is a literal translation, it is redundant in English when following the verb 'said.' Omitting it creates a more natural English sentence without any loss of meaning, which aligns well with an 'optimal-equivalence' philosophy by prioritizing clarity in the target language.
