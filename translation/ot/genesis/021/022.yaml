id: GEN.21.22
reference: Genesis 21:22
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בָּ/עֵ֣ת הַ/הִ֔וא וַ/יֹּ֣אמֶר אֲבִימֶ֗לֶךְ וּ/פִיכֹל֙ שַׂר צְבָא֔/וֹ אֶל אַבְרָהָ֖ם לֵ/אמֹ֑ר אֱלֹהִ֣ים עִמְּ/ךָ֔ בְּ/כֹ֥ל אֲשֶׁר אַתָּ֖ה עֹשֶֽׂה־־־׃
translation:
  text: And it happened at that time that Abimelech and Phicol, the commander of his army, said to Abraham, “God is with you in all that you do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely in context, “a god is with you.” The Hebrew אֱלֹהִים can be understood differently in some contexts, but here it most naturally refers to God as the one blessing Abraham.
    reason: alternative_reading
  - marker: b
    text: Or 'said to Abraham, saying'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - at that time period
  - at that season
  lexicon: HALOT
  rationale: Standard temporal expression; 'at that time' is the natural modern equivalent.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common verb of speech. Although singular in form with a compound subject following, English idiom uses plural agreement with the explicit compound subject in translation.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: וּפִיכֹל
  chosen: and Phicol
  alternatives:
  - and Pikol
  rationale: Personal name transliterated by standard English convention.
- source_word: שַׂר צְבָאוֹ
  chosen: the commander of his army
  alternatives:
  - the chief of his army
  - the captain of his host
  lexicon: HALOT
  rationale: שַׂר denotes a ruler/official/commander, and צָבָא here refers to military force. 'Commander of his army' is clear modern English and fits the military context.
- source_word: אֶל אַבְרָהָם
  chosen: to Abraham
  alternatives:
  - unto Abraham
  lexicon: HALOT
  rationale: Directional preposition introducing the addressee of speech; 'to Abraham' is idiomatic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Infinitive of אמר introducing direct discourse. Retained as 'saying' to reflect the Hebrew structure, though English could omit it.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god/gods
  lexicon: HALOT
  rationale: In this context the speaker refers to the deity recognized as accompanying Abraham. Singular 'God' best reflects the sense in context, despite the morphologically plural form.
- source_word: עִמְּךָ
  chosen: is with you
  alternatives:
  - is alongside you
  lexicon: HALOT
  rationale: עם with pronominal suffix expresses presence/support. 'Is with you' is the standard and natural rendering.
- source_word: בְּכֹל אֲשֶׁר אַתָּה עֹשֶׂה
  chosen: in all that you do
  alternatives:
  - in everything that you are doing
  - with all that you do
  lexicon: HALOT
  rationale: 'בְּכֹל plus relative clause expresses comprehensive scope. The participle עֹשֶׂה can be rendered as a general present in English: ''all that you do.'''
