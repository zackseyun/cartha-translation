id: GEN.44.2
reference: Genesis 44:2
source:
  edition: WLC
  text: וְ/אֶת גְּבִיעִ֞/י גְּבִ֣יעַ הַ/כֶּ֗סֶף תָּשִׂים֙ בְּ/פִי֙ אַמְתַּ֣חַת הַ/קָּטֹ֔ן
    וְ/אֵ֖ת כֶּ֣סֶף שִׁבְר֑/וֹ וַ/יַּ֕עַשׂ כִּ/דְבַ֥ר יוֹסֵ֖ף אֲשֶׁ֥ר דִּבֵּֽר־׃
translation:
  text: And put my cup, the silver cup, in the mouth of the youngest one's sack, along
    with the silver for his grain purchase." And he did according to the word of Joseph,
    which he had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in the mouth of the sack,' an idiom for the sack's opening.
    reason: cultural_note
  - marker: b
    text: Or 'the money for his grain'; the Hebrew expression refers to silver paid
      for grain/provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבִיעִי גְּבִיעַ הַכֶּסֶף
  chosen: my cup, the silver cup
  alternatives:
  - my goblet, the silver goblet
  - my chalice, the silver cup
  lexicon: HALOT
  rationale: גְּבִיעַ denotes a cup/goblet. 'Cup' is the most natural modern English
    rendering; the appositional repetition is preserved as 'my cup, the silver cup'
    to reflect the Hebrew emphasis rather than collapsing it.
- source_word: תָּשִׂים
  chosen: put
  alternatives:
  - place
  - set
  lexicon: HALOT
  rationale: Common verb שׂים meaning 'put/place/set.' 'Put' is idiomatic and sufficiently
    direct in English.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - at the opening of
  - in the opening of
  lexicon: HALOT
  rationale: Hebrew 'mouth' is an idiom for the opening of a container. Retaining
    'mouth' preserves the concrete Hebrew imagery and remains understandable in English.
- source_word: אַמְתַּחַת
  chosen: sack
  alternatives:
  - bag
  lexicon: HALOT
  rationale: Refers to a grain sack/bag used for transport. 'Sack' fits the narrative
    setting slightly better than the more generic 'bag'.
- source_word: הַקָּטֹן
  chosen: the youngest one
  alternatives:
  - the youngest
  - the younger one
  lexicon: HALOT
  rationale: Literally 'the small/young one'; in context it refers to the youngest
    brother. 'The youngest one' is explicit and natural without importing a noun absent
    in Hebrew.
- source_word: כֶּסֶף שִׁבְרוֹ
  chosen: the silver for his grain purchase
  alternatives:
  - the money for his grain
  - the silver for the grain he bought
  lexicon: HALOT
  rationale: שֶׁבֶר/שִׁבְרוֹ in Genesis famine narratives refers to grain bought/provisions
    obtained. Since כֶּסֶף is specifically silver/money, 'the silver for his grain
    purchase' preserves both the material term and the commercial sense.
- source_word: וַיַּעַשׂ כִּדְבַר
  chosen: And he did according to the word of
  alternatives:
  - And he did according to the command of
  - And he did as ... said
  lexicon: HALOT
  rationale: Formal narrative wording. 'According to the word of' closely follows
    the Hebrew while remaining readable; 'command' would be interpretive.
- source_word: אֲשֶׁר דִּבֵּר
  chosen: which he had spoken
  alternatives:
  - that he had spoken
  - which he spoke
  lexicon: HALOT
  rationale: The relative clause refers back to Joseph's word/instruction. English
    past perfect ('had spoken') clarifies sequence in the narrative.
