id: GEN.44.17
reference: Genesis 44:17
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר חָלִ֣ילָ/ה לִּ֔/י מֵ/עֲשׂ֖וֹת זֹ֑את הָ/אִ֡ישׁ אֲשֶׁר֩ נִמְצָ֨א
    הַ/גָּבִ֜יעַ בְּ/יָד֗/וֹ ה֚וּא יִהְיֶה לִּ֣/י עָ֔בֶד וְ/אַתֶּ֕ם עֲל֥וּ לְ/שָׁל֖וֹם
    אֶל אֲבִי/כֶֽם־־׃פ
translation:
  text: But he said, "Far be it from me to do this. The man in whose hand the cup
    was found—he shall be my slave, but you may go up in peace to your father."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The man with whom the cup was found.' The Hebrew literally says, 'in
      whose hand the cup was found.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he shall be my servant.' The Hebrew עָבֶד can denote either a servant
      or a slave; here 'slave' is chosen because the context is punitive bondage.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לִּי
  chosen: Far be it from me
  alternatives:
  - It would be unthinkable for me
  - Profane be it for me
  lexicon: HALOT
  rationale: Idiomatic expression of strong refusal or abhorrence. 'Far be it from
    me' is a natural English equivalent that preserves the force without archaic obscurity.
- source_word: מֵעֲשׂוֹת זֹאת
  chosen: to do this
  alternatives:
  - from doing this
  lexicon: HALOT
  rationale: Infinitive construct with preposition expresses the action refused. English
    infinitive reads naturally after the idiom.
- source_word: הָאִישׁ אֲשֶׁר נִמְצָא הַגָּבִיעַ בְּיָדוֹ
  chosen: The man in whose hand the cup was found
  alternatives:
  - The man with whom the cup was found
  - The man in whose possession the cup was found
  lexicon: HALOT
  rationale: Retains the concrete Hebrew image 'in his hand' while expressing it in
    idiomatic English. 'Cup' is the plain sense of גָּבִיעַ in this narrative.
- source_word: הוּא יִהְיֶה לִּי עָבֶד
  chosen: he shall be my slave
  alternatives:
  - he shall be my servant
  lexicon: HALOT
  rationale: עָבֶד can mean servant or slave depending on context. Here Joseph is
    imposing penal bondage on the one found with the cup, so the bonded nature is
    salient; 'slave' best reflects the force in line with project guidance on bonded
    service terms.
- source_word: וְאַתֶּם עֲלוּ
  chosen: but you may go up
  alternatives:
  - and you, go up
  - while you go up
  lexicon: HALOT
  rationale: Imperative plural addressed to the brothers. 'May go up' conveys permission/release
    in context, while 'but' captures the contrast with the punished individual.
- source_word: לְשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - safe and sound
  lexicon: HALOT
  rationale: Common idiom for departing safely and without conflict. 'In peace' is
    concise and faithful.
- source_word: אֶל אֲבִיכֶם
  chosen: to your father
  alternatives:
  - to your own father
  lexicon: HALOT
  rationale: Direct and natural rendering of the destination phrase.
