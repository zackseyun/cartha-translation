theological_decisions:
- issue: Rendering of שְׁאֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term denotes more than a burial place and is best preserved
    by transliteration in the main text, with explanatory alternatives footnoted.
    This preserves the Old Testament conceptual world without importing later doctrinal
    precision.
  doctrine_reference: Translation philosophy §1, §3
