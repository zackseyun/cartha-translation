id: GEN.44.27
reference: Genesis 44:27
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר עַבְדְּ/ךָ֥ אָבִ֖/י אֵלֵ֑י/נוּ אַתֶּ֣ם יְדַעְתֶּ֔ם כִּ֥י שְׁנַ֖יִם
    יָֽלְדָה לִּ֥/י אִשְׁתִּֽ/י־׃
translation:
  text: Then your servant, my father, said to us, ‘You know that my wife bore me two
    sons.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my wife bore me two.'' The word ''sons'' is implied by the context
      and made explicit in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential sense of the Hebrew better
    than a bare 'said.'
- source_word: עַבְדְּךָ אָבִי
  chosen: your servant, my father
  alternatives:
  - my father, your servant
  lexicon: HALOT
  rationale: Judah addresses Joseph deferentially as 'your servant' while identifying
    the referent as 'my father.' The appositional English phrase preserves both the
    honorific posture and the familial identification without adding words not in
    the text.
- source_word: אֵלֵינוּ
  chosen: to us
  alternatives:
  - to our ears
  lexicon: HALOT
  rationale: Standard preposition plus pronominal suffix meaning 'to us.' No idiomatic
    expansion is needed.
- source_word: אַתֶּם יְדַעְתֶּם
  chosen: You know
  alternatives:
  - You yourselves know
  - You knew
  lexicon: HALOT
  rationale: 'Second person masculine plural pronoun plus perfect verb is emphatic:
    ''you know.'' Present English is appropriate here because the statement expresses
    knowledge still relevant in the quoted speech. The explicit pronoun is retained
    in English for emphasis.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is known, so 'that' is the most
    straightforward rendering.
- source_word: שְׁנַיִם
  chosen: two sons
  alternatives:
  - two
  lexicon: HALOT
  rationale: 'The Hebrew says simply ''two,'' but in English the object is naturally
    supplied from context: Rachel bore Jacob two children/sons, namely Joseph and
    Benjamin. ''Sons'' makes the sense explicit without altering the meaning.'
- source_word: יָלְדָה לִּי
  chosen: bore me
  alternatives:
  - gave birth to for me
  - has borne me
  lexicon: HALOT
  rationale: Idiomatic English for ילד with indirect object suffix. 'Bore me' is concise
    and faithful.
- source_word: אִשְׁתִּי
  chosen: my wife
  alternatives:
  - my woman
  lexicon: HALOT
  rationale: In this context אִשָּׁה with first person suffix clearly means 'my wife.'
