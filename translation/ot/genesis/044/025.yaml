id: GEN.44.25
reference: Genesis 44:25
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אָבִ֑י/נוּ שֻׁ֖בוּ שִׁבְרוּ לָ֥/נוּ מְעַט אֹֽכֶל־־׃
translation:
  text: Then our father said, ‘Go back; buy us a little food.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'return; buy us a little grain.' The Hebrew uses a general word for 'food,'
      though the broader context concerns grain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare 'and said.'
- source_word: אָבִינוּ
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: HALOT
  rationale: In context this refers specifically to Jacob as the brothers' immediate
    father, so 'our father' is the plain and accurate rendering.
- source_word: שֻׁבוּ
  chosen: Go back
  alternatives:
  - return
  - go again
  lexicon: HALOT
  rationale: The imperative of שוב here directs the brothers to make the trip again.
    'Go back' is idiomatic English in direct speech and captures the directional sense.
- source_word: שִׁבְרוּ
  chosen: buy
  alternatives:
  - buy grain
  - purchase
  lexicon: HALOT
  rationale: The verb שבר in the Joseph narrative commonly means buying grain/food.
    Since אֹכֶל follows explicitly, 'buy' is sufficient in the main text without over-specifying
    'grain,' though that nuance is contextually present.
- source_word: לָנוּ
  chosen: us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: English idiom prefers 'buy us' here, which naturally conveys the benefactive
    sense of the preposition.
- source_word: מְעַט
  chosen: a little
  alternatives:
  - a small amount of
  - some
  lexicon: HALOT
  rationale: מְעַט denotes a small quantity. 'A little' is concise and natural, preserving
    the modest quantity requested.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - provisions
  - grain
  lexicon: HALOT
  rationale: אֹכֶל is the general term 'food.' Although the narrative setting involves
    grain, the Hebrew here is broader, so 'food' best matches the source text without
    narrowing it.
