id: GEN.44.7
reference: Genesis 44:7
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֔י/ו לָ֚/מָּה יְדַבֵּ֣ר אֲדֹנִ֔/י כַּ/דְּבָרִ֖ים הָ/אֵ֑לֶּה
    חָלִ֨ילָ/ה֙ לַ/עֲבָדֶ֔י/ךָ מֵ/עֲשׂ֖וֹת כַּ/דָּבָ֥ר הַ/זֶּֽה׃
translation:
  text: And they said to him, “Why does my lord speak words like these? Far be it
    from your servants to do such a thing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “such words.”
    reason: lexical_alternative
  - marker: b
    text: Or “my master” for the respectful address “my lord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - And they replied
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the brothers’ direct response in narrative
    sequence. 'And they said' is a clear, natural rendering that preserves the simple
    narrative progression without adding nuance not explicit in the Hebrew.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Straightforward preposition + pronominal suffix referring to Joseph's
    steward. No reason to expand or specify beyond the Hebrew.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative preserved plainly.
- source_word: יְדַבֵּר
  chosen: does ... speak
  alternatives:
  - is ... speaking
  - would ... speak
  lexicon: HALOT
  rationale: Imperfect of דבר in this question is best rendered as present English
    'does ... speak' in context. This gives idiomatic English while preserving the
    force of the accusation/question.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In this Joseph narrative context, אֲדֹנִי is a respectful human address,
    not a divine title. 'My lord' preserves the deferential register and matches the
    singular suffix 'my.' 'My master' is possible but sounds more interpretive here.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: words like these
  alternatives:
  - such words
  - these things
  lexicon: HALOT
  rationale: Literally 'according to these words/like these words.' English idiom
    prefers 'words like these,' which preserves the verbal nature of the accusation
    better than the broader 'these things.'
- source_word: חָלִילָה
  chosen: Far be it
  alternatives:
  - Profane thing!
  - Heaven forbid
  lexicon: HALOT
  rationale: This interjection expresses strong repudiation. 'Far be it' is a standard,
    accurate English equivalent that preserves the solemn denial without importing
    the more colloquial or interpretive 'Heaven forbid.'
- source_word: לַעֲבָדֶיךָ
  chosen: from your servants
  alternatives:
  - for your servants
  - to your servants
  lexicon: HALOT
  rationale: With חָלִילָה, the lamed phrase marks the persons from whom such an act
    would be unthinkable. English idiom expresses this as 'Far be it from your servants.'
    Although עבד can mean servant/slave, here it is a courtly self-designation of
    subordinates, so 'servants' fits best.
- source_word: מֵעֲשׂוֹת
  chosen: to do
  alternatives:
  - from doing
  lexicon: HALOT
  rationale: Following 'Far be it from your servants,' English idiom naturally completes
    the sense with an infinitive, 'to do.' This slightly smooths the Hebrew prepositional
    infinitive while preserving meaning.
- source_word: כַּדָּבָר הַזֶּה
  chosen: such a thing
  alternatives:
  - this thing
  - a thing like this
  lexicon: HALOT
  rationale: The phrase refers back to the alleged act. 'Such a thing' is idiomatic
    and captures the demonstrative force without wooden repetition.
