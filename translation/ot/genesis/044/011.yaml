  category: awkward_english
  tier: 1
  from: So they hurried, and each man lowered
  to: So each man hurried and lowered
  rationale: The current rendering creates an awkward grammatical shift in the subject, from the plural 'they' in the first clause to the singular 'each man' in the second. While the Hebrew verbs are plural, the distributive noun 'אִישׁ' (each man) clarifies that the action was performed individually. Applying this distributive sense to the first action ('hurried') as well is a reasonable contextual inference that makes the English sentence grammatically parallel and smoother ('each man hurried... and each man opened...'), better reflecting the coordinated nature of the Hebrew verbs.
