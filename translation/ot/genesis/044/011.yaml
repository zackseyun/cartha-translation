id: GEN.44.11
reference: Genesis 44:11
source:
  edition: WLC
  text: וַֽ/יְמַהֲר֗וּ וַ/יּוֹרִ֛דוּ אִ֥ישׁ אֶת אַמְתַּחְתּ֖/וֹ אָ֑רְצָ/ה וַֽ/יִּפְתְּח֖וּ
    אִ֥ישׁ אַמְתַּחְתּֽ/וֹ־׃
translation:
  text: So they hurried, and each man lowered his sack to the ground, and each man
    opened his sack.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'each man' before both actions, emphasizing that every individual
      brother lowered and opened his own sack.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֲרוּ
  chosen: they hurried
  alternatives:
  - they quickly
  - they made haste
  lexicon: HALOT
  rationale: From מהר, indicating prompt action. 'They hurried' is natural modern
    English and preserves the narrative immediacy without archaic phrasing like 'made
    haste.'
- source_word: וַיּוֹרִדוּ
  chosen: lowered
  alternatives:
  - brought down
  - set down
  lexicon: HALOT
  rationale: From ירד in the Hiphil, causative sense 'cause to go down.' In context
    of sacks from animals to the ground, 'lowered' best captures the physical action
    more precisely than the broader 'brought down.'
- source_word: אִישׁ ... אַמְתַּחְתּוֹ
  chosen: each man ... his sack
  alternatives:
  - each one ... his bag
  - each man ... his bag
  lexicon: HALOT
  rationale: The distributive use of אִישׁ is best represented by 'each man.' This
    preserves the Hebrew's repeated individualizing structure. 'Sack' fits the transport/storage
    context slightly better than the more generic 'bag.'
- source_word: אַמְתַּחַת
  chosen: sack
  alternatives:
  - bag
  - packsack
  lexicon: HALOT
  rationale: The noun refers to a container for grain or provisions. 'Sack' is idiomatic
    in the Joseph narrative and suits the ancient setting without becoming overly
    technical.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  - down to the ground
  lexicon: HALOT
  rationale: The directional form of אֶרֶץ here indicates movement downward to the
    ground. 'To the ground' is the most natural contextual rendering in English.
- source_word: וַיִּפְתְּחוּ
  chosen: opened
  alternatives:
  - unfastened
  - opened up
  lexicon: HALOT
  rationale: From פתח, straightforwardly 'open.' No expansion is needed; 'opened'
    is clear and sufficiently literal.
