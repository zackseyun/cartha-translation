  from: came into Joseph’s house, and he was still there, and they fell
  to: came into Joseph’s house. He was still there, and they fell
  rationale: The Hebrew clause 'וְהוּא עוֹדֶנּוּ שָׁם' (and he was still there) is a circumstantial clause, setting the scene for the action that follows. The current English rendering, using 'and... and...', connects the three clauses in a simple sequence, which can feel like a run-on sentence and slightly obscure the logical relationship. Splitting the sentence makes it clearer that Joseph's presence is the context for the brothers' prostration, improving the narrative flow and clarity without sacrificing fidelity to the source.
