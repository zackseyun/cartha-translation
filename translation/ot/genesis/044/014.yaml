id: GEN.44.14
reference: Genesis 44:14
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יְהוּדָ֤ה וְ/אֶחָי/ו֙ בֵּ֣יתָ/ה יוֹסֵ֔ף וְ/ה֖וּא עוֹדֶ֣/נּוּ שָׁ֑ם וַ/יִּפְּל֥וּ לְ/פָנָ֖י/ו אָֽרְצָ/ה׃
translation:
  text: Then Judah and his brothers came into Joseph’s house. He was still there, and they fell to the ground before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they prostrated themselves before him on the ground.'
    reason: lexical_alternative
  - marker: b
    text: Or 'came into Joseph’s house, and he was still there, and they fell'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol advances the narrative with a simple past sense. 'Came' fits the deictic perspective of the scene and is idiomatic in English narrative.
- source_word: יְהוּדָה וְאֶחָיו
  chosen: Judah and his brothers
  alternatives:
  - Judah and his brothers together
  - Judah with his brothers
  lexicon: HALOT
  rationale: This preserves the explicit naming of Judah as spokesman/lead figure while retaining the familial term אֶחָיו as 'his brothers.'
- source_word: בֵּיתָה יוֹסֵף
  chosen: into Joseph’s house
  alternatives:
  - to Joseph’s house
  - Joseph’s houseward
  lexicon: HALOT
  rationale: The directional ending on בֵּיתָה indicates motion toward/into the house. In English, 'into Joseph’s house' best captures the movement naturally.
- source_word: וְהוּא עוֹדֶנּוּ שָׁם
  chosen: and he was still there
  alternatives:
  - and he was yet there
  - and he was still there at that time
  lexicon: HALOT
  rationale: עוֹדֶנּוּ conveys continuance ('still, yet') with the pronominal suffix intensifying the state. 'He was still there' is the most natural modern rendering.
- source_word: וַיִּפְּלוּ
  chosen: they fell
  alternatives:
  - they threw themselves down
  - they prostrated themselves
  lexicon: HALOT
  rationale: The basic verb is 'fell.' Because the following phrase 'to the ground before him' already conveys the posture of obeisance, the simpler verb avoids overtranslation while preserving the action.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: The idiom literally means 'before his face,' but 'before him' is the standard natural English equivalent.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: The directional form indicates movement downward to the ground. 'To the ground' is idiomatic and preserves the physicality of the gesture.
