id: GEN.44.19
reference: Genesis 44:19
source:
  edition: WLC
  text: אֲדֹנִ֣/י שָׁאַ֔ל אֶת עֲבָדָ֖י/ו לֵ/אמֹ֑ר הֲ/יֵשׁ לָ/כֶ֥ם אָ֖ב אוֹ אָֽח־־־׃
translation:
  text: My lord asked his servants, saying, ‘Do you have a father or a brother?’
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: My lord
  alternatives:
  - My master
  - Sir
  lexicon: HALOT
  rationale: אָדוֹן with 1cs suffix is a respectful address to the Egyptian ruler.
    'My lord' preserves the deferential court speech and matches the singular addressee
    in context better than the more colloquial 'sir.'
- source_word: שָׁאַל
  chosen: asked
  alternatives:
  - inquired of
  - questioned
  lexicon: HALOT
  rationale: The verb denotes asking or inquiring. 'Asked' is the most natural modern
    English equivalent and fits the direct-question context.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, here the brothers speak deferentially
    of themselves before a ruler. 'Servants' reflects the conventional self-designation
    in court speech without overstating chattel status in this immediate context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct introduces the content of speech. 'Saying' is
    a standard and transparent rendering.
- source_word: הֲיֵשׁ לָכֶם
  chosen: Do you have
  alternatives:
  - Is there for you
  - Have you
  lexicon: HALOT
  rationale: The interrogative particle plus יֵשׁ with ל expresses possession/existence.
    'Do you have' is idiomatic English and accurately conveys the sense.
- source_word: אָב
  chosen: a father
  alternatives:
  - father
  lexicon: HALOT
  rationale: The noun is indefinite in English in this question. 'A father' sounds
    natural and reflects the inquiry about whether such a family member exists.
- source_word: אָח
  chosen: a brother
  alternatives:
  - brother
  lexicon: HALOT
  rationale: Likewise indefinite and parallel to 'a father.' The singular is preserved
    because the Hebrew asks about the existence of a brother, not brothers generally.
