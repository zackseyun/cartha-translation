id: GEN.44.6
reference: Genesis 44:6
source:
  edition: WLC
  text: וַֽ/יַּשִּׂגֵ֑/ם וַ/יְדַבֵּ֣ר אֲלֵ/הֶ֔ם אֶת הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־׃
translation:
  text: 'He caught up with them and spoke these words to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He overtook them and said to them these words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשִּׂגֵם
  chosen: He caught up with them
  alternatives:
  - He overtook them
  - He reached them
  lexicon: HALOT
  rationale: From נשׂג in the Hifil/wayyiqtol with 3mp suffix, the sense is that Joseph's
    steward came up to the brothers after them on the road. 'Caught up with' is natural
    modern English and fits the pursuit context better than the slightly stiffer 'overtook,'
    while preserving the basic motion/event.
- source_word: וַיְדַבֵּר
  chosen: and spoke
  alternatives:
  - and said
  lexicon: HALOT
  rationale: דבר commonly means 'to speak.' Since the direct object 'these words'
    follows, 'spoke' preserves the Hebrew collocation more closely than simply 'said.'
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward the brothers; 'to them' is
    the most straightforward rendering in this speech-introduction formula.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these statements
  lexicon: HALOT
  rationale: Literally 'these words.' In context it introduces the exact speech that
    follows. 'These words' is slightly more formal than 'these things' and better
    reflects the Hebrew wording without sounding unnatural.
