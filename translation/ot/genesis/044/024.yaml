id: GEN.44.24
reference: Genesis 44:24
source:
  edition: WLC
  text: וַ/יְהִי֙ כִּ֣י עָלִ֔ינוּ אֶֽל עַבְדְּ/ךָ֖ אָבִ֑/י וַ/נַּ֨גֶּד ל֔/וֹ אֵ֖ת
    דִּבְרֵ֥י אֲדֹנִֽ/י־־׃
translation:
  text: And when we went up to your servant my father, we told him the words of my
    lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my father, your servant.' The Hebrew order is 'to your servant, my father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: And when
  alternatives:
  - Now when
  - And it happened that when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. In English, 'And
    when' preserves the sequential force without the wooden 'and it happened,' which
    is often stylistically unnatural.
- source_word: עָלִינוּ
  chosen: we went up
  alternatives:
  - we came up
  - we returned
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Here it refers to traveling back up
    to Canaan from Egypt. 'Went up' preserves the Hebrew idiom and geographic perspective
    better than the more generic 'returned.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural English equivalent
    in this context.
- source_word: עַבְדְּךָ אָבִי
  chosen: your servant my father
  alternatives:
  - my father, your servant
  lexicon: HALOT
  rationale: Judah speaks deferentially to Joseph, referring to Jacob as 'your servant.'
    The chosen order follows the Hebrew closely while remaining intelligible in English.
    The alternative is smoother in English but less formally aligned with the source
    order.
- source_word: וַנַּגֶּד
  chosen: we told
  alternatives:
  - we reported
  - we declared
  lexicon: HALOT
  rationale: נגד in the Hiphil means to make known, tell, or report. 'Told' is the
    most natural modern English rendering here; 'reported' is possible but slightly
    more formal than the context requires.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: English idiom prefers the indirect object 'told him' rather than the
    more literal 'told to him.'
- source_word: אֵת דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - what ... said
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' 'The words of' preserves the formal
    link to the prior speech, while 'message' would be slightly more interpretive.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - you
  lexicon: HALOT
  rationale: In this narrative setting, אֲדֹנִי is a respectful human address/title,
    not the divine name. 'My lord' best preserves the deferential tone. 'My master'
    is possible but can imply ownership more strongly than the context requires; 'you'
    would lose the explicit title present in the Hebrew.
