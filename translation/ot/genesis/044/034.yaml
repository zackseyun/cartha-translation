id: GEN.44.34
reference: Genesis 44:34
source:
  edition: WLC
  text: כִּי אֵיךְ֙ אֶֽעֱלֶ֣ה אֶל אָבִ֔/י וְ/הַ/נַּ֖עַר אֵינֶ֣/נּוּ אִתִּ֑/י פֶּ֚ן
    אֶרְאֶ֣ה בָ/רָ֔ע אֲשֶׁ֥ר יִמְצָ֖א אֶת אָבִֽ/י־־־׃
translation:
  text: For how can I go up to my father if the boy is not with me? Otherwise, I would
    have to see the disaster that would come upon my father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest I see the harm/calamity that would befall my father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces Judah's explanation and grounds his plea in the preceding
    context. 'For' fits the discourse connection naturally in English.
- source_word: אֵיךְ
  chosen: how
  alternatives:
  - how could
  lexicon: HALOT
  rationale: Interrogative adverb expressing manner/impossibility. In context it conveys
    rhetorical impossibility; this force is carried by the full clause 'how can I
    go up...' rather than by overtranslating the adverb itself.
- source_word: אֶעֱלֶה
  chosen: can I go up
  alternatives:
  - shall I go up
  - could I go up
  lexicon: HALOT
  rationale: Literal verb is 'go up,' appropriate for travel back to Canaan/father.
    English adds 'can' to reflect the rhetorical impossibility implied by אֵיךְ in
    idiomatic modern English.
- source_word: אֶל אָבִי
  chosen: to my father
  alternatives:
  - to my father Jacob
  lexicon: HALOT
  rationale: Direct and literal; no need to supply the proper name since the relationship
    is explicit in the Hebrew.
- source_word: וְהַנַּעַר
  chosen: if the boy
  alternatives:
  - while the boy
  - and the boy
  lexicon: HALOT
  rationale: 'With the following nominal clause, the conjunction is best represented
    in English as part of a conditional sense: ''if the boy is not with me.'' ''Boy''
    preserves the Hebrew נער, which highlights Benjamin''s youth/status in the family
    perspective.'
- source_word: אֵינֶנּוּ אִתִּי
  chosen: is not with me
  alternatives:
  - is not beside me
  - is absent from me
  lexicon: HALOT
  rationale: Straightforward rendering of the negative existential plus prepositional
    phrase.
- source_word: פֶּן
  chosen: Otherwise
  alternatives:
  - lest
  - for fear that
  lexicon: HALOT
  rationale: פֶּן introduces what Judah fears would happen. 'Otherwise' gives natural
    modern English while preserving the warning/undesirable-result sense. 'Lest' is
    more formal but less readable.
- source_word: אֶרְאֶה
  chosen: I would have to see
  alternatives:
  - I see
  - I should see
  - I might see
  lexicon: HALOT
  rationale: The imperfect after פֶּן expresses feared eventuality. 'I would have
    to see' captures the sense of being forced to witness the outcome if he returns
    without Benjamin.
- source_word: בָרָע
  chosen: the disaster
  alternatives:
  - the evil
  - the harm
  - the calamity
  lexicon: HALOT
  rationale: רָע here refers not to moral evil but to grievous harm/calamity befalling
    Jacob. 'Disaster' communicates the concrete tragic outcome in idiomatic English.
- source_word: אֲשֶׁר יִמְצָא
  chosen: that would come upon
  alternatives:
  - that would find
  - that would befall
  lexicon: HALOT
  rationale: Hebrew 'find' is idiomatic for something overtaking or befalling someone.
    'Come upon' is natural English and preserves the sense without wooden literalism.
- source_word: אֶת אָבִי
  chosen: my father
  alternatives:
  - my father Jacob
  lexicon: HALOT
  rationale: Literal and sufficient in context.
