theological_decisions:
- issue: Rendering of שְׁאֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term carries a broader semantic range than mere burial place.
    Transliteration avoids importing a narrower doctrinal or cosmological interpretation
    while preserving the text's ancient conceptual world.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
