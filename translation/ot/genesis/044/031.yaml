id: GEN.44.31
reference: Genesis 44:31
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּ/רְאוֹת֛/וֹ כִּי אֵ֥ין הַ/נַּ֖עַר וָ/מֵ֑ת וְ/הוֹרִ֨ידוּ עֲבָדֶ֜י/ךָ
    אֶת שֵׂיבַ֨ת עַבְדְּ/ךָ֥ אָבִ֛י/נוּ בְּ/יָג֖וֹן שְׁאֹֽלָ/ה־־׃
translation:
  text: then, when he sees that the boy is not there, he will die, and your servants
    will bring down the gray hair of your servant our father to Sheol in sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the grave' or 'to the realm of the dead.' Hebrew 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: then
  alternatives:
  - and it will happen
  - and it will be
  lexicon: HALOT
  rationale: Introduces the result/apodosis of the preceding condition. In English,
    a simple discourse connector like 'then' best captures the function without woodenly
    reproducing the Hebrew idiom 'and it will happen.'
- source_word: כִּרְאֹתוֹ
  chosen: when he sees
  alternatives:
  - at his seeing
  - as soon as he sees
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed כ and 3ms suffix expresses temporal
    circumstance: ''when he sees him/it.'' Here the object is supplied by the following
    clause, so ''when he sees'' is natural English.'
- source_word: כִּי אֵין הַנַּעַר
  chosen: that the boy is not there
  alternatives:
  - that the boy is absent
  - that the boy is gone
  lexicon: HALOT
  rationale: אֵין marks nonexistence/presence in context. Since Benjamin is expected
    to return with the brothers, 'is not there' clearly conveys the father's perception
    on their arrival. 'Gone' could imply death, which the clause does not itself state.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the lad
  lexicon: HALOT
  rationale: נַעַר can denote a youth or young man, but in this emotionally charged
    family context 'the boy' reflects both the Hebrew term and Judah's perspective
    toward Benjamin.
- source_word: וָמֵת
  chosen: he will die
  alternatives:
  - then he will die
  - he will be dead
  lexicon: HALOT
  rationale: 'The qatal with prefixed waw here continues the result sequence after
    the temporal clause. Future sense is appropriate in context: Jacob will die upon
    seeing Benjamin absent.'
- source_word: וְהוֹרִידוּ
  chosen: will bring down
  alternatives:
  - will cause to go down
  - will bring
  lexicon: HALOT
  rationale: The Hiphil of ירד is the standard idiom in this context for causing someone/something
    to go down to Sheol. 'Bring down' preserves the idiomatic and metaphorical force.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Though עֶבֶד can denote slave or servant, in courtly self-reference before
    a ruler 'your servants' is the natural English equivalent and reflects deferential
    speech rather than emphasizing bonded status.
- source_word: שֵׂיבַת
  chosen: the gray hair
  alternatives:
  - the gray-headedness
  - the old age
  lexicon: HALOT
  rationale: This noun refers literally to gray hair and by extension old age. The
    idiom 'bring down the gray hair ... to Sheol' is well established in Genesis;
    retaining 'gray hair' preserves the concrete Hebrew imagery.
- source_word: עַבְדְּךָ אָבִינוּ
  chosen: of your servant our father
  alternatives:
  - of your servant, our father
  lexicon: HALOT
  rationale: Judah refers to Jacob as both 'your servant' and 'our father.' The appositional
    phrase is preserved directly. A comma is stylistic, not necessary for sense.
- source_word: בְּיָגוֹן
  chosen: in sorrow
  alternatives:
  - with grief
  - in grief
  lexicon: HALOT
  rationale: יָגוֹן denotes grief/sorrow. 'In sorrow' fits the Hebrew preposition
    and reads naturally in the established idiom.
- source_word: שְׁאֹלָה
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: HALOT
  rationale: Per source-language primacy, שְׁאוֹל is best retained as 'Sheol' rather
    than flattened to 'grave.' The term can denote the underworld/realm of the dead,
    and transliteration preserves that semantic range. A footnote preserves the more
    interpretive alternatives.
