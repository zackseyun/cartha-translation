theological_decisions:
- issue: Rendering of עבד in two occurrences within the verse
  chosen_reading: '''servants'' in ''among your servants'' and ''slaves'' in ''we
    also will become slaves'''
  alternative_readings:
  - '''slaves'' in both occurrences'
  - '''servants'' in both occurrences'
  - '''bondservants'' in the second occurrence'
  rationale: The same Hebrew root appears twice, but context differs. In the first
    instance the brothers use deferential self-reference before a ruler, where English
    'servants' is idiomatic and does not foreground legal status. In the second, they
    propose punitive enslavement, where the bonded nature is central, so 'slaves'
    best matches the translation philosophy's guidance on עבד/δοῦλος-type terms.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5; Contested terms table
    on δοῦλος/servant-slave context dependence
