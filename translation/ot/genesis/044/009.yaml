id: GEN.44.9
reference: Genesis 44:9
source:
  edition: WLC
  text: אֲשֶׁ֨ר יִמָּצֵ֥א אִתּ֛/וֹ מֵ/עֲבָדֶ֖י/ךָ וָ/מֵ֑ת וְ/גַם אֲנַ֕חְנוּ נִֽהְיֶ֥ה
    לַֽ/אדֹנִ֖/י לַ/עֲבָדִֽים־׃
translation:
  text: Whichever of your servants it is found with, let him die, and we also will
    become slaves to my lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'among your servants' uses the same root as 'slaves' later in the
      verse. The first occurrence is rendered 'servants' for courtly self-reference;
      the second 'slaves' because actual bondage is in view.
    reason: lexical_alternative
  - marker: b
    text: Or 'Whoever it is found with among your servants'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whoever
  alternatives:
  - he who
  - the one who
  lexicon: HALOT
  rationale: Introduces an indefinite relative clause. 'Whoever' is idiomatic modern
    English and captures the open reference better than the more wooden 'he who.'
- source_word: יִמָּצֵא
  chosen: it is found
  alternatives:
  - is found
  - may be found
  lexicon: HALOT
  rationale: Nifal of מצא is passive/reflexive in sense here. Including 'it' in English
    makes clear that the object under discussion (the cup from the prior context)
    is what is found.
- source_word: אִתּוֹ
  chosen: with
  alternatives:
  - in the possession of
  - 'on'
  lexicon: HALOT
  rationale: The preposition indicates possession/location with a person. 'With' is
    the most natural concise rendering; 'in the possession of' is more explicit but
    too heavy for the line.
- source_word: מֵעֲבָדֶיךָ
  chosen: among your servants
  alternatives:
  - from your servants
  - among your slaves
  lexicon: HALOT
  rationale: 'The מן here is partitive: one from the group of Joseph''s servants/addressees.
    ''Among your servants'' communicates the group sense naturally. ''Servants'' is
    preferable here because the brothers are speaking deferentially of themselves
    in courtly address, and the bonded nuance is not the main point in this phrase.'
- source_word: וָמֵת
  chosen: let him die
  alternatives:
  - he shall die
  - and he dies
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction functions here as a volitive/jussive-like
    consequence in the brothers' oath-like proposal. 'Let him die' best reflects the
    force in idiomatic English.
- source_word: וְגַם
  chosen: and we also
  alternatives:
  - and also we
  - moreover we
  lexicon: HALOT
  rationale: Adds an emphatic further consequence beyond the death penalty for the
    guilty party. 'And we also' preserves the additive emphasis in natural English.
- source_word: נִהְיֶה
  chosen: will become
  alternatives:
  - shall be
  - will be
  lexicon: HALOT
  rationale: The verb היה here points to entering a state as the result of the proposed
    penalty. 'Will become' makes that prospective force clearer than the flatter 'will
    be.'
- source_word: לַאדֹנִי
  chosen: to my lord
  alternatives:
  - for my lord
  - to my master
  lexicon: HALOT
  rationale: 'The brothers speak from their own perspective, hence the 1cs suffix:
    ''my lord.'' This is a respectful human title, not a divine title. ''Lord'' fits
    courtly address in Genesis.'
- source_word: לַעֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: 'Here the bonded status is explicitly salient: they offer themselves
    into servitude as penalty. Per translation philosophy, ''slave'' is preferred
    where the bonded nature is central.'
