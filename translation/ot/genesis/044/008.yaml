id: GEN.44.8
reference: Genesis 44:8
source:
  edition: WLC
  text: הֵ֣ן כֶּ֗סֶף אֲשֶׁ֤ר מָצָ֨אנוּ֙ בְּ/פִ֣י אַמְתְּחֹתֵ֔י/נוּ הֱשִׁיבֹ֥נוּ אֵלֶ֖י/ךָ
    מֵ/אֶ֣רֶץ כְּנָ֑עַן וְ/אֵ֗יךְ נִגְנֹב֙ מִ/בֵּ֣ית אֲדֹנֶ֔י/ךָ כֶּ֖סֶף א֥וֹ זָהָֽב׃
translation:
  text: Look, the silver that we found in the mouths of our sacks we brought back
    to you from the land of Canaan. So how could we steal silver or gold from your
    master's house?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in the mouth of our sacks,' an idiom for the opening or top of a
      bag.
    reason: cultural_note
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse particle drawing attention to the argument. 'Look' is natural
    modern English and preserves the emphatic appeal better than the more archaic
    'behold.'
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: Literally 'silver.' In context it refers to money, but 'silver' preserves
    the concrete wording of the Hebrew and matches the repeated contrast with 'gold'
    later in the verse.
- source_word: מָצָאנוּ
  chosen: we found
  alternatives:
  - we discovered
  lexicon: HALOT
  rationale: Straightforward past sense; 'found' is the plain and idiomatic rendering.
- source_word: בְּפִי
  chosen: in the mouths of
  alternatives:
  - at the opening of
  - in the opening of
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'in the mouth of' a container. Here the plural
    English 'mouths' is retained to preserve the concrete image, while remaining understandable.
- source_word: אַמְתְּחֹתֵינוּ
  chosen: our sacks
  alternatives:
  - our bags
  lexicon: HALOT
  rationale: Refers to grain/travel sacks. 'Sacks' fits the ancient setting and the
    immediate narrative context better than the more generic 'bags.'
- source_word: הֱשִׁיבֹנוּ אֵלֶיךָ
  chosen: we brought back to you
  alternatives:
  - we returned to you
  - we restored to you
  lexicon: HALOT
  rationale: The hiphil of שוב here means to cause to return. 'Brought back to you'
    is idiomatic and clearly expresses the action of returning the money.
- source_word: מֵאֶרֶץ כְּנָעַן
  chosen: from the land of Canaan
  alternatives:
  - out of the land of Canaan
  lexicon: HALOT
  rationale: Standard geographic expression; 'from the land of Canaan' is natural
    and sufficiently formal.
- source_word: וְאֵיךְ
  chosen: So how could
  alternatives:
  - And how could
  - How then could
  lexicon: HALOT
  rationale: Introduces an argument from improbability based on the previous clause.
    'So how could' captures the inferential force in smooth English.
- source_word: נִגְנֹב
  chosen: we steal
  alternatives:
  - we could steal
  lexicon: HALOT
  rationale: 'The imperfect here is rhetorical and modal in context. English supplies
    ''could'' with ''how'' to express the sense naturally: ''how could we steal.'''
- source_word: מִבֵּית אֲדֹנֶיךָ
  chosen: from your master's house
  alternatives:
  - from your lord's house
  - from your master's household
  lexicon: HALOT
  rationale: אדון here refers to Joseph as the steward's master, not a divine title.
    'Master' is the appropriate social term in context; 'house' can stand metonymically
    for the household/estate, but the literal 'house' is retained.
- source_word: כֶּסֶף אוֹ זָהָב
  chosen: silver or gold
  alternatives:
  - money or gold
  lexicon: HALOT
  rationale: Retains the concrete pair in Hebrew and echoes the earlier 'silver,'
    strengthening the brothers' argument.
