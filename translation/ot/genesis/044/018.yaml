id: GEN.44.18
reference: Genesis 44:18
source:
  edition: WLC
  text: וַ/יִּגַּ֨שׁ אֵלָ֜י/ו יְהוּדָ֗ה וַ/יֹּאמֶר֮ בִּ֣י אֲדֹנִ/י֒ יְדַבֶּר נָ֨א
    עַבְדְּ/ךָ֤ דָבָר֙ בְּ/אָזְנֵ֣י אֲדֹנִ֔/י וְ/אַל יִ֥חַר אַפְּ/ךָ֖ בְּ/עַבְדֶּ֑/ךָ
    כִּ֥י כָמ֖וֹ/ךָ כְּ/פַרְעֹֽה־־׃
translation:
  text: Then Judah came near to him and said, “Please, my lord, let your servant speak
    a word in my lord’s hearing, and do not let your anger burn against your servant,
    for you are like Pharaoh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pardon me, my lord.” The Hebrew opening is a deferential plea.
    reason: lexical_alternative
  - marker: b
    text: Literally “in the ears of my lord,” a Hebrew idiom meaning “so that my lord
      may hear.”
    reason: cultural_note
  - marker: c
    text: Or “do not be angry with your servant.” Literally, “do not let your anger
      burn against your servant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ in the wayyiqtol narrative form denotes physical approach.
    'Came near' preserves the concrete movement and the solemnity of Judah stepping
    forward.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix referring to Joseph.
- source_word: בִּי
  chosen: Please
  alternatives:
  - Pardon me
  - If you please
  lexicon: HALOT
  rationale: This interjection is a polite entreaty. 'Please' is natural modern English
    and fits the deferential tone without archaic stiffness.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: In this courtly address to an Egyptian ruler, 'my lord' best preserves
    the honorific force. 'Sir' is too flat, and 'my master' could overstate ownership
    language not primary here.
- source_word: יְדַבֶּר נָא עַבְדְּךָ
  chosen: let your servant speak
  alternatives:
  - please let your servant speak
  - may your servant speak
  lexicon: HALOT
  rationale: The jussive/polite request with נא is well represented by 'let your servant
    speak.' The servant language is retained because Judah is speaking deferentially
    of himself.
- source_word: דָבָר
  chosen: a word
  alternatives:
  - something
  - a matter
  lexicon: HALOT
  rationale: '''A word'' is a common idiomatic rendering that preserves the singular
    noun and the formal register. ''Something'' is too loose; ''a matter'' is possible
    but less direct here.'
- source_word: בְּאָזְנֵי אֲדֹנִי
  chosen: in my lord’s hearing
  alternatives:
  - in my lord's ears
  - to my lord
  lexicon: HALOT
  rationale: Literally 'in the ears of my lord,' an idiom for speaking so as to be
    heard. 'In my lord’s hearing' preserves the idiom's sense in natural English.
- source_word: וְאַל יִחַר אַפְּךָ
  chosen: do not let your anger burn
  alternatives:
  - do not be angry
  - do not let your nose burn
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves the burning of anger. 'Do not let
    your anger burn' keeps the metaphor while remaining readable; 'do not be angry'
    would flatten the imagery.
- source_word: בְּעַבְדֶּךָ
  chosen: against your servant
  alternatives:
  - with your servant
  - at your servant
  lexicon: HALOT
  rationale: With חרה אף, the preposition here is best expressed in English as anger
    directed 'against' someone.
- source_word: כִּי כָמוֹךָ כְּפַרְעֹה
  chosen: for you are like Pharaoh
  alternatives:
  - for you are as Pharaoh
  - for you are equal to Pharaoh
  lexicon: HALOT
  rationale: The comparison expresses Joseph's authority and status from Judah's perspective.
    'Like Pharaoh' is the most direct and idiomatic rendering without overstating
    metaphysical equality.
