id: GEN.44.13
reference: Genesis 44:13
source:
  edition: WLC
  text: וַֽ/יִּקְרְע֖וּ שִׂמְלֹתָ֑/ם וַֽ/יַּעֲמֹס֙ אִ֣ישׁ עַל חֲמֹר֔/וֹ וַ/יָּשֻׁ֖בוּ
    הָ/עִֽירָ/ה־׃
translation:
  text: Then they tore their clothes, and each man loaded his donkey, and they returned
    to the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their garments.' The Hebrew term can refer generally to outer clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְעוּ
  chosen: they tore
  alternatives:
  - they ripped
  lexicon: HALOT
  rationale: From קרע, a common idiom for tearing garments as an expression of grief,
    shock, or distress. 'Tore' is the standard natural English rendering and preserves
    the concrete action.
- source_word: שִׂמְלֹתָם
  chosen: their clothes
  alternatives:
  - their garments
  - their cloaks
  lexicon: HALOT
  rationale: שִׂמְלָה refers to clothing/garments. 'Clothes' is more readable modern
    English than 'garments' while still accurate in this narrative context.
- source_word: וַיַּעֲמֹס אִישׁ עַל חֲמֹרוֹ
  chosen: each man loaded his donkey
  alternatives:
  - each man loaded up his donkey
  - each one loaded his donkey
  lexicon: HALOT
  rationale: 'עמס means to load or place a burden on. Although the verb is singular,
    אִישׁ gives a distributive sense: ''each man.'' This is best represented in idiomatic
    English as ''each man loaded his donkey.'''
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The singular noun functions distributively after a plural verb. Per translation
    philosophy, the masculine form is retained where it matches the source's intent;
    here 'each man' is natural and accurate.
- source_word: חֲמֹרוֹ
  chosen: his donkey
  alternatives:
  - his ass
  lexicon: HALOT
  rationale: חֲמוֹר is the ordinary word for donkey. 'Donkey' is standard contemporary
    English; 'ass' is archaic or potentially distracting.
- source_word: וַיָּשֻׁבוּ
  chosen: they returned
  alternatives:
  - they went back
  lexicon: HALOT
  rationale: שׁוּב commonly means return/go back. 'Returned' is slightly more formal
    and fits the narrative register.
- source_word: הָעִירָה
  chosen: to the city
  alternatives:
  - cityward
  - back to the city
  lexicon: HALOT
  rationale: The directional he on הָעִיר indicates motion toward the city. English
    expresses this naturally with 'to the city.'
