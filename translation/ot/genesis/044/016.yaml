id: GEN.44.16
reference: Genesis 44:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוּדָ֗ה מַה נֹּאמַר֙ לַֽ/אדֹנִ֔/י מַה נְּדַבֵּ֖ר וּ/מַה נִּצְטַדָּ֑ק
    הָ/אֱלֹהִ֗ים מָצָא֙ אֶת עֲוֺ֣ן עֲבָדֶ֔י/ךָ הִנֶּ/נּ֤וּ עֲבָדִים֙ לַֽ/אדֹנִ֔/י
    גַּם אֲנַ֕חְנוּ גַּ֛ם אֲשֶׁר נִמְצָ֥א הַ/גָּבִ֖יעַ בְּ/יָדֽ/וֹ־־־־־־׃
translation:
  text: And Judah said, “What can we say to my lord? What can we speak? And how can
    we justify ourselves? God has found out the guilt of your servants. Here we are,
    slaves to my lord—both we and the one in whose hand the cup was found.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How can we clear ourselves?” The Hebrew verb can mean to show oneself
      in the right or to justify oneself.
    reason: lexical_alternative
  - marker: b
    text: Or “has uncovered the iniquity of your servants.”
    reason: lexical_alternative
  - marker: c
    text: The first “servants” is a deferential self-designation before a superior;
      “slaves” later in the verse reflects the brothers’ offered status of bondage.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַאדֹנִי
  chosen: to my lord / to my lord
  alternatives:
  - to my master
  lexicon: HALOT
  rationale: אָדוֹן here refers to Joseph in his position of authority, not the divine
    title. 'My lord' preserves the deferential courtly address in direct speech better
    than the more modern but flatter 'sir'; 'master' is possible but less natural
    in this dialogue.
- source_word: נֹּאמַר
  chosen: can we say
  alternatives:
  - shall we say
  - may we say
  lexicon: HALOT
  rationale: The imperfect in this rhetorical sequence expresses what remains possible
    to say in defense. 'Can we say' captures the sense of helplessness in context.
- source_word: נְּדַבֵּר
  chosen: can we speak
  alternatives:
  - can we say further
  - can we plead
  lexicon: HALOT
  rationale: Though close to 'say,' דִּבֵּר adds the sense of speaking or presenting
    a case. Rendering it distinctly as 'speak' preserves the rhetorical buildup without
    over-paraphrasing.
- source_word: נִּצְטַדָּק
  chosen: justify ourselves
  alternatives:
  - clear ourselves
  - prove ourselves righteous
  lexicon: HALOT
  rationale: The hitpael of צדק here means to show oneself in the right or justify
    oneself. 'Justify ourselves' is the most direct English equivalent; 'clear ourselves'
    is interpretive and slightly weaker.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the gods
  - a god
  lexicon: HALOT
  rationale: In this narrative and on Judah's lips, the form clearly refers to the
    one God. The definite article does not require 'the God' in English here.
- source_word: מָצָא אֶת עֲוֺן
  chosen: has found out the guilt
  alternatives:
  - has found the guilt
  - has uncovered the iniquity
  - has discovered the wrongdoing
  lexicon: HALOT
  rationale: The idiom is not merely that guilt exists, but that God has exposed or
    brought it to light. 'Found out the guilt' captures both the Hebrew verb and the
    contextual sense of hidden wrongdoing now exposed.
- source_word: עֲוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - punishment for guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or guilt-bearing consequence. Here
    Judah acknowledges culpability before God rather than merely a specific criminal
    act, so 'guilt' best fits the confession.
- source_word: עֲבָדֶיךָ / עֲבָדִים
  chosen: your servants / slaves
  alternatives:
  - your servants / servants
  - your slaves / slaves
  lexicon: HALOT
  rationale: The first occurrence is a conventional self-reference of deference to
    a superior, so 'your servants' is idiomatic. The second states their resulting
    status, where bonded subjection is salient; per translation philosophy, 'slaves'
    better conveys that force.
- source_word: הִנֶּנּוּ
  chosen: Here we are
  alternatives:
  - Behold, we are
  - Look, we are
  lexicon: HALOT
  rationale: This presentational particle introduces Judah's surrender. 'Here we are'
    is natural modern English and preserves the force of yielding themselves up.
- source_word: גַּם אֲנַחְנוּ גַּם אֲשֶׁר נִמְצָא הַגָּבִיעַ בְּיָדוֹ
  chosen: both we and the one in whose hand the cup was found
  alternatives:
  - both we and also he in whose hand the cup was found
  - we also, and also the one with whom the cup was found
  lexicon: HALOT
  rationale: The double גַּם marks inclusion of both the brothers generally and Benjamin
    specifically. 'In whose hand' follows the Hebrew closely and keeps the legal/discovery
    nuance of the scene.
- source_word: הַגָּבִיעַ
  chosen: the cup
  alternatives:
  - the goblet
  lexicon: HALOT
  rationale: '''Cup'' is the most natural modern rendering; ''goblet'' is possible
    but sounds more ornate than the context requires.'
