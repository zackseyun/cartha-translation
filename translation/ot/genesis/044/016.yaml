theological_decisions:
- issue: Reference of אֱלֹהִים in Judah's confession
  chosen_reading: Judah attributes the exposure of their guilt to God himself.
  alternative_readings:
  - A generic divine power has exposed their wrongdoing.
  rationale: Within Genesis, Judah's statement is a theological confession that the
    brothers' hidden guilt has been brought to light by the one true God. This is
    not a doctrinally contested term in the table, but the singular sense is contextually
    clear and should not be flattened into an indefinite or plural reading.
