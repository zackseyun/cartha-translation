id: GEN.44.5
reference: Genesis 44:5
source:
  edition: WLC
  text: הֲ/ל֣וֹא זֶ֗ה אֲשֶׁ֨ר יִשְׁתֶּ֤ה אֲדֹנִ/י֙ בּ֔/וֹ וְ/ה֕וּא נַחֵ֥שׁ יְנַחֵ֖שׁ בּ֑/וֹ הֲרֵעֹתֶ֖ם אֲשֶׁ֥ר עֲשִׂיתֶֽם׃
translation:
  text: Is this not the one from which my master drinks and by which he indeed practices divination? You have done evil in doing this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he can surely divine by it.' The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'You have done evil in what you have done.'.
    reason: previous_rendering
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is this not
  alternatives:
  - Is not this
  - Surely this is
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is this not' is natural modern English and preserves the interrogative force.
- source_word: זֶה
  chosen: this
  alternatives:
  - this one
  lexicon: HALOT
  rationale: Demonstrative referring to the cup in question. 'This' is sufficient in English within the rhetorical question.
- source_word: אֲשֶׁר יִשְׁתֶּה אֲדֹנִי בּוֹ
  chosen: the one from which my master drinks
  alternatives:
  - the one in which my master drinks
  - that from which my lord drinks
  lexicon: HALOT
  rationale: The preposition ב with 'drink' is idiomatically rendered in English as 'drink from.' אֲדֹנִי here is a social title used by the steward about Joseph; 'my master' fits the narrative setting better than 'my lord,' which could sound overly theological in English.
- source_word: וְהוּא
  chosen: and he indeed
  alternatives:
  - and he
  - indeed he
  lexicon: HALOT
  rationale: The pronoun is somewhat emphatic. Rendering with 'indeed' helps reflect the emphasis before the infinitive absolute + finite verb construction.
- source_word: נַחֵשׁ יְנַחֵשׁ
  chosen: practices divination
  alternatives:
  - surely divines
  - indeed uses divination
  - carefully divines
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. Because English lacks a natural cognate construction here, 'indeed practices divination' captures both the lexical sense of נחש in the Piel and the emphatic force. This avoids the awkward 'divines divination' while preserving the claim made by the steward.
- source_word: בּוֹ
  chosen: by which
  alternatives:
  - with it
  - from it
  lexicon: HALOT
  rationale: The second בּוֹ indicates the object/instrument associated with divination. 'By which' communicates instrumental use more clearly in English than a bare 'in it'.
- source_word: הֲרֵעֹתֶם
  chosen: You have done evil
  alternatives:
  - You have acted badly
  - You have done wrong
  lexicon: HALOT
  rationale: From רעע in the Hiphil, expressing doing evil/wrong. 'Done evil' preserves the moral weight more strongly than the milder 'done wrong,' though both are possible.
- source_word: אֲשֶׁר עֲשִׂיתֶם
  chosen: in what you have done
  alternatives:
  - by what you have done
  - what you have done
  lexicon: HALOT
  rationale: This relative clause specifies the action just committed. 'In what you have done' yields idiomatic English while retaining the explanatory force of the clause.
