id: GEN.44.22
reference: Genesis 44:22
source:
  edition: WLC
  text: וַ/נֹּ֨אמֶר֙ אֶל אֲדֹנִ֔/י לֹא יוּכַ֥ל הַ/נַּ֖עַר לַ/עֲזֹ֣ב אֶת אָבִ֑י/ו וְ/עָזַ֥ב
    אֶת אָבִ֖י/ו וָ/מֵֽת־־־־׃
translation:
  text: And we said to my lord, ‘The boy cannot leave his father; if he were to leave
    his father, he would die.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and he leaves his father, and he dies.' The Hebrew
      leaves the subject of 'would die' implicit; context indicates it refers to the
      father.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  chosen: And we said
  alternatives:
  - Then we said
  - So we said
  lexicon: HALOT
  rationale: Wayyiqtol 1cp of אמר introduces the reported speech in sequence. 'And
    we said' preserves the narrative flow without overinterpreting the conjunction.
- source_word: אֶל אֲדֹנִי
  chosen: to my lord
  alternatives:
  - to my master
  - to my lord sir
  lexicon: HALOT
  rationale: אדני with 1cs suffix is a respectful address to Joseph. 'My lord' fits
    the courtly setting and preserves the deferential tone better than the more servile
    'master' here.
- source_word: לֹא יוּכַל
  chosen: cannot
  alternatives:
  - is not able to
  - is unable to
  lexicon: HALOT
  rationale: יכל expresses ability. 'Cannot' is the most natural modern English equivalent
    and keeps the force of incapacity.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the lad
  lexicon: HALOT
  rationale: נער can denote a youth or young man depending on context. Here Benjamin
    is spoken of in relation to his father with tenderness and dependence, so 'the
    boy' best reflects the familial perspective of Judah's speech.
- source_word: לַעֲזֹב
  chosen: leave
  alternatives:
  - forsake
  - depart from
  lexicon: HALOT
  rationale: עזב here means to leave behind or depart from, not necessarily to abandon
    in a moral sense. 'Leave' is the clearest contextual rendering.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward possessive construction; repeated twice in Hebrew and
    retained in English for emphasis and clarity.
- source_word: וְעָזַב
  chosen: if he were to leave
  alternatives:
  - and he leaves
  - and if he leaves
  lexicon: HALOT
  rationale: 'Although formally a qatal with conjunction, in this context it functions
    conditionally after the statement of inability: ''if he were to leave.'' This
    reflects the sense carried by the sequence in idiomatic English.'
- source_word: וָמֵת
  chosen: he would die
  alternatives:
  - then he would die
  - he will die
  lexicon: HALOT
  rationale: The verb is most naturally understood of the father dying from the loss
    of the boy, as the 3ms subject continues from 'his father.' English makes the
    implied subject explicit as 'he' and uses 'would die' to match the conditional
    sense.
