id: GEN.44.4
reference: Genesis 44:4
source:
  edition: WLC
  text: הֵ֠ם יָֽצְא֣וּ אֶת הָ/עִיר֮ לֹ֣א הִרְחִיקוּ֒ וְ/יוֹסֵ֤ף אָמַר֙ לַֽ/אֲשֶׁ֣ר
    עַל בֵּית֔/וֹ ק֥וּם רְדֹ֖ף אַחֲרֵ֣י הָֽ/אֲנָשִׁ֑ים וְ/הִשַּׂגְתָּ/ם֙ וְ/אָמַרְתָּ֣
    אֲלֵ/הֶ֔ם לָ֛/מָּה שִׁלַּמְתֶּ֥ם רָעָ֖ה תַּ֥חַת טוֹבָֽה־־׃
translation:
  text: They had gone out of the city; they had not gone far, when Joseph said to
    the one over his house, “Get up, pursue the men, and when you overtake them, say
    to them, ‘Why have you repaid evil for good?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to his steward” / “to the man over his household.” The Hebrew is literally
      “to the one over his house.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם
  chosen: They
  lexicon: HALOT
  rationale: Third person plural pronoun referring to Joseph's brothers; explicit
    in Hebrew and retained in English for clarity.
- source_word: יָצְאוּ אֶת הָעִיר
  chosen: had gone out of the city
  alternatives:
  - went out of the city
  - left the city
  lexicon: HALOT
  rationale: יָצָא means 'go out/come out.' With אֶת marking the object 'the city,'
    the idiom is departure from the city. Pluperfect-like English ('had gone out')
    fits the narrative sequence before Joseph's next action.
- source_word: לֹא הִרְחִיקוּ
  chosen: had not gone far
  alternatives:
  - had not gone a great distance
  - were not far away
  lexicon: HALOT
  rationale: Hiphil of רחק conveys becoming distant or going far. Idiomatic English
    is 'had not gone far,' matching the temporal setting.
- source_word: לַאֲשֶׁר עַל בֵּיתוֹ
  chosen: to the one over his house
  alternatives:
  - to the steward of his house
  - to the man over his household
  lexicon: HALOT
  rationale: Literally 'to the one who was over his house.' This denotes the household
    administrator/steward. I kept the relational phrasing close to the Hebrew while
    remaining natural English.
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Go at once
  lexicon: HALOT
  rationale: Imperative of קום often functions as an urgent command to rise and act.
    'Get up' is natural modern English and preserves the force.
- source_word: רְדֹף אַחֲרֵי
  chosen: pursue
  alternatives:
  - chase after
  - follow after
  lexicon: HALOT
  rationale: The verb plus preposition means to pursue/chase after. 'Pursue' is concise
    and suitably formal for the command.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - those men
  lexicon: HALOT
  rationale: אַנָשִׁים is the ordinary masculine plural 'men.' Per gender-accurate
    philosophy, 'men' is preferred over a neutral substitute.
- source_word: וְהִשַּׂגְתָּם
  chosen: when you overtake them
  alternatives:
  - and overtake them
  - and catch up with them
  lexicon: HALOT
  rationale: נשׂג in Hiphil means to overtake/reach. Rendering with 'when' captures
    the sequential sense before the next command in idiomatic English.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: say to them
  alternatives:
  - you shall say to them
  - tell them
  lexicon: HALOT
  rationale: Simple continuation of the command sequence. 'Say to them' stays close
    to the Hebrew.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative retained straightforwardly.
- source_word: שִׁלַּמְתֶּם
  chosen: have you repaid
  alternatives:
  - have you returned
  - have you paid back
  lexicon: HALOT
  rationale: Piel of שלם here means to repay or requite. 'Repaid' fits the moral accusation
    and pairs naturally with 'evil for good.'
- source_word: רָעָה תַּחַת טוֹבָה
  chosen: evil for good
  alternatives:
  - harm for good
  - evil instead of good
  lexicon: HALOT
  rationale: A common moral contrast meaning returning evil in place of good. 'Evil
    for good' is concise, idiomatic, and preserves the ethical force.
