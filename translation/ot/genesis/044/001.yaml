id: GEN.44.1
reference: Genesis 44:1
source:
  edition: WLC
  text: וַ/יְצַ֞ו אֶת אֲשֶׁ֣ר עַל בֵּית/וֹ֮ לֵ/אמֹר֒ מַלֵּ֞א אֶת אַמְתְּחֹ֤ת הָֽ/אֲנָשִׁים֙
    אֹ֔כֶל כַּ/אֲשֶׁ֥ר יוּכְל֖וּ/ן שְׂאֵ֑ת וְ/שִׂ֥ים כֶּֽסֶף אִ֖ישׁ בְּ/פִ֥י אַמְתַּחְתּֽ/וֹ־־־־׃
translation:
  text: Then he commanded the one over his house, saying, “Fill the men's sacks with
    food, as much as they can carry, and put each man's silver in the mouth of his
    sack.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the mouth of his sack,'' that is, at the opening of his sack.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: Then he commanded
  alternatives:
  - And he commanded
  - So he commanded
  lexicon: HALOT
  rationale: Wayyiqtol of צוה advances the narrative. 'Then' captures sequential movement
    in natural English while preserving the command sense.
- source_word: אֲשֶׁר עַל בֵּיתוֹ
  chosen: the one over his house
  alternatives:
  - the one in charge of his house
  - his household steward
  lexicon: HALOT
  rationale: Literally 'who was over his house.' The phrase denotes the official managing
    Joseph's household. 'The one over his house' stays close to the Hebrew while remaining
    intelligible; 'steward' is interpretive and therefore left as an alternative.
- source_word: מַלֵּא
  chosen: Fill
  alternatives:
  - Fill up
  lexicon: HALOT
  rationale: Imperative of מלא. Simple imperative 'Fill' is the most natural direct
    equivalent.
- source_word: אַמְתְּחֹת
  chosen: sacks
  alternatives:
  - bags
  lexicon: HALOT
  rationale: Refers to containers for grain/provisions used in travel. 'Sacks' better
    fits the ancient transport context than the more generic 'bags'.
- source_word: הָאֲנָשִׁים
  chosen: the men's
  alternatives:
  - the men's belonging to the men
  - the brothers'
  lexicon: HALOT
  rationale: Definite plural 'the men.' 'The men's sacks' is idiomatic English and
    preserves the masculine reference without unnecessary expansion. 'Brothers' would
    import contextual identification not stated in this clause.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - grain
  - provisions
  lexicon: HALOT
  rationale: אֹכֶל is a broad term for food. Although grain is involved in the wider
    narrative, the verse itself uses the general term, so 'food' is preferred.
- source_word: כַּאֲשֶׁר יוּכְלוּן שְׂאֵת
  chosen: as much as they can carry
  alternatives:
  - as much as they are able to carry
  - according to what they can bear
  lexicon: HALOT
  rationale: The idiom combines ability (יכל) with carrying/bearing (שׂאת). 'As much
    as they can carry' is a clear idiomatic rendering that preserves the sense of
    capacity.
- source_word: וְשִׂים
  chosen: and put
  alternatives:
  - and place
  lexicon: HALOT
  rationale: Common verb שׂים meaning 'put/place.' 'Put' is the most natural English
    equivalent in this instruction.
- source_word: כֶּסֶף אִישׁ
  chosen: each man's silver
  alternatives:
  - each one's silver money
  - every man's silver
  lexicon: HALOT
  rationale: כֶּסֶף here refers to the silver payment each man brought. 'Each man's
    silver' preserves both the distributive force of אִישׁ and the lexical value of
    כסף without over-specifying 'money' in the main text.
- source_word: בְּפִי אַמְתַּחְתּוֹ
  chosen: in the mouth of his sack
  alternatives:
  - at the opening of his sack
  - in the opening of his bag
  lexicon: HALOT
  rationale: Hebrew idiom 'mouth of the sack' refers to its opening. Because 'mouth'
    is a transparent and common biblical idiom, it is retained in English; a more
    explanatory alternative is preserved in a footnote.
