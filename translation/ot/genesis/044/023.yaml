id: GEN.44.23
reference: Genesis 44:23
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל עֲבָדֶ֔י/ךָ אִם לֹ֥א יֵרֵ֛ד אֲחִי/כֶ֥ם הַ/קָּטֹ֖ן אִתְּ/כֶ֑ם
    לֹ֥א תֹסִפ֖וּ/ן לִ/רְא֥וֹת פָּנָֽ/י־־׃
translation:
  text: And you said to your servants, ‘If your youngest brother does not come down
    with you, you shall not continue to see my face.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “you shall not appear before me again.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And you said
  alternatives:
  - Then you said
  - And you told
  lexicon: HALOT
  rationale: Wayyiqtol of אמר in narrative sequence; rendered with simple past. 'And'
    preserves the Hebrew narrative linkage without overloading English style.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: In this courtly setting Judah addresses Joseph's household/status relationship
    politely. While עבד can denote slave/servant, 'servants' best fits the deferential
    self-reference here without importing bonded-status emphasis not foregrounded
    in the immediate clause.
- source_word: אִם לֹא
  chosen: If ... does not
  alternatives:
  - unless
  lexicon: HALOT
  rationale: The conditional negative is most transparently represented as 'if ...
    does not.' 'Unless' is possible, but the fuller conditional better mirrors the
    Hebrew structure.
- source_word: יֵרֵד
  chosen: come down
  alternatives:
  - go down
  lexicon: HALOT
  rationale: ירד literally means 'go down,' but from the speaker's perspective in
    Egypt, English idiom naturally uses 'come down.' This preserves the directional
    sense while sounding natural.
- source_word: אֲחִיכֶם הַקָּטֹן
  chosen: your youngest brother
  alternatives:
  - your little brother
  - your younger brother
  lexicon: HALOT
  rationale: The phrase identifies the youngest among the brothers, not merely a younger
    one. 'Youngest brother' is the clearest idiomatic English rendering.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward accompaniment marker; 'with you' is natural and sufficiently
    precise.
- source_word: לֹא תֹסִפוּן
  chosen: you shall not continue
  alternatives:
  - you shall not again
  - you shall no longer
  lexicon: HALOT
  rationale: יסף in this construction means to continue/add to do something further.
    'Shall not continue' captures the prohibition on any further occurrence. 'No longer'
    is also viable but slightly more interpretive.
- source_word: לִרְאוֹת פָּנָי
  chosen: to see my face
  alternatives:
  - to appear before me
  - to see me
  lexicon: HALOT
  rationale: Literally 'to see my face,' a common idiom for appearing before someone.
    The main text keeps the vivid Hebrew expression; the idiomatic alternative is
    worth preserving in a footnote.
