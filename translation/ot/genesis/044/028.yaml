id: GEN.44.28
reference: Genesis 44:28
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א הָֽ/אֶחָד֙ מֵֽ/אִתִּ֔/י וָ/אֹמַ֕ר אַ֖ךְ טָרֹ֣ף טֹרָ֑ף וְ/לֹ֥א רְאִיתִ֖י/ו
    עַד הֵֽנָּה־׃
translation:
  text: One left me, and I said, ‘Surely he has been torn to pieces,’ and I have not
    seen him until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Surely he was torn apart.' The Hebrew uses an emphatic construction
      ('torn, torn') to intensify Jacob's conclusion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: left
  alternatives:
  - went out
  - departed
  lexicon: HALOT
  rationale: The verb literally means 'went out/came out,' but in this context of
    a son no longer being with his father, 'left' is the most natural English expression
    and preserves the sense without over-paraphrase.
- source_word: הָאֶחָד
  chosen: One
  alternatives:
  - the one
  - one of them
  lexicon: HALOT
  rationale: Used substantivally, referring to one of the two sons previously in view.
    'One' is concise and idiomatic in English, matching the Hebrew's elliptical force.
- source_word: מֵאִתִּי
  chosen: left me
  alternatives:
  - went out from me
  - departed from me
  lexicon: HALOT
  rationale: The prepositional phrase means 'from with me/from me.' In English it
    is best carried with the verb as 'left me,' which communicates separation from
    Jacob's presence.
- source_word: וָאֹמַר
  chosen: I said
  alternatives:
  - I thought
  - I said to myself
  lexicon: HALOT
  rationale: The Hebrew straightforwardly says 'and I said.' Although the sense may
    imply inward conclusion, the text does not require an internalizing paraphrase.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - indeed
  - certainly
  - only
  lexicon: HALOT
  rationale: Here the particle marks strong assertion or inference. 'Surely' best
    reflects Jacob's conclusion in context.
- source_word: טָרֹף טֹרָף
  chosen: has been torn to pieces
  alternatives:
  - was surely torn apart
  - has surely been torn
  lexicon: HALOT
  rationale: This infinitive absolute + finite verb construction intensifies the passive
    idea from the root טרף, commonly used of an animal tearing prey. 'Has been torn
    to pieces' conveys both the passive sense and the violent force in natural English.
- source_word: וְלֹא רְאִיתִיו
  chosen: and I have not seen him
  alternatives:
  - and I did not see him
  - and I have never seen him again
  lexicon: HALOT
  rationale: The perfect with negation in this discourse context naturally reaches
    from the past event to the present situation. English present perfect best captures
    'I have not seen him' up to now.
- source_word: עַד הֵנָּה
  chosen: until now
  alternatives:
  - until here
  - up to this point
  lexicon: HALOT
  rationale: An idiomatic temporal expression meaning 'until now/up to this point,'
    not a spatial 'until here' in this context.
