id: GEN.44.12
reference: Genesis 44:12
source:
  edition: WLC
  text: וַ/יְחַפֵּ֕שׂ בַּ/גָּד֣וֹל הֵחֵ֔ל וּ/בַ/קָּטֹ֖ן כִּלָּ֑ה וַ/יִּמָּצֵא֙ הַ/גָּבִ֔יעַ
    בְּ/אַמְתַּ֖חַת בִּנְיָמִֽן׃
translation:
  text: And he searched, beginning with the oldest and finishing with the youngest,
    and the cup was found in Benjamin’s sack.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the goblet.' The Hebrew term can refer to a cup or a goblet.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַפֵּשׂ
  chosen: he searched
  alternatives:
  - he examined
  - he looked through
  lexicon: HALOT
  rationale: The verb חפשׂ here denotes conducting a search through the brothers'
    baggage. 'He searched' is the most natural and sufficiently formal rendering in
    narrative context.
- source_word: בַּגָּדוֹל
  chosen: with the oldest
  alternatives:
  - with the greatest
  - with the eldest
  lexicon: HALOT
  rationale: In context Joseph's steward searches the brothers in birth order. 'The
    oldest' best conveys age/seniority rather than status or size.
- source_word: הֵחֵל
  chosen: beginning
  alternatives:
  - he began
  lexicon: HALOT
  rationale: Used with the following phrase to mark the start point of the search
    sequence. Rendering as 'beginning with' produces clear English while preserving
    the Hebrew sense.
- source_word: וּבַקָּטֹן
  chosen: with the youngest
  alternatives:
  - with the smallest
  - with the least
  lexicon: HALOT
  rationale: In this familial context קטן contrasts with 'the oldest' and refers to
    the youngest brother, not physical size or insignificance.
- source_word: כִּלָּה
  chosen: finishing
  alternatives:
  - he finished
  - ending
  lexicon: HALOT
  rationale: The verb marks the endpoint of the ordered search. 'Finishing with' pairs
    idiomatically with 'beginning with' and reflects the Hebrew progression.
- source_word: וַיִּמָּצֵא
  chosen: was found
  alternatives:
  - he found
  - it was discovered
  lexicon: HALOT
  rationale: 'The Niphal form is passive/reflexive in sense: the cup ''was found,''
    not explicitly ''he found.'' Preserving the passive matches the Hebrew form and
    narrative style.'
- source_word: הַגָּבִיעַ
  chosen: the cup
  alternatives:
  - the goblet
  lexicon: HALOT
  rationale: גביע can denote a cup or goblet. 'Cup' is simpler modern English and
    fits the immediate context, while 'goblet' is a viable lexical alternative worth
    preserving.
- source_word: בְּאַמְתַּחַת
  chosen: in Benjamin’s sack
  alternatives:
  - in Benjamin’s bag
  lexicon: HALOT
  rationale: אַמְתַּחַת refers to a sack or bag used for carrying grain or goods.
    'Sack' fits the Genesis travel/provision context slightly better than the more
    generic 'bag'.
- source_word: בִּנְיָמִן
  chosen: Benjamin’s
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
