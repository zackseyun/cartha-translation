id: GEN.13.13
reference: Genesis 13:13
source:
  edition: WLC
  text: וְ/אַנְשֵׁ֣י סְדֹ֔ם רָעִ֖ים וְ/חַטָּאִ֑ים לַ/יהוָ֖ה מְאֹֽד׃
translation:
  text: Now the men of Sodom were exceedingly wicked and sinful against Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "before the LORD."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַנְשֵׁי
  chosen: Now the men of
  alternatives:
  - And the men of
  - the men of
  lexicon: HALOT
  rationale: אַנְשֵׁי is the construct plural of אִישׁ, here referring specifically to male inhabitants/citizens rather than humanity in general, so 'men of' is gender-accurate. The prefixed conjunction can be rendered simply as connective 'and,' but in English narrative style 'Now' appropriately signals a parenthetical explanatory note about Sodom without overstating the conjunction.
- source_word: סְדֹם
  chosen: Sodom
  rationale: Proper place name; transliterated by standard English convention.
- source_word: רָעִים
  chosen: wicked
  alternatives:
  - evil
  - bad
  lexicon: HALOT
  rationale: רָעִים in moral context denotes ethical evil rather than mere unpleasantness or misfortune. 'Wicked' best captures the moral force in idiomatic English.
- source_word: וְ/חַטָּאִים
  chosen: and sinful
  alternatives:
  - and sinners
  - and sinning
  lexicon: HALOT
  rationale: As an adjective/plural predicate parallel to רָעִים, this describes the men as characterized by sin. 'Sinful' reads naturally in English and preserves the predicative sense better than the more nominal 'sinners' in this construction.
- source_word: לַ/יהוָה
  chosen: against the LORD
  alternatives:
  - before the LORD
  - to the LORD
  lexicon: HALOT
  rationale: With חטא, the preposition ל can mark the one against whom the offense is committed. In this context, 'against the LORD' best conveys that their sin is not merely observable by YHWH but directed in offense toward him. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: מְאֹד
  chosen: exceedingly
  alternatives:
  - very
  - greatly
  lexicon: HALOT
  rationale: מְאֹד intensifies the whole predication. 'Exceedingly' preserves the strong emphasis with slightly more gravity than the flatter 'very.'
