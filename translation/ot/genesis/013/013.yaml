theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of לַיהוָה with חַטָּאִים
  chosen_reading: against the LORD
  alternative_readings:
  - before the LORD
  rationale: The phrase can be understood either as indicating offense against YHWH or wickedness in his sight. Given the collocation with sin language, 'against the LORD' better preserves the relational and moral force without denying divine omniscience. The alternative is preserved in a footnote because it is a plausible lexical construal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it where ambiguity is genuine'
