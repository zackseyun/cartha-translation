theological_decisions:
- issue: Referent of the feminine suffix in 'I will give it'
  chosen_reading: The suffix refers to 'the land' as the promised inheritance given
    by God to Abram.
  rationale: The feminine singular suffix naturally points back to אֶרֶץ, reinforcing
    the covenant promise without adding interpretive material beyond the text.
