id: GEN.13.17
reference: Genesis 13:17
source:
  edition: WLC
  text: ק֚וּם הִתְהַלֵּ֣ךְ בָּ/אָ֔רֶץ לְ/אָרְכָּ֖/הּ וּ/לְ/רָחְבָּ֑/הּ כִּ֥י לְ/ךָ֖
    אֶתְּנֶֽ/נָּה׃
translation:
  text: Get up, walk through the land, through its length and its width, for I will
    give it to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Arise, walk about in the land, through its length and its breadth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וּם
  chosen: Get up
  alternatives:
  - Arise
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום meaning to arise/stand up. 'Get up' is natural modern
    English while preserving the direct command force.
- source_word: הִתְהַלֵּךְ
  chosen: walk through
  alternatives:
  - walk about
  - go about
  - traverse
  lexicon: HALOT
  rationale: Hitpael imperative of הלך conveys moving about or walking around. 'Walk
    through' fits the context of surveying the land and reads naturally with the following
    spatial phrases.
- source_word: בָּאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the promised land/territory rather than the earth
    in general. 'The land' is the standard contextual rendering.
- source_word: לְאָרְכָּהּ
  chosen: through its length
  alternatives:
  - according to its length
  - from end to end
  lexicon: HALOT
  rationale: The noun אֹרֶךְ means length; with ל preposition in this paired expression
    it denotes extension along the land's length. 'Through its length' communicates
    the idiom in idiomatic English.
- source_word: וּלְרָחְבָּהּ
  chosen: and its width
  alternatives:
  - and its breadth
  lexicon: HALOT
  rationale: רֹחַב means width/breadth. 'Width' is clearer modern English; paired
    with 'length' it preserves the merism of full extent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' preserves the explanatory
    connection succinctly.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Dative pronoun marking the recipient of the gift. 'To you' is the most
    direct English equivalent with נתן in this construction.
- source_word: אֶתְּנֶנָּה
  chosen: I will give it
  alternatives:
  - I am giving it
  - I will grant it
  lexicon: HALOT
  rationale: Qal imperfect 1cs of נתן with 3fs suffix referring back to 'the land.'
    Future 'I will give it' best fits the promissory sense in context.
