id: GEN.13.5
reference: Genesis 13:5
source:
  edition: WLC
  text: וְ/גַם לְ/ל֔וֹט הַ/הֹלֵ֖ךְ אֶת אַבְרָ֑ם הָיָ֥ה צֹאן וּ/בָקָ֖ר וְ/אֹהָלִֽים־־־׃
translation:
  text: And Lot, who went with Abram, also had flocks and herds and tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'flocks' refers broadly to small livestock, especially sheep and
      goats; 'herds' refers to cattle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - Now ... also
  - And indeed
  lexicon: HALOT
  rationale: The conjunction plus adverb adds Lot to the narrative with an additive
    sense. Rendering both elements in English is best achieved by 'And ... also,'
    preserving the connection to the previous verse and the emphasis that Lot too
    possessed wealth.
- source_word: לְלוֹט
  chosen: Lot
  alternatives:
  - as for Lot
  lexicon: HALOT
  rationale: The preposition ל here marks the possessor in the existential construction
    ('there was to Lot' = 'Lot had'). Natural English expresses this simply with 'Lot
    ... had' rather than a wooden 'to Lot there was.'
- source_word: ההלך את אברם
  chosen: who went with Abram
  alternatives:
  - who was going with Abram
  - traveling with Abram
  lexicon: HALOT
  rationale: The participle functions attributively, identifying Lot as the one accompanying
    Abram. 'Who went with Abram' is idiomatic and sufficiently reflects the ongoing
    accompanying sense without awkwardness.
- source_word: היה
  chosen: had
  alternatives:
  - there was to him
  - possessed
  lexicon: HALOT
  rationale: In this existential possession construction, English normally uses 'had.'
    'Possessed' is possible but sounds more formal than the Hebrew requires.
- source_word: צאן
  chosen: flocks
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: The term broadly denotes small livestock, especially sheep and goats.
    'Flocks' is the standard concise English rendering and pairs naturally with 'herds'
    for בקר.
- source_word: ובקר
  chosen: herds
  alternatives:
  - cattle
  - large livestock
  lexicon: HALOT
  rationale: The word denotes bovine livestock. 'Herds' works well as a collective
    parallel to 'flocks' and avoids over-specifying individual animals while preserving
    the livestock sense.
- source_word: ואהלים
  chosen: tents
  alternatives:
  - tent-dwellings
  lexicon: HALOT
  rationale: The plural noun straightforwardly refers to tents, indicating household
    encampment and material wealth. The simple rendering is sufficient.
