id: GEN.13.16
reference: Genesis 13:16
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֥י אֶֽת זַרְעֲ/ךָ֖ כַּ/עֲפַ֣ר הָ/אָ֑רֶץ אֲשֶׁ֣ר אִם יוּכַ֣ל אִ֗ישׁ
    לִ/מְנוֹת֙ אֶת עֲפַ֣ר הָ/אָ֔רֶץ גַּֽם זַרְעֲ/ךָ֖ יִמָּנֶֽה־׀־־־׃
translation:
  text: And I will make your offspring like the dust of the earth, so that if a man
    can count the dust of the earth, then your offspring also can be counted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anyone can count'; Hebrew 'a man' uses a masculine singular form with
      generic force.
    reason: lexical_alternative
  - marker: b
    text: Or 'your seed' or 'your descendants'; Hebrew זֶרַע is a collective noun
      for offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will place
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'set/place,' but with a direct object
    of descendants and a comparative phrase ('like the dust of the earth') it idiomatically
    means 'make' or 'make into.' 'Make' is the most natural English while preserving
    the causative sense.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed literally or offspring/descendants metaphorically.
    In the Abrahamic promise context, 'offspring' preserves the singular collective
    force better than 'descendants,' while avoiding the archaic ambiguity of 'seed'
    in modern English.
- source_word: כַּעֲפַר הָאָרֶץ
  chosen: like the dust of the earth
  alternatives:
  - as the dust of the earth
  lexicon: HALOT
  rationale: The comparison is explicit and formulaic in patriarchal promise language.
    'Like the dust of the earth' is clear, natural, and close to the Hebrew imagery.
- source_word: אֲשֶׁר אִם
  chosen: so that if
  alternatives:
  - such that if
  - if indeed
  lexicon: HALOT
  rationale: 'The sequence introduces the result/comparison clause: Abram''s offspring
    will be so numerous that, if one could count the dust, then his offspring could
    be counted. ''So that if'' captures the idiomatic force better than a wooden rendering.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - anyone
  - someone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with generic force. Per
    the translation philosophy's gender-accurate principle, 'a man' is retained in
    the main text rather than neutralizing to 'anyone.'
- source_word: לִמְנוֹת
  chosen: count
  alternatives:
  - number
  lexicon: HALOT
  rationale: מנה in this context means to count or enumerate. 'Count' is the most
    idiomatic modern English and matches the imagery of innumerability.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - likewise
  lexicon: HALOT
  rationale: גַּם marks correspondence between the dust and Abram's offspring. 'Also'
    is simple and sufficient in English.
- source_word: יִמָּנֶה
  chosen: can be counted
  alternatives:
  - will be counted
  - could be counted
  lexicon: HALOT
  rationale: The Niphal imperfect here functions in the apodosis of a conditional
    comparison. 'Can be counted' best conveys possibility corresponding to the protasis
    ('if a man can count...'). 'Will be counted' sounds too predictive rather than
    hypothetical.
