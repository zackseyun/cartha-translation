theological_decisions:
- issue: Rendering the collective noun זֶרַע in the Abrahamic promise
  chosen_reading: your offspring
  alternative_readings:
  - your seed
  - your descendants
  rationale: The verse speaks of Abram's posterity as an innumerable collective. 'Offspring'
    preserves the singular collective nuance that later biblical theology can build
    on, without importing a specifically messianic singular reading into this verse
    itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Gendered generic language in אִישׁ
  chosen_reading: a man
  alternative_readings:
  - anyone
  - someone
  rationale: The source text uses a masculine singular noun generically. Following
    the stated gender-accurate policy, the translation keeps the masculine form in
    the main text rather than flattening it to a gender-neutral expression.
  doctrine_reference: Translation philosophy §4
