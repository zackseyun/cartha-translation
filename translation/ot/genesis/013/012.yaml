id: GEN.13.12
reference: Genesis 13:12
source:
  edition: WLC
  text: אַבְרָ֖ם יָשַׁ֣ב בְּ/אֶֽרֶץ כְּנָ֑עַן וְ/ל֗וֹט יָשַׁב֙ בְּ/עָרֵ֣י הַ/כִּכָּ֔ר
    וַ/יֶּאֱהַ֖ל עַד סְדֹֽם־־׃
translation:
  text: Abram lived in the land of Canaan, and Lot lived in the cities of the plain
    and pitched his tents as far as Sodom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and moved his tent as far as Sodom.' The Hebrew verb can denote tenting
      or pitching a tent; the sense is that Lot extended his encampment toward Sodom
      rather than necessarily entering the city at this point.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb commonly denotes dwelling or residing. 'Lived' is natural modern
    English and fits the stative sense here better than the more archaic 'dwelt.'
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retains the explicit noun 'land' (אֶרֶץ) rather than compressing to 'in
    Canaan,' preserving the Hebrew wording while remaining idiomatic.
- source_word: בְּעָרֵי הַכִּכָּר
  chosen: in the cities of the plain
  alternatives:
  - in the cities of the valley
  - among the cities of the plain
  lexicon: HALOT
  rationale: כִּכָּר in this context refers to the Jordan plain/circle. 'Plain' is
    the standard and clearest English rendering here. 'Cities of the plain' preserves
    the plural construct relationship.
- source_word: וַיֶּאֱהַל
  chosen: pitched his tents
  alternatives:
  - moved his tent
  - encamped
  lexicon: HALOT
  rationale: From אהל in the verbal form, meaning to pitch a tent or live in tents.
    The plural 'his tents' is idiomatic English for pastoral encampment and reflects
    established usage without distorting the sense.
- source_word: עַד סְדֹם
  chosen: as far as Sodom
  alternatives:
  - toward Sodom
  - up to Sodom
  - near Sodom
  lexicon: HALOT
  rationale: 'עַד marks extent or limit. ''As far as Sodom'' best captures the spatial
    progression implied: Lot spread his encampment in the direction reaching to Sodom,
    without yet stating residence inside the city.'
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: לוֹט
  chosen: Lot
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: סְדֹם
  chosen: Sodom
  rationale: Place name transliterated by standard English convention.
