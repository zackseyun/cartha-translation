id: GEN.13.7
reference: Genesis 13:7
source:
  edition: WLC
  text: וַֽ/יְהִי רִ֗יב בֵּ֚ין רֹעֵ֣י מִקְנֵֽה אַבְרָ֔ם וּ/בֵ֖ין רֹעֵ֣י מִקְנֵה ל֑וֹט
    וְ/הַֽ/כְּנַעֲנִי֙ וְ/הַ/פְּרִזִּ֔י אָ֖ז יֹשֵׁ֥ב בָּ/אָֽרֶץ־־־׃
translation:
  text: And there was strife between the herdsmen of Abram’s livestock and the herdsmen
    of Lot’s livestock. Now the Canaanite and the Perizzite were then dwelling in
    the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Canaanites and the Perizzites.' The Hebrew uses singular ethnonyms
      collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And there was
  alternatives:
  - And it happened
  - Now there was
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces the narrative event. 'And there
    was' is natural English and preserves the simple existential sense without the
    wooden 'and it happened.'
- source_word: רִיב
  chosen: strife
  alternatives:
  - quarreling
  - dispute
  - contention
  lexicon: HALOT
  rationale: The noun denotes a conflict or quarrel. 'Strife' fits the interpersonal
    tension between the groups and is slightly weightier than 'quarreling' while remaining
    readable.
- source_word: רֹעֵי
  chosen: herdsmen
  alternatives:
  - shepherds
  - keepers
  lexicon: HALOT
  rationale: Because the object is מִקְנֶה ('livestock'), the workers are best rendered
    'herdsmen' rather than the narrower 'shepherds,' which can imply only sheep.
- source_word: מִקְנֵה
  chosen: livestock
  alternatives:
  - cattle
  - possessions
  - herds
  lexicon: HALOT
  rationale: מִקְנֶה refers broadly to domesticated animals/property in herds and
    flocks. 'Livestock' is the most accurate modern umbrella term in this context.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  alternatives:
  - among
  lexicon: HALOT
  rationale: The paired prepositions mark two distinct parties in conflict. English
    'between ... and' preserves the bilateral structure.
- source_word: וְהַכְּנַעֲנִי וְהַפְּרִזִּי
  chosen: the Canaanite and the Perizzite
  alternatives:
  - the Canaanites and the Perizzites
  lexicon: HALOT
  rationale: The Hebrew uses singular ethnonyms with the article in a collective sense.
    English can preserve this idiom with singular forms, which is common in many translations
    and reflects the Hebrew form.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  - in those days
  lexicon: HALOT
  rationale: אָז situates the statement temporally relative to the narrative. 'Then'
    is concise and natural.
- source_word: יֹשֵׁב
  chosen: were then dwelling
  alternatives:
  - was dwelling
  - lived
  - inhabited
  lexicon: HALOT
  rationale: Although יֹשֵׁב is morphologically singular, the compound subject is
    collective/plural in sense. 'Were then dwelling' gives idiomatic English and preserves
    the durative participial idea better than a simple preterite.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering and may carry geographic-covenantal
    resonance in Genesis; ''country'' would flatten that nuance.'
