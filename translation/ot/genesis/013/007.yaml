theological_decisions:
- issue: Potential covenantal nuance of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the country
  rationale: Genesis often uses 'the land' with narrative and covenantal significance.
    While this verse is primarily descriptive, retaining 'land' avoids muting that
    resonance without importing extra theology.
  doctrine_reference: Translation philosophy §1, §5
