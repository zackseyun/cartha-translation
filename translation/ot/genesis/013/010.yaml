id: GEN.13.10
reference: Genesis 13:10
source:
  edition: WLC
  text: וַ/יִּשָּׂא ל֣וֹט אֶת עֵינָ֗י/ו וַ/יַּרְא֙ אֶת כָּל כִּכַּ֣ר הַ/יַּרְדֵּ֔ן כִּ֥י כֻלָּ֖/הּ מַשְׁקֶ֑ה לִ/פְנֵ֣י שַׁחֵ֣ת יְהוָ֗ה אֶת סְדֹם֙ וְ/אֶת עֲמֹרָ֔ה כְּ/גַן יְהוָה֙ כְּ/אֶ֣רֶץ מִצְרַ֔יִם בֹּאֲ/כָ֖ה צֹֽעַר־־־־׀־־־׃
translation:
  text: Lot lifted up his eyes and saw all the plain of the Jordan, that all of it was well watered before Yahweh destroyed Sodom and Gomorrah, like the garden of Yahweh, like the land of Egypt, as you go toward Zoar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Jordan Valley' or more literally 'all the circle of the Jordan.'
    reason: lexical_alternative
  - marker: b
    text: '''The garden of the LORD'' likely evokes the lushness associated with Eden.'
    reason: cross_reference
  - marker: c
    text: Or 'as one comes to Zoar.' The Hebrew expression marks direction toward Zoar.
    reason: lexical_alternative
  - marker: d
    text: Or 'that all of it was well watered'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  chosen: lifted up his eyes
  alternatives:
  - looked up
  lexicon: HALOT
  rationale: A Hebrew idiom for directing one's gaze. Retaining 'lifted up his eyes' preserves the narrative texture while remaining understandable in English.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  lexicon: HALOT
  rationale: Simple narrative verb of perception; 'saw' is the most direct rendering in context.
- source_word: כָּל כִּכַּר הַיַּרְדֵּן
  chosen: all the plain of the Jordan
  alternatives:
  - all the circle of the Jordan
  - all the Jordan Valley
  lexicon: HALOT
  rationale: כִּכָּר can denote a round district/plain. 'Plain of the Jordan' is idiomatic English and fits the geographical sense without over-literal awkwardness.
- source_word: כִּי כֻלָּהּ מַשְׁקֶה
  chosen: that all of it was well watered
  alternatives:
  - for all of it was watered
  - that it was entirely watered
  lexicon: HALOT
  rationale: מַשְׁקֶה here describes the region as abundantly watered/irrigated. 'Well watered' is natural English and captures the descriptive force.
- source_word: לִפְנֵי שַׁחֵת יְהוָה
  chosen: before the LORD destroyed
  alternatives:
  - before the LORD ruined
  - before the LORD laid waste
  lexicon: HALOT
  rationale: The preposition marks time ('before'), and שׁחת in this context refers to divine destruction of the cities. 'Destroyed' is the clearest English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּגַן יְהוָה
  chosen: like the garden of the LORD
  alternatives:
  - like the LORD's garden
  lexicon: HALOT
  rationale: A simile likely evoking Edenic luxuriance. The more formal phrasing preserves the Hebrew construction and intertextual resonance.
- source_word: כְּאֶרֶץ מִצְרַיִם
  chosen: like the land of Egypt
  alternatives:
  - like Egypt
  lexicon: HALOT
  rationale: Retaining 'land' reflects אֶרֶץ and keeps the comparison geographic and agricultural.
- source_word: בֹּאֲכָה צֹעַר
  chosen: as you go toward Zoar
  alternatives:
  - in the direction of Zoar
  - as one comes to Zoar
  lexicon: HALOT
  rationale: This idiom marks direction/approach. 'As you go toward Zoar' is natural modern English while preserving the second-person singular form's conventional directional sense.
