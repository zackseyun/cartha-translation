  from: that all of it was well watered
  to: for all of it was well watered
  rationale: The Hebrew construction 'he saw [the noun], that [clause describing the noun]' is rendered very literally. While not incorrect, it is slightly unnatural in English. Using 'for' instead of 'that' to render כִּי creates a more natural explanatory clause ('he saw the plain, for it was well watered'), improving the flow without losing the sense or structure of the original.
