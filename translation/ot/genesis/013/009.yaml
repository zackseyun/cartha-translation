id: GEN.13.9
reference: Genesis 13:9
source:
  edition: WLC
  text: הֲ/לֹ֤א כָל הָ/אָ֨רֶץ֙ לְ/פָנֶ֔י/ךָ הִפָּ֥רֶד נָ֖א מֵ/עָלָ֑/י אִם הַ/שְּׂמֹ֣אל
    וְ/אֵימִ֔נָה וְ/אִם הַ/יָּמִ֖ין וְ/אַשְׂמְאִֽילָה־־־׃
translation:
  text: Is not the whole land before you? Please separate from me. If you go to the
    left, then I will go to the right; and if you go to the right, then I will go
    to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical in the conditional clauses: literally, ''If the left,
      then I will go right; and if the right, then I will go left.'' The translation
      supplies ''go to'' for clear English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Isn't
  - Behold, is not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the formal force without sounding overly archaic.
- source_word: כָל הָאָרֶץ
  chosen: the whole land
  alternatives:
  - all the land
  - the entire land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the land/territory available for settlement, not
    the whole earth. 'The whole land' is natural English and contextually precise.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  - open to you
  lexicon: HALOT
  rationale: A spatial idiom meaning the land lies available before Lot. 'Before you'
    preserves the Hebrew image and remains idiomatic.
- source_word: הִפָּרֶד נָא מֵעָלַי
  chosen: Please separate from me
  alternatives:
  - Please part from me
  - Please go apart from me
  lexicon: HALOT
  rationale: Niphal imperative of פרד with particle נָא expresses a polite request.
    'Separate from me' is direct and faithful; 'please' captures נָא.
- source_word: אִם הַשְּׂמֹאל
  chosen: If you go to the left
  alternatives:
  - If to the left
  - If you choose the left
  lexicon: HALOT
  rationale: The Hebrew is elliptical, supplying the motion/choice from context. English
    requires an explicit verb; 'go to' is the least interpretive completion.
- source_word: וְאֵימִנָה
  chosen: then I will go to the right
  alternatives:
  - then I will turn right
  - I will go rightward
  lexicon: HALOT
  rationale: Directional form from ימין indicates movement toward the right side.
    'Then I will go to the right' makes the implied contrast explicit and readable.
- source_word: וְאִם הַיָּמִין
  chosen: and if you go to the right
  alternatives:
  - or if to the right
  - and if you choose the right
  lexicon: HALOT
  rationale: As with the first conditional phrase, the Hebrew is elliptical. Repeating
    'go to' yields clear parallel English.
- source_word: וְאַשְׂמְאִילָה
  chosen: then I will go to the left
  alternatives:
  - then I will turn left
  - I will go leftward
  lexicon: HALOT
  rationale: Cohortative-like directional form from שׂמאל expresses Abram's corresponding
    movement. 'Then I will go to the left' preserves the balanced structure of the
    offer.
