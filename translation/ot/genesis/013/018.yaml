id: GEN.13.18
reference: Genesis 13:18
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֣ל אַבְרָ֗ם וַ/יָּבֹ֛א וַ/יֵּ֛שֶׁב בְּ/אֵלֹנֵ֥י מַמְרֵ֖א אֲשֶׁ֣ר בְּ/חֶבְר֑וֹן וַ/יִּֽבֶן שָׁ֥ם מִזְבֵּ֖חַ לַֽ/יהוָֽה־׃פ
translation:
  text: So Abram moved his tent and came and settled by the oaks of Mamre, which are at Hebron, and there he built an altar to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the terebinths of Mamre'; the Hebrew term may refer to large trees such as oaks or terebinths.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to Yahweh''; rendered ''the LORD'' following the translation''s standard practice for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֶּאֱהַל
  chosen: moved his tent
  alternatives:
  - pitched his tent
  - journeyed with his tent
  lexicon: HALOT
  rationale: The verb from אהל refers to tenting or moving one's tent. In this context, after the command to traverse the land and before 'came and settled,' 'moved his tent' best captures the action naturally in English without over-literal awkwardness. 'Pitched his tent' is possible, but the following verbs already describe arrival and settlement.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: A common motion verb; 'came' preserves the narrative sequence straightforwardly. 'Arrived' is interpretive, and 'went' is less idiomatic in this English narrative flow.
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - dwelt
  - lived
  - stayed
  lexicon: HALOT
  rationale: '''Settled'' communicates residence in readable modern English while preserving the sense of taking up dwelling. ''Dwelt'' is more traditional but less natural for the target audience.'
- source_word: בְּאֵלֹנֵי מַמְרֵא
  chosen: by the oaks of Mamre
  alternatives:
  - among the terebinths of Mamre
  - by the great trees of Mamre
  lexicon: HALOT
  rationale: אֵלֹנֵי can denote large trees, often understood as oaks or terebinths. 'Oaks' is a clear, established rendering in English Bible tradition and reads naturally. Because the exact species is uncertain, the alternative 'terebinths' is preserved in a footnote.
- source_word: אֲשֶׁר בְּחֶבְרוֹן
  chosen: which are at Hebron
  alternatives:
  - which were in Hebron
  - at Hebron
  lexicon: HALOT
  rationale: This relative clause locates Mamre's oaks. 'Which are at Hebron' is natural and sufficiently literal. Present tense works idiomatically in English for geographic identification.
- source_word: וַיִּבֶן שָׁם מִזְבֵּחַ
  chosen: there he built an altar
  alternatives:
  - there he built an altar-place
  lexicon: HALOT
  rationale: מִזְבֵּחַ is the standard term for an altar. 'There' preserves שָׁם and highlights the location-specific act of worship.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding English convention. 'Yahweh' is preserved as an alternative in a footnote-worthy lexical note.
