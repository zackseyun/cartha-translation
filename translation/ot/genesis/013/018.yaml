- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tree species in אֵלֹנֵי מַמְרֵא
  chosen_reading: oaks of Mamre
  alternative_readings:
  - terebinths of Mamre
  rationale: The Hebrew term can refer to large trees and is traditionally rendered either 'oaks' or 'terebinths.' This is lexical rather than doctrinal, but the ambiguity should be preserved in a footnote rather than overstated in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension/ambiguity where genuine'
