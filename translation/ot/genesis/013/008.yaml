id: GEN.13.8
reference: Genesis 13:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אַבְרָ֜ם אֶל ל֗וֹט אַל נָ֨א תְהִ֤י מְרִיבָה֙ בֵּינִ֣/י וּ/בֵינֶ֔י/ךָ וּ/בֵ֥ין רֹעַ֖/י וּ/בֵ֣ין רֹעֶ֑י/ךָ כִּֽי אֲנָשִׁ֥ים אַחִ֖ים אֲנָֽחְנוּ־־־׃
translation:
  text: So Abram said to Lot, “Please, let there be no strife between me and you, and between my herdsmen and your herdsmen, for we are kinsmen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “we are close relatives” or “we are kinsmen.” Hebrew “brothers” can refer to broader family kinship, not only sons of the same parents.
    reason: alternative_reading
  - marker: b
    text: Or 'for we are men who are brothers'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So Abram said
  alternatives:
  - And Abram said
  - Then Abram said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English narrative flow while preserving sequence without sounding overly wooden.
- source_word: אַל נָא
  chosen: Please, let there be no
  alternatives:
  - Please do not let there be
  - I beg you, let there not be
  lexicon: HALOT
  rationale: אַל with the jussive תְהִי expresses a polite negative request; נָא softens it. 'Please, let there be no' captures both the prohibition and the courteous tone.
- source_word: תְהִי מְרִיבָה
  chosen: let there be no strife
  alternatives:
  - let there be no quarrel
  - let there be no contention
  lexicon: HALOT
  rationale: מְרִיבָה denotes dispute or contention. 'Strife' fits the interpersonal conflict here and is broad enough to include the dispute between the herdsmen as well.
- source_word: בֵּינִי וּבֵינֶיךָ
  chosen: between me and you
  alternatives:
  - between you and me
  - between us
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the repeated בין structure. 'Between us' is smoother but would flatten the explicit pairwise wording of the Hebrew.
- source_word: רֹעַי ... רֹעֶיךָ
  chosen: my herdsmen ... your herdsmen
  alternatives:
  - my shepherds ... your shepherds
  - those who pasture my flocks ... those who pasture your flocks
  lexicon: HALOT
  rationale: The participial form from רעה refers to those tending livestock. In the Abram-Lot context with mixed livestock, 'herdsmen' is more idiomatic and contextually precise than 'shepherds,' which can sound sheep-specific.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Abram's appeal. 'For' is concise and preserves the explanatory force.
- source_word: אֲנָשִׁים אַחִים אֲנָחְנוּ
  chosen: we are men who are brothers
  alternatives:
  - we are brothers
  - we are kinsmen
  - we are men, brothers
  lexicon: HALOT
  rationale: The Hebrew explicitly includes both אֲנָשִׁים ('men') and אַחִים ('brothers'). Rather than omit one element, this rendering preserves both, while signaling that the phrase stresses their male kin relationship. 'Brothers' alone is smoother but leaves אֲנָשִׁים untranslated.
