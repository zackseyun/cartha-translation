theological_decisions:
- issue: Meaning of אַחִים in relation to Abram and Lot
  chosen_reading: Rendered as 'brothers' while preserving the broader kinship sense in a footnote.
  alternative_readings:
  - kinsmen
  - close relatives
  rationale: Although Abram is Lot's uncle, Hebrew אָח/אַחִים can denote broader familial kinship. The main text keeps the literal 'brothers' to reflect the source wording and rhetorical force; a footnote preserves the idiomatic kinship sense for modern readers.
  doctrine_reference: Translation philosophy §3, §4, §5
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/013/008.json
  category: awkward_english
  tier: 1
  from: for we are men who are brothers
  to: for we are kinsmen
  rationale: The Hebrew phrase 'אֲנָשִׁים אַחִים' is an appositional construction, functioning as a single idiomatic unit meaning 'kinsmen' or 'brethren.' The current rendering, 'men who are brothers,' introduces a relative clause ('who are') that is absent in the Hebrew. This makes the English sound unnatural and overly analytical, losing the force of Abram's simple, powerful appeal to kinship. 'We are kinsmen' is a more accurate and idiomatic English equivalent. If the goal is to retain both Hebrew nouns, 'we are men, brothers' would be a less awkward construction that better reflects the apposition.
