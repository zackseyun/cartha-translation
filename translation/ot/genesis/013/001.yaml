id: GEN.13.1
reference: Genesis 13:1
source:
  edition: WLC
  text: וַ/יַּעַל֩ אַבְרָ֨ם מִ/מִּצְרַ֜יִם ה֠וּא וְ/אִשְׁתּ֧/וֹ וְ/כָל אֲשֶׁר ל֛/וֹ
    וְ/ל֥וֹט עִמּ֖/וֹ הַ/נֶּֽגְבָּ/ה־־׃
translation:
  text: So Abram went up from Egypt, he and his wife and all that he had, and Lot
    with him, to the Negev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the south.' The Hebrew negev can refer either to the southern
      region known as the Negev or more generally to the south/southland.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Although movement is from Egypt southward
    into Canaan/Negev, biblical geography often uses 'up' for travel from Egypt into
    the land. 'Went up' preserves the source verb and narrative idiom better than
    a flatter 'left' or 'traveled.'
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Straightforward source-oriented rendering of the preposition מן with
    the place name מִצְרַיִם.
- source_word: הוּא וְאִשְׁתּוֹ
  chosen: he and his wife
  alternatives:
  - he, along with his wife
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis or clarification; in English, 'he
    and his wife' naturally captures the appositional listing without awkward overemphasis.
- source_word: וְכָל אֲשֶׁר לוֹ
  chosen: and all that he had
  alternatives:
  - and all that belonged to him
  - and all his possessions
  lexicon: HALOT
  rationale: This phrase broadly includes all that belonged to Abram, likely possessions
    and dependents. 'All that he had' is a natural, sufficiently broad rendering that
    avoids narrowing the sense to material goods only.
- source_word: וְלוֹט עִמּוֹ
  chosen: and Lot with him
  alternatives:
  - and Lot was with him
  lexicon: HALOT
  rationale: A compact rendering that preserves the appended mention of Lot as a companion
    in the journey.
- source_word: הַנֶּגְבָּה
  chosen: to the Negev
  alternatives:
  - toward the Negev
  - into the Negev
  - to the south
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region of Canaan/Judah or more generally
    'southland.' Here it functions as a geographic destination, and 'the Negev' best
    preserves the place-name force while remaining readable. The directional ending
    is adequately represented by 'to.'
