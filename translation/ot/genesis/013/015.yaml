id: GEN.13.15
reference: Genesis 13:15
source:
  edition: WLC
  text: כִּ֧י אֶת כָּל הָ/אָ֛רֶץ אֲשֶׁר אַתָּ֥ה רֹאֶ֖ה לְ/ךָ֣ אֶתְּנֶ֑/נָּה וּֽ/לְ/זַרְעֲ/ךָ֖
    עַד עוֹלָֽם־־־־׃
translation:
  text: For all the land that you see, I will give to you and to your offspring forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your seed.' The Hebrew זֶרַע is a collective noun that can mean 'seed,'
      'offspring,' or 'descendants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the divine explanation/promise following the command
    to look over the land. 'For' best preserves the connective force in natural English
    without overstating causation.
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all this land
  lexicon: HALOT
  rationale: The phrase denotes the entirety of the land in view. 'All the land' is
    a natural rendering that preserves the comprehensiveness of כָּל with the singular
    collective noun אֶרֶץ.
- source_word: אֲשֶׁר אַתָּה רֹאֶה
  chosen: that you see
  alternatives:
  - which you are seeing
  - that you look upon
  lexicon: HALOT
  rationale: A straightforward relative clause. English simple present best conveys
    the Hebrew participial form in context.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: With נתן, the preposition ל commonly marks the recipient. 'To you' is
    the clearest idiomatic rendering.
- source_word: אֶתְּנֶנָּה
  chosen: I will give
  alternatives:
  - I am giving
  - I will grant
  lexicon: HALOT
  rationale: The imperfect of נתן here expresses future promise. 'I will give' is
    both accurate and idiomatic; 'grant' would add a nuance not required by the Hebrew.
- source_word: וּלְזַרְעֲךָ
  chosen: and to your offspring
  alternatives:
  - and to your seed
  - and to your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective noun that can denote seed/offspring/descendants.
    'Offspring' preserves the collective singular and avoids prematurely specifying
    plurality, while remaining readable modern English. 'Seed' is more formal but
    less natural in contemporary English; 'descendants' loses the singular collective
    texture.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for an age
  - perpetually
  lexicon: HALOT
  rationale: In covenant-promise context, עַד עוֹלָם is most naturally rendered 'forever.'
    This is the standard idiomatic English equivalent and preserves the durative force
    without awkwardness.
