theological_decisions:
- issue: Rendering the duration phrase עַד עוֹלָם in a land-promise context
  chosen_reading: forever
  alternative_readings:
  - for an age
  - perpetually
  rationale: The Hebrew phrase ordinarily denotes enduring, indefinite, or perpetual
    duration. In this promise context, 'forever' best reflects the plain sense without
    importing a specific eschatological system. The translation preserves the text's
    theological weight and leaves broader covenantal interpretation to readers and
    context.
  doctrine_reference: Preserve theological tension rather than resolve it.
