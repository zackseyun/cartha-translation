id: GEN.13.14
reference: Genesis 13:14
source:
  edition: WLC
  text: וַֽ/יהוָ֞ה אָמַ֣ר אֶל אַבְרָ֗ם אַחֲרֵי֙ הִפָּֽרֶד ל֣וֹט מֵֽ/עִמּ֔/וֹ שָׂ֣א נָ֤א עֵינֶ֨י/ךָ֙ וּ/רְאֵ֔ה מִן הַ/מָּק֖וֹם אֲשֶׁר אַתָּ֣ה שָׁ֑ם צָפֹ֥נָ/ה וָ/נֶ֖גְבָּ/ה וָ/קֵ֥דְמָ/ה וָ/יָֽמָּ/ה־־־־׃
translation:
  text: 'And Yahweh said to Abram, after Lot had separated from him, “Please lift up your eyes and look from the place where you are: northward and southward and eastward and westward.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project default rendering ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  chosen: And the LORD
  alternatives:
  - And Yahweh
  - Now the LORD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered by the project default 'the LORD' per doctrine. The prefixed conjunction is carried as 'And' to preserve narrative continuity.
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative verb for speech; 'said' is the most natural and direct rendering here.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name is transliterated by standard convention, consistent with the translation philosophy.
- source_word: אַחֲרֵי הִפָּרֶד לוֹט מֵעִמּוֹ
  chosen: after Lot had separated from him
  alternatives:
  - after Lot separated from him
  - after Lot parted from him
  lexicon: HALOT
  rationale: 'The infinitive construct with אַחֲרֵי marks subsequent time, and the Niphal of פרד is intransitive/passive-reflexive in sense: ''had separated.'' ''From him'' correctly represents מֵעִמּוֹ, referring to Abram.'
- source_word: שָׂא נָא
  chosen: Please lift up
  alternatives:
  - Lift up, please
  - Raise
  lexicon: HALOT
  rationale: שָׂא is an imperative 'lift up/carry'; with נָא it expresses a polite or softened entreaty. 'Please lift up' preserves both the imperative and the nuance of נָא in readable English.
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - your gaze
  lexicon: HALOT
  rationale: 'A literal rendering fits the idiom well in English: ''lift up your eyes.'''
- source_word: וּרְאֵה
  chosen: and look
  alternatives:
  - and see
  lexicon: HALOT
  rationale: '''Look'' better matches the imperative invitation to direct sight over the land, while remaining faithful to ראה.'
- source_word: מִן הַמָּקוֹם אֲשֶׁר אַתָּה שָׁם
  chosen: from the place where you are
  alternatives:
  - from the place where you are standing
  - from the place where you are there
  lexicon: HALOT
  rationale: This phrase identifies Abram's vantage point. English naturally omits a separate rendering of שָׁם ('there') because 'where you are' already conveys the locative sense; 'standing' would add specificity not present in the Hebrew.
- source_word: צָפֹנָה וָנֶגְבָּה וָקֵדְמָה וָיָמָּה
  chosen: northward and southward and eastward and westward
  alternatives:
  - to the north and to the south and to the east and to the west
  lexicon: HALOT
  rationale: The directional forms with -ה indicate direction toward the compass points. 'Northward ... westward' is concise and preserves the directional force.
