id: GEN.13.3
reference: Genesis 13:3
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ֙ לְ/מַסָּעָ֔י/ו מִ/נֶּ֖גֶב וְ/עַד בֵּֽית אֵ֑ל עַד הַ/מָּק֗וֹם
    אֲשֶׁר הָ֨יָה שָׁ֤ם אהל/ה בַּ/תְּחִלָּ֔ה בֵּ֥ין בֵּֽית אֵ֖ל וּ/בֵ֥ין הָ/עָֽי־־־־־׃
translation:
  text: And he journeyed by stages from the Negev as far as Bethel, to the place where
    his tent had been at the beginning, between Bethel and Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to his journeys,' that is, moving in successive stages from
      campsite to campsite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: And he journeyed
  alternatives:
  - And he went
  - And he traveled
  lexicon: HALOT
  rationale: הלך is the common verb 'to go/walk,' but in travel narrative with route
    details it is naturally rendered 'journeyed' in English to reflect movement over
    distance without over-paraphrasing.
- source_word: לְמַסָּעָיו
  chosen: by stages
  alternatives:
  - according to his journeys
  - from place to place
  - in stages
  lexicon: HALOT
  rationale: מַסָּע refers to a breaking camp/stage of travel. The plural with prefixed
    ל here idiomatically describes the manner of travel. 'By stages' captures the
    sense of successive travel segments better than the overly literal 'according
    to his journeys.'
- source_word: מִנֶּגֶב
  chosen: from the Negev
  alternatives:
  - from the south
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or specifically the Negev region. In the patriarchal
    geographical setting, the regional sense is more precise and preferable.
- source_word: וְעַד בֵּית אֵל
  chosen: as far as Bethel
  alternatives:
  - and to Bethel
  - up to Bethel
  lexicon: HALOT
  rationale: עַד marks extent/limit. 'As far as Bethel' expresses the endpoint of
    the journey naturally in English.
- source_word: עַד הַמָּקוֹם
  chosen: to the place
  alternatives:
  - as far as the place
  lexicon: HALOT
  rationale: A second עַד narrows the destination more specifically. English idiom
    prefers 'to the place' here rather than repeating 'as far as' woodenly.
- source_word: אֲשֶׁר הָיָה שָׁם אָהֳלֹה
  chosen: where his tent had been
  alternatives:
  - where his tent was
  - where his tent had been there
  lexicon: HALOT
  rationale: The clause identifies a prior location of Abram's tent. English past
    perfect ('had been') best reflects the retrospective sense relative to the current
    journey. שָׁם is absorbed idiomatically into 'where' rather than rendered separately
    as awkward 'there.'
- source_word: בַּתְּחִלָּה
  chosen: at the beginning
  alternatives:
  - at first
  - formerly
  lexicon: HALOT
  rationale: The phrase points back to Abram's earlier encampment in the narrative.
    'At the beginning' is a clear, natural rendering that preserves the temporal reference.
- source_word: בֵּין בֵּית אֵל וּבֵין הָעָי
  chosen: between Bethel and Ai
  alternatives:
  - between Bethel and the Ai
  lexicon: HALOT
  rationale: בֵּין ... וּבֵין marks the location between two places. הָעָי is the
    place-name Ai; the article is part of the Hebrew form and is not normally represented
    in English transliteration.
