id: GEN.13.11
reference: Genesis 13:11
source:
  edition: WLC
  text: וַ/יִּבְחַר ל֣/וֹ ל֗וֹט אֵ֚ת כָּל כִּכַּ֣ר הַ/יַּרְדֵּ֔ן וַ/יִּסַּ֥ע ל֖וֹט
    מִ/קֶּ֑דֶם וַ/יִּפָּ֣רְד֔וּ אִ֖ישׁ מֵ/עַ֥ל אָחִֽי/ו־־׃
translation:
  text: So Lot chose for himself all the plain of the Jordan, and Lot set out eastward;
    and they separated, each man from his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the east.' The Hebrew phrase may indicate either direction of
      travel or point of origin.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְחַר לּוֹ
  chosen: chose for himself
  alternatives:
  - chose
  - selected for himself
  lexicon: HALOT
  rationale: The verb בחר means 'choose/select.' The dative לּוֹ is retained idiomatically
    as 'for himself,' highlighting Lot's personal choice rather than omitting the
    pronoun.
- source_word: כָּל כִּכַּר הַיַּרְדֵּן
  chosen: all the plain of the Jordan
  alternatives:
  - all the circle of the Jordan
  - all the Jordan Valley
  lexicon: HALOT
  rationale: כִּכָּר literally denotes a round district/circle, but in this geographical
    context it refers to the level plain/valley region around the Jordan. 'Plain'
    is natural English and preserves the sense without over-literal awkwardness.
- source_word: וַיִּסַּע
  chosen: set out
  alternatives:
  - journeyed
  - traveled
  - moved on
  lexicon: HALOT
  rationale: נסע commonly means to pull up camp and journey. 'Set out' captures the
    narrative movement in readable modern English better than the more archaic 'journeyed.'
- source_word: מִקֶּדֶם
  chosen: eastward
  alternatives:
  - from the east
  lexicon: HALOT
  rationale: The phrase can be understood either directionally ('eastward') or as
    indicating point of origin ('from the east'). In this context, the traditional
    and contextually smoother sense is Lot's movement toward the east. Because the
    Hebrew form admits the alternative, it is preserved in a footnote.
- source_word: וַיִּפָּרְדוּ
  chosen: they separated
  alternatives:
  - they parted
  lexicon: HALOT
  rationale: The Niphal of פרד expresses mutual separation. 'They separated' is clear,
    natural, and preserves the reciprocal sense.
- source_word: אִישׁ מֵעַל אָחִיו
  chosen: each man from his brother
  alternatives:
  - one man from his brother
  - each from his brother
  lexicon: HALOT
  rationale: 'The Hebrew is singular distributive: literally ''a man from upon his
    brother,'' meaning each one from the other as kin. ''Each man from his brother''
    preserves both the distributive force and the familial language, in line with
    the gender-accurate policy.'
