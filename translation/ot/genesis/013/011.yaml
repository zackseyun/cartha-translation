theological_decisions:
- issue: Gendered kinship language
  chosen_reading: each man from his brother
  alternative_readings:
  - each one from the other
  - each from his relative
  rationale: The Hebrew uses masculine singular distributive language with the kinship
    term 'brother.' There is no doctrinal pressure here, but the translation follows
    the stated gender-accurate policy and preserves the familial nuance rather than
    neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Directional ambiguity of מִקֶּדֶם
  chosen_reading: eastward
  alternative_readings:
  - from the east
  rationale: The phrase is syntactically ambiguous. The main text adopts 'eastward'
    as the most contextually coherent reading in the Abram-Lot travel narrative, while
    preserving 'from the east' in a footnote to maintain transparency and avoid overstating
    certainty.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
