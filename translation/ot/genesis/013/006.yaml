  from: because their possessions were so great that they could not live together
  to: because their possessions were too great for them to live together
  rationale: The current rendering creates a slight awkwardness with the repetition of 'could not' ('the land could not support... they could not live'). While the Hebrew expresses inability in both clauses, it uses different verbs. The suggested rewrite using the 'too... for...' construction avoids this repetition, resulting in a smoother and more elegant English sentence while preserving the original meaning and logical flow.
