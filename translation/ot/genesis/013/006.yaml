id: GEN.13.6
reference: Genesis 13:6
source:
  edition: WLC
  text: וְ/לֹא נָשָׂ֥א אֹתָ֛/ם הָ/אָ֖רֶץ לָ/שֶׁ֣בֶת יַחְדָּ֑ו כִּֽי הָיָ֤ה רְכוּשָׁ/ם֙ רָ֔ב וְ/לֹ֥א יָֽכְל֖וּ לָ/שֶׁ֥בֶת יַחְדָּֽו־־׃
translation:
  text: And the land could not support them living together, because their possessions were too great for them to live together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land did not bear them' / 'the land could not sustain them.' The Hebrew uses the verb 'bear/carry' idiomatically for the land's inability to support both households.
    reason: lexical_alternative
  - marker: b
    text: Or 'because their possessions were so great that they could not live together'.
    reason: previous_rendering
lexical_decisions:
- source_word: נָשָׂא
  chosen: could not support
  alternatives:
  - did not bear
  - could not sustain
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry/bear,' but with 'the land' as subject and the infinitive 'to dwell,' the idiom indicates the land's inability to sustain both parties. 'Could not support' is natural English that preserves the sense without over-paraphrasing.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In the Abram-Lot narrative this refers to the local territory/pastureland available to them, not the whole earth. 'The land' is the most contextually appropriate and standard rendering.
- source_word: לָשֶׁבֶת
  chosen: living
  alternatives:
  - to dwell
  - to sit
  - to settle
  lexicon: HALOT
  rationale: The infinitive of ישׁב commonly means 'to dwell/live.' In English, after 'support them,' the gerund 'living' yields idiomatic syntax while preserving the habitation sense.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - jointly
  - with one another
  lexicon: HALOT
  rationale: The adverb straightforwardly means 'together.' It is repeated in the Hebrew and retained in both clauses for emphasis and cohesion.
- source_word: רְכוּשָׁם
  chosen: their possessions
  alternatives:
  - their property
  - their goods
  - their livestock and goods
  lexicon: HALOT
  rationale: The noun denotes acquired property/possessions broadly. 'Possessions' is accurate and sufficiently broad, allowing the context to imply flocks and material wealth without narrowing the term.
- source_word: רָב
  chosen: so great
  alternatives:
  - many
  - much
  - abundant
  lexicon: HALOT
  rationale: With a collective noun like 'possessions,' English idiom prefers a qualitative expression such as 'so great' rather than 'many.' This captures the idea of abundance causing the problem.
- source_word: יָכְלוּ
  chosen: they could not
  alternatives:
  - they were not able
  - they were unable
  lexicon: HALOT
  rationale: This is the standard sense of יכל. 'They could not' is concise, natural, and preserves the repeated inability motif of the verse.
