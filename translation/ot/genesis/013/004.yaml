theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the worship idiom קרא בשם יהוה
  chosen_reading: called on the name of the LORD
  alternative_readings:
  - proclaimed the name of the LORD
  - invoked the LORD by name
  rationale: The Hebrew idiom can involve invocation, proclamation, or worshipful appeal. 'Called on the name of the LORD' best preserves the idiomatic and theological breadth without over-interpreting toward either public proclamation or private prayer alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
