id: GEN.13.4
reference: Genesis 13:4
source:
  edition: WLC
  text: אֶל מְקוֹם֙ הַ/מִּזְבֵּ֔חַ אֲשֶׁר עָ֥שָׂה שָׁ֖ם בָּ/רִאשֹׁנָ֑ה וַ/יִּקְרָ֥א שָׁ֛ם אַבְרָ֖ם בְּ/שֵׁ֥ם יְהוָֽה־־׃
translation:
  text: to the place of the altar that he had made there at first. And there Abram called on the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
  - marker: b
    text: Or 'proclaimed the name of the LORD' / 'invoked the LORD by name.' The Hebrew idiom can carry both invocation and proclamation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹם
  chosen: place
  alternatives:
  - site
  - location
  lexicon: HALOT
  rationale: Basic locative noun; 'place' is the most natural and sufficiently formal rendering in context.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Definite noun referring back to the altar Abram previously built (Gen 12:8; 13:3). 'Altar' is the standard and precise cultic term.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - that he made
  - which he had built
  lexicon: HALOT
  rationale: The relative clause modifies 'altar.' Although עשה is literally 'made,' English past perfect ('had made') fits the narrative sequence. 'Built' is possible contextually for an altar, but 'made' stays closer to the Hebrew verb.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple adverb of place; retained both times for the Hebrew's repetition and narrative emphasis.
- source_word: בָּרִאשֹׁנָה
  chosen: at first
  alternatives:
  - formerly
  - in the beginning
  - earlier
  lexicon: HALOT
  rationale: Here it points to Abram's earlier visit and altar construction at this location. 'At first' is concise and idiomatic while preserving the temporal reference.
- source_word: וַיִּקְרָא
  chosen: called on
  alternatives:
  - proclaimed
  - invoked
  - called
  lexicon: HALOT
  rationale: In the idiom קרא בשם יהוה, the sense is invocation/worship directed to YHWH, not merely speaking a name aloud. 'Called on' is the established and contextually accurate English rendering.
- source_word: בְּשֵׁם יְהוָה
  chosen: on the name of the LORD
  alternatives:
  - in the name of the LORD
  - the name of Yahweh
  lexicon: HALOT
  rationale: With קרא, the preposition plus 'name' forms the idiom 'call on the name of.' Per doctrine, יְהוָה is rendered 'the LORD' in the main text; 'Yahweh' is preserved as an alternative in a footnote.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַבְרָם
  chosen: Abram
  lexicon: HALOT
  rationale: Personal name is transliterated by standard convention, per translation philosophy.
