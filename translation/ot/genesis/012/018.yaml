id: GEN.12.18
reference: Genesis 12:18
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א פַרְעֹה֙ לְ/אַבְרָ֔ם וַ/יֹּ֕אמֶר מַה זֹּ֖את עָשִׂ֣יתָ לִּ֑/י
    לָ֚/מָּה לֹא הִגַּ֣דְתָּ לִּ֔/י כִּ֥י אִשְׁתְּ/ךָ֖ הִֽוא־־׃
translation:
  text: Then Pharaoh called Abram and said, “What is this you have done to me? Why
    did you not tell me that she is your wife?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with לְ plus person commonly means to call to or summon
    someone. 'Called' is natural modern English and fits the narrative flow; 'summoned'
    is possible but slightly stronger than the context requires.
- source_word: פַרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name used in Genesis.
- source_word: לְאַבְרָם
  chosen: Abram
  lexicon: HALOT
  rationale: Personal name is transliterated, following the translation philosophy
    to transliterate names rather than translate them.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: The common narrative verb אמר is best rendered 'said.' Although the following
    words are interrogative, English naturally uses 'said' before direct questions.
- source_word: מַה זֹּאת
  chosen: What is this
  alternatives:
  - What is this thing
  - What have you done
  lexicon: HALOT
  rationale: This preserves the demonstrative force of the Hebrew expression rather
    than collapsing it immediately into a smoother idiom. It introduces the following
    verb phrase naturally in English.
- source_word: עָשִׂיתָ לִּי
  chosen: you have done to me
  alternatives:
  - you did to me
  - you have done against me
  lexicon: HALOT
  rationale: The perfect with direct address is well represented by English present
    perfect in this rebuke context. The prepositional phrase לִּי is retained as 'to
    me,' preserving Pharaoh's sense of personal grievance.
- source_word: לָמָּה
  chosen: Why
  lexicon: HALOT
  rationale: Straightforward interrogative rendering.
- source_word: לֹא הִגַּדְתָּ לִּי
  chosen: did you not tell me
  alternatives:
  - did you not inform me
  - have you not told me
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, declare, or make known. 'Tell me' is
    the most natural and readable English here.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Abram failed to disclose, so
    'that' is the best English complementizer.
- source_word: אִשְׁתְּךָ הִוא
  chosen: she is your wife
  alternatives:
  - she was your wife
  lexicon: HALOT
  rationale: Hebrew nominal clause with pronoun emphasis is naturally rendered 'she
    is your wife.' Fronting 'she' in English preserves the referent clearly without
    awkwardness.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives readable modern
    English while preserving sequence better than a mechanically repeated 'And'.
