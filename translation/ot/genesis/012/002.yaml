theological_decisions:
- issue: Force of וֶהְיֵה בְּרָכָה
  chosen_reading: 'imperatival: ''and be a blessing'''
  alternative_readings:
  - 'resultative/predictive: ''and you will be a blessing'''
  rationale: The Hebrew form is imperative (Qal imperative 2ms), so the main text
    should preserve that force rather than smoothing it into a prediction. At the
    same time, the clause stands within a sequence of divine promises, so some interpreters
    understand it as effectively resultative; that alternative is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
revisions:
- timestamp: '2026-04-21T00:17:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/012/002.json
  category: awkward_english
  tier: 1
  from: ; and be a blessing
  to: . Be a blessing.
  rationale: The draft correctly renders the Hebrew imperative וֶהְיֵה. However, the
    shift from the preceding future-tense promises to this command is abrupt in English.
    Using a period instead of a semicolon would make the shift more deliberate and
    rhetorically forceful, turning the final phrase into a standalone, punchy injunction
    that follows from God's promises.
