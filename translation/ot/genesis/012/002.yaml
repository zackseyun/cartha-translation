id: GEN.12.2
reference: Genesis 12:2
source:
  edition: WLC
  text: וְ/אֶֽעֶשְׂ/ךָ֙ לְ/ג֣וֹי גָּד֔וֹל וַ/אֲבָ֣רֶכְ/ךָ֔ וַ/אֲגַדְּלָ֖ה שְׁמֶ֑/ךָ
    וֶ/הְיֵ֖ה בְּרָכָֽה׃
translation:
  text: And I will make you into a great nation, and I will bless you, and I will
    make your name great, and be a blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and you will be a blessing.' The Hebrew form is imperative ('be'),
      but some take it as expressing the result of God's promises.
    reason: alternative_reading
  - marker: b
    text: Or '; and be a blessing'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְאֶעֶשְׂךָ
  chosen: And I will make you
  alternatives:
  - And I will make of you
  - And I will make you become
  lexicon: HALOT
  rationale: עשה with object suffix here means 'make' in the sense of constituting
    Abram as something. 'Make you into' in English naturally carries the following
    predicate phrase.
- source_word: לְגוֹי גָּדוֹל
  chosen: into a great nation
  alternatives:
  - a great people
  lexicon: HALOT
  rationale: גוי commonly denotes a nation/people-group. 'Nation' is the standard
    and most contextually fitting rendering in the patriarchal promise context. The
    preposition ל is well represented by 'into' after 'make you.'
- source_word: וַאֲבָרֶכְךָ
  chosen: and I will bless you
  lexicon: HALOT
  rationale: ברך in the piel straightforwardly means 'bless.' Retaining the direct
    object 'you' preserves the personal dimension of the promise.
- source_word: וַאֲגַדְּלָה שְׁמֶךָ
  chosen: and I will make your name great
  alternatives:
  - and I will magnify your name
  - and I will make your reputation great
  lexicon: HALOT
  rationale: גדל means 'make great.' While 'reputation' captures an implication of
    שם in some contexts, 'name' should be retained in the main text for formal transparency
    and biblical resonance.
- source_word: וֶהְיֵה
  chosen: and be
  alternatives:
  - so that you will be
  - and you will be
  lexicon: HALOT
  rationale: This is a 2ms imperative of היה, not a simple future. Rendering it as
    'be' preserves the grammatical force and the rhetorical shift from divine promises
    to Abram's resulting role or calling.
- source_word: בְּרָכָה
  chosen: a blessing
  alternatives:
  - blessing
  lexicon: HALOT
  rationale: The noun is indefinite singular. 'A blessing' is the most natural English
    rendering and preserves the sense that Abram is to become a source or embodiment
    of blessing.
