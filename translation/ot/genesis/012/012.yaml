  from: And it will happen that when
  to: And it will be that when
  rationale: The phrase 'And it will happen that when' is a slightly clunky, literal rendering of the Hebrew idiom וְהָיָה כִּי. While not incorrect, a smoother and more common English rendering that still preserves the introductory formula would be 'And it will be that when...' or, more dynamically, simply 'And when...'.
