id: GEN.12.12
reference: Genesis 12:12
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּֽי יִרְא֤וּ אֹתָ/ךְ֙ הַ/מִּצְרִ֔ים וְ/אָמְר֖וּ אִשְׁתּ֣/וֹ זֹ֑את וְ/הָרְג֥וּ אֹתִ֖/י וְ/אֹתָ֥/ךְ יְחַיּֽוּ־׃
translation:
  text: And it will be that when the Egyptians see you, they will say, ‘This is his wife,’ and they will kill me, but they will let you live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and they will keep you alive' or 'and they will spare your life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And it will happen that when'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall be
  - And when it happens
  lexicon: HALOT
  rationale: Uses a natural future-oriented English rendering of היה with prefixed conjunction, preserving the anticipatory force without archaic diction.
- source_word: כִּי
  chosen: that when
  alternatives:
  - when
  - if
  lexicon: HALOT
  rationale: In context introduces the content/situation Abram anticipates; combined with the following verb it is best represented as 'that when' to reflect the Hebrew sequence smoothly in English.
- source_word: יִרְאוּ אֹתָךְ
  chosen: see you
  alternatives:
  - look at you
  lexicon: HALOT
  rationale: ראה here is the ordinary verb for seeing; 'see you' is the plain sense.
- source_word: הַמִּצְרִים
  chosen: the Egyptians
  alternatives:
  - the Egyptian people
  lexicon: HALOT
  rationale: Standard ethnic/national designation; definite article retained.
- source_word: וְאָמְרוּ
  chosen: they will say
  alternatives:
  - they will think and say
  lexicon: HALOT
  rationale: Simple future narrative sequence; no need to expand beyond the speech verb.
- source_word: אִשְׁתּוֹ זֹאת
  chosen: This is his wife
  alternatives:
  - She is his wife
  - This woman is his wife
  lexicon: HALOT
  rationale: Hebrew nominal clause literally 'his wife, this'; English idiomatically renders it as direct identification. 'This is his wife' preserves the demonstrative force of זאת.
- source_word: וְהָרְגוּ אֹתִי
  chosen: they will kill me
  alternatives:
  - they will murder me
  lexicon: HALOT
  rationale: הרג is the standard verb 'kill/slay.' 'Kill me' is the most direct and contextually appropriate rendering.
- source_word: וְאֹתָךְ יְחַיּוּ
  chosen: but they will let you live
  alternatives:
  - and they will keep you alive
  - and they will spare your life
  lexicon: HALOT
  rationale: The Hiphil of חיה means 'keep alive, let live.' English idiom prefers 'let you live' here; 'but' makes explicit the adversative sense naturally implied in the contrast with 'they will kill me.'
