id: GEN.12.8
reference: Genesis 12:8
source:
  edition: WLC
  text: וַ/יַּעְתֵּ֨ק מִ/שָּׁ֜ם הָ/הָ֗רָ/ה מִ/קֶּ֛דֶם לְ/בֵֽית אֵ֖ל וַ/יֵּ֣ט אָהֳלֹ֑/ה בֵּֽית אֵ֤ל מִ/יָּם֙ וְ/הָ/עַ֣י מִ/קֶּ֔דֶם וַ/יִּֽבֶן שָׁ֤ם מִזְבֵּ֨חַ֙ לַֽ/יהוָ֔ה וַ/יִּקְרָ֖א בְּ/שֵׁ֥ם יְהוָֽה־־־׃
translation:
  text: From there he moved to the hill country east of Bethel and pitched his tent, with Bethel on the west and Ai on the east. There he built an altar to Yahweh and called on the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "proclaimed the name of the LORD." The Hebrew expression can mean invoking the LORD in worship or publicly declaring his name.
    reason: alternative_reading
  - marker: b
    text: Hebrew "YHWH"; traditionally rendered "the LORD."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעְתֵּק
  chosen: he moved
  alternatives:
  - he journeyed on
  - he relocated
  - he pulled up and moved
  lexicon: HALOT
  rationale: The verb denotes moving or shifting from one place to another. 'He moved' is natural modern English and preserves the narrative sense without over-paraphrasing.
- source_word: הָהָרָה
  chosen: to the hill country
  alternatives:
  - to the mountain
  - toward the hill country
  lexicon: HALOT
  rationale: The directional ending on הַר indicates motion toward the hill region. In this geographic context, 'hill country' is more idiomatic than the singular 'mountain' and fits the broader terrain near Bethel.
- source_word: מִקֶּדֶם לְבֵית אֵל
  chosen: east of Bethel
  alternatives:
  - from the east of Bethel
  - to the east of Bethel
  lexicon: HALOT
  rationale: קֶדֶם here functions spatially, indicating the eastern side relative to Bethel. 'East of Bethel' communicates the location clearly in English.
- source_word: וַיֵּט אָהֳלֹה
  chosen: and pitched his tent
  alternatives:
  - and stretched out his tent
  - and set up his tent
  lexicon: HALOT
  rationale: The idiom means to pitch or set up a tent. 'Pitched his tent' is the standard natural equivalent.
- source_word: מִיָּם
  chosen: on the west
  alternatives:
  - toward the sea
  - to the west
  lexicon: HALOT
  rationale: יָם can literally mean 'sea,' but in geographic orientation it commonly means 'west,' reflecting the Mediterranean. Here it marks Bethel's position relative to Abram's camp.
- source_word: וְהָעַי מִקֶּדֶם
  chosen: and Ai on the east
  alternatives:
  - and Ai to the east
  - with Ai eastward
  lexicon: HALOT
  rationale: This balances the previous locator and clearly describes the camp's position between Bethel and Ai.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for a structure used for sacrifice or worship.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text, following the project's default for the divine name.
- source_word: וַיִּקְרָא בְּשֵׁם יְהוָה
  chosen: and called on the name of the LORD
  alternatives:
  - and proclaimed the name of the LORD
  - and invoked the name of the LORD
  lexicon: HALOT
  rationale: The phrase can denote invocation in worship and possibly proclamation. 'Called on the name of the LORD' preserves the established biblical idiom and the likely worshipful sense without excluding public confession.
