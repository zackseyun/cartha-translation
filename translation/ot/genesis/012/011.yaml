id: GEN.12.11
reference: Genesis 12:11
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֥ר הִקְרִ֖יב לָ/ב֣וֹא מִצְרָ֑יְמָ/ה וַ/יֹּ֨אמֶר֙ אֶל שָׂרַ֣י
    אִשְׁתּ֔/וֹ הִנֵּה נָ֣א יָדַ֔עְתִּי כִּ֛י אִשָּׁ֥ה יְפַת מַרְאֶ֖ה אָֽתְּ־־־׃
translation:
  text: And it happened, when he was about to enter Egypt, that he said to Sarai his
    wife, “Look now, I know that you are a woman beautiful in appearance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “beautiful to look at.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And
    it happened' preserves the Hebrew discourse function without archaic diction like
    'came to pass.'
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - just as
  lexicon: HALOT
  rationale: Temporal conjunction here introducing the circumstance under which Abram
    spoke. 'When' is the most natural English equivalent in context.
- source_word: הִקְרִיב לָבוֹא
  chosen: was about to enter
  alternatives:
  - came near to enter
  - approached to enter
  lexicon: HALOT
  rationale: The Hiphil of קרב with infinitive בוא expresses drawing near for the
    purpose of entering. 'Was about to enter' captures both proximity and imminent
    action in idiomatic English.
- source_word: מִצְרָיְמָה
  chosen: Egypt
  lexicon: HALOT
  rationale: Directional ending on the place name indicates motion toward Egypt; English
    idiom simply uses 'enter Egypt.'
- source_word: וַיֹּאמֶר אֶל
  chosen: that he said to
  alternatives:
  - and he said to
  lexicon: HALOT
  rationale: Standard speech introduction. Including 'that' smooths the English after
    the temporal clause while preserving the reported speech structure.
- source_word: שָׂרַי אִשְׁתּוֹ
  chosen: Sarai his wife
  alternatives:
  - his wife Sarai
  lexicon: HALOT
  rationale: Retains the Hebrew appositional identification and keeps the personal
    name transliterated per project philosophy.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Behold now
  - See now
  - Listen
  lexicon: HALOT
  rationale: Combination of attention marker and particle of entreaty/emphasis. 'Look
    now' preserves the immediacy and conversational force without archaic 'behold.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I realize
  lexicon: HALOT
  rationale: Perfect of ידע can express present state resulting from knowledge. 'I
    know' is the most natural English rendering here.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what Abram knows. 'That' best fits English
    indirect discourse.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a female
  lexicon: HALOT
  rationale: Here the noun denotes Sarai as a woman, not specifically in her marital
    role, since that role was already stated with 'his wife.'
- source_word: יְפַת מַרְאֶה
  chosen: beautiful in appearance
  alternatives:
  - beautiful to look at
  - fair of appearance
  - beautiful in form
  lexicon: HALOT
  rationale: Construct phrase meaning beautiful in visible appearance. 'Beautiful
    in appearance' is clear, natural, and close to the Hebrew wording.
- source_word: אָתְּ
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: Independent pronoun gives explicit predication in English; 'you are'
    is required for a complete natural sentence.
