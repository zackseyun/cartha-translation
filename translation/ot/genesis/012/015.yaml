id: GEN.12.15
reference: Genesis 12:15
source:
  edition: WLC
  text: וַ/יִּרְא֤וּ אֹתָ/הּ֙ שָׂרֵ֣י פַרְעֹ֔ה וַ/יְהַֽלְל֥וּ אֹתָ֖/הּ אֶל פַּרְעֹ֑ה
    וַ/תֻּקַּ֥ח הָ/אִשָּׁ֖ה בֵּ֥ית פַּרְעֹֽה־׃
translation:
  text: When Pharaoh’s officials saw her, they praised her to Pharaoh, and the woman
    was taken into Pharaoh’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they commended her to Pharaoh' / 'they spoke well of her to Pharaoh.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house'; this may imply Pharaoh’s royal household, not merely the
      physical building.
    reason: cultural_note
lexical_decisions:
- source_word: שָׂרֵי פַרְעֹה
  chosen: Pharaoh’s officials
  alternatives:
  - Pharaoh’s princes
  - Pharaoh’s chiefs
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, officials, or princes. In this court setting,
    'officials' is natural modern English and preserves their status without implying
    royal sonship.
- source_word: וַיְהַלְלוּ אֹתָהּ אֶל־פַּרְעֹה
  chosen: they praised her to Pharaoh
  alternatives:
  - they commended her to Pharaoh
  - they spoke well of her to Pharaoh
  lexicon: HALOT
  rationale: The piel of הלל here means to praise or commend. 'Praised her to Pharaoh'
    is a straightforward rendering that fits the narrative context of reporting her
    beauty favorably to him.
- source_word: וַתֻּקַּח
  chosen: was taken
  alternatives:
  - was brought
  - was taken away
  lexicon: HALOT
  rationale: The verb is passive/medio-passive in form here, so 'was taken' preserves
    the Hebrew's lack of explicit agent and the woman's passivity in the event.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  - the woman Sarai
  lexicon: HALOT
  rationale: The Hebrew says simply 'the woman.' Rendering it directly avoids importing
    'wife,' which is not the lexical form used here, even though the referent is Abram's
    wife.
- source_word: בֵּית פַּרְעֹה
  chosen: into Pharaoh’s house
  alternatives:
  - to Pharaoh’s house
  - into the house of Pharaoh
  - into Pharaoh’s palace
  lexicon: HALOT
  rationale: בַּיִת can mean house or household; here it refers to Pharaoh's residence/harem
    context. 'Into Pharaoh’s house' is faithful to the Hebrew while remaining readable;
    'palace' would be interpretive.
- source_word: וַיִּרְאוּ אֹתָהּ
  chosen: saw her
  alternatives:
  - looked at her
  lexicon: HALOT
  rationale: ראה is the ordinary verb 'to see.' No expansion beyond the plain narrative
    sense is warranted.
