id: GEN.12.1
reference: Genesis 12:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל אַבְרָ֔ם לֶךְ לְ/ךָ֛ מֵ/אַרְצְ/ךָ֥ וּ/מִ/מּֽוֹלַדְתְּ/ךָ֖
    וּ/מִ/בֵּ֣ית אָבִ֑י/ךָ אֶל הָ/אָ֖רֶץ אֲשֶׁ֥ר אַרְאֶֽ/ךָּ־־־׃
translation:
  text: Now the LORD said to Abram, “Go out from your land, from your kindred, and
    from your father’s house to the land that I will show you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Go for yourself'' or ''Go yourself''; an idiomatic command of
      departure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
    Small-caps formatting is represented here as 'LORD'.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The verb אמר commonly means 'say.' 'Said' is the most natural English
    rendering here. I supplied 'Now' to reflect the narrative waw in smooth English
    without overstating sequence.
- source_word: לֶךְ לְךָ
  chosen: Go out
  alternatives:
  - Go
  - Go for yourself
  - Get yourself out
  lexicon: HALOT
  rationale: The idiom literally reads 'go for yourself.' In context it is an urgent
    departure formula. 'Go out' captures the movement away from Abram's present setting
    without importing speculative reflexive nuance such as 'for your own benefit.'
    The fuller idiomatic force is preserved in a footnote.
- source_word: מֵאַרְצְךָ
  chosen: from your land
  alternatives:
  - from your country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land,' 'earth,' or 'country.' 'Land' is broad and contextually
    apt, preserving the territorial sense without narrowing it to a modern nation-state.
- source_word: וּמִמּוֹלַדְתְּךָ
  chosen: from your kindred
  alternatives:
  - from your relatives
  - from your birthplace
  - from your clan
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote kinship group or place of origin depending on context.
    Here, since 'land' and 'father’s house' already cover geography and household,
    'kindred' best captures the intermediate social sphere of native kin.
- source_word: וּמִבֵּית אָבִיךָ
  chosen: from your father’s house
  alternatives:
  - from your ancestral household
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for the paternal household/family
    unit. 'Father’s house' is both accurate and intelligible in modern English.
- source_word: אֶל הָאָרֶץ
  chosen: to the land
  alternatives:
  - to the country
  lexicon: HALOT
  rationale: Again, אֶרֶץ is best rendered 'land' here for consistency and because
    the destination is divinely designated territory, not merely a political country.
- source_word: אֲשֶׁר אַרְאֶךָּ
  chosen: that I will show you
  alternatives:
  - which I will show you
  - that I show you
  lexicon: HALOT
  rationale: The Hiphil of ראה means 'cause to see, show.' English future 'will show'
    best conveys the promised future disclosure of the destination.
