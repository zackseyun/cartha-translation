theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default for YHWH.
    This preserves continuity with longstanding English Bible practice while honoring
    the stated translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of לֶךְ־לְךָ
  chosen_reading: Go out
  alternative_readings:
  - Go for yourself
  - Go
  rationale: The phrase can carry an idiomatic or reflexive nuance, but the text does
    not explicitly state a theological motive such as Abram's benefit. The main text
    keeps the command straightforward, while a footnote preserves the more literal
    nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
