id: GEN.12.10
reference: Genesis 12:10
source:
  edition: WLC
  text: וַ/יְהִ֥י רָעָ֖ב בָּ/אָ֑רֶץ וַ/יֵּ֨רֶד אַבְרָ֤ם מִצְרַ֨יְמָ/ה֙ לָ/ג֣וּר שָׁ֔ם
    כִּֽי כָבֵ֥ד הָ/רָעָ֖ב בָּ/אָֽרֶץ־׃
translation:
  text: Now there was a famine in the land, and Abram went down to Egypt to stay there
    for a while, because the famine was severe in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to sojourn there'—that is, to reside there temporarily as a foreigner.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: HALOT
  rationale: The wayyiqtol of היה introduces a new narrative development. 'Now there
    was' gives natural English narrative progression while preserving the eventive
    introduction better than a bare 'there was.'
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  - food shortage
  lexicon: HALOT
  rationale: The noun denotes a famine, not merely personal hunger. 'Famine' is the
    standard and most precise English equivalent in this context.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - in the earth
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the local land/region relevant to Abram's dwelling,
    not the whole earth. 'Land' preserves the Hebrew's geographic sense and its narrative
    resonance in Genesis.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - went
  - traveled down
  lexicon: HALOT
  rationale: ירד literally means 'go down.' Retaining 'went down' preserves the Hebrew
    idiom for travel to Egypt, which is both geographically and conventionally expressed
    this way in the biblical text.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - toward Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. Standard English
    expresses this naturally as 'to Egypt.'
- source_word: לָגוּר
  chosen: to stay there for a while
  alternatives:
  - to sojourn there
  - to reside there as a foreigner
  - to live there temporarily
  lexicon: HALOT
  rationale: גור often carries the sense of residing temporarily as an outsider. 'Stay
    there for a while' communicates temporary residence in readable modern English;
    the more formal 'sojourn' is accurate but less accessible. The foreigner nuance
    is contextually present but not explicit enough to force a heavier rendering in
    the main text.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is straightforward and sufficient.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Abram's descent to Egypt. 'Because'
    is clearer in modern English than the more formal 'for.'
- source_word: כָבֵד
  chosen: severe
  alternatives:
  - heavy
  - grievous
  lexicon: HALOT
  rationale: The adjective literally means 'heavy,' but in context it idiomatically
    describes the intensity of the famine. 'Severe' conveys the sense naturally in
    English without flattening the force.
- source_word: הָרָעָב
  chosen: the famine
  lexicon: HALOT
  rationale: The article points back to the famine already introduced; English likewise
    uses the definite article.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: Repeated to match the Hebrew repetition and maintain narrative cohesion.
    Preserving 'land' also keeps consistency with the earlier occurrence in the verse.
