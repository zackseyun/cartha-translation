id: GEN.12.7
reference: Genesis 12:7
source:
  edition: WLC
  text: וַ/יֵּרָ֤א יְהוָה֙ אֶל אַבְרָ֔ם וַ/יֹּ֕אמֶר לְ/זַ֨רְעֲ/ךָ֔ אֶתֵּ֖ן אֶת הָ/אָ֣רֶץ
    הַ/זֹּ֑את וַ/יִּ֤בֶן שָׁם֙ מִזְבֵּ֔חַ לַ/יהוָ֖ה הַ/נִּרְאֶ֥ה אֵלָֽי/ו־־׃
translation:
  text: Then the LORD appeared to Abram and said, “To your offspring I will give this
    land.” So there he built an altar to the LORD, who had appeared to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed.' The Hebrew word is singular in form and can function collectively,
      referring to offspring as a group.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here denotes visible manifestation to Abram. 'Appeared'
    is the standard natural English rendering and fits the narrative context.
- source_word: אֶל־אַבְרָם
  chosen: to Abram
  alternatives:
  - unto Abram
  lexicon: HALOT
  rationale: Simple directional preposition with the personal name Abram; 'to Abram'
    is clear modern English.
- source_word: לְזַרְעֲךָ
  chosen: to your offspring
  alternatives:
  - to your seed
  - to your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective
    sense better than 'descendants,' while remaining more natural in modern English
    than 'seed'.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I am giving
  lexicon: HALOT
  rationale: The imperfect here expresses future promise in direct speech; 'I will
    give' best conveys the promissory force.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this country
  lexicon: HALOT
  rationale: אֶרֶץ in this patriarchal promise context is best rendered 'land,' the
    standard covenantal term, rather than the more political 'country' or the broader
    'earth'.
- source_word: וַיִּבֶן שָׁם מִזְבֵּחַ
  chosen: So there he built an altar
  alternatives:
  - And he built there an altar
  - Then he built an altar there
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'So there he built an altar' is
    natural English while preserving sequence and location.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The lamed here marks dedication/direction of the altar; 'to the LORD'
    is the most straightforward rendering.
- source_word: הַנִּרְאֶה אֵלָיו
  chosen: who had appeared to him
  alternatives:
  - who appeared to him
  - the one appearing to him
  lexicon: HALOT
  rationale: The participle with article functions attributively, identifying the
    LORD as the one who appeared to Abram. English past perfect ('had appeared') smoothly
    reflects the prior action relative to Abram's altar-building.
