theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per DOCTRINE.md, the default
    rendering is 'the LORD' rather than a transliteration, while preserving alternatives
    as lexical possibilities.
  doctrine_reference: 'Contested terms: יְהוָה YHWH | Default English: the LORD'
- issue: Collective sense of זֶרַע in the promise
  chosen_reading: offspring
  alternative_readings:
  - seed
  - descendants
  rationale: The Hebrew is grammatically singular but semantically collective. 'Offspring'
    preserves that tension without prematurely narrowing the promise to either a purely
    individual or purely plural referent.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
