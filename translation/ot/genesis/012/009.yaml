  from: journeyed on, continuing
  to: journeyed on by stages
  rationale: The current rendering 'journeyed on, continuing' is stylistically redundant in English. The Hebrew idiom הָלוֹךְ וְנָסוֹעַ (hālōḵ wənāsōaʿ) describes the manner of the journey expressed by the main verb וַיִּסַּע (wayyissaʿ), indicating progressive or staged travel. While the draft's components are defensible in isolation, their combination is clunky. A more integrated rendering like 'journeyed on by stages' or 'continued his journey' captures the sense of the Hebrew verbal phrase more naturally and is a common, effective solution for this idiom.
