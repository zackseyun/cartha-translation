id: GEN.12.9
reference: Genesis 12:9
source:
  edition: WLC
  text: וַ/יִּסַּ֣ע אַבְרָ֔ם הָל֥וֹךְ וְ/נָס֖וֹעַ הַ/נֶּֽגְבָּ/ה׃פ
translation:
  text: And Abram journeyed on by stages toward the Negev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'southward.' The Hebrew can denote either the southern region called the Negev or the direction south, though the regional sense is likely here.
    reason: lexical_alternative
  - marker: b
    text: Or 'journeyed on, continuing'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: journeyed on
  alternatives:
  - set out
  - moved on
  - pulled up and traveled
  lexicon: HALOT
  rationale: From נסע in the qal wayyiqtol, here denoting breaking camp and traveling onward. 'Journeyed on' captures both movement and the narrative sense of continuing travel without over-specifying camp mechanics.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הָלוֹךְ וְנָסוֹעַ
  chosen: continuing
  alternatives:
  - going on
  - journeying by stages
  - going and journeying
  lexicon: HALOT
  rationale: This infinitive absolute construction intensifies or duratively qualifies the preceding verb, expressing ongoing or progressive movement. 'Continuing' gives natural English while preserving the sense of repeated/ongoing travel. The more literal 'going and journeying' is possible but awkward in modern English.
- source_word: הַנֶּגְבָּה
  chosen: toward the Negev
  alternatives:
  - southward
  - into the Negev
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region known as the Negev or simply 'south.' With the article and directional he, the regional sense is strong here in Genesis. 'Toward the Negev' preserves the likely geographic reference while reflecting the directional ending.
