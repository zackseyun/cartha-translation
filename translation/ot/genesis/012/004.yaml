id: GEN.12.4
reference: Genesis 12:4
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ אַבְרָ֗ם כַּ/אֲשֶׁ֨ר דִּבֶּ֤ר אֵלָי/ו֙ יְהוָ֔ה וַ/יֵּ֥לֶךְ אִתּ֖/וֹ ל֑וֹט וְ/אַבְרָ֗ם בֶּן חָמֵ֤שׁ שָׁנִים֙ וְ/שִׁבְעִ֣ים שָׁנָ֔ה בְּ/צֵאת֖/וֹ מֵ/חָרָֽן־׃
translation:
  text: So Abram went, just as Yahweh had spoken to him, and Lot went with him. Abram was seventy-five years old when he departed from Haran.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - departed
  lexicon: HALOT
  rationale: The wayyiqtol of הלך narrates simple past movement. 'Went' is the most natural and sufficiently formal rendering here; 'set out' would slightly foreground the journey's beginning more than the Hebrew requires.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/conformity between Abram's action and the LORD's prior speech. 'Just as' clearly conveys obedience in accordance with what was spoken without adding interpretive material.
- source_word: דִּבֶּר אֵלָיו
  chosen: had spoken to him
  alternatives:
  - spoke to him
  - had said to him
  lexicon: HALOT
  rationale: English past perfect fits the discourse sequence, since the LORD's speech precedes Abram's going. 'Spoken' preserves the verbal idea of דבר; 'said' is possible but slightly less formal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: Standard rendering of the preposition with pronominal suffix; concise and natural in English.
- source_word: בֶּן חָמֵשׁ שָׁנִים וְשִׁבְעִים שָׁנָה
  chosen: seventy-five years old
  alternatives:
  - a son of five and seventy years
  - seventy and five years old
  lexicon: HALOT
  rationale: Hebrew idiom for age is best rendered in contemporary English as 'seventy-five years old.' This preserves meaning while avoiding wooden phrasing.
- source_word: בְּצֵאתוֹ
  chosen: when he departed
  alternatives:
  - when he went out
  - at his departure
  lexicon: HALOT
  rationale: The infinitive construct of יצא with prefixed ב marks the time of departure. 'When he departed' is idiomatic and matches the narrative context of leaving Haran.
- source_word: מֵחָרָן
  chosen: from Haran
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention, with the preposition מ rendered straightforwardly as 'from'.
