id: GEN.12.5
reference: Genesis 12:5
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אַבְרָם֩ אֶת שָׂרַ֨י אִשְׁתּ֜/וֹ וְ/אֶת ל֣וֹט בֶּן אָחִ֗י/ו וְ/אֶת כָּל רְכוּשָׁ/ם֙ אֲשֶׁ֣ר רָכָ֔שׁוּ וְ/אֶת הַ/נֶּ֖פֶשׁ אֲשֶׁר עָשׂ֣וּ בְ/חָרָ֑ן וַ/יֵּצְא֗וּ לָ/לֶ֨כֶת֙ אַ֣רְצָ/ה כְּנַ֔עַן וַ/יָּבֹ֖אוּ אַ֥רְצָ/ה כְּנָֽעַן־־־־־־־׃
translation:
  text: Abram took Sarai his wife, and Lot his brother’s son, and all their possessions that they had acquired, and the people they had gathered in Haran; and they set out for to the land of Canaan, and they came to the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the persons they had acquired,' or more literally, 'the souls they had made' in Haran. The Hebrew idiom likely refers to members of the household gathered or obtained there.
    reason: lexical_alternative
  - marker: b
    text: Or 'they set out to go'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took along
  - brought
  lexicon: HALOT
  rationale: Common narrative use of לקח with direct objects; 'took' is the plain sense and fits the sequence of departure.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: In marital context אשה with pronominal suffix clearly means 'wife.'
- source_word: בֶּן אָחִיו
  chosen: his brother’s son
  alternatives:
  - his nephew
  lexicon: HALOT
  rationale: The Hebrew is literally 'son of his brother.' 'Brother’s son' preserves the kinship wording more transparently than the more idiomatic 'nephew.'
- source_word: רְכוּשָׁם
  chosen: their possessions
  alternatives:
  - their goods
  - their property
  - their wealth
  lexicon: HALOT
  rationale: רכוש denotes movable property/possessions. 'Possessions' is natural modern English and broad enough for the context.
- source_word: רָכָשׁוּ
  chosen: had acquired
  alternatives:
  - had gathered
  - had gained
  lexicon: HALOT
  rationale: The verb refers to obtaining property. 'Had acquired' matches the object 'possessions' and avoids redundancy with the later phrase about people.
- source_word: הַנֶּפֶשׁ אֲשֶׁר עָשׂוּ
  chosen: the people they had gathered
  alternatives:
  - the persons they had acquired
  - the souls they had made
  - the servants they had gotten
  lexicon: HALOT
  rationale: נפש here refers to persons, and עשה in this idiom likely means to acquire/assemble a household rather than literally create. 'People they had gathered' communicates the sense in readable English without implying creation ex nihilo. The more literal alternatives are preserved in a footnote because the phrase is idiomatically difficult.
- source_word: בְחָרָן
  chosen: in Haran
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
- source_word: וַיֵּצְאוּ לָלֶכֶת
  chosen: they set out to go
  alternatives:
  - they went out to go
  - they departed to go
  lexicon: HALOT
  rationale: The combination expresses departure with purpose. 'Set out to go' is idiomatic and preserves the movement toward a destination.
- source_word: אַרְצָה כְּנַעַן
  chosen: to the land of Canaan
  alternatives:
  - toward Canaan
  - to Canaan
  lexicon: HALOT
  rationale: The directional ending on ארצה plus the proper name supports 'to the land of Canaan.' Including 'land' preserves the Hebrew expression.
- source_word: וַיָּבֹאוּ אַרְצָה כְּנָעַן
  chosen: they came to the land of Canaan
  alternatives:
  - they arrived in Canaan
  - they entered the land of Canaan
  lexicon: HALOT
  rationale: The repetition of 'land of Canaan' is retained rather than reduced, since the Hebrew intentionally repeats the destination and arrival.
