  from: they set out to go
  to: they set out for
  rationale: The Hebrew construction וַיֵּצְאוּ לָלֶכֶת (literally 'and they went out to go') is slightly pleonastic when rendered word-for-word in English. While the current rendering is a faithful translation of the Hebrew components, a more idiomatic English phrasing like 'they set out for the land of Canaan' would improve the flow without losing any essential meaning.
