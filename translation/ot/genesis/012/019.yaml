id: GEN.12.19
reference: Genesis 12:19
source:
  edition: WLC
  text: לָ/מָ֤ה אָמַ֨רְתָּ֙ אֲחֹ֣תִ/י הִ֔וא וָ/אֶקַּ֥ח אֹתָ֛/הּ לִ֖/י לְ/אִשָּׁ֑ה וְ/עַתָּ֕ה הִנֵּ֥ה אִשְׁתְּ/ךָ֖ קַ֥ח וָ/לֵֽךְ׃
translation:
  text: Why did you say, ‘She is my sister,’ so that I took her to be my wife? And now, here is your wife. Take her and go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and I took her for me as a wife.' The main text renders the sense idiomatically while preserving Pharaoh's claim that Abram's statement led to his taking Sarai.
    reason: lexical_alternative
  - marker: b
    text: Or 'I took her for myself as a wife'.
    reason: previous_rendering
  - marker: c
    text: Or 'look, here is your wife'.
    reason: previous_rendering
lexical_decisions:
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative asking Abram's motive; 'Why' is natural modern English and fully preserves the force.
- source_word: אָמַרְתָּ
  chosen: did you say
  alternatives:
  - have you said
  - said
  lexicon: HALOT
  rationale: English auxiliary 'did' is required for idiomatic interrogation. Simple past fits the narrative rebuke.
- source_word: אֲחֹתִי הִוא
  chosen: She is my sister
  alternatives:
  - She was my sister
  lexicon: HALOT
  rationale: The quoted claim is rendered as direct speech. Present tense reflects the Hebrew verbless clause as cited speech.
- source_word: וָאֶקַּח
  chosen: so that I took
  alternatives:
  - and I took
  - therefore I took
  lexicon: HALOT
  rationale: 'Although the waw-consecutive can be rendered simply ''and I took,'' in context Pharaoh''s question implies consequence: Abram''s statement led to Pharaoh''s taking Sarai. ''So that I took'' makes the causal connection explicit without overparaphrasing.'
- source_word: אֹתָהּ
  chosen: her
  lexicon: HALOT
  rationale: Direct object pronoun referring to Sarai; straightforwardly rendered 'her'.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: The dative marks personal interest/advantage. 'For myself' brings out Pharaoh's self-involvement more clearly than the flatter 'for me.'
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be my wife
  lexicon: HALOT
  rationale: Standard idiom for taking a woman in marriage. 'As a wife' is idiomatic and close to the Hebrew construction.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Marks transition from rebuke to command. Retaining 'And' preserves discourse flow.
- source_word: הִנֵּה
  chosen: look, here is
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention to Sarai's presence. 'Look, here is' is readable modern English and preserves the demonstrative force better than archaic 'behold.'
- source_word: אִשְׁתְּךָ
  chosen: your wife
  lexicon: HALOT
  rationale: Pharaoh explicitly acknowledges Sarai's true status as Abram's wife; this is central to the rebuke.
- source_word: קַח
  chosen: Take her
  alternatives:
  - Take
  lexicon: HALOT
  rationale: The Hebrew imperative is simply 'take,' but English naturally supplies the object from context. Including 'her' clarifies the command without altering meaning.
- source_word: וָלֵךְ
  chosen: and go
  alternatives:
  - go
  - be gone
  lexicon: HALOT
  rationale: A second imperative joined by waw. 'And go' preserves the sequence and avoids adding hostility beyond the text.
