id: GEN.12.16
reference: Genesis 12:16
source:
  edition: WLC
  text: וּ/לְ/אַבְרָ֥ם הֵיטִ֖יב בַּ/עֲבוּרָ֑/הּ וַֽ/יְהִי ל֤/וֹ צֹאן וּ/בָקָר֙ וַ/חֲמֹרִ֔ים
    וַ/עֲבָדִים֙ וּ/שְׁפָחֹ֔ת וַ/אֲתֹנֹ֖ת וּ/גְמַלִּֽים־־׃
translation:
  text: And he treated Abram well because of her, and he came to have sheep and cattle
    and male donkeys and male slaves and female slaves and female donkeys and camels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for her sake.' The Hebrew expression can be rendered either way.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיטִיב
  chosen: treated ... well
  alternatives:
  - did good to
  - dealt well with
  - benefited
  lexicon: HALOT
  rationale: Hiphil of יטב here means to do good to or treat favorably. 'Treated Abram
    well' is idiomatic modern English and preserves the personal object relationship
    better than the more wooden 'did good to Abram.'
- source_word: בַּעֲבוּרָהּ
  chosen: because of her
  alternatives:
  - for her sake
  - on account of her
  lexicon: HALOT
  rationale: The prepositional expression indicates causation or occasion. 'Because
    of her' is clear and natural; 'for her sake' is possible but can suggest benefactive
    intent more strongly than the context requires.
- source_word: וַיְהִי לוֹ
  chosen: he came to have
  alternatives:
  - he had
  - there was to him
  lexicon: HALOT
  rationale: The idiom literally means 'and there came to be to him,' indicating acquisition
    or resulting possession. 'He came to have' captures the narrative sense that these
    possessions accrued to Abram as a result of Pharaoh's favor, more precisely than
    the flatter 'he had.'
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flocks
  - small livestock
  lexicon: HALOT
  rationale: Though צֹאן can denote small livestock collectively (sheep and goats),
    'sheep' is the most straightforward rendering in a simple list of possessions.
    Broader alternatives are possible but less specific.
- source_word: בָקָר
  chosen: cattle
  alternatives:
  - herd cattle
  - oxen
  lexicon: HALOT
  rationale: A collective term for bovines. 'Cattle' is the standard natural English
    equivalent in livestock lists.
- source_word: חֲמֹרִים
  chosen: male donkeys
  alternatives:
  - donkeys
  - asses
  lexicon: HALOT
  rationale: The masculine plural specifically denotes male donkeys. Because the next
    term אֲתֹנֹת refers to female donkeys, the sex distinction should be preserved
    in English.
- source_word: עֲבָדִים
  chosen: male slaves
  alternatives:
  - male servants
  - slaves
  lexicon: HALOT
  rationale: The noun denotes slaves/servants; in a property list the bonded status
    is salient, so 'slaves' best fits the translation philosophy. 'Male' is supplied
    to preserve the contrast with the following feminine term.
- source_word: שְׁפָחֹת
  chosen: female slaves
  alternatives:
  - maidservants
  - slave women
  lexicon: HALOT
  rationale: This feminine plural refers to female slaves/servants. In parallel with
    עֲבָדִים and within a possessions list, 'female slaves' is the clearest and most
    socially accurate rendering.
- source_word: אֲתֹנֹת
  chosen: female donkeys
  alternatives:
  - she-donkeys
  - donkeys
  lexicon: HALOT
  rationale: The feminine plural specifically denotes female donkeys. 'Female donkeys'
    is more contemporary than 'she-donkeys' while preserving the sex distinction.
- source_word: גְמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Standard rendering of the plural noun.
