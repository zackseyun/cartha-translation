id: GEN.12.20
reference: Genesis 12:20
source:
  edition: WLC
  text: וַ/יְצַ֥ו עָלָ֛י/ו פַּרְעֹ֖ה אֲנָשִׁ֑ים וַֽ/יְשַׁלְּח֥וּ אֹת֛/וֹ וְ/אֶת אִשְׁתּ֖/וֹ
    וְ/אֶת כָּל אֲשֶׁר לֽ/וֹ־־־־׃
translation:
  text: Then Pharaoh gave men orders concerning him, and they sent him away with his
    wife and all that belonged to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Pharaoh commanded men concerning him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'men,' likely referring to Pharaoh's attendants or agents,
      though their exact role is not specified.
    reason: cultural_note
  - marker: c
    text: Or 'all that he had.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: gave ... orders
  alternatives:
  - commanded
  - instructed
  lexicon: HALOT
  rationale: צוה commonly means 'command' or 'give orders.' 'Gave men orders' is natural
    English and preserves the causative force without sounding overly stiff.
- source_word: עָלָיו
  chosen: concerning him
  alternatives:
  - about him
  - for him
  lexicon: HALOT
  rationale: 'The preposition עַל with צוה can indicate giving orders with reference
    to someone. ''Concerning him'' best fits the context: Pharaoh issued instructions
    regarding Abram.'
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - attendants
  - servants
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'men,' not a generic 'people.' The context
    suggests Pharaoh's agents or attendants, but the text does not specify their role,
    so 'men' is retained as the more transparent rendering.
- source_word: וַיְשַׁלְּחוּ
  chosen: they sent ... away
  alternatives:
  - they escorted ... away
  - they dismissed
  lexicon: HALOT
  rationale: שלח in this context means to send away or dismiss. 'Sent away' captures
    the expulsion/departure sense while remaining idiomatic.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct object pronoun referring to Abram; rendered straightforwardly
    as 'him.'
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: Standard contextual meaning of אשה with pronominal suffix in marital
    context is 'his wife.'
- source_word: כָּל אֲשֶׁר לוֹ
  chosen: all that belonged to him
  alternatives:
  - all that he had
  - everything that was his
  lexicon: HALOT
  rationale: This phrase denotes Abram's possessions broadly. 'All that belonged to
    him' is clear modern English and reflects possession without over-paraphrase.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name used in Genesis.
