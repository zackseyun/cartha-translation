id: GEN.12.17
reference: Genesis 12:17
source:
  edition: WLC
  text: וַ/יְנַגַּ֨ע יְהוָ֧ה אֶת פַּרְעֹ֛ה נְגָעִ֥ים גְּדֹלִ֖ים וְ/אֶת בֵּית֑/וֹ עַל
    דְּבַ֥ר שָׂרַ֖י אֵ֥שֶׁת אַבְרָֽם׀־־־׃
translation:
  text: But the LORD afflicted Pharaoh and his household with severe plagues because
    of Sarai, Abram’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'struck Pharaoh and his household with great afflictions.' The Hebrew
      uses a verb meaning 'struck/afflicted' and a noun that can mean 'afflictions'
      or 'plagues.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַגַּע
  chosen: afflicted
  alternatives:
  - struck
  - plagued
  - touched
  lexicon: HALOT
  rationale: The verb נגע literally means 'touch' or 'strike,' but in this context
    with נְגָעִים it denotes the infliction of harmful affliction. 'Afflicted' captures
    the causative harm in natural English without redundancy, since 'plagues' follows.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: נְגָעִים גְּדֹלִים
  chosen: severe plagues
  alternatives:
  - great afflictions
  - serious blows
  - large plagues
  lexicon: HALOT
  rationale: נְגָעִים refers to blows, afflictions, or plagues; in this narrative
    context 'plagues' is the most idiomatic and contextually fitting rendering. גְּדֹלִים
    intensifies the severity, better expressed in English as 'severe' than the more
    wooden 'great.'
- source_word: וְאֶת בֵּיתוֹ
  chosen: and his household
  alternatives:
  - and his house
  - and his palace
  lexicon: HALOT
  rationale: בַּיִת/בֵּית can mean house, household, or dynasty depending on context.
    Here it refers to those belonging to Pharaoh's domestic sphere, so 'household'
    best conveys the sense.
- source_word: עַל דְּבַר
  chosen: because of
  alternatives:
  - on account of
  - concerning
  - for the sake of
  lexicon: HALOT
  rationale: The phrase here gives the reason for the affliction. 'Because of' is
    clear modern English and fits the causal sense.
- source_word: שָׂרַי אֵשֶׁת אַבְרָם
  chosen: Sarai, Abram’s wife
  alternatives:
  - Sarai the wife of Abram
  lexicon: HALOT
  rationale: This appositional construction identifies Sarai specifically as Abram's
    wife, which is central to the narrative offense. The comma preserves the appositional
    force in readable English.
