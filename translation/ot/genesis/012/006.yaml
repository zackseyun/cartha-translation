id: GEN.12.6
reference: Genesis 12:6
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֤ר אַבְרָם֙ בָּ/אָ֔רֶץ עַ֚ד מְק֣וֹם שְׁכֶ֔ם עַ֖ד אֵל֣וֹן מוֹרֶ֑ה
    וְ/הַֽ/כְּנַעֲנִ֖י אָ֥ז בָּ/אָֽרֶץ׃
translation:
  text: Abram passed through the land as far as the place at Shechem, as far as the
    oak of Moreh. Now the Canaanite was then in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the terebinth of Moreh'; the Hebrew term refers to a large tree, but
      the exact species is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Canaanites were then in the land.' The Hebrew uses a singular ethnic
      term that can function collectively.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: passed through
  alternatives:
  - went through
  - traveled through
  - crossed through
  lexicon: HALOT
  rationale: From עבר in the wayyiqtol, narrating Abram's movement through Canaan.
    'Passed through' preserves the sense of traversing the land without over-specifying
    route or manner.
- source_word: בָּאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land-country
  - the country
  lexicon: HALOT
  rationale: With the article, this refers to the land in view, namely Canaan. 'The
    land' is the natural and sufficiently formal rendering in context.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: Used twice to mark extent of travel. 'As far as' clearly conveys the
    boundary/limit sense in idiomatic English.
- source_word: מְקוֹם שְׁכֶם
  chosen: the place at Shechem
  alternatives:
  - the place of Shechem
  - the site of Shechem
  lexicon: HALOT
  rationale: מקום is a common noun 'place/site' followed by the proper name Shechem.
    'The place at Shechem' reads naturally while preserving that the text names a
    location associated with Shechem rather than necessarily the later city in its
    full developed sense.
- source_word: אֵלוֹן מוֹרֶה
  chosen: the oak of Moreh
  alternatives:
  - the terebinth of Moreh
  - the great tree of Moreh
  lexicon: HALOT
  rationale: אֵלוֹן can denote a large tree, often rendered 'oak' or 'terebinth.'
    'Oak' is a standard, readable rendering in English Bible tradition. Because the
    exact species is uncertain, the alternative 'terebinth' is preserved in a footnote.
- source_word: מוֹרֶה
  chosen: Moreh
  alternatives:
  - Teacher/Diviner (if taken appellatively)
  lexicon: HALOT
  rationale: Best taken here as a place-name/genitival proper name modifying אֵלוֹן.
    Transliteration avoids importing an uncertain interpretive gloss into the main
    text.
- source_word: וְהַכְּנַעֲנִי
  chosen: Now the Canaanite
  alternatives:
  - And the Canaanites
  - Now the Canaanites
  lexicon: HALOT
  rationale: The singular with article can function collectively, but English often
    renders such ethnics either singular collective or plural. 'The Canaanite' preserves
    the Hebrew form while still conveying the people-group generically.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking the historical circumstance at that point in
    the narrative. 'Then' is concise and natural.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: Repeated phrase retained for narrative emphasis and cohesion. 'In the
    land' matches the Hebrew wording and keeps the focus on territorial occupancy.
