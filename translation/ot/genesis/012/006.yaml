theological_decisions:
- issue: Ethnonym number in וְהַכְּנַעֲנִי
  chosen_reading: 'singular collective: ''the Canaanite was then in the land'''
  alternative_readings:
  - 'plural collective: ''the Canaanites were then in the land'''
  rationale: The Hebrew uses the singular ethnic with article, a common collective
    usage. Retaining the singular better reflects the source form while still communicating
    the presence of the Canaanite population. This is not a doctrinal issue but an
    interpretive-linguistic one worth documenting.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
