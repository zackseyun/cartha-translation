id: GEN.12.14
reference: Genesis 12:14
source:
  edition: WLC
  text: וַ/יְהִ֕י כְּ/ב֥וֹא אַבְרָ֖ם מִצְרָ֑יְמָ/ה וַ/יִּרְא֤וּ הַ/מִּצְרִים֙ אֶת
    הָ֣/אִשָּׁ֔ה כִּֽי יָפָ֥ה הִ֖וא מְאֹֽד־־׃
translation:
  text: And when Abram entered Egypt, the Egyptians saw that the woman was very beautiful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wife.' The Hebrew אִשָּׁה can mean either 'woman' or 'wife'; here
      the translation preserves the more general wording of the clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened, when
  - Now when
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, the idiomatic narrative transition is best carried by 'And when' rather
    than the more wooden 'And it happened, when.'
- source_word: כְּבֹא
  chosen: entered
  alternatives:
  - came into
  - was entering
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ expresses temporal circumstance,
    'when Abram entered/came into.' 'Entered' is natural modern English and preserves
    the motion into Egypt.
- source_word: מִצְרָיְמָה
  chosen: Egypt
  alternatives:
  - to Egypt
  lexicon: HALOT
  rationale: The directional he marks motion toward Egypt. In English this is naturally
    absorbed into the verb phrase 'entered Egypt' rather than rendered separately
    as 'to Egypt.'
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - looked at
  - noticed
  lexicon: HALOT
  rationale: The verb ראה here straightforwardly means 'saw.' 'Noticed' is possible
    contextually but slightly interpretive; 'saw' stays closer to the source.
- source_word: הַמִּצְרִים
  chosen: the Egyptians
  lexicon: HALOT
  rationale: Definite plural gentilic; standard rendering is 'the Egyptians.'
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: Although אשה can mean 'wife,' the immediate wording uses the more general
    term 'the woman.' Given the narrative context of Sarai being observed by Egyptians,
    'the woman' preserves the Hebrew wording without importing the marital relation
    into this clause.
- source_word: כִּי
  chosen: that
  alternatives:
  - indeed
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what they perceived: they saw that
    she was very beautiful. ''That'' is the most natural English complementizer.'
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - attractive
  lexicon: HALOT
  rationale: The adjective denotes physical beauty. 'Beautiful' is standard, clear
    modern English.
- source_word: הִוא
  chosen: was
  alternatives:
  - she was
  lexicon: HALOT
  rationale: The independent pronoun is represented in idiomatic English by the clause
    'was very beautiful.' Explicit 'she' is unnecessary because English already has
    'the woman' as subject.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies the adjective. 'Very' is the most natural modern
    equivalent; 'exceedingly' is more formal and less idiomatic.
