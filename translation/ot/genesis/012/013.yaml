id: GEN.12.13
reference: Genesis 12:13
source:
  edition: WLC
  text: אִמְרִי נָ֖א אֲחֹ֣תִ/י אָ֑תְּ לְמַ֨עַן֙ יִֽיטַב לִ֣/י בַ/עֲבוּרֵ֔/ךְ וְ/חָיְתָ֥ה
    נַפְשִׁ֖/י בִּ/גְלָלֵֽ/ךְ־־׃
translation:
  text: Please say that you are my sister, so that it may go well for me because of
    you, and my life may be spared on your account.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and my soul may live because of you.'' Here ''soul'' (nephesh)
      is an idiom for Abram''s life or self.'
    reason: lexical_alternative
  - marker: b
    text: The two Hebrew expressions 'because of you' and 'on your account' are closely
      related and both emphasize that Abram expects his safety and favorable treatment
      to come through Sarai's claimed relationship to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרִי נָא
  chosen: Please say
  alternatives:
  - Say, please
  - Please say it
  lexicon: HALOT
  rationale: Imperative feminine singular of אמר with the particle נָא, which softens
    the command into a plea/request. 'Please say' gives natural modern English while
    preserving the urgency and politeness.
- source_word: אֲחֹתִי אָתְּ
  chosen: that you are my sister
  alternatives:
  - you are my sister
  - I am your brother's sister
  lexicon: HALOT
  rationale: Predicate expression identifying Sarai as Abram's sister. English idiom
    naturally supplies 'that' after 'say.' 'My sister' is the straightforward lexical
    sense of אֲחוֹת.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is clear, idiomatic, and preserves
    the purposive force.
- source_word: יִיטַב לִי
  chosen: it may go well for me
  alternatives:
  - it may be well with me
  - I may be treated well
  lexicon: HALOT
  rationale: From יטב, 'to be good/go well.' The idiom can imply favorable treatment,
    but the broader wording 'it may go well for me' preserves the Hebrew expression
    without over-specifying the mechanism.
- source_word: בַּעֲבוּרֵךְ
  chosen: because of you
  alternatives:
  - for your sake
  - on account of you
  lexicon: HALOT
  rationale: Preposition plus noun עֲבוּר conveys causation/occasion here. 'Because
    of you' is natural and fits the context of Abram expecting favorable treatment
    due to Sarai.
- source_word: וְחָיְתָה נַפְשִׁי
  chosen: and my life may be spared
  alternatives:
  - and my soul may live
  - and I may stay alive
  lexicon: HALOT
  rationale: Literally, 'and my נפש may live.' In this context נֶפֶשׁ refers to Abram's
    life/self, not specifically the immaterial soul. 'My life may be spared' communicates
    the idiomatic sense in natural English while preserving the passive-result nuance.
- source_word: בִּגְלָלֵךְ
  chosen: on your account
  alternatives:
  - because of you
  - for your sake
  lexicon: HALOT
  rationale: A second causal expression, near-synonymous with בַּעֲבוּרֵךְ. Rendering
    it as 'on your account' preserves the repetition while avoiding awkward exact
    duplication in English.
