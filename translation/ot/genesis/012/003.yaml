id: GEN.12.3
reference: Genesis 12:3
source:
  edition: WLC
  text: וַ/אֲבָֽרֲכָה֙ מְבָ֣רְכֶ֔י/ךָ וּ/מְקַלֶּלְ/ךָ֖ אָאֹ֑ר וְ/נִבְרְכ֣וּ בְ/ךָ֔
    כֹּ֖ל מִשְׁפְּחֹ֥ת הָ/אֲדָמָֽה׃
translation:
  text: And I will bless those who bless you, and the one who curses you I will curse;
    and in you all the families of the earth will be blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who curses you'; the Hebrew verb here (קלל) can mean to treat
      with contempt, dishonor, or curse, and it is weaker than the following verb
      'I will curse' (ארר).
    reason: lexical_alternative
  - marker: b
    text: Or, 'all the families of the earth will bless themselves by you,' or 'through
      you all the families of the earth will be blessed.' The Hebrew form allows debate
      over passive versus reflexive/middle sense, and the preposition can also be
      understood instrumentally.
    reason: alternative_reading
  - marker: c
    text: Or 'and the one who treats you lightly I will curse'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַאֲבָרֲכָה
  chosen: And I will bless
  alternatives:
  - and I shall bless
  lexicon: HALOT
  rationale: Qal 1cs of ברך with prefixed conjunction; straightforward divine first-person
    future/promise. 'Will bless' is natural modern English and preserves the promissory
    force.
- source_word: מְבָרְכֶיךָ
  chosen: those who bless you
  alternatives:
  - the ones blessing you
  - your blessers
  lexicon: HALOT
  rationale: Participle plural with 2ms suffix functions substantivally for a class
    of people. 'Those who bless you' is idiomatic and preserves the plural.
- source_word: וּמְקַלֶּלְךָ
  chosen: the one who treats you lightly
  alternatives:
  - the one who curses you
  - whoever dishonors you
  - the one who reviles you
  lexicon: HALOT
  rationale: The participle from קלל commonly carries the sense of treating as slight,
    dishonoring, or cursing, and is notably less weighty than the following verb אָאֹר.
    Rendering it as 'treats you lightly' preserves the lexical contrast between the
    human action and God's stronger response. Singular is retained because the Hebrew
    participle here is singular, contrasting with the preceding plural 'those who
    bless you'.
- source_word: אָאֹר
  chosen: I will curse
  alternatives:
  - I will bind under a curse
  lexicon: HALOT
  rationale: Qal 1cs of ארר, the stronger verb for cursing. 'I will curse' is the
    clearest English equivalent and preserves the escalation from קלל to ארר.
- source_word: וְנִבְרְכוּ
  chosen: will be blessed
  alternatives:
  - will bless themselves
  - will find blessing
  lexicon: HALOT
  rationale: 'Niphal 3cp of ברך is most naturally rendered as passive here: ''will
    be blessed.'' Because the Niphal of ברך in the Abrahamic promises has been debated
    as passive versus reflexive/middle, the alternative is preserved in a footnote
    rather than resolved silently.'
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - by you
  - through you
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in,' and in this covenantal formula
    it can denote sphere or instrumentality. 'In you' is the most textually direct
    rendering; more instrumental nuances are preserved as alternatives in a footnote.
- source_word: כֹּל מִשְׁפְּחֹת הָאֲדָמָה
  chosen: all the families of the earth
  alternatives:
  - all the clans of the ground
  - all the families of the land
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת denotes family groups/clans; 'families' is standard and
    accessible. הָאֲדָמָה can mean ground/land/earth; in this universal promise context
    'earth' best conveys the scope without flattening the covenantal breadth.
