theological_decisions:
- issue: Meaning of the Abrahamic blessing formula וְנִבְרְכוּ בְךָ
  chosen_reading: 'passive: ''will be blessed ... in you'''
  alternative_readings:
  - 'reflexive/middle: ''will bless themselves by you'''
  - 'instrumental nuance: ''through you all the families of the earth will be blessed'''
  rationale: The Niphal form can be read passively or reflexively/middle in discussions
    of the Abrahamic promise. Following optimal equivalence and preserving theological
    tension, the main text keeps the most straightforward passive reading while preserving
    the debated alternatives in a footnote. This avoids importing a narrower doctrinal
    conclusion while still giving a clear English translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
