id: JOS.4.11
reference: Joshua 4:11
source:
  edition: WLC
  text: וַ/יְהִ֛י כַּֽ/אֲשֶׁר תַּ֥ם כָּל הָ/עָ֖ם לַֽ/עֲב֑וֹר וַ/יַּעֲבֹ֧ר אֲרוֹן יְהוָ֛ה
    וְ/הַ/כֹּהֲנִ֖ים לִ/פְנֵ֥י הָ/עָֽם־־־׃
translation:
  text: And when all the people had finished crossing over, the ark of the LORD and
    the priests crossed over before the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the people.' The Hebrew phrase can denote either
      spatial position ('before/in front of') or presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - And it happened
  - Then it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative transition.
    In contemporary English, an explicit 'it happened' is often wooden; 'And' carries
    the discourse progression naturally without loss of meaning.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: Introduces a temporal clause. 'When' best fits the sequence with the
    following perfect/completed action.
- source_word: תַּם
  chosen: had finished
  alternatives:
  - was complete
  - came to an end
  lexicon: HALOT
  rationale: The verb תמם here denotes completion. Rendering with English pluperfect
    ('had finished') fits the temporal relation to the following main clause.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: HALOT
  rationale: A straightforward collective expression. 'All the people' is natural
    English and preserves the totality emphasized by כָּל.
- source_word: לַעֲבוֹר
  chosen: crossing over
  alternatives:
  - to cross
  - to pass over
  lexicon: HALOT
  rationale: The infinitive complements 'had finished' and refers specifically to
    crossing the Jordan. 'Crossing over' is idiomatic and preserves the motion sense
    of עבר.
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - passed over
  - went across
  lexicon: HALOT
  rationale: The same root עבר appears again in the main clause. 'Crossed over' maintains
    lexical consistency with לַעֲבוֹר while sounding natural in English.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Construct chain meaning 'the ark of YHWH.' Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in the
    Contested terms table.
- source_word: וְהַכֹּהֲנִים
  chosen: and the priests
  alternatives:
  - with the priests
  lexicon: HALOT
  rationale: The conjunction most naturally coordinates 'the priests' with 'the ark
    of the LORD' as joint participants in the crossing. English keeps the explicit
    conjunction.
- source_word: לִפְנֵי הָעָם
  chosen: before the people
  alternatives:
  - in the presence of the people
  - ahead of the people
  lexicon: HALOT
  rationale: 'לִפְנֵי can denote spatial position (''before/in front of'') or presence.
    In this narrative context, the sense is most likely spatial/relational: the ark
    and priests crossed over in front of the people, i.e., before them.'
