id: JOS.4.19
reference: Joshua 4:19
source:
  edition: WLC
  text: וְ/הָ/עָ֗ם עָלוּ֙ מִן הַ/יַּרְדֵּ֔ן בֶּ/עָשׂ֖וֹר לַ/חֹ֣דֶשׁ הָ/רִאשׁ֑וֹן וַֽ/יַּחֲנוּ֙
    בַּ/גִּלְגָּ֔ל בִּ/קְצֵ֖ה מִזְרַ֥ח יְרִיחֽוֹ־׃
translation:
  text: And the people came up from the Jordan on the tenth day of the first month,
    and they camped at Gilgal on the eastern edge of Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they went up from the Jordan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they camped at Gilgal, east of Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלוּ
  chosen: came up
  alternatives:
  - went up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' In narrative English, 'came up from
    the Jordan' is natural and preserves the directional sense from the riverbed without
    sounding overly wooden.
- source_word: מִן הַיַּרְדֵּן
  chosen: from the Jordan
  alternatives:
  - out of the Jordan
  - from the Jordan River
  lexicon: HALOT
  rationale: The phrase marks movement out from the Jordan. 'From the Jordan' is concise
    and idiomatic; 'Jordan' sufficiently denotes the river in context.
- source_word: בֶּעָשׂוֹר
  chosen: on the tenth day
  alternatives:
  - on the tenth
  - on the tenth day of the month
  lexicon: HALOT
  rationale: The Hebrew idiom with the preposition and ordinal/cardinal expression
    refers to the calendar date. English normally supplies 'day' for clarity.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: of the first month
  alternatives:
  - of the first new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ denotes 'month' in calendrical contexts. 'First month' is the
    plain sense and fits the date formula.
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  - they set up camp
  lexicon: HALOT
  rationale: חנה in this stem means to camp/encamp. 'They camped' is readable modern
    English while retaining the narrative action.
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: As a place name, Gilgal is transliterated per project philosophy. 'At'
    is the most natural preposition for camping at a location.
- source_word: בִּקְצֵה
  chosen: on the edge
  alternatives:
  - at the border
  - at the extremity
  lexicon: HALOT
  rationale: קָצֶה denotes an end, edge, or extremity. 'Edge' best fits the local
    geographical description in natural English.
- source_word: מִזְרַח יְרִיחוֹ
  chosen: of Jericho
  alternatives:
  - east of Jericho
  - on the east of Jericho
  - to the east of Jericho
  lexicon: HALOT
  rationale: מִזְרַח means 'east/eastward/eastern side.' Combined with בִּקְצֵה, the
    phrase describes the eastern side/edge relative to Jericho. Rendering the full
    phrase as 'on the eastern edge of Jericho' communicates the relation smoothly
    in English.
