id: JOS.4.1
reference: Joshua 4:1
source:
  edition: WLC
  text: וַ/יְהִי֙ כַּ/אֲשֶׁר תַּ֣מּוּ כָל הַ/גּ֔וֹי לַ/עֲב֖וֹר אֶת הַ/יַּרְדֵּ֑ן וַ/יֹּ֣אמֶר
    יְהוָ֔ה אֶל יְהוֹשֻׁ֖עַ לֵ/אמֹֽר־־־פ־׃
translation:
  text: And it happened, when all the nation had finished crossing the Jordan, that
    the LORD said to Joshua,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the people'; Hebrew 'all the nation' uses a singular collective
      term for Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event sequence. 'And it
    happened' preserves the Hebrew discourse function without archaic English.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: Introduces the temporal clause; 'when' is the most natural English equivalent
    here.
- source_word: תַּמּוּ
  chosen: had finished
  alternatives:
  - were finished
  - completed
  lexicon: HALOT
  rationale: From תמם, indicating completion. Pluperfect-like English ('had finished')
    fits the temporal sequence before the main verb 'said'.
- source_word: כָל הַגּוֹי
  chosen: all the nation
  alternatives:
  - all the people
  - the whole nation
  lexicon: HALOT
  rationale: גּוֹי can mean nation/people. Here it refers corporately to Israel as
    a national entity. 'All the nation' preserves the singular collective force of
    the Hebrew better than the more idiomatic but less formally aligned 'all the people'.
- source_word: לַעֲבוֹר
  chosen: crossing
  alternatives:
  - to cross
  - passing over
  lexicon: HALOT
  rationale: Infinitive construct with ל expressing the action completed by the subject.
    'Finished crossing' is idiomatic English and accurately conveys the sense.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English geographical rendering. 'The Jordan' is sufficient and
    natural in biblical narrative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: וַיֹּאמֶר ... לֵאמֹר
  chosen: said to Joshua,
  alternatives:
  - spoke to Joshua, saying,
  lexicon: HALOT
  rationale: The common Hebrew speech formula is best rendered idiomatically in English
    as 'said to Joshua,' with the following verse supplying the content. Retaining
    a comma signals continuation.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
