id: JOS.4.8
reference: Joshua 4:8
source:
  edition: WLC
  text: וַ/יַּעֲשׂוּ כֵ֣ן בְּנֵי יִשְׂרָאֵ֘ל כַּ/אֲשֶׁ֣ר צִוָּ֣ה יְהוֹשֻׁעַ֒ וַ/יִּשְׂא֡וּ שְׁתֵּֽי עֶשְׂרֵ֨ה אֲבָנִ֜ים מִ/תּ֣וֹךְ הַ/יַּרְדֵּ֗ן כַּ/אֲשֶׁ֨ר דִּבֶּ֤ר יְהוָה֙ אֶל יְהוֹשֻׁ֔עַ לְ/מִסְפַּ֖ר שִׁבְטֵ֣י בְנֵֽי יִשְׂרָאֵ֑ל וַ/יַּעֲבִר֤וּ/ם עִמָּ/ם֙ אֶל הַ/מָּל֔וֹן וַ/יַּנִּח֖וּ/ם שָֽׁם־־־־־־׃
translation:
  text: And the sons of Israel did so, just as Joshua had commanded, and they carried twelve stones from the midst of the Jordan, just as Yahweh had spoken to Joshua, according to the number of the tribes of the sons of Israel; and they brought them over with them to the lodging place and set them down there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'' Many English versions simplify this to ''the Israelites.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'from the middle of the Jordan.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to the camp'; the Hebrew more specifically means 'to the lodging place' or overnight encampment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew familial expression. 'Israelites' is smoother English, but the source explicitly says 'sons of Israel.' This also aligns with the project's gender-accurate principle.
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did so
  alternatives:
  - did thus
  - acted accordingly
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew expression, preserving the sense of compliance without wooden phrasing.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  - instructed
  lexicon: HALOT
  rationale: The verb denotes authoritative instruction. The English pluperfect fits the narrative sequence after 'did so, just as Joshua had commanded.'
- source_word: וַיִּשְׂאוּ
  chosen: they carried
  alternatives:
  - they lifted
  - they bore
  lexicon: HALOT
  rationale: In context of transporting stones, 'carried' best conveys both lifting and bearing away in natural English.
- source_word: שְׁתֵּי עֶשְׂרֵה אֲבָנִים
  chosen: twelve stones
  lexicon: HALOT
  rationale: Straightforward cardinal-number construction.
- source_word: מִתּוֹךְ הַיַּרְדֵּן
  chosen: from the midst of the Jordan
  alternatives:
  - from the middle of the Jordan
  - from inside the Jordan
  lexicon: HALOT
  rationale: '''Midst'' preserves the concrete spatial force of תּוֹךְ while remaining readable. It likely refers to the riverbed area where the priests stood.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name YHWH.
- source_word: דִּבֶּר ... אֶל יְהוֹשֻׁעַ
  chosen: had spoken to Joshua
  alternatives:
  - spoke to Joshua
  - said to Joshua
  lexicon: HALOT
  rationale: The verb is 'spoke,' not merely 'said'; pluperfect suits the retrospective comparison introduced by 'just as.'
- source_word: לְמִסְפַּר
  chosen: according to the number of
  alternatives:
  - by the number of
  - equal to the number of
  lexicon: HALOT
  rationale: This prepositional phrase indicates correspondence with the tribal count.
- source_word: שִׁבְטֵי בְנֵי יִשְׂרָאֵל
  chosen: the tribes of the sons of Israel
  alternatives:
  - the tribes of Israel
  - the tribes of the Israelites
  lexicon: HALOT
  rationale: Retains the full Hebrew expression and its parallelism with the earlier phrase, though a shorter English form would be possible.
- source_word: וַיַּעֲבִרוּם
  chosen: they brought them over
  alternatives:
  - they carried them across
  - they took them over
  lexicon: HALOT
  rationale: The causative form of עבר here refers to moving the stones across to the camp. 'Brought them over' is natural and preserves the crossing sense.
- source_word: עִמָּם
  chosen: with them
  alternatives:
  - along with them
  lexicon: HALOT
  rationale: 'Simple accompaniment: the men took the stones along as they crossed.'
- source_word: הַמָּלוֹן
  chosen: the lodging place
  alternatives:
  - the camp
  - the place where they lodged
  lexicon: HALOT
  rationale: מָלוֹן is specifically a lodging place or overnight encampment. 'Camp' is possible in context, but 'lodging place' preserves the lexical nuance.
- source_word: וַיַּנִּחוּם שָׁם
  chosen: set them down there
  alternatives:
  - placed them there
  - left them there
  lexicon: HALOT
  rationale: The verb means to set down or place. 'Set them down there' fits the physical action of depositing stones at the encampment.
