id: JOS.4.16
reference: Joshua 4:16
source:
  edition: WLC
  text: צַוֵּה֙ אֶת הַ/כֹּ֣הֲנִ֔ים נֹשְׂאֵ֖י אֲר֣וֹן הָ/עֵד֑וּת וְ/יַעֲל֖וּ מִן הַ/יַּרְדֵּֽן־־׃
translation:
  text: Command the priests who carry the ark of the testimony to come up from the
    Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ark of the witness.' The Hebrew reads 'testimony,' not the more
      familiar 'covenant' found in many other references to the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַוֵּה
  chosen: Command
  alternatives:
  - Give orders to
  - Instruct
  lexicon: HALOT
  rationale: Imperative 2ms of צוה, a direct command to Joshua. 'Command' is concise
    and preserves the force of the imperative better than softer options.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים with the definite article preserved.
- source_word: נֹשְׂאֵי
  chosen: who carry
  alternatives:
  - bearing
  - carrying
  lexicon: HALOT
  rationale: Qal participle plural construct from נשׂא modifying 'the priests.' Rendered
    as a relative clause in natural English while preserving the ongoing descriptive
    sense.
- source_word: אֲרוֹן הָעֵדוּת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant witness
  - the ark of the witness
  lexicon: HALOT
  rationale: Formal construct chain preserved. Although 'ark of the covenant' is familiar
    from many contexts, the Hebrew here specifically has עֵדוּת ('testimony/witness'),
    so the translation follows the source text rather than harmonizing to traditional
    phrasing.
- source_word: וְיַעֲלוּ
  chosen: to come up
  alternatives:
  - to go up
  - to come up out
  lexicon: HALOT
  rationale: From עלה, commonly 'go up/come up.' In context of leaving the riverbed,
    'come up' is idiomatic English and fits the deictic perspective of the command.
- source_word: מִן הַיַּרְדֵּן
  chosen: from the Jordan
  alternatives:
  - out of the Jordan
  - from the Jordan River
  lexicon: HALOT
  rationale: מן marks movement from the river. 'From the Jordan' is natural and sufficiently
    clear; 'out of the Jordan' is possible but slightly more interpretive.
