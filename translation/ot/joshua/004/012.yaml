id: JOS.4.12
reference: Joshua 4:12
source:
  edition: WLC
  text: וַ֠/יַּעַבְרוּ בְּנֵי רְאוּבֵ֨ן וּ/בְנֵי גָ֜ד וַ/חֲצִ֨י שֵׁ֤בֶט הַֽ/מְנַשֶּׁה֙
    חֲמֻשִׁ֔ים לִ/פְנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר אֲלֵי/הֶ֖ם מֹשֶֽׁה־־׃
translation:
  text: And the sons of Reuben, the sons of Gad, and the half-tribe of Manasseh crossed
    over, armed, before the sons of Israel, just as Moses had spoken to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Reubenites, the Gadites, and the half-tribe of Manasseh.' The Hebrew
      more literally reads 'the sons of Reuben ... the sons of Gad ...'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' The Hebrew more literally reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: '''Armed'' renders a Hebrew term that can denote being equipped or arranged
      for battle; some have proposed a more literal sense such as ''arrayed in ranks.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: crossed over
  alternatives:
  - passed over
  - went across
  lexicon: HALOT
  rationale: The verb עבר in this narrative context refers to crossing the Jordan.
    'Crossed over' is natural English and preserves the directional sense better than
    the more generic 'passed over.'
- source_word: בְּנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - the Reubenites
  lexicon: HALOT
  rationale: Literally 'sons of Reuben.' This keeps the Hebrew kinship expression
    visible. 'Reubenites' is idiomatic but less formally transparent.
- source_word: וּבְנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the Gadites
  lexicon: HALOT
  rationale: As with 'sons of Reuben,' the literal kinship construction is preserved
    for consistency and transparency.
- source_word: וַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the standard and clear rendering of the construct chain. It preserves
    the tribal designation without awkwardness.
- source_word: חֲמֻשִׁים
  chosen: armed
  alternatives:
  - in battle array
  - equipped for war
  - arrayed in fives
  lexicon: HALOT
  rationale: In context this term denotes readiness for battle, as in earlier Pentateuchal
    and Joshua usage. 'Armed' is the clearest concise rendering in modern English.
    More literal or etymological proposals such as 'arrayed in fives' are possible
    but contextually less likely here.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - ahead of
  lexicon: HALOT
  rationale: The preposition indicates position in front of the rest of Israel as
    they cross. 'Before' is concise and idiomatic in this narrative register.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' This rendering preserves the
    source expression and aligns with the translation philosophy's gender-accurate
    preference. 'Israelites' is a viable idiomatic alternative but is less formally
    transparent.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according to what
  lexicon: HALOT
  rationale: This comparative conjunction introduces conformity to Moses's prior instruction.
    'Just as' clearly conveys that sense.
- source_word: דִּבֶּר אֲלֵיהֶם מֹשֶׁה
  chosen: Moses had spoken to them
  alternatives:
  - Moses had told them
  - Moses spoke to them
  lexicon: HALOT
  rationale: The perfect verb refers to Moses's prior instruction. English past perfect
    best reflects the anterior action relative to the crossing event. 'Spoken to them'
    stays close to דבר without over-interpreting it as command, though command is
    implied by context.
