id: JOS.4.4
reference: Joshua 4:4
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א יְהוֹשֻׁ֗עַ אֶל שְׁנֵ֤ים הֶֽ/עָשָׂר֙ אִ֔ישׁ אֲשֶׁ֥ר הֵכִ֖ין מִ/בְּנֵ֣י
    יִשְׂרָאֵ֑ל אִישׁ אֶחָ֥ד אִישׁ אֶחָ֖ד מִ/שָּֽׁבֶט־־־׃
translation:
  text: So Joshua called the twelve men whom he had appointed from the sons of Israel,
    one man from each tribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the Israelites.' The Hebrew reads 'from the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'whom he had prepared' or 'whom he had designated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The wayyiqtol of קרא here introduces Joshua's action of calling the selected
    men to himself. 'Called' is the most natural modern English rendering; 'summoned'
    is possible but slightly stronger than the context requires.
- source_word: אֶל
  chosen: called
  alternatives:
  - to
  lexicon: HALOT
  rationale: The preposition literally means 'to,' but in idiomatic English with קרא
    it is absorbed into the verb phrase 'called' rather than rendered woodenly as
    'called to.'
- source_word: שְׁנֵים הֶעָשָׂר אִישׁ
  chosen: the twelve men
  alternatives:
  - twelve men
  lexicon: HALOT
  rationale: The phrase denotes a definite group already identified in context, so
    'the twelve men' best reflects the discourse function.
- source_word: אֲשֶׁר הֵכִין
  chosen: whom he had appointed
  alternatives:
  - whom he had prepared
  - whom he had designated
  lexicon: HALOT
  rationale: הכין can mean 'prepare, make ready, appoint.' In this context Joshua
    had previously selected/designated these representatives, so 'appointed' communicates
    the sense more clearly than the more literal but potentially misleading 'prepared.'
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, בְּנֵי is retained as 'sons' rather than
    flattened to 'Israelites.' The phrase is a standard ethnic designation, and 'sons
    of Israel' preserves the source form while remaining understandable.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד מִשָּׁבֶט
  chosen: one man from each tribe
  alternatives:
  - one man, one man from a tribe
  - one man from every tribe
  lexicon: HALOT
  rationale: The distributive repetition 'man one, man one' is idiomatically rendered
    in English as 'one man from each tribe.' This preserves the representative structure
    without awkward literal repetition.
