id: JOS.4.17
reference: Joshua 4:17
source:
  edition: WLC
  text: וַ/יְצַ֣ו יְהוֹשֻׁ֔עַ אֶת הַ/כֹּהֲנִ֖ים לֵ/אמֹ֑ר עֲל֖וּ מִן הַ/יַּרְדֵּֽן־־׃
translation:
  text: So Joshua commanded the priests, saying, “Come up out of the Jordan.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The verb צוה commonly denotes giving a command or charge. 'Commanded'
    preserves the authoritative force better than the softer 'instructed.' The waw-consecutive
    is naturally rendered as past narrative; 'So' reflects the discourse continuation.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, following the
    principle to transliterate names rather than translate them.
- source_word: אֶת הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Direct object marker plus definite noun; straightforwardly rendered 'the
    priests.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct introducing direct speech is conventionally
    and accurately represented by 'saying' in English narrative.
- source_word: עֲלוּ
  chosen: Come up
  alternatives:
  - Go up
  - Ascend
  lexicon: HALOT
  rationale: עלה means 'go up/come up.' In context the priests are being summoned
    from the riverbed toward Joshua and the people on land, so 'Come up' is idiomatic
    and contextually fitting in direct speech.
- source_word: מִן הַיַּרְדֵּן
  chosen: out of the Jordan
  alternatives:
  - from the Jordan
  - out of the Jordan River
  lexicon: HALOT
  rationale: The preposition מן marks movement from within or away from. Because the
    priests are standing in the river, 'out of the Jordan' best conveys emergence
    from it. 'Jordan' is sufficient without adding 'River,' though that is an acceptable
    expansion in some contexts.
