id: JOS.4.3
reference: Joshua 4:3
source:
  edition: WLC
  text: וְ/צַוּ֣וּ אוֹתָ/ם֮ לֵ/אמֹר֒ שְׂאֽוּ לָ/כֶ֨ם מִ/זֶּ֜ה מִ/תּ֣וֹךְ הַ/יַּרְדֵּ֗ן
    מִ/מַּצַּב֙ רַגְלֵ֣י הַ/כֹּהֲנִ֔ים הָכִ֖ין שְׁתֵּים עֶשְׂרֵ֣ה אֲבָנִ֑ים וְ/הַעֲבַרְתֶּ֤ם
    אוֹתָ/ם֙ עִמָּ/כֶ֔ם וְ/הִנַּחְתֶּ֣ם אוֹתָ֔/ם בַּ/מָּל֕וֹן אֲשֶׁר תָּלִ֥ינוּ ב֖/וֹ
    הַ/לָּֽיְלָה־־־׃ס
translation:
  text: and command them, saying, ‘Take up for yourselves from here, from the midst
    of the Jordan, from the place where the priests’ feet stood firm, twelve stones,
    and carry them over with you and set them down at the lodging place where you
    will spend the night.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'from the standing place of the priests’ feet, firmly
      set.'
    reason: lexical_alternative
  - marker: b
    text: '''Lodging place'' refers to the place where Israel would stay overnight
      after crossing, not necessarily a permanent settlement.'
    reason: cultural_note
lexical_decisions:
- source_word: וְצַוּוּ
  chosen: and command
  alternatives:
  - and instruct
  - and order
  lexicon: HALOT
  rationale: Piel imperative plural of צוה, a direct command to Joshua concerning
    what he is to tell the twelve men. 'Command' preserves the force better than the
    softer 'instruct'.
- source_word: שְׂאוּ
  chosen: Take up
  alternatives:
  - lift up
  - carry
  lexicon: HALOT
  rationale: Imperative of נשׂא. 'Take up' fits the action of lifting stones from
    the riverbed; 'carry' is used later for והעברתם to preserve the sequence of actions.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun adds personal involvement. 'For yourselves' reflects
    the Hebrew more fully than a bare 'for you,' without implying private ownership.
- source_word: מִזֶּה מִתּוֹךְ הַיַּרְדֵּן
  chosen: from here, from the midst of the Jordan
  alternatives:
  - from this place, from the middle of the Jordan
  - from here, out of the Jordan
  lexicon: HALOT
  rationale: 'The double prepositional phrasing is retained to reflect the specificity
    and vividness of the Hebrew: the stones are to be taken from this very location,
    namely from within the Jordan.'
- source_word: מִמַּצַּב רַגְלֵי הַכֹּהֲנִים
  chosen: from the place where the priests’ feet stood firm
  alternatives:
  - from the standing place of the priests' feet
  - from where the priests' feet were stationed
  lexicon: HALOT
  rationale: מַצָּב denotes a standing place or station. Because English 'from the
    standing place of the priests' feet' is awkward, the translation makes the sense
    explicit. 'Stood firm' anticipates and reflects the nuance reinforced by הָכִין.
- source_word: הָכִין
  chosen: stood firm
  alternatives:
  - were established
  - were fixed firmly
  - were set
  lexicon: HALOT
  rationale: 'Hiphil form of כון here functions adjectivally/adverbially with the
    priests'' footing: the place where their feet were firmly set. ''Stood firm''
    is idiomatic English and conveys stability in the miraculously dried riverbed.'
- source_word: שְׁתֵּים עֶשְׂרֵה אֲבָנִים
  chosen: twelve stones
  lexicon: HALOT
  rationale: Straightforward numeral plus noun; no reason to expand beyond the Hebrew.
- source_word: וְהַעֲבַרְתֶּם
  chosen: and carry them over
  alternatives:
  - and bring them across
  - and take them across
  lexicon: HALOT
  rationale: Hiphil of עבר in context means to cause the stones to pass over/across
    with the people. 'Carry them over' is natural and preserves the crossing sense.
- source_word: עִמָּכֶם
  chosen: with you
  lexicon: HALOT
  rationale: Simple accompaniment; retained directly.
- source_word: וְהִנַּחְתֶּם
  chosen: and set them down
  alternatives:
  - and place them
  - and lay them down
  lexicon: HALOT
  rationale: Hiphil of נוח here means to deposit or place. 'Set them down' is concrete
    and fits stones being deposited at the camp.
- source_word: בַּמָּלוֹן
  chosen: at the lodging place
  alternatives:
  - at the campsite
  - at the place where you lodge
  - at the camp
  lexicon: HALOT
  rationale: מָלוֹן is a place of lodging, often an overnight stopping place. 'Lodging
    place' is more precise than 'camp,' which could over-specify a military encampment.
- source_word: אֲשֶׁר תָּלִינוּ בוֹ הַלָּיְלָה
  chosen: where you will spend the night
  alternatives:
  - where you will lodge tonight
  - in which you will stay overnight
  lexicon: HALOT
  rationale: The clause explains the lodging place. English naturally expresses this
    as 'where you will spend the night.' This preserves the future sense of the imperfect
    in context.
