id: JOS.4.22
reference: Joshua 4:22
source:
  edition: WLC
  text: וְ/הוֹדַעְתֶּ֖ם אֶת בְּנֵי/כֶ֣ם לֵ/אמֹ֑ר בַּ/יַּבָּשָׁה֙ עָבַ֣ר יִשְׂרָאֵ֔ל
    אֶת הַ/יַּרְדֵּ֖ן הַ/זֶּֽה־־׃
translation:
  text: then you shall let your children know, saying, ‘Israel crossed this Jordan
    on dry ground.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sons,' if the phrase is taken more narrowly; the Hebrew can denote
      male children specifically or children more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹדַעְתֶּם
  chosen: then you shall let ... know
  alternatives:
  - and you shall make ... know
  - and you shall inform
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know, inform, or make known. English
    'let ... know' is natural modern phrasing that preserves the causative sense.
    The prefixed conjunction is rendered contextually as 'then' rather than wooden
    'and' to reflect narrative instruction flow.
- source_word: בְּנֵיכֶם
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children more broadly. In this memorial-instruction
    context, the referent is the next generation generally, so 'your children' best
    captures the sense without unnecessary narrowing.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard infinitive marker introducing the content of speech. 'Saying'
    is concise and idiomatic in English.
- source_word: בַּיַּבָּשָׁה
  chosen: on dry ground
  alternatives:
  - on the dry ground
  - through the dry ground
  lexicon: HALOT
  rationale: The noun denotes dry land/ground. 'On dry ground' is the established
    and natural English expression for crossing where water had been removed, and
    fits the memorial emphasis.
- source_word: עָבַר
  chosen: crossed
  alternatives:
  - passed over
  - went across
  lexicon: HALOT
  rationale: עבר commonly means pass over/cross. With the direct object 'this Jordan,'
    'crossed' is the clearest contemporary English rendering.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name of the people/nation; standard transliteration is appropriate.
- source_word: הַיַּרְדֵּן הַזֶּה
  chosen: this Jordan
  alternatives:
  - the Jordan, this one
  - this Jordan River
  lexicon: HALOT
  rationale: 'The demonstrative adds immediacy: ''this Jordan.'' English can omit
    ''River'' because ''Jordan'' is a standard river name, and the Hebrew text itself
    uses the proper name with demonstrative.'
