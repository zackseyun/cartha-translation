id: JOS.4.13
reference: Joshua 4:13
source:
  edition: WLC
  text: כְּ/אַרְבָּעִ֥ים אֶ֖לֶף חֲלוּצֵ֣י הַ/צָּבָ֑א עָבְר֞וּ לִ/פְנֵ֤י יְהוָה֙ לַ/מִּלְחָמָ֔ה אֶ֖ל עַֽרְב֥וֹת יְרִיחֽוֹ׃ס
translation:
  text: About forty thousand armed for war crossed over before Yahweh for battle, to the plains of Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''About forty thousand armed for war crossed over before Yahweh for battle, to the plains of Jericho.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/אַרְבָּעִים אֶלֶף
  chosen: About forty thousand
  alternatives:
  - some forty thousand
  - approximately forty thousand
  - forty thousand
  lexicon: HALOT
  rationale: The prefixed כ on the numeral gives an approximating sense ('about/as many as'). Rendering 'about forty thousand' preserves the nuance better than a bare 'forty thousand' while remaining natural English.
- source_word: חֲלוּצֵי הַצָּבָא
  chosen: armed for war
  alternatives:
  - equipped for battle
  - armed men of the army
  - battle-ready troops
  lexicon: HALOT
  rationale: חֲלוּצִים commonly refers to men equipped or arrayed for military action, often as an advance force. 'Armed for war' is concise, idiomatic, and captures the military readiness without over-specifying 'vanguard,' which the immediate context does not require in English.
- source_word: עָבְרוּ
  chosen: crossed over
  alternatives:
  - passed over
  - crossed
  lexicon: HALOT
  rationale: The verb עבר in Joshua 3–4 repeatedly refers to crossing the Jordan. 'Crossed over' preserves that narrative linkage more clearly than simply 'crossed'.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי regularly means 'before/in the presence of.' 'Before the LORD' is the standard natural rendering here. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving reverential convention and broad English Bible continuity.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - for the battle
  lexicon: HALOT
  rationale: The phrase indicates purpose/readiness for combat. 'For battle' is idiomatic in English and fits the immediate military context. 'For war' is possible, but 'battle' sounds more natural with 'armed' and avoids implying the entire campaign rather than the martial action.
- source_word: אֶל עַרְבוֹת יְרִיחוֹ
  chosen: to the plains of Jericho
  alternatives:
  - to the plains near Jericho
  - to the desert plains of Jericho
  - to the steppes of Jericho
  lexicon: HALOT
  rationale: עַרְבוֹת denotes the Jordan rift plains/steppe region. 'Plains of Jericho' is the clearest natural English rendering. 'Steppes' is more technical but less readable; 'near Jericho' adds a nuance not explicit in the construct phrase.
