id: JOS.4.14
reference: Joshua 4:14
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא גִּדַּ֤ל יְהוָה֙ אֶת יְהוֹשֻׁ֔עַ בְּ/עֵינֵ֖י כָּל יִשְׂרָאֵ֑ל וַ/יִּֽרְא֣וּ אֹת֔/וֹ כַּ/אֲשֶׁ֛ר יָרְא֥וּ אֶת מֹשֶׁ֖ה כָּל יְמֵ֥י חַיָּֽי/ו־־־־׃פ
translation:
  text: On that day Yahweh made Joshua great in the eyes of all Israel, and they feared him just as they had feared Moses all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood in awe of him' / 'revered him'; the Hebrew verb can denote fear, awe, or reverence depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - That day
  - In that day
  lexicon: HALOT
  rationale: Temporal phrase with prefixed preposition בְּ is most naturally rendered 'on' in English. 'In that day' can sound more prophetic or idiomatic than the straightforward narrative setting here.
- source_word: גִּדַּל
  chosen: made ... great
  alternatives:
  - magnified
  - made ... prominent
  - exalted
  lexicon: HALOT
  rationale: 'The Piel of גדל here is causative/intensive: YHWH caused Joshua to be regarded as great. ''Made ... great'' is clear modern English and preserves the causative sense better than the traditional but less natural ''magnified.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעֵינֵי כָּל יִשְׂרָאֵל
  chosen: in the eyes of all Israel
  alternatives:
  - in the sight of all Israel
  - before all Israel
  lexicon: HALOT
  rationale: The idiom בְּעֵינֵי literally means 'in the eyes of' and refers to public estimation or perception. This rendering preserves the Hebrew image while remaining natural in English.
- source_word: וַיִּירְאוּ אֹתוֹ
  chosen: and they feared him
  alternatives:
  - and they stood in awe of him
  - and they revered him
  lexicon: HALOT
  rationale: ירא commonly spans fear, reverence, and awe. Here the comparison with Moses and the leadership context support a response of reverential fear. 'Feared him' best preserves the lexical continuity with the following clause and avoids over-interpretation.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Marks close comparison. 'Just as' gives the emphatic comparative force naturally in English.
- source_word: יָרְאוּ אֶת מֹשֶׁה
  chosen: they had feared Moses
  alternatives:
  - they feared Moses
  - they had revered Moses
  lexicon: HALOT
  rationale: A past perfect in English fits the narrative comparison to prior experience under Moses, though the Hebrew perfect itself need not explicitly mark pluperfect. This helps the temporal relation read naturally.
- source_word: כָּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - throughout his life
  - as long as he lived
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. The more literal rendering preserves the cadence and scope of the phrase. The pronoun most naturally refers to Moses in context.
