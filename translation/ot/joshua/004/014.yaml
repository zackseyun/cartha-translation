theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of ירא toward Joshua
  chosen_reading: feared him
  alternative_readings:
  - stood in awe of him
  - revered him
  rationale: The text states Israel's response to Joshua in terms parallel to their response to Moses. Rendering with 'feared' preserves the theological and literary continuity without softening the term into mere respect, while context implies reverential fear rather than terror.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
