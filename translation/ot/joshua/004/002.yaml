id: JOS.4.2
reference: Joshua 4:2
source:
  edition: WLC
  text: קְח֤וּ לָ/כֶם֙ מִן הָ/עָ֔ם שְׁנֵ֥ים עָשָׂ֖ר אֲנָשִׁ֑ים אִישׁ אֶחָ֥ד אִישׁ
    אֶחָ֖ד מִ/שָּֽׁבֶט־־־׃
translation:
  text: Take for yourselves from the people twelve men, one man from each tribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the distributive phrase literally: ''one man, one man from
      a tribe.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Choose
  - Select
  lexicon: HALOT
  rationale: Qal imperative plural of לקח, the basic sense is 'take.' In context it
    functions as a command to obtain or designate men, but 'take' preserves the direct
    verbal force without over-interpreting.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - to yourselves
  lexicon: HALOT
  rationale: The preposition ל with 2mp suffix adds reflexive/benefactive force. 'For
    yourselves' captures that nuance more naturally than a bare 'for you.'
- source_word: מִן הָעָם
  chosen: from the people
  alternatives:
  - from among the people
  - from the nation
  lexicon: HALOT
  rationale: עם here refers to the covenant people of Israel in the immediate narrative
    setting. 'From the people' is a natural rendering; 'from among the people' is
    possible but slightly more expansive than the Hebrew wording.
- source_word: שנים עשר אנשים
  chosen: twelve men
  alternatives:
  - twelve menfolk
  - twelve persons
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes twelve adult males. Following the
    gender-accurate principle, 'men' is preferred over the gender-neutral 'persons.'
- source_word: איש אחד איש אחד
  chosen: one man from each
  alternatives:
  - one man, one man
  - one man apiece
  lexicon: HALOT
  rationale: The distributive repetition means one individual per unit. English idiom
    is best served by expressing the distributive sense as 'one man from each' rather
    than reproducing the repetition woodenly.
- source_word: משבט
  chosen: tribe
  alternatives:
  - tribal group
  - clan
  lexicon: HALOT
  rationale: שבט in this context refers to one of the tribes of Israel, not a smaller
    kinship unit. 'Tribe' is the standard and contextually precise rendering.
