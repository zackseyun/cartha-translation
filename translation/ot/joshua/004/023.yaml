id: JOS.4.23
reference: Joshua 4:23
source:
  edition: WLC
  text: אֲשֶׁר הוֹבִישׁ֩ יְהוָ֨ה אֱלֹהֵי/כֶ֜ם אֶת מֵ֧י הַ/יַּרְדֵּ֛ן מִ/פְּנֵי/כֶ֖ם עַֽד עָבְרְ/כֶ֑ם כַּ/אֲשֶׁ֣ר עָשָׂה֩ יְהוָ֨ה אֱלֹהֵי/כֶ֧ם לְ/יַם ס֛וּף אֲשֶׁר הוֹבִ֥ישׁ מִ/פָּנֵ֖י/נוּ עַד עָבְרֵֽ/נוּ־־־־־־׃
translation:
  text: For Yahweh your God dried up the waters of the Jordan before you until you crossed over, just as Yahweh your God did to the Sea of Reeds, which he dried up before us until we crossed over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally rendered “the Red Sea.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹבִישׁ
  chosen: dried up
  alternatives:
  - caused to dry up
  - made dry
  lexicon: HALOT
  rationale: Hiphil of יבש here refers to miraculously removing the water so that passage is possible. 'Dried up' is idiomatic English and matches the repeated verb in the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH and singular sense, the construct clearly means 'your God,' identifying Israel's covenant God.
- source_word: מֵי הַיַּרְדֵּן
  chosen: the waters of the Jordan
  alternatives:
  - the Jordan's waters
  - the waters of the Jordan River
  lexicon: HALOT
  rationale: This preserves the Hebrew construct and the concrete image of the river's waters being stopped.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - in front of you
  lexicon: HALOT
  rationale: The idiom literally means 'from before your face/presence'; 'before you' is natural English and fits the miracle's spatial sense.
- source_word: עַד עָבְרְכֶם
  chosen: until you crossed over
  alternatives:
  - until your crossing
  - until you had crossed
  lexicon: HALOT
  rationale: The infinitive construct with suffix expresses duration up to the completion of crossing. 'Crossed over' preserves the motion verb עבר used throughout the passage.
- source_word: כַּאֲשֶׁר עָשָׂה
  chosen: just as ... did
  alternatives:
  - as ... did
  - according as ... did
  lexicon: HALOT
  rationale: This comparative clause explicitly parallels the Jordan event with the earlier sea crossing; 'just as' makes the comparison clear in modern English.
- source_word: יַם סוּף
  chosen: the Sea of Reeds
  alternatives:
  - the Red Sea
  lexicon: HALOT
  rationale: Original-language primacy favors the plain sense of סוּף as 'reeds,' not the traditional but less precise 'Red Sea.' Because 'Red Sea' is deeply familiar, it is preserved in a footnote.
- source_word: מִפָּנֵינוּ
  chosen: before us
  alternatives:
  - from before us
  - in front of us
  lexicon: HALOT
  rationale: Same idiom as earlier in the verse, now with first person plural, preserving the speaker's identification with the exodus generation.
- source_word: עַד עָבְרֵנוּ
  chosen: until we crossed over
  alternatives:
  - until our crossing
  - until we had crossed
  lexicon: HALOT
  rationale: Parallel to the earlier phrase; keeping the same English wording preserves the verse's deliberate repetition.
