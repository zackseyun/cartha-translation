id: JOS.4.21
reference: Joshua 4:21
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר אֲשֶׁר֩ יִשְׁאָל֨וּ/ן בְּנֵי/כֶ֤ם
    מָחָר֙ אֶת אֲבוֹתָ֣/ם לֵ/אמֹ֔ר מָ֖ה הָ/אֲבָנִ֥ים הָ/אֵֽלֶּה־־׃
translation:
  text: And he said to the sons of Israel, “When your children ask their fathers in
    time to come, saying, ‘What are these stones?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “What do these stones mean?” The Hebrew reads more
      literally, “What are these stones?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “your sons.” Here the expression likely refers to descendants or
      children generally.
    reason: lexical_alternative
  - marker: c
    text: Hebrew “tomorrow,” used idiomatically here for a future time or later generation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר introducing the next action
    in sequence. 'And he said' preserves Hebrew narrative flow without overinterpreting
    temporal nuance.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' This keeps the Hebrew familial/covenantal
    expression and follows the gender-accurate principle. 'Israelites' is smoother
    but less transparent to the source wording.
- source_word: לֵאמֹר
  chosen: to introduce direct speech with quotation marks
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive construct of אמר functions as a speech introducer. In
    English, quotation marks naturally convey this without requiring a wooden repetition
    of 'saying' at the first occurrence.
- source_word: אֲשֶׁר
  chosen: When
  alternatives:
  - that
  - which
  - whenever
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces a future circumstance tied to the following verb,
    best rendered idiomatically as 'when' in English.
- source_word: יִשְׁאָלוּן
  chosen: ask
  alternatives:
  - inquire of
  - question
  lexicon: HALOT
  rationale: The verb שאל commonly means 'ask, inquire.' 'Ask' is the most natural
    modern English rendering in this family setting.
- source_word: בְּנֵיכֶם
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Although formally masculine plural ('your sons'), in context it refers
    to descendants/offspring asking about the memorial stones. 'Your children' best
    conveys the representative familial sense in natural English while fitting the
    context.
- source_word: מָחָר
  chosen: in time to come
  alternatives:
  - tomorrow
  - later
  lexicon: HALOT
  rationale: In this context מחר is idiomatic for the future generation rather than
    the next calendar day. 'In time to come' captures the sense of a later time when
    descendants ask about the stones.
- source_word: אֶת אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: Direct object marker plus 'their fathers.' The immediate sense is children
    asking their fathers; 'ancestors' would broaden the reference beyond the household
    scene.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: The second speech introducer is retained explicitly because it introduces
    the content of the children's question within the larger quotation.
- source_word: מָה הָאֲבָנִים הָאֵלֶּה
  chosen: What are these stones?
  alternatives:
  - What do these stones mean?
  - What are these stones for?
  lexicon: HALOT
  rationale: 'The Hebrew is literally identificational: ''What are these stones?''
    The interpretive sense ''What do these stones mean?'' is contextually implied
    and appears in some translations, but the more transparent rendering should be
    kept in the main text.'
