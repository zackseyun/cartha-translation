id: JOS.4.5
reference: Joshua 4:5
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ יְהוֹשֻׁ֔עַ עִ֠בְרוּ לִ/פְנֵ֨י אֲר֧וֹן יְהוָ֛ה אֱלֹֽהֵי/כֶ֖ם
    אֶל תּ֣וֹךְ הַ/יַּרְדֵּ֑ן וְ/הָרִ֨ימוּ לָ/כֶ֜ם אִ֣ישׁ אֶ֤בֶן אַחַת֙ עַל שִׁכְמ֔/וֹ
    לְ/מִסְפַּ֖ר שִׁבְטֵ֥י בְנֵי יִשְׂרָאֵֽל־־־׃
translation:
  text: And Joshua said to them, “Cross over before the ark of the LORD your God into
    the middle of the Jordan, and let each man lift up one stone on his shoulder,
    according to the number of the tribes of the sons of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'' This is the formal covenantal expression;
      many English versions simplify it to ''the Israelites'' or ''the people of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative progression; 'And' preserves Hebrew narrative
    flow without overinterpreting temporal sequence.
- source_word: עִבְרוּ
  chosen: Cross over
  alternatives:
  - Pass over
  - Go over
  lexicon: HALOT
  rationale: Imperative of עבר in a river-crossing context; 'cross over' is natural
    modern English and preserves the movement across a boundary.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - ahead of
  lexicon: HALOT
  rationale: Spatial term indicating position relative to the ark; 'before' is concise
    and idiomatic in elevated narrative style.
- source_word: אֲרוֹן יְהוָה אֱלֹהֵיכֶם
  chosen: the ark of the LORD your God
  alternatives:
  - the ark of Yahweh your God
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. Per doctrine, יְהוָה is translated
    'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine's contested terms table for the divine name.
- source_word: אֶל תּוֹךְ הַיַּרְדֵּן
  chosen: into the middle of the Jordan
  alternatives:
  - into the midst of the Jordan
  - into the Jordan
  lexicon: HALOT
  rationale: תּוֹךְ denotes the interior/middle, not merely entry into the river.
    'The Jordan' is idiomatic English for the river.
- source_word: וְהָרִימוּ לָכֶם
  chosen: and let ... lift up
  alternatives:
  - and raise for yourselves
  - and carry away for yourselves
  lexicon: HALOT
  rationale: Hiphil imperative of רום here means to lift/carry up. 'Let each man lift
    up' reflects distributive force with natural English command style.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: Gender-accurate rendering per doctrine. The masculine singular distributive
    refers to one male representative from each tribe in context, so 'each man' is
    preferable to gender-neutral smoothing.
- source_word: אֶבֶן אַחַת
  chosen: one stone
  alternatives:
  - a single stone
  lexicon: HALOT
  rationale: Simple numeral + noun; 'one stone' is direct and idiomatic.
- source_word: עַל שִׁכְמוֹ
  chosen: on his shoulder
  alternatives:
  - upon his shoulder
  lexicon: HALOT
  rationale: Singular suffix matches the distributive singular אִישׁ; English singular
    retained.
- source_word: לְמִסְפַּר
  chosen: according to the number of
  alternatives:
  - by the number of
  - corresponding to the number of
  lexicon: HALOT
  rationale: Expresses correspondence between stones and tribal count; 'according
    to the number of' is clear and formal enough.
- source_word: שִׁבְטֵי בְנֵי יִשְׂרָאֵל
  chosen: the tribes of the sons of Israel
  alternatives:
  - the tribes of the children of Israel
  - the tribes of Israel
  lexicon: HALOT
  rationale: Retains both elements of the Hebrew expression. 'Sons of Israel' preserves
    the formal covenantal designation and avoids flattening the phrase to simply 'Israel.'
