theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gender rendering of אִישׁ and בְנֵי יִשְׂרָאֵל
  chosen_reading: each man ... the sons of Israel
  alternative_readings:
  - each one ... the people of Israel
  - each person ... the Israelites
  rationale: The source uses masculine forms, and the immediate context concerns selected
    male representatives from the tribes. Per doctrine, gender-accurate rendering
    is preferred over gender-neutral smoothing.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
