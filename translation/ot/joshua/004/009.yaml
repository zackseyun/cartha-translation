id: JOS.4.9
reference: Joshua 4:9
source:
  edition: WLC
  text: וּ/שְׁתֵּ֧ים עֶשְׂרֵ֣ה אֲבָנִ֗ים הֵקִ֣ים יְהוֹשֻׁעַ֮ בְּ/ת֣וֹךְ הַ/יַּרְדֵּן֒
    תַּ֗חַת מַצַּב֙ רַגְלֵ֣י הַ/כֹּהֲנִ֔ים נֹשְׂאֵ֖י אֲר֣וֹן הַ/בְּרִ֑ית וַ/יִּ֣הְיוּ
    שָׁ֔ם עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׃
translation:
  text: And Joshua set up twelve stones in the midst of the Jordan, beneath the place
    where the feet of the priests carrying the ark of the covenant had stood, and
    they are there to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beneath the standing-place of the feet of the priests.' The Hebrew expression
      is very literal and refers to the spot where the priests stood while carrying
      the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵקִים
  chosen: set up
  alternatives:
  - raised
  - erected
  lexicon: HALOT
  rationale: The verb from קום in the Hiphil commonly means to set up or erect an
    object. 'Set up' is natural modern English and fits the memorial-stone context
    without sounding overly formal.
- source_word: בְּתוֹךְ הַיַּרְדֵּן
  chosen: in the midst of the Jordan
  alternatives:
  - in the middle of the Jordan
  - within the Jordan
  lexicon: HALOT
  rationale: תּוֹךְ denotes the middle or interior. 'In the midst of' preserves the
    spatial force and the solemn tone of the narrative better than the flatter 'in
    the middle of.'
- source_word: תַּחַת מַצַּב רַגְלֵי
  chosen: beneath the place where the feet ... had stood
  alternatives:
  - under the standing place of the feet
  - beneath the standing-place of the feet
  lexicon: HALOT
  rationale: מַצָּב refers to a standing place or station. A highly literal rendering
    ('under the standing place of the feet') is awkward in English, so 'beneath the
    place where the feet ... had stood' conveys the sense idiomatically while preserving
    the locative detail.
- source_word: נֹשְׂאֵי אֲרוֹן הַבְּרִית
  chosen: carrying the ark of the covenant
  alternatives:
  - bearing the ark of the covenant
  lexicon: HALOT
  rationale: The participle נֹשְׂאֵי describes the priests as those carrying/bearing
    the ark. 'Carrying' is clearer modern English; 'bearing' is possible but slightly
    more archaic.
- source_word: וַיִּהְיוּ שָׁם
  chosen: and they are there
  alternatives:
  - and they were there
  - and they remain there
  lexicon: HALOT
  rationale: Although the wayyiqtol is formally past, in the idiom with עַד הַיּוֹם
    הַזֶּה the sense is continuative from the narrator's standpoint. 'Are there' best
    captures the present relevance of the memorial up to the time of writing.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking persistence up to the narrator's
    present. 'To this day' is the established and natural English equivalent.
