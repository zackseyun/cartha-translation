theological_decisions:
- issue: Narrative tension between this verse and the twelve stones set up at Gilgal
    in the surrounding context
  chosen_reading: Translate this verse straightforwardly as describing Joshua setting
    up twelve stones in the Jordan itself.
  alternative_readings:
  - Interpret the verse as summarizing the stones taken from the Jordan and set up
    elsewhere
  - Emend or harmonize the text to avoid two stone memorials
  rationale: The Hebrew plainly states that Joshua set up twelve stones 'in the midst
    of the Jordan.' The translation should preserve the textual claim rather than
    harmonize it away. Any interpretive reconciliation belongs outside the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the memorial formula עַד הַיּוֹם הַזֶּה
  chosen_reading: 'Render as an ongoing state from the narrator''s perspective: ''they
    are there to this day.'''
  alternative_readings:
  - '''they were there to this day'''
  rationale: This preserves the narrator-relative temporal perspective without importing
    claims about their visibility in the reader's present day.
  doctrine_reference: Translation philosophy §1, §6
