id: JOS.4.20
reference: Joshua 4:20
source:
  edition: WLC
  text: וְ/אֵת֩ שְׁתֵּ֨ים עֶשְׂרֵ֤ה הָֽ/אֲבָנִים֙ הָ/אֵ֔לֶּה אֲשֶׁ֥ר לָקְח֖וּ מִן
    הַ/יַּרְדֵּ֑ן הֵקִ֥ים יְהוֹשֻׁ֖עַ בַּ/גִּלְגָּֽל־׃
translation:
  text: And Joshua set up at Gilgal these twelve stones, which they had taken from
    the Jordan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵת
  chosen: And
  alternatives:
  - Now, as for
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding narrative. The object
    marker אֵת has no direct English equivalent, so only the connective force is represented.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  alternatives:
  - the twelve
  lexicon: HALOT
  rationale: The Hebrew numeral phrase means 'twelve.' English idiom naturally compresses
    the compound number into a single word.
- source_word: הָאֲבָנִים הָאֵלֶּה
  chosen: these ... stones
  alternatives:
  - these stones here
  - the stones האלה
  lexicon: HALOT
  rationale: Rendered straightforwardly as 'these stones,' preserving both the noun
    and demonstrative. English word order places the demonstrative before the noun.
- source_word: אֲשֶׁר לָקְחוּ
  chosen: which they had taken
  alternatives:
  - that they took
  lexicon: HALOT
  rationale: The relative clause identifies the stones. 'Had taken' is a natural English
    pluperfect because the taking occurred prior to Joshua's setting them up.
- source_word: מִן הַיַּרְדֵּן
  chosen: from the Jordan
  alternatives:
  - from the Jordan River
  lexicon: HALOT
  rationale: '''The Jordan'' is standard English for the river and sufficiently clear
    in context. ''River'' could be added for explicitness, but the shorter form is
    more natural and traditional without loss of meaning.'
- source_word: הֵקִים
  chosen: set up
  alternatives:
  - erected
  - raised up
  lexicon: HALOT
  rationale: In context of memorial stones, 'set up' is the most natural modern English
    rendering, balancing literal sense and readability.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: For a named site/location, 'at Gilgal' is the most idiomatic English
    rendering of the preposition בְּ in this context.
