id: JOS.4.24
reference: Joshua 4:24
source:
  edition: WLC
  text: לְ֠מַעַן דַּ֜עַת כָּל עַמֵּ֤י הָ/אָ֨רֶץ֙ אֶת יַ֣ד יְהוָ֔ה כִּ֥י חֲזָקָ֖ה הִ֑יא
    לְמַ֧עַן יְרָאתֶ֛ם אֶת יְהוָ֥ה אֱלֹהֵי/כֶ֖ם כָּל הַ/יָּמִֽים־־־־׃ס
translation:
  text: so that all the peoples of the earth may know that the hand of the LORD is
    strong, and so that you may fear the LORD your God all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the peoples of the land,' if הָאָרֶץ is taken more locally rather
      than globally.
    reason: lexical_alternative
  - marker: b
    text: '''Fear'' here includes reverence and awe toward the LORD, not merely terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose in both clauses. 'So that' is natural modern English
    and preserves the purposive force.
- source_word: דַּעַת
  chosen: may know
  alternatives:
  - might know
  - to know
  lexicon: HALOT
  rationale: Infinitive construct after לְמַעַן expresses intended result/purpose.
    English finite verb with 'may' best conveys this.
- source_word: כָּל עַמֵּי הָאָרֶץ
  chosen: all the peoples of the earth
  alternatives:
  - all the peoples of the land
  - all the nations of the earth
  lexicon: HALOT
  rationale: עַמִּים is 'peoples' rather than specifically 'nations'; הָאָרֶץ here
    is best taken globally in context of public divine demonstration, so 'earth' is
    preferred over 'land.'
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the power of the LORD
  - the LORD's hand
  lexicon: HALOT
  rationale: Retains the Hebrew anthropomorphic idiom rather than flattening it to
    'power.' This preserves biblical imagery while remaining clear in English. YHWH
    is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with the contested-terms table.
- source_word: כִּי חֲזָקָה הִיא
  chosen: is strong
  alternatives:
  - is mighty
  - is powerful
  lexicon: HALOT
  rationale: Predicate adjective with feminine pronoun referring back to 'hand.' 'Strong'
    is the most direct lexical equivalent of חָזָק and fits the idiom 'hand ... is
    strong.'
- source_word: יְרָאתֶם
  chosen: you may fear
  alternatives:
  - you may revere
  - you may stand in awe of
  lexicon: HALOT
  rationale: The verb ירא in covenant contexts includes reverence and awe, but 'fear'
    is the standard and theologically weighty rendering. More interpretive alternatives
    are preserved in a footnote.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH as the referent and covenantal context, the plural form functions
    as the singular title 'God.'
- source_word: כָּל הַיָּמִים
  chosen: all your days
  alternatives:
  - all the days
  - always
  lexicon: HALOT
  rationale: Idiomatic expression for lifelong duration. 'All your days' communicates
    the covenantal, enduring sense more precisely than the adverb 'always.'
