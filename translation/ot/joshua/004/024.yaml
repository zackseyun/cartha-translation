theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the doctrine table
    and preserving continuity with Jewish reverence practice and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to interpret ירא as reverential awe rather than fear
  chosen_reading: fear
  alternative_readings:
  - revere
  - stand in awe of
  rationale: The Hebrew verb can include reverence, but the text itself does not require
    softening to a less direct term. Preserving 'fear' maintains the theological tension
    of covenant reverence and holy dread without over-interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
