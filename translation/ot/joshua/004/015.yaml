id: JOS.4.15
reference: Joshua 4:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה אֶל יְהוֹשֻׁ֖עַ לֵ/אמֹֽר־׃
translation:
  text: And the LORD said to Joshua,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''saying''; this introduces the direct speech in the following
      verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow in natural English; 'Then' is possible but less formally
    aligned.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD,' following
    established reverential convention and the pattern reflected in the Septuagint's
    κύριος.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the clear
    modern English equivalent; 'unto' is archaic.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Joshua'
    is the established English form of יְהוֹשֻׁעַ.
- source_word: לֵאמֹר
  chosen: ','
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר introduces the following direct speech in the next
    verse. In English, this is often best represented by punctuation rather than the
    explicit 'saying,' which can sound wooden. The sense is preserved by the comma
    anticipating the quotation.
