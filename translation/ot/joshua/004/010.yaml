id: JOS.4.10
reference: Joshua 4:10
source:
  edition: WLC
  text: וְ/הַ/כֹּהֲנִ֞ים נֹשְׂאֵ֣י הָ/אָר֗וֹן עֹמְדִים֮ בְּ/ת֣וֹךְ הַ/יַּרְדֵּן֒ עַ֣ד תֹּ֣ם כָּֽל הַ֠/דָּבָר אֲשֶׁר צִוָּ֨ה יְהוָ֤ה אֶת יְהוֹשֻׁ֨עַ֙ לְ/דַבֵּ֣ר אֶל הָ/עָ֔ם כְּ/כֹ֛ל אֲשֶׁר צִוָּ֥ה מֹשֶׁ֖ה אֶת יְהוֹשֻׁ֑עַ וַ/יְמַהֲר֥וּ הָ/עָ֖ם וַֽ/יַּעֲבֹֽרוּ־־־־־־׃
translation:
  text: And the priests carrying the ark stood in the midst of the Jordan until everything was finished that Yahweh had commanded Joshua to speak to the people, according to all that Moses had commanded Joshua. And the people hurried and crossed over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''until all the matter was finished''; the phrase summarizes the completion of everything the LORD had commanded Joshua to say to the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in this narrative context; definite article preserved.
- source_word: נֹשְׂאֵי הָאָרוֹן
  chosen: carrying the ark
  alternatives:
  - bearing the ark
  lexicon: HALOT
  rationale: Participial construction describes the priests by their ongoing action. 'Carrying' is natural modern English; 'bearing' is more formal but less current.
- source_word: עֹמְדִים
  chosen: stood
  alternatives:
  - were standing
  lexicon: HALOT
  rationale: Hebrew participle conveys continuing posture; English simple past fits the narrative flow while still implying durative action in context.
- source_word: בְּתוֹךְ הַיַּרְדֵּן
  chosen: in the midst of the Jordan
  alternatives:
  - in the middle of the Jordan
  - within the Jordan
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst/middle of.' 'Jordan' here refers to the river. 'In the midst of' preserves the solemn narrative tone and spatial sense.
- source_word: עַד תֹּם כָּל הַדָּבָר
  chosen: until everything was finished
  alternatives:
  - until the whole matter was finished
  - until all the thing was completed
  lexicon: HALOT
  rationale: Though literally 'until the completion of all the matter/word,' the idiom refers to the completion of the commanded proceedings. 'Everything was finished' is clear and faithful without woodenness.
- source_word: הַדָּבָר
  chosen: everything
  alternatives:
  - the matter
  - the word
  - the thing
  lexicon: HALOT
  rationale: דָּבָר is broad ('word, matter, thing'). In this context it summarizes the totality of what had to be done/said, so 'everything' best captures the collective sense in idiomatic English.
- source_word: צִוָּה יְהוָה
  chosen: the LORD had commanded
  alternatives:
  - the LORD commanded
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. Pluperfect English helps show the command preceded the standing/crossing actions in the narrative sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by DOCTRINE.md contested terms table for יְהוָה.
- source_word: לְדַבֵּר אֶל הָעָם
  chosen: to speak to the people
  alternatives:
  - to tell the people
  lexicon: HALOT
  rationale: דבר אל commonly means 'speak to.' This preserves the verbal act without over-interpreting the content as merely informational.
- source_word: כְּכֹל אֲשֶׁר צִוָּה מֹשֶׁה אֶת יְהוֹשֻׁעַ
  chosen: according to all that Moses had commanded Joshua
  alternatives:
  - just as Moses had commanded Joshua
  lexicon: HALOT
  rationale: כְּכֹל marks conformity. 'According to all that' closely reflects the Hebrew while remaining readable. Pluperfect again clarifies prior command.
- source_word: וַיְמַהֲרוּ
  chosen: hurried
  alternatives:
  - made haste
  - quickly moved
  lexicon: HALOT
  rationale: The verb denotes haste. 'Hurried' is natural modern English and preserves the urgency.
- source_word: וַיַּעֲבֹרוּ
  chosen: crossed over
  alternatives:
  - passed over
  - crossed
  lexicon: HALOT
  rationale: עבר in this context is the crossing of the river. 'Crossed over' is the standard narrative rendering and echoes the event's movement from one side to the other.
