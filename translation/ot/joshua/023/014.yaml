id: JOS.23.14
reference: Joshua 23:14
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה אָנֹכִ֤י הוֹלֵךְ֙ הַ/יּ֔וֹם בְּ/דֶ֖רֶךְ כָּל הָ/אָ֑רֶץ וִ/ידַעְתֶּ֞ם
    בְּ/כָל לְבַבְ/כֶ֣ם וּ/בְ/כָל נַפְשְׁ/כֶ֗ם כִּ֣י לֹֽא נָפַל֩ דָּבָ֨ר אֶחָ֜ד מִ/כֹּ֣ל
    הַ/דְּבָרִ֣ים הַ/טּוֹבִ֗ים אֲשֶׁ֨ר דִּבֶּ֜ר יְהוָ֤ה אֱלֹהֵי/כֶם֙ עֲלֵי/כֶ֔ם הַ/כֹּל֙
    בָּ֣אוּ לָ/כֶ֔ם לֹֽא נָפַ֥ל מִמֶּ֖/נּוּ דָּבָ֥ר אֶחָֽד־־־־׀־׃
translation:
  text: And behold, today I am going the way of all the earth, and you know with all
    your heart and with all your soul that not one word has fallen from all the good
    words that the LORD your God spoke concerning you. All of them have come to you;
    not one word from them has fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not one thing has failed' / 'not one promise has failed.' The Hebrew
      says literally, 'not one word has fallen.'
    reason: lexical_alternative
  - marker: b
    text: '''The way of all the earth'' is a Hebrew idiom for the common destiny of
      all people, especially death.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And see
  - Now behold
  lexicon: HALOT
  rationale: Retains the discourse-marking force and solemn attention-getting function
    at the start of Joshua's statement. 'Behold' is still understandable in elevated
    modern English and fits the gravity of the context.
- source_word: אָנֹכִי הוֹלֵךְ הַיּוֹם
  chosen: today I am going
  alternatives:
  - I am about to go today
  - today I am departing
  lexicon: HALOT
  rationale: The participle הוֹלֵךְ with the temporal marker הַיּוֹם expresses imminent
    personal departure. 'I am going' preserves the Hebrew idiom without overinterpreting
    it as merely 'about to die,' since the next phrase supplies that idiom.
- source_word: בְּדֶרֶךְ כָּל הָאָרֶץ
  chosen: the way of all the earth
  alternatives:
  - the way of all the world
  - the common way of all the earth
  lexicon: HALOT
  rationale: A conventional Hebrew idiom for dying. The translation keeps the metaphor
    rather than flattening it to 'I am dying,' preserving the literary dignity and
    intertextual resonance.
- source_word: וִידַעְתֶּם
  chosen: you know
  alternatives:
  - you have known
  - you must know
  lexicon: HALOT
  rationale: Though formally perfect, in context it functions as a present recognition
    grounded in experience. 'You know' is natural English and fits the exhortational
    tone.
- source_word: בְּכָל לְבַבְכֶם וּבְכָל נַפְשְׁכֶם
  chosen: with all your heart and with all your soul
  alternatives:
  - with your whole heart and your whole being
  - with all your mind and all your life
  lexicon: HALOT
  rationale: Preserves the covenantal anthropological pair 'heart' and 'soul' in familiar
    biblical diction. This is more faithful than paraphrasing to 'whole being,' though
    that sense is implicit.
- source_word: לֹא נָפַל דָּבָר אֶחָד
  chosen: not one word has fallen
  alternatives:
  - not one thing has failed
  - not one matter has fallen short
  lexicon: HALOT
  rationale: The idiom with נפל conveys failure or non-fulfillment. 'Has fallen' preserves
    the Hebrew image, while the surrounding clause makes the sense clear. 'Word' is
    chosen for דָּבָר because the referent is what the LORD spoke.
- source_word: מִכֹּל הַדְּבָרִים הַטּוֹבִים
  chosen: from all the good words
  alternatives:
  - from all the good things
  - from all the good promises
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or by implication 'promises.'
    Because the next clause explicitly says 'spoke,' 'words' best preserves the lexical
    link. 'Promises' is interpretive and therefore left as an alternative, not the
    main text.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֱלֹהֵיכֶם עֲלֵיכֶם
  chosen: that the LORD your God spoke concerning you
  alternatives:
  - that the LORD your God spoke to you
  - that the LORD your God promised to you
  lexicon: HALOT
  rationale: The preposition עַל here is best rendered 'concerning' or 'regarding,'
    referring to what God declared for Israel's benefit. 'Concerning you' is slightly
    more literal than 'to you' while remaining clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: הַכֹּל בָּאוּ לָכֶם
  chosen: All of them have come to you
  alternatives:
  - All have come upon you
  - Every one has come true for you
  lexicon: HALOT
  rationale: The plural verb with הַכֹּל refers back to the totality of the good words.
    'Have come to you' preserves the arrival/fulfillment imagery without adding the
    interpretive phrase 'come true,' though that is the sense.
- source_word: לֹא נָפַל מִמֶּנּוּ דָּבָר אֶחָד
  chosen: not one word from them has fallen
  alternatives:
  - not one of them has failed
  - not one word of it has fallen
  lexicon: HALOT
  rationale: The suffix is morphologically first common plural in the provided table,
    but contextually the clause clearly means that not one item among the previously
    mentioned words has failed. Rendering the sense as 'from them' communicates the
    collective antecedent in idiomatic English while preserving the repeated 'fallen'
    idiom.
