id: JOS.23.4
reference: Joshua 23:4
source:
  edition: WLC
  text: רְאוּ֩ הִפַּ֨לְתִּי לָ/כֶ֜ם אֶֽת הַ֠/גּוֹיִם הַ/נִּשְׁאָרִ֥ים הָ/אֵ֛לֶּה בְּ/נַחֲלָ֖ה
    לְ/שִׁבְטֵי/כֶ֑ם מִן הַ/יַּרְדֵּ֗ן וְ/כָל הַ/גּוֹיִם֙ אֲשֶׁ֣ר הִכְרַ֔תִּי וְ/הַ/יָּ֥ם
    הַ/גָּד֖וֹל מְב֥וֹא הַ/שָּֽׁמֶשׁ־־־׃
translation:
  text: See, I have allotted to you these nations that remain as an inheritance for
    your tribes, from the Jordan, along with all the nations that I have cut off,
    to the Great Sea toward the going down of the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''toward the going down of the sun,'' that is, toward the west.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative plural of ראה used to draw attention emphatically. 'See' is
    natural modern English and preserves the deictic force without archaic tone.
- source_word: הִפַּ֨לְתִּי
  chosen: I have allotted
  alternatives:
  - I have caused to fall
  - I have assigned by lot
  - I have apportioned
  lexicon: HALOT
  rationale: Hiphil of נפל here idiomatically refers to causing portions to fall by
    lot, hence assigning/allotting territory. 'Allotted' communicates the land-distribution
    sense better than the overly literal 'caused to fall.'
- source_word: בְּנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה in Joshua commonly denotes inherited territorial possession. 'As
    an inheritance' is idiomatic and preserves covenant-land nuance.
- source_word: לְשִׁבְטֵיכֶם
  chosen: for your tribes
  alternatives:
  - to your tribes
  lexicon: HALOT
  rationale: The preposition marks the beneficiaries/recipients of the allotment.
    'For your tribes' reads naturally in English in this land-allotment context.
- source_word: הַגּוֹיִם הַנִּשְׁאָרִים הָאֵלֶּה
  chosen: these nations that remain
  alternatives:
  - these remaining nations
  - these nations left over
  lexicon: HALOT
  rationale: The participle נִשְׁאָרִים describes nations still left in the land.
    'These nations that remain' is clear and slightly more formal than 'left over.'
- source_word: מִן הַיַּרְדֵּן ... וְהַיָּם הַגָּדוֹל
  chosen: from the Jordan ... to the Great Sea
  alternatives:
  - from the Jordan ... and the Great Sea
  lexicon: HALOT
  rationale: This phrase marks territorial extent. Although the Hebrew uses waw before
    'the Great Sea,' the sense in context is a boundary span, best rendered in English
    as 'from ... to ...'.
- source_word: וְכָל הַגּוֹיִם אֲשֶׁר הִכְרַתִּי
  chosen: along with all the nations that I have cut off
  alternatives:
  - including all the nations that I have destroyed
  - and all the nations that I have cut off
  lexicon: HALOT
  rationale: הכרתּי from כרת in this context means to cut off/destroy. 'Cut off' preserves
    the Hebrew idiom and covenant-judgment tone. 'Along with' helps connect this phrase
    appositionally within the boundary/allotment statement.
- source_word: מְבוֹא הַשָּׁמֶשׁ
  chosen: toward the going down of the sun
  alternatives:
  - toward the west
  - where the sun sets
  lexicon: HALOT
  rationale: Literally 'the entrance/going in of the sun,' an idiom for sunset/west.
    The chosen rendering preserves the imagery while remaining understandable; 'west'
    is possible but less textually transparent.
