theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves continuity
    with Jewish reverence practice and common English Bible usage while still marking
    the covenant name distinctly from 'God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of ירש in the second clause versus the third clause
  chosen_reading: 'Different English renderings: ''dispossess them'' / ''take possession
    of their land'''
  alternative_readings:
  - Use 'drive out' for both clauses
  - Use 'inherit' for Israel's action
  rationale: The Hebrew repeats the root ירש in different stems and senses. Rendering
    both identically would flatten the contrast between God causing the nations to
    lose possession and Israel gaining possession. The chosen pair preserves the theological
    and legal-land nuance without overinterpreting.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §5: consistency of key terms,
    or documented exception'
