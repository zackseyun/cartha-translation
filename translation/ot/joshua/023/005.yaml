id: JOS.23.5
reference: Joshua 23:5
source:
  edition: WLC
  text: וַ/יהוָ֣ה אֱלֹֽהֵי/כֶ֗ם ה֚וּא יֶהְדֳּפֵ֣/ם מִ/פְּנֵי/כֶ֔ם וְ/הוֹרִ֥ישׁ אֹתָ֖/ם
    מִ/לִּ/פְנֵי/כֶ֑ם וִֽ/ירִשְׁתֶּם֙ אֶת אַרְצָ֔/ם כַּ/אֲשֶׁ֥ר דִּבֶּ֛ר יְהוָ֥ה אֱלֹהֵי/כֶ֖ם
    לָ/כֶֽם־׃
translation:
  text: And the LORD your God, he himself will drive them out from before you and
    dispossess them from before you, and you will take possession of their land, just
    as the LORD your God spoke to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you will inherit their land.' The Hebrew verb can mean 'inherit'
      or 'take possession of'; here the latter was chosen to fit the conquest context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'just as the LORD your God spoke to you'; the sense includes promise,
      but the main text keeps the more literal 'spoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while matching established English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'In construct with YHWH and with 2mp suffix, the sense is singular: Israel''s
    God. ''Your God'' is the natural English rendering.'
- source_word: הוּא
  chosen: he himself
  alternatives:
  - he
  - he is the one who
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'He himself' preserves the emphasis
    that the LORD personally acts on Israel's behalf.
- source_word: יֶהְדֳּפֵם
  chosen: will drive them out
  alternatives:
  - will thrust them away
  - will push them back
  - will pursue them
  lexicon: HALOT
  rationale: From הדף, conveying forceful driving away. In this conquest context,
    'drive them out' best matches the idiom and expected result.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - before you
  - from your presence
  lexicon: HALOT
  rationale: The idiom literally means removal from Israel's presence/front. 'From
    before you' preserves the Hebrew spatial idiom without becoming obscure.
- source_word: וְהוֹרִישׁ אֹתָם
  chosen: and dispossess them
  alternatives:
  - and drive them out
  - and make them lose possession
  - and cause them to inherit
  lexicon: HALOT
  rationale: Hiphil of ירש here means causing prior occupants to lose possession.
    'Dispossess' distinguishes it from the previous verb and preserves the land-tenure
    nuance.
- source_word: מִלִּפְנֵיכֶם
  chosen: from before you
  alternatives:
  - from before your face
  - out of your presence
  lexicon: HALOT
  rationale: Repeats the same Hebrew idiom as earlier in the verse; retained consistently
    in English.
- source_word: וִירִשְׁתֶּם
  chosen: and you will take possession of
  alternatives:
  - and you will inherit
  - and you will possess
  lexicon: HALOT
  rationale: Qal of ירש can mean inherit/possess. In the conquest-land context, 'take
    possession of' communicates actual acquisition of the land without implying merely
    passive inheritance.
- source_word: אֶת אַרְצָם
  chosen: their land
  alternatives:
  - their country
  - the land of them
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to the land currently
    occupied by the nations.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... spoke
  alternatives:
  - as ... promised
  - according as ... said
  lexicon: HALOT
  rationale: The verb is 'spoke/said.' Because the speech here functions promissorily,
    'just as ... spoke to you' preserves the lexical form while allowing the promise
    sense to remain implicit.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the indirect object of divine speech; 'to you'
    is the most direct rendering.
