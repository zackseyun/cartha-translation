id: JOS.23.2
reference: Joshua 23:2
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א יְהוֹשֻׁ֨עַ֙ לְ/כָל יִשְׂרָאֵ֔ל לִ/זְקֵנָי/ו֙ וּ/לְ/רָאשָׁ֔י/ו
    וּ/לְ/שֹׁפְטָ֖י/ו וּ/לְ/שֹֽׁטְרָ֑י/ו וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם אֲנִ֣י זָקַ֔נְתִּי
    בָּ֖אתִי בַּ/יָּמִֽים־׃
translation:
  text: Then Joshua called for all Israel—for its elders, its heads, its judges, and
    its officers—and said to them, “I am old; I have advanced in years.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'called' or 'summoned.' The Hebrew verb means to call or summon, here
      with the sense of calling the leaders together.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its heads,' that is, its leading men or chiefs.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: ''I have come into days,'' meaning ''I have advanced in years.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with לְ marks summoning persons to oneself. 'Called for'
    captures the sense naturally in English better than the more wooden 'called to.'
    'Summoned' is possible but slightly more formal and forceful than the context
    requires.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: for all Israel
  alternatives:
  - to all Israel
  - all Israel
  lexicon: HALOT
  rationale: Retains the collective national reference while reflecting the preposition
    לְ after קרא. Because the following appositional list specifies leadership groups,
    'all Israel' is best understood representatively rather than every individual
    Israelite physically present.
- source_word: לִזְקֵנָיו
  chosen: its elders
  alternatives:
  - his elders
  - the elders
  lexicon: HALOT
  rationale: The 3ms suffix refers back to Israel as a collective entity, so English
    'its elders' is the most precise. 'His elders' would personify Israel in a way
    that is less natural in English here.
- source_word: וּלְרָאשָׁיו
  chosen: its heads
  alternatives:
  - its leaders
  - its chiefs
  lexicon: HALOT
  rationale: ראשׁ in this administrative list literally means 'heads' and often denotes
    leading men. 'Heads' preserves the source image and distinctness from the other
    offices; 'leaders' is interpretive and could blur the differentiation among the
    listed groups.
- source_word: וּלְשֹׁפְטָיו
  chosen: its judges
  alternatives:
  - its rulers
  lexicon: HALOT
  rationale: The participial/nominal form from שׁפט in this civic context straightforwardly
    denotes judicial officials. 'Judges' is the standard and clearest rendering.
- source_word: וּלְשֹׁטְרָיו
  chosen: its officers
  alternatives:
  - its officials
  - its scribes
  lexicon: HALOT
  rationale: שׁטרים refers to subordinate administrative officers. 'Officers' is the
    conventional rendering and fits the governmental setting. 'Scribes' is too narrow
    here.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: and said to them
  alternatives:
  - and told them
  lexicon: HALOT
  rationale: A direct-speech introduction is best rendered simply and formally here.
- source_word: אֲנִי זָקַנְתִּי
  chosen: I am old
  alternatives:
  - I have grown old
  - I have become old
  lexicon: HALOT
  rationale: Although the Hebrew perfect can be rendered 'I have grown old,' idiomatic
    English in this self-description is 'I am old.' This preserves the present state
    resulting from the completed process.
- source_word: בָּאתִי בַּיָּמִים
  chosen: I have advanced in years
  alternatives:
  - I have come into days
  - I am advanced in days
  - I am well along in years
  lexicon: HALOT
  rationale: This Hebrew idiom means to be advanced in age. 'I have advanced in years'
    is natural modern English while preserving the idiomatic force without paraphrastic
    expansion.
