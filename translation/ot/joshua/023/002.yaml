theological_decisions:
- issue: Referent of 'all Israel' in light of the following leadership list
  chosen_reading: The phrase is retained as 'all Israel' while the subsequent offices
    specify representative leaders being addressed.
  alternative_readings:
  - Translate only the representatives, e.g., 'Joshua called all the leaders of Israel'
  rationale: The Hebrew explicitly says 'all Israel' and then appositionally lists
    elders, heads, judges, and officers. The translation preserves both elements rather
    than collapsing the collective into an interpretive paraphrase.
  doctrine_reference: Translation philosophy §1, §5
