id: JOS.23.11
reference: Joshua 23:11
source:
  edition: WLC
  text: וְ/נִשְׁמַרְתֶּ֥ם מְאֹ֖ד לְ/נַפְשֹֽׁתֵי/כֶ֑ם לְ/אַהֲבָ֖ה אֶת יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: So be very careful for your own selves to love the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for yourselves,' 'for your lives,' or more traditionally 'for your souls.'
      The Hebrew noun can refer to the self, life, or soul depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַרְתֶּם
  chosen: be careful
  alternatives:
  - guard yourselves
  - take heed
  - watch yourselves carefully
  lexicon: HALOT
  rationale: Nifal imperative/command form from שׁמר here carries the reflexive sense
    of guarding oneself or taking care. 'Be careful' is idiomatic modern English and
    preserves the exhortational force without awkward literalism.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - carefully (absorbed into phrase)
  lexicon: HALOT
  rationale: The adverb intensifies the command. Rendering it as 'very' keeps the
    emphasis straightforwardly in English.
- source_word: לְנַפְשֹׁתֵיכֶם
  chosen: for your own selves
  alternatives:
  - for yourselves
  - for your lives
  - for your souls
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote self, life, or soul depending on context. In this idiom
    with נשׁמר, the sense is reflexive/self-referential rather than specifically immaterial
    'souls.' 'For your own selves' makes the reflexive force explicit and avoids importing
    later anthropological assumptions.
- source_word: לְאַהֲבָה
  chosen: to love
  alternatives:
  - for loving
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result following the command: they
    are to guard themselves so as to love the LORD. ''To love'' is the most natural
    English rendering.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with second person plural suffix identifies covenant relationship:
    ''your God.'' This is direct and standard.'
