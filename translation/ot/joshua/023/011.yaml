theological_decisions:
- issue: Rendering of נֶפֶשׁ in a covenant exhortation
  chosen_reading: self-reflexive sense ('your own selves') rather than 'souls'
  alternative_readings:
  - your souls
  - your lives
  - yourselves
  rationale: The verse exhorts Israel to guard themselves diligently in order to remain
    loyal in love to the LORD. In this idiomatic construction, נֶפֶשׁ points to the
    whole self rather than isolating an immaterial component. This avoids overstating
    a theological anthropology not demanded by the Hebrew while preserving the seriousness
    of the command.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological precision without importing claims the text does not make.'
