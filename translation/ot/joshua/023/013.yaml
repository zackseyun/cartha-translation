  from: will no longer continue to drive out
  to: will no longer drive out
  rationale: The current rendering, 'will no longer continue to drive out,' is slightly pleonastic in English, as 'no longer' and 'continue' both convey the idea of cessation. While not a mistranslation, a more concise rendering like 'will no longer drive out' or 'will not continue to drive out' would be more natural and idiomatic while still accurately reflecting the force of the Hebrew construction (לֹא יוֹסִיף + infinitive).
