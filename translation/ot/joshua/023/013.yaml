id: JOS.23.13
reference: Joshua 23:13
source:
  edition: WLC
  text: יָד֨וֹעַ֙ תֵּֽדְע֔וּ כִּי֩ לֹ֨א יוֹסִ֜יף יְהוָ֣ה אֱלֹהֵי/כֶ֗ם לְ/הוֹרִ֛ישׁ אֶת הַ/גּוֹיִ֥ם הָ/אֵ֖לֶּה מִ/לִּ/פְנֵי/כֶ֑ם וְ/הָי֨וּ לָ/כֶ֜ם לְ/פַ֣ח וּ/לְ/מוֹקֵ֗שׁ וּ/לְ/שֹׁטֵ֤ט בְּ/צִדֵּי/כֶם֙ וְ/לִ/צְנִנִ֣ים בְּ/עֵינֵי/כֶ֔ם עַד אֲבָדְ/כֶ֗ם מֵ֠/עַל הָ/אֲדָמָ֤ה הַ/טּוֹבָה֙ הַ/זֹּ֔את אֲשֶׁר֙ נָתַ֣ן לָ/כֶ֔ם יְהוָ֖ה אֱלֹהֵי/כֶֽם־־׃
translation:
  text: know for certain that the LORD your God will no longer drive out these nations from before you, but they will become for you a trap and a snare, a whip on your sides and thorns in your eyes, until you perish from off this good land that the LORD your God has given you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a scourge in your sides.' The Hebrew term rendered 'a whip' is difficult and may denote a scourging instrument or painful affliction.
    reason: lexical_alternative
  - marker: b
    text: Or 'will no longer continue to drive out'.
    reason: previous_rendering
lexical_decisions:
- source_word: יָדוֹעַ תֵּדְעוּ
  chosen: know for certain
  alternatives:
  - surely know
  - know indeed
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb of ידע intensifies the command/assertion. 'Know for certain' captures the emphatic force in natural English without unnecessary archaism.
- source_word: לֹא יוֹסִיף
  chosen: will no longer continue
  alternatives:
  - will no longer
  - will not again
  lexicon: HALOT
  rationale: יסף in Hiphil with infinitive commonly means 'continue/add to' doing something. Here it marks cessation of further action by the LORD. 'Will no longer continue to drive out' preserves the aspect of stopping an ongoing pattern.
- source_word: לְהוֹרִישׁ
  chosen: to drive out
  alternatives:
  - to dispossess
  - to cause to inherit by dispossessing
  lexicon: HALOT
  rationale: In conquest contexts ירש in Hiphil often means to dispossess or drive out prior inhabitants. 'Drive out' is the clearest idiomatic rendering here with the object 'these nations' and the phrase 'from before you.'
- source_word: מִלִּפְנֵיכֶם
  chosen: from before you
  alternatives:
  - from before your face
  - from your presence
  lexicon: HALOT
  rationale: A conventional Hebrew spatial idiom in warfare/displacement contexts. 'From before you' is slightly formal but transparent and preserves the source image better than flattening to merely 'from you.'
- source_word: לְפַח
  chosen: a trap
  alternatives:
  - a snare
  lexicon: HALOT
  rationale: פח denotes a trap/net-like device. Since מוקש follows, rendering the pair distinctly as 'trap and snare' preserves the Hebrew's rhetorical doubling.
- source_word: לְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  - a stumbling block
  lexicon: HALOT
  rationale: מוקש often denotes a snare or enticement leading to ruin. 'Snare' pairs well with פח while maintaining lexical distinction.
- source_word: לְשֹׁטֵט בְּצִדֵּיכֶם
  chosen: a whip on your sides
  alternatives:
  - a scourge in your sides
  - a lash at your sides
  lexicon: HALOT
  rationale: The noun is difficult and traditionally understood as something that scourges or lashes. Given the parallel in similar warning formulas, 'a whip on your sides' communicates painful ongoing affliction in accessible English while staying close to the bodily metaphor.
- source_word: לִצְנִנִים בְּעֵינֵיכֶם
  chosen: thorns in your eyes
  alternatives:
  - barbs in your eyes
  - pricks in your eyes
  lexicon: HALOT
  rationale: צנינים denotes sharp irritants; 'thorns' is the most familiar English image and fits the parallelism with bodily pain and persistent trouble.
- source_word: עַד אֲבָדְכֶם
  chosen: until you perish
  alternatives:
  - until your destruction
  - until you are destroyed
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עד expresses the endpoint of the threatened consequence. 'Until you perish' is direct and idiomatic.
- source_word: מֵעַל הָאֲדָמָה הַטּוֹבָה הַזֹּאת
  chosen: from off this good land
  alternatives:
  - from upon this good ground
  - from this good land
  lexicon: HALOT
  rationale: אדמה here refers to the land given by God, not merely soil. 'From off this good land' preserves the preposition מעל and the covenant-land emphasis.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following established reverential convention and the LXX/English Bible pattern.
