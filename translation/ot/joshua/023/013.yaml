theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the doctrinal guideline for contested terms, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of the warning
  chosen_reading: Covenantal judgment expressed as the LORD ceasing to drive out the nations, resulting in Israel's affliction and eventual perishing from the land
  alternative_readings:
  - A merely military prediction without covenantal significance
  rationale: The syntax ties Israel's future suffering to the LORD's withdrawal of dispossessing action and to loss of the gifted land. The translation preserves this covenantal warning without adding explanatory theology beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
