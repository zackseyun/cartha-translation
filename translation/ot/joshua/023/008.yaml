id: JOS.23.8
reference: Joshua 23:8
source:
  edition: WLC
  text: כִּ֛י אִם בַּ/יהוָ֥ה אֱלֹהֵי/כֶ֖ם תִּדְבָּ֑קוּ כַּ/אֲשֶׁ֣ר עֲשִׂיתֶ֔ם עַ֖ד
    הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: But you shall cling to the LORD your God, just as you have done to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hold fast to' or 'cling to'; the verb expresses close, covenantal
      attachment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - rather
  - except that
  - instead
  lexicon: HALOT
  rationale: In this context the paired particles introduce a strong contrast with
    the preceding warning, not a conditional 'if.' 'But' gives the adversative force
    naturally in English while preserving the exhortational contrast.
- source_word: בַּיהוָה
  chosen: to the LORD
  alternatives:
  - in the LORD
  - with the LORD
  lexicon: HALOT
  rationale: With דבק the preposition ב often marks the object to which one clings
    or holds fast. English idiom prefers 'cling to' rather than 'cling in/with.' YHWH
    is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered with the covenantal title 'the LORD' in keeping
    with the project's stated default for יְהוָה.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'Though morphologically plural in form, אֱלֹהִים with reference to YHWH
    takes singular sense. The suffix makes the covenant relationship explicit: ''your
    God.'''
- source_word: תִּדְבָּקוּ
  chosen: you shall cling
  alternatives:
  - you shall hold fast
  - you shall stick fast
  - you shall remain attached
  lexicon: HALOT
  rationale: דבק in covenantal contexts conveys close attachment or steadfast adherence.
    'Cling' preserves the relational and covenantal force better than the more abstract
    'hold fast,' while remaining natural English.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison between the commanded loyalty and their conduct
    up to the present. 'Just as' makes the comparison explicit and smooth in English.
- source_word: עֲשִׂיתֶם
  chosen: you have done
  alternatives:
  - you did
  - you have acted
  lexicon: HALOT
  rationale: The perfect refers to their conduct continuing up to the present point.
    English present perfect best captures that sense in context.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - up to this day
  lexicon: HALOT
  rationale: This is a standard Hebrew temporal expression. 'To this day' is idiomatic
    modern English and preserves the sense of continuity up to the present moment
    of speaking.
