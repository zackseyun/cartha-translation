theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following Jewish
    reverence tradition and longstanding English convention while signaling the covenant
    name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering רָע in a judgment oracle about God's action
  chosen_reading: bad word
  alternative_readings:
  - evil word
  - disaster
  - harm
  rationale: The verse contrasts fulfilled good with coming adverse covenant sanctions.
    'Bad' avoids suggesting that God commits moral evil while preserving the lexical
    contrast with 'good.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological
    tension rather than resolve it beyond the text'
