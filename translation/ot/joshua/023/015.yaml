id: JOS.23.15
reference: Joshua 23:15
source:
  edition: WLC
  text: וְ/הָיָ֗ה כַּ/אֲשֶׁר בָּ֤א עֲלֵי/כֶם֙ כָּל הַ/דָּבָ֣ר הַ/טּ֔וֹב אֲשֶׁ֥ר דִּבֶּ֛ר
    יְהוָ֥ה אֱלֹהֵי/כֶ֖ם אֲלֵי/כֶ֑ם כֵּן֩ יָבִ֨יא יְהוָ֜ה עֲלֵי/כֶ֗ם אֵ֚ת כָּל הַ/דָּבָ֣ר
    הָ/רָ֔ע עַד הַשְׁמִיד֣/וֹ אוֹתְ/כֶ֗ם מֵ֠/עַל הָ/אֲדָמָ֤ה הַ/טּוֹבָה֙ הַ/זֹּ֔את
    אֲשֶׁר֙ נָתַ֣ן לָ/כֶ֔ם יְהוָ֖ה אֱלֹהֵי/כֶֽם־־־־׃
translation:
  text: And it shall happen that, just as every good word that the LORD your God spoke
    to you has come upon you, so the LORD will bring upon you every bad word, until
    he has destroyed you from off this good land that the LORD your God has given
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every evil thing' or 'all the disaster.' Hebrew 'every bad word/matter,'
      paralleling 'every good word' earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future circumstance with solemn force. 'It shall happen'
    preserves the formal discourse marker without archaic excess; 'come to pass' is
    traditional but more archaic.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - when
  lexicon: HALOT
  rationale: Marks comparison between fulfilled blessing and coming judgment. 'Just
    as' makes the correlative structure with כֵּן explicit.
- source_word: בָּא עֲלֵיכֶם
  chosen: has come upon you
  alternatives:
  - came upon you
  - has come to you
  lexicon: HALOT
  rationale: The perfect verb refers to the realized fulfillment of prior promises.
    'Upon you' reflects עַל more closely than simply 'to you' and matches the parallel
    later in the verse.
- source_word: כָּל הַדָּבָר הַטּוֹב
  chosen: every good word
  alternatives:
  - all the good thing
  - every good promise
  lexicon: HALOT
  rationale: דָּבָר literally means 'word/matter.' Here it refers to what God spoke
    and fulfilled. 'Every good word' preserves the lexical link with the following
    'every bad word'; 'promise' is interpretive and would weaken that deliberate parallel.
- source_word: דִּבֶּר ... אֲלֵיכֶם
  chosen: spoke to you
  alternatives:
  - said to you
  - spoke concerning you
  lexicon: HALOT
  rationale: A straightforward rendering of the verbal clause; 'spoke to you' is natural
    and preserves the direct address.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: כֵּן
  chosen: so
  alternatives:
  - in the same way
  - thus
  lexicon: HALOT
  rationale: Carries the second half of the comparison succinctly and naturally in
    English.
- source_word: יָבִיא ... עֲלֵיכֶם
  chosen: will bring upon you
  alternatives:
  - will bring on you
  - will cause to come upon you
  lexicon: HALOT
  rationale: Hiphil of בוא is causative. 'Will bring upon you' preserves both causative
    force and the repeated עַל idiom.
- source_word: כָּל הַדָּבָר הָרָע
  chosen: every bad word
  alternatives:
  - every evil thing
  - every harmful word
  - all the disaster
  lexicon: HALOT
  rationale: Maintains the deliberate lexical symmetry with 'every good word.' While
    English often prefers 'disaster' in judgment contexts, retaining 'word' better
    reflects the Hebrew and highlights that both blessing and judgment are what the
    LORD has spoken.
- source_word: רָע
  chosen: bad
  alternatives:
  - evil
  - harmful
  - calamitous
  lexicon: HALOT
  rationale: Here רָע denotes adverse/judicial outcome rather than moral evil in God.
    'Bad' is broad and avoids implying moral evil in God's action. The context clarifies
    covenant judgment.
- source_word: עַד הַשְׁמִידוֹ אֹתְכֶם
  chosen: until he has destroyed you
  alternatives:
  - until he destroys you
  - until his destroying you
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עַד expresses the endpoint
    of the judgment. 'Until he has destroyed you' conveys the completed result toward
    which the action moves.
- source_word: מֵעַל
  chosen: from off
  alternatives:
  - from upon
  - off of
  - from
  lexicon: HALOT
  rationale: Preserves the spatial force of the compound preposition more closely
    than simple 'from,' while remaining intelligible.
- source_word: הָאֲדָמָה הַטּוֹבָה הַזֹּאת
  chosen: this good land
  alternatives:
  - this good ground
  - this good soil
  lexicon: HALOT
  rationale: In context אֲדָמָה refers to the land given by God, not merely soil.
    'This good land' is the natural covenantal sense.
- source_word: נָתַן לָכֶם
  chosen: has given to you
  alternatives:
  - gave you
  - has given you
  lexicon: HALOT
  rationale: The perfect points to the already-granted gift of the land. 'Has given
    to you' keeps the completed aspect and mirrors the Hebrew preposition, though
    idiomatic English could omit 'to'.
