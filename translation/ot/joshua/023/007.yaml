id: JOS.23.7
reference: Joshua 23:7
source:
  edition: WLC
  text: לְ/בִלְתִּי בוֹא֙ בַּ/גּוֹיִ֣ם הָ/אֵ֔לֶּה הַ/נִּשְׁאָרִ֥ים הָ/אֵ֖לֶּה אִתְּ/כֶ֑ם
    וּ/בְ/שֵׁ֨ם אֱלֹהֵי/הֶ֤ם לֹא תַזְכִּ֨ירוּ֙ וְ/לֹ֣א תַשְׁבִּ֔יעוּ וְ/לֹ֣א תַעַבְד֔וּ/ם
    וְ/לֹ֥א תִֽשְׁתַּחֲו֖וּ לָ/הֶֽם־־׃
translation:
  text: so that you do not go among these nations, these that remain with you, and
    do not mention the name of their gods or make anyone swear by them or serve them
    or bow down to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'invoke the name of their gods.' The Hebrew verb can mean 'mention' or,
      in context, 'invoke.'
    reason: lexical_alternative
  - marker: b
    text: Or 'swear by them.' The Hebrew verb is causative, literally 'make swear,'
      which may include causing others to take an oath by those gods.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבִלְתִּי בוֹא
  chosen: so that you do not go
  alternatives:
  - lest you go
  - so as not to enter
  lexicon: HALOT
  rationale: The construction לְבִלְתִּי + infinitive expresses purpose/prevention.
    'So that you do not go' fits the flow from the previous exhortation while remaining
    natural English. 'Enter' is possible for בוא, but 'go among' better matches the
    following preposition and context of association with the nations.
- source_word: בַּגּוֹיִם הָאֵלֶּה
  chosen: among these nations
  alternatives:
  - into these nations
  - with these nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the remaining foreign peoples in the land. With
    ב and בוא, the sense is movement into association among them, not merely geographic
    entry.
- source_word: הַנִּשְׁאָרִים הָאֵלֶּה אִתְּכֶם
  chosen: these that remain with you
  alternatives:
  - these remaining among you
  - these left with you
  lexicon: HALOT
  rationale: The participle from שׁאר denotes those left over or remaining. 'With
    you' reflects אִתְּכֶם straightforwardly and preserves the idea that these peoples
    still coexist alongside Israel.
- source_word: וּבְשֵׁם אֱלֹהֵיהֶם לֹא תַזְכִּירוּ
  chosen: do not mention the name of their gods
  alternatives:
  - do not invoke the name of their gods
  - do not cause the name of their gods to be remembered
  lexicon: HALOT
  rationale: הזכיר in Hiphil can mean mention, call to mind, or invoke. In this anti-idolatry
    context, 'mention the name' is the most direct rendering, while the following
    verb about swearing clarifies cultic invocation. The singular 'name' with plural
    'gods' is idiomatic in English.
- source_word: וְלֹא תַשְׁבִּיעוּ
  chosen: or make anyone swear by them
  alternatives:
  - or swear by them
  - or take an oath by them
  lexicon: HALOT
  rationale: 'The Hiphil of שׁבע is causative: ''cause to swear'' or ''make swear,''
    not the simple intransitive ''swear.'' The implied object is left unstated in
    Hebrew, so ''anyone'' is supplied in English for clarity.'
- source_word: וְלֹא תַעַבְדוּם
  chosen: or serve them
  alternatives:
  - or worship them
  lexicon: HALOT
  rationale: עבד commonly means serve, including religious service. 'Serve' preserves
    the lexical distinction from the next verb for prostration/bowing.
- source_word: וְלֹא תִשְׁתַּחֲווּ לָהֶם
  chosen: or bow down to them
  alternatives:
  - or prostrate yourselves to them
  - or worship them
  lexicon: HALOT
  rationale: שׁחה in this stem denotes bowing down/prostrating oneself. 'Bow down'
    is clear modern English and keeps the physical act distinct from the broader 'serve'
    in the previous clause.
