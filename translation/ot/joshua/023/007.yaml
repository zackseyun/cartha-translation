theological_decisions:
- issue: Idolatry language and cultic actions
  chosen_reading: Retain the sequence 'mention... make anyone swear... serve... bow
    down' as distinct prohibitions.
  alternative_readings:
  - Compress the sequence into generalized 'worship' language
  rationale: The Hebrew lists escalating or related acts of allegiance to foreign
    gods. Preserving each verb avoids importing a simplified theological summary and
    keeps the text's concrete anti-idolatry force.
  doctrine_reference: Translation philosophy items 1, 3, and 5
