theological_decisions:
- issue: Rendering תּוֹרָה in a Mosaic covenant context
  chosen_reading: Law in 'the Book of the Law of Moses'
  alternative_readings:
  - instruction in 'the Book of the Instruction of Moses'
  rationale: While תּוֹרָה can broadly mean 'instruction,' in this formulaic context
    it refers to the covenantal legal corpus associated with Moses. 'Law' best matches
    the referent and standard biblical usage without denying the broader semantic
    range.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
