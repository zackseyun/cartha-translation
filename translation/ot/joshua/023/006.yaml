id: JOS.23.6
reference: Joshua 23:6
source:
  edition: WLC
  text: וַ/חֲזַקְתֶּ֣ם מְאֹ֔ד לִ/שְׁמֹ֣ר וְ/לַ/עֲשׂ֔וֹת אֵ֚ת כָּל הַ/כָּת֔וּב בְּ/סֵ֖פֶר
    תּוֹרַ֣ת מֹשֶׁ֑ה לְ/בִלְתִּ֥י סוּר מִמֶּ֖/נּוּ יָמִ֥ין וּ/שְׂמֹֽאול־־׃
translation:
  text: Therefore be very strong to keep and to do all that is written in the Book
    of the Law of Moses, so as not to turn from it to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Book of the Instruction of Moses'; Hebrew torah can mean 'instruction'
      as well as 'law,' though here it refers specifically to the Mosaic legal corpus.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַחֲזַקְתֶּם
  chosen: be very strong
  alternatives:
  - be strong
  - be resolute
  - be courageous
  lexicon: HALOT
  rationale: From חזק in a strengthening/firmness sense addressed to a plural audience.
    English imperative-like 'be ... strong' best conveys the exhortational force in
    context. 'Courageous' overlaps with nearby biblical idiom but is less directly
    tied to this verb's core sense here.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Common intensifier. 'Very' is natural modern English and preserves the
    emphasis without sounding archaic.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: שׁמר here governs covenantal/legal obedience. 'Keep' is idiomatic in
    English for commandments/law and pairs naturally with 'do.' 'Observe' is possible
    but slightly more formal; 'guard' is too literal for this context.
- source_word: וְלַעֲשׂוֹת
  chosen: and to do
  alternatives:
  - and to obey
  - and to carry out
  lexicon: HALOT
  rationale: עשה in legal contexts often means perform/obey, but 'do' preserves the
    Hebrew wording and the familiar collocation 'keep and do' without over-interpreting.
- source_word: כָּל הַכָּתוּב
  chosen: all that is written
  alternatives:
  - everything written
  - all the written things
  lexicon: HALOT
  rationale: This construction refers comprehensively to the written contents. 'All
    that is written' is clear, natural, and formally close.
- source_word: בְּסֵפֶר תּוֹרַת מֹשֶׁה
  chosen: in the Book of the Law of Moses
  alternatives:
  - in the book of Moses' law
  - in the scroll of the law of Moses
  lexicon: HALOT
  rationale: סֵפֶר can denote book/scroll; 'Book' is standard and understandable in
    English. תּוֹרָה here refers specifically to the Mosaic law/instruction corpus.
    'Book of the Law of Moses' preserves the established referential sense without
    unnecessary paraphrase.
- source_word: לְבִלְתִּי סוּר
  chosen: so as not to turn
  alternatives:
  - not turning
  - so that you may not turn aside
  lexicon: HALOT
  rationale: This expresses purpose/result avoidance. 'So as not to turn' is smooth
    modern English and preserves the infinitival construction's force.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from this
  - from them
  lexicon: HALOT
  rationale: The pronominal suffix is singular, most naturally referring back to the
    written law/book as a unified body. 'From it' preserves the singular reference.
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  - to the right hand or to the left hand
  lexicon: HALOT
  rationale: Standard Hebrew idiom for deviating in either direction. The fuller English
    prepositional phrasing reads naturally and preserves the metaphor.
