id: JOS.23.3
reference: Joshua 23:3
source:
  edition: WLC
  text: וְ/אַתֶּ֣ם רְאִיתֶ֗ם אֵת֩ כָּל אֲשֶׁ֨ר עָשָׂ֜ה יְהוָ֧ה אֱלֹהֵי/כֶ֛ם לְ/כָל הַ/גּוֹיִ֥ם הָ/אֵ֖לֶּה מִ/פְּנֵי/כֶ֑ם כִּ֚י יְהוָ֣ה אֱלֹהֵי/כֶ֔ם ה֖וּא הַ/נִּלְחָ֥ם לָ/כֶֽם־־׃
translation:
  text: And you yourselves have seen all that Yahweh your God has done to all these nations before you, for Yahweh your God is the one who has fought for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from before you,' an idiom for the nations being driven out from Israel's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: And you yourselves
  alternatives:
  - And you
  - Now you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal suffix; 'you yourselves' preserves that emphasis in natural English. The conjunction is retained as 'And' to reflect discourse continuity.
- source_word: רְאִיתֶם
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: The perfect refers to Israel's completed experience with present relevance in Joshua's speech. English present perfect communicates that force well.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This combination marks the full scope of the direct object; 'all that' is idiomatic and sufficiently formal.
- source_word: עָשָׂה
  chosen: has done
  alternatives:
  - did
  - has acted against
  lexicon: HALOT
  rationale: A broad verb meaning 'do/make'; 'has done' best matches the Hebrew without over-specifying the action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second person plural suffix; standard covenantal address is preserved.
- source_word: לְכָל הַגּוֹיִם הָאֵלֶּה
  chosen: to all these nations
  alternatives:
  - against all these nations
  - for all these nations
  lexicon: HALOT
  rationale: With עשה, the preposition ל can mark the object affected by the action. In context of conquest, 'to all these nations' is a natural rendering that leaves the nature of the action to the broader clause.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - before your face
  - on your account
  lexicon: HALOT
  rationale: The phrase literally means 'from before you' and in conquest contexts refers to nations removed from Israel's presence. 'Before you' is concise and idiomatic, while the military-expulsion nuance is clear from context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement; 'for' fits the formal explanatory sense.
- source_word: הוּא
  chosen: is the one who
  alternatives:
  - he
  - he himself is the one who
  lexicon: HALOT
  rationale: The pronoun is emphatic. 'Is the one who' brings that emphasis into idiomatic English.
- source_word: הַנִּלְחָם
  chosen: has fought
  alternatives:
  - fights
  - was fighting
  - the one fighting
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally: ''the one fighting.'' In this retrospective context, English finite verbal form ''has fought'' communicates the ongoing characteristic shown in past acts.'
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - on your behalf
  lexicon: HALOT
  rationale: The preposition indicates benefit or representation; 'for you' is natural and faithful.
