id: JOS.23.10
reference: Joshua 23:10
source:
  edition: WLC
  text: אִישׁ אֶחָ֥ד מִ/כֶּ֖ם יִרְדָּף אָ֑לֶף כִּ֣י יְהוָ֣ה אֱלֹהֵי/כֶ֗ם ה֚וּא הַ/נִּלְחָ֣ם לָ/כֶ֔ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר לָ/כֶֽם־־׀׃
translation:
  text: One man from among you will chase a thousand, because Yahweh your God is the one who fights for you, just as he spoke to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will pursue a thousand.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD'; the divine name is YHWH.
    reason: lexical_alternative
  - marker: c
    text: Or 'just as he promised you'; Hebrew more literally, 'just as he spoke to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶחָד
  chosen: One man
  alternatives:
  - One person
  - A single man
  lexicon: HALOT
  rationale: Rendered gender-accurately as 'One man' because the Hebrew is singular masculine and functions representatively; this follows the stated philosophy of matching the source's gendered form rather than neutralizing it.
- source_word: מִכֶּם
  chosen: from among you
  alternatives:
  - of you
  - from you
  lexicon: HALOT
  rationale: '''From among you'' brings out the partitive sense of the preposition with the pronoun more naturally in English than the more wooden ''of you''.'
- source_word: יִרְדָּף
  chosen: will chase
  alternatives:
  - will pursue
  - shall chase
  lexicon: HALOT
  rationale: The verb רדף commonly means 'pursue/chase.' 'Will chase' is vivid, idiomatic, and fits the military context without overformal stiffness.
- source_word: אָלֶף
  chosen: a thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; retained literally to preserve the force of the promise.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Israel's victory. 'Because' communicates the causal force clearly in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard construct rendering with second person plural suffix; kept direct and conventional.
- source_word: הוּא
  chosen: is the one who
  alternatives:
  - he is the one who
  - he himself is the one who
  lexicon: HALOT
  rationale: The pronoun is emphatic. 'Is the one who' preserves the emphasis in natural English without sounding overly heavy.
- source_word: הַנִּלְחָם לָכֶם
  chosen: fights for you
  alternatives:
  - is fighting for you
  - wars for you
  - does battle for you
  lexicon: HALOT
  rationale: 'The participle with article expresses ongoing characteristic action: the LORD as the one fighting on Israel''s behalf. ''Fights for you'' is natural and preserves the military sense.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with prior divine promise; 'just as' clearly marks fulfillment correspondence.
- source_word: דִּבֶּר לָכֶם
  chosen: he spoke to you
  alternatives:
  - he promised you
  - he said to you
  lexicon: HALOT
  rationale: The verb is literally 'spoke.' Although the context implies promise, 'spoke to you' stays closer to the Hebrew while allowing readers to infer the promissory force.
