theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Covenant warning syntax
  chosen_reading: Conditional warning introduced with 'If' and completed with future consequences
  alternative_readings:
  - Temporal 'When you transgress'
  rationale: The Hebrew construction can be rendered temporally or conditionally, but in this exhortational setting Joshua states a warning contingent on apostasy. 'If' best preserves the admonitory force without overstating inevitability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense over tradition, optimal equivalence'
