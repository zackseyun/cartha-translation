id: JOS.23.16
reference: Joshua 23:16
source:
  edition: WLC
  text: בְּ֠/עָבְרְ/כֶם אֶת בְּרִ֨ית יְהוָ֥ה אֱלֹהֵי/כֶם֮ אֲשֶׁ֣ר צִוָּ֣ה אֶתְ/כֶם֒
    וַ/הֲלַכְתֶּ֗ם וַ/עֲבַדְתֶּם֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וְ/הִשְׁתַּחֲוִיתֶ֖ם לָ/הֶ֑ם
    וְ/חָרָ֤ה אַף יְהוָה֙ בָּ/כֶ֔ם וַ/אֲבַדְתֶּ֣ם מְהֵרָ֔ה מֵ/עַל֙ הָ/אָ֣רֶץ הַ/טּוֹבָ֔ה
    אֲשֶׁ֖ר נָתַ֥ן לָ/כֶֽם־־׃פ
translation:
  text: If you transgress the covenant of the LORD your God, which he commanded you,
    and go and serve other gods and bow down to them, then the anger of the LORD will
    burn against you, and you will perish quickly from off the good land that he has
    given you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you transgress the covenant of the LORD your God.' The Hebrew opening
      may be read temporally ('when') or conditionally ('if').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'from off the good land,' an expression emphasizing removal from
      the land the LORD gave them.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָבְרְכֶם
  chosen: If you transgress
  alternatives:
  - when you transgress
  - if you cross over/violate
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of עבר introduces a conditional
    circumstance here. In covenant contexts עבר ברית idiomatically means to transgress
    or violate a covenant, not merely to cross over. 'If you transgress' best captures
    both the idiom and the warning force.
- source_word: בְּרִית
  chosen: the covenant
  alternatives:
  - the treaty
  - the pact
  lexicon: HALOT
  rationale: Standard covenant term in Israel's relationship with the LORD. 'Covenant'
    preserves the theological and legal weight better than weaker modern alternatives.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD' rather than a transliteration.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH and singular covenantal reference, the plural form functions
    as the singular title 'God.'
- source_word: אֲשֶׁר צִוָּה אֶתְכֶם
  chosen: which he commanded you
  alternatives:
  - which he commanded for you
  - that he commanded you to keep
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Commanded you' is the most direct
    rendering; adding 'to keep' would over-interpret.
- source_word: וַהֲלַכְתֶּם
  chosen: go
  alternatives:
  - walk
  - proceed
  lexicon: HALOT
  rationale: '''Walk'' is possible formally, but in this collocation with serving
    other gods, English idiom is better served by ''go and serve,'' which reflects
    movement into apostasy without woodenness.'
- source_word: וַעֲבַדְתֶּם
  chosen: serve
  alternatives:
  - worship
  - be enslaved to
  lexicon: HALOT
  rationale: עבד with gods commonly means religious service/worship. 'Serve' preserves
    the lexical distinction from the following verb for prostration.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: Literal and idiomatic rendering of the common phrase for rival deities.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  chosen: and bow down to them
  alternatives:
  - and worship them
  - and prostrate yourselves to them
  lexicon: HALOT
  rationale: The verb specifically denotes bowing/prostration. 'Bow down to them'
    preserves the physical act and avoids collapsing it into the previous 'serve.'
- source_word: וְחָרָה אַף יְהוָה בָּכֶם
  chosen: then the anger of the LORD will burn against you
  alternatives:
  - the nose/wrath of the LORD will burn against you
  - the LORD will become angry with you
  lexicon: HALOT
  rationale: The idiom חרה אף expresses kindled anger. 'Will burn against you' preserves
    the metaphor and force while rendering אַף idiomatically as 'anger.' 'Then' makes
    the consequence relation explicit in natural English.
- source_word: וַאֲבַדְתֶּם
  chosen: and you will perish
  alternatives:
  - and you will be destroyed
  - and you will vanish
  lexicon: HALOT
  rationale: The verb can denote perishing or being destroyed. 'Perish' fits the warning
    context and leaves room for the following phrase specifying expulsion from the
    land.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - swiftly
  - soon
  lexicon: HALOT
  rationale: Adverb of rapidity; 'quickly' is clear modern English.
- source_word: מֵעַל הָאָרֶץ
  chosen: from off the land
  alternatives:
  - from the land
  - off the land
  lexicon: HALOT
  rationale: The preposition מעל is more specific than simple מן, indicating removal
    from upon the land. 'From off the land' preserves that force, though slightly
    idiomatic in English.
- source_word: הָאָרֶץ הַטּוֹבָה
  chosen: the good land
  alternatives:
  - the fertile land
  - the pleasant land
  lexicon: HALOT
  rationale: טובה here is qualitative and covenantal, echoing the land as a good gift.
    'Good land' is the standard and sufficiently transparent rendering.
- source_word: אֲשֶׁר נָתַן לָכֶם
  chosen: that he has given you
  alternatives:
  - which he gave you
  - that he is giving you
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed gift in context. 'Has given
    you' highlights the present possession resulting from God's prior act.
