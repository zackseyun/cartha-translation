theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Covenant warning syntax
  chosen_reading: Conditional warning introduced with 'If' and completed with future
    consequences
  alternative_readings:
  - Temporal 'When you transgress'
  rationale: The Hebrew construction can be rendered temporally or conditionally,
    but in this exhortational setting Joshua states a warning contingent on apostasy.
    'If' best preserves the admonitory force without overstating inevitability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense over
    tradition, optimal equivalence'
