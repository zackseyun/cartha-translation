theological_decisions:
- issue: Covenantal warning language in שׁוֹב תָּשׁוּבוּ
  chosen_reading: turn back
  alternative_readings:
  - return
  rationale: The context is a warning against reversing covenant fidelity by attaching
    to the remaining nations. 'Turn back' better preserves that negative covenantal
    movement than the more neutral 'return.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Potential theological overreading of 'remnant'
  chosen_reading: remnant
  alternative_readings:
  - rest
  - what is left
  rationale: Although 'remnant' can carry positive theological associations elsewhere,
    here it is a straightforward lexical rendering of what remains. The context prevents
    importing a redemptive-theological nuance not warranted by the text.
  doctrine_reference: Translation philosophy §1, §3
