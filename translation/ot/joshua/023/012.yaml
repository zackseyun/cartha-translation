id: JOS.23.12
reference: Joshua 23:12
source:
  edition: WLC
  text: כִּ֣י אִם שׁ֣וֹב תָּשׁ֗וּבוּ וּ/דְבַקְתֶּם֙ בְּ/יֶ֨תֶר֙ הַ/גּוֹיִ֣ם הָ/אֵ֔לֶּה
    הַ/נִּשְׁאָרִ֥ים הָ/אֵ֖לֶּה אִתְּ/כֶ֑ם וְ/הִֽתְחַתַּנְתֶּ֥ם בָּ/הֶ֛ם וּ/בָאתֶ֥ם
    בָּ/הֶ֖ם וְ/הֵ֥ם בָּ/כֶֽם׀־׃
translation:
  text: For if you indeed turn back and cling to the remnant of these nations, these
    that remain with you, and intermarry with them and associate with them, and they
    with you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hold fast to' for 'cling to.'
    reason: lexical_alternative
  - marker: b
    text: Or 'go among them' / 'have dealings with them' for 'associate with them.'
      The Hebrew idiom is broader than physical movement alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - But if
  - For unless
  lexicon: HALOT
  rationale: In context Joshua is continuing a warning from the previous verse; כִּי
    אִם here introduces a conditional warning. 'For if' preserves the connective force
    with the prior statement better than a bare 'if.'
- source_word: שׁוֹב תָּשׁוּבוּ
  chosen: you indeed turn back
  alternatives:
  - you surely turn back
  - you turn back again
  - you return
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Indeed
    turn back' conveys emphasis without sounding wooden. 'Turn back' fits the covenantal
    sense of apostasy or reversal better than the more neutral 'return' in this context.
- source_word: וּדְבַקְתֶּם
  chosen: cling to
  alternatives:
  - hold fast to
  - join yourselves to
  lexicon: HALOT
  rationale: דבק commonly denotes close attachment. 'Cling to' preserves the strong
    relational sense and echoes covenant language elsewhere, while fitting the warning
    against attachment to the nations.
- source_word: בְּיֶתֶר הַגּוֹיִם הָאֵלֶּה
  chosen: to the remnant of these nations
  alternatives:
  - to what is left of these nations
  - to the rest of these nations
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains or is left over. 'Remnant' is concise and
    natural here, though not necessarily carrying a positive theological nuance; the
    context makes clear it refers to surviving nations.
- source_word: הַנִּשְׁאָרִים הָאֵלֶּה אִתְּכֶם
  chosen: these that remain with you
  alternatives:
  - these remaining among you
  - these left with you
  lexicon: HALOT
  rationale: The participle נִשְׁאָרִים further specifies the nations as those still
    present alongside Israel. 'These that remain with you' preserves the demonstrative
    repetition and the sense of continued presence.
- source_word: וְהִתְחַתַּנְתֶּם בָּהֶם
  chosen: and intermarry with them
  alternatives:
  - and make marriages with them
  - and become related by marriage to them
  lexicon: HALOT
  rationale: The hitpael of חתן refers to entering marriage alliances. 'Intermarry
    with them' is idiomatic modern English and accurately conveys the reciprocal social-religious
    entanglement in view.
- source_word: וּבָאתֶם בָּהֶם
  chosen: and associate with them
  alternatives:
  - and go among them
  - and have dealings with them
  lexicon: HALOT
  rationale: The idiom בוא ב with persons can denote entering into social relations
    or mingling. Since marriage has already been mentioned explicitly, 'associate
    with them' captures broader social integration without reducing it merely to physical
    movement.
- source_word: וְהֵם בָּכֶם
  chosen: and they with you
  alternatives:
  - and they associate with you
  - and they among you
  lexicon: HALOT
  rationale: The elliptical reciprocal clause mirrors the prior phrase. 'And they
    with you' preserves the terseness and reciprocity of the Hebrew while remaining
    understandable in English.
