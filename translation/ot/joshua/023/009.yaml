id: JOS.23.9
reference: Joshua 23:9
source:
  edition: WLC
  text: וַ/יּ֤וֹרֶשׁ יְהוָה֙ מִ/פְּנֵי/כֶ֔ם גּוֹיִ֖ם גְּדֹלִ֣ים וַ/עֲצוּמִ֑ים וְ/אַתֶּ֗ם לֹא עָ֤מַד אִישׁ֙ בִּ/פְנֵי/כֶ֔ם עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: For Yahweh has driven out from before you great and mighty nations, and as for you, not a man has stood before you to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has dispossessed' or 'has driven away.' The Hebrew verb can emphasize removing peoples from the land so that Israel may possess it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'not a man has stood before you,' an idiom meaning that no one has been able to withstand you.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹרֶשׁ
  chosen: has driven out
  alternatives:
  - dispossessed
  - has driven away
  lexicon: HALOT
  rationale: The verb ירשׁ in the Hiphil commonly means to cause to possess by dispossessing others, hence 'drive out/dispossess.' In this military-land context, 'has driven out' is natural modern English and fits the following phrase 'from before you.' The perfective sense is brought into idiomatic English with 'has driven out.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: HALOT
  rationale: The idiom מִן + פָּנִים in conquest contexts means removal from someone's presence/front. 'From before you' preserves the Hebrew idiom while remaining understandable.
- source_word: גּוֹיִם גְּדֹלִים וַעֲצוּמִים
  chosen: great and mighty nations
  alternatives:
  - great and strong nations
  - large and powerful nations
  lexicon: HALOT
  rationale: גָּדוֹל here denotes greatness/size/significance, and עָצוּם denotes strength or might. 'Great and mighty nations' is a clear, elevated but readable rendering suited to the conquest context.
- source_word: וְאַתֶּם
  chosen: and as for you
  alternatives:
  - and you
  - but you
  lexicon: HALOT
  rationale: The pronoun is fronted for emphasis. 'As for you' reflects the contrastive/emphatic force better than a bare 'and you' without overstating it to an adversative 'but.'
- source_word: לֹא עָמַד אִישׁ
  chosen: not a man has stood
  alternatives:
  - no one has stood
  - not one man has stood
  lexicon: HALOT
  rationale: 'The Hebrew is singular and masculine: literally ''a man has not stood.'' Following the gender-accurate guideline, ''not a man'' preserves the source form and idiom, while still conveying the representative sense that no individual opponent has been able to stand.'
- source_word: בִּפְנֵיכֶם
  chosen: before you
  alternatives:
  - against you
  - in your presence
  lexicon: HALOT
  rationale: In battle contexts, 'stand before' means withstand or oppose successfully. 'Before you' keeps the Hebrew expression; the adversarial sense is clear from context.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - up to this day
  lexicon: HALOT
  rationale: This is a standard idiom meaning the situation has continued up to the present narrative moment. 'To this day' is the most natural English equivalent.
