id: JOS.23.1
reference: Joshua 23:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִ/יָּמִ֣ים רַבִּ֔ים אַ֠חֲרֵי אֲשֶׁר הֵנִ֨יחַ יְהוָ֧ה לְ/יִשְׂרָאֵ֛ל
    מִ/כָּל אֹיְבֵי/הֶ֖ם מִ/סָּבִ֑יב וִ/יהוֹשֻׁ֣עַ זָקֵ֔ן בָּ֖א בַּ/יָּמִֽים־־׃
translation:
  text: And it happened, after many days, after the LORD had given Israel rest from
    all their enemies around them, that Joshua was old, advanced in years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after a long time.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''advanced in years'' literally, ''come into days.'''
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened'
    preserves the Hebrew discourse function without the archaic feel of 'it came to
    pass.'
- source_word: מִיָּמִים רַבִּים
  chosen: after many days
  alternatives:
  - a long time later
  - after a long time
  lexicon: HALOT
  rationale: The idiom literally refers to 'from days, many' and marks a substantial
    lapse of time. 'After many days' stays close to the Hebrew while remaining natural
    English.
- source_word: אַחֲרֵי אֲשֶׁר
  chosen: after
  alternatives:
  - after that
  - after the time when
  lexicon: HALOT
  rationale: This compound temporal expression introduces the event that defines the
    time reference. In English, a single 'after' naturally captures the force without
    unnecessary heaviness.
- source_word: הֵנִיחַ
  chosen: had given ... rest
  alternatives:
  - had granted ... rest
  - had caused ... to rest
  lexicon: HALOT
  rationale: In context נוח in the Hiphil means to give rest or relief from enemies.
    'Had given Israel rest' is idiomatic and matches the covenant-historical sense
    here better than a more wooden causative rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the stated project default.
- source_word: לְיִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name of the people/nation; transliterated according to project
    policy for names.
- source_word: מִכָּל אֹיְבֵיהֶם מִסָּבִיב
  chosen: from all their enemies around them
  alternatives:
  - from all their surrounding enemies
  - on every side from all their enemies
  lexicon: HALOT
  rationale: The phrase emphasizes comprehensive relief from hostile neighbors on
    every side. 'Around them' preserves the spatial emphasis of מִסָּבִיב without
    sounding stiff.
- source_word: וִיהוֹשֻׁעַ
  chosen: that Joshua
  alternatives:
  - and Joshua
  lexicon: HALOT
  rationale: The waw here links the final clause to the temporal setup. In English,
    'that Joshua...' clarifies the clause structure after the long temporal introduction.
- source_word: זָקֵן
  chosen: was old
  alternatives:
  - was elderly
  - had grown old
  lexicon: HALOT
  rationale: Straightforward predicate adjective/verb idea describing Joshua's age.
    'Was old' is the most direct and natural rendering.
- source_word: בָּא בַּיָּמִים
  chosen: advanced in years
  alternatives:
  - well along in years
  - stricken in years
  lexicon: HALOT
  rationale: Hebrew idiom literally 'come into days,' meaning advanced age. 'Advanced
    in years' is clear modern English that preserves the idiomatic sense without archaic
    wording like 'stricken in years.'
