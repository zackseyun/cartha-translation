theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. The project's doctrinal
    and translation guidelines specify 'the LORD' as the default rendering, following
    Jewish reverence tradition and longstanding biblical English usage while avoiding
    a sectarian preference for a vocalization.
