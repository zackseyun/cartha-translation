id: JOS.7.26
reference: Joshua 7:26
source:
  edition: WLC
  text: וַ/יָּקִ֨ימוּ עָלָ֜י/ו גַּל אֲבָנִ֣ים גָּד֗וֹל עַ֚ד הַ/יּ֣וֹם הַ/זֶּ֔ה וַ/יָּ֥שָׁב
    יְהוָ֖ה מֵ/חֲר֣וֹן אַפּ֑/וֹ עַל כֵּ֠ן קָרָ֞א שֵׁ֣ם הַ/מָּק֤וֹם הַ/הוּא֙ עֵ֣מֶק
    עָכ֔וֹר עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃פ
translation:
  text: And they raised over him a large heap of stones, which remains to this day.
    Then the LORD turned from the burning of his anger. Therefore the name of that
    place has been called the Valley of Achor to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Achor sounds like the Hebrew word for 'trouble' or 'disturbance'; compare
      Joshua 7:25.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקִימוּ
  chosen: they raised
  alternatives:
  - they set up
  - they erected
  lexicon: HALOT
  rationale: Hiphil of קום here means to cause to stand or raise up. 'Raised' is natural
    English for constructing a memorial/judgment heap.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - upon him
  - on him
  lexicon: HALOT
  rationale: The preposition עַל with the pronoun indicates the heap was piled over
    Achan's remains. 'Over him' is the most direct rendering.
- source_word: גַּל אֲבָנִים גָּדוֹל
  chosen: a large heap of stones
  alternatives:
  - a great mound of stones
  - a large cairn of stones
  lexicon: HALOT
  rationale: גַּל is a heap or mound, often of stones; 'heap of stones' is idiomatic
    and transparent. 'Large' reflects גָּדוֹל in readable modern English.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking continuing memorial significance
    up to the writer's present. 'To this day' is the conventional and natural English
    equivalent.
- source_word: וַיָּשָׁב יְהוָה
  chosen: Then the LORD turned
  alternatives:
  - And the LORD turned back
  - And the LORD relented
  lexicon: HALOT
  rationale: שׁוּב literally means 'turn/return.' Here it describes the cessation
    of divine wrath. 'Turned' preserves the metaphor without overinterpreting as emotional
    change beyond the text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: מֵחֲרוֹן אַפּוֹ
  chosen: from the burning of his anger
  alternatives:
  - from his fierce anger
  - from the heat of his anger
  - from the fierceness of his anger
  lexicon: HALOT
  rationale: חֲרוֹן אַף is an idiom for burning anger. Rendering it as 'the burning
    of his anger' preserves the Hebrew imagery while remaining understandable.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: This discourse marker introduces the naming explanation. 'Therefore'
    fits the formal-causal connection.
- source_word: קָרָא שֵׁם
  chosen: the name of that place has been called
  alternatives:
  - he called the name of that place
  - that place was named
  lexicon: HALOT
  rationale: Hebrew often uses an active singular with unnamed subject for naming
    formulas. English idiom prefers a passive/resultative expression here, especially
    with the continuing phrase 'to this day.'
- source_word: עֵמֶק עָכוֹר
  chosen: the Valley of Achor
  alternatives:
  - the Valley of Trouble
  lexicon: HALOT
  rationale: As a place name, עָכוֹר is best transliterated 'Achor' in the main text.
    Its wordplay with עכר ('trouble') is important but should be preserved in a footnote
    rather than replacing the name with a gloss.
