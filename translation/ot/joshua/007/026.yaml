theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expression of divine wrath in מֵחֲרוֹן אַפּוֹ
  chosen_reading: from the burning of his anger
  alternative_readings:
  - from his fierce anger
  - from the fierceness of his anger
  rationale: The translation preserves the anthropomorphic and metaphorical language
    of the Hebrew rather than softening or systematizing it. This maintains the text's
    theological tension regarding divine wrath without importing later doctrinal formulations.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
