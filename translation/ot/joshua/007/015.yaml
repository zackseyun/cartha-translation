id: JOS.7.15
reference: Joshua 7:15
source:
  edition: WLC
  text: וְ/הָיָה֙ הַ/נִּלְכָּ֣ד בַּ/חֵ֔רֶם יִשָּׂרֵ֣ף בָּ/אֵ֔שׁ אֹת֖/וֹ וְ/אֶת כָּל אֲשֶׁר ל֑/וֹ כִּ֤י עָבַר֙ אֶת בְּרִ֣ית יְהוָ֔ה וְ/כִֽי עָשָׂ֥ה נְבָלָ֖ה בְּ/יִשְׂרָאֵֽל־־־־־׃
translation:
  text: And the one who is taken with the devoted thing shall be burned with fire, he and all that belongs to him, because he has transgressed the covenant of Yahweh and because he has done an outrageous thing in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the accursed thing'; Hebrew 'with the devoted thing' (ḥerem), referring to what was placed under the ban and devoted to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּלְכָּד
  chosen: the one who is taken
  alternatives:
  - the one who is caught
  - whoever is captured
  lexicon: HALOT
  rationale: Passive participle from לכד, referring to the person identified by the sacred lot/process. 'Taken' fits the idiom in this judicial context and avoids implying military capture.
- source_word: בַּחֵרֶם
  chosen: with the devoted thing
  alternatives:
  - with the accursed thing
  - under the ban
  - with what was devoted to destruction
  lexicon: HALOT
  rationale: חֵרֶם denotes something devoted to God, often by being banned from ordinary use and destined for destruction. 'Devoted thing' preserves the underlying consecration idea better than the traditional but potentially misleading 'accursed thing.' The preposition is rendered 'with' to reflect association with the banned/devoted object.
- source_word: יִשָּׂרֵף בָּאֵשׁ
  chosen: shall be burned with fire
  alternatives:
  - shall be burned up with fire
  - shall be burned in the fire
  lexicon: HALOT
  rationale: A straightforward rendering of the Niphal imperfect plus instrumental phrase. 'With fire' is idiomatic and preserves the Hebrew emphasis.
- source_word: אֹתוֹ וְאֶת כָּל אֲשֶׁר לוֹ
  chosen: he and all that belongs to him
  alternatives:
  - him, and all that he has
  - him together with all that is his
  lexicon: HALOT
  rationale: This appositional construction specifies that both the offender and his possessions are included. 'Belongs to him' is natural modern English and broad enough to include household goods and dependents as context may imply.
- source_word: עָבַר אֶת בְּרִית יְהוָה
  chosen: has transgressed the covenant of the LORD
  alternatives:
  - has violated the covenant of the LORD
  - has broken the covenant of the LORD
  lexicon: HALOT
  rationale: עבר with covenant conveys crossing over or violating covenantal bounds. 'Transgressed' preserves the legal-covenantal force without overinterpreting the exact mode of breach.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נְבָלָה
  chosen: an outrageous thing
  alternatives:
  - a disgraceful thing
  - a vile thing
  - folly
  lexicon: HALOT
  rationale: נְבָלָה often denotes a morally outrageous, disgraceful act, not mere intellectual folly. 'Outrageous thing' communicates the ethical shock of the term in readable modern English.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - within Israel
  - against Israel
  lexicon: HALOT
  rationale: 'The preposition is locative here: the offense has been committed within the covenant community. ''In Israel'' is the most direct rendering.'
