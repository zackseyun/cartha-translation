theological_decisions:
- issue: Rendering חֵרֶם in a covenant-judgment context
  chosen_reading: devoted thing
  alternative_readings:
  - accursed thing
  - what was devoted to destruction
  - under the ban
  rationale: The term refers to something placed under divine ban/devotion, whose misuse brings judgment. 'Devoted thing' preserves the theological logic of consecration violated, whereas 'accursed thing' foregrounds the result rather than the status. Because the traditional rendering remains familiar and interpretively significant, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated doctrinal default for YHWH and maintains consistency across the translation.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
