id: JOS.7.5
reference: Joshua 7:5
source:
  edition: WLC
  text: וַ/יַּכּ֨וּ מֵ/הֶ֜ם אַנְשֵׁ֣י הָ/עַ֗י כִּ/שְׁלֹשִׁ֤ים וְ/שִׁשָּׁה֙ אִ֔ישׁ
    וַֽ/יִּרְדְּפ֞וּ/ם לִ/פְנֵ֤י הַ/שַּׁ֨עַר֙ עַד הַ/שְּׁבָרִ֔ים וַ/יַּכּ֖וּ/ם בַּ/מּוֹרָ֑ד
    וַ/יִּמַּ֥ס לְבַב הָ/עָ֖ם וַ/יְהִ֥י לְ/מָֽיִם־־׃
translation:
  text: And the men of Ai struck down about thirty-six men from among them, and pursued
    them from before the gate as far as Shebarim, and struck them down on the descent.
    So the heart of the people melted and became like water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as the quarries' or 'as far as the broken places'; the Hebrew
      שברים may be understood as a place name (Shebarim) or as a descriptive term.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - killed
  - defeated
  - struck
  lexicon: HALOT
  rationale: נכה commonly means to strike/smite, and in battle contexts often implies
    lethal or decisive blows. 'Struck down' preserves the military force without overcommitting
    beyond what the immediate context states.
- source_word: מֵהֶם
  chosen: from among them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The preposition מן with pronoun indicates that the casualties were taken
    out of Israel's force. 'From among them' is idiomatic and clear.
- source_word: אַנְשֵׁי הָעַי
  chosen: the men of Ai
  alternatives:
  - the men of the Ai
  - the men of the city of Ai
  lexicon: HALOT
  rationale: Construct phrase meaning the men belonging to Ai. Standard English idiom
    is 'the men of Ai.' 'Ai' is transliterated as a place name per translation philosophy.
- source_word: כִּשְׁלֹשִׁים וְשִׁשָּׁה אִישׁ
  chosen: about thirty-six men
  alternatives:
  - some thirty-six men
  - approximately thirty-six men
  - thirty-six men
  lexicon: HALOT
  rationale: The prefixed כ on the number gives an approximate sense, so 'about' is
    warranted. Retaining 'men' reflects the explicit איש and the military context.
- source_word: וַיִּרְדְּפוּם
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף in military narrative is well rendered 'pursued.' It is more formal
    and contextually apt than 'chased.'
- source_word: לִפְנֵי הַשַּׁעַר
  chosen: from before the gate
  alternatives:
  - from the gate
  - from the front of the gate
  lexicon: HALOT
  rationale: לפני literally means 'before/in front of.' 'From before the gate' preserves
    the Hebrew spatial expression while remaining understandable.
- source_word: עַד הַשְּׁבָרִים
  chosen: as far as Shebarim
  alternatives:
  - as far as the quarries
  - as far as the broken places
  lexicon: HALOT
  rationale: The form may be a place name or a descriptive common noun. Because it
    is articular yet functions like a destination in the route, the main text preserves
    it as the toponym 'Shebarim,' while alternatives are preserved in a footnote.
- source_word: וַיַּכּוּם
  chosen: struck them down
  alternatives:
  - struck them
  - defeated them
  - killed them
  lexicon: HALOT
  rationale: Same verb as earlier in the verse; 'struck them down' maintains consistency
    and suits the battle context.
- source_word: בַּמּוֹרָד
  chosen: on the descent
  alternatives:
  - on the slope
  - on the downhill way
  - at the descent
  lexicon: HALOT
  rationale: מורד denotes a descent or slope. 'On the descent' is a natural rendering
    that preserves the topographical sense without over-specifying.
- source_word: וַיִּמַּס לְבַב הָעָם
  chosen: the heart of the people melted
  alternatives:
  - the people's heart melted
  - the courage of the people melted away
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for loss of courage. The literal image
    is preserved in the main text because it is vivid and intelligible in English.
- source_word: וַיְהִי לְמָיִם
  chosen: became like water
  alternatives:
  - became water
  - turned to water
  lexicon: HALOT
  rationale: The idiom expresses collapse of resolve. 'Became like water' preserves
    the metaphor while avoiding the overly literal and potentially awkward 'became
    water.'
