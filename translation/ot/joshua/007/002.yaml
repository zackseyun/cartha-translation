id: JOS.7.2
reference: Joshua 7:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ יְהוֹשֻׁ֨עַ אֲנָשִׁ֜ים מִֽ/ירִיח֗וֹ הָ/עַ֞י אֲשֶׁ֨ר עִם בֵּ֥ית
    אָ֨וֶן֙ מִ/קֶּ֣דֶם לְ/בֵֽית אֵ֔ל וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ לֵ/אמֹ֔ר עֲל֖וּ וְ/רַגְּל֣וּ
    אֶת הָ/אָ֑רֶץ וַֽ/יַּעֲלוּ֙ הָ/אֲנָשִׁ֔ים וַֽ/יְרַגְּל֖וּ אֶת הָ/עָֽי־־־־׃
translation:
  text: And Joshua sent men from Jericho to Ai, which is near Beth-aven, east of Bethel,
    and said to them, “Go up and spy out the land.” So the men went up and spied out
    Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is beside Beth-aven'; the Hebrew literally says 'which is with
      Beth-aven,' using a preposition that can express geographical proximity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of שלח; 'sent' is the natural English equivalent
    and preserves the straightforward action.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'men,' not a generic
    term for people. This fits the scouting context and follows the gender-accurate
    principle.
- source_word: מִירִיחוֹ
  chosen: from Jericho
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention.
- source_word: הָעַי
  chosen: Ai
  alternatives:
  - the Ai
  lexicon: HALOT
  rationale: Proper place name. Although the Hebrew includes the article, English
    idiom normally omits it with this toponym.
- source_word: אֲשֶׁר עִם בֵּית אָוֶן
  chosen: which is near Beth-aven
  alternatives:
  - which is with Beth-aven
  - which is beside Beth-aven
  lexicon: HALOT
  rationale: עִם literally means 'with,' but in geographical description it can denote
    proximity/association. 'Near' gives the plain locative sense in natural English.
- source_word: מִקֶּדֶם לְבֵית אֵל
  chosen: east of Bethel
  alternatives:
  - to the east of Bethel
  - from the east of Bethel
  lexicon: HALOT
  rationale: מִקֶּדֶם in geographic notation indicates eastern position relative to
    Bethel. 'East of Bethel' is concise and idiomatic.
- source_word: לֵאמֹר
  chosen: and said to them
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew speech-introduction formula is best rendered idiomatically in
    English by folding לֵאמֹר into the main reporting clause.
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Ascend
  - Go
  lexicon: HALOT
  rationale: עלה often reflects movement to higher terrain or toward a destination
    in military/travel contexts. 'Go up' preserves the directional nuance.
- source_word: וְרַגְּלוּ
  chosen: spy out
  alternatives:
  - reconnoiter
  - explore
  lexicon: HALOT
  rationale: The piel of רגל in this context means to scout or spy out. 'Spy out'
    preserves the military reconnaissance sense better than the broader 'explore.'
- source_word: אֶת הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the area
  lexicon: HALOT
  rationale: אָרֶץ commonly means 'land' here, referring to the territory under reconnaissance.
    This is the standard and sufficiently broad rendering.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - went
  lexicon: HALOT
  rationale: Repeats עלה from the command; 'went up' preserves the narrative echo
    and directional nuance.
- source_word: וַיְרַגְּלוּ
  chosen: spied out
  alternatives:
  - reconnoitered
  - scouted
  lexicon: HALOT
  rationale: Maintains lexical consistency with the earlier imperative of רגל while
    using natural past-tense English.
