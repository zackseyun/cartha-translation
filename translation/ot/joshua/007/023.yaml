id: JOS.7.23
reference: Joshua 7:23
source:
  edition: WLC
  text: וַ/יִּקָּחוּ/ם֙ מִ/תּ֣וֹךְ הָ/אֹ֔הֶל וַ/יְבִאוּ/ם֙ אֶל יְהוֹשֻׁ֔עַ וְ/אֶ֖ל
    כָּל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יַּצִּקֻ֖/ם לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: They took them from inside the tent and brought them to Joshua and to all
    the sons of Israel, and they laid them out before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they poured them out before the LORD.' The Hebrew verb can literally
      mean 'pour out,' but here likely refers to laying out the recovered items in
      the LORD's presence.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel'; alternatively, 'Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'before Yahweh.' The divine name יְהוָה is rendered 'the LORD' in
      keeping with the project's standard practice.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּחוּם
  chosen: they took them
  alternatives:
  - they seized them
  - they fetched them
  lexicon: HALOT
  rationale: The verb לקח in this narrative context most naturally means 'take.' 'Seized'
    is too forceful, and 'fetched' is more interpretive than the Hebrew requires.
- source_word: מִתּוֹךְ הָאֹהֶל
  chosen: from inside the tent
  alternatives:
  - from the midst of the tent
  - from the tent
  lexicon: HALOT
  rationale: מִתּוֹךְ explicitly indicates 'from the inside/middle of,' so 'from inside
    the tent' preserves the spatial sense more clearly than the flatter 'from the
    tent.'
- source_word: וַיְבִאוּם
  chosen: brought them
  alternatives:
  - carried them in
  - presented them
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring.' 'Presented' would overread
    ceremonial nuance at this point; the basic movement sense is sufficient.
- source_word: אֶל יְהוֹשֻׁעַ וְאֶל כָּל בְּנֵי יִשְׂרָאֵל
  chosen: to Joshua and to all the sons of Israel
  alternatives:
  - to Joshua and to all Israel
  - to Joshua and to all the Israelites
  lexicon: HALOT
  rationale: The repeated אֶל is naturally rendered with repeated 'to.' 'Sons of Israel'
    preserves the formal covenantal/narrative expression בני ישראל more closely than
    'Israelites,' and follows the gender-accurate principle without unnecessary neutralization.
- source_word: וַיַּצִּקֻם
  chosen: they laid them out
  alternatives:
  - they poured them out
  - they set them down
  lexicon: HALOT
  rationale: The verb יצק often means 'pour out,' but here the object is the recovered
    items from Achan's tent, not liquid. 'Laid them out' captures the sense of placing/displaying
    the objects before the LORD. 'Poured them out' is possible as a literal extension,
    but sounds unnatural in English for these objects.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי is idiomatically 'before/in the presence of.' 'Before the LORD'
    is concise and natural. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh'
    preserved as an alternative rather than used in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's mandated default for the divine name, preserving
    Jewish reverence tradition and longstanding covenantal rendering practice.
