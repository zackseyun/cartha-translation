theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file explicitly sets 'the LORD' as the default rendering
    for יְהוָה. No contextual factor in this verse requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The phrase is a standard covenantal ethnonym. 'Sons of Israel' preserves
    the source expression more transparently and aligns with the project's gender-accurate-over-gender-neutral
    principle. 'Israelites' is smoother English but less formally transparent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, gender-accurate over
    gender-neutral
