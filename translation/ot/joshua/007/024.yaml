id: JOS.7.24
reference: Joshua 7:24
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח יְהוֹשֻׁ֣עַ אֶת עָכָ֣ן בֶּן זֶ֡רַח וְ/אֶת הַ/כֶּ֣סֶף וְ/אֶת הָ/אַדֶּ֣רֶת
    וְֽ/אֶת לְשׁ֣וֹן הַ/זָּהָ֡ב וְֽ/אֶת בָּנָ֡י/ו וְֽ/אֶת בְּנֹתָ֡י/ו וְ/אֶת שׁוֹר/וֹ֩
    וְ/אֶת חֲמֹר֨/וֹ וְ/אֶת צֹאנ֤/וֹ וְ/אֶֽת אָהֳל/וֹ֙ וְ/אֶת כָּל אֲשֶׁר ל֔/וֹ וְ/כָל
    יִשְׂרָאֵ֖ל עִמּ֑/וֹ וַ/יַּעֲל֥וּ אֹתָ֖/ם עֵ֥מֶק עָכֽוֹר־־־־־־־־־־־־־־־׃
translation:
  text: Then Joshua took Achan son of Zerah, and the silver, the cloak, the bar of
    gold, his sons, his daughters, his ox, his donkey, his flock, his tent, and all
    that belonged to him—and all Israel with him—and they brought them up to the Valley
    of Achor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'tongue of gold,' that is, a tongue-shaped piece of gold; traditionally
      'a wedge of gold.'
    reason: lexical_alternative
  - marker: b
    text: Achor sounds like the Hebrew word for 'trouble.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then Joshua took
  alternatives:
  - And Joshua took
  - Then Joshua seized
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, so 'Then' captures the sequence
    naturally in English. 'Took' is the plain sense of לקח here and avoids overreading
    force such as 'seized.'
- source_word: עָכָן בֶּן זֶרַח
  chosen: Achan son of Zerah
  alternatives:
  - Achan, the son of Zerah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Son of Zerah'
    is a direct and natural rendering of the patronymic.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  - the silver pieces
  lexicon: HALOT
  rationale: כסף literally denotes 'silver' and refers to the stolen silver already
    identified in context. 'Money' would be more interpretive than the Hebrew wording
    warrants.
- source_word: הָאַדֶּרֶת
  chosen: the cloak
  alternatives:
  - the mantle
  - the robe
  lexicon: HALOT
  rationale: אדרת denotes a distinctive outer garment or mantle. 'Cloak' is readable
    modern English and fits the narrative item list without sounding archaic.
- source_word: לְשׁוֹן הַזָּהָב
  chosen: the bar of gold
  alternatives:
  - the tongue of gold
  - the wedge of gold
  lexicon: HALOT
  rationale: Although לשון literally means 'tongue,' in this context it refers to
    a tongue-shaped piece of gold. 'Bar of gold' communicates the object clearly in
    modern English. 'Wedge of gold' is traditional and plausible, but the Hebrew image
    is more generally shape-based than specifically a wedge.
- source_word: בָּנָיו ... בְּנֹתָיו
  chosen: his sons, his daughters
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters, so the translation
    preserves that specificity rather than collapsing it into 'children.'
- source_word: שׁוֹרוֹ
  chosen: his ox
  alternatives:
  - his cattle
  - his bull
  lexicon: HALOT
  rationale: שור commonly denotes an ox or bovine animal. Singular 'ox' matches the
    singular form in Hebrew better than the collective 'cattle.'
- source_word: חֲמֹרוֹ
  chosen: his donkey
  alternatives:
  - his ass
  lexicon: HALOT
  rationale: '''Donkey'' is the standard modern English equivalent; ''ass'' is now
    potentially distracting.'
- source_word: צֹאנוֹ
  chosen: his flock
  alternatives:
  - his sheep
  - his small livestock
  lexicon: HALOT
  rationale: צאן is a collective term for small livestock, especially sheep and goats.
    'Flock' preserves the collective sense without over-specifying species.
- source_word: אָהֳלוֹ
  chosen: his tent
  alternatives:
  - his household tent
  lexicon: HALOT
  rationale: The plain sense is 'his tent.' No expansion is needed.
- source_word: כָּל אֲשֶׁר לוֹ
  chosen: all that belonged to him
  alternatives:
  - all that he had
  - everything that was his
  lexicon: HALOT
  rationale: This phrase summarizes his possessions. 'All that belonged to him' is
    idiomatic and preserves the possessive force.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  chosen: and all Israel with him
  alternatives:
  - and all Israel with Joshua
  - and all Israel along with him
  lexicon: HALOT
  rationale: The suffix most naturally refers to Joshua as the subject of the clause,
    indicating that all Israel accompanied him. The wording is kept close to the Hebrew
    while remaining clear.
- source_word: וַיַּעֲלוּ אֹתָם
  chosen: and they brought them up
  alternatives:
  - and they took them up
  - and they led them up
  lexicon: HALOT
  rationale: עלה with object here indicates movement upward to a place. 'Brought them
    up' is natural English and covers the mixed set of persons, animals, and goods.
- source_word: עֵמֶק עָכוֹר
  chosen: the Valley of Achor
  alternatives:
  - the valley of Trouble
  lexicon: HALOT
  rationale: As a place name, it is best transliterated. The semantic association
    with trouble is important contextually but should not replace the proper name
    in the main text.
