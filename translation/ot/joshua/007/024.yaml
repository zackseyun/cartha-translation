theological_decisions:
- issue: Whether to imply the guilt or innocence of Achan's family in the main text
  chosen_reading: Retain the straightforward wording 'his sons, his daughters' without
    explanatory qualification
  alternative_readings:
  - Add an interpretive note suggesting they were complicit
  - Add an interpretive note suggesting they were merely present and not punished
  rationale: The verse lists Achan's family among those taken to the Valley of Achor,
    but this verse alone does not explicitly state their degree of involvement. To
    preserve theological and interpretive tension, the translation avoids importing
    a conclusion not directly stated here.
  doctrine_reference: Preserve theological tension rather than resolve it.
