id: JOS.7.1
reference: Joshua 7:1
source:
  edition: WLC
  text: וַ/יִּמְעֲל֧וּ בְנֵֽי יִשְׂרָאֵ֛ל מַ֖עַל בַּ/חֵ֑רֶם וַ/יִּקַּ֡ח עָכָ֣ן בֶּן כַּרְמִי֩ בֶן זַבְדִּ֨י בֶן זֶ֜רַח לְ/מַטֵּ֤ה יְהוּדָה֙ מִן הַ/חֵ֔רֶם וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בִּ/בְנֵ֥י יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: But the sons of Israel acted unfaithfully regarding the things devoted to destruction, for Achan son of Carmi, son of Zabdi, son of Zerah, of the tribe of Judah, took some of the things devoted to destruction; so the anger of Yahweh burned against the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the devoted things,' or more formally 'the ban.' The Hebrew חֵרֶם refers to persons or things set apart to God for destruction or removal from ordinary human use.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְעֲלוּ
  chosen: acted unfaithfully
  alternatives:
  - were unfaithful
  - committed a trespass
  - broke faith
  lexicon: HALOT
  rationale: מעל in covenantal contexts conveys breach of trust or faithlessness, not merely generic sin. 'Acted unfaithfully' is natural English and preserves the covenantal force.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This keeps the Hebrew familial expression while remaining readable. It also preserves the corporate identity emphasized in the verse, where the nation is implicated by one member's act.
- source_word: מַעַל
  chosen: unfaithfully
  alternatives:
  - a trespass
  - a breach of faith
  lexicon: HALOT
  rationale: The cognate accusative intensifies the verbal idea. Rather than awkwardly reproducing it woodenly ('committed a trespass'), the adverbial force is carried by 'acted unfaithfully'.
- source_word: בַּחֵרֶם / מִן הַחֵרֶם
  chosen: the things devoted to destruction
  alternatives:
  - the devoted things
  - the ban
  - what was devoted
  lexicon: HALOT
  rationale: חֵרֶם here refers to items placed under ban for destruction or exclusive dedication to God in holy war. 'Things devoted to destruction' makes the sense explicit for modern readers without reducing the term to a technical transliteration.
- source_word: וַיִּקַּח
  chosen: took some
  alternatives:
  - took
  - appropriated
  lexicon: HALOT
  rationale: English idiom often supplies 'some' when taking from a larger set ('from the devoted things'). This reflects the partitive sense created by מִן without overstating the amount.
- source_word: לְמַטֵּה יְהוּדָה
  chosen: of the tribe of Judah
  alternatives:
  - belonging to the tribe of Judah
  - from the tribe of Judah
  lexicon: HALOT
  rationale: מַטֶּה in tribal-genealogical contexts is best rendered 'tribe.' 'Of the tribe of Judah' is concise and idiomatic.
- source_word: וַיִּחַר אַף יְהוָה
  chosen: the anger of the LORD burned
  alternatives:
  - the LORD's anger burned
  - the LORD became angry
  lexicon: HALOT
  rationale: 'The idiom literally involves anger burning. This rendering preserves the vivid Hebrew metaphor while remaining natural English. The divine name follows the project''s default: ''the LORD'' for יְהוָה.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
