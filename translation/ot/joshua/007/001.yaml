theological_decisions:
- issue: 'Corporate responsibility: plural ''the sons of Israel acted unfaithfully'' followed by singular Achan''s act'
  chosen_reading: Retain the corporate subject in the main text while explicitly identifying Achan as the individual actor.
  alternative_readings:
  - Flatten to 'Israel acted unfaithfully'
  - Shift blame entirely to Achan in the main clause
  rationale: The Hebrew intentionally holds together individual sin and corporate consequence. The translation preserves that tension rather than resolving it away.
  doctrine_reference: Preserve theological tension rather than resolve it.
