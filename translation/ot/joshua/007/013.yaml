id: JOS.7.13
reference: Joshua 7:13
source:
  edition: WLC
  text: קֻ֚ם קַדֵּ֣שׁ אֶת הָ/עָ֔ם וְ/אָמַרְתָּ֖ הִתְקַדְּשׁ֣וּ לְ/מָחָ֑ר כִּ֣י כֹה֩ אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל חֵ֤רֶם בְּ/קִרְבְּ/ךָ֙ יִשְׂרָאֵ֔ל לֹ֣א תוּכַ֗ל לָ/קוּם֙ לִ/פְנֵ֣י אֹיְבֶ֔י/ךָ עַד הֲסִירְ/כֶ֥ם הַ/חֵ֖רֶם מִֽ/קִּרְבְּ/כֶֽם־־׃
translation:
  text: 'Get up, consecrate the people, and say, ‘Consecrate yourselves for tomorrow, for thus says Yahweh, the God of Israel: There is something devoted to destruction in your midst, Israel. You cannot stand before your enemies until you remove the thing devoted to destruction from your midst.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חֵרֶם (cherem), traditionally 'the ban' or 'the devoted thing'; the term denotes something placed under irrevocable dedication, here for destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֻם
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: HALOT
  rationale: Imperative to Joshua initiating immediate action. 'Get up' is natural modern English and preserves the command's urgency better than the more formal 'arise.'
- source_word: קַדֵּשׁ
  chosen: consecrate
  alternatives:
  - sanctify
  - set apart as holy
  lexicon: HALOT
  rationale: Piel imperative meaning to make holy/set apart. 'Consecrate' is readable modern English and fits the ritual-preparatory context better than the more archaic 'sanctify.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: Standard rendering for עָם in this narrative context; refers to the assembled covenant people.
- source_word: הִתְקַדְּשׁוּ
  chosen: Consecrate yourselves
  alternatives:
  - Sanctify yourselves
  - Purify yourselves
  lexicon: HALOT
  rationale: Hitpael imperative, reflexive. 'Consecrate yourselves' preserves the reflexive force and lexical connection with קַדֵּשׁ earlier in the verse.
- source_word: לְמָחָר
  chosen: for tomorrow
  alternatives:
  - by tomorrow
  - tomorrow
  lexicon: HALOT
  rationale: The preposition marks preparation with a view to the next day. 'For tomorrow' best captures the sense of readiness/preparation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying YHWH covenantally.
- source_word: חֵרֶם
  chosen: something devoted to destruction
  alternatives:
  - the devoted thing
  - the ban
  - something devoted
  - something under the ban
  lexicon: HALOT
  rationale: חֵרֶם in Joshua denotes what is placed under ban for destruction or irrevocable dedication. 'Something devoted to destruction' makes the sense explicit for modern readers without importing technical jargon. Because the noun appears first without article and later with article, English varies slightly but keeps the same core gloss.
- source_word: בְּקִרְבְּךָ יִשְׂרָאֵל
  chosen: in your midst, Israel
  alternatives:
  - among you, Israel
  lexicon: HALOT
  rationale: Direct address to Israel in the singular, personified as a corporate entity. 'In your midst, Israel' preserves both the locative sense and the vocative force.
- source_word: לֹא תוּכַל לָקוּם לִפְנֵי אֹיְבֶיךָ
  chosen: You cannot stand before your enemies
  alternatives:
  - You will not be able to stand before your enemies
  - You cannot rise before your enemies
  lexicon: HALOT
  rationale: Idiomatic expression for withstanding or prevailing against enemies. 'Stand before' is the standard and clear English equivalent.
- source_word: עַד
  chosen: until
  alternatives:
  - unless and until
  lexicon: HALOT
  rationale: Temporal boundary marker introducing the condition that must be met before Israel can prevail.
- source_word: הֲסִירְכֶם
  chosen: you remove
  alternatives:
  - you take away
  - you turn aside from
  lexicon: HALOT
  rationale: Hiphil infinitive construct with 2mp suffix after עַד, expressing the action required of the people. 'Remove' is concise and fits the context of eliminating the banned item from the camp.
- source_word: הַחֵרֶם
  chosen: the thing devoted to destruction
  alternatives:
  - the devoted thing
  - the ban
  lexicon: HALOT
  rationale: 'With the article, the reference is now definite: the specific banned item/person(s) in Israel''s midst. ''The thing devoted to destruction'' keeps continuity with the earlier indefinite expression while sounding natural in English.'
- source_word: מִקִּרְבְּכֶם
  chosen: from your midst
  alternatives:
  - from among you
  lexicon: HALOT
  rationale: Plural suffix now addresses the people collectively. 'From your midst' preserves the spatial and communal sense.
