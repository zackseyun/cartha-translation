theological_decisions:
- issue: Rendering חֵרֶם in a holy-war/judgment context
  chosen_reading: something devoted to destruction / the thing devoted to destruction
  alternative_readings:
  - the ban
  - accursed thing
  - devoted thing
  rationale: The term refers not merely to something 'accursed' in an abstract sense but to something placed under irrevocable ban, typically for destruction. The chosen rendering makes that semantic content explicit and avoids archaic or potentially misleading wording. This is a lexical-theological choice because the term carries covenant-judgment significance in Joshua.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the doctrine's contested terms table. This preserves established reverential convention while remaining transparent about the source term in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
