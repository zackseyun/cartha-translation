id: JOS.7.7
reference: Joshua 7:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹשֻׁ֜עַ אֲהָ֣הּ אֲדֹנָ֣/י יְהוִ֗ה לָ֠/מָה הֵעֲבַ֨רְתָּ הַעֲבִ֜יר אֶת הָ/עָ֤ם הַ/זֶּה֙ אֶת הַ/יַּרְדֵּ֔ן לָ/תֵ֥ת אֹתָ֛/נוּ בְּ/יַ֥ד הָ/אֱמֹרִ֖י לְ/הַאֲבִידֵ֑/נוּ וְ/לוּ֙ הוֹאַ֣לְנוּ וַ/נֵּ֔שֶׁב בְּ/עֵ֖בֶר הַ/יַּרְדֵּֽן׀־־׃
translation:
  text: And Joshua said, “Ah, Lord GOD, why have you brought this people across the Jordan at all—to give us into the hand of the Amorites, to destroy us? If only we had been content to dwell beyond the Jordan!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Lord YHWH'; rendered 'Lord GOD' in English to reflect the divine name without the awkward repetition 'Lord LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Oh
  lexicon: HALOT
  rationale: Interjection of lament/distress. 'Ah' preserves the abrupt cry without sounding overly archaic; 'alas' is possible but more formal/literary.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - my Lord, the LORD
  lexicon: HALOT
  rationale: The compound divine address combines אֲדֹנָי with the divine name YHWH. Following the doctrine default, YHWH is rendered 'the LORD'; in the compound, standard English convention is 'Lord GOD' to avoid 'Lord LORD' while signaling the underlying name.
- source_word: לָמָה
  chosen: why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Direct interrogative; simple 'why' best matches the lament question.
- source_word: הֵעֲבַרְתָּ הַעֲבִיר
  chosen: did you ever bring
  alternatives:
  - did you bring
  - have you brought across
  - caused to cross
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the action. 'Did you ever bring' captures the emphatic, anguished force better than a flat 'did you bring,' while remaining natural English. The crossing sense is completed by the following object phrase 'across the Jordan.'
- source_word: אֶת־הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עָם commonly means 'people' in covenant/national sense. Singular 'this people' reflects the Hebrew collective better than 'these people.'
- source_word: אֶת־הַיַּרְדֵּן
  chosen: across the Jordan
  alternatives:
  - over the Jordan
  - through the Jordan
  lexicon: HALOT
  rationale: With עבר in the Hiphil, the sense is causing the people to cross. 'Across the Jordan' is idiomatic and clear in modern English.
- source_word: לָתֵת אֹתָנוּ בְּיַד הָאֱמֹרִי
  chosen: to give us into the hand of the Amorites
  alternatives:
  - to hand us over to the Amorites
  - to give us into Amorite hands
  lexicon: HALOT
  rationale: The idiom 'give into the hand of' is common in Hebrew for delivering someone into another's power. Retaining 'hand' preserves the metaphor and biblical texture while remaining understandable.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Though morphologically singular, the term functions collectively for the people group. English plural is the most natural rendering here.
- source_word: לְהַאֲבִידֵנוּ
  chosen: to destroy us
  alternatives:
  - to make us perish
  - to wipe us out
  lexicon: HALOT
  rationale: Straightforward infinitive of destruction/perishing. 'Destroy us' is direct and appropriately grave without over-idiomatizing.
- source_word: וְלוּ
  chosen: If only
  alternatives:
  - Would that
  - O that
  lexicon: HALOT
  rationale: Introduces a wish contrary to present reality. 'If only' is natural modern English and preserves the lament force.
- source_word: הוֹאַלְנוּ
  chosen: we had been willing
  alternatives:
  - we had consented
  - we had been content
  - we had resolved
  lexicon: HALOT
  rationale: The verb conveys willingness/consent/undertaking. In context Joshua wishes they had chosen the alternative of remaining east of the Jordan. 'Had been willing' best captures volition without implying satisfaction.
- source_word: וַנֵּשֶׁב
  chosen: to dwell
  alternatives:
  - and stayed
  - and lived
  - and remained
  lexicon: HALOT
  rationale: 'Although formally a wayyiqtol (''and we dwelt''), after the wish construction it is well represented in English as complementary infinitive sense: ''had been willing to dwell.'' ''Dwell'' preserves the settled-residence nuance of ישב.'
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - on the other side of the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: Standard geographic expression for the east side from the speaker's present western perspective. 'Beyond the Jordan' is concise and idiomatic.
