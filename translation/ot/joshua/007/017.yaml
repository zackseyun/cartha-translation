id: JOS.7.17
reference: Joshua 7:17
source:
  edition: WLC
  text: וַ/יַּקְרֵב֙ אֶת מִשְׁפַּ֣חַת יְהוּדָ֔ה וַ/יִּלְכֹּ֕ד אֵ֖ת מִשְׁפַּ֣חַת הַ/זַּרְחִ֑י
    וַ/יַּקְרֵ֞ב אֶת מִשְׁפַּ֤חַת הַ/זַּרְחִי֙ לַ/גְּבָרִ֔ים וַ/יִּלָּכֵ֖ד זַבְדִּֽי־־׃
translation:
  text: Then he brought near the clan of Judah, and the clan of the Zerahites was
    taken. Then he brought near the clan of the Zerahites man by man, and Zabdi was
    taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the men.' The Hebrew likely means the Zerahite clan was brought forward
      individually, man by man.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: he brought near
  alternatives:
  - he presented
  - he brought forward
  lexicon: HALOT
  rationale: From קרב in the Hiphil, meaning to bring near/present. 'Brought near'
    preserves the procedural sense of drawing groups forward for selection without
    over-paraphrasing.
- source_word: מִשְׁפַּחַת
  chosen: clan
  alternatives:
  - family
  - sub-clan
  lexicon: HALOT
  rationale: In this tribal allotment and identification context, מִשְׁפָּחָה denotes
    a kinship subdivision within a tribe. 'Clan' best fits the social unit in English
    better than the narrower 'family'.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the tribal/personal name, following the policy
    to transliterate names.
- source_word: וַיִּלְכֹּד / וַיִּלָּכֵד
  chosen: was taken
  alternatives:
  - was selected
  - was captured
  lexicon: HALOT
  rationale: The idiom in this context refers to being identified by lot or divine
    selection. 'Was taken' is a conventional and sufficiently literal rendering that
    avoids the misleading military sense of 'captured' while preserving the passive/resultative
    force.
- source_word: הַזַּרְחִי
  chosen: the Zerahites
  alternatives:
  - the family of Zerah
  - the Zerah clan
  lexicon: HALOT
  rationale: Gentilic form referring to descendants/clan of Zerah. 'Zerahites' is
    concise and natural in English.
- source_word: לַגְּבָרִים
  chosen: man by man
  alternatives:
  - by the men
  - according to the men
  - by households of men
  lexicon: HALOT
  rationale: Though literally 'to/by the men,' in this narrowing procedure it indicates
    presentation of the clan by individual males. 'Man by man' communicates the distributive
    force idiomatically and matches the narrative process.
- source_word: זַבְדִּי
  chosen: Zabdi
  rationale: Standard transliteration of the personal name.
