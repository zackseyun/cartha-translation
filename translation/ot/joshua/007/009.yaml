id: JOS.7.9
reference: Joshua 7:9
source:
  edition: WLC
  text: וְ/יִשְׁמְע֣וּ הַֽ/כְּנַעֲנִ֗י וְ/כֹל֙ יֹשְׁבֵ֣י הָ/אָ֔רֶץ וְ/נָסַ֣בּוּ עָלֵ֔י/נוּ
    וְ/הִכְרִ֥יתוּ אֶת שְׁמֵ֖/נוּ מִן הָ/אָ֑רֶץ וּ/מַֽה תַּעֲשֵׂ֖ה לְ/שִׁמְ/ךָ֥ הַ/גָּדֽוֹל־־־׃ס
translation:
  text: For the Canaanites and all the inhabitants of the land will hear, and they
    will surround us and cut off our name from the earth. And what will you do for
    your great name?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the sake of your great name.'
    reason: lexical_alternative
  - marker: b
    text: '''Cut off our name'' is a Hebrew idiom for wiping out a people''s continued
      existence and remembrance.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיִשְׁמְעוּ
  chosen: will hear
  alternatives:
  - hear
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of שׁמע in a future sense within Joshua''s projected
    consequence: the nations will come to know of Israel''s defeat.'
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Though morphologically singular, the noun is used collectively for the
    people group; English plural best conveys the collective ethnic sense in context.
- source_word: וְכֹל יֹשְׁבֵי הָאָרֶץ
  chosen: and all the inhabitants of the land
  alternatives:
  - and all who dwell in the land
  - and all the inhabitants of the הארץ/earth
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial substantive, 'inhabitants/dwellers.' Here הָאָרֶץ
    most naturally refers to the local land/territory rather than the whole world,
    since it parallels 'the Canaanites' and nearby peoples.
- source_word: וְנָסַבּוּ עָלֵינוּ
  chosen: and they will surround us
  alternatives:
  - and they will gather around us
  - and they will turn against us
  lexicon: HALOT
  rationale: נסב with עַל commonly conveys surrounding or encircling. 'Surround us'
    fits the military threat Joshua fears.
- source_word: וְהִכְרִיתוּ אֶת שְׁמֵנוּ
  chosen: and cut off our name
  alternatives:
  - and wipe out our name
  - and destroy our renown
  lexicon: HALOT
  rationale: הכרית means cut off, destroy, eliminate. Retaining 'name' preserves the
    Hebrew idiom of extinguishing a people's continued existence and remembrance.
- source_word: מִן הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: Although הָאָרֶץ can mean 'land,' the idiom 'cut off our name from the
    earth' is broader and idiomatic in English, expressing eradication from human
    existence/remembrance.
- source_word: וּמַה תַּעֲשֶׂה
  chosen: And what will you do
  alternatives:
  - And what can you do
  - What will you do then
  lexicon: HALOT
  rationale: Simple interrogative plus Qal imperfect 2ms. 'Will you do' preserves
    the direct appeal to God without adding interpretive nuance.
- source_word: לְשִׁמְךָ הַגָּדוֹל
  chosen: for your great name
  alternatives:
  - for the sake of your great name
  - about your great name
  lexicon: HALOT
  rationale: The preposition ל can be rendered flexibly here. 'For your great name'
    is concise and natural, while preserving the concern for God's reputation/honor
    among the nations. The fuller idiomatic sense is preserved as an alternative.
