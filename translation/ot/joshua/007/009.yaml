theological_decisions:
- issue: Meaning of 'your great name' in Joshua's appeal
  chosen_reading: An appeal to God's public honor/reputation bound up with Israel's
    fate
  alternative_readings:
  - A purely personal concern for God's name without covenantal implications
  rationale: In context Joshua argues that Israel's destruction would reflect on the
    LORD before the surrounding nations. The translation preserves the covenantal-honor
    dimension without over-expanding the wording in the main text.
