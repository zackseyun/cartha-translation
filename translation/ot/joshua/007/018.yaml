id: JOS.7.18
reference: Joshua 7:18
source:
  edition: WLC
  text: וַ/יַּקְרֵ֥ב אֶת בֵּית֖/וֹ לַ/גְּבָרִ֑ים וַ/יִּלָּכֵ֗ד עָכָ֞ן בֶּן כַּרְמִ֧י
    בֶן זַבְדִּ֛י בֶּן זֶ֖רַח לְ/מַטֵּ֥ה יְהוּדָֽה־־־־׃
translation:
  text: Then he brought his household near man by man, and Achan son of Carmi, son
    of Zabdi, son of Zerah, of the tribe of Judah, was taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the men'; the Hebrew phrase is terse and may describe the household
      being brought forward in male subdivisions for the lot-taking process.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: Then he brought ... near
  alternatives:
  - Then he presented
  - Then he brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near or present. In this selection-by-lot
    context, 'brought near' preserves the formal sense while remaining natural English.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  - his family
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or family. Here the referent is the
    family unit being presented for selection, so 'household' best captures the social
    sense without reducing it merely to a building.
- source_word: לַגְּבָרִים
  chosen: man by man
  alternatives:
  - by the men
  - according to the men
  - by males
  lexicon: HALOT
  rationale: The phrase likely indicates subdivision into individual males or persons
    within the household for the lot-taking process. 'Man by man' is the most idiomatic
    rendering that reflects the masculine plural and the procedural sense.
- source_word: וַיִּלָּכֵד
  chosen: was taken
  alternatives:
  - was captured
  - was selected
  lexicon: HALOT
  rationale: The Niphal of לכד literally means 'was taken/captured.' In this context
    of being identified by lot, 'was taken' preserves the Hebrew idiom and echoes
    the repeated formula in the passage better than the more interpretive 'was selected.'
- source_word: עָכָן
  chosen: Achan
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: בֶּן כַּרְמִי בֶן זַבְדִּי בֶּן זֶרַח
  chosen: son of Carmi, son of Zabdi, son of Zerah
  rationale: The genealogy is rendered formally and fully, preserving the chain of
    descent stated in the Hebrew.
- source_word: לְמַטֵּה יְהוּדָה
  chosen: of the tribe of Judah
  alternatives:
  - belonging to the tribe of Judah
  - of Judah's tribe
  lexicon: HALOT
  rationale: מַטֶּה in tribal contexts means tribe. 'Of the tribe of Judah' is standard,
    clear English and accurately reflects the affiliation.
