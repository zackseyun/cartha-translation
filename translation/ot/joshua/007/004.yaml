id: JOS.7.4
reference: Joshua 7:4
source:
  edition: WLC
  text: וַ/יַּעֲל֤וּ מִן הָ/עָם֙ שָׁ֔מָּ/ה כִּ/שְׁלֹ֥שֶׁת אֲלָפִ֖ים אִ֑ישׁ וַ/יָּנֻ֕סוּ
    לִ/פְנֵ֖י אַנְשֵׁ֥י הָ/עָֽי־׃
translation:
  text: So about three thousand men from the people went up there, but they fled before
    the men of Ai.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - went up against
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In military movement toward Ai, 'went
    up' preserves the Hebrew idiom without over-specifying combat in the verb itself.
- source_word: מִן הָעָם
  chosen: from the people
  alternatives:
  - from the army
  - from the troops
  lexicon: HALOT
  rationale: עם is literally 'people.' Here it refers to a contingent drawn from Israel.
    'From the people' stays close to the source while remaining natural in English.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: The adverb indicates direction/location toward the previously mentioned
    destination. 'There' is the natural concise rendering.
- source_word: כִּשְׁלֹשֶׁת אֲלָפִים אִישׁ
  chosen: about three thousand men
  alternatives:
  - about three thousand soldiers
  - some three thousand men
  lexicon: HALOT
  rationale: כִּ with the number gives an approximate sense, hence 'about.' אִישׁ
    after a number functions distributively/classificatorily, yielding 'men' rather
    than a wooden 'three thousand man.' 'Men' is preferred over 'soldiers' because
    the Hebrew term itself is not the military noun but a counting term for persons.
- source_word: וַיָּנֻסוּ
  chosen: they fled
  alternatives:
  - they ran away
  lexicon: HALOT
  rationale: נוס means 'flee.' 'They fled' is both accurate and appropriately formal
    for narrative prose.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - from before
  - in the face of
  lexicon: HALOT
  rationale: In this construction with fleeing, לִפְנֵי indicates retreat from the
    presence of an opponent. 'Before' is idiomatic in English biblical narrative and
    concise.
- source_word: אַנְשֵׁי הָעָי
  chosen: the men of Ai
  alternatives:
  - the men of the Ai
  - the people of Ai
  lexicon: HALOT
  rationale: אַנְשֵׁי is the construct plural of אִישׁ, here referring to the male
    defenders/fighters of the city. 'The men of Ai' is the standard and most precise
    rendering. 'Ai' is transliterated as a place name per translation philosophy.
