id: JOS.7.12
reference: Joshua 7:12
source:
  edition: WLC
  text: וְ/לֹ֨א יֻכְל֜וּ בְּנֵ֣י יִשְׂרָאֵ֗ל לָ/קוּם֙ לִ/פְנֵ֣י אֹיְבֵי/הֶ֔ם עֹ֗רֶף
    יִפְנוּ֙ לִ/פְנֵ֣י אֹֽיְבֵי/הֶ֔ם כִּ֥י הָי֖וּ לְ/חֵ֑רֶם לֹ֤א אוֹסִיף֙ לִֽ/הְי֣וֹת
    עִמָּ/כֶ֔ם אִם לֹ֥א תַשְׁמִ֛ידוּ הַ/חֵ֖רֶם מִֽ/קִּרְבְּ/כֶֽם־׃
translation:
  text: Therefore the sons of Israel cannot stand before their enemies; they turn
    their backs before their enemies, because they have become devoted to destruction.
    I will no longer be with you unless you destroy the devoted thing from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חֵרֶם (cherem) refers to something devoted to God for destruction
      under a ban. Traditional English versions often render it 'accursed thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct. 'Sons of Israel'
    preserves the source expression and its corporate covenantal force; 'Israelites'
    is possible but less explicit.
- source_word: יֻכְלוּ
  chosen: cannot
  alternatives:
  - are not able to
  - will not be able to
  lexicon: HALOT
  rationale: The imperfect here expresses inability in the present situation resulting
    from divine judgment. 'Cannot' is idiomatic and concise.
- source_word: לָקוּם לִפְנֵי אֹיְבֵיהֶם
  chosen: stand before their enemies
  alternatives:
  - rise before their enemies
  - withstand their enemies
  lexicon: HALOT
  rationale: The idiom means to stand one's ground in the face of opponents. 'Stand
    before' preserves the Hebrew image while remaining natural English.
- source_word: עֹרֶף יִפְנוּ
  chosen: they turn their backs
  alternatives:
  - they turn the neck
  - they flee
  lexicon: HALOT
  rationale: Literally 'they turn neck/back.' The idiom denotes retreat in defeat.
    'Turn their backs' preserves the metaphor better than the more interpretive 'flee'.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Israel's inability and retreat.
- source_word: הָיוּ לְחֵרֶם
  chosen: they have become devoted to destruction
  alternatives:
  - they have become accursed
  - they have become devoted things
  lexicon: HALOT
  rationale: חֵרֶם denotes something placed under the ban, devoted to God for destruction.
    'Devoted to destruction' best captures the covenantal and judicial sense without
    importing later theological jargon. 'Accursed' is traditional but less precise.
- source_word: לֹא אוֹסִיף לִהְיוֹת עִמָּכֶם
  chosen: I will no longer be with you
  alternatives:
  - I will not continue to be with you
  - I will not again be with you
  lexicon: HALOT
  rationale: 'אוֹסִיף + infinitive expresses continuation: God will cease his accompanying
    presence unless the condition is met. ''No longer'' is the clearest idiomatic
    rendering.'
- source_word: אִם לֹא
  chosen: unless
  alternatives:
  - if not
  lexicon: HALOT
  rationale: In English, the conditional negative is most naturally rendered 'unless.'
- source_word: תַשְׁמִידוּ
  chosen: you destroy
  alternatives:
  - you exterminate
  - you remove by destroying
  lexicon: HALOT
  rationale: The Hiphil of שׁמד here calls for decisive destruction of what is under
    the ban. 'Destroy' is strong and idiomatic without over-specifying.
- source_word: הַחֵרֶם
  chosen: the devoted thing
  alternatives:
  - the thing devoted to destruction
  - the accursed thing
  lexicon: HALOT
  rationale: Here חֵרֶם refers concretely to the banned object/person within the camp,
    not merely the abstract state. 'Devoted thing' keeps lexical continuity with the
    earlier clause while fitting the singular article.
- source_word: מִקִּרְבְּכֶם
  chosen: from your midst
  alternatives:
  - from among you
  - out of your midst
  lexicon: HALOT
  rationale: A standard covenantal expression for removal from the community. 'From
    your midst' is both literal and natural.
