theological_decisions:
- issue: Rendering חֵרֶם in both abstract and concrete uses within the same verse
  chosen_reading: Use 'devoted to destruction' for לְחֵרֶם and 'the devoted thing'
    for הַחֵרֶם
  alternative_readings:
  - '''accursed'' / ''the accursed thing'''
  - '''under the ban'' / ''the banned thing'''
  rationale: 'The verse uses the same Hebrew root in two related but distinct senses:
    Israel has come under the status of חרם, and a specific חרם remains in their midst.
    Rendering both with ''devoted'' preserves lexical linkage while distinguishing
    abstract status from concrete object. This avoids flattening the judicial-cultic
    concept into mere curse language.'
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms, or documented
    exception)'
