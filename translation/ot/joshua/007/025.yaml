id: JOS.7.25
reference: Joshua 7:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוֹשֻׁ֨עַ֙ מֶ֣ה עֲכַרְתָּ֔/נוּ יַעְכֳּרְ/ךָ֥ יְהוָ֖ה בַּ/יּ֣וֹם הַ/זֶּ֑ה וַ/יִּרְגְּמ֨וּ אֹת֤/וֹ כָל יִשְׂרָאֵל֙ אֶ֔בֶן וַ/יִּשְׂרְפ֤וּ אֹתָ/ם֙ בָּ/אֵ֔שׁ וַ/יִּסְקְל֥וּ אֹתָ֖/ם בָּ/אֲבָנִֽים־׃
translation:
  text: And Joshua said, “Why have you troubled us? Yahweh will trouble you this day.” And all Israel stoned him with stones, and they burned them with fire and stoned them with stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Why have you troubled us? The LORD will trouble you'—a wordplay on the same verb is preserved here with 'bring trouble.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular ('him') to plural ('them') after Achan is named, likely encompassing Achan together with others or with his household and possessions; the translation preserves this shift rather than smoothing it out.
    reason: alternative_reading
  - marker: c
    text: Two different Hebrew verbs for stoning are used in this verse; both refer to execution by stones and are rendered similarly in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲכַרְתָּנוּ / יַעְכָּרְךָ
  chosen: have brought trouble on us / will bring trouble on you
  alternatives:
  - have troubled us / will trouble you
  - have brought disaster on us / will bring disaster on you
  lexicon: HALOT
  rationale: The verb עכר carries the sense of bringing trouble, disaster, or disturbance. Rendering both occurrences with 'bring trouble' preserves the wordplay and reciprocity in Joshua's statement without sounding archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - on this day
  lexicon: HALOT
  rationale: '''This day'' is a natural, sufficiently formal rendering that preserves the solemn immediacy of the Hebrew phrase.'
- source_word: וַיִּרְגְּמוּ אֹתוֹ ... אֶבֶן
  chosen: stoned him with stones
  alternatives:
  - pelted him with stones
  - stoned him
  lexicon: HALOT
  rationale: ' רגמ denotes execution by stoning. ''Stoned him with stones'' preserves the explicit Hebrew object plus instrument, though somewhat redundant in English; the redundancy reflects the source''s emphasis.'
- source_word: וַיִּשְׂרְפוּ אֹתָם בָּאֵשׁ
  chosen: they burned them with fire
  alternatives:
  - they burned them
  - they burned the bodies with fire
  lexicon: HALOT
  rationale: The shift from singular 'him' to plural 'them' is preserved because the Hebrew pronoun changes to plural, likely referring to Achan and the associated persons/possessions under judgment. 'With fire' keeps the explicit instrumental phrase.
- source_word: וַיִּסְקְלוּ אֹתָם בָּאֲבָנִים
  chosen: stoned them with stones
  alternatives:
  - pelted them with stones
  - covered them with stones
  lexicon: HALOT
  rationale: סקל also denotes stoning. The verse uses two different stoning verbs (רגם, סקל); English cannot easily preserve the distinction without awkwardness, so both are rendered with 'stone/stoned' while documenting the lexical variation. The plural object is retained.
