theological_decisions:
- issue: Plural pronouns after singular reference to Achan
  chosen_reading: Retain the Hebrew shift from singular ('him') to plural ('them') in the main text.
  alternative_readings:
  - Harmonize all references to singular Achan
  - Interpret the plural as referring only to Achan's possessions
  rationale: The Masoretic Text explicitly shifts from singular to plural. Preserving that tension is preferable to smoothing it away, especially since the broader context includes Achan's family and possessions in the judgment scene. The translation does not resolve beyond what the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
