id: JOS.7.8
reference: Joshua 7:8
source:
  edition: WLC
  text: בִּ֖י אֲדֹנָ֑/י מָ֣ה אֹמַ֔ר אַ֠חֲרֵי אֲשֶׁ֨ר הָפַ֧ךְ יִשְׂרָאֵ֛ל עֹ֖רֶף לִ/פְנֵ֥י
    אֹיְבָֽי/ו׃
translation:
  text: Please, Lord, what can I say after Israel has turned its back before its enemies?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what shall I say?'
    reason: lexical_alternative
  - marker: b
    text: Literally 'has turned back/neck before its enemies,' a Hebrew idiom for
      retreating in defeat.
    reason: cultural_note
lexical_decisions:
- source_word: בִּי
  chosen: Please
  alternatives:
  - Ah
  - Oh
  - I pray
  lexicon: HALOT
  rationale: In this idiomatic appeal before a superior, בִּי functions as a particle
    of entreaty rather than its more literal spatial sense. 'Please' conveys Joshua's
    urgent respectful plea in natural modern English.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: As a divine title in direct address, 'Lord' is the standard English rendering.
    Although morphologically it includes a 1cs suffix form, in usage אֲדֹנָי functions
    as the reverential title for God rather than a simple possessive 'my lord' here.
- source_word: מָה אֹמַר
  chosen: what can I say
  alternatives:
  - what shall I say
  - what am I to say
  lexicon: HALOT
  rationale: The Hebrew is literally 'what shall I say,' but in English lament-prayer
    idiom 'what can I say' better captures Joshua's distress and rhetorical helplessness
    without departing from the sense.
- source_word: אַחֲרֵי אֲשֶׁר
  chosen: after
  alternatives:
  - after the fact that
  - since
  lexicon: HALOT
  rationale: The compound expression introduces the circumstance that prompts Joshua's
    question. Simple 'after' is idiomatic and sufficient in English.
- source_word: הָפַךְ
  chosen: has turned
  alternatives:
  - turned
  - has turned away
  - has reversed itself
  lexicon: HALOT
  rationale: With עֹרֶף ('back/neck') the verb expresses turning away in retreat.
    'Has turned' is concise and idiomatic.
- source_word: עֹרֶף
  chosen: its back
  alternatives:
  - the back of its neck
  - the neck
  - the back
  lexicon: HALOT
  rationale: The noun literally denotes the back of the neck, but in this military
    idiom 'turn the back' means retreat before an enemy. 'Its back' communicates the
    idiom clearly.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - facing
  lexicon: HALOT
  rationale: In battle context, 'before' naturally expresses Israel's position relative
    to its enemies.
- source_word: אֹיְבָיו
  chosen: its enemies
  alternatives:
  - his enemies
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular masculine, the referent
    is the collective noun 'Israel.' English commonly uses 'its' for the nation as
    a collective entity in this context.
