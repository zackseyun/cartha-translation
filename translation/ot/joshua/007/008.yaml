- issue: Rendering of divine title אֲדֹנָי
  chosen_reading: Lord
  alternative_readings:
  - my Lord
  rationale: This follows the doctrine's default rendering for the cognate title tradition
    and preserves standard reverential address to God without importing the covenant
    name, which is not present in this verse.
