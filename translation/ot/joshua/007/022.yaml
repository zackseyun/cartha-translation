id: JOS.7.22
reference: Joshua 7:22
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יְהוֹשֻׁ֨עַ֙ מַלְאָכִ֔ים וַ/יָּרֻ֖צוּ הָ/אֹ֑הֱלָ/ה וְ/הִנֵּ֧ה
    טְמוּנָ֛ה בְּ/אָהֳל֖/וֹ וְ/הַ/כֶּ֥סֶף תַּחְתֶּֽי/הָ׃
translation:
  text: So Joshua sent messengers, and they ran to the tent; and behold, it was hidden
    in his tent, with the silver underneath it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the silver was underneath it.' The Hebrew simply coordinates 'and
      the silver' with the preceding clause; English may express this either as an
      additional item in the scene or as a separate clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context. 'Sent' is natural and
    sufficiently formal.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - agents
  - envoys
  lexicon: HALOT
  rationale: Here the referent is human emissaries sent by Joshua, not angels. 'Messengers'
    preserves the lexical sense without overformalizing.
- source_word: וַיָּרֻצוּ
  chosen: they ran
  alternatives:
  - they hurried
  lexicon: HALOT
  rationale: רץ denotes running. 'They ran' keeps the vivid narrative action better
    than the more interpretive 'hurried'.
- source_word: הָאֹהֱלָה
  chosen: to the tent
  alternatives:
  - toward the tent
  lexicon: HALOT
  rationale: The directional he indicates motion toward/to the tent. In context this
    is Achan's tent, but the Hebrew uses the noun with article only; 'to the tent'
    preserves the form while remaining clear from context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: Narrative deictic particle marking discovery. 'And behold' preserves
    the dramatic force of the Hebrew.
- source_word: טְמוּנָה
  chosen: it was hidden
  alternatives:
  - hidden
  - buried
  lexicon: HALOT
  rationale: The feminine singular participial/adjectival form refers to the stolen
    item(s) as concealed. 'It was hidden' reads smoothly in English and matches the
    discovery scene. 'Buried' is possible by implication but too specific for the
    lexeme itself.
- source_word: בְּאָהֳלוֹ
  chosen: in his tent
  lexicon: HALOT
  rationale: Straightforward locative phrase with 3ms suffix, referring to Achan.
- source_word: וְהַכֶּסֶף
  chosen: with the silver
  alternatives:
  - and the silver
  lexicon: HALOT
  rationale: The conjunction links an additional detail about the concealed items.
    'With the silver' makes the relationship to the preceding hidden object(s) explicit
    in idiomatic English, while still reflecting the Hebrew coordination.
- source_word: תַּחְתֶּיהָ
  chosen: underneath it
  alternatives:
  - beneath it
  - under it
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to the concealed
    garment mentioned in the previous verse. 'Underneath it' is clear and idiomatic.
