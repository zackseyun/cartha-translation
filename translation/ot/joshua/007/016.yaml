id: JOS.7.16
reference: Joshua 7:16
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֤ם יְהוֹשֻׁ֨עַ֙ בַּ/בֹּ֔קֶר וַ/יַּקְרֵ֥ב אֶת יִשְׂרָאֵ֖ל לִ/שְׁבָטָ֑י/ו
    וַ/יִּלָּכֵ֖ד שֵׁ֥בֶט יְהוּדָֽה־׃
translation:
  text: Joshua rose early in the morning and brought Israel near by its tribes, and
    the tribe of Judah was taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought Israel forward by its tribes.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the tribe of Judah was taken,' an idiom for being singled out or
      selected in the process.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of שׁכם commonly means to rise early. 'Rose early'
    is idiomatic, concise English and preserves the temporal emphasis without unnecessary
    expansion.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - early in the morning
  lexicon: HALOT
  rationale: 'The phrase marks the time of Joshua''s action. ''In the morning'' is
    the direct sense; combined with ''rose early'' it yields natural English: ''rose
    early in the morning.'''
- source_word: וַיַּקְרֵב
  chosen: brought ... near
  alternatives:
  - presented
  - brought forward
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/bring forward. In this context
    of tribal selection before the LORD, 'brought near' preserves the formal procedural
    sense better than the more interpretive 'presented.'
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The object is the covenant people corporately. 'Israel' is the direct
    lexical equivalent and fits the formal narrative style.
- source_word: לִשְׁבָטָיו
  chosen: by its tribes
  alternatives:
  - according to its tribes
  - tribe by tribe
  lexicon: HALOT
  rationale: The preposition ל with 'its tribes' indicates arrangement or division
    by tribal units. 'By its tribes' is natural English and preserves the distributive
    sense without over-paraphrase.
- source_word: וַיִּלָּכֵד
  chosen: was taken
  alternatives:
  - was selected
  - was identified
  - was captured
  lexicon: HALOT
  rationale: The Niphal of לכד literally means 'was taken/captured,' but in lot-selection
    or divine identification contexts it refers to being singled out. 'Was taken'
    preserves the Hebrew idiom and leaves the mechanism implicit, while 'was selected/identified'
    would interpret more than translate.
- source_word: שֵׁבֶט יְהוּדָה
  chosen: the tribe of Judah
  alternatives:
  - Judah's tribe
  lexicon: HALOT
  rationale: This is the straightforward construct relationship. 'The tribe of Judah'
    is standard, clear English.
