theological_decisions:
- issue: Nature of the selection process implied by וַיִּלָּכֵד
  chosen_reading: Retain the idiomatic passive 'was taken' without specifying 'by
    lot' or 'by the LORD' in the main text.
  alternative_readings:
  - was selected
  - was taken by lot
  - was identified
  rationale: The verse itself does not explicitly state the mechanism in this clause,
    though the broader context involves sacred selection. Preserving 'was taken' maintains
    the Hebrew wording and avoids importing explanatory detail not present in the
    verse.
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy;
    preserve tension rather than resolve it.'
