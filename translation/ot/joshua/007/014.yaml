id: JOS.7.14
reference: Joshua 7:14
source:
  edition: WLC
  text: וְ/נִקְרַבְתֶּ֥ם בַּ/בֹּ֖קֶר לְ/שִׁבְטֵי/כֶ֑ם וְ/הָיָ֡ה הַ/שֵּׁבֶט֩ אֲשֶׁר יִלְכְּדֶ֨/נּוּ יְהוָ֜ה יִקְרַ֣ב לַ/מִּשְׁפָּח֗וֹת וְ/הַ/מִּשְׁפָּחָ֞ה אֲשֶֽׁר יִלְכְּדֶ֤/נָּה יְהוָה֙ תִּקְרַ֣ב לַ/בָּתִּ֔ים וְ/הַ/בַּ֨יִת֙ אֲשֶׁ֣ר יִלְכְּדֶ֣/נּוּ יְהוָ֔ה יִקְרַ֖ב לַ/גְּבָרִֽים־־׃
translation:
  text: In the morning you shall come near by your tribes, and it shall be that the tribe that Yahweh selects shall come near by clans, and the clan that Yahweh selects shall come near by households, and the household that Yahweh selects shall come near man by man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'takes'; the Hebrew verb can mean 'captures' or 'seizes,' but here it refers to the tribe, clan, or household indicated by the LORD, likely through sacred lot.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'man by man,' specifying the final identification at the level of individual males within the household.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקְרַבְתֶּם
  chosen: you shall come near
  alternatives:
  - you shall present yourselves
  - you shall approach
  lexicon: HALOT
  rationale: From קרב in the Niphal/Qal-near semantic field, here denoting formal approach/presentation before the LORD for identification. 'Come near' preserves the repeated verbal pattern through the verse better than the more interpretive 'present yourselves'.
- source_word: לְשִׁבְטֵיכֶם
  chosen: by your tribes
  alternatives:
  - according to your tribes
  - tribe by tribe
  lexicon: HALOT
  rationale: The phrase marks ordered grouping. 'By your tribes' is concise idiomatic English and preserves the distributive sense without over-paraphrasing.
- source_word: יִלְכְּדֶנּוּ / יִלְכְּדֶנָּה
  chosen: selects
  alternatives:
  - takes
  - captures
  - seizes
  lexicon: HALOT
  rationale: Though לכד often means 'capture/seize,' in this lot-selection context it refers to the group/person indicated by divine choice. 'Selects' communicates the procedural sense in natural English while avoiding misleading physical-capture imagery.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַמִּשְׁפָּחוֹת
  chosen: by clans
  alternatives:
  - by families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal organization is broader than a nuclear family and narrower than a tribe. 'Clan' best fits the social unit in this context.
- source_word: לַבָּתִּים
  chosen: by households
  alternatives:
  - by houses
  - by families
  lexicon: HALOT
  rationale: בַּיִת here refers to household units within the clan, not physical buildings. 'Households' makes the referent clear in modern English.
- source_word: לַגְּבָרִים
  chosen: man by man
  alternatives:
  - by men
  - to the men
  - by individual men
  lexicon: HALOT
  rationale: גְּבָרִים is masculine plural and here distributive, narrowing from household to individual adult males. 'Man by man' preserves the gendered and distributive force more precisely than a neutral rendering.
- source_word: וְהָיָה
  chosen: and it shall be
  alternatives:
  - then it shall be
  - and it will happen
  lexicon: HALOT
  rationale: This formula introduces the procedural result. 'And it shall be' is slightly formal but natural enough and reflects the Hebrew discourse marker.
