id: JOS.7.21
reference: Joshua 7:21
source:
  edition: WLC
  text: ו/אראה בַ/שָּׁלָ֡ל אַדֶּ֣רֶת שִׁנְעָר֩ אַחַ֨ת טוֹבָ֜ה וּ/מָאתַ֧יִם שְׁקָלִ֣ים
    כֶּ֗סֶף וּ/לְשׁ֨וֹן זָהָ֤ב אֶחָד֙ חֲמִשִּׁ֤ים שְׁקָלִים֙ מִשְׁקָל֔/וֹ וָֽ/אֶחְמְדֵ֖/ם
    וָֽ/אֶקָּחֵ֑/ם וְ/הִנָּ֨/ם טְמוּנִ֥ים בָּ/אָ֛רֶץ בְּ/ת֥וֹךְ הָ/אָֽהֳלִ֖/י וְ/הַ/כֶּ֥סֶף
    תַּחְתֶּֽי/הָ׃
translation:
  text: I saw among the spoil one beautiful cloak from Shinar, two hundred shekels
    of silver, and one bar of gold weighing fifty shekels. I coveted them and took
    them, and look, they are hidden in the ground inside my tent, with the silver
    underneath it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'a tongue of gold'; the phrase likely refers to a tongue-shaped
      piece, rendered here as 'bar of gold.' Traditional English versions often have
      'wedge of gold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one fine robe from Shinar.' The Hebrew term can refer to a splendid
      outer garment or mantle.
    reason: lexical_alternative
  - marker: c
    text: 'The final pronoun is feminine singular, likely referring to the cloak:
      ''the silver underneath it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַשָּׁלָל
  chosen: among the spoil
  alternatives:
  - in the spoil
  - among the plunder
  lexicon: HALOT
  rationale: שָׁלָל denotes booty/plunder taken in war. 'Spoil' is concise and idiomatic
    in this narrative context; 'among' reflects the prefixed ב with locative sense.
- source_word: אַדֶּרֶת שִׁנְעָר אַחַת טוֹבָה
  chosen: one beautiful cloak from Shinar
  alternatives:
  - one fine robe from Shinar
  - one beautiful mantle of Shinar
  lexicon: HALOT
  rationale: אַדֶּרֶת can denote a splendid garment, cloak, or mantle. 'Cloak' is
    readable modern English. שִׁנְעָר is the place-name Shinar, best rendered 'from
    Shinar' to express provenance. טוֹבָה here describes quality/attractiveness, hence
    'beautiful' rather than merely 'good'.
- source_word: וּמָאתַיִם שְׁקָלִים כֶּסֶף
  chosen: two hundred shekels of silver
  alternatives:
  - two hundred silver shekels
  lexicon: HALOT
  rationale: A straightforward weight expression; preserving 'shekels' keeps the ancient
    measure rather than converting to modern units.
- source_word: וּלְשׁוֹן זָהָב אֶחָד
  chosen: one bar of gold
  alternatives:
  - one tongue of gold
  - one wedge of gold
  lexicon: HALOT
  rationale: לָשׁוֹן literally means 'tongue,' but in this context refers to a tongue-shaped
    piece of gold. 'Bar' communicates the object naturally in English. 'Wedge' is
    traditional and possible, but the Hebrew image is broader than a specific wedge
    shape.
- source_word: חֲמִשִּׁים שְׁקָלִים מִשְׁקָלוֹ
  chosen: weighing fifty shekels
  alternatives:
  - its weight was fifty shekels
  lexicon: HALOT
  rationale: This smoothly renders the appositional weight clause while preserving
    the explicit measurement.
- source_word: וָאֶחְמְדֵם
  chosen: I coveted them
  alternatives:
  - I desired them
  - I wanted them
  lexicon: HALOT
  rationale: חמד often carries the sense of strong desire, and in contexts of wrongful
    taking it is well rendered 'coveted,' preserving the moral force of Achan's confession.
- source_word: וָאֶקָּחֵם
  chosen: and took them
  alternatives:
  - and seized them
  lexicon: HALOT
  rationale: לקח is the common verb 'take'; no stronger English is required by the
    context.
- source_word: וְהִנָּם
  chosen: and look, they are
  alternatives:
  - and behold, they are
  - and there they are
  lexicon: HALOT
  rationale: הִנֵּה/הִנָּם is a deictic particle drawing attention. 'Look' preserves
    the immediacy in natural modern English.
- source_word: טְמוּנִים
  chosen: hidden
  alternatives:
  - buried
  - concealed
  lexicon: HALOT
  rationale: The passive participle indicates being concealed. 'Hidden' is broad enough,
    while the following 'in the ground' supplies the burial nuance.
- source_word: בָּאָרֶץ
  chosen: in the ground
  alternatives:
  - in the earth
  - in the land
  lexicon: HALOT
  rationale: Here אֶרֶץ refers to soil/ground within the tent setting, not the land
    generally.
- source_word: בְּתוֹךְ הָאֳהֳלִי
  chosen: inside my tent
  alternatives:
  - in the midst of my tent
  - within my tent
  lexicon: HALOT
  rationale: A natural rendering of the interior-location phrase.
- source_word: וְהַכֶּסֶף תַּחְתֶּיהָ
  chosen: with the silver underneath it
  alternatives:
  - and the silver under it
  - with the silver beneath them
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to the cloak/garment
    as the nearest suitable antecedent. 'Underneath it' preserves the singular reference;
    'with' links the final clause smoothly to the preceding statement.
