id: JOS.13.9
reference: Joshua 13:9
source:
  edition: WLC
  text: מֵ/עֲרוֹעֵ֡ר אֲשֶׁר֩ עַל שְׂפַת נַ֨חַל אַרְנ֜וֹן וְ/הָ/עִ֨יר אֲשֶׁ֧ר בְּ/תוֹךְ
    הַ/נַּ֛חַל וְ/כָל הַ/מִּישֹׁ֥ר מֵידְבָ֖א עַד דִּיבֽוֹן־־־־־׃
translation:
  text: from Aroer, which is on the edge of the Arnon Valley, and the city that is
    in the middle of the valley, and all the tableland from Medeba to Dibon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Arnon Wadi.' The Hebrew נחל often refers to a torrent valley or
      wadi rather than a continuously flowing river.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the plateau.' The Hebrew מישור denotes a level upland region; 'tableland'
      is chosen to reflect the topography more precisely.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/עֲרוֹעֵר
  chosen: from Aroer
  alternatives:
  - from Aroer onward
  lexicon: HALOT
  rationale: The prefixed מ marks the starting point of the territorial description.
    'From Aroer' is the natural English rendering in a boundary list.
- source_word: שְׂפַת
  chosen: edge of
  alternatives:
  - bank of
  - lip of
  lexicon: HALOT
  rationale: Literally 'lip/border of.' With a wadi/valley, 'edge of' is idiomatic
    modern English and avoids implying a perennial riverbank where the Hebrew נחל
    can denote a wadi.
- source_word: נַחַל אַרְנוֹן
  chosen: the Arnon Valley
  alternatives:
  - the Arnon Wadi
  - the Valley of the Arnon
  - the Arnon River Valley
  lexicon: HALOT
  rationale: נחל often denotes a wadi or torrent valley rather than a continuously
    flowing river. 'Arnon Valley' is readable and geographically appropriate in English.
    Because the same term recurs later in the verse, this rendering is kept consistent.
- source_word: וְ/הָ/עִיר
  chosen: and the city
  lexicon: HALOT
  rationale: Definite article preserved. The phrase refers to a known city associated
    with the Arnon ravine in this territorial description.
- source_word: בְּ/תוֹךְ הַ/נַּחַל
  chosen: in the middle of the valley
  alternatives:
  - within the valley
  - in the midst of the wadi
  lexicon: HALOT
  rationale: תוך conveys interior/midst. 'In the middle of the valley' is clear, natural
    English and matches the topographical sense.
- source_word: הַ/מִּישֹׁר
  chosen: the tableland
  alternatives:
  - the plateau
  - the plain
  lexicon: HALOT
  rationale: מישור here denotes the elevated level country east of the Jordan rather
    than a generic flat plain. 'Tableland' best captures the regional topography in
    accessible English.
- source_word: מֵידְבָא
  chosen: from Medeba
  alternatives:
  - from Meidba
  lexicon: HALOT
  rationale: Standard English transliteration is 'Medeba.' The prefixed מן again marks
    the starting point of this sub-range.
- source_word: עַד דִּיבוֹן
  chosen: to Dibon
  alternatives:
  - as far as Dibon
  lexicon: HALOT
  rationale: עַד marks the endpoint. 'To Dibon' is concise and sufficient in a boundary
    formula.
