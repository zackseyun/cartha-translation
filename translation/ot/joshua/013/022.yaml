id: JOS.13.22
reference: Joshua 13:22
source:
  edition: WLC
  text: וְ/אֶת בִּלְעָ֥ם בֶּן בְּע֖וֹר הַ/קּוֹסֵ֑ם הָרְג֧וּ בְנֵֽי יִשְׂרָאֵ֛ל בַּ/חֶ֖רֶב
    אֶל חַלְלֵי/הֶֽם־־־־׃
translation:
  text: And Balaam son of Beor, the diviner, the sons of Israel killed with the sword
    among their slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'along with their slain.' The Hebrew phrase at the end is somewhat unusual;
      it indicates that Balaam was killed in connection with the others slain by Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: And
  alternatives:
  - Also
  - Now as for
  lexicon: HALOT
  rationale: Here וְ introduces an additional item in the conquest summary, while
    אֶת marks the direct object. English does not require a separate rendering for
    אֶת, so 'And' naturally carries the additive force.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: בֶּן בְּע֖וֹר
  chosen: son of Beor
  alternatives:
  - the son of Beor
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction; rendered straightforwardly in
    English.
- source_word: הַ/קּוֹסֵם
  chosen: the diviner
  alternatives:
  - the soothsayer
  - the one who practiced divination
  lexicon: HALOT
  rationale: קֹסֵם denotes one who practices divination. 'Diviner' is concise, accurate,
    and preserves the negative connotation without paraphrase. It also reflects the
    appositional identification of Balaam in this context.
- source_word: הָרְגוּ
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: Common verb for killing. 'Killed' is clear modern English; 'slew' is
    archaic, and 'struck down' adds stylistic color not required by the Hebrew.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the gender-accurate
    principle, this is retained rather than flattened to 'Israelites,' though that
    remains a viable idiomatic alternative.
- source_word: בַּ/חֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard idiom for death in battle. 'With the sword' is a natural English
    rendering of the instrumental beth.
- source_word: אֶל חַלְלֵי/הֶם
  chosen: among their slain
  alternatives:
  - along with their slain
  - in addition to their slain
  lexicon: HALOT
  rationale: Though אֶל often means 'to/toward,' in this idiom it conveys association/addition
    with those already slain. 'Among their slain' is idiomatic and fits the battle-summary
    context, indicating Balaam was killed in connection with the others they had slain.
