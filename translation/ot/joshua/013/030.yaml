id: JOS.13.30
reference: Joshua 13:30
source:
  edition: WLC
  text: וַ/יְהִ֣י גְבוּלָ֗/ם מִ/מַּחֲנַ֨יִם כָּֽל הַ/בָּשָׁ֜ן כָּֽל מַמְלְכ֣וּת ע֣וֹג מֶֽלֶךְ הַ/בָּשָׁ֗ן וְ/כָל חַוֺּ֥ת יָאִ֛יר אֲשֶׁ֥ר בַּ/בָּשָׁ֖ן שִׁשִּׁ֥ים עִֽיר־־׀־־׃
translation:
  text: 'Their territory was from Mahanaim: all Bashan, all the kingdom of Og king of Bashan, and all the villages of Jair that are in Bashan—sixty cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Havvoth-jair,” a traditional transliteration of the Hebrew name for these settlements.
    reason: lexical_alternative
  - marker: b
    text: Or 'from Mahanaim, all Bashan'.
    reason: previous_rendering
lexical_decisions:
- source_word: גְבוּלָם
  chosen: their territory
  alternatives:
  - their border
  - their boundary
  lexicon: HALOT
  rationale: גְּבוּל can denote border/boundary or the territory delimited by it. In this allotment context, English 'territory' best conveys the inherited region rather than merely the line of demarcation.
- source_word: מִמַּחֲנַיִם
  chosen: from Mahanaim
  alternatives:
  - beginning at Mahanaim
  lexicon: HALOT
  rationale: The preposition מִן marks the starting point of the territorial description. Mahanaim is a place name and is transliterated per translation policy.
- source_word: כָּל הַבָּשָׁן
  chosen: all Bashan
  alternatives:
  - the whole Bashan
  lexicon: HALOT
  rationale: A straightforward territorial expression. 'All Bashan' is idiomatic and preserves the comprehensive force of כָּל.
- source_word: מַמְלְכוּת עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: all the kingdom of Og king of Bashan
  alternatives:
  - all the royal realm of Og king of Bashan
  lexicon: HALOT
  rationale: מַמְלָכָה/מַמְלְכוּת refers to a kingdom or realm. 'Kingdom' is the most natural and standard rendering here.
- source_word: חַוֹּת יָאִיר
  chosen: the villages of Jair
  alternatives:
  - the settlements of Jair
  - Havvoth-jair
  lexicon: HALOT
  rationale: The phrase literally refers to the encampments/settlements associated with Jair. Because חַוֹּת functions here as a common noun phrase rather than requiring preservation as a fixed toponym, 'villages of Jair' is clear modern English. The more traditional transliterated place-name 'Havvoth-jair' is preserved in a footnote.
- source_word: אֲשֶׁר בַּבָּשָׁן
  chosen: that are in Bashan
  alternatives:
  - which were in Bashan
  lexicon: HALOT
  rationale: The relative clause identifies the location of Jair's villages. Present tense reads naturally in English for a geographic description.
- source_word: שִׁשִּׁים עִיר
  chosen: sixty cities
  alternatives:
  - sixty towns
  lexicon: HALOT
  rationale: עִיר commonly means city/town. 'Cities' is retained because it is the standard rendering in territorial lists and need not imply large urban centers in the modern sense.
