id: JOS.13.7
reference: Joshua 13:7
source:
  edition: WLC
  text: וְ/עַתָּ֗ה חַלֵּ֞ק אֶת הָ/אָ֧רֶץ הַ/זֹּ֛את בְּ/נַחֲלָ֖ה לְ/תִשְׁעַ֣ת הַ/שְּׁבָטִ֑ים
    וַ/חֲצִ֖י הַ/שֵּׁ֥בֶט הַֽ/מְנַשֶּֽׁה־׃
translation:
  text: Now divide this land as an inheritance to the nine tribes and the half-tribe
    of Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And now divide this land for an inheritance to the nine tribes and half
      the tribe of Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces the next command in sequence. 'Now' is natural modern English
    while preserving the discourse transition; 'And now' is possible but slightly
    heavier in English.
- source_word: חַלֵּק
  chosen: divide
  alternatives:
  - apportion
  - allot
  lexicon: HALOT
  rationale: Imperative addressed to Joshua. 'Divide' is the plain sense and fits
    the following inheritance language; 'apportion' or 'allot' are possible but are
    better conveyed by the inheritance phrase rather than the verb alone.
- source_word: אֶת הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this territory
  lexicon: HALOT
  rationale: Direct object phrase referring to the land under discussion. 'Land' is
    the standard and sufficiently broad rendering here; 'territory' is possible but
    less idiomatic in this context.
- source_word: בְּנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an allotted inheritance, especially tribal land
    tenure in Joshua. 'As an inheritance' preserves both the legal-allotment sense
    and the covenantal resonance better than the flatter 'possession'.
- source_word: לְתִשְׁעַת הַשְּׁבָטִים
  chosen: to the nine tribes
  alternatives:
  - for the nine tribes
  lexicon: HALOT
  rationale: The preposition marks the recipients of the allotment. 'To' is straightforward
    and idiomatic with 'divide ... as an inheritance' in English.
- source_word: וַחֲצִי הַשֵּׁבֶט
  chosen: and the half-tribe
  alternatives:
  - and half the tribe
  lexicon: HALOT
  rationale: Construct expression referring to the recognized tribal subdivision.
    'The half-tribe' is the conventional and clearest English rendering in this allotment
    context.
- source_word: הַמְנַשֶּׁה
  chosen: of Manasseh
  lexicon: HALOT
  rationale: 'Personal/tribal name is transliterated per project philosophy: translate
    titles, transliterate names.'
