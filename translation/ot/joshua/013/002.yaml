id: JOS.13.2
reference: Joshua 13:2
source:
  edition: WLC
  text: זֹ֥את הָ/אָ֖רֶץ הַ/נִּשְׁאָ֑רֶת כָּל גְּלִיל֥וֹת הַ/פְּלִשְׁתִּ֖ים וְ/כָל
    הַ/גְּשׁוּרִֽי־־׃
translation:
  text: 'This is the land that remains: all the districts of the Philistines, and
    all the Geshurites—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'regions' for 'districts' (Hebrew גְּלִילוֹת). The term refers to territorial
      areas associated with the Philistines.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Geshurite' is a collective gentilic; 'the Geshurites' brings
      out the collective sense in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the clause; in English, supplying
    'is' yields natural syntax while preserving the presentative force.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/territory
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ commonly denotes land/territory. 'Land' is the most natural and
    contextually appropriate term in a territorial allotment context.
- source_word: הַנִּשְׁאָרֶת
  chosen: that remains
  alternatives:
  - remaining
  - left over
  lexicon: HALOT
  rationale: Niphal participle of שׁאר, functioning attributively with הָאָרֶץ. 'That
    remains' is idiomatic English and preserves the sense of territory not yet taken.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Quantifier governing the following plural noun; straightforwardly rendered
    'all'.
- source_word: גְּלִילוֹת
  chosen: districts
  alternatives:
  - regions
  - circuits
  - borders
  lexicon: HALOT
  rationale: Plural of גְּלִיל, referring to territorial districts/regions. 'Districts'
    fits the administrative-geographical sense better than the more archaic 'borders'
    or less precise 'regions'.
- source_word: הַפְּלִשְׁתִּים
  chosen: the Philistines
  alternatives:
  - Philistia
  lexicon: HALOT
  rationale: The Hebrew names the people group, not the land directly. 'Of the Philistines'
    preserves the genitival relation to their districts.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - also all
  lexicon: HALOT
  rationale: Simple conjunction plus quantifier continuing the list.
- source_word: הַגְּשׁוּרִי
  chosen: the Geshurites
  alternatives:
  - the Geshurite
  - Geshur
  lexicon: HALOT
  rationale: Although morphologically singular/gentilic in form, it functions collectively
    for the people/territory associated with Geshur. English plural ethnonym 'Geshurites'
    best conveys the collective sense in parallel with 'the Philistines'.
