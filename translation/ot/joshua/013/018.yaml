id: JOS.13.18
reference: Joshua 13:18
source:
  edition: WLC
  text: וְ/יַ֥הְצָ/ה וּ/קְדֵמֹ֖ת וּ/מֵפָֽעַת׃
translation:
  text: and Jahaz, and Kedemoth, and Mephaath;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jahaz is also spelled 'Jahzah' in some English traditions.
    reason: lexical_alternative
  - marker: b
    text: Mephaath is also spelled 'Mophaath' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַהְצָה
  chosen: and Jahaz
  alternatives:
  - and Jahzah
  lexicon: HALOT
  rationale: Proper place name in a boundary/city list; transliterated rather than
    translated per philosophy for names. English convention commonly shortens/spells
    the name as 'Jahaz'; 'Jahzah' reflects a closer consonantal preservation and is
    worth preserving as an alternative.
- source_word: וּ/קְדֵמֹת
  chosen: and Kedemoth
  lexicon: HALOT
  rationale: Proper place name; transliterated directly. Although the root relates
    to 'east' or 'ancient things,' in this context it functions as a toponym and should
    not be translated semantically.
- source_word: וּ/מֵפָעַת
  chosen: and Mephaath
  alternatives:
  - and Mophaath
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Mephaath' is the standard English
    form; minor spelling variation 'Mophaath' appears in some traditions and is preserved
    as an alternative.
