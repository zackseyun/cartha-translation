id: JOS.13.27
reference: Joshua 13:27
source:
  edition: WLC
  text: וּ/בָ/עֵ֡מֶק בֵּ֣ית הָרָם֩ וּ/בֵ֨ית נִמְרָ֜ה וְ/סֻכּ֣וֹת וְ/צָפ֗וֹן יֶ֚תֶר
    מַמְלְכ֗וּת סִיחוֹן֙ מֶ֣לֶךְ חֶשְׁבּ֔וֹן הַ/יַּרְדֵּ֖ן וּ/גְבֻ֑ל עַד קְצֵה֙ יָם
    כִּנֶּ֔רֶת עֵ֥בֶר הַ/יַּרְדֵּ֖ן מִזְרָֽחָ/ה־־׃
translation:
  text: and in the valley, Beth-haram, Beth-nimrah, Succoth, and Zaphon—the rest of
    the kingdom of Sihon king of Heshbon—with the Jordan as its border, as far as
    the lower end of the Sea of Kinnereth, beyond the Jordan to the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as the edge/extremity of the Sea of Kinnereth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בָ/עֵמֶק
  chosen: and in the valley
  alternatives:
  - and in the plain
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley or lowland. Here it introduces the geographic
    region containing the listed towns, so 'in the valley' is the most natural rendering.
- source_word: בֵּית הָרָם
  chosen: Beth-haram
  alternatives:
  - Beth Haram
  lexicon: HALOT
  rationale: A place name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: וּ/בֵית נִמְרָה
  chosen: Beth-nimrah
  alternatives:
  - Beth Nimrah
  lexicon: HALOT
  rationale: A place name; transliterated in standard English form.
- source_word: וְ/סֻכּוֹת
  chosen: Succoth
  lexicon: HALOT
  rationale: Place name; standard transliteration retained.
- source_word: וְ/צָפוֹן
  chosen: Zaphon
  alternatives:
  - Zephon
  lexicon: HALOT
  rationale: Place name in this territorial list, not the common noun 'north.' Transliteration
    avoids confusion with the directional term while matching the syntax of the town
    list.
- source_word: יֶתֶר מַמְלְכוּת סִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  chosen: the rest of the kingdom of Sihon king of Heshbon
  alternatives:
  - the remainder of the royal domain of Sihon king of Heshbon
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder/rest.' The phrase summarizes that this territory
    comprised what remained of Sihon's kingdom. 'Kingdom' is the natural rendering
    of מַמְלָכוּת here.
- source_word: הַיַּרְדֵּן וּגְבֻל
  chosen: with the Jordan as its border
  alternatives:
  - the Jordan and its border
  - the Jordan as a boundary
  lexicon: HALOT
  rationale: The Hebrew is compressed and appositional. English idiom is best served
    by making explicit that the Jordan functioned as the territorial boundary.
- source_word: עַד קְצֵה יָם כִּנֶּרֶת
  chosen: as far as the lower end of the Sea of Kinnereth
  alternatives:
  - as far as the edge of the Sea of Kinnereth
  - as far as the extremity of the Sea of Kinnereth
  lexicon: HALOT
  rationale: קְצֵה means 'end/extremity.' Given the Jordan Valley orientation and
    the boundary description, 'lower end' communicates the geographic sense more clearly
    than a bare 'edge.' 'Sea of Kinnereth' preserves the Hebrew name rather than replacing
    it with the later 'Sea of Galilee.'
- source_word: עֵבֶר הַיַּרְדֵּן מִזְרָחָה
  chosen: beyond the Jordan to the east
  alternatives:
  - across the Jordan eastward
  - on the other side of the Jordan, eastward
  lexicon: HALOT
  rationale: Standard territorial formula indicating the Transjordanian/eastern side.
    'Beyond the Jordan to the east' is clear modern English while preserving the directional
    force.
