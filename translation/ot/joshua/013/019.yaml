id: JOS.13.19
reference: Joshua 13:19
source:
  edition: WLC
  text: וְ/קִרְיָתַ֣יִם וְ/שִׂבְמָ֔ה וְ/צֶ֥רֶת הַשַּׁ֖חַר בְּ/הַ֥ר הָ/עֵֽמֶק׃
translation:
  text: and Kiriathaim, and Sibmah, and Zereth-shahar on the hill of the valley,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly "Zereth of the dawn," if the name is analyzed semantically rather
      than preserved as a place-name transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְיָתַיִם
  chosen: Kiriathaim
  alternatives:
  - Kiriathayim
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated. Standard English transliteration is retained.
- source_word: שִׂבְמָה
  chosen: Sibmah
  alternatives:
  - Shibmah
  lexicon: HALOT
  rationale: Proper place name; transliterated. The initial sin can be represented
    with 's'; 'Shibmah' reflects a less direct English convention and is preserved
    as an alternative.
- source_word: צֶרֶת הַשַּׁחַר
  chosen: Zereth-shahar
  alternatives:
  - Zareth-shahar
  - Zereth of the dawn
  lexicon: HALOT
  rationale: Treated as a compound toponym, as commonly understood in this context.
    Because it functions as a place name in a list of towns, transliteration is preferred
    in the main text rather than translating the second element semantically.
- source_word: בְּהַר הָעֵמֶק
  chosen: on the hill of the valley
  alternatives:
  - in the mountain of the valley
  - on the mountain in the valley
  lexicon: HALOT
  rationale: ב here is locative ('on/in'). הַר is best rendered 'hill' in readable
    modern English in this local topographical description, while preserving the literal
    sense. The construct with הָעֵמֶק is rendered straightforwardly as 'of the valley.'
