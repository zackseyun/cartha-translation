id: JOS.13.10
reference: Joshua 13:10
source:
  edition: WLC
  text: וְ/כֹ֗ל עָרֵי֙ סִיחוֹן֙ מֶ֣לֶךְ הָ/אֱמֹרִ֔י אֲשֶׁ֥ר מָלַ֖ךְ בְּ/חֶשְׁבּ֑וֹן
    עַד גְּב֖וּל בְּנֵ֥י עַמּֽוֹן־׃
translation:
  text: and all the cities of Sihon king of the Amorites, who reigned in Heshbon,
    as far as the border of the sons of Ammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “the Ammonites.” Hebrew: “the sons of Ammon.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  chosen: and all
  alternatives:
  - all
  lexicon: HALOT
  rationale: The conjunction וְ links this verse to the preceding territorial description,
    so 'and all' preserves both the connective and the comprehensiveness of כֹל.
- source_word: עָרֵי
  chosen: the cities of
  alternatives:
  - cities of
  - towns of
  lexicon: HALOT
  rationale: Construct plural of עִיר, best rendered 'the cities of' in a territorial
    list. 'Towns' is possible but 'cities' is the more standard and sufficiently natural
    rendering here.
- source_word: סִיחוֹן
  chosen: Sihon
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - the Amorite king
  lexicon: HALOT
  rationale: Both are possible, but 'king of the Amorites' follows the construct relationship
    transparently and reads naturally in English.
- source_word: אֲשֶׁר מָלַךְ
  chosen: who reigned
  alternatives:
  - who ruled
  - who was king
  lexicon: HALOT
  rationale: מָלַךְ denotes reigning as king. 'Who reigned' preserves the royal nuance
    more precisely than the broader 'ruled.'
- source_word: בְּחֶשְׁבּוֹן
  chosen: in Heshbon
  alternatives:
  - at Heshbon
  lexicon: HALOT
  rationale: The preposition בְ with a city name is naturally rendered 'in Heshbon'
    for the location of Sihon's reign.
- source_word: עַד גְּבוּל
  chosen: as far as the border of
  alternatives:
  - to the border of
  - up to the border of
  lexicon: HALOT
  rationale: עַד marks extent, and 'as far as' clearly expresses the territorial limit
    in idiomatic English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: Literally 'sons of Ammon.' Because the source uses the filial ethnonym,
    this rendering preserves the Hebrew form more closely. 'Ammonites' is a smoother
    ethnic equivalent and is preserved in a footnote as a lexical alternative.
