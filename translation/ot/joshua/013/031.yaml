id: JOS.13.31
reference: Joshua 13:31
source:
  edition: WLC
  text: וַ/חֲצִ֤י הַ/גִּלְעָד֙ וְ/עַשְׁתָּר֣וֹת וְ/אֶדְרֶ֔עִי עָרֵ֛י מַמְלְכ֥וּת ע֖וֹג
    בַּ/בָּשָׁ֑ן לִ/בְנֵ֤י מָכִיר֙ בֶּן מְנַשֶּׁ֔ה לַ/חֲצִ֥י בְנֵֽי מָכִ֖יר לְ/מִשְׁפְּחוֹתָֽ/ם־־׃
translation:
  text: and half of Gilead, and Ashtaroth and Edrei, the cities of the kingdom of
    Og in Bashan, belonged to the sons of Machir son of Manasseh—to half of the sons
    of Machir, according to their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the royal cities of Og in Bashan.' The Hebrew literally reads 'the cities
      of the kingdom of Og in Bashan.'
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Machir'' may denote Machir''s descendants more broadly, but the
      translation keeps the Hebrew familial wording.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַחֲצִי
  chosen: and half of
  alternatives:
  - and the half of
  - also half of
  lexicon: HALOT
  rationale: The prefixed conjunction continues the allotment list from the previous
    verse. 'Half of' is the natural English rendering of חֲצִי in this territorial
    context.
- source_word: הַגִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gilead
  lexicon: HALOT
  rationale: Proper place name; English idiom normally omits the article even though
    Hebrew has it.
- source_word: עַשְׁתָּרוֹת
  chosen: Ashtaroth
  alternatives:
  - Ashteroth
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֶדְרֶעִי
  chosen: Edrei
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: עָרֵי מַמְלְכוּת עוֹג בַּבָּשָׁן
  chosen: the cities of the kingdom of Og in Bashan
  alternatives:
  - the royal cities of Og in Bashan
  - the cities of Og's kingdom in Bashan
  lexicon: HALOT
  rationale: Construct chain is best represented straightforwardly. 'Cities of the
    kingdom' preserves the Hebrew relation without overinterpreting whether these
    were capitals or merely cities within his realm.
- source_word: לִבְנֵי מָכִיר בֶּן מְנַשֶּׁה
  chosen: belonged to the sons of Machir son of Manasseh
  alternatives:
  - were for the sons of Machir son of Manasseh
  - to the descendants of Machir son of Manasseh
  lexicon: HALOT
  rationale: The preposition ל marks assignment/allotment. Supplying 'belonged to'
    makes the verbless Hebrew clause idiomatic in English while preserving the allotment
    sense. 'Sons of' is retained rather than generalized to 'descendants' for source
    transparency.
- source_word: לַחֲצִי בְנֵי מָכִיר
  chosen: to half of the sons of Machir
  alternatives:
  - for the half-tribe of the sons of Machir
  - to the half of the sons of Machir
  lexicon: HALOT
  rationale: This specifies that only one half of Machir's line is in view. 'Half
    of the sons of Machir' is a close rendering; adding 'tribe' would import a word
    not present here.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in allotment texts commonly refers to clan divisions within
    a tribe. 'Clans' is more precise than modern English 'families' in this administrative-genealogical
    context.
