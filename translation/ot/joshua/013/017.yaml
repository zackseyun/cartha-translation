id: JOS.13.17
reference: Joshua 13:17
source:
  edition: WLC
  text: חֶשְׁבּ֥וֹן וְ/כָל עָרֶ֖י/הָ אֲשֶׁ֣ר בַּ/מִּישֹׁ֑ר דִּיבוֹן֙ וּ/בָמ֣וֹת בַּ֔עַל
    וּ/בֵ֖ית בַּ֥עַל מְעֽוֹן־׃
translation:
  text: 'Heshbon and all its cities that are on the plateau: Dibon, Bamoth-baal, and
    Beth-baal-meon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that are in the plain' or 'that are in the tableland.' The Hebrew term
      refers to the level upland region of the Transjordan.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention
    rather than translated.
- source_word: וְכָל עָרֶיהָ
  chosen: and all its cities
  alternatives:
  - and all her cities
  lexicon: HALOT
  rationale: עָרֶיהָ means 'its/her cities' with a feminine singular suffix referring
    back to Heshbon as a city. English idiom prefers 'its' for a city here.
- source_word: אֲשֶׁר בַּמִּישֹׁר
  chosen: that are on the plateau
  alternatives:
  - that are in the plain
  - that are in the tableland
  lexicon: HALOT
  rationale: מִישׁוֹר in this Transjordan territorial context refers to the elevated
    level region or tableland rather than a generic lowland plain. 'Plateau' is clear
    modern English and fits the geography.
- source_word: דִּיבוֹן
  chosen: Dibon
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: וּבָמוֹת בַּעַל
  chosen: Bamoth-baal
  alternatives:
  - Bamoth Baal
  lexicon: HALOT
  rationale: This is a toponym, not a common noun phrase to be translated as 'high
    places of Baal' in this context. Hyphenation helps signal a single place name
    in English.
- source_word: וּבֵית בַּעַל מְעוֹן
  chosen: and Beth-baal-meon
  alternatives:
  - and Beth Baal-meon
  - and Beth-baal-meon
  lexicon: HALOT
  rationale: A compound place name. Transliteration preserves the toponymic form;
    'Beth-' reflects Hebrew בֵּית as part of the established place name rather than
    translating it as 'house of.'
