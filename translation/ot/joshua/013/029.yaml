id: JOS.13.29
reference: Joshua 13:29
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן מֹשֶׁ֔ה לַ/חֲצִ֖י שֵׁ֣בֶט מְנַשֶּׁ֑ה וַ/יְהִ֗י לַ/חֲצִ֛י מַטֵּ֥ה
    בְנֵֽי מְנַשֶּׁ֖ה לְ/מִשְׁפְּחוֹתָֽ/ם־׃
translation:
  text: 'And Moses gave to the half-tribe of Manasseh, and it belonged to the half-tribe
    of the sons of Manasseh according to their clans:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Manasseh,' a kinship expression referring to the tribal
      descendants of Manasseh.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: The verb נתן in this narrative allotment context commonly means 'gave.'
    'Assigned' is possible in context, but 'gave' preserves the straightforward verbal
    sense while fitting the land-distribution setting.
- source_word: לַחֲצִי
  chosen: to the half-
  alternatives:
  - to half of the
  lexicon: HALOT
  rationale: חֲצִי denotes 'half.' Rendering with the article and hyphenated English
    construction reflects the construct relationship with 'tribe' naturally.
- source_word: שֵׁבֶט
  chosen: tribe
  alternatives:
  - branch
  - scepter
  lexicon: HALOT
  rationale: In tribal-allotment contexts שֵׁבֶט refers to a tribal unit, not the
    literal 'scepter' sense.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal/tribal name is transliterated per translation philosophy.
- source_word: וַיְהִי
  chosen: it belonged
  alternatives:
  - it was
  - it came to be
  lexicon: HALOT
  rationale: 'Although היה is literally ''and it was,'' in this allotment formula
    the sense is possessive/distributive: the allotment belonged to or fell to the
    specified group. ''It belonged'' makes the implied referent clear in idiomatic
    English without over-paraphrasing.'
- source_word: מַטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff,' but in this administrative context it is another
    term for 'tribe.' Rendering both שֵׁבֶט and מַטֶּה as 'tribe' reflects the contextual
    meaning, despite the lexical variation in Hebrew.
- source_word: בְנֵי מְנַשֶּׁה
  chosen: the sons of Manasseh
  alternatives:
  - the descendants of Manasseh
  - the people of Manasseh
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Manasseh.' This preserves the source's
    kinship language; in context it denotes the tribal descendants.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal census/allotment contexts is best rendered 'clans,'
    a subdivision within the tribe. 'According to' reflects the distributive force
    of לְ.
