theological_decisions:
- issue: Rendering רְפָאִים
  chosen_reading: the Rephaim
  alternative_readings:
  - the giants
  rationale: The Hebrew term names a known people group and should not be flattened
    into an interpretive description. Preserving the transliteration avoids importing
    a specific theory about their nature while allowing readers to connect the term
    across passages.
  doctrine_reference: Translation philosophy §1, §5
