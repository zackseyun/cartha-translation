id: JOS.13.12
reference: Joshua 13:12
source:
  edition: WLC
  text: כָּל מַמְלְכ֥וּת עוֹג֙ בַּ/בָּשָׁ֔ן אֲשֶׁר מָלַ֥ךְ בְּ/עַשְׁתָּר֖וֹת וּ/בְ/אֶדְרֶ֑עִי
    ה֤וּא נִשְׁאַר֙ מִ/יֶּ֣תֶר הָ/רְפָאִ֔ים וַ/יַּכֵּ֥/ם מֹשֶׁ֖ה וַ/יֹּרִשֵֽׁ/ם־־׃
translation:
  text: all the kingdom of Og in Bashan, who reigned in Ashtaroth and in Edrei—he
    was left from the remnant of the Rephaim. Moses struck them down and dispossessed
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the giants.' Hebrew 'the Rephaim,' likely the name of an ancient people
      group.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מַמְלְכוּת
  chosen: all the kingdom
  alternatives:
  - the whole kingdom
  - all the royal domain
  lexicon: HALOT
  rationale: כָּל with singular מַמְלְכוּת is best rendered collectively as 'all the
    kingdom,' referring to the entirety of Og's realm rather than multiple kingdoms.
- source_word: עוֹג
  chosen: Og
  rationale: Personal name transliterated per translation philosophy.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  alternatives:
  - of Bashan
  lexicon: HALOT
  rationale: The prefixed preposition ב marks location; 'in Bashan' is the plain spatial
    sense.
- source_word: אֲשֶׁר מָלַךְ
  chosen: who reigned
  alternatives:
  - who ruled
  - who was king
  lexicon: HALOT
  rationale: Relative clause describing Og; 'reigned' preserves the royal nuance of
    מלך.
- source_word: בְּעַשְׁתָּרוֹת וּבְאֶדְרֶעִי
  chosen: in Ashtaroth and in Edrei
  alternatives:
  - at Ashtaroth and at Edrei
  lexicon: HALOT
  rationale: Both are place names; repeating 'in' reflects the Hebrew prepositions
    and keeps the geography explicit.
- source_word: הוּא נִשְׁאַר
  chosen: he was left
  alternatives:
  - he alone remained
  - he was remaining
  lexicon: HALOT
  rationale: Nifal of שׁאר indicates remaining/being left. 'He was left' is a close
    rendering; context implies survival from a larger group without adding 'alone'
    explicitly.
- source_word: מִיֶּתֶר
  chosen: from the remnant of
  alternatives:
  - from the rest of
  - from what remained of
  lexicon: HALOT
  rationale: יֶתֶר denotes what is left over or remaining. 'Remnant' is natural English
    and fits the construction with the following people group.
- source_word: הָרְפָאִים
  chosen: the Rephaim
  alternatives:
  - the giants
  lexicon: HALOT
  rationale: Rephaim is best preserved as a proper ethnographic/group term rather
    than interpreted as 'giants.' The latter is an interpretive gloss and should be
    preserved, if at all, in a footnote.
- source_word: וַיַּכֵּם
  chosen: Moses struck them down
  alternatives:
  - Moses defeated them
  - Moses struck them
  lexicon: HALOT
  rationale: נכה commonly means strike/smite/defeat. 'Struck them down' captures the
    military force of the verb and the plural object suffix refers to Og and his people/realm
    collectively.
- source_word: וַיֹּרִשֵׁם
  chosen: and dispossessed them
  alternatives:
  - and drove them out
  - and took possession from them
  lexicon: HALOT
  rationale: The Hifil of ירשׁ here means to cause someone to lose possession, hence
    'dispossessed them.' This is more precise than simply 'inherited them' in this
    conquest context.
