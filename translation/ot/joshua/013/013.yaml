id: JOS.13.13
reference: Joshua 13:13
source:
  edition: WLC
  text: וְ/לֹ֤א הוֹרִ֨ישׁוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶת הַ/גְּשׁוּרִ֖י וְ/אֶת הַ/מַּעֲכָתִ֑י
    וַ/יֵּ֨שֶׁב גְּשׁ֤וּר וּ/מַֽעֲכָת֙ בְּ/קֶ֣רֶב יִשְׂרָאֵ֔ל עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: But the sons of Israel did not drive out the Geshurites or the Maacathites,
    and Geshur and Maacath lived among Israel to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not dispossess.' The Hebrew verb can emphasize removing prior inhabitants
      from possession of the land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; many translations render this 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁוּ
  chosen: did not drive out
  alternatives:
  - did not dispossess
  - did not expel
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ here means to cause to leave/dispossess inhabitants
    from the land. 'Drive out' is natural modern English and fits the conquest context
    without overformal stiffness.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A gender-accurate rendering preserves the Hebrew expression literally
    enough while remaining readable. 'Israelites' is possible, but 'sons of Israel'
    better reflects the source wording and the project's gender-accurate principle.
- source_word: הַגְּשׁוּרִי
  chosen: the Geshurites
  alternatives:
  - the Geshurite people
  lexicon: HALOT
  rationale: The gentilic singular with article functions collectively in English;
    'Geshurites' is the standard and clear collective rendering.
- source_word: הַמַּעֲכָתִי
  chosen: the Maacathites
  alternatives:
  - the Maacathite people
  lexicon: HALOT
  rationale: As with 'Geshurites,' the gentilic is best rendered collectively in idiomatic
    English.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - remained
  lexicon: HALOT
  rationale: Although singular in form, the verb precedes a compound subject and is
    naturally rendered with an English plural sense. 'Lived' is readable modern English;
    'dwelt' is more archaic.
- source_word: גְּשׁוּר וּמַעֲכָת
  chosen: Geshur and Maacath
  alternatives:
  - the people of Geshur and Maacath
  lexicon: HALOT
  rationale: The place names stand metonymically for their populations. Retaining
    the names directly is concise and mirrors the Hebrew, while the preceding mention
    of the peoples makes the sense clear.
- source_word: בְּקֶרֶב יִשְׂרָאֵל
  chosen: among Israel
  alternatives:
  - in the midst of Israel
  - within Israel
  lexicon: HALOT
  rationale: The phrase denotes residence in the midst of the Israelite community/territory.
    'Among Israel' is both natural and close to the Hebrew.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English rendering of the Hebrew temporal
    formula.
