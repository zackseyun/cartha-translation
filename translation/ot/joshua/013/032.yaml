id: JOS.13.32
reference: Joshua 13:32
source:
  edition: WLC
  text: אֵ֕לֶּה אֲשֶׁר נִחַ֥ל מֹשֶׁ֖ה בְּ/עַֽרְב֣וֹת מוֹאָ֑ב מֵ/עֵ֛בֶר לְ/יַרְדֵּ֥ן
    יְרִיח֖וֹ מִזְרָֽחָ/ה־׃ס
translation:
  text: These are what Moses apportioned as an inheritance in the plains of Moab,
    beyond the Jordan east of Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'These are what Moses gave as an inheritance' or 'These are what Moses
      assigned as an inheritance.' The Hebrew verb emphasizes distribution of land
      as inherited possession.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan.' The Hebrew expression 'beyond the Jordan' is a standard
      geographical formula whose exact English wording can vary with perspective.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Demonstrative plural introducing a summary statement; 'These are' is
    natural English and preserves the deictic force.
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Relative particle linking the demonstrative to the following clause.
    'What' yields idiomatic English after 'These are,' while preserving the referential
    sense.
- source_word: נִחַל
  chosen: apportioned as an inheritance
  alternatives:
  - gave as an inheritance
  - assigned as an inheritance
  - caused to inherit
  lexicon: HALOT
  rationale: From נחל in the causative sense used in land-distribution contexts. 'Apportioned
    as an inheritance' captures both the act of distribution and the inheritance theme
    central to Joshua 13.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: בְּעַרְבוֹת
  chosen: in the plains
  alternatives:
  - in the steppes
  - in the desert plains
  lexicon: HALOT
  rationale: עֲרָבוֹת refers to the steppe/plains region. 'Plains' is the most familiar
    and sufficiently precise rendering in this geographical formula.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard English transliteration of the place name.
- source_word: מֵעֵבֶר לְיַרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: Common geographical expression. 'Beyond the Jordan' preserves the Hebrew
    idiom without over-specifying viewpoint; context then clarifies the side with
    'east of Jericho.'
- source_word: יְרִיחוֹ
  chosen: Jericho
  rationale: Standard English transliteration of the city name.
- source_word: מִזְרָחָה
  chosen: east of
  alternatives:
  - eastward from
  - to the east of
  lexicon: HALOT
  rationale: Directional adverb with locale marker. In English it most naturally modifies
    the Jordan/Jericho location as 'east of Jericho.'
