id: JOS.13.24
reference: Joshua 13:24
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן מֹשֶׁה֙ לְ/מַטֵּה גָ֔ד לִ/בְנֵי גָ֖ד לְ/מִשְׁפְּחֹתָֽ/ם־־׃
translation:
  text: And Moses gave to the tribe of Gad, to the sons of Gad, according to their
    clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the children/descendants of Gad.' The Hebrew literally says 'sons
      of Gad,' a standard tribal-genealogical expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of נתן in this allotment context denotes
    the act of giving/assigning territory. 'Gave' is the most direct and natural rendering,
    while the object is left implicit as in the Hebrew.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: לְמַטֵּה
  chosen: to the tribe of
  alternatives:
  - for the tribe of
  - to the staff of
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff/rod' literally or 'tribe' in genealogical/territorial
    contexts. Here, in Joshua's allotment formula, 'tribe of' is clearly intended.
- source_word: גָד
  chosen: Gad
  rationale: Standard transliteration of the tribal/personal name Gad.
- source_word: לִבְנֵי
  chosen: to the sons of
  alternatives:
  - to the children of
  - to the descendants of
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In tribal formulas it can denote the
    members/descendants of a group. Because the source uses the masculine genealogical
    term and the translation philosophy prefers gender-accurate renderings, 'sons
    of' is retained.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-land contexts refers to clan-level family divisions.
    'According to their clans' captures the distributive force of לְ and fits the
    allotment formula.
