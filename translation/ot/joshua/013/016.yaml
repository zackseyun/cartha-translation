id: JOS.13.16
reference: Joshua 13:16
source:
  edition: WLC
  text: וַ/יְהִ֨י לָ/הֶ֜ם הַ/גְּב֗וּל מֵ/עֲרוֹעֵ֡ר אֲשֶׁר֩ עַל שְׂפַת נַ֨חַל אַרְנ֜וֹן
    וְ/הָ/עִ֨יר אֲשֶׁ֧ר בְּ/תוֹךְ הַ/נַּ֛חַל וְ/כָל הַ/מִּישֹׁ֖ר עַל מֵידְבָֽא־־־־־׃
translation:
  text: Their border was from Aroer, which is on the edge of the Arnon Valley, and
    the city that is in the middle of the valley, and all the tableland as far as
    Medeba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bank of the Arnon Wadi.' The Hebrew נַחַל can refer to a streambed,
      wadi, or valley ravine.
    reason: lexical_alternative
  - marker: b
    text: Or 'plateau' or 'plain' for 'tableland.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לָהֶם הַגְּבוּל
  chosen: Their border was
  alternatives:
  - And the border was theirs
  - And their territory was
  lexicon: HALOT
  rationale: The clause introduces the territorial boundary of the tribe(s). English
    idiom is smoother with 'Their border was' rather than a more wooden 'And the border
    was to them.'
- source_word: מֵעֲרוֹעֵר
  chosen: from Aroer
  lexicon: HALOT
  rationale: The preposition מִן marks the starting point of the boundary. 'Aroer'
    is transliterated as a place name per translation philosophy.
- source_word: אֲשֶׁר עַל שְׂפַת נַחַל אַרְנוֹן
  chosen: which is on the edge of the Arnon Valley
  alternatives:
  - which is on the bank of the Arnon Wadi
  - which is by the lip of the Arnon Valley
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip/edge/bank.' נַחַל can denote a wadi or valley
    stream; in this geographical boundary context, 'Valley' communicates the landform
    clearly in modern English while preserving the sense of the Arnon ravine.
- source_word: וְהָעִיר אֲשֶׁר בְּתוֹךְ הַנַּחַל
  chosen: and the city that is in the middle of the valley
  alternatives:
  - and the city that is within the valley
  - and the city in the midst of the wadi
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst/middle of.' The phrase likely refers to
    a specific city situated within the Arnon ravine area. 'Middle of the valley'
    is natural English and retains the spatial sense.
- source_word: וְכָל הַמִּישֹׁר
  chosen: and all the tableland
  alternatives:
  - and all the plateau
  - and all the plain
  lexicon: HALOT
  rationale: מִישׁוֹר refers to level country/upland plain in Transjordan. 'Tableland'
    best captures the elevated plateau sense better than the flatter and potentially
    misleading 'plain.'
- source_word: עַל מֵידְבָא
  chosen: as far as Medeba
  alternatives:
  - toward Medeba
  - up to Medeba
  lexicon: HALOT
  rationale: With boundary descriptions, עַל can mark extension toward or up to a
    place. 'As far as Medeba' clearly expresses the territorial extent in idiomatic
    English.
