id: JOS.13.20
reference: Joshua 13:20
source:
  edition: WLC
  text: וּ/בֵ֥ית פְּע֛וֹר וְ/אַשְׁדּ֥וֹת הַ/פִּסְגָּ֖ה וּ/בֵ֥ית הַיְשִׁמֽוֹת׃
translation:
  text: and Beth-peor, and the slopes of Pisgah, and Beth-jeshimoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the springs/foothills of Pisgah.' The Hebrew term can be understood
      in more than one topographical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית פְּעוֹר
  chosen: Beth-peor
  alternatives:
  - Beth Peor
  - house of Peor
  lexicon: HALOT
  rationale: A place name. Per translation philosophy, names are transliterated rather
    than translated. Hyphenation reflects the construct relationship in a conventional
    English toponym form. 'House of Peor' is more formally transparent but less idiomatic
    for a settled place name.
- source_word: אַשְׁדּוֹת
  chosen: slopes
  alternatives:
  - springs
  - foothills
  - ravines
  lexicon: HALOT
  rationale: In this topographical context with 'the Pisgah,' the term most naturally
    denotes mountain slopes/declivities rather than water sources. 'Slopes' is clear
    modern English and fits the geographic list.
- source_word: הַפִּסְגָּה
  chosen: Pisgah
  alternatives:
  - the Pisgah
  - the summit
  lexicon: HALOT
  rationale: Used here as a proper geographic name, so transliteration is preferred.
    The Hebrew article can be retained semantically in English, but English place-name
    style commonly omits it. 'The summit' would over-translate a name-like usage.
- source_word: בֵית הַיְשִׁמוֹת
  chosen: Beth-jeshimoth
  alternatives:
  - Beth Jeshimoth
  - house of the desolations
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred over a literal rendering.
    Hyphenation is conventional in English biblical place names. The literal sense
    is not foregrounded in this boundary list.
