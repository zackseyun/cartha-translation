id: JOS.13.5
reference: Joshua 13:5
source:
  edition: WLC
  text: וְ/הָ/אָ֣רֶץ הַ/גִּבְלִ֗י וְ/כָל הַ/לְּבָנוֹן֙ מִזְרַ֣ח הַ/שֶּׁ֔מֶשׁ מִ/בַּ֣עַל
    גָּ֔ד תַּ֖חַת הַר חֶרְמ֑וֹן עַ֖ד לְב֥וֹא חֲמָֽת־־׃
translation:
  text: and the land of the Gebalites, and all Lebanon toward the east, from Baal-gad
    below Mount Hermon to Lebo-hamath,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as far as the entrance to Hamath.' The Hebrew can be read as a descriptive
      boundary expression rather than a fixed place-name.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the territory
  lexicon: HALOT
  rationale: Common geographic term; here it introduces a region still remaining to
    be possessed. 'Land' is the most natural and sufficiently formal rendering.
- source_word: הַגִּבְלִי
  chosen: the Gebalites
  alternatives:
  - the Giblites
  - the people of Gebal
  lexicon: HALOT
  rationale: Gentilic referring to the inhabitants associated with Gebal. 'Gebalites'
    preserves the place-name connection while using a standard English people-group
    form. 'Giblites' reflects another transliteration tradition but is less transparent.
- source_word: כָל הַלְּבָנוֹן
  chosen: all Lebanon
  alternatives:
  - the whole of Lebanon
  lexicon: HALOT
  rationale: Refers to the full Lebanon region. 'All Lebanon' is concise and natural
    while preserving the comprehensiveness of כָל.
- source_word: מִזְרַח הַשֶּׁמֶשׁ
  chosen: toward the east
  alternatives:
  - eastward
  - toward the sunrise
  - from the east
  lexicon: HALOT
  rationale: Literally 'sunrise/east of the sun.' In this boundary description, 'toward
    the east' communicates direction idiomatically without over-literal awkwardness.
    'From the east' would suggest source rather than orientation.
- source_word: מִבַּעַל גָּד
  chosen: from Baal-gad
  lexicon: HALOT
  rationale: Toponym; transliterated per translation philosophy for names.
- source_word: תַּחַת הַר חֶרְמוֹן
  chosen: below Mount Hermon
  alternatives:
  - under Mount Hermon
  - at the foot of Mount Hermon
  lexicon: HALOT
  rationale: תחת in geographic description can denote a lower position relative to
    a mountain. 'Below Mount Hermon' is a clear, natural boundary expression without
    overinterpreting the exact topography.
- source_word: עַד לְבוֹא חֲמָת
  chosen: to Lebo-hamath
  alternatives:
  - as far as the entrance to Hamath
  lexicon: HALOT
  rationale: The Hebrew phrase is traditionally understood either as a place-name
    ('Lebo-hamath') or as the descriptive phrase 'entrance to Hamath.' Because the
    form functions here like a boundary toponym and appears as such elsewhere, the
    main text uses the transliterated place-name, while the descriptive alternative
    is preserved in a footnote.
