id: JOS.13.15
reference: Joshua 13:15
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן מֹשֶׁ֔ה לְ/מַטֵּ֥ה בְנֵֽי רְאוּבֵ֖ן לְ/מִשְׁפְּחֹתָֽ/ם־׃
translation:
  text: 'And Moses gave to the tribe of the sons of Reuben, according to their clans:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Reubenites.' The Hebrew reads literally 'the sons of Reuben.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: And ... gave
  alternatives:
  - Then ... gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן advances the narrative. 'And ... gave' preserves the
    straightforward sequential sense without overinterpreting discourse nuance.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: לְמַטֵּה
  chosen: to the tribe of
  alternatives:
  - to the staff of
  - to the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts means 'tribe.' The prefixed ל marks
    indirect object/dative, hence 'to the tribe of.'
- source_word: בְנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - the Reubenites
  - the children of Reuben
  lexicon: HALOT
  rationale: Literally 'sons of Reuben.' This preserves the Hebrew kinship expression
    while remaining natural in English. 'Reubenites' is possible but less formally
    transparent to the source wording.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here denotes clan-level family divisions within the tribe.
    'According to their clans' captures the distributive/organizational force of ל
    in this formulaic allotment language better than the broader 'families'.
