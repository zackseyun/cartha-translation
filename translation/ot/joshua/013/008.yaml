id: JOS.13.8
reference: Joshua 13:8
source:
  edition: WLC
  text: עִמּ֗/וֹ הָ/רֽאוּבֵנִי֙ וְ/הַ/גָּדִ֔י לָקְח֖וּ נַחֲלָתָ֑/ם אֲשֶׁר֩ נָתַ֨ן לָ/הֶ֜ם מֹשֶׁ֗ה בְּ/עֵ֤בֶר הַ/יַּרְדֵּן֙ מִזְרָ֔חָ/ה כַּ/אֲשֶׁר֙ נָתַ֣ן לָ/הֶ֔ם מֹשֶׁ֖ה עֶ֥בֶד יְהוָֽה׃
translation:
  text: With him, the Reubenites and the Gadites received their inheritance, which Moses gave them beyond the Jordan eastward, just as Moses the servant of Yahweh gave them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''beyond the Jordan eastward,'' that is, on the east side of the Jordan.'
    reason: cultural_note
lexical_decisions:
- source_word: עִמּוֹ
  chosen: With him
  alternatives:
  - Along with him
  - With it
  lexicon: HALOT
  rationale: The preposition with 3ms suffix most naturally refers back to the half-tribe of Manasseh in the preceding context, hence 'with him.' 'With it' is less likely because the antecedent is personal/tribal in context.
- source_word: הָרְאוּבֵנִי
  chosen: the Reubenites
  alternatives:
  - the Reubenite
  lexicon: HALOT
  rationale: Although morphologically singular gentilic, it functions collectively for the tribe; English idiom prefers the plural collective 'the Reubenites.'
- source_word: וְהַגָּדִי
  chosen: and the Gadites
  alternatives:
  - and the Gadite
  lexicon: HALOT
  rationale: Like 'Reubenites,' the singular gentilic is collective and is best rendered by the English tribal plural.
- source_word: לָקְחוּ
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: The verb means 'took/received.' 'Took' preserves the Hebrew lexical force while fitting the narrative summary.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their possession
  - their allotted inheritance
  lexicon: HALOT
  rationale: נחלה commonly denotes inherited land allotment. 'Inheritance' preserves the covenantal-land nuance better than the flatter 'possession.'
- source_word: אֲשֶׁר נָתַן לָהֶם מֹשֶׁה
  chosen: which Moses gave to them
  alternatives:
  - which Moses had given them
  lexicon: HALOT
  rationale: A simple past is acceptable in English narrative, though the sense is prior to the current allotment. 'Gave to them' stays close to the Hebrew while remaining natural.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - on the other side of the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: The phrase literally means 'in/beyond the region across the Jordan.' 'Beyond the Jordan' is a standard and sufficiently transparent rendering; the following 'eastward' clarifies the side intended.
- source_word: מִזְרָחָה
  chosen: eastward
  alternatives:
  - to the east
  - east
  lexicon: HALOT
  rationale: The directional adverb indicates the eastern side. 'Eastward' is concise and idiomatic after 'beyond the Jordan.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: This comparative conjunction introduces confirmation that the allotment was in accordance with Moses's grant; 'just as' captures that force clearly.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the servant of Yahweh
  lexicon: HALOT
  rationale: This is an honorific title for Moses. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh.' 'Servant' is the natural rendering here; no bonded-status emphasis is foregrounded in this title.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
