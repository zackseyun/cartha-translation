id: JOS.13.11
reference: Joshua 13:11
source:
  edition: WLC
  text: וְ/הַ/גִּלְעָ֞ד וּ/גְב֧וּל הַ/גְּשׁוּרִ֣י וְ/הַ/מַּעֲכָתִ֗י וְ/כֹ֨ל הַ֥ר חֶרְמ֛וֹן
    וְ/כָל הַ/בָּשָׁ֖ן עַד סַלְכָֽה־־׃
translation:
  text: and Gilead, and the territory of the Geshurite and the Maacathite, and all
    Mount Hermon, and all Bashan as far as Salecah—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "border of the Geshurite and the Maacathite." The Hebrew word can denote
      a boundary line or the territory belonging to a people; here the broader territorial
      sense best fits the list.
    reason: lexical_alternative
  - marker: b
    text: Hebrew "all Mount Hermon"; this may refer to the entire Hermon massif or
      hill country, not only the summit.
    reason: cultural_note
lexical_decisions:
- source_word: הַגִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gilead
  lexicon: HALOT
  rationale: Proper regional name; in English idiom the article is usually omitted
    for place names, though the Hebrew has the article.
- source_word: גְב֧וּל
  chosen: territory
  alternatives:
  - border
  - boundary
  - region
  lexicon: HALOT
  rationale: In this territorial list, גְּבוּל refers to the area/domain belonging
    to a people, not merely a boundary line. 'Territory' best fits the sense in readable
    English.
- source_word: הַגְּשׁוּרִי
  chosen: the Geshurite
  alternatives:
  - Geshur
  - the Geshurites
  lexicon: HALOT
  rationale: The singular gentilic with article is used collectively for the people/realm.
    'The Geshurite' preserves the Hebrew form while naturally implying the Geshurite
    territory with גְּבוּל.
- source_word: הַמַּעֲכָתִי
  chosen: the Maacathite
  alternatives:
  - Maacah
  - the Maacathites
  lexicon: HALOT
  rationale: Like 'the Geshurite,' this singular gentilic functions collectively.
    Rendering it as a gentilic preserves the Hebrew wording and links it to 'territory.'
- source_word: כֹל הַר חֶרְמוֹן
  chosen: all Mount Hermon
  alternatives:
  - the whole hill country of Hermon
  - all the hill country of Hermon
  lexicon: HALOT
  rationale: הַר can mean 'mountain' or 'hill country.' With the proper name Hermon,
    'Mount Hermon' is the most natural English rendering; 'all' indicates the full
    extent of that mountainous region.
- source_word: כָל הַבָּשָׁן
  chosen: all Bashan
  alternatives:
  - all the Bashan
  - the whole of Bashan
  lexicon: HALOT
  rationale: Proper regional name; English normally omits the article. 'All Bashan'
    preserves the distributive force of כָּל in the territorial summary.
- source_word: עַד סַלְכָה
  chosen: as far as Salecah
  alternatives:
  - up to Salecah
  - to Salecah
  lexicon: HALOT
  rationale: עַד marks the territorial limit. 'As far as' clearly communicates extent.
    'Salecah' follows a conventional English transliteration of the place name סַלְכָה.
