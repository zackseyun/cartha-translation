id: JOS.13.25
reference: Joshua 13:25
source:
  edition: WLC
  text: וַ/יְהִ֤י לָ/הֶם֙ הַ/גְּב֔וּל יַעְזֵר֙ וְ/כָל עָרֵ֣י הַ/גִּלְעָ֔ד וַ/חֲצִ֕י
    אֶ֖רֶץ בְּנֵ֣י עַמּ֑וֹן עַד עֲרוֹעֵ֕ר אֲשֶׁ֖ר עַל פְּנֵ֥י רַבָּֽה־־־׃
translation:
  text: And their territory was Jazer, and all the cities of Gilead, and half the
    land of the Ammonites, as far as Aroer, which is opposite Rabbah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which faces Rabbah.” The Hebrew idiom literally says “which is before
      Rabbah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לָהֶם הַגְּבוּל
  chosen: And their territory was
  alternatives:
  - And the border was theirs
  - And their boundary was
  lexicon: HALOT
  rationale: The clause introduces the extent of the tribal allotment. גְּבוּל can
    mean 'border,' 'boundary,' or by extension 'territory.' In this context, followed
    by a list of places included in the allotment, 'territory' communicates the sense
    more naturally in English while remaining faithful to the Hebrew.
- source_word: יַעְזֵר
  chosen: Jazer
  alternatives:
  - Jaazer
  rationale: Standard English transliteration of the place name יַעְזֵר.
- source_word: וְכָל עָרֵי הַגִּלְעָד
  chosen: and all the cities of Gilead
  alternatives:
  - and all the towns of Gilead
  lexicon: HALOT
  rationale: עָרִים commonly denotes 'cities' or 'towns.' 'Cities' is the more conventional
    rendering in territorial lists and preserves the formal register of the passage.
- source_word: וַחֲצִי אֶרֶץ בְּנֵי עַמּוֹן
  chosen: and half the land of the Ammonites
  alternatives:
  - and half the land of the sons of Ammon
  - and half the country of the Ammonites
  lexicon: HALOT
  rationale: בְּנֵי עַמּוֹן is a standard ethnogeographic expression for the Ammonite
    people. 'The Ammonites' is idiomatic English; 'sons of Ammon' is more formal but
    less natural here. אֶרֶץ is rendered 'land' in a territorial context.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - unto
  lexicon: HALOT
  rationale: Marks the territorial limit. 'As far as' is clear modern English and
    fits geographic description.
- source_word: עֲרוֹעֵר
  chosen: Aroer
  rationale: Standard transliteration of the place name.
- source_word: אֲשֶׁר עַל פְּנֵי רַבָּה
  chosen: which is opposite Rabbah
  alternatives:
  - which faces Rabbah
  - which is before Rabbah
  - which is east of Rabbah
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי often means 'before,' 'in front of,' or 'opposite/facing.'
    'Opposite Rabbah' best captures the spatial relation without over-specifying direction.
    'East of Rabbah' would be interpretive beyond the wording itself.
