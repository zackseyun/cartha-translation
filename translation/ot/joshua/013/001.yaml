id: JOS.13.1
reference: Joshua 13:1
source:
  edition: WLC
  text: וִ/יהוֹשֻׁ֣עַ זָקֵ֔ן בָּ֖א בַּ/יָּמִ֑ים וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלָ֗י/ו אַתָּ֤ה זָקַ֨נְתָּה֙ בָּ֣אתָ בַ/יָּמִ֔ים וְ/הָ/אָ֛רֶץ נִשְׁאֲרָ֥ה הַרְבֵּֽה מְאֹ֖ד לְ/רִשְׁתָּֽ/הּ־׃
translation:
  text: Now Joshua was old, advanced in years, and Yahweh said to him, “You are old, advanced in years, and very much of the land remains to be possessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inherit it.' The Hebrew verb can carry the sense of taking possession of land as an inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן
  chosen: was old
  alternatives:
  - had become old
  - was elderly
  lexicon: HALOT
  rationale: Predicate use describing Joshua’s age/state. 'Was old' is natural English and preserves the straightforward description without adding nuance beyond the Hebrew.
- source_word: בָּא בַּיָּמִים
  chosen: advanced in years
  alternatives:
  - well along in days
  - stricken in years
  lexicon: HALOT
  rationale: This idiom literally means 'come into days' and denotes advanced age. 'Advanced in years' is a clear modern equivalent that preserves the idiomatic sense without archaic wording like 'stricken in years.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַתָּה זָקַנְתָּה בָּאתָ בַיָּמִים
  chosen: You are old, advanced in years
  alternatives:
  - You have grown old and are advanced in years
  - You are old and well along in days
  lexicon: HALOT
  rationale: The LORD’s speech repeats the narrator’s description for emphasis. English preserves the repetition with a natural present-state rendering.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/territory
  - the country
  lexicon: HALOT
  rationale: In Joshua, 'the land' is the standard covenantal-geographical term and should remain consistent rather than be flattened to 'territory' or 'country.'
- source_word: נִשְׁאֲרָה
  chosen: remains
  alternatives:
  - is left
  - has been left
  lexicon: HALOT
  rationale: The Niphal conveys what is left remaining. 'Remains' is concise and idiomatic in English.
- source_word: הַרְבֵּה מְאֹד
  chosen: very much
  alternatives:
  - a great deal
  - exceedingly much
  - very much indeed
  lexicon: HALOT
  rationale: The paired intensifiers stress the large extent of land yet unconquered. 'Very much' preserves the emphasis without sounding inflated.
- source_word: לְרִשְׁתָּהּ
  chosen: to be possessed
  alternatives:
  - to possess
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: The infinitive of ירשׁ can mean possess/inherit/dispossess depending on context. Here the focus is Israel’s taking possession of the land. 'To be possessed' fits the English construction after 'remains' and avoids over-specifying inheritance language, while preserving the covenant-land sense.
