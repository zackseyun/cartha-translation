id: JOS.13.23
reference: Joshua 13:23
source:
  edition: WLC
  text: וַ/יְהִ֗י גְּבוּל֙ בְּנֵ֣י רְאוּבֵ֔ן הַ/יַּרְדֵּ֖ן וּ/גְב֑וּל זֹ֣את נַחֲלַ֤ת
    בְּנֵֽי רְאוּבֵן֙ לְ/מִשְׁפְּחֹתָ֔/ם הֶ/עָרִ֖ים וְ/חַצְרֵי/הֶֽן־׃פ
translation:
  text: And the border of the sons of Reuben was the Jordan and its border. This was
    the inheritance of the sons of Reuben according to their clans, the cities and
    their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jordan as a border.' The Hebrew phrase 'the Jordan and border' is
      compact and may be understood as identifying the Jordan as the boundary line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - came to be
  - became
  lexicon: HALOT
  rationale: In this boundary formula, the waw-consecutive of היה functions idiomatically
    to state what the border was, not to emphasize becoming.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: '''Border'' fits the geographic delimitation context. ''Boundary'' is
    possible, but ''border'' is more natural English here while preserving the formal
    sense.'
- source_word: בְּנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - the people of Reuben
  - the Reubenites
  lexicon: HALOT
  rationale: A formally close rendering preserves the tribal/genealogical idiom. 'Reubenites'
    is idiomatic but less transparent to the Hebrew construction.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name normally stands as 'the Jordan' in English Bible style;
    'River' is implicit and unnecessary unless clarity demands it.
- source_word: וּגְבוּל
  chosen: and its border
  alternatives:
  - with its territory
  - as a border
  lexicon: HALOT
  rationale: 'The suffix is not written explicitly in the consonantal form here, but
    the phrase is conventionally understood as completing the boundary notice: ''the
    Jordan and its border.'' This preserves the likely sense that the Jordan served
    as the boundary line with its adjoining bank/limit.'
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: 'English idiom in a retrospective allotment summary prefers past tense:
    ''This was the inheritance.'''
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotted inheritance
  - the possession
  lexicon: HALOT
  rationale: '''Inheritance'' is the standard and contextually appropriate term for
    tribal allotment in Joshua.'
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal-allotment contexts refers to clan divisions within
    the tribe. 'Clans' is more precise than the broader 'families.'
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: '''Cities'' is the standard rendering of עָרִים in allotment lists, even
    when some sites may have been small by modern standards.'
- source_word: וְחַצְרֵיהֶן
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their dependent towns
  lexicon: HALOT
  rationale: חָצֵר in this plural possessive context denotes unwalled dependent settlements
    associated with the cities. 'Villages' is the clearest natural English equivalent.
