id: JOS.13.3
reference: Joshua 13:3
source:
  edition: WLC
  text: מִֽן הַ/שִּׁיח֞וֹר אֲשֶׁ֣ר עַל פְּנֵ֣י מִצְרַ֗יִם וְ/עַ֨ד גְּב֤וּל עֶקְרוֹן֙
    צָפ֔וֹנָ/ה לַֽ/כְּנַעֲנִ֖י תֵּחָשֵׁ֑ב חֲמֵ֣שֶׁת סַרְנֵ֣י פְלִשְׁתִּ֗ים הָ/עַזָּתִ֤י
    וְ/הָ/אַשְׁדּוֹדִי֙ הָ/אֶשְׁקְלוֹנִ֣י הַ/גִּתִּ֔י וְ/הָ/עֶקְרוֹנִ֖י וְ/הָ/עַוִּֽים־׀־׀׃
translation:
  text: 'from the Shihor, which is east of Egypt, as far as the border of Ekron to
    the north—it is counted as Canaanite territory—the five rulers of the Philistines:
    the Gazite, the Ashdodite, the Ashkelonite, the Gittite, and the Ekronite, and
    the Avvim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Brook of Egypt,' if Shihor here is taken as that border waterway.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally 'which is on the face of Egypt.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the five lords of the Philistines.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the Avvites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשִּׁיחוֹר
  chosen: the Shihor
  alternatives:
  - the Shihor River
  - the Brook of Egypt
  lexicon: HALOT
  rationale: A proper place-name is best transliterated rather than interpreted in
    the main text. 'River' is not explicit in the Hebrew here, and 'Brook of Egypt'
    is an interpretive identification better preserved as an alternative.
- source_word: עַל פְּנֵי מִצְרַיִם
  chosen: east of Egypt
  alternatives:
  - before Egypt
  - in front of Egypt
  - facing Egypt
  lexicon: HALOT
  rationale: The idiom literally means 'on the face/front of Egypt' and in this geographical
    context indicates location adjacent to Egypt on its eastern/frontier side. 'East
    of Egypt' communicates the spatial sense in natural English better than the more
    wooden 'before Egypt'.
- source_word: גְּבוּל עֶקְרוֹן צָפוֹנָה
  chosen: the border of Ekron to the north
  alternatives:
  - the territory of Ekron northward
  - the northern border of Ekron
  lexicon: HALOT
  rationale: This preserves the directional ending on צָפוֹנָה ('northward/to the
    north') while keeping גְּבוּל as 'border.' 'Northern border of Ekron' could suggest
    a border belonging to Ekron rather than the northern extent of the region being
    described.
- source_word: לַכְּנַעֲנִי תֵּחָשֵׁב
  chosen: it is counted as Canaanite territory
  alternatives:
  - it is reckoned to the Canaanites
  - it is considered Canaanite
  lexicon: HALOT
  rationale: The Niphal of חשׁב conveys being reckoned/considered. Supplying 'territory'
    makes explicit the geographical referent in idiomatic English without adding doctrinal
    content.
- source_word: חֲמֵשֶׁת סַרְנֵי פְלִשְׁתִּים
  chosen: the five rulers of the Philistines
  alternatives:
  - the five lords of the Philistines
  - the five chiefs of the Philistines
  lexicon: HALOT
  rationale: סֶרֶן refers to the distinctive Philistine political leaders. 'Rulers'
    is clear modern English and avoids the potentially misleading feudal connotations
    of 'lords,' while still conveying authority.
- source_word: הָעַזָּתִי
  chosen: the Gazite
  alternatives:
  - those of Gaza
  - the Gazaite
  lexicon: HALOT
  rationale: A gentilicial form is best represented by an English demonym. 'Gazite'
    is concise and parallels the following forms.
- source_word: הָאַשְׁדּוֹדִי
  chosen: the Ashdodite
  alternatives:
  - those of Ashdod
  lexicon: HALOT
  rationale: Gentilic adjective rendered as a demonym for consistency with the list.
- source_word: הָאֶשְׁקְלוֹנִי
  chosen: the Ashkelonite
  alternatives:
  - those of Ashkelon
  lexicon: HALOT
  rationale: Gentilic adjective rendered as a demonym for consistency with the list.
- source_word: הַגִּתִּי
  chosen: the Gittite
  alternatives:
  - those of Gath
  lexicon: HALOT
  rationale: Gentilic adjective rendered as a demonym for consistency with the list.
- source_word: הָעֶקְרוֹנִי
  chosen: the Ekronite
  alternatives:
  - those of Ekron
  lexicon: HALOT
  rationale: Gentilic adjective rendered as a demonym for consistency with the list.
- source_word: הָעַוִּים
  chosen: the Avvim
  alternatives:
  - the Avvites
  lexicon: HALOT
  rationale: This is an ethnonym/proper people-group name. Transliteration preserves
    the Hebrew form; 'Avvites' is a conventional English alternative worth preserving
    in a footnote.
