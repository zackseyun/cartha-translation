id: JOS.13.21
reference: Joshua 13:21
source:
  edition: WLC
  text: וְ/כֹל֙ עָרֵ֣י הַ/מִּישֹׁ֔ר וְ/כָֽל מַמְלְכ֗וּת סִיחוֹן֙ מֶ֣לֶךְ הָ/אֱמֹרִ֔י
    אֲשֶׁ֥ר מָלַ֖ךְ בְּ/חֶשְׁבּ֑וֹן אֲשֶׁר֩ הִכָּ֨ה מֹשֶׁ֜ה אֹת֣/וֹ וְ/אֶת נְשִׂיאֵ֣י
    מִדְיָ֗ן אֶת אֱוִ֤י וְ/אֶת רֶ֨קֶם֙ וְ/אֶת צ֤וּר וְ/אֶת חוּר֙ וְ/אֶת רֶ֔בַע נְסִיכֵ֣י
    סִיח֔וֹן יֹשְׁבֵ֖י הָ/אָֽרֶץ־׀־־־־־־׃
translation:
  text: 'and all the cities of the plateau, and all the kingdom of Sihon king of the
    Amorites, who reigned in Heshbon, whom Moses struck down—him and the chiefs of
    Midian: Evi, Rekem, Zur, Hur, and Reba, the princes of Sihon, who lived in the
    land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cities of the plain' or 'the towns of the tableland.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'struck'; in this military context, 'struck down' means defeated
      decisively.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew uses two different rank terms: ''chiefs of Midian'' (נְשִׂיאֵי)
      and ''princes of Sihon'' (נְסִיכֵי).'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמִּישֹׁר
  chosen: the cities of the plateau
  alternatives:
  - the cities of the plain
  - the towns of the tableland
  lexicon: HALOT
  rationale: מִישׁוֹר refers to level country/upland plain in Transjordan. 'Plateau'
    best captures the regional topography in readable modern English without flattening
    it to a generic 'plain.'
- source_word: מַמְלְכוּת סִיחוֹן
  chosen: the kingdom of Sihon
  alternatives:
  - the royal domain of Sihon
  lexicon: HALOT
  rationale: מַמְלָכָה/מַמְלְכוּת denotes kingdom or realm. 'Kingdom' is the most
    natural and direct rendering here.
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - the Amorite king
  lexicon: HALOT
  rationale: Construct chain is straightforward. 'King of the Amorites' preserves
    the formal relation and matches the Hebrew syntax.
- source_word: אֲשֶׁר מָלַךְ בְּחֶשְׁבּוֹן
  chosen: who reigned in Heshbon
  alternatives:
  - who ruled in Heshbon
  lexicon: HALOT
  rationale: מָלַךְ is specifically 'reign/be king,' so 'reigned' is preferable to
    the broader 'ruled.'
- source_word: אֲשֶׁר הִכָּה מֹשֶׁה אֹתוֹ
  chosen: whom Moses struck down—him
  alternatives:
  - whom Moses defeated
  - whom Moses struck
  lexicon: HALOT
  rationale: נכה in military context commonly means to strike/defeat/strike down.
    'Struck down' conveys decisive military defeat. The resumptive pronoun אֹתוֹ is
    retained with 'him' for transparency to the Hebrew structure.
- source_word: נְשִׂיאֵי מִדְיָן
  chosen: the chiefs of Midian
  alternatives:
  - the leaders of Midian
  - the princes of Midian
  lexicon: HALOT
  rationale: נָשִׂיא can mean chief, leader, prince. Here 'chiefs' avoids confusion
    with the later distinct term נְסִיכֵי while still conveying rank.
- source_word: אֱוִי וְאֶת רֶקֶם וְאֶת צוּר וְאֶת חוּר וְאֶת רֶבַע
  chosen: Evi, Rekem, Zur, Hur, and Reba
  lexicon: HALOT
  rationale: These are personal names and should be transliterated per project philosophy.
- source_word: נְסִיכֵי סִיחוֹן
  chosen: the princes of Sihon
  alternatives:
  - the anointed ones of Sihon
  - the chieftains of Sihon
  lexicon: HALOT
  rationale: נָסִיךְ commonly denotes prince/ruler. 'Princes' is the most established
    and concise rendering. It is kept distinct from נְשִׂיאֵי by rendering the earlier
    term as 'chiefs.'
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: who lived in the land
  alternatives:
  - who dwelt in the land
  - inhabitants of the land
  lexicon: HALOT
  rationale: The participle from ישׁב denotes dwelling/inhabiting. 'Who lived in the
    land' gives clear modern English while preserving the relative sense.
