id: JOS.13.33
reference: Joshua 13:33
source:
  edition: WLC
  text: וּ/לְ/שֵׁ֨בֶט֙ הַ/לֵּוִ֔י לֹֽא נָתַ֥ן מֹשֶׁ֖ה נַחֲלָ֑ה יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙
    ה֣וּא נַחֲלָתָ֔/ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר לָ/הֶֽם־׃
translation:
  text: But to the tribe of Levi Moses gave no inheritance; the LORD, the God of Israel,
    is their inheritance, just as he spoke to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portion' for 'inheritance' in both occurrences of the Hebrew נַחֲלָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/שֵׁבֶט
  chosen: But to the tribe of
  alternatives:
  - And to the tribe of
  - For the tribe of
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/to the
    tribe of.' In English, 'But to the tribe of' best captures the contrast with the
    preceding tribal allotments in context while remaining close to the Hebrew syntax.
- source_word: הַלֵּוִי
  chosen: Levi
  alternatives:
  - the Levite
  - the Levitical
  lexicon: HALOT
  rationale: With שֵׁבֶט, the phrase denotes the tribal entity, not an individual
    Levite. 'Levi' is the natural English tribal name.
- source_word: לֹא נָתַן מֹשֶׁה
  chosen: Moses gave no
  alternatives:
  - Moses did not give
  - Moses had not given
  lexicon: HALOT
  rationale: The Hebrew states straightforward past action. 'Gave no' is idiomatic
    with the following direct object 'inheritance' and preserves the negation cleanly.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - portion
  - heritage
  - allotment
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly refers to a territorial inheritance/allotment.
    'Inheritance' preserves the covenantal and land-distribution sense and also matches
    the second occurrence in the verse for consistency.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: This construct phrase is most naturally rendered 'the God of Israel'
    in readable modern English while preserving the covenantal identification.
- source_word: הוּא נַחֲלָתָם
  chosen: is their inheritance
  alternatives:
  - he is their inheritance
  - is their portion
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew for emphasis. English does not require
    repeating 'he' after the appositional subject phrase 'the LORD, the God of Israel';
    'is their inheritance' communicates the predication naturally. 'Inheritance' is
    retained for consistency with נַחֲלָה earlier in the verse.
- source_word: כַּאֲשֶׁר דִּבֶּר לָהֶם
  chosen: just as he spoke to them
  alternatives:
  - as he had spoken to them
  - just as he promised them
  - as he said to them
  lexicon: HALOT
  rationale: דבר means 'speak/say.' 'Just as he spoke to them' stays close to the
    Hebrew without importing the stronger interpretive nuance 'promised,' though the
    context does involve divine commitment.
