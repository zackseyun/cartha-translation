theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nature of Levi's 'inheritance'
  chosen_reading: Retain the metaphor/theological claim that the LORD himself is their
    inheritance
  alternative_readings:
  - the LORD is their portion
  rationale: The Hebrew explicitly identifies the LORD as Levi's inheritance rather
    than merely saying Levi received priestly privileges. The translation preserves
    this theological tension and covenantal language without reduction or paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
