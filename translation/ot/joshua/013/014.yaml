id: JOS.13.14
reference: Joshua 13:14
source:
  edition: WLC
  text: רַ֚ק לְ/שֵׁ֣בֶט הַ/לֵּוִ֔י לֹ֥א נָתַ֖ן נַחֲלָ֑ה אִשֵּׁ֨י יְהוָ֜ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ ה֣וּא נַחֲלָת֔/וֹ כַּ/אֲשֶׁ֖ר דִּבֶּר לֽ/וֹ־׃ס
translation:
  text: Only to the tribe of Levi he gave no inheritance; the offerings by fire to Yahweh, the God of Israel, are his inheritance, as he spoke to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the offerings made by fire to the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Some understand this in light of nearby passages as 'the LORD, the God of Israel, is his inheritance.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But
  - Except that
  lexicon: HALOT
  rationale: Marks an exception to the preceding distribution of land; 'Only' is concise and natural in English while preserving the restrictive force.
- source_word: לְשֵׁבֶט הַלֵּוִי
  chosen: to the tribe of Levi
  alternatives:
  - for the tribe of Levi
  lexicon: HALOT
  rationale: The preposition ל with 'tribe' is naturally rendered 'to' in this verbal construction ('gave to'). 'Levi' is transliterated as a personal/tribal name.
- source_word: לֹא נָתַן נַחֲלָה
  chosen: he gave no inheritance
  alternatives:
  - he did not give an inheritance
  - he assigned no inheritance
  lexicon: HALOT
  rationale: A straightforward rendering of the negated verb plus object. 'Inheritance' fits the land-allotment context better than broader terms like 'possession.'
- source_word: אִשֵּׁי יְהוָה
  chosen: the food offerings of the LORD
  alternatives:
  - the offerings made by fire to the LORD
  - the LORD's fire offerings
  lexicon: HALOT
  rationale: אִשֵּׁי literally refers to offerings by fire, but in idiomatic modern English 'food offerings' communicates the sacrificial provision without implying the offerings themselves are the inheritance in a crude material sense. The more formal 'offerings made by fire' is preserved as an alternative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's required default rendering for the divine name.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English; appositional to 'the LORD.'
- source_word: הוּא נַחֲלָתוֹ
  chosen: are his inheritance
  alternatives:
  - they are his inheritance
  - he is his inheritance
  lexicon: HALOT
  rationale: Although הוּא is singular, the predicate refers back to the plural sacrificial provisions conceptually. English idiom prefers plural agreement with 'food offerings.' Some translations construe the LORD himself as the inheritance from related passages, but in this verse the nearest antecedent is 'the food offerings of the LORD.'
- source_word: כַּאֲשֶׁר דִּבֶּר לוֹ
  chosen: as he spoke to him
  alternatives:
  - as he had spoken to him
  - as he promised him
  lexicon: HALOT
  rationale: Keeps the verbal idea 'spoke' rather than interpretive 'promised.' The perfect can be rendered simply in English narrative style. The singular pronoun is retained, likely referring corporately to Levi/the tribe.
