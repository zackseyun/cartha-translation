theological_decisions:
- issue: Nature of Levi's inheritance
  chosen_reading: the food offerings of the LORD ... are his inheritance
  alternative_readings:
  - the LORD himself is his inheritance
  rationale: This verse explicitly places 'the food offerings of the LORD, the God of Israel' before 'he/they are his inheritance,' so the main text should reflect the immediate syntax rather than harmonize to nearby verses that say 'the LORD is his inheritance.' The alternative is worth preserving because of the broader canonical context and common translation tradition.
  doctrine_reference: Preserve theological tension rather than resolve it.
