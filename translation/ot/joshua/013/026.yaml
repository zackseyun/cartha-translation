id: JOS.13.26
reference: Joshua 13:26
source:
  edition: WLC
  text: וּ/מֵ/חֶשְׁבּ֛וֹן עַד רָמַ֥ת הַ/מִּצְפֶּ֖ה וּ/בְטֹנִ֑ים וּ/מִֽ/מַּחֲנַ֖יִם
    עַד גְּב֥וּל לִדְבִֽר־־׃
translation:
  text: and from Heshbon to Ramath-mizpeh and Betonim, and from Mahanaim to the border
    of Debir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the border toward Debir.' The Hebrew construction can be rendered
      more literally with directional force, but 'the border of Debir' is smoother
      in English and fits the territorial-list context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/חֶשְׁבּוֹן
  chosen: and from Heshbon
  alternatives:
  - from Heshbon
  lexicon: HALOT
  rationale: The prefixed conjunction ו plus preposition מִן yields 'and from.' חֶשְׁבּוֹן
    is a place name, so it is transliterated as 'Heshbon' per the translation philosophy
    for names.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: In boundary descriptions עַד commonly marks extent. 'To' is the most
    natural concise English rendering here.
- source_word: רָמַת הַמִּצְפֶּה
  chosen: Ramath-mizpeh
  alternatives:
  - the height of Mizpeh
  - Ramath of the Watchtower
  lexicon: HALOT
  rationale: This is a toponym composed of רָמַת ('height of') and הַמִּצְפֶּה ('the
    watchpoint/watchtower'). Because it functions as a place name in a territorial
    list, transliteration is preferable to a fully translated title.
- source_word: וּ/בְטֹנִים
  chosen: and Betonim
  alternatives:
  - and Betonim
  lexicon: HALOT
  rationale: Proper place name with prefixed conjunction. Standard transliteration
    retained.
- source_word: וּ/מִֽ/מַּחֲנַיִם
  chosen: and from Mahanaim
  alternatives:
  - from Mahanaim
  lexicon: HALOT
  rationale: Conjunction plus preposition plus place name. Mahanaim is transliterated
    as a proper noun.
- source_word: גְּב֥וּל
  chosen: the border
  alternatives:
  - the territory
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל in allotment contexts denotes a territorial boundary or border.
    'Border' fits the geographic sense well in modern English.
- source_word: לִדְבִר
  chosen: of Debir
  alternatives:
  - to Debir
  lexicon: HALOT
  rationale: After גְּבוּל, the lamed with a place name is idiomatically rendered
    in English as a genitival relation, 'the border of Debir,' rather than the less
    natural 'border to Debir.'
