id: JOS.13.4
reference: Joshua 13:4
source:
  edition: WLC
  text: מִ/תֵּימָ֞ן כָּל אֶ֣רֶץ הַֽ/כְּנַעֲנִ֗י וּ/מְעָרָ֛ה אֲשֶׁ֥ר לַ/צִּידֹנִ֖ים
    עַד אֲפֵ֑קָ/ה עַ֖ד גְּב֥וּל הָ/אֱמֹרִֽי־־׃
translation:
  text: from the south, all the land of the Canaanites, and Mearah that belongs to
    the Sidonians, as far as Aphek, to the border of the Amorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the cave that belongs to the Sidonians,' if מְעָרָה is taken as
      a common noun rather than a place-name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Canaanite' and 'the Amorite' use singular ethnic forms with
      collective force; English renders them as collectives.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתֵּימָן
  chosen: from the south
  alternatives:
  - from Teman
  - southward
  lexicon: HALOT
  rationale: The noun תֵּימָן commonly denotes the south/southland. In this territorial
    list, a directional/geographical sense fits best. 'From Teman' would suggest a
    place-name, but the context here is regional extent, so 'from the south' is preferred.
- source_word: כָּל אֶרֶץ הַכְּנַעֲנִי
  chosen: all the land of the Canaanites
  alternatives:
  - all the land of the Canaanite
  - the whole land of Canaan
  lexicon: HALOT
  rationale: The construct phrase literally reads 'all the land of the Canaanite.'
    In English, the collective ethnic sense is best represented by the plural 'Canaanites.'
    'Land of Canaan' is smoother but slightly less transparent to the Hebrew ethnic
    expression.
- source_word: וּמְעָרָה
  chosen: and Mearah
  alternatives:
  - and the cave
  - and Mearah
  lexicon: HALOT
  rationale: Although the form is related to a noun meaning 'cave,' in this context
    it is best taken as a place-name, as reflected by the syntax of the territorial
    list and many translations. Transliteration preserves the likely toponym without
    overinterpreting it as a common noun.
- source_word: אֲשֶׁר לַצִּידֹנִים
  chosen: that belongs to the Sidonians
  alternatives:
  - which is of the Sidonians
  - which belongs to the Zidonians
  lexicon: HALOT
  rationale: The phrase identifies Mearah as pertaining to or possessed by the Sidonians.
    'Belongs to' is natural modern English and preserves the possessive force of ל.
- source_word: עַד אֲפֵקָה
  chosen: as far as Aphek
  alternatives:
  - to Aphek
  lexicon: HALOT
  rationale: עַד marks extent up to a boundary point. 'As far as Aphek' clearly conveys
    territorial reach. The directional suffix on the place-name does not require a
    distinct English rendering beyond destination/extent.
- source_word: עַד גְּבוּל הָאֱמֹרִי
  chosen: to the border of the Amorites
  alternatives:
  - as far as the territory of the Amorites
  - to the boundary of the Amorite
  lexicon: HALOT
  rationale: גְּבוּל denotes border/boundary/territory. 'Border' is the most straightforward
    in a land-description context. 'Amorites' renders the ethnic collective naturally
    in English.
