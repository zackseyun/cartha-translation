theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is explicitly filial and masculine plural. In keeping with
    the project's gender-accurate principle, the main text preserves 'sons of Israel'
    rather than neutralizing it, while still using natural English elsewhere.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering נַחֲלָה in land-allotment context
  chosen_reading: inheritance
  alternative_readings:
  - possession
  - heritage
  rationale: The land is presented not merely as territory but as covenantally granted
    inheritance. 'Inheritance' preserves that theological and legal nuance without
    importing extra doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
