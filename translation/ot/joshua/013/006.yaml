id: JOS.13.6
reference: Joshua 13:6
source:
  edition: WLC
  text: כָּל יֹשְׁבֵ֣י הָ֠/הָר מִֽן הַ/לְּבָנ֞וֹן עַד מִשְׂרְפֹ֥ת מַ֨יִם֙ כָּל צִ֣ידֹנִ֔ים
    אָֽנֹכִי֙ אוֹרִישֵׁ֔/ם מִ/פְּנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל רַ֠ק הַפִּלֶ֤/הָ לְ/יִשְׂרָאֵל֙
    בְּֽ/נַחֲלָ֔ה כַּ/אֲשֶׁ֖ר צִוִּיתִֽי/ךָ־־־־׃
translation:
  text: All the inhabitants of the hill country from Lebanon to Misrephoth-maim, all
    the Sidonians—I myself will drive them out before the sons of Israel. Only allot
    it to Israel as an inheritance, as I have commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Misrephoth-maim is a place name; the name may mean something like 'burnings
      of water,' but its exact sense is uncertain.
    reason: cultural_note
  - marker: b
    text: Or 'I will dispossess them before the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'allot it' reflects the idiom of assigning land, often by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי הָהָר
  chosen: the inhabitants of the hill country
  alternatives:
  - those dwelling in the mountain
  - the inhabitants of the mountain country
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial construct meaning 'inhabitants/those dwelling,'
    and הָהָר in territorial contexts often refers to the hill country rather than
    a single mountain. 'Hill country' is natural English and fits the geographic sense.
- source_word: מִן הַלְּבָנוֹן עַד מִשְׂרְפֹת מַיִם
  chosen: from Lebanon to Misrephoth-maim
  alternatives:
  - from Lebanon as far as Misrephoth-maim
  lexicon: HALOT
  rationale: Lebanon is a place name and is transliterated by standard convention.
    מִשְׂרְפֹת מַיִם is also treated as a place name in context, so transliteration
    is preferable in the main text rather than a speculative meaning-based rendering.
- source_word: כָּל צִידֹנִים
  chosen: all the Sidonians
  alternatives:
  - all Sidonians
  - all the people of Sidon
  lexicon: HALOT
  rationale: The phrase denotes the Sidonian population collectively. 'All the Sidonians'
    preserves the distributive force of כָּל and the ethnic/geographic designation.
- source_word: אָנֹכִי אוֹרִישֵׁם
  chosen: I myself will drive them out
  alternatives:
  - I will dispossess them
  - I will cause them to be driven out
  lexicon: HALOT
  rationale: The independent pronoun אָנֹכִי adds emphasis, reflected by 'I myself.'
    The Hiphil of ירשׁ here means to dispossess or drive out inhabitants from the
    land. 'Drive them out' is idiomatic and contextually clear.
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - from before the sons of Israel
  - before the Israelites
  lexicon: HALOT
  rationale: Literally 'from before the sons of Israel,' an idiom meaning removal
    in Israel's presence/advance. 'Before the sons of Israel' keeps the Hebrew relational
    imagery while remaining understandable. 'Sons of Israel' is retained for gender-accurate
    consistency with the source and common covenantal usage.
- source_word: רַק
  chosen: Only
  alternatives:
  - Nevertheless
  - Just
  lexicon: HALOT
  rationale: 'רַק marks limitation or exception: despite God''s promise to drive them
    out, Joshua must still perform the allotment. ''Only'' captures that restrictive
    force well.'
- source_word: הַפִּלֶהָ
  chosen: allot it
  alternatives:
  - divide it
  - cause it to fall
  lexicon: HALOT
  rationale: From נפל in the causative idiom of causing lots to fall, hence 'allot/divide
    by lot.' Since the direct object suffix is feminine singular, it refers to the
    land. 'Allot it' communicates the land-distribution sense without over-specifying
    the mechanism in the main text.
- source_word: לְיִשְׂרָאֵל בְּנַחֲלָה
  chosen: to Israel as an inheritance
  alternatives:
  - for Israel as a possession
  - to Israel for an inheritance
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inherited possession, especially covenant land
    allotment. 'As an inheritance' preserves that theological-land tenure nuance better
    than the flatter 'possession.'
- source_word: כַּאֲשֶׁר צִוִּיתִיךָ
  chosen: as I have commanded you
  alternatives:
  - just as I commanded you
  lexicon: HALOT
  rationale: The perfect verb refers to prior divine instruction already given to
    Joshua. English present perfect naturally conveys that prior command with continuing
    relevance.
