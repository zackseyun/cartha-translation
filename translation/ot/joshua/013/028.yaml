id: JOS.13.28
reference: Joshua 13:28
source:
  edition: WLC
  text: זֹ֛את נַחֲלַ֥ת בְּנֵי גָ֖ד לְ/מִשְׁפְּחֹתָ֑/ם הֶ/עָרִ֖ים וְ/חַצְרֵי/הֶֽם־׃
translation:
  text: This was the inheritance of the sons of Gad according to their clans—the cities
    and their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the inheritance of the sons of Gad according to their clans,
      the cities and their villages.' The Hebrew summary formula can be rendered with
      either present or past sense in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the territorial allotment
    just described. English past tense is natural in this summary formula after the
    preceding description, though a present-tense rendering is possible.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inherited portion or allotted possession,
    especially in land-distribution contexts. 'Inheritance' best preserves the covenantal-land
    nuance in Joshua.
- source_word: בְּנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the people of Gad
  - the descendants of Gad
  lexicon: HALOT
  rationale: Formal tribal designation. 'Sons of Gad' is more source-near and preserves
    the genealogical idiom; it refers to the tribe descended from Gad.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: The prefixed ל marks distribution/classification, and מִשְׁפָּחוֹת refers
    to clan-level family groupings within the tribe. 'According to their clans' is
    idiomatic and precise.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עָרִים is the standard term for settled urban places in allotment lists.
    'Cities' is the conventional and sufficiently accurate rendering here.
- source_word: וְחַצְרֵיהֶם
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their encampments
  lexicon: HALOT
  rationale: חָצֵר in territorial formulas often denotes dependent rural settlements
    associated with a city. 'Villages' best communicates the relationship in natural
    English, more clearly than the more literal but less transparent 'settlements'
    or 'hamlets'.
