id: JOS.21.25
reference: Joshua 21:25
source:
  edition: WLC
  text: וּ/מִֽ/מַּחֲצִית֙ מַטֵּ֣ה מְנַשֶּׁ֔ה אֶת תַּעְנַךְ֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת
    גַּת רִמּ֖וֹן וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים שְׁתָּֽיִם־־־־־׃
translation:
  text: 'And from the half-tribe of Manasseh: Taanach with its pasturelands, and Gath-rimmon
    with its pasturelands—two cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some Hebrew manuscripts and the parallel in 1 Chronicles 6:70 differ in
      the names of the towns assigned from Manasseh.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִֽ/מַּחֲצִית
  chosen: And from the half-
  alternatives:
  - And from half of the
  - And from the half of
  lexicon: HALOT
  rationale: 'The preposition מִן with מַחֲצִית introduces the source allotment: ''from
    the half of.'' In English, ''from the half-'' is smoothed into the compound expression
    ''from the half-tribe'' with the following noun for natural readability while
    preserving the distributive sense.'
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In territorial/allotment contexts מַטֶּה denotes a tribal unit, not a
    literal staff. 'Tribe' is the standard contextual sense here.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper tribal name, transliterated according to standard English convention.
- source_word: תַּעְנַךְ
  chosen: Taanach
  alternatives:
  - Ta'anach
  rationale: Place name transliterated in standard English form. The city is listed
    as one of the Levitical towns.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding pastureland
  - its common-land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pasture area belonging to a town. 'Pasturelands'
    is clear modern English and fits the repeated formula in Joshua's town lists.
    The 3fs suffix is rendered 'its,' referring to each city.
- source_word: גַּת רִמּוֹן
  chosen: Gath-rimmon
  alternatives:
  - Gath Rimmon
  rationale: Compound place name transliterated in conventional English form with
    hyphenation for readability.
- source_word: עָרִים שְׁתָּיִם
  chosen: two cities
  alternatives:
  - two towns
  lexicon: HALOT
  rationale: This closing summary counts the listed settlements. 'Cities' is conventional
    in English Bible style for עָרִים in allotment lists, though these were not necessarily
    large urban centers.
