id: JOS.21.31
reference: Joshua 21:31
source:
  edition: WLC
  text: אֶת חֶלְקָת֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת רְחֹ֖ב וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים
    אַרְבַּֽע־־־־׃ס
translation:
  text: Helkath with its pasturelands, and Rehob with its pasturelands—four cities.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חֶלְקָת
  chosen: Helkath
  alternatives:
  - Helqath
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    policy for names. English convention commonly gives 'Helkath.'
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding landlands
  - its open land
  lexicon: HALOT
  rationale: Refers to the land attached to a town for grazing/use, not the city proper.
    'Pasturelands' is idiomatic and fits Levitical-city contexts better than the archaic
    'suburbs' or the less specific 'surrounding lands.' The 3fs suffix refers to each
    city.
- source_word: רְחֹב
  chosen: Rehob
  alternatives:
  - Rechob
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention as 'Rehob.'
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Straightforward numeral phrase summarizing the total listed in this verse
    and the preceding one. 'Cities' matches the standard rendering of עִיר in allotment
    lists.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  chosen: with ... and ... with ...
  alternatives:
  - namely ... and ...
  - — ... and ...
  lexicon: Hebrew grammar
  rationale: The repeated object marker simply marks the items in the list and is
    not translated directly into English. 'With' naturally conveys the appurtenant
    pasturelands attached to each named city.
