id: JOS.21.35
reference: Joshua 21:35
source:
  edition: WLC
  text: אֶת דִּמְנָה֙ וְ/אֶת מִגְרָשֶׁ֔/הָ אֶֽת נַהֲלָ֖ל וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים
    אַרְבַּֽע־־־־׃
translation:
  text: Dimnah with its pasturelands, and Nahalal with its pasturelands—four cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew manuscripts and ancient versions differ on the inclusion and arrangement
      of some city names in this section; compare the parallel list in 1 Chronicles
      6:62 [English 6:77].
    reason: textual_variant
  - marker: b
    text: Or 'common lands' for 'pasturelands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּמְנָה
  chosen: Dimnah
  alternatives:
  - Dimnahh
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. English convention favors 'Dimnah.'
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pasture area belonging to a town. 'Pasturelands'
    is clear modern English and fits the Levitical-city context better than the less
    transparent 'common land.' The 3fs suffix is rendered as 'its,' referring to each
    city.
- source_word: נַהֲלָל
  chosen: Nahalal
  alternatives:
  - Nahallal
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention. Alternate
    spelling reflects a different way of representing the doubled consonant, but 'Nahalal'
    is the more familiar form.
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Straightforward numeral + noun summary formula concluding the list. 'Cities'
    is the standard rendering of עָרִים in Joshua's allotment lists and preserves
    consistency.
