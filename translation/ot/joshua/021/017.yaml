id: JOS.21.17
reference: Joshua 21:17
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה בִנְיָמִ֔ן אֶת גִּבְע֖וֹן וְ/אֶת מִגְרָשֶׁ֑/הָ אֶת גֶּ֖בַע
    וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־׃
translation:
  text: 'and from the tribe of Benjamin: Gibeon with its pasturelands, and Geba with
    its pasturelands;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'open land' for the land surrounding each city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  chosen: and from the tribe of
  alternatives:
  - and from the staff of
  - and from the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts means 'tribe.' The prefixed conjunction
    and preposition are carried over as 'and from,' linking this verse to the preceding
    list.
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: אֶת גִּבְעוֹן
  chosen: Gibeon
  lexicon: HALOT
  rationale: Direct-object marker is not represented in English; the place name is
    transliterated conventionally.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding land
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the land around a Levitical city used as open pasture/common
    land. 'Pasturelands' is a clear, natural rendering in this allotment context and
    fits the plural form with 3fs suffix, 'her/its pasturelands,' referring to the
    city.
- source_word: גֶּבַע
  chosen: Geba
  lexicon: HALOT
  rationale: Place name, conventionally transliterated as 'Geba.'
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - with
  lexicon: HALOT
  rationale: The conjunction links the listed cities. English supplies 'with' before
    'its pasturelands' for idiomatic coordination, but the core connective is 'and'.
