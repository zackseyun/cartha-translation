id: JOS.21.45
reference: Joshua 21:45
source:
  edition: WLC
  text: לֹֽא נָפַ֣ל דָּבָ֔ר מִ/כֹּל֙ הַ/דָּבָ֣ר הַ/טּ֔וֹב אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה אֶל בֵּ֣ית יִשְׂרָאֵ֑ל הַ/כֹּ֖ל בָּֽא־־־׃פ
translation:
  text: Not one word failed from all the good word that Yahweh had spoken to the house of Israel; all of it came to pass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Not one promise failed from all the good promise that the LORD had spoken to the house of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: Not
  alternatives:
  - 'No'
  lexicon: HALOT
  rationale: Standard negation introducing the clause. 'Not one...' is idiomatic English when paired with the following singular noun.
- source_word: נָפַל
  chosen: failed
  alternatives:
  - fell
  - came short
  lexicon: HALOT
  rationale: Literally 'fell,' but in this idiom with דָּבָר it means that a promise did not fail or fall to the ground. 'Failed' best conveys the sense in clear modern English without over-paraphrase.
- source_word: דָּבָר
  chosen: word
  alternatives:
  - thing
  - matter
  - promise
  lexicon: HALOT
  rationale: The noun can mean 'word,' 'matter,' or 'thing.' Here, because YHWH is the speaker and the verse concerns fulfillment of what he said, 'word' preserves the verbal connection to דִּבֶּר ('had spoken'). 'Promise' is interpretive and therefore left as an alternative rather than used in the main text.
- source_word: מִכֹּל
  chosen: from all
  alternatives:
  - of all
  - out of all
  lexicon: HALOT
  rationale: 'The preposition marks separation: not one word failed ''from/out of'' the totality. In idiomatic English, ''from all'' works with the following phrase and preserves the Hebrew structure reasonably closely.'
- source_word: הַדָּבָר הַטּוֹב
  chosen: the good word
  alternatives:
  - the good thing
  - the good promise
  lexicon: HALOT
  rationale: Singular collective expression referring to the totality of YHWH's favorable declarations. 'The good word' keeps the lexical link with both occurrences of דָּבָר and avoids importing the more interpretive 'promise' into the main text.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that ... had spoken
  alternatives:
  - which ... spoke
  - that ... promised
  lexicon: HALOT
  rationale: Relative clause with perfect verb referring to prior divine speech. 'Had spoken' is natural English in context and maintains the speech emphasis.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל בֵּית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel
  - to the people of Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is the formal covenantal expression in the Hebrew. Retaining it preserves the source texture and corporate sense better than flattening it to simply ''Israel.'''
- source_word: הַכֹּל
  chosen: all of it
  alternatives:
  - the whole
  - all
  lexicon: HALOT
  rationale: Resumptive summary of the preceding totality. 'All of it' is idiomatic and clearly refers back to the entirety of what the LORD had spoken.
- source_word: בָּא
  chosen: came to pass
  alternatives:
  - came
  - happened
  - was fulfilled
  lexicon: HALOT
  rationale: Literally 'came,' but in context the idiom denotes fulfillment. 'Came to pass' is a natural and accurate English rendering here; 'was fulfilled' is also possible but slightly more interpretive than the Hebrew idiom.
