theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render דָּבָר as 'word' or the more interpretive 'promise'
  chosen_reading: word
  alternative_readings:
  - promise
  rationale: The verse emphasizes that what the LORD spoke did not fail and came to pass. 'Word' preserves the lexical repetition and allows the fulfillment sense to emerge from the whole clause rather than from an interpretive gloss. 'Promise' is a valid contextual inference and is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
