id: JOS.21.36
reference: Joshua 21:36
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה רְאוּבֵ֔ן אֶת בֶּ֖צֶר וְ/אֶת מִגְרָשֶׁ֑/הָ וְ/אֶת יַ֖הְצָ/ה
    וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־׃
translation:
  text: 'And from the tribe of Reuben: Bezer with its pasturelands, and Jahaz with
    its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jahaz is also spelled Jahzah or Jahazah in English translations.
    reason: lexical_alternative
  - marker: b
    text: Some Hebrew manuscripts and ancient witnesses omit Joshua 21:36–37; the
      cities listed here parallel 1 Chronicles 6:78–79.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  chosen: And from the tribe of
  alternatives:
  - And from the stock of
  - And from the branch of
  lexicon: HALOT
  rationale: מִן + מַטֶּה in tribal allotment contexts refers to membership/source
    from a tribe. 'And from the tribe of' is the natural English rendering in this
    distribution list.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: אֶת בֶּצֶר
  chosen: Bezer
  rationale: Direct-object marker plus place name. The marker is not represented in
    English; the city name is transliterated.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ in Levitical-city and allotment contexts denotes the open land/common
    pasture around a city. 'Pasturelands' is clear modern English and fits the plural
    form with 3fs suffix referring to the city.
- source_word: יַהְצָה
  chosen: Jahaz
  alternatives:
  - Jahzah
  - Jahazah
  rationale: Place name with directional/paragogic ending in the Hebrew form. English
    convention commonly renders the city name as 'Jahaz'; alternative traditional
    spellings are worth preserving in a footnote.
