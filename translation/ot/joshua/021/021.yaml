id: JOS.21.21
reference: Joshua 21:21
source:
  edition: WLC
  text: וַ/יִּתְּנ֨וּ לָ/הֶ֜ם אֶת עִ֨יר מִקְלַ֧ט הָ/רֹצֵ֛חַ אֶת שְׁכֶ֥ם וְ/אֶת מִגְרָשֶׁ֖/הָ
    בְּ/הַ֣ר אֶפְרָ֑יִם וְ/אֶת גֶּ֖זֶר וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־־׃
translation:
  text: They gave them Shechem with its pasturelands in the hill country of Ephraim—the
    city of refuge for the manslayer—and Gezer with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the city of refuge for the killer.' The Hebrew legal
      term here refers to one who has caused a death and may flee for asylum pending
      judgment, not necessarily a convicted murderer.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Mount Ephraim'; that is, the hill country of Ephraim.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: They gave
  alternatives:
  - And they gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן, standard narrative past. English omits the conjunction
    for natural style while preserving the sequential sense.
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: Indirect object referring to the Levites in context; straightforward
    pronominal rendering.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  chosen: the city of refuge for the manslayer
  alternatives:
  - the city of refuge for the murderer
  - a refuge city for the killer
  lexicon: HALOT
  rationale: Construct chain literally 'city of refuge of the killer/slayer.' In legal
    contexts רצח commonly refers to one who kills a person, especially in the asylum
    legislation distinguishing accidental killing from murder. 'Manslayer' best fits
    the technical sense without importing guilt of murder.
- source_word: שְׁכֶם
  chosen: Shechem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding pasturelands
  - its common land
  lexicon: HALOT
  rationale: Refers to the open land attached to a town for grazing/use. 'Pasturelands'
    is the clearest natural rendering in Joshua's town lists.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in Mount Ephraim
  lexicon: HALOT
  rationale: הַר with a tribal region commonly denotes the hill country, not a single
    mountain. This is standard geographic English.
- source_word: גֶּזֶר
  chosen: Gezer
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
