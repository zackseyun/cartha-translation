id: JOS.21.13
reference: Joshua 21:13
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֣י אַהֲרֹ֣ן הַ/כֹּהֵ֗ן נָֽתְנוּ֙ אֶת עִיר֙ מִקְלַ֣ט הָ/רֹצֵ֔חַ אֶת
    חֶבְר֖וֹן וְ/אֶת מִגְרָשֶׁ֑/הָ וְ/אֶת לִבְנָ֖ה וְ/אֶת מִגְרָשֶֽׁ/הָ׀־־־־־׃
translation:
  text: And to the sons of Aaron the priest they gave Hebron, the city of refuge for
    the manslayer, with its pasturelands, and Libnah with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city of refuge for the killer/slayer.' The Hebrew term here is the
      legal term for one who has caused a death and may flee to a refuge city; 'manslayer'
      best preserves that nuance without implying premeditated murder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי
  chosen: And to the sons of
  alternatives:
  - And for the sons of
  - And to the descendants of
  lexicon: HALOT
  rationale: The preposition ל marks indirect object ('to/for'), and בנים in construct
    with a personal name commonly means 'sons of' or descendants. 'Sons of' preserves
    the Hebrew form and fits the priestly lineage context.
- source_word: אַהֲרֹן הַכֹּהֵן
  chosen: Aaron the priest
  alternatives:
  - Aaron the priestly one
  lexicon: HALOT
  rationale: Appositional phrase identifying Aaron by office. 'The priest' is the
    natural English rendering and preserves the formal designation.
- source_word: נָתְנוּ
  chosen: they gave
  alternatives:
  - they assigned
  - they granted
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' In this allotment context 'assigned'
    is possible, but 'gave' stays closer to the source while remaining clear.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  chosen: the city of refuge for the manslayer
  alternatives:
  - the refuge city for the killer
  - the city of asylum for the slayer
  lexicon: HALOT
  rationale: Construct chain literally 'city of refuge of/for the killer/manslayer.'
    'City of refuge' is the established legal term in Joshua, and רֹצֵחַ in this context
    refers to one who kills a person and may flee there, not necessarily a premeditated
    murderer. 'Manslayer' best preserves that legal nuance.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding pasturelands
  - its common-land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pasture area belonging to a town.
    'Pasturelands' is clear modern English and suits the Levitical-city context.
- source_word: לִבְנָה
  chosen: Libnah
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
