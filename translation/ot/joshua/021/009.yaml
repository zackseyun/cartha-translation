id: JOS.21.9
reference: Joshua 21:9
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֗וּ מִ/מַּטֵּה֙ בְּנֵ֣י יְהוּדָ֔ה וּ/מִ/מַּטֵּ֖ה בְּנֵ֣י שִׁמְע֑וֹן
    אֵ֚ת הֶֽ/עָרִ֣ים הָ/אֵ֔לֶּה אֲשֶׁר יִקְרָ֥א אֶתְ/הֶ֖ן בְּ/שֵֽׁם־׃
translation:
  text: 'From the tribe of the sons of Judah and from the tribe of the sons of Simeon
    they gave these cities, which are called by name:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which are designated by name' or 'whose names are specified.' The Hebrew
      expression indicates that the cities are individually named in the following
      list.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: they gave
  alternatives:
  - they assigned
  - they granted
  lexicon: HALOT
  rationale: The verb נתן in this narrative allocation context means 'give' in the
    sense of assigning or granting. 'They gave' is the most direct rendering and fits
    the distribution of Levitical cities in context.
- source_word: מִמַּטֵּה
  chosen: from the tribe of
  alternatives:
  - from the staff of
  - from the branch of
  lexicon: HALOT
  rationale: מַטֶּה can literally mean 'staff,' but in tribal-allotment contexts it
    idiomatically denotes 'tribe.' 'From the tribe of' communicates the referent clearly
    in modern English.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'sons of Judah.' Following the project's
    gender-accurate principle, the familial expression is preserved rather than neutralized
    to 'people,' while still functioning as the standard tribal designation.
- source_word: וּמִמַּטֵּה בְּנֵי שִׁמְעוֹן
  chosen: and from the tribe of the sons of Simeon
  alternatives:
  - and from the tribe of Simeon
  - and from Simeon's tribe
  lexicon: HALOT
  rationale: This mirrors the preceding phrase and preserves the Hebrew parallelism.
    Retaining 'sons of Simeon' keeps consistency with 'sons of Judah.'
- source_word: אֵת הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - the following cities
  - these towns
  lexicon: HALOT
  rationale: The direct-object marker plus noun phrase straightforwardly identifies
    the objects given. 'Cities' is the standard rendering of עָרִים in allotment lists.
- source_word: אֲשֶׁר יִקְרָא אֶתְהֶן בְּשֵׁם
  chosen: which are called by name
  alternatives:
  - which are designated by name
  - whose names are specified
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic and likely means the cities are individually
    named in what follows. Rendering with passive English, 'which are called by name,'
    preserves the sense without over-paraphrasing. The singular verb with plural object
    is retained as a common Hebrew construction rather than emended in translation.
