id: JOS.21.11
reference: Joshua 21:11
source:
  edition: WLC
  text: וַ/יִּתְּנ֨וּ לָ/הֶ֜ם אֶת קִרְיַת֩ אַרְבַּ֨ע אֲבִ֧י הָֽ/עֲנ֛וֹק הִ֥יא חֶבְר֖וֹן
    בְּ/הַ֣ר יְהוּדָ֑ה וְ/אֶת מִגְרָשֶׁ֖/הָ סְבִיבֹתֶֽי/הָ־־׃
translation:
  text: So they gave them Kiriath-arba (Arba was the father of Anak), that is, Hebron,
    in the hill country of Judah, along with its pasturelands around it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Arba, the father/ancestor of Anak.' The Hebrew expression may denote
      immediate fatherhood or a more remote forefather relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: So they gave
  alternatives:
  - And they gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן introduces the next event in sequence. 'So they gave'
    is natural modern English while preserving the narrative progression.
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: Straightforward 3mp pronominal object; the recipients are the Levites
    in context, but the pronoun should remain as in the Hebrew rather than being expanded
    in the verse text.
- source_word: קִרְיַת אַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - Kiriath Arba
  - the city of Arba
  lexicon: HALOT
  rationale: A place name is best transliterated per translation philosophy. The construct
    literally means 'city of Arba,' but as an established toponym it is rendered as
    the standard transliterated form.
- source_word: אֲבִי הָעֲנֹוק
  chosen: Arba was the father of Anak
  alternatives:
  - father of Anak
  - ancestor of Anak
  lexicon: HALOT
  rationale: The Hebrew apposition identifies Arba in relation to Anak. Supplying
    'Arba was' makes the parenthetical English complete. 'Father of Anak' is retained
    rather than the more interpretive 'ancestor,' though the idiom may imply forefather.
- source_word: הִיא חֶבְרוֹן
  chosen: that is, Hebron
  alternatives:
  - it is Hebron
  - namely, Hebron
  lexicon: HALOT
  rationale: The pronoun plus place name functions epexegetically, identifying Kiriath-arba
    with Hebron. 'That is' is idiomatic and clear.
- source_word: בְּהַר יְהוּדָה
  chosen: in the hill country of Judah
  alternatives:
  - in the hill country of Yehudah
  - in the mountains of Judah
  lexicon: HALOT
  rationale: הַר in this territorial expression refers to the upland/hill country
    region, not a single mountain. 'Hill country of Judah' is the standard geographic
    sense.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its grazing lands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land around a town allotted for use, especially
    for grazing. 'Pasturelands' is clear and contextually appropriate.
- source_word: סְבִיבֹתֶיהָ
  chosen: around it
  alternatives:
  - surrounding it
  - all around it
  lexicon: HALOT
  rationale: This term denotes the surrounding area. 'Around it' is concise and natural
    in English, modifying the pasturelands.
