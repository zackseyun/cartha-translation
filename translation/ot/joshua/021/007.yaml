id: JOS.21.7
reference: Joshua 21:7
source:
  edition: WLC
  text: לִ/בְנֵ֨י מְרָרִ֜י לְ/מִשְׁפְּחֹתָ֗/ם מִ/מַּטֵּ֨ה רְאוּבֵ֤ן וּ/מִ/מַּטֵּה
    גָד֙ וּ/מִ/מַּטֵּ֣ה זְבוּלֻ֔ן עָרִ֖ים שְׁתֵּ֥ים עֶשְׂרֵֽה־׃
translation:
  text: 'For the sons of Merari, according to their families, from the tribe of Reuben
    and from the tribe of Gad and from the tribe of Zebulun: twelve cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''To the sons of Merari, by their clans, from the tribe of Reuben, from
      the tribe of Gad, and from the tribe of Zebulun: twelve cities.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  chosen: For the sons of
  alternatives:
  - To the sons of
  - For the descendants of
  lexicon: HALOT
  rationale: The prefixed ל marks assignment/distribution in this allotment context.
    'For the sons of' preserves the formal structure and the familial language of
    בני without over-paraphrasing. 'Descendants' is possible but less direct than
    the Hebrew idiom here.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Proper personal name, transliterated according to the translation philosophy
    for names.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their families
  alternatives:
  - by their clans
  - for their families
  lexicon: HALOT
  rationale: משפחה commonly denotes clan/family grouping. 'According to their families'
    reflects the distributive organizational sense introduced by ל and matches the
    census/allotment style of the passage.
- source_word: מִמַּטֵּה
  chosen: from the tribe of
  alternatives:
  - from the staff of
  - from the branch of
  lexicon: HALOT
  rationale: In tribal-allotment contexts מטה idiomatically means 'tribe.' 'From the
    tribe of' is the clear contextual rendering.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Proper tribal name, transliterated.
- source_word: וּמִמַּטֵּה
  chosen: and from the tribe of
  lexicon: HALOT
  rationale: Same lexical value as the previous occurrence, with conjunction preserved
    for the list structure.
- source_word: גָד
  chosen: Gad
  rationale: Proper tribal name, transliterated.
- source_word: וּמִמַּטֵּה
  chosen: and from the tribe of
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently.
- source_word: זְבוּלֻן
  chosen: Zebulun
  alternatives:
  - Zebulon
  rationale: Standard English transliteration is 'Zebulun'; 'Zebulon' is a known variant
    but less consistent with common Hebrew-based transliteration.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: עיר in allotment lists is conventionally rendered 'city/cities.' 'Towns'
    is possible but 'cities' better matches biblical land-allotment terminology.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  alternatives:
  - twelve in number
  lexicon: HALOT
  rationale: Straightforward cardinal number. Rendered idiomatically in English as
    'twelve' rather than preserving the Hebrew word order.
