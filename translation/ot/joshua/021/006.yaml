id: JOS.21.6
reference: Joshua 21:6
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֣י גֵרְשׁ֗וֹן מִ/מִּשְׁפְּח֣וֹת מַטֵּֽה יִשָּׂשכָ֣ר וּ/מִ/מַּטֵּֽה
    אָ֠שֵׁר וּ/מִ/מַּטֵּ֨ה נַפְתָּלִ֜י וּ֠/מֵ/חֲצִי מַטֵּ֨ה מְנַשֶּׁ֤ה בַ/בָּשָׁן֙
    בַּ/גּוֹרָ֔ל עָרִ֖ים שְׁלֹ֥שׁ עֶשְׂרֵֽה־־׃ס
translation:
  text: And to the sons of Gershon, from the families of the tribe of Issachar, and
    from the tribe of Asher, and from the tribe of Naphtali, and from the half-tribe
    of Manasseh in Bashan, by lot, thirteen cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the clans of the tribe of Issachar.' The Hebrew מִשְׁפָּחוֹת can
      denote extended family groups or clans.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  chosen: And to the sons of
  alternatives:
  - And for the sons of
  - And to the descendants of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are best carried forward as
    'And to,' continuing the allocation list from the previous verse. 'Sons of' is
    a conventional and sufficiently transparent rendering of בנים in genealogical/tribal
    contexts; 'descendants of' is possible but less formally tied to the Hebrew wording.
- source_word: גֵרְשׁוֹן
  chosen: Gershon
  alternatives:
  - Gershom
  lexicon: HALOT
  rationale: The proper name here is the Levitical clan ancestor Gershon. Standard
    English transliteration in this context is 'Gershon.'
- source_word: מִ/מִּשְׁפְּח֣וֹת
  chosen: from the families of
  alternatives:
  - from the clans of
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת can mean extended family groups or clans. 'Families' preserves
    the Hebrew form closely while remaining natural English. 'Clans' is viable, but
    'families' better matches the immediate syntax and common English Bible usage
    here.
- source_word: מַטֵּה
  chosen: tribe of
  alternatives:
  - staff of
  - branch of
  lexicon: HALOT
  rationale: In territorial-allotment contexts מַטֶּה denotes a tribal unit. 'Tribe
    of' is the clear contextual sense.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: וּ/מִ/מַּטֵּה אָשֵׁר
  chosen: and from the tribe of Asher
  alternatives:
  - and from Asher
  lexicon: HALOT
  rationale: The repeated preposition and noun are retained for clarity and to reflect
    the Hebrew list structure.
- source_word: וּ/מִ/מַּטֵּה נַפְתָּלִי
  chosen: and from the tribe of Naphtali
  alternatives:
  - and from Naphtali
  lexicon: HALOT
  rationale: As above, the repeated tribal designation is preserved rather than compressed.
- source_word: וּ֠/מֵ/חֲצִי מַטֵּה מְנַשֶּׁה
  chosen: and from the half-tribe of Manasseh
  alternatives:
  - and from half the tribe of Manasseh
  lexicon: HALOT
  rationale: '''Half-tribe'' is the standard concise rendering for חֲצִי מַטֶּה in
    Joshua and accurately reflects the territorial division of Manasseh.'
- source_word: בַ/בָּשָׁן
  chosen: in Bashan
  alternatives:
  - in the Bashan
  lexicon: HALOT
  rationale: Bashan is a proper regional name; English idiom omits the article.
- source_word: בַּ/גּוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  - by allotment
  lexicon: HALOT
  rationale: The phrase indicates the mode of distribution. 'By lot' is idiomatic
    and faithful; the article in Hebrew need not be reproduced in English.
- source_word: עָרִים שְׁלֹשׁ עֶשְׂרֵה
  chosen: thirteen cities
  alternatives:
  - thirteen towns
  lexicon: HALOT
  rationale: עָרִים commonly denotes cities/towns. 'Cities' is the standard rendering
    in Joshua's allotment lists and fits the formal register of the passage.
