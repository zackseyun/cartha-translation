id: JOS.21.29
reference: Joshua 21:29
source:
  edition: WLC
  text: אֶת יַרְמוּת֙ וְ/אֶת מִגְרָשֶׁ֔/הָ אֶת עֵ֥ין גַּנִּ֖ים וְ/אֶת מִגְרָשֶׁ֑/הָ
    עָרִ֖ים אַרְבַּֽע־־־־׃ס
translation:
  text: Jarmuth with its pasturelands, and En-gannim with its pasturelands—four cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-gannim may also be spelled "Ain-gannim" in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְמוּת
  chosen: Jarmuth
  alternatives:
  - Yarmuth
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention rather
    than translated.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding landlands
  - its open land
  lexicon: HALOT
  rationale: In allotment lists, מִגְרָשׁ refers to the land around a town used as
    open/pasture land. 'Pasturelands' is natural English and fits the settlement context
    better than the less idiomatic 'common land.' The 3fs suffix is rendered 'its,'
    referring to each city.
- source_word: עֵין גַּנִּים
  chosen: En-gannim
  alternatives:
  - Ain-gannim
  - En Gannim
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated. Although the
    components mean 'spring of gardens,' place names are normally kept as names in
    this translation philosophy.
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Standard summary formula in territorial/city lists. 'Cities' is the conventional
    and sufficiently accurate rendering for עָרִים here.
