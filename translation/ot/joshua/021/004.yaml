id: JOS.21.4
reference: Joshua 21:4
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א הַ/גּוֹרָ֖ל לְ/מִשְׁפְּחֹ֣ת הַ/קְּהָתִ֑י וַ/יְהִ֡י לִ/בְנֵי֩ אַהֲרֹ֨ן
    הַ/כֹּהֵ֜ן מִן הַ/לְוִיִּ֗ם מִ/מַּטֵּ֣ה יְ֠הוּדָה וּ/מִ/מַּטֵּ֨ה הַ/שִּׁמְעֹנִ֜י
    וּ/מִ/מַּטֵּ֤ה בִנְיָמִן֙ בַּ/גּוֹרָ֔ל עָרִ֖ים שְׁלֹ֥שׁ עֶשְׂרֵֽה־׃ס
translation:
  text: Then the lot came out for the families of the Kohathites, and for the sons
    of Aaron the priest, from among the Levites, there fell by lot thirteen cities
    from the tribe of Judah, from the tribe of Simeon, and from the tribe of Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lot fell for the families of the Kohathites.' The Hebrew idiom can
      be rendered either 'came out' or 'fell' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא הַגּוֹרָל
  chosen: the lot came out
  alternatives:
  - the lot fell
  - the lot was drawn
  lexicon: HALOT
  rationale: The idiom literally says 'the lot came out.' English can also say 'the
    lot fell,' but 'came out' preserves the concrete imagery of the Hebrew while remaining
    natural enough in context.
- source_word: לְמִשְׁפְּחֹת הַקְּהָתִי
  chosen: for the families of the Kohathites
  alternatives:
  - for the clans of the Kohathites
  - for the families of the Kohathite
  lexicon: HALOT
  rationale: מִשְׁפְּחֹת commonly denotes family groupings or clans. 'Families' is
    retained as a transparent rendering, while 'Kohathites' naturally represents the
    collective descendant group of Kohath.
- source_word: וַיְהִי לִבְנֵי אַהֲרֹן הַכֹּהֵן
  chosen: and for the sons of Aaron the priest, there fell
  alternatives:
  - and it was for the sons of Aaron the priest
  - and the sons of Aaron the priest received
  lexicon: HALOT
  rationale: The clause is elliptical in English if rendered too literally. The supplied
    continuation 'there fell' is drawn from the following בַּגּוֹרָל and reflects
    the sense of allotment without over-paraphrasing. 'Sons of Aaron' preserves the
    Hebrew kinship expression.
- source_word: מִן הַלְוִיִּם
  chosen: from among the Levites
  alternatives:
  - from the Levites
  lexicon: HALOT
  rationale: The phrase identifies the sons of Aaron as a subset within the Levites.
    'From among' makes the partitive force explicit in idiomatic English.
- source_word: מִמַּטֵּה יְהוּדָה וּמִמַּטֵּה הַשִּׁמְעֹנִי וּמִמַּטֵּה בִנְיָמִן
  chosen: from the tribe of Judah, from the tribe of Simeon, and from the tribe of
    Benjamin
  alternatives:
  - out of the tribe of Judah ...
  - from Judah, Simeon, and Benjamin
  lexicon: HALOT
  rationale: מַטֶּה here refers to tribal divisions, not a literal staff. Repeating
    'from the tribe of' reflects the Hebrew repetition and keeps the formal structure
    clear.
- source_word: בַּגּוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  - through the lot
  lexicon: HALOT
  rationale: The prefixed preposition indicates means or manner. 'By lot' is the standard
    and natural English rendering for allocation by casting lots.
- source_word: עָרִים שְׁלֹשׁ עֶשְׂרֵה
  chosen: thirteen cities
  alternatives:
  - thirteen towns
  lexicon: HALOT
  rationale: עָרִים is the normal term for cities/towns. 'Cities' is the more consistent
    formal rendering in territorial allotment contexts.
