id: JOS.21.32
reference: Joshua 21:32
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֨ה נַפְתָּלִ֜י אֶת עִ֣יר מִקְלַ֣ט הָֽ/רֹצֵ֗חַ אֶת קֶ֨דֶשׁ בַּ/גָּלִ֤יל
    וְ/אֶת מִגְרָשֶׁ֨/הָ֙ וְ/אֶת חַמֹּ֥ת דֹּאר֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת קַרְתָּ֖ן
    וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים שָׁלֹֽשׁ־׀־־־־־־׃
translation:
  text: 'And from the tribe of Naphtali: Kedesh in Galilee, the city of refuge for
    the manslayer, with its pasturelands; Hammoth-dor with its pasturelands; and Kartan
    with its pasturelands—three cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city of refuge for the slayer.' The Hebrew term refers to one who
      has killed, especially in the legal context of asylum, not necessarily a premeditated
      murderer.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads Hammoth-dor; some traditions identify the place with Hammath.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִמַּטֵּה נַפְתָּלִי
  chosen: And from the tribe of Naphtali
  alternatives:
  - And from the staff/branch of Naphtali
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts means 'tribe,' not the literal 'staff.'
    The prefixed conjunction and preposition are naturally rendered together as 'And
    from.'
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  chosen: the city of refuge for the manslayer
  alternatives:
  - the refuge city for the killer
  - the city of refuge for the slayer
  lexicon: HALOT
  rationale: עִיר מִקְלַט is the established legal expression 'city of refuge.' הָרֹצֵחַ
    denotes one who kills, especially in the asylum-law context; 'manslayer' preserves
    the legal nuance better than the more morally loaded 'murderer.'
- source_word: קֶדֶשׁ בַּגָּלִיל
  chosen: Kedesh in Galilee
  alternatives:
  - Kedesh in the Galilee
  lexicon: HALOT
  rationale: קֶדֶשׁ is a place name and should be transliterated. בַּגָּלִיל identifies
    its region; 'in Galilee' is idiomatic English.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land belonging to a town, often for grazing.
    'Pasturelands' is clear modern English and fits the repeated formula in Joshua's
    town lists.
- source_word: חַמֹּת דֹּאר
  chosen: Hammoth-dor
  alternatives:
  - Hammoth Dor
  - Hammoth
  lexicon: HALOT
  rationale: The consonantal text presents a compound place name. A hyphenated transliteration
    best reflects the Hebrew form while remaining readable. Some traditions relate
    this to Hammath, but the MT here supports Hammoth-dor.
- source_word: קַרְתָּן
  chosen: Kartan
  alternatives:
  - Kartanah
  lexicon: HALOT
  rationale: This is a place name and is best transliterated directly from the Hebrew
    form in this verse.
- source_word: עָרִים שָׁלֹשׁ
  chosen: three cities
  alternatives:
  - cities, three
  lexicon: HALOT
  rationale: The Hebrew appositional summary at the end is naturally rendered in standard
    English word order as 'three cities.'
