id: JOS.21.3
reference: Joshua 21:3
source:
  edition: WLC
  text: וַ/יִּתְּנ֨וּ בְנֵי יִשְׂרָאֵ֧ל לַ/לְוִיִּ֛ם מִ/נַּחֲלָתָ֖/ם אֶל פִּ֣י יְהוָ֑ה אֶת הֶ/עָרִ֥ים הָ/אֵ֖לֶּה וְ/אֶת מִגְרְשֵׁי/הֶֽן־־־־׃
translation:
  text: So the sons of Israel gave to the Levites, from their inheritance, at the command of Yahweh, these cities and their pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the command of the LORD.' Literally, 'according to the mouth of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: That is, the open land or pasture area belonging to the cities.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: Basic sense of נתן in narrative context is 'give.' 'Assigned' is possible in land-allotment context, but 'gave' stays closer to the Hebrew while remaining natural English.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate policy, the masculine familial expression is preserved rather than flattened to 'Israelites,' though that is a natural alternative.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Straightforward dative recipient; 'Levites' is the standard and accurate rendering of לְוִיִּם.
- source_word: מִנַּחֲלָתָם
  chosen: from their inheritance
  alternatives:
  - from their allotted inheritance
  - out of their inheritance
  lexicon: HALOT
  rationale: נחלה here refers to inherited tribal allotment in the land. 'From their inheritance' is concise and faithful; 'allotted inheritance' makes the land-distribution nuance more explicit but is not necessary in the main text.
- source_word: אֶל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - according to the command of the LORD
  lexicon: HALOT
  rationale: The idiom אֶל־פִּי means 'according to' or 'at the command of.' 'At the command of the LORD' is idiomatic English and preserves the sense of divine authorization. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - the following cities
  - these towns
  lexicon: HALOT
  rationale: Direct rendering of the demonstrative phrase. 'Cities' is the normal gloss for עָרִים in allotment lists; 'the following cities' is interpretive and better left implicit from context.
- source_word: מִגְרְשֵׁיהֶן
  chosen: their pasturelands
  alternatives:
  - their surrounding pasturelands
  - their common lands
  - their open land
  lexicon: HALOT
  rationale: מִגְרָשׁ in priestly/allotment contexts denotes the open land or pasture area belonging to a city. 'Pasturelands' best communicates the practical land-use sense in modern English.
