id: JOS.21.19
reference: Joshua 21:19
source:
  edition: WLC
  text: כָּל עָרֵ֥י בְנֵֽי אַהֲרֹ֖ן הַ/כֹּֽהֲנִ֑ים שְׁלֹשׁ עֶשְׂרֵ֥ה עָרִ֖ים וּ/מִגְרְשֵׁי/הֶֽן־־־׃ס
translation:
  text: All the cities of the sons of Aaron, the priests, were thirteen cities with
    their pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and their pasturelands.' The Hebrew simply joins the phrase with 'and';
      English may render the summary either as 'were thirteen cities with their pasturelands'
      or 'thirteen cities and their pasturelands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: Quantifies the totality of the cities being summarized; 'All' is the
    most natural concise English rendering.
- source_word: עָרֵי
  chosen: cities of
  alternatives:
  - towns of
  lexicon: HALOT
  rationale: עִיר commonly denotes an inhabited settlement; 'cities' is the standard
    rendering in Joshua's allotment lists and preserves consistency.
- source_word: בְנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - the descendants of Aaron
  - the children of Aaron
  lexicon: HALOT
  rationale: Formal familial expression in Hebrew. 'Sons of Aaron' preserves the source
    wording and the priestly lineage reference; 'descendants' is interpretive and
    less literal.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priestly ones
  lexicon: HALOT
  rationale: Appositional identification of the sons of Aaron. 'The priests' is the
    natural and precise English equivalent.
- source_word: שְׁלֹשׁ עֶשְׂרֵה עָרִים
  chosen: thirteen cities
  alternatives:
  - thirteen towns
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun; rendered idiomatically in
    English as 'thirteen cities.'
- source_word: וּמִגְרְשֵׁיהֶן
  chosen: with their pasturelands
  alternatives:
  - and their pasturelands
  - with their common lands
  - with their surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ in these Levitical city contexts refers to the open land/pastureland
    belonging to the city. 'Pasturelands' best captures the functional sense in accessible
    modern English. 'With' smooths the verbless summary construction idiomatically.
