id: JOS.21.18
reference: Joshua 21:18
source:
  edition: WLC
  text: אֶת עֲנָתוֹת֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת עַלְמ֖וֹן וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים
    אַרְבַּֽע־־־־׃
translation:
  text: 'Anathoth with its pasturelands, and Almon with its pasturelands: four cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common land' / 'surrounding land' for 'pasturelands.' The Hebrew term
      denotes the open land belonging to a town.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָתוֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy to transliterate names.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding land
  - its pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ in allotment lists refers to the open land belonging to a town,
    often used for grazing. 'Pasturelands' is a natural English rendering that preserves
    the land-use sense better than the more opaque 'common land.' The 3fs suffix is
    rendered 'its,' referring to each city.
- source_word: עַלְמוֹן
  chosen: Almon
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Straightforward numeral phrase summarizing the listed locations. 'Cities'
    matches the common rendering of עָרִים in territorial and Levitical allotment
    contexts.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  chosen: '[not separately represented in English beyond coordination and direct-object
    structure]'
  lexicon: Hebrew grammar
  rationale: The repeated object marker אֶת has no direct English equivalent; its
    function is reflected by listing the items with 'and.'
