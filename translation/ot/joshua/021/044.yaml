id: JOS.21.44
reference: Joshua 21:44
source:
  edition: WLC
  text: וַ/יָּ֨נַח יְהוָ֤ה לָ/הֶם֙ מִ/סָּבִ֔יב כְּ/כֹ֥ל אֲשֶׁר נִשְׁבַּ֖ע לַ/אֲבוֹתָ֑/ם וְ/לֹא עָ֨מַד אִ֤ישׁ בִּ/פְנֵי/הֶם֙ מִ/כָּל אֹ֣יְבֵי/הֶ֔ם אֵ֚ת כָּל אֹ֣יְבֵי/הֶ֔ם נָתַ֥ן יְהוָ֖ה בְּ/יָדָֽ/ם־־־־׃
translation:
  text: And Yahweh gave them rest all around, according to all that he had sworn to their fathers. Not one man from all their enemies stood before them; Yahweh gave all their enemies into their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No one could stand before them.' The Hebrew idiom 'stand before' means to withstand successfully.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into their hand,' a common idiom for giving someone over to another's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנַח
  chosen: gave ... rest
  alternatives:
  - gave ... relief
  - settled
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to cause rest or give rest. 'Gave them rest' is the most natural English rendering in this covenant-fulfillment context and matches the surrounding conquest-rest theme.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - from around
  lexicon: HALOT
  rationale: The idiom indicates comprehensive security from surrounding threats. 'On every side' is idiomatic modern English and preserves the spatial-total sense.
- source_word: כְּכֹל אֲשֶׁר נִשְׁבַּע
  chosen: according to all that he had sworn
  alternatives:
  - just as he had sworn in every respect
  - in accordance with everything that he swore
  lexicon: HALOT
  rationale: This phrase marks exact fulfillment of the prior oath. 'According to all that he had sworn' preserves both the comparative force of כְּ and the totality of כֹּל.
- source_word: לַאֲבוֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'fathers.' Following the gender-accurate policy, the masculine familial term is retained rather than neutralized, while still naturally referring to the patriarchal ancestors.
- source_word: וְלֹא עָמַד אִישׁ בִּפְנֵיהֶם
  chosen: Not one man stood before them
  alternatives:
  - No one could stand before them
  - Not a man withstood them
  lexicon: HALOT
  rationale: Literally, 'a man did not stand before them.' This idiom means no opponent could successfully resist them. 'Not one man stood before them' keeps the Hebrew imagery while remaining intelligible.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - one
  - person
  lexicon: HALOT
  rationale: 'The singular masculine noun is retained as ''man'' in line with the gender-accurate policy. In context it functions distributively: not a single opposing man.'
- source_word: מִכָּל אֹיְבֵיהֶם
  chosen: from all their enemies
  alternatives:
  - out of all their enemies
  - of all their enemies
  lexicon: HALOT
  rationale: 'The מן here is partitive/source-like after the negative statement: not one opponent from among all their enemies. ''From all their enemies'' reflects the Hebrew structure.'
- source_word: אֵת כָּל אֹיְבֵיהֶם
  chosen: all their enemies
  lexicon: HALOT
  rationale: The direct-object marker introduces the total object of divine action. 'All their enemies' preserves the comprehensive scope.
- source_word: נָתַן ... בְּיָדָם
  chosen: gave ... into their hand
  alternatives:
  - delivered ... into their hand
  - gave ... into their power
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for granting victory over an enemy. 'Into their hand' preserves the biblical idiom; singular 'hand' follows the Hebrew collective singular.
