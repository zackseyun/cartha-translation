id: JOS.21.14
reference: Joshua 21:14
source:
  edition: WLC
  text: וְ/אֶת יַתִּר֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת אֶשְׁתְּמֹ֖עַ וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־׃
translation:
  text: Jattir with its pasturelands, and Eshtemoa with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common land' for the land surrounding each town.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַתִּר
  chosen: Jattir
  alternatives:
  - Yattir
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per translation
    philosophy. 'Jattir' follows standard English convention, though 'Yattir' more
    closely reflects the initial yod.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/common pasture surrounding a town, especially
    in Levitical city lists. 'Pasturelands' is clear modern English and fits the plural/collective
    sense in context better than the more archaic 'common land.' The 3fs suffix is
    rendered as 'its,' referring to each city.
- source_word: אֶשְׁתְּמֹעַ
  chosen: Eshtemoa
  alternatives:
  - Eshtemoa
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention. Spelling
    varies in English, but 'Eshtemoa' is a common conventional form for this town
    name.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - —
  lexicon: HALOT
  rationale: The repeated object marker with conjunction structures a list of allotted
    cities. In idiomatic English, the object marker is not represented directly; the
    conjunction is carried by 'and' and the list is rendered smoothly.
