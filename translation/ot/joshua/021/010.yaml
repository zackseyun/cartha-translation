id: JOS.21.10
reference: Joshua 21:10
source:
  edition: WLC
  text: וַֽ/יְהִי֙ לִ/בְנֵ֣י אַהֲרֹ֔ן מִ/מִּשְׁפְּח֥וֹת הַ/קְּהָתִ֖י מִ/בְּנֵ֣י לֵוִ֑י
    כִּ֥י לָ/הֶ֛ם הָיָ֥ה הַ/גּוֹרָ֖ל רִיאשֹׁנָֽה׃
translation:
  text: It was for the sons of Aaron, from the families of the Kohathites, from the
    sons of Levi, because the first lot was for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the clans of the Kohathites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: It was
  alternatives:
  - And it was
  - Now it was
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the statement in narrative style.
    English omits a wooden initial 'and' for readability while preserving the existential
    sense.
- source_word: לִבְנֵי אַהֲרֹן
  chosen: for the sons of Aaron
  alternatives:
  - for Aaron's sons
  lexicon: HALOT
  rationale: The preposition ל marks possession/allocation in context, and 'sons of
    Aaron' preserves the formal genealogical phrasing.
- source_word: מִמִּשְׁפְּחוֹת
  chosen: from the families of
  alternatives:
  - from the clans of
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת can mean extended family groups or clans. 'Families' is
    a transparent rendering, with 'clans' a viable alternative in tribal-allotment
    contexts.
- source_word: הַקְּהָתִי
  chosen: the Kohathites
  alternatives:
  - the Kohathite clan
  lexicon: HALOT
  rationale: This adjectival/gentilic form refers to the Kohathite division among
    the Levites. 'Kohathites' is the standard and clear English ethnicon.
- source_word: מִבְּנֵי לֵוִי
  chosen: from the sons of Levi
  alternatives:
  - from the Levites
  lexicon: HALOT
  rationale: The phrase identifies the broader tribal source of the Kohathite families.
    'Sons of Levi' preserves the genealogical wording; 'Levites' would be slightly
    smoother but less formally transparent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'Here כִּי gives the reason for the preceding identification: the Aaronic
    line received the first lot. ''Because'' makes the causal relation explicit in
    modern English.'
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  - belonged to them
  lexicon: HALOT
  rationale: The preposition ל with pronoun marks possession/allocation. 'For them'
    fits the lot-allotment context naturally.
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the allotted lot
  lexicon: HALOT
  rationale: גוֹרָל refers to the lot used for distribution of inheritance/cities.
    'Lot' is the standard concise rendering.
- source_word: רִאשֹׁנָה
  chosen: the first
  alternatives:
  - first
  lexicon: HALOT
  rationale: The feminine form agrees adverbially/predicatively with the implied allotment
    sequence. English idiom renders this simply as 'the first' modifying 'lot'.
