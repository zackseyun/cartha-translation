id: JOS.21.12
reference: Joshua 21:12
source:
  edition: WLC
  text: וְ/אֶת שְׂדֵ֥ה הָ/עִ֖יר וְ/אֶת חֲצֵרֶ֑י/הָ נָֽתְנ֛וּ לְ/כָלֵ֥ב בֶּן יְפֻנֶּ֖ה
    בַּ/אֲחֻזָּתֽ/וֹ־־־׃ס
translation:
  text: But the fields of the city and its pasturelands they gave to Caleb son of
    Jephunneh as his possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its villages' or 'its settlements' for 'its pasturelands.' The Hebrew
      term can denote dependent settlements or outlying areas associated with a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂדֵה הָעִיר
  chosen: the fields of the city
  alternatives:
  - the field of the city
  - the farmland of the city
  lexicon: HALOT
  rationale: שְׂדֵה is morphologically singular construct ('field of'), but in English
    a collective sense is more natural here, referring to the agricultural land belonging
    to the city. 'Fields' best conveys the distributive/collective idea in readable
    English.
- source_word: חֲצֵרֶיהָ
  chosen: its pasturelands
  alternatives:
  - its villages
  - its settlements
  - its surrounding lands
  lexicon: HALOT
  rationale: In allotment and boundary contexts, חָצֵר/חֲצֵרִים often refers not merely
    to courtyards but to dependent settlements or open lands associated with a town.
    Given the parallel in Levitical-city contexts between city proper and its outlying
    lands, 'pasturelands' fits the contextual sense better than the more wooden 'villages'
    or 'courtyards'.
- source_word: נָתְנוּ
  chosen: they gave
  alternatives:
  - they assigned
  - they granted
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' 'They gave' preserves the plain verbal
    sense without over-interpreting the administrative action.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה
  chosen: to Caleb son of Jephunneh
  alternatives:
  - for Caleb son of Jephunneh
  lexicon: HALOT
  rationale: Standard rendering of the indirect object with the personal name transliterated
    according to the translation philosophy.
- source_word: בַּאֲחֻזָּתוֹ
  chosen: as his possession
  alternatives:
  - as his property
  - for his inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'As his possession'
    communicates the legal-tenure sense clearly. 'Inheritance' is possible, but here
    the emphasis is on held property rather than the process of inheriting.
- source_word: וְאֶת
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: 'The initial conjunction plus object marker links this verse contrastively
    to the previous one: the city itself was given to the Levites, but its surrounding
    lands to Caleb. Rendering with ''But'' makes the discourse relation explicit in
    natural English.'
