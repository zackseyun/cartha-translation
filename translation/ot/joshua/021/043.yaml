id: JOS.21.43
reference: Joshua 21:43
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן יְהוָה֙ לְ/יִשְׂרָאֵ֔ל אֶת כָּל הָ/אָ֔רֶץ אֲשֶׁ֥ר נִשְׁבַּ֖ע לָ/תֵ֣ת
    לַ/אֲבוֹתָ֑/ם וַ/יִּרָשׁ֖וּ/הָ וַ/יֵּ֥שְׁבוּ בָֽ/הּ־־׃
translation:
  text: So the LORD gave Israel all the land that he had sworn to give to their fathers,
    and they took possession of it and settled in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they possessed it'; the Hebrew verb can also carry the sense 'inherit'
      in covenantal contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional English convention for YHWH rather than transliteration.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - delivered
  - granted
  lexicon: HALOT
  rationale: נתן in this context straightforwardly means 'gave.' This best reflects
    the simple verbal action of divine grant without adding interpretive nuance.
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all the הארץ/land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the land promised to Israel, not the entire earth.
    'All the land' preserves the totality expressed by כָּל while fitting the covenant-land
    context.
- source_word: אֲשֶׁר נִשְׁבַּע לָתֵת
  chosen: that he had sworn to give
  alternatives:
  - which he swore to give
  - that he promised on oath to give
  lexicon: HALOT
  rationale: The Niphal of שׁבע denotes swearing an oath. 'Had sworn to give' clearly
    conveys prior oath-bound commitment in idiomatic English.
- source_word: לַאֲבוֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'their fathers.' Per the project's gender-accurate
    principle, the masculine familial term is retained rather than neutralized to
    'ancestors,' though the referent is the patriarchs.
- source_word: וַיִּרָשׁוּהָ
  chosen: they took possession of it
  alternatives:
  - they possessed it
  - they inherited it
  lexicon: HALOT
  rationale: ירשׁ can mean possess, dispossess, or inherit depending on context. Here
    'took possession of it' captures the concrete occupation of the promised land
    more naturally than the potentially abstract 'inherited,' while preserving the
    covenantal sense of receiving what was promised.
- source_word: וַיֵּשְׁבוּ בָהּ
  chosen: settled in it
  alternatives:
  - dwelt in it
  - lived in it
  lexicon: HALOT
  rationale: ישׁב plus ב conveys dwelling/settling in the land. 'Settled in it' fits
    the conquest-settlement context better than the more generic 'lived in it' and
    is more natural in modern English than 'dwelt in it'.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  - Then
  lexicon: Hebrew grammar
  rationale: The initial waw-consecutive continues the narrative and also marks a
    summary/result after the preceding section. 'So' brings out that summarizing/resultative
    force in readable English.
