id: JOS.21.22
reference: Joshua 21:22
source:
  edition: WLC
  text: וְ/אֶת קִבְצַ֨יִם֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת בֵּ֥ית חוֹרֹ֖ן וְ/אֶת מִגְרָשֶׁ֑/הָ
    עָרִ֖ים אַרְבַּֽע־־־־׃ס
translation:
  text: and Kibzaim with its pasturelands, and Beth-horon with its pasturelands—four
    cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common-land' or 'grazing lands' for 'pasturelands.' The Hebrew term
      refers to the open land belonging to a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִבְצַיִם
  chosen: Kibzaim
  alternatives:
  - Kibzaim/Kibzaim as a transliterated place name with minor spelling variation
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding landlands
  - its grazing lands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pasture area belonging to a town.
    'Pasturelands' is clear modern English and fits the Levitical-city context better
    than the archaic 'suburbs' or less natural 'common-land.' The 3fs suffix is rendered
    as 'its.'
- source_word: בֵּית חוֹרֹן
  chosen: Beth-horon
  alternatives:
  - Beth Horon
  - House of Horon
  lexicon: HALOT
  rationale: Established transliteration of the place name. The construct form is
    preserved as the conventional English place name rather than translated literally.
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Straightforward numerical summary formula concluding the list. 'Cities'
    matches the standard rendering of עָרִים in allotment lists.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... and
  lexicon: Hebrew grammar
  rationale: The repeated conjunction plus object marker structures the list. English
    preserves the coordination naturally with repeated 'and' while omitting untranslated
    object markers.
