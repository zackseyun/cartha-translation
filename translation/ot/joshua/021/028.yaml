id: JOS.21.28
reference: Joshua 21:28
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה יִשָּׂשכָ֔ר אֶת קִשְׁי֖וֹן וְ/אֶת מִגְרָשֶׁ֑/הָ אֶת דָּֽבְרַ֖ת
    וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־׃
translation:
  text: 'And from the tribe of Issachar: Kishion with its pasturelands, and Dabrath
    with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kishion is rendered 'Kishon' in some English traditions and may reflect
      a variant place-name tradition.
    reason: alternative_reading
  - marker: b
    text: Dabrath is rendered 'Daberath' in some English versions.
    reason: alternative_reading
  - marker: c
    text: Or 'common lands' / 'open land' for the land attached to each city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמַּטֵּה
  chosen: And from the tribe of
  alternatives:
  - And from the allotment of
  - And from the staff/tribe of
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts regularly means 'tribe.' The prefixed
    conjunction and preposition are naturally rendered together as 'And from the tribe
    of' in English.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: אֶת
  chosen: —
  rationale: Direct-object marker has no direct English equivalent and is not represented
    in the translation.
- source_word: קִשְׁיוֹן
  chosen: Kishion
  alternatives:
  - Kishon
  rationale: Proper place name; transliterated from the MT form קִשְׁיוֹן. An alternative
    English form 'Kishon' appears in some traditions and related passages, so it is
    preserved in a footnote.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding landlands
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pastureland belonging to a town, especially
    in Levitical-city lists. 'Pasturelands' is clear modern English and fits the land-use
    sense better than the more opaque 'common lands.' The 3fs suffix is rendered 'its,'
    referring to each city.
- source_word: דָּבְרַת
  chosen: Dabrath
  alternatives:
  - Daberath
  rationale: Proper place name; transliterated from the MT spelling here. 'Daberath'
    is a common alternative English form reflecting another vocalization/tradition,
    so it is preserved in a footnote.
