id: JOS.21.20
reference: Joshua 21:20
source:
  edition: WLC
  text: וּ/לְ/מִשְׁפְּח֤וֹת בְּנֵֽי קְהָת֙ הַ/לְוִיִּ֔ם הַ/נּוֹתָרִ֖ים מִ/בְּנֵ֣י
    קְהָ֑ת וַֽ/יְהִי֙ עָרֵ֣י גֽוֹרָלָ֔/ם מִ/מַּטֵּ֖ה אֶפְרָֽיִם־׃
translation:
  text: And for the families of the sons of Kohath, the Levites who remained from
    the sons of Kohath, the cities of their lot were from the tribe of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the cities allotted to them by lot were from the tribe
      of Ephraim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִשְׁפְּחוֹת
  chosen: for the families of
  alternatives:
  - to the families of
  - according to the families of
  lexicon: HALOT
  rationale: The prefixed ל marks indirect relation here in a distribution/allotment
    context. 'For the families of' reads naturally in English while preserving the
    sense that what follows pertains to these family groups.
- source_word: בְּנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the descendants of Kohath
  lexicon: HALOT
  rationale: A standard genealogical expression. 'Sons of' preserves the formal lineage
    language of the Hebrew; 'descendants' is possible but less textually transparent.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward ethnic/tribal designation identifying the Kohathites
    as belonging to the Levitical class.
- source_word: הַנּוֹתָרִים
  chosen: who remained
  alternatives:
  - who were left
  - the remaining ones
  lexicon: HALOT
  rationale: The participle denotes those left over or remaining after prior distributions.
    'Who remained' is idiomatic and preserves the relative force in context.
- source_word: מִבְּנֵי קְהָת
  chosen: from the sons of Kohath
  alternatives:
  - among the sons of Kohath
  - of the sons of Kohath
  lexicon: HALOT
  rationale: The preposition מן indicates that these Levites are a subset drawn from
    the broader Kohathite line. 'From' best preserves that partitive sense.
- source_word: וַיְהִי
  chosen: were
  alternatives:
  - it came to pass that ... were
  - there were
  lexicon: HALOT
  rationale: In this allotment formula, the waw-consecutive of היה functions as a
    simple narrative/copular link. Rendering it as 'were' avoids wooden English while
    preserving the statement of fact.
- source_word: עָרֵי גוֹרָלָם
  chosen: the cities of their lot
  alternatives:
  - the cities allotted to them
  - the cities assigned by lot to them
  lexicon: HALOT
  rationale: גורל refers to a lot or allotment, often by casting lots. 'Cities of
    their lot' stays close to the Hebrew idiom; the more explicit alternatives are
    interpretive expansions.
- source_word: מִמַּטֵּה אֶפְרָיִם
  chosen: from the tribe of Ephraim
  alternatives:
  - from the staff/tribe of Ephraim
  lexicon: HALOT
  rationale: מַטֶּה in tribal lists means 'tribe.' 'From the tribe of Ephraim' is
    the standard and contextually correct rendering.
