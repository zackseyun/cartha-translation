id: JOS.21.37
reference: Joshua 21:37
source:
  edition: WLC
  text: אֶת קְדֵמוֹת֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת מֵיפָ֖עַת וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים
    אַרְבַּֽע־־־־׃ס
translation:
  text: 'Kedemoth with its pasturelands, and Mephaath with its pasturelands: four
    cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common land' or 'surrounding pastureland' for the land attached to each
      city (Hebrew מִגְרָשׁ).
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֵמוֹת
  chosen: Kedemoth
  alternatives:
  - Qedemoth
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. English convention commonly gives 'Kedemoth.'
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding land
  - its pasture-grounds
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes the open land/common pasture area belonging to a city.
    'Pasturelands' is clear modern English and fits the Levitical-city allotment context
    better than the archaic 'suburbs' or the vaguer 'surrounding land.' The 3fs suffix
    is rendered by 'its,' referring to each city.
- source_word: מֵיפָעַת
  chosen: Mephaath
  alternatives:
  - Mefaath
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Straightforward numerical summary of the listed settlements. 'Cities'
    is the standard rendering of עָרִים in allotment lists and maintains consistency
    with surrounding verses.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  chosen: with ... and ... with ...
  alternatives:
  - namely ... and ...
  - — ... and ...
  lexicon: Hebrew grammar
  rationale: The repeated object marker אֶת structures the list. In English, the relation
    between each city and its dependent pasturelands is best conveyed by 'with its
    pasturelands' rather than mechanically reproducing each object marker.
