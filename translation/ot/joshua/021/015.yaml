id: JOS.21.15
reference: Joshua 21:15
source:
  edition: WLC
  text: וְ/אֶת חֹלֹן֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶת דְּבִ֖ר וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־׃
translation:
  text: Holon with its pasturelands, and Debir with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel list in 1 Chronicles 6:58 reads 'Hilen' for this city name;
      Joshua here reads 'Holon.'
    reason: cross_reference
lexical_decisions:
- source_word: חֹלֹן
  chosen: Holon
  alternatives:
  - Hilen
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy
    to transliterate names rather than translate them. An alternative form 'Hilen'
    appears in the parallel list in 1 Chronicles 6:58 [MT 6:43], so it is worth preserving
    in a footnote as a cross-reference/text-form difference, but the reading here
    in Joshua is חֹלֹן.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding landlands
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the land or open area belonging to a town, especially
    for grazing and communal use. 'Pasturelands' is clear modern English and fits
    the Levitical-city context better than the more archaic 'suburbs' or less precise
    'lands.' The 3fs suffix is rendered 'its,' referring to each city.
- source_word: דְּבִר
  chosen: Debir
  lexicon: HALOT
  rationale: Proper place name; transliterated directly. No translation is attempted
    because it functions as a toponym in a city list.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - with
  - —
  lexicon: HALOT
  rationale: The repeated object marker with conjunction structures the list. In English
    list style, the object marker itself is not translated, while the conjunction
    is represented naturally as 'and.' The relationship between each city and its
    associated pasturelands is conveyed idiomatically by 'with its pasturelands.'
