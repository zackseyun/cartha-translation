theological_decisions:
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard national designation.
    Per the doctrine's gender-accurate principle, the translation preserves the masculine
    form rather than neutralizing it, while recognizing that it refers corporately
    to Israel as a people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
