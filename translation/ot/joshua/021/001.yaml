theological_decisions:
- issue: Gendered kinship language in Israel's tribal structure
  chosen_reading: Retain 'fathers’ houses' and 'sons of Israel' in the main text
  alternative_readings:
  - ancestral houses
  - Israelites
  - people of Israel
  rationale: The Hebrew uses explicitly male kinship terms that denote representative
    household and covenantal structures, not merely generic population language. Per
    the translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral terms, while still using understandable English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
