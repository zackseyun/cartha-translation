id: JOS.21.1
reference: Joshua 21:1
source:
  edition: WLC
  text: וַֽ/יִּגְּשׁ֗וּ רָאשֵׁי֙ אֲב֣וֹת הַ/לְוִיִּ֔ם אֶל אֶלְעָזָר֙ הַ/כֹּהֵ֔ן וְ/אֶל
    יְהוֹשֻׁ֖עַ בִּן נ֑וּן וְ/אֶל רָאשֵׁ֛י אֲב֥וֹת הַ/מַּטּ֖וֹת לִ/בְנֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: Then the heads of the fathers’ houses of the Levites came near to Eleazar
    the priest, to Joshua son of Nun, and to the heads of the fathers’ houses of the
    tribes of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'family heads' / 'ancestral houses.' The Hebrew idiom refers to clan-based
      household groupings under paternal leadership.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. 'Came near' preserves
    the narrative movement with a slightly formal tone appropriate to legal/administrative
    approach in context.
- source_word: רָאשֵׁי אֲבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the family heads
  lexicon: HALOT
  rationale: The construct chain literally denotes 'heads of fathers,' an idiom for
    clan or paternal-house leaders. 'Heads of the fathers’ houses' keeps the Hebrew
    social structure visible; smoother alternatives are possible but less transparent.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/group designation לְוִיִּם.
- source_word: אֶלְעָזָר הַכֹּהֵן
  chosen: Eleazar the priest
  alternatives:
  - Eleazar the priestly leader
  lexicon: HALOT
  rationale: כֹּהֵן is straightforwardly 'priest.' No expansion is warranted.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua the son of Nun
  lexicon: HALOT
  rationale: Standard English rendering of Hebrew patronymic construction; 'son of
    Nun' is natural and accurate.
- source_word: רָאשֵׁי אֲבוֹת הַמַּטּוֹת
  chosen: the heads of the fathers’ houses of the tribes
  alternatives:
  - the heads of the ancestral houses of the tribes
  - the family heads of the tribes
  lexicon: HALOT
  rationale: 'מַטּוֹת refers to tribal units. Retaining ''fathers’ houses'' again
    preserves the nested Israelite social structure: clan leaders within tribal groupings.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the people of Israel
  - of the Israelites
  lexicon: HALOT
  rationale: Literally 'to/for the sons of Israel,' here dependent on 'tribes' and
    functioning as a genitival specification. 'Sons of Israel' is more source-transparent
    than 'Israelites' and preserves the familial corporate idiom.
