id: JOS.21.30
reference: Joshua 21:30
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה אָשֵׁ֔ר אֶת מִשְׁאָ֖ל וְ/אֶת מִגְרָשֶׁ֑/הָ אֶת עַבְדּ֖וֹן וְ/אֶת
    מִגְרָשֶֽׁ/הָ־־־־׃
translation:
  text: 'and from the tribe of Asher: Mishal with its pasturelands, and Abdon with
    its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Misheal.' English transliterations of this place name vary.
    reason: lexical_alternative
  - marker: b
    text: '''Pasturelands'' refers to the open land belonging to the town, especially
      for grazing and related communal use.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  chosen: and from the tribe of
  alternatives:
  - and from the staff of
  - and from the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts regularly denotes a 'tribe.' The
    prefixed conjunction and preposition require 'and from the tribe of' in smooth
    English.
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Proper tribal name; transliterated according to the translation philosophy
    for names.
- source_word: אֶת
  chosen: —
  rationale: Direct-object marker has no direct English equivalent and is not represented
    in the translation.
- source_word: מִשְׁאָל
  chosen: Mishal
  alternatives:
  - Misheal
  lexicon: HALOT
  rationale: Place name transliterated. English tradition varies between 'Mishal'
    and 'Misheal'; 'Mishal' more directly reflects the consonantal form here.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding landlands
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the land or open area belonging to a town, often for
    grazing. 'Pasturelands' is a natural and contextually appropriate rendering in
    Joshua's Levitical-city lists.
- source_word: עַבְדּוֹן
  chosen: Abdon
  lexicon: HALOT
  rationale: Place name transliterated in standard English form.
- source_word: וְ/אֶת
  chosen: and
  rationale: The conjunction is represented by 'and'; the attached direct-object marker
    remains untranslated.
