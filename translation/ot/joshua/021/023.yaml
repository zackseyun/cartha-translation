id: JOS.21.23
reference: Joshua 21:23
source:
  edition: WLC
  text: וּ/מִ/מַּ֨טֵּה דָ֔ן אֶֽת אֶלְתְּקֵ֖א וְ/אֶת מִגְרָשֶׁ֑/הָ אֶֽת גִּבְּת֖וֹן
    וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־־׃
translation:
  text: 'And from the tribe of Dan: Eltekeh with its pasturelands, and Gibbethon with
    its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its surrounding pastureland' / 'its common land' for Hebrew מִגְרָשֶׁהָ.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה דָן
  chosen: And from the tribe of Dan
  alternatives:
  - And from the clan of Dan
  - And from the staff/branch of Dan
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts regularly denotes 'tribe.' The prefixed
    conjunction and preposition are naturally rendered together as 'And from.'
- source_word: אֶת
  chosen: '[direct object marker omitted in English]'
  rationale: The Hebrew direct object marker has no direct English equivalent and
    is not represented in the translation.
- source_word: אֶלְתְּקֵא
  chosen: Eltekeh
  alternatives:
  - Elteke
  rationale: Proper place name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding pastureland
  - its common land
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the land around a town used as pasture/common land.
    'Pasturelands' is clear modern English and fits the Levitical-city context. The
    3fs suffix is rendered 'its,' referring to the city.
- source_word: גִּבְּתוֹן
  chosen: Gibbethon
  rationale: Proper place name transliterated by standard English convention.
- source_word: וְ/אֶת
  chosen: and
  rationale: The conjunction is rendered 'and'; the attached direct object marker
    remains untranslated in English.
