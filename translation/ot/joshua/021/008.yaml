id: JOS.21.8
reference: Joshua 21:8
source:
  edition: WLC
  text: וַ/יִּתְּנ֤וּ בְנֵֽי יִשְׂרָאֵל֙ לַ/לְוִיִּ֔ם אֶת הֶ/עָרִ֥ים הָ/אֵ֖לֶּה וְ/אֶת מִגְרְשֵׁי/הֶ֑ן כַּ/אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה בְּ/יַד מֹשֶׁ֖ה בַּ/גּוֹרָֽל־־־־׃פ
translation:
  text: So the sons of Israel gave to the Levites these cities with their pasturelands, as Yahweh had commanded by the hand of Moses, by lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Moses' for 'by the hand of Moses,' a Hebrew idiom for mediated agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of נתן, here denoting the act of giving/assigning the cities to the Levites. 'Gave' is the plainest and most direct rendering.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle, the formal expression is preserved here rather than flattened to 'Israelites,' though that is a viable idiomatic alternative.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Straightforward dative with the tribal/clan designation 'Levites.'
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - the cities האלה = these
  lexicon: HALOT
  rationale: Demonstrative phrase referring to the specific cities just enumerated. 'These cities' is natural English and preserves the deixis.
- source_word: מִגְרְשֵׁיהֶן
  chosen: their pasturelands
  alternatives:
  - their common lands
  - their surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ in priestly/allotment contexts refers to the open land around a town used for grazing and related communal use. 'Pasturelands' best captures the concrete sense in modern English.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/conformity with the divine command. Simple 'as' is sufficient and idiomatic.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the narrative sequence: the giving occurred in accordance with a prior command.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: This Hebrew idiom denotes mediated agency. 'By the hand of Moses' preserves the idiom transparently; 'through Moses' is a possible dynamic alternative.
- source_word: בַּגּוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  lexicon: HALOT
  rationale: Refers to allocation by casting lots. English idiom prefers 'by lot' over the more wooden 'by the lot.'
