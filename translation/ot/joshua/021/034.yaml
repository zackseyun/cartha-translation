id: JOS.21.34
reference: Joshua 21:34
source:
  edition: WLC
  text: וּ/לְ/מִשְׁפְּח֣וֹת בְּנֵֽי מְרָרִי֮ הַ/לְוִיִּ֣ם הַ/נּוֹתָרִים֒ מֵ/אֵת֙ מַטֵּ֣ה
    זְבוּלֻ֔ן אֶֽת יָקְנְעָ֖ם וְ/אֶת מִגְרָשֶׁ֑/הָ אֶת קַרְתָּ֖ה וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־־׃
translation:
  text: 'And to the families of the sons of Merari, the remaining Levites, from the
    tribe of Zebulun: Jokneam with its pasturelands, and Kartah with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kartah is also spelled 'Kartha' in some English renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מִשְׁפְּחוֹת
  chosen: And to the families of
  alternatives:
  - And for the clans of
  - And to the clans of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition naturally continue the allocation
    list from the previous verse. מִשְׁפָּחוֹת can be rendered 'families' or 'clans';
    'families' is clear modern English, while still fitting tribal subdivisions.
- source_word: בְּנֵי מְרָרִי
  chosen: the sons of Merari
  alternatives:
  - the descendants of Merari
  lexicon: HALOT
  rationale: A standard genealogical expression. 'Sons of' preserves the Hebrew form
    and is idiomatic in English biblical style; 'descendants' is possible but less
    formally aligned.
- source_word: הַלְוִיִּם הַנּוֹתָרִים
  chosen: the remaining Levites
  alternatives:
  - the rest of the Levites
  - the Levites who remained
  lexicon: HALOT
  rationale: The phrase identifies this subgroup as those Levites not yet assigned
    in the preceding distribution. 'Remaining Levites' is concise and natural.
- source_word: מֵאֵת מַטֵּה זְבוּלֻן
  chosen: from the tribe of Zebulun
  alternatives:
  - from the staff/tribe of Zebulun
  - from the people of the tribe of Zebulun
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts means 'tribe.' מֵאֵת here introduces
    the source of the allotment; 'from the tribe of Zebulun' is the plain sense.
- source_word: יָקְנְעָם
  chosen: Jokneam
  alternatives:
  - Jokneam
  rationale: Standard English transliteration of the place name יָקְנְעָם.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land around a town used as pasture/common
    land, especially in Levitical city lists. 'Pasturelands' is clear and contextually
    appropriate.
- source_word: קַרְתָּה
  chosen: Kartah
  alternatives:
  - Kartha
  rationale: The Hebrew place name is best transliterated. 'Kartah' closely reflects
    the consonants; 'Kartha' is a common English variant and worth preserving in a
    footnote.
