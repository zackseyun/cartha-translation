id: JOS.21.39
reference: Joshua 21:39
source:
  edition: WLC
  text: אֶת חֶשְׁבּוֹן֙ וְ/אֶת מִגְרָשֶׁ֔/הָ אֶת יַעְזֵ֖ר וְ/אֶת מִגְרָשֶׁ֑/הָ כָּל
    עָרִ֖ים אַרְבַּֽע־־־־־׃
translation:
  text: Heshbon with its pasturelands, and Jazer with its pasturelands—four cities
    in all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'surrounding pasture land' for each city; the Hebrew
      term denotes the open land belonging to a town.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  alternatives:
  - Hesbon
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    policy for names.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding land
  - its pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the land/open area belonging to a city, often for
    grazing. 'Pasturelands' is a clear, established rendering in Joshua's allotment
    lists and fits the plural form with 3fs suffix ('her/its').
- source_word: יַעְזֵר
  chosen: Jazer
  alternatives:
  - Jaazer
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: כָּל עָרִים אַרְבַּע
  chosen: four cities in all
  alternatives:
  - all the cities were four
  - a total of four cities
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'all the cities, four.' English idiom
    is best conveyed as a summary phrase. 'In all' preserves the force of כָּל without
    wooden literalism.
- source_word: אֶת ... וְאֶת ... אֶת ... וְאֶת
  chosen: '[not separately represented in English beyond coordination and object listing]'
  lexicon: Hebrew grammar
  rationale: The repeated object marker אֶת marks the listed cities and their pasturelands
    as direct objects in the larger sentence context. English does not require an
    equivalent lexical item, so the sense is carried by the coordinated list.
