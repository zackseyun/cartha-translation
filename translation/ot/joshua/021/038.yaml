id: JOS.21.38
reference: Joshua 21:38
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּה גָ֗ד אֶת עִיר֙ מִקְלַ֣ט הָ/רֹצֵ֔חַ אֶת רָמֹ֥ת בַּ/גִּלְעָ֖ד
    וְ/אֶת מִגְרָשֶׁ֑/הָ וְ/אֶֽת מַחֲנַ֖יִם וְ/אֶת מִגְרָשֶֽׁ/הָ־־־־־־׃
translation:
  text: 'And from the tribe of Gad: Ramoth in Gilead, the city of refuge for the manslayer,
    with its pasturelands, and Mahanaim with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the killer' or 'the slayer.' In this legal context, 'manslayer' reflects
      the asylum setting of the city of refuge more precisely than 'murderer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Ramoth-gilead.' The Hebrew can be represented either as 'Ramoth in Gilead'
      or as the conventional compound place name.
    reason: alternative_reading
  - marker: c
    text: '''Pasturelands'' refers to the land surrounding the city assigned for use
      with it.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה גָד
  chosen: And from the tribe of Gad
  alternatives:
  - And from the staff/branch of Gad
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts means 'tribe.' The prefixed conjunction
    and preposition are naturally rendered together as 'And from.'
- source_word: עִיר מִקְלַט
  chosen: city of refuge
  alternatives:
  - refuge city
  lexicon: HALOT
  rationale: This is the established legal expression in the Hebrew Bible for a designated
    asylum city. 'City of refuge' is clear modern English and preserves the formal
    sense.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the murderer
  - the killer
  - the slayer
  lexicon: HALOT
  rationale: In the context of cities of refuge, רֹצֵחַ refers to one who has killed
    a person and may seek asylum, often with the nuance of manslaughter rather than
    premeditated murder. 'Manslayer' best fits the legal context without overstating
    guilt.
- source_word: רָמֹת בַּגִּלְעָד
  chosen: Ramoth in Gilead
  alternatives:
  - Ramoth-gilead
  - Ramoth of Gilead
  lexicon: HALOT
  rationale: The place name is transliterated, while the regional designation is translated
    with a natural English preposition. 'Ramoth in Gilead' is straightforward and
    accurate.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common-land
  - its surrounding land
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ in Levitical city lists denotes the land around a town used
    as pasture/common land. 'Pasturelands' is idiomatic and contextually precise.
- source_word: מַחֲנַיִם
  chosen: Mahanaim
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy.
