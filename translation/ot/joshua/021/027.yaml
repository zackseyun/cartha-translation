id: JOS.21.27
reference: Joshua 21:27
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֣י גֵרְשׁוֹן֮ מִ/מִּשְׁפְּחֹ֣ת הַ/לְוִיִּם֒ מֵ/חֲצִ֞י מַטֵּ֣ה מְנַשֶּׁ֗ה
    אֶת עִיר֙ מִקְלַ֣ט הָ/רֹצֵ֔חַ אֶת גלון בַּ/בָּשָׁן֙ וְ/אֶת מִגְרָשֶׁ֔/הָ וְ/אֶֽת
    בְּעֶשְׁתְּרָ֖ה וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֖ים שְׁתָּֽיִם־־־־־׃ס
translation:
  text: And to the sons of Gershon, from the clans of the Levites, from the half-tribe
    of Manasseh, they gave Golan in Bashan, the city of refuge for the manslayer,
    with its pasturelands, and Beeshterah with its pasturelands—two cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Beeshterah; compare 1 Chronicles 6:71, which has Ashtaroth.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/לִ/בְנֵי גֵרְשׁוֹן
  chosen: And to the sons of Gershon
  alternatives:
  - And to the descendants of Gershon
  - And to the Gershonites
  lexicon: HALOT
  rationale: בני literally means 'sons of.' In tribal/genealogical allocation contexts,
    'sons of Gershon' preserves the Hebrew form while remaining natural enough in
    English. 'Gershonites' is possible but less transparent to the source wording.
- source_word: מִ/מִּשְׁפְּחֹת הַ/לְוִיִּם
  chosen: from the clans of the Levites
  alternatives:
  - from the families of the Levites
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת commonly denotes kinship subdivisions; 'clans' fits tribal-administrative
    context better than the more generic 'families.'
- source_word: מֵ/חֲצִי מַטֵּה מְנַשֶּׁה
  chosen: from the half-tribe of Manasseh
  alternatives:
  - from half the tribe of Manasseh
  lexicon: HALOT
  rationale: מַטֶּה in Joshua's land-allotment context is standardly 'tribe.' 'Half-tribe'
    is idiomatic and reflects the construct phrase closely.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  chosen: the city of refuge for the manslayer
  alternatives:
  - the refuge city for the killer
  - the city of refuge for the slayer
  lexicon: HALOT
  rationale: This is a fixed legal expression in the Torah/Joshua context. 'City of
    refuge' is the established and accurate rendering of עִיר מִקְלָט. הָרֹצֵחַ here
    refers to one who has killed a person, often without premeditation in this legal
    setting; 'manslayer' captures the juridical nuance better than the more general
    'killer.'
- source_word: גלון בַּבָּשָׁן
  chosen: Golan in Bashan
  lexicon: HALOT
  rationale: Both are place names and are therefore transliterated per project philosophy.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding pasturelands
  - its common land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land around a Levitical city used for grazing
    and related purposes. 'Pasturelands' is concise and contextually accurate.
- source_word: בְּעֶשְׁתְּרָה
  chosen: Beeshterah
  alternatives:
  - Ashtaroth
  lexicon: HALOT
  rationale: The MT here reads Beeshterah, so the main text follows the Hebrew form
    rather than harmonizing to the parallel name Ashtaroth found elsewhere. The alternative
    is worth preserving in a footnote because of the known parallel in 1 Chronicles
    6:71.
- source_word: עָרִים שְׁתָּיִם
  chosen: two cities
  lexicon: HALOT
  rationale: A straightforward summary count closing the list; English idiom prefers
    'two cities' at the end of the sentence.
- source_word: implicit verbal sense in allotment list
  chosen: they gave
  alternatives:
  - were given
  lexicon: HALOT
  rationale: Although no finite verb appears in this verse, the allotment formula
    in the surrounding context supplies the sense. 'They gave' makes the English sentence
    complete while matching the narrative pattern of the chapter.
