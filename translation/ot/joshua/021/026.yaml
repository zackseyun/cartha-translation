id: JOS.21.26
reference: Joshua 21:26
source:
  edition: WLC
  text: כָּל עָרִ֥ים עֶ֖שֶׂר וּ/מִגְרְשֵׁי/הֶ֑ן לְ/מִשְׁפְּח֥וֹת בְּנֵֽי קְהָ֖ת הַ/נּוֹתָרִֽים־־׃ס
translation:
  text: All the cities were ten, with their pasturelands, for the clans of the remaining
    sons of Kohath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten cities.' The Hebrew wording is a summary formula concluding the
      list.
    reason: lexical_alternative
  - marker: b
    text: '''Pasturelands'' refers to the open land belonging to the cities, especially
      for grazing and related use.'
    reason: cultural_note
  - marker: c
    text: Or 'the Kohathites' for 'the sons of Kohath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: Quantifies the total that follows; simple 'All' is natural English and
    preserves the summative force.
- source_word: עָרִים עֶשֶׂר
  chosen: the cities were ten
  alternatives:
  - ten cities
  lexicon: HALOT
  rationale: Hebrew places the noun before the number in a summary formula. English
    can render either 'ten cities' or 'the cities were ten'; the latter preserves
    the enumerative, concluding style of the allotment list.
- source_word: מִגְרְשֵׁיהֶן
  chosen: their pasturelands
  alternatives:
  - their common lands
  - their surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ in these Levitical city lists refers to the open land attached
    to a city for use, often for grazing. 'Pasturelands' is the most contextually
    precise and idiomatic rendering.
- source_word: לְמִשְׁפְּחוֹת
  chosen: for the clans of
  alternatives:
  - according to the families of
  - for the families of
  lexicon: HALOT
  rationale: 'מִשְׁפָּחוֹת denotes kinship subdivisions within a tribe. ''Clans''
    communicates this social unit more clearly in modern English than ''families,''
    while ל marks relation/distribution: these cities belonged to those clans.'
- source_word: בְּנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the Kohathites
  - the descendants of Kohath
  lexicon: HALOT
  rationale: Literally 'sons of Kohath.' 'Kohathites' is possible, but the more literal
    rendering keeps the genealogical phrasing visible and remains clear in context.
- source_word: הַנּוֹתָרִים
  chosen: the remaining
  alternatives:
  - who remained
  - the rest of
  lexicon: HALOT
  rationale: This distinguishes these Kohathite clans from the previously listed branch
    that had already received cities. 'The remaining' is concise and fits the attributive
    Hebrew construction.
