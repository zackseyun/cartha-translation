id: JOS.21.24
reference: Joshua 21:24
source:
  edition: WLC
  text: אֶת אַיָּלוֹן֙ וְ/אֶת מִגְרָשֶׁ֔/הָ אֶת גַּת רִמּ֖וֹן וְ/אֶת מִגְרָשֶׁ֑/הָ
    עָרִ֖ים אַרְבַּֽע־־־־־׃ס
translation:
  text: 'Aijalon with its pasturelands, and Gath-rimmon with its pasturelands: four
    cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its common land' or 'its surrounding land'; the Hebrew term refers to
      the land belonging to a city, often used for grazing.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. 'Aijalon' follows a common English biblical convention, while 'Ayalon'
    is a plausible alternative transliteration.
- source_word: מִגְרָשֶׁהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding land
  - its pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes the land around a town allotted for use, often for grazing.
    'Pasturelands' best captures the likely function in this Levitical-city context
    while remaining natural English. Plural reflects idiomatic English for the area
    belonging to each city.
- source_word: גַּת רִמּוֹן
  chosen: Gath-rimmon
  alternatives:
  - Gath Rimmon
  lexicon: HALOT
  rationale: Compound place name; transliterated as a standard English biblical form.
    Hyphenation helps modern readers recognize it as one toponym.
- source_word: עָרִים אַרְבַּע
  chosen: four cities
  alternatives:
  - four towns
  lexicon: HALOT
  rationale: Straightforward numerical summary formula concluding the list. 'Cities'
    is the standard rendering of עָרִים in allotment texts and fits the administrative
    sense here.
- source_word: אֶת ... וְאֶת ... אֶת ... וְאֶת
  chosen: '[not separately represented in English beyond direct listing with ''with''
    and ''and'']'
  lexicon: Hebrew grammar
  rationale: The repeated object marker אֶת has no direct English equivalent. It structures
    the list of cities and their pasturelands; natural English expresses this by listing
    the items with conjunctions.
