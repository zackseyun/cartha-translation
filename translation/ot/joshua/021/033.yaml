id: JOS.21.33
reference: Joshua 21:33
source:
  edition: WLC
  text: כָּל עָרֵ֥י הַ/גֵּרְשֻׁנִּ֖י לְ/מִשְׁפְּחֹתָ֑/ם שְׁלֹשׁ עֶשְׂרֵ֥ה עִ֖יר וּ/מִגְרְשֵׁי/הֶֽן־־׃ס
translation:
  text: All the cities of the Gershonites by their families were thirteen cities,
    with their pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and their pasturelands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: Quantifier introducing the total count of the Levitical cities assigned
    to this clan group; 'All' is the natural concise English equivalent.
- source_word: עָרֵי
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city/town settlement. 'Cities' matches the standard
    rendering in this allocation context and fits the counting formula.
- source_word: הַגֵּרְשֻׁנִּי
  chosen: the Gershonites
  alternatives:
  - the Gershonite clan
  - the descendants of Gershon
  lexicon: HALOT
  rationale: The gentilic singular with article functions collectively for the clan
    descended from Gershon. English idiom prefers the plural ethnicon 'the Gershonites'.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their families
  alternatives:
  - according to their families
  - for their families
  lexicon: HALOT
  rationale: לְ here marks classification/distribution. 'By their families' is concise
    and preserves the clan-structuring sense without overformal wording.
- source_word: שְׁלֹשׁ עֶשְׂרֵה עִיר
  chosen: thirteen cities
  alternatives:
  - thirteen towns
  lexicon: HALOT
  rationale: Standard English reverses the Hebrew number-noun order. 'Cities' is retained
    for consistency with עָרֵי earlier in the verse.
- source_word: וּמִגְרְשֵׁיהֶן
  chosen: with their pasturelands
  alternatives:
  - and their pasturelands
  - with their common lands
  - with their surrounding pasturelands
  lexicon: HALOT
  rationale: מִגְרָשׁ in these land-allotment texts refers to the open land/pasture
    area belonging to a city. 'Pasturelands' is clear modern English and more precise
    than the archaic 'suburbs' or ambiguous 'common lands'. 'With' smoothly conveys
    the appended formula.
