id: JOS.21.40
reference: Joshua 21:40
source:
  edition: WLC
  text: כָּל הֶ֨/עָרִ֜ים לִ/בְנֵ֤י מְרָרִי֙ לְ/מִשְׁפְּחֹתָ֔/ם הַ/נּוֹתָרִ֖ים מִ/מִּשְׁפְּח֣וֹת
    הַ/לְוִיִּ֑ם וַ/יְהִי֙ גּוֹרָלָ֔/ם עָרִ֖ים שְׁתֵּ֥ים עֶשְׂרֵֽה־׃
translation:
  text: All the cities for the sons of Merari, by their families—the remaining ones
    from the families of the Levites—were twelve cities by their lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the descendants of Merari' or 'for the Merarites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest from the Levitical families.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הֶעָרִים
  chosen: All the cities
  alternatives:
  - All the towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city/town.' 'Cities' is retained for consistency
    in allotment lists and because these are named settlement units in tribal distributions.
- source_word: לִבְנֵי מְרָרִי
  chosen: for the sons of Merari
  alternatives:
  - for the descendants of Merari
  - for the Merarites
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In genealogical/allotment contexts
    it can denote descendants, but 'sons of Merari' preserves the Hebrew form while
    remaining natural enough in English. 'Merarites' is possible but less transparent
    to the source wording here.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their families
  alternatives:
  - according to their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can be rendered 'family' or 'clan.' 'Families' is chosen
    for readability, with 'by' expressing distribution according to family divisions.
- source_word: הַנּוֹתָרִים
  chosen: the remaining ones
  alternatives:
  - those who remained
  - the rest
  lexicon: HALOT
  rationale: The participle from יתר/נותר denotes those left over or remaining. 'The
    remaining ones' preserves the substantival participle and links clearly to the
    Merarite families not yet specified.
- source_word: מִמִּשְׁפְּחוֹת הַלְוִיִּם
  chosen: from the families of the Levites
  alternatives:
  - from the Levitical families
  - from the clans of the Levites
  lexicon: HALOT
  rationale: This phrase identifies the broader group from which the remaining Merarite
    families come. 'Families of the Levites' is a clear, close rendering.
- source_word: וַיְהִי גּוֹרָלָם
  chosen: were ... by their lot
  alternatives:
  - and their lot was
  - and their allotted share was
  lexicon: HALOT
  rationale: 'Literally, ''and their lot was.'' In English, the clause is more natural
    when integrated with the predicate: ''were twelve cities by their lot.'' This
    preserves the idea of allotment by lot without awkwardness.'
- source_word: עָרִים שְׁתֵּים עֶשְׂרֵה
  chosen: twelve cities
  alternatives:
  - twelve towns
  lexicon: HALOT
  rationale: The Hebrew places 'cities' before the number; standard English idiom
    reverses this to 'twelve cities.'
