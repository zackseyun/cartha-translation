id: JOS.21.5
reference: Joshua 21:5
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֨י קְהָ֜ת הַ/נּוֹתָרִ֗ים מִ/מִּשְׁפְּחֹ֣ת מַטֵּֽה אֶ֠פְרַיִם וּֽ/מִ/מַּטֵּה
    דָ֞ן וּ/מֵ/חֲצִ֨י מַטֵּ֧ה מְנַשֶּׁ֛ה בַּ/גּוֹרָ֖ל עָרִ֥ים עָֽשֶׂר־־׃ס
translation:
  text: And for the remaining sons of Kohath, from the clans of the tribe of Ephraim,
    from the tribe of Dan, and from the half-tribe of Manasseh, there were by lot
    ten cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest of the Kohathites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  chosen: And for the sons of
  alternatives:
  - And to the sons of
  - And for the descendants of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with בנים introduces the next
    allocation group. 'For the sons of' is natural English in a distribution context
    and preserves the dative sense better than a bare 'to' while keeping the genealogical
    expression.
- source_word: קְהָת
  chosen: Kohath
  lexicon: HALOT
  rationale: Proper personal/clan name; transliterated per translation philosophy.
- source_word: הַנּוֹתָרִים
  chosen: the remaining
  alternatives:
  - who remained
  - the rest of
  lexicon: HALOT
  rationale: The participle from יתר/נותר marks the subset of Kohathites not already
    specified in the previous verse. 'The remaining' is concise and idiomatic in English.
- source_word: מִמִּשְׁפְּחֹת
  chosen: from the clans of
  alternatives:
  - from the families of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-allotment contexts often refers to clan-level subdivisions
    within a tribe. 'Clans' better reflects the social unit here than the more generic
    'families.'
- source_word: מַטֵּה אֶפְרַיִם
  chosen: the tribe of Ephraim
  alternatives:
  - the staff/tribe of Ephraim
  lexicon: HALOT
  rationale: מַטֶּה in this context clearly denotes a tribal unit, not a literal staff.
    Standard rendering is 'tribe of Ephraim.'
- source_word: וּמִמַּטֵּה דָן
  chosen: from the tribe of Dan
  lexicon: HALOT
  rationale: Parallel to the preceding phrase; repeated 'from' is retained for clarity
    and to reflect the Hebrew structure.
- source_word: וּמֵחֲצִי מַטֵּה מְנַשֶּׁה
  chosen: from the half-tribe of Manasseh
  alternatives:
  - from half the tribe of Manasseh
  lexicon: HALOT
  rationale: Conventional and clear rendering for the territorial division of Manasseh.
    The construct chain is naturally expressed as 'half-tribe of Manasseh.'
- source_word: בַּגּוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  - by allotment
  lexicon: HALOT
  rationale: The phrase indicates the means by which the cities were assigned. 'By
    lot' is the standard idiomatic English equivalent and preserves the procedural
    sense.
- source_word: עָרִים עָשֶׂר
  chosen: ten cities
  alternatives:
  - ten towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city' in allotment lists. 'Ten cities' is the straightforward
    rendering of the numeral phrase.
- source_word: implicit verbless clause
  chosen: there were
  alternatives:
  - they received
  - fell to them were
  rationale: The Hebrew is nominal/elliptical in list style. English requires a supplied
    verbal link. 'There were by lot ten cities' stays close to the source without
    over-interpreting with 'received,' though the distributive sense is clear from
    context.
