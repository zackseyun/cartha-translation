id: JOS.21.16
reference: Joshua 21:16
source:
  edition: WLC
  text: וְ/אֶת עַ֣יִן וְ/אֶת מִגְרָשֶׁ֗/הָ וְ/אֶת יֻטָּה֙ וְ/אֶת מִגְרָשֶׁ֔/הָ אֶת
    בֵּ֥ית שֶׁ֖מֶשׁ וְ/אֶת מִגְרָשֶׁ֑/הָ עָרִ֣ים תֵּ֔שַׁע מֵ/אֵ֕ת שְׁנֵ֥י הַ/שְּׁבָטִ֖ים
    הָ/אֵֽלֶּה־־־־־־׃פ
translation:
  text: Ain with its pasturelands, Juttah with its pasturelands, Beth-shemesh with
    its pasturelands—nine cities from these two tribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'surrounding lands' for the land belonging to each
      city.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  chosen: Ain
  alternatives:
  - Ayin
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy to transliterate names. 'Ain' is a standard English form, though
    'Ayin' is a possible closer transliteration.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common land
  - its surrounding land
  - its grazing land
  lexicon: HALOT
  rationale: Refers to the land attached to a town for use, especially open land for
    grazing. 'Pasturelands' is a natural modern rendering that preserves the concrete
    sense better than the older 'suburbs' and is more specific than the broader 'surrounding
    land.'
- source_word: יֻטָּה
  chosen: Juttah
  alternatives:
  - Yuttah
  lexicon: HALOT
  rationale: Proper place name; rendered by standard English transliteration 'Juttah.'
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - بيت Shemesh
  - House of the Sun
  lexicon: HALOT
  rationale: Place name retained by transliteration rather than translated. Although
    the components mean 'house of the sun,' the referent here is the established town
    name.
- source_word: עָרִים תֵּשַׁע
  chosen: nine cities
  alternatives:
  - nine towns
  lexicon: HALOT
  rationale: Standard administrative term for settled population centers. 'Cities'
    is the conventional and sufficiently accurate rendering in this allotment context.
- source_word: מֵאֵת שְׁנֵי הַשְּׁבָטִים הָאֵלֶּה
  chosen: from these two tribes
  alternatives:
  - out of these two tribes
  lexicon: HALOT
  rationale: Indicates source/allotment from the two tribes just named in the surrounding
    context. 'From these two tribes' is clear modern English and preserves the distributive
    sense.
