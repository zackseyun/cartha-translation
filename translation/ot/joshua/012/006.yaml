id: JOS.12.6
reference: Joshua 12:6
source:
  edition: WLC
  text: מֹשֶׁ֧ה עֶֽבֶד יְהוָ֛ה וּ/בְנֵ֥י יִשְׂרָאֵ֖ל הִכּ֑וּ/ם וַֽ֠/יִּתְּנָ/הּ מֹשֶׁ֨ה עֶֽבֶד יְהוָ֜ה יְרֻשָּׁ֗ה לָ/רֻֽאוּבֵנִי֙ וְ/לַ/גָּדִ֔י וְ/לַ/חֲצִ֖י שֵׁ֥בֶט הַֽ/מְנַשֶּֽׁה־־׃ס
translation:
  text: Moses the servant of Yahweh, and the sons of Israel, struck them down, and Moses the servant of Yahweh gave it as an inheritance to the Reubenites, the Gadites, and the half-tribe of Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  chosen: servant
  alternatives:
  - slave
  lexicon: HALOT
  rationale: In the title 'servant of the LORD,' עֶבֶד is a standard honorific for Moses denoting devoted service and commissioned status rather than emphasizing bonded slavery. 'Servant' is the most natural and contextually appropriate English rendering here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Because the translation philosophy prefers gender-accurate renderings where the source is explicitly masculine and representative, 'the sons of Israel' best reflects the form of the Hebrew here. 'The Israelites' is idiomatic but less transparent to the source wording.
- source_word: הִכּוּם
  chosen: struck them down
  alternatives:
  - defeated them
  - struck them
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' and in military contexts can denote defeating or killing. 'Struck them down' preserves the concrete force of the Hebrew while fitting the battle summary context.
- source_word: וַיִּתְּנָהּ
  chosen: gave it
  alternatives:
  - gave her
  - assigned it
  lexicon: HALOT
  rationale: The 3fs suffix refers back to the land/territory understood from context. English idiom requires 'it' rather than a feminine pronoun. 'Gave it' is the plain sense of נתן.
- source_word: יְרֻשָּׁה
  chosen: as an inheritance
  alternatives:
  - for a possession
  - as a hereditary possession
  lexicon: HALOT
  rationale: יְרֻשָּׁה denotes inherited possession or inheritance. 'As an inheritance' is clear modern English and preserves the covenant-land nuance without sounding overly technical.
- source_word: לָרֻאוּבֵנִי
  chosen: to the Reubenites
  alternatives:
  - to the Reubenite clan
  - to Reuben
  lexicon: HALOT
  rationale: The gentilic singular with prefixed ל functions collectively for the tribal group. 'To the Reubenites' communicates the intended collective referent in natural English.
- source_word: לַגָּדִי
  chosen: the Gadites
  alternatives:
  - the Gadite clan
  - Gad
  lexicon: HALOT
  rationale: As with 'Reubenites,' the gentilic singular is collective in context, referring to the tribe descended from Gad.
- source_word: חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the conventional and accurate rendering of the construct phrase, referring to the eastern half of Manasseh that received land before the Jordan crossing.
