id: JOS.12.20
reference: Joshua 12:20
source:
  edition: WLC
  text: מֶ֣לֶךְ שִׁמְר֤וֹן מְראוֹן֙ אֶחָ֔ד מֶ֥לֶךְ אַכְשָׁ֖ף אֶחָֽד׃
translation:
  text: the king of Shimron-meron, one; the king of Achshaph, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly two separate place names, 'Shimron' and 'Meron'; the Hebrew
      is commonly taken here as the compound name 'Shimron-meron,' which fits the
      verse's count of two kings.
    reason: alternative_reading
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'In this conquest-list formula, מֶלֶךְ introduces each city-state ruler.
    English idiom naturally supplies the definite article in list form: ''the king
    of X, one.'''
- source_word: שִׁמְרוֹן מְראוֹן
  chosen: Shimron-meron
  alternatives:
  - Shimron, Meron
  - Shimron-meron
  lexicon: HALOT
  rationale: The Masoretic pointing and accentuation are commonly understood as the
    compound place-name 'Shimron-meron' in Joshua 12:20 rather than two separate entries.
    Since the verse counts only two kings total, a compound toponym best fits the
    structure. The name is transliterated rather than translated, per project policy
    for place names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: 'In this chapter''s repeated tally formula, אֶחָד functions elliptically
    as the count for each listed king: ''one.'' Retaining the concise numeral preserves
    the source''s cadence and structure.'
- source_word: אַכְשָׁף
  chosen: Achshaph
  alternatives:
  - Akshaph
  lexicon: HALOT
  rationale: Proper place name transliterated into standard English biblical form.
    'Achshaph' is the conventional transliteration and is readily recognizable.
