id: JOS.12.17
reference: Joshua 12:17
source:
  edition: WLC
  text: מֶ֤לֶךְ תַּפּ֨וּחַ֙ אֶחָ֔ד מֶ֥לֶךְ חֵ֖פֶר אֶחָֽד׃
translation:
  text: the king of Tappuah, one; the king of Hepher, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'the king of Tappuah, one; the king of Hepher, one'
      = 'the king of Tappuah, one; the king of Hepher, one,' counting each defeated
      king individually in the list.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Construct form introducing each city ruler in this conquest list. English
    supplies the definite article naturally for this enumerative formula.
- source_word: תַּפּוּחַ
  chosen: Tappuah
  lexicon: HALOT
  rationale: Place name; transliterated rather than translated in keeping with the
    policy to transliterate names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Cardinal number used elliptically in this list to count each defeated
    king. Rendering it as 'one' preserves the terse repetitive structure of the Hebrew.
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Repeated construct phrase for the second entry in the list; translated
    consistently with the first occurrence.
- source_word: חֵפֶר
  chosen: Hepher
  lexicon: HALOT
  rationale: Place name; transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Same elliptical counting formula as the first occurrence; kept consistent
    to mirror the Hebrew list style.
