id: JOS.12.2
reference: Joshua 12:2
source:
  edition: WLC
  text: סִיחוֹן֙ מֶ֣לֶךְ הָ/אֱמֹרִ֔י הַ/יּוֹשֵׁ֖ב בְּ/חֶשְׁבּ֑וֹן מֹשֵׁ֡ל מֵ/עֲרוֹעֵ֡ר
    אֲשֶׁר֩ עַל שְׂפַת נַ֨חַל אַרְנ֜וֹן וְ/ת֤וֹךְ הַ/נַּ֨חַל֙ וַ/חֲצִ֣י הַ/גִּלְעָ֔ד
    וְ/עַד֙ יַבֹּ֣ק הַ/נַּ֔חַל גְּב֖וּל בְּנֵ֥י עַמּֽוֹן־־׃
translation:
  text: Sihon king of the Amorites, who lived in Heshbon, ruling from Aroer, which
    is on the bank of the Arnon Valley, and from the middle of the valley, and half
    of Gilead, as far as the Jabbok Valley, the border of the sons of Ammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Ammon'; that is, the Ammonites.
    reason: lexical_alternative
  - marker: b
    text: Hebrew נחל can denote a valley, wadi, or streambed; here it refers to the
      Arnon and Jabbok as territorial boundaries.
    reason: cultural_note
lexical_decisions:
- source_word: הַיּוֹשֵׁב
  chosen: who lived
  alternatives:
  - who dwelt
  - who was living
  - who sat
  lexicon: HALOT
  rationale: The participle of ישב commonly denotes residing or dwelling. 'Who lived'
    is natural modern English while preserving the residential sense better than the
    overly literal 'sat.'
- source_word: מֹשֵׁל
  chosen: ruling
  alternatives:
  - governing
  - having dominion
  lexicon: HALOT
  rationale: The participle of משל here describes active political rule over the territory
    that follows. 'Ruling' is concise and idiomatic in English.
- source_word: מֵעֲרוֹעֵר
  chosen: from Aroer
  alternatives:
  - beginning at Aroer
  lexicon: HALOT
  rationale: The preposition מ marks the starting point of the territorial extent.
    'From Aroer' is the most direct rendering.
- source_word: שְׂפַת נַחַל אַרְנוֹן
  chosen: the bank of the Arnon Valley
  alternatives:
  - the edge of the Arnon wadi
  - the lip of the Arnon Valley
  - the bank of the Arnon River
  lexicon: HALOT
  rationale: שפה is 'lip/edge/bank' and נחל often denotes a wadi or valley stream.
    'Bank of the Arnon Valley' preserves the topographical sense without forcing a
    strictly perennial-river image.
- source_word: וְתוֹךְ הַנַּחַל
  chosen: and from the middle of the valley
  alternatives:
  - and the middle of the valley
  - including the middle of the valley
  - and within the valley
  lexicon: HALOT
  rationale: תוך means 'midst/middle.' Because the verse is listing the extent of
    Sihon's rule, English benefits from supplying 'from' elliptically to match the
    territorial sequence. This keeps the sense of possession extending from Aroer
    and the middle of the valley.
- source_word: וַחֲצִי הַגִּלְעָד
  chosen: and half of Gilead
  alternatives:
  - and the half of Gilead
  lexicon: HALOT
  rationale: חצי denotes a half-portion. The phrase is territorial and straightforwardly
    rendered.
- source_word: וְעַד יַבֹּק הַנַּחַל
  chosen: as far as the Jabbok Valley
  alternatives:
  - to the Jabbok wadi
  - as far as the Jabbok River
  lexicon: HALOT
  rationale: עד marks the endpoint of the territory. As with Arnon, נחל is best rendered
    with a valley/wadi sense in this context.
- source_word: גְּבוּל בְּנֵי עַמּוֹן
  chosen: the border of the sons of Ammon
  alternatives:
  - the border of the Ammonites
  - the boundary of the people of Ammon
  lexicon: HALOT
  rationale: בני עמון is literally 'sons of Ammon.' This preserves the Hebrew ethnonymic
    construction while remaining readable. 'Border' fits the territorial context.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular in apposition to 'king,' English idiom
    prefers 'king of the Amorites' for the people group rather than 'king of the Amorite.'
