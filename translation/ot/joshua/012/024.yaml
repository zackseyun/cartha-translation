id: JOS.12.24
reference: Joshua 12:24
source:
  edition: WLC
  text: מֶ֥לֶךְ תִּרְצָ֖ה אֶחָ֑ד כָּל מְלָכִ֖ים שְׁלֹשִׁ֥ים וְ/אֶחָֽד־׃פ
translation:
  text: the king of Tirzah, one; all the kings, thirty-one.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Construct form with the following place name; rendered with the English
    article for natural enumeration in the list of defeated kings.
- source_word: תִּרְצָה
  chosen: Tirzah
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy to preserve
    the name rather than translate it.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number indicating one king for this city in the list format.
- source_word: כָּל
  chosen: all
  alternatives:
  - total
  lexicon: HALOT
  rationale: Summative term introducing the final tally of the listed kings; 'all'
    preserves the straightforward lexical sense.
- source_word: מְלָכִים
  chosen: the kings
  alternatives:
  - kings
  lexicon: HALOT
  rationale: Plural noun in the summary clause; rendered with the article in English
    to mark the specific set just enumerated.
- source_word: שְׁלֹשִׁים וְאֶחָד
  chosen: thirty-one
  alternatives:
  - thirty and one
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew compound number in the concluding
    total.
