id: JOS.12.14
reference: Joshua 12:14
source:
  edition: WLC
  text: מֶ֤לֶךְ חָרְמָה֙ אֶחָ֔ד מֶ֥לֶךְ עֲרָ֖ד אֶחָֽד׃
translation:
  text: the king of Hormah, one; the king of Arad, one.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'Construct form introducing each city ruler in this conquest list. English
    idiom naturally supplies the definite article: ''the king of Hormah/Arad.'''
- source_word: חָרְמָה
  chosen: Hormah
  lexicon: HALOT
  rationale: Place name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Cardinal numeral used elliptically in this repetitive list to count each
    defeated king. Rendering simply as 'one' preserves the Hebrew structure and cadence.
- source_word: עֲרָד
  chosen: Arad
  lexicon: HALOT
  rationale: Place name; transliterated according to standard English convention.
