id: JOS.12.8
reference: Joshua 12:8
source:
  edition: WLC
  text: בָּ/הָ֣ר וּ/בַ/שְּׁפֵלָ֗ה וּ/בָֽ/עֲרָבָה֙ וּ/בָ֣/אֲשֵׁד֔וֹת וּ/בַ/מִּדְבָּ֖ר
    וּ/בַ/נֶּ֑גֶב הַֽ/חִתִּי֙ הָֽ/אֱמֹרִ֔י וְ/הַֽ/כְּנַעֲנִי֙ הַ/פְּרִזִּ֔י הַ/חִוִּ֖י
    וְ/הַ/יְבוּסִֽי׃פ
translation:
  text: in the hill country, and in the lowland, and in the Arabah, and on the slopes,
    and in the wilderness, and in the Negev—the Hittites, the Amorites, and the Canaanites,
    the Perizzites, the Hivites, and the Jebusites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the Shephelah,” the name of the western lowland/foothill region.
    reason: lexical_alternative
  - marker: b
    text: “Arabah” is a regional name for the rift valley/desert plain; alternatively,
      “the desert plain.”
    reason: lexical_alternative
  - marker: c
    text: Or “in the south country”; Hebrew Negev can denote both the southern region
      and ‘south.’
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountains
  - in the hill country
  lexicon: HALOT
  rationale: הַר literally denotes 'mountain/hill country.' In this territorial summary,
    the regional sense is primary rather than a single mountain, so 'hill country'
    best fits the geographic catalog.
- source_word: וּבַשְּׁפֵלָה
  chosen: and in the lowland
  alternatives:
  - and in the Shephelah
  - and in the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה refers to the lowland region, often the Judean foothills. 'Lowland'
    gives an accessible translation in running text; the transliterated regional name
    'Shephelah' is possible but less transparent for general readers.
- source_word: וּבָעֲרָבָה
  chosen: and in the Arabah
  alternatives:
  - and in the desert plain
  - and in the Jordan Valley
  lexicon: HALOT
  rationale: עֲרָבָה can denote the rift valley/desert plain region. Because it functions
    here as a recognized geographic designation, 'Arabah' preserves the place-name
    force better than a generalized topographic gloss.
- source_word: וּבָאֲשֵׁדוֹת
  chosen: and on the slopes
  alternatives:
  - and on the slopes
  - and in the foothills
  lexicon: HALOT
  rationale: אֲשֵׁדוֹת denotes slopes or declivities, especially mountain slopes.
    'On the slopes' is the most direct and natural rendering in this list of terrains.
- source_word: וּבַמִּדְבָּר
  chosen: and in the wilderness
  alternatives:
  - and in the wilderness
  - and in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes sparsely inhabited steppe/wilderness rather than
    sandy desert specifically. 'Wilderness' is the broader and more biblically consistent
    choice.
- source_word: וּבַנֶּגֶב
  chosen: and in the Negev
  alternatives:
  - and in the south country
  - and in the Negev
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or the specific southern region. In this geographic
    sequence it is best taken as the proper regional designation 'Negev.'
- source_word: הַחִתִּי
  chosen: the Hittites
  alternatives:
  - the Hittite
  lexicon: HALOT
  rationale: 'Although morphologically singular, these ethnonyms function collectively.
    English idiom prefers plural ethnonyms in such lists: ''the Hittites.'''
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Collective singular in Hebrew is rendered by the natural English plural
    ethnonym in a list of peoples.
- source_word: וְהַכְּנַעֲנִי
  chosen: and the Canaanites
  alternatives:
  - and the Canaanite
  lexicon: HALOT
  rationale: As with the surrounding ethnonyms, the collective sense is best represented
    by the English plural.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  alternatives:
  - the Perizzite
  lexicon: HALOT
  rationale: Collective ethnic designation rendered idiomatically in English as a
    plural people-group.
- source_word: הַחִוִּי
  chosen: the Hivites
  alternatives:
  - the Hivite
  lexicon: HALOT
  rationale: Collective ethnic designation rendered idiomatically in English as a
    plural people-group.
- source_word: וְהַיְבוּסִי
  chosen: and the Jebusites
  alternatives:
  - and the Jebusite
  lexicon: HALOT
  rationale: Collective ethnic designation rendered idiomatically in English as a
    plural people-group.
