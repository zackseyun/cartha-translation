id: JOS.12.13
reference: Joshua 12:13
source:
  edition: WLC
  text: מֶ֤לֶךְ דְּבִר֙ אֶחָ֔ד מֶ֥לֶךְ גֶּ֖דֶר אֶחָֽד׃
translation:
  text: the king of Debir, one; the king of Geder, one.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: In this catalog of defeated kings, מֶלֶךְ introduces each city-name in
    a construct-like relationship best rendered idiomatically in English as 'the king
    of [place].' The article is supplied naturally in English though absent in Hebrew.
- source_word: דְּבִר
  chosen: Debir
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention
    rather than translated.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Here אֶחָד gives the tally for each listed king in the conquest summary.
    Rendering it as 'one' preserves the terse enumerative style of the Hebrew list.
- source_word: גֶּדֶר
  chosen: Geder
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention
    rather than translated.
