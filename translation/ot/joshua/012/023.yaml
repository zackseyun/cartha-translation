id: JOS.12.23
reference: Joshua 12:23
source:
  edition: WLC
  text: מֶ֥לֶךְ דּ֛וֹר לְ/נָפַ֥ת דּ֖וֹר אֶחָ֑ד מֶֽלֶךְ גּוֹיִ֥ם לְ/גִלְגָּ֖ל אֶחָֽד־׃
translation:
  text: the king of Dor in the heights of Dor, one; the king of Goiim in Gilgal, one;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king of the nations in Gilgal, one.' The Hebrew גּוֹיִם usually
      means 'nations' or 'peoples,' but here it may function as a place-name or territorial
      label.
    reason: alternative_reading
  - marker: b
    text: The phrase rendered 'in the heights of Dor' may also be understood more
      generally as 'in the district/region of Dor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: In this list of defeated kings, מֶלֶךְ introduces each entry as a construct,
    'king of ...'. English idiom naturally supplies the article in this catalog format.
- source_word: דּוֹר
  chosen: Dor
  lexicon: HALOT
  rationale: Place name; transliterated according to the translation philosophy to
    transliterate names rather than translate them.
- source_word: לְנָפַת
  chosen: in the heights of
  alternatives:
  - belonging to the region of
  - in Naphath
  - in the district of
  lexicon: HALOT
  rationale: נָפָה/נָפַת in this geographical expression refers to an elevated region
    or district. 'In the heights of Dor' preserves the likely topographical sense
    better than leaving the term untranslated, while remaining readable.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: In Joshua 12 the repeated אֶחָד functions as a tally marker after each
    listed king. Rendering it simply as 'one' preserves the terse enumerative style
    of the Hebrew.
- source_word: גּוֹיִם
  chosen: Goiim
  alternatives:
  - nations
  lexicon: HALOT
  rationale: Although גּוֹיִם commonly means 'nations,' here in the construct phrase
    'king of Goiim' it is widely taken as a place or territorial designation in this
    conquest list. Transliteration avoids over-interpreting the referent in the main
    text while preserving the form of the Hebrew.
- source_word: לְגִלְגָּל
  chosen: in Gilgal
  alternatives:
  - of Gilgal
  - at Gilgal
  lexicon: HALOT
  rationale: The prefixed ל in these list formulas can mark relation to a locality.
    'In Gilgal' is a natural English rendering for a king associated with that place,
    while keeping the geographical linkage explicit.
