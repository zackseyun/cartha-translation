id: JOS.12.12
reference: Joshua 12:12
source:
  edition: WLC
  text: מֶ֤לֶךְ עֶגְלוֹן֙ אֶחָ֔ד מֶ֥לֶךְ גֶּ֖זֶר אֶחָֽד׃
translation:
  text: the king of Eglon, one; the king of Gezer, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more expansively, 'the king of Eglon, one king; the king of Gezer, one
      king.' The Hebrew simply repeats 'one' as a tally in the list.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ as 'king.' In this list structure, English
    naturally includes the article ('the king of ...') even though Hebrew expresses
    the construct chain without a separate article here.
- source_word: עֶגְלוֹן
  chosen: Eglon
  rationale: Proper place name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: In this conquest list, אֶחָד functions as an enumerative tally, 'one.'
    Rendering it simply as 'one' preserves the terse repetitive style of the Hebrew.
    'One king' is interpretive and more expansive than the source wording.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Repeated identically in the second clause and rendered consistently.
- source_word: גֶּזֶר
  chosen: Gezer
  rationale: Proper place name transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Again rendered as the numerical tally 'one' to match the Hebrew list
    format and maintain consistency within the verse.
