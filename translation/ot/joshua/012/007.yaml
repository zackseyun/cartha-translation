id: JOS.12.7
reference: Joshua 12:7
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה מַלְכֵ֣י הָ/אָ֡רֶץ אֲשֶׁר֩ הִכָּ֨ה יְהוֹשֻׁ֜עַ וּ/בְנֵ֣י יִשְׂרָאֵ֗ל
    בְּ/עֵ֤בֶר הַ/יַּרְדֵּן֙ יָ֔מָּ/ה מִ/בַּ֤עַל גָּד֙ בְּ/בִקְעַ֣ת הַ/לְּבָנ֔וֹן
    וְ/עַד הָ/הָ֥ר הֶ/חָלָ֖ק הָ/עֹלֶ֣ה שֵׂעִ֑ירָ/ה וַ/יִּתְּנָ֨/הּ יְהוֹשֻׁ֜עַ לְ/שִׁבְטֵ֧י
    יִשְׂרָאֵ֛ל יְרֻשָּׁ֖ה כְּ/מַחְלְקֹתָֽ/ם־׃
translation:
  text: And these are the kings of the land whom Joshua and the sons of Israel struck
    down beyond the Jordan to the west, from Baal-gad in the Valley of Lebanon as
    far as Mount Halak, which rises toward Seir; and Joshua gave it to the tribes
    of Israel as an inheritance according to their divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that goes up to Seir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: HALOT
  rationale: Introduces the following list. Including 'And' preserves the Hebrew conjunction
    and the narrative linkage to the preceding section.
- source_word: מַלְכֵי הָאָרֶץ
  chosen: the kings of the land
  alternatives:
  - the kings of the country
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Land' is preferred for consistency
    with territorial language in Joshua and to avoid over-specifying as a modern nation-state.
- source_word: אֲשֶׁר הִכָּה
  chosen: whom ... struck down
  alternatives:
  - whom ... defeated
  - whom ... smote
  lexicon: HALOT
  rationale: נכה in conquest contexts commonly denotes striking/defeating in battle.
    'Struck down' preserves the force of the verb without archaic diction.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: and the sons of Israel
  alternatives:
  - and the Israelites
  - and the people of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Because the translation philosophy
    prefers gender-accurate renderings where the source is masculine, the more literal
    expression is retained here rather than flattening to 'Israelites.'
- source_word: בְּעֵבֶר הַיַּרְדֵּן יָמָּה
  chosen: beyond the Jordan to the west
  alternatives:
  - on the other side of the Jordan westward
  - across the Jordan westward
  lexicon: HALOT
  rationale: This phrase marks the west side of the Jordan from the narrator's frame.
    'Beyond the Jordan to the west' is natural English while preserving the directional
    note carried by יָמָּה.
- source_word: מִבַּעַל גָּד
  chosen: from Baal-gad
  lexicon: HALOT
  rationale: Place name is transliterated in keeping with the philosophy of transliterating
    names.
- source_word: בְּבִקְעַת הַלְּבָנוֹן
  chosen: in the Valley of Lebanon
  alternatives:
  - in the plain of Lebanon
  - in the valley of Lebanon
  lexicon: HALOT
  rationale: בִּקְעָה denotes a broad valley/plain. 'Valley' is idiomatic and sufficiently
    precise here; capitalization reflects a geographic designation.
- source_word: וְעַד הָהָר הֶחָלָק
  chosen: as far as Mount Halak
  alternatives:
  - to Mount Halak
  - as far as the smooth mountain
  lexicon: HALOT
  rationale: The phrase functions as a toponym in context. Transliteration of the
    established place name is preferable to a literal descriptive rendering, which
    would sound unnatural and obscure the geographic reference.
- source_word: הָעֹלֶה שֵׂעִירָה
  chosen: which rises toward Seir
  alternatives:
  - that goes up to Seir
  - ascending to Seir
  lexicon: HALOT
  rationale: The participle modifies Mount Halak and describes its ascent/direction.
    'Rises toward Seir' is readable modern English and preserves the topographical
    sense without overstating exact destination.
- source_word: וַיִּתְּנָהּ
  chosen: and Joshua gave it
  alternatives:
  - and he gave it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to 'the land.' Repeating 'Joshua'
    in English matches the Hebrew explicit subject and avoids ambiguity.
- source_word: לְשִׁבְטֵי יִשְׂרָאֵל
  chosen: to the tribes of Israel
  lexicon: HALOT
  rationale: Standard rendering of the tribal allotment formula in Joshua.
- source_word: יְרֻשָּׁה
  chosen: as an inheritance
  alternatives:
  - for a possession
  - as a possession
  lexicon: HALOT
  rationale: '''Inheritance'' best captures the covenantal-land allotment sense and
    is standard in Joshua''s distribution language.'
- source_word: כְּמַחְלְקֹתָם
  chosen: according to their divisions
  alternatives:
  - according to their allotments
  - by their portions
  lexicon: HALOT
  rationale: The noun refers to divisions/distributions among the tribes. 'According
    to their divisions' stays close to the Hebrew while fitting the context of tribal
    apportionment.
