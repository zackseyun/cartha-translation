id: JOS.12.4
reference: Joshua 12:4
source:
  edition: WLC
  text: וּ/גְב֗וּל ע֚וֹג מֶ֣לֶךְ הַ/בָּשָׁ֔ן מִ/יֶּ֖תֶר הָ/רְפָאִ֑ים הַ/יּוֹשֵׁ֥ב
    בְּ/עַשְׁתָּר֖וֹת וּ/בְ/אֶדְרֶֽעִי׃
translation:
  text: and the territory of Og king of Bashan, from the remnant of the Rephaim, who
    lived in Ashtaroth and in Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the giants.' The Hebrew Rephaim can refer to an ancient people remembered
      as unusually great in stature.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/גְב֗וּל
  chosen: and the territory of
  alternatives:
  - and the border of
  - and the region of
  lexicon: HALOT
  rationale: גְּבוּל can denote border, boundary, territory, or region. In this conquest-summary
    context, the sense is the extent/domain under Og's rule rather than a single boundary
    line, so 'territory' best fits natural English while preserving the geographic
    sense. The prefixed ו is rendered 'and' to continue the list from the previous
    verse.
- source_word: ע֚וֹג
  chosen: Og
  rationale: Proper personal name; transliterated according to the translation philosophy.
- source_word: מֶ֣לֶךְ הַ/בָּשָׁ֔ן
  chosen: king of Bashan
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Og's royal domain. 'Bashan'
    is a place name and is transliterated.
- source_word: מִ/יֶּ֖תֶר
  chosen: from the remnant of
  alternatives:
  - from the rest of
  - from what remained of
  lexicon: HALOT
  rationale: יֶתֶר here denotes what is left over or remaining. 'Remnant' is concise
    and idiomatic in English, and it preserves the idea that Og belonged to those
    left from an earlier group.
- source_word: הָ/רְפָאִ֑ים
  chosen: the Rephaim
  alternatives:
  - the giants
  lexicon: HALOT
  rationale: רְפָאִים is best retained as the ethnonym/toponymic people-group name
    'Rephaim' rather than interpreted as 'giants' in the main text. This avoids importing
    an explanatory gloss into the translation. Because many readers associate the
    term with giant-like ancient peoples, that interpretive alternative is preserved
    in a footnote.
- source_word: הַ/יּוֹשֵׁ֥ב
  chosen: who lived
  alternatives:
  - who dwelt
  - who was living
  - who sat enthroned
  lexicon: HALOT
  rationale: The participle of ישב commonly means to dwell/live/reside. Singular agreement
    points back to Og rather than to the Rephaim collectively. 'Who lived' is clear
    modern English; 'dwelt' is more formal but less natural.
- source_word: בְּ/עַשְׁתָּר֖וֹת
  chosen: in Ashtaroth
  rationale: Place name; transliterated. The preposition ב is rendered 'in' for residence/location.
- source_word: וּ/בְ/אֶדְרֶֽעִי
  chosen: and in Edrei
  rationale: 'Place name; transliterated. The conjunction and preposition are both
    represented: ''and in Edrei.'''
