id: JOS.12.22
reference: Joshua 12:22
source:
  edition: WLC
  text: מֶ֤לֶךְ קֶ֨דֶשׁ֙ אֶחָ֔ד מֶֽלֶךְ יָקְנֳעָ֥ם לַ/כַּרְמֶ֖ל אֶחָֽד־׃
translation:
  text: the king of Kedesh, one; the king of Jokneam by Carmel, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king of Jokneam in Carmel.' The Hebrew phrase may indicate location
      or regional association.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'In this catalog of defeated kings, מֶלֶךְ introduces each city-state
    ruler. English idiom naturally supplies the definite article in this list format:
    ''the king of X, one.'''
- source_word: קֶדֶשׁ
  chosen: Kedesh
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Retains the repetitive tallying style of Joshua 12, where each entry
    concludes with the count 'one.'
- source_word: יָקְנֳעָם
  chosen: Jokneam
  alternatives:
  - Jokneam
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration.
- source_word: לַ/כַּרְמֶל
  chosen: by Carmel
  alternatives:
  - in Carmel
  - belonging to Carmel
  - of Carmel
  lexicon: HALOT
  rationale: 'The prefixed ל with the place name likely marks location/association:
    Jokneam situated at or by Carmel. ''By Carmel'' is concise, natural English and
    avoids over-specifying whether the reference is to Mount Carmel or the Carmel
    region.'
