id: JOS.12.15
reference: Joshua 12:15
source:
  edition: WLC
  text: מֶ֤לֶךְ לִבְנָה֙ אֶחָ֔ד מֶ֥לֶךְ עֲדֻלָּ֖ם אֶחָֽד׃
translation:
  text: the king of Libnah, one; the king of Adullam, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically in English: ''the king of Libnah, one; the king
      of Adullam, one king.'' The Hebrew simply repeats ''one'' as a tally formula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'Construct form introducing each city-state ruler in this tally list.
    The English article is supplied naturally in list style: ''the king of Libnah
    ... the king of Adullam ...''.'
- source_word: לִבְנָה
  chosen: Libnah
  lexicon: HALOT
  rationale: Place name; transliterated rather than translated in keeping with the
    translation philosophy for names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Cardinal number marking the count for each listed king in the conquest
    summary. Rendered simply as 'one' to mirror the terse Hebrew enumeration.
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Repeated construct form for the second entry in the list; rendered consistently
    with the first occurrence.
- source_word: עֲדֻלָּם
  chosen: Adullam
  lexicon: HALOT
  rationale: Place name; transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Repeated cardinal number in the list formula; kept identical for consistency
    and to preserve the cadence of the Hebrew.
