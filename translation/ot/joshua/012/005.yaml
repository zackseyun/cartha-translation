id: JOS.12.5
reference: Joshua 12:5
source:
  edition: WLC
  text: וּ֠/מֹשֵׁל בְּ/הַ֨ר חֶרְמ֤וֹן וּ/בְ/סַלְכָה֙ וּ/בְ/כָל הַ/בָּשָׁ֔ן עַד גְּב֥וּל
    הַ/גְּשׁוּרִ֖י וְ/הַ/מַּעֲכָתִ֑י וַ/חֲצִי֙ הַ/גִּלְעָ֔ד גְּב֖וּל סִיח֥וֹן מֶֽלֶךְ
    חֶשְׁבּֽוֹן־־־׃
translation:
  text: and ruling over Mount Hermon, and Salecah, and all Bashan, as far as the border
    of the Geshurites and the Maacathites, and half of Gilead, to the border of Sihon
    king of Heshbon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he ruled over Mount Hermon, Salecah, and all Bashan.' The Hebrew
      uses a participle continuing the description from the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֹשֵׁל
  chosen: and ruling over
  alternatives:
  - and he ruled over
  - and was ruling over
  - and ruler over
  lexicon: HALOT
  rationale: The participle of משל continues the description of Og's territory from
    the previous verse. English participial 'ruling over' preserves the syntactic
    linkage better than starting a new finite clause, while conveying ongoing dominion.
- source_word: בְּהַר חֶרְמוֹן
  chosen: over Mount Hermon
  alternatives:
  - in Mount Hermon
  - at Mount Hermon
  lexicon: HALOT
  rationale: The preposition ב with משל marks the domain ruled. 'Over Mount Hermon'
    is idiomatic in English for territorial rule; 'Mount Hermon' is the standard transliteration
    of the place name.
- source_word: וּבְסַלְכָה
  chosen: and Salecah
  alternatives:
  - and Salcah
  - and Salkah
  lexicon: HALOT
  rationale: A place name in Og's realm. 'Salecah' follows a conventional English
    biblical form and keeps the item as a proper name without over-transliteration.
- source_word: וּבְכָל הַבָּשָׁן
  chosen: and all Bashan
  alternatives:
  - and in all Bashan
  - and over all Bashan
  lexicon: HALOT
  rationale: The phrase names the full region under his rule. 'All Bashan' is the
    natural English rendering; the governing sense of rule is already supplied by
    'ruling over,' so repeating 'over' is unnecessary.
- source_word: עַד גְּבוּל
  chosen: as far as the border of
  alternatives:
  - to the border of
  - up to the territory of
  lexicon: HALOT
  rationale: עַד with גְּבוּל marks territorial extent. 'As far as the border of'
    clearly expresses the limit of the domain.
- source_word: הַגְּשׁוּרִי
  chosen: the Geshurites
  alternatives:
  - the Geshurite territory
  - the Geshurite
  lexicon: HALOT
  rationale: Although morphologically singular gentilic, in English the ethnic/plural
    form best conveys the people whose border is in view.
- source_word: וְהַמַּעֲכָתִי
  chosen: and the Maacathites
  alternatives:
  - and the Maacathite territory
  - and the Maacathite
  lexicon: HALOT
  rationale: As with 'Geshurites,' the gentilic is best represented by the people-group
    in English.
- source_word: וַחֲצִי הַגִּלְעָד
  chosen: and half of Gilead
  alternatives:
  - and the half of Gilead
  - and half the Gilead
  lexicon: HALOT
  rationale: A territorial designation. English idiom prefers 'half of Gilead' for
    the portion under discussion.
- source_word: גְּבוּל סִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  chosen: to the border of Sihon king of Heshbon
  alternatives:
  - the border of Sihon, king of Heshbon
  - up to the territory of Sihon king of Heshbon
  lexicon: HALOT
  rationale: This final appositional phrase further defines the extent of the half
    of Gilead. Repeating 'to' in English clarifies the relation without adding new
    content. 'Sihon' and 'Heshbon' are standard transliterations.
