id: JOS.12.16
reference: Joshua 12:16
source:
  edition: WLC
  text: מֶ֤לֶךְ מַקֵּדָה֙ אֶחָ֔ד מֶ֥לֶךְ בֵּֽית אֵ֖ל אֶחָֽד־׃
translation:
  text: the king of Makkedah, one; the king of Bethel, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew preserves a terse list style: ''the king of Makkedah, one; the king
      of Bethel, one,'' with ''one'' indicating the count of each defeated king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'Construct form introducing each city-state ruler in this list. English
    idiom naturally supplies the article in this catalog format: ''the king of Makkedah
    ... the king of Bethel.'''
- source_word: מַקֵּדָה
  chosen: Makkedah
  alternatives:
  - Makedah
  rationale: Proper place name; transliterated rather than translated per translation
    philosophy.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: In this conquest list, אֶחָד functions as the tally 'one' after each
    named king. Retaining the terse numeral preserves the repetitive structure of
    the Hebrew.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - house of God
  lexicon: HALOT
  rationale: Established place name from בַּיִת + אֵל, but here clearly a toponym,
    so it is transliterated as 'Bethel' rather than translated etymologically.
