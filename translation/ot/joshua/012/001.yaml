id: JOS.12.1
reference: Joshua 12:1
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה מַלְכֵ֣י הָ/אָ֗רֶץ אֲשֶׁ֨ר הִכּ֤וּ בְנֵֽי יִשְׂרָאֵל֙ וַ/יִּֽרְשׁ֣וּ
    אֶת אַרְצָ֔/ם בְּ/עֵ֥בֶר הַ/יַּרְדֵּ֖ן מִזְרְחָ֣/ה הַ/שָּׁ֑מֶשׁ מִ/נַּ֤חַל אַרְנוֹן֙
    עַד הַ֣ר חֶרְמ֔וֹן וְ/כָל הָ/עֲרָבָ֖ה מִזְרָֽחָ/ה׀־־־־׃
translation:
  text: Now these are the kings of the land whom the sons of Israel struck down and
    whose land they took possession of beyond the Jordan, toward the sunrise, from
    the Wadi Arnon as far as Mount Hermon, and all the Arabah eastward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites'; Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'toward the rising of the sun,' that is, eastward.
    reason: lexical_alternative
  - marker: c
    text: '''Wadi'' refers to a streambed or torrent valley; some translations render
      ''brook'' or ''valley of the Arnon.'''
    reason: cultural_note
  - marker: d
    text: Or 'the plain'; 'Arabah' is a specific geographic term for the rift valley
      region.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: Introduces a new section while maintaining narrative continuity. 'Now'
    is a natural English discourse marker for Hebrew waw + demonstrative here.
- source_word: מַלְכֵי הָאָרֶץ
  chosen: the kings of the land
  alternatives:
  - the kings of the הארץ/region
  - the kings of the country
  lexicon: HALOT
  rationale: Formal rendering preserves the construct phrase. 'Land' is broad and
    fits the territorial summary context better than 'country' or 'region'.
- source_word: אֲשֶׁר הִכּוּ
  chosen: whom ... struck down
  alternatives:
  - whom ... defeated
  - whom ... struck
  lexicon: HALOT
  rationale: נכה commonly means to strike/smite, often with military defeat. 'Struck
    down' preserves the force without overstating death in every case.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate and closer to the Hebrew expression, in line with the
    stated philosophy. 'Israelites' is possible but less formally transparent.
- source_word: וַיִּרְשׁוּ אֶת אַרְצָם
  chosen: whose land they took possession of
  alternatives:
  - and they possessed their land
  - and they inherited their land
  lexicon: HALOT
  rationale: ירשׁ in conquest contexts often means to take possession/dispossess and
    possess. English restructuring with 'whose land' avoids awkward repetition while
    preserving sense.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: '''Beyond'' is a standard and concise rendering of בעבר. The following
    eastern locator clarifies the reference point.'
- source_word: מִזְרְחָה הַשָּׁמֶשׁ
  chosen: toward the sunrise
  alternatives:
  - to the east
  - east of the sunrising
  lexicon: HALOT
  rationale: Literally 'toward the rising of the sun.' 'Toward the sunrise' preserves
    the imagery better than the flatter 'to the east' while remaining readable.
- source_word: מִנַּחַל אַרְנוֹן
  chosen: from the Wadi Arnon
  alternatives:
  - from the Arnon Valley
  - from the brook Arnon
  - from the torrent valley of the Arnon
  lexicon: HALOT
  rationale: נחל denotes a wadi/torrent valley. 'Wadi' is geographically precise and
    increasingly familiar in modern English Bible translation.
- source_word: עַד הַר חֶרְמוֹן
  chosen: as far as Mount Hermon
  alternatives:
  - to Mount Hermon
  - up to Mount Hermon
  lexicon: HALOT
  rationale: '''As far as'' clearly marks territorial extent in English.'
- source_word: וְכָל הָעֲרָבָה
  chosen: and all the Arabah
  alternatives:
  - and all the plain
  - and all the Jordan Rift plain
  lexicon: HALOT
  rationale: עֲרָבָה can denote the Arabah/Jordan rift region. Retaining the toponym-like
    form avoids flattening a specific geographic term into a generic 'plain'.
- source_word: מִזְרָחָה
  chosen: eastward
  alternatives:
  - to the east
  - on the east
  lexicon: HALOT
  rationale: Adverbial rendering fits the closing geographic summary naturally in
    English.
