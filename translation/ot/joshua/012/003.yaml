id: JOS.12.3
reference: Joshua 12:3
source:
  edition: WLC
  text: וְ/הָ/עֲרָבָה֩ עַד יָ֨ם כִּנְר֜וֹת מִזְרָ֗חָ/ה וְ֠/עַד יָ֣ם הָ/עֲרָבָ֤ה יָם
    הַ/מֶּ֨לַח֙ מִזְרָ֔חָ/ה דֶּ֖רֶךְ בֵּ֣ית הַיְשִׁמ֑וֹת וּ/מִ֨/תֵּימָ֔ן תַּ֖חַת אַשְׁדּ֥וֹת
    הַ/פִּסְגָּֽה־־׃
translation:
  text: and the Arabah as far as the Sea of Kinnereth eastward, and as far as the
    Sea of the Arabah, the Salt Sea, eastward by way of Beth-jeshimoth, and on the
    south, below the slopes of Pisgah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain' for 'the Arabah'; here it likely refers to the specific Jordan
      rift region rather than a generic plain.
    reason: lexical_alternative
  - marker: b
    text: '''The Sea of the Arabah, the Salt Sea'' refers to what is later commonly
      called the Dead Sea.'
    reason: cultural_note
lexical_decisions:
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the plain
  - the Jordan Valley
  lexicon: HALOT
  rationale: Retained as the geographic proper name 'the Arabah' rather than the more
    generic 'plain,' since the context is a boundary description and the term refers
    to the well-known rift valley region.
- source_word: יָם כִּנְרוֹת
  chosen: the Sea of Kinnereth
  alternatives:
  - the Sea of Chinneroth
  - Lake Kinneret
  lexicon: HALOT
  rationale: Rendered formally as 'the Sea of Kinnereth,' preserving the Hebrew place
    name by transliteration in keeping with the philosophy of transliterating names.
- source_word: מִזְרָחָה
  chosen: eastward
  alternatives:
  - to the east
  - on the east
  lexicon: HALOT
  rationale: Used adverbially to reflect the directional suffix and maintain the concise
    boundary-list style.
- source_word: יָם הָעֲרָבָה יָם הַמֶּלַח
  chosen: the Sea of the Arabah, the Salt Sea
  alternatives:
  - the sea of the Arabah, that is, the Salt Sea
  - the Arabah Sea, the Dead Sea
  lexicon: HALOT
  rationale: Preserves the appositional structure of the Hebrew. 'Dead Sea' is avoided
    because it is an interpretive modernization not used in the source text.
- source_word: דֶּרֶךְ
  chosen: by way of
  alternatives:
  - toward
  - in the direction of
  - along the way of
  lexicon: HALOT
  rationale: In a territorial description, 'by way of' naturally conveys route/direction
    without over-paraphrasing.
- source_word: בֵּית הַיְשִׁמוֹת
  chosen: Beth-jeshimoth
  alternatives:
  - Beth Jeshimoth
  lexicon: HALOT
  rationale: Transliterated as a place name per translation philosophy.
- source_word: וּמִתֵּימָן
  chosen: and on the south
  alternatives:
  - and from the south
  - and southward
  lexicon: HALOT
  rationale: The phrase marks the southern extent/aspect of the boundary. 'On the
    south' reads naturally in English while preserving the locative sense.
- source_word: תַּחַת
  chosen: below
  alternatives:
  - under
  - beneath
  lexicon: HALOT
  rationale: In topographical description, 'below' is the most idiomatic English rendering.
- source_word: אַשְׁדּוֹת
  chosen: the slopes of
  alternatives:
  - the foothills of
  - the descents of
  lexicon: HALOT
  rationale: The noun refers to mountain slopes or declivities. 'Slopes' is clear,
    natural, and topographically precise.
- source_word: הַפִּסְגָּה
  chosen: Pisgah
  alternatives:
  - the Pisgah
  lexicon: HALOT
  rationale: Treated as a proper place name and transliterated. The article in Hebrew
    is not carried over because English place names normally omit it.
