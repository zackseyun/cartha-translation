id: JOS.12.19
reference: Joshua 12:19
source:
  edition: WLC
  text: מֶ֤לֶךְ מָדוֹן֙ אֶחָ֔ד מֶ֥לֶךְ חָצ֖וֹר אֶחָֽד׃
translation:
  text: the king of Madon, one; the king of Hazor, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew preserves a terse tally style: ''the king of Madon, one; the king
      of Hazor, one.'''
    reason: cultural_note
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Construct form 'king of' introducing each city-state ruler in this tally
    list. The English article is supplied naturally in enumeration style.
- source_word: מָדוֹן
  chosen: Madon
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per translation
    philosophy for names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - '1'
  - one king
  lexicon: HALOT
  rationale: Cardinal numeral used elliptically in this chapter's conquest list to
    count each king. Retained as 'one' rather than smoothing away the repetitive tally
    formula.
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Repeated construct phrase for the second entry; mirrored in English for
    consistency with the Hebrew list structure.
- source_word: חָצוֹר
  chosen: Hazor
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration of the city name.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - '1'
  - one king
  lexicon: HALOT
  rationale: Repeated numeral concluding the second item in the list; preserved for
    formal consistency and to reflect the source's accounting style.
