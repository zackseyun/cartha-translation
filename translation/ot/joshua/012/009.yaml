id: JOS.12.9
reference: Joshua 12:9
source:
  edition: WLC
  text: מֶ֥לֶךְ יְרִיח֖וֹ אֶחָ֑ד מֶ֧לֶךְ הָ/עַ֛י אֲשֶׁר מִ/צַּ֥ד בֵּֽית אֵ֖ל אֶחָֽד־־׃
translation:
  text: the king of Jericho, one; the king of Ai, which is beside Bethel, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king of Ai, which is next to Bethel, one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Standard rendering of the noun for a ruler. English includes the article
    in each clause to reflect the construct-like listing style in this catalog of
    defeated kings.
- source_word: יְרִיחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: 'In this chapter''s repetitive tally formula, אֶחָד functions as an enumerative
    conclusion: ''one.'' I preserved the terse style rather than expanding to ''one
    king,'' though that sense is implicit.'
- source_word: הָעַי
  chosen: Ai
  alternatives:
  - the Ai
  lexicon: HALOT
  rationale: Proper place name rendered by standard transliteration. Although the
    Hebrew form includes the article, English idiom normally omits it with this place
    name.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause modifying Ai. 'Which' reads naturally for
    a place reference in English.
- source_word: מִצַּד
  chosen: beside
  alternatives:
  - at the side of
  - next to
  - on the side of
  lexicon: HALOT
  rationale: The preposition plus noun expresses proximity/location relative to Bethel.
    'Beside' is concise and natural in English.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English form of the place name.
