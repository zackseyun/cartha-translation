id: JOS.12.10
reference: Joshua 12:10
source:
  edition: WLC
  text: מֶ֤לֶךְ יְרוּשָׁלִַ֨ם֙ אֶחָ֔ד מֶ֥לֶךְ חֶבְר֖וֹן אֶחָֽד׃
translation:
  text: the king of Jerusalem, one; the king of Hebron, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'the king of Jerusalem, one; the king of Hebron,
      one' could be expressed as 'one king of Jerusalem; one king of Hebron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'In this list of defeated kings, מֶלֶךְ denotes the ruler of each city-state.
    English idiom naturally supplies the article in this enumerative formula: ''the
    king of Jerusalem, one; the king of Hebron, one.'''
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention per
    translation philosophy.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  - one each
  lexicon: HALOT
  rationale: Here אֶחָד functions as the tally in the conquest list, indicating the
    count for each named king. Rendering it simply as 'one' preserves the terse list
    style of the Hebrew better than expanding it interpretively.
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Repeated for the second entry with the same sense and syntactic function
    in the tally list.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  - one each
  lexicon: HALOT
  rationale: Repeated tally term; rendered consistently with the first occurrence
    to preserve the formulaic structure.
