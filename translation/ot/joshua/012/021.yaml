id: JOS.12.21
reference: Joshua 12:21
source:
  edition: WLC
  text: מֶ֤לֶךְ תַּעְנַךְ֙ אֶחָ֔ד מֶ֥לֶךְ מְגִדּ֖וֹ אֶחָֽד׃
translation:
  text: the king of Taanach, one; the king of Megiddo, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'the king of Taanach, one; the king of Megiddo, one
      king.' The Hebrew simply repeats 'one' as a tally formula in the list.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'Construct form introducing each city-state ruler in this conquest list.
    English idiom naturally supplies the definite article in this enumerative formula:
    ''the king of X.'''
- source_word: תַּעְנַךְ
  chosen: Taanach
  alternatives:
  - Ta'anach
  - Taanak
  lexicon: HALOT
  rationale: Proper place name; per philosophy, names are transliterated rather than
    translated. 'Taanach' is a standard English transliteration of the Hebrew place
    name.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  - single
  lexicon: HALOT
  rationale: Literally 'one,' functioning here as the tally item in the repeated list
    formula. Retained as 'one' to preserve the terse enumerative style of the Hebrew
    rather than smoothing to 'one king,' which would add a noun not present in this
    position.
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Repeated construct form for the second entry in the list; rendered consistently
    with the first occurrence.
- source_word: מְגִדּוֹ
  chosen: Megiddo
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  - single
  lexicon: HALOT
  rationale: Repeated tally term in the conquest list; kept identical for consistency
    and to mirror the Hebrew repetition.
