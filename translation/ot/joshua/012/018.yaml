id: JOS.12.18
reference: Joshua 12:18
source:
  edition: WLC
  text: מֶ֤לֶךְ אֲפֵק֙ אֶחָ֔ד מֶ֥לֶךְ לַ/שָּׁר֖וֹן אֶחָֽד׃
translation:
  text: the king of Aphek, one; the king of Sharon, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king of the Sharon, one.' The Hebrew includes the article with 'Sharon,'
      but English commonly treats it as a proper regional name without the article.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: 'In this victory-list context, מֶלֶךְ introduces each defeated ruler.
    English idiom naturally supplies the definite article: ''the king of Aphek ...
    the king of Sharon.'' This preserves the list structure without over-paraphrasing.'
- source_word: אֲפֵק
  chosen: Aphek
  rationale: Proper place name; transliterated rather than translated, following the
    translation philosophy for names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Here אֶחָד functions as the tally item in the conquest list, indicating
    one king for each city/region. Rendering simply as 'one' preserves the terse enumerative
    style of the Hebrew.
- source_word: לַ/שָּׁרוֹן
  chosen: Sharon
  alternatives:
  - the Sharon
  - the plain of Sharon
  lexicon: HALOT
  rationale: The prefixed preposition/article marks the region Sharon. In English,
    'Sharon' is the most natural geographic rendering in this list. 'The Sharon' is
    possible and more formally reflects the article, but is less idiomatic in contemporary
    English; 'plain of Sharon' is interpretive and adds a topographical nuance not
    explicit here.
