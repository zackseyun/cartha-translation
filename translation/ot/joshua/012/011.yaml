id: JOS.12.11
reference: Joshua 12:11
source:
  edition: WLC
  text: מֶ֤לֶךְ יַרְמוּת֙ אֶחָ֔ד מֶ֥לֶךְ לָכִ֖ישׁ אֶחָֽד׃
translation:
  text: the king of Jarmuth, one; the king of Lachish, one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or more idiomatically in English list style: "the king of Jarmuth, one;
      the king of Lachish, one" = "the king of Jarmuth, one; the king of Lachish,
      one [in all]." The Hebrew preserves the terse tally formula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Construct form with following place name; rendered with English article
    for natural enumeration in the list of defeated kings.
- source_word: יַרְמוּת
  chosen: Jarmuth
  rationale: Proper place name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: In this chapter's list formula, אֶחָד functions as the tally 'one.' Kept
    as the concise enumerative term rather than expanding beyond the Hebrew.
- source_word: מֶלֶךְ
  chosen: the king of
  alternatives:
  - king of
  lexicon: HALOT
  rationale: Repeated construct phrase introducing the next city-state ruler in the
    conquest list; rendered consistently with the first occurrence.
- source_word: לָכִישׁ
  chosen: Lachish
  rationale: Proper place name; transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - one king
  lexicon: HALOT
  rationale: Repeated tally term in the list; translated consistently with the first
    occurrence.
