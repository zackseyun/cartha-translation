id: JOS.18.13
reference: Joshua 18:13
source:
  edition: WLC
  text: וְ/עָבַר֩ מִ/שָּׁ֨ם הַ/גְּב֜וּל ל֗וּזָ/ה אֶל כֶּ֤תֶף ל֨וּזָ/ה֙ נֶ֔גְבָּ/ה
    הִ֖יא בֵּֽית אֵ֑ל וְ/יָרַ֤ד הַ/גְּבוּל֙ עַטְר֣וֹת אַדָּ֔ר עַל הָ/הָ֕ר אֲשֶׁ֛ר
    מִ/נֶּ֥גֶב לְ/בֵית חֹר֖וֹן תַּחְתּֽוֹן־־־־׃
translation:
  text: From there the border passed to Luz, to the southern slope of Luz (that is,
    Bethel), and the border went down to Atroth-addar, on the mountain that is south
    of Lower Beth-horon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Luz is identified here with Bethel.
    reason: cross_reference
  - marker: b
    text: Or 'to the shoulder of Luz on the south'; the Hebrew uses a body-part term
      for the side or slope of a hill.
    reason: lexical_alternative
  - marker: c
    text: Atroth-addar is also spelled 'Ataroth-addar' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר
  chosen: passed
  alternatives:
  - crossed over
  - went across
  lexicon: HALOT
  rationale: For a boundary line, 'passed' is idiomatic English and reflects movement
    of the border description without implying a literal crossing event by persons.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: Standard territorial term in Joshua boundary descriptions; 'border' is
    natural modern English and consistent with the genre.
- source_word: לֻזָה / לוּזָה
  chosen: to Luz
  rationale: Proper place name is transliterated per translation philosophy. The directional
    ending is represented by 'to' rather than reproduced mechanically.
- source_word: אֶל כֶּתֶף לֻזָה נֶגְבָּה
  chosen: to the southern slope of Luz
  alternatives:
  - to the shoulder of Luz on the south
  - to the southern side of Luz
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in topographical contexts refers
    to a side or slope. 'Southern slope' communicates the terrain sense clearly in
    modern English while preserving the directional note נֶגְבָּה.
- source_word: הִיא בֵּית אֵל
  chosen: that is, Bethel
  alternatives:
  - it is Bethel
  rationale: This appositional identification clarifies that Luz is Bethel. 'That
    is' is idiomatic English for explanatory identification.
- source_word: וְיָרַד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: Common topographical verb in boundary descriptions. 'Went down' is natural
    and preserves the spatial imagery.
- source_word: עַטְרוֹת אַדָּר
  chosen: Atroth-addar
  alternatives:
  - Ataroth-addar
  rationale: Proper name transliterated. Hyphenation reflects the compound place name
    in standard English presentation. The spelling 'Atroth-addar' follows a close
    transliteration of the consonantal form here.
- source_word: עַל הָהָר
  chosen: on the mountain
  alternatives:
  - to the hill country
  - onto the hill
  lexicon: HALOT
  rationale: The singular with article most naturally refers to a specific mountain/hill
    in the boundary description. 'On the mountain' preserves the concrete topographical
    reference.
- source_word: אֲשֶׁר מִנֶּגֶב לְבֵית חֹרוֹן תַּחְתּוֹן
  chosen: that is south of Lower Beth-horon
  alternatives:
  - which is on the south of Lower Beth-horon
  - which lies south of Lower Beth-horon
  lexicon: HALOT
  rationale: מִנֶּגֶב indicates location to the south. 'Lower Beth-horon' is the conventional
    rendering of the place name with qualifying adjective תַּחְתּוֹן.
- source_word: תַּחְתּוֹן
  chosen: Lower
  alternatives:
  - lower
  lexicon: HALOT
  rationale: Capitalized as part of the established English place name 'Lower Beth-horon.'
