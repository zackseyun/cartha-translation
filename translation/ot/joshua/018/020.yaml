id: JOS.18.20
reference: Joshua 18:20
source:
  edition: WLC
  text: וְ/הַ/יַּרְדֵּ֥ן יִגְבֹּל אֹת֖/וֹ לִ/פְאַת קֵ֑דְמָ/ה זֹ֡את נַחֲלַת֩ בְּנֵ֨י
    בִנְיָמִ֧ן לִ/גְבֽוּלֹתֶ֛י/הָ סָבִ֖יב לְ/מִשְׁפְּחֹתָֽ/ם־־׃
translation:
  text: And the Jordan formed its border on the east side. This was the inheritance
    of the sons of Benjamin, according to its borders all around, by their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bounded it' / 'was its boundary.' The Hebrew verb indicates that the
      Jordan served as the territorial boundary.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Benjamin,' a tribal designation for Benjamin's descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיַּרְדֵּן
  chosen: And the Jordan
  alternatives:
  - And the Jordan River
  lexicon: HALOT
  rationale: Proper name of the river; English commonly uses 'the Jordan' without
    needing 'River,' though that remains a valid expansion.
- source_word: יִגְבֹּל אֹתוֹ
  chosen: formed its border
  alternatives:
  - bounded it
  - was its boundary
  lexicon: HALOT
  rationale: The verb גבל in this territorial context denotes serving as a boundary.
    'Formed its border' is natural modern English while preserving the geographic
    sense. The object suffix refers to Benjamin's territory/inheritance.
- source_word: לִפְאַת קֵדְמָה
  chosen: on the east side
  alternatives:
  - at the eastern side
  - toward the east
  lexicon: HALOT
  rationale: פאה is 'side/edge/border region' and קֵדְמָה indicates eastward/east.
    'On the east side' communicates the territorial orientation clearly.
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Though the Hebrew demonstrative is verbless, English idiom in this summary
    statement naturally supplies 'was' in past narrative context.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotted inheritance
  - the possession
  lexicon: HALOT
  rationale: נחלה in Joshua commonly refers to inherited tribal allotment. 'Inheritance'
    preserves both legal and covenantal land-allotment nuance.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the people of Benjamin
  - the descendants of Benjamin
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew construct literally. In
    tribal contexts 'sons of Benjamin' is a standard designation for the tribe.
- source_word: לִגְבוּלֹתֶיהָ
  chosen: according to its borders
  alternatives:
  - by its boundaries
  - within its borders
  lexicon: HALOT
  rationale: The phrase summarizes the inheritance with reference to its defined boundary
    lines. The feminine suffix refers to the inheritance/territory.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - on every side
  - round about
  lexicon: HALOT
  rationale: Indicates the surrounding perimeter of the territory. 'All around' is
    clear modern English.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת denotes clan-level family groupings within the tribe. 'Clans'
    is concise and fits allotment language better than the broader 'families'.
