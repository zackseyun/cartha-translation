id: JOS.18.23
reference: Joshua 18:23
source:
  edition: WLC
  text: וְ/הָ/עַוִּ֥ים וְ/הַ/פָּרָ֖ה וְ/עָפְרָֽה׃
translation:
  text: Avvim, Parah, and Ophrah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הָעַוִּים can also be understood as 'the Avvim.' In this territorial
      list it is taken as the name of a town rather than an ethnic designation.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעַוִּים
  chosen: Avvim
  alternatives:
  - the Avvim
  - Awwim
  lexicon: HALOT
  rationale: Proper place name in a territorial list. Although the form could be read
    as the gentilic/plural 'the Avvim,' in this context alongside other toponyms it
    functions as a town name. 'Avvim' preserves the Hebrew name by transliteration,
    consistent with the policy to transliterate names rather than translate them.
- source_word: הַפָּרָה
  chosen: Parah
  alternatives:
  - the Parah
  - Para
  lexicon: HALOT
  rationale: Proper place name in Benjamin's allotment. The prefixed article is retained
    in Hebrew orthography of the name but is not normally represented in English transliteration
    of place names. 'Parah' is the standard readable transliteration.
- source_word: עָפְרָה
  chosen: Ophrah
  alternatives:
  - Aphrah
  lexicon: HALOT
  rationale: Proper place name. 'Ophrah' is the conventional English transliteration
    of the Hebrew toponym עָפְרָה and distinguishes it from common-noun translation
    possibilities that are not intended here.
- source_word: וְ
  chosen: and
  rationale: The repeated conjunction links the place names in a simple list; English
    idiom renders the sequence with commas and a final 'and'.
