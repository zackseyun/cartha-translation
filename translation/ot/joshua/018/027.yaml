id: JOS.18.27
reference: Joshua 18:27
source:
  edition: WLC
  text: וְ/רֶ֥קֶם וְ/יִרְפְּאֵ֖ל וְ/תַרְאֲלָֽה׃
translation:
  text: Rekem, Irpeel, and Taralah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Jirpeel" or "Yirpeel," reflecting a more letter-for-letter transliteration
      of the Hebrew name יִרְפְּאֵל.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֶקֶם
  chosen: Rekem
  alternatives:
  - Rekem (variant vocalization reflected identically in English)
  lexicon: HALOT
  rationale: Proper place name in a town list. Following the translation philosophy,
    names are transliterated rather than translated. Standard English transliteration
    preserves the consonantal shape without attempting to supply a meaning.
- source_word: יִרְפְּאֵל
  chosen: Irpeel
  alternatives:
  - Jirpeel
  - Yirpeel
  lexicon: HALOT
  rationale: Proper place name. Chosen transliteration uses a readable modern English
    form with initial 'I' for yod, a common convention in biblical place names. Alternatives
    reflect more letter-for-letter transliteration conventions.
- source_word: תַרְאֲלָה
  chosen: Taralah
  alternatives:
  - Taralah (with no significant English variation)
  lexicon: HALOT
  rationale: Proper place name in the Benjaminite allotment list. Transliterated directly
    into standard English form rather than translated, since no clear lexical meaning
    is intended in context.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the place names in a simple coordinate
    list. English idiom renders this as comma-separated items with 'and' before the
    final name.
