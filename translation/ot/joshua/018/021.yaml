id: JOS.18.21
reference: Joshua 18:21
source:
  edition: WLC
  text: וְ/הָי֣וּ הֶֽ/עָרִ֗ים לְ/מַטֵּ֛ה בְּנֵ֥י בִנְיָמִ֖ן לְ/מִשְׁפְּחֽוֹתֵי/הֶ֑ם
    יְרִיח֥וֹ וּ/בֵית חָגְלָ֖ה וְ/עֵ֥מֶק קְצִֽיץ־׃
translation:
  text: And the cities belonging to the tribe of the sons of Benjamin, according to
    their clans, were Jericho, Beth-hoglah, and Emek-keziz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Valley of Keziz,' if the name is understood as a descriptive
      place-name rather than transliterated as a proper noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And ... were
  alternatives:
  - Now ... were
  - And there were
  lexicon: HALOT
  rationale: The conjunction plus Qal perfect of היה introduces the list of cities.
    English idiom is best served by rendering it as a simple copular clause, 'And
    ... were,' preserving the sequential/listing function without overtranslating
    existential force.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - these were the cities
  lexicon: HALOT
  rationale: Definite plural noun referring to the towns assigned within the tribal
    allotment. 'The cities' is the straightforward formal rendering.
- source_word: לְמַטֵּה
  chosen: belonging to the tribe of
  alternatives:
  - for the tribe of
  - of the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in allotment contexts indicates association
    or assignment. 'Belonging to the tribe of' communicates possession/allotment naturally
    in English while preserving the tribal reference.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the people of Benjamin
  - the Benjaminites
  lexicon: HALOT
  rationale: A formally close rendering is preferred here. 'Sons of Benjamin' preserves
    the Hebrew kinship expression; although 'Benjaminites' is idiomatic, the source
    wording is transparent and understandable in English.
- source_word: לְמִשְׁפְּחֹתֵיהֶם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-allotment contexts is better rendered 'clan' than
    the broader English 'family,' since it denotes a subdivision within the tribe.
    'According to their clans' reflects the distributive administrative sense.
- source_word: יְרִיחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: בֵית חָגְלָה
  chosen: Beth-hoglah
  alternatives:
  - Beth Hoglah
  lexicon: HALOT
  rationale: Place names are transliterated by standard conventions per project philosophy.
    The hyphenated form is a common English convention for בית-compounds.
- source_word: עֵמֶק קְצִיץ
  chosen: Emek-keziz
  alternatives:
  - Valley of Keziz
  lexicon: HALOT
  rationale: Although עֵמֶק commonly means 'valley,' in this context it forms part
    of a toponym. Since personal and place names are to be transliterated, the compound
    is best kept as the place name 'Emek-keziz' rather than translated as a descriptive
    phrase.
