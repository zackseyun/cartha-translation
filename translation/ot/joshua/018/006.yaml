id: JOS.18.6
reference: Joshua 18:6
source:
  edition: WLC
  text: וְ/אַתֶּ֞ם תִּכְתְּב֤וּ אֶת הָ/אָ֨רֶץ֙ שִׁבְעָ֣ה חֲלָקִ֔ים וַֽ/הֲבֵאתֶ֥ם אֵלַ֖/י הֵ֑נָּה וְ/יָרִ֨יתִי לָ/כֶ֤ם גּוֹרָל֙ פֹּ֔ה לִ/פְנֵ֖י יְהוָ֥ה אֱלֹהֵֽי/נוּ־׃
translation:
  text: And you shall write down the land in seven portions and bring it here to me, and I will cast lots for you here before Yahweh our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before Yahweh our God.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּכְתְּבוּ
  chosen: write down
  alternatives:
  - write
  - describe in writing
  - map out
  lexicon: HALOT
  rationale: The verb כתב means 'write.' In this context of surveying and apportioning land, 'write down' communicates recording the land's divisions without over-specifying the process as cartography. 'Map out' is possible contextually but goes beyond the lexical core.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the territory
  lexicon: HALOT
  rationale: '''The land'' is the natural rendering in Joshua for the territory to be apportioned. ''Territory'' is possible but less idiomatic here.'
- source_word: שִׁבְעָה חֲלָקִים
  chosen: in seven portions
  alternatives:
  - into seven parts
  - as seven divisions
  lexicon: HALOT
  rationale: חֲלָקִים denotes portions/parts/divisions. 'In seven portions' fits the Hebrew construction and the land-allotment context.
- source_word: וַהֲבֵאתֶם אֵלַי הֵנָּה
  chosen: and bring it here to me
  alternatives:
  - and bring them here to me
  - and bring it to me here
  lexicon: HALOT
  rationale: The object is the written description of the land, treated collectively/singularly in English as 'it.' הֵנָּה adds deictic emphasis, hence 'here.'
- source_word: וְיָרִיתִי
  chosen: I will cast
  alternatives:
  - I will throw
  - I will apportion by lot
  lexicon: HALOT
  rationale: From ירה in the sense of casting/throwing, especially of lots. Because גּוֹרָל follows, English idiom is 'cast the lot' rather than the more literal 'throw a lot.' 'Apportion by lot' captures the sense but absorbs the noun into the verb and is less transparent.
- source_word: גּוֹרָל
  chosen: the lot
  alternatives:
  - a lot
  - lots
  lexicon: HALOT
  rationale: גוֹרָל refers to the lot used for allotment. English idiom commonly uses the singular in the expression 'cast the lot' in a specific allotment act.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: פֹּה is a simple locative adverb; 'here' is the most natural equivalent.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is concise and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative rather than used in the main text.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained explicitly to preserve the covenantal confession in the Hebrew.
