id: JOS.18.17
reference: Joshua 18:17
source:
  edition: WLC
  text: וְ/תָאַ֣ר מִ/צָּפ֗וֹן וְ/יָצָא֙ עֵ֣ין שֶׁ֔מֶשׁ וְ/יָצָא֙ אֶל גְּלִיל֔וֹת אֲשֶׁר
    נֹ֖כַח מַעֲלֵ֣ה אֲדֻמִּ֑ים וְ/יָרַ֕ד אֶ֥בֶן בֹּ֖הַן בֶּן רְאוּבֵֽן־־־׃
translation:
  text: Then it curved northward and went out to En-shemesh, and went out to Geliloth,
    which is opposite the Ascent of Adummim, and it went down to the stone of Bohan
    son of Reuben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-shemesh means 'Spring of the Sun,' but the place name is transliterated
      in the main text.
    reason: lexical_alternative
  - marker: b
    text: Geliloth may be understood lexically as 'circles' or 'districts,' but here
      it is treated as a place name.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Pass of Adummim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָאַר
  chosen: Then it curved
  alternatives:
  - and it was marked out
  - and it extended
  - and it turned
  lexicon: HALOT
  rationale: In boundary descriptions, the verb תאר commonly describes the border's
    course being traced or bending along terrain. 'Curved' gives a natural English
    rendering for a boundary line changing direction without over-paraphrasing.
- source_word: מִצָּפוֹן
  chosen: northward
  alternatives:
  - from the north
  - on the north
  lexicon: HALOT
  rationale: Given the motion-oriented sequence of boundary verbs, the phrase is best
    taken adverbially to indicate direction of the border's course rather than point
    of origin.
- source_word: וְיָצָא
  chosen: went out
  alternatives:
  - extended
  - reached
  lexicon: HALOT
  rationale: This verb recurs in territorial boundary formulas. 'Went out' preserves
    the Hebrew idiom while remaining understandable in English; it avoids flattening
    all occurrences into 'extended' and keeps the sequential movement of the border.
- source_word: עֵין שֶׁמֶשׁ
  chosen: En-shemesh
  alternatives:
  - Spring of the Sun
  lexicon: HALOT
  rationale: Per translation philosophy, place names are transliterated rather than
    translated. 'En-shemesh' is the conventional transliteration of the toponym.
- source_word: גְּלִילוֹת
  chosen: Geliloth
  alternatives:
  - the circles
  - districts
  lexicon: HALOT
  rationale: The form functions here as a place name, so transliteration is preferable
    to a lexical translation.
- source_word: נֹכַח
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: '''Opposite'' is a clear spatial term in English and fits the boundary
    description.'
- source_word: מַעֲלֵה אֲדֻמִּים
  chosen: the Ascent of Adummim
  alternatives:
  - the Pass of Adummim
  - the Ascent of the Red Places
  lexicon: HALOT
  rationale: מַעֲלֵה denotes an ascent or uphill pass. 'Ascent of Adummim' preserves
    the place name while conveying the topographical feature.
- source_word: וְיָרַד
  chosen: and it went down
  alternatives:
  - and descended
  lexicon: HALOT
  rationale: This is standard boundary language indicating downward movement in terrain.
    'Went down' is idiomatic and matches the repeated motion verbs in the verse.
- source_word: אֶבֶן בֹּהַן בֶּן רְאוּבֵן
  chosen: the stone of Bohan son of Reuben
  alternatives:
  - Bohan's stone, the son of Reuben
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered as a landmark named for
    Bohan, identified as a son/descendant of Reuben. 'Stone of Bohan son of Reuben'
    is the most transparent formal rendering in English.
