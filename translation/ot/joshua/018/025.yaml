  text: גִּבְע֥וֹן וְ/הָֽ/רָמָ֖ה וּ/בְאֵרֽוֹת׃
translation:
  text: Gibeon, Ramah, and Beeroth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: גִּבְעוֹן
  chosen: Gibeon
  lexicon: HALOT
  rationale: Proper place name in a territorial list. Following the translation philosophy,
    names are transliterated rather than translated.
- source_word: הָרָמָה
  chosen: Ramah
  alternatives:
  - the Ramah
  - the height
  lexicon: HALOT
  rationale: Although the form includes the article, in this context it functions
    as a settled place name in a list of towns, so it is best rendered by the conventional
    transliteration 'Ramah' rather than translating the underlying sense ('height')
    or preserving the article awkwardly in English.
- source_word: בְאֵרוֹת
  chosen: Beeroth
  alternatives:
  - wells
  lexicon: HALOT
  rationale: Proper place name. Though the noun is related to 'wells,' the context
    is a list of Benjaminite towns, so transliteration is preferred over semantic
    translation.
