id: JOS.18.26
reference: Joshua 18:26
source:
  edition: WLC
  text: וְ/הַ/מִּצְפֶּ֥ה וְ/הַ/כְּפִירָ֖ה וְ/הַ/מֹּצָֽה׃
translation:
  text: and Hamizpeh, Hakkephirah, and Hammozah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly: ''the Mizpeh, the Kephirah, and the Mozah,'' if the prefixed
      article is taken as a regular definite article rather than preserved as part
      of the place names in transliteration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction joins this place-name list to the preceding
    items; rendered with simple coordinate 'and.'
- source_word: הַמִּצְפֶּה
  chosen: Hamizpeh
  alternatives:
  - the Mizpeh
  - Mizpeh
  lexicon: HALOT
  rationale: A place name in a boundary/town list. Following the translation philosophy
    to transliterate names, the form is carried into English rather than translated
    as 'watchtower/lookout.' The prefixed article is preserved in transliteration
    as part of the toponym ('Ha-').
- source_word: הַכְּפִירָה
  chosen: Hakkephirah
  alternatives:
  - the Kephirah
  - Kephirah
  lexicon: HALOT
  rationale: Toponym; transliterated rather than translated. The prefixed article
    is represented in the English form as part of the name ('Hak-').
- source_word: הַמֹּצָה
  chosen: Hammozah
  alternatives:
  - the Mozah
  - Mozah
  lexicon: HALOT
  rationale: Toponym; transliterated in keeping with the stated philosophy. The article
    is retained in transliteration as part of the place name ('Ham-').
