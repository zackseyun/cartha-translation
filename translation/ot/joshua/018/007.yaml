theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Collective singular suffix in נַחֲלָתוֹ
  chosen_reading: their inheritance
  alternative_readings:
  - his inheritance
  rationale: Although the Hebrew suffix is singular, the clause speaks of the Levites as a corporate group. Rendering the English as 'their inheritance' communicates the intended sense without implying a single male individual. This preserves meaning rather than forcing a misleadingly singular English expression.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense in readable modern English'
