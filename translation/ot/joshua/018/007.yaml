id: JOS.18.7
reference: Joshua 18:7
source:
  edition: WLC
  text: כִּ֠י אֵֽין חֵ֤לֶק לַ/לְוִיִּם֙ בְּ/קִרְבְּ/כֶ֔ם כִּֽי כְהֻנַּ֥ת יְהוָ֖ה נַחֲלָת֑/וֹ וְ/גָ֡ד וּ/רְאוּבֵ֡ן וַ/חֲצִי֩ שֵׁ֨בֶט הַֽ/מְנַשֶּׁ֜ה לָקְח֣וּ נַחֲלָתָ֗/ם מֵ/עֵ֤בֶר לַ/יַּרְדֵּן֙ מִזְרָ֔חָ/ה אֲשֶׁר֙ נָתַ֣ן לָ/הֶ֔ם מֹשֶׁ֖ה עֶ֥בֶד יְהוָֽה־־׃
translation:
  text: For there is no portion for the Levites among you, because the priesthood of Yahweh is their inheritance. And Gad, Reuben, and the half-tribe of Manasseh have received their inheritance beyond the Jordan eastward, which Moses the servant of Yahweh gave them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his inheritance'; the singular likely refers collectively to Levi/the Levites, hence 'their inheritance' in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - allotment
  lexicon: HALOT
  rationale: חֵלֶק denotes a share or allotted portion. 'Portion' fits the land-allotment context while distinguishing it from the later use of נַחֲלָה/inheritance in the same verse.
- source_word: לַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/clan name; with the article in context it refers to the Levitical tribe as a group.
- source_word: בְּקִרְבְּכֶם
  chosen: among you
  alternatives:
  - in your midst
  lexicon: HALOT
  rationale: Idiomatic English for the distributive sense in the context of tribal allotments.
- source_word: כְהֻנַּת יְהוָה
  chosen: the priesthood of the LORD
  alternatives:
  - the priestly service of the LORD
  lexicon: HALOT
  rationale: כְהֻנָּה refers to priesthood or priestly office/service. 'Priesthood of the LORD' preserves the institutional sense and the genitive relation to YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נַחֲלָתוֹ
  chosen: their inheritance
  alternatives:
  - his inheritance
  lexicon: HALOT
  rationale: 'The ketiv-like consonantal form is singular with 3ms suffix, but in context the referent is the Levites collectively. English naturally renders the collective sense as ''their inheritance.'' This matches the sense of the clause: the LORD''s priesthood is what the Levites inherit.'
- source_word: לָקְחוּ
  chosen: have received
  alternatives:
  - took
  - received
  lexicon: HALOT
  rationale: Though the verb is literally 'took,' in allotment contexts English 'have received' better conveys lawful reception of an assigned inheritance rather than seizure.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  lexicon: HALOT
  rationale: Standard rendering for hereditary land allotment in Joshua.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  lexicon: HALOT
  rationale: Conventional and clear rendering of the geographic expression; the following 'eastward' specifies the side intended.
- source_word: מִזְרָחָה
  chosen: eastward
  alternatives:
  - to the east
  - east of it
  lexicon: HALOT
  rationale: Adverbial directional form; 'eastward' is concise and natural following 'beyond the Jordan.'
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: For עֶבֶד in this honorific covenantal title, 'servant' is the most natural English rendering; the bonded-status nuance is not foregrounded here as it is in some NT δοῦλος contexts.
