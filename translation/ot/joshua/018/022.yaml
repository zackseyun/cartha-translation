id: JOS.18.22
reference: Joshua 18:22
source:
  edition: WLC
  text: וּ/בֵ֧ית הָֽעֲרָבָ֛ה וּ/צְמָרַ֖יִם וּ/בֵֽית אֵֽל־׃
translation:
  text: Beth-arabah, Zemaraim, and Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew place names: ''Beth-arabah'' could be rendered more literally as
      ''house of the Arabah,'' and ''Bethel'' as ''house of God,'' but the main text
      preserves them as standard English transliterations of toponyms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית הָעֲרָבָה
  chosen: Beth-arabah
  alternatives:
  - Beth Arabah
  - house of the Arabah
  lexicon: HALOT
  rationale: A place name in a boundary/town list, so transliteration is preferred
    over translating the components. The maqqeph-like construct sense of בֵית with
    הָעֲרָבָה could be rendered literally as 'house of the Arabah,' but English Bible
    convention and the genre of toponym lists favor the established place-name form
    'Beth-arabah.'
- source_word: צְמָרַיִם
  chosen: Zemaraim
  alternatives:
  - Zemarim
  lexicon: HALOT
  rationale: This is a proper place name and should be transliterated. 'Zemaraim'
    reflects the Hebrew form with the dual/plural-looking ending -ַיִם more transparently
    than the shortened 'Zemarim.'
- source_word: בֵית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - house of God
  lexicon: HALOT
  rationale: A well-established place name. In keeping with the philosophy 'translate
    titles; transliterate names,' the toponym is transliterated rather than translated
    as 'house of God.' 'Bethel' is the standard modern English form, smoother than
    the more segmented 'Beth-el.'
- source_word: וּ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction simply coordinates the place names in the list;
    English renders it as 'and,' with commas used for natural list style.
