id: JOS.18.19
reference: Joshua 18:19
source:
  edition: WLC
  text: וְ/עָבַ֨ר הַ/גְּב֜וּל אֶל כֶּ֣תֶף בֵּית חָגְלָה֮ צָפוֹנָ/ה֒ ו/היה תצאותי/ו
    הַ/גְּב֗וּל אֶל לְשׁ֤וֹן יָם הַ/מֶּ֨לַח֙ צָפ֔וֹנָ/ה אֶל קְצֵ֥ה הַ/יַּרְדֵּ֖ן נֶ֑גְבָּ/ה
    זֶ֖ה גְּב֥וּל נֶֽגֶב־־׀־־־׃
translation:
  text: Then the border passed to the northern shoulder of Beth-hoglah, and the border
    ended at the northern bay of the Salt Sea, at the southern end of the Jordan.
    This is the southern border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'tongue of the Salt Sea,' a geographic expression for a tongue-shaped
      bay or inlet.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Dead Sea'; the Hebrew text reads 'the Salt Sea.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַר
  chosen: Then the border passed
  alternatives:
  - and the border crossed over
  - and the border went on
  lexicon: HALOT
  rationale: The verb עָבַר in boundary descriptions commonly denotes the line extending
    onward or passing along a point. 'Passed' is natural modern English and fits the
    topographical sequence.
- source_word: כֶּתֶף
  chosen: shoulder
  alternatives:
  - side
  - slope
  - flank
  lexicon: HALOT
  rationale: Literally 'shoulder,' used geographically for a side or slope. 'Shoulder'
    preserves the concrete Hebrew image while remaining intelligible in a boundary
    text.
- source_word: בֵּית חָגְלָה
  chosen: Beth-hoglah
  rationale: 'Place name transliterated per translation philosophy: translate titles,
    transliterate names.'
- source_word: צָפוֹנָה
  chosen: northern
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: Here the directional form modifies the location of Beth-hoglah's shoulder.
    'Northern' reads smoothly in English and reflects the adjectival sense in context.
- source_word: תּוֹצְאֹתָיו
  chosen: ended
  alternatives:
  - its outgoings were
  - its extremities were
  - its termination was
  lexicon: HALOT
  rationale: In border formulas, תּוֹצָאוֹת refers to the border's endpoints or termination.
    'Ended' conveys the sense idiomatically without unnecessary archaism.
- source_word: לְשׁוֹן
  chosen: bay
  alternatives:
  - tongue
  - inlet
  lexicon: HALOT
  rationale: Literally 'tongue,' but in geography it denotes a tongue-shaped projection
    or inlet. 'Bay' best communicates the feature in clear modern English; the literal
    image is worth preserving in a footnote.
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Dead Sea
  lexicon: HALOT
  rationale: The Hebrew text says 'Salt Sea.' Following original-language primacy,
    the formal name in the source is retained rather than replacing it with the conventional
    modern name 'Dead Sea.'
- source_word: קְצֵה הַיַּרְדֵּן נֶגְבָּה
  chosen: the southern end of the Jordan
  alternatives:
  - the south end of the Jordan
  - the southern extremity of the Jordan
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity or end; נֶגְבָּה specifies the southern side.
    'The southern end of the Jordan' is accurate and readable.
- source_word: זֶה גְּבוּל נֶגֶב
  chosen: This is the southern border
  alternatives:
  - This was the Negeb border
  - This is the border on the south
  lexicon: HALOT
  rationale: In this allotment context, נֶגֶב here functions directionally ('south/southern
    side'), not as the proper region 'Negeb.' Thus 'southern border' best fits the
    immediate boundary summary.
