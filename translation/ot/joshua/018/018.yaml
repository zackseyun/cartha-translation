id: JOS.18.18
reference: Joshua 18:18
source:
  edition: WLC
  text: וְ/עָבַ֛ר אֶל כֶּ֥תֶף מוּל הָֽ/עֲרָבָ֖ה צָפ֑וֹנָ/ה וְ/יָרַ֖ד הָ/עֲרָבָֽתָ/ה־־׃
translation:
  text: Then it passed on to the shoulder opposite the Arabah on the north, and went
    down to the Arabah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain' for 'the Arabah'; the Hebrew term can function as a common
      topographical term as well as a regional name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'shoulder,' a topographical metaphor for a side, ridge, or slope.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָבַר
  chosen: Then it passed on
  alternatives:
  - and it passed over
  - and it crossed
  lexicon: HALOT
  rationale: In boundary descriptions, עבר commonly marks the border's continuation
    from one point to another. 'Passed on' is natural English for a boundary line
    proceeding, while preserving the movement sense better than a more literal but
    potentially misleading 'crossed'.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition indicating movement of the boundary
    toward the next landmark.
- source_word: כֶּתֶף
  chosen: the shoulder
  alternatives:
  - the slope
  - the side
  lexicon: HALOT
  rationale: Literally 'shoulder,' a common topographical metaphor for a ridge-side
    or slope. Retaining 'shoulder' preserves the concrete Hebrew imagery while remaining
    intelligible in a boundary list.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - in front of
  lexicon: HALOT
  rationale: Best conveys spatial correspondence between the shoulder and the Arabah.
    'Opposite' is concise and idiomatic in geographic description.
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the plain
  - the Jordan Valley
  lexicon: HALOT
  rationale: Here עֲרָבָה functions as a geographic proper/topographic term. Translating
    it as 'the Arabah' preserves the regional designation without over-specifying
    beyond the Hebrew. 'Plain' is possible but less precise as a place-name.
- source_word: צָפֹנָה
  chosen: on the north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: The directional suffix indicates northern orientation. 'On the north'
    fits the topographical relation in English; 'northward' could suggest motion rather
    than location.
- source_word: וְיָרַד
  chosen: and went down
  alternatives:
  - and descended
  lexicon: HALOT
  rationale: ירד is the standard verb for descending in terrain. 'Went down' is readable
    modern English and suits a boundary line moving downhill.
- source_word: הָעֲרָבָתָה
  chosen: to the Arabah
  alternatives:
  - toward the Arabah
  - into the Arabah
  lexicon: HALOT
  rationale: The directional heh marks movement toward the Arabah. English commonly
    expresses this with 'to the Arabah.'
