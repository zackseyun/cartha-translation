id: JOS.18.10
reference: Joshua 18:10
source:
  edition: WLC
  text: וַ/יַּשְׁלֵךְ֩ לָ/הֶ֨ם יְהוֹשֻׁ֧עַ גּוֹרָ֛ל בְּ/שִׁלֹ֖ה לִ/פְנֵ֣י יְהוָ֑ה וַ/יְחַלֶּק שָׁ֨ם יְהוֹשֻׁ֧עַ אֶת הָ/אָ֛רֶץ לִ/בְנֵ֥י יִשְׂרָאֵ֖ל כְּ/מַחְלְקֹתָֽ/ם־־׃פ
translation:
  text: Then Joshua cast lots for them at Shiloh before Yahweh, and there Joshua divided the land to the sons of Israel according to their divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of Israel.'' This expression refers corporately to the people of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁלֵךְ
  chosen: cast
  alternatives:
  - threw
  - cast down
  lexicon: HALOT
  rationale: In the idiom with גּוֹרָל ('lot'), the verb means to cast or throw lots. 'Cast' is the established and natural English equivalent without sounding archaic in this context.
- source_word: גּוֹרָל
  chosen: lots
  alternatives:
  - a lot
  lexicon: HALOT
  rationale: Although morphologically singular, the expression 'cast lot' in Hebrew is idiomatically rendered in English as 'cast lots' when referring to allotment procedure among multiple tribes. This best reflects the distributive sense of the action.
- source_word: בְּשִׁלֹה
  chosen: at Shiloh
  alternatives:
  - in Shiloh
  lexicon: HALOT
  rationale: For a named settlement, English idiom prefers 'at Shiloh' for the location of the public act.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This phrase denotes action performed in Yahweh's presence, likely at the sanctuary. 'Before the LORD' is concise, standard, and preserves the covenantal setting. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the stated doctrine.
- source_word: וַיְחַלֶּק
  chosen: divided
  alternatives:
  - apportioned
  - allotted
  - distributed
  lexicon: HALOT
  rationale: The verb refers to dividing or apportioning the land among the tribes. 'Divided' is the most direct rendering; the allotment nuance is already supplied by the context of casting lots.
- source_word: שָׁם
  chosen: there
  alternatives:
  - at that place
  lexicon: HALOT
  rationale: A straightforward adverb of location referring back to Shiloh. 'There' is natural and sufficiently precise.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the territory
  lexicon: HALOT
  rationale: In Joshua, הָאָרֶץ commonly refers to the land being apportioned to Israel, not merely soil or the whole earth. 'The land' preserves this covenant-geographical sense.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' In keeping with the project's gender-accurate principle, this is retained rather than flattened to 'Israelites,' while still functioning corporately for the covenant people.
- source_word: כְּמַחְלְקֹתָם
  chosen: according to their divisions
  alternatives:
  - by their portions
  - according to their allotments
  - according to their shares
  lexicon: HALOT
  rationale: The noun denotes divisions/distributional groupings. 'According to their divisions' stays close to the Hebrew and fits the administrative context of tribal apportionment.
