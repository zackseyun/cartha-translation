id: JOS.18.2
reference: Joshua 18:2
source:
  edition: WLC
  text: וַ/יִּוָּֽתְרוּ֙ בִּ/בְנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֥ר לֹֽא חָלְק֖וּ אֶת נַֽחֲלָתָ֑/ם
    שִׁבְעָ֖ה שְׁבָטִֽים־־׃
translation:
  text: But among the sons of Israel there remained seven tribes that had not apportioned
    their inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites.' The Hebrew reads more literally 'among the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that had not divided their inheritance' or 'that had not yet received
      their inheritance by allotment.' The Hebrew verb can be rendered in different
      ways depending on whether the focus is on the tribes' participation in the division
      or on the inheritance not yet being assigned to them.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּוָּתְרוּ
  chosen: there remained
  alternatives:
  - were left
  - remained over
  lexicon: HALOT
  rationale: From יתר in the Niphal/wayyiqtol, indicating those still left over or
    remaining. 'There remained' is idiomatic modern English and preserves the existential
    sense.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: Literally 'among the sons of Israel.' Chosen to preserve the Hebrew familial
    expression and the doctrine's gender-accurate principle. 'Israelites' is possible
    but less formally transparent.
- source_word: אֲשֶׁר לֹא חָלְקוּ
  chosen: that had not apportioned
  alternatives:
  - that had not divided
  - that had not received by allotment
  lexicon: HALOT
  rationale: חלק in context of land distribution commonly means divide/apportion.
    'Apportioned' fits the allotment context of Joshua 18 better than the more generic
    'divided.' The subject is the seven tribes, so the sense is that they had not
    yet had their inheritance apportioned.
- source_word: אֶת נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  - their possession
  lexicon: HALOT
  rationale: נחלה in conquest/allotment contexts refers to inherited territorial portion.
    'Inheritance' is the standard and theologically resonant rendering.
- source_word: שִׁבְעָה שְׁבָטִים
  chosen: seven tribes
  lexicon: HALOT
  rationale: Straightforward numeral + noun construction; 'tribes' is the natural
    rendering for שבטים in Israel's tribal structure.
