id: JOS.18.28
reference: Joshua 18:28
source:
  edition: WLC
  text: וְ/צֵלַ֡ע הָאֶ֜לֶף וְ/הַ/יְבוּסִ֨י הִ֤יא יְרֽוּשָׁלִַ֨ם֙ גִּבְעַ֣ת קִרְיַ֔ת
    עָרִ֥ים אַרְבַּֽע עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶ֑ן זֹ֛את נַֽחֲלַ֥ת בְּנֵֽי בִנְיָמִ֖ן
    לְ/מִשְׁפְּחֹתָֽ/ם־־׃פ
translation:
  text: Zela, Haeleph, the Jebusite (that is, Jerusalem), Gibeath, Kiriath—fourteen
    cities with their villages. This was the inheritance of the sons of Benjamin according
    to their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Jebusite, it is Jerusalem.'' The gentilic form ''Jebusite''
      is used here as a place designation for Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Some translations render 'Haeleph' as 'Eleph' and 'Gibeath' as 'Gibeah.'
    reason: alternative_reading
  - marker: c
    text: The Hebrew text reads 'Kiriath,' not 'Kiriath-jearim' in this verse.
    reason: textual_variant
lexical_decisions:
- source_word: וְ/צֵלַע
  chosen: Zela
  alternatives:
  - Zelah
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per philosophy.
    'Zela' reflects a straightforward English transliteration, while 'Zelah' is a
    common traditional variant.
- source_word: הָאֶלֶף
  chosen: Haeleph
  alternatives:
  - Eleph
  lexicon: HALOT
  rationale: Proper place name; transliterated. The prefixed article is preserved
    in the transliteration as part of the place name form in the Hebrew text, though
    some English versions simplify to 'Eleph'.
- source_word: וְ/הַ/יְבוּסִי הִיא יְרֽוּשָׁלִַם
  chosen: the Jebusite (that is, Jerusalem)
  alternatives:
  - Jebus (that is, Jerusalem)
  - the Jebusite, that is Jerusalem
  lexicon: HALOT
  rationale: The Hebrew reads literally 'and the Jebusite, it is Jerusalem.' Although
    'Jebusite' is formally gentilic, in this toponymic list it functions as a place
    designation for the city associated with the Jebusites. The appositional clarification
    'that is, Jerusalem' preserves the explanatory force of הִיא.
- source_word: גִּבְעַת
  chosen: Gibeath
  alternatives:
  - Gibeah
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Gibeath' follows the consonantal
    form here, while 'Gibeah' is a familiar anglicized variant in many translations.
- source_word: קִרְיַת עָרִים
  chosen: Kiriath
  alternatives:
  - Kiriath-jearim
  - city of forests
  lexicon: HALOT
  rationale: The Hebrew text here reads only 'Kiriath' followed by the total count
    of cities. Since 'jearim/forests' is absent in this verse, the translation should
    not import it. 'Kiriath' is therefore retained as the place name as written.
- source_word: עָרִים אַרְבַּע עֶשְׂרֵה
  chosen: fourteen cities
  alternatives:
  - fourteen towns
  lexicon: HALOT
  rationale: Standard rendering of the numeral phrase summarizing the listed settlements.
    'Cities' is the usual gloss for עָרִים in allotment lists.
- source_word: וְ/חַצְרֵי/הֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: In land-allotment contexts חָצֵר commonly refers to dependent villages
    or unwalled settlements associated with a city. 'With their villages' is idiomatic
    and contextually precise.
- source_word: זֹאת נַחֲלַת
  chosen: This was the inheritance
  alternatives:
  - This is the inheritance
  - This was the allotted inheritance
  lexicon: HALOT
  rationale: A standard concluding formula for tribal allotments. English past tense
    reads naturally in narrative context, though the Hebrew demonstrative + noun is
    verbless.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the people of Benjamin
  - the descendants of Benjamin
  lexicon: HALOT
  rationale: Gender-accurate rendering of the Hebrew construct. In tribal contexts
    'sons of Benjamin' is both literal and conventional; it avoids flattening the
    familial-tribal idiom.
- source_word: לְ/מִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal allotment contexts denotes clan-level subdivisions
    within the tribe. 'Clans' is more precise than the broader 'families'.
