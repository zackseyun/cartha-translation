id: JOS.18.15
reference: Joshua 18:15
source:
  edition: WLC
  text: וּ/פְאַת נֶ֕גְבָּ/ה מִ/קְצֵ֖ה קִרְיַ֣ת יְעָרִ֑ים וְ/יָצָ֤א הַ/גְּבוּל֙ יָ֔מָּ/ה
    וְ/יָצָ֕א אֶל מַעְיַ֖ן מֵ֥י נֶפְתּֽוֹחַ־־׃
translation:
  text: And the southern side was from the edge of Kiriath-jearim, and the border
    went out westward and went out to the spring of the waters of Nephtoah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'toward the sea'; in this geographic context it means
      'westward.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the spring of the waters of Nephtoah'; some English translations simplify
      the Hebrew construction as 'the spring of Nephtoah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְאַת
  chosen: And the side
  alternatives:
  - And the border side
  - And the region
  lexicon: HALOT
  rationale: פֵאָה commonly denotes a side, edge, or extremity. In this boundary-description
    context, 'side' is the most natural English rendering and avoids overloading 'border,'
    which is explicitly supplied later by הַגְּבוּל.
- source_word: נֶגְבָּה
  chosen: southern
  alternatives:
  - southward
  - south side
  lexicon: HALOT
  rationale: From נֶגֶב with directional/locative ending, here functioning adjectivally
    with פְאַת to indicate the southern side. 'Southern' is concise and idiomatic
    in English.
- source_word: מִקְצֵה
  chosen: from the edge of
  alternatives:
  - from the end of
  - from the extremity of
  lexicon: HALOT
  rationale: קָצֶה refers to an end, edge, or extremity. In a territorial boundary
    description, 'edge of' best fits the spatial sense.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiryath-jearim
  lexicon: HALOT
  rationale: Place name is transliterated per project policy to transliterate names
    rather than translate them.
- source_word: וְיָצָא
  chosen: went out
  alternatives:
  - extended
  - proceeded
  lexicon: HALOT
  rationale: יָצָא literally means 'go out/come out.' In boundary formulas it describes
    the line extending from one point to another. 'Went out' preserves the Hebrew
    idiom while remaining understandable.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the territory line
  lexicon: HALOT
  rationale: גְּבוּל in Joshua's allotment texts regularly denotes the boundary line.
    'Border' is clear, natural, and suitably concrete.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - seaward
  lexicon: HALOT
  rationale: The term is derived from 'sea' and often means 'westward' in the land
    of Israel, where the Mediterranean lies to the west. 'Westward' communicates the
    directional sense directly for modern readers.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is the most straightforward rendering
    here.
- source_word: מַעְיַן
  chosen: the spring
  alternatives:
  - the fountain
  - the source
  lexicon: HALOT
  rationale: מַעְיָן denotes a spring or fountain. 'Spring' is the clearest modern
    geographic term.
- source_word: מֵי
  chosen: of the waters of
  alternatives:
  - of
  - at the waters of
  lexicon: HALOT
  rationale: Construct plural of 'water.' The phrase מַעְיַן מֵי plus a place name
    is somewhat formal; 'the spring of the waters of Nephtoah' closely reflects the
    Hebrew structure, though somewhat wooden. It preserves the genitival layering
    of the source text.
- source_word: נֶפְתּוֹחַ
  chosen: Nephtoah
  lexicon: HALOT
  rationale: Place name transliterated according to project policy.
