id: JOS.18.9
reference: Joshua 18:9
source:
  edition: WLC
  text: וַ/יֵּלְכ֤וּ הָֽ/אֲנָשִׁים֙ וַ/יַּעַבְר֣וּ בָ/אָ֔רֶץ וַ/יִּכְתְּב֧וּ/הָ לֶֽ/עָרִ֛ים
    לְ/שִׁבְעָ֥ה חֲלָקִ֖ים עַל סֵ֑פֶר וַ/יָּבֹ֧אוּ אֶל יְהוֹשֻׁ֛עַ אֶל הַֽ/מַּחֲנֶ֖ה
    שִׁלֹֽה־־־׃
translation:
  text: So the men went and passed through the land, and they wrote it down by cities
    in seven portions in a book, and they came to Joshua at the camp in Shiloh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to cities'; the phrase indicates that the land survey was
      organized city by city.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on a scroll/book' (עַל־סֵפֶר), that is, in a written document.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - set out
  - departed
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך, introducing the action sequence. 'Went'
    is natural and sufficiently formal without overstating directionality.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the men sent out
  - the people
  lexicon: HALOT
  rationale: אַנָשִׁים refers specifically to the male representatives previously
    commissioned, not people in general. 'The men' preserves the definite reference
    and gender-accurate wording.
- source_word: וַיַּעַבְרוּ בָאָרֶץ
  chosen: passed through the land
  alternatives:
  - traveled through the land
  - went through the land
  lexicon: HALOT
  rationale: עבר with ב plus 'the land' here denotes traversing the territory for
    survey. 'Passed through' is a close, idiomatic rendering.
- source_word: וַיִּכְתְּבוּהָ
  chosen: they wrote it down
  alternatives:
  - they wrote it
  - they recorded it
  lexicon: HALOT
  rationale: The 3fs suffix refers back to 'the land.' 'Wrote it down' captures the
    act of recording surveyed information in writing.
- source_word: לֶעָרִים
  chosen: by cities
  alternatives:
  - according to cities
  - with respect to cities
  lexicon: HALOT
  rationale: 'Likely indicates the basis or organizing principle of the written survey:
    the land was described city by city. ''By cities'' is concise and idiomatic.'
- source_word: לְשִׁבְעָה חֲלָקִים
  chosen: in seven portions
  alternatives:
  - into seven parts
  - for seven allotments
  lexicon: HALOT
  rationale: חֲלָקִים means divisions/portions. In context of tribal distribution,
    'portions' fits the land-allotment setting while remaining literal enough.
- source_word: עַל סֵפֶר
  chosen: in a book
  alternatives:
  - on a scroll
  - in writing
  lexicon: HALOT
  rationale: סֵפֶר can denote a written document or scroll. 'In a book' follows the
    conventional sense of a written record, though the ancient medium was likely a
    scroll.
- source_word: וַיָּבֹאוּ אֶל יְהוֹשֻׁעַ
  chosen: they came to Joshua
  alternatives:
  - they returned to Joshua
  lexicon: HALOT
  rationale: The verb simply says 'came.' Although return is implied by context, the
    main text should not add that nuance beyond the Hebrew.
- source_word: אֶל הַמַּחֲנֶה שִׁלֹה
  chosen: at the camp in Shiloh
  alternatives:
  - to the camp at Shiloh
  - to the camp, Shiloh
  lexicon: HALOT
  rationale: The phrase identifies Joshua's location. English idiom prefers 'at the
    camp in Shiloh' after 'came to Joshua,' avoiding awkward repetition of 'to.'
