id: JOS.18.5
reference: Joshua 18:5
source:
  edition: WLC
  text: וְ/הִֽתְחַלְּק֥וּ אֹתָ֖/הּ לְ/שִׁבְעָ֣ה חֲלָקִ֑ים יְהוּדָ֞ה יַעֲמֹ֤ד עַל גְּבוּל/וֹ֙
    מִ/נֶּ֔גֶב וּ/בֵ֥ית יוֹסֵ֛ף יַעַמְד֥וּ עַל גְּבוּלָ֖/ם מִ/צָּפֽוֹן־־׃
translation:
  text: And divide it into seven portions. Judah shall remain at its border on the
    south, and the house of Joseph shall remain at their border on the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall stand at its border' / 'shall stand at their border'; the Hebrew
      verb literally means 'stand,' but here likely denotes remaining fixed in existing
      territorial boundaries.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְחַלְּקוּ אֹתָהּ
  chosen: And divide it
  alternatives:
  - And apportion it
  - And distribute it among yourselves
  lexicon: HALOT
  rationale: The Hitpael of חלק here carries the sense of dividing/apportioning the
    land among tribes. 'Divide it' is the most natural and sufficiently formal English
    rendering in this surveying-allotment context.
- source_word: לְשִׁבְעָה חֲלָקִים
  chosen: into seven portions
  alternatives:
  - into seven parts
  - into seven shares
  lexicon: HALOT
  rationale: חֲלָקִים denotes divided portions or allotments. 'Portions' fits the
    land-allotment setting better than the more mechanical 'parts' while remaining
    transparent.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the tribal name, following the project's
    policy to transliterate names.
- source_word: יַעֲמֹד עַל גְּבוּלוֹ
  chosen: shall remain at its border
  alternatives:
  - shall stand at its border
  - shall stay within its territory
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in territorial statements it idiomatically
    indicates continuing in place or remaining fixed. 'Shall remain at its border'
    communicates the sense that Judah's territory is to stay as already bounded.
- source_word: מִנֶּגֶב
  chosen: on the south
  alternatives:
  - from the south
  - in the Negev
  lexicon: HALOT
  rationale: Here נֶגֶב functions directionally/geographically as 'south,' not specifically
    the Negev region. 'On the south' fits the parallel with 'on the north' in the
    next clause.
- source_word: וּבֵית יוֹסֵף
  chosen: and the house of Joseph
  alternatives:
  - and Joseph's house
  lexicon: HALOT
  rationale: בית יוסף is the established designation for the Joseph tribes collectively.
    'House of Joseph' preserves the idiom and corporate sense.
- source_word: יַעַמְדוּ עַל גְּבוּלָם
  chosen: shall remain at their border
  alternatives:
  - shall stand at their border
  - shall remain within their territory
  lexicon: HALOT
  rationale: As with Judah, עמד is rendered idiomatically as continued territorial
    position. The plural verb and suffix require 'their border' for the collective
    'house of Joseph.'
- source_word: מִצָּפוֹן
  chosen: on the north
  alternatives:
  - from the north
  lexicon: HALOT
  rationale: Directional/geographical use meaning the northern side. 'On the north'
    preserves the territorial orientation and balances the previous clause.
