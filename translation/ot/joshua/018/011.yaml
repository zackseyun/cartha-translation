id: JOS.18.11
reference: Joshua 18:11
source:
  edition: WLC
  text: וַ/יַּ֗עַל גּוֹרַ֛ל מַטֵּ֥ה בְנֵֽי בִנְיָמִ֖ן לְ/מִשְׁפְּחֹתָ֑/ם וַ/יֵּצֵא֙
    גְּב֣וּל גּֽוֹרָלָ֔/ם בֵּ֚ין בְּנֵ֣י יְהוּדָ֔ה וּ/בֵ֖ין בְּנֵ֥י יוֹסֵֽף־׃
translation:
  text: And the lot for the tribe of the sons of Benjamin, by their clans, came up,
    and the territory of their lot came out between the sons of Judah and the sons
    of Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the boundary of their allotment came out between the sons of Judah
      and the sons of Joseph.'
    reason: lexical_alternative
  - marker: b
    text: '''The sons of Joseph'' refers collectively to the tribes descended from
      Joseph, especially Ephraim and Manasseh.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  chosen: came up
  alternatives:
  - was drawn
  - ascended
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/come up.' In the context of casting
    lots, 'came up' preserves the concrete imagery of the lot emerging, while remaining
    natural English. 'Was drawn' is possible but slightly more interpretive.
- source_word: גּוֹרָל
  chosen: lot
  alternatives:
  - allotment
  lexicon: HALOT
  rationale: The noun refers to the lot cast for apportionment. 'Lot' is the standard
    and most direct rendering here; 'allotment' would shift from the means of selection
    to the result.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In tribal-allotment contexts, מַטֶּה denotes a tribal unit rather than
    its literal sense 'staff.' 'Tribe' is the established contextual meaning.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the people of Benjamin
  - the Benjaminites
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew filial expression
    and matches the source wording. 'Benjaminites' is smoother but less transparent
    to the underlying phrase.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת refers to clan-level family groupings within the tribe.
    'By their clans' is concise and idiomatic while preserving the social structure
    better than the broader 'families.'
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - extended
  lexicon: HALOT
  rationale: The verb יצא literally means 'came out/went out.' Here it describes the
    resulting boundary/territory as it emerged from the lot assignment. 'Came out'
    keeps the narrative sequence and mirrors the Hebrew.
- source_word: גְּבוּל
  chosen: territory
  alternatives:
  - border
  - boundary
  lexicon: HALOT
  rationale: Although גְּבוּל often means 'boundary' or 'border,' in allotment contexts
    it can stand metonymically for the territorial tract defined by that border. Since
    the phrase 'territory of their lot came out between...' reads more naturally in
    English than 'boundary of their lot came out,' 'territory' best conveys the sense
    here.
- source_word: גְּבוּל גּוֹרָלָם
  chosen: the territory of their lot
  alternatives:
  - the boundary of their allotment
  - the border of their lot
  lexicon: HALOT
  rationale: This construct phrase refers to the territorial extent assigned by lot.
    'Territory of their lot' preserves both the allotment mechanism and the land sense
    of גְּבוּל.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  alternatives:
  - in the midst of ... and ...
  lexicon: HALOT
  rationale: The paired prepositions straightforwardly mark the location of Benjamin's
    allotted territory between Judah and Joseph. 'Between ... and ...' is the plain
    English equivalent.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - Judah
  - the people of Judah
  lexicon: HALOT
  rationale: Keeping 'sons of Judah' maintains consistency with the repeated Hebrew
    kinship phrasing in the verse.
- source_word: בְנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - Joseph
  - the descendants of Joseph
  lexicon: HALOT
  rationale: The Hebrew refers to the Joseph tribes collectively. 'Sons of Joseph'
    is formally accurate and preserves the source expression, even though it implicitly
    includes Ephraim and Manasseh.
