theological_decisions:
- issue: Corporate designation of Israel
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No doctrinal controversy is at stake, but the translation philosophy
    calls for gender-accurate rendering where the source is grammatically masculine
    and representative. The phrase is therefore kept closer to the Hebrew form rather
    than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Degree of conquest implied by נִכְבְּשָׁה
  chosen_reading: the land was subdued before them
  alternative_readings:
  - the land was conquered before them
  rationale: The Hebrew passive indicates subjugation/control, but in Joshua the broader
    narrative still contains unconquered areas. 'Subdued' preserves the text's claim
    without importing a stronger harmonizing conclusion than the wording requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
