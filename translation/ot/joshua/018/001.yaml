id: JOS.18.1
reference: Joshua 18:1
source:
  edition: WLC
  text: וַ/יִּקָּ֨הֲל֜וּ כָּל עֲדַ֤ת בְּנֵֽי יִשְׂרָאֵל֙ שִׁלֹ֔ה וַ/יַּשְׁכִּ֥ינוּ
    שָׁ֖ם אֶת אֹ֣הֶל מוֹעֵ֑ד וְ/הָ/אָ֥רֶץ נִכְבְּשָׁ֖ה לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: Then the whole congregation of the sons of Israel assembled at Shiloh and
    set up the tent of meeting there, and the land was subdued before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew
      is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the land was conquered before them.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: From קהל in the Niphal/wayyiqtol sense of coming together as an assembly.
    'Assembled' is natural modern English and preserves the corporate, formal sense
    better than the more casual 'gathered.'
- source_word: כָּל עֲדַת
  chosen: the whole congregation
  alternatives:
  - all the congregation
  - the entire assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community/congregation. 'The whole
    congregation' renders both כָּל and the collective force of עֲדַת smoothly in
    English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine construct is preserved
    rather than neutralized to 'Israelites.' 'Children of Israel' is traditional but
    less natural in contemporary English here. 'Sons of Israel' keeps the Hebrew form
    and covenantal identity language.
- source_word: שִׁלֹה
  chosen: Shiloh
  rationale: Proper place name; transliterated by standard English convention.
- source_word: וַיַּשְׁכִּינוּ
  chosen: set up
  alternatives:
  - caused to dwell
  - installed
  - pitched
  lexicon: HALOT
  rationale: From שכן in the Hiphil, literally 'caused to dwell.' With אֹהֶל מוֹעֵד
    as object, idiomatic English is 'set up' rather than the wooden 'caused to dwell.'
    'Pitched' is possible for a tent, but the tabernacle's establishment at Shiloh
    is broader than merely pitching fabric.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard transparent rendering of the Hebrew phrase. 'Tabernacle'
    is traditional but less directly lexical and more interpretive; 'tent of meeting'
    preserves the source expression.
- source_word: נִכְבְּשָׁה
  chosen: was subdued
  alternatives:
  - was conquered
  - was brought into subjection
  lexicon: HALOT
  rationale: From כבשׁ in the passive, indicating the land had been brought under
    Israel's control. 'Was subdued' captures the passive result without overstating
    total conquest in a way that 'was conquered' might suggest.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in their presence
  - under them
  lexicon: HALOT
  rationale: The idiom literally means 'before them' and in context conveys that the
    land lay subdued before Israel. Retaining 'before them' preserves the Hebrew idiom
    and avoids over-interpretation.
