id: JOS.18.3
reference: Joshua 18:3
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוֹשֻׁ֖עַ אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל עַד אָ֨נָה֙ אַתֶּ֣ם מִתְרַפִּ֔ים
    לָ/בוֹא֙ לָ/רֶ֣שֶׁת אֶת הָ/אָ֔רֶץ אֲשֶׁר֙ נָתַ֣ן לָ/כֶ֔ם יְהוָ֖ה אֱלֹהֵ֥י אֲבֽוֹתֵי/כֶֽם־־־׃
translation:
  text: And Joshua said to the sons of Israel, “How long will you be slack about going
    in to take possession of the land that the LORD, the God of your fathers, has
    given you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance. 'And ... said' preserves Hebrew
    narrative flow without overinterpreting discourse relation.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Chosen to preserve the Hebrew familial expression
    and the source's masculine plural form, in keeping with gender-accurate translation
    philosophy. 'Israelites' is smoother but less transparent to the Hebrew wording.
- source_word: עַד אָ֨נָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal challenge in Hebrew, naturally rendered 'How long'
    in English.
- source_word: מִתְרַפִּים
  chosen: will you be slack
  alternatives:
  - will you be negligent
  - will you be lazy
  - will you hold back
  lexicon: HALOT
  rationale: From רפה in the reflexive stem, conveying slackness, remissness, or lack
    of resolve. 'Be slack' best captures the rebuking sense without importing a stronger
    moral judgment than the Hebrew requires.
- source_word: לָבוֹא
  chosen: about going in
  alternatives:
  - to go in
  - to come
  lexicon: HALOT
  rationale: With the preceding verb of slackness, English idiom works best as 'be
    slack about going in.' 'Going in' reflects the directional sense into the land
    better than bare 'come' in English.
- source_word: לָרֶשֶׁת
  chosen: to take possession of
  alternatives:
  - to possess
  - to inherit
  lexicon: HALOT
  rationale: The verb ירשׁ can mean possess/inherit/dispossess depending on context.
    Here 'take possession of' clearly conveys entering and occupying the promised
    land without narrowing the nuance to legal inheritance alone.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land
  lexicon: HALOT
  rationale: Definite reference to the promised land; 'the land' is the natural English
    equivalent.
- source_word: אֲשֶׁר נָתַן לָכֶם
  chosen: that ... has given you
  alternatives:
  - that ... gave you
  - which ... is giving you
  lexicon: HALOT
  rationale: The perfect verb presents the gift as already granted by God, even though
    occupation remains incomplete. English present perfect preserves that completed-yet-relevant
    force well.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: אֱלֹהֵי אֲבוֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your ancestral God
  - the God of your ancestors
  lexicon: HALOT
  rationale: This covenantal formula is best preserved in its familiar and literal
    form. 'Fathers' matches the Hebrew and maintains the intergenerational covenant
    context.
