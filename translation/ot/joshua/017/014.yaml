id: JOS.17.14
reference: Joshua 17:14
source:
  edition: WLC
  text: וַֽ/יְדַבְּרוּ֙ בְּנֵ֣י יוֹסֵ֔ף אֶת יְהוֹשֻׁ֖עַ לֵ/אמֹ֑ר מַדּוּעַ֩ נָתַ֨תָּה לִּ֜/י נַחֲלָ֗ה גּוֹרָ֤ל אֶחָד֙ וְ/חֶ֣בֶל אֶחָ֔ד וַֽ/אֲנִ֣י עַם רָ֔ב עַ֥ד אֲשֶׁר עַד כֹּ֖ה בֵּֽרְכַ֥/נִי יְהוָֽה־־־־׃
translation:
  text: Then the sons of Joseph spoke to Joshua, saying, “Why have you given me one lot and one portion as an inheritance, though I am a numerous people, since Yahweh has blessed me until now?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and one tract/territory.' The Hebrew word can denote a measured portion of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר in this form commonly introduces speech. 'Spoke' fits the narrative introduction naturally, with the following לֵאמֹר carrying the content of the speech.
- source_word: בְּנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - the descendants of Joseph
  - the people of Joseph
  lexicon: HALOT
  rationale: A formally close rendering preserves the tribal designation. Although it refers corporately to the Joseph tribes, 'sons of Joseph' reflects the Hebrew construct phrase most directly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard speech-introduction infinitive rendered idiomatically as 'saying' after 'spoke.'
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative preserved without expansion.
- source_word: נָתַתָּה לִּי
  chosen: have you given me
  alternatives:
  - did you give me
  - have you assigned to me
  lexicon: HALOT
  rationale: The perfect in direct discourse can be rendered naturally in English as present perfect. Singular 'me' is retained because the speaker is the corporate tribe speaking as one entity.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - an inheritance
  - a possession
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly denotes allotted inheritance-land. 'As an inheritance' expresses the function of the gift in context.
- source_word: גּוֹרָל אֶחָד
  chosen: one lot
  alternatives:
  - a single lot
  lexicon: HALOT
  rationale: גּוֹרָל refers to the lot/allotment assigned by lot. 'One lot' is concise and contextually clear.
- source_word: וְחֶבֶל אֶחָד
  chosen: and one portion
  alternatives:
  - and one tract
  - and one territory
  - and one measured share
  lexicon: HALOT
  rationale: חֶבֶל can denote a measured portion or territory. 'Portion' is readable modern English and avoids overly technical wording while preserving the sense of a territorial share distinct from גּוֹרָל.
- source_word: וַאֲנִי עַם רָב
  chosen: though I am a numerous people
  alternatives:
  - while I am a great people
  - for I am a numerous people
  lexicon: HALOT
  rationale: The tribe speaks corporately in the singular ('I') yet describes itself as a people. 'Numerous people' best captures עַם רָב as referring to population size rather than greatness in status. 'Though' reflects the complaint's contrast with receiving only one allotment.
- source_word: עַד אֲשֶׁר עַד כֹּה
  chosen: since ... so greatly
  alternatives:
  - inasmuch as ... thus far
  - because ... until now
  lexicon: HALOT
  rationale: This idiom is somewhat compressed. In context it points to the extent of divine blessing up to the present. Rendering it with 'since' and 'so greatly' communicates the causal and intensive force in natural English.
- source_word: בֵּרְכַנִי
  chosen: has blessed me
  alternatives:
  - has prospered me
  lexicon: HALOT
  rationale: ברך is the standard verb 'bless.' Singular object suffix is retained to match the tribe's corporate singular self-reference.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
