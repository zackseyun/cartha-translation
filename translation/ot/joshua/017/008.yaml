id: JOS.17.8
reference: Joshua 17:8
source:
  edition: WLC
  text: לִ/מְנַשֶּׁ֕ה הָיְתָ֖ה אֶ֣רֶץ תַּפּ֑וּחַ וְ/תַפּ֛וּחַ אֶל גְּב֥וּל מְנַשֶּׁ֖ה
    לִ/בְנֵ֥י אֶפְרָֽיִם־׃
translation:
  text: The land of Tappuah belonged to Manasseh, but Tappuah on the border of Manasseh
    belonged to the sons of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'For Manasseh there was the land of Tappuah; but Tappuah
      at the border of Manasseh belonged to the sons of Ephraim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/מְנַשֶּׁה
  chosen: belonged to Manasseh
  alternatives:
  - was for Manasseh
  - was Manasseh's
  lexicon: HALOT
  rationale: The prefixed ל with the clause indicates possession/allotment. In this
    territorial context, 'belonged to Manasseh' expresses assigned ownership more
    naturally than a wooden 'was to Manasseh.'
- source_word: הָיְתָה
  chosen: belonged
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: Although היה is simply 'was,' English idiom in an allotment statement
    is clearer with 'belonged,' supplied from the possessive force of the clause rather
    than as a paraphrase beyond the context.
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - territory
  - country
  lexicon: HALOT
  rationale: In Joshua's allotment context, אֶרֶץ refers to territorial land rather
    than a whole country; 'land' is the most natural and sufficiently broad rendering.
- source_word: תַּפּוּחַ
  chosen: Tappuah
  rationale: This is a place name and should be transliterated, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: וְ/תַפּוּחַ
  chosen: but Tappuah
  alternatives:
  - and Tappuah
  - while Tappuah
  lexicon: HALOT
  rationale: Though ו normally means 'and,' here the clause contrasts the land of
    Tappuah assigned to Manasseh with the town/border location associated with Ephraim.
    'But' best conveys the adversative sense in context.
- source_word: אֶל
  chosen: 'on'
  alternatives:
  - toward
  - at
  - by
  lexicon: HALOT
  rationale: With גבול in a boundary description, the sense is locative/proximate.
    'On the border' is idiomatic English for a place situated at a tribal boundary.
- source_word: גְּב֥וּל מְנַשֶּׁה
  chosen: the border of Manasseh
  alternatives:
  - Manasseh's boundary
  lexicon: HALOT
  rationale: This construct phrase denotes the territorial boundary belonging to Manasseh.
    'Border' is clear modern English.
- source_word: לִ/בְנֵי אֶפְרָיִם
  chosen: belonged to the sons of Ephraim
  alternatives:
  - was for the sons of Ephraim
  - belonged to Ephraimites
  lexicon: HALOT
  rationale: The phrase identifies the recipients of the town/border area. 'Sons of
    Ephraim' preserves the Hebrew kinship expression and tribal identity more closely
    than the more interpretive 'Ephraimites.'
