theological_decisions:
- issue: Rendering בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine and is a conventional ethnonym.
    Following the project's gender-accurate principle, the literal familial expression
    is retained rather than neutralizing it to 'Israelites,' though that remains a
    viable idiomatic alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering מַס
  chosen_reading: forced labor
  alternative_readings:
  - tribute
  - taskwork
  - corvée labor
  rationale: The verse describes subjugation of remaining Canaanites rather than simple
    taxation. 'Forced labor' avoids minimizing the coercive nature of the arrangement
    and best reflects the likely sense in context.
