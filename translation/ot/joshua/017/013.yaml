id: JOS.17.13
reference: Joshua 17:13
source:
  edition: WLC
  text: וַֽ/יְהִ֗י כִּ֤י חָֽזְקוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יִּתְּנ֥וּ אֶת הַֽ/כְּנַעֲנִ֖י
    לָ/מַ֑ס וְ/הוֹרֵ֖שׁ לֹ֥א הוֹרִישֽׁ/וֹ־׃ס
translation:
  text: And it happened that when the sons of Israel became strong, they put the Canaanites
    to forced labor, but they did not completely drive them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'subjected the Canaanites to corvée labor' or 'put the Canaanites under
      tribute.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew intensifies the verb: ''they did not completely / utterly drive
      them out.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: כִּי
  chosen: that when
  alternatives:
  - when
  - as
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance following ויהי. In English, 'that
    when' naturally conveys the Hebrew construction 'and it happened that, when...'.
- source_word: חָזְקוּ
  chosen: became strong
  alternatives:
  - grew strong
  - were strong
  lexicon: HALOT
  rationale: The verb חזק in this context denotes gaining strength or becoming powerful.
    'Became strong' fits the ingressive sense in context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew familial expression
    בני ישראל. This also aligns with the project's gender-accurate principle; the
    phrase is a standard national designation but literally masculine plural construct.
- source_word: וַיִּתְּנוּ אֶת־הַכְּנַעֲנִי לָמַס
  chosen: they put the Canaanites to forced labor
  alternatives:
  - they subjected the Canaanites to forced labor
  - they made the Canaanites do corvée labor
  - they put the Canaanites under tribute
  lexicon: HALOT
  rationale: מַס refers to compulsory labor/service rather than merely taxation in
    many conquest/settlement contexts. 'Forced labor' best communicates the social
    reality in accessible modern English. The singular collective 'the Canaanite'
    is rendered as plural 'the Canaanites' for natural English collective sense.
- source_word: וְהוֹרֵשׁ לֹא הוֹרִישׁוֹ
  chosen: but they did not completely drive them out
  alternatives:
  - but they did not dispossess them
  - but they certainly did not drive him out
  - and they did not utterly drive them out
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb of ירש intensifies the action:
    ''surely/completely drive out.'' In this conquest context, ''drive out'' is clearer
    than ''dispossess'' for modern readers. The 3ms suffix refers to the collective
    Canaanite population, naturally rendered ''them'' in English.'
