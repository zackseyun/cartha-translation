id: JOS.17.18
reference: Joshua 17:18
source:
  edition: WLC
  text: כִּ֣י הַ֤ר יִֽהְיֶה לָּ/ךְ֙ כִּֽי יַ֣עַר ה֔וּא וּ/בֵ֣רֵאת֔/וֹ וְ/הָיָ֥ה לְ/ךָ֖
    תֹּֽצְאֹתָ֑י/ו כִּֽי תוֹרִ֣ישׁ אֶת הַֽ/כְּנַעֲנִ֗י כִּ֣י רֶ֤כֶב בַּרְזֶל֙ ל֔/וֹ
    כִּ֥י חָזָ֖ק הֽוּא־־־־׃פ
translation:
  text: But the hill country will be yours; though it is a forest, you shall clear
    it, and its farthest borders shall be yours. For you shall dispossess the Canaanites,
    though they have iron chariots and though they are strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mountain will be yours'; Hebrew הַר can mean 'mountain' or 'hill
      country,' and here likely refers to the upland region allotted to Joseph.
    reason: lexical_alternative
  - marker: b
    text: Or 'its extremities' or 'its outlying parts'; the Hebrew refers to the outer
      limits or borders of the forested hill country.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the Canaanite ... he is strong,' using singular forms collectively
      for the people group.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַר
  chosen: the hill country
  alternatives:
  - the mountain
  - the hill
  lexicon: HALOT
  rationale: In territorial contexts הַר commonly refers not to a single peak but
    to upland/hill country. Here Joshua is speaking of land allotment, so 'hill country'
    best reflects the geographic sense in natural English.
- source_word: יִהְיֶה לָּךְ
  chosen: will be yours
  alternatives:
  - shall be for you
  - will belong to you
  lexicon: HALOT
  rationale: The idiom היה + ל expresses possession or assignment. 'Will be yours'
    is concise and idiomatic while preserving the possessive force.
- source_word: כִּי
  chosen: though / for / but
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: This verse uses כִּי repeatedly with different discourse functions. The
    first is rendered adversatively/asseveratively in context ('But'), the second
    concessively ('though it is a forest'), and the later instances causally or concessively
    ('For... though... and though...'). English must vary to reflect the Hebrew's
    contextual force rather than mechanically repeat 'for'.
- source_word: יַעַר
  chosen: a forest
  alternatives:
  - forest land
  - woodland
  lexicon: HALOT
  rationale: The noun denotes wooded terrain. 'Forest' is the most direct rendering.
- source_word: וּבֵרֵאתוֹ
  chosen: you shall clear it
  alternatives:
  - you shall cut it down
  - you shall make it bare
  lexicon: HALOT
  rationale: From ברא in the Piel, used of clearing wooded land. 'Clear it' communicates
    the agricultural/settlement action more naturally than the more literal but potentially
    misleading 'create' or overly specific 'cut it down'.
- source_word: וְהָיָה לְךָ תֹּצְאֹתָיו
  chosen: its farthest borders shall be yours
  alternatives:
  - its outgoings shall be yours
  - its extremities shall be yours
  - its outskirts shall be yours
  lexicon: HALOT
  rationale: תֹּצְאוֹת can denote extremities, borders, or outer limits. In a land-allotment
    context, 'farthest borders' captures the sense that the whole extent of the hill
    country, out to its edges, will belong to Joseph.
- source_word: תוֹרִישׁ
  chosen: you shall dispossess
  alternatives:
  - you shall drive out
  - you shall take possession from
  lexicon: HALOT
  rationale: The Hiphil of ירש often means to cause someone to lose possession, hence
    'dispossess.' This preserves both the military and land-tenure sense better than
    the narrower 'drive out' alone.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the term often functions collectively
    for the people group. English idiom prefers the plural collective here.
- source_word: רֶכֶב בַּרְזֶל
  chosen: iron chariots
  alternatives:
  - chariots of iron
  lexicon: HALOT
  rationale: The construct phrase denotes chariots fitted with iron. 'Iron chariots'
    is standard, clear English.
- source_word: חָזָק הוּא
  chosen: they are strong
  alternatives:
  - he is strong
  - it is strong
  lexicon: HALOT
  rationale: The singular adjective/pronoun likely refers collectively to the Canaanite
    people just mentioned. English requires a plural to match 'the Canaanites' and
    convey the collective sense.
