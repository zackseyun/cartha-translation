theological_decisions:
- issue: Collective singulars for the Canaanite population
  chosen_reading: 'Render collectively as plural: ''the Canaanites ... they have ...
    they are strong.'''
  alternative_readings:
  - 'Render more formally as singular collective: ''the Canaanite ... he has ... he
    is strong.'''
  rationale: This is not a doctrinally contested issue, but it affects clarity and
    fidelity. Hebrew often uses a singular ethnonym collectively. Modern English communicates
    the referent more clearly with a plural collective in this military-land context.
