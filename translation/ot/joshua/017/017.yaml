id: JOS.17.17
reference: Joshua 17:17
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוֹשֻׁ֨עַ֙ אֶל בֵּ֣ית יוֹסֵ֔ף לְ/אֶפְרַ֥יִם וְ/לִ/מְנַשֶּׁ֖ה
    לֵ/אמֹ֑ר עַם רַ֣ב אַתָּ֗ה וְ/כֹ֤חַ גָּדוֹל֙ לָ֔/ךְ לֹֽא יִהְיֶ֥ה לְ/ךָ֖ גּוֹרָ֥ל
    אֶחָֽד־־־׃
translation:
  text: Joshua said to the house of Joseph—to Ephraim and Manasseh—saying, “You are
    a numerous people, and you have great strength; you shall not have only one allotment.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a great people.” The Hebrew phrase can denote either numerical size
      or greatness; here the land-allotment context favors “numerous people.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “lot.” In Joshua this often refers to an inheritance portion assigned
      by lot; hence “allotment.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - the descendants of Joseph
  - the clan of Joseph
  lexicon: HALOT
  rationale: A standard covenantal/tribal expression. 'House of Joseph' preserves
    the familial-tribal idiom and matches the immediate apposition to Ephraim and
    Manasseh.
- source_word: לְאֶפְרַיִם וְלִמְנַשֶּׁה
  chosen: to Ephraim and Manasseh
  alternatives:
  - namely, Ephraim and Manasseh
  lexicon: HALOT
  rationale: These datives specify the referent of 'house of Joseph.' The translation
    keeps both tribal names explicitly and uses punctuation in English to reflect
    the appositional clarification.
- source_word: עַם רַב
  chosen: a numerous people
  alternatives:
  - a great people
  - many people
  lexicon: HALOT
  rationale: '''Numerous people'' best conveys quantitative force in context, since
    the complaint concerns land allocation and population size. ''Great people'' could
    suggest status rather than number.'
- source_word: וְכֹחַ גָּדוֹל לָךְ
  chosen: and you have great strength
  alternatives:
  - and great power is yours
  - and you are very strong
  lexicon: HALOT
  rationale: The clause attributes substantial strength/capacity to Joseph's house.
    'You have great strength' is idiomatic modern English while preserving the possessive
    sense of לָךְ.
- source_word: לֹא יִהְיֶה לְךָ גּוֹרָל אֶחָד
  chosen: you shall not have only one allotment
  alternatives:
  - one lot shall not be yours
  - you will not have one portion alone
  lexicon: HALOT
  rationale: גּוֹרָל in Joshua commonly refers to an allotted inheritance portion
    assigned by lot. 'Allotment' communicates the land-distribution context better
    than the more opaque 'lot.' 'Only one' makes explicit the restrictive force implied
    by 'one' in context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Retained in a lightly formal way because it introduces direct speech
    after the addressees have been named. This preserves Hebrew discourse structure
    without sounding overly wooden.
