id: JOS.17.5
reference: Joshua 17:5
source:
  edition: WLC
  text: וַ/יִּפְּל֥וּ חַבְלֵֽי מְנַשֶּׁ֖ה עֲשָׂרָ֑ה לְ/בַ֞ד מֵ/אֶ֤רֶץ הַ/גִּלְעָד֙
    וְ/הַ/בָּשָׁ֔ן אֲשֶׁ֖ר מֵ/עֵ֥בֶר לַ/יַּרְדֵּֽן־׃
translation:
  text: Ten portions fell to Manasseh, besides the land of Gilead and Bashan, which
    is beyond the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ten allotments fell to Manasseh' or 'Ten shares came to Manasseh by
      lot.' The Hebrew uses the idiom 'fell' in a land-allotment context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְּלוּ
  chosen: fell
  alternatives:
  - were allotted
  - came by lot
  lexicon: HALOT
  rationale: From נפל in the lot/allotment context, literally 'fell.' Retaining 'fell'
    preserves the idiom of allotment by lot while remaining intelligible in English.
- source_word: חַבְלֵי
  chosen: portions
  alternatives:
  - allotments
  - shares
  - districts
  lexicon: HALOT
  rationale: חבל can denote a measuring line, territory, or allotted portion. In this
    land-distribution context, 'portions' best captures the result of measured tribal
    allotments without over-specifying the mechanism.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Standard transliteration of the tribal/personal name, following the policy
    to transliterate names.
- source_word: עֲשָׂרָה
  chosen: ten
  rationale: Straightforward cardinal number modifying the portions.
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks exclusion/addition relative to the Transjordanian territory already
    mentioned. 'Besides' is concise and natural in English.
- source_word: מֵאֶרֶץ
  chosen: the land of
  alternatives:
  - from the land of
  lexicon: HALOT
  rationale: With לְבַד, the phrase functions idiomatically as 'besides the land of...'
    rather than a strictly separative 'from the land of...' in English.
- source_word: הַגִּלְעָד וְהַבָּשָׁן
  chosen: Gilead and Bashan
  rationale: Standard place-name transliterations for the Transjordanian regions.
- source_word: אֲשֶׁר מֵעֵבֶר לַיַּרְדֵּן
  chosen: which is beyond the Jordan
  alternatives:
  - that were beyond the Jordan
  - which is on the other side of the Jordan
  lexicon: HALOT
  rationale: This relative clause identifies the location of Gilead and Bashan. Singular
    'which is' treats the preceding land expression collectively; 'beyond the Jordan'
    is the conventional and accurate geographic expression.
