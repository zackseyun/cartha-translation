id: JOS.17.16
reference: Joshua 17:16
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ בְּנֵ֣י יוֹסֵ֔ף לֹֽא יִמָּ֥צֵא לָ֖/נוּ הָ/הָ֑ר וְ/רֶ֣כֶב בַּרְזֶ֗ל
    בְּ/כָל הַֽ/כְּנַעֲנִי֙ הַ/יֹּשֵׁ֣ב בְּ/אֶֽרֶץ הָ/עֵ֔מֶק לַֽ/אֲשֶׁ֤ר בְּ/בֵית
    שְׁאָן֙ וּ/בְנוֹתֶ֔י/הָ וְ/לַֽ/אֲשֶׁ֖ר בְּ/עֵ֥מֶק יִזְרְעֶֽאל־־־־׃
translation:
  text: And the sons of Joseph said, “The hill country is not enough for us, and all
    the Canaanites who live in the valley land have iron chariots, both those in Beth-shean
    and its daughter towns and those in the Valley of Jezreel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the mountain/hill country is not found for us'; the sense
      in context is that the hill country is insufficient for the Joseph tribes.
    reason: lexical_alternative
  - marker: b
    text: Or 'chariots of iron.'
    reason: lexical_alternative
  - marker: c
    text: '''Daughter towns'' refers to smaller dependent settlements belonging to
      a larger city.'
    reason: cultural_note
lexical_decisions:
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the mountain
  - the hill country is not found for us
  - the hill is not enough for us
  lexicon: HALOT
  rationale: Though literally 'the mountain/hill country,' in territorial contexts
    this refers to the upland region allotted to Joseph. English 'hill country' best
    captures the geographic sense. The clause לֹא יִמָּצֵא לָנוּ הָהָר is idiomatic;
    rather than a wooden 'the hill country is not found for us,' the sense is that
    the hill country does not suffice for them.
- source_word: לֹא יִמָּצֵא לָנוּ
  chosen: is not enough for us
  alternatives:
  - is not found for us
  - cannot be found for us
  - will not suffice for us
  lexicon: HALOT
  rationale: The Niphal of מצא with לְ can express availability or sufficiency in
    context. Given the complaint in the surrounding passage about limited territory,
    'is not enough for us' conveys the plain sense more naturally than a strictly
    literal rendering.
- source_word: רֶכֶב בַּרְזֶל
  chosen: iron chariots
  alternatives:
  - chariots of iron
  lexicon: HALOT
  rationale: Standard military expression for chariots fitted with iron; 'iron chariots'
    is idiomatic modern English and preserves the force of the Hebrew construct.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the term is collective here, referring
    to the Canaanite population in the region. English plural communicates the collective
    sense clearly.
- source_word: הַיֹּשֵׁב
  chosen: who live
  alternatives:
  - who dwell
  - living
  lexicon: HALOT
  rationale: 'The singular participle agrees with the collective noun and is best
    rendered in natural English as a plural relative clause: ''who live.'''
- source_word: אֶרֶץ הָעֵמֶק
  chosen: the valley land
  alternatives:
  - the land of the valley
  - the valley
  - the plain
  lexicon: HALOT
  rationale: The phrase denotes the lowland/plain region in contrast to the hill country.
    'Valley land' preserves the geographic contrast without over-specifying a technical
    topographical term.
- source_word: בְּבֵית שְׁאָן
  chosen: in Beth-shean
  alternatives:
  - in Beth-shan
  lexicon: HALOT
  rationale: Standard English transliteration commonly appears as Beth-shean/Beth-shan.
    'Beth-shean' is chosen as a recognizable conventional form while preserving the
    Hebrew name.
- source_word: וּבְנוֹתֶיהָ
  chosen: and its daughter towns
  alternatives:
  - and its daughters
  - and its dependent towns
  - and its villages
  lexicon: HALOT
  rationale: '''Daughters'' is a Hebrew idiom for dependent settlements associated
    with a main city. ''Daughter towns'' preserves the metaphor while making the sense
    clear.'
- source_word: עֵמֶק יִזְרְעֶאל
  chosen: the Valley of Jezreel
  alternatives:
  - the plain of Jezreel
  - the Jezreel Valley
  lexicon: HALOT
  rationale: A straightforward geographic designation. 'Valley of Jezreel' is clear
    and close to the Hebrew construct.
- source_word: בְּכָל
  chosen: all ... have
  alternatives:
  - among all
  - throughout all
  lexicon: HALOT
  rationale: The preposition with the collective phrase indicates that this condition
    characterizes the whole Canaanite population in the valley region. Rendering it
    with 'all the Canaanites ... have' communicates the distributive sense naturally
    in English.
