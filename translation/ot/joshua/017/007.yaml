id: JOS.17.7
reference: Joshua 17:7
source:
  edition: WLC
  text: וַ/יְהִ֤י גְבוּל מְנַשֶּׁה֙ מֵֽ/אָשֵׁ֔ר הַֽ/מִּכְמְתָ֔ת אֲשֶׁ֖ר עַל פְּנֵ֣י
    שְׁכֶ֑ם וְ/הָלַ֤ךְ הַ/גְּבוּל֙ אֶל הַ/יָּמִ֔ין אֶל יֹשְׁבֵ֖י עֵ֥ין תַּפּֽוּחַ־־־־׃
translation:
  text: And the border of Manasseh was from Asher to Michmethath, which is opposite
    Shechem; then the border went to the right, toward the inhabitants of En-tappuah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is before Shechem' or 'which faces Shechem.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the right'; in boundary descriptions this may refer to a southward
      direction.
    reason: lexical_alternative
  - marker: c
    text: En-tappuah means 'spring of Tappuah.'
    reason: cultural_note
lexical_decisions:
- source_word: גְבוּל
  chosen: border
  alternatives:
  - territory
  - boundary
  lexicon: HALOT
  rationale: In a land-allotment context, גְבוּל refers to the boundary line or border
    of tribal land rather than the whole territory. 'Border' is natural English and
    fits both occurrences in the verse.
- source_word: מֵאָשֵׁר
  chosen: from Asher
  alternatives:
  - from Asherite territory
  - from the direction of Asher
  lexicon: HALOT
  rationale: The preposition מִן marks the starting point of the border description.
    'Asher' is best taken as the tribal/geographical reference point, not necessarily
    the city name alone.
- source_word: הַמִּכְמְתָת
  chosen: Michmethath
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated rather than translated,
    following the project's policy for names.
- source_word: אֲשֶׁר עַל־פְּנֵי שְׁכֶם
  chosen: which is opposite Shechem
  alternatives:
  - which is before Shechem
  - which faces Shechem
  - which is east of Shechem
  lexicon: HALOT
  rationale: עַל־פְּנֵי often denotes being in front of or opposite a place. 'Opposite
    Shechem' preserves the spatial relation without over-specifying direction. 'East
    of Shechem' is interpretive and better left out of the main text.
- source_word: וְהָלַךְ הַגְּבוּל
  chosen: then the border went
  alternatives:
  - and the border went
  - and the border ran
  - and the border extended
  lexicon: HALOT
  rationale: הלך is idiomatic in boundary descriptions for the course a border takes.
    'Went' is straightforward; 'then' reflects the narrative progression of waw without
    sounding wooden.
- source_word: אֶל־הַיָּמִין
  chosen: to the right
  alternatives:
  - southward
  - to the south
  - to the right hand
  lexicon: HALOT
  rationale: The Hebrew literally says 'to the right.' In geographical descriptions
    this can imply southward depending on orientation, but the literal expression
    is retained in the main text to avoid importing a debated directional assumption.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those living in
  - the dwellers of
  lexicon: HALOT
  rationale: The participial form denotes the people dwelling in a place. 'Inhabitants
    of' is idiomatic and suitably formal for a boundary notice.
- source_word: עֵין תַּפּוּחַ
  chosen: En-tappuah
  alternatives:
  - Spring of Tappuah
  lexicon: HALOT
  rationale: This is a place name built on עַיִן/עֵין ('spring'), but as a toponym
    it is best transliterated in the main text. The lexical sense can be preserved
    in a footnote.
