id: JOS.17.6
reference: Joshua 17:6
source:
  edition: WLC
  text: כִּ֚י בְּנ֣וֹת מְנַשֶּׁ֔ה נָחֲל֥וּ נַחֲלָ֖ה בְּ/ת֣וֹךְ בָּנָ֑י/ו וְ/אֶ֨רֶץ֙
    הַ/גִּלְעָ֔ד הָיְתָ֥ה לִ/בְנֵֽי מְנַשֶּׁ֖ה הַ/נּֽוֹתָרִֽים־׃
translation:
  text: For the daughters of Manasseh received an inheritance among his sons, and
    the land of Gilead belonged to the rest of the sons of Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because the daughters of Manasseh inherited an inheritance among his
      sons.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among his sons'; the text explicitly contrasts daughters and sons
      in the inheritance arrangement.
    reason: cultural_note
  - marker: c
    text: Or 'the land of Gilead was for the remaining sons of Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding allotment arrangement. 'For'
    fits the discourse flow in English better than the more causal-sounding 'because'
    while preserving the explanatory force.
- source_word: בְּנוֹת מְנַשֶּׁה
  chosen: the daughters of Manasseh
  alternatives:
  - Manasseh's daughters
  lexicon: HALOT
  rationale: A straightforward construct relationship. 'Daughters' is retained explicitly
    because the verse contrasts them with 'sons'; this preserves the gendered legal-inheritance
    context.
- source_word: נָחֲלוּ נַחֲלָה
  chosen: received an inheritance
  alternatives:
  - inherited an inheritance
  - obtained an inheritance
  - had an inheritance
  lexicon: HALOT
  rationale: The verb-noun cognate construction emphasizes the act of receiving hereditary
    land. 'Received an inheritance' is idiomatic modern English and preserves the
    legal-allotment sense without awkward redundancy.
- source_word: בְּתוֹךְ בָּנָיו
  chosen: among his sons
  alternatives:
  - in the midst of his sons
  - among his children
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' 'His sons' is preferred over
    'his children' because בָּנָיו is specifically masculine plural and the contrast
    with daughters is central to the verse. The pronoun naturally refers to Manasseh.
- source_word: וְאֶרֶץ הַגִּלְעָד
  chosen: and the land of Gilead
  alternatives:
  - and Gilead's land
  - and the territory of Gilead
  lexicon: HALOT
  rationale: A formal but natural rendering of the noun phrase. 'Land of Gilead' is
    standard and clear in context as territorial inheritance.
- source_word: הָיְתָה לִבְנֵי מְנַשֶּׁה הַנּוֹתָרִים
  chosen: belonged to the rest of the sons of Manasseh
  alternatives:
  - was for the remaining sons of Manasseh
  - fell to the remaining sons of Manasseh
  - was assigned to the sons of Manasseh who remained
  lexicon: HALOT
  rationale: The clause states possession/allotment. 'Belonged to' communicates the
    result of inheritance naturally in English. הַנּוֹתָרִים is rendered 'the rest'
    to distinguish those not included among the daughters receiving inheritance.
