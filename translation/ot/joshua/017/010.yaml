id: JOS.17.10
reference: Joshua 17:10
source:
  edition: WLC
  text: נֶ֣גְבָּ/ה לְ/אֶפְרַ֗יִם וְ/צָפ֨וֹנָ/ה֙ לִ/מְנַשֶּׁ֔ה וַ/יְהִ֥י הַ/יָּ֖ם גְּבוּל֑/וֹ
    וּ/בְ/אָשֵׁר֙ יִפְגְּע֣וּ/ן מִ/צָּפ֔וֹן וּ/בְ/יִשָּׂשכָ֖ר מִ/מִּזְרָֽח׃
translation:
  text: Southward it belonged to Ephraim, and northward to Manasseh, and the sea was
    its border; on the north they reached Asher, and on the east Issachar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they bordered on Asher on the north and on Issachar on the east.' The
      Hebrew verb can be rendered 'met,' 'touched,' or 'bordered on' in territorial
      descriptions.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגְבָּה
  chosen: Southward
  alternatives:
  - To the south
  - on the south side
  lexicon: HALOT
  rationale: Directional accusative/adverbial form indicating the southern side or
    direction. 'Southward' preserves the concise boundary-list style of the Hebrew.
- source_word: לְאֶפְרַיִם
  chosen: it belonged to Ephraim
  alternatives:
  - was for Ephraim
  - to Ephraim
  lexicon: HALOT
  rationale: The preposition ל marks assignment/possession in this boundary context.
    Supplying 'it belonged' makes the elliptical Hebrew intelligible in English while
    preserving the territorial sense.
- source_word: וְצָפוֹנָה
  chosen: and northward
  alternatives:
  - and to the north
  - on the north side
  lexicon: HALOT
  rationale: Directional counterpart to נֶגְבָּה. 'And northward' keeps the parallel
    structure of the verse.
- source_word: לִמְנַשֶּׁה
  chosen: to Manasseh
  alternatives:
  - belonged to Manasseh
  - was for Manasseh
  lexicon: HALOT
  rationale: As with לְאֶפְרַיִם, ל indicates territorial assignment. In English the
    verb supplied earlier can be understood, avoiding unnecessary repetition.
- source_word: וַיְהִי הַיָּם גְּבוּלוֹ
  chosen: and the sea was its border
  alternatives:
  - and the sea became its boundary
  - with the sea as its border
  lexicon: HALOT
  rationale: Straightforward clause identifying the western boundary. 'Border' is
    natural English for גְּבוּל in land-allotment contexts.
- source_word: גְּבוּלוֹ
  chosen: its border
  alternatives:
  - its boundary
  lexicon: HALOT
  rationale: Although the suffix is masculine singular, the referent is the tribal
    allotment/territory. English 'its' best reflects the impersonal territorial referent.
- source_word: וּבְאָשֵׁר יִפְגְּעוּן
  chosen: they reached Asher
  alternatives:
  - they met Asher
  - they bordered on Asher
  - they touched Asher
  lexicon: HALOT
  rationale: פגע in boundary descriptions commonly means to meet or strike against
    a border/territory. 'Reached' is idiomatic and clear in English while preserving
    the geographic sense.
- source_word: מִצָּפוֹן
  chosen: on the north
  alternatives:
  - from the north
  - to the north
  lexicon: HALOT
  rationale: In this boundary formula, the preposition marks the side from which the
    border adjoins. 'On the north' communicates location more naturally than a wooden
    'from the north.'
- source_word: וּבְיִשָּׂשכָר
  chosen: and on the east Issachar
  alternatives:
  - and they reached Issachar
  - and bordered on Issachar
  lexicon: HALOT
  rationale: The verb from the previous clause is naturally carried over elliptically.
    Rendering the object directly after the directional phrase reflects the terse
    Hebrew style while remaining readable.
- source_word: מִמִּזְרָח
  chosen: on the east
  alternatives:
  - from the east
  - to the east
  lexicon: HALOT
  rationale: As with מִצָּפוֹן, this indicates the side of adjacency in the boundary
    description. 'On the east' is the clearest idiomatic rendering.
