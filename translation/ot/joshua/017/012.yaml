id: JOS.17.12
reference: Joshua 17:12
source:
  edition: WLC
  text: וְ/לֹ֤א יָכְלוּ֙ בְּנֵ֣י מְנַשֶּׁ֔ה לְ/הוֹרִ֖ישׁ אֶת הֶֽ/עָרִ֣ים הָ/אֵ֑לֶּה
    וַ/יּ֨וֹאֶל֙ הַֽ/כְּנַעֲנִ֔י לָ/שֶׁ֖בֶת בָּ/אָ֥רֶץ הַ/זֹּֽאת־׃
translation:
  text: But the sons of Manasseh were not able to dispossess these cities, and the
    Canaanites persisted in dwelling in this land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Canaanite was determined to dwell in this land.' The Hebrew uses
      a singular collective noun and a verb that can denote willingness or resolve.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  chosen: were not able
  alternatives:
  - could not
  lexicon: HALOT
  rationale: The verb denotes ability or capability. 'Were not able' is slightly more
    formal and preserves the sense of incapacity without implying mere unwillingness.
- source_word: בְּנֵי מְנַשֶּׁה
  chosen: the sons of Manasseh
  alternatives:
  - the people of Manasseh
  - the descendants of Manasseh
  lexicon: HALOT
  rationale: Literally 'sons of Manasseh.' This keeps the gender-accurate familial
    expression of the Hebrew while functioning idiomatically for the tribal group.
- source_word: לְהוֹרִישׁ
  chosen: to dispossess
  alternatives:
  - to drive out
  - to take possession from
  lexicon: HALOT
  rationale: In conquest/inheritance contexts, the Hiphil of ירש commonly means to
    dispossess prior inhabitants. 'Dispossess' best captures the legal-territorial
    force better than the more general 'drive out.'
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - these towns
  lexicon: HALOT
  rationale: עָרִים refers to settled population centers. 'Cities' is the standard
    rendering and fits the territorial list in context.
- source_word: וַיּוֹאֶל
  chosen: persisted
  alternatives:
  - was determined
  - consented
  - undertook
  lexicon: HALOT
  rationale: The verb יאל can express willingness or resolve. In this context, where
    the point is the continued Canaanite presence despite Israel's failure, 'persisted'
    brings out the practical sense of determined continuance.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the noun often functions collectively.
    English plural communicates the collective ethnic group naturally in this context.
- source_word: לָשֶׁבֶת
  chosen: in dwelling
  alternatives:
  - to dwell
  - to remain
  lexicon: HALOT
  rationale: The infinitive expresses continued habitation. In English, 'persisted
    in dwelling' is smoother than a more wooden infinitive construction while preserving
    the verbal idea.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory under discussion rather than the earth
    generally. 'Land' is the most natural covenantal-territorial rendering.
