id: JOS.17.2
reference: Joshua 17:2
source:
  edition: WLC
  text: וַ֠/יְהִי לִ/בְנֵ֨י מְנַשֶּׁ֥ה הַ/נּוֹתָרִים֮ לְ/מִשְׁפְּחֹתָ/ם֒ לִ/בְנֵ֨י
    אֲבִיעֶ֜זֶר וְ/לִ/בְנֵי חֵ֗לֶק וְ/לִ/בְנֵ֤י אַשְׂרִיאֵל֙ וְ/לִ/בְנֵי שֶׁ֔כֶם וְ/לִ/בְנֵי
    חֵ֖פֶר וְ/לִ/בְנֵ֣י שְׁמִידָ֑ע אֵ֠לֶּה בְּנֵ֨י מְנַשֶּׁ֧ה בֶּן יוֹסֵ֛ף הַ/זְּכָרִ֖ים
    לְ/מִשְׁפְּחֹתָֽ/ם־־־־׃
translation:
  text: 'And for the remaining sons of Manasseh, according to their clans: for the
    sons of Abiezer, and for the sons of Helek, and for the sons of Asriel, and for
    the sons of Shechem, and for the sons of Hepher, and for the sons of Shemida.
    These were the male sons of Manasseh son of Joseph, according to their clans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest of the descendants of Manasseh.' The Hebrew literally says
      'the remaining sons of Manasseh.'
    reason: lexical_alternative
  - marker: b
    text: '''Clans'' renders Hebrew mishpechot, a kinship subdivision within a tribe;
      ''families'' is a possible alternative.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'the male sons' emphasizes that these are the male lines of Manasseh,
      in contrast to the daughters of Zelophehad mentioned in the surrounding passage.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  chosen: And there was / And for ...
  alternatives:
  - And it was
  - Now there was
  lexicon: HALOT
  rationale: 'The verb introduces the apportionment statement idiomatically. In English,
    a fully literal ''and it was'' is awkward here, so the clause is carried into
    a natural distributive construction: ''And for the remaining sons of Manasseh...''
    This preserves the narrative linkage without wooden English.'
- source_word: לִבְנֵי מְנַשֶּׁה
  chosen: for the sons of Manasseh
  alternatives:
  - to the sons of Manasseh
  - for the descendants of Manasseh
  lexicon: HALOT
  rationale: The preposition ל marks indirect object/allotment relation in context.
    'Sons of Manasseh' is retained rather than generalized to 'descendants' because
    the verse is enumerating named clan lines and later contrasts them with Zelophehad's
    daughters in the context.
- source_word: הַנּוֹתָרִים
  chosen: the remaining
  alternatives:
  - the rest
  - those left over
  lexicon: HALOT
  rationale: This refers to the rest of Manasseh's lines beyond the special case already
    discussed in the surrounding context. 'Remaining' is natural and precise.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-allotment contexts is best rendered 'clan' rather
    than the broader modern English 'family,' since it denotes a recognized kinship
    subdivision within a tribe.
- source_word: לִבְנֵי אֲבִיעֶזֶר ... וְלִבְנֵי חֵלֶק ...
  chosen: for the sons of Abiezer ... and for the sons of Helek ...
  alternatives:
  - for the clan of Abiezer ...
  - for the descendants of Abiezer ...
  lexicon: HALOT
  rationale: The repeated formula לִבְנֵי + proper name is preserved with 'for the
    sons of' for formal transparency. Although these are effectively clan names, the
    Hebrew expression is literally filial and the repetition contributes to the legal-register
    style of the allotment list.
- source_word: אַשְׂרִיאֵל
  chosen: Asriel
  alternatives:
  - Ashriel
  lexicon: HALOT
  rationale: A standard English transliteration is used. 'Asriel' reflects common
    convention for this name in English Bible tradition.
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: In this narrative summary, 'These were' reads naturally in English and
    marks the concluding identification of the listed groups.
- source_word: בְּנֵי מְנַשֶּׁה בֶּן יוֹסֵף
  chosen: the sons of Manasseh son of Joseph
  alternatives:
  - the descendants of Manasseh, the son of Joseph
  lexicon: HALOT
  rationale: The genealogical expression is kept close to the Hebrew. 'Son of Joseph'
    identifies Manasseh specifically and preserves the lineage formula.
- source_word: הַזְּכָרִים
  chosen: the male sons
  alternatives:
  - the males
  - the men
  lexicon: HALOT
  rationale: The adjective/noun marks these as male descendants in contrast with the
    daughters of Zelophehad in the immediate context. 'Male sons' sounds slightly
    redundant in English, but that redundancy reflects the Hebrew emphasis and clarifies
    why the distinction matters here.
