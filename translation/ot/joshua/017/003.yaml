id: JOS.17.3
reference: Joshua 17:3
source:
  edition: WLC
  text: וְ/לִ/צְלָפְחָד֩ בֶּן חֵ֨פֶר בֶּן גִּלְעָ֜ד בֶּן מָכִ֣יר בֶּן מְנַשֶּׁ֗ה לֹא
    הָ֥יוּ ל֛/וֹ בָּנִ֖ים כִּ֣י אִם בָּנ֑וֹת וְ/אֵ֨לֶּה֙ שְׁמ֣וֹת בְּנֹתָ֔י/ו מַחְלָ֣ה
    וְ/נֹעָ֔ה חָגְלָ֥ה מִלְכָּ֖ה וְ/תִרְצָֽה־־־־־־׃
translation:
  text: 'Now Zelophehad son of Hepher, son of Gilead, son of Machir, son of Manasseh,
    had no sons, but only daughters; and these are the names of his daughters: Mahlah,
    Noah, Hoglah, Milcah, and Tirzah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'And/Now to Zelophehad,' an idiomatic introduction of
      Zelophehad's case.
    reason: lexical_alternative
  - marker: b
    text: Noah here is Zelophehad's daughter, not the male figure from Genesis.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/לִ/צְלָפְחָד
  chosen: Now Zelophehad
  alternatives:
  - And for Zelophehad
  - And to Zelophehad
  lexicon: HALOT
  rationale: The prefixed ו plus ל before the proper name is idiomatic in this genealogical/legal
    context, introducing a new case or subject rather than marking simple possession.
    'Now Zelophehad' gives natural English discourse flow while preserving the shift
    to his situation. The name is transliterated per policy for personal names.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶּן
  chosen: son of ... son of ... son of ... son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated construct chain is preserved formally as a genealogy. Although
    'descendant of' could compress the sense, the Hebrew explicitly repeats 'son of,'
    and retaining it preserves the lineage structure important in the inheritance
    context.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper name transliterated. Here it refers to the tribal ancestor in
    the genealogy, not a title or place requiring translation.
- source_word: לֹא הָיוּ לוֹ בָּנִים
  chosen: had no sons
  alternatives:
  - there were no sons for him
  - he had no children
  lexicon: HALOT
  rationale: 'This clause is most naturally rendered idiomatically in English as possession:
    ''had no sons.'' ''Children'' would be too broad because the contrast with daughters
    is central to the verse.'
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  - male children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring, contrasted with בָּנוֹת.
    'Sons' is the gender-accurate rendering required by context.
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except that
  - but rather
  lexicon: HALOT
  rationale: 'In this negated contrast, כִּי אִם marks exception/contrast: he had
    no sons, but only daughters. ''But only'' is clear modern English and preserves
    the exclusivity.'
- source_word: בָּנוֹת
  chosen: daughters
  lexicon: HALOT
  rationale: Direct lexical equivalent and the necessary counterpart to 'sons' in
    the inheritance setting.
- source_word: וְאֵלֶּה שְׁמוֹת בְּנֹתָיו
  chosen: and these are the names of his daughters
  alternatives:
  - and these were the names of his daughters
  lexicon: HALOT
  rationale: A standard Hebrew naming formula. Present tense 'are' works idiomatically
    in English for introducing a list within narrative, while still reflecting the
    formulaic force. 'His daughters' preserves the possessive suffix.
- source_word: מַחְלָה
  chosen: Mahlah
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: וְנֹעָה
  chosen: Noah
  alternatives:
  - Noah (female)
  lexicon: HALOT
  rationale: The Hebrew name is identical in consonants to the more familiar male
    name Noah, but here it is one of Zelophehad's daughters. Standard transliteration
    remains 'Noah'; context makes the referent female.
- source_word: חָגְלָה
  chosen: Hoglah
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: מִלְכָּה
  chosen: Milcah
  alternatives:
  - Milkah
  lexicon: HALOT
  rationale: Standard English biblical transliteration is 'Milcah,' which aids recognizability
    while remaining close to the Hebrew form.
- source_word: וְתִרְצָה
  chosen: and Tirzah
  lexicon: HALOT
  rationale: Proper name transliterated; conjunction retained before the final name
    in keeping with Hebrew list style and natural English enumeration.
