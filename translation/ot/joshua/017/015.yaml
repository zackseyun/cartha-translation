id: JOS.17.15
reference: Joshua 17:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵי/הֶ֜ם יְהוֹשֻׁ֗עַ אִם עַם רַ֤ב אַתָּה֙ עֲלֵ֣ה לְ/ךָ֣ הַ/יַּ֔עְרָ/ה
    וּ/בֵרֵאתָ֤ לְ/ךָ֙ שָׁ֔ם בְּ/אֶ֥רֶץ הַ/פְּרִזִּ֖י וְ/הָֽ/רְפָאִ֑ים כִּֽי אָ֥ץ
    לְ/ךָ֖ הַר אֶפְרָֽיִם־־־־׃
translation:
  text: Joshua said to them, “If you are a numerous people, go up to the forest and
    clear land for yourselves there in the land of the Perizzites and the Rephaim,
    since the hill country of Ephraim is too narrow for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “go up into the forest and clear it for yourselves there.” The Hebrew
      verb refers to clearing wooded land.
    reason: lexical_alternative
  - marker: b
    text: “Hill country of Ephraim” may also be rendered “Mount Ephraim,” referring
      to the upland region allotted to Ephraim.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם רַב
  chosen: a numerous people
  alternatives:
  - a great people
  - many people
  lexicon: HALOT
  rationale: The phrase denotes numerical size. 'Numerous people' is natural modern
    English and preserves Joshua's acknowledgment of Joseph's claim to large numbers.
- source_word: עֲלֵה לְךָ הַיַּעְרָה
  chosen: go up to the forest
  alternatives:
  - go up into the forest
  - go up for yourself to the forest
  lexicon: HALOT
  rationale: עלה with the directional sense and the article on 'forest' indicates
    movement into/up to the wooded area. English omits the reflexive nuance of לְךָ
    in the main clause as idiomatic, while the benefit-to-self idea is carried later
    by 'for yourselves.'
- source_word: וּבֵרֵאתָ לְךָ שָׁם
  chosen: clear land for yourselves there
  alternatives:
  - cut it down there for yourself
  - clear it for yourself there
  lexicon: HALOT
  rationale: From ברא in the Piel, used of clearing forested land. 'Clear land' makes
    explicit the implied object in idiomatic English without over-paraphrasing. The
    benefactive לְךָ is represented by 'for yourselves.'
- source_word: בְּאֶרֶץ הַפְּרִזִּי וְהָרְפָאִים
  chosen: in the land of the Perizzites and the Rephaim
  alternatives:
  - in the land of the Perizzites and of the Rephaim
  lexicon: HALOT
  rationale: Both ethnonyms/name-groups are preserved by transliteration. 'Rephaim'
    is preferable to interpretive renderings because the term can function as an ethnic/geographical
    designation here.
- source_word: כִּי אָץ לְךָ
  chosen: since ... is too narrow for you
  alternatives:
  - for ... is too cramped for you
  - because ... presses you
  lexicon: HALOT
  rationale: The adjective/verb conveys constriction or crampedness. In context Joshua
    explains that the current allotment is insufficient for their size, so 'too narrow
    for you' is the clearest idiomatic rendering.
- source_word: הַר אֶפְרָיִם
  chosen: the hill country of Ephraim
  alternatives:
  - Mount Ephraim
  - the mountains of Ephraim
  lexicon: HALOT
  rationale: In territorial contexts הַר commonly refers to hill country rather than
    a single peak. 'Hill country of Ephraim' best fits the geographical sense in Joshua.
