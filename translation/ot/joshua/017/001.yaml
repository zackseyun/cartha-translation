id: JOS.17.1
reference: Joshua 17:1
source:
  edition: WLC
  text: וַ/יְהִ֤י הַ/גּוֹרָל֙ לְ/מַטֵּ֣ה מְנַשֶּׁ֔ה כִּי ה֖וּא בְּכ֣וֹר יוֹסֵ֑ף לְ/מָכִיר֩
    בְּכ֨וֹר מְנַשֶּׁ֜ה אֲבִ֣י הַ/גִּלְעָ֗ד כִּ֣י ה֤וּא הָיָה֙ אִ֣ישׁ מִלְחָמָ֔ה וַֽ/יְהִי
    ל֖/וֹ הַ/גִּלְעָ֥ד וְ/הַ/בָּשָֽׁן־־׃
translation:
  text: 'Now the lot fell to the tribe of Manasseh, for he was the firstborn of Joseph:
    to Machir the firstborn of Manasseh, the father of Gilead, because he was a man
    of war, there belonged Gilead and Bashan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestor/founder of Gilead.' The Hebrew 'father of' can denote a
      progenitor or founder, not only an immediate biological father.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַגּוֹרָל
  chosen: the lot fell
  alternatives:
  - the lot was
  - the allotment came
  lexicon: HALOT
  rationale: The idiom with היה and גּוֹרָל in this context refers to the outcome
    of lot-casting for territorial inheritance. 'The lot fell' is natural English
    and preserves the procedural sense better than a wooden 'the lot was.'
- source_word: לְמַטֵּה מְנַשֶּׁה
  chosen: to the tribe of Manasseh
  alternatives:
  - for the tribe of Manasseh
  - to the staff of Manasseh
  lexicon: HALOT
  rationale: מַטֶּה in Joshua commonly denotes a tribal unit, not a literal staff.
    'To the tribe of Manasseh' communicates the referent clearly in context.
- source_word: כִּי הוּא בְּכוֹר יוֹסֵף
  chosen: for he was the firstborn of Joseph
  alternatives:
  - because he was Joseph's firstborn
  lexicon: HALOT
  rationale: The pronoun refers to Manasseh. The clause gives the rationale for Manasseh's
    allotment priority. 'For' fits the explanatory force of כִּי.
- source_word: לְמָכִיר
  chosen: to Machir
  alternatives:
  - for Machir
  - as for Machir
  lexicon: HALOT
  rationale: The prefixed ל introduces the specific line within Manasseh receiving
    territory. 'To Machir' preserves the distributive sense tied to inheritance assignment.
- source_word: בְּכוֹר מְנַשֶּׁה
  chosen: the firstborn of Manasseh
  lexicon: HALOT
  rationale: A straightforward genealogical designation; retaining 'firstborn' preserves
    both birth order and inheritance significance.
- source_word: אֲבִי הַגִּלְעָד
  chosen: the father of Gilead
  alternatives:
  - the ancestor of Gilead
  - the founder of Gilead
  lexicon: HALOT
  rationale: אָב can denote progenitor or founder. 'Father of Gilead' keeps the Hebrew
    familial idiom in the main text; the broader sense can be clarified by footnote.
- source_word: אִישׁ מִלְחָמָה
  chosen: a man of war
  alternatives:
  - a warrior
  - a fighting man
  lexicon: HALOT
  rationale: The phrase denotes a proven military man. 'Man of war' is slightly more
    formal but remains readable and preserves the Hebrew expression's force.
- source_word: וַיְהִי לוֹ
  chosen: there belonged
  alternatives:
  - it was his
  - he had
  lexicon: HALOT
  rationale: In this inheritance context, the phrase indicates possession/allotment.
    'There belonged' expresses assigned possession more precisely than the colloquial
    'he had.'
- source_word: הַגִּלְעָד וְהַבָּשָׁן
  chosen: Gilead and Bashan
  lexicon: HALOT
  rationale: These are established place names and should be transliterated rather
    than translated, per the translation philosophy for names.
