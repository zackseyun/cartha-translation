id: JOS.15.15
reference: Joshua 15:15
source:
  edition: WLC
  text: וַ/יַּ֣עַל מִ/שָּׁ֔ם אֶל יֹשְׁבֵ֖י דְּבִ֑ר וְ/שֵׁם דְּבִ֥ר לְ/פָנִ֖ים קִרְיַת
    סֵֽפֶר־־־׃
translation:
  text: From there he went up against the inhabitants of Debir. (Formerly the name
    of Debir was Kiriath-sepher.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kiriath-sepher may mean 'City of the Book' or 'City of Writing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: he went up against
  alternatives:
  - he went up to
  - he attacked
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up.' In military/geographical narrative
    it can carry the sense of advancing against a place or people. Because the object
    is introduced by אֶל plus 'the inhabitants of Debir,' English 'went up against'
    preserves both the literal ascent imagery and the hostile movement implied by
    context better than the flatter 'went up to.'
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: Standard deictic adverb indicating movement from the previously mentioned
    location.
- source_word: אֶל יֹשְׁבֵי דְּבִר
  chosen: against the inhabitants of Debir
  alternatives:
  - to the inhabitants of Debir
  - against those dwelling in Debir
  lexicon: HALOT
  rationale: יֹשְׁבֵי is the participial form 'inhabitants/dwellers of.' With the
    military narrative and עלה, English idiom prefers 'against the inhabitants of
    Debir.'
- source_word: דְּבִר
  chosen: Debir
  rationale: Place name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: וְשֵׁם דְּבִר לְפָנִים
  chosen: Formerly the name of Debir was
  alternatives:
  - and the former name of Debir was
  - and Debir's name before was
  lexicon: HALOT
  rationale: לְפָנִים here is temporal, 'formerly/before.' The clause is parenthetical
    background information, and smooth English is best achieved with 'Formerly the
    name of Debir was.'
- source_word: קִרְיַת סֵפֶר
  chosen: Kiriath-sepher
  alternatives:
  - Kiriath-sefer
  - City of the Book
  lexicon: HALOT
  rationale: This is a toponym and should be transliterated in the main text. Because
    the components can be understood as 'city of book/document,' a lexical alternative
    is worth preserving in a footnote, but the main text should retain the place name.
