id: JOS.15.50
reference: Joshua 15:50
source:
  edition: WLC
  text: וַ/עֲנָ֥ב וְ/אֶשְׁתְּמֹ֖ה וְ/עָנִֽים׃
translation:
  text: Anab, Eshtemoh, and Anim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eshtemoh is also commonly spelled 'Eshtemoa' in English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָב
  chosen: Anab
  alternatives:
  - Aneb
  rationale: Proper place name in a town list; transliterated rather than translated
    in keeping with the project's policy for names. 'Anab' reflects the conventional
    English transliteration of the Hebrew place name.
- source_word: אֶשְׁתְּמֹה
  chosen: Eshtemoh
  alternatives:
  - Eshtemoa
  - Eshtemoa
  rationale: Proper place name; transliterated. 'Eshtemoh' closely represents the
    consonantal form and final heh in English while remaining readable. Alternative
    conventional spellings exist in English tradition.
- source_word: עָנִים
  chosen: Anim
  alternatives:
  - Anim
  rationale: Proper place name in plural-looking form but functioning as a toponym;
    rendered by standard transliteration 'Anim' rather than attempting to translate
    the form.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the place names in a simple coordinate
    list; rendered idiomatically as repeated 'and' in English.
