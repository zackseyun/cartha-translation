id: JOS.15.14
reference: Joshua 15:14
source:
  edition: WLC
  text: וַ/יֹּ֤רֶשׁ מִ/שָּׁם֙ כָּלֵ֔ב אֶת שְׁלוֹשָׁ֖ה בְּנֵ֣י הָ/עֲנָ֑ק אֶת שֵׁשַׁ֤י
    וְ/אֶת אֲחִימַן֙ וְ/אֶת תַּלְמַ֔י יְלִידֵ֖י הָ/עֲנָֽק־־־־׃
translation:
  text: 'And Caleb drove out from there the three sons of Anak: Sheshai, Ahiman, and
    Talmai, descendants of Anak.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dispossessed from there the three sons of Anak.' The Hebrew verb can
      emphasize taking possession by driving prior occupants out.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Anak' ... 'those born of Anak.' The verse uses two related
      genealogical expressions for the same group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרֶשׁ
  chosen: drove out
  alternatives:
  - dispossessed
  - took possession from
  - expelled
  lexicon: HALOT
  rationale: The verb ירשׁ in the Hiphil/waw-consecutive narrative form commonly carries
    the sense of causing someone to lose possession, hence 'dispossess' or 'drive
    out.' In this context, with persons as the object ('the three sons of Anak'),
    'drove out' is natural modern English and fits the conquest setting better than
    the more wooden 'dispossessed.'
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - therefrom
  lexicon: HALOT
  rationale: A straightforward locative adverb with prefixed preposition; 'from there'
    is the natural contemporary rendering.
- source_word: שְׁלוֹשָׁה בְּנֵי הָעֲנָק
  chosen: the three sons of Anak
  alternatives:
  - the three descendants of Anak
  - the three Anakites
  lexicon: HALOT
  rationale: Formally, בְּנֵי means 'sons of.' Since the verse then names three individuals,
    the literal familial expression is appropriate in the main text. 'Anakites' is
    interpretive and less transparent to the Hebrew wording.
- source_word: שֵׁשַׁי
  chosen: Sheshai
  rationale: Standard transliteration of the personal name.
- source_word: אֲחִימַן
  chosen: Ahiman
  rationale: Standard transliteration of the personal name.
- source_word: תַּלְמַי
  chosen: Talmai
  rationale: Standard transliteration of the personal name.
- source_word: יְלִידֵי הָעֲנָק
  chosen: descendants of Anak
  alternatives:
  - those born to Anak
  - offspring of Anak
  - children of Anak
  lexicon: HALOT
  rationale: יְלִידֵי literally denotes those born of someone, but in English 'descendants
    of Anak' communicates the genealogical sense clearly and avoids awkward repetition
    after 'sons of Anak.' The appositional phrase identifies the named men as belonging
    to Anak's line.
