id: JOS.15.7
reference: Joshua 15:7
source:
  edition: WLC
  text: וְ/עָלָ֨ה הַ/גְּב֥וּל דְּבִרָ/ה֮ מֵ/עֵ֣מֶק עָכוֹר֒ וְ/צָפ֜וֹנָ/ה פֹּנֶ֣ה אֶל
    הַ/גִּלְגָּ֗ל אֲשֶׁר נֹ֨כַח֙ לְ/מַעֲלֵ֣ה אֲדֻמִּ֔ים אֲשֶׁ֥ר מִ/נֶּ֖גֶב לַ/נָּ֑חַל
    וְ/עָבַ֤ר הַ/גְּבוּל֙ אֶל מֵי עֵ֣ין שֶׁ֔מֶשׁ וְ/הָי֥וּ תֹצְאֹתָ֖י/ו אֶל עֵ֥ין
    רֹגֵֽל׀־־־־־׃
translation:
  text: And the border went up to Debir from the Valley of Achor, and turned northward
    toward Gilgal, which is opposite the Ascent of Adummim, which is south of the
    wadi. Then the border passed on to the waters of En-shemesh, and its end was at
    En-rogel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Gilgal' instead of 'toward Gilgal'; the Hebrew can denote either
      orientation toward the site or movement to it within the boundary description.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' refers to a seasonal streambed or ravine; Hebrew נחל often denotes
      such a watercourse in this kind of topographical description.'
    reason: cultural_note
  - marker: c
    text: Or 'its extremities were at En-rogel'; the Hebrew literally uses a plural
      form ('its goings out' / 'its outgoings') for the border's termination.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  chosen: went up
  alternatives:
  - ascended
  - ran up
  lexicon: HALOT
  rationale: In boundary descriptions עלה commonly describes the line rising in elevation
    or proceeding upward. 'Went up' is natural English and preserves the topographical
    sense without over-paraphrasing.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the territory line
  lexicon: HALOT
  rationale: גְּבוּל here refers to the boundary line being traced, not the whole
    territory. 'Border' is concise and idiomatic in English for this genre.
- source_word: דְּבִרָה
  chosen: to Debir
  alternatives:
  - toward Debir
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward/to Debir. 'To
    Debir' is the most direct rendering.
- source_word: מֵעֵמֶק עָכוֹר
  chosen: from the Valley of Achor
  alternatives:
  - from Achor Valley
  lexicon: HALOT
  rationale: עֵמֶק is 'valley.' The construct phrase is well represented by the established
    but still transparent 'Valley of Achor.'
- source_word: וְצָפוֹנָה פֹּנֶה
  chosen: and turned northward
  alternatives:
  - and faced northward
  - and turned to the north
  lexicon: HALOT
  rationale: פּנה with directional language indicates turning/facing in a direction.
    For a border line, 'turned northward' best fits the surveying context.
- source_word: אֶל הַגִּלְגָּל
  chosen: toward Gilgal
  alternatives:
  - to Gilgal
  lexicon: HALOT
  rationale: Because the clause describes orientation of the border line rather than
    necessarily arrival at the site in that sub-clause, 'toward Gilgal' is slightly
    more precise than 'to Gilgal.'
- source_word: אֲשֶׁר נֹכַח לְמַעֲלֵה אֲדֻמִּים
  chosen: which is opposite the Ascent of Adummim
  alternatives:
  - which is in front of the Ascent of Adummim
  - which faces the Ascent of Adummim
  lexicon: HALOT
  rationale: נֹכַח conveys being opposite or facing. מַעֲלֵה is an ascent/pass. 'Ascent
    of Adummim' preserves the place name and terrain feature.
- source_word: אֲשֶׁר מִנֶּגֶב לַנָּחַל
  chosen: which is south of the wadi
  alternatives:
  - which is on the south side of the valley
  - which is south of the streambed
  lexicon: HALOT
  rationale: נֶגֶב here is directional 'south of,' not the Negev region. נַחַל often
    denotes a seasonal watercourse; 'wadi' preserves the geographical sense better
    than 'river' or generic 'valley.'
- source_word: וְעָבַר
  chosen: passed on
  alternatives:
  - crossed over
  - continued
  lexicon: HALOT
  rationale: In boundary formulas עבר can mean the line passes along or across to
    the next point. 'Passed on' is natural and avoids implying a literal crossing
    if not explicit.
- source_word: אֶל מֵי עֵין שֶׁמֶשׁ
  chosen: to the waters of En-shemesh
  alternatives:
  - to the springs of En-shemesh
  - to the waters of Spring of the Sun
  lexicon: HALOT
  rationale: The place name is best transliterated per project policy. מֵי literally
    means 'waters of,' likely referring to the spring waters at En-shemesh; this is
    retained in translation.
- source_word: וְהָיוּ תֹצְאֹתָיו
  chosen: and its end was at
  alternatives:
  - and its extremities were at
  - and its outlets were at
  - and its termination was at
  lexicon: HALOT
  rationale: תֹצָאוֹת in boundary contexts refers to the border's end points/termination.
    Singular English 'its end' is idiomatic though the Hebrew form is plural of extent.
    This avoids awkward literalism while preserving the surveying sense.
- source_word: אֶל עֵין רֹגֵל
  chosen: at En-rogel
  alternatives:
  - to En-rogel
  lexicon: HALOT
  rationale: The preposition marks the terminal point. 'At En-rogel' reads naturally
    after 'its end was at.' The place name is transliterated.
