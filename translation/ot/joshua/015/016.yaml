id: JOS.15.16
reference: Joshua 15:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר כָּלֵ֔ב אֲשֶׁר יַכֶּ֥ה אֶת קִרְיַת סֵ֖פֶר וּ/לְכָדָ֑/הּ וְ/נָתַ֥תִּי
    ל֛/וֹ אֶת עַכְסָ֥ה בִתִּ֖/י לְ/אִשָּֽׁה־־־־׃
translation:
  text: And Caleb said, “Whoever strikes Kiriath-sepher and captures it, I will give
    him Achsah my daughter as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one who strikes Kiriath-sepher and captures it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form introducing the next event in sequence.
    'And ... said' preserves Hebrew narrative flow without overinterpreting temporal
    nuance.
- source_word: כָּלֵב
  chosen: Caleb
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֲשֶׁר
  chosen: whoever
  alternatives:
  - the one who
  - he who
  lexicon: HALOT
  rationale: Introduces an indefinite relative clause. 'Whoever' is idiomatic modern
    English and accurately conveys the open challenge Caleb is issuing.
- source_word: יַכֶּה
  chosen: strikes
  alternatives:
  - attacks
  - defeats
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'strike/smite.' Here it refers to military
    action against the city. 'Strikes' preserves the concrete verbal force better
    than the more interpretive 'defeats.'
- source_word: אֶת קִרְיַת סֵפֶר
  chosen: Kiriath-sepher
  alternatives:
  - Kiriath-sepher city
  rationale: Place name transliterated. No need to render קִרְיַת ('city of') separately
    in English because it is part of the established proper name.
- source_word: וּלְכָדָהּ
  chosen: and captures it
  alternatives:
  - and takes it
  - and seizes it
  lexicon: HALOT
  rationale: לכד in military contexts means to capture or seize. 'Captures it' is
    natural English and makes explicit the 3fs suffix referring to the city.
- source_word: וְנָתַתִּי לוֹ
  chosen: I will give him
  alternatives:
  - then I will give to him
  lexicon: HALOT
  rationale: Simple future-like promise in context. English omits the explicit preposition
    in idiomatic phrasing while preserving the recipient with 'him.'
- source_word: עַכְסָה
  chosen: Achsah
  rationale: Personal name transliterated by standard convention.
- source_word: בִתִּי
  chosen: my daughter
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly because it is
    part of Caleb's offer.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - as his wife
  lexicon: HALOT
  rationale: Idiomatic expression for giving a woman in marriage. 'As a wife' is clear
    modern English and avoids adding possessive wording not explicit in the Hebrew,
    though the recipient is already indicated by 'him'.
