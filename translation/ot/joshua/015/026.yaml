id: JOS.15.26
reference: Joshua 15:26
source:
  edition: WLC
  text: אֲמָ֥ם וּ/שְׁמַ֖ע וּ/מוֹלָדָֽה׃
translation:
  text: Amam, Shema, and Moladah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shema may also be rendered 'Shemah' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמָם
  chosen: Amam
  alternatives:
  - Amam
  rationale: Proper place name in a town list; transliterated rather than translated
    in keeping with the stated philosophy to transliterate names by standard conventions.
- source_word: וּ/שְׁמַע
  chosen: and Shema
  alternatives:
  - and Shemah
  rationale: The prefixed conjunction וּ is rendered 'and.' The proper name is transliterated
    as 'Shema'; 'Shemah' is a possible English form reflecting final ayin, but the
    shorter standard transliteration is preferred for readability.
- source_word: וּ/מוֹלָדָה
  chosen: and Moladah
  alternatives:
  - and Molad ah
  - and Moladah
  rationale: The prefixed conjunction וּ is rendered 'and.' The place name is transliterated
    as 'Moladah,' a standard English form for this toponym in Joshua's town lists.
