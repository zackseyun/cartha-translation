id: JOS.15.39
reference: Joshua 15:39
source:
  edition: WLC
  text: לָכִ֥ישׁ וּ/בָצְקַ֖ת וְ/עֶגְלֽוֹן׃
translation:
  text: Lachish, Bozkath, and Eglon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bozkath is also spelled 'Boskath' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכִישׁ
  chosen: Lachish
  alternatives:
  - Lakish
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated. 'Lachish' is the standard English transliteration for
    this Judean city.
- source_word: בָצְקַת
  chosen: Bozkath
  alternatives:
  - Boskath
  lexicon: HALOT
  rationale: Proper place name in a city list. The consonantal form is traditionally
    represented in English as 'Bozkath'; transliteration is preferred for toponyms.
- source_word: עֶגְלוֹן
  chosen: Eglon
  lexicon: HALOT
  rationale: Proper place name; transliterated in keeping with the translation philosophy.
    In this context it denotes the city, not the Moabite king of the same name.
- source_word: וּ / וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links items in a simple list of towns; rendered
    with standard English coordination, with commas added for readable modern English.
