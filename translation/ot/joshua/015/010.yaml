id: JOS.15.10
reference: Joshua 15:10
source:
  edition: WLC
  text: וְ/נָסַב֩ הַ/גְּב֨וּל מִ/בַּעֲלָ֥ה יָ֨מָּ/ה֙ אֶל הַ֣ר שֵׂעִ֔יר וְ/עָבַ֕ר אֶל
    כֶּ֧תֶף הַר יְעָרִ֛ים מִ/צָּפ֖וֹנָ/ה הִ֣יא כְסָל֑וֹן וְ/יָרַ֥ד בֵּֽית שֶׁ֖מֶשׁ
    וְ/עָבַ֥ר תִּמְנָֽה־־־־׃
translation:
  text: Then the border turned from Baalah westward to Mount Seir, passed along to
    the northern slope of Mount Jearim (that is, Chesalon), went down to Beth-shemesh,
    and passed on to Timnah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sea-ward,' a standard idiom for 'westward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  chosen: turned
  alternatives:
  - went around
  - curved
  lexicon: HALOT
  rationale: In a boundary description, the verb denotes a change in direction of
    the border line. 'Turned' is natural modern English and preserves the geographic
    sense without over-paraphrase.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: Standard term in territorial descriptions; 'border' is concise and idiomatic
    in English.
- source_word: מִבַּעֲלָה
  chosen: from Baalah
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - to the west
  lexicon: HALOT
  rationale: The Hebrew directional form literally reflects 'sea-ward,' i.e., westward
    in the land of Israel. 'Westward' communicates the directional sense clearly for
    modern readers.
- source_word: אֶל הַר שֵׂעִיר
  chosen: to Mount Seir
  alternatives:
  - to the hill country of Seir
  lexicon: HALOT
  rationale: הַר can denote mountain or hill country. Here, in a sequence of boundary
    landmarks, 'Mount Seir' is the most straightforward rendering and preserves the
    toponymic feel.
- source_word: וְעָבַר
  chosen: passed along
  alternatives:
  - crossed over
  - passed
  lexicon: HALOT
  rationale: In boundary formulas this verb often means the border extends past or
    along a feature rather than physically 'crosses' it. 'Passed along' fits the cartographic
    context.
- source_word: אֶל כֶּתֶף
  chosen: to the ... slope
  alternatives:
  - to the side of
  - to the shoulder of
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder/side.' For a mountain in English geographic
    style, 'slope' communicates the terrain feature more naturally while retaining
    the image of a flank.
- source_word: הַר יְעָרִים
  chosen: Mount Jearim
  alternatives:
  - the mountain of Jearim
  - Mount of Forests
  lexicon: HALOT
  rationale: Treated as a place name in context; transliteration is preferable to
    a semantic rendering.
- source_word: מִצָּפוֹנָה
  chosen: northern
  alternatives:
  - from the north
  - northward
  lexicon: HALOT
  rationale: With כֶּתֶף in a boundary description, the phrase identifies the north
    side/slope of the mountain. 'Northern' is the most idiomatic modifier in English.
- source_word: הִיא כְסָלוֹן
  chosen: (that is, Chesalon)
  alternatives:
  - it is Chesalon
  lexicon: HALOT
  rationale: The pronoun introduces an explanatory identification of the preceding
    place. Parenthetical 'that is' reflects the appositional clarification naturally
    in English.
- source_word: וְיָרַד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: Common topographical verb in route and boundary descriptions. 'Went down'
    is readable modern English and preserves the elevation sense.
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - Beth Shemesh
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard convention.
- source_word: וְעָבַר
  chosen: passed on to
  alternatives:
  - passed to
  - continued to
  lexicon: HALOT
  rationale: A slight variation from the earlier occurrence avoids stiffness while
    preserving the same boundary-progression sense; the contextual nuance is movement
    onward to the next landmark.
- source_word: תִּמְנָה
  chosen: Timnah
  lexicon: HALOT
  rationale: Proper place name, transliterated.
