id: JOS.15.9
reference: Joshua 15:9
source:
  edition: WLC
  text: וְ/תָאַ֨ר הַ/גְּב֜וּל מֵ/רֹ֣אשׁ הָ/הָ֗ר אֶל מַעְיַן֙ מֵ֣י נֶפְתּ֔וֹחַ וְ/יָצָ֖א
    אֶל עָרֵ֣י הַר עֶפְר֑וֹן וְ/תָאַ֤ר הַ/גְּבוּל֙ בַּעֲלָ֔ה הִ֖יא קִרְיַ֥ת יְעָרִֽים־־־׃
translation:
  text: Then the border curved from the top of the mountain to the spring of the waters
    of Nephtoah, and went out to the cities of Mount Ephron; then the border curved
    to Baalah (that is, Kiriath-jearim).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the border was marked out' / 'the border turned.' The Hebrew verb in
      this boundary context can denote tracing or changing direction of the border
      line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָאַר
  chosen: curved
  alternatives:
  - was marked out
  - turned
  - extended around
  lexicon: HALOT
  rationale: In boundary descriptions, the verb describes the border changing direction
    or being traced around a feature. 'Curved' is natural modern English and fits
    the topographical context better than a more abstract 'was marked out.'
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: Standard rendering in territorial allotment contexts. 'Border' is slightly
    more idiomatic in English while preserving the geographic sense.
- source_word: מֵרֹאשׁ הָהָר
  chosen: from the top of the mountain
  alternatives:
  - from the summit of the mountain
  - from the head of the mountain
  lexicon: HALOT
  rationale: '''Top'' clearly conveys רֹאשׁ in this geographic expression. ''Head''
    would be overly literal in English.'
- source_word: מַעְיַן מֵי נֶפְתּוֹחַ
  chosen: the spring of the waters of Nephtoah
  alternatives:
  - the spring at the waters of Nephtoah
  - the spring of Nephtoah's waters
  lexicon: HALOT
  rationale: This preserves the construct chain closely while remaining readable.
    'Nephtoah' is transliterated as a place name per translation philosophy.
- source_word: וְיָצָא
  chosen: went out
  alternatives:
  - extended
  - proceeded
  - reached
  lexicon: HALOT
  rationale: In boundary formulas, יצא often indicates the line proceeding onward.
    'Went out' preserves the Hebrew idiom without excessive stiffness.
- source_word: עָרֵי הַר עֶפְרוֹן
  chosen: the cities of Mount Ephron
  alternatives:
  - the towns of the hill country of Ephron
  - the cities of the hill of Ephron
  lexicon: HALOT
  rationale: The construct chain is somewhat compressed. 'Mount Ephron' is the most
    straightforward formal rendering of הַר עֶפְרוֹן, and 'cities' matches עָרֵי.
    A more interpretive 'hill country' would go beyond the immediate wording.
- source_word: בַּעֲלָה
  chosen: Baalah
  lexicon: HALOT
  rationale: Proper place name, so transliterated.
- source_word: הִיא קִרְיַת יְעָרִים
  chosen: that is, Kiriath-jearim
  alternatives:
  - it is Kiriath-jearim
  lexicon: HALOT
  rationale: The pronoun identifies Baalah with another place name. 'That is' is idiomatic
    English for appositional identification.
