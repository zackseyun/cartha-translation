theological_decisions:
- issue: Gendered tribal designation in בְּנֵי יְהוּדָה
  chosen_reading: the sons of Judah
  alternative_readings:
  - the people of Judah
  - the descendants of Judah
  rationale: No doctrinal issue is at stake, but the translation philosophy requires
    gender-accurate rendering where the source is grammatically masculine and representative.
    The phrase names the tribal descendants of Judah using the standard Hebrew filial
    expression, so the masculine form is preserved in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
