id: JOS.15.12
reference: Joshua 15:12
source:
  edition: WLC
  text: וּ/גְב֣וּל יָ֔ם הַ/יָּ֥מָּ/ה הַ/גָּד֖וֹל וּ/גְב֑וּל זֶ֠ה גְּב֧וּל בְּנֵֽי
    יְהוּדָ֛ה סָבִ֖יב לְ/מִשְׁפְּחֹתָֽ/ם־׃
translation:
  text: And the western border was the Great Sea as a border. This was the border
    of the sons of Judah all around, by their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sea, the Great Sea'; that is, the Mediterranean Sea, marking
      Judah's western side.
    reason: cultural_note
  - marker: b
    text: Or 'according to their families.' The Hebrew term refers to clan groupings
      within the tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּגְבוּל
  chosen: And the ... border
  alternatives:
  - And the boundary
  lexicon: HALOT
  rationale: גְּבוּל denotes a territorial limit or boundary line. 'Border' is natural
    modern English in a land-allotment context and is retained consistently through
    the passage.
- source_word: יָם / הַיָּמָּה
  chosen: western
  alternatives:
  - seaward
  - toward the sea
  - west
  lexicon: HALOT
  rationale: In boundary descriptions, יָם with the directional ending in הַיָּמָּה
    functions idiomatically for the sea-side, i.e., the west, since the Mediterranean
    lay to Israel's west. Rendering the phrase as 'the western border' communicates
    the directional force clearly in English.
- source_word: הַגָּדוֹל
  chosen: Great
  alternatives:
  - great
  lexicon: HALOT
  rationale: With 'the sea,' this adjective forms the conventional designation 'the
    Great Sea,' referring to the Mediterranean. Capitalization reflects a geographic
    designation rather than a mere descriptive adjective.
- source_word: וּגְבוּל
  chosen: as a border
  alternatives:
  - and its border
  - with its coastline as the boundary
  lexicon: HALOT
  rationale: 'The repeated גְּבוּל after ''the Great Sea'' is terse Hebrew apposition:
    ''the Great Sea and border.'' In English, ''as a border'' best conveys the predicative/appositional
    sense without awkwardness.'
- source_word: זֶה
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Although the demonstrative is verbless in Hebrew, English normally supplies
    a copula. Past tense fits the narrative description of the tribal allotment.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  lexicon: HALOT
  rationale: The Hebrew is explicitly filial/plural masculine construct. Per the gender-accurate
    philosophy, 'sons of Judah' is preferred over a neutralized rendering, while still
    referring corporately to the tribe.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on all sides
  lexicon: HALOT
  rationale: סָבִיב summarizes the border as encircling the tribal territory. 'All
    around' is idiomatic modern English.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in allotment contexts refers to clan-level family groupings
    within the tribe. 'By their clans' concisely expresses distribution with respect
    to those kinship units.
