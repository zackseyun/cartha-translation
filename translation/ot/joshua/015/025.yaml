id: JOS.15.25
reference: Joshua 15:25
source:
  edition: WLC
  text: וְ/חָצ֤וֹר חֲדַתָּה֙ וּ/קְרִיּ֔וֹת חֶצְר֖וֹן הִ֥יא חָצֽוֹר׀׃
translation:
  text: and Hazor-hadattah, and Kerioth-hezron (that is, Hazor),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Hazor, Hadattah, and Kerioth-hezron; that is, Hazor,' if חֲדַתָּה
      is taken as a separate town name rather than part of the compound 'Hazor-hadattah.'
    reason: alternative_reading
  - marker: b
    text: '''Kerioth'' may also be understood as a place name spelled ''Kirioth''
      in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/חָצוֹר
  chosen: and Hazor
  alternatives:
  - and Hazar
  lexicon: HALOT
  rationale: Proper place name with prefixed conjunction וְ. Transliterated rather
    than translated per philosophy for names. 'Hazor' is the conventional English
    transliteration of חָצוֹר.
- source_word: חֲדַתָּה
  chosen: -hadattah
  alternatives:
  - Hadattah
  - new
  lexicon: HALOT
  rationale: Taken as part of the compound place name 'Hazor-hadattah,' following
    the accentuation and common understanding of the town list. Although the form
    is related to 'new,' in this context it functions as a toponymic element rather
    than an adjectival predicate, so transliteration is preferable to 'New Hazor'.
- source_word: וּ/קְרִיּוֹת
  chosen: and Kerioth
  alternatives:
  - and Kirioth
  - and towns
  lexicon: HALOT
  rationale: In a list of Judahite towns, the form is best read as the proper name
    'Kerioth/Kirioth' rather than the common noun 'towns/cities.' Standard transliteration
    'Kerioth' is used.
- source_word: חֶצְרוֹן
  chosen: -hezron
  alternatives:
  - Hezron
  lexicon: HALOT
  rationale: Attached to the preceding name as a compound toponym, 'Kerioth-hezron,'
    as reflected by many translations and the syntax of the list. Lowercase after
    hyphen reflects continuation of the compound in English styling, not diminution
    of proper-name status.
- source_word: הִיא
  chosen: that is
  alternatives:
  - it is
  - she is
  lexicon: HALOT
  rationale: 'Here the pronoun introduces an appositional identification or clarification:
    ''that is, Hazor.'' This is more idiomatic in English than the overly literal
    ''it is'' while preserving the explanatory force.'
- source_word: חָצוֹר
  chosen: Hazor
  alternatives:
  - Hazar
  lexicon: HALOT
  rationale: Final proper name identified appositionally with the preceding place
    name. Transliterated consistently as 'Hazor.'
