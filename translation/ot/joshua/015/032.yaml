id: JOS.15.32
reference: Joshua 15:32
source:
  edition: WLC
  text: וּ/לְבָא֥וֹת וְ/שִׁלְחִ֖ים וְ/עַ֣יִן וְ/רִמּ֑וֹן כָּל עָרִ֛ים עֶשְׂרִ֥ים וָ/תֵ֖שַׁע
    וְ/חַצְרֵי/הֶֽן־׃ס
translation:
  text: and Lebaoth, Shilhim, Ain, and Rimmon—twenty-nine cities in all, with their
    villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their villages' can also be rendered 'their settlements' or 'their
      hamlets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבָאוֹת
  chosen: and Lebaoth
  alternatives:
  - and Lebaoth
  lexicon: HALOT
  rationale: Proper place name in a list of towns; transliterated rather than translated
    per project philosophy for names. Initial conjunction retained as 'and' to reflect
    list structure.
- source_word: וְשִׁלְחִים
  chosen: Shilhim
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: וְעַיִן
  chosen: Ain
  alternatives:
  - Ayin
  lexicon: HALOT
  rationale: Proper place name, not the common noun 'spring/eye' in this context.
    Transliterated as a toponym.
- source_word: וְרִמּוֹן
  chosen: Rimmon
  lexicon: HALOT
  rationale: Proper place name; transliterated. Though the common noun can mean 'pomegranate,'
    the context is a town list, so the toponym is intended.
- source_word: כָּל עָרִים
  chosen: cities in all
  alternatives:
  - all the cities
  lexicon: HALOT
  rationale: The phrase summarizes the total number of listed settlements. 'Cities
    in all' is idiomatic modern English while preserving the sense of totality.
- source_word: עֶשְׂרִים וָתֵשַׁע
  chosen: twenty-nine
  lexicon: HALOT
  rationale: Cardinal number rendered in standard English form.
- source_word: וְחַצְרֵיהֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: חָצֵר in territorial lists commonly refers to dependent villages/settlements
    associated with a town. 'Villages' is the most natural and widely understood rendering
    in English.
