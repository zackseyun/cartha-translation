id: JOS.15.6
reference: Joshua 15:6
source:
  edition: WLC
  text: וְ/עָלָ֤ה הַ/גְּבוּל֙ בֵּ֣ית חָגְלָ֔ה וְ/עָבַ֕ר מִ/צְּפ֖וֹן לְ/בֵ֣ית הָעֲרָבָ֑ה
    וְ/עָלָ֣ה הַ/גְּב֔וּל אֶ֥בֶן בֹּ֖הַן בֶּן רְאוּבֵֽן־׃
translation:
  text: Then the border went up to Beth-hoglah, and passed north of Beth-arabah; and
    the border went up to the stone of Bohan son of Reuben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bohan’s stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  chosen: went up
  alternatives:
  - ascended
  - ran up
  lexicon: HALOT
  rationale: In boundary descriptions עלה commonly describes the line proceeding upward
    in elevation or direction. 'Went up' is idiomatic and preserves the topographical
    flavor better than the more formal 'ascended.'
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the territory line
  lexicon: HALOT
  rationale: גְּבוּל here refers to the boundary line, not the whole territory. 'Border'
    is natural English and fits repeated usage in this geographic context.
- source_word: בֵּית חָגְלָה
  chosen: Beth-hoglah
  alternatives:
  - Beth Hoglah
  lexicon: HALOT
  rationale: Place name is transliterated per project philosophy to transliterate
    names rather than translate them.
- source_word: וְעָבַר
  chosen: passed
  alternatives:
  - crossed over
  - went across
  lexicon: HALOT
  rationale: In this boundary list the verb marks the line continuing past a point
    or area. 'Passed' is concise and fits the syntax with 'north of.'
- source_word: מִצְּפוֹן
  chosen: north of
  alternatives:
  - from the north of
  - on the north side of
  lexicon: HALOT
  rationale: The preposition מן with צפון in boundary formulas indicates position
    relative to the named site. 'North of' communicates the sense more idiomatically
    than a wooden 'from the north of.'
- source_word: לְבֵית הָעֲרָבָה
  chosen: Beth-arabah
  alternatives:
  - to Beth-arabah
  lexicon: HALOT
  rationale: The phrase is governed by the preceding directional expression and identifies
    the reference point. In English, 'passed north of Beth-arabah' reads naturally
    without repeating a literal 'to.' The place name is transliterated.
- source_word: אֶבֶן בֹּהַן
  chosen: the stone of Bohan
  alternatives:
  - Bohan's stone
  lexicon: HALOT
  rationale: Construct relationship is preserved. 'The stone of Bohan' is slightly
    more formal but matches the Hebrew structure and traditional geographic designation.
- source_word: בֶּן רְאוּבֵן
  chosen: son of Reuben
  alternatives:
  - the Reubenite
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'son of Reuben,' likely identifying Bohan
    by tribal ancestry. The more interpretive 'the Reubenite' is possible but less
    exact.
