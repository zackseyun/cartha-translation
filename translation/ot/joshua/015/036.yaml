id: JOS.15.36
reference: Joshua 15:36
source:
  edition: WLC
  text: וְ/שַׁעֲרַ֨יִם֙ וַ/עֲדִיתַ֔יִם וְ/הַ/גְּדֵרָ֖ה וּ/גְדֵרֹתָ֑יִם עָרִ֥ים אַרְבַּֽע
    עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'and Shaaraim, and Adithaim, and Gederah, and Gederothaim: fourteen cities
    with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some interpreters note that the four place names listed in this verse do
      not obviously total the stated 'fourteen cities'; the larger section's textual
      history may account for the discrepancy, but the Hebrew text here is translated
      as given.
    reason: textual_variant
lexical_decisions:
- source_word: שַׁעֲרַיִם
  chosen: Shaaraim
  alternatives:
  - Sharaim
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy for names. The doubled vowel reflects the Hebrew form as transparently
    as possible in English.
- source_word: עֲדִיתַיִם
  chosen: Adithaim
  lexicon: HALOT
  rationale: Proper place name; transliterated directly.
- source_word: הַגְּדֵרָה
  chosen: Gederah
  alternatives:
  - the Gederah
  lexicon: HALOT
  rationale: Although the Hebrew includes the article, with a toponym English normally
    omits 'the' unless the name conventionally requires it. Rendering simply as the
    place name is the most natural and accurate English equivalent.
- source_word: גְדֵרֹתָיִם
  chosen: Gederothaim
  lexicon: HALOT
  rationale: Proper place name; transliterated directly.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Standard rendering for עִיר in territorial lists. 'Cities' is conventional
    and fits the administrative sense of listed settlements.
- source_word: אַרְבַּע עֶשְׂרֵה
  chosen: fourteen
  lexicon: HALOT
  rationale: Cardinal number rendered idiomatically in English.
- source_word: חַצְרֵיהֶן
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  lexicon: HALOT
  rationale: In allotment lists, חָצֵר commonly refers to dependent villages or unwalled
    satellite settlements associated with a city. 'Villages' is the clearest natural
    English rendering.
