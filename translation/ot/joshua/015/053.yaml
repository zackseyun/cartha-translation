id: JOS.15.53
reference: Joshua 15:53
source:
  edition: WLC
  text: ו/ינים וּ/בֵית תַּפּ֖וּחַ וַ/אֲפֵֽקָה־׃
translation:
  text: and Janim, and Beth-tappuah, and Aphekah;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Janim: alternatively spelled ''Janim'' in some English traditions.'
    reason: lexical_alternative
  - marker: b
    text: 'Beth-tappuah: alternatively ''Beth Tappuah'' or ''Beth-tappuach.'''
    reason: lexical_alternative
  - marker: c
    text: 'Aphekah: alternatively ''Aphakah''; some English versions shorten the name
      to ''Aphek.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/ינים
  chosen: and Janim
  alternatives:
  - and Janim
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered 'and' in this place-name list.
    The proper noun ינים is transliterated rather than translated, following the philosophy
    for names. 'Janim' is a standard English transliteration; 'Janim' reflects a slightly
    different vocalization tradition and is worth preserving as an alternative spelling.
- source_word: וּ/בֵית תַּפּוּחַ
  chosen: and Beth-tappuah
  alternatives:
  - and Beth Tappuah
  - and Beth-tappuach
  lexicon: HALOT
  rationale: The conjunction וּ is rendered 'and.' בֵית in compound toponyms is conventionally
    transliterated as 'Beth-' rather than translated 'house of,' since this is a settled
    place-name, not a productive phrase in context. תַּפּוּחַ is retained by transliteration
    as part of the compound name. Hyphenation aids readability in English place names.
- source_word: וַ/אֲפֵקָה
  chosen: and Aphekah
  alternatives:
  - and Aphakah
  - and Aphek
  lexicon: HALOT
  rationale: The prefixed conjunction וַ is rendered 'and.' אֲפֵקָה is a place name
    and is therefore transliterated. 'Aphekah' preserves the final ה in English representation
    better than the shorter 'Aphek,' which may refer to a related but distinct toponym
    elsewhere.
