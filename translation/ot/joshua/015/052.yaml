id: JOS.15.52
reference: Joshua 15:52
source:
  edition: WLC
  text: אֲרַ֥ב וְ/רוּמָ֖ה וְ/אֶשְׁעָֽן׃
translation:
  text: Arab, Rumah, and Eshan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew consists of three place names in Judah''s hill country: Arab, Rumah,
      and Eshan. Some English versions spell the last name ''Eshean.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרַב
  chosen: Arab
  alternatives:
  - A rab
  - Arabah
  lexicon: HALOT
  rationale: Proper noun in a town list within Judah's territorial allotment. As a
    place name, it is transliterated rather than translated, following the project's
    policy to transliterate names. 'Arab' is the most straightforward English representation
    of the consonantal form here; alternatives reflect possible spelling conventions
    or confusion with other similarly formed toponyms, but are less likely in this
    context.
- source_word: וְ/רוּמָה
  chosen: and Rumah
  alternatives:
  - and Rumah
  lexicon: HALOT
  rationale: The prefixed conjunction וְ is rendered 'and,' and the proper noun is
    transliterated. English spelling may vary between 'Rumah' and 'Rumah/Rumah' depending
    on transliteration conventions; 'Rumah' best reflects the Hebrew vocalization
    רוּמָה.
- source_word: וְ/אֶשְׁעָן
  chosen: and Eshan
  alternatives:
  - and Eshean
  lexicon: HALOT
  rationale: The conjunction וְ is rendered 'and,' and the place name is transliterated.
    'Eshan' is a conventional and phonologically close rendering of אֶשְׁעָן. 'Eshean'
    is a possible alternative influenced by some English traditions, but the shorter
    form more directly reflects the Hebrew spelling.
