id: JOS.15.49
reference: Joshua 15:49
source:
  edition: WLC
  text: וְ/דַנָּ֥ה וְ/קִרְיַת סַנָּ֖ה הִ֥יא דְבִֽר־׃
translation:
  text: and Dannah, and Kiriath-sannah (that is, Debir),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Kiriath Sannah”; literally, “Kiriath-sannah, it is Debir,” identifying
      Kiriath-sannah with Debir.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַנָּה
  chosen: Dannah
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per translation
    philosophy for names.
- source_word: קִרְיַת סַנָּה
  chosen: Kiriath-sannah
  alternatives:
  - Kiriath Sannah
  - City of Sannah
  lexicon: HALOT
  rationale: Compound place name. 'Kiriath' is retained in transliteration for consistency
    with established rendering of Hebrew place names built on קִרְיַת, rather than
    translating the first element as 'city of,' which would obscure the toponymic
    form.
- source_word: הִיא
  chosen: that is
  alternatives:
  - it is
  - which is
  lexicon: HALOT
  rationale: In appositional identification of one place name with another, idiomatic
    English prefers 'that is' to mark equivalence clearly.
- source_word: דְבִר
  chosen: Debir
  lexicon: HALOT
  rationale: Proper place name; transliterated. Here it identifies Kiriath-sannah
    by its alternate or later name.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: Standard conjunction in this city list; retained for the list structure.
