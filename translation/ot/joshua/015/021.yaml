id: JOS.15.21
reference: Joshua 15:21
source:
  edition: WLC
  text: וַ/יִּֽהְי֣וּ הֶ/עָרִ֗ים מִ/קְצֵה֙ לְ/מַטֵּ֣ה בְנֵֽי יְהוּדָ֔ה אֶל גְּב֥וּל
    אֱד֖וֹם בַּ/נֶּ֑גְבָּ/ה קַבְצְאֵ֥ל וְ/עֵ֖דֶר וְ/יָגֽוּר־־׃
translation:
  text: 'And the cities at the outermost part of the tribe of the sons of Judah, toward
    the border of Edom in the Negev, were: Kabzeel, Eder, and Jagur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the end of the tribe of the sons of Judah'; the Hebrew expression
      refers to the extremity or outer edge of Judah's territory.
    reason: lexical_alternative
  - marker: b
    text: '''Negev'' can also be rendered ''south'' or ''southern region.'' Here it
      likely refers to the specific southern district of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - and there were
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces the list of cities. English 'were'
    is natural before a nominative list; 'and there were' is possible but less smooth.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - these were the cities
  lexicon: HALOT
  rationale: Definite plural noun referring to the towns now being enumerated. 'The
    cities' preserves the formal structure of the Hebrew.
- source_word: מִקְצֵה
  chosen: at the outermost part
  alternatives:
  - from the end of
  - at the extremity of
  lexicon: HALOT
  rationale: The noun denotes an extremity or edge. In this territorial context, 'at
    the outermost part' communicates location idiomatically in English better than
    the more wooden 'from the end of.'
- source_word: לְמַטֵּה
  chosen: of the tribe of
  alternatives:
  - belonging to the tribe of
  - for the tribe of
  lexicon: HALOT
  rationale: מַטֶּה in Joshua commonly denotes a tribal division. 'Of the tribe of'
    is the standard and clear territorial sense here.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the Israelites of Judah
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of Judah.' Per translation philosophy,
    gender-accurate rendering is preferred where it matches the source. Here it is
    a conventional tribal designation, so the literal form is retained.
- source_word: אֶל גְּבוּל אֱדוֹם
  chosen: toward the border of Edom
  alternatives:
  - at the border of Edom
  - near the border of Edom
  lexicon: HALOT
  rationale: אֶל with גְּבוּל marks orientation toward the border region. 'Toward
    the border of Edom' reflects the directional nuance without overstating exact
    adjacency.
- source_word: בַּנֶּגְבָּה
  chosen: in the Negev
  alternatives:
  - in the south
  - in the southern region
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or the specific southern region known as the Negev.
    Because this is a geographic boundary description in Judah, 'the Negev' best preserves
    the regional sense.
- source_word: קַבְצְאֵל
  chosen: Kabzeel
  alternatives:
  - Kabeziel
  lexicon: HALOT
  rationale: Proper place name transliterated according to standard English convention,
    in keeping with the philosophy to transliterate names.
- source_word: עֵדֶר
  chosen: Eder
  lexicon: HALOT
  rationale: Proper place name, transliterated directly.
- source_word: יָגוּר
  chosen: Jagur
  alternatives:
  - Yagur
  lexicon: HALOT
  rationale: Proper place name, transliterated. 'Jagur' follows common English convention;
    'Yagur' more closely reflects the initial yod but is less standard in English
    Bible usage.
