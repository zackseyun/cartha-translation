id: JOS.15.56
reference: Joshua 15:56
source:
  edition: WLC
  text: וְ/יִזְרְעֶ֥אל וְ/יָקְדְעָ֖ם וְ/זָנֽוֹחַ׃
translation:
  text: Jezreel, Jokdeam, and Zanoah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew consists of a simple list of town names in Judah's inheritance.
    reason: cultural_note
lexical_decisions:
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  alternatives:
  - Yizreel
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    in keeping with the philosophy to transliterate names. 'Jezreel' is the standard
    English conventional form.
- source_word: יָקְדְעָם
  chosen: Jokdeam
  alternatives:
  - Yoqdeam
  - Jokdeamah
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Jokdeam' reflects standard English
    Bible convention for this toponym. Alternative spellings reflect closer transliteration
    or variant traditional forms.
- source_word: זָנוֹחַ
  chosen: Zanoah
  alternatives:
  - Zanoh
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Zanoah' is the established English
    form for the Hebrew place name.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction joins the place names in a simple list; in English,
    commas with a final 'and' naturally represent the Hebrew sequence.
