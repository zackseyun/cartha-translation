id: JOS.15.48
reference: Joshua 15:48
source:
  edition: WLC
  text: וּ/בָ/הָ֑ר שָׁמִ֥יר וְ/יַתִּ֖יר וְ/שׂוֹכֹֽה׃
translation:
  text: 'In the hill country: Shamir, Jattir, and Socoh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and in the hill country'; the initial conjunction links
      this verse to the continuing list of towns.
    reason: lexical_alternative
  - marker: b
    text: Jattir may also be transliterated 'Yattir.'
    reason: lexical_alternative
  - marker: c
    text: Socoh may also be transliterated 'Sokoh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בָ/הָר
  chosen: In the hill country
  alternatives:
  - And in the hill country
  - in the mountains
  - in the hill region
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition and noun literally mean 'and
    in the hill/mountain region.' In this list of territorial towns, English idiom
    is smoother without carrying over the connective 'and' at the start of the verse,
    since it continues the larger catalog. 'Hill country' is the standard geographic
    rendering for the Judean highlands and fits the singular collective noun.
- source_word: שָׁמִיר
  chosen: Shamir
  rationale: Proper place name; transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: וְ/יַתִּיר
  chosen: Jattir
  alternatives:
  - Yattir
  rationale: Proper place name with prefixed conjunction. The conjunction is represented
    by the list comma structure in English. 'Jattir' follows a conventional English
    transliteration; 'Yattir' is a possible more phonetic alternative.
- source_word: וְ/שׂוֹכֹה
  chosen: Socoh
  alternatives:
  - Sokoh
  - Soco
  rationale: Proper place name with prefixed conjunction. 'Socoh' is a conventional
    English form for this toponym; other transliterations are possible, but this form
    is recognizable in English Bible geography.
