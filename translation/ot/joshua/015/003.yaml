id: JOS.15.3
reference: Joshua 15:3
source:
  edition: WLC
  text: וְ֠/יָצָא אֶל מִ/נֶּ֜גֶב לְ/מַעֲלֵ֤ה עַקְרַבִּים֙ וְ/עָ֣בַר צִ֔נָ/ה וְ/עָלָ֥ה
    מִ/נֶּ֖גֶב לְ/קָדֵ֣שׁ בַּרְנֵ֑עַ וְ/עָבַ֤ר חֶצְרוֹן֙ וְ/עָלָ֣ה אַדָּ֔רָ/ה וְ/נָסַ֖ב
    הַ/קַּרְקָֽעָ/ה־׃
translation:
  text: Then it went out southward to the ascent of Akrabbim, crossed over to Zin,
    went up south of Kadesh-barnea, crossed over Hezron, went up to Addar, and turned
    toward Karka.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akrabbim likely means 'scorpions'; the Hebrew name is transliterated because
      it functions here as a place name.
    reason: lexical_alternative
  - marker: b
    text: Or 'toward Karkaa'; the place name's English spelling is uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then it went out
  alternatives:
  - and it went out
  - and it extended
  lexicon: HALOT
  rationale: In this boundary-description context, the verb describes the border line
    proceeding from the previous point. 'Went out' is a natural rendering that preserves
    the motion imagery without over-paraphrasing to 'extended.' 'Then' captures the
    sequential waw in readable English.
- source_word: אֶל מִנֶּגֶב
  chosen: southward
  alternatives:
  - to the south
  - from the south side
  lexicon: HALOT
  rationale: The phrase marks direction along the southern side in a border itinerary.
    'Southward' is concise and idiomatic in English, preserving directional force
    without awkward literalism.
- source_word: לְמַעֲלֵה עַקְרַבִּים
  chosen: to the ascent of Akrabbim
  alternatives:
  - to the pass of Akrabbim
  - to the ascent of Scorpions
  lexicon: HALOT
  rationale: מַעֲלֵה denotes an ascent or pass. 'Ascent' is slightly more formal and
    close to the Hebrew. עַקְרַבִּים is a place name, so it is transliterated as 'Akrabbim'
    per the translation philosophy favoring transliteration of names; the lexical
    sense 'scorpions' is worth preserving in a footnote.
- source_word: וְעָבַר
  chosen: crossed over
  alternatives:
  - passed along
  - passed through
  lexicon: HALOT
  rationale: The verb עבר in boundary formulas commonly indicates the line passing
    across or beyond a location. 'Crossed over' preserves the movement sense and is
    idiomatic.
- source_word: צִנָה
  chosen: to Zin
  alternatives:
  - Zin
  lexicon: HALOT
  rationale: Proper place name. The directional sense is supplied by the preceding
    verb, so English naturally renders 'to Zin' with the verb 'crossed over.'
- source_word: וְעָלָה
  chosen: went up
  alternatives:
  - ascended
  - continued up
  lexicon: HALOT
  rationale: עלה in geographical descriptions often means moving upward in elevation
    or northward/up-country. 'Went up' is the standard clear rendering.
- source_word: מִנֶּגֶב לְקָדֵשׁ בַּרְנֵעַ
  chosen: south of Kadesh-barnea
  alternatives:
  - from the south to Kadesh-barnea
  - on the south of Kadesh-barnea
  lexicon: HALOT
  rationale: Here מִנֶּגֶב functions adverbially with the place name to indicate the
    border passed on the south side of Kadesh-barnea. 'South of Kadesh-barnea' best
    fits the boundary context and standard English usage.
- source_word: חֶצְרוֹן
  chosen: Hezron
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard convention.
- source_word: אַדָּרָה
  chosen: to Addar
  alternatives:
  - Addar
  lexicon: HALOT
  rationale: Proper place name. The directional 'to' is naturally supplied in English
    after 'went up.'
- source_word: וְנָסַב
  chosen: and turned
  alternatives:
  - and curved around
  - and changed direction
  lexicon: HALOT
  rationale: נסב in a border description indicates a turn or bend in the boundary
    line. 'Turned' is concise and accurate.
- source_word: הַקַּרְקָעָה
  chosen: toward Karka
  alternatives:
  - to Karka
  - toward Karkaa
  lexicon: HALOT
  rationale: Proper place name, likely Karka/Karkaa. 'Toward Karka' works well with
    נסב ('turned') and avoids overstating whether the border reached or merely bent
    toward the site. A spelling variant is worth preserving in a footnote.
