id: JOS.15.51
reference: Joshua 15:51
source:
  edition: WLC
  text: וְ/גֹ֥שֶׁן וְ/חֹלֹ֖ן וְ/גִלֹ֑ה עָרִ֥ים אַֽחַת עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'Goshen, Holon, and Giloh: eleven cities with their villages.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: גֹשֶׁן
  chosen: Goshen
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: חֹלֹן
  chosen: Holon
  alternatives:
  - Cholon
  lexicon: HALOT
  rationale: Proper place name; rendered by standard English transliteration. 'Cholon'
    reflects a more letter-for-letter representation but is less standard in modern
    English.
- source_word: גִלֹה
  chosen: Giloh
  alternatives:
  - Gilo
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Gilo' is a modern place-name form,
    but 'Giloh' better reflects the biblical Hebrew ending.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Common term for urban settlements. 'Cities' is the standard rendering
    in territorial lists like Joshua and fits the administrative sense here.
- source_word: אַחַת עֶשְׂרֵה
  chosen: eleven
  alternatives:
  - eleven in number
  lexicon: HALOT
  rationale: Cardinal number modifying 'cities'; idiomatic English expresses the compound
    numeral simply as 'eleven'.
- source_word: חַצְרֵיהֶן
  chosen: villages
  alternatives:
  - settlements
  - hamlets
  - daughter towns
  lexicon: HALOT
  rationale: Refers to dependent rural places or unwalled satellite settlements associated
    with the named cities. 'Villages' is the most natural and established rendering
    in English for this context.
