id: JOS.15.57
reference: Joshua 15:57
source:
  edition: WLC
  text: הַ/קַּ֖יִן גִּבְעָ֣ה וְ/תִמְנָ֑ה עָרִ֥ים עֶ֖שֶׂר וְ/חַצְרֵי/הֶֽן׃
translation:
  text: 'Hak-kain, Gibeah, and Timnah: ten cities with their settlements.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their villages." The Hebrew term refers to smaller dependent settlements
      associated with the named cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקַּיִן
  chosen: Hak-kain
  alternatives:
  - Kain
  - the Kain
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred per translation philosophy.
    The prefixed article is retained in the transliteration as part of the conventional
    Hebrew form rather than translated as an English article.
- source_word: גִּבְעָה
  chosen: Gibeah
  alternatives:
  - Gibea
  - Hill
  lexicon: HALOT
  rationale: This is a toponym in a city list, so it is transliterated rather than
    translated by its lexical sense ('hill').
- source_word: תִמְנָה
  chosen: Timnah
  alternatives:
  - Timna
  lexicon: HALOT
  rationale: A place name in the allotment list; standard English transliteration
    is appropriate.
- source_word: עָרִים עֶשֶׂר
  chosen: ten cities
  alternatives:
  - ten towns
  lexicon: HALOT
  rationale: The Hebrew gives the standard summary formula for the number of listed
    urban sites. 'Cities' is the conventional and sufficiently accurate rendering
    of עָרִים in territorial lists.
- source_word: חַצְרֵיהֶן
  chosen: their settlements
  alternatives:
  - their villages
  - their hamlets
  - their dependent settlements
  lexicon: HALOT
  rationale: In allotment formulas, חָצֵר refers to smaller dependent settlements
    or unwalled satellite habitations associated with the named cities. 'Settlements'
    is clear modern English and broader than 'villages,' which may be too specific.
