id: JOS.15.31
reference: Joshua 15:31
source:
  edition: WLC
  text: וְ/צִֽקְלַ֥ג וּ/מַדְמַנָּ֖ה וְ/סַנְסַנָּֽה׃
translation:
  text: Ziklag, Madmannah, and Sansannah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: צִקְלַג
  chosen: Ziklag
  alternatives:
  - Ziklagh
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy to transliterate names. 'Ziklag' is the standard English form.
- source_word: מַדְמַנָּה
  chosen: Madmannah
  alternatives:
  - Madmanah
  rationale: Proper place name; transliterated. The doubled 'nn' reflects the Hebrew
    consonantal form and standard English convention for this toponym.
- source_word: סַנְסַנָּה
  chosen: Sansannah
  alternatives:
  - Sansanna
  rationale: Proper place name; transliterated. The final -h reflects the Hebrew he
    ending as commonly represented in English biblical place names.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links items in a place-name list. In English
    list style, the conjunction is represented before the final item, with commas
    separating the series.
