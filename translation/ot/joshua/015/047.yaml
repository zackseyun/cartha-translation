id: JOS.15.47
reference: Joshua 15:47
source:
  edition: WLC
  text: אַשְׁדּ֞וֹד בְּנוֹתֶ֣י/הָ וַ/חֲצֵרֶ֗י/הָ עַזָּ֥ה בְּנוֹתֶ֥י/הָ וַ/חֲצֵרֶ֖י/הָ
    עַד נַ֣חַל מִצְרָ֑יִם וְ/הַ/יָּ֥ם ה/גבול וּ/גְבֽוּל־׃ס
translation:
  text: Ashdod, its daughter towns and its villages; Gaza, its daughter towns and
    its villages; as far as the Brook of Egypt, and the Great Sea, which is its boundary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'daughters' is an idiom for dependent or satellite towns belonging
      to a larger city.
    reason: lexical_alternative
  - marker: b
    text: Or 'Wadi of Egypt.' The Hebrew נחל can denote a seasonal watercourse or
      wadi.
    reason: lexical_alternative
  - marker: c
    text: That is, the Mediterranean Sea.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנוֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its daughters
  - its dependent towns
  - its surrounding towns
  lexicon: HALOT
  rationale: In territorial lists, 'daughters' is an idiom for satellite or dependent
    settlements associated with a principal city. 'Daughter towns' preserves the metaphor
    while making the referent clear in English.
- source_word: חֲצֵרֶיהָ
  chosen: its villages
  alternatives:
  - its settlements
  - its hamlets
  - its encampments
  lexicon: HALOT
  rationale: In this geographic context, the term refers to smaller outlying habitations.
    'Villages' is the most natural modern English rendering and distinguishes these
    from the larger 'daughter towns.'
- source_word: נַחַל מִצְרַיִם
  chosen: the Brook of Egypt
  alternatives:
  - the Wadi of Egypt
  - the Torrent of Egypt
  lexicon: HALOT
  rationale: The phrase is a recognized southern border marker. 'Brook of Egypt' is
    a conventional and understandable rendering for נחל here, while preserving the
    proper-name force of the expression. 'Wadi' is possible but less accessible for
    general readers.
- source_word: הַיָּם
  chosen: the Great Sea
  alternatives:
  - the sea
  - the Mediterranean Sea
  lexicon: HALOT
  rationale: In Israelite geographical usage, 'the sea' in boundary descriptions commonly
    denotes the Mediterranean. 'Great Sea' reflects the broader biblical idiom and
    avoids over-specifying beyond the Hebrew while still signaling the known referent.
- source_word: הַגְּבוּל וּגְבוּל
  chosen: which is its boundary
  alternatives:
  - this is the boundary
  - and its border
  - the border and its boundary
  lexicon: HALOT
  rationale: The Hebrew ending is terse and somewhat elliptical. The sense is that
    the sea serves as the territorial boundary. Rendering it as 'which is its boundary'
    produces clear English while preserving the boundary-function expressed by גבול.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - unto
  lexicon: HALOT
  rationale: '''As far as'' is idiomatic modern English for a territorial extent marker.'
- source_word: אַשְׁדּוֹד / עַזָּה
  chosen: Ashdod / Gaza
  rationale: These are place names and are therefore transliterated by standard English
    conventions, in keeping with the translation philosophy.
