id: JOS.15.18
reference: Joshua 15:18
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/בוֹאָ֗/הּ וַ/תְּסִיתֵ֨/הוּ֙ לִ/שְׁא֤וֹל מֵֽ/אֵת אָבִ֨י/הָ֙ שָׂדֶ֔ה
    וַ/תִּצְנַ֖ח מֵ/עַ֣ל הַ/חֲמ֑וֹר וַ/יֹּֽאמֶר לָ֥/הּ כָּלֵ֖ב מַה לָּֽ/ךְ־־־׃
translation:
  text: And when she came, she urged him to ask her father for a field. Then she got
    down from the donkey, and Caleb said to her, “What do you want?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “she persuaded him” or, more negatively, “she incited him.”
    reason: lexical_alternative
  - marker: b
    text: Or “she dismounted from the donkey”; the Hebrew verb may suggest a sudden
      descent.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom is literally “What is with you?” meaning “What do you want?”
      or “What troubles you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹאָהּ
  chosen: when she came
  alternatives:
  - when she entered
  - upon her coming
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב plus 3fs suffix marks a temporal
    clause referring to Achsah's arrival. 'When she came' is natural modern English
    and preserves the temporal sense without over-specifying destination.
- source_word: וַתְּסִיתֵהוּ
  chosen: she urged him
  alternatives:
  - she incited him
  - she persuaded him
  lexicon: HALOT
  rationale: The verb סות can mean incite, entice, or urge. In this domestic/request
    context, 'urged' fits idiomatic English without importing a strongly negative
    sense like 'incited,' while still reflecting her active prompting of Othniel.
- source_word: לִשְׁאוֹל
  chosen: to ask
  alternatives:
  - to request
  - to ask for
  lexicon: HALOT
  rationale: The infinitive of שאל here governs the following object phrase and means
    'to ask/request.' 'To ask' is concise and idiomatic; the requested item is then
    specified by 'for a field.'
- source_word: מֵאֵת אָבִיהָ
  chosen: her father
  alternatives:
  - from her father
  lexicon: HALOT
  rationale: English normally expresses the indirect object after 'ask' as 'ask someone
    for something.' The Hebrew preposition marks source/person approached; this is
    preserved idiomatically in English by 'ask her father for a field.'
- source_word: שָׂדֶה
  chosen: a field
  alternatives:
  - land
  - a tract of land
  lexicon: HALOT
  rationale: שָׂדֶה commonly denotes a field or piece of land. 'A field' is the most
    direct rendering and matches the parallel in Judges 1:14.
- source_word: וַתִּצְנַח מֵעַל הַחֲמוֹר
  chosen: she got down from the donkey
  alternatives:
  - she dismounted from the donkey
  - she alighted from the donkey
  - she threw herself off the donkey
  lexicon: HALOT
  rationale: The verb צנח can suggest descending suddenly, but in this narrative setting
    the sense is that she dismounted. 'Got down from the donkey' is readable modern
    English and avoids overstating dramatic force, while a footnote preserves the
    more vivid alternative nuance.
- source_word: מַה לָּךְ
  chosen: What do you want?
  alternatives:
  - What is the matter with you?
  - What do you have?
  - What troubles you?
  lexicon: HALOT
  rationale: This idiom asks what someone wants or what concerns them. In context,
    Caleb is inviting her request after she dismounts. 'What do you want?' is the
    clearest contextual rendering in contemporary English.
