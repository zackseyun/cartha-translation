id: JOS.15.1
reference: Joshua 15:1
source:
  edition: WLC
  text: וַ/יְהִ֣י הַ/גּוֹרָ֗ל לְ/מַטֵּ֛ה בְּנֵ֥י יְהוּדָ֖ה לְ/מִשְׁפְּחֹתָ֑/ם אֶל
    גְּב֨וּל אֱד֧וֹם מִדְבַּר צִ֛ן נֶ֖גְבָּ/ה מִ/קְצֵ֥ה תֵימָֽן־־׃
translation:
  text: And the lot for the tribe of the sons of Judah, according to their clans,
    came to the border of Edom, to the wilderness of Zin, southward, at the far end
    of the south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And it was the lot for the tribe of the sons of Judah, according to
      their clans, to the border of Edom...'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Judah'; this refers to the tribal descendants of Judah.
    reason: cultural_note
  - marker: c
    text: Or 'at the southernmost end.' The Hebrew may also be understood more literally
      as 'from the extremity of Teman/south.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it was
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה here introduces the result of the allotment
    process. Rendering idiomatically as 'came' with 'the lot' reflects English usage
    in land-allotment contexts better than the wooden 'and it was,' while preserving
    the narrative sequence.
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the allotment
  - the portion by lot
  lexicon: HALOT
  rationale: גורל refers specifically to the lot/casting of lots by which territory
    was assigned. 'The lot' preserves the concrete mechanism and matches the context
    of Joshua's land distribution.
- source_word: לְמַטֵּה
  chosen: for the tribe of
  alternatives:
  - for the staff of
  - for the branch of
  lexicon: HALOT
  rationale: In tribal-administrative contexts מַטֶּה means 'tribe.' 'For the tribe
    of' is the natural contextual sense.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew kinship expression.
    'Sons of Judah' here denotes the tribal descendants, and the following phrase
    'according to their clans' clarifies the collective sense.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census/allotment contexts is best rendered 'clan'
    rather than the broader English 'family,' since it denotes a subdivision within
    the tribe.
- source_word: אֶל גְּבוּל אֱדוֹם
  chosen: to the border of Edom
  alternatives:
  - toward the territory of Edom
  - up to the border of Edom
  lexicon: HALOT
  rationale: גְּבוּל denotes a boundary/border. 'To the border of Edom' captures the
    territorial limit indicated by אֶל in this boundary description.
- source_word: מִדְבַּר צִן
  chosen: the wilderness of Zin
  alternatives:
  - the desert of Zin
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness of Zin'
    is the established and accurate geographical rendering.
- source_word: נֶגְבָּה
  chosen: southward
  alternatives:
  - to the south
  - in the Negeb
  lexicon: HALOT
  rationale: Here the form functions adverbially/directionally, indicating the southern
    side or direction. 'Southward' preserves that adverbial force better than treating
    it as the proper region name 'Negeb' in this clause.
- source_word: מִקְצֵה תֵימָן
  chosen: at the far end of the south
  alternatives:
  - from the extremity of Teman
  - from the southern extremity
  - at the southernmost end
  lexicon: HALOT
  rationale: The phrase denotes the extreme southern limit. תֵימָן can mean 'south/southland'
    and in some contexts is a place-name, but here in parallel with נֶגְבָּה it most
    naturally refers to the south as a direction/region. 'At the far end of the south'
    communicates the boundary sense in readable English.
