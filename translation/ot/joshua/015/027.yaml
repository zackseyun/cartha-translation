id: JOS.15.27
reference: Joshua 15:27
source:
  edition: WLC
  text: וַ/חֲצַ֥ר גַּדָּ֛ה וְ/חֶשְׁמ֖וֹן וּ/בֵ֥ית פָּֽלֶט׃
translation:
  text: Hazar-gaddah, Heshmon, and Beth-pelet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hazargaddah' (without hyphen).
    reason: lexical_alternative
  - marker: b
    text: Or 'Beth Pelet'; more literally, 'House of Pelet,' though the Hebrew functions
      here as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲצַר גַּדָּה
  chosen: Hazar-gaddah
  alternatives:
  - Hazargaddah
  lexicon: HALOT
  rationale: A place name in Judah's territory list. Per translation philosophy, personal
    and place names are transliterated rather than translated. The maqqeph-like connection
    in English is represented with a hyphen to reflect the compound toponym 'Hazar-gaddah'
    ('enclosure/settlement of Gaddah') without overtranslating the name's components.
- source_word: חֶשְׁמוֹן
  chosen: Heshmon
  lexicon: HALOT
  rationale: A toponym; transliterated by standard English convention rather than
    translated.
- source_word: בֵּית פָּלֶט
  chosen: Beth-pelet
  alternatives:
  - Beth Pelet
  - House of Pelet
  lexicon: HALOT
  rationale: A compound place name. 'Beth-' is commonly preserved in English biblical
    toponyms rather than translated as 'house of,' which would sound interpretive
    in a territorial list. Hyphenation signals the compound form while keeping the
    name recognizable.
- source_word: וְ / וּ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction simply coordinates the place names in the list;
    rendered with standard English 'and' before the final item, with commas separating
    the series for readable modern English.
