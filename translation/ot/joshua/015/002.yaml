id: JOS.15.2
reference: Joshua 15:2
source:
  edition: WLC
  text: וַ/יְהִ֤י לָ/הֶם֙ גְּב֣וּל נֶ֔גֶב מִ/קְצֵ֖ה יָ֣ם הַ/מֶּ֑לַח מִן הַ/לָּשֹׁ֖ן
    הַ/פֹּנֶ֥ה נֶֽגְבָּ/ה־׃
translation:
  text: Their southern border was from the end of the Salt Sea, from the bay that
    faces southward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the tongue,' a topographical term for a tongue-shaped
      bay or inlet.
    reason: lexical_alternative
  - marker: b
    text: That is, the Dead Sea.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי לָהֶם
  chosen: Their ... was
  alternatives:
  - And it was for them
  - Now they had
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol of היה with ל plus pronominal suffix introduces
    the description of Judah’s boundary. In English, a natural possessive construction
    ('Their ... was') conveys the sense without woodenly reproducing the Hebrew syntax.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory line
  lexicon: HALOT
  rationale: In this geographic allotment context, גְּבוּל refers to a territorial
    boundary line. 'Border' is concise, natural English and fits the context of delineating
    tribal limits.
- source_word: נֶגֶב
  chosen: southern
  alternatives:
  - south
  - Negev
  lexicon: HALOT
  rationale: Here נֶגֶב functions directionally/adjectivally with גְּבוּל, indicating
    the south side of the territory, not the specific region-name 'Negev.' Thus 'southern'
    best matches the immediate sense.
- source_word: מִקְצֵה
  chosen: from the end of
  alternatives:
  - from the extremity of
  - from the far end of
  lexicon: HALOT
  rationale: The noun denotes an extremity or end point. 'From the end of' preserves
    the spatial sense in straightforward English.
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Dead Sea
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'the Salt Sea.' Following original-language
    primacy, the main text keeps the source designation rather than substituting the
    later conventional name 'Dead Sea.'
- source_word: מִן הַלָּשׁוֹן
  chosen: from the bay
  alternatives:
  - from the tongue
  - from the inlet
  lexicon: HALOT
  rationale: Literally 'from the tongue,' but in topographical usage this refers to
    a tongue-shaped projection or inlet/bay. 'Bay' gives the geographic sense in readable
    English; the more literal image is worth preserving in a footnote.
- source_word: הַפֹּנֶה נֶגְבָּה
  chosen: that faces southward
  alternatives:
  - that turns southward
  - that looks toward the south
  lexicon: HALOT
  rationale: The participle פנה with directional suffix indicates orientation. 'Faces
    southward' is idiomatic for a geographic feature and preserves the directional
    force.
