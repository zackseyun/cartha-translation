theological_decisions:
- issue: Referent of the implicit subject in 'he gave a portion'
  chosen_reading: Left implicit in English as 'he gave,' with the following phrase
    clarifying that the allotment was in accordance with the LORD's command to Joshua.
  alternative_readings:
  - 'Made Joshua explicit as subject: ''Joshua gave...'''
  - 'Made the LORD explicit as subject: ''the LORD gave...'''
  rationale: The Hebrew leaves the subject unstated in this clause. Because the verse
    immediately adds 'according to the command of the LORD to Joshua,' making either
    subject explicit would resolve an ambiguity the source text does not fully resolve.
    Retaining 'he gave' preserves the textual economy and avoids importing a stronger
    interpretive claim than necessary.
  doctrine_reference: Preserve theological tension rather than resolve it.
