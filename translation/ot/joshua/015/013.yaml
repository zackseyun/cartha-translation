id: JOS.15.13
reference: Joshua 15:13
source:
  edition: WLC
  text: וּ/לְ/כָלֵ֣ב בֶּן יְפֻנֶּ֗ה נָ֤תַן חֵ֨לֶק֙ בְּ/ת֣וֹךְ בְּנֵֽי יְהוּדָ֔ה אֶל
    פִּ֥י יְהוָ֖ה לִֽ/יהוֹשֻׁ֑עַ אֶת קִרְיַ֥ת אַרְבַּ֛ע אֲבִ֥י הָ/עֲנָ֖ק הִ֥יא חֶבְרֽוֹן־־־־׃
translation:
  text: 'And to Caleb son of Jephunneh he gave a portion among the sons of Judah,
    according to the command of the LORD to Joshua: Kiriath-arba, the father of Anak—that
    is, Hebron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the word of the LORD.' The Hebrew idiom is literally 'according
      to the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Father of Anak'' may also mean ''ancestor'' or ''founder'' of Anak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/כָלֵב
  chosen: And to Caleb
  alternatives:
  - Now to Caleb
  - But to Caleb
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition naturally yield 'and to Caleb.'
    English keeps the connective while smoothing the clause opening.
- source_word: בֶּן יְפֻנֶּה
  chosen: son of Jephunneh
  lexicon: HALOT
  rationale: Standard filial construction; personal name is transliterated per project
    policy.
- source_word: נָתַן חֵלֶק
  chosen: he gave a portion
  alternatives:
  - a portion was given
  - he assigned a portion
  lexicon: HALOT
  rationale: The Qal perfect with חֵלֶק expresses giving or assigning an allotment.
    'He gave a portion' preserves the verbal action without over-specifying administrative
    nuance.
- source_word: בְּ/ת֣וֹךְ בְּנֵי יְהוּדָה
  chosen: among the sons of Judah
  alternatives:
  - in the midst of the sons of Judah
  - among the people of Judah
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' 'Sons of Judah' is retained as
    a transparent tribal designation; 'people of Judah' is possible but less formally
    tied to the Hebrew wording.
- source_word: אֶל פִּי יְהוָה
  chosen: according to the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - by the word of the LORD
  lexicon: HALOT
  rationale: The idiom אֶל־פִּי means 'according to the command/word of.' 'Command'
    best fits the allotment context and communicates the idiomatic force in natural
    English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: לִֽ/יהוֹשֻׁעַ
  chosen: to Joshua
  alternatives:
  - for Joshua
  - through Joshua
  lexicon: HALOT
  rationale: The lamed here most naturally marks the indirect object in relation to
    the divine command. 'To Joshua' is the most direct rendering, though contextually
    it implies the command came to Joshua.
- source_word: קִרְיַת אַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - the city of Arba
  - Kiriath Arba
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated rather than translated,
    while preserving recognizability.
- source_word: אֲבִי הָעֲנָק
  chosen: the father of Anak
  alternatives:
  - the ancestor of Anak
  - the founder of Anak
  lexicon: HALOT
  rationale: אָב can denote progenitor/founder, but 'father of Anak' is the most transparent
    rendering and preserves the traditional genealogical expression. The exact nuance
    is worth preserving in a footnote.
- source_word: הִיא חֶבְרוֹן
  chosen: that is, Hebron
  alternatives:
  - it is Hebron
  - namely, Hebron
  lexicon: HALOT
  rationale: The pronoun plus place name identifies Kiriath-arba with Hebron. 'That
    is, Hebron' is idiomatic English for appositional identification.
