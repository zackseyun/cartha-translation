id: JOS.15.61
reference: Joshua 15:61
source:
  edition: WLC
  text: בַּ/מִּדְבָּ֑ר בֵּ֚ית הָעֲרָבָ֔ה מִדִּ֖ין וּ/סְכָכָֽה׃
translation:
  text: 'In the wilderness: Beth-arabah, Middin, and Secacah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the desert.' Hebrew מִדְבָּר can denote sparsely inhabited wilderness
      or desert terrain depending on context.
    reason: lexical_alternative
  - marker: b
    text: Beth-arabah is a place name; literally, 'house of the Arabah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמִּדְבָּר
  chosen: In the wilderness
  alternatives:
  - in the desert
  - in the pastureland
  lexicon: HALOT
  rationale: The prefixed preposition ב plus article yields a locative phrase, introducing
    the geographic subregion in which the following towns are situated. 'Wilderness'
    is the standard rendering of מִדְבָּר and fits the Judean wilderness context better
    than the broader 'desert.'
- source_word: בֵּית הָעֲרָבָה
  chosen: Beth-arabah
  alternatives:
  - Beth Arabah
  - House of the Arabah
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy names are transliterated
    rather than translated. The maqqeph-like construct relationship is preserved in
    the conventional English toponym 'Beth-arabah.'
- source_word: מִדִּין
  chosen: Middin
  lexicon: HALOT
  rationale: Proper place name; transliterated directly by standard convention.
- source_word: וּסְכָכָה
  chosen: and Secacah
  alternatives:
  - and Sekakah
  - and Secaacah
  lexicon: HALOT
  rationale: Proper place name with conjunction ו. 'Secacah' reflects a common English
    transliteration of the Hebrew name; alternate spellings reflect different ways
    of representing the Hebrew consonants in English.
