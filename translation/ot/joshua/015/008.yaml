id: JOS.15.8
reference: Joshua 15:8
source:
  edition: WLC
  text: וְ/עָלָ֨ה הַ/גְּב֜וּל גֵּ֣י בֶן הִנֹּ֗ם אֶל כֶּ֤תֶף הַ/יְבוּסִי֙ מִ/נֶּ֔גֶב
    הִ֖יא יְרֽוּשָׁלִָ֑ם וְ/עָלָ֨ה הַ/גְּב֜וּל אֶל רֹ֣אשׁ הָ/הָ֗ר אֲ֠שֶׁר עַל פְּנֵ֤י
    גֵֽי הִנֹּם֙ יָ֔מָּ/ה אֲשֶׁ֛ר בִּ/קְצֵ֥ה עֵֽמֶק רְפָאִ֖ים צָפֹֽנָ/ה־־־־־־׃
translation:
  text: Then the border went up by the Valley of Ben-hinnom to the slope of the Jebusite
    on the south (that is, Jerusalem), and the border went up to the top of the mountain
    that lies west of the Valley of Hinnom, at the northern end of the Valley of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the shoulder of the Jebusite'; here 'slope' renders the topographical
      sense of 'shoulder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it is Jerusalem.' The Hebrew explicitly identifies 'the Jebusite' with
      Jerusalem.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'toward the sea,' a standard idiom for 'west.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  chosen: Then ... went up
  alternatives:
  - and ... went up
  - ascended
  lexicon: HALOT
  rationale: Qal perfect of עלה in boundary descriptions commonly narrates the line's
    movement upward in sequence. 'Then ... went up' gives natural English while preserving
    the directional sense.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: In territorial allotment contexts גְּבוּל refers to the boundary line
    or border. 'Border' is concise and natural in English.
- source_word: גֵּי בֶן הִנֹּם
  chosen: the Valley of Ben-hinnom
  alternatives:
  - the Valley of the Son of Hinnom
  - the Valley of Ben-Hinnom
  lexicon: HALOT
  rationale: A place name built from 'valley of son of Hinnom.' Retaining 'Ben-hinnom'
    preserves the proper-name character and avoids over-translating a toponym.
- source_word: כֶּתֶף
  chosen: the slope
  alternatives:
  - the shoulder
  - the side
  lexicon: HALOT
  rationale: Literally 'shoulder,' but in topographical usage it denotes a hillside
    flank or slope. 'Slope' best fits modern English geography.
- source_word: הַיְבוּסִי
  chosen: the Jebusite
  alternatives:
  - the Jebusite city
  lexicon: HALOT
  rationale: The adjective/noun identifies the Jebusite site or ridge associated with
    Jerusalem. Keeping 'the Jebusite' follows the Hebrew closely; the apposition 'that
    is, Jerusalem' clarifies the referent.
- source_word: מִנֶּגֶב
  chosen: on the south
  alternatives:
  - from the south
  - southward
  - on the southern side
  lexicon: HALOT
  rationale: In this topographical context the phrase indicates the southern side/aspect
    of the Jebusite slope. 'On the south' is compact and idiomatic enough, preserving
    the directional note.
- source_word: הִיא יְרוּשָׁלִָם
  chosen: that is, Jerusalem
  alternatives:
  - it is Jerusalem
  lexicon: HALOT
  rationale: The pronoun plus place name functions appositionally to identify the
    Jebusite site. 'That is, Jerusalem' is standard English for this explanatory identification.
- source_word: רֹאשׁ הָהָר
  chosen: the top of the mountain
  alternatives:
  - the summit of the hill
  - the head of the mountain
  lexicon: HALOT
  rationale: A common idiom for the highest point. 'Top of the mountain' is clear
    and natural.
- source_word: אֲשֶׁר עַל פְּנֵי
  chosen: that lies
  alternatives:
  - which is before
  - which faces
  lexicon: HALOT
  rationale: The expression means being in front of/opposite. In English topographical
    description, 'that lies' communicates location smoothly without losing sense.
- source_word: יָמָּה
  chosen: west
  alternatives:
  - westward
  - toward the sea
  lexicon: HALOT
  rationale: Directional adverb from 'sea,' conventionally meaning west in Hebrew
    geography. 'West' is the clearest modern rendering.
- source_word: בִּקְצֵה
  chosen: at the ... end
  alternatives:
  - at the extremity of
  - at the edge of
  lexicon: HALOT
  rationale: The noun denotes an extremity or far end. 'At the ... end' is natural
    English.
- source_word: עֵמֶק רְפָאִים
  chosen: the Valley of Rephaim
  alternatives:
  - the Valley of the Rephaim
  lexicon: HALOT
  rationale: A recognized place name. Transliteration preserves the toponym without
    forcing an interpretation of רְפָאִים here.
- source_word: צָפֹנָה
  chosen: northern
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: Directional form indicating the north side/end. In combination with בִּקְצֵה,
    'at the northern end' is the most idiomatic rendering.
