id: JOS.15.19
reference: Joshua 15:19
source:
  edition: WLC
  text: וַ/תֹּ֜אמֶר תְּנָ/ה לִּ֣/י בְרָכָ֗ה כִּ֣י אֶ֤רֶץ הַ/נֶּ֨גֶב֙ נְתַתָּ֔/נִי
    וְ/נָתַתָּ֥ה לִ֖/י גֻּלֹּ֣ת מָ֑יִם וַ/יִּתֶּן לָ֗/הּ אֵ֚ת גֻּלֹּ֣ת עִלִּיּ֔וֹת
    וְ/אֵ֖ת גֻּלֹּ֥ת תַּחְתִּיּֽוֹת־־׃פ
translation:
  text: She said, “Please give me a blessing, since you have given me the land of
    the Negev; give me also springs of water.” So he gave her the upper springs and
    the lower springs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gift.' The Hebrew says 'a blessing,' using covenantal language for
      a beneficial grant.
    reason: lexical_alternative
  - marker: b
    text: '''Negev'' can also mean ''southland'' or ''southern region.'''
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may denote springs, pools, or basins of water; 'springs'
      best fits the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְרָכָה
  chosen: a blessing
  alternatives:
  - a gift
  - a present
  lexicon: HALOT
  rationale: The noun normally means 'blessing,' but in this context it refers to
    a beneficial grant requested from her father. 'Blessing' preserves the Hebrew
    wording while still making sense in English; the more interpretive 'gift' is possible
    but less transparent to the source.
- source_word: אֶרֶץ הַנֶּגֶב
  chosen: the land of the Negev
  alternatives:
  - the land of the southland
  - the dry land/southern region
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region and specifically the Negev. Because
    it functions here as a geographic designation, 'the Negev' is the clearest modern
    rendering, while retaining 'land of' to reflect אֶרֶץ.
- source_word: גֻּלֹּת מָיִם
  chosen: springs of water
  alternatives:
  - water springs
  - pools of water
  - gulloth of water
  lexicon: HALOT
  rationale: The exact sense of גֻּלֹּת is debated, but in this context it refers
    to water sources associated with the property. 'Springs of water' is idiomatic
    English and fits the subsequent distinction between upper and lower sources. 'Pools'
    is possible but less likely in the land-allotment context.
- source_word: תְּנָה
  chosen: Please give me
  alternatives:
  - Give me
  - Grant me
  lexicon: HALOT
  rationale: Imperative of נתן with the enclitic/paragogic ה. English 'please' appropriately
    conveys the polite/requestive force in context without overstating the morphology.
- source_word: וְנָתַתָּה לִי
  chosen: give me also
  alternatives:
  - and give me
  - you must give me
  lexicon: HALOT
  rationale: 'The conjunction links a further request. ''Also'' brings out the additive
    sense in natural English: she asks not only for the land already given but additionally
    for water sources.'
- source_word: גֻּלֹּת עִלִּיּוֹת
  chosen: the upper springs
  alternatives:
  - the upper pools
  - the springs above
  lexicon: HALOT
  rationale: Given the earlier rendering of גֻּלֹּת as 'springs,' consistency favors
    'upper springs.' The adjective עִלִּיּוֹת indicates higher elevation.
- source_word: גֻּלֹּת תַּחְתִּיּוֹת
  chosen: the lower springs
  alternatives:
  - the lower pools
  - the springs below
  lexicon: HALOT
  rationale: Parallel to 'upper springs'; תַּחְתִּיּוֹת denotes lower/lower-lying
    sources.
- source_word: וַיִּתֶּן לָהּ
  chosen: So he gave her
  alternatives:
  - And he gave her
  - Then he gave her
  lexicon: HALOT
  rationale: Narrative waw here advances the story. 'So' gives smooth English narrative
    flow while preserving the consequential sense from her request.
