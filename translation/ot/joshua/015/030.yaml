id: JOS.15.30
reference: Joshua 15:30
source:
  edition: WLC
  text: וְ/אֶלְתּוֹלַ֥ד וּ/כְסִ֖יל וְ/חָרְמָֽה׃
translation:
  text: Eltolad, Kesil, and Hormah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Chesil' for Kesil, reflecting a different transliteration convention
      for the Hebrew כ.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלְתּוֹלַד
  chosen: Eltolad
  alternatives:
  - Eltolad
  rationale: Proper place name in a town list. Following the translation philosophy,
    names are transliterated rather than translated. Standard English form 'Eltolad'
    preserves the Hebrew consonantal shape.
- source_word: כְסִיל
  chosen: Kesil
  alternatives:
  - Chesil
  lexicon: HALOT
  rationale: Proper place name. Transliterated as 'Kesil' to reflect the Hebrew name
    in readable modern English. 'Chesil' is a possible alternative transliteration
    reflecting כ with 'ch', but 'Kesil' is simpler and common in modern English Bible
    style.
- source_word: חָרְמָה
  chosen: Hormah
  lexicon: HALOT
  rationale: Proper place name. Transliterated as 'Hormah,' the conventional English
    form for this location. Although the name is related to the Hebrew root חרם, the
    context is a place-name list, so transliteration is preferable to a meaning-based
    rendering.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction on each item marks simple coordination in the
    list. In English town lists, rendering only the final conjunction produces natural
    style while preserving the list structure.
