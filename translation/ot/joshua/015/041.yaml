id: JOS.15.41
reference: Joshua 15:41
source:
  edition: WLC
  text: וּ/גְדֵר֕וֹת בֵּית דָּג֥וֹן וְ/נַעֲמָ֖ה וּ/מַקֵּדָ֑ה עָרִ֥ים שֵׁשׁ עֶשְׂרֵ֖ה
    וְ/חַצְרֵי/הֶֽן־־׃ס
translation:
  text: 'and Gederoth, Beth-dagon, Naamah, and Makkedah: sixteen cities with their
    villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-dagon is literally 'house of Dagon,' but here it functions as a place
      name and is therefore transliterated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/גְדֵרוֹת
  chosen: and Gederoth
  alternatives:
  - and Gederot
  lexicon: HALOT
  rationale: Proper place name with prefixed conjunction. Transliteration is preferred
    for names. The form is plural in appearance but functions as a toponym, so it
    is rendered as the established place name 'Gederoth.'
- source_word: בֵּית דָּגוֹן
  chosen: Beth-dagon
  alternatives:
  - Beth Dagon
  - house of Dagon
  lexicon: HALOT
  rationale: Toponym composed of 'house' + 'Dagon.' Because names are transliterated
    rather than translated, the compound is rendered 'Beth-dagon' rather than the
    literal 'house of Dagon.' Hyphenation helps modern readers recognize the compound
    name.
- source_word: וְ/נַעֲמָה
  chosen: Naamah
  lexicon: HALOT
  rationale: Proper place name with conjunction; transliterated in standard English
    form.
- source_word: וּ/מַקֵּדָה
  chosen: and Makkedah
  alternatives:
  - and Makkedah
  - and Makkeḏah
  lexicon: HALOT
  rationale: Proper place name with conjunction. Rendered by standard English transliteration
    'Makkedah.'
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: In territorial lists, עִיר commonly denotes settled population centers.
    'Cities' is the conventional and sufficiently accurate rendering here.
- source_word: שֵׁשׁ עֶשְׂרֵה
  chosen: sixteen
  alternatives:
  - sixteen in all
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'cities.' No need to expand
    beyond the Hebrew.
- source_word: וְ/חַצְרֵיהֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: חָצֵר in these allotment formulas refers to dependent rural settlements
    associated with the named cities. 'Villages' is natural English and fits the administrative-geographical
    sense better than the more wooden 'settlements.'
