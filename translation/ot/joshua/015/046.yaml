id: JOS.15.46
reference: Joshua 15:46
source:
  edition: WLC
  text: מֵ/עֶקְר֖וֹן וָ/יָ֑מָּ/ה כֹּ֛ל אֲשֶׁר עַל יַ֥ד אַשְׁדּ֖וֹד וְ/חַצְרֵי/הֶֽן־־׃
translation:
  text: from Ekron westward, all that is beside Ashdod, and their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the sea,' that is, westward.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'at the hand of Ashdod,' an idiom meaning 'beside' or 'near Ashdod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֶקְרוֹן
  chosen: from Ekron
  alternatives:
  - from Ekron onward
  lexicon: HALOT
  rationale: The preposition מִן marks the starting point of the territorial description.
    'Ekron' is transliterated as a place name per translation philosophy.
- source_word: וָיָמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - and westward
  lexicon: HALOT
  rationale: The idiom combines 'sea' with directional he locale to mean 'westward'
    or 'toward the sea' in geographic descriptions. 'Westward' is concise and natural
    in English while preserving the directional sense.
- source_word: כֹּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This common construction introduces the totality of what belongs within
    the described area. 'All that' is idiomatic and sufficiently formal.
- source_word: עַל יַד
  chosen: beside
  alternatives:
  - at the side of
  - near
  - alongside
  lexicon: HALOT
  rationale: The phrase literally means 'at the hand of' and in territorial contexts
    denotes proximity or adjacency. 'Beside' best captures the spatial relation in
    smooth English.
- source_word: אַשְׁדּוֹד
  chosen: Ashdod
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וְחַצְרֵיהֶן
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: חָצֵר in lists of towns commonly refers to dependent rural settlements
    or villages. The 3fp suffix refers back to the places/settlements encompassed
    in the region. 'Villages' is the most natural rendering in this territorial catalog.
