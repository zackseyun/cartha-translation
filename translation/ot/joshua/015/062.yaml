id: JOS.15.62
reference: Joshua 15:62
source:
  edition: WLC
  text: וְ/הַ/נִּבְשָׁ֥ן וְ/עִיר הַ/מֶּ֖לַח וְ/עֵ֣ין גֶּ֑דִי עָרִ֥ים שֵׁ֖שׁ וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'and Nibshan, the City of Salt, and En-gedi: six cities with their settlements.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their villages' for 'their settlements.' The Hebrew term can denote
      smaller dependent places associated with the listed cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּבְשָׁן
  chosen: Nibshan
  alternatives:
  - Ha-nibshan
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated. The article is retained in Hebrew orthography but not
    represented in English place-name style.
- source_word: עִיר הַמֶּלַח
  chosen: the City of Salt
  alternatives:
  - Ir-melah
  - Salt City
  lexicon: HALOT
  rationale: Construct phrase literally means 'city of the salt.' Rendered idiomatically
    as 'the City of Salt' to preserve the toponym's meaning while sounding natural
    in English. Kept as a translated place-name because the Hebrew is transparently
    meaningful.
- source_word: עֵין גֶּדִי
  chosen: En-gedi
  alternatives:
  - En Gedi
  - Spring of the Kid
  lexicon: HALOT
  rationale: Established place name; transliterated in standard English form. Although
    the components are meaningful ('spring of the kid/young goat'), English Bible
    convention and readability favor transliteration for this toponym.
- source_word: עָרִים שֵׁשׁ
  chosen: six cities
  alternatives:
  - six towns
  lexicon: HALOT
  rationale: Straightforward numerical summary of the listed settlements. 'Cities'
    is the standard rendering of עָרִים in territorial lists, even when some sites
    may have been small by modern standards.
- source_word: חַצְרֵיהֶן
  chosen: their settlements
  alternatives:
  - their villages
  - their hamlets
  - their dependent settlements
  lexicon: HALOT
  rationale: Refers to subsidiary encampments or unwalled dependent places associated
    with the named cities. 'Settlements' is broad and natural modern English, avoiding
    the possible over-specificity of 'villages' while preserving the relationship
    to the main cities.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The repeated conjunction links items in a place-name list. Retained in
    English for the final item and at the verse opening to reflect the list structure
    within the larger territorial catalog.
