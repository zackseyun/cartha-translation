id: JOS.15.54
reference: Joshua 15:54
source:
  edition: WLC
  text: וְ/חֻמְטָ֗ה וְ/קִרְיַ֥ת אַרְבַּ֛ע הִ֥יא חֶבְר֖וֹן וְ/צִיעֹ֑ר עָרִ֥ים תֵּ֖שַׁע
    וְ/חַצְרֵי/הֶֽן׃ס
translation:
  text: 'Humtah, Kiriath-arba (that is, Hebron), and Zior: nine cities with their
    settlements.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Kiriath-arba, it is Hebron' identifies the older name Kiriath-arba
      with Hebron.
    reason: cross_reference
  - marker: b
    text: Or 'their villages.' The Hebrew term can refer to smaller dependent settlements
      associated with the listed cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻמְטָה
  chosen: Humtah
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: קִרְיַת אַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - Kiriath Arba
  - City of Arba
  lexicon: HALOT
  rationale: A compound place name. Kept as a standard transliteration because it
    functions here as a toponym, not a descriptive phrase. 'City of Arba' is possible
    etymologically, but the verse treats it as the established name of a city.
- source_word: הִיא חֶבְרוֹן
  chosen: that is, Hebron
  alternatives:
  - it is Hebron
  - which is Hebron
  lexicon: HALOT
  rationale: The pronoun plus proper name identifies Kiriath-arba with Hebron. 'That
    is, Hebron' is idiomatic modern English for an appositional identification while
    preserving the explanatory force of the Hebrew.
- source_word: צִיעֹר
  chosen: Zior
  alternatives:
  - Zi'or
  lexicon: HALOT
  rationale: Proper place name; transliterated into standard English form.
- source_word: עָרִים תֵּשַׁע
  chosen: nine cities
  alternatives:
  - nine towns
  lexicon: HALOT
  rationale: עָרִים is the common term for cities/towns. 'Cities' is the conventional
    and sufficiently accurate rendering in territorial lists like Joshua 15.
- source_word: חַצְרֵיהֶן
  chosen: their settlements
  alternatives:
  - their villages
  - their hamlets
  - their dependent settlements
  lexicon: HALOT
  rationale: In Joshua's allotment lists, חָצֵר often refers to smaller dependent
    settlements associated with a main city. 'Settlements' is a clear modern rendering
    broad enough to cover unwalled villages or outlying habitations without over-specifying.
