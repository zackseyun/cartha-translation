id: JOS.15.11
reference: Joshua 15:11
source:
  edition: WLC
  text: וְ/יָצָ֨א הַ/גְּב֜וּל אֶל כֶּ֣תֶף עֶקְרוֹן֮ צָפוֹנָ/ה֒ וְ/תָאַ֤ר הַ/גְּבוּל֙
    שִׁכְּר֔וֹנָ/ה וְ/עָבַ֥ר הַר הַֽ/בַּעֲלָ֖ה וְ/יָצָ֣א יַבְנְאֵ֑ל וְ/הָי֛וּ תֹּצְא֥וֹת
    הַ/גְּב֖וּל יָֽמָּ/ה־־׃
translation:
  text: Then the border went out to the shoulder of Ekron northward, and the border
    bent toward Shikkeron, and passed over Mount Baalah, and went out to Jabneel;
    and the ends of the border were at the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the northern side of Ekron"; the Hebrew combines "shoulder of Ekron"
      with a northward directional form.
    reason: lexical_alternative
  - marker: b
    text: Or "turned toward Shikkeron"; the verb describes the border line changing
      direction.
    reason: lexical_alternative
  - marker: c
    text: Hebrew "the outgoings of the border were seaward / at the sea"; this likely
      indicates the border terminated at the Mediterranean on the west.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָא
  chosen: went out
  alternatives:
  - extended
  - went
  lexicon: HALOT
  rationale: In boundary descriptions, יָצָא commonly marks the line proceeding to
    the next point. 'Went out' preserves the repeated verbal pattern without over-paraphrasing.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: '''Border'' is a natural modern English rendering in a territorial demarcation
    context. ''Boundary'' is possible, but ''border'' reads more smoothly while preserving
    sense.'
- source_word: כֶּתֶף
  chosen: shoulder
  alternatives:
  - side
  - slope
  - flank
  lexicon: HALOT
  rationale: The noun literally means 'shoulder' and is used topographically for a
    side or slope. 'Shoulder' keeps the concrete Hebrew image; the place name supplies
    the geographic reference.
- source_word: עֶקְרוֹן צָפוֹנָה
  chosen: Ekron northward
  alternatives:
  - the northern side of Ekron
  - north of Ekron
  lexicon: HALOT
  rationale: The directional suffix on צָפוֹנָה indicates movement/orientation northward.
    Given the syntax with 'shoulder of Ekron,' the phrase is best represented as the
    border reaching the shoulder of Ekron on its northward side. The English keeps
    the Hebrew compactness.
- source_word: תָּאַר
  chosen: bent toward
  alternatives:
  - turned toward
  - was marked out toward
  - went around to
  lexicon: HALOT
  rationale: In boundary formulas this verb describes the line changing direction
    or being traced toward a point. 'Bent toward' captures the topographical turn
    more idiomatically than the more technical 'was marked out.'
- source_word: שִׁכְּרוֹנָה
  chosen: Shikkeron
  alternatives:
  - Shicron
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated rather than translated,
    following project policy for names. 'Shikkeron' reflects the consonantal form
    reasonably in standard English transliteration.
- source_word: עָבַר
  chosen: passed over
  alternatives:
  - crossed
  - went across
  lexicon: HALOT
  rationale: The verb indicates movement across or beyond a feature. 'Passed over'
    fits a boundary line moving across elevated terrain and preserves the narrative
    sequence.
- source_word: הַר הַבַּעֲלָה
  chosen: Mount Baalah
  alternatives:
  - the hill of Baalah
  - mountain of Baalah
  lexicon: HALOT
  rationale: הַר can denote hill-country elevation or mountain; 'Mount' is the conventional
    and concise rendering in a toponymic expression. Baalah is transliterated as a
    place name.
- source_word: יַבְנְאֵל
  chosen: Jabneel
  alternatives:
  - Yabneel
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention.
- source_word: תֹּצְאוֹת
  chosen: ends
  alternatives:
  - outgoings
  - extremities
  - terminations
  lexicon: HALOT
  rationale: The term refers to the border's terminal points or extremities. 'Ends'
    is clear modern English and avoids archaic 'outgoings' while preserving the geographic
    sense.
- source_word: יָמָּה
  chosen: at the sea
  alternatives:
  - westward
  - toward the sea
  - seaward
  lexicon: HALOT
  rationale: Though the form can function adverbially as 'westward,' in territorial
    descriptions it often reflects the Mediterranean as the western limit. Here 'at
    the sea' best fits the clause 'the ends of the border were...' and makes the endpoint
    explicit.
