id: JOS.15.35
reference: Joshua 15:35
source:
  edition: WLC
  text: יַרְמוּת֙ וַ/עֲדֻלָּ֔ם שׂוֹכֹ֖ה וַ/עֲזֵקָֽה׃
translation:
  text: Jarmuth, Adullam, Socoh, and Azekah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew consists of a simple list of town names in Judah: ''Jarmuth, Adullam,
      Socoh, and Azekah.'' English spellings of these place names vary, especially
      ''Socoh'' (also ''Sokoh'' or ''Soco'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְמוּת
  chosen: Jarmuth
  alternatives:
  - Yarmuth
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. 'Jarmuth' follows standard English convention for this Judahite town.
- source_word: וַ/עֲדֻלָּם
  chosen: Adullam
  lexicon: HALOT
  rationale: Conjunction + proper place name. The conjunction is represented in natural
    English list style by punctuation and the final 'and'; the place name is transliterated
    by standard convention as 'Adullam'.
- source_word: שׂוֹכֹה
  chosen: Socoh
  alternatives:
  - Sokoh
  - Soco
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Socoh' is a common English form for
    שׂוֹכֹה, though spelling varies in English tradition. A standard recognizable
    form is preferred in the main text, with alternatives noted.
- source_word: וַ/עֲזֵקָה
  chosen: and Azekah
  lexicon: HALOT
  rationale: Conjunction + proper place name. Here the conjunction is explicitly rendered
    as 'and' before the final item in the series, while 'Azekah' is the standard English
    transliteration.
