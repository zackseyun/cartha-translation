id: JOS.15.5
reference: Joshua 15:5
source:
  edition: WLC
  text: וּ/גְב֥וּל קֵ֨דְמָ/ה֙ יָ֣ם הַ/מֶּ֔לַח עַד קְצֵ֖ה הַ/יַּרְדֵּ֑ן וּ/גְב֞וּל
    לִ/פְאַ֤ת צָפ֨וֹנָ/ה֙ מִ/לְּשׁ֣וֹן הַ/יָּ֔ם מִ/קְצֵ֖ה הַ/יַּרְדֵּֽן־׃
translation:
  text: And the eastern border was the Salt Sea, as far as the mouth of the Jordan.
    And the border on the north side was from the tongue of the sea, from the mouth
    of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Dead Sea.'' Hebrew: ''the Salt Sea.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'tongue of the sea,' a topographical expression for a tongue-shaped
      extension or inlet of the sea.
    reason: cultural_note
  - marker: c
    text: Or 'end of the Jordan'; here it refers to the point where the Jordan enters
      the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  lexicon: HALOT
  rationale: In a territorial description, גְּבוּל denotes a boundary line or border.
    'Border' is natural modern English and fits the cadastral context.
- source_word: קֵדְמָה
  chosen: eastern
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The directional noun/adverb marks the eastern side of the territory.
    'Eastern' works idiomatically with 'border' in English.
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Dead Sea
  lexicon: HALOT
  rationale: The Hebrew literally reads 'Sea of Salt'/'Salt Sea.' Following original-language
    primacy, the main text preserves the source expression rather than substituting
    the conventional modern geographic name 'Dead Sea.'
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - until
  lexicon: HALOT
  rationale: In boundary formulas, עַד marks extent. 'As far as' clearly conveys the
    terminus of the border line.
- source_word: קְצֵה
  chosen: mouth
  alternatives:
  - end
  - extremity
  lexicon: HALOT
  rationale: Although the noun literally means 'end/extremity,' in this geographic
    context with the Jordan and the sea it refers to the point where the Jordan meets
    the sea. 'Mouth' is the clearest idiomatic English rendering for that endpoint.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name is sufficiently clear in English as 'the Jordan.' 'River'
    is possible but not required by the Hebrew.
- source_word: לִפְאַת צָפוֹנָה
  chosen: on the north side
  alternatives:
  - toward the north
  - on the northern side
  lexicon: HALOT
  rationale: The phrase specifies the border segment belonging to the northern side.
    'On the north side' is idiomatic and preserves the spatial sense.
- source_word: לָשׁוֹן
  chosen: tongue
  alternatives:
  - bay
  - inlet
  lexicon: HALOT
  rationale: The Hebrew literally means 'tongue' and is used topographically for a
    tongue-shaped projection or extension of water. The literal image is understandable
    in English and preserves the source metaphor.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the Salt Sea
  lexicon: HALOT
  rationale: The noun is definite but not explicitly repeated with 'Salt' here. 'The
    sea' is the direct rendering, with the referent understood from context as the
    Salt Sea.
