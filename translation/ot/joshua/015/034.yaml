id: JOS.15.34
reference: Joshua 15:34
source:
  edition: WLC
  text: וְ/זָנ֨וֹחַ֙ וְ/עֵ֣ין גַּנִּ֔ים תַּפּ֖וּחַ וְ/הָ/עֵינָֽם׃
translation:
  text: Zanoah, En-gannim, Tappuah, and Enam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-gannim likely means “spring of gardens.”
    reason: lexical_alternative
  - marker: b
    text: Tappuah is a place name; the underlying Hebrew word can also denote “apple”
      or a fruit tree.
    reason: lexical_alternative
  - marker: c
    text: Enam is a place name; the Hebrew form includes the article, yielding something
      like “the springs.”
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנוֹחַ
  chosen: Zanoah
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    in keeping with the project's policy to transliterate names.
- source_word: עֵין גַּנִּים
  chosen: En-gannim
  alternatives:
  - En Gannim
  - Spring of Gardens
  lexicon: HALOT
  rationale: Compound place name built on עַיִן/עֵין ('spring, fountain') plus גַּנִּים
    ('gardens'). Because this is a toponym in a boundary/town list, transliteration
    is preferred in the main text. A more transparent translation is possible but
    would be less consistent with treatment of names.
- source_word: תַּפּוּחַ
  chosen: Tappuah
  alternatives:
  - Apple-town
  - apple
  lexicon: HALOT
  rationale: Proper place name; although the noun can denote 'apple' or a fruit tree,
    here it functions as a toponym and is therefore transliterated.
- source_word: הָעֵינָם
  chosen: Enam
  alternatives:
  - Ha-enam
  - the springs
  lexicon: HALOT
  rationale: Toponym with prefixed article in Hebrew orthography. In English a conventional
    transliterated place name is preferable to a literal rendering. The article is
    not represented separately in the main text because the expression functions as
    a fixed place name.
