id: JOS.15.20
reference: Joshua 15:20
source:
  edition: WLC
  text: זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵי יְהוּדָ֖ה לְ/מִשְׁפְּחֹתָֽ/ם־׃
translation:
  text: This was the inheritance of the tribe of the sons of Judah according to their
    clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "This is the inheritance of the tribe of the sons of Judah according
      to their clans."
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: The demonstrative feminine singular points back to the territorial allotment
    just described. English idiom prefers 'This was' in this summarizing narrative
    statement, though a present-tense 'This is' is possible more formally.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inherited possession or allotted inheritance,
    especially in land-distribution contexts. 'Inheritance' best preserves the covenantal-land
    nuance.
- source_word: מַטֵּה
  chosen: the tribe
  alternatives:
  - the staff
  - the branch
  lexicon: HALOT
  rationale: In tribal and census contexts מַטֶּה is a standard term for 'tribe.'
    The literal sense 'staff' is not intended here.
- source_word: בְנֵי יְהוּדָה
  chosen: of the sons of Judah
  alternatives:
  - of the people of Judah
  - of Judah
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'sons of Judah.' Retaining 'sons'
    reflects the source wording and the genealogical/tribal idiom, while still being
    natural in English. 'People of Judah' would be smoother but less formally transparent.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: 'מִשְׁפָּחָה in tribal-allotment contexts refers to clan-level family
    groupings within the tribe. ''Clans'' is more precise than the broader English
    ''families.'' The prefixed לְ is distributive: ''according to/by''.'
