id: JOS.15.44
reference: Joshua 15:44
source:
  edition: WLC
  text: וּ/קְעִילָ֥ה וְ/אַכְזִ֖יב וּ/מָֽרֵאשָׁ֑ה עָרִ֥ים תֵּ֖שַׁע וְ/חַצְרֵי/הֶֽן׃
translation:
  text: 'Keilah, Achzib, and Mareshah: nine cities with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their settlements.' The Hebrew term can refer to dependent rural places
      associated with a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְעִילָה
  chosen: Keilah
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: אַכְזִיב
  chosen: Achzib
  lexicon: HALOT
  rationale: Proper place name; rendered by standard English transliteration.
- source_word: מָרֵאשָׁה
  chosen: Mareshah
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Common term for urban settlements. 'Cities' is the standard rendering
    in territorial lists like Joshua 15 and fits the administrative sense here.
- source_word: תֵּשַׁע
  chosen: nine
  lexicon: HALOT
  rationale: Cardinal number modifying 'cities.' Retained straightforwardly.
- source_word: חַצְרֵיהֶן
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  lexicon: HALOT
  rationale: Refers to dependent rural places or unwalled satellite settlements associated
    with the listed cities. 'Villages' is the most natural modern English equivalent
    in this formulaic phrase.
- source_word: וְ
  chosen: and
  rationale: Standard conjunction linking the place names and the concluding phrase.
    In English style, commas plus a final 'and' communicate the list naturally.
