id: JOS.15.17
reference: Joshua 15:17
source:
  edition: WLC
  text: וַֽ/יִּלְכְּדָ֛/הּ עָתְנִיאֵ֥ל בֶּן קְנַ֖ז אֲחִ֣י כָלֵ֑ב וַ/יִּתֶּן ל֛/וֹ
    אֶת עַכְסָ֥ה בִתּ֖/וֹ לְ/אִשָּֽׁה־־־׃
translation:
  text: Othniel son of Kenaz, Caleb’s brother, captured it, and he gave him his daughter
    Achsah as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the city of Kiriath-sepher/Debir mentioned in the previous verse.
    reason: cross_reference
  - marker: b
    text: Or possibly 'kinsman of Caleb,' since 'brother' can sometimes be used more
      broadly for a close relative; the plain sense is 'brother.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: From לכד, 'to capture/seize.' The 3fs suffix refers back to the city
    named in the previous verse. 'Captured it' is natural English and preserves the
    military sense without overparaphrase.
- source_word: עָתְנִיאֵל
  chosen: Othniel
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן קְנַז
  chosen: son of Kenaz
  rationale: Formal filial construction; retained straightforwardly in English.
- source_word: אֲחִי כָלֵב
  chosen: Caleb’s brother
  alternatives:
  - brother of Caleb
  - kinsman of Caleb
  lexicon: HALOT
  rationale: The construct literally means 'brother of Caleb.' 'Caleb’s brother' is
    idiomatic English. While אָח can sometimes denote a broader kinsman relationship,
    the plain sense here is 'brother,' and no contextual pressure requires weakening
    it.
- source_word: וַיִּתֶּן לוֹ
  chosen: and he gave him
  alternatives:
  - so he gave to him
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of נתן with indirect object suffix. The subject
    is Caleb from the prior context; the recipient is Othniel. English keeps the pronouns,
    though the named referents are inferable from context.
- source_word: אֶת עַכְסָה בִתּוֹ
  chosen: his daughter Achsah
  alternatives:
  - Achsah his daughter
  rationale: Direct object marker plus proper name and apposition/construct 'his daughter.'
    English word order is adjusted for readability while preserving the relationship.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - in marriage
  lexicon: HALOT
  rationale: Common idiom for giving a woman in marriage. 'As a wife' is a clear,
    idiomatic rendering that preserves the marital sense without adding interpretive
    detail.
