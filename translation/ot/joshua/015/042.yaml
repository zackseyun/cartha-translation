id: JOS.15.42
reference: Joshua 15:42
source:
  edition: WLC
  text: לִבְנָ֥ה וָ/עֶ֖תֶר וְ/עָשָֽׁן׃
translation:
  text: Libnah, Ether, and Ashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ashan is a place name here, not the common noun 'smoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנָה
  chosen: Libnah
  alternatives:
  - Libna
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    per project philosophy for names. 'Libnah' follows standard English convention
    for this Judahite town.
- source_word: וָ/עֶתֶר
  chosen: and Ether
  alternatives:
  - and Eter
  lexicon: HALOT
  rationale: Conjunction ו rendered as 'and'; proper place name עתר transliterated
    as 'Ether' by standard English convention in biblical geography.
- source_word: וְ/עָשָׁן
  chosen: and Ashan
  alternatives:
  - and Ashen
  lexicon: HALOT
  rationale: Conjunction ו rendered as 'and'; proper place name עשן transliterated
    as 'Ashan.' Although the underlying noun can mean 'smoke,' in this context it
    is clearly a toponym and should be transliterated, not translated.
