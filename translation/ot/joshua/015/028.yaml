id: JOS.15.28
reference: Joshua 15:28
source:
  edition: WLC
  text: וַ/חֲצַ֥ר שׁוּעָ֛ל וּ/בְאֵ֥ר שֶׁ֖בַע וּ/בִזְיוֹתְיָֽה׃
translation:
  text: Hazar-shual, Beersheba, and Bizjothjah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beersheba may reflect the Hebrew for 'well of seven' and, by wordplay, 'well
      of the oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲצַר שׁוּעָל
  chosen: Hazar-shual
  alternatives:
  - Hazor-shual
  - Village of the Fox
  lexicon: HALOT
  rationale: A place name composed of חצר ('settlement, enclosure, village') and שועל
    ('fox/jackal'). Following the translation philosophy, personal and place names
    are transliterated rather than translated in the main text. A more interpretive
    rendering such as 'Village of the Fox' is possible etymologically but inappropriate
    for the main text in a boundary/town list.
- source_word: בְּאֵר שֶׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  - Well of Seven
  - Well of the Oath
  lexicon: HALOT
  rationale: Standard transliteration of the well-known place name. The second element
    שֶׁבַע can relate to 'seven' and by wordplay to 'oath,' but as a fixed toponym
    it is best transliterated in the main text. Alternative etymological renderings
    are preserved in a footnote.
- source_word: בִּזְיוֹתְיָה
  chosen: Bizjothjah
  alternatives:
  - Biziothiah
  - Bizyothiah
  lexicon: HALOT
  rationale: A place name of uncertain derivation; transliteration is the most transparent
    approach. English spelling varies because of how the consonants and vowels are
    represented; 'Bizjothjah' follows a fairly direct transliteration of the Hebrew
    form.
- source_word: וַ / וּ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction simply links items in this town list. English
    idiom renders the sequence as a comma-separated list with 'and' before the final
    item.
