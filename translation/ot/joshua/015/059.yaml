id: JOS.15.59
reference: Joshua 15:59
source:
  edition: WLC
  text: וּ/מַעֲרָ֥ת וּ/בֵית עֲנ֖וֹת וְ/אֶלְתְּקֹ֑ן עָרִ֥ים שֵׁ֖שׁ וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'and Maarath, and Beth-anoth, and Eltekon: six cities with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their settlements' / 'with their hamlets.' The Hebrew term refers
      to dependent rural places associated with the listed cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַעֲרָת
  chosen: and Maarath
  alternatives:
  - and Ma'arath
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy for names. The prefixed conjunction ו is rendered 'and.' Spelling 'Maarath'
    gives a smooth standard English transliteration, while 'Ma'arath' is a possible
    more phonetic alternative.
- source_word: וּ/בֵית עֲנוֹת
  chosen: and Beth-anoth
  alternatives:
  - and Beth Anoth
  - and Beth-anoth
  lexicon: HALOT
  rationale: Compound place name with בֵית as part of the toponym, so transliterated
    as a name rather than translated 'house of Anoth.' Hyphenation helps signal the
    compound proper name in English.
- source_word: וְ/אֶלְתְּקֹן
  chosen: and Eltekon
  alternatives:
  - and Eltekon
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Eltekon' is a standard English form;
    'Eltekon' is a plausible alternate transliteration.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: In territorial lists, עִיר commonly denotes an inhabited settlement.
    'Cities' is the conventional and sufficiently accurate rendering in this cadastral
    context, though 'towns' is possible in modern English.
- source_word: שֵׁשׁ
  chosen: six
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'cities.'
- source_word: וְ/חַצְרֵי/הֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: חָצֵר in these allotment lists refers to dependent rural settlements/outlying
    places associated with the named cities. 'Villages' is clear modern English and
    fits the administrative-geographical sense better than a more wooden 'courtyards'.
