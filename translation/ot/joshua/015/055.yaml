id: JOS.15.55
reference: Joshua 15:55
source:
  edition: WLC
  text: מָע֥וֹן כַּרְמֶ֖ל וָ/זִ֥יף וְ/יוּטָּֽה׀׃
translation:
  text: Maon, Carmel, Ziph, and Juttah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew consists solely of place names in a settlement list: ''Maon, Carmel,
      Ziph, and Juttah.'''
    reason: cultural_note
lexical_decisions:
- source_word: מָעוֹן
  chosen: Maon
  alternatives:
  - Maonah
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    in keeping with the project's policy to transliterate names. Although the common
    noun מָעוֹן can mean 'dwelling' or 'habitation,' here the morphology and context
    clearly indicate a toponym.
- source_word: כַּרְמֶל
  chosen: Carmel
  alternatives:
  - Karmel
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention as 'Carmel.'
    In this context it refers to the Judean town, not translated as the common noun
    'vineyard land' or 'garden land.'
- source_word: וָזִיף
  chosen: Ziph
  alternatives:
  - Ziph
  lexicon: HALOT
  rationale: Conjunction ו plus proper place name זִיף. Rendered 'Ziph' with the conjunction
    translated as 'and.' Standard English spelling preserves recognizability.
- source_word: וְיוּטָּה
  chosen: and Juttah
  alternatives:
  - and Yuttah
  lexicon: HALOT
  rationale: Conjunction ו plus proper place name יוּטָּה. Rendered with standard
    English transliteration 'Juttah,' which is conventional in English Bible geography.
    The conjunction is represented by 'and.'
