id: JOS.15.37
reference: Joshua 15:37
source:
  edition: WLC
  text: צְנָ֥ן וַ/חֲדָשָׁ֖ה וּ/מִגְדַּל גָּֽד־׃
translation:
  text: Zenan, Hadashah, and Migdal-gad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Migdal-gad could be rendered more literally as 'Tower of Gad,' but here
      it is kept as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְנָן
  chosen: Zenan
  alternatives:
  - Zenan
  lexicon: HALOT
  rationale: Proper place name in Judah's territorial list; transliterated rather
    than translated per project philosophy for names. Standard English transliteration
    yields 'Zenan.'
- source_word: חֲדָשָׁה
  chosen: Hadashah
  alternatives:
  - Chadashah
  lexicon: HALOT
  rationale: Proper place name, despite the underlying adjective meaning 'new.' In
    this context it functions as a toponym in a sequence of town names, so it is transliterated
    rather than translated.
- source_word: מִגְדַּל גָּד
  chosen: Migdal-gad
  alternatives:
  - Migdal-gad
  - Tower of Gad
  lexicon: HALOT
  rationale: Compound place name. Although מגדל can mean 'tower,' the phrase here
    is a settled toponym in a town list, so transliteration best preserves name status.
    Hyphenation reflects the compound form in English.
- source_word: וַ
  chosen: and
  rationale: Conjunction linking items in the list; rendered with standard English
    'and.'
- source_word: וּ
  chosen: and
  rationale: Conjunction linking the final item in the list; rendered with standard
    English 'and.'
