id: JOS.15.63
reference: Joshua 15:63
source:
  edition: WLC
  text: וְ/אֶת הַ/יְבוּסִי֙ יוֹשְׁבֵ֣י יְרֽוּשָׁלִַ֔ם לֹֽא יוכלו בְנֵֽי יְהוּדָ֖ה
    לְ/הֽוֹרִישָׁ֑/ם וַ/יֵּ֨שֶׁב הַ/יְבוּסִ֜י אֶת בְּנֵ֤י יְהוּדָה֙ בִּ/יר֣וּשָׁלִַ֔ם
    עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־־׃פ
translation:
  text: But the sons of Judah could not dispossess the Jebusites, the inhabitants
    of Jerusalem, so the Jebusites have lived with the sons of Judah in Jerusalem
    to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the Jebusite has lived [with/among] the sons of Judah.'
      The singular ethnic term is collective in sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: But
  alternatives:
  - And as for
  lexicon: HALOT
  rationale: The conjunction with object marker introduces a contrastive transition
    from the preceding allotment details to an exception; 'But' communicates the discourse
    force more naturally in English than a wooden 'And.'
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Although morphologically singular/collective, the ethnic term refers
    to the people group collectively. English normally renders this as the plural
    ethnonym 'the Jebusites.'
- source_word: יוֹשְׁבֵי יְרוּשָׁלַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - who lived in Jerusalem
  lexicon: HALOT
  rationale: The participial construction identifies the Jebusites as the residents
    of Jerusalem. 'The inhabitants of Jerusalem' is idiomatic and preserves the appositional
    force.
- source_word: לֹא יוכלו
  chosen: could not
  alternatives:
  - were not able to
  lexicon: HALOT
  rationale: The verb expresses inability in past narrative perspective. 'Could not'
    is concise, natural, and faithful.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source expression literally enough
    while still sounding natural. Here it denotes the tribal members of Judah, not
    merely male individuals; 'sons of Judah' preserves the Hebrew idiom better than
    flattening to 'people of Judah.'
- source_word: לְהוֹרִישָׁם
  chosen: dispossess
  alternatives:
  - drive them out
  - take possession from them
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ in conquest contexts means to cause someone to lose
    possession, hence 'dispossess.' This is more precise than the common but slightly
    less exact 'drive out.'
- source_word: וַיֵּשֶׁב
  chosen: have lived
  alternatives:
  - dwelt
  - lived
  - settled
  lexicon: HALOT
  rationale: With the following 'to this day,' the clause describes a state continuing
    from the past to the narrator's present. English present perfect ('have lived')
    best captures that continuing-result sense.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Again a collective ethnic singular in Hebrew, best rendered by the English
    plural ethnonym.
- source_word: אֶת בְּנֵי יְהוּדָה
  chosen: with the sons of Judah
  alternatives:
  - among the sons of Judah
  - alongside the sons of Judah
  lexicon: HALOT
  rationale: The Hebrew text literally has the object marker before 'the sons of Judah'
    after 'the Jebusite lived,' an unusual construction. In context and by established
    usage, the sense is coexistence rather than the Jebusites somehow inhabiting the
    Judahites. 'With' expresses the intended relation clearly.
- source_word: בִּירוּשָׁלַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic English for the Hebrew temporal formula indicating
    continuation up to the narrator's present.
