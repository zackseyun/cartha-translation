theological_decisions:
- issue: Rendering of בְנֵי יְהוּדָה
  chosen_reading: the sons of Judah
  alternative_readings:
  - the people of Judah
  - the tribe of Judah
  rationale: Following the translation philosophy's gender-accurate principle, the
    familial/tribal idiom is preserved rather than neutralized. The phrase denotes
    the tribal descendants collectively, and no doctrinal issue is at stake, but the
    choice reflects stated policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of the final clause with וַיֵּשֶׁב ... אֶת בְּנֵי יְהוּדָה
  chosen_reading: the Jebusites have lived with the sons of Judah
  alternative_readings:
  - the Jebusites lived among the sons of Judah
  - the Jebusites dwelt alongside the sons of Judah
  rationale: The Hebrew construction is syntactically unusual if taken woodenly. Context
    and parallel usage support a coexistence sense. The translation avoids a misleadingly
    literal rendering while not overstating the relationship.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
