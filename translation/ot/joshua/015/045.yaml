id: JOS.15.45
reference: Joshua 15:45
source:
  edition: WLC
  text: עֶקְר֥וֹן וּ/בְנֹתֶ֖י/הָ וַ/חֲצֵרֶֽי/הָ׃
translation:
  text: Ekron, with its towns and its villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and its daughters and its villages.' Here 'daughters' is a Hebrew
      idiom for dependent towns or settlements belonging to a larger city.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶקְרוֹן
  chosen: Ekron
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy
    for names rather than translated.
- source_word: וּבְנֹתֶיהָ
  chosen: with its towns
  alternatives:
  - and its daughters
  - and its dependent towns
  lexicon: HALOT
  rationale: The noun בנות ('daughters') is an established idiom in territorial lists
    for satellite settlements belonging to a principal city. 'Towns' communicates
    the referent in natural English, while 'with' makes explicit the connective sense
    in a compact list. The more literal 'daughters' would be obscure in English, so
    the idiomatic sense is preferred.
- source_word: וַחֲצֵרֶיהָ
  chosen: and its villages
  alternatives:
  - and its settlements
  - and its hamlets
  - and its encampments
  lexicon: HALOT
  rationale: חצרים in land-allotment contexts refers to smaller dependent settlements
    or villages. 'Villages' is the clearest modern English equivalent here and pairs
    naturally with the preceding term for dependent towns.
