id: JOS.15.23
reference: Joshua 15:23
source:
  edition: WLC
  text: וְ/קֶ֥דֶשׁ וְ/חָצ֖וֹר וְ/יִתְנָֽן׃
translation:
  text: Kedesh, Hazor, and Ithnan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kedesh may also be rendered 'Kadesh' in English transliteration.
    reason: lexical_alternative
  - marker: b
    text: Ithnan may also be rendered 'Jithnan' in older English transliteration traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶדֶשׁ
  chosen: Kedesh
  alternatives:
  - Kadesh
  lexicon: HALOT
  rationale: Proper place name in a town list; per translation philosophy, names are
    transliterated rather than translated. 'Kedesh' follows a standard English transliteration
    of the Hebrew form here, while 'Kadesh' is a common variant in English tradition
    and worth preserving as an alternative.
- source_word: חָצוֹר
  chosen: Hazor
  lexicon: HALOT
  rationale: Proper place name; transliterated directly into standard English form
    'Hazor.' No contextual reason to translate the lexical sense of the name in this
    geographic list.
- source_word: יִתְנָן
  chosen: Ithnan
  alternatives:
  - Jithnan
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Ithnan' reflects a straightforward
    modern English transliteration of the Hebrew, while 'Jithnan' appears in some
    older English traditions due to differing conventions for initial yod.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the place names in a simple coordinate
    list. In English, commas plus a final 'and' produce natural list style while preserving
    the Hebrew coordination.
