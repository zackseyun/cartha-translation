id: JOS.15.29
reference: Joshua 15:29
source:
  edition: WLC
  text: בַּעֲלָ֥ה וְ/עִיִּ֖ים וָ/עָֽצֶם׃
translation:
  text: Baalah, Iyyim, and Ezem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions read 'Balah' here, likely influenced by parallel town
      lists; the Masoretic Text reads Baalah.
    reason: alternative_reading
  - marker: b
    text: The name Iyyim may be related to the Hebrew word for 'ruins' or 'heaps,'
      but in this context it is treated as a place name and transliterated.
    reason: lexical_alternative
  - marker: c
    text: Some English versions spell this name 'Azem'; 'Ezem' more directly reflects
      the Hebrew vocalization in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלָה
  chosen: Baalah
  alternatives:
  - Balah
  lexicon: HALOT
  rationale: Proper place name (HNp). Following the translation philosophy, names
    are transliterated rather than translated. The form here is best represented as
    'Baalah' from the consonantal/vocalized Hebrew. An alternative spelling 'Balah'
    appears in some English traditions due to harmonization with parallel lists, but
    the MT form here supports 'Baalah'.
- source_word: עִיִּים
  chosen: Iyyim
  alternatives:
  - Iim
  - Iyim
  - Ruins
  lexicon: HALOT
  rationale: Proper place name (Np) in a town list, so transliteration is preferred
    over translating the lexical sense ('ruins'). 'Iyyim' reflects the doubled yod
    sound more transparently than simplified spellings such as 'Iim' or 'Iyim'.
- source_word: עָצֶם
  chosen: Ezem
  alternatives:
  - Azem
  lexicon: HALOT
  rationale: Proper place name (Np). 'Ezem' is a standard English transliteration
    from the Hebrew vocalization here. 'Azem' is a common alternative in English Bible
    tradition, reflecting a different transliteration convention for initial ע; the
    present choice aims at a more direct representation of the Hebrew form.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction joins items in a simple list of towns; 'and'
    is the natural English equivalent.
- source_word: וָ
  chosen: and
  rationale: Conjunction with vowel change before the following word; in English it
    is simply rendered 'and' as part of the list.
