id: JOS.15.4
reference: Joshua 15:4
source:
  edition: WLC
  text: וְ/עָבַ֣ר עַצְמ֗וֹנָ/ה וְ/יָצָא֙ נַ֣חַל מִצְרַ֔יִם ו/היה תֹּצְא֥וֹת הַ/גְּב֖וּל
    יָ֑מָּ/ה זֶה יִהְיֶ֥ה לָ/כֶ֖ם גְּב֥וּל נֶֽגֶב־׃
translation:
  text: Then it passed on to Azmon, and went out to the Brook of Egypt; and the boundary
    ended at the sea. This shall be your southern boundary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Wadi of Egypt.” Hebrew naḥal often refers to a seasonal watercourse
      or wadi; “River of Egypt” is another traditional rendering, but it may suggest
      the Nile too strongly in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר
  chosen: Then it passed on
  alternatives:
  - and it passed
  - and it crossed over
  lexicon: HALOT
  rationale: The verb עבר in boundary descriptions commonly marks the line's continuation
    from one point to another. 'Passed on' is natural English for a border itinerary
    and avoids implying an actual crossing if the sense is simply progression along
    the border.
- source_word: עַצְמֹנָה
  chosen: Azmon
  alternatives:
  - Atzmon
  rationale: A place name, so transliterated rather than translated, following the
    project's policy for names.
- source_word: וְיָצָא
  chosen: and went out
  alternatives:
  - and came out
  - and extended to
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' In territorial descriptions it
    indicates the border reaching or emerging at a destination. 'Went out' preserves
    the verbal imagery while remaining readable.
- source_word: נַחַל מִצְרַיִם
  chosen: the Brook of Egypt
  alternatives:
  - the Wadi of Egypt
  - the River of Egypt
  lexicon: HALOT
  rationale: נחל most often denotes a wadi, torrent-bed, or brook rather than a major
    river. 'Brook of Egypt' is a familiar and defensible rendering in this boundary
    context. 'River of Egypt' could be misunderstood as the Nile, which is unlikely
    here; 'Wadi of Egypt' is more precise geographically but less idiomatic in running
    English.
- source_word: וְהָיוּ תֹּצְאוֹת הַגְּבוּל יָמָּה
  chosen: and the boundary ended at the sea
  alternatives:
  - and the outgoings of the boundary were westward
  - and the boundary's extremities were toward the sea
  lexicon: HALOT
  rationale: תוצאות הגבול refers to the border's end-points/termination. ימה here
    is directional, 'toward the sea,' which in this southern-border context points
    to the Mediterranean. 'Ended at the sea' communicates the sense clearly in modern
    English without woodenly reproducing the Hebrew idiom.
- source_word: זֶה יִהְיֶה לָכֶם גְּבוּל נֶגֶב
  chosen: This shall be your southern boundary
  alternatives:
  - This shall be for you the Negev border
  - This shall be your border on the south
  lexicon: HALOT
  rationale: נֶגֶב here functions directionally, 'south/southern,' not as the regional
    proper name Negev. The clause summarizes the preceding line as Judah's southern
    border. 'Shall be your southern boundary' is clear and faithful.
