id: JOS.15.60
reference: Joshua 15:60
source:
  edition: WLC
  text: קִרְיַת בַּ֗עַל הִ֛יא קִרְיַ֥ת יְעָרִ֖ים וְ/הָֽ/רַבָּ֑ה עָרִ֥ים שְׁתַּ֖יִם
    וְ/חַצְרֵי/הֶֽן־׃ס
translation:
  text: 'Kiriath-baal (that is, Kiriath-jearim), and Rabbah: two cities with their
    settlements.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their villages.' The Hebrew term refers to dependent settlements associated
      with the named cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְיַת בַּעַל
  chosen: Kiriath-baal
  alternatives:
  - Kiriath Baal
  - City of Baal
  lexicon: HALOT
  rationale: A place name, so transliterated rather than translated, in keeping with
    the philosophy to transliterate names. 'City of Baal' reflects the etymology but
    would treat the proper name as a common noun phrase.
- source_word: הִיא
  chosen: that is
  alternatives:
  - is
  - namely
  lexicon: HALOT
  rationale: Here the pronoun functions appositionally/epexegetically, identifying
    Kiriath-baal with Kiriath-jearim. 'That is' communicates the explanatory force
    more naturally than a bare 'is' in English.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiriath Jearim
  - City of Forests
  lexicon: HALOT
  rationale: Proper place name, so transliterated. The explanatory apposition identifies
    the alternate name of the same town.
- source_word: הָרַבָּה
  chosen: Rabbah
  alternatives:
  - the Rabbah
  - Rabbahh
  lexicon: HALOT
  rationale: Another place name. Although the Hebrew form includes the article, English
    convention for place names normally omits it unless it is integral to the name.
    'Rabbah' is the standard transliteration.
- source_word: עָרִים שְׁתַּיִם
  chosen: two cities
  alternatives:
  - two towns
  lexicon: HALOT
  rationale: Standard rendering of the count phrase summarizing the listed settlements.
    'Cities' is conventional for עָרִים in territorial lists, though 'towns' is possible
    in modern English.
- source_word: חַצְרֵיהֶן
  chosen: their settlements
  alternatives:
  - their villages
  - their hamlets
  - their daughter towns
  lexicon: HALOT
  rationale: In allotment lists, חָצֵר commonly refers to dependent settlements/outlying
    villages associated with a main city. 'Settlements' is a readable modern term
    broad enough to cover the sense without sounding archaic.
