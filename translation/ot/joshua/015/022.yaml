id: JOS.15.22
reference: Joshua 15:22
source:
  edition: WLC
  text: וְ/קִינָ֥ה וְ/דִֽימוֹנָ֖ה וְ/עַדְעָדָֽה׃
translation:
  text: Kinah, Dimonah, and Adadah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Qinah' for the first town name; English transliterations of Hebrew place
      names vary.
    reason: lexical_alternative
  - marker: b
    text: Or 'Dimona' for the second town name; the Hebrew ending may be represented
      in English with either '-ah' or '-a'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִינָה
  chosen: Kinah
  alternatives:
  - Qinah
  lexicon: HALOT
  rationale: Proper place name in a town list; per translation philosophy, names are
    transliterated rather than translated. 'Kinah' follows a standard English transliteration
    convention for ק.
- source_word: דִּימוֹנָה
  chosen: Dimonah
  alternatives:
  - Dimona
  lexicon: HALOT
  rationale: Proper place name; transliterated directly. The final ה is represented
    with '-ah' to reflect the Hebrew form in a conventional English transliteration.
- source_word: עַדְעָדָה
  chosen: Adadah
  lexicon: HALOT
  rationale: Proper place name in the settlement list of Judah; transliterated rather
    than translated. 'Adadah' preserves the repeated consonantal pattern of the Hebrew
    name.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links the place names in a simple list. In English,
    commas plus a final 'and' best represent the Hebrew polysyndetic sequence in readable
    modern style.
