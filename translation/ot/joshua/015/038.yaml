id: JOS.15.38
reference: Joshua 15:38
source:
  edition: WLC
  text: וְ/דִלְעָ֥ן וְ/הַ/מִּצְפֶּ֖ה וְ/יָקְתְאֵֽל׃
translation:
  text: Dilean, Mizpeh, and Joktheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ha-Mizpeh' includes the definite article ('the'), but here it is
      best understood as part of the place name rather than translated separately.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִלְעָן
  chosen: Dilean
  alternatives:
  - Dil'an
  rationale: Proper place name in Judah's town list; transliterated rather than translated
    per project philosophy for names. 'Dilean' follows standard English convention
    based on the Masoretic vocalization.
- source_word: הַמִּצְפֶּה
  chosen: Mizpeh
  alternatives:
  - the Mizpeh
  - the watchtower
  - the lookout
  lexicon: HALOT
  rationale: Although the form includes the article and derives from a noun meaning
    'watchtower/lookout,' in this context it functions as a settled place name within
    a list of towns, so transliteration is preferable. The article is absorbed into
    the conventional toponym rather than rendered separately in English.
- source_word: יָקְתְאֵל
  chosen: Joktheel
  alternatives:
  - Joqtheel
  - Jaktheel
  rationale: Proper place name; transliterated by standard English convention. 'Joktheel'
    is the familiar English form for this toponym.
