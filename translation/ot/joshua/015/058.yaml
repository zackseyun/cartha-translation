id: JOS.15.58
reference: Joshua 15:58
source:
  edition: WLC
  text: חַלְח֥וּל בֵּֽית צ֖וּר וּ/גְדֽוֹר־׃
translation:
  text: Halhul, Beth-zur, and Gedor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חַלְחוּל
  chosen: Halhul
  alternatives:
  - Halhul
  lexicon: HALOT
  rationale: Proper place name in Judah's hill country list; transliterated rather
    than translated per translation philosophy for names.
- source_word: בֵּית צ֖וּר
  chosen: Beth-zur
  alternatives:
  - Beth Zur
  - House of Zur
  lexicon: HALOT
  rationale: Compound place name. Kept as standard transliteration with hyphen to
    reflect the bound form 'Beth-' plus 'Zur.' Although the literal sense is 'house
    of Zur/rock,' this is a toponym and should be transliterated, not translated.
- source_word: וּ/גְדוֹר
  chosen: and Gedor
  alternatives:
  - Gedor
  lexicon: HALOT
  rationale: Conjunction ו rendered as 'and' to preserve the list structure; גְּדוֹר
    is a proper place name and is transliterated.
