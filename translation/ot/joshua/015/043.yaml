id: JOS.15.43
reference: Joshua 15:43
source:
  edition: WLC
  text: וְ/יִפְתָּ֥ח וְ/אַשְׁנָ֖ה וּ/נְצִֽיב׃
translation:
  text: And Iphtah, and Ashnah, and Nezib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jiphtah'; traditionally 'Jephthah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Netsib.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְתָּח
  chosen: Iphtah
  alternatives:
  - Jiphtah
  - Jephthah
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    per project philosophy. 'Iphtah' closely reflects the Hebrew consonants and vowels.
    'Jephthah' is familiar from the judge's name elsewhere, but here the form is a
    toponym and should be represented as a place name rather than harmonized to the
    better-known personal name.
- source_word: אַשְׁנָה
  chosen: Ashnah
  lexicon: HALOT
  rationale: Proper place name; standard transliteration of the Hebrew toponym in
    this Judah town list.
- source_word: נְצִיב
  chosen: Nezib
  alternatives:
  - Netsib
  lexicon: HALOT
  rationale: Proper place name; transliterated into conventional English form. 'Nezib'
    gives a readable modern English representation of the Hebrew name, while 'Netsib'
    is a possible more tightly phonetic alternative.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links each item in this serial list of towns;
    rendered straightforwardly as 'and' to preserve the list structure of the Hebrew.
