id: JOS.15.40
reference: Joshua 15:40
source:
  edition: WLC
  text: וְ/כַבּ֥וֹן וְ/לַחְמָ֖ס וְ/כִתְלִֽישׁ׃
translation:
  text: Kabbon, Lahmas, and Kithlish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cabbon.' Older English transliterations sometimes use C where modern
      transliteration prefers K.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lachmas.' The alternative spelling attempts to represent the Hebrew
      letter ח more explicitly.
    reason: lexical_alternative
  - marker: c
    text: Or 'Chithlish' or 'Cithlish.' These are alternative transliterations of
      the Hebrew place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַבּוֹן
  chosen: Kabbon
  alternatives:
  - Cabbon
  rationale: Proper place name in a town list; per translation philosophy, names are
    transliterated rather than translated. 'Kabbon' follows a straightforward transliteration
    of the Hebrew consonants and vowels; 'Cabbon' reflects an older English convention
    using C for /k/.
- source_word: לַחְמָס
  chosen: Lahmas
  alternatives:
  - Lachmas
  rationale: Proper place name; transliterated directly from Hebrew. 'Lahmas' gives
    a readable modern English form, while 'Lachmas' is a possible alternative attempting
    to signal the guttural ח with 'ch'.
- source_word: כִתְלִישׁ
  chosen: Kithlish
  alternatives:
  - Chithlish
  - Cithlish
  rationale: Proper place name; transliterated rather than translated. 'Kithlish'
    preserves the initial כ with K in modern English convention; alternatives reflect
    older transliteration practices.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links the place names in a simple coordinate
    list. In English, commas plus a final 'and' best represent the Hebrew sequence
    in readable modern style.
