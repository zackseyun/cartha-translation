id: JOS.11.3
reference: Joshua 11:3
source:
  edition: WLC
  text: הַֽ/כְּנַעֲנִי֙ מִ/מִּזְרָ֣ח וּ/מִ/יָּ֔ם וְ/הָ/אֱמֹרִ֧י וְ/הַ/חִתִּ֛י וְ/הַ/פְּרִזִּ֥י
    וְ/הַ/יְבוּסִ֖י בָּ/הָ֑ר וְ/הַֽ/חִוִּי֙ תַּ֣חַת חֶרְמ֔וֹן בְּ/אֶ֖רֶץ הַ/מִּצְפָּֽה׃
translation:
  text: the Canaanite in the east and in the west, and the Amorite, the Hittite, the
    Perizzite, and the Jebusite in the hill country, and the Hivite below Hermon in
    the land of Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and from the sea'; here 'the sea' likely functions as
      a geographic term for the west.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanite
  alternatives:
  - the Canaanites
  lexicon: HALOT
  rationale: The singular gentilic with article is used collectively here, a common
    Hebrew usage for a people group. English can preserve this with the singular ethnonym
    'the Canaanite,' though the plural is also possible.
- source_word: מִמִּזְרָח
  chosen: in the east
  alternatives:
  - from the east
  - to the east
  lexicon: HALOT
  rationale: Though the preposition is literally 'from,' in this geographic listing
    it functions idiomatically to indicate location or extent. 'In the east' reads
    naturally in English while preserving the directional contrast with the following
    phrase.
- source_word: וּמִיָּם
  chosen: and in the west
  alternatives:
  - and from the sea
  - and by the sea
  lexicon: HALOT
  rationale: Hebrew 'sea' often denotes the west in the land-oriented geography of
    Canaan because the Mediterranean lies to the west. Rendering it 'west' communicates
    the directional sense most clearly in context; the more literal 'sea' is preserved
    as an alternative.
- source_word: הָאֱמֹרִי
  chosen: the Amorite
  alternatives:
  - the Amorites
  lexicon: HALOT
  rationale: Like the other ethnonyms in the verse, the singular with article is collective.
    English can retain the singular collective form.
- source_word: הַחִתִּי
  chosen: the Hittite
  alternatives:
  - the Hittites
  lexicon: HALOT
  rationale: Collective singular ethnonym; retained for closeness to the Hebrew form.
- source_word: הַפְּרִזִּי
  chosen: the Perizzite
  alternatives:
  - the Perizzites
  lexicon: HALOT
  rationale: Collective singular ethnonym; retained for consistency with the list.
- source_word: הַיְבוּסִי
  chosen: the Jebusite
  alternatives:
  - the Jebusites
  lexicon: HALOT
  rationale: Collective singular ethnonym; retained for consistency with the list.
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountains
  - in the hill country region
  lexicon: HALOT
  rationale: In Joshua, הָר commonly refers to the central highlands or hill country
    rather than alpine mountains. 'Hill country' is the most idiomatic and contextually
    precise rendering.
- source_word: הַחִוִּי
  chosen: the Hivite
  alternatives:
  - the Hivites
  lexicon: HALOT
  rationale: Collective singular ethnonym; retained for consistency with the list.
- source_word: תַּחַת חֶרְמוֹן
  chosen: below Hermon
  alternatives:
  - under Hermon
  - at the foot of Hermon
  - below Mount Hermon
  lexicon: HALOT
  rationale: תחת here is spatial, indicating a location beneath or at the lower slopes
    of Hermon. 'Below Hermon' is concise and natural; 'Mount' is not required because
    Hermon is a well-known mountain name but remains a possible expansion.
- source_word: בְּאֶרֶץ הַמִּצְפָּה
  chosen: in the land of Mizpah
  alternatives:
  - in the region of Mizpah
  - in the land of the lookout
  lexicon: HALOT
  rationale: אֶרֶץ here denotes a territory or region. 'Mizpah' is treated as a place
    name and transliterated per translation policy. 'Land of Mizpah' preserves the
    territorial sense.
