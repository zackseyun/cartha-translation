id: JOS.11.12
reference: Joshua 11:12
source:
  edition: WLC
  text: וְֽ/אֶת כָּל עָרֵ֣י הַ/מְּלָכִֽים הָ֠/אֵלֶּה וְֽ/אֶת כָּל מַלְכֵי/הֶ֞ם לָכַ֧ד יְהוֹשֻׁ֛עַ וַ/יַּכֵּ֥/ם לְ/פִי חֶ֖רֶב הֶחֱרִ֣ים אוֹתָ֑/ם כַּ/אֲשֶׁ֣ר צִוָּ֔ה מֹשֶׁ֖ה עֶ֥בֶד יְהוָֽה־־־־־־׃
translation:
  text: Joshua captured all the cities of these kings, and all their kings, and he struck them down with the edge of the sword. He devoted them to destruction, just as Moses the servant of Yahweh had commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he utterly destroyed them'; the Hebrew uses the technical verb for placing people or things under the ban, that is, devoting them irrevocably to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמְּלָכִים הָאֵלֶּה
  chosen: the cities of these kings
  alternatives:
  - these royal cities
  - all these kings' cities
  lexicon: HALOT
  rationale: A construct chain meaning literally 'the cities of these kings.' This preserves the relation to the kings just mentioned without over-interpreting as 'royal cities.'
- source_word: לָכַד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: In conquest context, 'captured' is natural modern English and reflects military seizure of cities.
- source_word: וַיַּכֵּם
  chosen: he struck them down
  alternatives:
  - he smote them
  - he defeated them
  - he killed them
  lexicon: HALOT
  rationale: The verb נכה is broad, but here followed by 'with the edge of the sword,' indicating lethal violence. 'Struck them down' is idiomatic and preserves the action without archaic diction.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom literally 'to the mouth of the sword.' 'With the edge of the sword' is the established clear English equivalent that preserves the concrete imagery better than simply 'with the sword.'
- source_word: הֶחֱרִים
  chosen: He devoted them to destruction
  alternatives:
  - he utterly destroyed them
  - he put them under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing persons or things under ḥerem, devoting them irrevocably to destruction. 'Devoted them to destruction' preserves the technical force better than the flatter 'utterly destroyed.'
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... had commanded
  alternatives:
  - as ... commanded
  - according to what ... commanded
  lexicon: HALOT
  rationale: The comparative particle marks conformity to prior command. The pluperfect in English fits the narrative sequence, since Moses' command preceded Joshua's action.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this honorific covenantal title for Moses, 'servant' is the standard and contextually appropriate rendering in English. It conveys official status without importing chattel-slavery connotations.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
