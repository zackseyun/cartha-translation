- issue: Rendering of חרם language in a conquest context
  chosen_reading: He devoted them to destruction
  alternative_readings:
  - he utterly destroyed them
  - he put them under the ban
  rationale: The Hebrew uses technical ḥerem language, not merely a generic verb for destruction. The chosen rendering preserves the theological and covenantal force of the term while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; Contested terms principle of documenting significant terms
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
