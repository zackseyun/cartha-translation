id: JOS.11.22
reference: Joshua 11:22
source:
  edition: WLC
  text: לֹֽא נוֹתַ֣ר עֲנָקִ֔ים בְּ/אֶ֖רֶץ בְּנֵ֣י יִשְׂרָאֵ֑ל רַ֗ק בְּ/עַזָּ֛ה בְּ/גַ֥ת
    וּ/בְ/אַשְׁדּ֖וֹד נִשְׁאָֽרוּ־׃
translation:
  text: No Anakim were left in the land of the sons of Israel; only in Gaza, Gath,
    and Ashdod did some remain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'No Anakim remained in the land of the sons of Israel; only in Gaza,
      Gath, and Ashdod they remained.'
    reason: alternative_reading
lexical_decisions:
- source_word: נוֹתַר
  chosen: were left
  alternatives:
  - remained
  - were left over
  lexicon: HALOT
  rationale: Nifal of יתר/נותר here expresses what was left remaining after Joshua's
    campaigns. 'Were left' is natural English and preserves the passive/resultative
    sense.
- source_word: עֲנָקִים
  chosen: Anakim
  alternatives:
  - descendants of Anak
  - Anakites
  lexicon: HALOT
  rationale: A people-group name is best transliterated rather than dynamically expanded.
    'Anakim' preserves the Hebrew ethnonym and matches standard English Bible usage.
- source_word: בְּאֶרֶץ בְּנֵי יִשְׂרָאֵל
  chosen: in the land of the sons of Israel
  alternatives:
  - in the land of the Israelites
  - in the land of Israel's sons
  lexicon: HALOT
  rationale: The construct phrase is literally 'in the land of the sons of Israel.'
    Because the translation philosophy is gender-accurate over gender-neutral, 'sons
    of Israel' is retained rather than flattening to 'Israelites,' while still reading
    naturally enough in context.
- source_word: רַק
  chosen: only
  alternatives:
  - except that
  - except
  lexicon: HALOT
  rationale: רַק marks limitation/exclusion. 'Only' fits the straightforward contrast
    before the list of remaining locations.
- source_word: בְּעַזָּה בְּגַת וּבְאַשְׁדּוֹד
  chosen: in Gaza, Gath, and Ashdod
  lexicon: HALOT
  rationale: These are place names, so they are transliterated by standard English
    conventions. The repeated preposition is idiomatically represented once in English
    across the coordinated list.
- source_word: נִשְׁאָרוּ
  chosen: did some remain
  alternatives:
  - they remained
  - were left
  lexicon: HALOT
  rationale: The plural verb resumes the Anakim as the implied subject in those cities.
    English often benefits from supplying 'some' to make clear that a remnant of the
    previously mentioned group remained there, without adding a new idea beyond the
    Hebrew context.
