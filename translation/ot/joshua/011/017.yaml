id: JOS.11.17
reference: Joshua 11:17
source:
  edition: WLC
  text: מִן הָ/הָ֤ר הֶֽ/חָלָק֙ הָ/עוֹלֶ֣ה שֵׂעִ֔יר וְ/עַד בַּ֤עַל גָּד֙ בְּ/בִקְעַ֣ת
    הַ/לְּבָנ֔וֹן תַּ֖חַת הַר חֶרְמ֑וֹן וְ/אֵ֤ת כָּל מַלְכֵי/הֶם֙ לָכַ֔ד וַ/יַּכֵּ֖/ם
    וַ/יְמִיתֵֽ/ם־־־־׃
translation:
  text: from Mount Halak, which rises toward Seir, as far as Baal-gad in the Valley
    of Lebanon below Mount Hermon. And he captured all their kings and struck them
    down and put them to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the smooth mountain.' The Hebrew can be understood descriptively, but
      here it likely functions as the place name 'Mount Halak.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the plain of Lebanon.' The Hebrew term can denote a broad valley
      or plain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָהָר הֶחָלָק
  chosen: Mount Halak
  alternatives:
  - the smooth mountain
  lexicon: HALOT
  rationale: Treated as a place name in context, matching the article+noun+adjective
    construction as a known geographic designation. A more literal rendering ('the
    smooth mountain') is possible but less natural in this boundary-summary context.
- source_word: הָעֹלֶה
  chosen: which rises
  alternatives:
  - that goes up
  - ascending
  lexicon: HALOT
  rationale: The participle of עלה describes the mountain's upward extension or ascent.
    'Which rises' is idiomatic English while preserving the topographical sense.
- source_word: שֵׂעִיר
  chosen: Seir
  lexicon: HALOT
  rationale: Standard transliteration of the place name, per the translation philosophy
    of transliterating names.
- source_word: וְעַד
  chosen: as far as
  alternatives:
  - and as far as
  - to
  lexicon: HALOT
  rationale: Marks the extent of the conquered territory. 'As far as' clearly conveys
    the boundary sense in English.
- source_word: בַּעַל גָּד
  chosen: Baal-gad
  lexicon: HALOT
  rationale: Rendered as a transliterated place name rather than translated, since
    it functions here as a geographic designation.
- source_word: בְּבִקְעַת הַלְּבָנוֹן
  chosen: in the Valley of Lebanon
  alternatives:
  - in the plain of Lebanon
  - in the valley of Lebanon
  lexicon: HALOT
  rationale: בִּקְעָה denotes a broad valley/plain. 'Valley' is the most natural English
    choice here and fits the topographical setting.
- source_word: תַּחַת הַר חֶרְמוֹן
  chosen: below Mount Hermon
  alternatives:
  - under Mount Hermon
  - at the foot of Mount Hermon
  lexicon: HALOT
  rationale: תַּחַת in geographic description commonly indicates a lower position
    relative to a landmark. 'Below' is concise and natural.
- source_word: וְאֵת כָּל מַלְכֵיהֶם
  chosen: And he captured all their kings
  alternatives:
  - and all their kings he captured
  lexicon: HALOT
  rationale: The direct-object marker plus noun phrase introduces the next clause's
    object. English requires reordering for natural syntax while preserving emphasis
    on the totality ('all').
- source_word: לָכַד
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: A standard military verb for taking persons or cities. 'Captured' best
    fits the object 'kings'.
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - defeated them
  - smote them
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite'). 'Struck them down' preserves the violent
    action without archaic diction. It also distinguishes this verb from the following
    explicit killing verb.
- source_word: וַיְמִיתֵם
  chosen: put them to death
  alternatives:
  - killed them
  lexicon: HALOT
  rationale: The causative form of מות is explicit about causing death. 'Put them
    to death' preserves the formal, judicial-sounding finality and avoids collapsing
    it into the previous verb.
