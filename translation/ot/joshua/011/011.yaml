id: JOS.11.11
reference: Joshua 11:11
source:
  edition: WLC
  text: וַ֠/יַּכּוּ אֶת כָּל הַ/נֶּ֨פֶשׁ אֲשֶׁר בָּ֤/הּ לְ/פִי חֶ֨רֶב֙ הַֽחֲרֵ֔ם לֹ֥א
    נוֹתַ֖ר כָּל נְשָׁמָ֑ה וְ/אֶת חָצ֖וֹר שָׂרַ֥ף בָּ/אֵֽשׁ־־־־־־׃
translation:
  text: They struck down every person who was in it with the edge of the sword, devoting
    them to destruction; not a single breathing thing was left, and he burned Hazor
    with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'putting them under the ban.' The Hebrew uses חרם language, denoting
      devotion to destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'not any breath remained,' an idiom meaning that no survivor was
      left.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from plural ('they struck down') to singular ('he burned'),
      likely referring specifically to Joshua in the final clause.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: They struck down
  alternatives:
  - they struck
  - they killed
  lexicon: HALOT
  rationale: The Hifil wayyiqtol of נכה commonly denotes striking down in battle.
    'Struck down' preserves the military sense without flattening it to a mere blow,
    while avoiding over-interpretive expansion.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person who was in it
  alternatives:
  - every soul that was in it
  - everyone in it
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to living persons in the city, not the immaterial
    soul as such. 'Every person' communicates the referent clearly in modern English
    while remaining faithful to the collective singular construction.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'With the edge of the sword' is the
    established idiomatic equivalent in English and preserves the vividness better
    than the more wooden 'mouth of the sword.'
- source_word: הַחֲרֵם
  chosen: devoting them to destruction
  alternatives:
  - utterly destroying them
  - putting them under the ban
  lexicon: HALOT
  rationale: The infinitive absolute of חרם intensifies and specifies the action as
    placing under ḥerem. 'Devoting them to destruction' preserves the covenant-war
    concept better than a generic 'utterly destroying,' while remaining understandable;
    'under the ban' is more technical and less accessible.
- source_word: לֹא נוֹתַר כָּל נְשָׁמָה
  chosen: not a single breathing thing was left
  alternatives:
  - no breath was left
  - not any living thing remained
  - no one breathing remained
  lexicon: HALOT
  rationale: נְשָׁמָה literally relates to breath/breathing. 'Not a single breathing
    thing was left' reflects the idiom's emphasis on the absence of survivors. It
    is broader than 'person' and matches the Hebrew expression more closely than a
    purely interpretive paraphrase.
- source_word: חָצוֹר
  chosen: Hazor
  rationale: Proper place name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: שָׂרַף בָּאֵשׁ
  chosen: he burned Hazor with fire
  alternatives:
  - he burned Hazor
  - he set Hazor on fire
  lexicon: HALOT
  rationale: The singular verb likely has Joshua as its subject. 'Burned Hazor with
    fire' preserves the Hebrew collocation and its emphatic explicitness better than
    the smoother but less formal 'set Hazor on fire.'
