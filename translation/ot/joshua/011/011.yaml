theological_decisions:
- issue: Rendering חרם in a conquest context
  chosen_reading: devoting them to destruction
  alternative_readings:
  - utterly destroying them
  - putting them under the ban
  rationale: The verse uses חרם language that carries covenantal and judicial overtones
    beyond mere military killing. The chosen rendering preserves that theological
    weight without importing later doctrinal claims or obscuring the severity of the
    text.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Subject shift from plural to singular
  chosen_reading: They struck down ... and he burned Hazor with fire
  alternative_readings:
  - They struck down ... and they burned Hazor with fire
  rationale: The Hebrew shifts from plural ויכו to singular שרף. Preserving the shift
    is more textually transparent and likely reflects Joshua as the singular subject
    of the final clause. The translation keeps the shift rather than smoothing it
    away.
  doctrine_reference: Translation philosophy §1, §5
