id: JOS.11.4
reference: Joshua 11:4
source:
  edition: WLC
  text: וַ/יֵּצְא֣וּ הֵ֗ם וְ/כָל מַֽחֲנֵי/הֶם֙ עִמָּ֔/ם עַם רָ֕ב כַּ/ח֛וֹל אֲשֶׁ֥ר
    עַל שְׂפַת הַ/יָּ֖ם לָ/רֹ֑ב וְ/ס֥וּס וָ/רֶ֖כֶב רַב מְאֹֽד־־־־־׃
translation:
  text: They came out, they and all their camps with them, a great people, as numerous
    as the sand that is on the seashore, with very many horses and chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their armies'; Hebrew 'their camps' can refer to military encampments
      and, by extension, the forces assembled in them.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a great people'; the phrase refers to a very large multitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: They came out
  alternatives:
  - They went out
  - They marched out
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form denotes movement outward.
    'Came out' is a natural English narrative rendering and preserves the basic motion
    without adding military nuance beyond the context.
- source_word: מַחֲנֵיהֶם
  chosen: their camps
  alternatives:
  - their armies
  - their encampments
  lexicon: HALOT
  rationale: מַחֲנֶה can denote camp, encampment, or army. Here the plural with 'with
    them' points to the assembled military camps/forces accompanying the kings. 'Camps'
    stays closer to the Hebrew image while still implying military forces in context.
- source_word: עַם רָב
  chosen: a great people
  alternatives:
  - a great multitude
  - a numerous people
  lexicon: HALOT
  rationale: עַם literally means 'people,' and רָב marks great size. 'A great people'
    preserves the collective noun rather than flattening it immediately to 'multitude,'
    while the following simile clarifies the sense of numerical vastness.
- source_word: כַּחוֹל אֲשֶׁר עַל שְׂפַת הַיָּם
  chosen: as numerous as the sand that is on the seashore
  alternatives:
  - like the sand on the seashore
  - as the sand on the shore of the sea
  lexicon: HALOT
  rationale: This is a standard Hebrew simile for innumerability. 'As numerous as'
    makes the comparison explicit in idiomatic English while retaining the concrete
    image of sand on the seashore.
- source_word: לָרֹב
  chosen: as numerous
  alternatives:
  - for abundance
  - in great number
  lexicon: HALOT
  rationale: 'The phrase functions adverbially, explaining the point of the sand comparison:
    abundance or vast number. Rendering it within ''as numerous as'' avoids awkward
    literalism while preserving the semantic force.'
- source_word: סוּס
  chosen: horses
  alternatives:
  - horse
  lexicon: HALOT
  rationale: Though singular in Hebrew, it is a collective singular. English idiom
    prefers the plural 'horses' in a military inventory.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  - chariot force
  lexicon: HALOT
  rationale: רֶכֶב often denotes chariots or chariot forces. 'Chariots' is the clearest
    and most natural rendering here, with the military sense supplied by context.
- source_word: רַב מְאֹד
  chosen: very many
  alternatives:
  - in great abundance
  - exceedingly many
  lexicon: HALOT
  rationale: The phrase intensifies the quantity of horses and chariots. 'Very many'
    is readable modern English and preserves the emphatic abundance without sounding
    archaic.
