id: JOS.11.13
reference: Joshua 11:13
source:
  edition: WLC
  text: רַ֣ק כָּל הֶ/עָרִ֗ים הָ/עֹֽמְדוֹת֙ עַל תִּלָּ֔/ם לֹ֥א שְׂרָפָ֖/ם יִשְׂרָאֵ֑ל
    זוּלָתִ֛י אֶת חָצ֥וֹר לְ/בַדָּ֖/הּ שָׂרַ֥ף יְהוֹשֻֽׁעַ־־־׃
translation:
  text: But Israel did not burn any of the cities that stood on their mounds, except
    Hazor alone; Joshua burned it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that stood on their tells'—that is, on settlement mounds formed by successive
      layers of habitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: But
  alternatives:
  - Only
  - However
  lexicon: HALOT
  rationale: Introduces an exception/contrast with the preceding narrative. 'But'
    reads naturally in English while preserving the adversative force better than
    a bare 'only' at the head of the sentence.
- source_word: כָּל הֶעָרִים
  chosen: any of the cities
  alternatives:
  - all the cities
  - all of the cities
  lexicon: HALOT
  rationale: With the following negation ('did not burn'), idiomatic English prefers
    'did not burn any of the cities' rather than the more wooden 'did not burn all
    the cities.' This preserves the distributive sense under negation.
- source_word: הָעֹמְדוֹת עַל תִּלָּם
  chosen: that stood on their mounds
  alternatives:
  - that stood on their tells
  - that stood on their heaps
  lexicon: HALOT
  rationale: The phrase refers to cities remaining on their settlement mounds. 'Mounds'
    is more accessible modern English than the archaeological loanword 'tells,' while
    still conveying the topographical sense. 'Stood' preserves the participial imagery.
- source_word: לֹא שְׂרָפָם יִשְׂרָאֵל
  chosen: Israel did not burn
  alternatives:
  - Israel did not burn them
  - Israel burned them not
  lexicon: HALOT
  rationale: English requires a smoother clause order than the Hebrew. The object
    is already represented by 'any of the cities,' so repeating 'them' is unnecessary.
- source_word: זוּלָתִי
  chosen: except
  alternatives:
  - besides
  - apart from
  lexicon: HALOT
  rationale: Marks the sole exception straightforwardly in contemporary English.
- source_word: לְבַדָּהּ
  chosen: alone
  alternatives:
  - by itself
  - only
  lexicon: HALOT
  rationale: Emphasizes Hazor as the single exception. 'Alone' is concise and idiomatic
    after the proper name.
- source_word: שָׂרַף יְהוֹשֻׁעַ
  chosen: Joshua burned it
  alternatives:
  - Joshua burned
  - Joshua set on fire
  lexicon: HALOT
  rationale: The verb is repeated for emphasis in Hebrew; English naturally supplies
    the object pronoun referring back to Hazor. 'Burned' is the plain equivalent without
    unnecessary expansion.
- source_word: חָצוֹר
  chosen: Hazor
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy for names.
