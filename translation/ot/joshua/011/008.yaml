id: JOS.11.8
reference: Joshua 11:8
source:
  edition: WLC
  text: וַ/יִּתְּנֵ֨/ם יְהוָ֥ה בְּ/יַֽד יִשְׂרָאֵל֮ וַ/יַּכּוּ/ם֒ וַֽ/יִּרְדְּפ֞וּ/ם
    עַד צִיד֣וֹן רַבָּ֗ה וְ/עַד֙ מִשְׂרְפ֣וֹת מַ֔יִם וְ/עַד בִּקְעַ֥ת מִצְפֶּ֖ה מִזְרָ֑חָ/ה
    וַ/יַּכֻּ֕/ם עַד בִּלְתִּ֥י הִשְׁאִֽיר לָ/הֶ֖ם שָׂרִֽיד־־־־־׃
translation:
  text: And the LORD gave them into the hand of Israel, and they struck them down
    and pursued them as far as Great Sidon and as far as Misrephoth-maim and as far
    as the Valley of Mizpeh to the east; and they struck them down until he had left
    them no survivor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Misrephoth-maim is a place name; the Hebrew may mean 'burnings of waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until they had left them no survivor'; the Hebrew verb is singular,
      but the sense may be collective.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנֵם
  chosen: gave them
  alternatives:
  - delivered them
  - handed them over
  lexicon: HALOT
  rationale: נתן with object suffix in military context commonly means to give/deliver
    an enemy into another's power. 'Gave them' is concise and preserves the idiom
    when followed by 'into the hand of.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: ביד ישראל
  chosen: into the hand of Israel
  alternatives:
  - into Israel's hand
  - into the power of Israel
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for delivering someone into another's
    power. Retaining 'hand' preserves the source imagery while remaining natural in
    English.
- source_word: וַיַּכּוּם
  chosen: they struck them down
  alternatives:
  - they defeated them
  - they attacked them
  lexicon: HALOT
  rationale: נכה in battle contexts often denotes striking/defeating, frequently with
    lethal force. 'Struck them down' preserves the physical and martial force better
    than the more general 'defeated.'
- source_word: וַיִּרְדְּפוּם
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף is the standard verb for pursuing an enemy. 'Pursued' is the most
    direct and contextually appropriate rendering.
- source_word: צידון רבה
  chosen: Great Sidon
  alternatives:
  - Sidon the Great
  - greater Sidon
  lexicon: HALOT
  rationale: The adjective רבה here qualifies the city name. 'Great Sidon' is the
    conventional and most natural English rendering.
- source_word: משרפות מים
  chosen: Misrephoth-maim
  alternatives:
  - burnings of waters
  - hot springs
  lexicon: HALOT
  rationale: This appears to be a place name. Following the translation philosophy
    to transliterate names, the toponym is kept as 'Misrephoth-maim.' A lexical alternative
    is worth preserving in a footnote because the name may reflect an underlying meaning.
- source_word: בקעת מצפה
  chosen: the Valley of Mizpeh
  alternatives:
  - the plain of Mizpeh
  lexicon: HALOT
  rationale: בקעה denotes a valley plain or broad valley. 'Valley' is the clearest
    natural rendering here, while preserving Mizpeh as a place name by transliteration.
- source_word: מזרחה
  chosen: to the east
  alternatives:
  - eastward
  - on the east
  lexicon: HALOT
  rationale: 'The directional form is most naturally rendered adverbially here: ''to
    the east.'''
- source_word: וַיַּכֻּם
  chosen: they struck them down
  alternatives:
  - they defeated them
  lexicon: HALOT
  rationale: The repeated verb נכה is rendered consistently with the earlier occurrence
    in the verse.
- source_word: עד בלתי השאיר להם שריד
  chosen: until he had left them no survivor
  alternatives:
  - until they left them no survivor
  - until no survivor was left to them
  - until he left them no remnant
  lexicon: HALOT
  rationale: The infinitive construction with השאיר plus שריד means leaving no surviving
    remnant. The verb form is morphologically singular, so 'he had left' most closely
    follows the Hebrew form, likely referring back to Israel collectively or to Joshua
    as representative. 'No survivor' is more idiomatic in English here than 'no remnant,'
    which can sound more abstract.
