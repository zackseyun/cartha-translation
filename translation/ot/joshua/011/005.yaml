id: JOS.11.5
reference: Joshua 11:5
source:
  edition: WLC
  text: וַ/יִּוָּ֣עֲד֔וּ כֹּ֖ל הַ/מְּלָכִ֣ים הָ/אֵ֑לֶּה וַ/יָּבֹ֜אוּ וַ/יַּחֲנ֤וּ
    יַחְדָּו֙ אֶל מֵ֣י מֵר֔וֹם לְ/הִלָּחֵ֖ם עִם יִשְׂרָאֵֽל־־׃פ
translation:
  text: All these kings agreed together, and they came and encamped together at the
    waters of Merom to fight against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled by agreement' or 'met together'; the Hebrew verb suggests
      a coordinated gathering, not merely a chance meeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעֲדוּ
  chosen: agreed together
  alternatives:
  - assembled by agreement
  - appointed themselves together
  - met together
  lexicon: HALOT
  rationale: The Niphal of יעד here conveys coming together by prior arrangement or
    mutual agreement, not merely accidental gathering. 'Agreed together' captures
    the coordinated alliance implied in context. 'Met together' is possible but weaker;
    'assembled by agreement' is more formal but less natural English.
- source_word: כֹּל הַמְּלָכִים הָאֵלֶּה
  chosen: all these kings
  alternatives:
  - all those kings
  lexicon: HALOT
  rationale: A straightforward rendering preserving the demonstrative force of הָאֵלֶּה.
    'These' fits the immediate narrative reference better than 'those.'
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: Common narrative verb בוא is best rendered simply as 'came' in sequence
    with the following action.
- source_word: וַיַּחֲנוּ
  chosen: encamped
  alternatives:
  - camped
  lexicon: HALOT
  rationale: From חנה, the standard military/narrative sense is to pitch camp or encamp.
    'Encamped' preserves the military setting and reads naturally.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: The adverb emphasizes unified action. Rendering it as 'together' preserves
    the repeated stress on coalition unity in both agreeing and encamping.
- source_word: אֶל מֵי מֵרוֹם
  chosen: at the waters of Merom
  alternatives:
  - by the waters of Merom
  - to the waters of Merom
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' English idiom with encamping favors a
    locative expression. 'At the waters of Merom' best reflects the destination as
    the place where they camped. 'Waters' is retained rather than 'lake' because the
    Hebrew uses the plural construct of מים.
- source_word: לְהִלָּחֵם עִם יִשְׂרָאֵל
  chosen: to fight against Israel
  alternatives:
  - to wage war with Israel
  - to battle Israel
  lexicon: HALOT
  rationale: The infinitive of לחם with עִם in military context means to fight against/in
    battle with. In English, 'fight against Israel' makes the adversarial sense explicit
    and natural.
