id: JOS.11.15
reference: Joshua 11:15
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ אֶת מֹשֶׁ֣ה עַבְדּ֔/וֹ כֵּן צִוָּ֥ה מֹשֶׁ֖ה אֶת
    יְהוֹשֻׁ֑עַ וְ/כֵן֙ עָשָׂ֣ה יְהוֹשֻׁ֔עַ לֹֽא הֵסִ֣יר דָּבָ֔ר מִ/כֹּ֛ל אֲשֶׁר צִוָּ֥ה
    יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־־׃
translation:
  text: Just as the LORD had commanded Moses his servant, so Moses commanded Joshua,
    and so Joshua did. He left nothing undone of all that the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He omitted nothing from all that the LORD had commanded Moses.' The
      Hebrew idiom is literally, 'he did not remove a thing from all that the LORD
      had commanded Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces a comparison between the LORD's command to Moses and Moses'
    command to Joshua. 'Just as' clearly signals the correspondence in natural English.
- source_word: צִוָּה
  chosen: had commanded / commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The verb denotes authoritative command. 'Commanded' preserves the formal
    authority chain in the verse. The first instance is rendered 'had commanded' to
    reflect prior action relative to Moses' command to Joshua.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this honorific covenantal context
    for Moses, 'servant' is the most natural and established sense without foregrounding
    bonded status.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Marks correspondence and sequence. 'So' is concise and idiomatic in English,
    and the repeated use preserves the Hebrew pattern.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - acted
  - carried it out
  lexicon: HALOT
  rationale: The verb is broad and here refers to Joshua's obedience in action. 'Did'
    preserves the terseness of the Hebrew and lets the following clause specify the
    extent of obedience.
- source_word: לֹא הֵסִיר דָּבָר
  chosen: He left nothing undone
  alternatives:
  - He did not remove a thing
  - He omitted nothing
  - He did not turn aside from anything
  lexicon: HALOT
  rationale: The idiom literally involves not removing a word/thing from all that
    was commanded, conveying complete obedience. 'He left nothing undone' communicates
    the idiomatic sense naturally in English better than a wooden 'did not remove
    a thing.'
- source_word: דָּבָר
  chosen: nothing
  alternatives:
  - thing
  - word
  - matter
  lexicon: HALOT
  rationale: In the idiom with הֵסִיר and מִכֹּל, דָּבָר refers to any part of what
    was commanded. English expresses this most naturally as 'nothing' in the negative
    construction.
- source_word: מִכֹּל אֲשֶׁר
  chosen: of all that
  alternatives:
  - from all that
  - from everything that
  lexicon: HALOT
  rationale: This phrase specifies the totality of the commanded matters. 'Of all
    that' fits the English idiom following 'left nothing undone.'
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent.
