id: JOS.11.10
reference: Joshua 11:10
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב יְהוֹשֻׁ֜עַ בָּ/עֵ֤ת הַ/הִיא֙ וַ/יִּלְכֹּ֣ד אֶת חָצ֔וֹר וְ/אֶת
    מַלְכָּ֖/הּ הִכָּ֣ה בֶ/חָ֑רֶב כִּֽי חָצ֣וֹר לְ/פָנִ֔ים הִ֕יא רֹ֖אשׁ כָּל הַ/מַּמְלָכ֥וֹת
    הָ/אֵֽלֶּה־־־־׃
translation:
  text: At that time Joshua turned back and captured Hazor, and he struck its king
    with the sword, for formerly Hazor was the head of all these kingdoms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned.' The Hebrew verb can be rendered either way; 'turned back'
      was chosen to preserve the directional nuance of the campaign movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'was chief over all these kingdoms.' The Hebrew literally says 'was the
      head of all these kingdoms,' using a metaphor for primacy.
    reason: lexical_alternative
  - marker: c
    text: '''Struck ... with the sword'' is a restrained rendering of the Hebrew.
      In context the phrase likely implies killing, but the verb itself is literally
      ''struck.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: turned back
  alternatives:
  - returned
  lexicon: HALOT
  rationale: From שוב, here indicating a movement back or return in the course of
    the campaign. 'Turned back' preserves the directional nuance more clearly than
    the more generic 'returned.'
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that time period
  - At that moment
  lexicon: HALOT
  rationale: A standard temporal expression. 'At that time' is idiomatic and sufficiently
    formal without over-pressing the phrase into a narrower instant than the Hebrew
    requires.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: From לכד, commonly used for taking a city. 'Captured' is natural modern
    English and fits a military context well.
- source_word: חָצוֹר
  chosen: Hazor
  rationale: 'Proper name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: מַלְכָּהּ
  chosen: its king
  alternatives:
  - her king
  - the king of it
  lexicon: HALOT
  rationale: The 3fs suffix refers back to the city Hazor, which is grammatically
    feminine in Hebrew. English idiom for a city is 'its king,' not 'her king.'
- source_word: הִכָּה בֶחָרֶב
  chosen: struck its king with the sword
  alternatives:
  - put its king to the sword
  - killed its king with the sword
  lexicon: HALOT
  rationale: נכה literally means 'strike/smite.' Since the immediate clause states
    the act without explicitly using the verb 'kill,' 'struck ... with the sword'
    is the more textually restrained rendering. The broader context implies death,
    but the translation avoids importing that into this verb unnecessarily.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason for Hazor's significance.
    'For' preserves the explanatory force in a concise literary register.
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - before
  - previously
  - in former times
  lexicon: HALOT
  rationale: The term points to an earlier state of affairs. 'Formerly' is concise
    and idiomatic in English.
- source_word: רֹאשׁ
  chosen: the head
  alternatives:
  - chief
  - leader
  lexicon: HALOT
  rationale: Literally 'head.' In context it denotes primacy or chief status among
    the kingdoms. Retaining 'head' preserves the metaphor present in the Hebrew while
    remaining understandable.
- source_word: כָּל הַמַּמְלָכוֹת הָאֵלֶּה
  chosen: all these kingdoms
  alternatives:
  - all of these kingdoms
  lexicon: HALOT
  rationale: A straightforward rendering of the quantified noun phrase. 'All these
    kingdoms' is natural English and preserves the demonstrative force.
