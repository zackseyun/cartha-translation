id: JOS.11.19
reference: Joshua 11:19
source:
  edition: WLC
  text: לֹֽא הָיְתָ֣ה עִ֗יר אֲשֶׁ֤ר הִשְׁלִ֨ימָה֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל בִּלְתִּ֥י
    הַ/חִוִּ֖י יֹשְׁבֵ֣י גִבְע֑וֹן אֶת הַ/כֹּ֖ל לָקְח֥וּ בַ/מִּלְחָמָֽה־־־׃
translation:
  text: There was not a city that made peace with the sons of Israel, except the Hivites
    living in Gibeon; they took all of them in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made peace with the Israelites.' The Hebrew more literally says 'the
      sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'captured all in war.' The Hebrew says literally, 'they took all in battle/war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁלִימָה
  chosen: made peace
  alternatives:
  - made peace with
  - submitted to
  - surrendered to
  - came to terms with
  lexicon: HALOT
  rationale: From שׁלם in the Hiphil, here meaning to enter into peaceful relations
    or make peace. 'Made peace' best captures the diplomatic sense in context and
    aligns with the Gibeonite treaty narrative, without over-specifying as 'surrendered.'
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with הִשְׁלִים in this context English
    idiom requires 'made peace with' rather than 'made peace to.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Retains the formal covenantal/national expression of the Hebrew while
    remaining natural English. 'Israelites' is possible, but 'sons of Israel' more
    closely reflects the source and the project's gender-accurate principle.
- source_word: בִּלְתִּי
  chosen: except
  alternatives:
  - besides
  - unless
  lexicon: HALOT
  rationale: Introduces the sole exception to the preceding negation. 'Except' is
    the clearest modern English rendering here.
- source_word: הַחִוִּי יֹשְׁבֵי גִבְעוֹן
  chosen: the Hivites living in Gibeon
  alternatives:
  - the Hivites, inhabitants of Gibeon
  - the Hivites who dwelt in Gibeon
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial form meaning 'those dwelling/living.' 'Living
    in Gibeon' is readable modern English while preserving the participial sense.
- source_word: אֶת הַכֹּל
  chosen: all of them
  alternatives:
  - all
  - the whole
  lexicon: HALOT
  rationale: The object marker plus הַכֹּל refers to the totality of the cities/peoples
    in view. 'All of them' makes the implied object explicit in natural English.
- source_word: לָקְחוּ
  chosen: they took
  alternatives:
  - they captured
  - they seized
  lexicon: HALOT
  rationale: לקח is broadly 'take.' In military context 'captured' is interpretive;
    'took' preserves the Hebrew's wording while still fitting the context.
- source_word: בַמִּלְחָמָה
  chosen: in battle
  alternatives:
  - by war
  - in war
  lexicon: HALOT
  rationale: A concise idiomatic rendering of the military circumstance. 'In battle'
    is more natural than 'in war' while preserving the sense that these cities were
    taken through warfare.
