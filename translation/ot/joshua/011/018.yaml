id: JOS.11.18
reference: Joshua 11:18
source:
  edition: WLC
  text: יָמִ֣ים רַבִּ֗ים עָשָׂ֧ה יְהוֹשֻׁ֛עַ אֶת כָּל הַ/מְּלָכִ֥ים הָ/אֵ֖לֶּה מִלְחָמָֽה־־׃
translation:
  text: Joshua made war against all these kings for many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Joshua waged war against all these kings for a long time.' The Hebrew
      literally says 'many days' and uses the idiom 'made war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - a long time
  - many days
  lexicon: HALOT
  rationale: The phrase literally means 'many days' and idiomatically denotes an extended
    period. 'For many days' preserves the Hebrew wording while remaining natural in
    English.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - waged
  - conducted
  lexicon: HALOT
  rationale: The verb is the common 'do/make.' In the collocation עשה מלחמה, English
    idiom is best represented by 'made war,' which stays close to the Hebrew while
    conveying the established sense.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: אֶת כָּל הַמְּלָכִים הָאֵלֶּה
  chosen: against all these kings
  alternatives:
  - with all these kings
  - all these kings
  lexicon: HALOT
  rationale: The direct-object marker plus 'all these kings' is governed by the idiom
    'make war with/against.' English requires a preposition; 'against' best fits the
    hostile sense in context.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: The noun means 'war/battle.' In the idiom with עשה, 'make war' is the
    most transparent and formally faithful rendering.
