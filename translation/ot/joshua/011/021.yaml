id: JOS.11.21
reference: Joshua 11:21
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יְהוֹשֻׁ֜עַ בָּ/עֵ֣ת הַ/הִ֗יא וַ/יַּכְרֵ֤ת אֶת הָֽ/עֲנָקִים֙ מִן
    הָ/הָ֤ר מִן חֶבְרוֹן֙ מִן דְּבִ֣ר מִן עֲנָ֔ב וּ/מִ/כֹּל֙ הַ֣ר יְהוּדָ֔ה וּ/מִ/כֹּ֖ל
    הַ֣ר יִשְׂרָאֵ֑ל עִם עָרֵי/הֶ֖ם הֶחֱרִימָ֥/ם יְהוֹשֻֽׁעַ־־־־־־׃
translation:
  text: At that time Joshua came and cut off the Anakim from the hill country—from
    Hebron, from Debir, from Anab, and from all the hill country of Judah and from
    all the hill country of Israel. Joshua devoted them to destruction, together with
    their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'put them under the ban.' The Hebrew verb carries the
      sense of devoting persons or things to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא in wayyiqtol commonly advances narrative with 'came' or
    'went' depending on viewpoint. 'Came' is idiomatic in English narrative here and
    matches the sense of Joshua's arrival/action at that time.
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that season
  lexicon: HALOT
  rationale: A standard temporal expression. 'At that time' is natural modern English
    and preserves the narrative linkage without overinterpreting duration.
- source_word: וַיַּכְרֵת
  chosen: cut off
  alternatives:
  - cut down
  - eliminated
  - destroyed
  lexicon: HALOT
  rationale: כרת literally means 'cut off.' Here it refers to removing/exterminating
    a people group from the region. 'Cut off' preserves the Hebrew idiom and leaves
    the following החרים clause to express the stronger ban/destruction concept.
- source_word: הָעֲנָקִים
  chosen: the Anakim
  alternatives:
  - the Anakites
  lexicon: HALOT
  rationale: A people-group name derived from ענק. 'Anakim' is the conventional transliteration
    and fits the philosophy of transliterating names rather than translating them.
- source_word: מִן הָהָר
  chosen: from the hill country
  alternatives:
  - from the mountain region
  - from the mountains
  lexicon: HALOT
  rationale: הָהָר in Joshua often denotes the highland region rather than a single
    mountain. 'Hill country' is the established and accurate regional sense in readable
    English.
- source_word: מִן חֶבְרוֹן מִן דְּבִר מִן עֲנָב
  chosen: from Hebron, from Debir, from Anab
  lexicon: HALOT
  rationale: These are place names and are transliterated. Repeating 'from' reflects
    the Hebrew list structure and emphasizes the locations from which the Anakim were
    removed.
- source_word: וּמִכֹּל הַר יְהוּדָה
  chosen: and from all the hill country of Judah
  alternatives:
  - and from all the mountains of Judah
  lexicon: HALOT
  rationale: כֹּל plus הַר יְהוּדָה refers to the whole highland region associated
    with Judah. 'Hill country' best captures the geographic sense.
- source_word: וּמִכֹּל הַר יִשְׂרָאֵל
  chosen: and from all the hill country of Israel
  alternatives:
  - and from all the hill country of the Israelites
  lexicon: HALOT
  rationale: Likely a regional designation contrasting with Judah, probably the northern
    highlands. 'Israel' is retained as the proper geographic-political name rather
    than expanded interpretively.
- source_word: עִם עָרֵיהֶם
  chosen: together with their cities
  alternatives:
  - along with their towns
  lexicon: HALOT
  rationale: עִם marks accompaniment. עָרִים can be 'cities' or 'towns'; 'cities'
    is a standard rendering in conquest narratives and preserves the formal register.
- source_word: הֶחֱרִימָם
  chosen: devoted them to destruction
  alternatives:
  - utterly destroyed them
  - put them under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing under the ban, devoting to destruction.
    'Devoted them to destruction' preserves the technical covenant-war sense better
    than the flatter 'destroyed,' while remaining accessible. Because 'under the ban'
    may be opaque to modern readers, it is preserved as a footnote alternative.
