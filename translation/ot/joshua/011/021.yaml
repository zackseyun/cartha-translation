theological_decisions:
- issue: Rendering of חרם warfare terminology
  chosen_reading: Joshua devoted them to destruction
  alternative_readings:
  - Joshua put them under the ban
  - Joshua utterly destroyed them
  rationale: The verse uses both כרת ('cut off') and חרם, so the English should distinguish
    them. 'Devoted to destruction' preserves the specific theological-ritual force
    of חרם without importing extra doctrinal explanation into the main text. A footnote
    preserves the more formal idiom 'under the ban.'
  doctrine_reference: Translation philosophy §§1, 5, 6
