id: JOS.11.9
reference: Joshua 11:9
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ לָ/הֶם֙ יְהוֹשֻׁ֔עַ כַּ/אֲשֶׁ֥ר אָֽמַר ל֖/וֹ יְהוָ֑ה אֶת סוּסֵי/הֶ֣ם
    עִקֵּ֔ר וְ/אֶת מַרְכְּבֹתֵי/הֶ֖ם שָׂרַ֥ף בָּ/אֵֽשׁ־־־׃ס
translation:
  text: 'And Joshua did to them just as the LORD had told him: he hamstrung their
    horses and burned their chariots with fire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crippled their horses'; the Hebrew more specifically refers to hamstringing
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לָהֶם
  chosen: did to them
  alternatives:
  - dealt with them
  - did for them
  lexicon: HALOT
  rationale: The idiom with עשה + ל conveys acting toward them, not benefiting them.
    'Did to them' preserves the straightforward Hebrew sense in context of military
    action.
- source_word: כַּאֲשֶׁר אָמַר לוֹ
  chosen: just as ... had told him
  alternatives:
  - as ... had said to him
  - according to what ... said to him
  lexicon: HALOT
  rationale: '''Just as'' captures the comparative force of כַּאֲשֶׁר. The pluperfect
    ''had told'' fits English narrative sequence after prior divine instruction.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: סוּסֵיהֶם
  chosen: their horses
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for horses.
- source_word: עִקֵּר
  chosen: hamstrung
  alternatives:
  - crippled
  - houghed
  lexicon: HALOT
  rationale: The verb refers specifically to disabling animals by cutting the leg
    tendons. 'Hamstrung' is precise and readable modern English; 'houghed' is traditional
    but archaic, while 'crippled' is too general.
- source_word: מַרְכְּבֹתֵיהֶם
  chosen: their chariots
  lexicon: HALOT
  rationale: Standard rendering of the noun for chariots.
- source_word: שָׂרַף בָּאֵשׁ
  chosen: burned ... with fire
  alternatives:
  - burned up
  - set ... on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with fire'; retaining it preserves the
    source wording and emphasis rather than reducing it to the simpler English verb
    alone.
