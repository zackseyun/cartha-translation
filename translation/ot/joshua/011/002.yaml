id: JOS.11.2
reference: Joshua 11:2
source:
  edition: WLC
  text: וְֽ/אֶל הַ/מְּלָכִ֞ים אֲשֶׁ֣ר מִ/צְּפ֗וֹן בָּ/הָ֧ר וּ/בָ/עֲרָבָ֛ה נֶ֥גֶב כִּֽנֲר֖וֹת
    וּ/בַ/שְּׁפֵלָ֑ה וּ/בְ/נָפ֥וֹת דּ֖וֹר מִ/יָּֽם־׃
translation:
  text: and to the kings who were in the north, in the hill country, in the Arabah
    south of Kinneroth, in the lowland, and on the heights of Dor on the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the districts of Dor,' 'in the region of Dor,' or 'on the slopes
      of Dor.' The Hebrew term is uncommon and its precise topographical sense is
      debated.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the sea'; in Hebrew geographic usage this commonly means
      'on the west.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - to
  lexicon: HALOT
  rationale: 'The conjunction plus preposition continues the list from the previous
    verse and marks these rulers as additional recipients of the summons: ''and to.'''
- source_word: הַמְּלָכִים
  chosen: the kings
  alternatives:
  - the rulers
  lexicon: HALOT
  rationale: מֶלֶךְ straightforwardly denotes kings; 'rulers' is broader and less
    precise than the Hebrew.
- source_word: אֲשֶׁר מִצְּפוֹן
  chosen: who were in the north
  alternatives:
  - who were from the north
  - who were to the north
  lexicon: HALOT
  rationale: The relative clause identifies the geographic region of these kings.
    'In the north' is idiomatic and fits the following sequence of locations.
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountains
  - in the hill country region
  lexicon: HALOT
  rationale: הַר can mean mountain/hill country; in Joshua's territorial descriptions,
    'hill country' best captures the regional/topographical sense rather than isolated
    mountains.
- source_word: וּבָעֲרָבָה
  chosen: in the Arabah
  alternatives:
  - in the plain
  - in the rift valley
  lexicon: HALOT
  rationale: עֲרָבָה is a recognized geographic term. Retaining 'Arabah' preserves
    the proper regional sense better than the generic 'plain.'
- source_word: נֶגֶב כִּנֲרוֹת
  chosen: south of Kinneroth
  alternatives:
  - the Negeb of Kinneroth
  - in the south of Kinneroth
  lexicon: HALOT
  rationale: נֶגֶב here functions directionally/geographically as 'south/south of'
    rather than as the technical region 'Negeb,' since it modifies Kinneroth, a northern
    location. 'South of Kinneroth' is the clearest English rendering.
- source_word: וּבַשְּׁפֵלָה
  chosen: in the lowland
  alternatives:
  - in the Shephelah
  - in the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה denotes the lowland/foothill region. 'Lowland' is readable modern
    English; 'Shephelah' is possible but less transparent for general readers.
- source_word: וּבְנָפוֹת דּוֹר
  chosen: on the heights of Dor
  alternatives:
  - in the districts of Dor
  - in the slopes of Dor
  - in the region of Dor
  lexicon: HALOT
  rationale: נָפָה/נָפוֹת in this context is difficult and variously understood. 'Heights
    of Dor' follows a common contextual understanding of elevated coastal ridges/regions
    associated with Dor, while preserving the topographical flavor. Because the term
    is debated, alternatives are preserved in a footnote.
- source_word: מִיָּם
  chosen: on the west
  alternatives:
  - from the sea
  - by the sea
  - westward
  lexicon: HALOT
  rationale: יָם ('sea') often functions directionally in Hebrew geography to mean
    'west,' since the Mediterranean lay to the west. Here the directional sense best
    fits the list of regions.
