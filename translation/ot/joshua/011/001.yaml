id: JOS.11.1
reference: Joshua 11:1
source:
  edition: WLC
  text: וַ/יְהִ֕י כִּ/שְׁמֹ֖עַ יָבִ֣ין מֶֽלֶךְ חָצ֑וֹר וַ/יִּשְׁלַ֗ח אֶל יוֹבָב֙ מֶ֣לֶךְ
    מָד֔וֹן וְ/אֶל מֶ֥לֶךְ שִׁמְר֖וֹן וְ/אֶל מֶ֥לֶךְ אַכְשָֽׁף־־־־׃
translation:
  text: When Jabin king of Hazor heard of it, he sent to Jobab king of Madon, and
    to the king of Shimron, and to the king of Achshaph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And it happened, when Jabin king of Hazor heard.' The
      Hebrew narrative formula is rendered idiomatically here as 'When ... heard of
      it.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'heard'; 'of it' is implied from the preceding context.
    reason: cross_reference
  - marker: c
    text: Some identify 'Shimron' here with 'Shimron-meron' mentioned in Joshua 12:20.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: When ... heard of it
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The construction wayhi + ki + infinitive construct introduces a new narrative
    circumstance. In idiomatic modern English, 'When ... heard' best captures the
    temporal force without woodenly preserving 'and it happened.' 'of it' is supplied
    because English normally requires an object for 'heard,' and the context in the
    preceding narrative provides the content heard.
- source_word: יָבִין
  chosen: Jabin
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: מֶלֶךְ חָצוֹר
  chosen: king of Hazor
  alternatives:
  - the king of Hazor
  lexicon: HALOT
  rationale: Construct chain straightforwardly rendered as title plus place name.
    The article is not present; English idiom does not require 'the' before the appositional
    royal title in this clause.
- source_word: וַיִּשְׁלַח
  chosen: he sent to
  alternatives:
  - he sent word to
  - he dispatched messengers to
  lexicon: HALOT
  rationale: The verb שׁלח with אֶל commonly means 'send to.' While messengers are
    implied, they are not explicit in the Hebrew, so the simpler 'he sent to' avoids
    adding unwarranted detail.
- source_word: אֶל יוֹבָב
  chosen: to Jobab
  rationale: Preposition plus personal name rendered directly; Jobab is a standard
    transliteration.
- source_word: מֶלֶךְ מָדוֹן
  chosen: king of Madon
  alternatives:
  - the king of Madon
  lexicon: HALOT
  rationale: Construct chain rendered literally and consistently with the surrounding
    royal titles.
- source_word: שִׁמְרוֹן
  chosen: Shimron
  alternatives:
  - Shimron-meron
  lexicon: HALOT
  rationale: The MT here reads 'Shimron.' Some traditions associate the place with
    'Shimron-meron' from Joshua 12:20, but this verse's Hebrew form is simply Shimron,
    so the main text follows the source form.
- source_word: אַכְשָׁף
  chosen: Achshaph
  alternatives:
  - Acshaph
  lexicon: HALOT
  rationale: Place name transliterated in a form that reflects the Hebrew consonants
    and common English usage.
