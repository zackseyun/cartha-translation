id: JOS.11.7
reference: Joshua 11:7
source:
  edition: WLC
  text: וַ/יָּבֹ֣א יְהוֹשֻׁ֡עַ וְ/כָל עַם֩ הַ/מִּלְחָמָ֨ה עִמּ֧/וֹ עֲלֵי/הֶ֛ם עַל
    מֵ֥י מֵר֖וֹם פִּתְאֹ֑ם וַֽ/יִּפְּל֖וּ בָּ/הֶֽם־־׃
translation:
  text: So Joshua, and all the fighting people with him, came against them suddenly
    at the waters of Merom and fell upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of war,' traditionally 'the men of war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - advanced
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly means 'came' or 'went' depending on viewpoint.
    In English narrative, 'came against them' naturally conveys hostile movement toward
    the enemy.
- source_word: עַם הַמִּלְחָמָה
  chosen: the fighting people
  alternatives:
  - the people of war
  - the army
  - the men of war
  lexicon: HALOT
  rationale: Literally 'the people of the war/battle.' 'The fighting people' preserves
    the collective sense of עַם while remaining readable modern English. 'Army' is
    possible but slightly more interpretive; 'men of war' is traditional but adds
    male specificity not explicit in the collective noun here.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix indicating accompaniment.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: With hostile motion verbs, על commonly carries the sense 'against' or
    'upon.' 'Against them' fits English idiom after 'came' and makes the military
    force explicit.
- source_word: עַל מֵי מֵרוֹם
  chosen: at the waters of Merom
  alternatives:
  - by the waters of Merom
  - upon the waters of Merom
  lexicon: HALOT
  rationale: The phrase denotes location near the body of water called Merom. 'At
    the waters of Merom' is idiomatic and sufficiently literal.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - unexpectedly
  lexicon: HALOT
  rationale: Adverb meaning 'suddenly' or 'unexpectedly.' 'Suddenly' is the most direct
    equivalent and preserves the abruptness of the attack.
- source_word: וַיִּפְּלוּ בָּהֶם
  chosen: fell upon them
  alternatives:
  - attacked them
  - fell against them
  lexicon: HALOT
  rationale: נפל with ב can idiomatically mean to fall upon in attack. 'Fell upon
    them' preserves the vivid military idiom better than the flatter 'attacked them.'
- source_word: וְ
  chosen: So
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw continues the narrative. 'So' gives natural English narrative
    flow while preserving sequence; 'And' would also be acceptable but is less idiomatic
    in contemporary English.
