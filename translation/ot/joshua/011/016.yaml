id: JOS.11.16
reference: Joshua 11:16
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח יְהוֹשֻׁ֜עַ אֶת כָּל הָ/אָ֣רֶץ הַ/זֹּ֗את הָ/הָ֤ר וְ/אֶת כָּל הַ/נֶּ֨גֶב֙
    וְ/אֵת֙ כָּל אֶ֣רֶץ הַ/גֹּ֔שֶׁן וְ/אֶת הַ/שְּׁפֵלָ֖ה וְ/אֶת הָ/עֲרָבָ֑ה וְ/אֶת
    הַ֥ר יִשְׂרָאֵ֖ל וּ/שְׁפֵלָתֹֽ/ה־־־־־־־־׃
translation:
  text: 'So Joshua took all this land: the hill country, all the Negev, all the land
    of Goshen, the lowland, the Arabah, the hill country of Israel, and its lowland.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Shephelah' for 'the lowland' (also later in the verse). The Hebrew
      term refers to the low hill region between the central highlands and the coastal
      plain.
    reason: lexical_alternative
  - marker: b
    text: '''The Arabah'' is a regional geographic term; some render it more interpretively
      as ''the Jordan Valley'' or ''the desert plain.'''
    reason: lexical_alternative
  - marker: c
    text: '''The land of Goshen'' here refers to a region in Canaan, not necessarily
      the Goshen in Egypt.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - captured
  - took possession of
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this conquest summary context,
    'took' is the most direct and idiomatic English rendering, leaving the military-possession
    nuance to context without over-specifying it as 'captured' or 'took possession
    of.'
- source_word: כָּל הָאָרֶץ הַזֹּאת
  chosen: all this land
  alternatives:
  - all this הארץ/territory
  - all this country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, territory, or country. 'Land' is the broadest and
    best fits the following list of regions. 'All this land' preserves the demonstrative
    force of הַזֹּאת.
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the mountain region
  - the mountains
  lexicon: HALOT
  rationale: In Joshua, הָהָר commonly denotes the upland/hill-country region rather
    than individual mountains. 'Hill country' is standard, natural English for the
    regional sense.
- source_word: הַנֶּגֶב
  chosen: the Negev
  alternatives:
  - the southland
  - the South
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region or specifically the Negev. Because
    it functions here as a recognized geographic region in a list of named areas,
    'the Negev' is preferable to the more generic 'the southland.'
- source_word: אֶרֶץ הַגֹּשֶׁן
  chosen: the land of Goshen
  alternatives:
  - the territory of Goshen
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly rendered 'the land of Goshen.'
    This likely refers to a southern Canaanite region, not necessarily the Egyptian
    Goshen; the translation preserves the Hebrew wording without importing identification
    into the main text.
- source_word: הַשְּׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה denotes the lowland region, often the Judean foothill zone.
    'The lowland' gives a clear English sense in the main text; the transliterated
    regional term 'Shephelah' is a viable alternative but less immediately accessible.
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the Jordan Valley
  - the rift valley
  - the desert plain
  lexicon: HALOT
  rationale: עֲרָבָה is a geographic term often used as a proper regional designation.
    'The Arabah' preserves the place-name value better than interpretive expansions
    like 'Jordan Valley,' which may be too narrow in some contexts.
- source_word: הַר יִשְׂרָאֵל
  chosen: the hill country of Israel
  alternatives:
  - the mountains of Israel
  lexicon: HALOT
  rationale: As with הָהָר earlier in the verse, the regional sense is best captured
    by 'hill country.' The construct with Israel is naturally rendered 'of Israel.'
- source_word: וּשְׁפֵלָתוֹ
  chosen: and its lowland
  alternatives:
  - and its lowland region
  - and its Shephelah
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to 'the hill country of Israel,'
    yielding 'its lowland.' This preserves the Hebrew pronominal linkage and the paired
    topographical contrast between upland and lowland.
