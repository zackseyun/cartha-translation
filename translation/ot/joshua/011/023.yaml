theological_decisions:
- issue: Scope and force of the conquest summary 'all the land'
  chosen_reading: A summary statement of Joshua's successful taking of the land in
    fulfillment of the LORD's word, without requiring the translation to resolve broader
    interpretive questions about the completeness of conquest narratives.
  alternative_readings:
  - An absolute statement implying every part was fully occupied immediately
  - A hyperbolic victory summary
  rationale: The Hebrew presents a narrative summary. The translation should preserve
    the wording ('all the land') and not import a harmonizing interpretation into
    the main text. This maintains the textual tension with other passages that describe
    remaining areas.
  doctrine_reference: Preserve theological tension rather than resolve it.
