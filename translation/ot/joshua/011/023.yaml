id: JOS.11.23
reference: Joshua 11:23
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח יְהוֹשֻׁ֜עַ אֶת כָּל הָ/אָ֗רֶץ כְּ֠/כֹל אֲשֶׁ֨ר דִּבֶּ֣ר יְהוָה֮
    אֶל מֹשֶׁה֒ וַ/יִּתְּנָ/הּ֩ יְהוֹשֻׁ֨עַ לְ/נַחֲלָ֧ה לְ/יִשְׂרָאֵ֛ל כְּ/מַחְלְקֹתָ֖/ם
    לְ/שִׁבְטֵי/הֶ֑ם וְ/הָ/אָ֥רֶץ שָׁקְטָ֖ה מִ/מִּלְחָמָֽה־־־׃פ
translation:
  text: So Joshua took all the land, according to all that the LORD had spoken to
    Moses, and Joshua gave it as an inheritance to Israel according to their divisions
    by their tribes. And the land had rest from war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole land.' The phrase summarizes Joshua's conquest of the land
      under discussion.
    reason: lexical_alternative
  - marker: b
    text: Or 'was quiet from war.' The Hebrew expression denotes rest or tranquility
      after conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - captured
  - took possession of
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this summary statement, 'took'
    preserves the concise Hebrew wording without overstating the manner as purely
    military ('captured') or interpretively expanding to 'took possession of.'
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all the הארץ/land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the land under discussion, namely the promised land
    region, not the entire earth. 'All the land' is the natural English equivalent
    and preserves the scope of the conquest summary.
- source_word: כְּכֹל אֲשֶׁר דִּבֶּר
  chosen: according to all that ... had spoken
  alternatives:
  - just as ... had said
  - in accordance with all that ... spoke
  lexicon: HALOT
  rationale: The comparative phrase כְּכֹל אֲשֶׁר indicates conformity to what was
    previously spoken. 'According to all that ... had spoken' preserves both the formal
    correspondence and the prior temporal sense in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: וַיִּתְּנָהּ
  chosen: gave it
  alternatives:
  - assigned it
  - distributed it
  lexicon: HALOT
  rationale: נתן with the feminine singular suffix refers back to 'the land.' 'Gave
    it' is the base sense and allows the following inheritance language to carry the
    allotment nuance.
- source_word: לְנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inherited possession, especially covenant land
    allotment. 'As an inheritance' preserves both legal and theological resonance
    better than the flatter 'possession.'
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The preposition ל marks the recipient. 'To Israel' is straightforward
    and idiomatic with 'gave it as an inheritance.'
- source_word: כְּמַחְלְקֹתָם
  chosen: according to their divisions
  alternatives:
  - by their allotments
  - according to their portions
  lexicon: HALOT
  rationale: מחלקות denotes divisions or apportionments. 'According to their divisions'
    closely follows the Hebrew while fitting the tribal distribution context.
- source_word: לְשִׁבְטֵיהֶם
  chosen: by their tribes
  alternatives:
  - according to their tribes
  - for their tribes
  lexicon: HALOT
  rationale: This phrase specifies the organizing principle of the divisions. 'By
    their tribes' is concise and natural in English when paired with 'according to
    their divisions.'
- source_word: שָׁקְטָה מִמִּלְחָמָה
  chosen: had rest from war
  alternatives:
  - was quiet from war
  - was at peace from war
  - rested from war
  lexicon: HALOT
  rationale: שקט conveys quietness, tranquility, or rest. In this conquest-summary
    context, 'had rest from war' is idiomatic English and reflects cessation of major
    conflict without implying absolute universal peace.
