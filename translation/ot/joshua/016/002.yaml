id: JOS.16.2
reference: Joshua 16:2
source:
  edition: WLC
  text: וְ/יָצָ֥א מִ/בֵּֽית אֵ֖ל ל֑וּזָ/ה וְ/עָבַ֛ר אֶל גְּב֥וּל הָ/אַרְכִּ֖י עֲטָרֽוֹת־־׃
translation:
  text: Then it went out from Bethel to Luz, and passed on to the border of the Arkites
    at Ataroth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Archites," reflecting an alternate transliteration of the gentilic
      הָאַרְכִּי.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then it went out
  alternatives:
  - and it went out
  - and it extended out
  lexicon: HALOT
  rationale: Refers to the boundary line continuing from the previous verse, so English
    supplies 'it' for the border. 'Then' gives natural narrative progression for waw
    + qatal in boundary description.
- source_word: מִבֵּית אֵל
  chosen: from Bethel
  alternatives:
  - from Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name בֵּית אֵל.
- source_word: לוּזָה
  chosen: to Luz
  alternatives:
  - Luzward
  - toward Luz
  lexicon: HALOT
  rationale: The directional he indicates motion toward Luz. In English, 'to Luz'
    is the clearest natural rendering.
- source_word: וְעָבַר
  chosen: and passed on
  alternatives:
  - and crossed over
  - and passed through
  lexicon: HALOT
  rationale: In a border itinerary, עבר commonly describes the line continuing onward.
    'Passed on' fits geographic progression better than the more literal but potentially
    misleading 'crossed over.'
- source_word: אֶל גְּבוּל
  chosen: to the border of
  alternatives:
  - to the territory of
  - to the boundary of
  lexicon: HALOT
  rationale: גְּבוּל denotes a boundary or border. 'Border of' is concise and suits
    the allotment context.
- source_word: הָאַרְכִּי
  chosen: the Arkites
  alternatives:
  - the Archites
  - the Arkite
  lexicon: HALOT
  rationale: Gentilic referring to the Arkite clan or people. 'Arkites' is a clear
    plural ethnonym in English; 'Archites' reflects an alternate transliteration tradition.
- source_word: עֲטָרוֹת
  chosen: Ataroth
  alternatives:
  - Atarot
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
