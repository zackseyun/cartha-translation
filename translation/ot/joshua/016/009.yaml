id: JOS.16.9
reference: Joshua 16:9
source:
  edition: WLC
  text: וְ/הֶ/עָרִ֗ים הַ/מִּבְדָּלוֹת֙ לִ/בְנֵ֣י אֶפְרַ֔יִם בְּ/ת֖וֹךְ נַחֲלַ֣ת בְּנֵֽי
    מְנַשֶּׁ֑ה כָּֽל הֶ/עָרִ֖ים וְ/חַצְרֵי/הֶֽן־־׃
translation:
  text: And the cities set apart for the sons of Ephraim within the inheritance of
    the sons of Manasseh—all the cities and their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cities separated for the sons of Ephraim.' The Hebrew participle
      emphasizes that these cities were distinguished from Manasseh's territory for
      Ephraim's use.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city or town. 'Cities' is the standard rendering
    in Joshua's territorial lists and preserves consistency with surrounding verses.
- source_word: הַמִּבְדָּלוֹת
  chosen: set apart
  alternatives:
  - separated
  - distinct
  - assigned separately
  lexicon: HALOT
  rationale: From בדל, indicating separation or distinction. In this land-allotment
    context, 'set apart' communicates that these cities were designated for Ephraim
    though located within Manasseh's inheritance.
- source_word: לִבְנֵי אֶפְרַיִם
  chosen: for the sons of Ephraim
  alternatives:
  - for the people of Ephraim
  - for the descendants of Ephraim
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Per translation philosophy, gender-accurate
    wording is preferred where it reflects the source. Here it is a tribal designation,
    so the literal form is retained rather than flattened to 'people,' though the
    referent is the tribe as a whole.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - inside
  lexicon: HALOT
  rationale: '''Within'' is natural modern English and accurately conveys location
    inside the territory of another tribal inheritance.'
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotted inheritance
  - the possession
  lexicon: HALOT
  rationale: נחלה in Joshua regularly refers to inherited territorial allotment. 'Inheritance'
    preserves the covenantal-land nuance better than the flatter 'possession.'
- source_word: בְּנֵי מְנַשֶּׁה
  chosen: the sons of Manasseh
  alternatives:
  - the people of Manasseh
  - the descendants of Manasseh
  lexicon: HALOT
  rationale: As with 'sons of Ephraim,' this is retained literally for consistency
    and to mirror the tribal formula used throughout the passage.
- source_word: כָּל הֶעָרִים
  chosen: all the cities
  alternatives:
  - all these cities
  lexicon: HALOT
  rationale: כָּל marks the totality of the designated cities. 'All the cities' is
    straightforward and preserves the summarizing force of the clause.
- source_word: וְחַצְרֵיהֶן
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their surrounding settlements
  lexicon: HALOT
  rationale: חָצֵר in territorial lists often refers to dependent villages or unwalled
    settlements associated with a city. 'Villages' is the clearest idiomatic rendering
    in English.
