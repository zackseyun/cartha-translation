id: JOS.16.4
reference: Joshua 16:4
source:
  edition: WLC
  text: וַ/יִּנְחֲל֥וּ בְנֵי יוֹסֵ֖ף מְנַשֶּׁ֥ה וְ/אֶפְרָֽיִם־׃
translation:
  text: So the sons of Joseph, Manasseh and Ephraim, received their inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'inherited' or 'took possession of their inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנְחֲלוּ
  chosen: received their inheritance
  alternatives:
  - took possession
  - inherited
  lexicon: HALOT
  rationale: The verb from נחל in the Qal wayyiqtol here denotes coming into possession
    of an allotted inheritance. 'Received their inheritance' fits the land-allotment
    context of Joshua and makes explicit the object implied in English. 'Inherited'
    is possible but can sound too abstract without the land context; 'took possession'
    leans more toward active occupation than the allotment itself.
- source_word: בְנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - the descendants of Joseph
  - the children of Joseph
  lexicon: HALOT
  rationale: בְנֵי literally means 'sons of,' and in tribal/genealogical context refers
    to Joseph's tribal descendants. 'Sons of Joseph' preserves the formal genealogical
    idiom while remaining natural English. 'Descendants' is interpretive; 'children'
    is less precise in this tribal context.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate personal and tribal
    names.
- source_word: וְאֶפְרָיִם
  chosen: and Ephraim
  rationale: Proper name transliterated according to standard English convention.
    The conjunction is retained straightforwardly as 'and.'
- source_word: וַ
  chosen: So
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw on the wayyiqtol advances the narrative. 'So' gives
    natural English narrative flow and reflects the inferential/sequential sense from
    the preceding allotment context. 'And' would be more formally literal but slightly
    less idiomatic in modern English.
