id: JOS.16.5
reference: Joshua 16:5
source:
  edition: WLC
  text: וַ/יְהִ֛י גְּב֥וּל בְּנֵֽי אֶפְרַ֖יִם לְ/מִשְׁפְּחֹתָ֑/ם וַ/יְהִ֞י גְּב֤וּל
    נַחֲלָתָ/ם֙ מִזְרָ֔חָ/ה עַטְר֣וֹת אַדָּ֔ר עַד בֵּ֥ית חוֹרֹ֖ן עֶלְיֽוֹן־־׃
translation:
  text: 'And the territory of the sons of Ephraim by their clans was as follows: the
    border of their inheritance on the east was Ataroth-addar, as far as Upper Beth-horon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the boundary of their inheritance eastward was Ataroth-addar.' The Hebrew
      phrase may be rendered slightly differently in English without changing the
      geographic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  chosen: territory / border
  alternatives:
  - boundary
  - border
  lexicon: HALOT
  rationale: The noun occurs twice in the verse. In the first instance, with בני אפרים
    and למשפחתם, it refers broadly to the tribal territorial extent, so 'territory'
    reads naturally in English. In the second instance, with נחלתם and followed by
    place names, it refers more specifically to the boundary line, so 'border' best
    fits the geographic description. This is a documented contextual variation of
    the same Hebrew term.
- source_word: בְּנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the people of Ephraim
  - the descendants of Ephraim
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew filial idiom and
    matches the tribal/genealogical framing. 'Sons' is retained rather than neutralizing
    to 'people,' in keeping with gender-accurate translation where the source uses
    the masculine form representatively.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their family groups
  lexicon: HALOT
  rationale: In tribal allotment contexts, משפחה denotes clan-level subdivisions within
    a tribe. 'By their clans' is concise and idiomatic while preserving the social
    structure indicated by the Hebrew.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  - their possession
  lexicon: HALOT
  rationale: נחלה in Joshua commonly denotes inherited allotted land. 'Inheritance'
    preserves the covenantal-land nuance better than the flatter 'possession.'
- source_word: מִזְרָחָה
  chosen: on the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The directional form indicates the eastern side/beginning point of the
    border description. 'On the east' is natural in English and fits the syntax of
    a boundary notice.
- source_word: עַטְרוֹת אַדָּר
  chosen: Ataroth-addar
  alternatives:
  - Ataroth Addar
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated rather than translated,
    following the project's policy for names. The hyphenated form helps English readers
    recognize the compound toponym.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: In boundary descriptions, 'as far as' clearly marks the extent of the
    border line in idiomatic English.
- source_word: בֵּית חוֹרֹן עֶלְיוֹן
  chosen: Upper Beth-horon
  alternatives:
  - Beth-horon Upper
  - the upper Beth-horon
  lexicon: HALOT
  rationale: The adjective עֶלְיוֹן distinguishes this site from Lower Beth-horon.
    'Upper Beth-horon' is the standard and clearest English toponymic form.
