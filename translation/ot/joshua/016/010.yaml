id: JOS.16.10
reference: Joshua 16:10
source:
  edition: WLC
  text: וְ/לֹ֣א הוֹרִ֔ישׁוּ אֶת הַֽ/כְּנַעֲנִ֖י הַ/יּוֹשֵׁ֣ב בְּ/גָ֑זֶר וַ/יֵּ֨שֶׁב
    הַֽ/כְּנַעֲנִ֜י בְּ/קֶ֤רֶב אֶפְרַ֨יִם֙ עַד הַ/יּ֣וֹם הַ/זֶּ֔ה וַ/יְהִ֖י לְ/מַס
    עֹבֵֽד־־־׃פ
translation:
  text: But they did not drive out the Canaanites who lived in Gezer, so the Canaanites
    have lived in the midst of Ephraim to this day and became forced laborers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not dispossess' or 'did not expel.' The Hebrew verb can denote causing
      inhabitants to lose possession or be removed from the land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Canaanite' uses a singular form with collective force, referring
      to the Canaanite population.
    reason: lexical_alternative
  - marker: c
    text: Or 'subject to forced labor.' The phrase refers to compulsory labor service,
      not merely payment of tribute.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁוּ
  chosen: did not drive out
  alternatives:
  - did not dispossess
  - did not expel
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ in conquest contexts commonly means to cause to leave/dispossess.
    'Drive out' is idiomatic modern English and fits the military-settlement context
    better than the more technical 'dispossess,' while preserving the sense that the
    inhabitants were not removed.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite people
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the term is often a collective ethnic
    singular in Hebrew. English plural 'the Canaanites' best conveys the collective
    sense in this historical notice.
- source_word: הַיּוֹשֵׁב בְּגָזֶר
  chosen: who lived in Gezer
  alternatives:
  - who was dwelling in Gezer
  - inhabiting Gezer
  lexicon: HALOT
  rationale: The participle with article functions attributively, describing the resident
    Canaanite population of Gezer. 'Who lived in Gezer' is natural English and preserves
    the durative/residential sense.
- source_word: וַיֵּשֶׁב
  chosen: have lived
  alternatives:
  - dwelt
  - lived
  - settled
  lexicon: HALOT
  rationale: 'After the initial past event, the clause is followed by ''to this day,''
    which in English is most naturally rendered with present perfect: ''have lived
    ... to this day.'' This reflects the ongoing state from past into the narrator''s
    present.'
- source_word: בְּקֶרֶב אֶפְרַיִם
  chosen: in the midst of Ephraim
  alternatives:
  - among Ephraim
  - within Ephraim
  lexicon: HALOT
  rationale: '''In the midst of'' preserves the spatial-social nuance of בקרב while
    remaining readable. ''Ephraim'' here refers to the tribal territory/people; the
    phrase indicates continued Canaanite presence among them.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew temporal formula,
    indicating persistence up to the time of writing.
- source_word: לְמַס עֹבֵד
  chosen: forced laborers
  alternatives:
  - subject to forced labor
  - tributary labor
  - task laborers
  lexicon: HALOT
  rationale: מַס denotes corvée/forced labor rather than merely monetary tribute.
    Rendering the phrase as 'forced laborers' communicates that the remaining Canaanites
    were reduced to compulsory labor service. This avoids the potentially misleading
    traditional 'tribute,' which can suggest taxation only.
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: In context, the verb marks the resulting status of the Canaanites after
    remaining in the land. 'Became' makes the resultative force clear in English.
