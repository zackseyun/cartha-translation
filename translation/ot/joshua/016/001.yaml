id: JOS.16.1
reference: Joshua 16:1
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א הַ/גּוֹרָ֜ל לִ/בְנֵ֤י יוֹסֵף֙ מִ/יַּרְדֵּ֣ן יְרִיח֔וֹ לְ/מֵ֥י יְרִיח֖וֹ
    מִזְרָ֑חָ/ה הַ/מִּדְבָּ֗ר עֹלֶ֧ה מִ/ירִיח֛וֹ בָּ/הָ֖ר בֵּֽית אֵֽל־׃
translation:
  text: And the lot came out for the sons of Joseph from the Jordan at Jericho, to
    the waters of Jericho on the east, the wilderness going up from Jericho into the
    hill country of Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lot fell for the sons of Joseph.' The Hebrew verb is literally 'came
      out,' but in allotment contexts English often uses 'fell.'
    reason: lexical_alternative
  - marker: b
    text: '''The waters of Jericho'' may refer specifically to Jericho''s spring or
      water source.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - fell
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' In the context of allotment
    by lot, English versions often use 'fell,' but the Hebrew here is simply 'came
    out,' referring to the result of the lot. This preserves the source wording without
    importing an idiomatic English expansion beyond the text.
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the allotment
  lexicon: HALOT
  rationale: גורל denotes the lot cast for apportionment. 'The lot' is the most direct
    rendering and keeps the procedural sense of territorial assignment.
- source_word: לִבְנֵי יוֹסֵף
  chosen: for the sons of Joseph
  alternatives:
  - for the descendants of Joseph
  - for the children of Joseph
  lexicon: HALOT
  rationale: בני is literally 'sons of.' Here it refers corporately to Joseph's tribal
    descendants, but 'sons of Joseph' preserves the Hebrew kinship expression while
    remaining natural enough in English.
- source_word: מִיַּרְדֵּן יְרִיחוֹ
  chosen: from the Jordan at Jericho
  alternatives:
  - from the Jordan of Jericho
  - from the Jordan near Jericho
  lexicon: HALOT
  rationale: The phrase marks the starting point of the boundary/allotment line at
    the Jordan by Jericho. 'At Jericho' is idiomatic English for the geographic association
    without over-specifying.
- source_word: לְמֵי יְרִיחוֹ
  chosen: to the waters of Jericho
  alternatives:
  - to the spring of Jericho
  - to the water of Jericho
  lexicon: HALOT
  rationale: מי is plural/collective 'waters.' The phrase likely refers to the water
    source(s) associated with Jericho. 'Waters of Jericho' is formally accurate; 'spring
    of Jericho' is interpretive and therefore kept as an alternative only.
- source_word: מִזְרָחָה
  chosen: on the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The directional adverb indicates eastward/east side orientation. 'On
    the east' fits the boundary-description style in English and connects naturally
    with the preceding phrase.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  - the wasteland
  lexicon: HALOT
  rationale: מדבר commonly denotes wilderness or steppe. 'Wilderness' is the standard
    biblical-geographical rendering and avoids the overly specific modern connotations
    of 'desert.'
- source_word: עֹלֶה
  chosen: going up
  alternatives:
  - ascending
  - rising
  lexicon: HALOT
  rationale: The participle describes the boundary/wilderness as ascending from Jericho
    toward the hill country. 'Going up' is idiomatic and preserves the topographical
    movement.
- source_word: מִירִיחוֹ
  chosen: from Jericho
  lexicon: HALOT
  rationale: Simple source-point prepositional phrase; rendered directly.
- source_word: בָּהָר
  chosen: into the hill country of
  alternatives:
  - in the hill country of
  - to the hill country of
  lexicon: HALOT
  rationale: הר here refers not merely to a single mountain but to upland/hill country
    terrain. 'Into the hill country of' best conveys movement from Jericho upward
    toward the Bethel highlands.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name. The construct relation
    with בהר is represented by 'hill country of Bethel.'
