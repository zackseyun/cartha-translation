id: JOS.24.4
reference: Joshua 24:4
source:
  edition: WLC
  text: וָ/אֶתֵּ֣ן לְ/יִצְחָ֔ק אֶֽת יַעֲקֹ֖ב וְ/אֶת עֵשָׂ֑ו וָ/אֶתֵּ֨ן לְ/עֵשָׂ֜ו
    אֶת הַ֤ר שֵׂעִיר֙ לָ/רֶ֣שֶׁת אוֹת֔/וֹ וְ/יַעֲקֹ֥ב וּ/בָנָ֖י/ו יָרְד֥וּ מִצְרָֽיִם־־־׃
translation:
  text: And I gave Isaac Jacob and Esau, and I gave Esau the hill country of Seir
    to possess it; but Jacob and his sons went down to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mount Seir' or 'the mountains of Seir.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and Jacob and his sons went down to Egypt.' The Hebrew conjunction is
      simply 'and'; the main text uses 'but' to make the contrast explicit in English.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתֵּן
  chosen: I gave
  alternatives:
  - I granted
  lexicon: HALOT
  rationale: The verb נתן in this context straightforwardly denotes giving/bestowing
    descendants and territory. 'I gave' is the most direct and natural rendering in
    English and preserves the repeated divine action.
- source_word: לְיִצְחָק
  chosen: Isaac
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: אֶת יַעֲקֹב וְאֶת עֵשָׂו
  chosen: Jacob and Esau
  rationale: The direct-object marker is not translated; the phrase names the two
    sons given to Isaac. Standard English coordination is sufficient.
- source_word: לְעֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated by standard English convention.
- source_word: הַר שֵׂעִיר
  chosen: the hill country of Seir
  alternatives:
  - Mount Seir
  - the mountains of Seir
  lexicon: HALOT
  rationale: הַר can denote a mountain, hill country, or mountainous region. Here
    it refers to the territorial region allotted to Esau/Edom, so 'the hill country
    of Seir' best conveys a geographic possession rather than a single peak.
- source_word: לָרֶשֶׁת אֹתוֹ
  chosen: to possess it
  alternatives:
  - to inherit it
  - to take possession of it
  lexicon: HALOT
  rationale: ירש in the infinitive commonly means to possess/inherit. 'To possess
    it' is concise and idiomatic here, while still allowing the territorial sense
    of receiving and occupying land.
- source_word: וְיַעֲקֹב וּבָנָיו
  chosen: but Jacob and his sons
  alternatives:
  - and Jacob and his sons
  rationale: The conjunction is formally 'and,' but English style and the discourse
    contrast favor 'but' to mark the shift between Esau receiving Seir and Jacob's
    family going down to Egypt. This is an optimal-equivalence adjustment for clear
    discourse flow, not a change in propositional content.
- source_word: יָרְדוּ מִצְרָיִם
  chosen: went down to Egypt
  alternatives:
  - descended to Egypt
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Went down to Egypt' preserves
    the conventional directional idiom used in biblical narrative and reads naturally
    in modern English.
