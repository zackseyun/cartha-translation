theological_decisions:
- issue: Rendering the contrast introduced by the final conjunction
  chosen_reading: Use 'but' in English to reflect the narrative contrast between Esau's
    territorial inheritance and Jacob's descent to Egypt.
  alternative_readings:
  - Use 'and' as a more formally literal rendering of the Hebrew conjunction.
  rationale: 'The Hebrew waw does not itself specify a strong adversative sense, but
    the verse juxtaposes two divergent outcomes in salvation history: Esau receives
    Seir, whereas Jacob''s line goes down to Egypt. ''But'' makes that contrast explicit
    in natural English without importing extra doctrine.'
  doctrine_reference: Translation philosophy § optimal equivalence; preserve source
    sense without wooden literalism.
