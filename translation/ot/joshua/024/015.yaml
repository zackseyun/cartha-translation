theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered ancestral language in אֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is grammatically and lexically masculine plural ('fathers'). Per the translation philosophy, gender-accurate renderings are preferred over neutralization unless context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Religious allegiance language in עבד
  chosen_reading: serve
  alternative_readings:
  - worship
  rationale: The verse's repeated use of עבד frames covenant loyalty in terms of service. Rendering all occurrences as 'serve' preserves the rhetorical repetition and theological emphasis on allegiance, while allowing worship to remain an implicature rather than an imported narrowing.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
