id: JOS.24.15
reference: Joshua 24:15
source:
  edition: WLC
  text: וְ/אִם֩ רַ֨ע בְּֽ/עֵינֵי/כֶ֜ם לַ/עֲבֹ֣ד אֶת יְהוָ֗ה בַּחֲר֨וּ לָ/כֶ֣ם הַ/יּוֹם֮ אֶת מִ֣י תַעֲבֹדוּ/ן֒ אִ֣ם אֶת אֱלֹהִ֞ים אֲשֶׁר עָבְד֣וּ אֲבוֹתֵי/כֶ֗ם אֲשֶׁר֙ ב/עבר הַ/נָּהָ֔ר וְ/אִם֙ אֶת אֱלֹהֵ֣י הָ/אֱמֹרִ֔י אֲשֶׁ֥ר אַתֶּ֖ם יֹשְׁבִ֣ים בְּ/אַרְצָ֑/ם וְ/אָנֹכִ֣י וּ/בֵיתִ֔/י נַעֲבֹ֖ד אֶת יְהוָֽה־־־־־־׃פ
translation:
  text: But if it is evil in your eyes to serve Yahweh, choose for yourselves today whom you will serve—whether the gods your fathers served beyond the River, or the gods of the Amorites in whose land you are dwelling. But as for me and my house, we will serve Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it seems wrong to you' or 'it is displeasing to you'; literally, 'it is evil in your eyes.'
    reason: lexical_alternative
  - marker: b
    text: '''The River'' refers to the Euphrates.'
    reason: cultural_note
  - marker: c
    text: 'Or ''your ancestors served''; Hebrew: ''your fathers served.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'my household.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction introduces a conditional contrast with the preceding appeal. 'But if' captures both the connective and adversative force in natural English.
- source_word: רַע בְּעֵינֵיכֶם
  chosen: it seems evil in your eyes
  alternatives:
  - it is evil in your eyes
  - it seems wrong to you
  - it is displeasing to you
  lexicon: HALOT
  rationale: Literally 'evil in your eyes.' This idiom expresses evaluation from the hearers' perspective. 'Seems evil in your eyes' preserves the Hebrew imagery and rhetorical sharpness better than the smoother 'seems wrong to you.'
- source_word: לַעֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  lexicon: HALOT
  rationale: עבד in this covenantal-religious context includes worshipful allegiance, but 'serve' is the broader and more consistent rendering, especially since the same root recurs throughout the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּחֲרוּ לָכֶם הַיּוֹם
  chosen: choose for yourselves today
  alternatives:
  - choose today for yourselves
  - choose this day for yourselves
  lexicon: HALOT
  rationale: This preserves the imperative force, reflexive nuance ('for yourselves'), and temporal emphasis. 'Today' is more natural modern English than 'this day' while retaining the urgency.
- source_word: אֶת מִי תַעֲבֹדוּן
  chosen: whom you will serve
  alternatives:
  - whom you shall serve
  - who you will serve
  lexicon: HALOT
  rationale: English idiom prefers 'whom' after 'choose.' Future 'will serve' reflects the imperfect in deliberative/result sense following the imperative.
- source_word: אֱלֹהִים ... אֱלֹהֵי
  chosen: gods
  alternatives:
  - Gods
  - deities
  lexicon: HALOT
  rationale: The plural refers to pagan deities, so lowercase 'gods' is required. 'Deities' is possible but less direct and less consistent with common biblical diction.
- source_word: אֲשֶׁר עָבְדוּ אֲבוֹתֵיכֶם
  chosen: your fathers served
  alternatives:
  - your ancestors served
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'your fathers.' Per gender-accurate policy, the masculine form is retained rather than neutralized to 'ancestors,' though the broader ancestral sense is understood.
- source_word: בְּעֵבֶר הַנָּהָר
  chosen: beyond the River
  alternatives:
  - across the River
  - on the other side of the River
  lexicon: HALOT
  rationale: This is the standard geographical expression for the region beyond the Euphrates from Israel's perspective. Capitalized 'River' reflects its function as a known geographic designation in context.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  lexicon: HALOT
  rationale: Standard transliteration of the people group name.
- source_word: אֲשֶׁר אַתֶּם יֹשְׁבִים בְּאַרְצָם
  chosen: in whose land you are dwelling
  alternatives:
  - in whose land you dwell
  - in whose land you are living
  lexicon: HALOT
  rationale: This relative clause modifies 'the Amorites' and specifies the present setting. 'Are dwelling' preserves the participial sense and sounds suitably weighty without being archaic.
- source_word: וְאָנֹכִי וּבֵיתִי
  chosen: But as for me and my house
  alternatives:
  - And I and my house
  - As for me and my household
  lexicon: HALOT
  rationale: This idiomatic English rendering captures the emphatic personal contrast. 'House' preserves the familiar biblical expression and can naturally include household members under the head's domain.
- source_word: נַעֲבֹד
  chosen: we will serve
  alternatives:
  - we shall serve
  - we will worship
  lexicon: HALOT
  rationale: Consistent with the repeated עבד in the verse. 'Serve' preserves the covenantal allegiance theme across all occurrences.
