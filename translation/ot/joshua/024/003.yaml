id: JOS.24.3
reference: Joshua 24:3
source:
  edition: WLC
  text: וָ֠/אֶקַּח אֶת אֲבִי/כֶ֤ם אֶת אַבְרָהָם֙ מֵ/עֵ֣בֶר הַ/נָּהָ֔ר וָ/אוֹלֵ֥ךְ
    אוֹת֖/וֹ בְּ/כָל אֶ֣רֶץ כְּנָ֑עַן ו/ארב אֶת זַרְע֔/וֹ וָֽ/אֶתֶּן ל֖/וֹ אֶת יִצְחָֽק־־־־־־׃
translation:
  text: Then I took your father Abraham from beyond the River, and I led him through
    all the land of Canaan, and I multiplied his offspring and gave him Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The River'' likely refers to the Euphrates.'
    reason: cultural_note
  - marker: b
    text: Or 'his descendants'; Hebrew 'his seed/offspring' is a collective singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  chosen: Then I took
  alternatives:
  - And I took
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of לקח, narrating God's past action. 'Then' is a natural
    English narrative connector for the Hebrew waw-consecutive, while preserving sequence.
- source_word: אֲבִיכֶם
  chosen: your father
  alternatives:
  - your ancestor
  lexicon: HALOT
  rationale: Although Abraham is a remote forefather rather than immediate parent,
    'father' preserves the covenantal/ancestral idiom of the Hebrew and matches the
    source more closely than the interpretive 'ancestor'.
- source_word: מֵעֵבֶר הַנָּהָר
  chosen: from beyond the River
  alternatives:
  - from the other side of the River
  - from across the River
  lexicon: HALOT
  rationale: עֵבֶר with מן denotes the far side/across from a reference point. 'The
    River' with capital R reflects the definite expression and conventional reference
    to the Euphrates in this context without over-expanding in the main text.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates River
  lexicon: HALOT
  rationale: The Hebrew says 'the River,' a known geographical designation. Retaining
    it in the main text respects the source wording; the specific identification can
    be preserved in a note if needed.
- source_word: וָאוֹלֵךְ אֹתוֹ
  chosen: and I led him
  alternatives:
  - and I caused him to go
  - and I brought him along
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of הלך here is causative. 'Led him' is idiomatic English
    that preserves the causative sense without awkwardness.
- source_word: בְּכָל אֶרֶץ כְּנָעַן
  chosen: through all the land of Canaan
  alternatives:
  - throughout all the land of Canaan
  - in all the land of Canaan
  lexicon: HALOT
  rationale: The preposition ב with 'all the land' in this travel context is well
    represented by 'through'/'throughout.' 'Through all the land of Canaan' fits the
    movement implied by the preceding verb.
- source_word: וָאַרְבֶּה
  chosen: and I multiplied
  alternatives:
  - and I made numerous
  - and I increased
  lexicon: HALOT
  rationale: From רבה in the Hiphil, meaning to make many/increase. 'Multiplied' is
    concise, traditional, and accurately conveys divine increase.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed/offspring/descendants. 'Offspring' preserves the
    collective singular sense in natural modern English better than the archaic 'seed,'
    while being less interpretively expanded than 'descendants'.
- source_word: וָאֶתֶּן לוֹ אֶת יִצְחָק
  chosen: and gave him Isaac
  alternatives:
  - and I gave Isaac to him
  lexicon: HALOT
  rationale: נתן + indirect object + direct object is naturally rendered 'gave him
    Isaac.' This preserves the sense of Isaac as God's gift to Abraham.
