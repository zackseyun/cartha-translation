theological_decisions:
- issue: Ancestral designation of Abraham
  chosen_reading: your father Abraham
  alternative_readings:
  - your ancestor Abraham
  rationale: The Hebrew explicitly uses 'your father,' and there is no doctrinal reason
    to flatten the familial-covenantal idiom into the more generic 'ancestor.' This
    preserves the text's covenantal rhetoric addressed to Israel.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identification of 'the River'
  chosen_reading: the River
  alternative_readings:
  - the Euphrates
  rationale: The source text uses the definite common noun rather than the proper
    name. Keeping 'the River' in the main text honors original-language primacy while
    allowing the likely identification to remain implicit or footnoted rather than
    imported into the text.
  doctrine_reference: Translation philosophy §1
