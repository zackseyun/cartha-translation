id: JOS.24.32
reference: Joshua 24:32
source:
  edition: WLC
  text: וְ/אֶת עַצְמ֣וֹת י֠וֹסֵף אֲשֶׁר הֶעֱל֨וּ בְנֵי יִשְׂרָאֵ֥ל מִ/מִּצְרַיִם֮
    קָבְר֣וּ בִ/שְׁכֶם֒ בְּ/חֶלְקַ֣ת הַ/שָּׂדֶ֗ה אֲשֶׁ֨ר קָנָ֧ה יַעֲקֹ֛ב מֵ/אֵ֛ת בְּנֵֽי
    חֲמ֥וֹר אֲבִֽי שְׁכֶ֖ם בְּ/מֵאָ֣ה קְשִׂיטָ֑ה וַ/יִּֽהְי֥וּ לִ/בְנֵֽי יוֹסֵ֖ף לְ/נַחֲלָֽה־־־׀־־־׃
translation:
  text: And the bones of Joseph, which the sons of Israel had brought up from Egypt,
    they buried at Shechem, in the portion of the field that Jacob had bought from
    the sons of Hamor, the father of Shechem, for a hundred qesitahs; and it became
    an inheritance for the sons of Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parcel of the field.' The Hebrew term refers to a plot or portion of
      land.
    reason: lexical_alternative
  - marker: b
    text: '''Qesitahs'' is an ancient term for a unit of value or money; its exact
      equivalent is uncertain.'
    reason: cultural_note
  - marker: c
    text: Or possibly 'the founder/chief ancestor of Shechem,' if 'father' is used
      in a broader ancestral sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַצְמוֹת
  chosen: bones
  alternatives:
  - remains
  lexicon: HALOT
  rationale: The noun literally denotes bones. 'Remains' is possible in English, but
    'bones' preserves the concrete wording of the Hebrew and echoes the Joseph-burial
    tradition.
- source_word: הֶעֱלוּ
  chosen: had brought up
  alternatives:
  - brought up
  - carried up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up.' The pluperfect sense ('had
    brought up') fits the narrative reference to an earlier action completed before
    the burial. 'Carried up' is possible but narrower than the Hebrew.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A literal rendering preserves the familial/covenantal expression in Hebrew.
    'Israelites' is idiomatic, but 'sons of Israel' better reflects the source wording
    and remains readable.
- source_word: קָבְרוּ
  chosen: they buried
  alternatives:
  - buried
  lexicon: HALOT
  rationale: Simple past active accurately reflects the Hebrew verb and keeps the
    plural subject explicit.
- source_word: בִּשְׁכֶם
  chosen: at Shechem
  alternatives:
  - in Shechem
  lexicon: HALOT
  rationale: For a place name, either preposition works in English. 'At Shechem' suits
    the burial-site sense and avoids implying only the city proper.
- source_word: בְּחֶלְקַת הַשָּׂדֶה
  chosen: in the portion of the field
  alternatives:
  - in the tract of the field
  - in the parcel of the field
  lexicon: HALOT
  rationale: חלקה denotes a plot, portion, or parcel of land. 'Portion of the field'
    is natural English while staying close to the Hebrew.
- source_word: קָנָה
  chosen: had bought
  alternatives:
  - bought
  - acquired
  lexicon: HALOT
  rationale: The verb means 'buy/acquire.' 'Had bought' fits the prior action relative
    to the burial event. 'Acquired' is broader and less specific than the context
    of purchase.
- source_word: בְּנֵי חֲמוֹר
  chosen: the sons of Hamor
  alternatives:
  - the descendants of Hamor
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Hamor.' 'Descendants' is interpretive;
    the literal phrase is clear and preferable.
- source_word: אֲבִי שְׁכֶם
  chosen: the father of Shechem
  alternatives:
  - Shechem's father
  - the founder of Shechem
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'the father of Shechem.'
    While 'father' can sometimes imply founder or chief ancestor, the main text should
    preserve the literal wording; any broader nuance can be noted in a footnote.
- source_word: בְּמֵאָה קְשִׂיטָה
  chosen: for a hundred qesitahs
  alternatives:
  - for a hundred pieces of money
  - for a hundred kesitahs
  lexicon: HALOT
  rationale: קְשִׂיטָה is an ancient monetary/weight term with uncertain exact value.
    Transliteration avoids false precision; 'for' naturally renders the purchase price.
- source_word: וַיִּהְיוּ
  chosen: it became
  alternatives:
  - they became
  - it came to be
  lexicon: HALOT
  rationale: 'Although the Hebrew verb is plural, the sense is best taken with the
    parcel/field as the referent in context: the property became an inheritance for
    Joseph''s sons. English singular avoids awkwardness and reflects the likely sense.'
- source_word: לְנַחֲלָה
  chosen: an inheritance
  alternatives:
  - a possession
  - a hereditary property
  lexicon: HALOT
  rationale: נחלה commonly denotes inheritance or hereditary possession. 'Inheritance'
    is the most direct and biblically resonant rendering.
