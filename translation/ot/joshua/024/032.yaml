theological_decisions:
- issue: Rendering of covenantal kinship term בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: This is not a major doctrinal dispute, but the translation philosophy
    favors preserving source-language familial expressions where readable. The phrase
    carries covenantal identity, which 'sons of Israel' retains more transparently
    than the ethnic label 'Israelites.'
  doctrine_reference: Translation philosophy 1, 5
- issue: Treatment of uncertain ancient currency term קְשִׂיטָה
  chosen_reading: qesitahs
  alternative_readings:
  - pieces of money
  - kesitahs
  rationale: To avoid importing a misleading modern equivalent or overconfident interpretation,
    the ancient term is transliterated in the main text and explained in a footnote.
    This preserves transparency and auditable lexical restraint.
  doctrine_reference: Translation philosophy 1, 6
