id: JOS.24.1
reference: Joshua 24:1
source:
  edition: WLC
  text: וַ/יֶּאֶסֹ֧ף יְהוֹשֻׁ֛עַ אֶת כָּל שִׁבְטֵ֥י יִשְׂרָאֵ֖ל שְׁכֶ֑מָ/ה וַ/יִּקְרָא֩
    לְ/זִקְנֵ֨י יִשְׂרָאֵ֜ל וּ/לְ/רָאשָׁ֗י/ו וּ/לְ/שֹֽׁפְטָי/ו֙ וּ/לְ/שֹׁ֣טְרָ֔י/ו
    וַ/יִּֽתְיַצְּב֖וּ לִ/פְנֵ֥י הָ/אֱלֹהִֽים־־׃
translation:
  text: Then Joshua gathered all the tribes of Israel to Shechem, and he called for
    the elders of Israel, its heads, its judges, and its officers, and they presented
    themselves before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at Shechem'; the Hebrew form is directional, literally 'toward Shechem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its leaders' for 'its heads.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'before God'; this may imply appearing at a sanctuary or
      covenantal sacred site.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֶּאֶסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: אָסַף in this narrative setting denotes bringing people together. 'Gathered'
    is natural modern English and preserves the concrete sense without overformal
    stiffness.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel
  alternatives:
  - the tribal groups of Israel
  lexicon: HALOT
  rationale: Standard rendering for שֵׁבֶט in this national-organizational context.
    'Tribes' is the established and accurate social-political sense here.
- source_word: שְׁכֶמָה
  chosen: to Shechem
  alternatives:
  - at Shechem
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the location.
    'To Shechem' best reflects the morphology, though the ensuing assembly occurs
    there.
- source_word: וַיִּקְרָא לְ
  chosen: he called for
  alternatives:
  - he summoned
  - he called
  lexicon: HALOT
  rationale: קרא with ל in this context means summoning designated leaders. 'Called
    for' is clear and idiomatic; 'summoned' is possible but slightly more formal.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  lexicon: HALOT
  rationale: Conventional and accurate rendering for the recognized leadership group.
- source_word: רָאשָׁיו
  chosen: its heads
  alternatives:
  - its leaders
  - their heads
  lexicon: HALOT
  rationale: Literally 'its heads,' with the 3ms suffix referring back collectively
    to Israel. This preserves the source image and distinguishes this office from
    the elders. 'Leaders' is interpretive and therefore preserved as an alternative
    rather than chosen.
- source_word: שֹׁפְטָיו
  chosen: its judges
  lexicon: HALOT
  rationale: Straightforward civic/judicial title in context.
- source_word: שֹׁטְרָיו
  chosen: its officers
  alternatives:
  - its officials
  lexicon: HALOT
  rationale: שֹׁטֵר denotes administrative officers or functionaries. 'Officers' is
    the common English equivalent in many OT administrative contexts.
- source_word: וַיִּתְיַצְּבוּ
  chosen: they presented themselves
  alternatives:
  - they took their stand
  - they stood
  lexicon: HALOT
  rationale: The hitpael conveys taking one's position or appearing in a formal setting.
    'Presented themselves' fits the ceremonial/judicial tone before God.
- source_word: לִפְנֵי הָאֱלֹהִים
  chosen: before God
  alternatives:
  - before the LORD
  - before the sanctuary of God
  lexicon: HALOT
  rationale: The text reads הָאֱלֹהִים, not YHWH, so 'before God' is the direct rendering.
    Some interpret the phrase as shorthand for appearing at a sanctuary, but the text
    itself names God rather than the location.
