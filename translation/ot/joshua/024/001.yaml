theological_decisions:
- issue: Rendering לִפְנֵי הָאֱלֹהִים in a covenant-assembly context
  chosen_reading: before God
  alternative_readings:
  - before the LORD
  - before the sanctuary of God
  rationale: The Hebrew explicitly has 'the God/God,' not the divine name YHWH, so
    the main text should not substitute 'the LORD.' At the same time, because assemblies
    'before God' can imply a cultic setting, the locative-expansive interpretation
    is preserved in a footnote rather than imported into the main text.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: יְהוָה YHWH
    → the LORD'
