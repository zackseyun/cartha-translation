theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves reverential
    convention and aligns with the stated doctrine guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - servants
  rationale: The Hebrew is a plural noun meaning 'slaves,' not an abstract noun. Using
    'slaves' preserves the bonded-status emphasis in keeping with the translation
    philosophy's preference not to soften such language where salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for δοῦλος
