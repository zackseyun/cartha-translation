id: JOS.24.17
reference: Joshua 24:17
source:
  edition: WLC
  text: כִּ֚י יְהוָ֣ה אֱלֹהֵ֔י/נוּ הוּא֩ הַ/מַּעֲלֶ֨ה אֹתָ֧/נוּ וְ/אֶת אֲבוֹתֵ֛י/נוּ
    מֵ/אֶ֥רֶץ מִצְרַ֖יִם מִ/בֵּ֣ית עֲבָדִ֑ים וַ/אֲשֶׁ֧ר עָשָׂ֣ה לְ/עֵינֵ֗י/נוּ אֶת
    הָ/אֹת֤וֹת הַ/גְּדֹלוֹת֙ הָ/אֵ֔לֶּה וַֽ/יִּשְׁמְרֵ֗/נוּ בְּ/כָל הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר
    הָלַ֣כְנוּ בָ֔/הּ וּ/בְ/כֹל֙ הָֽ/עַמִּ֔ים אֲשֶׁ֥ר עָבַ֖רְנוּ בְּ/קִרְבָּֽ/ם־־־׃
translation:
  text: For the LORD our God is the one who brought us and our fathers up from the
    land of Egypt, from the house of slaves, and who did before our eyes these great
    signs, and kept us through all the way in which we walked, and among all the peoples
    through whose midst we passed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the house of slavery.' The Hebrew is literally 'from the house
      of slaves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'these great wonders' or 'these great miracles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the people's reason for their commitment in the preceding
    verse. 'For' fits the discourse connection naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while matching established English convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retains covenantal relationship
    language.
- source_word: הוּא
  chosen: is the one who
  alternatives:
  - he is the one who
  - he
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'Is the one who' brings out the
    emphasis idiomatically in English rather than leaving a wooden 'he'.
- source_word: הַמַּעֲלֶה
  chosen: brought ... up
  alternatives:
  - brought out
  - caused ... to go up
  lexicon: HALOT
  rationale: The participle of עלה literally means 'bringing up.' In exodus context,
    'brought up' preserves the Hebrew imagery and is common biblical idiom, while
    still understandable in English.
- source_word: וְאֶת אֲבוֹתֵינוּ
  chosen: and our fathers
  alternatives:
  - and our ancestors
  lexicon: HALOT
  rationale: Retains the gender-accurate and covenant-historical wording of the Hebrew.
    'Ancestors' is possible but less literal and less tied to Israel's traditional
    self-description.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Keeps the full Hebrew phrase, including 'land,' which is explicit in
    the source.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  lexicon: HALOT
  rationale: Literally 'house of slaves.' This preserves the concrete social condition
    denoted by עֲבָדִים rather than abstracting it to 'slavery.' It also aligns with
    the project's preference to preserve bonded-status language where salient.
- source_word: וַאֲשֶׁר עָשָׂה
  chosen: and who did
  alternatives:
  - and who performed
  - who did
  lexicon: HALOT
  rationale: Links another relative clause to the subject 'the LORD our God.' 'Did'
    is broad but matches עשה and allows the object 'these great signs' to carry the
    specific sense.
- source_word: לְעֵינֵינוּ
  chosen: before our eyes
  alternatives:
  - in our sight
  lexicon: HALOT
  rationale: Idiomatic English equivalent that preserves the eyewitness emphasis.
- source_word: הָאֹתוֹת הַגְּדֹלוֹת הָאֵלֶּה
  chosen: these great signs
  alternatives:
  - these great miracles
  - these great wonders
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or miraculous sign. 'Signs' preserves the
    lexical link without over-interpreting; 'great' and 'these' are both retained.
- source_word: וַיִּשְׁמְרֵנוּ
  chosen: kept us
  alternatives:
  - guarded us
  - preserved us
  lexicon: HALOT
  rationale: שׁמר here conveys protective keeping during the journey. 'Kept us' is
    concise and natural, with the protective sense supplied by context.
- source_word: בְּכָל הַדֶּרֶךְ אֲשֶׁר הָלַכְנוּ בָהּ
  chosen: through all the way in which we walked
  alternatives:
  - through all the way that we went
  - on all the path we traveled
  lexicon: HALOT
  rationale: Preserves the comprehensive sense of בכל and the journey metaphor. 'Through
    all the way' best fits the protective sense of the preposition in context.
- source_word: וּבְכֹל הָעַמִּים
  chosen: and among all the peoples
  alternatives:
  - and through all the peoples
  - and among all the nations
  lexicon: HALOT
  rationale: עם can mean 'people' or 'nation'; 'peoples' fits the plural ethnic groups
    encountered. 'Among' suits the following phrase 'through whose midst we passed.'
- source_word: אֲשֶׁר עָבַרְנוּ בְּקִרְבָּם
  chosen: through whose midst we passed
  alternatives:
  - among whom we passed
  - in whose midst we crossed
  lexicon: HALOT
  rationale: Captures both עבר ('passed through') and בקרבם ('in their midst'). The
    phrasing is slightly elevated but clear and faithful to the Hebrew imagery.
