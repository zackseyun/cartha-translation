theological_decisions:
- issue: Referent of the second-person plural 'you'
  chosen_reading: Retained as 'you' addressing Israel corporately, including the ancestors'
    exodus generation in covenantal solidarity.
  alternative_readings:
  - Restricted strictly to the immediate audience's forefathers, paraphrased as 'your
    fathers'
  rationale: The Hebrew directly says 'I brought you out,' consistent with covenantal/corporate
    address in Joshua 24. The translation preserves the text's rhetoric rather than
    resolving it into an explanatory paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
