id: JOS.24.5
reference: Joshua 24:5
source:
  edition: WLC
  text: וָ/אֶשְׁלַ֞ח אֶת מֹשֶׁ֤ה וְ/אֶֽת אַהֲרֹן֙ וָ/אֶגֹּ֣ף אֶת מִצְרַ֔יִם כַּ/אֲשֶׁ֥ר
    עָשִׂ֖יתִי בְּ/קִרְבּ֑/וֹ וְ/אַחַ֖ר הוֹצֵ֥אתִי אֶתְ/כֶֽם־־־׃
translation:
  text: Then I sent Moses and Aaron, and I struck Egypt according to what I did in
    its midst, and afterward I brought you out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I plagued Egypt'; the Hebrew verb can mean 'struck' or 'afflicted,'
      here referring to the LORD's blows against Egypt.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to what I did in its midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  chosen: I sent
  alternatives:
  - I dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the Qal commonly means 'send.' 'I sent' is the natural
    and sufficiently formal rendering here for God's commissioning of Moses and Aaron.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: וָאֶגֹּף
  chosen: I struck
  alternatives:
  - I plagued
  - I smote
  lexicon: HALOT
  rationale: The verb נגף can denote striking, smiting, or afflicting. 'I struck'
    preserves the directness of the Hebrew without importing the more interpretive
    'plagued,' though the context is the plagues on Egypt.
- source_word: מִצְרַיִם
  chosen: Egypt
  rationale: The proper name can denote the land or people; 'Egypt' is the natural
    collective rendering in context.
- source_word: כַּאֲשֶׁר עָשִׂיתִי בְּקִרְבּוֹ
  chosen: according to what I did in its midst
  alternatives:
  - with what I did in its midst
  - as I did in the midst of it
  - by what I did among them
  lexicon: HALOT
  rationale: This clause is syntactically compressed. Rendering it as 'according to
    what I did in its midst' stays close to the Hebrew sequence while remaining intelligible.
    בְּקִרְבּוֹ is singular ('in its midst'), naturally referring to Egypt as a corporate
    entity. The clause points to God's acts within Egypt, likely the plagues.
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: אַחַר here functions adverbially/temporally. 'And afterward' preserves
    the sequence of events.
- source_word: הוֹצֵאתִי אֶתְכֶם
  chosen: I brought you out
  alternatives:
  - I led you out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out' or 'cause to go out.' 'I brought
    you out' is the standard and contextually apt rendering for the exodus.
