id: JOS.24.13
reference: Joshua 24:13
source:
  edition: WLC
  text: וָ/אֶתֵּ֨ן לָ/כֶ֜ם אֶ֣רֶץ אֲשֶׁ֧ר לֹֽא יָגַ֣עְתָּ בָּ֗/הּ וְ/עָרִים֙ אֲשֶׁ֣ר
    לֹא בְנִיתֶ֔ם וַ/תֵּשְׁב֖וּ בָּ/הֶ֑ם כְּרָמִ֤ים וְ/זֵיתִים֙ אֲשֶׁ֣ר לֹֽא נְטַעְתֶּ֔ם
    אַתֶּ֖ם אֹכְלִֽים׀־־־׃
translation:
  text: And I gave you a land on which you had not labored, and cities that you had
    not built, and you live in them. You are eating from vineyards and olive groves
    that you did not plant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'olive trees/olives'; rendered 'olive groves' to convey cultivated
      olive plantings in parallel with 'vineyards.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  chosen: And I gave
  alternatives:
  - And I have given
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of נתן narrates a past act by God in sequence; simple
    past fits the discourse.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - the land
  - country
  lexicon: HALOT
  rationale: Indefinite in form and here best rendered 'a land' as the object of divine
    gift, though contextually it is the promised land. 'Land' is more covenantally
    appropriate than 'country'.
- source_word: אֲשֶׁר לֹא יָגַעְתָּ בָּהּ
  chosen: on which you had not labored
  alternatives:
  - in which you had not labored
  - which you had not worked
  lexicon: HALOT
  rationale: יגע commonly denotes labor/toil. The preposition ב with land can be rendered
    idiomatically as laboring 'on' it. Although the morphology table marks 2ms, the
    sense in context is corporate address to Israel; English 'you' preserves this
    without forcing singular/plural distinction.
- source_word: וְעָרִים
  chosen: and cities
  alternatives:
  - and towns
  lexicon: HALOT
  rationale: עיר is most naturally 'city/cities'; 'towns' would understate the normal
    lexical value.
- source_word: אֲשֶׁר לֹא בְנִיתֶם
  chosen: that you had not built
  alternatives:
  - which you did not build
  lexicon: HALOT
  rationale: Built as a prior action relative to the gift and settlement; English
    past perfect clarifies sequence naturally.
- source_word: וַתֵּשְׁבוּ בָּהֶם
  chosen: and you live in them
  alternatives:
  - and you settled in them
  - and you dwelt in them
  lexicon: HALOT
  rationale: 'ישב can mean sit, dwell, live, settle. In this context of occupying
    gifted cities, ''live in them'' is natural modern English. The Hebrew wayyiqtol
    may be rendered with present force in a retrospective speech describing current
    result: God gave, and now Israel lives there.'
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - vine-plots
  lexicon: HALOT
  rationale: Standard rendering for כרמים.
- source_word: וְזֵיתִים
  chosen: olive groves
  alternatives:
  - olive trees
  - olives
  lexicon: HALOT
  rationale: Though literally 'olives/olive trees,' in parallel with vineyards and
    in the context of planted agricultural resources, 'olive groves' best conveys
    cultivated olive plantings as a food source.
- source_word: אֲשֶׁר לֹא נְטַעְתֶּם
  chosen: that you did not plant
  alternatives:
  - which you had not planted
  lexicon: HALOT
  rationale: נטע is 'plant.' Simple past is acceptable here because the temporal relation
    is clear from context.
- source_word: אַתֶּם אֹכְלִים
  chosen: You are eating from
  alternatives:
  - you eat from
  - you are eating
  lexicon: HALOT
  rationale: 'The pronoun plus participle gives an emphatic present/progressive sense:
    ''you yourselves are eating.'' Adding ''from'' is idiomatic in English with produce
    sources such as vineyards and olive groves.'
