theological_decisions:
- issue: Corporate second-person reference despite mixed singular/plural morphology
  chosen_reading: Render all second-person forms as English 'you' addressed to Israel
    corporately
  alternative_readings:
  - Attempt to mark the singular in 'you had not labored' with 'you [sing.]'
  rationale: The verse addresses Israel as a covenant people. English cannot naturally
    preserve the singular/plural alternation here without awkwardness, and the sense
    is corporate throughout.
  doctrine_reference: Translation philosophy §6 (readable modern English), §5 (documented
    exception/consistency)
