id: JOS.24.26
reference: Joshua 24:26
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֤ב יְהוֹשֻׁ֨עַ֙ אֶת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה בְּ/סֵ֖פֶר תּוֹרַ֣ת
    אֱלֹהִ֑ים וַ/יִּקַּח֙ אֶ֣בֶן גְּדוֹלָ֔ה וַ/יְקִימֶ֣/הָ שָּׁ֔ם תַּ֚חַת הָֽ/אַלָּ֔ה
    אֲשֶׁ֖ר בְּ/מִקְדַּ֥שׁ יְהוָֽה־׃ס
translation:
  text: And Joshua wrote these words in the Book of the Law of God, and he took a
    large stone and set it up there under the oak that was in the sanctuary of the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “under the terebinth.” The Hebrew term may refer to a terebinth rather
      than an oak.
    reason: lexical_alternative
  - marker: b
    text: Or “that was by the sanctuary of the LORD.” The Hebrew preposition can be
      understood more loosely in context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The verb כתב straightforwardly means 'wrote.' 'Recorded' is possible
    in English but less direct; the context is inscription/documentation in a book.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these matters
  lexicon: HALOT
  rationale: דברים can mean 'words,' 'matters,' or 'things.' Here, because Joshua
    is writing covenantal statements into a book, 'words' best preserves the textual
    and documentary sense.
- source_word: בְּסֵפֶר תּוֹרַת אֱלֹהִים
  chosen: in the Book of the Law of God
  alternatives:
  - in the scroll of the law of God
  - in the book of God's law
  lexicon: HALOT
  rationale: ספר is most naturally 'book' in standard English Bible style, though
    historically a scroll is possible. תורת is 'law' or 'instruction'; in this covenantal
    context 'Law' is the most established and contextually fitting rendering. The
    construct chain is preserved closely.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel in a simple genitival construction,
    so 'God' is the natural rendering.
- source_word: וַיִּקַּח אֶבֶן גְּדוֹלָה
  chosen: he took a large stone
  alternatives:
  - he took a great stone
  lexicon: HALOT
  rationale: אבן is 'stone.' גדולה can be 'great' or 'large'; 'large' is more idiomatic
    for physical size in contemporary English, while still preserving the sense.
- source_word: וַיְקִימֶהָ
  chosen: set it up
  alternatives:
  - erected it
  - raised it
  lexicon: HALOT
  rationale: The hiphil of קום here means to cause the stone to stand, i.e., to set
    it up as a standing stone or memorial. 'Set it up' is clear modern English; 'erected
    it' is possible but stiffer.
- source_word: תַּחַת הָאַלָּה
  chosen: under the oak
  alternatives:
  - under the terebinth
  lexicon: HALOT
  rationale: אַלָּה can denote a large tree often identified as terebinth; some English
    versions use 'oak.' Because the exact species is uncertain in common English usage,
    'oak' is retained in the main text for readability, while the more technical alternative
    is preserved in a footnote.
- source_word: בְּמִקְדַּשׁ יְהוָה
  chosen: in the sanctuary of the LORD
  alternatives:
  - by the sanctuary of the LORD
  - in the holy place of the LORD
  lexicon: HALOT
  rationale: מקדש denotes a holy place or sanctuary. The preposition ב can be rendered
    'in' or sometimes more loosely by context, but 'in the sanctuary' best reflects
    the Hebrew form. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD,' preserving the established reverential convention.
