theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding מקדש יהוה in relation to the tree
  chosen_reading: that was in the sanctuary of the LORD
  alternative_readings:
  - that was by the sanctuary of the LORD
  rationale: The Hebrew preposition ב normally means 'in,' and the syntax most naturally
    modifies the oak as located within the sacred precinct. Because some may find
    a tree 'in the sanctuary' unexpected, the looser spatial alternative is preserved
    as a footnote-worthy possibility, but the main text follows the plain sense of
    the Hebrew.
