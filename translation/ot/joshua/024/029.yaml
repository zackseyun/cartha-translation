id: JOS.24.29
reference: Joshua 24:29
source:
  edition: WLC
  text: וַ/יְהִ֗י אַֽחֲרֵי֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/יָּ֛מָת יְהוֹשֻׁ֥עַ בִּן נ֖וּן
    עֶ֣בֶד יְהוָ֑ה בֶּן מֵאָ֥ה וָ/עֶ֖שֶׂר שָׁנִֽים־־׃
translation:
  text: And it happened after these things that Joshua son of Nun, the servant of
    the LORD, died at the age of one hundred and ten years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after these events.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'servant of the LORD'; 'slave of the LORD' is possible lexically,
      but here the title emphasizes honored service rather than bonded status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And
    it happened' preserves the Hebrew discourse function in readable modern English
    without archaic phrasing.
- source_word: אַחֲרֵי הַדְּבָרִים הָאֵלֶּה
  chosen: after these things
  alternatives:
  - after these events
  - after these matters
  lexicon: HALOT
  rationale: A standard temporal expression. 'Things' is a straightforward rendering
    of דְּבָרִים here; 'events' would also fit, but 'after these things' stays closer
    to the Hebrew while remaining natural.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: מות plainly means 'die.' 'Passed away' would soften the statement beyond
    what the source text warrants.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: בִּן נוּן
  chosen: son of Nun
  lexicon: HALOT
  rationale: Standard filial construction identifying Joshua by lineage.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: עֶבֶד can denote servant or slave. Here it functions as an honorific
    title for Joshua in covenantal service to YHWH rather than emphasizing bonded
    status, so 'servant' is the best contextual rendering. יְהוָה follows the doctrinal
    default 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering for the
    divine name is 'the LORD,' preserving reverential convention and broad canonical
    consistency.
- source_word: בֶּן מֵאָה וָעֶשֶׂר שָׁנִים
  chosen: at the age of one hundred and ten years
  alternatives:
  - being one hundred and ten years old
  - a son of one hundred and ten years
  lexicon: HALOT
  rationale: Hebrew idiom for age. 'At the age of one hundred and ten years' renders
    the sense naturally in English while preserving the full numerical expression.
