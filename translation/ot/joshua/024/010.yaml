id: JOS.24.10
reference: Joshua 24:10
source:
  edition: WLC
  text: וְ/לֹ֥א אָבִ֖יתִי לִ/שְׁמֹ֣עַ לְ/בִלְעָ֑ם וַ/יְבָ֤רֶךְ בָּרוֹךְ֙ אֶתְ/כֶ֔ם
    וָ/אַצִּ֥ל אֶתְ/כֶ֖ם מִ/יָּדֽ/וֹ׃
translation:
  text: But I was not willing to listen to Balaam, and he repeatedly blessed you;
    so I delivered you from his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and he surely blessed you.' The Hebrew uses an emphatic
      construction ('blessing he blessed').
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיתִי
  chosen: I was not willing
  alternatives:
  - I would not
  - I refused
  lexicon: HALOT
  rationale: The verb אבה expresses willingness or consent rather than mere ability.
    'I was not willing' preserves the volitional nuance in first-person divine speech.
    'Refused' is possible, but the infinitive construction with לשמע is well represented
    by 'was not willing to listen.'
- source_word: לִשְׁמֹעַ לְבִלְעָם
  chosen: to listen to Balaam
  alternatives:
  - to hear Balaam
  - to heed Balaam
  lexicon: HALOT
  rationale: שׁמע with ל often means to listen to or heed someone. Here the sense
    is that God did not grant Balaam's intended effect by listening to him. 'Listen
    to' is natural English; 'heed' is slightly more interpretive.
- source_word: וַיְבָרֶךְ בָּרוֹךְ
  chosen: he repeatedly blessed
  alternatives:
  - he surely blessed
  - he blessed indeed
  - he could only bless
  lexicon: HALOT
  rationale: The finite verb plus cognate infinitive intensifies the action. 'Repeatedly
    blessed' captures the emphatic force in context, where Balaam's attempted cursing
    turns into multiple blessings (cf. Num 23–24). 'Surely blessed' is more formally
    literal but less idiomatic in modern English.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Second person masculine plural object, naturally rendered 'you' in English.
- source_word: וָאַצִּל
  chosen: I delivered
  alternatives:
  - I rescued
  - I saved
  lexicon: HALOT
  rationale: נצל commonly means to snatch away, rescue, or deliver. 'Delivered' fits
    the covenant-history style of Joshua 24 and avoids importing fuller soteriological
    overtones that 'saved' may suggest.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - from his power
  - from him
  lexicon: HALOT
  rationale: The idiom 'from his hand' is transparent enough in English and preserves
    the Hebrew metaphor of power/control. A more dynamic rendering like 'from his
    power' is possible but less textually direct.
