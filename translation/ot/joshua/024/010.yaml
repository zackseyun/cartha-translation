theological_decisions:
- issue: Agency in Balaam's blessing
  chosen_reading: The subject of 'he repeatedly blessed you' is Balaam, whose blessing
    is compelled/overruled by God.
  alternative_readings:
  - 'The subject is implicitly God: ''I blessed you again and again'''
  rationale: The Hebrew verb is third masculine singular following the reference to
    Balaam, making Balaam the most natural grammatical subject. The cognate infinitive
    intensifies Balaam's act of blessing, while the broader context makes clear that
    God overruled Balaam's intent. This preserves the text's wording without obscuring
    divine sovereignty.
