theological_decisions:
- issue: Rendering the conquest language without softening or expanding it
  chosen_reading: 'Retain the direct divine speech and strong verbs: ''I gave them
    into your hand ... you took possession ... I destroyed them.'''
  alternative_readings:
  - Use softer language such as 'defeated' or 'removed'
  rationale: The verse recounts YHWH's acts in Israel's conquest. The Hebrew uses
    explicit warfare and destruction language; optimal equivalence requires preserving
    that force without euphemism or doctrinal mitigation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
