id: JOS.24.8
reference: Joshua 24:8
source:
  edition: WLC
  text: ו/אבא/ה אֶתְ/כֶ֗ם אֶל אֶ֤רֶץ הָ/אֱמֹרִי֙ הַ/יּוֹשֵׁב֙ בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֔ן
    וַ/יִּֽלָּחֲמ֖וּ אִתְּ/כֶ֑ם וָ/אֶתֵּ֨ן אוֹתָ֤/ם בְּ/יֶדְ/כֶם֙ וַ/תִּֽירְשׁ֣וּ
    אֶת אַרְצָ֔/ם וָ/אַשְׁמִידֵ֖/ם מִ/פְּנֵי/כֶֽם־־׃
translation:
  text: Then I brought you into the land of the Amorites, who lived beyond the Jordan,
    and they fought with you. And I gave them into your hand, and you took possession
    of their land, and I destroyed them from before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they fought against you.' The Hebrew literally says 'they fought with
      you,' but the context shows hostile engagement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲבִיאָה
  chosen: Then I brought
  alternatives:
  - And I brought
  lexicon: HALOT
  rationale: 'From בוא in the Hiphil, first person singular: causative ''bring'' rather
    than simply ''come.'' The prefixed waw in narrative can be rendered ''and'' or
    smoothed as ''then'' in English narrative flow; ''Then I brought'' preserves sequence
    naturally.'
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct-object marker with 2mp suffix; standard English object pronoun.
- source_word: אֶל אֶרֶץ הָאֱמֹרִי
  chosen: into the land of the Amorites
  alternatives:
  - to the land of the Amorites
  lexicon: HALOT
  rationale: אֶל can be 'to/into'; with 'brought' and arrival in territory, 'into'
    is idiomatic and reflects entry. הָאֱמֹרִי is collective/singular in Hebrew but
    refers to the Amorite people; English plural ethnonym is natural.
- source_word: הַיּוֹשֵׁב בְּעֵבֶר הַיַּרְדֵּן
  chosen: who lived beyond the Jordan
  alternatives:
  - who dwelt beyond the Jordan
  - who were living across the Jordan
  lexicon: HALOT
  rationale: Participle of ישב functions attributively describing the Amorites. 'Lived'
    is readable modern English; 'beyond the Jordan' preserves the spatial expression
    without over-specifying east/west from a modern narrator's perspective.
- source_word: וַיִּלָּחֲמוּ אִתְּכֶם
  chosen: and they fought with you
  alternatives:
  - and they fought against you
  lexicon: HALOT
  rationale: לחם with עִם/אֵת can mean 'fight with/against' in the sense of engaging
    in battle. In English, 'fought with you' can mean either alongside or against,
    but here context makes hostility clear; still, the Hebrew preposition is represented
    fairly directly. The alternative is preserved in a footnote for clarity.
- source_word: וָאֶתֵּן אוֹתָם בְּיֶדְכֶם
  chosen: And I gave them into your hand
  alternatives:
  - and I delivered them into your hand
  - and I gave them into your power
  lexicon: HALOT
  rationale: נתן ביד is a common idiom for delivering enemies into someone's power.
    'Into your hand' preserves the Hebrew idiom while remaining understandable.
- source_word: וַתִּירְשׁוּ אֶת אַרְצָם
  chosen: and you took possession of their land
  alternatives:
  - and you dispossessed them of their land
  - and you inherited their land
  lexicon: HALOT
  rationale: ירש can mean inherit, possess, or dispossess depending on context. Here
    Israel receives and occupies the land after victory; 'took possession of' captures
    the result clearly without importing inheritance language not explicit in this
    clause.
- source_word: וָאַשְׁמִידֵם
  chosen: and I destroyed them
  alternatives:
  - and I exterminated them
  - and I wiped them out
  lexicon: HALOT
  rationale: From שׁמד, denoting destruction/removal. 'Destroyed' is the most standard
    and sufficiently weighty rendering in modern English.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - before you
  - from your presence
  lexicon: HALOT
  rationale: Literally 'from before your face/presence.' 'From before you' preserves
    the Hebrew idiom and the sense of removal in Israel's sight/presence.
