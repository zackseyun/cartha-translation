id: JOS.24.22
reference: Joshua 24:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹשֻׁ֜עַ אֶל הָ/עָ֗ם עֵדִ֤ים אַתֶּם֙ בָּ/כֶ֔ם כִּֽי אַתֶּ֞ם
    בְּחַרְתֶּ֥ם לָ/כֶ֛ם אֶת יְהוָ֖ה לַ/עֲבֹ֣ד אוֹת֑/וֹ וַ/יֹּאמְר֖וּ עֵדִֽים־־־׃
translation:
  text: Then Joshua said to the people, “You are witnesses against yourselves that
    you have chosen the LORD for yourselves, to serve him.” And they said, “We are
    witnesses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You are witnesses to yourselves,” that is, your own words testify to
      your choice.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם commonly refers to the assembled people. 'The people' is the most
    natural contextual rendering here.
- source_word: עֵדִים אַתֶּם בָּכֶם
  chosen: You are witnesses against yourselves
  alternatives:
  - You are witnesses to yourselves
  - You are witnesses among yourselves
  lexicon: HALOT
  rationale: The preposition ב with this idiom indicates testimony that falls back
    on the speakers themselves; in covenantal/legal context, 'against yourselves'
    best captures the self-incriminating force of their own testimony.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of the testimony: they are witnesses that they
    made this choice.'
- source_word: בְּחַרְתֶּם לָכֶם
  chosen: you have chosen ... for yourselves
  alternatives:
  - you chose ... for yourselves
  - you have chosen for yourselves
  lexicon: HALOT
  rationale: בחר with ל conveys choosing for one's own part or benefit. 'For yourselves'
    preserves the reflexive emphasis that the choice is their own.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: לַעֲבֹד אֹתוֹ
  chosen: to serve him
  alternatives:
  - to worship him
  lexicon: HALOT
  rationale: עבד in covenant contexts often includes worshipful service, but 'serve
    him' is the broader and more direct rendering, preserving both allegiance and
    worship.
- source_word: וַיֹּאמְרוּ עֵדִים
  chosen: And they said, “We are witnesses.”
  alternatives:
  - And they said, “Witnesses.”
  lexicon: HALOT
  rationale: The Hebrew reply is elliptical. Supplying 'We are' is required for idiomatic
    English and matches the implied predicate.
