theological_decisions:
- issue: Representative address to later Israel ('you came' though referring to the
    exodus generation)
  chosen_reading: 'Retain the second-person address: ''you came to the sea'''
  alternative_readings:
  - 'Shift to third person: ''they came to the sea'''
  rationale: Joshua's speech intentionally identifies the current audience with their
    forefathers in covenant history. Preserving the second person reflects the Hebrew
    discourse and avoids flattening the rhetorical force.
  doctrine_reference: Translation philosophy §3, §4
- issue: Rendering of יַם סוּף
  chosen_reading: Use 'the Red Sea' in the main text
  alternative_readings:
  - the Sea of Reeds
  rationale: This is not a doctrinally contested term in the provided table, but it
    is a significant lexical and historical translation issue. 'Red Sea' preserves
    recognizability in English Bible tradition, while the more literal alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §5
