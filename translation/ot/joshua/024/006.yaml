id: JOS.24.6
reference: Joshua 24:6
source:
  edition: WLC
  text: וָֽ/אוֹצִ֤יא אֶת אֲבֽוֹתֵי/כֶם֙ מִ/מִּצְרַ֔יִם וַ/תָּבֹ֖אוּ הַ/יָּ֑מָּ/ה וַ/יִּרְדְּפ֨וּ
    מִצְרַ֜יִם אַחֲרֵ֧י אֲבוֹתֵי/כֶ֛ם בְּ/רֶ֥כֶב וּ/בְ/פָרָשִׁ֖ים יַם סֽוּף־־׃
translation:
  text: Then I brought your fathers out from Egypt, and you came to the sea; and Egypt
    pursued your fathers with chariots and horsemen to the Red Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''the Sea of Reeds.'' Hebrew: yam suph.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹוצִיא
  chosen: Then I brought ... out
  alternatives:
  - And I brought ... out
  - I brought ... out
  lexicon: HALOT
  rationale: Hiphil of יצא means 'bring out' or 'lead out.' The prefixed waw continues
    the historical sequence; 'Then' conveys the narrative progression naturally in
    English.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Literally 'your fathers.' This is a representative ancestral reference,
    and per gender-accurate policy the masculine familial term is retained rather
    than neutralized. 'Ancestors' is possible but less formally aligned to the Hebrew.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Standard source preposition מן with place name. 'From Egypt' is concise
    and idiomatic with 'brought ... out' already expressing the exodus sense.
- source_word: וַתָּבֹאוּ הַיָּמָּה
  chosen: and you came to the sea
  alternatives:
  - and you came to the Sea
  - and you reached the sea
  lexicon: HALOT
  rationale: The verb בוא with directional ending on הים indicates movement toward
    the sea. The 2mp addresses the present audience as identified with their forefathers
    in covenant history; English preserves the direct 'you.' Lowercase 'sea' is used
    here because the specific identification follows later in the verse.
- source_word: וַיִּרְדְּפוּ מִצְרַיִם
  chosen: and Egypt pursued
  alternatives:
  - and the Egyptians pursued
  lexicon: HALOT
  rationale: Although the verb is plural, the subject is the collective proper noun
    'Egypt,' a common metonymy for the Egyptian forces/people. Rendering 'Egypt' preserves
    the Hebrew wording while remaining intelligible in English.
- source_word: אַחֲרֵי
  chosen: pursued ... with ... to
  alternatives:
  - after
  - behind
  lexicon: HALOT
  rationale: The preposition literally means 'after/behind,' but in English the sense
    is naturally absorbed into the verb 'pursued.' The destination phrase is then
    expressed separately.
- source_word: בְּרֶכֶב
  chosen: with chariots
  alternatives:
  - in chariots
  - with chariotry
  lexicon: HALOT
  rationale: רכב here denotes chariot forces. 'With chariots' is clear modern English
    and reflects the military accompaniment.
- source_word: וּבְפָרָשִׁים
  chosen: and horsemen
  alternatives:
  - and cavalry
  lexicon: HALOT
  rationale: פָּרָשִׁים refers to horsemen/horse troops. 'Horsemen' is the more literal
    and biblically transparent rendering.
- source_word: יַם סוּף
  chosen: the Red Sea
  alternatives:
  - the Sea of Reeds
  lexicon: HALOT
  rationale: The traditional rendering 'Red Sea' is widely recognized and fits the
    canonical event reference. However, the Hebrew term more literally denotes 'Sea
    of Reeds,' so that alternative is preserved in a footnote for transparency.
