theological_decisions:
- issue: Whether הַצִּרְעָה should be translated literally or interpreted as a metaphor
    for divinely sent terror
  chosen_reading: Translate literally as 'the hornet' in the main text
  alternative_readings:
  - Translate interpretively as 'panic' or 'terror'
  rationale: Optimal equivalence favors preserving the lexical form unless the context
    plainly demands a figurative rendering. The verse emphasizes Yahweh's agency in
    driving out Israel's enemies; that theological point stands without replacing
    the concrete noun with an interpretation. A footnote preserves the metaphorical
    possibility for auditability.
  doctrine_reference: Translation philosophy §1, §3, §5
