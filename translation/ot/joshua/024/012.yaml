id: JOS.24.12
reference: Joshua 24:12
source:
  edition: WLC
  text: וָ/אֶשְׁלַ֤ח לִ/פְנֵי/כֶם֙ אֶת הַ/צִּרְעָ֔ה וַ/תְּגָ֤רֶשׁ אוֹתָ/ם֙ מִ/פְּנֵי/כֶ֔ם
    שְׁנֵ֖י מַלְכֵ֣י הָ/אֱמֹרִ֑י לֹ֥א בְ/חַרְבְּ/ךָ֖ וְ/לֹ֥א בְ/קַשְׁתֶּֽ/ךָ־׃
translation:
  text: And I sent the hornet ahead of you, and it drove them out before you—the two
    kings of the Amorites—not by your sword and not by your bow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly a figurative expression for divinely sent panic or terror rather
      than literal hornets.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  chosen: And I sent
  alternatives:
  - Then I sent
  - I sent
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of שׁלח, narrating Yahweh's past action. 'And I sent'
    preserves the sequential force without overinterpreting temporal nuance.
- source_word: לִפְנֵיכֶם
  chosen: ahead of you
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' In English, 'ahead of you' naturally
    conveys prior movement while fitting the military context.
- source_word: הַצִּרְעָה
  chosen: the hornet
  alternatives:
  - the swarm of hornets
  - terror
  lexicon: HALOT
  rationale: The noun denotes 'hornet.' The singular with article is best kept as
    a collective or representative singular in English. Some interpret it metaphorically
    for panic or divinely sent terror, but the lexical sense is 'hornet,' and interpretation
    should not replace translation.
- source_word: וַתְּגָרֶשׁ
  chosen: and it drove them out
  alternatives:
  - and it expelled them
  - and it drove them away
  lexicon: HALOT
  rationale: גרשׁ commonly means 'drive out/expel.' The 3fs verb agrees with the feminine
    singular subject 'the hornet,' so 'it drove them out' preserves the grammar and
    action.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - from your presence
  lexicon: HALOT
  rationale: The idiom with גרשׁ means removal from the Israelites' presence. 'Before
    you' is idiomatic and concise in English, while still reflecting the Hebrew expression.
- source_word: שְׁנֵי מַלְכֵי הָאֱמֹרִי
  chosen: the two kings of the Amorites
  alternatives:
  - the two Amorite kings
  lexicon: HALOT
  rationale: Both are accurate; the chosen rendering stays close to the construct
    chain while remaining natural English. The phrase likely identifies the specific
    defeated Amorite rulers east of the Jordan.
- source_word: לֹא בְחַרְבְּךָ
  chosen: not by your sword
  alternatives:
  - not with your sword
  lexicon: HALOT
  rationale: The preposition ב here is instrumental. 'By your sword' clearly expresses
    means/instrument and preserves the singular address.
- source_word: וְלֹא בְקַשְׁתֶּךָ
  chosen: and not by your bow
  alternatives:
  - nor by your bow
  - not with your bow
  lexicon: HALOT
  rationale: Parallel instrumental phrase. 'And not by your bow' mirrors the Hebrew
    structure and keeps the rhetorical emphasis that Israel's victory was not achieved
    by its own military power.
