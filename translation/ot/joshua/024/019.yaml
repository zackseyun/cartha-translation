id: JOS.24.19
reference: Joshua 24:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹשֻׁ֜עַ אֶל הָ/עָ֗ם לֹ֤א תֽוּכְלוּ֙ לַ/עֲבֹ֣ד אֶת יְהוָ֔ה כִּֽי אֱלֹהִ֥ים קְדֹשִׁ֖ים ה֑וּא אֵֽל קַנּ֣וֹא ה֔וּא לֹֽא יִשָּׂ֥א לְ/פִשְׁעֲ/כֶ֖ם וּ/לְ/חַטֹּאותֵי/כֶֽם־־־־־׃
translation:
  text: And Joshua said to the people, “You are not able to serve Yahweh, for he is a holy God; he is a jealous God. He will not forgive your transgressions and your sins.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''holy God,'' with plural morphology in the words for ''God'' and ''holy'' but singular sense: literally, ''Gods holy he.'' The singular pronoun shows the reference is to the one God of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He will not bear/carry away your transgressions and your sins.' The Hebrew idiom is commonly used for forgiveness.
    reason: alternative_reading
lexical_decisions:
- source_word: תֽוּכְלוּ
  chosen: are not able
  alternatives:
  - cannot
  lexicon: HALOT
  rationale: The verb from יכל denotes ability/capacity. 'Are not able' preserves the force of incapacity more explicitly than the contracted 'cannot,' while remaining natural English.
- source_word: לַעֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  lexicon: HALOT
  rationale: עבד commonly means 'serve' and in covenantal contexts includes worshipful service. 'Serve' best preserves the broader covenantal sense without narrowing it to cultic worship alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים קְדֹשִׁים הוּא
  chosen: he is a holy God
  alternatives:
  - he is holy God
  - he is holy gods
  - he is a holy God
  lexicon: HALOT
  rationale: 'Although אֱלֹהִים and קְדֹשִׁים are morphologically plural, the accompanying pronoun הוּא is singular and the referent is Israel''s God. The plural adjective/noun combination is best understood as an intensive/plural-of-majesty expression, so idiomatic English singular is required: ''a holy God.'''
- source_word: אֵל קַנּוֹא
  chosen: a jealous God
  alternatives:
  - a zealous God
  lexicon: HALOT
  rationale: קַנּוֹא in covenant contexts denotes God's exclusive claim and intolerance of rival allegiance. 'Jealous' is the standard and most transparent rendering in English; 'zealous' weakens the relational exclusivity in view.
- source_word: לֹא יִשָּׂא
  chosen: he will not forgive
  alternatives:
  - he will not bear
  - he will not carry away
  lexicon: HALOT
  rationale: נשא with sins/transgressions can mean to bear away or forgive. In this context Joshua warns the people that God will not simply overlook covenant rebellion; 'forgive' communicates the idiomatic sense clearly in modern English.
- source_word: פִשְׁעֲכֶם
  chosen: your transgressions
  alternatives:
  - your rebellions
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or transgression against authority. 'Transgressions' is a clear, established rendering that pairs well with the following 'sins' while preserving the covenant-violation nuance.
- source_word: חַטֹּאותֵיכֶם
  chosen: your sins
  alternatives:
  - your offenses
  lexicon: HALOT
  rationale: חטאת is the common term for sin/missing the mark. 'Sins' is the most direct and consistent English equivalent.
