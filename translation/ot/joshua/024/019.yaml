theological_decisions:
- issue: Plural forms for God's holiness (אֱלֹהִים קְדֹשִׁים) with singular pronoun
  chosen_reading: 'Render as singular: ''he is a holy God'''
  alternative_readings:
  - '''he is holy gods'' (overly literal and misleading in English)'
  - '''he is a holy God'' with note on plural morphology'
  rationale: The singular pronoun הוּא governs the sense, and orthodox monotheistic context in Joshua requires singular reference. The plural morphology is retained in documentation rather than reproduced woodenly in English, which would falsely suggest polytheism.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Meaning of God's refusal to 'bear' sins
  chosen_reading: Interpret idiomatically as refusal to forgive
  alternative_readings:
  - refusal to bear/carry your transgressions and sins
  rationale: The Hebrew idiom נשא with sin language commonly expresses forgiveness. In this warning context, the point is not that God physically bears sin but that he will not pardon covenant infidelity lightly.
  doctrine_reference: 'Translation philosophy #6'
