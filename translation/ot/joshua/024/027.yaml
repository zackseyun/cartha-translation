id: JOS.24.27
reference: Joshua 24:27
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹשֻׁ֜עַ אֶל כָּל הָ/עָ֗ם הִנֵּ֨ה הָ/אֶ֤בֶן הַ/זֹּאת֙ תִּֽהְיֶה בָּ֣/נוּ לְ/עֵדָ֔ה כִּֽי הִ֣יא שָׁמְעָ֗ה אֵ֚ת כָּל אִמְרֵ֣י יְהוָ֔ה אֲשֶׁ֥ר דִּבֶּ֖ר עִמָּ֑/נוּ וְ/הָיְתָ֤ה בָ/כֶם֙ לְ/עֵדָ֔ה פֶּֽן תְּכַחֲשׁ֖וּ/ן בֵּ/אלֹהֵי/כֶֽם־־־־־־׃
translation:
  text: And Joshua said to all the people, “Look, this stone will be a witness against us, for it has heard all the words of Yahweh that he spoke with us. And it will be a witness against you, lest you deny your God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a witness for us' / 'to us'; the Hebrew preposition can be taken more neutrally, but in context the sense is that the stone stands as testimony against covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has heard'—the stone is personified as a witness to the covenant words.
    reason: cultural_note
  - marker: c
    text: Or 'deal falsely with your God' or 'prove false to your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Rendered with a natural modern deictic/interjection that preserves the force of drawing attention without archaic tone.
- source_word: הָאֶבֶן הַזֹּאת
  chosen: this stone
  alternatives:
  - this rock
  lexicon: HALOT
  rationale: אֶבֶן normally denotes 'stone'; 'rock' would sound larger and less precise in this covenant-marker context.
- source_word: תִּהְיֶה ... לְעֵדָה
  chosen: will be a witness
  alternatives:
  - shall be a witness
  - will serve as a witness
  lexicon: HALOT
  rationale: Keeps the covenant-legal sense of עֵדָה here as testimonial witness. 'Will be' is straightforward English for the Hebrew verb היה with predicate noun.
- source_word: בָּנוּ
  chosen: against us
  alternatives:
  - for us
  - to us
  lexicon: HALOT
  rationale: 'With היה לְעֵדָה plus ב, the sense in context is adversative/testimonial: the stone stands as witness concerning or against the parties if they violate the covenant. ''Against us'' best captures the warning force.'
- source_word: שָׁמְעָה
  chosen: has heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English. The text personifies the stone as hearing the covenant words.
- source_word: כָּל אִמְרֵי יְהוָה
  chosen: all the words of the LORD
  alternatives:
  - all the sayings of the LORD
  - all the utterances of the LORD
  lexicon: HALOT
  rationale: אִמְרֵי can mean sayings/utterances, but 'words' is idiomatic and fits covenant speech. YHWH follows doctrine default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, preserving reverential convention and standard English Bible usage.
- source_word: אֲשֶׁר דִּבֶּר עִמָּנוּ
  chosen: that he spoke with us
  alternatives:
  - which he spoke to us
  - that he spoke to us
  lexicon: HALOT
  rationale: The preposition עִם is most naturally 'with' here, reflecting covenant dialogue rather than one-way address.
- source_word: וְהָיְתָה בָכֶם לְעֵדָה
  chosen: And it will be a witness against you
  alternatives:
  - And it will be a witness to you
  - And it will be a witness among you
  lexicon: HALOT
  rationale: As earlier with בָּנוּ, בָכֶם is rendered adversatively in this covenant-warning setting. Repeating 'witness' preserves the Hebrew repetition.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that you may not
  - otherwise
  lexicon: HALOT
  rationale: '''Lest'' concisely preserves the warning/preventive force of פֶּן.'
- source_word: תְּכַחֲשׁוּן
  chosen: you deny
  alternatives:
  - you deal falsely with
  - you prove false to
  - you lie against
  lexicon: HALOT
  rationale: כחש in this context conveys denial/disowning in relation to God and covenant commitment. 'Deny' is clear, solemn, and fits the immediate warning.
- source_word: בֵּאלֹהֵיכֶם
  chosen: your God
  alternatives:
  - to your God
  - against your God
  lexicon: HALOT
  rationale: The preposition ב with כחש can mark the object of denial or false dealing. English idiom prefers 'deny your God' rather than a more wooden prepositional rendering.
