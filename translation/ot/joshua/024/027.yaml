theological_decisions:
- issue: Personification of the stone as hearing and witnessing
  chosen_reading: Retain the personified language literally
  alternative_readings:
  - Interpret non-literally as a symbolic memorial without explicit personification in translation
  rationale: The Hebrew explicitly says the stone 'has heard' and 'will be a witness.' Preserving this rhetoric respects the covenant-ceremony setting and avoids flattening the text into paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve what the source text says without paraphrastic reduction.'
