theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH. This preserves established reverential convention without making a claim
    about exact ancient pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Ancestral designation אֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is specifically masculine plural and refers to forefathers.
    Per the project's gender-accurate principle, the translation keeps the masculine
    form rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
