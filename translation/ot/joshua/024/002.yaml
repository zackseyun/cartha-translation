id: JOS.24.2
reference: Joshua 24:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹשֻׁ֜עַ אֶל כָּל הָ/עָ֗ם כֹּֽה אָמַ֣ר יְהוָה֮ אֱלֹהֵ֣י יִשְׂרָאֵל֒
    בְּ/עֵ֣בֶר הַ/נָּהָ֗ר יָשְׁב֤וּ אֲבֽוֹתֵי/כֶם֙ מֵֽ/עוֹלָ֔ם תֶּ֛רַח אֲבִ֥י אַבְרָהָ֖ם
    וַ/אֲבִ֣י נָח֑וֹר וַ/יַּעַבְד֖וּ אֱלֹהִ֥ים אֲחֵרִֽים־־־׃
translation:
  text: 'And Joshua said to all the people, “Thus says the LORD, the God of Israel:
    Long ago your fathers lived beyond the River—Terah, the father of Abraham and
    the father of Nahor—and they served other gods.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “across the River,” likely referring to the Euphrates.
    reason: cultural_note
  - marker: b
    text: Hebrew “your fathers”; that is, your forefathers or ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing the next event in sequence.
    'And ... said' preserves Hebrew narrative flow without overinterpreting temporal
    nuance.
- source_word: אֶל כָּל הָעָם
  chosen: to all the people
  alternatives:
  - to all the nation
  lexicon: HALOT
  rationale: עָם here refers to the gathered covenant community. 'People' is the most
    natural and contextually accurate English rendering.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. Present-tense 'says' is idiomatic
    in English for direct divine speech formulas, even when introduced by past narrative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally. 'The God of Israel' is
    the standard, clear rendering.
- source_word: בְּעֵבֶר הַנָּהָר
  chosen: beyond the River
  alternatives:
  - across the River
  - on the other side of the River
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side/region beyond; הַנָּהָר likely refers to the
    Euphrates by convention. 'Beyond the River' preserves the Hebrew expression and
    its geographic orientation.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates River
  lexicon: HALOT
  rationale: The Hebrew uses the common noun with article, not the proper name. Capitalizing
    'River' signals a known major river while avoiding overtranslation in the main
    text.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: While the verb can mean 'sit, dwell, inhabit,' 'lived' is natural modern
    English and fits ancestral residence in this historical summary.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/plural 'fathers.' In keeping with
    the project's gender-accurate principle, the main text preserves 'fathers,' though
    the sense is ancestral.
- source_word: מֵעוֹלָם
  chosen: Long ago
  alternatives:
  - from ancient times
  - from of old
  lexicon: HALOT
  rationale: In this context עוֹלָם points to antiquity rather than metaphysical eternity.
    'Long ago' communicates the temporal sense clearly in modern English.
- source_word: תֶּרַח אֲבִי אַבְרָהָם וַאֲבִי נָחוֹר
  chosen: Terah, the father of Abraham and the father of Nahor
  alternatives:
  - Terah, father of Abraham and Nahor
  lexicon: HALOT
  rationale: The repeated construct אֲבִי ... וַאֲבִי is represented explicitly. English
    could compress the phrase, but retaining both occurrences better reflects the
    Hebrew structure.
- source_word: וַיַּעַבְדוּ
  chosen: and they served
  alternatives:
  - and they worshiped
  lexicon: HALOT
  rationale: עבד with gods commonly means religious service/worship. 'Served' is more
    formally aligned with the Hebrew and leaves the cultic sense intact.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The adjective אֲחֵרִים means 'other.' 'Other gods' is the direct and
    standard rendering; 'foreign gods' would add a nuance not explicit in this wording.
