id: JOS.24.25
reference: Joshua 24:25
source:
  edition: WLC
  text: וַ/יִּכְרֹ֨ת יְהוֹשֻׁ֧עַ בְּרִ֛ית לָ/עָ֖ם בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יָּ֥שֶׂם
    ל֛/וֹ חֹ֥ק וּ/מִשְׁפָּ֖ט בִּ/שְׁכֶֽם׃
translation:
  text: So Joshua made a covenant with the people on that day, and there in Shechem
    he set for them a statute and an ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he established for them a statute and a judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרֹת
  chosen: made
  alternatives:
  - cut
  - made a covenant
  lexicon: HALOT
  rationale: The idiom כרת ברית is literally 'cut a covenant,' but in natural English
    the established equivalent is 'make a covenant.' 'Cut' would be more formally
    literal yet potentially opaque without explanatory burden.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: בְּרִית in Israel's theological and legal context is best rendered 'covenant,'
    preserving both relational and binding dimensions stronger than 'agreement' or
    merely political 'treaty.'
- source_word: לָעָם
  chosen: with the people
  alternatives:
  - for the people
  lexicon: HALOT
  rationale: 'Although the preposition is ל, with כרת ברית the sense is relational:
    Joshua made a covenant involving the people as covenant partners. English idiom
    prefers ''with the people.'''
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On that day' preserves the preposition
    and reads naturally.
- source_word: וַיָּשֶׂם
  chosen: set
  alternatives:
  - placed
  - established
  lexicon: HALOT
  rationale: The verb שׂים is broad ('put, set, place'). Here it introduces the imposition
    or establishment of legal norms. 'Set' preserves the Hebrew's simplicity while
    fitting the legal objects that follow.
- source_word: לוֹ
  chosen: for them
  alternatives:
  - for it
  - for him
  lexicon: HALOT
  rationale: The consonantal form is singular, but in context it refers back collectively
    to עָם ('people') as a corporate singular. English idiom requires the distributive/plural
    sense 'for them' rather than the awkward 'for it.'
- source_word: חֹק
  chosen: statute
  alternatives:
  - decree
  - prescription
  lexicon: HALOT
  rationale: חֹק commonly denotes a prescribed enactment or fixed statute. 'Statute'
    preserves the legal flavor and pairs well with מִשְׁפָּט.
- source_word: וּמִשְׁפָּט
  chosen: ordinance
  alternatives:
  - judgment
  - rule
  - justice
  lexicon: HALOT
  rationale: In this legal setting, מִשְׁפָּט refers to a judicial ordinance or legal
    ruling rather than abstract 'justice.' 'Ordinance' gives a clear legal sense and
    forms a natural pair with 'statute.'
- source_word: בִּשְׁכֶם
  chosen: there in Shechem
  alternatives:
  - in Shechem
  lexicon: HALOT
  rationale: The location is important as the covenant-renewal setting. Adding 'there'
    is a light discourse-sensitive expansion reflecting the narrative scene and linking
    the legal act to the place just mentioned, without altering meaning.
