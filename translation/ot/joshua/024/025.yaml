theological_decisions:
- issue: Nature of Joshua's covenant action
  chosen_reading: Joshua made a covenant with the people
  alternative_readings:
  - Joshua cut a covenant for the people
  - Joshua renewed the covenant on behalf of the people
  rationale: The Hebrew states Joshua as the acting subject in covenant-making language
    without explicitly restating the LORD as covenant party in this verse. The translation
    preserves the text's surface wording and does not import a fuller theological
    explanation into the main text. Alternatives are possible interpretive expansions
    from the broader context but are not required by this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
