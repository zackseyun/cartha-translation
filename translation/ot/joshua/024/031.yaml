id: JOS.24.31
reference: Joshua 24:31
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֤ד יִשְׂרָאֵל֙ אֶת יְהוָ֔ה כֹּ֖ל יְמֵ֣י יְהוֹשֻׁ֑עַ וְ/כֹ֣ל יְמֵ֣י הַ/זְּקֵנִ֗ים אֲשֶׁ֨ר הֶאֱרִ֤יכוּ יָמִים֙ אַחֲרֵ֣י יְהוֹשֻׁ֔עַ וַ/אֲשֶׁ֣ר יָדְע֗וּ אֵ֚ת כָּל מַעֲשֵׂ֣ה יְהוָ֔ה אֲשֶׁ֥ר עָשָׂ֖ה לְ/יִשְׂרָאֵֽל־׀־׃
translation:
  text: Israel served Yahweh all the days of Joshua, and all the days of the elders who outlived Joshua and who had known all the work of Yahweh that he had done for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the acts of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹד
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: The verb עבד with YHWH as object commonly denotes serving in covenantal allegiance, which can include worship but is broader than cultic worship alone. 'Served' preserves that breadth and matches the narrative context of covenant fidelity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout the lifetime of
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for the temporal expression and preserves the Hebrew structure clearly in English.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  - the leaders
  lexicon: HALOT
  rationale: '''Elders'' is the natural rendering for זקנים in Israelite communal context, carrying both age and recognized leadership/status without over-specifying either.'
- source_word: הֶאֱרִיכוּ יָמִים אַחֲרֵי יְהוֹשֻׁעַ
  chosen: outlived Joshua
  alternatives:
  - lived many days after Joshua
  - prolonged days after Joshua
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to lengthening days after Joshua, meaning they survived beyond him. 'Outlived Joshua' is concise, idiomatic English that accurately conveys the sense.
- source_word: יָדְעוּ
  chosen: had known
  alternatives:
  - knew
  - had experienced
  lexicon: HALOT
  rationale: The perfect relative clause refers to the elders as those who had personal knowledge of the LORD's acts. 'Had known' fits the retrospective sense in English better than a simple present-like 'knew.'
- source_word: כָּל מַעֲשֵׂה יְהוָה
  chosen: all the work of the LORD
  alternatives:
  - all the deeds of the LORD
  - all the acts of the LORD
  lexicon: HALOT
  rationale: מַעֲשֶׂה can mean work, deed, or act. 'Work' is a close formal rendering, while still natural in English. Because 'acts' is also plausible and common in this context, it is preserved in a footnote.
- source_word: עָשָׂה לְיִשְׂרָאֵל
  chosen: he had done for Israel
  alternatives:
  - he had done to Israel
  - he had accomplished for Israel
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for,' indicating beneficial action on Israel's behalf in context. 'Done for Israel' communicates that sense naturally.
