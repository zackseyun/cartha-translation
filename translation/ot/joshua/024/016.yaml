  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Idiomatic force of חָלִילָה
  chosen_reading: Far be it from us
  alternative_readings:
  - God forbid
  rationale: The Hebrew expresses emphatic rejection, but does not explicitly name God. 'Far be it from us' preserves the force while avoiding addition beyond the source text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
