theological_decisions:
- issue: Agency in Israel's victory
  chosen_reading: 'The verse explicitly attributes victory to God: ''I gave them into
    your hand.'''
  rationale: The translation preserves the first-person divine speech and the conquest
    idiom without softening it into mere permission or providential allowance.
