id: JOS.24.33
reference: Joshua 24:33
source:
  edition: WLC
  text: וְ/אֶלְעָזָ֥ר בֶּֽן אַהֲרֹ֖ן מֵ֑ת וַ/יִּקְבְּר֣וּ אֹת֗/וֹ בְּ/גִבְעַת֙ פִּֽינְחָ֣ס
    בְּנ֔/וֹ אֲשֶׁ֥ר נִתַּן ל֖/וֹ בְּ/הַ֥ר אֶפְרָֽיִם־־׃
translation:
  text: And Eleazar the son of Aaron died, and they buried him at Gibeath-phinehas,
    his son’s hill country, which had been given to him in the hill country of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the hill of Phinehas his son,' taking the phrase as a descriptive
      expression rather than preserving the place name by transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶלְעָזָר
  chosen: And Eleazar
  alternatives:
  - Now Eleazar
  lexicon: HALOT
  rationale: The conjunction waw is rendered simply as 'And' to continue the narrative.
    The personal name is transliterated per translation philosophy.
- source_word: בֶּן אַהֲרֹן
  chosen: the son of Aaron
  alternatives:
  - son of Aaron
  lexicon: HALOT
  rationale: A straightforward filial construction. Including 'the' fits natural English
    narrative style without changing meaning.
- source_word: מֵת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: The qatal form here reports the event of death, so 'died' is the natural
    English rendering.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: and they buried him
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Hebrew uses a 3rd person plural active verb with object suffix. English
    commonly uses the indefinite active 'they buried him' for an unspecified subject;
    this preserves the Hebrew better than converting to passive.
- source_word: בְּגִבְעַת פִּינְחָס
  chosen: at Gibeath-phinehas
  alternatives:
  - at the hill of Phinehas
  - at Gibeah of Phinehas
  lexicon: HALOT
  rationale: The construct phrase is likely a place name derived from 'hill of Phinehas.'
    Because it functions as a toponym, transliteration best preserves the place-name
    force while avoiding over-interpretation.
- source_word: בְּנוֹ
  chosen: his son’s
  alternatives:
  - his son
  lexicon: HALOT
  rationale: The suffix refers to Phinehas as Eleazar's son. In English, making the
    possessive relation explicit clarifies that the place belonged to or was associated
    with his son.
- source_word: אֲשֶׁר נִתַּן לוֹ
  chosen: which had been given to him
  alternatives:
  - which was given to him
  lexicon: HALOT
  rationale: The relative clause modifies the burial location/estate associated with
    Phinehas. The passive of נתן is naturally rendered 'had been given,' with past
    perfect smoothing the sequence in English narrative.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in Mount Ephraim
  - in the mountains of Ephraim
  lexicon: HALOT
  rationale: This phrase commonly denotes the upland region of Ephraim rather than
    a single mountain. 'Hill country of Ephraim' is idiomatic and geographically accurate.
