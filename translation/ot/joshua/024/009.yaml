id: JOS.24.9
reference: Joshua 24:9
source:
  edition: WLC
  text: וַ/יָּ֨קָם בָּלָ֤ק בֶּן צִפּוֹר֙ מֶ֣לֶךְ מוֹאָ֔ב וַ/יִּלָּ֖חֶם בְּ/יִשְׂרָאֵ֑ל
    וַ/יִּשְׁלַ֗ח וַ/יִּקְרָ֛א לְ/בִלְעָ֥ם בֶּן בְּע֖וֹר לְ/קַלֵּ֥ל אֶתְ/כֶֽם־־׃
translation:
  text: Then Balak son of Zippor, king of Moab, arose and fought against Israel. He
    sent and called Balaam son of Beor to curse you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose up.' The Hebrew verb can mark the beginning of decisive action.
    reason: lexical_alternative
  - marker: b
    text: Or 'made war on Israel' or 'went to war with Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - rose up
  - stood up
  lexicon: HALOT
  rationale: The verb קום in narrative often marks taking action or rising up. 'Arose'
    preserves the formal narrative movement without overinterpreting it as merely
    physical standing or as an idiom like 'set out.'
- source_word: וַיִּלָּחֶם בְּיִשְׂרָאֵל
  chosen: fought against Israel
  alternatives:
  - made war on Israel
  - went to war with Israel
  lexicon: HALOT
  rationale: לחם with ב marks hostile engagement. 'Fought against' is clear modern
    English and reflects the adversative sense better than the more ambiguous 'fought
    with.'
- source_word: וַיִּשְׁלַח וַיִּקְרָא
  chosen: He sent and called
  alternatives:
  - he sent for and summoned
  - he sent and summoned
  lexicon: HALOT
  rationale: The Hebrew uses two sequential verbs, 'sent' and 'called.' Retaining
    both respects the source text's cadence. 'Called' is sufficiently natural; 'sent
    for' is interpretive and could obscure the two-verb sequence.
- source_word: לְבִלְעָם בֶּן בְּעוֹר
  chosen: Balaam son of Beor
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
- source_word: לְקַלֵּל אֶתְכֶם
  chosen: to curse you
  alternatives:
  - to pronounce a curse on you
  - to denounce you with a curse
  lexicon: HALOT
  rationale: קלל in this context refers to invoking a curse. 'To curse you' is the
    most direct and natural rendering, preserving the hostile intent without expansion.
