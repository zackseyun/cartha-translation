theological_decisions:
- issue: Historical wording that Balak 'fought against Israel' in light of Numbers
    emphasizing his attempt to curse Israel through Balaam
  chosen_reading: Retain the plain sense 'fought against Israel' as stated in Joshua's
    summary speech.
  alternative_readings:
  - understood 'fought' more loosely as 'acted hostilely against Israel'
  - harmonized to 'prepared to fight' or omitted direct combat language
  rationale: The Hebrew explicitly says וַיִּלָּחֶם בְּיִשְׂרָאֵל. The translation
    should not smooth away the wording to harmonize with another passage. Any broader
    canonical tension belongs to interpretation, not to altering the translation.
  doctrine_reference: Translation philosophy §1, §3
