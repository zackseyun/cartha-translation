id: JOS.24.14
reference: Joshua 24:14
source:
  edition: WLC
  text: וְ/עַתָּ֞ה יְר֧אוּ אֶת יְהוָ֛ה וְ/עִבְד֥וּ אֹת֖/וֹ בְּ/תָמִ֣ים וּ/בֶֽ/אֱמֶ֑ת וְ/הָסִ֣ירוּ אֶת אֱלֹהִ֗ים אֲשֶׁר֩ עָבְד֨וּ אֲבוֹתֵי/כֶ֜ם בְּ/עֵ֤בֶר הַ/נָּהָר֙ וּ/בְ/מִצְרַ֔יִם וְ/עִבְד֖וּ אֶת יְהוָֽה־־־׃
translation:
  text: Now fear Yahweh and serve him with integrity and faithfulness, and put away the gods that your fathers served beyond the River and in Egypt, and serve Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, beyond the Euphrates River.
    reason: cultural_note
  - marker: b
    text: Or 'with integrity and faithfulness'; the Hebrew terms convey wholeness, sincerity, truth, and reliability.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing Joshua's exhortation and conclusion from the preceding historical recital. 'Now' is natural modern English; 'And now' is possible but not necessary in English style.
- source_word: יְרָאוּ
  chosen: fear
  alternatives:
  - revere
  lexicon: HALOT
  rationale: The imperative calls for covenantal fear of God. 'Fear' preserves the theological weight and common biblical idiom better than the softer 'revere,' while still allowing reverential obedience in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the stated doctrine guidance.
- source_word: וְעִבְדוּ אֹתוֹ
  chosen: serve him
  alternatives:
  - worship him
  lexicon: HALOT
  rationale: עבד in covenant contexts can include worshipful service, but 'serve' best preserves the broader sense of allegiance and obedience, and matches the repeated imperative later in the verse.
- source_word: בְּתָמִים
  chosen: with integrity
  alternatives:
  - blamelessly
  - with wholeheartedness
  lexicon: HALOT
  rationale: תמים here describes undivided, complete devotion rather than sinless perfection. 'With integrity' communicates wholeness and sincerity in idiomatic English without overstating moral flawlessness.
- source_word: וּבֶאֱמֶת
  chosen: and truth
  alternatives:
  - and faithfulness
  - in truth
  lexicon: HALOT
  rationale: אמת can denote truth, reliability, or faithfulness. 'Truth' preserves the lexical core and yields the natural phrase 'with integrity and truth.' 'Faithfulness' is possible, but the paired expression here emphasizes sincere, genuine covenant service.
- source_word: וְהָסִירוּ
  chosen: put away
  alternatives:
  - remove
  - cast aside
  lexicon: HALOT
  rationale: An imperative to get rid of rival deities. 'Put away' is standard biblical English and clear in modern usage.
- source_word: אֱלֹהִים
  chosen: the gods
  alternatives:
  - the foreign gods
  lexicon: HALOT
  rationale: The Hebrew says simply 'gods' without an explicit adjective. 'Foreign gods' is interpretive and should not be imported into the main text.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, referring to forefathers. Per project guidance, gender-accurate rendering is preferred over neutralizing to 'ancestors' unless context requires it.
- source_word: בְּעֵבֶר הַנָּהָר
  chosen: beyond the River
  alternatives:
  - across the River
  - beyond the Euphrates River
  lexicon: HALOT
  rationale: A conventional geographical expression referring to the region beyond the Euphrates from Israel's perspective. 'Beyond the River' is the plain sense; identifying it as Euphrates is helpful but interpretive, so preserved in a footnote rather than main text.
- source_word: וּבְמִצְרַיִם
  chosen: and in Egypt
  lexicon: HALOT
  rationale: Straightforward locative phrase.
- source_word: וְעִבְדוּ אֶת יְהוָה
  chosen: and serve the LORD
  alternatives:
  - but serve the LORD
  lexicon: HALOT
  rationale: The repeated imperative forms an inclusio and rhetorical emphasis. Hebrew waw here is adequately represented by 'and'; English does not require adversative 'but,' though the contrast is contextually evident.
