theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to soften 'fear' into 'revere'
  chosen_reading: fear the LORD
  alternative_readings:
  - revere the LORD
  rationale: The verse calls for covenantal reverence expressed in obedience, but the Hebrew verb is the standard term for fear of God. Preserving 'fear' maintains biblical theological tension rather than resolving it into a less forceful modern equivalent.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Whether to neutralize 'your fathers' to 'your ancestors'
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew explicitly uses a masculine familial term. The referent is representative forefathers, but the project prefers gender-accurate renderings matching the source form and intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 Gender-accurate over gender-neutral
