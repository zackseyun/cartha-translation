id: JOS.24.18
reference: Joshua 24:18
source:
  edition: WLC
  text: וַ/יְגָ֨רֶשׁ יְהוָ֜ה אֶת כָּל הָ/עַמִּ֗ים וְ/אֶת הָ/אֱמֹרִ֛י יֹשֵׁ֥ב הָ/אָ֖רֶץ מִ/פָּנֵ֑י/נוּ גַּם אֲנַ֨חְנוּ֙ נַעֲבֹ֣ד אֶת יְהוָ֔ה כִּי ה֖וּא אֱלֹהֵֽי/נוּ־־־־־־׃ס
translation:
  text: And Yahweh drove out from before us all the peoples, including the Amorites who lived in the land. We also will serve Yahweh, for he is our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the Amorites who inhabited the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  chosen: drove out
  alternatives:
  - dispossessed
  - expelled
  lexicon: HALOT
  rationale: The verb גרש commonly denotes driving out or expelling. 'Drove out' is natural English and preserves the force of removal without overinterpreting military nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all the nations
  - all the people groups
  lexicon: HALOT
  rationale: עמים here refers to multiple surrounding ethnic groups rather than a single populace. 'Peoples' preserves the plural and ethnic-national sense better than the more generic 'people.'
- source_word: וְאֶת הָאֱמֹרִי
  chosen: including the Amorites
  alternatives:
  - and the Amorites
  - even the Amorites
  lexicon: HALOT
  rationale: The conjunction plus direct-object marker can be rendered simply 'and the Amorites,' but in English 'including the Amorites' clarifies that they are a subset or representative member of the peoples just mentioned, fitting the flow of the sentence.
- source_word: יֹשֵׁב הָאָרֶץ
  chosen: who lived in the land
  alternatives:
  - inhabiting the land
  - dwelling in the land
  lexicon: HALOT
  rationale: The participial phrase modifies 'the Amorites.' 'Who lived in the land' is idiomatic modern English and preserves the durative resident sense.
- source_word: מִפָּנֵינוּ
  chosen: from before us
  alternatives:
  - before us
  - from our presence
  lexicon: HALOT
  rationale: The idiom literally means 'from before us' and in context refers to the LORD removing enemies ahead of Israel. Retaining 'from before us' preserves the Hebrew imagery while remaining understandable.
- source_word: גַּם אֲנַחְנוּ
  chosen: We also
  alternatives:
  - We too
  - As for us also
  lexicon: HALOT
  rationale: This marks the people's responsive commitment in parallel with Joshua's prior declaration. 'We also' is concise and natural.
- source_word: נַעֲבֹד
  chosen: will serve
  alternatives:
  - will worship
  - will labor for
  lexicon: HALOT
  rationale: עבד with God as object commonly means serve in the sense of covenantal worship and allegiance. 'Serve' is the standard broad rendering and avoids narrowing the term to liturgical worship alone.
- source_word: כִּי הוּא אֱלֹהֵינוּ
  chosen: for he is our God
  alternatives:
  - because he is our God
  lexicon: HALOT
  rationale: כִּי gives the reason for Israel's pledge. 'For' fits the formal yet readable style of the verse.
