id: JOS.24.30
reference: Joshua 24:30
source:
  edition: WLC
  text: וַ/יִּקְבְּר֤וּ אֹת/וֹ֙ בִּ/גְב֣וּל נַחֲלָת֔/וֹ בְּ/תִמְנַת סֶ֖רַח אֲשֶׁ֣ר
    בְּ/הַר אֶפְרָ֑יִם מִ/צְּפ֖וֹן לְ/הַר גָּֽעַשׁ־־־׃
translation:
  text: And they buried him within the territory of his inheritance, at Timnath-serah,
    which is in the hill country of Ephraim, north of Mount Gaash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the border of his inheritance.' The Hebrew term can denote either
      a boundary or the territory enclosed by it; here it likely refers to the area
      of Joshua's allotted inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  chosen: And they buried
  alternatives:
  - And they buried him
  - Then they buried
  lexicon: HALOT
  rationale: Wayyiqtol 3mp of קבר introduces the next narrative event. English includes
    the conjunction naturally as 'And.' The object is expressed separately by אֹתוֹ,
    so the verb itself is rendered simply 'they buried.'
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object marker with 3ms suffix, referring to Joshua in the preceding
    context; rendered explicitly as 'him.'
- source_word: בִּגְבוּל
  chosen: within the territory of
  alternatives:
  - in the border of
  - within the सीमा of
  lexicon: HALOT
  rationale: גְּבוּל can denote border, boundary, or territory. In burial-location
    context with נַחֲלָתוֹ, the sense is not merely a line but the area belonging
    to his allotment, so 'within the territory of' best conveys the idiom in natural
    English.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his allotted inheritance
  - his possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inherited property or allotted inheritance in
    Joshua. 'His inheritance' preserves the covenant-land nuance without overexpanding.
- source_word: בְּתִמְנַת סֶרַח
  chosen: at Timnath-serah
  alternatives:
  - in Timnath-serah
  lexicon: HALOT
  rationale: Place name transliterated per translation philosophy. 'At' is idiomatic
    for a burial site/location.
- source_word: אֲשֶׁר
  chosen: which is
  alternatives:
  - that is
  - which was
  lexicon: HALOT
  rationale: Relative particle introducing a descriptive clause about Timnath-serah.
    'Which is' fits the presentational geographic description in English.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the hill country of the Ephraimites
  - in Mount Ephraim
  lexicon: HALOT
  rationale: הַר in this construction refers to the hill country/hill region, not
    a single mountain. 'Hill country of Ephraim' is the standard geographic sense
    and best matches the Hebrew.
- source_word: מִצְּפוֹן
  chosen: north of
  alternatives:
  - to the north of
  - on the north side of
  lexicon: HALOT
  rationale: Preposition מִן with צָפוֹן marks relative location. 'North of' is concise
    and accurate.
- source_word: לְהַר גָּעַשׁ
  chosen: Mount Gaash
  alternatives:
  - the hill of Gaash
  lexicon: HALOT
  rationale: Proper place name with הַר, rendered naturally as 'Mount Gaash.' This
    is a geographic landmark rather than a generic hill in English style.
