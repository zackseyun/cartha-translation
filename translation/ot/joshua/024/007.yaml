id: JOS.24.7
reference: Joshua 24:7
source:
  edition: WLC
  text: וַ/יִּצְעֲק֣וּ אֶל יְהוָ֗ה וַ/יָּ֨שֶׂם מַֽאֲפֵ֜ל בֵּינֵי/כֶ֣ם וּ/בֵ֣ין הַ/מִּצְרִ֗ים וַ/יָּבֵ֨א עָלָ֤י/ו אֶת הַ/יָּם֙ וַ/יְכַסֵּ֔/הוּ וַ/תִּרְאֶ֨ינָה֙ עֵינֵי/כֶ֔ם אֵ֥ת אֲשֶׁר עָשִׂ֖יתִי בְּ/מִצְרָ֑יִם וַ/תֵּשְׁב֥וּ בַ/מִּדְבָּ֖ר יָמִ֥ים רַבִּֽים־׀־־׃
translation:
  text: Then they cried out to Yahweh, and he put darkness between you and the Egyptians, and brought the sea upon them and covered them, and your eyes saw what I did in Egypt. Then you lived in the wilderness many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has singular pronouns here: ''upon him'' and ''covered him.'' The sense may be collective, referring to Egypt or the Egyptian force; many translations render ''them.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  chosen: they cried out
  alternatives:
  - they called out
  - they cried
  lexicon: HALOT
  rationale: The verb צעק commonly denotes a cry for help in distress. 'Cried out' preserves both urgency and the prayerful direction indicated by אֶל יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַאֲפֵל
  chosen: darkness
  alternatives:
  - deep darkness
  - gloom
  lexicon: HALOT
  rationale: The noun denotes darkness or gloom. 'Darkness' is the clearest modern English rendering and fits the Exodus setting without over-specifying intensity.
- source_word: בֵּינֵיכֶם וּבֵין הַמִּצְרִים
  chosen: between you and the Egyptians
  alternatives:
  - between yourselves and the Egyptians
  lexicon: HALOT
  rationale: A straightforward relational rendering. The second-person plural reflects Joshua's address to Israel about their ancestors, a common covenantal rhetorical usage.
- source_word: וַיָּבֵא עָלָיו אֶת הַיָּם
  chosen: brought the sea upon him
  alternatives:
  - brought the sea over him
  - brought the sea upon them
  lexicon: HALOT
  rationale: The Hebrew form is singular pronominal suffix, so the draft preserves the singular 'him' rather than smoothing to the expected plural. This likely has a collective or representative force referring to Egypt/its army, but the singular should remain visible in the main text for auditability.
- source_word: וַיְכַסֵּהוּ
  chosen: covered him
  alternatives:
  - covered it
  - overwhelmed him
  lexicon: HALOT
  rationale: The verb כסה means 'cover.' 'Covered him' preserves the singular suffix and avoids interpretive expansion such as 'overwhelmed,' though that sense is contextually implied.
- source_word: וַתִּרְאֶינָה עֵינֵיכֶם
  chosen: your eyes saw
  alternatives:
  - you saw
  lexicon: HALOT
  rationale: The Hebrew explicitly mentions 'your eyes,' an idiomatic but emphatic expression. Retaining it preserves the vividness and direct witness motif.
- source_word: אֵת אֲשֶׁר עָשִׂיתִי בְּמִצְרָיִם
  chosen: what I did in Egypt
  alternatives:
  - what I did to Egypt
  - what I accomplished in Egypt
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or, contextually, 'against/to' Egypt. 'In Egypt' is the plainest formal rendering and leaves the acts themselves to context.
- source_word: וַתֵּשְׁבוּ
  chosen: you lived
  alternatives:
  - you dwelt
  - you stayed
  lexicon: HALOT
  rationale: ישב often means dwell, remain, or live. 'Lived' is natural modern English for an extended period in the wilderness; 'stayed' can sound too temporary, while 'dwelt' is more archaic.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - a long time
  - many years
  lexicon: HALOT
  rationale: Literally 'many days.' This should be preserved rather than paraphrased as 'a long time,' and not expanded to 'years' though the period was lengthy.
