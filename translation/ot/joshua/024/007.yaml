theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to smooth singular pronouns referring to the Egyptian force into English plurals
  chosen_reading: retain singular 'him' in the main text
  alternative_readings:
  - render collectively as 'them'
  - specify 'the Egyptians' or 'Pharaoh's army'
  rationale: The Hebrew text uses singular suffixes in וַיָּבֵא עָלָיו and וַיְכַסֵּהוּ. Although many English translations smooth this to a plural for sense, retaining the singular better reflects the source and preserves the possibility of a collective singular reference to Egypt or its host. The alternative is worth preserving in a footnote because English readers may otherwise find the singular abrupt.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
