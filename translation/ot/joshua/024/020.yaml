theological_decisions:
- issue: Divine judgment language following prior beneficence
  chosen_reading: The verse is rendered as a covenant warning that the LORD may reverse
    his favorable dealings and bring judgment on Israel if they apostatize.
  alternative_readings:
  - A softer reading emphasizing only natural consequences of idolatry
  rationale: The Hebrew verbs attribute the harmful action directly to the LORD in
    judicial response to covenant unfaithfulness. The translation preserves that tension
    without softening divine agency or importing later theological systems.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
