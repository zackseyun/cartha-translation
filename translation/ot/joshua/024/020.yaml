id: JOS.24.20
reference: Joshua 24:20
source:
  edition: WLC
  text: כִּ֤י תַֽעַזְבוּ֙ אֶת יְהוָ֔ה וַ/עֲבַדְתֶּ֖ם אֱלֹהֵ֣י נֵכָ֑ר וְ/שָׁ֨ב וְ/הֵרַ֤ע
    לָ/כֶם֙ וְ/כִלָּ֣ה אֶתְ/כֶ֔ם אַחֲרֵ֖י אֲשֶׁר הֵיטִ֥יב לָ/כֶֽם־־׃
translation:
  text: If you forsake the LORD and serve foreign gods, then he will turn and do you
    harm and consume you, after he has done you good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and bring disaster on you.' The Hebrew verb can denote causing harm
      or calamity, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'destroy you' for 'consume you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - Indeed
  - When
  lexicon: HALOT
  rationale: In this warning context, כִּי introduces a conditional scenario rather
    than a causal explanation. English 'if' best captures Joshua's protasis-apodosis
    structure.
- source_word: תַֽעַזְבוּ
  chosen: you forsake
  alternatives:
  - you abandon
  - you leave
  lexicon: HALOT
  rationale: עזב here denotes covenantal abandonment of the LORD. 'Forsake' preserves
    the relational and covenantal force better than the flatter 'leave.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וַעֲבַדְתֶּם
  chosen: and serve
  alternatives:
  - and worship
  - and become servants of
  lexicon: HALOT
  rationale: עבד with gods commonly means to serve in the sense of religious allegiance
    and worship. 'Serve' is the most direct and consistent rendering, while still
    implying worship in context.
- source_word: אֱלֹהֵי נֵכָר
  chosen: foreign gods
  alternatives:
  - strange gods
  - gods of foreigners
  - alien gods
  lexicon: HALOT
  rationale: This construct refers to gods that are foreign/alien to Israel and to
    the worship of the LORD. 'Foreign gods' is idiomatic modern English and preserves
    the contrast.
- source_word: וְשָׁב
  chosen: then he will turn
  alternatives:
  - and he will turn back
  - and he will turn again
  lexicon: HALOT
  rationale: שוב here describes a reversal in the LORD's dealings with Israel. 'Turn'
    preserves the metaphor without overinterpreting it; 'then' helps mark the consequence
    in English.
- source_word: וְהֵרַע לָכֶם
  chosen: and do you harm
  alternatives:
  - and bring evil upon you
  - and treat you badly
  lexicon: HALOT
  rationale: רעה in the Hiphil here means to cause harm/disaster. 'Do you harm' is
    natural English and avoids the misleading moral sense that 'do evil' may suggest
    in modern usage.
- source_word: וְכִלָּה אֶתְכֶם
  chosen: and consume you
  alternatives:
  - and destroy you
  - and bring you to an end
  lexicon: HALOT
  rationale: כלה conveys bringing to completion/end, often by destruction. 'Consume
    you' is vivid and traditional enough to preserve the severity, while remaining
    understandable.
- source_word: אַחֲרֵי אֲשֶׁר הֵיטִיב לָכֶם
  chosen: after he has done you good
  alternatives:
  - after he has done good to you
  - after he has prospered you
  - after he has been good to you
  lexicon: HALOT
  rationale: היטיב means to do good/benefit. 'After he has done you good' is a fairly
    literal English rendering that preserves the contrast between prior beneficence
    and subsequent judgment.
