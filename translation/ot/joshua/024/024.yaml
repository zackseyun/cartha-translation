id: JOS.24.24
reference: Joshua 24:24
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ הָ/עָ֖ם אֶל יְהוֹשֻׁ֑עַ אֶת יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ נַעֲבֹ֔ד וּ/בְ/קוֹל֖/וֹ
    נִשְׁמָֽע־־׃
translation:
  text: And the people said to Joshua, “We will serve the LORD our God, and we will
    obey his voice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We will worship the LORD our God.' The Hebrew verb can denote service
      rendered to God in a worshipful sense, but 'serve' better preserves the broader
      covenantal meaning here.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we will hear/listen to his voice,' an idiom meaning obedient
      response to what he says.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - answered
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing direct speech; 'said' is the plain
    narrative rendering.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  - the populace
  lexicon: HALOT
  rationale: עם here refers to the assembled covenant community; 'the people' is the
    natural and contextually appropriate English equivalent.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple preposition of direction toward Joshua in reported speech.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Direct-object marker plus divine name. Per doctrine table, יְהוָה is
    rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Construct with first person plural suffix expressing covenant relationship:
    ''our God.'''
- source_word: נַעֲבֹד
  chosen: we will serve
  alternatives:
  - we will worship
  lexicon: HALOT
  rationale: From עבד, which can denote service and, in covenantal/religious contexts,
    worshipful service. 'Serve' best preserves the broader covenantal sense without
    narrowing it to liturgical worship alone.
- source_word: וּבְקוֹלוֹ
  chosen: and ... his voice
  alternatives:
  - and ... him
  - and ... what he says
  lexicon: HALOT
  rationale: קול literally means 'voice.' Retaining 'voice' preserves the Hebrew idiom
    and its covenantal resonance.
- source_word: נִשְׁמָע
  chosen: we will obey
  alternatives:
  - we will listen
  - we will hear
  lexicon: HALOT
  rationale: From שמע, which can mean hear/listen/obey. In the idiom 'listen to/obey
    someone's voice,' the sense is obedience, so 'we will obey his voice' communicates
    both the idiom and intended force.
