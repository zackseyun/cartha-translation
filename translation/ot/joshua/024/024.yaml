theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Religious sense of עבד in covenant context
  chosen_reading: serve
  alternative_readings:
  - worship
  rationale: The verse expresses covenant allegiance and obedience. 'Serve' preserves
    both devotion and loyal action, whereas 'worship' would be too narrow for the
    paired commitment to obey.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
