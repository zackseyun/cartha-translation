id: JOS.24.23
reference: Joshua 24:23
source:
  edition: WLC
  text: וְ/עַתָּ֕ה הָסִ֛ירוּ אֶת אֱלֹהֵ֥י הַ/נֵּכָ֖ר אֲשֶׁ֣ר בְּ/קִרְבְּ/כֶ֑ם וְ/הַטּוּ֙ אֶת לְבַבְ/כֶ֔ם אֶל יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: So now, remove the foreign gods that are among you, and turn your heart to Yahweh, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put away the foreign gods.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'incline your heart to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Introduces Joshua's immediate exhortation with a natural English transition. 'So now' preserves the discourse force of וְ plus עַתָּה better than a bare 'now'.
- source_word: הָסִירוּ
  chosen: remove
  alternatives:
  - put away
  - take away
  lexicon: HALOT
  rationale: 'Imperative plural of סור/הסיר in the causative sense: to remove or put away. ''Remove'' is clear modern English and fits the concrete command without archaic tone.'
- source_word: אֱלֹהֵי הַנֵּכָר
  chosen: the foreign gods
  alternatives:
  - the gods of the foreigner
  - the strange gods
  - the alien gods
  lexicon: HALOT
  rationale: This idiom refers to gods belonging to foreigners/foreign worship, not merely unusual gods. 'Foreign gods' is the standard and clearest idiomatic rendering.
- source_word: אֲשֶׁר בְּקִרְבְּכֶם
  chosen: that are among you
  alternatives:
  - that are in your midst
  - that are within you
  lexicon: HALOT
  rationale: בקרבכם denotes being in the midst/among the people. 'Among you' is natural English and avoids the potentially misleading inward sense of 'within you.'
- source_word: וְהַטּוּ
  chosen: turn
  alternatives:
  - incline
  - direct
  - bend
  lexicon: HALOT
  rationale: Imperative of נטה, literally 'incline/turn.' With 'heart' and אֶל, the sense is volitional redirection toward the LORD. 'Turn' is idiomatic and readable while preserving the metaphor.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your hearts
  - your mind
  lexicon: HALOT
  rationale: The Hebrew uses a singular collective noun with a 2mp suffix. 'Your heart' preserves the singular collective force, emphasizing the people's unified inner allegiance.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - toward the LORD
  lexicon: HALOT
  rationale: אֶל marks direction toward YHWH. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct phrase identifying the covenant God. 'The God of Israel' is the most transparent and traditional rendering in clear modern English.
