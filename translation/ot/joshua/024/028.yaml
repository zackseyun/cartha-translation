id: JOS.24.28
reference: Joshua 24:28
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֤ח יְהוֹשֻׁ֨עַ֙ אֶת הָ/עָ֔ם אִ֖ישׁ לְ/נַחֲלָתֽ/וֹ־׃פ
translation:
  text: Then Joshua sent the people away, each man to his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each one to his inheritance.' The Hebrew uses the masculine singular
      אִישׁ distributively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: sent ... away
  alternatives:
  - dismissed
  - sent
  lexicon: HALOT
  rationale: The piel of שׁלח here denotes causing the assembly to depart. 'Sent ...
    away' is natural modern English and preserves the action of dismissal better than
    the bare 'sent.'
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people group
  - the nation
  lexicon: HALOT
  rationale: עָם commonly means 'people' in the collective sense. 'The people' fits
    the immediate context of the assembled Israelites without over-specifying 'nation.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man' or 'each one.' Because the Hebrew
    is grammatically masculine and representative, 'each man' best reflects the source
    under the gender-accurate policy, while still conveying distributive force.
- source_word: לְנַחֲלָתוֹ
  chosen: to his inheritance
  alternatives:
  - to his allotted inheritance
  - to his possession
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly refers to the inherited tribal/familial land
    allotment. 'Inheritance' preserves the covenantal-land nuance better than the
    more generic 'possession.'
