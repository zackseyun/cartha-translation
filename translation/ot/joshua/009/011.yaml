id: JOS.9.11
reference: Joshua 9:11
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלֵ֡י/נוּ זְֽקֵינֵי/נוּ֩ וְ/כָל יֹשְׁבֵ֨י אַרְצֵ֜/נוּ לֵ/אמֹ֗ר
    קְח֨וּ בְ/יֶדְ/כֶ֤ם צֵידָה֙ לַ/דֶּ֔רֶךְ וּ/לְכ֖וּ לִ/קְרָאתָ֑/ם וַ/אֲמַרְתֶּ֤ם
    אֲלֵי/הֶם֙ עַבְדֵי/כֶ֣ם אֲנַ֔חְנוּ וְ/עַתָּ֖ה כִּרְתוּ לָ֥/נוּ בְרִֽית־־׃
translation:
  text: So our elders and all the inhabitants of our land said to us, ‘Take provisions
    in your hand for the journey, and go to meet them. Say to them, “We are your servants”;
    and now make a covenant with us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'cut a covenant with us.'
    reason: lexical_alternative
  - marker: b
    text: '''Your servants'' reflects deferential diplomatic language; the Hebrew
      term can also mean ''slaves'' in other contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְקֵינֵינוּ
  chosen: our elders
  alternatives:
  - our old men
  lexicon: HALOT
  rationale: In context this refers to community leaders, not merely aged males. 'Elders'
    is the natural English equivalent for the social-political role.
- source_word: יֹשְׁבֵי אַרְצֵנוּ
  chosen: the inhabitants of our land
  alternatives:
  - those dwelling in our land
  - the residents of our country
  lexicon: HALOT
  rationale: The participial construction denotes those living in the land. 'Inhabitants'
    is concise and idiomatic while preserving the collective sense.
- source_word: צֵידָה
  chosen: provisions
  alternatives:
  - food
  - supplies
  lexicon: HALOT
  rationale: The term denotes travel provisions or food for a journey. 'Provisions'
    best fits the travel context and avoids narrowing it to food alone.
- source_word: בְיֶדְכֶם
  chosen: in your hand
  alternatives:
  - with you
  - in your possession
  lexicon: HALOT
  rationale: The Hebrew is literally 'in your hand.' Retaining 'in your hand' preserves
    the concrete idiom while remaining understandable in English.
- source_word: לַדֶּרֶךְ
  chosen: for the journey
  alternatives:
  - for the road
  - for the way
  lexicon: HALOT
  rationale: Here the noun refers to travel. 'For the journey' is idiomatic English
    and conveys purpose more naturally than the more literal 'for the road.'
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - to encounter them
  lexicon: HALOT
  rationale: The infinitive with preposition expresses going out to meet someone.
    'To meet them' is the standard and clear rendering.
- source_word: עַבְדֵיכֶם
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the speakers are using
    deferential diplomatic language in requesting a treaty. 'Servants' better reflects
    the social register without importing the stronger bonded-status emphasis required
    in some NT doulos contexts.
- source_word: כִּרְתוּ לָנוּ בְרִית
  chosen: make a covenant with us
  alternatives:
  - cut a covenant with us
  - make a treaty with us
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Make a covenant'
    preserves the covenantal category in readable English; 'cut' is more literal but
    less natural, and 'treaty' is possible in context but loses the biblical covenant
    idiom.
- source_word: וְעַתָּה
  chosen: and now
  alternatives:
  - so now
  - therefore now
  lexicon: HALOT
  rationale: The conjunction plus adverb marks transition to the request. 'And now'
    is a straightforward rendering that preserves the discourse flow.
- source_word: וַיֹּאמְרוּ אֵלֵינוּ ... לֵאמֹר
  chosen: said to us
  alternatives:
  - spoke to us, saying
  lexicon: HALOT
  rationale: The Hebrew speech-introduction formula is compressed in natural English
    as 'said to us,' with the quoted speech carrying the content.
