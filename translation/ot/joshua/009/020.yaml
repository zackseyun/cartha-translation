theological_decisions:
- issue: Nature of קֶצֶף in context of oath violation
  chosen_reading: Rendered generically as 'wrath' without explicitly supplying 'the
    LORD's wrath' in the main text.
  alternative_readings:
  - Rendered as 'the LORD's wrath' to make the implied divine referent explicit
  rationale: The Hebrew text states only 'wrath' and does not explicitly name God
    in this verse. Given the translation philosophy, the draft preserves the likely
    implication of divine wrath without importing an explicit subject not present
    in the source.
  doctrine_reference: Translation philosophy items 1 and 3
