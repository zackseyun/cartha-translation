id: JOS.9.20
reference: Joshua 9:20
source:
  edition: WLC
  text: זֹ֛את נַעֲשֶׂ֥ה לָ/הֶ֖ם וְ/הַחֲיֵ֣ה אוֹתָ֑/ם וְ/לֹֽא יִֽהְיֶ֤ה עָלֵ֨י/נוּ֙
    קֶ֔צֶף עַל הַ/שְּׁבוּעָ֖ה אֲשֶׁר נִשְׁבַּ֥עְנוּ לָ/הֶֽם־־־׃
translation:
  text: 'This is what we will do to them: let them live, so that wrath may not come
    upon us because of the oath that we swore to them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and keep them alive' or 'and spare them.'
    reason: lexical_alternative
  - marker: b
    text: '''Wrath'' is likely divine wrath in context, though the Hebrew text does
      not explicitly say ''the LORD''s wrath.'''
    reason: alternative_reading
lexical_decisions:
- source_word: זֹאת
  chosen: This is what
  alternatives:
  - This
  - Thus
  lexicon: HALOT
  rationale: Introduces the proposed course of action. Expanded slightly to natural
    English before the following verb, without adding content beyond the demonstrative's
    discourse function.
- source_word: נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - we do
  - we shall do
  lexicon: HALOT
  rationale: Qal imperfect 1cp here expresses intended future action in deliberative
    speech; 'we will do' fits the context better than a simple present.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition marks the object affected by the action; 'to them' is
    the most direct rendering with 'do' in English.
- source_word: וְהַחֲיֵה אֹתָם
  chosen: let them live
  alternatives:
  - and keep them alive
  - and spare them
  lexicon: HALOT
  rationale: The Hiphil of חיה means to keep alive or let live. 'Let them live' is
    concise and natural; 'spare them' is interpretive, while 'keep them alive' is
    possible but slightly less idiomatic here.
- source_word: וְלֹא יִהְיֶה עָלֵינוּ קֶצֶף
  chosen: so that wrath may not come upon us
  alternatives:
  - and there will not be wrath upon us
  - lest wrath be upon us
  - so that there may be no wrath against us
  lexicon: HALOT
  rationale: קֶצֶף denotes wrath/anger, often divine wrath in covenantal contexts.
    'Come upon us' idiomatically conveys עַל with היה in this warning context. 'May
    not' reflects the purpose/result nuance following the proposed action.
- source_word: קֶצֶף
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: HALOT
  rationale: '''Wrath'' best preserves the gravity of the term, especially in a context
    involving oath violation and likely divine displeasure.'
- source_word: עַל הַשְּׁבוּעָה
  chosen: because of the oath
  alternatives:
  - on account of the oath
  - concerning the oath
  lexicon: HALOT
  rationale: Here עַל introduces the basis or cause of the feared wrath. 'Because
    of' communicates the causal sense clearly in modern English.
- source_word: אֲשֶׁר נִשְׁבַּעְנוּ לָהֶם
  chosen: that we swore to them
  alternatives:
  - which we swore to them
  - that we took for them
  lexicon: HALOT
  rationale: The Niphal of שׁבע with ל marks swearing an oath to someone. 'That we
    swore to them' is the most straightforward English rendering.
