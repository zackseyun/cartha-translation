id: JOS.9.4
reference: Joshua 9:4
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֤וּ גַם הֵ֨מָּה֙ בְּ/עָרְמָ֔ה וַ/יֵּלְכ֖וּ וַ/יִּצְטַיָּ֑רוּ וַ/יִּקְח֞וּ
    שַׂקִּ֤ים בָּלִים֙ לַ/חֲמ֣וֹרֵי/הֶ֔ם וְ/נֹאד֥וֹת יַ֨יִן֙ בָּלִ֔ים וּ/מְבֻקָּעִ֖ים
    וּ/מְצֹרָרִֽים־׃
translation:
  text: They too acted with cunning, and went and disguised themselves, and took worn-out
    sacks for their donkeys, and worn-out wineskins, split open and patched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made provisions for themselves'; the Hebrew verb וַיִּצְטַיָּרוּ is
      difficult and has been understood in more than one way. The context of deceptive
      appearance supports 'disguised themselves' here.
    reason: alternative_reading
  - marker: b
    text: Or 'bound up' or 'tied up,' describing wineskins repaired by tying after
      they had split.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָרְמָה
  chosen: with cunning
  alternatives:
  - craftily
  - deceitfully
  lexicon: HALOT
  rationale: The noun denotes shrewdness/cunning and in this context carries a deceptive
    sense. 'With cunning' preserves the concrete Hebrew expression without over-interpreting
    beyond the narrative context.
- source_word: וַיִּצְטַיָּרוּ
  chosen: disguised themselves
  alternatives:
  - made provisions for themselves
  - acted as envoys
  lexicon: HALOT
  rationale: This verb is notoriously difficult and context-sensitive. In Joshua 9
    the Gibeonites present themselves as if from a distant land by means of worn supplies,
    so 'disguised themselves' best fits the immediate narrative flow and the following
    objects they take. Alternative understandings are preserved in a footnote because
    the form has been read differently in translation tradition.
- source_word: שַׂקִּים
  chosen: sacks
  alternatives:
  - bags
  lexicon: HALOT
  rationale: Refers to coarse carrying sacks. 'Sacks' is the most natural modern equivalent
    in this travel context.
- source_word: בָּלִים
  chosen: worn-out
  alternatives:
  - old
  - tattered
  lexicon: HALOT
  rationale: The adjective indicates deterioration through age/use. 'Worn-out' is
    more vivid and contextually precise than simply 'old.'
- source_word: לַחֲמוֹרֵיהֶם
  chosen: for their donkeys
  alternatives:
  - on their donkeys
  lexicon: HALOT
  rationale: The preposition marks relation/use with the sacks; 'for their donkeys'
    communicates that the sacks were loaded for use with the animals.
- source_word: נֹאדוֹת יַיִן
  chosen: wineskins
  alternatives:
  - skins of wine
  - wine bags
  lexicon: HALOT
  rationale: This is the standard English equivalent for skin containers used to hold
    wine, concise and idiomatic.
- source_word: מְבֻקָּעִים
  chosen: split open
  alternatives:
  - torn
  - cracked
  lexicon: HALOT
  rationale: The passive participle from בקע suggests being split or burst. 'Split
    open' conveys the physical damage clearly.
- source_word: מְצֹרָרִים
  chosen: patched
  alternatives:
  - bound up
  - tied up
  lexicon: HALOT
  rationale: The participle likely refers to being tied up/bound as a repair measure.
    'Patched' communicates the functional sense in natural English while reflecting
    that the damaged wineskins had been repaired.
- source_word: גַם הֵמָּה
  chosen: They too
  alternatives:
  - They also
  - Even they
  lexicon: HALOT
  rationale: This combination marks that the Gibeonites, like the other kings, took
    action. 'They too' is concise and natural.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - set out
  lexicon: HALOT
  rationale: A simple narrative verb; 'went' preserves the Hebrew sequence without
    embellishment.
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - obtained
  - carried
  lexicon: HALOT
  rationale: Standard narrative verb for taking items; 'took' is sufficiently direct
    and formal.
