id: JOS.9.24
reference: Joshua 9:24
source:
  edition: WLC
  text: וַ/יַּעֲנ֨וּ אֶת יְהוֹשֻׁ֜עַ וַ/יֹּאמְר֗וּ כִּי֩ הֻגֵּ֨ד הֻגַּ֤ד לַ/עֲבָדֶ֨י/ךָ֙
    אֵת֩ אֲשֶׁ֨ר צִוָּ֜ה יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אֶת מֹשֶׁ֣ה עַבְדּ֔/וֹ לָ/תֵ֤ת לָ/כֶם֙
    אֶת כָּל הָ/אָ֔רֶץ וּ/לְ/הַשְׁמִ֛יד אֶת כָּל יֹשְׁבֵ֥י הָ/אָ֖רֶץ מִ/פְּנֵי/כֶ֑ם
    וַ/נִּירָ֨א מְאֹ֤ד לְ/נַפְשֹׁתֵ֨י/נוּ֙ מִ/פְּנֵי/כֶ֔ם וַֽ/נַּעֲשֵׂ֖ה אֶת הַ/דָּבָ֥ר
    הַ/זֶּֽה־־־־־־־׃
translation:
  text: 'They answered Joshua and said, “Because it was clearly told to your servants
    what the LORD your God commanded his servant Moses: to give you all the land and
    to destroy all the inhabitants of the land before you. So we feared greatly for
    our lives because of you, and we did this thing.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “it was surely told to your servants.” The Hebrew uses an infinitive
      absolute with the finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: They answered
  alternatives:
  - They replied
  lexicon: HALOT
  rationale: ענה in this narrative setting introduces a response to Joshua's accusation/questioning.
    'Answered' preserves the dialogical force and pairs naturally with the following
    'and said.'
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - and they said
  lexicon: HALOT
  rationale: Standard narrative speech introducer. Kept concise in English while preserving
    the Hebrew sequence.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - Indeed that
  lexicon: HALOT
  rationale: Introduces the reason for the Gibeonites' action. 'Because' makes the
    causal force explicit in natural English.
- source_word: הֻגֵּד הֻגַּד
  chosen: it was clearly told
  alternatives:
  - it was surely told
  - we were explicitly told
  - it was certainly reported
  lexicon: HALOT
  rationale: The infinitive absolute plus finite passive of נגד intensifies the statement.
    'Clearly told' captures the emphatic passive sense without awkward literalism.
- source_word: לַעֲבָדֶיךָ
  chosen: to your servants
  alternatives:
  - to your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a deferential self-reference
    in diplomatic speech rather than emphasizing bonded status. 'Servants' best fits
    the social-pragmatic context.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֱלֹהֶיךָ
  chosen: what the LORD your God commanded
  alternatives:
  - that which the LORD your God commanded
  lexicon: HALOT
  rationale: Smoothly renders the relative clause while preserving content and directness.
    YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested terms table for the divine name.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: For Moses, עבד is an honorific title of commissioned service to God.
    'Servant' is the established and contextually appropriate rendering.
- source_word: לָתֵת לָכֶם אֶת כָּל הָאָרֶץ
  chosen: to give you all the land
  alternatives:
  - to give all the land to you
  lexicon: HALOT
  rationale: Preserves the infinitival purpose/content construction and the covenantal
    gift of the land. 'Land' is preferable to 'earth' in this conquest context.
- source_word: וּלְהַשְׁמִיד
  chosen: and to destroy
  alternatives:
  - and to wipe out
  - and to exterminate
  lexicon: HALOT
  rationale: השמיד denotes destruction/removal. 'Destroy' is strong and direct without
    importing additional modern connotations beyond the Hebrew.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  chosen: all the inhabitants of the land
  alternatives:
  - all who dwell in the land
  - all the residents of the land
  lexicon: HALOT
  rationale: A straightforward rendering of the participial phrase. 'Inhabitants'
    is idiomatic and suitably formal for this context.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - because of you
  lexicon: HALOT
  rationale: In the clause about destroying the inhabitants, מִפְּנֵי carries the
    sense of removal from Israel's presence/advance. 'Before you' is the most idiomatic
    equivalent here.
- source_word: וַנִּירָא מְאֹד
  chosen: So we feared greatly
  alternatives:
  - and we were very afraid
  - so we became very afraid
  lexicon: HALOT
  rationale: ירא with מאד expresses intense fear. 'Feared greatly' is natural and
    retains the elevated narrative tone.
- source_word: לְנַפְשֹׁתֵינוּ
  chosen: for our lives
  alternatives:
  - for ourselves
  - for our souls
  lexicon: HALOT
  rationale: נפש in this context refers to life/self-preservation, not specifically
    the immaterial soul. 'For our lives' best conveys the idiom.
- source_word: מִפְּנֵיכֶם
  chosen: because of you
  alternatives:
  - on account of you
  - from before you
  lexicon: HALOT
  rationale: In the fear clause, the preposition expresses the cause/source of fear.
    English 'because of you' communicates this more clearly than a wooden repetition
    of 'before you.'
- source_word: וַנַּעֲשֶׂה אֶת הַדָּבָר הַזֶּה
  chosen: and we did this thing
  alternatives:
  - and we did this
  - and we acted this way
  lexicon: HALOT
  rationale: Retains the demonstrative emphasis of the Hebrew while remaining readable.
    'This thing' points back to their deceptive action as a concrete deed.
