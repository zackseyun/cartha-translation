id: JOS.9.25
reference: Joshua 9:25
source:
  edition: WLC
  text: וְ/עַתָּ֖ה הִנְ/נ֣וּ בְ/יָדֶ֑/ךָ כַּ/טּ֨וֹב וְ/כַ/יָּשָׁ֧ר בְּ/עֵינֶ֛י/ךָ
    לַ/עֲשׂ֥וֹת לָ֖/נוּ עֲשֵֽׂה׃
translation:
  text: And now, here we are in your hand. Do to us as it seems good and right in
    your eyes to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Deal with us as seems good and right to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal-discourse marker introducing the Gibeonites' present submission.
    'And now' preserves the connective ו plus the adverb עתה more fully than simply
    'now.'
- source_word: הִנְנוּ
  chosen: here we are
  alternatives:
  - behold, we are
  - we are here
  lexicon: HALOT
  rationale: Idiomatic presentative expression. 'Here we are' conveys the deictic
    force naturally in modern English without archaic 'behold.'
- source_word: בְיָדֶךָ
  chosen: in your hand
  alternatives:
  - in your power
  - at your mercy
  lexicon: HALOT
  rationale: Retains the Hebrew metaphor of being under another's control or authority.
    More interpretive options like 'in your power' are possible, but the literal image
    is clear and readable in English.
- source_word: כַּטּוֹב
  chosen: good
  alternatives:
  - best
  - pleasing
  lexicon: HALOT
  rationale: Basic adjective טוב. In this construction with וישר and בעיניך, 'good'
    is the most direct rendering.
- source_word: וְכַיָּשָׁר
  chosen: and right
  alternatives:
  - and upright
  - and proper
  lexicon: HALOT
  rationale: ישר here denotes what is right/straight/proper. 'Right' pairs naturally
    with 'good' in English and reflects the ethical nuance.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  - as it seems to you
  lexicon: HALOT
  rationale: Common Hebrew idiom for evaluation or judgment. The main text keeps the
    idiom, while the clause is smoothed in English as 'as it seems good and right
    in your eyes.'
- source_word: לַעֲשׂוֹת לָנוּ עֲשֵׂה
  chosen: Do to us ... to do
  alternatives:
  - deal with us ...
  - do with us ...
  lexicon: HALOT
  rationale: 'The infinitive plus imperative of עשה intensifies and frames the request:
    ''to do to us, do.'' English cannot reproduce the exact form neatly, so ''Do to
    us as it seems good and right in your eyes to do'' preserves both the action and
    the rhetorical force with minimal paraphrase.'
