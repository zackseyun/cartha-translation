id: JOS.9.8
reference: Joshua 9:8
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ אֶל יְהוֹשֻׁ֖עַ עֲבָדֶ֣י/ךָ אֲנָ֑חְנוּ וַ/יֹּ֨אמֶר אֲלֵ/הֶ֧ם
    יְהוֹשֻׁ֛עַ מִ֥י אַתֶּ֖ם וּ/מֵ/אַ֥יִן תָּבֹֽאוּ־׃
translation:
  text: They said to Joshua, “We are your servants.” Then Joshua said to them, “Who
    are you, and where do you come from?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We are your slaves.' The Hebrew עֲבָדֶיךָ can denote either servants
      or slaves; here it is rendered 'servants' because the speakers are using deferential
      language in a diplomatic appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: The noun עֶבֶד can denote servant or slave depending on context. Here
    the Gibeonites are speaking deferentially and diplomatically to Joshua, presenting
    themselves as subordinate petitioners rather than describing a legally bonded
    status already in force. 'Servants' best fits the immediate social-pragmatic sense
    in readable English, while 'slaves' is a possible but less contextually natural
    alternative.
- source_word: אֲנָחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: 'Hebrew uses an independent pronoun without an explicit copula in this
    nominal clause. English requires the supplied verb ''are'' for natural sense:
    ''We are your servants.'''
- source_word: מִי אַתֶּם
  chosen: Who are you
  alternatives:
  - Who are you men
  lexicon: HALOT
  rationale: The interrogative plus pronoun is straightforwardly rendered 'Who are
    you.' No additional noun should be supplied, since the Hebrew does not specify
    one.
- source_word: וּמֵאַיִן תָּבֹאוּ
  chosen: and where do you come from
  alternatives:
  - and from where are you coming
  - and where have you come from
  lexicon: HALOT
  rationale: מֵאַיִן asks about origin ('from where?'). The imperfect of בוא in direct
    speech here is idiomatically rendered in English as present 'do you come from,'
    expressing provenance rather than strictly progressive motion. A more formal 'from
    where are you coming' is possible but less natural.
- source_word: וַיֹּאמְרוּ / וַיֹּאמֶר
  chosen: They said ... Then Joshua said
  alternatives:
  - And they said ... and Joshua said
  lexicon: HALOT
  rationale: The waw-consecutive narrative sequence is represented in smooth modern
    English by simple past verbs. 'Then' helps mark the turn in speakers without overloading
    the sentence with repeated 'and,' while preserving the narrative flow.
