theological_decisions:
- issue: Rendering of imposed servile status in Joshua's curse
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse describes a perpetual condition of forced subordinate labor
    attached to sanctuary service. In keeping with the translation philosophy, the
    bonded nature is salient here, so 'slaves' is preferred over the less forceful
    'servants.' This is a lexical-theological decision because softer English could
    mute the severity of the curse.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
    by analogy of bonded-status rendering
