id: JOS.9.23
reference: Joshua 9:23
source:
  edition: WLC
  text: וְ/עַתָּ֖ה אֲרוּרִ֣ים אַתֶּ֑ם וְ/לֹֽא יִכָּרֵ֨ת מִ/כֶּ֜ם עֶ֗בֶד וְ/חֹטְבֵ֥י
    עֵצִ֛ים וְ/שֹֽׁאֲבֵי מַ֖יִם לְ/בֵ֥ית אֱלֹהָֽ/י־־׃
translation:
  text: So now you are cursed, and some of you will never cease to be slaves, cutters
    of wood and drawers of water for the house of my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'there shall never be cut off from you a slave'; the
      Hebrew expresses an ongoing condition that their people would continually supply
      this labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Introduces Joshua's pronouncement with a natural English transition.
    'So now' preserves the discourse force of moving from judgment to its consequence.
- source_word: אֲרוּרִים
  chosen: cursed
  alternatives:
  - under a curse
  lexicon: HALOT
  rationale: Predicate adjective in the plural; 'cursed' is the most direct and idiomatic
    rendering.
- source_word: וְלֹא יִכָּרֵת מִכֶּם עֶבֶד
  chosen: some of you will never cease to be slaves
  alternatives:
  - there shall never be cut off from you a slave
  - none of you shall ever fail to be slaves
  - slavery shall never be removed from among you
  lexicon: HALOT
  rationale: The Niphal of כרת with מן conveys not being cut off/removed from among
    them. Because עֶבֶד is singular collective after a plural addressee, the sense
    is that their line will continually supply slaves. 'Some of you will never cease
    to be slaves' expresses the ongoing corporate condition in clear English while
    preserving the bonded force of עֶבֶד with 'slaves' rather than the softer 'servants'.
- source_word: עֶבֶד
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: Although singular in Hebrew, it functions collectively in this construction.
    'Slaves' best reflects the imposed, subordinate status in this curse and aligns
    with the project's preference to use 'slave' where bonded status is salient.
- source_word: חֹטְבֵי עֵצִים
  chosen: cutters of wood
  alternatives:
  - woodcutters
  - hewers of wood
  lexicon: HALOT
  rationale: A participial expression describing assigned labor. 'Cutters of wood'
    is clear modern English and stays close to the Hebrew imagery; 'hewers' is more
    traditional but archaic.
- source_word: שֹׁאֲבֵי מַיִם
  chosen: drawers of water
  alternatives:
  - water-drawers
  - carriers of water
  lexicon: HALOT
  rationale: Another participial labor term. 'Drawers of water' is a standard, transparent
    rendering that preserves the concrete task.
- source_word: לְבֵית אֱלֹהָי
  chosen: for the house of my God
  alternatives:
  - for my God's house
  - for the household of my God
  lexicon: HALOT
  rationale: בַּיִת here refers to the sanctuary/tabernacle context rather than a
    domestic household. 'For the house of my God' is the most natural formal-equivalent
    rendering.
