theological_decisions:
- issue: Corporate singular pronouns in Israel's speech
  chosen_reading: Render the singular forms with collective English where the speaker
    represents Israel as a group
  alternative_readings:
  - 'Retain singular throughout: ''in my midst ... could I make a covenant with you?'''
  rationale: The Hebrew shifts through representative singular usage. Preserving every
    singular literally in English would sound as though one individual alone were
    speaking for himself rather than as spokesman for Israel. The translation keeps
    the first clause collective ('among us') while retaining 'I make' in the second
    clause to reflect the Hebrew verbal form and representative speech.
  doctrine_reference: Translation philosophy §§3, 4, 6
