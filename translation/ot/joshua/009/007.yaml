id: JOS.9.7
reference: Joshua 9:7
source:
  edition: WLC
  text: ו/יאמרו אִֽישׁ יִשְׂרָאֵ֖ל אֶל הַ/חִוִּ֑י אוּלַ֗י בְּ/קִרְבִּ/י֙ אַתָּ֣ה יוֹשֵׁ֔ב
    וְ/אֵ֖יךְ אכרות לְ/ךָ֥ בְרִֽית־־־׃
translation:
  text: But the men of Israel said to the Hivite, “Perhaps you are living among us;
    how then could I make a covenant with you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in my midst'; the singular likely reflects a representative
      speaker for Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'cut a covenant with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the man of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, it functions here as a collective
    singular referring to Israelite representatives. 'The men of Israel' preserves
    the masculine/collective force better than the more generalized 'the Israelites,'
    while avoiding the misleadingly singular 'the man of Israel.'
- source_word: הַחִוִּי
  chosen: the Hivite
  alternatives:
  - the Hivites
  lexicon: HALOT
  rationale: The singular form in the text is retained as 'the Hivite,' likely referring
    to the speaker addressed as representative of the group. This is more formally
    aligned with the Hebrew than pluralizing it.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - maybe
  - suppose
  lexicon: HALOT
  rationale: '''Perhaps'' best conveys the tentative suspicion expressed by the particle
    in a natural but still dignified English register.'
- source_word: בְּקִרְבִּי
  chosen: among us
  alternatives:
  - in my midst
  - near me
  - within my midst
  lexicon: HALOT
  rationale: The Hebrew is literally 'in my midst,' with singular suffix, but in context
    the speaker represents Israel corporately. 'Among us' communicates the collective
    sense naturally in English while preserving the covenantal-geographical idea.
- source_word: יוֹשֵׁב
  chosen: are living
  alternatives:
  - dwell
  - are dwelling
  - sit
  lexicon: HALOT
  rationale: The participle from ישׁב denotes residing or dwelling. 'Are living' is
    idiomatic modern English and fits the ongoing sense of the participle.
- source_word: וְאֵיךְ
  chosen: how then could
  alternatives:
  - and how could
  - how can
  - how then can
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces the practical consequence
    of the suspicion. 'How then could' captures both the logical progression and the
    modal force in context.
- source_word: אכרות ... בְרִית
  chosen: make a covenant
  alternatives:
  - cut a covenant
  - enter into a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cut a covenant.' 'Make a covenant' is
    the clearest optimal-equivalence rendering in modern English, while preserving
    the covenantal concept without unnecessary archaism.
- source_word: לְךָ
  chosen: with you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: With covenant-making language, the preposition is best rendered idiomatically
    in English as 'with you,' expressing the relational counterpart of the covenant.
