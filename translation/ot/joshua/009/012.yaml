id: JOS.9.12
reference: Joshua 9:12
source:
  edition: WLC
  text: זֶ֣ה לַחְמֵ֗/נוּ חָ֞ם הִצְטַיַּ֤דְנוּ אֹת/וֹ֙ מִ/בָּ֣תֵּ֔י/נוּ בְּ/י֥וֹם צֵאתֵ֖/נוּ
    לָ/לֶ֣כֶת אֲלֵי/כֶ֑ם וְ/עַתָּה֙ הִנֵּ֣ה יָבֵ֔שׁ וְ/הָיָ֖ה נִקֻּדִֽים׀׃
translation:
  text: This bread of ours was warm when we took it as our provisions from our houses
    on the day we set out to come to you, but now, look, it is dry and has become
    crumbly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has become moldy' or 'is spotted.' The Hebrew term refers to something
      marked with points or spots; in the context of old bread, the exact nuance may
      be crumbly, cracked, or mold-specked.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This
  alternatives:
  - Here is this
  lexicon: HALOT
  rationale: Demonstrative pointing to the bread they are presenting. Simple deictic
    'This' is natural English and preserves the immediacy.
- source_word: לַחְמֵנוּ
  chosen: bread of ours
  alternatives:
  - our bread
  lexicon: HALOT
  rationale: The sense is straightforwardly possessive. In the final English, 'This
    bread of ours' preserves the Hebrew emphasis created by the demonstrative plus
    noun with suffix.
- source_word: חָם
  chosen: warm
  alternatives:
  - hot
  - fresh
  lexicon: HALOT
  rationale: '''Warm'' best matches the adjective literally. ''Fresh'' captures implication
    but is more interpretive; ''hot'' overstates the likely sense.'
- source_word: הִצְטַיַּדְנוּ אֹתוֹ
  chosen: we took it as our provisions
  alternatives:
  - we provisioned ourselves with it
  - we took it for our journey
  - we packed it
  lexicon: HALOT
  rationale: The hitpael of צוד here refers to equipping oneself with provisions.
    'We took it as our provisions' is idiomatic and keeps the bread as the object
    without over-paraphrasing.
- source_word: מִבָּתֵּינוּ
  chosen: from our houses
  alternatives:
  - from our homes
  lexicon: HALOT
  rationale: Literal plural 'houses' is retained; 'homes' is possible but slightly
    more interpretive.
- source_word: בְּיוֹם צֵאתֵנוּ
  chosen: on the day we set out
  alternatives:
  - on the day of our departure
  - when we went out
  lexicon: HALOT
  rationale: This infinitive construct phrase marks the time of departure. 'Set out'
    is natural modern English for beginning a journey.
- source_word: לָלֶכֶת אֲלֵיכֶם
  chosen: to come to you
  alternatives:
  - to go to you
  lexicon: HALOT
  rationale: Although the Hebrew verb is 'to go,' English idiom from the speakers'
    perspective toward the hearers is commonly 'come to you.' This is a justified
    optimal-equivalence shift for naturalness.
- source_word: וְעַתָּה הִנֵּה
  chosen: but now, look
  alternatives:
  - and now, behold
  - now, see
  lexicon: HALOT
  rationale: The combination marks contrast and draws attention to present evidence.
    'But now, look' preserves both discourse contrast and demonstrative force in readable
    English.
- source_word: יָבֵשׁ
  chosen: it is dry
  alternatives:
  - it has dried out
  lexicon: HALOT
  rationale: Predicate adjective/verb indicating present state. 'It is dry' is concise
    and fits the evidentiary claim.
- source_word: וְהָיָה נִקֻּדִים
  chosen: has become crumbly
  alternatives:
  - has become moldy
  - is cracked
  - is spotted
  lexicon: HALOT
  rationale: נִקֻּדִים literally suggests marked with points/spots. In context of
    stale bread, many English versions render the idea as crumbled or moldy. 'Crumbly'
    best fits bread that has dried out without importing the stronger and less certain
    claim of visible mold. The resultative 'has become' reflects וְהָיָה.
