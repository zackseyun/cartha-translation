id: JOS.9.10
reference: Joshua 9:10
source:
  edition: WLC
  text: וְ/אֵ֣ת כָּל אֲשֶׁ֣ר עָשָׂ֗ה לִ/שְׁנֵי֙ מַלְכֵ֣י הָ/אֱמֹרִ֔י אֲשֶׁ֖ר בְּ/עֵ֣בֶר
    הַ/יַּרְדֵּ֑ן לְ/סִיחוֹן֙ מֶ֣לֶךְ חֶשְׁבּ֔וֹן וּ/לְ/ע֥וֹג מֶֽלֶךְ הַ/בָּשָׁ֖ן
    אֲשֶׁ֥ר בְּ/עַשְׁתָּרֽוֹת׀־־׃
translation:
  text: and all that he did to the two kings of the Amorites who were beyond the Jordan—to
    Sihon king of Heshbon and to Og king of Bashan, who was at Ashtaroth—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the Jordan' or 'on the other side of the Jordan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who was in Ashtaroth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: and
  alternatives:
  - and also
  - namely
  lexicon: HALOT
  rationale: Here וְ plus the object marker continues the list from the previous verse.
    In English the object marker is not represented directly, so a simple coordinating
    'and' best carries the discourse flow.
- source_word: כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: The combination introduces the totality of the reported acts. 'All that'
    is idiomatic and sufficiently formal.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he had done
  - he made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'). In this historical report, 'did'
    is the most natural English equivalent. The subject is implicit from context,
    referring to the LORD's acts as reported by the Gibeonites.
- source_word: לִשְׁנֵי מַלְכֵי הָאֱמֹרִי
  chosen: to the two kings of the Amorites
  alternatives:
  - against the two Amorite kings
  - to the two Amorite kings
  lexicon: HALOT
  rationale: The lamed with עשה can indicate what was done to someone. 'To the two
    kings of the Amorites' preserves the Hebrew structure closely; 'against' is interpretive
    and less direct.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  chosen: who were beyond the Jordan
  alternatives:
  - who were across the Jordan
  - who were on the other side of the Jordan
  lexicon: HALOT
  rationale: בְּעֵבֶר denotes the far side/across. 'Beyond the Jordan' is concise
    and conventional, while still clear. It reflects the speaker's geographical perspective
    without overexplaining it.
- source_word: לְסִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  chosen: to Sihon king of Heshbon
  alternatives:
  - to Sihon, king of Heshbon
  lexicon: HALOT
  rationale: Names are transliterated per project philosophy. The appositional royal
    title is rendered straightforwardly.
- source_word: וּלְעוֹג מֶלֶךְ הַבָּשָׁן
  chosen: and to Og king of Bashan
  alternatives:
  - and to Og, king of Bashan
  lexicon: HALOT
  rationale: Parallel with the previous king phrase. 'Bashan' is a place name and
    is transliterated.
- source_word: אֲשֶׁר בְּעַשְׁתָּרוֹת
  chosen: who was at Ashtaroth
  alternatives:
  - who was in Ashtaroth
  - who was at Ashteroth
  lexicon: HALOT
  rationale: The relative clause most naturally modifies Og, identifying his seat/location.
    בְּ can be rendered 'at' or 'in'; 'at' works well for a royal residence/city association.
    'Ashtaroth' follows a standard transliteration.
