id: JOS.9.16
reference: Joshua 9:16
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/קְצֵה֙ שְׁלֹ֣שֶׁת יָמִ֔ים אַחֲרֵ֕י אֲשֶׁר כָּרְת֥וּ לָ/הֶ֖ם בְּרִ֑ית
    וַֽ/יִּשְׁמְע֗וּ כִּי קְרֹבִ֥ים הֵם֙ אֵלָ֔י/ו וּ/בְ/קִרְבּ֖/וֹ הֵ֥ם יֹשְׁבִֽים־־׃
translation:
  text: And it happened at the end of three days, after they had made a covenant with
    them, that they heard that they were near to them and were living among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant with them.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew pronouns in 'near to them' and 'among them' are singular in form,
      likely referring to Israel or Joshua as a collective representative; the English
      uses plural forms for natural sense.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: מִקְצֵה שְׁלֹשֶׁת יָמִים
  chosen: at the end of three days
  alternatives:
  - after three days
  - three days later
  lexicon: HALOT
  rationale: The phrase is more literally 'from the end of three days.' 'At the end
    of three days' best preserves the temporal expression while remaining natural
    English.
- source_word: אַחֲרֵי אֲשֶׁר
  chosen: after
  alternatives:
  - after that
  - after which
  lexicon: HALOT
  rationale: This compound subordinator introduces the prior action succinctly. English
    'after' captures the temporal relationship without unnecessary expansion.
- source_word: כָּרְתוּ לָהֶם בְּרִית
  chosen: they had made a covenant with them
  alternatives:
  - they had cut a covenant with them
  - they had entered into a covenant with them
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Made a covenant'
    is the clearest optimal-equivalence rendering in modern English; the more literal
    'cut' is idiomatic in Hebrew but opaque in English.
- source_word: וַיִּשְׁמְעוּ
  chosen: they heard
  alternatives:
  - they learned
  - they found out
  lexicon: HALOT
  rationale: The verb שמע literally means 'hear,' and here by extension 'come to hear/learn.'
    'Heard' preserves the lexical form and works idiomatically in context.
- source_word: קְרֹבִים
  chosen: near
  alternatives:
  - close by
  - neighbors
  lexicon: HALOT
  rationale: The adjective denotes spatial nearness. 'Near' is the most direct rendering;
    'neighbors' would over-interpret the relationship.
- source_word: אֵלָיו
  chosen: to them
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The ketiv-like form is morphologically singular ('to him'), but the sense
    in context is collective, referring to Israel/Joshua's party. English 'to them'
    communicates the referent naturally. The singular may reflect Joshua as representative
    head, but a plural rendering avoids awkwardness in English while preserving the
    sense.
- source_word: וּבְקִרְבּוֹ
  chosen: among them
  alternatives:
  - in their midst
  - within it
  lexicon: HALOT
  rationale: Literally 'in his/its midst,' again with a singular pronominal suffix
    likely referring to Israel as a collective entity. 'Among them' expresses the
    relational sense clearly in English.
- source_word: הֵם יֹשְׁבִים
  chosen: they were living
  alternatives:
  - they dwelt
  - they were dwelling
  - they lived
  lexicon: HALOT
  rationale: ישב in participial form indicates settled residence. 'Were living' gives
    the ongoing state in natural modern English; 'dwelling' is more formal/archaic.
