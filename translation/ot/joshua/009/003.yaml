id: JOS.9.3
reference: Joshua 9:3
source:
  edition: WLC
  text: וְ/יֹשְׁבֵ֨י גִבְע֜וֹן שָׁמְע֗וּ אֵת֩ אֲשֶׁ֨ר עָשָׂ֧ה יְהוֹשֻׁ֛עַ לִֽ/ירִיח֖וֹ
    וְ/לָ/עָֽי׃
translation:
  text: But the inhabitants of Gibeon heard what Joshua had done to Jericho and to
    Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And the inhabitants of Gibeon heard what Joshua had done to Jericho
      and to Ai.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יֹשְׁבֵי
  chosen: But the inhabitants of
  alternatives:
  - And the inhabitants of
  - those living in
  lexicon: HALOT
  rationale: יֹשְׁבֵי literally denotes 'inhabitants of' or 'those dwelling in.' The
    prefixed וְ is rendered 'But' rather than a simple 'And' because the verse marks
    a narrative contrast/shift from the coalition of kings in the previous context
    to the distinct response of Gibeon.
- source_word: גִבְעוֹן
  chosen: Gibeon
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: שָׁמְעוּ
  chosen: heard
  alternatives:
  - came to hear
  - learned
  lexicon: HALOT
  rationale: The qal perfect of שׁמע here straightforwardly means 'heard.' 'Learned'
    is possible in context, but 'heard' preserves the lexical sense more directly.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - about what
  lexicon: HALOT
  rationale: 'The object marker plus relative particle introduces the content of what
    was heard: ''what'' is natural English and accurately reflects the construction
    without unnecessary stiffness.'
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  - had made
  lexicon: HALOT
  rationale: עָשָׂה commonly means 'do/make.' In English narrative, 'had done' idiomatically
    conveys prior action relative to the hearing and fits the context of Joshua's
    completed actions at Jericho and Ai.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: לִֽ/ירִיחוֹ
  chosen: to Jericho
  alternatives:
  - against Jericho
  - at Jericho
  lexicon: HALOT
  rationale: The preposition ל with עשה in this context indicates what Joshua did
    'to' Jericho, i.e., the action directed toward the city. 'Against' is interpretive;
    'to' is the more direct rendering.
- source_word: וְ/לָ/עָי
  chosen: and to Ai
  alternatives:
  - and against Ai
  lexicon: HALOT
  rationale: Parallel to 'to Jericho.' The article is absorbed in the pointing, but
    English convention uses the proper name simply as 'Ai.' 'And to Ai' preserves
    the Hebrew parallelism and directness.
