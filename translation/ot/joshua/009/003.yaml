theological_decisions:
- issue: Rendering of the conjunction וְ at the start of the verse
  chosen_reading: But
  alternative_readings:
  - And
  rationale: This is a discourse-level decision, not a doctrinal one. The conjunction
    often carries simple coordination, but here the narrative turns from the kings'
    response (9:1–2) to the contrasting response of Gibeon (9:3ff). 'But' best reflects
    the contrast in readable English while remaining faithful to the Hebrew flow.
