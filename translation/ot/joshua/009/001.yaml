id: JOS.9.1
reference: Joshua 9:1
source:
  edition: WLC
  text: וַ/יְהִ֣י כִ/שְׁמֹ֣עַ כָּֽל הַ/מְּלָכִ֡ים אֲשֶׁר֩ בְּ/עֵ֨בֶר הַ/יַּרְדֵּ֜ן
    בָּ/הָ֣ר וּ/בַ/שְּׁפֵלָ֗ה וּ/בְ/כֹל֙ ח֚וֹף הַ/יָּ֣ם הַ/גָּד֔וֹל אֶל מ֖וּל הַ/לְּבָנ֑וֹן
    הַֽ/חִתִּי֙ וְ/הָ֣/אֱמֹרִ֔י הַֽ/כְּנַעֲנִי֙ הַ/פְּרִזִּ֔י הַ/חִוִּ֖י וְ/הַ/יְבוּסִֽי־־׃
translation:
  text: And it happened, when all the kings who were beyond the Jordan—in the hill
    country, in the lowland, and along the whole coast of the Great Sea toward Lebanon—the
    Hittite, the Amorite, the Canaanite, the Perizzite, the Hivite, and the Jebusite—heard
    of it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'when all the kings ... heard.' The object is left unstated
      here and is supplied in English as 'of it' from the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan.' The Hebrew expression can be rendered either way
      depending on geographic perspective.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the Shephelah,' the western foothill region.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: כִשְׁמֹעַ
  chosen: when ... heard of it
  alternatives:
  - upon hearing
  - when ... heard
  lexicon: HALOT
  rationale: Infinitive construct with כ expresses temporal circumstance, 'when hearing/upon
    hearing.' English finite clause is more natural. 'Of it' is supplied from context
    because the object is implicit in Hebrew and made explicit by the following verse
    context.
- source_word: כָּל הַמְּלָכִים
  chosen: all the kings
  lexicon: HALOT
  rationale: Straightforward quantifier plus noun; no reason to reduce or expand.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  chosen: who were beyond the Jordan
  alternatives:
  - who were across the Jordan
  lexicon: HALOT
  rationale: בְּעֵבֶר commonly means 'beyond/across.' 'Beyond the Jordan' is retained
    as a conventional geographic expression, without over-specifying east or west
    in English.
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountains
  - in the hill country region
  lexicon: HALOT
  rationale: הַר here denotes the central highlands as a geographic region, so 'hill
    country' is more idiomatic and precise than 'mountains.'
- source_word: וּבַשְּׁפֵלָה
  chosen: in the lowland
  alternatives:
  - in the Shephelah
  - in the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה is the lowland/foothill region of Judah. 'Lowland' gives a transparent
    translation in the main text; the transliteration 'Shephelah' is a viable alternative
    but less immediately clear to general readers.
- source_word: וּבְכֹל חוֹף הַיָּם הַגָּדוֹל
  chosen: and along the whole coast of the Great Sea
  alternatives:
  - and on all the shore of the Great Sea
  - and along the entire coastline of the Great Sea
  lexicon: HALOT
  rationale: חוֹף means shore/coast. 'Along the whole coast' captures the distributive
    sense with natural English. 'Great Sea' is preserved as the Hebrew designation
    for the Mediterranean.
- source_word: אֶל מוּל הַלְּבָנוֹן
  chosen: toward Lebanon
  alternatives:
  - opposite Lebanon
  - in front of Lebanon
  - facing Lebanon
  lexicon: HALOT
  rationale: The phrase marks orientation/location relative to Lebanon. 'Toward Lebanon'
    is idiomatic and sufficiently precise without awkward literalism.
- source_word: הַחִתִּי וְהָאֱמֹרִי הַכְּנַעֲנִי הַפְּרִזִּי הַחִוִּי וְהַיְבוּסִי
  chosen: the Hittite, the Amorite, the Canaanite, the Perizzite, the Hivite, and
    the Jebusite
  alternatives:
  - the Hittites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites
  lexicon: HALOT
  rationale: The singular ethnonyms with article are retained in English as collective
    singulars, matching the Hebrew form and common biblical style.
