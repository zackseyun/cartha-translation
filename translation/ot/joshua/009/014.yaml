id: JOS.9.14
reference: Joshua 9:14
source:
  edition: WLC
  text: וַ/יִּקְח֥וּ הָֽ/אֲנָשִׁ֖ים מִ/צֵּידָ֑/ם וְ/אֶת פִּ֥י יְהוָ֖ה לֹ֥א שָׁאָֽלוּ־׃
translation:
  text: So the men took some of their provisions, but did not ask counsel from Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the mouth of the LORD'; that is, his direction or decision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - accepted
  lexicon: HALOT
  rationale: Basic sense of לקח is 'take.' In context, the men receive or take from the Gibeonites' supplies as evidence. 'Took' preserves the concrete verbal action without over-interpreting.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the men of Israel
  - the leaders
  lexicon: HALOT
  rationale: The noun simply means 'the men.' Although context identifies them as Israelite representatives, that is not explicit in this clause, so the simpler rendering is preferred.
- source_word: מִצֵּידָם
  chosen: some of their provisions
  alternatives:
  - some of their food
  - their provisions
  lexicon: HALOT
  rationale: צֵיד refers to provisions/supplies for a journey, often food. The prefixed מִן is naturally partitive here, hence 'some of their provisions' rather than the less precise 'their provisions' alone.
- source_word: פִּי יְהוָה
  chosen: the counsel of the LORD
  alternatives:
  - the mouth of the LORD
  - the word of the LORD
  - the command of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of the LORD,' an idiom for seeking Yahweh's decision, direction, or oracle. 'The counsel of the LORD' communicates the idiomatic sense in natural English while preserving that they failed to seek divine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא שָׁאָלוּ
  chosen: did not ask for
  alternatives:
  - did not inquire of
  - did not consult
  lexicon: HALOT
  rationale: שׁאל commonly means 'ask, inquire.' Because the object is the idiomatic 'mouth/counsel of the LORD,' 'did not ask for' works smoothly in English; the more formal 'did not inquire of' is preserved as an alternative.
