theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Handling the idiom פִּי יְהוָה
  chosen_reading: the counsel of the LORD
  alternative_readings:
  - the mouth of the LORD
  - the word of the LORD
  - the command of the LORD
  rationale: The Hebrew is idiomatic rather than a statement about a physical mouth.
    Rendering the sense avoids wooden English while preserving the theological point
    that Israel failed to seek the LORD's guidance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source-text sense over translation tradition'
