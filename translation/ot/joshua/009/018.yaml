theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and longstanding reverential convention. The oath formula remains clear in English
    with this rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Community term עֵדָה
  chosen_reading: congregation
  alternative_readings:
  - assembly
  rationale: This is not a major doctrinal dispute, but 'congregation' preserves the
    sense of Israel as a gathered covenant community without importing later ecclesial
    structures. Consistency within the verse is maintained.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
