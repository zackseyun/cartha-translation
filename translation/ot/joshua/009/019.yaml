id: JOS.9.19
reference: Joshua 9:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ כָל הַ/נְּשִׂיאִים֙ אֶל כָּל הָ֣/עֵדָ֔ה אֲנַ֨חְנוּ֙ נִשְׁבַּ֣עְנוּ לָ/הֶ֔ם בַּֽ/יהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וְ/עַתָּ֕ה לֹ֥א נוּכַ֖ל לִ/נְגֹּ֥עַ בָּ/הֶֽם־־־׃
translation:
  text: But all the leaders said to all the congregation, “We have sworn to them by Yahweh, the God of Israel, and now we cannot touch them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “harm them” or “strike them”; literally “touch them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: But ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive verb formally means 'and they said,' but in context it advances a contrastive response to the congregation's complaint in the surrounding narrative. 'But' captures the discourse force in natural English without departing from the Hebrew sense.
- source_word: הַנְּשִׂיאִים
  chosen: the leaders
  alternatives:
  - the princes
  - the chiefs
  - the rulers
  lexicon: HALOT
  rationale: נָשִׂיא can denote tribal chiefs, leaders, or princes. 'Leaders' is the clearest modern English rendering here for the governing representatives of Israel.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly refers to the gathered community of Israel. 'Congregation' preserves the corporate sense and is idiomatic in this narrative setting.
- source_word: נִשְׁבַּעְנוּ לָהֶם
  chosen: We have sworn to them
  alternatives:
  - We swore to them
  - We have taken an oath to them
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear, take an oath.' Present perfect English ('have sworn') fits the continuing binding force of the past oath in the present discussion.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - in the LORD
  - by Yahweh
  lexicon: HALOT
  rationale: With שׁבע, the preposition marks the one by whom the oath is sworn. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain identifying the covenant God in relation to Israel.
- source_word: וְעַתָּה
  chosen: and now
  alternatives:
  - now
  lexicon: HALOT
  rationale: The phrase marks the consequence of the oath for the present moment. 'And now' preserves the connective flow.
- source_word: לֹא נוּכַל
  chosen: we cannot
  alternatives:
  - we are not able to
  - we may not
  lexicon: HALOT
  rationale: יכל expresses inability; in this context the inability is practical and moral because of the oath. 'Cannot' is concise and natural, while the ethical implication is supplied by context.
- source_word: לִנְגֹּעַ בָּהֶם
  chosen: touch them
  alternatives:
  - strike them
  - harm them
  lexicon: HALOT
  rationale: נגע literally means 'touch.' In this context it idiomatically means to lay hands on them in a harmful way. The main text keeps the literal 'touch them,' while the harmful sense is worth preserving in a footnote.
