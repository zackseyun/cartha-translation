id: JOS.9.22
reference: Joshua 9:22
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א לָ/הֶם֙ יְהוֹשֻׁ֔עַ וַ/יְדַבֵּ֥ר אֲלֵי/הֶ֖ם לֵ/אמֹ֑ר לָ/מָּה֩
    רִמִּיתֶ֨ם אֹתָ֜/נוּ לֵ/אמֹ֗ר רְחוֹקִ֨ים אֲנַ֤חְנוּ מִ/כֶּם֙ מְאֹ֔ד וְ/אַתֶּ֖ם
    בְּ/קִרְבֵּ֥/נוּ יֹשְׁבִֽים׃
translation:
  text: Then Joshua called for them and spoke to them, saying, “Why did you deceive
    us by saying, ‘We are very far from you,’ when you are living among us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in our midst.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this context introduces Joshua's summoning of the Gibeonites
    before speaking to them. 'Called for' captures the sense of having them brought
    before him better than the flatter 'called,' while remaining natural English.
- source_word: וַיְדַבֵּר אֲלֵיהֶם לֵאמֹר
  chosen: spoke to them, saying
  alternatives:
  - said to them
  - addressed them
  lexicon: HALOT
  rationale: This is a standard Hebrew speech introduction. 'Spoke to them, saying'
    preserves the formal narrative cadence without unnecessary paraphrase.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the natural and accurate English equivalent.
- source_word: רִמִּיתֶם
  chosen: did you deceive
  alternatives:
  - did you trick
  - did you mislead
  lexicon: HALOT
  rationale: The piel of רמה conveys deliberate deception. 'Deceive' is the clearest
    and most standard rendering, appropriately weighty for Joshua's accusation.
- source_word: אֹתָנוּ
  chosen: us
  lexicon: HALOT
  rationale: Direct object pronoun referring to Israel's leaders and people represented
    by Joshua.
- source_word: רְחוֹקִים ... מְאֹד
  chosen: very far
  alternatives:
  - far away
  - from a great distance
  lexicon: HALOT
  rationale: The adjective רחוקים with מאד intensifies distance. 'Very far' is concise
    and preserves the emphasis of the Hebrew.
- source_word: מִכֶּם
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: 'Standard prepositional sense after a distance expression: ''far from
    you.'''
- source_word: בְּקִרְבֵּנוּ
  chosen: among us
  alternatives:
  - in our midst
  - within us
  lexicon: HALOT
  rationale: The idiom בקרבנו means 'in our midst/among us.' 'Among us' is more natural
    modern English; 'in our midst' is a viable more formal alternative.
- source_word: יֹשְׁבִים
  chosen: are living
  alternatives:
  - are dwelling
  - live
  - are residing
  lexicon: HALOT
  rationale: The participle of ישב here denotes settled residence. 'Are living' communicates
    ongoing habitation in idiomatic English and fits the present force of the participle
    in direct speech.
