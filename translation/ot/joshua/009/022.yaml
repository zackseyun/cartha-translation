theological_decisions:
- issue: Rendering of implied covenant accusation without overinterpretation
  chosen_reading: Translate Joshua's charge as straightforward deception about geographic
    distance, without importing later theological commentary about the treaty.
  alternative_readings:
  - Expand the accusation to include covenant violation implications in the main text
  rationale: The verse itself focuses on the lie—claiming to be very far away while
    actually living among Israel. Any covenantal or theological implications belong
    to context, not to the wording of this verse.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
