id: JOS.9.13
reference: Joshua 9:13
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה נֹאד֤וֹת הַ/יַּ֨יִן֙ אֲשֶׁ֣ר מִלֵּ֣אנוּ חֲדָשִׁ֔ים וְ/הִנֵּ֖ה הִתְבַּקָּ֑עוּ וְ/אֵ֤לֶּה שַׂלְמוֹתֵ֨י/נוּ֙ וּ/נְעָלֵ֔י/נוּ בָּל֕וּ מֵ/רֹ֥ב הַ/דֶּ֖רֶךְ מְאֹֽד׃
translation:
  text: And these wineskins, which we filled when they were new—look, they have burst; and these our garments and our sandals have worn out because the journey was exceedingly long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have split open.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the great amount of the journey, very much,' meaning because the journey was extremely long.
    reason: lexical_alternative
  - marker: c
    text: Or 'because of the journey being very long'.
    reason: previous_rendering
lexical_decisions:
- source_word: נֹאדוֹת הַיַּיִן
  chosen: wineskins
  alternatives:
  - skins of wine
  - wine bottles
  lexicon: HALOT
  rationale: נֹאד denotes a skin container, commonly for liquids such as wine. 'Wineskins' is idiomatic modern English and preserves the material sense better than 'bottles.'
- source_word: מִלֵּאנוּ
  chosen: we filled
  alternatives:
  - we had filled
  lexicon: HALOT
  rationale: The verb plainly means 'filled.' English simple past works naturally in the reported speech context without overcomplicating the sequence.
- source_word: חֲדָשִׁים
  chosen: when they were new
  alternatives:
  - new
  - fresh
  lexicon: HALOT
  rationale: The adjective modifies the wineskins. Rendering it predicatively in English ('when they were new') makes the sense clear and natural.
- source_word: וְהִנֵּה
  chosen: look
  alternatives:
  - behold
  - and see
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Look' preserves the demonstrative force in readable modern English better than archaic 'behold.'
- source_word: הִתְבַּקָּעוּ
  chosen: have burst
  alternatives:
  - are split
  - have split open
  lexicon: HALOT
  rationale: The hitpael/passive-reflexive sense here indicates that the wineskins have split open. 'Have burst' is concise and idiomatic for containers such as wineskins.
- source_word: שַׂלְמוֹתֵינוּ
  chosen: our garments
  alternatives:
  - our clothes
  - our cloaks
  lexicon: HALOT
  rationale: The noun refers broadly to outer garments/clothing. 'Garments' is slightly more formal than 'clothes' and fits the narrative register without becoming archaic.
- source_word: נְעָלֵינוּ
  chosen: our sandals
  alternatives:
  - our shoes
  lexicon: HALOT
  rationale: In the ancient Near Eastern setting, 'sandals' is the more historically and lexically precise rendering.
- source_word: בָּלוּ
  chosen: have worn out
  alternatives:
  - are worn out
  - have become worn
  lexicon: HALOT
  rationale: The verb means to wear out or become old from use. Present perfect in English conveys the resulting state from the journey.
- source_word: מֵרֹב הַדֶּרֶךְ מְאֹד
  chosen: because of the journey being very long
  alternatives:
  - from the very great length of the journey
  - because the journey was exceedingly long
  lexicon: HALOT
  rationale: Literally, the phrase points to the great extent of the journey as the cause. This rendering preserves the causal force of מִן and the intensification of מְאֹד in natural English.
