  from: because of the journey being very long
  to: because the journey was exceedingly long
  rationale: The current gerund phrase 'because of the journey being very long' is grammatically correct but slightly awkward and less direct than a simple causal clause. The alternative 'because the journey was exceedingly long' (which was considered by the drafter) provides a more natural and equally accurate rendering of the Hebrew 'מֵרֹב הַדֶּרֶךְ מְאֹד', preserving the causal force and intensification in idiomatic English.
