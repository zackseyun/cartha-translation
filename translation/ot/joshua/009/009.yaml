id: JOS.9.9
reference: Joshua 9:9
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו מֵ/אֶ֨רֶץ רְחוֹקָ֤ה מְאֹד֙ בָּ֣אוּ עֲבָדֶ֔י/ךָ לְ/שֵׁ֖ם
    יְהוָ֣ה אֱלֹהֶ֑י/ךָ כִּֽי שָׁמַ֣עְנוּ שָׁמְע֔/וֹ וְ/אֵ֛ת כָּל אֲשֶׁ֥ר עָשָׂ֖ה
    בְּ/מִצְרָֽיִם־־׃
translation:
  text: And they said to him, “Your servants have come from a very distant land, because
    of the name of the LORD your God; for we have heard of his fame and all that he
    did in Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we have heard the report about him' or 'we have heard of his renown.'
      The Hebrew uses a cognate expression, literally 'we have heard his hearing/report.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  chosen: And they said to him
  alternatives:
  - Then they said to him
  - So they said to him
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. 'And' preserves
    Hebrew narrative flow without overinterpreting discourse relation.
- source_word: מֵאֶרֶץ רְחוֹקָה מְאֹד
  chosen: from a very distant land
  alternatives:
  - from a land very far away
  - from an exceedingly far land
  lexicon: HALOT
  rationale: Combines the noun 'land' with adjective 'far/distant' and intensifier
    מְאֹד. 'Very distant land' is natural modern English and preserves the emphasis.
- source_word: בָּאוּ
  chosen: have come
  alternatives:
  - came
  lexicon: HALOT
  rationale: English present perfect fits the speakers' present claim about their
    arrival and sounds natural in direct speech, while still reflecting completed
    action.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, here it functions as a deferential
    self-designation in diplomatic speech. 'Servants' best captures the social-political
    humility without importing the stronger bonded sense as the main point.
- source_word: לְשֵׁם יְהוָה אֱלֹהֶיךָ
  chosen: because of the name of the LORD your God
  alternatives:
  - for the sake of the name of the LORD your God
  - on account of the name of the LORD your God
  lexicon: HALOT
  rationale: לְשֵׁם here indicates motive or occasion. 'Because of the name' communicates
    that they came in response to YHWH's renown. Per doctrine, יְהוָה is rendered
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for their claim. 'For' works smoothly after
    the previous clause in English.
- source_word: שָׁמַעְנוּ שָׁמְעוֹ
  chosen: we have heard of his fame
  alternatives:
  - we have heard his report
  - we have heard the report about him
  - we have heard of his renown
  lexicon: HALOT
  rationale: The cognate construction with שמע + שֵׁמַע/שָׁמַע conveys hearing a report,
    reputation, or fame. 'His fame' is idiomatic and captures the sense of widespread
    renown that motivates their journey.
- source_word: וְאֵת כָּל אֲשֶׁר עָשָׂה בְּמִצְרָיִם
  chosen: and all that he did in Egypt
  alternatives:
  - and everything that he did in Egypt
  lexicon: HALOT
  rationale: Straightforward rendering of the object marker plus כָּל אֲשֶׁר clause.
    'All that he did' is concise and natural.
