id: JOS.9.17
reference: Joshua 9:17
source:
  edition: WLC
  text: וַ/יִּסְע֣וּ בְנֵֽי יִשְׂרָאֵ֗ל וַ/יָּבֹ֛אוּ אֶל עָרֵי/הֶ֖ם בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י
    וְ/עָרֵי/הֶם֙ גִּבְע֣וֹן וְ/הַ/כְּפִירָ֔ה וּ/בְאֵר֖וֹת וְ/קִרְיַ֥ת יְעָרִֽים־־׃
translation:
  text: So the sons of Israel set out and came to their cities on the third day. Now
    their cities were Gibeon, Kephirah, Beeroth, and Kiriath-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Kephirah is traditionally rendered 'Chephirah' in some English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - broke camp and traveled
  lexicon: HALOT
  rationale: From נסע in the wayyiqtol, indicating departure/travel. 'Set out' is
    natural modern English and preserves the narrative movement without over-specifying
    camping imagery.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct. Because the
    phrase is a standard ethnonym, 'the Israelites' is possible, but 'the sons of
    Israel' better reflects the source wording and aligns with the gender-accurate
    policy.
- source_word: וַיָּבֹאוּ אֶל עָרֵיהֶם
  chosen: came to their cities
  alternatives:
  - came into their cities
  - arrived at their cities
  lexicon: HALOT
  rationale: בוא with אֶל naturally means 'come to/arrive at.' 'Came to their cities'
    is idiomatic and sufficiently literal.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - by the third day
  lexicon: HALOT
  rationale: The temporal phrase most straightforwardly means 'on the third day.'
    This matches normal Hebrew temporal usage in narrative.
- source_word: וְעָרֵיהֶם
  chosen: Now their cities were
  alternatives:
  - and their cities were
  - their cities were
  lexicon: HALOT
  rationale: The conjunction introduces an explanatory/appositional clause listing
    the cities. 'Now' captures the discourse shift smoothly in English better than
    a wooden repeated 'and.'
- source_word: גִּבְעוֹן
  chosen: Gibeon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: הַכְּפִירָה
  chosen: Kephirah
  alternatives:
  - Chephirah
  lexicon: HALOT
  rationale: A direct transliteration from the Hebrew consonants. 'Chephirah' reflects
    older English tradition influenced by different transliteration conventions; 'Kephirah'
    is more transparent to the Hebrew form.
- source_word: בְּאֵרוֹת
  chosen: Beeroth
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiriath Yearim
  lexicon: HALOT
  rationale: Conventional English transliteration of the compound place name; the
    hyphen helps readability while preserving the Hebrew name structure.
