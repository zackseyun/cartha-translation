theological_decisions:
- issue: Rendering of בְרִית in a political agreement context
  chosen_reading: covenant
  alternative_readings:
  - treaty
  rationale: Although the context is diplomatic, the Hebrew term is the standard biblical
    word בְרִית. Following the translation philosophy of consistency of key terms,
    'covenant' is retained in the main text, while the more narrowly political nuance
    'treaty' is preserved as an alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
