id: JOS.9.6
reference: Joshua 9:6
source:
  edition: WLC
  text: וַ/יֵּלְכ֧וּ אֶל יְהוֹשֻׁ֛עַ אֶל הַֽ/מַּחֲנֶ֖ה הַ/גִּלְגָּ֑ל וַ/יֹּאמְר֨וּ
    אֵלָ֜י/ו וְ/אֶל אִ֣ישׁ יִשְׂרָאֵ֗ל מֵ/אֶ֤רֶץ רְחוֹקָה֙ בָּ֔אנוּ וְ/עַתָּ֖ה כִּרְתוּ
    לָ֥/נוּ בְרִֽית־־־־׃
translation:
  text: They went to Joshua at the camp at Gilgal and said to him and to the men of
    Israel, “We have come from a distant land; so now make a covenant with us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “make a treaty with us.” The Hebrew idiom is literally “cut a covenant
      with us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: They went
  alternatives:
  - They came
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' In narrative sequence, 'went' best
    reflects the wayyiqtol form and avoids importing the destination-oriented nuance
    of 'came,' which is already supplied by the following prepositional phrases.
- source_word: אֶל יְהוֹשֻׁעַ אֶל הַמַּחֲנֶה הַגִּלְגָּל
  chosen: to Joshua at the camp at Gilgal
  alternatives:
  - to Joshua, to the camp at Gilgal
  - to Joshua, at the camp, Gilgal
  lexicon: HALOT
  rationale: 'The repeated אֶל marks movement toward Joshua and toward the camp location.
    Smooth English is achieved by rendering the second phrase appositionally as location:
    ''at the camp at Gilgal.'' This preserves both destination and place without awkward
    repetition.'
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה denotes a camp or encampment. 'Camp' is the most natural modern
    English equivalent and fits the military-travel context.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - and they said
  - and spoke
  lexicon: HALOT
  rationale: אָמַר is the standard verb for speech. 'And said' keeps the narrative
    flow concise and natural.
- source_word: אֵלָיו וְאֶל אִישׁ יִשְׂרָאֵל
  chosen: to him and to the men of Israel
  alternatives:
  - to him and to the man of Israel
  - to him and to the people of Israel
  lexicon: HALOT
  rationale: אִישׁ יִשְׂרָאֵל is a collective singular construction meaning the Israelite
    men / men of Israel. Because the following imperative is plural, the address is
    to Joshua and the broader Israelite representatives. 'Men of Israel' preserves
    the masculine form and collective sense better than the more generic 'people of
    Israel.'
- source_word: מֵאֶרֶץ רְחוֹקָה
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/country; רְחוֹקָה means distant/far. 'Distant land'
    is readable modern English and preserves the claim of geographical remoteness.
- source_word: בָּאנוּ
  chosen: We have come
  alternatives:
  - we came
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result statement in English.
    'We have come' fits direct speech naturally and highlights their present arrival
    before Joshua.
- source_word: וְעַתָּה
  chosen: so now
  alternatives:
  - and now
  - now therefore
  lexicon: HALOT
  rationale: וְעַתָּה often marks an inferential transition in requests. 'So now'
    captures the discourse move in natural English without becoming overly formal.
- source_word: כִּרְתוּ לָנוּ בְרִית
  chosen: make a covenant with us
  alternatives:
  - cut a covenant with us
  - make a treaty with us
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' The literal 'cut'
    is opaque in contemporary English, so 'make a covenant' is preferred in the main
    text. 'Treaty' captures the political sense but loses the lexical consistency
    and biblical resonance of בְרִית as 'covenant.'
