id: JOS.9.5
reference: Joshua 9:5
source:
  edition: WLC
  text: וּ/נְעָל֨וֹת בָּל֤וֹת וּ/מְטֻלָּאוֹת֙ בְּ/רַגְלֵי/הֶ֔ם וּ/שְׂלָמ֥וֹת בָּל֖וֹת
    עֲלֵי/הֶ֑ם וְ/כֹל֙ לֶ֣חֶם צֵידָ֔/ם יָבֵ֖שׁ הָיָ֥ה נִקֻּדִֽים׃
translation:
  text: They had worn-out and patched sandals on their feet, and worn-out clothes
    on themselves; and all the bread of their provision was dry and crumbly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'moldy.' The Hebrew term translated 'crumbly' is rare and may denote
      bread that was dry and broken into pieces, though some understand it as 'moldy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְעָלוֹת
  chosen: sandals
  alternatives:
  - shoes
  lexicon: HALOT
  rationale: Refers to footwear of the ancient Near Eastern type; 'sandals' is more
    specific and natural than the broader 'shoes.'
- source_word: בָּלוֹת
  chosen: worn-out
  alternatives:
  - old
  - tattered
  lexicon: HALOT
  rationale: The adjective denotes something worn from age/use. 'Worn-out' captures
    the condition more precisely than merely 'old.'
- source_word: מְטֻלָּאוֹת
  chosen: patched
  alternatives:
  - mended
  - patched up
  lexicon: HALOT
  rationale: Passive participial form indicating repaired by patching. 'Patched' is
    concise and idiomatic in English.
- source_word: בְּרַגְלֵיהֶם
  chosen: on their feet
  alternatives:
  - upon their feet
  lexicon: HALOT
  rationale: Natural English rendering of the locative phrase while preserving the
    concrete detail.
- source_word: שְׂלָמוֹת
  chosen: clothes
  alternatives:
  - garments
  - outer garments
  lexicon: HALOT
  rationale: A general term for clothing/cloaks. 'Clothes' is readable modern English;
    'garments' is possible but less natural. 'Outer garments' may be too specific
    here.
- source_word: עֲלֵיהֶם
  chosen: on themselves
  alternatives:
  - on them
  lexicon: HALOT
  rationale: Keeps the physical imagery of clothing being worn, while sounding natural
    in English.
- source_word: לֶחֶם צֵידָם
  chosen: the bread of their provision
  alternatives:
  - their food supply
  - the bread of their journey provisions
  lexicon: HALOT
  rationale: Literally 'bread of their provision.' Retaining 'bread' preserves the
    Hebrew concreteness, while 'of their provision' communicates that it was travel
    food/supplies.
- source_word: יָבֵשׁ הָיָה
  chosen: was dry
  alternatives:
  - had become dry
  lexicon: HALOT
  rationale: The stative construction describes its condition. 'Was dry' is straightforward
    and sufficient in context.
- source_word: נִקֻּדִים
  chosen: crumbly
  alternatives:
  - moldy
  - cracked into crumbs
  - spotted
  lexicon: HALOT
  rationale: The term is difficult and context-specific; in this narrative it describes
    bread deteriorated into dry, broken pieces rather than fungal mold. 'Crumbly'
    fits the deception motif and the likely sense of bread reduced to dry fragments.
