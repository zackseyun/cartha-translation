id: JOS.9.26
reference: Joshua 9:26
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ לָ/הֶ֖ם כֵּ֑ן וַ/יַּצֵּ֥ל אוֹתָ֛/ם מִ/יַּ֥ד בְּנֵֽי יִשְׂרָאֵ֖ל
    וְ/לֹ֥א הֲרָגֽוּ/ם־׃
translation:
  text: 'So he did this for them: he delivered them from the hand of the sons of Israel,
    and they did not kill them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לָהֶם כֵּן
  chosen: So he did this for them
  alternatives:
  - And he did so for them
  - He dealt with them in this way
  lexicon: HALOT
  rationale: The idiom combines עשה with כן ('do thus/so'). 'So he did this for them'
    preserves the resumptive force from the previous context while remaining natural
    English.
- source_word: וַיַּצֵּל
  chosen: he delivered
  alternatives:
  - he rescued
  - he saved
  lexicon: HALOT
  rationale: נצל in the Hiphil commonly means to snatch away, deliver, or rescue.
    'Delivered' fits the formal context and works well with the following phrase 'from
    the hand of.'
- source_word: אוֹתָם
  chosen: them
  rationale: Direct-object pronoun referring to the Gibeonites; straightforwardly
    rendered 'them.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' is common and still intelligible
    in English. It preserves the concrete metaphor of power/control better than the
    more interpretive 'from the power of.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the masculine plural construct
    is preserved as 'sons of Israel.' 'Israelites' is possible but smooths over the
    source expression.
- source_word: וְלֹא הֲרָגוּם
  chosen: and they did not kill them
  alternatives:
  - so they did not kill them
  - and did not put them to death
  lexicon: HALOT
  rationale: The plural verb naturally refers back to the sons of Israel. 'Kill' is
    the plain sense of הרג and is preferable to the more formal 'put to death' here.
