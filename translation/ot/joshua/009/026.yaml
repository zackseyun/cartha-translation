theological_decisions:
- issue: Gendered corporate designation in בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural. Following the doctrine's gender-accurate
    principle, the translation preserves the form unless context clearly demands a
    more generic rendering. Here the phrase is a standard national designation, but
    preserving 'sons of Israel' keeps closer contact with the source text while remaining
    understandable.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
