id: JOS.9.2
reference: Joshua 9:2
source:
  edition: WLC
  text: וַ/יִּֽתְקַבְּצ֣וּ יַחְדָּ֔ו לְ/הִלָּחֵ֥ם עִם יְהוֹשֻׁ֖עַ וְ/עִם יִשְׂרָאֵ֑ל
    פֶּ֖ה אֶחָֽד־־׃פ
translation:
  text: they gathered together to fight against Joshua and against Israel, with one
    accord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'one mouth'; the Hebrew idiom means acting in complete unity
      or agreement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  chosen: they gathered
  alternatives:
  - they assembled
  - they banded together
  lexicon: HALOT
  rationale: The Niphal/waw-consecutive form of קבץ here denotes coming together as
    a group. 'They gathered' is natural modern English and preserves the collective
    action without overinterpreting motive.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: This adverb emphasizes united action. 'Together' is the most straightforward
    rendering and works idiomatically with the preceding verb.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The infinitive of לחם in the Niphal means to engage in battle. 'To fight'
    is clear and sufficiently formal without sounding archaic.
- source_word: עִם
  chosen: against
  alternatives:
  - with
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' after verbs of fighting it often
    carries adversative force, meaning opposition rather than accompaniment. English
    requires 'against' here to convey the sense accurately.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name.
- source_word: וְעִם יִשְׂרָאֵל
  chosen: and against Israel
  alternatives:
  - and with Israel
  lexicon: HALOT
  rationale: The repeated preposition mirrors the Hebrew structure and again has adversative
    sense in this military context. Repeating 'against' preserves both the syntax
    and the meaning.
- source_word: פֶּה אֶחָד
  chosen: with one accord
  alternatives:
  - with one mouth
  - as one
  lexicon: HALOT
  rationale: Literally 'one mouth,' this Hebrew idiom expresses unanimity or united
    purpose. 'With one accord' best captures the idiomatic sense in readable English
    while preserving the force of coordinated action.
