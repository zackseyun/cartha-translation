theological_decisions:
- issue: Identity of the 'man' encountered by Joshua
  chosen_reading: Render neutrally as 'a man' without specifying angel, the LORD,
    or a preincarnate appearance of Christ in the main text.
  alternative_readings:
  - an angelic messenger
  - the angel of the LORD
  - a theophanic or christophanic appearance
  rationale: The verse itself introduces the figure only as 'a man.' Later context
    may inform interpretation, but this verse should not resolve the identification
    beyond what the Hebrew states. This preserves theological tension rather than
    importing a doctrinal conclusion not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
