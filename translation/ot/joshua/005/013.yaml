id: JOS.5.13
reference: Joshua 5:13
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּֽ/הְי֣וֹת יְהוֹשֻׁעַ֮ בִּ/ירִיחוֹ֒ וַ/יִּשָּׂ֤א עֵינָי/ו֙ וַ/יַּ֔רְא
    וְ/הִנֵּה אִישׁ֙ עֹמֵ֣ד לְ/נֶגְדּ֔/וֹ וְ/חַרְבּ֥/וֹ שְׁלוּפָ֖ה בְּ/יָד֑/וֹ וַ/יֵּ֨לֶךְ
    יְהוֹשֻׁ֤עַ אֵלָי/ו֙ וַ/יֹּ֣אמֶר ל֔/וֹ הֲ/לָ֥/נוּ אַתָּ֖ה אִם לְ/צָרֵֽי/נוּ־־׃
translation:
  text: And it happened, when Joshua was at Jericho, that he lifted up his eyes and
    looked, and behold, a man was standing opposite him with his sword drawn in his
    hand. Joshua went to him and said to him, “Are you for us, or for our enemies?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in Jericho' or 'near Jericho.' The Hebrew preposition can be understood
      more broadly than a precise point inside the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened'
    preserves the Hebrew discourse marker without archaic phrasing like 'came to pass.'
- source_word: בִּהְיוֹת
  chosen: when ... was
  alternatives:
  - while ... was
  - as ... was
  lexicon: HALOT
  rationale: The infinitive construct with ב marks temporal circumstance. 'When Joshua
    was at Jericho' is natural English and preserves the temporal setting.
- source_word: בִּירִיחוֹ
  chosen: at Jericho
  alternatives:
  - in Jericho
  - near Jericho
  lexicon: HALOT
  rationale: The preposition ב can indicate location broadly. Given the military context
    and the following encounter outside the city proper, 'at Jericho' is suitably
    idiomatic and less over-specific than 'in Jericho' while remaining faithful to
    the Hebrew.
- source_word: וַיִּשָּׂא עֵינָיו
  chosen: he lifted up his eyes
  alternatives:
  - he looked up
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. Retaining 'lifted up his eyes' preserves
    the vividness of the source; the following 'and looked' reflects the next verb
    rather than collapsing both into one English expression.
- source_word: וַיַּרְא
  chosen: and looked
  alternatives:
  - and saw
  lexicon: HALOT
  rationale: Because the next clause identifies what he saw, 'looked' works smoothly
    after 'lifted up his eyes.' This avoids awkward repetition while still representing
    the visual action.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there was
  - suddenly
  lexicon: HALOT
  rationale: The particle marks a vivid, attention-directing presentation. 'Behold'
    preserves the force better than flattening it to 'there was,' while remaining
    understandable in modern literary English.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a warrior
  lexicon: HALOT
  rationale: The Hebrew plainly says 'a man.' Although the drawn sword suggests a
    warrior, the text itself withholds fuller identification at this point, so the
    translation should not import it.
- source_word: עֹמֵד לְנֶגְדּוֹ
  chosen: was standing opposite him
  alternatives:
  - was standing before him
  - was standing facing him
  lexicon: HALOT
  rationale: לְנֶגֶד conveys being in front of or opposite. 'Standing opposite him'
    captures the confrontational spatial sense in context.
- source_word: חַרְבּוֹ שְׁלוּפָה בְּיָדוֹ
  chosen: with his sword drawn in his hand
  alternatives:
  - with his sword unsheathed in his hand
  - and his sword was drawn in his hand
  lexicon: HALOT
  rationale: שׁלופה means drawn/unsheathed. 'With his sword drawn in his hand' is
    clear, natural, and preserves the threatening posture.
- source_word: וַיֵּלֶךְ ... אֵלָיו
  chosen: Joshua went to him
  alternatives:
  - Joshua approached him
  - Joshua walked up to him
  lexicon: HALOT
  rationale: The verb simply denotes movement toward the figure. 'Went to him' is
    straightforward and sufficiently formal for the narrative.
- source_word: הֲלָנוּ אַתָּה אִם לְצָרֵינוּ
  chosen: Are you for us, or for our enemies?
  alternatives:
  - Are you one of us, or one of our adversaries?
  - Are you for us or for our foes?
  lexicon: HALOT
  rationale: 'The interrogative plus ל expresses allegiance: ''Are you for us...?''
    צָרִים are adversaries/enemies. ''Enemies'' is the clearest modern rendering in
    this military setting.'
