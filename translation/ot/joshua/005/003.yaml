id: JOS.5.3
reference: Joshua 5:3
source:
  edition: WLC
  text: וַ/יַּעַשׂ ל֥/וֹ יְהוֹשֻׁ֖עַ חַֽרְב֣וֹת צֻרִ֑ים וַ/יָּ֨מָל֙ אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל
    אֶל גִּבְעַ֖ת הָ/עֲרָלֽוֹת־־־׃
translation:
  text: So Joshua made for himself flint knives and circumcised the sons of Israel
    at the Hill of the Foreskins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “flint swords/blades”; the Hebrew word for the implement often means
      “sword,” but here refers to cutting tools used for circumcision.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “sons of Israel”; many translations render this “Israelites.”
    reason: lexical_alternative
  - marker: c
    text: Or transliterated “Gibeath-haaraloth.” The Hebrew means “Hill of the Foreskins.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה in this narrative context straightforwardly means 'made'
    or 'fashioned.' 'Made' is the most natural modern English rendering and preserves
    the simple narrative flow.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix can be rendered literally 'for
    him,' but in context it refers reflexively to Joshua's own procurement/preparation
    of the knives. 'For himself' makes the sense clear in idiomatic English without
    adding meaning beyond the Hebrew.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention.
- source_word: חַרְבוֹת
  chosen: knives
  alternatives:
  - swords
  - blades
  lexicon: HALOT
  rationale: Although חֶרֶב often means 'sword,' in a circumcision context 'knives'
    best reflects the functional sense. 'Swords' would be misleading in English, while
    'blades' is possible but less specific.
- source_word: צֻרִים
  chosen: flint
  alternatives:
  - stone
  - rock
  lexicon: HALOT
  rationale: צור here denotes flint/rock material. 'Flint' is the conventional and
    contextually precise rendering for cutting implements used in circumcision narratives.
- source_word: וַיָּמָל
  chosen: circumcised
  lexicon: HALOT
  rationale: The verb מול unambiguously means 'circumcise.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This formally reflects the Hebrew construct phrase while remaining natural
    enough in English. 'The Israelites' is smoother but less formally transparent;
    'children of Israel' is traditional but less natural in contemporary English.
    Because the source is explicitly masculine plural, 'sons' preserves the form in
    keeping with the gender-accurate policy.
- source_word: אֶל
  chosen: at
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' with a place name in this context
    English idiom prefers 'at,' indicating the location where the circumcision occurred.
- source_word: גִּבְעַת הָעֲרָלוֹת
  chosen: the Hill of the Foreskins
  alternatives:
  - Gibeath-haaraloth
  - the hill of circumcisions
  lexicon: HALOT
  rationale: The phrase is a descriptive place name formed from 'hill' plus 'foreskins.'
    Translating it preserves the plain sense of the Hebrew. A transliteration is possible,
    but the translation philosophy favors source meaning over inherited opacity when
    the Hebrew is transparent. 'Hill of the Foreskins' is blunt but accurate.
