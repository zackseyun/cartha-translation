id: JOS.5.5
reference: Joshua 5:5
source:
  edition: WLC
  text: כִּֽי מֻלִ֣ים הָי֔וּ כָּל הָ/עָ֖ם הַ/יֹּֽצְאִ֑ים וְ/כָל הָ֠/עָם הַ/יִּלֹּדִ֨ים
    בַּ/מִּדְבָּ֥ר בַּ/דֶּ֛רֶךְ בְּ/צֵאתָ֥/ם מִ/מִּצְרַ֖יִם לֹא מָֽלוּ־־־־׃
translation:
  text: For all the people who came out had been circumcised, but all the people born
    in the wilderness on the way, after they came out from Egypt, had not been circumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all the people born in the wilderness along the way
      as they came out from Egypt had not been circumcised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding statement in v. 4; 'for'
    fits the discourse connection naturally in English.
- source_word: מֻלִים הָיוּ
  chosen: had been circumcised
  alternatives:
  - were circumcised
  lexicon: HALOT
  rationale: The passive participle with היה expresses a prior state; English pluperfect
    best conveys that those who came out of Egypt were already circumcised.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the nation
  - all the men
  lexicon: HALOT
  rationale: עם here refers collectively to the people group under discussion, not
    specifically adult males in wording, even though circumcision applies to males.
    'People' preserves the collective sense without importing a narrower term not
    present in the Hebrew.
- source_word: הַיֹּצְאִים
  chosen: who came out
  alternatives:
  - who were coming out
  - who went out
  lexicon: HALOT
  rationale: The participle functions substantivally for the generation that exited
    Egypt. 'Who came out' is idiomatic and fits the retrospective narrative context.
- source_word: וְכָל הָעָם הַיִּלֹּדִים
  chosen: but all the people born
  alternatives:
  - and all the people born
  - while all the people born
  lexicon: HALOT
  rationale: The conjunction marks contrast between the circumcised exodus generation
    and the uncircumcised wilderness-born generation. Rendering with 'but' makes the
    contrast explicit in natural English.
- source_word: הַיִּלֹּדִים
  chosen: born
  alternatives:
  - those who were born
  - begotten
  lexicon: HALOT
  rationale: Passive/adjectival form describing the later generation. 'Born' is concise
    and natural in English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מדבר in Israel''s exodus
    context and preserves biblical resonance better than ''desert''.'
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the journey
  - on the road
  lexicon: HALOT
  rationale: Refers to the journeying context between Egypt and the land. 'On the
    way' is idiomatic and sufficiently literal.
- source_word: בְּצֵאתָם מִמִּצְרַיִם
  chosen: after they came out from Egypt
  alternatives:
  - when they came out of Egypt
  - during their coming out from Egypt
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks the time reference tied
    to the journey. 'After they came out from Egypt' clarifies that these births occurred
    during the post-exodus wilderness period.
- source_word: לֹא מָלוּ
  chosen: had not been circumcised
  alternatives:
  - were not circumcised
  - they did not circumcise them
  lexicon: HALOT
  rationale: The clause states the uncircumcised condition of the wilderness-born
    generation. English passive best matches the sense in context, even though the
    Hebrew verb is active, because the focus is their state rather than the unnamed
    agents' failure.
