id: JOS.5.1
reference: Joshua 5:1
source:
  edition: WLC
  text: וַ/יְהִ֣י כִ/שְׁמֹ֣עַ כָּל מַלְכֵ֣י הָ/אֱמֹרִ֡י אֲשֶׁר֩ בְּ/עֵ֨בֶר הַ/יַּרְדֵּ֜ן יָ֗מָּ/ה וְ/כָל מַלְכֵ֤י הַֽ/כְּנַעֲנִי֙ אֲשֶׁ֣ר עַל הַ/יָּ֔ם אֵ֠ת אֲשֶׁר הוֹבִ֨ישׁ יְהוָ֜ה אֶת מֵ֧י הַ/יַּרְדֵּ֛ן מִ/פְּנֵ֥י בְנֵֽי יִשְׂרָאֵ֖ל עַד עבר/נו וַ/יִּמַּ֣ס לְבָבָ֗/ם וְ/לֹא הָ֨יָה בָ֥/ם עוֹד֙ ר֔וּחַ מִ/פְּנֵ֖י בְּנֵֽי יִשְׂרָאֵֽל־־־־־־־־־׃ס
translation:
  text: And it happened, when all the kings of the Amorites who were beyond the Jordan to the west, and all the kings of the Canaanites who were by the sea, heard that Yahweh had dried up the waters of the Jordan before the sons of Israel until they had crossed over, their hearts melted, and there was no longer spirit in them because of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the kings of the Canaanites who were on the coast'; 'by the sea' refers to the coastal region.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts and ancient versions read 'until they had crossed over' instead of 'until we had crossed over.'
    reason: textual_variant
  - marker: c
    text: Hebrew 'there was no longer spirit in them,' an idiom for lost courage or resolve.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened' preserves the discourse function without archaic phrasing like 'came to pass.'
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - upon hearing
  - as soon as ... heard
  lexicon: HALOT
  rationale: Infinitive construct with כ marks temporal circumstance. 'When ... heard' is natural English and sufficiently formal.
- source_word: כָּל מַלְכֵי הָאֱמֹרִי
  chosen: all the kings of the Amorites
  alternatives:
  - every king of the Amorites
  lexicon: HALOT
  rationale: Collective plural construction is best represented straightforwardly. Retains ethnic designation rather than generalizing.
- source_word: בְּעֵבֶר הַיַּרְדֵּן יָמָּה
  chosen: beyond the Jordan to the west
  alternatives:
  - across the Jordan westward
  - on the far side of the Jordan toward the sea
  lexicon: HALOT
  rationale: עֵבֶר with Jordan denotes the other side; יָמָּה is directional 'westward/seaward.' Since the frame of reference here is Cisjordan kings, 'to the west' communicates the geography clearly.
- source_word: כָּל מַלְכֵי הַכְּנַעֲנִי אֲשֶׁר עַל הַיָּם
  chosen: all the kings of the Canaanites who were by the sea
  alternatives:
  - '... who were on the coast'
  - '... who were by the Mediterranean Sea'
  lexicon: HALOT
  rationale: עַל הַיָּם here refers to the coastal region. 'By the sea' is a close rendering; a more specific identification can be preserved in a footnote.
- source_word: הוֹבִישׁ
  chosen: had dried up
  alternatives:
  - made dry
  - dried
  lexicon: HALOT
  rationale: Hiphil of יבש means to cause to dry up. 'Had dried up' fits the prior event and idiomatic English for waters.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵי הַיַּרְדֵּן
  chosen: the waters of the Jordan
  alternatives:
  - the Jordan's waters
  lexicon: HALOT
  rationale: Construct phrase rendered transparently and naturally.
- source_word: מִפְּנֵי בְנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - before the Israelites
  - before the children of Israel
  lexicon: HALOT
  rationale: Literally 'from before/before the sons of Israel.' 'Before' fits the context of waters being removed ahead of their passage. 'Sons of Israel' preserves the source's familial-national expression under the gender-accurate policy.
- source_word: עַד עברנו
  chosen: until we had crossed over
  alternatives:
  - until they had crossed over
  - until our crossing over
  lexicon: HALOT
  rationale: 'The Ketiv/Qere issue affects person: the consonantal form points to first common plural (''we crossed over''), while some traditions/readings reflect third plural (''they crossed over''). The MT form is retained in the main text, with the alternative preserved in a footnote because it materially affects narration.'
- source_word: וַיִּמַּס לְבָבָם
  chosen: their heart melted
  alternatives:
  - their hearts melted
  - their courage melted away
  lexicon: HALOT
  rationale: Hebrew has singular collective 'their heart.' Retaining the singular reflects the idiom closely; the metaphor of melting conveys fear and loss of resolve.
- source_word: וְלֹא הָיָה בָם עוֹד רוּחַ
  chosen: there was no longer spirit in them
  alternatives:
  - there was no longer courage in them
  - they no longer had any spirit
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, breath, or courage. Here it idiomatically refers to inner resolve/courage, but 'spirit' preserves the Hebrew image while remaining understandable.
- source_word: מִפְּנֵי בְנֵי יִשְׂרָאֵל
  chosen: because of the sons of Israel
  alternatives:
  - before the sons of Israel
  - because of the Israelites
  lexicon: HALOT
  rationale: 'In this final clause, מִפְּנֵי is causal in effect: their courage failed because of Israel''s presence/advance. ''Because of'' communicates the sense more clearly in English.'
