theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered national designation בְנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The source is grammatically masculine plural in a standard covenantal/national expression. Per the gender-accurate policy, the translation preserves the masculine familial form rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Person of the verb in עַד עברנו
  chosen_reading: until we had crossed over
  alternative_readings:
  - until they had crossed over
  rationale: The Masoretic consonantal form supports first person plural, likely reflecting narrator identification with Israel. Because the third person reading is also well known in versions/manuscripts and affects the English wording, it is preserved in a footnote rather than silently resolved.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
