id: JOS.5.8
reference: Joshua 5:8
source:
  edition: WLC
  text: וַ/יְהִ֛י כַּ/אֲשֶׁר תַּ֥מּוּ כָל הַ/גּ֖וֹי לְ/הִמּ֑וֹל וַ/יֵּשְׁב֥וּ תַחְתָּ֛/ם
    בַּֽ/מַּחֲנֶ֖ה עַ֥ד חֲיוֹתָֽ/ם־־׃פ
translation:
  text: And when all the nation had finished being circumcised, they remained in their
    places in the camp until they recovered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until they were healed' or 'until they revived.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a temporal clause. 'And when'
    preserves the sequence naturally in English without over-literal awkwardness.
- source_word: תַּמּוּ
  chosen: had finished
  alternatives:
  - were finished
  - came to an end
  lexicon: HALOT
  rationale: The verb marks completion. 'Had finished' fits the temporal clause and
    idiomatic English better than the more wooden 'were finished.'
- source_word: כָל הַגּוֹי
  chosen: all the nation
  alternatives:
  - all the people
  - the whole nation
  lexicon: HALOT
  rationale: Though גּוֹי can mean 'nation' or 'people,' here it refers corporately
    to Israel. 'All the nation' preserves the singular collective force of the Hebrew
    better than a plural rendering.
- source_word: לְהִמּוֹל
  chosen: being circumcised
  alternatives:
  - to be circumcised
  - undergoing circumcision
  lexicon: HALOT
  rationale: The infinitive with ל marks the action completed by the nation. 'Being
    circumcised' is natural after 'had finished' and keeps the passive/reflexive sense
    of the Niphal.
- source_word: וַיֵּשְׁבוּ
  chosen: they remained
  alternatives:
  - they stayed
  - they sat
  lexicon: HALOT
  rationale: While the verb literally can mean 'sat' or 'dwelt/remained,' the context
    is recuperation after circumcision. 'Remained' conveys continued staying in place
    without implying a seated posture.
- source_word: תַחְתָּם
  chosen: in their places
  alternatives:
  - under them
  - where they were
  - in place
  lexicon: HALOT
  rationale: In this idiom the term refers to staying where one is, not spatial 'under.'
    'In their places' captures the contextual sense clearly.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - at the camp
  lexicon: HALOT
  rationale: Standard locative rendering of the prepositional phrase.
- source_word: עַד חֲיוֹתָם
  chosen: until they recovered
  alternatives:
  - until they lived
  - until they revived
  - until they were healed
  lexicon: HALOT
  rationale: From חיה in context of post-circumcision recovery, the sense is restoration
    to health/strength. 'Recovered' is idiomatic and contextually precise; 'were healed'
    is possible but slightly more interpretive.
