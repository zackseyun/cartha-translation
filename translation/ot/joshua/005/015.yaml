theological_decisions:
- issue: Identity and status of the speaker as שַׂר צְבָא יְהוָה
  chosen_reading: Render the title descriptively as 'the commander of Yahweh’s army' without specifying whether this figure is an angel, a theophany, or a Christophany.
  alternative_readings:
  - an angelic commander
  - a manifestation of the LORD
  - a preincarnate appearance of Christ
  rationale: The verse itself gives the title and records the command concerning holy ground, but it does not explicitly identify the figure beyond that title. To preserve theological tension and avoid importing a doctrinal conclusion the text does not state, the translation remains descriptive rather than interpretive.
  doctrine_reference: Preserve theological tension rather than resolve it.
