id: JOS.5.15
reference: Joshua 5:15
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ שַׂר צְבָ֨א יְהוָ֜ה אֶל יְהוֹשֻׁ֗עַ שַׁל נַֽעַלְ/ךָ֙ מֵ/עַ֣ל רַגְלֶ֔/ךָ כִּ֣י הַ/מָּק֗וֹם אֲשֶׁ֥ר אַתָּ֛ה עֹמֵ֥ד עָלָ֖י/ו קֹ֣דֶשׁ ה֑וּא וַ/יַּ֥עַשׂ יְהוֹשֻׁ֖עַ כֵּֽן־־־׃
translation:
  text: Then the commander of Yahweh’s army said to Joshua, “Take your sandal off your foot, because the place where you are standing is holy.” And Joshua did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the army of the LORD” or “the host of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew singular: “your sandal ... your foot.” Compare the more familiar plural wording in Exodus 3:5.'
    reason: cross_reference
lexical_decisions:
- source_word: שַׂר
  chosen: commander
  alternatives:
  - captain
  - prince
  - chief
  lexicon: HALOT
  rationale: In military context with צְבָא, 'commander' best conveys leadership over an army in clear modern English. 'Captain' is traditional but narrower and potentially anachronistic; 'prince' would mislead here.
- source_word: צְבָא יְהוָה
  chosen: the LORD’s army
  alternatives:
  - the army of the LORD
  - the host of the LORD
  lexicon: HALOT
  rationale: צָבָא commonly denotes an army/host. 'Army' is more accessible than 'host' while preserving the military sense. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שַׁל
  chosen: Take ... off
  alternatives:
  - remove
  - loosen
  lexicon: HALOT
  rationale: Imperative of removing footwear. 'Take off' is idiomatic modern English and fits the direct command.
- source_word: נַעַלְךָ
  chosen: your sandal
  alternatives:
  - your shoe
  - your footwear
  lexicon: HALOT
  rationale: The singular noun is retained in English as singular. 'Sandal' better matches ancient Near Eastern footwear than the generic 'shoe.'
- source_word: מֵעַל רַגְלְךָ
  chosen: off your foot
  alternatives:
  - from on your foot
  - from your feet
  lexicon: HALOT
  rationale: The Hebrew is singular ('your foot'), so the translation preserves the singular rather than conforming to the more familiar plural wording from Exodus 3:5 traditions.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - this place
  - the spot
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; no demonstrative is present in the Hebrew.
- source_word: עֹמֵד עָלָיו
  chosen: you are standing
  alternatives:
  - you stand
  - you are standing on it
  lexicon: HALOT
  rationale: The participle conveys ongoing posture. English naturally omits the explicit 'on it' after 'place where you are standing,' since it is implied.
- source_word: קֹדֶשׁ הוּא
  chosen: is holy
  alternatives:
  - is sacred
  lexicon: HALOT
  rationale: '''Holy'' is the standard and theologically weighty rendering for קֹדֶשׁ; ''sacred'' is possible but weaker in biblical register.'
- source_word: וַיַּעַשׂ ... כֵּן
  chosen: And Joshua did so
  alternatives:
  - And Joshua did thus
  - And Joshua did accordingly
  lexicon: HALOT
  rationale: Idiomatic English rendering of the compliance formula, preserving the narrative note of Joshua's obedience.
