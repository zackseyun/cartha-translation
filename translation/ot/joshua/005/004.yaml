id: JOS.5.4
reference: Joshua 5:4
source:
  edition: WLC
  text: וְ/זֶ֥ה הַ/דָּבָ֖ר אֲשֶׁר מָ֣ל יְהוֹשֻׁ֑עַ כָּל הָ/עָ֣ם הַ/יֹּצֵא֩ מִ/מִּצְרַ֨יִם
    הַ/זְּכָרִ֜ים כֹּ֣ל אַנְשֵׁ֣י הַ/מִּלְחָמָ֗ה מֵ֤תוּ בַ/מִּדְבָּר֙ בַּ/דֶּ֔רֶךְ
    בְּ/צֵאתָ֖/ם מִ/מִּצְרָֽיִם־־׀׃
translation:
  text: 'And this is the reason why Joshua circumcised them: all the people who came
    out of Egypt, the males, all the men of war, had died in the wilderness along
    the way after they came out of Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''And this is the matter that Joshua circumcised: all
      the people...'' The Hebrew expression is idiomatic and introduces the explanation
      for Joshua''s action.'
    reason: lexical_alternative
  - marker: b
    text: '''Men of war'' may also be rendered ''fighting men'' or ''warriors.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה הַדָּבָר
  chosen: And this is the reason
  alternatives:
  - And this is the matter
  - And this is the thing
  lexicon: HALOT
  rationale: The idiom 'this is the matter/thing' introduces an explanation for the
    action in context (why Joshua circumcised the people). 'Reason' brings out the
    explanatory force in natural English without straying beyond the Hebrew sense.
- source_word: אֲשֶׁר מָל יְהוֹשֻׁעַ
  chosen: why Joshua circumcised them
  alternatives:
  - that Joshua circumcised
  - which Joshua circumcised
  lexicon: HALOT
  rationale: The relative clause is elliptical in English if rendered woodenly. Given
    the discourse context, it explains the basis for Joshua's circumcising. 'Them'
    is supplied from context because English requires an object, and the following
    clause identifies the group in view.
- source_word: מָל
  chosen: circumcised
  alternatives:
  - performed circumcision on
  lexicon: HALOT
  rationale: Standard and precise rendering of the verb מול.
- source_word: כָּל הָעָם הַיֹּצֵא מִמִּצְרַיִם
  chosen: all the people who came out of Egypt
  alternatives:
  - all the people who had come out of Egypt
  lexicon: HALOT
  rationale: Straightforward rendering of the noun phrase with participle. Simple
    past reads naturally in English narrative.
- source_word: הַזְּכָרִים
  chosen: the males
  alternatives:
  - the men
  lexicon: HALOT
  rationale: The Hebrew specifically marks sex here, so 'males' preserves the explicit
    wording better than the more interpretive 'men.'
- source_word: כֹּל אַנְשֵׁי הַמִּלְחָמָה
  chosen: all the men of war
  alternatives:
  - all the fighting men
  - all the warriors
  lexicon: HALOT
  rationale: A fairly formal rendering that preserves the military designation. 'Fighting
    men' is possible, but 'men of war' stays closer to the Hebrew while remaining
    understandable.
- source_word: מֵתוּ
  chosen: had died
  alternatives:
  - died
  lexicon: HALOT
  rationale: 'Pluperfect fits the explanatory sense: by the time of Joshua''s circumcising,
    this prior generation was already dead.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard biblical rendering and better matches
    Israel''s wilderness-wandering context than ''desert'' alone.'
- source_word: בַּדֶּרֶךְ
  chosen: along the way
  alternatives:
  - on the way
  - during the journey
  lexicon: HALOT
  rationale: This phrase indicates the course of the journey. 'Along the way' is idiomatic
    and preserves the travel sense.
- source_word: בְּצֵאתָם מִמִּצְרָיִם
  chosen: after they came out of Egypt
  alternatives:
  - when they came out of Egypt
  - upon their coming out of Egypt
  lexicon: HALOT
  rationale: This infinitive construct with preposition marks the time reference connected
    to their journey. 'After they came out' fits the narrative sequence and reads
    naturally in English.
