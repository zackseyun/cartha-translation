id: JOS.5.6
reference: Joshua 5:6
source:
  edition: WLC
  text: כִּ֣י אַרְבָּעִ֣ים שָׁנָ֗ה הָלְכ֣וּ בְנֵֽי יִשְׂרָאֵל֮ בַּ/מִּדְבָּר֒ עַד
    תֹּ֨ם כָּל הַ/גּ֜וֹי אַנְשֵׁ֤י הַ/מִּלְחָמָה֙ הַ/יֹּצְאִ֣ים מִ/מִּצְרַ֔יִם אֲשֶׁ֥ר
    לֹֽא שָׁמְע֖וּ בְּ/ק֣וֹל יְהוָ֑ה אֲשֶׁ֨ר נִשְׁבַּ֤ע יְהוָה֙ לָ/הֶ֔ם לְ/בִלְתִּ֞י
    הַרְאוֹתָ֣/ם אֶת הָ/אָ֗רֶץ אֲשֶׁר֩ נִשְׁבַּ֨ע יְהוָ֤ה לַֽ/אֲבוֹתָ/ם֙ לָ֣/תֶת לָ֔/נוּ
    אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ׀־־־־־׃
translation:
  text: For the sons of Israel had walked in the wilderness forty years, until all
    the nation—the men of war who came out of Egypt—had come to an end, because they
    had not listened to the voice of the LORD. The LORD had sworn to them that he
    would not let them see the land that the LORD had sworn to their fathers to give
    to us, a land flowing with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to give to us''; some ancient versions and translations read
      ''to give to them.'''
    reason: textual_variant
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the previous verse; 'For' preserves the
    explanatory force in natural English.
- source_word: הָלְכוּ
  chosen: had walked
  alternatives:
  - went
  - traveled
  lexicon: HALOT
  rationale: The verb literally means 'walked/went.' 'Had walked' fits the retrospective
    narrative explanation and preserves the concrete movement imagery better than
    the flatter 'traveled.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering of the Hebrew construct, in keeping with the
    stated philosophy. 'Israelites' is smoother but less formally transparent; 'children
    of Israel' is traditional but less natural in modern English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard biblical-geographical term and better
    captures the theological setting of Israel''s wandering than the narrower ''desert.'''
- source_word: עַד תֹּם
  chosen: until ... had come to an end
  alternatives:
  - until ... were finished
  - until ... perished
  lexicon: HALOT
  rationale: The infinitive/verb form marks completion or being used up. 'Had come
    to an end' preserves the completion sense without over-specifying the manner,
    while still fitting the context of the generation's death.
- source_word: כָּל הַגּוֹי
  chosen: all the nation
  alternatives:
  - all the people
  - all the generation
  lexicon: HALOT
  rationale: Though גוי often means 'nation,' here it refers collectively to the body
    of fighting men from the exodus generation. 'Nation' preserves the lexical value
    while the apposition clarifies the referent. 'Generation' is interpretive rather
    than lexical.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the warriors
  - the fighting men
  lexicon: HALOT
  rationale: A fairly literal rendering of the construct phrase. 'Men of war' preserves
    the masculine wording and military sense; 'warriors' is possible but slightly
    more stylized.
- source_word: הַיֹּצְאִים מִמִּצְרַיִם
  chosen: who came out of Egypt
  alternatives:
  - who had come out of Egypt
  lexicon: HALOT
  rationale: This participial phrase identifies the specific group. Simple past works
    naturally in English while retaining the exodus reference.
- source_word: לֹא שָׁמְעוּ בְּקוֹל יְהוָה
  chosen: they had not listened to the voice of the LORD
  alternatives:
  - they had not obeyed the LORD
  - they had not listened to the LORD's voice
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listen to the voice of.' Rendering it
    explicitly preserves both the auditory metaphor and the obedience implication.
    'Obeyed' captures the sense but compresses the idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: נִשְׁבַּע ... לְבִלְתִּי הַרְאוֹתָם
  chosen: had sworn to them that he would not let them see
  alternatives:
  - had sworn to them not to show them
  - had sworn to them that he would not cause them to see
  lexicon: HALOT
  rationale: The construction expresses an oath with the content that they would not
    see the land. 'Would not let them see' is idiomatic English that preserves the
    causative nuance of the Hiphil of ראה.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: Standard covenantal term in this context; 'land' preserves the biblical
    promise motif.
- source_word: לַאֲבוֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically 'their fathers.' 'Ancestors' is broader and
    more interpretive; the more literal rendering preserves the covenantal lineage
    language.
- source_word: לָתֵת לָנוּ
  chosen: to give to us
  alternatives:
  - to give them
  - to give us
  lexicon: HALOT
  rationale: The consonantal text reads first person plural ('to us'), which is the
    more difficult reading and is retained. It likely reflects the narrator's identification
    with Israel. Because many readers expect 'to them,' the alternative is preserved
    in a footnote.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: Established and accurate idiom for the Hebrew participial phrase; it
    communicates abundance and fertility in natural English.
