theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: First-person pronoun in לָנוּ
  chosen_reading: to us
  alternative_readings:
  - to them
  rationale: The Masoretic Text reads first person plural, and the translation preserves
    the source text rather than smoothing it to the expected third person. The alternative
    is preserved in a footnote because some witnesses and translations reflect 'to
    them,' and readers may otherwise assume a mistake.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3, 5
