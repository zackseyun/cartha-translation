id: JOS.5.12
reference: Joshua 5:12
source:
  edition: WLC
  text: וַ/יִּשְׁבֹּ֨ת הַ/מָּ֜ן מִֽ/מָּחֳרָ֗ת בְּ/אָכְלָ/ם֙ מֵ/עֲב֣וּר הָ/אָ֔רֶץ וְ/לֹא
    הָ֥יָה ע֛וֹד לִ/בְנֵ֥י יִשְׂרָאֵ֖ל מָ֑ן וַ/יֹּאכְל֗וּ מִ/תְּבוּאַת֙ אֶ֣רֶץ כְּנַ֔עַן
    בַּ/שָּׁנָ֖ה הַ/הִֽיא־׃ס
translation:
  text: And the manna ceased on the next day, after they had eaten from the produce
    of the land. There was no longer manna for the sons of Israel, and they ate from
    the yield of the land of Canaan that year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the old produce of the land.' The Hebrew term may refer more specifically
      to stored produce from the previous year's crop.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Israel'' is the more literal rendering of the Hebrew; many English
      versions have ''people of Israel'' or ''Israelites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבֹּת
  chosen: ceased
  alternatives:
  - stopped
  - came to an end
  lexicon: HALOT
  rationale: The verb from שׁבת here denotes cessation rather than Sabbath observance.
    'Ceased' is concise, natural English and preserves the eventive sense.
- source_word: הַמָּן / מָן
  chosen: the manna / manna
  lexicon: HALOT
  rationale: Standard rendering for the wilderness food; the article is represented
    in the first occurrence as 'the manna,' while the second occurrence is anarthrous
    in English style as simply 'manna.'
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - from the next day
  lexicon: HALOT
  rationale: In context this temporal expression refers to the day following the Passover-related
    meal just mentioned. 'On the next day' is idiomatic and fits the narrative sequence
    better than a more wooden 'from the next day.'
- source_word: בְּאָכְלָם
  chosen: after they had eaten
  alternatives:
  - when they ate
  - at their eating
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב plus suffix can be rendered
    temporally. 'After they had eaten' best captures the sequence implied in context.
- source_word: מֵעֲבוּר הָאָרֶץ
  chosen: from the produce of the land
  alternatives:
  - from the grain of the land
  - from the old produce of the land
  lexicon: HALOT
  rationale: עֲבוּר here refers to produce/crop of the land. 'Produce' is broad and
    natural. 'Old produce' is possible in light of related usage and some translation
    traditions, but the term itself here does not require 'old,' so that nuance is
    preserved in a footnote rather than the main text.
- source_word: וְלֹא הָיָה עוֹד
  chosen: There was no longer
  alternatives:
  - and there was no more
  - and it was no longer
  lexicon: HALOT
  rationale: This idiomatic English rendering captures the existential clause and
    the adverb עוֹד naturally.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the children of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, בנים is rendered with a masculine term
    where that is the source form. 'Sons of Israel' is more formally transparent than
    'Israelites,' while still understandable.
- source_word: וַיֹּאכְלוּ
  chosen: and they ate
  alternatives:
  - so they ate
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol is best represented by the straightforward
    past tense.
- source_word: מִתְּבוּאַת
  chosen: from the yield
  alternatives:
  - from the produce
  - from the harvest
  lexicon: HALOT
  rationale: תְּבוּאָה commonly denotes produce/yield. Using 'yield' here provides
    slight variation from the earlier עֲבוּר while preserving the agricultural sense.
- source_word: אֶרֶץ כְּנַעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  lexicon: HALOT
  rationale: The construct phrase explicitly names the land; 'the land of Canaan'
    preserves the full expression.
- source_word: בַּשָּׁנָה הַהִיא
  chosen: that year
  alternatives:
  - in that year
  lexicon: HALOT
  rationale: '''That year'' is idiomatic English and accurately conveys the temporal
    phrase.'
