id: JOS.5.2
reference: Joshua 5:2
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא אָמַ֤ר יְהוָה֙ אֶל יְהוֹשֻׁ֔עַ עֲשֵׂ֥ה לְ/ךָ֖ חַֽרְב֣וֹת
    צֻרִ֑ים וְ/שׁ֛וּב מֹ֥ל אֶת בְּנֵֽי יִשְׂרָאֵ֖ל שֵׁנִֽית־־־׃
translation:
  text: At that time the LORD said to Joshua, “Make for yourself flint knives, and
    again circumcise the sons of Israel a second time.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “knives of flint.” The Hebrew expression refers to cutting implements
      made from flint, used here for circumcision.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the sons of Israel”; many translations render this more generally
      as “the Israelites.”
    reason: lexical_alternative
  - marker: c
    text: “A second time” refers to carrying out circumcision again for Israel as
      a people, not necessarily circumcising the same individuals twice.
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that moment
  - At that time
  lexicon: HALOT
  rationale: A standard temporal expression introducing the narrative setting. 'At
    that time' is natural modern English and sufficiently formal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: עֲשֵׂה לְךָ
  chosen: Make for yourself
  alternatives:
  - Make yourself
  - Prepare for yourself
  lexicon: HALOT
  rationale: The imperative plus dative pronoun is naturally rendered 'Make for yourself.'
    This preserves the reflexive nuance without sounding awkward.
- source_word: חַרְבוֹת צֻרִים
  chosen: flint knives
  alternatives:
  - knives of flint
  - flint blades
  lexicon: HALOT
  rationale: חַרְבוֹת can denote cutting implements, not only swords; in the circumcision
    context 'knives' is the clearest idiomatic rendering. צֻרִים specifies the material,
    'flint.' 'Flint knives' communicates both sense and function better than the overly
    literal 'knives of flint.'
- source_word: וְשׁוּב
  chosen: and again
  alternatives:
  - and return
  - and once more
  lexicon: HALOT
  rationale: Though literally 'and return/turn back,' with the following imperative
    it functions adverbially to indicate repetition. 'And again' best captures the
    idiomatic force in English.
- source_word: מֹל
  chosen: circumcise
  alternatives:
  - perform circumcision on
  lexicon: HALOT
  rationale: Direct and standard rendering of the verb מול in this covenantal context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with the gender-accurate
    principle, this is preserved in the main text rather than flattened to 'Israelites,'
    while remaining understandable in English.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - for the second time
  - again
  lexicon: HALOT
  rationale: The adverb explicitly marks a second occurrence. Rendering it as 'a second
    time' preserves the emphasis; since וְשׁוּב already contributes the sense 'again,'
    both elements are represented rather than collapsed.
