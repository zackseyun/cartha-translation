theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and preserves continuity
    with Jewish reverence practice without obscuring that the covenant God is speaking.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source text is grammatically masculine and refers specifically to
    the male descendants who are the objects of circumcision. Preserving 'sons' reflects
    both the Hebrew form and the immediate context better than a gender-neutral collective.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
