theological_decisions:
- issue: Covenantal term for physical state
  chosen_reading: uncircumcised
  alternative_readings:
  - foreskinned
  rationale: The verse concerns literal covenant circumcision, not a metaphorical
    spiritual condition. 'Uncircumcised' preserves the covenantal significance and
    standard biblical idiom in English.
