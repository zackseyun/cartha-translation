id: JOS.5.7
reference: Joshua 5:7
source:
  edition: WLC
  text: וְ/אֶת בְּנֵי/הֶם֙ הֵקִ֣ים תַּחְתָּ֔/ם אֹתָ֖/ם מָ֣ל יְהוֹשֻׁ֑עַ כִּי עֲרֵלִ֣ים
    הָי֔וּ כִּ֛י לֹא מָ֥לוּ אוֹתָ֖/ם בַּ/דָּֽרֶךְ־־־׃
translation:
  text: And Joshua circumcised their sons, whom he had raised up in their place, because
    they were uncircumcised, for they had not circumcised them on the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instead of them'; the Hebrew phrase indicates that these sons took the
      place of the previous generation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: HALOT
  rationale: The conjunction with object marker introduces the next clause in sequence.
    English does not require a separate rendering of the object marker here, so 'And'
    naturally carries the discourse connection.
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  lexicon: HALOT
  rationale: בָּנִים here specifically refers to male offspring in a circumcision
    context, so 'sons' is more precise than the broader 'children'.
- source_word: הֵקִים
  chosen: had raised up
  alternatives:
  - raised up
  - caused to arise
  - established
  lexicon: HALOT
  rationale: The Hiphil of קום here refers to the sons who came in place of the previous
    generation. 'Had raised up' fits the sense of bringing forth/replacing and works
    idiomatically with the following phrase.
- source_word: תַּחְתָּם
  chosen: in their place
  alternatives:
  - instead of them
  - under them
  lexicon: HALOT
  rationale: The preposition תַּחַת commonly means substitution or replacement in
    this context. 'In their place' is idiomatic and clearly expresses succession.
- source_word: אֹתָם ... מָל יְהוֹשֻׁעַ
  chosen: Joshua circumcised
  alternatives:
  - Joshua cut off the foreskin of
  lexicon: HALOT
  rationale: מוּל is the standard verb for circumcising. English normally expresses
    the object once in the clause, so 'Joshua circumcised their sons' is the clearest
    rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: The first כִּי gives the reason Joshua circumcised them. 'Because' makes
    the causal relation explicit in modern English.
- source_word: עֲרֵלִים
  chosen: uncircumcised
  alternatives:
  - foreskinned
  lexicon: HALOT
  rationale: Though literally referring to being uncircumcised, the idiomatic and
    standard English rendering is 'uncircumcised.' It matches the covenantal context
    without awkwardness.
- source_word: הָיוּ
  chosen: they were
  alternatives:
  - they had been
  lexicon: HALOT
  rationale: Simple past is sufficient in English to state their condition at that
    time.
- source_word: כִּי לֹא מָלוּ אֹתָם
  chosen: for they had not circumcised them
  alternatives:
  - because no one had circumcised them
  lexicon: HALOT
  rationale: The second כִּי explains why they were uncircumcised. The Hebrew leaves
    the subject of מָלוּ as an unspecified 'they'; retaining 'they had not circumcised
    them' preserves the source's form better than supplying 'no one.'
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - during the journey
  - on the journey
  lexicon: HALOT
  rationale: The phrase refers to the wilderness journey/travel. 'On the way' is a
    natural, sufficiently literal rendering.
