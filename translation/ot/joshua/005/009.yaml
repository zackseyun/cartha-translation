id: JOS.5.9
reference: Joshua 5:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל יְהוֹשֻׁ֔עַ הַ/יּ֗וֹם גַּלּ֛וֹתִי אֶת חֶרְפַּ֥ת מִצְרַ֖יִם
    מֵ/עֲלֵי/כֶ֑ם וַ/יִּקְרָ֞א שֵׁ֣ם הַ/מָּק֤וֹם הַ/הוּא֙ גִּלְגָּ֔ל עַ֖ד הַ/יּ֥וֹם
    הַ/זֶּֽה־־׃
translation:
  text: And the LORD said to Joshua, “Today I have rolled away the reproach of Egypt
    from upon you.” So the name of that place was called Gilgal to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the disgrace of Egypt' or 'Egypt's reproach.' The phrase may refer to
      the shame of Israel's past in Egypt, reproach from Egypt, or covenant disgrace
      now removed.
    reason: lexical_alternative
  - marker: b
    text: '''Gilgal'' sounds like the Hebrew verb for ''roll away,'' creating a wordplay
      with ''Today I have rolled away.'''
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and standard English Bible usage.
- source_word: גַּלּוֹתִי
  chosen: I have rolled away
  alternatives:
  - I have removed
  - I have uncovered
  lexicon: HALOT
  rationale: The verb from גלל carries the sense of rolling, and the wordplay with
    גִּלְגָּל (Gilgal) is important in this verse. 'Rolled away' preserves the etymological
    connection better than the flatter 'removed.'
- source_word: חֶרְפַּת מִצְרַיִם
  chosen: the reproach of Egypt
  alternatives:
  - the disgrace of Egypt
  - Egypt's shame
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, disgrace, or shame. 'Reproach' preserves both
    the social and covenantal nuance and leaves the genitive relation open, as in
    the Hebrew, rather than over-interpreting it.
- source_word: מֵעֲלֵיכֶם
  chosen: from upon you
  alternatives:
  - from you
  - off you
  lexicon: HALOT
  rationale: The prepositional phrase is more literally 'from upon you.' This slightly
    formal rendering preserves the imagery of something resting on them and now being
    removed.
- source_word: וַיִּקְרָא שֵׁם הַמָּקוֹם הַהוּא גִּלְגָּל
  chosen: So the name of that place was called Gilgal
  alternatives:
  - So he called the name of that place Gilgal
  - Therefore that place was named Gilgal
  lexicon: HALOT
  rationale: The Hebrew has an active singular verb ('he called'), but the subject
    is left implicit and English idiom often prefers a passive naming formula here.
    'Was called' communicates the result naturally while retaining the naming action.
    'So' reflects the narrative consequence from the preceding divine statement and
    the wordplay with Gilgal.
- source_word: גִּלְגָּל
  chosen: Gilgal
  lexicon: HALOT
  rationale: Personal and place names are transliterated by project policy. Retaining
    'Gilgal' also preserves the sound-play with 'rolled away' (גלל).
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English rendering of the Hebrew temporal
    formula, preserving the narrator's perspective.
