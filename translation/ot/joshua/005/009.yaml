theological_decisions:
- issue: Meaning of 'the reproach of Egypt'
  chosen_reading: Kept as an intentionally broad expression without specifying whether
    it refers to slavery, uncircumcision, or Egyptian taunts.
  alternative_readings:
  - The shame of Israel's slavery in Egypt
  - The reproach that Egypt cast on Israel
  - The disgrace associated with Israel's uncircumcision in contrast to covenant identity
  rationale: The Hebrew phrase itself does not explicitly define the reproach. Preserving
    the broader wording maintains the text's interpretive openness rather than importing
    a single doctrinal or historical explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
