theological_decisions:
- issue: Rendering of בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No doctrinal dispute is at stake, but the phrase involves the project's
    gender-accurate policy. The Hebrew is explicitly masculine plural and familial;
    'the sons of Israel' preserves that form more transparently than the more idiomatic
    'Israelites.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
