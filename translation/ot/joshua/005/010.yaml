id: JOS.5.10
reference: Joshua 5:10
source:
  edition: WLC
  text: וַ/יַּחֲנ֥וּ בְנֵֽי יִשְׂרָאֵ֖ל בַּ/גִּלְגָּ֑ל וַ/יַּעֲשׂ֣וּ אֶת הַ/פֶּ֡סַח
    בְּ/אַרְבָּעָה֩ עָשָׂ֨ר י֥וֹם לַ/חֹ֛דֶשׁ בָּ/עֶ֖רֶב בְּ/עַֽרְב֥וֹת יְרִיחֽוֹ־־׃
translation:
  text: And the sons of Israel camped at Gilgal, and they kept the Passover on the
    fourteenth day of the month, in the evening, on the plains of Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: The verb from חנה denotes pitching camp or encamping. 'Camped' is natural
    modern English; 'encamped' is more formal but not necessary here.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Chosen to preserve the Hebrew familial expression
    and the source's masculine plural form, in keeping with the gender-accurate policy.
    'Israelites' is idiomatic but less transparent to the Hebrew wording.
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: The preposition with place name is naturally rendered 'at Gilgal' in
    English for a campsite/location setting.
- source_word: וַיַּעֲשׂוּ אֶת־הַפֶּסַח
  chosen: they kept the Passover
  alternatives:
  - they observed the Passover
  - they did the Passover
  lexicon: HALOT
  rationale: עשה with Passover is an idiom for celebrating/observing it. 'Kept the
    Passover' is established, clear English that reflects observance without woodenly
    rendering 'did.'
- source_word: הַפֶּסַח
  chosen: the Passover
  lexicon: HALOT
  rationale: Standard rendering for the festival/sacrificial observance in context.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ
  chosen: on the fourteenth day of the month
  alternatives:
  - on day fourteen of the month
  lexicon: HALOT
  rationale: This is the normal calendrical expression. 'Fourteenth day of the month'
    is precise and idiomatic.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  - toward evening
  lexicon: HALOT
  rationale: ערב here marks the time of observance. 'In the evening' is clear modern
    English; 'at evening' is more traditional but less natural.
- source_word: בְּעַרְבוֹת יְרִיחוֹ
  chosen: on the plains of Jericho
  alternatives:
  - in the desert plains of Jericho
  - in the steppes of Jericho
  lexicon: HALOT
  rationale: עַרְבוֹת refers to steppe/plains region. 'Plains of Jericho' is the most
    natural geographic rendering in English and fits the setting.
