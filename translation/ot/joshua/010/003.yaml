id: JOS.10.3
reference: Joshua 10:3
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח אֲדֹנִי צֶ֜דֶק מֶ֣לֶךְ יְרוּשָׁלִַ֗ם אֶל הוֹהָ֣ם מֶֽלֶךְ חֶ֠בְרוֹן
    וְ/אֶל פִּרְאָ֨ם מֶֽלֶךְ יַרְמ֜וּת וְ/אֶל יָפִ֧יעַ מֶֽלֶךְ לָכִ֛ישׁ וְ/אֶל דְּבִ֥יר
    מֶֽלֶךְ עֶגְל֖וֹן לֵ/אמֹֽר־־־־־־־־־׃
translation:
  text: So Adoni-zedek king of Jerusalem sent to Hoham king of Hebron, to Piram king
    of Jarmuth, to Japhia king of Lachish, and to Debir king of Eglon, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: So ... sent
  alternatives:
  - And ... sent
  - Then ... sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative. 'Sent' is the plain lexical
    sense. 'So' captures the discourse connection to the prior verse in readable English;
    'and' would be more formally literal but less natural in modern narrative.
- source_word: אֲדֹנִי צֶדֶק
  chosen: Adoni-zedek
  alternatives:
  - Adonizedek
  lexicon: HALOT
  rationale: Proper personal name, so transliterated rather than translated, per project
    philosophy. Hyphenation preserves the compound structure and is a standard English
    convention for this name.
- source_word: מֶלֶךְ יְרוּשָׁלִַם
  chosen: king of Jerusalem
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. 'Jerusalem' is the standard
    English transliteration of the place name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the recipients of the message. 'To' is the natural
    modern English equivalent.
- source_word: הוֹהָם
  chosen: Hoham
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: פִּרְאָם
  chosen: Piram
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: יַרְמוּת
  chosen: Jarmuth
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: יָפִיעַ
  chosen: Japhia
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: לָכִישׁ
  chosen: Lachish
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: דְּבִיר
  chosen: Debir
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. Context here clearly
    indicates the king named Debir, not the common noun sense known elsewhere.
- source_word: עֶגְלוֹן
  chosen: Eglon
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Infinitive construct introducing direct speech in the next verse. 'Saying,'
    is idiomatic and preserves the formal linkage to the following quotation.
