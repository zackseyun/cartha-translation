id: JOS.10.43
reference: Joshua 10:43
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב יְהוֹשֻׁ֨עַ֙ וְ/כָל יִשְׂרָאֵ֣ל עִמּ֔/וֹ אֶל הַֽ/מַּחֲנֶ֖ה הַ/גִּלְגָּֽלָ/ה־־׃פ
translation:
  text: Then Joshua returned, and all Israel with him, to the camp at Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to the camp, to Gilgal.' The Hebrew uses a directional
      ending on 'Gilgal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: The waw-consecutive verb from שוב in narrative sequence is best rendered
    as simple past, 'returned.' 'Went back' is possible, but 'returned' is the most
    natural concise English equivalent in this military-travel context.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'and all Israel.' This can denote the full fighting
    force or covenant people represented in the army. 'All Israel' preserves the source
    wording and its corporate sense better than the more interpretive 'all the Israelites.'
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition עם with 3ms suffix, indicating
    accompaniment.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: The preposition marks motion toward destination. 'To' is idiomatic here;
    'into' would over-specify entry.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה commonly denotes a military camp. 'The camp' is natural modern
    English and fits the context.
- source_word: הַגִּלְגָּלָה
  chosen: at Gilgal
  alternatives:
  - to Gilgal
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Gilgal,
    but in English with a preceding destination phrase ('to the camp') the most natural
    rendering is 'to the camp at Gilgal' rather than the less smooth 'to the camp,
    to Gilgal.' This preserves the sense without awkwardness.
