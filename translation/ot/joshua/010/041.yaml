id: JOS.10.41
reference: Joshua 10:41
source:
  edition: WLC
  text: וַ/יַּכֵּ֧/ם יְהוֹשֻׁ֛עַ מִ/קָּדֵ֥שׁ בַּרְנֵ֖עַ וְ/עַד עַזָּ֑ה וְ/אֵ֛ת כָּל
    אֶ֥רֶץ גֹּ֖שֶׁן וְ/עַד גִּבְעֽוֹן־־־׃
translation:
  text: And Joshua struck them from Kadesh-barnea as far as Gaza, and all the land
    of Goshen, as far as Gibeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'struck down them' / 'defeated them.' The Hebrew verb can denote a military
      blow or defeat without always specifying the exact manner.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  chosen: struck them
  alternatives:
  - struck down
  - defeated them
  - smote them
  lexicon: HALOT
  rationale: From נכה in the waw-consecutive form with 3mp suffix, referring back
    to the kings/peoples of the preceding context. 'Struck them' preserves the concrete
    military action without over-specifying death; 'struck down' would be slightly
    more interpretive.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  chosen: from Kadesh-barnea
  alternatives:
  - from Kadesh Barnea
  lexicon: HALOT
  rationale: Toponym marking the southern extent of the campaign. Hyphenation aids
    modern readability while preserving the standard transliterated place name.
- source_word: וְעַד עַזָּה
  chosen: as far as Gaza
  alternatives:
  - to Gaza
  lexicon: HALOT
  rationale: עַד marks extent; 'as far as' better conveys territorial range than simple
    destination.
- source_word: וְאֵת כָּל אֶרֶץ גֹּשֶׁן
  chosen: and all the land of Goshen
  alternatives:
  - including all the land of Goshen
  lexicon: HALOT
  rationale: Direct-object marker אֵת introduces an additional region included in
    Joshua's conquest. 'And all the land of Goshen' is formally close and clear.
- source_word: וְעַד גִּבְעוֹן
  chosen: as far as Gibeon
  alternatives:
  - to Gibeon
  lexicon: HALOT
  rationale: Again עַד expresses extent. 'As far as Gibeon' matches the geographic
    boundary style of the verse.
