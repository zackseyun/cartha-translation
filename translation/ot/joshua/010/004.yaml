theological_decisions:
- issue: Rendering of בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: Per the translation philosophy's gender-accurate principle, the masculine
    plural familial expression is preserved rather than neutralized. In this historical-national
    context it refers to the covenant people corporately, but the Hebrew wording is
    still best represented by 'sons of Israel.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
