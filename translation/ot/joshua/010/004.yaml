id: JOS.10.4
reference: Joshua 10:4
source:
  edition: WLC
  text: עֲלֽוּ אֵלַ֣/י וְ/עִזְרֻ֔/נִי וְ/נַכֶּ֖ה אֶת גִּבְע֑וֹן כִּֽי הִשְׁלִ֥ימָה
    אֶת יְהוֹשֻׁ֖עַ וְ/אֶת בְּנֵ֥י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: Come up to me and help me, and let us strike Gibeon, because it has made peace
    with Joshua and with the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the people of Israel.'' Hebrew: ''the sons of
      Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'has made an alliance with.' The Hebrew verb can denote entering peaceful
      relations or treaty peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֽוּ
  chosen: Come up
  alternatives:
  - Come
  - Go up
  lexicon: HALOT
  rationale: Qal imperative plural of עלה, commonly used for upward movement in military
    or geographic approach. 'Come up' preserves both the directional nuance and the
    speaker-centered perspective created by אֵלַי ('to me').
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Preposition plus 1cs suffix. Rendered straightforwardly to preserve the
    appeal directed toward the speaker.
- source_word: וְעִזְרֻנִי
  chosen: and help me
  alternatives:
  - and come to my aid
  - and assist me
  lexicon: HALOT
  rationale: Imperative plural with 1cs object from עזר. 'Help me' is the most natural
    modern English equivalent and preserves the direct request.
- source_word: וְנַכֶּה
  chosen: and let us strike
  alternatives:
  - and let us attack
  - that we may strike
  lexicon: HALOT
  rationale: Hiphil cohortative/common plural from נכה. 'Let us strike' preserves
    the volitional first-person plural force and the military sense without over-paraphrasing
    to 'attack,' though that is contextually possible.
- source_word: אֶת גִּבְעוֹן
  chosen: Gibeon
  lexicon: HALOT
  rationale: Direct-object marker plus place name. The object marker is not represented
    in English; the city name is transliterated per translation policy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the request. 'Because' is clearer in modern
    English than 'for' while preserving the causal sense.
- source_word: הִשְׁלִימָה
  chosen: has made peace
  alternatives:
  - has made an alliance
  - has submitted
  - is at peace
  lexicon: HALOT
  rationale: Hiphil perfect feminine singular from שלם in a diplomatic context. Here
    it refers to entering into peaceful relations/treaty status with Joshua and Israel.
    'Has made peace' best reflects the verb's plain sense in context; 'made an alliance'
    is interpretive and narrower, while 'submitted' overstates the political nuance.
- source_word: אֶת יְהוֹשֻׁעַ וְאֶת בְּנֵי יִשְׂרָאֵל
  chosen: with Joshua and with the sons of Israel
  alternatives:
  - with Joshua and the Israelites
  - with Joshua and the people of Israel
  lexicon: HALOT
  rationale: The preposition is implied by the idiom with השלימה plus את marking the
    parties involved. 'Sons of Israel' is retained as a transparent, gender-accurate
    rendering of בני ישראל, preserving the Hebrew expression; smoother alternatives
    are possible but less formally aligned.
