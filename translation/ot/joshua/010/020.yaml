id: JOS.10.20
reference: Joshua 10:20
source:
  edition: WLC
  text: וַ/יְהִי֩ כְּ/כַלּ֨וֹת יְהוֹשֻׁ֜עַ וּ/בְנֵ֣י יִשְׂרָאֵ֗ל לְ/הַכּוֹתָ֛/ם מַכָּ֥ה
    גְדוֹלָֽה מְאֹ֖ד עַד תֻּמָּ֑/ם וְ/הַ/שְּׂרִידִים֙ שָׂרְד֣וּ מֵ/הֶ֔ם וַ/יָּבֹ֖אוּ
    אֶל עָרֵ֥י הַ/מִּבְצָֽר־־־׃
translation:
  text: And it happened that when Joshua and the sons of Israel had finished striking
    them with a very great slaughter, until they were wiped out, though the survivors
    from them survived and entered the fortified cities,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the survivors survived from them,' preserving a noun-verb
      repetition for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.' The main text preserves the
      Hebrew expression more closely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened that
  alternatives:
  - And it came to pass
  - Now it happened that
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new stage in the story. 'And
    it happened that' preserves the discourse function in readable modern English
    without archaic diction.
- source_word: כְּכַלּוֹת
  chosen: when ... had finished
  alternatives:
  - as ... finished
  - after ... finished
  lexicon: HALOT
  rationale: Infinitive construct of כלה with prefixed כ expresses temporal sense
    here. English pluperfect 'had finished' fits the sequence with the following action.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Rendered more formally as 'the sons of Israel' to reflect the Hebrew
    expression directly. This follows the gender-accurate principle and preserves
    the idiom's corporate identity; 'Israelites' is possible but less transparent
    to the source wording.
- source_word: לְהַכּוֹתָם
  chosen: striking them
  alternatives:
  - slaughtering them
  - defeating them
  lexicon: HALOT
  rationale: Hiphil infinitive of נכה means to strike/smite. 'Striking them' keeps
    the base verbal sense, while the following noun phrase specifies the severity
    of the blow.
- source_word: מַכָּה גְדוֹלָה מְאֹד
  chosen: a very great slaughter
  alternatives:
  - a very great blow
  - a very great defeat
  lexicon: HALOT
  rationale: מכה can denote a blow, plague, or slaughter/defeat depending on context.
    Given the military setting and the following 'until they were wiped out,' 'slaughter'
    best conveys the lethal force of the attack.
- source_word: עַד תֻּמָּם
  chosen: until they were wiped out
  alternatives:
  - until they were finished
  - until they were consumed
  - until they were destroyed
  lexicon: HALOT
  rationale: Passive form from תמם/כלה idiomatically indicates being brought to an
    end. 'Wiped out' is natural modern English for military annihilation and matches
    the context.
- source_word: וְהַשְּׂרִידִים
  chosen: though the survivors
  alternatives:
  - and the survivors
  - but the remnant
  lexicon: HALOT
  rationale: 'The conjunction here is best taken adversatively in context: despite
    the near-total destruction, some survivors remained. ''Survivors'' is the clearest
    rendering of the noun.'
- source_word: שָׂרְדוּ מֵהֶם
  chosen: the survivors from them survived
  alternatives:
  - some of them survived
  - survivors escaped from them
  lexicon: HALOT
  rationale: The Hebrew uses a cognate-style repetition between noun and verb ('the
    survivors survived'). I preserved this somewhat awkwardly for auditability, though
    English would normally smooth it. 'From them' indicates that these survivors were
    from the defeated group, not Israel.
- source_word: עָרֵי הַמִּבְצָר
  chosen: the fortified cities
  alternatives:
  - the fortress cities
  - the stronghold cities
  lexicon: HALOT
  rationale: מבצר denotes a fortification/stronghold. 'Fortified cities' is idiomatic
    English and accurately conveys urban defensive strength.
