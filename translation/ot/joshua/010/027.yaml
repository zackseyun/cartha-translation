id: JOS.10.27
reference: Joshua 10:27
source:
  edition: WLC
  text: וַ/יְהִ֞י לְ/עֵ֣ת בּ֣וֹא הַ/שֶּׁ֗מֶשׁ צִוָּ֤ה יְהוֹשֻׁ֨עַ֙ וַ/יֹּֽרִידוּ/ם֙
    מֵ/עַ֣ל הָ/עֵצִ֔ים וַ/יַּ֨שְׁלִכֻ֔/ם אֶל הַ/מְּעָרָ֖ה אֲשֶׁ֣ר נֶחְבְּאוּ שָׁ֑ם
    וַ/יָּשִׂ֜מוּ אֲבָנִ֤ים גְּדֹלוֹת֙ עַל פִּ֣י הַ/מְּעָרָ֔ה עַד עֶ֖צֶם הַ/יּ֥וֹם
    הַ/זֶּֽה׀־־־־׃פ
translation:
  text: And at the time of the sun’s going down, Joshua gave the command, and they
    took them down from the trees and threw them into the cave where they had hidden
    there. Then they placed large stones over the mouth of the cave, and they remain
    there to this very day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'at sunset.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''where they had hidden there''; the wording explicitly includes
      ''there'' for emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵת בּוֹא הַשֶּׁמֶשׁ
  chosen: at the time of the sun’s going down
  alternatives:
  - at sunset
  - when the sun was going down
  lexicon: HALOT
  rationale: The Hebrew is a temporal expression literally 'at the time of the coming/going
    in of the sun.' 'At the time of the sun’s going down' preserves the imagery and
    timing more closely than the compressed idiom 'at sunset,' while remaining natural
    English.
- source_word: צִוָּה יְהוֹשֻׁעַ
  chosen: Joshua gave the command
  alternatives:
  - Joshua commanded
  lexicon: HALOT
  rationale: The verb means 'command.' 'Gave the command' is slightly more idiomatic
    in this narrative sequence and fits the following plural actions carried out by
    others, without changing the force.
- source_word: וַיּוֹרִידוּם
  chosen: they took them down
  alternatives:
  - they brought them down
  - they lowered them
  lexicon: HALOT
  rationale: Refers to removing the bodies from their hanging place. 'Took them down'
    is the most natural English idiom for bodies removed from trees, while accurately
    reflecting the causative motion downward.
- source_word: מֵעַל הָעֵצִים
  chosen: from the trees
  alternatives:
  - from upon the trees
  - from off the trees
  lexicon: HALOT
  rationale: 'English naturally omits the more wooden prepositional force ''from upon''
    here. The sense is straightforward: removal from the trees on which they had been
    hung.'
- source_word: וַיַּשְׁלִכֻם
  chosen: threw them
  alternatives:
  - cast them
  - flung them
  lexicon: HALOT
  rationale: The verb commonly means 'throw, cast.' 'Threw them' is direct, vivid,
    and natural modern English.
- source_word: הַמְּעָרָה
  chosen: the cave
  alternatives:
  - the cavern
  lexicon: HALOT
  rationale: Standard rendering for מְעָרָה in narrative contexts. 'Cave' is the ordinary
    and sufficiently precise English equivalent.
- source_word: אֲשֶׁר נֶחְבְּאוּ שָׁם
  chosen: where they had hidden there
  alternatives:
  - where they had hidden themselves
  - in which they had hidden
  lexicon: HALOT
  rationale: The clause refers back to the cave in which the kings had hidden. The
    adverb שָׁם ('there') is explicit in Hebrew; retaining 'there' preserves the emphasis,
    though English style is slightly redundant. The pluperfect 'had hidden' situates
    the action prior to the present narrative step.
- source_word: וַיָּשִׂמוּ אֲבָנִים גְּדֹלוֹת
  chosen: they placed large stones
  alternatives:
  - they set great stones
  - they put large stones
  lexicon: HALOT
  rationale: A straightforward action of setting stones in place. 'Placed large stones'
    is clear modern English; 'great stones' is possible but can sound archaic or emphasize
    grandeur rather than size.
- source_word: עַל פִּי הַמְּעָרָה
  chosen: over the mouth of the cave
  alternatives:
  - at the mouth of the cave
  - over the opening of the cave
  lexicon: HALOT
  rationale: פִּי literally 'mouth of' is a common idiom for an opening. 'Mouth of
    the cave' preserves the Hebrew metaphor; 'over' reflects the blocking function
    of the stones.
- source_word: עַד עֶצֶם הַיּוֹם הַזֶּה
  chosen: to this very day
  alternatives:
  - until this very day
  - to the very same day
  lexicon: HALOT
  rationale: This idiom marks the continuing state from the narrator’s perspective.
    'To this very day' is the standard natural English equivalent and preserves the
    emphatic עֶצֶם.
