id: JOS.10.33
reference: Joshua 10:33
source:
  edition: WLC
  text: אָ֣ז עָלָ֗ה הֹרָם֙ מֶ֣לֶךְ גֶּ֔זֶר לַ/עְזֹ֖ר אֶת לָכִ֑ישׁ וַ/יַּכֵּ֤/הוּ יְהוֹשֻׁ֨עַ֙
    וְ/אֶת עַמּ֔/וֹ עַד בִּלְתִּ֥י הִשְׁאִֽיר ל֖/וֹ שָׂרִֽיד־־־־׃
translation:
  text: Then Horam king of Gezer went up to help Lachish, and Joshua struck him and
    his people until he left him no survivor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no remnant.' The Hebrew שָׂרִיד can denote a survivor or one remaining.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal/narrative adverb introducing the next event in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: עָלָה
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: The verb literally means 'went up/ascended.' In military movement it
    can mean advancing upward geographically or toward battle. 'Went up' preserves
    the Hebrew idiom without over-specifying military nuance.
- source_word: הֹרָם
  chosen: Horam
  rationale: Personal name is transliterated per translation philosophy.
- source_word: מֶלֶךְ גֶּזֶר
  chosen: king of Gezer
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Horam's royal office and
    city.
- source_word: לַעְזֹר
  chosen: to help
  alternatives:
  - to assist
  - to come to the aid of
  lexicon: HALOT
  rationale: Infinitive of עזר denotes giving aid. 'To help' is the clearest modern
    equivalent and fits the military context.
- source_word: אֶת לָכִישׁ
  chosen: Lachish
  rationale: 'Direct-object marker is untranslated; the place name is transliterated.
    English idiom after ''help'' takes the object directly: ''help Lachish.'''
- source_word: וַיַּכֵּהוּ
  chosen: struck him
  alternatives:
  - defeated him
  - struck down him
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite/defeat.' 'Struck him' preserves the
    verbal imagery and leaves the following clause to specify the totality of the
    defeat.
- source_word: וְאֶת עַמּוֹ
  chosen: and his people
  alternatives:
  - and his army
  lexicon: HALOT
  rationale: עַם is broadly 'people.' In context it likely includes the fighting force,
    but the Hebrew does not restrict it to 'army,' so 'people' is retained.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ
  chosen: until he left him no
  alternatives:
  - until he left him not
  - so that he left him no
  lexicon: HALOT
  rationale: 'This construction expresses result/extent: Joshua''s attack continued
    to the point that none was left to Horam. ''Until he left him no...'' is idiomatic
    and close to the Hebrew syntax.'
- source_word: שָׂרִיד
  chosen: survivor
  alternatives:
  - remnant
  - one remaining
  lexicon: HALOT
  rationale: שָׂרִיד denotes one who survives or remains. 'Survivor' is the most natural
    singular collective expression in English here.
