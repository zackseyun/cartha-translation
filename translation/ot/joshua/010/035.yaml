theological_decisions:
- issue: Rendering of חרם/החרים in a conquest context
  chosen_reading: devoted to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: The Hebrew verb carries a specific sacral-conquest sense beyond mere
    killing. 'Devoted to destruction' preserves that theological and lexical weight
    without importing extra doctrinal explanation into the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering נֶפֶשׁ in a military census/population sense
  chosen_reading: person
  alternative_readings:
  - soul
  - life
  rationale: In this context נֶפֶשׁ denotes persons/living beings in the city. Translating
    'soul' in English could suggest an anthropological claim the Hebrew is not making
    here. The choice preserves the text's plain sense and avoids importing doctrinal
    implications.
  doctrine_reference: Translation philosophy §1, §6
