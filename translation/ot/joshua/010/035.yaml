id: JOS.10.35
reference: Joshua 10:35
source:
  edition: WLC
  text: וַֽ/יִּלְכְּד֜וּ/הָ בַּ/יּ֤וֹם הַ/הוּא֙ וַ/יַּכּ֣וּ/הָ לְ/פִי חֶ֔רֶב וְ/אֵת֙
    כָּל הַ/נֶּ֣פֶשׁ אֲשֶׁר בָּ֔/הּ בַּ/יּ֥וֹם הַ/ה֖וּא הֶחֱרִ֑ים כְּ/כֹ֥ל אֲשֶׁר
    עָשָׂ֖ה לְ/לָכִֽישׁ־־־־׃פ
translation:
  text: And they captured it that day and struck it with the edge of the sword, and
    every person who was in it he devoted to destruction that day, according to all
    that he had done to Lachish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''every soul who was in it.'' Here ''soul'' means the persons in
      the city.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he utterly destroyed'; the Hebrew verb denotes devoting something to
      destruction under the ban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדוּהָ
  chosen: they captured it
  alternatives:
  - they took it
  - they seized it
  lexicon: HALOT
  rationale: From לכד, standard military context of taking a city. 'Captured' is natural
    modern English and preserves the conquest sense without unnecessary paraphrase.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'That day' is concise English while preserving
    the same-day emphasis.
- source_word: וַיַּכּוּהָ לְפִי חֶרֶב
  chosen: struck it with the edge of the sword
  alternatives:
  - put it to the sword
  - struck it by the mouth of the sword
  lexicon: HALOT
  rationale: The idiom לְפִי חֶרֶב is literally 'to the mouth/edge of the sword.'
    'With the edge of the sword' preserves the Hebrew image more transparently than
    the more idiomatic but slightly interpretive 'put it to the sword.'
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person who was in it
  alternatives:
  - every soul that was in it
  - everyone in it
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to living persons within the city, not the immaterial
    soul. 'Every person' is clear, accurate, and avoids misleading theological overtones
    that 'soul' may carry in English.
- source_word: הֶחֱרִים
  chosen: he devoted to destruction
  alternatives:
  - he utterly destroyed
  - he put under the ban
  lexicon: HALOT
  rationale: From חרם in the Hiphil, denoting placing under ḥerem, that is, devoting
    something to destruction. This rendering preserves the technical force better
    than simply 'destroyed' while remaining readable.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה לְלָכִישׁ
  chosen: according to all that he had done to Lachish
  alternatives:
  - just as he had done to Lachish
  - according to everything that he did to Lachish
  lexicon: HALOT
  rationale: כְּכֹל marks correspondence with the prior action at Lachish. 'According
    to all that he had done to Lachish' preserves the comparative force and the pluperfect
    sense in English narrative.
