id: JOS.10.26
reference: Joshua 10:26
source:
  edition: WLC
  text: וַ/יַּכֵּ֨/ם יְהוֹשֻׁ֤עַ אַֽחֲרֵי כֵן֙ וַ/יְמִיתֵ֔/ם וַ/יִּתְלֵ֕/ם עַ֖ל חֲמִשָּׁ֣ה
    עֵצִ֑ים וַ/יִּֽהְי֛וּ תְּלוּיִ֥ם עַל הָ/עֵצִ֖ים עַד הָ/עָֽרֶב־־־׃
translation:
  text: After this Joshua struck them down and put them to death, and he hanged them
    on five trees; and they remained hanging on the trees until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hung them.' The Hebrew verb refers to suspending bodies on wood/tree;
      'impaled them' is a possible but less certain rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - struck them
  - smote them
  - defeated them
  lexicon: HALOT
  rationale: From נכה in the Hifil with 3mp suffix. In this execution context, 'struck
    them down' conveys a forceful blow preceding death without collapsing it into
    the next verb, since וַיְמִיתֵם separately states that he put them to death.
- source_word: אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - afterward
  - after that
  lexicon: HALOT
  rationale: A standard temporal expression marking sequence. 'After this' is natural
    modern English and preserves the narrative flow.
- source_word: וַיְמִיתֵם
  chosen: put them to death
  alternatives:
  - killed them
  - caused them to die
  lexicon: HALOT
  rationale: From מות in the Hifil. 'Put them to death' preserves the causative nuance
    and the formal execution sense better than the simpler 'killed them.'
- source_word: וַיִּתְלֵם
  chosen: hanged them
  alternatives:
  - hung them
  - impaled them
  lexicon: HALOT
  rationale: From תלה, the standard verb for hanging a body on wood/tree in judicial
    display contexts. 'Hanged' is the conventional past form when persons are the
    object. 'Impaled' is possible in some contexts but is less certain here and would
    over-specify the method.
- source_word: עַל חֲמִשָּׁה עֵצִים
  chosen: on five trees
  alternatives:
  - on five wooden poles
  - on five pieces of wood
  lexicon: HALOT
  rationale: עֵץ commonly means 'tree' or 'wood.' In this narrative, the most direct
    rendering is 'trees.' Although some contexts may imply wooden structures, 'trees'
    best matches the plain sense and common usage in Joshua.
- source_word: וַיִּהְיוּ תְּלוּיִם
  chosen: they remained hanging
  alternatives:
  - they were hanging
  - they stayed hanging
  lexicon: HALOT
  rationale: The combination of היה + passive participle expresses a continuing state.
    'Remained hanging' captures the durative sense more clearly than a simple English
    past tense.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  - until sunset
  lexicon: HALOT
  rationale: A temporal phrase marking the endpoint of the display. 'Until the evening'
    is a close and natural rendering; 'sunset' would be slightly more interpretive.
