theological_decisions:
- issue: Rendering of עֵץ in an execution-display context
  chosen_reading: trees
  alternative_readings:
  - wooden poles
  - gallows
  rationale: No doctrinally contested term is involved. The Hebrew noun most plainly
    denotes trees/wood, and the narrative does not require a more specific execution
    device. 'Trees' preserves the source wording without importing later imagery such
    as 'gallows.'
  doctrine_reference: Translation philosophy §1, §5
