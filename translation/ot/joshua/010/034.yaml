id: JOS.10.34
reference: Joshua 10:34
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֣ר יְ֠הוֹשֻׁעַ וְ/כָל יִשְׂרָאֵ֥ל עִמּ֛/וֹ מִ/לָּכִ֖ישׁ עֶגְלֹ֑נָ/ה
    וַ/יַּחֲנ֣וּ עָלֶ֔י/הָ וַ/יִּֽלָּחֲמ֖וּ עָלֶֽי/הָ־׃
translation:
  text: Then Joshua, and all Israel with him, passed on from Lachish to Eglon; and
    they camped against it and fought against it.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: passed on
  alternatives:
  - crossed over
  - moved on
  lexicon: HALOT
  rationale: From עבר in narrative movement context. Since the movement is from one
    city to another rather than crossing a specific boundary or body of water, 'passed
    on' best captures the military advance without over-specifying 'crossed over.'
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward comitative prepositional phrase referring to Joshua as
    the leader accompanied by all Israel.
- source_word: מִלָּכִישׁ
  chosen: from Lachish
  lexicon: HALOT
  rationale: Marks the point of departure in the campaign sequence.
- source_word: עֶגְלֹנָה
  chosen: to Eglon
  lexicon: HALOT
  rationale: Directional he indicates motion toward Eglon; English idiom naturally
    renders this as 'to Eglon.'
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: From חנה, standard military/camp setting verb. 'They camped' is clear
    modern English; 'encamped' is possible but less natural.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - by it
  - before it
  lexicon: HALOT
  rationale: With חנה in siege context, על conveys hostile positioning against the
    city, not merely location nearby.
- source_word: וַיִּלָּחֲמוּ
  chosen: fought
  alternatives:
  - made war
  lexicon: HALOT
  rationale: From לחם in the Niphal, standard expression for engaging in battle. 'Fought'
    is the most natural modern rendering.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - with it
  lexicon: HALOT
  rationale: Repeated prepositional phrase after 'fought' clearly indicates hostile
    action directed against the city.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  lexicon: HALOT
  rationale: Collective designation for the Israelite fighting force accompanying
    Joshua; retained literally.
