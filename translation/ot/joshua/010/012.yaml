id: JOS.10.12
reference: Joshua 10:12
source:
  edition: WLC
  text: אָ֣ז יְדַבֵּ֤ר יְהוֹשֻׁעַ֙ לַֽ/יהוָ֔ה בְּ/י֗וֹם תֵּ֤ת יְהוָה֙ אֶת הָ֣/אֱמֹרִ֔י לִ/פְנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יֹּ֣אמֶר לְ/עֵינֵ֣י יִשְׂרָאֵ֗ל שֶׁ֚מֶשׁ בְּ/גִבְע֣וֹן דּ֔וֹם וְ/יָרֵ֖חַ בְּ/עֵ֥מֶק אַיָּלֽוֹן־׀׃
translation:
  text: Then Joshua spoke to Yahweh on the day when Yahweh gave the Amorites over before the sons of Israel, and he said in the sight of Israel, “Sun, stand still at Gibeon, and moon, in the Valley of Aijalon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the Israelites.' The Hebrew reads 'before the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Sun, be still' or 'Sun, stop.' The Hebrew verb can denote stillness or cessation.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew ''and moon, in the Valley of Aijalon,'' with the verb from the previous clause understood: ''stand still.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The piel of דבר commonly means 'speak.' 'Spoke' preserves the verbal distinction before the following ויאמר ('and he said'), avoiding flattening both verbs into the same English term.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks Joshua as speaking to YHWH. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: בְּיוֹם תֵּת יְהוָה
  chosen: on the day when the LORD gave
  alternatives:
  - in the day the LORD gave
  - when the LORD gave
  lexicon: HALOT
  rationale: This infinitive construct with בְּיוֹם is temporal. 'On the day when' is natural English while preserving the marked temporal setting.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, the term is often collective. In context of battle against a people group, English plural is the clearest natural rendering.
- source_word: לִפְנֵי בְּנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - before the Israelites
  - before the children of Israel
  lexicon: HALOT
  rationale: Literally 'before the sons of Israel.' 'Before' here conveys being delivered over in front of or before them. 'Sons of Israel' preserves the gendered familial expression in line with the gender-accurate policy.
- source_word: וַיֹּאמֶר לְעֵינֵי יִשְׂרָאֵל
  chosen: and he said in the sight of Israel
  alternatives:
  - and he said before Israel
  - and he said in the presence of Israel
  lexicon: HALOT
  rationale: לְעֵינֵי is idiomatic for public visibility. 'In the sight of Israel' is a close and readable rendering.
- source_word: שֶׁמֶשׁ ... דּוֹם
  chosen: Sun, stand still
  alternatives:
  - Sun, be still
  - Sun, be silent
  - Sun, stop
  lexicon: HALOT
  rationale: דום can denote being still or motionless, though elsewhere it can carry the sense 'be silent.' In this cosmic-command context, 'stand still' best fits the narrative sense without over-paraphrasing.
- source_word: בְּגִבְעוֹן
  chosen: at Gibeon
  alternatives:
  - over Gibeon
  - in Gibeon
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously by context. 'At Gibeon' is idiomatic and leaves the exact spatial nuance broad enough for the poetic command.
- source_word: וְיָרֵחַ בְּעֵמֶק אַיָּלוֹן
  chosen: and moon, in the Valley of Aijalon
  alternatives:
  - and moon, at the Valley of Aijalon
  - and moon, over the Valley of Aijalon
  lexicon: HALOT
  rationale: The second clause is verbless, with דום understood from the first clause. 'In the Valley of Aijalon' keeps the Hebrew prepositional phrase straightforwardly; English naturally supplies the parallel force from the first command.
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ajalon
  lexicon: HALOT
  rationale: Aijalon is a standard English transliteration of the place name and is widely recognizable in modern Bible usage.
