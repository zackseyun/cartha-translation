id: JOS.10.15
reference: Joshua 10:15
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב יְהוֹשֻׁ֨עַ֙ וְ/כָל יִשְׂרָאֵ֣ל עִמּ֔/וֹ אֶל הַֽ/מַּחֲנֶ֖ה הַ/גִּלְגָּֽלָ/ה־־׃
translation:
  text: Then Joshua returned, and all Israel with him, to the camp at Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A similar return-to-Gilgal statement appears in Joshua 10:43; some interpreters
      view this verse as anticipatory or textually displaced, but the Hebrew text
      here is translated as it stands.
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Then ... returned
  alternatives:
  - And ... returned
  - turned back
  lexicon: HALOT
  rationale: From שוב in the wayyiqtol, indicating sequential narrative action. 'Returned'
    best fits movement back to a prior location; 'Then' captures the narrative progression
    idiomatically in English.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'and all Israel.' This can denote the fighting
    force or covenant people corporately; retaining 'Israel' preserves the source
    wording and collective sense without over-specifying 'Israelites.'
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition עם with 3ms suffix.
- source_word: אֶל הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - to the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה commonly denotes a camp, especially a military encampment. 'Camp'
    is the most natural modern English equivalent.
- source_word: הַגִּלְגָּלָה
  chosen: at Gilgal
  alternatives:
  - to Gilgal
  lexicon: HALOT
  rationale: The directional ending on the place name marks motion toward Gilgal.
    In English, 'to the camp at Gilgal' is smoother and more precise than 'to the
    camp, to Gilgal,' while preserving the locative sense.
