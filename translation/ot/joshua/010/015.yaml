theological_decisions:
- issue: Narrative placement and possible duplication with Joshua 10:43
  chosen_reading: Translate the Masoretic Text as given without harmonizing or omitting
    the verse.
  alternative_readings:
  - Some interpreters treat the verse as a displaced or anticipatory notice because
    a similar statement appears in Joshua 10:43.
  rationale: There is no doctrinal issue, but the verse's literary placement is discussed
    in scholarship. The translation should represent the received Hebrew text plainly
    rather than resolve source-critical questions in the main text.
