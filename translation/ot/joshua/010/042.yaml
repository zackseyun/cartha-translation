id: JOS.10.42
reference: Joshua 10:42
source:
  edition: WLC
  text: וְ/אֵ֨ת כָּל הַ/מְּלָכִ֤ים הָ/אֵ֨לֶּה֙ וְ/אֶת אַרְצָ֔/ם לָכַ֥ד יְהוֹשֻׁ֖עַ פַּ֣עַם אֶחָ֑ת כִּ֗י יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל נִלְחָ֖ם לְ/יִשְׂרָאֵֽל־־׃
translation:
  text: Joshua captured all these kings and their land at one time, because Yahweh, the God of Israel, fought for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one campaign.' The Hebrew literally says 'at one time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכַד
  chosen: captured
  alternatives:
  - took
  - seized
  - conquered
  lexicon: HALOT
  rationale: The verb commonly means to capture or seize. 'Captured' preserves the military sense without overstating the result beyond the verb itself; 'conquered' is possible in context but slightly more interpretive.
- source_word: וְאֵת כָּל הַמְּלָכִים הָאֵלֶּה
  chosen: all these kings
  alternatives:
  - all these kings here
  lexicon: HALOT
  rationale: A straightforward rendering of the marked direct object phrase. 'These' naturally reflects the demonstrative without adding emphasis not present in English idiom.
- source_word: וְאֶת אַרְצָם
  chosen: and their land
  alternatives:
  - and their country
  - and their territory
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, country, or territory. 'Land' is the broadest and most natural here, referring to the domain belonging to those kings.
- source_word: פַּעַם אֶחָת
  chosen: at one time
  alternatives:
  - in one campaign
  - all at once
  - once
  lexicon: HALOT
  rationale: Literally 'one time.' In context it indicates a single campaign or sweep rather than a single instant. 'At one time' preserves the Hebrew idiom while remaining readable. 'In one campaign' is interpretive and is therefore preserved as an alternative rather than placed in the main text.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Joshua's success. 'Because' is clearer in modern English than 'for' while preserving the causal force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase rendered directly and idiomatically.
- source_word: נִלְחָם לְיִשְׂרָאֵל
  chosen: fought for Israel
  alternatives:
  - fought on behalf of Israel
  - was fighting for Israel
  lexicon: HALOT
  rationale: The Niphal of לחם with ל expresses engaging in battle for someone's benefit. 'Fought for Israel' is concise and idiomatic. The perfect is best rendered as a simple past in this narrative summary.
