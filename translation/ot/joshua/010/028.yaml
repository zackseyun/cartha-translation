theological_decisions:
- issue: Rendering of חרם in conquest context
  chosen_reading: devoted ... to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: The verb carries more than simple killing; it denotes placing persons
    under a ban of destruction in a context of holy-war judgment. The chosen rendering
    preserves that theological weight without importing extra doctrinal explanation
    into the main text.
  doctrine_reference: Translation philosophy §1, §3, §6
