id: JOS.10.28
reference: Joshua 10:28
source:
  edition: WLC
  text: וְ/אֶת מַקֵּדָה֩ לָכַ֨ד יְהוֹשֻׁ֜עַ בַּ/יּ֣וֹם הַ/ה֗וּא וַ/יַּכֶּ֣/הָ לְ/פִי
    חֶרֶב֮ וְ/אֶת מַלְכָּ/הּ֒ הֶחֱרִ֣ם אוֹתָ֗/ם וְ/אֶת כָּל הַ/נֶּ֨פֶשׁ֙ אֲשֶׁר בָּ֔/הּ
    לֹ֥א הִשְׁאִ֖יר שָׂרִ֑יד וַ/יַּ֨עַשׂ֙ לְ/מֶ֣לֶךְ מַקֵּדָ֔ה כַּ/אֲשֶׁ֥ר עָשָׂ֖ה
    לְ/מֶ֥לֶךְ יְרִיחֽוֹ־־־־־־׃
translation:
  text: And Joshua captured Makkedah on that day and struck it with the edge of the
    sword, and he devoted its king and every person in it to destruction; he left
    no survivor. And he did to the king of Makkedah just as he had done to the king
    of Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utterly destroyed'; the Hebrew verb denotes devoting something to destruction
      under the ban.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכַד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: Standard military sense for taking a city. 'Captured' is clear modern
    English and fits the conquest context.
- source_word: וַיַּכֶּהָ
  chosen: struck it
  alternatives:
  - smote it
  - defeated it
  lexicon: HALOT
  rationale: From נכה, here referring to attacking the city. 'Struck it' preserves
    the concrete verbal force better than the more interpretive 'defeated it.'
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the sword
  lexicon: HALOT
  rationale: This idiom literally means 'to the mouth/edge of the sword.' 'With the
    edge of the sword' preserves the Hebrew imagery while remaining idiomatic enough
    in English.
- source_word: הֶחֱרִם
  chosen: devoted ... to destruction
  alternatives:
  - utterly destroyed
  - put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing under ḥerem, a consecration to destruction
    in holy-war context. 'Devoted to destruction' preserves the theological and ritual
    nuance better than the flattened 'destroyed.'
- source_word: אוֹתָם
  chosen: its king and every person in it
  alternatives:
  - them
  lexicon: HALOT
  rationale: The pronoun is plural after mention of the king and then the inhabitants;
    English requires the referents to be made explicit for clarity.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person in it
  alternatives:
  - all the souls that were in it
  - everyone in it
  lexicon: HALOT
  rationale: נפש here refers to persons/lives, not the immaterial soul as such. 'Every
    person in it' communicates the referent clearly in contemporary English.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  chosen: he left no survivor
  alternatives:
  - he left no remnant
  - he spared no survivor
  lexicon: HALOT
  rationale: שָׂרִיד means survivor/remnant. 'Left no survivor' is the most natural
    rendering of the clause in English.
- source_word: וַיַּעַשׂ לְמֶלֶךְ מַקֵּדָה כַּאֲשֶׁר עָשָׂה לְמֶלֶךְ יְרִיחוֹ
  chosen: he did to the king of Makkedah just as he had done to the king of Jericho
  alternatives:
  - he treated the king of Makkedah as he had treated the king of Jericho
  lexicon: HALOT
  rationale: The Hebrew is intentionally terse with עשה + ל. 'Did to' preserves that
    terseness and echoes the narrative comparison without over-specifying.
- source_word: מַקֵּדָה / יְרִיחוֹ / יְהוֹשֻׁעַ
  chosen: Makkedah / Jericho / Joshua
  rationale: Personal and place names are transliterated by standard English conventions
    per project philosophy.
