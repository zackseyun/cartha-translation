theological_decisions:
- issue: Rendering of the conquest formula describing the killing of the inhabitants
  chosen_reading: along with every person who was in it
  alternative_readings:
  - and every soul that was in it
  - and all life that was in it
  rationale: The Hebrew uses נֶפֶשׁ in a collective-human sense. 'Every person' avoids
    misleading modern readers into hearing a body/soul distinction that the text is
    not making, while still preserving the severity of the account without softening
    it.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Subject reference in the final comparison clause
  chosen_reading: just as he had done to Libnah
  alternative_readings:
  - just as they had done to Libnah
  - just as was done to Libnah
  rationale: The Hebrew verb is singular ('he did'), likely reflecting Joshua as representative
    leader or a singular collective narrative style. Retaining singular in English
    best matches the source form, even though Israel is the acting group in context.
  doctrine_reference: Translation philosophy §§1, 5
