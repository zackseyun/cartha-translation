id: JOS.10.32
reference: Joshua 10:32
source:
  edition: WLC
  text: וַ/יִּתֵּן֩ יְהוָ֨ה אֶת לָכִ֜ישׁ בְּ/יַ֣ד יִשְׂרָאֵ֗ל וַֽ/יִּלְכְּדָ/הּ֙ בַּ/יּ֣וֹם
    הַ/שֵּׁנִ֔י וַ/יַּכֶּ֣/הָ לְ/פִי חֶ֔רֶב וְ/אֶת כָּל הַ/נֶּ֖פֶשׁ אֲשֶׁר בָּ֑/הּ
    כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה לְ/לִבְנָֽה־־־־־־׃פ
translation:
  text: And the LORD gave Lachish into the hand of Israel, and he captured it on the
    second day and struck it with the edge of the sword, along with every person who
    was in it, just as he had done to Libnah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''every soul who was in it,'' an idiom meaning every person in
      the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: וַיִּתֵּן ... בְּיַד
  chosen: gave ... into the hand of
  alternatives:
  - delivered ... into the hand of
  - gave ... over to
  lexicon: HALOT
  rationale: The idiom נתן ביד commonly means to hand over into someone's power. 'Gave
    ... into the hand of' preserves the Hebrew imagery while remaining natural English.
- source_word: לָכִישׁ
  chosen: Lachish
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: וַיִּלְכְּדָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: A standard military term for taking a city. 'Captured' is clear modern
    English and fits the siege context.
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: on the second day
  alternatives:
  - the next day
  - on day two
  lexicon: HALOT
  rationale: A direct and natural rendering of the temporal phrase, preserving the
    sequential detail of the Hebrew.
- source_word: וַיַּכֶּהָ
  chosen: struck it
  alternatives:
  - defeated it
  - put it down
  lexicon: HALOT
  rationale: The verb נכה is broad, but here in conjunction with 'with the edge of
    the sword' it refers to smiting the city's inhabitants. 'Struck it' keeps the
    Hebrew verbal force without over-paraphrasing.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - with the sword
  - by the sword
  lexicon: HALOT
  rationale: This is the conventional sense of the idiom literally 'to the mouth of
    the sword.' 'With the edge of the sword' preserves the image more fully than the
    flatter 'with the sword.'
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person who was in it
  alternatives:
  - every soul that was in it
  - everyone in it
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to living persons in the city, not to an abstract
    'soul.' 'Every person' is clearer in contemporary English while remaining faithful
    to the referent.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה לְלִבְנָה
  chosen: just as he had done to Libnah
  alternatives:
  - according to all that he did to Libnah
  - just as was done to Libnah
  lexicon: HALOT
  rationale: The comparison points back to the prior treatment of Libnah. 'Just as
    he had done' communicates the sense smoothly in English; the subject is understood
    from the narrative flow as Joshua/Israel's action.
