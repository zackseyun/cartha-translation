id: JOS.10.17
reference: Joshua 10:17
source:
  edition: WLC
  text: וַ/יֻּגַּ֖ד לִ/יהוֹשֻׁ֣עַ לֵ/אמֹ֑ר נִמְצְאוּ֙ חֲמֵ֣שֶׁת הַ/מְּלָכִ֔ים נֶחְבְּאִ֥ים
    בַּ/מְּעָרָ֖ה בְּ/מַקֵּדָֽה׃
translation:
  text: And it was reported to Joshua, saying, “The five kings have been found, hidden
    in the cave at Makkedah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were found, hiding in the cave at Makkedah.” The Hebrew participle can
      be rendered more verbally ('hiding') or as a state ('hidden').
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/narrative form of נגד conveys that a report was made to Joshua.
    'It was reported' is natural modern English and preserves the passive sense without
    adding an explicit subject.
- source_word: לִיהוֹשֻׁעַ
  chosen: to Joshua
  rationale: Direct object of the passive reporting verb; personal name is transliterated
    per translation philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with these words
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing the content of the report. 'Saying'
    keeps the formal narrative linkage.
- source_word: נִמְצְאוּ
  chosen: have been found
  alternatives:
  - were found
  - have been discovered
  lexicon: HALOT
  rationale: Passive plural of מצא. Present perfect in English fits the reported discovery
    just made and leads naturally into the participial description.
- source_word: חֲמֵשֶׁת הַמְּלָכִים
  chosen: the five kings
  lexicon: HALOT
  rationale: Construct numeral plus definite noun is best rendered straightforwardly
    as 'the five kings.' The article indicates these are the previously mentioned
    kings.
- source_word: נֶחְבְּאִים
  chosen: hidden
  alternatives:
  - hiding
  - concealed
  lexicon: HALOT
  rationale: Passive/reflexive participle from חבא describes their state when found.
    'Hidden' is concise and idiomatic in English after 'have been found.'
- source_word: בַּמְּעָרָה
  chosen: in the cave
  lexicon: HALOT
  rationale: Definite noun with preposition; rendered directly as location.
- source_word: בְּמַקֵּדָה
  chosen: at Makkedah
  alternatives:
  - in Makkedah
  rationale: Place name is transliterated. 'At Makkedah' is idiomatic for a named
    location associated with the cave, while 'in Makkedah' is possible but slightly
    less natural here.
