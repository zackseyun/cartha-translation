id: JOS.10.31
reference: Joshua 10:31
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֣ר יְ֠הוֹשֻׁעַ וְ/כָל יִשְׂרָאֵ֥ל עִמּ֛/וֹ מִ/לִּבְנָ֖ה לָכִ֑ישָׁ/ה
    וַ/יִּ֣חַן עָלֶ֔י/הָ וַ/יִּלָּ֖חֶם בָּֽ/הּ־׃
translation:
  text: Then Joshua, and all Israel with him, passed on from Libnah to Lachish, and
    camped against it and fought against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crossed over from Libnah to Lachish.' The Hebrew verb can more literally
      mean 'passed over,' but here it refers to military movement from one city to
      another.
    reason: lexical_alternative
  - marker: b
    text: Or 'encamped against it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: passed on
  alternatives:
  - crossed over
  - moved on
  lexicon: HALOT
  rationale: The verb עבר broadly means 'pass over/through.' In this military travel
    context from one city to another, 'passed on' is natural English and preserves
    the sense of movement without implying a river crossing.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  chosen: and all Israel with him
  alternatives:
  - and all Israel with him
  lexicon: HALOT
  rationale: A straightforward rendering of the collective phrase. 'Israel' here refers
    to the fighting force/people accompanying Joshua, and the formal wording is clear
    in English.
- source_word: מִלִּבְנָה לָכִישָׁה
  chosen: from Libnah to Lachish
  alternatives:
  - from Libnah toward Lachish
  lexicon: HALOT
  rationale: The directional he on לָכִישָׁה marks motion toward Lachish. In idiomatic
    English, 'to Lachish' adequately conveys the destination.
- source_word: וַיִּחַן עָלֶיהָ
  chosen: and camped against it
  alternatives:
  - and encamped against it
  - and camped by it
  lexicon: HALOT
  rationale: חנה means 'camp/encamp.' With עַל in siege context, 'against it' best
    reflects a hostile military position rather than mere proximity.
- source_word: וַיִּלָּחֶם בָּהּ
  chosen: and fought against it
  alternatives:
  - and fought it
  - and made war against it
  lexicon: HALOT
  rationale: לחם in the Niphal means 'fight, wage war.' 'Fought against it' is idiomatic
    and preserves the adversative force of בָּהּ in context of attacking the city.
