id: JOS.10.9
reference: Joshua 10:9
source:
  edition: WLC
  text: וַ/יָּבֹ֧א אֲלֵי/הֶ֛ם יְהוֹשֻׁ֖עַ פִּתְאֹ֑ם כָּל הַ/לַּ֕יְלָה עָלָ֖ה מִן הַ/גִּלְגָּֽל־־׃
translation:
  text: So Joshua came upon them suddenly, having marched up from Gilgal all night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came to them suddenly'; the Hebrew verb is literally 'came,' and the
      military context suggests a sudden approach upon the enemy.
    reason: lexical_alternative
  - marker: b
    text: Literally 'went up from Gilgal all night.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came upon
  alternatives:
  - came to
  - came against
  - arrived at
  lexicon: HALOT
  rationale: The verb בוא basically means 'come/enter,' but with אֲלֵיהֶם in a military
    narrative it naturally carries the sense of approaching or coming upon an opposing
    force. 'Came upon' preserves the sudden tactical arrival without over-specifying
    combat beyond the text.
- source_word: אֲלֵיהֶם
  chosen: upon them
  alternatives:
  - to them
  - against them
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix is literally 'to/toward them.'
    In English, with a hostile military approach, 'upon them' idiomatically fits the
    context and pairs well with 'suddenly.' 'Against them' is possible but slightly
    more interpretive than the Hebrew requires.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - unexpectedly
  lexicon: HALOT
  rationale: The adverb denotes abruptness or unexpectedness. 'Suddenly' is the most
    direct and natural English equivalent.
- source_word: כָּל הַלַּיְלָה
  chosen: all night
  alternatives:
  - throughout the night
  - the whole night
  lexicon: HALOT
  rationale: This phrase indicates duration. 'All night' is concise, idiomatic modern
    English and preserves the sense fully.
- source_word: עָלָה
  chosen: having marched up
  alternatives:
  - went up
  - ascended
  - had gone up
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' Because the context is military movement
    from Gilgal to the battle site, 'marched up' makes explicit the travel sense implied
    by the narrative while retaining the upward/topographical nuance. The participial-like
    English 'having marched up' also captures the circumstantial force relative to
    the main verb.
- source_word: מִן הַגִּלְגָּל
  chosen: from Gilgal
  lexicon: HALOT
  rationale: Straightforward source-location phrase. 'Gilgal' is transliterated as
    a place name in keeping with the translation philosophy.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name.
