theological_decisions:
- issue: Rendering of חרם language in conquest context
  chosen_reading: had devoted it to destruction
  alternative_readings:
  - had utterly destroyed it
  - had put it under the ban
  rationale: The Hebrew carries more than mere military destruction; it denotes consecration
    to destruction under divine judgment. The chosen rendering preserves that theological
    and lexical weight without importing extra explanation into the main text.
  doctrine_reference: Translation philosophy §1, §5
