id: JOS.10.1
reference: Joshua 10:1
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ אֲדֹֽנִי צֶ֜דֶק מֶ֣לֶךְ יְרוּשָׁלִַ֗ם כִּֽי לָכַ֨ד יְהוֹשֻׁ֣עַ
    אֶת הָ/עַי֮ וַ/יַּחֲרִימָ/הּ֒ כַּ/אֲשֶׁ֨ר עָשָׂ֤ה לִֽ/ירִיחוֹ֙ וּ/לְ/מַלְכָּ֔/הּ
    כֵּן עָשָׂ֥ה לָ/עַ֖י וּ/לְ/מַלְכָּ֑/הּ וְ/כִ֨י הִשְׁלִ֜ימוּ יֹשְׁבֵ֤י גִבְעוֹן֙
    אֶת יִשְׂרָאֵ֔ל וַ/יִּֽהְי֖וּ בְּ/קִרְבָּֽ/ם־־־־־׃
translation:
  text: Now it happened, when Adoni-zedek king of Jerusalem heard that Joshua had
    captured Ai and had devoted it to destruction, just as he had done to Jericho
    and its king, so he had done to Ai and its king, and that the inhabitants of Gibeon
    had made peace with Israel and were among them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had utterly destroyed it'; Hebrew 'had devoted it to destruction,' using
      חרם language for placing something under the ban.
    reason: lexical_alternative
  - marker: b
    text: Or 'had made terms of peace with Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'Now it happened'
    preserves the discourse function in readable modern English without archaic tone.
- source_word: כִשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - upon hearing
  - as soon as ... heard
  lexicon: HALOT
  rationale: Infinitive construct with כ marks temporal circumstance. 'When ... heard'
    is natural English and fits the narrative sequence.
- source_word: אֲדֹנִי צֶדֶק
  chosen: Adoni-zedek
  alternatives:
  - Adonizedek
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy. Hyphenation helps
    reflect the compound form while remaining standard and readable.
- source_word: מֶלֶךְ יְרוּשָׁלַם
  chosen: king of Jerusalem
  lexicon: HALOT
  rationale: Straightforward construct relationship; title translated, place name
    transliterated.
- source_word: לָכַד
  chosen: had captured
  alternatives:
  - had taken
  - captured
  lexicon: HALOT
  rationale: The verb denotes seizing or capturing a city. 'Captured' is precise and
    idiomatic in military context.
- source_word: הָעַי
  chosen: Ai
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: וַיַּחֲרִימָהּ
  chosen: had devoted it to destruction
  alternatives:
  - had utterly destroyed it
  - had put it under the ban
  lexicon: HALOT
  rationale: From חרם in the hiphil, referring to placing something under ḥerem for
    destruction. 'Devoted it to destruction' preserves the technical-sacral force
    better than the flatter 'destroyed,' while avoiding opaque jargon like 'under
    the ban' in the main text.
- source_word: כַּאֲשֶׁר ... כֵּן
  chosen: just as ... so
  alternatives:
  - as ... so
  lexicon: HALOT
  rationale: This correlative construction marks close comparison between Jericho
    and Ai. 'Just as ... so' preserves the rhetorical parallel.
- source_word: עָשָׂה לִירִיחוֹ וּלְמַלְכָּהּ
  chosen: he had done to Jericho and its king
  alternatives:
  - he had dealt with Jericho and its king
  lexicon: HALOT
  rationale: עשה with ל can mean 'do to/deal with.' 'Done to' keeps the verbal repetition
    that the Hebrew emphasizes across the verse.
- source_word: הִשְׁלִימוּ
  chosen: had made peace with
  alternatives:
  - had made terms with
  - had entered into peace with
  lexicon: HALOT
  rationale: Hiphil of שלם here refers to making peace or entering peaceful relations.
    'Made peace with' is the clearest idiomatic rendering in context.
- source_word: יֹשְׁבֵי גִבְעוֹן
  chosen: the inhabitants of Gibeon
  alternatives:
  - those living in Gibeon
  - the dwellers of Gibeon
  lexicon: HALOT
  rationale: Participle used substantivally for residents of the city. 'Inhabitants'
    is natural modern English.
- source_word: וַיִּהְיוּ בְּקִרְבָּם
  chosen: and were among them
  alternatives:
  - and were in their midst
  - and were within them
  lexicon: HALOT
  rationale: בקרב with pronominal suffix indicates being in the midst of or among
    a group. 'Among them' is idiomatic and contextually clear, referring to Israel.
