id: JOS.10.22
reference: Joshua 10:22
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוֹשֻׁ֔עַ פִּתְח֖וּ אֶת פִּ֣י הַ/מְּעָרָ֑ה וְ/הוֹצִ֣יאוּ אֵלַ֗/י
    אֶת חֲמֵ֛שֶׁת הַ/מְּלָכִ֥ים הָ/אֵ֖לֶּה מִן הַ/מְּעָרָֽה־־־׃
translation:
  text: Then Joshua said, “Open the mouth of the cave, and bring those five kings
    out of the cave to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the mouth of the cave.'
    reason: lexical_alternative
  - marker: b
    text: Or 'these five kings.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: פִּתְחוּ
  chosen: Open
  alternatives:
  - Unseal
  lexicon: HALOT
  rationale: Imperative plural of פתח. 'Open' is the plain, idiomatic command in English.
- source_word: פִּי הַמְּעָרָה
  chosen: the mouth of the cave
  alternatives:
  - the opening of the cave
  - the entrance of the cave
  lexicon: HALOT
  rationale: Hebrew literally says 'the mouth of the cave.' Retaining 'mouth' preserves
    the concrete Hebrew idiom and imagery; it remains understandable in English.
- source_word: וְהוֹצִיאוּ
  chosen: bring ... out
  alternatives:
  - bring forth
  - take out
  lexicon: HALOT
  rationale: Hiphil imperative of יצא in causative sense. 'Bring ... out' is natural
    English and preserves the movement from inside the cave to Joshua's presence.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - out to me
  - before me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix indicates motion toward Joshua. 'To me'
    is the most direct rendering; the sense of outward movement is already conveyed
    by 'bring ... out.'
- source_word: חֲמֵשֶׁת הַמְּלָכִים הָאֵלֶּה
  chosen: those five kings
  alternatives:
  - these five kings
  lexicon: HALOT
  rationale: The demonstrative can be rendered 'these' or 'those.' In English narrative,
    referring to the already identified kings as 'those five kings' sounds natural
    and slightly deictic, matching the context of specific known individuals.
- source_word: מִן הַמְּעָרָה
  chosen: out of the cave
  alternatives:
  - from the cave
  lexicon: HALOT
  rationale: With a verb of removal, 'out of the cave' is more idiomatic and explicit
    in English than 'from the cave.'
