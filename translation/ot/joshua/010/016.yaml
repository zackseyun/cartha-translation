id: JOS.10.16
reference: Joshua 10:16
source:
  edition: WLC
  text: וַ/יָּנֻ֕סוּ חֲמֵ֖שֶׁת הַ/מְּלָכִ֣ים הָ/אֵ֑לֶּה וַ/יֵּחָבְא֥וּ בַ/מְּעָרָ֖ה
    בְּ/מַקֵּדָֽה׃
translation:
  text: But these five kings fled and hid in the cave at Makkedah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And these five kings fled and hid in the cave at Makkedah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: HALOT
  rationale: From נוּס, denoting flight from danger. 'Fled' is concise, natural English
    and preserves the sense of retreat under pressure better than the more neutral
    'went away.'
- source_word: חֲמֵשֶׁת
  chosen: five
  lexicon: HALOT
  rationale: Cardinal number in construct with 'kings'; straightforwardly rendered
    'five.'
- source_word: הַמְּלָכִים הָאֵלֶּה
  chosen: these five kings
  alternatives:
  - the five kings
  - those five kings
  lexicon: HALOT
  rationale: The demonstrative הָאֵלֶּה is retained with 'these' to reflect the Hebrew
    specificity. In English, reordering to 'these five kings' is more natural than
    a wooden 'five the kings these.'
- source_word: וַיֵּחָבְאוּ
  chosen: hid
  alternatives:
  - concealed themselves
  lexicon: HALOT
  rationale: From חבא, 'to hide oneself.' 'Hid' is the most natural modern English
    equivalent and adequately conveys the reflexive sense in context.
- source_word: בַמְּעָרָה
  chosen: in the cave
  alternatives:
  - in a cave
  lexicon: HALOT
  rationale: The prefixed article indicates a definite noun, so 'the cave' best reflects
    the Hebrew form. This may point to a known or contextually identifiable cave.
- source_word: בְּמַקֵּדָה
  chosen: at Makkedah
  alternatives:
  - in Makkedah
  lexicon: HALOT
  rationale: Place name transliterated per project policy. 'At Makkedah' is idiomatic
    with a named location while still covering the locative force of the preposition.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The waw here advances the narrative, but in English 'But' appropriately
    marks the shift from the prior battle scene to the kings' flight. This is a modest
    discourse-level adjustment within optimal equivalence.
