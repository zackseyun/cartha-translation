id: JOS.10.29
reference: Joshua 10:29
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֣ר יְ֠הוֹשֻׁעַ וְ/כָֽל יִשְׂרָאֵ֥ל עִמּ֛/וֹ מִ/מַּקֵּדָ֖ה לִבְנָ֑ה
    וַ/יִּלָּ֖חֶם עִם לִבְנָֽה־־׃
translation:
  text: Then Joshua, and all Israel with him, passed on from Makkedah to Libnah and
    fought against Libnah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'fought with Libnah'; the idiom means fighting against
      the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: passed on
  alternatives:
  - crossed over
  - moved on
  - went on
  lexicon: HALOT
  rationale: The verb עבר broadly means to pass over or move from one place to another.
    In this military itinerary context, 'passed on' gives natural English while preserving
    the sense of onward movement from one city to the next without over-specifying
    a river crossing.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: 'The preposition with 3ms suffix straightforwardly indicates accompaniment:
    ''all Israel with him.'' This preserves the relation between Joshua and the army.'
- source_word: מִמַּקֵּדָה
  chosen: from Makkedah
  lexicon: HALOT
  rationale: The prefixed preposition מן marks point of departure. 'Makkedah' is transliterated
    as a place name in keeping with the translation philosophy to transliterate names.
- source_word: לִבְנָה
  chosen: to Libnah
  lexicon: HALOT
  rationale: As the destination of movement, the place name is best rendered 'to Libnah.'
    The name is transliterated rather than translated.
- source_word: וַיִּלָּחֶם
  chosen: fought
  alternatives:
  - made war
  - battled
  lexicon: HALOT
  rationale: לחם in the Niphal commonly means 'to fight' or 'engage in battle.' 'Fought'
    is concise, idiomatic, and fits the narrative sequence.
- source_word: עִם לִבְנָה
  chosen: against Libnah
  alternatives:
  - with Libnah
  lexicon: HALOT
  rationale: Although עִם often means 'with,' after לחם it idiomatically marks the
    opponent in battle. English requires 'against Libnah' to convey the adversarial
    sense clearly.
