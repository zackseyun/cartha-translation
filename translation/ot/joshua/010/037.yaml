theological_decisions:
- issue: Rendering of חרם in a warfare judgment context
  chosen_reading: He devoted it to destruction
  alternative_readings:
  - he utterly destroyed it
  - he put it under the ban
  rationale: The Hebrew carries a technical sense of consecration to destruction in
    holy-war context. The chosen rendering preserves that theological and lexical
    weight without importing extra explanation into the main text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
