id: JOS.10.5
reference: Joshua 10:5
source:
  edition: WLC
  text: וַ/יֵּאָסְפ֨וּ וַֽ/יַּעֲל֜וּ חֲמֵ֣שֶׁת מַלְכֵ֣י הָ/אֱמֹרִ֗י מֶ֣לֶךְ יְרוּשָׁלִַ֜ם
    מֶֽלֶךְ חֶבְר֤וֹן מֶֽלֶךְ יַרְמוּת֙ מֶֽלֶךְ לָכִ֣ישׁ מֶֽלֶךְ עֶגְל֔וֹן הֵ֖ם וְ/כָל
    מַֽחֲנֵי/הֶ֑ם וַֽ/יַּחֲנוּ֙ עַל גִּבְע֔וֹן וַ/יִּֽלָּחֲמ֖וּ עָלֶֽי/הָ׀־־־־־־׃
translation:
  text: So the five kings of the Amorites—the king of Jerusalem, the king of Hebron,
    the king of Jarmuth, the king of Lachish, and the king of Eglon—gathered together
    and went up, they and all their camps; and they encamped against Gibeon and fought
    against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they and all their armies.' The Hebrew literally says 'they and all
      their camps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  chosen: gathered together
  alternatives:
  - assembled
  - joined forces
  lexicon: HALOT
  rationale: The Niphal form conveys coming together/assembling. 'Gathered together'
    preserves the reflexive/collective sense and fits the military context without
    overinterpreting as a formal alliance statement.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - marched up
  - advanced
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Because the text may reflect either topography
    or conventional directional idiom, 'went up' preserves the source wording more
    transparently than the more interpretive 'marched up.'
- source_word: חֲמֵשֶׁת מַלְכֵי הָאֱמֹרִי
  chosen: the five kings of the Amorites
  alternatives:
  - five Amorite kings
  lexicon: HALOT
  rationale: This keeps the construct relationship explicit and preserves the ethnic
    designation 'Amorites' as in the Hebrew.
- source_word: מֶלֶךְ יְרוּשָׁלִַם ... מֶלֶךְ עֶגְלוֹן
  chosen: the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king
    of Lachish, and the king of Eglon
  alternatives:
  - king of Jerusalem ... king of Eglon
  lexicon: HALOT
  rationale: The repeated 'king of' is retained rather than compressed, since the
    Hebrew deliberately enumerates each ruler individually.
- source_word: הֵם וְכָל מַחֲנֵיהֶם
  chosen: they and all their camps
  alternatives:
  - they and all their armies
  - they and all their forces
  lexicon: HALOT
  rationale: מַחֲנֶה literally denotes 'camp' and by extension a military camp/host.
    'Camps' preserves the concrete Hebrew image while still making sense in context.
    Because English readers may hear 'armies,' that alternative is preserved in a
    footnote.
- source_word: וַיַּחֲנוּ עַל גִּבְעוֹן
  chosen: they encamped against Gibeon
  alternatives:
  - camped by Gibeon
  - camped against Gibeon
  lexicon: HALOT
  rationale: With hostile military action immediately following, עַל here is best
    rendered 'against' rather than merely locative 'by/on,' making the adversarial
    stance explicit from context.
- source_word: וַיִּלָּחֲמוּ עָלֶיהָ
  chosen: fought against it
  alternatives:
  - made war against it
  - fought against her
  lexicon: HALOT
  rationale: The verb is standard for warfare. English idiom prefers 'fought against
    it.' The feminine pronominal suffix refers to the city Gibeon; English normally
    uses 'it' for cities.
