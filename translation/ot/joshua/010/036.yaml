id: JOS.10.36
reference: Joshua 10:36
source:
  edition: WLC
  text: וַ/יַּ֣עַל יְ֠הוֹשֻׁעַ וְ/כָֽל יִשְׂרָאֵ֥ל עִמּ֛/וֹ מֵ/עֶגְל֖וֹנָ/ה חֶבְר֑וֹנָ/ה
    וַ/יִּֽלָּחֲמ֖וּ עָלֶֽי/הָ־׃
translation:
  text: Then Joshua, and all Israel with him, went up from Eglon to Hebron, and they
    fought against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'against her,' with the feminine pronoun referring to the city of
      Hebron.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: The verb עלה commonly means 'go up/ascend.' In narrative movement between
    locations, 'went up' is the most natural English rendering and preserves the directional
    sense without sounding overly formal.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: A conventional collective expression for the fighting force accompanying
    Joshua. 'All Israel' is both literal and idiomatic in English biblical style.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition with 3ms suffix, referring
    to Joshua.
- source_word: מֵעֶגְלֹנָה
  chosen: from Eglon
  lexicon: HALOT
  rationale: The prefixed preposition מן marks source/origin. The directional he on
    the place name is not separately represented in English beyond the normal place-name
    construction.
- source_word: חֶבְרוֹנָה
  chosen: to Hebron
  alternatives:
  - toward Hebron
  lexicon: HALOT
  rationale: The directional he indicates movement toward Hebron. 'To Hebron' is the
    standard concise English equivalent.
- source_word: וַיִּלָּחֲמוּ
  chosen: and they fought
  alternatives:
  - and they made war
  lexicon: HALOT
  rationale: לחם in the Niphal here denotes engaging in battle. 'They fought' is natural
    modern English and sufficiently formal for the military context.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - against her
  lexicon: HALOT
  rationale: The feminine singular suffix refers to the city, Hebron. English normally
    uses 'it' for cities in contemporary prose, while preserving the adversative sense
    of על.
