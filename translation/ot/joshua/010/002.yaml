id: JOS.10.2
reference: Joshua 10:2
source:
  edition: WLC
  text: וַ/יִּֽירְא֣וּ מְאֹ֔ד כִּ֣י עִ֤יר גְּדוֹלָה֙ גִּבְע֔וֹן כְּ/אַחַ֖ת עָרֵ֣י
    הַ/מַּמְלָכָ֑ה וְ/כִ֨י הִ֤יא גְדוֹלָה֙ מִן הָ/עַ֔י וְ/כָל אֲנָשֶׁ֖י/הָ גִּבֹּרִֽים־־׃
translation:
  text: And they feared greatly, because Gibeon was a great city, like one of the
    royal cities, and because it was greater than Ai, and all its men were mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its men were mighty warriors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: they feared
  alternatives:
  - they were afraid
  - they dreaded
  lexicon: HALOT
  rationale: Qal wayyiqtol of ירא denotes fear. 'They feared' preserves the verbal
    force and narrative sequence without over-interpreting the emotion.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: Adverbial intensifier. 'Greatly' is natural with 'feared' and keeps the
    elevated narrative tone.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their fear. 'Because' makes the causal
    relation explicit in contemporary English.
- source_word: עִיר גְּדוֹלָה
  chosen: a great city
  alternatives:
  - a large city
  - an important city
  lexicon: HALOT
  rationale: גָּדוֹל can denote size or significance. In this context, with comparison
    to royal cities and to Ai, 'great' preserves both scale and status better than
    narrowing to merely physical size.
- source_word: גִּבְעוֹן
  chosen: Gibeon
  rationale: Standard English transliteration of the place name, following the philosophy
    of transliterating names.
- source_word: כְּאַחַת עָרֵי הַמַּמְלָכָה
  chosen: like one of the royal cities
  alternatives:
  - like one of the cities of the kingdom
  - like one of the kingdom's cities
  lexicon: HALOT
  rationale: The phrase compares Gibeon to a city belonging to a kingdom, likely meaning
    a city of royal rank. 'Royal cities' is idiomatic and captures the sense more
    clearly than the more wooden 'cities of the kingdom.'
- source_word: וְכִי
  chosen: and because
  alternatives:
  - and that
  - for
  lexicon: HALOT
  rationale: The second כִּי continues the causal explanation. 'And because' preserves
    the parallel structure of the Hebrew.
- source_word: הִיא גְדוֹלָה מִן הָעַי
  chosen: it was greater than Ai
  alternatives:
  - it was larger than Ai
  - it was more important than Ai
  lexicon: HALOT
  rationale: The feminine pronoun refers to the city. 'Greater than Ai' preserves
    the same adjective family as earlier and allows both size and prominence to remain
    in view.
- source_word: וְכָל אֲנָשֶׁיהָ
  chosen: and all its men
  alternatives:
  - and all its people
  - and all its inhabitants
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers specifically to the city's male fighting population
    in context, not the population generically. 'Men' is gender-accurate and fits
    the military setting.
- source_word: גִּבֹּרִים
  chosen: mighty
  alternatives:
  - mighty warriors
  - strong
  - valiant
  lexicon: HALOT
  rationale: גִּבּוֹרִים often denotes mighty men or warriors. Since 'men' is already
    explicit, 'mighty' avoids redundancy while preserving the martial sense; the fuller
    alternative is worth preserving in a footnote.
