id: JOS.10.24
reference: Joshua 10:24
source:
  edition: WLC
  text: וַ֠/יְהִי כְּֽ/הוֹצִיאָ֞/ם אֶת הַ/מְּלָכִ֣ים הָ/אֵלֶּה֮ אֶל יְהוֹשֻׁעַ֒ וַ/יִּקְרָ֨א
    יְהוֹשֻׁ֜עַ אֶל כָּל אִ֣ישׁ יִשְׂרָאֵ֗ל וַ֠/יֹּאמֶר אֶל קְצִינֵ֞י אַנְשֵׁ֤י הַ/מִּלְחָמָה֙
    הֶ/הָלְכ֣וּא אִתּ֔/וֹ קִרְב֗וּ שִׂ֚ימוּ אֶת רַגְלֵי/כֶ֔ם עַֽל צַוְּארֵ֖י הַ/מְּלָכִ֣ים
    הָ/אֵ֑לֶּה וַֽ/יִּקְרְב֔וּ וַ/יָּשִׂ֥ימוּ אֶת רַגְלֵי/הֶ֖ם עַל צַוְּארֵי/הֶֽם־־־־־־־־־׃
translation:
  text: And when they brought these kings out to Joshua, Joshua called all the men
    of Israel and said to the commanders of the men of war who had gone with him,
    “Come near; put your feet on the necks of these kings.” So they came near and
    put their feet on their necks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'every man of Israel'; in this military context the phrase refers
      to the men assembled with the army.
    reason: lexical_alternative
  - marker: b
    text: Or 'the commanders of the warriors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּהוֹצִיאָם
  chosen: And when they brought out
  alternatives:
  - And it happened when they brought out
  - When they had brought out
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי + כְ with infinitive construct is
    idiomatically rendered in English as a temporal clause, 'And when...,' rather
    than the more wooden 'And it happened when....' This preserves the sequence and
    readability without losing meaning.
- source_word: הַמְּלָכִים הָאֵלֶּה
  chosen: these kings
  alternatives:
  - those kings
  lexicon: HALOT
  rationale: The demonstrative naturally points to the kings present before Joshua;
    'these kings' fits the immediate deictic force in English.
- source_word: וַיִּקְרָא ... אֶל כָּל אִישׁ יִשְׂרָאֵל
  chosen: Joshua called all the men of Israel
  alternatives:
  - Joshua called every man of Israel
  - Joshua called all Israel
  lexicon: HALOT
  rationale: כָּל אִישׁ יִשְׂרָאֵל is literally 'every man of Israel.' Because the
    following speech is specifically directed to military leaders and the scene is
    martial, 'all the men of Israel' best preserves the masculine and representative
    force without flattening it to 'all Israel.'
- source_word: קְצִינֵי אַנְשֵׁי הַמִּלְחָמָה
  chosen: the commanders of the men of war
  alternatives:
  - the chiefs of the warriors
  - the officers of the fighting men
  - the commanders of the warriors
  lexicon: HALOT
  rationale: קְצִינִים denotes leaders or commanders; אַנְשֵׁי הַמִּלְחָמָה is a standard
    military expression, literally 'men of war.' 'Commanders of the men of war' is
    slightly formal but preserves the military register and structure of the Hebrew.
- source_word: הֶהָלְכוּא אִתּוֹ
  chosen: who had gone with him
  alternatives:
  - who went with him
  - who were going with him
  lexicon: HALOT
  rationale: The form functions attributively describing the commanders as those accompanying
    Joshua in the campaign. English past perfect, 'had gone with him,' fits the prior
    action relative to Joshua's command.
- source_word: קִרְבוּ
  chosen: Come near
  alternatives:
  - Come forward
  - Draw near
  lexicon: HALOT
  rationale: An imperative inviting physical approach. 'Come near' is natural modern
    English and preserves the directness of the command.
- source_word: שִׂימוּ אֶת רַגְלֵיכֶם עַל צַוְּארֵי
  chosen: put your feet on the necks of
  alternatives:
  - set your feet on the necks of
  - place your feet on the necks of
  lexicon: HALOT
  rationale: שִׂים commonly means 'put' or 'set.' 'Put your feet on the necks' is
    clear, concrete, and faithful to the symbolic act of subjugation.
- source_word: צַוְּארֵי
  chosen: necks
  alternatives:
  - necks/throats
  lexicon: HALOT
  rationale: The noun refers to the neck area. 'Necks' is the standard rendering here
    and best matches the imagery of conquest.
- source_word: וַיִּקְרְבוּ וַיָּשִׂימוּ
  chosen: So they came near and put
  alternatives:
  - And they came near and placed
  - Then they approached and put
  lexicon: HALOT
  rationale: The paired wayyiqtol verbs continue the narrative sequence. 'So they
    came near and put' gives smooth English while preserving the immediate obedience.
- source_word: עַל צַוְּארֵיהֶם
  chosen: on their necks
  alternatives:
  - upon their necks
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the kings. 'On their necks' is the
    natural English equivalent.
