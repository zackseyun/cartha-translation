theological_decisions:
- issue: Gendered language in כָּל אִישׁ יִשְׂרָאֵל and אַנְשֵׁי הַמִּלְחָמָה
  chosen_reading: all the men of Israel / men of war
  alternative_readings:
  - all Israel
  - all the Israelites
  - warriors
  - soldiers
  rationale: Per the translation philosophy's gender-accurate principle, the Hebrew
    masculine forms in this military setting are retained rather than neutralized.
    The context is specifically martial and directed to male combatants and their
    commanders, so preserving 'men' is contextually and lexically justified.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering the conquest gesture without softening
  chosen_reading: put your feet on the necks of these kings
  alternative_readings:
  - set your feet on the necks of these kings
  rationale: The verse depicts a literal and symbolic act of military domination.
    The translation preserves the starkness of the Hebrew rather than paraphrasing
    it into a less concrete image, avoiding doctrinal or moral smoothing not present
    in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
