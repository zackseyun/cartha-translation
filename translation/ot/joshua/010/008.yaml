id: JOS.10.8
reference: Joshua 10:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל יְהוֹשֻׁ֨עַ֙ אַל תִּירָ֣א מֵ/הֶ֔ם כִּ֥י בְ/יָדְ/ךָ֖
    נְתַתִּ֑י/ם לֹֽא יַעֲמֹ֥ד אִ֛ישׁ מֵ/הֶ֖ם בְּ/פָנֶֽי/ךָ־־־׃
translation:
  text: And the LORD said to Joshua, “Do not fear them, for I have given them into
    your hand. Not a man among them will stand before you.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliteration, following established reverential convention and the project's
    stated policy.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר in direct speech introduction; 'said'
    is the most natural modern English rendering.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Imperative prohibition from ירא. 'Do not fear' preserves the concise
    force of the Hebrew while remaining natural English.
- source_word: מֵהֶם
  chosen: them
  alternatives:
  - because of them
  lexicon: HALOT
  rationale: The preposition מן after ירא marks the object/source of fear; idiomatic
    English expresses this simply as 'fear them.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces the ground for the command not to fear; 'for' fits the explanatory
    relation in elevated but readable English.
- source_word: בְיָדְךָ
  chosen: into your hand
  alternatives:
  - into your power
  - under your control
  lexicon: HALOT
  rationale: The idiom of giving into someone's hand commonly denotes delivering over
    to one's power. 'Into your hand' preserves the Hebrew image while remaining understandable.
- source_word: נְתַתִּים
  chosen: I have given them
  alternatives:
  - I give them
  - I have delivered them
  lexicon: HALOT
  rationale: Perfect of נתן with prophetic-certainty force in divine speech. English
    present perfect captures a completed divine determination with present relevance
    better than a simple present here.
- source_word: לֹא יַעֲמֹד אִישׁ מֵהֶם
  chosen: Not a man among them will stand
  alternatives:
  - No one among them will stand
  - Not one of them will stand
  lexicon: HALOT
  rationale: Hebrew uses singular אִישׁ with representative force. Following the project's
    gender-accurate policy, 'man' is retained because the referent is a male fighting
    force, not generic humanity.
- source_word: בְּפָנֶיךָ
  chosen: before you
  alternatives:
  - against you
  - in your presence
  lexicon: HALOT
  rationale: In military contexts this idiom means to stand before/withstand someone.
    'Before you' preserves the Hebrew wording while naturally implying successful
    resistance in context.
