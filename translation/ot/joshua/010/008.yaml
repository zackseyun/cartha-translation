theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    No contextual factor in this verse warrants deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered rendering of אִישׁ
  chosen_reading: man
  alternative_readings:
  - one
  - person
  rationale: The context is a military promise concerning enemy combatants, so the
    masculine singular is not merely generic humanity but appropriately rendered 'man.'
    This follows the gender-accurate policy rather than flattening to a neutral term.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
