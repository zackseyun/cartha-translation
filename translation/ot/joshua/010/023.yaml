id: JOS.10.23
reference: Joshua 10:23
source:
  edition: WLC
  text: וַ/יַּ֣עֲשׂוּ כֵ֔ן וַ/יֹּצִ֣יאוּ אֵלָ֗י/ו אֶת חֲמֵ֛שֶׁת הַ/מְּלָכִ֥ים הָ/אֵ֖לֶּה
    מִן הַ/מְּעָרָ֑ה אֵ֣ת מֶ֣לֶךְ יְרוּשָׁלִַ֗ם אֶת מֶ֤לֶךְ חֶבְרוֹן֙ אֶת מֶ֣לֶךְ
    יַרְמ֔וּת אֶת מֶ֥לֶךְ לָכִ֖ישׁ אֶת מֶ֥לֶךְ עֶגְלֽוֹן־־׀־־־־׃
translation:
  text: 'And they did so, and brought out to him from the cave these five kings: the
    king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish,
    and the king of Eglon.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: And they did so
  alternatives:
  - And they did thus
  - So they did
  lexicon: HALOT
  rationale: Idiomatic narrative formula meaning compliance with the prior command.
    'Did so' is natural modern English and preserves the straightforward sense without
    over-literal awkwardness.
- source_word: וַיֹּצִיאוּ
  chosen: brought out
  alternatives:
  - brought forth
  - led out
  - took out
  lexicon: HALOT
  rationale: From יצא in the causative sense, 'cause to come out/bring out.' 'Brought
    out' fits the context of extracting the kings from the cave and reads naturally
    in English.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - before him
  lexicon: HALOT
  rationale: The preposition אל with pronominal suffix most directly means 'to him.'
    While context implies Joshua as the referent and perhaps presentation before him,
    the Hebrew does not explicitly say 'before him,' so 'to him' is preferred.
- source_word: חֲמֵשֶׁת הַמְּלָכִים הָאֵלֶּה
  chosen: these five kings
  alternatives:
  - the five kings הללו
  - these five rulers
  lexicon: HALOT
  rationale: Direct rendering of the construct numeral phrase with demonstrative.
    'Kings' is the standard and contextually precise gloss for מְלָכִים.
- source_word: מִן הַמְּעָרָה
  chosen: from the cave
  alternatives:
  - out of the cave
  lexicon: HALOT
  rationale: Simple spatial phrase. 'From the cave' is concise and accurate; English
    readers naturally understand removal from within.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: The noun plainly denotes a king. 'Ruler' would be broader and less precise
    than the Hebrew.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: יַרְמוּת
  chosen: Jarmuth
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: לָכִישׁ
  chosen: Lachish
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: עֶגְלוֹן
  chosen: Eglon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; here it refers to
    the city, not the Moabite king in Judges.
