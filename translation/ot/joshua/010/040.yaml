id: JOS.10.40
reference: Joshua 10:40
source:
  edition: WLC
  text: וַ/יַּכֶּ֣ה יְהוֹשֻׁ֣עַ אֶת כָּל הָ/אָ֡רֶץ הָ/הָר֩ וְ/הַ/נֶּ֨גֶב וְ/הַ/שְּׁפֵלָ֜ה
    וְ/הָ/אֲשֵׁד֗וֹת וְ/אֵת֙ כָּל מַלְכֵי/הֶ֔ם לֹ֥א הִשְׁאִ֖יר שָׂרִ֑יד וְ/אֵ֤ת כָּל
    הַ/נְּשָׁמָה֙ הֶחֱרִ֔ים כַּ/אֲשֶׁ֣ר צִוָּ֔ה יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: So Joshua struck all the land—the hill country, the Negev, the lowland, and
    the slopes—and all their kings. He left no survivor, but devoted to destruction
    every breathing thing, just as the LORD, the God of Israel, had commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that breathed.' The Hebrew literally refers to 'all the breath'
      or 'every breathing thing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'utterly destroyed' or 'put under the ban.' The Hebrew verb denotes devoting
      something irrevocably to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֶּה
  chosen: struck
  alternatives:
  - defeated
  - attacked
  - smote
  lexicon: HALOT
  rationale: The verb נכה commonly denotes striking down in battle. 'Struck' preserves
    the military force without over-specifying the result beyond what the verb itself
    states.
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the regional territory under discussion, not the
    entire earth. 'All the land' is a natural rendering that preserves the scope of
    the campaign summary.
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the mountains
  - the hill region
  lexicon: HALOT
  rationale: In Joshua, הָהָר often functions as a regional topographic term. 'Hill
    country' is the standard and contextually precise English equivalent.
- source_word: הַנֶּגֶב
  chosen: the Negev
  alternatives:
  - the southland
  - the southern region
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south,' but in conquest narratives it often names the
    southern arid region. 'The Negev' preserves the geographic designation.
- source_word: הַשְּׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה denotes the lowland region between hill country and coast. 'Lowland'
    is clear modern English; the transliterated 'Shephelah' is possible but less accessible.
- source_word: הָאֲשֵׁדוֹת
  chosen: the slopes
  alternatives:
  - the mountain slopes
  - the ravines
  - the descents
  lexicon: HALOT
  rationale: אֲשֵׁדוֹת refers to slopes or declivities. 'The slopes' is concise and
    fits the list of topographical regions.
- source_word: כָּל מַלְכֵיהֶם
  chosen: all their kings
  alternatives:
  - every one of their kings
  lexicon: HALOT
  rationale: A straightforward rendering preserving the distributive force of כָּל
    in context.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  chosen: He left no survivor
  alternatives:
  - he left no remnant
  - he left none remaining
  lexicon: HALOT
  rationale: שָׂרִיד means survivor/remnant. In a military context, 'survivor' is
    the clearest idiomatic choice.
- source_word: כָּל הַנְּשָׁמָה
  chosen: every breathing thing
  alternatives:
  - every person
  - all that breathed
  - every living being
  lexicon: HALOT
  rationale: Literally 'all the breath/breathing [thing].' In conquest contexts it
    refers to all living beings in the targeted population. 'Every breathing thing'
    preserves the Hebrew idiom and its starkness better than the interpretive 'every
    person.'
- source_word: הֶחֱרִים
  chosen: devoted to destruction
  alternatives:
  - utterly destroyed
  - put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing under ḥerem, that is, devoting something
    irrevocably to destruction. 'Devoted to destruction' preserves the theological
    and cultic nuance better than the flatter 'destroyed.'
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... had commanded
  alternatives:
  - as ... commanded
  lexicon: HALOT
  rationale: This comparative clause marks conformity to prior divine command. 'Just
    as' makes the correspondence explicit in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A standard construct phrase identifying YHWH covenantally in relation
    to Israel; translated directly.
