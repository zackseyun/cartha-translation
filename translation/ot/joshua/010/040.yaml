theological_decisions:
- issue: Rendering of חרם warfare language
  chosen_reading: devoted to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: The verse uses cultically charged warfare language. 'Devoted to destruction'
    preserves the text's theological register without softening it into mere military
    annihilation or obscuring it with technical jargon alone.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of כָּל הַנְּשָׁמָה
  chosen_reading: every breathing thing
  alternative_readings:
  - every person
  - all that breathed
  rationale: The Hebrew idiom is retained rather than narrowed interpretively. This
    preserves the severity of the statement while remaining transparent to the source
    wording.
  doctrine_reference: Translation philosophy §1, §3
