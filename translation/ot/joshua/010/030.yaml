theological_decisions:
- issue: Rendering of נֶפֶשׁ in a warfare context
  chosen_reading: every person
  alternative_readings:
  - every soul
  - every life
  rationale: The term here denotes the persons inhabiting the city, not a doctrinal
    statement about the soul. Rendering it as 'person' preserves the referent and
    avoids importing later anthropological assumptions.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning without importing doctrinal claims.'
