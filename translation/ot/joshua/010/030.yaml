id: JOS.10.30
reference: Joshua 10:30
source:
  edition: WLC
  text: וַ/יִּתֵּן֩ יְהוָ֨ה גַּם אוֹתָ֜/הּ בְּ/יַ֣ד יִשְׂרָאֵ֘ל וְ/אֶת מַלְכָּ/הּ֒
    וַ/יַּכֶּ֣/הָ לְ/פִי חֶ֗רֶב וְ/אֶת כָּל הַ/נֶּ֨פֶשׁ֙ אֲשֶׁר בָּ֔/הּ לֹֽא הִשְׁאִ֥יר
    בָּ֖/הּ שָׂרִ֑יד וַ/יַּ֣עַשׂ לְ/מַלְכָּ֔/הּ כַּ/אֲשֶׁ֥ר עָשָׂ֖ה לְ/מֶ֥לֶךְ יְרִיחֽוֹ־־־־־־־׃ס
translation:
  text: And the LORD also gave it and its king into the hand of Israel, and he struck
    it with the edge of the sword, and every person who was in it. He left no survivor
    in it, and he did to its king just as he had done to the king of Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''every soul who was in it,'' an idiom meaning every person in
      the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional English convention signaled in DOCTRINE.md.
- source_word: וַיִּתֵּן ... בְּיַד יִשְׂרָאֵל
  chosen: gave ... into the hand of Israel
  alternatives:
  - delivered ... into Israel's hand
  - handed ... over to Israel
  lexicon: HALOT
  rationale: The idiom נתן ביד commonly means to give over into someone's power. 'Into
    the hand of Israel' keeps the Hebrew imagery while remaining natural English.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: Marks continuation from the previous conquest account; 'also' is the
    most straightforward discourse connector here.
- source_word: אוֹתָהּ ... וְאֶת מַלְכָּהּ
  chosen: it and its king
  alternatives:
  - the city and its king
  lexicon: HALOT
  rationale: The feminine pronoun refers to the city just mentioned in context (Libnah).
    English can render the pronoun as 'it'; specifying 'city' is possible but not
    required in this verse.
- source_word: וַיַּכֶּהָ
  chosen: he struck it
  alternatives:
  - he attacked it
  - he defeated it
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/smiting. 'Struck' preserves the verbal
    force without overinterpreting the military result beyond what the clause states.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the mouth of the sword
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom literally meaning 'to the mouth/edge
    of the sword.' 'With the edge of the sword' preserves the idiomatic image in clear
    English.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person who was in it
  alternatives:
  - every soul that was in it
  - all the people in it
  lexicon: HALOT
  rationale: נפש here refers to living persons, not an immaterial 'soul' in a later
    theological sense. 'Every person' is clear modern English and avoids misunderstanding.
- source_word: לֹא הִשְׁאִיר ... שָׂרִיד
  chosen: He left no survivor in it
  alternatives:
  - he left no remnant in it
  - he did not leave a survivor in it
  lexicon: HALOT
  rationale: שָׂרִיד denotes a survivor/remnant. 'No survivor' is the most natural
    singular collective expression in English.
- source_word: וַיַּעַשׂ לְמַלְכָּהּ כַּאֲשֶׁר עָשָׂה לְמֶלֶךְ יְרִיחוֹ
  chosen: he did to its king just as he had done to the king of Jericho
  alternatives:
  - he treated its king as he had treated the king of Jericho
  lexicon: HALOT
  rationale: The Hebrew repeats עשה ('do') in a comparative formula. The English keeps
    that repetition in a natural way and makes the pluperfect sense explicit with
    'had done'.
