theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The main text follows the project's default rendering for YHWH, preserving
    reverential convention and consistency with the stated doctrine guidelines.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of לִשְׁמֹעַ ... בְּקוֹל אִישׁ
  chosen_reading: the LORD listened to the voice of a man
  alternative_readings:
  - the LORD obeyed a man
  - the LORD heeded a man's request
  rationale: The verse describes the extraordinary event of the LORD responding to
    Joshua's spoken appeal. 'Listened to the voice of a man' preserves the Hebrew
    idiom without implying subordination of God to man in a doctrinally loaded sense.
    The explanatory clause clarifies that the LORD was acting for Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
