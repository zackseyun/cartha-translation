id: JOS.10.14
reference: Joshua 10:14
source:
  edition: WLC
  text: וְ/לֹ֨א הָיָ֜ה כַּ/יּ֤וֹם הַ/הוּא֙ לְ/פָנָ֣י/ו וְ/אַחֲרָ֔י/ו לִ/שְׁמֹ֥עַ יְהוָ֖ה
    בְּ/ק֣וֹל אִ֑ישׁ כִּ֣י יְהוָ֔ה נִלְחָ֖ם לְ/יִשְׂרָאֵֽל׃פ
translation:
  text: And there was no day like that before it or after it, when the LORD listened
    to the voice of a man, for the LORD fought for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “when the LORD heeded a man’s request.” The Hebrew reads literally,
      “to listen to the voice of a man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא הָיָה
  chosen: And there was no
  alternatives:
  - And there had not been
  - And no ... was
  lexicon: HALOT
  rationale: Uses idiomatic English to render the existential clause with negation,
    preserving the emphatic statement that no comparable day existed.
- source_word: כַּיּוֹם הַהוּא
  chosen: day like that
  alternatives:
  - day like that one
  - such a day
  lexicon: HALOT
  rationale: 'The comparative כ plus ''day'' indicates uniqueness by comparison: ''like
    that day.'' ''Day like that'' is natural English and preserves the force.'
- source_word: לְפָנָיו וְאַחֲרָיו
  chosen: before it or after it
  alternatives:
  - before him or after him
  - before that day or after it
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers back to 'day,' not to a person.
    Rendering with 'it' avoids ambiguity and matches the immediate antecedent.
- source_word: לִשְׁמֹעַ יְהוָה
  chosen: when the LORD listened
  alternatives:
  - for the LORD to listen
  - that the LORD obeyed
  lexicon: HALOT
  rationale: The infinitive construct expresses the defining circumstance of the unparalleled
    day. 'Listened' is preferable to 'obeyed' in English here because the object is
    'the voice of a man'; the sense is that the LORD heeded a human request.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinally specified default for the divine name.
- source_word: בְּקוֹל אִישׁ
  chosen: to the voice of a man
  alternatives:
  - to a man's voice
  - to the voice of a human being
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew idiom 'voice of a man.'
    'Man' is retained per gender-accurate policy and because אישׁ is singular and
    concrete here, referring to Joshua as a human petitioner.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the extraordinary event. 'For'
    preserves the explanatory connection in a concise literary register.
- source_word: נִלְחָם לְיִשְׂרָאֵל
  chosen: fought for Israel
  alternatives:
  - was fighting for Israel
  - fought on behalf of Israel
  lexicon: HALOT
  rationale: The verb denotes engaging in battle on Israel's behalf. Simple past fits
    the narrative summary and reads naturally in English.
