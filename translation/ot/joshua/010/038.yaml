id: JOS.10.38
reference: Joshua 10:38
source:
  edition: WLC
  text: וַ/יָּ֧שָׁב יְהוֹשֻׁ֛עַ וְ/כָל יִשְׂרָאֵ֥ל עִמּ֖/וֹ דְּבִ֑רָ/ה וַ/יִּלָּ֖חֶם
    עָלֶֽי/הָ־׃
translation:
  text: Then Joshua, and all Israel with him, returned to Debir and fought against
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'against her,' referring to the city Debir with a feminine grammatical
      form; English idiom uses 'it' for a city here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: The verb שוב in the waw-consecutive narrative form commonly means 'returned'
    in movement contexts. 'Returned' is natural modern English and preserves the directional
    sense without unnecessary paraphrase.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  chosen: and all Israel with him
  alternatives:
  - and all of Israel with him
  lexicon: HALOT
  rationale: כָל יִשְׂרָאֵל is a collective expression referring to the Israelite
    fighting force accompanying Joshua. 'All Israel' is the standard concise rendering;
    adding 'with him' preserves עִמּוֹ explicitly.
- source_word: דְּבִרָה
  chosen: to Debir
  alternatives:
  - toward Debir
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the city.
    In idiomatic English after 'returned,' 'to Debir' best conveys the sense.
- source_word: וַיִּלָּחֶם
  chosen: fought
  alternatives:
  - waged war
  - attacked
  lexicon: HALOT
  rationale: לחם in the Niphal/waw-consecutive narrative form here denotes engaging
    in battle. 'Fought' is the most direct and natural rendering; 'waged war' is possible
    but slightly more expansive than the Hebrew requires.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - against her
  lexicon: HALOT
  rationale: The feminine singular pronominal object refers to the city Debir, which
    is grammatically feminine in Hebrew. English normally uses 'it' for cities unless
    personification is intended, which is not evident here.
