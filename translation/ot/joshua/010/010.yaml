id: JOS.10.10
reference: Joshua 10:10
source:
  edition: WLC
  text: וַ/יְהֻמֵּ֤/ם יְהוָה֙ לִ/פְנֵ֣י יִשְׂרָאֵ֔ל וַ/יַּכֵּ֥/ם מַכָּֽה גְדוֹלָ֖ה בְּ/גִבְע֑וֹן וַֽ/יִּרְדְּפֵ֗/ם דֶּ֚רֶךְ מַעֲלֵ֣ה בֵית חוֹרֹ֔ן וַ/יַּכֵּ֥/ם עַד עֲזֵקָ֖ה וְ/עַד מַקֵּדָֽה־־־־׃
translation:
  text: And Yahweh threw them into confusion before Israel, and struck them with a great blow at Gibeon, and pursued them by the way of the ascent of Beth-horon, and struck them as far as Azekah and Makkedah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'routed them' / 'threw them into panic.' The Hebrew verb denotes causing confusion or panic in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהֻמֵּם
  chosen: threw them into confusion
  alternatives:
  - routed them
  - confounded them
  - threw them into panic
  lexicon: HALOT
  rationale: The verb from המם denotes causing panic, confusion, or discomfiture in battle. 'Threw them into confusion' preserves divine causation and the psychological disruption without collapsing it into the result-only rendering 'routed.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - before the Israelites
  - in the presence of Israel
  lexicon: HALOT
  rationale: The phrase literally means 'before Israel.' This can imply spatially before them or in their sight/for their advantage. 'Before Israel' is concise and preserves the Hebrew idiom while remaining clear in context.
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - defeated them
  - smote them
  - struck them
  lexicon: HALOT
  rationale: נכה in battle contexts commonly means to strike/defeat/kill. 'Struck them down' communicates violent military defeat and fits the repeated use in the verse.
- source_word: מַכָּה גְדוֹלָה
  chosen: with a great slaughter
  alternatives:
  - with a great blow
  - with a great defeat
  - with a severe blow
  lexicon: HALOT
  rationale: The noun מכה can mean blow, plague, or slaughter/defeat depending on context. In a battle narrative with pursuit and killing, 'great slaughter' best captures the military sense and natural English idiom.
- source_word: בְּגִבְעוֹן
  chosen: at Gibeon
  alternatives:
  - in Gibeon
  rationale: For a battle location, 'at Gibeon' is the most natural English rendering.
- source_word: וַיִּרְדְּפֵם
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף is the standard verb for pursuing enemies. 'Pursued' is both accurate and suitably formal for narrative prose.
- source_word: דֶּרֶךְ מַעֲלֵה בֵית חוֹרֹן
  chosen: by the way of the ascent of Beth-horon
  alternatives:
  - on the road up to Beth-horon
  - by the ascent to Beth-horon
  lexicon: HALOT
  rationale: 'The Hebrew is fairly specific: ''the way/road of the ascent of Beth-horon.'' This rendering preserves the topographical detail without over-paraphrasing. ''Beth-horon'' is transliterated as a place name.'
- source_word: עַד עֲזֵקָה וְעַד מַקֵּדָה
  chosen: as far as Azekah and Makkedah
  alternatives:
  - to Azekah and to Makkedah
  - as far as Azekah, even to Makkedah
  lexicon: HALOT
  rationale: עַד marks the extent of the pursuit/striking. 'As far as' expresses the geographic limit naturally in English. The repeated preposition is smoothed into idiomatic English while retaining both endpoints.
- source_word: מַקֵּדָה
  chosen: Makkedah
  alternatives:
  - Makedah
  rationale: A standard transliteration preserving the doubled consonant implied by the Hebrew spelling.
