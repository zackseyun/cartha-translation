theological_decisions:
- issue: Rendering of בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as the standard
    national designation. Per the doctrine's gender-accurate principle, the translation
    preserves the formal source expression rather than neutralizing it, while alternatives
    remain possible in other contexts for readability.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Nuance of נַחֲלָה in land-allotment context
  chosen_reading: an inheritance
  alternative_readings:
  - a possession
  - an allotment
  rationale: The verse concerns covenantal land distribution. 'Inheritance' preserves
    the legal-theological nuance of land received as allotted share, which is central
    to Joshua's land narratives.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 5
