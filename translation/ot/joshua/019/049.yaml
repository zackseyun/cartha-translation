id: JOS.19.49
reference: Joshua 19:49
source:
  edition: WLC
  text: וַ/יְכַלּ֥וּ לִ/נְחֹל אֶת הָ/אָ֖רֶץ לִ/גְבֽוּלֹתֶ֑י/הָ וַ/יִּתְּנ֨וּ בְנֵי
    יִשְׂרָאֵ֧ל נַחֲלָ֛ה לִ/יהוֹשֻׁ֥עַ בִּן נ֖וּן בְּ/תוֹכָֽ/ם־־־־׃
translation:
  text: When they finished apportioning the land by its territories, the sons of Israel
    gave an inheritance to Joshua son of Nun among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to its borders.' The Hebrew can emphasize boundary lines as
      well as territorial divisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַלּוּ
  chosen: When they finished
  alternatives:
  - And they finished
  - When they completed
  lexicon: HALOT
  rationale: The waw-consecutive verb from כלה marks completed action in narrative
    sequence. Rendering with 'When they finished' captures the temporal sense naturally
    in English and fits the following action.
- source_word: לִנְחֹל
  chosen: apportioning
  alternatives:
  - dividing for inheritance
  - taking possession of as an inheritance
  lexicon: HALOT
  rationale: The infinitive from נחל in this context concerns assigning the land as
    inheritance among the tribes, not merely possessing it. 'Apportioning' best reflects
    the distributive sense in Joshua 13–19.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land
  lexicon: HALOT
  rationale: In Joshua, 'the land' is the standard contextual sense, referring to
    Canaan/Israel's allotted territory rather than earth in a global sense.
- source_word: לִגְבוּלֹתֶיהָ
  chosen: by its territories
  alternatives:
  - according to its borders
  - within its boundaries
  lexicon: HALOT
  rationale: גְּבוּל often denotes border, boundary, or territory. Here the plural
    with suffix refers to the land's territorial divisions. 'By its territories' communicates
    the allotment according to regional boundaries.
- source_word: וַיִּתְּנוּ
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' 'Gave' is sufficiently broad and natural,
    while the object and context clarify that this is an official grant.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the formal expression is retained
    as 'the sons of Israel.' It is also a conventional covenantal designation in the
    Hebrew narrative. 'Israelites' is possible but less formally transparent to the
    source.
- source_word: נַחֲלָה
  chosen: an inheritance
  alternatives:
  - an allotted inheritance
  - a possession
  lexicon: HALOT
  rationale: נַחֲלָה is a key covenant-land term meaning inheritance or allotted possession.
    'Inheritance' preserves the theological and legal nuance better than the flatter
    'possession.'
- source_word: לִיהוֹשֻׁעַ בִּן נוּן
  chosen: to Joshua son of Nun
  alternatives:
  - to Joshua the son of Nun
  lexicon: HALOT
  rationale: Standard English rendering of the personal name and patronymic; 'son
    of Nun' is concise and natural.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - in the midst of them
  lexicon: HALOT
  rationale: The phrase indicates that Joshua's inheritance was granted within the
    community/allotments of Israel, not apart from them. 'Among them' is clear modern
    English.
