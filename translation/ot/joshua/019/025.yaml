id: JOS.19.25
reference: Joshua 19:25
source:
  edition: WLC
  text: וַ/יְהִ֖י גְּבוּלָ֑/ם חֶלְקַ֥ת וַ/חֲלִ֖י וָ/בֶ֥טֶן וְ/אַכְשָֽׁף׃
translation:
  text: And their border was Helkath, Hali, Beten, and Akshaph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akshaph is traditionally rendered 'Achshaph' in many English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - And it was
  lexicon: HALOT
  rationale: The wayyiqtol of היה continues the boundary-list narrative. In English,
    'And ... was' naturally introduces the list without overtranslating the verbal
    form.
- source_word: גְּבוּלָם
  chosen: their border
  alternatives:
  - their boundary
  - their territory
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a border or boundary line. 'Border' is concise
    and idiomatic in allotment contexts. The 3mp suffix refers to the tribe under
    discussion.
- source_word: חֶלְקַת
  chosen: Helkath
  alternatives:
  - Helqat
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    following the project's policy for names.
- source_word: וַחֲלִי
  chosen: Hali
  alternatives:
  - Chali
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention. Initial ח is
    represented here as 'H' for readability in standard Bible English.
- source_word: וָבֶטֶן
  chosen: Beten
  lexicon: HALOT
  rationale: Place name transliterated directly.
- source_word: וְאַכְשָׁף
  chosen: Akshaph
  alternatives:
  - Achshaph
  lexicon: HALOT
  rationale: Place name transliterated. 'Akshaph' reflects a straightforward modern
    transliteration; 'Achshaph' is a common traditional alternative worth preserving.
