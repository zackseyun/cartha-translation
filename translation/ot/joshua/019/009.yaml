id: JOS.19.9
reference: Joshua 19:9
source:
  edition: WLC
  text: מֵ/חֶ֨בֶל֙ בְּנֵ֣י יְהוּדָ֔ה נַחֲלַ֖ת בְּנֵ֣י שִׁמְע֑וֹן כִּֽי הָיָ֞ה חֵ֤לֶק
    בְּנֵֽי יְהוּדָה֙ רַ֣ב מֵ/הֶ֔ם וַ/יִּנְחֲל֥וּ בְנֵֽי שִׁמְע֖וֹן בְּ/ת֥וֹךְ נַחֲלָתָֽ/ם־־־׃פ
translation:
  text: From the portion of the sons of Judah came the inheritance of the sons of
    Simeon, because the share of the sons of Judah was too large for them; so the
    sons of Simeon received their inheritance within their inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the territory of the sons of Judah.' The Hebrew חֶבֶל can denote
      a measured tract or region of land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Judah' and 'the sons of Simeon,' a literal tribal designation
      that may also be rendered 'the tribe of Judah' and 'the tribe of Simeon.'
    reason: lexical_alternative
  - marker: c
    text: That is, Simeon's allotted land was located inside Judah's allotted territory.
    reason: cultural_note
lexical_decisions:
- source_word: מֵ/חֶבֶל
  chosen: from the portion
  alternatives:
  - from the territory
  - from the tract
  - from the region
  lexicon: HALOT
  rationale: חֶבֶל in land-allotment contexts denotes a measured portion or tract
    of land. 'Portion' fits the inheritance context and reads naturally in English
    while preserving the sense of a defined allotment.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly refers to an inherited allotment of land in Joshua.
    'Inheritance' preserves the covenantal-land nuance better than the more administrative
    'allotment,' though the latter is a viable contextual alternative.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the tribe of Judah
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of Judah.' This is a tribal designation,
    but per gender-accurate philosophy the literal form is retained where it matches
    the source intent. 'Tribe of Judah' is interpretive and smoother, but less transparent.
- source_word: בְּנֵי שִׁמְעוֹן
  chosen: the sons of Simeon
  alternatives:
  - the people of Simeon
  - the tribe of Simeon
  lexicon: HALOT
  rationale: As with Judah, the literal tribal designation is preserved. This maintains
    consistency and transparency with the Hebrew phrasing.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: כִּי introduces the reason Simeon's inheritance came from Judah's portion.
    'Because' makes the causal relation explicit in clear modern English.
- source_word: חֵלֶק
  chosen: the share
  alternatives:
  - the portion
  - the allotment
  lexicon: HALOT
  rationale: חֵלֶק overlaps semantically with חֶבֶל and נַחֲלָה, but here 'share'
    provides helpful English variation while still denoting Judah's allotted part.
    This avoids awkward repetition without changing meaning.
- source_word: רַב מֵהֶם
  chosen: was too large for them
  alternatives:
  - was greater than they needed
  - was too much for them
  - was larger than theirs
  lexicon: HALOT
  rationale: The phrase indicates Judah's allotted share exceeded what was fitting
    relative to them. 'Too large for them' is idiomatic and reflects the comparative
    sense of רַב with מִן.
- source_word: וַיִּנְחֲלוּ
  chosen: received their inheritance
  alternatives:
  - inherited
  - took as an inheritance
  lexicon: HALOT
  rationale: The verb from נחל in this context refers to coming into possession of
    an allotted inheritance. 'Received their inheritance' is clear and fits the land-distribution
    setting.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - inside
  lexicon: HALOT
  rationale: בְּתוֹךְ marks location inside Judah's allotment. 'Within' is concise
    and natural in English.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotment
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to Judah in context: Simeon''s
    inheritance lay within Judah''s inheritance. English repeats ''inheritance'' to
    preserve the land-allotment terminology of the Hebrew.'
