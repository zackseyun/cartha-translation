id: JOS.19.3
reference: Joshua 19:3
source:
  edition: WLC
  text: וַ/חֲצַ֥ר שׁוּעָ֛ל וּ/בָלָ֖ה וָ/עָֽצֶם׃
translation:
  text: Hazar-shual, Balah, and Ezem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hazar-shual is a compound place name; literally, 'settlement of the
      fox' or 'village of the fox.'
    reason: lexical_alternative
  - marker: b
    text: Some English versions render 'Baalah' instead of 'Balah,' and 'Azem' instead
      of 'Ezem.' These reflect alternative transliterations or harmonization with
      related place-name forms.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲצַר שׁוּעָל
  chosen: Hazar-shual
  alternatives:
  - Hazor-shual
  - Village of the Fox
  lexicon: HALOT
  rationale: A place name composed of חצר ('settlement/enclosure') and שועל ('fox/jackal').
    Per translation philosophy, personal and place names are transliterated rather
    than translated. The hyphen preserves the compound nature of the Hebrew toponym.
    'Hazor-shual' reflects a more traditional vocalized form; 'Village of the Fox'
    is a possible semantic rendering but is not used in the main text because this
    is a proper name.
- source_word: בָלָה
  chosen: Balah
  alternatives:
  - Baalah
  lexicon: HALOT
  rationale: Proper place name; transliterated directly from the consonantal-vocalized
    Hebrew here as 'Balah.' 'Baalah' appears in some English traditions and related
    passages, but this verse's form lacks the extra aleph-lengthened representation
    in English, so 'Balah' best reflects the immediate Hebrew form.
- source_word: עָצֶם
  chosen: Ezem
  alternatives:
  - Azem
  lexicon: HALOT
  rationale: Proper place name; transliterated. English 'Ezem' reflects the Masoretic
    vocalization more closely, while 'Azem' is a common alternative in English Bible
    tradition.
- source_word: וּ / וָ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction on the second and third place names is the standard
    Hebrew coordinating conjunction, naturally rendered 'and' in English. Commas are
    used to represent the list structure, with 'and' before the final item.
