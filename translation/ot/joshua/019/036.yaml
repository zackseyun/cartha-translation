id: JOS.19.36
reference: Joshua 19:36
source:
  edition: WLC
  text: וַ/אֲדָמָ֥ה וְ/הָ/רָמָ֖ה וְ/חָצֽוֹר׃
translation:
  text: Adamah, Ramah, and Hazor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲדָמָה
  chosen: Adamah
  alternatives:
  - Adamah
  lexicon: HALOT
  rationale: Proper place name in a town list. Per translation philosophy, personal
    and place names are transliterated rather than translated. Although the consonants
    are identical to the common noun for 'ground/soil' in other contexts, here morphology
    and context mark it as a toponym.
- source_word: הָרָמָה
  chosen: Ramah
  alternatives:
  - the Ramah
  - Ramahh
  lexicon: HALOT
  rationale: Toponym with prefixed article. In Hebrew place names, the article may
    be fossilized or part of the conventional form; idiomatic English rendering of
    biblical place lists normally omits translating the article and uses the established
    transliteration 'Ramah.' 'The Ramah' would be overly wooden in English for a place
    name list.
- source_word: חָצוֹר
  chosen: Hazor
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration in biblical usage.
    Context is a sequence of town names within tribal allotment boundaries, so transliteration
    is preferred over any attempt to render possible lexical meaning.
- source_word: וְ
  chosen: and
  rationale: The conjunction links the place names in a simple coordinate list. English
    preserves this with 'and,' including the serial conjunction before the final item
    for natural readability.
