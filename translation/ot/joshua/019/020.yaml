id: JOS.19.20
reference: Joshua 19:20
source:
  edition: WLC
  text: וְ/הָֽ/רַבִּ֥ית וְ/קִשְׁי֖וֹן וָ/אָֽבֶץ׃
translation:
  text: and Rabbith, and Kishion, and Ebez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew vocalization may also be represented more mechanically as 'Harabbith.'
    reason: lexical_alternative
  - marker: b
    text: Some transliterations render the final place name as 'Abez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרַבִּית
  chosen: Rabbith
  alternatives:
  - Harabbith
  lexicon: HALOT
  rationale: Toponym in a boundary/town list; per translation philosophy, personal
    and place names are transliterated rather than translated. The prefixed conjunction
    is rendered separately as 'and.' The initial ה is treated as part of the place
    name in the traditional vocalization, yielding the conventional transliteration
    'Rabbith'; 'Harabbith' is a possible more mechanically formal transliteration.
- source_word: קִשְׁיוֹן
  chosen: Kishion
  alternatives:
  - Kishjon
  - Kishyon
  lexicon: HALOT
  rationale: Proper place name; transliterated into standard English form. Variation
    reflects different ways of representing Hebrew yod/waw sequences in English transliteration.
- source_word: אָבֶץ
  chosen: Ebez
  alternatives:
  - Abez
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Ebez' follows the common English
    convention for this vocalization, while 'Abez' is a possible closer representation
    of the initial aleph with qamets.
- source_word: וְ
  chosen: and
  rationale: The conjunction joins items in the town list and is naturally rendered
    'and' before each item in English to reflect the Hebrew polysyndeton.
- source_word: וָ
  chosen: and
  rationale: Conjunction with vowel change before the following aleph; function remains
    the simple coordinating conjunction 'and.'
