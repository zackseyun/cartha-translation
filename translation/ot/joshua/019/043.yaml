id: JOS.19.43
reference: Joshua 19:43
source:
  edition: WLC
  text: וְ/אֵיל֥וֹן וְ/תִמְנָ֖תָ/ה וְ/עֶקְרֽוֹן׃
translation:
  text: and Aijalon, Timnah, and Ekron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תִמְנָתָה may also be represented more formally as 'Timnathah' or
      'Timnath.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew אֵילוֹן is also commonly transliterated 'Ayalon'; traditional English
      often has 'Aijalon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵילוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  - Elon
  lexicon: HALOT
  rationale: Proper place name in a boundary/city list; transliterated rather than
    translated per project philosophy. 'Aijalon' is a standard English form for this
    town, while 'Ayalon' is a closer modern transliteration and 'Elon' reflects a
    more direct consonantal carryover but is less conventional for this location.
- source_word: תִמְנָתָה
  chosen: Timnah
  alternatives:
  - Timnathah
  - Timnath
  lexicon: HALOT
  rationale: Proper place name with directional/locative ending in form; in English
    city lists the established place-name is commonly represented as 'Timnah.' The
    shorter conventional form reads naturally while still reflecting the Hebrew name.
    Alternative fuller transliterations are preserved.
- source_word: עֶקְרוֹן
  chosen: Ekron
  lexicon: HALOT
  rationale: Proper place name; straightforward transliteration into standard English
    biblical usage.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The conjunction is repeated before each item in Hebrew polysyndeton.
    English can preserve this naturally in a list, so each waw is represented with
    'and'.
