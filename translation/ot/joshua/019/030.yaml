id: JOS.19.30
reference: Joshua 19:30
source:
  edition: WLC
  text: וְ/עֻמָ֥ה וַ/אֲפֵ֖ק וּ/רְחֹ֑ב עָרִ֛ים עֶשְׂרִ֥ים וּ/שְׁתַּ֖יִם וְ/חַצְרֵי/הֶֽן׃
translation:
  text: 'Ummah, Aphek, and Rehob: twenty-two cities, with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their settlements' or 'their hamlets'; the Hebrew refers to dependent
      rural places associated with the listed cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻמָה
  chosen: Ummah
  alternatives:
  - Umah
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    per project philosophy. English spelling 'Ummah' reflects the Hebrew consonants
    and vowel pointing.
- source_word: אֲפֵק
  chosen: Aphek
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration of the Hebrew toponym.
- source_word: רְחֹב
  chosen: Rehob
  alternatives:
  - Rechob
  lexicon: HALOT
  rationale: Proper place name; transliterated in conventional English form 'Rehob.'
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Common noun summarizing the listed settlements. 'Cities' is the standard
    rendering in allotment lists, though these may have varied in size; 'towns' is
    possible but less conventional here.
- source_word: עֶשְׂרִים וּשְׁתַּיִם
  chosen: twenty-two
  lexicon: HALOT
  rationale: Cardinal number giving the total count of the cities in this section.
- source_word: חַצְרֵיהֶן
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  - their daughter villages
  lexicon: HALOT
  rationale: In territorial and settlement lists, חָצֵר commonly refers to dependent
    rural settlements or unwalled villages associated with a main town. 'Their villages'
    is clear modern English and fits established usage in Joshua.
