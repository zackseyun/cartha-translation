id: JOS.19.21
reference: Joshua 19:21
source:
  edition: WLC
  text: וְ/רֶ֧מֶת וְ/עֵין גַּנִּ֛ים וְ/עֵ֥ין חַדָּ֖ה וּ/בֵ֥ית פַּצֵּֽץ־׃
translation:
  text: Remeth, En-gannim, En-haddah, and Beth-pazzez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew place names: ''En-gannim'' likely means ''spring of gardens,'' ''En-haddah''
      begins with ''spring,'' and ''Beth-pazzez'' begins with ''house of.'' The main
      text transliterates them because they function here as town names.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֶמֶת
  chosen: Remeth
  alternatives:
  - Remeth
  lexicon: HALOT
  rationale: Proper place name in a boundary/town list; transliterated rather than
    translated per project philosophy for names. English spelling 'Remeth' reflects
    standard convention for this toponym.
- source_word: עֵין גַּנִּים
  chosen: En-gannim
  alternatives:
  - En Gannim
  - Spring of gardens
  lexicon: HALOT
  rationale: Compound place name built on עֵין ('spring') plus גַּנִּים ('gardens').
    Because this is a toponym in a list of towns, transliteration is preferred in
    the main text rather than a semantic translation such as 'Spring of gardens.'
    Hyphenation aids readability in English place-name form.
- source_word: עֵין חַדָּה
  chosen: En-haddah
  alternatives:
  - En Haddah
  - Spring of Hadah
  - Spring of sharpness
  lexicon: HALOT
  rationale: Another compound place name beginning with עֵין ('spring'). The second
    element is best preserved by transliteration because the whole expression functions
    as a settled toponym; semantic translation is uncertain and would be less natural
    in a town list.
- source_word: בֵית פַּצֵּץ
  chosen: Beth-pazzez
  alternatives:
  - Beth Pazzez
  - House of Pazzez
  lexicon: HALOT
  rationale: Compound place name with בֵית ('house of') used in many Hebrew toponyms.
    As a proper name, transliteration is preferred in the main text. 'House of Pazzez'
    is possible semantically but less suitable for a geographic list.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The repeated conjunction simply links the place names in the list. In
    English, commas plus a final 'and' produce natural list style while preserving
    the coordination.
