id: JOS.19.46
reference: Joshua 19:46
source:
  edition: WLC
  text: וּ/מֵ֥י הַיַּרְק֖וֹן וְ/הָֽ/רַקּ֑וֹן עִֽם הַ/גְּב֖וּל מ֥וּל יָפֽוֹ־׃
translation:
  text: and the waters of Jarkon and Rakkon, with the territory opposite Joppa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew may also be understood as the place-name 'Me-jarkon' rather than
      the transparent phrase 'the waters of Jarkon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with the border' or 'with the boundary' opposite Joppa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵי
  chosen: and the waters of
  alternatives:
  - and from the waters of
  - and Mei-
  lexicon: HALOT
  rationale: The consonantal form is vocalized as מֵי, the construct plural of מַיִם
    ('waters'), not the preposition מִן ('from'). In this boundary list context, 'the
    waters of' naturally refers to a water feature associated with Jarkon. A transliteration
    'Me-jarkon' reflects a traditional place-name treatment but obscures the transparent
    Hebrew form.
- source_word: הַיַּרְקוֹן
  chosen: Jarkon
  alternatives:
  - the Jarkon
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy. The article
    is retained in Hebrew place-name usage but is not normally represented in English
    transliteration.
- source_word: וְהָרַקּוֹן
  chosen: and Rakkon
  alternatives:
  - and the Rakkon
  lexicon: HALOT
  rationale: Proper place name; transliterated. As with Jarkon, the Hebrew article
    is part of the place-name expression and is not carried over woodenly into English.
- source_word: עִם
  chosen: with
  alternatives:
  - together with
  - including
  lexicon: HALOT
  rationale: The preposition most straightforwardly means 'with.' In a territorial
    list it links the preceding place names with the following boundary/territory
    expression.
- source_word: הַגְּבוּל
  chosen: the territory
  alternatives:
  - the border
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל can denote border, boundary line, or territory. Here, after named
    locations and before 'opposite Joppa,' 'territory' best captures the sense of
    the district/border area without sounding overly technical. 'Boundary' is possible
    and preserved as an alternative.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - in front of
  - toward
  lexicon: HALOT
  rationale: 'מוּל commonly indicates spatial correspondence: ''opposite'' or ''facing.''
    ''Opposite'' fits a boundary description relative to Joppa.'
- source_word: יָפוֹ
  chosen: Joppa
  alternatives:
  - Japho
  - Jaffa
  lexicon: HALOT
  rationale: Standard English biblical transliteration is 'Joppa.' 'Jaffa' reflects
    the later/modern form; 'Japho' is a more direct transliteration but less familiar
    in English Bible usage.
