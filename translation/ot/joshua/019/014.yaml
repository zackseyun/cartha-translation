id: JOS.19.14
reference: Joshua 19:14
source:
  edition: WLC
  text: וְ/נָסַ֤ב אֹת/וֹ֙ הַ/גְּב֔וּל מִ/צְּפ֖וֹן חַנָּתֹ֑ן וְ/הָיוּ֙ תֹּֽצְאֹתָ֔י/ו
    גֵּ֖י יִפְתַּח אֵֽל־׃
translation:
  text: Then the border turned around it on the north of Hannathon, and its end points
    were at the Valley of Iphtah-el.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'north of Hannathon.' The Hebrew phrase may be understood either as positional
      ('on the north of') or more simply directional ('north of').
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its goings out,' a boundary term meaning its extremities or end
      points.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  chosen: Then ... turned around
  alternatives:
  - and turned
  - went around
  - encircled
  lexicon: HALOT
  rationale: נָסַב in boundary descriptions commonly denotes turning or curving around.
    'Then ... turned around' gives natural English while preserving the directional
    movement of the border line.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: The pronominal object refers back to a place/boundary point in the territorial
    description, so English 'it' is required rather than the formally possible but
    contextually inappropriate 'him'.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: In allotment texts גְּבוּל refers to the territorial border line. 'Border'
    is concise and idiomatic in English.
- source_word: מִצְּפוֹן חַנָּתֹן
  chosen: on the north of Hannathon
  alternatives:
  - from the north of Hannathon
  - north of Hannathon
  lexicon: HALOT
  rationale: The preposition מן with צפון in boundary formulas can indicate position
    relative to a landmark. 'On the north of Hannathon' best fits the sense of the
    border passing around at Hannathon's northern side.
- source_word: וְהָיוּ תֹּצְאֹתָיו
  chosen: and its end points were
  alternatives:
  - and its goings out were
  - and its extremities were
  - and its outlets were
  lexicon: HALOT
  rationale: תֹּצָאוֹת in territorial descriptions refers to the border's terminal
    points or extremities. 'End points' is clear modern English and preserves the
    geographic sense.
- source_word: גֵּי
  chosen: Valley of
  alternatives:
  - valley of
  - ravine of
  lexicon: HALOT
  rationale: גֵּי denotes a valley or ravine. Capitalizing 'Valley' is appropriate
    here because it forms part of a place name.
- source_word: יִפְתַּח אֵל
  chosen: Iphtah-el
  alternatives:
  - Jiphthah-el
  - Iphthah-el
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per project philosophy. 'Iphtah-el' is a straightforward transliteration from
    the Hebrew form in this verse.
