id: JOS.19.32
reference: Joshua 19:32
source:
  edition: WLC
  text: לִ/בְנֵ֣י נַפְתָּלִ֔י יָצָ֖א הַ/גּוֹרָ֣ל הַ/שִּׁשִּׁ֑י לִ/בְנֵ֥י נַפְתָּלִ֖י
    לְ/מִשְׁפְּחֹתָֽ/ם׃
translation:
  text: For the sons of Naphtali, the sixth lot came out, for the sons of Naphtali
    according to their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''fell'': the Hebrew verb is literally ''came out'' or ''went out,''
      referring to the result of casting the lot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  chosen: for the sons of
  alternatives:
  - for the descendants of
  - to the sons of
  - for the children of
  lexicon: HALOT
  rationale: The preposition ל with בנים here marks the tribal recipient of the lot.
    'Sons of' preserves the formal tribal idiom better than 'descendants' or 'children,'
    while 'for' fits the allotment context naturally in English.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Proper tribal/personal name is transliterated per translation philosophy.
- source_word: יָצָא
  chosen: came out
  alternatives:
  - went out
  - fell
  lexicon: HALOT
  rationale: The verb literally means 'went/came out.' In the context of casting lots,
    'came out' is both natural English and closer to the Hebrew than the more interpretive
    traditional 'fell.'
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the allotted lot
  lexicon: HALOT
  rationale: גורל in this context refers to the lot cast for territorial inheritance.
    'The lot' is the standard and sufficiently precise rendering.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'lot'; straightforwardly rendered 'the sixth.'
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal-allotment contexts refers to kinship subdivisions
    within the tribe. 'Clans' is more precise than modern English 'families,' which
    can sound too narrow or domestic.
