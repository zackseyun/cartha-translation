id: JOS.19.44
reference: Joshua 19:44
source:
  edition: WLC
  text: וְ/אֶלְתְּקֵ֥ה וְ/גִבְּת֖וֹן וּ/בַעֲלָֽת׃
translation:
  text: Eltekeh, Gibbethon, and Baalath.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֶלְתְּקֵה
  chosen: Eltekeh
  alternatives:
  - Eltekeh
  rationale: Proper place name in a boundary/town list. Following the translation
    philosophy, names are transliterated rather than translated. The form 'Eltekeh'
    reflects a standard English transliteration of the Hebrew toponym.
- source_word: גִבְּתוֹן
  chosen: Gibbethon
  alternatives:
  - Gibbeton
  rationale: Proper place name. Transliterated into conventional English form 'Gibbethon.'
    An alternative spelling with single 'b' is less standard in English Bible tradition;
    the doubled consonant better reflects the Hebrew dagesh.
- source_word: בַעֲלָת
  chosen: Baalath
  alternatives:
  - Baalat
  rationale: Proper place name. Although related in form to the common Semitic element
    'Baal,' here it functions as a toponym and is therefore transliterated, not translated.
    'Baalath' is the conventional English transliteration and preserves the final
    tav.
- source_word: וְ
  chosen: and
  alternatives:
  - ','
  rationale: The prefixed conjunction joins items in a simple list. In English town
    lists, commas are used between earlier items and 'and' before the final item for
    natural readability while preserving the Hebrew coordination.
