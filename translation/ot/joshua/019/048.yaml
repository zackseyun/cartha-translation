id: JOS.19.48
reference: Joshua 19:48
source:
  edition: WLC
  text: זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵי דָ֖ן לְ/מִשְׁפְּחֹתָ֑/ם הֶֽ/עָרִ֥ים הָ/אֵ֖לֶּה
    וְ/חַצְרֵי/הֶֽן־׃פ
translation:
  text: 'This was the inheritance of the tribe of the sons of Dan, according to their
    clans: these cities with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the inheritance ...' The Hebrew demonstrative formula can be
      rendered with either present or past tense in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'allotment' for 'inheritance'; the Hebrew term can emphasize either the
      assigned portion or its inherited character.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the listed territorial
    allotment. English idiom in this summary formula is smoother with past tense ('This
    was'), though a present ('This is') is possible.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: In Joshua's land-distribution context, נַחֲלָה denotes an inherited territorial
    portion. 'Inheritance' preserves the covenantal-land nuance better than the more
    administrative 'allotment,' though the latter is a viable contextual alternative.
- source_word: מַטֵּה
  chosen: the tribe
  alternatives:
  - the staff
  - the branch
  lexicon: HALOT
  rationale: Here מַטֶּה is the standard tribal designation in allotment formulas,
    not the literal object 'staff.' 'Tribe' is the established contextual sense.
- source_word: בְנֵי דָן
  chosen: of the sons of Dan
  alternatives:
  - of Danites
  - of the people of Dan
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew construct expression.
    'Danites' is idiomatic but less transparent to the source wording.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal census/allotment contexts is best rendered 'clans,'
    denoting kinship subdivisions within the tribe rather than nuclear families.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - the cities, these
  - these towns
  lexicon: HALOT
  rationale: Straightforward deictic phrase summarizing the preceding list. 'Cities'
    is conventional for עָרִים in territorial registers, though some may have been
    small towns.
- source_word: וְחַצְרֵיהֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their surrounding settlements
  lexicon: HALOT
  rationale: חָצֵר in these land lists commonly refers to dependent settlements/outlying
    villages associated with a city. 'Villages' is the clearest natural English equivalent
    in this formula.
