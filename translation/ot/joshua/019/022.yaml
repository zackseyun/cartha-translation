id: JOS.19.22
reference: Joshua 19:22
source:
  edition: WLC
  text: וּ/פָגַע֩ הַ/גְּב֨וּל בְּ/תָב֤וֹר ו/שחצומ/ה וּ/בֵ֣ית שֶׁ֔מֶשׁ וְ/הָי֛וּ תֹּצְא֥וֹת
    גְּבוּלָ֖/ם הַ/יַּרְדֵּ֑ן עָרִ֥ים שֵׁשׁ עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: And the border touched Tabor, Shahazumah, and Beth-shemesh, and the end of
    their border was at the Jordan—sixteen cities with their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reached' or 'met'; the Hebrew verb can denote a boundary line coming
      into contact with a place.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the outgoings of their border were the Jordan,' a boundary formula
      referring to the border's endpoint or extent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָגַע
  chosen: touched
  alternatives:
  - reached
  - met
  - struck upon
  lexicon: HALOT
  rationale: In boundary descriptions, פגע commonly denotes a border coming into contact
    with or meeting a place. 'Touched' is natural English and preserves the spatial
    sense without overinterpreting.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל in allotment texts refers to a territorial boundary line. 'Border'
    is concise and idiomatic in English.
- source_word: בְּתָבוֹר
  chosen: Tabor
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וְשַׁחֲצוּמָה
  chosen: Shahazumah
  alternatives:
  - Shahazimah
  lexicon: HALOT
  rationale: Proper place name; transliterated. Spelling reflects the consonantal
    form and common English convention for this toponym.
- source_word: וּבֵית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - Beth Shemesh
  - House of the Sun
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated, following the
    policy to transliterate names rather than render their lexical meaning.
- source_word: וְהָיוּ תֹּצְאוֹת גְּבוּלָם
  chosen: and the end of their border was
  alternatives:
  - and the outgoings of their border were
  - and the extremities of their border were
  lexicon: HALOT
  rationale: תֹּצְאוֹת literally means 'goings out/outlets/extremities' in boundary
    formulas. Here it refers to the terminal point or extent of the border. 'The end
    of their border was' communicates the sense in readable modern English while preserving
    the geographic function.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the river name. 'The Jordan' is sufficient
    and matches common biblical usage.
- source_word: עָרִים שֵׁשׁ עֶשְׂרֵה
  chosen: sixteen cities
  lexicon: HALOT
  rationale: Straightforward cardinal-number construction modifying 'cities'.
- source_word: וְחַצְרֵיהֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: חָצֵר in lists of towns commonly refers to dependent settlements or unwalled
    villages associated with the named cities. 'Villages' is the clearest idiomatic
    rendering.
