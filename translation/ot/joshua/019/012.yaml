id: JOS.19.12
reference: Joshua 19:12
source:
  edition: WLC
  text: וְ/שָׁ֣ב מִ/שָּׂרִ֗יד קֵ֚דְמָ/ה מִזְרַ֣ח הַ/שֶּׁ֔מֶשׁ עַל גְּב֥וּל כִּסְלֹ֖ת
    תָּבֹ֑ר וְ/יָצָ֥א אֶל הַ/דָּֽבְרַ֖ת וְ/עָלָ֥ה יָפִֽיעַ־־׃
translation:
  text: Then it turned back from Sarid eastward, toward the sunrise, to the border
    of Kisloth-tabor, and went out to Daberath and up to Japhia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eastward, toward the east'; literally, 'eastward, the rising of the
      sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  chosen: Then it turned back
  alternatives:
  - and it returned
  - and it turned
  lexicon: HALOT
  rationale: Qal perfect of שוב in boundary descriptions commonly marks a change in
    direction of the border line. 'Turned back' conveys the directional shift more
    naturally in English than a bare 'returned,' while preserving the geographic sense.
- source_word: מִשָּׂרִיד
  chosen: from Sarid
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy. The preposition
    מן is rendered 'from' to mark the starting point of this segment of the border.
- source_word: קֵדְמָה מִזְרַח הַשֶּׁמֶשׁ
  chosen: eastward, toward the sunrise
  alternatives:
  - eastward, toward the east
  - to the east, toward the rising of the sun
  lexicon: HALOT
  rationale: The combination intensifies the eastern direction. Rendering both elements
    avoids flattening the Hebrew. 'Toward the sunrise' is idiomatic modern English
    for 'toward the rising of the sun' while preserving the imagery.
- source_word: עַל גְּבוּל
  chosen: to the border of
  alternatives:
  - upon the border of
  - along the border of
  lexicon: HALOT
  rationale: In this boundary context, על with גבול indicates movement reaching the
    border region. 'To the border of' is the clearest English expression here.
- source_word: כִּסְלֹת תָּבֹר
  chosen: Kisloth-tabor
  alternatives:
  - Chisloth-tabor
  - Kisloth Tabor
  lexicon: HALOT
  rationale: Place name; transliterated. The hyphen helps signal the conventional
    compound toponym reflected in the Hebrew form.
- source_word: וְיָצָא
  chosen: and went out
  alternatives:
  - and extended
  - and proceeded
  lexicon: HALOT
  rationale: יצא in territorial descriptions often means the border 'goes out' or
    extends to a point. 'Went out' preserves the concrete verbal imagery without overinterpreting.
- source_word: אֶל הַדָּבְרַת
  chosen: to Daberath
  alternatives:
  - to the Daberath
  lexicon: HALOT
  rationale: Proper place name with article in Hebrew, but English idiom normally
    omits the article before transliterated town names.
- source_word: וְעָלָה
  chosen: and up to
  alternatives:
  - and ascended to
  - and went up to
  lexicon: HALOT
  rationale: עלה in topographical descriptions often indicates ascent in elevation.
    'Up to' is concise and natural in English while retaining the geographic nuance.
- source_word: יָפִיעַ
  chosen: Japhia
  alternatives:
  - Yaphia
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
