id: JOS.19.19
reference: Joshua 19:19
source:
  edition: WLC
  text: וַ/חֲפָרַ֥יִם וְ/שִׁיאֹ֖ן וַ/אֲנָחֲרַֽת׃
translation:
  text: Hapharaim, Shion, and Anaharath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew place-name spellings vary in English transliteration; e.g., 'Shiion'
      for 'Shion' and 'Anacharath' for 'Anaharath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲפָרַיִם
  chosen: Hapharaim
  alternatives:
  - Hapharim
  rationale: Proper place name in a boundary/town list; transliterated rather than
    translated per translation philosophy. The dual/plural-looking ending is preserved
    in standard English transliteration as part of the toponym.
- source_word: שִׁיאֹן
  chosen: Shion
  alternatives:
  - Shiion
  rationale: Proper place name; transliterated. English spelling 'Shion' is a streamlined
    rendering of the Hebrew consonants and vowels, while 'Shiion' reflects a more
    expanded transliteration tradition.
- source_word: אֲנָחֲרַת
  chosen: Anaharath
  alternatives:
  - Anacharath
  rationale: Proper place name; transliterated. The medial guttural/fricative may
    be represented in English either with 'h' or 'ch'; 'Anaharath' gives a readable
    modern transliteration without implying a translation of meaning.
- source_word: וַ / וְ
  chosen: and
  rationale: The prefixed conjunctions simply coordinate items in a list of towns.
    In English, commas plus a final 'and' best represent the Hebrew list structure
    in readable modern style.
