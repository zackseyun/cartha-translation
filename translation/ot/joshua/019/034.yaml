id: JOS.19.34
reference: Joshua 19:34
source:
  edition: WLC
  text: וְ/שָׁ֨ב הַ/גְּב֥וּל יָ֨מָּ/ה֙ אַזְנ֣וֹת תָּב֔וֹר וְ/יָצָ֥א מִ/שָּׁ֖ם חוּקֹ֑קָ/ה
    וּ/פָגַ֨ע בִּ/זְבֻל֜וּן מִ/נֶּ֗גֶב וּ/בְ/אָשֵׁר֙ פָּגַ֣ע מִ/יָּ֔ם וּ/בִ֣/יהוּדָ֔ה
    הַ/יַּרְדֵּ֖ן מִזְרַ֥ח הַ/שָּֽׁמֶשׁ׃
translation:
  text: Then the border turned westward to Aznoth-tabor, and from there it went out
    to Hukkok, and it reached Zebulun on the south, and it reached Asher on the west,
    and Judah at the Jordan toward the east, where the sun rises.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and Judah at the Jordan toward the east.' The geography is difficult,
      since Naphtali did not directly border the tribal territory of Judah in the
      usual sense. Some understand the wording differently or suspect textual difficulty,
      but the Hebrew text is translated as it stands.
    reason: textual_variant
lexical_decisions:
- source_word: וְשָׁב
  chosen: Then ... turned
  alternatives:
  - and turned
  - returned
  lexicon: HALOT
  rationale: In boundary descriptions שוב commonly means the border changes direction
    rather than 'returns' in a full sense. 'Then ... turned' gives natural English
    while preserving the sequential narrative force of waw-consecutive.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל in allotment texts refers to the territorial boundary line. 'Border'
    is concise and idiomatic in English.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - seaward
  lexicon: HALOT
  rationale: Literally the term is 'sea-ward,' using the Mediterranean as the western
    reference point. In English geographic description here, 'westward' best communicates
    the sense.
- source_word: אַזְנוֹת תָּבוֹר
  chosen: Aznoth-tabor
  alternatives:
  - Aznoth Tabor
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    following the translation philosophy for names.
- source_word: וְיָצָא מִשָּׁם
  chosen: and from there it went out
  alternatives:
  - and from there it extended
  - and from there it went
  lexicon: HALOT
  rationale: יצא in border formulas often means the line proceeds onward from a point.
    'Went out' is slightly formal but reflects the Hebrew formula without over-paraphrase.
- source_word: חוּקֹקָה
  chosen: Hukkok
  alternatives:
  - Huqoq
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention. 'Hukkok' is
    a defensible conventional form.
- source_word: וּפָגַע
  chosen: it reached
  alternatives:
  - it touched
  - it met
  - it bordered on
  lexicon: HALOT
  rationale: פגע in territorial descriptions means the border comes into contact with
    another territory or landmark. 'Reached' is natural and sufficiently precise.
- source_word: בִּזְבֻלוּן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Tribal name transliterated as a proper name.
- source_word: מִנֶּגֶב
  chosen: on the south
  alternatives:
  - from the south
  - to the south
  lexicon: HALOT
  rationale: The preposition מן with נגב in boundary descriptions can indicate the
    southern side/aspect. 'On the south' communicates that Zebulun lay at the southern
    side of this border contact.
- source_word: וּבְאָשֵׁר פָּגַע מִיָּם
  chosen: and it reached Asher on the west
  alternatives:
  - and it reached Asher toward the sea
  - and it touched Asher on the west side
  lexicon: HALOT
  rationale: מִיָּם is literally 'from the sea,' but in this directional context it
    denotes the western side. Rendering it 'on the west' makes the geography clear
    in modern English.
- source_word: וּבִיהוּדָה
  chosen: and Judah
  alternatives:
  - and to Judah
  lexicon: HALOT
  rationale: The Hebrew straightforwardly names Judah as another point of contact.
    The phrase is notoriously difficult geographically, but the translation should
    preserve the wording rather than emend it in the main text.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the river name; 'River' is not required
    in context.
- source_word: מִזְרַח הַשָּׁמֶשׁ
  chosen: toward the east, where the sun rises
  alternatives:
  - eastward
  - toward the sunrise
  lexicon: HALOT
  rationale: Literally 'toward the rising of the sun.' The chosen rendering preserves
    the Hebrew imagery while remaining readable.
