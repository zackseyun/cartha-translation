theological_decisions:
- issue: Geographically difficult phrase 'and Judah at the Jordan toward the east'
  chosen_reading: Retain the Masoretic wording in the main text without harmonizing
    or emending.
  alternative_readings:
  - Some interpret 'Judah' as a scribal corruption or as referring indirectly to settlements
    east of the Jordan.
  - Some translations smooth the line to avoid implying Naphtali bordered Judah directly.
  rationale: This is not a doctrinal issue but a significant interpretive/text-critical
    one. Optimal equivalence here favors preserving the received Hebrew wording in
    translation and noting the difficulty, rather than silently resolving the geography
    by conjecture.
  doctrine_reference: Translation philosophy §1, §3, §5
