id: JOS.19.24
reference: Joshua 19:24
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ הַ/גּוֹרָ֣ל הַֽ/חֲמִישִׁ֔י לְ/מַטֵּ֥ה בְנֵֽי אָשֵׁ֖ר לְ/מִשְׁפְּחוֹתָֽ/ם־׃
translation:
  text: The fifth lot came out for the tribe of the sons of Asher, according to their
    clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The fifth lot was drawn for the tribe of the sons of Asher, according
      to their families.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - was drawn
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' In the context of casting
    lots for tribal allotments, 'came out' is a natural English rendering that preserves
    the imagery without over-interpreting the mechanism. 'Was drawn' is possible contextually
    but is more interpretive than the Hebrew wording itself.
- source_word: הַגּוֹרָל
  chosen: lot
  alternatives:
  - allotment
  lexicon: HALOT
  rationale: גורל refers to the lot cast or the result determined by lot. 'Lot' best
    preserves the immediate sense in this distribution formula. 'Allotment' reflects
    the outcome rather than the object/process and is therefore secondary here.
- source_word: הַחֲמִישִׁי
  chosen: fifth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'lot'.
- source_word: לְמַטֵּה
  chosen: for the tribe of
  alternatives:
  - for the staff of
  - for the branch of
  lexicon: HALOT
  rationale: מַטֶּה can literally mean 'staff/rod,' but in tribal-allotment contexts
    it idiomatically denotes a 'tribe.' Rendering it as 'tribe' communicates the established
    referent in clear English.
- source_word: בְנֵי אָשֵׁר
  chosen: the sons of Asher
  alternatives:
  - the children of Asher
  - the descendants of Asher
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'sons of Asher.' Because this is a
    tribal designation, 'sons of Asher' preserves the formal genealogical language.
    It is paired with 'tribe of' so the phrase remains natural in English while staying
    close to the source.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת refers to clan-level family groupings within the tribe.
    'According to their clans' reflects the distributive force of לְ and fits the
    recurring allotment formula better than the broader 'families.'
