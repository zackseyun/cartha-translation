id: JOS.19.27
reference: Joshua 19:27
source:
  edition: WLC
  text: וְ/שָׁ֨ב מִזְרַ֣ח הַ/שֶּׁמֶשׁ֮ בֵּ֣ית דָּגֹן֒ וּ/פָגַ֣ע בִּ֠/זְבֻלוּן וּ/בְ/גֵ֨י
    יִפְתַּח אֵ֥ל צָפ֛וֹנָ/ה בֵּ֥ית הָעֵ֖מֶק וּ/נְעִיאֵ֑ל וְ/יָצָ֥א אֶל כָּב֖וּל מִ/שְּׂמֹֽאל־־׃
translation:
  text: Then it turned eastward, toward the sunrise, to Beth-dagon, and reached to
    Zebulun and to the Valley of Iphtah-el northward, to Beth-emek and Neiel; then
    it went out to Cabul on the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the left'; in boundary descriptions this may denote the north
      side, depending on orientation.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁב
  chosen: Then it turned
  alternatives:
  - and it turned
  - and it returned
  lexicon: HALOT
  rationale: In boundary descriptions שוב commonly means the border changes direction
    rather than 'returns' in a narrative sense. 'Then it turned' gives natural English
    while preserving the directional sense.
- source_word: מִזְרַח הַשֶּׁמֶשׁ
  chosen: eastward, toward the sunrise
  alternatives:
  - to the east
  - eastward
  lexicon: HALOT
  rationale: Literally 'toward the rising of the sun.' Because this is a geographic
    boundary text, 'eastward' is the core sense; 'toward the sunrise' preserves the
    Hebrew idiom's imagery without becoming wooden.
- source_word: בֵּית דָּגֹן
  chosen: Beth-dagon
  alternatives:
  - Beth Dagon
  rationale: Place name is transliterated per project philosophy to transliterate
    names rather than translate them.
- source_word: וּפָגַע
  chosen: reached to
  alternatives:
  - met
  - touched
  - struck against
  - bordered on
  lexicon: HALOT
  rationale: In territorial descriptions פגע often denotes a boundary coming into
    contact with another border or region. 'Reached to' is idiomatic and geographically
    clear.
- source_word: בִּזְבֻלוּן
  chosen: to Zebulun
  alternatives:
  - with Zebulun
  - at Zebulun
  lexicon: HALOT
  rationale: The preposition with פגע marks contact with the territory of Zebulun.
    'To Zebulun' is concise English for the boundary's extent.
- source_word: וּבְגֵי יִפְתַּח אֵל
  chosen: and to the Valley of Iphtah-el
  alternatives:
  - and in the valley of Iphtah-el
  - and to the valley of Jiphthah-el
  lexicon: HALOT
  rationale: גֵי is 'valley.' The proper name is best transliterated. 'To the Valley
    of Iphtah-el' fits the sequence of boundary markers.
- source_word: צָפוֹנָה
  chosen: northward
  alternatives:
  - to the north
  - north
  lexicon: HALOT
  rationale: Directional adverb indicating the northern side or direction of the boundary
    movement. 'Northward' preserves the adverbial force.
- source_word: בֵּית הָעֵמֶק
  chosen: Beth-emek
  alternatives:
  - Beth Emek
  rationale: Proper place name; transliterated rather than translated ('house of the
    valley') in keeping with the project's handling of names.
- source_word: וּנְעִיאֵל
  chosen: and Neiel
  alternatives:
  - and Nei-el
  rationale: Proper place name, transliterated.
- source_word: וְיָצָא
  chosen: then it went out
  alternatives:
  - and it went out
  - and it extended
  lexicon: HALOT
  rationale: In boundary formulas יצא describes the line extending onward/outward
    to another point. 'Then it went out' is a standard, transparent rendering.
- source_word: אֶל כָּבוּל
  chosen: to Cabul
  alternatives:
  - to Kabul
  rationale: Proper place name transliterated. 'Cabul' reflects conventional English
    biblical spelling and avoids confusion with the modern city Kabul.
- source_word: מִשְּׂמֹאל
  chosen: on the left
  alternatives:
  - on the north side
  - to the left side
  lexicon: HALOT
  rationale: Literally 'from the left.' In Hebrew geographic orientation, 'left' can
    imply north when facing east, but the text itself says 'left.' Main text preserves
    the concrete term; a footnote can note the geographic implication.
