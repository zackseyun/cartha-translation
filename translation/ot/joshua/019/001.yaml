id: JOS.19.1
reference: Joshua 19:1
source:
  edition: WLC
  text: וַ/יֵּצֵ֞א הַ/גּוֹרָ֤ל הַ/שֵּׁנִי֙ לְ/שִׁמְע֔וֹן לְ/מַטֵּ֥ה בְנֵֽי שִׁמְע֖וֹן
    לְ/מִשְׁפְּחוֹתָ֑/ם וַֽ/יְהִי֙ נַֽחֲלָתָ֔/ם בְּ/ת֖וֹךְ נַחֲלַ֥ת בְּנֵֽי יְהוּדָֽה־־׃
translation:
  text: The second lot came out for Simeon, for the tribe of the sons of Simeon according
    to their clans, and their inheritance was within the inheritance of the sons of
    Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The second lot fell to Simeon.' The Hebrew verb is literally 'came out,'
      used here for the result of casting lots.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Simeon'' and ''sons of Judah'' are Hebrew tribal designations;
      they refer to the descendants or members of those tribes.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - fell
  lexicon: HALOT
  rationale: The verb יצא literally means 'go/come out.' In the context of casting
    lots, English idiom can use 'fell,' but 'came out' preserves the Hebrew imagery
    more transparently while remaining natural.
- source_word: הַגּוֹרָל
  chosen: lot
  alternatives:
  - allotment
  lexicon: HALOT
  rationale: Refers to the lot cast for territorial distribution, not yet the inheritance
    itself. 'Lot' best matches the immediate procedure.
- source_word: הַשֵּׁנִי
  chosen: second
  lexicon: HALOT
  rationale: Simple ordinal modifying 'lot.'
- source_word: לְשִׁמְעוֹן
  chosen: for Simeon
  alternatives:
  - to Simeon
  lexicon: HALOT
  rationale: The preposition ל marks the recipient/beneficiary of the lot. 'For Simeon'
    is idiomatic in English for allotment language.
- source_word: לְמַטֵּה
  chosen: for the tribe of
  alternatives:
  - for the staff of
  - for the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts means 'tribe.' Rendering the prefixed
    ל together with the noun as 'for the tribe of' gives clear English and reflects
    the construction.
- source_word: בְנֵי שִׁמְעוֹן
  chosen: the sons of Simeon
  alternatives:
  - the people of Simeon
  - the descendants of Simeon
  lexicon: HALOT
  rationale: A standard genealogical/tribal expression. 'Sons of Simeon' preserves
    the Hebrew familial idiom; it also aligns with the project's gender-accurate policy.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal census/allotment contexts is more specific than
    modern nuclear 'families'; 'clans' better conveys the social unit.
- source_word: וַיְהִי
  chosen: and ... was
  alternatives:
  - and it came to be
  - and it happened that
  lexicon: HALOT
  rationale: Here היה functions as a simple copular/resultative link introducing the
    state of their inheritance. English compresses this naturally to 'and ... was.'
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  - their possession
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly denotes inherited territorial allotment. 'Inheritance'
    preserves both legal and covenantal resonance.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - inside
  lexicon: HALOT
  rationale: Conveys enclosure/location inside Judah's territory. 'Within' is concise
    and natural.
- source_word: נַחֲלַת בְּנֵי יְהוּדָה
  chosen: the inheritance of the sons of Judah
  alternatives:
  - the territory of the sons of Judah
  - the inheritance of the people of Judah
  lexicon: HALOT
  rationale: Keeps the same key term נַחֲלָה consistently as 'inheritance' and preserves
    the familial idiom 'sons of Judah' rather than flattening it to 'people.'
