id: JOS.19.4
reference: Joshua 19:4
source:
  edition: WLC
  text: וְ/אֶלְתּוֹלַ֥ד וּ/בְת֖וּל וְ/חָרְמָֽה׃
translation:
  text: Eltolad, Bethul, and Hormah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֶלְתּוֹלַד
  chosen: Eltolad
  alternatives:
  - Eltolad
  rationale: Proper place name in a town list. Following the translation philosophy,
    names are transliterated rather than translated. Standard English convention preserves
    the form 'Eltolad.'
- source_word: בְתוּל
  chosen: Bethul
  alternatives:
  - Betul
  rationale: Proper place name. Transliterated into standard English form 'Bethul.'
    The initial beth is represented with 'B,' and no attempt is made to translate
    or paraphrase the name.
- source_word: חָרְמָה
  chosen: Hormah
  alternatives:
  - Chormah
  rationale: Proper place name. Standard English biblical convention renders the initial
    ח with 'H' in this name, yielding 'Hormah.' This is a transliteration choice,
    not a semantic translation of the underlying root.
- source_word: וְ / וּ
  chosen: and
  rationale: The prefixed conjunction on each item links the place names in a simple
    coordinate list. In English, natural style is to render the list with commas and
    a final 'and' before the last item.
