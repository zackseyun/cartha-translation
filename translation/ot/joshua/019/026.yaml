id: JOS.19.26
reference: Joshua 19:26
source:
  edition: WLC
  text: וְ/אַֽלַמֶּ֥לֶךְ וְ/עַמְעָ֖ד וּ/מִשְׁאָ֑ל וּ/פָגַ֤ע בְּ/כַרְמֶל֙ הַ/יָּ֔מָּ/ה
    וּ/בְ/שִׁיח֖וֹר לִבְנָֽת׃
translation:
  text: and Allammelech, Amad, and Mishal; and it reached to Carmel, westward, and
    to Shihor-libnath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the sea-ward'; in geographical context this means 'westward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלַּמֶּלֶךְ
  chosen: Allammelech
  alternatives:
  - Alammelech
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. Spelling reflects a straightforward English transliteration of the
    Hebrew form.
- source_word: עַמְעָד
  chosen: Amad
  alternatives:
  - Am'amad
  lexicon: HALOT
  rationale: Proper place name; transliterated. The simpler form 'Amad' is standard
    and readable in English.
- source_word: מִשְׁאָל
  chosen: Mishal
  alternatives:
  - Misheal
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention.
- source_word: וּפָגַע
  chosen: and it reached
  alternatives:
  - and it touched
  - and it met
  - and it struck upon
  lexicon: HALOT
  rationale: The verb פגע in boundary descriptions commonly means to reach, meet,
    or touch a landmark/border point. 'It reached' is idiomatic in English for territorial
    boundary language and preserves the sense without over-literal awkwardness.
- source_word: בְּכַרְמֶל
  chosen: to Carmel
  alternatives:
  - at Carmel
  - against Carmel
  lexicon: HALOT
  rationale: With פגע in a border list, the preposition marks the point reached by
    the boundary. English 'to Carmel' best conveys the directional boundary sense.
- source_word: הַיָּמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - to the west
  lexicon: HALOT
  rationale: Literally related to 'sea,' but in Hebrew geographical usage it often
    denotes the west/westward direction because of the Mediterranean Sea. 'Westward'
    is concise and natural in an English boundary description.
- source_word: וּבְשִׁיחוֹר לִבְנָת
  chosen: and to Shihor-libnath
  alternatives:
  - and at Shihor-libnath
  lexicon: HALOT
  rationale: Toponym, likely a compound place name, so transliterated and hyphenated
    for clarity. 'To' continues the boundary-description sense established by the
    verb.
