id: JOS.19.41
reference: Joshua 19:41
source:
  edition: WLC
  text: וַ/יְהִ֖י גְּב֣וּל נַחֲלָתָ֑/ם צָרְעָ֥ה וְ/אֶשְׁתָּא֖וֹל וְ/עִ֥יר שָֽׁמֶשׁ׃
translation:
  text: And the border of their inheritance was Zorah, Eshtaol, and Ir-shemesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ir-shemesh means 'city of the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - And it came to be
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the clause in narrative style.
    In English, a simple copular rendering is most natural; 'And' preserves the connective
    force without the wooden 'it came to be.'
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - territory
  - boundary
  lexicon: HALOT
  rationale: In allotment contexts, גְּבוּל commonly denotes the boundary or border
    of a tribal inheritance. 'Border' is concise and fits the list of place names
    that follows.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  - their possession
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua refers to inherited tribal allotment. 'Their inheritance'
    preserves the covenantal-land nuance better than the flatter 'possession.' The
    3mp suffix refers to the tribe previously identified (Dan).
- source_word: צָרְעָה
  chosen: Zorah
  rationale: Standard English transliteration of the place name צָרְעָה.
- source_word: אֶשְׁתָּאוֹל
  chosen: Eshtaol
  rationale: Standard English transliteration of the place name אֶשְׁתָּאוֹל.
- source_word: עִיר שָׁמֶשׁ
  chosen: Ir-shemesh
  alternatives:
  - City of the Sun
  lexicon: HALOT
  rationale: This is a place name composed of 'city' + 'sun.' Per translation philosophy,
    personal and place names are transliterated rather than translated in the main
    text. The transparent meaning is worth preserving in a footnote.
