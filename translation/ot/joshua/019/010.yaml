id: JOS.19.10
reference: Joshua 19:10
source:
  edition: WLC
  text: וַ/יַּ֨עַל֙ הַ/גּוֹרָ֣ל הַ/שְּׁלִישִׁ֔י לִ/בְנֵ֥י זְבוּלֻ֖ן לְ/מִשְׁפְּחֹתָ֑/ם
    וַ/יְהִ֛י גְּב֥וּל נַחֲלָתָ֖/ם עַד שָׂרִֽיד־׃
translation:
  text: The third lot came up for the sons of Zebulun, according to their clans, and
    the border of their inheritance was as far as Sarid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was drawn' for 'came up'; the Hebrew literally says 'went up/came up'
      of the lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: came up
  alternatives:
  - was drawn
  - ascended
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/come up.' In the context of casting
    lots, English idiom can be 'came up' or 'was drawn.' 'Came up' preserves the imagery
    of the Hebrew while remaining natural.
- source_word: הַגּוֹרָל
  chosen: lot
  alternatives:
  - allotment
  lexicon: HALOT
  rationale: Refers to the lot cast to determine tribal inheritance. 'Lot' is the
    standard and most precise rendering in this distribution context.
- source_word: הַשְּׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'lot.'
- source_word: לִבְנֵי זְבוּלֻן
  chosen: for the sons of Zebulun
  alternatives:
  - for the people of Zebulun
  - for the descendants of Zebulun
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Per gender-accurate philosophy, the familial/tribal
    expression is retained rather than flattened to 'people,' while still functioning
    idiomatically for the tribe.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: משפחה in tribal-allotment contexts denotes clan-level subdivisions within
    the tribe. 'According to their clans' best reflects the distributive force of
    ל and the social structure intended.
- source_word: וַיְהִי
  chosen: and ... was
  alternatives:
  - and it came to be
  - and there was
  lexicon: HALOT
  rationale: A common narrative verb introducing the next clause. In English it is
    best absorbed into a natural clause rather than rendered woodenly.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In land descriptions, גבול refers to the boundary line or border. 'Border'
    is concise and natural; 'territory' would overstate the term.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  - their possession
  lexicon: HALOT
  rationale: נחלה in Joshua commonly denotes inherited allotted land. 'Inheritance'
    preserves the covenantal-allotment nuance better than merely 'possession.'
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - until
  lexicon: HALOT
  rationale: In boundary formulas, עד marks the extent of the border. 'As far as'
    is idiomatic in English geographical description.
- source_word: שָׂרִיד
  chosen: Sarid
  lexicon: HALOT
  rationale: Place name; per philosophy, names are transliterated rather than translated.
