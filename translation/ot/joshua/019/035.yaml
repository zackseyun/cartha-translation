id: JOS.19.35
reference: Joshua 19:35
source:
  edition: WLC
  text: וְ/עָרֵ֖י מִבְצָ֑ר הַ/צִּדִּ֣ים צֵ֔ר וְ/חַמַּ֖ת רַקַּ֥ת וְ/כִנָּֽרֶת׃
translation:
  text: And the fortified cities were Ziddim, Zer, Hammath, Rakkath, and Kinnereth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress cities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עָרֵי
  chosen: And the ... cities
  alternatives:
  - Now the ... cities
  - and cities of
  lexicon: HALOT
  rationale: וְ introduces continuation in a list, naturally rendered 'And.' עָרֵי
    is the construct plural of 'cities of,' which in English is best completed with
    the following noun as 'the ... cities.' The article is supplied idiomatically
    in English because the phrase refers to a defined subset within the territorial
    list.
- source_word: מִבְצָר
  chosen: fortified
  alternatives:
  - fortress
  - fortification
  - stronghold
  lexicon: HALOT
  rationale: 'In construct with עָרֵי, מִבְצָר functions adjectivally: ''fortified
    cities'' or ''fortress cities.'' ''Fortified cities'' is the most natural modern
    English rendering and preserves the military sense without awkwardness.'
- source_word: הַ/צִּדִּים
  chosen: Ziddim
  alternatives:
  - the Ziddim
  - Ziddimim
  lexicon: HALOT
  rationale: This is a place name with prefixed article in Hebrew. Following the translation
    philosophy, names are transliterated rather than translated. The article is not
    normally carried over into English for town names in a list, so 'Ziddim' is preferred.
- source_word: צֵר
  chosen: Zer
  alternatives:
  - Zer/Zeir
  lexicon: HALOT
  rationale: Rendered as a straightforward transliteration of the place name. 'Zer'
    reflects the consonantal form and standard English convention for this toponym.
- source_word: וְ/חַמַּת
  chosen: and Hammath
  alternatives:
  - and Hamath
  lexicon: HALOT
  rationale: Proper name transliterated. 'Hammath' preserves the doubled consonant
    indicated in the Hebrew form and distinguishes this town from the more familiar
    Hamath elsewhere.
- source_word: רַקַּת
  chosen: Rakkath
  alternatives:
  - Rakkat
  lexicon: HALOT
  rationale: Proper name transliterated. 'Rakkath' is a conventional English form
    that reflects the geminated middle consonant and final tav.
- source_word: וְ/כִנָּֽרֶת
  chosen: and Kinnereth
  alternatives:
  - and Chinnereth
  - and Kinneret
  lexicon: HALOT
  rationale: Proper name transliterated. 'Kinnereth' is a familiar and accurate English
    form for the town name, preserving continuity with related biblical usage while
    remaining readable.
