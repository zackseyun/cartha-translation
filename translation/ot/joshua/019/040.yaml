id: JOS.19.40
reference: Joshua 19:40
source:
  edition: WLC
  text: לְ/מַטֵּ֥ה בְנֵי דָ֖ן לְ/מִשְׁפְּחֹתָ֑/ם יָצָ֖א הַ/גּוֹרָ֥ל הַ/שְּׁבִיעִֽי־׃
translation:
  text: For the tribe of the sons of Dan, according to their clans, the seventh lot
    came out.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְמַטֵּה
  chosen: for the tribe of
  alternatives:
  - to the tribe of
  - for the staff/tribe of
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes 'tribe' in allotment contexts in Joshua, not
    the literal 'staff.' The prefixed ל is rendered idiomatically as 'for' in English
    to mark assignment/allotment.
- source_word: בְנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the children of Dan
  - Danites
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew kinship expression.
    'Danites' is possible but less directly reflects the source wording here.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal-land texts refers to clan/family subdivisions
    within a tribe. 'Clans' best fits the social structure in this context and avoids
    overly domestic connotations of modern 'families.'
- source_word: יָצָא
  chosen: came out
  alternatives:
  - went out
  - fell
  lexicon: HALOT
  rationale: The verb literally means 'went/came out.' In the context of casting lots,
    English often uses 'fell,' but 'came out' more closely follows the Hebrew while
    remaining natural.
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the allotted lot
  - the portion by lot
  lexicon: HALOT
  rationale: גוֹרָל is the standard term for 'lot' in land-allotment passages. The
    simple rendering is sufficient and idiomatic.
- source_word: הַשְּׁבִיעִי
  chosen: the seventh
  lexicon: HALOT
  rationale: Straightforward ordinal modifying 'lot,' indicating sequence in the allotment
    process.
