id: JOS.19.5
reference: Joshua 19:5
source:
  edition: WLC
  text: וְ/צִֽקְלַ֥ג וּ/בֵית הַמַּרְכָּב֖וֹת וַ/חֲצַ֥ר סוּסָֽה־׃
translation:
  text: and Ziklag, Beth-marcaboth, and Hazar-susah;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-marcaboth likely means 'house of chariots.'
    reason: lexical_alternative
  - marker: b
    text: Hazar-susah likely means 'settlement of horses' or 'enclosure of horses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִקְלַג
  chosen: Ziklag
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention rather
    than translated, in keeping with the philosophy to transliterate names.
- source_word: בֵית הַמַּרְכָּבוֹת
  chosen: Beth-marcaboth
  alternatives:
  - Beth-marchaboth
  - house of chariots
  lexicon: HALOT
  rationale: This is a compound place name built on 'house' + 'the chariots.' Because
    the verse is a boundary/town list, transliteration of the toponym is preferred
    in the main text. A more transparent gloss ('house of chariots') is possible but
    would treat the name as a description rather than a settled place name.
- source_word: חֲצַר סוּסָה
  chosen: Hazar-susah
  alternatives:
  - Hazar-susim
  - village/enclosure of horses
  - horse-settlement
  lexicon: HALOT
  rationale: Another compound place name. חצר commonly denotes a settlement, village,
    or enclosure, and סוסה is related to 'horse.' In a town list, preserving the toponym
    by transliteration is the most natural main-text choice. The semantic gloss is
    worth preserving as a lexical alternative in a footnote.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: Standard conjunction linking items in the list; rendered straightforwardly
    as 'and.'
