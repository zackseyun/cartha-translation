id: JOS.19.37
reference: Joshua 19:37
source:
  edition: WLC
  text: וְ/קֶ֥דֶשׁ וְ/אֶדְרֶ֖עִי וְ/עֵ֥ין חָצֽוֹר׃
translation:
  text: and Kedesh, and Edrei, and En-hazor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ain Hazor'; the name may also be understood etymologically as 'Spring
      of Hazor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶדֶשׁ
  chosen: Kedesh
  alternatives:
  - Qedesh
  lexicon: HALOT
  rationale: Proper place name in a boundary/town list; per translation philosophy,
    names are transliterated rather than translated. 'Kedesh' follows standard English
    convention.
- source_word: אֶדְרֶעִי
  chosen: Edrei
  alternatives:
  - Edre'i
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention. The
    form with apostrophe more closely marks the Hebrew, but 'Edrei' is the established
    readable English form.
- source_word: עֵין חָצוֹר
  chosen: En-hazor
  alternatives:
  - Ain Hazor
  - Spring of Hazor
  lexicon: HALOT
  rationale: This is a compound place name. Although עֵין can mean 'spring,' in toponyms
    it is commonly preserved by transliteration as 'En-/Ain-'. Because the verse is
    a list of town names, transliteration best preserves the onomastic function without
    overtranslating.
- source_word: וְ
  chosen: and
  rationale: The repeated conjunction links each place in the list. Rendering each
    with 'and' reflects the Hebrew coordination pattern in a straightforward way.
