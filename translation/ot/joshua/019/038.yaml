id: JOS.19.38
reference: Joshua 19:38
source:
  edition: WLC
  text: וְ/יִרְאוֹן֙ וּ/מִגְדַּל אֵ֔ל חֳרֵ֥ם וּ/בֵית עֲנָ֖ת וּ/בֵ֣ית שָׁ֑מֶשׁ עָרִ֥ים
    תְּשַֽׁע עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־־־׃
translation:
  text: 'and Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh: nineteen cities,
    with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Migdal-el is a place name; literally, the components could mean 'tower of
      God/El.'
    reason: lexical_alternative
  - marker: b
    text: Beth-anath and Beth-shemesh are transliterated place names; literally, 'house
      of Anath' and 'house of the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יִרְאוֹן
  chosen: and Yiron
  alternatives:
  - and Irion
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per translation
    philosophy. The prefixed conjunction ו is rendered 'and.' English spelling 'Yiron'
    follows a straightforward transliteration of יראון.
- source_word: וּ/מִגְדַּל אֵל
  chosen: Migdal-el
  alternatives:
  - Migdal-el
  - tower of God/El
  lexicon: HALOT
  rationale: This is a compound place name. Because personal and place names are transliterated
    by policy, the name is kept as 'Migdal-el' rather than translated literally as
    'tower of God/El.' Hyphenation preserves the compound form.
- source_word: חֳרֵם
  chosen: Horem
  lexicon: HALOT
  rationale: Proper place name; transliterated directly.
- source_word: וּ/בֵית עֲנָת
  chosen: and Beth-anath
  alternatives:
  - and Beth Anath
  - and house of Anath
  lexicon: HALOT
  rationale: Compound place name with prefixed conjunction. Transliteration is preferred
    for toponyms; the literal sense 'house of Anath' is not used in the main text
    because this is a settled place name.
- source_word: וּ/בֵית שָׁמֶשׁ
  chosen: and Beth-shemesh
  alternatives:
  - and Beth Shemesh
  - and house of the sun
  lexicon: HALOT
  rationale: Compound place name; transliterated as a toponym rather than translated
    literally. The conjunction is rendered 'and.'
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Standard rendering for עָרִים in territorial lists. 'Cities' is conventional
    and suitable even for settlements that may not match modern expectations of city
    size.
- source_word: תְּשַׁע עֶשְׂרֵה
  chosen: nineteen
  alternatives:
  - nineteen in number
  lexicon: HALOT
  rationale: The Hebrew numeral phrase is rendered idiomatically in English as 'nineteen.'
- source_word: וְ/חַצְרֵי/הֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: In land-allotment formulas, חָצֵר commonly refers to dependent villages
    or unwalled settlements associated with the named cities. 'With their villages'
    is the most natural and established English rendering here.
