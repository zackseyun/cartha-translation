id: JOS.19.11
reference: Joshua 19:11
source:
  edition: WLC
  text: וְ/עָלָ֨ה גְבוּלָ֧/ם לַ/יָּ֛מָּ/ה וּ/מַרְעֲלָ֖ה וּ/פָגַ֣ע בְּ/דַבָּ֑שֶׁת וּ/פָגַע֙
    אֶל הַ/נַּ֔חַל אֲשֶׁ֖ר עַל פְּנֵ֥י יָקְנְעָֽם׀־־׃
translation:
  text: And their border went up westward to Maralah, and touched Dabbesheth, and
    touched the wadi that is opposite Jokneam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sea-ward,' a standard idiom for 'westward.'
    reason: lexical_alternative
  - marker: b
    text: Or 'brook' or 'stream'; the Hebrew term often refers to a wadi or seasonal
      watercourse.
    reason: lexical_alternative
  - marker: c
    text: Or 'that faces Jokneam' or 'that is before Jokneam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  chosen: went up
  alternatives:
  - ascended
  - extended upward
  lexicon: HALOT
  rationale: In boundary descriptions עלה commonly describes the line proceeding upward
    or onward in elevation/direction. 'Went up' preserves the concrete movement idiom
    without over-paraphrasing.
- source_word: גְבוּלָם
  chosen: their border
  alternatives:
  - its border
  - boundary of them
  lexicon: HALOT
  rationale: The suffix is plural, referring back to the tribal allotment/descendants
    previously described. 'Their border' is natural English and reflects the Hebrew
    pronominal suffix.
- source_word: לַיָּמָּה
  chosen: westward
  alternatives:
  - to the west
  - toward the sea
  lexicon: HALOT
  rationale: Hebrew uses 'sea-ward' idiomatically for west. 'Westward' communicates
    the directional sense clearly in modern English. 'Toward the sea' would be more
    formally literal but less idiomatic here.
- source_word: מַרְעֲלָה
  chosen: Maralah
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy names are transliterated
    rather than translated.
- source_word: וּפָגַע
  chosen: touched
  alternatives:
  - reached
  - met
  - struck against
  lexicon: HALOT
  rationale: In territorial descriptions פגע commonly means the border came into contact
    with or reached a location. 'Touched' is concise and suitably literal.
- source_word: בְּדַבָּשֶׁת
  chosen: Dabbesheth
  lexicon: HALOT
  rationale: Place name; transliterated according to standard convention.
- source_word: אֶל הַנַּחַל
  chosen: the wadi
  alternatives:
  - the brook
  - the stream
  - the valley
  lexicon: HALOT
  rationale: נחל can denote a seasonal watercourse or wadi. In a land-boundary context,
    'wadi' is geographically precise and avoids implying a perennial stream. The preposition
    is absorbed idiomatically after repeated 'touched' in English.
- source_word: אֲשֶׁר עַל־פְּנֵי יָקְנְעָם
  chosen: that is opposite Jokneam
  alternatives:
  - that is before Jokneam
  - that faces Jokneam
  - that is near Jokneam
  lexicon: HALOT
  rationale: The expression על־פני often means 'in front of/opposite/facing.' 'Opposite
    Jokneam' best fits a topographical notice in a boundary list.
- source_word: יָקְנְעָם
  chosen: Jokneam
  alternatives:
  - Jokneam
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
