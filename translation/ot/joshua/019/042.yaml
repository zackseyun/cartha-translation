id: JOS.19.42
reference: Joshua 19:42
source:
  edition: WLC
  text: וְ/שַֽׁעֲלַבִּ֥ין וְ/אַיָּל֖וֹן וְ/יִתְלָֽה׃
translation:
  text: and Shaalabbin, and Aijalon, and Ithlah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shaalabbin is spelled 'Shaalbim' or 'Shaalabim' in some English traditions
      and related passages.
    reason: lexical_alternative
  - marker: b
    text: Aijalon may also be spelled 'Ayalon.'
    reason: lexical_alternative
  - marker: c
    text: Ithlah is traditionally rendered 'Jethlah' in some English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction on each toponym is rendered with repeated 'and,'
    matching the Hebrew list structure and preserving the cadence of the territorial-town
    catalog.
- source_word: שַׁעֲלַבִּין
  chosen: Shaalabbin
  alternatives:
  - Shaalbim
  - Shaalabim
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred per translation philosophy.
    'Shaalabbin' closely reflects the consonantal form in this verse. Alternative
    English spellings reflect related biblical forms and transliteration conventions.
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  lexicon: HALOT
  rationale: A place name rendered by standard English transliteration. 'Aijalon'
    is a familiar conventional spelling in English Bibles, while 'Ayalon' is a more
    directly phonetic alternative.
- source_word: יִתְלָה
  chosen: Ithlah
  alternatives:
  - Jethlah
  lexicon: HALOT
  rationale: A place name transliterated directly from the Hebrew. 'Ithlah' reflects
    the consonants well; 'Jethlah' is a traditional variant influenced by older English
    transliteration practices.
