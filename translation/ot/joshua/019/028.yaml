id: JOS.19.28
reference: Joshua 19:28
source:
  edition: WLC
  text: וְ/עֶבְרֹ֥ן וּ/רְחֹ֖ב וְ/חַמּ֣וֹן וְ/קָנָ֑ה עַ֖ד צִיד֥וֹן רַבָּֽה׃
translation:
  text: Ebron, Rehob, Hammon, and Kanah, as far as Great Sidon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Ebron''; some textual traditions and translations read ''Abdon.'''
    reason: textual_variant
lexical_decisions:
- source_word: עֶבְרֹן
  chosen: Ebron
  alternatives:
  - Abdon
  lexicon: HALOT
  rationale: Rendered as a transliterated place name in keeping with the philosophy
    of transliterating names. The consonantal form here supports Ebron; some traditions
    and versions reflect a different place-name identification such as Abdon, but
    the MT form is best represented directly in the main text.
- source_word: רְחֹב
  chosen: Rehob
  alternatives:
  - Rechob
  lexicon: HALOT
  rationale: Transliterated as a place name. 'Rehob' is a standard English representation
    of the Hebrew proper noun.
- source_word: חַמּוֹן
  chosen: Hammon
  alternatives:
  - Hammon
  lexicon: HALOT
  rationale: Transliterated place name. English spelling with single initial H and
    doubled m reflects the Hebrew adequately.
- source_word: קָנָה
  chosen: Kanah
  alternatives:
  - Qanah
  lexicon: HALOT
  rationale: Transliterated place name. 'Kanah' follows common English convention
    for ק in biblical names outside more technical transliteration systems.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: The preposition marks territorial extent or limit. 'As far as' communicates
    boundary reach more naturally in English than the more wooden 'to' while remaining
    faithful to the source.
- source_word: צִידוֹן רַבָּה
  chosen: Great Sidon
  alternatives:
  - Sidon the Great
  - great Sidon
  lexicon: HALOT
  rationale: The adjective רַבָּה modifies Sidon and distinguishes it as the prominent
    city. 'Great Sidon' is concise, idiomatic, and preserves the appositional force
    found in many geographic descriptions.
