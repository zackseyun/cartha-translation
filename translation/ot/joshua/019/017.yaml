id: JOS.19.17
reference: Joshua 19:17
source:
  edition: WLC
  text: לְ/יִ֨שָּׂשכָ֔ר יָצָ֖א הַ/גּוֹרָ֣ל הָֽ/רְבִיעִ֑י לִ/בְנֵ֥י יִשָּׂשכָ֖ר לְ/מִשְׁפְּחוֹתָֽ/ם׃
translation:
  text: For Issachar, the fourth lot came out, for the sons of Issachar according
    to their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the people/descendants of Issachar.' The Hebrew reads 'for the sons
      of Issachar,' a standard tribal descent expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their families.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְיִשָּׂשכָר
  chosen: For Issachar
  alternatives:
  - To Issachar
  - Belonging to Issachar
  lexicon: HALOT
  rationale: The prefixed ל marks the tribe for whom the lot is assigned. 'For Issachar'
    is natural English in this allotment context and matches the sense of distribution.
- source_word: יָצָא
  chosen: came out
  alternatives:
  - went out
  - fell
  lexicon: HALOT
  rationale: The verb literally means 'went/came out.' In the context of casting lots,
    'came out' preserves the imagery without importing the more interpretive English
    idiom 'fell.'
- source_word: הַגּוֹרָל
  chosen: lot
  alternatives:
  - allotment
  lexicon: HALOT
  rationale: The noun refers to the lot cast for tribal inheritance. 'Lot' is the
    standard and sufficiently clear rendering here; 'allotment' would shift from the
    casting instrument/result to the assigned territory.
- source_word: הָרְבִיעִי
  chosen: the fourth
  alternatives:
  - fourth
  lexicon: HALOT
  rationale: The ordinal specifies sequence in the distribution process. Including
    the article reflects the Hebrew construction and reads naturally in English.
- source_word: לִבְנֵי יִשָּׂשכָר
  chosen: for the sons of Issachar
  alternatives:
  - for the people of Issachar
  - for the descendants of Issachar
  lexicon: HALOT
  rationale: בני is literally 'sons of.' Following the project's gender-accurate principle,
    the familial/tribal expression is retained rather than neutralized, since it denotes
    tribal descent language.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal-allotment contexts commonly denotes clan divisions
    within a tribe. 'Clans' better captures the social-tribal structure than the broader
    modern term 'families'.
