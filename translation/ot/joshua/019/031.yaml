id: JOS.19.31
reference: Joshua 19:31
source:
  edition: WLC
  text: זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵֽי אָשֵׁ֖ר לְ/מִשְׁפְּחֹתָ֑/ם הֶ/עָרִ֥ים הָ/אֵ֖לֶּה
    וְ/חַצְרֵי/הֶֽן־׃פ
translation:
  text: This was the inheritance of the tribe of the sons of Asher, according to their
    clans—these cities and their settlements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the inheritance ...' The Hebrew demonstrative plus nominal clause
      can be rendered in the present more formally, but the past tense fits the narrative
      summary in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'their villages' for 'their settlements.' The Hebrew refers to dependent
      rural places associated with the listed cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the allotment just
    described. English idiom in this summary formula is best rendered with past tense
    ('was') in narrative context, though a present-tense formal rendering is possible.
- source_word: נַחֲלַת
  chosen: inheritance
  alternatives:
  - allotment
  - possession
  lexicon: HALOT
  rationale: In Joshua's land-distribution context, נַחֲלָה denotes an inherited territorial
    portion. 'Inheritance' preserves the covenantal and familial nuance better than
    the flatter 'allotment,' though that sense is present.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: Here the term is the standard designation for a tribal unit in allotment
    formulas, not the literal object 'staff.'
- source_word: בְנֵי אָשֵׁר
  chosen: the sons of Asher
  alternatives:
  - the people of Asher
  - the descendants of Asher
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew filial expression used
    for tribal identity. 'Sons of Asher' is natural enough in English and keeps the
    source texture.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census/allotment contexts refers to clan subdivisions
    within the tribe. 'According to their clans' reflects the distributive force of
    לְ and fits the recurring formula in Joshua.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - these towns
  lexicon: HALOT
  rationale: עָרִים is the normal term for settled urban places. 'Cities' matches
    standard biblical usage, even if some sites may have been small by modern standards.
- source_word: וְחַצְרֵיהֶן
  chosen: and their settlements
  alternatives:
  - and their villages
  - and their hamlets
  - and their surrounding settlements
  lexicon: HALOT
  rationale: חָצֵר can denote dependent rural settlements or unwalled satellite places
    associated with a city. 'Settlements' is broader and more precise than 'villages'
    in this land-list context.
