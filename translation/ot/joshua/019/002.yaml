id: JOS.19.2
reference: Joshua 19:2
source:
  edition: WLC
  text: וַ/יְהִ֥י לָ/הֶ֖ם בְּ/נַֽחֲלָתָ֑/ם בְּאֵֽר שֶׁ֥בַע וְ/שֶׁ֖בַע וּ/מוֹלָדָֽה־׃
translation:
  text: And they had in their inheritance Beer-sheba, Sheba, and Moladah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Beer-sheba and Sheba.'' Some understand this as a single place
      name (''Beer-sheba'') with a textual or stylistic irregularity rather than two
      separate towns.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיְהִי
  chosen: And they had
  alternatives:
  - And it was
  - And there was
  lexicon: HALOT
  rationale: The idiom ויהי + ל + pronominal suffix in allotment lists is naturally
    rendered as possession/existence ('they had' / 'there was for them') rather than
    a wooden 'and it was to them.' 'They had' gives clear modern English while preserving
    the sense of assigned possession within the inheritance list.
- source_word: לָהֶם
  chosen: they
  alternatives:
  - for them
  - to them
  lexicon: HALOT
  rationale: 'Combined with ויהי, the prepositional phrase functions idiomatically
    to indicate possession or assignment. English expresses this most naturally by
    making the beneficiaries the subject: ''they had.'''
- source_word: בְּנַחֲלָתָם
  chosen: in their inheritance
  alternatives:
  - as their inheritance
  - within their allotted inheritance
  lexicon: HALOT
  rationale: נחלה denotes inherited possession/allotment, especially tribal land.
    'In their inheritance' closely follows the Hebrew preposition and fits the list
    context, indicating these towns belonged within Simeon's allotted inheritance.
- source_word: בְּאֵר שֶׁבַע
  chosen: Beer-sheba
  alternatives:
  - Beersheba
  lexicon: HALOT
  rationale: This is a place name and should be transliterated, per translation philosophy.
    The hyphenated form 'Beer-sheba' transparently reflects the two-part Hebrew name
    and is standard English usage.
- source_word: וְשֶׁבַע
  chosen: Sheba
  alternatives:
  - and Sheba
  - or Sheba
  lexicon: HALOT
  rationale: The consonantal text reads 'and Sheba' as a place name in the list. In
    English town lists, the conjunction is supplied at the list level, so the name
    itself is rendered 'Sheba.' Because this sequence is text-critically and syntactically
    awkward alongside Beer-sheba, an alternative understanding is worth preserving
    in a footnote.
- source_word: וּמוֹלָדָה
  chosen: and Moladah
  alternatives:
  - Moladah
  lexicon: HALOT
  rationale: Proper place name, transliterated. The conjunction is retained in English
    as part of the final list item.
