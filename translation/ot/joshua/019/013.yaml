id: JOS.19.13
reference: Joshua 19:13
source:
  edition: WLC
  text: וּ/מִ/שָּׁ֤ם עָבַר֙ קֵ֣דְמָ/ה מִזְרָ֔חָ/ה גִּתָּ֥/ה חֵ֖פֶר עִתָּ֣ה קָצִ֑ין
    וְ/יָצָ֛א רִמּ֥וֹן הַ/מְּתֹאָ֖ר הַ/נֵּעָֽה׃
translation:
  text: From there it passed eastward, toward the sunrise, to Gath-hepher, to Eth-kazin,
    and went out to Rimmon, which stretches to Neah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From there it passed to the east.' The Hebrew uses two directional terms,
      literally 'eastward, sunrise-ward,' likely for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Eth-kazin'; some understand the form as 'Ittah-kazin.'
    reason: alternative_reading
  - marker: c
    text: 'The Hebrew of this clause is difficult: ''Rimmon, the marked out one, to
      Neah'' or similar. Many understand it to mean that the border extended from
      Rimmon to Neah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִשָּׁם
  chosen: From there
  alternatives:
  - And from there
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition and adverb literally means
    'and from there.' In English boundary descriptions, 'From there' is natural and
    preserves the sequential movement without overtranslating the conjunction.
- source_word: עָבַר
  chosen: it passed
  alternatives:
  - it crossed over
  - it went on
  lexicon: HALOT
  rationale: In territorial boundary formulas, עבר commonly describes the border line
    passing from one point to another. 'It passed' is concise and idiomatic for the
    implied subject, the boundary.
- source_word: קֵדְמָה מִזְרָחָה
  chosen: eastward, toward the sunrise
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The paired directional expressions intensify the eastward movement. Rendering
    both as 'eastward, toward the sunrise' preserves the Hebrew fullness better than
    collapsing them into a single English directional phrase.
- source_word: גִּתָּה חֵפֶר
  chosen: Gath-hepher
  alternatives:
  - Gittah-hepher
  - Gathhepher
  lexicon: HALOT
  rationale: This is a place name. The standard English transliteration 'Gath-hepher'
    is widely recognized and reflects the likely compound toponym.
- source_word: עִתָּה קָצִין
  chosen: Eth-kazin
  alternatives:
  - Ittah-kazin
  - to Eth-kazin
  lexicon: HALOT
  rationale: The Masoretic division likely reflects the place name Eth-kazin. English
    versions commonly treat it as a single toponym, which best fits the boundary list
    context.
- source_word: וְיָצָא
  chosen: and went out
  alternatives:
  - and extended
  - and reached
  lexicon: HALOT
  rationale: In boundary descriptions, יצא often marks the line going out or extending
    to another point. 'Went out' is a close rendering that preserves the spatial imagery.
- source_word: רִמּוֹן
  chosen: Rimmon
  lexicon: HALOT
  rationale: Place name transliterated according to standard convention.
- source_word: הַמְּתֹאָר
  chosen: which stretches
  alternatives:
  - marked out
  - turning
  - extending
  lexicon: HALOT
  rationale: This participial form is difficult and has been understood in several
    ways in context. 'Which stretches' fits the boundary-line sense and connects naturally
    with the following place name.
- source_word: הַנֵּעָה
  chosen: to Neah
  alternatives:
  - Neah
  lexicon: HALOT
  rationale: Best taken as a place name governed by the preceding descriptive participle,
    yielding the sense of extension toward Neah.
