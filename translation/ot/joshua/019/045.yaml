id: JOS.19.45
reference: Joshua 19:45
source:
  edition: WLC
  text: וִ/יהֻ֥ד וּ/בְנֵֽי בְרַ֖ק וְ/גַת רִמּֽוֹן־־׃
translation:
  text: Jehud, Bene-berak, and Gath-rimmon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Bene-berak, a place name formed from elements that elsewhere can
      mean 'sons of Berak'; here the context requires the established town name.
    reason: lexical_alternative
  - marker: b
    text: Or 'Gath Rimmon'; the Hebrew is a compound place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהֻד
  chosen: Jehud
  alternatives:
  - Yehud
  lexicon: HALOT
  rationale: Proper place name in a town list; transliterated rather than translated
    per project philosophy. English convention favors 'Jehud,' though 'Yehud' is a
    possible closer transliteration of the initial yod.
- source_word: וּבְנֵי בְרַק
  chosen: Bene-berak
  alternatives:
  - Bnei-berak
  - Bene-beraq
  lexicon: HALOT
  rationale: Treated as a compound toponym, not translated as the common noun phrase
    'sons of Berak,' because in this context it is clearly one of the towns allotted
    to Dan. Hyphenation signals the single place name represented by two lexical elements.
- source_word: וְגַת רִמּוֹן
  chosen: Gath-rimmon
  alternatives:
  - Gath Rimmon
  lexicon: HALOT
  rationale: Compound place name in the town list. Hyphenation helps modern readers
    recognize it as a single toponym rather than two separate locations.
