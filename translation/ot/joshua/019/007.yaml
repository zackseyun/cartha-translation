id: JOS.19.7
reference: Joshua 19:7
source:
  edition: WLC
  text: עַ֥יִן רִמּ֖וֹן וָ/עֶ֣תֶר וְ/עָשָׁ֑ן עָרִ֥ים אַרְבַּ֖ע וְ/חַצְרֵי/הֶֽן׀׃
translation:
  text: 'Ain, Rimmon, Ether, and Ashan: four cities, with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew lists four place names: Ain, Rimmon, Ether, and Ashan. Some interpreters
      compare 1 Chronicles 4:32, where ''Ain, Rimmon'' may be understood together,
      affecting the count of the cities.'
    reason: cross_reference
lexical_decisions:
- source_word: עַיִן
  chosen: Ain
  alternatives:
  - Ayin
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy of transliterating names. Although the common noun can mean 'spring'
    or 'eye,' here it functions as a toponym in a city list.
- source_word: רִמּוֹן
  chosen: Rimmon
  alternatives:
  - pomegranate
  lexicon: HALOT
  rationale: Proper place name paired with Ain in the list. The lexical sense of the
    noun is 'pomegranate,' but in this context it is a toponym and should be transliterated.
- source_word: וָעֶתֶר
  chosen: Ether
  alternatives:
  - Eter
  lexicon: HALOT
  rationale: Proper place name introduced by conjunction. Standard English transliteration
    is 'Ether'; 'Eter' is a possible closer transliteration but less familiar.
- source_word: וְעָשָׁן
  chosen: and Ashan
  lexicon: HALOT
  rationale: Proper place name with conjunction. Transliterated as a toponym in the
    territorial list.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Common term for settled urban locations. 'Cities' is the standard rendering
    in allotment lists and fits the formal summary statement that follows the names.
- source_word: אַרְבַּע
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number modifying 'cities.' Rendered straightforwardly.
- source_word: וְחַצְרֵיהֶן
  chosen: with their villages
  alternatives:
  - and their settlements
  - and their hamlets
  lexicon: HALOT
  rationale: חָצֵר in territorial formulas commonly refers to dependent rural settlements
    surrounding a main town. 'Villages' is idiomatic and conventional in English for
    this administrative relationship.
