id: JOS.19.47
reference: Joshua 19:47
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א גְבוּל בְּנֵי דָ֖ן מֵ/הֶ֑ם וַ/יַּעֲל֣וּ בְנֵֽי דָ֠ן וַ/יִּלָּחֲמ֨וּ
    עִם לֶ֜שֶׁם וַ/יִּלְכְּד֥וּ אוֹתָ֣/הּ וַ/יַּכּ֧וּ אוֹתָ֣/הּ לְ/פִי חֶ֗רֶב וַ/יִּֽרְשׁ֤וּ
    אוֹתָ/הּ֙ וַ/יֵּ֣שְׁבוּ בָ֔/הּ וַ/יִּקְרְא֤וּ לְ/לֶ֨שֶׁם֙ דָּ֔ן כְּ/שֵׁ֖ם דָּ֥ן
    אֲבִי/הֶֽם־־־־׀־׃
translation:
  text: But the territory of the sons of Dan went out beyond them, so the sons of
    Dan went up and fought against Leshem, and they captured it and struck it with
    the edge of the sword, and they took possession of it and lived in it, and they
    called Leshem Dan, after the name of Dan their father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the border of the sons of Dan extended beyond them.' Some translations
      render the clause interpretively as 'the territory of the sons of Dan was too
      small for them,' drawing on the broader context, but the Hebrew wording is more
      literally spatial.
    reason: alternative_reading
  - marker: b
    text: Leshem is associated with Laish in Judges 18:7, 14, 27, 29.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֵּצֵא גְבוּל בְּנֵי דָן מֵהֶם
  chosen: the territory of the sons of Dan went out beyond them
  alternatives:
  - the border of the sons of Dan extended beyond them
  - the territory of the sons of Dan was too small for them
  lexicon: HALOT
  rationale: גְבוּל can mean 'border, boundary, territory.' In this allotment context,
    'territory' best captures the practical sense. The phrase מֵהֶם is difficult;
    the plain Hebrew is literally 'from them,' and many understand the sense as the
    border going out beyond them or away from them. I preserved the more literal spatial
    idea in the main text rather than importing the interpretive expansion 'was too
    small for them,' which reflects contextual harmonization with Judges 1:34 and
    some versions.
- source_word: בְּנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the people of Dan
  - the Danites
  lexicon: HALOT
  rationale: Literally 'sons of Dan.' This keeps the tribal/familial idiom visible.
    'Danites' is possible but less transparent to the Hebrew wording.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' often for geographic ascent or military movement.
    'Went up' is the standard and sufficiently natural rendering.
- source_word: וַיִּלָּחֲמוּ עִם לֶשֶׁם
  chosen: fought against Leshem
  alternatives:
  - made war against Leshem
  - fought with Leshem
  lexicon: HALOT
  rationale: The verb means 'fight, wage war.' With a city name as object after עִם,
    English idiom prefers 'against Leshem' rather than the more wooden 'with Leshem.'
- source_word: לֶשֶׁם
  chosen: Leshem
  alternatives:
  - Laish
  lexicon: HALOT
  rationale: The MT here reads לֶשֶׁם, so the transliterated name 'Leshem' should
    stand in the main text. Because the site is associated elsewhere with Laish, that
    alternative is worth preserving in a footnote rather than replacing the Hebrew
    form.
- source_word: וַיִּלְכְּדוּ אֹתָהּ
  chosen: they captured it
  alternatives:
  - they seized it
  - they took it
  lexicon: HALOT
  rationale: לכד in military context is well rendered 'capture.'
- source_word: וַיַּכּוּ אֹתָהּ לְפִי חֶרֶב
  chosen: struck it with the edge of the sword
  alternatives:
  - put it to the sword
  - struck it by the mouth of the sword
  lexicon: HALOT
  rationale: לְפִי חֶרֶב is the Hebrew idiom literally 'by the mouth/edge of the sword.'
    'With the edge of the sword' preserves the imagery while remaining readable. 'Put
    it to the sword' is idiomatic English but slightly more interpretive.
- source_word: וַיִּרְשׁוּ אֹתָהּ
  chosen: they took possession of it
  alternatives:
  - they possessed it
  - they dispossessed it
  lexicon: HALOT
  rationale: ירשׁ can mean 'possess, inherit, take possession,' often with the implication
    of dispossessing prior occupants. Here 'took possession of it' communicates the
    result clearly in modern English.
- source_word: וַיֵּשְׁבוּ בָהּ
  chosen: lived in it
  alternatives:
  - dwelt in it
  - settled in it
  lexicon: HALOT
  rationale: ישׁב commonly means 'sit, dwell, live.' 'Lived in it' is natural modern
    English; 'settled in it' is possible but adds a nuance not required by the verb
    alone.
- source_word: וַיִּקְרְאוּ לְלֶשֶׁם דָּן
  chosen: they called Leshem Dan
  alternatives:
  - they named Leshem Dan
  - they called the city Dan
  lexicon: HALOT
  rationale: The construction means they gave Leshem the name Dan. 'They called Leshem
    Dan' stays close to the Hebrew while reading well.
- source_word: כְּשֵׁם דָּן אֲבִיהֶם
  chosen: after the name of Dan their father
  alternatives:
  - according to the name of Dan their ancestor
  - for the name of Dan their forefather
  lexicon: HALOT
  rationale: אָב can mean father or ancestor. Since the tribe descends from Dan son
    of Jacob, 'their father' reflects the Hebrew idiom of tribal ancestry without
    overexplaining in the main text.
