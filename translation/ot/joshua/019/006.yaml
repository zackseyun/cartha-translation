id: JOS.19.6
reference: Joshua 19:6
source:
  edition: WLC
  text: וּ/בֵ֥ית לְבָא֖וֹת וְ/שָֽׁרוּחֶ֑ן עָרִ֥ים שְׁלֹשׁ עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'Beth-lebaoth and Sharuhen: thirteen cities, with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Sharuhen; Joshua 15:32 has the variant name Shilhim in a parallel
      list.
    reason: textual_variant
lexical_decisions:
- source_word: בֵית לְבָאוֹת
  chosen: Beth-lebaoth
  alternatives:
  - Beth-lebaoth
  - Beth-lebaot
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred per translation philosophy.
    The compound literally contains 'house of lionesses,' but translating the toponym
    would be unnecessarily interpretive in a boundary list.
- source_word: שָׁרוּחֶן
  chosen: Sharuhen
  alternatives:
  - Sharuhen
  - Shilhim
  lexicon: HALOT
  rationale: Rendered as a transliterated place name. 'Shilhim' appears in a parallel
    town list (Joshua 15:32) and may reflect a related or variant tradition, but the
    MT here reads Sharuhen.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Standard rendering for עִיר in territorial allotment lists. 'Cities'
    is conventional and fits the formal register of settlement catalogues, even if
    some sites may have been small towns.
- source_word: שְׁלֹשׁ עֶשְׂרֵה
  chosen: thirteen
  alternatives:
  - thirteen in number
  lexicon: HALOT
  rationale: Straightforward cardinal number; idiomatic English compresses the Hebrew
    expression into 'thirteen.'
- source_word: חַצְרֵיהֶן
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  - their encampments
  lexicon: HALOT
  rationale: In allotment formulas, חָצֵר commonly denotes dependent villages or unwalled
    satellite settlements associated with the named cities. 'Villages' is the clearest
    modern English equivalent in this context.
