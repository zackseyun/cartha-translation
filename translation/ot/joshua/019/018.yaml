id: JOS.19.18
reference: Joshua 19:18
source:
  edition: WLC
  text: וַ/יְהִ֖י גְּבוּלָ֑/ם יִזְרְעֶ֥אלָ/ה וְ/הַ/כְּסוּלֹ֖ת וְ/שׁוּנֵֽם׃
translation:
  text: And their border was toward Jezreel, Chesulloth, and Shunem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a directional ending on 'Jezreel,' indicating 'toward Jezreel'
      or 'to Jezreel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their boundary was Jezreel, Chesulloth, and Shunem,' taking the first
      place name without expressing the directional nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next boundary statement in
    narrative sequence. English smooths this as 'And ... was' rather than the more
    wooden 'And it was.'
- source_word: גְּבוּלָם
  chosen: their border
  alternatives:
  - their boundary
  - their territory boundary
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a border or boundary line. 'Border' is natural
    English in allotment contexts and preserves the territorial sense; the 3mp suffix
    is rendered 'their,' referring to the tribe previously in context.
- source_word: יִזְרְעֶאלָה
  chosen: toward Jezreel
  alternatives:
  - Jezreel
  - to Jezreel
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion/orientation toward
    a location. In a boundary list, 'toward Jezreel' best reflects that nuance without
    over-specifying route or endpoint.
- source_word: הַכְּסוּלֹת
  chosen: Chesulloth
  alternatives:
  - Hakesulloth
  - the Chesulloth
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated. The prefixed article
    is likely fossilized within the toponym or not naturally represented in English;
    'Chesulloth' is a standard concise transliteration.
- source_word: שׁוּנֵם
  chosen: Shunem
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention.
