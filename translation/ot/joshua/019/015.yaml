id: JOS.19.15
reference: Joshua 19:15
source:
  edition: WLC
  text: וְ/קַטָּ֤ת וְ/נַֽהֲלָל֙ וְ/שִׁמְר֔וֹן וְ/יִדְאֲלָ֖ה וּ/בֵ֣ית לָ֑חֶם עָרִ֥ים
    שְׁתֵּים עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'Kattath, Nahalal, Shimron, Idalah, and Bethlehem: twelve cities with their
    villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bethlehem is the place name here, not a translated phrase meaning 'house
      of bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַטָּת
  chosen: Kattath
  alternatives:
  - Kattat
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. English form follows a straightforward transliteration of the Hebrew
    consonants and vowels.
- source_word: נַהֲלָל
  chosen: Nahalal
  alternatives:
  - Nahallal
  rationale: Proper place name; transliterated. The form 'Nahalal' is a standard English
    representation of the Hebrew place name.
- source_word: שִׁמְרוֹן
  chosen: Shimron
  alternatives:
  - Shimeron
  rationale: Proper place name; transliterated by standard convention.
- source_word: יִדְאֲלָה
  chosen: Idalah
  alternatives:
  - Yidalah
  rationale: Proper place name; transliterated. Initial yod is represented with 'I'
    here to match common English place-name convention in this context.
- source_word: בֵית לָחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  - house of bread
  rationale: Established English transliteration of the place name. Although the components
    literally mean 'house of bread,' this is a toponym and should be transliterated,
    not translated.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Standard term for populated settlements in territorial lists. 'Cities'
    is the conventional and sufficiently accurate rendering here.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  rationale: Cardinal number modifying 'cities'; rendered idiomatically in English
    as 'twelve'.
- source_word: חַצְרֵיהֶן
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  lexicon: HALOT
  rationale: In allotment lists, חָצֵר commonly refers to dependent villages or unwalled
    settlements associated with a larger town. 'Villages' is clear modern English
    and fits the administrative-geographical sense.
