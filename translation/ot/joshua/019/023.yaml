id: JOS.19.23
reference: Joshua 19:23
source:
  edition: WLC
  text: זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵֽי יִשָּׂשכָ֖ר לְ/מִשְׁפְּחֹתָ֑/ם הֶ/עָרִ֖ים וְ/חַצְרֵי/הֶֽן־׃פ
translation:
  text: This was the inheritance of the tribe of the sons of Issachar, according to
    their clans—the cities and their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the inheritance ...' The Hebrew is a verbless clause; English
      may render it with either present or past tense in this summary formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the territorial allotment
    just described. English idiom in this recurring allotment formula is smoother
    with past tense ('was'), though the Hebrew nominal clause formally uses no explicit
    verb.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly denotes inherited territorial allotment. 'Inheritance'
    preserves the covenantal-land sense better than the more administrative 'allotment,'
    though that nuance is present.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - tribal group
  lexicon: HALOT
  rationale: In tribal-land contexts מַטֶּה is the standard term for a tribe. Literal
    senses such as 'staff' are not suitable here.
- source_word: בְנֵי יִשָּׂשכָר
  chosen: the sons of Issachar
  alternatives:
  - the people of Issachar
  - the descendants of Issachar
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew kinship expression. 'Sons
    of Issachar' is natural enough in English and keeps the genealogical framing of
    tribal identity.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת here refers to clan subdivisions within the tribe. 'According
    to their clans' reflects the distributive לְ and matches the formulaic census/allotment
    language better than the broader 'families.'
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עָרִים denotes settled population centers. 'Cities' is the conventional
    rendering in Joshua's boundary and allotment lists, even where some sites may
    have been small by modern standards.
- source_word: וְחַצְרֵיהֶן
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their surrounding settlements
  lexicon: HALOT
  rationale: חָצֵר in this land-list formula refers to dependent rural settlements
    associated with the cities. 'Villages' is the clearest modern English equivalent.
