id: JOS.19.50
reference: Joshua 19:50
source:
  edition: WLC
  text: עַל פִּ֨י יְהוָ֜ה נָ֣תְנוּ ל֗/וֹ אֶת הָ/עִיר֙ אֲשֶׁ֣ר שָׁאָ֔ל אֶת תִּמְנַת
    סֶ֖רַח בְּ/הַ֣ר אֶפְרָ֑יִם וַ/יִּבְנֶ֥ה אֶת הָ/עִ֖יר וַ/יֵּ֥שֶׁב בָּֽ/הּ־־־־־׃
translation:
  text: At the command of the LORD they gave him the city that he asked for, Timnath-serah
    in the hill country of Ephraim. He rebuilt the city and lived in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''He built the city and lived in it.'' The Hebrew verb can mean either
      ''built'' or, in context, ''rebuilt/restored.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי יְהוָה
  chosen: At the command of the LORD
  alternatives:
  - According to the mouth of the LORD
  - By the command of the LORD
  - At the word of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'upon the mouth of,' but in context
    it denotes authoritative direction or command. 'At the command of' is idiomatic
    modern English and preserves the sense of divine authorization. יְהוָה follows
    the project default 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: נָתְנוּ לוֹ
  chosen: they gave him
  alternatives:
  - they gave to him
  - they granted him
  lexicon: HALOT
  rationale: נתן with indirect object simply means 'gave.' 'Granted' is possible in
    context, but 'gave him' stays closer to the Hebrew while remaining natural.
- source_word: הָעִיר אֲשֶׁר שָׁאָל
  chosen: the city that he asked for
  alternatives:
  - the city that he requested
  - the city he had asked for
  lexicon: HALOT
  rationale: שׁאל here means 'ask/request.' 'Asked for' is straightforward and idiomatic.
    The relative clause is preserved explicitly.
- source_word: תִּמְנַת סֶרַח
  chosen: Timnath-serah
  alternatives:
  - Timnath Serah
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    following project policy for names. Hyphenation aids readability in English.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the mountains of Ephraim
  - in Mount Ephraim
  lexicon: HALOT
  rationale: הַר can denote hill country or mountainous region, not only a single
    mountain. 'Hill country of Ephraim' is the standard geographic sense in context
    and clearer in modern English than 'Mount Ephraim.'
- source_word: וַיִּבְנֶה אֶת הָעִיר
  chosen: He rebuilt the city
  alternatives:
  - He built the city
  lexicon: HALOT
  rationale: בנה ordinarily means 'build,' but since the city is already identified
    as an existing city given to him, English 'rebuilt' best captures the likely sense
    of fortifying/restoring/constructing it up for habitation. This is a contextual
    adjustment for coherence, though 'built' remains a viable formal alternative.
- source_word: וַיֵּשֶׁב בָּהּ
  chosen: and lived in it
  alternatives:
  - and dwelt in it
  - and settled in it
  lexicon: HALOT
  rationale: ישׁב commonly means 'sit, dwell, live, settle.' 'Lived in it' is natural
    modern English and fits the narrative sequence after receiving and rebuilding
    the city.
