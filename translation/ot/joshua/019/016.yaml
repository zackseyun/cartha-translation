id: JOS.19.16
reference: Joshua 19:16
source:
  edition: WLC
  text: זֹ֛את נַחֲלַ֥ת בְּנֵֽי זְבוּלֻ֖ן לְ/מִשְׁפְּחוֹתָ֑/ם הֶֽ/עָרִ֥ים הָ/אֵ֖לֶּה
    וְ/חַצְרֵי/הֶֽן־׃פ
translation:
  text: This was the inheritance of the sons of Zebulun, according to their clans—these
    cities and their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "This is the inheritance of the sons of Zebulun." The Hebrew uses a demonstrative
      with a verbless clause, which can be rendered in English as either present or
      past in this summary formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the listed territorial
    allotment. English past tense fits the narrative summary formula in Joshua's allotment
    notices, though a present-tense rendering is also possible more formally.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה in land-distribution contexts denotes an inherited allotment.
    'Inheritance' preserves both the legal and covenantal sense better than the flatter
    'allotment,' though that nuance is contextually related.
- source_word: בְּנֵי זְבוּלֻן
  chosen: the sons of Zebulun
  alternatives:
  - the people of Zebulun
  - the descendants of Zebulun
  lexicon: HALOT
  rationale: Literally 'sons of Zebulun.' Per gender-accurate policy, the familial
    expression is retained rather than neutralized, while still functioning corporately
    for the tribe.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: The ל preposition here marks distribution/classification. 'According
    to their clans' is idiomatic and reflects the tribal subdivision sense of מִשְׁפָּחוֹת
    in allotment formulas.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - the cities הללו
  - these towns
  lexicon: HALOT
  rationale: Definite phrase summing up the previously named urban centers. 'Cities'
    is the standard rendering for עָרִים in Joshua's territorial lists.
- source_word: וְחַצְרֵיהֶן
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their surrounding settlements
  lexicon: HALOT
  rationale: חָצֵר in such land-list formulas commonly refers to dependent rural settlements
    associated with the cities. 'Villages' is the clearest natural English equivalent
    here.
