id: JOS.19.39
reference: Joshua 19:39
source:
  edition: WLC
  text: זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵֽי נַפְתָּלִ֖י לְ/מִשְׁפְּחֹתָ֑/ם הֶ/עָרִ֖ים וְ/חַצְרֵי/הֶֽן־׃פ
translation:
  text: This was the inheritance of the tribe of the sons of Naphtali according to
    their clans—the cities and their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the inheritance ...' The Hebrew demonstrative with nominal clause
      can be rendered in either present or past tense in English; the past fits the
      retrospective summary after the allotment list.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'the sons of Naphtali.' This Hebrew tribal expression denotes the descendants/tribal
      members of Naphtali.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring back to the allotment just
    described. English past tense is natural in this summarizing formula after the
    boundary/city list, though a present-tense rendering is also possible more formally.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotment
  - the possession
  lexicon: HALOT
  rationale: In Joshua's land-distribution context, נַחֲלָה denotes an inherited territorial
    portion. 'Inheritance' preserves the covenantal-land nuance better than the more
    administrative 'allotment,' though that remains a viable alternative.
- source_word: מַטֵּה
  chosen: the tribe
  alternatives:
  - the staff
  - the branch
  lexicon: HALOT
  rationale: Here מַטֶּה is the standard tribal designation in allotment formulas,
    not the literal sense 'staff.' 'Tribe' is the established contextual meaning.
- source_word: בְנֵי נַפְתָּלִי
  chosen: of the sons of Naphtali
  alternatives:
  - of the people of Naphtali
  - of Naphtali
  lexicon: HALOT
  rationale: Literally 'sons of Naphtali.' Retaining 'sons of' reflects the Hebrew
    construction and lineage-based tribal identity. It is not intended to exclude
    women but to mirror the source's kinship terminology.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - for their clans
  lexicon: HALOT
  rationale: 'מִשְׁפָּחָה in tribal census/allotment contexts is best rendered ''clan''
    rather than the broader English ''family.'' The prefixed לְ expresses distribution/classification:
    ''according to'' or ''by'' their clans.'
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city,' though some listed settlements may have been
    small towns. 'Cities' preserves the conventional territorial formula used throughout
    Joshua.
- source_word: וְחַצְרֵיהֶן
  chosen: and their villages
  alternatives:
  - and their settlements
  - and their hamlets
  - and their pasturelands
  lexicon: HALOT
  rationale: חָצֵר in this formula refers to dependent rural settlements/outlying
    villages associated with the cities. 'Villages' is the clearest modern English
    equivalent; 'pasturelands' would be incorrect here.
