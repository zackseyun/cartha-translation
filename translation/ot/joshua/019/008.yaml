id: JOS.19.8
reference: Joshua 19:8
source:
  edition: WLC
  text: וְ/כָל הַֽ/חֲצֵרִ֗ים אֲשֶׁ֤ר סְבִיבוֹת֙ הֶֽ/עָרִ֣ים הָ/אֵ֔לֶּה עַד בַּֽעֲלַ֥ת
    בְּאֵ֖ר רָ֣אמַת נֶ֑גֶב זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵֽי שִׁמְע֖וֹן לְ/מִשְׁפְּחֹתָֽ/ם־־־׃
translation:
  text: along with all the villages that were around these cities, as far as Baalath-beer,
    Ramath-negeb. This was the inheritance of the tribe of the sons of Simeon according
    to their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Baalath-beer, that is, Ramath-negeb,' taking the second name
      as an appositional identification of the first.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכָל
  chosen: along with all
  alternatives:
  - and all
  - all
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding city list, so 'along
    with all' makes the additive force clear in natural English while preserving the
    inclusive sense of כָּל.
- source_word: הַחֲצֵרִים
  chosen: the villages
  alternatives:
  - the settlements
  - the hamlets
  - the encampments
  lexicon: HALOT
  rationale: חָצֵר can denote unwalled settlements or dependent villages in territorial
    lists. 'Villages' best fits the geographic-allotment context and standard English
    usage here.
- source_word: אֲשֶׁר סְבִיבוֹת הֶעָרִים הָאֵלֶּה
  chosen: that were around these cities
  alternatives:
  - that were surrounding these cities
  - that were around those cities
  lexicon: HALOT
  rationale: This relative clause describes the villages as located around the named
    cities. 'These cities' reflects the proximal demonstrative and keeps the territorial
    description straightforward.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - until
  lexicon: HALOT
  rationale: In a boundary or extent statement, עַד is naturally rendered 'as far
    as,' indicating the geographic limit of the listed villages.
- source_word: בַּעֲלַת בְּאֵר
  chosen: Baalath-beer
  alternatives:
  - Baalat-beer
  lexicon: HALOT
  rationale: This is a place-name and should be transliterated rather than translated,
    following the project's policy for names. The hyphen helps readers recognize the
    compound toponym.
- source_word: רָאמַת נֶגֶב
  chosen: Ramath-negeb
  alternatives:
  - Ramah of the Negeb
  - southern Ramah
  lexicon: HALOT
  rationale: The Hebrew may function as an appositional or alternate place-name. Retaining
    the transliterated form preserves the toponym without over-interpreting whether
    it means 'Ramah of the Negeb' or a second distinct site.
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Although the Hebrew demonstrative is verbless, English idiom in a retrospective
    allotment summary naturally supplies 'was' to refer back to the described inheritance.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - the allotted inheritance
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה in Joshua commonly denotes inherited tribal allotment. 'Inheritance'
    preserves both the legal and covenantal sense.
- source_word: מַטֵּה
  chosen: the tribe of
  alternatives:
  - the staff of
  - the branch of
  lexicon: HALOT
  rationale: In tribal-allotment contexts, מַטֶּה refers to a tribe. Rendering it
    with 'tribe of' communicates the social-political unit rather than the literal
    sense 'staff.'
- source_word: בְנֵי שִׁמְעוֹן
  chosen: the sons of Simeon
  alternatives:
  - the people of Simeon
  - the Simeonites
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of Simeon.' This preserves the genealogical
    framing typical of Joshua, while remaining understandable in English.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in tribal distribution language refers to clan groupings
    within the tribe. 'According to their clans' is both accurate and idiomatic.
