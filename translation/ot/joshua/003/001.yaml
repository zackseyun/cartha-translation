theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: No doctrinal dispute is at stake, but the phrase involves the project's
    gender-accurate principle. Because the Hebrew is explicitly masculine plural in
    a national/kinship expression, 'sons of Israel' best exposes the source form.
    A more idiomatic collective alternative is preserved in a footnote for readability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
