id: JOS.3.1
reference: Joshua 3:1
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּם֩ יְהוֹשֻׁ֨עַ בַּ/בֹּ֜קֶר וַ/יִּסְע֣וּ מֵֽ/הַ/שִּׁטִּ֗ים וַ/יָּבֹ֨אוּ֙
    עַד הַ/יַּרְדֵּ֔ן ה֖וּא וְ/כָל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יָּלִ֥נוּ שָׁ֖ם טֶ֥רֶם יַעֲבֹֽרוּ־־׃
translation:
  text: Joshua rose early in the morning, and they set out from Shittim and came to
    the Jordan, he and all the sons of Israel, and they spent the night there before
    they crossed over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''all the Israelites.'' Hebrew: ''all the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of שׁכם commonly means to rise early. 'Rose early'
    is natural modern English and preserves the temporal emphasis without unnecessary
    archaism.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In the morning' pairs idiomatically
    with 'rose early' and reflects the definite noun with preposition.
- source_word: וַיִּסְעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they pulled up camp and traveled
  lexicon: HALOT
  rationale: נסע in travel narrative often denotes breaking camp and setting out.
    'They set out' is concise and idiomatic, preserving the narrative movement.
- source_word: מֵהַשִּׁטִּים
  chosen: from Shittim
  alternatives:
  - from Acacia Grove
  lexicon: HALOT
  rationale: As a place name, the term is best transliterated per project philosophy
    to transliterate names rather than translate them. 'Acacia Grove' is a possible
    sense but is less suitable here than the established toponym.
- source_word: וַיָּבֹאוּ עַד הַיַּרְדֵּן
  chosen: came to the Jordan
  alternatives:
  - came as far as the Jordan
  - arrived at the Jordan
  lexicon: HALOT
  rationale: The construction means reaching the Jordan. 'Came to the Jordan' is natural
    English and adequately reflects עד as arrival up to the river.
- source_word: הוּא וְכָל־בְּנֵי יִשְׂרָאֵל
  chosen: he and all the sons of Israel
  alternatives:
  - he and all the Israelites
  - he and all the children of Israel
  lexicon: HALOT
  rationale: The pronoun explicitly resumes Joshua, so 'he and...' should be retained.
    For בְּנֵי יִשְׂרָאֵל, 'sons of Israel' is more formally aligned with the Hebrew
    and follows the project's gender-accurate principle; alternatives are possible
    but less transparent to the source form.
- source_word: וַיָּלִנוּ
  chosen: they spent the night
  alternatives:
  - they lodged
  - they stayed overnight
  lexicon: HALOT
  rationale: לון here refers to remaining overnight. 'Spent the night' is clear, idiomatic
    modern English.
- source_word: טֶרֶם יַעֲבֹרוּ
  chosen: before they crossed over
  alternatives:
  - before they crossed
  - before they would cross over
  lexicon: HALOT
  rationale: טרם marks prior time. עבר in this Jordan context naturally carries the
    sense of crossing over. 'Crossed over' preserves the verbal force and anticipates
    the river crossing motif.
