id: JOS.3.15
reference: Joshua 3:15
source:
  edition: WLC
  text: וּ/כְ/ב֞וֹא נֹשְׂאֵ֤י הָֽ/אָרוֹן֙ עַד הַ/יַּרְדֵּ֔ן וְ/רַגְלֵ֤י הַ/כֹּֽהֲנִים֙
    נֹשְׂאֵ֣י הָֽ/אָר֔וֹן נִטְבְּל֖וּ בִּ/קְצֵ֣ה הַ/מָּ֑יִם וְ/הַ/יַּרְדֵּ֗ן מָלֵא֙
    עַל כָּל גְּדוֹתָ֔י/ו כֹּ֖ל יְמֵ֥י קָצִֽיר־־־׃
translation:
  text: And when those carrying the ark came as far as the Jordan, and the feet of
    the priests carrying the ark were dipped in the edge of the water (now the Jordan
    was full over all its banks all the days of harvest),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the edge of the water.' The Hebrew expression is literally 'in the
      edge/end of the water,' indicating the priests' feet entered the water at its
      margin.
    reason: lexical_alternative
  - marker: b
    text: That is, the Jordan was at flood stage during harvest season.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/כְ/ב֞וֹא
  chosen: And when ... came
  alternatives:
  - and as ... came
  - and upon the coming of
  lexicon: HALOT
  rationale: The conjunction plus temporal preposition and infinitive construct introduces
    a temporal clause. 'And when' is natural modern English and preserves the sequence
    without over-literal awkwardness.
- source_word: נֹשְׂאֵי הָאָרוֹן
  chosen: those carrying the ark
  alternatives:
  - the bearers of the ark
  - those bearing the ark
  lexicon: HALOT
  rationale: The participle denotes the people carrying the ark. 'Those carrying'
    is readable modern English; 'bearers' is possible but slightly less transparent.
- source_word: עַד הַיַּרְדֵּן
  chosen: as far as the Jordan
  alternatives:
  - to the Jordan
  - up to the Jordan
  lexicon: HALOT
  rationale: עַד marks movement reaching a point. 'As far as the Jordan' reflects
    the sense of arrival at the river's edge.
- source_word: וְרַגְלֵי הַכֹּהֲנִים
  chosen: and the feet of the priests
  alternatives:
  - and the priests' feet
  lexicon: HALOT
  rationale: A straightforward construct chain. The fuller form preserves the Hebrew
    emphasis and cadence.
- source_word: נֹשְׂאֵי הָאָרוֹן
  chosen: carrying the ark
  alternatives:
  - bearing the ark
  lexicon: HALOT
  rationale: Repeated participle retained in translation rather than omitted, since
    the Hebrew repeats it and it identifies which priests are in view.
- source_word: נִטְבְּלוּ
  chosen: were dipped
  alternatives:
  - were immersed
  - touched
  lexicon: HALOT
  rationale: The Niphal of טבל conveys being dipped/immersed. Here the feet enter
    the water at the edge; 'were dipped' is more precise than the weaker 'touched'
    and less overstated than full 'immersed.'
- source_word: בִּקְצֵה הַמָּיִם
  chosen: in the edge of the water
  alternatives:
  - at the edge of the water
  - into the brink of the water
  lexicon: HALOT
  rationale: Literally 'in the edge/end of the water.' English idiom would often prefer
    'at the edge,' but 'in the edge' here conveys that the feet actually entered the
    margin of the water. This balances literal sense and readability.
- source_word: וְהַיַּרְדֵּן מָלֵא
  chosen: now the Jordan was full
  alternatives:
  - and the Jordan was full
  - the Jordan was overflowing
  lexicon: HALOT
  rationale: This clause is parenthetical background information. 'Now' signals the
    explanatory aside. מָלֵא means 'was full'; the following phrase explains the extent.
- source_word: עַל כָּל גְּדוֹתָיו
  chosen: over all its banks
  alternatives:
  - up to all its banks
  - all along its banks
  lexicon: HALOT
  rationale: The phrase indicates the river was filled to overflowing over its banks.
    'Over all its banks' preserves the image of flood stage better than the flatter
    'along its banks.'
- source_word: כֹּל יְמֵי קָצִיר
  chosen: all the days of harvest
  alternatives:
  - throughout harvest time
  - during all the harvest days
  lexicon: HALOT
  rationale: A temporal expression meaning the whole harvest period. 'All the days
    of harvest' is close to the Hebrew and still natural enough in English.
