id: JOS.3.2
reference: Joshua 3:2
source:
  edition: WLC
  text: וַ/יְהִ֕י מִ/קְצֵ֖ה שְׁלֹ֣שֶׁת יָמִ֑ים וַ/יַּעַבְר֥וּ הַ/שֹּׁטְרִ֖ים בְּ/קֶ֥רֶב
    הַֽ/מַּחֲנֶֽה׃
translation:
  text: And at the end of three days, the officers went through the midst of the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passed through the midst of the camp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative transition introducing
    the next event. In readable modern English, the idiom is best carried by a simple
    connective plus temporal clause rather than the archaic 'it came to pass.'
- source_word: מִקְצֵה
  chosen: at the end of
  alternatives:
  - from the end of
  - after
  lexicon: HALOT
  rationale: The preposition מן with קצה yields the temporal sense 'at/from the end
    of.' 'At the end of' is the most natural English rendering while preserving the
    temporal boundary idea more precisely than the looser 'after.'
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: three days
  lexicon: HALOT
  rationale: Straightforward cardinal-plus-noun temporal expression. No expansion
    is needed.
- source_word: וַיַּעַבְרוּ
  chosen: went through
  alternatives:
  - passed through
  - crossed through
  lexicon: HALOT
  rationale: עבר commonly means 'pass over/through.' Here, with 'in the midst of the
    camp,' the sense is movement through the camp rather than crossing a boundary
    such as a river. 'Went through' is idiomatic and clear.
- source_word: הַשֹּׁטְרִים
  chosen: the officers
  alternatives:
  - the officials
  - the overseers
  lexicon: HALOT
  rationale: In this administrative/military context, שֹׁטְרִים refers to appointed
    officers or officials who communicate and enforce instructions. 'Officers' best
    fits the camp setting and common usage in Joshua.
- source_word: בְּקֶרֶב
  chosen: through the midst of
  alternatives:
  - in the midst of
  - through
  lexicon: HALOT
  rationale: קרב means 'midst, inner part.' Combined with the motion verb, the phrase
    conveys movement through the interior of the camp. 'Through the midst of' preserves
    both the spatial imagery and the verbal motion.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: מחנה in this narrative refers to Israel's camp. 'Camp' is the standard,
    natural rendering.
