id: JOS.3.5
reference: Joshua 3:5
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יְהוֹשֻׁ֛עַ אֶל הָ/עָ֖ם הִתְקַדָּ֑שׁוּ כִּ֣י מָחָ֗ר יַעֲשֶׂ֧ה יְהוָ֛ה בְּ/קִרְבְּ/כֶ֖ם נִפְלָאֽוֹת־׃
translation:
  text: Then Joshua said to the people, “Consecrate yourselves, for tomorrow Yahweh will do wonders among you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your midst.”
    reason: lexical_alternative
  - marker: b
    text: Or “wonderful things”; the Hebrew refers to extraordinary acts of God that inspire awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence; 'and said' is more formally possible.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, following the policy to transliterate names rather than translate them.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: In this context עָם refers to the assembled Israelites as a collective body. 'The people' is the most natural and contextually precise English rendering.
- source_word: הִתְקַדָּשׁוּ
  chosen: Consecrate yourselves
  alternatives:
  - Sanctify yourselves
  - Prepare yourselves as holy
  lexicon: HALOT
  rationale: The hitpael imperative of קדשׁ calls for ritual and moral setting apart before divine action. 'Consecrate yourselves' preserves the holiness/set-apart sense better than the more archaic 'sanctify yourselves,' while avoiding an overly paraphrastic expansion.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in modern English, while 'for' would be more formal but less immediately transparent.
- source_word: מָחָר
  chosen: tomorrow
  lexicon: HALOT
  rationale: Straightforward temporal adverb indicating the imminent time of the LORD's action.
- source_word: יַעֲשֶׂה
  chosen: will do
  alternatives:
  - will perform
  - will act
  lexicon: HALOT
  rationale: עשה is broad and commonly rendered 'do/make.' Here 'will do' is idiomatic with the object 'wonders' and avoids over-specifying the action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּקִרְבְּכֶם
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: The phrase denotes presence in the midst of the people. 'Among you' is natural modern English and fits the communal setting; 'in your midst' is slightly more formal and is preserved as an alternative.
- source_word: נִפְלָאוֹת
  chosen: wonders
  alternatives:
  - wonderful things
  - miracles
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary acts that inspire awe. 'Wonders' preserves the biblical register and breadth without narrowing the term to 'miracles' alone.
