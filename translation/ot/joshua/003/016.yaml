id: JOS.3.16
reference: Joshua 3:16
source:
  edition: WLC
  text: וַ/יַּעַמְד֡וּ הַ/מַּיִם֩ הַ/יֹּרְדִ֨ים מִ/לְ/מַ֜עְלָ/ה קָ֣מוּ נֵד אֶחָ֗ד
    הַרְחֵ֨ק מְאֹ֜ד ב/אדם הָ/עִיר֙ אֲשֶׁר֙ מִ/צַּ֣ד צָֽרְתָ֔ן וְ/הַ/יֹּרְדִ֗ים עַ֣ל
    יָ֧ם הָ/עֲרָבָ֛ה יָם הַ/מֶּ֖לַח תַּ֣מּוּ נִכְרָ֑תוּ וְ/הָ/עָ֥ם עָבְר֖וּ נֶ֥גֶד
    יְרִיחֽוֹ־־׃
translation:
  text: the waters flowing down from above stood still; they rose up in one heap,
    very far away, at Adam, the city beside Zarethan. And those flowing down toward
    the Sea of the Arabah, the Salt Sea, were completely cut off, and the people crossed
    over opposite Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they stood up as one heap.' The Hebrew imagery emphasizes the waters
      massing together in a single piled barrier.
    reason: lexical_alternative
  - marker: b
    text: '''The Salt Sea'' is the body of water later commonly called the Dead Sea.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  chosen: stood still
  alternatives:
  - stood
  - stopped
  lexicon: HALOT
  rationale: From עמד, here describing the river waters ceasing their normal movement.
    'Stood still' communicates both the literal standing and the contextual stoppage
    of flow.
- source_word: הַמַּיִם הַיֹּרְדִים מִלְמַעְלָה
  chosen: the waters flowing down from above
  alternatives:
  - the waters coming down from upstream
  - the waters descending from above
  lexicon: HALOT
  rationale: The participle ירדים with מִלְמַעְלָה refers to the upstream waters descending
    from higher elevation. 'Flowing down from above' is natural English while preserving
    the directional sense.
- source_word: קָמוּ נֵד אֶחָד
  chosen: they rose up in one heap
  alternatives:
  - they stood up as one heap
  - they piled up in a single mound
  lexicon: HALOT
  rationale: קום + נֵד depicts the waters massing upright as a single piled barrier.
    'One heap' preserves the concrete imagery and echoes similar miracle language
    without over-paraphrase.
- source_word: הַרְחֵק מְאֹד
  chosen: very far away
  alternatives:
  - far off
  - at a great distance
  lexicon: HALOT
  rationale: The infinitive absolute/adverbial form intensifies distance. 'Very far
    away' is straightforward modern English.
- source_word: בְאָדָם
  chosen: at Adam
  alternatives:
  - at the town of Adam
  lexicon: HALOT
  rationale: Here אדם is a place name, not the common noun 'man/humankind.' It is
    therefore transliterated as 'Adam' in keeping with the philosophy of transliterating
    names.
- source_word: הָעִיר אֲשֶׁר מִצַּד צָרְתָן
  chosen: the city beside Zarethan
  alternatives:
  - the city that is beside Zarethan
  - the city near Zarethan
  lexicon: HALOT
  rationale: מִצַּד indicates proximity/adjacency. 'Beside' is concise and preserves
    the locational note.
- source_word: וְהַיֹּרְדִים עַל יָם הָעֲרָבָה
  chosen: And those flowing down toward the Sea of the Arabah
  alternatives:
  - And the waters going down to the Sea of the Arabah
  - And those descending to the Arabah Sea
  lexicon: HALOT
  rationale: The participle resumes the downstream waters. עַל with a body of water
    here has directional force toward. 'Sea of the Arabah' preserves the construct
    relation.
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Salt Sea (that is, the Dead Sea)
  - the Sea of Salt
  lexicon: HALOT
  rationale: This is the Hebrew designation for the body later commonly called the
    Dead Sea. 'Salt Sea' is the direct translation and should remain in the main text.
- source_word: תַּמּוּ נִכְרָתוּ
  chosen: were completely cut off
  alternatives:
  - came to an end; they were cut off
  - were finished, cut off
  lexicon: HALOT
  rationale: The paired verbs intensify the total cessation of the downstream flow.
    'Were completely cut off' captures the cumulative force in idiomatic English.
- source_word: וְהָעָם עָבְרוּ
  chosen: and the people crossed over
  alternatives:
  - and the people crossed
  - and the people passed over
  lexicon: HALOT
  rationale: עבר in this narrative context refers to crossing the Jordan. 'Crossed
    over' is natural and retains the motion across a boundary.
- source_word: נֶגֶד יְרִיחוֹ
  chosen: opposite Jericho
  alternatives:
  - across from Jericho
  - in front of Jericho
  lexicon: HALOT
  rationale: נֶגֶד marks position facing or opposite a location. 'Opposite Jericho'
    is the most direct geographical rendering.
