id: JOS.3.8
reference: Joshua 3:8
source:
  edition: WLC
  text: וְ/אַתָּ֗ה תְּצַוֶּה֙ אֶת הַ/כֹּ֣הֲנִ֔ים נֹשְׂאֵ֥י אֲרֽוֹן הַ/בְּרִ֖ית לֵ/אמֹ֑ר
    כְּ/בֹאֲ/כֶ֗ם עַד קְצֵה֙ מֵ֣י הַ/יַּרְדֵּ֔ן בַּ/יַּרְדֵּ֖ן תַּעֲמֹֽדוּ־־־׃פ
translation:
  text: And you shall command the priests who carry the ark of the covenant, saying,
    ‘When you come to the edge of the waters of the Jordan, you shall stand in the
    Jordan.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the brink of the waters of the Jordan.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: And you
  alternatives:
  - Now you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a direct continuation
    with emphasis on Joshua as the addressee. 'And you' preserves both the connective
    and the explicit pronoun without sounding overly stiff.
- source_word: תְּצַוֶּה
  chosen: shall command
  alternatives:
  - command
  - give orders to
  lexicon: HALOT
  rationale: Piel imperfect 2ms of צוה expresses an instruction Joshua is to give.
    'Shall command' fits the directive force and maintains the formal tone of the
    narrative.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים; definite article preserved.
- source_word: נֹשְׂאֵי
  chosen: who carry
  alternatives:
  - bearing
  - carrying
  lexicon: HALOT
  rationale: Qal participle plural in construct modifying 'the priests.' Relative
    clause English is the most natural way to express the attributive participle.
- source_word: אֲרוֹן הַבְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: Conventional but textually precise rendering of the construct chain.
    'Ark of the covenant' is clear and preserves the covenantal significance.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the command.
- source_word: כְּבֹאֲכֶם
  chosen: When you come
  alternatives:
  - as you come
  - when you enter
  lexicon: HALOT
  rationale: Temporal sense of כ plus infinitive construct with suffix. 'When you
    come' is idiomatic and sufficiently literal.
- source_word: עַד קְצֵה מֵי הַיַּרְדֵּן
  chosen: to the edge of the waters of the Jordan
  alternatives:
  - up to the edge of the waters of the Jordan
  - to the brink of the waters of the Jordan
  lexicon: HALOT
  rationale: The phrase denotes reaching the extremity or edge of the Jordan's waters.
    'Edge' is natural English; 'waters of the Jordan' preserves the Hebrew genitive
    construction.
- source_word: בַּיַּרְדֵּן
  chosen: in the Jordan
  alternatives:
  - in the Jordan River
  lexicon: HALOT
  rationale: The preposition ב marks location. Since 'Jordan' in English commonly
    refers to the river in this context, 'in the Jordan' is sufficient and closer
    to the Hebrew wording.
- source_word: תַּעֲמֹדוּ
  chosen: you shall stand
  alternatives:
  - you shall stop
  - you shall remain standing
  lexicon: HALOT
  rationale: 'Qal imperfect 2mp of עמד here gives the command''s content: the priests
    are to take their stand in the river. ''Stand'' is the most direct rendering.'
