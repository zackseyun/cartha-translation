theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering הַכֹּהֲנִים הַלְוִיִּם
  chosen_reading: the Levitical priests
  alternative_readings:
  - the priests, the Levites
  rationale: The phrase identifies the priests as Levites rather than introducing a second group. The chosen rendering is clearer in modern English while preserving the underlying sense. The alternative is worth preserving because some readers may hear a more formal appositional structure in the Hebrew.
