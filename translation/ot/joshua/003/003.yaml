id: JOS.3.3
reference: Joshua 3:3
source:
  edition: WLC
  text: וַ/יְצַוּוּ֮ אֶת הָ/עָ֣ם לֵ/אמֹר֒ כִּ/רְאֽוֹתְ/כֶ֗ם אֵ֣ת אֲר֤וֹן בְּרִית יְהוָה֙ אֱלֹ֣הֵי/כֶ֔ם וְ/הַ/כֹּֽהֲנִים֙ הַ/לְוִיִּ֔ם נֹשְׂאִ֖ים אֹת֑/וֹ וְ/אַתֶּ֗ם תִּסְעוּ֙ מִ/מְּק֣וֹמְ/כֶ֔ם וַ/הֲלַכְתֶּ֖ם אַחֲרָֽי/ו־־׃
translation:
  text: And they commanded the people, saying, “When you see the ark of the covenant of Yahweh your God, and the Levitical priests carrying it, then you shall set out from your place and go after it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the priests, the Levites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוּוּ
  chosen: they commanded
  alternatives:
  - they gave orders to
  - they instructed
  lexicon: HALOT
  rationale: The piel of צוה commonly denotes giving a command or charge. 'They commanded' is a clear, direct rendering that preserves the authoritative force without unnecessary expansion.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  - the populace
  lexicon: HALOT
  rationale: עם here refers to the assembled Israelites as a collective body. 'The people' is the standard and natural English equivalent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: This infinitive introduces direct speech in a conventional Hebrew way. 'Saying' preserves the discourse structure straightforwardly.
- source_word: כִּרְאֹתְכֶם
  chosen: When you see
  alternatives:
  - as soon as you see
  - upon your seeing
  lexicon: HALOT
  rationale: The preposition כ with the infinitive construct plus suffix functions temporally here. 'When you see' is idiomatic English and preserves the temporal sense without over-specifying immediacy.
- source_word: אֲרוֹן בְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  - the chest of the covenant
  lexicon: HALOT
  rationale: '''Ark of the covenant'' is the established and accurate rendering for אֲרוֹן בְּרִית, and ''ark'' is the normal English equivalent in this cultic context.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: In construct with YHWH, this yields 'the LORD your God,' a standard covenantal expression.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the Levitical priesthood
  lexicon: HALOT
  rationale: The Hebrew apposition can be rendered woodenly as 'the priests, the Levites,' but in idiomatic English 'the Levitical priests' communicates the same referent clearly. This avoids implying two separate groups while preserving the tribal identification.
- source_word: נֹשְׂאִים אֹתוֹ
  chosen: carrying it
  alternatives:
  - bearing it
  lexicon: HALOT
  rationale: נשא in this context means to carry or bear. 'Carrying it' is natural modern English; 'bearing it' is possible but more formal.
- source_word: תִּסְעוּ
  chosen: you shall set out
  alternatives:
  - you shall break camp
  - you shall depart
  lexicon: HALOT
  rationale: נסע often refers to setting out on a journey, especially from a camp or place of encampment. 'Set out' captures the movement command without importing the more specific 'break camp,' which the immediate wording does not explicitly state.
- source_word: מִמְּקוֹמְכֶם
  chosen: from your place
  alternatives:
  - from where you are
  - from your position
  lexicon: HALOT
  rationale: The noun מקום is broad. 'From your place' is sufficiently literal and fits the movement context.
- source_word: וַהֲלַכְתֶּם אַחֲרָיו
  chosen: and go after it
  alternatives:
  - and follow it
  - and walk after it
  lexicon: HALOT
  rationale: הלך + אחרי means to go/walk after, i.e., follow. 'Go after it' preserves the spatial imagery and avoids over-idiomatizing, though 'follow it' is a viable alternative.
