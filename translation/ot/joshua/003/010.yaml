id: JOS.3.10
reference: Joshua 3:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוֹשֻׁ֔עַ בְּ/זֹאת֙ תֵּֽדְע֔וּ/ן כִּ֛י אֵ֥ל חַ֖י בְּ/קִרְבְּ/כֶ֑ם
    וְ/הוֹרֵ֣שׁ יוֹרִ֣ישׁ מִ֠/פְּנֵי/כֶם אֶת הַ/כְּנַעֲנִ֨י וְ/אֶת הַ/חִתִּ֜י וְ/אֶת
    הַ/חִוִּ֗י וְ/אֶת הַ/פְּרִזִּי֙ וְ/אֶת הַ/גִּרְגָּשִׁ֔י וְ/הָ/אֱמֹרִ֖י וְ/הַ/יְבוּסִֽי־־־־־׃
translation:
  text: And Joshua said, “By this you will know that the living God is among you,
    and that he will surely drive out from before you the Canaanites, the Hittites,
    the Hivites, the Perizzites, the Girgashites, the Amorites, and the Jebusites.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he will surely dispossess.” The Hebrew verb emphasizes certain removal
      from the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Joshua's speech. 'And' preserves
    Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: בְּזֹאת
  chosen: By this
  alternatives:
  - In this
  - From this
  lexicon: HALOT
  rationale: Instrumental/demonstrative sense fits the context of a sign by which
    Israel will know YHWH's action. 'By this' is idiomatic and close to the Hebrew.
- source_word: תֵּדְעוּן
  chosen: you will know
  alternatives:
  - you shall know
  lexicon: HALOT
  rationale: Imperfect 2mp with future sense in context. 'Will know' is modern English
    while preserving the predictive force.
- source_word: אֵל חַי
  chosen: the living God
  alternatives:
  - a living God
  - God who lives
  lexicon: HALOT
  rationale: Anarthrous predicate phrase used qualitatively/definitely in context;
    'the living God' is the natural English rendering and conveys the contrast with
    powerless gods without adding interpretation.
- source_word: בְּקִרְבְּכֶם
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: Refers to God's presence in the midst of the people. 'Among you' is clear
    modern English; 'within you' could wrongly suggest inward individual indwelling.
- source_word: וְהוֹרֵשׁ יוֹרִישׁ
  chosen: he will surely drive out
  alternatives:
  - he will certainly dispossess
  - he will indeed drive out
  lexicon: HALOT
  rationale: Infinitive absolute + finite verb intensifies certainty. 'Will surely
    drive out' captures the emphatic force and fits the object list of peoples. 'Dispossess'
    is possible but less natural in contemporary English.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - before you
  - out ahead of you
  lexicon: HALOT
  rationale: Literally 'from before your face/presence'; 'from before you' preserves
    the Hebrew spatial idiom and the sense of removal in Israel's path.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular collective, English idiom prefers the
    plural ethnonym when listing peoples.
- source_word: הַחִתִּי
  chosen: the Hittites
  alternatives:
  - the Hittite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym for natural English in a list of nations/peoples.
- source_word: הַחִוִּי
  chosen: the Hivites
  alternatives:
  - the Hivite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym for natural English in a list of nations/peoples.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  alternatives:
  - the Perizzite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym for natural English in a list of nations/peoples.
- source_word: הַגִּרְגָּשִׁי
  chosen: the Girgashites
  alternatives:
  - the Girgashite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym for natural English in a list of nations/peoples.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym for natural English in a list of nations/peoples.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym for natural English in a list of nations/peoples.
