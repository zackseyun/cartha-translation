theological_decisions:
- issue: Rendering the divine name conceptually present in context but not written
    here as אֵל rather than YHWH
  chosen_reading: the living God
  alternative_readings:
  - the living Mighty One
  rationale: The verse uses אֵל חַי, not the Tetragrammaton. Therefore the contested-term
    policy for יְהוָה does not apply directly here. 'God' is the standard contextual
    rendering of אֵל in this construction and preserves the theological claim of God's
    living presence without importing the covenant name into the line.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms table
    for יְהוָה not applicable to this verse'
- issue: Rendering the conquest verb without softening its force
  chosen_reading: he will surely drive out
  alternative_readings:
  - he will surely dispossess
  rationale: The Hebrew expresses decisive removal of the listed peoples. 'Drive out'
    preserves the force of the text while remaining readable; it avoids minimizing
    the action or importing later theological rationalizations.
  doctrine_reference: 'DOCTRINE.md: Never paraphrase beyond what the source text warrants;
    optimal equivalence'
