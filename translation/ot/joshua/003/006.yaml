theological_decisions:
- issue: Rendering of covenant terminology in a cultic setting
  chosen_reading: the ark of the covenant
  alternative_readings:
  - the covenant ark
  rationale: The phrase refers to the sacred ark associated with the LORD's covenant.
    The traditional rendering remains the clearest and most transparent, without importing
    additional theological interpretation beyond the Hebrew construct phrase.
