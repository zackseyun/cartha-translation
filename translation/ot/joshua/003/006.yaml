id: JOS.3.6
reference: Joshua 3:6
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוֹשֻׁ֨עַ֙ אֶל הַ/כֹּהֲנִ֣ים לֵ/אמֹ֔ר שְׂאוּ֙ אֶת אֲר֣וֹן הַ/בְּרִ֔ית
    וְ/עִבְר֖וּ לִ/פְנֵ֣י הָ/עָ֑ם וַ/יִּשְׂאוּ֙ אֶת אֲר֣וֹן הַ/בְּרִ֔ית וַ/יֵּלְכ֖וּ
    לִ/פְנֵ֥י הָ/עָֽם־־־׃ס
translation:
  text: Then Joshua said to the priests, “Take up the ark of the covenant and cross
    over before the people.” So they took up the ark of the covenant and went before
    the people.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence; 'and ... said' is more formally
    literal but less idiomatic here.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, following the
    principle to transliterate names rather than translate them.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Direct rendering of the definite plural noun for Israel's cultic officials.
- source_word: שְׂאוּ
  chosen: Take up
  alternatives:
  - Lift up
  - Carry
  lexicon: HALOT
  rationale: נשא in this context refers to lifting and bearing the ark. 'Take up'
    is idiomatic for assuming and carrying a sacred object, while preserving the concrete
    action better than the more interpretive 'carry'.
- source_word: אֲרוֹן הַבְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: 'This is the standard, transparent rendering of the construct phrase:
    ark/chest belonging to or associated with the covenant. It is both accurate and
    readily understood.'
- source_word: וְעִבְרוּ
  chosen: cross over
  alternatives:
  - pass over
  - go across
  lexicon: HALOT
  rationale: עבר commonly means to cross over or pass through. In the Jordan-crossing
    context, 'cross over' best anticipates the action without over-paraphrasing.
- source_word: לִפְנֵי הָעָם
  chosen: before the people
  alternatives:
  - ahead of the people
  - in front of the people
  lexicon: HALOT
  rationale: לִפְנֵי denotes position in front of. 'Before the people' is a natural
    and sufficiently formal rendering; 'ahead of' is possible but slightly more interpretive
    in tone.
- source_word: וַיִּשְׂאוּ
  chosen: they took up
  alternatives:
  - they lifted up
  - they carried
  lexicon: HALOT
  rationale: The narrative reports obedience using the same verb as the command. Rendering
    it again as 'took up' preserves lexical consistency with שְׂאוּ.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - walked
  - proceeded
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'to go/walk.' 'Went' is the most natural narrative
    English and avoids adding nuance not explicit in the Hebrew.
