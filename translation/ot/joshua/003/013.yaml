theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names the ark as belonging to YHWH. Following the project's
    doctrinal standard, the covenant name is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relationship of 'the Lord of all the earth' to the preceding phrase
  chosen_reading: 'Appositional title: ''the ark of the LORD, the Lord of all the
    earth'''
  alternative_readings:
  - '''the ark of the Lord of all the earth'''
  rationale: The Hebrew sequence can be read as apposition, identifying YHWH as 'the
    Lord of all the earth.' This preserves both titles without awkward compression
    and reflects the likely sense of the phrase in context.
