theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relationship of 'the Lord of all the earth' to the preceding phrase
  chosen_reading: 'Appositional title: ''the ark of the LORD, the Lord of all the earth'''
  alternative_readings:
  - '''the ark of the Lord of all the earth'''
  rationale: The Hebrew sequence can be read as apposition, identifying YHWH as 'the Lord of all the earth.' This preserves both titles without awkward compression and reflects the likely sense of the phrase in context.
