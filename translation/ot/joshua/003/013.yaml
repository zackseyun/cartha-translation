id: JOS.3.13
reference: Joshua 3:13
source:
  edition: WLC
  text: וְ/הָיָ֡ה כְּ/נ֣וֹחַ כַּפּ֣וֹת רַגְלֵ֣י הַ/כֹּהֲנִ֡ים נֹשְׂאֵי֩ אֲר֨וֹן יְהוָ֜ה
    אֲד֤וֹן כָּל הָ/אָ֨רֶץ֙ בְּ/מֵ֣י הַ/יַּרְדֵּ֔ן מֵ֤י הַ/יַּרְדֵּן֙ יִכָּ֣רֵת֔וּ/ן
    הַ/מַּ֥יִם הַ/יֹּרְדִ֖ים מִ/לְ/מָ֑עְלָ/ה וְ/יַעַמְד֖וּ נֵ֥ד אֶחָֽד־׃
translation:
  text: And when the soles of the feet of the priests carrying the ark of the LORD,
    the Lord of all the earth, come to rest in the waters of the Jordan, the waters
    of the Jordan flowing down from above will be cut off, and they will stand in
    one heap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ark of the Lord of all the earth.' The Hebrew can be read with
      'Lord of all the earth' closely linked to 'ark,' though the main text takes
      it as an appositional title for the LORD.
    reason: alternative_reading
  - marker: b
    text: Or, 'the waters coming down from upstream.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: Introduces the forthcoming circumstance/result. In English, the predictive
    formula is best carried by a smooth clause opening rather than a wooden 'and it
    shall be.'
- source_word: כְּנוֹחַ
  chosen: when ... come to rest
  alternatives:
  - as soon as ... rest
  - when ... settle
  lexicon: HALOT
  rationale: 'From נוח, indicating coming to rest or settling. With the prefixed כְּ,
    the sense is temporal: ''when/as soon as.'' ''Come to rest'' is natural English
    and preserves the concrete action.'
- source_word: כַּפּוֹת רַגְלֵי
  chosen: the soles of the feet
  alternatives:
  - the soles of the foot bottoms
  - the feet
  lexicon: HALOT
  rationale: כַּף can denote the palm/sole. The paired expression specifically refers
    to the undersides of the feet, so 'the soles of the feet' is the most precise
    rendering.
- source_word: הַכֹּהֲנִים נֹשְׂאֵי אֲרוֹן
  chosen: the priests carrying the ark
  alternatives:
  - the priests bearing the ark
  lexicon: HALOT
  rationale: נשא in participial form here describes the priests as those carrying/bearing
    the ark. 'Carrying' is more readable modern English than 'bearing' while preserving
    the sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֲדוֹן כָּל הָאָרֶץ
  chosen: the Lord of all the earth
  alternatives:
  - master of all the earth
  lexicon: HALOT
  rationale: A title appositional to 'the ark of the LORD.' 'Lord' fits the title
    sense and aligns with the doctrinal default for such divine lordship language.
- source_word: בְּמֵי הַיַּרְדֵּן
  chosen: in the waters of the Jordan
  alternatives:
  - into the waters of the Jordan
  - at the waters of the Jordan
  lexicon: HALOT
  rationale: The preposition בְּ with waters here indicates entry/contact within the
    river waters. 'In the waters of the Jordan' best matches the Hebrew while remaining
    idiomatic.
- source_word: מֵי הַיַּרְדֵּן
  chosen: the waters of the Jordan
  alternatives:
  - the Jordan's waters
  lexicon: HALOT
  rationale: The repeated phrase is retained in translation rather than collapsed,
    because the Hebrew repeats it for emphasis and clarity.
- source_word: יִכָּרֵתוּן
  chosen: will be cut off
  alternatives:
  - will be cut off from flowing
  - will be stopped
  lexicon: HALOT
  rationale: Niphal of כרת here conveys being cut off/stopped. 'Will be cut off' preserves
    the vividness and traditional force better than the flatter 'will stop.'
- source_word: הַמַּיִם הַיֹּרְדִים מִלְמָעְלָה
  chosen: the waters ... flowing down from above
  alternatives:
  - the waters coming down from upstream
  - the waters descending from above
  lexicon: HALOT
  rationale: The participle יֹרְדִים means 'going down/descending.' In river context,
    'flowing down from above' communicates both the literal downward movement and
    upstream source without over-paraphrasing.
- source_word: וְיַעַמְדוּ נֵד אֶחָד
  chosen: and they will stand in one heap
  alternatives:
  - and they will stand as one heap
  - and they will stand in a single mound
  lexicon: HALOT
  rationale: נֵד denotes a piled-up mass or heap, especially of waters. 'Stand in
    one heap' is idiomatic, vivid, and echoes the miraculous imagery also seen elsewhere
    in the Hebrew Bible.
