id: JOS.3.9
reference: Joshua 3:9
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוֹשֻׁ֖עַ אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל גֹּ֣שׁוּ הֵ֔נָּה וְ/שִׁמְע֕וּ
    אֶת דִּבְרֵ֖י יְהוָ֥ה אֱלֹֽהֵי/כֶֽם־־׃
translation:
  text: Joshua said to the sons of Israel, “Come here and hear the words of the LORD
    your God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the children of Israel” or “the Israelites.” The Hebrew is literally
      “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the most natural and contextually precise English rendering.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Common preposition marking the addressee of speech; 'to' is the idiomatic
    English equivalent here.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Because the philosophy prefers gender-accurate
    renderings over flattening to gender-neutral, the more formal 'sons of Israel'
    is retained in the main text. 'Israelites' is idiomatic but less transparent to
    the Hebrew expression.
- source_word: גֹּשׁוּ
  chosen: Come
  alternatives:
  - Draw near
  - Approach
  lexicon: HALOT
  rationale: Imperative plural from נגשׁ, calling the people to move nearer. 'Come'
    is natural modern English; the following adverb 'here' supplies the directional
    nuance. 'Draw near' is possible but sounds more formal than the context requires.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - this way
  lexicon: HALOT
  rationale: Directional adverb indicating movement toward the speaker's location;
    'here' is concise and idiomatic when paired with 'come.'
- source_word: וְשִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural from שׁמע. 'Hear' preserves the directness of the Hebrew
    and can include the sense of attentive listening in context.
- source_word: אֵת דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - the words from
  lexicon: HALOT
  rationale: Construct phrase meaning 'the words of.' 'Message' would be interpretive;
    'words of' stays closer to the source while remaining clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'Though morphologically plural in form, אֱלֹהִים with singular referent
    and in covenantal apposition to YHWH is rightly rendered singular: ''your God.''
    This reflects standard Hebrew usage for Israel''s God.'
