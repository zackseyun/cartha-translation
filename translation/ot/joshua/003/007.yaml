id: JOS.3.7
reference: Joshua 3:7
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל יְהוֹשֻׁ֔עַ הַ/יּ֣וֹם הַ/זֶּ֗ה אָחֵל֙ גַּדֶּלְ/ךָ֔ בְּ/עֵינֵ֖י כָּל יִשְׂרָאֵ֑ל אֲשֶׁר֙ יֵֽדְע֔וּ/ן כִּ֗י כַּ/אֲשֶׁ֥ר הָיִ֛יתִי עִם מֹשֶׁ֖ה אֶהְיֶ֥ה עִמָּֽ/ךְ־־־׃
translation:
  text: And Yahweh said to Joshua, “Today I will begin to make you great in the sight of all Israel, so that they may know that just as I was with Moses, I will be with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this day I begin to magnify you before all Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative.
- source_word: הַיּוֹם הַזֶּה
  chosen: Today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: The phrase literally means 'this day,' but 'Today' is a natural modern-English equivalent that preserves the temporal emphasis without archaism.
- source_word: אָחֵל
  chosen: I will begin
  alternatives:
  - I am beginning
  - I begin
  lexicon: HALOT
  rationale: Hiphil of חלל/חלל II in this idiom means 'begin.' With the immediate future sense in context, 'I will begin' best fits the divine declaration.
- source_word: גַּדֶּלְךָ
  chosen: to make you great
  alternatives:
  - to magnify you
  - to exalt you
  lexicon: HALOT
  rationale: גדל in the piel can mean to make great or magnify. 'Make you great' is clear modern English and preserves the idea of publicly elevating Joshua's status.
- source_word: בְּעֵינֵי כָּל יִשְׂרָאֵל
  chosen: in the sight of all Israel
  alternatives:
  - in the eyes of all Israel
  - before all Israel
  lexicon: HALOT
  rationale: The idiom 'in the eyes of' refers to public perception. 'In the sight of all Israel' preserves that public, visible sense in idiomatic English.
- source_word: אֲשֶׁר יֵדְעוּן
  chosen: so that they may know
  alternatives:
  - that they may know
  - in order that they will know
  lexicon: HALOT
  rationale: The clause expresses purpose/result. 'So that they may know' communicates the intended outcome naturally in English.
- source_word: כַּאֲשֶׁר הָיִיתִי עִם מֹשֶׁה
  chosen: just as I was with Moses
  alternatives:
  - as I was with Moses
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks comparison. 'Just as' brings out the explicit parallel between Moses and Joshua.
- source_word: אֶהְיֶה עִמָּךְ
  chosen: I will be with you
  alternatives:
  - I shall be with you
  lexicon: HALOT
  rationale: This is the straightforward future promise of divine presence. 'Will' is the most natural modern rendering.
