id: JOS.3.12
reference: Joshua 3:12
source:
  edition: WLC
  text: וְ/עַתָּ֗ה קְח֤וּ לָ/כֶם֙ שְׁנֵ֣י עָשָׂ֣ר אִ֔ישׁ מִ/שִּׁבְטֵ֖י יִשְׂרָאֵ֑ל
    אִישׁ אֶחָ֥ד אִישׁ אֶחָ֖ד לַ/שָּֽׁבֶט־־׃
translation:
  text: Now take for yourselves twelve men from the tribes of Israel, one man from
    each tribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''one man, one man for the tribe,'' a distributive expression meaning
      one representative from each tribe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces the next instruction in sequence. 'Now' is natural modern
    English while preserving the discourse transition; 'and' is not required in English
    here.
- source_word: קְחוּ לָכֶם
  chosen: take for yourselves
  alternatives:
  - choose for yourselves
  - take
  lexicon: HALOT
  rationale: The imperative of לקח with לָכֶם naturally conveys taking/selecting for
    the group's own purpose. 'Take for yourselves' preserves both the command and
    the reflexive/dative nuance better than a bare 'take.'
- source_word: שְׁנֵי עָשָׂר אִישׁ
  chosen: twelve men
  alternatives:
  - twelve menfolk
  - twelve persons
  lexicon: HALOT
  rationale: אִישׁ here refers to male representatives from each tribe, not a gender-neutral
    group. 'Men' is gender-accurate and fits the representative context.
- source_word: מִשִּׁבְטֵי יִשְׂרָאֵל
  chosen: from the tribes of Israel
  alternatives:
  - from Israel's tribes
  lexicon: HALOT
  rationale: A straightforward genitival construction indicating source/origin. 'The
    tribes of Israel' is the clearest idiomatic English rendering.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד לַשָּׁבֶט
  chosen: one man from each tribe
  alternatives:
  - one man, one man for the tribe
  - one man for each tribe
  lexicon: HALOT
  rationale: The distributive repetition אִישׁ אֶחָד אִישׁ אֶחָד emphasizes one representative
    per tribe. English idiom is best captured by 'one man from each tribe.' 'From'
    is slightly more natural than 'for' in this selection context, while preserving
    the sense of tribal representation.
