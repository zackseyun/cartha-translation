id: JOS.3.17
reference: Joshua 3:17
source:
  edition: WLC
  text: וַ/יַּעַמְד֣וּ הַ/כֹּהֲנִ֡ים נֹ֠שְׂאֵי הָ/אָר֨וֹן בְּרִית יְהוָ֜ה בֶּ/חָֽרָבָ֛ה
    בְּ/ת֥וֹךְ הַ/יַּרְדֵּ֖ן הָכֵ֑ן וְ/כָל יִשְׂרָאֵ֗ל עֹֽבְרִים֙ בֶּ/חָ֣רָבָ֔ה עַ֤ד
    אֲשֶׁר תַּ֨מּוּ֙ כָּל הַ/גּ֔וֹי לַ/עֲבֹ֖ר אֶת הַ/יַּרְדֵּֽן־־־־־׃
translation:
  text: And the priests carrying the ark of the covenant of the LORD stood firmly
    on dry ground in the middle of the Jordan, while all Israel was crossing on dry
    ground until the whole nation had finished crossing the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ark of the LORD's covenant.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'stood firmly'; the adverb emphasizes that the priests remained fixed
      in place in the riverbed.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the people'; Hebrew 'the whole nation' uses a singular collective
      term for Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  chosen: stood
  alternatives:
  - came to a stand
  - remained standing
  lexicon: HALOT
  rationale: Qal wayyiqtol of עמד denotes taking/maintaining a standing position.
    'Stood' is the natural English narrative equivalent.
- source_word: הַכֹּהֲנִים נֹשְׂאֵי
  chosen: the priests carrying
  alternatives:
  - the priests who bore
  - the priests bearing
  lexicon: HALOT
  rationale: The participle נֹשְׂאֵי modifies 'the priests' and indicates their ongoing
    role/action. 'Carrying' is readable modern English; 'bearing' is more formal but
    less natural.
- source_word: הָאָרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: Construct chain rendered transparently. יְהוָה follows the doctrinal
    default 'the LORD.' Either English order is possible; this one preserves the Hebrew
    structure closely.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD.'
- source_word: בֶּחָרָבָה
  chosen: on dry ground
  alternatives:
  - on dry land
  - on the dry ground
  lexicon: HALOT
  rationale: The noun denotes dry ground/land exposed from water. 'On dry ground'
    is idiomatic in English and matches the miracle context. Repeated consistently
    for both occurrences in the verse.
- source_word: בְּתוֹךְ הַיַּרְדֵּן
  chosen: in the middle of the Jordan
  alternatives:
  - in the midst of the Jordan
  - within the Jordan
  lexicon: HALOT
  rationale: בְּתוֹךְ indicates the interior/middle. 'In the middle of the Jordan'
    communicates location clearly in modern English.
- source_word: הָכֵן
  chosen: firmly
  alternatives:
  - prepared
  - established
  - steadily
  lexicon: HALOT
  rationale: Here the adverb conveys firmness/stability of stance rather than preparation.
    'Firmly' fits the context of the priests standing immovably in the riverbed.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: while all Israel
  alternatives:
  - and all Israel
  - all Israel
  lexicon: HALOT
  rationale: The conjunction links simultaneous action with the priests' standing
    and Israel's crossing. 'While all Israel' makes the temporal overlap explicit
    in natural English.
- source_word: עֹבְרִים
  chosen: was crossing
  alternatives:
  - crossed
  - were crossing
  lexicon: HALOT
  rationale: The participle presents ongoing action. Collective singular 'all Israel
    was crossing' is idiomatic English, though plural is also possible.
- source_word: עַד אֲשֶׁר תַּמּוּ
  chosen: until ... had finished
  alternatives:
  - until ... were finished
  - until ... completed
  lexicon: HALOT
  rationale: תם in this form means to be complete/finished. The pluperfect-like English
    'had finished' fits the endpoint of the crossing action.
- source_word: כָּל הַגּוֹי
  chosen: the whole nation
  alternatives:
  - all the people
  - the entire people
  lexicon: HALOT
  rationale: Though גּוֹי can mean 'nation' or 'people,' here it refers to Israel
    corporately. 'The whole nation' preserves the singular collective force better
    than 'all the people.'
- source_word: לַעֲבֹר אֶת הַיַּרְדֵּן
  chosen: crossing the Jordan
  alternatives:
  - to cross the Jordan
  - passing over the Jordan
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses the action completed by the nation.
    In English, 'finished crossing the Jordan' is smoother than a more literal 'finished
    to cross.'
