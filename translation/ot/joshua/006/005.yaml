id: JOS.6.5
reference: Joshua 6:5
source:
  edition: WLC
  text: וְ/הָיָ֞ה בִּ/מְשֹׁ֣ךְ בְּ/קֶ֣רֶן הַ/יּוֹבֵ֗ל ב/שמע/כם אֶת ק֣וֹל הַ/שּׁוֹפָ֔ר
    יָרִ֥יעוּ כָל הָ/עָ֖ם תְּרוּעָ֣ה גְדוֹלָ֑ה וְ/נָ֨פְלָ֜ה חוֹמַ֤ת הָ/עִיר֙ תַּחְתֶּ֔י/הָ
    וְ/עָל֥וּ הָ/עָ֖ם אִ֥ישׁ נֶגְדּֽ/וֹ׀־־׃
translation:
  text: And when the ram's horn is drawn out, when you hear the sound of the trumpet,
    all the people shall raise a great shout, and the wall of the city will fall beneath
    itself, and the people shall go up, each man straight before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the ram's horn sounds long' or 'when the blast on the ram's horn
      is prolonged.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the wall of the city will fall beneath itself,' likely meaning it
      will collapse straight down.
    reason: lexical_alternative
  - marker: c
    text: Or 'each one straight ahead' or 'each man directly before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְשֹׁךְ
  chosen: is drawn out
  alternatives:
  - sounds long
  - is prolonged
  - is blown for a long blast
  lexicon: HALOT
  rationale: The infinitive construct of משׁך in this idiom refers to prolonging/drawing
    out the horn blast. 'Is drawn out' preserves the underlying verbal image while
    remaining intelligible. Alternatives like 'sounds long' are smoother but less
    tied to the Hebrew verb.
- source_word: קֶרֶן הַיּוֹבֵל
  chosen: the ram's horn
  alternatives:
  - the horn of the jubilee
  - the horn
  lexicon: HALOT
  rationale: In this context יוֹבֵל refers to a ram or ram's horn used as a wind instrument,
    not to the later technical sense 'jubilee.' 'Ram's horn' gives the plain contextual
    sense.
- source_word: ק֣וֹל הַשּׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the sound of the horn
  - the sound of the shofar
  lexicon: HALOT
  rationale: שׁוֹפָר is a horn/trumpet. 'Trumpet' is natural modern English, while
    'sound of the trumpet' preserves קול. 'Shofar' is possible but would transliterate
    a common noun rather than translate it.
- source_word: יָרִיעוּ
  chosen: shall raise
  alternatives:
  - shall shout
  - shall give a war cry
  lexicon: HALOT
  rationale: The verb means to raise a shout/cry out. Because the direct object תְּרוּעָה
    follows, English idiom is best represented by 'raise a great shout' rather than
    the less natural 'shout a great shout.'
- source_word: תְּרוּעָה גְדוֹלָה
  chosen: a great shout
  alternatives:
  - a loud shout
  - a great war cry
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud shout, battle cry, or blast. Here, since
    the trumpet sound has already been mentioned separately, the people's response
    is best rendered 'a great shout.' 'War cry' is possible but slightly more interpretive.
- source_word: וְנָפְלָה
  chosen: will fall
  alternatives:
  - shall fall
  lexicon: HALOT
  rationale: The qatal with prefixed waw in this sequence carries future/result sense
    after the preceding instructions. 'Will fall' is idiomatic contemporary English.
- source_word: תַּחְתֶּיהָ
  chosen: beneath itself
  alternatives:
  - in its place
  - under it
  lexicon: HALOT
  rationale: The phrase literally means 'under/beneath itself,' conveying collapse
    downward. 'Beneath itself' preserves the vivid Hebrew image better than the interpretive
    'in its place.'
- source_word: וְעָלוּ
  chosen: shall go up
  alternatives:
  - shall ascend
  - shall charge up
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' In siege context it may imply advancing upward
    into the city, but 'go up' preserves the basic sense without overinterpreting
    military nuance.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with distributive force.
    Per the project's gender-accurate policy, 'each man' best matches the source form
    and likely military context.
- source_word: נֶגְדּוֹ
  chosen: straight before him
  alternatives:
  - directly ahead
  - opposite him
  lexicon: HALOT
  rationale: The phrase indicates moving straight forward, each at the point in front
    of him. 'Straight before him' preserves the distributive spatial sense more closely
    than the more dynamic 'directly ahead.'
