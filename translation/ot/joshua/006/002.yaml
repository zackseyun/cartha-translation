id: JOS.6.2
reference: Joshua 6:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל יְהוֹשֻׁ֔עַ רְאֵה֙ נָתַ֣תִּי בְ/יָֽדְ/ךָ֔ אֶת יְרִיח֖וֹ וְ/אֶת מַלְכָּ֑/הּ גִּבּוֹרֵ֖י הֶ/חָֽיִל־־־׃
translation:
  text: And Yahweh said to Joshua, “See, I have given Jericho into your hand, along with its king and the mighty men of valor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the mighty warriors' or 'the valiant warriors.' The Hebrew phrase combines ideas of strength and martial valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md, preserving the traditional small-caps covenantal form in English.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'And ... said' preserves the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה functions as an attention-getter. 'See' is natural modern English and preserves the direct force better than the more archaic 'behold.'
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I have delivered
  lexicon: HALOT
  rationale: The perfect expresses a completed action from the speaker's perspective, here likely a prophetic/perfective assurance of certain victory. 'I have given' preserves that force better than a simple present.
- source_word: בְיָדְךָ
  chosen: into your hand
  alternatives:
  - into your power
  - over to you
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering something into someone's power. Retaining 'into your hand' preserves the idiom while remaining understandable in English.
- source_word: יְרִיחוֹ
  chosen: Jericho
  rationale: Standard English transliteration of the place name.
- source_word: מַלְכָּהּ
  chosen: its king
  alternatives:
  - her king
  lexicon: HALOT
  rationale: The 3fs suffix refers to the city Jericho, which is grammatically feminine in Hebrew. English normally uses 'its' for a city here, avoiding an unnecessary personification while preserving the referent.
- source_word: גִּבּוֹרֵי הֶחָיִל
  chosen: the mighty men of valor
  alternatives:
  - the warriors
  - the valiant warriors
  - the mighty warriors
  lexicon: HALOT
  rationale: The phrase denotes strong, capable fighting men. 'Mighty men of valor' preserves both גבורי ('mighty men') and חיל ('valor/strength/military prowess'). 'Warriors' is possible but compresses the two-part expression and loses some of the Hebrew texture.
