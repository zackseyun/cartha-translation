theological_decisions:
- issue: Force of the perfect נָתַתִּי before the battle
  chosen_reading: A divine declaration of certain victory rendered as 'I have given'
  alternative_readings:
  - A present/future sense such as 'I am giving' or 'I will give'
  rationale: The Hebrew perfect here most naturally conveys the certainty of God's action as already determined. Rendering it 'I have given' preserves the theological emphasis on the LORD's sovereign grant without importing a more explicit doctrinal claim than the text itself makes.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
