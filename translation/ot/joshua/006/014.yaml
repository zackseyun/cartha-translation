id: JOS.6.14
reference: Joshua 6:14
source:
  edition: WLC
  text: וַ/יָּסֹ֨בּוּ אֶת הָ/עִ֜יר בַּ/יּ֤וֹם הַ/שֵּׁנִי֙ פַּ֣עַם אַחַ֔ת וַ/יָּשֻׁ֖בוּ
    הַֽ/מַּחֲנֶ֑ה כֹּ֥ה עָשׂ֖וּ שֵׁ֥שֶׁת יָמִֽים־׃
translation:
  text: On the second day they went around the city once and returned to the camp.
    This is what they did for six days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they circled the city once.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Thus they did six days,' meaning this pattern was repeated for six
      days.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  chosen: they went around
  alternatives:
  - they circled
  - they marched around
  lexicon: HALOT
  rationale: From סבב, meaning to go around or encircle. 'Went around' is natural
    modern English and preserves the motion without adding military nuance beyond
    the text.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עִיר normally denotes a city; 'city' is the standard and contextually
    appropriate rendering for Jericho.
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: On the second day
  alternatives:
  - on day two
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On the second day' is idiomatic and
    formally close to the Hebrew.
- source_word: פַּעַם אַחַת
  chosen: once
  alternatives:
  - one time
  lexicon: HALOT
  rationale: The Hebrew literally means 'one time/once.' 'Once' is the most natural
    concise English equivalent.
- source_word: וַיָּשֻׁבוּ
  chosen: and returned
  alternatives:
  - and went back
  lexicon: HALOT
  rationale: From שוב, 'return.' 'Returned' fits the narrative sequence and is slightly
    more formal than 'went back' without sounding archaic.
- source_word: הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - to camp
  lexicon: HALOT
  rationale: מַחֲנֶה means camp. English normally supplies the preposition with 'returned
    to the camp,' even though the Hebrew marks the destination directly.
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: כֹּה introduces the manner of action. 'This is what' makes the resumptive
    statement clear in contemporary English.
- source_word: עָשׂוּ
  chosen: they did
  alternatives:
  - they acted
  - they performed
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' 'They did' best matches the idiom with
    כֹּה in this summary statement.
- source_word: שֵׁשֶׁת יָמִים
  chosen: for six days
  alternatives:
  - six days
  lexicon: HALOT
  rationale: The Hebrew construct phrase denotes duration in context. English idiom
    prefers 'for six days' to express the repeated action over that span.
