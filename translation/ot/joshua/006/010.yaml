id: JOS.6.10
reference: Joshua 6:10
source:
  edition: WLC
  text: וְ/אֶת הָ/עָם֩ צִוָּ֨ה יְהוֹשֻׁ֜עַ לֵ/אמֹ֗ר לֹ֤א תָרִ֨יעוּ֙ וְ/לֹֽא תַשְׁמִ֣יעוּ
    אֶת קוֹלְ/כֶ֔ם וְ/לֹא יֵצֵ֥א מִ/פִּי/כֶ֖ם דָּבָ֑ר עַ֠ד י֣וֹם אָמְרִ֧/י אֲלֵי/כֶ֛ם
    הָרִ֖יעוּ וַ/הֲרִיעֹתֶֽם־־־־׃
translation:
  text: And Joshua commanded the people, saying, “Do not shout, and do not let your
    voice be heard, and do not let a word go out from your mouth until the day I say
    to you, ‘Shout!’ Then you shall shout.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'Do not raise a war cry' / 'Give no battle
      shout.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and no word shall go out from your mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave orders to
  - instructed
  lexicon: HALOT
  rationale: The verb denotes an authoritative command, stronger than mere instruction.
    'Commanded' best reflects the force in context.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: Though the context is military, the Hebrew term is the common word 'people.'
    'The people' preserves the source wording without over-specifying.
- source_word: לֹא תָרִיעוּ
  chosen: Do not shout
  alternatives:
  - Do not raise a war cry
  - Do not give a shout
  lexicon: HALOT
  rationale: רוע in the Hiphil commonly refers to raising a shout, often in battle
    or triumph. 'Shout' is natural English and leaves the exact nuance broad enough
    for the context.
- source_word: וְלֹא תַשְׁמִיעוּ אֶת קוֹלְכֶם
  chosen: do not let your voice be heard
  alternatives:
  - do not make your voice heard
  - do not sound your voice
  lexicon: HALOT
  rationale: 'The Hiphil of שׁמע here is causative: ''cause to be heard.'' The idiom
    is best rendered in natural English as ''do not let your voice be heard.'''
- source_word: וְלֹא יֵצֵא מִפִּיכֶם דָּבָר
  chosen: do not let a word go out from your mouth
  alternatives:
  - let no word come out of your mouth
  - do not speak a word
  lexicon: HALOT
  rationale: The Hebrew is singular 'a word' with the idiom 'go out from your mouth.'
    The chosen rendering stays close to the imagery while remaining readable. 'Do
    not speak a word' is smoother but less formally transparent.
- source_word: עַד יוֹם
  chosen: until the day
  alternatives:
  - until the time
  - up to the day
  lexicon: HALOT
  rationale: The phrase is temporal and straightforward. 'Until the day' preserves
    the concrete Hebrew expression.
- source_word: אָמְרִי אֲלֵיכֶם
  chosen: I say to you
  alternatives:
  - I tell you
  - I speak to you
  lexicon: HALOT
  rationale: 'The infinitive construct with first person suffix functions temporally:
    ''until the day of my saying to you.'' Rendering as ''I say to you'' is idiomatic
    and sufficiently close.'
- source_word: הָרִיעוּ
  chosen: Shout!
  alternatives:
  - Raise the shout!
  - Give a shout!
  lexicon: HALOT
  rationale: This is the direct command Joshua will later give. Repeating 'Shout!'
    preserves the lexical link with the earlier prohibition.
- source_word: וַהֲרִיעֹתֶם
  chosen: Then you shall shout
  alternatives:
  - and you shall shout
  - then you must shout
  lexicon: HALOT
  rationale: The prefixed waw after the quoted imperative is naturally consequential
    in English. 'Then you shall shout' captures the sequence and keeps the repetition
    of the same Hebrew root.
