id: JOS.6.3
reference: Joshua 6:3
source:
  edition: WLC
  text: וְ/סַבֹּתֶ֣ם אֶת הָ/עִ֗יר כֹּ֚ל אַנְשֵׁ֣י הַ/מִּלְחָמָ֔ה הַקֵּ֥יף אֶת הָ/עִ֖יר
    פַּ֣עַם אֶחָ֑ת כֹּ֥ה תַעֲשֶׂ֖ה שֵׁ֥שֶׁת יָמִֽים־־׃
translation:
  text: You shall march around the city, all the men of war, circling the city once.
    Thus you shall do for six days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the fighting men' or 'all the warriors.' The Hebrew is literally
      'all the men of war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסַבֹּתֶם
  chosen: you shall march around
  alternatives:
  - you shall go around
  - you shall encircle
  lexicon: HALOT
  rationale: From סבב, here a 2mp command-like form in instructional sequence. 'March
    around' fits the military setting better than the more neutral 'go around,' while
    still preserving the basic sense of moving around the city.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר with the article. Context identifies
    Jericho, but the Hebrew uses the common noun, so 'the city' is retained.
- source_word: כֹּל אַנְשֵׁי הַמִּלְחָמָה
  chosen: all the men of war
  alternatives:
  - all the fighting men
  - all the warriors
  lexicon: HALOT
  rationale: Literally 'all the men of the war/battle.' 'Men of war' is a natural,
    fairly formal English equivalent that preserves the masculine and military force
    of the Hebrew. This follows the gender-accurate principle rather than neutralizing
    to a broader term.
- source_word: הַקֵּיף
  chosen: circling
  alternatives:
  - going around
  - making a circuit around
  lexicon: HALOT
  rationale: From נקף/קוף in a causative/infinitival-like instruction, reinforcing
    the action of surrounding or making a circuit. Rendered as 'circling' to reflect
    the Hebrew's resumptive emphasis without awkward repetition.
- source_word: פַּעַם אֶחָת
  chosen: once
  alternatives:
  - one time
  lexicon: HALOT
  rationale: Idiomatic Hebrew for a single occurrence. 'Once' is the natural English
    equivalent.
- source_word: כֹּה
  chosen: thus
  alternatives:
  - in this way
  - so
  lexicon: HALOT
  rationale: Instructional adverb pointing to the prescribed manner. 'Thus' is concise
    and suitably formal in this command context.
- source_word: תַעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you are to do
  lexicon: HALOT
  rationale: Second masculine singular, addressing Joshua as the leader responsible
    to carry out the command. Singular should be preserved rather than flattened into
    plural.
- source_word: שֵׁשֶׁת יָמִים
  chosen: for six days
  alternatives:
  - six days
  lexicon: HALOT
  rationale: Duration of the repeated action. 'For six days' makes the iterative sense
    clear in English.
