theological_decisions:
- issue: Gender rendering of אַנְשֵׁי הַמִּלְחָמָה
  chosen_reading: all the men of war
  alternative_readings:
  - all the fighting men
  - all the warriors
  rationale: The Hebrew is grammatically and semantically masculine, referring to
    the male combatants. Per the doctrine's gender-accurate principle, the translation
    preserves this rather than using a gender-neutral expression like 'warriors' in
    the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Number shift in addressees
  chosen_reading: plural 'you shall march around' followed by singular 'you shall
    do'
  alternative_readings:
  - flatten both to plural
  - flatten both to singular
  rationale: The Hebrew shifts from 2mp to 2ms, likely moving from the people involved
    to Joshua as responsible leader. The English preserves this distinction as much
    as natural style allows.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 5
