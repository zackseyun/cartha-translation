id: JOS.6.8
reference: Joshua 6:8
source:
  edition: WLC
  text: וַ/יְהִ֗י כֶּ/אֱמֹ֣ר יְהוֹשֻׁעַ֮ אֶל הָ/עָם֒ וְ/שִׁבְעָ֣ה הַ/כֹּהֲנִ֡ים נֹשְׂאִים֩
    שִׁבְעָ֨ה שׁוֹפְר֤וֹת הַ/יּֽוֹבְלִים֙ לִ/פְנֵ֣י יְהוָ֔ה עָבְר֕וּ וְ/תָקְע֖וּ בַּ/שּֽׁוֹפָר֑וֹת
    וַֽ/אֲרוֹן֙ בְּרִ֣ית יְהוָ֔ה הֹלֵ֖ךְ אַחֲרֵי/הֶֽם־׃
translation:
  text: And it happened, when Joshua had spoken to the people, that the seven priests
    carrying the seven ram's-horn trumpets before the LORD passed on and blew the
    trumpets, and the ark of the covenant of the LORD went behind them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the seven shofars of the yobel''; this likely means ram''s-horn
      trumpets, though ''jubilee trumpets'' is a possible but less likely rendering
      in this context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the presence of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew discourse marker without archaic English.
- source_word: כֶּאֱמֹר
  chosen: when Joshua had spoken
  alternatives:
  - as Joshua said
  - when Joshua spoke
  lexicon: HALOT
  rationale: The infinitive construct with כ marks temporal sense, 'when/as [someone]
    spoke.' The perfective sense in context is well conveyed by English pluperfect,
    since the priests' action follows Joshua's speaking.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the assembled Israelite people addressed by Joshua,
    not specifically a military unit.
- source_word: שִׁבְעָה הַכֹּהֲנִים
  chosen: the seven priests
  lexicon: HALOT
  rationale: Straightforward numeral + noun phrase; definite in context.
- source_word: נֹשְׂאִים
  chosen: carrying
  alternatives:
  - bearing
  lexicon: HALOT
  rationale: Participial form describes the priests as those carrying the trumpets.
    'Carrying' is natural modern English; 'bearing' is more formal but less current.
- source_word: שִׁבְעָה שׁוֹפְרוֹת הַיֹּבְלִים
  chosen: the seven ram's-horn trumpets
  alternatives:
  - the seven jubilee trumpets
  - the seven horns of rams
  lexicon: HALOT
  rationale: שׁוֹפָר is a horn/trumpet, and יוֹבֵל in this context denotes ram or
    ram's horn rather than the later technical sense 'jubilee.' 'Ram's-horn trumpets'
    communicates both the material/source and the instrument function.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי indicates position before/in the presence of. The main text uses
    'the LORD' for יְהוָה per doctrine. Here it likely reflects procession before
    the ark as the symbol of the LORD's presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: עָבְרוּ
  chosen: passed on
  alternatives:
  - went on
  - crossed over
  - passed ahead
  lexicon: HALOT
  rationale: עבר here describes moving forward in procession, not crossing a boundary.
    'Passed on' fits the marching context and pairs naturally with the following verb.
- source_word: וְתָקְעוּ בַּשּׁוֹפָרוֹת
  chosen: and blew the trumpets
  alternatives:
  - and sounded the trumpets
  - and blasted on the horns
  lexicon: HALOT
  rationale: תקע with שופר means to blow/sound a horn. 'Blew the trumpets' is idiomatic
    and clear.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the LORD's covenant ark
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: Construct chain best represented transparently in English. This is the
    standard referent in Joshua and preserves the covenantal significance.
- source_word: הֹלֵךְ אַחֲרֵיהֶם
  chosen: went behind them
  alternatives:
  - was going after them
  - followed them
  lexicon: HALOT
  rationale: הלך participle plus אַחֲרֵי marks ongoing movement behind the priests
    in procession. 'Went behind them' preserves the spatial imagery more explicitly
    than the simpler 'followed them'.
