id: JOS.6.15
reference: Joshua 6:15
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י וַ/יַּשְׁכִּ֨מוּ֙ כַּ/עֲל֣וֹת הַ/שַּׁ֔חַר
    וַ/יָּסֹ֧בּוּ אֶת הָ/עִ֛יר כַּ/מִּשְׁפָּ֥ט הַ/זֶּ֖ה שֶׁ֣בַע פְּעָמִ֑ים רַ֚ק בַּ/יּ֣וֹם
    הַ/ה֔וּא סָבְב֥וּ אֶת הָ/עִ֖יר שֶׁ֥בַע פְּעָמִֽים׀־־׃
translation:
  text: And it happened on the seventh day that they rose early, at the going up of
    the dawn, and marched around the city in this manner seven times. Only on that
    day did they march around the city seven times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more simply, 'at dawn.' The Hebrew literally says 'at the going up of
      the dawn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And
    it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  lexicon: HALOT
  rationale: Straightforward temporal phrase with article; 'on the seventh day' is
    the natural English equivalent.
- source_word: וַיַּשְׁכִּמוּ
  chosen: they rose early
  alternatives:
  - they got up early
  - they started early
  lexicon: HALOT
  rationale: From שׁכם in the Hiphil, commonly meaning to rise early. 'Rose early'
    is idiomatic and sufficiently formal.
- source_word: כַּעֲלוֹת הַשַּׁחַר
  chosen: at the going up of the dawn
  alternatives:
  - at dawn
  - when the dawn came up
  - as dawn was rising
  lexicon: HALOT
  rationale: Literally 'as the dawn went up/rose.' The chosen rendering keeps the
    imagery of ascent more than a flattened 'at dawn,' while remaining understandable.
- source_word: וַיָּסֹבּוּ אֶת הָעִיר
  chosen: and marched around the city
  alternatives:
  - and went around the city
  - and circled the city
  lexicon: HALOT
  rationale: סבב means to go around, surround, or circle. In this military-processional
    context, 'marched around' best reflects the action in the Jericho narrative.
- source_word: כַּמִּשְׁפָּט הַזֶּה
  chosen: in this manner
  alternatives:
  - according to this rule
  - as before
  - according to this custom
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, ordinance, procedure, or customary manner.
    Here it refers to the prescribed procedure already described, so 'in this manner'
    is the clearest contextual rendering.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Standard numerical expression; no reason to expand beyond the plain sense.
- source_word: רַק
  chosen: Only
  alternatives:
  - Except that
  - However
  - But only
  lexicon: HALOT
  rationale: רַק marks limitation or exception. 'Only' clearly signals that this day
    differed from the previous days.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Temporal phrase with demonstrative; 'on that day' is slightly more explicit
    in English and fits the contrast introduced by רַק.
- source_word: סָבְבוּ אֶת הָעִיר
  chosen: did they march around the city
  alternatives:
  - they went around the city
  - they circled the city
  lexicon: HALOT
  rationale: 'Perfect form restating the action with emphasis after רַק. English fronted
    auxiliary ''did they march'' captures the marked emphasis: this was the one day
    on which the sevenfold circling occurred.'
