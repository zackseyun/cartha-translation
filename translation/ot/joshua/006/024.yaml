id: JOS.6.24
reference: Joshua 6:24
source:
  edition: WLC
  text: וְ/הָ/עִ֛יר שָׂרְפ֥וּ בָ/אֵ֖שׁ וְ/כָל אֲשֶׁר בָּ֑/הּ רַ֣ק הַ/כֶּ֣סֶף וְ/הַ/זָּהָ֗ב
    וּ/כְלֵ֤י הַ/נְּחֹ֨שֶׁת֙ וְ/הַ/בַּרְזֶ֔ל נָתְנ֖וּ אוֹצַ֥ר בֵּית יְהוָֽה־־׀־׃
translation:
  text: And they burned the city with fire, and everything that was in it. Only the
    silver and the gold, and the articles of bronze and iron, they put into the treasury
    of the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vessels of bronze and iron.' The Hebrew term can refer broadly to
      implements, utensils, or articles.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרְפוּ
  chosen: they burned
  alternatives:
  - they set on fire
  lexicon: HALOT
  rationale: Qal perfect 3cp of שׂרף, straightforwardly 'burned.' English keeps the
    active plural subject implied by the Hebrew verb.
- source_word: בָאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  lexicon: HALOT
  rationale: 'The preposition ב with אֵשׁ here is idiomatic for the means/instrument:
    ''with fire.'' This preserves the Hebrew expression without awkwardness.'
- source_word: וְכָל אֲשֶׁר בָּהּ
  chosen: and everything that was in it
  alternatives:
  - and all that was in it
  lexicon: HALOT
  rationale: כָל אֲשֶׁר בָּהּ denotes the total contents of the city. 'Everything
    that was in it' is natural modern English and preserves the comprehensiveness.
- source_word: רַק
  chosen: Only
  alternatives:
  - except that
  - however
  lexicon: HALOT
  rationale: רַק marks an exception to the destruction just described. 'Only' is concise
    and idiomatic in English.
- source_word: הַכֶּסֶף וְהַזָּהָב
  chosen: the silver and the gold
  alternatives:
  - silver and gold
  lexicon: HALOT
  rationale: The Hebrew includes the articles; English may omit them, but retaining
    'the' gives a slightly more formal, inventory-like sense fitting the context of
    dedicated spoil.
- source_word: וּכְלֵי הַנְּחֹשֶׁת וְהַבַּרְזֶל
  chosen: the articles of bronze and iron
  alternatives:
  - the vessels of bronze and iron
  - the utensils of bronze and iron
  lexicon: HALOT
  rationale: כְּלֵי is a broad term for objects/implements/vessels. 'Articles' is
    suitably broad and readable. נְחֹשֶׁת in this context is best rendered 'bronze'
    rather than 'copper,' since it commonly denotes bronze/brass-like metal in English
    Bible usage; 'bronze' is the most likely practical sense here.
- source_word: נָתְנוּ
  chosen: they put
  alternatives:
  - they gave
  - they placed
  lexicon: HALOT
  rationale: נתן has a broad semantic range. In this context of depositing valuables
    into a treasury, 'put' is natural and precise.
- source_word: אוֹצַר
  chosen: treasury
  alternatives:
  - storehouse
  - treasure
  lexicon: HALOT
  rationale: אוֹצָר here refers to a repository for valuables dedicated to sanctuary
    use. 'Treasury' best fits the cultic-financial context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is the standard expression 'house of the LORD.' 'Temple'
    would be anachronistically specific in Joshua's setting. Per doctrine, יְהוָה
    is rendered 'the LORD'.
