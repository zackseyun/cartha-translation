theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic destination of the metals
  chosen_reading: into the treasury of the house of the LORD
  alternative_readings:
  - into the treasury belonging to the house of the LORD
  rationale: The Hebrew construct chain indicates these items were set apart for the
    LORD's house rather than left among the destroyed spoil. The translation preserves
    the cultic dedication without adding interpretive detail beyond the text.
