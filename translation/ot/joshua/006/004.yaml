id: JOS.6.4
reference: Joshua 6:4
source:
  edition: WLC
  text: וְ/שִׁבְעָ֣ה כֹהֲנִ֡ים יִשְׂאוּ֩ שִׁבְעָ֨ה שׁוֹפְר֤וֹת הַ/יּֽוֹבְלִים֙ לִ/פְנֵ֣י
    הָ/אָר֔וֹן וּ/בַ/יּוֹם֙ הַ/שְּׁבִיעִ֔י תָּסֹ֥בּוּ אֶת הָ/עִ֖יר שֶׁ֣בַע פְּעָמִ֑ים
    וְ/הַ/כֹּ֣הֲנִ֔ים יִתְקְע֖וּ בַּ/שּׁוֹפָרֽוֹת־׃
translation:
  text: And seven priests shall carry seven ram’s-horn trumpets before the ark. On
    the seventh day you shall march around the city seven times, and the priests shall
    blow the trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “seven rams’ horns” or “seven shofars of ram’s horn.” The Hebrew phrase
      refers to horn instruments, likely made from ram’s horns.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ
  chosen: shall carry
  alternatives:
  - shall bear
  - are to carry
  lexicon: HALOT
  rationale: נשא commonly means 'carry, bear, lift.' 'Carry' is natural modern English
    and fits the concrete action of the priests with the instruments.
- source_word: שׁוֹפְרוֹת הַיֹּבְלִים
  chosen: ram’s-horn trumpets
  alternatives:
  - rams' horns
  - jubilee horns
  - shofars
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn/trumpet, often specifically a ram's horn; יֹבֵל/יּוֹבְלִים
    here qualifies the kind of horn. 'Ram’s-horn trumpets' preserves both the material/source
    and the instrument function better than a bare transliteration. 'Jubilee horns'
    would be misleading here, though the noun is related historically to the jubilee
    term.
- source_word: לִפְנֵי הָאָרוֹן
  chosen: before the ark
  alternatives:
  - in front of the ark
  - before the ark of the covenant
  lexicon: HALOT
  rationale: לִפְנֵי is spatially 'before/in front of.' 'Before the ark' is idiomatic
    and sufficiently precise. 'Ark of the covenant' adds words not present in this
    verse.
- source_word: תָּסֹבּוּ
  chosen: you shall march around
  alternatives:
  - you shall go around
  - you shall circle
  lexicon: HALOT
  rationale: סבב means 'go around, surround, circle.' In this military-processional
    context, 'march around' communicates the commanded action naturally without over-paraphrasing.
- source_word: פְּעָמִים
  chosen: times
  alternatives:
  - occasions
  lexicon: HALOT
  rationale: With a numeral after a repeated action, פְּעָמִים is best rendered 'times.'
- source_word: יִתְקְעוּ בַּשּׁוֹפָרוֹת
  chosen: shall blow the trumpets
  alternatives:
  - shall sound the trumpets
  - shall blow the horns
  lexicon: HALOT
  rationale: תקע with ב + שׁוֹפָר is the standard idiom for blowing/sounding a horn.
    'Blow the trumpets' is the clearest idiomatic English rendering. Because the instrument
    was already specified as ram’s-horn trumpets earlier in the verse, the shorter
    repetition here is acceptable and readable.
