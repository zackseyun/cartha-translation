theological_decisions:
- issue: Reason for placing Rahab and her household outside the camp
  chosen_reading: Render the spatial statement without importing an explanation.
  alternative_readings:
  - temporary ritual separation
  - protective custody
  - quarantine pending incorporation into Israel
  rationale: The Hebrew text states only that they were placed outside the camp of
    Israel. It does not explicitly explain why. To preserve theological and narrative
    tension, the translation leaves the reason unstated rather than building an interpretation
    into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
