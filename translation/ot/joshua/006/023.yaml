id: JOS.6.23
reference: Joshua 6:23
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ הַ/נְּעָרִ֣ים הַֽ/מְרַגְּלִ֗ים וַ/יֹּצִ֡יאוּ אֶת רָ֠חָב וְ/אֶת
    אָבִ֨י/הָ וְ/אֶת אִמָּ֤/הּ וְ/אֶת אַחֶ֨י/הָ֙ וְ/אֶת כָּל אֲשֶׁר לָ֔/הּ וְ/אֵ֥ת
    כָּל מִשְׁפְּחוֹתֶ֖י/הָ הוֹצִ֑יאוּ וַ/יַּ֨נִּיח֔וּ/ם מִ/ח֖וּץ לְ/מַחֲנֵ֥ה יִשְׂרָאֵֽל־־־־־־־־׃
translation:
  text: So the young men who had spied out the land went in and brought out Rahab,
    her father, her mother, her brothers, and all who belonged to her. They brought
    out all her families and placed them outside the camp of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that belonged to her.' The Hebrew expression may be broader than
      persons alone, though in context it likely refers chiefly to members of her
      household.
    reason: lexical_alternative
  - marker: b
    text: Or 'all her clans' or 'all her relatives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the youths
  - the servants
  lexicon: HALOT
  rationale: נַעַר commonly denotes a young male or young man. In this context it
    identifies the two Israelite spies as young men rather than generic servants,
    so 'the young men' is the most natural rendering.
- source_word: הַמְרַגְּלִים
  chosen: who had spied out the land
  alternatives:
  - the spies
  - who were spying
  lexicon: HALOT
  rationale: The participle from רגל functions attributively, identifying which young
    men are meant. Rendering it as a relative clause is smoother English while preserving
    the sense. 'Out the land' is supplied idiomatically because the verb in this context
    means to spy out a territory.
- source_word: וַיֹּצִיאוּ / הוֹצִיאוּ
  chosen: brought out
  alternatives:
  - led out
  - took out
  lexicon: HALOT
  rationale: יצא in the Hiphil means 'bring out' or 'cause to go out.' 'Brought out'
    fits both occurrences and preserves the repeated Hebrew verb without unnecessary
    variation.
- source_word: כָּל אֲשֶׁר לָהּ
  chosen: all who belonged to her
  alternatives:
  - all that she had
  - all that belonged to her
  lexicon: HALOT
  rationale: The phrase can be rendered broadly as all that was hers. In this rescue
    context, the referents are persons under her protection or household, so 'all
    who belonged to her' makes the likely personal reference clear while staying within
    the Hebrew sense.
- source_word: מִשְׁפְּחוֹתֶיהָ
  chosen: her families
  alternatives:
  - her clans
  - her relatives
  lexicon: HALOT
  rationale: מִשְׁפָּחָה often means clan or extended family group. The plural here
    likely refers to wider kin-groups connected to Rahab beyond the immediate household
    already listed. 'Families' is readable and sufficiently broad; 'clans' is possible
    but may sound overly technical in English.
- source_word: וַיַּנִּיחוּם
  chosen: placed them
  alternatives:
  - set them
  - left them
  lexicon: HALOT
  rationale: The verb נוח in Hiphil can mean to set down, place, or leave. Here it
    describes locating them in a safe place outside the camp, so 'placed them' best
    conveys deliberate positioning.
- source_word: מִחוּץ לְמַחֲנֵה יִשְׂרָאֵל
  chosen: outside the camp of Israel
  alternatives:
  - outside Israel's camp
  lexicon: HALOT
  rationale: This phrase is spatial and straightforward. 'Outside the camp of Israel'
    preserves the formal structure and likely reflects temporary separation before
    incorporation into Israel (cf. following context).
