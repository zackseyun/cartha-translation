id: JOS.6.11
reference: Joshua 6:11
source:
  edition: WLC
  text: וַ/יַּסֵּ֤ב אֲרוֹן יְהוָה֙ אֶת הָ/עִ֔יר הַקֵּ֖ף פַּ֣עַם אֶחָ֑ת וַ/יָּבֹ֨אוּ֙
    הַֽ/מַּחֲנֶ֔ה וַ/יָּלִ֖ינוּ בַּֽ/מַּחֲנֶֽה־־׃פ
translation:
  text: So the ark of the LORD went around the city, circling it once. Then they came
    into the camp and spent the night in the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the ark of the LORD went around the city, circling [it] once'';
      the wording personifies the ark as the subject, though it was carried by the
      priests.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  chosen: went around
  alternatives:
  - was brought around
  - circled
  lexicon: HALOT
  rationale: From סבב in the Hiphil/causative form, the clause idiomatically describes
    movement around the city. English 'went around' is natural and fits the narrative
    flow. 'Was brought around' is possible if the ark is understood as being carried,
    but the Hebrew presents the ark as the grammatical subject in a common narrative
    shorthand.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the LORD's ark
  lexicon: HALOT
  rationale: Standard construct rendering. Per doctrine, יְהוָה is rendered 'the LORD,'
    not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun referring to Jericho in context; 'the city' preserves the
    Hebrew wording without unnecessarily repeating the proper name.
- source_word: הַקֵּף
  chosen: circling it
  alternatives:
  - making a circuit
  - going around
  lexicon: HALOT
  rationale: Infinitive absolute from נקף/related circling expression intensifies
    or specifies the action of the preceding verb. Rendering it as 'circling it' preserves
    the emphatic sense without awkward literalism.
- source_word: פַּעַם אֶחָת
  chosen: once
  alternatives:
  - one time
  lexicon: HALOT
  rationale: Idiomatic English equivalent of 'one time/once.'
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they returned
  - they entered
  lexicon: HALOT
  rationale: Basic sense of בוא is 'come/enter.' Because the destination is the camp,
    'came into' is a straightforward rendering. 'Returned' is interpretive and not
    required by the verb itself.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - camp
  lexicon: HALOT
  rationale: Definite noun with the article; refers to Israel's camp.
- source_word: וַיָּלִינוּ
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: From לון, 'to lodge/spend the night.' 'Spent the night' is clear modern
    English.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - at the camp
  lexicon: HALOT
  rationale: Preposition ב plus noun is most naturally 'in the camp.' Repetition is
    retained because the Hebrew repeats the noun for emphasis and narrative clarity.
