theological_decisions:
- issue: Rendering חֵרֶם in a holy-war/judgment context
  chosen_reading: devoted to destruction
  alternative_readings:
  - the ban
  - accursed thing
  - devoted thing
  rationale: The Hebrew term denotes something placed under irrevocable dedication
    to God, ordinarily through destruction in this context. 'Devoted to destruction'
    preserves the theological gravity without relying on archaic or opaque traditional
    phrasing. This avoids importing later doctrinal language while still reflecting
    the covenant-judgment setting.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Interpreting תַּחֲרִימוּ as resultant self-incurring status
  chosen_reading: you yourselves become devoted to destruction
  alternative_readings:
  - you devote yourselves to destruction
  - you put yourselves under the ban
  rationale: In context, the warning is not merely that they would perform an act
    of devoting, but that by taking from the devoted things they would place themselves
    under the same judgment. The chosen rendering preserves that theological consequence
    without over-paraphrasing.
  doctrine_reference: Translation philosophy §§1, 3, 6
