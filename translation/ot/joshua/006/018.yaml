id: JOS.6.18
reference: Joshua 6:18
source:
  edition: WLC
  text: וְ/רַק אַתֶּם֙ שִׁמְר֣וּ מִן הַ/חֵ֔רֶם פֶּֽן תַּחֲרִ֖ימוּ וּ/לְקַחְתֶּ֣ם מִן
    הַ/חֵ֑רֶם וְ/שַׂמְתֶּ֞ם אֶת מַחֲנֵ֤ה יִשְׂרָאֵל֙ לְ/חֵ֔רֶם וַ/עֲכַרְתֶּ֖ם אוֹתֽ/וֹ־־־־־׃
translation:
  text: But as for you, keep yourselves from what is devoted to destruction, lest
    you yourselves become devoted to destruction and take some of what is devoted
    to destruction, and make the camp of Israel devoted to destruction, and bring
    trouble on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חֵרֶם (cherem), traditionally 'the ban' or 'the accursed thing';
      here it refers to persons or things irrevocably devoted to God for destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you put yourselves under the ban.'
    reason: alternative_reading
  - marker: c
    text: '''Bring trouble on it'' echoes the theme later seen in Achan''s sin and
      its consequences for Israel (Josh 7:1, 25).'
    reason: cross_reference
lexical_decisions:
- source_word: וְרַק
  chosen: But as for
  alternatives:
  - Only
  - But only
  lexicon: HALOT
  rationale: רַק adds restriction/emphasis, and with the prefixed conjunction introduces
    a strong contrastive warning after the preceding instructions. 'But as for' captures
    both the contrast and the direct address better than a bare 'only' in natural
    English.
- source_word: אַתֶּם
  chosen: you
  alternatives:
  - you yourselves
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. The emphasis is partly carried by
    'as for you' and later by 'you yourselves become devoted to destruction,' so the
    main text avoids overloading every clause with explicit emphasis.
- source_word: שִׁמְרוּ
  chosen: keep yourselves
  alternatives:
  - beware
  - guard yourselves
  lexicon: HALOT
  rationale: The verb שמר with מן commonly means to keep oneself from or guard oneself
    against something. 'Keep yourselves from' is idiomatic and preserves the reflexive
    force of the warning.
- source_word: מִן־הַחֵרֶם
  chosen: from what is devoted to destruction
  alternatives:
  - from the devoted thing
  - from the ban
  lexicon: HALOT
  rationale: חֵרֶם here refers to persons/things placed under total destruction or
    irrevocable dedication to God through destruction. 'What is devoted to destruction'
    communicates the sense more transparently than the traditional but opaque 'the
    accursed thing' or the technical 'the ban.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  lexicon: HALOT
  rationale: '''Lest'' best reflects the warning purpose clause in concise English.'
- source_word: תַּחֲרִימוּ
  chosen: you yourselves become devoted to destruction
  alternatives:
  - you put yourselves under the ban
  - you devote yourselves to destruction
  lexicon: HALOT
  rationale: The Hiphil of חרם can mean to devote to destruction. In this context,
    following the warning against taking from the חֵרֶם, the sense is that they would
    incur the same status themselves. 'Become devoted to destruction' communicates
    the resulting condition clearly in English.
- source_word: וּלְקַחְתֶּם מִן־הַחֵרֶם
  chosen: and take some of what is devoted to destruction
  alternatives:
  - and take from the devoted thing
  - and seize some of the banned things
  lexicon: HALOT
  rationale: The clause explains the prohibited action. Adding 'some of' is natural
    English because one takes from a larger whole; it does not materially expand the
    sense.
- source_word: וְשַׂמְתֶּם
  chosen: and make
  alternatives:
  - and set
  - and place
  lexicon: HALOT
  rationale: With the object 'the camp of Israel' and complement 'devoted to destruction,'
    English 'make' best conveys the causative result.
- source_word: מַחֲנֵה יִשְׂרָאֵל
  chosen: the camp of Israel
  alternatives:
  - Israel's camp
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the covenant-community setting
    and echoes the Hebrew construct chain.
- source_word: לְחֵרֶם
  chosen: devoted to destruction
  alternatives:
  - under the ban
  - for destruction
  lexicon: HALOT
  rationale: For consistency with the earlier occurrences of חֵרֶם in the verse, the
    same core rendering is maintained.
- source_word: וַעֲכַרְתֶּם אֹתוֹ
  chosen: and bring trouble on it
  alternatives:
  - and trouble it
  - and bring disaster on it
  lexicon: HALOT
  rationale: עכר means to bring trouble/disaster, often in covenant-judgment contexts.
    'Bring trouble on it' is clear modern English and preserves the causative force.
    The pronoun refers to the camp of Israel.
