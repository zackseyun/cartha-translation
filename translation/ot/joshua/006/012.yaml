id: JOS.6.12
reference: Joshua 6:12
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֥ם יְהוֹשֻׁ֖עַ בַּ/בֹּ֑קֶר וַ/יִּשְׂא֥וּ הַ/כֹּהֲנִ֖ים אֶת אֲר֥וֹן
    יְהוָֽה־׃
translation:
  text: Joshua rose early in the morning, and the priests carried the ark of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the ark of Yahweh.'' The main text follows the project’s default
      rendering of the divine name יְהוָה as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early or start early. 'Rose
    early' is idiomatic modern English and preserves the temporal emphasis without
    unnecessary stiffness.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: The phrase literally means 'in the morning.' This is the most natural
    English rendering and retains the temporal setting. Combined with 'rose early,'
    it reflects the Hebrew emphasis on early morning action.
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - lifted up
  - bore
  lexicon: HALOT
  rationale: נשא can mean lift, carry, or bear. In context of transporting the ark,
    'carried' best conveys the action in clear modern English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun with article.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: Construct phrase rendered naturally as 'the ark of the LORD.' For יְהוָה,
    the doctrinal default is 'the LORD,' not 'Yahweh,' preserving the covenant name
    by established small-caps convention in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of the divine name יְהוָה
    as 'the LORD.' This follows Jewish reverence tradition and the Septuagintal pattern,
    while preserving recognizability in English Bible style.
