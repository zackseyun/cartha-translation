id: JOS.6.20
reference: Joshua 6:20
source:
  edition: WLC
  text: וַ/יָּ֣רַע הָ/עָ֔ם וַֽ/יִּתְקְע֖וּ בַּ/שֹּֽׁפָר֑וֹת וַ/יְהִי֩ כִ/שְׁמֹ֨עַ
    הָ/עָ֜ם אֶת ק֣וֹל הַ/שּׁוֹפָ֗ר וַ/יָּרִ֤יעוּ הָ/עָם֙ תְּרוּעָ֣ה גְדוֹלָ֔ה וַ/תִּפֹּ֨ל
    הַֽ/חוֹמָ֜ה תַּחְתֶּ֗י/הָ וַ/יַּ֨עַל הָ/עָ֤ם הָ/עִ֨ירָ/ה֙ אִ֣ישׁ נֶגְדּ֔/וֹ וַֽ/יִּלְכְּד֖וּ
    אֶת הָ/עִֽיר־־׃
translation:
  text: So the people shouted, and they blew the trumpets. And when the people heard
    the sound of the trumpet, the people raised a great shout, and the wall fell beneath
    itself, and the people went up into the city, each man straight before him, and
    they captured the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wall fell down flat.' The Hebrew literally says 'the wall fell beneath
      itself,' an unusual expression that may describe the wall collapsing straight
      down.
    reason: lexical_alternative
  - marker: b
    text: '''Trumpet'' translates Hebrew shofar, a horn used for signaling; ''rams''
      horn'' is a possible more specific rendering.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּרַע / וַיָּרִיעוּ / תְּרוּעָה
  chosen: shouted / raised a great shout
  alternatives:
  - gave a war cry
  - raised a battle shout
  - cheered
  lexicon: HALOT
  rationale: The root רוע and noun תְּרוּעָה denote a loud shout, often in battle
    or cultic settings. 'Shouted' is the most natural core rendering in English; 'raised
    a great shout' preserves the second, intensified expression without over-specifying
    'battle' where the verse itself does not explicitly add that nuance.
- source_word: שׁוֹפָרוֹת / שׁוֹפָר
  chosen: trumpets / trumpet
  alternatives:
  - rams' horns
  - horns
  lexicon: HALOT
  rationale: שׁוֹפָר refers to a horn used as a signaling instrument. 'Trumpet' is
    standard, readable English and fits the narrative function. 'Rams' horn' is possible
    in context but is more specific than this verse itself states, so it is preserved
    as an alternative rather than placed in the main text.
- source_word: קוֹל הַשּׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the voice of the trumpet
  - the blast of the trumpet
  lexicon: HALOT
  rationale: קוֹל literally means 'sound/voice.' With an instrument, 'sound' is idiomatic
    English and preserves the sense cleanly. 'Blast' is also possible but slightly
    interpretive.
- source_word: וַתִּפֹּל הַחוֹמָה תַּחְתֶּיהָ
  chosen: the wall fell beneath itself
  alternatives:
  - the wall fell down flat
  - the wall collapsed in its place
  - the wall fell under itself
  lexicon: HALOT
  rationale: תַּחְתֶּיהָ is literally 'under/beneath it(her).' The phrase is difficult
    and traditionally rendered idiomatically as 'fell down flat.' To remain auditable
    and closer to the Hebrew, 'fell beneath itself' preserves the unusual wording
    while still making sense in English. The more idiomatic traditional rendering
    is preserved in a footnote.
- source_word: וַיַּעַל ... הָעִירָה
  chosen: went up into the city
  alternatives:
  - went up to the city
  - charged up into the city
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' With the directional suffix on עִירָה, 'into
    the city' best captures movement toward and into Jericho after the wall's fall.
    'Charged' adds military vividness not explicit in the verb itself.
- source_word: אִישׁ נֶגְדּוֹ
  chosen: each man straight before him
  alternatives:
  - each man before him
  - each one straight ahead
  - each man directly ahead
  lexicon: HALOT
  rationale: אִישׁ is singular distributive, and per the project's gender-accurate
    policy, 'each man' is retained rather than neutralized. נֶגְדּוֹ conveys what
    is in front of him/opposite him; 'straight before him' communicates direct advance
    from each person's position.
- source_word: וַיִּלְכְּדוּ
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: לכד in military narrative commonly means to capture or seize a city.
    'Captured' is the clearest modern English choice for conquest of a city.
