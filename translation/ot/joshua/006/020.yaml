theological_decisions:
- issue: Gendered distributive expression אִישׁ נֶגְדּוֹ
  chosen_reading: each man straight before him
  alternative_readings:
  - each one straight ahead
  - everyone straight before him
  rationale: The Hebrew uses the singular masculine noun אִישׁ distributively. Following
    the doctrine's gender-accurate policy, the masculine form is preserved in the
    main text rather than neutralized, since the narrative depicts the men of Israel
    advancing individually from their positions.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
