id: JOS.6.22
reference: Joshua 6:22
source:
  edition: WLC
  text: וְ/לִ/שְׁנַ֨יִם הָ/אֲנָשִׁ֜ים הַֽ/מְרַגְּלִ֤ים אֶת הָ/אָ֨רֶץ֙ אָמַ֣ר יְהוֹשֻׁ֔עַ
    בֹּ֖אוּ בֵּית הָ/אִשָּׁ֣ה הַ/זּוֹנָ֑ה וְ/הוֹצִ֨יאוּ מִ/שָּׁ֤ם אֶת הָֽ/אִשָּׁה֙
    וְ/אֶת כָּל אֲשֶׁר לָ֔/הּ כַּ/אֲשֶׁ֥ר נִשְׁבַּעְתֶּ֖ם לָֽ/הּ־־־־־־׃
translation:
  text: And to the two men who had spied out the land, Joshua said, “Go into the house
    of the prostitute woman and bring out from there the woman and all that belongs
    to her, just as you swore to her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the prostitute”; Hebrew repeats “the woman, the prostitute.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁנַיִם הָאֲנָשִׁים
  chosen: And to the two men
  alternatives:
  - Then to the two men
  - Now to the two men
  lexicon: HALOT
  rationale: 'The prefixed waw plus lamed marks a transition and indirect object:
    Joshua addresses these specific men. ''And to the two men'' preserves the Hebrew
    linkage without overinterpreting discourse flow.'
- source_word: הַמְרַגְּלִים אֶת הָאָרֶץ
  chosen: who had spied out the land
  alternatives:
  - who had explored the land
  - the ones spying out the land
  lexicon: HALOT
  rationale: The participle from רגל in this context refers to reconnaissance. English
    idiom prefers a relative clause. The perfective sense is supplied by context,
    since these are the previously sent spies.
- source_word: אָמַר יְהוֹשֻׁעַ
  chosen: Joshua said
  alternatives:
  - Joshua told
  lexicon: HALOT
  rationale: Simple narrative speech formula; 'said' is the most direct equivalent
    of אמר.
- source_word: בֹּאוּ
  chosen: Go into
  alternatives:
  - Enter
  - Come into
  lexicon: HALOT
  rationale: Although בוא is literally 'come,' English in reported command from Joshua
    to the men naturally uses 'go into' from the speaker's perspective. This is a
    standard optimal-equivalence adjustment.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the household of
  lexicon: HALOT
  rationale: The immediate reference is to Rahab's dwelling, not primarily her family
    unit, so 'house of' is best.
- source_word: הָאִשָּׁה הַזּוֹנָה
  chosen: the prostitute woman
  alternatives:
  - the prostitute
  - the harlot
  lexicon: HALOT
  rationale: זוֹנָה plainly denotes a prostitute. 'Harlot' is archaic. I retained
    'woman' to reflect the appositional Hebrew phrase הָאִשָּׁה הַזּוֹנָה, though
    English could omit it more smoothly.
- source_word: וְהוֹצִיאוּ מִשָּׁם
  chosen: and bring out from there
  alternatives:
  - and bring out of there
  - and take out from there
  lexicon: HALOT
  rationale: יצא in the Hiphil means 'bring out' or 'cause to come out.' 'From there'
    preserves מִשָּׁם explicitly.
- source_word: אֶת הָאִשָּׁה
  chosen: the woman
  alternatives:
  - her
  lexicon: HALOT
  rationale: The Hebrew repeats 'the woman' rather than using a pronoun; the translation
    preserves that repetition for emphasis and clarity.
- source_word: וְאֶת כָּל אֲשֶׁר לָהּ
  chosen: and all that belongs to her
  alternatives:
  - and all that she has
  - and everything that is hers
  lexicon: HALOT
  rationale: The phrase includes possessions and, by implication in context, all under
    her protection. 'Belongs to her' is natural English while staying broad.
- source_word: כַּאֲשֶׁר נִשְׁבַּעְתֶּם לָהּ
  chosen: just as you swore to her
  alternatives:
  - according to what you swore to her
  - as you had sworn to her
  lexicon: HALOT
  rationale: This comparative clause grounds the command in the spies' oath. 'Just
    as' is idiomatic and faithful.
