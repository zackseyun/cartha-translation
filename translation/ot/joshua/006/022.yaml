theological_decisions:
- issue: Rendering of זוֹנָה for Rahab
  chosen_reading: prostitute
  alternative_readings:
  - harlot
  rationale: The Hebrew term denotes a prostitute; no euphemism is warranted by the
    text. This follows the translation philosophy of original-language primacy and
    readable modern English, avoiding archaic 'harlot.'
  doctrine_reference: Translation philosophy §§1, 6
