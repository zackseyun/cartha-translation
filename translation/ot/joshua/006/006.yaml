id: JOS.6.6
reference: Joshua 6:6
source:
  edition: WLC
  text: וַ/יִּקְרָ֞א יְהוֹשֻׁ֤עַ בִּן נוּן֙ אֶל הַ/כֹּ֣הֲנִ֔ים וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם שְׂא֖וּ אֶת אֲר֣וֹן הַ/בְּרִ֑ית וְ/שִׁבְעָ֣ה כֹֽהֲנִ֗ים יִשְׂאוּ֙ שִׁבְעָ֤ה שֽׁוֹפְרוֹת֙ יוֹבְלִ֔ים לִ/פְנֵ֖י אֲר֥וֹן יְהוָֽה־־־׃
translation:
  text: So Joshua son of Nun called the priests and said to them, “Carry the ark of the covenant, and let seven priests carry seven ram’s-horn trumpets before the ark of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “seven trumpets of rams’ horns.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the ark of Yahweh.” Main text follows the project’s default rendering of the divine name as “the LORD.”'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא here introduces Joshua addressing the priests. 'Called' is natural modern English and sufficiently formal; 'summoned' is possible but slightly stronger than the context requires.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua the son of Nun
  rationale: Personal name is transliterated; filial expression is rendered straightforwardly. The article is unnecessary in idiomatic English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in this cultic context.
- source_word: שְׂאוּ
  chosen: Carry
  alternatives:
  - Lift up
  - Take up
  lexicon: HALOT
  rationale: Imperative of נשׂא. In context of transporting the ark, 'carry' best conveys the intended action in clear English.
- source_word: אֲרוֹן הַבְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: Established but source-faithful rendering of the construct phrase; clear and natural in English.
- source_word: וְשִׁבְעָה כֹהֲנִים יִשְׂאוּ
  chosen: and let seven priests carry
  alternatives:
  - and seven priests shall carry
  - and seven priests are to carry
  lexicon: HALOT
  rationale: The imperfect following the imperative functions as an instruction within direct speech. 'Let seven priests carry' preserves the directive force in idiomatic English better than a simple future.
- source_word: שִׁבְעָה שׁוֹפְרוֹת יוֹבְלִים
  chosen: seven ram’s-horn trumpets
  alternatives:
  - seven trumpets of rams' horns
  - seven jubilee trumpets
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn/trumpet, and יוֹבְלִים here specifies ram's horns rather than the later technical sense 'jubilee.' 'Ram’s-horn trumpets' is concise and accurate; the more literal alternative is preserved in a footnote.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: Standard spatial rendering; 'before' fits both the formal register and procession context.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the ark of Yahweh
  lexicon: HALOT
  rationale: The construct links the ark with the divine name YHWH. Per doctrine, יְהוָה is rendered 'the LORD' in the main text; 'Yahweh' is preserved as an alternative in a footnote only where useful.
