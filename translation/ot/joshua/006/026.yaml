id: JOS.6.26
reference: Joshua 6:26
source:
  edition: WLC
  text: וַ/יַּשְׁבַּ֣ע יְהוֹשֻׁ֔עַ בָּ/עֵ֥ת הַ/הִ֖יא לֵ/אמֹ֑ר אָר֨וּר הָ/אִ֜ישׁ לִ/פְנֵ֣י יְהוָ֗ה אֲשֶׁ֤ר יָקוּם֙ וּ/בָנָ֞ה אֶת הָ/עִ֤יר הַ/זֹּאת֙ אֶת יְרִיח֔וֹ בִּ/בְכֹר֣/וֹ יְיַסְּדֶ֔/נָּה וּ/בִ/צְעִיר֖/וֹ יַצִּ֥יב דְּלָתֶֽי/הָ־־׃
translation:
  text: At that time Joshua made them swear, saying, “Cursed before Yahweh is the man who rises up and rebuilds this city, Jericho. At the cost of his firstborn he will lay its foundation, and at the cost of his youngest he will set up its gates.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''adjured them'' / ''put them under oath.'' The Hebrew verb is causative: Joshua caused the people to swear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Cursed before the LORD is anyone who rises up and rebuilds this city.' Hebrew 'the man' is grammatically masculine singular and functions generically here.
    reason: lexical_alternative
  - marker: c
    text: Literally 'with/in his firstborn ... and with/in his youngest.' The expression likely means 'at the cost of' them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבַּע
  chosen: made them swear
  alternatives:
  - adjured
  - put under oath
  - swore
  lexicon: HALOT
  rationale: The Hiphil of שׁבע commonly means to cause someone to swear or place under oath, not merely that Joshua himself swore. English needs an object supplied from context ('them'), referring to the people present. 'Made them swear' is clear and reflects the causative stem better than simple 'swore'.
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that time period
  - At that moment
  lexicon: HALOT
  rationale: Standard temporal expression; 'At that time' is idiomatic and sufficiently formal.
- source_word: אָרוּר הָאִישׁ
  chosen: Cursed ... is the man
  alternatives:
  - The man is cursed
  - Cursed is anyone
  lexicon: HALOT
  rationale: Retains the Hebrew curse formula and the grammatically masculine singular. Per translation philosophy, gender-accurate language is preferred where the source uses masculine generic/reference language. 'The man' here functions generically for any person who would do this.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי marks standing in the presence/sight of YHWH. 'Before the LORD' is concise and preserves the covenantal setting. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יָקוּם וּבָנָה
  chosen: rises up and rebuilds
  alternatives:
  - undertakes and builds
  - arises and builds
  - sets out to rebuild
  lexicon: HALOT
  rationale: The pair conveys more than simple construction; it is the act of taking action to restore the destroyed city. Since Jericho has just been destroyed, 'rebuilds' makes the contextual force explicit without over-paraphrasing.
- source_word: הָעִיר הַזֹּאת אֶת יְרִיחוֹ
  chosen: this city, Jericho
  alternatives:
  - this city—Jericho
  - this city, namely Jericho
  lexicon: HALOT
  rationale: The appositional structure is naturally represented in English as 'this city, Jericho.'
- source_word: בִּבְכֹרוֹ
  chosen: At the cost of his firstborn
  alternatives:
  - With his firstborn
  - At the price of his firstborn
  - In/with his firstborn
  lexicon: HALOT
  rationale: The beth preposition here is idiomatic in a cost/forfeit sense in the curse context, not merely accompaniment. 'At the cost of' makes the curse's meaning clear in natural English while preserving the severe consequence.
- source_word: יְיַסְּדֶנָּה
  chosen: he will lay its foundation
  alternatives:
  - he will found it
  - he will establish it
  lexicon: HALOT
  rationale: From יסד, the concrete building sense fits the city-rebuilding context. The 3fs suffix refers to the city.
- source_word: וּבִצְעִירוֹ
  chosen: and at the cost of his youngest
  alternatives:
  - and with his youngest
  - and at the price of his youngest son
  lexicon: HALOT
  rationale: Parallel to 'at the cost of his firstborn.' צָעִיר here denotes the youngest/youngest son in the family context. 'Youngest' is sufficient because the filial relationship is implied by the parallel with 'firstborn.'
- source_word: יַצִּיב דְּלָתֶיהָ
  chosen: he will set up its gates
  alternatives:
  - he will erect its gates
  - he will install its doors
  lexicon: HALOT
  rationale: Though דְּלָתֶיהָ can literally mean 'its doors,' in city-fortification context the phrase refers to setting up the gate structures/doors. 'Set up its gates' is idiomatic and contextually accurate.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's prescribed rendering for the divine name.
