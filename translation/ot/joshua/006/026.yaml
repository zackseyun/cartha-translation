theological_decisions:
- issue: Nature of Joshua's pronouncement
  chosen_reading: A covenantal curse formula declaring divine judgment on anyone who rebuilds Jericho
  alternative_readings:
  - A merely personal wish by Joshua
  - A purely civic/legal ban without theological force
  rationale: The wording 'cursed before the LORD' frames the statement as a solemn curse in YHWH's presence, not merely Joshua's private sentiment. The translation preserves this theological gravity without adding interpretive detail beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; YHWH rendered as ''the LORD''.'
- issue: Meaning of the rebuilding curse involving sons
  chosen_reading: The rebuilder will forfeit his firstborn and youngest in connection with founding and gating the city
  alternative_readings:
  - He will dedicate the city by child sacrifice
  - He will simply experience misfortune during construction
  rationale: The Hebrew most naturally expresses severe loss tied to the stages of rebuilding. The translation uses 'at the cost of' to convey forfeiture without specifying the exact mechanism of death or sacrifice, which the verse itself does not explicitly state.
  doctrine_reference: 'DOCTRINE.md: Do not import doctrinal claims the text does not make; preserve ambiguity where genuine.'
