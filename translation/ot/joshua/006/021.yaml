theological_decisions:
- issue: Rendering of חרם language in a warfare judgment context
  chosen_reading: devoted to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: The verse uses technical ḥerem terminology, not merely a generic verb
    for killing. The chosen rendering preserves the theological and covenantal dimension
    of something being placed under irrevocable destruction, without softening the
    severity or importing extra explanation into the main text.
  doctrine_reference: Translation philosophy §§1, 5
