id: JOS.6.21
reference: Joshua 6:21
source:
  edition: WLC
  text: וַֽ/יַּחֲרִ֨ימוּ֙ אֶת כָּל אֲשֶׁ֣ר בָּ/עִ֔יר מֵ/אִישׁ֙ וְ/עַד אִשָּׁ֔ה מִ/נַּ֖עַר
    וְ/עַד זָקֵ֑ן וְ/עַ֨ד שׁ֥וֹר וָ/שֶׂ֛ה וַ/חֲמ֖וֹר לְ/פִי חָֽרֶב־־־־־׃
translation:
  text: And they devoted to destruction everything that was in the city, from man
    to woman, from young to old, and up to ox and sheep and donkey, by the edge of
    the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utterly destroyed' or 'put under the ban.' The Hebrew verb refers to
      devoting something irrevocably to destruction under the ban (ḥerem).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲרִימוּ
  chosen: they devoted to destruction
  alternatives:
  - they utterly destroyed
  - they put under the ban
  - they devoted as banned things
  lexicon: HALOT
  rationale: From חרם in the Hiphil, denoting placing persons/things under ḥerem,
    that is, devoting them irrevocably to destruction. 'Devoted to destruction' preserves
    the technical force better than the flatter 'destroyed' while remaining readable
    English.
- source_word: כָּל אֲשֶׁר בָּעִיר
  chosen: everything that was in the city
  alternatives:
  - all that was in the city
  lexicon: HALOT
  rationale: A comprehensive expression covering all inhabitants and animals subsequently
    specified. 'Everything' is natural modern English and retains totality.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - from men to women
  lexicon: HALOT
  rationale: The singular distributive construction is best represented by singular
    English. This follows the gender-accurate principle and preserves the merism indicating
    all adults regardless of sex.
- source_word: מִנַּעַר וְעַד זָקֵן
  chosen: from young to old
  alternatives:
  - from youth to old man
  - from boy to old man
  lexicon: HALOT
  rationale: A stock age-range merism. 'From young to old' communicates the full span
    idiomatically without over-specifying male referents where the phrase functions
    comprehensively.
- source_word: וְעַד שׁוֹר וָשֶׂה וַחֲמוֹר
  chosen: and up to ox and sheep and donkey
  alternatives:
  - including oxen, sheep, and donkeys
  - and also ox, sheep, and donkey
  lexicon: HALOT
  rationale: Retains the continuation of the range into livestock. Singular animal
    nouns in Hebrew are represented with English collectives/singular forms. 'Ox and
    sheep and donkey' is close to the source while still intelligible.
- source_word: לְפִי חָרֶב
  chosen: by the edge of the sword
  alternatives:
  - with the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: This is the standard idiom for killing with the sword. 'By the edge of
    the sword' preserves the Hebrew image more fully than the simpler 'with the sword'.
