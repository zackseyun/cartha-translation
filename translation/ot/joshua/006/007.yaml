id: JOS.6.7
reference: Joshua 6:7
source:
  edition: WLC
  text: ו/יאמרו אֶל הָ/עָ֔ם עִבְר֖וּ וְ/סֹ֣בּוּ אֶת הָ/עִ֑יר וְ/הֶ֣/חָל֔וּץ יַעֲבֹ֕ר לִ/פְנֵ֖י אֲר֥וֹן יְהוָֽה־־׃
translation:
  text: And they said to the people, “Pass on and go around the city, and let the armed men pass before the ark of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the vanguard,” that is, the armed men going ahead of the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next action in sequence. 'And they said' preserves the narrative flow without overinterpreting the conjunction.
- source_word: אֶל־הָעָם
  chosen: to the people
  alternatives:
  - to the troops
  - to the army
  lexicon: HALOT
  rationale: עָם normally means 'people.' In this military context it refers to the assembled people/forces, but 'people' is the plain lexical sense and avoids narrowing beyond the Hebrew.
- source_word: עִבְרוּ
  chosen: Pass on
  alternatives:
  - Cross over
  - Go forward
  - Advance
  lexicon: HALOT
  rationale: Imperative plural of עבר. Here it is an order to move ahead in procession, not to cross a boundary such as a river. 'Pass on' fits the marching context and distinguishes it from the following command to circle the city.
- source_word: וְסֹבּוּ אֶת־הָעִיר
  chosen: and go around the city
  alternatives:
  - and circle the city
  - and march around the city
  lexicon: HALOT
  rationale: סבב in the imperative means to go around or encircle. 'Go around' is natural modern English and preserves the spatial action without adding military nuance not explicit in the verb itself.
- source_word: וְהֶחָלוּץ
  chosen: the armed men
  alternatives:
  - the vanguard
  - the armed force
  - the men equipped for battle
  lexicon: HALOT
  rationale: חָלוּץ refers to those armed/prepared for battle, often the advance contingent. 'The armed men' is clear and sufficiently literal; 'vanguard' captures function but is more interpretive, so it is preserved in a footnote.
- source_word: יַעֲבֹר
  chosen: let ... pass
  alternatives:
  - shall pass
  - is to pass
  lexicon: HALOT
  rationale: Imperfect singular used jussively/instructionally after the imperative sequence. 'Let the armed men pass' best reflects the command force in idiomatic English.
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  chosen: before the ark of the LORD
  alternatives:
  - in front of the ark of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes position in front of. 'Before the ark of the LORD' is standard, clear English. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
