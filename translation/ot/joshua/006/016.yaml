id: JOS.6.16
reference: Joshua 6:16
source:
  edition: WLC
  text: וַ/יְהִי֙ בַּ/פַּ֣עַם הַ/שְּׁבִיעִ֔ית תָּקְע֥וּ הַ/כֹּהֲנִ֖ים בַּ/שּׁוֹפָר֑וֹת וַ/יֹּ֨אמֶר יְהוֹשֻׁ֤עַ אֶל הָ/עָם֙ הָרִ֔יעוּ כִּֽי נָתַ֧ן יְהוָ֛ה לָ/כֶ֖ם אֶת הָ/עִֽיר־־־׃
translation:
  text: And it happened at the seventh time, when the priests blew the trumpets, that Joshua said to the people, “Shout, for Yahweh has given you the city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shofarot, traditionally 'ram's horns'; here rendered 'trumpets' for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַּפַּעַם הַשְּׁבִיעִית
  chosen: at the seventh time
  alternatives:
  - on the seventh time
  - the seventh time
  lexicon: HALOT
  rationale: פעם denotes an occurrence/instance. Here it refers to the seventh circuit/occasion in the repeated action. 'At the seventh time' is natural and sufficiently formal.
- source_word: תָּקְעוּ
  chosen: blew
  alternatives:
  - sounded
  - blew a blast on
  lexicon: HALOT
  rationale: תקע with שופר means to blow/sound a horn or trumpet. 'Blew' is the plain English equivalent.
- source_word: שׁוֹפָרוֹת
  chosen: trumpets
  alternatives:
  - ram's horns
  - horns
  lexicon: HALOT
  rationale: Though שופר specifically denotes a horn, in this narrative English 'trumpets' communicates the instrument idiomatically. The more specific 'ram's horns' is possible, but the immediate context does not require that added specificity in the main text.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in direct speech introduction.
- source_word: הָרִיעוּ
  chosen: Shout
  alternatives:
  - Raise a war cry
  - Give a shout
  lexicon: HALOT
  rationale: רוע/הֵרִיעוּ here is a command to raise a loud shout in battle/celebration. 'Shout' is concise and natural; 'war cry' is interpretive and stronger than the text explicitly states.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits direct speech well in English.
- source_word: נָתַן
  chosen: has given
  alternatives:
  - has delivered
  - gave
  lexicon: HALOT
  rationale: Perfect verb expressing a completed act from the speaker's perspective, likely proleptic/certain because of divine promise. English present perfect captures the force well in Joshua's exhortation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun referring to Jericho in context; 'the city' preserves the Hebrew wording.
