id: JOS.6.19
reference: Joshua 6:19
source:
  edition: WLC
  text: וְ/כֹ֣ל כֶּ֣סֶף וְ/זָהָ֗ב וּ/כְלֵ֤י נְחֹ֨שֶׁת֙ וּ/בַרְזֶ֔ל קֹ֥דֶשׁ ה֖וּא לַֽ/יהוָ֑ה
    אוֹצַ֥ר יְהוָ֖ה יָבֽוֹא׀׃
translation:
  text: But all the silver and gold, and the vessels of bronze and iron, are holy
    to the LORD; they shall go into the treasury of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD's treasury'; Hebrew 'treasury of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular 'is holy' and 'shall come/go,' treating the listed metals
      and objects as a collective whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  chosen: But all
  alternatives:
  - And all
  - Now all
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in context this continues
    and sharpens the prohibition of the previous verse, so 'But' brings out the adversative
    force naturally in English while preserving the connective sense. כֹּל is rendered
    'all' straightforwardly.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The noun denotes silver as a metal here, not money in an abstract sense,
    since it is coordinated with gold and metal objects.
- source_word: וְ/זָהָב
  chosen: and gold
  lexicon: HALOT
  rationale: Standard rendering of the metal term in coordination with silver.
- source_word: וּ/כְלֵי
  chosen: and the vessels of
  alternatives:
  - and the articles of
  - and the utensils of
  lexicon: HALOT
  rationale: כְּלִי is a broad term for objects/implements/vessels. 'Vessels' fits
    the cultic-treasury context and reads naturally with the following metals.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical material contexts נְחֹשֶׁת commonly refers to bronze rather
    than pure copper in English translation tradition and likely ancient usage. 'Bronze'
    is the most idiomatic rendering in lists of metals.
- source_word: וּ/בַרְזֶל
  chosen: and iron
  lexicon: HALOT
  rationale: Direct rendering of the metal term.
- source_word: קֹדֶשׁ הוּא לַיהוָה
  chosen: are holy to the LORD
  alternatives:
  - is holy to the LORD
  - belongs as holy to the LORD
  - is set apart to the LORD
  lexicon: HALOT
  rationale: Hebrew has singular קֹדֶשׁ הוּא with a collective sense referring to
    the preceding list. English idiom prefers agreement with the compound subject,
    hence 'are holy.' 'Holy to the LORD' preserves the consecratory force without
    over-paraphrasing.
- source_word: לַ/יהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.'
- source_word: אוֹצַר יְהוָה
  chosen: the treasury of the LORD
  alternatives:
  - the LORD's treasury
  - the storehouse of the LORD
  lexicon: HALOT
  rationale: אוֹצָר denotes a treasury/storehouse. 'Treasury' best fits precious metals
    dedicated to sanctuary use. The construct relationship is expressed naturally
    as 'the treasury of the LORD.'
- source_word: יָבֹוא
  chosen: they shall go into
  alternatives:
  - it shall go into
  - shall be brought into
  lexicon: HALOT
  rationale: 'The Hebrew verb is singular, agreeing with a collective subject, but
    English naturally uses plural with the listed items: ''they shall go into.'' A
    passive like ''shall be brought into'' is interpretive and not required by the
    text.'
