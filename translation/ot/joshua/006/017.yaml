id: JOS.6.17
reference: Joshua 6:17
source:
  edition: WLC
  text: וְ/הָיְתָ֨ה הָ/עִ֥יר חֵ֛רֶם הִ֥יא וְ/כָל אֲשֶׁר בָּ֖/הּ לַֽ/יהוָ֑ה רַק֩ רָחָ֨ב
    הַ/זּוֹנָ֜ה תִּֽחְיֶ֗ה הִ֚יא וְ/כָל אֲשֶׁ֣ר אִתָּ֣/הּ בַּ/בַּ֔יִת כִּ֣י הֶחְבְּאַ֔תָה
    אֶת הַ/מַּלְאָכִ֖ים אֲשֶׁ֥ר שָׁלָֽחְנוּ־־־־׃
translation:
  text: And the city, it and all that is in it, shall be devoted to destruction for
    the LORD. Only Rahab the prostitute shall live, she and all who are with her in
    the house, because she hid the messengers whom we sent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the ban.' The Hebrew term refers to something devoted irrevocably
      to the LORD, here through destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the messengers'; contextually, these are the men Joshua had sent
      to spy out the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵרֶם
  chosen: devoted to destruction
  alternatives:
  - under the ban
  - devoted
  - set apart for destruction
  lexicon: HALOT
  rationale: In conquest contexts חֵרֶם denotes something devoted irrevocably to God
    through destruction, not merely 'accursed.' 'Devoted to destruction' preserves
    both the consecratory and destructive force in readable English.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication to YHWH. Per doctrine, יְהוָה is rendered
    'the LORD.' 'For the LORD' fits the idiom with 'devoted to destruction' in English
    while preserving the sense of consecration to him.
- source_word: רַק
  chosen: Only
  alternatives:
  - except
  lexicon: HALOT
  rationale: רַק introduces the sole exception to the city's destruction. 'Only' is
    natural and emphatic in English.
- source_word: הַזּוֹנָה
  chosen: the prostitute
  alternatives:
  - the harlot
  lexicon: HALOT
  rationale: The participial noun identifies Rahab by occupation/status. 'Prostitute'
    is the clear modern equivalent; 'harlot' is archaic.
- source_word: תִּחְיֶה
  chosen: shall live
  alternatives:
  - shall be spared alive
  - shall survive
  lexicon: HALOT
  rationale: The verb simply means 'live' or 'remain alive.' 'Shall live' is formally
    close and lets the contrast with destruction stand without over-expansion.
- source_word: אִתָּהּ בַּבַּיִת
  chosen: with her in the house
  alternatives:
  - with her in the household
  - in her house with her
  lexicon: HALOT
  rationale: The phrase refers to those physically gathered with Rahab in the house.
    'In the house' is the most direct rendering of בַּבַּיִת.
- source_word: הֶחְבְּאַתָה
  chosen: she hid
  alternatives:
  - she concealed
  - she sheltered
  lexicon: HALOT
  rationale: The Hiphil of חבא means to hide/conceal. 'Hid' is straightforward and
    avoids adding the nuance of protection that 'sheltered' might imply.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the spies
  - the angels
  lexicon: HALOT
  rationale: מַלְאָךְ broadly means 'messenger.' In this narrative the referents are
    the men Joshua sent, so 'messengers' preserves the lexical sense while fitting
    context. 'Spies' is interpretive from the broader episode; 'angels' is contextually
    impossible here.
- source_word: שָׁלָחְנוּ
  chosen: we sent
  alternatives:
  - we had sent
  lexicon: HALOT
  rationale: The qatal 1cp here naturally refers to the prior sending of the men.
    English simple past 'we sent' is sufficient and idiomatic.
- source_word: וְהָיְתָה הָעִיר ... הִיא וְכָל אֲשֶׁר בָּהּ
  chosen: And the city, it and all that is in it, shall be devoted to destruction
  alternatives:
  - And the city shall be devoted to destruction, it and all that is in it
  - Now the city and all that is in it shall be devoted to destruction
  lexicon: HALOT
  rationale: The Hebrew fronting and resumptive pronoun הִיא give emphasis. The chosen
    English preserves that emphasis with apposition while remaining readable.
