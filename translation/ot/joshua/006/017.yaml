theological_decisions:
- issue: Rendering of the conquest term חֵרֶם
  chosen_reading: devoted to destruction
  alternative_readings:
  - under the ban
  - accursed
  rationale: This avoids softening the severity of the judgment while also avoiding
    the misleading sense that the city is merely cursed. It preserves the theological
    idea of something given over to the LORD in judgment.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
