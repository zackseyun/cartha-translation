id: JOS.6.1
reference: Joshua 6:1
source:
  edition: WLC
  text: וִֽ/ירִיחוֹ֙ סֹגֶ֣רֶת וּ/מְסֻגֶּ֔רֶת מִ/פְּנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל אֵ֥ין
    יוֹצֵ֖א וְ/אֵ֥ין בָּֽא׃ס
translation:
  text: Now Jericho was tightly shut up because of the sons of Israel; no one went
    out, and no one came in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard corporate
      designation for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression ''shutting and being shut'' intensifies the idea:
      Jericho was completely secured and closed off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִירִיחוֹ
  chosen: Now Jericho
  alternatives:
  - And Jericho
  - Jericho
  lexicon: HALOT
  rationale: The prefixed conjunction commonly advances the narrative. 'Now' is natural
    English scene-setting here, while preserving the discourse function. 'Jericho'
    is a transliterated place name per translation philosophy.
- source_word: סֹגֶרֶת וּמְסֻגֶּרֶת
  chosen: was tightly shut up
  alternatives:
  - was shut and secured
  - was completely shut up
  - was shut up and barricaded
  lexicon: HALOT
  rationale: The pairing of the active/passive forms from סגר intensifies the idea
    that the city was fully closed off. 'Was tightly shut up' captures the emphatic,
    idiomatic force in readable English without awkwardly reproducing both forms woodenly.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  - for fear of
  lexicon: HALOT
  rationale: In this context the preposition expresses the reason or occasion for
    Jericho's closure in relation to Israel's presence. 'Because of' is the clearest
    natural rendering. 'For fear of' is interpretive and adds an emotional nuance
    not explicit in the text.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This preserves the Hebrew familial expression more closely than 'Israelites'
    while remaining understandable. It also aligns with the project's gender-accurate
    principle; the phrase is a standard corporate designation, not merely a reference
    to male individuals.
- source_word: אֵין יוֹצֵא וְאֵין בָּא
  chosen: no one went out, and no one came in
  alternatives:
  - none went out and none came in
  - there was no going out and no coming in
  lexicon: HALOT
  rationale: This idiom states total closure of the city. The English clause with
    explicit subjects is natural and preserves the sense. Past tense fits the narrative
    description introduced by 'was tightly shut up.'
