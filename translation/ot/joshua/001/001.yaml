id: JOS.1.1
reference: Joshua 1:1
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵ֛י מ֥וֹת מֹשֶׁ֖ה עֶ֣בֶד יְהוָ֑ה וַ/יֹּ֤אמֶר יְהוָה֙ אֶל יְהוֹשֻׁ֣עַ בִּן נ֔וּן מְשָׁרֵ֥ת מֹשֶׁ֖ה לֵ/אמֹֽר־־׃
translation:
  text: 'Now after the death of Moses, the servant of Yahweh, Yahweh said to Joshua son of Nun, the attendant of Moses, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Moses' attendant'; alternatively 'Moses' minister' or 'Moses' servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive plus היה functions here as a narrative scene-setting formula. 'Now' preserves the discourse-transition force in readable modern English without the archaic feel of 'it came to pass.'
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition meaning 'after'; straightforwardly rendered.
- source_word: מוֹת
  chosen: the death of
  alternatives:
  - the dying of
  lexicon: HALOT
  rationale: Construct form with Moses gives the temporal phrase 'after the death of Moses.' 'Death' is the natural English nominal rendering.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this honorific covenantal title for Moses the emphasis is official service to God rather than bonded-status imagery. 'Servant of the LORD' is both accurate and idiomatic. 'LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common verb אמר is best rendered 'said' here in direct divine address introduction.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: בִּן נוּן
  chosen: son of Nun
  alternatives:
  - the son of Nun
  lexicon: HALOT
  rationale: Patronymic identification is naturally rendered 'son of Nun.' The article is unnecessary in English apposition.
- source_word: מְשָׁרֵת מֹשֶׁה
  chosen: Moses' attendant
  alternatives:
  - Moses' minister
  - Moses' servant
  - assistant to Moses
  lexicon: HALOT
  rationale: The participle denotes one who attends or ministers to another in service. 'Attendant' fits the role here without importing later ecclesiastical overtones from 'minister' or the broader ambiguity of 'servant.' The possessive construction is smoother English than a second appositive 'the attendant of Moses.'
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive 'saying' introduces the forthcoming speech. In contemporary English, a colon naturally conveys this function and avoids wooden style while preserving the discourse structure.
