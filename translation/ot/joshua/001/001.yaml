theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֶבֶד in Moses' title
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: The doctrine notes that bonded-status terms may be rendered 'slave' where that nuance is salient. Here, however, עבד יהוה is a recognized honorific title for Moses, and 'servant' better captures the covenantal-office sense in idiomatic English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1; Contested terms: δοῦλος servant/slave (context-dependent principle applied analogically)'
