id: JOS.1.9
reference: Joshua 1:9
source:
  edition: WLC
  text: הֲ/ל֤וֹא צִוִּיתִ֨י/ךָ֙ חֲזַ֣ק וֶ/אֱמָ֔ץ אַֽל תַּעֲרֹ֖ץ וְ/אַל תֵּחָ֑ת כִּ֤י עִמְּ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כֹ֖ל אֲשֶׁ֥ר תֵּלֵֽךְ־־׃פ
translation:
  text: Have I not commanded you? Be strong and courageous. Do not be terrified, and do not be dismayed, for Yahweh your God is with you wherever you go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Have I not
  alternatives:
  - Did I not
  - Surely
  lexicon: HALOT
  rationale: Rhetorical interrogative with negation introducing emphatic reminder. 'Have I not' preserves the rhetorical force in natural English.
- source_word: צִוִּיתִיךָ
  chosen: commanded you
  alternatives:
  - charged you
  - ordered you
  lexicon: HALOT
  rationale: צוה commonly means 'command.' 'Commanded you' is direct and fits the covenantal/commissioning context better than the softer 'charged you.'
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Be firm
  - Be resolute
  lexicon: HALOT
  rationale: Imperative of חזק here calls for strength or firmness. 'Be strong' is the standard and most transparent rendering in this exhortation formula.
- source_word: וֶאֱמָץ
  chosen: and courageous
  alternatives:
  - and brave
  - and resolute
  lexicon: HALOT
  rationale: With חזק, אמץ forms a conventional pair meaning strength plus courage. Rendering the second term as 'courageous' preserves the semantic distinction without redundancy.
- source_word: אַל תַּעֲרֹץ
  chosen: Do not be terrified
  alternatives:
  - Do not tremble
  - Do not be afraid
  lexicon: HALOT
  rationale: ערץ conveys dread or terror more strongly than a general term for fear. 'Do not be terrified' preserves that stronger nuance.
- source_word: וְאַל תֵּחָת
  chosen: and do not be dismayed
  alternatives:
  - and do not be discouraged
  - and do not be shattered
  lexicon: HALOT
  rationale: חתת in the Niphal can denote being broken down, dismayed, or discouraged. 'Dismayed' fits the parallelism and keeps the emotional force without over-literal awkwardness.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the command. 'For' is concise and natural in elevated but readable English.
- source_word: עִמְּךָ
  chosen: is with you
  alternatives:
  - is alongside you
  lexicon: HALOT
  rationale: Simple statement of divine presence. 'Is with you' is idiomatic and faithful.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second masculine singular suffix; straightforwardly 'your God.'
- source_word: בְּכֹל אֲשֶׁר תֵּלֵךְ
  chosen: wherever you go
  alternatives:
  - in all that you go to
  - everywhere you go
  lexicon: HALOT
  rationale: Idiomatic expression meaning every place or circumstance of Joshua's going. 'Wherever you go' is natural English and captures the distributive sense.
