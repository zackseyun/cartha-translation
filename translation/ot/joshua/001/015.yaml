id: JOS.1.15
reference: Joshua 1:15
source:
  edition: WLC
  text: עַ֠ד אֲשֶׁר יָנִ֨יחַ יְהוָ֥ה לַֽ/אֲחֵי/כֶם֮ כָּ/כֶם֒ וְ/יָרְשׁ֣וּ גַם הֵ֔מָּה אֶת הָ/אָ֕רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹֽהֵי/כֶ֖ם נֹתֵ֣ן לָ/הֶ֑ם וְ/שַׁבְתֶּ֞ם לְ/אֶ֤רֶץ יְרֻשַּׁתְ/כֶם֙ וִֽ/ירִשְׁתֶּ֣ם אוֹתָ֔/הּ אֲשֶׁ֣ר נָתַ֣ן לָ/כֶ֗ם מֹשֶׁה֙ עֶ֣בֶד יְהוָ֔ה בְּ/עֵ֥בֶר הַ/יַּרְדֵּ֖ן מִזְרַ֥ח הַ/שָּֽׁמֶשׁ־׀־־־׀׃
translation:
  text: until Yahweh gives your brothers rest, as he has given you, and they also take possession of the land that Yahweh your God is giving them. Then you shall return to the land of your possession and take possession of it, which Moses the servant of Yahweh gave you beyond the Jordan, toward the sunrise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellow Israelites'; Hebrew 'your brothers,' a masculine plural term that here refers to the other tribes of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'to the east'; literally 'toward the sunrise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָנִיחַ
  chosen: gives ... rest
  alternatives:
  - causes ... to rest
  - gives ... relief
  lexicon: HALOT
  rationale: Hiphil of נוח here means to grant rest/settlement from conflict. 'Gives your brothers rest' is natural English and fits the military-settlement context of Joshua 1.
- source_word: לַאֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'your brothers.' Per doctrine, gender-accurate rendering is preferred. In context it refers to fellow Israelites, likely inclusive in reference, but the source wording is preserved in the main text.
- source_word: כָּכֶם
  chosen: as he has given you
  alternatives:
  - like you
  - as for you
  lexicon: HALOT
  rationale: The comparison is elliptical in Hebrew ('like you'). English requires supplying the implied verbal idea from the context of rest already granted to the Transjordan tribes.
- source_word: וְיָרְשׁוּ
  chosen: take possession of
  alternatives:
  - inherit
  - possess
  lexicon: HALOT
  rationale: ירשׁ in conquest-allotment contexts often means to take possession/inherit. 'Take possession of' best captures both the active and inheritance dimensions in readable English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Joshua this commonly refers to the promised land/territory. 'Land' is the standard and contextually appropriate rendering.
- source_word: נֹתֵן
  chosen: is giving
  alternatives:
  - gives
  - will give
  lexicon: HALOT
  rationale: The participle conveys an ongoing or imminent divine act. 'Is giving' preserves the aspect and reflects the land as divinely granted even while still being occupied militarily.
- source_word: וְשַׁבְתֶּם
  chosen: Then you shall return
  alternatives:
  - and you shall return
  - then return
  lexicon: HALOT
  rationale: The waw-consecutive advances the sequence after the brothers receive their land. 'Then you shall return' makes the temporal progression clear in English.
- source_word: אֶרֶץ יְרֻשַּׁתְכֶם
  chosen: the land of your possession
  alternatives:
  - your inherited land
  - the land of your inheritance
  lexicon: HALOT
  rationale: The phrase denotes the land allotted to them as their possession/inheritance. 'Land of your possession' keeps the lexical link with the following verb ירשׁ.
- source_word: וִירִשְׁתֶּם אֹתָהּ
  chosen: take possession of it
  alternatives:
  - possess it
  - inherit it
  lexicon: HALOT
  rationale: Using 'take possession of' again preserves consistency with the earlier ירשׁ while fitting the context of occupying their allotted territory.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this honorific title for Moses the emphasis is official service to the LORD, not bonded status. 'Servant of the LORD' is the most contextually fitting rendering.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: A standard geographical expression. 'Beyond the Jordan' is concise and idiomatic, while leaving the frame of reference to context.
- source_word: מִזְרַח הַשָּׁמֶשׁ
  chosen: toward the sunrise
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: Literally 'toward the sunrise/east of the sun.' 'Toward the sunrise' preserves the concrete Hebrew imagery while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
