id: JOS.1.11
reference: Joshua 1:11
source:
  edition: WLC
  text: עִבְר֣וּ בְּ/קֶ֣רֶב הַֽ/מַּחֲנֶ֗ה וְ/צַוּ֤וּ אֶת הָ/עָם֙ לֵ/אמֹ֔ר הָכִ֥ינוּ לָ/כֶ֖ם צֵידָ֑ה כִּ֞י בְּ/ע֣וֹד שְׁלֹ֣שֶׁת יָמִ֗ים אַתֶּם֙ עֹֽבְרִים֙ אֶת הַ/יַּרְדֵּ֣ן הַ/זֶּ֔ה לָ/בוֹא֙ לָ/רֶ֣שֶׁת אֶת הָ/אָ֔רֶץ אֲשֶׁר֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם נֹתֵ֥ן לָ/כֶ֖ם לְ/רִשְׁתָּֽ/הּ׀־׀־־׃ס
translation:
  text: Pass through the midst of the camp and command the people, saying, ‘Prepare provisions for yourselves, because within three days you are crossing this Jordan to go in to possess the land that Yahweh your God is giving you to possess it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in three more days” / “after three days.” The Hebrew expression indicates a short remaining period before the crossing; “within three days” best captures the sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרוּ
  chosen: Go through
  alternatives:
  - Pass through
  - Cross through
  lexicon: HALOT
  rationale: Qal imperative plural of עבר here directs the officers to move through the camp. 'Go through' is natural modern English and fits the spatial sense in context better than the more wooden 'pass through.'
- source_word: בְּקֶרֶב הַמַּחֲנֶה
  chosen: the midst of the camp
  alternatives:
  - the camp
  - throughout the camp
  - inside the camp
  lexicon: HALOT
  rationale: קֶרֶב denotes the inner part or midst. Rendering it explicitly preserves the Hebrew image of moving among the camp rather than merely to it.
- source_word: וְצַוּוּ אֶת הָעָם
  chosen: and command the people
  alternatives:
  - and give orders to the people
  - and instruct the people
  lexicon: HALOT
  rationale: צוה commonly means command/order. 'Command' preserves the authoritative force of Joshua's instruction.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive; 'saying' is concise and transparent.
- source_word: הָכִינוּ לָכֶם צֵידָה
  chosen: Prepare provisions for yourselves
  alternatives:
  - Prepare food for yourselves
  - Prepare supplies for yourselves
  lexicon: HALOT
  rationale: צֵידָה refers to provisions for a journey, not merely generic food. 'Provisions' best captures the travel/military setting. 'For yourselves' reflects לָכֶם.
- source_word: כִּי בְּעוֹד שְׁלֹשֶׁת יָמִים
  chosen: because within three days
  alternatives:
  - for in yet three days
  - for after three days
  - for in three more days
  lexicon: HALOT
  rationale: בְּעוֹד with a time expression indicates a period still remaining before the action. 'Within three days' is idiomatic English and avoids the misleading precision of 'after three days' while preserving imminence.
- source_word: אַתֶּם עֹבְרִים
  chosen: you are crossing
  alternatives:
  - you will cross
  - you are about to cross
  lexicon: HALOT
  rationale: The participle gives a vivid imminent sense. 'You are crossing' preserves that aspectual force better than a simple future, while remaining natural in context.
- source_word: אֶת הַיַּרְדֵּן הַזֶּה
  chosen: this Jordan
  alternatives:
  - this Jordan River
  - the Jordan
  lexicon: HALOT
  rationale: The Hebrew includes the demonstrative 'this.' 'This Jordan' preserves the immediacy of the deictic expression; English can omit 'River' without loss.
- source_word: לָבוֹא לָרֶשֶׁת
  chosen: to go in to take possession of
  alternatives:
  - to enter to possess
  - to go in and possess
  lexicon: HALOT
  rationale: 'The paired infinitives express purpose and result: entering in order to possess. ''Take possession of'' conveys ירשׁ in conquest/inheritance context more clearly than bare ''possess.'''
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Joshua, 'the land' is the standard covenant-geographical term and should be preserved consistently.
- source_word: יְהוָה אֱלֹהֵיכֶם
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The covenant formula is thus 'the LORD your God.'
- source_word: נֹתֵן לָכֶם
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle presents the gift as underway/certain. 'Is giving you' preserves the present participial force and the immediacy of divine action.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - as your possession
  lexicon: HALOT
  rationale: The suffix refers back to the land. Repeating 'possess' maintains lexical consistency with ירשׁ while keeping the clause readable.
