id: JOS.1.13
reference: Joshua 1:13
source:
  edition: WLC
  text: זָכוֹר֙ אֶת הַ/דָּבָ֔ר אֲשֶׁ֨ר צִוָּ֥ה אֶתְ/כֶ֛ם מֹשֶׁ֥ה עֶֽבֶד יְהוָ֖ה לֵ/אמֹ֑ר יְהוָ֤ה אֱלֹהֵי/כֶם֙ מֵנִ֣יחַ לָ/כֶ֔ם וְ/נָתַ֥ן לָ/כֶ֖ם אֶת הָ/אָ֥רֶץ הַ/זֹּֽאת־־־׃
translation:
  text: Remember the word that Moses the servant of Yahweh commanded you, saying, ‘Yahweh your God is giving you rest and will give you this land.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will give you this land.' The Hebrew verb can be understood as an assured future; here it is rendered 'has given' because the eastern tribes had already received their inheritance.
    reason: alternative_reading
lexical_decisions:
- source_word: זָכוֹר
  chosen: Remember
  alternatives:
  - Recall
  - Keep in mind
  lexicon: HALOT
  rationale: Qal imperative singular from זכר, functioning as Joshua's direct exhortation to the tribes. 'Remember' is the most natural imperative in English and preserves the force of calling them to mind a prior command.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the command
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it introduces the content of Moses's prior instruction. 'The word' is slightly more formal and matches the singular with the following relative clause; the commanding force is already carried by צִוָּה.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - charged
  - ordered
  lexicon: HALOT
  rationale: The verb clearly denotes authoritative instruction. 'Commanded' best reflects the force of Moses's directive without sounding overly harsh or archaic.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this honorific covenantal title for Moses the emphasis is his commissioned service to God, not bonded status. 'Servant of the LORD' is the most contextually fitting and idiomatic rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of Moses's command. 'Saying' is concise and transparent.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second person plural suffix. 'Your God' preserves the covenantal address to the tribes.
- source_word: מֵנִיחַ
  chosen: is giving you rest
  alternatives:
  - is causing you to rest
  - is settling you
  lexicon: HALOT
  rationale: Hiphil participle of נוח/ניח conveys causing rest or granting relief/settlement. In Joshua's land context, 'giving you rest' captures both cessation from wandering and settled security. The participial form is well represented by an English progressive/present sense.
- source_word: וְנָתַן
  chosen: has given
  alternatives:
  - and will give
  - and gives
  lexicon: HALOT
  rationale: The qatal can be rendered as a completed action with present relevance, especially in a promissory or assured-future context. Because the land east of the Jordan had already been allotted to these tribes, 'has given' fits the immediate historical setting while preserving the certainty of divine action.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this territory
  lexicon: HALOT
  rationale: Simple demonstrative phrase referring to the land already assigned. 'This land' is the natural English equivalent.
