theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of וְנָתַן in relation to the land promise
  chosen_reading: has given you this land
  alternative_readings:
  - will give you this land
  - gives you this land
  rationale: The Hebrew perfect can express either completed action or assured future. In this context Joshua addresses tribes whose inheritance east of the Jordan has already been granted, so 'has given' best fits the narrative situation without overstating a theological nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
