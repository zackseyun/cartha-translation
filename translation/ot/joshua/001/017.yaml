id: JOS.1.17
reference: Joshua 1:17
source:
  edition: WLC
  text: כְּ/כֹ֤ל אֲשֶׁר שָׁמַ֨עְנוּ֙ אֶל מֹשֶׁ֔ה כֵּ֖ן נִשְׁמַ֣ע אֵלֶ֑י/ךָ רַ֠ק יִֽהְיֶ֞ה יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ עִמָּ֔/ךְ כַּ/אֲשֶׁ֥ר הָיָ֖ה עִם מֹשֶֽׁה־־־׃
translation:
  text: Just as we listened to Moses in everything, so we will listen to you. Only may Yahweh your God be with you, just as he was with Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obeyed Moses ... we will obey you.' The Hebrew verb שׁמע can mean both 'listen' and 'obey' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ / נִשְׁמַע
  chosen: listened / will listen
  alternatives:
  - obeyed / will obey
  - heeded / will heed
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly carries the sense of listening to or heeding someone, often with an implication of obedience. Here the speakers pledge responsive allegiance to Joshua parallel to Moses. 'Listen' preserves the lexical link and leaves the obedience nuance implicit rather than over-specifying it as 'obey,' which could sound more interpretive in English.
- source_word: כְּכֹל אֲשֶׁר
  chosen: just as ... in everything
  alternatives:
  - according to all that
  - in all that
  lexicon: HALOT
  rationale: 'The construction expresses comprehensive comparison: as/in all that they listened to Moses, so they will listen to Joshua. Rendering both comparison (''just as'') and scope (''in everything'') preserves the force without sounding wooden.'
- source_word: אֶל / אֵלֶיךָ
  chosen: to Moses / to you
  alternatives:
  - Moses / you
  lexicon: HALOT
  rationale: The preposition is retained in English because it naturally fits 'listen to' and reflects the Hebrew syntax.
- source_word: רַק
  chosen: Only
  alternatives:
  - Nevertheless
  - Just
  lexicon: HALOT
  rationale: רַק marks a limitation or qualification on the pledge. 'Only' is the most natural concise rendering in this context, introducing the condition/wish that follows.
- source_word: יִהְיֶה
  chosen: may ... be
  alternatives:
  - let ... be
  - will be
  lexicon: HALOT
  rationale: Although morphologically imperfect, in this context after רַק it functions as a wish or desiderative statement rather than a simple future prediction. 'May ... be' best captures the volitional nuance in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second masculine singular suffix; straightforwardly rendered 'your God.'
- source_word: עִמָּךְ / עִם
  chosen: be with you / was with Moses
  alternatives:
  - be alongside you / was alongside Moses
  lexicon: HALOT
  rationale: עִם denotes presence/association. 'Be with' is the standard and contextually appropriate rendering, especially in covenantal and leadership contexts.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces the comparison between the LORD's presence with Joshua and with Moses. 'Just as' clearly marks the parallel.
