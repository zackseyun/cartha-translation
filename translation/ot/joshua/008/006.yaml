id: JOS.8.6
reference: Joshua 8:6
source:
  edition: WLC
  text: וְ/יָצְא֣וּ אַחֲרֵ֗י/נוּ עַ֣ד הַתִּיקֵ֤/נוּ אוֹתָ/ם֙ מִן הָ/עִ֔יר כִּ֣י יֹֽאמְר֔וּ
    נָסִ֣ים לְ/פָנֵ֔י/נוּ כַּ/אֲשֶׁ֖ר בָּ/רִֽאשֹׁנָ֑ה וְ/נַ֖סְנוּ לִ/פְנֵי/הֶֽם־׃
translation:
  text: And they will come out after us until we have drawn them away from the city,
    for they will say, ‘They are fleeing before us as at the first,’ and we will flee
    before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'until we have lured them away from the city.'
      The Hebrew verb means to draw or pull away; 'lure' makes the tactic explicit.
    reason: lexical_alternative
  - marker: b
    text: '''As at the first'' refers to Israel''s earlier retreat before Ai (see
      Joshua 7:4–5).'
    reason: cross_reference
lexical_decisions:
- source_word: וְיָצְאוּ
  chosen: And they will come out
  alternatives:
  - and they will go out
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in narrative/planning context
    functions prospectively here within Joshua''s speech, best rendered as future:
    the men of Ai will come out. ''Come out'' fits movement from the city toward the
    Israelites.'
- source_word: אַחֲרֵינוּ
  chosen: after us
  alternatives:
  - behind us
  - in pursuit of us
  lexicon: HALOT
  rationale: Spatial/pursuit sense in military context; 'after us' is natural and
    sufficiently literal.
- source_word: עַד
  chosen: until
  alternatives:
  - as far as the point when
  lexicon: HALOT
  rationale: Standard temporal marker introducing the goal of the pursuit.
- source_word: הַתִּיקֵנוּ
  chosen: we have drawn them away
  alternatives:
  - we have pulled them away
  - we have lured them away
  lexicon: HALOT
  rationale: From נתק in Hiphil, meaning to draw/pull away, remove, detach. 'Draw
    them away' preserves the tactical sense without over-paraphrasing; 'lure' is interpretive
    though contextually true.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the men of Ai.
- source_word: מִן הָעִיר
  chosen: from the city
  alternatives:
  - away from the city
  lexicon: HALOT
  rationale: Source phrase indicating removal from the city. English idiom is captured
    with 'drawn them away from the city'; no need to repeat 'away' separately.
- source_word: כִּי יֹאמְרוּ
  chosen: for they will say
  alternatives:
  - because they will say
  lexicon: HALOT
  rationale: Gives the reason the tactic will work. 'For' is concise and natural in
    explanatory discourse.
- source_word: נָסִים
  chosen: They are fleeing
  alternatives:
  - they flee
  - they are running away
  lexicon: HALOT
  rationale: Participle of נוּס conveys ongoing action; progressive English best matches
    the sense in direct speech.
- source_word: לְפָנֵינוּ
  chosen: before us
  alternatives:
  - from before us
  - ahead of us
  lexicon: HALOT
  rationale: In context of retreat before an enemy, idiomatic English is 'before us,'
    meaning in our presence/away from us.
- source_word: כַּאֲשֶׁר בָּרִאשֹׁנָה
  chosen: as at the first
  alternatives:
  - as before
  - as the first time
  lexicon: HALOT
  rationale: Refers back to the earlier defeat at Ai. 'As at the first' is compact
    and preserves the comparative force; 'as before' is possible but less specific.
- source_word: וְנַסְנוּ
  chosen: and we will flee
  alternatives:
  - and we will run away
  lexicon: HALOT
  rationale: Qal perfect with waw in this speech of planned action is naturally future.
    'Flee' matches the military register and echoes the enemy's assumption.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - from before them
  lexicon: HALOT
  rationale: Standard idiom for retreat in the face of an opponent; 'before them'
    keeps the Hebrew wording and parallelism with 'before us'.
