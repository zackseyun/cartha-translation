id: JOS.8.27
reference: Joshua 8:27
source:
  edition: WLC
  text: רַ֣ק הַ/בְּהֵמָ֗ה וּ/שְׁלַל֙ הָ/עִ֣יר הַ/הִ֔יא בָּזְז֥וּ לָ/הֶ֖ם יִשְׂרָאֵ֑ל כִּ/דְבַ֣ר יְהוָ֔ה אֲשֶׁ֥ר צִוָּ֖ה אֶת יְהוֹשֻֽׁעַ־׃
translation:
  text: Only the livestock and the spoil of that city did Israel take as plunder for themselves, according to the word of the LORD that he had commanded Joshua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plunder' for 'the spoil'; the Hebrew term refers to goods taken in war.
    reason: lexical_alternative
  - marker: b
    text: Or 'Only the livestock and the spoil of that city Israel took as plunder for themselves'.
    reason: previous_rendering
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - Except for
  lexicon: HALOT
  rationale: Marks restriction/exclusion from the preceding destruction account; 'Only' is concise and natural in English.
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the animals
  lexicon: HALOT
  rationale: Refers here to domesticated animals as war booty; 'livestock' is the most natural modern collective term.
- source_word: וּשְׁלַל
  chosen: and the spoil
  alternatives:
  - and the plunder
  - and the booty
  lexicon: HALOT
  rationale: שָׁלָל denotes goods taken in war. 'Spoil' fits the collocation with the following verb 'took as plunder,' preserving the military context without over-paraphrase.
- source_word: הָעִיר הַהִיא
  chosen: of that city
  alternatives:
  - of the city, that one
  - of that particular city
  lexicon: HALOT
  rationale: The demonstrative adds specificity; standard English expresses this naturally as 'that city.'
- source_word: בָּזְזוּ
  chosen: took as plunder
  alternatives:
  - plundered
  - took for spoil
  lexicon: HALOT
  rationale: The verb בזז means to plunder/spoil. Because the direct objects are the livestock and spoil, 'took as plunder' avoids the awkward English of 'plundered the spoil' while preserving the sense that Israel appropriated these goods.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  - as their own
  lexicon: HALOT
  rationale: The dative indicates advantage/possession; 'for themselves' makes explicit that the goods were kept by Israel.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Collective national subject; standard transliteration retained.
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - in accordance with the word of
  - as the word of
  lexicon: HALOT
  rationale: Expresses conformity to a command or declaration. 'According to the word of' is idiomatic and sufficiently formal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֲשֶׁר צִוָּה אֶת יְהוֹשֻׁעַ
  chosen: that he had commanded Joshua
  alternatives:
  - which he commanded Joshua
  - that he commanded to Joshua
  lexicon: HALOT
  rationale: The relative clause refers back to 'the word of the LORD.' English past perfect ('had commanded') fits the prior command relative to the narrated action.
