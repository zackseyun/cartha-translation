id: JOS.8.23
reference: Joshua 8:23
source:
  edition: WLC
  text: וְ/אֶת מֶ֥לֶךְ הָ/עַ֖י תָּ֣פְשׂוּ חָ֑י וַ/יַּקְרִ֥בוּ אֹת֖/וֹ אֶל יְהוֹשֻֽׁעַ־־׃
translation:
  text: But they captured the king of Ai alive and brought him near to Joshua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And they captured the king of Ai alive and brought him to Joshua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction with the object marker introduces a new action in sequence
    while slightly contrasting with the broader slaughter context; 'But' gives natural
    English discourse flow without departing from the narrative sense. 'And' is possible
    more formally.
- source_word: מֶלֶךְ הָעַי
  chosen: the king of Ai
  alternatives:
  - Ai's king
  lexicon: HALOT
  rationale: Construct chain is most naturally rendered 'the king of Ai.' 'Ai' is
    a place name and is transliterated per translation philosophy.
- source_word: תָּפְשׂוּ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: The verb denotes laying hold of or capturing. In military context, 'captured'
    best conveys the sense idiomatically in English.
- source_word: חָי
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Predicate adjective indicating the king was taken without being killed.
    'Alive' is the standard and clearest English rendering in this context.
- source_word: וַיַּקְרִבוּ
  chosen: brought ... near
  alternatives:
  - brought
  - presented
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near. Rendering it as 'brought him near'
    preserves the directional nuance toward Joshua better than the flatter 'brought
    him' alone.
- source_word: אֹתוֹ אֶל יְהוֹשֻׁעַ
  chosen: him near to Joshua
  alternatives:
  - him to Joshua
  - him before Joshua
  lexicon: HALOT
  rationale: The pronoun plus preposition marks Joshua as the destination. 'Near to
    Joshua' reflects the underlying קרב + אֶל construction; 'before Joshua' would
    add a judicial/presentational nuance not explicit in the Hebrew.
