id: JOS.8.22
reference: Joshua 8:22
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה יָצְא֤וּ מִן הָ/עִיר֙ לִ/קְרָאתָ֔/ם וַ/יִּֽהְי֤וּ לְ/יִשְׂרָאֵל֙
    בַּ/תָּ֔וֶךְ אֵ֥לֶּה מִ/זֶּ֖ה וְ/אֵ֣לֶּה מִ/זֶּ֑ה וַ/יַּכּ֣וּ אוֹתָ֔/ם עַד בִּלְתִּ֥י
    הִשְׁאִֽיר ל֖/וֹ שָׂרִ֥יד וּ/פָלִֽיט־־־׃
translation:
  text: And these came out from the city to meet them, so that they were in the midst
    of Israel, these on one side and those on the other; and they struck them down
    until he left for him not a survivor or a fugitive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''these from this side and those from that side,'' an idiom indicating
      that Israel hemmed them in from both sides.'
    reason: lexical_alternative
  - marker: b
    text: Or, more idiomatically, 'until he left him no survivor or fugitive,' meaning
      that none were left alive or able to escape.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these
  alternatives:
  - And they
  - Then these
  lexicon: HALOT
  rationale: The demonstrative points to the ambushing force previously mentioned.
    'And these' preserves the explicit deictic force better than a simple pronoun.
- source_word: יָצְאוּ מִן הָעִיר
  chosen: came out from the city
  alternatives:
  - went out from the city
  - came out of the city
  lexicon: HALOT
  rationale: יצא commonly means 'go/come out.' 'Came out' fits the narrative viewpoint
    as the force emerges from Ai into the battle scene.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - against them
  - to encounter them
  lexicon: HALOT
  rationale: לקראת often means 'to meet' or 'to confront.' Here the military context
    gives it hostile force, but 'to meet them' is sufficiently natural while leaving
    the conflict to the following clause.
- source_word: וַיִּהְיוּ לְיִשְׂרָאֵל בַּתָּוֶךְ
  chosen: so that they were in the midst of Israel
  alternatives:
  - and they were in the middle of Israel
  - and they came to be in the midst of Israel
  lexicon: HALOT
  rationale: 'The clause describes the tactical result: the men of Ai found themselves
    surrounded within Israel''s forces. ''So that'' makes the result relation clear
    in English.'
- source_word: בַּתָּוֶךְ
  chosen: in the midst of
  alternatives:
  - in the middle of
  - surrounded by
  lexicon: HALOT
  rationale: '''In the midst of'' is a close rendering of תוך. ''Surrounded by'' captures
    the sense but is more interpretive; the more literal phrase is retained.'
- source_word: אֵלֶּה מִזֶּה וְאֵלֶּה מִזֶּה
  chosen: these on one side and those on the other
  alternatives:
  - these from this side and those from that side
  - some on this side and others on that side
  lexicon: HALOT
  rationale: The idiom marks opposing sides of an encirclement. The chosen rendering
    is idiomatic English while preserving the two-sided pressure.
- source_word: וַיַּכּוּ אוֹתָם
  chosen: and they struck them down
  alternatives:
  - and they struck them
  - and they killed them
  lexicon: HALOT
  rationale: נכה in battle contexts often implies lethal defeat. 'Struck them down'
    preserves the martial force without over-specifying every individual blow as immediate
    death.
- source_word: עַד בִּלְתִּי
  chosen: until
  alternatives:
  - until not
  - so that not
  lexicon: HALOT
  rationale: 'The combination introduces the extent of the action: it continued until
    none remained. English naturally compresses this to ''until'' with the negation
    expressed in the following clause.'
- source_word: הִשְׁאִיר לוֹ
  chosen: he left for him not
  alternatives:
  - he left him none
  - there was left to him none
  lexicon: HALOT
  rationale: The Hebrew shifts to a singular verb with singular pronominal suffix,
    likely a collective or impersonal singular referring to Israel's action against
    the king/city of Ai. The syntax is awkward in English; the chosen rendering stays
    close to the form, though the sense is 'none was left to him.'
- source_word: שָׂרִיד וּפָלִיט
  chosen: a survivor or a fugitive
  alternatives:
  - survivor or escapee
  - remnant or fugitive
  lexicon: HALOT
  rationale: The pair is a common hendiadys-like expression for anyone remaining alive
    or escaping. 'Survivor or a fugitive' preserves both terms distinctly.
