id: JOS.8.10
reference: Joshua 8:10
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֤ם יְהוֹשֻׁ֨עַ֙ בַּ/בֹּ֔קֶר וַ/יִּפְקֹ֖ד אֶת הָ/עָ֑ם וַ/יַּ֨עַל
    ה֜וּא וְ/זִקְנֵ֧י יִשְׂרָאֵ֛ל לִ/פְנֵ֥י הָ/עָ֖ם הָ/עָֽי־׃
translation:
  text: Joshua rose early in the morning and mustered the people, and he went up with
    the elders of Israel before the people to Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'numbered the people' or 'reviewed the people'; the Hebrew verb can denote
      counting, inspecting, appointing, or mustering, and the military context favors
      'mustered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early. 'Rose early' is idiomatic,
    concise English and preserves the temporal emphasis without over-paraphrasing.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In the morning' is natural modern
    English and keeps the explicit time reference present in the Hebrew.
- source_word: וַיִּפְקֹד אֶת־הָעָם
  chosen: mustered the people
  alternatives:
  - numbered the people
  - reviewed the people
  - appointed the people
  lexicon: HALOT
  rationale: פקד has a broad semantic range including count, inspect, appoint, and
    muster. In this military context before the attack on Ai, 'mustered the people'
    best captures organizing/reviewing the troops rather than merely counting them.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: The Hebrew says 'the people,' and optimal equivalence preserves that
    wording. Although the military setting suggests fighting men, 'the people' avoids
    narrowing the term beyond the source text.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - advanced
  - marched up
  - ascended
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up.' Even in military movement, 'went up'
    preserves the Hebrew's ordinary wording and possible topographical sense.
- source_word: הוּא וְזִקְנֵי יִשְׂרָאֵל
  chosen: he went up with the elders of Israel
  alternatives:
  - he and the elders of Israel went up
  lexicon: HALOT
  rationale: The explicit pronoun highlights Joshua himself along with the elders.
    English smoothness favors 'he went up with the elders of Israel' while retaining
    the participants clearly.
- source_word: לִפְנֵי הָעָם
  chosen: before the people
  alternatives:
  - in front of the people
  - at the head of the people
  lexicon: HALOT
  rationale: לפני literally means 'before/in front of.' 'Before the people' preserves
    the Hebrew closely and can naturally imply leadership position without making
    that interpretation overly explicit.
- source_word: הָעָי
  chosen: Ai
  alternatives:
  - the Ai
  lexicon: HALOT
  rationale: As a place name, standard English usage is simply 'Ai.' The Hebrew article
    is not normally carried over into English with proper place names.
