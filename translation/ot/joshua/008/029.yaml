id: JOS.8.29
reference: Joshua 8:29
source:
  edition: WLC
  text: וְ/אֶת מֶ֧לֶךְ הָ/עַ֛י תָּלָ֥ה עַל הָ/עֵ֖ץ עַד עֵ֣ת הָ/עָ֑רֶב וּ/כְ/ב֣וֹא
    הַ/שֶּׁמֶשׁ֩ צִוָּ֨ה יְהוֹשֻׁ֜עַ וַ/יֹּרִ֧ידוּ אֶת נִבְלָת֣/וֹ מִן הָ/עֵ֗ץ וַ/יַּשְׁלִ֤יכוּ
    אוֹתָ/הּ֙ אֶל פֶּ֨תַח֙ שַׁ֣עַר הָ/עִ֔יר וַ/יָּקִ֤ימוּ עָלָי/ו֙ גַּל אֲבָנִ֣ים
    גָּד֔וֹל עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־־־־־׃פ
translation:
  text: And he hanged the king of Ai on the tree until the time of evening. And at
    sunset Joshua commanded, and they took his corpse down from the tree and threw
    it at the entrance of the city gate, and they raised over him a large heap of
    stones to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hung'; the Hebrew verb means 'to hang/suspend.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when the sun went down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּלָה
  chosen: hanged
  alternatives:
  - hung
  - impaled
  lexicon: HALOT
  rationale: The verb means to hang/suspend. 'Hanged' is idiomatic in English for
    execution, while 'hung' is also possible. 'Impaled' is too specific for the Hebrew
    here.
- source_word: הָעֵץ
  chosen: the tree
  alternatives:
  - the wood
  - the stake
  lexicon: HALOT
  rationale: עֵץ commonly means 'tree' or wood. In this execution context it may denote
    a wooden structure, but 'tree' is the plain and traditional sense and matches
    the Hebrew wording.
- source_word: עַד עֵת הָעָרֶב
  chosen: until the time of evening
  alternatives:
  - until evening
  - until the evening time
  lexicon: HALOT
  rationale: This preserves the temporal phrasing of the Hebrew without becoming wooden.
    'Until evening' is smoother but slightly less explicit than the construct phrase.
- source_word: וּכְבֹא הַשֶּׁמֶשׁ
  chosen: at sunset
  alternatives:
  - when the sun came in
  - when the sun went down
  lexicon: HALOT
  rationale: The idiom refers to the sun's setting. 'At sunset' is natural modern
    English and accurately conveys the temporal force.
- source_word: נִבְלָתוֹ
  chosen: his corpse
  alternatives:
  - his body
  - his carcass
  lexicon: HALOT
  rationale: נְבֵלָה denotes a dead body/carcass. 'Corpse' preserves the starkness
    better than the softer 'body,' while 'carcass' can sound dehumanizing in English.
- source_word: וַיַּשְׁלִיכוּ אֹתָהּ
  chosen: threw it
  alternatives:
  - cast it
  - threw him
  lexicon: HALOT
  rationale: The object suffix is feminine because it refers back to the feminine
    noun נְבֵלָה ('corpse'), so English naturally uses 'it.' 'Cast' is possible but
    less natural in contemporary English.
- source_word: פֶּתַח שַׁעַר הָעִיר
  chosen: the entrance of the city gate
  alternatives:
  - the opening of the city gate
  - the gateway of the city
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening' and שַׁעַר is 'gate.' The phrase points
    to the area at the gate entrance. This rendering stays close to the Hebrew while
    remaining readable.
- source_word: גַּל אֲבָנִים גָּדוֹל
  chosen: a large heap of stones
  alternatives:
  - a great mound of stones
  - a large cairn of stones
  lexicon: HALOT
  rationale: גַּל is a heap/mound, often of stones. 'Heap of stones' is clear and
    idiomatic; 'cairn' is precise but less accessible for general readers.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English rendering of the Hebrew formula
    indicating continuing memorial significance up to the narrator's present.
