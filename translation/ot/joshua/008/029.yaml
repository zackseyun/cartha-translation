theological_decisions:
- issue: Narrative subject in the opening clause
  chosen_reading: Rendered as 'he hanged the king of Ai' with Joshua as the implied
    subject
  alternative_readings:
  - Rendered impersonally/plurally as 'they hanged the king of Ai'
  rationale: The Hebrew uses a 3ms perfect without an explicit subject in the clause,
    followed by Joshua explicitly named in the next clause. In context, Joshua is
    the most natural implied subject, and the singular verb supports this. This is
    a narrative-syntactic decision rather than a doctrinal one.
