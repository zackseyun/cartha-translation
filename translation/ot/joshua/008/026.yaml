id: JOS.8.26
reference: Joshua 8:26
source:
  edition: WLC
  text: וִ/יהוֹשֻׁ֨עַ֙ לֹֽא הֵשִׁ֣יב יָד֔/וֹ אֲשֶׁ֥ר נָטָ֖ה בַּ/כִּיד֑וֹן עַ֚ד אֲשֶׁ֣ר
    הֶחֱרִ֔ים אֵ֖ת כָּל יֹשְׁבֵ֥י הָ/עָֽי־־׃
translation:
  text: And Joshua did not draw back his hand, which he had stretched out with the
    javelin, until he had devoted all the inhabitants of Ai to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'utterly destroyed all the inhabitants of Ai'; Hebrew uses a verb associated
      with putting something under the ban, that is, devoting it to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵשִׁיב
  chosen: did not draw back
  alternatives:
  - did not bring back
  - did not withdraw
  - did not turn back
  lexicon: HALOT
  rationale: The hiphil of שוב here means to cause to return/bring back. With 'his
    hand' as object in a battle scene, idiomatic English is 'draw back' or 'withdraw,'
    conveying that Joshua kept his hand extended.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Literal body-part reference; no reason to paraphrase.
- source_word: נָטָה
  chosen: had stretched out
  alternatives:
  - extended
  - held out
  lexicon: HALOT
  rationale: The verb means to stretch out/extend. The pluperfect-like English 'had
    stretched out' fits the relative clause referring to the already-extended hand.
- source_word: בַּכִּידוֹן
  chosen: with the javelin
  alternatives:
  - with the spear
  - holding the javelin
  lexicon: HALOT
  rationale: כידון denotes a javelin/spear-like weapon. 'Javelin' preserves the likely
    specific sense and matches the immediate narrative context of Joshua's raised
    weapon.
- source_word: הֶחֱרִים
  chosen: had devoted ... to destruction
  alternatives:
  - utterly destroyed
  - put under the ban
  lexicon: HALOT
  rationale: The hiphil of חרם carries the technical sense of devoting persons or
    things to destruction under the ban. 'Devoted ... to destruction' preserves that
    theological-legal nuance better than the flatter 'destroyed'.
- source_word: כָּל יֹשְׁבֵי הָעָי
  chosen: all the inhabitants of Ai
  alternatives:
  - all who lived in Ai
  - all the residents of Ai
  lexicon: HALOT
  rationale: יֹשְׁבֵי literally means those dwelling in/inhabitants of. 'Inhabitants'
    is natural and sufficiently formal for the context.
- source_word: וִיהוֹשֻׁעַ
  chosen: And Joshua
  rationale: Standard transliteration of the personal name, with conjunction retained.
