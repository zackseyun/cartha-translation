theological_decisions:
- issue: Rendering of חרם in a warfare judgment context
  chosen_reading: devoted all the inhabitants of Ai to destruction
  alternative_readings:
  - utterly destroyed all the inhabitants of Ai
  - put all the inhabitants of Ai under the ban
  rationale: This wording preserves the specific covenantal/judgment nuance of חרם
    without importing extra explanation into the main text. It avoids flattening the
    term into mere military destruction while remaining readable modern English.
  doctrine_reference: Translation philosophy §§1, 5
