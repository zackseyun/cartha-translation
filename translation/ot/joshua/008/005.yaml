id: JOS.8.5
reference: Joshua 8:5
source:
  edition: WLC
  text: וַ/אֲנִ֗י וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אִתִּ֔/י נִקְרַ֖ב אֶל הָ/עִ֑יר וְ/הָיָ֗ה
    כִּֽי יֵצְא֤וּ לִ/קְרָאתֵ֨/נוּ֙ כַּ/אֲשֶׁ֣ר בָּ/רִֽאשֹׁנָ֔ה וְ/נַ֖סְנוּ לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: And I and all the people who are with me will approach the city. And when
    they come out to meet us, as before, we will flee before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will draw near the city.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'as at the first.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְרַב
  chosen: will approach
  alternatives:
  - will draw near
  - will come near
  lexicon: HALOT
  rationale: Qal imperfect 1cp of קרב expresses planned future action in the narrative
    strategy. 'Approach' is natural modern English and preserves the movement toward
    the city without overinterpreting intent.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the men
  lexicon: HALOT
  rationale: עם here refers to the group accompanying Joshua. 'The people' is the
    plain lexical sense and avoids narrowing the reference beyond the Hebrew.
- source_word: אֲשֶׁר אִתִּי
  chosen: who are with me
  alternatives:
  - who is with me
  - with me
  lexicon: HALOT
  rationale: 'The relative clause identifies the accompanying group. English idiom
    prefers plural agreement with ''people'' in this context: ''who are with me.'''
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - and it will be, when
  - and it shall be, when
  lexicon: HALOT
  rationale: This is a common Hebrew narrative-temporal construction introducing the
    next event. 'And when' conveys the sense in readable modern English without wooden
    literalism.
- source_word: יֵצְאוּ לִקְרָאתֵנוּ
  chosen: they come out to meet us
  alternatives:
  - they go out to meet us
  - they come out against us
  lexicon: HALOT
  rationale: יצא + לקראת commonly means 'go/come out to meet.' 'Come out to meet us'
    fits the deictic perspective of the speakers and preserves the tactical movement.
- source_word: כַּאֲשֶׁר בָּרִאשֹׁנָה
  chosen: as before
  alternatives:
  - as at the first
  - as formerly
  - as the first time
  lexicon: HALOT
  rationale: The phrase refers back to the earlier encounter with Ai. 'As before'
    is concise, idiomatic, and contextually clear.
- source_word: וְנַסְנוּ
  chosen: we will flee
  alternatives:
  - and we will flee
  - we will retreat
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in this sequence carries the planned future
    action. 'Flee' best matches נוס and the feigned retreat in context; 'retreat'
    would soften the lexical force.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - from before them
  - in front of them
  lexicon: HALOT
  rationale: In combination with נוס, the phrase means fleeing before/from the presence
    of them. 'Before them' is a standard English rendering and preserves the idiom.
- source_word: וַאֲנִי וְכָל הָעָם
  chosen: And I and all the people
  alternatives:
  - But I and all the people
  - I and all the people
  lexicon: HALOT
  rationale: The initial waw continues the speech sequence. Retaining 'And' reflects
    the Hebrew coordination and keeps the tactical instructions linked to the previous
    verse.
