id: JOS.8.16
reference: Joshua 8:16
source:
  edition: WLC
  text: וַ/יִּזָּעֲק֗וּ כָּל הָ/עָם֙ אֲשֶׁ֣ר ב/עיר לִ/רְדֹּ֖ף אַחֲרֵי/הֶ֑ם וַֽ/יִּרְדְּפוּ֙
    אַחֲרֵ֣י יְהוֹשֻׁ֔עַ וַ/יִּנָּתְק֖וּ מִן הָ/עִֽיר־־׃
translation:
  text: And all the people who were in the city were called together to pursue them,
    and they pursued Joshua and were drawn away from the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cried out'; the Hebrew verb can denote shouting, but here likely carries
      the sense of being summoned or mobilized for pursuit.
    reason: lexical_alternative
  - marker: b
    text: Or 'were cut off from the city' or 'were detached from the city.' The Hebrew
      suggests being drawn out so as to be separated from the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזָּעֲקוּ
  chosen: were called together
  alternatives:
  - cried out
  - were summoned
  lexicon: HALOT
  rationale: The Niphal of זעק can denote being called or summoned here, not merely
    shouting. In the military context of mobilization for pursuit, 'were called together'
    best captures the passive/reflexive sense and the narrative function. 'Cried out'
    is possible lexically but fits the context less well than a summons to action.
- source_word: כָּל הָעָם אֲשֶׁר בָּעִיר
  chosen: all the people who were in the city
  alternatives:
  - all the men of the city
  - all the populace in the city
  lexicon: HALOT
  rationale: עָם commonly means 'people' or 'troops/folk.' Since the phrase is qualified
    by 'who were in the city,' 'all the people who were in the city' is the most natural
    and sufficiently broad rendering. 'Men' would over-specify beyond the Hebrew.
- source_word: לִרְדֹּף אַחֲרֵיהֶם
  chosen: to pursue them
  alternatives:
  - to chase after them
  lexicon: HALOT
  rationale: רדף + אחרי is a standard idiom for pursuit. 'Pursue' is concise and natural
    in English military narrative.
- source_word: וַיִּרְדְּפוּ אַחֲרֵי יְהוֹשֻׁעַ
  chosen: they pursued Joshua
  alternatives:
  - they chased after Joshua
  lexicon: HALOT
  rationale: The repeated verb should be rendered consistently. Although the prior
    object is plural ('them'), the narrative then focuses on Joshua as representative
    leader; 'they pursued Joshua' preserves the shift in focus without smoothing it
    away.
- source_word: וַיִּנָּתְקוּ מִן הָעִיר
  chosen: were drawn away from the city
  alternatives:
  - were pulled away from the city
  - were cut off from the city
  - were detached from the city
  lexicon: HALOT
  rationale: The Niphal of נתק conveys being pulled away, torn loose, or separated.
    In context, the sense is that the pursuers were lured out and separated from the
    city's defensive position. 'Were drawn away' communicates the tactical effect
    in idiomatic English without overstating a physical severing.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
