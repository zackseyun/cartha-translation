id: JOS.8.21
reference: Joshua 8:21
source:
  edition: WLC
  text: וִ/יהוֹשֻׁ֨עַ וְ/כָֽל יִשְׂרָאֵ֜ל רָא֗וּ כִּֽי לָכַ֤ד הָֽ/אֹרֵב֙ אֶת הָ/עִ֔יר
    וְ/כִ֥י עָלָ֖ה עֲשַׁ֣ן הָ/עִ֑יר וַ/יָּשֻׁ֕בוּ וַ/יַּכּ֖וּ אֶת אַנְשֵׁ֥י הָ/עָֽי־־־־׃
translation:
  text: When Joshua and all Israel saw that the ambush had captured the city and that
    the smoke of the city had gone up, they turned back and struck down the men of
    Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men in ambush had captured the city.' The Hebrew participle can
      be rendered more explicitly to identify the ambushing force.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּ
  chosen: saw
  alternatives:
  - realized
  - looked and saw
  lexicon: HALOT
  rationale: Common verb of seeing/perceiving. 'Saw' preserves the concrete narrative
    sense and allows the following clauses to explain what they observed.
- source_word: כִּי ... וְכִי
  chosen: that ... and that
  alternatives:
  - when ... and
  - because ... and because
  lexicon: HALOT
  rationale: Here the conjunction introduces the content of what Joshua and Israel
    saw. 'That ... and that' best reflects the syntax in natural English.
- source_word: לָכַד
  chosen: had captured
  alternatives:
  - captured
  - had taken
  - seized
  lexicon: HALOT
  rationale: The verb means to capture or seize. 'Had captured' fits the prior-completed
    action relative to their seeing and reads naturally in English narrative.
- source_word: הָאֹרֵב
  chosen: the ambush
  alternatives:
  - the ambushing force
  - the men in ambush
  - the ambushers
  lexicon: HALOT
  rationale: The participial form refers to the force lying in ambush. 'The ambush'
    is concise, idiomatic in military narrative, and clearly denotes the ambushing
    party.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with article; repeated in the verse
    and retained for clarity.
- source_word: עָלָה עֲשַׁן הָעִיר
  chosen: the smoke of the city had gone up
  alternatives:
  - the city's smoke had risen
  - the smoke of the city rose
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'the smoke of the city went up/rose.' 'Had
    gone up' preserves the upward-motion imagery while fitting the sequence of events.
- source_word: וַיָּשֻׁבוּ
  chosen: they turned back
  alternatives:
  - they returned
  - they turned around
  lexicon: HALOT
  rationale: In battle context, the verb indicates reversing direction to reengage.
    'Turned back' is vivid and contextually precise.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - struck
  - killed
  - defeated
  lexicon: HALOT
  rationale: The verb נכה often means to strike/smite, frequently with lethal force
    in warfare. 'Struck down' preserves the martial force without over-specifying
    beyond the immediate wording.
- source_word: אַנְשֵׁי הָעָי
  chosen: the men of Ai
  alternatives:
  - the people of Ai
  - the warriors of Ai
  lexicon: HALOT
  rationale: אַנְשֵׁי literally means 'men of.' Per gender-accurate policy, 'men'
    is retained rather than neutralizing to 'people,' and the military context does
    not require narrowing to 'warriors' in the main text.
