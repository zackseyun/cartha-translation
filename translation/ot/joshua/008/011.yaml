id: JOS.8.11
reference: Joshua 8:11
source:
  edition: WLC
  text: וְ/כָל הָ/עָ֨ם הַ/מִּלְחָמָ֜ה אֲשֶׁ֣ר אִתּ֗/וֹ עָלוּ֙ וַֽ/יִּגְּשׁ֔וּ וַ/יָּבֹ֖אוּ
    נֶ֣גֶד הָ/עִ֑יר וַֽ/יַּחֲנוּ֙ מִ/צְּפ֣וֹן לָ/עַ֔י וְ/הַ/גַּ֖י בינ/ו וּ/בֵין הָ/עָֽי־־׃
translation:
  text: And all the fighting people who were with him went up, approached, and came
    before the city, and they camped north of Ai, with the valley between him and
    Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between him and Ai.'' The singular pronoun likely refers to Joshua,
      though some understand the sense collectively as ''between them and Ai.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כָל הָעָם הַמִּלְחָמָה
  chosen: all the fighting people
  alternatives:
  - all the people of war
  - all the warriors
  - all the army
  lexicon: HALOT
  rationale: Literally 'all the people of the war.' The phrase denotes the body of
    combatants rather than the entire civilian populace. 'Fighting people' preserves
    the collective sense of עָם while communicating military function in natural English.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - that were with him
  lexicon: HALOT
  rationale: Relative clause identifying the troops accompanying Joshua. 'Who' is
    idiomatic for persons in English.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - ascended
  - marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Even if military movement is in view, the
    simple directional sense should be retained unless context requires a more interpretive
    rendering.
- source_word: וַיִּגְּשׁוּ
  chosen: approached
  alternatives:
  - drew near
  - came near
  lexicon: HALOT
  rationale: נגשׁ indicates drawing near. 'Approached' is clear modern English and
    fits the sequence of movement verbs.
- source_word: וַיָּבֹאוּ נֶגֶד הָעִיר
  chosen: came before the city
  alternatives:
  - came opposite the city
  - came in front of the city
  - came facing the city
  lexicon: HALOT
  rationale: נֶגֶד conveys position opposite or in front of. 'Before the city' is
    concise and natural, while preserving the idea of facing it rather than entering
    it.
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  lexicon: HALOT
  rationale: חנה is the standard verb for setting up camp. 'Camped' is modern and
    readable.
- source_word: מִצְּפוֹן לָעַי
  chosen: north of Ai
  alternatives:
  - to the north of Ai
  - on the north side of Ai
  lexicon: HALOT
  rationale: The prepositional phrase marks location relative to Ai. 'North of Ai'
    is the most natural English expression.
- source_word: הַגַּי
  chosen: the valley
  alternatives:
  - the ravine
  - the wadi
  lexicon: HALOT
  rationale: גַּי refers to a valley or ravine. 'Valley' is the broad, accessible
    rendering; 'ravine' is possible but more specific than the context requires.
- source_word: בֵּינוֹ וּבֵין הָעָי
  chosen: between him and Ai
  alternatives:
  - between it and Ai
  - between them and Ai
  lexicon: HALOT
  rationale: The consonantal text has a 3ms suffix ('between him and Ai'), most naturally
    referring back to Joshua, though the sense may be collective. The more difficult
    singular should be preserved in the main text rather than harmonized away.
