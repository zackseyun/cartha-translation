id: JOS.8.15
reference: Joshua 8:15
source:
  edition: WLC
  text: וַ/יִּנָּֽגְע֛וּ יְהוֹשֻׁ֥עַ וְ/כָל יִשְׂרָאֵ֖ל לִ/פְנֵי/הֶ֑ם וַ/יָּנֻ֖סוּ
    דֶּ֥רֶךְ הַ/מִּדְבָּֽר־׃
translation:
  text: And Joshua and all Israel let themselves be beaten before them and fled by
    the way of the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were beaten before them'; in context this likely describes a tactical
      feigned defeat to draw the men of Ai away from the city.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the road to the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגְעוּ
  chosen: let themselves be beaten
  alternatives:
  - were struck down
  - pretended to be beaten
  - were routed
  lexicon: HALOT
  rationale: The Niphal form of נגע/נגף here is idiomatic in military context and
    likely denotes being beaten/defeated before the enemy, whether as apparent or
    tactical defeat. 'Let themselves be beaten' preserves the narrative strategy in
    context (Israel is feigning retreat) without over-paraphrasing the single verb
    into a full explanatory clause. Alternatives are possible because the form can
    be understood either as simple passive ('were beaten') or as part of the ambush
    ruse ('pretended to be beaten').
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in their presence
  - before their face
  lexicon: HALOT
  rationale: A standard rendering of לִפְנֵי + suffix. 'Before them' is natural English
    and preserves the spatial sense relevant to the military maneuver.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - retreated
  lexicon: HALOT
  rationale: נוּס commonly means 'flee.' 'Fled' is concise and fits the military narrative.
    'Retreated' is possible but slightly more interpretive and less direct.
- source_word: דֶּרֶךְ הַמִּדְבָּר
  chosen: by the way of the wilderness
  alternatives:
  - toward the wilderness road
  - on the road to the wilderness
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean 'way, road, route.' The construct-like phrase here indicates
    the route leading into or through the wilderness. 'By the way of the wilderness'
    stays close to the Hebrew while remaining readable; a more dynamic alternative
    is preserved in a footnote.
- source_word: יְהוֹשֻׁעַ וְכָל יִשְׂרָאֵל
  chosen: Joshua and all Israel
  alternatives:
  - Joshua and all the Israelites
  lexicon: HALOT
  rationale: The Hebrew names Joshua explicitly and then 'all Israel.' Retaining 'Israel'
    reflects the collective covenant people language of the source; 'Israelites' is
    possible but less formally aligned.
