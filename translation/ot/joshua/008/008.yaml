id: JOS.8.8
reference: Joshua 8:8
source:
  edition: WLC
  text: וְ/הָיָ֞ה כְּ/תָפְשְׂ/כֶ֣ם אֶת הָ/עִ֗יר תַּצִּ֤יתוּ אֶת הָ/עִיר֙ בָּ/אֵ֔שׁ כִּ/דְבַ֥ר יְהוָ֖ה תַּעֲשׂ֑וּ רְא֖וּ צִוִּ֥יתִי אֶתְ/כֶֽם־־׃
translation:
  text: And when you have taken the city, you shall set the city on fire. According to the word of Yahweh, you shall do. See, I have commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'According to the command of the LORD, do so.' The Hebrew phrase is literally 'according to the word of the LORD you shall do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - Then when
  lexicon: HALOT
  rationale: The clause introduces the next action in sequence with a future-oriented circumstance. In English, 'And when' best captures the idiomatic force here, rather than a wooden 'and it shall be.'
- source_word: כְּתָפְשְׂכֶם
  chosen: you have taken
  alternatives:
  - you seize
  - you capture
  lexicon: HALOT
  rationale: The prefixed כְ with infinitive/verb form gives a temporal sense, 'when/as you take.' 'Have taken' fits the completed action prior to the next command. 'Taken' is a natural military rendering for capturing a city.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: Standard rendering for עִיר in this military narrative context.
- source_word: תַּצִּיתוּ
  chosen: you shall set ... on fire
  alternatives:
  - you shall burn
  - you shall kindle against
  lexicon: HALOT
  rationale: The Hiphil of יצת means to ignite or set ablaze. 'Set the city on fire' is idiomatic English and preserves the causative sense better than simply 'burn.'
- source_word: בָּאֵשׁ
  chosen: on fire
  alternatives:
  - with fire
  - in fire
  lexicon: HALOT
  rationale: Though literally 'with/in the fire,' English idiom with the preceding verb is 'set ... on fire.' This is an optimal-equivalence adjustment, not a loss of meaning.
- source_word: כִּדְבַר יְהוָה
  chosen: According to the word of the LORD
  alternatives:
  - According to the command of the LORD
  - As the LORD has spoken
  lexicon: HALOT
  rationale: דבר is literally 'word/matter.' 'According to the word of the LORD' preserves the formal wording while still reading naturally. Because this is not a direct quotation formula, 'word' is preferable to 'spoken' here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תַּעֲשׂוּ
  chosen: you shall do
  alternatives:
  - you must do
  - do this
  lexicon: HALOT
  rationale: A straightforward imperfect functioning as instruction/command. 'You shall do' preserves the imperative force without overinterpreting modality.
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Take note
  lexicon: HALOT
  rationale: An attention-getting imperative. 'See' is concise and preserves the directness of the Hebrew.
- source_word: צִוִּיתִי אֶתְכֶם
  chosen: I have commanded you
  alternatives:
  - I commanded you
  - I have given you orders
  lexicon: HALOT
  rationale: The perfect naturally looks back to a completed act of command. 'I have commanded you' fits the discourse well and sounds natural in English.
