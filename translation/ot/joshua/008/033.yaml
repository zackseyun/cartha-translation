theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Social inclusion language for גֵּר and אֶזְרָח
  chosen_reading: both the sojourner and the native-born alike
  alternative_readings:
  - the resident foreigner and the native
  - the stranger and the citizen
  rationale: The verse emphasizes that the covenant ceremony included both non-native residents attached to Israel and native Israelites. The translation preserves that inclusion without importing later theological categories.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
