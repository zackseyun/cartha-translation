id: JOS.8.33
reference: Joshua 8:33
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֡ל וּ/זְקֵנָ֡י/ו וְ/שֹׁטְרִ֣ים וְ/שֹׁפְטָ֡י/ו עֹמְדִ֣ים מִ/זֶּ֣ה וּ/מִ/זֶּ֣ה לָ/אָר֡וֹן נֶגֶד֩ הַ/כֹּהֲנִ֨ים הַ/לְוִיִּ֜ם נֹשְׂאֵ֣י אֲר֣וֹן בְּרִית יְהוָ֗ה כַּ/גֵּר֙ כָּֽ/אֶזְרָ֔ח חֶצְי/וֹ֙ אֶל מ֣וּל הַר גְּרִזִ֔ים וְ/הַֽ/חֶצְי֖/וֹ אֶל מ֣וּל הַר עֵיבָ֑ל כַּ/אֲשֶׁ֨ר צִוָּ֜ה מֹשֶׁ֣ה עֶֽבֶד יְהוָ֗ה לְ/בָרֵ֛ךְ אֶת הָ/עָ֥ם יִשְׂרָאֵ֖ל בָּ/רִאשֹׁנָֽה־׀׀׀׀־־־־־־־׃
translation:
  text: And all Israel, with its elders, officers, and judges, was standing on this side and on that side of the ark, opposite the Levitical priests carrying the ark of the covenant of Yahweh, both the sojourner and the native-born alike. Half of them were in front of Mount Gerizim and half of them in front of Mount Ebal, just as Moses the servant of Yahweh had commanded at the first, to bless the people of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the resident foreigner as well as the native-born.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'at the first'; the phrase may mean 'as the first act' or refer back to Moses' earlier command concerning the blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  chosen: And all Israel
  alternatives:
  - And the whole of Israel
  lexicon: HALOT
  rationale: כָל with the national name denotes the full assembly of the covenant people. 'All Israel' is the natural English equivalent and preserves the corporate sense.
- source_word: וּזְקֵנָיו
  chosen: with its elders
  alternatives:
  - and its elders
  lexicon: HALOT
  rationale: The suffix refers back to Israel corporately. English 'with its elders' smooths the coordination while preserving that the elders belong to the nation as a body.
- source_word: שֹׁטְרִים
  chosen: officers
  alternatives:
  - officials
  lexicon: HALOT
  rationale: In administrative/judicial contexts שֹׁטֵר refers to an officer or overseer rather than a military policeman. 'Officers' is established and contextually fitting.
- source_word: שֹׁפְטָיו
  chosen: judges
  lexicon: HALOT
  rationale: The participial/noun form from שׁפט here denotes judicial leaders. 'Judges' is the straightforward rendering.
- source_word: עֹמְדִים
  chosen: was standing
  alternatives:
  - were standing
  lexicon: HALOT
  rationale: The Hebrew participle describes the assembled nation in position. Because the subject is the collective singular 'all Israel' followed by appositional groups, singular English agreement ('was standing') is acceptable and reads naturally.
- source_word: מִזֶּה וּמִזֶּה לָאָרוֹן
  chosen: on this side and on that side of the ark
  alternatives:
  - on either side of the ark
  lexicon: HALOT
  rationale: The distributive phrasing is spatially vivid. The fuller rendering preserves the Hebrew repetition better than the compressed idiom, though the meaning is equivalent.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - before
  - facing
  lexicon: HALOT
  rationale: נֶגֶד marks position opposite or in front of. 'Opposite' best fits the arrangement of the people relative to the priests and ark.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the Levitical priesthood
  lexicon: HALOT
  rationale: The phrase can be rendered appositionally, but in idiomatic English 'the Levitical priests' clearly conveys priests from the tribe of Levi without awkwardness.
- source_word: נֹשְׂאֵי אֲרוֹן בְּרִית יְהוָה
  chosen: who carried the ark of the covenant of the LORD
  alternatives:
  - bearing the ark of the covenant of the LORD
  lexicon: HALOT
  rationale: The participle identifies the priests by their action. 'Carried' is clear modern English. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּגֵּר כָּאֶזְרָח
  chosen: both the sojourner and the native-born alike
  alternatives:
  - as the sojourner, so the native-born
  - the resident foreigner as well as the native
  lexicon: HALOT
  rationale: The construction expresses equal inclusion of both groups in the assembly. 'Sojourner' preserves the covenantal/social category better than a more modern but less textured phrase.
- source_word: חֶצְיוֹ ... וְהַחֶצְיוֹ
  chosen: Half of them ... and half of them
  alternatives:
  - one half ... and the other half
  lexicon: HALOT
  rationale: The suffix refers to the assembled people divided into two groups. 'Half of them' makes the referent explicit in English.
- source_word: אֶל מוּל
  chosen: in front of
  alternatives:
  - opposite
  - facing
  lexicon: HALOT
  rationale: The phrase indicates position facing the mountains. 'In front of' is natural English and fits the ceremonial arrangement.
- source_word: הַר גְּרִזִים ... הַר עֵיבָל
  chosen: Mount Gerizim ... Mount Ebal
  lexicon: HALOT
  rationale: Standard English transliterations of the place names are used.
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... had commanded
  alternatives:
  - as ... commanded
  lexicon: HALOT
  rationale: The comparative particle marks conformity to prior command. The pluperfect 'had commanded' reflects that Moses' command preceded this event.
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  chosen: Moses the servant of the LORD
  lexicon: HALOT
  rationale: This is a fixed honorific description in Joshua. 'Servant' is the normal rendering for עֶבֶד here and does not require 'slave' in this context.
- source_word: לְבָרֵךְ
  chosen: to bless
  lexicon: HALOT
  rationale: The infinitive gives the purpose/result of the commanded arrangement. 'To bless' is direct and sufficient.
- source_word: בָּרִאשֹׁנָה
  chosen: at the first
  alternatives:
  - first of all
  - formerly
  - as the first act
  lexicon: HALOT
  rationale: The adverb is somewhat debated, but it most naturally points to the initial stage or prior instruction of the blessing ceremony. 'At the first' preserves the wording without over-interpreting.
