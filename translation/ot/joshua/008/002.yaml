id: JOS.8.2
reference: Joshua 8:2
source:
  edition: WLC
  text: וְ/עָשִׂ֨יתָ לָ/עַ֜י וּ/לְ/מַלְכָּ֗/הּ כַּ/אֲשֶׁ֨ר עָשִׂ֤יתָ לִֽ/ירִיחוֹ֙
    וּ/לְ/מַלְכָּ֔/הּ רַק שְׁלָלָ֥/הּ וּ/בְהֶמְתָּ֖/הּ תָּבֹ֣זּוּ לָ/כֶ֑ם שִׂים לְ/ךָ֥
    אֹרֵ֛ב לָ/עִ֖יר מֵ/אַחֲרֶֽי/הָ־־׃
translation:
  text: And you shall do to Ai and its king as you did to Jericho and its king. Only
    its spoil and its livestock you may plunder for yourselves. Set an ambush for
    yourself behind the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall plunder for yourselves.' The Hebrew form can be read as a
      straightforward future or as an authorized instruction; the main text uses 'may
      plunder' to reflect the contrast with Jericho, where plunder was forbidden.
    reason: lexical_alternative
  - marker: b
    text: Or 'set men in ambush behind the city.' The Hebrew singular participle can
      denote the ambush as a unit or the ambushing force collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall do
  alternatives:
  - And you must do
  - And you are to do
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in directive context functions
    as an instruction to Joshua. 'Shall do' preserves the formal force without sounding
    overly legalistic.
- source_word: לָעַי
  chosen: to Ai
  rationale: Proper place name, transliterated by standard English convention per
    translation philosophy.
- source_word: וּלְמַלְכָּהּ
  chosen: and its king
  alternatives:
  - and to its king
  lexicon: HALOT
  rationale: The preposition is naturally carried into English coordination. 'Its
    king' is the most natural rendering for the city's ruler.
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  chosen: as you did
  alternatives:
  - just as you did
  - according as you did
  lexicon: HALOT
  rationale: Comparative clause introducing the model from Jericho; 'as you did' is
    clear and sufficiently formal.
- source_word: לִירִיחוֹ וּלְמַלְכָּהּ
  chosen: to Jericho and its king
  alternatives:
  - to Jericho and to its king
  rationale: Proper name transliterated; coordinated object rendered smoothly in English.
- source_word: רַק
  chosen: Only
  alternatives:
  - However
  - Except that
  lexicon: HALOT
  rationale: Marks an exception to the prior comparison with Jericho. 'Only' is concise
    and preserves the restrictive force.
- source_word: שְׁלָלָהּ
  chosen: its spoil
  alternatives:
  - its plunder
  - its booty
  lexicon: HALOT
  rationale: Refers to goods taken in war. 'Spoil' is idiomatic biblical English and
    readable modern English; 'booty' can sound dated or distracting.
- source_word: וּבְהֶמְתָּהּ
  chosen: and its livestock
  alternatives:
  - and its cattle
  - and its animals
  lexicon: HALOT
  rationale: בהמה here denotes domesticated animals as property. 'Livestock' best
    captures the economic sense in contemporary English.
- source_word: תָּבֹזּוּ לָכֶם
  chosen: you may plunder for yourselves
  alternatives:
  - you shall plunder for yourselves
  - you may take as plunder for yourselves
  lexicon: HALOT
  rationale: Second masculine plural addresses Joshua's forces. In context this grants
    permission/authorization in contrast to Jericho's ban, so 'may plunder' better
    conveys the force than a simple future. 'For yourselves' preserves לָכֶם.
- source_word: שִׂים לְךָ
  chosen: Set for yourself
  alternatives:
  - Place for yourself
  - Station for yourself
  lexicon: HALOT
  rationale: Imperative to Joshua. 'Set' is natural with military positioning and
    keeps the reflexive nuance of לְךָ.
- source_word: אֹרֵב
  chosen: an ambush
  alternatives:
  - an ambushing force
  - men in ambush
  lexicon: HALOT
  rationale: The participial form functions substantivally for an ambush/ambushing
    party. 'An ambush' is concise and idiomatic in military English.
- source_word: לָעִיר
  chosen: for the city
  alternatives:
  - against the city
  - by the city
  lexicon: HALOT
  rationale: With אֹרֵב the sense is hostile positioning relative to the city. In
    idiomatic English this is best expressed by the following phrase 'behind the city';
    the target is the city.
- source_word: מֵאַחֲרֶיהָ
  chosen: behind the city
  alternatives:
  - from behind it
  - at its rear
  lexicon: HALOT
  rationale: Locative expression indicating position at the rear of the city. 'Behind
    the city' is the clearest natural English rendering.
