id: JOS.8.20
reference: Joshua 8:20
source:
  edition: WLC
  text: וַ/יִּפְנ֣וּ אַנְשֵׁי֩ הָ/עַ֨י אַחֲרֵי/הֶ֜ם וַ/יִּרְא֗וּ וְ/הִנֵּ֨ה עָלָ֜ה
    עֲשַׁ֤ן הָ/עִיר֙ הַ/שָּׁמַ֔יְמָ/ה וְ/לֹא הָיָ֨ה בָ/הֶ֥ם יָדַ֛יִם לָ/נ֖וּס הֵ֣נָּה
    וָ/הֵ֑נָּה וְ/הָ/עָם֙ הַ/נָּ֣ס הַ/מִּדְבָּ֔ר נֶהְפַּ֖ךְ אֶל הָ/רוֹדֵֽף־־׃
translation:
  text: Then the men of Ai turned behind them and looked, and behold, the smoke of
    the city was going up to the sky, and there was no power in them to flee this
    way or that way. And the people who had fled to the wilderness turned back against
    the pursuer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose to heaven.' The Hebrew expression is literally 'heavenward/skyward.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''there was no hands in them,'' meaning they had no power
      or ability to escape.'
    reason: cultural_note
  - marker: c
    text: The Hebrew has singular 'the pursuer,' likely used collectively for the
      pursuing force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: turned
  alternatives:
  - turned around
  - looked back
  lexicon: HALOT
  rationale: The verb פנה here denotes changing direction/orientation. 'Turned' is
    concise and natural; the following 'looked' renders the next verb, so 'looked
    back' here would blur the distinction between the two actions.
- source_word: אַנְשֵׁי הָעַי
  chosen: the men of Ai
  alternatives:
  - the men of the Ai
  - the people of Ai
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In a military context this refers to
    the fighting men/citizens of Ai. 'The men of Ai' is the most direct and idiomatic
    rendering.
- source_word: אַחֲרֵיהֶם
  chosen: behind them
  alternatives:
  - backward
  - after them
  lexicon: HALOT
  rationale: With פנה, the phrase indicates turning to look behind themselves, i.e.,
    toward their rear. 'Behind them' best captures the spatial sense in context.
- source_word: וַיִּרְאוּ
  chosen: looked
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Because the next clause gives the content of what they perceived, 'looked'
    preserves the sequence 'turned ... and looked,' while still implying sight. 'Saw'
    is possible but slightly less vivid in the action sequence.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a sudden realization.
    'And behold' preserves that force in readable but elevated narrative English.
- source_word: עָלָה עֲשַׁן הָעִיר הַשָּׁמַיְמָה
  chosen: the smoke of the city was going up to the sky
  alternatives:
  - the smoke of the city rose to heaven
  - the city's smoke went up skyward
  lexicon: HALOT
  rationale: The clause describes ongoing upward movement. 'Was going up' reflects
    the verbal aspect naturally in English. הַשָּׁמַיְמָה is literally 'heavenward/skyward';
    'to the sky' is clear modern English without importing theological overtones that
    'to heaven' might suggest here.
- source_word: וְלֹא הָיָה בָהֶם יָדַיִם
  chosen: there was no power in them
  alternatives:
  - they had no strength
  - there were no hands in them
  lexicon: HALOT
  rationale: The idiom 'there was no hands in them' means they lacked the ability
    or power to act. 'No power in them' preserves the metaphorical force better than
    a flat paraphrase while remaining intelligible.
- source_word: לָנוּס הֵנָּה וָהֵנָּה
  chosen: to flee this way or that way
  alternatives:
  - to flee here or there
  - to escape in any direction
  lexicon: HALOT
  rationale: The paired adverbs indicate movement in either direction, stressing that
    escape was impossible. 'This way or that way' is idiomatic and close to the Hebrew.
- source_word: וְהָעָם הַנָּס הַמִּדְבָּר
  chosen: the people who had fled to the wilderness
  alternatives:
  - the people fleeing to the wilderness
  - the people who were fleeing into the wilderness
  lexicon: HALOT
  rationale: 'The participle with article identifies the group by their prior action
    in the battle narrative. English past perfect (''had fled'') fits the sequence:
    they had been retreating and now reverse course.'
- source_word: נֶהְפַּךְ
  chosen: turned back
  alternatives:
  - was turned
  - turned around
  lexicon: HALOT
  rationale: In context the verb marks reversal of direction against the pursuers.
    'Turned back' captures both reversal and tactical counterattack movement.
- source_word: אֶל הָרֹדֵף
  chosen: against the pursuer
  alternatives:
  - toward the pursuer
  - against the one pursuing
  - against the pursuers
  lexicon: HALOT
  rationale: The singular participle likely functions collectively or generically
    for the pursuing force. 'Against the pursuer' preserves the singular form while
    conveying hostile reversal. 'Toward' is too neutral in this battle context.
