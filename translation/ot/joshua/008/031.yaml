id: JOS.8.31
reference: Joshua 8:31
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר צִוָּה֩ מֹשֶׁ֨ה עֶֽבֶד יְהוָ֜ה אֶת בְּנֵ֣י יִשְׂרָאֵ֗ל כַּ/כָּתוּב֙ בְּ/סֵ֨פֶר֙ תּוֹרַ֣ת מֹשֶׁ֔ה מִזְבַּח֙ אֲבָנִ֣ים שְׁלֵמ֔וֹת אֲשֶׁ֛ר לֹֽא הֵנִ֥יף עֲלֵי/הֶ֖ן בַּרְזֶ֑ל וַ/יַּעֲל֨וּ עָלָ֤י/ו עֹלוֹת֙ לַֽ/יהוָ֔ה וַֽ/יִּזְבְּח֖וּ שְׁלָמִֽים־־־׃
translation:
  text: just as Moses the servant of Yahweh had commanded the sons of Israel, as it is written in the Book of the Law of Moses, an altar of uncut stones, on which no iron had been wielded; and they offered up burnt offerings on it to Yahweh and sacrificed peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an altar of uncut stones.' The Hebrew says 'whole stones,' emphasizing that the stones were left intact and not worked with iron.
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces conformity to a prior command. 'Just as' gives natural English while preserving the comparative force.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'Pluperfect sense fits the narrative sequence: Joshua''s action conforms to an earlier command given through Moses.'
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: For this established honorific title of Moses, 'servant' is the most idiomatic and contextually appropriate English rendering. The bonded-status nuance of 'slave' is not foregrounded here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the familial/corporate expression of the Hebrew. This follows the gender-accurate principle rather than flattening to a neutral collective.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  - as written
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the written-authority formula.
- source_word: בְּסֵפֶר תּוֹרַת מֹשֶׁה
  chosen: in the Book of the Law of Moses
  alternatives:
  - in the book of Moses' law
  - in the scroll of the law of Moses
  lexicon: HALOT
  rationale: Preserves both 'book' and 'law/instruction' in a recognizable formal phrase.
- source_word: מִזְבַּח אֲבָנִים שְׁלֵמוֹת
  chosen: an altar of whole stones
  alternatives:
  - an altar of uncut stones
  - an altar of complete stones
  lexicon: HALOT
  rationale: שְׁלֵמוֹת denotes stones left intact. 'Whole stones' is a close rendering that matches the following clause prohibiting iron tooling. 'Uncut stones' is interpretive but valid; the main text keeps the more literal image.
- source_word: לֹא הֵנִיף עֲלֵיהֶן בַּרְזֶל
  chosen: on which no iron tool had been wielded
  alternatives:
  - on which no iron had been used
  - over which no iron had been waved
  - on which no iron had been lifted
  lexicon: HALOT
  rationale: The idiom literally speaks of lifting/wielding iron against the stones. 'No iron tool had been wielded' communicates the intended construction prohibition in clear English without wooden literalism.
- source_word: וַיַּעֲלוּ עָלָיו עֹלוֹת
  chosen: they offered up burnt offerings on it
  alternatives:
  - they brought up burnt offerings on it
  - they offered burnt offerings on it
  lexicon: HALOT
  rationale: Uses sacrificial idiom natural in English while preserving the specific offering type עֹלוֹת as 'burnt offerings.' 'Offered up' reflects the verbal nuance of causing to ascend.
- source_word: וַיִּזְבְּחוּ שְׁלָמִים
  chosen: and sacrificed peace offerings
  alternatives:
  - and sacrificed fellowship offerings
  - and offered well-being offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings'; this remains understandable and preserves continuity with sacrificial terminology. Alternatives are possible but less established in English Bible usage.
