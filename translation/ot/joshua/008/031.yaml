theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is explicitly masculine plural in a corporate/familial expression. Per the gender-accurate principle, the translation preserves that form rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sacrificial term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The term has a range of associations, but 'peace offerings' is the most stable and recognizable English equivalent. Alternatives are preserved in a footnote because the semantic field includes fellowship/well-being, not merely absence of conflict.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
