id: JOS.8.9
reference: Joshua 8:9
source:
  edition: WLC
  text: וַ/יִּשְׁלָחֵ֣/ם יְהוֹשֻׁ֗עַ וַ/יֵּֽלְכוּ֙ אֶל הַ/מַּאְרָ֔ב וַ/יֵּשְׁב֗וּ
    בֵּ֧ין בֵּֽית אֵ֛ל וּ/בֵ֥ין הָ/עַ֖י מִ/יָּ֣ם לָ/עָ֑י וַ/יָּ֧לֶן יְהוֹשֻׁ֛עַ בַּ/לַּ֥יְלָה
    הַ/ה֖וּא בְּ/ת֥וֹךְ הָ/עָֽם־־׃
translation:
  text: So Joshua sent them, and they went to the ambush and stayed between Bethel
    and Ai, west of Ai. But Joshua spent that night among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ambush site' / 'the place of ambush.' The Hebrew can refer either
      to the ambushing force or to its position; here the context favors the position
      they occupied.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֵם
  chosen: sent them
  alternatives:
  - dispatched them
  lexicon: HALOT
  rationale: The verb שלח in the hiphil/waw-consecutive narrative form here straightforwardly
    means Joshua caused them to go, i.e., 'sent them.' 'Dispatched' is possible but
    slightly more formal; 'sent them' is natural and sufficiently precise.
- source_word: הַמַּאְרָב
  chosen: the ambush
  alternatives:
  - the ambush site
  - the place of ambush
  lexicon: HALOT
  rationale: The noun refers to an ambush/lying-in-wait force or position. In this
    context, where the men are going to take up position, 'the ambush' is concise
    and idiomatic, with the locative sense carried by 'went to.'
- source_word: וַיֵּשְׁבוּ
  chosen: stayed
  alternatives:
  - sat
  - remained
  - took up position
  lexicon: HALOT
  rationale: ישב often means 'sit, dwell, remain.' In military narrative here it denotes
    taking and maintaining position. 'Stayed' preserves the basic sense in readable
    English without over-interpreting; 'took up position' is interpretive though contextually
    plausible.
- source_word: בֵּין בֵּית אֵל וּבֵין הָעַי
  chosen: between Bethel and Ai
  lexicon: HALOT
  rationale: A direct geographic statement; standard transliterations of the place
    names are used in keeping with the philosophy of transliterating names.
- source_word: מִיָּם לָעָי
  chosen: west of Ai
  alternatives:
  - on the west of Ai
  - from the west of Ai
  lexicon: HALOT
  rationale: ים literally means 'sea,' but in geographic idiom it denotes 'west' (the
    direction of the Mediterranean). 'West of Ai' gives the plain directional sense
    in natural English.
- source_word: וַיָּלֶן
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: לון in this form means to lodge or remain overnight. 'Spent the night'
    is idiomatic modern English and fits the narrative flow.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - during that night
  - on that night
  lexicon: HALOT
  rationale: The phrase is temporal and naturally rendered 'that night.'
- source_word: בְּתוֹךְ הָעָם
  chosen: among the people
  alternatives:
  - in the midst of the people
  - within the people
  lexicon: HALOT
  rationale: תוך with ב conveys being in the midst of a group. 'Among the people'
    is clear modern English; 'in the midst of the people' is more formal but less
    natural.
