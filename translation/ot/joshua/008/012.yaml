id: JOS.8.12
reference: Joshua 8:12
source:
  edition: WLC
  text: וַ/יִּקַּ֕ח כַּ/חֲמֵ֥שֶׁת אֲלָפִ֖ים אִ֑ישׁ וַ/יָּ֨שֶׂם אוֹתָ֜/ם אֹרֵ֗ב בֵּ֧ין
    בֵּֽית אֵ֛ל וּ/בֵ֥ין הָ/עַ֖י מִ/יָּ֥ם לָ/עִֽיר־׃
translation:
  text: And he took about five thousand men and set them as an ambush between Bethel
    and Ai, west of the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'about five thousand men'; the prefixed כ on 'five' likely indicates
      approximation rather than an exact total.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the sea of the city,' with 'sea' used idiomatically for
      'west.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: he took
  alternatives:
  - he selected
  - he took along
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form most naturally means
    'took.' In this military context it can imply selecting or taking from a larger
    force, but 'took' preserves the Hebrew wording without over-interpreting.
- source_word: כַּחֲמֵשֶׁת אֲלָפִים אִישׁ
  chosen: about five thousand men
  alternatives:
  - some five thousand men
  - approximately five thousand men
  - five thousand men
  lexicon: HALOT
  rationale: The prefixed כ on the number commonly has an approximating force, hence
    'about' or 'some.' אִישׁ after a number functions collectively as 'men.' Rendering
    the approximation is important and preferable to flattening it to an exact 'five
    thousand.'
- source_word: וַיָּשֶׂם אֹתָם
  chosen: and set them
  alternatives:
  - and stationed them
  - and placed them
  lexicon: HALOT
  rationale: שׂים is broadly 'put/place/set.' In military context 'stationed' is possible,
    but 'set them' keeps the Hebrew's simplicity while remaining natural in English
    when followed by 'as an ambush.'
- source_word: אֹרֵב
  chosen: as an ambush
  alternatives:
  - in ambush
  - as ambushers
  lexicon: HALOT
  rationale: The participial/noun form denotes lying in wait or an ambush force. 'Set
    them as an ambush' is idiomatic English and reflects the function of the group.
    'As ambushers' is possible but less natural.
- source_word: בֵּין בֵּית אֵל וּבֵין הָעַי
  chosen: between Bethel and Ai
  lexicon: HALOT
  rationale: Straightforward locative expression with proper names transliterated
    per project philosophy.
- source_word: מִיָּם לָעִיר
  chosen: west of the city
  alternatives:
  - on the west of the city
  - from the west of the city
  lexicon: HALOT
  rationale: יָם ('sea') functions idiomatically as 'west' in Hebrew geographical
    orientation. The phrase locates the ambush on the western side relative to the
    city. 'West of the city' is the clearest natural rendering.
