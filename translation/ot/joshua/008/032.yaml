theological_decisions:
- issue: Scope of מִשְׁנֵה תּוֹרַת מֹשֶׁה
  chosen_reading: Rendered as 'a copy of the law of Moses' without specifying whether
    this means the whole Torah or a selected legal section.
  alternative_readings:
  - '''a repetition of the law of Moses'''
  - '''a duplicate of the law of Moses'''
  rationale: The verse itself does not define the extent of what was written. The
    translation preserves the textual claim without importing a harmonizing or reductionist
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
