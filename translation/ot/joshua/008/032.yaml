id: JOS.8.32
reference: Joshua 8:32
source:
  edition: WLC
  text: וַ/יִּכְתָּב שָׁ֖ם עַל הָ/אֲבָנִ֑ים אֵ֗ת מִשְׁנֵה֙ תּוֹרַ֣ת מֹשֶׁ֔ה אֲשֶׁ֣ר
    כָּתַ֔ב לִ/פְנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And there, on the stones, he wrote a copy of the law of Moses, which he had
    written before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a repetition of the law of Moses' or 'a duplicate of the law of Moses.'
      The Hebrew term can denote a copy or repeated version.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the presence of the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתָּב
  chosen: he wrote
  alternatives:
  - he inscribed
  lexicon: HALOT
  rationale: Qal wayyiqtol of כתב, the main narrative verb. 'He wrote' is the plain
    sense; 'inscribed' is possible given the stone surface, but the Hebrew verb itself
    is the ordinary term for writing.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverb of place, naturally rendered 'there' in English narrative.
- source_word: עַל הָאֲבָנִים
  chosen: on the stones
  alternatives:
  - upon the stones
  lexicon: HALOT
  rationale: The preposition עַל with the definite plural noun 'stones' indicates
    the writing surface. 'On the stones' is idiomatic and sufficiently formal.
- source_word: אֵת מִשְׁנֵה תּוֹרַת מֹשֶׁה
  chosen: a copy of the law of Moses
  alternatives:
  - the copy of the law of Moses
  - a repetition of the law of Moses
  - a duplicate of the law of Moses
  lexicon: HALOT
  rationale: מִשְׁנֵה can denote a copy, duplicate, or repetition. In this context
    of writing on stones, 'a copy of the law of Moses' best fits the action and common
    legal sense without over-specifying whether the entire Torah or a selected legal
    corpus is meant.
- source_word: תּוֹרָה
  chosen: law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: Though תּוֹרָה can mean 'instruction,' in the collocation 'the law of
    Moses' and in covenantal/legal context, 'law' is the most natural and recognizable
    rendering.
- source_word: אֲשֶׁר כָּתַב
  chosen: which he had written
  alternatives:
  - which he wrote
  lexicon: HALOT
  rationale: The relative clause refers to Moses' prior writing. English past perfect
    clarifies anterior action relative to Joshua's writing in the main clause.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' spatially or in the presence of someone.
    Here it indicates public visibility before Israel; 'before' preserves the Hebrew
    succinctly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the masculine plural construct
    is preserved as 'sons of Israel.' 'Israelites' is smoother but less formally transparent;
    'children of Israel' is traditional but less precise to the masculine form.
