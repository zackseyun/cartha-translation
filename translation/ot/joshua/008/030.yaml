id: JOS.8.30
reference: Joshua 8:30
source:
  edition: WLC
  text: אָ֣ז יִבְנֶ֤ה יְהוֹשֻׁ֨עַ֙ מִזְבֵּ֔חַ לַֽ/יהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל בְּ/הַ֖ר עֵיבָֽל׃
translation:
  text: Then Joshua built an altar to Yahweh, the God of Israel, on Mount Ebal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The translation follows the project’s standard practice of rendering the divine name יְהוָה as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the next event in sequence. 'Then' is natural modern English and preserves the narrative flow.
- source_word: יִבְנֶה
  chosen: built
  alternatives:
  - would build
  - began to build
  lexicon: HALOT
  rationale: Though morphologically an imperfect, in Hebrew narrative after אָז it commonly has preterite force. English simple past best reflects the eventive sequence here.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, following the translation philosophy to transliterate names.
- source_word: מִזְבֵּחַ
  chosen: an altar
  alternatives:
  - altar
  lexicon: HALOT
  rationale: Refers to a sacrificial altar. The indefinite article is natural in English and fits the first mention in this context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: 'The preposition ל marks dedication/direction: the altar is built to/for YHWH. ''To the LORD'' is idiomatic and preserves the covenant name according to the doctrinal default rendering of יְהוָה as ''the LORD.'''
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct chain identifying YHWH as Israel's God. 'The God of Israel' is the standard, transparent rendering and preserves the formal apposition.
- source_word: בְּהַר עֵיבָל
  chosen: on Mount Ebal
  alternatives:
  - in the hill country of Ebal
  - at Mount Ebal
  lexicon: HALOT
  rationale: The phrase denotes location at the mountain named Ebal. 'On Mount Ebal' is the most idiomatic English rendering for an event occurring on a mountain.
