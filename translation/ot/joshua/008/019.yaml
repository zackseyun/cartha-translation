id: JOS.8.19
reference: Joshua 8:19
source:
  edition: WLC
  text: וְ/הָ/אוֹרֵ֡ב קָם֩ מְהֵרָ֨ה מִ/מְּקוֹמ֤/וֹ וַ/יָּר֨וּצוּ֙ כִּ/נְט֣וֹת יָד֔/וֹ
    וַ/יָּבֹ֥אוּ הָ/עִ֖יר וַֽ/יִּלְכְּד֑וּ/הָ וַֽ/יְמַהֲר֔וּ וַ/יַּצִּ֥יתוּ אֶת הָ/עִ֖יר
    בָּ/אֵֽשׁ־׃
translation:
  text: Then the ambush rose quickly from its place and ran as soon as he stretched
    out his hand; they entered the city, captured it, and quickly set the city on
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he stretched out his hand.' The Hebrew construction marks the moment
      of Joshua's signal and may be rendered with either temporal nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹרֵב
  chosen: the ambush
  alternatives:
  - the ambush force
  - the men in ambush
  - the ambushers
  lexicon: HALOT
  rationale: The participial form refers collectively to the force lying in wait,
    not merely the abstract act of ambushing. 'The ambush' is concise modern English
    and naturally functions as a collective singular, matching the subsequent plural
    verbs by sense in English.
- source_word: קָם
  chosen: rose
  alternatives:
  - arose
  - got up
  lexicon: HALOT
  rationale: Qal of קום here marks the ambush force springing into action from concealment.
    'Rose' is idiomatic and suitably formal without sounding archaic.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - in haste
  - swiftly
  lexicon: HALOT
  rationale: The adverbial sense indicates prompt action. 'Quickly' is clear modern
    English and pairs well with the narrative pace.
- source_word: מִמְּקוֹמוֹ
  chosen: from its place
  alternatives:
  - from his place
  - from their place
  - from its position
  lexicon: HALOT
  rationale: The suffix is grammatically singular masculine, agreeing with the collective
    singular הָאוֹרֵב. In English, 'its place' best reflects the collective force
    conceived as a unit. 'Position' is possible but slightly more interpretive.
- source_word: וַיָּרֻצוּ
  chosen: ran
  alternatives:
  - rushed
  - hurried
  lexicon: HALOT
  rationale: The plural verb resumes the members of the ambush force individually.
    'Ran' is the plain lexical sense; 'rushed' is possible but slightly more interpretive.
- source_word: כִּנְטוֹת יָדוֹ
  chosen: as soon as he stretched out his hand
  alternatives:
  - when he stretched out his hand
  - at the stretching out of his hand
  lexicon: HALOT
  rationale: The infinitive construct with כ marks temporal immediacy. In context
    this refers to Joshua's signal with the javelin/hand. 'As soon as' captures the
    prompt response implied by the construction.
- source_word: וַיָּבֹאוּ הָעִיר
  chosen: entered the city
  alternatives:
  - came into the city
  - went into the city
  lexicon: HALOT
  rationale: English idiom prefers 'entered the city' for motion into a place. This
    is a natural rendering of בוא with a direct object of destination.
- source_word: וַיִּלְכְּדוּהָ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: לכד commonly means capture or seize, especially of a city. 'Captured
    it' is precise and standard in military narrative.
- source_word: וַיְמַהֲרוּ
  chosen: quickly
  alternatives:
  - hurried
  - made haste
  lexicon: HALOT
  rationale: This verb emphasizes the speed of the next action. Rendering it adverbially
    in English avoids clumsiness ('and they hurried and set...') while preserving
    the sense.
- source_word: וַיַּצִּיתוּ אֶת הָעִיר בָּאֵשׁ
  chosen: set the city on fire
  alternatives:
  - burned the city with fire
  - kindled the city with fire
  lexicon: HALOT
  rationale: The Hiphil of יצת means to set on fire/kindle. 'Set the city on fire'
    is idiomatic modern English and preserves the causative sense. 'With fire' is
    semantically redundant in English once 'set on fire' is used.
