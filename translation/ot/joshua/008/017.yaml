id: JOS.8.17
reference: Joshua 8:17
source:
  edition: WLC
  text: וְ/לֹֽא נִשְׁאַ֣ר אִ֗ישׁ בָּ/עַי֙ וּ/בֵ֣ית אֵ֔ל אֲשֶׁ֥ר לֹֽא יָצְא֖וּ אַחֲרֵ֣י
    יִשְׂרָאֵ֑ל וַ/יַּעַזְב֤וּ אֶת הָ/עִיר֙ פְּתוּחָ֔ה וַֽ/יִּרְדְּפ֖וּ אַחֲרֵ֥י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: And not a man was left in Ai or Bethel who did not go out after Israel, and
    they left the city open and pursued Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'they left the city unguarded.' The Hebrew reads literally
      'the city open.'
    reason: lexical_alternative
  - marker: b
    text: '''Not a man'' renders Hebrew אִישׁ, a masculine singular form used here
      generically for any person remaining behind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁאַר אִישׁ
  chosen: not a man was left
  alternatives:
  - no one remained
  - not one man remained
  lexicon: HALOT
  rationale: Combines the passive of שׁאר ('be left, remain') with אִישׁ in an idiomatic
    but source-close English expression. 'Man' preserves the singular masculine/generic
    force of אִישׁ in line with the gender-accurate policy.
- source_word: בָּעַי וּבֵית אֵל
  chosen: in Ai or Bethel
  alternatives:
  - in Ai and Bethel
  lexicon: HALOT
  rationale: The phrase names the populations of both locations involved in the pursuit.
    English 'or' after a negated expression ('not a man was left in Ai or Bethel')
    naturally conveys that none remained in either place. 'Bethel' is transliterated
    as a place name.
- source_word: אֲשֶׁר לֹא יָצְאוּ אַחֲרֵי יִשְׂרָאֵל
  chosen: who did not go out after Israel
  alternatives:
  - who had not gone out after Israel
  - who did not come out in pursuit of Israel
  lexicon: HALOT
  rationale: Retains the relative clause structure and the directional idiom אַחֲרֵי
    ('after'). 'Go out after' is slightly formal but transparent and close to the
    Hebrew military movement language.
- source_word: וַיַּעַזְבוּ
  chosen: they left
  alternatives:
  - they abandoned
  - they forsook
  lexicon: HALOT
  rationale: A straightforward rendering of עזב in narrative context. 'Abandoned'
    is possible, but 'left' better fits readable modern English while still allowing
    the following adjective to carry the tactical sense.
- source_word: הָעִיר פְּתוּחָה
  chosen: the city open
  alternatives:
  - the city exposed
  - the city unguarded
  lexicon: HALOT
  rationale: פְּתוּחָה literally means 'open.' Here it implies vulnerability, but
    the main text preserves the concrete image rather than interpreting it more dynamically
    as 'unguarded.'
- source_word: וַיִּרְדְּפוּ אַחֲרֵי יִשְׂרָאֵל
  chosen: and pursued Israel
  alternatives:
  - and chased after Israel
  lexicon: HALOT
  rationale: רדף in military narrative is well rendered by 'pursue.' Since 'after'
    is already implicit in English 'pursue,' it need not be repeated.
