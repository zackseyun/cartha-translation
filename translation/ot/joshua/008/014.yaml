id: JOS.8.14
reference: Joshua 8:14
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/רְא֣וֹת מֶֽלֶךְ הָ/עַ֗י וַֽ/יְמַהֲר֡וּ וַ/יַּשְׁכִּ֡ימוּ וַ/יֵּצְא֣וּ
    אַנְשֵֽׁי הָ/עִ֣יר לִ/קְרַֽאת יִ֠שְׂרָאֵל לַֽ/מִּלְחָמָ֞ה ה֧וּא וְ/כָל עַמּ֛/וֹ
    לַ/מּוֹעֵ֖ד לִ/פְנֵ֣י הָֽ/עֲרָבָ֑ה וְ/הוּא֙ לֹ֣א יָדַ֔ע כִּֽי אֹרֵ֥ב ל֖/וֹ מֵ/אַחֲרֵ֥י
    הָ/עִֽיר־־־־־׃
translation:
  text: And it happened, when the king of Ai saw it, that they hurried and rose early,
    and the men of the city went out to meet Israel for battle, he and all his people,
    at the appointed place before the Arabah. But he did not know that an ambush was
    against him behind the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the plain.' The Hebrew term can denote the Arabah region or,
      more generally, a desert plain/steppe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened'
    preserves the Hebrew discourse marker without archaic English.
- source_word: כִּרְאוֹת
  chosen: when ... saw it
  alternatives:
  - as soon as ... saw
  - when ... saw
  lexicon: HALOT
  rationale: Infinitive construct of ראה with כ marks temporal circumstance, 'when/as
    soon as seeing.' The object is implicit from context; English requires 'it,' referring
    to the Israelite movement visible to the king.
- source_word: מֶלֶךְ הָעַי
  chosen: the king of Ai
  alternatives:
  - Ai's king
  lexicon: HALOT
  rationale: Straightforward construct chain; standard English order is most natural.
- source_word: וַיְמַהֲרוּ
  chosen: they hurried
  alternatives:
  - they hastened
  - he hurried
  lexicon: HALOT
  rationale: Plural verb. Although the following subject 'the men of the city' clarifies
    the actors, the plural should be preserved. 'Hurried' is readable modern English.
- source_word: וַיַּשְׁכִּימוּ
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: Hiphil of שׁכם commonly means to rise early. 'Rose early' is idiomatic
    and close to the Hebrew.
- source_word: וַיֵּצְאוּ אַנְשֵׁי הָעִיר
  chosen: the men of the city went out
  alternatives:
  - the city's men went out
  - the people of the city went out
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Given the military setting, 'men of the
    city' fits both grammar and context better than the broader 'people.' This follows
    the gender-accurate principle.
- source_word: לִקְרַאת יִשְׂרָאֵל
  chosen: to meet Israel
  alternatives:
  - against Israel
  - to confront Israel
  lexicon: HALOT
  rationale: לקראת literally means 'to meet/toward meeting.' In battle context it
    implies hostile engagement, which is then made explicit by the following לַמִּלְחָמָה.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for the battle
  - to battle
  - for war
  lexicon: HALOT
  rationale: Purpose/result phrase indicating military engagement. 'For battle' is
    concise and natural.
- source_word: הוּא וְכָל עַמּוֹ
  chosen: he and all his people
  alternatives:
  - he and all his army
  - he and all the people with him
  lexicon: HALOT
  rationale: עַם normally means 'people.' In this military context it could denote
    fighting forces, but the Hebrew does not explicitly say 'army,' so 'people' is
    retained.
- source_word: לַמּוֹעֵד
  chosen: at the appointed place
  alternatives:
  - at the appointed time
  - to the appointed place
  - at the meeting place
  lexicon: HALOT
  rationale: 'מוֹעֵד can denote appointed time or place. Here, with movement into
    battle and the following geographical locator, a spatial sense is most likely:
    the prearranged/appointed place of engagement.'
- source_word: לִפְנֵי הָעֲרָבָה
  chosen: before the Arabah
  alternatives:
  - in front of the Arabah
  - before the plain
  - east of the Arabah
  lexicon: HALOT
  rationale: לִפְנֵי literally 'before/in front of.' הָעֲרָבָה may be retained as
    the geographic proper term 'the Arabah' rather than flattened to 'plain,' since
    it likely refers to a known region/terrain feature. A lexical alternative is worth
    preserving in a footnote because some translations render it generically.
- source_word: וְהוּא לֹא יָדַע
  chosen: But he did not know
  alternatives:
  - And he did not know
  - while he did not know
  lexicon: HALOT
  rationale: The clause marks ironic contrast with the king's actions. 'But' brings
    out the adversative sense naturally in English.
- source_word: אֹרֵב לוֹ
  chosen: an ambush was against him
  alternatives:
  - an ambush was waiting for him
  - men were lying in ambush for him
  lexicon: HALOT
  rationale: The participle of ארב denotes lying in ambush. Because the Hebrew uses
    a singular participial form functioning collectively/abstractly, 'an ambush' captures
    the tactic without over-specifying the agents.
- source_word: מֵאַחֲרֵי הָעִיר
  chosen: behind the city
  alternatives:
  - from behind the city
  - at the rear of the city
  lexicon: HALOT
  rationale: Spatial expression indicating the ambush's position relative to the city.
    'Behind the city' is the clearest idiomatic rendering.
