id: JOS.8.1
reference: Joshua 8:1
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל יְהוֹשֻׁ֨עַ֙ אַל תִּירָ֣א וְ/אַל תֵּחָ֔ת קַ֣ח עִמְּ/ךָ֗ אֵ֚ת כָּל עַ֣ם הַ/מִּלְחָמָ֔ה וְ/ק֖וּם עֲלֵ֣ה הָ/עָ֑י רְאֵ֣ה נָתַ֣תִּי בְ/יָדְ/ךָ֗ אֶת מֶ֤לֶךְ הָ/עַי֙ וְ/אֶת עַמּ֔/וֹ וְ/אֶת עִיר֖/וֹ וְ/אֶת אַרְצֽ/וֹ־־־־׀־־־־׃
translation:
  text: Then Yahweh said to Joshua, “Do not fear and do not be dismayed. Take with you all the fighting men, and arise, go up to Ai. See, I have given into your hand the king of Ai, his people, his city, and his land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the people of war” / “all the warriors.” The Hebrew expression literally reads “all the people of the war,” referring to the combat force.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: ירא in the Qal here is a direct prohibition against fear. 'Do not fear' is slightly more formal and pairs well with the following prohibition.
- source_word: וְאַל תֵּחָת
  chosen: and do not be dismayed
  alternatives:
  - and do not be discouraged
  - and do not be shattered
  lexicon: HALOT
  rationale: חתת in the Niphal commonly carries the sense of being broken down, dismayed, or discouraged. 'Dismayed' preserves the stronger emotional force and echoes common biblical reassurance formulas without becoming archaic.
- source_word: קַח עִמְּךָ
  chosen: Take with you
  alternatives:
  - Take
  lexicon: HALOT
  rationale: The prepositional phrase עִמְּךָ is explicit in Hebrew and should be represented in English.
- source_word: כָּל עַם הַמִּלְחָמָה
  chosen: all the fighting men
  alternatives:
  - all the people of war
  - all the army
  - all the warriors
  lexicon: HALOT
  rationale: Literally 'all the people of the war.' In context this refers to the combat force, not every inhabitant. 'Fighting men' is idiomatic, clear, and reflects the military sense while preserving the masculine force of the Hebrew expression.
- source_word: וְקוּם עֲלֵה
  chosen: and arise, go up
  alternatives:
  - and get up, go up
  - and set out, go up
  lexicon: HALOT
  rationale: Two imperatives are present and both are retained. 'Arise, go up' preserves the Hebrew sequence and urgency.
- source_word: הָעָי
  chosen: Ai
  lexicon: HALOT
  rationale: 'Place name is transliterated according to the translation philosophy: translate titles, transliterate names.'
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: The imperative introduces divine assurance. 'See' is natural modern English and preserves the deictic force without the archaism of 'behold.'
- source_word: נָתַתִּי בְיָדְךָ
  chosen: I have given into your hand
  alternatives:
  - I give into your hand
  - I have delivered into your hand
  lexicon: HALOT
  rationale: The perfect can express a completed action with present force in divine speech, emphasizing certainty. 'Into your hand' preserves the Hebrew idiom of delivered power/control.
- source_word: מֶלֶךְ הָעַי
  chosen: the king of Ai
  lexicon: HALOT
  rationale: Straightforward construct relationship; no reason to paraphrase.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - its people
  lexicon: HALOT
  rationale: The suffix grammatically refers back to the king, yielding 'his people.' This also keeps the sequence of possessions/persons attached to the king in the Hebrew wording.
- source_word: עִירוֹ
  chosen: his city
  alternatives:
  - its city
  lexicon: HALOT
  rationale: As with 'his people,' the suffix most directly refers to the king in the Hebrew sequence; English can preserve that form.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - its land
  - his territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory/domain associated with the king and city. 'Land' is the most direct and consistent rendering.
