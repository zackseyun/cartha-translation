theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Gendered military expression in כָּל עַם הַמִּלְחָמָה
  chosen_reading: all the fighting men
  alternative_readings:
  - all the warriors
  - all the army
  rationale: The doctrine calls for gender-accurate rendering over gender-neutral language where the source intent is masculine/representative. In this military context, 'fighting men' best reflects the Hebrew expression without flattening it into a generic collective.
  doctrine_reference: 'DOCTRINE.md — Translation philosophy #4'
