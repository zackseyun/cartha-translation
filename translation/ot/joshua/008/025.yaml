id: JOS.8.25
reference: Joshua 8:25
source:
  edition: WLC
  text: וַ/יְהִי֩ כָל הַ/נֹּ֨פְלִ֜ים בַּ/יּ֤וֹם הַ/הוּא֙ מֵ/אִ֣ישׁ וְ/עַד אִשָּׁ֔ה
    שְׁנֵ֥ים עָשָׂ֖ר אָ֑לֶף כֹּ֖ל אַנְשֵׁ֥י הָ/עָֽי־־׃
translation:
  text: And all who fell that day, from man to woman, were twelve thousand—all the
    men of Ai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''all the people of Ai'' / ''all the inhabitants of Ai.'' Hebrew: ''all
      the men of Ai,'' an idiom that can refer corporately to the city''s population.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... were
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the result/summary statement. In
    natural English, the existential/copular sense is best carried by supplying 'were'
    in the clause rather than the archaic 'it came to pass.'
- source_word: כָל הַנֹּפְלִים
  chosen: all who fell
  alternatives:
  - all the fallen
  - all who were struck down
  lexicon: HALOT
  rationale: The participle of נפל literally means 'the ones falling/fallen.' In this
    battle context it refers to those killed. 'All who fell' preserves the Hebrew
    idiom without over-paraphrasing to 'were killed,' while remaining clear in English.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'That day' is idiomatic and fully preserves
    the sense of the Hebrew phrase.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - from men to women
  - from male to female
  lexicon: HALOT
  rationale: The singular distributive construction is best represented by 'from man
    to woman.' This preserves the gender-accurate wording of the Hebrew and its totalizing
    force across the population.
- source_word: שְׁנֵים עָשָׂר אָלֶף
  chosen: twelve thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: כֹּל אַנְשֵׁי הָעָי
  chosen: all the men of Ai
  alternatives:
  - all the people of Ai
  - all the inhabitants of Ai
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Although the preceding phrase includes
    women, this final apposition likely uses 'men of Ai' idiomatically for the population/citizenry
    associated with the city. Per the project's gender-accurate principle, the main
    text keeps 'men' rather than neutralizing to 'people,' while the tension is documented.
