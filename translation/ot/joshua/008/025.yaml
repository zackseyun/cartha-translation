theological_decisions:
- issue: Gendered language in the casualty summary
  chosen_reading: Retain 'from man to woman' and 'all the men of Ai' in the main text
  alternative_readings:
  - from men to women
  - all the people of Ai
  - all the inhabitants of Ai
  rationale: The Hebrew uses gendered singulars in the range expression and then the
    idiom אַנְשֵׁי הָעָי. Following the doctrine's gender-accurate principle, the
    translation preserves the source's gendered wording rather than flattening it
    into gender-neutral English, while recognizing that the idiom may function corporately
    for the city's population.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
