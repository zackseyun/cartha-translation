id: JOS.8.7
reference: Joshua 8:7
source:
  edition: WLC
  text: וְ/אַתֶּ֗ם תָּקֻ֨מוּ֙ מֵ/הָ֣/אוֹרֵ֔ב וְ/הוֹרַשְׁתֶּ֖ם אֶת הָ/עִ֑יר וּ/נְתָנָ֛/הּ
    יְהוָ֥ה אֱלֹֽהֵי/כֶ֖ם בְּ/יֶדְ/כֶֽם־׃
translation:
  text: Then you shall rise up from the ambush and take possession of the city, for
    the LORD your God will give it into your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'capture the city.' The Hebrew verb can denote taking possession, not
      only the act of military seizure.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּקֻמוּ
  chosen: you shall rise up
  alternatives:
  - you shall arise
  - you must get up
  lexicon: HALOT
  rationale: Qal imperfect 2mp of קום, here functioning as an instruction in a military
    sequence. 'Rise up' preserves the concrete movement from concealment without sounding
    archaic.
- source_word: מֵהָאֹרֵב
  chosen: from the ambush
  alternatives:
  - from the ambush position
  - from the place of ambush
  lexicon: HALOT
  rationale: The noun אֹרֵב denotes an ambush/lying in wait. 'From the ambush' is
    concise and natural in English while retaining the military sense.
- source_word: וְהוֹרַשְׁתֶּם
  chosen: take possession of
  alternatives:
  - seize
  - occupy
  - capture
  lexicon: HALOT
  rationale: Hiphil of ירשׁ often means to take possession/inherit/dispossess. In
    this conquest context, 'take possession of' best reflects the verb's possession-oriented
    force, not merely the act of capture. 'Capture' is possible but narrows the sense
    to military seizure alone.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר with the article.
- source_word: וּנְתָנָהּ
  chosen: will give it
  alternatives:
  - has given it
  - is giving it
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction after an imperative/instructional
    sequence can express assured future result. English future 'will give it' communicates
    the promised certainty in context better than a wooden past tense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD'.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2mp suffix; rendered directly as covenantal address.
- source_word: בְּיֶדְכֶם
  chosen: into your hand
  alternatives:
  - into your power
  - into your control
  lexicon: HALOT
  rationale: The idiom 'give into the hand' is common in Hebrew for delivering something
    into someone's power. 'Into your hand' preserves the biblical idiom while remaining
    understandable.
