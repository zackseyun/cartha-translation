theological_decisions:
- issue: Rendering a warfare/destruction text without softening or expanding its force
  chosen_reading: Retain the text's explicit language of killing and total defeat
    in straightforward English
  alternative_readings:
  - Use softened terms such as 'defeated' or 'overcame'
  - Expand to interpret the action as divinely sanctioned judgment
  rationale: The verse narrates military slaughter in stark terms. Optimal equivalence
    requires preserving that severity without euphemism, while also avoiding theological
    expansion beyond what this verse itself states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never import doctrinal claims the text does not make.'
