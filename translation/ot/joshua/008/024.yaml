id: JOS.8.24
reference: Joshua 8:24
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/כַלּ֣וֹת יִשְׂרָאֵ֡ל לַ/הֲרֹג֩ אֶת כָּל יֹשְׁבֵ֨י הָ/עַ֜י בַּ/שָּׂדֶ֗ה
    בַּ/מִּדְבָּר֙ אֲשֶׁ֣ר רְדָפ֣וּ/ם בּ֔/וֹ וַֽ/יִּפְּל֥וּ כֻלָּ֛/ם לְ/פִי חֶ֖רֶב
    עַד תֻּמָּ֑/ם וַ/יָּשֻׁ֤בוּ כָל יִשְׂרָאֵל֙ הָ/עַ֔י וַ/יַּכּ֥וּ אֹתָ֖/הּ לְ/פִי
    חָֽרֶב־־־־־־׃
translation:
  text: And it happened that when Israel had finished killing all the inhabitants
    of Ai in the open field, in the wilderness where they had pursued them, and all
    of them had fallen by the edge of the sword until they were finished off, then
    all Israel returned to Ai and struck it with the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until they were consumed' / 'until they came to an end' for the phrase
      'until they were finished off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new stage in the story. 'And
    it happened' preserves the Hebrew discourse marker without archaic English.
- source_word: כְּכַלּוֹת
  chosen: when ... had finished
  alternatives:
  - as soon as ... finished
  - after ... finished
  lexicon: HALOT
  rationale: 'Infinitive construct of כלה with prefixed כ expresses temporal sense.
    English pluperfect fits the sequence: Israel first completed the killing, then
    returned to the city.'
- source_word: לַהֲרֹג
  chosen: killing
  alternatives:
  - striking down
  - slaying
  lexicon: HALOT
  rationale: הלך? No, הרג plainly means 'kill/slay.' 'Killing' works smoothly with
    'had finished' and does not soften the violence of the text.
- source_word: יֹשְׁבֵי הָעַי
  chosen: the inhabitants of Ai
  alternatives:
  - those dwelling in Ai
  - the residents of Ai
  lexicon: HALOT
  rationale: Participle of ישב used substantivally for those living in the city. 'Inhabitants'
    is idiomatic and precise.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  lexicon: HALOT
  rationale: '''Field'' is literal, but ''open field'' better conveys the outdoor
    battleground in contrast to the city.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the wasteland
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/open uncultivated land, not necessarily
    sandy desert. 'Wilderness' is the most standard and contextually suitable rendering.
- source_word: אֲשֶׁר רְדָפוּם בּוֹ
  chosen: where they had pursued them
  alternatives:
  - in which they had chased them
  - where they pursued them
  lexicon: HALOT
  rationale: Relative clause modifying the wilderness/field area. The pronoun likely
    refers to the locale in which the pursuit occurred. Pluperfect maintains narrative
    sequence.
- source_word: וַיִּפְּלוּ כֻלָּם
  chosen: and all of them had fallen
  alternatives:
  - and they all fell
  - and all fell
  lexicon: HALOT
  rationale: נפל in battle contexts is a standard idiom for falling in death. Pluperfect
    coordinates with the prior completion sense before Israel's return to Ai.
- source_word: לְפִי חֶרֶב
  chosen: by the edge of the sword
  alternatives:
  - by the sword
  - with the sword
  lexicon: HALOT
  rationale: Hebrew idiom literally 'to the mouth of the sword.' 'By the edge of the
    sword' is the established English equivalent that preserves the idiomatic force
    more fully than the flatter 'by the sword.'
- source_word: עַד תֻּמָּם
  chosen: until they were finished off
  alternatives:
  - until they were consumed
  - until they came to an end
  - until they were all gone
  lexicon: HALOT
  rationale: Passive/completive sense from כלה. The phrase emphasizes total destruction
    of the pursued group. 'Finished off' is strong but natural English matching the
    military context.
- source_word: וַיָּשֻׁבוּ כָל יִשְׂרָאֵל הָעַי
  chosen: then all Israel returned to Ai
  alternatives:
  - and all Israel turned back to Ai
  lexicon: HALOT
  rationale: שוב with destination indicates return. The adverb 'then' clarifies the
    sequence after the prior slaughter.
- source_word: וַיַּכּוּ אֹתָהּ
  chosen: and struck it
  alternatives:
  - and attacked it
  - and struck down its people
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite'). The feminine singular object refers to
    the city Ai. 'Struck it' preserves the Hebrew wording without adding an explicit
    object not present in this clause.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the edge of the sword
  - with the sword
  lexicon: HALOT
  rationale: Same idiom as earlier in the verse. Here 'with' fits the transitive verb
    'struck it' more naturally in English while preserving the idiom.
