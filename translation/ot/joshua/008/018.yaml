id: JOS.8.18
reference: Joshua 8:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל יְהוֹשֻׁ֗עַ נְ֠טֵה בַּ/כִּיד֤וֹן אֲשֶׁר בְּ/יָֽדְ/ךָ֙ אֶל הָ/עַ֔י כִּ֥י בְ/יָדְ/ךָ֖ אֶתְּנֶ֑/נָּה וַ/יֵּ֧ט יְהוֹשֻׁ֛עַ בַּ/כִּיד֥וֹן אֲשֶׁר בְּ/יָד֖/וֹ אֶל הָ/עִֽיר־־־־־׃
translation:
  text: Then Yahweh said to Joshua, “Stretch out the javelin that is in your hand toward Ai, for I will give it into your hand.” So Joshua stretched out the javelin that was in his hand toward the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spear.” The Hebrew כִּידוֹן refers to a weapon that may be rendered “javelin,” “spear,” or “lance” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: נְטֵה / וַיֵּט (נטה)
  chosen: Stretch out / stretched out
  alternatives:
  - hold out
  - extend
  - point
  lexicon: HALOT
  rationale: The verb means to stretch out or extend. 'Stretch out' fits both the imperative and the narrative fulfillment, and preserves the physical gesture without overinterpreting it as merely 'pointing'.
- source_word: כִּידוֹן
  chosen: javelin
  alternatives:
  - spear
  - lance
  lexicon: HALOT
  rationale: כידון denotes a weapon distinct from the more common spear term in some contexts. 'Javelin' best captures a lighter thrusting/throwing weapon and preserves the narrative detail. 'Spear' is possible but less specific.
- source_word: אֲשֶׁר בְּיָדְךָ / אֲשֶׁר בְּיָדוֹ
  chosen: that is in your hand / that was in his hand
  alternatives:
  - which is in your hand
  - in your hand
  lexicon: HALOT
  rationale: Rendered with a relative clause to reflect the Hebrew explicitly. The shift from present in direct speech to past in narration is natural English style.
- source_word: אֶל הָעַי
  chosen: toward Ai
  alternatives:
  - against Ai
  - to Ai
  lexicon: HALOT
  rationale: אֶל with the gesture verb indicates direction. 'Toward Ai' preserves the directional sense without implying movement into the city.
- source_word: כִּי בְיָדְךָ אֶתְּנֶנָּה
  chosen: for I will give it into your hand
  alternatives:
  - for into your hand I will give it
  - for I am giving it into your hand
  lexicon: HALOT
  rationale: This is a standard idiom for delivering something into someone's power. 'I will give it into your hand' preserves the idiom and future sense of the imperfect.
- source_word: אֶתְּנֶנָּה
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, referring to the city (עיר), not the place-name Ai as such. English idiom uses 'it' for a city in this context.
- source_word: אֶל הָעִיר
  chosen: toward the city
  alternatives:
  - toward Ai
  - against the city
  lexicon: HALOT
  rationale: The Hebrew shifts from the place-name 'Ai' to 'the city.' The translation preserves this variation rather than harmonizing the two expressions.
