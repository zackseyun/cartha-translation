id: JOS.8.3
reference: Joshua 8:3
source:
  edition: WLC
  text: וַ/יָּ֧קָם יְהוֹשֻׁ֛עַ וְ/כָל עַ֥ם הַ/מִּלְחָמָ֖ה לַ/עֲל֣וֹת הָ/עָ֑י וַ/יִּבְחַ֣ר
    יְ֠הוֹשֻׁעַ שְׁלֹשִׁ֨ים אֶ֤לֶף אִישׁ֙ גִּבּוֹרֵ֣י הַ/חַ֔יִל וַ/יִּשְׁלָחֵ֖/ם לָֽיְלָה־׃
translation:
  text: So Joshua and all the fighting people rose to go up against Ai, and Joshua
    chose thirty thousand men, mighty warriors, and sent them out by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the people of war' / 'all the army.' The Hebrew phrase is literally
      'all the people of the war.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to go up to Ai.' The Hebrew idiom 'go up' is retained, while the context
      suggests hostile movement against the city.
    reason: lexical_alternative
  - marker: c
    text: Or 'mighty men of valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, here marking the beginning of action. 'Rose' preserves
    the narrative sequence without overinterpreting it as immediate departure.
- source_word: כָל עַם הַמִּלְחָמָה
  chosen: all the fighting people
  alternatives:
  - all the people of war
  - all the army
  - all the fighting men
  lexicon: HALOT
  rationale: Literally 'all the people of the war.' 'Fighting people' keeps the collective
    sense of עַם while expressing the military function naturally in English. 'Army'
    is possible but slightly more institutional than the Hebrew phrasing.
- source_word: לַעֲלוֹת
  chosen: to go up against
  alternatives:
  - to go up to
  - to attack
  lexicon: HALOT
  rationale: עלה with a destination can mean 'go up to,' but in military context with
    Ai it carries hostile movement. 'Go up against' preserves both the directional
    idiom and the military sense better than the more interpretive 'attack.'
- source_word: הָעָי
  chosen: Ai
  rationale: Standard English transliteration of the place name.
- source_word: וַיִּבְחַר
  chosen: chose
  alternatives:
  - selected
  lexicon: HALOT
  rationale: בחר straightforwardly means 'choose/select.' 'Chose' is the most natural
    narrative rendering.
- source_word: שְׁלֹשִׁים אֶלֶף אִישׁ
  chosen: thirty thousand men
  alternatives:
  - thirty thousand soldiers
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'thirty thousand man/men.' 'Men' preserves the
    source wording; 'soldiers' is interpretive, though contextually implied.
- source_word: גִּבּוֹרֵי הַחַיִל
  chosen: mighty warriors
  alternatives:
  - mighty men of valor
  - valiant warriors
  - strong warriors
  lexicon: HALOT
  rationale: A common military expression for capable, valiant fighting men. 'Mighty
    warriors' is clear modern English and preserves the force of both גבורים and חיל
    without archaic phrasing.
- source_word: וַיִּשְׁלָחֵם
  chosen: sent them out
  alternatives:
  - sent them
  - dispatched them
  lexicon: HALOT
  rationale: The verb שלח with object suffix means 'sent them.' 'Sent them out' fits
    the military context and the implied movement away from Joshua.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: The accusative adverbial use indicates time. 'By night' is concise and
    idiomatic in military narrative, suggesting nocturnal dispatch.
