id: JOS.8.35
reference: Joshua 8:35
source:
  edition: WLC
  text: לֹֽא הָיָ֣ה דָבָ֔ר מִ/כֹּ֖ל אֲשֶׁר צִוָּ֣ה מֹשֶׁ֑ה אֲשֶׁ֨ר לֹֽא קָרָ֜א יְהוֹשֻׁ֗עַ נֶ֣גֶד כָּל קְהַ֤ל יִשְׂרָאֵל֙ וְ/הַ/נָּשִׁ֣ים וְ/הַ/טַּ֔ף וְ/הַ/גֵּ֖ר הַ/הֹלֵ֥ךְ בְּ/קִרְבָּֽ/ם־־־־׃פ
translation:
  text: Not a single word of all that Moses commanded was left unread by Joshua before all the assembly of Israel, and the women, the little children, and the sojourner who lived among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There was nothing of all that Moses commanded that Joshua did not read.'
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a resident foreigner living among Israel.'
    reason: cultural_note
  - marker: c
    text: Or 'who was among them' or 'who lived among them.'
    reason: lexical_alternative
  - marker: d
    text: Or 'who walked among them'.
    reason: previous_rendering
  - marker: e
    text: Or 'There was not a word of all that Moses commanded that Joshua did not read'.
    reason: previous_rendering
lexical_decisions:
- source_word: דָבָר
  chosen: word
  alternatives:
  - thing
  - matter
  lexicon: HALOT
  rationale: In the expression 'not a word of all that Moses commanded,' 'word' preserves the idiomatic sense of spoken/written commands being read aloud. 'Thing' or 'matter' are possible but less fitting with the following verb 'read'.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: '''Commanded'' best matches the covenantal and legal context of Moses'' authoritative instructions.'
- source_word: קָרָא
  chosen: read
  alternatives:
  - proclaimed
  - called out
  lexicon: HALOT
  rationale: Given the immediate context of reading the law publicly, 'read' is the most natural and precise rendering, though the verb can more broadly mean 'call' or 'proclaim'.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is concise, idiomatic English for public reading in the presence of the gathered people.'
- source_word: קְהַל
  chosen: assembly
  alternatives:
  - congregation
  - gathering
  lexicon: HALOT
  rationale: '''Assembly'' communicates the formal gathered body of Israel without importing later ecclesiastical overtones that ''congregation'' may carry.'
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - women
  lexicon: HALOT
  rationale: The article is naturally represented in English in this coordinated list; the phrase highlights that women were explicitly included in the public hearing.
- source_word: הַטַּף
  chosen: the little children
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents; 'little children' preserves the sense of young ones more clearly than the broader 'children'.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: '''Sojourner'' is a standard rendering for גֵּר and preserves the covenantal-social category of a non-native residing among Israel. ''Stranger'' can sound merely unfamiliar rather than resident.'
- source_word: הַהֹלֵךְ בְּקִרְבָּם
  chosen: who walked among them
  alternatives:
  - who was among them
  - who lived among them
  lexicon: HALOT
  rationale: A more formal rendering keeps the participial imagery of 'walking' while still making sense in English. It describes the sojourner as moving/living within Israel's midst.
- source_word: לֹא הָיָה ... אֲשֶׁר לֹא
  chosen: There was not ... that ... did not
  alternatives:
  - There was nothing ... that ... did not
  lexicon: HALOT
  rationale: This double-negative Hebrew construction is best represented by the English idiom 'There was not ... that ... did not,' preserving the emphatic totality of Joshua's reading.
