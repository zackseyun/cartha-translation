theological_decisions:
- issue: Public scope of covenant instruction
  chosen_reading: The verse is rendered to emphasize that the entire covenant community present—including women, little children, and the resident sojourner—heard the reading.
  alternative_readings:
  - A narrower rendering that leaves these groups implicit within 'all Israel'
  rationale: The Hebrew explicitly enumerates these groups after 'all the assembly of Israel,' so the translation preserves their explicit inclusion rather than subsuming them into a generic collective.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6 (readable modern English, not archaic or academic)
revisions:
- timestamp: '2026-04-21T01:25:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/joshua/008/035.json
  category: awkward_english
  tier: 1
  from: who walked among them
  to: who lived among them
  rationale: The Hebrew participle הֹלֵךְ (from 'to walk') is used idiomatically here to mean 'to live' or 'to be part of the community.' The literal rendering 'who walked among them' is awkward in English and could be misinterpreted as literal movement. 'Who lived among them,' already offered as a footnote alternative, more accurately and naturally conveys the intended meaning of the sojourner's status within Israel.
- timestamp: '2026-04-21T01:25:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/joshua/008/035.json
  category: awkward_english
  tier: 1
  from: There was not a word of all that Moses commanded that Joshua did not read
  to: Not a single word of all that Moses commanded was left unread by Joshua
  rationale: The current rendering is a very literal translation of the Hebrew double negative (a litotes used for emphasis). While this preserves the source structure, the resulting English is cumbersome. A smoother phrasing could capture the same exhaustive emphasis more naturally for the English reader.
