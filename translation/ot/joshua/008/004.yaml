id: JOS.8.4
reference: Joshua 8:4
source:
  edition: WLC
  text: וַ/יְצַ֨ו אֹתָ֜/ם לֵ/אמֹ֗ר רְ֠אוּ אַתֶּ֞ם אֹרְבִ֤ים לָ/עִיר֙ מֵ/אַחֲרֵ֣י הָ/עִ֔יר
    אַל תַּרְחִ֥יקוּ מִן הָ/עִ֖יר מְאֹ֑ד וִ/הְיִיתֶ֥ם כֻּלְּ/כֶ֖ם נְכֹנִֽים־־׃
translation:
  text: And he commanded them, saying, “Look, you are to lie in ambush against the
    city, behind the city. Do not go very far from the city, and all of you must be
    ready.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “See” at the start of the command; the Hebrew imperative functions as
      an attention-getter.
    reason: lexical_alternative
  - marker: b
    text: Or “from behind the city”; the Hebrew phrase marks position relative to
      the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he ordered
  - he instructed
  lexicon: HALOT
  rationale: צוה commonly denotes giving a command or charge. 'Commanded' preserves
    the directive force better than the softer 'instructed.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard speech-introduction formula; 'saying' is natural and sufficiently
    formal.
- source_word: רְאוּ
  chosen: Look
  alternatives:
  - See
  - Take note
  lexicon: HALOT
  rationale: Here the imperative functions as an attention-getter before the command
    details. 'Look' is idiomatic modern English and preserves the urgency.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the addressed group. English
    can reflect this naturally without overtranslating; the emphasis is carried by
    the clause structure.
- source_word: אֹרְבִים
  chosen: are to lie in ambush
  alternatives:
  - are lying in ambush
  - will lie in ambush
  - set an ambush
  lexicon: HALOT
  rationale: The participle describes the role/assignment of the men in context. 'Are
    to lie in ambush' captures the commanded, near-future force better than a simple
    present description.
- source_word: לָעִיר
  chosen: against the city
  alternatives:
  - for the city
  - at the city
  lexicon: HALOT
  rationale: With ambush language, English idiom prefers 'against the city,' expressing
    hostile orientation rather than mere location.
- source_word: מֵאַחֲרֵי הָעִיר
  chosen: behind the city
  alternatives:
  - from behind the city
  - on the far side of the city
  lexicon: HALOT
  rationale: The phrase indicates position relative to the city. 'Behind the city'
    is the clearest concise rendering in context.
- source_word: אַל תַּרְחִיקוּ
  chosen: Do not go very far
  alternatives:
  - Do not move far away
  - Do not distance yourselves
  lexicon: HALOT
  rationale: 'The Hiphil of רחק here is causative/intransitive in effect: not to put
    distance between themselves and the city. ''Do not go very far'' is natural English
    and preserves the warning.'
- source_word: מִן הָעִיר מְאֹד
  chosen: from the city
  alternatives:
  - away from the city
  lexicon: HALOT
  rationale: Combined with מְאֹד, the sense is 'very far from the city.' The adverb
    is represented in the English phrase 'very far.'
- source_word: וִהְיִיתֶם
  chosen: must be
  alternatives:
  - be
  - you shall be
  lexicon: HALOT
  rationale: Following the prohibition, this continues the command sequence. 'Must
    be' conveys imperative force in smooth English.
- source_word: כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - all of you men
  - every one of you
  lexicon: HALOT
  rationale: The term emphasizes the whole group. 'All of you' preserves the collective
    emphasis without adding gender not explicit in English.
- source_word: נְכֹנִים
  chosen: ready
  alternatives:
  - prepared
  - in position
  lexicon: HALOT
  rationale: כון in this passive/adjectival form denotes being prepared or established.
    'Ready' is concise and fits the military context well.
