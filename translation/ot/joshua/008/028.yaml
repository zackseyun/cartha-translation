id: JOS.8.28
reference: Joshua 8:28
source:
  edition: WLC
  text: וַ/יִּשְׂרֹ֥ף יְהוֹשֻׁ֖עַ אֶת הָ/עָ֑י וַ/יְשִׂימֶ֤/הָ תֵּל עוֹלָם֙ שְׁמָמָ֔ה
    עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: So Joshua burned Ai and made it a permanent mound, a desolation to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an everlasting mound'; Hebrew עוֹלָם can denote a very long or indefinite
      duration, often rendered 'forever' or 'everlasting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרֹף
  chosen: burned
  alternatives:
  - set on fire
  lexicon: HALOT
  rationale: The verb שׂרף plainly denotes burning by fire. 'Burned' is the most natural
    modern English rendering and fits the narrative sequence.
- source_word: הָעָי
  chosen: Ai
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: וַיְשִׂימֶהָ
  chosen: made it
  alternatives:
  - turned it into
  lexicon: HALOT
  rationale: The verb שׂים with 3fs suffix means 'set/make/place it.' In English,
    'made it' best carries the resultative sense with the following predicate nouns.
- source_word: תֵּל
  chosen: mound
  alternatives:
  - ruin mound
  - heap
  lexicon: HALOT
  rationale: תֵּל refers to a mound or ruin-heap, often the raised remains of a destroyed
    city. 'Mound' is concise and natural; 'ruin mound' is possible but slightly interpretive,
    while 'heap' can sound too generic.
- source_word: עוֹלָם
  chosen: permanent
  alternatives:
  - everlasting
  - forever
  - age-long
  lexicon: HALOT
  rationale: In this context עוֹלָם modifies the city's ruined condition in historical
    perspective, not necessarily metaphysical eternity. 'Permanent' communicates enduring
    status in idiomatic English without overstating the term.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate waste
  - desolation
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. Rendering it as a second predicate,
    'a desolation,' preserves the Hebrew appositional force after 'mound.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard idiom marking the condition as continuing up to the
    narrator's present. 'To this day' is the most idiomatic English equivalent.
