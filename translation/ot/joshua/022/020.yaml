id: JOS.22.20
reference: Joshua 22:20
source:
  edition: WLC
  text: הֲ/ל֣וֹא עָכָ֣ן בֶּן זֶ֗רַח מָ֤עַל מַ֨עַל֙ בַּ/חֵ֔רֶם וְ/עַֽל כָּל עֲדַ֥ת
    יִשְׂרָאֵ֖ל הָ֣יָה קָ֑צֶף וְ/הוּא֙ אִ֣ישׁ אֶחָ֔ד לֹ֥א גָוַ֖ע בַּ/עֲוֺנֽ/וֹ׀־־־׃פ
translation:
  text: Was it not Achan son of Zerah who acted unfaithfully in the matter of what
    was devoted to destruction, and wrath came upon all the congregation of Israel?
    Yet he was not the only man who perished in his iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'regarding the devoted things'; Hebrew חֵרֶם refers to what was placed
      under the ban, devoted to God for destruction.
    reason: lexical_alternative
  - marker: b
    text: Or, 'though he was one man, he did not perish alone in his iniquity.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Was it not
  alternatives:
  - Did not
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Was it not' fits
    the past narrative reference naturally in English.
- source_word: עָכָן בֶּן־זֶרַח
  chosen: Achan son of Zerah
  alternatives:
  - Achan, the son of Zerah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מָעַל מַעַל
  chosen: acted unfaithfully
  alternatives:
  - committed a trespass
  - was unfaithful
  - broke faith
  lexicon: HALOT
  rationale: The verb-noun cognate intensifies the idea of breach of faith or sacrilege.
    'Acted unfaithfully' captures the covenantal disloyalty in readable English without
    archaic phrasing.
- source_word: בַּחֵרֶם
  chosen: in the matter of what was devoted to destruction
  alternatives:
  - regarding the devoted things
  - in the matter of the ban
  lexicon: HALOT
  rationale: חֵרֶם refers to something placed under ban, devoted to God for destruction.
    'What was devoted to destruction' makes the sense explicit for modern readers
    while staying close to the Hebrew concept.
- source_word: וְעַל כָּל עֲדַת יִשְׂרָאֵל הָיָה קָצֶף
  chosen: and wrath came upon all the congregation of Israel
  alternatives:
  - and there was wrath against all the congregation of Israel
  - and anger fell on all the assembly of Israel
  lexicon: HALOT
  rationale: קָצֶף denotes wrath/anger, here divine wrath in context. 'Came upon'
    renders the idiom naturally. 'Congregation' preserves עֵדָה with its corporate
    sense.
- source_word: וְהוּא אִישׁ אֶחָד
  chosen: Yet he was not the only man
  alternatives:
  - and he, one man
  - though he was one man
  lexicon: HALOT
  rationale: The Hebrew emphasizes that Achan was a single individual, yet the consequences
    extended beyond him. Rendering the phrase with the following clause as 'he was
    not the only man' communicates the force idiomatically in English.
- source_word: לֹא גָוַע
  chosen: who perished
  alternatives:
  - who died
  - who expired
  lexicon: HALOT
  rationale: גוע often carries the sense of dying/perishing. 'Perished' fits the judgment
    context better than the more neutral 'died'.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - for his sin
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or associatively here.
    'In his iniquity' stays close to the Hebrew while preserving the idea that his
    guilt was the sphere/cause of his death.
