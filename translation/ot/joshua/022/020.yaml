theological_decisions:
- issue: Nature of the wrath in context
  chosen_reading: wrath is left implicit rather than expanded to 'the LORD's wrath'
    in the main text
  alternative_readings:
  - the LORD's wrath came upon all the congregation of Israel
  rationale: Although the broader context makes the wrath divine, the Hebrew here
    simply says 'wrath came upon all the congregation of Israel.' To avoid importing
    words not present in the verse, the translation preserves the implicit expression.
  doctrine_reference: Translation philosophy §1, §3
- issue: Corporate consequence of individual sin
  chosen_reading: the final clause is rendered to stress that others besides Achan
    died as a result of his iniquity
  alternative_readings:
  - and that man did not perish alone in his iniquity
  - though he was but one man, he did not perish alone for his iniquity
  rationale: The Hebrew wording is somewhat compressed and can sound ambiguous in
    English if translated too literally. The chosen rendering preserves the text's
    warning about communal consequences without adding doctrinal explanation beyond
    the verse.
  doctrine_reference: Translation philosophy §3
