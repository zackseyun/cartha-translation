id: JOS.22.26
reference: Joshua 22:26
source:
  edition: WLC
  text: וַ/נֹּ֕אמֶר נַעֲשֶׂה נָּ֣א לָ֔/נוּ לִ/בְנ֖וֹת אֶת הַ/מִּזְבֵּ֑חַ לֹ֥א לְ/עוֹלָ֖ה
    וְ/לֹ֥א לְ/זָֽבַח־־׃
translation:
  text: So we said, ‘Let us now build for ourselves the altar—not for burnt offering
    and not for sacrifice.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Then we said' or 'And we said.' The Hebrew conjunction can be rendered
      in several natural ways depending on how tightly the statement is linked to
      the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Let us make for ourselves, to build the altar'—an idiom meaning
      'Let us build for ourselves the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  chosen: So we said
  alternatives:
  - And we said
  - Then we said
  lexicon: HALOT
  rationale: Wayyiqtol 1cp of אמר introduces the group's explanation. 'So we said'
    gives natural English while preserving the narrative/resultative force of the
    conjunction.
- source_word: נַעֲשֶׂה
  chosen: Let us ... build
  alternatives:
  - We will make
  - Let us make
  lexicon: HALOT
  rationale: Cohortative 1cp of עשה expresses resolve/proposal. In context, with the
    following infinitive 'to build,' English idiom is best captured by 'Let us ...
    build' rather than a wooden 'let us make ... to build.'
- source_word: נָּא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: נא here softens or urges the proposal. 'Now' fits the deliberative tone
    in English better than 'please,' which can sound overly polite or misplaced in
    self-directed speech.
- source_word: לָנוּ
  chosen: for ourselves
  alternatives:
  - for us
  lexicon: HALOT
  rationale: The preposition with 1cp pronoun marks benefit/interest. 'For ourselves'
    makes the reflexive-benefactive sense explicit in idiomatic English.
- source_word: לִבְנוֹת
  chosen: build
  alternatives:
  - to build
  lexicon: HALOT
  rationale: Infinitive construct of בנה complements the cohortative. English smooths
    the construction as 'Let us ... build.'
- source_word: אֶת הַמִּזְבֵּחַ
  chosen: the altar
  alternatives:
  - an altar
  lexicon: HALOT
  rationale: The direct-object marker plus definite article indicate a specific altar
    under discussion. 'The altar' preserves the definiteness of the Hebrew.
- source_word: לֹא לְעוֹלָה
  chosen: not for burnt offering
  alternatives:
  - not for a burnt offering
  lexicon: HALOT
  rationale: The phrase states intended non-use. 'Burnt offering' is the standard
    rendering of עולה and fits sacrificial terminology clearly.
- source_word: וְלֹא לְזָבַח
  chosen: and not for sacrifice
  alternatives:
  - nor for sacrifice
  - and not for slaughter offering
  lexicon: HALOT
  rationale: זבח is a broad sacrificial term, often distinct from עולה. 'Sacrifice'
    preserves the general category without over-specifying. Coordinating with 'and
    not' mirrors the Hebrew structure, though 'nor' would also be possible.
