theological_decisions:
- issue: Divine presence statement
  chosen_reading: the LORD is among us
  alternative_readings:
  - the LORD is in our midst
  rationale: The phrase affirms covenantal divine presence with Israel in light of the tribes' innocence. The wording preserves the text's statement without importing later theological categories.
  doctrine_reference: Translation philosophy §3, §6
- issue: Meaning of מעל language
  chosen_reading: acted unfaithfully against the LORD
  alternative_readings:
  - committed this trespass against the LORD
  - been faithless toward the LORD
  rationale: The verse concerns covenant breach rather than a merely technical offense. The chosen rendering preserves the moral-theological weight of disloyalty to the LORD while remaining readable.
  doctrine_reference: Translation philosophy §5, §6
- issue: Implication of 'from the hand of the LORD'
  chosen_reading: literal idiom retained
  alternative_readings:
  - from the LORD's power
  - from the LORD's judgment
  rationale: The text implies that Israel was in danger of divine judgment because of suspected apostasy. Retaining the idiom avoids overexplaining while preserving the theological seriousness of the LORD's active governance.
  doctrine_reference: Translation philosophy §1, §3
