id: JOS.22.31
reference: Joshua 22:31
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר פִּֽינְחָ֣ס בֶּן אֶלְעָזָ֣ר הַ/כֹּהֵ֡ן אֶל בְּנֵי רְאוּבֵ֨ן וְ/אֶל בְּנֵי גָ֜ד וְ/אֶל בְּנֵ֣י מְנַשֶּׁ֗ה הַ/יּ֤וֹם יָדַ֨עְנוּ֙ כִּֽי בְ/תוֹכֵ֣/נוּ יְהוָ֔ה אֲשֶׁ֛ר לֹֽא מְעַלְתֶּ֥ם בַּֽ/יהוָ֖ה הַ/מַּ֣עַל הַ/זֶּ֑ה אָ֗ז הִצַּלְתֶּ֛ם אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל מִ/יַּ֥ד יְהוָֽה־־־־־־׀־־־׃
translation:
  text: And Phinehas son of Eleazar the priest said to the sons of Reuben, and to the sons of Gad, and to the sons of Manasseh, “Today we know that Yahweh is among us, because you have not acted unfaithfully against Yahweh in this matter. Then you have delivered the sons of Israel from the hand of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in our midst.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “you have not acted unfaithfully against the LORD with this unfaithfulness”; the wording refers to covenantal treachery or breach of faith.
    reason: lexical_alternative
  - marker: c
    text: “From the hand of the LORD” is a Hebrew idiom for being spared from the LORD’s power or judgment.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard narrative waw-consecutive introducing direct speech. 'And ... said' preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: פִּינְחָס בֶּן אֶלְעָזָר הַכֹּהֵן
  chosen: Phinehas son of Eleazar the priest
  alternatives:
  - Phinehas, the son of Eleazar the priest
  lexicon: HALOT
  rationale: Straightforward identification formula; retained with minimal smoothing into natural English.
- source_word: אֶל בְּנֵי רְאוּבֵן וְאֶל בְּנֵי גָד וְאֶל בְּנֵי מְנַשֶּׁה
  chosen: to the sons of Reuben, and to the sons of Gad, and to the sons of Manasseh
  alternatives:
  - to the Reubenites, the Gadites, and the Manassites
  - to the descendants of Reuben ...
  lexicon: HALOT
  rationale: Kept the repeated prepositions and 'sons of' structure for formal transparency. Tribal gentilics are possible but less directly reflective of the Hebrew wording.
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - This day
  - Now
  lexicon: HALOT
  rationale: Temporal adverb marking present recognition; 'Today' is clear modern English and preserves the immediacy of the declaration.
- source_word: יָדַעְנוּ
  chosen: we know
  alternatives:
  - we have known
  - we now know
  lexicon: HALOT
  rationale: Perfect used with present force in context; English present best conveys the sense of realized certainty.
- source_word: בְּתוֹכֵנוּ
  chosen: among us
  alternatives:
  - in our midst
  - within us
  lexicon: HALOT
  rationale: '''Among us'' is idiomatic and conveys divine presence in the community. ''In our midst'' is possible but slightly more formal.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מְעַלְתֶּם ... הַמַּעַל הַזֶּה
  chosen: you have not acted unfaithfully ... in this matter
  alternatives:
  - you have not committed this trespass
  - you have not been faithless in this act
  lexicon: HALOT
  rationale: The verb מעל and cognate noun מעל denote breach of faith/treachery. Rendering the pair as 'acted unfaithfully ... in this matter' communicates covenantal disloyalty in readable English without wooden repetition. 'Trespass' is possible but can sound narrower or archaic.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - with respect to the LORD
  lexicon: HALOT
  rationale: With מעל, the preposition marks the one against whom unfaithfulness is committed; 'against the LORD' is the clearest idiomatic English.
- source_word: אָז
  chosen: Then
  alternatives:
  - So
  - Therefore
  lexicon: HALOT
  rationale: Marks inference/result from the preceding recognition. 'Then' preserves the Hebrew connective without overstating logical force.
- source_word: הִצַּלְתֶּם
  chosen: you have delivered
  alternatives:
  - you have rescued
  - you have saved
  lexicon: HALOT
  rationale: נצַל in Hiphil means to deliver/rescue. 'Delivered' fits the formal tone and pairs naturally with 'from the hand of'.
- source_word: מִיַּד יְהוָה
  chosen: from the hand of the LORD
  alternatives:
  - from the power of the LORD
  - from the LORD's hand
  lexicon: HALOT
  rationale: 'A common Hebrew idiom for power or judgment. Retained literally because it is intelligible in English and preserves the solemn force: their faithfulness has spared Israel from divine judgment.'
