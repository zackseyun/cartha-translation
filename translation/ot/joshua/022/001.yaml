id: JOS.22.1
reference: Joshua 22:1
source:
  edition: WLC
  text: אָ֚ז יִקְרָ֣א יְהוֹשֻׁ֔עַ לָ/רֽאוּבֵנִ֖י וְ/לַ/גָּדִ֑י וְ/לַ/חֲצִ֖י מַטֵּ֥ה
    מְנַשֶּֽׁה׃
translation:
  text: Then Joshua called the Reubenites, the Gadites, and the half-tribe of Manasseh,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: יִקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: Qal verb of calling/summoning. In this context Joshua is calling these
    groups to himself; 'called' is the most straightforward rendering, while 'summoned'
    is possible but slightly more formal and stronger than the context requires.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation philosophy to transliterate names.
- source_word: לָרֽאוּבֵנִי
  chosen: the Reubenites
  alternatives:
  - the tribe of Reuben
  - the Reubenite
  lexicon: HALOT
  rationale: The gentilic singular with prefixed preposition functions collectively
    here for the tribal group. 'The Reubenites' communicates the collective sense
    naturally in English.
- source_word: וְלַגָּדִי
  chosen: the Gadites
  alternatives:
  - the tribe of Gad
  - the Gadite
  lexicon: HALOT
  rationale: Like 'Reubenites,' this gentilic singular is used collectively. 'The
    Gadites' is the natural collective English rendering.
- source_word: וְלַחֲצִי מַטֵּה מְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: מַטֶּה here denotes a tribal division. The established and accurate English
    expression is 'the half-tribe of Manasseh.' 'Half the tribe of Manasseh' is also
    possible, but the construct phrase is more idiomatic as a tribal designation.
