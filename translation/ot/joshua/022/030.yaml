id: JOS.22.30
reference: Joshua 22:30
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֞ע פִּֽינְחָ֣ס הַ/כֹּהֵ֗ן וּ/נְשִׂיאֵ֨י הָ/עֵדָ֜ה וְ/רָאשֵׁ֨י אַלְפֵ֤י
    יִשְׂרָאֵל֙ אֲשֶׁ֣ר אִתּ֔/וֹ אֶת הַ֨/דְּבָרִ֔ים אֲשֶׁ֧ר דִּבְּר֛וּ בְּנֵי רְאוּבֵ֥ן
    וּ/בְנֵי גָ֖ד וּ/בְנֵ֣י מְנַשֶּׁ֑ה וַ/יִּיטַ֖ב בְּ/עֵינֵי/הֶֽם־־־׃
translation:
  text: When Phinehas the priest, the leaders of the congregation, and the heads of
    the clans of Israel who were with him heard the words that the sons of Reuben,
    the sons of Gad, and the sons of Manasseh spoke, it was good in their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the heads of the thousands of Israel'; this likely refers
      to clan or tribal subdivision leaders rather than a strict numerical unit.
    reason: lexical_alternative
  - marker: b
    text: Or, 'it pleased them' / 'it seemed good to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע in the wayyiqtol narrative sequence is most naturally rendered
    'heard.' 'Listened to' is possible but adds a nuance of attentiveness not required
    by the form alone.
- source_word: פִּינְחָס
  chosen: Phinehas
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward title/appositive identifying Phinehas. The definite
    article is preserved.
- source_word: נְשִׂיאֵי הָעֵדָה
  chosen: the leaders of the congregation
  alternatives:
  - the chiefs of the congregation
  - the princes of the assembly
  lexicon: HALOT
  rationale: נשיאים denotes recognized leaders or chiefs; 'leaders' is clear modern
    English. עֵדָה is commonly 'congregation' or 'assembly'; 'congregation' fits Israel's
    gathered community here without sounding overly technical.
- source_word: רָאשֵׁי אַלְפֵי יִשְׂרָאֵל
  chosen: the heads of the clans of Israel
  alternatives:
  - the heads of the thousands of Israel
  - the chiefs of Israel's divisions
  lexicon: HALOT
  rationale: Literally 'heads of the thousands of Israel.' In administrative/military
    tribal contexts, אֶלֶף often refers to clan-like or subdivision units rather than
    a strict numeral. 'Heads of the clans of Israel' communicates the social-political
    sense in readable English.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with Phinehas
  lexicon: HALOT
  rationale: The relative clause modifies the preceding leaders and heads. 'Who were
    with him' preserves the Hebrew pronoun while remaining natural; the antecedent
    is clearly Phinehas from context.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the things
  - the statements
  lexicon: HALOT
  rationale: דברים often means 'words' or 'matters.' Here, because it is followed
    by 'that ... spoke,' 'words' best matches the speech context.
- source_word: דִּבְּרוּ
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר is the standard verb for speaking. 'Spoke' aligns well with
    'the words that ... spoke,' preserving the Hebrew structure.
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד וּבְנֵי מְנַשֶּׁה
  chosen: the sons of Reuben, the sons of Gad, and the sons of Manasseh
  alternatives:
  - the Reubenites, the Gadites, and the Manassites
  - the people of Reuben, Gad, and Manasseh
  lexicon: HALOT
  rationale: A more formal rendering preserves the repeated Hebrew phrasing and tribal
    identity markers. Ethnic gentilic forms are possible, but the repeated 'sons of'
    reflects the source text's cadence and structure.
- source_word: וַיִּיטַב בְּעֵינֵיהֶם
  chosen: it was good in their eyes
  alternatives:
  - it pleased them
  - it seemed good to them
  lexicon: HALOT
  rationale: The idiom literally means 'it was good in their eyes.' Retaining the
    idiom preserves the Hebrew flavor while remaining understandable. More idiomatic
    English alternatives are possible, but the literal form is still readable and
    transparent.
