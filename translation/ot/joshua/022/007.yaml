id: JOS.22.7
reference: Joshua 22:7
source:
  edition: WLC
  text: וְ/לַ/חֲצִ֣י שֵׁ֣בֶט הַֽ/מְנַשֶּׁ֗ה נָתַ֣ן מֹשֶׁה֮ בַּ/בָּשָׁן֒ וּ/לְ/חֶצְי֗/וֹ
    נָתַ֤ן יְהוֹשֻׁ֨עַ֙ עִם אֲחֵי/הֶ֔ם מ/עבר הַ/יַּרְדֵּ֖ן יָ֑מָּ/ה וְ֠/גַם כִּ֣י
    שִׁלְּחָ֧/ם יְהוֹשֻׁ֛עַ אֶל אָהֳלֵי/הֶ֖ם וַ/יְבָרֲכֵֽ/ם׀־־׃
translation:
  text: Now to the one half-tribe of Manasseh Moses had given land in Bashan, but
    to the other half Joshua gave land with their brothers on the west side of the
    Jordan. And when Joshua sent them away to their tents, he blessed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with their brothers.' The term refers to their fellow Israelites
      in the other tribes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: to the one half-tribe of Manasseh
  alternatives:
  - to the half-tribe of Manasseh
  - to half the tribe of Manasseh
  lexicon: HALOT
  rationale: The phrase refers to one of the two divisions of the tribe of Manasseh.
    'One half-tribe' makes the contrast with the following 'other half' explicit in
    natural English.
- source_word: נָתַן מֹשֶׁה
  chosen: Moses had given
  alternatives:
  - Moses gave
  lexicon: HALOT
  rationale: The qatal form is rendered with English past perfect here because it
    refers to an action prior to Joshua's later distribution, clarifying the temporal
    sequence in context.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  alternatives:
  - in the Bashan
  lexicon: HALOT
  rationale: Standard English rendering of the region name omits the article.
- source_word: וּלְחֶצְיוֹ
  chosen: to the other half
  alternatives:
  - to its half
  - to the other part of it
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the tribe of Manasseh. 'The other
    half' communicates the contrast idiomatically and clearly.
- source_word: נָתַן יְהוֹשֻׁעַ
  chosen: Joshua gave land
  alternatives:
  - Joshua gave
  lexicon: HALOT
  rationale: Although 'land' is not explicit, it is the understood object from the
    allotment context and helps English readability without changing the sense.
- source_word: עִם אֲחֵיהֶם
  chosen: with their brothers
  alternatives:
  - with their brothers and sisters
  - with their kinsmen
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers,' referring to fellow Israelites
    of the western tribes. Per translation philosophy, the gendered kinship term is
    preserved rather than neutralized.
- source_word: מֵעֵבֶר הַיַּרְדֵּן יָמָּה
  chosen: on the west side of the Jordan
  alternatives:
  - beyond the Jordan westward
  - across the Jordan to the west
  lexicon: HALOT
  rationale: The expression specifies the side of the Jordan toward the sea, i.e.,
    westward. 'On the west side of the Jordan' is clear modern English and preserves
    the geographical sense.
- source_word: וְגַם כִּי
  chosen: And when
  alternatives:
  - And also when
  - Moreover, when
  - And indeed when
  lexicon: HALOT
  rationale: This combination introduces an additional action in the narrative. 'And
    when' gives the temporal force naturally in English without overtranslating the
    connective.
- source_word: שִׁלְּחָם
  chosen: sent them away
  alternatives:
  - sent them
  - dismissed them
  lexicon: HALOT
  rationale: The piel of שלח here carries the sense of sending off or dismissing to
    depart.
- source_word: אֶל אָהֳלֵיהֶם
  chosen: to their tents
  alternatives:
  - to their homes
  lexicon: HALOT
  rationale: The Hebrew literally says 'their tents.' While it can metonymically mean
    homes, 'tents' preserves the concrete wording and fits the historical setting.
- source_word: וַיְבָרֲכֵם
  chosen: he blessed them
  alternatives:
  - he spoke a blessing over them
  lexicon: HALOT
  rationale: Standard rendering of ברך in this context; no need to expand beyond the
    source.
