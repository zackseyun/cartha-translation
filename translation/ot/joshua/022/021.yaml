id: JOS.22.21
reference: Joshua 22:21
source:
  edition: WLC
  text: וַֽ/יַּעֲנוּ֙ בְּנֵי רְאוּבֵ֣ן וּ/בְנֵי גָ֔ד וַ/חֲצִ֖י שֵׁ֣בֶט הַֽ/מְנַשֶּׁ֑ה
    וַֽ/יְדַבְּר֔וּ אֶת רָאשֵׁ֖י אַלְפֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: 'Then the sons of Reuben, the sons of Gad, and the half-tribe of Manasseh
    answered and spoke to the heads of the clans of Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the heads of the thousands of Israel,' likely referring
      to clan or tribal division leaders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the qal with waw-consecutive commonly introduces a reply in dialogue
    narrative. 'Answered' preserves the formal narrative linkage to the preceding
    accusation.
- source_word: בְּנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - the Reubenites
  lexicon: HALOT
  rationale: Literally 'sons of Reuben.' This keeps the genealogical phrasing of the
    Hebrew. 'Reubenites' is idiomatic but less formally transparent.
- source_word: וּבְנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the Gadites
  lexicon: HALOT
  rationale: As with 'sons of Reuben,' the literal familial expression is retained
    for consistency and transparency.
- source_word: וַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the standard and natural English rendering of the construct phrase
    while remaining close to the Hebrew.
- source_word: וַיְדַבְּרוּ
  chosen: and spoke
  alternatives:
  - and said
  lexicon: HALOT
  rationale: דבר is more specifically 'speak' than 'say.' Rendering both verbs ('answered
    and spoke') reflects the Hebrew's two-part narrative formulation rather than collapsing
    them.
- source_word: אֶת רָאשֵׁי אַלְפֵי יִשְׂרָאֵל
  chosen: to the heads of the clans of Israel
  alternatives:
  - to the heads of the thousands of Israel
  - to the chiefs of the divisions of Israel
  lexicon: HALOT
  rationale: רָאשֵׁי is 'heads/chiefs.' אַלְפֵי literally means 'thousands,' but in
    administrative and tribal contexts it often denotes clan-groupings or military/social
    subdivisions. 'Clans' communicates the function in readable English better than
    the opaque literal 'thousands.'
