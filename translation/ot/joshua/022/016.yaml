theological_decisions:
- issue: Rendering the covenantal offense term מַעַל
  chosen_reading: breach of faith
  alternative_readings:
  - treachery
  - unfaithfulness
  rationale: The context is accusation of cultic/covenantal disloyalty, not merely generic wrongdoing. 'Breach of faith' preserves the theological weight of violating covenant loyalty without over-paraphrasing.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
