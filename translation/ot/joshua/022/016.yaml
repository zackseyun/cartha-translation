id: JOS.22.16
reference: Joshua 22:16
source:
  edition: WLC
  text: כֹּ֣ה אָמְר֞וּ כֹּ֣ל עֲדַ֣ת יְהוָ֗ה מָֽה הַ/מַּ֤עַל הַ/זֶּה֙ אֲשֶׁ֤ר מְעַלְתֶּם֙ בֵּ/אלֹהֵ֣י יִשְׂרָאֵ֔ל לָ/שׁ֣וּב הַ/יּ֔וֹם מֵ/אַחֲרֵ֖י יְהוָ֑ה בִּ/בְנֽוֹתְ/כֶ֤ם לָ/כֶם֙ מִזְבֵּ֔חַ לִ/מְרָדְ/כֶ֥ם הַ/יּ֖וֹם בַּ/יהוָֽה׀־׃
translation:
  text: 'Thus says the whole congregation of Yahweh: ‘What is this breach of faith that you have committed against the God of Israel, turning away today from following Yahweh by building for yourselves an altar, rebelling today against Yahweh?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “treachery” or “unfaithfulness” for “breach of faith.” The Hebrew term denotes covenantal or cultic disloyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמְרוּ
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus have ... said
  lexicon: HALOT
  rationale: Idiomatic prophetic/messenger formula in English is best rendered in the present, even though the Hebrew verb is formally perfect. Singular 'says' fits the collective subject that follows.
- source_word: כֹּל עֲדַת יְהוָה
  chosen: the whole congregation of the LORD
  alternatives:
  - all the assembly of the LORD
  - the entire community of the LORD
  lexicon: HALOT
  rationale: עֵדָה/עֲדָה denotes the assembled covenant community. 'Congregation' preserves the formal communal sense without sounding overly technical. יְהוָה follows the doctrinal default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָה הַמַּעַל הַזֶּה
  chosen: What is this breach of faith
  alternatives:
  - What is this treachery
  - What is this unfaithfulness
  lexicon: HALOT
  rationale: מַעַל denotes an act of unfaithfulness, especially covenantal or cultic violation. 'Breach of faith' captures both the relational and covenantal dimensions more precisely than the broader 'sin' or merely emotional 'treachery'.
- source_word: מְעַלְתֶּם
  chosen: you have committed
  alternatives:
  - you have acted unfaithfully
  - you have trespassed
  lexicon: HALOT
  rationale: Using 'committed' with the preceding noun yields natural English while preserving the force of the cognate construction ('commit a breach of faith').
- source_word: בֵּאלֹהֵי יִשְׂרָאֵל
  chosen: against the God of Israel
  alternatives:
  - with the God of Israel
  - toward the God of Israel
  lexicon: HALOT
  rationale: With מעל plus ב, the sense is hostile or violative toward God; 'against' best conveys the offense.
- source_word: לָשׁוּב ... מֵאַחֲרֵי יְהוָה
  chosen: turning away ... from following the LORD
  alternatives:
  - to turn back ... from after the LORD
  - to turn away ... from the LORD
  lexicon: HALOT
  rationale: The infinitive expresses the content/result of the breach. 'From following the LORD' preserves the idiom אַחֲרֵי ('after') in natural English and retains discipleship/covenant allegiance nuance.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Readable modern English; the repetition is retained both times for rhetorical urgency.
- source_word: בִּבְנוֹתְכֶם לָכֶם מִזְבֵּחַ
  chosen: by building for yourselves an altar
  alternatives:
  - when you built yourselves an altar
  - in that you are building an altar for yourselves
  lexicon: HALOT
  rationale: The prefixed infinitive with ב expresses means/circumstance. 'By building for yourselves an altar' clearly links the act of altar-building to the alleged turning away.
- source_word: לִמְרָדְכֶם
  chosen: rebelling
  alternatives:
  - to rebel
  - in your rebellion
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result, here appositional to the prior accusation. 'Rebelling' gives smooth English while preserving the verbal force.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - in the LORD
  - with the LORD
  lexicon: HALOT
  rationale: In context of מרד, the preposition marks the object of rebellion; English idiom requires 'against the LORD'.
