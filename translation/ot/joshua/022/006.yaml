id: JOS.22.6
reference: Joshua 22:6
source:
  edition: WLC
  text: וַֽ/יְבָרְכֵ֖/ם יְהוֹשֻׁ֑עַ וַֽ/יְשַׁלְּחֵ֔/ם וַ/יֵּלְכ֖וּ אֶל אָהֳלֵי/הֶֽם־׃ס
translation:
  text: Then Joshua blessed them and sent them away, and they went to their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their homes'—literally 'their tents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרְכֵם
  chosen: blessed them
  alternatives:
  - gave them his blessing
  - pronounced a blessing on them
  lexicon: HALOT
  rationale: The piel of ברך here denotes Joshua bestowing a blessing on the departing
    tribes. 'Blessed them' is the most natural and concise English rendering and preserves
    the formal action without unnecessary expansion.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וַיְשַׁלְּחֵם
  chosen: sent them away
  alternatives:
  - dismissed them
  - sent them off
  lexicon: HALOT
  rationale: The verb שלח in this context refers to releasing or dispatching them
    to depart. 'Sent them away' fits the departure scene and reads naturally in modern
    English.
- source_word: וַיֵּלְכוּ
  chosen: they went
  alternatives:
  - they departed
  - they returned
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' 'They went' is the most direct rendering.
    'Returned' would overinterpret, since the destination phrase already supplies
    where they went.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement toward a destination. 'To' is the standard
    idiomatic English equivalent here.
- source_word: אָהֳלֵיהֶם
  chosen: their tents
  alternatives:
  - their homes
  - their encampments
  lexicon: HALOT
  rationale: The noun literally means 'their tents.' Although it can metonymically
    refer to households or home territory, the literal rendering is clear, faithful,
    and idiomatic in this historical setting.
