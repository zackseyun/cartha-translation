theological_decisions:
- issue: Rendering of בנים in a generational warning
  chosen_reading: children
  alternative_readings:
  - sons
  - descendants
  rationale: The Hebrew form is grammatically masculine plural, but the context concerns
    future generations broadly, not male offspring specifically. Following the doctrine's
    gender-accurate principle, 'children' best matches the source intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
