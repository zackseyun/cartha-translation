theological_decisions:
- issue: Rendering of בנים in a generational warning
  chosen_reading: children
  alternative_readings:
  - sons
  - descendants
  rationale: The Hebrew form is grammatically masculine plural, but the context concerns future generations broadly, not male offspring specifically. Following the doctrine's gender-accurate principle, 'children' best matches the source intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
