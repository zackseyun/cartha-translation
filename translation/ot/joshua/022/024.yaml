id: JOS.22.24
reference: Joshua 22:24
source:
  edition: WLC
  text: וְ/אִם לֹ֤א מִ/דְּאָגָה֙ מִ/דָּבָ֔ר עָשִׂ֥ינוּ אֶת זֹ֖את לֵ/אמֹ֑ר מָחָ֗ר יֹאמְר֨וּ
    בְנֵי/כֶ֤ם לְ/בָנֵ֨י/נוּ֙ לֵ/אמֹ֔ר מַה לָּ/כֶ֕ם וְ/לַֽ/יהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: No, rather, we did this out of anxious concern, saying, ‘In time to come your
    children may say to our children, “What have you to do with the LORD, the God
    of Israel?”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your sons ... our sons.'' Here ''children'' reflects the generational
      sense of the passage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם לֹא
  chosen: No, rather
  alternatives:
  - If not
  - Surely not
  lexicon: HALOT
  rationale: In context this introduces a denial of the accusation from the previous
    verse and a corrective explanation, not a simple conditional. Rendering it idiomatically
    as 'No, rather' captures the Hebrew discourse force better than a wooden 'if not.'
- source_word: מִדְּאָגָה
  chosen: out of anxious concern
  alternatives:
  - from anxiety
  - out of fear
  - from concern
  lexicon: HALOT
  rationale: The noun denotes anxiety, worry, or concern. 'Anxious concern' preserves
    the emotional weight without overstating terror.
- source_word: מִדָּבָר
  chosen: for a reason
  alternatives:
  - about a matter
  - for this matter
  lexicon: HALOT
  rationale: The phrase מִדְּאָגָה מִדָּבָר is idiomatic, expressing concern on account
    of a matter. In English this is best absorbed into the phrase 'out of anxious
    concern' rather than translated hyper-literally. The underlying sense is still
    represented in the clause.
- source_word: עָשִׂינוּ אֶת זֹאת
  chosen: we did this
  alternatives:
  - we have done this
  - we made this
  lexicon: HALOT
  rationale: Straightforward past action referring to the building of the altar. 'Did
    this' is natural English and sufficiently specific in context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - for we said
  lexicon: HALOT
  rationale: Introduces the content of their concern. 'Saying' keeps close to the
    Hebrew while remaining readable.
- source_word: מָחָר
  chosen: In time to come
  alternatives:
  - tomorrow
  - later
  - in the future
  lexicon: HALOT
  rationale: Here מָחָר is idiomatic for the future, not the next calendar day. 'In
    time to come' reflects the temporal sense in context and matches the following
    generational language.
- source_word: יֹאמְרוּ בְנֵיכֶם לְבָנֵינוּ
  chosen: your children may say to our children
  alternatives:
  - your sons may say to our sons
  - your descendants will say to our descendants
  lexicon: HALOT
  rationale: Though בנים is literally 'sons,' in this intergenerational context it
    functions representatively for descendants/children. 'Children' is gender-accurate
    to the sense rather than mechanically masculine.
- source_word: מַה לָּכֶם וְלַיהוָה
  chosen: What have you to do with the LORD
  alternatives:
  - What is there between you and the LORD
  - What do you have in common with the LORD
  lexicon: HALOT
  rationale: This Hebrew idiom expresses dissociation or denial of relationship. 'What
    have you to do with...' is a clear English equivalent that preserves the confrontational
    tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Standard construct rendering; preserves the covenantal identification
    in natural English.
