id: JOS.22.25
reference: Joshua 22:25
source:
  edition: WLC
  text: וּ/גְב֣וּל נָֽתַן יְ֠הוָה בֵּינֵ֨/נוּ וּ/בֵינֵי/כֶ֜ם בְּנֵי רְאוּבֵ֤ן וּ/בְנֵי
    גָד֙ אֶת הַ/יַּרְדֵּ֔ן אֵין לָ/כֶ֥ם חֵ֖לֶק בַּֽ/יהוָ֑ה וְ/הִשְׁבִּ֤יתוּ בְנֵי/כֶם֙
    אֶת בָּנֵ֔י/נוּ לְ/בִלְתִּ֖י יְרֹ֥א אֶת יְהוָֽה־־־־־־־׃
translation:
  text: For the LORD has made the Jordan a boundary between us and you, sons of Reuben
    and sons of Gad. You have no share in the LORD. So your sons might cause our sons
    to stop fearing the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have no portion in the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּגְבוּל
  chosen: a boundary
  alternatives:
  - a border
  - a boundary line
  lexicon: HALOT
  rationale: גְּבוּל denotes a border or boundary. 'Boundary' is natural English here
    and fits the sense of a dividing line established between groups.
- source_word: נָתַן
  chosen: has made
  alternatives:
  - has set
  - gave
  lexicon: HALOT
  rationale: Although literally 'gave,' in the collocation with גְּבוּל the idiomatic
    sense is that the LORD established or made the Jordan as a boundary. 'Has made'
    communicates the result clearly in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name can stand as 'the Jordan' in idiomatic English; 'River'
    is implied and unnecessary.
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד
  chosen: sons of Reuben and sons of Gad
  alternatives:
  - children of Reuben and children of Gad
  - Reubenites and Gadites
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'sons of.' 'Reubenites and Gadites' is possible
    but less transparent to the source wording. 'Sons of' preserves the tribal designation
    more formally.
- source_word: אֵין לָכֶם חֵלֶק בַּיהוָה
  chosen: You have no share in the LORD
  alternatives:
  - You have no portion in the LORD
  - You have no inheritance in the LORD
  lexicon: HALOT
  rationale: חֵלֶק commonly means 'share' or 'portion.' 'Share in the LORD' is concise
    and preserves the covenantal-participatory sense without over-specifying inheritance
    language not explicit here.
- source_word: וְהִשְׁבִּיתוּ
  chosen: might cause ... to stop
  alternatives:
  - would make ... cease
  - will cause ... to cease
  lexicon: HALOT
  rationale: The Hiphil of שבת means to cause to cease/stop. In context the concern
    is potential future consequence, so 'might cause ... to stop' captures the feared
    result naturally in English.
- source_word: לְבִלְתִּי יְרֹא
  chosen: to stop fearing
  alternatives:
  - from fearing
  - so that they would not fear
  lexicon: HALOT
  rationale: 'The construction expresses prevention or cessation: causing someone
    so as not to fear. ''To stop fearing'' reads naturally with the causative verb
    and preserves the sense.'
- source_word: יְרֹא אֶת יְהוָה
  chosen: fearing the LORD
  alternatives:
  - revering the LORD
  lexicon: HALOT
  rationale: ירא with God often carries reverential fear. 'Fear the LORD' is a standard
    biblical expression and should be retained rather than softened to 'revere' in
    the main text.
