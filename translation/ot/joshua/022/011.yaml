id: JOS.22.11
reference: Joshua 22:11
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֥וּ בְנֵֽי יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר הִנֵּ֣ה בָנ֣וּ בְנֵֽי רְאוּבֵ֣ן
    וּ/בְנֵי גָ֡ד וַ/חֲצִי֩ שֵׁ֨בֶט הַֽ/מְנַשֶּׁ֜ה אֶת הַ/מִּזְבֵּ֗חַ אֶל מוּל֙ אֶ֣רֶץ
    כְּנַ֔עַן אֶל גְּלִילוֹת֙ הַ/יַּרְדֵּ֔ן אֶל עֵ֖בֶר בְּנֵ֥י יִשְׂרָאֵֽל־־־־־־־׃
translation:
  text: And the sons of Israel heard it said, “Look, the sons of Reuben and the sons
    of Gad and the half-tribe of Manasseh have built the altar opposite the land of
    Canaan, in the region of the Jordan, on the side belonging to the sons of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites heard, saying,” with לֵאמֹר taken more literally; the
      English main text smooths the Hebrew reporting formula.
    reason: lexical_alternative
  - marker: b
    text: Or “facing the land of Canaan” for “opposite the land of Canaan.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “the districts/regions of the Jordan”; the exact geographical nuance
      of the phrase is uncertain.
    reason: cultural_note
  - marker: d
    text: Or “on the side of the sons of Israel” / “across from the sons of Israel.”
      The final geographical phrase is difficult and may indicate either the side
      belonging to Israel west of the Jordan or a position opposite them.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - heard about it
  - came to hear
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of שׁמע, introducing receipt of a report. English
    'heard' is sufficient; the content of the report is supplied by לֵאמֹר.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew expression. 'The Israelites'
    is idiomatic, but 'the sons of Israel' preserves the familial-national wording
    and matches the source's repeated phrasing in this verse.
- source_word: לֵאמֹר
  chosen: it said
  alternatives:
  - saying
  - 'this report:'
  lexicon: HALOT
  rationale: Here לֵאמֹר introduces indirect report content after 'heard.' English
    requires some smoothing; 'heard it said' preserves the reported-speech function
    without awkwardness.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle marking attention to the report. 'Look' is readable
    modern English and retains the force better than archaic 'Behold.'
- source_word: בָנוּ
  chosen: have built
  alternatives:
  - built
  lexicon: HALOT
  rationale: Perfect verb reporting a completed action with present relevance. English
    present perfect fits the reported discovery naturally.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  alternatives:
  - an altar
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. 'The altar' likely points
    to the specific altar under discussion in the narrative rather than an indefinite
    altar.
- source_word: אֶל מוּל אֶרֶץ כְּנַעַן
  chosen: opposite the land of Canaan
  alternatives:
  - facing the land of Canaan
  - in front of the land of Canaan
  lexicon: HALOT
  rationale: מוּל conveys spatial correspondence/opposition. 'Opposite' best captures
    the geographic relation without overinterpreting.
- source_word: גְּלִילוֹת הַיַּרְדֵּן
  chosen: the region of the Jordan
  alternatives:
  - the districts of the Jordan
  - the circles of the Jordan
  lexicon: HALOT
  rationale: גְּלִילוֹת can denote districts/regions. 'Region of the Jordan' is natural
    English and fits the geographical sense.
- source_word: אֶל עֵבֶר בְּנֵי יִשְׂרָאֵל
  chosen: on the side belonging to the sons of Israel
  alternatives:
  - on the side of the sons of Israel
  - across from the sons of Israel
  - on the side facing the sons of Israel
  lexicon: HALOT
  rationale: עֵבֶר denotes side/region across or beyond. In this context the phrase
    is geographically difficult and debated; this rendering preserves the relational
    sense without forcing a precise directional interpretation. 'Belonging to' clarifies
    the genitive relation in idiomatic English.
