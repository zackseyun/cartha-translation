id: JOS.22.33
reference: Joshua 22:33
source:
  edition: WLC
  text: וַ/יִּיטַ֣ב הַ/דָּבָ֗ר בְּ/עֵינֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יְבָרֲכ֥וּ אֱלֹהִ֖ים
    בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/לֹ֣א אָמְר֗וּ לַ/עֲל֤וֹת עֲלֵי/הֶם֙ לַ/צָּבָ֔א לְ/שַׁחֵת֙
    אֶת הָ/אָ֔רֶץ אֲשֶׁ֛ר בְּנֵי רְאוּבֵ֥ן וּ/בְנֵי גָ֖ד יֹשְׁבִ֥ים בָּֽ/הּ־־־׃
translation:
  text: And the matter was good in the eyes of the sons of Israel, and the sons of
    Israel blessed God. And they did not speak of going up against them in war to
    destroy the land where the sons of Reuben and the sons of Gad were living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'praised God.' The Hebrew verb is literally 'blessed.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'did not say to go up against them for war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב
  chosen: was good
  alternatives:
  - was pleasing
  - seemed good
  lexicon: HALOT
  rationale: The verb טוֹב in this wayyiqtol construction expresses that the report
    or explanation was judged favorably. 'Was good' is a transparent rendering that
    preserves the Hebrew idiom without over-paraphrasing.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the word
  - the report
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'affair.' Here it refers to the
    explanation just given, so 'the matter' fits the context better than the more
    wooden 'thing' and avoids narrowing it to mere speech with 'word'.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - pleased
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. Retaining 'in the eyes of'
    keeps the source imagery while remaining understandable in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural is preserved.
    'The sons of Israel' is more formally aligned with the Hebrew than 'the Israelites,'
    while still natural enough in context.
- source_word: וַיְבָרֲכוּ אֱלֹהִים
  chosen: blessed God
  alternatives:
  - praised God
  lexicon: HALOT
  rationale: ברך with God as object can mean to bless in the sense of praising or
    speaking well of God. 'Blessed God' is the more direct lexical rendering; 'praised
    God' is a possible interpretive alternative but is not necessary in the main text.
- source_word: וְלֹא אָמְרוּ
  chosen: they did not speak of
  alternatives:
  - they did not say
  - they no longer talked about
  - they did not propose
  lexicon: HALOT
  rationale: The Hebrew literally says 'they did not say,' but in this context it
    refers to refraining from proposing or discussing military action. 'Did not speak
    of' preserves the verbal idea while reading naturally in English.
- source_word: לַעֲלוֹת עֲלֵיהֶם
  chosen: going up against them
  alternatives:
  - to go up against them
  - to attack them
  lexicon: HALOT
  rationale: עלה על is a common military expression for advancing against an opponent.
    'Going up against them' keeps the Hebrew movement idiom and military sense without
    collapsing it fully into the interpretive 'attack.'
- source_word: לַצָּבָא
  chosen: in war
  alternatives:
  - for war
  - as an army
  - for battle
  lexicon: HALOT
  rationale: צָבָא here denotes military service or warfare. 'In war' is concise and
    idiomatic in English in connection with 'going up against them.'
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to devastate
  lexicon: HALOT
  rationale: The infinitive expresses the intended result of military action. 'To
    destroy' is the standard and sufficiently strong rendering.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the territory
  lexicon: HALOT
  rationale: אֶרֶץ in Joshua commonly refers to a territorial land rather than the
    earth in general. 'The land' preserves that covenantal-geographical sense.
- source_word: יֹשְׁבִים בָּהּ
  chosen: were living
  alternatives:
  - dwelt in
  - were dwelling in
  - lived in it
  lexicon: HALOT
  rationale: ישב commonly means to dwell or live. 'Were living' gives natural English
    while reflecting the participial sense of ongoing residence.
