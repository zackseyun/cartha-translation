theological_decisions:
- issue: Implicit subject of יִקְצֹף
  chosen_reading: 'the LORD is the implied subject: ''he will be angry'''
  alternative_readings:
  - an indefinite 'wrath will come'
  rationale: The immediate context repeatedly names the LORD as the one against whom
    they turn and rebel; the warning is that his anger will fall on all Israel, echoing
    covenant solidarity themes in the chapter.
