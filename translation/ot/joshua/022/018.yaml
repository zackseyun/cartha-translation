id: JOS.22.18
reference: Joshua 22:18
source:
  edition: WLC
  text: וְ/אַתֶּם֙ תָּשֻׁ֣בוּ הַ/יּ֔וֹם מֵ/אַחֲרֵ֖י יְהוָ֑ה וְ/הָיָ֗ה אַתֶּ֞ם תִּמְרְד֤וּ
    הַ/יּוֹם֙ בַּֽ/יהוָ֔ה וּ/מָחָ֕ר אֶֽל כָּל עֲדַ֥ת יִשְׂרָאֵ֖ל יִקְצֹֽף־־׃
translation:
  text: And you are turning away today from following the LORD; and if you rebel today
    against the LORD, tomorrow he will be angry with the whole congregation of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back today from following the LORD.' The Hebrew verb can mean 'turn
      back' or 'turn away'; in this context it carries the sense of turning away in
      disloyalty.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from after the LORD,' a Hebrew idiom meaning to stop following
      him.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew simply says 'he will be angry'; the implied subject is the LORD
      from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשֻׁבוּ
  chosen: are turning away
  alternatives:
  - turn back
  - turn away
  lexicon: HALOT
  rationale: From שוב, here with מֵאַחֲרֵי ('from after/following'), the sense is
    not simple return but apostasy/turning away from following the LORD. Progressive
    English fits the immediate accusation.
- source_word: מֵאַחֲרֵי יְהוָה
  chosen: from following the LORD
  alternatives:
  - from after the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The idiom 'from after YHWH' means ceasing to follow him. 'From following
    the LORD' preserves the Hebrew image while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: וְהָיָה
  chosen: and if
  alternatives:
  - and it will be
  - and it shall happen
  lexicon: HALOT
  rationale: Though formally 'and it will be,' in this construction it introduces
    the conditional/apodotic development of the warning. 'And if' is the most natural
    optimal-equivalence rendering in context.
- source_word: תִּמְרְדוּ
  chosen: you rebel
  alternatives:
  - you act rebelliously
  - you revolt
  lexicon: HALOT
  rationale: מרד denotes rebellion, especially covenantal defiance against rightful
    authority. 'Rebel' is concise and strong without overparaphrase.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - in the LORD
  - with the LORD
  lexicon: HALOT
  rationale: 'With מרד, the preposition is adversative in sense: rebellion against
    the LORD.'
- source_word: וּמָחָר
  chosen: tomorrow
  alternatives:
  - and tomorrow
  - on the next day
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence that follows. 'Tomorrow' is idiomatic
    and preserves the urgency.
- source_word: יִקְצֹף
  chosen: he will be angry
  alternatives:
  - he will be wrathful
  - he will be enraged
  lexicon: HALOT
  rationale: קצף expresses anger/wrath. 'He will be angry' is readable modern English;
    the subject is understood from context as the LORD.
- source_word: כָּל עֲדַת יִשְׂרָאֵל
  chosen: the whole congregation of Israel
  alternatives:
  - all the assembly of Israel
  - the whole community of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves the corporate covenantal sense better than the flatter 'community.'
