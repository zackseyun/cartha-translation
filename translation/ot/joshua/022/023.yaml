id: JOS.22.23
reference: Joshua 22:23
source:
  edition: WLC
  text: לִ/בְנ֥וֹת לָ֨/נוּ֙ מִזְבֵּ֔חַ לָ/שׁ֖וּב מֵ/אַחֲרֵ֣י יְהוָ֑ה וְ/אִם לְ/הַעֲל֨וֹת
    עָלָ֜י/ו עוֹלָ֣ה וּ/מִנְחָ֗ה וְ/אִם לַ/עֲשׂ֤וֹת עָלָי/ו֙ זִבְחֵ֣י שְׁלָמִ֔ים יְהוָ֖ה
    ה֥וּא יְבַקֵּֽשׁ־־׃
translation:
  text: if we built for ourselves an altar to turn away from following the LORD, or
    if to offer on it burnt offering and grain offering, or if to make on it sacrifices
    of peace offerings, may the LORD himself require it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD himself will require it,' that is, will call us to account
      for it.
    reason: alternative_reading
  - marker: b
    text: '''Peace offerings'' may also be rendered ''fellowship offerings.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנוֹת לָנוּ מִזְבֵּחַ
  chosen: if we built for ourselves an altar
  alternatives:
  - if we have built for ourselves an altar
  - in building for ourselves an altar
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ל after the oath context of the
    previous verse functions conditionally: ''if [we did this].'' English supplies
    a finite verb for natural sense. ''For ourselves'' preserves לָנוּ. ''Altar''
    is the standard rendering of מִזְבֵּחַ.'
- source_word: לָשׁוּב מֵאַחֲרֵי יְהוָה
  chosen: to turn away from following the LORD
  alternatives:
  - to turn back from after the LORD
  - to turn away from the LORD
  lexicon: HALOT
  rationale: שׁוּב with מֵאַחֲרֵי literally means turning back from behind/following
    someone. 'Turn away from following' preserves both the apostasy sense and the
    imagery of ceasing to follow. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: וְאִם לְהַעֲלוֹת עָלָיו עוֹלָה
  chosen: or if to offer on it burnt offering
  alternatives:
  - or if to offer up on it a burnt offering
  lexicon: HALOT
  rationale: הַעֲלוֹת with עוֹלָה is sacrificial language for offering up a burnt
    offering. I kept 'offer on it' for readability while preserving the cultic sense.
    The singular 'burnt offering' matches the Hebrew singular collective usage.
- source_word: וּמִנְחָה
  chosen: and grain offering
  alternatives:
  - and offering
  - and tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts is best rendered 'grain offering,' not
    the broader 'offering' or 'tribute,' because the verse lists cultic sacrifice
    types.
- source_word: וְאִם לַעֲשׂוֹת עָלָיו זִבְחֵי שְׁלָמִים
  chosen: or if to make on it sacrifices of peace offerings
  alternatives:
  - or if to offer on it sacrifices of peace offerings
  - or if to make on it fellowship offerings
  lexicon: HALOT
  rationale: עָשָׂה can be used idiomatically for performing/offering sacrifices;
    'make' is more formally aligned, though somewhat wooden. I retained 'sacrifices
    of peace offerings' to reflect זִבְחֵי שְׁלָמִים closely. 'Fellowship offerings'
    is possible but less transparent to the Hebrew term and tradition.
- source_word: יְהוָה הוּא יְבַקֵּשׁ
  chosen: may the LORD himself require it
  alternatives:
  - the LORD himself will require it
  - may the LORD himself call us to account for it
  lexicon: HALOT
  rationale: In this oath/curse context, יְבַקֵּשׁ carries the sense of demanding
    an account or exacting judgment. 'May ... require it' captures the jussive-like
    force in English and fits the self-imprecatory context. הוּא is represented by
    'himself' for emphasis.
