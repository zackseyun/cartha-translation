theological_decisions:
- issue: Nature of the impurity of the Transjordan land
  chosen_reading: Render the statement straightforwardly as 'if the land of your possession
    is unclean' without specifying whether the uncleanness is cultic, geographic,
    or rhetorical.
  alternative_readings:
  - if your land is defiled in a cultic sense
  - if your territory is considered unsuitable because it lies outside the central
    sanctuary land
  rationale: The Hebrew states the condition without explaining the precise mechanism
    of impurity. The translation preserves that ambiguity rather than resolving it
    interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Status of the additional altar
  chosen_reading: Translate the warning as a prohibition against building an altar
    besides the LORD’s altar, implying a rival or unauthorized altar without expanding
    the claim.
  alternative_readings:
  - building any second altar whatsoever is inherently forbidden
  - the concern is specifically a sacrificial altar in competition with the central
    sanctuary
  rationale: The verse clearly opposes an altar 'besides' the LORD's altar, but the
    exact scope of the prohibition is inferred from context. The translation keeps
    the text's wording and does not import a fuller theory of centralization than
    the verse itself states.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
