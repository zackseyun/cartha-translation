id: JOS.22.19
reference: Joshua 22:19
source:
  edition: WLC
  text: וְ/אַ֨ךְ אִם טְמֵאָ֜ה אֶ֣רֶץ אֲחֻזַּתְ/כֶ֗ם עִבְר֨וּ לָ/כֶ֜ם אֶל אֶ֨רֶץ אֲחֻזַּ֤ת
    יְהוָה֙ אֲשֶׁ֤ר שָֽׁכַן שָׁם֙ מִשְׁכַּ֣ן יְהוָ֔ה וְ/הֵאָחֲז֖וּ בְּ/תוֹכֵ֑/נוּ
    וּ/בַֽ/יהוָ֣ה אַל תִּמְרֹ֗דוּ וְ/אֹתָ֨/נוּ֙ אֶל תִּמְרֹ֔דוּ בִּ/בְנֹֽתְ/כֶ֤ם לָ/כֶם֙
    מִזְבֵּ֔חַ מִֽ/בַּלְעֲדֵ֔י מִזְבַּ֖ח יְהוָ֥ה אֱלֹהֵֽי/נוּ־־־־־׃
translation:
  text: But if the land of your possession is unclean, cross over for yourselves into
    the land of the LORD’s possession, where the LORD’s tabernacle dwells, and take
    possession among us. Only do not rebel against the LORD, or rebel against us,
    by building for yourselves an altar besides the altar of the LORD our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your inherited land' / 'the land of your inheritance.' The Hebrew term
      for 'possession' can denote a hereditary holding.
    reason: lexical_alternative
  - marker: b
    text: Or 'where the tabernacle of the LORD resides.' The Hebrew literally refers
      to the LORD’s tabernacle dwelling there.
    reason: lexical_alternative
  - marker: c
    text: Or 'and settle among us.' The Hebrew verb can carry the sense of obtaining
      a holding or settling in a place.
    reason: lexical_alternative
  - marker: d
    text: Or 'apart from' or 'in addition to' the altar of the LORD our God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַךְ
  chosen: But
  alternatives:
  - Only
  - Nevertheless
  - However
  lexicon: HALOT
  rationale: Introduces a strong qualification to the previous accusation and proposal.
    'But' is natural English and preserves the adversative force without overtranslating
    the particle combination.
- source_word: טְמֵאָה
  chosen: unclean
  alternatives:
  - defiled
  - impure
  lexicon: HALOT
  rationale: Cultic/moral impurity is in view regarding the land. 'Unclean' is the
    standard biblical English equivalent and preserves the ritual connotation better
    than the more general 'impure'.
- source_word: אֶרֶץ אֲחֻזַּתְכֶם
  chosen: the land of your possession
  alternatives:
  - your inherited land
  - the land of your inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or holding, often inherited. 'Land of your
    possession' stays close to the Hebrew while remaining readable. 'Inheritance'
    is possible, but 'possession' better matches the repeated contrast with 'the LORD’s
    possession' in this verse.
- source_word: עִבְרוּ לָכֶם
  chosen: cross over for yourselves
  alternatives:
  - cross over
  - pass over for yourselves
  lexicon: HALOT
  rationale: The verb refers to crossing over, likely the Jordan. The dative לָכֶם
    adds a reflexive/benefactive nuance, retained with 'for yourselves' rather than
    omitted.
- source_word: אֶל אֶרֶץ אֲחֻזַּת יְהוָה
  chosen: into the land of the LORD’s possession
  alternatives:
  - into the land of the LORD’s inheritance
  - to the land belonging to the LORD
  lexicon: HALOT
  rationale: Maintains the deliberate parallel with 'the land of your possession.'
    YHWH is rendered 'the LORD' per doctrine. 'Possession' keeps the lexical repetition
    visible in English.
- source_word: אֲשֶׁר שָׁכַן שָׁם מִשְׁכַּן יְהוָה
  chosen: where the LORD’s tabernacle dwells
  alternatives:
  - where the tabernacle of the LORD resides
  - where the LORD’s dwelling place is
  lexicon: HALOT
  rationale: The clause literally says 'where the tabernacle of the LORD has dwelt/dwells
    there.' English smooths this to 'where the LORD’s tabernacle dwells.' 'Tabernacle'
    is retained as the established rendering of מִשְׁכָּן in this cultic context.
- source_word: וְהֵאָחֲזוּ בְּתוֹכֵנוּ
  chosen: and take possession among us
  alternatives:
  - and settle among us
  - and obtain a holding among us
  lexicon: HALOT
  rationale: The Niphal/implied middle sense from אחז here concerns obtaining a possession/holding.
    'Take possession among us' preserves the land-tenure sense better than the more
    generic 'settle among us.'
- source_word: וּבַיהוָה אַל תִּמְרֹדוּ
  chosen: Only do not rebel against the LORD
  alternatives:
  - but do not rebel against the LORD
  - and do not rebel against the LORD
  lexicon: HALOT
  rationale: 'The preposition marks the object of rebellion. ''Only'' captures the
    restrictive/emphatic force at this point in the appeal: whatever else happens,
    rebellion against the LORD must not occur.'
- source_word: וְאֹתָנוּ אַל תִּמְרֹדוּ
  chosen: or rebel against us
  alternatives:
  - and do not rebel against us
  lexicon: HALOT
  rationale: The second prohibition is coordinated with the first. 'Or rebel against
    us' reads naturally in English and reflects the parallel warning not to set themselves
    against the western tribes.
- source_word: בִּבְנֹתְכֶם לָכֶם מִזְבֵּחַ
  chosen: by building for yourselves an altar
  alternatives:
  - when you build for yourselves an altar
  - by your building an altar for yourselves
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב expresses means/circumstance.
    'By building' best captures the causal/instrumental sense in context.
- source_word: מִבַּלְעֲדֵי מִזְבַּח יְהוָה אֱלֹהֵינוּ
  chosen: besides the altar of the LORD our God
  alternatives:
  - apart from the altar of the LORD our God
  - in addition to the altar of the LORD our God
  lexicon: HALOT
  rationale: מִבַּלְעֲדֵי conveys exclusion or addition outside the legitimate altar.
    'Besides' is concise and idiomatic, preserving the warning against a rival altar.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
