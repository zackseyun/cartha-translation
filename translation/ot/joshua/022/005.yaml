theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH. This also preserves the verse's covenantal register and aligns with longstanding
    Jewish and Christian reading practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Retention of covenantal ethical metaphors
  chosen_reading: to walk in all his ways ... to cling to him
  alternative_readings:
  - to live according to all his ways ... to hold fast to him
  rationale: The Hebrew uses established covenantal metaphors that carry theological
    weight. Preserving them maintains the text's exhortational and relational force
    without over-paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text plain
    sense; avoid paraphrase beyond what the source warrants'
