id: JOS.22.5
reference: Joshua 22:5
source:
  edition: WLC
  text: רַ֣ק שִׁמְר֣וּ מְאֹ֗ד לַ/עֲשׂ֨וֹת אֶת הַ/מִּצְוָ֣ה וְ/אֶת הַ/תּוֹרָה֮ אֲשֶׁ֣ר
    צִוָּ֣ה אֶתְ/כֶם֮ מֹשֶׁ֣ה עֶֽבֶד יְהוָה֒ לְ֠/אַהֲבָה אֶת יְהוָ֨ה אֱלֹֽהֵי/כֶ֜ם
    וְ/לָ/לֶ֧כֶת בְּ/כָל דְּרָכָ֛י/ו וְ/לִ/שְׁמֹ֥ר מִצְוֺתָ֖י/ו וּ/לְ/דָבְקָה ב֑/וֹ
    וּ/לְ/עָבְד֕/וֹ בְּ/כָל לְבַבְ/כֶ֖ם וּ/בְ/כָל נַפְשְׁ/כֶֽם׀־־־־־־־־׃
translation:
  text: 'Only be very careful to do the commandment and the law that Moses the servant
    of the LORD commanded you: to love the LORD your God, to walk in all his ways,
    to keep his commandments, to cling to him, and to serve him with all your heart
    and with all your soul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the instruction' for 'the law' (Hebrew torah).
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But
  - Nevertheless
  lexicon: HALOT
  rationale: Introduces a strong limitation/emphasis after the preceding dismissal
    and blessing; 'Only' best captures the exhortational force in natural English.
- source_word: שִׁמְרוּ מְאֹד
  chosen: be very careful
  alternatives:
  - take great care
  - carefully keep
  lexicon: HALOT
  rationale: The idiom with שׁמר plus מְאֹד here is not merely 'keep' but an urgent
    warning to exercise great care. 'Be very careful' conveys the idiomatic force
    better than a wooden 'keep very much.'
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: 'The infinitive expresses the content of the carefulness: actual performance.
    ''To do'' is direct and preserves the Hebrew wording.'
- source_word: הַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  - the charge
  lexicon: HALOT
  rationale: Singular מִצְוָה is retained as 'the commandment,' matching the Hebrew
    number and preserving its covenantal tone.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the teaching
  lexicon: HALOT
  rationale: Though torah can mean 'instruction,' in this covenantal Mosaic context
    'the law' is the most recognizable and fitting rendering. The alternative sense
    is worth preserving in a footnote because 'instruction' is also lexically valid.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: For עֶבֶד, 'servant' is preferable here because the phrase is an established
    honorific title for Moses, and the bonded-status nuance of 'slave' is not foregrounded
    in this context. 'the LORD' follows the project's default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and common covenantal usage.
- source_word: לְאַהֲבָה
  chosen: to love
  lexicon: HALOT
  rationale: Straightforward infinitive of purpose/content; 'to love' preserves the
    covenantal demand without expansion.
- source_word: וְלָלֶכֶת בְּכָל דְּרָכָיו
  chosen: to walk in all his ways
  alternatives:
  - to live according to all his ways
  - to walk in all of his paths
  lexicon: HALOT
  rationale: '''Walk'' preserves the common Hebrew ethical metaphor and remains clear
    in modern English.'
- source_word: וְלִשְׁמֹר מִצְוֺתָיו
  chosen: to keep his commandments
  alternatives:
  - to observe his commandments
  - to guard his commandments
  lexicon: HALOT
  rationale: '''Keep'' is the standard covenantal rendering for שׁמר with commandments
    and is both natural and semantically adequate.'
- source_word: וּלְדָבְקָה בּוֹ
  chosen: to cling to him
  alternatives:
  - to hold fast to him
  - to cleave to him
  lexicon: HALOT
  rationale: The verb denotes close attachment/adhesion. 'Cling' is vivid, modern,
    and preserves the relational intensity better than the archaic 'cleave.'
- source_word: וּלְעָבְדוֹ
  chosen: to serve him
  alternatives:
  - to worship him
  lexicon: HALOT
  rationale: עבד can include worshipful service to God, but 'serve' is broader and
    closer to the lexical range here, allowing the full covenantal sense of devoted
    obedience.
- source_word: בְּכָל לְבַבְכֶם
  chosen: with all your heart
  lexicon: HALOT
  rationale: Standard idiomatic rendering for total inner devotion; singular collective
    'heart' is natural in English.
- source_word: וּבְכָל נַפְשְׁכֶם
  chosen: with all your soul
  alternatives:
  - with all your life
  - with all your being
  lexicon: HALOT
  rationale: '''Soul'' preserves the traditional and lexical sense of נֶפֶשׁ in this
    covenant formula. Alternatives are possible, but ''soul'' best maintains the intertextual
    resonance with Deuteronomic language.'
