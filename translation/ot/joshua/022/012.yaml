id: JOS.22.12
reference: Joshua 22:12
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יִּקָּ֨הֲל֜וּ כָּל עֲדַ֤ת בְּנֵֽי
    יִשְׂרָאֵל֙ שִׁלֹ֔ה לַ/עֲל֥וֹת עֲלֵי/הֶ֖ם לַ/צָּבָֽא־־׃פ
translation:
  text: When the sons of Israel heard, the whole congregation of the sons of Israel
    assembled at Shiloh to go up against them for war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew is literally 'sons
      of Israel,' and that wording is preserved here for source transparency.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to go up against them for war,' a standard idiom for military action.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - came to hear
  - learned
  lexicon: HALOT
  rationale: The verb שׁמע in the qal wayyiqtol here naturally means 'heard' in narrative
    sequence. 'Learned' is possible idiomatically, but 'heard' stays closer to the
    Hebrew while remaining natural English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    this preserves the source expression rather than flattening it to 'Israelites.'
    Because the phrase is repeated in the verse, it is rendered consistently both
    times.
- source_word: וַיִּקָּהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: From קהל, 'to assemble/gather.' 'Assembled' is concise, natural, and
    fits the formal public action of the congregation.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: the whole congregation of the sons of Israel
  alternatives:
  - all the congregation of the sons of Israel
  - the whole assembly of the sons of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community/congregation. 'Whole congregation'
    renders כָּל + construct phrase smoothly in English while preserving the corporate
    sense.
- source_word: שִׁלֹה
  chosen: Shiloh
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to march up
  - to attack
  lexicon: HALOT
  rationale: עלה literally means 'to go up.' In military context it can imply advancing
    against an enemy, but retaining 'go up' preserves the Hebrew idiom without over-interpreting.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  - up against them
  lexicon: HALOT
  rationale: With על after עלה in a hostile context, the sense is movement against
    a target. 'Against them' communicates the adversative force clearly in English.
- source_word: לַצָּבָא
  chosen: for war
  alternatives:
  - for battle
  - for military action
  lexicon: HALOT
  rationale: צָבָא here denotes warfare/hostile military action rather than merely
    an army as a body. 'For war' is compact and idiomatic with the preceding infinitive.
