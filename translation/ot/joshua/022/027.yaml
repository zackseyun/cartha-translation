theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per project doctrine, the default
    rendering is 'the LORD,' following Jewish reverence tradition and longstanding
    biblical English convention while preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic terminology for עֲבֹדַת יְהוָה
  chosen_reading: the service of the LORD
  alternative_readings:
  - the worship of the LORD
  rationale: The Hebrew emphasizes cultic service performed before God through offerings.
    'Service' preserves the sacrificial and priestly dimension better than the broader
    'worship,' while still being understandable in modern English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    consistency of key terms'
