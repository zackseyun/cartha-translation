id: JOS.22.27
reference: Joshua 22:27
source:
  edition: WLC
  text: כִּי֩ עֵ֨ד ה֜וּא בֵּינֵ֣י/נוּ וּ/בֵינֵי/כֶ֗ם וּ/בֵ֣ין דֹּרוֹתֵי/נוּ֮ אַחֲרֵי/נוּ֒
    לַ/עֲבֹ֞ד אֶת עֲבֹדַ֤ת יְהוָה֙ לְ/פָנָ֔י/ו בְּ/עֹלוֹתֵ֥י/נוּ וּ/בִ/זְבָחֵ֖י/נוּ
    וּ/בִ/שְׁלָמֵ֑י/נוּ וְ/לֹא יֹאמְר֨וּ בְנֵי/כֶ֤ם מָחָר֙ לְ/בָנֵ֔י/נוּ אֵין לָ/כֶ֥ם
    חֵ֖לֶק בַּ/יהוָֽה־־־׃
translation:
  text: Rather, it is a witness between us and you, and between our generations after
    us, that we may perform the service of the LORD before him with our burnt offerings,
    our sacrifices, and our peace offerings, so that your children may not say to
    our children in time to come, ‘You have no share in the LORD.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''For it is a witness''; the Hebrew כִּי can be read causally, but in
      context it introduces a corrective explanation: the altar was not for offerings
      on that site, but as a witness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our fellowship offerings' for 'our peace offerings.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'tomorrow,' often used idiomatically for 'in the future' or 'in time
      to come.'
    reason: lexical_alternative
  - marker: d
    text: Or 'You have no portion in the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Rather
  alternatives:
  - For
  - But rather
  - Instead
  lexicon: HALOT
  rationale: 'In context this clause continues and clarifies the purpose of the altar
    from the previous verse, functioning adversatively/explanatorily rather than as
    a simple causal ''for.'' ''Rather'' captures the contrast: not for sacrifice on
    the altar itself, but as a witness.'
- source_word: עֵד
  chosen: witness
  alternatives:
  - testimony
  - witness sign
  lexicon: HALOT
  rationale: The noun denotes a witness or testimony. 'Witness' is the most direct
    and idiomatic rendering here for the altar's memorial/testimonial function.
- source_word: בֵּינֵינוּ וּבֵינֵיכֶם וּבֵין דֹּרוֹתֵינוּ אַחֲרֵינוּ
  chosen: between us and you, and between our generations after us
  alternatives:
  - between us and you and our descendants after us
  - between us and you and the generations after us
  lexicon: HALOT
  rationale: The phrase marks the altar as an enduring witness across present parties
    and future descendants. 'Our generations after us' preserves the first-person
    possessive and the durative sense.
- source_word: לַעֲבֹד אֶת עֲבֹדַת יְהוָה
  chosen: that we may perform the service of the LORD
  alternatives:
  - to serve in the service of the LORD
  - to carry out the worship/service of the LORD
  lexicon: HALOT
  rationale: The infinitive plus cognate noun from עבד emphasizes carrying out cultic
    service. 'Perform the service' preserves the formal repetition without awkward
    English. 'Of the LORD' follows the genitive relation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before the LORD
  lexicon: HALOT
  rationale: Literally 'before him.' Since the antecedent is immediately 'the LORD,'
    the pronoun is clear and keeps the Hebrew flow.
- source_word: בְּעֹלוֹתֵינוּ
  chosen: with our burnt offerings
  alternatives:
  - by our burnt offerings
  lexicon: HALOT
  rationale: 'עֹלָה is the standard sacrificial term ''burnt offering.'' The preposition
    is instrumental/associative in context: the service is carried out with these
    offerings.'
- source_word: וּבִזְבָחֵינוּ
  chosen: our sacrifices
  alternatives:
  - our slaughter offerings
  lexicon: HALOT
  rationale: זֶבַח broadly denotes sacrifice, often of slaughtered animals. 'Sacrifices'
    is the natural general rendering here alongside the more specific categories.
- source_word: וּבִשְׁלָמֵינוּ
  chosen: our peace offerings
  alternatives:
  - our fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings.' 'Fellowship offerings'
    is possible, but 'peace offerings' remains more transparent to the Hebrew sacrificial
    category while still readable.
- source_word: וְלֹא יֹאמְרוּ ... מָחָר
  chosen: so that your children may not say to our children in time to come
  alternatives:
  - and your children will not say ... tomorrow
  - lest your children say ... in the future
  lexicon: HALOT
  rationale: 'Though literally ''and not will say ... tomorrow,'' Hebrew מָחָר often
    means ''in the future'' or ''someday'' in such contexts. Rendering the clause
    purposively in English fits the discourse logic: the witness exists to prevent
    future exclusion.'
- source_word: אֵין לָכֶם חֵלֶק בַּיהוָה
  chosen: You have no share in the LORD
  alternatives:
  - You have no portion in the LORD
  - You have no inheritance in the LORD
  lexicon: HALOT
  rationale: חֵלֶק is 'share/portion.' 'Share' is idiomatic modern English and conveys
    covenantal participation without over-specifying inheritance language. 'In the
    LORD' follows the Hebrew preposition and expresses belonging/participation in
    relation to him.
