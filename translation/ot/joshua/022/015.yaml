id: JOS.22.15
reference: Joshua 22:15
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ אֶל בְּנֵי רְאוּבֵ֧ן וְ/אֶל בְּנֵי גָ֛ד וְ/אֶל חֲצִ֥י שֵֽׁבֶט
    מְנַשֶּׁ֖ה אֶל אֶ֣רֶץ הַ/גִּלְעָ֑ד וַ/יְדַבְּר֥וּ אִתָּ֖/ם לֵ/אמֹֽר־־־־־־־׃
translation:
  text: And they came to the sons of Reuben, and to the sons of Gad, and to the half-tribe
    of Manasseh, in the land of Gilead, and they spoke with them, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the land of Gilead." The Hebrew preposition can be read directionally,
      but here it likely functions to locate where they came to the eastern tribes.
    reason: lexical_alternative
  - marker: b
    text: Or "they spoke to them."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they went
  - they arrived
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא, the standard narrative form meaning 'came/went.'
    'Came' fits normal English narration from the narrator's perspective and preserves
    the simple movement sense without overinterpreting destination nuance.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בן in tribal formulas commonly means 'sons of' as
    a conventional designation for the members of a tribe. This is gender-accurate
    to the Hebrew form and idiomatic in this context.
- source_word: חֲצִי שֵׁבֶט
  chosen: half-tribe
  alternatives:
  - half of the tribe
  lexicon: HALOT
  rationale: This construct phrase is a standard tribal designation in Joshua. 'Half-tribe'
    is the most natural and established English equivalent while remaining formally
    close to the Hebrew.
- source_word: אֶל אֶרֶץ הַגִּלְעָד
  chosen: in the land of Gilead
  alternatives:
  - to the land of Gilead
  lexicon: HALOT
  rationale: Although אֶל normally means 'to,' the phrase follows an initial series
    of אֶל phrases naming the tribes and functions appositionally/locatively with
    their region. In English, 'in the land of Gilead' best communicates the destination/location
    of the encounter without awkward repetition.
- source_word: וַיְדַבְּרוּ אִתָּם
  chosen: they spoke with them
  alternatives:
  - they spoke to them
  lexicon: HALOT
  rationale: דבר with אֵת can denote speaking with someone, not merely addressing
    them. 'Spoke with' preserves the preposition more closely and suggests direct
    engagement, though 'spoke to' is also possible.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introducing direct speech is conventionally
    rendered 'saying.' Retaining it preserves the narrative linkage to the following
    verse.
