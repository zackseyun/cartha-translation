id: JOS.22.13
reference: Joshua 22:13
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֨וּ בְנֵֽי יִשְׂרָאֵ֜ל אֶל בְּנֵי רְאוּבֵ֧ן וְ/אֶל בְּנֵי גָ֛ד
    וְ/אֶל חֲצִ֥י שֵֽׁבֶט מְנַשֶּׁ֖ה אֶל אֶ֣רֶץ הַ/גִּלְעָ֑ד אֶת פִּינְחָ֖ס בֶּן אֶלְעָזָ֥ר
    הַ/כֹּהֵֽן־־־־־־־־־־׃
translation:
  text: Then the sons of Israel sent Phinehas son of Eleazar the priest to the sons
    of Reuben, to the sons of Gad, and to the half-tribe of Manasseh, in the land
    of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites sent Phinehas ... to the Reubenites,
      the Gadites, and the half-tribe of Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving the sequential force better than a mechanically
    repeated 'and.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' This keeps the source expression
    visible and is gender-accurate to the form, while still idiomatic enough in context.
    'Israelites' is possible but less transparent to the underlying wording.
- source_word: אֶל
  chosen: to
  alternatives:
  - against
  - toward
  lexicon: HALOT
  rationale: In this context of dispatching a representative, the preposition marks
    direction/recipient, best rendered 'to.'
- source_word: בְּנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - the Reubenites
  lexicon: HALOT
  rationale: A transparent rendering of the Hebrew construct phrase. 'Reubenites'
    is idiomatic but less formally tied to the source wording.
- source_word: בְּנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the Gadites
  lexicon: HALOT
  rationale: As with 'sons of Reuben,' this preserves the Hebrew phrasing rather than
    converting to the gentilic.
- source_word: חֲצִי שֵׁבֶט מְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the standard and natural English equivalent of the construct
    chain, preserving the tribal designation clearly.
- source_word: אֶל אֶרֶץ הַגִּלְעָד
  chosen: in the land of Gilead
  alternatives:
  - to the land of Gilead
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this sentence it functions appositionally
    with the destination of the mission, identifying where these tribes were located.
    'In the land of Gilead' is more natural English and fits the sense of the verse
    in context.
- source_word: אֶת פִּינְחָס
  chosen: Phinehas
  lexicon: HALOT
  rationale: Direct-object marker אֶת is not translated; the personal name is transliterated
    according to standard English convention.
- source_word: בֶּן אֶלְעָזָר
  chosen: son of Eleazar
  lexicon: HALOT
  rationale: A straightforward rendering of the patronymic construction.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priestly one
  lexicon: HALOT
  rationale: The noun denotes the office of priest. With the article, 'the priest'
    is the natural rendering, likely identifying Eleazar by his known office.
