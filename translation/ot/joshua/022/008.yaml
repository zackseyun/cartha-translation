theological_decisions:
- issue: Gendered kinship term אֲחֵיכֶם
  chosen_reading: with your brothers
  alternative_readings:
  - with your brothers and sisters
  - with your fellow Israelites
  - with your kinsmen
  rationale: The Hebrew uses the masculine plural kinship term in a representative
    covenantal sense for fellow members of Israel. Following the doctrine's gender-accurate
    principle, the translation preserves 'brothers' rather than flattening it to a
    neutral collective in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
