id: JOS.22.28
reference: Joshua 22:28
source:
  edition: WLC
  text: וַ/נֹּ֕אמֶר וְ/הָיָ֗ה כִּֽי יֹאמְר֥וּ אֵלֵ֛י/נוּ וְ/אֶל דֹּרֹתֵ֖י/נוּ מָחָ֑ר וְ/אָמַ֡רְנוּ רְא֣וּ אֶת תַּבְנִית֩ מִזְבַּ֨ח יְהוָ֜ה אֲשֶׁר עָשׂ֣וּ אֲבוֹתֵ֗י/נוּ לֹ֤א לְ/עוֹלָה֙ וְ/לֹ֣א לְ/זֶ֔בַח כִּי עֵ֣ד ה֔וּא בֵּינֵ֖י/נוּ וּ/בֵינֵי/כֶֽם־־־־־׃
translation:
  text: 'So we said, ‘If they should say to us or to our generations in time to come, then we will say: “Look at the pattern of the altar of Yahweh, which our fathers made—not for burnt offering or for sacrifice, but as a witness between us and you.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copy,' 'model,' or 'representation' of the altar of the LORD.' The Hebrew term refers to a form or pattern, indicating this altar was a replica serving as testimony rather than the authorized sacrificial altar itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  chosen: So we said
  alternatives:
  - And we said
  - Therefore we said
  lexicon: HALOT
  rationale: The waw-consecutive with first person plural advances the narrative. 'So we said' gives natural English while preserving the explanatory force in context.
- source_word: וְהָיָה כִּי
  chosen: If ... should
  alternatives:
  - And it shall be, when
  - And if it happens that
  lexicon: HALOT
  rationale: This idiom introduces a future contingency. Rendering it as 'If ... should' is idiomatic English and preserves the conditional sense better than a wooden 'and it shall be, when.'
- source_word: יֹאמְרוּ אֵלֵינוּ וְאֶל דֹּרֹתֵינוּ מָחָר
  chosen: they should say to us or to our generations in time to come
  alternatives:
  - they say to us and to our descendants tomorrow
  - they say to us or to our descendants later
  lexicon: HALOT
  rationale: מָחָר here is idiomatic for the future, not literal 'tomorrow.' 'In time to come' captures the temporal sense. 'Generations' closely reflects דֹּרֹת while remaining readable.
- source_word: וְאָמַרְנוּ
  chosen: then we will say
  alternatives:
  - and we will say
  - we would say
  lexicon: HALOT
  rationale: Future response within the conditional scenario; 'then' clarifies the apodosis in English.
- source_word: רְאוּ
  chosen: Look at
  alternatives:
  - See
  - Behold
  lexicon: HALOT
  rationale: Imperative inviting attention. 'Look at' is natural modern English; 'behold' is too archaic for the stated philosophy.
- source_word: תַּבְנִית
  chosen: pattern
  alternatives:
  - copy
  - model
  - representation
  lexicon: HALOT
  rationale: The word denotes a form, pattern, or replica. In this context the altar in question is not the actual central altar for sacrifice but a constructed likeness serving as testimony; 'pattern' preserves that representative sense without overinterpreting.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. The divine name follows project policy as 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר עָשׂוּ אֲבוֹתֵינוּ
  chosen: which our fathers made
  alternatives:
  - which our ancestors made
  lexicon: HALOT
  rationale: אָבוֹתֵינוּ is literally 'our fathers.' Per gender-accurate policy, the masculine familial term is retained rather than neutralized to 'ancestors,' since the source specifically uses 'fathers.'
- source_word: לֹא לְעוֹלָה וְלֹא לְזֶבַח
  chosen: not for burnt offering and not for sacrifice
  alternatives:
  - not for a burnt offering or for sacrifice
  - not for whole burnt offering and not for slaughter offering
  lexicon: HALOT
  rationale: The repeated לֹא ... וְלֹא is preserved for emphasis. עֹלָה is specifically 'burnt offering'; זֶבַח is broader 'sacrifice.' Singular English works generically here.
- source_word: כִּי עֵד הוּא
  chosen: but it is a witness
  alternatives:
  - for it is a witness
  - rather, it is a witness
  - because it is a witness
  lexicon: HALOT
  rationale: Here כִּי explains the true purpose in contrast to sacrificial use. 'But it is a witness' brings out the contrast implied by the preceding negations in clear English.
- source_word: בֵּינֵינוּ וּבֵינֵיכֶם
  chosen: between us and you
  alternatives:
  - between us and you all
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the relational phrase; the plural addressees do not require an explicit 'you all' in standard English.
