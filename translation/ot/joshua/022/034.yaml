theological_decisions:
- issue: Whether to supply an explicit altar name beyond the extant Hebrew wording
  chosen_reading: Render only the attested name 'Witness' in the main text
  alternative_readings:
  - And they called the altar 'A Witness Between Us That the LORD Is God'
  - And they called the altar Ed
  rationale: The Masoretic text as given does not preserve a longer formal name, only
    the explanatory clause 'for it is a witness between us that the LORD is God.'
    Some translations smooth this into an expanded proper name, but that imports more
    than the Hebrew explicitly states. The draft therefore keeps the attested wording
    in the text and preserves the expanded-name possibility in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
