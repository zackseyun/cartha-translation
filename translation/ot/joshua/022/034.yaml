id: JOS.22.34
reference: Joshua 22:34
source:
  edition: WLC
  text: וַֽ/יִּקְרְא֛וּ בְּנֵי רְאוּבֵ֥ן וּ/בְנֵי גָ֖ד לַ/מִּזְבֵּ֑חַ כִּ֣י עֵ֥ד הוּא֙
    בֵּֽינֹתֵ֔י/נוּ כִּ֥י יְהוָ֖ה הָ/אֱלֹהִֽים־־׃פ
translation:
  text: And the sons of Reuben and the sons of Gad called the altar Witness, for it
    is a witness between us that the LORD is God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more expansively, 'they called the altar “A Witness Between Us That
      the LORD Is God,”' taking the explanatory clause as part of the name rather
      than as the reason for it.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with ל plus the object commonly means to call or name something.
    'Called' is natural English and leaves room for the naming sense in context.
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד
  chosen: the sons of Reuben and the sons of Gad
  alternatives:
  - the Reubenites and the Gadites
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew construction
    and keeps the narrative connection to the tribal descendants explicit.
- source_word: לַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ. Here it is the object being named.
- source_word: עֵד
  chosen: Witness
  alternatives:
  - A Witness
  - witness
  lexicon: HALOT
  rationale: Because the altar is being given a name, capitalization signals the naming
    function in English. The noun means 'witness/testimony'; 'Witness' is the most
    direct naming gloss.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for the name, so 'for' fits idiomatic
    English while preserving the explanatory force.
- source_word: הוּא
  chosen: it is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The pronoun refers to the altar, an inanimate object in English, so 'it'
    is required.
- source_word: בֵּינֹתֵינוּ
  chosen: between us
  alternatives:
  - among us
  lexicon: HALOT
  rationale: The prepositional expression denotes a relation between the parties represented
    by the tribes; 'between us' is the most natural equivalent.
- source_word: כִּי יְהוָה הָאֱלֹהִים
  chosen: that the LORD is God
  alternatives:
  - that the LORD is the God
  - for the LORD is God
  lexicon: HALOT
  rationale: The second כִּי is best taken as introducing the content borne witness
    to by the altar. 'The LORD' follows the project's default rendering for YHWH.
    'Is God' is idiomatic and conveys the confessional force without over-specifying
    the article.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' preserving established reverential convention and the LXX/English
    Bible pattern.
