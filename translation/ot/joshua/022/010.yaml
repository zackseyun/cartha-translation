id: JOS.22.10
reference: Joshua 22:10
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ אֶל גְּלִיל֣וֹת הַ/יַּרְדֵּ֔ן אֲשֶׁ֖ר בְּ/אֶ֣רֶץ כְּנָ֑עַן וַ/יִּבְנ֣וּ
    בְנֵי רְאוּבֵ֣ן וּ/בְנֵי גָ֡ד וַ/חֲצִ֣י שֵׁבֶט֩ הַֽ/מְנַשֶּׁ֨ה שָׁ֤ם מִזְבֵּ֨חַ֙
    עַל הַ/יַּרְדֵּ֔ן מִזְבֵּ֥חַ גָּד֖וֹל לְ/מַרְאֶֽה־־־־׃
translation:
  text: When they came to the region of the Jordan that is in the land of Canaan,
    the sons of Reuben and the sons of Gad and the half-tribe of Manasseh built there
    an altar by the Jordan—an altar great in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'districts' or 'borders' of the Jordan.
    reason: lexical_alternative
  - marker: b
    text: Or 'a large altar to look at'—that is, an altar conspicuous in appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּלִילוֹת
  chosen: region
  alternatives:
  - districts
  - circles
  - borders
  lexicon: HALOT
  rationale: The noun refers to a surrounding area or district. 'Region' is natural
    modern English and fits the geographical sense here better than the more literal
    but opaque 'circles' or the less certain 'borders.'
- source_word: וַיָּבֹאוּ אֶל
  chosen: When they came to
  alternatives:
  - And they came to
  - They arrived at
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'When they came to' smoothly
    connects this verse to the prior movement while preserving the temporal force
    in context.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנָעַן
  chosen: that is in the land of Canaan
  alternatives:
  - which is in the land of Canaan
  - in Canaan
  lexicon: HALOT
  rationale: This relative clause specifies which Jordan-region is meant. The fuller
    rendering preserves the Hebrew's explicit geographical clarification.
- source_word: בְנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - the Reubenites
  lexicon: HALOT
  rationale: A more formal rendering preserves the familial/tribal idiom of the Hebrew.
    'Reubenites' is possible but less transparent to the source wording.
- source_word: בְנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the Gadites
  lexicon: HALOT
  rationale: For consistency with 'the sons of Reuben' and the Hebrew construction,
    the filial tribal expression is retained.
- source_word: חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the standard and clear English equivalent for the Hebrew construct
    phrase.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: The standard gloss for the sacrificial/cultic structure is 'altar.'
- source_word: עַל הַיַּרְדֵּן
  chosen: by the Jordan
  alternatives:
  - on the Jordan
  - beside the Jordan
  - at the Jordan
  lexicon: HALOT
  rationale: Here עַל in a geographical setting is best rendered idiomatically as
    proximity rather than literal contact. 'By the Jordan' is natural English and
    fits the context.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: '''Great'' preserves the Hebrew adjective and leaves open both size and
    impressiveness, which suits the following qualifier.'
- source_word: לְמַרְאֶה
  chosen: in appearance
  alternatives:
  - to look at
  - for seeing
  - as seen
  lexicon: HALOT
  rationale: The phrase מִזְבֵּחַ גָּדוֹל לְמַרְאֶה describes how the altar appeared—visibly
    impressive. 'In appearance' is concise and idiomatic.
