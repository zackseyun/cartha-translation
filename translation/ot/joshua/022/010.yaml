theological_decisions:
- issue: Potential implication of a rival cultic altar
  chosen_reading: 'Render descriptively without importing judgment: ''built there
    an altar by the Jordan—an altar great in appearance.'''
  alternative_readings:
  - built an imposing altar
  - built a great altar there by the Jordan
  rationale: The verse itself reports the construction and its notable appearance,
    but does not yet state whether the altar was for sacrifice in competition with
    the central sanctuary. The translation therefore preserves the narrative tension
    and avoids adding interpretive language such as 'imposing' that could prejudge
    motive.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
