theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֶבֶד for Moses
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although עֶבֶד can denote slave/servant, here it functions as an established
    honorific title ('servant of the LORD') for Moses. The bonded-status nuance is
    not foregrounded, so 'servant' best reflects the contextual sense while remaining
    consistent with the project's context-dependent policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent);
    applied analogically to Hebrew עֶבֶד by context'
