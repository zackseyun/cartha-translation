id: JOS.22.2
reference: Joshua 22:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֔ם אַתֶּ֣ם שְׁמַרְתֶּ֔ם אֵ֚ת כָּל אֲשֶׁ֣ר צִוָּ֣ה אֶתְ/כֶ֔ם
    מֹשֶׁ֖ה עֶ֣בֶד יְהוָ֑ה וַ/תִּשְׁמְע֣וּ בְ/קוֹלִ֔/י לְ/כֹ֥ל אֲשֶׁר צִוִּ֖יתִי אֶתְ/כֶֽם־־׃
translation:
  text: And he said to them, “You have kept all that Moses the servant of the LORD
    commanded you, and you have listened to my voice in all that I commanded you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you obeyed my voice in everything that I commanded you.' The Hebrew
      idiom 'listen to my voice' often carries the sense of obedient response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  - So he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he said' is a natural,
    sufficiently formal rendering in English narrative.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix indicating the addressees.
- source_word: שְׁמַרְתֶּם
  chosen: you have kept
  alternatives:
  - you have observed
  - you have guarded
  lexicon: HALOT
  rationale: שׁמר in covenantal/command contexts commonly means to keep or observe
    commands. 'Kept' is idiomatic and preserves the obedience sense without overformalizing.
- source_word: כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  lexicon: HALOT
  rationale: This compact English rendering matches the comprehensive force of the
    Hebrew construction.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  lexicon: HALOT
  rationale: צוה is the standard verb for giving commands. 'Commanded' preserves the
    authoritative force better than 'ordered' in this biblical context.
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  chosen: Moses the servant of the LORD
  alternatives:
  - Moses, the servant of the LORD
  lexicon: HALOT
  rationale: עֶבֶד here is an honorific title for Moses in relation to YHWH. 'Servant'
    fits the context better than 'slave,' since bonded status is not the salient nuance
    here but commissioned service is.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וַתִּשְׁמְעוּ
  chosen: and you have listened
  alternatives:
  - and you obeyed
  - and you heard
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding/obeying a voice.
    'Listened to' preserves the auditory metaphor of the Hebrew while still implying
    responsive obedience in context.
- source_word: בְּקוֹלִי
  chosen: to my voice
  alternatives:
  - to me
  - to what I said
  lexicon: HALOT
  rationale: Literally 'in/to my voice.' 'To my voice' is a natural English equivalent
    that preserves the Hebrew idiom better than flattening it to simply 'me.'
- source_word: לְכֹל אֲשֶׁר
  chosen: in all that
  alternatives:
  - in everything that
  - according to all that
  lexicon: HALOT
  rationale: This rendering captures the comprehensive scope of Joshua's commands
    and reads smoothly with the preceding clause.
- source_word: צִוִּיתִי
  chosen: I commanded
  alternatives:
  - I ordered
  lexicon: HALOT
  rationale: Same lexical field as earlier צוה; consistency is maintained.
