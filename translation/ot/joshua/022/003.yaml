id: JOS.22.3
reference: Joshua 22:3
source:
  edition: WLC
  text: לֹֽא עֲזַבְתֶּ֣ם אֶת אֲחֵי/כֶ֗ם זֶ֚ה יָמִ֣ים רַבִּ֔ים עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה
    וּ/שְׁמַרְתֶּ֕ם אֶת מִשְׁמֶ֕רֶת מִצְוַ֖ת יְהוָ֥ה אֱלֹהֵי/כֶֽם־־־׃
translation:
  text: You have not forsaken your brothers these many days, up to this day, and you
    have kept the charge of the commandment of the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellow Israelites'; the Hebrew says 'your brothers,' a masculine
      plural kinship term that can refer broadly to members of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזַבְתֶּם
  chosen: have not forsaken
  alternatives:
  - have not abandoned
  - have not left
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave, forsake, or abandon. 'Forsaken'
    best preserves the covenantal and relational weight in Joshua's commendation,
    while fitting natural English with the perfect sense carried by the Hebrew form
    in context.
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your fellow Israelites
  - your kindred
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural 'brothers,' but in Israelite
    usage can refer to fellow members of the covenant people. Per the gender-accurate
    policy, the main text keeps 'brothers' rather than neutralizing it; a more inclusive
    sense is preserved in a footnote.
- source_word: זֶה יָמִים רַבִּים
  chosen: these many days
  alternatives:
  - for many days
  - all this long time
  lexicon: HALOT
  rationale: This idiom literally points to 'this/many days' and refers to an extended
    duration. 'These many days' preserves the Hebrew flavor while remaining understandable
    in modern English.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: up to this day
  alternatives:
  - until this day
  - to this very day
  lexicon: HALOT
  rationale: A standard temporal expression marking continuity from the past into
    the present moment. 'Up to this day' is clear and slightly more natural here than
    the more traditional 'unto this day.'
- source_word: וּשְׁמַרְתֶּם
  chosen: and you have kept
  alternatives:
  - and you have observed
  - and you have guarded
  lexicon: HALOT
  rationale: שׁמר often means keep, observe, or guard. Here it governs a duty/charge
    and refers to faithful observance. 'Kept' is concise and idiomatic in English.
- source_word: מִשְׁמֶרֶת
  chosen: the charge
  alternatives:
  - the duty
  - the obligation
  - the commission
  lexicon: HALOT
  rationale: 'מִשְׁמֶרֶת denotes something entrusted to one''s keeping: a charge,
    obligation, or duty. ''Charge'' best captures the sense of a responsibility assigned
    and faithfully maintained.'
- source_word: מִצְוַת
  chosen: of the commandment
  alternatives:
  - of the command
  - commanded by
  lexicon: HALOT
  rationale: The construct chain מִשְׁמֶרֶת מִצְוַת is somewhat formal. 'The charge
    of the commandment' preserves the Hebrew structure and emphasizes that the duty
    derives from the LORD's command.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in the main text, following established reverential convention and the pattern
    reflected in many English translations.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward covenantal designation in construct with the divine
    name: ''the LORD your God.'''
