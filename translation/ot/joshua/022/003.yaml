theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This preserves reverential convention without making a claim about
    vocalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenantal kinship term אֲחֵיכֶם
  chosen_reading: your brothers
  alternative_readings:
  - your brothers and sisters
  - your fellow Israelites
  rationale: The source is masculine plural and likely refers to fellow Israelites
    broadly, but the translation policy prefers gender-accurate renderings over neutralization
    unless context requires otherwise. The broader referential sense is preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
