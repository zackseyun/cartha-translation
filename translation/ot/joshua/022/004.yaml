id: JOS.22.4
reference: Joshua 22:4
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הֵנִ֨יחַ יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ לַֽ/אֲחֵי/כֶ֔ם כַּ/אֲשֶׁ֖ר דִּבֶּ֣ר
    לָ/הֶ֑ם וְ/עַתָּ֡ה פְּנוּ֩ וּ/לְכ֨וּ לָ/כֶ֜ם לְ/אָהֳלֵי/כֶ֗ם אֶל אֶ֨רֶץ֙ אֲחֻזַּתְ/כֶ֔ם
    אֲשֶׁ֣ר נָתַ֣ן לָ/כֶ֗ם מֹשֶׁה֙ עֶ֣בֶד יְהוָ֔ה בְּ/עֵ֖בֶר הַ/יַּרְדֵּֽן־׀׃
translation:
  text: And now the LORD your God has given rest to your brothers, just as he spoke
    to them. So now turn and go to your tents, to the land of your possession, which
    Moses the servant of the LORD gave you beyond the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'just as he promised them.' The Hebrew says literally, 'just as he spoke
      to them.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' refers to their fellow Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to your homes.' Literally, 'to your tents.'
    reason: lexical_alternative
  - marker: d
    text: Or 'across the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵנִיחַ
  chosen: has given rest
  alternatives:
  - has caused to rest
  - has granted rest
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to give rest or relief from conflict. 'Has
    given rest' is idiomatic modern English and fits the conquest context without
    over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH and singular sense, אֱלֹהִים clearly refers to Israel's God;
    'your God' is the natural possessive rendering.
- source_word: לַאֲחֵיכֶם
  chosen: to your brothers
  alternatives:
  - to your brothers and sisters
  - to your kinsmen
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and in this military-tribal
    context refers to fellow Israelites. 'Brothers' preserves the source form and
    covenant solidarity; a more inclusive expansion would go beyond the wording.
- source_word: כַּאֲשֶׁר דִּבֶּר לָהֶם
  chosen: just as he spoke to them
  alternatives:
  - just as he promised them
  - as he said to them
  lexicon: HALOT
  rationale: דבר is literally 'spoke/said.' Since the object is a divine assurance,
    'promised' is interpretive; 'spoke to them' preserves the wording while still
    making sense in English.
- source_word: פְּנוּ
  chosen: turn
  alternatives:
  - return
  - turn back
  lexicon: HALOT
  rationale: The imperative literally means 'turn.' In sequence with 'go,' it conveys
    departure from the present place. 'Turn' keeps the Hebrew image without redundancy.
- source_word: וּלְכוּ לָכֶם
  chosen: and go
  alternatives:
  - and go for yourselves
  - and depart
  lexicon: HALOT
  rationale: הלך with the ethical dative לָכֶם is naturally rendered simply 'go' in
    English; 'for yourselves' would sound awkward and adds little.
- source_word: לְאָהֳלֵיכֶם
  chosen: to your tents
  alternatives:
  - to your homes
  - to your dwellings
  lexicon: HALOT
  rationale: Although it can function idiomatically for home, the Hebrew literally
    says 'tents.' Retaining 'tents' preserves the historical setting and common biblical
    idiom.
- source_word: אֶל אֶרֶץ אֲחֻזַּתְכֶם
  chosen: to the land of your possession
  alternatives:
  - to your own landholding
  - to the land of your inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or holding of land. 'Land of your possession'
    is slightly formal but transparent and avoids importing the more theologically
    loaded 'inheritance' unless context requires it.
- source_word: אֲשֶׁר נָתַן לָכֶם מֹשֶׁה
  chosen: which Moses ... gave you
  alternatives:
  - which Moses ... assigned to you
  lexicon: HALOT
  rationale: נתן is the ordinary verb 'gave.' 'Assigned' is possible in land-distribution
    contexts, but 'gave' stays closer to the Hebrew.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: While עבד can denote slave or servant, in honorific covenantal titles
    for Moses the bonded-status nuance is not foregrounded. 'Servant of the LORD'
    is the most contextually fitting rendering.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: The phrase denotes the Transjordan side relative to the speaker's location.
    'Beyond the Jordan' is concise and conventional, while still accurate.
