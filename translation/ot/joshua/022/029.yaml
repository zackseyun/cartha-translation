id: JOS.22.29
reference: Joshua 22:29
source:
  edition: WLC
  text: חָלִילָ/ה֩ לָּ֨/נוּ מִמֶּ֜/נּוּ לִ/מְרֹ֣ד בַּֽ/יהוָ֗ה וְ/לָ/שׁ֤וּב הַ/יּוֹם֙
    מֵ/אַחֲרֵ֣י יְהוָ֔ה לִ/בְנ֣וֹת מִזְבֵּ֔חַ לְ/עֹלָ֖ה לְ/מִנְחָ֣ה וּ/לְ/זָ֑בַח מִ/לְּ/בַ֗ד
    מִזְבַּח֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ אֲשֶׁ֖ר לִ/פְנֵ֥י מִשְׁכָּנֽ/וֹ׃פ
translation:
  text: Far be it from us that we should rebel against the LORD and turn away today
    from following the LORD by building an altar for burnt offering, grain offering,
    or sacrifice, besides the altar of the LORD our God that is before his tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back today from following the LORD.' The Hebrew idiom literally
      speaks of turning from after the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לָּנוּ מִמֶּנּוּ
  chosen: Far be it from us
  alternatives:
  - May it be far from us
  - Profane/forbidden for us
  lexicon: HALOT
  rationale: Idiomatic expression of strong repudiation or abhorrence. 'Far be it
    from us' is natural modern English and preserves the force better than a wooden
    rendering.
- source_word: לִמְרֹד
  chosen: that we should rebel
  alternatives:
  - to rebel
  lexicon: HALOT
  rationale: Infinitive with preceding idiom expresses the rejected action. 'Rebel'
    captures covenantal defiance against God.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - in the LORD
  lexicon: HALOT
  rationale: 'With מרד, the preposition is adversative in sense: rebellion against
    the LORD, not merely ''in'' him. YHWH is rendered ''the LORD'' per doctrine.'
- source_word: וְלָשׁוּב הַיּוֹם מֵאַחֲרֵי יְהוָה
  chosen: and turn away today from following the LORD
  alternatives:
  - and turn back today from after the LORD
  - and turn away today from the LORD
  lexicon: HALOT
  rationale: שׁוּב with מֵאַחֲרֵי conveys turning away from following. Including 'following'
    makes the relational/covenantal sense clear without over-paraphrase.
- source_word: לִבְנוֹת מִזְבֵּחַ
  chosen: by building an altar
  alternatives:
  - to build an altar
  lexicon: HALOT
  rationale: This infinitive explains the manner in which such rebellion would occur.
    'By building' fits the English syntax after 'turn away' and preserves the causal/instrumental
    sense.
- source_word: לְעֹלָה
  chosen: for burnt offering
  alternatives:
  - for a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the technical sacrificial term 'burnt offering.' The anarthrous
    English construction reads naturally in a list.
- source_word: לְמִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts is best rendered 'grain offering,' avoiding
    the overly vague 'offering.'
- source_word: וּלְזָבַח
  chosen: or sacrifice
  alternatives:
  - or slaughter offering
  - or peace offering
  lexicon: HALOT
  rationale: זֶבַח is a general sacrificial term here. 'Sacrifice' is broad enough
    to match the Hebrew without specifying a subtype not explicit in the text.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - except for
  lexicon: HALOT
  rationale: Marks exclusion/contrast with the legitimate altar. 'Besides' is concise
    and idiomatic.
- source_word: מִזְבַּח יְהוָה אֱלֹהֵינוּ
  chosen: the altar of the LORD our God
  alternatives:
  - the LORD's altar, our God's altar
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. Retains covenantal confession
    'the LORD our God.'
- source_word: אֲשֶׁר לִפְנֵי מִשְׁכָּנוֹ
  chosen: that is before his tabernacle
  alternatives:
  - which is before his dwelling place
  - which is before the tabernacle
  lexicon: HALOT
  rationale: מִשְׁכָּן is the tabernacle/dwelling place. 'His tabernacle' reflects
    the 3ms suffix and the sanctuary context. 'Before' preserves the spatial relation
    of the authorized altar to the sanctuary.
