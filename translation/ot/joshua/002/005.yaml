id: JOS.2.5
reference: Joshua 2:5
source:
  edition: WLC
  text: וַ/יְהִ֨י הַ/שַּׁ֜עַר לִ/סְגּ֗וֹר בַּ/חֹ֨שֶׁךְ֙ וְ/הָ/אֲנָשִׁ֣ים יָצָ֔אוּ
    לֹ֣א יָדַ֔עְתִּי אָ֥נָה הָלְכ֖וּ הָֽ/אֲנָשִׁ֑ים רִדְפ֥וּ מַהֵ֛ר אַחֲרֵי/הֶ֖ם כִּ֥י
    תַשִּׂיגֽוּ/ם׃
translation:
  text: And when the gate was about to be shut at dark, the men went out. I do not
    know where the men went. Pursue them quickly, for you will overtake them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when it was dark'; the Hebrew phrase marks the time of the gate's closing
      at the onset of darkness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In modern English, 'And when' naturally carries the temporal setup without archaic
    formulae like 'it came to pass.'
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  lexicon: HALOT
  rationale: The noun means 'gate'; in context it is the city gate of Jericho, but
    'the gate' is sufficient and closer to the Hebrew wording.
- source_word: לִסְגֹּר
  chosen: was about to be shut
  alternatives:
  - was to be shut
  - was being shut
  - to be closed
  lexicon: HALOT
  rationale: The infinitive construct with ל after 'and it happened' marks impending
    action. 'Was about to be shut' best captures the sense that the gate was at the
    point of closing.
- source_word: בַּחֹשֶׁךְ
  chosen: at dark
  alternatives:
  - in the dark
  - at dusk
  - when it was dark
  lexicon: HALOT
  rationale: The phrase indicates the onset of darkness as the time of closing. 'At
    dark' is concise, idiomatic, and fits the temporal force better than a purely
    locative 'in the dark.'
- source_word: וְהָאֲנָשִׁים יָצָאוּ
  chosen: the men went out
  alternatives:
  - the men left
  - the men departed
  lexicon: HALOT
  rationale: יצא is the ordinary verb 'go out.' 'Went out' preserves the concrete
    movement and aligns with the narrative setting.
- source_word: לֹא יָדַעְתִּי
  chosen: I do not know
  alternatives:
  - I did not know
  lexicon: HALOT
  rationale: 'Although formally perfect, in direct speech it functions naturally as
    a present state in English: Rahab claims present ignorance. This is standard optimal-equivalence
    handling of Hebrew perfect in dialogue.'
- source_word: אָ֥נָה הָלְכוּ
  chosen: where ... went
  alternatives:
  - where ... had gone
  - whither ... went
  lexicon: HALOT
  rationale: אָנה asks destination, 'where/to where.' 'Where ... went' is natural
    modern English; 'whither' is archaic.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - those men
  lexicon: HALOT
  rationale: The repeated noun is retained in English for transparency to the Hebrew
    and to preserve Rahab's reference to the spies without interpretive expansion.
- source_word: רִדְפוּ
  chosen: Pursue
  alternatives:
  - Chase
  - Go after
  lexicon: HALOT
  rationale: The imperative calls for active pursuit. 'Pursue' is slightly more formal
    and fits military/search context better than 'chase.'
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - hurry
  - at once
  lexicon: HALOT
  rationale: The adverb modifies the imperative. 'Quickly' preserves the manner sense
    without adding urgency beyond the Hebrew.
- source_word: אַחֲרֵיהֶם
  chosen: them
  alternatives:
  - after them
  lexicon: HALOT
  rationale: English 'pursue' already includes the sense of following after, so rendering
    the preposition separately would be redundant. The object pronoun preserves the
    meaning in idiomatic English.
- source_word: כִּי תַשִּׂיגֻם
  chosen: for you will overtake them
  alternatives:
  - for you can catch up with them
  - for you will catch them
  lexicon: HALOT
  rationale: כי gives the reason for the command, and נשׂג in Hiphil means to overtake/reach.
    'Overtake' is the most direct equivalent and preserves the pursuit imagery.
