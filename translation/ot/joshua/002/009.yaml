id: JOS.2.9
reference: Joshua 2:9
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל הָ֣/אֲנָשִׁ֔ים יָדַ֕עְתִּי כִּֽי נָתַ֧ן יְהוָ֛ה לָ/כֶ֖ם אֶת
    הָ/אָ֑רֶץ וְ/כִֽי נָפְלָ֤ה אֵֽימַתְ/כֶם֙ עָלֵ֔י/נוּ וְ/כִ֥י נָמֹ֛גוּ כָּל יֹשְׁבֵ֥י
    הָ/אָ֖רֶץ מִ/פְּנֵי/כֶֽם־־־־־׃
translation:
  text: And she said to the men, “I know that the LORD has given you the land, and
    that the fear of you has fallen upon us, and that all the inhabitants of the land
    have melted away before you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the terror of you has fallen upon us.”
    reason: lexical_alternative
  - marker: b
    text: Or “all the inhabitants of the land have lost heart because of you.” The
      Hebrew verb is literally “have melted.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר אֶל הָאֲנָשִׁים
  chosen: And she said to the men
  alternatives:
  - Then she said to the men
  - She said to the men
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative; 'And she said' preserves
    Hebrew narrative flow without overinterpreting sequence. 'The men' reflects the
    definite article and the immediate referent, the spies.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: The perfect here expresses Rahab's settled knowledge in present relevance.
    English present 'I know' best communicates the stative force in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces content clauses after 'I know' and coordinates subsequent
    assertions; 'that' is the most natural English equivalent.
- source_word: נָתַן יְהוָה לָכֶם אֶת הָאָרֶץ
  chosen: the LORD has given you the land
  alternatives:
  - the LORD gave you the land
  - the LORD is giving you the land
  lexicon: HALOT
  rationale: The perfect verb presents the gift as effectively accomplished from Rahab's
    perspective, though conquest is ongoing. English present perfect captures that
    completed-with-present-effect sense. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project's default rendering for the divine name is 'the LORD,' following
    the doctrinal guideline on contested terms.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Joshua this commonly refers to the promised land/territory. 'The land'
    preserves the covenantal-geographical sense without unnecessary specificity.
- source_word: נָפְלָה אֵימַתְכֶם עָלֵינוּ
  chosen: the fear of you has fallen upon us
  alternatives:
  - terror of you has fallen on us
  - dread of you has come upon us
  lexicon: HALOT
  rationale: אֵימָה denotes dread/terror. 'Fear' is slightly broader and idiomatic
    in English, while the phrase 'has fallen upon us' closely reflects נָפְלָה ...
    עָלֵינוּ.
- source_word: אֵימַתְכֶם
  chosen: the fear of you
  alternatives:
  - your fear
  - terror of you
  - dread of you
  lexicon: HALOT
  rationale: The construct with 2mp suffix is most literally 'the fear of you.' This
    avoids the possible ambiguity of 'your fear' in English, which could mean fear
    felt by Israel rather than fear caused by them.
- source_word: נָמֹגוּ
  chosen: have melted away
  alternatives:
  - have melted
  - have lost heart
  - have become faint
  lexicon: HALOT
  rationale: The verb literally conveys melting/dissolving and metaphorically loss
    of courage. 'Have melted away' preserves the vivid metaphor while remaining natural
    English.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  chosen: all the inhabitants of the land
  alternatives:
  - all who dwell in the land
  - all the residents of the land
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial substantive, 'those dwelling/inhabiting.' 'Inhabitants'
    is concise and idiomatic.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - because of you
  - from before you
  - at your presence
  lexicon: HALOT
  rationale: The idiom can denote causation or presence. 'Before you' preserves the
    Hebrew expression and fits the context of dread at Israel's approach.
