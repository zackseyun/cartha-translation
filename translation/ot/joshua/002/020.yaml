id: JOS.2.20
reference: Joshua 2:20
source:
  edition: WLC
  text: וְ/אִם תַּגִּ֖ידִי אֶת דְּבָרֵ֣/נוּ זֶ֑ה וְ/הָיִ֣ינוּ נְקִיִּ֔ם מִ/שְּׁבֻעָתֵ֖/ךְ
    אֲשֶׁ֥ר הִשְׁבַּעְתָּֽ/נוּ־־׃
translation:
  text: But if you tell this matter of ours, then we will be free from your oath that
    you made us swear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this business of ours' or 'this affair of ours.' The Hebrew word can
      refer broadly to a matter, affair, or spoken word; here it points to the spies'
      secret mission.
    reason: lexical_alternative
  - marker: b
    text: Or 'we will be innocent/guiltless from your oath.' The Hebrew idiom means
      they would no longer be bound by the oath if she disclosed their secret.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a contrastive condition
    in the spies' speech. 'But if' fits the discourse flow in English, signaling the
    exception to the prior promise.
- source_word: תַּגִּידִי
  chosen: you tell
  alternatives:
  - you report
  - you make known
  - you disclose
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare, tell, make known.' 'Tell' is natural
    modern English and suits the direct warning to Rahab.
- source_word: אֶת דְּבָרֵנוּ זֶה
  chosen: this matter of ours
  alternatives:
  - this business of ours
  - this word of ours
  - this affair of ours
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'affair' depending on context. Here
    it refers to the spies' mission/secret, not merely spoken words. 'This matter
    of ours' preserves the demonstrative and possessive while sounding natural.
- source_word: וְהָיִינוּ נְקִיִּם
  chosen: then we will be free
  alternatives:
  - then we will be innocent
  - then we will be clear
  - then we will be guiltless
  lexicon: HALOT
  rationale: The idiom היה + נקי expresses being exempt or free from obligation/liability.
    'Free' communicates release from the oath's binding force in clear English.
- source_word: מִשְּׁבֻעָתֵךְ
  chosen: from your oath
  alternatives:
  - from the oath to you
  - from your sworn obligation
  lexicon: HALOT
  rationale: The preposition מן with 'oath' marks separation/release. The 2fs suffix
    indicates the oath is hers in the sense that she exacted or holds them to it.
    'From your oath' is the most direct rendering.
- source_word: אֲשֶׁר הִשְׁבַּעְתָּנוּ
  chosen: that you made us swear
  alternatives:
  - that you bound us by oath to
  - that you caused us to swear
  lexicon: HALOT
  rationale: 'The Hiphil of שׁבע is causative: Rahab caused the spies to swear. ''Made
    us swear'' is idiomatic and accurately reflects the causative force.'
