theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of Rahab's confession
  chosen_reading: he is God in the heavens above and on the earth below
  alternative_readings:
  - he is the true God in heaven above and on earth beneath
  - he alone is God in heaven above and on earth beneath
  rationale: The Hebrew plainly affirms the LORD's universal deity and sovereignty through a heaven-earth merism. The translation preserves that claim without importing additional exclusivity markers such as 'alone' unless explicitly present.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1 and §3
