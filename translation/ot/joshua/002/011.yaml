id: JOS.2.11
reference: Joshua 2:11
source:
  edition: WLC
  text: וַ/נִּשְׁמַע֙ וַ/יִּמַּ֣ס לְבָבֵ֔/נוּ וְ/לֹא קָ֨מָה ע֥וֹד ר֛וּחַ בְּ/אִ֖ישׁ
    מִ/פְּנֵי/כֶ֑ם כִּ֚י יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם ה֤וּא אֱלֹהִים֙ בַּ/שָּׁמַ֣יִם מִ/מַּ֔עַל
    וְ/עַל הָ/אָ֖רֶץ מִ/תָּֽחַת־־׃
translation:
  text: When we heard it, our hearts melted, and no spirit remained in any man because
    of you, for the LORD your God, he is God in the heavens above and on the earth
    below.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no longer courage in anyone.' The Hebrew says literally, 'no
      spirit remained in any man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: cultural_note
lexical_decisions:
- source_word: וַנִּשְׁמַע
  chosen: When we heard it
  alternatives:
  - And we heard
  - When we heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but in English 'When we heard
    it' best captures the temporal force in context, introducing the reaction that
    follows. 'It' is supplied naturally from the preceding report.
- source_word: וַיִּמַּס לְבָבֵנוּ
  chosen: our hearts melted
  alternatives:
  - our heart melted
  - we lost heart
  lexicon: HALOT
  rationale: The idiom literally speaks of the heart melting, expressing fear and
    loss of courage. 'Our hearts melted' preserves the Hebrew image while remaining
    natural English.
- source_word: וְלֹא קָמָה עוֹד רוּחַ בְּאִישׁ
  chosen: no spirit remained in any man
  alternatives:
  - there was no longer courage in anyone
  - no breath rose again in any man
  lexicon: HALOT
  rationale: רוּחַ here refers to inner courage or spirit, not the Holy Spirit or
    mere wind. 'No spirit remained' keeps the metaphorical force, while 'in any man'
    reflects בְּאִישׁ with gender-accurate representative force.
- source_word: מִפְּנֵיכֶם
  chosen: because of you
  alternatives:
  - before you
  - on account of you
  lexicon: HALOT
  rationale: Literally 'from before your face/presence,' but in this context it denotes
    the cause of the Canaanites' fear. 'Because of you' communicates the sense clearly
    in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the fear just described. 'For' fits the explanatory
    clause in elevated but readable English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: With reference to Israel's deity and in apposition to the divine name,
    the phrase is properly rendered 'your God.' Capitalization follows English convention
    for the true God.
- source_word: הוּא אֱלֹהִים
  chosen: he is God
  alternatives:
  - he is the true God
  - he is God alone
  lexicon: HALOT
  rationale: The Hebrew asserts identity and supremacy without adding exclusivist
    wording not explicit in the clause. 'He is God' is the most direct rendering.
- source_word: בַּשָּׁמַיִם מִמַּעַל
  chosen: in the heavens above
  alternatives:
  - in heaven above
  - in the skies above
  lexicon: HALOT
  rationale: The plural שָׁמַיִם is commonly rendered 'heavens.' 'Above' reflects
    מִמַּעַל and preserves the merism with the following phrase.
- source_word: וְעַל הָאָרֶץ מִתָּחַת
  chosen: and on the earth below
  alternatives:
  - and on the land beneath
  - and upon the earth underneath
  lexicon: HALOT
  rationale: This completes the heaven-earth merism expressing universal sovereignty.
    'Earth below' is idiomatic and preserves the vertical contrast.
