id: JOS.2.6
reference: Joshua 2:6
source:
  edition: WLC
  text: וְ/הִ֖יא הֶעֱלָ֣תַ/ם הַ/גָּ֑גָ/ה וַֽ/תִּטְמְנֵ/ם֙ בְּ/פִשְׁתֵּ֣י הָ/עֵ֔ץ הָ/עֲרֻכ֥וֹת
    לָ֖/הּ עַל הַ/גָּֽג־׃
translation:
  text: But she had brought them up to the roof and hidden them among the stalks of
    flax laid out for her on the roof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the flax stalks'; the Hebrew phrase literally includes 'flax'
      and 'wood/stalk,' likely referring to flax laid out in stalks for drying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִיא
  chosen: But she
  alternatives:
  - And she
  - Now she
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrast with the pursuers'
    assumption in the previous verse; 'But she' brings out the adversative force naturally
    in English while retaining the explicit subject.
- source_word: הֶעֱלָתַם
  chosen: had brought them up
  alternatives:
  - brought them up
  - caused them to go up
  lexicon: HALOT
  rationale: Hiphil of עלה with 3mp suffix means 'bring up' or 'take up.' English
    pluperfect fits the narrative sequence because this action had already occurred
    before the king's messengers arrived.
- source_word: הַגָּגָה
  chosen: to the roof
  alternatives:
  - to the rooftop
  lexicon: HALOT
  rationale: Directional he indicates motion toward the roof. 'Roof' is the most direct
    rendering; English idiom supplies 'to.'
- source_word: וַתִּטְמְנֵם
  chosen: and hidden them
  alternatives:
  - and concealed them
  - and hid them
  lexicon: HALOT
  rationale: The verb טמן means to hide or conceal. Because the clause is dependent
    on the prior pluperfect in English narrative flow, 'had ... hidden' is implied;
    'hidden them' keeps the sequence smooth. 'Concealed' is possible but slightly
    less natural.
- source_word: בְּפִשְׁתֵּי הָעֵץ
  chosen: among the stalks of flax
  alternatives:
  - in the flax stalks
  - among the flax laid in stalks
  lexicon: HALOT
  rationale: פִשְׁתֵּי refers to flax fibers/plants, and הָעֵץ here likely denotes
    woody stalks rather than 'tree/wood' in a generic sense. 'Among the stalks of
    flax' communicates the agricultural referent clearly.
- source_word: הָעֲרֻכוֹת
  chosen: laid out
  alternatives:
  - arranged
  - spread out
  - stacked
  lexicon: HALOT
  rationale: Passive participle from ערך, 'arranged/set in order.' In context of flax
    drying on a roof, 'laid out' is the most natural and specific English expression.
- source_word: לָהּ
  chosen: for her
  alternatives:
  - belonging to her
  - by her
  lexicon: HALOT
  rationale: The preposition with suffix can indicate possession or advantage. 'For
    her' preserves the dative nuance without overinterpreting; it may imply the flax
    was laid out for her use or by her arrangement.
- source_word: עַל הַגָּג
  chosen: on the roof
  alternatives:
  - upon the roof
  - on the rooftop
  lexicon: HALOT
  rationale: Simple locative phrase. Repeating 'on the roof' reflects the Hebrew and
    clarifies where the flax was laid out.
