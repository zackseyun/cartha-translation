id: JOS.2.22
reference: Joshua 2:22
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֙ וַ/יָּבֹ֣אוּ הָ/הָ֔רָ/ה וַ/יֵּ֤שְׁבוּ שָׁם֙ שְׁלֹ֣שֶׁת יָמִ֔ים
    עַד שָׁ֖בוּ הָ/רֹדְפִ֑ים וַ/יְבַקְשׁ֧וּ הָ/רֹדְפִ֛ים בְּ/כָל הַ/דֶּ֖רֶךְ וְ/לֹ֥א
    מָצָֽאוּ־־׃
translation:
  text: So they went and came to the hill country, and stayed there three days, until
    the pursuers returned. The pursuers searched all along the road, but did not find
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the mountain" or "into the hills." The Hebrew likely refers to the
      hill country west of Jericho rather than a single peak.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: they went
  alternatives:
  - they departed
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך, best rendered with simple past in English.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: With the directional phrase following, 'came' preserves the sequential
    movement idiom ('went and came') without over-specifying.
- source_word: הָהָרָה
  chosen: to the hill country
  alternatives:
  - to the mountain
  - into the hills
  lexicon: HALOT
  rationale: The he locale indicates motion toward the hill region. In context of
    hiding from pursuers near Jericho, 'hill country' communicates the terrain better
    than the singular 'mountain' while remaining faithful to Hebrew usage.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: stayed there
  alternatives:
  - remained there
  - dwelt there
  lexicon: HALOT
  rationale: ישב here denotes temporary remaining, not permanent settlement; 'stayed'
    is natural modern English.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: three days
  lexicon: HALOT
  rationale: Straightforward cardinal-plus-noun expression.
- source_word: עַד שָׁבוּ הָרֹדְפִים
  chosen: until the pursuers returned
  alternatives:
  - until those pursuing them returned
  - until the pursuers came back
  lexicon: HALOT
  rationale: שוב means 'return'; the participle רדפים functions substantivally as
    'the pursuers.'
- source_word: וַיְבַקְשׁוּ
  chosen: searched
  alternatives:
  - looked
  - sought
  lexicon: HALOT
  rationale: בקש in this pursuit context is more naturally 'searched' than the more
    abstract 'sought.'
- source_word: בְּכָל הַדֶּרֶךְ
  chosen: all along the road
  alternatives:
  - on all the road
  - throughout the way
  lexicon: HALOT
  rationale: This phrase indicates the route/path taken in the search. 'All along
    the road' is idiomatic and preserves the distributive force of כל.
- source_word: וְלֹא מָצָאוּ
  chosen: but did not find them
  alternatives:
  - and did not find them
  - but found nothing
  lexicon: HALOT
  rationale: The object 'them' is implicit from context and required in natural English.
    'But' captures the adversative sense in context, though Hebrew has simple waw.
