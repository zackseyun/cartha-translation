id: JOS.2.18
reference: Joshua 2:18
source:
  edition: WLC
  text: הִנֵּ֛ה אֲנַ֥חְנוּ בָאִ֖ים בָּ/אָ֑רֶץ אֶת תִּקְוַ֡ת חוּט֩ הַ/שָּׁנִ֨י הַ/זֶּ֜ה
    תִּקְשְׁרִ֗י בַּֽ/חַלּוֹן֙ אֲשֶׁ֣ר הוֹרַדְתֵּ֣/נוּ ב֔/וֹ וְ/אֶת אָבִ֨י/ךְ וְ/אֶת
    אִמֵּ֜/ךְ וְ/אֶת אַחַ֗יִ/ךְ וְ/אֵת֙ כָּל בֵּ֣ית אָבִ֔י/ךְ תַּאַסְפִ֥י אֵלַ֖יִ/ךְ
    הַ/בָּֽיְתָ/ה־־־־־׃
translation:
  text: Look, when we come into the land, you shall tie this scarlet cord in the window
    through which you let us down, and you shall gather into your house your father,
    your mother, your brothers, and all your father's household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'this line of scarlet thread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' is natural modern English while
    preserving the deictic force better than the more archaic 'Behold.'
- source_word: בָאִים בָּאָרֶץ
  chosen: when we come into the land
  alternatives:
  - when we enter the land
  - as we come into the land
  lexicon: HALOT
  rationale: The participle with the preposition expresses imminent/future entry in
    context. Rendering with 'when we come into the land' fits the oath-setting condition
    naturally in English.
- source_word: תִּקְוַת חוּט הַשָּׁנִי הַזֶּה
  chosen: this scarlet cord
  alternatives:
  - this scarlet rope
  - this line of scarlet thread
  lexicon: HALOT
  rationale: The construct chain is literally 'this cord/hope of scarlet thread.'
    In context it denotes the identifying cord Rahab is to tie in the window. 'Scarlet
    cord' is idiomatic and contextually precise. The more literal 'line of scarlet
    thread' is possible and worth preserving in a footnote because תִּקְוָה can denote
    a cord/line and חוּט denotes thread/string.
- source_word: תִּקְשְׁרִי
  chosen: you shall tie
  alternatives:
  - you must tie
  - you are to tie
  lexicon: HALOT
  rationale: Second feminine singular imperfect used instructionally within the conditional
    arrangement. 'You shall tie' preserves the formal stipulation tone.
- source_word: בַּחַלּוֹן אֲשֶׁר הוֹרַדְתֵּנוּ בוֹ
  chosen: in the window through which you let us down
  alternatives:
  - at the window through which you lowered us
  - in the window by which you let us down
  lexicon: HALOT
  rationale: הוֹרַדְתֵּנוּ is causative 'caused us to go down / let us down.' 'Through
    which you let us down' is clear, natural, and matches the escape scene.
- source_word: תַּאַסְפִי אֵלַיִךְ הַבָּיְתָה
  chosen: you shall gather into your house
  alternatives:
  - you shall bring into your house
  - you shall gather to yourself into the house
  lexicon: HALOT
  rationale: אָסַף with אֵלַיִךְ conveys collecting people to oneself; הַבָּיְתָה
    adds motion toward the house. 'Gather into your house' captures both the assembling
    and the destination without awkward literalism.
- source_word: אָבִיךְ ... אִמֵּךְ ... אַחַיִךְ
  chosen: your father, your mother, your brothers
  alternatives:
  - your father, your mother, your siblings
  lexicon: HALOT
  rationale: Gender-accurate rendering favors 'brothers' for אַחַיִךְ, the masculine
    plural form, unless context clearly broadens it. No such expansion is required
    here.
- source_word: כָּל בֵּית אָבִיךְ
  chosen: all your father's household
  alternatives:
  - all your father's house
  - your whole paternal household
  lexicon: HALOT
  rationale: The phrase denotes the members of the family unit, not merely the building.
    'Household' communicates the social/familial sense in readable English.
