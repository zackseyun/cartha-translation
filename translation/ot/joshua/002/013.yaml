id: JOS.2.13
reference: Joshua 2:13
source:
  edition: WLC
  text: וְ/הַחֲיִתֶ֞ם אֶת אָבִ֣/י וְ/אֶת אִמִּ֗/י וְ/אֶת אַחַ/י֙ וְ/אֶת אחות/י וְ/אֵ֖ת
    כָּל אֲשֶׁ֣ר לָ/הֶ֑ם וְ/הִצַּלְתֶּ֥ם אֶת נַפְשֹׁתֵ֖י/נוּ מִ/מָּֽוֶת־־־־־־׃
translation:
  text: and let my father and my mother live, and my brothers and my sisters, and
    all who belong to them; and deliver our lives from death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep my father and my mother alive ... and rescue us from death.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'all who belong to them' likely refers to the rest of their household
      or dependents; some render it more broadly as 'all that they have.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֲיִתֶם
  chosen: let ... live
  alternatives:
  - keep alive
  - spare
  lexicon: HALOT
  rationale: Hiphil of חיה means to cause to live or keep alive. In this plea, 'let
    ... live' is natural English and preserves the causative sense without overinterpreting
    it as merely 'spare,' though that is a close contextual alternative.
- source_word: אָבִי ... אִמִּי ... אַחַי ... אחותי
  chosen: my father and my mother, and my brothers and my sisters
  alternatives:
  - my father, mother, brothers, and sisters
  lexicon: HALOT
  rationale: These kinship terms are rendered explicitly and individually to match
    the Hebrew sequence and emphasis. 'Sisters' is plural in English because the Hebrew
    form אחותי here functions collectively in context alongside the plural siblings
    list and the following 'all who belong to them.'
- source_word: כָּל אֲשֶׁר לָהֶם
  chosen: all who belong to them
  alternatives:
  - all that they have
  - everyone who is theirs
  - all that belongs to them
  lexicon: HALOT
  rationale: The phrase can denote either persons and possessions broadly, but in
    this rescue context the focus is on household members to be preserved alive. 'All
    who belong to them' brings out the likely personal reference without excluding
    dependents within the household.
- source_word: וְהִצַּלְתֶּם
  chosen: deliver
  alternatives:
  - rescue
  - save
  lexicon: HALOT
  rationale: Hiphil of נצל commonly means deliver or rescue. 'Deliver' fits the solemn
    tone and avoids importing later theological freight that 'save' may carry in English.
- source_word: נַפְשֹׁתֵינוּ
  chosen: our lives
  alternatives:
  - our souls
  - us
  lexicon: HALOT
  rationale: נפש in this context refers to persons/lives rather than immaterial souls.
    'Our lives' best matches the concrete sense in a mortal danger context.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from dying
  - from the death
  lexicon: HALOT
  rationale: The prepositional phrase is straightforwardly rendered 'from death,'
    preserving the Hebrew idiom and the gravity of the threat.
