theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of 'all the land'
  chosen_reading: all the land
  alternative_readings:
  - the whole land of Canaan
  rationale: The Hebrew says 'all the land' without explicitly naming Canaan. The translation preserves the source wording while allowing the narrative context to define the scope, avoiding over-specification.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
