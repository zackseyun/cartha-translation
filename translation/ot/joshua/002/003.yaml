id: JOS.2.3
reference: Joshua 2:3
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ מֶ֣לֶךְ יְרִיח֔וֹ אֶל רָחָ֖ב לֵ/אמֹ֑ר ה֠וֹצִיאִי הָ/אֲנָשִׁ֨ים
    הַ/בָּאִ֤ים אֵלַ֨יִ/ךְ֙ אֲשֶׁר בָּ֣אוּ לְ/בֵיתֵ֔/ךְ כִּ֛י לַ/חְפֹּ֥ר אֶת כָּל
    הָ/אָ֖רֶץ בָּֽאוּ־־־־׃
translation:
  text: So the king of Jericho sent to Rahab, saying, “Bring out the men who came
    to you, who entered your house, for they have come to search out all the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to spy out all the land.” The Hebrew verb can carry the sense of reconnaissance
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The waw-consecutive verb from שׁלח straightforwardly denotes sending.
    'Sent' is the natural English equivalent; 'sent word' is possible by implication
    but adds specificity not explicit in the Hebrew.
- source_word: מֶלֶךְ יְרִיחוֹ
  chosen: the king of Jericho
  alternatives:
  - Jericho's king
  lexicon: HALOT
  rationale: Construct relationship is best rendered with 'of.' The definite sense
    is clear in context even without the article on 'king' in Hebrew narrative style.
- source_word: אֶל רָחָב
  chosen: to Rahab
  alternatives:
  - against Rahab
  lexicon: HALOT
  rationale: אֶל with verbs of sending normally marks the recipient/destination. 'To
    Rahab' fits the context of a royal message.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive in direct speech introduction.
- source_word: הוֹצִיאִי
  chosen: Bring out
  alternatives:
  - send out
  - produce
  lexicon: HALOT
  rationale: The Hiphil imperative of יצא means to cause to go out. 'Bring out' is
    idiomatic and preserves the force of the command directed to Rahab.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers specifically to male individuals, namely the spies.
    'The men' is gender-accurate and contextually precise.
- source_word: הַבָּאִים אֵלַיִךְ
  chosen: who came to you
  alternatives:
  - who are coming to you
  - who came to visit you
  lexicon: HALOT
  rationale: The participle with article functions substantivally/descriptively. In
    English, a relative clause with past reference fits the narrative context better
    than a present-progressive form.
- source_word: אֲשֶׁר בָּאוּ לְבֵיתֵךְ
  chosen: who entered your house
  alternatives:
  - who came to your house
  - who came into your house
  lexicon: HALOT
  rationale: The second use of בוא adds specificity beyond 'came to you.' Rendering
    it as 'entered your house' avoids awkward repetition in English while preserving
    the movement into the house.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' is concise and natural in
    direct speech.
- source_word: לַחְפֹּר
  chosen: to search out
  alternatives:
  - to spy out
  - to explore
  - to dig out
  lexicon: HALOT
  rationale: The infinitive of חפר in this context refers to investigative reconnaissance.
    'Search out' preserves the sense without importing the more interpretive military
    term 'spy out' into the main text, though that nuance is contextually present.
- source_word: אֶת כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all the הארץ/region
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the land under consideration, not the whole earth.
    'All the land' is a natural rendering in the conquest context.
- source_word: בָּאוּ
  chosen: they have come
  alternatives:
  - they came
  lexicon: HALOT
  rationale: English present perfect captures the relevance of their arrival to the
    king's present accusation and command.
