id: JOS.2.4
reference: Joshua 2:4
source:
  edition: WLC
  text: וַ/תִּקַּ֧ח הָֽ/אִשָּׁ֛ה אֶת שְׁנֵ֥י הָ/אֲנָשִׁ֖ים וַֽ/תִּצְפְּנ֑/וֹ וַ/תֹּ֣אמֶר
    כֵּ֗ן בָּ֤אוּ אֵלַ/י֙ הָֽ/אֲנָשִׁ֔ים וְ/לֹ֥א יָדַ֖עְתִּי מֵ/אַ֥יִן הֵֽמָּה־׀׃
translation:
  text: But the woman had taken the two men and hidden them, and she said, “Yes, the
    men came to me, but I did not know where they were from.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a singular suffix in 'and hid him' (וַתִּצְפְּנוֹ), but the context
      refers to the two men collectively; hence 'hidden them.'
    reason: textual_variant
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: had taken
  alternatives:
  - took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but English past perfect
    smooths the sequence with the following concealment and speech, making clear that
    her taking the men in preceded her statement to the king's messengers. Simple
    past is possible, but 'had taken' better reflects the backgrounded prior action
    in idiomatic English.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In context this refers to Rahab as a female individual, not specifically
    as someone's wife. 'The woman' is the plain contextual sense.
- source_word: שְׁנֵי הָאֲנָשִׁים
  chosen: the two men
  alternatives:
  - the two persons
  lexicon: HALOT
  rationale: אֲנָשִׁים here denotes male persons, specifically the Israelite spies.
    'Men' is natural and gender-accurate.
- source_word: וַתִּצְפְּנוֹ
  chosen: hidden them
  alternatives:
  - hid him
  - concealed them
  lexicon: HALOT
  rationale: 'The ketiv-like consonantal form with 3ms suffix could be read literally
    as ''hid him,'' but context clearly refers to the two men collectively, and many
    understand the singular suffix as collective or as a textual irregularity. English
    should reflect the contextual object as plural: she hid the two men. ''Concealed''
    is possible but ''hidden'' is more natural modern English.'
- source_word: וַתֹּאמֶר
  chosen: and she said
  alternatives:
  - and she answered
  lexicon: HALOT
  rationale: Standard narrative speech introducer; 'said' is the most straightforward
    rendering.
- source_word: כֵּן
  chosen: 'Yes'
  alternatives:
  - 'True'
  - Indeed
  - So
  lexicon: HALOT
  rationale: 'Here כֵּן affirms the preceding inquiry: the men did come to her. ''Yes''
    captures the direct assent in natural English dialogue.'
- source_word: בָּאוּ אֵלַי הָאֲנָשִׁים
  chosen: the men came to me
  alternatives:
  - the men did come to me
  lexicon: HALOT
  rationale: A simple past statement is sufficient. English word order is adjusted
    for naturalness while preserving emphasis from כֵּן by rendering that separately
    as 'Yes.'
- source_word: וְלֹא יָדַעְתִּי
  chosen: but I did not know
  alternatives:
  - and I did not know
  lexicon: HALOT
  rationale: The conjunction links her admission with her denial of knowledge. 'But'
    brings out the adversative sense in English discourse, though Hebrew waw is formally
    'and.'
- source_word: מֵאַיִן הֵמָּה
  chosen: where they were from
  alternatives:
  - from where they were
  - whence they were
  lexicon: HALOT
  rationale: מֵאַיִן asks about origin or source. 'Where they were from' is idiomatic
    modern English and preserves the sense of provenance.
