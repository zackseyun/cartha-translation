id: JOS.2.8
reference: Joshua 2:8
source:
  edition: WLC
  text: וְ/הֵ֖מָּה טֶ֣רֶם יִשְׁכָּב֑וּ/ן וְ/הִ֛יא עָלְתָ֥ה עֲלֵי/הֶ֖ם עַל הַ/גָּֽג־׃
translation:
  text: Before they lay down, she went up to them on the roof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Before they went to sleep, she went up to them on the rooftop.' The
      Hebrew verb literally means 'lay down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶם
  chosen: Before
  alternatives:
  - before that
  - not yet
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking an action that occurs prior to the
    following verb. 'Before' is the most natural modern English rendering in this
    clause.
- source_word: יִשְׁכָּבוּן
  chosen: they lay down
  alternatives:
  - they went to sleep
  - they lay down to sleep
  lexicon: HALOT
  rationale: From שׁכב, literally 'lie down.' In context it likely implies going to
    sleep, but the Hebrew states the physical act rather than explicitly 'sleep,'
    so 'lay down' best preserves the source while remaining idiomatic.
- source_word: עָלְתָה
  chosen: she went up
  alternatives:
  - she came up
  - she ascended
  lexicon: HALOT
  rationale: Qal perfect of עלה, standard motion upward. 'Went up' is natural English
    and fits movement to the roof.
- source_word: עֲלֵיהֶם
  chosen: to them
  alternatives:
  - upon them
  - up to them
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/onto,' with a verb of motion
    and persons as object it idiomatically indicates movement toward them. English
    'to them' avoids an unidiomatic or misleading 'upon them.'
- source_word: עַל הַגָּג
  chosen: on the roof
  alternatives:
  - onto the roof
  - on the rooftop
  lexicon: HALOT
  rationale: The phrase specifies the location of her ascent in relation to the house.
    'On the roof' is clear, idiomatic, and suits the narrative setting of a flat roof.
- source_word: וְהֵמָּה ... וְהִיא
  chosen: they ... she
  lexicon: HALOT
  rationale: 'The explicit pronouns heighten participant contrast in Hebrew narrative.
    English normally does not need to reproduce both independently, but the translation
    preserves the contrast through the clause structure: ''Before they ... she ...'''
