id: JOS.2.19
reference: Joshua 2:19
source:
  edition: WLC
  text: וְ/הָיָ֡ה כֹּ֣ל אֲשֶׁר יֵצֵא֩ מִ/דַּלְתֵ֨י בֵיתֵ֧/ךְ הַ/ח֛וּצָ/ה דָּמ֥/וֹ
    בְ/רֹאשׁ֖/וֹ וַ/אֲנַ֣חְנוּ נְקִיִּ֑ם וְ֠/כֹל אֲשֶׁ֨ר יִֽהְיֶ֤ה אִתָּ/ךְ֙ בַּ/בַּ֔יִת
    דָּמ֣/וֹ בְ/רֹאשֵׁ֔/נוּ אִם יָ֖ד תִּֽהְיֶה בּֽ/וֹ־׀־־׃
translation:
  text: And it shall be that anyone who goes out from the doors of your house to the
    outside—his blood shall be on his own head, and we shall be innocent. But everyone
    who is with you in the house—his blood shall be on our heads if a hand is laid
    on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'he will bear responsibility for his own death.'
      The Hebrew reads literally, 'his blood shall be on his head.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'if a hand is on him,' an idiom meaning that harm is done to
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - Then it will happen
  lexicon: HALOT
  rationale: Uses a natural English covenant/oath-style introductory formula while
    preserving the formal force of the Hebrew construction opening a stipulation.
- source_word: כֹּל אֲשֶׁר
  chosen: anyone who
  alternatives:
  - whoever
  - everyone who
  lexicon: HALOT
  rationale: Although literally 'all that/who,' in context it refers distributively
    to persons. 'Anyone who' is idiomatic and preserves the individualizing force.
- source_word: יֵצֵא מִדַּלְתֵי בֵיתֵךְ הַחוּצָה
  chosen: goes out from the doors of your house to the outside
  alternatives:
  - goes out of the doors of your house into the street
  - leaves your house and goes outside
  lexicon: HALOT
  rationale: Retains the concrete imagery of exiting through the house doors into
    the outside, which is important to the condition being set. 'To the outside' is
    slightly formal but reflects הַחוּצָה closely without over-paraphrasing to 'street,'
    which the Hebrew does not state.
- source_word: דָּמוֹ בְרֹאשׁוֹ
  chosen: his blood shall be on his own head
  alternatives:
  - his blood is on his head
  - he will bear responsibility for his own blood
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom of bloodguilt/responsibility rather than flattening
    it into interpretation. 'Own' clarifies the reflexive sense natural in English.
- source_word: וַאֲנַחְנוּ נְקִיִּם
  chosen: and we shall be innocent
  alternatives:
  - and we are guiltless
  - and we shall be clear
  lexicon: HALOT
  rationale: נְקִיִּם here denotes freedom from guilt/liability. 'Innocent' is clear
    modern English and fits the legal context.
- source_word: וְכֹל אֲשֶׁר יִהְיֶה אִתָּךְ בַּבַּיִת
  chosen: But everyone who is with you in the house
  alternatives:
  - And everyone who is with you in the house
  - whoever is with you inside the house
  lexicon: HALOT
  rationale: The second clause contrasts with the first, so 'But' makes the adversative
    relationship explicit in English. 'With you in the house' preserves both companionship
    and location.
- source_word: דָּמוֹ בְרֹאשֵׁנוּ
  chosen: his blood shall be on our heads
  alternatives:
  - his blood will be on us
  - we will bear responsibility for his blood
  lexicon: HALOT
  rationale: Keeps the parallel bloodguilt idiom and the plural 'our heads,' matching
    the speakers' assumption of liability.
- source_word: אִם יָד תִּהְיֶה בוֹ
  chosen: if a hand is laid on him
  alternatives:
  - if a hand is against him
  - if anyone lays a hand on him
  lexicon: HALOT
  rationale: The Hebrew literally says 'if a hand is on/in him,' an idiom for violent
    action or harm. 'If a hand is laid on him' is a standard, natural English equivalent
    that preserves the passive/indefinite force without specifying the agent.
