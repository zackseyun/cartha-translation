theological_decisions:
- issue: Retention of bloodguilt idiom
  chosen_reading: Preserve 'his blood shall be on his own head / on our heads' in
    the main text
  alternative_readings:
  - he alone will be responsible for his death / we will be responsible for his death
  rationale: This is a legal-ethical idiom, not a doctrinally contested term, but
    preserving the idiom maintains the covenantal and juridical texture of the passage.
    A more interpretive rendering would lose the text's formal solemnity.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gendered singular pronouns for indefinite persons
  chosen_reading: Use 'his/him' for the distributive singular
  alternative_readings:
  - their/them
  rationale: The Hebrew uses singular forms for an indefinite individual. Following
    the project's gender-accurate policy, the English keeps the singular masculine
    form rather than neutralizing it, since the intent is representative/legal rather
    than specifically female despite Rahab being addressed.
  doctrine_reference: Translation philosophy §4
