id: JOS.2.17
reference: Joshua 2:17
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ אֵלֶ֖י/הָ הָ/אֲנָשִׁ֑ים נְקִיִּ֣ם אֲנַ֔חְנוּ מִ/שְּׁבֻעָתֵ֥/ךְ
    הַ/זֶּ֖ה אֲשֶׁ֥ר הִשְׁבַּעְתָּֽ/נוּ׃
translation:
  text: And the men said to her, “We are free from this oath of yours that you made
    us swear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We are innocent/clear of this oath of yours.' The Hebrew adjective
      can denote being free from liability or obligation in a legal or covenantal
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'And ... said' preserves Hebrew
    narrative flow in natural English; 'then' is possible but not necessary.
- source_word: אֵלֶיהָ
  chosen: to her
  alternatives:
  - unto her
  lexicon: HALOT
  rationale: Preposition אֶל with 3fs suffix straightforwardly means direction toward
    Rahab; 'to her' is idiomatic modern English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the agents
  - the spies
  lexicon: HALOT
  rationale: The noun simply means 'the men.' Although context identifies them as
    spies, the Hebrew here uses the ordinary term, so the translation should not import
    the more specific role into the text.
- source_word: נְקִיִּם
  chosen: free
  alternatives:
  - innocent
  - clear
  - blameless
  lexicon: HALOT
  rationale: נָקִי in oath/legal contexts conveys being clear of liability or obligation.
    'Free' best communicates release from responsibility in contemporary English.
    'Innocent' could misleadingly suggest moral innocence rather than exemption from
    the oath.
- source_word: אֲנַחְנוּ
  chosen: we
  lexicon: HALOT
  rationale: 'Explicit pronoun retained for clarity and emphasis: ''We are free...''
    mirrors the Hebrew stress.'
- source_word: מִשְּׁבֻעָתֵךְ
  chosen: from this oath of yours
  alternatives:
  - from your oath
  - from this sworn obligation of yours
  lexicon: HALOT
  rationale: The preposition מִן marks separation/release from the oath. Retaining
    'this' and 'of yours' reflects both the demonstrative and 2fs suffix, preserving
    the directness of the statement to Rahab.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - the following
  lexicon: HALOT
  rationale: Simple demonstrative modifying 'oath'; 'this' is the natural equivalent.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - whereby
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the oath; 'that'
    is idiomatic in English restrictive clauses.
- source_word: הִשְׁבַּעְתָּנוּ
  chosen: you made us swear
  alternatives:
  - you adjured us
  - you bound us by oath
  lexicon: HALOT
  rationale: Hiphil of שׁבע means to cause someone to swear, not merely 'you swore
    to us.' 'You made us swear' accurately preserves the causative sense and the object
    suffix 'us.'
