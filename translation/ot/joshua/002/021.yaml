id: JOS.2.21
reference: Joshua 2:21
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ כְּ/דִבְרֵי/כֶ֣ם כֶּן ה֔וּא וַֽ/תְּשַׁלְּחֵ֖/ם וַ/יֵּלֵ֑כוּ וַ/תִּקְשֹׁ֛ר
    אֶת תִּקְוַ֥ת הַ/שָּׁנִ֖י בַּ/חַלּֽוֹן־־׃
translation:
  text: And she said, “According to your words, so be it.” Then she sent them away,
    and they went; and she tied the scarlet cord in the window.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the scarlet line.” The Hebrew expression can denote a cord, line, or
      rope used as a visible marker.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדִבְרֵיכֶם
  chosen: According to your words
  alternatives:
  - As you have said
  - According to your word
  lexicon: HALOT
  rationale: Literally reflects the plural noun 'words' with 2mp suffix, preserving
    Rahab’s acceptance of the spies’ stated terms. 'As you have said' is smoother
    English but slightly less formally transparent.
- source_word: כֵּן הוּא
  chosen: so be it
  alternatives:
  - it is so
  - so it is
  lexicon: HALOT
  rationale: This idiom expresses assent or agreement. 'So be it' captures the force
    naturally in English while remaining close to the Hebrew sense of confirmation.
- source_word: וַתְּשַׁלְּחֵם
  chosen: she sent them away
  alternatives:
  - she let them go
  - she dismissed them
  lexicon: HALOT
  rationale: The verb שלח commonly means 'send.' 'Sent them away' fits the narrative
    context of dispatching the spies from her house.
- source_word: וַיֵּלֵכוּ
  chosen: they went
  alternatives:
  - they departed
  lexicon: HALOT
  rationale: A straightforward rendering of הלך in narrative sequence. 'They went'
    preserves the simple movement verb without adding interpretive nuance.
- source_word: וַתִּקְשֹׁר
  chosen: she tied
  alternatives:
  - she fastened
  - she bound
  lexicon: HALOT
  rationale: קשר means 'tie/bind.' 'Tied' is the most direct and natural rendering
    in this context of attaching the identifying cord.
- source_word: תִּקְוַת הַשָּׁנִי
  chosen: the scarlet cord
  alternatives:
  - the scarlet line
  - the scarlet rope
  lexicon: HALOT
  rationale: Though תִּקְוָה can denote 'hope' elsewhere, here in context it refers
    concretely to a cord/line. 'Scarlet cord' is idiomatic and matches the object
    used as a visible sign. 'Line' is possible and traditional, but 'cord' better
    suits modern English and the likely physical object.
- source_word: בַּחַלּוֹן
  chosen: in the window
  alternatives:
  - at the window
  - from the window
  lexicon: HALOT
  rationale: The preposition ב here marks location. 'In the window' is the most natural
    English expression for placing or tying the cord there.
