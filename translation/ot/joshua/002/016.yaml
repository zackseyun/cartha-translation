id: JOS.2.16
reference: Joshua 2:16
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר לָ/הֶם֙ הָ/הָ֣רָ/ה לֵּ֔כוּ פֶּֽן יִפְגְּע֥וּ בָ/כֶ֖ם הָ/רֹדְפִ֑ים
    וְ/נַחְבֵּתֶ֨ם שָׁ֜מָּ/ה שְׁלֹ֣שֶׁת יָמִ֗ים עַ֚ד שׁ֣וֹב הָ/רֹֽדְפִ֔ים וְ/אַחַ֖ר
    תֵּלְכ֥וּ לְ/דַרְכְּ/כֶֽם־׃
translation:
  text: And she said to them, "Go to the hill country, lest the pursuers encounter
    you there, and hide yourselves there three days, until the pursuers return. Afterward
    you may go on your way."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the mountain"; the Hebrew can refer either to a specific mountain
      or to the surrounding hill country.
    reason: lexical_alternative
  - marker: b
    text: Or "meet you" or "come upon you"; the verb can denote encountering someone,
      here with hostile intent because of the context of pursuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָהָרָה
  chosen: to the hill country
  alternatives:
  - to the mountain
  - into the hills
  lexicon: HALOT
  rationale: הַר can mean a mountain or mountainous region. In this context Rahab
    is directing the spies to a nearby rugged area for concealment, so 'hill country'
    communicates the regional sense more naturally than a single 'mountain' while
    remaining close to the Hebrew.
- source_word: לֵּכוּ
  chosen: Go
  alternatives:
  - Leave
  - Go on
  lexicon: HALOT
  rationale: הלך in the imperative is straightforwardly 'go.' A simple imperative
    preserves the urgency of Rahab's instruction.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose or precaution clause. 'Lest' is concise
    and accurately reflects the warning force.
- source_word: יִפְגְּעוּ בָכֶם
  chosen: encounter you
  alternatives:
  - meet you
  - come upon you
  - overtake you
  lexicon: HALOT
  rationale: פגע with ב can mean meet, encounter, come upon. 'Encounter you' fits
    the immediate sense of the pursuers running into the spies; 'overtake' is possible
    contextually but slightly stronger than the lexical core.
- source_word: הָרֹדְפִים
  chosen: the pursuers
  alternatives:
  - those pursuing
  - the men pursuing you
  lexicon: HALOT
  rationale: The participle from רדף functions substantivally for those chasing them.
    'The pursuers' is natural English and preserves the active pursuit sense.
- source_word: וְנַחְבֵּתֶם
  chosen: hide yourselves
  alternatives:
  - conceal yourselves
  - stay hidden
  lexicon: HALOT
  rationale: The Niphal imperative/reflexive sense calls for the spies themselves
    to hide. 'Hide yourselves' is direct and idiomatic.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb is repeated for emphasis and location. Rendering both occurrences
    as 'there' preserves the Hebrew's directional/local repetition without awkwardness.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: three days
  alternatives:
  - for three days
  lexicon: HALOT
  rationale: The accusative of duration is naturally rendered 'three days'; English
    readers understand the temporal duration from context.
- source_word: עַד שׁוֹב
  chosen: until ... return
  alternatives:
  - until ... come back
  - until the return of
  lexicon: HALOT
  rationale: The infinitive construct of שוב after עַד marks the endpoint of waiting.
    Finite English 'until the pursuers return' is the most natural equivalent.
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: This adverb marks sequence after the waiting period. 'Afterward' is concise
    and readable.
- source_word: תֵּלְכוּ לְדַרְכְּכֶם
  chosen: you may go on your way
  alternatives:
  - you shall go your way
  - you can go to your way
  - you may proceed on your way
  lexicon: HALOT
  rationale: The imperfect here functions as instruction/permission following the
    prior commands. 'You may go on your way' captures the sense of permitted next
    action in idiomatic English better than a wooden 'go to your way.'
