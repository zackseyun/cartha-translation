theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Semantic force of חֶסֶד וֶאֱמֶת
  chosen_reading: covenant faithfulness and truth
  alternative_readings:
  - kindness and faithfulness
  - steadfast love and faithfulness
  rationale: The phrase carries covenantal and relational weight. The chosen rendering avoids flattening חֶסֶד to generic kindness while preserving אֱמֶת as truth/reliability. Because the phrase is theologically rich and somewhat idiomatic, a more traditional alternative is preserved in a footnote rather than resolved dogmatically.
