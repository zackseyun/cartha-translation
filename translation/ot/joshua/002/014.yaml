id: JOS.2.14
reference: Joshua 2:14
source:
  edition: WLC
  text: וַ/יֹּ֧אמְרוּ לָ֣/הּ הָ/אֲנָשִׁ֗ים נַפְשֵׁ֤/נוּ תַחְתֵּי/כֶם֙ לָ/מ֔וּת אִ֚ם לֹ֣א תַגִּ֔ידוּ אֶת דְּבָרֵ֖/נוּ זֶ֑ה וְ/הָיָ֗ה בְּ/תֵת יְהוָ֥ה לָ֨/נוּ֙ אֶת הָ/אָ֔רֶץ וְ/עָשִׂ֥ינוּ עִמָּ֖/ךְ חֶ֥סֶד וֶ/אֱמֶֽת־־־׃
translation:
  text: The men said to her, “Our lives for yours, even to death, if you do not tell this matter of ours. And when Yahweh gives us the land, we will deal kindly and faithfully with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we will deal with you in kindness and faithfulness.” The Hebrew pair חֶסֶד וֶאֱמֶת often expresses loyal, reliable covenantal commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the men [the spies]
  lexicon: HALOT
  rationale: Straightforward rendering of אֲנָשִׁים as 'men.' The context identifies them as the spies, but the Hebrew here says simply 'the men,' so the translation preserves that wording without importing the appositional explanation into the main text.
- source_word: נַפְשֵׁנוּ תַחְתֵּיכֶם לָמוּת
  chosen: Our lives for yours, even to death
  alternatives:
  - Our life instead of yours unto death
  - May our lives die in place of yours
  lexicon: HALOT
  rationale: נֶפֶשׁ often means 'life' in contexts of mortal risk. תַּחַת expresses substitution ('in place of/for'), and לָמוּת gives the sense 'to death' or 'unto death.' The chosen English is idiomatic while preserving the oath-like pledge of self-substitution if Rahab remains faithful.
- source_word: אִם לֹא תַגִּידוּ
  chosen: if you do not tell
  alternatives:
  - if you do not report
  - if you do not disclose
  lexicon: HALOT
  rationale: The verb נגד in Hiphil commonly means 'tell, declare, report.' 'Tell' is the most natural modern English equivalent here. Although the form is 2mp, the addressee is Rahab; the plural may reflect agreement with her household or a generalized address, but English idiom does not require marking that in the main text.
- source_word: אֶת דְּבָרֵנוּ זֶה
  chosen: this matter of ours
  alternatives:
  - this business of ours
  - this word of ours
  - this affair
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'affair.' In this context the reference is to the spies' mission/arrangement, so 'matter of ours' best captures the sense without over-specifying.
- source_word: בְּתֵת יְהוָה לָנוּ אֶת הָאָרֶץ
  chosen: when the LORD gives us the land
  alternatives:
  - when the LORD has given us the land
  - in the LORD's giving us the land
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks the circumstance/time: ''when/in giving.'' ''When the LORD gives us the land'' is clear and natural. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential rendering and LXX/English Bible convention.
- source_word: וְעָשִׂינוּ עִמָּךְ
  chosen: we will deal with you
  alternatives:
  - we will act toward you
  - we will show you
  lexicon: HALOT
  rationale: עשה with עִם can mean 'deal with' or 'act toward' someone. 'Deal with you' fits the collocation with the following nouns and communicates pledged treatment.
- source_word: חֶסֶד וֶאֱמֶת
  chosen: covenant faithfulness and truth
  alternatives:
  - kindness and faithfulness
  - steadfast love and faithfulness
  - loyalty and reliability
  lexicon: HALOT
  rationale: This pair often denotes loyal, reliable covenantal conduct. 'Covenant faithfulness and truth' preserves the theological weight of חֶסֶד beyond mere niceness and keeps אֱמֶת as 'truth,' while signaling the solemn reliability of the promise. Because this is a marked phrase with several viable renderings, an alternative is preserved in a footnote.
