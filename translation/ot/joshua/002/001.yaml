theological_decisions:
- issue: Meaning of Rahab's occupation (זוֹנָה)
  chosen_reading: prostitute
  alternative_readings:
  - innkeeper
  rationale: The plain lexical sense of זוֹנָה is 'prostitute.' Some interpreters
    prefer 'innkeeper' to soften the social or moral implications, but that is not
    the default sense of the Hebrew here. The translation should not mute the text's
    plain meaning.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of וַיִּשְׁכְּבוּ שָׁמָּה
  chosen_reading: they lay down there
  alternative_readings:
  - they lodged there
  rationale: The wording should not imply sexual activity, nor should it over-specify
    formal lodging arrangements. A literal rendering preserves narrative ambiguity
    and avoids importing claims the text does not make.
  doctrine_reference: Translation philosophy §3
