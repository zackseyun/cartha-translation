id: JOS.2.1
reference: Joshua 2:1
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח יְהוֹשֻׁ֣עַ בִּן נ֠וּן מִֽן הַ/שִּׁטִּ֞ים שְׁנַֽיִם אֲנָשִׁ֤ים
    מְרַגְּלִים֙ חֶ֣רֶשׁ לֵ/אמֹ֔ר לְכ֛וּ רְא֥וּ אֶת הָ/אָ֖רֶץ וְ/אֶת יְרִיח֑וֹ וַ/יֵּ֨לְכ֜וּ
    וַ֠/יָּבֹאוּ בֵּית אִשָּׁ֥ה זוֹנָ֛ה וּ/שְׁמָ֥/הּ רָחָ֖ב וַ/יִּשְׁכְּבוּ שָֽׁמָּ/ה־־־־־־־־׃
translation:
  text: Then Joshua son of Nun sent two men secretly from Shittim as spies, saying,
    “Go, see the land, especially Jericho.” So they went and came to the house of
    a prostitute whose name was Rahab, and they lay down there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the land and Jericho.” The Hebrew can be read as naming both the land
      generally and Jericho specifically.
    reason: lexical_alternative
  - marker: b
    text: Or “the house of an innkeeper.” Some have argued this from context or later
      tradition, but the Hebrew word ordinarily means “prostitute.”
    reason: alternative_reading
  - marker: c
    text: Or “they lodged there.” The Hebrew literally says “they lay down there.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context; 'sent' is natural modern
    English and preserves the action without embellishment.
- source_word: מִן הַשִּׁטִּים
  chosen: from Shittim
  alternatives:
  - from Acacia Grove
  lexicon: HALOT
  rationale: A place name is best transliterated per project philosophy to transliterate
    names rather than translate them.
- source_word: שְׁנַיִם אֲנָשִׁים
  chosen: two men
  alternatives:
  - two menfolk
  - two persons
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural and refers to male agents,
    so 'two men' is gender-accurate.
- source_word: מְרַגְּלִים
  chosen: as spies
  alternatives:
  - to spy out
  - scouts
  lexicon: HALOT
  rationale: The participle identifies their role/function. 'As spies' reads smoothly
    in English while preserving the espionage sense.
- source_word: חֶרֶשׁ
  chosen: secretly
  alternatives:
  - quietly
  - in secret
  lexicon: HALOT
  rationale: In this context חֶרֶשׁ functions adverbially, indicating covert action.
    'Secretly' is the clearest idiomatic rendering.
- source_word: לְכוּ רְאוּ
  chosen: Go, see
  alternatives:
  - Go, inspect
  - Go, look over
  lexicon: HALOT
  rationale: A straightforward imperative pair. 'See' is slightly more formal/literal,
    while still natural in English.
- source_word: אֶת הָאָרֶץ וְאֶת יְרִיחוֹ
  chosen: the land, especially Jericho
  alternatives:
  - the land and Jericho
  - the land, that is, Jericho
  lexicon: HALOT
  rationale: The coordination likely highlights Jericho as the focal target within
    the broader reconnaissance mission. 'Especially Jericho' makes the relationship
    explicit in idiomatic English without overparaphrasing.
- source_word: בֵּית אִשָּׁה זוֹנָה
  chosen: the house of a prostitute
  alternatives:
  - the house of a harlot
  - the house of an innkeeper
  lexicon: HALOT
  rationale: זוֹנָה ordinarily denotes a prostitute. 'Harlot' is archaic, and 'innkeeper'
    is interpretive and less lexically direct. The phrase denotes the house belonging
    to such a woman.
- source_word: וּשְׁמָהּ רָחָב
  chosen: whose name was Rahab
  alternatives:
  - and her name was Rahab
  lexicon: HALOT
  rationale: English style prefers embedding this identification relative to 'a prostitute';
    the meaning is unchanged.
- source_word: וַיִּשְׁכְּבוּ שָׁמָּה
  chosen: they lay down there
  alternatives:
  - they lodged there
  - they slept there
  lexicon: HALOT
  rationale: The verb שכב literally means 'lie down.' In context it likely indicates
    staying the night, but 'lay down there' preserves the literal wording and avoids
    importing more than the text states.
