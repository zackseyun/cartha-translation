id: JOS.2.12
reference: Joshua 2:12
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִשָּֽׁבְעוּ נָ֥א לִ/י֙ בַּֽ/יהוָ֔ה כִּי עָשִׂ֥יתִי עִמָּ/כֶ֖ם חָ֑סֶד וַ/עֲשִׂיתֶ֨ם גַּם אַתֶּ֜ם עִם בֵּ֤ית אָבִ/י֙ חֶ֔סֶד וּ/נְתַתֶּ֥ם לִ֖/י א֥וֹת אֱמֶֽת־־־־׃
translation:
  text: And now, please swear to me by Yahweh that, just as I have shown kindness to you, you also will show kindness to my father's house and give me a sure sign,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a true sign,' 'a sure sign,' or 'a reliable pledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Standard discourse transition; 'And now' preserves the connective ו plus the temporal adverb עתה, reflecting Rahab's move from narrative to urgent request.
- source_word: הִשָּׁבְעוּ נָא
  chosen: please swear
  alternatives:
  - swear, please
  - please take an oath
  lexicon: HALOT
  rationale: The Niphal imperative plural of שבע means 'swear/take an oath.' נָא adds politeness/urgency, best conveyed by 'please.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The indirect object is most naturally rendered 'to me' with the verb 'swear.'
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: The preposition marks the basis/invocation of the oath. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the content/basis of the oath request. 'That' works smoothly in English before the comparative clause that follows.
- source_word: עָשִׂיתִי עִמָּכֶם חָסֶד
  chosen: I have shown kindness to you
  alternatives:
  - I have dealt kindly with you
  - I have shown covenant loyalty to you
  lexicon: HALOT
  rationale: חֶסֶד carries loyal, gracious kindness. In this immediate interpersonal context, 'shown kindness' is clear modern English without overloading the phrase, while still preserving the ethical weight.
- source_word: וַעֲשִׂיתֶם גַּם אַתֶּם
  chosen: you also will show
  alternatives:
  - you too shall do
  - you also must show
  lexicon: HALOT
  rationale: 'The waw + qatal here functions in the requested future/result sense following the imperative: Rahab asks that they in turn act. ''Will show'' fits the oath context naturally.'
- source_word: עִם בֵּית אָבִי חֶסֶד
  chosen: kindness to my father's house
  alternatives:
  - kindness with my father's house
  - loyal kindness to my father's household
  lexicon: HALOT
  rationale: '''My father''s house'' is a standard idiom for family/household. ''Kindness to'' is idiomatic English for עִם in this construction, preserving the repeated חֶסֶד.'
- source_word: בֵּית אָבִי
  chosen: my father's house
  alternatives:
  - my father's household
  - my family
  lexicon: HALOT
  rationale: '''My father''s house'' preserves the Hebrew familial-household idiom more closely than the flatter ''my family,'' while remaining understandable.'
- source_word: וּנְתַתֶּם לִי
  chosen: and give me
  alternatives:
  - and you will give me
  lexicon: HALOT
  rationale: Continues the sequence of requested actions under the oath. English imperative/request style naturally omits the explicit pronoun.
- source_word: אוֹת
  chosen: sign
  alternatives:
  - pledge
  - token
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' or 'token.' Here it refers to an assuring mark or pledge. 'Sign' is the broadest and most transparent choice.
- source_word: אֱמֶת
  chosen: trustworthy
  alternatives:
  - 'true'
  - sure
  - reliable
  lexicon: HALOT
  rationale: As an attributive noun/adjective-like complement to 'sign,' אֱמֶת conveys dependability or genuineness. 'Trustworthy sign' communicates that Rahab asks for a sign she can rely on, more idiomatic than 'sign of truth' while preserving the sense.
