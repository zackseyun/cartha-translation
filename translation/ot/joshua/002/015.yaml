id: JOS.2.15
reference: Joshua 2:15
source:
  edition: WLC
  text: וַ/תּוֹרִדֵ֥/ם בַּ/חֶ֖בֶל בְּעַ֣ד הַֽ/חַלּ֑וֹן כִּ֤י בֵיתָ/הּ֙ בְּ/קִ֣יר הַֽ/חוֹמָ֔ה
    וּ/בַֽ/חוֹמָ֖ה הִ֥יא יוֹשָֽׁבֶת׃
translation:
  text: Then she let them down by a rope through the window, because her house was
    built into the wall, and she was living in the wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her house was on the city wall, and she lived on the wall.' The Hebrew
      describes her dwelling as situated in/within the wall structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹרִדֵם
  chosen: Then she let them down
  alternatives:
  - Then she lowered them
  - So she brought them down
  lexicon: HALOT
  rationale: The Hiphil of ירד means to cause to go down. 'Let them down' is idiomatic
    modern English for lowering people by means of a rope, while preserving the causative
    sense. 'Then' reflects the narrative waw-consecutive.
- source_word: בַּחֶבֶל
  chosen: by a rope
  alternatives:
  - with a rope
  - by the rope
  lexicon: HALOT
  rationale: חֶבֶל commonly means 'rope, cord.' The prefixed preposition is instrumental
    here. 'By a rope' is natural English and fits the means by which the spies descended.
- source_word: בְּעַד הַחַלּוֹן
  chosen: through the window
  alternatives:
  - through the window opening
  - out through the window
  lexicon: HALOT
  rationale: בְּעַד often means 'through' in the sense of passing through an opening.
    'Through the window' is the plain sense in context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for why lowering them through the
    window was possible. 'Because' is the clearest contemporary rendering.
- source_word: בֵיתָהּ בְּקִיר הַחוֹמָה
  chosen: her house was built into the wall
  alternatives:
  - her house was in the wall of the city wall
  - her house was on the side of the wall
  lexicon: HALOT
  rationale: The phrase indicates that her house was situated in or against the city
    wall structure. 'Built into the wall' communicates the architectural sense clearly
    in modern English without over-literal awkwardness.
- source_word: וּבַחוֹמָה הִיא יוֹשָׁבֶת
  chosen: and she was living in the wall
  alternatives:
  - and she lived in the wall
  - and she was dwelling on the wall
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit, dwell, live.' The clause restates and emphasizes
    her residence in the wall structure. 'Was living' conveys the participial sense
    as ongoing residence. 'In the wall' follows the Hebrew directly, though the sense
    is residence within the wall structure rather than literally inside masonry.
