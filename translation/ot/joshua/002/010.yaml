id: JOS.2.10
reference: Joshua 2:10
source:
  edition: WLC
  text: כִּ֣י שָׁמַ֗עְנוּ אֵ֠ת אֲשֶׁר הוֹבִ֨ישׁ יְהוָ֜ה אֶת מֵ֤י יַם סוּף֙ מִ/פְּנֵי/כֶ֔ם
    בְּ/צֵאתְ/כֶ֖ם מִ/מִּצְרָ֑יִם וַ/אֲשֶׁ֣ר עֲשִׂיתֶ֡ם לִ/שְׁנֵי֩ מַלְכֵ֨י הָ/אֱמֹרִ֜י
    אֲשֶׁ֨ר בְּ/עֵ֤בֶר הַ/יַּרְדֵּן֙ לְ/סִיחֹ֣ן וּ/לְ/ע֔וֹג אֲשֶׁ֥ר הֶחֱרַמְתֶּ֖ם
    אוֹתָֽ/ם־־־׃
translation:
  text: For we have heard how the LORD dried up the water of the Red Sea before you
    when you came out of Egypt, and what you did to the two kings of the Amorites
    who were beyond the Jordan—to Sihon and Og—whom you devoted to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Yam Suph, traditionally 'Red Sea'; more literally, 'Sea of Reeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces Rahab's explanation for the fear described in the surrounding
    context. 'For' fits the discourse flow in English.
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: The perfect reports a known fact with present relevance; English present
    perfect conveys that continuing effect naturally.
- source_word: הוֹבִישׁ
  chosen: dried up
  alternatives:
  - made dry
  - caused to dry up
  lexicon: HALOT
  rationale: The Hiphil of יבש means to make dry/dry up. 'Dried up' is idiomatic and
    matches the miracle of the sea's waters being removed.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: מֵי יַם סוּף
  chosen: the water of the Red Sea
  alternatives:
  - the waters of the Sea of Reeds
  - the water of the Sea of Reeds
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'water(s) of Yam Suph.' 'Red Sea' is the
    established English geographical rendering, while the more literal 'Sea of Reeds'
    is preserved in a footnote as a lexical alternative.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - in front of you
  lexicon: HALOT
  rationale: The prepositional phrase indicates the waters were removed from before
    Israel as they approached/crossed. 'Before you' is concise and natural.
- source_word: בְּצֵאתְכֶם מִמִּצְרַיִם
  chosen: when you came out of Egypt
  alternatives:
  - at your going out from Egypt
  - when you went out from Egypt
  lexicon: HALOT
  rationale: Temporal infinitive construct with preposition ב conveys 'when/as you
    came out.' This is natural modern English without loss of meaning.
- source_word: עֲשִׂיתֶם
  chosen: you did
  alternatives:
  - you did to
  - you dealt with
  lexicon: HALOT
  rationale: A broad verb whose object is specified by the following phrase. 'What
    you did to' preserves the open-ended wording before the later specification of
    destruction.
- source_word: לִשְׁנֵי מַלְכֵי הָאֱמֹרִי
  chosen: to the two kings of the Amorites
  alternatives:
  - to the two Amorite kings
  lexicon: HALOT
  rationale: Both are possible; the chosen rendering stays close to the Hebrew construct
    while remaining readable.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: who were beyond the Jordan
  alternatives:
  - who were across the Jordan
  - who were on the other side of the Jordan
  lexicon: HALOT
  rationale: The phrase locates Sihon and Og east of the Jordan from the speaker's
    perspective. 'Beyond the Jordan' is concise and conventional.
- source_word: לְסִיחֹן וּלְעוֹג
  chosen: to Sihon and Og
  alternatives:
  - namely, Sihon and Og
  lexicon: HALOT
  rationale: The lamed marks the appositional identification of the two kings. English
    'to Sihon and Og' preserves the syntax adequately.
- source_word: הֶחֱרַמְתֶּם
  chosen: you devoted to destruction
  alternatives:
  - you utterly destroyed
  - you put under the ban
  lexicon: HALOT
  rationale: The Hiphil of חרם refers to placing persons or things under ḥerem, a
    ban/devotion resulting in destruction. 'Devoted to destruction' preserves the
    theological and lexical force better than the flatter 'destroyed.'
- source_word: אוֹתָם
  chosen: whom
  alternatives:
  - them
  lexicon: HALOT
  rationale: 'English relative pronoun smooths the clause: ''whom you devoted to destruction.'''
