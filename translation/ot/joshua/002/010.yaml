theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD'; this follows the stated doctrine
    and broader English Bible convention while signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of חרם language
  chosen_reading: devoted to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: This wording preserves the specific covenantal-war concept of ḥerem without
    importing extra explanation into the main text. It avoids reducing the term to
    mere military defeat while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
