id: JOS.2.7
reference: Joshua 2:7
source:
  edition: WLC
  text: וְ/הָ/אֲנָשִׁ֗ים רָדְפ֤וּ אַֽחֲרֵי/הֶם֙ דֶּ֣רֶךְ הַ/יַּרְדֵּ֔ן עַ֖ל הַֽ/מַּעְבְּר֑וֹת
    וְ/הַ/שַּׁ֣עַר סָגָ֔רוּ אַחֲרֵ֕י כַּ/אֲשֶׁ֛ר יָצְא֥וּ הָ/רֹדְפִ֖ים אַחֲרֵי/הֶֽם׃
translation:
  text: And the men pursued after them on the way to the Jordan, as far as the fords,
    and they shut the gate behind them as soon as the pursuers had gone out after
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the crossing places'; that is, the shallow places of the Jordan where
      one could cross.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  chosen: And the men
  alternatives:
  - And the men of Jericho
  - Now the men
  lexicon: HALOT
  rationale: Definite plural 'the men' refers back to the king's agents/search party
    from context. 'And' preserves the Hebrew narrative conjunction.
- source_word: רָדְפוּ
  chosen: pursued
  alternatives:
  - chased
  - went in pursuit
  lexicon: HALOT
  rationale: '''Pursued'' is the natural English equivalent for רדף in a military/search
    context and matches the repeated participial form later in the verse.'
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - in pursuit of them
  lexicon: HALOT
  rationale: A direct rendering of the preposition plus suffix; idiomatic with 'pursued
    after them' in English narrative style here.
- source_word: דֶּרֶךְ הַיַּרְדֵּן
  chosen: on the way to the Jordan
  alternatives:
  - by the road to the Jordan
  - toward the Jordan road
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean 'way/road.' In context it indicates the route leading
    toward the Jordan, not merely a general direction.
- source_word: עַל הַמַּעְבְּרוֹת
  chosen: as far as the fords
  alternatives:
  - to the crossing places
  - at the fords
  lexicon: HALOT
  rationale: מַעְבָּרוֹת refers to river crossing places, i.e., fords. The preposition
    עַל in this travel context is idiomatically rendered 'as far as' or 'to.' 'As
    far as the fords' best captures the pursuit route.
- source_word: וְהַשַּׁעַר
  chosen: and ... the gate
  alternatives:
  - and the city gate
  lexicon: HALOT
  rationale: The singular definite noun naturally refers to the city gate. 'City'
    is implicit from context and need not be added in the main text.
- source_word: סָגָרוּ
  chosen: they shut
  alternatives:
  - they closed
  lexicon: HALOT
  rationale: A simple past narrative verb; 'shut' is slightly more vivid and idiomatic
    for a gate.
- source_word: אַחֲרֵי
  chosen: behind them
  alternatives:
  - after them
  lexicon: HALOT
  rationale: With the gate as object, English idiom prefers 'behind them' to indicate
    the gate was closed once the pursuers exited.
- source_word: כַּאֲשֶׁר יָצְאוּ
  chosen: as soon as ... had gone out
  alternatives:
  - when ... went out
  - after ... went out
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר can mark temporal sequence. ''As soon as'' fits the narrative
    timing: the gate was shut immediately upon their departure.'
- source_word: הָרֹדְפִים
  chosen: the pursuers
  alternatives:
  - those pursuing
  - the men pursuing
  lexicon: HALOT
  rationale: The participle functions substantivally. 'The pursuers' is concise and
    preserves the repeated pursuit motif.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - in pursuit of them
  lexicon: HALOT
  rationale: Refers again to the spies; repeating 'after them' preserves the Hebrew
    repetition and narrative clarity.
