id: JOS.2.2
reference: Joshua 2:2
source:
  edition: WLC
  text: וַ/יֵּ֣אָמַ֔ר לְ/מֶ֥לֶךְ יְרִיח֖וֹ לֵ/אמֹ֑ר הִנֵּ֣ה אֲ֠נָשִׁים בָּ֣אוּ הֵ֧נָּה
    הַ/לַּ֛יְלָה מִ/בְּנֵ֥י יִשְׂרָאֵ֖ל לַ/חְפֹּ֥ר אֶת הָ/אָֽרֶץ־׃
translation:
  text: And it was said to the king of Jericho, “Look, men from the Israelites have
    come here tonight to search out the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to spy out the land.” The Hebrew verb can carry the sense of searching
      out or investigating, and in this context refers to reconnaissance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָמַר
  chosen: And it was said
  alternatives:
  - And someone said
  - And they said
  - And word came
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol of אמר is formally singular passive-like in English
    context; the agent is unspecified. 'It was said' preserves the impersonal report
    better than supplying an explicit subject.
- source_word: לְמֶלֶךְ יְרִיחוֹ
  chosen: to the king of Jericho
  alternatives:
  - to Jericho’s king
  lexicon: HALOT
  rationale: A straightforward genitive construction; the fuller phrasing is natural
    English and preserves the political title.
- source_word: לֵאמֹר
  chosen: introduced with quotation
  alternatives:
  - saying
  lexicon: HALOT
  rationale: This infinitive construct functions as a speech introducer. In English,
    direct quotation with punctuation is the most natural equivalent.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: The particle draws attention to urgent information. 'Look' is readable
    modern English and preserves the deictic force without archaic tone.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew term here refers to male persons, not a mixed or generic group.
    'Men' is gender-accurate and fits the narrative context of spies.
- source_word: בָּאוּ הֵנָּה
  chosen: have come here
  alternatives:
  - came here
  - have arrived here
  lexicon: HALOT
  rationale: The perfect with deictic adverb reports a completed arrival with present
    relevance. 'Have come here' captures that sense naturally in English.
- source_word: הַלַּיְלָה
  chosen: tonight
  alternatives:
  - this night
  - during the night
  lexicon: HALOT
  rationale: In context this refers to the present night of arrival. 'Tonight' is
    idiomatic modern English.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the Israelites
  alternatives:
  - from the sons of Israel
  - from the children of Israel
  lexicon: HALOT
  rationale: The expression denotes membership in the people of Israel. 'From the
    Israelites' communicates the partitive sense clearly in contemporary English without
    wooden literalism.
- source_word: לַחְפֹּר
  chosen: to search out
  alternatives:
  - to spy out
  - to investigate
  - to dig out
  lexicon: HALOT
  rationale: The verb literally can mean 'dig/search out,' but in this reconnaissance
    context it refers to exploring the land. 'Search out' preserves the investigative
    nuance without importing the more interpretive 'spy out' into the main text.
- source_word: אֶת הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land of Canaan
  - the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering of הארץ here and fits the immediate
    context of territorial reconnaissance.'
