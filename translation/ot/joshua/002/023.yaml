id: JOS.2.23
reference: Joshua 2:23
source:
  edition: WLC
  text: וַ/יָּשֻׁ֜בוּ שְׁנֵ֤י הָֽ/אֲנָשִׁים֙ וַ/יֵּרְד֣וּ מֵֽ/הָ/הָ֔ר וַ/יַּעַבְרוּ֙
    וַ/יָּבֹ֔אוּ אֶל יְהוֹשֻׁ֖עַ בִּן נ֑וּן וַ/יְסַ֨פְּרוּ ל֔/וֹ אֵ֥ת כָּל הַ/מֹּצְא֖וֹת
    אוֹתָֽ/ם־־־־׃
translation:
  text: Then the two men returned, came down from the hill country, crossed over,
    and came to Joshua son of Nun; and they told him everything that had happened
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'everything that befell them' or more literally, 'all the things that
      found them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: From שוב, in narrative sequence this most naturally means the spies returned
    from their mission. 'Returned' is idiomatic and sufficiently formal.
- source_word: שְׁנֵי הָאֲנָשִׁים
  chosen: the two men
  alternatives:
  - the two men [i.e., spies]
  lexicon: HALOT
  rationale: A straightforward rendering of the numeral plus noun. Although context
    identifies them as spies, the Hebrew says 'men,' so the translation preserves
    that wording rather than importing the role title.
- source_word: וַיֵּרְדוּ מֵהָהָר
  chosen: came down from the hill country
  alternatives:
  - came down from the mountain
  - went down from the hills
  lexicon: HALOT
  rationale: הָהָר can denote the hill country or mountainous region, not necessarily
    a single mountain. Given the broader geography of Joshua 2, 'hill country' best
    fits natural English and likely sense.
- source_word: וַיַּעַבְרוּ
  chosen: crossed over
  alternatives:
  - passed over
  - crossed
  lexicon: HALOT
  rationale: עבר commonly means to cross over. The object is unstated, but context
    implies a crossing back over the Jordan region; 'crossed over' preserves the Hebrew's
    concise wording without over-specifying the object.
- source_word: וַיָּבֹאוּ אֶל יְהוֹשֻׁעַ בִּן נוּן
  chosen: came to Joshua son of Nun
  alternatives:
  - went to Joshua son of Nun
  lexicon: HALOT
  rationale: בוא plus אֶל is naturally 'came to.' The patronymic is retained in standard
    English biblical style as part of the formal identification.
- source_word: וַיְסַפְּרוּ לוֹ
  chosen: they told him
  alternatives:
  - they recounted to him
  - they reported to him
  lexicon: HALOT
  rationale: ספר in the piel here means to recount or tell. 'Told him' is clear modern
    English; the fuller sense of reporting is carried by the following object phrase.
- source_word: אֵת כָּל הַמֹּצְאוֹת אוֹתָם
  chosen: everything that had happened to them
  alternatives:
  - all the things that found them
  - all that befell them
  - everything they experienced
  lexicon: HALOT
  rationale: The participial form from מצא with object suffix literally refers to
    'all the things finding them,' an idiom for all that happened to them or befell
    them. 'Everything that had happened to them' communicates the idiomatic sense
    in natural English while preserving the totality marked by כָּל.
