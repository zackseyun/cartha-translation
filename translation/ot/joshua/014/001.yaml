theological_decisions:
- issue: Gendered covenantal designation בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as the standard
    covenantal ethnonym. Per doctrine, gender-accurate rendering is preferred over
    neutralizing language when the source wording is explicit. A more idiomatic alternative
    is preserved in a footnote for readability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Kinship terminology in אבות
  chosen_reading: fathers’ houses
  alternative_readings:
  - ancestral houses
  - family clans
  rationale: The Hebrew social structure is explicitly patriarchal/ancestral in form.
    Retaining 'fathers’ houses' preserves the source-world terminology rather than
    replacing it with a smoother but less transparent sociological label.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4, 5
