id: JOS.14.1
reference: Joshua 14:1
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה אֲשֶׁר נָחֲל֥וּ בְנֵֽי יִשְׂרָאֵ֖ל בְּ/אֶ֣רֶץ כְּנָ֑עַן אֲשֶׁ֨ר
    נִֽחֲל֜וּ אוֹתָ֗/ם אֶלְעָזָ֤ר הַ/כֹּהֵן֙ וִ/יהוֹשֻׁ֣עַ בִּן נ֔וּן וְ/רָאשֵׁ֛י
    אֲב֥וֹת הַ/מַּטּ֖וֹת לִ/בְנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Now these are the inheritances that the sons of Israel received in the land
    of Canaan, which Eleazar the priest, Joshua son of Nun, and the heads of the fathers’
    houses of the tribes of the sons of Israel apportioned to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew literally uses
      the familial expression 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'which Eleazar the priest, Joshua son of Nun, and the heads of the ancestral
      houses of the tribes gave them as an inheritance.' The Hebrew repeats the inheritance
      root in both clauses.
    reason: lexical_alternative
  - marker: c
    text: '''Fathers’ houses'' refers to ancestral family groupings within the tribes.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section while maintaining
    narrative continuity. 'Now these are' is natural modern English and preserves
    the discourse-shifting force better than a bare 'These are.'
- source_word: נָחֲלוּ
  chosen: received
  alternatives:
  - inherited
  - took as an inheritance
  lexicon: HALOT
  rationale: The Qal form with בני ישראל as subject refers to Israel's receiving their
    allotted inheritance. 'Received' is idiomatic here and avoids implying inheritance
    only by succession from a deceased person, while still preserving the land-allotment
    sense.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This keeps the familial covenantal expression visible and follows the
    project's gender-accurate principle. 'Israelites' is possible but less formally
    tied to the Hebrew wording.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' which is significant in inheritance
    context; retaining it preserves the territorial emphasis.
- source_word: אֲשֶׁר נִחֲלוּ אֹתָם
  chosen: which ... apportioned to them
  alternatives:
  - which ... gave them as an inheritance
  - which ... caused them to inherit
  lexicon: HALOT
  rationale: The Niphal of נחל with personal agents and object pronoun here denotes
    the formal allotting of inheritances. In English, 'apportioned to them' clearly
    expresses the administrative distribution of the inheritances.
- source_word: אֶלְעָזָר הַכֹּהֵן
  chosen: Eleazar the priest
  alternatives:
  - Eleazar the priestly one
  lexicon: HALOT
  rationale: Standard rendering of the title; definite article in Hebrew is naturally
    represented in English apposition.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua the son of Nun
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Son of Nun'
    is concise and idiomatic.
- source_word: רָאשֵׁי אֲבוֹת הַמַּטּוֹת
  chosen: the heads of the fathers’ houses of the tribes
  alternatives:
  - the heads of the ancestral houses of the tribes
  - the chiefs of the fathers' houses of the tribes
  lexicon: HALOT
  rationale: This phrase is structurally dense. 'Heads' reflects רָאשֵׁי, 'fathers’
    houses' preserves the kinship-based clan structure of אֲבוֹת, and 'of the tribes'
    reflects the genitival relation to הַמַּטּוֹת. This is more transparent to the
    Hebrew than flattening to simply 'tribal leaders.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - for the sons of Israel
  - of Israel
  lexicon: HALOT
  rationale: Here the phrase most naturally modifies 'the tribes,' yielding 'the tribes
    of the sons of Israel.' This preserves the Hebrew syntax and avoids ambiguity
    about whether the leaders belong to or act for Israel.
- source_word: נַחֲלוּ / נִחֲלוּ
  chosen: inheritances / received ... apportioned
  alternatives:
  - inheritance / inherited ... assigned
  lexicon: HALOT
  rationale: The verse uses the same root twice, first for Israel's reception and
    then for the leaders' allotment. English cannot preserve the exact repetition
    naturally in both clauses, so the translation keeps the inheritance concept explicit
    with 'inheritances' and renders the second occurrence with the contextually precise
    'apportioned.'
