id: JOS.14.14
reference: Joshua 14:14
source:
  edition: WLC
  text: עַל כֵּ֣ן הָיְתָֽה חֶ֠בְרוֹן לְ/כָלֵ֨ב בֶּן יְפֻנֶּ֤ה הַ/קְּנִזִּי֙ לְֽ/נַחֲלָ֔ה עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה יַ֚עַן אֲשֶׁ֣ר מִלֵּ֔א אַחֲרֵ֕י יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Therefore Hebron became the inheritance of Caleb son of Jephunneh the Kenizzite to this day, because he fully followed Yahweh, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'followed wholeheartedly the LORD.' The Hebrew idiom literally says he 'filled after' the LORD, expressing complete loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Introduces the result of the preceding grant. 'Therefore' preserves the formal causal-consecutive force in natural English.
- source_word: הָיְתָה
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: 'With לְכָלֵב ... לְנַחֲלָה, the verb marks transition into a state: Hebron came to belong to Caleb as an inheritance. ''Became'' captures this better than the stative ''was.'''
- source_word: חֶבְרוֹן
  chosen: Hebron
  rationale: Standard English transliteration of the place name.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה הַקְּנִזִּי
  chosen: of Caleb son of Jephunneh the Kenizzite
  alternatives:
  - for Caleb son of Jephunneh the Kenizzite
  - belonging to Caleb son of Jephunneh the Kenizzite
  lexicon: HALOT
  rationale: The lamed marks possession/beneficiary in context. 'Of Caleb...' reads naturally with 'inheritance' in English while preserving the relationship.
- source_word: לְנַחֲלָה
  chosen: the inheritance
  alternatives:
  - as an inheritance
  - for an inheritance
  - possession
  lexicon: HALOT
  rationale: נַחֲלָה denotes inherited possession/allotted inheritance in land-distribution contexts. 'The inheritance' is idiomatic with the following possessive phrase; the sense is that Hebron became Caleb's allotted inheritance.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Conventional and accurate rendering of the idiom indicating continuing status up to the narrator's present.
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - because that
  - inasmuch as
  lexicon: HALOT
  rationale: This compound conjunction gives the reason for Caleb's inheritance. 'Because' is clear modern English without loss of force.
- source_word: מִלֵּא אַחֲרֵי
  chosen: fully followed
  alternatives:
  - followed wholeheartedly
  - was fully obedient to
  - filled after
  lexicon: HALOT
  rationale: This Hebrew idiom means to follow completely/wholeheartedly. 'Fully followed' preserves the metaphor and echoes established usage in Caleb texts without becoming wooden.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'The God of Israel' preserves the covenantal identification and matches common biblical English.
