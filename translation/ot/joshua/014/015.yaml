id: JOS.14.15
reference: Joshua 14:15
source:
  edition: WLC
  text: וְ/שֵׁ֨ם חֶבְר֤וֹן לְ/פָנִים֙ קִרְיַ֣ת אַרְבַּ֔ע הָ/אָדָ֧ם הַ/גָּד֛וֹל בָּ/עֲנָקִ֖ים
    ה֑וּא וְ/הָ/אָ֥רֶץ שָׁקְטָ֖ה מִ/מִּלְחָמָֽה׃פ
translation:
  text: Now the former name of Hebron was Kiriath-arba; Arba was the greatest man
    among the Anakim. And the land had rest from war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kiriath-arba likely means 'city of Arba.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the great man among the Anakim'; the Hebrew may denote Arba as the most
      prominent figure associated with the Anakim.
    reason: alternative_reading
  - marker: c
    text: Or 'the land was quiet from war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֵׁם
  chosen: Now the ... name
  alternatives:
  - And the ... name
  lexicon: HALOT
  rationale: שֵׁם means 'name.' The prefixed conjunction can be rendered simply 'and,'
    but here 'now' gives natural English transition while preserving the narrative
    connection.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: לְפָנִים
  chosen: former
  alternatives:
  - previously
  - formerly
  lexicon: HALOT
  rationale: Idiomatic adverb meaning 'formerly/before.' 'Former' fits smoothly with
    'name' in English.
- source_word: קִרְיַת אַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - Kirjath-arba
  lexicon: HALOT
  rationale: Place name meaning 'city of Arba,' but as a proper name it is best transliterated.
    Hyphenation reflects the compound form in English.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: אָדָם here refers to an individual male figure, Arba, not humanity in
    general. 'Man' follows the doctrine's gender-accurate guidance and the contextual
    sense.
- source_word: הַגָּדוֹל
  chosen: greatest
  alternatives:
  - great
  - prominent
  lexicon: HALOT
  rationale: With the article and context, the phrase identifies Arba as preeminent
    among the Anakim. English idiom is best captured by 'the greatest man among the
    Anakim.'
- source_word: בָּעֲנָקִים
  chosen: among the Anakim
  alternatives:
  - among the Anakites
  lexicon: HALOT
  rationale: עֲנָקִים denotes the people group descended from/associated with Anak.
    'Anakim' preserves the Hebrew ethnonym more directly than the interpretive 'Anakites.'
- source_word: הוּא
  chosen: Arba was
  alternatives:
  - he was
  lexicon: HALOT
  rationale: The pronoun resumes and identifies Arba. Explicitly supplying 'Arba'
    in English avoids ambiguity and reflects the appositional sense of the Hebrew
    clause.
- source_word: וְהָאָרֶץ
  chosen: And the land
  alternatives:
  - Then the land
  lexicon: HALOT
  rationale: Simple conjunction plus subject. 'The land' refers to the land of Canaan/Israel
    in the narrative context.
- source_word: שָׁקְטָה
  chosen: had rest
  alternatives:
  - was quiet
  - was at rest
  lexicon: HALOT
  rationale: The verb means to be quiet, undisturbed, or at rest. In conquest-context
    English, 'had rest' is idiomatic and captures cessation of conflict.
- source_word: מִמִּלְחָמָה
  chosen: from war
  alternatives:
  - from warfare
  - from battle
  lexicon: HALOT
  rationale: The preposition marks separation from the state of war. 'From war' is
    concise and natural.
