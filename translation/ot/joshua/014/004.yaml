id: JOS.14.4
reference: Joshua 14:4
source:
  edition: WLC
  text: כִּֽי הָי֧וּ בְנֵֽי יוֹסֵ֛ף שְׁנֵ֥י מַטּ֖וֹת מְנַשֶּׁ֣ה וְ/אֶפְרָ֑יִם וְ/לֹֽא
    נָתְנוּ֩ חֵ֨לֶק לַ/לְוִיִּ֜ם בָּ/אָ֗רֶץ כִּ֤י אִם עָרִים֙ לָ/שֶׁ֔בֶת וּ/מִ֨גְרְשֵׁי/הֶ֔ם
    לְ/מִקְנֵי/הֶ֖ם וּ/לְ/קִנְיָנָֽ/ם־־־־׃
translation:
  text: For the sons of Joseph were two tribes, Manasseh and Ephraim; and they gave
    no portion to the Levites in the land, except cities to dwell in, with their pasturelands
    for their livestock and for their property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because the descendants of Joseph were two tribes.'
    reason: lexical_alternative
  - marker: b
    text: '''Pasturelands'' refers to the open land around the Levite cities, used
      especially for grazing.'
    reason: cultural_note
  - marker: c
    text: Or 'possessions' for 'property.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'for' preserves
    the explanatory connection in natural English.
- source_word: בְנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - the descendants of Joseph
  - the children of Joseph
  lexicon: HALOT
  rationale: A formally close rendering that preserves the familial idiom while still
    being understandable in English. Here it refers specifically to Joseph's tribal
    descendants.
- source_word: שְׁנֵי מַטּוֹת
  chosen: two tribes
  alternatives:
  - two staffs
  - two tribal groups
  lexicon: HALOT
  rationale: In this context מַטּוֹת refers to tribal divisions, not literal staffs.
    'Two tribes' is the plain contextual sense.
- source_word: מְנַשֶּׁה וְאֶפְרָיִם
  chosen: Manasseh and Ephraim
  rationale: Standard English transliterations of the personal/tribal names.
- source_word: וְלֹא נָתְנוּ חֵלֶק
  chosen: and they gave no portion
  alternatives:
  - and no portion was given
  - and they did not assign an inheritance share
  lexicon: HALOT
  rationale: Active verbal rendering follows the Hebrew verbal form. 'Portion' fits
    the land-allotment context and is concise.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - inheritance
  lexicon: HALOT
  rationale: In allotment contexts חֵלֶק can mean a share or allotted portion. 'Portion'
    is natural and broad enough, while the following phrase 'in the land' clarifies
    the inheritance setting.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  alternatives:
  - to Levi
  - to the tribe of Levi
  lexicon: HALOT
  rationale: The plural gentilic/national term refers to the Levites as a group, not
    merely the eponymous ancestor.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the territory
  lexicon: HALOT
  rationale: Refers to the land being apportioned. 'In the land' is the standard and
    contextually clear rendering.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - rather only
  lexicon: HALOT
  rationale: The paired expression marks an exception to the denial of a land portion.
    'Except' is the most idiomatic English equivalent here.
- source_word: עָרִים לָשֶׁבֶת
  chosen: cities to dwell in
  alternatives:
  - cities to live in
  - towns for dwelling
  lexicon: HALOT
  rationale: 'Preserves the infinitival purpose/result sense: the Levites received
    cities as places of residence.'
- source_word: מִגְרְשֵׁיהֶם
  chosen: their pasturelands
  alternatives:
  - their common lands
  - their open lands
  lexicon: HALOT
  rationale: Refers to the open land around the cities used for grazing and related
    purposes. 'Pasturelands' best captures the practical function in this context.
- source_word: לְמִקְנֵיהֶם
  chosen: for their livestock
  alternatives:
  - for their cattle
  - for their herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or acquired animals. 'Livestock' is
    modern and suitably broad.
- source_word: וּלְקִנְיָנָם
  chosen: and for their property
  alternatives:
  - and for their possessions
  - and for their acquisitions
  lexicon: HALOT
  rationale: The noun denotes possessions/property. 'Property' is concise and fits
    the economic sense without over-specifying.
