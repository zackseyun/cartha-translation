id: JOS.14.7
reference: Joshua 14:7
source:
  edition: WLC
  text: בֶּן אַרְבָּעִ֨ים שָׁנָ֜ה אָנֹכִ֗י בִּ֠/שְׁלֹחַ מֹשֶׁ֨ה עֶֽבֶד יְהוָ֥ה אֹתִ֛/י
    מִ/קָּדֵ֥שׁ בַּרְנֵ֖עַ לְ/רַגֵּ֣ל אֶת הָ/אָ֑רֶץ וָ/אָשֵׁ֤ב אֹת/וֹ֙ דָּבָ֔ר כַּ/אֲשֶׁ֖ר
    עִם לְבָבִֽ/י־־־־׃
translation:
  text: I was forty years old when Moses the servant of the LORD sent me from Kadesh-barnea
    to spy out the land, and I brought him back a report according to my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I brought him back word according to what was in my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אַרְבָּעִים שָׁנָה
  chosen: forty years old
  alternatives:
  - a son of forty years
  lexicon: HALOT
  rationale: Hebrew age idiom literally 'a son of forty years'; standard English idiom
    is 'forty years old.'
- source_word: בִּשְׁלֹחַ
  chosen: when ... sent
  alternatives:
  - at the sending of
  - when ... was sending
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב marks temporal circumstance; idiomatic
    English is 'when Moses sent me.'
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: Official title for Moses. 'Servant' is the established and contextually
    fitting rendering for עבד in honorific relation to God here, while preserving
    the covenant title. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows project default for the divine name.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  chosen: from Kadesh-barnea
  alternatives:
  - from Kadesh Barnea
  lexicon: HALOT
  rationale: Place name transliterated; hyphenation reflects common English styling
    of the compound toponym.
- source_word: לְרַגֵּל
  chosen: to spy out
  alternatives:
  - to scout
  - to explore
  lexicon: HALOT
  rationale: The verb carries the sense of reconnaissance with investigative intent;
    'spy out' best matches the narrative context in Numbers/Joshua.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Joshua this commonly refers to the promised land/territory; 'the land'
    is both natural and contextually precise.
- source_word: וָאָשֵׁב אֹתוֹ דָּבָר
  chosen: and I brought him back a report
  alternatives:
  - and I brought him back word
  - and I returned him a word
  lexicon: HALOT
  rationale: שׁוּב with object plus דָּבָר idiomatically means to bring back a report/message.
    English requires smoothing the idiom.
- source_word: כַּאֲשֶׁר עִם לְבָבִי
  chosen: according to my heart
  alternatives:
  - as it was with my heart
  - according to what was in my heart
  - with wholehearted integrity
  lexicon: HALOT
  rationale: The phrase indicates correspondence with Caleb's inner conviction or
    honest assessment. 'According to my heart' preserves the Hebrew metaphor while
    remaining intelligible; alternatives either over-interpret toward sincerity/integrity
    or sound less natural.
