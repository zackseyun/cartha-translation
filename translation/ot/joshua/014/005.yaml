id: JOS.14.5
reference: Joshua 14:5
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ אֶת מֹשֶׁ֔ה כֵּ֥ן עָשׂ֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל
    וַֽ/יַּחְלְק֖וּ אֶת הָ/אָֽרֶץ־־׃פ
translation:
  text: Just as the LORD had commanded Moses, so the sons of Israel did, and they
    divided the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard corporate
      expression for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces comparison between the LORD's command and Israel's action.
    'Just as' is natural modern English and preserves the correspondence marked by
    כַּאֲשֶׁר.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'The verb denotes giving a command. English past perfect fits the sequence
    well: the command to Moses precedes Israel''s action.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: With צִוָּה, the direct-object marker marks Moses as the person commanded.
    English idiom normally expresses this as 'commanded Moses' rather than requiring
    'to Moses.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'Signals correspondence: Israel acted in the same manner as commanded.
    ''So'' is concise and idiomatic.'
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried it out
  lexicon: HALOT
  rationale: A broad verb meaning 'do/make.' Here 'did' preserves the Hebrew's simplicity
    and leaves the object implicit, as in the source.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This is the literal Hebrew expression. In keeping with the project's
    gender-accurate philosophy, 'sons of Israel' preserves the source form rather
    than flattening it to the ethnonym, while still functioning corporately.
- source_word: וַיַּחְלְקוּ
  chosen: they divided
  alternatives:
  - they apportioned
  - they distributed
  lexicon: HALOT
  rationale: The verb means to divide or apportion. 'Divided' is the most straightforward
    rendering here; 'apportioned' is possible but slightly more interpretive.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the territory
  lexicon: HALOT
  rationale: In Joshua, אָרֶץ commonly refers to the land of Canaan/Israel's inheritance
    rather than 'earth' in a global sense. 'The land' is the natural contextual rendering.
