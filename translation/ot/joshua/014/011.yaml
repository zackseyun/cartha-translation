id: JOS.14.11
reference: Joshua 14:11
source:
  edition: WLC
  text: עוֹדֶ֨/נִּי הַ/יּ֜וֹם חָזָ֗ק כַּֽ/אֲשֶׁר֙ בְּ/י֨וֹם שְׁלֹ֤חַ אוֹתִ/י֙ מֹשֶׁ֔ה
    כְּ/כֹ֥חִ/י אָ֖ז וּ/כְ/כֹ֣חִ/י עָ֑תָּה לַ/מִּלְחָמָ֖ה וְ/לָ/צֵ֥את וְ/לָ/בֽוֹא׃
translation:
  text: I am still as strong today as I was on the day Moses sent me; my strength
    now is as my strength was then, for battle and for going out and coming in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for going out and coming in,' a Hebrew idiom for full
      vigor in action and leadership.
    reason: cultural_note
lexical_decisions:
- source_word: עוֹדֶנִּי
  chosen: I am still
  alternatives:
  - still I am
  - I am yet
  lexicon: HALOT
  rationale: Combines the adverb עוֹד ('still/yet') with the 1cs pronominal ending
    into natural English. 'I am still' best conveys Caleb's continued condition.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic temporal reference. 'Today' is modern English; 'this day' is
    possible but more formal/archaic.
- source_word: חָזָק
  chosen: strong
  alternatives:
  - vigorous
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes physical strength here in context of warfare and
    mobility. 'Strong' is the most direct and natural rendering.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces the comparison between Caleb's present and past strength.
    'As' is sufficient and uncluttered.
- source_word: בְּיוֹם שְׁלֹחַ אֹתִי מֹשֶׁה
  chosen: on the day Moses sent me
  alternatives:
  - in the day Moses sent me
  - when Moses sent me
  lexicon: HALOT
  rationale: בְּיוֹם plus infinitive construct is naturally rendered 'on the day ...'
    in English, preserving the temporal specificity of the Hebrew.
- source_word: כְּכֹחִי אָז
  chosen: as my strength was then
  alternatives:
  - according to my strength then
  - like my strength then
  lexicon: HALOT
  rationale: כֹּחַ refers to personal strength/ability. Rendering with an explicit
    copula in English clarifies the elliptical Hebrew while preserving the comparison.
- source_word: וּכְכֹחִי עַתָּה
  chosen: my strength now is as
  alternatives:
  - and as my strength now
  - so is my strength now
  lexicon: HALOT
  rationale: The Hebrew is verbless and comparative. English requires a fuller clause;
    this wording preserves the balanced comparison between then and now.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - for fighting
  lexicon: HALOT
  rationale: מִלְחָמָה can mean war/battle. In this personal statement of readiness,
    'for battle' is idiomatic and suitably concrete.
- source_word: וְלָצֵאת וְלָבוֹא
  chosen: for going out and coming in
  alternatives:
  - to go out and to come in
  - for marching out and returning
  lexicon: HALOT
  rationale: This is a conventional expression for active daily or military capacity.
    The more literal 'going out and coming in' preserves the Hebrew idiom while remaining
    understandable.
