id: JOS.14.6
reference: Joshua 14:6
source:
  edition: WLC
  text: וַ/יִּגְּשׁ֨וּ בְנֵֽי יְהוּדָ֤ה אֶל יְהוֹשֻׁ֨עַ֙ בַּ/גִּלְגָּ֔ל וַ/יֹּ֣אמֶר
    אֵלָ֔י/ו כָּלֵ֥ב בֶּן יְפֻנֶּ֖ה הַ/קְּנִזִּ֑י אַתָּ֣ה יָדַ֡עְתָּ אֶֽת הַ/דָּבָר֩
    אֲשֶׁר דִּבֶּ֨ר יְהוָ֜ה אֶל מֹשֶׁ֣ה אִישׁ הָ/אֱלֹהִ֗ים עַ֧ל אֹדוֹתַ֛/י וְ/עַ֥ל
    אֹדוֹתֶ֖י/ךָ בְּ/קָדֵ֥שׁ בַּרְנֵֽעַ־־־־־־־׃
translation:
  text: Then the sons of Judah came near to Joshua at Gilgal, and Caleb son of Jephunneh
    the Kenizzite said to him, “You know the word that the LORD spoke to Moses the
    man of God concerning me and concerning you at Kadesh-barnea.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter' or 'the thing' that the LORD spoke to Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  - came forward
  lexicon: HALOT
  rationale: The verb נגשׁ commonly denotes drawing near or approaching. 'Came near'
    preserves the narrative movement with slightly more formal correspondence than
    'approached.'
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the men of Judah
  lexicon: HALOT
  rationale: Literally 'sons of Judah.' Following the gender-accurate principle, the
    familial/tribal expression is retained rather than flattened to 'people,' while
    still functioning as a tribal designation.
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: Standard locative rendering for the place name in narrative context.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: HALOT
  rationale: אמר is the normal verb for speech; 'said to him' is the most natural
    and accurate English equivalent.
- source_word: כָּלֵב בֶּן יְפֻנֶּה הַקְּנִזִּי
  chosen: Caleb son of Jephunneh the Kenizzite
  alternatives:
  - Caleb the son of Jephunneh, the Kenizzite
  lexicon: HALOT
  rationale: Names are transliterated. The gentilic 'Kenizzite' is retained as a formal
    ethnic/clan designation.
- source_word: אַתָּה יָדַעְתָּ
  chosen: You know
  alternatives:
  - You have known
  - You yourself know
  lexicon: HALOT
  rationale: The perfect here expresses a present state of knowledge. 'You know' is
    idiomatic and fits the discourse.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the thing
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to a specific
    divine utterance, so 'the word' best preserves the speech-act emphasis.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD spoke
  alternatives:
  - the LORD said
  lexicon: HALOT
  rationale: The subject is YHWH; per doctrine, יהוה is rendered 'the LORD.' 'Spoke'
    matches the Hebrew verb דבר more directly than 'said.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal default for the divine name, following Jewish
    reverence tradition and common English Bible convention.
- source_word: מֹשֶׁה אִישׁ הָאֱלֹהִים
  chosen: Moses the man of God
  alternatives:
  - Moses, God's man
  lexicon: HALOT
  rationale: A standard biblical title. 'The man of God' preserves the formal designation
    without paraphrase.
- source_word: עַל אֹדוֹתַי וְעַל אֹדוֹתֶיךָ
  chosen: concerning me and concerning you
  alternatives:
  - about me and about you
  - with regard to me and with regard to you
  lexicon: HALOT
  rationale: The idiom עַל אֹדוֹת means 'concerning/regarding.' Repeating 'concerning'
    reflects the Hebrew parallelism and keeps the statement precise.
- source_word: בְּקָדֵשׁ בַּרְנֵעַ
  chosen: at Kadesh-barnea
  alternatives:
  - in Kadesh-barnea
  lexicon: HALOT
  rationale: Standard rendering of the place name with a locative preposition appropriate
    to the event reference.
