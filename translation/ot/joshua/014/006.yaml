theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per DOCTRINE.md contested terms
    table, the default English rendering is 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered tribal designation בְנֵי יְהוּדָה
  chosen_reading: the sons of Judah
  alternative_readings:
  - the people of Judah
  - the men of Judah
  rationale: The Hebrew is explicitly masculine plural in a tribal/familial construction.
    Per translation philosophy, gender-accurate rendering is preferred over neutralization
    unless context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
