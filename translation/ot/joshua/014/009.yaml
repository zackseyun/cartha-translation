theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered descendant term וּלְבָנֶיךָ
  chosen_reading: and for your sons
  alternative_readings:
  - and for your children
  - and for your descendants
  rationale: The Hebrew is explicitly masculine plural with second masculine singular
    suffix. Per the translation philosophy, gender-accurate renderings are preferred
    over gender-neutral ones unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
