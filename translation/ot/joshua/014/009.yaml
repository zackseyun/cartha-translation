id: JOS.14.9
reference: Joshua 14:9
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֣ע מֹשֶׁ֗ה בַּ/יּ֣וֹם הַ/הוּא֮ לֵ/אמֹר֒ אִם לֹ֗א הָ/אָ֨רֶץ֙ אֲשֶׁ֨ר דָּרְכָ֤ה רַגְלְ/ךָ֙ בָּ֔/הּ לְ/ךָ֨ תִֽהְיֶ֧ה לְ/נַחֲלָ֛ה וּ/לְ/בָנֶ֖י/ךָ עַד עוֹלָ֑ם כִּ֣י מִלֵּ֔אתָ אַחֲרֵ֖י יְהוָ֥ה אֱלֹהָֽ/י־־׃
translation:
  text: And Moses swore on that day, saying, ‘Surely the land on which your foot has trodden shall be an inheritance for you and for your sons forever, because you have fully followed Yahweh my God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''if not,'' used here as an emphatic oath formula, hence ''Surely.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and for your descendants.' The Hebrew reads 'your sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  - solemnly swore
  lexicon: HALOT
  rationale: The verb שׁבע in the Niphal commonly means to swear or take an oath. 'Swore' is concise and natural English while preserving the solemn force.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On that day' preserves the preposition and reads naturally.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - declaring
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech; no need to paraphrase.
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as an emphatic asseveration rather than a literal conditional. 'Surely' best conveys the oath force in idiomatic English.
- source_word: הָאָרֶץ אֲשֶׁר דָּרְכָה רַגְלְךָ בָּהּ
  chosen: the land on which your foot has walked
  alternatives:
  - the land where your foot has trodden
  - the land on which you have set foot
  lexicon: HALOT
  rationale: Retains the concrete imagery of Caleb's foot treading the land. Singular 'foot' matches the Hebrew form and idiom works in English.
- source_word: תִהְיֶה לְךָ לְנַחֲלָה
  chosen: shall be an inheritance for you
  alternatives:
  - shall belong to you as an inheritance
  - shall be your inheritance
  lexicon: HALOT
  rationale: נַחֲלָה denotes inherited possession/allotment. 'Shall be an inheritance for you' preserves both future force and covenantal land-allotment nuance.
- source_word: וּלְבָנֶיךָ
  chosen: and for your sons
  alternatives:
  - and for your children
  - and for your descendants
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your sons,' not a gender-neutral term. Per translation philosophy, the masculine form is retained unless context clearly broadens it.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: A standard idiomatic rendering for enduring duration. 'Forever' is readable modern English and sufficiently weighty here.
- source_word: כִּי מִלֵּאתָ אַחֲרֵי
  chosen: because you have fully followed
  alternatives:
  - because you have followed wholeheartedly
  - because you have wholly followed after
  lexicon: HALOT
  rationale: The idiom מלא אחרי means to follow fully/wholeheartedly. 'Fully followed' preserves the metaphor without becoming wooden.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: 'First-person singular suffix is explicit: Moses speaks of ''my God.'' This should be preserved rather than flattened to ''God''.'
