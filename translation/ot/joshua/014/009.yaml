theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered descendant term וּלְבָנֶיךָ
  chosen_reading: and for your sons
  alternative_readings:
  - and for your children
  - and for your descendants
  rationale: The Hebrew is explicitly masculine plural with second masculine singular suffix. Per the translation philosophy, gender-accurate renderings are preferred over gender-neutral ones unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
