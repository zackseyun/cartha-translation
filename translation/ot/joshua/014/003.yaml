id: JOS.14.3
reference: Joshua 14:3
source:
  edition: WLC
  text: כִּֽי נָתַ֨ן מֹשֶׁ֜ה נַחֲלַ֨ת שְׁנֵ֤י הַ/מַּטּוֹת֙ וַ/חֲצִ֣י הַ/מַּטֶּ֔ה מֵ/עֵ֖בֶר
    לַ/יַּרְדֵּ֑ן וְ/לַ֨/לְוִיִּ֔ם לֹֽא נָתַ֥ן נַחֲלָ֖ה בְּ/תוֹכָֽ/ם־־׃
translation:
  text: For Moses had given the inheritance of the two tribes and the half-tribe beyond
    the Jordan, but to the Levites he gave no inheritance among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the other side of the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the statement in context. 'For'
    preserves the discourse function in natural English.
- source_word: נָתַן
  chosen: had given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: 'Rendered as past perfect in English to reflect prior action relative
    to the present narrative situation: Moses'' allotment east of the Jordan had already
    occurred.'
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - an inheritance
  - the allotment
  lexicon: HALOT
  rationale: Refers to landed inheritance/allotted possession. 'The inheritance' fits
    the definite, known tribal allotment in context.
- source_word: שְׁנֵי הַמַּטּוֹת
  chosen: the two tribes
  alternatives:
  - the two staffs
  - the two tribal groups
  lexicon: HALOT
  rationale: מַטֶּה literally means 'staff/tribe,' but in territorial-allotment context
    it clearly denotes tribes.
- source_word: וַחֲצִי הַמַּטֶּה
  chosen: and the half-tribe
  alternatives:
  - and half the tribe
  lexicon: HALOT
  rationale: Conventional and contextually precise rendering for the half-tribe of
    Manasseh in allotment language.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - on the other side of the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: Standard geographic idiom. 'Beyond the Jordan' is concise and preserves
    the Hebrew spatial expression without over-specifying viewpoint.
- source_word: וְלַלְוִיִּם
  chosen: but to the Levites
  alternatives:
  - and to the Levites
  lexicon: HALOT
  rationale: 'The conjunction is formally ''and,'' but English idiom benefits from
    ''but'' because the clause is contrastive: unlike the tribes, the Levites received
    no territorial inheritance.'
- source_word: לֹא נָתַן נַחֲלָה
  chosen: he gave no inheritance
  alternatives:
  - he did not give an inheritance
  - he assigned no inheritance
  lexicon: HALOT
  rationale: Direct and natural rendering of the negated verbal clause, preserving
    the same inheritance terminology as earlier in the verse.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - among those tribes
  lexicon: HALOT
  rationale: Refers to the Levites not receiving a tribal land inheritance within
    the midst of the other tribes. 'Among them' is idiomatic and sufficiently clear
    in context.
