theological_decisions:
- issue: Nature of Levi's non-inheritance
  chosen_reading: The verse is rendered as denying the Levites a territorial tribal
    inheritance among the other tribes, not denying all provision to Levi.
  alternative_readings:
  - A more absolute-sounding 'the Levites received no inheritance' without contextual
    nuance
  rationale: In Joshua and the Pentateuch, Levi lacks a standard land allotment but
    receives cities and the LORD as inheritance. The wording 'among them' is preserved
    so the text itself maintains that nuance without importing extra explanation into
    the main line.
