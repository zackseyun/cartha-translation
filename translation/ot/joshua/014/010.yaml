id: JOS.14.10
reference: Joshua 14:10
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִנֵּה֩ הֶחֱיָ֨ה יְהוָ֣ה אוֹתִ/י֮ כַּ/אֲשֶׁ֣ר דִּבֵּר֒ זֶה֩ אַרְבָּעִ֨ים וְ/חָמֵ֜שׁ שָׁנָ֗ה מֵ֠/אָז דִּבֶּ֨ר יְהוָ֜ה אֶת הַ/דָּבָ֤ר הַ/זֶּה֙ אֶל מֹשֶׁ֔ה אֲשֶׁר הָלַ֥ךְ יִשְׂרָאֵ֖ל בַּ/מִּדְבָּ֑ר וְ/עַתָּה֙ הִנֵּ֣ה אָנֹכִ֣י הַ/יּ֔וֹם בֶּן חָמֵ֥שׁ וּ/שְׁמוֹנִ֖ים שָׁנָֽה׀־־־־׃
translation:
  text: And now, behold, Yahweh has kept me alive, just as he said, these forty-five years since Yahweh spoke this word to Moses while Israel walked in the wilderness. And now, behold, today I am eighty-five years old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has preserved me alive.'
    reason: lexical_alternative
  - marker: b
    text: '''This word'' could also be rendered ''this matter'' or, more interpretively, ''this promise.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'while Israel journeyed in the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱיָה
  chosen: has kept me alive
  alternatives:
  - has preserved me alive
  - has given me life
  lexicon: HALOT
  rationale: The Hiphil of חיה here is causative/preservative in context, referring not to initial giving of life but to sustaining Caleb through the years. 'Has kept me alive' is idiomatic modern English and captures the perfect aspect in relation to the present claim.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר דִּבֵּר
  chosen: just as he said
  alternatives:
  - as he spoke
  - according as he promised
  lexicon: HALOT
  rationale: The clause points back to the LORD's prior statement/promise. 'Just as he said' is natural English and preserves the verbal force without overinterpreting it as a formal promise formula.
- source_word: זֶה אַרְבָּעִים וְחָמֵשׁ שָׁנָה
  chosen: these forty-five years
  alternatives:
  - for forty-five years now
  - this forty-five years
  lexicon: HALOT
  rationale: This idiom marks the span elapsed up to the present. 'These forty-five years' is a standard English equivalent that preserves the deictic force of זֶה.
- source_word: מֵאָז
  chosen: since
  alternatives:
  - from the time when
  - ever since
  lexicon: HALOT
  rationale: The preposition-adverb combination introduces the starting point of the elapsed period. 'Since' is concise and accurate.
- source_word: הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this matter
  - this promise
  - this thing
  lexicon: HALOT
  rationale: דבר can mean word, matter, or thing. Here it refers to the specific statement the LORD made to Moses about Caleb. 'This word' stays close to the Hebrew while remaining intelligible; 'promise' would be interpretive.
- source_word: אֲשֶׁר הָלַךְ יִשְׂרָאֵל בַּמִּדְבָּר
  chosen: while Israel walked in the wilderness
  alternatives:
  - when Israel went about in the wilderness
  - during Israel's journey in the wilderness
  lexicon: HALOT
  rationale: הלך literally means 'walked/went.' In context it refers to Israel's wilderness wandering. 'Walked in the wilderness' preserves the Hebrew imagery better than the more interpretive 'journeyed,' while 'while' correctly links the clause temporally.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: The particle marks emphasis and draws attention. 'Behold' is slightly elevated but still readable and preserves the rhetorical force better than colloquial alternatives.
- source_word: אָנֹכִי הַיּוֹם
  chosen: today I am
  alternatives:
  - I am today
  - as of today I am
  lexicon: HALOT
  rationale: This is the natural English ordering for the Hebrew emphasis on Caleb's present age.
- source_word: בֶּן חָמֵשׁ וּשְׁמוֹנִים שָׁנָה
  chosen: eighty-five years old
  alternatives:
  - a son of eighty-five years
  - eighty-five years of age
  lexicon: HALOT
  rationale: The Hebrew age idiom 'son of X years' is best rendered by the standard English age expression.
