id: JOS.14.12
reference: Joshua 14:12
source:
  edition: WLC
  text: וְ/עַתָּ֗ה תְּנָ/ה לִּ/י֙ אֶת הָ/הָ֣ר הַ/זֶּ֔ה אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא כִּ֣י אַתָּֽה שָׁמַעְתָּ֩ בַ/יּ֨וֹם הַ/ה֜וּא כִּֽי עֲנָקִ֣ים שָׁ֗ם וְ/עָרִים֙ גְּדֹל֣וֹת בְּצֻר֔וֹת אוּלַ֨י יְהוָ֤ה אוֹתִ/י֙ וְ/ה֣וֹרַשְׁתִּ֔י/ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־־־־׃
translation:
  text: Now give me this hill country that Yahweh spoke about on that day, because you yourself heard on that day that the Anakim are there, with great fortified cities. Perhaps Yahweh will be with me, and I will drive them out, just as Yahweh said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this mountain.' The Hebrew הָהָר can refer either to a single mountain or to a mountainous region; here the broader regional sense is likely.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Perhaps the LORD [will be] with me,'' an elliptical expression of hoped-for divine presence and aid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing Caleb’s present request. 'Now' is natural modern English; the conjunctive force can be felt without explicitly rendering 'and'.
- source_word: תְּנָה לִּי
  chosen: give me
  alternatives:
  - grant me
  lexicon: HALOT
  rationale: Imperative of נתן with indirect object. 'Give me' is the plain sense and preserves the directness of Caleb’s request better than the more interpretive 'grant me'.
- source_word: אֶת־הָהָר הַזֶּה
  chosen: this hill country
  alternatives:
  - this mountain
  - this hill country
  lexicon: HALOT
  rationale: הַר can denote a mountain or mountainous region. In the conquest-land context, Caleb is asking for a region, not merely a single peak, so 'this hill country' best fits the referent.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה
  chosen: that the LORD spoke about
  alternatives:
  - which the LORD spoke
  - that the LORD promised
  lexicon: HALOT
  rationale: The verb is 'spoke,' not explicitly 'promised,' though the context is promissory. 'Spoke about' preserves the lexical value without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Temporal phrase referring back to the earlier occasion of the LORD’s word. 'On that day' is idiomatic and preserves the preposition.
- source_word: כִּי אַתָּה שָׁמַעְתָּ
  chosen: because you yourself heard
  alternatives:
  - for you heard
  - because you heard
  lexicon: HALOT
  rationale: כִּי here gives the reason. The explicit pronoun אַתָּה adds emphasis, which is reflected by 'you yourself'.
- source_word: כִּי עֲנָקִים שָׁם
  chosen: that the Anakim are there
  alternatives:
  - that Anakim were there
  - that the descendants of Anak are there
  lexicon: HALOT
  rationale: Retains the ethnonym/transliterated people-group name. Present tense fits the immediate situation Caleb describes.
- source_word: וְעָרִים גְּדֹלוֹת בְּצֻרוֹת
  chosen: with great fortified cities
  alternatives:
  - and cities, great and fortified
  - and large fortified cities
  lexicon: HALOT
  rationale: Compresses the Hebrew coordination into natural English while preserving both adjectives. 'Great' is kept rather than 'large' for a slightly weightier tone.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be that
  - Maybe
  lexicon: HALOT
  rationale: Expresses humble confidence without presumption. 'Perhaps' is concise and natural.
- source_word: יְהוָה אוֹתִי
  chosen: the LORD will be with me
  alternatives:
  - the LORD is with me
  - the LORD with me
  lexicon: HALOT
  rationale: The verbless clause after אוּלַי is naturally understood as 'the LORD will be with me' in context, expressing hoped-for divine aid in the coming battle.
- source_word: וְהוֹרַשְׁתִּים
  chosen: I will drive them out
  alternatives:
  - I will dispossess them
  - I will drive them away
  lexicon: HALOT
  rationale: Hiphil of ירשׁ here means to dispossess/remove inhabitants from the land. 'Drive them out' is clear modern English and fits conquest context.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD said
  alternatives:
  - as the LORD spoke
  - just as the LORD promised
  lexicon: HALOT
  rationale: Keeps the comparison marker and the verb 'said' as a natural rendering of דִּבֶּר, without importing 'promised' explicitly.
