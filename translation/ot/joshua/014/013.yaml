id: JOS.14.13
reference: Joshua 14:13
source:
  edition: WLC
  text: וַֽ/יְבָרְכֵ֖/הוּ יְהוֹשֻׁ֑עַ וַ/יִּתֵּ֧ן אֶת חֶבְר֛וֹן לְ/כָלֵ֥ב בֶּן יְפֻנֶּ֖ה
    לְ/נַחֲלָֽה־־׃
translation:
  text: Then Joshua blessed him and gave Hebron to Caleb son of Jephunneh as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blessed Caleb'; the Hebrew reads 'blessed him,' with Caleb as the clear
      referent from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרְכֵהוּ
  chosen: blessed him
  alternatives:
  - blessed Caleb
  lexicon: HALOT
  rationale: The verb ברך with 3ms suffix means 'blessed him.' The explicit object
    is pronominal in Hebrew; English can preserve this naturally as 'him.' Since the
    following clause names Caleb, the referent is clear without expanding the text
    in the main line.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - granted
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' 'Gave' is the most direct rendering and
    fits the legal-allotment context without adding interpretive nuance.
- source_word: אֶת חֶבְרוֹן
  chosen: Hebron
  rationale: Direct object marker אֶת is untranslated in English; חֶבְרוֹן is the
    place name Hebron, retained by standard transliteration.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה
  chosen: to Caleb son of Jephunneh
  alternatives:
  - to Caleb the son of Jephunneh
  rationale: The lamed marks the indirect object 'to Caleb.' 'Son of Jephunneh' is
    a straightforward genealogical expression; omitting 'the' keeps modern English
    readable while preserving the familial designation.
- source_word: לְנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as his inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance, especially allotted land within
    Israel. 'As an inheritance' is idiomatic English and preserves the covenantal-land
    allotment sense better than the broader 'possession.'
