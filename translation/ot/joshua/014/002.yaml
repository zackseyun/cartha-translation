id: JOS.14.2
reference: Joshua 14:2
source:
  edition: WLC
  text: בְּ/גוֹרַ֖ל נַחֲלָתָ֑/ם כַּ/אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ בְּ/יַד מֹשֶׁ֔ה לְ/תִשְׁעַ֥ת
    הַ/מַּטּ֖וֹת וַ/חֲצִ֥י הַ/מַּטֶּֽה־׃
translation:
  text: Their inheritance was by lot, as the LORD had commanded through Moses, for
    the nine tribes and the half-tribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the hand of Moses,' a Hebrew idiom for mediation or agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  - through lot-casting
  lexicon: HALOT
  rationale: 'The preposition ב plus גּוֹרָל indicates means or manner: the inheritance
    was assigned by the casting of lots. ''By lot'' is idiomatic modern English and
    preserves the procedural sense without overexplaining.'
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their allotted inheritance
  - their possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance or allotted possession, especially
    land apportioned by covenantal grant. 'Their inheritance' is the most natural
    and contextually precise rendering here.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the prior divine command. 'As' is concise and
    sufficient in English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  - ordered
  lexicon: HALOT
  rationale: The perfect verb refers to a prior command already given through Moses.
    English past perfect fits the discourse relation to the allotment now being described.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and reverential practice.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' often denotes agency or mediation. 'Through
    Moses' communicates mediated command clearly in contemporary English while preserving
    the sense.
- source_word: לְתִשְׁעַת הַמַּטּוֹת
  chosen: for the nine tribes
  alternatives:
  - to the nine tribes
  lexicon: HALOT
  rationale: The ל preposition here marks the recipients/beneficiaries of the allotment.
    'For the nine tribes' reads naturally in context of land distribution.
- source_word: וַחֲצִי הַמַּטֶּה
  chosen: and the half-tribe
  alternatives:
  - and half the tribe
  - and the one half-tribe
  lexicon: HALOT
  rationale: מַטֶּה in this context means 'tribe.' The singular with 'half' refers
    to the half-tribe of Manasseh west of the Jordan. 'The half-tribe' is the standard
    and clear English expression.
