id: JOS.20.1
reference: Joshua 20:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל יְהוֹשֻׁ֖עַ לֵ/אמֹֽר־׃
translation:
  text: Then the LORD spoke to Joshua, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And the LORD spoke to Joshua, saying.” The Hebrew narrative form can
      be rendered either “and” or “then” in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative. 'Then ... spoke'
    gives natural English narrative flow while preserving the sequential force better
    than a bare 'spoke.' 'Said' is possible, but דבר commonly carries the sense of
    speaking/addressing rather than the simpler אמר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: 'Standard prepositional sense in this construction: YHWH spoke to Joshua.'
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech formulaically.
    'Saying' preserves the formal discourse marker without unnecessary expansion.
