id: JOS.20.7
reference: Joshua 20:7
source:
  edition: WLC
  text: וַ/יַּקְדִּ֜שׁוּ אֶת קֶ֤דֶשׁ בַּ/גָּלִיל֙ בְּ/הַ֣ר נַפְתָּלִ֔י וְ/אֶת שְׁכֶ֖ם
    בְּ/הַ֣ר אֶפְרָ֑יִם וְ/אֶת קִרְיַ֥ת אַרְבַּ֛ע הִ֥יא חֶבְר֖וֹן בְּ/הַ֥ר יְהוּדָֽה־־־׃
translation:
  text: So they set apart Kedesh in Galilee in the hill country of Naphtali, and Shechem
    in the hill country of Ephraim, and Kiriath-arba (that is, Hebron) in the hill
    country of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Kiriath-arba, it is Hebron'—that is, Kiriath-arba is another name
      for Hebron.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְדִּשׁוּ
  chosen: set apart
  alternatives:
  - consecrated
  - sanctified
  - designated
  lexicon: HALOT
  rationale: The verb קדשׁ in this civic/legal context refers to formally setting
    these cities apart for a special purpose (cities of refuge), not primarily to
    cultic sanctification. 'Set apart' is natural English and preserves the formal
    act without overstating ritual connotations.
- source_word: קֶדֶשׁ
  chosen: Kedesh
  rationale: Proper place name; transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: בַּגָּלִיל
  chosen: in Galilee
  alternatives:
  - in the Galil
  lexicon: HALOT
  rationale: גָּלִיל is a geographic region name. 'Galilee' is the standard English
    form and is clear to modern readers.
- source_word: בְּהַר נַפְתָּלִי
  chosen: in the hill country of Naphtali
  alternatives:
  - in the mountains of Naphtali
  - in Mount Naphtali
  lexicon: HALOT
  rationale: הַר can mean mountain, hill country, or mountainous region. In territorial
    descriptions, 'hill country of' best captures the regional/topographical sense
    in idiomatic English.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Proper place name; transliterated.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the mountains of Ephraim
  - in Mount Ephraim
  lexicon: HALOT
  rationale: As with Naphtali, הַר here denotes the upland region associated with
    Ephraim rather than a single peak.
- source_word: קִרְיַת אַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - Kiriath Arba
  - City of Arba
  lexicon: HALOT
  rationale: This is a fixed place name. Transliteration is preferred for names; although
    the components mean 'city of Arba,' translating the name would be less consistent
    with the stated philosophy.
- source_word: הִיא חֶבְרוֹן
  chosen: (that is, Hebron)
  alternatives:
  - which is Hebron
  - it is Hebron
  lexicon: HALOT
  rationale: The pronoun plus name identifies Kiriath-arba with Hebron. Parenthetical
    'that is' communicates the appositional clarification smoothly in modern English.
- source_word: בְּהַר יְהוּדָה
  chosen: in the hill country of Judah
  alternatives:
  - in the mountains of Judah
  - in Mount Judah
  lexicon: HALOT
  rationale: Again, the phrase refers to the upland region of Judah. 'Hill country'
    is the most idiomatic and contextually precise rendering.
