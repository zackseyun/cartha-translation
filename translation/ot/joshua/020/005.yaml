theological_decisions:
- issue: Legal status of הָרֹצֵחַ in the refuge-city context
  chosen_reading: Render as 'manslayer' rather than 'murderer'
  alternative_readings:
  - murderer
  - killer
  rationale: The verse distinguishes accidental killing from intentional hatred. Translating
    with 'manslayer' preserves that legal-theological distinction and avoids importing
    guilt the text explicitly withholds at this stage.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of בִּבְלִי דַעַת
  chosen_reading: Translate as 'without intent'
  alternative_readings:
  - without knowledge
  - unintentionally
  rationale: The legal point is lack of intentionality rather than mere cognitive
    ignorance. 'Without intent' best preserves the judicial force in readable English
    without paraphrasing beyond the text.
  doctrine_reference: Translation philosophy §1, §6
