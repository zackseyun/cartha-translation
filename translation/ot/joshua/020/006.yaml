theological_decisions:
- issue: Legal status of הָרֹצֵחַ in the city-of-refuge legislation
  chosen_reading: Rendered as 'manslayer' rather than 'murderer'
  alternative_readings:
  - killer
  - slayer
  - murderer
  rationale: The broader context distinguishes accidental killing from culpable murder.
    Translating with 'murderer' would import a judicial conclusion the text has not
    made in this verse and would blur the legal function of the refuge city.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal or interpretive claims.'
- issue: Force of the return after the high priest's death
  chosen_reading: Rendered as permission ('may return')
  alternative_readings:
  - future prediction ('shall return')
  - ability ('can return')
  rationale: The legal context concerns release from restriction. English 'may' best
    conveys authorized return without overstating inevitability or mere capability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve legal
    sense in readable modern English.'
