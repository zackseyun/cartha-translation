id: JOS.20.6
reference: Joshua 20:6
source:
  edition: WLC
  text: וְ/יָשַׁ֣ב בָּ/עִ֣יר הַ/הִ֗יא עַד עָמְד֞/וֹ לִ/פְנֵ֤י הָֽ/עֵדָה֙ לַ/מִּשְׁפָּ֔ט
    עַד מוֹת֙ הַ/כֹּהֵ֣ן הַ/גָּד֔וֹל אֲשֶׁ֥ר יִהְיֶ֖ה בַּ/יָּמִ֣ים הָ/הֵ֑ם אָ֣ז יָשׁ֣וּב
    הָ/רוֹצֵ֗חַ וּ/בָ֤א אֶל עִיר/וֹ֙ וְ/אֶל בֵּית֔/וֹ אֶל הָ/עִ֖יר אֲשֶׁר נָ֥ס מִ/שָּֽׁם׀־־׀־־־־׃
translation:
  text: And he shall live in that city until he stands before the congregation for
    judgment, until the death of the high priest who is in office in those days. Then
    the manslayer may return and come to his city and to his house, to the city from
    which he fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' for 'congregation.' The Hebrew refers to the gathered community
      acting in legal judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the killer' or 'the slayer.' 'Manslayer' is used here to preserve the
      legal distinction from a convicted murderer in the city-of-refuge laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁב
  chosen: he shall live
  alternatives:
  - he shall remain
  - he shall dwell
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or live. In the legal context of residence
    in a city of refuge, 'live' communicates continued residence naturally in English
    while preserving the requirement to stay there.
- source_word: בָּעִיר הַהִיא
  chosen: in that city
  alternatives:
  - in the city, that one
  lexicon: HALOT
  rationale: Straightforward locative phrase referring back to the designated city
    of refuge; idiomatic English is 'in that city.'
- source_word: עַד עָמְדוֹ לִפְנֵי הָעֵדָה
  chosen: until he stands before the congregation
  alternatives:
  - until his standing before the assembly
  - until he appears before the community
  lexicon: HALOT
  rationale: עמד לפני is a standard idiom for appearing/standing before an authority.
    'Stands before the congregation' keeps the formal judicial sense and reflects
    the Hebrew closely.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עדה often denotes the assembled community of Israel. 'Congregation' preserves
    the formal corporate body involved in adjudication here; 'assembly' is possible
    but slightly less traditional in legal passages.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for trial
  - for justice
  lexicon: HALOT
  rationale: משפט here refers to legal adjudication. 'For judgment' is a clear and
    fairly formal rendering; 'for trial' is possible but somewhat more interpretive.
- source_word: עַד מוֹת הַכֹּהֵן הַגָּדוֹל
  chosen: until the death of the high priest
  alternatives:
  - until the high priest dies
  lexicon: HALOT
  rationale: Construct phrase rendered directly. 'The high priest' is the standard
    and precise title for הכהן הגדול.
- source_word: אֲשֶׁר יִהְיֶה בַּיָּמִים הָהֵם
  chosen: who is in office in those days
  alternatives:
  - who will be in those days
  - who is serving in those days
  lexicon: HALOT
  rationale: The clause identifies the contemporaneous high priest, not a future abstract
    office. 'Is in office' makes the temporal-reference function explicit in natural
    English.
- source_word: אָז יָשׁוּב
  chosen: Then ... may return
  alternatives:
  - Then ... shall return
  - Then ... can return
  lexicon: HALOT
  rationale: After the stated conditions are met, the fugitive is permitted to return.
    'May return' captures legal permission more naturally than a bare future in English.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In the city-of-refuge context, רצח refers to the one who killed, often
    unintentionally, and 'murderer' would overstate guilt. 'Manslayer' is the established
    legal-English equivalent and preserves the distinction.
- source_word: וּבָא
  chosen: and come
  alternatives:
  - and enter
  lexicon: HALOT
  rationale: Simple sequential verb after 'return'; 'come' is the most natural English
    equivalent here.
- source_word: אֶל עִירוֹ וְאֶל בֵּיתוֹ
  chosen: to his city and to his house
  alternatives:
  - to his town and to his home
  lexicon: HALOT
  rationale: 'Retains the twofold restoration: civic place and household. ''House''
    is more literal than ''home,'' though the latter is possible.'
- source_word: אֶל הָעִיר אֲשֶׁר נָס מִשָּׁם
  chosen: to the city from which he fled
  alternatives:
  - to the city from there where he fled
  - to the city from which he had fled
  lexicon: HALOT
  rationale: The final phrase restates the destination as the place of original flight.
    English requires smoothing the Hebrew repetition; 'from which he fled' is accurate
    and readable.
