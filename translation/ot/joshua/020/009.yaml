theological_decisions:
- issue: Gendered covenantal expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: for all the sons of Israel
  alternative_readings:
  - for all the Israelites
  - for all the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a representative national
    expression. Per doctrine, the translation favors gender-accurate rendering rather
    than flattening to a neutral collective, while preserving a more idiomatic alternative
    in a footnote for readability.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Legal status of גֵּר
  chosen_reading: the sojourner residing among them
  alternative_readings:
  - the resident foreigner living among them
  - the stranger among them
  rationale: The verse extends legal protection beyond native Israelites to the non-native
    resident. 'Sojourner' best preserves the covenantal-legal category without importing
    later ethnic or immigration frameworks.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
