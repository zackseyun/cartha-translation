id: JOS.20.9
reference: Joshua 20:9
source:
  edition: WLC
  text: אֵ֣לֶּה הָיוּ֩ עָרֵ֨י הַ/מּֽוּעָדָ֜ה לְ/כֹ֣ל בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/לַ/גֵּר֙
    הַ/גָּ֣ר בְּ/תוֹכָ֔/ם לָ/נ֣וּס שָׁ֔מָּ/ה כָּל מַכֵּה נֶ֖פֶשׁ בִּ/שְׁגָגָ֑ה וְ/לֹ֣א
    יָמ֗וּת בְּ/יַד֙ גֹּאֵ֣ל הַ/דָּ֔ם עַד עָמְד֖/וֹ לִ/פְנֵ֥י הָ/עֵדָֽה׀־־־׃פ
translation:
  text: These were the appointed cities for all the sons of Israel and for the sojourner
    residing among them, so that anyone who struck down a person unintentionally might
    flee there and not die by the hand of the avenger of blood until he stood before
    the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'for all the Israelites.' The Hebrew reads 'for all
      the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a non-Israelite resident living among Israel under
      its communal order.'
    reason: cultural_note
  - marker: c
    text: Or 'assembly' for 'congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמּוּעָדָה
  chosen: the appointed cities
  alternatives:
  - the designated cities
  - the cities appointed for refuge
  lexicon: HALOT
  rationale: מוּעָדָה/מוֹעֵד language denotes something appointed or designated. In
    this summary verse, 'appointed cities' preserves the formal sense without importing
    'refuge,' which is contextually implied from the chapter but not explicit in this
    phrase itself.
- source_word: לְכֹל בְּנֵי יִשְׂרָאֵל
  chosen: for all the sons of Israel
  alternatives:
  - for all the Israelites
  - for all the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Per gender-accurate
    philosophy, the main text keeps the formal expression. 'Israelites' is idiomatic
    but less transparent to the source wording.
- source_word: וְלַגֵּר הַגָּר בְּתוֹכָם
  chosen: and for the sojourner residing among them
  alternatives:
  - and for the resident foreigner living among them
  - and for the stranger who sojourns among them
  lexicon: HALOT
  rationale: גֵּר refers to a non-native resident living within Israelite society.
    'Sojourner' preserves the covenantal-legal category better than the broader 'stranger';
    'residing among them' renders the participial phrase naturally.
- source_word: לָנוּס שָׁמָּה
  chosen: might flee there
  alternatives:
  - to flee there
  - might run there for refuge
  lexicon: HALOT
  rationale: נוּס means 'flee.' 'Might flee there' fits the purpose clause in smooth
    English while retaining the concrete motion.
- source_word: כָּל מַכֵּה נֶפֶשׁ
  chosen: anyone who struck down a person
  alternatives:
  - whoever kills a person
  - any striker of a life
  lexicon: HALOT
  rationale: The idiom literally involves striking a person/life. 'Struck down a person'
    preserves the concrete verbal imagery while remaining idiomatic. 'Kills' is possible
    but slightly flattens the Hebrew expression.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - in error
  - accidentally
  lexicon: HALOT
  rationale: The term denotes inadvertence or lack of intent. 'Unintentionally' best
    matches the legal nuance in refuge-city legislation.
- source_word: וְלֹא יָמוּת בְּיַד גֹּאֵל הַדָּם
  chosen: and not die by the hand of the avenger of blood
  alternatives:
  - and not be put to death by the blood avenger
  - and not die at the hand of the kinsman-redeemer of blood
  lexicon: HALOT
  rationale: גֹּאֵל הַדָּם is the legal figure who avenges a slain relative. 'Avenger
    of blood' is the established and precise legal rendering; 'by the hand of' is
    a transparent idiom for agency.
- source_word: עַד עָמְדוֹ
  chosen: until he stood
  alternatives:
  - until he stands
  - until his standing
  lexicon: HALOT
  rationale: 'The infinitive construct with pronominal suffix after עַד expresses
    the point up to which protection lasts. English past-tense sequence after ''were''
    and ''might flee'' is natural here: ''until he stood.'''
- source_word: לִפְנֵי הָעֵדָה
  chosen: before the congregation
  alternatives:
  - before the assembly
  - before the community
  lexicon: HALOT
  rationale: עֵדָה in legal/national contexts often denotes the assembled community.
    'Congregation' preserves the formal communal-judicial sense; 'assembly' is possible
    but slightly less traditional in this legal formula.
