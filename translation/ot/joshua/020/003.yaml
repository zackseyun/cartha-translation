id: JOS.20.3
reference: Joshua 20:3
source:
  edition: WLC
  text: לָ/נ֥וּס שָׁ֨מָּ/ה֙ רוֹצֵ֔חַ מַכֵּה נֶ֥פֶשׁ בִּ/שְׁגָגָ֖ה בִּ/בְלִי דָ֑עַת
    וְ/הָי֤וּ לָ/כֶם֙ לְ/מִקְלָ֔ט מִ/גֹּאֵ֖ל הַ/דָּֽם־־׃
translation:
  text: so that a manslayer who strikes down a person unintentionally, without knowledge,
    may flee there, and they shall be for you a refuge from the avenger of blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'killer' or 'slayer'; the Hebrew term is qualified here by 'unintentionally'
      and 'without knowledge,' so it does not mean a deliberate murderer in this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the blood avenger'; the Hebrew phrase refers to the person responsible
      for avenging a death within Israel's kinship-based legal system.
    reason: cultural_note
lexical_decisions:
- source_word: לָנוּס
  chosen: may flee
  alternatives:
  - to flee
  - can flee
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ל expresses purpose after the previous
    command context: the cities are designated so that the killer may flee there.
    English finite verbal expression communicates the purpose naturally.'
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  - thither
  lexicon: HALOT
  rationale: Directional adverb referring to the cities of refuge just mentioned.
    'There' is natural modern English; 'thither' is archaic.
- source_word: רוֹצֵחַ
  chosen: manslayer
  alternatives:
  - murderer
  - killer
  - slayer
  lexicon: HALOT
  rationale: In this legal context the following qualifiers specify accidental killing,
    so 'murderer' would be misleading. 'Manslayer' is a concise legal-English term
    that can cover homicide without implying malice.
- source_word: מַכֵּה נֶפֶשׁ
  chosen: who strikes down a person
  alternatives:
  - who kills a person
  - who strikes a life
  - who fatally strikes someone
  lexicon: HALOT
  rationale: Literally 'one striking a soul/person.' The idiom denotes causing death.
    'Strikes down a person' preserves some formal connection to the Hebrew participial
    construction while clearly indicating lethal action.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - life
  - soul
  lexicon: HALOT
  rationale: Here נֶפֶשׁ in legal idiom refers to a human being rather than the abstract
    concept of soul. 'Person' best matches the sense in contemporary English.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - accidentally
  - in error
  lexicon: HALOT
  rationale: The term denotes inadvertence or accidental action in legal contexts.
    'Unintentionally' is precise and readable.
- source_word: בִּבְלִי דָעַת
  chosen: without knowledge
  alternatives:
  - unknowingly
  - without knowing
  - without awareness
  lexicon: HALOT
  rationale: The phrase intensifies the lack of intent or awareness. 'Without knowledge'
    stays close to the Hebrew while remaining understandable; it also preserves the
    legal nuance distinct from mere accident.
- source_word: וְהָיוּ לָכֶם לְמִקְלָט
  chosen: and they shall be for you a refuge
  alternatives:
  - and they will serve as a refuge for you
  - and they shall become a refuge for you
  lexicon: HALOT
  rationale: Plural verb refers to the cities. 'Shall be for you a refuge' is slightly
    formal but transparent and close to the Hebrew syntax.
- source_word: מִקְלָט
  chosen: refuge
  alternatives:
  - shelter
  - asylum
  lexicon: HALOT
  rationale: In the specific institution of cities of refuge, 'refuge' is the standard
    and clearest rendering. 'Asylum' may sound overly technical or politically colored
    in modern English.
- source_word: מִגֹּאֵל הַדָּם
  chosen: from the avenger of blood
  alternatives:
  - from the blood avenger
  - from the kinsman-avenger of blood
  lexicon: HALOT
  rationale: גֹּאֵל denotes a redeemer/kinsman-avenger in clan law; in this context
    the role is specifically the one who avenges bloodshed. 'Avenger of blood' is
    the most established and intelligible legal expression. The kinship nuance is
    real but not explicit in the immediate phrase, so it is preserved as an alternative
    rather than in the main text.
