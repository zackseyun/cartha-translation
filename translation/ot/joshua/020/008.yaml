id: JOS.20.8
reference: Joshua 20:8
source:
  edition: WLC
  text: וּ/מֵ/עֵ֜בֶר לְ/יַרְדֵּ֤ן יְרִיחוֹ֙ מִזְרָ֔חָ/ה נָתְנ֞וּ אֶת בֶּ֧צֶר בַּ/מִּדְבָּ֛ר
    בַּ/מִּישֹׁ֖ר מִ/מַּטֵּ֣ה רְאוּבֵ֑ן וְ/אֶת רָאמֹ֤ת בַּ/גִּלְעָד֙ מִ/מַּטֵּה גָ֔ד
    וְ/אֶת גלון בַּ/בָּשָׁ֖ן מִ/מַּטֵּ֥ה מְנַשֶּֽׁה־־־־׃
translation:
  text: And beyond the Jordan east of Jericho, they designated Bezer in the wilderness
    on the plateau from the tribe of Reuben, and Ramoth in Gilead from the tribe of
    Gad, and Golan in Bashan from the tribe of Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'Ramoth-gilead.' The Hebrew reads literally 'Ramoth in Gilead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵבֶר
  chosen: And beyond
  alternatives:
  - And on the other side of
  - And across
  lexicon: HALOT
  rationale: The prepositional phrase introduces the locations east of the Jordan
    relative to Canaan proper. 'Beyond' is concise and natural in English while preserving
    the spatial sense.
- source_word: לְיַרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The Hebrew proper name commonly refers to the river; English idiom normally
    says 'the Jordan.' 'River' is unnecessary here.
- source_word: יְרִיחוֹ מִזְרָחָה
  chosen: east of Jericho
  alternatives:
  - toward the east, opposite Jericho
  - on the east, at Jericho
  lexicon: HALOT
  rationale: 'Taken adverbially/geographically with the preceding phrase: the cities
    are located beyond the Jordan, east of Jericho. This is the most natural English
    rendering of the Hebrew directional construction.'
- source_word: נָתְנוּ
  chosen: they designated
  alternatives:
  - they appointed
  - they gave
  - they set apart
  lexicon: HALOT
  rationale: In context of naming cities of refuge, the verb means more than simple
    giving; it denotes official assignment/designation. 'Designated' captures the
    administrative action clearly.
- source_word: בֶּצֶר
  chosen: Bezer
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the pastureland
  lexicon: HALOT
  rationale: The term often denotes uncultivated steppe/wilderness. 'Wilderness' is
    the standard and suitably broad rendering.
- source_word: בַּמִּישֹׁר
  chosen: on the plateau
  alternatives:
  - in the plain
  - on the tableland
  lexicon: HALOT
  rationale: Refers to the level tableland region east of the Jordan. 'Plateau' communicates
    the topographical sense better for modern readers than the potentially misleading
    'plain.'
- source_word: מִמַּטֵּה רְאוּבֵן
  chosen: from the tribe of Reuben
  alternatives:
  - belonging to the tribe of Reuben
  lexicon: HALOT
  rationale: This identifies tribal allotment. 'From the tribe of' is idiomatic and
    clear.
- source_word: רָאמֹת בַּגִּלְעָד
  chosen: Ramoth in Gilead
  alternatives:
  - Ramoth-gilead
  lexicon: HALOT
  rationale: The Hebrew presents the city name plus region. Rendering it as 'Ramoth
    in Gilead' follows the form of the source text; the compounded traditional English
    form is worth preserving in a footnote.
- source_word: מִמַּטֵּה גָד
  chosen: from the tribe of Gad
  alternatives:
  - belonging to the tribe of Gad
  lexicon: HALOT
  rationale: Same tribal-allotment formula as with Reuben; consistency is maintained.
- source_word: גלון
  chosen: Golan
  lexicon: HALOT
  rationale: Proper place name; the consonantal form here corresponds to the well-known
    place name Golan. Standard English transliteration is used.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  lexicon: HALOT
  rationale: Regional name; 'in Bashan' is the natural locative rendering.
- source_word: מִמַּטֵּה מְנַשֶּׁה
  chosen: from the tribe of Manasseh
  alternatives:
  - belonging to the tribe of Manasseh
  lexicon: HALOT
  rationale: Same tribal-allotment formula; rendered consistently with the previous
    two occurrences.
