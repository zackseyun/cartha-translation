  chosen_reading: the LORD / O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering 'the LORD' for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern. The vocative
    form 'O LORD' fits direct address.
