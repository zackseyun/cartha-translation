id: PSA.88.14
reference: Psalms 88:14
source:
  edition: WLC
  text: וַ/אֲנִ֤י אֵלֶ֣י/ךָ יְהוָ֣ה שִׁוַּ֑עְתִּי וּ֝/בַ/בֹּ֗קֶר תְּֽפִלָּתִ֥/י תְקַדְּמֶֽ/ךָּ׀׃
translation:
  text: But as for me, O LORD, I cry out to you; in the morning my prayer comes before
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my prayer goes before you.' The Hebrew verb can carry the sense of coming
      before, meeting, or preceding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrastive emphasis.
    'But as for me' preserves the adversative force and the emphatic subject better
    than a bare 'I.'
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: The preposition expresses direction toward YHWH as the object of the
    cry. 'To you' is natural modern English and sufficiently formal.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' Because it is direct address
    in prayer, 'O LORD' is idiomatic English and preserves the vocative sense.
- source_word: שִׁוַּעְתִּי
  chosen: I cry out
  alternatives:
  - I have cried out
  - I call for help
  - I cried for help
  lexicon: HALOT
  rationale: The verb denotes a cry for help. In poetic prayer, the English present
    'I cry out' communicates the psalmist's ongoing appeal naturally, while remaining
    close to the Hebrew sense.
- source_word: וּבַבֹּקֶר
  chosen: in the morning
  alternatives:
  - and in the morning
  - at morning
  lexicon: HALOT
  rationale: The prefixed conjunction links the clause, but English reads more naturally
    without repeating 'and' after the semicolon. 'In the morning' is the clearest
    idiomatic rendering.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  lexicon: HALOT
  rationale: Straightforward nominal rendering; singular is retained.
- source_word: תְקַדְּמֶךָּ
  chosen: comes before you
  alternatives:
  - goes before you
  - meets you
  - confronts you
  lexicon: HALOT
  rationale: From קדם in the Hiphil, the sense is to come before, meet, or precede.
    With 'my prayer' as subject, 'comes before you' is idiomatic English that preserves
    the imagery of prayer arriving in God's presence without over-literal awkwardness.
