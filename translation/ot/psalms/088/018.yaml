id: PSA.88.18
reference: Psalms 88:18
source:
  edition: WLC
  text: סַבּ֣וּ/נִי כַ֭/מַּיִם כָּל הַ/יּ֑וֹם הִקִּ֖יפוּ עָלַ֣/י יָֽחַד־׃
translation:
  text: They surrounded me like water all day long; together they closed in on me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they encircled me ... they surrounded me,' preserving the tighter lexical
      parallel between the two Hebrew verbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַבּוּנִי
  chosen: they surrounded me
  alternatives:
  - they encircled me
  - they went around me
  lexicon: HALOT
  rationale: From סבב in the Qal perfect 3cp with 1cs suffix, indicating hostile encirclement
    of the psalmist. 'Surrounded me' is natural modern English and preserves the image
    without over-paraphrase.
- source_word: כַמַּיִם
  chosen: like water
  alternatives:
  - like waters
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like water' is idiomatic in English
    and conveys the overwhelming, engulfing simile; plural 'waters' is possible but
    less natural here.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: A temporal expression meaning throughout the day. 'All day long' is a
    readable modern equivalent that preserves durative force.
- source_word: הִקִּיפוּ
  chosen: they closed in
  alternatives:
  - they surrounded
  - they encircled
  lexicon: HALOT
  rationale: From נקף/נקף-related stem as given by the morphology table, here parallel
    to the previous verb and intensifying the sense of being hemmed in. To avoid wooden
    repetition with סַבּוּנִי while preserving the parallelism, 'closed in' expresses
    hostile tightening of the circle.
- source_word: עָלַי
  chosen: on me
  alternatives:
  - against me
  - around me
  lexicon: HALOT
  rationale: The preposition על commonly means 'on/upon,' but in this hostile context
    can shade toward pressure directed against the speaker. 'On me' keeps the Hebrew
    image and fits 'closed in on me' idiomatically.
- source_word: יָחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: Adverb indicating collective action. 'Together' is the clearest modern
    rendering and preserves the sense that the threatening forces act in concert.
