id: PSA.88.0
reference: Psalms 88:0
source:
  edition: WLC
  text: שִׁ֥יר מִזְמ֗וֹר לִ/בְנֵ֫י קֹ֥רַח לַ/מְנַצֵּ֣חַ עַל מָחֲלַ֣ת לְ/עַנּ֑וֹת מַ֝שְׂכִּ֗יל לְ/הֵימָ֥ן הָ/אֶזְרָחִֽי־׃
translation:
  text: 'A song. A psalm of the sons of Korah. For the choirmaster: according to Mahalath Leannoth[a]. A Maskil[b] of Heman the Ezrahite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The expression 'Mahalath Leannoth' is uncertain. It may refer to a tune or musical style; other proposals include 'according to Mahalath, for responsive singing' or 'according to Mahalath, concerning affliction.'
    reason: lexical_alternative
  - marker: b
    text: '''Maskil'' is a technical term in psalm headings, often understood as an instructive or contemplative composition.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''A song[a]. A psalm of the sons of Korah. For the choirmaster: according to Mahalath Leannoth[b]. A Maskil''.'
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: Superscription genre label; rendered straightforwardly as 'song.' The article is supplied idiomatically in English.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - melody
  - musical psalm
  lexicon: HALOT
  rationale: Standard genre term for a psalm/song accompanied by music. 'Psalm' is the clearest established English equivalent in superscriptions.
- source_word: לִבְנֵי קֹרַח
  chosen: of the sons of Korah
  alternatives:
  - for the sons of Korah
  - belonging to the sons of Korah
  lexicon: HALOT
  rationale: The prefixed ל can indicate authorship, association, or dedication in psalm headings. 'Of the sons of Korah' is the most natural concise English rendering and preserves the ambiguity better than forcing 'for'.
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director of music
  - To the leader
  lexicon: HALOT
  rationale: Conventional superscription term indicating musical direction. 'Choirmaster' is readable modern English and suitably specific without overinterpreting.
- source_word: עַל
  chosen: according to
  alternatives:
  - upon
  - 'on'
  - set to
  lexicon: HALOT
  rationale: In musical headings עַל often introduces the tune, style, or performance direction. 'According to' preserves that function without claiming certainty about the exact technical sense.
- source_word: מָחֲלַת
  chosen: Mahalath
  alternatives:
  - sickness
  - Mahalath (a tune name)
  lexicon: HALOT
  rationale: The term's precise meaning in superscriptions is uncertain; it is commonly treated as a tune or musical term. Following the philosophy to transliterate uncertain names/technical labels rather than overtranslate, 'Mahalath' is retained.
- source_word: לְעַנּוֹת
  chosen: Leannoth
  alternatives:
  - for singing responsively
  - for affliction
  - to answer
  lexicon: HALOT
  rationale: The exact force of this infinitive/technical expression in the heading is disputed. To avoid overstating a debated interpretation, it is transliterated in the main text, with interpretive alternatives preserved in a footnote.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: Technical psalm heading term with uncertain nuance. Transliteration best preserves the source without flattening the ambiguity.
- source_word: לְהֵימָן
  chosen: of Heman
  alternatives:
  - for Heman
  - belonging to Heman
  lexicon: HALOT
  rationale: As with other ל phrases in superscriptions, the relation may be authorship or association. 'Of Heman' is idiomatic and preserves the ambiguity.
- source_word: הָאֶזְרָחִי
  chosen: the Ezrahite
  alternatives:
  - the Zerahite
  lexicon: HALOT
  rationale: Gentilic/title identifying Heman. 'Ezrahite' follows the consonantal form as traditionally represented in English; 'Zerahite' is a possible interpretive connection but less direct here.
