id: PSA.88.15
reference: Psalms 88:15
source:
  edition: WLC
  text: לָ/מָ֣ה יְ֭הוָה תִּזְנַ֣ח נַפְשִׁ֑/י תַּסְתִּ֖יר פָּנֶ֣י/ךָ מִמֶּֽ/נִּי׃
translation:
  text: Why, O Yahweh, do you reject my soul? Why do you hide your face from me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you reject me?' Hebrew 'my soul' can also mean 'me' or 'my life.'
    reason: lexical_alternative
  - marker: b
    text: '''Hide your face'' is a Hebrew idiom for withdrawing favorable presence or attention.'
    reason: cultural_note
lexical_decisions:
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative of reason; simple 'Why' is the most natural modern English equivalent and preserves the lament's force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תִּזְנַח
  chosen: reject
  alternatives:
  - cast off
  - spurn
  - forsake
  lexicon: HALOT
  rationale: The verb denotes rejecting or casting off. 'Reject' is clear modern English and fits the psalm's complaint without sounding archaic. 'Forsake' is possible but can suggest abandonment more than repudiation; 'reject' better matches the lexical core.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - me
  - my life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, or life depending on context. Here retaining 'my soul' preserves the Hebrew expression and the emotional-spiritual depth of the lament. Alternatives are viable, but the more literal rendering is still natural in English.
- source_word: תַּסְתִּיר
  chosen: hide
  alternatives:
  - conceal
  lexicon: HALOT
  rationale: Straightforward rendering of the Hiphil verb 'to hide/conceal.' 'Hide' is idiomatic and concise.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' In Hebrew this often implies presence or favor, but the concrete idiom should be preserved in the main text; the implied sense is well understood in biblical English.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Standard prepositional rendering; 'from me' is sufficient and natural.
