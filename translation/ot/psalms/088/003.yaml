id: PSA.88.3
reference: Psalms 88:3
source:
  edition: WLC
  text: תָּב֣וֹא לְ֭/פָנֶי/ךָ תְּפִלָּתִ֑/י הַטֵּֽה אָ֝זְנְ/ךָ֗ לְ/רִנָּתִֽ/י־׃
translation:
  text: May my prayer come before you; incline your ear to my cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let my prayer come before you.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'before your face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֣וֹא
  chosen: May ... come
  alternatives:
  - let ... come
  - comes
  lexicon: HALOT
  rationale: 'Qal imperfect 3fs of בוא agrees with the feminine subject ''my prayer.''
    In this prayer context, the imperfect is best rendered as a jussive-like petition
    in English: ''May my prayer come,'' rather than a simple future ''will come''
    or present ''comes.'''
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - into your presence
  - before your face
  lexicon: HALOT
  rationale: Literally 'to/before your face,' an idiom for appearing in someone's
    presence. 'Before you' is natural modern English while preserving the relational
    and cultic sense of direct address to God.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: The standard sense of תפלה is 'prayer.' 'Plea' would heighten the emotional
    tone but is narrower than the Hebrew noun here.
- source_word: הַטֵּה
  chosen: incline
  alternatives:
  - turn
  - bend
  - give heed with
  lexicon: HALOT
  rationale: Hiphil imperative of נטה literally means 'stretch out, extend, incline.'
    With 'ear' as object, 'incline' is the established and accurate idiom in English,
    preserving the metaphor of attentive listening without sounding archaic in this
    context.
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: The singular 'ear' should be retained, matching the Hebrew idiom for
    attentive listening.
- source_word: לְרִנָּתִי
  chosen: to my cry
  alternatives:
  - to my ringing cry
  - to my shout
  - to my plea
  lexicon: HALOT
  rationale: רנה can denote a ringing cry, shout, or cry of lament/praise depending
    on context. In Psalm 88's lament setting, 'cry' best fits the emotional force
    without importing joy, which 'shout' might suggest.
