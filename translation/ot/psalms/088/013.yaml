theological_decisions:
- issue: Rendering of צדקה in a poetic context involving God's character and acts
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can denote both moral righteousness and justice. Following
    the project's default rendering for this contested term, 'righteousness' is used
    in the main text, while the contextual alternative 'justice' is preserved in a
    footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη / righteousness | justice'
