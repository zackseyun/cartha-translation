id: PSA.88.13
reference: Psalms 88:13
source:
  edition: WLC
  text: הֲ/יִוָּדַ֣ע בַּ/חֹ֣שֶׁךְ פִּלְאֶ֑/ךָ וְ֝/צִדְקָתְ/ךָ֗ בְּ/אֶ֣רֶץ נְשִׁיָּֽה׃
translation:
  text: Is your wonder made known in the darkness, or your righteousness in the land
    of forgetfulness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice.'
    reason: lexical_alternative
  - marker: b
    text: '''The land of forgetfulness'' is a poetic expression for the realm of the
      dead.'
    reason: cultural_note
lexical_decisions:
- source_word: הֲ/יִוָּדַע
  chosen: Is ... made known
  alternatives:
  - Is ... known
  - Will ... be known
  lexicon: HALOT
  rationale: Nifal imperfect of ידע used in an interrogative clause; rendered as a
    passive English question. 'Made known' preserves the passive nuance more clearly
    than the simpler 'known,' while 'will be known' is possible but less necessary
    in English here.
- source_word: בַּ/חֹשֶׁךְ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: HALOT
  rationale: With the preposition and article, the phrase is naturally rendered 'in
    the darkness.' In context it evokes the realm of death/Sheol rather than merely
    absence of light.
- source_word: פִּלְאֶךָ
  chosen: your wonder
  alternatives:
  - your wonders
  - your marvelous deed
  - your miracle
  lexicon: HALOT
  rationale: The singular noun with 2ms suffix is best represented by the collective-singular
    'your wonder.' English singular here can denote God's wondrous power or deed generally.
    'Wonders' is idiomatic in some traditions but does not match the singular form
    as closely.
- source_word: וְצִדְקָתְךָ
  chosen: or your righteousness
  alternatives:
  - and your righteousness
  - or your justice
  lexicon: HALOT
  rationale: The conjunction links the second rhetorical question in parallel with
    the first; English 'or' fits the interrogative parallelism better than a bare
    'and.' צדקה commonly means 'righteousness,' though 'justice' is a viable contextual
    alternative; the default doctrinal guidance favors 'righteousness' with alternatives
    preserved where relevant.
- source_word: בְּאֶרֶץ
  chosen: in the land
  alternatives:
  - in a land
  lexicon: HALOT
  rationale: Construct-like phrase with following noun is idiomatically 'in the land
    of ...' referring metaphorically to the realm of the dead.
- source_word: נְשִׁיָּה
  chosen: forgetfulness
  alternatives:
  - oblivion
  - forgetting
  lexicon: HALOT
  rationale: The noun denotes forgetfulness/oblivion. 'Forgetfulness' is more transparent
    and less interpretively loaded than 'oblivion,' while still conveying the psalm's
    imagery of the dead as removed from remembered praise.
