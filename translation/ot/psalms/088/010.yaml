id: PSA.88.10
reference: Psalms 88:10
source:
  edition: WLC
  text: עֵינִ֥/י דָאֲבָ֗ה מִנִּ֫י עֹ֥נִי קְרָאתִ֣י/ךָ יְהוָ֣ה בְּ/כָל י֑וֹם שִׁטַּ֖חְתִּי
    אֵלֶ֣י/ךָ כַפָּֽ/י־׃
translation:
  text: My eye grows weak because of affliction; I call on you every day, O LORD;
    I spread out my hands to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My eye wastes away from affliction' or 'My eye is in pain because of
      misery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינִי
  chosen: My eye
  alternatives:
  - My eyes
  lexicon: HALOT
  rationale: The Hebrew is singular ('my eye'), a common idiom for the person's sight
    or vitality. Retaining the singular is more formally accurate and preserves the
    poetic concreteness; English can still understand it idiomatically.
- source_word: דָאֲבָה
  chosen: grows weak
  alternatives:
  - wastes away
  - is in pain
  - languishes
  lexicon: HALOT
  rationale: The verb conveys pining, languishing, or wasting from suffering. 'Grows
    weak' communicates the result in natural English without over-specifying physical
    pain.
- source_word: מִנִּי עֹנִי
  chosen: because of affliction
  alternatives:
  - from affliction
  - because of my misery
  lexicon: HALOT
  rationale: The preposition with עֹנִי indicates cause/source. 'Affliction' fits
    the psalm's suffering context and is a standard rendering of עֹנִי; 'because of'
    makes the causal sense clear in English.
- source_word: קְרָאתִיךָ
  chosen: I call on you
  alternatives:
  - I have called to you
  - I cry out to you
  lexicon: HALOT
  rationale: The qatal here functions naturally as present/habitual in the poetic
    context, especially with 'every day.' 'Call on' captures prayerful invocation
    without adding intensity not explicit in the verb alone.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    The vocative particle is naturally represented by 'O' in English prayer language.
- source_word: בכל יום
  chosen: every day
  alternatives:
  - all day
  - each day
  lexicon: HALOT
  rationale: The phrase denotes regular daily repetition. 'Every day' best matches
    the distributive sense here; 'all day' would suggest continual duration within
    a single day, which is less likely.
- source_word: שִׁטַּחְתִּי
  chosen: I spread out
  alternatives:
  - I stretch out
  - I spread
  lexicon: HALOT
  rationale: The verb refers to spreading out the hands in prayer or supplication.
    'Spread out' is idiomatic and preserves the physical prayer gesture.
- source_word: כפי
  chosen: my hands
  alternatives:
  - my palms
  lexicon: HALOT
  rationale: Though the noun can refer specifically to the palms, 'hands' is the natural
    English expression for the gesture of prayer and avoids awkwardness while preserving
    meaning.
