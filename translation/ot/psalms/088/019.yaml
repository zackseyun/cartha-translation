id: PSA.88.19
reference: Psalms 88:19
source:
  edition: WLC
  text: הִרְחַ֣קְתָּ מִ֭מֶּ/נִּי אֹהֵ֣ב וָ/רֵ֑עַ מְֽיֻדָּעַ֥/י מַחְשָֽׁךְ׃
translation:
  text: You have put far from me lover and friend; my acquaintances are darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my acquaintances are in darkness,' or 'darkness is my only companion.'
      The Hebrew ending is notably terse and has been understood in more than one
      way.
    reason: alternative_reading
  - marker: b
    text: Or 'darkness is my acquaintances'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִרְחַקְתָּ
  chosen: You have put far
  alternatives:
  - You have removed
  - You have driven away
  - You have caused to be far
  lexicon: HALOT
  rationale: 'Hiphil perfect 2ms of רחק expresses causative distancing by God addressed
    directly: ''you have made distant/put far.'' ''Put far'' is idiomatic modern English
    and preserves the causative force better than a flatter ''are far.'''
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix marks separation from the psalmist.
    'From me' is the natural complement to 'put far.'
- source_word: אֹהֵב
  chosen: lover
  alternatives:
  - one who loves me
  - beloved
  lexicon: HALOT
  rationale: As a substantive participle from אהב, the word denotes a loving companion.
    'Lover' is concise and preserves the personal, relational sense; 'beloved' would
    shift the perspective and imply the one loved rather than the one loving.
- source_word: וָרֵעַ
  chosen: and friend
  alternatives:
  - and companion
  - and neighbor
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a friend or companion in relational contexts. Here
    paired with אֹהֵב, 'friend' best fits the lament over lost close relationships.
- source_word: מְיֻדָּעַי
  chosen: my acquaintances
  alternatives:
  - my known ones
  - those who know me
  - my companions
  lexicon: HALOT
  rationale: Passive/denominative form from ידע with 1cs suffix refers to those known
    to the speaker, i.e., acquaintances. This keeps the lexical link to 'known' without
    overinterpreting as intimate friends, since that role is already covered by 'lover
    and friend.'
- source_word: מַחְשָׁךְ
  chosen: darkness is
  alternatives:
  - darkness
  - in darkness
  - are darkness
  lexicon: HALOT
  rationale: 'The final noun stands elliptically. The MT most naturally yields a verbless
    clause with ''darkness'' predicated of the preceding term: ''my acquaintances
    are darkness'' or ''darkness is my acquaintance(s).'' To preserve the Hebrew terseness
    while producing intelligible English, the draft renders it as a verbless-style
    predicate with supplied copula. Because the singular noun with plural antecedent
    is awkward in English, the wording keeps the starkness rather than smoothing too
    much.'
