  from: darkness is my acquaintances
  to: my acquaintances are darkness
  rationale: The Hebrew phrase `מְיֻדָּעַי מַחְשָׁךְ` is a verbless clause where the
    subject ('my acquaintances') most naturally precedes the predicate ('darkness').
    The draft inverts this to make 'darkness' the subject. While this interpretive
    choice is common (e.g., 'darkness is my only friend'), the specific rendering
    'darkness is my acquaintances' is awkward in English, equating a singular subject
    with a plural predicate nominative. A more direct translation, 'my acquaintances
    are darkness,' is faithful to the Hebrew syntax and word order, and is arguably
    just as metaphorically powerful, suggesting that the psalmist's companions have
    become synonymous with darkness itself.
