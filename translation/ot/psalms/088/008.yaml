theological_decisions:
- issue: Depiction of divine anger and agency in suffering
  chosen_reading: 'The verse is rendered straightforwardly as the psalmist addressing
    God: God''s wrath rests on him, and God afflicts him with all his breakers.'
  alternative_readings:
  - Soften divine agency by making the imagery more impersonal
  - Reduce 'wrath' to mere distress
  rationale: The Hebrew directly attributes both wrath and affliction to God in lament.
    Per translation philosophy, the draft preserves the theological tension rather
    than softening the text's claim about divine agency in suffering.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
