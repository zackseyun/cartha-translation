id: PSA.88.8
reference: Psalms 88:8
source:
  edition: WLC
  text: עָ֭לַ/י סָמְכָ֣ה חֲמָתֶ֑/ךָ וְ/כָל מִ֝שְׁבָּרֶ֗י/ךָ עִנִּ֥יתָ סֶּֽלָה־׃
translation:
  text: Your wrath has rested on me, and with all your breakers you have afflicted
    me. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'waves' or 'billows' for 'breakers.' The Hebrew term evokes breaking
      sea-waves.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָמְכָה
  chosen: has rested
  alternatives:
  - has lain
  - has pressed
  - has been supported
  lexicon: HALOT
  rationale: The verb from סמך literally involves support/leaning, but in this context
    with wrath as subject and עָלַי ('upon me'), the sense is that wrath has come
    to rest or lain heavily upon the psalmist. 'Has rested on me' preserves the spatial
    imagery without over-paraphrasing into an interpretive gloss like 'weighed heavily.'
- source_word: חֲמָתֶךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your rage
  lexicon: HALOT
  rationale: חֵמָה commonly denotes wrath, heat, or fury. 'Wrath' is the most natural
    English equivalent in lament and judgment contexts and preserves the theological
    gravity of divine anger.
- source_word: מִשְׁבָּרֶיךָ
  chosen: your breakers
  alternatives:
  - your waves
  - your billows
  - your surges
  lexicon: HALOT
  rationale: מִשְׁבָּר literally refers to breakers or breaking waves. 'Breakers'
    is more textually precise than the traditional smoothing to 'waves' and fits the
    psalm's watery affliction imagery. Because 'waves' is a familiar alternative,
    it is preserved in a footnote.
- source_word: עִנִּיתָ
  chosen: you have afflicted me
  alternatives:
  - you have humbled me
  - you have oppressed me
  lexicon: HALOT
  rationale: ענה in the Piel commonly means to afflict, humble, or oppress. Given
    the direct object is implied by context ('me') and the verse describes divine
    suffering brought upon the speaker, 'you have afflicted me' best captures the
    force without narrowing it to social oppression.
- source_word: וְכָל
  chosen: and with all
  alternatives:
  - and all
  - even all
  lexicon: HALOT
  rationale: The conjunction plus כָּל links the second clause and intensifies the
    totality of the breakers. Rendering it as 'and with all' makes explicit in idiomatic
    English that the affliction is effected by means of all God's breakers, while
    remaining close to the Hebrew sense.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning remains uncertain; standard practice is to
    transliterate rather than translate. This preserves the liturgical marker without
    claiming more certainty than the evidence allows.
