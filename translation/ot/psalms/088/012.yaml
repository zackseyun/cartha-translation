theological_decisions:
- issue: Whether אבדון should be rendered as a common noun ('destruction') or retained
    as the poetic underworld term 'Abaddon'
  chosen_reading: Render as 'Abaddon' in the main text
  alternative_readings:
  - destruction
  - the place of destruction
  rationale: In this poetic parallelism with 'the grave,' אבדון likely refers not
    merely to abstract ruin but to the realm of the dead/destruction. Retaining 'Abaddon'
    preserves the Hebrew term's literary and theological resonance while avoiding
    flattening the parallelism. The more interpretive alternatives are preserved in
    a footnote.
