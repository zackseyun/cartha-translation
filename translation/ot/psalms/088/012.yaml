id: PSA.88.12
reference: Psalms 88:12
source:
  edition: WLC
  text: הַ/יְסֻפַּ֣ר בַּ/קֶּ֣בֶר חַסְדֶּ֑/ךָ אֱ֝מֽוּנָתְ/ךָ֗ בָּ/אֲבַדּֽוֹן׃
translation:
  text: Is your steadfast love declared in the grave, your faithfulness in Abaddon?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in destruction' or 'in the place of destruction.' Hebrew 'Abaddon' is
      a poetic term for the realm of ruin/death.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיְסֻפַּר
  chosen: Is ... declared
  alternatives:
  - Is ... recounted
  - Is ... told
  - Is ... proclaimed
  lexicon: HALOT
  rationale: 'The verb ספר in the Pual imperfect with interrogative ה introduces a
    rhetorical question: ''is it recounted/declared?'' ''Declared'' is natural modern
    English and preserves the passive sense without over-paraphrasing.'
- source_word: בַּקֶּבֶר
  chosen: in the grave
  alternatives:
  - in the tomb
  - in the burial place
  lexicon: HALOT
  rationale: קבר denotes a grave/burial place. 'Grave' is the most idiomatic and suitably
    broad English equivalent here.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד commonly carries covenantal loyalty and enduring love. 'Steadfast
    love' is the standard balanced rendering in Psalms, preserving theological weight
    without archaic diction.
- source_word: אֱמוּנָתְךָ
  chosen: your faithfulness
  alternatives:
  - your fidelity
  - your trustworthiness
  lexicon: HALOT
  rationale: אֱמוּנָה here refers to God's reliability/faithfulness, parallel to חסד.
    'Faithfulness' best captures the attribute in clear modern English.
- source_word: בָּאֲבַדּוֹן
  chosen: in Abaddon
  alternatives:
  - in destruction
  - in the place of destruction
  lexicon: HALOT
  rationale: אבדון can denote destruction or the realm/place of destruction, often
    parallel to Sheol/grave. Because it functions here as a poetic underworld term
    and has become a recognizable biblical proper-like term, 'Abaddon' preserves the
    Hebrew imagery more precisely; the lexical alternative 'destruction' is worth
    preserving in a footnote.
