id: PSA.88.9
reference: Psalms 88:9
source:
  edition: WLC
  text: הִרְחַ֥קְתָּ מְיֻדָּעַ֗/י מִ֫מֶּ֥/נִּי שַׁתַּ֣/נִי תוֹעֵב֣וֹת לָ֑/מוֹ כָּ֝לֻ֗א
    וְ/לֹ֣א אֵצֵֽא׃
translation:
  text: You have driven my companions far from me; you have made me abhorrent to them.
    I am confined and cannot go out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my acquaintances' or 'those known to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have made me an abomination to them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I am shut up and cannot go out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְחַקְתָּ
  chosen: have driven ... far
  alternatives:
  - have put ... far away
  - have removed
  lexicon: HALOT
  rationale: Hiphil of רחק expresses causing distance or removal. 'Driven ... far'
    captures both causation and the emotional force of the lament in idiomatic English.
- source_word: מְיֻדָּעַי
  chosen: my companions
  alternatives:
  - my acquaintances
  - those known to me
  - my friends
  lexicon: HALOT
  rationale: From ידע in the passive/nominal sense, referring to people known to the
    speaker. 'Companions' is more natural and relational in context than the stiffer
    'acquaintances,' while avoiding overstating intimacy with 'friends.'
- source_word: מִמֶּנִּי
  chosen: from me
  lexicon: HALOT
  rationale: Standard separation sense of מן with 1cs suffix.
- source_word: שַׁתַּנִי
  chosen: have made me
  alternatives:
  - have set me as
  - have placed me
  lexicon: HALOT
  rationale: Qal of שׂים often means 'set/place,' but with a predicate accusative
    here it idiomatically means 'make/render'.
- source_word: תוֹעֵבוֹת
  chosen: abhorrent
  alternatives:
  - an abomination
  - detestable
  lexicon: HALOT
  rationale: 'Though formally a plural noun, the sense here is predicative: the psalmist
    has been made something loathsome in others'' eyes. ''Abhorrent'' gives natural
    English while preserving the strong revulsion of תועבה language.'
- source_word: לָמוֹ
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Pronominal form referring to the previously mentioned companions; 'to
    them' fits the predicative construction in English.
- source_word: כָּלֻא
  chosen: I am confined
  alternatives:
  - I am shut up
  - I am imprisoned
  lexicon: HALOT
  rationale: Passive/stative sense from כלא, denoting being restrained or shut in.
    'Confined' is clear modern English and avoids over-specifying a formal prison
    if the image is broader.
- source_word: וְלֹא אֵצֵא
  chosen: and cannot go out
  alternatives:
  - and I do not go out
  - and I cannot escape
  lexicon: HALOT
  rationale: Though formally 'and I do not go out,' in context following 'I am confined'
    the sense is inability rather than mere non-action. 'Cannot go out' best conveys
    the lament's force.
