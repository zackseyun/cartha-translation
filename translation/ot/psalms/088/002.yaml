id: PSA.88.2
reference: Psalms 88:2
source:
  edition: WLC
  text: יְ֭הוָה אֱלֹהֵ֣י יְשׁוּעָתִ֑/י יוֹם צָעַ֖קְתִּי בַ/לַּ֣יְלָה נֶגְדֶּֽ/ךָ־׃
translation:
  text: O Yahweh, God of my salvation, by day I cry out; at night I am before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before you''; the clause is verbless, so English supplies ''I am'' for clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name יְהוָה, with 'O' reflecting direct address in prayer. Alternatives are preserved in documentation but not used in the main text.
- source_word: אֱלֹהֵי
  chosen: God of
  alternatives:
  - my God, the God of
  lexicon: HALOT
  rationale: Construct form with following noun and suffix yields 'God of my salvation.' This is the most natural English representation of the Hebrew construct chain.
- source_word: יְשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my rescue
  lexicon: HALOT
  rationale: The noun can denote salvation, deliverance, or rescue. 'My salvation' best preserves the lexical form and the psalm's prayerful-theological register without over-specifying the kind of deliverance.
- source_word: יוֹם
  chosen: by day
  alternatives:
  - in the daytime
  - day
  lexicon: HALOT
  rationale: Although literally 'day,' in this adverbial setting paired with 'at night' it is best rendered idiomatically as 'by day.'
- source_word: צָעַקְתִּי
  chosen: I cry out
  alternatives:
  - I have cried out
  - I called out
  lexicon: HALOT
  rationale: Qal perfect 1cs can be rendered as a present-like perfective in poetic prayer. 'I cry out' fits the ongoing lament context and pairs naturally with the following night clause. 'Called out' is possible but weaker than the urgent sense of צעק.
- source_word: בַלַּיְלָה
  chosen: at night
  alternatives:
  - in the night
  - by night
  lexicon: HALOT
  rationale: Idiomatic temporal rendering paired with 'by day.' 'At night' is natural modern English while preserving the temporal contrast.
- source_word: נֶגְדֶּךָ
  chosen: I am before you
  alternatives:
  - before you
  - in your presence
  - in front of you
  lexicon: HALOT
  rationale: The Hebrew prepositional phrase literally means 'before you' or 'in front of you.' Because English normally requires a predicate to complete the second clause after 'at night,' 'I am before you' makes explicit the verbless poetic sense without adding substantial meaning. It also conveys prayerful presence before God.
