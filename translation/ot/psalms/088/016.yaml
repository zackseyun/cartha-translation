theological_decisions:
- issue: Reference of 'your terrors'
  chosen_reading: The phrase addresses God directly and attributes the terrors to
    his dealings with the psalmist, without softening the divine agency.
  alternative_readings:
  - The terrors are merely terrors felt in God's presence rather than sent by him.
  rationale: The second-person suffix naturally points to terrors belonging to or
    coming from God. The translation preserves the psalm's theological tension and
    does not dilute the lament's direct address.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
