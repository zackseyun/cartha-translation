id: PSA.88.16
reference: Psalms 88:16
source:
  edition: WLC
  text: עָ֘נִ֤י אֲנִ֣י וְ/גֹוֵ֣עַ מִ/נֹּ֑עַר נָשָׂ֖אתִי אֵמֶ֣י/ךָ אָפֽוּנָה׃
translation:
  text: I am afflicted and near death from my youth; I bear your terrors; I am overwhelmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have borne your terrors; I am distraught/confounded.' The final verb
      is difficult and may express being overwhelmed, bewildered, or undone.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנִי
  chosen: afflicted
  alternatives:
  - poor
  - humble
  - wretched
  lexicon: HALOT
  rationale: In lament contexts the adjective commonly denotes being afflicted or
    miserable rather than economically poor. 'Afflicted' fits the psalm's sustained
    language of suffering.
- source_word: וְגֹוֵעַ
  chosen: near death
  alternatives:
  - dying
  - expiring
  lexicon: HALOT
  rationale: The participle from גוע conveys perishing or dying. 'Near death' gives
    natural English while preserving the ongoing state implied by the participle;
    'dying' is possible but can sound too immediate in English.
- source_word: מִנֹּעַר
  chosen: from my youth
  alternatives:
  - from youth
  lexicon: HALOT
  rationale: The preposition marks duration from an early stage of life. Supplying
    'my' is idiomatic in English and reflects the first-person context.
- source_word: נָשָׂאתִי
  chosen: I bear
  alternatives:
  - I have borne
  - I carry
  - I endured
  lexicon: HALOT
  rationale: The verb נשׂא literally means to lift, carry, or bear. Here it expresses
    carrying/enduring divine terrors. Present 'I bear' fits the poetic sequence and
    current distress, though a perfective nuance ('I have borne') is also possible.
- source_word: אֵמֶיךָ
  chosen: your terrors
  alternatives:
  - your horrors
  - your dreadful things
  lexicon: HALOT
  rationale: The plural noun denotes terrors or frightful things. 'Your terrors' is
    the most direct and idiomatic rendering in context, referring to terrors associated
    with God's dealings.
- source_word: אָפוּנָה
  chosen: I am overwhelmed
  alternatives:
  - I am distraught
  - I am helpless
  - I am confounded
  lexicon: HALOT
  rationale: The form is difficult, but in context it conveys being engulfed, bewildered,
    or undone by the terrors mentioned. 'I am overwhelmed' captures the emotional
    and existential force without over-specifying the nuance.
