theological_decisions:
- issue: Agency of God in the lament
  chosen_reading: 'Retained direct second-person address: ''You have put me'''
  alternative_readings:
  - Impersonalized renderings that soften divine agency
  rationale: The Hebrew explicitly addresses God as the one who has placed the psalmist
    in this condition. Preserving this maintains the theological tension of lament
    rather than resolving or softening it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
