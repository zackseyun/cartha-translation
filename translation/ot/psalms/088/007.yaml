id: PSA.88.7
reference: Psalms 88:7
source:
  edition: WLC
  text: שַׁ֭תַּ/נִי בְּ/ב֣וֹר תַּחְתִּיּ֑וֹת בְּ֝/מַחֲשַׁכִּ֗ים בִּ/מְצֹלֽוֹת׃
translation:
  text: You have put me in the lowest pit, in dark places, in the depths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have set me in the nethermost pit, in darkness, in the deep places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁתַּנִי
  chosen: You have put me
  alternatives:
  - You have set me
  - You placed me
  lexicon: HALOT
  rationale: From שׁית/שׂים ('to put, set, place') with 2ms subject and 1cs object.
    'You have put me' is natural modern English and preserves the direct attribution
    to God in the psalmist's lament.
- source_word: בְּבוֹר
  chosen: in the pit
  alternatives:
  - in a pit
  - in the cistern
  - in the grave
  lexicon: HALOT
  rationale: בּוֹר commonly denotes a pit, cistern, or dungeon-like hole. In this
    poetic context of near-death and Sheol imagery, 'pit' best preserves the metaphor
    without over-interpreting it as 'grave'.
- source_word: תַּחְתִּיּוֹת
  chosen: lowest
  alternatives:
  - lowest places
  - nethermost
  - lowest regions
  lexicon: HALOT
  rationale: An adjective/noun from 'lower parts, lowest places.' Rendered attributively
    with 'pit' as 'the lowest pit' for idiomatic English while preserving the superlative
    sense of extreme depth.
- source_word: בְּמַחֲשַׁכִּים
  chosen: in dark places
  alternatives:
  - in darkness
  - in dark regions
  lexicon: HALOT
  rationale: Plural noun 'dark places/darknesses.' The plural is retained conceptually
    by 'dark places,' which fits the parallelism and avoids flattening the imagery
    into an abstract singular.
- source_word: בִּמְצֹלוֹת
  chosen: in the depths
  alternatives:
  - in the deep places
  - in the deeps
  lexicon: HALOT
  rationale: From a noun denoting depths, especially deep waters or deep places. 'In
    the depths' is idiomatic and preserves the poetic image of overwhelming, abyss-like
    depth.
