theological_decisions:
- issue: Meaning of רְפָאִים in poetic underworld context
  chosen_reading: the departed spirits
  alternative_readings:
  - the shades
  - the dead
  - Rephaim
  rationale: The verse speaks of the dead and their inability to participate in praise.
    Rendering רְפָאִים as 'the departed spirits' preserves the underworld connotation
    without importing later doctrinal claims about the intermediate state. A more
    literal 'shades' is preserved in a footnote as a lexical alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
