id: PSA.88.11
reference: Psalms 88:11
source:
  edition: WLC
  text: הֲ/לַ/מֵּתִ֥ים תַּעֲשֶׂה פֶּ֑לֶא אִם רְ֝פָאִ֗ים יָק֤וּמוּ יוֹד֬וּ/ךָ סֶּֽלָה־־׀׃
translation:
  text: Do you work wonders for the dead? Do the departed spirits rise up to praise
    you? Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shades' for 'the departed spirits'; Hebrew Rephaim, a poetic term
      for the dead in the underworld.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלַמֵּתִים
  chosen: for the dead
  alternatives:
  - for the dead ones
  - for the deceased
  lexicon: HALOT
  rationale: The interrogative הֲ with לַ marks the question 'for the dead?' or 'on
    behalf of the dead?'. 'The dead' is the most natural and idiomatic English rendering
    and preserves the psalm's rhetorical force.
- source_word: תַּעֲשֶׂה
  chosen: do you work
  alternatives:
  - do you do
  - will you do
  - do you perform
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but with פֶּלֶא the idiom is 'do/work wonders.'
    Present English rhetorical present best fits the lament context.
- source_word: פֶּלֶא
  chosen: wonders
  alternatives:
  - a wonder
  - miracle
  lexicon: HALOT
  rationale: Though singular in Hebrew, English commonly uses the plural in this collocation
    ('work wonders'). 'Miracle' is possible but slightly narrows the sense beyond
    the broader idea of extraordinary divine acts.
- source_word: אִם
  chosen: Do
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: Here אִם introduces a second rhetorical question parallel to the first,
    not a conditional clause. Rendering it as 'Do' communicates the interrogative
    force in natural English.
- source_word: רְפָאִים
  chosen: the departed spirits
  alternatives:
  - the shades
  - the dead
  - Rephaim
  lexicon: HALOT
  rationale: In this poetic context רְפָאִים refers to the dead in Sheol, often conceived
    as shadowy departed ones. 'Departed spirits' is clearer for modern readers than
    'shades,' while avoiding the misleading ethnic sense of 'Rephaim'.
- source_word: יָק֤וּמוּ
  chosen: rise up
  alternatives:
  - arise
  - stand up
  lexicon: HALOT
  rationale: קום here refers to rising, likely from death or from the underworld in
    the rhetorical image. 'Rise up' is idiomatic and preserves the vividness.
- source_word: יוֹדוּךָ
  chosen: to praise you
  alternatives:
  - to thank you
  - to give thanks to you
  - to confess you
  lexicon: HALOT
  rationale: ידה in the Hiphil often means 'give thanks/praise.' In parallel with
    worship language in the psalm, 'praise you' best captures the devotional sense
    in contemporary English.
- source_word: סֶּלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate
    it rather than impose a speculative translation.
