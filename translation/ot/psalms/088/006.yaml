theological_decisions:
- issue: Meaning of divine 'remembering' in a lament about the dead
  chosen_reading: Rendered as 'remember' in the main text, preserving the covenantal-relational
    sense without overinterpreting it as abandonment from God's omniscience.
  alternative_readings:
  - care for
  - take thought of
  rationale: The verse speaks phenomenologically from the psalmist's distress. 'Remember'
    preserves the Hebrew wording and theological tension; stronger interpretive renderings
    like 'care for' may capture implication but resolve the metaphor too quickly.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Force of 'free' among the dead
  chosen_reading: Kept the paradoxical image 'set free among the dead' rather than
    smoothing to 'forsaken' or 'left alone.'
  alternative_readings:
  - forsaken among the dead
  - left alone among the dead
  rationale: The Hebrew uses the language of freedom/release ironically. Preserving
    that image respects the source text's poetic force and avoids importing a doctrinally
    loaded notion of divine abandonment beyond what the verse states.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; §3 Preserve theological tension rather than resolve it.
