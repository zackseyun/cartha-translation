id: PSA.88.6
reference: Psalms 88:6
source:
  edition: WLC
  text: בַּ/מֵּתִ֗ים חָ֫פְשִׁ֥י כְּמ֤וֹ חֲלָלִ֨ים שֹׁ֥כְבֵי קֶ֗בֶר אֲשֶׁ֤ר לֹ֣א זְכַרְתָּ֣/ם
    ע֑וֹד וְ֝/הֵ֗מָּה מִ/יָּדְ/ךָ֥ נִגְזָֽרוּ׀׃
translation:
  text: I am set free among the dead, like the slain who lie in the grave, whom you
    remember no more, for they are cut off from your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''free among the dead.'' The Hebrew uses the language of being free
      or released, likely ironically: the psalmist is as good as dead, removed from
      the sphere of the living.'
    reason: lexical_alternative
  - marker: b
    text: '''Remember'' here likely means more than mental recollection; it carries
      the sense of attending to or acting for someone.'
    reason: lexical_alternative
  - marker: c
    text: Or 'severed from your hand.' 'Hand' is a Hebrew image for power, control,
      or care.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמֵּתִים
  chosen: among the dead
  alternatives:
  - with the dead
  - in the company of the dead
  lexicon: HALOT
  rationale: The preposition ב with the plural 'the dead' is best rendered locatively/socially
    as 'among the dead,' expressing the psalmist's identification with the realm/company
    of the dead rather than simple accompaniment.
- source_word: חָפְשִׁי
  chosen: set free
  alternatives:
  - free
  - released
  lexicon: HALOT
  rationale: 'The adjective means ''free, released.'' In context it is ironic: the
    psalmist is ''free'' in the sense of being released from the sphere of the living
    and ordinary obligations, like the dead. ''Set free'' brings out the predicative
    force in idiomatic English without implying positive liberation.'
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle introducing the simile.
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - the pierced
  - the wounded dead
  lexicon: HALOT
  rationale: In poetic contexts this noun commonly denotes those slain, often violently.
    'The slain' is the most natural English equivalent here.
- source_word: שֹׁכְבֵי קֶבֶר
  chosen: who lie in the grave
  alternatives:
  - lying in the grave
  - those who lie in the tomb
  lexicon: HALOT
  rationale: Construct participle plus noun describes the state of the slain. 'Lie
    in the grave' is natural and preserves the durative participial sense.
- source_word: אֲשֶׁר לֹא זְכַרְתָּם עוֹד
  chosen: whom you remember no more
  alternatives:
  - whom you no longer remember
  - whom you remember no longer
  lexicon: HALOT
  rationale: Directly reflects the relative clause and adverb עוֹד. In this lament
    context 'remember' carries covenantal/attentive force, not mere mental recollection.
- source_word: וְהֵמָּה
  chosen: for they
  alternatives:
  - and they
  - they
  lexicon: HALOT
  rationale: Though formally 'and they,' the clause explains the prior statement.
    Rendering as 'for they' captures the explanatory force in smooth English.
- source_word: מִיָּדְךָ
  chosen: from your hand
  alternatives:
  - from your power
  - from your care
  lexicon: HALOT
  rationale: '''Hand'' is retained as the primary metaphor, preserving the Hebrew
    image of power/control/care. Interpretive expansions such as ''power'' or ''care''
    are possible but too narrowing for the main text.'
- source_word: נִגְזָרוּ
  chosen: are cut off
  alternatives:
  - have been severed
  - are separated
  lexicon: HALOT
  rationale: The Niphal of גזר conveys being cut off/severed. 'Are cut off' is idiomatic
    and preserves the stark imagery of separation.
