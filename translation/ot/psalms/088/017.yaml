id: PSA.88.17
reference: Psalms 88:17
source:
  edition: WLC
  text: עָ֭לַ/י עָבְר֣וּ חֲרוֹנֶ֑י/ךָ בִּ֝עוּתֶ֗י/ךָ צִמְּתוּתֻֽ/נִי׃
translation:
  text: Your burning anger swept over me; your terrors destroyed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passed over me' for 'swept over me'; the Hebrew verb is literally 'passed
      over,' but the context suggests overwhelming force.
    reason: lexical_alternative
  - marker: b
    text: '''Your burning anger'' renders a Hebrew expression literally related to
      burning; traditional versions often have ''your wrath.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'cut me off' for 'destroyed me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלַי
  chosen: over me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: The preposition עַל with 1cs suffix indicates movement or force directed
    onto the psalmist. 'Over me' fits the imagery with the following verb 'swept over'
    and sounds natural in English.
- source_word: עָבְרוּ
  chosen: swept over
  alternatives:
  - passed over
  - went over
  - came over
  lexicon: HALOT
  rationale: The verb עבר literally means 'passed over/crossed,' but in this poetic
    context with divine wrath as subject, 'swept over' better conveys overwhelming
    force while remaining close to the underlying motion metaphor.
- source_word: חֲרוֹנֶיךָ
  chosen: your burning anger
  alternatives:
  - your wrath
  - your fierce anger
  lexicon: HALOT
  rationale: From חרון, often denoting burning anger or wrath. 'Burning anger' preserves
    the lexical imagery of heat/burning more explicitly than the traditional but flatter
    'wrath.' The plural form here is an abstract/intensive plural, naturally rendered
    as a singular mass expression in English.
- source_word: בִּעוּתֶיךָ
  chosen: your terrors
  alternatives:
  - your horrors
  - your frightful acts
  lexicon: HALOT
  rationale: The noun denotes terrors or things causing dread. 'Terrors' is the most
    direct and idiomatic rendering in this lament context.
- source_word: צִמְּתוּתֻנִי
  chosen: destroyed me
  alternatives:
  - cut me off
  - annihilated me
  - silenced me
  lexicon: HALOT
  rationale: From צמת, meaning to destroy, exterminate, or cut off. 'Destroyed me'
    is the clearest modern English rendering and matches the psalm's extreme language.
    'Cut me off' is possible, but 'destroyed' better reflects the intensity of the
    lament.
