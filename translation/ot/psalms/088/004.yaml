theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term refers to the abode of the dead in Israelite thought.
    Using 'Sheol' avoids importing a narrower or later theological concept and preserves
    the text's own imagery.
  doctrine_reference: Translation philosophy §1, §3
