id: PSA.88.4
reference: Psalms 88:4
source:
  edition: WLC
  text: כִּֽי שָֽׂבְעָ֣ה בְ/רָע֣וֹת נַפְשִׁ֑/י וְ/חַיַּ֗/י לִ/שְׁא֥וֹל הִגִּֽיעוּ־׃
translation:
  text: For my soul is full of troubles, and my life draws near to Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' The Hebrew term is 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's condition in the surrounding
    context. 'For' fits natural English while preserving the causal force.
- source_word: שָׂבְעָה
  chosen: is full
  alternatives:
  - is sated
  - is filled
  lexicon: HALOT
  rationale: The verb denotes being filled/sated. In context, with 'troubles,' idiomatic
    English is 'is full of,' preserving the metaphor without awkwardness.
- source_word: בְרָעוֹת
  chosen: of troubles
  alternatives:
  - with evils
  - with calamities
  - with miseries
  lexicon: HALOT
  rationale: רָעוֹת can denote evils, troubles, or calamities. Here it refers to the
    afflictions overwhelming the psalmist rather than moral evil committed by him,
    so 'troubles' is the clearest contextual rendering.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, or self. Since the second colon already uses
    חַיַּי ('my life'), rendering this as 'my soul' preserves the poetic parallelism
    and lexical distinction.
- source_word: וְחַיַּי
  chosen: and my life
  alternatives:
  - and my lives
  lexicon: HALOT
  rationale: Though formally plural, חַיִּים commonly functions as a singular abstract
    noun meaning 'life.' 'My life' is standard and natural in English.
- source_word: לִשְׁאוֹל
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: HALOT
  rationale: Sheol is the Hebrew term for the underworld/the realm of the dead. Translating
    it as 'Sheol' preserves the source-world concept without prematurely collapsing
    it into 'grave' or a later doctrinal category.
- source_word: הִגִּיעוּ
  chosen: draws near
  alternatives:
  - has reached
  - comes near
  lexicon: HALOT
  rationale: The verb means to reach/arrive. With לְ plus Sheol in this poetic lament,
    English idiom favors 'draws near to,' expressing imminent approach rather than
    completed arrival.
