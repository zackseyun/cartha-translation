id: PSA.88.5
reference: Psalms 88:5
source:
  edition: WLC
  text: נֶ֭חְשַׁבְתִּי עִם י֣וֹרְדֵי ב֑וֹר הָ֝יִ֗יתִי כְּ/גֶ֣בֶר אֵֽין אֱיָֽל־־׃
translation:
  text: I am counted among those going down to the pit; I have become like a man without
    strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those going down to the grave.' The Hebrew 'pit' is a common poetic
      image for death.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a strong man without vigor.' The noun can denote a man with connotations
      of strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶחְשַׁבְתִּי
  chosen: I am counted
  alternatives:
  - I am reckoned
  - I am considered
  lexicon: HALOT
  rationale: From חשב in the Niphal, expressing being regarded or accounted as belonging
    to a group. Present English fits the psalm's vivid lament, though the Hebrew form
    is perfect.
- source_word: עִם
  chosen: among
  alternatives:
  - with
  lexicon: HALOT
  rationale: Literally 'with,' but 'among' is idiomatic in English after 'counted'
    and preserves the sense of inclusion within a class.
- source_word: יוֹרְדֵי בוֹר
  chosen: those going down to the pit
  alternatives:
  - those descending to the pit
  - those who go down to the grave
  lexicon: HALOT
  rationale: The participle plus noun denotes people descending to the pit, a common
    Hebrew image for death or the realm of the dead. 'Pit' preserves the metaphor
    more closely than 'grave' in the main text.
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the dungeon
  lexicon: HALOT
  rationale: In this poetic context, בור is a stock term for the realm of death or
    a grave-like abyss. 'Pit' keeps the Hebrew imagery and allows readers to hear
    the metaphorical depth of the lament.
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I was
  lexicon: HALOT
  rationale: Though formally a perfect of היה, in context it marks the psalmist's
    resultant state. 'I have become' brings out that transition into a condition resembling
    death.
- source_word: כְּגֶבֶר
  chosen: like a man
  alternatives:
  - like a warrior
  - like a strong man
  lexicon: HALOT
  rationale: גבר commonly means 'man' and can carry connotations of strength or vigor.
    Here the following phrase 'without strength' makes the irony clear, so the simpler
    'man' is retained in the main text.
- source_word: אֵין אֱיָל
  chosen: without strength
  alternatives:
  - without vigor
  - without might
  - helpless
  lexicon: HALOT
  rationale: איל denotes strength or might. 'Without strength' is the most transparent
    rendering and preserves the starkness of the Hebrew expression.
