- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern. The alternative transliteration is preserved in a footnote.
