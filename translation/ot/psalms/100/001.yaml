id: PSA.100.1
reference: Psalms 100:1
source:
  edition: WLC
  text: מִזְמ֥וֹר לְ/תוֹדָ֑ה הָרִ֥יעוּ לַ֝/יהוָ֗ה כָּל הָ/אָֽרֶץ־׃
translation:
  text: A psalm of thanksgiving. Shout joyfully to the LORD, all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in keeping with the project''s stated convention.'
    reason: alternative_reading
  - marker: b
    text: Or 'Make a joyful noise to the LORD, all the earth.'
    reason: lexical_alternative
  - marker: c
    text: The heading may also be understood as 'A psalm for a thank offering' or 'A psalm of thanksgiving.'
    reason: lexical_alternative
  - marker: d
    text: Or 'A psalm for thanksgiving.'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: The superscription noun commonly denotes a psalm/song, especially in headings. 'Psalm' is the most natural and established English equivalent in this literary context.
- source_word: לְתוֹדָה
  chosen: for thanksgiving
  alternatives:
  - for a thank offering
  - for praise
  lexicon: HALOT
  rationale: תוֹדָה can denote thanksgiving, praise, or a thank offering. In a psalm heading, 'for thanksgiving' best fits the genre and avoids over-specifying a sacrificial setting, while still preserving the sense of grateful praise.
- source_word: הָרִיעוּ
  chosen: Shout joyfully
  alternatives:
  - Raise a shout
  - Make a joyful noise
  - Shout in triumph
  lexicon: HALOT
  rationale: The Hiphil imperative of רוע here calls for a loud acclamation. 'Shout joyfully' preserves both the vocal force and celebratory tone better than the traditional but potentially vague 'make a joyful noise.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated. The preposition ל marks the direction/object of the acclamation: the shout is directed to the LORD.'
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - the whole earth
  lexicon: HALOT
  rationale: אָרֶץ can mean land or earth; in this universal summons, 'all the earth' best captures the global scope. This also fits the psalm's broad call to worship.
