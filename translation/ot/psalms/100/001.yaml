  from: A psalm for thanksgiving.
  to: A psalm of thanksgiving.
  rationale: The Hebrew preposition 'le' (לְ) in the superscription 'מִזְמוֹר לְתוֹדָה' can be rendered as 'for' or 'of'. While 'for thanksgiving' is grammatically correct, 'of thanksgiving' is more idiomatic and conventional for titles in English, aligning with common constructions like 'A Psalm of David'. This change offers a slight improvement in literary style and naturalness without altering the meaning.
