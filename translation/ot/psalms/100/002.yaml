id: PSA.100.2
reference: Psalms 100:2
source:
  edition: WLC
  text: עִבְד֣וּ אֶת יְהוָ֣ה בְּ/שִׂמְחָ֑ה בֹּ֥אוּ לְ֝/פָנָ֗י/ו בִּ/רְנָנָֽה־׃
translation:
  text: Serve Yahweh with gladness; come before him with joyful shouting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with singing' for 'with joyful shouting'; the Hebrew term can denote jubilant vocal praise, whether shouted or sung.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְדוּ
  chosen: Serve
  alternatives:
  - Worship
  - Labor for
  lexicon: HALOT
  rationale: Imperative plural of עבד in relation to YHWH commonly denotes serving in devotion or worshipful obedience. 'Serve' preserves the lexical link without narrowing it only to liturgical worship.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּשִׂמְחָה
  chosen: with gladness
  alternatives:
  - with joy
  - rejoicing
  lexicon: HALOT
  rationale: 'The preposition ב marks manner: the service is to be rendered in a state or manner of joy. ''Gladness'' is natural English and preserves the positive affective sense.'
- source_word: בֹּאוּ
  chosen: come
  alternatives:
  - enter
  - approach
  lexicon: HALOT
  rationale: Imperative plural of בוא. 'Come' is the broad, direct equivalent and fits the parallel exhortation. 'Enter' would over-specify movement into a sanctuary not explicit in this verse alone.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - into his presence
  - before his face
  lexicon: HALOT
  rationale: Literally 'to/before his face/presence.' 'Before him' is concise and idiomatic while preserving the relational-spatial sense. The fuller idiom 'into his presence' is possible but less formally tied to the Hebrew wording.
- source_word: בִּרְנָנָה
  chosen: with joyful shouting
  alternatives:
  - with singing
  - with a shout of joy
  - with ringing cries
  lexicon: HALOT
  rationale: רננה denotes a ringing cry, jubilant shout, or exultant song. 'Joyful shouting' preserves the vocal, exuberant sense better than the traditional but narrower 'singing,' while remaining natural English.
