theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the psalm's liturgical register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of חֶסֶד in relation to covenant theology
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - mercy
  - lovingkindness
  rationale: The verse praises God's enduring covenantal benevolence. 'Steadfast love'
    preserves theological depth without importing a narrower systematic category into
    the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
revisions:
- timestamp: '2026-04-21T00:25:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/100/005.json
  category: awkward_english
  tier: 1
  from: and his faithfulness to generation and generation.
  to: and his faithfulness endures to generation and generation.
  rationale: The current rendering of the final clause lacks an explicit verb. While
    the verb 'is' can be elided from the preceding clause ('his steadfast love is
    forever'), the resulting phrase 'his faithfulness is to generation and generation'
    is awkward and does not clearly convey the intended meaning of endurance. The
    Hebrew phrase 'וְעַד דֹּר וָדֹר' ('and unto generation and generation') functions
    in parallel with 'לְעוֹלָם' ('forever'), with both expressing duration. Adding
    the verb 'endures' makes this temporal sense explicit, improves the rhythm of
    the English, and more accurately reflects the parallel structure of the source
    text.
