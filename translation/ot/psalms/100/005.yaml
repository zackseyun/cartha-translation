id: PSA.100.5
reference: Psalms 100:5
source:
  edition: WLC
  text: כִּי ט֣וֹב יְ֭הֹוָה לְ/עוֹלָ֣ם חַסְדּ֑/וֹ וְ/עַד דֹּ֥ר וָ֝/דֹ֗ר אֱמוּנָתֽ/וֹ־־׃
translation:
  text: For the LORD is good; his steadfast love is forever, and his faithfulness
    endures from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because the LORD is good.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his hesed'—often rendered 'steadfast love,' with overtones of covenant
      loyalty, mercy, and faithful love.
    reason: lexical_alternative
  - marker: c
    text: Or 'from generation to generation' or 'to all generations.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and his faithfulness to generation and generation.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the summons in the psalm. 'For' fits the explanatory
    function in English and preserves the verse's grounding force.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective broadly denotes moral and beneficent goodness. 'Good' is
    the most direct and idiomatic rendering here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - endures forever
  lexicon: HALOT
  rationale: With the following noun phrase, this adverbial expression marks enduring
    duration. 'Forever' is concise, natural, and preserves the temporal force.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and enduring love. 'Steadfast
    love' is the best established English rendering that preserves both affection
    and constancy without over-narrowing to one aspect.
- source_word: וְעַד
  chosen: and ... to
  alternatives:
  - and until
  - even to
  lexicon: HALOT
  rationale: The conjunction plus preposition extends the statement from 'forever'
    into successive generations. In English this is best represented by 'and ... to'
    within the phrase 'to generation and generation.'
- source_word: דֹּר וָדֹר
  chosen: generation and generation
  alternatives:
  - all generations
  - from generation to generation
  lexicon: HALOT
  rationale: The Hebrew idiom literally repeats the noun for emphasis across successive
    generations. 'Generation and generation' preserves the form more closely than
    the smoother but less literal 'all generations.'
- source_word: אֱמוּנָתוֹ
  chosen: his faithfulness
  alternatives:
  - his steadfastness
  - his trustworthiness
  lexicon: HALOT
  rationale: The noun denotes firmness, reliability, and faithfulness. 'Faithfulness'
    is the most natural English equivalent in parallel with God's enduring חֶסֶד.
