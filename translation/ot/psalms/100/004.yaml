id: PSA.100.4
reference: Psalms 100:4
source:
  edition: WLC
  text: בֹּ֤אוּ שְׁעָרָ֨י/ו בְּ/תוֹדָ֗ה חֲצֵרֹתָ֥י/ו בִּ/תְהִלָּ֑ה הֽוֹדוּ ל֝֗/וֹ
    בָּרֲכ֥וּ שְׁמֽ/וֹ׀־׃
translation:
  text: Enter his gates with thanksgiving, and his courts with praise; give thanks
    to him; bless his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a thank offering' for 'with thanksgiving' (בְּתוֹדָה), since the
      Hebrew term can denote either thanksgiving or a thanksgiving offering depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּאוּ
  chosen: Enter
  alternatives:
  - Come
  - Go in
  lexicon: HALOT
  rationale: Imperative plural of בוא. In context with 'gates' and 'courts,' 'Enter'
    best captures the movement into a worship space in natural English.
- source_word: שְׁעָרָיו
  chosen: his gates
  alternatives:
  - his gate-entrances
  lexicon: HALOT
  rationale: Common plural noun for city/temple gates with 3ms suffix. 'Gates' is
    the standard and contextually fitting rendering.
- source_word: בְּתוֹדָה
  chosen: with thanksgiving
  alternatives:
  - in thanksgiving
  - with a thank offering
  lexicon: HALOT
  rationale: תוֹדָה can denote thanksgiving or a thank offering. Here, paired with
    'praise' and framed by imperatives of worship, the abstract sense 'thanksgiving'
    fits best. English idiom favors 'with thanksgiving' for manner.
- source_word: חֲצֵרֹתָיו
  chosen: his courts
  alternatives:
  - his courtyards
  lexicon: HALOT
  rationale: Refers to temple courts/courtyards. 'Courts' is concise, idiomatic, and
    preserves the likely cultic setting.
- source_word: בִּתְהִלָּה
  chosen: with praise
  alternatives:
  - in praise
  - with a song of praise
  lexicon: HALOT
  rationale: תְהִלָּה denotes praise. 'With praise' parallels 'with thanksgiving'
    and preserves the poetic structure.
- source_word: הוֹדוּ לוֹ
  chosen: give thanks to him
  alternatives:
  - praise him
  - confess to him
  lexicon: HALOT
  rationale: In the Hiphil, ידה often means 'give thanks' in worship contexts. Since
    תּוֹדָה already appears earlier, retaining 'give thanks' preserves the lexical
    connection in English as much as possible.
- source_word: בָּרֲכוּ
  chosen: bless
  alternatives:
  - speak well of
  - praise
  lexicon: HALOT
  rationale: Imperative plural of ברך. 'Bless' is the established and semantically
    appropriate rendering in relation to God's name; 'praise' would blur the distinction
    from תְהִלָּה.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Standard rendering. In Hebrew worship language, 'name' represents God's
    revealed identity and reputation; the literal expression should be preserved rather
    than paraphrased.
