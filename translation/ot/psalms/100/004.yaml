theological_decisions:
- issue: Cultic imagery of gates and courts
  chosen_reading: Retain the temple-access imagery literally as 'gates' and 'courts.'
  alternative_readings:
  - Generalize to 'presence' or 'house'
  rationale: The Hebrew explicitly evokes worshipers entering sacred precincts. Preserving
    the imagery respects the source text and avoids importing a broader theological
    abstraction not stated in the verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
