theological_decisions:
- issue: Ketiv/Qere reading in the middle colon
  chosen_reading: 'Main text follows the ketiv sense: ''He made us, and not we ourselves.'''
  alternative_readings:
  - 'Follow the qere/traditional reading: ''He made us, and we are his.'''
  rationale: The written text (לא) naturally yields 'not,' while the traditional marginal reading (לו) yields 'his.' Both are well known in translation history. In keeping with original-language primacy, the main text preserves the ketiv, but because the qere is ancient, contextually coherent, and widely reflected in translations, it is preserved in a footnote rather than ignored.
  doctrine_reference: Translation philosophy §§1, 3, 5
