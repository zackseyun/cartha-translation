id: PSA.100.3
reference: Psalms 100:3
source:
  edition: WLC
  text: דְּע֗וּ כִּֽי יְהוָה֮ ה֤וּא אֱלֹ֫הִ֥ים הֽוּא עָ֭שָׂ/נוּ ו/לא אֲנַ֑חְנוּ עַ֝מּ֗/וֹ וְ/צֹ֣אן מַרְעִיתֽ/וֹ־־׃
translation:
  text: Know that Yahweh, he is God. He made us, and not we ourselves; we are his people and the sheep of his pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following the traditional marginal reading: ''He made us, and we are his.'''
    reason: alternative_reading
lexical_decisions:
- source_word: דְּעוּ
  chosen: Know
  alternatives:
  - Recognize
  - Understand
  lexicon: HALOT
  rationale: Imperative plural of ידע, calling the hearers to acknowledge or know as a settled truth. 'Know' is concise and traditional while remaining natural English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what is to be known. 'That' best fits the declarative clause in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוּא אֱלֹהִים
  chosen: he is God
  alternatives:
  - is God
  - he alone is God
  lexicon: HALOT
  rationale: 'The pronoun adds emphasis: YHWH is truly God. ''He is God'' preserves the emphatic force without adding exclusivizing language not explicit in the Hebrew.'
- source_word: הוּא עָשָׂנוּ
  chosen: He made us
  alternatives:
  - He has made us
  - He fashioned us
  lexicon: HALOT
  rationale: עשה here refers to God's making/creating his people. Simple past reads naturally in English and fits the psalm's confessional style.
- source_word: וְלֹא אֲנַחְנוּ
  chosen: and not we ourselves
  alternatives:
  - and not ourselves
  - and we are his
  lexicon: HALOT
  rationale: The consonantal text reads 'and not we/ourselves' (ketiv), yielding the sense that God made us and we did not make ourselves. This is retained in the main text as the MT reading. The qere/traditional alternative 'and his we are' is preserved in a footnote because it is ancient and contextually fitting.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Standard covenantal designation for those belonging to God. Straightforward possessive rendering.
- source_word: וְצֹאן מַרְעִיתוֹ
  chosen: and the sheep of his pasture
  alternatives:
  - the flock of his pasture
  lexicon: HALOT
  rationale: A common pastoral metaphor. 'Sheep of his pasture' preserves the imagery and close lexical correspondence of צאן and מרעית.
