id: PSA.9.11
reference: Psalms 9:11
source:
  edition: WLC
  text: וְ/יִבְטְח֣וּ בְ֭/ךָ יוֹדְעֵ֣י שְׁמֶ֑/ךָ כִּ֤י לֹֽא עָזַ֖בְתָּ דֹרְשֶׁ֣י/ךָ יְהוָֽה־׃
translation:
  text: And those who know your name will trust in you, for you, O Yahweh, have not forsaken those who seek you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''those who know your name''—''name'' here carries the sense of the LORD''s revealed character and reputation, not merely the sound of the name.'
    reason: cultural_note
  - marker: b
    text: Or 'have not abandoned.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִבְטְחוּ
  chosen: And ... will trust
  alternatives:
  - and ... shall trust
  - so that ... may trust
  lexicon: HALOT
  rationale: Qal imperfect 3mp of בטח expresses confident reliance; in this poetic context an English future-like sense ('will trust') is natural. The prefixed conjunction is carried forward as 'And' linking with the prior verse.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - on you
  lexicon: HALOT
  rationale: בטח commonly takes ב to mark the object of trust; 'trust in you' is idiomatic modern English and preserves the relational sense.
- source_word: יֹדְעֵי שְׁמֶךָ
  chosen: those who know your name
  alternatives:
  - those knowing your name
  - those who acknowledge your name
  lexicon: HALOT
  rationale: The participial construction denotes a class of people characterized by knowing God's name. 'Know your name' in Hebrew implies more than bare awareness, but the literal wording is retained to preserve covenantal resonance.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Retained literally. In context it signifies God's revealed character and reputation, but this theological freight is best preserved by the standard biblical expression 'name' rather than unpacked in the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the trust just mentioned. 'For' is concise and natural in English poetry.
- source_word: לֹא עָזַבְתָּ
  chosen: have not forsaken
  alternatives:
  - have not abandoned
  - did not forsake
  lexicon: HALOT
  rationale: 'עזב means leave, forsake, abandon. ''Forsaken'' preserves the covenantal and emotive force common in Psalms. The perfect is rendered with present relevance in English: ''have not forsaken.'''
- source_word: דֹּרְשֶׁיךָ
  chosen: those who seek you
  alternatives:
  - those who inquire of you
  - those who pursue you
  lexicon: HALOT
  rationale: דרש in relation to God commonly means to seek him devotionally or prayerfully. 'Those who seek you' is the most natural and established equivalent without being archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
