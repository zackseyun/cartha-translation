theological_decisions:
- issue: Collective vs. individual sense of רָשָׁע
  chosen_reading: 'collective/generic: ''the wicked'''
  alternative_readings:
  - 'individual: ''the wicked one'''
  rationale: The singular adjective/noun can denote a class or representative singular.
    Because the verse addresses divine judgment on nations and then refers to 'their
    name,' the collective sense is more coherent in English. This is a literary-lexical
    decision, not a doctrinal one, but it affects how the judgment is understood.
