id: PSA.9.6
reference: Psalms 9:6
source:
  edition: WLC
  text: גָּעַ֣רְתָּ ג֭וֹיִם אִבַּ֣דְתָּ רָשָׁ֑ע שְׁמָ֥/ם מָ֝חִ֗יתָ לְ/עוֹלָ֥ם וָ/עֶֽד׃
translation:
  text: You rebuked nations; you destroyed the wicked; you blotted out their name
    forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked one'; the Hebrew singular can be understood either individually
      or collectively.
    reason: alternative_reading
  - marker: b
    text: Literally 'their name'; in context this implies the removal of their memory
      or renown.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּעַרְתָּ
  chosen: you rebuked
  alternatives:
  - you threatened
  - you censured
  lexicon: HALOT
  rationale: The verb גער commonly denotes a forceful rebuke or reprimand, often with
    effective power. 'Rebuked' preserves the direct verbal action without over-paraphrasing
    into a more interpretive result.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In Psalmic judgment context, גוים refers to the nations as collective
    peoples. 'Nations' is the most natural and standard rendering here; 'Gentiles'
    would import later Jewish/Christian contrast not explicit in this verse.
- source_word: אִבַּדְתָּ
  chosen: you destroyed
  alternatives:
  - you made perish
  - you wiped out
  lexicon: HALOT
  rationale: 'The piel of אבד is causative/intensive: causing to perish or destroying.
    ''Destroyed'' is strong, idiomatic English and matches the judgment context.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked one
  - the guilty
  lexicon: HALOT
  rationale: Although morphologically singular, רשע can function collectively or generically.
    In parallel with 'nations' and the plural suffix in 'their name,' English 'the
    wicked' best captures the representative collective sense.
- source_word: שְׁמָם
  chosen: their name
  alternatives:
  - their memory
  - their renown
  lexicon: HALOT
  rationale: The Hebrew is literally 'their name.' While 'name' can imply memory or
    renown, the main text should preserve the lexical form; the idiomatic implications
    can be noted in a footnote.
- source_word: מָחִיתָ
  chosen: you blotted out
  alternatives:
  - you erased
  - you wiped out
  lexicon: HALOT
  rationale: מחה often means to wipe out or blot out, especially in contexts of removing
    memory or record. 'Blotted out' preserves the vivid metaphor and fits well with
    'name.'
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for perpetual ages
  lexicon: HALOT
  rationale: The paired expression intensifies duration. 'Forever and ever' is idiomatic
    English that reflects the emphatic force better than a bare 'forever'.
