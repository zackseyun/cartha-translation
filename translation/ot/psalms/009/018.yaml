theological_decisions:
- issue: Meaning of שְׁאוֹל in a judgment context
  chosen_reading: Sheol is rendered by transliteration rather than interpreted as
    'hell.'
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: The verse speaks of the destiny of the wicked, but the Hebrew term itself
    does not require the later, more specific doctrinal sense of eternal hell. Transliteration
    preserves theological precision and avoids importing claims beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
