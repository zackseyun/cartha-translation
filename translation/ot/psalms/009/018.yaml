id: PSA.9.18
reference: Psalms 9:18
source:
  edition: WLC
  text: יָשׁ֣וּבוּ רְשָׁעִ֣ים לִ/שְׁא֑וֹלָ/ה כָּל גּ֝וֹיִ֗ם שְׁכֵחֵ֥י אֱלֹהִֽים־׃
translation:
  text: The wicked will return to Sheol—all the nations that forget God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back to Sheol.' The Hebrew verb can mean 'return' or 'turn back.'
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; it is not identical
      in meaning to the later, more specific concept of hell.
    reason: cultural_note
lexical_decisions:
- source_word: יָשׁוּבוּ
  chosen: will return
  alternatives:
  - will turn back
  - shall return
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שוב commonly means 'return/turn back.' 'Will return'
    fits the movement toward Sheol and preserves the verbal sense without overinterpreting
    it as merely metaphorical destruction.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive denoting morally
    wicked persons. 'The wicked' is concise, idiomatic, and preserves the category.
- source_word: לִשְׁאוֹלָה
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  - to hell
  lexicon: HALOT
  rationale: Sheol in Hebrew Bible refers broadly to the underworld/realm of the dead,
    not necessarily the later developed concept of hell. Transliteration preserves
    the Hebrew concept most accurately; 'grave' is too narrow and 'hell' too theologically
    specific.
- source_word: כָּל גּוֹיִם
  chosen: all the nations
  alternatives:
  - all nations
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם means 'nations/peoples.' 'All the nations' best reflects the
    quantified plural with the article-like totalizing force of כָּל in context. 'Gentiles'
    would import an Israel/Gentile contrast not explicit here.
- source_word: שְׁכֵחֵי אֱלֹהִים
  chosen: that forget God
  alternatives:
  - forgetters of God
  - who have forgotten God
  lexicon: HALOT
  rationale: Construct participle phrase describing the nations. Relative clause 'that
    forget God' is natural English and preserves the ongoing characteristic force.
    'God' is the straightforward rendering of אֱלֹהִים here.
