theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of יֹשֵׁב צִיּוֹן
  chosen_reading: who dwells in Zion
  alternative_readings:
  - enthroned in Zion
  rationale: The phrase can evoke both residence and kingship. The chosen rendering
    preserves God's presence in Zion without forcing a more interpretive royal nuance
    into the main text; the alternative is preserved in a footnote because it is contextually
    plausible and theologically meaningful in Psalms.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
