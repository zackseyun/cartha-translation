id: PSA.9.12
reference: Psalms 9:12
source:
  edition: WLC
  text: זַמְּר֗וּ לַ֭/יהוָה יֹשֵׁ֣ב צִיּ֑וֹן הַגִּ֥ידוּ בָ֝/עַמִּ֗ים עֲלִֽילוֹתָֽי/ו׃
translation:
  text: Sing praises to the LORD, who dwells in Zion; declare his deeds among the
    peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who is enthroned in Zion."
    reason: alternative_reading
lexical_decisions:
- source_word: זַמְּרוּ
  chosen: Sing praises
  alternatives:
  - Sing
  - Make music
  - Sing psalms
  lexicon: HALOT
  rationale: Imperative plural of זמר in praise context; 'Sing praises' captures both
    the musical and worshipful force better than bare 'Sing' while remaining natural
    English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  - to Jehovah
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated
    forms, following established reverential convention and the LXX/English Bible
    pattern.
- source_word: יֹשֵׁב צִיּוֹן
  chosen: who dwells in Zion
  alternatives:
  - enthroned in Zion
  - sitting in Zion
  - inhabiting Zion
  lexicon: HALOT
  rationale: The participle יֹשֵׁב literally means 'sitting/dwelling.' In reference
    to the LORD and Zion, both royal enthronement and covenant presence are possible.
    'Who dwells in Zion' is a clear, natural rendering that preserves divine presence
    without over-specifying enthronement imagery not explicit in the immediate syntax.
- source_word: הַגִּידוּ
  chosen: declare
  alternatives:
  - tell
  - proclaim
  - make known
  lexicon: HALOT
  rationale: Imperative plural of נגד in the Hiphil, conveying public announcement.
    'Declare' fits the elevated poetic register and the outward-facing summons.
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - to the peoples
  lexicon: HALOT
  rationale: The preposition ב with עמים is best rendered 'among.' 'Peoples' preserves
    the plural ethnic/corporate sense of עמים better than the more politically loaded
    'nations,' though that remains a viable alternative.
- source_word: עֲלִילוֹתָיו
  chosen: his deeds
  alternatives:
  - his acts
  - his mighty deeds
  - his works
  lexicon: HALOT
  rationale: עֲלִילוֹת refers to actions or deeds, often notable acts. 'His deeds'
    is concise and faithful; 'mighty deeds' would add emphasis not overtly present
    in the noun itself, though contextually possible.
